      * [[Michael Wolf (economist)|Wolf, Michael]] (1999). ''The Entertainment Economy: How Mega-Media Forces Are Transforming Our Lives''. New York: [[Random House]]. {{ISBN|978-0-8129-3042-9}}. 336 pages.

