      * Bhutan<ref>{{Cite web |date=October 13, 2021 |title="Information at your fingertips"- National Digital Identity Project |url=http://www.bbs.bt/news/?p=159040}}</ref>

      Countries or regions with proposed digital identity systems include:

      * European Union ([[EU Digital Identity Wallet|European Digital Identity]])<ref>{{Cite web|title=European Digital Identity|url=https://ec.europa.eu/info/strategy/priorities-2019-2024/europe-fit-digital-age/european-digital-identity_en|access-date=2021-06-04|website=European Commission - European Commission|language=en}}</ref><ref>{{Cite web|title=Press corner|url=https://ec.europa.eu/commission/presscorner/home/en|access-date=2021-06-04|website=European Commission - European Commission|language=en}}</ref> In April 2024, the EU adopted Regulation (EU) 2024/1183 to establish the European Digital Identity framework, including provisions for an EU Digital Identity Wallet.
      * Jamaica<ref>{{Cite web |title=NIDS Bill still problematic despite being passed in both Houses — JFJ {{!}} Loop Jamaica |url=https://jamaica.loopnews.com/content/nids-bill-still-problematic-despite-being-passed-both-houses-jfj |access-date=2023-01-21 |website=Loop News |language=en}}</ref>
      * Turks and Caicos/Caribbean<ref>{{Cite web |date=December 5, 2022 |title=One Caribbean digital ID and card announced, another faces political opposition |url=https://www.biometricupdate.com/202212/one-caribbean-digital-id-and-card-announced-another-faces-political-opposition}}</ref>

