      On 1 June 2017, then-[[President of the United States|US President]] [[Donald Trump]] announced that the [[United States and the Paris Agreement|United States would withdraw]] from the agreement.<ref name="halper1">{{Cite news|url=http://www.latimes.com/politics/la-na-pol-trump-paris-20170601-story.html|title=Trump quits the Paris climate accord, calling it a 'bad deal' for the U.S.|last=Halper|first=Evan|date=1 June 2017|work=Los Angeles Times|access-date=1 June 2017|language=en-US|issn=0458-3035}}</ref> Since the agreement entered into force in the United States on 4 November 2016, the earliest possible date it could notify its intention to withdraw was 4 November 2019.<ref>{{Cite news|url=https://www.politico.com/story/2017/08/04/trump-notice-withdraw-from-paris-climate-deal-241331|title=Trump administration delivers notice US intends to withdraw from Paris climate deal|work=POLITICO|access-date=2017-08-04}}</ref><ref>{{Cite news|url=http://www.cnn.com/2017/09/16/politics/trump-paris-climate-deal/index.html|title=WH: US staying out of climate accord|last=Liptak|first=Kevin|work=CNN|access-date=2017-09-17}}</ref> If it had chosen to withdraw by way of withdrawing from the UNFCCC notice could be given immediately, since the UNFCCC entered into force for the US in 1994.  In both cases, withdrawal would be effective one year later. According to a memo obtained by ''[[HuffPost]]'' believed to be written by US State Department legal office, any "attempts to withdraw from the Paris Agreement outside of the above-described withdrawal provisions would be inconsistent with international law and would not be accepted internationally."<ref>{{cite news|url=http://www.huffingtonpost.ca/entry/paris-agreement_us_5908f524e4b05c397683d404|title=White House Leaning Toward Exiting Paris Agreement By Next Week, Sources Say|first1=Alexander|last1=Kaufman|first2=Kate|last2=Sheppard|work=[[HuffPost]]|date=2 May 2017|accessdate=22 July 2017}}</ref><ref>{{cite web|url=https://www.scribd.com/document/347089780/State-Dept-Memo-Outlining-Paris-Agreement-Withdrawal|title=Paris Agreement: Overview of Legal Issues|accessdate=22 July 2017}}</ref>  On August 4, 2017, the Trump administration delivered an official notice to the United Nations that the US intended to withdraw from the Paris Agreement as soon as it was legally eligible to do so.<ref name=UScom>{{cite web|url=https://treaties.un.org/doc/Publication/CN/2017/CN.464.2017-Eng.pdf|title=Reference: C.N.464.2017.TREATIES-XXVII.7.d (Depositary Notification)|date=2017-08-08|accessdate=2017-08-14|publisher=United Nations}}</ref>  On 4 November 2019, the United States notified the depositary of its withdrawal from the agreement, which became effective one year later.<ref name=USWD/>

      In one of his first executive actions, President [[Joe Biden]] signed an order for the United States to rejoin the agreement.<ref>{{Cite web|url=https://www.cnbc.com/2021/01/20/biden-inauguration-us-rejoins-paris-climate-accord.html|title=President Joe Biden rejoins the Paris climate accord in first move to tackle global warming|first1=Emma|last1=Newburger|work=[[CNBC]]|date=20 January 2021}}</ref><ref>{{Cite web|url=https://bidenwhitehouse.archives.gov/briefing-room/statements-releases/2021/01/20/paris-climate-agreement/|title=Paris Climate Agreement|last1=Whitehouse|first1=The|work=[[White House]]|date=20 January 2021}}</ref> Joe Biden was greeted by [[Emmanuel Macron|French President Emmanuel Macron]] with a "Welcome back to the Paris Agreement!".<ref>{{Cite web|last=Choi|first=Joseph|date=2021-01-20|title=Macron to Biden and Harris: 'Welcome back to the Paris Agreement!'|url=https://thehill.com/policy/international/europe/535101-macron-to-biden-and-harris-welcome-back-to-the-paris-agreement|access-date=2021-02-21|website=TheHill|language=en}}</ref>  On January 20, 2025, shortly after [[Second inauguration of Donald Trump|his second inauguration]], President Trump signed an executive order titled "[[Putting America First In International Environmental Agreements]]", to withdraw the United States from the agreement for a second time.<ref>{{Cite news |last=Bearak |first=Max |date=2025-01-20 |title=Trump Orders U.S. Exit From the Paris Agreement on Climate |url=https://www.nytimes.com/2025/01/20/climate/trump-paris-agreement-climate.html |access-date=2025-01-21 |work=The New York Times |language=en-US |issn=0362-4331}}</ref>

