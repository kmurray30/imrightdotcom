      == List by number of years as Security Council member ==<!-- This section is linked from [[Japan]] -->
      This list contains the 139 United Nations member states so far elected to the United Nations Security Council, including the five permanent members, all listed by number of years each country has so far spent on the UNSC. Of all the members, 6 have so far ceased to exist, leaving the list with 133 modern nations. These, combined with the 60 modern nations that have never been elected to the UNSC to date (see [[#Non-members|Non-members, below]]), make up the [[Member states of the United Nations|193 current members of the UN]].

