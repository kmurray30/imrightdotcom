      The '''Bilderberg Meeting''' (also known as the '''Bilderberg Group''', '''Bilderberg Conference''' or '''Bilderberg Club''') is an annual off-the-record forum established in 1954 to foster dialogue between [[Europe]] and [[North America]]. The group's agenda, originally to prevent another [[world war]], is now defined as bolstering a consensus around [[free market]] Western [[capitalism]] and its interests around the globe. Participants include [[political leaders]], [[experts]], captains of [[Private industry|industry]], [[finance]], and academia, numbering between 120 and 150. 

      Attendees are entitled to use information gained at meetings, but not attribute it to a named speaker—an arrangement, called the [[Chatham House Rule]], that the club says is meant to encourage candid debate while maintaining privacy. Critics from a wide range of viewpoints have called it into question, and it has drawn [[Conspiracy theory|conspiracy theories]] from both the [[Left-wing politics|left]] and [[Right-wing politics|right]].

      Meetings were chaired by [[Prince Bernhard of Lippe-Biesterfeld|Prince Bernhard of the Netherlands]] until 1975. The current Chairman is French businessman [[Henri de Castries]]. Since 1954, the meeting has taken place every year except in 1976, when it was cancelled due to the [[Lockheed bribery scandals]] involving Prince Bernhard,<ref>{{Cite news |date=1976-03-06 |title=U.S. to Urge Pact in U.N. to Combat Business Bribes |language=en-US |work=The New York Times |url=https://www.nytimes.com/1976/03/06/archives/us-to-urge-pact-in-un-to-combat-corporate-bribes-promise-is-made-to.html |access-date=2022-06-08 |issn=0362-4331}}</ref> and in 2020 and 2021 due to the [[COVID-19 pandemic]].<ref name="Skelton 2022">{{cite web | last=Skelton | first=Charlie | title=Bilderberg reconvenes in person after two-year pandemic gap | website=the Guardian | date=June 4, 2022 | url=https://www.theguardian.com/world/2022/jun/04/bilderberg-reconvenes-in-person-after-two-year-pandemic-gap | access-date=April 26, 2023}}</ref> The 71st Bilderberg Meeting took place from June 12 to 15, 2025 in [[Stockholm]], [[Sweden]].<ref>{{Cite web |title=Homepage |url=https://www.bilderbergmeetings.org |access-date=2025-03-08 |website=www.bilderbergmeetings.org}}</ref>

      == Origin ==
      {{main|1954 Bilderberg Conference}}

      The first conference holds its name from the location where it was first held from the 29th to the 31st of May 1954; the Bilderberg Hotel (Hotel De Bilderberg) in [[Oosterbeek]], [[Netherlands]].<ref name="AtlasObscura">''Atlas Obscura'', "[https://www.atlasobscura.com/places/hotel-de-bilderberg Hotel de Bilderberg]"</ref><ref name="BBC News Magazine 2011">{{cite news|work=[[BBC News]]|title=Bilderberg mystery: Why do people believe in cabals?|date=7 June 2011|url=https://www.bbc.co.uk/news/magazine-13682082|access-date=14 June 2011|archive-url=https://web.archive.org/web/20110610015521/http://www.bbc.co.uk/news/magazine-13682082|archive-date=10 June 2011|url-status=live}}</ref> The hotel also gave its name to the attendees of the conference, the "Bilderbergers". The hotel is situated in a quiet location, approximately 7 kilometers west of the city of [[Arnhem]].<ref name="Gijswijt">Gijswijt, Thomas, W.,
      ''[https://books.google.com/books?id=EGFoDwAAQBAJ Informal Alliance: The Bilderberg Group and Transatlantic Relations during the Cold War, 1952–1968]'' (2018), Routledge. "The Hotel de Bilderberg was a medium-sized family-run hotel, chosen mainly for its quiet and remote location in the forests of the eastern Netherlands. It was not a particularly fancy hotel...but security was relatively easy to maintain since there was only one access road."</ref> It is owned and operated by the Bilderberg hotel chain, which runs 12 hotels and an event location in the Netherlands and one hotel in [[Germany]].<ref>[http://www.bilderberg.nl/uk/hotels/ Bilderberg hotels]</ref> At the time of the 1954 conference, it was a medium-sized family-run hotel.<ref name="Gijswijt"/>

      The conference was initiated by several people, including [[Polish people|Polish]] politician-in-exile [[Józef Retinger]] who, concerned about the growth of [[anti-Americanism]] in Western Europe, proposed an international conference at which leaders from European countries and the United States would be brought together with the aim of promoting [[Atlanticism]]—better understanding between the cultures of the United States and [[Western Europe]] to foster cooperation on political, economic, and defense issues.<ref name="something">{{cite web|url=https://bilderbergmeetings.org/index.html|title=About Bilderberg Meetings|website=Bilderberg Meetings the Official Website|access-date=Jul 12, 2018|archive-date=17 April 2020|archive-url=https://web.archive.org/web/20200417074019/https://www.bilderbergmeetings.org/index.html|url-status=dead}}</ref><ref name="hatch2">{{cite book|first=Alden|last=Hatch|year=1962 |title=HRH Prince Bernhard of the Netherlands: An authorized biography |chapter=The Hôtel de Bilderberg|publisher=Harrap|location=London|oclc=2359663 |quote=The idea was to get two people from each country who would give the conservative and liberal slant}}</ref>

      Retinger approached [[Prince Bernhard of Lippe|Prince Bernhard of the Netherlands]]<ref name="Yomiuri1991">{{cite news|work=[[Daily Yomiuri]]|date=8 December 1991|title=Japan–US Relations – Past, Present and Future|quote=Rockefeller: The idea (of creating the Trilateral Commission) was incorporated in a speech that I made in the spring of 1972 for the benefit of some industrial forums that the Chase held in different cities around Europe, … Then Zbig (Zbig Brzezinski) and I both attended a meeting of the Bilderberg Group … and was shot down in flames. There was very little enthusiasm for the idea. I think they felt that they had a very congenial group, and they didn't want to have it interfered with by another element that would—I don't know what they thought, but in any case, they were not in favor.}}</ref> who agreed to promote the idea, together with former [[Prime Minister of Belgium|Belgian prime minister]] [[Paul van Zeeland]], and the then head of [[Unilever]], [[Paul Rijkens]]. Bernhard in turn contacted [[Walter Bedell Smith]], the then head of the [[Central Intelligence Agency|CIA]], who asked [[Dwight Eisenhower|Eisenhower]] adviser [[Charles Douglas Jackson]] to deal with the suggestion.<ref name="Aubourg">{{cite journal |title=Organizing Atlanticism: the Bilderberg Group and the Atlantic Institute 1952–63 |author=Aubourg, Valerie |date=June 2003 |journal=Intelligence & National Security |pages=92–105 |volume=18 |issue=2 |doi=10.1080/02684520412331306760|s2cid=153892953 }}</ref> The guest list was to be drawn up by inviting two attendees from each nation, one of each to represent "conservative" and "liberal" points of view.<ref name="hatch2"/> Fifty delegates from 11 countries in Western Europe attended the first conference, along with 11 Americans.<ref name="rockefeller">{{cite book |last=Rockefeller |first=David |author-link=David Rockefeller |title=Memoirs |publisher=Random House |location=New York |year=2002 |page=[https://archive.org/details/davidrockefeller00davi/page/412 412] |isbn=978-0679405887 |url=https://archive.org/details/davidrockefeller00davi/page/412 }}</ref>

      The success of the meeting led the organizers to arrange an annual conference. A permanent steering committee was established with Retinger appointed as permanent secretary. As well as organizing the conference, the steering committee also maintained a register of attendee names and contact details with the aim of creating an informal network of individuals who could call upon one another in a private capacity.<ref name="hatch3">{{cite book |first=Alden |last=Hatch |year=1962 |title=HRH Prince Bernhard of the Netherlands: An authorized biography |chapter=The Hôtel de Bilderberg |publisher=Harrap |location=London |oclc=2359663 |quote=anybody who has ever been to a Bilderberg Conference should be able to feel that he can, in a private capacity, call on any former member he has met}}</ref> Conferences were held in [[France]], Germany, and [[Denmark]] over the following three years. In 1957, the first U.S. conference was held on [[St. Simons, Georgia|St. Simons Island, Georgia]], with $30,000 from the [[Ford Foundation]]. The foundation also supplied funding for the 1959 conference in [[Turkey]] and 1963 conference in France.<ref name="Aubourg" />

      == Participants ==
      {{Main|List of Bilderberg participants}}

      The participants are between 120 and 150 people, including [[political leaders]], experts from [[Private industry|industry]], [[finance]], [[NATO]], academia and the [[media (communication)|media]].<ref name="something"/> About two thirds of the participants come from Europe and the rest from North America; one third from [[politics]] and [[government]] and the rest from other fields.<ref name="something"/><ref name="BBC News Magazine 2011" /> Historically, attendee lists have been weighted toward bankers, politicians, directors of large businesses<ref name="Moorehead 1977">{{cite news |title=An exclusive club, perhaps without power, but certainly with influence: The Bilderberg group |author=Moorehead, Caroline |work=The Times |location =London |date=18 April 1977}}</ref> and board members from large publicly traded corporations.<ref name="prweb97" /> Heads of state, including former [[Monarchy of Spain|King]] [[Juan Carlos I of Spain]] and former [[Monarchy of the Netherlands|Queen]] [[Beatrix of the Netherlands]], have attended meetings.<ref name="prweb97">{{cite press release |archive-url=https://web.archive.org/web/20110430211149/http://www.prnewswire.de/cgi/release?id=42594 |archive-date=30 April 2011 |url=http://www.prnewswire.de/cgi/release?id=42594 |title=Bilderberg Meeting of 1997 Assembles |date=13 June 1997 |publisher=[[PR Newswire]]}}</ref><ref>{{cite news |title=The Bilderberg group |author=Oliver, Mark |date=4 June 2004 |work=The Guardian |url=https://www.theguardian.com/news/2004/jun/04/netnotes.markoliver |location=London}}</ref>  A source connected to the group told ''[[The Daily Telegraph]]'' in 2013 that others, whose names are not publicly issued, sometimes turn up "just for the day" at the group's meetings.<ref>[https://www.telegraph.co.uk/news/politics/10102168/Bilderberg-Group-No-conspiracy-just-the-most-influential-group-in-the-world.html "Bilderberg Group? No conspiracy, just the most influential group in the world"]. ''The Daily Telegraph'' (London). 6 June 2013. Retrieved 6 June 2013.</ref>

      The Swedish banker and industrialist [[Marcus Wallenberg Jr.]] was a member of the steering committee and attended the meeting twenty-two times from the 1950s to 1981, a year prior to his death. His grandson [[Marcus Wallenberg (born 1956)|Marcus Wallenberg]] has attended it eight times and his other grandson, [[Jacob Wallenberg]], seventeen times.<ref>{{cite web |last1=Karl |first1=Hellberg |title=Bilderberggruppen och Wallenberg bakom selekteringen av svenskt regeringsstyre sedan 1950-talet |url=https://newsvoice.se/2018/08/bilderberggruppen-wallenberg-svenska-regeringar/ |website=Newsvoice|date=11 August 2018 }}</ref>

      == Meetings ==
      {{Further|List of Bilderberg meetings}}

      == Activities and goals ==
      The group's original goal of promoting [[Atlanticism]], strengthening US-European relations, and preventing another world war has grown.  According to Andrew Kakabadse, the Bilderberg Group's theme is to "bolster a consensus around [[free market capitalism|free-market Western capitalism]] and its interests around the globe".<ref name="BBC News Magazine 2011" /> In 2001, [[Denis Healey]], a Bilderberg group founder and a steering committee member for 30 years, said, "To say we were striving for a [[One World Government|one-world government]] is exaggerated, but not wholly unfair. Those of us in Bilderberg felt we couldn't go on forever fighting one another for nothing and killing people and rendering millions homeless. So we felt that a single community throughout the world would be a good thing."<ref name="Ronson 2001">{{cite news |first=Jon |last=Ronson |title=Who pulls the strings? (part 3) |date=10 March 2001 |url=https://www.theguardian.com/books/2001/mar/10/extract1 |work=[[The Guardian]] |access-date=14 May 2009 |location=London}}</ref>

      According to the web page of the group, the meetings are conducted under the [[Chatham House Rule]], allowing the participants to use any information they gained during the meeting, but not to disclose the names of the speakers or any other participants. According to former chairman [[Étienne Davignon]] in 2011, a major attraction of Bilderberg group meetings is that they provide an opportunity for participants to speak and debate candidly and to find out what major figures really think, without the risk of off-the-cuff comments becoming fodder for controversy in the media.<ref name="The Economist 2011">{{cite news |url=https://www.economist.com/special-report/2011/01/22/the-worlds-water-coolers |title=A special report on global leaders |pages=12–14 |date=22 January 2011 |newspaper=The Economist}}</ref> A 2008 press release from the "American Friends of Bilderberg" stated that "Bilderberg's only activity is its annual Conference and that at the meetings, no resolutions were proposed, no votes taken, and no policy statements issued."<ref name="bwire">{{cite web| year = 2008| title = Bilderberg Announces 2008 Conference| work = businesswire.com| publisher = BusinessWire| url = http://www.businesswire.com/portal/site/google/?ndmViewId=news_view&newsId=20080605006246&newsLang=en| access-date =7 June 2008}}</ref> However, in November 2009, the group hosted a dinner meeting at the [[Château of Val-Duchesse]] in Brussels outside its annual conference to promote the candidacy of [[Herman Van Rompuy]] for [[President of the European Council]].<ref>{{cite news |title=EU Presidency candidate Herman Van Rompuy calls for new taxes |url=https://www.telegraph.co.uk/news/worldnews/europe/eu/6582837/EU-Presidency-candidate-Herman-Van-Rompuy-calls-for-new-taxes.html |archive-url=https://ghostarchive.org/archive/20220112/https://www.telegraph.co.uk/news/worldnews/europe/eu/6582837/EU-Presidency-candidate-Herman-Van-Rompuy-calls-for-new-taxes.html |archive-date=12 January 2022 |url-access=subscription |url-status=live |date=16 November 2009 |quote=during a secret dinner to promote his candidacy hosted by the elite Bilderberg Group |author=Waterfield, Bruno |location=London |work=The Daily Telegraph}}{{cbignore}}</ref>

      == Organizational structure ==
      Meetings are organized by a steering committee with two members from each of approximately 18 nations.<ref name="bbc05">{{cite news |title=Inside the secretive Bilderberg Group |date=29 September 2005 |work=[[BBC News]] |url=https://news.bbc.co.uk/2/hi/americas/4290944.stm |access-date=5 August 2008|archive-url=https://web.archive.org/web/20081229025714/http://news.bbc.co.uk/1/hi/world/americas/4290944.stm |archive-date=29 December 2008 |url-status=live}}</ref> Official posts include a chairman and an Honorary Secretary General.<ref name="prweb97" /> The group's rules do not contain a membership category but former participants receive the annual conference reports.<ref>[https://web.archive.org/web/20000302093537/http://www.schnews.org.uk/bilderberg/introduction.html Introduction p. 3] in ''Bilderberg meetings'', [[Schnews]], 1999</ref> The only category that exists is "member of the steering committee".<ref>{{cite web |url=http://www.europarl.europa.eu/sides/getAllAnswers.do?reference=P-2003-1370&language=EN |title=Parliamentary questions: Answer given by Mr Prodi on behalf of the Commission |date=15 May 2003 |publisher=[[European Parliament]]}}</ref> Besides the committee, there is a separate advisory group with overlapping membership.<ref name="iww">Entry for [[Conrad Black]], {{cite book |title=The International Who's Who |url=https://archive.org/details/internationalwho0000unse |url-access=registration |year=2000 |publisher=Europa Publications|isbn=9781857430509 }}</ref>

      Dutch economist [[Ernst van der Beugel]] became permanent secretary in 1960, upon Retinger's death. Prince Bernhard continued to serve as the meeting's chairman until 1976, the year of his involvement in the [[Lockheed bribery scandals|Lockheed affair]]. The position of Honorary American Secretary General has been held successively by [[Joseph E. Johnson (government official)|Joseph E. Johnson]] of the [[Carnegie Endowment for International Peace|Carnegie Endowment]]; [[William Bundy]] of [[Princeton University]]; [[Theodore L. Eliot Jr.]], former [[United States Ambassador to Afghanistan|U.S. ambassador to Afghanistan]]; and [[Casimir A. Yost]] of [[Georgetown University]]'s Institute for the Study of Diplomacy.<ref>{{cite web |url=http://www.dod.gov/pubs/foi/reading_room/824.pdf |archive-url=https://web.archive.org/web/20060519182704/http://www.dod.gov/pubs/foi/reading_room/824.pdf |archive-date=19 May 2006 |title=Bilderberg: List of Invitees |date=31 January 1996 |publisher=United States Department of Defense |access-date=6 June 2009}}</ref>

      According to James A. Bill, the "steering committee usually met twice a year to plan programs and to discuss the participant list".<ref>{{cite book|last1=Bill|first1=James A.|title=George Ball: Behind the Scenes in U.S. Foreign Policy|date=August 1998|publisher=Yale University Press|isbn=978-0300076462|page=53}}</ref>

      In 2002, in ''[[Them: Adventures with Extremists]]'', author [[Jon Ronson]] wrote that the group has a small central office in Holland which each year decides what country will host the forthcoming meeting. The host country then has to book an entire hotel for four days, plus arrange catering, transport and security. To fund this, the host solicits donations from sympathetic corporations such as [[Barclays]], [[Fiat Automobiles]], [[GlaxoSmithKline]], [[Heinz]], [[Nokia]] and [[Xerox]].<ref>{{cite book |last= Ronson |first= Jon| date=2015 |orig-year=First published 2002|title= Them: Adventures with Extremists  |location=London |publisher= Picador Classic |pages= 271–72 |isbn=978-1447275466 |author-link=Jon Ronson}}</ref>

