      '''Quantitative easing''' ('''QE''') is a [[monetary policy]] action where a [[central bank]] purchases predetermined amounts of [[government bond]]s, company shares, or other [[financial asset]]s ([[liquidity]]) in order to artificially stimulate economic activity.<ref>{{Cite web|url=https://www.bankofengland.co.uk/monetary-policy/quantitative-easing|title=Quantitative Easing|publisher=[[Bank of England]] }}</ref><ref>{{Cite journal |last=Koukouridis |first=Athanasios |date=April 9, 2025 |title=Bank Profitability in Times of Quantitative Easing: The Role of Central Bank Transparency |journal=Economies |volume=13 |issue=6 |page=161 |doi=10.3390/economies13060161 |doi-access=free }}</ref>  Quantitative easing is a novel form of monetary policy that began in Japan and came into wide application in the U.S. following the [[2008 financial crisis]].<ref>Michael Joyce, David Miles, Andrew Scott & Dimitri Vayanos, [https://www.jstor.org/stable/23324224?seq=1 Quantitative Easing and Unconventional Monetary Policy – An Introduction], ''The Economic Journal'', Vol. 122, No. 564 (November 2012), pp. F271-F288: "The most high-profile form of unconventional monetary policy has been Quantitative Easing (QE)."</ref><ref name=":1">{{Cite book|last=Oatley|first=Thomas|url=https://books.google.com/books?id=4GJoDwAAQBAJ|title=International Political Economy: Sixth Edition|date=2019|publisher=Routledge|isbn=978-1-351-03464-7|pages=369–370}}</ref> It attempts to mitigate economic recessions when [[inflation]] is very low or negative.<ref>{{Cite journal |last=Eggertsson |first=Gauti B. |date=2011 |title=What Fiscal Policy Is Effective at Zero Interest Rates? |url=https://www.jstor.org/stable/10.1086/657529 |journal=NBER Macroeconomics Annual |volume=25 |issue=1 |pages=59–112 |doi=10.1086/657529 |jstor=10.1086/657529 |issn=0889-3365}}</ref> [[Quantitative tightening]] does the opposite, where for monetary policy reasons, a central bank sells off some portion of its holdings of government bonds or other financial assets.

      Similar to conventional [[Open market operation|open-market operations]] used to implement monetary policy, a [[central bank]] implements quantitative easing by buying financial assets from commercial banks and other financial institutions, thus raising the prices of those financial assets and lowering their [[Yield (finance)|yield]], while simultaneously increasing the [[money supply]]. However, in contrast to conventional monetary policy, quantitative easing usually involves the purchase of riskier or longer-term assets (rather than short-term government bonds) of predetermined amounts at a large scale, over a pre-determined period of time.<ref name="McTeer">{{cite news|last=McTeer|first=Bob|date=23 December 2010|title=There's nothing wrong with the Fed printing money|work=Forbes|url=https://blogs.forbes.com/beltway/2010/12/23/theres-nothing-wrong-with-the-fed-printing-money/}}</ref><ref name="blogs.forbes.com">{{cite news|last=McTeer|first=Bob|date=26 August 2010|title=Quantitative easing is a toxic phrase for a routine policy|work=Forbes|url=https://blogs.forbes.com/beltway/2010/08/26/quantitative-easing-is-a-toxic-phrase-for-a-routine-policy/}}</ref>

      Central banks usually resort to quantitative easing when interest rates approach zero, such as in 2008 and 2020 for the U.S. and in 1999 for Japan.<ref>{{Cite web |last=Conte |first=Niccolo |date=2025-09-17 |title=Charted: U.S. Interest Rates Over Time (1954-2025) |url=https://www.visualcapitalist.com/charted-us-interest-rates-over-time/ |access-date=2025-12-17 |website=Visual Capitalist |language=en-US}}</ref><ref>{{Cite web |date=2025-11-28 |title=The Impact of Japan's Zero Interest Rate Policy |url=https://legalclarity.org/the-impact-of-japans-zero-interest-rate-policy/ |access-date=2025-12-17 |website=LegalClarity |language=en-US}}{{better source needed|date=February 2026|reason=apparent link spam}}</ref> Very low interest rates induce a [[liquidity trap]], a situation where people prefer to hold cash or very liquid assets, given the low returns on other financial assets. This makes it difficult for [[zero lower bound|interest rates to go below zero]]; monetary authorities may then use quantitative easing to stimulate the economy rather than trying to lower the interest rate. Quantitative easing can help bring the economy out of a [[economic recession|recession]]<ref>Joseph E. Gagnon, [https://www.piie.com/publications/policy-briefs/quantitative-easing-underappreciated-success Quantitative Easing: An Underappreciated Success], [[Peterson Institute for International Economics]], Policy Brief 16-4 (April 2016).</ref> and help ensure that inflation does not fall below the central bank's [[Inflation targeting|inflation target]].<ref>Ricardo Reis, "[http://personal.lse.ac.uk/reisr/papers/16-jh_qe.pdf Funding Quantitative Easing to Target Inflation]", in "Designing Resilient Monetary Policy Frameworks for the Future”, Proceedings of the Jackson Hole Economic Policy Symposium: Federal Reserve Bank of Kansas City, August 2016, pp. 423–478.</ref>

      The term quantitative easing was coined by economist [[Richard Werner]] in 1995.<ref>{{Cite web |title=Quantitative Easing and the Quantity Theory of Credit – Professor Werner |url=https://professorwerner.org/pubs/quantitative-easing-and-the-quantity-theory-of-credit/ |access-date=2025-12-17 |language=en-GB}}</ref> Since then, it has faced a range of criticisms. Economists argue that it can inflate asset bubbles, potentially worsening a recession rather than alleviating it.<ref>{{Cite web |last=Brilhante |first=Gerson |date=March 31, 2025 |title=The Limits And Contradictions Of Quantitative Easing In Monetary Cycles |ssrn=5193316 |url=https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5193316}}</ref> Others highlight QE's mixed side effects and risks: it may overshoot its goal by countering [[deflation]] too aggressively and fueling long-term inflation, or fail to stimulate growth if banks remain reluctant to lend and borrowers hesitant to borrow. QE has also been criticized for raising financial asset prices, and thereby contributing to economic inequality.<ref>{{Cite web|url=https://www.bankingobserver.com/articles/a-numbers-game-how-quantitative-easing-lifts-stock-prices|title=A numbers game: How quantitative easing lifts stock prices|publisher=Banking Observer|access-date=22 September 2022|archive-date=22 September 2022|archive-url=https://web.archive.org/web/20220922164508/https://www.bankingobserver.com/articles/a-numbers-game-how-quantitative-easing-lifts-stock-prices|url-status=dead}}</ref> Major central banks around the world, including the U.S., U.K., E.U., and Japan, have implemented quantitative easing following the 2008 global financial crisis and again in response to the [[COVID-19 pandemic]].<ref>{{Cite news|url=https://www.theglobeandmail.com/report-on-business/economy/an-uneasy-relationship-behind-response-to-financial-crash/article18293472/|title = An uneasy relationship behind response to financial crash|newspaper = The Globe and Mail|date = 27 April 2014|last1 = McKenna|first1 = Barrie}}</ref>

      == Process and benefits ==
      {{See also|Monetary policy}}
      Standard central bank monetary policies are usually enacted by buying or selling [[government bond]]s on the [[open market operations|open market]] to reach a desired target for the [[interbank interest rate]]. However, if a recession or depression continues even when a central bank has lowered interest rates targets to nearly zero, the central bank [[Zero lower bound problem|can no longer lower interest rates]] — a situation known as the [[liquidity trap]].<ref>{{Cite journal |last1=Grandmont |first1=Jean-Michel |last2=Laroque |first2=Guy |date=1976 |title=The Liquidity Trap |url=https://www.jstor.org/stable/1911386 |journal=Econometrica |volume=44 |issue=1 |pages=129–135 |doi=10.2307/1911386 |jstor=1911386 |issn=0012-9682}}</ref> The central bank may then attempt to stimulate the economy by implementing quantitative easing, that is, by buying financial assets without reference to interest rates. This policy is sometimes described as a last resort to stimulate the economy.<ref>{{cite news |title=Quantitative easing: A therapy of last resort |url=https://www.nytimes.com/2009/01/11/business/worldbusiness/11iht-views12.1.19248009.html |work=The New York Times |access-date=12 July 2010 |date=1 January 2009}}</ref><ref>{{cite news |title=Quantitative easing: last resort to get credit moving again |url=https://www.theguardian.com/business/2009/jan/29/question-and-answer-quantitative-easing |work=The Guardian |access-date=12 July 2010 |date=29 January 2009 |first=Heather |last=Stewart |location=London}}</ref>

      A central bank enacts quantitative easing by purchasing, regardless of interest rates, a predetermined ''quantity'' of bonds or other financial assets on financial markets from private financial institutions.<ref name="Bullard">{{cite web|url=https://www.stlouisfed.org/publications/regional-economist/january-2010/quantitative-easinguncharted-waters--for-monetary-policy|title=Quantitative Easing — Uncharted Waters for Monetary Policy|last=Bullard|first=James|date=January 2010|publisher=Federal Reserve Bank of St. Louis|access-date=26 July 2011}}</ref><ref name="bbcnews">{{cite news|url=http://news.bbc.co.uk/1/hi/business/7924506.stm|title=Q&A: Quantitative easing|date=9 March 2009|work=BBC|access-date=29 March 2009}}</ref> This action increases the [[excess reserves]] that banks hold. The goal of this policy is to ease financial conditions, increase [[market liquidity]], and encourage private bank lending.<ref>{{Cite journal |last1=Joyce |first1=Michael |last2=Miles |first2=David |last3=Scott |first3=Andrew |last4=Vayanos |first4=Dimitri |date=2012 |title=Quantitative Easing and Unconventional Monetary Policy — an Introduction |url=https://www.jstor.org/stable/23324224 |journal=The Economic Journal |volume=122 |issue=564 |pages=F271–F288 |doi=10.1111/j.1468-0297.2012.02551.x |jstor=23324224 |issn=0013-0133}}</ref>

      Quantitative easing affects the economy through several channels:<ref>{{Cite journal|last=Lerven|first=Frank van|date=2016|title=Quantitative Easing in the Eurozone: a One-Year Assessment|url=https://www.intereconomics.eu/|journal=Intereconomics|volume=2016|issue=4|pages=237–242|doi=10.1007/s10272-016-0608-9|hdl=10419/191169|s2cid=189843544 |hdl-access=free}}</ref> 
      ; Credit channel: By providing liquidity in the banking sector, QE makes it easier and cheaper for banks to extend loans to companies and households, thus stimulating credit growth. Additionally, if the central bank also purchases financial instruments that are riskier than government bonds (such as corporate bonds), it can also increase the price and lower the interest yield of these riskier assets.<ref>{{Cite book |last=Coppola |first=Frances |url=https://books.google.com/books?id=qsOlDwAAQBAJ&dq=Quantitative+easing+corporate+bonds+increase+the+price+and+lower+the+interest+yield&pg=PA15-IA1 |title=The Case For People's Quantitative Easing |date=2019-07-26 |publisher=John Wiley & Sons |isbn=978-1-5095-3132-5 |language=en}}</ref>
      ; Portfolio rebalancing: By enacting QE, the central bank withdraws an important part of the safe assets from the market onto its own balance sheet, which may result in private investors turning to other financial securities. Because of the relative lack of government bonds, investors are forced to "rebalance their portfolios" into other assets. Additionally, if the central bank also purchases financial instruments that are riskier than government bonds, it can also lower the interest yield of those assets (as those assets are more scarce in the market, and thus their prices go up correspondingly).<ref>{{Cite web|url=https://www.econstor.eu/bitstream/10419/180673/1/1027069444.pdf|title=Quantitative easing, portfolio rebalancing and credit growth: micro evidence from Germany}}</ref>
      ; Exchange rate: Because it increases the money supply and lowers the yield of financial assets, QE tends to depreciate a country's [[exchange rate]]s relative to other currencies, through the interest rate mechanism.<ref>Luca Dedola, Georgios Georgiadis, Johannes Gräb, Arnaud Mehl (21 October 2020) [https://voxeu.org/article/quantitative-easing-policies-and-exchange-rates "Quantitative easing policies and exchange rates"]. ''voxeu.org.'' Retrieved 18 December 2020.</ref> Lower interest rates lead to a [[capital outflow]] from a country, thereby reducing foreign demand for a country's money, leading to a weaker currency. This increases demand for exports, and directly benefits exporters and export industries in the country.<ref>{{Cite book  |url=https://books.google.com/books?id=NeLD4I-uBd4C&dq=Quantitative+easing+increase+exports&pg=PA64 |title=International Impacts of the Federal Reserve's Quantitative Easing Program: Hearing Before the Subcommittee on Monetary Policy and Trade of the Committee on Financial Services, U.S. House of Representatives, One Hundred Thirteenth Congress, Second Session, January 9, 2014 |date=2014 |publisher=U.S. Government Printing Office |language=en}}</ref>
      ; Fiscal effect: By lowering yields on sovereign bonds, QE makes it cheaper for governments to borrow on financial markets, which may empower the government to provide fiscal stimulus to the economy. Quantitative easing can be viewed as a debt refinancing operation of the "consolidated government" (the government including the central bank), whereby the consolidated government, via the central bank, retires government debt securities and refinances them into central bank reserves.<ref>{{Cite book |last=Rangeley |first=Max |url=https://books.google.com/books?id=VxkhEQAAQBAJ&dq=Quantitative+easing+cheaper+to+borrow&pg=PA15 |title=The Age of Debt Bubbles: An Analysis of Debt Crises, Asset Bubbles and Monetary Policy |date=2024 |publisher=Springer Nature |isbn=978-3-031-66473-1 |language=en}}</ref>
      ; Boosting asset prices: When a central bank buys government bonds from a pension fund, the pension fund, rather than hold on to this money, might invest it in financial assets, such as shares, that gives it a higher return. And when demand for financial assets is high, the value of these assets increases. This makes businesses and households holding shares wealthier – making them more likely to spend more, boosting economic activity.<ref>{{cite journal |last1=Cortes |first1=Gustavo S. |last2=Gao |first2=George P. |last3=Silva |first3=Felipe B. G. |last4=Song |first4=Zhaogang |date=2022 |title=Unconventional monetary policy and disaster risk: Evidence from the subprime and COVID–19 crises |journal=Journal of International Money and Finance |volume=122 |article-number=102543 |doi=10.1016/j.jimonfin.2021.102543 |pmid=34949899 |pmc=8677330 }}</ref>
      ; Signalling effect: Some economists argue that QE's main impact is due to its effect on the psychology of the markets, by signaling that the central bank will take extraordinary measures to facilitate economic recovery. For instance, it has been observed that most of the effect of QE in the Eurozone on bond yields happened between the date of the announcement of QE and the actual start of the purchases by the ECB.{{citation needed|date=June 2019}}

      == History ==

      The Bank of Japan introduced QE from March 19, 2001, until March 2006, after having introduced negative interest rates in 1999. Most western central banks adopted similar policies in the aftermath of the [[2008 financial crisis]].<ref>[https://www.msn.com/en-gb/news/world/bank-of-england-chief-attacks-peers-for-calling-quantitative-easing-an-addiction/ar-AAMZ79b Bank of England chief attacks peers for calling quantitative easing an ‘addiction’]. ''The Telegraph''. 5 August 2021. Retrieved 17 August 2021.</ref>

      === Precedents ===
      The methods behind QE had been implemented long before its creation. The US Federal Reserve belatedly implemented policies similar to the recent quantitative easing during the [[Great Depression]] of the 1930s.<ref>Hoover Institution, Economics Working Paper 14110, "Exiting from Low Interest Rates to Normality: An Historical Perspective", November 2014 [http://www.hoover.org/sites/default/files/14110_-_bordo_-_exiting_from_low_interest_rates_to_normality_-_an_historical_perspective.pdf Retrieved 10 March 2015.]</ref><ref>{{Cite web|url=https://www.aei.org/articles/the-30-year-fixed-mortgage-should-disappear/|title=The 30-year fixed mortgage should disappear |first=Edward J. |last=Pinto |work=American Enterprise Institute - AEI |publisher=American Enterprise Institute |date=27 April 2016}}</ref> Specifically, banks' excess reserves exceeded 6 percent in 1940, whereas they vanished during the entire postwar period until 2008.<ref>[https://ideas.repec.org/b/oxp/obooks/9780198807537.html Stefan Homburg (2017) ''A Study in Monetary Macroeconomics''], Oxford University Press, {{ISBN|978-0-19-880753-7}}.</ref> Despite this fact, many commentators called the scope of the Federal Reserve quantitative easing program after the 2008 crisis "unprecedented".<ref>Telegraph, Federal Reserve ends QE, 29 October 2014 [https://www.telegraph.co.uk/finance/economics/11196629/Federal-Reserve-ends-QE.html Retrieved 10 March 2015]</ref><ref>{{Cite news |url=https://money.cnn.com/2010/08/11/news/economy/economic_collapse_GDP_unemployment.fortune/index.htm |title=Is QE2 finally the economic collapse? |date=August 11, 2010 |publisher=Fortune (magazine)}}</ref><ref>The Heritage Foundation, "Is the Inflation Threat Real? Is it Imminent?" {{unfit|1=[https://web.archive.org/web/20150402203738/http://www.heritage.org/research/reports/2010/02/is-the-inflation-threat-real-is-it-imminent Retrieved 10 March 2015]}}</ref><ref>{{Cite report |url=https://www.jstor.org/stable/resrep29864 |title=What Is the U.S. Federal Reserve? |last1=McBride |first1=James |last2=Chatzky |first2=Andrew |last3=Sergie |first3=Mohammed Aly |date=2020 |publisher=Council on Foreign Relations}}</ref>

      === Japan (2001–2006) ===
      A policy termed "quantitative easing" (量的緩和, ''ryōteki kanwa'', from 量的 "quantitative" + 緩和 "easing")<ref>{{cite web|url=https://kotobank.jp/word/%E9%87%8F%E7%9A%84%E7%B7%A9%E5%92%8C-178938|title=量的緩和|website=kotobank.jp}}</ref> was first used by the [[Bank of Japan]] (BoJ) to fight domestic [[deflation]] in the [[Lost Decade (Japan)|early 2000s]].<ref>{{cite news|url=http://news.bbc.co.uk/2/hi/8517760.stm|title=Japan sets inflation goal in fight against deflation|date=16 February 2010|work=BBC News|access-date=4 April 2011}}</ref><ref>{{cite web |author=Mark Spiegel |title=FRBSF: Economic Letter—Quantitative Easing by the Bank of Japan (11/02/2001) |url=http://www.frbsf.org/publications/economics/letter/2001/el2001-31.html |publisher=[[Federal Reserve Bank of San Francisco]] |access-date=19 January 2009 |archive-date=14 May 2013 |archive-url=https://web.archive.org/web/20130514085420/http://www.frbsf.org/publications/economics/letter/2001/el2001-31.html |url-status=dead }}</ref> The BOJ had maintained short-term [[interest rates]] at close to zero since 1999. The Bank of Japan had for many years, and as late as February 2001, stated that "quantitative easing ... is not effective" and rejected its use for monetary policy.<ref>Hiroshi Fujiki et al., "[http://www.imes.boj.or.jp/english/publication/mes/2001/me19-1-4.pdf Monetary Policy under Zero Interest Rate: Viewpoints of Central Bank Economists] {{Webarchive|url=https://web.archive.org/web/20190121214341/http://www.imes.boj.or.jp/english/publication/mes/2001/me19-1-4.pdf |date=21 January 2019 }}", ''Monetary and Economic Studies'', February 2001, p. 98. Retrieved 9 August 2010.</ref>

      The Bank of Japan adopted quantitative easing on 19 March 2001.<ref name="IMES2002">Shirakawa, Masaaki, "[http://www.imes.boj.or.jp/english/publication/edps/2002/02-E-03.pdf One Year Under 'Quantitative Easing'] {{Webarchive|url=https://web.archive.org/web/20190121214326/http://www.imes.boj.or.jp/english/publication/edps/2002/02-E-03.pdf |date=21 January 2019 }}", Institute for Monetary and Economic Studies, Bank of Japan, 2002.</ref><ref name="boj.or.jp">Bank of Japan, "[http://www.boj.or.jp/en/type/release/zuiji/kako02/k010319a.htm New Procedures for Money Market Operations and Monetary Easing] {{Webarchive|url=https://web.archive.org/web/20090719220308/http://www.boj.or.jp/en/type/release/zuiji/kako02/k010319a.htm |date=19 July 2009 }}", 19 March 2001. Retrieved 9 August 2010.</ref> Under quantitative easing, the BOJ flooded commercial banks with excess [[liquidity]] to promote private lending, leaving them with large stocks of [[excess reserves]] and therefore little risk of a liquidity shortage.<ref>"[http://www.frbsf.org/publications/economics/letter/2004/el2004-33.html Easing Out of the Bank of Japan's Monetary Easing Policy] {{Webarchive|url=https://web.archive.org/web/20071218211204/http://frbsf.org/publications/economics/letter/2004/el2004-33.html |date=18 December 2007 }}" (2004–33, 19 November 2004). Federal Reserve Bank of San Francisco.</ref> The BOJ accomplished this by buying more government bonds than would be required to set the interest rate to zero. It later also bought [[Asset-backed security|asset-backed securities]] and [[Capital stock|equities]] and extended the terms of its [[commercial paper]]-purchasing operation.<ref>{{Cite web|url=http://europe.pimco.com/LeftNav/Viewpoints/2006/Masanao-+Quantitative+Easing.htm|archive-url=https://web.archive.org/web/20100726104941/http://europe.pimco.com/LeftNav/Viewpoints/2006/Masanao-+Quantitative+Easing.htm|url-status=dead|title=PIMCO/Tomoya Masanao interview|archive-date=26 July 2010}}</ref> The BOJ increased commercial bank current account balances from ¥5&nbsp;trillion to ¥35 trillion (approximately US$300 billion) over a four-year period starting in March 2001. The BOJ also tripled the quantity of long-term Japan government bonds it could purchase on a monthly basis.{{citation needed|date=November 2013}} However, the seven-fold increase notwithstanding, current account balances (essentially central bank reserves) being just one (usually relatively small) component of the liability side of a central bank's balance sheet (the main one being banknotes), the resulting peak increase in the BOJ's balance sheet was modest, compared to later actions by other central banks.{{citation needed|date=October 2019}} The Bank of Japan phased out the QE policy in March 2006.<ref>{{cite journal|author=Hiroshi Ugai|title=Effects of the Quantitative Easing Policy: A Survey of Empirical Analyses |journal=Bank of Japan Working Paper|date=July 2006|url=https://www.boj.or.jp/en/research/wps_rev/wps_2006/wp06e10.htm}}</ref>

      === After 2007 ===
      Following the 2008 financial crisis, policies similar to those undertaken by Japan were used by the United States, the United Kingdom, and the Eurozone. Quantitative easing was used by these countries because their risk-free short-term nominal interest rates (termed the [[federal funds rate]] in the US, or the [[official bank rate]] in the UK) were either at or close to zero. According to Thomas Oatley, "QE has been the central pillar of post-crisis economic policy."<ref name=":1" />

      During the peak of the 2008 financial crisis, the US Federal Reserve expanded its balance sheet dramatically by adding new assets and new liabilities without "sterilizing" these by corresponding subtractions. In the same period, the United Kingdom also used quantitative easing as an additional arm of its monetary policy to alleviate its [[financial crisis]].<ref>Alloway, Tracy, [http://ftalphaville.ft.com/blog/2008/11/10/18038/the-unthinkable-has-happened/ The Unthinkable Has Happened], [[ft.com]], 10 November 2008. Retrieved 9 August 2010.</ref><ref>[https://www.bloomberg.com/apps/news?pid=20601087&sid=aziecc.MkO28 'Bernanke-san' Signals Policy Shift, Evoking Japan Comparison], Bloomberg.com, 2 December 2008</ref><ref>[https://www.ft.com/content/2240b7ce-09ce-11de-add8-0000779fd2ac Bank pumps £75bn into economy], ft.com, 5 March 2009</ref>

