      *Ukraine and the World
      *[[Middle East]]
      *China
      *Russia
      {{div col end}}

      ==Participants==
      A list of 131 participants was published on the Bilderberg website.<ref name="Participants 2024"/> This list may not be complete, as a source connected to the Bilderberg group told ''[[The Daily Telegraph]]'' in 2013 that some attendees do not have their names publicized.<ref name="Telegraph">{{cite web | last=Holehouse | first=Matthew | title=Bilderberg Group? No conspiracy, just the most influential group in the world | website=The Telegraph | date=June 6, 2013 | url=https://www.telegraph.co.uk/news/politics/10102168/Bilderberg-Group-No-conspiracy-just-the-most-influential-group-in-the-world.html | access-date=May 22, 2023}}</ref> [[King Felipe VI]] of Spain was reported to have attended the meeting despite his name not being on the list.<ref name="n456">{{cite web | last=Skelton | first=Charlie | title=War, AI and more war: the 2024 Bilderberg agenda is sure to set off alarm bells | website=the Guardian | date=2024-06-01 | url=https://www.theguardian.com/world/article/2024/jun/01/bilderberg-meeting-spain | access-date=2024-06-01}}</ref><ref name="p617">{{cite web | title=El Club Bilderberg celebra su 70 aniversario en Madrid: 10 españoles en la lista de 130 invitados | website=MARCA | date=2024-05-31 | url=https://www.marca.com/tiramillas/television/2024/05/31/665981aa46163f39b18b45c2.html | language=es | access-date=2024-05-31}}</ref>

