      [[File:President Donald Trump greets Chinese President Xi Jinping before a bilateral meeting at the Gimhae International Airport terminal (54890669668).jpg|thumb| President [[Donald Trump]] and Chinese leader [[Xi Jinping]] at the [[APEC South Korea 2025|APEC Summit in Busan]], 2025|alt=Donald Trump and Xi Jinping stand next to each other, both wearing suits]]

      The relationship between the [[People's Republic of China]] (PRC) and the [[United States]] (US) has been complex and at times tense since the [[Proclamation of the People's Republic of China|establishment of the PRC]] on 1 October 1949 and subsequent [[Kuomintang's retreat to Taiwan|retreat of the government of the Republic of China to Taiwan]]. After the normalization of relations in the 1970s, the US–China relationship has been marked by persistent disputes including China's economic policies, the [[political status of Taiwan]] and [[territorial disputes in the South China Sea]]. Despite these tensions, the two nations have significant economic ties and are deeply interconnected, while also engaging in [[strategic competition]] on the global stage. As of 2025, the US and China are the world's [[List of countries by GDP (nominal)|largest and second-largest economies by nominal GDP]]. Collectively, they account for 44.2% of the global nominal GDP.

      The proclamation of the PRC in Beijing by the [[Chinese Communist Party]] (CCP) chairman [[Mao Zedong]] created a new [[Central People's Government of the People's Republic of China (1949–1954)|central government]] on the [[Mainland China|mainland]] in October 1949. Relations between the US and the new Chinese government quickly soured, culminating in direct conflict during the [[Korean War]]. The US-led [[United Nations Command|United Nations intervention]] was met with [[China in the Korean War|Chinese military involvement]], as China sent millions of soldiers to prevent a US-aligned presence on its border. For decades, the US did not formally recognize the PRC, instead maintaining diplomatic relations with the [[Republic of China]] (ROC) based in Taiwan, and as such blocked the PRC's entry into the United Nations. However, shifting geopolitical dynamics, including the [[Sino-Soviet split]], the winding down of the [[Vietnam War]], as well as of the [[Cultural Revolution]], paved the way for US President [[1972 visit by Richard Nixon to China|Richard Nixon's 1972 visit to China]], ultimately marking a sea change in US–China relations. On 1 January 1979, the US formally established diplomatic relations with the PRC and recognized it as the sole legitimate [[government of China]], while maintaining unofficial ties with Taiwan via the [[Taiwan Relations Act]], which endures as a major point of contention.

      Every U.S. president since Nixon has toured China during his term in office, with the exception of [[Jimmy Carter]] and [[Joe Biden]]. The two countries cooperated with each other against the Soviet Union. Following China's [[reform and opening up]], the trade between the two countries significantly increased  starting from the 1980s, and the US gave China the [[Most favoured nation|most favored nation]] designation in 2001. The [[Presidency of Barack Obama|Obama administration]] signed a record number of bilateral agreements with China, particularly regarding climate change, though its [[East Asian foreign policy of the Obama administration|Pivot to Asia]] created diplomatic friction.

      Relations worsened during the 2010s over concerns including China's [[Territorial disputes in the South China Sea#Chinese policies|militarization of the South China Sea]] and [[Chinese espionage in the United States]],<ref name="bbc._WhyU">{{Cite news |title=Why US-China relations are at their lowest point in decades |work=BBC News |date=24 July 2020 |first=Barbara |last=Plett Usher |author-link=Barbara Plett Usher |access-date=28 July 2021 |url=https://www.bbc.com/news/world-us-canada-53517439}}</ref><ref>{{Cite news |url=https://www.aljazeera.com/blogs/asia/2019/05/china-trade-war-sino-american-ties-torn-brick-brick-190512132227395.html |title=China-US trade war: Sino-American ties being torn down brick by brick |first=Adrian |last=Brown |date=12 May 2019 |website=Al Jazeera English |access-date=18 August 2019 |archive-date=4 September 2019 |archive-url=https://web.archive.org/web/20190904140940/https://www.aljazeera.com/blogs/asia/2019/05/china-trade-war-sino-american-ties-torn-brick-brick-190512132227395.html |url-status=dead |author-link=Adrian Brown (journalist)}}</ref><ref>{{Cite news |url=https://www.latimes.com/politics/la-na-pol-us-china-trade-stalemate-20190531-story.html |title=For the U.S. and China, it's not a trade war anymore — it's something worse |date=31 May 2019 |website=Los Angeles Times |first=Don |last=Lee |access-date=18 August 2019 |archive-date=16 October 2021 |archive-url=https://web.archive.org/web/20211016004818/https://www.latimes.com/politics/la-na-pol-us-china-trade-stalemate-20190531-story.html |url-status=live}}</ref> leading observers to speculate a [[Second Cold War#Usage in the context of China–United States tensions|Second Cold War]] between the two powers.<ref>{{Cite news |last=Luce |first=Edward |author-link=Edward Luce |date=19 July 2019 |title=Getting acclimatised to the US-China cold war |url=https://www.ft.com/content/a3062586-a9ac-11e9-984c-fac8325aaa04 |url-status=live |archive-url=https://archive.today/20220329041503/https://www.ft.com/content/a3062586-a9ac-11e9-984c-fac8325aaa04 |archive-date=29 March 2022 |access-date=18 August 2019 |website=[[Financial Times]]}}</ref><ref>{{Cite news |last=Lee |first=Jeong-ho |date=14 August 2019 |title=Is China-US cold war inevitable? Chinese analysts say it can't be ruled out |url=https://www.scmp.com/news/china/diplomacy/article/3022587/china-us-cold-war-inevitable-chinese-analysts-say-it-cant-be |url-status=live |archive-url=https://web.archive.org/web/20190818082749/https://www.scmp.com/news/china/diplomacy/article/3022587/china-us-cold-war-inevitable-chinese-analysts-say-it-cant-be |archive-date=18 August 2019 |access-date=18 August 2019 |website=South China Morning Post}}</ref> In 2018, President [[Donald Trump]] launched a [[China–United States trade war|trade war with China]]. The relationship further deteriorated during the [[COVID-19 pandemic]]. In January 2021, the US officially classified the Chinese government's treatment of the [[Uyghurs]] in Xinjiang [[Persecution of Uyghurs in China#Genocide|as a genocide]].<ref name="Bernstein-2021" /> Tensions remained high during the [[presidency of Joe Biden]] from 2021. [[Foreign policy of the Biden administration#China|His foreign policy]] prioritized strategic competition with China,<ref>{{cite news|url=https://www.reuters.com/world/un-biden-will-try-move-past-afghanistan-with-climate-china-focus-2021-09-21/|title=At U.N., Biden promises 'relentless diplomacy,' not Cold War|first1=Trevor|last1=Hunnicutt|first2=Steve|last2=Holland|publisher=Reuters|date=21 September 2021|access-date=21 September 2021|archive-date=22 September 2021|archive-url=https://web.archive.org/web/20210922222113/https://www.reuters.com/world/un-biden-will-try-move-past-afghanistan-with-climate-china-focus-2021-09-21/|url-status=live}}</ref><ref>{{cite news |url=https://www.thedailybeast.com/white-house-pushes-us-officials-to-criticize-china-for-coronavirus-cover-up |title=White House Pushes U.S. Officials to Criticize China For Coronavirus 'Cover-Up' |work=The Daily Beast |date=21 March 2021 |first=Erin |last=Banco |access-date=21 September 2021|archive-date=22 January 2021|archive-url=https://web.archive.org/web/20210122144352/https://www.thedailybeast.com/white-house-pushes-us-officials-to-criticize-china-for-coronavirus-cover-up|url-status=live}}</ref> imposed [[United States New Export Controls on Advanced Computing and Semiconductors to China|export controls on semiconductors to China]],<ref>{{Cite news|last=Swanson|first=Ana|date=7 October 2022|title=Biden Administration Clamps Down on China's Access to Chip Technology |work=The New York Times|url=https://www.nytimes.com/2022/10/07/business/economy/biden-chip-technology.html|access-date=11 March 2023|issn=0362-4331|archive-date=13 October 2023|archive-url=https://web.archive.org/web/20231013150715/https://www.nytimes.com/2022/10/07/business/economy/biden-chip-technology.html|url-status=live}}</ref> boosted regional alliances against China, and expanded support for Taiwan.<ref name="Lau-2021" /><ref>{{Cite web |last1=Bush |first1=Richard C. |last2=Hass |first2=Ryan |date=1 December 2021 |title=The Biden administration is right to include Taiwan in the Summit for Democracy |author1-link=Richard C. Bush |author2-link=Ryan Hass |url=https://www.brookings.edu/blog/order-from-chaos/2021/12/01/the-biden-administration-is-right-to-include-taiwan-in-the-summit-for-democracy/|access-date=28 April 2023|website=Brookings}}</ref> However, the administration also emphasized that the US sought "competition, not conflict".<ref>{{Cite news |last=Wong |first=Tessa |date=14 November 2022 |title=Xi Biden meeting: US leader promises 'no new Cold War' with China |url=https://www.bbc.com/news/world-asia-63628454 |url-status=live |archive-url=https://web.archive.org/web/20231004050514/https://www.bbc.com/news/world-asia-63628454 |archive-date=4 October 2023 |access-date=11 March 2023 |work=BBC News}}</ref> The [[Second presidency of Donald Trump|second Trump administration]]'s relations with China has been marked by inconsistency. From 2025, the administration sharply escalated the trade war with China, [[Tariffs in the second Trump administration|raising tariffs]], prior to negotiating with China on a reduction in the tariff rate. The administration also downplayed ideological and political conflict, instead focusing the relationship towards economic competition.<ref>{{Cite web |last=Cheng |first=Jonathan |date=6 December 2025 |title=Trump's National-Security Strategy Softens Language on China |url=https://www.wsj.com/world/china/trumps-national-security-strategy-softens-language-on-china-f121ddb3 |access-date=6 December 2025 |website=The Wall Street Journal}}</ref>

      ==History==
      {{Main|History of China–United States relations}}

      The [[China|People's Republic of China]] (PRC) was founded on 1 October 1949.

      ===Korean War===
      {{See also|Korean War}}
      On 25 June 1950, the China-aligned state of [[North Korea]] invaded US-aligned [[South Korea]].<ref name="Chen-1992">{{Cite journal|last=Chen|first=Jian|date=1992|title=China's Changing Aims during the Korean War, 1950—1951|url=https://www.jstor.org/stable/23613365|journal=The Journal of American-East Asian Relations|volume=1|issue=1|pages=8–41|jstor=23613365 |author-link=Chen Jian (academic) |issn=1058-3947 |archive-date=9 January 2024|archive-url=https://web.archive.org/web/20240109153552/https://www.jstor.org/stable/23613365|url-status=live}}</ref> In response, the [[United Nations Security Council]] passed [[United Nations Security Council Resolution 82|Resolution 82]], which authorized military action against North Korea. Although the [[Soviet Union]] had veto power, at the time [[Soviet boycott of the United Nations|it was boycotting the UN Security Council]] over the UN's recognition of the [[Taiwan|ROC]] instead of the PRC as the representative of China.<ref>{{Cite web|url=https://www.britannica.com/topic/United-Nations-Security-Council/History|title=United Nations Security Council – Cold War, Peacekeeping, Veto Power |website=Britannica |access-date=29 September 2023|archive-date=12 May 2021|archive-url=https://web.archive.org/web/20210512213111/https://www.britannica.com/topic/United-Nations-Security-Council/History|url-status=live}}</ref>
       
      Initially, the US government saw Chinese intervention as unlikely. The People's Republic was barely a year old and it appeared that, if China was going to engage in warfare, it would be in the [[Kuomintang]]-controlled Taiwan, not Korea.<ref name="Rawnsley 2009 285–315">{{Cite journal |last=Rawnsley |first=Gary D. |date=2009 |title='The Great Movement to Resist America and Assist Korea': how Beijing sold the Korean War |author-link=Gary D. Rawnsley |url=https://www.jstor.org/stable/26000394|journal=Media, War & Conflict|volume=2|issue=3|pages=285–315|doi=10.1177/1750635209345186|jstor=26000394|s2cid=143193818|issn=1750-6352 |archive-date=28 January 2024|archive-url=https://web.archive.org/web/20240128121855/https://www.jstor.org/stable/26000394|url-status=live|url-access=subscription}}</ref> The US was opposed to the PRC's interests in Taiwan and, within two days of North Korea invading the South, US forces were deployed to the [[Taiwan Strait]].<ref>{{Cite web |date=21 June 2011 |title=Chinese intervention in Korean War |last=Kim |first=Yun-sik |url=https://www.koreatimes.co.kr/www/nation/2024/01/160_89323.html|access-date=26 January 2024|website=Korea Times |archive-date=26 January 2024|archive-url=https://web.archive.org/web/20240126043700/https://www.koreatimes.co.kr/www/nation/2024/01/160_89323.html|url-status=live}}</ref>
       
      After their defeat in the [[Chinese Civil War]], parts of the [[Kuomintang in Burma|ROC army had retreated to Burma]].<ref name=":Han">{{Cite book|last=Han|first=Enze|title=The Ripple Effect: China's Complex Presence in Southeast Asia|date=2024|publisher=[[Oxford University Press]]|isbn=978-0-19-769659-0|location=New York, NY |page=65}}</ref> The US supported these ROC forces with the hope that they would harass the PRC from the [[Southwestern China|southwest]], thereby diverting Chinese resources from the Korean War.<ref name=":Han" />
       
      It seemed to the new Chinese leadership that stopping American encroachment into Asia was an important issue. In a speech to the [[Politburo of the Chinese Communist Party]] in August 1950, Chairman [[Mao Zedong]] stated, "if the American imperialists are victorious, they will become dizzy with success, and then be in a position to threaten us."<ref>{{Cite journal |last=Morris-Suzuki |first=Tessa |date=2015 |title=Prisoner Number 600,001: Rethinking Japan, China, and the Korean War 1950–1953 |author-link=Tessa Morris-Suzuki |url=https://www.jstor.org/stable/43553591|journal=The Journal of Asian Studies|volume=74|issue=2|pages=411–432|doi=10.1017/S0021911814002253|jstor=43553591|issn=0021-9118 |archive-date=26 January 2024|archive-url=https://web.archive.org/web/20240126063227/https://www.jstor.org/stable/43553591|url-status=live|url-access=subscription}}</ref> PRC Premier and Foreign Minister [[Zhou Enlai]] echoed this sentiment in a speech in September: "the Chinese people can never tolerate foreign invasion, nor allow the imperialist to invade our neighbour at will without response".<ref name="Rawnsley 2009 285–315"/> Chinese leadership could not tolerate an American-occupied state directly on its border:<ref>{{cite journal |first1=Hao |last1=Yufan |first2=Zhai |last2=Zhihai |title=China's Decision to Enter the Korean War: History Revisited |journal=[[The China Quarterly]] |date=1990 |volume=121 |pages=94–115 |doi=10.1017/S0305741000013527 |citeseerx=10.1.1.695.5440 |url=https://citeseerx.ist.psu.edu/viewdoc/download?doi=10.1.1.695.5440&rep=rep1&type=pdf |archive-url=https://web.archive.org/web/20211210221049/https://citeseerx.ist.psu.edu/viewdoc/download?doi=10.1.1.695.5440&rep=rep1&type=pdf |archive-date=10 December 2021}}</ref> Zhou Enlai warned that China would intervene in the war on national security grounds; this warning was dismissed by US President [[Harry S. Truman]].<ref>{{cite book|last=Stokesbury|first=James L. |title=A Short History of the Korean War|publisher=Harper Perennial|year=1990|isbn=978-0688095130|location=New York|page=83}}</ref><ref>
      {{cite book|last=Offner|first=Arnold A.|title=Another Such Victory: President Truman and the Cold War, 1945–1953|publisher=Stanford University Press|year=2002|isbn=978-0804747745 |author-link=Arnold A. Offner |page=390}}</ref>
       
      On 30 September 1950, the UN offensive under the direction of the US crossed the [[38th parallel north|38th parallel]] into North Korea.<ref>{{Cite web|last1=Lee|first1=Michael|last2=Cho|first2=Jung-woo|date=14 September 2023|title=Incheon landing was turning point for war, nation and world|url=https://koreajoongangdaily.joins.com/news/2023-09-14/national/diplomacy/Incheon-landing-was-turning-point-for-war-nation-and-world/1869467|access-date=26 January 2024|website=Korea JoongAng Daily}}</ref>  [[Kim Il Sung|Kim Il-Sung]] held an emergency meeting with Chinese officials, appealing for their urgent entry into the conflict.<ref name="Chen-1992"/> The UN authorized the reunification of Korea, meaning that the entire peninsula could fall into US control.<ref>{{cite journal |first=James I. |last=Matray |title=Truman's Plan for Victory: National Self-Determination and the Thirty-Eighth Parallel Decision in Korea |journal=The Journal of American History |volume=66 |issue=2 |pages=314–333 |date=1979 |url=https://www.jstor.org/stable/1900879 |doi=10.2307/1900879 |jstor=1900879 }}</ref> On 19 October 1950, Chinese forces crossed into North Korea.<ref>{{Cite web|last=Lendon|first=Brad|date=25 June 2020|title=The U.S. Army once ruled Pyongyang and 5 other things you might not know about the Korean War|url=https://www.cnn.com/2020/06/24/asia/korean-war-70th-anniversary-intl-hnk/index.html|access-date=26 January 2024|website=CNN |archive-date=26 January 2024|archive-url=https://web.archive.org/web/20240126063225/https://www.cnn.com/2020/06/24/asia/korean-war-70th-anniversary-intl-hnk/index.html|url-status=live}}</ref>
       
      In response to the PRC's entry into the conflict, the US froze all Chinese assets in America and banned American citizens from traveling to the PRC.{{sfn|Li|2024a|p=50}} The PRC seized all American assets and properties<ref>{{cite journal |first=Charles Ford |last=Redick |title=The Jurisprudence of the Foreign Claims Settlement Commission: Chinese Claims |journal=American Journal of International Law |volume=67 |issue=4 |date=1973 |pages=728–740 |doi=10.2307/2198570 |jstor=2198570 }}</ref> and began efforts to remove American cultural influence from China, including by nationalizing cultural institutions affiliated with the US.{{sfn|Li|2024a|p=3}}
       
      In late October 1950, China began its intervention with the [[Battle of Onjong]]. During the [[Battle of the Ch'ongch'on River]], the [[People's Volunteer Army]] outflanked the [[United Nations Forces in the Korean War|UN forces]], leading to the defeat of the [[US Eighth Army]].<ref>{{cite book|last1=Cohen|first1=Eliot A. |last2=Gooch|first2=John|title=Military Misfortunes: The Anatomy of Failure in War|publisher=Free Press|year=2005|pages=165–195 |author-link=Eliot A. Cohen |isbn=978-0-7432-8082-2}}</ref> A ceasefire presented by the UN to the PRC shortly after Ch'ongch'on River, on 11 December it was rejected by the Chinese, who were now convinced of their ability to defeat the UN forces, and wanted to demonstrate China's military power by driving them out of Korea altogether.<ref>{{citation|last=Zhang|first=Shu Guang|title=Mao's Military Romanticism: China and the Korean War, 1950–1953|pages=119–126|year=1995|location=Lawrence, Kansas|publisher=[[University Press of Kansas]]|isbn=0-7006-0723-4}}</ref><ref>{{citation
      | last       = Alexander
      | first      = Bevin R.
      | author-link = Bevin Alexander
      | year       = 1986
      | title      = Korea: The First War We Lost
      | publisher  = Hippocrene Books, Inc
      | location   = New York
      | isbn       = 978-0-87052-135-5
      | pages = 371–376
      }}</ref> The Chinese achieved further victory at the [[Third Battle of Seoul]] and the [[Battle of Hoengsong]], but UN forces recovered, pushing the front back to lands around the 38th parallel by July. A stalemate followed.<ref>Birtle, Andrew James (2000). [https://www.google.com/books/edition/The_Korean_War/sEZyAAAAMAAJ ''The Korean War: Years of Stalemate, July 1951–July 1953'']. US Army Center for Military History.</ref> Even though the U.S. Air Force would spend the entire war with total air supremacy, the strategic impasse ultimately lasted until the [[Korean Armistice Agreement]] that ended the fighting was signed on 27 July 1953. Since then, a [[Division of Korea|divided Korea]] has continued to feature in U.S.-China relations, with large American forces still stationed in the South.<ref>{{Cite journal |first=James I. |last=Matray |title=Beijing and the Paper Tiger: The Impact of the Korean War on Sino-American Relations |journal=International Journal of Korean Studies |volume=15 |number=1 |date=2011 |pages=155–186 |url=https://icks.org/data/ijks/1483321954_add_file_8.pdf}}</ref>
       
      In 1952, in the midst of the Korean War, the American army surveyed Chinese [[Prisoner of war|prisoners of war]] (POWs) asking them why they believed the PRC was involved in the conflict. Of 238 respondents, 60% agreed it was for the defense of China against the US, while only 17% said it was to defend North Korea.<ref name="Rawnsley 2009 285–315"/><ref>"Beliefs of Enemy Soldiers about the Korean War". International Public Opinion Research Inc. and Operations Research Office at Johns Hopkins University (1952) p. 53.</ref>

      ===Vietnam War===
      {{Main|Vietnam War}}
       
      The People's Republic of China provided resources and training to [[North Vietnam]], and in the summer of 1962, Mao agreed to supply Hanoi with 90,000 rifles and guns free of charge. After the launch of America's [[Operation Rolling Thunder]] in 1965, China sent anti-aircraft units and engineering battalions to North Vietnam to repair the damage caused by American bombing, rebuild roads and railroads, and perform other engineering work, freeing additional hundreds of thousands [[People's Army of Vietnam|North Vietnamese Army]] units for combat against American forces supporting [[South Vietnam]].<ref>{{cite journal |first=Xiaorong |last=Han |title=Spoiled guests or dedicated patriots? The Chinese in North Vietnam, 1954–1978 |journal=[[International Journal of Asian Studies]] |volume=6 |issue=1 |date=2009 |pages=1–36 |doi=10.1017/S1479591409000011}}</ref><ref>{{cite journal |author=Chen Jian |title=China's Involvement in the Vietnam War, 1964–69 |journal=The China Quarterly |volume=142 |date=1995 |pages=356–387 |doi=10.1017/S0305741000034974 |s2cid=154489963 }}</ref>
       
      The Chinese presence in North Vietnam was well known to US officials, which contributed to President [[Lyndon B. Johnson]] and Secretary of Defense [[Robert McNamara]]'s decision not to invade North Vietnam, favoring a strategy of supporting South Vietnam in defending itself instead. The possibility of direct [[China in the Vietnam War|Chinese intervention]] was also ambiguous throughout the course of the war. Mao Zedong reportedly told journalist [[Edgar Snow]] in 1965 that China had no intention of fighting to save the Hanoi regime and would not engage the U.S. military unless it crossed into Chinese territory. US troops ultimately exited Vietnam as domestic opposition to American deployment in Vietnam increased, ending US involvement in the Vietnam War.<ref>{{cite book |first=Kwan Ha |last=Yim |title=China & the US: 1964–72 |date=1975 |pages=57–82 |publisher=[[Facts on File]] |isbn=978-0-87196-207-2}}</ref><ref>{{cite journal |first=Frank E. |last=Rogers |title=Sino-American Relations and the Vietnam War, 1964–66 |journal=The China Quarterly |volume=66 |date=1976 |pages=293–314 |doi=10.1017/S0305741000033695 |url=http://www3.nccu.edu.tw/~lorenzo/Rogers%20Sino%20American%20Vietnam.pdf |archive-url=https://web.archive.org/web/20221210160007/http://www3.nccu.edu.tw/~lorenzo/Rogers%20Sino%20American%20Vietnam.pdf |archive-date=10 December 2022 }}</ref>
       
      ===Freezing of relations (1949–1971)===
      {{see also|PRC-US Ambassadorial Talks}}
      Between 1949 and 1971, US–China relations were uniformly hostile, with frequent propaganda attacks in both directions. At the [[1954 Geneva Conference]], US Secretary of State [[John Foster Dulles]] forbade any contact with the Chinese delegation, refusing to shake hands with Zhou Enlai, the lead Chinese negotiator.<ref>{{cite journal |last=Immerman |first=Richard H. |author-link=Richard H. Immerman |title=The United States and the Geneva Conference of 1954: A New Look |journal=Diplomatic History |volume=14 |issue=1 |date=1990 |pages=43–66 |url=https://www.academia.edu/68823703 |doi=10.1111/j.1467-7709.1990.tb00075.x}}</ref> Relations deteriorated further under [[Foreign policy of the John F. Kennedy administration#China|President John F. Kennedy]] (1961–1963).<ref>{{cite journal |first=Nicholas Anthony |last=Autiello |title=Taming the Wild Dragon: John F. Kennedy and the Republic of China, 1961–63 |journal=[[Cold War History (journal)|Cold War History]] |date=2019 |volume=21 |issue=1 |pages=71–89 |doi=10.1080/14682745.2018.1550077}} [https://issforum.org/reviews/PDF/AR955.pdf Online review]. {{Webarchive|url=https://web.archive.org/web/20200603080939/https://issforum.org/reviews/PDF/AR955.pdf|date=3 June 2020}}.</ref><ref>{{cite journal |first=Noam |last=Kochavi |title=Kennedy, China, and the Tragedy of No Chance |journal=Journal of American-East Asian Relations |volume=7 |issue=1–2 |date=1998 |pages=107–116 |url=https://www.jstor.org/stable/23613311 |doi=10.1163/187656198X00072 |jstor=23613311 |url-access=subscription }}</ref> Before the [[Cuban Missile Crisis]], policymakers in Washington were uncertain whether or not China would break with the Soviet Union on the basis of ideology, national ambitions, and readiness for a role in guiding communist activities in many countries. New insight came with the [[Sino-Indian War|Sino-Indian border war]] in November 1962 and Beijing's response to the Cuban Missile Crisis. Kennedy administration officials concluded that China was more militant and more dangerous than the Soviet Union, making better relations with Moscow desirable, with both nations trying to contain Chinese ambitions. Diplomatic recognition of China remained out of the question, as a crucial veto power on the UN Security Council was held by America's ally on Taiwan. The US continued to work to prevent the PRC from taking China's seat in the [[United Nations]] and encouraged its allies not to deal with the PRC. The United States placed an embargo on trading with the PRC, and encouraged allies to follow it.<ref>{{cite journal |first=Sean M. |last=Turner |title='A Rather Climactic Period': The Sino–Soviet Dispute and Perceptions of the China Threat in the Kennedy Administration |journal=Diplomacy & Statecraft |volume=22 |issue=2 |date=2011 |pages=261–280 |doi=10.1080/09592296.2011.576538}}</ref>
       
      The [[596 (nuclear test)|PRC developed nuclear weapons]] in 1964 and, as later declassified documents revealed, President Johnson considered preemptive attacks to halt its nuclear program. He ultimately decided the measure carried too much risk, and it was abandoned. Instead, Johnson looked for ways to improve relations. The American public seemed more open to the idea of expanding contacts with China, such as the relaxation of the trade embargo. But the War in Vietnam was raging, with China aiding North Vietnam. Mao's [[Great Leap Forward]] had failed in its goal to properly industrialize China and [[Great Chinese Famine|sparked a famine]], and his [[Cultural Revolution]] exercised hostility to the US. In the end, Johnson made no move to change the standoff.<ref>{{cite journal |first=Victor S. |last=Kaufman |title=A Response to Chaos: The United States, the Great Leap Forward, and the Cultural Revolution, 1961–1968 |journal=[[Journal of American-East Asian Relations]] |volume=7 |issue=1–2 |date=1998 |pages=73–92 |url=https://www.jstor.org/stable/23613308 |url-status=live |archive-url=https://web.archive.org/web/20200603092529/https://www.jstor.org/stable/23613308 |archive-date=3 June 2020 |doi=10.1163/187656198x00045 |jstor=23613308 }}.</ref>
       
      Despite official non-recognition, the United States and the People's Republic of China held 136 meetings at the ambassadorial level beginning in 1954 and continuing until 1970, first in [[Geneva]] and in 1958–1970 in [[Warsaw]].<ref>Goldstein, Steven M. (2001). "Dialogue of the Deaf?: The Sino-American Ambassadorial-Level Talks, 1955–1970". In {{cite book|editor1=Robert S. Ross|editor2=Changbin Jiang|title=Re-examining the Cold War: U.S.-China Diplomacy, 1954–1973|date=2001 |url=https://books.google.com/books?id=LUcbNCUoWSMC&pg=PA200 |publisher=Harvard University Asia Center|pages=200–237|isbn=9780674005266 |editor1-link=Robert S. Ross}}</ref>
       
      The Cultural Revolution brought about near-complete isolation of China from the outside world and vocal denunciations of both [[American imperialism|US imperialism]] and [[Revisionism (Marxism)|Soviet revisionism]].
       
      Beginning in 1967, the [[Foreign Claims Settlement Commission]] established the China Claims Program, in which American citizens could denominate the sum total of their lost assets and property following the Communist seizure of foreign property in 1950. American companies were reluctant to invest in China despite (future [[Paramount leader|top leader]]) [[Deng Xiaoping]]'s reassurances of a stable business environment.<ref>Hollie, Pamela G. (1 October 1979). "Thaw in China-U.S. Ties May Unfreeze '49 Assets". ''The New York Times''. p. D1.</ref>
       
      ===Rapprochement (1968–1972)===
      {{See also|1972 visit by Richard Nixon to China}}
      The end of the 1960s brought a period of transformation. For China, when American President Johnson decided to wind down the Vietnam War in 1968, it gave China the impression that the U.S. had no interest in expanding throughout the Asia-Pacific anymore. Meanwhile, relations with the USSR rapidly worsened. This gave [[Richard Nixon]] - running for president in 1968 - the idea of using that rivalry to improve Washington's relations with Moscow and Beijing, while each rival would cut back support for Hanoi.<ref>Goh, Evelyn (2005). "Nixon, Kissinger, and the 'Soviet Card' in the U.S. Opening to China, 1971–1974". ''[[Diplomatic History (journal)|Diplomatic History]]'' 29.3: 475–502. [http://www3.nccu.edu.tw/~lorenzo/Goh%20Soviet%20Card%20Opening%20to%20China.pdf online] {{Webarchive|url=https://web.archive.org/web/20220302163757/http://www3.nccu.edu.tw/~lorenzo/Goh%20Soviet%20Card%20Opening%20to%20China.pdf|date=2 March 2022}}</ref>
       
      This became an especially important concern for the People's Republic of China after the [[Sino-Soviet border conflict]] of 1969. The PRC was diplomatically isolated and the leadership came to believe that improved relations with the US would be a useful counterbalance to the Soviet threat. [[Zhou Enlai]], the [[Premier of the People's Republic of China|Premier of China]], was at the forefront of this effort with the committed backing of Mao Zedong, Chairman of the Chinese Communist Party (CCP). In 1969, the US initiated measures to relax trade restrictions and other impediments to bilateral contact, to which China responded. However, this rapprochement process was stalled by the Vietnam War, where China was supporting the enemies of the US. Communication between Chinese and American leaders, however, was conducted through [[Socialist Republic of Romania|Romania]], [[Pakistan]]<ref>{{cite web|url=https://www.nixonfoundation.org/exhibit/the-opening-of-china/|title=The Week that Chenged the World|website=Richard Nixon Foundation|date=18 January 2017|access-date=2 November 2018|archive-date=27 September 2018|archive-url=https://web.archive.org/web/20180927192245/https://www.nixonfoundation.org/exhibit/the-opening-of-china/|url-status=live}}</ref> and [[Polish People's Republic|Poland]] as intermediaries.<ref name=":Minami" />{{Rp|page=36}} The warming [[Soviet Union–United States relations|US–Soviet]] and US-China relationships in 1972 due to the [[triangular diplomacy]] coincided with crucial periods in the [[Paris Peace Talks]]. Because of Nixon's diplomatic groundwork, neither Moscow nor Beijing intervened in the [[Operation Linebacker II|US Christmas bombing campaign]] against Hanoi in late 1972. They offered verbal protests but prioritized their new relationships with Washington over their alliance with Hanoi.<ref>{{cite web | title=Office of the Historian | website=Historical Documents | date=1969-09-27 | url=https://history.state.gov/historicaldocuments/frus1969-76v12/d86 | access-date=2026-02-19}}</ref> This isolated [[North Vietnam]] and forced them back to the negotiating table within 11 days. Many historians argue that the shifting dynamics of the strategic triangle played a critical role in changing the North Vietnamese's negotiating strategy and ultimately led to the signing of the [[Paris Peace Accords]] in January 1973.{{citation needed|date=October 2025}}
       
      [[File:Kissinger Mao.jpg|thumb|left|Henry Kissinger, Zhou Enlai and Mao Zedong. Kissinger made two secret trips to the PRC in 1971 before Nixon's groundbreaking visit in 1972.]]
       
      In the US, academics such as [[John K. Fairbank]] and [[A. Doak Barnett]] pointed to the need to deal realistically with the Beijing government, while organizations such as the [[National Committee on United States–China Relations]] sponsored debates to promote public awareness.<ref name=":Minami" />{{Rp|pages=36–37}} Many saw the specter of Communist China behind communist movements in [[Vietnam]], [[Cambodia]], and [[Laos]], but a growing number concluded that if the PRC would align with the U.S. it would mean a major redistribution of global power against the Soviets. Mainland China's market of nearly one billion consumers appealed to American businesses. Senator [[J. William Fulbright]], Chair of the [[United States Senate Committee on Foreign Relations|Senate Foreign Relations Committee]], held a series of hearings on the matter.<ref>Goh, Evelyn, ''Constructing the US Rapprochement with China, 1961–1974: From 'Red Menace' to 'Tacit Ally' '', Cambridge University Press, 2005</ref>
       
      Richard M. Nixon mentioned in his [[First inauguration of Richard Nixon|inaugural address]] that the two countries were entering an era of negotiation after an era of confrontation. Although Nixon, during his 1960 presidential campaign, had vociferously supported Chiang Kai-Shek, by the second half of the decade, he increasingly began to speak of there "being no reason to leave China angry and isolated". Nixon's election as president in 1968 was initially met with hostility by Beijing—an editorial in the ''People's Daily'' denounced him as "a chieftain whom the capitalist world had turned to out of desperation".<ref>{{cite book|editor-last=Leffler|editor-first=Melvyn P.|title=The Cambridge history of the Cold War.|year=2010|publisher=Cambridge University Press|location=Cambridge, UK|isbn=978-0-521-83720-0|page=373|edition=1. publ.|editor-last2=Westad|editor-first2=Odd Arne}}</ref> Nixon believed it was in the American national interest to forge a relationship with China, even though there were enormous differences between the two countries.<ref>{{cite web|last=Dube|first=Clayton|title=Getting to Beijing: Kissinger's Secret 1971 Trip|url=http://china.usc.edu/ShowArticle.aspx?articleID=2483|publisher=USC US-China Institute|access-date=24 July 2011|archive-date=10 November 2013|archive-url=https://web.archive.org/web/20131110190513/http://china.usc.edu/ShowArticle.aspx?articleID=2483|url-status=live}}</ref>  He was assisted in this by his [[National Security Advisor (United States)|National Security Advisor]] [[Henry Kissinger]].<ref name=":0">{{Cite book |last=Li |first=Xiaobing |title=The Cold War in East Asia |date=2018 |publisher=[[Routledge]] |isbn=978-1-138-65179-1 |location=Abingdon, Oxon}}</ref>{{Rp|page=3}} Both Nixon and Kissinger believed that relations with China would help the US exit the Vietnam War and obtain long-term strategic benefits in confrontations with the Soviet Union.<ref name=":0" />{{Rp|page=3}}
       
      In 1971, an unexpectedly friendly encounter between the American and Chinese ping-pong athletes called [[Glenn Cowan]] and [[Zhuang Zedong]] in Japan opened the way for a visit to China, which Chairman Mao personally approved.<ref>{{cite web|last=Dube|first=Clayton|title=Sports diplomacy and back-channel negotiations|url=http://china.usc.edu/ShowArticle.aspx?articleID=2470|work=Talking Points, July 22 – August 3, 2011|publisher=USC US-China Institute|access-date=24 July 2011|archive-date=10 November 2013|archive-url=https://web.archive.org/web/20131110200234/http://china.usc.edu/ShowArticle.aspx?articleID=2470|url-status=live}}</ref>  In April 1971, the athletes became the first Americans to officially visit China since the communist takeover. The smooth acceptance of this created the term [[ping-pong diplomacy]] and gave confidence to both sides. Ping-pong diplomacy became one of the most prominent examples of [[people's diplomacy]] in China-US relations.<ref name=":Minami" />{{Rp|page=9}} The ping-pong diplomacy allowed reporters into the country as well, opening up communication to both sides and breaking a barrier that had been there previously. This smoothed out the start of the trade partnership that was going to happen later.<ref>{{Cite web|title=Timeline: U.S. Relations With China 1949–2020|url=https://www.cfr.org/timeline/us-relations-china|access-date=9 March 2021|website=[[Council on Foreign Relations]] |archive-date=16 August 2022|archive-url=https://web.archive.org/web/20220816002922/https://www.cfr.org/timeline/us-relations-china|url-status=live}}</ref> China's approach to keeping these early exchanges unofficial and conduct them through non-governmental agencies was generally well received by U.S. [[civil society]] groups and academics.{{sfn|Li|2024a|p=310}}
       
      In July 1971, Henry Kissinger feigned illness while on a trip to Pakistan and did not appear in public for a day. He was actually on a top-secret mission to Beijing to negotiate with Chinese Premier Zhou Enlai.
       
      Kissinger and his aides did not receive a warm welcome in Beijing, and the hotel they stayed in was equipped with pamphlets excoriating U.S. imperialism. However, the meeting with Zhou Enlai was productive, and the Chinese premier expressed his hope for improved China-US relations. He commented that the U.S. had intentionally isolated China, not vice versa, and any initiative to restore diplomatic ties had to come from the American side. Zhou spoke of the late President Kennedy's plans to restore relations with China and told Kissinger, "We are willing to wait as long as we need to. If these negotiations fail, in time another Kennedy or another Nixon will come along."<ref>{{Cite web|url=https://kisslibrary.com/book/7138CDB42A74355EA5B6?search=2011+American+Business+in+China+White+Paper&a_aid=ddmidovv&a_bid=11110007|title=2011 American Business in China White Paper by American Chamber of Commerce in China / KissLibrary: Affordable Ebooks|website=kisslibrary.com|access-date=6 December 2018}}</ref>
       
      On 15 July 1971, President Richard Nixon revealed the mission to the world and that he had accepted an invitation to visit the PRC.<ref>Magaret MacMillan, ''Nixon and Mao: The Week That Changed The World'' (2008)</ref>
       
      This announcement<ref>{{cite web|last=Nixon|first=Richard|title=Announcement of the President's Trip to China|url=http://china.usc.edu/ShowArticle.aspx?articleID=2258|work=US-China documents collection|publisher=USC US-China Institute|access-date=24 July 2011|archive-date=11 November 2013|archive-url=https://web.archive.org/web/20131111171025/http://china.usc.edu/ShowArticle.aspx?articleID=2258|url-status=live}}</ref> caused immediate shock around the world. In the US, some hard-line [[Anti-communism|anti-communists]] (most notably [[libertarian Republican]] Arizona Senator [[Barry Goldwater]]) denounced the decision, but most public opinions supported the move and Nixon saw the jump in the polls he had been hoping for. Since Nixon had sterling anti-communist credentials he was all but immune to being called "soft on communism". Nixon and his aides wanted to ensure that press coverage offered dramatic imagery.<ref>See [http://china.usc.edu/ShowArticle.aspx?articleID=2705 "Getting to know you: The US and China shake the world"] {{Webarchive|url=https://web.archive.org/web/20131111171032/http://china.usc.edu/ShowArticle.aspx?articleID=2705|date=11 November 2013}} and [http://china.usc.edu/ShowArticle.aspx?articleID=2672 "The Week that Changed the World"] {{Webarchive|url=https://web.archive.org/web/20141021072557/http://china.usc.edu/ShowArticle.aspx?articleID=2672|date=21 October 2014}} for recordings, documents, and interviews.</ref> Nixon was particularly eager for strong news coverage.
       
      [[File:President and Mrs. Nixon visit the Great Wall of China and the Ming tombs - NARA - 194421.tif|thumb|right|President Nixon and First Lady [[Pat Nixon]] walk with the American delegation and their Chinese hosts on the [[Great Wall of China]].]]
      [[File:Nixon and Zhou toast.jpg|thumb|right|President Nixon and Premier [[Zhou Enlai]] toast during Nixon's 1972 visit to China]]
      Within the PRC there was also opposition from left-wing elements. This effort was allegedly led by [[Lin Biao]], head of the military, who died in a mysterious plane crash over [[Mongolian People's Republic|Mongolia]] while trying to defect to the Soviet Union. His death silenced most internal dissent over the visit.
       
      Internationally, reactions varied. In the communist world, the Soviets were very concerned that two major enemies seemed to have resolved their differences, and the new world alignment contributed significantly to the policy of ''[[détente]]''. 
       
      America's [[NATO]] allies were pleased by the initiative, especially since many of them had already recognized the PRC. Throughout the Asia-Pacific, the reaction was far more mixed. Japan was annoyed that it had not been told of the announcement until fifteen minutes before it had been made, and feared that the Americans were abandoning them in favor of the PRC. A short time later, Japan also recognized the PRC and committed to substantial trade with the continental power. South Korea and South Vietnam were both concerned that peace between the US and the PRC could mean an end to American support for them against their communist enemies. Throughout the period of rapprochement, both countries had to be regularly assured that they would not be abandoned. Taiwan's Chiang Kai-Shek criticized the move, saying: "Today any international appease movement to evil power to seek for political power balance would never helpful for the world peace, instead it elongated the hardship of our 700 million people, and expand the disaster of the world."<ref>{{cite web|url=http://www.ccfd.org.tw/ccef001/index.php?option=com_content&view=article&id=751:0003-54&catid=199:2014-06-12-03-10-05&Itemid=256|author=Kai-Shek, Chiang|title=對國民大會第五次會議開幕典禮致詞|trans-title=Speech for the Opening Ceremony of the National Assembly Fifth Meeting|website=中正文教基金會 (Chungcheng Cultural and Educational Foundation)|date=20 February 1972|access-date=3 June 2021|language=zh|quote=所以今天國際間任何與惡勢力謀求政治權力均衡的姑息舉動，絕不會有助於世界和平，而適以延長我七億人民的苦難，增大全世界的災禍！|archive-date=3 June 2021|archive-url=https://web.archive.org/web/20210603081801/http://www.ccfd.org.tw/ccef001/index.php?option=com_content&view=article&id=751:0003-54&catid=199:2014-06-12-03-10-05&Itemid=256|url-status=live}}</ref>
       
      From 21 to 28 February 1972, [[1972 visit by Richard Nixon to China|President Nixon traveled]] to [[Beijing]], [[Hangzhou]], and [[Shanghai]]. At the conclusion of his trip, the U.S. and the PRC issued the [[Shanghai Communiqué]], a statement of their respective foreign policy views. In the Communiqué, both nations pledged to work toward the full normalization of diplomatic relations. This did not lead to immediate recognition of the People's Republic of China but 'liaison offices' were established in Beijing and Washington.<ref name="Dunbabin 1996 258">{{cite book|last=Dunbabin|first=J.P.D.|title=International relations since 1945|year=1996|publisher=Longman|location=London [u.a.]|isbn=978-0-582-49365-0|page=258|edition=[Nachdr.].}}</ref> The U.S. acknowledged the PRC position that all Chinese on both sides of the Taiwan Strait maintain that [[One-China policy|there is only one China]] and that Taiwan is part of China. The statement enabled the U.S. and PRC to temporarily set aside the issue of Taiwan and open trade and communication. Also, the U.S. and China both agreed to take action against "any country" that is to establish "hegemony" in the Asia-Pacific. On several issues, such as the ongoing conflicts in Korea, Vietnam, and Israel, the U.S. and China were unable to reach a common understanding.<ref name="Dunbabin 1996 258"/>
       
      The rapprochement with the US benefited the PRC immensely and greatly increased its security for the rest of the [[Cold War]]. It has been argued that the US, on the other hand, saw fewer benefits than it had hoped for, inasmuch as China continued to back America's enemies in Hanoi and Pyongyang. Eventually, however, the PRC's suspicion of Vietnam's motives led to a break in China-Vietnamese cooperation and, upon the Vietnamese invasion of Cambodia in 1979, the [[Sino-Vietnamese War]]. Both China and the US backed combatants in [[Africa]] against Soviet and [[Cuba]]n-supported movements. The economic benefits of normalization were slow as it would take decades for American products to penetrate the vast Chinese market. While Nixon's China policy is regarded by many as the highlight of his presidency, others such as [[William Bundy]] have argued that it provided very little benefit to the US.{{citation needed|date=February 2015}}

      ===Liaison Office (1973–1978)===
      [[File:President Ford makes remarks in the People's Republic of China - NARA - 7062599.jpg|thumb|right|President Gerald Ford makes remarks at a Reciprocal Dinner in Beijing on 4 December 1975.]]
       
      In May 1973, in an effort to build toward formal diplomatic relations, the U.S. and the PRC established the United States Liaison Office (USLO) in Beijing and a counterpart PRC office in Washington, D.C.<ref name=":0" />{{Rp|page=153}} From 1973 to 1978, such distinguished Americans as [[David K. E. Bruce]], [[George H. W. Bush]], [[Thomas S. Gates, Jr.]], and [[Leonard Woodcock]] served as chiefs of the USLO with the personal rank of ambassador. China made clear that it considered the Soviet Union its chief adversary and urged the US to be powerful, thereby distracting Moscow. Liaison officer George Bush concluded, "China keeps wanting us to be strong, wanting us to defend Europe, wanting us to increase our defense budgets, etc."<ref>{{cite book|editor1-first=Jeffrey A.|editor1-last= Engel|title=The China Diary of George H. W. Bush: The Making of a Global President|url=https://books.google.com/books?id=jRvdwoKQOgQC&pg=PA356|year=2011|publisher=Princeton UP|page=356|isbn=978-1400829613}}</ref> Bush concluded that American engagement was essential to support markets, allies, and stability throughout the Asia Pacific and around the world.<ref>{{cite book|first=Jon|last=Meacham|title=Destiny and Power: The American Odyssey of George Herbert Walker Bush|url=https://books.google.com/books?id=iMgOCAAAQBAJ&pg=PT219|year=2015|page=219|publisher=Random House Publishing|isbn=9780812998207}}</ref>
       
      President [[Gerald Ford]] visited the PRC in 1975 and reaffirmed American interest in normalizing relations with Beijing. Shortly after taking office in 1977, President [[Jimmy Carter]] again reaffirmed the goals of the Shanghai Communiqué. Secretary of State [[Cyrus Vance]], Carter's National Security Advisor [[Zbigniew Brzezinski]], and senior staff member of the National Security Council [[Michel Oksenberg]] encouraged Carter to seek full diplomatic and trade relations with China. Although Brzezinski sought to quickly establish a security relationship with Beijing to counter the Soviet Union, Carter sided with Vance in believing that such a deal would threaten existing U.S.-Soviet relations, including the [[Strategic Arms Limitation Talks|SALT II]] negotiations. Thus, the administration decided to cautiously pursue political normalization and not military relations.<ref>{{cite book|last1=Vance|first1=Cyrus|title=Hard Choices|url=https://archive.org/details/hardchoicescriti0000vanc|url-access=registration|date=1983|publisher=Simon and Schuster|pages=[https://archive.org/details/hardchoicescriti0000vanc/page/78 78]–79|isbn=9780671443399}}</ref> Vance, Brzezinski, and Oksenberg traveled to Beijing in early 1978 to work with Leonard Woodcock, then head of the liaison office, to lay the groundwork to do so. The US and the PRC announced on 15 December 1978,{{sfn|Lampton|2024|p=86}} that the two governments would establish diplomatic relations on 1 January 1979.
       
      ===Normalization (1979–1989)===
      {{see also|Visit by Deng Xiaoping to the United States|U.S.–China Agreement on Cooperation in Science and Technology}}
      [[File:Jimmy Carter and Deng Xiaoping participate in a meeting with U.S. and Chinese officials. - NARA - 183191.tif|thumb|US president Jimmy Carter, [[Zbigniew Brzezinski]], and other U.S. officials meet in the White House Cabinet Room with Chinese leader Deng Xiaoping, 29 January 1979.]]
      In the [[Joint Communiqué on the Establishment of Diplomatic Relations]], dated 1 January 1979, the United States transferred diplomatic recognition from Taipei to Beijing. The U.S. reiterated the Shanghai Communiqué's acknowledgment of the Chinese position [[One China policy|that there is only one China]], and that Taiwan is a part of China; Beijing acknowledged that the American people would continue to carry on commercial, cultural, and other unofficial contacts with the people of Taiwan.<ref>Jim Mann, ''About face: A history of America's curious relationship with China, from Nixon to Clinton'' (1999).</ref>
       
      Taiwan, although fully expecting this step, nonetheless expressed disappointment at having not been consulted first. The reaction of the communist world was similar to 1972, with the Soviet Union and its allies in Eastern Europe mostly being noncommittal, Romania welcoming the move, and Cuba and Albania being strongly against it. North Korea issued a statement congratulating "our brotherly neighbors for ending long-hostile relations with the US".{{Quote without source|date=April 2018}}
       
      Chinese leader Deng Xiaoping's [[1979 visit by Deng Xiaoping to the United States|January 1979 visit]] to Washington initiated a series of important, high-level exchanges which continued until the spring of 1989. This resulted in many bilateral agreements, including the 31 January 1979 Agreement on Cooperation in Science and Technology.{{sfn|Lampton|2024|pp=90–91}} Scientific cooperation greatly increased thereafter.<ref name=":Minami">{{Cite book|last=Minami|first=Kazushi|title=People's Diplomacy: How Americans and Chinese Transformed US-China Relations during the Cold War|date=2024|publisher=[[Cornell University Press]]|isbn=9781501774157|location=Ithaca, NY}}</ref>{{Rp|pages=86–87}} Since early 1979, the US and the PRC have initiated hundreds of joint research projects and cooperative programs under the Agreement on Cooperation in Science and Technology, the largest bilateral program.<ref>{{cite web|url=http://china.usc.edu/ShowArticle.aspx?articleID=1196|title=US-China Institute :: news & features :: china in u.s. campaign politics: part 6 of election '08 and the challenge of china|publisher=China.usc.edu|date=16 October 1964|access-date=2 December 2010|archive-date=5 March 2014|archive-url=https://web.archive.org/web/20140305213847/http://china.usc.edu/ShowArticle.aspx?articleID=1196|url-status=live}}</ref>
       
      On 1 March 1979, the two countries formally established embassies in each other's capitals. In 1979, outstanding private claims were resolved and a bilateral trade agreement was completed. Vice President Walter Mondale reciprocated Vice Premier Deng's visit with an August 1979 trip to China. This visit led to agreements in September 1980 on maritime affairs, civil aviation links, and textile matters, as well as a bilateral consular convention.
       
      The threats of the [[Soviet–Afghan War|Soviet invasion of Afghanistan]] and [[Cambodian-Vietnamese War|Vietnamese invasion of Cambodia]] were major factors that brought Washington and Beijing closer than ever before.<ref name=shichor>{{cite book|first=Frederick S.|last=Starr|title=Xinjiang: China's Muslim Borderland|url=https://books.google.com/books?id=GXj4a3gss8wC&pg=PA157|year=2004|publisher=M.E. Sharpe|isbn=978-0-7656-3192-3|pages=157–158|access-date=8 December 2018|archive-date=11 February 2024|archive-url=https://web.archive.org/web/20240211032209/https://books.google.com/books?id=GXj4a3gss8wC&pg=PA157#v=onepage&q&f=false|url-status=live}}</ref> In June 1979, U.S. Secretary of Health, Education, and Welfare [[Joseph A. Califano Jr.|Josephn A. Califano Jr.]] led an American delegation to China; the trip resulted in the long-term institutionalization of health and education links between the two countries.{{sfn|Lampton|2024|p=103}} U.S.-China military cooperation increased over the course of 1979 and 1980.<ref name="Crean-2024">{{Cite book|last=Crean|first=Jeffrey|title=The Fear of Chinese Power: an International History|date=2024|publisher=[[Bloomsbury Academic]]|isbn=978-1-350-23394-2|edition=|series=New Approaches to International History series|location=London, UK}}</ref>{{Rp|page=139}} In 1980, China allowed the United States to establish electronic listening stations in [[Xinjiang]] so the US could monitor Soviet rocket launches in Central Asia.{{sfn|Zhao|2022|p=54}} In exchange, the US authorized the sale of [[Dual-use technology|dual-use]] civilian and military technology and nonlethal military equipment to China.{{sfn|Zhao|2022|p=54}}
       
      Chinese demands for advanced technology from the U.S. were not always met, in part due to opposition from Congressmen who either distrusted technology transfer to a communist nation out of principle or concern that there was no guarantee that such technology would not end up in the hands of unfriendly third parties. In 1983, the U.S. State Department changed its classification of China to "a friendly, developing nation",{{Quote without source|date=April 2018}} thereby increasing the amount of technology and armaments that could be sold. The skepticism of some U.S. congressmen was not entirely unmerited as China, during the 1980s, continued to sell arms to [[Iran]] and other states that were openly hostile to American interests.
       
      [[File:Carter DengXiaoping (cropped).jpg|thumb|left|Chinese leader Deng Xiaoping with US President [[Jimmy Carter]]]]
      As a consequence of high-level and working-level contacts initiated in 1980, U.S. dialogue with the PRC broadened to cover a wide range of issues, including global and regional strategic problems, political-military questions, including arms control, UN, and other multilateral organization affairs, and international narcotics matters. New York City and Beijing became sister cities.<ref>Oksenberg, Michel (1982). "Reconsiderations: A Decade of Sino-American Relations". ''Foreign Affairs'' 61.1: 190.</ref>
       
      High-level exchanges continued to be a significant means for developing US–PRC relations in the 1980s. President [[Ronald Reagan]] and Premier [[Zhao Ziyang]] made reciprocal visits in 1984. Reagan's visit to Beijing went well, however, a speech he made criticizing the Soviet Union and praising capitalism, democracy, and freedom of religion was not aired on Chinese state television. In July 1985, [[President of China|Chinese President]] [[Li Xiannian]] traveled to the US, the first such visit by a PRC head of state. Vice President Bush visited the PRC in October 1985 and opened the U.S. Consulate General in [[Chengdu]], the US's fourth consular post in the PRC. Further exchanges of cabinet-level officials occurred between 1985 and 1989, capped by President Bush's visit to Beijing in February 1989.
       
      [[File:Zhao Ziyang cropped.jpg|150px|thumb|President Ronald Reagan walking with Premier [[Zhao Ziyang]] during his visit to the White House on 10 January 1984]]
       
      Shortly after being elected president in 1980, Ronald Reagan made a speech criticizing the PRC and welcoming restoration of ties with Taiwan. These remarks aroused initial concern in Beijing, but Reagan's advisers quickly apologized for his comments, and the president-elect soon retracted them. Reagan's first two years in office saw some deterioration in U.S.-China relations due to the president's vociferous anti-communism, as well as the inability of the two nations to come to a common understanding over the [[Korean conflict]], the [[Israeli–Palestinian conflict|Israel–Palestine conflict]], or the [[Falklands War]]. In 1982, Chinese leader Deng Xiaoping, in a reiteration of Mao Zedong's "Three Worlds" theory, criticized both the U.S. and Soviet Union for imperialism. In 1983, there were quarrels over a Chinese tennis player, [[Hu Na]], who defected to the US, and over an incident where an Olympic parade float in New York City displayed the flag of Taiwan rather than the PRC's flag. Relations in the early part of 1984 were strained over the issue of US arms sales to Taiwan, but later improved.{{sfn|Lampton|2024|p=142}}
       
      By the late 1980s, China was the US's largest partner for science and technology, which had become the largest type of government-to-government exchange between the two countries.<ref name=":Minami" />{{Rp|page=88}}
       
      In the period before the [[1989 Tiananmen Square protests and massacre]], a growing number of cultural exchange activities gave the American and Chinese peoples broad exposure to each other's cultural, artistic, and educational achievements. Numerous mainland Chinese professionals and official delegations visited the US each month. Many of these exchanges continued after the suppression of the Tiananmen protests.<ref>Robert Suettinger, ''Beyond Tiananmen: The Politics of US-China Relations, 1989–2000'' (Brookings Institution Press, 2004).</ref>
       
      In the first decade after normalization, the US's policy towards China was largely driven by the Executive Branch of the United States, with the notable exception of the [[Taiwan Relations Act]].{{sfn|Lampton|2024|p=207}} As a result of the Executive-branch driven approach during this period, China concluded that US Presidents primarily raised Congressional issues as a negotiating tool and that Congress was not itself a significant force in China-US relations.{{sfn|Lampton|2024|p=208}} Consequently, China was slow to develop its Congressional liaison capacity.{{sfn|Lampton|2024|p=208}}
       
      == Contemporary Relations ==

      === George H. W. Bush administration (1989–1993) ===
      {{Main|Foreign policy of the George H. W. Bush administration}}

      Americans who had been optimistic about the emergence of democratic characteristics in response to the rapid economic growth and China were stunned and disappointed by the brutal crackdown of the pro-democratic Tiananmen Square protests in 1989.<ref>Eric A. Hyer, "Values Versus Interests: The U.S. Response to the Tiananmen Square Massacre" (Georgetown Institute for the Study of Diplomacy, 1996. [https://www.academia.edu/download/55264904/Values_Versus_Interests_The_U.S._Response_to_the_Tiananmen_Square_Massacre.pdf online]{{dead link|date=July 2022|bot=medic}}{{cbignore|bot=medic}}</ref>  The U.S. and other governments enacted a number of measures against China's violation of [[Human rights in China|human rights]]. The U.S. suspended high-level official exchanges with the PRC and weapons exports from the U.S. to the PRC. The U.S. also imposed a number of [[economic sanctions]].<ref>{{cite web | title=The Dui Hua Foundation-Dialogue – Issue 38: Tiananmen Sanctions: 20 Years & Counting | website=The Dui Hua Foundation | date=29 January 2010 | url=https://duihua.org/dialogue-issue-38-tiananmen-sanctions-20-years-counting/ | access-date=24 July 2025}}</ref> In the summer of 1990, at the [[G7 (major advanced economies)|G7]] [[16th G7 summit|Houston summit]], the West called for renewed political and economic reforms in mainland China, particularly in the field of human rights.<ref>Robert Suettinger, ''Beyond Tiananmen: The Politics of U.S.-China Relations, 1989–2000'' ([[Brookings Institution Press]], 2004.)</ref>
       
      The Tiananmen event disrupted the U.S.-China trade relationship, and U.S. investors' interest in mainland China dropped dramatically. Tourist traffic fell off sharply.<ref>Roehl, Wesley S. (1990). "Travel agent attitudes toward China after Tiananmen Square". ''Journal of Travel Research'' 29.2: 16–22.</ref> The Bush administration denounced the repression and suspended certain trade and investment programs on 5 and 20 June 1989, however Congress was responsible for imposing many of these actions, and the White House itself took a far less critical attitude of Beijing, repeatedly expressing hope that the two countries could maintain normalized relations.<ref>Skidmore, David; Gates, William (1997). "After Tiananmen: The struggle over U.S. policy toward China in the Bush administration". ''[[Presidential Studies Quarterly]]'': 514–539. [https://www.jstor.org/stable/27551766 in JSTOR] {{Webarchive|url=https://web.archive.org/web/20170219024303/http://www.jstor.org/stable/27551766|date=19 February 2017}}</ref> Generally, Bush's preference was for sanctions which were not formalized in law in order to provide flexibility for altering or removing them.{{sfn|Lampton|2024|p=210}} Some sanctions were legislated while others were executive actions. Examples include:
       
      *The [[United States Trade and Development Agency|US Trade and Development Agency]] (TDA): new activities in mainland China were suspended from June 1989 until January 2001, when President [[Bill Clinton]] lifted this suspension.
      *Overseas Private Insurance Corporation (OPIC): new activities have been suspended since June 1989.
      *Development Bank Lending/[[International Monetary Fund]] (IMF) Credits: the US does not support development bank lending and will not support IMF credits to the PRC except for projects that address basic human needs.
      *[[United States Munitions List|Munitions List]] Exports: subject to certain exceptions, no licenses may be issued for the export of any defense article on the U.S. Munitions List. This restriction may be waived upon a presidential national interest determination.
      *Arms Imports – import of defense articles from the PRC was banned after the imposition of the ban on arms exports to the PRC. The import ban was subsequently waived by the administration and reimposed on 26 May 1994. It covers all items on the [[Bureau of Alcohol, Tobacco, Firearms and Explosives|BATFE]]'s Munitions Import List. During this critical period, [[J. Stapleton Roy]], a career U.S. Foreign Service officer, served as ambassador to Beijing.<ref>{{cite web|title=The Future of U.S.–China Relations|url=http://www.china.usc.edu/ShowArticle.aspx?articleID=61#keynote|url-status=dead|archive-url=https://web.archive.org/web/20140305215110/http://www.china.usc.edu/ShowArticle.aspx?articleID=61#keynote|archive-date=5 March 2014|access-date=31 August 2008|website=[[USC Annenberg School for Communication and Journalism]]}}</ref>
       
      Debate within the United States also began on whether China should continue to receive the annual presidential waiver for [[Most favoured nation|most favored nation]] trading status under the [[Jackson–Vanik amendment|Jackson-Vanik Amendment]].{{sfn|Lampton|2024|p=211}}
       
      U.S.-China military ties and arms sales were terminated in 1989 and as of 2024 have never been restored. Chinese public opinion became more hostile to the United States after 1989, as typified by the 1996 manifesto [[China Can Say No]]. The authors called for Beijing to take more aggressive actions against the US and Japan in order to build a stronger international position. The Chinese government at first endorsed the manifesto, then repudiated it as irresponsible.<ref>Yuwu Song, ed., ''Encyclopedia of Chinese-American Relations'' (2009) pp. 56–57.</ref>
       
      The end of the Cold War and [[dissolution of the Soviet Union]] removed the original motives underlying rapprochement between China and the US.{{sfn|Zhao|2022|p=51}} Motivated by concerns that the United States might curtail support for China's modernization, Deng adopted a low-profile foreign policy to live with the fact of United States hegemony and focus primarily on domestic development.{{sfn|Zhao|2022|p=51}}
       
      ===Clinton administration (1993–2001)===
      {{Main|Foreign policy of the Clinton administration}}

      Running for president in 1992, [[Bill Clinton]] sharply criticized his predecessor George H. W. Bush for prioritizing profitable trade relationships over human rights issues in China.<ref>Kerry Dumbaugh, and Richard C. Bush, ''Making China Policy: Lessons from the Bush and Clinton Administrations'' (Rowman & Littlefield, 2001).</ref> Clinton's 28 May 1993 Executive Order 128950 linked future extension of China's most favored nation trading status to China's progress on U.S.-defined human rights measures.{{sfn|Lampton|2024|p=222}} China made virtually no effort to comply with the U.S. conditions and in mid-1994 Clinton changed his position,{{sfn|Lampton|2024|p=223}} de-linking the China's most favored nation status from human rights issues.{{sfn|Zhao|2022|p=63}}
       
      Congressional pressure, especially from the [[Republican Party (United States)|Republican Party]], prompted Clinton to approve arms sales to Taiwan, despite the strong displeasure voiced by Beijing.<ref>Yuwu Song, ed., ''Encyclopedia of Chinese-American Relations'' ([[McFarland Publishing]], 2009) p 63.</ref><ref>John W. Dietrich,  "Interest groups and foreign policy: Clinton and the China MFN debates." ''Presidential Studies Quarterly'' 29.2 (1999): 280-296.</ref><ref>Jean A. Garrison, ''Making China Policy: From Nixon to GW Bush'' (Lynne Rienner, 2005)</ref>
       
      In July 1993, a symbolic United States Congressional resolution opposed China's efforts to be selected as the host country for the 2000 Summer Olympics.<ref name="Crean-2024" />{{Rp|page=153}} The resolution became a major grievance among the Chinese public, which generally viewed the Resolution as an effort to humiliate China.<ref name="Crean-2024" />{{Rp|pages=153–154}}
       
      [[File:United States trade with china history.gif|thuimb|left]]
       
      In July 1993, the U.S. Navy [[Yinhe incident|stopped the ''Yinhe'', a Chinese container ship]], en route to [[Kuwait]] in international waters, cut off its GPS so that it lost direction and was forced to anchor, and held it in place for twenty-four days.{{sfn|Zhao|2022|p=63}} The United States incorrectly alleged that the ''Yinhe'' was carrying precursors of [[chemical weapon]]s for Iran.{{sfn|Zhao|2022|p=63}} It eventually forced an inspection of the ship in [[Saudi Arabia]], but found no chemical precursors.{{sfn|Zhao|2022|p=63}} The United States refused China's request for a formal apology and refused to pay compensation.{{sfn|Zhao|2022|p=63}} This incident was viewed in China as international bullying by the United States.<ref>{{cite book|url=http://www.foreignaffairs.house.gov/archives/107/72348.pdf|title=After Hainan: Next Steps for US–China Relations: Hearing Before the Subcommittee on East Asia and the Pacific of the Committee on International Relations, House of Representatives, One Hundred Seventh Congress, First Session, April 25, 2001|place=Washington|publisher=United States Government Publishing Office|page=45|archive-url=https://web.archive.org/web/20080813034751/http://www.foreignaffairs.house.gov/archives/107/72348.pdf|archive-date=13 August 2008}}</ref> Nonetheless, Chinese leader [[Jiang Zemin]] adopted a diplomatic posture of goodwill and a "sixteen-characters formula" to working with the United States: "enhancing confidence, avoiding troubles, expanding cooperation, and avoiding confrontation".{{sfn|Zhao|2022|p=63}}
       
      [[File:Anti-American Protests in Nanjing, 1999 (flickr 2543499638).jpg|thumb|Anti-American protests in Nanjing following the [[United States bombing of the Chinese embassy in Belgrade]], 1999]]
      In 1996, the People's Liberation Army conducted military exercises in the Taiwan Strait in an apparent effort to intimidate the Republic of China electorate before the [[1996 Republic of China presidential election|pending presidential elections]], triggering the [[Third Taiwan Strait Crisis]]. The United States dispatched two [[Carrier battle group|aircraft carrier battle groups]] to the region. Subsequently, tensions in the Taiwan Strait diminished and relations between the U.S. and the PRC improved, with increased high-level exchanges and progress on numerous bilateral issues, including human rights, [[nuclear proliferation]], and trade.
       
      China's leader Jiang Zemin visited the United States in the fall of 1997, the first state visit to the U.S. by a paramount leader since 1979. In connection with that visit, the two sides came to a consensus on implementation of their 1985 agreement on Peaceful Nuclear Cooperation, as well as a number of other issues.<ref>Lucian W. Pye, "The United States and Asia in 1997: nothing dramatic, just incremental progress." ''Asian Survey'' 38.1 (1998): 99–106 [https://as.ucpress.edu/content/ucpas/38/1/99.full.pdf online].</ref> President Clinton visited the PRC in June 1998. He traveled extensively in mainland China, and had direct interaction with the Chinese people, including live speeches and a radio show which allowed the President to convey a sense of American ideals and values. In a speech at [[Peking University]], he referred to the 21st century as "your century",<ref>{{Cite web|title=President Clinton's Beijing University speech, 1998 US-China Institute|url=https://china.usc.edu/president-clintons-beijing-university-speech-1998|access-date=16 April 2023|website=china.usc.edu|archive-date=16 April 2023|archive-url=https://web.archive.org/web/20230416074949/https://china.usc.edu/president-clintons-beijing-university-speech-1998|url-status=live}}</ref> and expressed his view that technology, including the internet, would help ease any tensions China's economic growth might cause.<ref>{{Cite book|last=Moore|first=Scott|title=China's next act : how sustainability and technology are reshaping China's rise and the world's future|date=2022|isbn=978-0-19-760401-4|location=New York, NY|page=1|oclc=1316703008}}</ref><ref>{{Citation|title=President Clinton at Peking University (1998)| date=9 July 2013|url=https://www.youtube.com/watch?v=6IpJZihF0Lw|access-date=16 April 2023}}</ref> President Clinton was criticized by some, however, for failing to pay adequate attention to human rights abuses in mainland China.<ref>Eckholm</ref>{{better source needed|reason=which book or article from Eckholm?|date=October 2025}} When Clinton visited Shanghai, he declared the "three nos" for United States foreign policy towards China: (1) not recognizing two Chinas, (2) not supporting Taiwanese independence, and (3) not supporting Taiwanese efforts to join international organizations for which sovereignty is a membership requirement.{{sfn|Zhao|2022|p=63}}
       
      Relations were damaged for a time by the [[United States bombing of the Chinese embassy in Belgrade]] on 7 May 1999,{{sfn|Zhao|2022|pp=63–64}} which was stated by the White House to be miscoordination between intelligence and the military. The bombing created outrage among Chinese people, who did not accept the United States claim that the bombing was accidental.{{sfn|Zhao|2022|pp=63–64}} For several days, Beijing was rocked by massive anti-US demonstrations. Deeming the importance of the bilateral relationship too great to be harmed by the embassy bombing, Chinese leader Jiang Zemin sought to calm the Chinese public outrage.{{sfn|Zhao|2022|pp=63–64}} By the end of 1999, relations began to gradually improve. In October 1999, the two countries reached an agreement on compensation for families of those who were victims, as well as payments for damages to respective diplomatic properties in [[Belgrade]] and China. U.S.-China relations in 1999 were also damaged by accusations that a Chinese-American scientist at the [[Los Alamos National Laboratory]] had given U.S. nuclear secrets to Beijing.

      ===George W. Bush administration (2001–2009)===
      [[File:Bushhujintao.jpg|thumb|American President [[George W. Bush]] and Chinese leader [[Hu Jintao]] with first ladies [[Laura Bush]] and [[Liu Yongqing]] wave from the White House in April 2006.]]
      {{Main|Foreign policy of the George W. Bush administration}}

      As a presidential candidate in 2000, George W. Bush repeatedly criticized the Clinton-Gore administration for being too friendly with China, which he warned was a strategic competitor.
       
      In the [[Hainan Island incident]] of 1 April 2001, a U.S. [[Lockheed EP-3|EP-3]] surveillance aircraft collided mid-air with a Chinese [[Shenyang J-8]] jet fighter over the South China Sea.{{sfn|Zhao|2022|p=64}} China sought a formal apology, and accepted United States Secretary of State [[Colin Powell]]'s expression of "very sorry" as sufficient.{{sfn|Zhao|2022|p=64}} The incident nonetheless created negative feelings towards the United States by the Chinese public and increased public feelings of [[Chinese nationalism]].{{sfn|Zhao|2022|p=64}}
       
      Early on as President Bush increased arms sales to Taiwan, including 8 submarines. Bush's hostile position toward China was suddenly reversed after the [[September 11 attacks|11 September terrorist attacks]], and his friendly attitude toward Taiwan became a casualty. Soon he was calling China a strategic partner in the war on terror and postponing deals with Taiwan.<ref>Roberts, Guy (2011). "Circling the Middle Kingdom: George W. Bush and China 1999 – 2003". ''Australasian Journal of American Studies'' 30#1 pp. 57–71.</ref>
       
      Two PRC citizens died in the attacks on the [[World Trade Center (1973–2001)|World Trade Center]].<ref>{{cite book|author=Chi Wang|title=George W. Bush and China: Policies, Problems, and Partnerships|url=https://books.google.com/books?id=z_EBv8aeaRoC|year=2008|publisher=Lexington Books|isbn=9780739131640}}</ref> Chinese leader Jiang Zemin sent a telegram to Bush within hours of the attack expressing China's condolences and opposition to terror; Bush responded with a phone call the next day stating that he looked forward to working with Jiang and other world leaders to oppose terrorism.{{sfn|Zhao|2022|p=64}} Chinese companies and individuals also sent expressions of condolences to their American counterparts. The PRC, itself troubled by Muslim separatists in Xinjiang, offered strong public support for the [[war on terror]] in [[APEC China 2001]]. The PRC voted in favor of [[United Nations Security Council Resolution 1373|UNSCR 1373]], publicly supported the [[United States invasion of Afghanistan|coalition campaign]] in [[Islamic Emirate of Afghanistan|Afghanistan]],<ref>{{cite web|url=https://2009-2017.state.gov/outofdate/bgn/china/29871.htm|title=U.S. State Department – China (03/03)|publisher=state.gov|access-date=6 June 2011|archive-date=25 May 2019|archive-url=https://web.archive.org/web/20190525030335/https://2009-2017.state.gov/outofdate/bgn/china/29871.htm|url-status=live}}</ref> and contributed $150 million of bilateral assistance to [[Reconstruction in Afghanistan|Afghan reconstruction]] following the defeat of the [[Taliban]]. Shortly after the 11 September terrorist attacks, the U.S. and PRC also commenced a counterterrorism dialogue. In a March 2002 trip to Beijing, Bush articulated his desire for a "constructive, cooperative, and candid" relationship with China.{{sfn|Zhao|2022|p=64}} The third round of that dialogue was held in Beijing in February 2003.
       
      In the United States, the threat of terrorist attacks by [[al-Qaeda]] greatly changed the nature of its security concerns.{{sfn|Zhao|2022|p=64}} It was no longer plausible to argue, as the [[Blue Team (U.S. politics)|Blue Team]] had earlier asserted, that the PRC was the primary security threat to the United States, and the need to focus on the [[Middle East]] and the war on terror made the avoidance of potential distractions in East Asia a priority for the United States.
       
      There were initial fears among the PRC leadership that the war on terrorism would lead to an anti-PRC effort by the U.S., especially as the U.S. began establishing bases in [[Central Asia]]n countries like [[Uzbekistan]] and [[Tajikistan]] and renewed efforts against [[Iraq]]. The Chinese government was relieved after the United States tied up major national resources with its [[2003 invasion of Iraq]].{{sfn|Zhao|2022|p=65}} China believed that the United States' Middle East meant that the United States would need China's help on issues such as counterterrorism, Middle Eastern stability, and nuclear non-proliferation and viewed the United States' focus as conducive to China's emphasis on stability and domestic development.{{sfn|Zhao|2022|p=65}}
       
      China and the United States worked closely on regional issues, including those pertaining to North Korea and its [[North Korea and weapons of mass destruction|nuclear weapons program]]. China has stressed its opposition to North Korea's decision to withdraw from the [[Treaty on the Non-Proliferation of Nuclear Weapons]], its concerns over North Korea's nuclear capabilities, and its desire for a non-nuclear [[Korean Peninsula]]. It also voted to refer North Korea's noncompliance with its [[International Atomic Energy Agency]] obligations to the UN Security Council.
       
      In 2001, a presidential plane built in the United States for Chinese leader Jiang Zemin was found to have listening devices installed.<ref>{{Cite book|last=Brown|first=Kerry|title=China Incorporated: The Politics of a World Where China is Number One|date=2023|publisher=[[Bloomsbury Academic]]|isbn=978-1-350-26724-4|location=London|author-link=Kerry Brown (historian)}}</ref>{{Rp|page=53}} Chinese authorities located at least 20 devices, including one in the headboard of the presidential bed.<ref name="Chu-2002">{{Cite web|date=19 January 2002|title=Jiang's U.S.-Built Plane Is Reportedly Bugged|url=https://www.latimes.com/archives/la-xpm-2002-jan-19-mn-23654-story.html|access-date=3 November 2023|website=Los Angeles Times |archive-date=3 November 2023|archive-url=https://web.archive.org/web/20231103135639/https://www.latimes.com/archives/la-xpm-2002-jan-19-mn-23654-story.html|url-status=live}}</ref> The listening devices were capable of being operated via satellite.<ref name="Chu-2002" />
       
      In the mid-2000s, the United States focused relatively less on China issues.<ref name="Crean-2024" />{{Rp|page=158}} This approach was reinforced by the economic benefits to the United States from its relations with China, including cheaper consumer products like clothing and electronics.<ref name="Crean-2024" />{{Rp|page=158}} During this period, the United States also issued significant debt to fund its military interventions and China became the largest foreign purchaser of U.S. government debt.<ref name="Crean-2024" />{{Rp|page=158}}
       
      Taiwan remained a volatile issue, but one that remained under control. The United States policy toward Taiwan involved emphasizing the [[Four Noes and One Without]]. On occasion the United States rebuked Republic of China (Taiwan) President [[Chen Shui-bian]] for provocative pro-independence rhetoric.{{sfn|Zhao|2022|p=65}} As Bush made his opposition to Taiwan independence clear, the PRC saw the United States as playing a positive role in restraining the separatist movement.{{sfn|Zhao|2022|p=65}} In 2005, the PRC passed the [[Anti-Secession Law]] which stated that the PRC would be prepared to resort to "non-peaceful means" if Taiwan declared formal independence. Many critics of the PRC, such as the Blue Team, argue that the PRC was trying to take advantage of the U.S. war in Iraq to assert its claims on Republic of China's territory. In 2008, Taiwan voters elected Ma Ying-jeou. Ma, representing the Kuomintang, campaigned on a platform that included rapprochement with mainland China. His election has significant implications for the future of cross-strait relations.<ref>{{cite web|date=31 March 2008|title=US-China Institute :: USCI Symposium Explores The Taiwan Vote|url=http://china.usc.edu/ShowArticle.aspx?articleID=986|access-date=2 December 2010|publisher=[[USC Annenberg School for Communication and Journalism]]|archive-date=5 March 2014|archive-url=https://web.archive.org/web/20140305213140/http://china.usc.edu/ShowArticle.aspx?articleID=986|url-status=live}}</ref>
       
      The 2003 United States invasion of Iraq and the failure of the United States to find evidence of weapons of mass destruction decreased China's respect for America's power and realism.{{sfn|Lampton|2024|p=334}}
       
      China's paramount leader [[Hu Jintao]] visited the United States in April 2006.<ref>{{cite web|url=http://china.usc.edu/ShowArticle.aspx?articleID=442|title=Text of Pres. Bush's welcome|publisher=China.usc.edu|access-date=2 December 2010|archive-date=11 February 2009|archive-url=https://web.archive.org/web/20090211110418/http://china.usc.edu/ShowArticle.aspx?articleID=442|url-status=live}}</ref> Bush visited Beijing in August for four days to attend the [[2008 Summer Olympics]]. The president and his wife Laura were accompanied by Bush's father, the former president, and his mother Barbara.<ref>Jean Edward Smith, ''Bush'' (2016) pp 646-649.</ref>
       
      ===Obama administration (2009–2017)===
      {{Main|Foreign policy of the Obama administration}}

      [[File:Wang Qishan ,Obama Basketball S&ED.jpg|thumb|Vice Premier [[Wang Qishan]] holds the autographed basketball given to him by President Obama following their Washington meeting 28 July 2009, to discuss the outcomes of the first [[U.S.–China Strategic and Economic Dialogue]]. Looking on at left is State Councilor [[Dai Bingguo]].<ref>{{cite web|url=http://china.usc.edu/ShowArticle.aspx?articleID=1557|title=Details and video from the meeting|publisher=China.usc.edu|access-date=2 December 2010|archive-date=1 March 2014|archive-url=https://web.archive.org/web/20140301024717/http://china.usc.edu/ShowArticle.aspx?articleID=1557|url-status=live}}</ref>]]
      The [[2008 United States presidential election|2008 U.S. presidential election]] centered on issues of war and economic recession, but candidates [[Barack Obama]] and [[John McCain]] also spoke extensively regarding U.S. policy toward China.<ref>Video and documents: Obama and China [http://china.usc.edu/ShowArticle.aspx?articleID=1198] {{Webarchive|url=https://web.archive.org/web/20090330035029/http://china.usc.edu/ShowArticle.aspx?articleID=1198|date=30 March 2009}}; McCain and China [http://china.usc.edu/ShowArticle.aspx?articleID=1197] {{Webarchive|url=https://web.archive.org/web/20140305213052/http://china.usc.edu/ShowArticle.aspx?articleID=1197|date=5 March 2014}}.</ref> Both favored cooperation with China on major issues, but they differed with regard to trade policy. Obama expressed concern that the value of China's currency was being deliberately set low to benefit China's exporters. McCain argued that free trade was crucial and was having a transformative effect in China. Still, McCain noted that while China might have shared interests with the US, it did not share American values.<ref>''The Economist'' 8 June 2013</ref>
       
      The election of Barack Obama in 2008 generated positive reactions from most locals and state-run media outlets in China.<ref>{{Cite news|last=Malcolm Moore|date=November 2008|title=Chinese entrepreneurs get Obama-mania|url=https://www.telegraph.co.uk/news/worldnews/barackobama/3397615/Chinese-entrepreneurs-get-Obama-mania.html|archive-url=https://ghostarchive.org/archive/20220112/https://www.telegraph.co.uk/news/worldnews/barackobama/3397615/Chinese-entrepreneurs-get-Obama-mania.html|archive-date=12 January 2022|url-access=subscription|url-status=live|access-date=23 November 2020|website=The Daily Telegraph}}{{cbignore}}</ref><ref>{{Cite news|date=October 2008|title=POLITICS-US: Online Poll Shows Obama a Hit in China|url=http://www.ipsnews.net/2008/10/politics-us-online-poll-shows-obama-a-hit-in-china/|access-date=23 November 2020|website=[[Inter Press Service]]|archive-date=7 November 2020|archive-url=https://web.archive.org/web/20201107121258/http://www.ipsnews.net/2008/10/politics-us-online-poll-shows-obama-a-hit-in-china/|url-status=live}}</ref><ref>{{Cite web|date=29 June 2016|title=Obama's international image remains strong in Europe and Asia|url=https://www.pewresearch.org/global/2016/06/29/2-obamas-international-image-remains-strong-in-europe-and-asia/|access-date=23 November 2020|website=Pew Research Center |archive-date=24 November 2020|archive-url=https://web.archive.org/web/20201124161345/https://www.pewresearch.org/global/2016/06/29/2-obamas-international-image-remains-strong-in-europe-and-asia/|url-status=live}}</ref> [[Presidency of Barack Obama|His presidency]] fostered hopes for increased co-operation and heightened levels of friendship between the two nations. On 8 November 2008, Chinese leader Hu Jintao and Obama shared a phone conversation in which Hu congratulated Obama on his election victory. During the conversation both parties agreed that the development of Sino-American relations is not only in the interest of both nations, but also in the interests of the international community.<ref>{{cite web|url=http://www.enghunan.gov.cn/wwwHome/200811/t20081109_146216.htm|title=President Hu Jintao and US President-elect Barack Obama Discuss over Telephone – Hunan Government|publisher=Enghunan.gov.cn|date=9 November 2008|access-date=2 December 2010|url-status=dead|archive-url=https://web.archive.org/web/20110721164349/http://www.enghunan.gov.cn/wwwHome/200811/t20081109_146216.htm|archive-date=21 July 2011}}</ref><ref>{{Cite news|date=11 November 2008|title=No call from Obama seen as slight to India|url=http://www.asiaone.com/News/Latest%2BNews/Asia/Story/A1Story20081111-99718.html|access-date=2 December 2010|website=[[Asiaone.com]], [[The Statesman (India)]]|archive-date=25 February 2021|archive-url=https://web.archive.org/web/20210225042727/https://www.asiaone.com/News/Latest%2BNews/Asia/Story/A1Story20081111-99718.html|url-status=live}}</ref><ref>{{Cite news|url=http://www.asianewsnet.net/news.php?id=2540&sec=1|title=Asia News Network – Xchange Tool|url-status=usurped|archive-url=https://web.archive.org/web/20110615161849/http://www.asianewsnet.net/news.php?id=2540&sec=1|archive-date=15 June 2011}}</ref>
       
      During the Obama administration, the U.S. signed more bilateral agreements with China than it had during any other U.S. administration, particularly with regard to addressing climate change.<ref name="Lewis-2023">{{Cite book|last=Lewis|first=Joanna I.|title=Cooperating for the Climate: Learning from International Partnerships in China's Clean Energy Sector|date=2023|publisher=The [[MIT Press]]|isbn=978-0-262-54482-5|location=Cambridge, Massachusetts}}</ref>{{Rp|page=2}} The two countries signed seven clean energy agreements on 17 November 2009, during Obama's visit to China, including an agreement establishing the [[US–China Clean Energy Research Center|U.S.-China Clean Energy Research Center]] (CERC).<ref name="Lewis-2023" />{{Rp|page=|pages=122–123}} CERC was the most ambitious clean energy technology cooperation mechanism between the two.<ref name="Lewis-2023" />{{Rp|page=117}} The many technical exchanges on climate issues during the Obama era helped both sides of the relationship to better understand each other's [[Greenhouse gas emissions|emissions]] models and data, leading to increased mutual trust.<ref name="Lewis-2023" />{{Rp|page=105}}
       
      [[File:Obama and Wen Jiabao.jpg|thumb|right|Obama meets with Chinese Premier [[Wen Jiabao]] and members of the Chinese delegation after a bilateral meeting at the United Nations in New York City in September 2010.]]
      Following the [[2008 financial crisis]], both U.S. and Chinese governments addressed the economic downturn with massive stimulus initiatives. The Chinese expressed concern that "Buy American" components of the U.S. plan discriminate against foreign producers, including those in China.<ref>{{cite web|url=http://china.usc.edu/ShowArticle.aspx?articleID=1329|title=US-China Institute :: news & features :: making american policy toward china – scholars and policy makers on economics, security, and climate change|publisher=China.usc.edu|access-date=2 December 2010|archive-date=8 July 2012|archive-url=https://archive.today/20120708034849/http://china.usc.edu/ShowArticle.aspx?articleID=1329|url-status=live}}</ref>
       
      As the two most influential and powerful countries in the world, there have been increasingly strong suggestions within American political circles of creating a [[Group of Two|G-2]] (Chimerica) relationship for the United States and China to work out solutions to global problems together.<ref>{{cite web|author=Boston Study Group on Middle East Peace|url=http://www.fpa.org/topics_info2414/topics_info_show.htm?doc_id=912530|title=Foreign Policy Association: Resource Library: Viewpoints: Moving the G-2 Forward|publisher=Fpa.org|access-date=2 December 2010|archive-date=9 September 2021|archive-url=https://web.archive.org/web/20210909221729/https://www.fpa.org/topics_info2414/topics_info_show.htm?doc_id=912530|url-status=live}}</ref>
       
      The [[Strategic Economic Dialogue]] initiated by then-US President Bush and Hu and led by U.S. Treasury Secretary [[Henry Paulson]] and Chinese Vice Premier [[Wu Yi (politician)|Wu Yi]] in 2006 was broadened by the [[Presidency of Barack Obama|Obama administration]] into the [[U.S.–China Strategic and Economic Dialogue]].<ref name="Roach-2022" />{{Rp|page=288}} It was then led by U.S. Secretary of State [[Hillary Clinton]] and U.S. Secretary of the Treasury [[Timothy Geithner]] for the United States and Vice Premier [[Wang Qishan]] and Chinese State Councilor [[Dai Bingguo]] for China. The focus of the first set of meetings in July 2009 was in response to the economic crisis, finding ways to cooperate to stem global warming and addressing issues such as the proliferation of nuclear weapons and humanitarian crises.<ref>{{cite web|url=http://china.usc.edu/ShowArticle.aspx?articleID=1557|title=Economic Crisis, Looming Environmental Threats, and Growing Nuclear Weapons Worries -- All in a Day's Work at the Strategic and Economic Dialogue 中美战略与经济对话|publisher=China.usc.edu|access-date=2 December 2010|archive-date=1 March 2014|archive-url=https://web.archive.org/web/20140301024717/http://china.usc.edu/ShowArticle.aspx?articleID=1557|url-status=live}}</ref>
       
      [[File:P011911SA-0499 (5376833854).jpg|thumb|left|Obama meets with Chinese leader [[Hu Jintao]] in January 2011.]]
      Obama visited China on 15–18 November 2009 to discuss economic worries, concerns over nuclear weapon proliferation, and the need for action against climate change.<ref>The aims and challenges of the trip were summarized by the USC US-China Institute: [http://china.usc.edu/ShowArticle.aspx?articleID=1902] {{Webarchive|url=https://web.archive.org/web/20140305214438/http://china.usc.edu/ShowArticle.aspx?articleID=1902|date=5 March 2014}}, [http://china.usc.edu/ShowArticle.aspx?articleID=1873] {{Webarchive|url=https://web.archive.org/web/20140305214703/http://china.usc.edu/ShowArticle.aspx?articleID=1873|date=5 March 2014}}.</ref><ref>{{cite web|title=Instant Analysis: Reporting on U.S. Presidents in China|url=http://china.usc.edu/ShowArticle.aspx?articleID=1895|access-date=2 December 2010|publisher=China.usc.edu|archive-date=28 May 2010|archive-url=https://web.archive.org/web/20100528104746/http://china.usc.edu/ShowArticle.aspx?articleID=1895|url-status=live}}</ref>
       
      In January 2010, the U.S. proposed a $6.4 billion arms sale to the Republic of China (Taiwan). In response, the PRC threatened to impose sanctions on U.S. companies supplying arms to Taiwan and suspend cooperation on certain regional and international issues.<ref>{{cite news|date=30 January 2010|title=China hits back at U.S. over Taiwan weapons sale|work=BBC News|url=https://news.bbc.co.uk/2/hi/americas/8488765.stm|access-date=2 December 2010|archive-date=18 November 2010|archive-url=https://web.archive.org/web/20101118221635/http://news.bbc.co.uk/2/hi/americas/8488765.stm|url-status=live}}</ref>
       
      On 19 February 2010, Obama met with the [[14th Dalai Lama|Dalai Lama]], accused by China of "fomenting unrest in [[Tibet Autonomous Region|Tibet]]." After the meeting, China summoned the U.S. ambassador to China, [[Jon Huntsman Jr.|Jon Huntsman]],<ref>{{Cite news|last=Macartney|first=Jane|date=19 February 2010|title=China summons US Ambassador over Dalai Lama's meeting with Obama|work=[[The Times]]|location=London|url=http://www.timesonline.co.uk/tol/news/world/us_and_americas/article7033132.ece|access-date=12 July 2010}}{{dead link|date=September 2024|bot=medic}}{{cbignore|bot=medic}}</ref> but ''[[Time (magazine)|Time]]'' has described the Chinese reaction as "muted", speculating that it could be because "the meeting came during the [[Chinese New Year]]... when most officials are on leave". Some activists criticized Obama for the relatively low profile of the visit.<ref>{{Cite news|url=http://www.time.com/time/world/article/0,8599,1966629,00.html|archive-url=https://web.archive.org/web/20100220230852/http://www.time.com/time/world/article/0,8599,1966629,00.html|url-status=dead|archive-date=20 February 2010|title=In China, Muted Reaction to Dalai Lama's Visit|first=Austin|last=Ramzy|publisher=[[Time (magazine)|Time magazine]]|date=19 February 2010|access-date=12 July 2010}}</ref>
       
      [[File:Secretary Kerry and Chinese Premier Li Shake Hands Before Their Meeting (10170270646).jpg|thumb|left|U.S. Secretary of State [[John Kerry]] speaks with Chinese Premier [[Li Keqiang]], 9 October 2013.]]
      In 2012, the PRC criticized Obama's new defense strategy, which it said was aimed at isolating China in East Asia.<ref>Lee, Mj. [https://www.politico.com/story/2012/01/china-fires-at-new-us-defense-plan-071233 "China fires at new U.S. defense plan."]  ''[[Politico]]'', 9 January 2012.</ref> Obama is looking to increase U.S. military influence in the area with a rotating presence of forces in friendly countries.<ref>Whitlock, Craig. [https://www.washingtonpost.com/world/national-security/philippines-may-allow-greater-us-presence-in-latest-reaction-to-chinas-rise/2012/01/24/gIQAhFIyQQ_story.html "Philippines may allow greater U.S. military presence in reaction to China's rise."] {{Webarchive|url=https://web.archive.org/web/20170715212230/https://www.washingtonpost.com/world/national-security/philippines-may-allow-greater-us-presence-in-latest-reaction-to-chinas-rise/2012/01/24/gIQAhFIyQQ_story.html|date=15 July 2017}} ''The Washington Post'', 25 January 2012.</ref>
       
      In March 2012, China suddenly began cutting back its purchases of oil from Iran, which along with some signs on sensitive security issues like [[Syria]] and North Korea, showed some coordination with the Obama administration.<ref>{{cite news|title=U.S. Sees Positive Signs From China on Security Issues|url=https://www.nytimes.com/2012/04/27/world/asia/us-is-seeing-positive-signs-from-chinese.html|access-date=9 November 2012|newspaper=The New York Times|date=26 April 2012|author=Mark Landler and Steven Lee Myers|archive-date=12 May 2012|archive-url=https://web.archive.org/web/20120512221307/http://www.nytimes.com/2012/04/27/world/asia/us-is-seeing-positive-signs-from-chinese.html|url-status=live}}</ref>
       
      In March 2013, the U.S. and China agreed to impose stricter sanctions on North Korea for conducting nuclear tests, which sets the stage for UN Security Council vote. Such accord might signal a new level of cooperation between the U.S. and China.<ref>{{cite news| url=https://www.bloomberg.com/news/2013-03-07/china-u-s-accord-sets-un-vote-on-north-korea-sanctions.html| work=Bloomberg| title=China-U.S. Accord Sets UN Vote on North Korea Sanctions| access-date=6 March 2017| archive-date=5 September 2014| archive-url=https://web.archive.org/web/20140905161716/http://www.bloomberg.com/news/2013-03-07/china-u-s-accord-sets-un-vote-on-north-korea-sanctions.html| url-status=live}}</ref>
       
      [[File:Vice President Biden Raises a Toast in Honor of Chinese President Xi at a State Luncheon at the State Department (21723827681).jpg|thumb|U.S. Secretary of State John Kerry and Vice President [[Joe Biden]] with Chinese leader Xi Jinping, 25 September 2015]]
      In an effort to build a "new model" of relations, Obama met Chinese leader [[Xi Jinping]] for two days of meetings, between 6 and 8 June 2013, at the [[Sunnylands]] estate in [[Rancho Mirage]], California.<ref name="Calms Myers NYT">{{cite news|last=Calmes|first=Jackie and Steven Lee Myers|title=U.S. and China Move Closer on North Korea, but Not on Cyberespionage|url=https://www.nytimes.com/2013/06/09/world/asia/obama-and-xi-try-building-a-new-model-for-china-us-ties.html|access-date=11 June 2013|newspaper=The New York Times|date=8 June 2013|archive-date=10 June 2013|archive-url=https://web.archive.org/web/20130610230446/http://www.nytimes.com/2013/06/09/world/asia/obama-and-xi-try-building-a-new-model-for-china-us-ties.html|url-status=live}}</ref> The summit was considered "the most important meeting between an [[American president]] and a [[Leader of the Chinese Communist Party|Chinese Communist leader]] in 40 years, since President Nixon and Chairman [[Mao Zedong|Mao]]," according to [[Joseph Nye]], a political scientist at Harvard University.<ref name="Sanger NYT">{{cite news|last=Sanger|first=David E.|title=Obama and Xi Try to Avoid a Cold War Mentality|url=https://www.nytimes.com/2013/06/10/world/asia/obama-and-xi-try-to-avoid-a-cold-war-mentality.html|newspaper=The New York Times|date=9 June 2013|access-date=6 February 2017|archive-date=24 December 2016|archive-url=https://web.archive.org/web/20161224123355/http://www.nytimes.com/2013/06/10/world/asia/obama-and-xi-try-to-avoid-a-cold-war-mentality.html|url-status=live}}</ref> The leaders concretely agreed to [[climate change mitigation|combat climate change]] and also found strong mutual interest in curtailing North Korea's [[North Korea and weapons of mass destruction|nuclear program]].<ref name="Sanger NYT"/> However, the leaders remained sharply divided over cyber espionage and U.S. arms sales to Taiwan. Xi was dismissive of American complaints about cyber security.<ref name="FT McGregor">{{cite news|last=McGregor|first=Richard|title=Obama-Xi summit presented as a walk in the park|url=http://www.ft.com/intl/cms/s/0/a47cc686-d118-11e2-be7b-00144feab7de.html#axzz2VwWJHEKV|archive-url=https://ghostarchive.org/archive/20221210201220/https://www.ft.com/content/a47cc686-d118-11e2-be7b-00144feab7de#axzz2VwWJHEKV|archive-date=10 December 2022|url-access=subscription|access-date=11 June 2013|newspaper=Financial Times|date=10 June 2013|url-status=live}}</ref> [[Thomas E. Donilon|Tom Donilon]], the outgoing U.S. [[National Security Advisor (United States)|National Security Adviser]], stated that cyber security "is now at the center of the relationship", adding that if China's leaders were unaware of this fact, they know now.<ref name="FT McGregor"/>
       
      [[File:Xi Jinping and Barack Obama toast at White House state dinner September 2015.jpg|thumb|left|U.S. President Barack Obama and Chinese leader Xi Jinping in September 2015]]
       
      Obama supported the [[One-China policy]].<ref>"[https://www.reuters.com/article/us-usa-trump-taiwan-obama-idUSKBN13S013?il=0 White House: no change to 'one China' policy after Trump call with Taiwan] {{Webarchive|url=https://web.archive.org/web/20180711091802/https://www.reuters.com/article/us-usa-trump-taiwan-obama-idUSKBN13S013?il=0|date=11 July 2018}}". Reuters. 2 December 2016.</ref> In 2014, Obama stated that "We recognize Tibet as part of the People's Republic of China. We are not in favor of [[Tibetan independence movement|independence]]."<ref>"[https://obamawhitehouse.archives.gov/the-press-office/2014/11/12/remarks-president-obama-and-president-xi-jinping-joint-press-conference Remarks by President Obama and President Xi Jinping in Joint Press Conference] {{Webarchive|url=https://web.archive.org/web/20170122023504/https://obamawhitehouse.archives.gov/the-press-office/2014/11/12/remarks-president-obama-and-president-xi-jinping-joint-press-conference|date=22 January 2017}}". 23 November 2014.</ref>
       
      Beginning in 2015, China's [[People's Liberation Army Air Force]] began patrolling the South China Sea, including the disputed [[Paracel Islands|Paracel]] and [[Spratly Islands]].<ref name=":Li">{{Cite book|last=Li|first=Xiaobing|title=China under Xi Jinping: A New Assessment|publisher=[[Leiden University Press]]|year=2024|isbn=9789087284411|editor-last=Fang|editor-first=Qiang|chapter=Beijing's Military Power and East Asian-Pacific Hot Spots|editor-last2=Li|editor-first2=Xiaobing}}</ref>{{Rp|page=273}} In China's view, these disputed areas are within its [[Air defense identification zone|Air Defense Identification Zone]] (ADIZ).<ref name=":Li" />{{Rp|page=273}} The [[United States Air Force]] does not accept this view, and flies its military planes through the area without informing China.<ref name=":Li" />{{Rp|page=273}}
       
      In May 2015, [[United States Secretary of Defense|U.S. Secretary of Defense]] [[Ashton Carter]] warned China to halt its rapid [[Territorial disputes in the South China Sea|island-building]] in the [[South China Sea]].<ref>"[https://www.washingtonpost.com/news/checkpoint/wp/2015/05/27/defense-secretarys-warning-to-china-u-s-military-wont-change-operations/ Defense secretary's warning to China: U.S. military won't change operations] {{Webarchive|url=https://web.archive.org/web/20181030131220/https://www.washingtonpost.com/news/checkpoint/wp/2015/05/27/defense-secretarys-warning-to-china-u-s-military-wont-change-operations/|date=30 October 2018}}". ''[[The Washington Post]]''. 27 May 2015.</ref>
       
      Obama hosted Xi for a bilateral meeting on the margins of the Nuclear Security Summit on 31 March 2016.<ref>{{cite web|url=https://obamawhitehouse.archives.gov/the-press-office/2016/03/24/statement-press-secretary-bilateral-meeting-president-xi-jinping-peoples|work=[[whitehouse.gov]]|title=Statement by the Press Secretary on Bilateral Meeting with President Xi Jinping of the People's Republic of China|via=[[NARA|National Archives]]|date=24 March 2016|access-date=1 March 2021|archive-date=10 March 2021|archive-url=https://web.archive.org/web/20210310161939/https://obamawhitehouse.archives.gov/the-press-office/2016/03/24/statement-press-secretary-bilateral-meeting-president-xi-jinping-peoples|url-status=live}}</ref>
       
      ===First Trump administration (2017–2021)===
      {{see also|Foreign policy of the first Trump administration#China, Taiwan, and the South China Sea|Tariffs in the first Trump administration|China–United States trade war}}
       
      [[File:President Xi Jinping Greets Secretary Tillerson (33139050550).jpg|thumb|Secretary of State [[Rex Tillerson]] shakes hands with Chinese leader Xi Jinping upon arrival in Beijing, 19 March 2017.]]
      [[File:Secretary Pompeo Meets With Chinese President Xi Jinping in Beijing (40985611020).jpg|thumb|Secretary of State [[Mike Pompeo]] shakes hands with Chinese leader Xi Jinping upon arrival in Beijing, 14 June 2018.]]
      During his presidential campaign, [[Donald Trump]] promised an assertive stance towards China. The presidency of Trump led to a negative shift in U.S. relations with China.<ref>{{Cite news| last1=Allen-Ebrahimian| first1=Bethany| title=Special report: Trump's U.S.-China transformation| url=https://www.axios.com/trump-china-policy-special-report-154fa5c2-469d-4238-8d72-f0641abc0dfa.html| date=19 January 2021| work=[[Axios (website)|Axios]]| access-date=31 January 2021| archive-date=29 January 2021| archive-url=https://web.archive.org/web/20210129173516/https://www.axios.com/trump-china-policy-special-report-154fa5c2-469d-4238-8d72-f0641abc0dfa.html| url-status=live}}</ref>
       
      President-elect Trump's telephone conversation with the president of Taiwan [[Tsai Ing-wen]] on 2 December 2016 was the first such contact with Taiwan by an American president-elect or president since 1979. It provoked Beijing to lodge a diplomatic protest ("stern representations").<ref>{{cite news|url=https://www.reuters.com/article/us-usa-trump-taiwan/trump-speaks-to-taiwans-president-financial-times-idUSKBN13R2NT|title=China lodges protest after Trump call with Taiwan president|date=4 December 2016|newspaper=Reuters|access-date=17 November 2017|archive-date=17 November 2017|archive-url=https://web.archive.org/web/20171117174647/https://www.reuters.com/article/us-usa-trump-taiwan/trump-speaks-to-taiwans-president-financial-times-idUSKBN13R2NT|url-status=live}}</ref><ref name="taiw">{{cite news|url=https://www.reuters.com/article/us-usa-trump-china/trump-says-u-s-not-necessarily-bound-by-one-china-policy-idUSKBN1400TY|title=Trump says U.S. not necessarily bound by 'one China' policy|date=12 December 2016|newspaper=Reuters|access-date=17 November 2017|archive-date=14 November 2017|archive-url=https://web.archive.org/web/20171114231730/https://www.reuters.com/article/us-usa-trump-china/trump-says-u-s-not-necessarily-bound-by-one-china-policy-idUSKBN1400TY|url-status=live}}</ref> Trump went on to clarify his move: "I fully understand the [[One-China policy|'one China' policy]], but I don't know why we have to be bound by a 'one China' policy unless we make a deal with China having to do with other things, including trade."<ref name="taiw" />
       
      On President Trump's inauguration day, an official from the China's People's Liberation Army wrote on the official website that the American military build-up in East Asia and the Asia Pacific, and its push to arm South Korea with the [[Terminal High Altitude Area Defense|THAAD]] missile-defense system were provocative "hot spots getting closer to ignition" and that the chances of war had become "more real."<ref>{{Cite news|url=http://www.businessinsider.com/chinese-military-official-war-2017-1|title=Chinese military official warns that war with U.S. under Trump is becoming a 'practical reality'|website=[[Business Insider]]|access-date=7 February 2017|archive-date=8 February 2017|archive-url=https://web.archive.org/web/20170208133600/http://www.businessinsider.com/chinese-military-official-war-2017-1|url-status=live}}</ref><ref>{{Cite news|url=https://www.scmp.com/news/china/diplomacy-defence/article/2065799/china-steps-preparedness-possible-military-conflict-us|title=China 'steps up preparedness for possible military conflict with US'|date=26 January 2017|access-date=31 January 2017|archive-date=27 February 2019|archive-url=https://web.archive.org/web/20190227055308/https://www.scmp.com/news/china/diplomacy-defence/article/2065799/china-steps-preparedness-possible-military-conflict-us|url-status=live}}</ref>
       
      On taking office, the Trump administration stopped negotiations on a [[bilateral investment treaty]] with China which had begun in 2008.<ref name="Roach-2022" />{{Rp|page=312}} According to [[Michael Froman]], the lead negotiator during the preceding four years, the effort to reach an agreement was "more than 90 percent complete."<ref name="Roach-2022" />{{Rp|page=312}}
       
      On 23 January, speaking about China's claims to sovereignty over the [[Spratly Islands]] in the [[South China Sea]], White House spokesman [[Sean Spicer]] said, "It's a question of if those islands are in fact in international waters and not part of China proper, then yeah, we're going to make sure that we defend international territories from being taken over by one country."<ref>{{cite news|url=https://www.reuters.com/article/us-usa-china-southchinasea/u-s-says-will-prevent-china-taking-over-territory-in-international-waters-idUSKBN1572M4|title=China says will protect South China Sea sovereignty|date=24 January 2017|newspaper=Reuters|access-date=17 November 2017|archive-date=17 November 2017|archive-url=https://web.archive.org/web/20171117175042/https://www.reuters.com/article/us-usa-china-southchinasea/u-s-says-will-prevent-china-taking-over-territory-in-international-waters-idUSKBN1572M4|url-status=live}}</ref>
       
      [[File:President Trump's Trip to Asia (37575409684).jpg|thumb|left|President Trump arrives in China in November 2017.]]
      On 4 January, on a visit to Japan, U.S. Defense Secretary [[James Mattis]] reaffirmed Washington's commitment under the [[Treaty of Mutual Cooperation and Security between the United States and Japan]] to defending Japan, including the [[Senkaku Islands]] (the [[East China Sea]]) that are claimed by China.<ref>{{Cite news|url=https://edition.cnn.com/2017/02/03/asia/us-defense-secretary-mattis-japan-visit/|title=Mattis: U.S. will defend Japanese islands claimed by China|first=Brad|last=Lendon|date=4 February 2017|work=CNN|access-date=7 February 2017|archive-date=13 August 2018|archive-url=https://web.archive.org/web/20180813123854/https://edition.cnn.com/2017/02/03/asia/us-defense-secretary-mattis-japan-visit/|url-status=live}}</ref>
       
      On 9 February, Trump spoke with China's leader Xi Jinping over the phone discussing a wide range of issues; Trump was said to have re-iterated the United States' commitment to the status quo 'one-China' policy.<ref>{{cite news|url=https://www.bbc.com/news/world-asia-china-38927891|title=Trump climbdown on 'One China' threats|work=BBC News|date=10 February 2017|access-date=22 June 2018|archive-date=28 May 2018|archive-url=https://web.archive.org/web/20180528200157/http://www.bbc.com/news/world-asia-china-38927891|url-status=live}}</ref>
       
      In a 3 July 2017 telephone conversation with Trump, Xi stated, "China-US relations have made great progress in recent days, but they have also been affected by some negative factors."<ref name="China-US tensions">{{cite news|last=Bodeen|first=Christopher|title=China's Xi warns Trump of 'negative factors' hurting US ties |publisher=Associated Press|date=3 July 2017|url=https://www.yahoo.com/news/chinas-xi-points-negative-factors-affecting-us-ties-071957481--politics.html|access-date=5 July 2017|archive-date=19 July 2017|archive-url=https://web.archive.org/web/20170719095004/https://www.yahoo.com/news/chinas-xi-points-negative-factors-affecting-us-ties-071957481--politics.html|url-status=dead}}</ref> By "negative factors", [[Geng Shuang]], a Chinese government spokesmen, explained in a televised briefing: "Under the pretext of navigational freedom, the American side once again sent military vessels into the Chinese territorial waters of Xisha ([[Paracel Islands|Paracel]]) Islands. It has violated Chinese and international law, infringed upon Chinese sovereignty, and disrupted order, peace and security of the relevant waters and put in jeopardy facilities and personnel on the relevant Chinese islands. It is a serious political and military provocation. The Chinese side is strongly dissatisfied with and firmly opposed to the relevant actions by the US."<ref name="China-US tensions" />
       
      In 2017, the Trump administration terminated the Joint Commission on Commerce and Trade (JCCT) between China and the United States.<ref name="Roach-2022" />{{Rp|pages=287–288}} The JCCT had met annually from 1983 to 2016 and had been a generally effective mechanism to address various trade issues between the two countries.<ref name="Roach-2022" />{{Rp|pages=287–288}} The Trump administration also terminated the Strategic and Economic Dialogue after holding the June 2017 meeting under the name "Comprehensive Economic Dialogue."<ref name="Roach-2022" />{{Rp|page=288}}
       
      According to ''Chaos Under Heaven'', a book by [[Josh Rogin]], a group of officials including [[Peter Navarro]], [[Stephen Miller (political advisor)|Stephen Miller]] and [[Steve Bannon]] that wanted Trump to "speed the downfall" of the [[Chinese Communist Party]] (CCP) and that "believed in economic nationalism, the return of manufacturing from abroad, and the protection of domestic industries, even at the expense of free trade" emerged during the early stage of the Trump administration.<ref name=":Tsang&Cheung">{{Cite book |last1=Rogin |first1=Josh |author-link=Josh Rogin |title=Chaos Under Heaven: Trump, Xi, and the Battle for the Twenty-First Century |publisher=[[Mariner Books]] |year=2021 |isbn=9780358393245 |pages=27–28}}</ref> The Trump administration labelled China a "strategic competitor" in 2017.<ref>{{Cite news |last=Long |first=Qiao |date=21 May 2020 |title=U.S. Signals Change in China Strategy to 'Defensive' And 'Competitive' Approach |url=https://www.rfa.org/english/news/china/usa-strategy-05212020151113.html |url-status=live |archive-url=https://web.archive.org/web/20200521211047/https://www.rfa.org/english/news/china/usa-strategy-05212020151113.html |archive-date=21 May 2020 |access-date=21 May 2020 |work=[[Radio Free Asia]]}}</ref><ref>{{Cite web |date=18 December 2017 |title=A New National Security Strategy for a New Era |url=https://trumpwhitehouse.archives.gov/articles/new-national-security-strategy-new-era/ |url-status=live |archive-url=https://web.archive.org/web/20210120194915/https://trumpwhitehouse.archives.gov/articles/new-national-security-strategy-new-era/ |archive-date=20 January 2021 |access-date=22 May 2020 |work=[[whitehouse.gov]] |via=[[NARA|National Archives]]}}</ref> 
       
      [[File:Donald Trump and Xi Jinping meets at 2018 G20 Summit.jpg|thumb|Chinese leader [[Xi Jinping]] with U.S. President [[Donald Trump]] at the [[2018 G20 Buenos Aires summit|G20 summit in Buenos Aires]], December 2018<ref name="Xi's title">{{Cite news |last=Churchill |first=Owen |date=25 July 2020 |title=US officials now call Xi Jinping 'general secretary' instead of China's 'president' – but why? |url=https://www.scmp.com/news/world/united-states-canada/article/3094669/us-officials-switch-calling-chinas-xi-jinping |url-status=live |archive-url=https://web.archive.org/web/20200724220251/https://www.scmp.com/news/world/united-states-canada/article/3094669/us-officials-switch-calling-chinas-xi-jinping |archive-date=24 July 2020 |access-date=25 July 2020 |website=[[South China Morning Post]]}}</ref>]]
       
      China enforced punitive tariffs on 128 categories of American goods on 1 April 2018 in retaliation for the [[First presidency of Donald Trump|first Trump administration]]'s national-security levies on steel and aluminum imports the previous month. The Chinese Government's response is measured, affecting $3 billion in annual trade or about 2% of U.S. goods exports to China. By late September 2018, the Trump administration had placed tariffs (25% tax increase) on $250 billion worth of Chinese goods, in an attempt to offset the trade imbalance between the two major economic world powers.
       
      In what put additional strain on U.S.-China relations, [[Huawei]]'s vice-chair and [[Chief financial officer|CFO]] [[Meng Wanzhou]] was arrested in Canada on 1 December 2018 at the behest of U.S. authorities.<ref>{{Cite news|url=https://www.cnn.com/2018/12/05/tech/huawei-cfo-arrested-canada/index.html|title=Huawei CFO Meng Wanzhou arrested in Canada|first=Julia |last=Horowitz|website=CNN|date=5 December 2018|access-date=25 October 2019|archive-date=4 March 2020|archive-url=https://web.archive.org/web/20200304064656/https://www.cnn.com/2018/12/05/tech/huawei-cfo-arrested-canada/index.html|url-status=live}}</ref> U.S. Senator [[Ben Sasse]] accused China of undermining [[National security of the United States|U.S. national security interests]], often "using private sector entities" to by-pass US sanctions against the sale of telecom equipment to Iran.<ref>{{cite news|title=Huawei finance chief Meng Wanzhou arrested in Canada|url=https://www.bbc.com/news/business-46462858|work=BBC News|date=6 November 2018|access-date=6 December 2018|archive-date=6 December 2018|archive-url=https://web.archive.org/web/20181206170423/https://www.bbc.com/news/business-46462858|url-status=live}}</ref>
       
      According to political analyst, Andrew Leung, "China is perceived as the antagonist and rival of the United States," and that China's economic growth is seen as a "threat to the world order underpinned by American dominance or American values."<ref>[[Al Jazeera Arabic|Al Jazeera]] ''Inside Story'', 8 December 2018, [https://www.youtube.com/watch?v=Bga1nIstT5Q Why is China's biggest technology company being targeted?], Minutes 12:55; 14:10-ff.</ref> He claimed, moreover, that the arrest of the [[CFO]] of Huawei on 1 December 2018 corresponded with the suspicious death on that same day of a leading Chinese national [[quantum physicist]] and venture capitalist at [[Stanford University]], [[Shoucheng Zhang]], who was on a [[H-1B visa]], giving rise to conspiracy theories.  In August 2018, the U.S. government signed an update to legislation for the [[Committee on Foreign Investment in the United States|Committee on Foreign Investment in the U.S]]., broadening governmental scrutiny to vetting [[Venture capital|VC]]-backed, and especially Chinese state-funded, investments in U.S. tech startups.<ref>{{cite news|last=Ren|first=Shuli|date=9 December 2018|title=Beyond Huawei, Scientist's Death Hurts China's Technology Quest |work=[[Bloomberg L.P.|Bloomberg]]|url=https://www.washingtonpost.com/business/beyond-huawei-scientists-death-hurts-chinas-technologyquest/2018/12/09/a59bf62a-fc2a-11e8-a17e-162b712e8fc2_story.html|url-status=dead|access-date=8 January 2019|archive-url=https://web.archive.org/web/20181210072316/https://www.washingtonpost.com/business/beyond-huawei-scientists-death-hurts-chinas-technologyquest/2018/12/09/a59bf62a-fc2a-11e8-a17e-162b712e8fc2_story.html|archive-date=10 December 2018}}</ref>
      [[File:Hong Kong IMG 20190831 155344 (48659677441).jpg|thumb|U.S. lawmakers from both parties have voiced their support for pro-democracy [[2019–20 Hong Kong protests|Hong Kong protests]] in 2019.]]
       
      [[File:President Trump at the G20 (48162296741).jpg|thumb|Chinese leader [[Xi Jinping]] with U.S. President [[Donald Trump]] at the [[2019 G20 Osaka summit|G20 summit in Osaka]], June 2019]]
      [[File:Signing Ceremony Phase One Trade Deal Between the U.S. & China (49391434906).jpg|thumb|President Donald Trump and [[Vice Premier of China|Vice Premier]] [[Liu He (politician)|Liu He]] sign the Phase One Trade Deal in January 2020.]]
      Both sides signed the US–China Phase One trade deal on 15 January.<ref>{{cite news|url=https://www.bloomberg.com/news/articles/2020-01-15/u-s-china-sign-phase-one-of-trade-deal-trump-calls-remarkable|title=U.S. and China Sign Phase One of Trade Deal|last1=Donnan|first1=Shawn|last2=Wingrove|first2=Josh|date=15 January 2020|newspaper=Bloomberg.com|last3=Mohsin|first3=Saleha|access-date=20 January 2020|archive-date=19 January 2020|archive-url=https://web.archive.org/web/20200119030159/https://www.bloomberg.com/news/articles/2020-01-15/u-s-china-sign-phase-one-of-trade-deal-trump-calls-remarkable|url-status=live}}</ref> Unlike other trade agreements, the agreement did not rely on arbitration through an [[intergovernmental organization]] like the [[World Trade Organization]], but rather through a bilateral mechanism.<ref>{{Cite news| last1=Davis| first1=Bob| title=U.S.-China Deal Could Upend the Way Nations Settle Disputes| url=https://www.wsj.com/articles/u-s-china-deal-could-upend-the-way-nations-settle-disputes-11579211598| date=16 January 2020| work=[[The Wall Street Journal]]| access-date=21 January 2020}}</ref><ref>{{Cite news| last1=Lawder| first1=David| title=In U.S.-China Phase 1 trade deal, enforcement may end in 'We quit'| url=https://www.reuters.com/article/us-usa-trade-china-enforcement/in-u-s-china-phase-1-trade-deal-enforcement-may-end-in-we-quit-idUSKBN1ZE2T1| date=15 January 2020| work=[[Reuters]] | access-date=21 January 2020}}</ref>
       
      ====Rapid deterioration of relations (2019–2020)====
      {{see also|Second Cold War}}
      [[Michael D. Swaine]] warned in 2019, "The often positive and optimistic forces, interests, and beliefs that sustained bilateral ties for decades are giving way to undue pessimism, hostility, and a zero-sum mindset in almost every area of engagement."<ref name=Swaine />
       
      {{blockquote|The U.S.-China relationship is confronting its most daunting challenge in the forty years since the two countries established diplomatic ties. Current trends portend steadily worsening relations over the long term, with increasingly adverse consequences for all actors involved. Specifically, Beijing and Washington are transitioning from a sometimes contentious yet mutually beneficial relationship to an increasingly antagonistic, mutually destructive set of interactions. The often positive and optimistic forces, interests, and beliefs that sustained bilateral ties for decades are giving way to undue pessimism, hostility, and a zero-sum mindset in almost every area of engagement.<ref name=Swaine>[[Michael D. Swaine|Swaine, Michael D.]] (16 January 2019). [https://carnegieendowment.org/posts/2019/01/a-relationship-under-extreme-duress-us-china-relations-at-a-crossroads?lang=en "A Relationship Under Extreme Duress: U.S.-China Relations at a Crossroads"]. ''Carnegie Endowment for International Peace''.</ref>}}
       
      According to two experts on U.S.-China relations, [[Rosemary Foot (writer)|Rosemary Foot]] and Amy King, the consensus of experts is that:
      :The relationship began to deteriorate in the second decade of the 21st century, and that the Trump administration has accelerated the deterioration. Explanations...have ranged over a large number of factors, all of which have played some role. Some relate to changes in official personnel in both the United States and China, others to the shifts and relative power between the two countries after the [[2008 financial crisis]], and yet others to China's greater determination to reform global governance institutions and to play more of a global leadership role.<ref>{{Cite journal|last1=Foot|first1=Rosemary|last2=King|first2=Amy|date=1 June 2019|title=Assessing the deterioration in China–U.S. relations: U.S. governmental perspectives on the economic-security nexus|journal=China International Strategy Review|volume=1|issue=1|pages=39–50|doi=10.1007/s42533-019-00005-y|issn=2524-5635|doi-access=free}}</ref>
       
      Foot and King emphasize China's aggressive efforts in developing cutting-edge technologies with significant military and commercial implications, while the United States sees the need to defend itself aggressively against technological theft.<ref>Foot and King, "Assessing the deterioration in China–US relations: US governmental perspectives on the economic-security nexus." (2019)</ref>
       
      U.S. academics have made various policy prescriptions for the United States within the context of its deteriorating relationship with China.<ref>{{cite news|last1=Walt|first1=Stephen M|title=Yesterday's Cold War Shows How to Beat China Today|url=https://foreignpolicy.com/2019/07/29/yesterdays-cold-war-shows-how-to-beat-china-today/|work=Foreign Policy |date=29 July 2019|access-date=9 September 2020|archive-date=22 September 2020|archive-url=https://web.archive.org/web/20200922181821/https://foreignpolicy.com/2019/07/29/yesterdays-cold-war-shows-how-to-beat-china-today/|url-status=live}}</ref><ref>{{cite news|last1=Dobriansky|first1=Paula J.|title=An Allied Plan to Depend Less on China|url=https://www.wsj.com/articles/an-allied-plan-to-depend-less-on-china-11588288513|agency=The Wall Street Journal|work=The Wall Street Journal|date=30 April 2020|quote=Washington and its partners in Asia should set up new supply chains, restructure trade relations, and start to create an international economic order that is less dependent on China. A multilateral "coalition of the willing" approach would better align trading ties with political and security relationships. It would also help India and nations in Southeast Asia develop more rapidly, becoming stronger U.S. partners.|access-date=9 September 2020|archive-date=3 August 2020|archive-url=https://web.archive.org/web/20200803161319/https://www.wsj.com/articles/an-allied-plan-to-depend-less-on-china-11588288513|url-status=live}}</ref><ref>{{cite news|last1=Friedberg|first1=Aaron L.|title=An Answer to Aggression|url=https://www.foreignaffairs.com/articles/china/2020-08-11/ccp-answer-aggression|work=Foreign Affairs|date=September–October 2020|quote=The aims of this approach should be twofold: first, to deny Beijing its immediate objectives, imposing costs, slowing the growth of China's power and influence, and reducing the threat it can pose to democracies and to an open international system; and second, by demonstrating the futility of China's current strategy, to change the calculations of its ruling elite, forcing them to eventually rethink both their foreign and their domestic policies. This will take time, and given Xi's obvious predispositions and commitments, success may well depend on changes in the top leadership of the CCP.|access-date=9 September 2020|archive-date=10 September 2020|archive-url=https://web.archive.org/web/20200910170234/https://www.foreignaffairs.com/articles/china/2020-08-11/ccp-answer-aggression|url-status=live}}</ref>
       
      According to [[Lawrence J. Lau]], a major cause of the deterioration is the growing battle between China and the United States for global economic and technological dominance. More generally, he argues, "It is also a reflection of the rise of populism, isolationism, nationalism and protectionism almost everywhere in the world, including in the US."<ref>Lawrence J. Lau, "The China–US Trade War and Future Economic Relations." ''China and the World'' (Lau Chor Tak Institute of Global Economics and Finance, 2019): 1–32. quote p. 3 [http://www.igef.cuhk.edu.hk/igef_media/working-paper/IGEF/igef%20working%20paper%20no.%2072%20english%20version.pdf online] {{Webarchive|url=https://web.archive.org/web/20200624111818/https://www.igef.cuhk.edu.hk/igef_media/working-paper/IGEF/igef%20working%20paper%20no.%2072%20english%20version.pdf|date=24 June 2020}}</ref> According to Ian Bremmer, the U.S. and China are in a technology cold war<ref>{{cite news|last1=Swaminathan|first1=Aarthi|title=US and China heading towards a cold war: Ian Bremmer|url=https://finance.yahoo.com/news/us-and-china-heading-towards-a-cold-war-ian-bremmer-182045322.html|agency=Yahoo News|date=28 May 2020|access-date=9 September 2020|archive-date=17 July 2020|archive-url=https://web.archive.org/web/20200717105629/https://finance.yahoo.com/news/us-and-china-heading-towards-a-cold-war-ian-bremmer-182045322.html|url-status=live}}</ref> and Trump's technology war against the PRC has been his administration's biggest foreign policy win, saying, "on the issue of tech decoupling that it was America out front with most allies on board."<ref>{{cite magazine|title=Trump's Biggest Foreign Policy Win So Far|url=https://time.com/5868095/trumps-biggest-foreign-policy-win/|magazine=Time|date=20 July 2020|access-date=9 September 2020|archive-date=9 September 2020|archive-url=https://web.archive.org/web/20200909213711/https://time.com/5868095/trumps-biggest-foreign-policy-win/|url-status=live}}</ref> According to [[Greg Autry]], an academic at the University of Southern California, Trump's China policy was working, pointing to increased revenue intakes by the Treasury Department and offshoring by U.S. manufacturing supply chains from China, and crediting the administration for being the first to fully recognize that globalization had not delivered for Americans and that China was an existential threat.<ref>{{cite news|title=Opinion: President Trump's China policy is working, but you'd never know that from media reports|url=https://www.latimes.com/opinion/story/2019-09-19/trump-china-tariffs-recession-peter-navarro-trade |work=Los Angeles Times|date=20 September 2019|access-date=9 September 2020|archive-date=26 September 2020|archive-url=https://web.archive.org/web/20200926001645/https://www.latimes.com/opinion/story/2019-09-19/trump-china-tariffs-recession-peter-navarro-trade|url-status=live}}</ref>
       
      Former Obama administration officials [[Samantha Power]] and [[Susan Rice]] have criticized China's actions on trade, over the Meng Wenzhou affair and in Hong Kong while simultaneously criticizing the Trump administration for inadequate pushback.<ref>{{cite news|last1=Galloway|first1=Anthony|date=24 November 2019|title='I fear something worse': Obama adviser on the danger of China and the need to stick by the US|work=[[Sydney Morning Herald]]|url=https://www.smh.com.au/politics/federal/i-fear-something-worse-obama-adviser-on-the-danger-of-china-and-the-need-to-stick-by-the-us-20191121-p53cpr.html|access-date=9 September 2020|archive-date=28 August 2020|archive-url=https://web.archive.org/web/20200828194412/https://www.smh.com.au/politics/federal/i-fear-something-worse-obama-adviser-on-the-danger-of-china-and-the-need-to-stick-by-the-us-20191121-p53cpr.html|url-status=live}}</ref><ref>{{cite news|date=3 November 2019|title=Susan Rice on Trump, impeachment and why Canada shouldn't back down to China|publisher=[[CBC News]]|url=https://www.cbc.ca/news/world/susan-rice-the-national-interview-trump-impeachment-canada-china-huawei-1.5346230|access-date=9 September 2020|archive-date=28 August 2020|archive-url=https://web.archive.org/web/20200828141649/https://www.cbc.ca/news/world/susan-rice-the-national-interview-trump-impeachment-canada-china-huawei-1.5346230|url-status=live}}</ref><ref>{{cite news|title=Team Biden's Policies on China and Taiwan|url=https://thediplomat.com/2020/07/team-bidens-policies-on-china-and-taiwan/|work=The Diplomat|date=16 July 2020|access-date=9 September 2020|archive-date=7 September 2020|archive-url=https://web.archive.org/web/20200907165804/https://thediplomat.com/2020/07/team-bidens-policies-on-china-and-taiwan/|url-status=live}}</ref><ref>{{cite news|title=China's leadership is 'not scared of Donald Trump' on trade: Susan Rice|url=https://finance.yahoo.com/news/susan-rice-on-trump-and-china-125627961.html|agency=Yahoo Finance|date=18 October 2019|access-date=9 September 2020|archive-date=26 January 2021|archive-url=https://web.archive.org/web/20210126180037/https://finance.yahoo.com/news/susan-rice-on-trump-and-china-125627961.html|url-status=live}}</ref>
       
      In 2018, the U.S. Department of Justice initiated a "[[China Initiative]]" to "combat economic espionage".<ref>{{Cite web|last=Demers|first=John|date=11 February 2020|title=Report on the China Initiative, 2018-2019|url=https://china.usc.edu/us-department-justice-china-initiative-2018-2019|access-date=10 August 2020|website=USC U.S.-China Institute|archive-date=30 November 2021|archive-url=https://web.archive.org/web/20211130095918/https://china.usc.edu/us-department-justice-china-initiative-2018-2019|url-status=live}}</ref> DOJ ended the program on 23 February 2023.<ref>{{Cite web|last=Gerstein|first=Josh|title=DOJ shuts down China-focused anti-espionage program|url=https://www.politico.com/news/2022/02/23/doj-shuts-down-china-focused-anti-espionage-program-00011065|access-date=8 April 2023|website=Politico|date=23 February 2022 |archive-date=15 June 2022|archive-url=https://web.archive.org/web/20220615063648/https://www.politico.com/news/2022/02/23/doj-shuts-down-china-focused-anti-espionage-program-00011065|url-status=live}}</ref> No one was charged or convicted of spying in any China Initiative case.<ref>{{Cite news|date=14 December 2021|title=China Initiative Set Out to Catch Spies. It Didn't Find Many |work=Bloomberg |url=https://www.bloomberg.com/news/features/2021-12-14/doj-china-initiative-to-catch-spies-prompts-fbi-misconduct-racism-claims|access-date=8 April 2023|archive-date=14 December 2021|archive-url=https://web.archive.org/web/20211214134354/https://www.bloomberg.com/news/features/2021-12-14/doj-china-initiative-to-catch-spies-prompts-fbi-misconduct-racism-claims|url-status=live}}</ref>
       
      The [[Director of Policy Planning]] at the [[United States Department of State]], [[Kiron Skinner]] drew international attention in April 2019 for stating at a foreign policy forum that the U.S. competition with China would be especially bitter, because unlike the Cold War with the [[Soviet Union]] which is "a fight within the Western family", "it's the first time that we will have a great-power competitor that is not Caucasian".<ref>{{Cite news|website=Foreign Policy|url=https://foreignpolicy.com/2019/05/02/the-slip-that-revealed-the-real-trump-doctrine/|title=The Slip That Revealed the Real Trump Doctrine|date=2 May 2019|first=Paul|last=Musgrave|access-date=1 July 2021|archive-date=7 August 2019|archive-url=https://web.archive.org/web/20190807120404/https://foreignpolicy.com/2019/05/02/the-slip-that-revealed-the-real-trump-doctrine/|url-status=live}}</ref><ref>{{cite news|newspaper=Washington Post|url=https://www.washingtonpost.com/politics/2019/05/04/because-china-isnt-caucasian-us-is-planning-clash-civilizations-that-could-be-dangerous/|title=Because China isn't 'Caucasian,' the U.S. is planning for a 'clash of civilizations.' That could be dangerous.|date=4 May 2019|first=Steven|last=Ward|access-date=1 July 2021|archive-date=25 May 2021|archive-url=https://web.archive.org/web/20210525092227/https://www.washingtonpost.com/politics/2019/05/04/because-china-isnt-caucasian-us-is-planning-clash-civilizations-that-could-be-dangerous/|url-status=live}}</ref>
       
      In 2019, prominent Americans, including some with ties to the administration, formed the [[Committee on the Present Danger|Committee on the Present Danger: China (CPDC)]] to advocate for a more hawkish foreign policy against China.<ref name="Swanson">{{Cite news|last=Swanson|first=Ana|date=20 July 2019|title=A New Red Scare Is Reshaping Washington|url=https://www.nytimes.com/2019/07/20/us/politics/china-red-scare-washington.html|access-date=21 July 2019|newspaper=[[The New York Times]]|archive-date=20 July 2019|archive-url=https://web.archive.org/web/20190720234508/https://www.nytimes.com/2019/07/20/us/politics/china-red-scare-washington.html|url-status=live}}</ref><ref>{{cite news|last1=Rogin|first1=Josh|date=10 April 2019|title=China hawks call on America to fight a new Cold War|url=https://www.washingtonpost.com/opinions/2019/04/10/china-hawks-call-america-fight-new-cold-war/|access-date=12 July 2020|newspaper=[[The Washington Post]]|archive-date=17 June 2020|archive-url=https://web.archive.org/web/20200617214429/https://www.washingtonpost.com/opinions/2019/04/10/china-hawks-call-america-fight-new-cold-war/|url-status=live}}</ref><ref>{{cite news|last1=Wu|first1=Wendy|date=26 March 2019|title=Cold War is back: Bannon helps revive U.S. committee to target 'aggressive totalitarian foe' China|url=https://www.politico.com/story/2019/03/26/steve-bannon-china-1238039|access-date=12 July 2020|newspaper=[[Politico]]|archive-date=12 July 2020|archive-url=https://web.archive.org/web/20200712185050/https://www.politico.com/story/2019/03/26/steve-bannon-china-1238039|url-status=live}}</ref>
       
      On 29 January 2020, the Interior Department's fleet of more than 800 Chinese-made drones, including those by DJI, were grounded, citing security concerns.<ref>{{Cite news|title=Interior Department Grounds Chinese-Made Drones, Months After It Approved Them|url=https://www.npr.org/2020/01/29/800890201/interior-department-grounds-all-of-its-drones-citing-cybersecurity-other-concern|access-date=17 November 2020|newspaper=NPR|date=29 January 2020 |last1=Chappell|first1=Bill|archive-date=28 October 2020|archive-url=https://web.archive.org/web/20201028110830/https://www.npr.org/2020/01/29/800890201/interior-department-grounds-all-of-its-drones-citing-cybersecurity-other-concern|url-status=live}}</ref><ref>{{Cite news|last1=Friedman|first1=Lisa|last2=McCabe|first2=David|date=29 January 2020|title=Interior Dept. Grounds Its Drones Over Chinese Spying Fears |work=The New York Times|url=https://www.nytimes.com/2020/01/29/technology/interior-chinese-drones.html|access-date=17 November 2020|issn=0362-4331|archive-date=29 January 2020|archive-url=https://web.archive.org/web/20200129191125/https://www.nytimes.com/2020/01/29/technology/interior-chinese-drones.html|url-status=live}}</ref>
       
      On 18 February 2020, the U.S. government announced five Chinese [[state media]] firms<ref group="note">[[Xinhua News Agency]], [[China Global Television Network]], distribution company of ''[[China Daily]]'' newspaper, and the distribution company of ''[[The People's Daily]]''</ref> would be designated "foreign missions", requiring them to be legally registered with the U.S. government as a foreign government entity.<ref>{{cite news|last=Naranjo|first=Jesse|title=U.S. to treat 5 Chinese media firms as 'foreign missions'|work=[[Politico]]|date=18 February 2020|url=https://www.politico.com/news/2020/02/18/us-chinese-media-foreign-missions-115882|access-date=20 February 2020|archive-date=5 July 2020|archive-url=https://web.archive.org/web/20200705195122/https://www.politico.com/news/2020/02/18/us-chinese-media-foreign-missions-115882|url-status=live}}</ref> On the following day, China took action against three American journalists with ''[[The Wall Street Journal]]'' by revoking their press credentials over a [[COVID-19 pandemic|coronavirus]] opinion column which their paper had run.<ref name="usatodayhjelmgaard" /> According to China, the column was [[Racism|racist]] and libelous; the CEO of the company that published the WSJ defended the article, as did the State department.<ref name="usatodayhjelmgaard">{{cite news|last=Hjelmgaard|first=Kim|title=China expels Wall Street Journal reporters over 'racist' headline on coronavirus op-ed|work=[[USA Today]]|date=19 February 2020|url=https://www.yahoo.com/news/china-expels-wall-street-journal-095750363.html|access-date=20 February 2020|archive-date=20 February 2020|archive-url=https://web.archive.org/web/20200220004033/https://www.yahoo.com/news/china-expels-wall-street-journal-095750363.html|url-status=live}}</ref> A March 2020 article by Reuters said that Washington slashed the number of journalists allowed to work at U.S. offices of major Chinese media outlets to 100 from 160 due to Beijing's "long-standing intimidation and harassment of journalists". In response, China expelled about a dozen American correspondents with ''The New York Times'', News Corp's Wall Street Journal and the Washington Post, which prompted criticism from the State Department.<ref>{{cite news|title=China to restrict US journalists from three major newspapers|url=https://www.bbc.com/news/world-asia-51938035|agency=BBC|date=18 March 2020|access-date=11 August 2020|archive-date=24 November 2021|archive-url=https://web.archive.org/web/20211124050623/https://www.bbc.com/news/world-asia-51938035|url-status=live}}</ref><ref name="reutersfour">{{cite news|title=U.S. designates four major Chinese media outlets as foreign missions|url=https://www.reuters.com/article/us-usa-china-media-restrictions/us-designates-four-major-chinese-media-outlets-as-foreign-missions-idUSKBN23T2Y8|work=Reuters|date=22 June 2020|access-date=11 August 2020|archive-date=17 August 2020|archive-url=https://web.archive.org/web/20200817173749/https://www.reuters.com/article/us-usa-china-media-restrictions/us-designates-four-major-chinese-media-outlets-as-foreign-missions-idUSKBN23T2Y8|url-status=live}}</ref> On 8 May, the U.S. moved Chinese citizens at non-American news outlets from open-ended work visas to extendable 90-day work visas<ref>{{cite news|last1=Wang|first1=Vivian|last2=Wong|first2=Edward|title=U.S. Hits Back at China With New Visa Restrictions on Journalists|url=https://www.nytimes.com/2020/05/09/us/politics/china-journalists-us-visa-crackdown.html|access-date=10 May 2020|work=The New York Times|date=9 May 2020|archive-date=10 May 2020|archive-url=https://web.archive.org/web/20200510002702/https://www.nytimes.com/2020/05/09/us/politics/china-journalists-us-visa-crackdown.html|url-status=live}}</ref> and in June the State Department designated a further four Chinese media outlets as foreign embassies.<ref name="reutersfour" />
      [[File:Deputy Secretary Blinken Meets With Chinese Executive Vice Foreign Minister Zhang Yesui (16313876818).jpg|thumb|In August 2020, [[Joe Biden]]'s foreign policy adviser [[Tony Blinken]] described China as a "strategic competitor".<ref>{{cite news|title=Former Obama Advisor on Iran: 'We're in a Much Worse Place' |url=https://www.pbs.org/wnet/amanpour-and-company/video/former-obama-advisor-on-iran-were-in-a-much-worse-place/|work=[[PBS]]|date=1 August 2020|archive-date=9 November 2020|archive-url=https://web.archive.org/web/20201109040120/https://www.pbs.org/wnet/amanpour-and-company/video/former-obama-advisor-on-iran-were-in-a-much-worse-place/|url-status=live}}</ref>]]
       
      By May 2020 relations had deteriorated as both sides were accusing the other of guilt for the [[COVID-19 pandemic|worldwide coronavirus pandemic]]. Washington has mobilized a campaign of investigations, prosecutions and export restrictions. Beijing, meanwhile, has stepped up military activities in the contested South China Sea, and launched denunciations of American Secretary of State Mike Pompeo, and publicly speculating that the American military deliberately unleashed the virus in China. In the growing aspersion, on 15 May 2020, the U.S. blocked shipments of [[Semiconductor|semi-conductors]] to Huawei, while China, for its part, has threatened to place [[Apple Inc.|Apple]], [[Boeing]], and other U.S. firms on "unreliable entities" lists,<ref>{{cite news|last1=Vallejo|first1=Justin|title=US cuts off semiconductor shipments to Huawei, China vows to retaliate|work=[[The Independent]]|date=15 May 2020|url=https://www.yahoo.com/news/us-cuts-off-semiconductor-shipments-205138512.html|access-date=17 May 2020|archive-date=21 June 2020|archive-url=https://web.archive.org/web/20200621102135/https://www.yahoo.com/news/us-cuts-off-semiconductor-shipments-205138512.html|url-status=live}}</ref><ref>{{cite news|last1=Evans|first1=Zachary|title=China Threatens to Place Apple, Boeing, and Other U.S. Firms on 'Unreliable Entities' List|work=[[National Review]]|date=15 May 2020|url=https://www.yahoo.com/news/china-threatens-place-apple-boeing-171146613.html|access-date=17 May 2020|archive-date=17 May 2020|archive-url=https://web.archive.org/web/20200517001255/https://www.yahoo.com/news/china-threatens-place-apple-boeing-171146613.html|url-status=live}}</ref> and has blamed the U.S. government of using state power under the excuse of national security, and of abusing export control measures to continuously oppress and contain specific enterprises of other countries.<ref>{{cite news|title=China warns US of 'all necessary measures' over Huawei rules|agency=[[Associated Press]]|date=17 May 2020|url=https://www.yahoo.com/news/china-warns-us-necessary-measures-104613919.html|access-date=17 May 2020|archive-date=19 June 2020|archive-url=https://web.archive.org/web/20200619181209/https://www.yahoo.com/news/china-warns-us-necessary-measures-104613919.html|url-status=live}}</ref> [[Orville Schell]], the director of the Center on U.S.-China Relations at the [[Asia Society]], summed up the situation as follows: "The consequences of the breakdown in U.S.-China relations is going to be very grave for the world and for the global economy because the ability of the U.S. and China to work together was the keystone of the whole arch of [[globalization]] and global trade. With that pulled out, there's going to be a tremendous amount of disturbance", often compared to the [[Cold War]]. However [[Tony Blair]] noted there is "an interconnectedness, economically and in trade terms between the U.S. and China that just wasn't there in the US-Soviet Cold War" that makes it an imperfect analogy. He further felt the China-U.S. relations would be the "determining geopolitical relationship of the 21st century."<ref>{{cite news|last1=Lamarque|first1=Kevin|last2=Haltiwanger|first2=John|title=The U.S. and China are on the brink of a new Cold War that could devastate the global economy|publisher=[[Reuters]] via [[Business Insider]]|date=13 May 2020|url=https://www.yahoo.com/news/us-china-brink-cold-war-163108094.html|access-date=14 May 2020|archive-date=19 June 2020|archive-url=https://web.archive.org/web/20200619211233/https://www.yahoo.com/news/us-china-brink-cold-war-163108094.html|url-status=live}}</ref>
       
      In June 2020, [[US Ambassador to the United Nations]] [[Kelly Craft]] sent a letter to the U.N. secretary general explaining the U.S. position on China's "excessive maritime claims".<ref>{{Cite news|url=https://www.nytimes.com/2020/07/13/world/asia/south-china-sea-pompeo.html|title=U.S. Says Most of China's Claims in South China Sea Are Illegal|first1=Edward|last1=Wong|first2=Michael|last2=Crowley|date=13 July 2020|work=The New York Times|access-date=25 June 2021|archive-date=17 June 2021|archive-url=https://web.archive.org/web/20210617002433/https://www.nytimes.com/2020/07/13/world/asia/south-china-sea-pompeo.html|url-status=live}}</ref>
       
      On 17 June 2020, President Trump signed the [[Uyghur Human Rights Policy Act]],<ref>{{cite news|date=30 June 2020|title=Trump signed a law to punish China for its oppression of the Uighur Muslims. Uighurs say much more needs to be done|work=[[Business Insider]]|url=https://www.businessinsider.com/uighur-china-detention-centers-activists-urge-accountability-2020-2|access-date=5 July 2020|archive-date=14 December 2020|archive-url=https://web.archive.org/web/20201214213003/https://www.businessinsider.com/uighur-china-detention-centers-activists-urge-accountability-2020-2|url-status=live}}</ref> which authorizes the imposition of [[United States sanctions|U.S. sanctions]] against Chinese government officials responsible for [[Xinjiang re-education camps|detention camps]] holding more than 1 million members of the country's [[Uyghurs|Uyghur]] [[Islam in China|Muslim]] minority.<ref>{{cite news|title=U.S. Congress urges Trump administration to get tougher on China's Xinjiang crackdown|url=https://www.reuters.com/article/us-usa-china-xinjiang-congress/u-s-congress-urges-trump-administration-to-get-tougher-on-chinas-xinjiang-crackdown-idUSKBN24334S|work=Reuters|date=2 July 2020|access-date=5 July 2020|archive-date=3 November 2020|archive-url=https://web.archive.org/web/20201103122838/https://www.reuters.com/article/us-usa-china-xinjiang-congress/u-s-congress-urges-trump-administration-to-get-tougher-on-chinas-xinjiang-crackdown-idUSKBN24334S|url-status=live}}</ref> On 9 July 2020, the Trump administration imposed sanctions and visa restrictions against senior Chinese officials, including [[Chen Quanguo]], a member of CCP's powerful Politburo.<ref>{{Cite news| url=https://www.bbc.com/news/world-us-canada-53355697| title=US sanctions Chinese officials over Xinjiang 'violations'| work=www.bbc.com| date=9 July 2020| access-date=10 July 2020| archive-date=10 July 2020| archive-url=https://web.archive.org/web/20200710005130/https://www.bbc.com/news/world-us-canada-53355697| url-status=live}}</ref>
       
      A research paper by the [[Begin–Sadat Center for Strategic Studies]] said that Chinese state-controlled media enthusiastically covered the protests and rioting attending the [[Murder of George Floyd]], comparing the [[George Floyd protests|American protests]] to the [[2019–2020 Hong Kong protests|protests in Hong Kong]] and used the [[Violence and controversies during the George Floyd protests|rioting]] and [[Violence and controversies during the George Floyd protests|violence in the United States]] as evidence that the democratic system was hypocritical and morally bankrupt.<ref>{{Cite web|last=Yellinek|first=Roie|date=14 July 2020|title=The Chinese Media's Take on US Unrest|url=https://besacenter.org/perspectives-papers/us-unrest-china-media/|access-date=21 July 2020|website=[[Begin-Sadat Center for Strategic Studies]] |archive-date=15 July 2020|archive-url=https://web.archive.org/web/20200715062155/https://besacenter.org/perspectives-papers/us-unrest-china-media/|url-status=live}}</ref> A report by the Australian Strategic Policy Institute said that racial tensions in the United States was a key area of focus for "a campaign of cross-platform inauthentic activity, conducted by Chinese-speaking actors and broadly in alignment with the political goal of the People's Republic of China (PRC) to denigrate the standing of the US."<ref>{{cite web|title=Covid-19 Disinformation & Social Media Manipulation|url=https://www.aspi.org.au/report/covid-19-disinformation|website=ASPI|access-date=4 August 2020|archive-date=27 August 2020|archive-url=https://web.archive.org/web/20200827182923/https://www.aspi.org.au/report/covid-19-disinformation|url-status=live}}</ref>
       
      In July 2020, the Trump administration [[Chinese Consulate-General, Houston#2020 closure|ordered the closure of the Chinese consulate in Houston]]. In response, the Chinese government ordered the closure of the [[Consulate General of the United States, Chengdu|US consulate in Chengdu]].
       
      On 20 July 2020, the United States sanctioned 11 Chinese companies, restricting any trade deal with America for what the U.S. government said was their involvement in human rights violations in Xinjiang, accusing them specifically of using Uyghurs and other Muslim minorities in forced labor.<ref>{{Cite news|title=US sanctions 11 Chinese companies over human rights abuses in Xinjiang|url=https://edition.cnn.com/2020/07/21/business/us-sanctions-china-companies-xinjiang-intl-hnk/index.html|access-date=21 July 2020|website=[[CNN International]]|date=21 July 2020|archive-date=21 July 2020|archive-url=https://web.archive.org/web/20200721112056/https://edition.cnn.com/2020/07/21/business/us-sanctions-china-companies-xinjiang-intl-hnk/index.html|url-status=live}}</ref>
       
      On 23 July 2020, U.S. Secretary of State Mike Pompeo announced the end of what he called "blind engagement" with the Chinese government. He also criticized CCP general secretary Xi Jinping as "a true believer in a bankrupt totalitarian ideology".<ref>{{Cite news|last=Re|first=Gregg|title=Pompeo announces end of 'blind engagement' with communist China: 'Distrust but verify'|url=https://www.foxnews.com/politics/pompeo-announces-end-blind-engagement-communist-china|date=23 July 2020|access-date=23 July 2020|website=Fox News |archive-date=23 July 2020|archive-url=https://web.archive.org/web/20200723230318/https://www.foxnews.com/politics/pompeo-announces-end-blind-engagement-communist-china|url-status=live}}</ref>
       
      In August 2020, Washington imposed sanctions on 11 Hong Kong and Chinese officials over what it said was their role in curtailing political freedoms in Hong Kong through the imposition<ref name=ftretaliate>{{cite news|title=China imposes sanctions on US officials in retaliation for Hong Kong measures|url=https://www.ft.com/content/c2d78da3-1fcf-4678-b65d-e1d02aa48ae6|archive-url=https://ghostarchive.org/archive/20221210/https://www.ft.com/content/c2d78da3-1fcf-4678-b65d-e1d02aa48ae6|archive-date=10 December 2022|url-access=subscription|url-status=live |work=Financial Times |date=10 August 2020}}</ref> of the [[2020 Hong Kong national security law|Hong Kong national security law]]; China retaliated<ref name=ftretaliate/>  by sanctioning 6 Republican lawmakers and 5 individuals at non-profit and rights groups.<ref>{{cite news|title=U.S. imposes sanctions on Hong Kong's Lam, other officials over crackdown|url=https://www.reuters.com/article/us-usa-china-hong-kong-sanctions/us-imposes-sanctions-on-hong-kongs-lam-other-officials-over-crackdown-idUSKCN253215|work=Reuters|date=7 August 2020|access-date=11 August 2020|archive-date=10 August 2020|archive-url=https://web.archive.org/web/20200810002326/https://www.reuters.com/article/us-usa-china-hong-kong-sanctions/us-imposes-sanctions-on-hong-kongs-lam-other-officials-over-crackdown-idUSKCN253215|url-status=live}}</ref><ref>{{cite news|title=China imposes sanctions on Republican U.S. lawmakers over Hong Kong|url=https://www.reuters.com/article/us-usa-china-hongkong-sanctions/china-imposes-sanctions-on-republican-u-s-lawmakers-over-hong-kong-idUSKCN2560RN|work=Reuters|date=10 August 2020|access-date=11 August 2020|archive-date=11 August 2020|archive-url=https://web.archive.org/web/20200811092920/https://www.reuters.com/article/us-usa-china-hongkong-sanctions/china-imposes-sanctions-on-republican-u-s-lawmakers-over-hong-kong-idUSKCN2560RN|url-status=live}}</ref>
       
      In September 2020 the United States had under a 29 May presidential proclamation revoked more than 1,000 visas for PRC students and researchers visas who the U.S. government said had ties to the Chinese military in order to prevent them from stealing and otherwise appropriating sensitive research.<ref>{{cite news|title=US revokes visas for 1,000 Chinese under Trump order|publisher=AFP|date=10 September 2020|url=https://www.yahoo.com/news/us-revokes-visas-1-000-230810765.html|access-date=10 September 2020|archive-date=11 January 2021|archive-url=https://web.archive.org/web/20210111031859/https://www.yahoo.com/news/us-revokes-visas-1-000-230810765.html|url-status=dead}}</ref><ref>{{cite news|last=Pamuk|first=Humeyra |title=U.S. says revoked more than 1,000 visas of Chinese nationals over military links|publisher=Reuters (via Yahoo finance)|date=9 September 2020|url=https://finance.yahoo.com/news/u-says-revoked-more-1-204050377.html|access-date=10 September 2020}}</ref>
       
      On 26 September 2020, the U.S. Commerce Department put restrictions on Chinese chip maker, [[Semiconductor Manufacturing International Corporation]] (SMIC), following which the suppliers were required to have an export license for exporting the chip. The restrictions were imposed after the U.S. concluded that an "unacceptable risk" equipment supplied to SMIC could potentially be used for military purposes.<ref>{{Cite news|url=https://www.theverge.com/2020/9/26/21457350/us-tightens-trade-restrictions-china-chipmaker-smic|title=US tightens trade restrictions on Chinese chipmaker SMIC|access-date=26 September 2020|website=The Verge|date=26 September 2020|archive-date=10 November 2021|archive-url=https://web.archive.org/web/20211110004329/https://www.theverge.com/2020/9/26/21457350/us-tightens-trade-restrictions-china-chipmaker-smic|url-status=live}}</ref><ref>{{cite news|url=https://www.reuters.com/article/us-usa-china-smic/u-s-imposes-curbs-on-exports-to-chinas-top-chipmaker-smic-idUSKBN26H0LN|title=U.S. tightens exports to China's chipmaker SMIC, citing risk of military use|access-date=26 September 2020|website=Reuters|date=26 September 2020|archive-date=26 September 2020|archive-url=https://web.archive.org/web/20200926160337/https://www.reuters.com/article/us-usa-china-smic/u-s-imposes-curbs-on-exports-to-chinas-top-chipmaker-smic-idUSKBN26H0LN|url-status=live}}</ref>
       
      On 6 October 2020, Germany's ambassador to the UN, on behalf of the group of 39 countries including Germany, the U.K. and the U.S., made a statement to denounce China for its treatment of ethnic minorities and for curtailing freedoms in Hong Kong.<ref name="Wainer-2020">{{cite news|last1= Wainer|first1= David| title= Western Allies Rebuke China at UN Over Xinjiang, Hong Kong|url= https://www.bloomberg.com/news/articles/2020-10-06/u-s-allies-step-up-china-rebuke-at-un-over-xinjiang-hong-kong|access-date=6 October 2020|newspaper=Bloomberg |date= 6 October 2020|archive-url= https://web.archive.org/web/20201007050829/https://www.bloomberg.com/news/articles/2020-10-06/u-s-allies-step-up-china-rebuke-at-un-over-xinjiang-hong-kong| archive-date=7 October 2020}}</ref>
      [[File:Uyghur boycott 20Sept2020.jpg|thumb|Call for boycott of products from China's [[Xinjiang]] province, New York, 2020. The U.S. officially recognized the Chinese government's treatment of the [[Uyghurs]] in Xinjiang [[Persecution of Uyghurs in China|as a genocide]].]]
      On 9 October 2020, the Department of Justice disallowed the use of its fund to purchase DJI drones, which the DoJ classified as a "Covered Foreign Entity".<ref>{{Cite web|last=McNabb|first=Miriam|date=9 October 2020|title=No Department of Justice Funds for DJI Drones: DOJ Makes the Ban Official, but Some Federal Agencies May Suffer|url=https://dronelife.com/2020/10/09/no-federal-funds-for-dji-drones-doj-makes-the-ban-official-but-some-federal-agencies-may-suffer/|access-date=17 November 2020|website=DRONELIFE |archive-date=17 November 2020|archive-url=https://web.archive.org/web/20201117152204/https://dronelife.com/2020/10/09/no-federal-funds-for-dji-drones-doj-makes-the-ban-official-but-some-federal-agencies-may-suffer/|url-status=live}}</ref>
       
      On 21 October 2020, the U.S. approved [[arms sales]] of $1.8 billion to Taiwan.<ref name="focustaiwan.tw">{{cite news|title=Taiwan welcomes latest U.S. arms sales|work=[[Focus Taiwan]]|url=https://focustaiwan.tw/politics/202010220008|access-date=26 October 2020|archive-date=26 October 2020|archive-url=https://web.archive.org/web/20201026205117/https://focustaiwan.tw/politics/202010220008|url-status=live}}</ref> It involved three packages that included high technology weapons such as SLAM-ER missiles, HIMARS M142 Launchers and Recce Pods.<ref name="focustaiwan.tw"/> On 26 October 2020, [[China]] announced its intentions to impose sanctions on U.S. businesses and individuals, including [[Boeing Defense, Space & Security|Boeing]], [[Raytheon]] and [[Lockheed Martin]].<ref>{{cite news|url=https://in.reuters.com/article/usa-china-taiwan/china-to-impose-sanctions-on-u-s-firms-over-taiwan-arms-sales-idINKBN27B0P0|title=China to impose sanctions on U.S. firms over Taiwan arms sales|access-date=26 October 2020|website=Reuters|date=26 October 2020|archive-date=26 October 2020|archive-url=https://web.archive.org/web/20201026095700/https://in.reuters.com/article/usa-china-taiwan/china-to-impose-sanctions-on-u-s-firms-over-taiwan-arms-sales-idINKBN27B0P0|url-status=dead}}</ref> Taiwan welcomed the arms sales and disapproved of the sanctions.<ref name="focustaiwan.tw"/><ref name="Taiwan 'deeply regrets' China's thr">{{cite news|title=Taiwan 'deeply regrets' China's threat against U.S. arms suppliers|work=[[Focus Taiwan]]|url=https://focustaiwan.tw/politics/202010260019|access-date=26 October 2020|archive-date=30 October 2020|archive-url=https://web.archive.org/web/20201030041124/https://focustaiwan.tw/politics/202010260019|url-status=live}}</ref> Taiwan also said it would continue buying arms from America.<ref name="Taiwan 'deeply regrets' China's thr"/>
       
      In a December 2020 report, U.S. intelligence officials claimed that China had supervised a bounty program that paid Afghan militants to kill U.S. soldiers deployed in the country.<ref>{{cite news|date=31 December 2020|title=China offered Afghan militants bounties to attack US soldiers: reports|work=[[Deutsche Welle]]|url=https://www.dw.com/en/china-offered-afghan-militants-bounties-to-attack-us-soldiers-reports/a-56103735|access-date=31 January 2021|archive-date=26 October 2021|archive-url=https://web.archive.org/web/20211026172900/https://www.dw.com/en/china-offered-afghan-militants-bounties-to-attack-us-soldiers-reports/a-56103735|url-status=live}}</ref>
       
      On 5 December 2020, the U.S. State Department ended five cultural exchange programs with China, which are - "the Policymakers Educational China Trip Program, the U.S.-China Friendship Program, the U.S.-China Leadership Exchange Program, the U.S.-China Transpacific Exchange Program and the [[Hong Kong]] Educational and Cultural Program." They described these programs as soft power propaganda tools of Chinese government.<ref>{{cite news|url= https://www.reuters.com/article/uk-usa-china-exchange-program-idUKKBN28F05Y|title= U.S. ends exchange programs with China, calling them 'propaganda'|access-date= 5 December 2020|website= Reuters|date= 5 December 2020|last1= Satter|first1= Raphael|archive-date= 5 December 2020|archive-url= https://web.archive.org/web/20201205053101/https://www.reuters.com/article/uk-usa-china-exchange-program-idUKKBN28F05Y|url-status= live}}</ref>
       
      ==== Espionage ====
      In July 2020, FBI Director [[Christopher A. Wray|Christopher Wray]] called China the "greatest long-term threat" to the United States. He said that "the FBI is now opening a new China-related counterintelligence case every 10 hours. Of the nearly 5,000 active counterintelligence cases currently under way across the country, almost half are related to China."<ref>{{cite news |date=8 July 2020 |title=FBI director: China is 'greatest threat' to US |url=https://www.bbc.com/news/world-us-canada-53329755 |url-status=live |archive-url=https://web.archive.org/web/20210212013511/https://www.bbc.com/news/world-us-canada-53329755 |archive-date=12 February 2021 |access-date=12 July 2020 |work=BBC News}}</ref>
       
      In December 2020, an investigation by ''[[Axios (website)|Axios]]'' was published that detailed the suspected activities of Christine Fang, a Chinese national who has been suspected by U.S. officials of having conducted political espionage for the [[Ministry of State Security (China)|Chinese Ministry of State Security]] (MSS) while she was in the United States from 2011 to 2015.<ref>{{cite news|last1=Allen-Ebrahimian|first1=Bethany|last2=Dorfman|first2=Zach|title=Exclusive: Suspected Chinese spy targeted California politicians|url=https://www.axios.com/china-spy-california-politicians-9d2dfb99-f839-4e00-8bd8-59dec0daf589.html|work=[[Axios (website)|Axios]]|date=8 December 2020|access-date=22 December 2020|archive-date=10 December 2020|archive-url=https://web.archive.org/web/20201210121643/https://www.axios.com/china-spy-california-politicians-9d2dfb99-f839-4e00-8bd8-59dec0daf589.html|url-status=live}}</ref><ref>{{cite news|title=Eric Swalwell Report Fits Bill of China Spy Pattern Identified By FBI|url=https://www.newsweek.com/eric-swalwell-report-fits-bill-china-spy-pattern-fbi-1554281|agency=Newsweek|date=11 December 2020|access-date=22 December 2020|archive-date=22 December 2020|archive-url=https://web.archive.org/web/20201222232436/https://www.newsweek.com/eric-swalwell-report-fits-bill-china-spy-pattern-fbi-1554281|url-status=live}}</ref> While Fang's suspected activities prior to the Axios investigation had already drawn scrutiny from federal law enforcement agencies, the subsequent reactions to its publication drew further scrutiny from politicians and the media.<ref>{{cite news|title=17 House GOP members send letter to Pelosi urging Swalwell's removal from Intel Committee|url=https://www.foxnews.com/politics/house-gop-letter-to-pelosi-swalwells-intel-committee|work=Fox News|date=17 December 2020|access-date=22 December 2020|archive-date=22 December 2020|archive-url=https://web.archive.org/web/20201222023501/https://www.foxnews.com/politics/house-gop-letter-to-pelosi-swalwells-intel-committee|url-status=live}}</ref><ref>{{cite news|last1=Murray|first1=Paul|title=There are 'many ways' in which China 'gets what it wants'|url=https://www.skynews.com.au/details/_6215959913001|agency=Sky News Australia|date=13 December 2020|access-date=22 December 2020|archive-date=14 December 2020|archive-url=https://web.archive.org/web/20201214023611/https://www.skynews.com.au/details/_6215959913001|url-status=live}}</ref><ref>{{cite news|date=18 December 2020|title=EDITORIAL: Chinese infiltration: Taiwan can help|work=[[Taipei Times]]|url=https://www.taipeitimes.com/News/editorials/archives/2020/12/18/2003748913|access-date=22 December 2020|archive-date=12 January 2021|archive-url=https://web.archive.org/web/20210112210729/https://www.taipeitimes.com/News/editorials/archives/2020/12/18/2003748913|url-status=live}}</ref>
       
      Xu Zewei and Zhang Yu, Chinese hackers working under the direction of China's Ministry of State Security (MSS), conducted cyber intrusions between February 2020 and June 2021, including the large-scale "[[Hafnium (group)|HAFNIUM]]" campaign exploiting Microsoft Exchange Server vulnerabilities. Targeting U.S. universities, virologists, and law firms, they stole COVID-19 research and sensitive communications while operating through the MSS-linked company Shanghai Powerock Network Co. Ltd. In July 2025, under the Second Trump administration, a federal indictment was unsealed in the Southern District of Texas charging Xu and Zhang with conspiracy, wire fraud, unauthorized computer access, and identity theft. Xu was arrested in Italy and awaits extradition; Zhang remained at large.<ref>{{Cite web |date=8 July 2025 |title=Office of Public Affairs {{!}} Justice Department Announces Arrest of Prolific Chinese State-Sponsored Contract Hacker |url=https://www.justice.gov/opa/pr/justice-department-announces-arrest-prolific-chinese-state-sponsored-contract-hacker |access-date=14 July 2025 |website=United States Department of Justice}}</ref><ref>{{Cite web |date=9 July 2025 |title=Chinese state-sponsored contract hacker arrested in Italy at U.S. request, DOJ says |url=https://www.nbcnews.com/world/china/chinese-state-sponsored-contract-hacker-arrested-italy-us-request-doj-rcna217675 |access-date=14 July 2025 |website=NBC News}}</ref><ref>{{Cite news |last1=Singh |first1=Kanishka |last2=Ward |first2=Jasper |last3=Singh |first3=Kanishka |last4=Ward |first4=Jasper |date=10 July 2025 |title=Chinese state-sponsored contract hacker arrested in Italy at US request, DOJ says |url=https://www.reuters.com/legal/litigation/us-says-chinese-state-sponsored-contract-hacker-arrested-last-week-italy-us-2025-07-08/ |access-date=14 July 2025 |work=Reuters}}</ref>

      ===Biden administration (2021–2025)===
      {{See also|Foreign policy of the Biden administration#China}}
       
      Following his election, relations with the [[Presidency of Joe Biden|new Biden administration]] in 2021 included heightened tensions over trade, technology, and human rights, particularly regarding Hong Kong, and the treatment of minorities in China. In addition international tensions regarding control of the South China Sea remained high. The Biden administration largely continued the China policies of his predecessor Donald Trump,<ref name="Roach-2022"/>{{Rp|page=148}} and endorsed [[Mike Pompeo]]'s [[#Uyghurs|report]] about China committing genocide against [[Uyghurs]].<ref name="Bernstein-2021">{{Cite news|last=Bernstein|first=Brittany|date=20 January 2021|title=Incoming Secretary of State Backs Pompeo's Uyghur Genocide Designation|work=[[National Review]]|url=https://www.nationalreview.com/news/incoming-secretary-of-state-backs-pompeos-uyghur-genocide-designation/|access-date=31 January 2021|archive-date=30 October 2021|archive-url=https://web.archive.org/web/20211030013954/https://www.nationalreview.com/news/incoming-secretary-of-state-backs-pompeos-uyghur-genocide-designation/|url-status=live}}</ref> However, the Biden and Xi administrations agreed to collaborate on long-term projects regarding climate change, nuclear proliferation, and the global COVID-19 pandemic.<ref>Sha Hua and Andrew Jeang, "U.S. and China Discuss Enhancing Beijing's Climate Commitments
      Climate envoy John Kerry says meetings with counterparts in Shanghai were productive" [https://www.wsj.com/articles/u-s-and-china-discuss-enhancing-beijings-climate-commitments-11618726162?page=1 ''Wall Street Journal'', April, 19, 2021] {{Webarchive|url=https://web.archive.org/web/20210422105848/https://www.wsj.com/articles/u-s-and-china-discuss-enhancing-beijings-climate-commitments-11618726162?page=1|date=22 April 2021}}</ref>
       
      President Biden, in his first foreign policy address, labeled China as "the most serious competitor" to the US.<ref>{{cite news|last=Churchill|first=Owen|title=In first foreign policy address, President Biden calls China the 'most serious competitor' to the US |newspaper=South China Morning Post|via=Yahoo! Finance)|date=February 5, 2021|url=https://finance.yahoo.com/news/first-foreign-policy-address-president-093000266.html|access-date=February 7, 2021|archive-date=February 6, 2021|archive-url=https://web.archive.org/web/20210206165418/http://finance.yahoo.com/news/first-foreign-policy-address-president-093000266.html|url-status=live}}</ref> During his first visit to [[the Pentagon]] on 9 February 2021, Biden urged the [[United States Department of Defense]] to review its national security policy concerning China.<ref>{{cite news|url=https://apnews.com/article/joe-biden-biden-cabinet-lloyd-austin-coronavirus-pandemic-43210adc097451c97a400cfe6d35be15|title=Biden calls for China review during first Pentagon visit|first1=Robert|last1=Burns|first2=Lolita C.|last2=Baldor|first3=Aamer|last3=Madhani|publisher=Associated Press|date=February 10, 2021|access-date=September 21, 2021|archive-date=September 17, 2021|archive-url=https://web.archive.org/web/20210917174738/https://apnews.com/article/joe-biden-biden-cabinet-lloyd-austin-coronavirus-pandemic-43210adc097451c97a400cfe6d35be15|url-status=live}}</ref>

      In 2021, the Biden administration tightened technology restrictions on China, including designating [[Huawei]], [[ZTE]], [[Hytera]], [[Hikvision]], and [[Dahua Technology]] as security threats,<ref>{{Cite news|url=https://www.reuters.com/world/us/five-chinese-companies-pose-threat-us-national-security-fcc-2021-03-12/|title=Five Chinese companies pose threat to U.S. national security -FCC|newspaper=Reuters|date=12 March 2021|via=www.reuters.com|last1=Shepardson|first1=David}}</ref><ref>{{cite news|title=U.S. FCC adds Russia's Kaspersky, China telecom firms to national security threat list|url=https://www.reuters.com/business/media-telecom/us-fcc-adds-ao-kaspersky-lab-china-telecom-firms-national-security-threat-list-2022-03-25|work=Reuters|access-date=28 July 2022|archive-date=27 July 2022|archive-url=https://web.archive.org/web/20220727070822/https://www.reuters.com/business/media-telecom/us-fcc-adds-ao-kaspersky-lab-china-telecom-firms-national-security-threat-list-2022-03-25/|url-status=live}}</ref> adding [[supercomputing]] entities to the U.S. Entity List,<ref>{{cite news|title=US blacklists seven Chinese supercomputer groups|url=https://www.bbc.com/news/business-56685136|agency=BBC|access-date=28 July 2022|archive-date=28 July 2022|archive-url=https://web.archive.org/web/20220728160359/https://www.bbc.com/news/business-56685136|url-status=live}}</ref> expanding limits on American investment in Chinese companies tied to the military,<ref>{{Cite web|date=3 June 2021|title=Executive Order on Addressing the Threat from Securities Investments that Finance Certain Companies of the People's Republic of China|url=https://bidenwhitehouse.archives.gov/briefing-room/presidential-actions/2021/06/03/executive-order-on-addressing-the-threat-from-securities-investments-that-finance-certain-companies-of-the-peoples-republic-of-china/|access-date=5 June 2021|website=The White House |archive-date=7 June 2021|archive-url=https://web.archive.org/web/20210607102928/https://www.whitehouse.gov/briefing-room/presidential-actions/2021/06/03/executive-order-on-addressing-the-threat-from-securities-investments-that-finance-certain-companies-of-the-peoples-republic-of-china/|url-status=live}}</ref> and finalizing rules allowing the delisting of non-compliant Chinese firms from U.S. stock exchanges.<ref>{{cite news|title=U.S. SEC mandates Chinese companies detail ownership structure, audits|url=https://www.reuters.com/business/us-sec-mandates-foreign-companies-spell-out-ownership-structure-disclose-2021-12-02|work=Reuters|access-date=July 28, 2022|archive-date=July 28, 2022|archive-url=https://web.archive.org/web/20220728185400/https://www.reuters.com/business/us-sec-mandates-foreign-companies-spell-out-ownership-structure-disclose-2021-12-02/|url-status=live}}</ref>
       
      From March 18 to 19, 2021, [[United States–China talks in Alaska|bilateral talks in Alaska]] took place. Blinken and [[national security advisor]] [[Jake Sullivan]] met with [[Politburo of the Chinese Communist Party|CCP Politburo]] member [[Yang Jiechi]] and Chinese foreign minister [[Wang Yi (politician)|Wang Yi]]. The Americans unleashed heated attacks on China's policies regarding human rights, cyberattacks, Taiwan, and its crackdown in Xinjiang and Hong Kong. The Chinese side countered by attacking the U.S's standing in the world and defending China's sovereign rights and model of development.<ref name="wsj._Bitter_Alaska">{{Cite news|title=Bitter Alaska Meeting Complicates Already Shaky U.S.-China Ties|last=Mauldin|first=William|newspaper=[[The Wall Street Journal]]|date=March 19, 2021|access-date=March 20, 2021|url=https://www.wsj.com/articles/bitter-alaska-meeting-complicates-already-shaky-u-s-china-ties-11616185669|archive-date=4 October 2021|archive-url=https://web.archive.org/web/20211004005658/https://www.wsj.com/articles/bitter-alaska-meeting-complicates-already-shaky-u-s-china-ties-11616185669|url-status=live}}</ref><ref name="BBC News-2021">{{Cite news|date=19 March 2021|title=US and China trade angry words at high-level Alaska talks |work=BBC News|url=https://www.bbc.com/news/world-us-canada-56452471|access-date=20 March 2021|archive-date=11 October 2021|archive-url=https://web.archive.org/web/20211011120555/https://www.bbc.com/news/world-us-canada-56452471|url-status=live}}</ref> In the week ahead of the talks, the administration met with U.S. allies in Asia and imposed sanctions on senior Chinese officials amidst Beijing's [[2020 Hong Kong national security law|contemporaneous crackdown on Hong Kong]].<ref name="wsj._Bitter_Alaska"/>
       
      On March 22, 2021, in conjunction with the European Union, United Kingdom and Canada, the United States imposed sanctions against Chinese officials in relation to the human rights violations in Xinjiang. The sanctions marked the first time the Biden administration took such coordinated action against Beijing.<ref>{{cite news|title=West sanctions China over Xinjiang abuses, Beijing hits back at EU|url=https://www.reuters.com/world/china/west-sanctions-china-over-xinjiang-abuses-beijing-hits-back-eu-2021-03-22|work=Reuters|access-date=28 July 2022|archive-date=28 July 2022|archive-url=https://web.archive.org/web/20220728160345/https://www.reuters.com/world/china/west-sanctions-china-over-xinjiang-abuses-beijing-hits-back-eu-2021-03-22/|url-status=live}}</ref>
        
      In June 2021, leaders of the [[G7]] and [[NATO]], encouraged by the United States, issued rare unanimous statements condemning China over human rights abuses, threats to Taiwan, unfair trade practices, and lack of transparency on COVID-19.<ref name="Lau-2021">{{Cite news |date=13 June 2021 |title=US and Europe converge on historic rebuke of China |first=Stuart |last=Lau |url=https://www.politico.eu/article/us-europe-rebuke-china-economic-practices-g7-human-rights-xinjiang-coronavirus/|access-date=29 March 2022 |website=[[Politico]] |archive-date=7 October 2021|archive-url=https://web.archive.org/web/20211007180917/https://www.politico.eu/article/us-europe-rebuke-china-economic-practices-g7-human-rights-xinjiang-coronavirus/|url-status=live}}</ref><ref>James T. Areddy, "Back-to-Back Rebukes of China Mark a Turning Point: Criticism from G-7 and NATO members represent a shift toward collective action to confront Beijing" [https://www.wsj.com/articles/back-to-back-rebukes-of-china-mark-a-turning-point-11623710320 ''Wall Street Journal'' June 15, 2021] {{Webarchive|url=https://web.archive.org/web/20210921161510/https://www.wsj.com/articles/back-to-back-rebukes-of-china-mark-a-turning-point-11623710320|date=21 September 2021}}</ref><ref>Sabine Siebold, Steve Holland and Robin Emmott, "NATO adopts tough line on China at Biden's debut summit with alliance" [https://www.reuters.com/world/europe/nato-welcomes-biden-pivotal-post-trump-summit-2021-06-14/ ''Reuters'' June 14, 2021] {{Webarchive|url=https://web.archive.org/web/20211115132233/https://www.reuters.com/world/europe/nato-welcomes-biden-pivotal-post-trump-summit-2021-06-14/|date=15 November 2021}}</ref><ref>Karla Adam et al., "G-7 takes stronger stand against China, at U.S. urging" [https://www.washingtonpost.com/world/europe/queen-elizabeth-biden-g7/2021/06/13/078574de-c7cf-11eb-8708-64991f2acf28_story.html ''The Washington Post'' June 13, 2021] {{Webarchive|url=https://web.archive.org/web/20211003104122/https://www.washingtonpost.com/world/europe/queen-elizabeth-biden-g7/2021/06/13/078574de-c7cf-11eb-8708-64991f2acf28_story.html|date=3 October 2021}}.</ref>
       
      In August 2021, China tested a nuclear-capable [[Hypersonic flight|hypersonic missile]],<ref>{{cite news|title=Biden airs hypersonic missile fears as probable ambassador labels China 'untrustworthy'|url=https://www.dw.com/en/biden-airs-hypersonic-missile-fears-as-probable-ambassador-labels-china-untrustworthy/a-59568428|work=Deutsche Welle|date=20 October 2021|access-date=24 October 2021|archive-date=28 October 2021|archive-url=https://web.archive.org/web/20211028041828/https://www.dw.com/en/biden-airs-hypersonic-missile-fears-as-probable-ambassador-labels-china-untrustworthy/a-59568428|url-status=live}}</ref> highlighting advances in its strategic weapons program and raising concerns in Washington.<ref>{{cite news|title=China successfully tested hypersonic weapon in August: report|url=https://www.space.com/china-hypersonic-weapon-test-august|work=[[Space.com]]|date=17 October 2021|access-date=24 October 2021|archive-date=24 October 2021|archive-url=https://web.archive.org/web/20211024180017/https://www.space.com/china-hypersonic-weapon-test-august|url-status=live}}</ref>
       
      On August 18, 2021, Biden compared U.S. commitments in Afghanistan and Taiwan, saying that the United States was bound to defend Taiwan, though officials later clarified that policy had not changed.<ref>{{cite news|title=Did Biden's Taiwan Remarks Represent a U.S. Policy Change?|url=https://thediplomat.com/2021/08/did-bidens-taiwan-remarks-represent-a-us-policy-change|work=The Diplomat|access-date=July 28, 2022|archive-date=July 28, 2022|archive-url=https://web.archive.org/web/20220728182636/https://thediplomat.com/2021/08/did-bidens-taiwan-remarks-represent-a-us-policy-change|url-status=live}}</ref><ref>{{cite news|title=U.S. position on Taiwan unchanged despite Biden comment - official|url=https://www.reuters.com/world/asia-pacific/us-position-taiwan-unchanged-despite-biden-comment-official-2021-08-19|work=Reuters|access-date=July 28, 2022|archive-date=July 29, 2022|archive-url=https://web.archive.org/web/20220729134227/https://www.reuters.com/world/asia-pacific/us-position-taiwan-unchanged-despite-biden-comment-official-2021-08-19/|url-status=live}}</ref><ref>{{cite news|title=Comments by Biden and others on U.S. policy of 'ambiguity' on Taiwan|url=https://www.reuters.com/world/asia-pacific/comments-by-biden-others-us-policy-ambiguity-taiwan-2022-05-23|work=Reuters|access-date=July 28, 2022|archive-date=July 28, 2022|archive-url=https://web.archive.org/web/20220728182638/https://www.reuters.com/world/asia-pacific/comments-by-biden-others-us-policy-ambiguity-taiwan-2022-05-23/|url-status=live}}</ref>
       
      On September 15, 2021, the United States, the United Kingdom, and Australia formed [[AUKUS]], a  security pact under which Australia will acquire nuclear-powered submarines with U.S. and British support, a move China denounced as "extremely irresponsible".<ref>See "Aukus: UK, US and Australia launch pact to counter China" (BBC, 16 September 2021) [https://www.bbc.com/news/world-58564837 online] {{Webarchive|url=https://web.archive.org/web/20211210231939/https://www.bbc.com/news/world-58564837|date=10 December 2021}}</ref><ref>See also "AUKUS: The Trilateral Security Partnership Between Australia, U.K. and U.S." (U.S. Dept of Defense, 2023) [https://www.defense.gov/Spotlights/AUKUS/#:~:text=In%20September%202021%2C%20leaders%20of,building%20on%20longstanding%20and%20ongoing online] {{Webarchive|url=https://web.archive.org/web/20230512033323/https://www.defense.gov/Spotlights/AUKUS/#:~:text=In%20September%202021%2C%20leaders%20of,building%20on%20longstanding%20and%20ongoing|date=12 May 2023}}</ref>
       
      Biden held his first virtual meeting with Xi on 15 November 2021.<ref>{{Cite news|url = https://apnews.com/article/biden-xi-meeting-e6013378e03727b85a8f59f71fe61f4a|title = Biden, Xi try to tamp down tension in long virtual meeting|website = [[Associated Press]]|date = 15 November 2021|access-date = 16 November 2021|archive-date = 16 November 2021|archive-url = https://web.archive.org/web/20211116010201/https://apnews.com/article/biden-xi-meeting-e6013378e03727b85a8f59f71fe61f4a|url-status = live}}</ref>
       
      On November 24, 2021, the Biden administration invited Taiwan to attend the '[[Summit for Democracy]]' - to be held in December 2021. [[Ministry of Foreign Affairs of the People's Republic of China|China's Foreign Ministry]] reacted by saying it was "firmly opposed" to the invitation.<ref>{{Cite news|date=24 November 2021|title=U.S. invites Taiwan to its democracy summit; China angered |work=Reuters|url=https://www.reuters.com/article/us-usa-biden-democracy-taiwan-idUSKBN2I9062|access-date=24 November 2021}}</ref> Later that year, Biden signed a [[National Defense Authorization Act for Fiscal Year 2022|defense bill]] strengthening support for Taiwan.<ref>{{Cite web|last=Smith|first=Adam|date=2 December 2021|title=Text - H.R.4350 - 117th Congress (2021-2022): National Defense Authorization Act for Fiscal Year 2022|url=https://www.congress.gov/bill/117th-congress/house-bill/4350/text|access-date=17 December 2021|website=Congress.gov|archive-date=30 December 2021|archive-url=https://web.archive.org/web/20211230191919/https://www.congress.gov/bill/117th-congress/house-bill/4350/text|url-status=live}}</ref><ref>{{Cite web|title=US Congress supports Taiwan in defense spending bill|url=https://en.rti.org.tw/news/view/id/2006672|access-date=17 December 2021|website=RTI Radio Taiwan International|language=zh-Hant-TW}}</ref><ref>{{Cite news|last=Singh|first=Kanishka|date=27 December 2021|title=U.S. President Biden signs $770 billion defense bill |work=Reuters|url=https://www.reuters.com/world/us/us-president-biden-signs-770-billion-defense-bill-2021-12-27/|access-date=30 December 2021}}</ref>
       
      In late 2021, the Biden administration announced a diplomatic [[Concerns and controversies at the 2022 Winter Olympics#United States|boycott]] of the Beijing Olympics<ref name=uswiln>{{Cite news|last=Kanno-Youngs|first=Zolan|date=6 December 2021|title=U.S. Will Not Send Government Officials to Beijing Olympics |work=The New York Times|url=https://www.nytimes.com/2021/12/06/us/politics/olympics-boycott-us.html|access-date=16 August 2023|issn=0362-4331|archive-date=4 August 2023|archive-url=https://web.archive.org/web/20230804194427/https://www.nytimes.com/2021/12/06/us/politics/olympics-boycott-us.html|url-status=live}}</ref> and signed the [[Uyghur Forced Labor Prevention Act]],<ref>{{Cite web|title=Uyghur Forced Labor Prevention Act |url=https://www.cbp.gov/trade/forced-labor/UFLPA|access-date=7 February 2023|website=U.S. Customs and Border Protection |archive-date=7 August 2023|archive-url=https://web.archive.org/web/20230807163603/https://www.cbp.gov/trade/forced-labor/UFLPA|url-status=live}}</ref> further highlighting U.S. criticism of China's human rights record.<ref name=uswiln/>
        
      On February 27, 2022, the White House urged China to condemn [[2022 Russian invasion of Ukraine|Russia's invasion of Ukraine]].<ref>{{cite news|last1=Chang|first1=Richard|last2=Chiacu|first2=Doina|title=White House calls on China to condemn Russia's invasion of Ukraine|url=https://www.reuters.com/world/white-house-calls-china-condemn-russias-invasion-ukraine-2022-02-27/|access-date=27 February 2022|work=Reuters|agency=Reuters|date=27 February 2022}}</ref> China accused the United States of being responsible for the war in Ukraine.<ref>{{cite news|title=China hammers home its message of U.S. blame for Ukraine war to domestic audience|url=https://www.scmp.com/news/china/diplomacy/article/3172228/china-hammers-home-its-message-us-blame-ukraine-war-domestic|work=South China Morning Post|date=29 March 2022|access-date=14 August 2022|archive-date=2 September 2024|archive-url=https://web.archive.org/web/20240902164742/https://www.scmp.com/news/china/diplomacy/article/3172228/china-hammers-home-its-message-us-blame-ukraine-war-domestic|url-status=live}}</ref><ref>{{cite news|title=China says the US is the 'main instigator' of the war in Ukraine|url=https://www.aljazeera.com/news/2022/8/10/china-accuses-us-as-main-instigator-of-the-war-in-ukraine|work=Al Jazeera|date=August 10, 2022|access-date=August 14, 2022|archive-date=14 August 2022|archive-url=https://web.archive.org/web/20220814163322/https://www.aljazeera.com/news/2022/8/10/china-accuses-us-as-main-instigator-of-the-war-in-ukraine|url-status=live}}</ref>
      [[File:Tsai Presents Pelosi with Order of Propitious Clouds by Chien 01.jpg|thumb|ROC President [[Tsai Ing-wen]] with U.S. House Speaker [[Nancy Pelosi]] on August 3, 2022]]
      On 18 March 2022, Joe Biden and Xi Jinping directly communicated with each other for the first time since Russia's invasion of Ukraine.<ref>{{cite news|date=March 18, 2022|title=US, China discuss Russia as Biden and Xi hold call|work=[[Al Jazeera Arabic|Al Jazeera]]|url=https://www.aljazeera.com/news/2022/3/18/biden-and-xi-to-talk-on-phone-as-us-presses-china-over-russia|access-date=March 20, 2022|archive-date=19 March 2022|archive-url=https://web.archive.org/web/20220319220508/https://www.aljazeera.com/news/2022/3/18/biden-and-xi-to-talk-on-phone-as-us-presses-china-over-russia|url-status=live}}</ref>
       
      In May 2022, Chinese officials ordered government agencies and state-backed companies to remove personal computers produced by American corporations and replace them with equipment from domestic companies. Bloomberg said the decision was one of China's most aggressive moves to eliminate the usage of foreign technology from the most sensitive parts of its government and spur its campaign to substitute foreign technology with domestic ones.<ref>{{cite news|last1=Li|first1=Yanping|last2=Gao|first2=Yuan|url=https://www.bloomberg.com/news/articles/2022-05-06/china-orders-government-state-firms-to-dump-foreign-pcs|title=China Orders Government, State Firms to Dump Foreign PCs|work=[[Bloomberg News]]|date=May 6, 2022|access-date=May 6, 2022|archive-date=May 6, 2022|archive-url=https://web.archive.org/web/20220506210247/https://www.bloomberg.com/news/articles/2022-05-06/china-orders-government-state-firms-to-dump-foreign-pcs|url-status=live}}</ref>
       
      In late May 2022, the State Department restored a line on its fact sheet on US-Taiwan relations which it removed earlier in the month and stated it did not support Taiwanese independence. However,<ref>{{cite news|title=U.S. puts back 'no support of Taiwan independence' statement on fact sheet|url=https://focustaiwan.tw/cross-strait/202206030004|agency=Focus Taiwan|publisher=CNA|access-date=November 14, 2022|archive-date=14 November 2022|archive-url=https://web.archive.org/web/20221114131005/https://focustaiwan.tw/cross-strait/202206030004|url-status=live}}</ref> another line which was also removed in the earlier fact sheet that acknowledged China's sovereignty claims over Taiwan was not restored while a line that stated the U.S. would maintain its capacity to resist any efforts by China to undermine the security, sovereignty and prosperity of Taiwan in a manner that was consistent with the Taiwan Relations Act was added to the updated fact sheet.
       
      On June 11, 2022, U.S. Secretary of Defense [[Lloyd Austin]] condemned China's "provocative, destabilizing"<!--The exact quote from France 24 uses "destabilising" https://www.france24.com/en/live-news/20220611-us-blasts-china-s-destabilising-military-activity-near-taiwan but the page at https://www.defense.gov/News/Transcripts/Transcript/Article/3158265/secretary-of-defense-lloyd-j-austin-iii-remarks-welcoming-japanese-minister-of/ uses the American spelling --> military activity near Taiwan,<ref>{{cite news|title=US blasts China's 'destabilising' military activity near Taiwan|url=https://www.france24.com/en/live-news/20220611-us-blasts-china-s-destabilising-military-activity-near-taiwan|work=France 24|date=June 11, 2022|access-date=14 August 2022|archive-date=13 August 2022|archive-url=https://web.archive.org/web/20220813231437/https://www.france24.com/en/live-news/20220611-us-blasts-china-s-destabilising-military-activity-near-taiwan|url-status=live}} - The France 24 article uses the British English "destabilising" while [https://www.defense.gov/News/Transcripts/Transcript/Article/3158265/secretary-of-defense-lloyd-j-austin-iii-remarks-welcoming-japanese-minister-of/ the press release] uses the American "destabilizing".</ref> a day after China's Defense Minister [[Wei Fenghe]] warned Austin that "if anyone dares to split Taiwan from China, the Chinese army will definitely not hesitate to start a war no matter the cost."<ref>{{cite news|title='Smash to smithereens': China threatens all-out war over Taiwan|url=https://www.aljazeera.com/news/2022/6/10/china-tells-us-it-will-not-hesitate-to-start-war-over-taiwan|work=Al-Jazeera|date=June 10, 2022|access-date=August 14, 2022|archive-date=August 13, 2022|archive-url=https://web.archive.org/web/20220813231524/https://www.aljazeera.com/news/2022/6/10/china-tells-us-it-will-not-hesitate-to-start-war-over-taiwan|url-status=live}}</ref>

      In July 2022, speaker of the house [[Nancy Pelosi]] announced that she would be leading a congressional delegation to the Indo-Pacific region.<ref name="Pelosi-2022">{{Cite web|date=31 July 2022|title=Pelosi to Lead Congressional Delegation to Indo-Pacific Region|url=https://pelosi.house.gov/news/press-releases/pelosi-to-lead-congressional-delegation-to-indo-pacific-region|access-date=2 August 2022|website=Congresswoman Nancy Pelosi |archive-date=2 August 2022|archive-url=https://web.archive.org/web/20220802112457/https://pelosi.house.gov/news/press-releases/pelosi-to-lead-congressional-delegation-to-indo-pacific-region|url-status=live}}</ref> She has planned to visit Singapore, Malaysia, South Korea and Japan, as well as the island of Taiwan.<ref name="Pelosi-2022" /> China has responded to this by saying "it would constitute a gross interference in China's internal affairs", and continued military exercises within Chinese territories.<ref>{{Cite web|date=2 August 2022|title=Taiwan and China step up military rhetoric as expected Pelosi visit looms|url=https://www.theguardian.com/world/2022/aug/02/taiwan-and-china-step-up-military-rhetoric-as-expected-pelosi-visit-looms|access-date=2 August 2022|website=The Guardian |archive-date=2 September 2024|archive-url=https://web.archive.org/web/20240902163011/https://www.theguardian.com/world/2022/aug/02/taiwan-and-china-step-up-military-rhetoric-as-expected-pelosi-visit-looms|url-status=live}}</ref> When [[2022 visit by Nancy Pelosi to Taiwan|Pelosi visited the island the following month]], the act was strongly condemned by China.<ref>{{cite web| url=https://edition.cnn.com/2022/08/02/politics/nancy-pelosi-visit-taipei-taiwan-trip/index.html| title=US House Speaker Nancy Pelosi lands in Taiwan amid threats of Chinese retaliation| date=2 August 2022| access-date=6 August 2022| archive-date=4 August 2022| archive-url=https://web.archive.org/web/20220804025031/https://edition.cnn.com/2022/08/02/politics/nancy-pelosi-visit-taipei-taiwan-trip/index.html| url-status=live}}</ref> As a result, China severed ties in all cooperation activities with the United States in several areas, including military matters, global climate cooperation, and drug trafficking enforcement. Later the [[State Department]] summoned Chinese ambassadors to complain about Chinese aggression. China claimed that the Pelosi visit served no other purpose than to provoke China and to deteriorate Sino-American relations while the United States, pointing to past precedent, said that Pelosi had the right to visit Taiwan and attacked the Chinese response as disproportionate.<ref>[https://apnews.com/article/taiwan-china-asia-beijing-b252479810add6a225fa1e4a6d441983 "China cuts off vital US contacts over Pelosi Taiwan visit"] {{Webarchive|url=https://web.archive.org/web/20220805095713/https://apnews.com/article/taiwan-china-asia-beijing-b252479810add6a225fa1e4a6d441983|date=5 August 2022}} ''APnews.com.'' Retrieved 6 August 2022.</ref><ref>[https://www.washingtonpost.com/politics/2022/08/05/us-summons-china-ambassador/ "White House summons Chinese ambassador as crisis escalates"] {{Webarchive|url=https://web.archive.org/web/20220806203137/https://www.washingtonpost.com/politics/2022/08/05/us-summons-china-ambassador/|date=6 August 2022}}. ''The Washington Post''. Retrieved 6 August 2022.</ref><ref>{{cite news|title=White House decries China rhetoric over Pelosi Taiwan visit|url=https://apnews.com/article/china-asia-beijing-malaysia-pacific-15f739b266c2c90ba41c5917f26eb980|work=AP News|access-date=14 November 2022|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108061737/https://apnews.com/article/china-asia-beijing-malaysia-pacific-15f739b266c2c90ba41c5917f26eb980|url-status=live}}</ref> After Pelosi's departure, the PRC began [[2022 Chinese military exercises around Taiwan|military exercises encircling Taiwan]].<ref>{{Cite news|work=Reuters|date=2 August 2022|title=China to launch 'targeted military operations' due to Pelosi visit |url=https://www.reuters.com/world/china-launch-targeted-military-operations-due-pelosi-visit-2022-08-02/|url-status=live|archive-url=https://web.archive.org/web/20220802231811/https://www.reuters.com/world/china-launch-targeted-military-operations-due-pelosi-visit-2022-08-02/|archive-date=2 August 2022}}</ref>
       
      On 7 October 2022, the U.S. implemented new [[United States New Export Controls on Advanced Computing and Semiconductors to China|export controls]] targeting China's ability to access and develop advanced computing and semiconductor manufacturing items.<ref>{{Cite web|last=Bureau of Industry and Security|date=7 October 2022|title=Commerce Implements New Export Controls on Advanced Computing and Semiconductor Manufacturing Items to the People's Republic of China (PRC)|url=https://www.bis.doc.gov/index.php/documents/about-bis/newsroom/press-releases/3158-2022-10-07-bis-press-release-advanced-computing-and-semiconductor-manufacturing-controls-final/file|access-date=29 October 2022|website=U.S. Department of Commerce Bureau of Industry and Security|archive-date=10 March 2024|archive-url=https://web.archive.org/web/20240310160001/https://www.bis.doc.gov/index.php/documents/about-bis/newsroom/press-releases/3158-2022-10-07-bis-press-release-advanced-computing-and-semiconductor-manufacturing-controls-final/file|url-status=live}}</ref> The new export controls reflect the United States' ambition to counter the accelerating advancement of China's high-tech capabilities in these spaces to address foreign policy and national security concerns.<ref>{{Cite web|date=24 October 2022|title=New US Semiconductor Export Controls Signify Dramatic Shift in Tech Relations With China|url=https://www.justsecurity.org/83744/new-us-semiconductor-export-controls-signify-dramatic-shift-in-tech-relations-with-china/|access-date=29 October 2022|website=Just Security |archive-date=8 December 2022|archive-url=https://web.archive.org/web/20221208071253/https://www.justsecurity.org/83744/new-us-semiconductor-export-controls-signify-dramatic-shift-in-tech-relations-with-china/|url-status=live}}</ref>
       
      [[File:President Biden met with President Xi of the PRC before the 2022 G20 Bali Summit.jpg|thumb|Chinese leader [[Xi Jinping]] with U.S. President [[Joe Biden]] at the [[2022 G20 Bali summit|G20 summit in Bali]], November 2022]]
      On 14 November 2022, Joe Biden and Xi Jinping met on the sidelines of the [[2022 G20 Bali summit|G20 summit]] in [[Bali]] for their first in-person encounter since Biden became president. The meeting lasted for more than 3 hours and they discussed a range of issues which included tensions over Taiwan and North Korea, and the war in Ukraine.<ref>{{cite news|title=Factbox: Top takeaways from the Biden-Xi meeting in Bali|url=https://www.reuters.com/world/top-takeaways-biden-xi-meeting-bali-2022-11-14|work=Reuters|access-date=17 November 2022|archive-date=16 November 2022|archive-url=https://web.archive.org/web/20221116101502/https://www.reuters.com/world/top-takeaways-biden-xi-meeting-bali-2022-11-14/|url-status=live}}</ref><ref>{{cite news|title=November 14, 2022 Biden, Xi meet during G20 summit|url=https://www.cnn.com/asia/live-news/biden-xi-meeting-g20-summit-bali-indonesia/index.html|agency=CNN|access-date=17 November 2022|archive-date=17 November 2022|archive-url=https://web.archive.org/web/20221117174915/https://www.cnn.com/asia/live-news/biden-xi-meeting-g20-summit-bali-indonesia/index.html|url-status=live}}</ref>
      [[File:Secretary Blinken Meets with Chinese State Councilor and Foreign Minister Wang Yi in Bali (52204013285).jpg|thumb|U.S. Secretary of State [[Antony Blinken]] (right) with Chinese Foreign Minister [[Wang Yi (politician)|Wang Yi]] on 9 July 2022. Blinken dismissed China's claims to be neutral in the [[Russo-Ukrainian War]] and accused China of supporting Russia.<ref>{{cite news|title=US's Blinken raises China's 'alignment with Russia' on Ukraine|url=https://www.aljazeera.com/news/2022/7/9/us-blinken-and-chinas-wang-yi-hold-talks-on-ukraine-trade|work=Al Jazeera|date=9 July 2022|access-date=26 February 2023|archive-date=20 March 2023|archive-url=https://web.archive.org/web/20230320064107/https://www.aljazeera.com/news/2022/7/9/us-blinken-and-chinas-wang-yi-hold-talks-on-ukraine-trade|url-status=live}}</ref>]]
      Some [[geoeconomics]] experts see an acceleration of the US–China rivalry as "inevitable" given the tensions manifested openly in the last months of 2022 and early 2023. In a series of interviews with [[BBC News]] and [[Asharq News]], Nicolas Firzli, director, [[Singapore Forum|EU ASEAN Centre]], argued that "Cold War 2 with China [was] part of the Biden Doctrine, and the only remaining point of convergence between Biden and a Republic dominated Congress [...] January 2023 is the moment when things crystalized irreversibly".<ref>Nicolas Firzli: [https://now.asharq.com/program/5/الرابط/1547258/هل-تحركات-واشنطن-كافية-للحد-من-سيطرة-الصين-على-قطاع-التكنولوجيا-المتقدمة "Interview of Nicolas Firzli & Joseph A. Bosco: China and Tech Supremacy"] {{Webarchive|url=https://web.archive.org/web/20230218114529/https://now.asharq.com/program/5/%D8%A7%D9%84%D8%B1%D8%A7%D8%A8%D8%B7/1547258/%D9%87%D9%84-%D8%AA%D8%AD%D8%B1%D9%83%D8%A7%D8%AA-%D9%88%D8%A7%D8%B4%D9%86%D8%B7%D9%86-%D9%83%D8%A7%D9%81%D9%8A%D8%A9-%D9%84%D9%84%D8%AD%D8%AF-%D9%85%D9%86-%D8%B3%D9%8A%D8%B7%D8%B1%D8%A9-%D8%A7%D9%84%D8%B5%D9%8A%D9%86-%D8%B9%D9%84%D9%89-%D9%82%D8%B7%D8%A7%D8%B9-%D8%A7%D9%84%D8%AA%D9%83%D9%86%D9%88%D9%84%D9%88%D8%AC%D9%8A%D8%A7-%D8%A7%D9%84%D9%85%D8%AA%D9%82%D8%AF%D9%85%D8%A9|date=18 February 2023}}, ''Asharq News with [[Bloomberg News|Bloomberg]]'', 12 January 2023</ref>
       
      On 2 February 2023, [[2023 Chinese balloon incident|a Chinese reconnaissance balloon]] was spotted flying over US airspace in the state of Montana, potentially to collect information related to nuclear silos in the area.<ref>{{Cite web|url=https://www.nytimes.com/2023/02/02/us/politics/china-spy-balloon-pentagon.html|title=U.S. Detects Suspected China Spy Balloon Hovering over Northwest|website=[[The New York Times]]|access-date=2 February 2023|archive-date=4 February 2023|archive-url=https://web.archive.org/web/20230204165824/https://www.nytimes.com/2023/02/02/us/politics/china-spy-balloon-pentagon.html|url-status=live}}</ref> Two days later, the United States shot it down over the Atlantic Ocean, citing national security concerns.<ref>{{Cite web|last=Capoot|first=Ashley|title=U.S. military shoots down suspected Chinese surveillance balloon|url=https://www.cnbc.com/2023/02/04/us-military-prepares-to-take-down-suspected-chinese-surveillance-balloon.html|access-date=4 February 2023|website=CNBC|date=4 February 2023 |archive-date=4 February 2023|archive-url=https://web.archive.org/web/20230204200619/https://www.cnbc.com/2023/02/04/us-military-prepares-to-take-down-suspected-chinese-surveillance-balloon.html|url-status=live}}</ref> The balloon incident followed previous Chinese government actions targeting the U.S., including the [[Chinese espionage in the United States|Chinese theft of the designs]] for the [[F-35]] about fifteen years earlier and successful Chinese government-sponsored [[Office of Personnel Management data breach|cyberattacks targeting the Office of Personnel Management]] security clearance files (2015), the [[Anthem medical data breach|healthcare company Anthem]] (2015), and the [[Marriott International]] system (2018).<ref name="CompIntensifies">{{Cite news|last=Sanger|first=David E.|date=5 February 2023|title=Balloon Incident Reveals More Than Spying as Competition With China Intensifies |work=[[The New York Times]]|url=https://www.nytimes.com/2023/02/05/us/politics/balloon-china-spying-united-states.html|url-access=limited|access-date=10 February 2023|issn=0362-4331|archive-date=10 February 2023|archive-url=https://web.archive.org/web/20230210105143/https://www.nytimes.com/2023/02/05/us/politics/balloon-china-spying-united-states.html|url-status=live}}</ref> In 2022, the U.S. and its allies imposed stringent additional [[export control]]s on the sale of "foundational technologies" (including [[Semiconductor device fabrication|advanced semiconductor chips]] and related technology) to China, with the aim of inhibiting any Chinese military buildup.<ref name="nytimes/2023/02/09/china-balloon-program" /> The [[Biden administration]] has also sought to maintain critical-sector supply chains independent from China.<ref name="nytimes/2023/02/09/china-balloon-program">{{cite news|last1=Wong|first1=Edward|last2=Barnes|first2=Julian E.|date=9 February 2023|title=Chinese Balloon Had Tools to Collect Electronic Communications, U.S. Says|work=[[The New York Times]]|url=https://www.nytimes.com/2023/02/09/us/politics/china-spy-balloon-program.html|url-access=limited|access-date=9 February 2023|archive-date=9 February 2023|archive-url=https://web.archive.org/web/20230209231207/https://www.nytimes.com/2023/02/09/us/politics/china-spy-balloon-program.html|url-status=live}}</ref> The Beijing government expressed strong dissatisfaction and protest against the US's use of force, calling it a violation of international practice. The U.S. claimed the balloon was a violation of its sovereignty.<ref>{{Cite news|title= China blasts US for shooting down balloon|url= https://www.dawn.com/news/1735601/china-blasts-us-for-shooting-down-balloon|access-date= 6 February 2023|archive-date= 6 February 2023|archive-url= https://web.archive.org/web/20230206164514/https://www.dawn.com/news/1735601/china-blasts-us-for-shooting-down-balloon|url-status= live}}</ref>
      [[File:U-2 Pilot over Central Continental United States (7644960).jpg|thumb|right|A U.S. Air Force [[Lockheed U-2|U-2]] pilot takes a picture somewhere over the Central Continental U.S.; the [[2023 Chinese balloon incident|Chinese balloon]] is in the background.]]
      On 11 February 2023, the U.S. Commerce Department prohibited six Chinese companies connected to the aerospace programs of the Chinese army from acquiring U.S. technology without authorization from the government. These six businesses include Nanjiang Aerospace Technology of Beijing; The 48th Research Institute of China Electronics Technology Group Corporation; Technology for Dongguan Lingkong Remote Sensing; Aviation Science and Technology Group of the Eagles Men; Tian-Hai-Xiang Aviation Technology in Guangzhou; together with the Shanxi Eagles Men Aviation Science and Technology Group.<ref>{{cite web|last1=Rokus|first1=Brian|title=US restricts 6 Chinese companies tied to airships and balloons|url=https://edition.cnn.com/2023/02/11/business/spy-balloon-us-restricts-chinese-companies-intl-hnk/index.html|website=CNN |date=11 February 2023|access-date=14 February 2023|archive-date=2 September 2024|archive-url=https://web.archive.org/web/20240902164742/https://edition.cnn.com/2023/02/11/business/spy-balloon-us-restricts-chinese-companies-intl-hnk/index.html|url-status=live}}</ref>
       
      In April 2023, China sanctioned U.S. Representative [[Michael McCaul]] in response to a legislative trip for Taiwanese President [[Tsai Ing-wen]].<ref>{{cite web|title=China sanctions U.S. Congress member for Taiwan visit|url=https://www.cnbc.com/2023/04/14/china-sanctions-us-congress-member-for-taiwan-visit.html|website=cnbc.com|date=14 April 2023|publisher=CNBC|access-date=April 14, 2023|archive-date=April 14, 2023|archive-url=https://web.archive.org/web/20230414174627/https://www.cnbc.com/2023/04/14/china-sanctions-us-congress-member-for-taiwan-visit.html|url-status=live}}</ref>
       
      In May 2023, an American citizen living in Hong Kong named John Shing-Wan Leung was sentenced to life in prison on charges of espionage. Leung was arrested in 2021 by China's counterintelligence agency.<ref>{{Cite news|date=15 May 2023|first=Gareth|last=Evans|title=China sentences 78-year-old US citizen to life in prison for spying|url=https://www.bbc.com/news/world-asia-china-65595221|access-date=15 May 2023|website=[[BBC News]] |archive-date=15 May 2023|archive-url=https://web.archive.org/web/20230515100541/https://www.bbc.com/news/world-asia-china-65595221|url-status=live}}</ref>
      On September 23, 2024, the Biden administration banned Chinese software from U.S. internet-connected vehicles, citing national security risks. This move builds on previous actions against Chinese tech, deepening the digital divide between the two nations.<ref>{{cite web|title=US for ban on Chinese-developed software in Internet-connected cars in country|date= September 24, 2024|url=https://www.telegraphindia.com/world/us-for-ban-on-chinese-developed-software-in-internet-connected-cars-in-country/cid/2050087 |work=The Telegraph Online| access-date=25 September 2024}}</ref>
       
      ====Attempts to fix relationship (2023–2024)====

      In mid-2023, both countries started to increase meetings between high-level officials in the hope of stabilizing the relationship; on 11 May, U.S. national security adviser [[Jake Sullivan]] met with [[Wang Yi (politician)|Wang Yi]], director of the CCP [[Office of the Central Foreign Affairs Commission]], with the topics including Taiwan and Russia's invasion of Ukraine.<ref>{{Cite news|last1=Hutzler|first1=Charles|last2=Youssef|first2=Nancy A.|date=11 May 2023|title=U.S., China Senior Officials Meet in Tentative Effort to Restart Ties |work=[[The Wall Street Journal]]|url=https://www.wsj.com/articles/u-s-china-senior-officials-meet-in-tentative-effort-to-restart-ties-54f49ba4|access-date=8 June 2023|issn=0099-9660|archive-date=20 June 2023|archive-url=https://web.archive.org/web/20230620190042/https://www.wsj.com/articles/u-s-china-senior-officials-meet-in-tentative-effort-to-restart-ties-54f49ba4|url-status=live}}</ref> On 21 May, Biden commented during the [[47th G7 summit|G7 summit in Hiroshima]] that he expected a thaw in relations with China soon, commenting that the two countries were moving towards more dialogue but "this silly balloon that was carrying two freight cars worth of spy equipment was flying over the United States and it got shot down and everything changed in terms of talking to one another".<ref>{{Cite news|last1=Thomas|first1=Ken|last2=Linskey|first2=Annie|date=21 May 2023|title=Biden Sees Potential Thaw With China After Tough G-7 Statement |work=[[The Wall Street Journal]]|url=https://www.wsj.com/articles/biden-sees-potential-thaw-with-china-after-tough-g-7-statement-5c200aa9|access-date=8 June 2023|issn=0099-9660|archive-date=8 June 2023|archive-url=https://web.archive.org/web/20230608232934/https://www.wsj.com/articles/biden-sees-potential-thaw-with-china-after-tough-g-7-statement-5c200aa9|url-status=live}}</ref> On 26 May, Chinese minister of commerce [[Wang Wentao]] met with U.S. secretary of commerce [[Gina Raimondo]], where Raimondo raised concerns about treatment of U.S. companies by China.<ref>{{Cite news|last1=Politi|first1=James|last2=Leahy|first2=Joe|date=26 May 2023|title=US and China address trade tensions in rare high-level Washington meeting|work=[[Financial Times]]|url=https://www.ft.com/content/fd43bb75-cc29-4ba1-9cab-9c0f5dfdb6bb|access-date=8 June 2023|archive-date=8 June 2023|archive-url=https://web.archive.org/web/20230608183547/https://www.ft.com/content/fd43bb75-cc29-4ba1-9cab-9c0f5dfdb6bb|url-status=live}}</ref> U.S. officials also announced in June that [[Central Intelligence Agency]] (CIA) director [[William J. Burns (diplomat)|William J. Burns]] travelled to China in May.<ref>{{Cite news|last1=Martina|first1=Michael|last2=Hunnicutt|first2=Trevor|date=2 June 2023|title=CIA chief Burns visited China in May |work=[[Reuters]]|url=https://www.reuters.com/world/cia-head-visited-china-may-met-counterparts-us-official-2023-06-02/|access-date=8 June 2023|archive-date=9 June 2023|archive-url=https://web.archive.org/web/20230609204122/https://www.reuters.com/world/cia-head-visited-china-may-met-counterparts-us-official-2023-06-02/|url-status=live}}</ref> However, a meeting in the [[Shangri-La Dialogue]] between Chinese minister of national defense [[Li Shangfu]] and U.S. secretary of defense [[Lloyd Austin]] failed to take place, after China rebuffed U.S. requests to meet.<ref>{{Cite news|last1=Lin|first1=Chen|last2=Kapoor|first2=Kanupriya|date=4 June 2023|title=China says clash with US would be 'unbearable disaster' |work=[[Reuters]]|url=https://www.reuters.com/world/china/china-seeks-dialogue-over-confrontation-defence-minister-tells-security-meet-2023-06-04/|access-date=8 June 2023|archive-date=7 June 2023|archive-url=https://web.archive.org/web/20230607230613/https://www.reuters.com/world/china/china-seeks-dialogue-over-confrontation-defence-minister-tells-security-meet-2023-06-04/|url-status=live}}</ref> In late June 2023, Blinken traveled to China and met with Xi; subsequent public statements by both countries were largely positive, with Xi and Blinken emphasizing that both sides have a responsibility to manage relations.<ref>{{Cite web|last1=Sim|first1=Dewey|last2=Wang|first2=Orange|date=19 June 2023|title=Xi and Blinken Cap China Trip With Vow to Steady Ties to Ward off Conflict|url=https://www.scmp.com/news/china/diplomacy/article/3224560/antony-blinken-and-wang-yi-meet-beijing-us-and-china-push-mend-strained-relationship|access-date=21 June 2023|website=[[South China Morning Post]] |archive-date=21 June 2023|archive-url=https://web.archive.org/web/20230621042425/https://www.scmp.com/news/china/diplomacy/article/3224560/antony-blinken-and-wang-yi-meet-beijing-us-and-china-push-mend-strained-relationship|url-status=live}}</ref> However, relations became more contentious after Biden called Xi a "[[dictator]]".<ref>{{Cite news |last1=Hawkins |first1=Amy |date=23 June 2023 |title=China reportedly rebukes US ambassador after Biden called Xi a 'dictator' |url=https://www.theguardian.com/world/2023/jun/23/china-reportedly-rebukes-us-ambassador-after-biden-called-xi-a-dictator |url-status=live |archive-url=https://web.archive.org/web/20240902163015/https://www.theguardian.com/world/2023/jun/23/china-reportedly-rebukes-us-ambassador-after-biden-called-xi-a-dictator |archive-date=2 September 2024 |access-date=25 June 2023 |work=The Guardian |issn=0261-3077}}</ref>
      [[File:Yellen-He meeting 2023.jpg|thumb|U.S Treasury Secretary [[Janet Yellen]] meeting with Vice Premier [[He Lifeng]] during Yellen's trip to Beijing, 8 July 2023]]
      The trips further continued as between 6–9 July, United States secretary of treasury [[Janet Yellen]] visited China, her first trip to the country during her tenure as well as the first trip to the country by a U.S. Treasury secretary in four years. During the visit, she met with various Chinese officials, including former vice premier [[Liu He (politician)|Liu He]], governor of the [[People's Bank of China]] (PBC) [[Yi Gang]],<ref>{{Cite news|last1=Cash|first1=Joe|date=7 July 2023|title=Yellen holds talks with China central bank governor, ex-economy tsar |work=[[Reuters]]|url=https://www.reuters.com/world/yellen-holds-talks-with-chinas-central-bank-governor-former-economy-tsar-2023-07-07/|access-date=9 July 2023|archive-date=15 July 2023|archive-url=https://web.archive.org/web/20230715133750/https://www.reuters.com/world/yellen-holds-talks-with-chinas-central-bank-governor-former-economy-tsar-2023-07-07/|url-status=live}}</ref> minister of finance [[Liu Kun]],<ref name="Rappeport-2023">{{Cite news|last1=Rappeport|first1=Alan|last2=Bradsher|first2=Keith|date=9 July 2023|title=China and the U.S., Still Adversaries, Are Talking. That's a Start. |work=[[The New York Times]]|url=https://www.nytimes.com/2023/07/09/business/janet-yellen-china-us.html|access-date=9 July 2023|issn=0362-4331|archive-date=1 September 2023|archive-url=https://web.archive.org/web/20230901060744/https://www.nytimes.com/2023/07/09/business/janet-yellen-china-us.html|url-status=live}}</ref> CCP secretary of PBC [[Pan Gongsheng]], vice premier [[He Lifeng]], and premier [[Li Qiang]].<ref>{{Cite news|last=Dendrinou|first=Viktoria|date=9 July 2023|title=Yellen Says U.S.-China Ties on 'Surer Footing' After Critical Trip |work=[[Bloomberg News]]|url=https://www.bloomberg.com/news/articles/2023-07-09/yellen-says-us-china-ties-on-surer-footing-after-critical-trip|access-date=9 July 2023|archive-date=10 July 2023|archive-url=https://web.archive.org/web/20230710021928/https://www.bloomberg.com/news/articles/2023-07-09/yellen-says-us-china-ties-on-surer-footing-after-critical-trip|url-status=live}}</ref> During her visit to, Yellen criticized China's treatment of American companies with foreign connections,<ref>{{Cite news|last1=Rappeport|first1=Alan|last2=Bradsher|first2=Keith|date=7 July 2023|title=Yellen, in Beijing, Criticizes China's Treatment of U.S. Companies |work=The New York Times|url=https://www.nytimes.com/2023/07/07/business/yellen-china-companies-meetings.html|access-date=8 July 2023|issn=0362-4331|archive-date=9 July 2023|archive-url=https://web.archive.org/web/20230709054911/https://www.nytimes.com/2023/07/07/business/yellen-china-companies-meetings.html|url-status=live}}</ref> stating to Li Qiang: "We seek healthy economic competition that is not winner-take-all but that, with a fair set of rules, can benefit both countries over time."<ref>{{Cite news|last1=Shalal|first1=Andrea|last2=Cash|first2=Joe|last3=Cash|first3=Joe|date=7 July 2023|title=Yellen criticizes China's 'punitive' actions against US companies, urges market reforms |work=[[Reuters]]|url=https://www.reuters.com/world/yellen-urges-china-adopt-market-reforms-insists-us-not-decoupling-2023-07-07/|access-date=8 July 2023|archive-date=9 July 2023|archive-url=https://web.archive.org/web/20230709065633/https://www.reuters.com/world/yellen-urges-china-adopt-market-reforms-insists-us-not-decoupling-2023-07-07/|url-status=live}}</ref> She also said that the U.S. national security restrictions on investment in China were intended to be narrowly focused and not have broad effects on the Chinese economy.<ref name="Rappeport-2023" />
      [[File:Qin-Blinken meeting (2023) 02.jpg|thumb|Antony Blinken with Chinese Foreign Minister [[Qin Gang]] in Beijing, 18 June 2023]]
      On 13 July 2023, Secretary of State [[Antony Blinken]] met the Director of the Office of the Central Commission for Foreign Affairs [[Wang Yi (politician)|Wang Yi]] in [[Jakarta]] at the [[ASEAN]] Post-Ministerial Conference at the request of Blinken to discuss the removal of obstacles that complicate U.S.-China relations, such as the Taiwan question and sanctions the U.S. is imposing against China's high-technology sector, as well as to promote the pragmatic approach with regard to regional cooperation. Former Minister of Foreign Affairs of China [[Qin Gang]] had just been replaced by his predecessor [[Wang Yi (politician)|Wang Yi]] due to an extramarital affair of Gang in July of the same year.  This meeting also paved the way for a further encounter of China's top diplomat Wang Yi before year's end when he will be invited to meet Blinken in Washington DC. Later on the sidelines of the U.N General Assembly (UNGA) in NY on 26 September, Vice-president [[Han Zheng]] met with U.S. Secretary of State Antony Blinken to further nurture the strained bilateral ties of both superpowers. The absence of Xi Jinping at the [[2023 G20 New Delhi summit]] in India on 9 and 10 September was regretful, according to a statement by U.S. President Joe Biden, however, recent news reports indicate that both CCP General Secretary Xi as well as CCP Foreign Affairs Commission Office Director Wang Yi will meet Biden and Blinken before year's end to hopefully ease the strained relations between the two nations.<ref>[https://www.reuters.com/world/us-expects-blinken-will-host-chinas-top-diplomat-wang-yi-before-year-end-2023-09-11/ "US expects Blinken will host China's top diplomat Wang Yi before year-end"]. ''Reuters'' (12 September 2023). Accessed 1 October 2023.</ref>
       
      Yellen's visit was followed by a visit by United States secretary of commerce [[Gina Raimondo]] between 27 and 30 August, where she met minister of culture and tourism [[Hu Heping]], minister of commerce [[Wang Wentao]], vice premier He Lifeng, and premier Li Qiang.<ref>{{Cite news|last1=Wong|first1=Kandy|last2=Jennings|first2=Ralph|last3=Nulimaimaiti|first3=Mia|date=29 August 2023|title=As Gina Raimondo wraps up Beijing leg of China trip with high-level meetings, will it be a litmus test for relations?|work=[[South China Morning Post]]|url=https://www.scmp.com/economy/global-economy/article/3232692/gina-raimondos-trip-shifts-tone-and-cools-tensions-it-litmus-test-us-china-relations-talks-resume?module=inline&pgtype=article|access-date=3 September 2023}}</ref> Raimondo also visited Shanghai, where she met with Shanghai Communist Party secretary [[Chen Jining]], and visited [[Shanghai Disneyland]].<ref>{{Cite news|last=Shepardson|first=David|date=30 August 2023|title=US Commerce chief leaves China on upbeat note after 'uninvestible' remark |work=[[Reuters]]|url=https://www.reuters.com/markets/china-response-uss-raimondo-says-it-is-easing-market-access-foreign-firms-2023-08-30/|access-date=3 September 2023}}</ref> During the meeting, the two sides announced a [[working group]] on commercial issues and an export control enforcement "information exchange" dialogue.<ref>{{Cite news|last=Bade|first=Gavin|date=31 August 2023|title=Raimondo's 'bold move' in China|work=[[Politico]]|url=https://www.politico.com/news/2023/08/31/raimondo-china-congressional-hawks-00113601|access-date=3 September 2023}}</ref> The working group, upon its launch on 22 September 2023, was divided into two segments: one economic subgroup and one financial subgroup.<ref>{{cite news|last1=Hussein|first1=Fatima|title=United States and China launch economic and financial working groups with aim of easing tensions|url=https://apnews.com/article/us-china-working-groups-yellen-tensions-c21a6d14467893123ef70eb8a0443366|access-date=26 September 2023|publisher=AP News|date=22 September 2023|archive-url=https://web.archive.org/web/20230922120621/https://apnews.com/article/us-china-working-groups-yellen-tensions-c21a6d14467893123ef70eb8a0443366|archive-date=22 September 2023}}</ref>
       
      [[File:Sullivan-Wang meeting (2023).jpg|thumb|Biden's National Security Advisor [[Jake Sullivan]] with CCP Foreign Affairs Commission Office director [[Wang Yi (politician)|Wang Yi]], 28 October 2023]]
      On November 2, 2023, a report from the [[Wall Street Journal]] was released saying that the U.S. and China would hold [[nuclear arms]] talks, a rarity, ahead of Xi Jinping's visit to the United States.<ref>{{cite magazine|url=https://time.com/6330731/us-china-nuclear-arms-talks/|agency=[[Bloomberg News]]|magazine=[[Time (magazine)|Time]]|date=2 November 2023|title=U.S. and China to Hold Rare Nuclear Arms Talks Before Biden-Xi Meeting|access-date=2 November 2023}}</ref>
       
      At the beginning of November 2023, insiders cautiously expressed hope for a climate agreement between [[China]] and [[United States]] ahead of the [[2023 United Nations Climate Change Conference]], similar to the agreement of 2014 which paved the way for the [[Paris Agreement]]. One contentious topic is a plan for reduction of [[methane]] emissions in China. According to China's climate envoy [[Xie Zhenhua (politician)|Xie Zhenhua]] "progress on a plan reflected the state of U.S.-China relations." Another is a reduction in [[Coal in China|coal use in China]]. China says it expands coal use for improving [[energy security]], even though many think there are better ways to improve it.<ref>{{cite news|last1=Hawkins|first1=Amy|title=China releases methane plan as hopes rise for new climate agreement with US|url=https://www.theguardian.com/world/2023/nov/08/china-methane-plan-climate-agreement-us|access-date=8 November 2023|newspaper=The Guardian|date=8 November 2023}}</ref> Talks between [[Janet Yellen]] and [[He Lifeng]] yielded a decision to enhance cooperation between China and the United States in several domains, including [[Climate change|climate]], [[debt relief]]. Much is expected from the meeting between Joe Biden and Xi Jinping. According to Kate Logan from the [[Asia Society Policy Institute]], cooperation between the 2 countries, can "set the stage for a successful outcome at the COP28".<ref>{{cite web|title=US, China agree to cooperate on climate change, global debt relief|url=https://www.carbonbrief.org/daily-brief/us-china-agree-to-cooperate-on-climate-change-global-debt-relief/|website=Carbon Brief|access-date=14 November 2023}}</ref>
       
      On 15 November 2023, President Joe Biden met with Xi Jinping at the [[APEC United States 2023|2023 APEC Summit]] in San Francisco.<ref>{{Cite news|last1=Hunnicutt|first1=Trevor|last2=Mason|first2=Jeff|last3=Holland|first3=Steve|last4=Mason|first4=Jeff|date=16 November 2023|title=Biden, Xi's 'blunt' talks yield deals on military, fentanyl |work=[[Reuters]]|url=https://www.reuters.com/world/biden-xi-meet-us-china-military-economic-tensions-grind-2023-11-15/|access-date=16 November 2023}}</ref> This was speculated to be their last meeting of 2023 before Biden's [[Joe Biden 2024 presidential campaign|2024 reelection campaign]].<ref>{{Cite web|last=Cheng|first=Evelyn|date=15 November 2023|title=Earth is 'big enough' for U.S. and China to succeed, Xi says as he meets Biden|url=https://www.cnbc.com/2023/11/15/xi-biden-at-apec-summit-china-us-leaders-meet-in-san-francisco.html|access-date=17 November 2023|website=CNBC}}</ref>
       
      The U.S. and China resumed semi-official nuclear arms talks in March 2024, with China reassuring the U.S. it wouldn't use nuclear weapons over Taiwan and reaffirming its no-first-use policy. Despite broader tensions, both sides plan to continue discussions in 2025.<ref>{{Cite news|last1=Torode|first1=Greg|last2=Doyle|first2= Gerry|last3=Chen|first3=Laurie|date=21 June 2024|title=U.S. and China hold first informal nuclear talks in five years|newspaper=Reuters|url=https://www.reuters.com/world/us-china-hold-first-informal-nuclear-talks-5-years-eyeing-taiwan-2024-06-21/|access-date=23 June 2024}}</ref>
       
      In October 2024 American drone maker [[Skydio]] was sanctioned by China after its products were approved for use by [[fire department]]s in Taiwan. The Chinese government forbade components suppliers and other businesses in China from doing business with Skydio.<ref>{{cite web |last1=Irwin |first1=Kate |title=China Sanctions US Drone Maker Skydio Over Taiwan Deal |url=https://www.pcmag.com/news/china-sanctions-us-drone-maker-skydio-over-taiwan-deal |date=31 October 2024 |website=PC Magazine |access-date=31 October 2024}}</ref>
       
      In November 2024, [[John Moolenaar]], chairman of the [[United States House Select Committee on Strategic Competition between the United States and the Chinese Communist Party]], introduced legislation to revoke [[Permanent normal trade relations|PNTR status]] for the People's Republic of China.<ref>{{Cite web |last=Kelly |first=Laura |date=14 November 2024 |title=Republican introduces bill to revoke normal trade relations with China |url=https://thehill.com/policy/international/4991044-republican-proposes-ending-trade-relations-china/ |access-date=16 November 2024 |website=[[The Hill (newspaper)|The Hill]]}}</ref> The same month, the [[United States–China Economic and Security Review Commission]] unanimously recommended revocation of China's PNTR status.<ref>{{Cite news |last=Cadell |first=Cate |date=19 November 2024 |title=Congressional committee advises revoking China's trade status |url=https://www.washingtonpost.com/national-security/2024/11/19/china-congress-trade-tariffs-ai/ |access-date=19 November 2024 |newspaper=[[The Washington Post]]}}</ref>
       
      [[File:President Joe Biden meeting President Xi Jinping at APEC Peru 2024.jpg|thumb|Chinese leader [[Xi Jinping]] with U.S. President [[Joe Biden]] at the [[APEC Peru 2024|APEC summit in Lima]], November 2024]]
      On 16 November 2024, Xi Jinping and Joe Biden met on the sidelines of the [[APEC Peru 2024|APEC summit]] in [[Lima]]. They discussed stabilizing U.S.-China relations at [[APEC Peru 2024|APEC summit in Lima]], as Trump's return raises concerns over potential trade and Taiwan tensions. Beijing seeks dialogue but braces for challenges.<ref>{{Cite news|last=Frances|first=Mao|date=17 November 2024|title=Xi says he will work with Trump in last meeting with Biden|newspaper=BBC|url=https://www.bbc.co.uk/news/articles/cx2l4dn802lo |access-date=17 November 2024}}</ref>
       
      On December 1, 2024, China condemned a U.S. arms sale to Taiwan, valued at $385 million, which included F-16 jet parts and radar support. The sale was approved by the U.S. just before [[Lai Ching-te]] began a Pacific tour with stops in Hawaii and Guam. China criticized the sale for encouraging Taiwan's independence and damaging U.S.-China relations, and objected to Lai's U.S. transit, calling him a "separatist." Despite the lack of formal diplomatic ties, the U.S. is required by law to assist Taiwan in defending itself, which continues to provoke Beijing. Taiwan rejects China's claims of sovereignty.<ref>{{cite news |date=1 December 2024 |title=China blasts U.S. arms sale to Taiwan, President Lai's U.S. transit |url=https://www.nbcnews.com/news/world/china-taiwan-us-arms-sales-president-lai-ching-te-hawaii-rcna182323 |access-date=1 December 2024 |website=[[NBC News]]}}</ref> After Washington announced more military aid and sales to Taiwan, China called it "playing with fire" and said such actions by the United States contradict the solemn commitments of its leaders not to support Taiwan independence.<ref>{{cite news |date=22 December 2024 |title=China says US 'playing with fire' by giving Taiwan more military aid |url=https://www.aljazeera.com/news/2024/12/22/china-says-us-playing-with-fire-by-giving-taiwan-more-military-aid |agency=[[Al-Jazeera]]}}</ref>

      ===Second Trump administration (2025–present)===
      {{main|Foreign policy of the second Trump administration#China, Taiwan, and the South China Sea|Tariffs in the second Trump administration|China–United States trade war}}

      [[File:President Donald Trump greets Chinese President Xi Jinping before a bilateral meeting at the Gimhae International Airport terminal (54890669668).jpg|thumb|Chinese leader [[Xi Jinping]] with U.S. president [[Donald Trump]] at the [[APEC South Korea 2025|APEC summit]] in [[Busan]], October 2025]]
      Following his [[2024 United States presidential election|second election victory]] as President of the United States in November 2024, Donald Trump nominated Florida Senator [[Marco Rubio]] as Secretary of State and Representative [[Mike Waltz]] as National Security Advisor in his second administration. According to Neil Thomas, a fellow in Chinese politics at the [[Asia Society]] Policy Institute's Center for China Analysis, the selection of Rubio and Waltz—both known as hardliners on China—signals that Trump's foreign policy will prioritize China above all else.<ref>{{cite web |last=Wang |first=Selina |date=13 November 2024 |title=Rubio and Waltz picks put China back at the center of US foreign policy |url=https://abcnews.go.com/Politics/rubio-waltz-picks-puts-china-back-center-us/story?id=115787057 |access-date=14 November 2024 |website=[[ABC News (United States)|ABC News]] }}</ref> Just before [[Second inauguration of Donald Trump|Trump's second inauguration]] in January 2025, Vice President [[JD Vance]] and ally [[Elon Musk]] each held separate meetings with China's vice president [[Han Zheng]], who was in Washington attending the event as China's paramount leader [[Xi Jinping]]'s special representative.<ref>{{Cite news |last=Wang |first=Orange |date=20 January 2025 |url=https://www.scmp.com/news/china/diplomacy/article/3295419/china-vice-president-han-meets-vance-musk-ahead-trump-inauguration |title=Han and Vance strike positive tone for US-China ties ahead of Trump inauguration |newspaper=[[South China Morning Post]] |access-date=20 January 2025 |url-status=live |archive-url=https://web.archive.org/web/20250120045309/https://www.scmp.com/news/china/diplomacy/article/3295419/china-vice-president-han-meets-vance-musk-ahead-trump-inauguration |archive-date=20 January 2025 }}</ref> Han's presence at the capitol was seen by commentators as representative of Xi's interest in strengthening the two countries' relationship under Trump's tenure.<ref>{{Cite news |last=McCarthy |first=Simone |date=20 January 2025 |title=Who is Han Zheng, the senior Chinese official attending Trump's inauguration? |url=https://www.cnn.com/2025/01/19/china/han-zheng-trump-inauguration-intl-hnk/index.html |agency=[[CNN]] |access-date=20 January 2025 }}</ref><ref name="AP who is">{{cite news |last=Bodeen |first=Christopher |date=20 January 2025 |title=Vice President Han Zheng, China's representative at Trump's inauguration, is a trusted adviser to Xi |url=https://apnews.com/article/han-zheng-trump-inauguration-china-vice-president-5bb18d5049683d6624a9e1d4ee028104 |access-date=20 January 2025 |work=[[Associated Press]]}}</ref>
       
      In March 2025, China denounced [[G7]] statements accusing it of destabilizing maritime security, highlighting ongoing diplomatic friction.<ref name=":2" /> On 23 March 2025, Chinese Premier [[Li Qiang]] met with U.S. Senator [[Steve Daines]], a Trump ally, in Beijing. Li emphasized the need for dialogue over confrontation, while Daines carried Trump's "[[America First (policy)|America First]]" agenda, particularly on trade and fentanyl issues. The U.S. imposed 20% tariffs on Chinese imports, prompting Beijing to retaliate with 15% duties on American farm goods. China maintained that economic cooperation was vital and opposed U.S. pressure over fentanyl controls.<ref>{{cite news |last1=Krolicki |first1=Kevin |last2=Li |first2=Qiaoyi |date=2 January 2025 |title=China denounces Trump tariff: 'Fentanyl is America's problem' |url=https://www.reuters.com/world/china/china-denounces-trump-tariff-fentanyl-is-americas-problem-2025-02-02/ |access-date=2 February 2025 |work=[[Reuters]]}}</ref>
       
      Trump blamed China for the [[Opioid epidemic in the United States|opioid crisis in the United States]].<ref>{{cite news |date=4 March 2025 |title=How does fentanyl get into the US? |url=https://www.bbc.com/news/articles/cvg93nn1e6go |work=[[BBC News]]}}</ref> He said the tariffs are intended to pressure China to do more to stop the flow of [[fentanyl]] into the US.<ref>{{cite news |date=5 March 2025 |title=Can Trump's tariffs break China's grip on manufacturing? |url=https://www.bbc.com/news/articles/cdxqeg51y36o |work=[[BBC News]]}}</ref> [[Opioid]]s, predominantly fentanyl, have killed over 500,000 Americans since 2012.<ref>{{Cite magazine |author=Felbab-Brown |first=Vanda |date=17 February 2025 |title=The New War on Drugs |url=https://www.foreignaffairs.com/canada/new-war-drugs |url-status=live |archive-url=https://web.archive.org/web/20250226170429/https://www.foreignaffairs.com/canada/new-war-drugs |archive-date=26 February 2025 |access-date=7 March 2025 |website=[[Foreign Affairs]]}}</ref> On 18 April 2025, the U.S. State Department accused China's Chang Guang Satellite Technology of providing satellite imagery to Iran-backed [[Houthis|Houthi forces]], allegedly aiding attacks on U.S. and international vessels in the [[Red Sea]]. Officials described the support as ongoing and "unacceptable", despite prior U.S. diplomatic engagement with Beijing.<ref>{{Cite web |date=18 April 2025 |title=US says Chinese satellite firm is supporting Houthi attacks on US interests |url=https://www.scmp.com/news/world/middle-east/article/3306997/us-says-chinese-satellite-firm-supporting-houthi-attacks-us-interests |access-date=9 June 2025 |website=[[South China Morning Post]]}}</ref>
       
      Under the directive published by the [[State Department of the United States|U.S. State Department]] in 2025, the [[Paramount leader|Chinese leader]] should be referred to as "[[General Secretary of the Chinese Communist Party]]", rather than "[[President of China]]" reflecting the supremacy of the [[One-party state|party over the state]].<ref>{{cite news |title=Secretary of State Marco Rubio with Hugh Hewitt Interview |url=https://www.state.gov/secretary-of-state-marco-rubio-with-hugh-hewitt/ |work=[[United States Department of State]] |author=[[Marco Rubio]] & [[Hugh Hewitt]] |date=19 March 2025 |quote=Yesterday, The Wall Street Journal reported that General Secretary Xi is upset about the deal you made in Panama about the canal...}}</ref><ref>{{cite news |last=Ching |first=Nike |date=3 March 2025 |title=State Department guidance distinguishes CCP from Chinese people |url=https://www.voanews.com/a/voa-exclusive-state-department-guidance-distinguishes-ccp-from-chinese-people/7996193.html |access-date=5 December 2025 |work=[[Voice of America]]}}</ref>
       
      In June 2025, a majority of [[119th United States Congress|U.S. senators]] supported [[secondary sanctions]] against Russia over [[Vladimir Putin]]'s unwillingness to agree to a [[Peace negotiations in the Russian invasion of Ukraine|ceasefire]] in Ukraine, which would impose 500% [[Tariffs in the second Trump administration|tariffs]] on countries that buy [[Petroleum industry in Russia|Russian oil]], [[Natural gas in Russia|natural gas]], [[Mining industry of Russia|uranium]] and other exports. China is one of the major consumers of Russian energy.<ref>{{cite news |title=US Senate may work on Russia sanctions bill this month |url=https://www.reuters.com/world/us/us-senate-may-work-russia-sanctions-bill-this-month-2025-06-02/ |work=Reuters |date=2 June 2025}}</ref>
       
      [[Liu Jianchao]], head of the [[International Department of the Chinese Communist Party]], criticized U.S. Defense Secretary [[Pete Hegseth]] during an address at the 13th World Peace Forum in [[Beijing]], accusing him of promoting "hegemonic thinking" and inciting confrontation. Liu's comments followed Hegseth's call for U.S. allies to strengthen their militaries to counter China and his warning that Beijing was preparing to use military force to alter the balance of power in Asia. Liu rejected these remarks, emphasized China's commitment to "peaceful reunification" with Taiwan, and stated that China would firmly oppose any moves toward Taiwanese independence. The exchange highlighted ongoing tensions between China and the United States over Taiwan, regional security, and broader geopolitical disputes.<ref>{{Cite web |date=3 July 2025 |title=Top China Official Says US Defence Chief 'Inciting Conflict' |url=https://ground.news/article/top-china-official-says-us-defence-chief-inciting-conflict |access-date=4 July 2025 |website=Ground News}}</ref><ref>{{Cite web |last=AFP |date=3 July 2025 |title=Top China official accuses US defence chief of 'inciting conflict' |url=http://hongkongfp.com/2025/07/03/top-china-official-accuses-us-defence-chief-of-inciting-conflict/ |access-date=4 July 2025 |website=Hong Kong Free Press}}</ref><ref>{{Cite web |date=3 July 2025 |title=Top China official says US defence chief 'inciting conflict' |url=https://www.france24.com/en/live-news/20250703-top-china-official-says-us-defence-chief-inciting-conflict |access-date=4 July 2025 |website=France 24}}</ref> 
       
      In October 2025, Trump cited proximity to China's nuclear facilities for demanding Afghanistan the access to [[Bagram Airfield]] which was vacated in 2021.<ref>{{Cite web |last=Quillen |first=Stephen |title=Regional powers signal objection to US reclaiming Afghanistan's Bagram base |url=https://www.aljazeera.com/news/2025/10/8/regional-powers-signal-objection-to-us-reclaiming-afghanistans-bagram-base |access-date=13 October 2025 |website=Al Jazeera}}</ref> In an interview, he also claimed that China, among other countries, was secretly testing nuclear weapons and that "they don't have reporters" to write about it. While Trump stated that the U.S. would resume nuclear tests, China denied any clandestine nuclear testing.<ref>{{Cite web |date=2 November 2025 |title=Read the full transcript of Norah O'Donnell's interview with President Trump here |url=https://www.cbsnews.com/news/read-full-transcript-norah-odonnell-60-minutes-interview-with-president-trump/ |access-date=6 November 2025 |website=[[CBS News]]}}</ref><ref>{{Cite web |date=3 November 2025 |title=China denies Trump's claim to 60 Minutes about nuclear weapons tests, calls on U.S. to ensure global stability |url=https://www.cbsnews.com/news/china-trump-nuclear-weapons-tests-60-minutes-beijing-response/ |access-date=6 November 2025 |website=[[CBS News]]}}</ref>

      In December 2025, the second Trump administration released its [[National Security Strategy (United States)|National Security Strategy]]. Regarding China, the document calls to "rebalance America's economic relationship with China, prioritizing reciprocity and fairness to restore American economic independence" but also states "trade with China should be balanced and focused on non-sensitive factors" and favors "maintaining a genuinely mutually advantageous economic relationship with Beijing". It states the US wants to prevent war in the Indo-Pacific, and states the US "will build a military capable of denying aggression anywhere in the [[First island chain|First Island Chain]]".<ref name=":13">{{Cite web |date=5 December 2025 |title=Lots of pressure on allies, no mention of North Korea in White House national security strategy document |url=https://koreajoongangdaily.joins.com/news/2025-12-05/national/defense/Lots-of-pressure-on-allies-no-mention-of-North-Korea-in-White-House-national-security-strategy-document/2471042 |access-date=5 December 2025 |website=Korea JoongAng Daily}}</ref> Regarding Taiwan, the document states that "deterring a conflict over Taiwan, ideally by preserving military overmatch, is a priority" and that the US "does not support any unilateral change to the status quo in the Taiwan Strait".<ref name=":02">{{Cite web |last=Toosi |first=Nahal |date=5 December 2025 |title=Trump reveals what he wants for the world |url=https://www.politico.com/news/2025/12/05/trump-reveals-national-security-strategy-western-hemisphere-europe-00678265 |access-date=5 December 2025 |website=[[Politico]]}}</ref>
       
      ==== Espionage cases ====
      During the second Trump administration, the United States saw a series of high-profile espionage and cyber espionage cases linked to the Chinese government. These cases, from the perspective of the United States, illustrate ongoing concerns over the activities of China's [[Ministry of State Security (China)|Ministry of State Security]] (MSS), including efforts to infiltrate U.S. institutions and conduct state-sponsored cyber operations.
       
      In March 2025, the U.S. intelligence community's Annual Threat Assessment identified China as the top military and cyber threat, citing its growing capabilities to seize Taiwan, conduct cyberattacks, and challenge U.S. dominance in AI and space. [[Director of National Intelligence]] [[Tulsi Gabbard]] called China the "most capable strategic competitor", while Beijing released a counter-report accusing the U.S. of long-term cyber espionage.<ref>{{Cite news |date=25 March 2025 |title=China remains top military and cyber threat to US, intelligence report says |url=https://www.theguardian.com/us-news/2025/mar/25/china-military-cyber-threat-us-intelligence |access-date=22 August 2025 |work=The Guardian |issn=0261-3077}}</ref>
       
      ===== Cyber espionage =====
      In 2025, U.S. charged at least 12 hackers in the month of March alone. The hackers reportedly sold data of US-based dissidents to the Chinese government.<ref name=":3" /><ref>{{Cite web |date=6 March 2025 |title=US charges Chinese hackers who targeted government dissidents |url=https://www.bbc.com/news/articles/cj4nw84dzr8o |access-date=8 July 2025 |website=[[BBC News]]}}</ref><ref>{{Cite web |date=5 March 2025 |title=Office of Public Affairs {{!}} Justice Department Charges 12 Chinese Contract Hackers and Law Enforcement Officers in Global Computer Intrusion Campaigns |url=https://www.justice.gov/opa/pr/justice-department-charges-12-chinese-contract-hackers-and-law-enforcement-officers-global |access-date=8 July 2025 |website=[[US Department of Justice]]}}</ref>
       
      In early March 2025, for example, the [[United States Department of Justice]] indicted Chinese nationals Yin Kecheng (尹可成) and Zhou Shuai (周帅) for cyberattacks linked to APT27 (also known as Silk Typhoon). Between 2011 and 2024, they allegedly hacked U.S. defense contractors, tech firms, and government agencies to steal data for profit and on behalf of China's Ministry of State Security (MSS) and Ministry of Public Security (MPS). Zhou also collected data on telecommunications, border activity, and individuals in media, civil service, and religion under MSS guidance. The case highlighted China's state-backed hacking-for-hire model. U.S. authorities seized related infrastructure and sanctioned Zhou, his company Shanghai Heiying, and previously Yin.<ref>{{Cite web |date=5 March 2025 |title=Chinese Nationals with Ties to the PRC Government and 'APT27' Charged in a Computer Hacking Campaign for Profit, Targeting Numerous U.S. Companies, Institutions, and Municipalities |url=https://www.justice.gov/usao-dc/pr/chinese-nationals-ties-prc-government-and-apt27-charged-computer-hacking-campaign-profit |access-date=8 July 2025 |website=[[US Department of Justice]]}}</ref><ref name=":3">{{Cite web |last=Kaaviya |date=13 March 2025 |title=US Charges 12 Chinese Hackers For Hacking National Security Infrastructure |url=https://cybersecuritynews.com/us-charges-12-chinese-hackers/ |access-date=8 July 2025 |website=Cyber Security News}}</ref>
       
      In July 2025, the United States Department of Justice charged two Chinese nationals, Yuance Chen and Liren "Ryan" Lai, with attempting to recruit U.S. military personnel and gather naval intelligence on behalf of China's Ministry of State Security (MSS). According to the FBI, Lai cultivated Chen as an asset due to his contacts within the U.S. military, and both men met with MSS agents abroad to coordinate their activities. In 2022, they conducted a dead drop by leaving a backpack containing $10,000 in cash in a California locker as payment for intelligence. The charges, filed under the Foreign Agent Registration Act (FARA), highlight growing U.S. concerns over Chinese efforts to infiltrate military institutions and expand naval capabilities.<ref>{{Cite web |title=Two Chinese nationals charged for trying to recruit spies in US military |url=https://www.aljazeera.com/news/2025/7/2/two-chinese-nationals-charged-for-trying-to-recruit-spies-in-us-military |access-date=2 July 2025 |website=[[Al Jazeera]]}}</ref><ref>{{Cite news |last=Martinez |first=Christian |date=2 July 2025 |title=US charges two Chinese nationals with attempting to recruit US service members |url=https://www.reuters.com/legal/litigation/us-charges-two-chinese-nationals-efforts-recruit-us-service-members-2025-07-01/ |access-date=2 July 2025 |work=[[Reuters]]}}</ref>

      In October 2025, China's Ministry of State Security (MSS) accused the United States of conducting a large-scale cyberattack on China's National Time Service Center. According to the agency, the [[U.S. National Security Agency]] (NSA) had launched a series of hacking operations since March 2022, extracting sensitive data by exploiting vulnerabilities in the center's mobile phones and internal networks.<ref>{{Cite news |date=19 October 2025 |title=China accuses US of cyber breaches at national time centre  |url=https://www.reuters.com/world/china/china-accuses-us-cyber-breaches-national-time-centre-2025-10-19/ |access-date=20 October 2025 |work=Reuters}}</ref> 
      According to Chinese state media, more than 42 specialized tools and pieces of malware were used during the operation, and attempts were also made to access the "Precise Ground Timing" system. China's Ministry of National Security warned that intrusions into such infrastructure could disrupt communications, financial systems, energy, transportation, and space launches.<ref>{{Cite news |title=China accuses US of cyberattack on national time center |url=https://apnews.com/article/china-us-cyberattacks-allegations-time-b3408ed2352c113904350f80e505ab9f |access-date=20 October 2025 |work=[[Associated Press]]}}</ref>

      ===== Military espionage =====
      In July 2025, Chenguang Gong, a dual U.S.-China citizen and former engineer at a California defense contractor, pleaded guilty to stealing over 3,600 sensitive files related to U.S. missile detection and defense systems. Prosecutors stated he had long sought involvement in Chinese government Talent Programs and attempted to transfer military-grade technology to China.<ref>{{Cite web |date=23 July 2025 |title=China spy stole secret U.S. missile tech: DOJ |url=https://www.newsweek.com/china-spy-stole-secret-us-missile-tech-says-department-justice-2102724 |access-date=22 August 2025 |website=Newsweek}}</ref>
       
      ==== 2025 trade war ====
      {{See also|Tariffs in the second Trump administration}}
      In April 2025, China imposed a 34% tariff on all U.S. imports, matching the rate introduced by [[Donald Trump|President Donald Trump]] earlier that week. The move came after two rounds of U.S. tariffs; each 10%; were implemented in February and March, citing China's alleged role in the fentanyl crisis. In retaliation, China also restricted exports of [[rare-earth element]]s,<ref>{{cite news |title=Why China curbing rare earth exports is a blow to the US |url=https://www.bbc.com/news/articles/c1drqeev36qo |work=BBC News |date=17 April 2025}}</ref><ref>{{cite news |title=FACTBOX What strategic mineral exports has China restricted? |url=https://www.reuters.com/world/china/chinas-curbs-exports-strategic-minerals-2025-02-04/ |work=Reuters |date=4 April 2025}}</ref> filed a complaint with the [[World Trade Organization]], and blacklisted several U.S. firms. Additional measures included suspending imports from American agricultural and food producers and launching an anti-monopoly probe into [[DuPont|DuPont China]]. Analysts noted this marked a significant escalation in the ongoing trade tensions, reducing prospects for near-term diplomatic resolution.<ref>{{Cite web |date=4 April 2025 |title=China slaps a 34% tax on all US imports in retaliation for Trump's tariffs |url=https://apnews.com/article/china-tariff-trade-trump-earths-02cd23e913649f32985f075058e787c4 |access-date=8 April 2025 |website=AP News}}</ref> Trump threatened to impose an additional 50% tariff on Chinese goods on 9 April if China did not withdraw its retaliatory measure of a 34% tariff on all U.S. goods by 8 April. This would boost the effective 54% tariffs on China on 9 April to 104%.<ref>{{Cite web |title=Trump tariffs live updates: Trump tells Americans not to panic as stock markets open to big losses |url=https://abcnews.go.com/US/live-updates/trump-tariffs-live-updates-us-stronger-despite-market/?id=120551033 |access-date=7 April 2025 |website=ABC News}}</ref> China responded with retaliatory tariffs of 84% on U.S. goods.<ref>{{Cite web |title=China slaps retaliatory tariffs of 84% on U.S. goods in response to Trump |url=https://www.cnbc.com/2025/04/09/china-slaps-retaliatory-tariffs-of-84percent-on-us-goods-in-response-to-trump.html |access-date=9 April 2025 |website=CNBC |date=9 April 2025}}</ref> In response, Trump increased tariffs on Chinese goods to 125% on the same day. However, the White House clarified the next day that the tariff rate had risen to 145%.<ref name=":12">{{cite news |last1=Iordache |first1=Dan Mangan, Kevin Breuninger, Christina Wilkie, Megan Cassella, Jesse Pound, Ruxandra |date=10 April 2025 |title=Trump tariffs on China now total 145%, White House clarifies: Live updates |url=https://www.cnbc.com/2025/04/10/china-trump-tariffs-live-updates.html |work=CNBC}}</ref> China, in retaliation, announced an increase in tariffs on all American imports from the previous 84% to 125%, set to take effect on 12 April.<ref>{{Cite news |date=11 April 2025 |title=Breaking: China to increase tariffs on U.S. goods to 125 per cent |url=https://www.abc.net.au/news/2025-04-11/china-to-increase-us-tariffs-to-125-per-cent/105168174 |access-date=11 April 2025 |work=ABC News}}</ref> The U.S. later announced reciprocal tariffs will exclude consumer electronics from tariffs from most countries, but retained a 20% tariff on electronics from China.<ref>{{Cite news |last=Garrett |first=Luke |date=13 April 2025 |title=Trump mulls semiconductor levies after lifting reciprocal tariffs on electronics |url=https://www.npr.org/2025/04/13/g-s1-60086/semiconduct-tariffs-trump |access-date=14 April 2025 |work=NPR}}</ref>
       
      On May 10, 2025, Trump declared a "total reset" in U.S.-China trade relations after tariff talks in [[Geneva]]. According to transcripts, witnesses saw both delegations returning after a lunch break to an UN ambassador's villa in Cologny.<ref>[https://www.theguardian.com/us-news/2025/may/11/trump-claims-total-reset-in-us-china-trade-relations-after-tariff-talks-in-geneva "Trump claims 'total reset' in US-China trade relations after tariff talks in Geneva"]. ''The Guardian''. Accessed 10 May 2025.</ref> On 12 May 2025, the United States and China agreed to for a period of 90 days, reduce their tariff rates from 145% to 30% and 125% to 10% respectively by 14 May, while further negotiations take place.<ref>{{Cite web |last1=Gan |first1=Nectar |last2=Bacon |first2=Auzinea |last3=Liu |first3=Juliana |date=12 May 2025 |title=US and China agree to drastically roll back tariffs |url=https://www.cnn.com/2025/05/12/business/us-china-trade-deal-announcement-intl-hnk |access-date=12 May 2025 |website=CNN}}</ref> Treasury Secretary [[Scott Bessent]] stated that the "somewhat stalled" U.S.-China trade talks necessitate direct communication between the leaders of both countries, especially as the U.S. implements technology restrictions on China.<ref>{{cite web |last1=cheng |first1=Evelyne |title=U.S.-China talks 'a bit stalled' and need Trump and Xi to weigh in, Treasury Secretary Bessent says |url=https://www.cnbc.com/2025/05/30/us-china-talks-bit-stalled-and-need-trump-and-xi-to-weigh-in-treasury-secretary-bessent-says.html |website=cnbc |date=30 May 2025 }}</ref>
       
      In July 2025, [[Bloomberg News]] reported that U.S. President [[Donald Trump]] has softened his hardline tone on China to ensure a summit with [[General Secretary of the Chinese Communist Party]] [[Xi Jinping]], aiming to push for a trade agreement between America and China.<ref>{{Cite news|title=Trump Softens Tone on China to Secure Xi Summit, Trade Deal|url=https://www.bloomberg.com/news/articles/2025-07-16/trump-softens-tone-on-china-to-secure-xi-summit-and-a-trade-deal|work=[[Bloomberg News|Bloomberg]]|date=16 July 2025|accessdate=16 July 2025}}</ref>

      In December 2025, the U.S. government announced that it would delay the implementation of new tariffs on imports of certain Chinese chips and semiconductor products until 2027. These tariffs were approved as part of a U.S. trade investigation into China's industrial and subsidy policies. However, Washington cited diplomatic considerations as the reason for the delay, aiming to avoid sudden disruptions to global supply chains and to give companies more time to adjust. China opposed the decision, calling it a destabilizing factor in the global technology market. This issue is viewed as part of the broader trade and technology tensions between the two countries in the 2020s.<ref>{{Cite news|title=US delays announcement of China chip tariffs until 2027 |url=https://www.reuters.com/world/china/us-impose-tariffs-chips-china-2025-12-23/ |work=[[Reuters]]|date=24 December 2025|accessdate=27 December 2025}}</ref>

      ==Economic relations==
      As part of [[Foreign-exchange reserves of China|China's foreign-exchange reserves]], China has a preference for dollar-denominated assets, including [[United States Treasury security|United States treasury securities]].<ref name="Roach-2022" />{{Rp|pages=44–45}} In turn, the United States benefits because it lacks the [[National saving|domestic savings]] to fund its [[National debt of the United States|budget deficit]].<ref name="Roach-2022" />{{Rp|page=44}} After the [[2008 financial crisis]], Chinese policymakers and the general public viewed China's holdings of U.S. debt as unwisely overexposing China to volatility.<ref name="Liu-2023">{{Cite book|last=Liu|first=Zongyuan Zoe|title=Sovereign Funds: How the Communist Party of China Finances its Global Ambitions|publisher=The Belknap Press of [[Harvard University Press]]|year=2023|isbn=9780674271913|doi=10.2307/jj.2915805|jstor=jj.2915805|s2cid=259402050}}</ref>{{Rp|pages=61–62}} China remains a major holder of United States treasury securities, although the amount has decreased as of at least 2022.<ref>{{Cite web|last=Cox|first=Jeff|date=18 July 2022|title=China holdings of U.S. debt fall below $1 trillion for the first time since 2010|url=https://www.cnbc.com/2022/07/18/china-holdings-of-us-debt-fall-below-1-trillion-for-the-first-time-since-2010.html|access-date=13 February 2023|website=CNBC}}</ref>[[File:US China imports and exports Census data.svg|thumb|Imports and exports between the United States and China. U.S. census.gov data]]
      [[File:Foreign Holders of United States Treasury Securities.svg|thumb|Foreign holders of [[United States Treasury security|U.S. Treasury securities]] (2009)]]
       
      In trade matters, the United States has benefitted from China's demand for United States export products, which grew rapidly from 2000 to at least 2021.<ref name="Roach-2022" />{{Rp|page=44}} As of 2021, China was the third largest market for United States export merchandise.<ref name="Roach-2022" />{{Rp|page=44}} Inexpensive Chinese exports to the United States increase the purchasing power of American consumers and American business profits.<ref name="Roach-2022" />{{Rp|page=44}} Both countries are benefitted by the demand for their respective exports to the other.<ref name="Roach-2022" />{{Rp|pages=44–45}}
       
      In 1991, China only accounted for 1% of total imports to the United States.<ref>{{Cite web|url=https://voxeu.org/article/reconsidering-china-shock-trade|title=Reconsidering the 'China shock' in trade|last1=Feenstra|first1=Robert|last2=Ma|first2=Hong|date=18 January 2018|website=VoxEU.org|last3=Sasahara|first3=Akira|last4=Xu|first4=Yuan}}</ref>  For many years, China was the most important country which required an annual waiver to maintain [[free trade]] status. The waiver for the PRC had been in effect since 1980. Every year between 1989 and 1999, legislation was introduced in Congress to disapprove the President's waiver. The legislation had sought to tie free trade with China to meeting certain [[Human rights in China|human rights]] conditions that go beyond freedom of emigration. All such attempted legislation failed to pass. The requirement of an annual waiver was inconsistent with the rules of the [[World Trade Organization]] (WTO), and for the PRC to join the WTO, congressional action was needed to grant [[permanent normal trade relations]] (PNTR) to China. This was accomplished in 2000 ([[United States–China Relations Act of 2000]]), allowing China to join WTO in 2001.<ref>{{cite news|title=Waking the Sleeping Dragon|url=https://slate.com/business/2016/09/when-china-joined-the-wto-it-kick-started-the-chinese-economy-and-roused-a-giant.html?via=gdpr-consent|work=Slate|date=28 September 2016}}</ref><ref>{{cite news|title=Was Letting China Into the WTO a Mistake?|url=https://www.foreignaffairs.com/articles/china/2018-04-02/was-letting-china-wto-mistake|work=Foreign Affairs|date=2 April 2018}}</ref><ref>{{cite news|title=Normalizing Trade Relations With China Was a Mistake|url=https://www.theatlantic.com/ideas/archive/2018/06/normalizing-trade-relations-with-china-was-a-mistake/562403/|work=The Atlantic|date=8 June 2018}}</ref> China's [[most favoured nation]] (MFN) status was made permanent on 27 December 2001.<ref>{{cite news|title=President Grants Permanent Trade Status to China|url=https://georgewbush-whitehouse.archives.gov/news/releases/2001/12/20011227-2.html|via=[[NARA|National Archives]]|work=[[whitehouse.gov]]|date=27 December 2001}}</ref>
       
      Since the [[China and the World Trade Organization|entry of China into the WTO in December 2001]], the decline in [[Manufacturing in the United States|U.S. manufacturing jobs]] has accelerated (the [[China shock]]).<ref>{{cite journal|first1=David H.|last1=Autor|first2=David|last2=Dorn|first3=Gordon H.|last3=Hanson|year=2016|title=The China Shock: Learning from Labor Market Adjustment to Large Changes in Trade|journal=Annual Review of Economics|volume=8|issue=1|pages=205–240|doi=10.1146/annurev-economics-080315-015041|s2cid=1415485|url=http://www.nber.org/papers/w21906.pdf}}</ref><ref>{{cite news|first=Jeffry|last=Bartash|title=China really is to blame for millions of lost U.S. manufacturing jobs, new study finds|url=https://www.marketwatch.com/story/china-really-is-to-blame-for-millions-of-lost-us-manufacturing-jobs-new-study-finds-2018-05-14|work=Market Watch|date=14 May 2018}}</ref> The [[Economic Policy Institute]] estimated that the trade deficit with China cost about 2.7 million jobs between 2001 and 2011, including manufacturing and other industries.<ref>{{Cite web|url=https://www.epi.org/publication/bp345-china-growing-trade-deficit-cost/|title=The China toll: Growing U.S. trade deficit with China cost more than 2.7 million jobs between 2001 and 2011, with job losses in every state|website=Economic Policy Institute}}</ref>
       
      The PRC and the U.S. resumed trade relations in 1972 and 1973. Direct investment by the U.S. in mainland China covers a wide range of manufacturing sectors, several large hotel projects, restaurant chains, and [[petrochemical]]s. U.S. companies have entered agreements establishing more than 20,000 equity [[joint venture]]s, contractual joint ventures, and wholly foreign-owned enterprises in mainland China. More than 100 US-based multinationals have projects in mainland China, some with multiple investments. Cumulative U.S. investment in mainland China is valued at $48 billion. The U.S. trade deficit with mainland China exceeded $350 billion in 2006 and was the United States' largest bilateral trade deficit.<ref>Graph showing U.S.-China trade [http://china.usc.edu/App_Images//trade-1978-2008-lgweb.jpg] {{Webarchive|url=https://web.archive.org/web/20110813132416/http://china.usc.edu/App_Images//trade-1978-2008-lgweb.jpg|date=13 August 2011}}; source [http://china.usc.edu/ShowArticle.aspx?articleID=1512]</ref> Some of the factors that influence the U.S. trade deficit with mainland China include:
       
      * a shift of low-end assembly industries from [[newly industrialized country|newly industrialized countries]] in [[East Asia]] and the [[Asia-Pacific]] to mainland China. Mainland China has increasingly become the last link in a long [[global value chain|chain of value-added production]]. Because U.S. trade data attributes the full value of a product to the final assembler, mainland Chinese value added is overcounted. Using a statistical model that eliminates these global value chain-related distortions, [[OECD|Organization for Economic Cooperation and Development]] (OECD) and WTO researchers have concluded that the United States' measures may overstate the value of Chinese exports by as much as 35%.<ref name="Roach-2022">{{Cite book|last=Roach|first=Stephen|url=|title=Accidental Conflict: America, China, and the Clash of False Narratives|date=2022|publisher=[[Yale University Press]]|isbn=978-0-300-26901-7|doi=10.2307/j.ctv2z0vv2v|jstor=j.ctv2z0vv2v|s2cid=252800309|author-link=Stephen S. Roach}}</ref>{{Rp|page=39}} According to [[Pascal Lamy]]: "The statistical bias created by attributing commercial value to the last country of origin perverts the true economic dimension of the bilateral trade imbalances. This affects the political debate, and leads to misguided perceptions. Take the bilateral deficit between China and the US. A series of estimates based on true domestic content can cut the overall deficit – which was $252bn in November 2010 – by half, if not more."<ref name="MiC">{{cite news|last=Lamy|first=Pascal|date=24 January 2011|title='Made in China' tells us little about global trade|newspaper=Financial Times |url=https://www.ft.com/content/4d37374c-27fd-11e0-8abc-00144feab49a|url-status=live|url-access=subscription|access-date=7 July 2012|archive-url=https://ghostarchive.org/archive/20221210/http://www.ft.com/cms/s/0/4d37374c-27fd-11e0-8abc-00144feab49a.html|archive-date=10 December 2022}}</ref>
      * US demand for labor-intensive goods exceeds domestic output: the PRC has restrictive trade practices in mainland China, which include a wide array of barriers to foreign goods and services, often aimed at protecting [[state-owned enterprise]]s. These practices include high [[tariff]]s, lack of transparency, requiring firms to obtain special permission to import goods, inconsistent application of laws and regulations, and leveraging technology from foreign firms in return for market access. Mainland China's accession to the WTO is meant to help address these barriers.
      * the undervaluation of the [[Renminbi]] relative to the [[United States dollar]].<ref>{{cite web|url=http://www.imf.org/external/pubs/ft/weo/2007/01/data/weorept.aspx?sy=2004&ey=2007&sort=country&ds=.&br=1&c=924&s=PPPEX&grp=0&a=&pr1.x=62&pr1.y=9|title=World Economic Outlook Database, April 2007|publisher=Imf.org|date=14 September 2006|access-date=2 December 2010}}</ref>
       
      Beginning in 2009, the U.S. and China agreed to hold regular high-level talks about economic issues and other mutual concerns by establishing the [[Strategic Economic Dialogue]], which meets biannually. Five meetings have been held, the most recent in December 2008. Economic nationalism seems to be rising in both countries, a point the leaders of the two delegations noted in their opening presentations.<ref>{{Cite web|url=https://china.usc.edu/wu-yi-opens-third-china-us-strategic-economic-dialogue-2007|title=Wu Yi opens the Third China-US Strategic Economic Dialogue, 2007 {{pipe}} US-China Institute|website=china.usc.edu}}</ref><ref>{{Cite web|url=https://china.usc.edu/us-treasury-sec-henry-paulson-opens-strategic-economic-dialogue-dec-2007|title=U.S. Treasury Sec. Henry Paulson opens Strategic Economic Dialogue, Dec. 2007 {{pipe}} US-China Institute|website=china.usc.edu}}</ref><ref>{{Cite web|url=https://china.usc.edu/tensions-over-trade-part-2-election-08-and-challenge-china|title=Tensions over Trade: Part 2 of Election '08 and the Challenge of China {{pipe}} US-China Institute|website=china.usc.edu}}</ref> The United States and China have also established the high-level U.S.-China [[Senior Dialogue]] to discuss international political issues and work out resolutions.
       
      [[File:United States Balance of Trade Deficit-pie chart.svg|thumb|United States trade deficit]]
      In September 2009 a trade dispute emerged between the United States and China, which came after the U.S. imposed tariffs of 35 percent on Chinese tire imports. The Chinese commerce minister accused the United States of a "grave act of trade [[protectionism]]",<ref name="businessweek1">{{cite web|date=13 September 2010|title=Obama's Tire Tariff Draws Beijing's Ire|url=http://www.businessweek.com/globalbiz/content/sep2009/gb20090913_714101.htm|archive-url=https://web.archive.org/web/20090922172106/http://www.businessweek.com/globalbiz/content/sep2009/gb20090913_714101.htm|url-status=dead|archive-date=22 September 2009|website=[[Bloomberg Businessweek]]}}</ref> while an [[Office of the United States Trade Representative|USTR]] spokesperson said the tariff "was taken precisely in accordance with the law and our international trade agreements".<ref name="businessweek1"/> Additional issues were raised by both sides in subsequent months.<ref>{{cite web|url=http://china.usc.edu/ShowArticle.aspx?articleID=1600|title=Statistics on world trade, list of U.S.-China WTO complaints|publisher=China.usc.edu|access-date=2 December 2010}}</ref><ref>China slaps deposits/tariffs on US steel exports; US politicians rant about China [http://china.usc.edu/ShowArticle.aspx?articleID=1920]</ref>
       
      When a country joins the [[World Trade Organization]] it commits to keep its tariffs below the [[bound tariff rate|bound rate]], which is generally around 39 percent.  China's reaction was attributed to the fact that nations usually keep their tariffs at an average of 9 percent, but when the U.S. raised its tariff on Chinese imported tires to 35 percent it was still below the average bound rate.<ref name="Trade grows as Tariffs decline">{{cite web|url=https://www.wto.org/english/thewto_e/20y_e/wto_20_brochure_e.pdf|title=Trade and Tariffs|publisher=World Trade Organization|date=2015}}</ref>
       
      [[File:U.S.-China Strategic and Economic Dialogue (3767084375).jpg|thumb|The first round of the [[U.S.–China Strategic and Economic Dialogue]] was held in Washington, D.C., from 27 to 28 July 2009]]
      [[File:Countries by total wealth (trillions USD), Credit Suisse.png|thumb|Countries by total [[wealth]] (trillions USD), Credit Suisse]]
       
      In early 2012, a [[Rare earths trade dispute|dispute over rare earth minerals]] was brought into the light between the two countries. [[Barack Obama|President Obama]] made an announcement that the United States would be one of a few countries to file a trade dispute with China. Amongst the United States, Japan and other Western European countries would also be filing disputes as well. This is simply just one of few disputes between the United States and China. It is believed by many experts, including Chris Isidore, a writer for CNN Money, that "any one of the disputes could damage the economies of both countries as well as the relationship between them".<ref name="Isidore">{{Cite news|url=https://money.cnn.com/2012/03/13/news/international/china-trade/|title=U.S. vs. China: The trade battles|last=Isidore|first=Chris|date=13 March 2012|work=CNN Money}}</ref>  The dispute was filed, and China was charged with putting unfair restrictions on the exportation of rare earth minerals. These minerals were crucial and in high demand by all countries. President Obama believed the United States should have those minerals in the United States whereas China disagreed. China denied all of the said charges brought forth "saying its rules are defensible on grounds of environmental and economic sustainability, and suggests there would be consequences if the United States presses the case."  It is important to understand the relationship between the United States and China, especially economically.  There is not one without the other.  China's state news agency commented that "past experiences have shown that policymakers in Washington should treat such issues with more prudence, because maintaining sound Sino-American trade relations is in the fundamental interests of both sides"<ref name="Isidore"/>
       
      China was the biggest trading partner of the United States until 2019, when it dropped to the third place because of the ongoing [[China–United States trade war|trade war]].<ref>{{Cite news|url=https://www.wsj.com/articles/china-lost-spot-as-top-u-s-trading-partner-in-first-half-11564749251|title=Tariff Fight Knocks Off China as Top U.S. Trading Partner|last=DeBarros|first=Paul Kiernan and Anthony|newspaper=The Wall Street Journal|date=2 August 2019 |access-date=6 August 2019}}</ref>
       
      In November 2021, U.S. producer Venture Global LNG signed a twenty-year contract with China's state-owned [[Sinopec]] to supply [[liquefied natural gas]] (LNG).<ref>{{cite news|title=Sinopec signs China's largest long-term LNG contract with U.S. firm|url=https://www.reuters.com/business/energy/sinopec-signs-20-yr-lng-contract-with-us-venture-global-lng-2021-11-04/|work=Reuters|date=4 November 2021}}</ref> China's imports of U.S. natural gas will more than double.<ref>{{cite news|title=Sinopec signs huge LNG deals with US producer Venture Global|url=https://www.ft.com/content/00fdc70e-1482-4ce6-ba43-a802550838d4|archive-url=https://ghostarchive.org/archive/20221210/https://www.ft.com/content/00fdc70e-1482-4ce6-ba43-a802550838d4|archive-date=10 December 2022|url-access=subscription|url-status=live|work=Financial Times|date=20 October 2021}}</ref> U.S. exports of liquefied natural gas to China and other Continental Asian countries [[2021 global energy crisis|surged in 2021]], with Continental Asian buyers willing to pay higher prices than European importers.<ref>{{cite news|title=Asian buyers outbid Europe for spot supplies of American-produced natural gas|url=https://www.ft.com/content/deaa7583-e69f-4a5f-9486-cc05c710a51a|archive-url=https://ghostarchive.org/archive/20221210/https://www.ft.com/content/deaa7583-e69f-4a5f-9486-cc05c710a51a|archive-date=10 December 2022|url-access=subscription|work=Financial Times|date=21 September 2021}}</ref>
       
      On 25 March 2023, Apple CEO [[Tim Cook]] made an official visit to Beijing to attend the [[China Development Forum]]. Cook praised China's innovation, and long history of cooperation with [[Apple Inc]]. During the [[COVID-19 pandemic]], Apple supplier [[Foxconn]] was heavily disrupted by workers protesting China's zero-COVID policies. Cook also presented an expanded rural education program for 100 million [[yuan (currency)|yuan]] to further improve the skill-set of Chinese workers.<ref>[https://www.reuters.com/technology/apple-ceo-praises-chinas-innovation-long-history-cooperation-beijing-visit-2023-03-25/ "Apple CEO praises China's innovation, long history of cooperation on Beijing visit"]. ''Reuters''. Accessed 25 March 2023.</ref>
       
      Between 2020 and 2023, 70% of all [[Rare earth industry in China|rare earth]] compounds and metals imported into the United States came from China.<ref>{{cite news |title=China has a powerful card to play in its fight against Trump's trade war |url=https://edition.cnn.com/2025/04/15/business/china-trumps-trade-war-rare-earth-intl-hnk/index.html |work=CNN |date=15 April 2025}}</ref> China produces 90% of the world's [[rare-earth element]]s.<ref>{{cite news |title=China's dominance leaves US vulnerable, as critical minerals become political |url=https://www.abc.net.au/news/2025-04-25/china-dominates-rare-earths-leaving-trump-with-dud-hand/105213972 |work=ABC |date=25 April 2025}}</ref> In this context, in July 2025, Raja Krishnamoorthi, the top Democrat on the U.S. House Select Committee on the Chinese Communist Party, stated that China could "so much as flick a switch and cause major damage" to the American economy. The committee expressed concerns about the United States' economic dependence on China, particularly in relation to critical mineral exports such as rare earths used in modern technology.<ref>{{Cite news |date=23 July 2025 |title=Beijing punished Australia's loyalty to US, Scott Morrison tells Congress |url=https://www.abc.net.au/news/2025-07-24/scott-morrison-us-congress-select-committee-china-aukus/105565762 |access-date=24 July 2025 |work=ABC News}}</ref>
       
      On 13 September 2024, the Biden administration finalized the increases of [[Economic policy of the Joe Biden administration|tariffs on Chinese exports]]. Tariffs increased to 100% on [[Electric vehicle industry in China|electric vehicle]]s, 50% on [[solar cell]]s and 25% on [[Electric vehicle battery|electric vehicle batteries]], critical minerals, steel, and aluminum.<ref>{{Cite web |last=Lobosco |first=Katie |date=13 September 2024 |title=Biden finalizes increases to China tariffs |url=https://edition.cnn.com/2024/09/13/politics/china-tariffs-biden-trump/index.html |access-date=11 December 2024 |website=CNN |archive-date=12 December 2024 |archive-url=https://web.archive.org/web/20241212111044/https://edition.cnn.com/2024/09/13/politics/china-tariffs-biden-trump/index.html |url-status=live }}</ref>
       
      In February 2025, Donald Trump signed an executive order that directed the [[Committee on Foreign Investment in the United States]] (CFIUS) to restrict Chinese investment in strategic economic areas.<ref>{{Cite news |last=Holland |first=Steve |date=22 February 2025 |title=Trump orders use of CFIUS to restrict Chinese investments in strategic areas |url=https://www.reuters.com/world/trump-use-cfius-restrict-chinese-investments-strategic-areas-white-house-2025-02-21/ |access-date=22 February 2025 |work=[[Reuters]]}}</ref> Premier [[Li Qiang]] emphasized the need for open markets and fair competition, while the U.S. accused China of unfair trade practices and inadequate fentanyl control efforts.<ref>{{Cite web |date=23 March 2025 |title=China's premier says US relations at 'an important juncture' during meeting with pro-Trump senator |url=https://apnews.com/article/china-us-daines-li-qiang-tariff-fentanyl-321538fba10eb1c4d04f6146a4eb06b6 |access-date=25 March 2025 |website=AP News}}</ref>

      According to Bloomberg Opinion, the United States is still dependent on China for essential inputs used in pharmaceutical manufacturing, including key starting materials (KSMs) and active pharmaceutical ingredients (APIs). Decades of industry consolidation have left many countries, including the United States and India, dependent on Chinese chemical components. Estimates cited in the analysis suggest that China is the sole supplier of at least one ingredient used in roughly 700 essential medicines, and even India's generic drug industry relies extensively on Chinese materials. The U.S.-China Economic and Security Review Commission has warned that this dependence represents a strategic vulnerability for the United States.<ref>{{Cite news |last=Liu |first=Juliana |date=25 November 2025 |title=China Holds All the Cards in Global Pharmaceuticals |url=https://www.bloomberg.com/opinion/articles/2025-11-25/china-holds-all-the-cards-in-global-pharmaceuticals |access-date=30 November 2025 |work=[[Bloomberg News]] |url-status=live |archive-url=https://archive.today/20251125200750/https://www.bloomberg.com/opinion/articles/2025-11-25/china-holds-all-the-cards-in-global-pharmaceuticals |archive-date=25 November 2025}}</ref>

      ===Currency dispute===
      {{Main|Renminbi currency value|Internationalization of the renminbi}}
       
      China engaged in [[currency manipulation]]<ref>{{Cite journal|last1=Skaff|first1=Rebecca|last2=Lincoln|first2=Webb|date=March 2018|title=Understanding China's Currency Manipulation|url=https://hdl.handle.net/1969.1/166316|journal=The Takeaway|publisher=[[Bush School of Government and Public Service#Mosbacher Institute for Trade, Economics, and Public Policy|The Mosbacher Institute for Trade, Economics, and Public Policy at Texas A&M University Bush School of Government and Public Service]]|volume=9|issue=1|hdl=1969.1/166316|via=OAKTrust}}</ref> from 2003 to 2014.<ref name="Bergsten 2022">{{Cite book|last=Bergsten|first=C. Fred|title=The United States vs. China : the quest for global economic leadership|date=2022|isbn=978-1-5095-4735-7|location=Cambridge|oclc=1255691875}}</ref> Economist [[C. Fred Bergsten]], writing for the [[Peterson Institute for International Economics]], said that, during this period, "China bought more than $300 billion annually to resist upward movement of its currency by artificially keeping the exchange rate of the dollar strong and the renminbi's exchange rate weak. China's competitive position was thus strengthened by as much as 30 to 40 percent at the peak of the intervention. Currency manipulation explained most of China's large trade surpluses, which reached a staggering 10 percent of its entire GDP in 2007."<ref name="Bergsten">C. Fred Bergsten, [https://piie.com/blogs/trade-investment-policy-watch/china-no-longer-manipulating-its-currency China is No Longer Manipulating its Currency], [[Peterson Institute for International Economics]] (18 November 2016).</ref> China's currency manipulation was a point of conflict with the United States. Domestic leaders within the United States pressured the Obama administration to take a hardline stance against China and compel China to raise the value of its currency, and legislation was introduced to the [[United States Congress]] calling on the President to impose tariffs on Chinese imports until China properly values its currency.<ref name="businessweek1"/><ref>{{cite news| url=https://www.reuters.com/article/idUSTRE68L5K120100924| work=Reuters| title=House panel cranks up pressure on China currency| date=24 September 2010}}</ref> Nonetheless, the United States was not willing to label China as a "currency manipulator" at that time, on the theory that doing so would risk China's cooperation on other issues.<ref name="Bergsten 2022"/>
       
      In 2014, China stopped manipulating its currency,<ref name="Bergsten"/><ref name="Wiseman">Paul Wiseman, [https://www.pbs.org/newshour/rundown/fact-check-china-manipulate-currency/ Fact check: Does China manipulate its currency?], Associated Press (29 December 2016).</ref> as the growth in the Chinese economy slowed and Chinese investors made more investments outside the country, leading to a drop in the yuan's value in relation to the dollar, as well as a decline in China's reserves.<ref name="Wiseman"/>
       
      In August 2019, five years after China had stopped manipulating its currency,<ref name="Bergsten 2022"/> the [[United States Department of the Treasury|US Treasury]] designated China as a currency manipulator.<ref>{{Cite news|url=https://www.reuters.com/article/us-usa-trade-china-currency-idUSKCN1UV2BK|title=U.S. designates China as currency manipulator for first time in...|date=5 August 2019|work=Reuters|access-date=6 August 2019}}</ref> Some U.S. analysts characterized the belated designation as "embarrassing", "without factual basis", or "a stretch".<ref name="Bergsten 2022"/><ref>{{Cite web|title=The irony of calling China a currency manipulator|url=https://www.yahoo.com/now/the-irony-of-calling-china-a-currency-manipulator-152537290.html|access-date=17 June 2022|website=Yahoo|date=6 August 2019}}</ref> On 13 January 2020, the United States removed the designation as part of the Phase One<ref>{{Cite web|title=Phase One|url=http://ustr.gov/phase-one|access-date=17 June 2022|website=United States Trade Representative}}</ref> efforts to reach a deal on the trade war.<ref>{{Cite news|url=https://www.nytimes.com/2020/01/13/us/politics/treasury-china-currency-manipulator-trade.html|title=U.S. Says China Is No Longer a Currency Manipulator|last=Rappeport|first=Alan|date=13 January 2020|work=The New York Times|access-date=20 January 2020|issn=0362-4331}}</ref>

      === 2025 tensions ===
      {{See also|Rare earths trade dispute}}
      [[File:Global rare-earth element deposits.webp|thumb|Global [[rare-earth element]] deposits]]
      On 10 October 2025, U.S. President Donald Trump announced that a 100% tariff on goods imported from China would take effect on 1 November. This decision was viewed as part of an escalation in trade tensions between the two countries.<ref>{{Cite web |title=Trump ratchets up US-China trade war, promising new tariffs |url=https://www.reuters.com/world/china/trump-says-weighing-massive-increase-tariffs-chinese-imports-no-reason-meet-with-2025-10-10 |access-date=11 October 2025 |website=Reuters}}</ref>

      On 12 October 2025, China's Ministry of Commerce responded to the Trump administration's new tariffs by calling them "hypocritical" and defending Beijing's decision to restrict exports of rare earth elements. The ministry stated that China's export controls were a response to a series of measures by Washington, including adding Chinese companies to a trade blacklist and imposing port fees on Chinese ships. This incident is the latest example of escalating tensions in economic and trade relations between China and the United States.<ref>{{Cite web |title=Beijing blames US for raising trade tensions, defends rare earth curbs |url=https://www.reuters.com/world/china/china-says-its-rare-earth-export-controls-are-legitimate-2025-10-12 |access-date=12 October 2025 |website=Reuters}}</ref><ref>{{Cite web |title=China vows to stand firm against Trump's 100% tariff threat |url=https://apnews.com/article/china-us-trump-tariff-threat-trade-talks-cc4bd30c3b1bcf2eb2676bc0e66efba0 |access-date=12 October 2025 |website=AP News |date=12 October 2025 }}</ref> Trump issued a warning regarding the possibility of canceling a forthcoming meeting with Xi Jinping in South Korea later that month, which was scheduled to take place during the Asia-Pacific Economic Cooperation (APEC) summit. In a telephone conversation that occurred in October 2025 between Vice Premier He Lifeng and US Treasury Secretary Scott Besant, both parties reached an agreement to initiate a new series of trade discussions "at the earliest opportunity."<ref>{{cite web |title=China and US agree to fresh trade talks |url=https://www.france24.com/en/live-news/20251018-china-and-us-agree-to-fresh-trade-talks |website=france24 |date=18 October 2025 }}</ref>

      ==Important issues==
      Relations between the two world powers have historically been stable, punctuated by several periods of open conflict, most notably during the [[Korean War]] and the [[Vietnam War]]. The United States and China have mutual environmental, political, economic, and security interests, such as [[climate change]] and the [[nuclear proliferation|non-proliferation of nuclear weapons]], but there remain perennial concerns, such as [[cross-strait relations]] and the US's attitude towards the [[One China|One China policy]]. China is the second largest foreign creditor of the United States, after [[Japan]].<ref>{{Cite news|url=https://www.scmp.com/business/companies/article/3023034/japan-overtakes-china-biggest-creditor-us-japans-june-treasuries|title=Japan surpasses China as the biggest creditor to the US government|date=16 August 2019|website=South China Morning Post |access-date=18 August 2019}}</ref> [[Chinese expansionism|China's expansion]] in the [[Indo-Pacific]] has triggered pushback from the U.S. and its partners in the region. The two countries remain in dispute over [[South China Sea disputes|territorial issues in the South China Sea]];<ref>{{Cite news|url=https://www.nytimes.com/2016/07/15/world/asia/south-china-sea-dispute-arbitration-explained.html|title=The South China Sea: Explaining the Dispute|last=Fisher|first=Max|date=14 July 2016|work=The New York Times|access-date=11 March 2017|issn=0362-4331}}</ref> China claims sovereignty over large swaths of the [[South China Sea]]; the United States instead sees much of this ocean as [[international waters]], and as such claims [[Freedom of navigation|the right]] of its warships and aircraft to conduct military operations within them.<ref name="wsj._China's_Claims">{{Cite news|title=China's Claims in the South China Sea – The Short Answer|last1=Page|first1=Jeremy|last2=Moss|first2=Trefor|work=The Wall Street Journal|date=30 November 1999|access-date=30 July 2021|url= https://www.wsj.com/articles/BL-263B-4730}}</ref><ref name="apne_China_US">{{Cite news|title=China, US argue over naval activity in South China Sea|work=[[Associated Press]]|date=20 May 2021|access-date=30 July 2021|url= https://apnews.com/article/asia-pacific-china-b20b3b72604728c2e3f7498e2f492cac}}</ref>

      === Military issues ===

      ==== China's military expenditure and planning ====
      {{Main|Military budget of China|Military budget of the United States|United States–China security cooperation}}

      {{Update|part=section|date=May 2023}}
      China's investment in its military is growing rapidly; the United States remains convinced that the PRC conceals the real extent of this expansion, a view shared by many independent analysts.<ref>{{cite web|url=http://hongkong.usconsulate.gov/uscn/others/2004/060601.htm|title= Defense Secretary Rumsfeld's Remarks at the International Institute for Strategic Studies, Singapore, 6/6/2004|website=hongkong.usconsulate.gov|archive-url=https://web.archive.org/web/20041206021659/http://hongkong.usconsulate.gov/uscn/others/2004/060601.htm|archive-date=6 December 2004}}</ref><ref>{{cite news| url=https://news.bbc.co.uk/2/hi/asia-pacific/4351422.stm| work=BBC News| title=Rumsfeld questions China spending| date=18 October 2005| access-date=7 April 2010}}</ref> China claims it spent a total of $45 billion over the course of 2007, an average of $123 million per day.<ref name="china.usc.edu">{{cite web|url=http://china.usc.edu/ShowArticle.aspx?articleID=586|title=china's military spends hundreds of millions of dollars|publisher=China.usc.edu|access-date=2 December 2010}}</ref><ref>{{cite web|url=http://china.usc.edu/ShowArticle.aspx?articleID=586&AspxAutoDetectCookieSupport=1|title=china's military spends hundreds of millions of dollars|publisher=China.usc.edu|access-date=2 December 2010|url-status=dead|archive-url=https://web.archive.org/web/20090202163232/http://china.usc.edu/ShowArticle.aspx?articleID=586&AspxAutoDetectCookieSupport=1|archive-date=2 February 2009}}</ref> That same year, the U.S. military spent $548.8 billion, or an average $1.66 billion per day. U.S. estimates of Chinese military expenditure{{when|date=September 2023}} range between $85 billion and $125 billion.
       
      [[File:Xu and Gates.JPG|thumb|General [[Xu Caihou]] of the People's Liberation Army and U.S. Defense Secretary [[Robert Gates]] at the Pentagon]]
      Concerns over the Chinese military budget may come from U.S. worries that the PRC is attempting to threaten its neighbors or to challenge the United States. Concerns have been raised that China is developing a large naval base near the South China Sea and has diverted resources from the [[People's Liberation Army Ground Force]] to the [[People's Liberation Army Navy]] and to air force and missile development.<ref>{{cite news| url=https://www.telegraph.co.uk/news/majornews/1917167/Chinese-build-secret-nuclear-submarine-base.html| archive-url=https://web.archive.org/web/20080504060556/http://www.telegraph.co.uk/news/majornews/1917167/Chinese-build-secret-nuclear-submarine-base.html| url-status=dead| archive-date=4 May 2008| work=The Daily Telegraph| location=London| title=Chinese nuclear submarine base| first=Thomas| last=Harding| date=1 May 2008| access-date=7 April 2010}}</ref><ref name="china.usc.edu"/><ref>{{Cite web|url=http://www.sipri.org/contents/milap/milex/mex_database1.html|archive-url=https://web.archive.org/web/20061129014345/http://www.sipri.org/contents/milap/milex/mex_database1.html|title=SIPRI military expenditure database|archive-date=29 November 2006}}</ref>
       
      On 27 October 2009, U.S. Defense Secretary [[Robert Gates]] praised the steps China has taken to increase transparency of defense spending.<ref>{{cite web|last=Luce|first=Dan De|url=https://www.google.com/hostednews/afp/article/ALeqM5iN273FI9Ieez9xh4hwmwO6hwIG2w|archive-url=https://web.archive.org/web/20130201200925/http://www.google.com/hostednews/afp/article/ALeqM5iN273FI9Ieez9xh4hwmwO6hwIG2w|url-status=dead|archive-date=1 February 2013|title=Time to end 'on-again-off-again' US-China ties: Pentagon|date=26 October 2009|access-date=2 December 2010}}</ref> In June 2010, however, he said that the Chinese military was resisting efforts to improve military-to-military relations with the United States.<ref>{{cite news|last=Entous|first=Adam|url=https://www.reuters.com/article/idUSTRE65220220100603?feedType=RSS&feedName=topNews|title=Gates says China's PLA may be trying to thwart ties|publisher=Reuters |date= 3 June 2010|access-date=2 December 2010}}</ref> Gates also said that the United States would "assert freedom of navigation" in response to Chinese complaints about [[US Navy]] deployments in international waters near China.{{citation needed|date=February 2023}} Admiral [[Michael Mullen]] said that the United States sought closer military ties to China but would continue to operate in the western [[Pacific Ocean|Pacific]].<ref>Pessin, Al. [https://www.voanews.com/a/us-wants-better-military-ties-to-china-but-will-continue-pacific-operations--111149499/166716.html "US Wants Better Military Ties to China, But Will Continue Pacific Operations."]  ''[[Voice of America]]'', 1 December 2010.</ref>
       
      [[File:South China Sea claims map.svg|thumb|250px|[[Territorial disputes in the South China Sea|Territorial claims]] in the [[South China Sea]]]]James R. Holmes, a specialist on China at the [[US Naval War College]], has said that China's investments towards a potential future conflict are closer to those of the United States than may first appear because the Chinese understate their spending, the internal price structures of the two countries are different, and the Chinese need to concentrate only on projecting military force a short distance from their own shores. The balance may shift to the advantage of the Chinese very quickly if they continue double-digit annual growth, and the U.S. and its allies cut back.<ref>{{cite web|url=https://thediplomat.com/the-naval-diplomat/2013/03/07/what-to-make-of-chinas-defense-spending-increase/|title=What to Make of China's Defense Spending Increase|first=James R. |last=Holmes|work=The Diplomat}}</ref>
       
      In line with [[power transition theory]], the idea that "wars tend to break out... when the upward trajectory of a rising power comes close to intersecting the downward trajectory of a [[American decline|declining power]]," some political scientists and international relations scholars have argued that a potential conflict between China, an [[Potential superpower#China|emerging power]], and the United States, the current [[superpower]], is all but inevitable.<ref>{{cite book|last=Kagan|first=Robert|title=The World America Made|year=2012|publisher=Knopf|location=New York|page=90}}</ref> Many academics disagree with applying power transition theory to the China-U.S. relationship.<ref name=":Ma&Kang">{{Cite book |last1=Ma |first1=Xinru |title=Beyond Power Transitions: The Lessons of East Asian History and the Future of U.S.-China Relations |last2=Kang |first2=David C. |date=2024 |publisher=[[Columbia University Press]] |isbn=978-0-231-55597-5 |series=Columbia Studies in International Order and Politics |location=New York}}</ref>{{Rp|page=29}} Robert Art states that these perspectives generally ignore [[China's peaceful rise]] strategy.<ref name=":Ma&Kang" />{{Rp|page=29}} Steve Chan concludes that the China-U.S. power transition will be more similar to the [[United Kingdom–United States relations|U.K.-U.S.]] power transition than the [[Germany–United Kingdom relations|Anglo-German]] power transition in which World War I arose.<ref name=":Ma&Kang" />{{Rp|page=29}}

      ==== Technological transfers and associated issues ====
      On 29 March 2024, the Biden administration revised rules aimed at [[Artificial Intelligence Cold War|restricting China's access]] to U.S. [[artificial intelligence]] (AI) chips and chipmaking tools, including those from [[Nvidia]], as part of [[Artificial intelligence arms race|efforts]] to address national security concerns over Beijing's tech advancements potentially aiding its military.<ref>{{Cite news|date=29 March 2024|title=U.S. updates export curbs on AI chips and tools to China|newspaper=Reuters|url=https://www.reuters.com/technology/us-commerce-updates-export-curbs-ai-chips-china-2024-03-29/|access-date=31 March 2024|archive-date=1 April 2024|archive-url=https://web.archive.org/web/20240401122755/https://www.reuters.com/technology/us-commerce-updates-export-curbs-ai-chips-china-2024-03-29/|url-status=live}}</ref> In August 2025, Chinese regulators informally directed domestic tech companies to halt or reduce purchases of Nvidia's H20 AI chips after U.S. Commerce Secretary [[Howard Lutnick]] made remarks perceived as insulting, stating that the U.S. deliberately sold China only downgraded technology.<ref>{{Cite web |title=Client Challenge |url=https://www.ft.com/content/b8e30c54-b71c-4113-8b3e-8f54bc36587d |access-date=25 August 2025 |website=Financial Times}}</ref>

      ===== China's alleged access to U.S. tech =====
      China has reportedly gained access to classified U.S. military technology on multiple occasions, according to U.S. media and intelligence sources. In the early 1990s, U.S. officials alleged that China obtained American-made Stinger missiles through Pakistan, which had originally received them for distribution to Afghan Mujahideen during the [[Soviet–Afghan War]]. The acquisition was believed to have enabled China to reverse-engineer the technology or develop electronic countermeasures. In 2011, following the U.S. raid that killed Osama bin Laden, China was suspected of examining the wreckage of a stealth-modified [[Black Hawk helicopter]] that crashed during the operation. While U.S. forces attempted to destroy the aircraft with explosives, the tail section—featuring an unusually advanced design—remained largely intact, having landed on a wall surrounding the compound. Pakistan reportedly removed the tail and, amid heightened diplomatic tensions, allowed China to study it before returning it to the United States after several weeks. Reports citing U.S. sources suggested that Chinese officials had "probably" examined the remains. Analysts noted the incident highlighted China's close defense ties with Pakistan. Former U.S. counter-terrorism advisor Richard Clarke stated that any U.S. stealth technology shared by Pakistan to China would have been perceived as a "welcome gift" by Beijing. In 2021, a stealth variant of China's Z-20 helicopter, described by observers as a "Black Hawk clone", was revealed in concept form.<ref>{{Cite web |last=Mann |first=Jim |date=8 May 1992 |title=Pakistan Sent Stingers to China, U.S. Aides Say : Arms: The report shows another leak, adding to fears that the potent antiaircraft missiles could end up in terrorist hands. |url=https://www.latimes.com/archives/la-xpm-1992-05-08-mn-1923-story.html |access-date=25 August 2025 |website=Los Angeles Times}}</ref><ref>{{Cite web |last= |first= |date=15 August 2011 |title=Pakistan Likely Allowed China Access to Secret U.S. Helicopter: Reports |url=https://abcnews.go.com/Blotter/pakistan-allowed-china-access-secret-us-helo-reports/story?id=14307423 |access-date=25 August 2025 |website=ABC News}}</ref><ref>{{Cite web |last=Rogoway |first=Tyler |date=30 May 2021 |title=Stealthy Variant Of China's Z-20 Black Hawk Clone Emerges In Concept Model Form |url=https://www.twz.com/40853/stealthy-variant-of-chinas-z-20-black-hawk-clone-emerges-in-concept-model-form |access-date=25 August 2025 |website=The War Zone}}</ref>

      A 2020 report by the U.S. [[Office of Special Investigations (United States Department of Justice)|Office of Special Investigations]] detailed how Chinese cyber-espionage targeted U.S. military aircraft between 2008 and 2014. Su Bin, a Chinese national linked to the People's Liberation Army, facilitated hackers in stealing over 630,000 files from Boeing related to the C-17 Globemaster cargo aircraft, as well as data on the F-22 and F-35 fighter jets. Using his industry contacts, Su Bin directed the hackers toward specific individuals, companies, and technologies, translating stolen information and coordinating its delivery to the PLA's General Staff. The stolen data, much of which was unclassified but sensitive, enabled China to potentially reverse-engineer aircraft components and accelerate development, resulting in significant losses valued by U.S. prosecutors.<ref>{{Cite news |title=Cyber espionage for the Chinese government |url=https://www.osi.af.mil/News/Features/Display/Article/2350807/cyber-espionage-for-the-chinese-government/ |archive-url=https://web.archive.org/web/20250706223949/https://www.osi.af.mil/News/Features/Display/Article/2350807/cyber-espionage-for-the-chinese-government/ |archive-date=6 July 2025 |access-date=25 August 2025 |work=Office of Special Investigations}}</ref>

      ===Taiwan issue===
      {{Main|Taiwan independence movement|Political status of Taiwan}}

      Since the renewal of U.S.-China relations in early 1979, the Taiwan issue remained a major source of contention. After the announcement of the intention to establish diplomatic relations with [[China|Mainland China]] (PRC) on 15 December 1978, the [[Taiwan|Republic of China (Taiwan)]] immediately condemned the United States, leading to rampant protests in both Taiwan and in the US.<ref>{{cite journal |first1=Steven M. |last1=Goldstein |first2=Randall |last2=Schriver |author2-link=Randall Schriver |title=An Uncertain Relationship: The United States, Taiwan and the Taiwan Relations Act |journal=The China Quarterly |volume=165 |date=2001 |pages=147–172 |doi=10.1017/S0009443901000080 |url=https://olemiss.edu/courses/pol324/goldschr.pdf |url-status=live |archive-url=https://web.archive.org/web/20151120210107/http://cm.olemiss.edu/courses/pol324/goldschr.pdf |archive-date=20 November 2015}}</ref> In April 1979, the U.S. Congress passed the [[Taiwan Relations Act]],<ref>{{Cite web|date=10 April 1979|title=Taiwan Relations Act, 1979 {{!}} US-China Institute|url=https://china.usc.edu/taiwan-relations-act-1979|website=[[USC Annenberg School for Communication and Journalism]]}}</ref> permitting unofficial relations with Taiwan to flourish and granting the right to provide Taiwan with [[List of U.S. arms sales to Taiwan|arms of a defensive character]]. Its passage prompted Deng to begin to view the United States as an insincere partner willing to abandon its prior commitments to China.{{sfn|Zhao|2022|p=54}} The expanding relationship that followed normalization was threatened in 1981 by PRC objections to the level of U.S. arms sales to the Republic of China on Taiwan. Secretary of State [[Alexander Haig]] visited China in June 1981 in an effort to resolve Chinese concerns about America's unofficial relations with Taiwan. Vice President Bush visited the PRC in May 1982. Eight months of negotiations produced the US-PRC Joint Communiqué of 17 August 1982. In this third communiqué, the U.S. stated its intention to gradually reduce the level of arms sales to the Republic of China, and the PRC described as a fundamental policy their effort to strive for a peaceful resolution to the [[political status of Taiwan|Taiwan question]].
       
      When [[Donald Trump]] won the [[2016 United States presidential election|2016 presidential election]], contention over the Taiwan issue intensified; President Trump became the first sitting U.S. president since Jimmy Carter in 1979 to have any formal political or diplomatic contacts with Taiwan when he decided to receive a phone call from president [[Tsai Ing-wen|Tsai Ing-Wen]]. Trump expanded the duties of the US' ''de facto'' embassy in Taipei - the American Institute in Taiwan - by adding more security personnel, and oversaw increasing non-diplomatic visits of Tsai Ing-Wen and Congressmen to each other's countries/regions. In addition, American warships reportedly crossed the Taiwan strait and increased military drills with Taiwan, which mainland China views as a direct threat to its sovereignty.<ref name="cnn.com">{{cite news|title=US Navy warship challenges Chinese claims in the South China Sea|work=[[CNN]]|url=https://www.cnn.com/2019/09/13/_politics-zone-injection/us-warship-south-china-sea/index.html}}</ref><ref name="asia.nikkei.com">{{cite news|title=In Beijing rebuke, Taiwan signals closer defense ties with U.S. and Japan|work=[[Nikkei Asia]]|url=https://asia.nikkei.com/Politics/International-relations/In-Beijing-rebuke-Taiwan-signals-closer-defense-ties-with-US-and-Japan}}</ref>
      Chinese leader Xi Jinping told European Commission President [[Ursula von der Leyen]] in April 2023 that the United States was trying to trick China into attacking Taiwan, but he would not take the bait.<ref>{{cite news|last1=Sevastopulo|first1=Demetri|title=Xi Jinping claimed U.S. wants China to attack Taiwan|url=https://www.ft.com/content/7d6ca06c-d098-4a48-818e-112b97a9497a|agency=Financial Times|date=15 June 2024}}</ref>
       
      Tensions persist over Taiwan, with China conducting military drills in March 2025 following U.S. statements on Taiwanese sovereignty.<ref name=":2">{{Cite web |date=18 March 2025 |title=China conducts air and sea drills near Taiwan in response to U.S. and Taiwanese statements |url=https://apnews.com/article/taiwan-china-planes-ships-d7e0beea3f6164046d34d1dfa1dda71a |access-date=25 March 2025 |website=[[Associated Press]]}}</ref>
       
      In February 2026, Xi Jinping warned Trump to be "prudent" about supplying arms to Taiwan emphasizing that the subject remained the most important issue between U.S. and China.<ref>{{Cite news |date=2026-02-05 |title=Be ‘prudent’ about supplying arms to Taiwan, Xi tells Trump in call |url=https://www.theguardian.com/world/2026/feb/05/xi-jinping-donald-trump-phone-call-china-us-taiwan-relationship |access-date=2026-02-09 |work=The Guardian |language=en-GB |issn=0261-3077}}</ref>
       
      ===Human rights===
      [[File:Kurt Campbell with Chen Guangcheng at US Embassy May 1, 2012.jpg|thumb|Civil rights activist [[Chen Guangcheng]] (left) with former U.S. ambassador to China [[Gary Locke]] (center) and former Assistant Secretary of State for East Asian and Pacific Affairs [[Kurt M. Campbell]] (right) at the U.S. Embassy in Beijing on 1 May 2012]]
      <!-- Deleted image removed: [[File:China statue of liberty cartoon.jpg|thumb|''[[China Daily]]'' published a cartoon of a shadowed [[Statue of Liberty]] holding a tape recorder and microphone, instead of a tablet and torch]]. -->
      [[File:2008 Olympic Torch Relay in SF - Embarcadero 47.JPG|thumb|Pro-[[Tibet]]an protesters clash with pro-Chinese protesters in [[San Francisco]] in 2008.]]
      {{Main|Human rights in China|Human rights in the United States|Human Rights Record of the United States|Chinese censorship abroad}}
       
      In 2003, the United States declared that despite some positive momentum that year and despite greater signs which showed that the People's Republic of China was willing to engage in discussions about [[human rights]] with the U.S. and other nations, there was still serious [[democratic backsliding|backsliding]]. In principle, China has acknowledged the importance of the protection of human rights and it has claimed that it has taken steps to bring its own human rights practices into conformity with international norms. Among those steps are China's signing of the [[International Covenant on Economic, Social and Cultural Rights]] in October 1997, which was ratified in March 2001, and China's signing of the [[International Covenant on Civil and Political Rights]] in October 1998, which has not been ratified yet. In 2002, China released a significant number of political and religious prisoners and it also agreed to hold discussions about torture, arbitrary detention, and religion with UN experts. However, international human rights groups assert that there has been virtually no movement with regard to those promises,{{citation needed|date=February 2014}} with more people having been arrested for similar offences since then. Those groups maintain that China still has a long way to go in instituting the kind of fundamental systemic change that will protect the rights and liberties of all its citizens in mainland China. The U.S. State Department publishes an annual report on human rights around the world, which includes an evaluation of China's human rights record.<ref>{{cite web|url=http://www.china.usc.edu/ShowArticle.aspx?articleID=973|title=U.S. Department of State, 2007 Human Rights in China, March 11, 2008|access-date=31 August 2008|archive-date=19 October 2014|archive-url=https://web.archive.org/web/20141019051521/http://china.usc.edu/ShowArticle.aspx?articleID=973|url-status=dead}}</ref><ref>{{cite web|url=http://www.china.usc.edu/ShowArticle.aspx?articleID=1368|title=U.S. Department of State, 2008 Human Rights in China, February 25, 2009|access-date=26 December 2009|archive-date=11 October 2014|archive-url=https://web.archive.org/web/20141011065606/http://www.china.usc.edu/ShowArticle.aspx?articleID=1368|url-status=dead}}</ref>
       
      In a decision that was criticized by human rights groups, the United States State Department did not list China as one of the world's worst human rights violators [[United States' Country Reports on Human Rights Practices|in its 2007 report of human rights practices in countries and regions outside the United States]].<ref name=NYT>{{cite news|last1=Cooper|first1=Helen|title=U.S. Drops China From List of Top 10 Violators of Rights|url=https://www.nytimes.com/2008/03/12/washington/12rights.html|publisher=NYT|date=12 March 2008}}</ref> However, the assistant secretary of the State Department's [[Bureau of Democracy, Human Rights, and Labor]] [[Jonathan D. Farrar]] stated that China's overall human rights record in 2007 remained poor.<ref name=NYT/>
       
      Since 1998, China has annually published a [[Human Rights Record of the United States|White Paper]] detailing the human rights abuses by the United States<ref>{{cite web|url=http://www.china.org.cn/e-white/20020313/index.htm|title=2002 PRC White Paper on US Human Rights Abuses|publisher=china.org.cn|date=11 March 2002|access-date=2 December 2010}}</ref><ref>{{cite web|url=http://www.china.usc.edu/ShowArticle.aspx?articleID=974|title=PRC State Council, Human Rights Record of the United States in 2007, March 13, 2008|access-date=31 August 2008|archive-date=2 March 2014|archive-url=https://web.archive.org/web/20140302130854/http://china.usc.edu/ShowArticle.aspx?articleID=974|url-status=dead}}</ref><ref>{{cite web|url=http://www.china.usc.edu/ShowArticle.aspx?articleID=1370|title=PRC State Council, Human Rights Record of the United States in 2008, February 27, 2009|access-date=26 December 2009|archive-date=11 October 2014|archive-url=https://web.archive.org/web/20141011065746/http://www.china.usc.edu/ShowArticle.aspx?articleID=1370|url-status=dead}}</ref> and since 2005 has also published a White Paper on its own political system and democratic progress.<ref>{{cite web|url=http://www.china-embassy.org/eng/zt/zgrq/t217337.htm|title=China issues 1st white paper on democracy|publisher=China-embassy.org|date=19 October 2005|access-date=2 December 2010}}</ref><ref>{{cite web|url=http://china.usc.edu/ShowArticle.aspx?articleID=855|title=White Paper on China's Political System, 2007|publisher=China.usc.edu|access-date=2 December 2010}}</ref>
       
      On 27 February 2014,<ref name="news.xinhuanet.com">{{cite web|url=http://news.xinhuanet.com/english/china/2014-02/28/c_133150493.htm|archive-url=https://web.archive.org/web/20140301022136/http://news.xinhuanet.com/english/china/2014-02/28/c_133150493.htm|url-status=dead|archive-date=1 March 2014|title=China issues report on U.S. human rights - Xinhua - English.news.cn}}</ref> the United States released its [[United States' Country Reports on Human Rights Practices|China report on human rights practices for 2013]], which, according to its executive summary, described the PRC as an authoritarian state and a place in which repression and coercion were routine.<ref>{{cite news|title=Country Reports on Human Rights Practices for 2013: China (includes Tibet, Hong Kong, and Macau)|url=https://2009-2017.state.gov/j/drl/rls/hrrpt/humanrightsreport/index.htm?year=2013&dlid=220263#wrapper|publisher=U.S. Department of State}}</ref> On 28 February 2014, China published a report on human rights in the United States that cited [[Mass surveillance in the United States|surveillance on its own citizens]], [[Human rights in the United States#Prison system|mistreatment of inmates]], gun violence, and homelessness, despite having a vibrant economy, as important issues.<ref name="news.xinhuanet.com"/>
       
      In July 2019, [[Vice President of the United States|Vice President]] [[Mike Pence]] accused China of persecuting [[Christianity in China|Christians]], [[Islam in China|Muslims]] and [[Chinese Buddhism|Buddhists]].<ref>{{Cite web|url=https://trumpwhitehouse.archives.gov/briefings-statements/remarks-vice-president-pence-2nd-annual-religious-freedom-ministerial/|title=Remarks by Vice President Pence at the 2nd Annual Religious Freedom Ministerial |via=[[NARA|National Archives]]|work=[[whitehouse.gov]]|access-date=22 August 2019}}</ref> On 4 October 2019, the [[Houston Rockets]]' general manager, [[Daryl Morey]], issued a tweet that supported the [[2019–20 Hong Kong protests]].<ref>{{cite news|title=Rockets working to mend ties with China after executive's Hong Kong tweet|url=https://www.nba.com/article/2019/10/06/cba-suspends-cooperation-rockets|work=AP|date=6 October 2019}}</ref> Morey's tweet resulted in the [[Chinese Basketball Association]]'s suspension of its relationship with the Houston Rockets and the issuance of a statement of dissatisfaction from the consulate office of China in [[Houston]].<ref>{{cite news|title=Rockets' general manager's Hong Kong comments anger China|url=https://www.apnews.com/0a660e9e10664e31bf6ee359c22058cf|work=Associated Press|date=7 October 2019}}</ref> On 6 October, both Morey and the [[NBA]] issued separate statements addressing the original tweet. Morey said that he never intended his tweet to cause any offense, and the NBA said the tweet was "regrettable".<ref>{{cite news|last=Chang|first=Joy|date=7 October 2019|title=Houston Rockets GM's Hong Kong tweet outrages Chinese fans|work=[[SCMP]]|url=https://www.scmp.com/video/hong-kong/3031915/houston-rockets-gms-hong-kong-tweet-outrages-chinese-fans}}</ref><ref>{{cite news|last=Victor|first=Daniel|date=7 October 2019|title=Hong Kong Protests Put N.B.A. on Edge in China|url=https://www.nytimes.com/2019/10/07/sports/basketball/nba-china-hong-kong.html|work=NYT}}</ref> The statements were criticized by U.S. politicians and third-party observers for the perceived exercise of economic statecraft by the PRC and insufficiency of the NBA's defense of Morey's tweet.<ref name="statementcritic">Some relevant sources include:
       
      *{{cite news|date=7 October 2019|title=Rockets' general manager's Hong Kong comments anger China|work=[[Associated Press]]|url=https://www.apnews.com/0a660e9e10664e31bf6ee359c22058cf}}
      *{{cite news|date=8 October 2019|title=China's vise grip on corporate America|publisher=Axios|agency=Axios|url=https://www.axios.com/china-nba-corporate-america-hong-kong-protests-cf9af430-4f8f-4968-aca3-c4b90fb5b2d1.html}}
      *{{cite news|date=8 October 2019|title=The NBA Should Call China's Bluff|publisher=Bloomberg|agency=Bloomberg|url=https://www.bloomberg.com/opinion/articles/2019-10-08/the-nba-should-call-china-s-bluff}}
