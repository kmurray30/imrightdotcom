    extract: Forum of Young Global Leaders, or Young Global Leaders (YGL), is a non-profit globalist organization. The organization was created by Klaus Schwab, founder of the World Economic Forum and is managed from Geneva, Switzerland, under the supervision of the Swiss government. It is run by the World Economic Forum.
    source: |-
      {{Short description|Non-profit organization}}
       [[File:Secretary Kerry Addresses Young Global Leaders at WEF (24441676421).jpg|thumb|[[John Kerry|United States Secretary of State John Kerry]] speaking to the Forum of Young Global Leaders, 2016]]
      '''Forum of Young Global Leaders''', or '''Young Global Leaders''' ('''YGL'''), is a non-profit globalist organization. The organization was created by [[Klaus Schwab]], founder of the [[World Economic Forum]] and is managed from [[Geneva]], Switzerland, under the supervision of the Swiss government. It is run by the World Economic Forum.

      ==History==
      The program was founded by [[Klaus Schwab]] of the [[World Economic Forum]] in 1992 under the name "Global Leaders for Tomorrow" and was renamed to Young Global Leaders in 2003.<ref>{{cite web |title=THE WORLD ECONOMIC FORUM A Partner in Shaping History |url=https://www3.weforum.org/docs/WEF_A_Partner_in_Shaping_History.pdf |website=WE Forum |access-date=4 March 2022 |ref=page 131 |archive-date=1 March 2022 |archive-url=https://web.archive.org/web/20220301143134/https://www3.weforum.org/docs/WEF_A_Partner_in_Shaping_History.pdf |url-status=live }}</ref> Schwab created the group with $1 million won from the [[Dan David Prize]],<ref>{{Citation |year=2009 |title=Next–Generation Leadership |publisher=Harvard: John F. Kennedy School of Government |url=https://www.hks.harvard.edu/news-events/publications/harvard-kennedy-school-magazine/archives/summer-2009/next-generation-leadership |archive-url=https://web.archive.org/web/20090907022046/https://www.hks.harvard.edu/news-events/publications/harvard-kennedy-school-magazine/archives/summer-2009/next-generation-leadership |archive-date=7 September 2009 }}</ref> and the inaugural 2005 class comprised 237 young leaders.  Since then, a total of some 1400 individuals have been inducted into the YGL community.

      ==Reception==
      ''[[BusinessWeek]]'''s Bruce Nussbaum describes the Young Global Leaders as "the most exclusive private social network in the world" and "perhaps the paramount networking network in the globe",<ref>{{Citation|last=Nussbaum|first=Bruce|year=2008|title=Young Global Leaders: Anderson Cooper and Leonardo DiCaprio Are In The Most Exclusive Private Social Network In The World|publisher=BusinessWeek|url=http://www.businessweek.com/stories/2008-03-17/young-global-leaders-anderson-cooper-and-leonardo-dicaprio-are-in-the-most-exclusive-private-social-network-in-the-world-dot|archive-url=https://archive.today/20141016131101/http://www.businessweek.com/stories/2008-03-17/young-global-leaders-anderson-cooper-and-leonardo-dicaprio-are-in-the-most-exclusive-private-social-network-in-the-world-dot|archive-date=October 16, 2014}}</ref> while the organization bills the group of selected leaders as representing "the voice for the future and the hopes of the next generation". It has elsewhere also been described as a grouping that is "leading the charge in nurturing a special community of leaders committed to addressing the world's most urgent challenges."<ref>{{Cite web |date=2024-04-05 |title=RPSG Group's Shashwat Goenka joins WEF's Young Global Leaders Class of 2024 |url=https://www.indiatoday.in/business/story/rpsg-groups-shashwat-goenka-joins-wefs-young-global-leaders-class-of-2024-2523588-2024-04-05 |access-date=2024-06-19 |website=India Today |language=en}}</ref>

      Skeptics suggest that the grouping is "instrumental in shaping policy around the world, undermining democratic principles, and creating obedient and compliant servants"<ref>{{Cite web |date=2023-04-23 |title=Beware The Young Global Leaders of the World Economic Forum |url=https://www.newenglishreview.org/beware-the-young-global-leaders-of-the-world-economic-forum/ |access-date=2024-06-19 |website=New English Review |language=en-US}}</ref> In dispelling such conspiracy theories of the influence of the organisation, [[Michelle Rempel Garner|Michelle Rempel]], a Canadian Conservative politician who found out she had been selected as a Young Global Leader in 2016 with an email that she initially had assumed was spam, noted that the 2017 meeting was "no different in feel from an academic conference, if a bit more global in nature and with more high-profile politicians and CEOs in attendance."<ref>{{cite web |date=24 February 2022 |title=Michelle Rempel Garner: I went to Davos. The World Economic Forum is not running Canada |url=https://theline.substack.com/p/michelle-rempel-garner-i-went-to?s=r |url-status=live |archive-url=https://web.archive.org/web/20220303084459/https://theline.substack.com/p/michelle-rempel-garner-i-went-to?s=r |archive-date=3 March 2022 |access-date=3 March 2022 |website=Substack |publisher=Michelle Rempel}}</ref> One academic, having studied the grouping, pointed out that while such social networks provides "privileged access to a network of elites" and represents "a concentration of cultural and social as well as symbolic capital", it would be simplistic to conclude that membership would "deterministically imply that the actors will obey its values."<ref>{{Cite web |last=global |first=the |date=2021-04-20 |title=The Forum of Young Global Leaders and overlapping fields of power • The Global |url=https://theglobal.blog/2021/04/20/the-forum-of-young-global-leaders-and-overlapping-fields-of-power/ |access-date=2024-06-19 |website=The Global |language=en-US}}</ref> Another has suggested that the platform effectively selects already prominent and influential individuals, noting that "Young Global Leaders are not "put in power" like many believe. You cannot become a YGL unless you are already in a powerful position."<ref>{{Cite web |last=Ho |first=Pam |date=2023-01-17 |title=Tulsi Gabbard and The World Economic Forum — The Whole Story |url=https://pamho.medium.com/tulsi-gabbard-and-the-world-economic-forum-the-whole-story-4fca2e9fbf7d |access-date=2024-06-19 |website=Medium |language=en}}</ref>

      ==Selection process==
      Representing 70 nations, Young Global Leaders are nominated by alumni to serve six-year terms and are subject to veto during the selection process. Candidates must be younger than 38 when accepted (so active YGLs are 44 and younger), and highly accomplished in their fields.<ref>{{Citation|url=https://www.weforum.org/about/nominate-a-young-global-leader|title=Nominate a Young Global Leader|access-date=2018-08-20|archive-date=2018-08-20|archive-url=https://web.archive.org/web/20180820074529/https://www.weforum.org/about/nominate-a-young-global-leader|url-status=live}}</ref><ref>{{Citation|year=2013|title=Lista Iz Davosa|publisher=Vreme|url=http://www.vreme.com/cms/view.php?id=1103618|access-date=2014-10-16|archive-date=2015-09-23|archive-url=https://web.archive.org/web/20150923174037/http://www.vreme.com/cms/view.php?id=1103618|url-status=live}}</ref><ref>{{Citation|year=2013|title=Wo die junge Elite zusammenkommt|publisher=Wirtschafts Woche|url=http://www.wiwo.de/erfolg/management/serie-tickets-zur-macht-iv-wo-die-junge-elite-zusammenkommt/7969206.html|access-date=2014-10-16|archive-date=2014-10-16|archive-url=https://web.archive.org/web/20141016144320/http://www.wiwo.de/erfolg/management/serie-tickets-zur-macht-iv-wo-die-junge-elite-zusammenkommt/7969206.html|url-status=live}}</ref> There have been many hundreds of honorees, including several popular celebrities, alongside recognized high achievers and innovators in politics, business, academia, media, and the arts.<ref name=":0">{{Citation|last=Staff|title=Young global leaders focus energy and knowledge on better future for all|url=http://www.japantimes.co.jp/news/2014/09/10/business/economy-business/young-global-leaders-focus-energy-knowledge-better-future|year=2010|work=Japan Times|access-date=2014-10-17|archive-date=2014-10-21|archive-url=https://web.archive.org/web/20141021233301/http://www.japantimes.co.jp/news/2014/09/10/business/economy-business/young-global-leaders-focus-energy-knowledge-better-future|url-status=live}}</ref> The group presently comprises some 1400 individuals, many of whom head numerous governments and Fortune 500 companies, have won Nobel Peace Prizes and Grammy Awards, and are UN Goodwill Ambassadors.<ref name=":1">{{Cite web |title=MCi COO announced as Young Global leader by World Economic Forum |url=https://www.mineralcarbonation.com/blog/mci-coo-announced-as-young-global-leader-by-world-economic-forum |access-date=2024-06-18 |website=MCi COO announced as Young Global leader by World Economic Forum |language=en |archive-date=2024-06-18 |archive-url=https://web.archive.org/web/20240618085346/https://www.mineralcarbonation.com/blog/mci-coo-announced-as-young-global-leader-by-world-economic-forum |url-status=dead }}</ref>

      The selection process includes a screening without the candidate's knowledge and, at least for the class of 2024, "nominated candidates may be invited to submit a brief application" and "shortlisted candidates may be asked to meet with a member of the YGL Community". Therefore, some nominee's may not be aware they were nominated unless they are selected, and only when they are selected.<ref>{{Cite web |title=Nomination Criteria |url=https://www.younggloballeaders.org/nomination-criteria/ |access-date=2023-05-08 |website=The Forum of Young Global Leaders |language=en |archive-date=2023-05-08 |archive-url=https://web.archive.org/web/20230508100710/https://www.younggloballeaders.org/nomination-criteria/ |url-status=live }}</ref> Roughly 100 YGL are selected every year. The selection criteria are strict, requiring that individuals at start-ups be founders, chief executive officers or chairs of boards (especially of series C start-ups and unicorns), individuals in the public sector be ministers, parliament members, mayors of capital cities or highly populated cities, governors, or heads of political parties and for civil society leaders to be founders and chief executive officers of consequential civil society organizations or social enterprises, or hold a senior leadership role in a large global NGO.<ref>{{Cite web |title=Nomination Criteria |url=https://www.younggloballeaders.org/nomination-criteria/ |access-date=2024-06-19 |website=The Forum of Young Global Leaders |language=en}}</ref> These individuals cannot apply to join but instead are identified and proposed through a qualified nomination process, which is then vetted by Heidrick and Struggles, and subsequently vetted by a selection committee chaired by Queen [[Queen Rania of Jordan|Rania Al Abdullah]] of Jordan.<ref>{{Cite web |title=World Economic Forum YGL Brochure |url=https://www3.weforum.org/docs/WEF_YGL_Brochure.pdf |access-date=19 June 2024 |website=World Economic Forum}}</ref>

      == Notable Young Global Leaders ==
      Young Global Leaders straddle various fields, and are often highly accomplished leaders in their respective fields, including leading politicians, royalty, very senior members of Government, social activists and those in the business and finance world. As of 2022, the eight most prominent countries for Young Global Leaders are China, Germany, India, Japan, Singapore, Switzerland, the United Kingdom, the USA, with these being the only countries globally who have more than 30 Young Global Leaders.<ref>{{Cite journal |last1=Klement |first1=Rainer J |last2=Walach |first2=Harald |title=Is the Network of World Economic Forum Young Global Leaders Associated With COVID-19 Non-Pharmaceutical Intervention Severity? |journal=Cureus |date=2022 |volume=14 |issue=10 |article-number=e29990 |doi=10.7759/cureus.29990 |doi-access=free |issn=2168-8184 |pmc=9636891 |pmid=36381709}}</ref>

