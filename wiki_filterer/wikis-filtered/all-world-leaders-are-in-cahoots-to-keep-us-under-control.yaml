      === President ===
      {{Main|President of the United Nations Security Council}}

      The role of [[President of the United Nations Security Council|president of the Security Council]] involves setting the agenda, presiding at its meetings and overseeing any crisis. The president is authorised to issue both [[Presidential Statement|presidential statements]] (subject to consensus amongst Council members) and notes,<ref>{{cite web |url=https://www.un.org/Docs/sc/notes/PresidentialNotesEng.htm |title=Notes by the president of the Security Council |publisher=United Nations |access-date=9 June 2012 |archive-date=30 March 2012 |archive-url=https://web.archive.org/web/20120330212749/http://www.un.org/Docs/sc/notes/PresidentialNotesEng.htm |url-status=live}}</ref><ref name="un.org">{{cite web |url=https://www.un.org/Docs/sc/unsc_pres_statements08.htm |title=UN Security Council: Presidential Statements 2008 |publisher=United Nations |access-date=9 June 2012 |archive-date=11 August 2012 |archive-url=https://web.archive.org/web/20120811210203/http://www.un.org/Docs/sc/unsc_pres_statements08.htm |url-status=live}}</ref> which are used to make declarations of intent that the full Security Council can then pursue.<ref name="un.org"/> The presidency of the council is held by each of the members in turn for one month, following the English alphabetical order of the member states' names.<ref>{{cite web |url=https://www.un.org/sc/presidency.asp |title=Security Council Presidency in 2011 – United Nations Security Council |publisher=United Nations |access-date=9 June 2012 |archive-date=3 June 2012 |archive-url=https://web.archive.org/web/20120603183638/http://www.un.org/sc/presidency.asp |url-status=live}}</ref> No distinction is made between permanent and non-permanent members in the rotation.

      The list of nations that will hold the presidency in 2026 is as follows:<ref>{{cite web|title=Security Council Presidency|url=https://www.un.org/securitycouncil/content/presidency|website=United Nations Security Council|publisher=United Nations|access-date=5 January 2020|archive-date=22 March 2022|archive-url=https://web.archive.org/web/20220322133448/https://www.un.org/securitycouncil/content/presidency|url-status=live}}</ref>

