      Empirically, some researchers suggest that central banks' policies can be described by a simple method called the [[Taylor rule]], according to which central banks adjust their policy interest rate in response to changes in the inflation rate and the [[output gap]]. The rule was proposed by [[John B. Taylor]] of [[Stanford University]].<ref>{{Cite book | first = Athanasios  | last = Orphanides | author-link = Athanasios Orphanides  | title = Taylor rules (Abstract)  | publisher = [[The New Palgrave Dictionary of Economics]], 2nd Edition. v. 8 | pages = 200–04 | url = http://www.dictionaryofeconomics.com/article?id=pde2008_T000215&q=taylor%20rules&topicid=&result_number=1 }}</ref>

      === Inflation targeting ===
      {{Main|Inflation targeting}}Under this policy approach, the official target is to keep [[inflation]], under a particular definition such as the [[Consumer Price Index]], within a desired range. Thus, while other monetary regimes usually also have as their ultimate goal to control inflation, they go about it in an indirect way, whereas inflation targeting employs a more direct approach. Inflation targeting countries typically conduct dynamic inflation targeting by frequently updating inflation targets and bands, and their targets and band sizes are heterogeneous and wide-ranging.<ref name="imf.org">{{Cite web |title=Do Actions Speak Louder Than Words? Assessing the Effects of Inflation Targeting Track Records on Macroeconomic Performance |url=https://www.imf.org/en/Publications/WP/Issues/2022/11/11/Do-Actions-Speak-Louder-Than-Words-Assessing-the-Effects-of-Inflation-Targeting-Track-525070 |access-date=2025-03-22 |website=IMF |language=en}}</ref>

      The inflation target is achieved through periodic adjustments to the central bank [[interest rate]] target. In addition, clear communication to the public about the central bank's actions and future expectations is an essential part of the strategy, in itself influencing inflation expectations which are considered crucial for actual inflation developments.<ref>{{cite web |title=Inflation Targeting and Communication: It Pays Off to Read Inflation Reports |url=https://www.imf.org/external/pubs/ft/wp/2008/wp08234.pdf |website=www.imf.org |publisher=IMF Working Paper |access-date=13 August 2023 |date=October 2008}}</ref>

      Typically the duration that the interest rate target is kept constant will vary between months and years. This interest rate target is usually reviewed on a monthly or quarterly basis by a policy committee.<ref name="Feenstra, Robert C. 2012"/> Changes to the interest rate target are made in response to various market indicators in an attempt to forecast [[Economic forecasting|economic trend]]s and in so doing keep the market on track towards achieving the defined inflation target.

      The inflation targeting approach to monetary policy approach was pioneered in New Zealand. Since 1990, an increasing number of countries have switched to inflation targeting as their monetary policy framework. It is used in, among other countries, [[Australia]], [[Brazil]], [[Canada]], [[Chile]], [[Colombia]], the [[Czech Republic]], [[Hungary]], [[Japan]], [[New Zealand]], [[Norway]], [[Iceland]], [[India]], [[Philippines]], [[Poland]], [[Sweden]], [[South Africa]], [[Turkey]], and the [[United Kingdom]].<ref>{{Cite web |title=Do Actions Speak Louder Than Words? Assessing the Effects of Inflation Targeting Track Records on Macroeconomic Performance |url=https://www.imf.org/en/Publications/WP/Issues/2022/11/11/Do-Actions-Speak-Louder-Than-Words-Assessing-the-Effects-of-Inflation-Targeting-Track-525070 |access-date=2023-01-17 |website=IMF |language=en}}</ref> In 2022, the International Monetary Fund registered that 45 economies used inflation targeting as their monetary policy framework.<ref name=IMF/> In addition, the [[Federal Reserve]] and the [[European Central Bank]] are generally considered to follow a strategy very close to inflation targeting, even though they do not officially label themselves as inflation targeters.<ref name=Holdingline/> Inflation targeting thus has become the world's dominant monetary policy framework.<ref>{{cite web |last1=Ehrmann |first1=Michael |title=Point targets, tolerance bands, or target ranges? Inflation target types and the anchoring of inflation expectations |url=https://www.ecb.europa.eu/pub/pdf/scpwps/ecb.wp2562~de75bfac6b.en.pdf |website=www.ecb.europa.eu |publisher=European Central Bank |access-date=13 August 2023 |date=May 2021}}</ref> However, the track records of how inflation targeters managed inflation according to their publicly announced objectives have differed dramatically across countries and over time.<ref>{{Cite web |title=Stock Returns and Inflation Redux: An Explanation from Monetary Policy in Advanced and Emerging Markets |url=https://www.imf.org/en/Publications/WP/Issues/2021/08/20/Stock-Returns-and-Inflation-Redux-An-Explanation-from-Monetary-Policy-in-Advanced-and-463391 |access-date=2025-03-22 |website=IMF |language=en}}</ref><ref name="imf.org"/> Inflation targeting track records are found to have lasting, varied impacts on stock returns, bond yields, and exchange rates, and credible inflation targeting has helped enhance monetary policy and save fiscal space.<ref>{{Cite journal |last=Zhang |first=Zhongxia |date=2025-06-01 |title=Does inflation targeting track record matter for asset prices? Evidence from stock, bond, and foreign exchange markets |journal=Journal of International Financial Markets, Institutions and Money |volume=101 |article-number=102141 |doi=10.1016/j.intfin.2025.102141 |issn=1042-4431|doi-access=free }}</ref> Nevertheless, critics contend that there are unintended consequences to this approach such as fueling the increase in housing prices and contributing to wealth inequalities by supporting higher equity values.<ref>{{Cite web |title=The Unintended Consequences of Central Bank-Induced Low Interest Rates {{!}} Montreal Economic Institute |url=https://www.iedm.org/the-unintended-consequences-of-central-bank-induced-low-interest-rates/ |access-date=2023-01-27 |website=www.iedm.org |date=31 March 2022 |language=en-US}}</ref>

      === Fixed exchange rate targeting ===
      This policy is based on maintaining a [[fixed exchange rate]] with a foreign currency. There are varying degrees of fixed exchange rates, which can be ranked in relation to how rigid the fixed exchange rate is with the anchor nation.

      Under a system of fiat fixed rates, the local government or monetary authority declares a fixed exchange rate but does not actively buy or sell currency to maintain the rate. Instead, the rate is enforced by non-convertibility measures (e.g. [[capital control]]s, import/export licenses, etc.). In this case, there is a black market exchange rate where the currency trades at its market/unofficial rate.

      Under a system of fixed convertibility, currency is bought and sold by the central bank or monetary authority on a daily basis to achieve the target exchange rate. This target rate may be a fixed level or a fixed band within which the exchange rate may fluctuate until the monetary authority intervenes to buy or sell as necessary to maintain the exchange rate within the band. (In this case, the fixed exchange rate with a fixed level can be seen as a special case of the fixed exchange rate with bands where the bands are set to zero.)

      Under a system of fixed exchange rates maintained by a [[currency board]] every unit of local currency must be backed by a unit of foreign currency (correcting for the exchange rate). This ensures that the local monetary base does not inflate without being backed by hard currency and eliminates any worries about a run on the local currency by those wishing to convert the local currency to the hard (anchor) currency.

      Under [[dollarization]], foreign currency (usually the US dollar, hence the term "dollarization") is used freely as the medium of exchange either exclusively or in parallel with local currency. This outcome can come about because the local population has lost all faith in the local currency, or it may also be a policy of the government (usually to rein in inflation and import credible monetary policy).

      Theoretically, using [[relative purchasing power parity]] (PPP), the rate of depreciation of the home country's currency must equal the inflation differential:

      :rate of depreciation = home inflation rate – foreign inflation rate,

      which implies that

      :home inflation rate = foreign inflation rate + rate of depreciation.

      The anchor variable is the rate of depreciation. Therefore, the rate of inflation at home must equal the rate of inflation in the foreign country plus the rate of depreciation of the exchange rate of the home country currency, relative to the other.

      With a strict fixed exchange rate or a peg, the rate of depreciation of the exchange rate is set equal to zero. In the case of a [[crawling peg]], the rate of depreciation is set equal to a constant. With a limited flexible band, the rate of depreciation is allowed to fluctuate within a given range.

      By fixing the rate of depreciation, PPP theory concludes that the home country's inflation rate must depend on the foreign country's.

      Countries may decide to use a fixed exchange rate monetary regime in order to take advantage of price stability and control inflation. In practice, more than half of nations' monetary regimes use fixed exchange rate anchoring.<ref name="Feenstra, Robert C. 2012"/> The great majority of these are [[emerging economies]], Denmark being the only [[OECD]] member in 2022 maintaining an exchange rate anchor according to the IMF.<ref name=IMF/>

      These policies often abdicate monetary policy to the foreign monetary authority or government as monetary policy in the pegging nation must align with monetary policy in the anchor nation to maintain the exchange rate. The degree to which local monetary policy becomes dependent on the anchor nation depends on factors such as capital mobility, openness, [[credit channel]]s and other economic factors.

      === Money supply targeting ===
      In the 1980s, several countries used an approach based on a constant growth in the money supply. This approach was refined to include different classes of money and credit (M0, M1, etc.) The approach was influenced by the theoretical school of thought called [[monetarism]].<ref>{{cite web |last1=Haltom |first1=Renee |title=Does Money Still Matter for Monetary Policy? |url=https://www.richmondfed.org/-/media/richmondfedorg/publications/research/economic_brief/2013/pdf/eb_13-05.pdf |website=www.richmondfed.org |publisher=Federal Reserve Bank of Richmond |access-date=13 August 2023 |date=May 2013}}</ref> In the US this approach to monetary policy was discontinued with the selection of [[Alan Greenspan]] as [[Fed Chairman]].

      Central banks might choose to set a money supply growth target as a nominal anchor to keep prices stable in the long term. The [[quantity theory]] is a long run model, which links price levels to money supply and demand. Using this equation, we can rearrange to see the following:

      :π = μ − g,

      where π is the inflation rate, μ is the money supply growth rate and g is the real output growth rate. This equation suggests that controlling the money supply's growth rate can ultimately lead to price stability in the long run. To use this nominal anchor, a central bank would need to set μ equal to a constant and commit to maintaining this target. While monetary policy typically focuses on a [[price signal]] of one form or another, this approach is focused on monetary quantities.

      However, targeting the money supply growth rate was not a success in practice because the relationship between inflation, economic activity, and measures of money growth turned out to be unstable.<ref name="Historical"/> Consequently, the importance of the money supply as a guide for the conduct of monetary policy has diminished over time,<ref>{{cite web |title=What is the money supply? Is it important? |url=https://www.federalreserve.gov/faqs/money_12845.htm |website=Board of Governors of the Federal Reserve System |access-date=13 August 2023 |language=en |date=December 16, 2015}}</ref> and after the 1980s central banks have shifted away from policies that focus on money supply targeting. Today, it is widely considered a weak policy, because it is not stably related to the growth of real output. As a result, a higher output growth rate will result in a too low level of inflation. A low output growth rate will result in inflation that would be higher than the desired level.<ref name="Feenstra, Robert C. 2012"/>

      Later research suggests this apparent instability in money demand relationship may have stemmed from measurement error in traditional simple-sum monetary aggregates, which problematically treat all monetary assets as perfect substitutes. [[Divisia monetary aggregates]] developed by Barnett (1980),<ref>{{Cite journal |last1=Barnett |first1=William A. |date=1980 |title=Economic monetary aggregates an application of index number and aggregation theory |journal=Journal of Econometrics |volume=14 |issue=1 |pages=11–48|doi=10.1016/0304-4076(80)90070-6 }}</ref> which appropriately weight components based on their user costs and liquidity services, demonstrate more stable relationships with economic variables. Studies by Belongia (1996)<ref>{{Cite journal |last1=Belongia |first1=Michael T. |date=1996 |title=Measurement matters: Recent results from monetary economics reexamined |journal=Journal of Political Economy |volume=104 |issue=5 |pages=1065–1083|doi=10.1086/262052 }}</ref> and Hendrickson (2014)<ref>{{Cite journal |last1=Hendrickson |first1=Joshua R. |date=2014 |title=Redundancy or mismeasurement? A reappraisal of money |journal=Macroeconomic Dynamics |volume=18 |issue=7 |pages=1437–1465|doi=10.1017/S1365100512001034 |url=https://mpra.ub.uni-muenchen.de/21477/1/MPRA_paper_21477.pdf }}</ref> show many findings of unstable money demand can be reversed when using Divisia rather than simple-sum measures, suggesting measurement methods rather than fundamental economic relationships may have been the key issue. Chen and Valcarcel empirically tested for stable money demand function across subsamples with Divisia monetary aggregates and their associated user costs.<ref>{{Cite journal |last1=Chen |first1=Zhengyang |last2=Valcarcel |first2=Victor J. |date=September 2024 |title=A granular investigation on the stability of money demand|journal=Macroeconomic Dynamics |volume=29 |language=en |pages=1–26 |article-number=e40 |doi= 10.1017/S1365100524000427 |url=https://scholarworks.uni.edu/facpub/6656 |hdl=10419/303477 |hdl-access=free }}</ref> Monetary policy rules targeting properly measured monetary aggregates may better characterize central bank actions, particularly during recessions and zero lower bound periods.<ref>{{Cite journal |last1=Keating |first1=John W. |last2=Kelly |first2=L.J. |last3=Smith |first3=A.L. |last4=Valcarcel |first4=Victor J. |date=February 2019 |title=A model of monetary policy shocks for financial crises and normal conditions |journal=Journal of Money, Credit and Banking |volume=51 |issue=1 |pages=227–259|doi=10.1111/jmcb.12522 }}</ref>

      In 2022, the International Monetary Fund registered that 25 economies, all of them emerging economies, used some monetary aggregate target as their monetary policy framework.<ref name=IMF/>

      === Nominal income/NGDP targeting ===
      {{Main|Nominal income target}}
      Related to money targeting, [[nominal income target]]ing (also called Nominal GDP or NGDP targeting), originally proposed by [[James Meade]] (1978) and [[James Tobin]] (1980), was advocated by [[Scott Sumner]] and reinforced by the [[market monetarist]] school of thought.<ref>{{cite journal |title=Nominal GDP Targeting: A Simple Rule to Improve Fed Performance |journal= Cato Journal |volume=34 |pages=315–337 |year=2014 |last1=Sumner |first1=Scott |url=https://ideas.repec.org/a/cto/journl/v34y2014i2p315-337.html }}</ref>

      So far, no central banks have implemented this monetary policy. However, various academic studies indicate that such a monetary policy targeting would better match central bank losses<ref>{{cite journal |doi=10.1016/j.iref.2019.01.010 |title=Central bank losses and monetary policy rules: A DSGE investigation |journal=International Review of Economics & Finance |volume=61 |pages=289–303 |year=2019 |last1=Benchimol |first1=Jonathan |last2=Fourçans |first2=André |s2cid=159290669 |url=https://ideas.repec.org/a/eee/reveco/v61y2019icp289-303.html }}</ref> and welfare optimizing monetary policy<ref>{{cite journal |doi=10.1016/j.jedc.2016.05.004 |title=On the desirability of nominal GDP targeting |journal=Journal of Economic Dynamics and Control |volume=69 |pages=21–44 |year=2016 |last1=Garín |first1=Julio |last2=Lester |first2=Robert |last3=Sims |first3=Eric |s2cid=13492347 |url=http://www.nber.org/papers/w21420.pdf }}</ref> compared to more standard monetary policy targeting.

      === Price level targeting ===
      Price level targeting is a monetary policy that is similar to inflation targeting except that [[CPI growth]] in one year over or under the long-term price level target is offset in subsequent years such that a targeted price-level trend is reached over time, e.g. five years, giving more certainty about future price increases to consumers. Under inflation targeting what happened in the immediate past years is not taken into account or adjusted for in the current and future years.

      === Nominal anchors and exchange rate regimes ===

      The different types of policy are also called '''monetary regimes''', in parallel to [[exchange-rate regime]]s. A fixed exchange rate is also an exchange-rate regime. The gold standard results in a relatively fixed regime towards the currency of other countries following a gold standard and a floating regime towards those that are not. Targeting inflation, the price level or other monetary aggregates implies floating the exchange rate.

      {| class="wikitable"
      |-
      ! Type of Nominal Anchor !! Compatible Exchange Rate Regimes
      |-
      | Exchange Rate Target || Currency Union/Countries without own currency, Pegs/Bands/Crawls, Managed Floating
      |-
      | Money Supply Target || Managed Floating, Freely Floating
      |-
      | Inflation Target (+ Interest Rate Policy) || Managed Floating, Freely Floating
      |}

      ==Credibility==

      The short-term effects of monetary policy can be influenced by the degree to which announcements of new policy are deemed [[credibility|credible]].<ref>{{cite journal |jstor=1830193 |doi=10.1086/260580 |citeseerx=10.1.1.603.6853 |title=Rules Rather than Discretion: The Inconsistency of Optimal Plans |journal=Journal of Political Economy |volume=85 |issue=3 |pages=473–491 |year=1977 |last1=Kydland |first1=Finn E. |last2=Prescott |first2=Edward C. |s2cid=59329819 }}</ref> In particular, when an anti-inflation policy is announced by a central bank, in the absence of credibility in the eyes of the public [[expected inflation|inflationary expectations]] will not drop, and the short-run effect of the announcement and a subsequent sustained anti-inflation policy is likely to be a combination of somewhat lower inflation and higher unemployment (see [[Phillips curve#NAIRU and rational expectations|Phillips curve § NAIRU and rational expectations]]). But if the policy announcement is deemed credible, inflationary expectations will drop commensurately with the announced policy intent, and inflation is likely to come down more quickly and without so much of a cost in terms of unemployment.

      Thus there can be an advantage to having the central bank be independent of the political authority, to shield it from the prospect of political pressure to reverse the direction of the policy. But even with a seemingly independent central bank, a central bank whose hands are not tied to the anti-inflation policy might be deemed as not fully credible; in this case, there is an advantage to be had by the central bank being in some way bound to follow through on its policy pronouncements, lending it credibility.<ref>{{Cite book |last=Blinder |first=Alan S. |url=https://books.google.com/books?id=Rg-SnsmmpMMC&dq=central+bank+bound+policy+pronouncements+credibility&pg=PT68 |title=Central Banking in Theory and Practice |date=1999-01-07 |publisher=MIT Press |isbn=978-0-262-26046-6 |language=en}}</ref>

      There is very strong consensus among economists that an independent central bank can run a more credible monetary policy, making market expectations more responsive to signals from the central bank.<ref>{{cite web |url=http://www.igmchicago.org/surveys/fed-appointments |title=Fed Appointments |work=IGM Forum |publisher=Chicago Booth |access-date=20 July 2022}}</ref>

      ==Contexts==

      ===In international economics===
      Optimal monetary policy in [[international economics]] is concerned with the question of how monetary policy should be conducted in interdependent open economies. The [[neoclassical economics|classical view]] holds that international macroeconomic interdependence is only relevant if it affects domestic [[output gap]]s and inflation, and monetary policy prescriptions can abstract from openness without harm.<ref>{{cite journal |doi=10.1016/S0304-3932(02)00128-9 |title=A simple framework for international monetary policy analysis |journal=Journal of Monetary Economics |volume=49 |issue=5 |pages=879–904 |year=2002 |last1=Clarida |first1=Richard |last2=Galı́ |first2=Jordi |last3=Gertler |first3=Mark |citeseerx=10.1.1.591.9773 |s2cid=12773105 }}</ref> This view rests on two implicit assumptions: a high responsiveness of import prices to the exchange rate, i.e. producer currency pricing (PCP), and frictionless international financial markets supporting the efficiency of flexible price allocation.<ref name="Corsetti, G. 2005 pp. 281-305">Corsetti, G., Pesenti, P. (2005). International dimensions of optimal monetary policy. ''Journal of Monetary Economics'', 52(2), pp. 281–305.</ref><ref>{{cite journal |doi=10.1111/1467-937X.00266 |title=Monetary Policy in the Open Economy Revisited: Price Setting and Exchange-Rate Flexibility |journal=Review of Economic Studies |volume=70 |issue=4 |pages=765–783 |year=2003 |last1=Devereux |first1=Michael B. |last2=Engel |first2=Charles |citeseerx=10.1.1.34.3478 |s2cid=155988246 }}</ref> The violation or distortion of these assumptions found in empirical research is the subject of a substantial part of the international optimal monetary policy literature. The policy trade-offs specific to this international perspective are threefold:<ref name="corsettidedolaleduc">{{cite book |doi=10.1016/B978-0-444-53454-5.00004-9 |title=Optimal Monetary Policy in Open Economies |volume=3 |pages=861–933 |series=Handbook of Monetary Economics |year=2010 |last1=Corsetti |first1=Giancarlo |last2=Dedola |first2=Luca |last3=Leduc |first3=Sylvain |isbn=978-0-444-53470-5 |hdl=1814/14555 |s2cid=17023845 |url=http://www.frbsf.org/publications/economics/papers/2010/wp10-13bk.pdf }}</ref>

      First, research suggests only a weak reflection of exchange rate movements in import prices, lending credibility to the opposed theory of local currency pricing (LCP).<ref>{{cite journal |doi=10.1162/qjec.2008.123.2.531 |title=Sticky Borders |journal=Quarterly Journal of Economics |volume=123 |issue=2 |pages=531–575 |year=2008 |last1=Gopinath |first1=Gita |last2=Rigobon |first2=Roberto }}</ref> The consequence is a departure from the classical view in the form of a trade-off between output gaps and misalignments in international relative prices, shifting monetary policy to CPI inflation control and real exchange rate stabilization.

      Second, another specificity of international optimal monetary policy is the issue of strategic interactions and competitive devaluations, which is due to cross-border spillovers in quantities and prices.<ref>{{cite book |doi=10.1016/S1573-4404(05)80018-8 |title=Double-edged incentives: Institutions and policy coordination |volume=3 |pages=1973–2030 |series=Handbook of International Economics |year=1995 |last1=Persson |first1=Torsten |last2=Tabellini |first2=Guido |isbn=978-0-444-81547-7 }}</ref> Therein, the national authorities of different countries face incentives to manipulate the [[terms of trade]] to increase national welfare in the absence of international policy coordination. Even though the gains of international policy coordination might be small, such gains may become very relevant if balanced against incentives for international noncooperation.<ref name="Corsetti, G. 2005 pp. 281-305"/>

      Third, open economies face policy trade-offs if asset market distortions prevent global efficient allocation. Even though the real exchange rate absorbs shocks in current and expected fundamentals, its adjustment does not necessarily result in a desirable allocation and may even exacerbate the misallocation of consumption and employment at both the domestic and global level. This is because, relative to the case of complete markets, both the Phillips curve and the loss function include a welfare-relevant measure of cross-country imbalances. Consequently, this results in domestic goals, e.g. [[output gap]]s or inflation, being traded-off against the stabilization of external variables such as the terms of trade or the demand gap. Hence, the optimal monetary policy in this case consists of redressing demand imbalances and/or correcting international relative prices at the cost of some inflation.<ref>{{cite web |url=https://www.snb.ch/n/mmr/reference/sem_2011_09_23_dedola/source/sem_2011_09_23_dedola.n.pdf |first1=Giancarlo |last1=Corsetti |first2=Luca |last2=Dedola |first3=Sylvain |last3=Leduc |date=September 2011 |title=Demand Imbalances, Exchange Rate Misalignments and Monetary Policy }}{{self-published source|date=February 2019}}</ref>{{self-published inline|date=February 2019}}

      Corsetti, Dedola and Leduc (2011)<ref name="corsettidedolaleduc"/> summarize the status quo of research on international monetary policy prescriptions: "Optimal monetary policy thus should target a combination of inward-looking variables such as output gap and inflation, with currency misalignment and cross-country demand misallocation, by leaning against the wind of misaligned exchange rates and international imbalances." This is main factor in country money status.

      ===In developing countries===
      Developing countries may have problems establishing an effective operating monetary policy. The primary difficulty is that few developing countries have deep markets in government debt. The matter is further complicated by the difficulties in forecasting money demand and fiscal pressure to levy the inflation tax by expanding the base rapidly. In general, the central banks in many developing countries have poor records in managing monetary policy. This is often because the monetary authorities in developing countries are mostly not independent of the government, so good monetary policy takes a backseat to the political desires of the government or is used to pursue other non-monetary goals. For this and other reasons, developing countries that want to establish credible monetary policy may institute a currency board or adopt [[dollarization]]. This can avoid interference from the government and may lead to the adoption of monetary policy as carried out in the anchor nation. Recent attempts at liberalizing and reform of financial markets (particularly the recapitalization of banks and other financial institutions in Nigeria and elsewhere) are gradually providing the latitude required to implement monetary policy frameworks by the relevant central banks.

      ==Trends==

      ===Transparency===
      Beginning with New Zealand in 1990, central banks began adopting formal, public [[inflation targeting|inflation targets]] with the goal of making the outcomes, if not the process, of monetary policy more transparent. In other words, a central bank may have an inflation target of 2% for a given year, and if inflation turns out to be 5%, then the central bank will typically have to submit an explanation. The [[Bank of England]] exemplifies both these trends. It became independent of government through the [[Bank of England Act 1998]] and adopted an inflation target of 2.5% RPI, revised to 2% of CPI in 2003.<ref>{{cite web|title=Monetary Policy Framework|url=http://www.bankofengland.co.uk/monetarypolicy/pages/framework/framework.aspx|publisher=Bank of England|access-date=19 January 2016}}</ref> The success of inflation targeting in the United Kingdom has been attributed to the Bank of England's focus on transparency.<ref name=IMF01>{{cite web|title=Targeting Inflation: The United Kingdom in Retrospect|url=https://www.imf.org/external/pubs/ft/seminar/2000/targets/strach7.pdf|publisher=IMF|access-date=31 October 2016}}</ref> The Bank of England has been a leader in producing innovative ways of communicating information to the public, especially through its Inflation Report, which have been emulated by many other central banks.<ref name=NBER01>{{cite web|title=Inflation Targeting Has Been A Successful Monetary Policy Strategy|url=https://www.nber.org/digest/apr98/w6126.html|publisher=[[National Bureau of Economic Research]]|access-date=31 October 2016}}</ref>

      The [[European Central Bank]] adopted, in 1998, a definition of [[price stability]] within the [[Eurozone]] as inflation of under 2% [[Harmonised Index of Consumer Prices|HICP]]. In 2003, this was revised to inflation below, but close to, 2% over the medium term. Since then, the target of 2% has become common for other major central banks, including the [[Federal Reserve]] (since January 2012) and [[Bank of Japan]] (since January 2013).<ref>{{cite web|last1=Noyer|first1=Christian|title=Thoughts on the zero lower bound in relation with monetary and financial stability|url=https://www.bis.org/review/r160115c.htm?ql=1|publisher=Bank for International Settlements|access-date=18 January 2016|date=12 January 2016}}</ref>

      === Green monetary policy ===
      Since 2017-2018, a growing number of central banks have started to consider the effects of climate change on their operational frameworks for monetary policy and supervisory policies.<ref>{{Citation |title=Managing Climate Change Like a Central Banker: The Political Economy of Greening the Monetary Technocracy |author=Quorning, S. |year=2023 |url=https://hdl.handle.net/10398/711a402b-9dca-444b-8ebc-f91a56725cd9 |access-date=5 June 2024 |publisher=Copenhagen Business School|doi=10.22439/phd.11.2023 |hdl=10398/711a402b-9dca-444b-8ebc-f91a56725cd9 |isbn=978-87-7568-166-2 }}</ref><ref>{{cite journal |author=Siderius, K. |date=3 August 2023 |title=An unexpected climate activist: central banks and the politics of the climate-neutral economy |journal=Journal of European Public Policy |publisher=Routledge |volume=30 |issue=8 |pages=1588–1608 |doi=10.1080/13501763.2022.2093948 |issn=1350-1763 |url=https://figshare.com/articles/dataset/An_unexpected_climate_activist_central_banks_and_the_politics_of_the_climate-neutral_economy/20286830 }}</ref><ref>{{cite journal |author=Massoc, E. C. |date=2024 |title=Two degrees versus two percent How central bankers and members of the European Parliament developed a common pro-climate narrative |journal=Journal of European Public Policy |issue=3 |publisher=Routledge |volume=32 |pages=634–664 |doi=10.1080/13501763.2024.2318473 |issn=1350-1763|doi-access=free }}</ref> In the continuation to a famous speech by former Bank of England governor [[Mark Carney]] in September 2015,<ref>{{Citation |title=Breaking the tragedy of the horizon - climate change and financial stability |author=Carney, M. |year=2015 |url=https://www.bankofengland.co.uk/speech/2015/breaking-the-tragedy-of-the-horizon-climate-change-and-financial-stability |access-date=29 January 2025}}</ref> central bank have justified this work by the fact that climate change will likely generate more volatility in certain markets, some inflationary pressure either due to climate shocks and extreme weather events<ref>{{cite journal |author=Kotz, M. |author2=Kuik, F. |author3=Lis, E. |author4=Nickel, C. |date=21 March 2024 |title=Global warming and heat extremes to enhance inflationary pressures |journal=Communications Earth & Environment |publisher=Nature Publishing Group |volume=5 |issue=1 |article-number=116 |doi=10.1038/s43247-023-01173-x |bibcode=2024ComEE...5..116K |issn=2662-4435|doi-access=free }}</ref> and linked with an overly slow and disordered transition, and generate climate-related financial risks on the financial sector.<ref>{{Citation |title=Monetary policy and climate change |author=Coeuré, B. |year=2018 |url=https://www.ecb.europa.eu/press/key/date/2018/html/ecb.sp181108.en.html |access-date=5 June 2024}}</ref><ref>{{Citation |title=Acute physical impacts from climate change and monetary policy |vauthors=NGFS |year=2024 |url=https://www.ngfs.net/sites/default/files/medias/documents/ngfs_acute_physical_impacts_from_climate_change_and_monetary_policy.pdf |access-date=29 November 2024 |publisher=Network For Greening the Financial System}}</ref><ref>{{Cite journal |last=Matos Rosa |first=Susana |date=2025-01-30 |title=Green Monetary Policy Measures and Central Bank Mandates: A Comparative Political Economy Analysis |url=https://www.cogitatiopress.com/politicsandgovernance/article/view/8919 |journal=Politics and Governance |volume=13 |article-number=8919 |doi=10.17645/pag.8919 |doi-access=free |issn=2183-2463}}</ref> As a result, even though central banks are not climate policy makers, from the perspective of their financial stability mandate, they may have to adjust their policies in order to anticipate and mitigate these risks.

      This work was spearheaded by the foundation of the [[Network for Greening the Financial System]] (NGFS) in 2017 by the Bank of England, Banque de France and the Dutch central bank.<ref>{{Cite news |last1=Carney |first1=Mark |last2=Galhau |first2=François Villeroy de |last3=Elderson |first3=Frank |date=2019-04-17 |title=The financial sector must be at the heart of tackling climate change |url=https://www.theguardian.com/commentisfree/2019/apr/17/the-financial-sector-must-be-at-the-heart-of-tackling-climate-change |access-date=2025-01-29 |work=The Guardian |language=en-GB |issn=0261-3077}}</ref> The NGFS is composed of more than a hundred central banks and financial supervisors.

      Proposals for climate-related ajustements to central bank policies range from green macro-prudential rules,<ref>{{Citation |title=Climate-related systemic risks and macroprudential policy |author=Monnin, P. |author2=Hiebert, P. |year=2023 |url=https://www.lse.ac.uk/granthaminstitute/wp-content/uploads/2023/08/INSPIRE-Sustainable-Central-Banking-Toolbox-Paper-14.pdf |access-date=29 January 2025 |publisher=INSPIRE}}</ref> green quantitative easing, green collateral frameworks rules and green refinancing operations.<ref>{{Citation |title=Targeting a sustainable recovery with Green TLTROs |author=Van't Klooster, J. |author2=Van Tilburg, R. |year=2020 |url=https://www.positivemoney.eu/wp-content/uploads/2020/09/Green-TLTROs.pdf |access-date=10 April 2024 |publisher=Positive Money Europe}}</ref> In 2021, the [[European Central Bank]] has announced that it will "tilt" its corporate bond purchases (effectively implementing a form of Green QE) and look at ways to incorporate climate factors in its collateral framework. In July 2025, the ECB announced the inclusion of similar measures in its collateral framework.<ref>{{Cite web |last=Costa |first=Moriah |date=2025-07-31 |title=ECB adds climate to its collateral framework |url=https://greencentralbanking.com/2025/07/31/ecb-adds-climate-to-its-collateral-framework/ |access-date=2025-08-22 |website=Green Central Banking |language=en-GB}}</ref> The ECB has however refrained so far from implementing a "green interest rate".<ref>{{Citation |title=A green interest rate for the Eurozone: evaluating the design choices |author=Jourdan, S. |author2=Van Tilburg, R. |author3=Kramer, B. |author4=Simić, A. |author5=Bronstering, G. |year=2024 |url=https://sustainablefinancelab.nl/wp-content/uploads/sites/334/2024/09/A-green-interest-rate-for-Europe.pdf |publisher=Sustainable Finance Lab}}</ref>

      ===Effect on business cycles===
      There continues to be some debate about whether monetary policy can (or should) smooth [[business cycles]]. A central conjecture of [[Keynesian economics]] is that the central bank can stimulate [[aggregate demand]] in the short run, because a significant number of prices in the economy are fixed in the short run and firms will produce as many goods and services as are demanded (in the long run, however, money is neutral, as in the [[Neoclassical economics|neoclassical model]]). However, some economists from the [[new classical macroeconomics|new classical school]] contend that central banks cannot affect business cycles.<ref>{{cite journal |last=Seidman |first=Laurence |title=Reply to: "The New Classical Counter-Revolution: False Path or Illuminating Complement?" |journal=Eastern Economic Journal |volume=33 |issue=4 |pages=563–565 |jstor=20642378 |date=Fall 2007 |doi=10.1057/eej.2007.41 |s2cid=153260374 |url=http://web.holycross.edu/RePEc/eej/Archive/Volume33/V33N4P563_565.pdf |access-date=2019-07-10 |archive-date=2019-12-12 |archive-url=https://web.archive.org/web/20191212140137/http://web.holycross.edu/RePEc/eej/Archive/Volume33/V33N4P563_565.pdf }}</ref>

      ===Behavioral monetary policy===
      Conventional macroeconomic models assume that all agents in an economy are fully rational. A [[rational agent]] has clear preferences, models uncertainty via expected values of variables or functions of variables, and always chooses to perform the action with the optimal expected outcome for itself among all feasible actions – they maximize their [[utility]]. Monetary policy analysis and decisions hence traditionally rely on this [[New Classical]] approach.<ref name="Cuthbertson">{{cite journal |doi=10.1111/j.1467-6419.2007.00525.x |title=Monetary Policy and Behavioural Finance |journal=Journal of Economic Surveys |volume=21 |issue=5 |pages=935–969 |year=2007 |last1=Cuthbertson |first1=K. |last2=Nitzsche |first2=D. |last3=Hyde |first3=S. |s2cid=153470667 |doi-access=free }}</ref><ref name="Favaretto & Masciandaro, 2016">{{cite journal |doi=10.1016/j.jfs.2016.09.002 |title=Doves, hawks and pigeons: Behavioral monetary policy and interest rate inertia |journal=Journal of Financial Stability |volume=27 |pages=50–58 |year=2016 |last1=Favaretto |first1=Federico |last2=Masciandaro |first2=Donato }}</ref><ref name="Hommes">{{cite journal |doi=10.2139/ssrn.2636234 |title=Monetary Policy Under Behavioral Expectations: Theory and Experiment |year=2015 |last1=Hommes |first1=Cars H. |last2=Massaro |first2=Domenico |last3=Weber |first3=Matthias |journal=European Economic Review |volume=118 |issue=N/A |pages=193–212 |url=https://papers.tinbergen.nl/15087.pdf |hdl=2434/820837 |s2cid=34104819 |hdl-access=free }}</ref>

      However, as studied by the field of [[behavioral economics]] that takes into account the concept of [[bounded rationality]], people often deviate from the way that these neoclassical theories assume.<ref name="Yellen, 2007">{{cite book |citeseerx=10.1.1.367.103 |year=2007 |chapter=Implications of Behavioral Economics for Monetary Policy |first1=Janet L. |last1=Yellen |title=Behavioral Economics and Economic Policy in the Past and Future |pages=379–93 }}</ref> Humans are generally not able to react in a completely rational manner to the world around them<ref name="Hommes"/> – they do not make decisions in the rational way commonly envisioned in standard macroeconomic models. People have time limitations, [[cognitive biases]], care about issues like fairness and equity and follow rules of thumb ([[heuristics]]).<ref name="Yellen, 2007"/>

      This has implications for the conduct of monetary policy. Monetary policy is the outcome of a complex interaction between monetary institutions, central banker preferences and policy rules, and hence human decision-making plays an important role.<ref name="Favaretto & Masciandaro, 2016"/> It is more and more recognized that the standard rational approach does not provide an optimal foundation for monetary policy actions. These models fail to address important human anomalies and behavioral drivers that explain monetary policy decisions.<ref name="Calabria, 2016">{{cite journal |last1=Calabria |first1=Mark A. |year=2016 |title=Behavioral Economics and Fed Policymaking |journal=Cato Journal |volume=36 |issue=3 |pages=573–87 }}</ref><ref name="Favaretto & Masciandaro, 2016"/><ref name="Hommes"/>

      An example of a behavioral bias that characterizes the behavior of central bankers is [[loss aversion]]: for every monetary policy choice, losses loom larger than gains, and both are evaluated with respect to the status quo.<ref name="Favaretto & Masciandaro, 2016"/> One result of loss aversion is that when gains and losses are symmetric or nearly so, risk aversion may set in. Loss aversion can be found in multiple contexts in monetary policy. The "hard fought" battle against the Great Inflation, for instance, might cause a bias against policies that risk greater inflation.<ref name="Calabria, 2016"/>
      Another common finding in behavioral studies is that individuals regularly offer estimates of their own ability, competence, or judgments that far exceed an objective assessment: they are overconfident. Central bank policymakers may fall victim to [[overconfidence]] in managing the macroeconomy in terms of timing, magnitude, and even the qualitative impact of interventions. Overconfidence can result in actions of the central bank that are either "too little" or "too much". When policymakers believe their actions will have larger effects than objective analysis would indicate, this results in too little intervention. Overconfidence can, for instance, cause problems when relying on interest rates to gauge the stance of monetary policy: low rates might mean that policy is easy, but they could also signal a weak economy.<ref name="Calabria, 2016"/>

      These are examples of how behavioral phenomena may have a substantial influence on monetary policy. Monetary policy analyses should thus account for the fact that policymakers (or central bankers) are individuals and prone to biases and temptations that can sensibly influence their ultimate choices in the setting of macroeconomic and/or interest rate targets.<ref name="Favaretto & Masciandaro, 2016"/>

