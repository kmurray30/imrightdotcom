      * {{flag|South Korea}} – The Foreign Ministry for South Korea described Trump's move as 'regrettable'.<ref>{{Cite web|url=https://www.reuters.com/article/us-usa-climatechange-trump-idUSKBN18R1J4|title=Trump dismays, angers allies by abandoning global climate pact|date=June 2, 2017|work=Reuters|access-date=July 2, 2017|archive-url=https://web.archive.org/web/20170701235922/http://www.reuters.com/article/us-usa-climatechange-trump-idUSKBN18R1J4|archive-date=July 1, 2017|url-status=live}}</ref>
