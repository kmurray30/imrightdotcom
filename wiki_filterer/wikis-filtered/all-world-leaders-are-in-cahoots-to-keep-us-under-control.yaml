      == Personal life ==
      Schwab married Hilde Schwab, his former assistant, in 1971.<ref>{{Cite news |last=Whitney |first=Craig |date=28 January 1997 |title=Political and Corporate Elite Soak Up Big Ideas at Davos |work=[[The New York Times]]}}</ref> The wedding took place in [[Sertig|Sertig Valley]] at a Reformed church.<ref>{{Cite web|url=https://issuu.com/schweizer-illustrierte.ch/docs/si_2010_5|title=SI_2010_05 by Schweizer Illustrierte – Issuu|date=9 February 2010 |access-date=15 April 2022|archive-date=15 April 2022|archive-url=https://web.archive.org/web/20220415003419/https://issuu.com/schweizer-illustrierte.ch/docs/si_2010_5|url-status=live}}</ref> The couple lives in [[Cologny]], Switzerland.<ref>{{Cite magazine |last=Edwards |first=Haley |date=4 February 2019 |title=The Optimist's Playbook |volume=193 |pages=62–65 |magazine=[[Time (magazine)|Time]]}}</ref> The Schwabs have two adult children. His daughter, [[Nicole Schwab]], co-founded the Gender Equality Project.<ref name="bilan">{{cite news |last1=Bernaudon |first1=Sylvie |title=Les 20 femmes qui font la Suisse |url=https://www.bilan.ch/economie/les_20_femmes_qui_font_la_suisse |access-date=28 November 2021 |agency=Bilan – B Economie |publisher=Tamedia Publications |date=31 May 2012 |archive-date=29 November 2021 |archive-url=https://web.archive.org/web/20211129141518/https://www.bilan.ch/economie/les_20_femmes_qui_font_la_suisse |url-status=live }}</ref> His son, Olivier Schwab, was a former head of technology at the WEF.<ref>{{Cite web |last=Zurich |first=Stephen Foley in New York and Mercedes Ruehl in |date=2025-05-15 |title=Downfall in Davos: Klaus Schwab fights for legacy after WEF whistleblower claims |url=https://www.swissinfo.ch/eng/international-geneva/downfall-in-davos-klaus-schwab-fights-for-legacy-after-wef-whistleblower-claims/89325206 |access-date=2025-12-08 |website=SWI swissinfo.ch |language=en}}</ref>

