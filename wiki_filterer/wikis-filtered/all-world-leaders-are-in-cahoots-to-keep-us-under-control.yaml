      === Access during the pandemic===
      {{Further|Deployment of COVID-19 vaccines#Equitable access|TRIPS Agreement waiver|COVAX}}

      Countries have extremely unequal access to the COVID{{nbhyph}}19 vaccine. [[Vaccine equity]] has not been achieved or even approximated. The inequity has harmed both countries with poor access and countries with good access.<ref name="Hotez"/><ref name="Ye">{{cite journal |vauthors=Ye Y, Zhang Q, Wei X, Cao Z, Yuan HY, Zeng DD |title=Equitable access to COVID-19 vaccines makes a life-saving difference to all countries |journal=Nature Human Behaviour |volume=6 |issue=2 |pages=207–216 |date=February 2022 |pmid=35102361 |doi=10.1038/s41562-022-01289-8 |pmc=8873023 |title-link=doi |doi-access=free}}</ref><ref name=lanceted/>

      Nations pledged to buy doses of the COVID{{nbhyph}}19 vaccines before the doses were available. Though high-income nations represent only 14% of the global population, as of 15 November 2020, they had contracted to buy 51% of all pre-sold doses. Some high-income nations bought more doses than would be necessary to vaccinate their entire populations.<ref name="So" />
      [[File:Fábrica do DF produz vacina Sputnik V (50874839072).jpg|thumb|Production of the Sputnik V vaccine in Brazil, January 2021]]
      In January 2021, WHO Director-General [[Tedros Adhanom Ghebreyesus]] warned of problems with equitable distribution: "More than 39 million doses of vaccine have now been administered in at least 49 higher-income countries. Just 25 doses have been given in one lowest-income country. Not 25 million; not 25 thousand; just 25."<ref>{{cite web|vauthors=Adhanom Ghebreyesus T|date=18 January 2021|title=WHO Director-General's opening remarks at 148th session of the Executive Board|url=https://www.who.int/director-general/speeches/detail/who-director-general-s-opening-remarks-at-148th-session-of-the-executive-board|access-date=25 January 2021|work=[[World Health Organization]] (WHO)|archive-date=12 November 2021|archive-url=https://web.archive.org/web/20211112045815/https://www.who.int/director-general/speeches/detail/who-director-general-s-opening-remarks-at-148th-session-of-the-executive-board|url-status=live}}</ref>

      [[File:Inside view of the vaccination centre 2.jpg|thumb|left |Inside of a vaccination center in [[Brussels]], Belgium, February 2021]]
      In March 2021, it was revealed that the US attempted to convince Brazil not to purchase the [[Sputnik V COVID‑19 vaccine|Sputnik V]] COVID{{nbhyph}}19 vaccine, fearing "Russian influence" in Latin America.<ref>{{cite web|date=15 March 2021|title=U.S. pressured Brazil to ditch Russia's Sputnik V vaccine|url=https://brazilian.report/coronavirus-brazil-live-blog/2021/03/15/us-pressured-brazil-ditch-russias-sputnik-v-vaccine/|access-date=21 March 2021|website=The Brazilian Report|archive-date=15 March 2021|archive-url=https://web.archive.org/web/20210315132124/https://brazilian.report/coronavirus-brazil-live-blog/2021/03/15/us-pressured-brazil-ditch-russias-sputnik-v-vaccine/|url-status=live}}</ref> Some nations involved in long-standing territorial disputes have reportedly had their access to vaccines blocked by competing nations; [[Palestine]] has accused Israel of blocking vaccine delivery to [[Gaza Strip|Gaza]], while [[Taiwan]] has suggested that China has hampered its efforts to procure vaccine doses.<ref>{{cite news |date=16 February 2021 |title=Israel blocked Covid vaccines from entering Gaza, say Palestinians |work=[[The Guardian]] |url=https://www.theguardian.com/world/2021/feb/16/israel-blocked-covid-vaccines-from-entering-gaza-say-palestinians |access-date=17 February 2021 |vauthors=Holmes O |archive-date=16 February 2021 |archive-url=https://web.archive.org/web/20210216135520/https://www.theguardian.com/world/2021/feb/16/israel-blocked-covid-vaccines-from-entering-gaza-say-palestinians |url-status=live }}</ref><ref>{{cite news |date=4 February 2021 |title=Israel's Vaccine Success Unleashes a Debate on Palestinian Inequities |work=[[The New York Times]] |url=https://www.nytimes.com/2021/02/04/world/middleeast/israel-palestinians-vaccine.html |archive-url=https://ghostarchive.org/archive/20211228/https://www.nytimes.com/2021/02/04/world/middleeast/israel-palestinians-vaccine.html |archive-date=28 December 2021 |url-access=limited |access-date=17 February 2021 |vauthors=Rasgon A| url-status=live }}</ref><ref>{{cite news |vauthors=Horton C |date=17 February 2021 |title=Taiwan Concerned China May Have Blocked Vaccine Purchase |work=Bloomberg |url=https://www.bloomberg.com/news/articles/2021-02-17/taiwan-concerned-china-may-have-blocked-vaccine-purchase |access-date=17 February 2021 |archive-date=17 February 2021 |archive-url=https://web.archive.org/web/20210217092645/https://www.bloomberg.com/news/articles/2021-02-17/taiwan-concerned-china-may-have-blocked-vaccine-purchase |url-status=live }}</ref>

      A single dose of the COVID{{nbhyph}}19 vaccines by [[AstraZeneca]] would cost 47 [[Egyptian pound]]s (EGP), and the authorities are selling them for between 100 and 200 EGP. A report by the Carnegie Endowment for International Peace cited the poverty rate in Egypt as around 29.7 percent, which constitutes approximately 30.5 million people, and claimed that about 15 million Egyptians would be unable to gain access to the luxury of vaccination. A human rights lawyer, Khaled Ali, launched a lawsuit against the government, forcing them to provide vaccinations free of charge to all members of the public.<ref>{{cite web|url=https://carnegieendowment.org/sada/2021/03/playing-politics-with-poverty-sisis-covid-19-vaccine-strategy?lang=en|title=Playing Politics with Poverty: Sisi's COVID-19 Vaccine Strategy|access-date=25 February 2021|website=Carnegie Endowment for International Peace|archive-date=28 February 2021|archive-url=https://web.archive.org/web/20210228160344/https://carnegieendowment.org/sada/83933|url-status=live}}</ref>

      [[File:Covid vaccination for children aged 12-14 in India 03cropped.jpg|thumb|COVID{{nbhyph}}19 vaccination for children aged 12–14 in [[Bhopal]], India]]
      According to [[Immunology|immunologist]] [[Anthony Fauci]], mutant strains of the virus and limited vaccine distribution pose continuing risks, and he said, "we have to get the entire world vaccinated, not just our own country."<ref>{{cite web|vauthors=Strazewski L|date=9 February 2021|title=Dr. Fauci: Variants reveal COVID-19 vaccination as global job|url=https://www.ama-assn.org/delivering-care/public-health/dr-fauci-variants-reveal-covid-19-vaccination-global-job|access-date=4 March 2021|website=American Medical Association|archive-date=10 October 2021|archive-url=https://web.archive.org/web/20211010115053/https://www.ama-assn.org/delivering-care/public-health/dr-fauci-variants-reveal-covid-19-vaccination-global-job|url-status=live}}</ref> Edward Bergmark and [[Arick Wierson]] are calling for a global vaccination effort and wrote that the wealthier nations' "me-first" mentality could ultimately backfire because the spread of the virus in poorer countries would lead to more variants, against which the vaccines could be less effective.<ref>{{cite web|vauthors=Bergmark E, Wierson A|date=26 February 2021|title=Opinion: Without a global vaccine plan, coronavirus variants could lead to untold number of deaths|url=https://www.cnn.com/2021/02/26/perspectives/covid-variants-global-vaccination/index.html|access-date=4 March 2021|website=CNN |archive-date=19 October 2021|archive-url=https://web.archive.org/web/20211019124133/https://www.cnn.com/2021/02/26/perspectives/covid-variants-global-vaccination/index.html|url-status=live}}</ref>

      In March 2021, the United States, Britain, European Union member states, and some other members of the [[World Trade Organization]] (WTO) blocked a push by more than eighty developing countries to [[TRIPS Agreement waiver|waive COVID{{nbhyph}}19 vaccine patent rights]] in an effort to boost production of vaccines for poor nations.<ref>{{cite web |date=10 March 2021 |title=Rich, developing nations wrangle over COVID vaccine patents |url=https://www.reuters.com/article/us-health-coronavirus-wto-idUSKBN2B21V9 |access-date=19 June 2021| vauthors=Blenkinsop P, Maclean W, Ellis A |archive-url=https://web.archive.org/web/20210311110904/https://www.reuters.com/article/us-health-coronavirus-wto-idUSKBN2B21V9|archive-date=11 March 2021|url-status=live|website=Reuters }}</ref> On 5 May 2021, the [[Presidency of Joe Biden|US government under President Joe Biden]] announced that it supports waiving intellectual property protections for COVID{{nbhyph}}19 vaccines.<ref>{{cite web|vauthors=Macias AM, Breuninger K, Franck|date=5 May 2021|title=U.S. backs waiving patent protections for Covid vaccines, citing global health crisis|website=CNBC |url=https://www.cnbc.com/2021/05/05/us-backs-covid-vaccine-intellectual-property-waivers-to-expand-access-to-shots-worldwide.html|access-date=5 May 2021|url-status=live|archive-date=5 May 2021|archive-url=https://web.archive.org/web/20210505192749/https://www.cnbc.com/2021/05/05/us-backs-covid-vaccine-intellectual-property-waivers-to-expand-access-to-shots-worldwide.html}}</ref> The Members of the European Parliament have backed a motion demanding the temporary lifting of intellectual property rights for COVID{{nbhyph}}19 vaccines.<ref>{{cite web|vauthors=Sánchez Nicolás E|date=11 June 2021|title=Pressure builds on EU to back WTO vaccine-patent waiver |website=EUobserver |url=https://euobserver.com/coronavirus/152109|access-date=14 June 2021 |archive-date=19 October 2021|archive-url=https://web.archive.org/web/20211019023651/https://euobserver.com/coronavirus/152109|url-status=live}}</ref>

      [[File:Brasileiro tomando vacina contra o COVID-19.jpg|thumb|An elderly man receiving a second dose of the [[CoronaVac]] vaccine in Brazil in April 2021]]
      In a meeting in April 2021, the World Health Organization's emergency committee addressed concerns of persistent inequity in global vaccine distribution.<ref>{{cite web|date=20 April 2021|title=WHO says against proof of Covid-19 vaccination for international travel|url=https://www.scmp.com/news/world/europe/article/3130249/who-says-against-proof-covid-19-vaccination-international-travel|access-date=17 May 2021|website=South China Morning Post|archive-date=3 May 2021|archive-url=https://web.archive.org/web/20210503215233/https://www.scmp.com/news/world/europe/article/3130249/who-says-against-proof-covid-19-vaccination-international-travel|url-status=live}}</ref> Although 9 percent of the world's population lives in the 29 poorest countries, these countries had received only 0.3% of all vaccines administered as of May 2021.<ref>{{cite news |vauthors=Goodman PS, Mandavilli A, Robbins R, Stevis-Gridneff M |date=15 May 2021 |title=What Would It Take to Vaccinate the World Against Covid? |work=The New York Times |issn=0362-4331 |url=https://www.nytimes.com/2021/05/15/world/americas/covid-vaccine-patent-biden.html |archive-url=https://web.archive.org/web/20210515193214/https://www.nytimes.com/2021/05/15/world/americas/covid-vaccine-patent-biden.html |archive-date=15 May 2021 |url-access=subscription |url-status=live |access-date=17 May 2021}}</ref> In March 2021, Brazilian journalism agency [[Agência Pública]] reported that the country vaccinated about twice as many people who declare themselves white than black and noted that mortality from COVID{{nbhyph}}19 is higher in the black population.<ref>{{cite web |vauthors=Muniz B, Fonseca B, Fernandes L, Pina R |url=https://apublica.org/2021/03/brasil-registra-duas-vezes-mais-pessoas-brancas-vacinadas-que-negras/ |date=15 March 2021 |title=Brasil registra duas vezes mais pessoas brancas vacinadas que negras|trans-title=Brazil registers twice as many white people vaccinated as black people |access-date=28 May 2021 |archive-url=https://web.archive.org/web/20210315234311/https://apublica.org/2021/03/brasil-registra-duas-vezes-mais-pessoas-brancas-vacinadas-que-negras/|archive-date=15 March 2021|url-status=live|work=[[Agência Pública]]|language=pt-br}}</ref>

      In May 2021, [[UNICEF]] made an urgent appeal to industrialized nations to pool their excess COVID{{nbhyph}}19 vaccine capacity to make up for a 125-million-dose gap in the [[COVAX]] program. The program mostly relied on the [[Oxford–AstraZeneca COVID‑19 vaccine]] produced by the [[Serum Institute of India]], which faced serious supply problems due to increased domestic vaccine needs in India from March to June 2021. Only a limited amount of vaccines can be distributed efficiently, and the shortfall of vaccines in South America and parts of Asia is due to a lack of expedient donations by richer nations. International aid organizations have pointed at Nepal, Sri Lanka, and the Maldives, as well as Argentina, Brazil, and some parts of the Caribbean, as problem areas where vaccines are in short supply. In mid-May 2021, UNICEF was also critical of the fact that most proposed donations of Moderna and Pfizer vaccines were not slated for delivery until the second half of 2021 or early in 2022.<ref>{{cite web |url=https://www.cidrap.umn.edu/news-perspective/2021/05/un-agencies-make-urgent-appeal-covax-vaccine-doses |title=UN agencies make urgent appeal for COVAX vaccine doses |date=17 May 2021 |vauthors=Schnirring L |work=[[Center for Infectious Disease Research and Policy|CIDRAP]] |access-date=15 June 2021 |archive-date=31 October 2021 |archive-url=https://web.archive.org/web/20211031100236/https://www.cidrap.umn.edu/news-perspective/2021/05/un-agencies-make-urgent-appeal-covax-vaccine-doses |url-status=live }}</ref>

      [[File:COVID-19 mass vaccination in Ratina, Tampere, Finland.jpg|thumb|left|COVID{{nbhyph}}19 mass vaccination queue in Finland, June 2021]]
      In July 2021, the heads of the World Bank Group, the International Monetary Fund, the World Health Organization, and the World Trade Organization said in a joint statement: "As many countries are struggling with new variants and a third wave of COVID{{nbhyph}}19 infections, accelerating access to vaccines becomes even more critical to ending the pandemic everywhere and achieving broad-based growth. We are deeply concerned about the limited vaccines, therapeutics, diagnostics, and support for deliveries available to developing countries."<ref>{{cite web|date=30 June 2021|title=First Meeting of the Task Force on COVID-19 Vaccines, Therapeutics and Diagnostics for Developing Countries|url=https://www.who.int/news/item/30-06-2021-first-meeting-of-the-task-force-on-covid-19-vaccines-therapeutics-and-diagnostics-for-developing-countries|access-date=5 July 2021|website=[[World Health Organization]] (WHO)|archive-date=19 October 2021|archive-url=https://web.archive.org/web/20211019012233/https://www.who.int/news/item/30-06-2021-first-meeting-of-the-task-force-on-covid-19-vaccines-therapeutics-and-diagnostics-for-developing-countries|url-status=live}}</ref><ref>{{cite web|vauthors=Tapper J, McKie R|date=3 July 2021|title=Vaccines 'outpaced by variants', WHO warns, as Delta now in 98 countries |url=http://www.theguardian.com/society/2021/jul/03/vaccines-outpaced-by-variants-who-warns-as-delta-now-in-98-countries |access-date=5 July 2021|website=[[The Guardian]] |archive-date=21 October 2021|archive-url=https://web.archive.org/web/20211021000507/https://www.theguardian.com/society/2021/jul/03/vaccines-outpaced-by-variants-who-warns-as-delta-now-in-98-countries|url-status=live}}</ref> In July 2021, ''[[The BMJ]]'' reported that countries had thrown out over 250,000 vaccine doses as supply exceeded demand and strict laws prevented the sharing of vaccines.<ref>{{cite journal |vauthors=Mahase E |title=Covid-19: Countries dump vaccines as demand slumps and sharing proves difficult |journal=BMJ |volume=374 |article-number=n1893 |date=July 2021 |pmid=34315725 |doi=10.1136/bmj.n1893 |s2cid=236457553 |title-link=doi |doi-access=free }}</ref> A survey by ''[[The New York Times]]'' found that over a million doses of vaccine had been thrown away in ten U.S. states because federal regulations prohibit recalling them, preventing their redistribution abroad.<ref>{{cite news | vauthors = Levin D |date=1 August 2021 |title=The U.S. is wasting vaccine doses, even as cases rise and other countries suffer shortages. |work=[[The New York Times]] |url=https://www.nytimes.com/2021/08/01/us/covid-us-vaccine-wasted.html |url-status=live |access-date=10 August 2021 |archive-url=https://web.archive.org/web/20210809193617/https://www.nytimes.com/2021/08/01/us/covid-us-vaccine-wasted.html |archive-date=9 August 2021}}</ref> Furthermore, doses donated close to expiration often cannot be administered quickly enough by recipient countries and end up having to be discarded.<ref>{{cite news |date=8 June 2021 |title=Covid-19 vaccines: Why some African states can't use their vaccines |work=BBC News |url=https://www.bbc.com/news/56940657 |access-date=20 August 2021 |archive-date=14 November 2021 |archive-url=https://web.archive.org/web/20211114043558/https://www.bbc.com/news/56940657 |url-status=live }}</ref> To help overcome this problem, the Prime Minister of India, [[Narendra Modi]], announced that they would make their digital vaccination management platform, [[CoWIN]], open to the global community. He also announced that India would also release the source code for the contact tracing app [[Aarogya Setu]] for developers around the world. Around 142 countries, including Afghanistan, Bangladesh, Bhutan, the Maldives, Guyana, Antigua and Barbuda, St. Kitts and Nevis, and Zambia, expressed their interest in the application for COVID management.<ref>{{cite news |vauthors=Das S |date=5 July 2021 |title=CoWIN goes global: India makes tech open source, 142 nations show interest |work=Business Standard India |url=https://www.business-standard.com/article/current-affairs/cowin-goes-global-india-makes-tech-open-source-142-nations-show-interest-121070501046_1.html |access-date=25 March 2022 |archive-date=25 March 2022 |archive-url=https://web.archive.org/web/20220325083051/https://www.business-standard.com/article/current-affairs/cowin-goes-global-india-makes-tech-open-source-142-nations-show-interest-121070501046_1.html |url-status=live }}</ref><ref>{{cite press release |title=Aarogya Setu is now open source |url=https://pib.gov.in/PressReleasePage.aspx?PRID=1626979 |date=26 May 2020 |access-date=18 July 2023 |website=pib.gov.in |archive-date=26 June 2020 |archive-url=https://web.archive.org/web/20200626123003/https://pib.gov.in/PressReleasePage.aspx?PRID=1626979 |url-status=live }}</ref>

      [[Amnesty International]] and [[Oxfam#Oxfam International|Oxfam International]] have criticized the support of vaccine monopolies by the governments of producing countries, noting that this is dramatically increasing the dose price by five times and often much more, creating an economic barrier to access for poor countries.<ref>{{cite press release |title=G7 support for pharma monopolies is putting millions of lives at risk |date=10 June 2021 |publisher=Amnesty International |url=https://www.amnesty.org/en/latest/press-release/2021/06/g7-support-for-pharma-monopolies-putting-millions-of-lives-at-risk/ |access-date=20 August 2021 |archive-date=19 October 2021 |archive-url=https://web.archive.org/web/20211019023637/https://www.amnesty.org/en/latest/press-release/2021/06/g7-support-for-pharma-monopolies-putting-millions-of-lives-at-risk/ |url-status=live }}</ref><ref>{{cite press release |title=Vaccine monopolies make cost of vaccinating the world against COVID at least 5 times more expensive than it could be |date=29 July 2021 |publisher=Oxfam International |url=https://www.oxfam.org/en/press-releases/vaccine-monopolies-make-cost-vaccinating-world-against-covid-least-5-times-more |access-date=20 August 2021 |archive-date=10 January 2022 |archive-url=https://web.archive.org/web/20220110095146/https://www.oxfam.org/en/press-releases/vaccine-monopolies-make-cost-vaccinating-world-against-covid-least-5-times-more |url-status=live }}</ref> [[Médecins Sans Frontières]] (Doctors without Borders) has also criticized vaccine monopolies and repeatedly called for their suspension, supporting the [[TRIPS Agreement waiver|TRIPS waiver]]. The waiver was first proposed in October 2020 and has support from most countries, but was delayed by opposition from the EU (especially Germany; major EU countries such as France, Italy, and Spain support the exemption),<ref>{{cite web| vauthors=Stiglitz J |date=15 December 2021|title=If Olaf Scholz is serious about progress, he must back a patent waiver for Covid vaccines |url=https://www.theguardian.com/commentisfree/2021/dec/15/olaf-scholz-patent-waiver-covid-vaccines-germany-eu|url-status=live |access-date=15 December 2021|website=[[The Guardian]]|archive-url=https://web.archive.org/web/20211215123521/https://www.theguardian.com/commentisfree/2021/dec/15/olaf-scholz-patent-waiver-covid-vaccines-germany-eu |archive-date=15 December 2021 }}</ref> the UK, Norway, and Switzerland, among others. MSF called for a Day of Action in September 2021 to put pressure on the [[WTO]] Minister's meeting in November, which was expected to discuss the TRIPS [[intellectual property|IP]] waiver.<ref name="TRIPS">{{cite web |title=Countries must not let another opportunity slip by to advance the global waiver on overcoming COVID-19 medical-tool monopolies |url=https://www.msfindia.in/countries-must-not-let-another-opportunity-slip-by-to-advance-the-global-waiver-on-overcoming-covid-19-medical-tool-monopolies/ |website=Médecins Sans Frontières (MSF)/Doctors Without Borders |access-date=23 September 2021 |date=13 September 2021 |archive-date=10 October 2021 |archive-url=https://web.archive.org/web/20211010113553/https://www.msfindia.in/countries-must-not-let-another-opportunity-slip-by-to-advance-the-global-waiver-on-overcoming-covid-19-medical-tool-monopolies/ |url-status=live }}</ref><ref name="no_patents">{{cite web |title=MSF calls for no patents or profiteering on COVID-19 drugs and vaccines / No profiteering on COVID-19 drugs and vaccines, says MSF |url=https://www.msf.org/no-profiteering-covid-19-drugs-and-vaccines-says-msf |website=Médecins Sans Frontières (MSF) International |access-date=23 September 2021 |archive-date=26 November 2021 |archive-url=https://web.archive.org/web/20211126191836/https://www.msf.org/no-profiteering-covid-19-drugs-and-vaccines-says-msf |url-status=live }}</ref><ref name="profiteering">{{cite web |title=Governments must act fast on consensus supporting historic move to suspend monopolies during pandemic / COVID-19: Governments must build consensus around waiver |url=https://www.msf.org/covid-19-governments-must-build-consensus-around-waiver |website=Médecins Sans Frontières (MSF) International |access-date=23 September 2021 |archive-date=23 October 2021 |archive-url=https://web.archive.org/web/20211023213012/https://www.msf.org/covid-19-governments-must-build-consensus-around-waiver |url-status=live }}</ref>

      [[File:Iran COVID19-Vaccination center.jpg|thumb|left|A drive-through COVID{{nbhyph}}19 vaccination center in Iran, August 2021]]
      In August 2021, to reduce unequal distribution between rich and poor countries, the WHO called for a [[Moratorium (law)|moratorium]] on [[booster dose]]s at least until the end of September. However, in August, the United States government announced plans to offer booster doses eight months after the initial course to the general population, starting with priority groups. Before the announcement, the WHO harshly criticized this type of decision, citing the lack of evidence for the need for boosters, except for patients with specific conditions. At this time, vaccine coverage of at least one dose was 58% in high-income countries and only 1.3% in low-income countries, and 1.14 million Americans had already received an unauthorized booster dose. US officials argued that waning efficacy against mild and moderate disease might indicate reduced protection against severe disease in the coming months. Israel, France, Germany, and the United Kingdom have also started planning boosters for specific groups.<ref>{{cite journal |date=August 2021 |title=The WHO is right to call a temporary halt to COVID vaccine boosters |journal=Nature |volume=596 |issue=7872 |page=317 |doi=10.1038/d41586-021-02219-w|pmid=34404945 |bibcode=2021Natur.596..317. |s2cid=237199262 | title-link = doi | doi-access = free }}</ref><ref>{{cite news |title=WHO slams wealthy nations' rush towards Covid booster shots while millions worldwide lack first jab |url=https://www.france24.com/en/europe/20210818-who-slams-wealthy-nations-rush-towards-covid-booster-shots-while-millions-worldwide-lack-first-jab |access-date=21 August 2021 |work=France 24 |agency=Agence France-Presse |date=18 August 2021 |archive-date=2 November 2021 |archive-url=https://web.archive.org/web/20211102043229/https://www.france24.com/en/europe/20210818-who-slams-wealthy-nations-rush-towards-covid-booster-shots-while-millions-worldwide-lack-first-jab |url-status=live }}</ref><ref>{{cite news |vauthors=Kramer J |title=The U.S. plans to authorize boosters—but many already got a third dose |url=https://www.nationalgeographic.com/science/article/the-us-is-expected-to-authorize-boostersbut-many-already-got-a-third-dose |access-date=21 August 2021 |work=National Geographic |date=18 August 2021 |archive-date=10 October 2021 |archive-url=https://web.archive.org/web/20211010113551/https://www.nationalgeographic.com/science/article/the-us-is-expected-to-authorize-boostersbut-many-already-got-a-third-dose}}</ref> In September 2021, more than 140 former world leaders and Nobel laureates, including former President of France [[François Hollande]], former Prime Minister of the United Kingdom [[Gordon Brown]], former Prime Minister of New Zealand [[Helen Clark]], and Professor [[Joseph Stiglitz]], called on the candidates to be the next German chancellor to declare themselves in favor of waiving intellectual property rules for COVID{{nbhyph}}19 vaccines and transferring vaccine technologies.<ref>{{cite press release|date=14 September 2021|title=More than 140 former heads of state and Nobel laureates call on candidates for German chancellor to waive intellectual property rules for COVID-19 vaccines|url=https://www.oxfam.org/en/press-releases/more-140-former-heads-state-and-nobel-laureates-call-candidates-german-chancellor|access-date=22 September 2021|website=Oxfam International|archive-date=19 October 2021|archive-url=https://web.archive.org/web/20211019012236/https://www.oxfam.org/en/press-releases/more-140-former-heads-state-and-nobel-laureates-call-candidates-german-chancellor|url-status=live}}</ref> In November 2021, nursing unions in 28 countries filed a formal appeal with the United Nations over the refusal of the UK, EU, Norway, Switzerland, and Singapore to temporarily waive patents for COVID{{nbhyph}}19 vaccines.<ref>{{cite web|vauthors=Walker P|date=29 November 2021|title=Nursing unions around world call for UN action on Covid vaccine patents|url=https://www.theguardian.com/world/2021/nov/29/nursing-unions-around-world-call-for-un-action-on-covid-vaccine-patents|access-date=29 November 2021|website=[[The Guardian]]|archive-date=29 November 2021|archive-url=https://web.archive.org/web/20211129233801/https://www.theguardian.com/world/2021/nov/29/nursing-unions-around-world-call-for-un-action-on-covid-vaccine-patents|url-status=live}}</ref>

      During his first international trip, the [[President of Peru]], [[Pedro Castillo]], spoke at the [[seventy-sixth session of the United Nations General Assembly]] on 21 September 2021, proposing the creation of an international [[treaty]] signed by world leaders and [[Pharmaceutical industry|pharmaceutical companies]] to guarantee universal vaccine access, arguing that "The battle against the pandemic has shown us the failure of the international community to cooperate under the principle of solidarity."<ref name="Psaledakis_2021">{{cite news|vauthors=Psaledakis D|date=22 September 2021|title=Developing nations' plea to world's wealthy at U.N.: stop vaccine hoarding|work=[[Reuters]]|url=https://www.reuters.com/world/developing-nations-plea-worlds-wealthy-un-stop-vaccine-hoarding-2021-09-22/|access-date=29 September 2021|archive-date=10 November 2021|archive-url=https://web.archive.org/web/20211110152208/https://www.reuters.com/world/developing-nations-plea-worlds-wealthy-un-stop-vaccine-hoarding-2021-09-22/|url-status=live}}</ref><ref>{{cite web|author=Empresa Peruana de Servicios Editoriales S. A. EDITORA PERÚ|title=Peru: President suggests global agreement at UN ensuring universal access to vaccines|url=https://andina.pe/ingles/noticia-peru-president-suggests-global-agreement-at-un-ensuring-universal-access-to-vaccines-862568.aspx|access-date=29 September 2021|website=[[Andina (news agency)|Andina]]|date=21 September 2021 |language=es|archive-date=30 October 2021|archive-url= https://web.archive.org/web/20211030162131/https://andina.pe/ingles/noticia-peru-president-suggests-global-agreement-at-un-ensuring-universal-access-to-vaccines-862568.aspx|url-status=live}}</ref>

      Optimizing the societal benefit of vaccination may benefit from a strategy that is tailored to the state of the pandemic, the demographics of a country, the age of the recipients, the availability of vaccines, and the individual risk for severe disease.<ref name=Wang1/> In the UK, the interval between prime and booster doses was extended to vaccinate as many people as early as possible.<ref>{{cite journal | vauthors = Baraniuk C | title = Covid-19: How the UK vaccine rollout delivered success, so far | journal = BMJ | volume = 372 | pages = n421 | date = February 2021 | pmid = 33602672 | doi = 10.1136/bmj.n421 | s2cid = 231946710 | title-link = doi | doi-access = free }}</ref> Many countries are starting to give an additional booster shot to the immunosuppressed<ref>{{cite web |date=13 August 2021 |title=Additional Dose of mRNA COVID{{nbhyph}}19 Vaccine for Patients Who Are Immunocompromised |url=https://www.cdc.gov/vaccines/covid-19/clinical-considerations/immunocompromised-patients.html |access-date=16 August 2021 |website=U.S. [[Centers for Disease Control and Prevention]] (CDC) |archive-date=7 October 2021 |archive-url=https://web.archive.org/web/20211007072024/https://www.cdc.gov/vaccines/covid-19/clinical-considerations/immunocompromised-patients.html |url-status=live }}</ref><ref>{{cite web |date=4 August 2021 |title=France plans rollout of Covid vaccine booster shots – but only for the vulnerable |url=https://www.france24.com/en/europe/20210804-france-plans-rollout-of-covid-vaccine-booster-shots-%E2%80%93-so-far-only-for-the-vulnerable |access-date=16 August 2021 |website=France 24 |archive-date=22 October 2021 |archive-url=https://web.archive.org/web/20211022012337/https://www.france24.com/en/europe/20210804-france-plans-rollout-of-covid-vaccine-booster-shots-%E2%80%93-so-far-only-for-the-vulnerable |url-status=live }}</ref> and the elderly,<ref>{{cite web |date=29 July 2021 |title=Israel to offer 3rd COVID booster shot to older citizens |url=https://apnews.com/article/middle-east-health-israel-coronavirus-pandemic-775e772a7507bcab708e9eea4bdcc50a |access-date=16 August 2021 |website=Associated Press |archive-date=31 October 2021 |archive-url=https://web.archive.org/web/20211031225657/https://apnews.com/article/middle-east-health-israel-coronavirus-pandemic-775e772a7507bcab708e9eea4bdcc50a |url-status=live }}</ref> and research predicts an additional benefit of personalizing vaccine doses in the setting of limited vaccine availability when a wave of virus Variants of Concern hits a country.<ref name="Hunziker 805–820">{{cite journal |vauthors=Hunziker P |date=July 2021 |title=Personalized-dose Covid-19 vaccination in a wave of virus Variants of Concern: Trading individual efficacy for societal benefit |url=https://precisionnanomedicine.com/article/26101-personalized-dose-covid-19-vaccination-in-a-wave-of-virus-variants-of-concern-trading-individual-efficacy-for-societal-benefit |journal=Precision Nanomedicine |volume=4 |issue=3 |pages=805–820 |doi=10.33218/001c.26101 | title-link = doi | doi-access = free |access-date=16 August 2021 |archive-date=9 October 2021 |archive-url=https://web.archive.org/web/20211009194402/https://precisionnanomedicine.com/article/26101-personalized-dose-covid-19-vaccination-in-a-wave-of-virus-variants-of-concern-trading-individual-efficacy-for-societal-benefit |url-status=live }}</ref>

      Despite the extremely rapid development of effective [[mRNA vaccine|mRNA]] and [[viral vector vaccine]]s, [[vaccine equity]] has not been achieved.<ref name="Hotez"/> The World Health Organization called for 70 percent of the global population to be vaccinated by mid-2022, but as of March 2022, it was estimated that only one percent of the 10 billion doses given worldwide had been administered in low-income countries.<ref>{{cite web |title=UN analysis shows a link between lack of vaccine equity and widening poverty gap |url=https://news.un.org/en/story/2022/03/1114762 |website=UN News |access-date=14 April 2022 |date=28 March 2022 |archive-date=12 April 2022 |archive-url=https://web.archive.org/web/20220412221531/https://news.un.org/en/story/2022/03/1114762 |url-status=live }}</ref> An additional 6 billion vaccinations may be needed to fill vaccine access gaps, particularly in developing countries. Given the projected availability of newer vaccines, the development and use of [[whole inactivated virus]] (WIV) and protein-based vaccines are also recommended. Organizations such as the [[Developing Countries Vaccine Manufacturers Network]] could help to support the production of such vaccines in developing countries, with lower production costs and greater ease of deployment.<ref name="Hotez"/><ref name="DCVMN">{{cite web |title=DCVMN |url=http://www.dcvmn.org/ |website=Developing Countries Vaccine Manufacturers Network |access-date=26 April 2022 |archive-date=26 April 2022 |archive-url=https://web.archive.org/web/20220426031853/http://www.dcvmn.org/ |url-status=live }}</ref><!-- cite for correct spelling of name -->

      While vaccines substantially reduce the probability and severity of infection, it is still possible for fully vaccinated people to contract and spread COVID{{nbhyph}}19.<ref name="cdc-effectiveness">{{cite journal |vauthors=Thompson MG, Burgess JL, Naleway AL, Tyner HL, Yoon SK, Meece J, Olsho LE, Caban-Martinez AJ, Fowlkes A, Lutrick K, Kuntz JL, Dunnigan K, Odean MJ, Hegmann KT, Stefanski E, Edwards LJ, Schaefer-Solle N, Grant L, Ellingson K, Groom HC, Zunie T, Thiese MS, Ivacic L, Wesley MG, Lamberte JM, Sun X, Smith ME, Phillips AL, Groover KD, Yoo YM, Gerald J, Brown RT, Herring MK, Joseph G, Beitel S, Morrill TC, Mak J, Rivers P, Harris KM, Hunt DR, Arvay ML, Kutty P, Fry AM, Gaglani M |date=April 2021 |title=Interim Estimates of Vaccine Effectiveness of BNT162b2 and mRNA-1273 COVID-19 Vaccines in Preventing SARS-CoV-2 Infection Among Health Care Personnel, First Responders, and Other Essential and Frontline Workers - Eight U.S. Locations, December 2020-March 2021 |url=<!-- Official URL --> https://www.cdc.gov/mmwr/volumes/70/wr/pdfs/mm7013e3-H.pdf |journal=MMWR Morb Mortal Wkly Rep |volume=70 |issue=13 |pages=495–500 |doi=10.15585/mmwr.mm7013e3 | title-link = doi | doi-access = free |pmc=8022879 |pmid=33793460 |access-date=9 June 2021 |archive-date=28 August 2021 |archive-url=https://web.archive.org/web/20210828063404/http://www.cdc.gov/mmwr/volumes/70/wr/pdfs/mm7013e3-H.pdf |url-status=live }}</ref> Public health agencies have recommended that vaccinated people continue using preventive measures (wear face masks, social distance, wash hands) to avoid infecting others, especially vulnerable people, particularly in areas with high community spread. Governments have indicated that such recommendations will be reduced as vaccination rates increase and community spread declines.<ref>{{cite web |date=11 February 2020 |title= When You've Been Fully Vaccinated |url= https://www.cdc.gov/coronavirus/2019-ncov/vaccines/fully-vaccinated.html |access-date=29 April 2021 | work = U.S. [[Centers for Disease Control and Prevention]] (CDC)|archive-date=28 July 2021|archive-url= https://web.archive.org/web/20210728053816/https://www.cdc.gov/coronavirus/2019-ncov/vaccines/fully-vaccinated.html |url-status=live }}</ref>

      ==== Economics ====
      {{boxquote|text=Moreover, an unequal distribution of vaccines will deepen inequality and exaggerate the gap between rich and poor and will reverse decades of hard-won progress on human development.|source =
      United Nations, ''COVID vaccines: Widening inequality and millions vulnerable''<ref name="UNnews">{{cite web |title=COVID vaccines: Widening inequality and millions vulnerable |url=https://news.un.org/en/story/2021/09/1100192 |publisher=United Nations |access-date=30 October 2021 |date=19 September 2021 |archive-date=31 December 2021 |archive-url=https://web.archive.org/web/20211231032620/https://news.un.org/en/story/2021/09/1100192 |url-status=live }}</ref>|width = 33%|align = right}}

      Vaccine inequity damages the global economy, disrupting the global [[supply chain]].<ref name=lanceted/> Most vaccines were reserved for wealthy countries; {{as of|lc=y|September 2021}},<ref name="UNnews"/> some countries have more vaccines than are needed to fully vaccinate their populations.<ref name="So" /> When people are under-vaccinated, needlessly die, experience disability, and live under lockdown restrictions, they cannot supply the same goods and services. This harms the economies of under-vaccinated and over-vaccinated countries alike. Since rich countries have larger economies, rich countries may lose more money to vaccine inequity than poor ones,<ref name=lanceted/> though the poor ones will lose a higher percentage of [[GDP]] and experience longer-term effects.<ref name=UNDP_ec>{{cite web |title=Impact of vaccine inequity on economic recovery |work=UNDP Data Futures Platform |url=https://data.undp.org/vaccine-equity/impact-of-vaccine-inequity-on-economic-recovery/ |publisher=UN Development program |access-date=30 October 2021 |archive-date=3 November 2021 |archive-url=https://web.archive.org/web/20211103211957/https://data.undp.org/vaccine-equity/impact-of-vaccine-inequity-on-economic-recovery/ |url-status=live }}</ref> High-income countries would profit an estimated US$4.80 for every $1 spent on giving vaccines to lower-income countries.<ref name=lanceted>{{cite journal | title = COVID-19 vaccine equity and booster doses | journal = The Lancet Infectious Diseases | volume = 21 | issue = 9 | page = 1193 | date = September 2021 | pmid = 34391506 | pmc = 8360703 | doi = 10.1016/S1473-3099(21)00486-2 | vauthors = ((The Lancet Infectious Diseases Editors)) }}</ref>

      The [[International Monetary Fund]] sees the vaccine divide between rich and poor nations as a serious obstacle to a global economic recovery.<ref>{{cite web|vauthors=Elliott L|date=5 October 2021|title=IMF cuts global economic forecast as pandemic 'hobbles' growth|url=https://www.theguardian.com/business/2021/oct/05/imf-cuts-global-economic-forecast-as-pandemic-hobbles-growth|access-date=6 October 2021|website=[[The Guardian]]|archive-date=27 October 2021|archive-url=https://web.archive.org/web/20211027083228/https://www.theguardian.com/business/2021/oct/05/imf-cuts-global-economic-forecast-as-pandemic-hobbles-growth|url-status=live}}</ref> Vaccine inequity disproportionately affects refuge-providing states, as they tend to be poorer, and refugees and displaced people are economically more vulnerable even within those low-income states, so they have suffered more economically from vaccine inequity.<ref name="UN_refugees">{{cite web |title=Refugees face dire consequences from COVID-19 underfunding, UNHCR warns |url=https://news.un.org/en/story/2021/09/1100162 |publisher=United Nations |access-date=30 October 2021 |date=17 September 2021 |archive-date=30 October 2021 |archive-url=https://web.archive.org/web/20211030015042/https://news.un.org/en/story/2021/09/1100162 |url-status=live }}</ref><ref name="Hotez"/>

      == Technology-assisted vaccine hunting ==

      ==== Background ====
      During the initial phase of COVID-19 vaccine distribution in early 2021, demand for appointments in the United States significantly exceeded supply. Eligibility rules changed frequently, and vaccination providers—including pharmacies, hospitals, and state health departments—operated separate online scheduling systems. Appointment slots were often released unpredictably and filled within minutes.<ref name="Fortune">{{cite news |date=April 6, 2021 |title=How to find a COVID-19 vaccine appointment: Pharmacies, Twitter bots, Facebook groups, and scheduling sites |url=https://fortune.com/2021/04/06/covid-vaccine-appointment-locator-where-to-find-vaccine-in-my-state-pharmacies-twitter-bots-facebook-groups-scheduling-sites/ |work=Fortune}}</ref>

      In response, informal volunteer networks—commonly referred to as "vaccine hunters" or "vaccine angels"—emerged to help individuals locate available appointments.<ref name="Salon">{{cite news |date=April 1, 2021 |title=Vaccine angels |url=https://www.salon.com/2021/04/01/vaccine-angels/ |work=Salon}}</ref> These groups coordinated through Facebook, Slack, Telegram, Discord, and Twitter, sharing scheduling strategies and real-time updates.

      ==== Regional automated tools ====
      In several metropolitan areas, technologists developed automated programs to monitor vaccine scheduling systems.

      In the San Francisco Bay Area, software engineer Mukesh Aggarwal created a program that reportedly scanned more than 100 vaccination provider websites and distributed alerts through a Telegram channel when appointments became available.<ref name="CBS">{{cite news |date=March 30, 2021 |title=COVID Vaccines: Software Engineer Develops App To Find Bay Area Appointments In Real-Time |url=https://sanfrancisco.cbslocal.com/2021/03/30/covid-vaccines-bay-area-appointment-app-real-time/ |work=CBS San Francisco}}</ref>

      High school students in the Bay Area launched a Twitter bot known as @CovaxSF that scanned county and pharmacy websites and tweeted availability alerts.<ref name="SecretSF">{{cite news |date=April 12, 2021 |title=2 Local High School Students Create Twitter Bot That Scans For Vaccine Appointments |url=https://secretsanfrancisco.com/vaccine-appointment-twitter-bot/ |work=Secret San Francisco}}</ref>

      Additional regional reporting described independently developed bots that monitored California's MyTurn platform and pharmacy portals, automatically posting updates when openings were detected.<ref name="SFGate">{{cite news |date=2021 |title=His grandma couldn’t find a vaccine. So this SF man made a bot |url=https://www.sfgate.com/tech/article/covid-19-vaccine-appointments-twitter-bot-16101706.php |work=SFGate}}</ref>

      Similar tools were reported in other states, including bots that tracked CVS, Walgreens, Rite Aid, and state health department portals and posted appointment alerts on Twitter.<ref name="Fortune" />

      ==== Nationwide tracking projects ====
      Beyond regional efforts, several nationwide tools and volunteer-run data projects emerged to aggregate appointment information.

      Websites such as VaccinateCA compiled crowd-sourced reports of vaccine availability across California.<ref>{{cite web |date=2021 |title=VaccinateCA |url=https://www.vaccinateca.com |publisher=VaccinateCA}}</ref>

      National media coverage also described developers who built multi-state tracking bots that scraped pharmacy APIs or scheduling endpoints and automatically posted updates to Twitter or Telegram channels.<ref name="Fortune" /><ref name="PCWorld">{{cite news |date=2021 |title=COVID-19 vaccination appointment online resources |url=https://www.pcworld.com/article/3615663/covid-19-vaccination-appointment-online-resources.html |work=PCWorld}}</ref>

      Some programmers published open-source scripts that allowed others to monitor appointment endpoints directly, contributing to a broader ecosystem of decentralized vaccine tracking tools.<ref name="Salon" />

      ==== Public response and policy concerns ====
      Media outlets characterized these automated systems as grassroots technological responses to fragmented vaccine distribution systems.<ref name="Salon" /> However, coverage also noted concerns that automated monitoring tools could advantage individuals with technical knowledge, fast internet access, or the ability to respond immediately to alerts.<ref name="Fortune" />

      Some pharmacy chains and state systems reportedly implemented countermeasures to limit automated scraping, including rate limits and CAPTCHA systems.<ref name="Fortune" />

      As vaccine supply increased and eligibility expanded nationwide in mid-2021, the need for intensive appointment monitoring declined, and many volunteer-run bots and tracking systems were discontinued.<ref>{{cite news |date=2021 |title=COVID vaccine hunters say Bay Area slots are getting easier to find |url=https://www.sfchronicle.com/local/article/COVID-vaccine-hunters-say-Bay-Area-slots-are-16104414.php |work=San Francisco Chronicle}}</ref>

      === Liability ===
      Several governments agreed to shield pharmaceutical companies like [[Pfizer]] and [[Moderna]] from [[negligence]] claims related to COVID{{nbhyph}}19 vaccines (and treatments), [[Economics of vaccines|as in previous pandemics]], when governments also took on liability for such claims.

      In the US, these liability shields took effect in February 2020, when the US Secretary of Health and Human Services, [[Alex Azar]], published a notice of declaration under the [[Public Readiness and Emergency Preparedness Act]] (PREP Act) for medical countermeasures against COVID{{nbhyph}}19, covering "any vaccine, used to treat, diagnose, cure, prevent, or mitigate COVID{{nbhyph}}19, or the transmission of SARS-CoV-2 or a virus mutating therefrom". The declaration precludes "liability claims alleging negligence by a manufacturer in creating a vaccine, or negligence by a health care provider in prescribing the wrong dose, absent willful misconduct." In other words, absent "willful misconduct", these companies cannot be sued for [[money damages]] for any injuries that occur between 2020 and 2024 from the administration of vaccines and treatments related to COVID{{nbhyph}}19.<ref name="Preparedness Act">{{cite web |url=https://www.phe.gov/Preparedness/legal/prepact/Pages/COVID19.aspx|title=Notice of Declaration under the Public Readiness and Emergency Preparedness Act for medical countermeasures against COVID-19 | vauthors = Azar A |date=4 February 2020 |access-date=22 April 2020|archive-url=https://web.archive.org/web/20200425015411/https://www.phe.gov/Preparedness/legal/prepact/Pages/COVID19.aspx|archive-date=25 April 2020|url-status=live}}</ref> The declaration is effective in the United States through 1{{spaces}}October 2024.<ref name="Preparedness Act" />

      In December 2020, the UK government granted Pfizer legal [[indemnity]] for its COVID{{nbhyph}}19 vaccine.<ref>{{cite web|vauthors=Lintern S|date=2 December 2020|title=Pfizer given protection from legal action over coronavirus vaccine by UK government|url=https://www.independent.co.uk/news/health/coronavirus-pfizer-vaccine-legal-indemnity-safety-ministers-b1765124.html|access-date=8 May 2021|website=The Independent|archive-date=5 May 2021|archive-url=https://web.archive.org/web/20210505000529/https://www.independent.co.uk/news/health/coronavirus-pfizer-vaccine-legal-indemnity-safety-ministers-b1765124.html|url-status=live}}</ref>

      In the European Union, the COVID{{nbhyph}}19 vaccines were granted a conditional marketing authorization, which does not exempt manufacturers from civil and administrative liability claims.<ref>{{cite web|date=11 December 2020|title=Questions and Answers: Conditional Marketing Authorisation of COVID-19 Vaccines in the EU|url=https://ec.europa.eu/commission/presscorner/detail/en/qanda_20_2390|access-date=29 December 2020|publisher=[[European Commission]]|at=Question: What is the difference in liability between EU Conditional Marketing Authorisation vs Emergency Use Authorisations?|archive-date=4 October 2021|archive-url=https://web.archive.org/web/20211004172148/https://ec.europa.eu/commission/presscorner/detail/en/qanda_20_2390|url-status=live}}</ref> The EU conditional marketing authorizations were changed to standard authorizations in September 2022.<ref>{{cite web | title=EMA recommends standard marketing authorizations for Comirnaty and Spikevax COVID-19 vaccines | website=European Medicines Agency | date=16 September 2022 | url=https://www.ema.europa.eu/en/news/ema-recommends-standard-marketing-authorisations-comirnaty-spikevax-covid-19-vaccines | access-date=7 October 2022 | archive-date=16 September 2022 | archive-url=https://web.archive.org/web/20220916095151/https://www.ema.europa.eu/en/news/ema-recommends-standard-marketing-authorisations-comirnaty-spikevax-covid-19-vaccines | url-status=live }}</ref> While the purchasing contracts with vaccine manufacturers remain secret, they do not contain liability exemptions, even for side effects not known at the time of licensure.<ref>{{cite web|vauthors=Haahr T|date=7 September 2020|title=COVID-19: MEPs want safe vaccines, full transparency and liability for companies|url=https://www.europarl.europa.eu/news/en/press-room/20200904IPR86419/covid-19-meps-want-safe-vaccines-full-transparency-and-liability-for-companies|access-date=29 December 2020|website=European Parliament|at=Ms. Gallina stressed negotiations with companies had been difficult but underlined that those companies developing and manufacturing COVID-19 vaccines would indeed be liable according to current laws, and if something goes wrong, they could be taken to court. This also goes for compensation for hidden defects.|archive-date=13 October 2021|archive-url=https://web.archive.org/web/20211013122000/https://www.europarl.europa.eu/news/en/press-room/20200904IPR86419/covid-19-meps-want-safe-vaccines-full-transparency-and-liability-for-companies|url-status=live}}</ref>

      The [[Bureau of Investigative Journalism]], a nonprofit news organization, reported in an investigation that unnamed officials in some countries, such as Argentina and Brazil, said that Pfizer demanded guarantees against costs of legal cases due to adverse effects in the form of liability waivers and sovereign assets such as federal bank reserves, embassy buildings, or military bases, going beyond what was expected from other countries, such as the US.<ref>{{cite news |date=11 March 2021 |title=Investigation: Drugmaker 'bullied' Latin American nations |work=Al Jazeera |url=https://www.aljazeera.com/news/2021/3/11/investigation-pfizer-bullied-latin-american-nations |access-date=15 June 2021 |archive-date=31 October 2021 |archive-url=https://web.archive.org/web/20211031172842/https://www.aljazeera.com/news/2021/3/11/investigation-pfizer-bullied-latin-american-nations |url-status=live }}</ref> During the [[COVID‑19 CPI|pandemic parliamentary inquiry in Brazil]], Pfizer's representative said that its terms for Brazil are the same as for all other countries with which it has signed deals.<ref>{{cite news |vauthors=Barcellos R |date=13 May 2021 |title=Carlos Murillo diz que cláusulas criticadas pelo Brasil valem em 110 países |language=Portuguese |trans-title=Carlos Murillo says critical clauses for Brazil are valid in 110 countries |work=CNN Brasil |url=https://www.cnnbrasil.com.br/politica/2021/05/13/carlos-murillo-diz-que-clausulas-criticadas-pelo-brasil-valem-em-110-paises |access-date=15 June 2021 |archive-date=28 June 2021 |archive-url=https://web.archive.org/web/20210628135359/https://www.cnnbrasil.com.br/politica/2021/05/13/carlos-murillo-diz-que-clausulas-criticadas-pelo-brasil-valem-em-110-paises |url-status=live }}</ref>

      In December 2022, the governor of Florida, [[Ron DeSantis]], said that he would petition the state supreme court to convene a grand jury to investigate possible violations in respect to COVID{{nbhyph}}19 vaccines,<ref>{{cite web |url=https://www.flgov.com/2022/12/13/governor-ron-desantis-petitions-florida-supreme-court-for-statewide-grand-jury-on-covid-19-vaccines-and-announces-creation-of-the-public-health-integrity-committee/ |title=Governor Ron DeSantis Petitions Florida Supreme Court for Statewide Grand Jury on COVID-19 Vaccines and Announces Creation of the Public Health Integrity Committee |access-date=14 December 2022 |website=www.flgov.com |archive-date=14 December 2022 |archive-url=https://web.archive.org/web/20221214000857/https://www.flgov.com/2022/12/13/governor-ron-desantis-petitions-florida-supreme-court-for-statewide-grand-jury-on-covid-19-vaccines-and-announces-creation-of-the-public-health-integrity-committee/ |url-status=live }}</ref> and declared that his government would be able to get "the data whether they [the companies] want to give it or not".<ref>{{cite web |url=https://www.theguardian.com/us-news/2022/dec/13/ron-desantis-grand-jury-investigation-covid-vaccines-florida |title=Florida governor seeks grand jury investigation into Covid vaccines |date=13 December 2022 |access-date=14 December 2022 |website=www.theguardian.com |archive-date=13 December 2022 |archive-url=https://web.archive.org/web/20221213224924/https://www.theguardian.com/us-news/2022/dec/13/ron-desantis-grand-jury-investigation-covid-vaccines-florida |url-status=live }}</ref>

      In November 2023, the US state of Texas sued Pfizer under section 17.47 of the [[Consumer protection#United States|Texas Deceptive Trade Practices Act]], alleging that the company misled the public about its COVID-19 vaccine by hiding risks while making false claims about its effectiveness.<ref>{{cite news|url=https://www.reuters.com/legal/pfizer-is-sued-by-texas-over-covid-19-vaccine-claims-2023-11-30/|title=Pfizer is sued by Texas over COVID vaccine claims|vauthors=Jonathan S|work=Reuters|date=30 November 2023|archive-date=27 October 2024|access-date=21 September 2024|archive-url=https://web.archive.org/web/20241027072104/https://www.reuters.com/legal/pfizer-is-sued-by-texas-over-covid-19-vaccine-claims-2023-11-30/|url-status=live}}</ref><ref>{{Cite web|url=https://www.texastribune.org/2023/11/30/texas-attorney-general-pfizer-lawsuit/|title=Texas attorney general sues Pfizer, claiming vaccines didn't end pandemic quickly enough|vauthors=Harper KB|date=30 November 2023|website=The Texas Tribune|access-date=21 September 2024|archive-date=21 September 2024|archive-url=https://web.archive.org/web/20240921041700/https://www.texastribune.org/2023/11/30/texas-attorney-general-pfizer-lawsuit/|url-status=live}}</ref> In June 2024, the US state of Kansas similarly sued Pfizer under the [[Consumer protection#United States|Kansas Consumer Protection Act]], making similar allegations.<ref>{{cite news|vauthors=Pierson B|date=18 June 2024|title=Kansas accuses Pfizer of misleading public about COVID vaccine in lawsuit|url=https://www.reuters.com/legal/kansas-accuses-pfizer-misleading-public-about-covid-vaccine-lawsuit-2024-06-17|work=Reuters|archive-date=19 June 2024|access-date=21 September 2024|archive-url=https://web.archive.org/web/20240619202953/https://www.reuters.com/legal/kansas-accuses-pfizer-misleading-public-about-covid-vaccine-lawsuit-2024-06-17/|url-status=live}}</ref>

      == Public acceptance and hesitancy ==
      [[File:202003- Cumulative county COVID-19 death rates - by share of votes for Donald Trump.svg |thumb|After the December 2020 introduction of COVID vaccines, a partisan gap in death rates developed, indicating the effects of vaccine skepticism.<ref name=NYTimes_20240311/> As of March 2024, more than 30 percent of Republicans had not received a Covid vaccine, compared with less than 10 percent of Democrats.<ref name=NYTimes_20240311>{{cite news | vauthors = Leonhardt D |title=The Fourth Anniversary of the Covid Pandemic |url=https://www.nytimes.com/2024/03/11/briefing/covid-pandemic-anniversary.html |newspaper=The New York Times |date=11 March 2024 |archive-url=https://web.archive.org/web/20240311120515/https://www.nytimes.com/2024/03/11/briefing/covid-pandemic-anniversary.html |archive-date=11 March 2024 |url-status=live }} "Data excludes Alaska. Sources: C.D.C. Wonder; Edison Research. (Chart) By ''The New York Times''. Source credits chart to Ashley Wu.</ref>]]
      {{Excerpt|COVID-19 vaccine misinformation and hesitancy}}
      The [[United States Department of Defense]] (DoD) undertook a [[disinformation]] campaign in the Philippines, later expanded to Central Asia and the Middle East, which sought to discredit China, in particular its [[Sinovac Biotech|Sinovac]] vaccine, disseminating hashtags of #ChinaIsTheVirus and posts claiming that the Sinovac vaccine contained gelatin from pork and therefore was ''[[haram]]'' or forbidden for purposes of Islamic law.<ref name="Bing_2024">{{Cite news |vauthors=Bing C, Schechtman J |date=14 June 2024 |title=Pentagon Ran Secret Anti-Vax Campaign to Undermine China during Pandemic |url=https://www.reuters.com/investigates/special-report/usa-covid-propaganda/ |work=[[Reuters]] |archive-date= |access-date=18 June 2024 |archive-url= |url-status= }}</ref>

