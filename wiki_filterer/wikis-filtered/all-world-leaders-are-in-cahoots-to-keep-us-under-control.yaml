      At the UN's founding in 1945, the five permanent members were the [[Republic of China (1912–1949)|Republic of China]], France (represented by the [[Provisional Government of the French Republic]]), the Soviet Union, the United Kingdom, and the United States. There have been two major seat changes since then. [[China and the United Nations|China's seat]] was originally held by [[Chiang Kai-shek]]'s Nationalist government. After the Nationalists were forced to retreat to [[Taiwan]] during the [[Chinese Civil War]] in 1949, the [[Chinese Communist Party]] assumed control of the mainland as the People's Republic of China. In 1971, [[United Nations General Assembly Resolution 2758|General Assembly Resolution 2758]] recognised the People's Republic as the [[One-China policy|rightful representative of China]] in the UN and transferred the Security Council seat accordingly; the [[Taiwan and the United Nations|Republic of China was expelled from the UN altogether with no opportunity for membership as a separate nation]].{{sfn|Meisler|1995|pp=195–197}} After the [[dissolution of the Soviet Union]] in 1991, the Russian Federation was recognised as the [[succession of states|legal successor state]] and maintained the Soviet seat.{{sfn|Blum|1992}}

      The five permanent members were the victorious great powers in World War II{{sfn|Kennedy|2006|p=70}} and have maintained the world's most powerful military forces. They annually top the [[List of countries by military expenditures|list of countries with the highest military expenditures]].<ref name="SIPRI">{{cite web |url=http://www.sipri.org/research/armaments/milex |title=SIPRI Military Expenditure Database |publisher=Stockholm International Peace Research Institute |access-date=26 November 2013 |archive-date=24 May 2016 |archive-url=https://web.archive.org/web/20160524130032/http://www.sipri.org/research/armaments/milex |url-status=live}}</ref><!-- NOTE: 2013 military expenditure data is outdated; update with current SIPRI figures --> In 2013, they spent over US$1&nbsp;trillion combined on defence, accounting for over 55% of global military expenditures (the US alone accounting for over 35%).<ref name="SIPRI"/> They are also amongst the world's [[Arms industry#World's largest arms exporters|largest arms exporters]]<ref>{{cite web | url= https://www.reuters.com/article/us-arms-treaty-idUSBRE86Q1MW20120727 | title= United Nations fails to agree landmark arms-trade treaty | first= Michelle | last= Nichols | date= 27 July 2012 | work= Reuters | access-date= 26 November 2013 | archive-date= 16 March 2016 | archive-url= https://web.archive.org/web/20160316212137/http://www.reuters.com/article/us-arms-treaty-idUSBRE86Q1MW20120727 | url-status= live}}</ref> and are the only nations officially recognised as "[[List of states with nuclear weapons|nuclear-weapon states]]" under the [[Nuclear Non-Proliferation Treaty]] (NPT), though other states are known or believed to possess nuclear weapons.

      The bloc of Western democratic permanent members—France, the United Kingdom, and the United States—is informally styled the "P3".

      ==== Veto power ====
      {{Main|United Nations Security Council veto power}}

      {{See also|List of vetoed United Nations Security Council resolutions}}

      Under [[United Nations Security Council veto power#UN Charter|Article 27]] of the UN Charter, Security Council decisions on all substantive matters require the affirmative votes of nine members. A negative vote—or "veto"—by a permanent member prevents adoption of a proposal, even if it has received the required number of votes.{{sfn|Fasulo|2004|pp=40–41}} Abstention is not regarded as a veto in most cases, though all five permanent members must actively concur to adopt any amendment to the Charter.{{sfn|Fomerand|2009|p=287}} Procedural matters cannot be vetoed, nor can the veto be used to prevent discussion of an issue. The same holds for certain non-binding decisions that directly regard permanent members.{{sfn|Fasulo|2004|pp=40–41}} Most vetoes have been used for blocking a candidate for Secretary-General or the admission of a member state, not in critical international security situations.<ref name="Veto"/>

      In the negotiations leading to the creation of the UN, the veto power was opposed by many smaller countries and was in effect imposed by the five sponsoring powers, who made clear that the UN would not be founded without it. [[Francis O. Wilcox]], an adviser to the US delegation at the 1945 San Francisco conference, described the situation:

      {{blockquote|At San Francisco, the issue was made crystal clear by the leaders of the Big Five: it was either the Charter with the veto or no Charter at all. Senator Connally [from the U.S. delegation] dramatically tore up a copy of the Charter during one of his speeches and reminded the small states that they would be guilty of that same act if they opposed the unanimity principle. "You may, if you wish," he said, "go home from this Conference and say that you have defeated the veto. But what will be your answer when you are asked: 'Where is the Charter?{{'"}}{{sfn|Wilcox|1945}}}}

      An early veto by Soviet commissar [[Andrei Vishinsky]] blocked a resolution on the withdrawal of French forces from Syria and Lebanon in February 1946, establishing the precedent that permanent members could use the veto on matters outside immediate concerns of war and peace. The Soviet Union went on to veto the admission of Austria, Cambodia, Ceylon, Finland, Ireland, Italy, Japan, Laos, Libya, Nepal,<ref>{{cite news |author=A. M. Rosenthal |date=8 September 1949 |title=Russia's 31st Veto in U.N. Bars Nepal |language=en-US |work=The New York Times |url=https://www.nytimes.com/1949/09/08/archives/russias-31st-veto-in-u-n-bars-nepal-nine-nations-in-the-security.html |access-date=18 January 2023 |issn=0362-4331 |archive-date=18 January 2023 |archive-url=https://web.archive.org/web/20230118234356/https://www.nytimes.com/1949/09/08/archives/russias-31st-veto-in-u-n-bars-nepal-nine-nations-in-the-security.html |url-status=live}}</ref> Portugal, South Vietnam, and Transjordan as member states, delaying their admission by several years. The United Kingdom and France used the veto to avoid condemnation of their actions in the 1956 Suez Crisis. The first US veto came in 1970, blocking General Assembly action on [[Southern Rhodesia]]. From 1985 to 1990, the United States vetoed 27 resolutions, primarily to block resolutions perceived as critical of Israel but also to protect its interests in Panama and Korea. The Soviet Union, the United States, and China have all vetoed candidates for Secretary-General, with the United States blocking the re-election of [[Boutros Boutros-Ghali]] in 1996.{{sfn|Kennedy|2006|pp=52–54}}

      Through the end of 2024, Russia and the Soviet Union had cast approximately 120 vetoes, the United States 89, the United Kingdom 29, and France and China 16 each.{{efn|These figures exclude vetoes cast to block candidates for Secretary-General, as these occur in closed session.}}<ref name="Veto">{{cite web |url= http://www.globalpolicy.org/images/pdfs/Changing_Patterns_in_the_Use_of_the_Veto_as_of_August_2012.pdf |title=Changing Patterns in the Use of the Veto in The Security Council |publisher=Global Policy Forum |access-date=26 November 2013 |archive-url=https://web.archive.org/web/20160114211630/https://www.globalpolicy.org/images/pdfs/Changing_Patterns_in_the_Use_of_the_Veto_as_of_August_2012.pdf |archive-date=14 January 2016 |url-status=live}}</ref><ref>{{cite web |title=Vetoes since 1946 |url=https://main.un.org/securitycouncil/en/content/vetoes-since-1946 |publisher=United Nations Security Council |access-date=15 February 2026}}</ref> Roughly two-thirds of Soviet and Russian combined vetoes were in the first ten years of the Security Council's existence.

      In April 2022, the General Assembly adopted Resolution 76/262, the "veto initiative", which requires a General Assembly debate within ten working days whenever a Security Council veto is cast, allowing the vetoing member to explain itself and giving all member states an opportunity to respond.<ref>{{cite web |title=The U.N. General Assembly's Veto Initiative Turns One. Is it Working? |url=https://www.justsecurity.org/86140/the-u-n-general-assemblys-veto-initiative-turns-one-is-it-working/ |publisher=Just Security |date=26 April 2023 |access-date=15 February 2026}}</ref> The first General Assembly debate under this resolution occurred on 26 April 2023, following Russia's veto of a draft resolution condemning its attempted annexation of Ukrainian territory.<ref>{{cite web |title=General Assembly Holds First-Ever Debate on Historic Veto Resolution |url=https://press.un.org/en/2023/ga12500.doc.htm |publisher=United Nations |date=26 April 2023 |access-date=15 February 2026}}</ref>

      === Non-permanent members ===
      {{See also|List of members of the United Nations Security Council|United Nations Security Council elections|2023 United Nations Security Council election{{!}}2023|2024 United Nations Security Council election{{!}}2024|2025 United Nations Security Council election{{!}}2025}}

      Along with the five permanent members, the Security Council has ten non-permanent members that hold their seats on a rotating basis by geographic region. Non-permanent members may be involved in global security briefings.<ref>{{YouTube|id=FgthI1fdRYA|title=U.N. Security Council Briefing on the U.S. Air Strike in Syria}} [[Time (magazine)|Time]]</ref> In its first two decades, the Security Council had six non-permanent members, the first of which were Australia, Brazil, Egypt, Mexico, the Netherlands and Poland. In 1965, the number of non-permanent members was expanded to ten.<ref>{{Cite web |title=The UN Security Council |url= http://www.unfoundation.org/what-we-do/issues/united-nations/the-un-security-council.html |publisher= United Nations Foundation |access-date=15 May 2012 |archive-url= https://web.archive.org/web/20120620101548/http://www.unfoundation.org/what-we-do/issues/united-nations/the-un-security-council.html |archive-date=20 June 2012 |url-status=dead |df=dmy-all}}</ref>

      These ten non-permanent members are [[United Nations Security Council elections|elected]] by the [[United Nations General Assembly]] for two-year terms starting on 1 January, with five replaced each year.<ref name="Current">{{cite web |url=https://www.un.org/en/sc/members/ |title=Current Members |publisher=United Nations |access-date=4 January 2016 |archive-date=19 December 2018 |archive-url=https://web.archive.org/web/20181219111509/http://www.un.org/en/sc/members/ |url-status=live}}</ref> To be approved, a candidate must receive at least two-thirds of all votes cast for that seat, which can result in deadlock if there are two roughly evenly matched candidates. In 1979, a standoff between Cuba and Colombia only ended after three months and a record 154 rounds of voting; both eventually withdrew in favour of Mexico as a compromise candidate.<ref name="SCR">{{cite web |title=Special Research Report No. 4: Security Council Elections 2011 |publisher=Security Council Report |date=21 September 2011 |access-date=8 June 2012 |url= http://www.securitycouncilreport.org/site/c.glKWLeMTIsG/b.7741609/k.778/Special_Research_Report_No_4brSecurity_Council_Elections_2011br21_September_2011.htm |url-status=dead |archive-url= https://web.archive.org/web/20120608042121/http://www.securitycouncilreport.org/site/c.glKWLeMTIsG/b.7741609/k.778/Special_Research_Report_No_4brSecurity_Council_Elections_2011br21_September_2011.htm |archive-date=8 June 2012}}</ref> A retiring member is not eligible for immediate re-election.<ref name="chapter5"/>

      The African Group is represented by three members; the [[Latin America and the Caribbean]], Asia-Pacific, and [[Western European and Others Group|Western European and Others]] groups by two apiece; and the [[Eastern European Group]] by one. Traditionally, one of the seats assigned to either the Asia-Pacific Group or the African Group is filled by a nation from the [[Arab world]], alternating between the groups.<ref>{{cite news |last=Malone |first=David |title=Reforming the Security Council: Where Are the Arabs? |date=25 October 2003 |newspaper=[[The Daily Star (Lebanon)|The Daily Star]] |location=Beirut |url=http://www.worldpress.org/Mideast/1694.cfm |access-date=3 January 2011 |archive-date=11 June 2021 |archive-url=https://web.archive.org/web/20210611142412/https://www.worldpress.org/Mideast/1694.cfm |url-status=live}}</ref> Currently, elections for terms beginning in even-numbered years select two African members, and one each within Eastern Europe, Asia-Pacific, and Latin America and the Caribbean; the traditional "Arab seat" is elected for this term. Terms beginning in odd-numbered years consist of two Western European and Other members, and one each from Asia-Pacific, Africa, and Latin America and the Caribbean.<ref name="SCR"/>

      During the [[2016 United Nations Security Council election]], neither Italy nor the Netherlands met the required two-thirds majority for election. They subsequently agreed to split the term of the Western European and Others Group. It was the first time in over five decades that two members agreed to do so.<ref>{{cite web |title=General Assembly Elects 4 New Non-permanent Members to Security Council, as Western and Others Group Fails to Fill Final Vacancy |url=https://www.un.org/press/en/2016/ga11796.doc.htm |publisher=United Nations |access-date=9 August 2016 |archive-date=5 August 2016 |archive-url=https://web.archive.org/web/20160805225007/http://www.un.org/press/en/2016/ga11796.doc.htm |url-status=live}}</ref> Usually, intractable deadlocks are resolved by the candidate countries withdrawing in favour of a third member state.

      The current elected members, with the regions they were elected to represent, are as follows:<ref>{{cite web |title=Current Members |url=https://www.un.org/securitycouncil/content/current-members |publisher=United Nations |url-status=live}}</ref><ref>{{Cite web |date=2025-06-03 |title=Five countries elected to serve on UN Security Council |url=https://news.un.org/en/story/2025/06/1163971 |access-date=2025-06-03 |website=UN News |language=en}}</ref>

