      === Reserves ===
      In addition to capital subscriptions, the NCBs of the member states participating in the euro area provided the ECB with foreign reserve assets equivalent to around €40&nbsp;billion. The contributions of each NCB is in proportion to its share in the ECB's subscribed capital, while in return each NCB is credited by the ECB with a claim in euro equivalent to its contribution. 15% of the contributions was made in gold, and the remaining 85% in US dollars and UK pounds sterling.{{citation needed|date=July 2016}}

      === Languages ===
      The internal working language of the ECB is English, and press conferences are held in English. External communications are handled flexibly: English is preferred (though not exclusively) for communication within the ESCB (i.e. with other central banks) and with financial markets; communication with other national bodies and with EU citizens is normally in their respective language, but the ECB website is predominantly English; official documents such as the Annual Report are in the official languages of the EU (generally English, German and French).<ref>{{cite news|title=Translation Adds Complexity to European Central Bank's Supervisory Role: ECB Wants Communication in English, But EU Rules Allow Use of Any Official Language|first=Todd|last=Buell|date=29 October 2014|access-date=11 October 2015|newspaper=The Wall Street Journal|url=https://www.wsj.com/articles/translation-adds-complexity-to-european-central-banks-supervisory-role-1414580925}}</ref><ref>{{cite web|page=26|title=The Application of multilingualism in the European Union Context|publisher=ECB|date=February 2006|access-date=11 October 2015|url=http://www.ecb.europa.eu/pub/pdf/scplps/ecblwp2.pdf|first=Phoebus|last= Athanassiou}}</ref>

      In 2022, the ECB publishes for the first time details on the nationality of its staff,<ref>{{cite web | url=https://www.ecb.europa.eu/pub/annual/html/ecb.ar2021~14d7439b2d.en.html#toc93 | title=Annual Report 2021 | date=28 April 2022 |publisher=European Central Bank| last1=Bank | first1=European Central }}</ref> revealing an over-representation of Germans and Italians along the ECB employees, including in management positions.

      === Independence ===
      The European Central Bank (and by extension, the Eurosystem) is often considered as the "most independent central bank in the world".<ref>{{Cite press release|url=https://www.ecb.europa.eu/press/key/date/1997/html/sp970513.en.html|title=The European Central Bank: independent and accountable|website=European Central Bank|date=13 May 1997|language=en|access-date=5 November 2017}}</ref><ref>{{Cite press release|url=https://www.ecb.europa.eu/press/key/date/1999/html/sp990504.en.html|title=The role of the Central Bank in the United Europe|website=European Central Bank|date=4 May 1999|language=en|access-date=5 November 2017}}</ref><ref>{{Cite journal|last1=Papadia|first1=Francesco|last2=Ruggiero|first2=Gian Paolo|date=1 February 1999|title=Central Bank Independence and Budget Constraints for a Stable Euro|journal=Open Economies Review|language=en|volume=10|issue=1|pages=63–90|doi=10.1023/A:1008305128157|s2cid=153508547|issn=0923-7992}}</ref><ref>{{Cite news|url=https://www.wsj.com/articles/SB902443500523452500|title=Is the ECB Too Independent?|last=Wood|first=Geoffrey|work=The Wall Street Journal|access-date=5 November 2017|language=en-US}}</ref> In general terms, this means that the Eurosystem tasks and policies can be discussed, designed, decided and implemented in full autonomy, without pressure or need for instructions from any external body. The main justification for the ECB's independence is that such an institutional setup assists the maintenance of price stability.<ref name="Independence">{{cite web |url=http://www.ecb.int/ecb/orga/independence/html/index.en.html |title=Independence |publisher=European Central Bank |access-date=1 December 2012}}</ref><ref>{{cite journal |url=https://www.ecb.europa.eu/explainers/tell-me-more/html/ecb_independent.en.html |title=Why is the ECB independent? |website=European Central Bank |date=12 January 2017 |language=en |access-date=5 November 2017|last1=Bank |first1=European Central }}</ref>

      In practice, the ECB's independence is pinned by four key principles:<ref>{{cite web |url=http://transparency.eu/ecb|title=Transparency International EU – The global coalition against corruption in Brussels |website=transparency.eu |language=en |access-date=5 November 2017 |date=28 March 2017}}</ref>

      * '''Operational and legal independence''': the ECB has all required competences to achieve its price stability mandate{{Citation needed|date=August 2020}} and thereby can steer monetary policy in full autonomy and by means of high level of discretion. The ECB's governing council deliberates with a high degree of secrecy, since individual voting records are not disclosed to the public (leading to suspicions that Governing Council members are voting along national lines.<ref name="Heinemann Hüfner 2003 p.">{{cite journal | last1=Heinemann | first1=Friedrich | last2=Hüfner | first2=Felix P. | title=Is the View from the Eurotower Purely European? – National Divergence and ECB Interest Rate Policy | journal=SSRN Electronic Journal | publisher=Elsevier BV | year=2003 | issn=1556-5068 | doi=10.2139/ssrn.374600 | page=| s2cid=12675305 | url=https://ub-madoc.bib.uni-mannheim.de/376/1/dp0269.pdf }}</ref><ref>Jose Ramon Cancelo, Diego Varela and Jose Manuel Sanchez-Santos (2011) 'Interest rate setting at the ECB: Individual preferences and collective decision making', ''Journal of Policy Modeling'' 33(6): 804–820. [[doi:10.1016/j.jpolmod.2011.08.017|DOI]].</ref>) In addition to monetary policy decisions, the ECB has the right to issue legally binding regulations, within its competence and if the conditions laid down in Union law are fulfilled, it can sanction non-compliant actors if they violate legal requirements laid down in directly applicable Union regulations. The ECB's own legal personality also allows the ECB to enter into international legal agreements independently from other EU institutions, and be the party of legal proceedings. Finally, the ECB can organise its internal structure as it sees fit. 
      * '''Personal independence:''' the mandate of ECB board members is purposefully very long (8 years) and Governors of national central banks have a minimum renewable term of office of five years.<ref name="Independence" /> In addition, ECB board members are vastly immune from judicial proceedings.<ref>{{Cite web|url=https://www.ecb.europa.eu/pub/pdf/scplps/ecblwp4.pdf?581a2ecf674a6554f5af698f5bf54019|title=PRIVILEGES AND IMMUNITIES OF THE EUROPEAN CENTRAL BANK|date=2007|website=European Central Bank}}</ref> Indeed, removals from the office can only be decided by the [[Court of Justice of the European Union]] (CJEU), under the request of the ECB's Governing Council or the executive board (i.e. the ECB itself). Such a decision is only possible in the event of incapacity or serious misconduct. National governors of the Eurosystem's national central banks can be dismissed under national law (with a possibility to appeal) in case they can no longer fulfil their functions or are guilty of serious misconduct.
      * '''Financial independence''': the ECB is the only body within the EU whose statute guarantees budgetary independence through its own resources and income. The ECB uses its own profits generated by its monetary policy operations and cannot be technically insolvent. The ECB's financial independence reinforces its political independence. Because the ECB does not require external financing and symmetrically is prohibited from [[Monetary financing|direct monetary financing]] of public institutions, this shields it from potential pressure from public authorities.
      *'''Political independence''': The Community institutions and bodies and the governments of the member states may not seek to influence the members of the decision-making bodies of the ECB or of the NCBs in the performance of their tasks. Symmetrically, EU institutions and national governments are bound by the treaties to respect the ECB's independence. It is the latter which is the subject of much debate.

      === Democratic accountability ===
      In return to its high degree of independence and discretion, the ECB is accountable to the [[European Parliament]] (and to a lesser extent to the European Court of Auditors, the European Ombudsman and the Court of Justice of the EU (CJEU)). Although the accountability mechanisms are not enshrined in EU law, several practices were established following a resolution of the European Parliament adopted in 1998,<ref>{{Cite web|title=Report on democratic accountability in the third phase of European Monetary Union – Committee on Economic and Monetary Affairs and Industrial Policy – A4-0110/1998|url=http://www.europarl.europa.eu/sides/getDoc.do?type=REPORT&reference=A4-1998-0110&language=EN|access-date=8 October 2018|website=europarl.europa.eu|language=en}}</ref> which were informally agreed by the ECB, and incorporated into the Parliament's rule of procedure.<ref>{{Cite web|title=The evolution of the ECB's accountability practices during the crisis|url=https://www.ecb.europa.eu/pub/economic-bulletin/articles/2018/html/ecb.ebart201805_01.en.html|access-date=8 October 2018|website=European Central Bank|date=9 August 2018|language=en}}</ref> In 2023, the European Parliament and the ECB made these accountability arrangements were made more formal by signing an exchange of letter.<ref>[https://www.ecb.europa.eu/pub/pdf/other/Exchange_of_Letters_ECB_European_Parliament_central_banking230605~87aa8ed4a3.en.pdf Exchange of letters between the ECB and the European Parliament]  (5 June 2023)</ref>

      The accountability framework involves five main mechanisms:<ref>{{Cite web|title=Accountability|url=https://www.ecb.europa.eu/ecb/orga/accountability/html/index.en.html|access-date=25 November 2020|website=European Central Bank|date=20 August 2020|language=en}}</ref>

      * '''Annual report:''' the ECB is bound to publish reports on its activities and has to address its annual report to the [[European Parliament]], the [[European Commission]], the [[Council of the European Union]] and the [[European Council]] .<ref name="ECB Acc">{{cite web|title=Accountability|url=http://www.ecb.int/ecb/orga/accountability/html/index.en.html|access-date=15 October 2007|publisher=European Central Bank}}</ref> The report is presented to the European parliament at the occasion of a specific hearing with the ECB's vice-president at the ECON committee.
      * '''Annual parliamentary resolution:''' in return, the European Parliament evaluates the past activities to the ECB via its own annual resolution on the European Central Bank's report (which is essentially a non-legally-binding list of resolutions). Since 2016, the ECB replies to the Parliament's suggestions in an annex to its annual report.
      * '''Quarterly hearings  (known as the "Monetary Dialogue"):''' the [[European Parliament Committee on Economic and Monetary Affairs|Economic and Monetary Affairs Committee of the European Parliament]] organises a hearing with the ECB every quarter,<ref>{{Cite web|title=Monetary dialogue {{!}} ECON Policies {{!}} ECON {{!}} Committees {{!}} European Parliament|url=http://www.europarl.europa.eu/committees/en/econ/monetary-dialogue.html|access-date=6 October 2017|website=europarl.europa.eu|language=en}}</ref> allowing members of parliament to question the ECB president and enter into a discussion with him or her.
      * '''Written parliamentary questions:''' all Members of the European Parliament have the right to address written questions<ref>{{Cite web|title=Questions to the ECB {{!}} Documents {{!}} ECON {{!}} Committees {{!}} European Parliament|url=http://www.europarl.europa.eu/committees/en/econ/questions-ecb.html|access-date=6 October 2017|website=europarl.europa.eu|language=en}}</ref> to the ECB president. The ECB president provides a written answer in about six weeks.
      * '''Appointments:''' The European Parliament is consulted during the appointment process of executive board members of the ECB.<ref name="BF EB">{{cite web|year=2005|title=Executive Board|url=http://www.banque-france.fr/fileadmin/user_upload/banque_de_france/Eurosysteme_et_international/Directoire_GB.pdf|access-date=23 July 2012|publisher=[[Banque de France]]}}</ref> However the Parliament's vote is only consultative, and in practice, the Parliament's opinion – when negative – can be ignored by the European Council.<ref>{{Cite web |date=30 October 2012 |title=Mersch's ECB candidacy survives MEPs' 'No' vote |url=https://www.politico.eu/article/merschs-ecb-candidacy-survives-meps-no-vote/ |access-date=24 October 2023 |website=POLITICO |language=en}}</ref>
      * '''Legal proceedings:''' the ECB's legal personality allows civil society or public institutions to file complaints against the ECB to the Court of Justice of the EU.

      In 2013, an interinstitutional agreement was reached between the ECB and the European Parliament in the context of the establishment of the ECB's Banking Supervision. This agreement sets broader powers to the European Parliament than the established practice on the monetary policy side of the ECB's activities. For example, under the agreement, the Parliament can veto the appointment of the chair and vice-chair of the ECB's supervisory board and may approve removals if requested by the ECB.<ref>{{cite web|title=Interinstitutional Agreement between the European Parliament and the European Central Bank on the practical modalities of the exercise of democratic accountability and oversight over the exercise of the tasks conferred on the ECB within the framework of the Single Supervisory Mechanism|date=30 November 2013 |url=https://www.ecb.europa.eu/ecb/legal/pdf/celex_32013q113001_en_txt.pdf}}</ref>

      === Transparency ===
      In addition to its independence, the ECB is subject to limited transparency obligations in contrast to EU Institutions standards and other major central banks. Indeed, as pointed out by [[Transparency International]], "The Treaties establish transparency and openness as principles of the EU and its institutions. They do, however, grant the ECB a partial exemption from these principles. According to Art. 15(3) TFEU, the ECB is bound by the EU's transparency principles "only when exercising [its] administrative tasks" (the exemption – which leaves the term "administrative tasks" undefined – equally applies to the Court of Justice of the European Union and to the European Investment Bank).<ref>Braun, Benjamin, and Leo Hoffmann-Axthelm. '[https://transparency.eu/wp-content/uploads/2017/03/TI-EU_ECB_Report_DIGITAL.pdf Two Sides of the Same Coin: Independence and Accountability of the European Central Bank]'. Transparency International, March 2017.</ref>

      In practice, there are several concrete examples where the ECB is less transparent than other institutions:
      * '''Voting secrecy:''' while other central banks publish the voting record of its decision makers, the ECB's Governing Council decisions are made in full discretion. Since 2014, the ECB has published "accounts" of its monetary policy meetings,<ref>{{cite press release |url=https://www.ecb.europa.eu/press/pr/date/2014/html/pr140703_1.en.html |title=ECB to adjust schedule of meetings and to publish regular accounts of monetary policy discussions in 2015 |website=European Central Bank |date=3 July 2014 |language=en |access-date=5 November 2017}}</ref> but those remain rather vague and do not include individual votes.
      * '''Access to documents:''' The obligation for EU bodies to make documents freely accessible after a 30-year embargo applies to the ECB. However, under the ECB's Rules of Procedure, the Governing Council may decide to keep individual documents classified beyond the 30 years.<!-- Art. 23.3 Rules of Procedure. See also CJEU in joined cases T-3/00 and T-337/04 -->
      * '''Disclosure of securities:''' The ECB is less transparent than the Fed when it comes to disclosing the list of securities being held in its balance sheet under monetary policy operations such as QE.<ref>{{Cite web|url=http://bruegel.org/2017/11/the-eurosystem-too-opaque-and-costly/|title=The Eurosystem – Too opaque and costly? |website=bruegel.org|language=en-US|access-date=7 November 2017}}</ref>

      ==Location==
      {{Main|Seat of the European Central Bank}}

      [[File:Frankfurt EZB.Nordwest-2.20141228.jpg|thumb|The new ECB headquarters, which opened in 2014]]

      The bank is based in [[Ostend (Frankfurt am Main)|Ostend]] (East End), [[Frankfurt am Main]]. The city is the largest financial centre in the [[Eurozone]] and the bank's location in it is fixed by the [[Amsterdam Treaty]].<ref>{{cite web |at=Protocol on the institutions with the prospect of enlargement of the European Union, Article 2, sole article, (i) |url=http://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:11997D/TXT |access-date=4 January 2015 |title=Treaty of Amsterdam amending the Treaty on European Union, the Treaties establishing the European Communities and certain related acts |date=11 October 1997 |publication-date=23 December 2014}}</ref> The bank moved to a new purpose-built headquarters in 2014, designed by a Vienna-based architectural office, [[Coop Himmelbau]].<ref name="ECB-2007b">{{cite web |title=Winning design by Coop Himmelb(l)au for the ECB's new headquarters in Frankfurt/Main |access-date=2 August 2007 |publisher=European Central Bank |url=http://www.ecb.int/ecb/premises/html/image29.en.html |archive-url=https://web.archive.org/web/20070924213221/http://www.ecb.int/ecb/premises/html/image29.en.html |archive-date=24 September 2007}}</ref> The building is approximately {{convert|180|m|ft|0}} tall and is to be accompanied by other secondary buildings on a landscaped site on the site of the [[Großmarkthalle|former wholesale market]] in the eastern part of Frankfurt am Main. The main construction on a 120,000 m<sup>2</sup> total site area began in October 2008,<ref name="ECB-2007b" /><ref>{{cite press release |title=Launch of a public tender for a general contractor to construct the new ECB premises |date=10 July 2007 |access-date=2 August 2007 |publisher=European Central Bank |url=http://www.ecb.int/press/pr/date/2007/html/pr070710_3.en.html}}</ref> and it was expected that the building would become an architectural symbol for Europe. While it was designed to accommodate double the number of staff who operated in the former [[Eurotower (Frankfurt)|Eurotower]],<ref name="FT new building">{{cite news |last=Dougherty |first=Carter |title=In ECB future, a new home to reflect all of Europe |work=[[International Herald Tribune]] |access-date=2 August 2007 |url=http://www.iht.com/articles/2004/11/16/ecb_ed3_.php | archive-date=19 September 2008 |archive-url=https://web.archive.org/web/20080919022915/http://www.iht.com/articles/2004/11/16/ecb_ed3_.php}}</ref> that building has been retained by the ECB, owing to more space being required since it took responsibility for banking supervision.<ref>{{cite web |publisher=European Central Bank |url=http://www.ecb.europa.eu/ecb/premises/intro/html/index.en.html |title=Overview |access-date=25 September 2019}}</ref>

      == Debates surrounding the ECB ==
      === Debates on ECB independence ===
      [[File:DSCI0115 Blockupy 2014 Transparent EZB.jpg|thumb|Demonstration of the [[Blockupy movement]] in front of the ECB (2014)]]
      {{Essay-like|section|date=May 2020}}The debate on the independence of the ECB finds its origins in the preparatory stages of the construction of the EMU. The German government agreed to go ahead if certain crucial guarantees were respected, such as a European Central Bank independent of national governments and shielded from political pressure along the lines of the German central bank. The French government, for its part, feared that this independence would mean that politicians would no longer have any room for manoeuvre in the process. A compromise was then reached by establishing a regular dialogue between the ECB and the Council of Finance Ministers of the euro area, the Eurogroup.

      ==== Arguments in favour of independence ====
      There is strong consensus among economists on the value of central bank independence from politics.<ref>{{Cite web|last=Vaitilingam|first=Romesh|date=13 May 2019|title=Fed Appointments|url=https://www.igmchicago.org/surveys/fed-appointments/|url-status=live|archive-url=https://web.archive.org/web/20211204174401/https://www.igmchicago.org/surveys/fed-appointments/|archive-date=4 December 2021|access-date=4 December 2021|website=IGM Forum}}</ref><ref>{{Cite web|last=Rampell|first=Catherine|date=15 July 2009|title=Petition for Fed Independence|url=https://economix.blogs.nytimes.com/2009/07/15/petition-for-fed-independence/|url-status=live|archive-url=https://web.archive.org/web/20210128110926/https://economix.blogs.nytimes.com/2009/07/15/petition-for-fed-independence/|archive-date=28 January 2021|access-date=4 December 2021|website=NY Times}}</ref> The rationale behind are both empirical and theoretical. On the theoretical side, it's believed that time inconsistency suggests the existence of political business cycles where elected officials might take advantage of policy surprises to secure reelection. The politician up to the election will therefore be incentivized to introduce expansionary monetary policies, reducing unemployment in the short run. These effects will be most likely temporary. By contrast, in the long run, it will increase inflation, with unemployment returning to the natural rate negating the positive effect. Furthermore, the credibility of the central bank will deteriorate, making it more difficult to answer the market.<ref>{{Cite journal|last=Mishkin|first=Frederic|date=September 2006|title=Monetary Policy Strategy: How Did We Get Here?|url=http://www.nber.org/papers/w12515.pdf|journal=|language=en|location=Cambridge, MA|article-number=w12515|doi=10.3386/w12515|s2cid=154595734}}</ref><ref>{{Cite book|last=European Central Bank.|url=https://data.europa.eu/doi/10.2866/908675|title=The case for central bank independence.|date=2020|publisher=Publications Office|location=LU|doi=10.2866/908675|isbn=978-92-899-4424-3}}</ref><ref>{{Cite journal|last1=Barro|first1=Robert|last2=Gordon|first2=David|date=February 1983|title=Rules, Discretion and Reputation in a Model of Monetary Policy|url=http://www.nber.org/papers/w1079.pdf|journal=|language=en|location=Cambridge, MA|article-number=w1079|doi=10.3386/w1079}}</ref> Additionally, empirical work has been done that defined and measured central bank independence (CBI), looking at the relationship of CBI with inflation.<ref>{{Cite journal|last1=Cukierman|first1=Alex|last2=Web|first2=Steven B.|last3=Neyapti|first3=Bilin|date=1992|title=Measuring the Independence of Central Banks and Its Effect on Policy Outcomes|journal=The World Bank Economic Review|volume=6|issue=3|pages=353–398|doi=10.1093/wber/6.3.353|issn=0258-6770}}</ref>

      ==== The arguments against too much independence ====

      ===== An independence that would be the source of a democratic deficit. =====
      According to Christopher Adolph, the alleged neutrality of central bankers is only a legal façade and not an indisputable fact.<ref name="Adolph, Christopher, 1976–2013">{{Cite book|last=Adolph |first=Christopher |title=Bankers, bureaucrats, and central bank politics: the myth of neutrality|date=2013|publisher=Cambridge University Press|isbn=978-1-139-61681-2|location=New York|oclc=844940155}}</ref>

      '''The crisis: an opportunity to impose its will and extend its powers''':

      – ''Its participation in the [[European troika|troika]]'': Thanks to its three factors which explain its independence, the ECB took advantage of this crisis to implement, through its participation in the troika, the famous structural reforms in the Member States aimed at making, more flexible the various markets, particularly the labour market, which are still considered too rigid under the [[ordoliberal concept]].<ref name="Delaume 2015 75">{{Cite journal|last=Delaume|first=Coralie|date=2015|title=Où va la Banque centrale européenne ?: De la technique à la politique, sans la démocratie|url=http://www.cairn.info/revue-le-debat-2015-5-page-75.htm|journal=Le Débat|language=fr|volume=187|issue=5|page=75|doi=10.3917/deba.187.0075|issn=0246-2346|url-access=subscription}}</ref>

      - ''[[Macro-prudential supervision]]'' : At the same time, taking advantage of the reform of the financial supervision system, the Frankfurt Bank has acquired new responsibilities, such as macro-prudential supervision, in other words, supervision of the provision of financial services.<ref>{{Cite journal|last=Fontan|first=Clément|date=2010|title=Chantiers de recherche transfert d'idée et résistances au changement: le cas de la banque centrale européenne après la crise.: Questionnement scientifique et objectifs de la thèse|journal=Politique Européenne|language=fr|volume=30|issue=1|page=225|doi=10.3917/poeu.030.0225|issn=1623-6297|doi-access=free}}</ref>

      -''Take liberties with its mandate to save the Euro'' : Paradoxically, the crisis undermined the ECB's ordoliberal discourse "because some of its instruments, which it had to implement, deviated significantly from its principles. It then interpreted the paradigm with enough flexibly to adapt its original reputation to these new economic conditions. It was forced to do so as a last resort to save its one and only raison d'être: the euro. This Independent was thus obliged to be pragmatic by departing from the spirit of its statutes, which is unacceptable to the hardest supporters of ordoliberalism, which will lead to the resignation of the two German leaders present within the ECB: the governor of the Bundesbank, Jens WEIDMANN<ref>{{Cite web|last=Raymond|first=Grégory|title=Jens Weidmann, l'homme qui dit "non" à toute l'Europe|url=https://www.huffingtonpost.fr/2012/08/30/jens-weidmann-bundesbank-draghi-merkel-euro_n_1843003.html|website=huffingtonpost.fr|date=31 August 2012}}</ref> and the member of the executive board of the ECB, Jürgen STARK.<ref>{{Cite web|agency=Reuters|date=11 September 2011|title=La démission de Jürgen Stark de la BCE vient au pire moment|url=https://www.lexpress.fr/archives/economie/2011/09/11/|website=lexpansion.lexpress.fr/}}</ref>

      – ''Regulation of the financial system'' : The delegation of this new function to the ECB was carried out with great simplicity and with the consent of European leaders, because neither the Commission nor the Member States really wanted to obtain the monitoring of financial abuses throughout the area. In other words, in the event of a new financial crisis, the ECB would be the perfect scapegoat.<ref>{{Cite journal|last=Lebaron|first=Frédéric|date=2014|title=Quand le gardien du Temple devient le sauveur des marchés financiers|url=http://www.cairn.info/revue-savoir-agir-2014-1-page-5.htm|journal=Savoir/Agir|language=fr|volume=27|issue=1|pages=5–9|doi=10.3917/sava.027.0005|issn=1958-7856|url-access=subscription}}</ref>

      - ''Capturing exchange rate policy'' : The event that will most mark the definitive politicization of the ECB is, of course, the operation launched in January 2015: the [[quantitative easing]] (QE) operation. Indeed, the Euro is an overvalued currency on the world markets against the dollar and the euro zone is at risk of deflation. In addition, Member States find themselves heavily indebted, partly due to the rescue of their national banks. The ECB, as the guardian of the stability of the euro zone, is deciding to gradually buy back more than EUR 1 100 billion Member States' public debt. In this way, money is injected back into the economy, the euro depreciates significantly, prices rise, the risk of deflation is removed, and Member States reduce their debts. However, the ECB has just given itself the right to direct the exchange rate policy of the euro zone without this being granted by the Treaties or with the approval of European leaders, and without public opinion or the public arena being aware of this.<ref name="Delaume 2015 75"/>

      ===== The arguments in favour of a counter power =====
      In the aftermath of the euro area crisis, several proposals for a countervailing power were put forward, to deal with criticisms of a democratic deficit. For the German economist German Issing (2001) the ECB as a democratic responsibility and should be more transparent. According to him, this transparency could bring several advantages as the improvement of efficiency and credibility by giving the public adequate information. Others think that the ECB should have a closer relationship with the European Parliament which could play a major role in the evaluation of the democratic responsibility of the ECB.<ref name="Barbier-Gauchard, Amélie 1978-....">{{Cite book|last=Barbier-Gauchard, Amélie (1978–....).|title=La gouvernance économique de la zone euro: réalités et perspectives|date=15 May 2018|others=Sidiropoulos, Moïse., Varoudakis, Aristomène (1958–....)., De Grauwe, Paul (1946–....).|isbn=978-2-8073-2010-9|location=Louvain-la-Neuve|oclc=1041143371}}</ref> The development of new institutions or the creation of a minister is another solution proposed:

      '''Towards democratic institutions ?'''

      The absence of democratic institutions such as a Parliament or a real government is a regular criticism of the ECB in its management of the euro area, and many proposals have been made in this respect, particularly after the economic crisis, which would have shown the need to improve the governance of the euro area. For Moïse Sidiropoulos, a professor in economy: "The crisis in the euro zone came as no surprise, because the euro remains an unfinished currency, a stateless currency with a fragile political legitimacy".<ref>{{Cite web|date=2019|title=L'euro reste une monnaie inachevée|url=http://www.recherche.unistra.fr/index.php?id=30096|website=Université de Strasbourg}}</ref>

      French economist [[Thomas Piketty]] wrote on his blog in 2017 that it was essential to equip the eurozone with democratic institutions. An economic government could for example enable it to have a common budget, common taxes and borrowing and investment capacities. Such a government would then make the euro area more democratic and transparent by avoiding the opacity of a council such as the Eurogroup.

      Nevertheless, according to him "there is no point in talking about a government of the eurozone if we do not say to which democratic body this government will be accountable", a real parliament of the eurozone to which a finance minister would be accountable seems to be the real priority for the economist, who also denounces the lack of action in this area.<ref>{{Cite news|last=PIKETTY|first=Thomas|date=1 February 2017|title=Pour un gouvernement enfin démocratique de la zone euro|work=Le Monde|url=https://www.lemonde.fr/blog/piketty/2017/02/01/pour-un-vrai-gouvernement-de-la-zone-euro/|access-date=28 March 2020}}</ref>

      The creation of a sub-committee within the current European Parliament was also mentioned, in the model of the Eurogroup, which is currently an under-formation of the ECOFIN Committee. This would require a simple amendment to the rules of procedure and would avoid a competitive situation between two separate parliamentary assemblies. The former President of the European Commission had, moreover, stated on this subject that he had "no sympathy for the idea of a specific Eurozone Parliament".<ref>{{Cite web|date=September 2014|title=RÉFORMER LA " GOUVERNANCE " EUROPÉENNE POUR UNE FÉDÉRATION D'ÉTATS NATIONS PLUS LÉGITIME ET PLUS EFFICACE|url=https://institutdelors.eu/wp-content/uploads/2018/01/reformergouvernanceue-bertoncini-vitorino-ne-ijd-sept14.pdf|website=Institut Jacques Delors}}</ref>

      ==== Debates on the role of central bank reserves in monetary policy ====
      [[Paul De Grauwe|Paul de Grauwe]] and Yuemei Ji criticizes the prevailing role of central bank reserves in monetary policy.<ref>{{Cite journal |last1=De Grauwe |first1=Paul |last2=Ji |first2=Yuemei |date=2023 |title=Fighting Inflation More Effectively Without Transferring Central Banks' Profits to Banks |url=https://www.ssrn.com/abstract=4626501 |journal=SSRN Electronic Journal |language=en |doi=10.2139/ssrn.4626501 |issn=1556-5068}}</ref><ref>{{Cite web |last=de Grauwe |first=Paul |date=4 September 2023 |title=The role of central bank reserves in monetary policy: Bundesbank Invited Speakers Series |url=https://www.bundesbank.de/en/service/dates/the-role-of-central-bank-reserves-in-monetary-policy-913968 |access-date=26 November 2023 |website=Deutsche Bundesbank}}</ref> Due to past Quantitative Easing and refinancing operations (TLTROs), major central banks are currently operating in a regime of abundance of central bank reserves. As a result, when the ECB raised interest rates in response to the 2021–2023 inflation, it automatically led to a sharp increase in interest payments from the ECB to banks (while interest incomes from monetary portfolio remained stagnant leading to an unprecedented transfer of around 150 billions from the Eurosystem to commercial banks, which is nearly equivalent to the annual EU budget spending. Paul De Grauwe argues that these transfers lack economic rationale. Several Members of the European Parliament have also criticized the ECB for unduly boosting banks' profits.<ref>Written questions to the ECB by Pedro Marques, René Repasi, Paul Tang (S&D) and Rasmus Andresen, Henrike Hahn, Ville Niinistö, Ernest Urtasun ([https://www.europarl.europa.eu/doceo/document/ECON-QZ-752612_EN.pdf Z-000019/2023]), Manon Aubry ([https://www.europarl.europa.eu/doceo/document/ECON-QZ-745477_EN.pdf Z-000011/2023]), Bas Eickhout, Henrike Hahn, Rasmus Andresen, Ernest Urtasun ([https://www.europarl.europa.eu/doceo/document/ECON-QZ-746989_EN.pdf Z-746989_EN.pdf])</ref>

      ==== Debates on the ECB's "Digital Euro" project ====

      In November 2025, a group of large European banks publicly voiced resistance to the ECB's plan for a digital euro, arguing that it would duplicate existing payment infrastructures and incur excessive costs.<ref>https://www.ft.com/content/1654675a-9e8f-4a5e-b174-730ae0c3ab37</ref>

