      *{{cite news|title=CNN's Kate Bolduan Rips NBA for Silencing Exec Who Criticized China: 'This is Shocking'|work=[[Mediaite]]|url=https://www.mediaite.com/sports/cnns-kate-bolduan-rips-nba-for-silencing-exec-who-criticized-china-this-is-shocking/}}
      *{{cite news|date=7 October 2019|title=Opinion: The NBA was staring down a China problem with or without Daryl Morey's tweet|publisher=LAT|agency=LAT|url=https://www.latimes.com/opinion/story/2019-10-07/daryl-morey-nba-china-problem}}
      *{{cite news|date=7 October 2019|title=The day the NBA fluttered before China|newspaper=The Washington Post|agency=Chron|url=https://www.chron.com/opinion/article/The-day-the-NBA-fluttered-before-China-14499738.php}}
      *{{cite news|date=8 October 2019|title=Daryl Morey's tweet on Hong Kong shows how China is calling the shots in the NBA|work=[[NBC News]]|url=https://www.nbcnews.com/think/opinion/daryl-morey-s-tweet-hong-kong-shows-how-china-calling-ncna1063551}}
      *{{cite news|title=NBA Defends 'Freedom Of Speech' For Employees As China Moves To Block Games Facebook Twitter Flipboard Email|work=[[NPR]]|url=https://www.npr.org/2019/10/08/768225490/nba-defends-freedom-of-speech-for-employees-as-china-moves-to-block-block-games|quote=Critics in the U.S. are accusing the NBA of prioritizing profits over principles. And critics in China also cried foul, saying the league is being insensitive in handling a politically divisive issue.}}
      </ref> Critics also contrasted the league's disparate response to Morey's tweet with its history of political activism<ref name="statementcriticcompare">Some relevant sources include:
       
      *{{cite news|date=8 October 2019|title=China's heavy-handed reaction to the NBA is just the wake-up call the world needed|work=[[CNBC]]|url=https://www.cnbc.com/2019/10/08/chinas-reaction-to-the-nba-is-the-wake-up-call-the-world-needed.html|quote=The NBA is not likely to face a debilitating series of protests from U.S. fans who may be angered by the league's agonizingly cautious and wavering responses to Morey's tweet. But the extreme attention the story has garnered does weaken the NBA's efforts to cast itself as a force for positive social change. Commissioner Adam Silver's public declaration of his "personal outrage" over the racist comments made by former L.A. Clippers owner Donald Sterling in 2014, and his pushback against the passing of the controversial transgender bathroom law in North Carolina in 2016 seem inconsistent now with a league that remains silent about China's many human rights abuses.}}
      *{{cite news|date=7 October 2019|title=Sixers have a chance to show some guts about the NBA and China. They're passing it up. {{!}} Mike Sielski|work=[[Philadelphia Inquirer]]|url=https://www.inquirer.com/sixers/philadelphia-76ers-china-daryl-morey-nba-tweet-loong-lions-20191007.html}}
      *{{cite news|date=7 October 2019|title=The World's Wokest Sports League Bows to China|publisher=NYT|agency=NYT|url=https://www.nytimes.com/2019/10/07/opinion/nba-china-hong-kong.html}}
      *{{cite news|date=7 October 2019|title=Opinion: The NBA was staring down a China problem with or without Daryl Morey's tweet|work=[[Los Angeles Times]]|url=https://www.latimes.com/opinion/story/2019-10-07/daryl-morey-nba-china-problem}}
      *{{cite news|title=Opinion: It's time for LeBron James to speak out on China, regardless of Nike ties|publisher=USAToday|agency=USAToday|url=https://www.usatoday.com/story/sports/columnist/josh-peter/2019/10/07/lebron-james-china-hong-kong-controversy/3903187002/}}
      *{{cite news|date=7 October 2019|title=The day the NBA fluttered before China|newspaper=The Washington Post|agency=Chron|url=https://www.chron.com/opinion/article/The-day-the-NBA-fluttered-before-China-14499738.php}}
      </ref>  The statements also drew criticism from PRC state-run media for their perceived insufficiency, as Morey did not apologize.<ref>{{cite news|author1=陈远丁|author2=黄钰|author3=席莉莉|title=莫雷、NBA声明均未道歉 网友：这是对中国的无视和挑衅|trans-title=Morey & NBA did not apologize; Netizens: It's provocative behavior toward China|url=http://society.people.com.cn/n1/2019/1007/c428181-31385995.html|access-date=8 October 2019|work=人民网|date=7 October 2019|language=zh}}</ref><ref>{{cite news|title=央视快评：莫雷必须道歉|trans-title=Morey Must Apologize|url=http://tv.cctv.com/2019/10/07/VIDEOS2ZjZVo3Y3gnh4Ck92p191007.shtml|access-date=8 October 2019|work=CCTV|date=7 October 2019|language=zh}}</ref>
       
      Many American companies, including [[Delta Air Lines]], [[Coach New York]], [[Marriott International]], [[Calvin Klein]] and [[Tiffany & Co.]] have apologized to China after "offending" the country and China's ruling Communist Party.<ref>{{cite news|date=8 October 2019|title=The NBA landed in hot water after the Houston Rockets GM supported the Hong Kong protests. Here are other times Western brands caved to China after offending the Communist Party.|work=[[Business Insider]]|url=https://www.businessinsider.com/western-companies-apologize-china-communist-party-list-2019-10#christian-dior-after-an-employee-reportedly-used-a-map-of-china-that-did-not-include-taiwan-in-a-presentation-2}}</ref>
      [[File:Xinjiang Internment Map, US-Aus Gov Assessment.jpg|thumb|[[Xinjiang internment camps]]. The United States officially recognized the Chinese government's treatment of the [[Uyghurs]] in Xinjiang as a genocide.]]In 2020, Chinese diplomats increasingly adopted "[[wolf warrior diplomacy]]" to deny all accusations of human rights abuses.<ref name="vox._HowC">{{Cite news|last=Ward|first=Alex|date=21 December 2020|title=How China's 'wolf warrior' diplomats use Twitter to troll Beijing's enemies|work=[[Vox (website)|Vox]]|url=https://www.vox.com/22167626/china-wolf-warrior-twitter-online-interview|access-date=28 July 2021|archive-date=29 July 2021|archive-url=https://web.archive.org/web/20210729005551/https://www.vox.com/22167626/china-wolf-warrior-twitter-online-interview|url-status=live}}</ref><ref name="cnn._China_is">{{Cite web|title=China is embracing a new brand of wolf warrior diplomacy|last1=Westcott|first1=Ben|last2=Jiang|first2=Steven|work=CNN|date=29 May 2020|access-date=8 October 2021|url= https://www.cnn.com/2020/05/28/asia/china-wolf-warrior-diplomacy-intl-hnk/index.html}}</ref> Chinese foreign ministry spokesperson [[Zhao Lijian]] tweeted that as long as the U.S. had problems itself, it "had no right" to criticize China on human rights abuses.<ref name="cnn._China_is"/>

      The second administration of Donald Trump has downplayed concerns about human rights in relations between the US and China.<ref>{{Cite web |title=The Trump Administration Talks Tough on China, But Enables the CCP's Repressive Behaviors |url=https://thediplomat.com/2025/09/the-trump-administration-talks-tough-on-china-but-enables-the-ccps-repressive-behaviors/ |access-date=5 December 2025 |website=The Diplomat}}</ref>

      ====Xinjiang====
      American criticism of China on human rights, especially on the issue of the [[Xinjiang internment camps]], significantly expanded at the end of 2018 and in 2019.<ref>{{Cite news |date=23 September 2018 |title=US criticises treatment of Uighurs in latest China row |url=https://www.straitstimes.com/world/united-states/us-criticises-treatment-of-uighurs-in-latest-china-row-0 |access-date=22 August 2019 |newspaper=[[The Straits Times]] |agency=[[Agence France Presse]]}}</ref> In March 2019, U.S. Secretary of State [[Mike Pompeo]] indirectly compared China to the [[Nazi Germany]] by saying that the roundup of Muslim minorities to into camps had not been seen "since the 1930s".<ref>{{Cite news |last=Sanger |first=David E. |date=13 March 2019 |title=State Dept. Accuses China of Rights Abuses Not Seen 'Since the 1930s' |url=https://www.nytimes.com/2019/03/13/us/politics/state-department-human-rights-abuses.html |access-date=22 August 2019 |work=The New York Times |issn=0362-4331}}</ref><ref>{{Cite web |date=13 March 2019 |title=State Department compares China to Nazi Germany in human rights briefing |url=https://www.washingtonexaminer.com/policy/defense-national-security/state-department-compares-china-to-nazi-germany-in-human-rights-briefing |access-date=22 August 2019 |website=Washington Examiner}}</ref> In May 2019, the United States government accused China of putting [[Uyghurs]] in "[[concentration camps]]".<ref>{{Cite news |date=4 May 2019 |title=China putting minority Muslims in 'concentration camps,' U.S. says |url=https://www.reuters.com/article/us-usa-china-concentrationcamps-idUSKCN1S925K |access-date=22 August 2019 |work=Reuters}}</ref> The U.S. government has also considered sanctioning Chinese officials involved in the camps, including [[Chen Quanguo]], the [[Chinese Communist Party Committee Secretary]] of [[Xinjiang Uyghur Autonomous Region|Xinjiang]] and a member of the [[19th Politburo of the Chinese Communist Party]] although no CCP Politburo member has ever been sanctioned by the U.S. government.<ref>{{Cite web |date=4 April 2019 |title=Top Xinjiang official Chen Quanguo should face sanctions – US lawmakers |url=https://www.scmp.com/news/china/diplomacy/article/3004602/chinas-top-xinjiang-official-chen-quanguo-should-face |access-date=22 August 2019 |website=South China Morning Post}}</ref><ref>{{Cite news |date=29 May 2019 |title=Rights group urges U.S. to sanction China over Xinjiang camps |url=https://www.reuters.com/article/us-china-usa-xinjiang-rights-idUSKCN1SZ22E |access-date=22 August 2019 |work=Reuters}}</ref>

      On 9 July 2020, the [[United States]] announced [[US Sanctions|sanctions]] against Chinese politicians, who as per its record were responsible for [[human rights]] violations against [[Uyghurs|Muslim minorities]] in [[Xinjiang]].<ref>{{cite news |date=9 July 2020 |title=Xinjiang: US sanctions on Chinese officials over 'abuse' of Muslims |url=https://www.bbc.co.uk/news/world-us-canada-53355697 |access-date=9 July 2020 |work=BBC News}}</ref> On 20 July 2020, U.S. government sanctioned 11 new [[List of companies of China|Chinese companies]] from purchasing American technology and products over human rights violations in China targeting [[Uyghurs]] in the [[Xinjiang]] region.<ref>{{cite news |last1=Swanson |first1=Ana |date=20 July 2020 |title=U.S. Imposes Sanctions on 11 Chinese Companies Over Human Rights |url=https://www.nytimes.com/2020/07/20/business/economy/china-sanctions-uighurs-labor.html |access-date=20 July 2020 |work=The New York Times}}</ref> On 15 September 2020, the U.S. government decided to take steps to block some exports from Xinjiang, over the country's alleged [[human rights abuses]] directed mostly against Uyghurs of the region.<ref>{{cite news |date=15 September 2020 |title=Xinjiang: US to block some exports citing China's human rights abuses |url=https://www.bbc.com/news/business-54155809 |access-date=15 September 2020 |work=BBC News}}</ref>

      On 19 January 2021, Mike Pompeo officially declared that China is committing a [[21st century genocides#Allegations of genocide against Uyghurs|genocide against Uyghurs]] in the Xinjiang region.<ref name="PompeoDeclaresUighurGenocide">{{Cite news|date=20 January 2021|title=EXPLAINER: Why US accused China of genocide and what's next|website=[[The Independent]]|url=https://www.independent.co.uk/news/explainer-why-us-accused-china-of-genocide-and-whats-next-china-xinjiang-labor-us-genocide-b1789886.html|access-date=20 January 2021}}</ref> Pompeo called for "all appropriate multilateral and relevant juridical bodies, to join the United States in our effort to promote accountability for those responsible for these atrocities".<ref name="theguardian.com">{{Cite news|date=19 January 2021|title=Mike Pompeo declares China's treatment of Uighurs 'genocide'|website=[[The Guardian]]|url=https://www.theguardian.com/world/2021/jan/19/mike-pompeo-china-uighur-genocide-sanctions-xinjiang|access-date=21 January 2021}}</ref> [[Salih Hudayar]], the prime minister of the [[East Turkistan Government-in-Exile]] (who claim to be the legitimate government of Xinjiang), has said, "We hope that this designation will lead to real strong actions to hold China accountable and bring an end to China's genocide."<ref name="cnGenocide">{{cite news|date=20 January 2021|title=U.S. Says China Is Committing Genocide Against Uighur Muslims |work=The Wall Street Journal|url=https://www.wsj.com/articles/u-s-declares-chinas-treatment-of-uighur-muslims-to-be-genocide-11611081555|access-date=22 January 2021}}</ref>
       
      On 20 January 2021, China imposed sanctions against outgoing U.S. Secretary of State [[Mike Pompeo]], former [[United States Secretary of Health and Human Services|secretary of health and human services]] [[Alex Azar]], former under secretary of state [[Keith J. Krach]], outgoing U.S. ambassador to the United Nations [[Kelly Craft]], and 24 other former Trump officials.<ref name="Ramzy-2021">{{Cite news|url = https://www.nytimes.com/2021/01/24/world/asia/china-taiwan-strait-exercise-biden.html|title = China Sends Warplanes to Taiwan Strait in a Show of Force to Biden|newspaper = The New York Times|date = 24 January 2021|last1 = Ramzy|first1 = Austin|access-date = 7 June 2021|archive-date = 17 June 2021|archive-url = https://web.archive.org/web/20210617223559/https://www.nytimes.com/2021/01/24/world/asia/china-taiwan-strait-exercise-biden.html|url-status = live}}</ref> Biden's [[United States National Security Council|National Security Council]] called the sanctions "unproductive and cynical".<ref name="PompeoSanctioned">{{cite news|url= https://www.reuters.com/article/us-usa-china-sanctions-idUSKBN29Q09B|access-date= 21 January 2021|website= Reuters|title= Biden administration calls China sanctions on Trump officials 'unproductive and cynical'|date= 21 January 2021|last1= Martina|first1= Michael|archive-date= 9 October 2021|archive-url= https://web.archive.org/web/20211009130703/https://www.reuters.com/article/us-usa-china-sanctions-idUSKBN29Q09B|url-status= live}}</ref> In his nomination hearing, Blinken endorsed Pompeo's report that China is committing a genocide against Uyghurs, reaffirming Biden's campaign stance.<ref name="Bernstein-2021" />
       
      On 31 October 2022, the United States, on behalf of 50 countries, delivered a joint statement to the UN General Assembly Third Committee expressing concern over human rights violations against Uyghurs and other Muslim minorities in Xinjiang, citing UN findings of arbitrary and discriminatory detention and urging China to meet its international obligations.<ref>{{Cite web |date=31 October 2022 |title=Joint Statement on Behalf of 50 countries in the UN General Assembly Third Committee on the Human Rights Situation in Xinjiang, China |url=https://usun.usmission.gov/joint-statement-on-behalf-of-50-countries-in-the-un-general-assembly-third-committee-on-the-human-rights-situation-in-xinjiang-china/ |access-date=9 June 2025 |website=US Mission to the UN}}</ref>

      Since 2024, Xinjiang has featured less prominently in relations between the U.S. and China.<ref>{{cite news |date=22 April 2024 |title=Blinken says genocide in Xinjiang is ongoing in report ahead of China visit |url=https://www.reuters.com/world/blinken-says-genocide-xinjiang-is-ongoing-report-ahead-china-visit-2024-04-22/ |work=[[Reuters]]}}</ref>

      === Competition for regional influence ===
      {{see also|Free and Open Indo-Pacific|United States foreign policy toward the People's Republic of China}}
       
      China's economic rise has led to some geo-political friction between the U.S. and China in [[East Asia]]<ref>{{Cite news|url=https://www.nytimes.com/2010/09/23/world/asia/23china.html|title=U.S. Influence in Asia Revives Amid China's Disputes|last=Wong|first=Edward|date=22 September 2010|work=The New York Times|access-date=25 October 2019 |issn=0362-4331}}</ref> as well as to an extent in [[Southeast Asia]]<ref>{{Cite web|url=https://www.cnbc.com/2020/06/12/china-is-more-powerful-than-the-us-in-southeast-asia-csis-survey-shows.html|title = China's influence in Southeast Asia is growing — and the U.S. Has some catching up to do|website = [[CNBC]]|date = 12 June 2020}}</ref> and in Central Asia including Afghanistan.<ref>{{Cite news|url=https://www.wsj.com/articles/russia-china-vie-for-influence-in-central-asia-as-u-s-plans-afghan-exit-11560850203|title = Russia, China Vie for Influence in Central Asia as U.S. Plans Afghan Exit|newspaper = Wall Street Journal|date = 18 June 2019}}</ref> For example, in response to China's response to the [[bombardment of Yeonpyeong]] by North Korea, "Washington is moving to redefine its relationship with South Korea and Japan, potentially creating an anti-China bloc in [[Northeast Asia]] that officials say they don't want but may need."<ref>Pomfret, John. [https://www.washingtonpost.com/wp-dyn/content/article/2010/12/05/AR2010120503513.html?hpid=moreheadlines "U.S. steps up pressure on China to rein in North Korea."] ''[[The Washington Post]]'', 6 December 2010.</ref> The Chinese government fears a conspiracy by the U.S. to encircle it.<ref>[[Willy Lam|Lam, Willy Wo-Lap]]. [http://www.asiamedia.ucla.edu/article.asp?parentid=22963 "Beijing's Alarm Over New 'US Encirclement Conspiracy'."] {{Webarchive|url=https://web.archive.org/web/20120307183235/http://www.asiamedia.ucla.edu/article.asp?parentid=22963|date=7 March 2012}} ''[[Jamestown Foundation]]'', 12 April 2005</ref>{{better source needed|date=August 2014}}
       
      China and the United States have recently led competing efforts to gain  Influence in East Asian and the Greater Asian-Pacific trade and development. In 2015, China led the creation of the [[Asian Infrastructure Investment Bank]] with the goal of financing projects that would spur the development of the lower-tier Asian economies, thus facilitating improved economic ties across the region. It has been suggested that the United States considered the AIIB to be a challenge to the US-backed [[Asian Development Bank]] and the [[World Bank]] and saw the Chinese effort as an attempt to set the global economic agenda on terms that would be formulated by the Chinese government.<ref>{{cite news|last1=Perlez|first1=Jane|title=China Creates a World Bank of Its Own, and the U.S. Balks|url=https://www.nytimes.com/2015/12/05/business/international/china-creates-an-asian-bank-as-the-us-stands-aloof.html|website=The New York Times|date=4 December 2015|access-date=11 May 2017}}</ref> The Obama administration led an effort to enact the [[Trans-Pacific Partnership Agreement]], a multilateral trade pact between a number of Pacific Rim countries, which excluded China. According to the [[US Trade Representative]], the agreement was designed to "promote economic growth; support the creation and retention of jobs; enhance innovation, productivity and competitiveness; raise living standards; reduce poverty in the signatories' countries; and promote transparency, good governance, and enhanced labor and environmental protections."<ref name="ustr100620152">{{cite web|url=https://ustr.gov/about-us/policy-offices/press-office/press-releases/2015/october/summary-trans-pacific-partnership|title=Summary of the Trans-Pacific Partnership Agreement|date=4 October 2015|publisher=USTR|access-date=16 October 2015}}</ref>  The Partnership was anticipated to impose costs on businesses dependent on regional markets.<ref>{{Cite journal|last1=Gulotty|first1=Robert|last2=Li|first2=Xiaojun|date=30 July 2019|title=Anticipating exclusion: Global supply chains and Chinese business responses to the Trans-Pacific Partnership|url=https://doi.org/10.1017/bap.2019.8|journal=Business and Politics|volume=22|issue=2|pages=253–278|doi=10.1017/bap.2019.8|s2cid=201359183|url-access=subscription}}</ref> The deal was placed on hold after the U.S. withdrew from the agreement on 23 January 2017.<ref name="bbc-exexutiveorder">{{cite news|title=Trump executive order pulls out of TPP trade deal|work=BBC News|date=23 January 2017|url=https://www.bbc.co.uk/news/world-us-canada-38721056|access-date=23 January 2017| quote = Mr Trump's executive order on TPP is seen as mainly symbolic since the deal was never ratified by a divided US Congress.}}</ref> The efforts are among the attempts by both the U.S. and China to increase their influence over the Asia-Pacific by strengthening their economic ties within the region.
       
      In 2009, the United States requested China to open the [[Wakhjir Pass]] on the [[Afghanistan-China border|Sino-Afghan]] border as an alternative supply route for the U.S. and NATO during their [[War in Afghanistan (2001-present)|operations in Afghanistan]].<ref>{{Cite journal|url=https://link.springer.com/article/10.1007/s40647-014-0017-z|doi = 10.1007/s40647-014-0017-z|title = Geo-political Significance of the Wakhan Corridor for China|year = 2014|last1 = Malik|first1 = Hasan Yaser|journal = Fudan Journal of the Humanities and Social Sciences|volume = 7|issue = 2|pages = 307–323|s2cid = 140705773|url-access = subscription}}</ref><ref>{{Cite web|last=Kendrick Foster|date=5 December 2019|title=The New Road to Conflict: Geopolitics of the Wakhan Corridor|url=https://hir.harvard.edu/wakhancorridor/|website=[[Harvard International Review]]}}</ref> China refused the request.<ref>{{Cite web|last=VINAY KAURA|date=July 2021|title=The Pakistan Factor in China's Afghanistan Policy: Emerging Regional Faultlines amid US Withdrawal |url=https://www.mei.edu/sites/default/files/2021-07/The%20Pakistan%20Factor%20in%20China’s%20Afghanistan%20Policy%20-%20Emerging%20Regional%20Faultlines%20amid%20US%20Withdrawal.pdf|website=[[Middle East Institute]]}}</ref>
       
      [[ASEAN]] and the various Southeast Asian states have responded to Chinese claims for sea areas by seeking closer relations with the United States.<ref>Slavin, Erik. [http://www.stripes.com/news/china-s-claim-on-sea-leads-asian-neighbors-to-strengthen-ties-with-u-s-1.147599 "China's claim on sea leads Asian neighbors to strengthen ties with U.S."] ''[[Stars and Stripes (newspaper)|Stars and Stripes]]'', 27 June 2011.</ref> American Defense Secretary [[Leon Panetta]] said that in spite of budget pressures, the United States would expand its influence in the region to counter China's military buildup.<ref>Entous, Adam. [https://www.wsj.com/articles/SB10001424052970203911804576653160176584104 "Pentagon Will Add to Asia Operations."] ''The Wall Street Journal'', 26 October 2011.</ref>
       
      Shared concerns in the face of China have prompted the United States to step up cooperation with China's geopolitical rivals such as [[India]], drawing greater opposition from China.<ref>{{cite news|title=U.S. Seeks Closer Ties With India as Tension With China and Russia Builds|url=https://www.nytimes.com/2022/11/11/business/us-india-relations.html|work=[[The New York Times]]|date=11 November 2022|access-date=11 November 2022|last1=Rappeport|first1=Alan|last2=Swanson|first2=Ana}}</ref>
       
      In the Chinese view, the United States has broken trust in the bilateral relationship through a containment strategy implemented via the Obama administration's [[East Asian foreign policy of the Barack Obama administration|pivot to East Asia and the Asia-Pacific]], the development of the TPP, and the [[First Trump tariffs|trade war]] launched by the Trump administration.<ref name="Roach-2022" />{{Rp|page=293}}
       
      ===Cyberwarfare and election interference===
      {{See also|American espionage in China|Chinese espionage in the United States|List of Chinese spy cases in the United States}}
       
      The [[United States Department of Justice|US Department of Justice]] investigation into fundraising activities uncovered evidence that Chinese agents sought to direct contributions from foreign sources to the [[Democratic National Committee]] (DNC) before the [[1996 United States presidential election|1996 presidential campaign]]. The [[Embassy of China in Washington, D.C.|Chinese embassy]] in [[Washington, D.C.]], was used to co-ordinate contributions to the DNC.<ref>Woodward, Bob and Duffy, Brian, [https://www.washingtonpost.com/wp-srv/politics/special/campfin/stories/china1.htm "Chinese Embassy Role In Contributions Probed"], ''The Washington Post'', 13 February 1997</ref><ref>{{cite news|title=Findings Link Clinton Allies to Chinese Intelligence|url=https://www.washingtonpost.com/gdpr-consent/?destination=%2farchive%2fpolitics%2f1998%2f02%2f10%2ffindings-link-clinton-allies-to-chinese-intelligence%2f87265d5d-7452-41f2-ad2f-aa4abe7e579e%2f%3f|newspaper=The Washington Post|date=11 February 1998}}</ref>
       
      In 2014, [[cyberwarfare in China|Chinese hackers]] hacked the computer system of the [[US Office of Personnel Management]],<ref>{{Cite web|url=http://www.cnn.com/2017/08/24/politics/fbi-arrests-chinese-national-in-opm-data-breach/index.html|title=FBI arrests Chinese national connected to malware used in OPM data breach|last=Perez|first=Evan|website=CNN|date=24 August 2017}}</ref> resulting in the [[Office of Personnel Management data breach|theft of approximately 22 million]] personnel records that were handled by the office.<ref name="hack">"[https://www.washingtonpost.com/news/federal-eye/wp/2015/07/09/hack-of-security-clearance-system-affected-21-5-million-people-federal-authorities-say/ Hacks of OPM databases compromised 22.1 million people, federal authorities say]". ''The Washington Post.'' 9 July 2015.</ref> Former FBI Director [[James Comey]] stated, "It is a very big deal from a national security perspective and from a counterintelligence perspective. It's a treasure trove of information about everybody who has worked for, tried to work for, or works for the United States government."<ref name="hack"/>
       
      In October 2018, the [[United States Senate Committee on Homeland Security and Governmental Affairs|Senate Homeland Security and Governmental Affairs Committee]] held a hearing on the threat to the U.S. posed by China. Before the hearing, [[Bloomberg News|Bloomberg]] released an article that stated that China is embedding technology in microchips that are sent to America that collect data on American consumers. However, both FBI Director Christopher Wray and Homeland Security Secretary [[Kirstjen Nielsen]] declined to confirm that statement. Nielsen said that China has become a major threat to the U.S. and also confirmed, in an answer to a question from a senator, that China is trying to influence U.S. elections.<ref>{{Cite news|url=https://homelandprepnews.com/stories/30822-threats-posed-by-china-focus-of-senate-homeland-security-hearing/|title=Threats posed by China focus of Senate Homeland Security hearing |last=Roberts|first=Ed|date=10 October 2018|work=Homeland Preparedness News |access-date=25 October 2018}}</ref>
       
      In 2019, two Chinese nationals were indicted for the [[Anthem medical data breach]].<ref>{{cite news| url=https://www.politico.com/story/2019/05/09/chinese-hackers-anthem-data-breach-1421341| title=Chinese nationals charged for Anthem hack, 'one of the worst data breaches in history'| first=Eric| last=Geller| work=[[Politico]]| date=9 May 2019}}</ref> About 80 million company records were hacked, stoking fears that the stolen data could be used for [[Identity theft in the United States|identity theft]].<ref>{{cite news| url=https://www.nytimes.com/2015/02/06/business/experts-suspect-lax-security-left-anthem-vulnerable-to-hackers.html| title=Anthem Hacking Points to Security Vulnerability of Health Care Industry| first1=Reed| last1=Abelson| first2=Matthew| last2=Goldstein| work=[[The New York Times]]| date=5 February 2015| url-access=limited}}</ref> In February 2020, the United States government indicted members of China's PLA for hacking into [[Equifax]] and plundering sensitive data as part of a massive heist that also included stealing trade secrets.<ref>{{cite web| url = https://www.cbsnews.com/news/china-denies-responsibility-in-equifax-breach-after-doj-charges-four-military-members/| title = Data from Equifax credit hack could 'end up on the black market', expert warns| date= 11 February 2020| work = [[CBS News]]}}</ref><ref>{{cite web| url = https://www.wsj.com/articles/four-members-of-china-s-military-indicted-for-massive-equifax-breach-11581346824| title = Four Members of China's Military Indicted Over Massive Equifax Breach| date= 11 February 2020| work = [[The Wall Street Journal]]}}</ref> Private records of more than 145 million Americans were compromised in the [[2017 Equifax data breach]].<ref>{{cite news|title=FBI Director Wray warns of Chinese hacking, espionage threats against American companies|url=https://thehill.com/policy/cybersecurity/506250-fbi-director-wray-warns-of-chinese-hacking-espionage-threats-against|work=The Hill|date=7 July 2020}}</ref>
       
      According to a report by [[Reuters]], in 2019 the United States CIA began a clandestine campaign on [[Internet in China|Chinese social media]] to spread negative narratives about the [[General secretaryship of Xi Jinping|Xi Jinping administration]] in an effort to influence Chinese public opinion against the government.<ref name="Bing-2024a">{{Cite news|last1=Bing|first1=Christopher|last2=Schectman|first2=Joel|date=14 March 2024|title=Exclusive: Trump Launched CIA Covert Influence Operation against China|url=https://www.reuters.com/world/us/trump-launched-cia-covert-influence-operation-against-china-2024-03-14/|access-date=14 June 2024|work=[[Reuters]]}}</ref> The CIA promoted narratives that CCP leaders were hiding money overseas and that the Belt and Road Initiative was corrupt and wasteful.<ref name="Bing-2024a" /> As part of the campaign, the CIA also targeted foreign countries where the United States and China compete for influence.<ref name="Bing-2024a" />
       
      [[Voice of America]] reported in April 2020 that "Internet security researchers say there have already been signs that China-allied hackers have engaged in so-called "spear-phishing" attacks on American political targets" ahead of the [[2020 United States elections]].<ref>{{cite news|title=China, Caught Meddling in Past Two US Elections, Claims 'Not Interested' in 2020 Vote|url=https://www.voanews.com/a/east-asia-pacific_china-caught-meddling-past-two-us-elections-claims-not-interested-2020-vote/6188474.html|work=[[Voice of America]]|date=30 April 2020}}</ref> As of 7 July 2020, the U.S. government was "looking at" banning Chinese video streaming application, [[TikTok]] due to national security concerns. Secretary of State Mike Pompeo said the [[First presidency of Donald Trump|Trump administration]] had been aware of the potential threat and has "worked on this issue for a long time".<ref>{{cite web|title=The United States is 'looking at' banning TikTok and other Chinese social media apps, Pompeo says|url=https://edition.cnn.com/2020/07/07/tech/us-tiktok-ban/index.html|access-date=7 July 2020|website=[[CNN International]]|date=7 July 2020}}</ref> On 19 September 2020, a complaint was filed in Washington by TikTok and its parent company, [[ByteDance]], challenging the recent moves made by the Trump administration to prevent the application from operating in the US. The court documents argued that the U.S. government took the step for political reasons rather than to stop an "unusual and extraordinary threat".<ref>{{cite web|date=19 September 2020|title=TikTok files complaint against Trump administration to try to block U.S. ban|url=https://www.cnbc.com/2020/09/19/tiktok-files-complaint-against-trump-administration-to-try-to-block-us-ban-.html|access-date=19 September 2020|website=[[CNBC]]}}</ref> In April 2024, the House of Representatives passed a bill requiring TikTok to divest from ByteDance within 9–12 months or face a potential ban, Biden signed the bill into law soon afterwards.<ref>{{cite web | url=https://www.npr.org/2024/04/20/1245594589/house-approves-bill-tiktok-ban | title=House approves sell-or-be-banned TikTok measure, attaching it to foreign aid bill | work=NPR | date=20 April 2024 | last1=Allyn | first1=Bobby }}</ref>
       
      In December 2024, Chinese state-sponsored hackers reportedly breached the U.S. Treasury Department's security systems, exploiting vulnerabilities in the cybersecurity services of third-party provider [[BeyondTrust]]. Using a compromised digital key, the attackers accessed a cloud-based service that provided technical support for Treasury end users, enabling them to override security measures and retrieve certain unclassified documents. Treasury officials, alerted to the breach by BeyondTrust on 8 December 2024, collaborated with the FBI and CISA to investigate the incident, which was attributed to a China-linked Advanced Persistent Threat (APT) group.<ref>{{cite news|last1=Satter |first1=Raphael |last2=Vicens |first2=A.J. |title=US Treasury says Chinese hackers stole documents in 'major incident' |date=31 December 2024 |url=https://www.reuters.com/technology/cybersecurity/us-treasurys-workstations-hacked-cyberattack-by-china-afp-reports-2024-12-30/ |website=Reuters |access-date=2 January 2025}}</ref>
       
      === Nuclear security ===
      The field of nuclear security (preventing nuclear material from being used to make illicit weapons) is a well-established area of successful U.S.-China cooperation.<ref name="Moore-2022">{{Cite book|last=Moore|first=Scott|title=China's next act : how sustainability and technology are reshaping China's rise and the world's future|date=2022|isbn=978-0-19-760401-4|location=New York, NY|pages=210|oclc=1316703008}}</ref>
       
      Precipitated by a [[2010 Nuclear Security Summit]] convened by the Obama administration, China and the United States launched a number of initiatives to secure potentially dangerous, Chinese-supplied, nuclear material in countries such as Ghana or Nigeria.<ref name="Moore-2022" /> Through these initiatives, China and the U.S. have converted Chinese-origin Miniature Neutron Source Reactors (MNSRs) from using highly enriched uranium to using low-enriched uranium fuel (which is not directly usable in weapons, thereby making reactors more proliferation resistant).<ref>{{Cite news|date=26 July 2022|title=The Little Known Success Story of U.S.-China Nuclear Security Cooperation|newspaper=The Nuclear Threat Initiative|url=https://www.nti.org/analysis/articles/little-known-success-story-us-china-nuclear-security-cooperation/|access-date=26 July 2022|archive-date=26 July 2022|archive-url=https://web.archive.org/web/20220726130140/https://www.nti.org/analysis/articles/little-known-success-story-us-china-nuclear-security-cooperation/|url-status=bot: unknown}}</ref>
       
      China and the United States collaborated to build the China Center of Excellence on Nuclear Security, which opened in 2015.<ref name="Massot-2024">{{Cite book|last=Massot|first=Pascale|title=China's Vulnerability Paradox: How the World's Largest Consumer Transformed Global Commodity Markets|date=2024|publisher=[[Oxford University Press]]|isbn=978-0-19-777140-2|location=New York, NY, United States of America|pages=}}</ref>{{Rp|page=209}} The center is a forum for nuclear security exchange, training, and demonstration in the Asia Pacific region.<ref name="Massot-2024" />{{Rp|page=209}}
       
      In May 2023, Chinese Defense Spokesperson Tan Kefei urged the United States to fulfill its commitments and adhere to the [[Chemical Weapons Convention]] by taking "concrete actions".<ref>{{cite web|url=https://www.southportsentinel.com/2023/05/chinese-defense-spokesperson-accuses-us.html|title=Chinese Defense Spokesperson Accuses US of Failing to Comply with Chemical Weapons Convention|newspaper=The Southport Sentinel|date=30 May 2023|access-date=2 June 2023|archive-date=2 June 2023|archive-url=https://web.archive.org/web/20230602085436/https://www.southportsentinel.com/2023/05/chinese-defense-spokesperson-accuses-us.html|url-status=dead}}</ref>

      In October 2025, following the U.S. President's announcement to resume nuclear testing, the Chinese Foreign Ministry urged Washington to uphold its commitment to suspending such tests. A Chinese Foreign Ministry spokesman stated that Beijing expects the U.S. to “take practical measures” to help maintain international strategic stability and strengthen the nuclear non-proliferation regime. China also warned that the U.S. withdrawal from the test moratorium could undermine the global norm of a nuclear test ban and escalate strategic tensions between the two countries.<ref>{{Cite news|date=30 October 2025|title=China Reacts to Trump's Nuclear Weapons Tests Order|url=https://www.newsweek.com/china-reacts-to-trumps-nuclear-weapons-tests-order-10963843 |access-date=2 November 2025}}</ref><ref>{{Cite news|date=31 October 2025|title=Trump tells Pentagon to resume testing US nuclear weapons |url=https://www.reuters.com/world/china/trump-asks-pentagon-immediately-start-testing-us-nuclear-weapons-2025-10-30 |access-date=2 November 2025}}</ref>

      === Opioid epidemic ===
      {{Main|China and the opioid epidemic in the United States}}

      [[File:US timeline. Opioid deaths.jpg|thumb|240px|Opioids were involved in 80,411 [[opioid overdose|overdose deaths]] in 2021, up from around 10,000 in 1999.<ref>{{cite news|title=Opioid Deaths Could Hit 165,000 Annually Without Intervention, Biden Official Warns|url=https://www.forbes.com/sites/mollybohannon/2023/06/07/opioid-deaths-could-hit-165000-annually-without-intervention-biden-official-warns/|work=Forbes|date=7 June 2023}}</ref>]]
      According to the United States Drug Enforcement Agency in 2023, China continued to be the primary source of [[fentanyl]] being imported into the US, killing over 100 Americans every day.<ref>{{Cite web|url=https://www.foxnews.com/politics/trump-un-ambassador-kelly-craft-full-court-press-china-fentantyl-abuses-kentucky-elected-governor|title=Trump UN ambassador vows 'full court press' to combat China's fentanyl 'abuses' in this state if elected gov|first=Brandon|last=Gillespie|date=12 January 2023|website=Fox News}}</ref><ref>{{cite news|title=U.S. Presses China to Stop Flow of Fentanyl|url=https://www.nytimes.com/2023/11/15/business/economy/biden-xi-fentanyl.html|work=The New York Times|date=15 November 2023}}</ref> Over a two-year period, close to $800{{nbsp}}million worth of fentanyl pills were illegally sold online to the U.S. by Chinese distributors.<ref>[https://www.nytimes.com/2018/01/24/us/politics/senate-investigation-china-mail-opioids.html "Online Sales of Illegal Opioids from China Surge in U.S."], ''The New York Times'', 24 January 2018</ref><ref>[https://www.beckershospitalreview.com/opioids/americans-spent-nearly-800m-in-2-years-on-illegal-fentanyl-from-china-5-things-to-know.html "Americans spent nearly $800M in 2 years on illegal fentanyl from China: 5 things to know"], ''Becker's Hospital Review'', 25 January 2018</ref> The drug is usually manufactured in China, then shipped to Mexico, where it is processed and packaged, which is then smuggled into the U.S. by [[Mexican drug cartels]].<ref>{{Cite web|last=Linthicum|first=Kate|date=24 April 2020|title=Coronavirus chokes the drug trade — from Wuhan, through Mexico and onto U.S. streets|url=https://www.latimes.com/world-nation/story/2020-04-24/wuhan-china-coronavirus-fentanyl-global-drug-trade|access-date=1 April 2022|website=[[Los Angeles Times]]}}</ref> A large amount is also purchased online and shipped through the U.S. Postal Service.<ref>[https://www.beckershospitalreview.com/population-health/deadly-synthetic-opioids-coming-to-us-via-dark-web-and-the-postal-service.html "Deadly synthetic opioids coming to US via 'dark web' and the postal service"], ''Becker's Hospital Review'', 28 December 2016</ref> It can also be purchased directly from China, which has become a major manufacturer of various synthetic drugs illegal in the US.<ref>[https://www.nytimes.com/2015/06/22/world/asia/in-china-illegal-drugs-are-sold-online-in-an-unbridled-market.html "In China, Illegal Drugs Are Sold Online in an Unbridled Market"], ''The New York Times'', 21 June 2015</ref> According to Assistant U.S. Attorney, Matt Cronin:
      {{blockquote|It is a fact that the People's Republic of China is the source for the vast majority of synthetic opioids that are flooding the streets of the United States and Western democracies. It is a fact that these synthetic opioids are responsible for the overwhelming increase in overdose deaths in the United States. It is a fact that if the People's Republic of China wanted to shut down the synthetic opioids industry, they could do so in a day.<ref>[https://www.cbsnews.com/news/deadly-fentanyl-bought-online-from-china-being-shipped-through-the-mail-60-minutes-2019-04-28/?bhid=26893734359926884765307486560917&ftag=CNM-00-10aab4e#t=11m445s "Deadly fentanyl bought online from China being shipped through the mail"], "60 Minutes", ''CBS'', April 28, 2019</ref>}}
       
      In June 2023, U.S. federal prosecutors announced criminal indictments of fentanyl precursor producers in China.<ref>{{Cite news|last1=Lynch|first1=Sarah N.|last2=Cohen|first2=Luc|last3=Lynch|first3=Sarah N.|last4=Cohen|first4=Luc|date=23 June 2023|title=US files first-ever charges against Chinese fentanyl manufacturers |work=[[Reuters]]|url=https://www.reuters.com/world/us/us-files-first-ever-charges-against-chinese-fentanyl-manufacturers-2023-06-23/}}</ref> In October 2023, [[Office of Foreign Assets Control|OFAC]] sanctioned a China-based network of fentanyl manufacturers and distributors.<ref>{{Cite news|last1=Goudsward|first1=Andrew|last2=Psaledakis|first2=Daphne|date=3 October 2023|title=US takes action against Chinese companies, people tied to fentanyl |work=[[Reuters]]|url=https://www.reuters.com/world/us-sanctions-china-based-network-accused-trafficking-fentanyl-2023-10-03/}}</ref><ref>{{Cite web|date=28 August 2023|title=Treasury Targets Large Chinese Network of Illicit Drug Producers|url=https://home.treasury.gov/news/press-releases/jy1779|website=[[U.S. Department of the Treasury]]}}</ref>
       
      In July 2025, tensions between the US and China escalated as President Donald Trump maintained a 20% tariff on all Chinese imports, citing Beijing's alleged role in sustaining the flow of fentanyl into the U.S. The Chinese government rejected the accusation, stating it had already taken significant measures to address the issue and denounced the tariffs as coercive. Despite broader efforts to de-escalate trade disputes, the fentanyl-related duties remained in place, with China signaling frustration over what it viewed as a lack of recognition for its cooperation.<ref name=":4">{{Cite web |last=McCarthy |first=Simone |date=13 July 2025 |title=The deadly drug that's complicating US-China trade |url=https://www.cnn.com/2025/07/12/china/us-china-fentanyl-tariffs-intl-hnk |access-date=16 July 2025 |website=CNN}}</ref>
       
      Despite enforcement challenges in a vast and complex chemical sector, observers argue that China could take stronger measures to curb the export of fentanyl precursors. These include tightening regulations, imposing stricter penalties for violations, and ensuring consistent enforcement by local authorities. David Luckey of the [[RAND Corporation]] noted that while scheduling substances is a positive step, preventing Chinese companies from supplying precursor chemicals to criminal organizations—particularly in Mexico—would be more effective. He emphasized that as a command economy, China has the capacity to exercise greater control if the Chinese Communist Party chooses to do so.<ref name=":4" />
       
      ===COVID-19===
      {{Main|Impact of the COVID-19 pandemic on politics}}

      In relation to the [[impact of the COVID-19 pandemic on politics]], the [[First presidency of Donald Trump|Trump administration]] referred to the coronavirus as the "Wuhan virus", terms which have been criticized for being racist<ref name="trumpnyt">{{cite news|last1=Rogers|first1=Katie|last2=Jakes|first2=Lara|last3=Swanson|first3=Anna| name-list-style = vanc|title=Trump Defends Using 'Chinese Virus' Label, Ignoring Growing Criticism|url=https://www.nytimes.com/2020/03/18/us/politics/china-virus.html|access-date=20 March 2020|newspaper=The New York Times|date=18 March 2020|archive-url=https://web.archive.org/web/20200320001747/https://www.nytimes.com/2020/03/18/us/politics/china-virus.html|archive-date=20 March 2020|url-status=live}}</ref><ref name="20200320BI">{{cite web|url=https://www.businessinsider.com/trump-using-racism-against-china-to-distract-from-coronavirus-failures-2020-3|title=Republicans are using racism against China to try to distract from Trump's disastrous coronavirus response|last=Haltiwanger|first=John|work=Business Insider|date=19 March 2020}}</ref> and "distract[ing] from the Trump administration's failure to contain the disease".<ref>{{Cite news|url=https://www.economist.com/united-states/2020/03/26/relations-between-china-and-america-are-infected-with-coronavirus|title=Relations between China and America are infected with coronavirus|newspaper=The Economist|access-date=30 March 2020|issn=0013-0613}}</ref> In return, some Chinese officials, including [[Zhao Lijian]], rejected an earlier acknowledgement of the coronavirus outbreak starting in [[Wuhan]], in favor of [[Misinformation related to the COVID-19 pandemic|conspiracy theories]] that the virus originated in the U.S.<ref>{{cite news|date=14 March 2020|title=Chinese diplomat promotes conspiracy theory that US military brought coronavirus to Wuhan|work=[[CNN International]]|url=https://edition.cnn.com/2020/03/13/asia/china-coronavirus-us-lijian-zhao-intl-hnk/index.html}}</ref><ref name="20200313nytime">{{cite news|url=https://www.nytimes.com/2020/03/13/world/asia/coronavirus-china-conspiracy-theory.html|title=China spins tale that the U.S. Army started the coronavirus epidemic|date=13 March 2020|work=[[The New York Times]]}}</ref>''[[The Daily Beast]]'' obtained a U.S. government cable outlining a communications strategy with apparent origins in the [[United States National Security Council|National Security Council]], quoted as "Everything is about China. We're being told to try and get this messaging out in any way possible".<ref>{{cite news|last1=Banco|first1=Erin| name-list-style = vanc|url=https://www.thedailybeast.com/white-house-pushes-us-officials-to-criticize-china-for-coronavirus-cover-up?ref=scroll|title=White House Pushes U.S. Officials to Criticize China For Coronavirus 'Cover-Up'|work=[[The Daily Beast]]|date=21 March 2020|access-date=3 April 2020}}</ref> Multiple [[United States Intelligence Community|U.S. intelligence agencies]] have reportedly been pressured by the Trump administration to find intelligence supporting conspiracy theories regarding the origins of the virus in China.<ref>{{Cite news|last1=Mazzetti|first1=Mark|last2=Barnes|first2=Julian E.|last3=Wong|first3=Edward|last4=Goldman|first4=Adam| name-list-style = vanc|date=30 April 2020|title=Trump Officials Are Said to Press Spies to Link Virus and Wuhan Labs |work=The New York Times|url=https://www.nytimes.com/2020/04/30/us/politics/trump-administration-intelligence-coronavirus-china.html|access-date=6 May 2020|issn=0362-4331}}</ref>
       
      According to a ''New York Times'' report in April 2020, the [[United States Intelligence Community|U.S. intelligence community]] says China intentionally under-reported its number of coronavirus cases.<ref>{{cite news|title=C.I.A. Hunts for Authentic Virus Totals in China, Dismissing Government Tallies|url=https://www.nytimes.com/2020/04/02/us/politics/cia-coronavirus-china.html|work=The New York Times|date=2 April 2020}}</ref> Some outlets such as ''[[Politico]]'' and ''[[Foreign Policy]]'' have said China's efforts to send aid to virus-stricken countries is part of a [[propaganda in China|propaganda]] push for global influence.<ref name="politico-corona">{{cite news|title=China is winning the coronavirus propaganda war|url=https://www.politico.eu/article/coronavirus-china-winning-propaganda-war/|work=Politico|date=18 March 2020}}</ref><ref>{{cite news|title=China Is Fighting the Coronavirus Propaganda War to Win|url=https://foreignpolicy.com/2020/03/20/china-coronavirus-propaganda-war-journalists-press-freedom/|work=Foreign Policy|date=20 March 2020}}</ref> EU foreign policy chief [[Josep Borrell]] warned there is "a geo-political component including a struggle for influence through spinning and the 'politics of generosity'".<ref>{{cite news|last1=Lau|first1=Stuart| name-list-style = vanc|title=EU fires warning shot at China in coronavirus battle of the narratives|url=https://www.scmp.com/news/china/diplomacy/article/3076728/eu-fires-warning-shot-china-coronavirus-battle-narratives|work=[[South China Morning Post]]|date=24 March 2020}}</ref> Borrell also said "China is aggressively pushing the message that, unlike the U.S., it is a responsible and reliable partner."<ref>{{cite news|title=Governments reject Chinese-made equipment|url=https://www.bbc.com/news/world-europe-52092395|work=BBC News|date=30 March 2020}}</ref> China has also called for the U.S. to lift its [[United States sanctions|sanctions]] from Syria,{{citation needed|date=September 2023}} Venezuela<ref>{{cite web|date=18 March 2020|title=China hints Venezuela aid, IMF pans request: Update|url=https://www.argusmedia.com/en/news/2088421-china-hints-venezuela-aid-imf-pans-request-update|access-date=4 April 2020|website=[[Argus Media]]}}</ref> and Iran,<ref>{{Cite news|url=https://www.reuters.com/article/us-health-coronavirus-iran-sanctions-idUSKBN2132F5|title=China urges U.S. to lift sanctions on Iran amid coronavirus response|date=16 March 2020|work=Reuters|access-date=4 April 2020}}</ref> while reportedly sending aid to the latter two countries.<ref>{{cite web|last=Leonardo Flores|title=Venezuela's Coronavirus Response Might Surprise You|url=https://www.commondreams.org/views/2020/03/25/venezuelas-coronavirus-response-might-surprise-you|access-date=4 April 2020|website=[[Common Dreams]]}}</ref><ref>{{cite web|url=https://www.salon.com/2020/03/18/us-continues-sanctions-against-iran-and-venezuela-during-coronavirus-pandemic-_partner/|title=U.S. continues sanctions against Iran and Venezuela during coronavirus pandemic|date=18 March 2020|website=Salon|access-date=4 April 2020}}</ref> Donations of 100,000 masks to Cuba made by Chinese businessman [[Jack Ma]] was blocked by U.S. sanctions on 3 April.<ref>{{cite web|url=https://apnews.com/2858fbaa2dd5460fa2988b888fc53748|title=Cuba: US embargo blocks coronavirus aid shipment from Asia|date=3 April 2020|website=AP NEWS|access-date=4 April 2020}}</ref> Trade in medical supplies between the United States and China has also become politically complicated. Exports of face masks and other medical equipment to China from the United States (and many other countries) spiked in February, according to statistics from [[Trade Data Monitor]], prompting criticism from ''[[The Washington Post]]'' that the United States government failed to anticipate the domestic needs for that equipment.<ref>{{Cite news|url=https://www.washingtonpost.com/health/us-sent-millions-of-face-masks-to-china-early-this-year-ignoring-pandemic-warning-signs/2020/04/18/aaccf54a-7ff5-11ea-8013-1b6da0e4a2b7_story.html|title=U.S. sent millions of face masks to China early this year, ignoring pandemic warning signs|last1=Eilperin|first1=Juliet|last2=Stein|first2=Jeff|last3=Butler|first3=Desmond|last4=Hamburger|first4=Tom|newspaper=The Washington Post|date=18 April 2020|access-date=24 June 2020}}</ref> Similarly, ''[[The Wall Street Journal]]'', citing [[Trade Data Monitor]] to show that China is the leading source of many key medical supplies, raised concerns that [[China–United States trade war|US tariffs on imports from China]] threaten imports of medical supplies into the US.<ref>{{Cite web|url=https://www.wsj.com/articles/u-s-tariffs-hamper-imports-of-sanitizer-disinfectants-11586683800|title=U.S. Tariffs Hamper Imports of Sanitizer, Disinfectants, Some Companies Say|last1=Ferek|first1=Katy Stech|last2=Zumbrun|first2=Josh|work=The Wall Street Journal|date=12 April 2020|access-date=24 June 2020}}</ref>
       
      By May 2020, the relationship had deteriorated to the lowest point as both sides were recruiting allies to attack the other regarding guilt for the worldwide [[COVID-19 pandemic]].<ref name="Wall Street Journal May 6, 2020">Kate O'Keeffe, Michael C. Bender and Chun Han Wong, "Coronavirus Casts Deep Chill Over U.S.-China Relations: Pandemic has brought relations between the two to a modern-day nadir as they try to outmaneuver one another to shape the world order" [https://www.wsj.com/articles/coronavirus-casts-deep-chill-over-u-s-china-relations-11588781420?mod=hp_lead_pos5  ''The Wall Street Journal'' May 6, 2020]</ref>
      In September 2020, the trade war between China and the U.S. alongside Beijing's behavior during the COVID-19 crisis combined to worsen American public opinion about China.<ref>{{Cite web|last=Yellinek|first=Roie|date=31 August 2020|title=US Attitudes Toward China in the Wake of the Coronavirus|url=https://besacenter.org/perspectives-papers/us-attitudes-china-coronavirus/|access-date=7 September 2020|website=Begin-Sadat Center for Strategic Studies}}</ref> This also affected American perceptions of China-Taiwan tensions as a serious national security concern.<ref>{{Cite journal|last=Pan|first=Hsin-Hsin|date=2023|title=US public opinion on cross-strait relations: the effect of China threat on the China–Taiwan tension|url=https://www.cambridge.org/core/journals/japanese-journal-of-political-science/article/abs/us-public-opinion-on-crossstrait-relations-the-effect-of-china-threat-on-the-chinataiwan-tension/428CE7AF8FB2211C91BA090567652D09|journal=Japanese Journal of Political Science |volume=24|issue=2|pages=190–207|doi=10.1017/S1468109923000038|issn=1468-1099|url-access=subscription}}</ref>
       
      On 22 September 2020, President Donald Trump called on the United Nations to "hold China accountable for their actions", in a speech to the world body's General Assembly. President Trump blamed the Chinese government for the global spread of [[COVID-19]], which had infected 31 million people worldwide and killed more than 965,000, by then.<ref>{{cite news|url=https://www.nytimes.com/2020/09/22/world/americas/UN-Trump-Xi-China-coronavirus.html|title= Trump Demands U.N. Hold China to Account for Coronavirus Pandemic|access-date= 22 September 2020|website= The New York Times|date= 22 September 2020|last1= Gladstone|first1= Rick}}</ref>
       
      On 26 May 2021, Joe Biden tasked the U.S. intelligence community with investigating the origins of the pandemic.<ref>{{cite news|last1=Shear|first1=Michael|last2=Barnes|first2=Julian|last3=Zimmer|first3=Carl|last4=Mueller|first4=Benjamin|title=Biden Orders Intelligence Inquiry Into Origins of Virus|url=http://nytimes.com/2021/05/26/us/politics/biden-coronavirus-origins.html|access-date=28 February 2023|work=The New York Times|date=26 May 2021|archive-url=https://web.archive.org/web/20210527004118/http://nytimes.com/2021/05/26/us/politics/biden-coronavirus-origins.html|archive-date=27 May 2021}}</ref> By August 2021, the intelligence probe assessed that the Chinese government did not have foreknowledge of the outbreak, yet the investigation did not render conclusive results on the origins.<ref name="WaPoRuleOutBioweapon">{{cite news|last1=Nakashima|first1=Ellen|last2=Achenbach|first2=Joel|date=27 August 2021|title=U.S. spy agencies rule out possibility the coronavirus was created as a bioweapon, say origin will stay unknown without China's help|newspaper=[[The Washington Post]]|url=https://www.washingtonpost.com/national-security/wuhan-coronavirus-lab-leak/2021/08/27/8f20b024-0740-11ec-8c3f-3526f81b233b_story.html|access-date=29 August 2021|archive-date=29 August 2021|archive-url=https://web.archive.org/web/20210829091607/https://www.washingtonpost.com/national-security/wuhan-coronavirus-lab-leak/2021/08/27/8f20b024-0740-11ec-8c3f-3526f81b233b_story.html|url-status=live}}</ref> Of eight [[United States Intelligence Community#Organizational structure and leadership|assembled teams]], one (the [[Federal Bureau of Investigation]]) leaned towards a [[COVID-19 lab leak theory|lab leak theory]], four others (and the [[National Intelligence Council]]) were inclined to uphold a zoonotic origin, and three were unable to reach a conclusion.<ref name="APnewsProbe0827">{{cite news|last=Merchant|first=Nomaan|date=27 August 2021|title=US intelligence still divided on origins of coronavirus |work=[[Associated Press]]|url=https://apnews.com/article/science-health-coronavirus-pandemic-2570b89545d4332b8a3bd7289982aa22/|access-date=29 August 2021|archive-date=29 August 2021|archive-url=https://web.archive.org/web/20210829012940/https://apnews.com/article/science-health-coronavirus-pandemic-2570b89545d4332b8a3bd7289982aa22|url-status=live}}</ref><ref name="Science origin">{{Cite journal|last=Cohen|first=Jon|date=27 August 2021|title=COVID-19's origins still uncertain, U.S. intelligence agencies conclude|url=https://www.science.org/content/article/covid-19-s-origins-still-uncertain-us-intelligence-agencies-conclude |website=[[Science (journal)|Science]] |doi=10.1126/science.abm1388|s2cid=240981726|quote=The first, and most important, takeaway is that the IC is 'divided on the most likely origin' of the pandemic coronavirus and that both hypotheses are 'plausible.'|archive-date=31 August 2021|archive-url=https://web.archive.org/web/20210831193701/https://www.science.org/content/article/covid-19-s-origins-still-uncertain-us-intelligence-agencies-conclude|url-status=live|url-access=subscription}}</ref><ref name="Virus murky">{{Cite news|last=Barnes|first=Julian E.|date=29 October 2021|title=Origin of Virus May Remain Murky, U.S. Intelligence Agencies Say |work=The New York Times|url=https://www.nytimes.com/2021/10/29/us/politics/coronavirus-origin-intelligence-report.html|access-date=17 December 2021|issn=0362-4331|archive-date=17 December 2021|archive-url=https://web.archive.org/web/20211217032701/https://www.nytimes.com/2021/10/29/us/politics/coronavirus-origin-intelligence-report.html|url-status=live}}</ref> In February 2023, the [[U.S. Department of Energy]] revised its previous estimate of the origin from "undecided" to "low confidence" in favor of a laboratory leak.<ref name="TheHill_DoE_Feb_2023">{{cite news|last1=Mueller|first1=Julia|title=National security adviser: No 'definitive answer' on COVID lab leak|url=https://thehill.com/homenews/sunday-talk-shows/3874580-national-security-adviser-no-definitive-answer-on-covid-lab-leak/|access-date=26 February 2023|work=The Hill|date=26 February 2023}}</ref><ref name="NYT_DoE_Feb2023">{{cite web|last1=Barnes|first1=Julian E.|title=Lab Leak Most Likely Caused Pandemic, Energy Dept. Says|url=https://www.nytimes.com/2023/02/26/us/politics/china-lab-leak-coronavirus-pandemic.html|website=The New York Times|access-date=27 February 2023|date=26 February 2023}}</ref> Following the Energy Department's revised conclusion, the Chinese foreign ministry called on the US to "stop defaming China" with the lab leak theory, adding that the U.S. was politicizing a scientific issue.<ref name="China leak reaction">{{cite news|last1=Pierson|first1=David|title=China Dismisses Latest Claim That Lab Leak Likely Caused Covid|url=https://www.nytimes.com/2023/02/27/world/asia/china-react-covid-lab-leak.html|access-date=1 March 2023|work=[[The New York Times]]|date=27 February 2023|archive-url=https://web.archive.org/web/20230227100229/https://www.nytimes.com/2023/02/27/world/asia/china-react-covid-lab-leak.html|archive-date=27 February 2023}}</ref> In January 2025, after [[John Ratcliffe (American politician)|John Ratcliffe]] became its director, the [[Central Intelligence Agency]] revised its previous estimate of the origin from "undecided" to "low confidence" in favor of a laboratory leak.<ref name=":1">{{Cite news |last=Barnes |first=Julian E. |date=25 January 2025 |title=C.I.A. Now Favors Lab Leak Theory to Explain Covid's Origins |url=https://www.nytimes.com/2025/01/25/us/politics/cia-covid-lab-leak.html |access-date=25 January 2025 |work=[[The New York Times]] |issn=0362-4331}}</ref>
       
