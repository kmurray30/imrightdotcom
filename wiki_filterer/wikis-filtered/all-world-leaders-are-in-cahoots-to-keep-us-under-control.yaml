      In April 2016, the United States became a signatory to the Paris Agreement on climate change mitigation, and accepted it by executive order in September 2016. President Barack Obama committed the United States to contributing US$3 billion to the Green Climate Fund. On June 1, 2017, U.S. president Donald Trump announced that the United States would cease all participation in the 2015 Paris Agreement on climate change mitigation, contending that the agreement would "undermine" the U.S. economy, and put the U.S. "at a permanent disadvantage".
      In accordance with Article 28 of the Paris Agreement, a country cannot give notice of withdrawal from the agreement within the first three years of its start date in the relevant country, which was on November 4, 2016, in the case of the United States. The White House later clarified that the U.S. would abide by the four-year exit process. On November 4, 2019, the administration gave a formal notice of intention to withdraw, which takes 12 months to take effect. The withdrawal took effect on November 4, 2020, one day after the 2020 U.S. presidential election. However, the U.S. still has to report its greenhouse gas inventory because it remains in...
