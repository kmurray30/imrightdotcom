hall|access-date=June 7, 2017|language=en|archive-url=https://web.archive.org/web/20170607195506/https://townhall.com/tipsheet/annatimmis/2017/06/07/officials-reaction-to-trump-at-ocean-conference-n2337298|archive-date=June 7, 2017|url-status=live}}</ref>
