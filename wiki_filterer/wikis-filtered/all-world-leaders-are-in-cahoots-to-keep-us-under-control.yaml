  - title: 2013 Bilderberg Conference
    pageid: 39543628
    extract: The 2013 Bilderberg Conference took place June 6–9, 2013, at The Grove hotel in Watford, Hertfordshire, England. It was the first Bilderberg Group conference to be held in the United Kingdom since the 1998 meeting in Turnberry, Scotland.
    source: |-
      {{Short description|Europe–North America forum in England}}
      [[File:The_Grove_and_golf_course,_Watford_-_geograph.org.uk_-_131616.jpg|thumb|The Grove Hotel]]The '''2013 [[Bilderberg Group|Bilderberg]] Conference''' took place June 6–9, 2013, at [[The Grove, Watford|The Grove]] hotel in [[Watford]], Hertfordshire, England. It was the first [[Bilderberg Group]] conference to be held in the United Kingdom since the 1998 meeting in Turnberry, Scotland.<ref name="Teleg13">{{cite news |author=Mason |first=Rowena |date=30 May 2013 |title=British taxpayers to pay 'millions' towards secretive Bilderberg meeting security |work=The Daily Telegraph |location=London |url=https://www.telegraph.co.uk/news/politics/10089131/British-taxpayers-to-pay-millions-towards-secretive-Bilderberg-meeting-security.html |url-access=subscription |access-date=30 May 2013 |archive-url=https://web.archive.org/web/20221210022113/https://www.telegraph.co.uk/news/politics/10089131/British-taxpayers-to-pay-millions-towards-secretive-Bilderberg-meeting-security.html |archive-date=2022-12-10}}</ref>

      == History ==
      ''[[The Daily Telegraph]]'' likened the annual conference to "a political version of the [[World Economic Forum]] in Davos, Switzerland, which draws members of high society to discuss business and the economy."<ref name='Teleg13'/> A British Member of Parliament and former Bilderberg attendee quoted by the ''[[Independent on Sunday]]'' also likened the annual conference to the World Economic Forum, and said it was "...not that exciting, in fact it's a bit run of the mill".<ref name='Ind13'>{{cite news|title=Watch out Watford: Here comes the secretive Bilderberg Group|url=https://www.independent.co.uk/news/uk/politics/watch-out-watford-here-comes-the-secretive-bilderberg-group-8626134.html |archive-url=https://ghostarchive.org/archive/20220501/https://www.independent.co.uk/news/uk/politics/watch-out-watford-here-comes-the-secretive-bilderberg-group-8626134.html |archive-date=1 May 2022 |url-access=subscription|author=James Cusick|work=The Independent|access-date=1 June 2013|location=London|date=21 May 2013}}{{cbignore}}</ref>

      Around 140 participants are expected to participate in the meetings annually.<ref name=list>{{cite web|url=http://www.bilderbergmeetings.org/participants2013.html |title=Current list of Participants |publisher=Bilderberg Group |access-date=4 June 2013 |url-status=dead |archiveurl=https://web.archive.org/web/20130607050957/http://www.bilderbergmeetings.org/participants2013.html |archivedate=7 June 2013 }}</ref><ref>{{cite news | url=https://www.telegraph.co.uk/news/politics/10095943/Osborne-Clarke-and-Balls-to-attend-Bilderberg-Group-meeting.html | title=Osborne, Clarke and Balls to attend Bilderberg Group meeting | author=Matthew Holehouse | date=3 June 2013 | work=The Daily Telegraph | location=London}}</ref> Attendance to the event is by invitation only.<ref name='Teleg13'/> No delegates pay to attend the conferences, and no delegates attend by conference phone or satellite.<ref name='Guard06'/> The conference programme never includes entertainment or performances.<ref name='Guard06'/>

      The confidential nature of Bilderberg led to criticism of the group's lack of transparency and accountability, along with concerns about potential lobbying.<ref>{{cite news|url=https://www.theguardian.com/world/2013/jun/11/bilderberg-davidcameron |title=Bilderberg 2013: The sun sets on Watford |work=[[The Guardian]] |date=11 June 2013 |access-date=11 June 2013 |location=London |first1=Michael |last1=Meacher |first2=Charlie |last2=Skelton}}</ref><ref>{{cite news|url=http://www.newstatesman.com/2013/06/my-brush-bilderberg |title=My brush with Bilderberg |work=[[New Statesman]] |date=10 June 2013 |access-date=11 June 2013 |url-status=dead |archiveurl=https://web.archive.org/web/20130615031248/http://www.newstatesman.com/2013/06/my-brush-bilderberg |archivedate=15 June 2013 }}</ref> Outside the 2013 meeting, Labour MP [[Michael Meacher]] said, "If there is any conference which required transparency, which required democratic accountability, it is the Bilderberg conference because this is really where the top brass of Western finance capitalism meet ... including government ministers."<ref>{{cite news|url=http://news.sky.com/story/1100183/bilderberg-conference-watford-too-secret |title=Bilderberg Conference Watford 'Too Secret' |work=[[Sky News]] |date=6 June 2013 |access-date=11 June 2013}}</ref> Conservative MP [[Douglas Carswell]] was also concerned about the privacy of the meetings, by saying "...you would have thought the least our ruling elite could do is discuss these issues in public."<ref name='GuardCam'/>

      There has also been speculation from conspiracy theorists about the purpose of the meetings.<ref name='Ind13'/> The secretive approach to staging the conferences has led to the younger generation of Bilderberg attendees being uncomfortable with the policy of total media exclusion, as reported by the ''Independent on Sunday''. A previous attendee told the ''Independent'' that he sympathised with "those who tell us the confidentiality policy only encourages the conspiracy theorists. It does."<ref name='Ind13'/>

      Of the format and outcome of the conference, the Bilderberg website said, "There is no detailed agenda, no resolutions are proposed, no votes are taken, and no policy statements are issued."<ref name='Bild13'>{{cite web|title=Bilderberg Meetings |url=http://www.bilderbergmeetings.org/meeting_2013.html |publisher=The Bilderberg Group |access-date=3 June 2013 |url-status=dead |archiveurl=https://web.archive.org/web/20130604113352/http://www.bilderbergmeetings.org/meeting_2013.html |archivedate=4 June 2013 }}</ref>

      A Bilderberg Fringe Festival was held near the conference. The festival featured speakers, comedy, music, workshops, arts and entertainment.<ref name='BildFest'>{{cite web|title=The Bilderberg Fringe Festival - About|url=http://www.bilderbergfringefestival.co.uk/about/|publisher=The Bilderberg Fringe Festival|access-date=1 June 2013}}</ref>

      The [[prime minister of the United Kingdom]], [[David Cameron]], attended the conference on 7 June.<ref name='GuardCam'>{{cite news|title=Bilderberg group summit: Cameron attendance at 'cliche fest' damned|url=https://www.theguardian.com/world/2013/jun/07/bilderberg-group-summit-cameron-damned|author=Nicholas Watt|work=The Guardian|access-date=7 June 2013|location=London|date=7 June 2013}}</ref> Cameron attended in a private capacity and was not accompanied by civil servants, even though it is customary for the prime minister to be accompanied by civil servants when he meets business leaders.<ref name='GuardCam'/>

      ==Press coverage==
      Journalists were banned from attending the event, with the exception of [[Lilli Gruber]],<ref name=list/> although a press office was provided by the [[Bilderberg Group]]. The group is represented by a German corporate communications firm.<ref name='Guard06'/>

      The meeting was well covered by the British media, with frequent Bilderberg writer [[Charlie Skelton]] noting the presence of [[Reuters]], the [[Associated Press]], [[Channel 4 News]], ''[[The Times]]'' and the [[Press Association]].<ref name='Guard06'>{{cite news|title=Bilderberg 2013: friendly policemen, a press zone and the One Show|url=https://www.theguardian.com/world/2013/jun/06/bilderberg-2013-day-one|author=Charlie Skelton|work=The Guardian|access-date=6 June 2013|location=London|date=6 June 2013}}</ref><ref name='Teleg13'/><ref name='Teleg31May'>{{cite news|title=The Bilderberg Group: Fiendish plots are a-hatching in Watford|url=https://www.telegraph.co.uk/news/uknews/law-and-order/10091659/The-Bilderberg-Group-Fiendish-plots-are-a-hatching-in-Watford.html|author=Matthew Norman|work=The Daily Telegraph|access-date=1 June 2013|location=London|date=31 May 2013}}</ref>

      ==Agenda==
      A list of key topics for discussion at the 2013 Bilderberg conference was published on the Bilderberg website shortly before the meeting.<ref name='Bild13'/> Topics for discussion included:<ref name='Bild13'/>

      * "Can the U.S. and Europe grow faster and create jobs?"
      * "Jobs, entitlement and debt"
      * "How big data is changing almost everything"
      * "Nationalism and populism"
      * "U.S. foreign policy"
      * "Africa's challenges"
      * "Cyber warfare and the proliferation of asymmetric threats"
      * "Major trends in medical research"
      * "Online education: promise and impacts"
      * "Politics of the European Union"
      * "Developments in the Middle East"

      {{Use dmy dates|date=November 2015}}

