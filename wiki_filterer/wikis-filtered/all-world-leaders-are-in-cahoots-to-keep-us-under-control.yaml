      The '''Paris Agreement''' (also called the '''Paris Accords''' or '''Paris Climate Accords''') is an international treaty on [[climate change]] that was signed in 2016.<ref name=":0" /> The treaty covers [[climate change mitigation]], [[Climate change adaptation|adaptation]], and [[Climate finance|finance]]. The Paris Agreement was negotiated by 196 [[party (law)|parties]] at the [[2015 United Nations Climate Change Conference]] near [[Paris]], France. As of January 2026, 194 members of the [[United Nations Framework Convention on Climate Change]] (UNFCCC) are parties to the agreement. Of the three UNFCCC member states which have not [[Ratification|ratified]] the agreement, the only major [[List of countries by greenhouse gas emissions|emitter]] is [[Climate change in Iran|Iran]]. The United States, the second largest emitter, [[United States and the Paris Agreement|withdrew from the agreement]] in 2020,<ref name="UScom" /> rejoined in 2021,<ref name=":20" /> and [[Executive Order 14162|withdrew again in 2026]].<ref>{{Cite web |last=Calma |first=Justine |date=20 January 2025 |title=Donald Trump pulls US out of Paris climate agreement |url=https://www.theverge.com/2025/1/20/24345964/donald-trump-paris-climate-agreement-exit |access-date=20 January 2025 |website=The Verge |language=en}}</ref>

      The Paris Agreement has a long-term temperature goal which is to keep the rise in [[global surface temperature]] to well below {{convert|2|C-change}} above [[Industrial Revolution|pre-industrial]] levels. The treaty also states that preferably the limit of the increase should only be {{convert|1.5|C-change}}. These limits are defined as averages of the global temperature as measured over many years.<ref name=":21">{{Cite news |last1=Zhong |first1=Raymond |last2=Plumer |first2=Brad |last3=Rojanasakul |first3=Mira |date=10 January 2025 |title=2024's Record-Breaking Heat Brought the World to a Dangerous Threshold. Now What? |url=https://www.nytimes.com/interactive/2025/01/09/climate/2024-heat-record-climate-goal.html |access-date=10 January 2025 |work=The New York Times |language=en-US |issn=0362-4331}}</ref> 

      The lower the temperature increase, the smaller the [[effects of climate change]] can be expected. To achieve this temperature goal, [[greenhouse gas emissions]] should be reduced as soon as, and by as much as, possible. They should even reach [[net-zero emissions|net zero]] by the middle of the 21st century.<ref>{{Cite web|last=UNFCCC|title=The Paris Agreement|url=https://unfccc.int/process-and-meetings/the-paris-agreement/the-paris-agreement|url-status=live|access-date=18 September 2021|website=unfccc.int|archive-date=19 March 2021|archive-url=https://web.archive.org/web/20210319205057/https://unfccc.int/process-and-meetings/the-paris-agreement/the-paris-agreement}}</ref> To stay below 1.5{{Nbsp}}°C of global warming, emissions need to be cut by roughly 50% by 2030. This figure takes into account each [[Nationally determined contribution|country's documented pledges]].<ref name=":17">{{Cite web |last=Schleussner |first=Carl-Friedrich |title=The Paris Agreement – the 1.5 °C Temperature Goal |url=https://climateanalytics.org/briefings/15c/ |access-date=29 January 2022 |website=Climate Analytics |language=en}}</ref>  After the Paris Agreement was signed, global emissions continued to rise rather than fall.<ref name=":21" /> 2024 was the hottest year on record, with a rise of more than 1.5&nbsp;°C in global average temperature.<ref name=":21" /> 

      The treaty aims to help countries adapt to climate change effects, and mobilize enough finance. Under the agreement, each country must determine, plan, and [[Enhanced Transparency Framework|regularly report]] on its contributions. No mechanism forces a country to set specific [[emissions target]]s, but each target should go beyond previous targets. In contrast to the 1997 [[Kyoto Protocol]], the distinction between developed and developing countries is blurred, so that the latter also have to submit plans for emission reductions.

      The Paris Agreement was opened for signature on 22 April 2016 ([[Earth Day]]) at a ceremony inside the [[Headquarters of the United Nations|UN Headquarters]] in [[New York City|New York]]. After the [[European Union]] ratified the agreement, sufficient countries had ratified the agreement responsible for enough of the [[greenhouse gas emissions|world's greenhouse gases]] for the agreement to enter into force on 4 November 2016.

      World leaders have lauded the agreement.<ref name="auto2" /> However, there is debate about its effectiveness, with some environmentalists and analysts criticizing it for not being strict enough. While pledges under the Paris Agreement are insufficient for reaching the set temperature goals, there is a mechanism of [[Global stocktake|increased ambition]]. The Paris Agreement has been successfully used in [[Climate change litigation|climate litigation]] in the late 2010s forcing countries and oil companies to strengthen climate action.<ref name=":18" /><ref name=":19" />

      {{TOC level|3}}

      == Aims ==
      The aim of the agreement, as described in Article 2, is to have a stronger response to the danger of climate change; it seeks to enhance the implementation of the United Nations Framework Convention on Climate Change through:<ref name=":0">{{cite web |title=Paris Agreement, FCCC/CP/2015/L.9/Rev.1 |url=http://unfccc.int/resource/docs/2015/cop21/eng/l09r01.pdf |url-status=live |archive-url=https://web.archive.org/web/20151212194411/http://unfccc.int/resource/docs/2015/cop21/eng/l09r01.pdf |archive-date=12 December 2015 |access-date=12 December 2015 |work=UNFCCC secretariat }}</ref>

      {{blockquote|(a) Holding the increase in the global average temperature to well below 2&nbsp;°C above pre-industrial levels and to pursue efforts to limit the temperature increase to 1.5&nbsp;°C above pre-industrial levels, recognizing that this would significantly reduce the risks and impacts of climate change;

      (b) Increasing the ability to adapt to the adverse impacts of climate change and foster [[climate resilience]] and low greenhouse gas emissions development, in a manner that does not threaten food production;

      (c) Making finance flows consistent with a pathway towards low greenhouse gas emissions and climate-resilient development.}}

      Countries furthermore aim to reach "global peaking of greenhouse gas emissions as soon as possible."<ref name=":0" />

      == Development ==
      [[File:GUSTAVO-CAMACHO-GONZALEZ-L1060274 (23430273715).jpg|thumb|upright=1.35|Heads of delegations at the [[2015 United Nations Climate Change Conference]] in Paris]]

      ===Lead-up===
      The [[United Nations Framework Convention on Climate Change|UN Framework Convention on Climate Change]] (UNFCCC), adopted at the 1992 [[Earth Summit]] is one of the first international treaties on the topic. It stipulates that parties should meet regularly to address climate change, at the [[Conference of Parties]] or COP. It forms the foundation to future climate agreements.<ref>{{cite web|title=UN Climate Talks|access-date=20 July 2021|website=Council of Foreign Affairs|url=https://www.cfr.org/timeline/un-climate-talks|year=2021|archive-date=20 July 2021|archive-url=https://web.archive.org/web/20210720114238/https://www.cfr.org/timeline/un-climate-talks|url-status=live}}</ref>

      The [[Kyoto Protocol]], adopted in 1997, regulated [[greenhouse gas]] reductions for a limited set of countries from 2008 to 2012. The protocol was extended until 2020 with the Doha Amendment in 2012.<ref>{{cite news |last1=Harrabin | first1=Roger |url= https://www.bbc.co.uk/news/science-environment-20653018 |title= UN climate talks extend Kyoto Protocol, promise compensation |work= BBC News |date= 8 December 2012 |access-date= 22 June 2018 |archive-url= https://web.archive.org/web/20180716140524/https://www.bbc.co.uk/news/science-environment-20653018 |archive-date= 16 July 2018 |url-status= live }}</ref> The United States decided not to ratify the protocol, mainly because of its legally-binding nature. This, and distributional conflict, led to failures of subsequent international climate negotiations. The 2009 negotiations were intended to produce a successor treaty of Kyoto, but the negotiations collapsed and the resulting [[Copenhagen Accord]] was not legally binding and did not get adopted universally.<ref name=":11">{{Cite journal|last=Falkner|first=Robert|date=2016|title=The Paris Agreement and the new logic of international climate politics|url=https://academic.oup.com/ia/article/92/5/1107/2688148|journal=International Affairs|language=en|volume=92|issue=5|pages=1107–1125|doi=10.1111/1468-2346.12708|issn=0020-5850|access-date=7 March 2021|archive-date=3 June 2018|archive-url=https://web.archive.org/web/20180603060439/https://academic.oup.com/ia/article/92/5/1107/2688148|url-status=live}}</ref><ref>{{Cite web|last=Klein|first=Richard J. T.|date=7 December 2020|title=The Paris Agreement and the future of climate negotiations|url=https://www.sei.org/perspectives/paris-agreement-and-future-of-climate-negotiations/|url-status=live|access-date=18 July 2021|website=Stockholm Environment Institute|language=en-GB|archive-date=18 July 2021|archive-url=https://web.archive.org/web/20210718165725/https://www.sei.org/perspectives/paris-agreement-and-future-of-climate-negotiations/}}</ref>

      The accord did lay the framework for bottom-up approach of the Paris Agreement.<ref name=":11" /> Under the leadership of UNFCCC executive secretary [[Christiana Figueres]], negotiation regained momentum after Copenhagen's failure.<ref>{{Cite news|last=McGrath|first=Matt|date=19 February 2016|title=UN climate chief Christiana Figueres to step down|language=en-GB|work=BBC News|url=https://www.bbc.com/news/science-environment-35612559|url-status=live|access-date=7 March 2021|archive-date=29 December 2020|archive-url=https://web.archive.org/web/20201229230045/https://www.bbc.com/news/science-environment-35612559}}</ref> During the [[2011 United Nations Climate Change Conference]], the [[Durban Platform for Enhanced Action|Durban Platform]] was established to negotiate a legal instrument governing [[climate change mitigation]] measures from 2020. The platform had a mandate to be informed by the Fifth Assessment Report of the IPCC and the work of the subsidiary bodies of the UNFCCC.<ref>{{cite journal |title= The Nexus between International Law and Science: An Analysis of Scientific Expert Bodies in Multilateral Treaty-Making |newspaper=International Community Law Review |date=1 April 2022 |author=Orangias, Joseph |doi= 10.1163/18719732-bja10068 |s2cid= 248057340 |doi-access=free |hdl=1887/3765960 |hdl-access=free }}</ref> The resulting agreement was to be adopted in 2015.<ref>{{cite web|url=http://unfccc.int/bodies/body/6645.php|title=UNFCCC:Ad Hoc Working Group on the Durban Platform for Enhanced Action (ADP)|access-date=2 August 2015|archive-url=https://web.archive.org/web/20150802050511/http://unfccc.int/bodies/body/6645.php|archive-date=2 August 2015|url-status=live}}</ref>

      === Negotiations and adoption ===
      [[File:Paris agreement signed.webm|upright=1.35|thumb|Movie showing [[Laurent Fabius]] signaling the formal adoption of the Paris Agreement]]

      {{main|2015 United Nations Climate Change Conference}}

      Negotiations in Paris took place over a two-week span, and continued throughout the three final nights.<ref>{{cite book |last1=Jepsen |display-authors=etal |first1=Henrik |title=Negotiating the Paris Agreement: The Insider Stories |publisher=Cambridge University Press |url=https://www.cambridge.org/core/books/negotiating-the-paris-agreement/660C5CB692E6AE32FE9244374CD1EF39 |date=2021 |isbn= 978-1-108-88624-6}}</ref><ref>{{Cite web|last=Goldenberg|first=Suzanne|date=12 December 2015|title=Paris climate deal: nearly 200 nations sign in end of fossil fuel era|url=http://www.theguardian.com/environment/2015/dec/12/paris-climate-deal-200-nations-sign-finish-fossil-fuel-era|url-status=live|access-date=18 July 2021|website=The Guardian|language=en|archive-date=26 July 2021|archive-url=https://web.archive.org/web/20210726181643/https://www.theguardian.com/environment/2015/dec/12/paris-climate-deal-200-nations-sign-finish-fossil-fuel-era}}</ref> Various drafts and proposals had been debated and streamlined in the preceding year.<ref>{{Cite web|last=Evans|first=Simon|date=7 September 2015|title=Bonn climate talks ask for draft Paris text|url=https://www.carbonbrief.org/bonn-climate-talks-ask-for-draft-paris-text|url-status=live|access-date=18 July 2021|website=Carbon Brief|language=en|archive-date=18 July 2021|archive-url=https://web.archive.org/web/20210718171321/https://www.carbonbrief.org/bonn-climate-talks-ask-for-draft-paris-text}}</ref> According to one commentator two ways in which the French increased the likelihood of success were: firstly to ensure that [[Intended Nationally Determined Contributions]] (INDCs) were completed before the start of the negotiations, and secondly to invite leaders just for the beginning of the conference.<ref>{{Cite web|date=24 February 2016|title=The Paris Agreement is done! Let the negotiations begin?|url=https://ghginstitute.org/2016/02/24/the-paris-agreement-is-done-let-the-negotiations-begin/|access-date=22 July 2021|website=GHG and Carbon Accounting, Auditing, Management & Training {{!}} Greenhouse Gas Management Institute|language=en-US|archive-date=22 July 2021|archive-url=https://web.archive.org/web/20210722120833/https://ghginstitute.org/2016/02/24/the-paris-agreement-is-done-let-the-negotiations-begin/|url-status=live}}</ref>

      The negotiations almost failed because of a single word when the US legal team realized at the last minute that "shall" had been approved, rather than "should", meaning that developed countries would have been legally obliged to cut emissions: the French solved the problem by changing it as a "typographical error".<ref>{{Cite web|date=16 December 2015|title=How a 'typo' nearly derailed the Paris climate deal|url=http://www.theguardian.com/environment/blog/2015/dec/16/how-a-typo-nearly-derailed-the-paris-climate-deal|access-date=22 July 2021|website=the Guardian|language=en|archive-date=22 July 2021|archive-url=https://web.archive.org/web/20210722135937/https://www.theguardian.com/environment/blog/2015/dec/16/how-a-typo-nearly-derailed-the-paris-climate-deal|url-status=live}}</ref> At the conclusion of COP21 (the 21st meeting of the Conference of the Parties), on 12 December 2015, the final wording of the Paris Agreement was adopted by consensus by the 195 UNFCCC participating member states and the European Union.<ref name="auto">{{cite news|last1=Sutter|first1=John D.|last2=Berlinger|first2=Joshua|date=12 December 2015|title=Final draft of climate deal formally accepted in Paris|website=CNN|publisher=Turner Broadcasting System, Inc.|url=http://www.cnn.com/2015/12/12/world/global-climate-change-conference-vote/|url-status=live|access-date=12 December 2015|archive-url=https://web.archive.org/web/20151212145741/http://www.cnn.com/2015/12/12/world/global-climate-change-conference-vote/|archive-date=12 December 2015}}</ref> [[Nicaragua]] indicated they had wanted to object to the adoption as they denounced the weakness of the agreement, but were not given a chance.<ref>{{Cite journal|url = https://onlinelibrary.wiley.com/doi/epdf/10.1002/wcc.533|doi = 10.1002/wcc.533|title = Latin America in the climate change negotiations: Exploring the AILAC and ALBA coalitions|year = 2018|last1 = Watts|first1 = Joshua|last2 = Depledge|first2 = Joanna|journal = WIREs Climate Change|volume = 9|issue = 6| article-number=e533 | bibcode=2018WIRCC...9E.533W |s2cid = 134228301|access-date = 15 July 2021|archive-date = 15 July 2021|archive-url = https://web.archive.org/web/20210715105140/https://onlinelibrary.wiley.com/doi/epdf/10.1002/wcc.533|url-status = live|url-access = subscription}}</ref><ref>{{Cite web |last1=Harvey |first1=Fiona |author-link=Fiona Harvey |date=8 December 2020 |title=The Paris agreement five years on: Is it strong enough to avert climate catastrophe? |url=https://www.theguardian.com/environment/2020/dec/08/the-paris-agreement-five-years-on-is-it-strong-enough-to-avert-climate-catastrophe |url-status=live |archive-url=https://web.archive.org/web/20210715105140/https://www.theguardian.com/environment/2020/dec/08/the-paris-agreement-five-years-on-is-it-strong-enough-to-avert-climate-catastrophe |archive-date=15 July 2021 |access-date=15 July 2021 |work=The Guardian}}</ref> In the agreement the members promised to [[Low-carbon economy|reduce their carbon output]] "as soon as possible" and to do their best to keep global warming "[[2 degree climate target|to well below 2 degrees C]]" (3.6&nbsp;°F).<ref>{{cite news |url=http://www.cbc.ca/news/world/cop21-climate-change-talks-saturday-announced-1.3362354 |title='Historic' Paris climate deal adopted |author=<!--Staff writer(s); no by-line.--> |date=12 December 2015 |website=CBC News |publisher=CBC/Radio Canada |access-date=12 December 2015 |archive-url=https://web.archive.org/web/20151212162432/http://www.cbc.ca/news/world/cop21-climate-change-talks-saturday-announced-1.3362354 |archive-date=12 December 2015 |url-status=live }}</ref>

      === Signing and entry into force ===
      The Paris Agreement was open for signature by states and regional economic integration organizations that are parties to the UNFCCC (the convention) from 22 April 2016 to 21 April 2017 at the UN Headquarters in New York.<ref>{{cite web|title=Article 20(1)|url=https://unfccc.int/resource/docs/2015/cop21/eng/l09.pdf|url-status=live|archive-url=https://web.archive.org/web/20171117143548/https://unfccc.int/resource/docs/2015/cop21/eng/l09.pdf|archive-date=17 November 2017|access-date=17 November 2017|website=UNFCCC.int}}</ref> Signing of the agreement is the first step towards [[ratification]], but it is possible to [[Vienna Convention on the Law of Treaties#Signature, ratification and accession|accede]] to the agreement without signing.<ref name=":13">{{Cite web|last=Yeo|first=Sophie|date=19 April 2016|title=Explainer: The adoption, signing and ratification of the UN climate deal|url=https://www.carbonbrief.org/explainer-the-adoption-signing-and-ratification-of-the-un-climate-deal|access-date=8 May 2021|website=Carbon Brief|language=en|archive-date=8 May 2021|archive-url=https://web.archive.org/web/20210508110450/https://www.carbonbrief.org/explainer-the-adoption-signing-and-ratification-of-the-un-climate-deal|url-status=live}}</ref> It binds parties to not act in contravention of the goal of the treaty.<ref>{{cite book|title=The Paris Agreement on Climate Change|date=2017|editor1-last=Klein|editor-first1=Daniel|chapter=Institutional Arrangements and Final Clauses|last=Voigt|first=Christina|page=363}}</ref> On 1 April 2016, the United States and China, which represent almost 40% of global emissions confirmed they would sign the Paris Climate Agreement.<ref>{{cite web|last=McGrath|first=Matt|date=31 March 2016|title=Paris Climate Treaty: 'Significant step' as US and China agree to sign|url=https://www.bbc.com/news/science-environment-35935756?ocid=global_bbccom_email_31032016_top+news+stories|url-status=live|archive-url=https://web.archive.org/web/20160423220344/http://www.bbc.com/news/science-environment-35935756?ocid=global_bbccom_email_31032016_top+news+stories|archive-date=23 April 2016|access-date=23 April 2016|work=BBC}}</ref><ref>{{cite news|url=https://www.nytimes.com/2016/04/01/world/asia/obama-and-president-xi-of-china-vow-to-sign-paris-climate-accord-promptly.html|title=Obama and President Xi of China Vow to Sign Paris Climate Agreement Promptly|archive-url=https://web.archive.org/web/20170221035108/https://www.nytimes.com/2016/04/01/world/asia/obama-and-president-xi-of-china-vow-to-sign-paris-climate-accord-promptly.html|date=31 March 2016|archive-date=21 February 2017|last1=Davenport|first1=Coral|work=[[The New York Times]]}}</ref> The agreement was signed by 175 parties (174 states and the European Union) on the first day it was opened for signature.<ref name="historic">{{cite web|date=22 April 2016|title='Today is an historic day,' says Ban, as 175 countries sign Paris climate accord|url=https://www.un.org/apps/news/story.asp?NewsID=53756#.VxqAYGNpr-Y|url-status=live|archive-url=https://web.archive.org/web/20170629105154/http://www.un.org/apps/news/story.asp?NewsID=53756#.VxqAYGNpr-Y|archive-date=29 June 2017|access-date=29 June 2017|work=United Nations}}</ref><ref>{{cite web|date=22 April 2016|title=Paris Agreement Signature Ceremony|url=http://newsroom.unfccc.int/media/632121/list-of-representatives-to-high-level-signature-ceremony.pdf|archive-url=https://web.archive.org/web/20170516205241/http://newsroom.unfccc.int/media/632121/list-of-representatives-to-high-level-signature-ceremony.pdf|archive-date=16 May 2017|access-date=22 April 2016|work=[[UNFCCC]]}}</ref> As of January 2026, 194 states and the European Union have signed the agreement.<ref name="depo2">{{cite web|title=Paris Agreement|url=https://treaties.un.org/pages/ViewDetails.aspx?src=TREATY&mtdsg_no=XXVII-7-d&chapter=27&clang=_en|url-status=live|archive-url=https://web.archive.org/web/20210705141043/https://treaties.un.org/Pages/ViewDetails.aspx?src=TREATY&mtdsg_no=XXVII-7-d&chapter=27&clang=_en|archive-date=5 July 2021|access-date=15 July 2021|publisher=United Nations Treaty Collection}}</ref>
      [[File:Secretary Kerry Holds Granddaughter Dobbs-Higginson on Lap While Signing COP21 Climate Change Agreement at UN General Assembly Hall in New York (26512345421).jpg|thumb|left|Signing by [[John Kerry]] in [[United Nations General Assembly Hall]] for the United States]]
      The agreement would enter into force (and thus become fully effective) if 55 countries that produce at least 55% of [[List of countries by greenhouse gas emissions|the world's greenhouse gas emissions]] (according to a list produced in 2015)<ref name="ratpct">{{cite web|title=Information provided in accordance with paragraph 104 of decision 1 CP21 related to entry into force of the Paris Agreement (Article 21)|url=http://unfccc.int/resource/docs/2015/cop21/eng/10.pdf#page=30|url-status=live|archive-url=https://web.archive.org/web/20160221204004/http://unfccc.int/resource/docs/2015/cop21/eng/10.pdf#page=30|archive-date=21 February 2016|access-date=23 April 2016|work=UNFCCC}}</ref> ratify or otherwise join the treaty.<ref>Article 21(1)</ref><ref name=":13" /> Alternative ways to join the treaty are acceptance, approval or accession. The first two are typically used when a head of state is not necessary to bind a country to a treaty, whereas the latter typically happens when a country joins a treaty already in force.<ref>{{cite web |title=Glossary of terms relating to Treaty actions |url=https://treaties.un.org/Pages/Overview.aspx?path=overview/glossary/page1_en.xml#acceptance |website=United Nations Treaty Collection |language=EN |access-date=18 July 2021 |archive-date=22 May 2019 |archive-url=https://web.archive.org/web/20190522074345/https://treaties.un.org/Pages/Overview.aspx?path=overview%2Fglossary%2Fpage1_en.xml#acceptance |url-status=live }}</ref> After ratification by the European Union, the agreement obtained enough parties to enter into effect on 4 November 2016.<ref>{{Cite web|last=Yeo|first=Sophie|date=6 October 2016|title=Explainer: Paris Agreement on climate change to 'enter into force'|url=https://www.carbonbrief.org/explainer-paris-agreement-to-enter-into-force|access-date=8 May 2021|website=Carbon Brief|language=en|archive-date=8 May 2021|archive-url=https://web.archive.org/web/20210508084316/https://www.carbonbrief.org/explainer-paris-agreement-to-enter-into-force|url-status=live}}</ref>

      Both the EU and its member states are individually responsible for ratifying the Paris Agreement. A strong preference was reported that the EU and its 28 member states ratify at the same time to ensure that they do not engage themselves to fulfilling obligations that strictly belong to the other,<ref name="eurat">{{cite web|last=Yeo|first=Sophie|date=23 June 2016|title=Explainer: When will the European Union ratify the Paris Agreement?|url=https://www.carbonbrief.org/explainer-when-will-european-union-ratify-paris-agreement|url-status=live|archive-url=https://web.archive.org/web/20160905103935/http://www.carbonbrief.org/explainer-when-will-european-union-ratify-paris-agreement|archive-date=5 September 2016|access-date=3 September 2016|website=Carbon Brief}}</ref> and there were fears by observers that disagreement over each member state's share of the EU-wide reduction target, as well as Britain's [[Brexit|vote to leave the EU]] might delay the Paris pact.<ref name = "Nature">{{cite journal|url=http://www.nature.com/news/paris-climate-deal-to-take-effect-as-eu-ratifies-accord-1.20735|title=Paris climate deal to take effect as EU ratifies accord|journal=Nature|date=4 October 2016|access-date=5 October 2016|doi=10.1038/nature.2016.20735|last1=Schiermeier|first1=Quirin|s2cid=158043198|archive-url=https://web.archive.org/web/20161005125351/http://www.nature.com/news/paris-climate-deal-to-take-effect-as-eu-ratifies-accord-1.20735|archive-date=5 October 2016|url-status=live|url-access=subscription}}</ref> However, the EU deposited its instruments of ratification on 5 October 2016, along with seven EU member states.<ref name="Nature" />

      == Parties ==
      {{main|List of parties to the Paris Agreement}}
      [[File:The Prime Minister, Shri Narendra Modi greeting the President of Brazil, Ms. Dilma Rousseff, during Group Photo Session, at COP21 Summit, in Paris, France on November 30, 2015.jpg|thumb|The [[Prime Minister of India|Indian prime minister]], [[Narendra Modi]] greeting the [[president of Brazil]], [[Dilma Rousseff]], in background [[Prime Minister of Portugal|Portuguese prime minister]] [[António Costa]] at the COP21 Summit on 30 November 2015]]

      === Countries that have ratified or acceded ===
      The EU and 194 states, totalling over 98% of [[greenhouse gas emissions]], have ratified or acceded to the agreement.<ref name="depo2"/><ref name=BBC03.09.2016>[https://www.bbc.com/news/world-asia-china-37265541 "Paris climate deal: US and China formally join pact"] {{Webarchive|url=https://web.archive.org/web/20180102133942/http://www.bbc.com/news/world-asia-china-37265541 |date=2 January 2018 }}, [[BBC News]], 3 September 2016 (page visited on 4 September 2016).</ref><ref>{{cite web|url=http://www.ndtv.com/india-news/india-ratifies-landmark-paris-climate-deal-62nd-nation-to-join-club-1469274|title=India Ratifies Landmark Paris Climate Deal, Says, 'Kept Our Promise'|access-date=2 October 2016|archive-url=https://web.archive.org/web/20161003053948/http://www.ndtv.com/india-news/india-ratifies-landmark-paris-climate-deal-62nd-nation-to-join-club-1469274|archive-date=3 October 2016|url-status=live}}</ref> The only countries which have not ratified are some [[Climate change in the Middle East and North Africa#Greenhouse gas emissions|greenhouse gas emitters in the Middle East]]: Iran with 2% of the world total being the largest.<ref>{{Cite web|title=Each Country's Share of {{CO2}} Emissions|url=https://www.ucsusa.org/resources/each-countrys-share-co2-emissions|access-date=27 June 2021|website=Union of Concerned Scientists|archive-date=24 November 2018|archive-url=https://web.archive.org/web/20181124214635/https://www.ucsusa.org/global-warming/science-and-impacts/science/each-countrys-share-of-co2.html|url-status=live}}</ref> [[Libya]] and [[Yemen]] [[List of parties to the Paris Agreement#Signatories|have also not ratified the agreement]].<ref name="depo2"/> [[Eritrea]] is the latest country to ratify the agreement, on 7 February 2023.

      Article 28 enables parties to withdraw from the agreement after sending a withdrawal notification to the [[depositary]]. Notice can be given no earlier than three years after the agreement goes into force for the country. Withdrawal is effective one year after the depositary is notified.<ref>{{Cite web|date=14 June 2017|title=On the Possibility to Withdraw from the Paris Agreement: A Short Overview|url=https://unfccc.int/news/on-the-possibility-to-withdraw-from-the-paris-agreement-a-short-overview|access-date=4 April 2021|website=UNFCCC|archive-date=2 December 2018|archive-url=https://web.archive.org/web/20181202225733/https://unfccc.int/news/on-the-possibility-to-withdraw-from-the-paris-agreement-a-short-overview|url-status=live}}</ref>

      === United States withdrawal, readmittance, and rewithdrawal ===
      {{Main|United States and the Paris Agreement}}

      On 4 August 2017, the [[First presidency of Donald Trump|Trump administration]] delivered an official notice to the [[United Nations]] that the United States, the second largest emitter of greenhouse gases after China,<ref>World Resources Institute, 10 December 2010 [https://www.wri.org/blog/2020/12/interactive-chart-top-emitters "This Interactive Chart Shows Changes in the World's Top 10 Emitters"] {{Webarchive|url=https://web.archive.org/web/20210314061735/https://www.wri.org/blog/2020/12/interactive-chart-top-emitters |date=14 March 2021 }}</ref> intended to withdraw from the Paris Agreement as soon as it was eligible to do so.<ref name="UScom">{{cite web|url=https://treaties.un.org/doc/Publication/CN/2017/CN.464.2017-Eng.pdf|title=Reference: C.N.464.2017.TREATIES-XXVII.7.d (Depositary Notification)|date=8 August 2017|access-date=14 August 2017|publisher=United Nations|archive-url=https://web.archive.org/web/20170815062938/https://treaties.un.org/doc/Publication/CN/2017/CN.464.2017-Eng.pdf|archive-date=15 August 2017|url-status=live}}</ref> The notice of withdrawal could not be submitted until the agreement was in force for three years for the US, on 4 November 2019.<ref>{{Cite news| last1= Restuccia |first1 = Andrew|url=https://www.politico.com/story/2017/08/04/trump-notice-withdraw-from-paris-climate-deal-241331|title=Trump administration delivers notice U.S. intends to withdraw from Paris climate deal|work=Politico|date=4 August 2017|access-date=4 August 2017|archive-url=https://web.archive.org/web/20170804200935/http://www.politico.com/story/2017/08/04/trump-notice-withdraw-from-paris-climate-deal-241331|archive-date=4 August 2017|url-status=live}}</ref><ref>{{Cite news|url=http://www.cnn.com/2017/09/16/politics/trump-paris-climate-deal/index.html|title=WH: US staying out of climate accord|last=Liptak|first=Kevin|work=CNN|access-date=17 September 2017|archive-url=https://web.archive.org/web/20170917032944/http://www.cnn.com/2017/09/16/politics/trump-paris-climate-deal/index.html|archive-date=17 September 2017|url-status=live}}</ref> The U.S. government deposited the notification with the secretary-general of the United Nations and officially withdrew one year later on 4 November 2020.<ref>{{Cite news|url=https://www.washingtonpost.com/climate-environment/2019/11/04/trump-makes-it-official-us-will-withdraw-paris-climate-accord/|title=Trump makes it official: U.S. will withdraw from the Paris climate accord|last=Dennis|first=Brady|newspaper=[[The Washington Post]]|access-date=4 December 2019|archive-url=https://web.archive.org/web/20191109092116/https://www.washingtonpost.com/climate-environment/2019/11/04/trump-makes-it-official-us-will-withdraw-paris-climate-accord/|archive-date=9 November 2019|url-status=live}}</ref><ref>{{Cite journal|last=Schiermeier|first=Quirin|date=4 November 2020|title=The US has left the Paris climate deal – what's next?|url=https://www.nature.com/articles/d41586-020-03066-x|journal=Nature|language=en|doi=10.1038/d41586-020-03066-x|pmid=33149315|s2cid=226257744|access-date=18 July 2021|archive-date=18 July 2021|archive-url=https://web.archive.org/web/20210718162335/https://www.nature.com/articles/d41586-020-03066-x|url-status=live|url-access=subscription}}</ref> 

      President [[Joe Biden]] signed an executive order on his first day in office, 20 January 2021, to re-admit the United States into the Paris Agreement.<ref>{{Cite web|last=Medina|first=Daniella|title=Biden plans 17 executive orders on student loans, wearing masks and more. See the list|url=https://www.tennessean.com/story/news/2021/01/20/president-joe-biden-executive-orders-list-inauguration-forgive-student-loans-mask-mandate-muslim-ban/4227159001/|access-date=20 January 2021|website=The Tennessean|language=en-US|archive-date=21 January 2021|archive-url=https://archive.today/20210121045906/https://www.tennessean.com/story/news/2021/01/20/president-joe-biden-executive-orders-list-inauguration-forgive-student-loans-mask-mandate-muslim-ban/4227159001/|url-status=live}}</ref><ref>{{cite web |url=https://bidenwhitehouse.archives.gov/briefing-room/statements-releases/2021/01/20/paris-climate-agreement/ |title=Paris Climate Agreement |date=20 January 2021 |website=WH.gov |publisher=The White House |access-date=21 January 2021 |archive-date=21 January 2021 |archive-url=https://web.archive.org/web/20210121001024/https://www.whitehouse.gov/briefing-room/statements-releases/2021/01/20/paris-climate-agreement/ |url-status=live }}</ref> Following the 30-day period set by Article 21.3, the U.S. was readmitted to the agreement.<ref name=":20">{{cite web | url = https://www.theguardian.com/environment/2021/feb/19/us-official-return-paris-climate-pact | title = US makes official return to Paris climate pact | date = 19 February 2021 | access-date = 19 February 2021 | publisher = [[Associated Press]] | via = [[The Guardian]] | archive-date = 19 February 2021 | archive-url = https://web.archive.org/web/20210219091824/https://www.theguardian.com/environment/2021/feb/19/us-official-return-paris-climate-pact | url-status = live }}</ref> [[U.S. Special Presidential Envoy for Climate|United States climate envoy]] [[John Kerry]] took part in virtual events, saying that the US would "earn its way back" into legitimacy in the Paris process.<ref name=":8">{{Cite news|last=Volcovici|first=Valerie|date=19 February 2021|title=It's official: U.S. back in the Paris climate club|language=en|work=Reuters|url=https://www.reuters.com/article/us-climate-change-usa-idUSKBN2AJ16T|access-date=20 February 2021|archive-date=20 February 2021|archive-url=https://web.archive.org/web/20210220084550/https://www.reuters.com/article/us-climate-change-usa-idUSKBN2AJ16T|url-status=live}}</ref> [[Secretary-General of the United Nations|United Nations secretary-general]] [[António Guterres]] welcomed the return of the United States as restoring the "missing link that weakened the whole".<ref name=":8" />

      On 20 January 2025, President [[Donald Trump]] signed an executive order again withdrawing the U.S. from the agreement.<ref>{{Cite news |last1=Volcovici |first1=Valerie |last2=Ward |first2=Jasper |date=20 January 2025 |title=Trump to withdraw from Paris climate agreement, White House says |url=https://www.reuters.com/business/environment/trump-withdraw-paris-climate-agreement-2025-01-20/ |access-date=20 January 2025 |work=[[Reuters]]}}</ref> The withdrawal went into effect on 27 January 2026.<ref>{{Cite web |date=2026-01-27 |title=So long, Paris: US officially leaves landmark climate pact |url=https://www.politico.com/news/2026/01/27/so-long-paris-u-s-officially-leaves-landmark-climate-pact-00746628 |access-date=2026-01-28 |website=POLITICO |language=en}}</ref>

      ==Content==
      === Structure ===
      The Paris Agreement is a short agreement with 16 introductory paragraphs and 29 articles. It contains procedural articles (covering, for example, the criteria for its entry into force) and operational articles (covering, for example, mitigation, [[Climate change adaptation|adaptation]] and finance). It is a binding agreement, but many of its articles do not imply obligations or are there to facilitate international collaboration.<ref>{{Cite journal |last=Savaresi |first=Annalisa |date=2016 |title=The Paris Agreement: a new beginning? |url=https://dspace.stir.ac.uk/bitstream/1893/24099/1/ParisAgreementANewBeginning.pdf |url-status=live |journal=Journal of Energy & Natural Resources Law |volume=34 |issue=1 |pages=16–26 |bibcode=2016JENRL..34...16S |doi=10.1080/02646811.2016.1133983 |issn=0264-6811 |s2cid=146999274 |archive-url=https://web.archive.org/web/20210724140207/https://dspace.stir.ac.uk/bitstream/1893/24099/1/ParisAgreementANewBeginning.pdf |archive-date=24 July 2021 |access-date=24 July 2021 |hdl-access=free |hdl=1893/24099}}</ref> It covers most greenhouse gas emissions, but does not apply to international [[aviation]] and [[Freight transport|shipping]], which fall under the responsibility of the [[International Civil Aviation Organization]] and the [[International Maritime Organization]], respectively.<ref>{{cite book |author=[[Andrew Dessler]] |title=The Science and Politics of Global Climate Change: A Guide to the Debate |author2=Edward A Parson |publisher=[[Cambridge University Press]] |year=2020 |isbn=978-1-316-63132-4 |pages=190–191}}</ref>

      The Paris Agreement has been described as having a bottom-up structure, as its core [[pledge and review]] mechanism allows nations to set their own nationally determined contributions (NDCs), rather than having targets imposed top down.<ref name="Falkner">{{cite journal |author=Robert Falkner |author1-link=Robert Falkner |year=2016 |title=The Paris Agreement and the new logic of international climate politics |url=http://eprints.lse.ac.uk/67741/2/Falkner_Paris%20agreement_2016.pdf |url-status=live |journal=[[International Affairs (journal)|International Affairs]] |volume=92 |issue=5 |pages=1107–1125 |doi=10.1111/1468-2346.12708 |archive-url=https://web.archive.org/web/20211030043759/http://eprints.lse.ac.uk/67741/2/Falkner_Paris%20agreement_2016.pdf |archive-date=30 October 2021 |access-date=15 July 2021}}</ref><ref>{{cite book |title=The Science and Politics of Global Climate Change: A Guide to the Debate |publisher=[[Cambridge University Press]] |year=2020 |isbn=978-1-316-63132-4 |pages=28, 137–148, 175–179 |author=[[Andrew Dessler]] |author2=Edward A Parson }}</ref> Unlike its predecessor, the Kyoto Protocol, which sets commitment targets that have legal force, the Paris Agreement, with its emphasis on [[Consensus decision-making|consensus building]], allows for voluntary and nationally determined targets.<ref name=":2">{{cite web |last=Taraska |first=Gwynne |date=15 December 2015 |title=The Paris Climate Agreement |url=https://cdn.americanprogress.org/wp-content/uploads/2015/12/15030725/ParisClimateAgreement.pdf |url-status=live |archive-url=https://web.archive.org/web/20161118224648/https://cdn.americanprogress.org/wp-content/uploads/2015/12/15030725/ParisClimateAgreement.pdf |archive-date=18 November 2016 |publisher=Center for American Progress}}</ref> The specific climate goals are thus politically encouraged, rather than legally bound. Only the processes governing the reporting and review of these goals are mandated under [[international law]]. This structure is especially notable for the United States{{snd}}because there are no legal mitigation or finance targets, the agreement is considered an "executive agreement rather than a treaty". Because the UNFCCC treaty of 1992 received the consent of the US Senate, this new agreement does not require further legislation.<ref name=":2" />

      Another key difference between the Paris Agreement and the Kyoto Protocol is their scope. The Kyoto Protocol differentiated between [[List of parties to the Kyoto Protocol|Annex-I]], richer countries with a historical responsibility for climate change, and non-Annex-I countries, but this division is blurred in the Paris Agreement as all parties are required to submit emissions reduction plans.<ref name=":3">{{Cite news |last=Sinha |first=Amitabh |date=14 December 2015 |title=Paris climate talks: Differentiation of developed and developing stays, India happy |url=http://indianexpress.com/article/india/india-news-india/paris-climate-talks-differentiation-of-developed-and-developing-stays-india-happy/ |url-status=live |archive-url=https://web.archive.org/web/20160920110254/http://indianexpress.com/article/india/india-news-india/paris-climate-talks-differentiation-of-developed-and-developing-stays-india-happy/ |archive-date=20 September 2016}}</ref> The Paris Agreement still emphasizes the principle of [[Common But Differentiated Responsibilities|Common but Differentiated Responsibility and Respective Capabilities]]{{snd}}the acknowledgement that different nations have different capacities and duties to climate action{{snd}}but it does not provide a specific division between developed and developing nations.<ref name=":3" />

      === Nationally determined contributions ===
      {{Main|Nationally determined contributions}}
      [[File:Probability_that_countries_achieve_their_Paris_Agreement_Goals_according_to_their_nationally_determined_contributions_(NDCs).webp|thumb|upright=1.5|Probability that countries achieve their Paris Agreement Goals according to their [[nationally determined contribution]]s as of 2021 (NDCs)<ref name="10.1038/s43247-021-00097-8">{{cite journal |last1=Liu |first1=Peiran R. |last2=Raftery |first2=Adrian E. |date=9 February 2021 |title=Country-based rate of emissions reductions should increase by 80% beyond nationally determined contributions to meet the 2 °C target |journal=Communications Earth & Environment |language=en |volume=2 |issue=1 |page=29 |bibcode=2021ComEE...2...29L |doi=10.1038/s43247-021-00097-8 |issn=2662-4435 |pmc=8064561 |pmid=33899003 |doi-access=free}} [[File:CC-BY icon.svg|50x50px]] Available under [[creativecommons:by/4.0/|CC BY 4.0]].</ref>]]
      Countries determine themselves what contributions they should make to achieve the aims of the treaty. As such, these plans are called ''[[nationally determined contributions]]'' (NDCs).<ref name="Article3">Article 3, [https://treaties.un.org/pages/ViewDetails.aspx?src=TREATY&mtdsg_no=XXVII-7-d&chapter=27&clang=_en Paris Agreement (2015)]</ref> Article 3 requires NDCs to be "ambitious efforts" towards "achieving the purpose of this Agreement" and to "represent a progression over time".<ref name="Article3" /> The contributions should be set every five years and are to be registered by the [[United Nations Framework Convention on Climate Change#Secretariat|UNFCCC Secretariat]].<ref>Article 4(9), [https://treaties.un.org/pages/ViewDetails.aspx?src=TREATY&mtdsg_no=XXVII-7-d&chapter=27&clang=_en Paris Agreement (2015)]</ref> Each further ambition should be more ambitious than the previous one, known as the principle of ''progression''.<ref>Articles 3, 9(3), [https://treaties.un.org/pages/ViewDetails.aspx?src=TREATY&mtdsg_no=XXVII-7-d&chapter=27&clang=_en Paris Agreement (2015)]</ref> Countries can cooperate and pool their nationally determined contributions. The Intended Nationally Determined Contributions pledged during the [[2015 Climate Change Conference]] are converted to NDCs when a country ratifies the Paris Agreement, unless they submit an update.<ref>{{Cite book|last1=Taibi|first1=Fatima-Zahra|url=https://ecbi.org/sites/default/files/2020%20Pocket%20Guide%20to%20NDCs.pdf|title=Pocket Guide to NDCs: 2020 Edition|last2=Konrad|first2=Susanne|last3=Bois von Kursk|first3=Olivier|publisher=European Capacity Building Initiative|year=2020|editor-last=Sharma|editor-first=Anju|page=1|access-date=15 May 2021|archive-date=17 April 2021|archive-url=https://web.archive.org/web/20210417170754/https://ecbi.org/sites/default/files/2020%20Pocket%20Guide%20to%20NDCs.pdf|url-status=live}}</ref><ref>{{Cite web|last=Staff|date=22 November 2019|title=National Climate Action under the Paris Agreement|url=https://www.wri.org/ndcs|access-date=13 May 2021|website=World Resources Institute|language=en|archive-date=13 May 2021|archive-url=https://web.archive.org/web/20210513062710/https://www.wri.org/ndcs|url-status=live}}</ref>

      The Paris Agreement does not prescribe the exact nature of the NDCs. At a minimum, they should contain mitigation provisions, but they may also contain pledges on adaptation, finance, [[technology transfer]], [[capacity building]] and transparency.<ref>{{Cite book|last1=Taibi|first1=Fatima-Zahra|url=https://ecbi.org/sites/default/files/2020%20Pocket%20Guide%20to%20NDCs.pdf|title=Pocket Guide to NDCs: 2020 Edition|last2=Konrad|first2=Susanne|last3=Bois von Kursk|first3=Olivier|publisher=European Capacity Building Initiative|year=2020|editor-last=Sharma|editor-first=Anju|page=17|access-date=15 May 2021|archive-date=17 April 2021|archive-url=https://web.archive.org/web/20210417170754/https://ecbi.org/sites/default/files/2020%20Pocket%20Guide%20to%20NDCs.pdf|url-status=live}}</ref> Some of the pledges in the NDCs are unconditional, but others are conditional on outside factors such as getting finance and technical support, the ambition from other parties or the details of rules of the Paris Agreement that are yet to be set. Most NDCs have a conditional component.<ref>{{Cite book|last1=Taibi|first1=Fatima-Zahra|url=https://ecbi.org/sites/default/files/2020%20Pocket%20Guide%20to%20NDCs.pdf|title=Pocket Guide to NDCs: 2020 Edition|last2=Konrad|first2=Susanne|last3=Bois von Kursk|first3=Olivier|publisher=European Capacity Building Initiative|year=2020|editor-last=Sharma|editor-first=Anju|pages=32–33|access-date=15 May 2021|archive-date=17 April 2021|archive-url=https://web.archive.org/web/20210417170754/https://ecbi.org/sites/default/files/2020%20Pocket%20Guide%20to%20NDCs.pdf|url-status=live}}</ref>

      While the NDCs themselves are not binding, the procedures surrounding them are. These procedures include the obligation to prepare, communicate and maintain successive NDCs, set a new one every five years, and provide information about the implementation.<ref>{{Cite journal|last=Bodansky|first=Daniel|date=2016|title=The Legal Character of the Paris Agreement|url=https://onlinelibrary.wiley.com/doi/abs/10.1111/reel.12154|journal=Review of European, Comparative & International Environmental Law|language=en|volume=25|issue=2|pages=142–150|doi=10.1111/reel.12154|bibcode=2016RECIE..25..142B |issn=2050-0394|access-date=7 March 2021|archive-date=18 March 2021|archive-url=https://web.archive.org/web/20210318073355/https://onlinelibrary.wiley.com/doi/abs/10.1111/reel.12154|url-status=live|url-access=subscription}}</ref> There is no mechanism to force<ref name="reguly2015">{{cite news|last1=Reguly|first1=Eric|last2=McCarthy|first2=Shawn|date=14 December 2015|title=Paris climate accord marks shift toward low-carbon economy|newspaper=Globe and Mail|location=Toronto, Canada|url=https://www.theglobeandmail.com/news/world/optimism-in-paris-as-final-draft-of-global-climate-deal-tabled/article27739122/|url-status=live|access-date=14 December 2015|archive-url=https://web.archive.org/web/20151213170301/http://www.theglobeandmail.com/news/world/optimism-in-paris-as-final-draft-of-global-climate-deal-tabled/article27739122/|archive-date=13 December 2015}}</ref> a country to set a NDC target by a specific date, nor to meet their targets.<ref name="BBC-Kinver">{{cite web|last=Mark|first=Kinver|date=14 December 2015|title=COP21: What does the Paris climate agreement mean for me?|url=https://www.bbc.com/news/science-environment-35092127|url-status=live|archive-url=https://web.archive.org/web/20151214130942/http://www.bbc.com/news/science-environment-35092127|archive-date=14 December 2015|access-date=14 December 2015|website=BBC News|publisher=BBC}}</ref><ref>{{cite news |url=https://www.nytimes.com/2015/12/13/world/europe/climate-change-accord-paris.html |title=Nations Approve Landmark Climate Accord in Paris |last=Davenport |first=Coral |date=12 December 2015 |newspaper=The New York Times |access-date=14 December 2015 |archive-url=https://web.archive.org/web/20151214090225/http://www.nytimes.com/2015/12/13/world/europe/climate-change-accord-paris.html |archive-date=14 December 2015 |url-status=live }}</ref> There will be only a [[name and shame]] system<ref>{{cite web |first1 = Chetan |last1=Chauhan|url=http://www.hindustantimes.com/india/paris-climate-deal-what-the-agreement-means-for-india-and-the-world/story-U7TWH8dusBqRV8pzmqDG8M.html|title=Paris climate deal: What the agreement means for India and the world|access-date=14 December 2015|date=14 December 2015|work=[[Hindustan Times]]|archive-url=https://web.archive.org/web/20151214182821/http://www.hindustantimes.com/india/paris-climate-deal-what-the-agreement-means-for-india-and-the-world/story-U7TWH8dusBqRV8pzmqDG8M.html|archive-date=14 December 2015|url-status=live}}</ref> or as [[János Pásztor (diplomat)|János Pásztor]], the former U.N. assistant secretary-general on climate change, stated, a "name and encourage" plan.<ref>{{cite web |url=http://www.cbsnews.com/news/cop21-climate-change-conference-final-draft-historic-plan/ |title=Climate negotiators strike deal to slow global warming |date=12 December 2015 |work=[[CBS News]] |last1=Falk|first1= Pamela |access-date=14 December 2015 |archive-url=https://web.archive.org/web/20151213054835/http://www.cbsnews.com/news/cop21-climate-change-conference-final-draft-historic-plan/ |archive-date=13 December 2015 |url-status=live }}</ref>

      === Global stocktake ===
      {{multiple image
      | total_width       = 450
      | image1            = 20210626 Variwide chart of greenhouse gas emissions per capita by country.svg
      | caption1          = Greenhouse gas emissions ''per person'' in the highest-emitting countries.<ref name=GlobalCarbonAtlas_Territorial_MtCO2>● Source for carbon emissions data: {{cite web |title=Territorial (MtCO<sub>2</sub>) / Emissions / Carbon emissions / Chart View |url=https://globalcarbonatlas.org/emissions/carbon-emissions/ |date=2024 |publisher=Global Carbon Atlas }}<br />● Source for country population data: {{cite web |title=Population 2022 |url=https://databankfiles.worldbank.org/public/ddpext_download/POP.pdf |publisher=World Bank |archive-url=https://archive.today/20241022200208/https://databankfiles.worldbank.org/public/ddpext_download/POP.pdf |archive-date=22 October 2024 |date=2024 |url-status=live }}</ref> Though China has the greatest total annual carbon dioxide emissions, the U.S. and a few other high-emitting countries exceed China in ''per capita'' emissions.
      | image2           = CO2 emission pie chart.svg
      | caption2         = Share of global carbon dioxide emissions, total for each country without regard to population size<ref>{{cite web |title=GHG emissions of all world countries |url=https://edgar.jrc.ec.europa.eu/report_2024 |publisher=Emissions Database for Global Atmospheric Research (EDGAR) |archive-url=https://web.archive.org/web/20250315145619/https://edgar.jrc.ec.europa.eu/report_2024 |archive-date=15 March 2025 |date=2024 |url-status=live}} (select "CO2 total emissions" from dropdown list). ● Link directly to [https://edgar.jrc.ec.europa.eu/report_2024?vis=co2tot#emissions_table table] (click on "CO2 total emissions").</ref>
      }}Under the Paris Agreement, countries must increase their ambition every five years. To facilitate this, the agreement established the [[Global stocktake|Global Stocktake]], which assesses progress, with the first evaluation in 2023. The outcome is to be used as input for new nationally determined contributions of parties.<ref>article 14 {{cite web|author=<!--Staff writer(s); no by-line.-->|date=12 December 2015|title=Framework Convention on Climate Change|url=http://unfccc.int/resource/docs/2015/cop21/eng/l09.pdf|url-status=live|archive-url=https://web.archive.org/web/20151212201810/http://unfccc.int/resource/docs/2015/cop21/eng/l09.pdf|archive-date=12 December 2015|access-date=12 December 2015|website=United Nations FCCC Int.|publisher=United Nations}}</ref> The [[Talanoa Dialogue]] in 2018 was seen as an example for the global stocktake.<ref>{{Cite report|url=https://newclimate.org/wp-content/uploads/2019/12/iGST-NewClimate-Questions-for-the-Global-Stocktake-1.pdf|title=Guiding questions for the Global Stocktake under the Paris Agreement|last1=Höhne|first1=Niklas|last2=Louise|first2=Jeffery|date=November 2019|publisher=NewClimate Institute|last3=Nilsson|first3=Anna|last4=Fekete|first4=Hanna|access-date=7 March 2021|archive-date=10 March 2021|archive-url=https://web.archive.org/web/20210310232917/https://newclimate.org/wp-content/uploads/2019/12/iGST-NewClimate-Questions-for-the-Global-Stocktake-1.pdf|url-status=live}}</ref> After a year of discussion, a report was published and there was a call for action, but countries did not increase ambition afterwards.<ref>{{Cite journal|last1=Hermwille|first1=Lukas|last2=Siemons|first2=Anne|last3=Förster|first3=Hannah|last4=Jeffery|first4=Louise|date=2019|title=Catalyzing mitigation ambition under the Paris Agreement: elements for an effective Global Stocktake|journal=Climate Policy|volume=19|issue=8|pages=988–1001|doi=10.1080/14693062.2019.1624494|bibcode=2019CliPo..19..988H |s2cid=197773078|issn=1469-3062|doi-access=free|hdl=1871.1/cbd8cb40-3d5d-41b6-9c79-1afdd987554f|hdl-access=free}}</ref>

      The stocktake works as part of the Paris Agreement's effort to create a "ratcheting up" of ambition in emissions cuts. Because analysts agreed in 2014 that the NDCs would not limit rising temperatures below 2&nbsp;°C, the global stocktake reconvenes parties to assess how their new NDCs must evolve so that they continually reflect a country's "highest possible ambition".<ref name=":1">{{cite web|last=Yeo|first=Sophie|date=19 January 2016|title=The Paris Agreement 'Ratchet Mechanism'|url=https://www.carbonbrief.org/timeline-the-paris-agreements-ratchet-mechanism|url-status=live|archive-url=https://web.archive.org/web/20161119055158/https://www.carbonbrief.org/timeline-the-paris-agreements-ratchet-mechanism|archive-date=19 November 2016|website=Carbon Brief}}</ref> While ratcheting up the ambition of NDCs is a major aim of the global stocktake, it assesses efforts beyond mitigation. The five-year reviews will also evaluate adaptation, [[climate finance]] provisions, and technology development and transfer.<ref name=":1" />

      On 30 November 2023, the United Nations Climate Change Conference (COP28) commenced in Dubai with renewed calls for amplified efforts towards climate action.<ref>{{cite news |date=4 June 2024 |title=COP28 Opens in Dubai |url=https://www.bbc.com/news/science-environment-67143989}}</ref>

      === Mitigation provisions and carbon markets ===
      Article 6 has been flagged as containing some of the key provisions of the Paris Agreement.<ref name=":4">{{cite web|url=http://www.ieta.org/resources/Resources/Position_Papers/2016/IETA_Article_6_Implementation_Paper_May2016.pdf|title=Article 6 Implementation Paper|date=20 May 2016|website=International Emissions Trading Association|archive-url=https://web.archive.org/web/20161017115236/http://ieta.org/resources/Resources/Position_Papers/2016/IETA_Article_6_Implementation_Paper_May2016.pdf|archive-date=17 October 2016|url-status=live}}</ref> Broadly, it outlines the [[Cooperative Mechanisms under Article 6 of the Paris Agreement|cooperative approaches]] that parties can take in achieving their nationally determined carbon emissions reductions. In doing so, it helps establish the Paris Agreement as a framework for a global carbon market.<ref name=":5">{{Cite journal|last=Stavins|first=Robert|year=2016|title=Market Mechanisms in the Paris Climate Agreement: International Linkage under Article 6.2|url=http://belfercenter.ksg.harvard.edu/files/2016-10_paris-agreement-beyond_v4.pdf#page=59|journal=Harvard Project on Climate Agreements|archive-url=https://web.archive.org/web/20161119062203/http://belfercenter.ksg.harvard.edu/files/2016-10_paris-agreement-beyond_v4.pdf#page=59|archive-date=19 November 2016|access-date=18 November 2016}}</ref> Article 6 is the only important part of the agreement yet to be resolved; [[2019 United Nations Climate Change Conference|negotiations in 2019]] did not produce a result.<ref name=":12">{{Cite web|last1=Evans|first1=Simon|last2=Gabbatiss|first2=John|date=29 November 2019|title=In-depth Q&A: How 'Article 6' carbon markets could 'make or break' the Paris Agreement|url=https://www.carbonbrief.org/in-depth-q-and-a-how-article-6-carbon-markets-could-make-or-break-the-paris-agreement|url-status=live|access-date=7 March 2021|website=Carbon Brief|language=en|archive-date=20 April 2020|archive-url=https://web.archive.org/web/20200420143355/https://www.carbonbrief.org/in-depth-q-and-a-how-article-6-carbon-markets-could-make-or-break-the-paris-agreement}}</ref> The topic was settled during the [[2021 United Nations Climate Change Conference|2021 COP26 in Glasgow]]. A mechanism, the "corresponding adjustment", was established to avoid double counting for emission offsets.<ref>{{Cite web |title=Climate Explainer: Article 6 |url=https://www.worldbank.org/en/news/feature/2022/05/17/what-you-need-to-know-about-article-6-of-the-paris-agreement |access-date=26 January 2023 |website=World Bank |language=en}}</ref>

      ==== Linkage of carbon trading systems and ITMOs ====
      {{main|Cooperative mechanisms under Article 6 of the Paris Agreement}}
      [[Cooperative Mechanisms under Article 6 of the Paris Agreement#Article 6.2: Cooperative Approaches|Paragraphs 6.2]] and 6.3 establish a framework to govern the [[Internationally transferred mitigation outcomes|international transfer of mitigation outcomes]] (ITMOs). The agreement recognizes the rights of parties to use emissions reductions outside of their own borders toward their NDC, in a system of carbon accounting and trading.<ref name=":5" /> This provision requires the "linkage" of carbon emissions trading systems{{snd}}because measured emissions reductions must avoid "double counting", transferred mitigation outcomes must be recorded as a gain of emission units for one party and a reduction of emission units for the other,<ref name=":4" /> a so-called "corresponding adjustment".<ref>[https://unfccc.int/sites/default/files/resource/Art._6.2%2520_draft_decision.pdf UNFCCC.int – Draft CMA decision on guidance on cooperative approaches referred to in Art. 6, paragraph 2, of the Paris Agreement]</ref> Because the NDCs, and domestic carbon trading schemes, are heterogeneous, the ITMOs will provide a format for global linkage under the auspices of the UNFCCC.<ref name=":6">{{Cite book|last=Marcu|first=Andrei|year=2016|editor-last=Stavins|editor-first=Robert|title=The Paris agreement and beyond|url=http://belfercenter.ksg.harvard.edu/files/2016-10_paris-agreement-beyond_v4.pdf#page=53|publisher=Harvard Project on Climate Agreements|chapter=Governance of Carbon Markets under Article 6 of the Paris Agreement|archive-url=https://web.archive.org/web/20161119062203/http://belfercenter.ksg.harvard.edu/files/2016-10_paris-agreement-beyond_v4.pdf#page=53|archive-date=19 November 2016|access-date=18 November 2016}}</ref> The provision thus also creates a pressure for countries to adopt emissions management systems{{snd}}if a country wants to use more cost-effective cooperative approaches to achieve their NDCs, they will have to monitor carbon units for their economies.<ref>{{cite web|url=http://www.theenergycollective.com/davidhone/2378184/a-vision-for-article-6-of-the-paris-agreement|title=A Vision for Article 6 of the Paris Agreement|last=Hone|first=David|date=16 May 2016|website=The Energy Collective|archive-url=https://web.archive.org/web/20161120003330/http://www.theenergycollective.com/davidhone/2378184/a-vision-for-article-6-of-the-paris-agreement|archive-date=20 November 2016|url-status=live}}</ref>

      So far, as the only country who wants to buy ITMOs, Switzerland has signed deals regarding ITMO tradings with Peru, Ghana, Senegal, Georgia, Dominica, Vanuatu, Thailand and Ukraine.

