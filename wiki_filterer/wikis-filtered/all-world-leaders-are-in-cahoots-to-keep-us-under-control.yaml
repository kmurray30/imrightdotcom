      ==== Criticism against PEPP ====
      Overall, the PEPP programme was widely welcomed by market participants and European policy makers. However in March 2021, a group of German economists and lawyers filed a lawsuit against the PEPP at the [[Federal Constitutional Court|German Federal Constitutional Court]].<ref name="Tesche-2022b" /><ref name="Wellink-2023d" />

      ===== New TLTRO III and PELTROs =====
      On 30 April 2020, the ECB Governing council introduced additional measures to support the economy during the Covid19 pandemic, including PELTROs and new modalities for the TLTROs.

      First, the ECB made several adjustments to the framework of its TLTRO III.<ref name="Bank-2020c">{{Cite journal |date=30 April 2020 |title=ECB announces new pandemic emergency longer-term refinancing operations |url=https://www.ecb.europa.eu/press/pr/date/2020/html/ecb.pr200430_1~477f400e39.en.html |access-date=7 December 2023 |website=European Central Bank – Eurosystem}}</ref> A key change was that the ECB also reduced the interest rate applied to these open market operations to a rate going as low as −1% for the banks meeting the lending threshold of 0%.<ref name="Bank-2020c" /> With the TLTRO III, the participating banks were thus enabled to borrow at lower interest rates than those paid on their excess reserve.<ref name="Castillo Lozoya-2022">{{Cite journal |last1=Castillo Lozoya |first1=M. Carmen |last2=García-Escudero |first2=Enrique Esteban |last3=Pérez Ortiz |first3=Maria Luisa |date=7 April 2022 |title=The Effect of TLTRO III on Spanish Credit Institutions' Balance Sheets |url=https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4101166 |journal=Banco de España |issue=9/22 |pages=3–8 |ssrn=4101166 |via=Social Science Research Network}}</ref>  Another key change was thet ECB's decision to expand bank's borrowing allowance under TLTRO III from 30% to 50%, then up to 55% of their portfolio of loans to firms and households.<ref>ECB press release, 10 December 2020.</ref>

      Second, the ECB introduced pandemic emergency long-term refinancing operations (PELTROs).<ref name="ECB press release, 30 April 2020">ECB press release, 30 April 2020.</ref> The market operations are similar to the TLTRO III, but are conduced in a more fequent basis in order to ensure smooth liquidity provision to the market.

      During the pandemic, these monetary responses proved essential. In their absence, a credit crunch would normally have taken place. Indeed, increase in demand traditionally translates in a rise of borrowing costs.<ref name="Altavilla-2023">{{Cite journal |last1=Altavilla |first1=Carlo |last2=Barbiero |first2=Francesca |last3=Boucinha |first3=Miguel |last4=Burlon |first4=Lorenzo |date=13 May 2023 |title=The Great Lockdown: Pandemic response policies and bank lending conditions |url=https://www.sciencedirect.com/science/article/pii/S0014292123001071 |journal=European Economic Review |volume=156 |pages=6–14 |article-number=104478 |doi=10.1016/j.euroecorev.2023.104478 |via=Elsevier Science Direct}}</ref> Reports from various member states central banks on the matter indicate that loans supply by participating banks has indeed expanded, in line with the ECB policy.<ref name="Barmeier-2023" /><ref name="Castillo Lozoya-2022" /><ref>{{Cite journal |last1=Kwapil |first1=Claudia |last2=Rieder |first2=Kilian |date=11 March 2021 |title=The effects of the monetary policy response to the COVID-19 pandemic: preliminary evidence from a pilot study using Austrian bank-level data |url=https://www.oenb.at/en/Publications/Economics/Monetary-Policy-and-the-Economy/2021/monetary-policy-and-the-economy-q4-20-q1-21.html |journal=Monetary Policy and the Economy Q4/20-Q1/21 |page=134 |via=Oesterreichische Nationalbank}}</ref> Accordingly, thorough academic studies have confirmed the actual enhancement of financing conditions and the avoidance of credit scarcity.<ref name="Altavilla-2023" /><ref>{{Cite journal |last1=Dwyer |first1=Gerald |last2=Gilevska |first2=Biljana |last3=Nieto |first3=Maria |last4=Samartín |first4=Margarita |date=1 July 2023 |title=The effects of the ECB's unconventional monetary policies from 2011 to 2018 on banking assets. |url=|journal=Journal of International Financial Markets |volume=87 |page=28 |article-number=101800 |doi=10.1016/j.intfin.2023.101800 |doi-access=free }}</ref> In fact, the credit to firms attained unprecedented levels when from March to May 2020, it increased by €250 billion on aggregate.<ref name="Altavilla-2023" /> Furthermore, analysts observed  that even non-participating banks (to the TLTROs and PELTROs) benefited from it in parallel manners.

      ==== Transmission Protection instrument (TPI) ====
      The Transmission Protection Instrument (TPI) is a tool the ECB could use to ensure monetary policy decisions are smoothly transmitted across all euro area countries, introduced on 21 July 2022.<ref name="Bertoldi-2023c"/><ref name="Broeders-2023c">{{Cite journal |last1=Broeders |first1=Dirk |last2=de Haan |first2=Leo |last3=van den End |first3=Jan Willem |date=10 June 2023 |title=How quantitative easing changes the nature of sovereign risk |url=https://www.sciencedirect.com/science/article/pii/S0261560623000827 |journal=Journal of International Money and Finance |volume=137 |pages=3–11 |article-number=102881 |doi=10.1016/j.jimonfin.2023.102881 |s2cid=259541844 |via=Elsevier Science Direct |hdl-access=free |hdl=1871.1/6bab4cb8-1f5e-4670-8381-374e6a8ed3f3}}</ref><ref name="Arnold-2023c">{{Cite journal |last=Arnold |first=Ivo J.M. |date=26 September 2023 |title=Teaching economics of monetary union with the IS-MP-PC model |url=https://www.sciencedirect.com/science/article/pii/S1477388023000178 |journal=International Review of Economics Education |volume=44 |pages=4–9 |article-number=100276 |doi=10.1016/j.iree.2023.100276 |via=Elsevier Science Direct}}</ref><ref name="Bank-2022">{{Cite journal |date=21 July 2022 |title=The Transmission Protection Instrument |url=https://www.ecb.europa.eu/press/pr/date/2022/html/ecb.pr220721~973e6e7273.en.html |access-date=19 December 2023 |website=European Central Bank – Eurosystem |last1=Bank |first1=European Central }}</ref><ref name="Lengwiler-2023">{{Cite journal |last1=Lengwiler |first1=Yvan |last2=Orphanides |first2=Athanasios |date=21 March 2023 |title=Collateral Framework: Liquidity Premia and Multiple Equilibria |url=https://onlinelibrary.wiley.com/doi/epdf/10.1111/jmcb.13048 |journal=Journal of Money, Credit and Banking |volume=56 |issue=2–3 |pages=20–21 |doi=10.1111/jmcb.13048 |via=Wiley Online Library|hdl=10419/233209 |hdl-access=free }}</ref> Under the TPI, the ECB would be able to purchase securities in the secondary market, to counter against "unwanted, disorderly market dynamics", self fulfilling crises market expectations that do not reflect reality,<ref name="Sandbu-2022">{{Cite web |last=Sandbu |first=Martin |date=21 July 2022 |title=The ECB reminds everyone who really has the authority |url=https://www.ft.com/content/3f1e6cb3-1a63-412e-bb1f-a8624760fd86 |access-date=19 December 2023 |website=Financial Times}}</ref><ref name="Callegari-2023">{{Cite journal |last1=Callegari |first1=Giovanni |last2=Marimon |first2=Ramon |last3=Wicht |first3=Adrien |last4=Zavalloni |first4=Luca |date=5 August 2023 |title=On a lender of last resort with a central bank and a stability Fund |journal=Review of Economic Dynamics |volume=50 |page=118 |doi=10.1016/j.red.2023.07.012 |doi-access=free |hdl=10230/59232 |hdl-access=free }}</ref><ref name="Spendzharova-2023">{{Cite journal |last=Spendzharova |first=Aneta |date=29 August 2023 |title=Gouvernement Économique, but Not Like in the 1990s: The Commission and the ECB's Policies Advancing the 'Green Transition' |journal=Journal of Common Market Studies |volume=61 |page=143 |doi=10.1111/jcms.13541 |doi-access=free }}</ref> thus not justified by "country specific fundamentals."<ref name="Arnold-2023c"/><ref name="Wellink-2023d"/><ref name="Bank-2022" /><ref name="Peychev-2022">{{Cite journal |last=Peychev |first=Anna |date=9 November 2022 |title=Disorder and Discipline: The ECB's Transmission Protection Instrument |url=https://www.europeanpapers.eu/en/europeanforum/disorder-discipline-ecb-transmission-protection-instrument |journal=European Papers |volume=7 |issue=2 |pages=739–747 }}</ref><ref name="Arnold-2022">{{Cite web |last=Arnold |first=Martin |date=21 July 2022 |title=Spread betting: how will the ECB's new bond-buying tool work? |url=https://www.ft.com/content/c5499acd-0271-458d-8363-9e75633399ee |access-date=19 December 2023 |website=Financial Times}}</ref><ref name="FT-2022">{{Cite web |date=22 July 2022 |title=The ECB arms itself against bond market pessimism |url=https://www.ft.com/content/aed7b9f8-87d3-4da4-83af-a476a8c2b850 |access-date=19 December 2023 |website=www.ft.com}}</ref> The TPI thus enables the ECB to control the difference between borrowing costs across the euro area, thereby reducing fragmentation risk across the euro area.<ref name="Broeders-2023c"/><ref name="Arnold-2023c"/><ref name="Sandbu-2022" /><ref name="FT-2022" /><ref name="Grimm-2023">{{Cite journal |last1=Grimm |first1=Veronika |last2=Nöh |first2=Lukas |last3=Wieland |first3=Volker |date=31 May 2023 |title=Government bond rates and interest expenditure of large euro area member states: A scenario analysis |url=https://onlinelibrary.wiley.com/doi/epdf/10.1111/infi.12434 |journal=International Finance |volume=26 |issue=3 |page=297 |doi=10.1111/infi.12434 |via=Wiley Online Library|hdl=10419/261487 |hdl-access=free }}</ref><ref name="Koranyi-2022">{{Cite news |last1=Koranyi |first1=Balazs |last2=John |first2=Mark |date=21 July 2022 |title=ECB unveils new TPI anti-fragmentation instrument |url=https://www.reuters.com/markets/europe/ecb-unveils-new-tpi-anti-fragmentation-instrument-2022-07-21/ |access-date=20 December 2023 |work=Reuters}}</ref> By not letting interfere market dynamics that do not reflect economic reality, the ECB fulfils its secondary mandate under the TFEU, namely "to support the general economic policies of the Union."<ref name="Arnold-2023c"/><ref name="Sandbu-2022" /> Although PEPP would remain the first line of defence to counter for transmission risks,<ref name="Wellink-2023d"/><ref name="Peychev-2022" /> the TPI should be seen as an addition to the ECB's toolkit.<ref name="Bank-2022" />

      ===== Eligible securities under the TPI =====
      Contrary to the PEPP and the APP, the TPI does not have an ''ex ante'' upper limit on the purchase of securities.<ref name="Bank-2022" /><ref name="Spendzharova-2023" /><ref name="Arnold-2022" /><ref name="Grimm-2023" /><ref>{{Cite web |last1=Arnold |first1=Martin |last2=Johnston |first2=Ian |date=21 July 2021 |title=ECB raises rates for first time in more than a decade |url=https://www.ft.com/content/42b002c0-434e-4688-bdb7-33e0a7c2323f |access-date=19 December 2023 |website=Financial Times}}</ref> Although the ECB has stated it would primarily buy only government bonds on the secondary market<ref name="Spendzharova-2023" /> maturing between 1 and 10 years,<ref name="Arnold-2022" /> the bonds purchased fall under the complete discretion of the ECB and does not necessarily follow the capital key, and private securities could be considered as well.<ref name="Bank-2022" /><ref name="FT-2022" /><ref>{{Cite web |last=Treeck |first=Johanna |date=5 May 2023 |title=ECB needs a new type of bazooka to battle Baltic risk |url=https://www.politico.eu/article/ecb-needs-a-new-type-of-bazooka-to-battle-baltic-risk/ |access-date=20 December 2023 |website=POLITICO |language=en}}</ref> However, there are four conditions that need to be met before securities are eligible for purchasing under TPI:<ref name="Grimm-2023" />

      # Compliance with the fiscal framework of the EU and not be involved in the [[Stability and Growth Pact|excessive deficit procedure]];
      # Absence of macroeconomic imbalances and not being involved in an excessive [[Macroeconomic Imbalance Procedure|macroeconomic imbalance procedure]], demonstrating that it is in compliance with the commission's recommendations;
      # Sovereign debt trajectory must be sustainable, assessed by the ECB and other relevant bodies;
      # Stick to commitments made under the Recovery and Resilience Facility, proving that the government follows sound and sustainable macroeconomic policies.<ref name="Bank-2022" /><ref name="Peychev-2022" /><ref name="Arnold-2022" /><ref name="Koranyi-2022" /><ref name="POLITICO-2022b">{{Cite web |date=21 July 2022 |title=ECB lifts rates for first time in more than a decade |url=https://www.politico.eu/article/ecb-delivers-50-basis-point-rate-hike-adds-tool-to-its-box/ |access-date=20 December 2023 |website=POLITICO |language=en}}</ref>

      The conditions for government bonds to be eligible under the TPI draw heavily on the macroeconomic governance, and making sure that politicians do not take decisions that facilitate speculation.<ref name="Sandbu-2022" /><ref name="Martin-2022b">{{Cite web |last=Martin |first=Katie |date=22 July 2022 |title=Markets will test the ECB's resolve |url=https://www.ft.com/content/a9851c45-f2bb-4e00-9a8a-000038308f0e |access-date=20 December 2023 |website=Financial Times}}</ref> The decision by the ECB to support a country by using the TPI will depend on the severity of the risks a country faces.<ref name="Arnold-2022" /><ref name="POLITICO-2022b"/> Government debt should thus be sustainable to be eligible for TPI purchases.<ref name="Callegari-2023" /><ref name="FT-2022" />

      If the aforementioned conditions are met, the ECB could decide to activate the TPI.<ref name="Bank-2022" /><ref name="Spendzharova-2023" /><ref name="Arnold-2022" /><ref>{{Cite web |last=Treeck |first=Johanna |date=27 July 2022 |title=Italian central banker plays down chance of big rate hike in September |url=https://www.politico.eu/article/ecb-ignazio-visco-rate-hike-september/ |access-date=20 December 2023 |website=POLITICO |language=en}}</ref> Purchases will be ended under the TPI either due to increased transmission of monetary policy or the risks have proven to be country-specific.<ref name="Wellink-2023d"/><ref name="Bank-2022" /> So far, the TPI has not been deployed yet.

      ===== Effects of and critiques on the TPI =====
      The TPI enables the Governing Council to a more rapid increase in interest rate,<ref name="Broeders-2023c"/><ref name="Wellink-2023d"/> the first raise in interest rates by the ECB in 11 years.<ref name="Bertoldi-2023c"/><ref name="Martin-2022b"/> and the unpredictable nature of market sentiment could justify the reason for ECB-intervention to stabilise the monetary union,<ref name="Arnold-2023c"/> more or less the same reasoning as for the PEPP.

      However, the relationship between the PEPP and the TPI raises questions as the PEPP would remain the first line of defence against transmission risks.<ref name="Wellink-2023d" /> The creation of the TPI seems legally vulnerably: problems in the Euro Area are common and recurring, but it is not automatically the argument to invent a whole new anti-fragmentation tool.<ref name="Wellink-2023d" /> With the TPI, the ECB can put pressure on countries by assessing publicly if they are eligible for the TPI, that is assessing whether the government has conducted adequate fiscal policies and structural reforms to deserve the support of the ECB. This endangers the politic neutrality of the ECB.<ref>{{Cite journal |last1=Campoy |first1=Juan Cristóbal |last2=Negrete |first2=Juan Carlos |date=18 August 2023 |title=Quantitative easing rules as a means to achieve optimal levels of structural reforms and government deficits in a monetary union |journal=The World Economy |volume=46 |issue=9 |page=2775 |doi=10.1111/twec.13460 |doi-access=free }}</ref> If ever deployed, the usage of the TPI will spark controversy as the conditions to be deployed are not watertight.<ref name="Wellink-2023d" /><ref name="POLITICO-2022b"/>

      ===== Strategy Review (2020-2021) =====
      As a consequence of the COVID-19 crisis, the ECB extended the duration of the strategy review until September 2021. On 13 July 2021, the ECB presented the outcomes of the strategy review, with the main following announcements:

      * The ECB announced a new inflation target of 2% instead of its "close but below two per cent" inflation target. The ECB also made it clear it could overshoot its target under certain circumstances.<ref name="Amaro-2021">{{Cite web|last=Amaro|first=Silvia|date=8 July 2021|title=European Central Bank sets its inflation target at 2% in new policy review|url=https://www.cnbc.com/2021/07/08/ecb-lagarde-presents-first-policy-review-in-almost-two-decades.html|access-date=10 July 2021|website=CNBC|language=en}}</ref>
      * The ECB announced it would try to incorporate the cost of housing (imputed rents) into its inflation measurement
      * The ECB announced an action plan on climate change<ref>{{Cite press release|publisher=European Central Bank|date=8 July 2021|title=ECB presents action plan to include climate change considerations in its monetary policy strategy|url=https://www.ecb.europa.eu/press/pr/date/2021/html/ecb.pr210708_1~f104919225.en.html|language=en}}</ref>

      The ECB also said it would carry out another strategy review in 2025.

      === Inflation surge of 2021 ===
      In the summer of 2021, coinciding with the European Central Bank's announcement of its revised monetary policy framework and its initiative for climate action, the eurozone witnessed a notable [[2021–2023 inflation|inflationary surge]]. This resurgence of inflation continued to escalate over the following year, culminating in inflation rates reaching double digits for the first time since the 1970s, a year after the ECB's strategic updates.<ref name="Goutsmedt-2023">{{Cite journal |last1=Goutsmedt |first1=Aurélien |last2=Fontan |first2=Clément |date=19 November 2023 |title=The ECB and the inflation monsters: strategic framing and the responsibility imperative (1998–2023) |url=https://www.tandfonline.com/doi/full/10.1080/13501763.2023.2281583 |journal=Journal of European Public Policy |volume=31 |issue=4 |language=en |pages=999–1025 |doi=10.1080/13501763.2023.2281583 |s2cid=265300761 |issn=1350-1763}}</ref> The inflation rate reached an unprecedented peak of 4.9% in November 2021, marking the highest level since the introduction of the euro.<ref name="Baltensperger-2023">{{Cite journal |last=Baltensperger |first=Ernst |date=6 June 2023 |title=The return of inflation |journal=[[Swiss Journal of Economics and Statistics]] |volume=159 |issue=1 |article-number=10 |doi=10.1186/s41937-023-00114-x |doi-access=free |issn=2235-6282}}</ref>

      ==== Framing of the crisis ====
      The new era of inflation prompted a significant shift in the European Central Bank's framing compared to its stance in the 2000s. Initially, from its inception until the [[2008 financial crisis]], the ECB's primary objective was price stability, adhering to strict institutional rules that minimized policy trade-offs with other goals beyond price stability.<ref>{{Cite book |last=Drazen |first=A |title=Political economy in macroeconomics |publisher=[[Princeton University Press]] |year=2002 |edition=New |language=English}}</ref><ref>{{Cite journal |last1=Braun |first1=Benjamin |last2=Carlo |first2=Donato Di |last3=Diessner |first3=Sebastian |date=2022 |title=Planning laissez-faire: Supranational central banking and structural reforms |journal=[[Zeitschrift für Politikwissenschaft]] |language=en |volume=32 |issue=3 |pages=707–716 |doi=10.1007/s41358-022-00322-6 |issn=1430-6387|doi-access=free }}</ref> This approach was rooted in the "Central Bank Independence template", advocating that central bank's limited role to price stability and its independence were optimal.<ref>{{Cite book |last=Issing & al |first=O. |title=Monetary policy in the euro area: Strategy and decision-making at the european central bank. |publisher=Cambridge University Press |year=2001}}</ref><ref name="Goutsmedt-2023" /><ref name="Hartmann-2018">{{Cite journal |last1=Hartmann |first1=Philipp |last2=Smets |first2=Frank |date=2018 |title=The European Central Bank's Monetary Policy during Its First 20 Years |journal=Brookings Papers on Economic Activity |volume=2018 |issue=2 |pages=1–118 |doi=10.1353/eca.2018.0026 |jstor=26743874 |s2cid=203324137 |issn=0007-2303}}</ref><ref>{{Cite book |last1=Howarth |first1=David |title=The European Central Bank: The New European Leviathan? |last2=Loedel |first2=Peter |publisher=Palgrave Macmillan |year=2005}}</ref>

      However, the post-financial crisis landscape, especially during the [[Euro area crisis]] and subsequent economic stagnation era, necessitated a substantial revision in the ECB's strategy.<ref name="Goutsmedt-2023" /><ref name="Hartmann-2018" /> The ECB moved away from its original Central Bank Independence template, leading to a blurring of its objective hierarchy. It adopted new strategies such as acting as a [[lender of last resort]] for the banking system and fostering growth through very low interest rates and extensive asset purchase programs, which were designed to help stabilize specific market segments and in the end revive growth.<ref>{{Cite journal |last1=Rodríguez |first1=Carlos |last2=Carrasco |first2=Carlos A. |date=2016 |title=ECB policy responses between 2007 and 2014: A chronological analysis and an assessment of their effects |url=https://doiserbia.nb.rs/Article.aspx?ID=1452-595X1604455R |journal=Panoeconomicus |volume=63 |issue=4 |pages=455–473 |doi=10.2298/pan1604455r|doi-access=free }}</ref><ref>{{Cite journal |last1=Gabor |first1=Daniela |last2=Ban |first2=Cornel |date=12 October 2015 |title=Banking on Bonds: The New Links Between States and Markets |journal=Journal of Common Market Studies |volume=54 |issue=3 |pages=617–635 |doi=10.1111/jcms.12309 |s2cid=153924047 |issn=0021-9886}}</ref><ref>{{Cite journal |last1=Johnson |first1=Juliet |last2=Arel-Bundock |first2=Vincent |last3=Portniaguine |first3=Vladislav |date=2019 |title=Adding rooms onto a house we love: Central banking after the global financial crisis |url=https://onlinelibrary.wiley.com/doi/10.1111/padm.12567 |journal=Public Administration |language=en |volume=97 |issue=3 |pages=546–560 |doi=10.1111/padm.12567 |s2cid=158391365 |issn=0033-3298}}</ref>

      In 2021, the European Central Bank embraced a significant strategic pivot by adopting its Climate Action Plan along with a new monetary policy strategy.<ref>{{Cite journal |last=Deyris |first=Jérôme |date=3 September 2023 |title=Too green to be true? Forging a climate consensus at the European Central Bank |url=https://www.tandfonline.com/doi/full/10.1080/13563467.2022.2162869 |journal=New Political Economy |language=en |volume=28 |issue=5 |pages=713–730 |doi=10.1080/13563467.2022.2162869 |s2cid=249832219 |issn=1356-3467}}</ref> This shift aimed to institutionalize the ECB's evolving role, moving beyond the singular focus on price stability—a policy shaped largely by the aftermath of the [[Euro area crisis]]. Instead, the ECB began acknowledging its multifaceted responsibilities, which now include maintaining financial stability, supporting economic growth, and addressing climate-related objectives.<ref name="Goutsmedt-2023" /> However, with the [[2021–2023 inflation|surging of inflation in 2021]], some wondered as to whether the European Central Bank would revert to its foundational role, predominantly focused on chasing the "inflation monsters". The term "inflation monsters<nowiki>''</nowiki> echoes the 2010 video of the ECB where two young people are facing a blue inflation monster unleashing banknotes and threatening to wreck the economy.<ref name="Goutsmedt-2023" /> Nevertheless, ECB policymakers effectively drew connections between the Central Bank Independence (CBI) framework and the experiences of the stagflation era to rationalize their decision to increase interest rates, avoiding the need for a discourse on regime change. In doing so, they recognized the complex trade-offs inherent in balancing various macroeconomic objectives and the challenging decisions they had to face.<ref name="Goutsmedt-2023" />

      It was with this new monetary strategy that the eurozone found itself facing rising [[2021–2023 inflation|inflation in 2021]].<ref name="Goutsmedt-2023" /> Recent studies stated that key debate among policymakers centered on whether this inflationary trend would be transitory or permanent. Paul Krugman argued that the current inflationary surge would prove to be transitory, whereas other economists such as Olivier Blanchard and Larry Summers had issued warnings regarding the possible persistence of this inflation.<ref>{{Cite news |last=Krugman |first=Paul |date=16 December 2021 |title=Opinion {{!}} The Year of Inflation Infamy |url=https://www.nytimes.com/2021/12/16/opinion/inflation-economy-2021.html |access-date=19 January 2024 |work=The New York Times |language=en-US |issn=0362-4331}}</ref> Initially, both the European Central Bank and the Federal Reserve misjudged the situation, assuming the inflation spike to be temporary and expecting a swift return to their inflation target. This misperception led to the ECB's initial inaction regarding its [[monetary policy]].<ref name="Storm">{{Cite web |last=Storm |first=Servaas |title=In the Footsteps of Ptolemy: The 'Science of Monetary Policy' and the Inflation of 2021–2023 |url=https://www.ineteconomics.org/perspectives/blog/in-the-footsteps-of-ptolemy-the-science-of-monetary-policy-and-the-inflation-of-2021-2023 |access-date=13 January 2024 |website=Institute for New Economic Thinking |language=en}}</ref>

      ==== Response to the 2021 inflation crisis ====
      After big increases in the inflation rates throughout 2021 and 2022, the European Central Bank and the FED finally decided to raise their interest rates and abandon their very low interest rates, for the first time since the [[Euro area crisis]] and the end of the CBI era, as it had become clear the inflationary trend wasn't temporary.<ref name="Goutsmedt-2023" /> This decision came in late July 2022 for the ECB, when the inflation rate in the eurozone was already at 8.9% and had been higher than the 2% target for more than a year, and in March 2022 for the FED.<ref>{{Cite web |last1=Heimberger |first1=Philipp |last2=Steininger |first2=Lea |date=15 August 2022 |title=ECB interest rate hikes will damage climate protection policies |url=https://blogs.lse.ac.uk/europpblog/ |access-date=13 January 2024 |website=LSE European Politics and Policy (EUROPP) blog}}</ref> The European Central Bank's response to the Federal Reserve's actions can partly be attributed to concerns about imported inflation from the USA. Specifically, if the FED increases its policy rates while the ECB remains static, it could lead to a depreciation of the euro against the dollar. Such a scenario would likely result in higher import costs for the eurozone, as many global trade goods are priced in dollars. On the other hand, this would benefit the US economy by making imports from the eurozone cheaper.<ref>{{Cite journal |last1=Degasperi |first1=Riccardo |last2=Hong |first2=Seokki Simon |last3=Ricco |first3=Giovanni |date=13 January 2023 |title=The Global Transmission of U.S. Monetary Policy |url=https://ideas.repec.org//p/crs/wpaper/2023-02.html |journal=Working Papers |language=en}}</ref><ref>{{Cite journal |last1=Breitenlechner |first1=Max |last2=Georgiadis |first2=Georgios |last3=Schumann |first3=Ben |date=1 October 2022 |title=What goes around comes around: How large are spillbacks from US monetary policy? |url=https://www.sciencedirect.com/science/article/pii/S0304393222000940 |journal=Journal of Monetary Economics |volume=131 |pages=45–60 |doi=10.1016/j.jmoneco.2022.07.001 |issn=0304-3932|hdl=10419/238263 |hdl-access=free }}</ref><ref name="Moessner-2023">{{Cite journal |last1=Moessner |first1=Richhild |last2=Xia |first2=Dora |last3=Zampolli |first3=Fabrizio |date=1 June 2023 |title=Global Inflation and Global Monetary Policy Tightening: Implications for the Euro Area |url=https://www.sciendo.com/article/10.2478/ie-2023-0031 |journal=Intereconomics |language=en |volume=58 |issue=3 |pages=151–154 |doi=10.2478/ie-2023-0031 |issn=1613-964X|hdl=10419/275711 |hdl-access=free }}</ref>

      Furthermore, the impact of US dollar appreciation, following the FED's policy rate hikes, tends to be more pronounced in the international inflation rates of energy and food. These commodities are commonly priced in US dollars, making their inflation rates more sensitive to exchange rate variations.<ref>{{Cite journal |last=Moessner |first=Richhild |date=2022 |title=Effects of Precipitation on Food Consumer Price Inflation |url=https://www.ssrn.com/abstract=4235476 |journal=SSRN Electronic Journal |language=en |doi=10.2139/ssrn.4235476 |hdl=10419/265996 |s2cid=252772695 |issn=1556-5068|hdl-access=free }}</ref> In the European Union, public inflation expectations are significantly influenced by the prices of energy and food. Thus, this form of imported inflation can further exacerbate overall inflation levels of the eurozone.

      The ECB also declared its intention to systematically diminish net asset purchases within their asset purchase program (APP) and end them under the pandemic emergency purchase program (PEPP) launched during the COVID crisis by the first trimester of 2022.<ref name="Goutsmedt-2023" /> On the other hand, the Federal Reserve initiated the reduction of its asset purchase program in November 2021, to finally stop it by March 2022. The Asset Purchase Programs of the ECB initially boosted asset values on bank balance sheets and led to expectations of lower future short short-term interest rates. These programs also raised inflation expectations, eventually reanchoring long-term inflation expectations. Phasing out the Asset Purchase Programs thus signals alignment with the different policy rate hikes in an attempt to cool down the economy and demonstrates a commitment to combating inflation.<ref>{{Cite journal |last1=Burlon |first1=Lorenzo |last2=Notarpietro |first2=Alessandro |last3=Pisani |first3=Massimiliano |date=1 November 2019 |title=Macroeconomic effects of an open-ended asset purchase programme |url=https://www.sciencedirect.com/science/article/pii/S0161893819300250 |journal=Journal of Policy Modeling |volume=41 |issue=6 |pages=1144–1159 |doi=10.1016/j.jpolmod.2019.03.005 |issn=0161-8938|url-access=subscription }}</ref><ref>{{Cite report |url=https://econpapers.repec.org/paper/ecbecbwps/20161956.htm |title=The ECB's asset purchase programme: an early assessment |last1=Breckenfelder |first1=Johannes |last2=De Fiore |first2=Fiorella |date=2016 |publisher=European Central Bank |issue=1956 |last3=Andrade |first3=Philippe |last4=Karadi |first4=Peter |last5=Tristani |first5=Oreste}}</ref><ref>{{Cite journal |last1=Benigno |first1=Pierpaolo |last2=Canofari |first2=Paolo |last3=Di Bartolomeo |first3=Giovanni |last4=Messori |first4=Marcello |date=July 2023 |title=The ECB's asset purchase programme: Theory, effects, and risks |url=https://onlinelibrary.wiley.com/doi/10.1111/joes.12521 |journal=Journal of Economic Surveys |language=en |volume=37 |issue=3 |pages=890–914 |doi=10.1111/joes.12521 |hdl=11385/223759 |s2cid=250636847 |issn=0950-0804|hdl-access=free }}</ref>

      Research indicates that the European Central Bank responded to the escalating inflation more slowly and cautiously than the FED, showing hopes that a moderate tightening of monetary policy would suffice. The ECB was notably slower in acknowledging the mistaken nature of its initial assumption that the inflationary trend would be transitory.<ref name="Baltensperger-2023" /> The transition away from extremely low interest rates was soon accompanied by various rate increases, culminating in the ECB's main rate reaching 4% by the end of September.<ref>{{Cite web |last=Board of Governors of the Federal Reserve System (US) |date=1 July 1954 |title=Federal Funds Effective Rate |url=https://fred.stlouisfed.org/series/FEDFUNDS |access-date=19 January 2024 |website=FRED, Federal Reserve Bank of St. Louis}}</ref> In contrast, the FED's latest rate hike elevated the Effective Federal Funds Rate to 5.33% in August, underscoring a more aggressive and rapid tightening of monetary policy compared to the ECB's approach.<ref>{{Cite web |date=13 December 2023 |title=Official interest rates |url=https://www.ecb.europa.eu/stats/policy_and_exchange_rates/key_ecb_interest_rates/html/index.en.html |access-date=19 January 2024 |website=European Central Bank |language=en}}</ref> However, the global monetary tightening cycle turned out to be the most synchronized one in the past half-century. By February 2023, more than 90% of economies had hiked their policy rates. The latest peak of highly synchronized action by central banks was during the 1970s and the oil prices shocks where 70% of them had raised their interest rates.<ref name="Moessner-2023" />

      ==== Critics regarding the new monetary policy ====
      Criticism first emerged regarding the methodologies used for inflation estimation and their failure to anticipate the inflation surge. A primary critique focused on the inadequacy of traditional tools like the Phillips Curve, which examines the relationship between inflation and certain economic activity indicators, for accurately forecasting inflation.<ref name="Storm" /><ref name="Baba-2024">{{Cite journal |last1=Baba |first1=Chikako |last2=Duval |first2=Romain |last3=Lan |first3=Ting |last4=Topalova |first4=Petia |date=11 January 2024 |title=The 2021–22 inflation surge in Europe: a Phillips-curve-based dissection |url=https://www.tandfonline.com/doi/full/10.1080/13504851.2024.2303383 |journal=Applied Economics Letters |volume=32 |issue=10 |language=en |pages=1383–1388 |doi=10.1080/13504851.2024.2303383 |issn=1350-4851|url-access=subscription }}</ref> During the 1970s, the Phillips Curve also faced significant criticism for its inability to accurately predict the inflation experienced in that decade. This period marked a critical reassessment of the curve's predictive capacity, particularly in the context of the economic phenomena of the time.<ref>{{Cite journal |last1=Atkeson |first1=Andrew |last2=Ohanian |first2=Lee E. |date=December 2001 |title=Are Phillips Curves Useful for Forecasting Inflation? |journal=Quarterly Review |volume=25 |issue=1 |doi=10.21034/qr.2511 |issn=0271-5287}}</ref> Traditional indicators used for forecasting economic dynamics, such as the output and unemployment gaps, were found to be inadequate in signaling the overheating of the economy and the prevailing tight labor market conditions.<ref name="Storm" /><ref name="Baba-2024" /><ref>{{Cite journal |last=Lavoie |first=Marc |date=5 January 2024 |title=Conflictual Inflation and the Phillips Curve |url=https://www.tandfonline.com/doi/full/10.1080/09538259.2023.2294305 |journal=Review of Political Economy |volume=36 |issue=4 |language=en |pages=1397–1419 |doi=10.1080/09538259.2023.2294305 |s2cid=266796071 |issn=0953-8259|url-access=subscription }}</ref> Moreover, the important belief among central banks that sustained inflationary increases are a consequence of unanchored long-term inflation expectations was challenged during 2021–2022. During this period, inflation expectations remained relatively stable, leading to the misinterpretations by the European Central Bank and other monetary authorities regarding the inflationary trend's nature.<ref name="Storm" /> Both the FED and the ECB argued that the rise in inflation was only temporary and was the sole result of post-pandemic supply disruptions on a few selected goods and services (food and energy). The FED and the ECB then maintained their expansionary monetary policy, keeping interest rates low.<ref name="Baltensperger-2023" />

      Some critics have also emerged saying that it was complicated for independent central banks, including the ECB, to accurately assess during a synchronized policy rate hike the potential spillovers of cross-countries monetary policy on the inflation. This might lead to excessive monetary tightening (higher interest rates) in unusual circumstances.<ref name="Moessner-2023" />

      Concerns have also been raised about the European Central Bank's effectiveness in addressing the recent surge in energy prices.<ref name="Ider-2023">{{Cite journal |last1=Ider |first1=Gökhan |last2=Kriwoluzky |first2=Alexander |last3=Kurcz |first3=Frederik |last4=Schumann |first4=Ben |date=2023 |title=The Energy-Price Channel of (European) Monetary Policy |url=https://ideas.repec.org//p/zbw/vfsc23/277710.html |journal=VFS Annual Conference 2023 (Regensburg): Growth and the "sociale Frage" |language=en}}</ref> Some experts suggest that the eurozone should be viewed as a small open economy, implying that changes in its demand may not significantly impact global prices. Moreover, they argue that monetary policy might have minimal influence on the global demand for energy. This is because household demand for essentials like heating and transportation is believed to be relatively insensitive to price changes.<ref name="Ider-2023" /> Additionally, while a stronger euro could theoretically lead to lower import prices, it's uncertain whether these savings would be effectively passed on to consumers.

      However, recent studies contradict these views by highlighting the significant role of energy prices in the transmission of monetary policy within the eurozone. An increase in the ECB's policy rates tends to appreciate the euro against the dollar. This appreciation can lead to higher local energy costs but may also reduce demand, potentially lowering global energy prices. These studies support the ECB's decision to follow the Federal Reserve's lead in raising policy rates, which appears to have been a strategic move to curb imported inflation and address the spike in energy prices.<ref name="Ider-2023" />

      ==== Effects of the monetary tightening ====
      The implementing a of tighter monetary policy has emerged as the eurozone solution to fight the latest inflationary pressure. However, this approach bears the risk of hindering the progress of the economic revival post-[[COVID-19 pandemic|COVID]].<ref name="Ider-2022">{{Cite journal |last1=Ider |first1=Gökhan |last2=Kriwoluzky |first2=Alexander |last3=Kurcz |first3=Frederik |title=DIW Berlin: ECB Can Lower Fuel and Heating Costs by Increasing Interest Rates but Would Risk Economic Recovery |url=https://www.diw.de/sixcms/detail.php?id=diw_01.c.838570.de |access-date=15 January 2024 |journal=Diw Weekly Report |date=2022 |volume=12 |issue=2022 |language=de |doi=10.18723/diw_dwr:2022-14-1}}</ref> 
      [[File:Evolution_of_the_MRO_rate_and_the_HICP_for_the_EU.png|thumb|Evolution of the MRO rate and the HICP for the EU<ref>{{Cite web |last=European Central Bank |date=2024 |title=European Central Bank Data Portal. |url=https://data.ecb.europa.eu |access-date=19 January 2024}}</ref>]]
      Raising interest rates is a strategic move by the ECB with specific aims: to decelerate economic activity, stabilize inflation expectations, and steer towards lower inflation levels. Studies have shown that as interest rates rise, the price on the world market does not really change. However, the Euro becomes more attractive to investors, leading to its appreciation against other currencies. This change benefits households paying for gas in Euros, as it translates into lower prices for dollar-traded oil.<ref name="Ider-2022" />

      On the other hand, the increase in interest rates, while helping to suppress prices, also places strains on the manufacturing sector and the labor market. The aftermath of this shock sees tighter financing conditions and a dip in demand, resulting in a slight uptick in unemployment rates, going beyond 0.1 percentage points. Although the study shows that manufacturing sector quickly rebounds, returning to its pre-shock state within about three months, the impact on unemployment rates lingers for a longer period.<ref name="Ider-2022" />

      === 2025 ===
      In May 2025, the European Central Bank launched a platform involving around 70 market participants to test digital euro payment functionalities and use cases. The initiative includes banks, fintechs, and merchants, aiming to simulate a digital euro ecosystem and support the development of future payment solutions.<ref>{{cite web | url=https://www.ecb.europa.eu/press/pr/date/2025/html/ecb.pr250505~00207689f9.en.html | title=ECB partners with private sector through digital euro innovation platform | date=5 May 2025 }}</ref>  As of August 2025, enabling legislation has not been passed by European lawmakers to enable the digital euro to become operational. Bank president Lagarde has urged lawmakers to "seize the 'euro moment'" and rapidly put in place a legislative framework to "pave the way for the potential introduction of a digital euro," in order to address the considerable risk posed by [[U.S. dollar stablecoins|U.S. dollar-linked stablecoins]].<ref name=politicoEu20250812>{{cite news |title=Lagarde's 'euro moment' busted by dollar-linked stablecoins |url=https://www.politico.eu/article/lagardes-euro-moment-busted-by-stablecoins/ |work=[[Politico Europe]] |date=12 August 2025 |access-date=13 August 2025}}</ref>

      == Mandate and inflation target ==
      [[File:Euro bank notes centered (50s, 100s, 500s), maestro card, master card — Mattes 2006-05-12.jpg|thumb|[[Euro banknotes]]]]
      The ECB has one primary objective – price stability – subject to which it may pursue secondary objectives.

      === Primary mandate ===
      The primary objective of the European Central Bank, set out in Article 127(1) of the [[Treaty on the Functioning of the European Union]], is to maintain [[price stability]] within the [[Eurozone]].<ref>[[s:Consolidated version of the Treaty on the Functioning of the European Union/Title VIII: Economic and Monetary Policy#CHAPTER 2: MONETARY POLICY|wikisource consolidation]]</ref> However the EU Treaties do not specify exactly how the ECB should pursue this objective. The European Central Bank has ample discretion over the way it pursues its price stability objective, as it can self-decide on the [[inflation target]], and may also influence the way [[Inflation#Measures|inflation is being measured]].

      The precise formulation of the price stability objective has changed over the years:
      The Governing Council in October 1998<ref name="HANSPETER K 2006, page 81">THE EUROPEAN CENTRAL BANK HISTORY, ROLE AND FUNCTIONS BY HANSPETER K. SCHELLER SECOND REVISED EDITION 2006, {{ISBN|92-899-0022-9}} (print) {{ISBN|92-899-0027-X}} (online) page 81 at the pdf online version</ref> defined price stability as inflation of under 2%, "a year-on-year increase in the [[Harmonised Index of Consumer Prices]] (HICP) for the euro area of below 2%" and added that price stability "was to be maintained over the medium term".<ref name="ENA Pow">{{cite web |title=Powers and responsibilities of the European Central Bank |publisher=European Central Bank |url=http://www.ecb.int/ecb/orga/tasks/html/index.en.html |access-date=10 March 2009 |archive-date=16 December 2008 |archive-url=https://web.archive.org/web/20081216083913/http://www.ecb.int/ecb/orga/tasks/html/index.en.html}}</ref> In May 2003, following a thorough review of the ECB's monetary policy strategy, the Governing Council clarified that "in the pursuit of price stability, it aims to maintain inflation rates below, but close to, 2% over the medium term".<ref name="HANSPETER K 2006, page 81" /> In 2016, the European Central Bank's president has further adjusted its communication, by introducing the notion of "symmetry" in its definition of its target,<ref>{{Cite press release|last=Draghi|first=Mario|date=2 June 2016|title=Delivering a symmetric mandate with asymmetric tools: monetary policy in a context of low-interest rates|url=https://www.ecb.europa.eu/press/key/date/2016/html/sp160602.en.html|access-date=28 November 2020|website=European Central Bank|language=en}}</ref> thus making it clear that the ECB should respond both to inflationary pressures and to deflationary pressures. As [[Mario Draghi|Draghi]] once said "symmetry meant not only that we would not accept persistently low inflation, but also that there was no cap on inflation at 2%."<ref>{{Cite press release|date=18 June 2019|title=Twenty Years of the ECB's monetary policy|url=https://www.ecb.europa.eu/press/key/date/2019/html/ecb.sp190618~ec4cd2443b.en.html|access-date=28 November 2020|website=European Central Bank|language=en}}</ref>

      On 8 July 2021, as a result of the strategic review led by the new president [[Christine Lagarde]], the ECB officially abandoned the "below but close to two per cent" definition and adopted instead a 2% symmetric [[inflation targeting|inflation target]] over the medium term.<ref name="Amaro-2021" /><ref>{{Cite press release|date=8 July 2021|title=ECB's Governing Council approves its new monetary policy strategy|url=https://www.ecb.europa.eu/press/pr/date/2021/html/ecb.pr210708~dc78cc4b0d.en.html|language=en|website=European Central Bank}}</ref>

      === Secondary mandate ===
      Without prejudice to the objective of price stability, the Treaty (127 TFEU) also provides room for the ECB to pursue other objectives:<blockquote>Without prejudice to the objective of price stability, the ESCB shall support the general economic policies in the Union with a view to contributing to the achievement of the objectives of the Union as laid down in Article 3 of the Treaty on European Union.<ref>{{cite web|title=ECB: Monetary Policy|url=http://www.ecb.int/ecb/tasks/html/index.en.html|access-date=14 September 2014}}</ref></blockquote>This legal provision is often considered to provide a "secondary mandate" to the ECB and offers ample justifications for the ECB to also prioritize other considerations such as full employment or environmental protection,<ref>Blot, C., Creel, J., Faure, E. and Hubert, P., [https://www.europarl.europa.eu/cmsdata/207721/OFCE_FINAL2%20online.pdf Setting New Priorities for the ECB's Mandate], Study for the Committee on Economic and Monetary Affairs, Policy Department for Economic, Scientific and Quality of Life Policies, European Parliament, Luxembourg, 2020.</ref> which are mentioned in the Article 3 of the Treaty on the European Union. At the same time, economists and commentators are often divided on whether and how the ECB should pursue those secondary objectives, in particular the environmental impact.<ref>{{Cite web|url=https://www.igmchicago.org/surveys/objectives-of-the-european-central-bank/|title=Objectives of the European Central Bank|access-date=25 November 2020|website=www.igmchicago.org}}</ref> ECB official have also frequently pointed out the possible contradictions between those secondary objectives.<ref>"Certainly, the protection of the environment is not the only transversal objective assigned to EU institutions and hence to the ECB. Under the Treaty, one could equally ask, for example, why the ECB should not promote industries that promise the strongest employment growth, irrespective of their ecological footprint. But equally importantly, the ECB is subject to the Treaty requirement to "act in accordance with the principle of an open market economy with free competition". – [https://www.ecb.europa.eu/press/key/date/2018/html/ecb.sp181108.en.html "Monetary policy and climate change], Speech from Benoit Cœuré, November 2018</ref> To better guide the ECB's action on its secondary objectives, it has been suggested that closer consultation with the [[European Parliament]] would be warranted.<ref>{{Cite web|title=How Can the European Parliament Better Oversee the European Central Bank? {{!}} Bruegel|url=https://www.bruegel.org/2020/09/how-can-the-european-parliament-better-oversee-the-european-central-bank/|access-date=2020-11-28|language=en-US}}</ref><ref>{{Cite news|date=2021-04-09|title=" La BCE devrait avoir un mandat politique clair qui expliciterait quels objectifs secondaires sont les plus pertinents pour l'UE "|language=fr|work=Le Monde.fr|url=https://www.lemonde.fr/idees/article/2021/04/09/la-bce-devrait-avoir-un-mandat-politique-clair-qui-expliciterait-quels-objectifs-secondaires-sont-les-plus-pertinents-pour-l-ue_6076202_3232.html|access-date=2021-04-16}}</ref><ref>{{Cite web |last1=Van't Klooster |first1=Jens |last2=De Boer |first2=Nik |date=2021-10-25 |title=New report "The ECB's neglected secondary mandate: An inter-institutional solution" |url=https://www.positivemoney.eu/2021/10/report-ecb-neglected-secondary-mandate/ |access-date=2022-05-28 |website=Positive Money Europe |language=en-GB}}</ref><ref>{{Cite web |last=Costa |first=Adua Dalla |date=2023-02-16 |title=EU Parliament offers historic solution on ECB's secondary objectives |url=https://www.positivemoney.eu/2023/02/historic-solution-ecb-secondary-objectives/ |access-date=2023-05-29 |website=Positive Money Europe |language=en-GB}}</ref> In 2023, the ECB recognised the possible role of the European Parliament in the prioritisation of its secondary objectives.<ref>"A clear prioritisation of certain economic policies by the competent EU institutions, including the European Parliament, will help to guide the ECB in its pursuit of its secondary objective. In addition, it is also relevant to the ECB's pursuit of its secondary objective to consider factors such as the proximity of the policy to the primary objective and the ECB's main field of expertise, as well as the degree of precision and unconditionality of those economic policies." [https://www.ecb.europa.eu/pub/pdf/other/ecb.20230525_feedback_on_the_input_provided_by_the_european_parliament~92020517af.en.pdf?dcef5730ce0bff0733e3d37013a4fec1 Feedback on the input provided by the European Parliament as part of its resolution on the ECB's Annual Report 2021], 25 May 2023</ref><ref>{{Cite journal |last1=Ioannidis |first1=Michael |last2=Hlásková |first2=Sarah Jane |last3=Zilioli |first3=Chiara |date=2021 |title=The Mandate of the ECB: Legal Considerations in the Ecb's Monetary Policy Strategy Review |url=https://www.ssrn.com/abstract=3928298 |journal=SSRN Electronic Journal |language=en |doi=10.2139/ssrn.3928298 |issn=1556-5068|url-access=subscription }}</ref>

      === Tasks ===
      {{one source|section|date=December 2015}}
      To carry out its main mission, the ECB's tasks include:

      * Defining and implementing '''monetary policy'''<ref>{{Cite web|url=https://www.ecb.europa.eu/pub/pdf/other/monetarypolicy2011en.pdf?4004e7099b3dcdbf58d0874f6eab650e|title=Monetary policy}}</ref>
      * Managing '''foreign exchange operations'''
      * '''Maintaining the payment system''' to promote smooth operation of the financial market infrastructure under the T2 payments system<ref name="BBC ECB">{{cite news |url=https://news.bbc.co.uk/2/hi/business/86006.stm|title=The powers of the European Central Bank |last=Fairlamb |first=David |date=12 February 2003 |access-date=16 October 2007 |work=BBC News |author2=Rossant, John}}</ref> and being currently developed technical platform for the settlement of securities in Europe ([[TARGET2-Securities]]).
      * '''Consultative role:''' by law, the ECB's opinion is required on any national or EU legislation that falls within the ECB's competence.
      * '''Collection and establishment of''' '''statistics'''
      * '''International cooperation''' 
      * '''Issuing banknotes:''' the ECB holds the exclusive right to authorise the issuance of [[euro banknotes]]. Member states can issue [[euro coins]], but the amount must be authorised by the ECB beforehand (upon the introduction of the euro, the ECB also had exclusive right to issue coins).<ref name="BBC ECB" /> 
      * '''Financial stability and prudential policy'''
      * '''Banking supervision:''' since 2013, the ECB has been put in charge of supervising systemically relevant banks.

      === Monetary policy tools ===
      The principal monetary policy tool of the European central bank is collateralised borrowing or repo agreements.<ref name=allabout>{{cite web|date=19 August 2011|title=All about the European debt crisis: In SIMPLE terms|url=http://www.rediff.com/business/slide-show/slide-show-1-all-about-european-debt-crisis-in-simple-terms/20110819.htm|access-date=28 October 2011|work=rediff business|publisher=rediff.com}}</ref> The collateral used by the ECB is typically high quality public and private sector debt.<ref name=allabout/>

      All lending to credit institutions must be collateralised as required by Article 18 of the Statute of the ESCB.<ref>THE EUROPEAN CENTRAL BANK HISTORY, ROLE AND FUNCTIONS BY HANSPETER K. SCHELLER SECOND REVISED EDITION 2006, {{ISBN|92-899-0022-9}} (print) {{ISBN|92-899-0027-X}} (online) page 87 at the pdf online version</ref>

      The criteria for determining "high quality" for public debt have been preconditions for membership in the European Union: total debt must not be too large in relation to a gross domestic product, for example, and deficits in any given year must not become too large.<ref name="Euro debt working paper" /> Though these criteria are fairly simple, a number of accounting techniques may hide the underlying reality of fiscal solvency—or the lack of the same.<ref name="Euro debt working paper" />
