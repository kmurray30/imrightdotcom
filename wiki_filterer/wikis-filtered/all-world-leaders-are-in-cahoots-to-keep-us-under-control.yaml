      The '''World Economic Forum''' ('''WEF''') is an [[international non-governmental organization|international advocacy non-governmental organization]] and [[think tank]], based in [[Cologny]], canton of Geneva, Switzerland. It was founded on 24 January 1971 by German engineer [[Klaus Schwab]]. The foundation's stated mission is "improving the state of the world by engaging business, political, academic, and other leaders of society to shape global, regional, and industry agendas".<ref>{{Cite web|url=https://www.weforum.org/about/world-economic-forum/|title=Our Mission|website=World Economic Forum|access-date=21 July 2021|archive-date=21 July 2021|archive-url=https://web.archive.org/web/20210721025349/https://www.weforum.org/about/world-economic-forum|url-status=live}}</ref>

      The WEF is mostly known for its annual meeting at the end of January in [[Davos]], a mountain resort in the Swiss canton of [[Graubünden]], in the eastern [[Alps]] region. The meeting brings together some 3,000 paying members and selected participants – among whom are investors, business leaders, political leaders, [[economist]]s, celebrities and journalists – for up to five days to discuss [[list of global issues|global issues]] across 500 sessions.<ref>{{Cite web |date=21 January 2024 |title=6 takeaways from the 2024 World Economic Forum in Davos |url=https://qz.com/davos-2024-world-economic-forum-highlights-1851181368 |access-date=2 August 2025 |website=Quartz |language=en}}</ref><ref>{{Cite web |last=Srivastava |first=Spriha |title=I'm at the World Economic Forum and I'm blown away by the beauty of Davos |url=https://www.businessinsider.com/davos-switzerland-world-economic-forum-spectacular-winter-scenery-alps-2024-1 |access-date=2 August 2025 |website=Business Insider |language=en-US}}</ref> The foundation is mostly funded by its 1,000-member [[Multinational corporation|multi-national companies]].<ref>{{Cite web |date=19 January 2023 |title=RN Breakfast, 20th January 2023 |url=https://www.abc.net.au/listen/programs/radionational-breakfast/rn-breakfast/14100360 |url-status=live |archive-url=https://web.archive.org/web/20231018130745/https://www.abc.net.au/listen/programs/radionational-breakfast/rn-breakfast/14100360 |archive-date=18 October 2023 |access-date=12 October 2023 |website=ABC listen |language=en-AU}}</ref>

      Aside from Davos, the organization convenes regional conferences, it produces a series of reports, engages its members in sector-specific initiatives<ref name=pigman1>{{cite book |title=The World Economic Forum – A Multi-Stakeholder Approach to Global Governance |last=Pigman |first=Geoffrey Allen |pages=41–42 |year=2007 |isbn=978-0-415-70204-1 |publisher=Routledge |location=London}}</ref> and provides a platform for leaders from selected stakeholder groups to collaborate on projects and initiatives.<ref>{{Cite web|url=https://www.weforum.org/platforms/|title=Platforms|website=World Economic Forum|access-date=21 July 2021|archive-date=21 July 2021|archive-url=https://web.archive.org/web/20210721025256/https://www.weforum.org/platforms|url-status=live}}</ref>

      The World Economic Forum and its annual meeting in Davos have received criticism over the years, including allegations of the organization's corporate capture of global and democratic institutions, institutional [[Whitewashing (communications)|whitewashing]] initiatives, the public cost of security, the organization's [[tax-exempt]] status, unclear decision processes and membership criteria, a lack of financial transparency, and the [[environmental footprint]] of its annual meetings.<ref>{{Cite web |date=3 February 2025 |title=Hundreds of ultra-short private jet flights to Davos revealed, as global leaders head into World Economic Forum |url=https://www.greenpeace.org/international/press-release/57867/hundreds-of-ultra-short-private-jet-flights-to-davos-world-economic-forum/ |access-date=8 February 2025 |website=Greenpeace International |language=en}}</ref><ref>{{Cite news |last1=Horton |first1=Helena |last2=reporter |first2=Helena Horton Environment |date=13 January 2023 |title=Private jet emissions quadrupled during Davos 2022 |url=https://www.theguardian.com/environment/2023/jan/13/private-jet-emissions-quadrupled-davos-2022 |access-date=8 February 2025 |work=The Guardian |language=en-GB |issn=0261-3077}}</ref>

      [[File:20th Anniversary Schwab Foundation Gala Dinner (43075411050).jpg|thumb|right|[[Klaus Schwab]], founder and former executive chairman, World Economic Forum]]

      ==History==
      [[File:1971 Opening.jpg|thumb|left|Professor Klaus Schwab opens the inaugural European Management Forum in Davos in 1971.]]
      [[File:Frederik de Klerk with Nelson Mandela - World Economic Forum Annual Meeting Davos 1992.jpg|thumb|[[F. W. de Klerk]] and [[Nelson Mandela]] shake hands at the annual meeting of the World Economic Forum held in Davos in January 1992.]]
      [[File:Henry Kissinger with former USSR leaders - WEF Annual Meeting 1992.jpg|thumb|left|[[Henry Kissinger]] with former USSR leaders at the WEF annual meeting 1992]]
      [[File:Børge Brende at the World Economic Forum on Africa 2008.jpg|thumb|[[Børge Brende]] resigned as president and CEO of the World Economic Forum over his relationship with Jeffrey Epstein.]]
      The WEF was founded in 1971 by [[Klaus Schwab]], a business professor at the [[University of Geneva]].<ref name=pigman2>{{cite book |title=The World Economic Forum – A Multi-Stakeholder Approach to Global Governance |last=Pigman |first=Geoffrey Allen |pages=6–22 |year=2007 |isbn=978-0-415-70204-1 |publisher=Routledge |location=London}}</ref> First named the '''European Management Forum''', it changed its name to the World Economic Forum in 1987 and sought to broaden its vision to include providing a platform for resolving international conflicts.<ref name="wef40">{{cite news |title=The World Economic Forum – A Partner in Shaping History The First 40 Years 1971 – 2010 |url=https://www3.weforum.org/docs/WEF_First40Years_Book_2010.pdf |publisher=World Economic Forum |date=2009 |access-date=14 April 2022 |archive-date=21 April 2022 |archive-url=https://web.archive.org/web/20220421063137/https://www3.weforum.org/docs/WEF_First40Years_Book_2010.pdf |url-status=live}}</ref>

      In February 1971, Schwab invited 450 executives from [[Western Europe]]an firms to the first European Management Symposium held in the [[Davos Congress Centre]] under the patronage of the [[European Commission]] and European industrial associations, where Schwab sought to introduce European firms to American management practices.<ref>{{Cite web|title=Davos at 50: a timeline of highlights|url=https://www.weforum.org/agenda/2019/12/world-economic-forum-davos-at-50-history-a-timeline-of-highlights/|access-date=9 February 2021|website=World Economic Forum|language=en|archive-date=10 February 2021|archive-url=https://web.archive.org/web/20210210093935/https://www.weforum.org/agenda/2019/12/world-economic-forum-davos-at-50-history-a-timeline-of-highlights/|url-status=live}}</ref> He then founded the WEF as a nonprofit organization based in [[Geneva]] and drew European business leaders to [[Davos]] for the annual meetings each January.<ref>Kellerman. p. 229.</ref>

      The second European Management Forum in 1972 was the first meeting where a [[head of government]] featured as a speaker, Prime Minister [[Pierre Werner]] of [[Luxembourg]].<ref>{{Cite web|title=1972s – The Triumph of an Idea – Building an International Organization for Public-Private Cooperation|url=http://widgets.weforum.org/history/1972.html|access-date=9 February 2021|website=widgets.weforum.org|language=en|archive-date=21 May 2021|archive-url=https://web.archive.org/web/20210521170630/https://widgets.weforum.org/history/1972.html|url-status=live}}</ref>

      Events in 1973, including the collapse of the [[Bretton Woods system|Bretton Woods]] fixed-exchange rate mechanism and the [[Yom Kippur War]], saw the annual meeting expand its focus from management to economic and social issues, and, for the first time, political leaders were invited to the annual meeting in January 1974.<ref>{{Registration required|date=January 2011}} [https://www.ft.com/content/0304411c-c5e8-11dc-8378-0000779fd2ac "Interview: Klaus Schwab"] ''[[Financial Times]]''. 22 January 2008. Retrieved 29 August 2008 {{Cite web |url=http://www.ft.com/cms/s/0/0304411c-c5e8-11dc-8378-0000779fd2ac%2Cdwp_uuid%3D01b19234-b4b2-11dc-990a-0000779fd2ac.html?nclick_check=1 |title=Archived copy |access-date=2 September 2017 |archive-date=4 June 2009 |archive-url=https://web.archive.org/web/20090604034329/http://www.ft.com/cms/s/0/0304411c-c5e8-11dc-8378-0000779fd2ac%2Cdwp_uuid%3D01b19234-b4b2-11dc-990a-0000779fd2ac.html?nclick_check=1 |url-status=bot: unknown}}</ref>

      Through the forum's first decade, it maintained a playful atmosphere, with many members skiing and participating in evening events. Appraising the 1981 event, one attendee noted that "the forum offers a delightful vacation on the expense account".<ref>{{Cite magazine |date=16 February 1981 |title=The Magic Meeting Place |magazine=[[Time (magazine)|Time]]}}</ref>

      Political leaders soon began to use the annual meeting as venue for promoting their interests. The ''Davos Declaration'' was signed in 1988 by [[Greece]] and [[Turkey]], helping them turn back from the brink of war. In 1992, South African president [[F. W. de Klerk]] met with [[Nelson Mandela]] and [[Mangosuthu Buthelezi|Chief Mangosuthu Buthelezi]] at the annual meeting, their first joint appearance outside South Africa. At the 1994 annual meeting, Israeli foreign minister [[Shimon Peres]] and [[Chairman of the Palestine Liberation Organization|PLO chairman]] [[Yasser Arafat]] reached a draft agreement on [[Gaza City|Gaza]] and [[Jericho]].<ref>Lowe, Felix (14 January 2008). [https://www.telegraph.co.uk/money/main.jhtml?xml=/money/exclusions/hubpages/davos2008/davoshistory.xml "WEF and Davos: A Brief History"] {{webarchive|url=https://web.archive.org/web/20080403191551/http://www.telegraph.co.uk/money/main.jhtml?xml=%2Fmoney%2Fexclusions%2Fhubpages%2Fdavos2008%2Fdavoshistory.xml |date=3 April 2008}}. ''[[The Daily Telegraph|The Telegraph]]''. Retrieved 25 January 2011.</ref> The "Davos Pact" of 1996 saw the forum's elite help [[Boris Yeltsin]] retain [[1996 Russian presidential election|power as president]] of the [[Russian Federation]] over the then-presumptive favorite [[Gennady Zyuganov]], leader of the [[Communist Party of the Russian Federation]].<ref name="bs1">{{cite news |title=The WEF's role in the rise of Vladimir Putin |date=24 April 2024 |url=https://brusselssignal.eu/2024/04/the-wefs-role-in-the-rise-of-vladimir-putin/}}</ref>

      After 9/11, the WEF was held in the US, in New York City, for the first time.<ref>{{Cite web |date=10 September 2016 |title=Why 9/11 reminds us we must respond to fear with openness |url=https://www.weforum.org/agenda/2016/09/why-9-11-reminds-us-we-must-respond-to-fear-with-openness/ |access-date=18 December 2023 |website=World Economic Forum |language=en |archive-date=18 December 2023 |archive-url=https://web.archive.org/web/20231218132321/https://www.weforum.org/agenda/2016/09/why-9-11-reminds-us-we-must-respond-to-fear-with-openness/ |url-status=live}}</ref><ref name=":0">{{Cite web |title=WEF: Von Kriegspropaganda und Weltfrieden |url=https://www.handelszeitung.ch/politik/wef-von-kriegspropaganda-und-weltfrieden-553617 |access-date=18 December 2023 |website=Handelszeitung |language=de-CH |archive-date=18 December 2023 |archive-url=https://web.archive.org/web/20231218131548/https://www.handelszeitung.ch/politik/wef-von-kriegspropaganda-und-weltfrieden-553617 |url-status=live}}</ref> And in January 2003, US secretary of state Powell went to the forum to drum up sympathy for the [[War on terror|global war on terrorism]] and the US's impending invasion of Iraq.<ref name=":0" /><ref>{{Cite web |work=US Department Of State |date=26 January 2003 |title=Remarks at the World Economic Forum |url=https://2001-2009.state.gov/secretary/former/powell/remarks/2003/16869.htm |access-date=18 December 2023 |language=en |archive-date=18 December 2023 |archive-url=https://web.archive.org/web/20231218131548/https://2001-2009.state.gov/secretary/former/powell/remarks/2003/16869.htm |url-status=live}}</ref>

      In October 2004, the World Economic Forum gained attention through the resignation of its CEO<ref>{{Cite web|url=https://www.weforum.org/agenda/2004/10/ceo_resigns/|title=CEO resigns|website=World Economic Forum|access-date=14 June 2020|archive-date=6 August 2020|archive-url=https://web.archive.org/web/20200806194259/https://www.weforum.org/agenda/2004/10/ceo_resigns/|url-status=live}}</ref> and executive director [[José María Figueres]] over the undeclared receipt of more than US$900,000 in consultancy fees from the French telecommunications firm [[Alcatel-Lucent|Alcatel]].<ref>{{Cite web|url=https://www.swissinfo.ch/eng/wef-director-resigns-over-undeclared-fees/4171240|title=WEF director resigns over undeclared fees|website=SWI swissinfo.ch|date=29 October 2004 |access-date=14 June 2020|archive-date=15 August 2020|archive-url=https://web.archive.org/web/20200815180653/https://www.swissinfo.ch/eng/wef-director-resigns-over-undeclared-fees/4171240|url-status=live}}</ref> [[Transparency International]] highlighted this incident in their [[Global Corruption Report]] two years later in 2006.<ref>{{Cite web|title=Global Corruption Report 2006 – Transparency International, Page 147|url=https://images.transparencycdn.org/images/2006_GCR_HealthSector_EN.pdf|website=Global Corruption Report 2006 – Transparency International|access-date=30 May 2021|archive-date=19 July 2021|archive-url=https://web.archive.org/web/20210719090720/https://images.transparencycdn.org/images/2006_GCR_HealthSector_EN.pdf|url-status=live}}</ref>

      In January 2006, the WEF published an article in its ''Global Agenda'' magazine titled "[[boycotts of Israel|Boycott Israel]]", which was distributed to all 2,340 participants of the annual meeting.<ref>{{Cite web |url=https://www.fastcompany.com/673871/scandal-davos |title=Scandal At Davos |date=26 January 2006 |website=Fast Company |access-date=17 June 2020 |archive-date=17 June 2020 |archive-url=https://web.archive.org/web/20200617101259/https://www.fastcompany.com/673871/scandal-davos |url-status=live}}</ref> Following the publication, Klaus Schwab described the publication as "an unacceptable failure in the editorial process".<ref>{{Cite web |url=https://www.bloomberg.com/news/articles/2006-01-25/the-scandal-at-davos |title=The Scandal at Davos |first=Bruce |last=Nussbaum |date=26 January 2006 |website=Bloomberg |access-date=17 June 2020 |archive-date=17 June 2020 |archive-url=https://web.archive.org/web/20200617122805/https://www.bloomberg.com/news/articles/2006-01-25/the-scandal-at-davos |url-status=live}}</ref>

      In late 2015, the invitation was extended to include a [[North Korea]]n delegation for the 2016 WEF, "in view of positive signs coming out of the country", the WEF organizers noted. North Korea has not been attending the WEF since 1998. The invitation was accepted.<ref>{{Cite web|last=Atkinson|first=Claire|date=6 January 2016|title=North Korea accepts invite to World Economic Forum|url=https://nypost.com/2016/01/05/north-korea-accepts-invite-to-world-economic-forum/|access-date=13 February 2021|website=New York Post|language=en-US|archive-date=1 July 2022|archive-url=https://web.archive.org/web/20220701123137/https://nypost.com/2016/01/05/north-korea-accepts-invite-to-world-economic-forum/|url-status=live}}</ref> However, WEF revoked the invitation on 13 January 2016, after the [[January 2016 North Korean nuclear test|6 January 2016 North Korean nuclear test]], and the country's attendance was made subject to "existing and possible forthcoming sanctions".<ref>Keaten Jamey, ''AP'' (13 January 2016). [https://www.usnews.com/news/business/articles/2016-01-13/world-economic-forum-revokes-invite-to-north-korea-for-davos "World Economic Forum revokes invitation to North Korea to attend the annual meeting in Davos"] {{webarchive |url=https://web.archive.org/web/20161011152918/http://www.usnews.com/news/business/articles/2016-01-13/world-economic-forum-revokes-invite-to-north-korea-for-davos |date=11 October 2016}}. ''[[U.S. News & World Report]]''. Retrieved 14 January 2016.</ref><ref>{{Cite web|title=World Economic Forum revokes invite to North Korea for Davos|url=https://apnews.com/article/2b64b1e124c3455dbafaf3c47189cb4c|access-date=13 February 2021|website=AP NEWS|date=13 January 2016 |archive-date=13 September 2022|archive-url=https://web.archive.org/web/20220913215956/https://apnews.com/article/2b64b1e124c3455dbafaf3c47189cb4c|url-status=live}}</ref> Despite protests by [[North Korea]] calling the decision by the WEF managing board a "sudden and irresponsible" move, the WEF committee maintained the exclusion because "under these circumstances there would be no opportunity for international dialogue".<ref>''AFP'' (15 January 2016). [http://www.chinapost.com.tw/asia/korea/2016/01/15/456143/N-Korean.htm N. Korean fury over 'sinister' WEF Davos forum exclusion] {{webarchive |url=https://web.archive.org/web/20161007202014/http://www.chinapost.com.tw/asia/korea/2016/01/15/456143/N-Korean.htm |date=7 October 2016}}. ''The China Post''. Retrieved 15 January 2016.</ref>

      In 2017, the WEF in Davos attracted considerable attention when, for the first time, a head of state from the [[China|People's Republic of China]] was present at the alpine resort. With the backdrop of [[Brexit]], an incoming [[Protectionism|protectionist]] US administration and significant pressures on [[free-trade zone]]s and [[trade agreement]]s, [[Paramount leader]] [[Xi Jinping]] defended the global economic scheme, and portrayed China as a responsible nation and a leader for environmental causes. He sharply rebuked the current populist movements that would introduce tariffs and hinder global commerce, warning that such protectionism could foster isolation and reduced economic opportunity.<ref>P. S. Goodman fwhitew(2017). [https://www.nytimes.com/2017/01/17/business/dealbook/world-economic-forum-davos-china-xi-globalization.html "In Era of Trump, China's President Champions Economic Globalization"] {{Webarchive|url=https://web.archive.org/web/20170117215637/https://www.nytimes.com/2017/01/17/business/dealbook/world-economic-forum-davos-china-xi-globalization.html |date=17 January 2017}}. ''The New York Times'' (News Analysis). Retrieved 17 January 2017.</ref>

      In 2018, [[India]]n prime minister [[Narendra Modi]] gave the keynote speech, becoming the first head of government from India to deliver the inaugural keynote for the annual plenary at Davos. Modi highlighted global warming ([[climate change]]), terrorism and protectionism as the three major global challenges, and expressed confidence that they can be tackled with collective effort.<ref>{{Cite news|url=http://www.livemint.com/Politics/zoGD1tD80dF755GW9xZkyJ/Narendra-Modi-in-Davos-LIVE-PM-to-address-World-Economic-Fo.html|title=WEF Davos 2018 highlights: Narendra Modi warns of three global threats|date=23 January 2018|website=livemint.com|access-date=8 February 2018|archive-date=9 February 2018|archive-url=https://web.archive.org/web/20180209064111/http://www.livemint.com/Politics/zoGD1tD80dF755GW9xZkyJ/Narendra-Modi-in-Davos-LIVE-PM-to-address-World-Economic-Fo.html|url-status=live}}</ref>

      In 2019, [[Brazil]]ian president [[Jair Bolsonaro]] gave the keynote address at the plenary session of the conference. On his first international trip to Davos, he emphasized liberal economic policies despite his populist agenda, and attempted to reassure the world that [[Brazil]] is a protector of the [[rainforest]] while utilizing its resources for food production and export. He stated that "his government will seek to better integrate Brazil into the world by mainstreaming international best practices, such as those adopted and promoted by the [[OECD]]".<ref>[https://www.gov.br/mre/en/content-centers/speeches-articles-and-interviews/president-of-the-federative-republic-of-brazil/speeches/discurso-del-presidente-de-la-republica-jair-bolsonaro-durante-la-sesion-plenaria-del-foro-economico-mundial-davos-suiza-22-de-enero-de-2020 Speech by the President of the Republic, Jair Bolsonaro, at the Plenary Session of the World Economic Forum – Davos, Switzerland, 22 January 2019] www.gov.br {{Webarchive|url=https://web.archive.org/web/20221110123623/https://www.gov.br/mre/en/content-centers/speeches-articles-and-interviews/president-of-the-federative-republic-of-brazil/speeches/discurso-del-presidente-de-la-republica-jair-bolsonaro-durante-la-sesion-plenaria-del-foro-economico-mundial-davos-suiza-22-de-enero-de-2020 |date=10 November 2022}}. Brasil. Ministry of Foreign Affairs. Retrieved 20 July 2022.</ref> Environmental concerns like extreme weather events, and the failure of [[climate change mitigation]] and [[Climate change adaptation|adaptation]] were among the top-ranking global risks expressed by WEF attendees.<ref>Taylor, Chloe (Jan 2019). [https://www.cnbc.com/2019/01/16/davos-founders-warn-of-rising-tension-between-the-worlds-superpowers.html Global tension is hampering our ability to fight climate change, Davos survey warns] {{Webarchive|url=https://web.archive.org/web/20191114134930/https://www.cnbc.com/2019/01/16/davos-founders-warn-of-rising-tension-between-the-worlds-superpowers.html |date=14 November 2019}} ''CNBC''. Retrieved 22 January 2019.</ref> On 13 June 2019, the WEF and the [[United Nations]] signed a "Strategic Partnership Framework" in order to "jointly accelerate the implementation of the [[2030 Agenda for Sustainable Development]]".<ref>{{Cite web |last=Tedeneke |first=Alem |date=13 June 2019 |title=World Economic Forum and UN Sign Strategic Partnership Framework |url=https://www.weforum.org/press/2019/06/world-economic-forum-and-un-sign-strategic-partnership-framework/ |url-status=live |archive-url=https://archive.today/20230107201341/https://www.weforum.org/press/2019/06/world-economic-forum-and-un-sign-strategic-partnership-framework/ |archive-date=7 January 2023 |access-date=5 May 2023 |website=World Economic Forum |language=en}}</ref>

      The 2021 World Economic Forum was due to be held from 17 to 20 August in [[Singapore]].<ref>{{Cite web |last=Allassan |first=Fadel |title=2021 World Economic Forum to be held in Singapore instead of Davos |url=https://www.axios.com/world-economic-forum-singapore-davos-f3fb535f-4edb-4273-ae30-6a4155c360ce.html |access-date=11 December 2020 |website=Axios |date=7 December 2020 |language=en |archive-date=2 January 2021 |archive-url=https://web.archive.org/web/20210102202619/https://www.axios.com/world-economic-forum-singapore-davos-f3fb535f-4edb-4273-ae30-6a4155c360ce.html |url-status=live}}</ref><ref>{{Cite web|url=https://www.weforum.org/press/2020/12/special-annual-meeting-2021-to-take-place-in-singapore-in-may/|title=Special Annual Meeting 2021 in Singapore from 25–28 May|website=World Economic Forum|access-date=15 December 2020|archive-date=13 December 2020|archive-url=https://web.archive.org/web/20201213012021/https://www.weforum.org/press/2020/12/special-annual-meeting-2021-to-take-place-in-singapore-in-may/|url-status=live}}</ref><ref>{{Cite web|url=https://www.straitstimes.com/singapore/world-economic-forum-in-singapore-postponed-from-may-to-aug-17-20|title=World Economic Forum in Singapore postponed from May to Aug 17–20|date=3 February 2021|website=The Straits Times|access-date=4 February 2021|archive-date=4 February 2021|archive-url=https://web.archive.org/web/20210204070129/https://www.straitstimes.com/singapore/world-economic-forum-in-singapore-postponed-from-may-to-aug-17-20|url-status=live}}</ref> However, on 17 May, the forum was cancelled; with a new meeting to take place in the first half of 2022 instead with a final location and date to be determined later in 2021.<ref>{{Cite news |last=Clinch |first=Matt |title=World Economic Forum cancels 2021 meeting planned for Singapore |url=https://www.cnbc.com/2021/05/17/world-economic-forum-cancels-special-annual-meeting-planned-for-singapore.html |access-date=22 May 2021 |work=CNBC |date=19 May 2021 |language=en |archive-date=6 September 2021 |archive-url=https://web.archive.org/web/20210906060511/https://www.cnbc.com/2021/05/17/world-economic-forum-cancels-special-annual-meeting-planned-for-singapore.html |url-status=live}}</ref>

      In late December 2021, the World Economic Forum said in a release that pandemic conditions had made it extremely difficult to stage a global in-person meeting the following month; transmissibility of the [[SARS-CoV-2 Omicron variant]] and its impact on travel and mobility had made deferral necessary, with the meeting in Davos eventually rescheduled for 22 to 26 May 2022.<ref>{{Cite web |last=Meredith |first=Sam |date=20 December 2021 |url=https://www.cnbc.com/2021/12/20/davos-world-economic-forum-postpones-meeting-due-to-covid.html |title=World Economic Forum postpones Davos meeting on Covid uncertainty |website=CNBC |access-date=20 December 2021 |archive-date=20 December 2021 |archive-url=https://web.archive.org/web/20211220133051/https://www.cnbc.com/2021/12/20/davos-world-economic-forum-postpones-meeting-due-to-covid.html |url-status=live}}</ref><ref>{{Cite web |date=21 January 2022 |title=May date planned for postponed WEF meeting |url=https://www.swissinfo.ch/eng/business/may-date-planned-for-postponed-wef-meeting/47282030 |access-date=18 October 2023 |website=[[SWI swissinfo|Swissinfo]] |language=en |archive-date=13 January 2023 |archive-url=https://web.archive.org/web/20230113182410/https://www.swissinfo.ch/eng/business/may-date-planned-for-postponed-wef-meeting/47282030 |url-status=live}}</ref>
      [[File:Ilham Aliyev met with German Chancellor Olaf Scholz in Davos - 2025.jpg|thumb|German Chancellor [[Olaf Scholz]] and Azerbaijani President [[Ilham Aliyev]] in January 2025]]
      Topics in the 2022 annual meeting included the [[Russian invasion of Ukraine]], climate change, energy insecurity and [[inflation]]. Ukraine's president [[Volodymyr Zelenskyy]] gave a special address at the meeting,<ref>[https://nypost.com/2022/05/23/zelensky-urges-maximum-sanctions-on-russia-in-davos-talk/ Zelensky urges 'maximum' sanctions on Russia in Davos talk], ''New York Post'', 23 May 2022. Retrieved 25 May 2022 {{Webarchive|url=https://web.archive.org/web/20220525045404/https://nypost.com/2022/05/23/zelensky-urges-maximum-sanctions-on-russia-in-davos-talk/ |date=25 May 2022}}</ref> thanking the global community for its efforts but also calling for more support.<ref>{{cite web |url=https://www.weforum.org/events/world-economic-forum-annual-meeting-2022/?stream=day-1-davos22&stream-item=president-zelenskyy-addresses-davos-2022#stream-header |title=World Economic Forum Annual Meeting 2022, Davos |publisher=weforum.org |date=23 May 2022 |accessdate=23 May 2022 |archive-date=23 May 2022 |archive-url=https://web.archive.org/web/20220523120232/https://www.weforum.org/events/world-economic-forum-annual-meeting-2022/?stream=day-1-davos22&stream-item=president-zelenskyy-addresses-davos-2022#stream-header |url-status=live}}</ref> The 2022 forum was marked by the absence of a Russian delegation for the first time since 1991, which ''[[The Wall Street Journal]]'' described as signalling the "unraveling of globalization".<ref>{{Cite news |last=Simmons |first=Stephen Fidler and Ann M. |date=25 May 2022 |title=Russia's Absence at Davos Marks Unraveling of Globalization |language=en-US |work=[[The Wall Street Journal]] |url=https://www.wsj.com/articles/russia-dominates-a-meeting-to-which-it-wasnt-invited-11653492101 |access-date=7 June 2022 |issn=0099-9660 |archive-date=7 June 2022 |archive-url=https://web.archive.org/web/20220607104948/https://www.wsj.com/articles/russia-dominates-a-meeting-to-which-it-wasnt-invited-11653492101 |url-status=live}}</ref><ref>{{Cite web |title=World Economic Forum Annual Meeting 2022, WEF Davos Agenda 2022, Davos 2022 Forum |url=https://www.business-standard.com/world-economic-forum |access-date=15 September 2022 |website=Business Standard |archive-date=15 September 2022 |archive-url=https://web.archive.org/web/20220915130933/https://www.business-standard.com/world-economic-forum |url-status=live}}</ref> The former Russia House was used to present Russia's war crimes.<ref>{{Cite web |url=https://www.russianwarcrimeshouse.org/ |title=Russian War Crimes |website=Russian War Crimes |access-date=23 August 2022 |archive-date=27 August 2022 |archive-url=https://web.archive.org/web/20220827075936/https://www.russianwarcrimeshouse.org/ |url-status=live}}</ref>

      The 2023 annual meeting of the World Economic Forum took place in [[Davos|Davos, Switzerland]], from 16–20 January under the theme "Cooperation in a fragmented world".<ref name="DavosMeeting2023">[https://www.weforum.org/events/world-economic-forum-annual-meeting-2023 World Economic Forum Annual Meeting] www.weforum.org {{Webarchive|url=https://web.archive.org/web/20230108052939/https://www.weforum.org/events/world-economic-forum-annual-meeting-2023 |date=8 January 2023}} 6 January 2023.</ref>

      On 21 April 2025 Klaus Schwab, Chairman of the Board of the World Economic Forum, informed the Board: "Following my recent announcement and as I enter my 88th year, I have decided to step down from my position as Chair and as a member of the Board of Trustees, with immediate effect."<ref>News release by World Economic Forum Public Relations, public.affairs@weforum.org, 21 April 2025.</ref>

      In August 2025, the Forum faced renewed scrutiny after whistleblowers alleged financial irregularities and a toxic work environment. Interim chair [[Peter Brabeck-Letmathe]], former CEO of [[Nestlé]], resigned citing his personal observations of such conditions.<ref>{{cite news |last=Platt |first=Eric |title=WEF clears Klaus Schwab of material wrongdoing |url=https://www.ft.com/content/94962fad-1735-4a66-a77d-2aca27e2ed28 |work=Financial Times |date=15 August 2025 |access-date=16 August 2025}}</ref> Although an internal investigation by the Zurich-based law firm Homburger and US firm Covington & Burling found no evidence of "material wrongdoing" by Schwab or his wife Hilde, the Board pledged to strengthen governance structures.<ref>{{cite news |title=WEF clears Klaus Schwab of material wrongdoing; names interim co-chairs |work=Financial Times |date=15 August 2025 |url=https://www.ft.com/content/94962fad-1735-4a66-a77d-2aca27e2ed28 |access-date=16 August 2025}}</ref> At the same time, the Forum appointed [[Larry Fink]], CEO of [[BlackRock]], and [[André Hoffmann (businessman)|André Hoffmann]], vice-chair of [[Roche Holding]], as interim co-chairs of its board.<ref>{{cite news |title=WEF clears Klaus Schwab of material wrongdoing |work=Financial Times |date=15 August 2025 |url=https://www.ft.com/content/94962fad-1735-4a66-a77d-2aca27e2ed28 |access-date=16 August 2025}}</ref>

      In February 2026, Børge Brende, head of the World Economic Forum, resigned over his relationship with convicted sex offender [[Jeffrey Epstein]].<ref>https://www.politico.eu/article/davos-boss-borge-brende-quits-over-links-to-jeffrey-epstein/</ref><sup>,</sup><ref>{{Cite web |date=2026-02-26 |title=World Economic Forum boss Borge Brende quits after review of Jeffrey Epstein links |url=https://www.bbc.com/news/articles/cr5lq9ll15jo |access-date=2026-02-26 |website=www.bbc.com |language=en-GB}}</ref>

      ==Organization==
      Headquartered in Cologny, the WEF also has offices in New York, Beijing, Tokyo and Seoul. In January 2015, it was designated an NGO with "other international body" status by the Swiss Federal Government under the Swiss Host-State Act.<ref>{{Cite web|url=https://www.weforum.org/press/2015/01/world-economic-forum-gains-formal-status-in-switzerland|title=Press Release: World Economic Forum Gains Formal Status in Switzerland|date=23 January 2015|access-date=11 October 2018|archive-date=11 October 2018|archive-url=https://web.archive.org/web/20181011053821/https://www.weforum.org/press/2015/01/world-economic-forum-gains-formal-status-in-switzerland|url-status=live}}</ref>

      On 10 October 2016, the WEF announced the opening of its new Center for the Fourth Industrial Revolution in San Francisco. According to the WEF, the center will "serve as a platform for interaction, insight and impact on the scientific and technological changes that are changing the way we live, work and relate to one another".<ref>{{Cite web|url=https://www.weforum.org/press/2016/10/new-forum-center-to-advance-global-cooperation-on-fourth-industrial-revolution/|title=New Forum Center to Advance Global Cooperation on Fourth Industrial Revolution|website=World Economic Forum|access-date=20 November 2016|archive-date=20 November 2016|archive-url=https://web.archive.org/web/20161120152702/https://www.weforum.org/press/2016/10/new-forum-center-to-advance-global-cooperation-on-fourth-industrial-revolution/|url-status=live}}</ref> WEF has 19 such centers spread across [[Africa]], [[Asia]], [[Europe]], [[North America]] and [[South America]].<ref>{{Cite web |date=January 2024 |title=Centre for the Fourth Industrial Revolution Network 2022-2023 |url=https://www.astrid-online.it/static/upload/wef_/wef_c4ir_network_impact_report_2022-2023.pdf |access-date=6 June 2025 |website=World Economic Forum}}</ref>

      The World Economic Forum declares that it is impartial and that it is not tied to any political, [[partisan (political)|partisan]], or national interests.{{citation needed|date=October 2024}} Until 2012, it had [[observer status]] with the [[United Nations Economic and Social Council]];{{citation needed|date=October 2024}} it is under the supervision of the [[Swiss Federal Council]].{{citation needed|date=October 2024}} The foundation's highest governance body is the foundation board.<ref>{{cite web |url=http://www.weforum.org/content/leadership-team |title=The Leadership Team &#124; World Economic Forum-The Leadership Team |publisher=Weforum.org |access-date=3 August 2021 |archive-date=10 August 2014 |archive-url=https://web.archive.org/web/20140810132951/http://www.weforum.org/content/leadership-team |url-status=live}}</ref>

      The managing board is chaired by the WEF's president and CEO and acts as the executive body of the World Economic Forum. Managing board members are WEF's president and CEO, Julien Gattoni, Jeremy Jurgens, [[Adrian Monck]], Sarita Nayyar, Olivier M. Schwab, [[Saadia Zahidi]], and Alois Zwinggi.<ref>{{Cite web|url=https://www.weforum.org/about/leadership-and-governance|title=World Economic Forum, Governance and Leadership|access-date=3 August 2021|archive-date=21 April 2018|archive-url=https://web.archive.org/web/20180421194559/https://www.weforum.org/about/leadership-and-governance|url-status=live}}</ref>

      ===Board of trustees===
      The WEF was chaired by founder and chairman Klaus Schwab until his departure in 2025 and is guided by a board of trustees that is made up of leaders from business, politics, academia and civil society.

      As of 2024, the board of trustees was composed of: [[Queen Rania of Jordan]], [[Mukesh Ambani]], [[Ajay Banga]], [[Marc Benioff]], [[Peter Brabeck-Letmathe]], [[Thomas Buberl]], [[Larry Fink|Laurence D. Fink]], [[Chrystia Freeland]], [[Orit Gadiesh]], [[Kristalina Georgieva]], [[Fabiola Gianotti]], [[Al Gore]], [[André Hoffmann (businessman)|Andre Hoffmann]], [[Paula Ingabire]], [[Joe Kaeser]], [[Christine Lagarde]], [[Yo-Yo Ma]], [[Patrice Motsepe]], [[Ngozi Okonjo-Iweala]], [[Lubna Olayan]], [[David Rubenstein]], [[Ulf Mark Schneider]], Klaus Schwab, [[Tharman Shanmugaratnam]], [[Jim Hagemann Snabe]], [[Julie Sweet]], [[Feike Sijbesma]], [[Heizō Takenaka]], and [[Zhu Min (economist)|Zhu Min]].<ref>{{Cite web |title=Leadership and Governance – World Economic Forum |url=https://www.weforum.org/about/leadership-and-governance/ |access-date=22 May 2024 |archive-date=22 May 2024 |archive-url=https://web.archive.org/web/20240522020931/https://www.weforum.org/about/leadership-and-governance/ |url-status=live}}</ref>

      Members of the board of trustees (past or present) include: Al Gore, [[Herman Gref]], André Hoffmann, [[Carlos Ghosn]], Christine Lagarde, Chrystia Freeland, David Rubenstein, [[Ernesto Zedillo]], Fabiola Gianotti, Feike Sijbesma, Heizō Takenaka, [[Indra Nooyi]], [[Jack Ma]], Jim Hagemann Snabe, [[José Ángel Gurría]], [[Josef Ackermann]], Klaus Schwab, [[Kofi Annan]], Laurence Fink, [[Leo Rafael Reif]], [[Luis Alberto Moreno]], Marc Benioff, [[Mark Carney]], [[Maurice Lévy (Publicis)|Maurice Lévy]], [[Michael Dell]], Mukesh Ambani, [[Muriel Pénicaud]], [[Niall FitzGerald]], Orit Gadiesh, Peter Brabeck-Letmathe, [[Peter Maurer]], Queen Rania of Jordan, [[Rajat Gupta]], [[Susan Hockfield]], Tharman Shanmugaratnam, [[Tony Blair]], Ulf Mark Schneider, [[Ursula von der Leyen]], Yo-Yo Ma, Zhu Min, Ivan Pictet, Joseph P. Schoendorf, Peter D. Sutherland, and Victor L.L. Chu.<ref name="wef40" /><ref name="botwef">{{Cite web|url=https://www.weforum.org/about/leadership-and-governance|title=World Economic Forum, Leadership and Governance|access-date=20 November 2019|archive-date=21 April 2018|archive-url=https://web.archive.org/web/20180421194559/https://www.weforum.org/about/leadership-and-governance|url-status=live}}</ref><ref name="wefbot16">[https://www.weforum.org/press/2016/08/world-economic-forum-announces-new-board-of-trustees-2016/ World Economic Forum Announces New Board of Trustees] World Economic Forum, press release of 25 August 2016 {{Webarchive|url=https://web.archive.org/web/20180114184301/https://www.weforum.org/press/2016/08/world-economic-forum-announces-new-board-of-trustees-2016/ |date=14 January 2018}}</ref>

      ===Membership===
      The foundation is funded by its 1,000 member companies, typically global enterprises with more than five billion dollars in turnover (varying by industry and region). These enterprises rank among the top companies within their industry and/or country and play a leading role in shaping the future of their industry and/or region. Membership is stratified by the level of engagement with forum activities, with the level of membership fees increasing as participation in meetings, projects, and initiatives rises.<ref>{{cite web |url=http://www.weforum.org/members |title=Members &#124; World Economic Forum-Members |publisher=Weforum.org |access-date=22 January 2012 |archive-date=17 January 2012 |archive-url=https://web.archive.org/web/20120117115853/http://www.weforum.org/members |url-status=live}}</ref> In 2011, an annual membership cost $52,000 for an individual member, $263,000 for "Industry Partner" and $527,000 for "Strategic Partner". An admission fee costs $19,000 per person.<ref>{{cite web |title=The Truth About Davos: Here's Why People Happily Pay $71,000+ To Come – And Why They'll Keep Paying More Every Year |website=Business Insider |date=26 January 2011 |url=http://www.businessinsider.com/costs-of-davos-2011-1 |access-date=24 January 2017 |archive-date=8 January 2017 |archive-url=https://web.archive.org/web/20170108065945/http://www.businessinsider.com/costs-of-davos-2011-1 |url-status=live}}</ref> In 2014, WEF raised annual fees by 20 percent, bringing the cost for "Strategic Partner" from CHF 500,000 ($523,000) to CHF 600,000 ($628,000).<ref>{{cite news |title=Sky-high Davos summit fees leave multinationals feeling deflated |newspaper=The Financial Times |date=10 October 2014 |url=https://www.ft.com/content/e8a128cc-4fc8-11e4-a0a4-00144feab7de |archive-url=https://ghostarchive.org/archive/20221210/https://www.ft.com/content/e8a128cc-4fc8-11e4-a0a4-00144feab7de |archive-date=10 December 2022 |url-access=subscription}}</ref>

      ==Activities==

      ===Annual meeting in Davos===
      [[File:Ettinger Sport during WEF2018.jpg|thumb|A sports shop turned into a temporary informal reception location "Caspian Week", WEF 2018.]]
      The flagship event of the World Economic Forum is the invitation-only annual meeting held at the end of January in Davos, Switzerland, bringing together chief executive officers from its 1,000 member companies, as well as selected politicians, representatives from academia, [[NGOs]], religious leaders, and the media in an [[Swiss Alps|alpine]] environment. The winter discussions ostensibly focus around key issues of global concern (such as the [[globalization]], capital markets, wealth management, international conflicts, environmental problems and their possible solutions).<ref name=pigman1 /><ref>[http://news.bbc.co.uk/2/hi/business/7830834.stm "Q&A: World Economic Forum 2009"] ''[[BBC News]]''. Retrieved 25 January 2011 {{webarchive |url=https://web.archive.org/web/20160923021241/http://news.bbc.co.uk/2/hi/business/7830834.stm |date=23 September 2016}}</ref> The participants also take part in role playing events, such as the Investment Heat Map.<ref>{{cite news|url=https://www.bbc.co.uk/news/business-21197174 |title=Davos Man eyes investment opportunities |access-date=23 February 2015 |url-status=live |archive-url=https://web.archive.org/web/20160104193156/http://www.bbc.co.uk/news/business-21197174 |archive-date=4 January 2016 |work=BBC News |date=26 January 2013 |last=Madslien |first=Jorn}}</ref> Informal winter meetings may have led to as many ideas and solutions as the official sessions.<ref>Weber, Tim (26 January 2010). [http://news.bbc.co.uk/2/hi/business/7201300.stm "A Beginners' Guide to Davos"] {{webarchive |url=https://web.archive.org/web/20160923022240/http://news.bbc.co.uk/2/hi/business/7201300.stm |date=23 September 2016}} ''[[BBC News]]''. Retrieved 25 January 2011.</ref> In addition to the official programme inside the Congress Hall, numerous independent (by invitation only) events are hosted by governments, corporations, and civil-society organisations across Davos. These include the FT/CNBC Nightcap<ref>{{cite web |title=CNBC & FT Nightcap Draws the Crowd at WEF in Davos |url=https://aboutus.ft.com/press_release/cnbc-ft-nightcap-event-draws-the-crowd-at-wef-in-davos
       |website=Financial Times |date=23 January 2020
       |access-date=15 January 2025}}</ref>, Open Forum<ref>{{cite web |title=Open Forum Davos |url=https://www.weforum.org/open-forum/
       |website=World Economic Forum |access-date=15 January 2025}}</ref>, the Swedish Lunch<ref>{{cite web |title=The Swedish Lunch at WEF 2025 – Celebrating 10 Years |url=https://swedishchamber.nl/news/the-swedish-lunch-at-wef-2025-celebrating-10-years/
       |website=Swedish Chamber of Commerce |access-date=15 January 2025}}</ref>, Goals House<ref>{{cite web |title=Goals House Davos |url=https://www.goalshouse.com/houses/davos
       |website=Goals House |access-date=15 January 2025}}</ref>, and SAP House<ref>{{cite web |title=SAP at WEF 2025 – That's a Wrap |url=https://news.sap.com/video/sap-at-wef-2025-thats-a-wrap/
       |website=SAP News |access-date=15 January 2025}}</ref> and [[Avicii]] Tribute Concert for Mental Health Awareness<ref>{{cite web |title=Star-DJ Avicii (†28): "Sein Verlust hat unser Leben in zwei Teile gespalten" |url=https://www.bild.de/unterhaltung/stars-und-leute/star-dj-avicii-28-sein-verlust-hat-unser-leben-in-zwei-teile-gespalten-67a8a9bb5ca61a535ce7de6c |website=BILD |date=22 March 2025 |language=de |access-date=22 March 2025}}</ref>.

      At the annual meeting, usually 3,000 participants from nearly 110 countries participate in over 400 sessions. Participation included more than 340 public figures, including more than 70 heads of state and government and 45 heads of international organizations; 230 media representatives and almost 40 cultural leaders were represented.<ref>{{Cite web|url=https://www.weforum.org/press/2018/01/forum-closes-with-call-to-action-globalize-compassion-and-leave-no-one-behind|title=Forum Closes with Call to Action: Globalize Compassion and Leave No One Behind|date=26 January 2018|access-date=16 October 2018|archive-date=16 October 2018|archive-url=https://web.archive.org/web/20181016203258/https://www.weforum.org/press/2018/01/forum-closes-with-call-to-action-globalize-compassion-and-leave-no-one-behind|url-status=live}}</ref>

      [[File:Flickr - World Economic Forum - Media Centre - World Economic Forum Annual Meeting Davos 2007.jpg|thumb|Inside the Media Centre, 2007]]
      As many as 500 journalists from online, print, radio, and television take part, with access to all sessions in the official program, some of which are also [[webcast]].<ref>{{cite web |url=http://www.weforum.org/en/events/ArchivedEvents/AnnualMeeting2008/ |title=Forum's homepage |publisher=Weforum.org |access-date=7 March 2010}}{{dead link|date=September 2017 |bot=InternetArchiveBot |fix-attempted=yes}}</ref> Not all the journalists are given access to all areas, however. This is reserved for white badge holders. "Davos runs an almost caste-like system of badges", according to BBC journalist Anthony Reuben. "A white badge means you're one of the delegates – you might be the chief executive of a company or the leader of a country (although that would also get you a little holographic sticker to add to your badge), or a senior journalist. An orange badge means you're just a run-of-the-mill working journalist."<ref>{{cite news|url=https://www.bbc.co.uk/news/business-21197175 |title=My first Davos – what I learned |access-date=8 June 2015 |url-status=live |archive-url=https://web.archive.org/web/20160104193156/http://www.bbc.co.uk/news/business-21197175 |archive-date=4 January 2016 |work=BBC News |date=27 January 2013 |last=Reuben |first=Anthony}}</ref> Since 2024 the WEF launched a new badge system where Accredited Badges are issued. These badges have access to the Ice Village, which is a smaller version of the official Congress Hall.<ref>{{cite web | title='The Davos underground': A final take on the secretive parties of the world's rich and powerful | website=[[CNBC]] | date=31 January 2024 | url=https://www.cnbc.com/2024/01/31/the-davos-underground-inside-the-secret-parties-of-the-elite-world.html}}</ref> All [[Plenary session|plenary]] debates from the annual meeting also are available on YouTube<ref>{{cite web |url=https://www.youtube.com/user/WorldEconomicForum |title=Kanaal van WorldEconomicForum |publisher=YouTube |date=31 January 2010 |access-date=7 March 2010 |archive-date=25 February 2011 |archive-url=https://web.archive.org/web/20110225014719/http://www.youtube.com/user/WorldEconomicForum |url-status=live}}</ref> while photographs are available on [[Flickr]].<ref>{{cite web |url=https://www.flickr.com/photos/worldeconomicforum |title=World Economic Forum's Photostream |publisher=[[Flickr]] |access-date=7 March 2010 |archive-date=29 March 2010 |archive-url=https://web.archive.org/web/20100329072907/http://www.flickr.com/photos/worldeconomicforum/ |url-status=live}}</ref><ref>{{cite web |url=https://www.weforum.org/events/world-economic-forum-annual-meeting-2018/ |title=48th World Economic Forum Annual Meeting |publisher=World Economic Forum |access-date=22 January 2018 |archive-date=23 January 2018 |archive-url=https://web.archive.org/web/20180123010157/https://www.weforum.org/events/world-economic-forum-annual-meeting-2018 |url-status=live}}</ref>

