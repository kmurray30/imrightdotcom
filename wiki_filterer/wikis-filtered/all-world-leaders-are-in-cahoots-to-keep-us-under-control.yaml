      [[File:ECB Sunset.jpg|thumb|alt=ECB – Blue hour 2023|European Central Bank – Blue hour 2023]]

      The '''European Central Bank''' ('''ECB''') is the central component of the [[Eurosystem]] and the [[European System of Central Banks]] (ESCB) as well as one of seven [[institutions of the European Union]].<ref>{{cite web|url=https://www.ecb.europa.eu/ecb/orga/escb/html/index.en.html|website=www.ecb.europa.eu|title=ECB, ESCB and the Eurosystem|date=25 June 2015|access-date=30 September 2021}}</ref> It is one of the world's [[Big Four (banking)#International use|most important central banks]], heading a system with a combined balance sheet of close to €7 trillion.<ref>{{Cite web |url=https://www.ecb.europa.eu/press/annual-reports-financial-statements/annual/balance/html/ecb.eurosystembalancesheet2024~28f64426e5.en.html |title=Consolidated balance sheet of the Eurosystem as at 31 December 2024 |website=European Central Bank |access-date=5 February 2026}}</ref>

      The [[Governing Council of the European Central Bank|ECB Governing Council]] makes [[monetary policy]] for the [[Eurozone]] and the European Union, administers the [[foreign exchange reserves]] of EU member states, engages in foreign exchange operations, and defines the intermediate monetary objectives and key interest rate of the EU. The [[Executive Board of the European Central Bank|ECB Executive Board]] enforces the policies and decisions of the Governing Council, and may direct the national central banks when doing so.<ref>{{cite web|url=https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A12016E%2FPRO%2F04|website=eur-lex.europa.eu|title=STATUTE OF THE EUROPEAN SYSTEM OF CENTRAL BANKS AND OF THE EUROPEAN CENTRAL BANK|access-date=30 September 2021}}</ref> The ECB has the exclusive right to authorise the issuance of [[euro banknotes]]. Member states can issue [[euro coins]], but the volume must be approved by the ECB beforehand. The bank also operates the [[T2 (settlement system)|T2 payments system]].

      The ECB was established by the [[Treaty of Amsterdam]] in May 1999 with the purpose of guaranteeing and maintaining [[price stability]]. On 1 December 2009, the [[Treaty of Lisbon]] became effective and the bank gained the official status of an [[Institutions of the European Union|EU institution]]. When the ECB was created, it covered a Eurozone of eleven members. Since then, Greece joined in January 2001, Slovenia in January 2007, Cyprus and Malta in January 2008, Slovakia in January 2009, Estonia in January 2011, Latvia in January 2014, Lithuania in January 2015, Croatia in January 2023, and Bulgaria in January 2026.<ref name="CVCE-2016" /> The current [[President of the European Central Bank|president of the ECB]] is [[Christine Lagarde]]. [[Seat of the European Central Bank|Seated]] in Frankfurt, Germany, the bank formerly occupied the [[Eurotower (Frankfurt am Main)|Eurotower]] prior to the construction of its new seat.

      The ECB is directly governed by [[European Union law]]. Its capital stock, worth €11 billion, is owned by all 27 central banks of the EU member states as [[shareholder]]s.<ref name="capital" /> The initial capital allocation key was determined in 1998 on the basis of the states' population and GDP, but the capital key has been readjusted since.<ref name="capital" /> Shares in the ECB are not transferable and cannot be used as collateral.

      == History ==
      [[File:Euro inflation.webp|thumb|Euro zone inflation]]
      {{Further|History of the euro}}

      === Early years (1998–2007) ===
      [[File:Wim Duisenberg.jpg|thumb|upright=0.7|right|[[Wim Duisenberg]], first President of the ECB]]
      The European Central Bank is the ''de facto'' successor of the [[European Monetary Institute]] (EMI).<ref name="ECB-2007a">{{cite web|url=http://www.ecb.int/ecb/history/emu/html/index.en.html |title=ECB: Economic and Monetary Union|publisher=ECB |access-date=15 October 2007}}</ref> The EMI was established at the start of the second stage of the EU's [[Economic and Monetary Union of the European Union|Economic and Monetary Union]] (EMU) to handle the transitional issues of states adopting the euro and prepare for the creation of the ECB and [[European System of Central Banks]] (ESCB).<ref name="ECB-2007a"/>  The EMI itself took over from the earlier [[European Monetary Cooperation Fund]] (EMCF).<ref name="CVCE-2016">{{cite web |title=European Central Bank |publisher=CVCE |url=https://www.ecb.europa.eu/press/pr/date/2026/html/ecb.pr260101~c830245e42.en.html |access-date=4 February 2026|date=1 January 2026 |website=European Central Bank|url-status=live}}</ref>

      The ECB formally replaced the EMI on 1 June 1998 by virtue of the [[Treaty on European Union]] (TEU, Treaty of Maastricht), however it did not exercise its full powers until the [[introduction of the euro]] on 1 January 1999, signalling the third stage of EMU.<ref name="ECB-2007a"/> The bank was the final institution needed for EMU, as outlined by the EMU reports of [[Pierre Werner]] and President [[Jacques Delors]]. It was established on 1 June 1998 The first [[List of Presidents of the European Central Bank|President of the Bank]] was [[Wim Duisenberg]], the former president of the [[De Nederlandsche Bank|Dutch central bank]] and the [[European Monetary Institute]].<ref name="Ecb.int-2011">{{cite web|title=ECB: Economic and Monetary Union|url=http://www.ecb.int/ecb/history/emu/html/index.en.html|access-date=26 June 2011|publisher=Ecb.int}}</ref> While Duisenberg had been the head of the EMI (taking over from [[Alexandre Lamfalussy]] of Belgium) just before the ECB came into existence,<ref name="Ecb.int-2011" /> the French government wanted [[Jean-Claude Trichet]], former head of the [[Banque de France|French central bank]], to be the ECB's first president.<ref name="Ecb.int-2011" /> The French argued that since the ECB was to be located in Germany, its president should be French. This was opposed by the German, Dutch and Belgian governments who saw Duisenberg as a guarantor of a strong euro.<ref name="ENA EMU3">{{cite web |title=The third stage of Economic and Monetary Union |publisher=CVCE |url=http://www.cvce.eu/obj/the_third_stage_of_economic_and_monetary_union-en-e2e91dc0-3a6d-49fc-b3f8-f96fb5f3addb.html |access-date=18 February 2014 |date=7 August 2016}}</ref> Tensions were abated by a [[gentleman's agreement]] in which Duisenberg would stand down before the end of his mandate, to be replaced by Trichet.<ref>{{cite web |url=https://www.flickr.com/photos/uggboy/4417740330/ |title=The powerful European Central Bank [E C B] in the heart of Frankfurt/Main&nbsp;– Germany&nbsp;– The Europower in Mainhattan&nbsp;– Enjoy the glances of euro and europe....03/2010....travel round the world....:)|work=UggBoy♥UggGirl [PHOTO // WORLD // TRAVEL] |publisher=Flickr |date=6 March 2010 |access-date=14 October 2011}}</ref>

      Trichet replaced Duisenberg as president in November 2003. Until 2007, the ECB had very successfully managed to maintain inflation close but below 2%.

      [[File:Mario Draghi World Economic Forum 2013 crop.jpg|thumb|upright=0.7|right|[[Mario Draghi]], President of the ECB between 2011 and 2019]]

      === Response to the financial crises (2008–2014) ===
      The European Central Bank underwent through a deep internal transformation as it faced the [[2008 financial crisis]] and the [[Euro area crisis]]. 
      {{Expand section|here we need some headline facts on the early response to the Lehman shock: interest cuts, repos & swap lines, securitized bond purchases…|date=April 2021}}

      ==== Early response to the Euro area crisis ====
      {{main|Euro area crisis}}
      The ''[[Euro area crisis]]'' began after Greece's new elected government uncovered the real level of indebtedness and budget deficit and warned EU institutions of the imminent danger of a Greek [[sovereign default]].

      Foreseeing a possible sovereign default in the eurozone, the general public, international and European institutions, and the financial community reassessed the economic situation and creditworthiness of some Eurozone member states. Consequently, sovereign bonds yields of several Eurozone countries started to rise sharply. This provoked a self-fulfilling panic on financial markets: the more Greek bonds yields rose, the more likely a default became possible, the more bond yields increased in turn.<ref>{{Cite news|url=https://www.reuters.com/article/idUSLDE61F0W720100216|title=Peripheral euro zone government bond spreads widen|first=George|last=Matlock|date=16 February 2010|access-date=28 April 2010|work=Reuters}}</ref><ref>{{cite news|url=https://www.economist.com/leaders/2010/04/29/acropolis-now|title=Acropolis now|date=29 April 2010|newspaper=The Economist|access-date=22 June 2011}}</ref><ref name="wsj">{{Cite news|url=https://www.wsj.com/articles/SB10001424052748704041504575045743430262982|title=Global Markets Shudder: Doubts About U.S. Economy and a Debt Crunch in Europe Jolt Hopes for a Recovery|first1=Brian|last1=Blackstone|date=5 February 2010|work=The Wall Street Journal|access-date=10 May 2010|first2=Tom|last2=Lauricella|first3=Neil|last3=Shah}}</ref><ref>[https://www.nytimes.com/2012/03/06/world/europe/geir-haarde-former-iceland-leader-goes-on-trial-for-role-in-financial-crisis.html "Former Iceland Leader Tried Over Financial Crisis of 2008"], ''The New York Times'', 5 March 2012. Retrieved 30 May 2012.</ref><ref>{{citation|title=Greek/German bond yield spread more than 1,000 bps|date=28 April 2010|publisher=Financialmirror.com}}</ref><ref>{{cite web|url=https://www.ft.com/content/7d25573c-1ccc-11df-8d8e-00144feab49a |archive-url=https://ghostarchive.org/archive/20221210/http://www.ft.com/cms/s/0/7d25573c-1ccc-11df-8d8e-00144feab49a.html |archive-date=10 December 2022 |url-access=subscription|title=Gilt yields rise amid UK debt concerns|date=18 February 2010 |work=Financial Times |access-date=15 April 2011}}{{registration required}}</ref><ref>{{cite web|url=http://www.voxeu.org/index.php?q=node/3454|title=The politics of the Maastricht convergence criteria &#124; vox&nbsp;– Research-based policy analysis and commentary from leading economists|date=15 April 2009|publisher=Voxeu.org|access-date=1 October 2011}}</ref>

      This panic was also aggravated because of the reluctance of the ECB to react and intervene on sovereign bond markets for two reasons. First, because the ECB's legal framework normally forbids the purchase of sovereign bonds in the primary market (Article 123. TFEU),<ref>Bagus, ''The Tragedy of the Euro'', 2010, p.75.</ref> An over-interpretation of this limitation, inhibited the ECB from implementing [[quantitative easing]] like the Federal Reserve and the Bank of England did as soon as 2008, which played an important role in stabilizing markets.

      Secondly, a decision by the ECB made in 2005 introduced a minimum credit rating (BBB-) for all Eurozone sovereign bonds to be eligible as collateral to the ECB's open market operations. This meant that if a private rating agencies were to downgrade a sovereign bond below that threshold, many banks would suddenly become illiquid because they would lose access to ECB refinancing operations. According to former member of the governing council of the ECB [[Athanasios Orphanides]], this change in the ECB's collateral framework "planted the seed" of the euro crisis.<ref>{{Cite web|url=https://voxeu.org/article/how-ecb-planted-seeds-euro-area-crisis|title=Monetary policy and fiscal discipline: How the ECB planted the seeds of the euro area crisis|last=Orphanides|first=Athanasios|date=9 March 2018|website=VoxEU.org|access-date=22 September 2018}}</ref>

      Faced with those regulatory constraints, the ECB led by Jean-Claude Trichet in 2010 was reluctant to intervene to calm down financial markets. Up until 6 May 2010, Trichet formally denied at several press conferences<ref>{{Cite press release|url=https://www.ecb.europa.eu/press/pressconf/2010/html/is100506.en.html|title=Introductory statement with Q&A|website=European Central Bank|language=en|access-date=3 October 2018}}</ref> the possibility of the ECB to embark into sovereign bonds purchases, even though Greece, Ireland, Portugal, Spain and Italy faced waves of [[credit rating]] downgrades and increasing interest rate spreads.

      ==== Market interventions (2010–2011) ====
      [[File:ECB SMP Bond Purchases.png|thumb|upright=0.9|ECB Securities Markets Programme (SMP) covering bond purchases since May 2010]]
      In a remarkable u-turn, the ECB announced on 10 May 2010,<ref>{{Cite press release|url=https://www.ecb.europa.eu/press/pr/date/2010/html/pr100510.en.html|title=ECB decides on measures to address severe tensions in financial markets|website=European Central Bank|language=en|access-date=22 September 2018}}</ref> the launch of a "Securities Market Programme" (SMP) which involved the discretionary purchase of sovereign bonds in secondary markets. Extraordinarily, the decision was taken by the Governing Council during a teleconference call only three days after the ECB's usual meeting of 6 May (when Trichet still denied the possibility of purchasing sovereign bonds). The ECB justified this decision by the necessity to "address severe tensions in financial markets." The decision also coincided with the EU leaders decision of 10 May to establish the European Financial Stabilisation mechanism, which would serve as a crisis fighting fund to safeguard the euro area from a future sovereign debt crisis.<ref>{{Cite news|url=https://euobserver.com/economic/30048|title=Mixed support for ECB bond purchases|access-date=22 September 2018|language=en}}</ref>

      Although at first limited to the debt of Greece, Ireland and Portugal, the bulk of the ECB's bond buying eventually consisted of Spanish and Italian debt.<ref>{{cite news |first1=John |last1=McManus |first2=Dan |last2=O'Brien |title=Market rout as Berlin rejects call for more EU action |journal=Irish Times |date=5 August 2011 }}</ref> These purchases were intended to dampen international speculation against stressed countries, and thus avoid a contagion of the Greek crisis towards other Eurozone countries. The assumption—largely justified—was that speculative activity would decrease over time and the value of the assets increase.

      Although SMP purchases did inject liquidity into financial markets, all of these injections were "sterilized" through weekly liquidity absorption. So the operation was net neutral in liquidity terms (though this was of little practical importance since normal monetary policy operations were ensuring unlimited supplies of liquidity at the main policy interest rate).<ref name="Euro debt working paper">{{cite web|date=February 2011|title=WOrking paper 2011 / 1 A Comprehensive approach to the Euro-area debt crisis|url=http://unipub.lib.uni-corvinus.hu/304/1/wp_2011_1_darvas.pdf|access-date=28 October 2011|work=Zsolt Darvas|publisher=Corvinus University of Budapest}}</ref>{{Citation needed|reason=Reference does not mention 'sterilized injections' or 'liquidity absorption'. Add page number, or a different source.|date=April 2019}}<ref>{{Cite web|date=June 2010|title=Euro area money growth and the 'Securities and Markets Programme'|url=https://www.ecb.europa.eu/pub/pdf/other/mb201006_focus01.en.pdf|website=European Central Bank}}</ref>

      In September 2011, ECB's Board member [[Jürgen Stark]], resigned in protest against the "Securities Market Programme" which involved the purchase of sovereign bonds from Southern member states, a move that he considered as equivalent to [[monetary financing]], which is prohibited by the EU Treaty. The ''[[Financial Times Deutschland]]'' referred to this episode as "the end of the ECB as we know it", referring to its hitherto perceived "hawkish" stance on inflation and its historical [[Deutsche Bundesbank]] influence.<ref>{{cite news|author=Proissl, von Wolfgang|date=9 September 2011|title=Das Ende der EZB, wie wir sie kannten|language=de|trans-title=The end of the ECB, as we knew it|work=[[Financial Times Deutschland]]|department=Kommentar|url=http://www.ftd.de/politik/europa/:stark-ruecktritt-das-ende-der-ezb-wie-wir-sie-kannten/60102214.html|archive-url=https://web.archive.org/web/20111015235754/http://www.ftd.de/politik/europa/%3Astark-ruecktritt-das-ende-der-ezb-wie-wir-sie-kannten/60102214.html|archive-date=15 October 2011}}</ref>

      As of 18 June 2012, the ECB in total had spent €212.1bn (equal to 2.2% of the Eurozone GDP) for bond purchases covering outright debt, as part of the Securities Markets Programme.<ref>{{cite web|url=http://www.commbank.com.au/corporate/research/publications/economics/economic-issues/international/2012/180612-ECB.pdf|title=The ECB's Securities Market Programme (SMP) – about to restart bond purchases?|work=Global Markets Research – International Economics|publisher=Commonwealth Bank|date=18 June 2012|access-date=21 April 2013}}</ref> Controversially, the ECB made substantial profits out of SMP, which were largely redistributed to Eurozone countries.<ref>{{Cite news|url=http://www.positivemoney.eu/2018/07/ecb-smp-profits-billions-lost-for-greece/|title=How Greece lost billions out of an obscure ECB programme|date=25 July 2018|work=Positive Money Europe|access-date=25 September 2018|language=en-GB}}</ref><ref>{{Cite web|url=http://www.guengl.eu/news/article/the-ecb-as-vulture-fund-how-central-banks-speculated-against-greece-and-won|title=The ECB as vulture fund: how central banks speculated against Greece and won big – GUE/NGL – Another Europe is possible|website=guengl.eu|language=en|access-date=25 September 2018|archive-date=26 September 2018|archive-url=https://web.archive.org/web/20180926014354/http://www.guengl.eu/news/article/the-ecb-as-vulture-fund-how-central-banks-speculated-against-greece-and-won}}</ref> In 2013, the [[Eurogroup]] decided to refund those profits to Greece, however, the payments were suspended from 2014 until 2017 over the conflict between [[Yanis Varoufakis]] and ministers of the Eurogroup. In 2018, profits refunds were reinstalled by the Eurogroup. However, several NGOs complained that a substantial part of the ECB profits would never be refunded to Greece.<ref>{{Cite news|url=http://www.positivemoney.eu/2018/10/petition-eurogroup-return-ecb-profits-to-greece/|title=Unfair ECB profits should be returned to Greece, 117,000 citizens demand|date=19 October 2018|work=Positive Money Europe|access-date=21 October 2018|language=en-GB}}</ref>

      ====Role in the Troika (2010–2015) ====
      [[File:Europe bonds sovereign debt crisis.webp|thumb|300px|European 10 year bonds, before the [[Great Recession in Europe]] bonds floated together in parity
      {{legend-line|#001489 solid 3px|[[Greece]] 10 year bond}}
      {{legend-line|#046A38 solid 3px|[[Portugal]] 10 year bond}}
      {{legend-line|#FF8200 solid 3px|Ireland 10 year bond}}
      {{legend-line|#F1BF00 solid 3px|Spain 10 year bond}}
      {{legend-line|#CD212A solid 3px|Italy 10 year bond}}
      {{legend-line|#970E53 solid 3px|France 10 year bond}}
      {{legend-line|#000000 solid 3px|Germany 10 year bond}}
      ]]
      {{See also|Greek government-debt crisis|Post-2008 Irish banking crisis|Euro area crisis}}
      The ECB played a controversial role in the "[[European troika|Troika]]" by rejecting most forms of debt restructuring of public and bank debts,<ref>{{Cite news|last=O'Connell|first=Hugh|title=Everything you need to know about the promissory notes, but were afraid to ask|language=en|work=TheJournal.ie|url=http://www.thejournal.ie/anglo-promissory-notes-ecb-775366-Feb2013/|access-date=3 October 2018}}</ref> and pressing governments to adopt bailout programmes and structural reforms through secret letters to Italian, Spanish, Greek and Irish governments. It has further been accused of interfering in the [[Greek referendum 2015|Greek referendum of July 2015]] by constraining liquidity to Greek commercial banks.<ref>{{Cite web|date=28 March 2017|title=Transparency International EU|url=https://transparency.eu/ecb|access-date=3 April 2021|website=Transparency International EU|language=en}}</ref>
      {{Expand section|explanations on the role of ECB for Greece, Italy, Spain, Cyprus, Portugal.|date=April 2021}}
      In November 2010, reflecting the huge increase in borrowing, including the cover the cost of having guaranteed the liabilities of banks, the cost of borrowing in the private financial markets had become prohibitive for the Irish government. Although it had deferred the cash cost of recapitalising the failing Anglo Irish Bank by nationalising it and issuing it with a "promissory note" (an IOU), the Government also faced a large deficit on its non-banking activities, and it therefore turned to the official sector for a loan to bridge the shortfall until its finances were credibly back on a sustainable footing. Meanwhile, Anglo used the promissory note as collateral for its emergency loan (ELA) from the Central Bank. This enabled Anglo to repay its depositors and bondholders.

      It became clear later that the ECB played a key role in making sure the Irish government did not let Anglo default on its debts, to avoid financial instability risks. On 15 October and 6 November 2010, the ECB President [[Jean-Claude Trichet]] sent two secret letters<ref>{{Cite press release|url=https://www.ecb.europa.eu/press/html/irish-letters.en.html|title=Irish letters|website=European Central Bank|language=en|access-date=3 October 2018}}</ref> to the Irish finance Minister which essentially informed the Irish government of the possible suspension of ELA's credit lines, unless the government requested a financial assistance programme to the [[Eurogroup]] under the condition of further reforms and fiscal consolidation.

      In addition, the ECB insisted that no debt restructuring (or [[bail-in]]) should be applied to the nationalized banks' bondholders, a measure which could have saved Ireland 8 billion euros.<ref>{{Cite news|url=https://www.irishtimes.com/business/financial-services/chopra-ecb-refusal-to-burn-bondholders-burdened-taxpayers-1.2347861|title=Chopra: ECB refusal to burn bondholders burdened taxpayers|newspaper=The Irish Times|access-date=3 October 2018|language=en-US}}</ref>

      During 2012, the ECB pressed for an early end to the ELA, and this situation was resolved with the liquidation of the successor institution IBRC in February 2013. The promissory note was exchanged for much longer term marketable floating rate notes which were disposed of by the Central Bank over the following decade.

      In April 2011, the ECB raised interest rates for the first time since 2008 from 1% to 1.25%,<ref>{{Cite news|last1=Blackstone|first1=Brian|year=2011|title=ECB Raises Interest Rates&nbsp;– MarketWatch|work=marketwatch.com|url=http://www.marketwatch.com/story/ecb-raises-interest-rates-2011-04-07|access-date=14 July 2011}}</ref> with a further increase to 1.50% in July 2011.<ref>{{cite web|year=2011|title=ECB: Key interest rates|url=http://www.ecb.int/stats/monetary/rates/html/index.en.html|access-date=29 August 2011}}</ref> However, in 2012–2013 the ECB sharply lowered interest rates to encourage economic growth, reaching the historically low 0.25% in November 2013.<ref name="rates">{{cite web|url=https://www.ecb.europa.eu/stats/policy_and_exchange_rates/key_ecb_interest_rates/html/index.en.html|title=Key ECB interest rates|website=ecb.europa.eu|access-date=26 June 2025}}</ref> Soon after the rates were cut to 0.15%, then on 4 September 2014 the central bank reduced the rates by two-thirds from 0.15% to 0.05%.<ref name="ECBcuts">{{cite news|date=4 September 2014|title=Draghi slashes interest rates, unveils bond-buying plan|publisher=europenews.net|url=http://www.europenews.net/index.php/sid/225407609|access-date=5 September 2014}}</ref> Recently, the interest rates were further reduced reaching 0.00%, the lowest rates on record.<ref name="rates" />

      In a report adopted on 13 March 2014, the [[European Parliament]] criticized the "potential conflict of interest between the current role of the ECB in the Troika as 'technical advisor' and its position as a creditor of the four Member States, as well as its mandate under the Treaty". The report was led by Austrian right-wing MEP [[Othmar Karas]] and French Socialist MEP [[Liêm Hoang-Ngoc|Liem Hoang Ngoc]].

      ====Response under Mario Draghi (2012–2015)====
      [[File:ECB balance sheet.png|thumb|ECB balance sheet]]
      [[File:ECB deposit facility.svg|thumb|ECB deposit facility]]
      [[File:Current accounts at the ECB.png|thumb|Current accounts at the ECB]]

      On 1 November 2011, [[Mario Draghi]] replaced Jean-Claude Trichet as President of the ECB.<ref>{{Cite news|date=1 November 2011|title=Mario Draghi takes centre stage at ECB|work=BBC|url=https://www.bbc.com/news/business-13901139|access-date=28 December 2011}}</ref> This change in leadership also marks the start of a new era under which the ECB will become more and more interventionist and eventually ended the [[Euro area crisis]].

      Draghi's presidency started with the impressive launch of a new round of 1% interest loans with a term of three years (36 months) – the '''Long-term Refinancing operations (LTRO)'''. Under this programme, 523 Banks tapped as much as €489.2 bn (US$640 bn). Observers were surprised by the volume of loans made when it was implemented.<ref name="ECB82011">{{cite press release|url=http://www.ecb.int/press/pressconf/2011/html/is111208.en.html|title=Introductory statement to the press conference (with Q&A)|first1=Mario|last1=Draghi|author2=President of the ECB|date=8 December 2011|publisher=European Central Bank|location=Frankfurt am Main|format=Press conference|access-date=22 December 2011|first3=Vítor|last3=Constâncio|author4=Vice-President of the ECB}}</ref><ref name="NYTloans">{{cite news|url=https://www.nytimes.com/2011/12/22/business/global/demand-for-ecb-loans-surpasses-expectations.html|title=European Bank in Strong Move to Loosen Credit|first1=Nelson D.|last1=Schwartz|date=21 December 2011|newspaper=The New York Times|access-date=22 December 2011|first2=David|last2=Jolly|quote=the move, by the European Central Bank, could be a turning point in the Continent's debt crisis}}</ref><ref name="NYTNorris">{{cite news|url=https://www.nytimes.com/2011/12/22/business/a-central-bank-doing-what-central-banks-do.html |archive-url=https://ghostarchive.org/archive/20220101/https://www.nytimes.com/2011/12/22/business/a-central-bank-doing-what-central-banks-do.html |archive-date=1 January 2022 |url-access=limited|title=A Central Bank Doing What It Should|first=Floyd|last=Norris|date=21 December 2011|newspaper=The New York Times|access-date=22 December 2011|format=Analysis}}{{cbignore}}</ref> By far biggest amount of {{Nowrap|€325bn}} was tapped by banks in Greece, Ireland, Italy and Spain.<ref>{{cite news|url=https://www.theguardian.com/business/2012/feb/29/eurozone-debt-crisis-ecb-loans-ltro#block-3|title=Eurozone crisis live: ECB to launch massive cash injection|last1=Wearden|first1=Graeme|date=29 February 2012|work=The Guardian|access-date=29 February 2012|last2=Fletcher|first2=Nick|location=London}}</ref> Although those LTROs loans did not directly benefit EU governments, it effectively allowed banks to do a [[carry trade]], by lending off the LTROs loans to governments with an interest margin. The operation also facilitated the rollover of {{Nowrap|€200bn}} of maturing bank debts<ref>{{cite news|last1=Ewing|first1=Jack|last2=Jolly|first2=David|date=21 December 2011|title=Banks in the eurozone must raise more than 200bn euros in the first three months of 2012|work=[[The New York Times]]|url=https://www.nytimes.com/2011/12/22/business/global/demand-for-ecb-loans-surpasses-expectations.html|access-date=21 December 2011}}</ref> in the first three months of 2012.

      ===== "Whatever it takes" (26 July 2012) =====
      Facing renewed fears about sovereigns in the eurozone continued Mario Draghi made a decisive speech in London, by declaring that the ECB "...is ready to do '''''whatever it takes''''' to preserve the Euro. And believe me, it will be enough."<ref>{{Cite press release|url=https://www.ecb.europa.eu/press/key/date/2012/html/sp120726.en.html|title=Verbatim of the remarks made by Mario Draghi|website=European Central Bank|language=en|access-date=25 September 2018}}</ref> In light of slow political progress on solving the eurozone crisis, Draghi's statement has been seen as a key turning point in the eurozone crisis, as it was immediately welcomed by European leaders, and led to a steady decline in bond yields for eurozone countries, in particular Spain, Italy and France.<ref>{{Cite news|url=https://www.ft.com/content/93b358ba-c1d4-11e0-bc71-00144feabdc0 |archive-url=https://ghostarchive.org/archive/20221210/https://www.ft.com/content/93b358ba-c1d4-11e0-bc71-00144feabdc0 |archive-date=10 December 2022 |url-access=subscription|title=Itay and Spain respond to ECB treatment|date=8 August 2011|work=Financial Times|access-date=28 December 2019}}</ref><ref>{{Cite web|date=26 July 2012|title=ECB 'will do whatever it takes' to save the euro|url=https://www.politico.eu/article/ecb-will-do-whatever-it-takes-to-save-the-euro/|access-date=3 April 2021|website=POLITICO|language=en-US}}</ref>

      Following up on Draghi's speech, on 6 September 2012 the ECB announced the '''[[Outright Monetary Transactions]]''' programme (OMT).<ref>{{cite news|url=https://www.nytimes.com/2012/09/07/business/global/european-central-bank-leaves-interest-rates-unchanged-at-0-75-percent.html?pagewanted=all|title=Europe's Central Bank Moves Aggressively to Ease Euro Crisis|last1=Ewing|first1=Jack|date=6 September 2012|work=The New York Times|last2=Erlanger|first2=Steven}}</ref> Unlike the previous SMP programme, OMT has no [[ex-ante]] time or size limit.<ref>{{cite press release|url=http://www.ecb.int/press/pressconf/2012/html/is120906.en.html|title=ECB press conference, 6 September 2012|access-date=14 September 2014}}</ref> However, the activation of the purchases remains conditioned to the adherence by the benefitting country to an adjustment programme to the ESM. The program was adopted with near unanimity, the Bundesbank president [[Jens Weidmann]] being the sole member of the ECB's Governing Council to vote against it.<ref>"[…] the decision on Outright Monetary Transactions (OMTs) that we took in September 2012 to protect the euro area from speculation that could have forced some countries out of the single currency. That decision was almost unanimous; the single vote against came from the President of the Bundesbank" {{Cite press release|date=16 December 2019|title=Interview with Libération|url=https://www.ecb.europa.eu/press/inter/date/2019/html/ecb.in191216_1~bb222205e4.en.html|access-date=3 April 2021|website=European Central Bank|language=en}}</ref>

      Even if OMT was never actually implemented until today, it made the "Whatever it takes" pledge credible and significantly contributed to stabilizing financial markets and ending the sovereign debt crisis. According to various sources, the OMT programme and "whatever it takes" speeches were made possible because EU leaders previously agreed to build the [[European Banking union|banking union]].<ref>{{Cite web|title=Ministers agree deal on EU banking union|url=https://euobserver.com/economic/118516|access-date=3 April 2021|website=EUobserver|date=13 December 2012 |language=en}}</ref>

      === Low inflation and quantitative easing (2015–2019) ===
      In November 2014, the bank moved into its [[Seat of the European Central Bank|new premises]], while the [[Eurotower (Frankfurt am Main)|Eurotower building]] was dedicated to hosting the newly established supervisory activities of the ECB under [[European Banking Supervision]].<ref>{{Cite press release|date=9 November 2013|title=Eurotower to house ECB's banking supervision staff|url=https://www.ecb.europa.eu/press/pr/date/2013/html/pr131109.en.html|access-date=3 April 2021|website=European Central Bank|language=en}}</ref>

      Although the [[Euro area crisis]] was almost solved by 2014, the ECB started to face a repeated decline<ref>{{Cite web|url=https://calrev.org/2019/05/04/on-the-causes-of-european-political-instability/|title=On the Causes of European Political Instability|last=Henderson|first=Isaiah M.|date=4 May 2019|website=The California Review|language=en-US|access-date=19 July 2019}}</ref> in the Eurozone inflation rate, indicating that the economy was going towards a deflation. Responding to this threat, the ECB announced on 4 September 2014 the launch of two bond buying purchases programmes: the Covered Bond Purchasing Programme (CBPP3) and Asset-Backed Securities Programme (ABSPP).<ref>{{Cite press release|url=https://www.ecb.europa.eu/press/pressconf/2014/html/is140904.en.html|title=Introductory statement to the press conference (with Q&A)|website=European Central Bank|language=en|access-date=25 September 2018}}</ref>

      ==== Asset Purchase programme (APP) ====
      On 22 January 2015, the ECB announced an extension of those programmes within a full-fledge "[[quantitative easing]]" programme which also included sovereign bonds, to the tune of 60 billion euros per month up until at least September 2016. The programme was started on 9 March 2015.<ref>{{cite news|date=27 April 2017|title=Draghi fends off German critics and keeps stimulus untouched|newspaper=Financial Times|url=https://www.ft.com/content/efece562-2b30-11e7-bc4b-5528796fe35c |archive-url=https://ghostarchive.org/archive/20221210/https://www.ft.com/content/efece562-2b30-11e7-bc4b-5528796fe35c |archive-date=10 December 2022 |url-access=subscription |url-status=live}}</ref>

      On 8 June 2016, the ECB added corporate bonds to its asset purchases portfolio with the launch of the corporate sector purchase programme (CSPP).<ref>{{Cite web|url=https://www.ecb.europa.eu/ecb/legal/pdf/celex_32016d0016_en_txt.pdf?0240957ff3a5d0b909a9482628799777|title=DECISION (EU) 2016/948 OF THE EUROPEAN CENTRAL BANK of 1 June 2016 on the implementation of the corporate sector purchase programme (ECB/2016/16)|access-date=29 January 2020|archive-date=17 May 2020|archive-url=https://web.archive.org/web/20200517052517/https://www.ecb.europa.eu/ecb/legal/pdf/celex_32016d0016_en_txt.pdf?0240957ff3a5d0b909a9482628799777}}</ref> Under this programme, it conducted the net purchase of corporate bonds until January 2019 to reach about €177 billion. While the programme was halted for 11 months in January 2019, the ECB restarted net purchases in November 2019.<ref>{{Cite web|url=https://www.ecb.europa.eu/mopo/implement/omt/html/index.en.html#cspp|title=Corporate sector purchase programme (CSPP) – Questions & Answers|website=European Central Bank|date=7 December 2021}}</ref>

      On 5 May 2020, the Court ordered the [[Bundestag]] and the [[Cabinet of Germany|Bundesregierung]] to ensure the ECB had carried out a proportionality assessment of the vast purchases of government debt in the [[Public Sector Purchase Programme]] (PSPP) to ensure the economic and fiscal policy effects do not outweigh its policy objectives.<ref name="Camous-2020b" /><ref name="Bundesverfassungsgericht-2023">{{Cite web |title=ECB decisions on the Public Sector Purchase Programme exceed EU competences |url=https://www.bundesverfassungsgericht.de/SharedDocs/Pressemitteilungen/EN/2020/bvg20-032.html |access-date=20 December 2023 |website=www.bundesverfassungsgericht.de}}</ref><ref>{{Cite web |last1=Arnold |first1=Martin |last2=Stubbington |first2=Tommy |date=5 May 2020 |title=German court calls on ECB to justify bond-buying programme |url=https://www.ft.com/content/a1beda5e-5c2d-429e-a095-27728ed2d72b |access-date=20 December 2023 |website=Financial Times}}</ref><ref name="Arnold-2020c">{{Cite web |last1=Arnold |first1=Martin |last2=Hall |first2=Ben |date=6 May 2020 |title=German court ruling casts doubt on European monetary policy |url=https://www.ft.com/content/07f19a1b-7494-439d-9765-7fd7ddf09860 |access-date=20 December 2023 |website=Financial Times}}</ref> The PSPP-implementing decision has been considered an act [[ultra vires]] by the ECB as it was too arbitrary and lacks reasoning in ints proportionality assessment.<ref name="Bundesverfassungsgericht-2023" /><ref>{{Cite web |date=5 May 2020 |title=German Constitutional Court rules the Court of Justice's Weiss judgment ultra vires due to poor reasoning and weak standard of review |url=https://eulawlive.com/german-constitutional-court-rules-the-court-of-justices-weiss-judgment-ultra-vires-due-to-poor-reasoning-and-weak-standard-of-review/ |access-date=20 December 2023 |website=EU Law Live |language=en-GB}}</ref><ref>{{Cite journal |last=Smits |first=René |date=14 April 2021 |title=The European Central Bank's Pandemic Bazooka: Mandate Fulfilment in Extraordinary Times |url=https://papers.ssrn.com/sol3/papers.cfm?abstract_id=3824740 |journal=EU Law Live |page=19 |ssrn=3824740}}</ref> This ruling by the German Constitutional Court comes at a difficult time for the ECB as it was at the time considering expanding the PEPP. The ruling also reflects the mistrust within some parts of Germany in the ECB, which is seen there as an institution that bails out profligate Southern European countries.<ref name="Arnold-2020c" /> Moreover, this ruling also highlights the vital problem on the euro area architecture, as the range of instruments can use to fulfil its mandate remains unclear.<ref name="Camous-2020b" />

      {{As of|2021|post=,}} the size of the ECB's quantitative easing programme had reached 2947 billion euros.<ref>{{Cite web |date=25 March 2021 |title=Asset purchase programmes |url=https://www.ecb.europa.eu/mopo/implement/app/html/index.en.html |access-date=3 April 2021 |website=European Central Bank |language=en}}</ref>

      ==== Long Term Refinancing Operations (LTRO) ====
      The long term refinancing operations (LTRO) are regular open market operations providing financing to credit institutions for periods up to four years. They aim at favoring lending conditions to the private sector and more generally stimulating bank lending to the real economy,<ref>{{Cite web |last= |first= |date=29 November 2023 |title=Open market operations |url=https://www.ecb.europa.eu/mopo/implement/omo/html/index.en.html |access-date=5 December 2023 |website=European Central Bank – Eurosystem |language=en}}</ref> thereby fostering growth.

      In December 2011 and January 2012, in the aftermath of the [[2008 financial crisis]], the ECB implemented two LTROs, injecting over €1000 billion of liquidity in the Eurozone financial system. They were later criticized for their inability to revive growth and to help truly revive the real economy, despite having stabilized the Eurozone's financial institutions.<ref name="Fontan-2018">{{Cite journal |last=Fontan |first=Clement |date=12 October 2018 |title=Frankfurt's double standard: the politics of the European Central Bank during the Eurozone crisis |url=https://www.tandfonline.com/doi/full/10.1080/09557571.2018.1495692 |journal=Cambridge Review of International Affairs |volume=31 |issue=2 |page=175 |doi=10.1080/09557571.2018.1495692 |via=Taylor & Francis Online}}</ref> Further, these operations were devoid of monitoring from the ECB regarding the use made of these liquidities<ref name="Fontan-2018" /> and it appeared that banks had significantly used these funds to pursue carry-trade strategies,<ref>{{Cite journal |last1=Acharya |first1=Viral |last2=Steffen |first2=Sascha |date=6 June 2014 |title=The "greatest" carry trade ever? Understanding eurozone bank risks |url= |journal=Journal of Financial Economics |volume=115 |issue=2 |pages=215–236 |doi=10.1016/j.jfineco.2014.11.004 }}</ref> purchasing sovereign bonds with higher rates and corresponding maturity to generate profits, instead of increasing private lending.<ref name="Fontan-2018" /><ref name="Dwyer-2023">{{Cite journal |last1=Dwyer |first1=Gerald P. |last2=Gilevska |first2=Biljana |last3=Nieto |first3=Maria J. |last4=Samartín |first4=Margarita |date=1 July 2023 |title=The effects of the ECB's unconventional monetary policies from 2011 to 2018 on banking assets |journal=Journal of International and Financial Markets, Institutions & Money |volume=87 |issue=87 |page=4 |doi=10.1016/j.intfin.2023.101800 |doi-access=free }}</ref>

      These critics and deficiencies brought the ECB to instigate targeted long term refinancing operations (TLTROs), first in September and later in December 2014.<ref>ECB press release, 18 September 2014.</ref> These complementary programs imposed conditionality on the LTROs.<ref name="Fontan-2018" /> The TLTROs provided low cost financing to participating banks, under the condition that they reached certain targets in terms of lending to firms and households.<ref name="Dwyer-2023" /> The participating banks were thus more incited to lend to the real economy.

      A third wave of TLTRO's was announced on 7 March 2019, namely the TLTRO III.<ref>{{Cite web |date=7 March 2019 |title=Monetary Policy Decisions |url=https://www.ecb.europa.eu/press/pr/date/2019/html/ecb.mp190307~7d8a9d2665.en.html |access-date=10 December 2023 |website=European Central Bank – Eurosystem}}</ref> Under TLTRO III, the interest rate was set at −0.5% below the deposit facility rate (DFR), under condition that banks reached a specific lending performance threshold. The TLTRO III programme was successful to stimulate credit growth.<ref name="Barmeier-2023">{{Cite journal |last1=Barmeier |first1=Marcel |last2=Falath |first2=Juraj |last3=Kiššová |first3=Alena |last4=Lojschová |first4=Adriana |date=2023 |title=Impact of TLTRO III on bank lending: The Slovak experience |url=https://nbs.sk/dokument/b6528586-2679-4245-a850-cca84c5a9ca6/stiahnut/?force=false |journal=National Bank of Slovakia Working Papers |issue=2/2023 |page=4 |via=National Bank of Slovakia}}</ref><ref>{{Cite journal |last1=Silva |first1=Emilie Da |last2=Grossmann-Wirth |first2=Vincent |last3=Nguyen |first3=Benoit |last4=Vari |first4=Miklos |date=2021 |title=Paying Banks to Lend? Evidence from the Eurosystem's TLTRO and the Euro Area Credit Registry |url=https://ideas.repec.org//p/bfr/banfra/848.html |journal=Working Papers |language=en}}</ref>

      === Christine Lagarde's era (2019 – ) ===
      In July 2019, EU leaders nominated [[Christine Lagarde]] to replace Mario Draghi as ECB President. Lagarde resigned from her position as managing director of the [[International Monetary Fund]] in July 2019<ref>{{Cite news|date=16 July 2019|title=Christine Lagarde resigns as head of IMF|language=en-GB|work=BBC News|url=https://www.bbc.com/news/business-49009226|access-date=3 April 2021}}</ref> and formally took over the ECB's presidency on 1 November 2019.<ref>{{Cite news|last1=Hujer|first1=Marc|last2=Sauga|first2=Michael|date=30 October 2019|title=Elegance and Toughness: Christine Lagarde Brings a New Style to the ECB|work=Spiegel Online|url=https://www.spiegel.de/international/europe/christine-lagarde-takes-over-at-the-european-central-bank-a-1294033.html|access-date=11 November 2019}}</ref>

      Lagarde immediately signalled a change of style in the ECB's leadership. She embarked the ECB on a strategic review of the ECB's monetary policy strategy, an exercise the ECB had not done for 17 years. As part of this exercise, Lagarde committed the ECB to look into how monetary policy could contribute to [[climate change mitigation|address climate change]],<ref>{{Cite web|date=29 August 2019|title=Lagarde promises to paint the ECB green|url=https://www.politico.eu/article/christine-lagarde-promises-to-paint-the-ecb-green-european-central-bank/|access-date=3 April 2021|website=POLITICO|language=en-US}}</ref> and promised that "no stone would be left unturned." The ECB president also adopted a change of communication style, in particular in her use of social media to promote gender equality,<ref>{{Cite web|date=5 March 2021|title=Christine Lagarde's uphill battle for ECB gender equality|url=https://www.politico.eu/article/christine-lagarde-ecb-gender-equality/|access-date=3 April 2021|website=POLITICO|language=en-US}}</ref> and by opening dialogue with civil society stakeholders.<ref>{{Cite web|date=4 December 2019|title=Christine Lagarde meets with Positive Money Europe|url=https://www.positivemoney.eu/2019/12/meeting-ecb-president-christine-lagarde/|access-date=3 April 2021|website=Positive Money Europe|language=en-GB}}</ref><ref>{{Cite news|date=21 October 2020|title=Lagarde turns to civil society in ECB transformation effort|language=en|work=Reuters|url=https://www.reuters.com/article/us-ecb-lagarde-idUKKBN276166|access-date=3 April 2021}}</ref>

      ==== The ECB's response to COVID-19 pandemic ====
      The onset of the [[COVID-19 pandemic]] precipitated an unprecedented crisis, profoundly impacting global public health, economies, and societal structures on an unparalleled scale. The crisis led to renewed tensions in European sovereign bonds markets, marked by a growing spreads between the interest rates paid by Eurozone member states,<ref name="Runkel-2022">{{Cite journal |last=Runkel |first=Corey N |date=15 July 2022 |title=Eurozone: Pandemic Emergency Purchase Program |url=https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4175432 |journal=Journal of Financial Crises |volume=4 |issue=2 |pages=1570–1580 |ssrn=4175432 |via=SSRN}}</ref> which spurred concerns about the [[Euro area crisis]].

      On 12 March 2020, the ECB announced a set of policy measures such as an additional package of net asset purchases of €120 billion by the end of 2020 under the already existing APP, and more favorable terms on the TLTRO III. During the press conference, Christine Lagarde declared that the ECB "[...] is not here to close spreads."<ref name="Tesche-2022b" /><ref name="Lagarde-2020c">{{Cite journal |last=Lagarde |first=Christine |date=12 March 2020 |title=Press conferenece |url=https://www.ecb.europa.eu/press/pressconf/2020/html/ecb.is200312~f857a21b6c.en.html |access-date=6 December 2023 |website=EUropean Central Bank – Eurosystem}}</ref><ref name="Balmer-2020b">{{Cite news |last1=Balmer |first1=Crispian |last2=Mackenzie |first2=James |date=12 March 2020 |title=Italy furious at ECB's Lagarde 'not here to close spreads' comment |url=https://www.reuters.com/article/us-ecb-policy-italy-minister/italy-furious-at-ecbs-lagarde-not-here-to-close-spreads-comment-idUSKBN20Z3DW/ |access-date=7 December 2023 |work=Reuters}}</ref> This particular statement triggered a sudden negative reaction on financial markets, with a widening of yield spreads in Spain, Italy and Greece.<ref name="Moessner-2022">{{Cite journal |last1=Moessner |first1=Richhild |last2=de Haan |first2=Jakob |date=2022 |title=Effects of monetary policy announcements on term premia in the euro area during the COVID-19 pandemic |journal=Financial Research Letters |volume=44 |issue=44 |pages=1–4 |article-number=102055 |doi=10.1016/j.frl.2021.102055 |pmc=9014297 |pmid=35463215}}</ref>

      ===== Pandemic Emergency Purchase Programme (PEPP) =====
      On 19 March 2020—less than one week after Lagarde's unfortunate statements on the spreads—the ECB announced by surprise the launch of the Pandemic Emergency Purchase Programme (PEPP) worth €750 billion to boost liquidity in the European economy and to contain any sharp increases in sovereign yield spreads.<ref name="Sciorilli Borrelli-2020c">{{Cite web |last=Sciorilli Borrelli |first=Silvia |date=19 March 2020 |title=ECB rises to expectations with massive bond-buying move |url=https://www.politico.eu/article/the-ecb-rises-up-to-expectations-launches-massive-bond-buying-program/ |access-date=6 December 2023 |website=POLITICO |language=en}}</ref><ref>{{Cite journal |date=18 March 2020 |title=ECB announces €750 billion Pandemic Emergency Purchase Programme (PEPP) |url=https://www.ecb.europa.eu/press/pr/date/2020/html/ecb.pr200318_1~3949d6f266.en.html#:~:text=The%20ECB%20will%20not%20tolerate,jurisdictions%20of%20the%20euro%20area. |access-date=7 December 2023 |website=European Central Bank – Eurosystem}}</ref> This announcement led to an immediate reboot in stock prices<ref name="Moessner-2022" /><ref name="Ortmans-2021">{{Cite journal |last1=Ortmans |first1=Aymeric |last2=Tripier |first2=Fabien |date=9 June 2021 |title=COVID-induced sovereign risk in the euro area: When did the ECB stop the spread? |journal=European Economic Review |volume=137 |issue=137 |pages=2–3 |doi=10.1016/j.euroecorev.2021.103809 |pmc=9750059 |pmid=36536819}}</ref><ref name="Benigno-2022">{{Cite journal |last1=Benigno |first1=Pierpaolo |last2=Canofari |first2=Paolo |last3=Di Bartolomeo |first3=Giovanni |last4=Messori |first4=Marcello |date=16 July 2022 |title=The ECB'sasset purchase programme: Theory, effects, and risks |url=https://onlinelibrary.wiley.com/doi/full/10.1111/joes.12521 |journal=Journal of Economic Surveys |volume=37 |issue=3 |pages=893–902 |doi=10.1111/joes.12521 |s2cid=250636847 |via=Wiley Online Library |hdl-access=free |hdl=10067/1896580151162165141}}</ref> and came one day after the spike of sovereign risk spreads.<ref name="Alberola-2022">{{Cite journal |last1=Alberola |first1=Enrique |last2=Cheng |first2=Gong |last3=Consiglio |first3=Andrea |last4=Zenios |first4=Stavros A. |date=19 July 2022 |title=Debt sustainability and monetary policy: the case of ECB asset purchases |url=https://www.bis.org/publ/work1034.htm |journal=BIS Working Papers |volume= |issue=1034 |pages=3–4}}</ref>

      The PEPP was designed as a typical "[[quantitative easing]]" policy, under which the ECB is able to purchase securities from the private and public sector in a flexible manner.<ref name="Arnold-2020d">{{Cite web |last=Arnold |first=Martin |date=4 June 2020 |title=ECB boosts bond-buying stimulus package by €600bn |url=https://www.ft.com/content/c59ab92d-e614-4284-a028-46ee3bcf92f9 |access-date=5 December 2023 |website=Financial Times}}</ref><ref name="Tesche-2022b">{{Cite journal |last=Tesche |first=Tobias |date=16 February 2022 |title=Pandemic Politics: The European Union in Times of the Coronavirus Emergency |url=https://onlinelibrary.wiley.com/doi/10.1111/jcms.13303 |journal=Journal of Common Market Studies |volume=60 |issue=2 |pages=485–486 |doi=10.1111/jcms.13303 |s2cid=245528815 |via=Wiley Online Library|url-access=subscription }}</ref><ref name="Bertoldi-2023c">{{Cite journal |last1=Bertoldi |first1=Moreno |last2=Eriksgård |first2=Annika |last3=Orsini |first3=Kristian |last4=Pfeiffer |first4=Philipp |date=28 July 2023 |title=Where is the EU economy headed? The international dimension |url=https://www.sciencedirect.com/science/article/pii/S0161893823000728 |journal=Journal of Policy Modeling |volume=45 |issue=4 |pages=819–821 |doi=10.1016/j.jpolmod.2023.07.005 |s2cid=260307969 |via=Elsevier Science Direct|url-access=subscription }}</ref> The purpose of the PEPP was to stabilize sovereign bonds yields to low and stable levels, thus preventing self-fulfilling panics in financial markets as was the case during the [[Euro area crisis]].<ref name="Tesche-2020a">{{Cite journal |last=Tesche |first=Tobias |date=15 June 2020 |title=The European Union's response to the coronavirus emergency: an early assessment |url=https://www.lse.ac.uk/european-institute/Assets/Documents/LEQS-Discussion-Papers/LEQSPaper157.pdf |journal=LSE 'Europe in Question' Discussion Paper Series |volume=157/2020 |pages=1–5 |via=SSRN}}</ref><ref name="Carnazza-2021">{{Cite journal |last1=Carnazza |first1=Giovanni |last2=Liberati |first2=Paolo |date=10 April 2021 |title=The asymmetric impact of the pandemic crisis on interest rates on public debt in the Eurozone |url=https://www.sciencedirect.com/science/article/pii/S0161893821000223/pdfft?md5=d558e4e98a05a43cda259897b42525c9&pid=1-s2.0-S0161893821000223-main.pdf |journal=Journal of Policy Modeling |volume=43 |issue=3 |pages=522–541 |doi=10.1016/j.jpolmod.2021.04.001 |s2cid=234834111 |via=Elsevier Science Direct}}</ref>

      The PEPP was established as a separate purchase programme alongside the pre-existing Asset Purchase Programme (APP) with the sole purpose to respond to the economic and financial consequences of the COVID-19 crisis, and in particular prevent market fragmentations.<ref name="DB-2023">{{Cite web |title=Pandemic emergency purchase programme (PEPP) |url=https://www.bundesbank.de/en/tasks/monetary-policy/outright-transactions/pandemic-emergency-purchase-programme-pepp--831136 |access-date=30 November 2023 |website=Deutsche Bundesbank Eurosystem}}</ref><ref name="Grund-2020">{{Cite journal |last=Grund |first=Sebastian |date=25 March 2020 |title=Legal, Compliant and Suitable: The ECB's Pandemic Emergency Purchase Programme (PEPP) |url=https://elischolar.library.yale.edu/cgi/viewcontent.cgi?article=13475&context=ypfs-documents |journal=Hertie School Jacques Delors Centre |pages=1–3 |via=Elischolar}}</ref> While very similar, Contrary to the APP, the ECB decided to allow itself to deviate from the capital key. This temporal flexibility from the capital key meant that the ECB could more effectively prevent the rise of Italian and Spanish yield spreads.<ref name="Tesche-2020a" /><ref name="Borri-2021">{{Cite journal |last1=Borri |first1=Nicola |last2=di Giorgio |first2=Giorgio |date=6 February 2021 |title=Systemic risk and the COVID challenge in the european banking sector |url=https://www.sciencedirect.com/science/article/pii/S0378426621000315/pdf |journal=Journal of Banking and Finance |volume=140 |pages=9–12 |via=Elsevier Science Direct}}</ref><ref name="Blotevogel-2023">{{Cite journal |last1=Blotevogel |first1=Robert |last2=Hudecz |first2=Robert |last3=Vangelista |first3=Elisabetta |date=2024 |title=Asset purchases and sovereign bond spreads in the euro area during the pandemic |url=https://www.sciencedirect.com/science/article/pii/S0261560623001791 |journal=Journal of International Money and Finance |volume=140 |issue= |pages=1–8 |article-number=102978 |doi=10.1016/j.jimonfin.2023.102978 |via=Elsevier Science Direct|url-access=subscription }}</ref><ref>{{Citation |title=Decision (EU) 2020/440 of the European Central Bank of 24 March 2020 on a temporary pandemic emergency purchase programme (ECB/2020/17) |date=24 March 2020 |url=http://data.europa.eu/eli/dec/2020/440/oj/eng |access-date=30 November 2023 |language=en}}</ref><ref name="Camous-2020b">{{Cite journal |last1=Camous |first1=Antoine |last2=Claeys |first2=Grégory |date=26 October 2020 |title=The evolution of European economic institutions during the COVID-19 crisis |journal=European Policy Analysis |volume=6 |issue=2 |pages=334–336 |doi=10.1002/epa2.1100 |pmid=34616911 |pmc=7753405 }}</ref><ref>{{Cite journal |last=Fabbrini |first=Federico |date=2022 |title=The Legal Architecture of the Economic Responses to COVID-19: EMU beyond the Pandemic |journal=Journal of Common Market Studies |volume=60 |issue=1 |page=190 |doi=10.1111/jcms.13271 |doi-access=free }}</ref>

      Assets meeting the eligibility criteria of the APP were also eligible under the PEPP.<ref name="Bank-2023">{{Cite journal |date=9 August 2023 |title=FAQ on the pandemic emergency purchase programme |url=https://www.ecb.europa.eu/mopo/implement/pepp/html/ecb.faq_pepp.en.html |access-date=30 November 2023 |website=European Central Bank – Eurosystem}}</ref> However, the pool of assets eligible under the PEPP was broader than the usual ECB collateral eligibility framework.<ref name="Sciorilli Borrelli-2020c" /> For instance, greek sovereign bonds could be purchased by the ECB under this programme, despite having a credit ratings below the usual investment grade requirement.<ref name="Sciorilli Borrelli-2020c" /><ref name="FT-2023b">{{Cite web |title=ECB set to expand bond-buying to soak up debt |url=https://www.ft.com/content/3cf499f7-9c17-46c6-bedd-8893f2d56cf7 |access-date=7 December 2023 |website=Financial Times|date=2 June 2020 |last1=Arnold |first1=Martin }}</ref><ref name="Arnold-2020e">{{Cite web |last=Arnold |first=Martin |date=19 March 2020 |title=ECB to launch €750bn bond-buying programme |url=https://www.ft.com/content/711c5df2-695e-11ea-800d-da70cff6e4d3 |access-date=4 December 2023 |website=Financial Times}}</ref> This waiver was given based on several considerations from the ECB: there was a need to alleviate the pressures stemming from the pandemic on the Greek financial markets; Greece was already and would be closely monitored by giving the waiver; and Greece regained market access.<ref name="Boninghausen-2022b">{{cite journal |last1=Böninghausen |first1=Benjamin |last2=Fernández Brennan |first2=León |last3=McCabe |first3=Laura |last4=Schumacher |first4=Julian |title=The pandemic emergency purchase programme – an initial review |journal=ECB Economic Bulletin |issue=8/2022 |page=97 & 98}}</ref> Non-financial commercial paper with a remaining maturity of at least 28 days were also eligible for purchase under the PEPP.<ref name="Bank-2023" /><ref>{{Cite web |last=Ondernemen |first=Agentschap Innoveren & |title=EU Funding Overview |url=https://eufundingoverview.be/ |access-date=30 November 2023 |website=eufundingoverview.be |language=en}}</ref>

      On 4 June 2020, the ECB announced<ref>{{Cite journal |date=4 June 2020 |title=Monetary policy decisions |url=https://www.ecb.europa.eu/press/pr/date/2020/html/ecb.mp200604~a307d3429c.en.html |access-date=7 December 2023 |website=European Central Bank – Eurosystem}}</ref> it would expand the PEPP by another €600 billion,<ref name="Pinto-2023">{{Cite journal |last1=Pinto |first1=João |last2=Costa |first2=Tiago |date=26 September 2023 |title=The Impact of the ECB's PEPP on Euro Area Bond Spreads |url=https://repositorio.ual.pt/bitstream/11144/6572/3/The%20Impact%20of%20the%20ECB%C3%94%C3%87%C3%96s%20PEPP%20on%20Euro%20Area%20Bond%20Spreads_ERBE_II_2.pdf |journal=European Review of Business Economics |volume=11 |issue=2 |pages=62–63 |via=Social Science Research Network}}</ref> as it became clear that the pandemic would continue to harm European economies.<ref name="Runkel-2022" /><ref name="Arnold-2020d" /><ref name="Benigno-2022" /><ref name="Moessner-2022" /> Half a year later, on 10 December 2020, the ECB announced its final expansion of the PEPP worth another €500 billion, totalling the final PEPP to €1.850 trillion,<ref name="Bank-2020a">{{Cite journal |date=10 December 2020 |title=Monetary policy decisions |url=https://www.ecb.europa.eu/press/pr/date/2020/html/ecb.mp201210~8c2778b843.en.html |access-date=7 December 2023 |website=European Central Bank – Eurosystem}}</ref><ref name="DB-2023" /><ref name="Alberola-2022" /> corresponding to 15.4% of the euro-area GDP of 2019.<ref name="Wieland-2023">{{Cite journal |last=Wieland |first=Volker |date=13 July 2023 |title=Discussion of "policy packages and policy space: Lessons from COVID-19" by Bergant & Forbes |url=https://www.sciencedirect.com/science/article/pii/S0014292123001654 |journal=European Economic Review |volume=158 |issue=158 |page=7 |doi=10.1016/j.euroecorev.2023.104536 |s2cid=259942585 |via=Elsevier Science Direct|url-access=subscription }}</ref>
      [[File:PEPP_Graph_Improved.png|thumb|Gross securities purchases by the ECB under the PEPP<ref name="ECB-2023">{{Cite web |date=5 October 2023 |title=Breakdown of cumulative net purchases under the PEPP |url=https://www.ecb.europa.eu/mopo/pdf/PEPP_breakdown_history.csv?6fd58bd8812b585a58b751aebd9a1e4f |access-date=10 November 2023 |website=European Central Bank – Eurosystem}}</ref>]]
      In December 2021 the ECB announced that it would discontinue net purchases under the PEPP as from the end of March 2022 and that it intended to reinvest the principal payments from maturing securities at least until the end of 2024.<ref name="Wellink-2023d">{{Cite journal |last=Wellink |first=Nout |date=2 August 2023 |title=Crises have shaped the European Central Bank |journal=Journal of International Money and Finance |volume=138 |pages=7–8 |article-number=102923 |doi=10.1016/j.jimonfin.2023.102923 |doi-access=free}}</ref><ref>{{Cite journal |date=16 December 2020 |title=Monetary Policy Decisions |url=https://www.ecb.europa.eu/press/pr/date/2021/html/ecb.mp211216~1b6d3a1fd8.en.html |access-date=7 December 2023 |website=European Central Bank – Eurosystems}}</ref>

      On 31 March 2022, at the end of the net purchases, the net purchases amounted to €1.718 billion, of which €1.665 billion is invested in public sector securities and €52 billion in private sector securities.<ref name="Boninghausen-2022a">{{cite journal |last1=Böninghausen |first1=Benjamin |last2=Fernández Brennan |first2=León |last3=McCabe |first3=Laura |last4=Schumacher |first4=Julian |title=The pandemic emergency purchase programme – an initial review |journal=ECB Economic Bulletin |issue=8/2022 |pages=93–104}}</ref> Of the total €1.850 billion available under the PEPP, 93% of the full envelope wase used, due to indications of decreased financial stress in the Euro Area, mainly thanks to relaxation of COVID restrictions and the reopening of European markets.<ref>{{Cite journal |last1=Birkholz |first1=Carlo |last2=Heinemann |first2=Friedrich |date=9 June 2022 |title=Magnitudes and capital key divergence of the Eurosystem's PSPP/PEPP purchases – updated june 2022 |url=https://www.econstor.eu/bitstream/10419/271651/1/zew-exp202205.pdf |journal=ZEW Expert Brief |issue=5 |page=5 |via=econstor.eu}}</ref>
