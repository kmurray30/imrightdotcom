      SARS-CoV-2, the virus that causes COVID-19, was isolated in late 2019.  Its genetic sequence was published on 11 January 2020, setting off an intense research effort to develop a COVID-19 vaccine. Vaccine development was expedited via unprecedented collaboration between academia, the pharmaceutical industry and governments. By June 2020, tens of billions of dollars were being invested to develop dozens of vaccine candidates and prepare for global vaccination programs. According to the Coalition for Epidemic Preparedness Innovations (CEPI), the geographic distribution of COVID‑19 vaccine development shows North American entities to have about 40% of the activity, compared to 30% in Asia and Australia, 26% in Europe, and a few projects in South America and Africa.
      In February 2020, the World Health Organization (WHO) said it did not expect a vaccine against SARS‑CoV‑2 to become available in less than 18 months. Virologist Paul Offit commented that, in hindsight, the development of a safe and effective vaccine within 11 months was a remarkable feat. The rapidly growing infection rate of COVID‑19 worldwide during 2020 stimulated international alliances and government efforts to urgently...
    source: |-
      {{Short description|Scientific work to develop a vaccine for COVID-19}}
      {{cs1 config|name-list-style=vanc}}
      {{Use dmy dates|date=July 2022}}

      [[File:COVID-19 vaccine in NIAID lab freezer.jpg|thumb|COVID‑19 vaccine research samples in a [[NIAID]] lab freezer (30 January 2020)]]

      {{COVID-19 pandemic sidebar|expanded=medical}}

      [[Severe acute respiratory syndrome coronavirus 2|SARS-CoV-2]], the virus that causes [[COVID-19]], was isolated in late 2019.<ref name="who-time" />  Its [[Nucleic acid sequence|genetic sequence]] was published on 11 January 2020, setting off an intense research effort to develop a [[COVID-19 vaccine]].<ref name="thanh" /><ref name="gates1" /><ref name="Fauci" /> Vaccine development was expedited via unprecedented collaboration between [[Academic institution|academia]], the [[pharmaceutical industry]] and governments.<ref name="thanh2" /> By June 2020, tens of billions of dollars were being invested to develop dozens of vaccine candidates and prepare for global vaccination programs.<ref name="gates1" /><ref name="hbr" /><ref name="cbcr" /><ref name="ahmed" /> According to the [[Coalition for Epidemic Preparedness Innovations]] (CEPI), the geographic distribution of COVID‑19 vaccine development shows North American entities to have about 40% of the activity, compared to 30% in Asia and Australia, 26% in Europe, and a few projects in South America and Africa.<ref name="thanh">{{cite journal | vauthors = Thanh Le T, Andreadakis Z, Kumar A, Gómez Román R, Tollefsen S, Saville M, Mayhew S | title = The COVID-19 vaccine development landscape | journal = Nature Reviews. Drug Discovery | volume = 19 | issue = 5 | pages = 305–306 | date = May 2020 | pmid = 32273591 | doi = 10.1038/d41573-020-00073-5 | doi-access = free | title-link = doi | bibcode = 2020NRvDD..19..305T }}</ref><ref name="thanh2" />

      In February 2020, the [[World Health Organization]] (WHO) said it did not expect a vaccine against SARS‑CoV‑2 to become available in less than 18 months.<ref name=":0" /> Virologist Paul Offit commented that, in hindsight, the development of a safe and effective vaccine within 11 months was a remarkable feat.<ref>{{cite web |last1=Offit |first1=Paul |title=TWiV 720: With vaccines, Offit is on it |url=https://www.youtube.com/watch?v=54WDQYvvcCs |website=This Week in Virology Podcast |date=13 February 2021 |publisher=Vincent Racaniello Youtube Channel |access-date=14 July 2021 |archive-date=25 May 2021 |archive-url=https://web.archive.org/web/20210525095644/https://www.youtube.com/watch?v=54WDQYvvcCs |url-status=live }}</ref> The rapidly growing infection rate of COVID‑19 worldwide during 2020 stimulated international alliances and government efforts to urgently organize resources to make multiple vaccines on shortened timelines;<ref name="who-accel" /> Four vaccine candidates entered human evaluation in March.<ref name="thanh" /><ref name="yamey" />

      On 24 June 2020, China approved the CanSino vaccine for limited use in the military and two inactivated virus vaccines for emergency use in high-risk occupations.<ref name=":1" /> On 11 August 2020, Russia announced the approval of its Sputnik V vaccine for emergency use, though one month later only small amounts of the vaccine had been distributed for use outside of the phase 3 trial.<ref name=":2" />

      The Pfizer–BioNTech partnership submitted an [[Emergency Use Authorization]] (EUA) request to the U.S. [[Food and Drug Administration]] (FDA) for their mRNA vaccine on 20 November 2020.<ref name=":3" /><ref name=":4" /> On 2 December 2020, the United Kingdom's [[Medicines and Healthcare products Regulatory Agency]] (MHRA) gave temporary regulatory approval for the [[Pfizer–BioNTech COVID‑19 vaccine|Pfizer–BioNTech vaccine]],<ref name="MHRA 2020-12-08">{{cite web | title=Information for Healthcare Professionals on Pfizer/BioNTech COVID-19 vaccine | website=Medicines & Healthcare products Regulatory Agency (MHRA) | date=8 December 2020 | url=https://www.gov.uk/government/publications/regulatory-approval-of-pfizer-biontech-vaccine-for-covid-19/information-for-healthcare-professionals-on-pfizerbiontech-covid-19-vaccine | access-date=13 December 2020 | archive-date=15 March 2021 | archive-url=https://web.archive.org/web/20210315192413/https://www.gov.uk/government/publications/regulatory-approval-of-pfizer-biontech-vaccine-for-covid-19/information-for-healthcare-professionals-on-pfizerbiontech-covid-19-vaccine | url-status=live }}</ref><ref name=":5" /> becoming the first country to approve the vaccine and the first country in the [[Western world]] to approve the use of any COVID‑19 vaccine.<ref name="ukgov12-2">{{cite web |title=UK medicines regulator gives approval for first UK COVID-19 vaccine |url=https://www.gov.uk/government/news/uk-medicines-regulator-gives-approval-for-first-uk-covid-19-vaccine |publisher=Medicines and Healthcare Products Regulatory Agency, Government of the UK |access-date=2 December 2020 |date=2 December 2020 |archive-date=17 March 2021 |archive-url=https://web.archive.org/web/20210317204122/https://www.gov.uk/government/news/uk-medicines-regulator-gives-approval-for-first-uk-covid-19-vaccine |url-status=live }}</ref><ref name="mueller">{{cite news|last1=Mueller|first1=Benjamin|date=2 December 2020|title=U.K. Approves Pfizer Coronavirus Vaccine, a First in the West|work=[[The New York Times]]|url=https://www.nytimes.com/2020/12/02/world/europe/pfizer-coronavirus-vaccine-approved-uk.html|access-date=2 December 2020|archive-date=28 January 2021|archive-url=https://web.archive.org/web/20210128124416/https://www.nytimes.com/2020/12/02/world/europe/pfizer-coronavirus-vaccine-approved-uk.html|url-status=live}}</ref><ref name=":6" /> The US and the EU followed later that month.<ref name="eu vac">{{cite web |date=21 December 2020 |title=Questions and Answers: COVID-19 vaccination in the EU |url=https://ec.europa.eu/commission/presscorner/detail/en/qanda_20_2467 |url-status=live |archive-url=https://web.archive.org/web/20210129144056/https://ec.europa.eu/commission/presscorner/detail/en/qanda_20_2467 |archive-date=29 January 2021 |access-date=21 December 2020 |website=[[European Commission]]}}</ref><ref name="thomas">{{cite news |date=12 December 2020 |title=F.D.A. Clears Pfizer Vaccine, and Millions of Doses Will Be Shipped Right Away |url=https://www.nytimes.com/2020/12/11/health/pfizer-vaccine-authorized.html |url-status=live |archive-url=https://web.archive.org/web/20201212023020/https://www.nytimes.com/2020/12/11/health/pfizer-vaccine-authorized.html |archive-date=12 December 2020 |access-date=12 December 2020 |work=[[The New York Times]] |vauthors=Thomas K, LaFraniere S, Weiland N, Goodnough A, Haberman M}}</ref> The US also granted an EUA for the [[Moderna COVID-19 vaccine]] in December.<ref name="CDC ACIP Moderna COVID-19 Vaccine">{{cite journal |vauthors=Oliver SE, Gargano JW, Marin M, Wallace M, Curran KG, Chamberland M, McClung N, Campos-Outcalt D, Morgan RL, Mbaeyi S, Romero JR, Talbot HK, Lee GM, Bell BP, Dooling K |date=January 2021 |title=The Advisory Committee on Immunization Practices' Interim Recommendation for Use of Moderna COVID-19 Vaccine - United States, December 2020 |url=<!-- official url --> https://www.cdc.gov/mmwr/volumes/69/wr/pdfs/mm695152e1-H.pdf |url-status=live |journal=MMWR. Morbidity and Mortality Weekly Report |volume=69 |issue=5152 |pages=1653–56 |doi=10.15585/mmwr.mm695152e1 |pmc=9191904 |pmid=33382675 |s2cid=229945697 |archive-url=https://web.archive.org/web/20210209193446/https://www.cdc.gov/mmwr/volumes/69/wr/pdfs/mm695152e1-H.pdf |archive-date=9 February 2021 |access-date=18 January 2021 |doi-access=free}}</ref><ref name="CNBC 20201219">{{cite news |date=19 December 2020 |title=FDA approves second Covid vaccine for emergency use as it clears Moderna's for U.S. distribution |url=https://www.cnbc.com/2020/12/18/moderna-covid-vaccine-approved-fda-for-emergency-use.html |url-status=live |archive-url=https://web.archive.org/web/20210126193134/https://www.cnbc.com/2020/12/18/moderna-covid-vaccine-approved-fda-for-emergency-use.html |archive-date=26 January 2021 |access-date=19 December 2020 |publisher=CNBC |vauthors=Lovelace Jr B}}</ref> [[Bahrain]] and the [[United Arab Emirates]] granted emergency marketing authorization for the [[Sinopharm BIBP COVID-19 vaccine|Sinopharm BIBP vaccine]].<ref name="bna">{{cite news|date=4 December 2020|title=Bahrain second in the world to approve the Pfizer/BioNTech Covid-19 vaccine|publisher=Bahrain News Agency|url=https://www.bna.bh/en/news?cms=q8FmFJgiscL2fwIzON1%2BDteRtB2wfPWh%2FOmYUjt6ApY%3D|access-date=9 December 2020|archive-date=17 December 2020|archive-url=https://web.archive.org/web/20201217110318/https://www.bna.bh/en/news?cms=q8FmFJgiscL2fwIzON1+DteRtB2wfPWh%2FOmYUjt6ApY%3D|url-status=live}}</ref><ref name="uae">{{cite news|title=UAE: Ministry of Health announces 86 per cent vaccine efficacy|work=Gulf News|url=https://gulfnews.com/uae/health/uae-ministry-of-health-announces-86-per-cent-vaccine-efficacy-1.1607490555571|access-date=9 December 2020|archive-date=24 December 2020|archive-url=https://web.archive.org/web/20201224144127/https://gulfnews.com/uae/health/uae-ministry-of-health-announces-86-per-cent-vaccine-efficacy-1.1607490555571|url-status=live}}</ref> 

      On 31 March 2021, the Russian government announced that they had registered the first COVID‑19 vaccine for animals.<ref>{{cite news |vauthors=Tétrault-Farber M, Vasilyeva G |title=Russia registers world's first COVID-19 vaccine for animals |url=https://www.reuters.com/article/health-coronavirus-russia-vaccine-animal/russia-registers-worlds-first-covid-19-vaccine-for-animals-watchdog-idINKBN2BN0LL?edition-redirect=in |work=Reuters |date=31 March 2021 |access-date=4 April 2021 |archive-date=17 December 2021 |archive-url=https://web.archive.org/web/20211217005347/https://www.reuters.com/article/health-coronavirus-russia-vaccine-animal/russia-registers-worlds-first-covid-19-vaccine-for-animals-watchdog-idINKBN2BN0LL?edition-redirect=in |url-status=live }}</ref> Named [[Carnivac-Cov]], it is an inactivated vaccine for carnivorous  animals, including pets, aimed at preventing mutations that occur during the interspecies transmission of SARS-CoV-2.<ref>{{cite news |title=В России зарегистрировали первую в мире вакцину против COVID-19 для животных |trans-title=The world's first COVID-19 vaccine for animals was registered in Russia |url=https://tass.ru/obschestvo/11034123 |access-date=19 May 2021 |work=TASS |date=31 March 2021 |location=Moscow |language=Russian |archive-date=19 May 2021 |archive-url=https://web.archive.org/web/20210519122749/https://tass.ru/obschestvo/11034123 |url-status=live }}</ref>

      In October 2022, China began administering an oral vaccine developed by [[CanSino Biologics]] using its adenovirus model.<ref>{{cite web |last=MORITSUGU |first=KEN |date=2022-10-26 |title=Afraid of needles? China using inhalable COVID-19 vaccine |url=https://apnews.com/article/health-china-shanghai-covid-73054086e649140d3cf6edf77ae4ef73 |access-date=2022-11-02 |website=AP NEWS |language=en}}</ref>

      Despite the availability of [[mRNA vaccine|mRNA]] and [[viral vector vaccine]]s, worldwide [[vaccine equity]] has not been achieved. The ongoing development and use of [[whole inactivated virus]] (WIV)  and [[Subunit vaccine|protein-based]] vaccines has been recommended, especially for use in [[developing countries]], to dampen further waves of the pandemic.<ref name="Hotez">{{cite journal|vauthors = Hotez PJ, Bottazzi ME|date=January 2022 |title=Whole Inactivated Virus and Protein-Based COVID-19 Vaccines |journal=Annual Review of Medicine |volume=73 |issue=1 |pages=55–64 |doi=10.1146/annurev-med-042420-113212 |pmid=34637324 |s2cid=238747462 | doi-access=free | title-link=doi }}</ref><ref name="Ye">{{cite journal | vauthors = Ye Y, Zhang Q, Wei X, Cao Z, Yuan HY, Zeng DD |title=Equitable access to COVID-19 vaccines makes a life-saving difference to all countries |journal=Nature Human Behaviour |date=February 2022 |volume=6 |issue=2 |pages=207–216 |doi=10.1038/s41562-022-01289-8 |pmid=35102361 |pmc=8873023 | doi-access=free | title-link=doi }}</ref>
      {{Toclimit|3}}

      ==Planning and investment==
      Since 2020, vaccine development has been expedited via unprecedented collaboration in the [[Pharmaceutical industry|multinational pharmaceutical industry]] and between governments.<ref name="thanh2">{{cite journal | vauthors = Le TT, Cramer JP, Chen R, Mayhew S | title = Evolution of the COVID-19 vaccine development landscape | journal = Nature Reviews. Drug Discovery | volume = 19 | issue = 10 | pages = 667–668 | date = October 2020 | pmid = 32887942 | doi = 10.1038/d41573-020-00151-8 | s2cid = 221503034 | doi-access = free | title-link = doi }}</ref> According to the Coalition for Epidemic Preparedness Innovations (CEPI), the geographic distribution of COVID‑19 vaccine development puts North American entities having about 40% of the activity compared to 30% in Asia and Australia, 26% in Europe, and a few projects in South America and Africa.<ref name="thanh2" /><ref name="thanh" />

      Commitment to first-in-human testing of a vaccine candidate represents a substantial capital cost for vaccine developers, estimated to be from {{US$|14}}{{nbsp}}million to {{US$|25}}{{nbsp}}million for a typical Phase{{nbsp}}I trial program, but possibly as much as {{US$|70}}{{nbsp}}million.<ref name="gouglas">{{cite journal|vauthors=Gouglas D, Thanh Le T, Henderson K, Kaloudis A, Danielsen T, Hammersland NC, Robinson JM, Heaton PM, Røttingen JA|date=December 2018|title=Estimating the cost of vaccine development against epidemic infectious diseases: a cost minimisation study|journal=Lancet Global Health|volume=6|issue=12|pages=e1386–96|doi=10.1016/S2214-109X(18)30346-2|pmc=7164811|pmid=30342925|doi-access=free|title-link=doi}}</ref><ref name="dimasi">{{cite journal|vauthors=DiMasi JA, Grabowski HG, Hansen RW|date=May 2016|title=Innovation in the pharmaceutical industry: New estimates of R&D costs|journal=Journal of Health Economics|volume=47|pages=20–33|doi=10.1016/j.jhealeco.2016.01.012|pmid=26928437|hdl-access=free|hdl=10161/12742}}</ref> For comparison, during the [[Western African Ebola virus epidemic|Ebola virus epidemic of 2013–16]], there were 37 vaccine candidates in urgent development  with only one becoming a licensed vaccine at a total cost to confirm efficacy in Phase{{nbsp}}II–III trials of about {{US$|1}}{{nbsp}}billion.<ref name="gouglas" />

