      In April 2016, the United States became a signatory to the [[Paris Agreement]] on [[climate change mitigation]], and accepted it by [[Executive order (United States)|executive order]] in September 2016. President [[Barack Obama]] committed the United States to contributing US$3&nbsp;billion to the [[Green Climate Fund]].<ref name="Green Climate Fund">[https://www.greenclimate.fund/documents/20182/24868/Status_of_Pledges.pdf/eef538d3-2987-4659-8c7c-5566ed6afd19 Green Climate Fund] {{Webarchive|url=https://web.archive.org/web/20170604095337/http://www.greenclimate.fund/documents/20182/24868/Status_of_Pledges.pdf/eef538d3-2987-4659-8c7c-5566ed6afd19 |date=June 4, 2017 }}, ''Status of Pledges''.</ref> On June 1, 2017, U.S. president [[Donald Trump]] announced that the United States would cease all participation in the 2015 [[Paris Agreement]] on [[climate change mitigation]],<ref>{{cite news|url=https://www.foxnews.com/politics/paris-agreement-on-climate-change-us-withdraws-as-trump-calls-it-unfair|title=Paris Agreement on climate change: US withdraws as Trump calls it 'unfair' to US|last1=Chakraborty|first1=Barnini|date=June 1, 2017|publisher=Fox News|access-date=July 25, 2017|archive-url=https://web.archive.org/web/20170731203105/http://www.foxnews.com/politics/2017/06/01/trump-u-s-to-withdraw-from-paris-climate-pact-calls-it-unfair-for-america.html|archive-date=July 31, 2017|url-status=live}}</ref><ref>{{cite news|url=https://www.nytimes.com/2017/06/01/climate/trump-paris-climate-agreement.html|title=Trump Will Withdraw U.S. From Paris Climate Agreement|last=Shear|first=Michael D.|date=June 1, 2017|work=The New York Times|access-date=June 2, 2017|archive-date=June 10, 2017|archive-url=https://web.archive.org/web/20170610224451/https://www.nytimes.com/2017/06/01/climate/trump-paris-climate-agreement.html|url-status=live}}</ref> contending that the agreement would "undermine" the U.S. economy, and put the U.S. "at a permanent disadvantage".<ref name = "Hill1">{{cite news|url=https://thehill.com/policy/energy-environment/335955-trump-pulls-us-out-of-paris-climate-deal/|title=Trump: We are getting out of Paris climate deal|last=Smilowitz|first=Elliot|date=June 1, 2017|work=The Hill|access-date=June 1, 2017|archive-url=https://web.archive.org/web/20170605000735/http://thehill.com/policy/energy-environment/335955-trump-pulls-us-out-of-paris-climate-deal|archive-date=June 5, 2017|url-status=live}}</ref><ref name = "BBC1">{{cite news|url=https://www.bbc.com/news/world-us-canada-40127326|title=Paris climate deal: Trump announces US will withdraw|date=June 1, 2017|work=BBC News|access-date=June 1, 2017|language=en-GB|archive-url=https://web.archive.org/web/20170601231930/http://www.bbc.com/news/world-us-canada-40127326|archive-date=June 1, 2017|url-status=live}}</ref>

      In accordance with [[Paris Agreement#Withdrawal from Agreement|Article 28 of the Paris Agreement]], a country cannot give notice of withdrawal from the agreement within the first three years of its start date in the relevant country, which was on November 4, 2016, in the case of the United States. The White House later clarified that the U.S. would abide by the four-year exit process.<ref name = "PPG" /> On November 4, 2019, the administration gave a formal notice of intention to withdraw, which takes 12 months to take effect.<ref name=NYT060117>{{cite web |work=The New York Times |date=June 1, 2017 |url=https://www.nytimes.com/2017/06/01/climate/american-cities-climate-standards.html |title=Bucking Trump, These Cities, States and Companies Commit to Paris Accord |access-date=June 2, 2017 |archive-url=https://web.archive.org/web/20170602221739/https://mobile.nytimes.com/2017/06/01/climate/american-cities-climate-standards.html |archive-date=June 2, 2017 |url-status=live }}</ref> The withdrawal took effect on November 4, 2020, one day after the [[2020 United States presidential election|2020 U.S. presidential election]].<ref>{{Cite news |url=https://www.bbc.com/news/science-environment-54797743 |title=Climate change: US formally withdraws from Paris agreement |work=BBC News |date=November 4, 2020 |access-date=November 4, 2020 |archive-date=November 4, 2020 |archive-url=https://web.archive.org/web/20201104121224/https://www.bbc.com/news/science-environment-54797743 |url-status=live}}</ref> However, the U.S. still has to report its [[greenhouse gas inventory]] because it remains in the [[United Nations Framework Convention on Climate Change|UNFCCC]].<ref>{{Cite web |title=Reporting requirements CRF tables |url=https://unfccc.int/process-and-meetings/transparency-and-reporting/reporting-and-review-under-the-convention/greenhouse-gas-inventories-annex-i-parties/reporting-requirements |access-date=2025-01-25 |website=unfccc.int}}</ref>

      The decision to withdraw the U.S. was backed by many [[Republican Party (United States)|Republicans]]<ref>Tom McCarthy & Lauren Gambino, [https://www.theguardian.com/us-news/2017/jun/01/republican-senators-paris-climate-deal-energy-donations The Republicans who urged Trump to pull out of Paris deal are big oil darlings] {{Webarchive|url=https://web.archive.org/web/20170601120951/https://www.theguardian.com/us-news/2017/jun/01/republican-senators-paris-climate-deal-energy-donations |date=June 1, 2017}}, ''The Guardian'' (June 1, 2017).</ref><ref>Andrew Prokop, [https://www.vox.com/2017/6/1/15726726/trump-paris-climate-agreement-republicans Don't just blame Trump for quitting the Paris deal — blame the Republican Party] {{Webarchive|url=https://web.archive.org/web/20210126094351/https://www.vox.com/2017/6/1/15726726/trump-paris-climate-agreement-republicans |date=January 26, 2021}}, ''Vox'' (June 1, 2017).</ref><ref name="FriedmanNYT">Lisa Friedman, [https://www.nytimes.com/2019/05/02/climate/congress-paris-climate-agreement.html Staking Out Battle Lines, House Votes to Keep U.S. in Paris Climate Pact] {{Webarchive|url=https://web.archive.org/web/20201227100310/https://www.nytimes.com/2019/05/02/climate/congress-paris-climate-agreement.html |date=December 27, 2020}}, ''The New York Times'' (May 2, 2019).</ref><ref name=ClementDennis>Scott Clement & Brady Dennis, [https://www.washingtonpost.com/news/energy-environment/wp/2017/06/05/post-abc-poll-nearly-6-in-10-oppose-trump-scrapping-paris-agreement/ Post-ABC poll: Nearly 6 in 10 oppose Trump scrapping Paris agreement] {{Webarchive|url=https://web.archive.org/web/20170605202135/https://www.washingtonpost.com/news/energy-environment/wp/2017/06/05/post-abc-poll-nearly-6-in-10-oppose-trump-scrapping-paris-agreement/ |date=June 5, 2017}}, ''The Washington Post'' (June 5, 2017).</ref> but was strongly opposed by [[Democratic Party (United States)|Democrats]].<ref name="FriedmanNYT" /><ref>[https://www.washingtonpost.com/graphics/politics/policy-2020/climate-change/rejoining-paris-climate-agreement/ Where Democrats Stand: Should we rejoin the Paris Agreement?] {{Webarchive|url=https://web.archive.org/web/20210111174615/https://www.washingtonpost.com/graphics/politics/policy-2020/climate-change/rejoining-paris-climate-agreement/ |date=January 11, 2021}}, ''The Washington Post'' (2020).</ref><ref name=Blast>Michael Edison Hayden, [https://abcnews.go.com/Politics/politicians-environmental-groups-react-idea-us-leave-paris/story?id=47744197 Democrats, environmentalists blast idea US could leave the Paris accord] {{Webarchive|url=https://web.archive.org/web/20210204001342/https://abcnews.go.com/Politics/politicians-environmental-groups-react-idea-us-leave-paris/story?id=47744197 |date=February 4, 2021 }}, ABC News (May 31, 2017).</ref> However, it was strongly criticized in the U.S. and abroad by environmentalists,<ref name=Blast/><ref name=Tollefson>Jeff Tollefson, [https://www.nature.com/articles/d41586-019-03230-y It's official: Trump begins process to exit Paris climate agreement] {{Webarchive|url=https://web.archive.org/web/20201124060501/https://www.nature.com/articles/d41586-019-03230-y |date=November 24, 2020 }}, ''Nature'' (November 4, 2019).</ref> religious organizations,<ref>[https://www.fcnl.org/updates/2017-06/25-religious-organizations-express-disappointment-paris-agreement-withdrawal 25 Religious Organizations Express Disappointment on Paris Agreement Withdrawal] {{Webarchive|url=https://web.archive.org/web/20210203225757/https://www.fcnl.org/updates/2017-06/25-religious-organizations-express-disappointment-paris-agreement-withdrawal |date=February 3, 2021 }} (June 5, 2017).</ref> business leaders,<ref name="greenwood1">{{Cite news|url=https://thehill.com/blogs/blog-briefing-room/news/335988-ge-ceo-fires-back-at-trump-climate-change-is-real/|title=GE head fires back at Trump: 'Climate change is real'|last=Greenwood|first=Max|date=June 1, 2017|work=The Hill|access-date=June 1, 2017|archive-url=https://web.archive.org/web/20170605000019/http://thehill.com/blogs/blog-briefing-room/news/335988-ge-ceo-fires-back-at-trump-climate-change-is-real|archive-date=June 5, 2017|url-status=live}}</ref><ref name="etherington1">{{cite web|url=https://techcrunch.com/2017/06/01/elon-musk-leaving-trump-advisory-councils-following-paris-agreement-withdrawal/|title=Elon Musk leaving Trump advisory councils following Paris agreement withdrawal|publisher=TechCrunch|last=Etherington|first=Darrell|date=June 2017 |access-date=June 1, 2017|archive-url=https://web.archive.org/web/20170601203311/https://techcrunch.com/2017/06/01/elon-musk-leaving-trump-advisory-councils-following-paris-agreement-withdrawal/|archive-date=June 1, 2017|url-status=live}}</ref> and scientists.<ref name=Tollefson/><ref>Jeff Tollefson& Quirin Schiermeier, [https://www.nature.com/news/how-scientists-reacted-to-the-us-leaving-the-paris-climate-agreement-1.22098 How scientists reacted to the US leaving the Paris climate agreement] {{Webarchive|url=https://web.archive.org/web/20201112042716/https://www.nature.com/news/how-scientists-reacted-to-the-us-leaving-the-paris-climate-agreement-1.22098 |date=November 12, 2020 }}, ''Nature'' (June 2, 2017).</ref><ref name=":12">{{Cite news|url=http://www.freep.com/story/opinion/editorials/2017/06/01/trump-climate-paris/363812001/|title=Editorial: In exiting Paris accords, President Trump squanders time and degrees|work=Detroit Free Press|access-date=June 1, 2017|language=en|archive-url=https://web.archive.org/web/20170601230517/http://www.freep.com/story/opinion/editorials/2017/06/01/trump-climate-paris/363812001/|archive-date=June 1, 2017|url-status=live}}</ref> According to polls released in 2019, a majority of Americans opposed the withdrawal.<ref name=ClementDennis/> Following Trump's announcement, the governors of several U.S. states formed the [[United States Climate Alliance|U.S. Climate Alliance]] to continue to advance the objectives of the Paris Agreement at the state level despite the federal withdrawal. As of July 1, 2019, 24 states, [[American Samoa]], and [[Puerto Rico]] have joined the alliance,<ref>{{cite news|title=Illinois joins states committed to carbon-emission reduction|url=https://www.apnews.com/99480e51dc234369a7d85c4dca1aec95|access-date=28 January 2019|publisher=The Associated Press|date=23 January 2019|archive-url=https://web.archive.org/web/20190129010739/https://www.apnews.com/99480e51dc234369a7d85c4dca1aec95|archive-date=January 29, 2019|url-status=live}}</ref> and similar commitments have also been expressed by other state governors, mayors, and businesses.<ref name=NYT060117/> The withdrawal from the Paris Agreement impacted other countries by reducing its financial aid to the Green Climate fund.<ref name=":5">{{Cite journal|last=Kemp|first=Luke|date=2017-10-31|title=Limiting the climate impact of the Trump administration|journal=Palgrave Communications|language=en|volume=3|issue=1|pages=1–5|article-number=9 |doi=10.1057/s41599-017-0003-6|issn=2055-1045|doi-access=free}}</ref> The termination of the $3 billion U.S. funding ultimately impacted climate change research and decreased society's chance of reaching the Paris Agreement goals, as well as omitted U.S. contributions to the future IPCC reports.<ref name=":6">{{Cite journal|last=Zhang|first=Yong-Xiang|date=2017-12-01|title=The withdrawal of the U.S. from the Paris Agreement and its impact on global climate change governance|journal=Advances in Climate Change Research|language=en|volume=8|issue=4|pages=213–219|doi=10.1016/j.accre.2017.08.005|bibcode=2017ACCR....8..213Z |issn=1674-9278|doi-access=free}}</ref><ref name=":7">{{Cite journal|last=Zhang|first=Hai-Bin|date=2017-12-01|title=U.S. withdrawal from the Paris Agreement: Reasons, impacts, and China's response|journal=Advances in Climate Change Research|language=en|volume=8|issue=4|pages=220–225|doi=10.1016/j.accre.2017.09.002|bibcode=2017ACCR....8..220Z |issn=1674-9278|doi-access=free}}</ref> It also affected the carbon emission space as well as the carbon price.<ref name=":8">{{Cite journal|last=Dai|first=Han-Cheng|date=2017-12-01|title=The impacts of U.S. withdrawal from the Paris Agreement on the carbon emission space and mitigation cost of China, EU, and Japan under the constraints of the global carbon emission space|journal=Advances in Climate Change Research|language=en|volume=8|issue=4|pages=226–234|doi=10.1016/j.accre.2017.09.003|bibcode=2017ACCR....8..226D |issn=1674-9278|doi-access=free}}</ref> The U.S.'s withdrawal also meant that the spot to take over the global climate regime was obtainable for China and the EU.<ref name=":4" /><!-- Only states that have confirmed they would participate, not "showed interest", please. -->

      Following the [[2020 United States presidential election|2020 presidential election]], President-elect [[Joe Biden]] vowed to rejoin the Paris Agreement on his first day in office.<ref name="wapost biden rejoin"/><ref name="guardian biden rejoin"/><ref>{{Cite web |url=https://www.cnn.com/2021/01/16/politics/joe-biden-executive-orders-paris-climate-accord-muslim-ban/index.html |title=Biden to sign executive orders rejoining Paris climate accord and rescinding travel ban on first day |website=[[CNN]] |date=January 16, 2021 |access-date=January 17, 2021 |archive-date=January 17, 2021 |archive-url=https://web.archive.org/web/20210117042259/https://www.cnn.com/2021/01/16/politics/joe-biden-executive-orders-paris-climate-accord-muslim-ban/index.html |url-status=live }}</ref> On January 20, 2021, shortly after [[Inauguration of Joe Biden|his inauguration]], President Biden signed an executive order to rejoin the agreement.<ref>{{Cite web|last1=Davenport|first1=Coral|last2=Friedman|first2=Lisa|date=January 20, 2021|title=Biden Rejoins Paris Climate Agreement|url=https://www.nytimes.com/2021/01/20/climate/biden-paris-agreement-keystone.html|website=The New York Times|access-date=January 20, 2021|archive-date=January 20, 2021|archive-url=https://web.archive.org/web/20210120223643/https://www.nytimes.com/2021/01/20/climate/biden-paris-agreement-keystone.html|url-status=live}}</ref><ref name="Rejoin">{{cite web |url=https://bidenwhitehouse.archives.gov/briefing-room/statements-releases/2021/01/20/paris-climate-agreement/ |title=Paris Climate Agreement |date=January 20, 2021 |website=WH.gov |publisher=The White House |access-date=January 21, 2021 |archive-date=January 21, 2021 |archive-url=https://web.archive.org/web/20210121001024/https://www.whitehouse.gov/briefing-room/statements-releases/2021/01/20/paris-climate-agreement/ |url-status=live }}</ref> The United States formally rejoined the Paris Agreement on February 19, 2021, 107 days after the withdrawal took effect. On January 20, 2025, shortly after [[Second inauguration of Donald Trump|his second inauguration]], President Trump signed [[Putting America First In International Environmental Agreements|an executive order]] to withdraw the United States from the agreement for a second time.<ref>{{Cite web |last1=Keyton |first1=David |last2=Arasu |first2=Sibi |date=2025-01-21 |title=European leaders at Davos vow to stick to Paris climate agreement despite Trump's withdrawal |url=https://www.latimes.com/world-nation/story/2025-01-21/european-leaders-at-davos-vow-to-stick-to-paris-climate-agreement-despite-trumps-withdrawal |url-status=live |archive-url=https://web.archive.org/web/20250124002448/https://www.latimes.com/world-nation/story/2025-01-21/european-leaders-at-davos-vow-to-stick-to-paris-climate-agreement-despite-trumps-withdrawal |archive-date=January 24, 2025 |access-date=2025-01-28 |website=Los Angeles Times |language=en-US}}</ref>

