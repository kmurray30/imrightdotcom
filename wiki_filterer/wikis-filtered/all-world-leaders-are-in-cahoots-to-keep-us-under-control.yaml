      === Non-permanent (1966–present) ===
      The [[African Union]] uses an internal rotation system to distribute seats based on [[Regions of the African Union|its subregions]]:<ref>{{Cite book|last=Endeley|first=Isaac|date=2009|title=Bloc Politics at the United Nations: The African Group|publisher=University Press of America|isbn=978-0761845584}}</ref><ref>{{Cite thesis|last=Endeley|first=Isaac|date=1998|title=Le Groupe africain à l'ONU dans l'après-guerre froide|url=https://www.collectionscanada.gc.ca/obj/s4/f2/dsk3/ftp05/NQ65306.pdf|degree=PhD|publisher=Université de Montréal|access-date=2024-03-30|language=French}}</ref>
      * 1 odd-year seat alternates between Eastern Africa and Southern Africa (only Eastern Africa prior to the creation of the Southern Africa subregion in 1979)
      * 1 even-year seat is allocated to Western Africa
      * 1 even-year seat alternates between Northern Africa (the [[Arab world|Arab nation]] seat) and Central Africa (with one exception at the beginning in 1966)

      Aside from the [[Asia-Pacific Group]] also allocating an Arab nation seat every four years (in even years not divisible by 4), other regional groups do not have their own subregional rotation systems.<ref name="equitable"/><ref name="report2009">{{Cite web|url=https://www.securitycouncilreport.org/research-reports/lookup-c-glkwlemtisg-b-5488243.php|title=Special Research Report No. 1: UN Security Council Elections 2009}}</ref> The Arab nation seat is starred below.

      The Western European and Others Group in part contains three [[caucus]]ing subgroups ([[Benelux]], the [[Nordic countries]], and CANZ{{Efn|Canada, Australia, and New Zealand}}), whose candidates informally coordinate with each other.<ref>{{Cite web|url=https://www.securitycouncilreport.org/research-reports/lookup-c-glkwlemtisg-b-2013021.php|title=Special Research Report No. 4: Security Council Elections 2006}}</ref><ref name="report2009"/> While this has not resulted in a stable rotation system, it effectively guarantees that both seats will never be occupied by a single subgroup at the same time.<ref name="thegreenpapers">[http://www.thegreenpapers.com/ww/UNSecurityCouncil.phtml The United Nations Security Council], The Green Papers Worldwide</ref>

