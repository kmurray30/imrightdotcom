      ===Unusual circumstances===
      In 1961, the [[United Arab Republic]] (then a union of [[Egypt]] and [[Syria]]) was elected to the Security Council. Syria seceded from the union while it was still on the Security Council, but Egypt's official UN name remained the United Arab Republic and it was unaffected.

      In August 1984, [[Republic of Upper Volta|Upper Volta]] changed its name to [[Burkina Faso]] while president of the Security Council. The rest of its term was unaffected and rotated normally to [[Zimbabwe]] in September 1984. Afterward, Burkina Faso was first in English alphabetical order and it became president of the Security Council for a second time that year in October 1984.

      In March 1990, [[South Yemen]] (officially the People's '''D'''emocratic Republic of Yemen under D) served as president of the Security Council. [[Yemeni unification]] with [[Yemen Arab Republic|North Yemen]] took place in May 1990, with both Yemens being treated as successor states under the name Yemen. After the term of the United States rotated out in November 1990, Yemen served as president of the Security Council for a second time that year in December 1990.

      In December 1991, the [[Union of Soviet Socialist Republics]] officially changed its name to the [[Russian Federation]] while president of the Security Council. By coincidence, the alphabetical order was unaffected, the surrounding members being [[Romania]] and the [[United Kingdom]].

      [[Rwanda]] was elected to the Security Council in 1994 and was due to serve its term as president in September 1994; however, its government was overthrown in July 1994 and the replacement government did not appoint a United Nations representative in August 1994. As a result, its term was temporarily skipped and [[Spain]] (which was due to serve in October) served in September instead. Rwanda would serve its term at the end of that alphabetical rotation.<ref>{{cite web | url=https://www.thegreenpapers.com/ww/UNPastPresidencies.phtml | title=The Green Papers Worldwide - Past PRESIDENCIES of the - United Nations SECURITY COUNCIL }}</ref>

