      The '''euro area''',<ref>{{cite web |title=Countries, languages, currencies |url=https://publications.europa.eu/code/en/en-370300.htm |access-date=2 February 2009 |work=Interinstitutional style guide |publisher=the EU Publications Office |archive-date=23 February 2009 |archive-url=https://web.archive.org/web/20090223102832/http://publications.europa.eu/code/en/en-370300.htm |url-status=live }}[http://www.ecb.int/euro/intro/html/map.en.html The euro area] {{webarchive|url=https://web.archive.org/web/20130806204322/http://www.ecb.int/euro/intro/html/map.en.html |date=6 August 2013 }}, [[European Central Bank]]</ref> commonly called the '''eurozone''' ('''EZ'''), is a [[Monetary union|currency union]] of 21&nbsp;[[Member state of the European Union|member states]] of the [[European Union]] (EU) that have adopted the [[euro]] ([[Euro sign|€]]) as their primary [[currency]] and sole [[legal tender]], and have thus fully implemented [[Economic and Monetary Union of the European Union|Economic and Monetary Union]] policies. 

      The 21 eurozone members are:
      [[Austria]], [[Belgium]], [[Bulgaria]], [[Croatia]], [[Cyprus]], [[Estonia]], [[Finland]], [[France]], [[Germany]], [[Greece]], [[Republic of Ireland|Ireland]], [[Italy]], [[Latvia]], [[Lithuania]], [[Luxembourg]], [[Malta]], the [[Netherlands]], [[Portugal]], [[Slovakia]], [[Slovenia]], and [[Spain]].

      The largest economies in the eurozone are [[Germany]], [[France]], and [[Italy]]. A number of non-EU member states, namely [[Andorra–European Union relations|Andorra]], [[Monaco–European Union relations|Monaco]], [[San Marino–European Union relations|San Marino]], and [[Holy See-European Union relations|Vatican City]] have formal agreements with the EU to use the euro as their official currency and issue their own coins.<ref name="agreements2">{{cite web |date=30 September 2004 |title=Agreements on monetary relations (Monaco, San Marino, the Vatican and Andorra) |url=http://europa.eu/legislation_summaries/economic_and_monetary_affairs/institutional_and_economic_framework/l25040_en.htm |access-date=12 September 2006 |publisher=European Communities |archive-date=25 May 2015 |archive-url=https://web.archive.org/web/20150525032924/http://europa.eu/legislation_summaries/economic_and_monetary_affairs/institutional_and_economic_framework/l25040_en.htm |url-status=live }}</ref><ref name="design2">{{cite web |date=19 March 2013 |title=The government announces a contest for the design of the Andorran euros |url=http://www.andorra-euro.com/en/news1.html |url-status=dead |archive-url=https://web.archive.org/web/20130822005234/http://www.andorra-euro.com/en/news1.html |archive-date=22 August 2013 |access-date=26 March 2013 |publisher=Andorra Mint |df=dmy-all}}</ref><ref name="amisdeleuro2">{{cite web |date=1 February 2013 |title=Nouvelles d'Andorre |url=http://www.amisdeleuro.org/news.php?news_id=603&lg=fr |url-status=dead |archive-url=https://web.archive.org/web/20131004224909/http://www.amisdeleuro.org/news.php?news_id=603&lg=fr |archive-date=4 October 2013 |access-date=2 February 2013 |language=fr}}</ref> In addition, [[Kosovo]] and [[Montenegro]] have adopted the euro unilaterally, relying on euros already in circulation rather than minting currencies of their own.<ref name="agreements 22">{{cite web |title=The euro outside the euro area |url=https://ec.europa.eu/info/business-economy-euro/euro-area/euro/use-euro/euro-outside-euro-area_en |access-date=15 February 2021 |publisher=[[Europa (web portal)]] |archive-date=7 May 2021 |archive-url=https://web.archive.org/web/20210507122006/https://ec.europa.eu/info/business-economy-euro/euro-area/euro/use-euro/euro-outside-euro-area_en |url-status=live }}</ref> These six countries, however, have no representation in any eurozone institution.<ref>A [http://www.ecb.int/home/glossary/html/glosse.en.html glossary] ({{webarchive|url=https://web.archive.org/web/20130514162558/http://www.ecb.int/home/glossary/html/glosse.en.html|date=14 May 2013}}) issued by the [[European Central Bank|ECB]] defines "euro area", without mention of Monaco, San Marino, or the Vatican.</ref>

      The [[Eurosystem]] is the [[monetary authority]] of the eurozone, the [[Eurogroup]] is an informal body of [[finance minister]]s that makes [[fiscal policy]] for the currency union, and the [[European System of Central Banks]] is responsible for fiscal and monetary cooperation between eurozone and non-eurozone EU members. The [[European Central Bank]] (ECB) makes monetary policy for the eurozone, sets its base [[interest rate]], and issues euro banknotes and coins. Since the [[2008 financial crisis]], the eurozone has established and used provisions for granting emergency loans to member states in return for enacting economic reforms.<ref>{{Cite web |date=2024-04-30 |title=Financial assistance to EU Member States {{!}} Fact Sheets on the European Union {{!}} European Parliament |url=https://www.europarl.europa.eu/factsheets/en/sheet/91/financial-assistance-to-eu-member-states |access-date=2024-08-30 |website=www.europarl.europa.eu |language=en |archive-date=30 August 2024 |archive-url=https://web.archive.org/web/20240830032659/https://www.europarl.europa.eu/factsheets/en/sheet/91/financial-assistance-to-eu-member-states |url-status=live }}</ref> The eurozone has also enacted some limited [[Fiscal union|fiscal integration]]; for example, in peer review of each other's national budgets. The issue is political and in a state of flux in terms of what further provisions will be agreed for eurozone change.

      The eurozone comprises about half the countries in geographical [[Europe]].<ref>{{cite web | title=European countries don't actually use the Euro! | date=9 April 2025 | url=https://www.aph.com/community/know-before-you-go/european-countries-dont-actually-use-euro/ }}</ref> Within the European Union (EU), six member states have not yet adopted the euro and continue to use their own national currencies: the [[Czech Republic]], [[Denmark]], [[Hungary]], [[Poland]], [[Romania]], and [[Sweden]]. Of these, all except Denmark are legally committed to adopting the euro once they meet the required [[euro convergence criteria|convergence criteria]].<ref>{{Cite web |title=Who can join and when? |url=https://ec.europa.eu/info/business-economy-euro/euro-area/enlargement-euro-area/who-can-join-and-when_en |access-date=2020-12-02 |website=European Commission – European Commission |archive-date=3 January 2021 |archive-url=https://web.archive.org/web/20210103160804/https://ec.europa.eu/info/business-economy-euro/euro-area/enlargement-euro-area/who-can-join-and-when_en |url-status=live }}</ref> To date, no country has left the eurozone, and there are no formal provisions for either voluntary withdrawal or expulsion.<ref>{{cite news |last=Fox |first=Benjamin |date=1 February 2013 |title=Dutch PM: Eurozone needs exit clause |newspaper=EUobserver.com |url=https://euobserver.com/political/118925 |access-date=18 June 2013 |archive-date=23 August 2013 |archive-url=https://web.archive.org/web/20130823025256/http://euobserver.com/political/118925 |url-status=live }}</ref>

      == Territory ==
      === Eurozone ===
      [[File:Launching of the Euro - Press conference - 1998.jpg|thumb|Press conference at the Council of the EU for the launching of the Euro in 1998]]
      In 1998, eleven [[Member state of the European Union|member states of the European Union]] had met the [[euro convergence criteria]], and the eurozone came into existence with the official launch of the euro (alongside national currencies) on 1 January 1999 in those countries: Austria, Belgium, Finland, France, Germany, Ireland, Italy, Luxembourg, the Netherlands, Portugal, and Spain. Greece qualified in 2000 and was admitted on 1 January 2001.{{citation needed|date=February 2025}}

      These twelve founding members introduced physical [[euro banknotes]] and [[euro coins]] on 1 January 2002. After a short transition period, they took out of circulation and rendered invalid their pre-euro national coins and notes.{{citation needed|date=February 2025}}

      Between 2007 and 2026, nine more states have acceded: Bulgaria, Croatia, Cyprus, Estonia, Latvia, Lithuania, Malta, Slovakia, and Slovenia. 

