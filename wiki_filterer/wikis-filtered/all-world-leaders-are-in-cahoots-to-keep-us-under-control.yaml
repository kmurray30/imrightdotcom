      The '''2024 Bilderberg Conference''' was held between May 30–June 2, 2024 in [[Madrid]], Spain at the [[Eurostars Suites]] Mirasierra hotel.<ref name="a284">{{cite web | last=Gilchrist | first=Karen | title=A top secret meeting is kicking off in Madrid with the CEOs of Google DeepMind, Anthropic and Microsoft AI in attendance | website=CNBC | date=2024-05-30 | url=https://www.cnbc.com/2024/05/30/bilderberg-google-deepmind-microsoft-ai-anthropic-among-elite-guests.html | access-date=2024-05-31}}</ref><ref name="z034">{{cite news | last=Wall | first=Martin | title=Donohoe, Varadkar and Coveney to attend Bilderberg meeting in Madrid | newspaper=The Irish Times | date=2024-05-31 | url=https://www.irishtimes.com/politics/2024/05/31/donohoe-varadkar-and-coveney-to-attend-bilderberg-meeting-in-madrid/ | access-date=2024-05-31}}</ref> The 2024 meeting was the [[List of Bilderberg meetings|70th edition]] of the event.<ref name="a284">{{cite web | last=Gilchrist | first=Karen | title=A top secret meeting is kicking off in Madrid with the CEOs of Google DeepMind, Anthropic and Microsoft AI in attendance | website=CNBC | date=2024-05-30 | url=https://www.cnbc.com/2024/05/30/bilderberg-google-deepmind-microsoft-ai-anthropic-among-elite-guests.html | access-date=2024-05-31}}</ref> A [[Bilderberg Group]] press release stated that there were 131 participants from around 25 countries.<ref name="Participants 2024">{{cite web |title=Participants 2024 |url=https://www.bilderbergmeetings.org/meetings/meeting-2024/participants-2024 |archive-url=https://archive.today/20240530132604/https://www.bilderbergmeetings.org/meetings/meeting-2024/participants-2024 |archive-date=2024-05-30 |access-date=2024-05-31 |website=Bilderberg Meetings}}</ref>

      Established in [[1954 Bilderberg Conference|1954]] by [[Prince Bernhard of Lippe-Biesterfeld|Prince Bernhard of the Netherlands]], Bilderberg conferences (or meetings) are an annual private gathering of the European and North American political and business [[elite]]. Events are attended by between 120 and 150 people each year invited by the Bilderberg Group's [[Bilderberg meeting#Organizational structure|steering committee]]; including prominent politicians, [[CEOs]], [[national security|national security experts]], [[Academic staff|academics]] and journalists.<ref name="Gilchrist 2023"/><ref>{{cite web | last=Sommerlad | first=Joe | title=Who are the secretive Bilderberg Group and are they really the New World Order? | website=The Independent | date=June 4, 2019 | url=https://www.independent.co.uk/news/world/europe/bilderberg-group-conspiracy-theories-secret-societies-new-world-order-alex-jones-a8377171.html | access-date=April 26, 2023}}</ref><ref name="s891">{{cite web | last=Kantor | first=Lukas | title=Bilderbergers head EU, NATO, IMF and UN | website=Academia.edu | date=2024-01-01 | url=https://www.academia.edu/120147696 | access-date=2024-05-31}}</ref> Several US presidents have attended the meetings before winning a presidential election. These politicians include Bill Clinton and Barack Obama. 

      Bilderberg conferences operate under the [[Chatham House Rule]], meaning that participants are sworn to secrecy and cannot disclose the identity or affiliation of any particular speaker.<ref name="Gilchrist 2023">{{cite web | last=Gilchrist | first=Karen | title=A secretive annual meeting attended by the world's elite has A.I. top of the agenda | website=CNBC | date=May 18, 2023 | url=https://www.cnbc.com/2023/05/18/bilderberg-openai-microsoft-google-join-ai-talks-at-secretive-meeting.html | access-date=May 22, 2023}}</ref>

