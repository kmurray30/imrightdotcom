      The '''2025 Bilderberg Conference''' was held between June 12–June 15, 2025 at the [[Grand Hôtel (Stockholm)|Grand Hôtel]] in [[Stockholm]], Sweden.<ref name="k923">{{cite web | title=Bilderberg group meets in Sweden amid US-Europe tensions | website=Reuters | date=2025-06-12 | url=https://www.reuters.com/world/bilderberg-group-meets-sweden-amid-us-europe-tensions-2025-06-12/ | access-date=2025-06-14}}</ref><ref name="q295">{{cite web | title= 71ST BILDERBERG MEETING | website=Bilderberg Meetings | url=https://www.bilderbergmeetings.org/meetings/meeting-2025/press-release-2025 | access-date=2025-06-13}}</ref> The 2025 meeting was the [[List of Bilderberg meetings|71st edition]] of the event. A [[Bilderberg Group]] press release listed 121 participants from 23 countries.<ref name="h505">{{cite web |title=Participants 2025 |url=https://www.bilderbergmeetings.org/meetings/meeting-2025/participants-2025 |url-status=live |archive-url=https://archive.today/20250805095842/https://www.bilderbergmeetings.org/meetings/meeting-2025/participants-2025 |archive-date=2025-08-05 |access-date=2025-06-13 |website=Bilderberg Meetings}}</ref>

      Established in [[1954 Bilderberg Conference|1954]] by [[Prince Bernhard of Lippe-Biesterfeld|Prince Bernhard of the Netherlands]], Bilderberg conferences (or meetings) are an annual private gathering of the European and North American political and business [[elite]]. Events are attended by between 120 and 150 people each year invited by the Bilderberg Group's [[Bilderberg meeting#Organizational structure|steering committee]]; including prominent politicians, [[CEOs]], [[national security|national security experts]], [[Academic staff|academics]] and journalists.<ref name="a284">{{cite web | last=Gilchrist | first=Karen | title=A top secret meeting is kicking off in Madrid with the CEOs of Google DeepMind, Anthropic and Microsoft AI in attendance | website=CNBC | date=2024-05-30 | url=https://www.cnbc.com/2024/05/30/bilderberg-google-deepmind-microsoft-ai-anthropic-among-elite-guests.html | access-date=2024-05-31}}</ref><ref>{{cite web | last=Sommerlad | first=Joe | title=Who are the secretive Bilderberg Group and are they really the New World Order? | website=The Independent | date=June 4, 2019 | url=https://www.independent.co.uk/news/world/europe/bilderberg-group-conspiracy-theories-secret-societies-new-world-order-alex-jones-a8377171.html | access-date=April 26, 2023}}</ref><ref name="s891">{{cite web | last=Kantor | first=Lukas | title=Bilderbergers head EU, NATO, IMF and UN | website=Academia.edu | date=2024-01-01 | url=https://www.academia.edu/120147696 | access-date=2024-05-31}}</ref>

      Bilderberg conferences operate under the [[Chatham House Rule]], meaning that participants are sworn to secrecy and cannot disclose the identity or affiliation of any particular speaker.<ref name="a284"/> As a result, media are not invited and delegates rarely speak about what was discussed.<ref name="k923"/>

      Permits for two [[Protest|public demonstrations]] against the meeting were requested, one of which, a march from the [[Norrmalm Square]] to the Grand Hôtel, was planned for June 14.<ref name="n197">{{cite web | title=Polisen rustar inför hemliga elitmötet | website=Expressen | date=2025-06-09 | url=https://www.expressen.se/nyheter/sverige/polisen-rustar-infor-hemliga-motet-i-stockholm/ | language=sv | access-date=2025-06-14}}</ref>

      ==Agenda==
      The key topics for discussion were announced on the Bilderberg website shortly before the meeting.<ref name="q295"/> These topics included:
      {{div col|colwidth=25em}}
      *[[Transatlantic relations|Transatlantic Relationship]]
      *Ukraine
      *[[Economy of the United States|US Economy]]
      *Europe
      *Middle East
      *Authoritarian Axis
      *Defence Innovation and Resilience
      *[[AI]], Deterrence and National Security
      *Proliferation
      *Geopolitics of Energy and Critical Minerals
      *[[Depopulation]] and Migration
      {{div col end}}

      ==Participants==
      A list of 121 participants was published on the Bilderberg website.<ref name="h505"/> This list may not be complete, as a source connected to the Bilderberg group told ''[[The Daily Telegraph]]'' in 2013 that some attendees do not have their names publicized.<ref name="Telegraph">{{cite web | last=Holehouse | first=Matthew | title=Bilderberg Group? No conspiracy, just the most influential group in the world | website=The Telegraph | date=June 6, 2013 | url=https://www.telegraph.co.uk/news/politics/10102168/Bilderberg-Group-No-conspiracy-just-the-most-influential-group-in-the-world.html | access-date=May 22, 2023}}</ref> [[Prime Minister of Sweden]] [[Ulf Kristersson]] attended the meeting despite his name not appearing on the published participant list.<ref name="k923"/><ref name="o106">{{cite web | last=Skelton | first=Charlie | title=China haunts Bilderberg talks as usual suspects plot world domination | website=the Guardian | date=2025-06-15 | url=https://www.theguardian.com/world/2025/jun/15/bilderberg-hroup | access-date=2025-06-15}}</ref>

