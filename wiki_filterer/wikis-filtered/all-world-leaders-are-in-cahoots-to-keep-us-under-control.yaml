      ===European Union and its member states===
      Both the EU and its member states are individually responsible for ratifying the Paris Agreement. A strong preference was reported that the EU and its 28 member states deposit their instruments of ratification at the same time to ensure that neither the EU nor its member states engage themselves to fulfilling obligations that strictly belong to the other,<ref name=eurat>{{cite web|url=https://www.carbonbrief.org/explainer-when-will-european-union-ratify-paris-agreement|title=Explainer: When will the European Union ratify the Paris Agreement?|last=Yeo|first=Sophie|date=23 June 2016|access-date=3 September 2016}}</ref> and there were fears that disagreement over each individual member state's share of the EU-wide reduction target, as well as Britain's [[Brexit|vote to leave the EU]] might delay the Paris pact.<ref name = "Nature">{{cite journal|url=http://www.nature.com/news/paris-climate-deal-to-take-effect-as-eu-ratifies-accord-1.20735|journal=Nature|title=Paris climate deal to take effect as EU ratifies accord|date=4 October 2016|doi=10.1038/nature.2016.20735|accessdate=5 October 2016|last1=Schiermeier|first1=Quirin|s2cid=158043198|url-access=subscription}}</ref> However, the European Parliament approved ratification of the Paris Agreement on 4 October 2016,<ref name="europeancommission">{{cite web|url=http://europa.eu/rapid/press-release_IP-16-3284_en.htm|title=Paris Agreement to enter into force as EU agrees ratification|publisher=European Commission|date=4 October 2016|accessdate=5 October 2016}}</ref> and the EU deposited its instruments of ratification on 5 October 2016, along with several individual EU member states.<ref name="Nature" />

      === Sub-national territories ===
      Some sub-national territories of parties are subject to a ''territorial exclusion'' from their sovereign state that is party to the Agreement. The party can then ''extend the ratification of the Agreement'' to said territory. While the [[United Kingdom|UK]] did not make any declaration upon ratification, it did so in National Communications, last in its 8th NC in 2022.<ref>[https://unfccc.int/sites/default/files/resource/UKs%208th%20National%20Communication%20and%205th%20BR.pdf unfccc.int – UK's 8th National Communication.]</ref> The militarily used [[British Indian Ocean Territory]] is not mentioned as being excluded.

