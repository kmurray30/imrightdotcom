      ==== Sustainable Development Mechanism ====
      [[Cooperative Mechanisms under Article 6 of the Paris Agreement#Article 6.4: Mechanism to promote climate action and support sustainable development|Paragraphs 6.4]]–6.7 establish a mechanism "to contribute to the mitigation of greenhouse gases and support sustainable development".<ref>United Nations/ Framework Convention on Climate Change (2015) Adoption of the Paris Agreement, 21st Conference of the Parties, Paris: United Nations</ref> Though there is no official name for the mechanism as yet, it has been referred to as the Sustainable Development Mechanism or SDM.<ref>''"The Carbon Markets of Tomorrow: Taking Shape Today". Ecosystem Market Place. Retrieved 24 October 2016''</ref><ref name=":12" /> The SDM is considered to be the successor to the [[Clean Development Mechanism]], a mechanism under the Kyoto Protocol by which parties could collaboratively pursue emissions reductions.<ref>{{Cite book|publisher=Carbon Market Watch|last1=Kachi|first1=Aki|last2=Voigt|first2=Juliane|date=May 2017|title=Building blocks for a robust Sustainable Development Mechanism|url=https://carbonmarketwatch.org/wp/wp-content/uploads/2017/05/BUILDING-BLOCKS-FOR-A-ROBUST-SUSTAINABLE-DEVELOPMENT-MECHANISM_WEB-SINGLE_FINAL.pdf|access-date=4 April 2021|page=2|archive-date=25 April 2021|archive-url=https://web.archive.org/web/20210425061559/https://carbonmarketwatch.org/wp/wp-content/uploads/2017/05/BUILDING-BLOCKS-FOR-A-ROBUST-SUSTAINABLE-DEVELOPMENT-MECHANISM_WEB-SINGLE_FINAL.pdf|url-status=live}}</ref>

      The SDM is set to largely resemble the Clean Development Mechanism, with the dual goal of contributing to global GHG emissions reductions and supporting sustainable development.<ref>{{Cite book|url=https://www.ceps.eu/download/publication/?id=9274&pdf=SR%20No%20128%20ACM%20Post%20COP21%20Analysis%20of%20Article%206.pdf|title=Carbon Market Provisions in the Paris Agreement (Article 6)|last=Marcu|first=Andrei|date=January 2016|publisher=Centre for Europe and Policy Studies|access-date=15 July 2021|isbn=978-94-6138-501-7|page=13|archive-date=2 July 2021|archive-url=https://web.archive.org/web/20210702140041/https://www.ceps.eu/download/publication/?id=9274&pdf=SR%20No%20128%20ACM%20Post%20COP21%20Analysis%20of%20Article%206.pdf|url-status=live}}</ref> Though the structure and processes governing the SDM are not yet determined, certain similarities and differences from the Clean Development Mechanisms have become clear. A key difference is that the SDM will be available to all parties as opposed to only [[Annex I|Annex-I parties]], making it much wider in scope.<ref>"Recommendations for Article 6 of the Paris Agreement." ''Carbon Market Watch'', 19 May 2016. Web. 10 October 2016.</ref>

      The Clean Development Mechanism of the Kyoto Protocol was criticized for failing to produce either meaningful emissions reductions or sustainable development benefits in most instances.<ref>Böhm, Steffen. ''Upsetting the offset: the political economy of carbon markets''. London: MayFlyBooks, 2009,</ref> and for its complexity. It is possible that the SDM will see difficulties.<ref name=":6" />

      === Climate change adaptation provisions ===
      [[Climate change adaptation]] received more focus in Paris negotiations than in previous climate treaties. Collective, long-term adaptation goals are included in the agreement, and countries must report on their adaptation actions, making it a parallel component with mitigation.<ref name=":7">{{cite journal |last=Mogelgaard |first=Kathleen |date=23 December 2015 |title=What Does the Paris Agreement Mean for Climate Resilience and Adaptation |url=http://www.wri.org/blog/2015/12/what-does-paris-agreement-mean-climate-resilience-and-adaptation |url-status=live |archive-url=https://web.archive.org/web/20161119060408/http://www.wri.org/blog/2015/12/what-does-paris-agreement-mean-climate-resilience-and-adaptation |archive-date=19 November 2016 |website=World Resources Institute}}</ref> The adaptation goals focus on enhancing [[adaptive capacity]], increasing [[Climate resilience|resilience]], and limiting vulnerability.<ref>{{cite journal |last=Morgan |first=Jennifer |date=12 December 2015 |title=The Paris Agreement: Turning Point for a Climate Solution |url=http://www.wri.org/blog/2015/12/paris-agreement-turning-point-climate-solution |url-status=live |archive-url=https://web.archive.org/web/20161119055526/http://www.wri.org/blog/2015/12/paris-agreement-turning-point-climate-solution |archive-date=19 November 2016 |website=World Resources Institute}}</ref>

      == Implementation ==
      The Paris Agreement is implemented via national policy. It would involve improvements to [[Energy conservation|energy efficiency]] to decrease the [[energy intensity]] of the global economy. Implementation also requires fossil fuel burning to be cut back and the share of [[sustainable energy]] to grow rapidly. Emissions are being reduced rapidly in the electricity sector, but not in the building, transport and heating sector. Some industries are difficult to decarbonize, and for those [[carbon dioxide removal]] may be necessary to achieve [[Net zero|net zero emissions]].<ref name=":14">{{Cite journal |last=Gomez-Echeverri |first=Luis |date=2018 |title=Climate and development: enhancing impact through stronger linkages in the implementation of the Paris Agreement and the Sustainable Development Goals (SDGs) |journal=Philosophical Transactions of the Royal Society A: Mathematical, Physical and Engineering Sciences |volume=376 |issue=2119 |article-number=20160444 |bibcode=2018RSPTA.37660444G |doi=10.1098/rsta.2016.0444 |pmc=5897818 |pmid=29610377 |bibcode-access=free |doi-access=free}}</ref> In a report released in 2022 the IPCC promotes the need for innovation and technological changes in combination with consumption and production behavioral changes to meet Paris Agreement objectives.<ref>{{Cite web |title=Frequently Asked Questions |url=https://www.ipcc.ch/report/ar6/wg3/about/frequently-asked-questions/ |access-date=4 April 2022 |website=IPCC |language=en}}</ref>

      To stay below 1.5{{Nbsp}}°C of global warming, emissions need to be cut by roughly 50% by 2030. This is an aggregate of each country's [[nationally determined contribution]]s. By mid-century, {{CO2}} emissions would need to be cut to zero, and total greenhouse gases would need to be [[net zero]] just after mid-century.<ref name=":17" />

      There are barriers to implementing the agreement. Some countries struggle to attract the finance necessary for investments in decarbonization. Climate finance is fragmented, further complicating investments. Another issue is the lack of capabilities in government and other institutions to implement policy. [[Clean technology]] and [[knowledge transfer|knowledge]] is often not transferred to countries or places that need it.<ref name=":14" /> In December 2020, the former chair of the COP 21, [[Laurent Fabius]], argued that the implementation of the Paris Agreement could be bolstered by the adoption of a [[Global Pact for the Environment]].<ref>{{Cite news |last=Guibert |first=Christelle |date=8 December 2020 |title=Laurent Fabius: 'Le vrai antidote au réchauffement, c'est l'application de l'Accord de Paris ' |trans-title=The true antidote to warming is the application of the Paris Accord |url=https://www.ouest-france.fr/environnement/rechauffement-climatique/laurent-fabius-le-vrai-antidote-au-rechauffement-c-est-l-application-de-l-accord-de-paris-7078200 |url-status=live |archive-url=https://web.archive.org/web/20210207084837/https://www.ouest-france.fr/environnement/rechauffement-climatique/laurent-fabius-le-vrai-antidote-au-rechauffement-c-est-l-application-de-l-accord-de-paris-7078200 |archive-date=7 February 2021 |access-date=10 December 2020 |work=Ouest France |language=fr}}</ref> The latter would define the environmental rights and duties of states, individuals and businesses.<ref>{{Cite web |title=Implementation of General Assembly resolution 73/333, entitled "Follow-up to the report of the ad hoc open-ended working group established pursuant to General Assembly resolution 72/277" |url=https://environmentassembly.unenvironment.org/follow-up-on-ga-res-73-333 |url-status=live |archive-url=https://web.archive.org/web/20210122045508/https://environmentassembly.unenvironment.org/follow-up-on-ga-res-73-333 |archive-date=22 January 2021 |access-date=10 December 2020 |website=United Nations Environmental Assembly}}</ref>

      == Specific topics of concern ==

      === Effectiveness ===
      [[File:Greenhouse gas emission scenarios 01.svg|thumb|upright=1.35|Scenarios of global greenhouse gas emissions. If all countries achieve their current Paris Agreement pledges, average warming by 2100 would still exceed the maximum 2°C target set by the agreement.]]
      The effectiveness of the Paris Agreement to reach its climate goals is under debate, with most experts saying it is insufficient for its more ambitious goal of keeping global temperature rise under 1.5&nbsp;°C.<ref name=":15">{{Cite journal |last1=Raiser |first1=Kilian |last2=Kornek |first2=Ulrike |last3=Flachsland |first3=Christian |last4=Lamb |first4=William F |date=19 August 2020 |title=Is the Paris Agreement effective? A systematic map of the evidence |journal=Environmental Research Letters |volume=15 |issue=8 |page=083006 |bibcode=2020ERL....15h3006R |doi=10.1088/1748-9326/ab865c |issn=1748-9326 |doi-access=free}}</ref><ref>{{Cite web |last=Maizland |first=Lindsay |date=29 April 2021 |title=Global Climate Agreements: Successes and Failures |url=https://www.cfr.org/backgrounder/paris-global-climate-change-agreements |url-status=live |archive-url=https://web.archive.org/web/20210612023125/https://www.cfr.org/backgrounder/paris-global-climate-change-agreements |archive-date=12 June 2021 |access-date=20 June 2021 |website=Council on Foreign Relations |language=en}}</ref> Many of the exact provisions of the Paris Agreement have yet to be straightened out, so that it may be too early to judge effectiveness.<ref name=":15" /> According to the 2020 United Nations Environment Programme ([[UNEP]]), with the current climate commitments of the Paris Agreement, global mean temperatures will likely rise by more than 3&nbsp;°C by the end of the 21st century. Newer [[net zero]] commitments were not included in the [[Nationally determined contribution|Nationally Determined Contributions]], and may bring down temperatures by a further 0.5&nbsp;°C.<ref>{{Cite book |last=United Nations Environment Programme |url=https://www.unep.org/emissions-gap-report-2020 |title=Emissions Gap Report |year=2020 |isbn=978-92-807-3812-4 |location=Nairobi |publisher=United Nations Environment Programme |page=XXI |access-date=9 May 2021 |archive-url=https://web.archive.org/web/20201209220237/https://www.unep.org/emissions-gap-report-2020 |archive-date=9 December 2020 |url-status=live}}</ref>

      With initial pledges by countries inadequate, faster and more expensive future mitigation would be needed to still reach the targets.<ref>{{cite web |title=Paris Agreement, Decision 1/CP.21, Article 17 |url=http://unfccc.int/resource/docs/2015/cop21/eng/10a01.pdf |url-status=live |archive-url=https://web.archive.org/web/20160401044717/http://unfccc.int/resource/docs/2015/cop21/eng/10a01.pdf |archive-date=1 April 2016 |access-date=6 April 2016 |work=UNFCCC secretariat}}</ref> Furthermore, there is a gap between pledges by countries in their NDCs and implementation of these pledges; one third of the emission gap between the lowest-costs and actual reductions in emissions would be closed by implementing existing pledges.<ref name=":16">{{Cite journal |last1=Roelfsema |first1=Mark |last2=van Soest |first2=Heleen L. |last3=Harmsen |first3=Mathijs |last4=van Vuuren |first4=Detlef P. |last5=Bertram |first5=Christoph |last6=den Elzen |first6=Michel |last7=Höhne |first7=Niklas |last8=Iacobuta |first8=Gabriela |last9=Krey |first9=Volker |last10=Kriegler |first10=Elmar |last11=Luderer |first11=Gunnar |date=29 April 2020 |title=Taking stock of national climate policies to evaluate implementation of the Paris Agreement |journal=Nature Communications |language=en |volume=11 |issue=1 |page=2096 |bibcode=2020NatCo..11.2096R |doi=10.1038/s41467-020-15414-6 |issn=2041-1723 |pmc=7190619 |pmid=32350258 |doi-access=free}}{{CC-notice|cc=by4}} Minor grammatical amendments were made.</ref> A pair of studies in ''[[Nature (journal)|Nature]]'' found that as of 2017 none of the major industrialized nations were implementing the policies they had pledged, and none met their pledged emission reduction targets,<ref name="empty_promises">{{cite journal |last1=Victor |first1=David G. |last2=Akimoto |first2=Keigo |last3=Kaya |first3=Yoichi |last4=Yamaguchi |first4=Mitsutsune |last5=Cullenward |first5=Danny |last6=Hepburn |first6=Cameron |date=3 August 2017 |title=Prove Paris was more than paper promises |journal=Nature |volume=548 |issue=7665 |pages=25–27 |bibcode=2017Natur.548...25V |doi=10.1038/548025a |pmid=28770856 |s2cid=4467912 |doi-access=free}}</ref> and even if they had, the sum of all member pledges (as of 2016) would not keep global temperature rise "well below 2°C".<ref>{{cite journal |last1=Rogelj |first1=Joeri |author1-link=Joeri Rogelj |last2=den Elzen |first2=Michel |last3=Höhne |first3=Niklas |author-link3=Niklas Höhne |last4=Fransen |first4=Taryn |last5=Fekete |first5=Hanna |last6=Winkler |first6=Harald |last7=Schaeffer |first7=Roberto |last8=Sha |first8=Fu |last9=Riahi |first9=Keywan |last10=Meinshausen |first10=Malte |date=30 June 2016 |title=Paris Agreement climate proposals need a boost to keep warming well below 2°C |url=http://pure.iiasa.ac.at/id/eprint/13307/1/nature18307_proof1.pdf |url-status=live |journal=Nature |volume=534 |issue=7609 |pages=631–639 |bibcode=2016Natur.534..631R |doi=10.1038/nature18307 |pmid=27357792 |s2cid=205249514 |archive-url=https://web.archive.org/web/20190819072349/http://pure.iiasa.ac.at/id/eprint/13307/1/nature18307_proof1.pdf |archive-date=19 August 2019 |access-date=9 December 2019}}</ref><ref>{{cite news |last=Mooney |first=Chris |author-link=Chris Mooney (journalist) |date=29 June 2016 |title=The world has the right climate goals – but the wrong ambition levels to achieve them |url=https://www.washingtonpost.com/news/energy-environment/wp/2016/06/29/a-sweeping-new-analysis-shows-why-our-planetary-carbon-math-is-still-falling-short/ |url-status=live |archive-url=https://web.archive.org/web/20160629211231/https://www.washingtonpost.com/news/energy-environment/wp/2016/06/29/a-sweeping-new-analysis-shows-why-our-planetary-carbon-math-is-still-falling-short/ |archive-date=29 June 2016 |access-date=29 June 2016 |newspaper=[[The Washington Post]]}}</ref>

      In 2021, a study using a [[Stochastic simulation|probabilistic]] model concluded that the rates of emissions reductions would have to increase by 80% beyond [[#Nationally determined contributions|NDCs]] to likely meet the 2&nbsp;°C upper target of the Paris Agreement, that the probabilities of major emitters meeting their NDCs without such an increase is very low. It estimated that with current trends the probability of staying below 2&nbsp;°C of warming is 5–26% if NDCs were met and continued post-2030 by all signatories.<ref name="10.1038/s43247-021-00097-8" />

      {{As of|2020}}, there is little scientific literature on the topics of the effectiveness of the Paris Agreement on [[capacity building]] and adaptation, even though they feature prominently in the Paris Agreement. The literature available is mostly mixed in its conclusions about loss and damage, and adaptation.<ref name=":15" />

      According to the stocktake report, the agreement has a significant effect: while in 2010 the expected temperature rise by 2100 was 3.7–4.8&nbsp;°C, at [[2022 United Nations Climate Change Conference|COP 27]] it was 2.4–2.6&nbsp;°C and if all countries will fulfill their long-term pledges even 1.7–2.1&nbsp;°C. Despite it, the world is still very far from reaching the aim of the agreement: limiting temperature rise to 1.5 degrees. For doing this, emissions must peak by 2025.<ref name="Ella">{{cite news |last1=Nilsen |first1=Ella |date=8 September 2023 |title=World isn't moving fast enough to cut pollution and keep warming below 2 degrees Celsius, UN scorecard says |url=https://edition.cnn.com/2023/09/08/us/un-scorecard-climate-cop28/index.html |access-date=12 September 2023 |agency=CNN}}</ref><ref name="stocktake">{{cite web |title=Technical dialogue of the first global stocktake Synthesis report by the co-facilitators on the technical dialogue |url=https://unfccc.int/sites/default/files/resource/sb2023_09_adv.pdf |access-date=12 September 2023 |website=United Nations}}</ref> Recent work{{snd}}on the basis of the first single calendar year in 2024 with an average temperature above 1.5 degrees Celsius{{snd}}indicates that most probably Earth has already entered the 20-year period that will reach an average warming of 1.5 degrees Celsius.<ref name="paper">{{cite journal |last1=Bevacqua |first1=Emanuele |last2=Carl-Friedrich|first2=Schleussner|last3=Zscheischler|first3=Jakob|title=A year above 1.5 °C signals that Earth is most probably within the 20-year period that will reach the Paris Agreement limit |journal=Nature Climate Change |date=Feb 2025 |volume=15 |issue=3 |pages=262–265 |doi=10.1038/s41558-025-02246-9 |doi-access=free |bibcode=2025NatCC..15..262B }}</ref> Furthermore, it has been suggested that the global mean temperature may have already passed the 1.5 degrees Celsius level in 2024.<ref name="paper2">{{cite journal |last1=Cannon |first1=Alex |title=Twelve months at 1.5 °C signals earlier than expected breach of Paris Agreement threshold |journal=Nature Climate Change |date=Feb 2025 |volume=15 |issue=3 |pages=266–269 |doi=10.1038/s41558-025-02247-8 |bibcode=2025NatCC..15..266C |doi-access=free }}</ref>

      The Paris Agreement also seemed to have influenced the focus of the following IPCC reports. Before the Paris Agreement was settled, the IPCC assessment reports focused roughly in equal proportions on temperatures above and below 2&nbsp;°C. However, in the 6th assessment report, after the Paris Engagement was reached, slightly less than 20% of the temperature mentions are above 2&nbsp;°C and almost 50% focus on 1.5&nbsp;°C alone.<ref>{{cite journal |last1=Jehn |first1=Florian U. |last2=Kemp |first2=Luke |last3=Ilin |first3=Ekaterina |last4=Funk |first4=Christoph |last5=Wang |first5=Jason R. |last6=Breuer |first6=Lutz |title=Focus of the IPCC Assessment Reports Has Shifted to Lower Temperatures |journal=Earth's Future |date=May 2022 |volume=10 |issue=5 |article-number=e2022EF002876 |doi=10.1029/2022EF002876|bibcode=2022EaFut..1002876J |doi-access=free }}</ref>

      === Fulfillment of requirements ===
      [[File:Total CO2 by Region.svg|thumb|upright=1.35|Since 2000, rising {{CO2}} emissions in China and the rest of the world have surpassed the output of the United States and Europe.]]
      [[File:Per Capita CO2 by Region.svg|thumb|upright=1.35|Per person, the United States generates {{CO2}} at a far faster rate than other primary regions.]]
      In September 2021, the Climate Action Tracker estimated that, with current policies, global emissions will double above the 2030 target level. The gap is 20–23 Gt CO2e. Countries such as Iran, Russia, Saudi Arabia, Singapore, and Thailand have been criticised of not doing enough to meet the requirements of the agreement, and are on track to achieve a 4&nbsp;°C warming of the planet if current policies are implemented more widely. Of the world's countries, only the Gambia's emissions are at the level required by the Paris Agreement. Models predicted that if the necessary measures were not implemented by autumn 2021, the global average temperature would rise by 2.9&nbsp;°C. With the implementation of the Paris Agreement pledges, the average temperature would rise by 2.4&nbsp;°C, and with every zero emission target reached, the average temperature would rise by 2.0&nbsp;°C.<ref>{{Cite web |title=Climate target updates slow as science ramps up need for action |url=https://climateactiontracker.org/documents/871/CAT_2021-09_Briefing_GlobalUpdate.pdf |website=Climate Action Tracker Global update}}</ref>

      The ''Production Gap 2021'' report states that world governments still plan to produce 110% more [[fossil fuels]] in 2030 (including 240% more coal, 57% more oil and 71% more gas) than the 1.5 degree limit.<ref>{{Cite web |title=2021 Report |url=https://productiongap.org/2021report/ |access-date=4 July 2023 |website=Production Gap |language=en-US}}</ref>

      In September 2023 the first global stocktake report about the implementation of the agreement was released. According to the report contrarily to expectations, the agreement has a significant effect: while in 2010 the expected temperature rise by 2100 was 3.7–4.8&nbsp;°C, at [[2022 United Nations Climate Change Conference|COP 27]] it was 2.4–2.6&nbsp;°C and if all countries will fulfill their long-term pledges 1.7–2.1&nbsp;°C. However, the world remains very far from limiting warming to 1.5 degrees. To meet this benchmark, global emissions must peak by 2025, and although emissions have peaked in some countries, global emissions have not.<ref name="Ella" /><ref name="stocktake" />

      === Ensuring finance ===
      {{Further|Climate finance|Green Climate Fund}}
      [[File:GCF Signed Pledges 2018.svg|thumb|alt=Map showing that the US, various European countries and Japan contributed most the Green Climate Fund|Pledges to the Green Climate Fund in 2018. The numbers represent the signed pledges per year.|upright=1.4]]
      Developed countries reaffirmed the commitment to mobilize $100&nbsp;billion a year in [[climate finance]] by 2020, and agreed to continue mobilising finance at this level until 2025.<ref>{{cite news |last=Thwaites |first=Joe |date=18 December 2015 |title=What Does the Paris Agreement do for Finance? |publisher=WRI |url=http://www.wri.org/blog/2015/12/what-does-paris-agreement-do-finance |url-status=live |access-date=10 April 2017 |archive-url=https://web.archive.org/web/20170410215553/http://www.wri.org/blog/2015/12/what-does-paris-agreement-do-finance |archive-date=10 April 2017}}</ref> The money is for supporting mitigation and adaptation in developing countries.<ref name="auto1">{{cite web |author=<!--Staff writer(s); no by-line.--> |date=13 December 2015 |title=COP21 climate change summit reaches deal in Paris |url=https://www.bbc.com/news/science-environment-35084374 |url-status=live |archive-url=https://web.archive.org/web/20151213160112/http://www.bbc.com/news/science-environment-35084374 |archive-date=13 December 2015 |access-date=14 December 2015 |website=BBC News}}</ref> It includes finance for the [[Green Climate Fund]], which is a part of the UNFCCC, but also for a variety of other public and private pledges. The Paris Agreement states that a new commitment of at least $100&nbsp;billion per year has to be agreed before 2025.<ref>{{Cite journal |last1=Roberts |first1=J. Timmons |last2=Weikmans |first2=Romain |last3=Robinson |first3=Stacy-ann |last4=Ciplet |first4=David |last5=Khan |first5=Mizan |last6=Falzon |first6=Danielle |date=March 2021 |title=Rebooting a failed promise of climate finance |journal=Nature Climate Change |language=en |volume=11 |issue=3 |pages=180–182 |bibcode=2021NatCC..11..180R |doi=10.1038/s41558-021-00990-2 |issn=1758-6798 |doi-access=free|hdl=2013/ULB-DIPOT:oai:dipot.ulb.ac.be:2013/319545 |hdl-access=free }}</ref>

      Though both mitigation and adaptation require increased climate financing, adaptation has typically received lower levels of support and has mobilized less action from the private sector.<ref name=":7" /> A report by the OECD found that 16% of global climate finance was directed toward climate adaptation in 2013–2014, compared to 77% for mitigation.<ref>{{Cite web |last=OECD |date=2015 |title=Climate Finance in 2013–14 and the USD 100 billion goal |url=http://www.oecd.org/env/cc/Climate-Finance-in-2013-14-and-the-USD-billion-goal.pdf |archive-url=https://web.archive.org/web/20160530220000/http://www.oecd.org/env/cc/Climate-Finance-in-2013-14-and-the-USD-billion-goal.pdf |archive-date=30 May 2016 |access-date=10 April 2017 |page=20}}</ref> The Paris Agreement called for a balance of climate finance between adaptation and mitigation, and specifically increasing adaptation support for parties most vulnerable to the effects of climate change, including [[Least developed countries]] and [[Small Island Developing States]]. The agreement also reminds parties of the importance of public grants, because adaptation measures receive less investment from the public sector.<ref name=":7" />

      In 2015, twenty multilateral development banks (MDBs) and members of the International Development Finance Club introduced five principles to maintain widespread climate action in their investments: commitment to climate strategies, managing climate risks, promoting climate smart objectives, improving climate performance and accounting for their own actions. As of January 2020, the number of members abiding by these principles grew to 44.<ref>{{Cite web |title=Climate Change 2022: Mitigation of Climate Change |url=https://www.ipcc.ch/report/ar6/wg3/ |access-date=6 April 2022 |website=IPCC |language=en}}</ref>

      Some specific outcomes of the elevated attention to adaptation financing in Paris include the [[G7 countries]]' announcement to provide US$420&nbsp;million for [[climate risk insurance]], and the launching of a Climate Risk and Early Warning Systems (CREWS) Initiative.<ref>{{cite web |title=Roadmap to US$100 Billion |url=http://dfat.gov.au/international-relations/themes/climate-change/Documents/climate-finance-roadmap-to-us100-billion.pdf |website=Australian Government Department of Foreign Affairs and Trade |archive-url=https://web.archive.org/web/20161119120116/http://dfat.gov.au/international-relations/themes/climate-change/Documents/climate-finance-roadmap-to-us100-billion.pdf |archive-date=19 November 2016 |publisher=OECD}}</ref> The largest donors to multilateral climate funds, which includes the Green Climate Fund, are the United States, the United Kingdom, Japan, Germany, France and Sweden.<ref>{{Cite web |last1=Timperley |first1=Jocelyn |last2=Pearce |first2=Rosamund |date=6 November 2017 |title=Mapped: Where multilateral climate funds spend their money |url=https://www.carbonbrief.org/mapped-where-multilateral-climate-funds-spend-their-money |url-status=live |archive-url=https://web.archive.org/web/20210507154928/https://www.carbonbrief.org/mapped-where-multilateral-climate-funds-spend-their-money |archive-date=7 May 2021 |access-date=8 May 2021 |website=Carbon Brief |language=en}}</ref>

      === Loss and damage ===
      {{Main|Loss and damage (climate change)}}
      It is not possible to adapt to all effects of climate change: even in the case of optimal adaptation, severe damage may still occur. The Paris Agreement recognizes [[Loss and damage (climate change)|loss and damage]] of this kind.<ref name="WorldResourcesInstitute">{{cite web|url=http://www.wri.org/blog/2015/12/when-adaptation-not-enough-paris-agreement-recognizes-%E2%80%9Closs-and-damage%E2%80%9D|title=When Adaptation is Not Enough|last=Mogelgaard|first=Kathleen|date=24 December 2015|website=World Resources Institute|archive-url=https://web.archive.org/web/20161008083845/http://www.wri.org/blog/2015/12/when-adaptation-not-enough-paris-agreement-recognizes-%E2%80%9Closs-and-damage%E2%80%9D|archive-date=8 October 2016|url-status=live}}</ref> Loss and damage can stem from [[Extreme weather|extreme weather events]], or from slow-onset events such as the loss of land to [[sea level rise]] for low-lying islands.<ref name=":2" /> Previous climate agreements classified loss and damage as a subset of adaptation.<ref name="WorldResourcesInstitute" />

      The push to address loss and damage as a distinct issue in the Paris Agreement came from the [[Alliance of Small Island States]] and the Least Developed Countries, whose economies and livelihoods are most vulnerable to the negative effects of climate change.<ref name=":2" /> The [[Warsaw Mechanism]], established two years earlier during COP19 and set to expire in 2016, categorizes loss and damage as a subset of adaptation, which was unpopular with many countries. It is recognized as a separate pillar of the Paris Agreement.<ref>{{Cite web|last=Pidcock|first=Roz|date=9 May 2017|title=Explainer: Dealing with the 'loss and damage' caused by climate change|url=https://www.carbonbrief.org/explainer-dealing-with-the-loss-and-damage-caused-by-climate-change|access-date=8 May 2021|website=Carbon Brief|language=en|archive-date=8 May 2021|archive-url=https://web.archive.org/web/20210508140245/https://www.carbonbrief.org/explainer-dealing-with-the-loss-and-damage-caused-by-climate-change|url-status=live}}</ref> The United States argued against this, possibly worried that classifying the issue as separate from adaptation would create yet another climate finance provision.<ref name=":2" /> In the end, the agreement calls for "averting, minimizing, and addressing loss and damage"<ref name=":0" /> but specifies that it cannot be used as the basis for liability. The agreement adopts the Warsaw Mechanism, an institution that will attempt to address questions about how to classify, address, and share responsibility for loss.<ref name="WorldResourcesInstitute" />

      === Transparency ===
      {{Main|Enhanced Transparency Framework}}
      The parties are legally bound to have their progress tracked by technical expert review to assess achievement toward the NDC and to determine ways to strengthen ambition.<ref name=":9">{{cite web|url=http://www.climatefocus.com/sites/default/files/20151228%20COP%2021%20briefing%20FIN.pdf|title=The Paris Agreement Summary|date=28 December 2015|website=Climate Focus|archive-url=https://web.archive.org/web/20160509090559/http://www.climatefocus.com/sites/default/files/20151228%20COP%2021%20briefing%20FIN.pdf|archive-date=9 May 2016|url-status=live}}</ref> Article 13 of the Paris Agreement articulates an "enhanced transparency framework for action and support" that establishes harmonized [[Monitoring, reporting and verification|monitoring, reporting, and verification]] (MRV) requirements. Both developed and developing nations must report every two years on their mitigation efforts, and all parties will be subject to technical and peer review.<ref name=":9" />

      While the enhanced transparency framework is universal, the framework is meant to provide "built-in flexibility" to distinguish between developed and developing countries' capacities. The Paris Agreement has provisions for an enhanced framework for capacity building, recognizes the varying circumstances of countries, and notes that the technical expert review for each country consider that country's specific capacity for reporting.<ref name=":10">{{cite web|last=Van Asselt|first=Harro|date=2016|title=Putting the 'enhanced transparency framework' into action: Priorities for a key pillar of the Paris Agreement|url=https://mediamanager.sei.org/documents/Publications/Climate/SEI-PB-2016-Transparency-under-Paris-Agreement.pdf|url-status=live|archive-url=https://web.archive.org/web/20161119062033/https://www.sei-international.org/mediamanager/documents/Publications/Climate/SEI-PB-2016-Transparency-under-Paris-Agreement.pdf|archive-date=19 November 2016|website=Stockholm Environment Institute}}</ref> Parties to the agreement send their first Biennial Transparency Report (BTR), and [[greenhouse gas inventory]] figures to the UNFCCC by 2024 and every two years after that. Developed countries submit their first BTR in 2022 and inventories annually from that year.<ref>{{Cite web|title=Reporting and Review under the Paris Agreement|url=https://unfccc.int/process-and-meetings/transparency-and-reporting/reporting-and-review-under-the-paris-agreement|url-status=live|archive-url=https://web.archive.org/web/20201101022313/https://unfccc.int/process-and-meetings/transparency-and-reporting/reporting-and-review-under-the-paris-agreement|archive-date=1 November 2020|access-date=20 April 2020|website=unfccc.int}}</ref> The agreement also develops a Capacity-Building Initiative for Transparency to assist developing countries in building the necessary [[institution]]s and processes for compliance.<ref name=":10" />

      Flexibility can be incorporated into the enhanced transparency framework via the scope, level of detail, or frequency of reporting, tiered based on a country's capacity. The requirement for in-country technical reviews could be lifted for some less developed or small island developing countries. Ways to assess capacity include financial and human resources in a country necessary for NDC review.<ref name=":10" />

      === Litigation ===
      {{main|Climate change litigation}}
      The Paris Agreement has become a focal point of climate change litigation. One of the first major cases in this area was ''[[State of the Netherlands v. Urgenda Foundation]]'', which was raised against the Netherlands' government after it had reduced its planned emissions reductions goal for 2030 prior to the Paris Agreement. After an initial ruling against the government in 2015 that required it to maintain its planned reduction, the decision was upheld on appeals through the [[Supreme Court of the Netherlands]] in 2019, ruling that the Dutch government failed to uphold human rights under Dutch law and the [[European Convention on Human Rights]] by lowering its emission targets.<ref name=":18">{{Cite web |last=Corder |first=Mike |date=20 December 2019 |title=Activists cheer victory in landmark Dutch climate case |url=https://apnews.com/article/europe-the-hague-courts-supreme-courts-international-news-5534fe18ac5352ba43c74c9a64d6a20a |url-status=live |archive-url=https://web.archive.org/web/20210709190944/https://apnews.com/article/europe-the-hague-courts-supreme-courts-international-news-5534fe18ac5352ba43c74c9a64d6a20a |archive-date=9 July 2021 |access-date=2 July 2021 |website=AP news |language=en}}</ref> The 2{{nbsp}}°C temperature target of the Paris Agreement provided part of the judgement's legal basis.<ref>{{Cite journal |last1=Backes |first1=C. W. (Chris) |last2=Veen |first2=G. A. (Gerrit) van der |date=2020 |title=Urgenda: the Final Judgment of the Dutch Supreme Court |journal=Journal for European Environmental & Planning Law |language=en |volume=17 |issue=3 |pages=307–321 |doi=10.1163/18760104-01703004 |issn=1876-0104 |doi-access=free}}</ref> The agreement, whose goals are enshrined in German law, also formed part of the argumentation in ''Neubauer et al. v. Germany'', where the court ordered Germany to reconsider its climate targets.<ref>{{Cite report |url=https://www.lse.ac.uk/granthaminstitute/wp-content/uploads/2021/07/Global-trends-in-climate-change-litigation_2021-snapshot.pdf |title=Global trends in climate change litigation: 2021 snapshot |last1=Setzer |first1=Joana |last2=Higham |first2=Catherine |date=July 2021 |publisher=Grantham Research Institute on Climate Change and the Environment and Centre for Climate Change, Economics and Policy, London School of Economics and Political Science |page=24 |access-date=24 July 2021 |archive-url=https://web.archive.org/web/20210707141424/https://www.lse.ac.uk/granthaminstitute/wp-content/uploads/2021/07/Global-trends-in-climate-change-litigation_2021-snapshot.pdf |archive-date=7 July 2021 |url-status=live}}</ref>

      In May 2021, the district court of [[The Hague]] ruled against oil company [[Royal Dutch Shell]] in ''[[Milieudefensie et al v Royal Dutch Shell]]''. The court ruled that it must cut its global emissions by 45% from 2019 levels by 2030, as it was in violation of human rights. This lawsuit was considered the first major application of the Paris Agreement towards a corporation.<ref name=":19">{{cite web |last=Boffey |first=Daniel |date=26 May 2021 |title=Court orders Royal Dutch Shell to cut carbon emissions by 45% by 2030 |url=https://www.theguardian.com/business/2021/may/26/court-orders-royal-dutch-shell-to-cut-carbon-emissions-by-45-by-2030 |url-status=live |archive-url=https://web.archive.org/web/20210526142843/https://www.theguardian.com/business/2021/may/26/court-orders-royal-dutch-shell-to-cut-carbon-emissions-by-45-by-2030 |archive-date=26 May 2021 |access-date=26 May 2021 |work=[[The Guardian]]}}</ref>

      === Human rights ===
      {{Further|Human rights}}

      On 4 July 2022, the [[Supreme Federal Court]] of [[Brazil]] recognized the Paris Agreement as a "[[Human rights treaty bodies|human rights treaty]]". According to the ruling of the court in Brazil it should "supersede national law".<ref name="stf-jus-jul22">{{cite web |title=Arguição de descumprimento de preceito fundamental |url=https://portal.stf.jus.br/processos/detalhe.asp?incidente=5951856 |archive-url=https://web.archive.org/web/20220724145637/https://portal.stf.jus.br/processos/detalhe.asp?incidente=5951856 |archive-date=24 July 2022 |access-date=24 July 2022 |website=[[Supremo Tribunal Federal]] |language=pt}}</ref><ref name="yale-bra-jul22">{{cite web |last1=Ciuffo |first1=Leandro Neumann |date=7 July 2022 |title=Brazil's High Court First to Declare Paris Agreement a Human Rights Treaty |url=https://e360.yale.edu/digest/paris-agreement-human-rights-treaty-brazil |archive-url=https://web.archive.org/web/20220724144613/https://e360.yale.edu/digest/paris-agreement-human-rights-treaty-brazil |archive-date=24 July 2022 |access-date=21 July 2022 |website=Yale Program on Climate Change Communication}}</ref> In the same month the [[United Nations Human Rights Council]] in a resolution "(A/HRC/50/L.10/Rev.1) on Human rights and climate change, adopted without a vote" called to ratify and implement the agreement and emphasized the link between stopping climate change and the right to food.<ref>{{cite web |title=Human Rights Council Adopts Nine Resolutions – Extends Mandates on Eritrea, Internally Displaced Persons, and Violence Against Women and Girls |url=https://www.ohchr.org/en/press-releases/2022/07/human-rights-council-adopts-nine-resolutions-extends-mandates-eritrea |access-date=21 July 2022 |website=The Office of the High Commissioner for Human Rights |publisher=United Nations}}</ref>

      The [[Office of the United Nations High Commissioner for Human Rights]] officially recognized that "Climate change threatens the effective enjoyment of a range of human rights including those to life, water and sanitation, food, health, housing, self-determination, culture and development."<ref>{{cite web |title=OHCHR and climate change |url=https://www.ohchr.org/en/climate-change |access-date=21 July 2022 |website=United Nations |publisher=The Office of the High Commissioner for Human Rights}}</ref>

      == Reception ==
      The agreement was lauded by French president [[François Hollande]], UN secretary-general [[Ban Ki-moon]] and [[Christiana Figueres]], Executive Secretary of the UNFCCC.<ref name="auto2">{{cite web|author=<!--Staff writer(s); no by-line.-->|date=12 December 2015|title=Historic Paris Agreement on Climate Change – 195 Nations Set Path to Keep Temperature Rise Well Below 2 Degrees Celsius|url=http://newsroom.unfccc.int/unfccc-newsroom/finale-cop21/|archive-url=https://web.archive.org/web/20160117141004/http://newsroom.unfccc.int/unfccc-newsroom/finale-cop21/|archive-date=17 January 2016|access-date=14 December 2015|website=UN Climate Change Newsroom|publisher=United Nations Framework Convention on Climate Change}}</ref> The president of Brazil, [[Dilma Rousseff]], called the agreement "balanced and long-lasting",<ref>{{Cite web|last=Hulac|first=Benjamin|date=14 December 2015|title=Pollution from Planes and Ships Left Out of Paris Agreement|url=https://www.scientificamerican.com/article/pollution-from-planes-and-ships-left-out-of-paris-agreement/|access-date=9 May 2021|website=Scientific American|language=en|archive-date=9 May 2021|archive-url=https://web.archive.org/web/20210509142222/https://www.scientificamerican.com/article/pollution-from-planes-and-ships-left-out-of-paris-agreement/|url-status=live}}</ref> and India's prime minister [[Narendra Modi]] commended the agreement's [[climate justice]].<ref>{{cite news|last1=Goswami|first1=Urmi|date=14 December 2015|title=Paris COP21: Recognition of "common but differentiated responsibilities" key achievement of India|newspaper=The Economic Times|url=https://economictimes.indiatimes.com/news/politics-and-nation/paris-cop21-recognition-of-common-butdifferentiated-responsibilities-key-achievement-of-india-/articleshow/50173196.cms|access-date=21 July 2021|archive-date=15 July 2021|archive-url=https://web.archive.org/web/20210715064324/https://economictimes.indiatimes.com/news/politics-and-nation/paris-cop21-recognition-of-common-butdifferentiated-responsibilities-key-achievement-of-india-/articleshow/50173196.cms|url-status=live}}</ref><ref>{{cite news|last1=Taylor|first1=Matthew|date=13 December 2015|title=Paris climate deal provides 'best chance we have' of saving the planet|work=The Guardian|url=https://www.theguardian.com/environment/2015/dec/13/climate-deal-provides-best-chance-saving-the-planet|access-date=21 July 2021|archive-date=13 July 2021|archive-url=https://web.archive.org/web/20210713123652/https://www.theguardian.com/environment/2015/dec/13/climate-deal-provides-best-chance-saving-the-planet|url-status=live}}</ref> When the agreement achieved the required signatures in October 2016, US president [[Barack Obama]] said that "Even if we meet every target, we will only get to part of where we need to go."<ref name="obamaclimate" /> He also stated "this agreement will help delay or avoid some of the worst consequences of climate change [and] will help other nations ratchet down their emissions over time."<ref name="obamaclimate">{{cite web|title=A sweeping global climate change agreement was ratified on Wednesday|url=https://www.nbcnews.com/news/world/obama-paris-climate-accord-best-possible-shot-save-planet-n660446|url-status=live|archive-url=https://web.archive.org/web/20161005212924/https://www.nbcnews.com/news/world/obama-paris-climate-accord-best-possible-shot-save-planet-n660446|archive-date=5 October 2016|access-date=5 October 2016|work=NBC News|date=5 October 2016 }}</ref>

      Some [[environmentalist]]s and analysts reacted cautiously, acknowledging the "spirit of Paris" in bringing together countries, but expressing less optimism about the pace of climate mitigation and how much the agreement could do for poorer countries.<ref>{{Cite web |last=Harvey |first=Fiona |author-link=Fiona Harvey |date=14 December 2015 |title=Paris climate change deal too weak to help poor, critics warn |url=http://www.theguardian.com/environment/2015/dec/14/paris-climate-change-deal-cop21-oxfam-actionaid |url-status=live |archive-url=https://web.archive.org/web/20210630105950/https://www.theguardian.com/environment/2015/dec/14/paris-climate-change-deal-cop21-oxfam-actionaid |archive-date=30 June 2021 |access-date=26 June 2021 |website=The Guardian |language=en}}</ref> [[James Hansen]], a former NASA scientist and leading climate change expert, voiced anger that most of the agreement consists of "promises" or aims and not firm commitments and called the Paris talks a fraud with "no action, just promises".<ref name="hansen_fraud">{{cite news|last=Milman|first=Oliver|date=12 December 2015|title=James Hansen, father of climate change awareness, calls Paris talks 'a fraud'|newspaper=The Guardian|location=London, England|url=https://www.theguardian.com/environment/2015/dec/12/james-hansen-climate-change-paris-talks-fraud|url-status=live|access-date=14 December 2015|archive-url=https://web.archive.org/web/20151214001649/http://www.theguardian.com/environment/2015/dec/12/james-hansen-climate-change-paris-talks-fraud|archive-date=14 December 2015}}</ref> Criticism of the agreement from those arguing against climate action has been diffuse, which may be due to the weakness of the agreement. This type of criticism typically focuses on national sovereignty and ineffectiveness of international action.

      == Precise methodology and status of goal ==
      [[File:IPCC 30y-centered-avg.png|thumb|Calculation of the 30-year average of the global temperature anomaly (referenced to 1850-1900).  Linear extrapolation from the past 20 years fills the averaging window for the most recent dates. (Data from the MetOffice Climate Dashboard)]]

      The Paris Agreement required countries to pursue efforts to "limit the temperature increase to 1.5°C above pre-industrial levels," but did not give a precise definition for the temperature increase.  In a 2018 special report titled "Global Warming of 1.5°C," the [[IPCC]] provided that standard:<ref name="ipcc_sr_2018">{{Cite web
       |title=FAQ Chapter 1 — Global Warming of 1.5 °C
       |url=https://www.ipcc.ch/sr15/faq/faq-chapter-1/
       |website=IPCC Special Report: Global Warming of 1.5 °C (SR15)
       |publisher=Intergovernmental Panel on Climate Change (IPCC)
       |access-date=4 October 2025
       |language=en
      }}</ref> 
      {{Blockquote
      |text=This IPCC Special Report on Global Warming of 1.5°C uses the reference period 1850–1900 to represent pre-industrial temperature ... warming is defined as the increase in the 30-year global average of combined air temperature over land and water temperature at the ocean surface.
      }} 
      This is implemented as a 30-year centered average of the annual global temperature anomaly, referenced to the 1850-1900 average temperature.  For the most recent 15 years, the averaging window is filled using a linear extrapolation from recent years (although the number of "recent" years was not specified by the IPCC).  Using this methodology, the 2017 30-year average was found to be about 1.03&nbsp;°C, and the predicted date of crossing the 1.5&nbsp;°C level was the year 2040.

      As of 2024, the same methodology predicts the 1.5&nbsp;°C level will occur sometime in 2029.  This itself could be optimistically distant, as the recent decade of warming since 2017 shows that the original IPCC average for that year was underestimated by about 0.1&nbsp;°C.

