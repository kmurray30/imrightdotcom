      === Penholders ===
      {{Transcluded section|source=Penholder (United Nations)}}
      {{#section-h:Penholder (United Nations)}}

      == Meeting locations<!--'United Nations Security Council Chamber', 'UN Security Council Chamber', 'Security Council Chamber' redirect here--> ==
      [[File:Barack Obama chairs a United Nations Security Council meeting.jpg|thumb|US President [[Barack Obama]] chairs a United Nations Security Council meeting.]]
      [[File:United Nations Security Council in New York City 2.JPG|thumb|The meeting room exhibits ''Untitled (Mural for Peace)'', the [[United Nations Security Council mural]] by [[Per Krohg]] (1952).]]
      Unlike the General Assembly, the Security Council is not bound to [[Meeting (parliamentary procedure)#Session|sessions]]. Each Security Council member must have a representative available at UN Headquarters at all times in case an emergency meeting becomes necessary.<ref name="Whatis"/>

      The Security Council generally meets in a designated chamber in the [[United Nations Headquarters|United Nations Conference Building]] in New York City. The chamber was designed by the Norwegian architect [[Arnstein Arneberg]] and was a gift from Norway. The [[United Nations Security Council mural]] by Norwegian artist [[Per Krohg]] (1952) depicts a [[Phoenix (mythology)|phoenix]] rising from its ashes, symbolic of the world's rebirth after World War II.<ref>[https://www.un.org/cyberschoolbus/untour/subsec.htm "The Security Council"] {{Webarchive|url=https://web.archive.org/web/20130926063024/http://www.un.org/cyberschoolbus/untour/subsec.htm |date=26 September 2013}}. ''United Nations Cyberschoolbus''. United Nations. Retrieved 14 September 2012.</ref>

      The Security Council has also held meetings in cities including [[Nairobi]], Kenya; [[Addis Ababa]], Ethiopia; [[Panama City]], Panama; and [[Geneva]], Switzerland.<ref name="Whatis">{{cite web |url=https://www.un.org/en/sc/about/ |title=What is the Security Council? |publisher=United Nations |access-date=26 November 2013 |archive-date=17 November 2018 |archive-url=https://web.archive.org/web/20181117065348/http://www.un.org/en/sc/about/ |url-status=live}}</ref> In March 2010, the Security Council moved into a temporary facility in the [[United Nations General Assembly Building|General Assembly Building]] as its chamber underwent renovations as part of the UN Capital Master Plan.<ref>{{cite web|title=UN Capital Master Plan Timeline|url=https://www.un.org/wcm/content/site/cmp/home/about/pid/22303|publisher=United Nations|access-date=29 September 2013|archive-date=4 September 2012|archive-url=https://web.archive.org/web/20120904102130/http://www.un.org/wcm/content/site/cmp/home/about/pid/22303|url-status=live}}</ref> The renovations were funded by Norway, the chamber's original donor, for a total cost of {{usd}}5&nbsp;million.<ref>{{cite web|title=An unrecognizable Security Council Chamber|url=http://www.norway-un.org/NorwayandUN/UNBodies/The-Security-Council/An-unrecognizable-Security-Council-Chamber/|publisher=Norway Mission to the UN|date=28 August 2012|access-date=29 September 2013|archive-date=26 December 2016|archive-url=https://web.archive.org/web/20161226054954/http://www.norway-un.org/NorwayandUN/UNBodies/The-Security-Council/An-unrecognizable-Security-Council-Chamber/|url-status=dead}}</ref> The chamber reopened on 16 April 2013.<ref>{{cite web|date=16 April 2013|title=Secretary-General, at inauguration of renovated Security Council Chamber, says room speaks 'language of dignity and seriousness'|publisher=United Nations|access-date=26 November 2013|url=https://www.un.org/News/Press/docs/2013/sgsm14951.doc.htm |archive-url=https://web.archive.org/web/20130419111003/http://www.un.org/News/Press/docs/2013/sgsm14951.doc.htm |archive-date=19 April 2013}}</ref> The representatives of the member states are seated on a horseshoe-shaped table, with the president in the very middle flanked by the Secretary on the right and the Undersecretary on the left. The other representatives are placed in clockwise order alphabetically from the president leaving two seats at the ends of the table for guest speakers. The seating order of the members is then rotated each month as the presidency changes.

      Because of the public nature of meetings in the Security Council Chamber, delegations use the chamber to voice their positions in different ways, such as with [[walkout]]s.<ref name="haidar2015">{{cite news|last1=Haidar|first1=Suhasini|title=India's walkout from UNSC was a turning point: Natwar|url=http://www.thehindu.com/news/national/indias-walkout-from-unsc-was-a-turning-point-natwar/article7601027.ece|work=The Hindu|date=1 September 2015|access-date=13 April 2016|archive-date=29 September 2017|archive-url=https://web.archive.org/web/20170929214950/http://www.thehindu.com/news/national/indias-walkout-from-unsc-was-a-turning-point-natwar/article7601027.ece|url-status=live}}</ref><ref>{{Cite web |last=Goodwin |first=Allegra |date=2023-04-06 |title=Russian accused of war crimes triggers walkout at UN Security Council |url=https://www.cnn.com/2023/04/06/europe/un-security-council-walk-out-intl |access-date=2025-10-15 |website=CNN |language=en}}</ref>

      === Consultation room ===
      Due to the public scrutiny of the Security Council Chamber,<ref name="hovell2016">{{cite book|last1=Hovell|first1=Devika|title=The Power of Process: The Value of Due Process in Security Council Sanctions Decision-making|date=2016|publisher=Oxford University Press|isbn=978-0-19-871767-6|page=145}}</ref> much of the work of the Security Council is conducted behind closed doors in "informal consultations".<ref name="dewet2003">{{cite book|editor-last1=De Wet|editor-first1=Erika|editor-last2=Nollkaemper|editor-first2=André|editor-last3=Dijkstra|editor-first3=Petra|title=Review of the Security Council by member states|date=2003|publisher=Intersentia|location=Antwerp|isbn=978-90-5095-307-8|pages=31–32}}</ref><ref name="bosco2009">{{cite book|last1=Bosco|first1=David L.|title=Five to Rule Them All: the UN Security Council and the Making of the Modern World|date=2009|publisher=Oxford University Press|location=Oxford|isbn=978-0-19-532876-9|pages=[https://archive.org/details/fivetorulethemal00bosc/page/138 138–139]|url=https://archive.org/details/fivetorulethemal00bosc/page/138}}</ref>

      In 1978, West Germany funded the construction of a conference room next to the Security Council Chamber. The room was used for "informal consultations", which soon became the primary meeting format for the Security Council. In 1994, the French ambassador complained to the Secretary-General that "informal consultations have become the Council's characteristic working method, whilst public meetings, originally the norm, are increasingly rare and increasingly devoid of content: everyone knows that when the Council goes into public meeting everything has been decided in advance".<ref name="elgebeily2017">{{cite book|last1=Elgebeily|first1=Sherif|title=The Rule of Law in the United Nations Security Council Decision-Making Process: Turning the Focus Inwards|date=2017|isbn=978-1-315-41344-0|pages=54–55|publisher=Taylor & Francis }}</ref> When Russia funded the renovation of the consultation room in 2013, the Russian ambassador called it "quite simply, the most fascinating place in the entire diplomatic universe".<ref name="sievers2014">{{cite book|last1=Sievers|first1=Loraine|last2=Daws|first2=Sam|title=The Procedure of the UN Security Council|date=2014|publisher=Oxford University Press|location=Oxford|isbn=978-0-19-150843-1|edition=4}}</ref>

      Only members of the Security Council are permitted in the conference room for consultations. The press is not admitted, and other members of the United Nations cannot be invited into the consultations.<ref name="unsc_glossary">{{cite web|title=Security Council Handbook Glossary|url=https://www.un.org/en/sc/about/methods/glossary.shtml|website=United Nations Security Council|access-date=29 June 2017|archive-date=12 June 2017|archive-url=https://web.archive.org/web/20170612005148/http://www.un.org/en/sc/about/methods/glossary.shtml|url-status=live}}</ref> No formal record is kept of the informal consultations.<ref name="unsc_meetings">{{cite web|title=United Nations Security Council Meeting records|url=https://www.un.org/en/sc/meetings/|access-date=10 February 2017|archive-date=31 January 2017|archive-url=https://web.archive.org/web/20170131194210/http://www.un.org/en/sc/meetings/|url-status=live}}</ref><ref name="unsc_faq">{{cite web|title=Frequently Asked Questions|url=https://www.un.org/en/sc/about/faq.shtml|website=United Nations Security Council|access-date=29 June 2017|archive-date=5 September 2018|archive-url=https://web.archive.org/web/20180905205244/http://www.un.org/en/sc/about/faq.shtml|url-status=live}}</ref> As a result, the delegations can negotiate with each other in secret, striking deals and compromises without having their every word transcribed into the permanent record. The privacy of the conference room also makes it possible for the delegates to deal with each other in a friendly manner. In one early consultation, a new delegate from a Communist nation began a propaganda attack on the United States, only to be told by the Soviet delegate, "We don't talk that way in here."<ref name="bosco2009"/>

      A permanent member can cast a "pocket veto" during the informal consultation by declaring its opposition to a measure. Since a veto would prevent the resolution from being passed, the sponsor will usually refrain from putting the resolution to a vote. Resolutions are vetoed only if the sponsor feels so strongly about a measure that it wishes to force the permanent member to cast a formal veto.<ref name="dewet2003"/><ref name="scr2015">{{cite journal|title=The Veto|journal=Security Council Report|date=19 October 2015|volume=2015|issue=3|url=http://www.securitycouncilreport.org/atf/cf/%7B65BFCF9B-6D27-4E9C-8CD3-CF6E4FF96FF9%7D/research_report_3_the_veto_2015.pdf|archive-url=https://web.archive.org/web/20160305003908/http://www.securitycouncilreport.org/atf/cf/%7B65BFCF9B-6D27-4E9C-8CD3-CF6E4FF96FF9%7D/research_report_3_the_veto_2015.pdf|archive-date=5 March 2016|url-status=live}}</ref> By the time a resolution reaches the Security Council Chamber, it has already been discussed, debated and amended in the consultations. The open meeting of the Security Council is merely a public ratification of a decision that has already been reached in private.<ref name="reid1999">{{cite web|last1=Reid|first1=Natalie|title=Informal Consultations|url=https://www.globalpolicy.org/security-council/32941-informal-consultations-natalie-reid-january-1999.html|website=Global Policy Forum|date=January 1999|access-date=13 April 2016|archive-date=28 April 2016|archive-url=https://web.archive.org/web/20160428084917/https://www.globalpolicy.org/security-council/32941-informal-consultations-natalie-reid-january-1999.html|url-status=live}}</ref><ref name="dewet2003"/> For example, [[United Nations Security Council Resolution 1373|Resolution 1373]] was adopted without public debate in a meeting that lasted just five minutes.<ref name="dewet2003"/><ref>{{cite web|title=Meeting record, Security Council, 4385th meeting|url=https://undocs.org/S/PV.4385|id=S/PV.4385|website=United Nations Repository|publisher=United Nations|date=28 September 2001|access-date=9 October 2017|archive-date=10 October 2017|archive-url=https://web.archive.org/web/20171010145738/https://undocs.org/S/PV.4385|url-status=live}}</ref>

      The Security Council holds far more consultations than public meetings. In 2012, the Security Council held 160 consultations, 16 private meetings and 9 public meetings. In times of crisis, the Security Council still meets primarily in consultations, but it also holds more public meetings. After the outbreak of the [[Russo-Ukrainian War]] in 2014, the Security Council returned to the patterns of the Cold War, as Russia and the Western countries engaged in verbal duels in front of the television cameras. In 2016, the Security Council held 150 consultations, 19 private meetings and 68 public meetings.<ref name="unite2016">{{cite web|title=Highlights of Security Council Practice 2016|url=https://unite.un.org/sites/unite.un.org/files/app-schighlights/index.html|website=Unite|publisher=United Nations|access-date=10 February 2017|archive-date=11 February 2017|archive-url=https://web.archive.org/web/20170211080514/https://unite.un.org/sites/unite.un.org/files/app-schighlights/index.html|url-status=live}}</ref>

      == Subsidiary bodies ==
      {{See also|List of United Nations Security Council subsidiary bodies}}

      Article 29 of the Charter provides that the Security Council can establish subsidiary bodies in order to perform its functions. This authority is also reflected in Rule 28 of the Provisional Rules of Procedure. The subsidiary bodies established by the Security Council are heterogeneous, ranging from the Security Council Committee on Admission of New Members to the international criminal tribunals and the numerous sanctions committees established to oversee implementation of various sanctions regimes.<ref>{{cite web |title=Security Council Subsidiary Bodies: An Overview |url=https://main.un.org/securitycouncil/en/content/security-council-subsidiary-bodies-overview |publisher=United Nations Security Council |access-date=15 February 2026}}</ref>

      === Sanctions committees ===

      The Council has created sanctions committees to oversee the implementation of sanctions regimes imposed on specific countries, entities, or individuals. {{As of|2024}}, there were 15 active sanctions regimes, with 685 individuals and 193 entities subject to measures such as asset freezes, travel bans, and arms embargoes.<ref>{{cite web |title=Sanctions Committees |url=https://main.un.org/securitycouncil/en/sanctions/information |publisher=United Nations Security Council |access-date=15 February 2026}}</ref> Each sanctions committee typically consists of all fifteen Council members and is assisted by a panel or group of experts.

      === Counter-Terrorism Committee ===

      The [[Counter-Terrorism Committee]] (CTC) was established by [[United Nations Security Council Resolution 1373|Security Council Resolution 1373]], adopted on 28 September 2001 in response to the [[September 11 attacks]]. The CTC works to strengthen the capacity of UN member states to prevent terrorist acts within their borders and across regions. It is assisted by the Counter-Terrorism Committee Executive Directorate (CTED), which carries out the Committee's policy decisions and conducts expert assessments of member states' counter-terrorism measures.<ref>{{cite web |title=Counter-Terrorism Committee |url=https://www.un.org/securitycouncil/ctc/ |publisher=United Nations |access-date=15 February 2026}}</ref>

      === International tribunals ===

      The Security Council established two ad hoc [[international criminal tribunal]]s under Chapter VII: the [[International Criminal Tribunal for the former Yugoslavia]] (ICTY) in 1993 and the [[International Criminal Tribunal for Rwanda]] (ICTR) in 1994. Both tribunals completed their mandates and were succeeded by the [[International Residual Mechanism for Criminal Tribunals]], which handles remaining functions including appeals and fugitive tracking.

      == United Nations peacekeepers ==
      {{Main|United Nations peacekeeping|List of United Nations peacekeeping missions}}

      After approval by the Security Council, the UN may send [[peacekeeping|peacekeepers]] to regions where armed conflict has recently ceased or paused to enforce the terms of peace agreements and to discourage combatants from resuming hostilities. Since the UN does not maintain its own military, peacekeeping forces are voluntarily provided by member states. These soldiers are sometimes nicknamed "Blue Helmets" for their distinctive gear.{{sfn|Fasulo|2004|p=52}}{{sfn|Coulon|1998|p=ix}} The peacekeeping force as a whole received the [[Nobel Peace Prize]] in 1988.<ref>{{cite web|url=http://nobelprize.org/nobel_prizes/peace/laureates/1988/|author=Nobel Prize|title=The Nobel Peace Prize 1988|access-date=3 April 2011|archive-date=2 April 2011|archive-url=https://web.archive.org/web/20110402191526/http://nobelprize.org/nobel_prizes/peace/laureates/1988/|url-status=live}}</ref>

      [[File:Female combat troops of South African Contingent in MONUSCO on robust foot and moblile patrols 62.jpg|thumb|South African soldiers patrolling as part of [[MONUSCO]] in 2018]]

      {{As of|2024|December}}, the UN maintained 11 active peacekeeping operations with approximately 70,000 personnel from over 120 contributing countries.<ref>{{Cite web |title=Fifth Committee Approves $5.59 Billion Budget for 14 Peacekeeping Operations |url=https://press.un.org/en/2024/gaab4463.doc.htm |publisher=United Nations |access-date=15 February 2026}}</ref> Active missions included those in the [[Democratic Republic of the Congo]] ([[MONUSCO]]), [[South Sudan]] ([[UNMISS]]), the [[Central African Republic]] ([[MINUSCA]]), [[Lebanon]] ([[UNIFIL]]), [[Cyprus]] ([[UNFICYP]]), and the [[Golan Heights]] ([[UNDOF]]).<ref>{{cite web |title=Where We Operate |url=https://peacekeeping.un.org/en/where-we-operate |publisher=United Nations Peacekeeping |access-date=15 February 2026}}</ref> The smallest mission, the [[United Nations Military Observer Group in India and Pakistan]] (UNMOGIP), included 42 uniformed personnel responsible for monitoring the ceasefire in [[Jammu and Kashmir (union territory)|Jammu and Kashmir]]. Peacekeepers with the [[United Nations Truce Supervision Organization]] (UNTSO) have been stationed in the Middle East since 1948, the longest-running active peacekeeping mission.<ref name="UNPO">{{cite web |date=30 September 2013 |title=United Nations Peacekeeping Operations |url=https://www.un.org/en/peacekeeping/resources/statistics/factsheet.shtml |url-status=live |archive-url=https://web.archive.org/web/20160323162900/http://www.un.org/en/peacekeeping/resources/statistics/factsheet.shtml |archive-date=23 March 2016 |access-date=9 November 2013 |publisher=United Nations}}</ref>

      Total UN peacekeeping personnel declined from 161,509 in 2015 to 94,451 in 2024, a reduction of more than 40 per cent, reflecting the closure of several large missions and shifting geopolitical priorities.<ref name="SIPRI-PK">{{cite web |title=Deployments fall more than 40% in a decade |url=https://www.sipri.org/media/press-release/2025/peace-operation-deployments-fall-40-per-cent |publisher=Stockholm International Peace Research Institute |date=2025 |access-date=15 February 2026}}</ref> As of 2024, approximately 74 per cent of UN peacekeepers were deployed in sub-Saharan Africa.<ref name="SIPRI-PK"/> The top troop contributors to UN peacekeeping operations are Nepal, Bangladesh, and India, all from the [[Global South]].<ref>{{cite web |title=Troop and police contributors |url=https://peacekeeping.un.org/en/troop-and-police-contributors |publisher=United Nations Peacekeeping |access-date=15 February 2026}}</ref>

      UN peacekeepers have also drawn criticism in several postings. Peacekeepers have been accused of child rape, soliciting prostitutes, or sexual abuse during various peacekeeping missions in the Democratic Republic of the Congo,<ref>{{cite news|url=https://www.washingtonpost.com/wp-dyn/articles/A3145-2004Dec15.html|title=U.N.&nbsp;Sexual Abuse Alleged in Congo|newspaper=The Washington Post|first=Colum|last=Lynch|date=16 December 2004|access-date=21 November 2013|archive-date=11 November 2013|archive-url=https://web.archive.org/web/20131111062103/http://www.washingtonpost.com/wp-dyn/articles/A3145-2004Dec15.html|url-status=live}}</ref> Haiti,<ref>{{cite news|url=http://news.bbc.co.uk/2/hi/americas/6195830.stm|title=UN troops face child abuse claims|work=BBC News|date=30 November 2006|access-date=21 November 2013|archive-date=9 December 2013|archive-url=https://web.archive.org/web/20131209171221/http://news.bbc.co.uk/2/hi/americas/6195830.stm|url-status=live}}</ref> Liberia,<ref>{{cite news|url=https://www.nytimes.com/2006/05/08/world/africa/08iht-abuse.html|title=Aid workers in Liberia accused of sex abuse|work=The New York Times|date=8 May 2006|access-date=22 November 2013|archive-date=3 October 2014|archive-url=https://web.archive.org/web/20141003214726/http://www.nytimes.com/2006/05/08/world/africa/08iht-abuse.html|url-status=live}}</ref> Sudan and what is now South Sudan,<ref>{{cite news|url=https://www.telegraph.co.uk/news/worldnews/1538476/UN-staff-accused-of-raping-children-in-Sudan.html |archive-url=https://ghostarchive.org/archive/20220111/https://www.telegraph.co.uk/news/worldnews/1538476/UN-staff-accused-of-raping-children-in-Sudan.html |archive-date=11 January 2022 |url-access=subscription |url-status=live|title= UN staff accused of raping children in Sudan|work=The Telegraph|date=4 January 2007| first=Kate | last=Holt |access-date=21 November 2013}}{{cbignore}}</ref> Burundi and Ivory Coast.<ref>{{cite news|url=http://news.bbc.co.uk/2/hi/in_depth/7420798.stm|title=Peacekeepers 'abusing children'|publisher=BBC|date=28 May 2007|access-date=21 November 2013|archive-date=9 December 2013|archive-url=https://web.archive.org/web/20131209173237/http://news.bbc.co.uk/2/hi/in_depth/7420798.stm|url-status=live}}</ref> Scientists cited UN peacekeepers from Nepal as the likely source of the [[2010–2013 Haiti cholera outbreak]], which killed more than 8,000 Haitians following the [[2010 Haiti earthquake]].<ref>{{cite news |url=http://www.cnn.com/2013/10/09/world/americas/haiti-un-cholera-lawsuit/ |title=U.N. sued for 'bringing cholera to Haiti', causing outbreak that killed thousands |author=Watson, Ivan and Joe Vaccarello |date=10 October 2013 |publisher=CNN |access-date=18 November 2013 |archive-date=3 December 2013 |archive-url=https://web.archive.org/web/20131203002147/http://www.cnn.com/2013/10/09/world/americas/haiti-un-cholera-lawsuit/ |url-status=live}}</ref>

      The budget for peacekeeping is assessed separately from the main UN organisational budget; in the fiscal year 1 July 2023 – 30 June 2024, the approved peacekeeping budget was approximately $5.6 billion.<ref>{{Cite web |title=Fifth Committee Approves $5.59 Billion Budget for 14 Peacekeeping Operations |url=https://press.un.org/en/2024/gaab4463.doc.htm |publisher=United Nations |access-date=15 February 2026}}</ref>{{sfn|Fasulo|2004|p=115}} UN peace operations are funded by assessments, using a formula derived from the regular funding scale, but including a weighted surcharge for the five permanent Security Council members. This surcharge serves to offset discounted peacekeeping assessment rates for less-developed countries.<ref name=":0">{{Cite web |title=How we are funded |url=https://peacekeeping.un.org/en/how-we-are-funded |access-date=2023-05-31 |website=United Nations Peacekeeping |language=en |archive-date=26 December 2021 |archive-url=https://web.archive.org/web/20211226155653/https://peacekeeping.un.org/en/how-we-are-funded |url-status=live }}</ref>

      For the 2020–2021 budget, the top 10 providers of assessed financial contributions to United Nations peacekeeping operations were the US (27.89%), China (15.21%), Japan (8.56%), Germany (6.09%), the United Kingdom (5.79%), France (5.61%), Italy (3.30%), Russian Federation (3.04%), Canada (2.73%) and South Korea (2.26%).<ref name=":0" />

      == Criticism and evaluation ==
      {{Main|Criticism of the United Nations}}

      In examining the first sixty years of the Security Council's existence, British historian [[Paul Kennedy]] concludes that "glaring failures had not only accompanied the UN's many achievements, they overshadowed them", identifying as particular failures the lack of will to prevent ethnic massacres in Bosnia and Rwanda.{{sfn|Kennedy|2006|pp=101–103, 110}} Kennedy attributes the failures to the UN's lack of reliable military resources, writing that "above all, one can conclude that the practice of announcing (through a Security Council resolution) a new peacekeeping mission without ensuring that sufficient armed forces will be available has usually proven to be a recipe for humiliation and disaster."{{sfn|Kennedy|2006|p=110}}

      The veto power has attracted sustained criticism. Detractors argue that it renders the Council incapable of acting on the most consequential threats to international peace, particularly when a permanent member is itself a party to a conflict or has close ties to one. The Council's inability to prevent or respond effectively to the [[Rwandan genocide]], the [[Bosnian War]], the [[Syrian civil war]], and the wars in Ukraine and Gaza has been cited as evidence of structural dysfunction.<ref>{{cite web |title=Three Troubling Trends at the UN Security Council |url=https://www.crisisgroup.org/global/three-troubling-trends-un-security-council |publisher=International Crisis Group |access-date=15 February 2026}}</ref>

      Critics also point to the unrepresentative composition of the permanent membership, which reflects the power structure of 1945. No African, Latin American, or South Asian country holds a permanent seat, despite these regions comprising a large share of the world's population and featuring prominently on the Council's agenda.{{sfn|Kennedy|2006|p=70}} Scholar Sudhir Chella Rajan argued in 2006 that the five permanent members had created an exclusive [[nuclear club]] that predominantly addresses the strategic interests and political motives of the permanent members—for example, protecting the oil-rich Kuwaitis in 1991 but poorly protecting the resource-poor Rwandans in 1994.<ref>{{cite journal |last=Rajan |first=Sudhir Chella |title=Global Politics and Institutions |url=http://www.gtinitiative.org/documents/PDFFINALS/3Politics.pdf |journal=GTI Paper Series: Frontiers of a Great Transition |volume=3 |publisher=Tellus Institute |year=2006 |access-date=11 December 2011 |archive-url=https://web.archive.org/web/20061028135640/http://www.gtinitiative.org/documents/PDFFINALS/3Politics.pdf |archive-date=28 October 2006 |url-status=live}}</ref> Since three of the five permanent members are European, and four are predominantly white developed nations, the Security Council has been described as a pillar of [[global apartheid]] by Titus Alexander, former Chair of the Westminster United Nations Association.{{sfn|Alexander|1996|pp=158–160}}

      Several studies have examined the Security Council's responsiveness to armed conflict. Findings suggest that the Council is more likely to meet and deliberate on conflicts that are more intense and have led to more humanitarian suffering, but that its responsiveness is also shaped by the political interests of member states and in particular of the permanent members.<ref>{{cite journal |last1= Lundgren |first1= Magnus|last2= Klamberg |first2= Mark|date= 2022 |title=Selective Attention: The United Security Council and Armed Conflict |journal= British Journal of Political Science |volume= 53|issue= 3|doi= 10.1017/S0007123422000461 |doi-access= free}}</ref>

      The Security Council's effectiveness and relevance are questioned because, in most high-profile cases, there are essentially no consequences for violating a Security Council resolution. During the [[Darfur crisis]], [[Janjaweed]] militias, allowed by elements of the Sudanese government, committed violence against an indigenous population, killing thousands of civilians. In the [[Srebrenica massacre]], Serbian troops committed genocide against [[Bosniaks]], although [[Srebrenica]] had been declared a UN [[safe area (Bosnian War)|safe area]], protected by 400 armed Dutch peacekeepers.{{sfn|Deni|2007|p=71|ps=: "As Serbian forces attacked Srebrenica in July 1995, the [400] Dutch soldiers escorted women and children out of the city, leaving behind roughly 7,500 Muslim men who were subsequently massacred by the attacking Serbs."}}

      The Security Council has also been criticised for failure in resolving many conflicts—including [[Cyprus problem|Cyprus]], [[Sri Lankan civil war|Sri Lanka]], [[Syrian civil war|Syria]], [[Kosovo War|Kosovo]], and the [[Israeli–Palestinian conflict]]—reflecting the wider shortcomings of the UN.<ref>[http://www.3news.co.nz/Key-compromises-on-UN-Syria-deal/tabid/1607/articleID/315021/Default.aspx Key compromises on UN Syria deal] {{Webarchive|url=https://web.archive.org/web/20130930183756/http://www.3news.co.nz/Key-compromises-on-UN-Syria-deal/tabid/1607/articleID/315021/Default.aspx |date=30 September 2013}}. ''3 News NZ''. 28 September 2013.</ref>

      A 2005 [[RAND Corporation]] study found the UN to be successful in two out of three peacekeeping efforts. It compared UN nation-building efforts to those of the United States, and found that 88% of UN cases had led to lasting peace.<ref>{{cite web|url=https://www.rand.org/pubs/monographs/2005/RAND_MG304.sum.pdf|author=RAND Corporation|title=The UN's Role in Nation Building: From the Congo to Iraq|access-date=30 December 2008|archive-url=https://web.archive.org/web/20050220232620/https://www.rand.org/pubs/monographs/2005/RAND_MG304.sum.pdf|archive-date=20 February 2005|url-status=live}}</ref> Also in 2005, the [[Human Security Report 2005|Human Security Report]] documented a decline in the number of wars, genocides and human rights abuses since the end of the Cold War, and presented evidence, albeit circumstantial, that international activism—mostly spearheaded by the UN—had been the main cause of the decline in armed conflict since the end of the Cold War.<ref>{{cite web|url=http://www.humansecurityreport.info/|author=Human Security Centre|title=The Human Security Report 2005|access-date=8 February 2007|url-status=dead|archive-url=https://swap.stanford.edu/20090728163300/http%3A//www.humansecurityreport.info/|archive-date=28 July 2009}}</ref>

      Supporters counter that the Council, for all its limitations, provides a framework within which the great powers can negotiate and that the veto, while frustrating, reflects the reality that enforcement action cannot succeed without the cooperation of the most powerful states.{{sfn|Kennedy|2006|pp=52–54}} The expansion of peacekeeping operations since 1990 and the development of sanctions regimes and international tribunals are cited as significant achievements.

      The [[UN Charter]] gives all three powers of the [[legislative]], executive and [[judiciary]] branches to the Security Council.<ref>{{cite journal |last=Creery |first=Janet |title=Read the fine print first |year=2004 |url=http://peacemagazine.org/archive/v10n1p20.htm |journal=[[Peace Magazine]] |issue=Jan–Feb 1994 |page=20 |access-date=11 December 2011 |archive-date=7 December 2011 |archive-url=https://web.archive.org/web/20111207044853/http://www.peacemagazine.org/archive/v10n1p20.htm |url-status=live}}</ref>

      There is evidence of [[bribery]] in the Security Council. Countries that are elected to the Security Council see a large increase in foreign aid from the US, averaging 59%. They also see an 8% increase in aid from the UN, mainly from [[UNICEF]].<ref>{{Cite journal|last=Kuziemko|first=Ilyana|date=2006-08-01|title=How Much Is a Seat on the Security Council Worth? Foreign Aid and Bribery at the United Nations|journal=Journal of Political Economy|language=en|volume=114|issue=5|pages=905–930|doi=10.1086/507155| doi-access=free|issn=0022-3808}}</ref> The increase most strongly correlates to years in which the Security Council addresses issues relevant to the US. There is also evidence of increased foreign aid to elected countries from Japan and Germany. One study found membership on the Security Council correlates with reduced economic growth for a given country over the course of its two-year term—3.5% growth during membership compared to 8.7% over four years of non-membership—although the effect is mainly driven by African authoritarian countries. Elected members also experience a reduction in democracy and [[freedom of the press]].<ref>{{Cite journal|last=Vreeland|first=James Raymond|date=2019-05-11|title=Corrupting International Organizations|journal=Annual Review of Political Science|language=en|volume=22|issue=1|pages=205–222|doi=10.1146/annurev-polisci-050317-071031| doi-access=free|issn=1094-2939}}</ref>

      == Reform ==
      {{Main|Reform of the United Nations Security Council}}

      [[File:G4 Nations.svg|thumb|The [[G4 nations]]: [[Brazil]], [[Germany]], [[India]], [[Japan]]]]
      [[File:Uniting for Consensus core.png|thumb|left|200px|The [[Uniting for Consensus]]: [[Italy]], [[Pakistan]], [[Spain]], [[Canada]], [[Mexico]], [[Argentina]], [[Turkey]], [[South Korea]] and others]]

      Proposals to reform the Security Council began with the conference that wrote the UN Charter and have continued to the present day. As British historian Paul Kennedy writes, "Everyone agrees that the present structure is flawed. But consensus on how to fix it remains out of reach."{{sfn|Kennedy|2006|p=76}} The Council's membership has been expanded only once, in 1965, when the number of non-permanent members was increased from six to ten. Proposals for further reform have faced resistance from the permanent members, each of whom holds a veto over any Charter amendment.

      === G4 proposal ===

      The [[G4 nations]] (Brazil, Germany, India, and Japan) have campaigned for permanent seats on the Security Council, arguing that the body's composition reflects the geopolitical realities of 1945 rather than the contemporary world. Their core proposal calls for expanding the Council from 15 to 25 or 26 members, with six new permanent seats—two for Africa, two for the Asia-Pacific, one for Latin America and the Caribbean, and one for Western Europe and Others—though the new permanent members would not immediately gain veto power, with the question to be reviewed after a transition period of 10 to 15 years.<ref>{{cite web |title=Security Council Reform: When and How It Can Be Done |url=https://passblue.com/2025/01/14/security-council-reform-when-and-how-it-can-be-done/ |publisher=PassBlue |date=14 January 2025 |access-date=15 February 2026}}</ref> Japan and Germany had been the UN's second- and third-largest funders, respectively, before China took over as the second largest funder in recent years, whilst Brazil and India are two of the largest contributors of troops to UN-mandated peacekeeping missions.

      In 2017, the G4 nations indicated willingness temporarily to forgo [[United Nations Security Council veto power|veto power]] if granted [[Permanent members of the United Nations Security Council|permanent seats]].<ref>{{cite web|title=India Offers To Temporarily Forgo Veto Power If Granted Permanent UNSC Seat|url=http://www.huffingtonpost.in/2017/03/08/india-offers-to-temporarily-forgo-veto-power-if-granted-permanen/|work=[[HuffPost]]|access-date=9 March 2017|archive-date=8 March 2017|archive-url=https://web.archive.org/web/20170308181726/http://www.huffingtonpost.in/2017/03/08/india-offers-to-temporarily-forgo-veto-power-if-granted-permanen/|url-status=live}}</ref>

      The permanent members have announced their positions on Security Council reform reluctantly. The United States has supported the permanent membership of Japan and lent its support to India and a small number of additional non-permanent members. The United Kingdom and France have essentially supported the G4 position, with the expansion of permanent and non-permanent members and the accession of Germany, Brazil, India and Japan to permanent member status, as well as an increase in the presence of African countries on the Council. China has supported stronger representation of developing countries and has firmly opposed Japan's membership.<ref>{{cite news |url=https://www.theguardian.com/world/us-embassy-cables-documents/204917 |title=US embassy cables: China reiterates 'red lines' |work=The Guardian |date=29 November 2010 |access-date=11 December 2011 |archive-date=4 December 2013 |archive-url=https://web.archive.org/web/20131204034559/http://www.theguardian.com/world/us-embassy-cables-documents/204917 |url-status=live}}</ref>

      === African Union proposal ===

      The [[African Union]] has called for at least two permanent seats with full veto power and two additional non-permanent seats for African states, as outlined in the [[Ezulwini Consensus]] of 2005. Africa's position emphasises the need to redress what it terms the "historic injustice" of having no permanent representation on the Council, despite African issues constituting a substantial portion of the Council's agenda.<ref>{{cite web |title=Africa's Design for a Reformed UN Security Council |url=https://www.csis.org/analysis/africas-design-reformed-un-security-council |publisher=Center for Strategic and International Studies |access-date=15 February 2026}}</ref>

      === Uniting for Consensus ===

      The [[Uniting for Consensus]] group, generally led by Italy and including countries such as Spain, Mexico, Colombia, Argentina, Pakistan, South Korea, Turkey, and Indonesia, opposes the creation of new permanent seats, arguing this would expand an existing oligarchy. The group instead proposes longer-term elected seats with the possibility of re-election, thereby providing more equitable regional representation without entrenching additional permanent privileges.<ref>{{cite web |title=The Pact for the Future ... of Multilateralism? |url=https://multilateralism.sipa.columbia.edu/news/pact-future-multilateralism-long-road-ahead-global-governance-reform |publisher=Columbia University SIPA |access-date=15 February 2026}}</ref> As far as traditional categories of seats are concerned, the UfC proposal does not imply any change, but only the introduction of small and medium-sized states amongst groups eligible for regular seats. This proposal includes the question of veto, giving a range of options from abolition to limitation of the application of the veto to Chapter VII matters only.

      === Veto restraint proposals ===

      In April 2023, France called for the five permanent members to collectively suspend the use of the veto in cases of mass atrocities, echoing earlier proposals for veto restraint in situations involving genocide, crimes against humanity, and war crimes. The proposal has not been formally adopted by the other permanent members.<ref>{{cite web |title=France renews call for UN Security Council to limit veto in mass atrocity cases |url=https://news.un.org/en/story/2023/04/1135912 |publisher=UN News |date=24 April 2023 |access-date=15 February 2026}}</ref>

      === Pact for the Future (2024) ===

      At the [[Summit of the Future]] in September 2024, world leaders adopted the [[Pact for the Future]], which contained the most concrete commitment to Security Council reform since the 1960s. The Pact called for the Council to be made "more representative, inclusive, transparent, efficient, democratic and accountable" and affirmed that any enlargement should "redress the historic injustice against Africa" and other underrepresented regions. It empowered the co-chairs of the intergovernmental negotiations to draft a consolidated model for Council enlargement based on the various proposals put forward by member states, and called for agreement on categories of membership and on the future scope and limits of the veto.<ref>{{cite web |title=United Nations Adopts Ground-Breaking Pact for the Future to Transform Global Governance |url=https://press.un.org/en/2024/ga12641.doc.htm |publisher=United Nations |date=22 September 2024 |access-date=15 February 2026}}</ref>

      In 2025, at the [[17th BRICS summit|17th BRICS Summit]] in Rio de Janeiro, Brazil's outgoing BRICS president, President [[Luiz Inácio Lula da Silva]], and India's prime minister [[Narendra Modi]] emphasised their shared ambition to secure permanent membership on the UNSC. Modi highlighted the need for reforming the UNSC to enhance its credibility and effectiveness by better representing the Global South, noting that many key economies remain excluded from decision-making. Both leaders affirmed that reforming the UNSC would be a priority for India during its upcoming [[BRICS]] presidency in 2026.<ref>{{Cite news |last1=Iglesias |first1=Simone |last2=Carvalho |first2=Daniel |date=2025-07-08 |title=Brazil's Lula Hosts Modi in Bid to Turn India Into a Major Trade Partner |url=https://www.bloomberg.com/news/articles/2025-07-08/lula-pushes-to-turn-brics-buddy-modi-into-major-trade-partner |access-date=2025-07-10 |work=Bloomberg}}</ref><ref>{{Cite web |date=2025-07-07 |title=BRICS leaders condemn April 22 Pahalgam attack: On terror, zero tolerance |url=https://indianexpress.com/article/india/brics-leaders-condemn-jk-pahalgam-attack-on-terror-zero-tolerance-10110505/ |access-date=2025-07-10 |website=The Indian Express |language=en}}</ref>

