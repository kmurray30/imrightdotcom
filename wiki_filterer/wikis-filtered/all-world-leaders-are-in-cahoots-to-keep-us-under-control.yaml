      ** Canada is actively working on providing its citizens with forms of Digital ID in partnership with the non-profit Digital ID & Authentical Council of Canada (DIACC). DIACC will also oversee the Voila Verified Trustmark Program which will provide verification of compliance standards, specifically ISO standards, as a way to certify Digital ID service providers against the Pan-Canadian Trust Framework.<ref>{{Cite web |date=October 18, 2022 |title=DIACC launches certified trustmark program for Canadian digital ID services |url=https://www.biometricupdate.com/202210/diacc-launches-certified-trustmark-program-for-canadian-digital-id-services}}</ref> As of 2023, there is not a nationwide Digital ID program; however, the province of Alberta supports its own unique version of a Digital ID. Ontario and Quebec have plans to launch their Digital ID but were delayed by the COVID-19 Pandemic.<ref>{{Cite web |date=May 17, 2022 |title=The state of Digital ID in Canada |url=https://www.itworldcanada.com/article/the-state-of-digital-id-in-canada/484618|archive-url=https://web.archive.org/web/20220518135405/https://www.itworldcanada.com/article/the-state-of-digital-id-in-canada/484618|url-status=usurped|archive-date=May 18, 2022}}</ref>
