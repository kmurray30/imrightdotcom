      == UN members that have never been Security Council members==
      This is a list of the 60 member nations that have never been members of the Security Council.<ref>{{Cite web|title=Countries Never Elected Members|url=https://www.un.org/securitycouncil/content/countries-never-elected-members-security-council|publisher=United Nations|access-date=1 January 2020}}</ref> The three [[United Nations member states#Former members|former UN members]]  that were not elected to the Security Council during their membership are [[Tanganyika (1961–1964)|Tanganyika]], [[Zanzibar]], and [[Serbia and Montenegro]].

