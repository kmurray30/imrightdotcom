      {{COVID-19 pandemic sidebar|expanded=medical}}

      A '''COVID{{nbhyph}}19 vaccine''' is a [[vaccine]] designed to induce immunity against [[SARS-CoV-2]], the virus responsible for coronavirus disease 2019 ([[COVID-19]]).<ref name="BritannicaCOVID">{{cite web
       |title=COVID-19 vaccine
       |website=Encyclopaedia Britannica
       |publisher=Encyclopaedia Britannica, Inc.
       |url=https://www.britannica.com/science/COVID-19-vaccine
       |access-date=13 January 2026
      }}</ref> COVID-19 vaccines help reduce the risk of severe illness, hospitalisation and death from the virus.<ref>{{Cite web |date=2024-09-11 |title=COVID-19 vaccine |url=https://www.nhs.uk/vaccinations/covid-19-vaccine/ |access-date=2026-01-22 |website=nhs.uk |language=en}}</ref> 

      COVID‑19 vaccines were developed at an unprecedented pace to tackle the [[COVID-19 pandemic]], with the first [[Clinical trial|clinical trials]] beginning in March 2020.<ref name="thanh" /> Before approval, vaccines underwent the standard three [[Phases of clinical research|phases of clinical trials]], although phases were conducted in parallel to accelerate development.<ref name="VaccineKnowledgeCOVID" /> Vaccines have been developed based both on classical technologies (using [[Inactivated vaccine|inactivated virus]] or [[Subunit vaccine|protein subunit]]), and novel platforms ([[mRNA vaccine|mRNA]] or [[Viral vector vaccine|viral vector]]-based).<ref>{{cite journal | vauthors = Pushparajah D, Jimenez S, Wong S, Alattas H, Nafissi N, Slavcev RA | title = Advances in gene-based vaccine platforms to address the COVID-19 pandemic | journal = Advanced Drug Delivery Reviews | volume = 170 | pages = 113–141 | date = March 2021 | pmid = 33422546 | pmc = 7789827 | doi = 10.1016/j.addr.2021.01.003 }}</ref>

      Prior research on [[coronavirus]]es causing severe acute respiratory syndrome ([[SARS]]) and Middle East respiratory syndrome ([[MERS]]) accelerated the development of various [[vaccine platform]]s in early 2020.<ref name="pmid33341119">{{cite journal |vauthors=Li YD, Chi WY, Su JH, Ferrall L, Hung CF, Wu TC |date=December 2020 |title=Coronavirus vaccine development: from SARS and MERS to COVID-19 |journal=Journal of Biomedical Science |volume=27 |issue=1 |article-number=104 |doi=10.1186/s12929-020-00695-2 |pmc=7749790 |pmid=33341119 | title-link = doi | doi-access = free }}</ref> The 2023 [[Nobel Prize in Physiology or Medicine]] was awarded to [[Katalin Karikó]] and [[Drew Weissman]] for the development of effective mRNA vaccines against COVID{{nbhyph}}19.<ref>{{cite web |title=The Nobel Prize in Physiology or Medicine 2023 |url=https://www.nobelprize.org/prizes/medicine/2023/press-release/ |url-status=live |archive-url=https://web.archive.org/web/20231004042415/https://www.nobelprize.org/prizes/medicine/2023/press-release/ |archive-date=4 October 2023 |access-date=3 October 2023 |website=NobelPrize.org}}</ref><ref>{{cite news |date=2 October 2023 |title=Hungarian and US scientists win Nobel for COVID-19 vaccine discoveries |url=https://www.reuters.com/article/nobel-prize-medicine-idCAKCN3120KJ |url-status=live |archive-url=https://web.archive.org/web/20231008052339/https://www.reuters.com/article/nobel-prize-medicine-idCAKCN3120KJ |archive-date=8 October 2023 |access-date=3 October 2023 |work=Reuters}}</ref><ref>{{cite web |title=The Nobel Prize in Physiology or Medicine 2023 |url=https://www.nobelprize.org/prizes/medicine/2023/kariko/facts/ |url-status=live |archive-url=https://web.archive.org/web/20240204182259/https://www.nobelprize.org/prizes/medicine/2023/kariko/facts/ |archive-date=4 February 2024 |access-date=3 October 2023 |website=NobelPrize.org}}</ref>

      Major vaccines include the [[Pfizer–BioNTech COVID-19 vaccine|Pfizer–BioNTech mRNA vaccine]], [[Moderna COVID-19 vaccine|Moderna mRNA vaccine]], and the [[Novavax COVID-19 vaccine|Novavax protein subunit vaccine]].<ref name="VaccineKnowledgeCOVID" /> With the emergence of new [[Variants of SARS-CoV-2|SARS-CoV-2 variants]], the original vaccines—particularly [[Pfizer]]–[[BioNTech]] and [[Moderna]] vaccines—have been updated. These "variant-adapted" vaccines are offered as [[Booster dose|booster doses]].<ref name="VaccineKnowledgeCOVID">{{cite web
       |title = COVID-19 vaccines
       |website = Vaccine Knowledge Project
       |publisher = University of Oxford
       |url = https://vaccineknowledge.ox.ac.uk/covid-19-vaccines
       |access-date = 3 December 2025
      }}</ref> The immunity from the vaccines also wanes over time, requiring people to get boosters to maintain protection.<ref name="Rogers_2022">{{cite web |vauthors=Rogers K |date=11 May 2022 |title=COVID-19 vaccine |url=https://www.britannica.com/science/COVID-19-vaccine |access-date=12 June 2022 |website=[[Encyclopædia Britannica]] |archive-date=12 June 2022 |archive-url=https://web.archive.org/web/20220612051640/https://www.britannica.com/science/COVID-19-vaccine |url-status=live }}</ref>

      Common side effects of COVID{{nbhyph}}19 vaccines include soreness, fatigue, headache, [[myalgia]] (muscle pain), and [[arthralgia]] (joint pain), which resolve without medical treatment within a few days.<ref name="who-back" /><ref name="COVID-19 vaccine WHO" /> COVID{{nbhyph}}19 vaccination is safe for people who are pregnant or are breastfeeding.<ref name="breastf" />

      The COVID{{nbhyph}}19 vaccines are widely credited for their role in reducing the spread of COVID{{nbhyph}}19 and reducing the severity and death caused by COVID{{nbhyph}}19.<ref name="Rogers_2022" /><ref>{{cite journal |vauthors=Mallapaty S, Callaway E, Kozlov M, Ledford H, Pickrell J, Van Noorden R |date=December 2021 |title=How COVID vaccines shaped 2021 in eight powerful charts |journal=Nature |volume=600 |issue=7890 |pages=580–583 |bibcode=2021Natur.600..580M |doi=10.1038/d41586-021-03686-x |pmid=34916666 | title-link = doi | doi-access = free |s2cid=245262732 }}</ref> Many countries implemented phased distribution plans that prioritized those at highest risk of complications, such as the elderly, and those at high risk of exposure, such as [[Health professional|healthcare workers]].<ref name="Beaumont">{{cite news |date=18 November 2020 |title=Covid-19 vaccine: who are countries prioritising for first doses? |work=[[The Guardian]] |url=https://www.theguardian.com/world/2020/nov/18/covid-19-vaccine-who-are-countries-prioritising-for-first-doses |url-status=live |access-date=26 December 2020 |archive-url=https://web.archive.org/web/20210118190247/https://www.theguardian.com/world/2020/nov/18/covid-19-vaccine-who-are-countries-prioritising-for-first-doses |archive-date=18 January 2021 |issn=0261-3077 |vauthors=Beaumont P}}</ref><ref name="Wang1">{{cite journal | vauthors = Wang H, Xu R, Qu S, Schwartz M, Adams A, Chen X | title = Health inequities in COVID-19 vaccination among the elderly: Case of Connecticut | journal = Journal of Infection and Public Health | volume = 14 | issue = 10 | pages = 1563–1565 | date = October 2021 | pmid = 34326008 | doi = 10.1016/j.jiph.2021.07.013 | pmc = 8491089 | s2cid = 236515442 }}</ref> By December 2020, more than 10 billion vaccine doses had been preordered,<ref name="mullard">{{cite journal |vauthors=Mullard A |title=How COVID vaccines are being divvied up around the world |journal=Nature |date=November 2020 |pmid=33257891 |doi=10.1038/d41586-020-03370-6 |s2cid=227246811}}</ref> with about half of the doses purchased by [[World Bank high-income economy|high-income countries]] comprising 14% of the world's population.<ref name="So">{{cite journal |vauthors=So AD, Woo J |title=Reserving coronavirus disease 2019 vaccines for global access: cross sectional analysis |journal=BMJ |volume=371 |article-number=m4750 |date=December 2020 |pmid=33323376 |pmc=7735431 |doi=10.1136/bmj.m4750 |title-link=doi |doi-access=free}}</ref> {{As of|2024|August}}, over 13{{nbsp}}billion doses of COVID{{nbhyph}}19 vaccines have been administered worldwide.<ref name="Richie_2021">{{cite journal |vauthors=Mathieu E, Ritchie H, Rodés-Guirao L, Cameron A et al |date=2024 |title=Coronavirus (COVID-19) Vaccinations – Statistics and Research |url=https://ourworldindata.org/covid-vaccinations |url-status=live |journal=Our World in Data |at=First figure: "COVID-19 vaccine doses administered per 100 people, Dec 2, 2020 to Aug 12, 2024" |archive-url=https://web.archive.org/web/20260113172913/https://ourworldindata.org/covid-vaccinations |archive-date=13 January 2026 |access-date=13 January 2026}}</ref><!-- NOTE! These preceding paragraphs are transcluded to [[Coronavirus disease 2019]]. Any references used in this section must be defined in this section -->

      {{Toclimit|3}}

      == Background ==
      Before COVID{{nbhyph}}19, a vaccine for an infectious disease had never been produced in less than several years{{snd}}and no vaccine existed for preventing a [[coronavirus]] infection in humans.<ref name="gates2">{{cite web | vauthors = Gates B |date=30 April 2020|title=The vaccine race explained: What you need to know about the COVID-19 vaccine|url=https://www.gatesnotes.com/Health/What-you-need-to-know-about-the-COVID-19-vaccine|archive-url=https://web.archive.org/web/20200514010012/https://www.gatesnotes.com/Health/What-you-need-to-know-about-the-COVID-19-vaccine |archive-date=14 May 2020|url-status=live|access-date=2 May 2020|publisher=The Gates Notes }}</ref> However, vaccines have been produced against several animal diseases caused by coronaviruses, including [[infectious bronchitis virus]] in birds, [[canine coronavirus]], and [[feline coronavirus]].<ref>{{cite journal |vauthors=Cavanagh D |date=December 2003 |title=Severe acute respiratory syndrome vaccine development: experiences of vaccination against avian infectious bronchitis coronavirus |journal=Avian Pathology |volume=32 |issue=6 |pages=567–582 |doi=10.1080/03079450310001621198 |pmc=7154303 |pmid=14676007 | title-link = doi | doi-access = free }}</ref>  

      Previous projects to develop vaccines for viruses in the family ''[[Coronaviridae]]'' that affect humans have been aimed at [[severe acute respiratory syndrome]] (SARS) and [[Middle East respiratory syndrome]] (MERS). Vaccines against SARS<ref>{{cite journal |vauthors=Gao W, Tamin A, Soloff A, D'Aiuto L, Nwanegbo E, Robbins PD, Bellini WJ, Barratt-Boyes S, Gambotto A |date=December 2003 |title=Effects of a SARS-associated coronavirus vaccine in monkeys |journal=Lancet |volume=362 |issue=9399 |pages=1895–1896 |doi=10.1016/S0140-6736(03)14962-8 |pmc=7112457 |pmid=14667748 | title-link = doi | doi-access = free }}</ref> and MERS<ref>{{cite journal |vauthors=Kim E, Okada K, Kenniston T, Raj VS, AlHajri MM, Farag EA, AlHajri F, Osterhaus AD, Haagmans BL, Gambotto A |date=October 2014 |title=Immunogenicity of an adenoviral-based Middle East Respiratory Syndrome coronavirus vaccine in BALB/c mice |journal=Vaccine |volume=32 |issue=45 |pages=5975–5982 |doi=10.1016/j.vaccine.2014.08.058 |pmc=7115510 |pmid=25192975 | title-link = doi | doi-access = free }}</ref> have been tested in non-human [[Model organism|animals]]. 

      According to studies published in 2005 and 2006, the identification and development of novel vaccines and medicines to treat SARS were priorities for governments and [[List of national public health agencies|public health agencies]] worldwide at the time.<ref name="PMID 15655773">{{cite journal |vauthors=Greenough TC, Babcock GJ, Roberts A, Hernandez HJ, Thomas WD, Coccia JA, Graziano RF, Srinivasan M, Lowy I, Finberg RW, Subbarao K, Vogel L, Somasundaran M, Luzuriaga K, Sullivan JL, Ambrosino DM |date=February 2005 |title=Development and characterization of a severe acute respiratory syndrome-associated coronavirus-neutralizing human monoclonal antibody that provides effective immunoprophylaxis in mice |journal=The Journal of Infectious Diseases |volume=191 |issue=4 |pages=507–514 |doi=10.1086/427242 |pmc=7110081 |pmid=15655773 | title-link = doi | doi-access = free }}</ref><ref name="PMID 15885812">{{cite journal |vauthors=Tripp RA, Haynes LM, Moore D, Anderson B, Tamin A, Harcourt BH, Jones LP, Yilla M, Babcock GJ, Greenough T, Ambrosino DM, Alvarez R, Callaway J, Cavitt S, Kamrud K, Alterson H, Smith J, Harcourt JL, Miao C, Razdan R, Comer JA, Rollin PE, Ksiazek TG, Sanchez A, Rota PA, Bellini WJ, Anderson LJ |date=September 2005 |title=Monoclonal antibodies to SARS-associated coronavirus (SARS-CoV): identification of neutralizing and antibodies reactive to S, N, M and E viral proteins |journal=Journal of Virological Methods |volume=128 |issue=1–2 |pages=21–28 |doi=10.1016/j.jviromet.2005.03.021 |pmc=7112802 |pmid=15885812}}</ref><ref name="PMID 16453264">{{cite journal |vauthors=Roberts A, Thomas WD, Guarner J, Lamirande EW, Babcock GJ, Greenough TC, Vogel L, Hayes N, Sullivan JL, Zaki S, Subbarao K, Ambrosino DM |date=March 2006 |title=Therapy with a severe acute respiratory syndrome-associated coronavirus-neutralizing human monoclonal antibody reduces disease severity and viral burden in golden Syrian hamsters |journal=The Journal of Infectious Diseases |volume=193 |issue=5 |pages=685–692 |doi=10.1086/500143 |pmc=7109703 |pmid=16453264}}</ref> There is no cure or vaccine proven to be safe and effective against SARS in humans.<ref name="JiangFutureVirology">{{cite journal |vauthors=Jiang S, Lu L, Du L |date=January 2013 |title=Development of SARS vaccines and therapeutics is still needed |journal=Future Virology |volume=8 |issue=1 |pages=1–2 |doi=10.2217/fvl.12.126 |pmc=7079997 |pmid=32201503}}</ref><ref>{{cite web |date=5 March 2020|title=SARS (severe acute respiratory syndrome)|url=https://www.nhs.uk/conditions/sars/|archive-url=https://web.archive.org/web/20200309174230/https://www.nhs.uk/conditions/sars/|archive-date=9 March 2020|url-status=live|access-date=31 January 2020|publisher=National Health Service}}</ref> There is also no proven vaccine against MERS.<ref>{{cite journal |vauthors=Shehata MM, Gomaa MR, Ali MA, Kayali G |date=June 2016 |title=Middle East respiratory syndrome coronavirus: a comprehensive review |journal=Frontiers of Medicine |volume=10 |issue=2 |pages=120–136 |doi=10.1007/s11684-016-0430-6 |pmc=7089261 |pmid=26791756}}</ref> When MERS became prevalent, it was believed that previous SARS research might provide a useful template for developing MERS vaccines.<ref name="JiangFutureVirology" /><ref name="Butler3oct2013">{{cite journal |vauthors=Butler D |date=October 2012 |title=SARS veterans tackle coronavirus |journal=Nature |volume=490 |issue=7418 |page=20 |bibcode=2012Natur.490...20B |doi=10.1038/490020a |pmid=23038444 | title-link = doi | doi-access = free }}</ref> As of March 2020, there was one (DNA-based) MERS vaccine that completed Phase{{spaces}}I clinical trials in humans,<ref>{{cite journal |vauthors=Modjarrad K, Roberts CC, Mills KT, Castellano AR, Paolino K, Muthumani K, Reuschel EL, Robb ML, Racine T, Oh MD, Lamarre C, Zaidi FI, Boyer J, Kudchodkar SB, Jeong M, Darden JM, Park YK, Scott PT, Remigio C, Parikh AP, Wise MC, Patel A, Duperret EK, Kim KY, Choi H, White S, Bagarazzi M, May JM, Kane D, Lee H, Kobinger G, Michael NL, Weiner DB, Thomas SJ, Maslow JN |date=September 2019 |title=Safety and immunogenicity of an anti-Middle East respiratory syndrome coronavirus DNA vaccine: a phase 1, open-label, single-arm, dose-escalation trial |journal=The Lancet. Infectious Diseases |volume=19 |issue=9 |pages=1013–1022 |doi=10.1016/S1473-3099(19)30266-X |pmc=7185789 |pmid=31351922 | title-link = doi | doi-access = free }}</ref> and three others in progress, all being viral-vectored vaccines: two based on [[Adenoviridae|adenoviruses]] and one on [[Modified vaccinia Ankara|MVA]].<ref>{{cite journal |vauthors=Yong CY, Ong HK, Yeap SK, Ho KL, Tan WS |year=2019 |title=Recent Advances in the Vaccine Development Against Middle East Respiratory Syndrome-Coronavirus |journal=Frontiers in Microbiology |volume=10 |article-number=1781 |doi=10.3389/fmicb.2019.01781 |pmc=6688523 |pmid=31428074 | title-link = doi | doi-access = free }}</ref>

      Vaccines that use an inactive or weakened virus that has been grown in eggs typically take more than a decade to develop.<ref name="Moderna and Pfizer Are Reinventing Vaccines">{{cite news |vauthors=Loftus P, Hopkins JS, Pancevski B |title=Moderna and Pfizer Are Reinventing Vaccines, Starting With Covid |url=https://www.wsj.com/articles/moderna-and-pfizer-are-reinventing-vaccines-starting-with-covid-11605638892 |access-date=4 October 2021 |work=[[The Wall Street Journal]] |date=17 November 2020 |archive-date=6 November 2021 |archive-url=https://web.archive.org/web/20211106035936/https://www.wsj.com/articles/moderna-and-pfizer-are-reinventing-vaccines-starting-with-covid-11605638892 |url-status=live }}</ref><ref>{{cite journal | vauthors = Sharma O, Sultan AA, Ding H, Triggle CR | title = A Review of the Progress and Challenges of Developing a Vaccine for COVID-19 | journal = Frontiers in Immunology | volume = 11 | article-number = 585354 | date = 14 October 2020 | pmid = 33163000 | pmc = 7591699 | doi = 10.3389/fimmu.2020.585354 | title-link = doi | doi-access = free }}</ref> In contrast, mRNA is a molecule that can be made quickly, and research on mRNA to fight diseases was begun decades before the COVID{{nbhyph}}19 pandemic by scientists such as [[Drew Weissman]] and [[Katalin Karikó]], who tested on mice. [[Moderna]] began human testing of an [[mRNA vaccine]] in 2015.<ref name="Moderna and Pfizer Are Reinventing Vaccines"/> [[Viral vector vaccine]]s were also developed for the COVID{{nbhyph}}19 pandemic after the technology was previously cleared for Ebola.<ref name="Moderna and Pfizer Are Reinventing Vaccines"/>

      == Vaccine technologies ==
      [[File:Vaccine candidate mechanisms for SARS-CoV-2 (49948301838).jpg|thumb|upright=1.3|A conceptual diagram showing three vaccine types for forming SARS‑CoV‑2 proteins to prompt an immune response: (1) [[RNA vaccine]]; (2) [[subunit vaccine]]; (3) [[viral vector]] vaccine]]

      [[File:Fimmu-11-579250-g004.jpg|thumb|upright=1.3|Vaccine platforms that are being employed for SARS-CoV-2. Whole-virus vaccines include both [[Attenuated vaccine|attenuated]] and [[Inactivated vaccine|inactivated]] forms of the virus. Protein and [[Peptide vaccine|peptide]] [[Subunit vaccine|subunit]] vaccines are usually combined with an [[Immunologic adjuvant|adjuvant]]  to enhance immunogenicity. The main emphasis in SARS-CoV-2 vaccine development has been on using the whole [[coronavirus spike protein|spike protein]] in its trimeric form, or its components, such as the [[Binding domain|RBD]] region. Multiple non-replicating [[viral vector vaccine]]s have been developed, particularly focused on [[Adenoviridae|adenovirus]], while there has been less emphasis on the replicating viral vector constructs.<ref>{{cite journal |vauthors=Flanagan KL, Best E, Crawford NW, Giles M, Koirala A, Macartney K, Russell F, Teh BW, Wen SC |date=2020 |title=Progress and Pitfalls in the Quest for Effective SARS-CoV-2 (COVID-19) Vaccines |journal=Frontiers in Immunology |volume=11 |article-number=579250 |doi=10.3389/fimmu.2020.579250 |pmc=7566192 |pmid=33123165 | title-link = doi | doi-access = free }}</ref>]] The initial focus of SARS-CoV-2 vaccines was on preventing symptomatic, often severe, illness.<ref>{{cite journal | vauthors = Subbarao K |date=July 2021 |title=The success of SARS-CoV-2 vaccines and challenges ahead |journal=Cell Host & Microbe |volume=29 |issue=7 |pages=1111–1123 |doi=10.1016/j.chom.2021.06.016 |pmc=8279572 |pmid=34265245 | title-link = doi | doi-access = free }}</ref> Most of the first COVID{{nbhyph}}19 vaccines were two-dose vaccines. Exceptions were the single-dose vaccines [[Convidecia]]<ref name="WHO - Convidecia">{{cite web |title=The CanSino Biologics Ad5-nCoV-S [recombinant] COVID-19 vaccine: What you need to know |url=https://www.who.int/news-room/feature-stories/detail/the--cansino-biologics-ad5-ncov-s--recombinant---covid-19-vaccine--what-you-need-to-know |website=www.who.int |access-date=12 July 2024 |archive-date=12 July 2024 |archive-url=https://web.archive.org/web/20240712043128/https://www.who.int/news-room/feature-stories/detail/the--cansino-biologics-ad5-ncov-s--recombinant---covid-19-vaccine--what-you-need-to-know |url-status=live }}</ref> and the [[Janssen COVID‑19 vaccine]],<ref name="Rogers_2022" /> and vaccines with three-dose schedules, [[Razi Cov Pars]]<ref name="Razi Cov Pars phase 1 trial">{{cite journal | vauthors = Dodaran MS, Banihashemi SR, Es-haghi A, Mehrabadi MH, Nofeli M, Mokarram AR, Mokhberalsafa L, Sadeghi F, Ranjbar A, Ansarifar A, Mohazzab A, Setarehdan SA, Bagheri Amiri F, Mohseni V, Hajimoradi M, Ghahremanzadeh N, Razzaz SH, Masoomi S, Taghdiri M, Bagheri M, Lofti M, Khorasani A, Ghader M, Safari S, Shahsavn M, Kalantari S |title=Immunogenicity and Safety of a Combined Intramuscular/Intranasal Recombinant Spike Protein COVID-19 Vaccine (RCP) in Healthy Adults Aged 18 to 55 Years Old: A Randomized, Double-Blind, Placebo-Controlled, Phase I Trial |journal=Vaccines |date=16 February 2023 |volume=11 |issue=2 |page=455 |doi=10.3390/vaccines11020455 |doi-access=free |pmid=36851334 |pmc=9961243 }}</ref> and [[Soberana Plus|Soberana]].<ref name="Soberana phase 1/2 trial">{{cite journal | vauthors = Puga-Gómez R, Ricardo-Delgado Y, Rojas-Iriarte C, Céspedes-Henriquez L, Piedra-Bello M, Vega-Mendoza D, Pérez NP, Paredes-Moreno B, Rodríguez-González M, Valenzuela-Silva C, Sánchez-Ramírez B, Rodríguez-Noda L, Pérez-Nicado R, González-Mugica R, Hernández-García T, Fundora-Barrios T, Echevarría MD, Enriquez-Puertas JM, Infante-Hernández Y, Palenzuela-Díaz A, Gato-Orozco E, Chappi-Estévez Y, Francisco-Pérez JC, Suarez-Martinez M, Castillo-Quintana IC, Fernandez-Castillo S, Climent-Ruiz Y, Santana-Mederos D, García-Vega Y, Toledo-Romani ME, Doroud D, Biglari A, Valdés-Balbín Y, García-Rivera D, Vérez-Bencomo V, Mesa-Herrera ME, García-Cristiá Y, Verdecia-Sánchez L, del Valle Rodríguez R, Oquendo-de la Cruz Y, Álvarez-Montalvo D, Grillo-Fortún R, López-González L, Galindo OF, Reyes-González Y, González-Álvarez AB, Gorrita-Mora L, Valera-Fernández R, Ontivero-Pino I, Martínez-Pérez M, Caballero-Gonzalez E, Garcés-Hechavarría A, Martínez-Bedoya D, Medina-Nápoles M, Domínguez-Pentón YR, Cazañas-Quintana Y, Barrios TF, Fernández DR, Bergado-Báez G, Orosa-Vazquez I, Pi-Estopiñan F, Díaz-Hernández M, Cruz-Sui O, Noa-Romero E, García-López A, Muro SR, Baro-Roman G |title=Open-label phase I/II clinical trial of SARS-CoV-2 receptor binding domain-tetanus toxoid conjugate vaccine (FINLAY-FR-2) in combination with receptor binding domain-protein vaccine (FINLAY-FR-1A) in children |journal=International Journal of Infectious Diseases |date=January 2023 |volume=126 |pages=164–173 |doi=10.1016/j.ijid.2022.11.016 |pmid=36403819 |pmc=9673084 }}</ref>

      In July 2021, at least nine different technology platforms were under research and development to create an effective vaccine against COVID{{nbhyph}}19.<ref name="thanh22">{{cite journal | vauthors=Le TT, Cramer JP, Chen R, Mayhew S |date=October 2020 |title=Evolution of the COVID-19 vaccine development landscape |journal=Nature Reviews. Drug Discovery |volume=19 |issue=10 |pages=667–68 |doi=10.1038/d41573-020-00151-8 |pmid=32887942 | title-link = doi | doi-access = free |s2cid=221503034}}</ref><ref name="london">{{cite web |date=12 July 2021 |title=COVID-19 vaccine tracker (Refresh URL to update) |url=https://vac-lshtm.shinyapps.io/ncov_vaccine_landscape/ |url-status=live |archive-url=https://web.archive.org/web/20201011084722/https://vac-lshtm.shinyapps.io/ncov_vaccine_landscape// |archive-date=11 October 2020 |access-date=10 March 2021 |publisher=[[London School of Hygiene & Tropical Medicine]]}}</ref> The [[coronavirus spike protein]] (S protein), with the virus uses to enter the cell, induces a strong immune response and is therefore the primary target of vaccines.<ref>{{Cite journal |last=Hadj Hassine |first=Ikbel |date=2022 |title=Covid‐19 vaccines and variants of concern: A review |url=https://onlinelibrary.wiley.com/doi/10.1002/rmv.2313 |journal=Reviews in Medical Virology |language=en |volume=32 |issue=4 |doi=10.1002/rmv.2313 |issn=1052-9276 |pmc=8646685 |pmid=34755408}}</ref><ref name="thanh22" /> 

      However, other coronavirus proteins were also being investigated for vaccine development, for example, the [[nucleocapsid]] proteins, because they also induce a robust T-cell response, while their genes are more conserved and recombine less frequently.<ref name="Grifoni_2020">{{cite journal |vauthors=Grifoni A, Weiskopf D, Ramirez SI, Mateus J, Dan JM, Moderbacher CR, Rawlings SA, Sutherland A, Premkumar L, Jadi RS, Marrama D, de Silva AM, Frazier A, Carlin AF, Greenbaum JA, Peters B, Krammer F, Smith DM, Crotty S, Sette A |date=June 2020 |title=Targets of T Cell Responses to SARS-CoV-2 Coronavirus in Humans with COVID-19 Disease and Unexposed Individuals |journal=Cell |volume=181 |issue=7 |pages=1489–1501.e15 |doi=10.1016/j.cell.2020.05.015 |pmc=7237901 |pmid=32473127 |bibcode=2020Cell..181.1489G }}</ref><ref>{{cite journal |vauthors=Dutta NK, Mazumdar K, Gordy JT |date=June 2020 |title=The Nucleocapsid Protein of SARS-CoV-2: a Target for Vaccine Development |journal=Journal of Virology |volume=94 |issue=13 |doi=10.1128/JVI.00647-20 |pmc=7307180 |pmid=32546606 |veditors=Dutch RE |article-number=e00647-20 }}</ref><ref>{{cite journal |vauthors=Nikolaidis M, Markoulatos P, Van de Peer Y, Oliver SG, Amoutzias GD |date=October 2021 |title=The neighborhood of the Spike gene is a hotspot for modular intertypic homologous and non-homologous recombination in Coronavirus genomes |journal=Molecular Biology and Evolution |volume=39 |article-number=msab292 |doi=10.1093/molbev/msab292 |pmc=8549283 |pmid=34638137 |veditors=Hepp C}}</ref> Future generations of COVID{{nbhyph}}19 vaccines targeting more conserved genomic regions could be used to treat future variations of SARS-CoV-2, or any similar coronavirus epidemic/pandemic.<ref>{{cite journal |vauthors=Amoutzias GD, Nikolaidis M, Tryfonopoulou E, Chlichlia K, Markoulatos P, Oliver SG |date=January 2022 |title=The Remarkable Evolutionary Plasticity of Coronaviruses by Mutation and Recombination: Insights for the COVID-19 Pandemic and the Future Evolutionary Paths of SARS-CoV-2 |journal=Viruses |volume=14 |issue=1 |page=78 |doi=10.3390/v14010078 |pmc=8778387 |pmid=35062282 | title-link = doi | doi-access = free }}</ref>

      Platforms developed in 2020 involved [[nucleic acid]] technologies ([[mRNA]] and [[DNA]]), non-replicating [[viral vector]]s, [[peptide]]s, [[recombinant protein]]s, live [[attenuated virus]]es, and [[Virus processing#Viral inactivation|inactivated viruses]].<ref name="thanh22" /><ref name="thanh" /><ref name="diamond" />

      Many vaccine technologies developed for COVID{{nbhyph}}19 use "next-generation" strategies for precise targeting of COVID{{nbhyph}}19 infection mechanisms.<ref name="thanh22" /><ref name="thanh" /><ref name="diamond" /> Several of the synthetic vaccines use a 2P mutation to lock the [[coronavirus spike protein|spike protein]] into its prefusion configuration, stimulating an [[adaptive immune response]] to the virus before it attaches to a human cell.<ref>{{cite magazine |date=29 September 2020 |title=The tiny tweak behind COVID-19 vaccines |url=https://cen.acs.org/pharmaceuticals/vaccines/tiny-tweak-behind-COVID-19/98/i38 |url-status=live |magazine=Chemical & Engineering News |volume=98 |issue=38 |archive-url=https://web.archive.org/web/20210216151009/https://cen.acs.org/pharmaceuticals/vaccines/tiny-tweak-behind-COVID-19/98/i38 |archive-date=16 February 2021 |access-date=15 April 2021 |vauthors=Cross R}}</ref> 

      === mRNA vaccines ===
      {{anchor|RNA-based}}
      {{Further|mRNA vaccine}}
      [[File:RNA vaccine illustration (en).jpg|thumb|right|Diagram of the operation of an [[RNA vaccine]]. [[Messenger RNA]] contained in the vaccine enters cells and is [[Translation (biology)|translated]] into viral proteins, which trigger an immune response.]]

      Several COVID{{nbhyph}}19 vaccines, such as the [[Pfizer–BioNTech COVID‑19 vaccine|Pfizer–BioNTech]] and [[Moderna COVID‑19 vaccine|Moderna]] vaccines, use [[RNA]] to stimulate an immune response. When introduced into human tissue, the vaccine contains [[messenger RNA]] (mRNA), which causes cells to express the SARS-CoV-2 [[spike protein]]. This teaches the [[immune system]] to identify and destroy the corresponding pathogen. RNA vaccines often use [[nucleoside-modified messenger RNA]]. The [[Drug delivery|delivery]] of mRNA is achieved by encapsulating the molecule in [[lipid nanoparticle]]s, which protect the RNA strands and help their uptake into the cells.<ref>{{cite journal |vauthors=Krammer F |date=October 2020 |title=SARS-CoV-2 vaccines in development |journal=Nature |volume=586 |issue=7830 |pages=516–527 |bibcode=2020Natur.586..516K |doi=10.1038/s41586-020-2798-3 |pmid=32967006 | title-link = doi | doi-access = free |s2cid=221887746}}</ref><ref name="pmid33340620">{{cite journal |vauthors=Park KS, Sun X, Aikins ME, Moon JJ |date=February 2021 |title=Non-viral COVID-19 vaccine delivery systems |journal=Advanced Drug Delivery Reviews |volume=169 |pages=137–151 |doi=10.1016/j.addr.2020.12.008 |issn=0169-409X |pmc=7744276 |pmid=33340620}}</ref><ref name="Kowalski">{{cite journal |vauthors=Kowalski PS, Rudra A, Miao L, Anderson DG |date=April 2019 |title=Delivering the Messenger: Advances in Technologies for Therapeutic mRNA Delivery |journal=Molecular Therapy |volume=27 |issue=4 |pages=710–728 |doi=10.1016/j.ymthe.2019.02.012 |pmc=6453548 |pmid=30846391}}</ref><ref name="Verbeke_2019">{{cite journal |vauthors=Verbeke R, Lentacker I, De Smedt SC, Dewitte H |date=October 2019 |title=Three decades of messenger RNA vaccine development |url=https://biblio.ugent.be/publication/8628303 |url-status=live |journal=Nano Today |volume=28 |article-number=100766 |doi=10.1016/j.nantod.2019.100766 |archive-url=https://web.archive.org/web/20211009201713/https://biblio.ugent.be/publication/8628303 |archive-date=9 October 2021 |access-date=17 January 2021 |hdl-access=free |hdl=1854/LU-8628303 |s2cid=202221207}}</ref>

      mRNA vaccines were the first COVID{{nbhyph}}19 vaccines authorised in the United Kingdom, the United States, and the European Union.<ref>{{cite web |title=COVID-19 ACIP Vaccine Recommendations |url=https://www.cdc.gov/vaccines/hcp/acip-recs/vacc-specific/covid-19.html |url-status=live |archive-url=https://web.archive.org/web/20211103224932/https://www.cdc.gov/vaccines/hcp/acip-recs/vacc-specific/covid-19.html |archive-date=3 November 2021 |access-date=18 February 2021 |website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref><ref>{{cite web |title=Safe COVID-19 vaccines for Europeans |url=https://ec.europa.eu/info/live-work-travel-eu/coronavirus-response/safe-covid-19-vaccines-europeans_en |url-status=live |archive-url=https://web.archive.org/web/20211104111910/https://ec.europa.eu/info/live-work-travel-eu/coronavirus-response/safe-covid-19-vaccines-europeans_en |archive-date=4 November 2021 |access-date=19 February 2021 |website=[[European Commission]]}}</ref> Authorized vaccines of this type include the Pfizer–BioNTech<wbr /><ref name="hcreg">{{cite web |date=9 December 2020 |title=Regulatory Decision Summary – Pfizer–BioNTech COVID-19 Vaccine |url=https://covid-vaccine.canada.ca/info/regulatory-decision-summary-detailTwo.html?linkID=RDS00730 |url-status=live |archive-url=https://web.archive.org/web/20210130120400/https://covid-vaccine.canada.ca/info/regulatory-decision-summary-detailTwo.html?linkID=RDS00730 |archive-date=30 January 2021 |access-date=9 December 2020 |publisher=Health Canada, Government of Canada}}</ref><ref name="NCT04368728">{{cite web |date=30 April 2020 |title=Study to Describe the Safety, Tolerability, Immunogenicity, and Efficacy of RNA Vaccine Candidates Against COVID-19 in Healthy Adults |url=https://clinicaltrials.gov/ct2/show/NCT04368728 |url-status=live |archive-url=https://web.archive.org/web/20201011084828/https://clinicaltrials.gov/ct2/show/NCT04368728/ |archive-date=11 October 2020 |access-date=14 July 2020 |website=[[ClinicalTrials.gov]] |id=NCT04368728}}</ref><ref name="EudraCT-2020-001038-36">{{cite web |date=14 April 2020 |title=A Multi-site Phase I/II, 2-Part, Dose-Escalation Trial Investigating the Safety and Immunogenicity of four Prophylactic SARS-CoV-2 RNA Vaccines Against COVID-19 Using Different Dosing Regimens in Healthy Adults |url=https://www.clinicaltrialsregister.eu/ctr-search/trial/2020-001038-36/DE |url-status=live |archive-url=https://web.archive.org/web/20200422111024/https://www.clinicaltrialsregister.eu/ctr-search/trial/2020-001038-36/DE |archive-date=22 April 2020 |access-date=22 April 2020 |website=EU Clinical Trials Register |id=[[EudraCT]] 2020-001038-36}}</ref> and Moderna vaccines.<ref name="NCT04470427">{{cite web |date=14 July 2020 |title=A Study to Evaluate Efficacy, Safety, and Immunogenicity of mRNA-1273 Vaccine in Adults Aged 18 Years and Older to Prevent COVID-19 |url=https://clinicaltrials.gov/ct2/show/NCT04470427 |url-status=live |archive-url=https://web.archive.org/web/20201011084833/https://clinicaltrials.gov/ct2/show/NCT04470427/ |archive-date=11 October 2020 |access-date=27 July 2020 |website=[[ClinicalTrials.gov]] |id=NCT04470427}}</ref><ref name="palca">{{cite news |date=27 July 2020 |title=COVID-19 vaccine candidate heads to widespread testing in U.S. |publisher=NPR |url=https://www.npr.org/sections/coronavirus-live-updates/2020/07/27/895672859/us-vaccine-candidate-heads-to-widespread-testing-in-people |url-status=live |access-date=27 July 2020 |archive-url=https://web.archive.org/web/20201011084836/https://www.npr.org/sections/coronavirus-live-updates/2020/07/27/895672859/us-vaccine-candidate-heads-to-widespread-testing-in-people/ |archive-date=11 October 2020 |vauthors=Palca J}}</ref> The [[CVnCoV]] mRNA vaccine from [[CureVac]] failed in clinical trials.<ref>{{cite press release |title=CureVac Final Data from Phase 2b/3 Trial of First-Generation COVID-19 Vaccine Candidate, CVnCoV, Demonstrates Protection in Age Group of 18 to 60 |date=30 June 2021 |url=https://www.curevac.com/en/2021/06/30/curevac-final-data-from-phase-2b-3-trial-of-first-generation-covid-19-vaccine-candidate-cvncov-demonstrates-protection-in-age-group-of-18-to-60/ |access-date=2 July 2021 |website=CureVac |archive-date=12 October 2021 |archive-url=https://web.archive.org/web/20211012213635/https://www.curevac.com/en/2021/06/30/curevac-final-data-from-phase-2b-3-trial-of-first-generation-covid-19-vaccine-candidate-cvncov-demonstrates-protection-in-age-group-of-18-to-60/}}</ref>

      Severe allergic reactions to the mRNA vaccines are rare. In December 2020, 1,893,360 first doses of Pfizer–BioNTech COVID{{nbhyph}}19 vaccine administration resulted in 175 cases of severe allergic reactions, of which 21 were [[anaphylaxis]].<ref name="pmid33571463">{{cite journal |vauthors=Moghimi SM |date=March 2021 |title=Allergic Reactions and Anaphylaxis to LNP-Based COVID-19 Vaccines |journal=Molecular Therapy |volume=29 |issue=3 |pages=898–900 |doi=10.1016/j.ymthe.2021.01.030 |pmc=7862013 |pmid=33571463}}</ref> For 4,041,396 Moderna COVID{{nbhyph}}19 vaccine dose administrations in December 2020 and January 2021, only ten cases of anaphylaxis were reported.<ref name="pmid33571463" /> [[Solid lipid nanoparticle|Lipid nanoparticles]] (LNPs) were most likely responsible for the allergic reactions.<ref name="pmid33571463" />

      In May 2025, a different version of the Moderna COVID-19 vaccine, with the brand name Mnexspike (mRNA-1283), was approved for medical use in the United States.<ref>{{cite web | title=Mnexspike | website=U.S. Food and Drug Administration | date=30 May 2025 | url=https://www.fda.gov/vaccines-blood-biologics/mnexspike | access-date=6 July 2025}}</ref><ref>{{cite web | title=COVID-19 Update: mNEXSPIKE — A New Moderna mRNA Vaccine for COVID-19 | website=The Medical Letter | date=6 July 2025 | url=https://secure.medicalletter.org/TML-article-5111a | access-date=6 July 2025 | archive-date=6 July 2025 | archive-url=https://web.archive.org/web/20250706065155/https://secure.medicalletter.org/TML-article-5111a | url-status=live }}</ref><ref>{{cite press release | title=Moderna Receives U.S. FDA Approval for COVID-19 Vaccine mNEXSPIKE | website=Moderna | date=31 May 2025 | url=https://investors.modernatx.com/news/news-details/2025/Moderna-Receives-U-S--FDA-Approval-for-COVID-19-Vaccine-mNEXSPIKE/default.aspx | access-date=6 July 2025 | archive-date=6 July 2025 | archive-url=https://web.archive.org/web/20250706070148/https://investors.modernatx.com/news/news-details/2025/Moderna-Receives-U-S--FDA-Approval-for-COVID-19-Vaccine-mNEXSPIKE/default.aspx | url-status=live }}</ref>

      In June 2025, the [[European Medicines Agency]] announced that it was making data from the marketing authorization applications for COVID{{nbhyph}}19 mRNA vaccines [[Comirnaty]] and [[Spikevax]] publicly available.<ref name="EMA Transparency">{{cite web | title=Transparency: exceptional measures for COVID-19 medicines | website=[[European Medicines Agency]] (EMA) | date=19 October 2020 | url=https://www.ema.europa.eu/en/human-regulatory-overview/public-health-threats/coronavirus-disease-covid-19/covid-19-medicines/transparency-exceptional-measures-covid-19-medicines | access-date=1 July 2025}}</ref><ref name="Comirnaty EPAR">{{cite web | title=Comirnaty EPAR | website=[[European Medicines Agency]] (EMA) | date=23 December 2020 | url=https://www.ema.europa.eu/en/medicines/human/EPAR/comirnaty | access-date=1 July 2025 | archive-date=18 December 2021 | archive-url=https://web.archive.org/web/20211218220137/https://www.ema.europa.eu/en/medicines/human/EPAR/comirnaty | url-status=live }}</ref><ref name="Spikevax EPAR">{{cite web | title=Spikevax (previously COVID-19 Vaccine Moderna) EPAR | website=[[European Medicines Agency]] (EMA) | date=20 January 2021 | url=https://www.ema.europa.eu/en/medicines/human/EPAR/spikevax | access-date=1 July 2025 | archive-date=1 February 2022 | archive-url=https://web.archive.org/web/20220201080914/https://www.ema.europa.eu/en/medicines/human/EPAR/spikevax | url-status=live }}</ref>

      === Viral vector vaccines ===
      {{anchor|viral vector}}Viral vector vaccines use a modified version of a virus to generate immunity. For COVID-19, these vaccines were based of a modified [[Adenoviridae|adenovirus]], which normally causes the [[common cold]]. It is first made harmless, by removing the genes that cause illness and those responsible for replication. The virus is further modified so that it contains DNA that encodes a SARS‑CoV‑2 protein.<ref name="vv-gavi">{{cite web |year=2020 |title=What are viral vector-based vaccines and how could they be used against COVID-19? |url=https://www.gavi.org/vaccineswork/what-are-viral-vector-based-vaccines-and-how-could-they-be-used-against-covid-19 |url-status=live |archive-url=https://web.archive.org/web/20211111054019/https://www.gavi.org/vaccineswork/what-are-viral-vector-based-vaccines-and-how-could-they-be-used-against-covid-19 |archive-date=11 November 2021 |access-date=26 January 2021 |publisher=[[GAVI|Gavi, the Vaccine Alliance]] (GAVI)}}</ref><ref>{{cite web |date=13 April 2021 |title=Understanding Viral Vector COVID-19 Vaccines |url=https://www.cdc.gov/coronavirus/2019-ncov/vaccines/different-vaccines/viralvector.html |url-status=live |archive-url=https://web.archive.org/web/20211113223939/https://www.cdc.gov/coronavirus/2019-ncov/vaccines/different-vaccines/viralvector.html |archive-date=13 November 2021 |access-date=19 April 2021 |website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref> As such, the virus in the vaccine does not make new adenovirus copies, but only produces the antigen that elicits a systemic immune response.<ref name="vv-gavi" />

      Unlike mRNA vaccines, which usually require freezer storage, DNA vaccines such as adenovirus vector vaccines can be kept in a fridge.<ref name="Pardi2018mRNAvsDNA">{{cite journal |vauthors=Pardi N, Hogan MJ, Porter FW, Weissman D |date=April 2018 |title=mRNA vaccines - a new era in vaccinology |journal=Nature Reviews. Drug Discovery |volume=17 |issue=4 |pages=261–279 |doi=10.1038/nrd.2017.243 |pmid=29326426 |pmc=5906799 |bibcode=2018NRvDD..17..261P }}</ref>

      Authorized [[Viral vector#Vaccines|vaccines of this type]] include the [[Oxford–AstraZeneca COVID‑19 vaccine]],<wbr /><ref name="NCT04400838">{{cite web |date=26 May 2020 |title=Investigating a Vaccine Against COVID-19 |url=https://clinicaltrials.gov/ct2/show/NCT04400838 |url-status=live |archive-url=https://web.archive.org/web/20201011084750/https://clinicaltrials.gov/ct2/show/NCT04400838/ |archive-date=11 October 2020 |access-date=14 July 2020 |website=[[ClinicalTrials.gov]] |id=NCT04400838}}</ref><ref name="EudraCT-2020-001228-32">{{cite web |date=21 April 2020 |title=A Phase 2/3 study to determine the efficacy, safety and immunogenicity of the candidate Coronavirus Disease (COVID-19) vaccine ChAdOx1 nCoV-19 |url=https://www.clinicaltrialsregister.eu/ctr-search/trial/2020-001228-32/GB |url-status=live |archive-url=https://web.archive.org/web/20201005201654/https://www.clinicaltrialsregister.eu/ctr-search/trial/2020-001228-32/GB |archive-date=5 October 2020 |access-date=3 August 2020 |website=EU Clinical Trials Register |id=[[EudraCT]] 2020-001228-32}}</ref><ref name="ISRCTN89951424">{{cite journal |vauthors=O'Reilly P |date=May 2020 |title=A Phase III study to investigate a vaccine against COVID-19 |doi=10.1186/ISRCTN89951424 | title-link = doi | doi-access = free |website=ISRCTN Registry}}</ref> the [[Sputnik V COVID‑19 vaccine]],<ref name="sputnik">{{cite news |date=8 January 2021 |title=How Gamaleya's Vaccine Works |work=[[The New York Times]] |url=https://www.nytimes.com/interactive/2021/health/gamaleya-covid-19-vaccine.html |url-status=live |access-date=27 January 2021 |archive-url=https://web.archive.org/web/20210420022117/https://www.nytimes.com/interactive/2021/health/gamaleya-covid-19-vaccine.html |archive-date=20 April 2021 |vauthors=Corum J, Carl Z}}</ref> [[Convidecia]], and the [[Janssen COVID‑19 vaccine]].<ref name="NCT04436276">{{cite web |date=4 August 2020 |title=A Study of Ad26.COV2.S in Adults |url=https://clinicaltrials.gov/ct2/show/NCT04436276 |url-status=live |archive-url=https://web.archive.org/web/20200916063346/https://clinicaltrials.gov/ct2/show/NCT04436276 |archive-date=16 September 2020 |access-date=23 August 2020}}</ref><ref name="NCT04505722">{{cite web |title=A Study of Ad26.COV2.S for the Prevention of SARS-CoV-2-Mediated COVID-19 in Adult Participants |url=https://clinicaltrials.gov/ct2/show/NCT04505722 |url-status=live |archive-url=https://web.archive.org/web/20200926145744/https://clinicaltrials.gov/ct2/show/NCT04505722 |archive-date=26 September 2020 |publisher=US National Library of Medicine}}</ref>

      [[Sputnik V COVID‑19 vaccine|Sputnik V]] uses Ad26 for its first dose, which is the same as Janssen's only dose, and Ad5 for the second dose, which is the same as Convidecia's only dose.<ref>{{cite journal |vauthors=Wu S, Zhong G, Zhang J, Shuai L, Zhang Z, Wen Z, Wang B, Zhao Z, Song X, Chen Y, Liu R, Fu L, Zhang J, Guo Q, Wang C, Yang Y, Fang T, Lv P, Wang J, Xu J, Li J, Yu C, Hou L, Bu Z, Chen W |date=August 2020 |title=A single dose of an adenovirus-vectored vaccine provides protection against SARS-CoV-2 challenge |journal=Nat Commun |volume=11 |issue=1 |article-number=4081 |bibcode=2020NatCo..11.4081W |doi=10.1038/s41467-020-17972-1 |pmc=7427994 |pmid=32796842}}</ref> In August 2021, the [[Russian Direct Investment Fund|developers of Sputnik V]] proposed, in view of the Delta case surge, that Pfizer test the Ad26 component (termed its 'Light' version)<ref>{{cite press release |title=Single dose vaccine, Sputnik Light, authorized for use in Russia |url=https://sputnikvaccine.com/newsroom/pressreleases/single-dose-vaccine-sputnik-light-authorized-for-use-in-russia/ |access-date=12 August 2021 |website=Sputnik V |archive-date=14 November 2021 |archive-url=https://web.archive.org/web/20211114232050/https://sputnikvaccine.com/newsroom/pressreleases/single-dose-vaccine-sputnik-light-authorized-for-use-in-russia/ |url-status=live}}</ref> as a booster shot.<ref>{{cite tweet|number=1390274722487746563|user=sputnikvaccine|title=Introducing a new member of the Sputnik family - a single dose Sputnik Light! It's a revolutionary 1-shot COVID-19 vaccine with 80% efficacy - higher than many 2-shot vaccines. Sputnik Light will double vaccination rates and help to handle epidemic peaks https://t.co/BCybe8yYWU|author=Sputnik V|author-link=Sputnik V|date=6 May 2021|access-date=8 December 2022|archive-url=https://web.archive.org/web/20220508165229/https://twitter.com/sputnikvaccine/status/1390274722487746563|archive-date=8 May 2022|url-status=live}}</ref>

      === Inactivated virus vaccines ===
      {{anchor|inactivated}}

      [[Inactivated vaccine]]s consist of virus particles grown in [[Microbiological culture|culture]] and then inactivated by methods such as heat or [[formaldehyde]], thereby losing their disease-producing capacity while still stimulating an immune response.<ref name="PetrovskyAguilar2004">{{cite journal |vauthors=Petrovsky N, Aguilar JC |date=October 2004 |title=Vaccine adjuvants: current state and future trends |journal=Immunology and Cell Biology |volume=82 |issue=5 |pages=488–496 |doi=10.1111/j.0818-9641.2004.01272.x |pmid=15479434 |s2cid=154670}}</ref>

      Inactivated virus COVID-19 vaccines are less efficient than mRNA vaccines, because the process of de-activating the virus causes the spike protein to change slightly, whereas mRNA vaccines show the spike protein in its normal state. This makes parts of the protein inaccessible to the immune system. The immunity does not last as long as with mRNA vaccines, so that additional boosters are required to maintain immunity.<ref>{{cite journal | vauthors = Azeem M, Cancemi P, Mukhtar F, Marino S, Peri E, Di Prima G, De Caro V | title = Efficacy and limitations of SARS-CoV-2 vaccines - A systematic review | journal = Life Sciences | volume = 371 | article-number = 123610 | date = June 2025 | pmid = 40189198 | doi = 10.1016/j.lfs.2025.123610 | hdl-access = free | hdl = 10447/679143 }}</ref>

      Inactivated virus vaccines authorized in China include the Chinese [[CoronaVac]]<ref name="NCT04383574">{{cite web |date=12 May 2020 |title=Safety and Immunogenicity Study of Inactivated Vaccine for Prevention of SARS-CoV-2 Infection (COVID-19) (Renqiu) |url=https://clinicaltrials.gov/ct2/show/NCT04383574 |url-status=live |archive-url=https://web.archive.org/web/20201011084809/https://clinicaltrials.gov/ct2/show/NCT04383574/ |archive-date=11 October 2020 |access-date=14 July 2020 |website=[[ClinicalTrials.gov]] |id=NCT04383574}}</ref><ref name="NCname= nct04456595=">{{cite web |date=2 July 2020 |title=Clinical Trial of Efficacy and Safety of Sinovac's Adsorbed COVID-19 (Inactivated) Vaccine in Healthcare Professionals (PROFISCOV) |url=https://clinicaltrials.gov/ct2/show/NCT04456595 |url-status=live |archive-url=https://web.archive.org/web/20201011084811/https://clinicaltrials.gov/ct2/show/NCT04456595/ |archive-date=11 October 2020 |access-date=3 August 2020 |website=[[ClinicalTrials.gov]] |id=NCT04456595}}</ref><ref name="PT_Bio_Farma">{{cite journal |author=PT. Bio Farma |date=August 2020 |title=A Phase III, observer-blind, randomized, placebo-controlled study of the efficacy, safety, and immunogenicity of SARS-COV-2 inactivated vaccine in healthy adults aged 18–59 years in Indonesia |url=https://www.ina-registry.org/index.php?act=registry_trial_detail&code_trial=16202009080721WXFM0YX |journal=Registri Penyakit Indonesia |archive-url=https://web.archive.org/web/20201011084814/https://www.ina-registry.org/index.php?act=registry_trial_detail&code_trial=16202009080721WXFM0YX%2F |archive-date=11 October 2020 |access-date=15 August 2020}}</ref> and the Sinopharm [[Sinopharm BIBP COVID‑19 vaccine|BIBP]]<wbr /><ref name="ChiCTR2000034780">{{cite journal |vauthors=Chen W, Al Kaabi N |date=July 2020 |title=A Phase III clinical trial for inactivated novel coronavirus pneumonia (COVID-19) vaccine (Vero cells) |url=http://www.chictr.org.cn/showprojen.aspx?proj=56651 |url-status=live |journal=Chinese Clinical Trial Registry |archive-url=https://web.archive.org/web/20201011084800/http://www.chictr.org.cn/showprojen.aspx?proj=56651%2F |archive-date=11 October 2020 |access-date=15 August 2020}}</ref> and [[Sinopharm WIBP COVID‑19 vaccine|WIBP]] vaccines; there is also the Indian [[BBV152|Covaxin]], the Russian [[CoviVac (Russia COVID‑19 vaccine)|CoviVac]],<ref>{{cite web |date=20 February 2021 |title=Russia approves its third COVID-19 vaccine, CoviVac |url=https://www.reuters.com/article/us-health-coronavirus-russia-vaccine-idUSKBN2AK07H |url-status=live |archive-url=https://web.archive.org/web/20210228221729/https://www.reuters.com/article/us-health-coronavirus-russia-vaccine-idUSKBN2AK07H |archive-date=28 February 2021 |access-date=11 April 2021 |website=Reuters |vauthors=Ivanova P}}</ref> the [[Kazakhstan|Kazakh]] vaccine [[QazVac]],<ref>{{cite web |date=27 April 2021 |title=Kazakhstan rolls out its own COVID-19 vaccine |url=https://www.reuters.com/business/healthcare-pharmaceuticals/kazakhstan-rolls-out-its-own-covid-19-vaccine-2021-04-27/ |url-status=live |archive-url=https://web.archive.org/web/20211104170721/https://www.reuters.com/business/healthcare-pharmaceuticals/kazakhstan-rolls-out-its-own-covid-19-vaccine-2021-04-27/ |archive-date=4 November 2021 |access-date=2 July 2021 |website=Reuters}}</ref> and the Iranian [[COVIran Barekat]].<ref>{{cite web |date=14 June 2021 |title=FarsNews Agency Iran Licenses Emergency Injection of Home-Made Anti-Coronavirus Vaccine |url=https://www.farsnews.ir/en/news/14000324000606/Iran-Licenses-Emergency-Injecin-f-Hme-Made-Ani-Crnavirs-Vaccine |url-status=live |archive-url=https://web.archive.org/web/20211009201716/https://www.farsnews.ir/en/news/14000324000606/Iran-Licenses-Emergency-Injecin-f-Hme-Made-Ani-Crnavirs-Vaccine |archive-date=9 October 2021 |access-date=25 August 2021 |website=Fars News Agency}}</ref>

      === Subunit vaccines ===
      {{anchor|protein subunit}}
      [[File:Novavax_vaccine_for_COVID-19.jpg|thumb|251x251px|Vial of Novavax vaccine from clinical trials at [[Thackray Museum of Medicine]]<ref>{{Cite web |title=2022.0001 {{!}} Collections Online |url=https://collections.thackraymuseum.co.uk/object-2022-0001 |access-date=21 May 2024 |website=collections.thackraymuseum.co.uk}}</ref>]]
      [[Subunit vaccine]]s present one or more [[antigen]]s without introducing whole pathogen particles. The antigens involved are often [[protein subunit]]s, but they can be any pathogen-derived molecule or its fragment.<ref>{{cite web |title=Module 2 – Subunit vaccines |url=https://vaccine-safety-training.org/subunit-vaccines.html |url-status=live |archive-url=https://web.archive.org/web/20210808211206/https://vaccine-safety-training.org/subunit-vaccines.html |archive-date=8 August 2021 |access-date=17 January 2021 |website=WHO Vaccine Safety Basics}}</ref>

      The authorized vaccines of this type include the [[peptide vaccine]] [[ZF2001]],<ref name="london" /> [[MVC COVID‑19 vaccine|MVC-COV1901]],<ref>{{cite web |title=MVC COVID-19 Vaccine Obtains Taiwan EUA Approval |url=https://www.medigenvac.com/public/en/news/detail/83 |archive-url=https://web.archive.org/web/20211127023011/https://www.medigenvac.com/public/en/news/detail/83 |archive-date=27 November 2021 |access-date=7 August 2021 |website=Medigen Vaccine Biologics}}</ref> [[Corbevax]],<ref>{{cite web |date=28 December 2021 |title=India Clears 2 New Vaccines And Merck's Covid Pill: 10 Points |url=https://www.ndtv.com/india-news/coronavirus-2-more-vaccines-covovax-and-corbevax-and-anti-viral-drug-molnupiravir-cleared-in-india-2675170 |url-status=live |archive-url=https://web.archive.org/web/20211228054125/https://www.ndtv.com/india-news/coronavirus-2-more-vaccines-covovax-and-corbevax-and-anti-viral-drug-molnupiravir-cleared-in-india-2675170 |archive-date=28 December 2021 |access-date=19 January 2022 |website=NDTV.com |vauthors=Achom D}}</ref><ref>{{cite web |date=30 December 2021 |title=A COVID Vaccine for All |url=https://www.scientificamerican.com/article/a-covid-vaccine-for-all/ |url-status=live |archive-url=https://web.archive.org/web/20211230172714/https://www.scientificamerican.com/article/a-covid-vaccine-for-all/ |archive-date=30 December 2021 |access-date=19 January 2022 |website=Scientific American |vauthors=Bottazzi ME, Hotez PJ}}</ref> the [[Sanofi–GSK COVID‑19 vaccine|Sanofi–GSK vaccine]],<ref name="VidPrevtyn Beta EPAR">{{cite web |date=4 November 2022 |title=VidPrevtyn Beta |url=https://www.ema.europa.eu/en/medicines/human/EPAR/vidprevtyn-beta |access-date=12 November 2022 |website=[[European Medicines Agency]] (EMA) |archive-date=11 November 2022 |archive-url=https://web.archive.org/web/20221111174057/https://www.ema.europa.eu/en/medicines/human/EPAR/vidprevtyn-beta |url-status=live }} Text was copied from this source which is copyright European Medicines Agency. Reproduction is authorized provided the source is acknowledged.</ref><ref name="EMA PR 20221110">{{cite press release |title=EMA recommends approval of VidPrevtyn Beta as a COVID-19 booster vaccine |website=[[European Medicines Agency]] (EMA) |date=10 November 2022 |url=https://www.ema.europa.eu/en/news/ema-recommends-approval-vidprevtyn-beta-covid-19-booster-vaccine |access-date=12 November 2022 |archive-date=12 November 2022 |archive-url=https://web.archive.org/web/20221112070932/https://www.ema.europa.eu/en/news/ema-recommends-approval-vidprevtyn-beta-covid-19-booster-vaccine |url-status=live }} Text was copied from this source which is copyright European Medicines Agency. Reproduction is authorized provided the source is acknowledged.</ref> and [[Soberana 02]] (a [[conjugate vaccine]]).<ref>{{cite web|date=26 April 2021|title=Iran-Cuba vaccine enters phase three clinical trials|url=https://www.tehrantimes.com/news/460275/Iran-Cuba-vaccine-enters-phase-three-clinical-trials|access-date=7 September 2021|website=Tehran Times|archive-date=19 July 2021|archive-url=https://web.archive.org/web/20210719231941/https://www.tehrantimes.com/news/460275/Iran-Cuba-vaccine-enters-phase-three-clinical-trials|url-status=live}}</ref> [[Bimervax]] (selvacovatein) was approved for use as a booster vaccine in the European Union in March 2023.<ref>{{cite web | vauthors=Barrie R | title=Hipra's Covid-19 booster gets EMA nod and enters an uncertain landscape | website=Pharmaceutical Technology | date=31 March 2023 | url=https://www.pharmaceutical-technology.com/news/hipras-covid-19-booster-gets-ema-nod-to-enter-uncertain-landscape/ | access-date=9 April 2023 | archive-date=10 April 2023 | archive-url=https://web.archive.org/web/20230410045239/https://www.pharmaceutical-technology.com/news/hipras-covid-19-booster-gets-ema-nod-to-enter-uncertain-landscape/ | url-status=live }}</ref><ref>{{cite web | title=Bimervax EPAR | website=European Medicines Agency | date=5 April 2023 | url=https://www.ema.europa.eu/en/medicines/human/EPAR/bimervax | access-date=9 April 2023 | archive-date=8 April 2023 | archive-url=https://web.archive.org/web/20230408071014/https://www.ema.europa.eu/en/medicines/human/EPAR/bimervax | url-status=live }}</ref><ref>{{cite web | title=COVID-19 medicines | website=European Medicines Agency (EMA) | date=14 October 2024 | url=https://www.ema.europa.eu/en/human-regulatory-overview/public-health-threats/coronavirus-disease-covid-19/covid-19-medicines | access-date=14 October 2024}}</ref> The [[Novavax COVID‑19 vaccine]] is another subunit vaccine. This vaccine is produced by infecting moth cells with a modified [[Baculoviridae|baculovirus]] vector, which contains a gene for a [[Severe acute respiratory syndrome coronavirus 2|SARS-CoV-2]] [[coronavirus spike protein|spike protein]].<ref name="Hotez">{{cite journal |vauthors=Hotez PJ, Bottazzi ME |date=January 2022 |title=Whole Inactivated Virus and Protein-Based COVID-19 Vaccines |journal=Annual Review of Medicine |volume=73 |issue=1 |pages=55–64 |doi=10.1146/annurev-med-042420-113212 |issn=0066-4219 |pmid=34637324 |s2cid=238747462 |doi-access=free |title-link=doi}}</ref> 

      The clinical trials of [[V451 vaccine]] were terminated after it was found that the vaccine may potentially cause incorrect results for subsequent HIV testing.<wbr /><ref name="NCT04495933">{{cite web |date=3 August 2020 |title=A Study on the Safety, Tolerability and Immune Response of SARS-CoV-2 Sclamp (COVID-19) Vaccine in Healthy Adults |url=https://clinicaltrials.gov/ct2/show/NCT04495933 |url-status=live |archive-url=https://web.archive.org/web/20201011085041/https://clinicaltrials.gov/ct2/show/NCT04495933/ |archive-date=11 October 2020 |access-date=4 August 2020 |website=[[ClinicalTrials.gov]] |id=NCT04495933}}</ref><ref name="dwuq">{{cite news |title=Australian vaccine trials stopped due to HIV false positives |url=https://www.dw.com/en/australia-ends-local-covid-vaccine-trials-due-to-hiv-false-positives/a-55900847 |website=Deutsche Welle |date=11 December 2020 |access-date=9 January 2023 |archive-date=26 January 2021 |archive-url=https://web.archive.org/web/20210126235229/https://www.dw.com/en/australia-ends-local-covid-vaccine-trials-due-to-hiv-false-positives/a-55900847 |url-status=live }}</ref><ref>{{cite news | title=Covid: Australian vaccine abandoned over false HIV response | website=BBC News Online | date=11 December 2020 | url=https://www.bbc.com/news/world-australia-55269381 | access-date=9 April 2023 | archive-date=16 January 2021 | archive-url=https://web.archive.org/web/20210116134101/https://www.bbc.com/news/world-australia-55269381 | url-status=live }}</ref>

      {{anchor|virus-like particle}}

      [[Virus-like particle]] (VLP) vaccines are one type of subunit vaccines. They look similar to viruses, but do not contain any RNA or DNA, and are non-replicating. They can be stored in a fridge, rather than using extreme cold like mRNA vaccines. One such vaccine, [[Covifenz]], was authorized for use in 2022 in Canada, but later withdrawn.<ref>{{cite journal | vauthors = Bachmann MF, van Damme P, Lienert F, Schwarz TF | title = Virus-like particles: a versatile and effective vaccine platform | journal = Expert Review of Vaccines | volume = 24 | issue = 1 | pages = 444–456 | date = December 2025 | pmid = 40387310 | doi = 10.1080/14760584.2025.2508517 | doi-access = free }}</ref>

      === Other types ===
      Additional types of vaccines that are in clinical trials include multiple [[DNA vaccine|DNA plasmid vaccines]],<ref>{{cite web |date=15 December 2020 |title=A prospective, randomized, adaptive, phase I/II clinical study to evaluate the safety and immunogenicity of Novel Corona Virus −2019-nCov vaccine candidate of M/s Cadila Healthcare Limited by intradermal route in healthy subjects |url=http://www.ctri.nic.in/Clinicaltrials/pmaindet2.php?trialid=45306 |url-status=live |archive-url=https://web.archive.org/web/20201122022620/http://www.ctri.nic.in/Clinicaltrials/pmaindet2.php?trialid=45306 |archive-date=22 November 2020 |publisher=Clinical Trials Registry |location=India |id=CTRI/2020/07/026352}}</ref><wbr /><ref name="NCT04336410">{{cite web |date=7 April 2020 |title=Safety, Tolerability and Immunogenicity of INO-4800 for COVID-19 in Healthy Volunteers |url=https://clinicaltrials.gov/ct2/show/NCT04336410 |url-status=live |archive-url=https://web.archive.org/web/20201011084843/https://clinicaltrials.gov/ct2/show/NCT04336410/ |archive-date=11 October 2020 |access-date=14 July 2020 |website=[[ClinicalTrials.gov]] |id=NCT04336410}}</ref><ref>{{cite web |date=16 April 2020 |title=IVI, INOVIO, and KNIH to partner with CEPI in a Phase I/II clinical trial of INOVIO's COVID{{nbhyph}}19 DNA vaccine in South Korea |url=https://www.ivi.int/ivi-inovio-and-knih-to-partner-with-cepi-in-a-phase-i-ii-clinical-trial-of-inovios-covid-19-dna-vaccine-in-south-korea/ |url-status=live |archive-url=https://web.archive.org/web/20200924215700/https://www.ivi.int/ivi-inovio-and-knih-to-partner-with-cepi-in-a-phase-i-ii-clinical-trial-of-inovios-covid-19-dna-vaccine-in-south-korea/ |archive-date=24 September 2020 |access-date=23 April 2020 |publisher=International Vaccine Institute}}</ref><ref name="NCT04463472">{{cite web |date=9 July 2020 |title=Study of COVID-19 DNA Vaccine (AG0301-COVID19) |url=https://clinicaltrials.gov/ct2/show/NCT04463472 |url-status=live |archive-url=https://web.archive.org/web/20201011084854/https://clinicaltrials.gov/ct2/show/NCT04463472/ |archive-date=11 October 2020 |access-date=14 July 2020 |website=[[ClinicalTrials.gov]] |id=NCT04463472}}</ref><ref name="NCT04445389">{{cite web |date=24 June 2020 |title=Safety and Immunogenicity Study of GX-19, a COVID-19 Preventive DNA Vaccine in Healthy Adults |url=https://clinicaltrials.gov/ct2/show/NCT04445389 |url-status=live |archive-url=https://web.archive.org/web/20201011084931/https://clinicaltrials.gov/ct2/show/NCT04445389/ |archive-date=11 October 2020 |access-date=14 July 2020 |website=[[ClinicalTrials.gov]] |id=NCT04445389}}</ref><ref name="gen-reut">{{cite news |date=19 June 2020 |title=S. Korea's Genexine begins human trial of coronavirus vaccine |publisher=Reuters |url=https://www.reuters.com/article/health-coronavirus-genexine-vaccine-idUSL4N2DW1T3 |url-status=live |access-date=25 June 2020 |archive-url=https://web.archive.org/web/20201011084934/https://www.reuters.com/article/health-coronavirus-genexine-vaccine-idUSL4N2DW1T3/ |archive-date=11 October 2020}}</ref> at least two [[Lentiviral vector in gene therapy|lentivirus vector]] vaccines,<wbr /><ref name="NCT04299724">{{cite journal |vauthors=Chang LJ |date=March 2020 |title=Safety and Immunity of Covid-19 aAPC Vaccine |url=https://clinicaltrials.gov/ct2/show/NCT04299724 |url-status=live |id=NCT04299724 |archive-url=https://web.archive.org/web/20201011084913/https://clinicaltrials.gov/ct2/show/NCT04299724/ |archive-date=11 October 2020 |access-date=14 July 2020 |website=[[ClinicalTrials.gov]]}}</ref><wbr /><ref name="NCT04276896">{{cite journal |date=February 2020 |title=Immunity and Safety of Covid-19 Synthetic Minigene Vaccine |url=https://clinicaltrials.gov/ct2/show/NCT04276896 |url-status=live |id=NCT04276896 |archive-url=https://web.archive.org/web/20201011084923/https://clinicaltrials.gov/ct2/show/NCT04276896/ |archive-date=11 October 2020 |access-date=14 July 2020 |website=[[ClinicalTrials.gov]]}}</ref> a [[conjugate vaccine]], and a [[vesicular stomatitis virus]] displaying the SARS‑CoV‑2 spike protein.<ref name="NCT04608305">{{cite journal |date=November 2020 |title=A Phase I/II Randomized, Multi-Center, Placebo-Controlled, Dose-Escalation Study to Evaluate the Safety, Immunogenicity and Potential Efficacy of an rVSV-SARS-CoV-2-S Vaccine (IIBR-100) in Adults |url=https://clinicaltrials.gov/ct2/show/NCT04608305 |url-status=live |id=NCT04608305 |archive-url=https://web.archive.org/web/20210503103642/https://clinicaltrials.gov/ct2/show/NCT04608305 |archive-date=3 May 2021 |access-date=2 January 2021 |website=[[ClinicalTrials.gov]]}}</ref>

      Scientists investigated whether existing vaccines for unrelated conditions could prime the immune system and lessen the severity of COVID{{nbhyph}}19 infections.<ref>{{cite news |date=11 June 2020 |title=Can old vaccines from science's medicine cabinet ward off coronavirus? |newspaper=[[The Washington Post]] |url=https://www.washingtonpost.com/health/2020/06/11/can-old-vaccines-sciences-medicine-cabinet-ward-off-coronavirus/ |url-status=live |access-date=31 December 2020 |archive-url=https://web.archive.org/web/20200611225045/https://www.washingtonpost.com/health/2020/06/11/can-old-vaccines-sciences-medicine-cabinet-ward-off-coronavirus/ |archive-date=11 June 2020 |issn=0190-8286 |vauthors=Johnson CY, Mufson S}}</ref> There is experimental evidence that the [[BCG vaccine]] for tuberculosis has non-specific effects on the immune system, but clinical trials showed this vaccine is not effective against COVID{{nbhyph}}19.<ref>{{cite journal | vauthors = Pittet LF, Noble CC, Messina NL, Curtis N | title = Using BCG vaccination to protect against COVID-19: when reality fails to meet expectation | journal = Nature Reviews. Immunology | volume = 24 | issue = 2 | pages = 83–84 | date = February 2024 | pmid = 38238441 | doi = 10.1038/s41577-024-00992-z }}</ref>

      === Formulation ===
      An [[immunological adjuvant]] is a substance formulated with a vaccine to elevate the immune response to an [[antigen]], such as the COVID{{nbhyph}}19 virus or influenza virus.<ref name="tregoning">{{cite journal |vauthors=Tregoning JS, Russell RF, Kinnear E |date=March 2018 |title=Adjuvanted influenza vaccines |journal=Human Vaccines & Immunotherapeutics |volume=14 |issue=3 |pages=550–564 |doi=10.1080/21645515.2017.1415684 |pmc=5861793 |pmid=29232151}}</ref> Adjuvants used in COVID{{nbhyph}}19 vaccine formulations may be particularly effective for technologies using the inactivated COVID{{nbhyph}}19 virus and recombinant protein-based or vector-based vaccines.<ref name="wang">{{cite journal |vauthors=Wang J, Peng Y, Xu H, Cui Z, Williams RO |date=August 2020 |title=The COVID-19 Vaccine Race: Challenges and Opportunities in Vaccine Formulation |journal=AAPS PharmSciTech |volume=21 |issue=6 |article-number=225 |doi=10.1208/s12249-020-01744-7 |pmc=7405756 |pmid=32761294}}</ref>

      == Authorized vaccines ==
      {{Main|List of COVID-19 vaccine authorizations}}

      [[File:COVID-19 vaccine map.svg|thumb|upright=1.2|Map of countries by approval status of  COVID{{nbhyph}}19 vaccines (2021)
      {{legend|Green|Approved for general use, mass vaccination underway}}
      {{legend|SpringGreen|[[:w:Emergency Use Authorization|{{abbr|EUA|emergency use authorization}}]] (or equivalent) granted, mass vaccination underway}}
      {{legend|DodgerBlue|EUA granted, mass vaccination planned}}
      {{legend|LightGrey|No data available}}]]By the end of 2022, 50 COVID-19 vaccines had received authorization in one or more countries—meaning they were approved, licensed, or granted emergency use authorization by national regulatory agencies around the world.<ref name="TrackVaccinesApproved">{{cite web
       |title=Approved Vaccines – COVID-19 Vaccine Tracker
       |url=https://covid19.trackvaccines.org/vaccines/approved/
       |website=COVID19 Vaccine Tracker
       |publisher=VIPER Group
       |access-date=15 January 2026
      }}</ref><ref name="Pormohammad2021">{{cite journal
       |author=Pormohammad A
       |display-authors=etal 
       |title=Efficacy and Safety of COVID-19 Vaccines: A Systematic Review and Meta-Analysis
       |journal= Vaccines
       |year=2021
       |volume=9 
       |issue=5 
       |page=467 
       |doi=10.3390/vaccines9050467 
       |doi-access=free 
       |pmid=34066475 
       |pmc=8148145
       }}</ref>

      The [[World Health Organization]] (WHO) monitors circulating strains and the effectiveness of different updated vaccines against them. As of May 2025, the WHO recommends that vaccines targetting [[BA.2.86|JN.1]] or KP.2 remain appropriate and that LP.8.1 is a suitable alternative vaccine antigen.<ref>{{cite press release | title=Statement on the antigen composition of COVID-19 vaccines | website=[[World Health Organization]] (WHO) | date=15 May 2025 | url=https://www.who.int/news/item/15-05-2025-statement-on-the-antigen-composition-of-covid-19-vaccines | access-date=16 May 2025 | archive-date=15 May 2025 | archive-url=https://web.archive.org/web/20250515212340/https://www.who.int/news/item/15-05-2025-statement-on-the-antigen-composition-of-covid-19-vaccines | url-status=live }}</ref> The [[European Medicines Agency]] recommends updating COVID-19 vaccines to target LP.8.1 for the 2025/2026 vaccination campaign.<ref>{{cite press release | title=ETF recommends updating COVID-19 vaccines to target new LP.8.1 variant | website=[[European Medicines Agency]] (EMA) | date=16 May 2025 | url=https://www.ema.europa.eu/en/news/etf-recommends-updating-covid-19-vaccines-target-new-lp81-variant | access-date=16 May 2025 | archive-date=16 May 2025 | archive-url=https://web.archive.org/web/20250516230117/https://www.ema.europa.eu/en/news/etf-recommends-updating-covid-19-vaccines-target-new-lp81-variant | url-status=live }}</ref> At the same time, the FDA in the US advised manufacturers that the COVID-19 vaccines beginning in fall 2025 should be JN.1-lineage-based COVID-19 vaccines, preferentially using the LP.8.1 strain.<ref>{{cite web | title=COVID-19 Vaccines for Use in the United States Beginning in Fall 2025 | website=U.S. Food and Drug Administration | date=22 May 2025 | url=https://www.fda.gov/vaccines-blood-biologics/industry-biologics/covid-19-vaccines-2025-2026-formula-use-united-states-beginning-fall-2025 | access-date=31 August 2025}} {{PD-notice}}</ref>

      === Combination vaccines ===
      A [[Influenza and COVID-19 vaccine|combined messenger RNA vaccine]] for protection against [[influenza]] and COVID{{nbhyph}}19 was introduced in 2026.<ref name="Mcombriax EPAR">{{cite web | title = Mcombriax EPAR | date = 27 February 2026 | website = [[European Medicines Agency]] (EMA) | url = https://www.ema.europa.eu/en/medicines/human/EPAR/mcombriax | access-date = 4 March 2026 }}</ref><ref name="EMA PR 2026027">{{cite press release | title = First combined COVID-19 and influenza vaccine for people 50 years and older | date = 27 February 2026 | website = [[European Medicines Agency]] (EMA) | url = https://www.ema.europa.eu/en/news/first-combined-covid-19-influenza-vaccine-people-50-years-older | access-date = 4 March 2026 }}</ref>

      == Delivery methods ==
      [[File:COVID Vaccine (50745583447).jpg|thumb|A US [[airman]] receiving a COVID{{nbhyph}}19 vaccine, December 2020]]
      Most coronavirus vaccines are administered by [[intramuscular injection]], with further vaccine delivery methods being studied for future coronavirus vaccines.

      === Intranasal ===
      Intranasal vaccines target [[Mucosal immunology|mucosal immunity]] in the [[nasal mucosa]], which is a portal for viral entry into the body.<ref name="mudgal">{{cite journal | vauthors = Mudgal R, Nehul S, Tomar S | title = Prospects for mucosal vaccine: shutting the door on SARS-CoV-2 | journal = Human Vaccines & Immunotherapeutics | volume = 16 | issue = 12 | pages = 2921–2931 | date = December 2020 | pmid = 32931361 | pmc = 7544966 | doi = 10.1080/21645515.2020.1805992 }}</ref><ref name="rhee">{{cite book | vauthors = Rhee JH | title=Mucosal Vaccines | chapter=Current and New Approaches for Mucosal Vaccine Delivery | publisher=Elsevier | year=2020 | pmid= | pmc=7149853 | doi=10.1016/b978-0-12-811924-2.00019-5 | pages=325–356| isbn=978-0-12-811924-2 }}</ref> These vaccines are designed to stimulate nasal [[immune factor]]s, such as [[Immunoglobulin A|IgA]].<ref name="mudgal" /> In addition to inhibiting the virus, nasal vaccines provide ease of administration because no needles (or [[Fear of needles|needle phobia]]) are involved.<ref name="rhee" /><ref name="cdc">{{cite web |title=Live Attenuated Influenza Vaccine [LAIV] (The Nasal Spray Flu Vaccine) |url=https://www.cdc.gov/flu/prevent/nasalspray.htm |publisher=U.S. [[Centers for Disease Control and Prevention]] (CDC) |access-date=8 September 2021 |date=3 August 2021 |archive-date=14 October 2019 |archive-url=https://web.archive.org/web/20191014221155/https://www.cdc.gov/flu/prevent/nasalspray.htm |url-status=live }}</ref>

      A variety of intranasal COVID{{nbhyph}}19 vaccines are undergoing clinical trials. The first authorised intranasal vaccine was [[Razi Cov Pars]] in Iran at the end of October 2021.<ref name="Tehran Times">{{cite news |title=Two homegrown vaccines receive emergency use license |url=https://www.tehrantimes.com/news/466570/Two-homegrown-vaccines-receive-emergency-use-license |access-date=5 June 2024 |work=Tehran Times |date=1 November 2021 }}</ref> The first viral component of [[Sputnik V COVID-19 vaccine|Sputnik V vaccine]] was authorised in Russia as Sputnik Nasal in April 2022.<ref name="Sibmeda">{{cite news |vauthors=Maksimova K |title=A scientist at the Gamaleya Center spoke about the benefits of a nasal vaccine against coronavirus |url=https://sibmeda.ru/news/meditsinskie-innovatsii/uchyenyy-tsentra-gamalei-rasskazal-o-preimushchestvakh-nazalnoy-vaktsiny-ot-koronavirusa/ |access-date=5 June 2024 |work=sibmeda.ru |archive-date=5 June 2024 |archive-url=https://web.archive.org/web/20240605011736/https://sibmeda.ru/news/meditsinskie-innovatsii/uchyenyy-tsentra-gamalei-rasskazal-o-preimushchestvakh-nazalnoy-vaktsiny-ot-koronavirusa/ |url-status=live }}</ref> In September 2022, India and China approved two [[Nasal vaccine|nasal]] COVID{{nbhyph}}19 vaccines ([[iNCOVACC]] and [[Convidecia]]), which may (as boosters)<ref>{{cite news |title=Two inhaled covid vaccines have been approved—but we don't know yet how good they are |url=https://www.technologyreview.com/2022/09/08/1059107/two-inhaled-covid-vaccines-approved/ |access-date=21 October 2022 |work=MIT Technology Review |archive-date=21 October 2022 |archive-url=https://web.archive.org/web/20221021140344/https://www.technologyreview.com/2022/09/08/1059107/two-inhaled-covid-vaccines-approved/ |url-status=live }}</ref> also reduce transmission<ref name="naturenasalvac" /><ref>{{cite journal | vauthors = Dhama K, Dhawan M, Tiwari R, Emran TB, Mitra S, Rabaan AA, Alhumaid S, Alawi ZA, Al Mutair A | title = COVID-19 intranasal vaccines: current progress, advantages, prospects, and challenges | journal = Human Vaccines & Immunotherapeutics | volume = 18 | issue = 5 | article-number = 2045853 | date = November 2022 | pmid = 35258416 | pmc = 8935456 | doi = 10.1080/21645515.2022.2045853 }}</ref> (potentially via sterilizing immunity).<ref name="naturenasalvac">{{cite journal | vauthors = Waltz E | title = China and India approve nasal COVID vaccines - are they a game changer? | journal = Nature | volume = 609 | issue = 7927 | page = 450 | date = September 2022 | pmid = 36071228 | doi = 10.1038/d41586-022-02851-0 | s2cid = 252121594 | bibcode = 2022Natur.609..450W | title-link = doi | doi-access = free }}</ref> In December 2022, China approved a second intranasal vaccine as a booster, brand name [[DelNS1-2019-nCoV-RBD-OPT|Pneucolin]].<ref name="Pneucolin">{{cite web|url=http://www.nhc.gov.cn/xcs/zhengcwj/202212/acd8ba68d934488983909e81642dc337.shtml|title=关于印发新冠病毒疫苗第二剂次加强免疫接种实施方案的通知|publisher=[[National Health Commission]]|date=14 December 2022|language=zh|access-date=14 December 2022}}</ref>

      == Universal vaccine ==
      {{Main|Universal coronavirus vaccine}}

      A universal coronavirus vaccine would be effective against all coronaviruses and possibly other viruses.<ref>{{cite web | vauthors = Mullin E |date=9 June 2021 |title=A 'Universal' Coronavirus Vaccine to Prevent the Next Pandemic |url=https://www.scientificamerican.com/podcast/episode/a-universal-coronavirus-vaccine-to-prevent-the-next-pandemic1/ |url-status=live |archive-url=https://web.archive.org/web/20211220060024/https://www.scientificamerican.com/podcast/episode/a-universal-coronavirus-vaccine-to-prevent-the-next-pandemic1/ |archive-date=20 December 2021 |access-date=20 December 2021 |website=[[Scientific American]] }}</ref><ref name="Joi_2021">{{cite web | vauthors = Joi P |date=13 July 2021 |title=Could a universal coronavirus vaccine soon be a reality? |url=https://www.gavi.org/vaccineswork/could-universal-coronavirus-vaccine-soon-be-reality |url-status=live |archive-url=https://web.archive.org/web/20211220054527/https://www.gavi.org/vaccineswork/could-universal-coronavirus-vaccine-soon-be-reality |archive-date=20 December 2021 |access-date=20 December 2021 |website=[[GAVI]] }}</ref> The concept was publicly endorsed by [[NIAID]] director [[Anthony Fauci]], [[Virology|virologist]] [[Jeffery Taubenberger|Jeffery K. Taubenberger]], and David M. Morens.<ref name="Bush_2021">{{cite web | vauthors = Bush E |date= 15 December 2021 |title=Fauci pushes for universal coronavirus vaccine |url= https://www.nbcnews.com/science/science-news/fauci-pushes-universal-coronavirus-vaccine-rcna8877 |url-status=live |archive-url=https://web.archive.org/web/20211220054522/https://www.nbcnews.com/science/science-news/fauci-pushes-universal-coronavirus-vaccine-rcna8877 |archive-date=20 December 2021 |access-date=20 December 2021 |website=[[NBC News]] }}</ref> In March 2022, the [[White House]] released the "National COVID{{nbhyph}}19 Preparedness Plan", which recommended accelerating the development of a universal coronavirus vaccine.<ref>{{cite web |date=March 2022 |title=National COVID-19 Preparedness Plan |url=https://bidenwhitehouse.archives.gov/wp-content/uploads/2022/03/NAT-COVID-19-PREPAREDNESS-PLAN.pdf |archive-url=https://web.archive.org/web/20220326181157/https://www.whitehouse.gov/wp-content/uploads/2022/03/NAT-COVID-19-PREPAREDNESS-PLAN.pdf |archive-date=26 March 2022 |access-date=29 March 2022 |publisher=The White House |url-status=live |pages=9, 21, 29}}</ref>

      One attempt at such a vaccine is being developed at the [[Walter Reed Army Institute of Research]]. It uses a spike ferritin-based nanoparticle (SpFN). This vaccine began a Phase I clinical trial in April 2022.<ref>{{cite news |date=5 April 2022 |title=Phase 1 Clinical Trial of WRAIR-developed COVID-19 Vaccine Begins |url=https://www.wrair.army.mil/node/636 |access-date=11 July 2022 |archive-date=11 July 2022 |archive-url=https://web.archive.org/web/20220711041214/https://www.wrair.army.mil/node/636 }}</ref> Results of this trial were published in May 2024.<ref name="WRAIR phase 1 trial">{{cite journal | vauthors = Ober Shepherd BL, Scott PT, Hutter JN, Lee C, McCauley MD, Guzman I, Bryant C, McGuire S, Kennedy J, Chen WH, Hajduczki A, Mdluli T, Valencia-Ruiz A, Amare MF, Matyas GR, Rao M, Rolland M, Mascola JR, De Rosa SC, McElrath MJ, Montefiori DC, Serebryannyy L, McDermott AB, Peel SA, Collins ND, Joyce MG, Robb ML, Michael NL, Vasan S, Modjarrad K, Gebrehana B, Greenleaf ME, Hamer MJ, Jansen NK, Jing X, Kagai J, Kourbanova K, Koren MA, Martin ML, Wuertz KM, Regules JA, Sanborn AD, Wallace D, Zhu L, Gromowski GD, Corbitt C, Darden JM, Dussupt V, Golub ES, Headley JA, Jarral UM, King J, Krebs SJ, Lay J, Lilly R, Lynch J, Martinez EJ, Mayer SV, McGeehon S, Lee H, Schech S, Tadesse M, Thomas PV, Romem Y, Zografos E, Lin BC, Narpala SR, Wang L, Doria-Rose NA, Carroll RE, Eaton A, Badraslioglu ED, Koontz JM, Nwaeze UE, Dawson P, Noll AJ, Orndahl CM, Bray A, Carrion R, Patterson J, Kulkarni V, Hallam C, Gonzalez O, Gazi M | collaboration = EID-030 Study Group | title = SARS-CoV-2 recombinant spike ferritin nanoparticle vaccine adjuvanted with Army Liposome Formulation containing monophosphoryl lipid A and QS-21: a phase 1, randomised, double-blind, placebo-controlled, first-in-human clinical trial | journal = The Lancet. Microbe | volume = 5 | issue = 6 | pages = e581–e593 | date = June 2024 | pmid = 38761816 | doi = 10.1016/S2666-5247(23)00410-X | pmc = 11192176 }}</ref> Other universal vaccines that have entered clinical trial include OVX033 (France),<ref name="OVX033 phase 1 trial">{{cite web |title=First-in-human Study to Evaluate the Safety and Immunogenicity of Three Dose Levels of the OVX033 Coronavirus Vaccine Candidate in Healthy Volunteers |url=https://clinicaltrials.gov/study/NCT06128382 |website=clinicaltrials.gov |access-date=30 August 2024}}</ref> PanCov (France),<ref name="PanCov phase 1/2 trial">{{cite journal |title=Safety and Immunogenicity of a Sub-unit Protein CD40.RBDv Bivalent COVID-19 Vaccine, Adjuvanted or Not, as a Booster in Volunteers |url=https://clinicaltrials.gov/study/NCT06255626 |website=clinicaltrials.gov |date=11 June 2024 |access-date=30 August 2024 |archive-date=30 August 2024 |archive-url=https://web.archive.org/web/20240830003237/https://clinicaltrials.gov/study/NCT06255626 |url-status=live }}</ref> pEVAC-PS (UK),<ref name="Diosynvax phase 1">{{cite web |title=Phase I vaccine study of pEVAC-PS coronavirus vaccine |url=https://www.isrctn.com/ISRCTN87813400 |website=www.isrctn.com |access-date=30 August 2024 |archive-date=29 June 2023 |archive-url=https://web.archive.org/web/20230629175148/https://www.isrctn.com/ISRCTN87813400 |url-status=live }}</ref> and [[VBI-2902]] (Canada).<ref name="VBI phase 1 trial">{{cite journal |title=Safety, Tolerability, and Immunogenicity of Trivalent Coronavirus Vaccine Candidate VBI-2901a |url=https://clinicaltrials.gov/study/NCT05548439 |website=clinicaltrials.gov |date=13 February 2023 |publisher=National Institutes of Health |access-date=30 August 2024 |archive-date=30 August 2024 |archive-url=https://web.archive.org/web/20240830003236/https://clinicaltrials.gov/study/NCT05548439 |url-status=live }}</ref>

      Another strategy is to attach vaccine fragments from multiple strains to a [[nanoparticle]] scaffold. One theory is that a broader range of strains can be vaccinated against by targeting the receptor-binding domain, rather than the whole [[spike protein]].<ref>{{cite web | vauthors = Haridy R |date=7 July 2022 |title=Another universal coronavirus vaccine readies for human trials |url=https://newatlas.com/science/universal-coronavirus-vaccine-mosaic-nanoparticle-human-trials-caltech/ |access-date=11 July 2022 |website=New Atlas |archive-date=11 July 2022 |archive-url=https://web.archive.org/web/20220711024151/https://newatlas.com/science/universal-coronavirus-vaccine-mosaic-nanoparticle-human-trials-caltech/ |url-status=live }}</ref>

      == Development ==
      {{Excerpt|History of COVID-19 vaccine development}}

      In June 2025, the [[European Medicines Agency]] announced that it was making data from the marketing authorization applications for COVID{{nbhyph}}19 mRNA vaccines [[Comirnaty]] and [[Spikevax]] publicly available.<ref name="EMA Transparency" /><ref name="Comirnaty EPAR" /><ref name="Spikevax EPAR" />

      Multiple steps along the entire development path are evaluated, including:<ref name="gates2" /><ref name="simpson">{{cite journal | vauthors=Simpson S, Kaufmann MC, Glozman V, Chakrabarti A |date=May 2020 |title=Disease X: accelerating the development of medical countermeasures for the next pandemic |journal=The Lancet. Infectious Diseases |volume=20 |issue=5 |pages=e108–15 |doi=10.1016/S1473-3099(20)30123-7 |pmc=7158580 |pmid=32197097 | title-link = doi | doi-access = free }}</ref>
      * the level of acceptable toxicity of the vaccine (its safety),
      * targeting vulnerable populations,
      * the need for vaccine efficacy breakthroughs,
      * the duration of vaccination protection,
      * special delivery systems (such as oral or nasal, rather than by injection),
      * dose regimen,
      * stability and storage characteristics,
      * emergency use authorization before formal licensing,
      * optimal manufacturing for scaling to billions of doses, and
      * dissemination of the licensed vaccine.

      === Challenges ===
      There have been several unique challenges with COVID{{nbhyph}}19 vaccine development.

      Timelines for conducting clinical research usually a sequential process requiring years{{snd}}were being compressed into safety, efficacy, and dosing trials running simultaneously over months.<ref name="sanger">{{cite news |date=2 May 2020 |title=With Pressure Growing, Global Race for a Vaccine Intensifies |work=[[The New York Times]] |url=https://www.nytimes.com/2020/05/02/us/politics/vaccines-coronavirus-research.html |url-status=live |access-date=2 May 2020 |archive-url=https://web.archive.org/web/20200511003506/https://www.nytimes.com/2020/05/02/us/politics/vaccines-coronavirus-research.html |archive-date=11 May 2020 |issn=0362-4331 |vauthors=Sanger DE, Kirkpatrick DD, Zimmer C, Thomas K, Wee SL}}</ref><ref name="reuters">{{cite news | date=27 April 2020 |title=Special Report: Countries, companies risk billions in race for coronavirus vaccine |publisher=Reuters |url=https://www.reuters.com/article/health-coronavirus-vaccine-idUSL2N2CF0JG |url-status=live |access-date=2 May 2020 |archive-url=https://web.archive.org/web/20200515031817/https://www.reuters.com/article/health-coronavirus-vaccine-idUSL2N2CF0JG |archive-date=15 May 2020 |vauthors=Steenhuysen J, Eisler P, Martell A, Nebehay S}}</ref> Under normal circumstances, large-scale trials involving thousands of participants only proceed after smaller studies confirm there are no significant safety concerns.<ref>{{Cite web |date=2020-11-05 |title=COVID-19 vaccines: development, evaluation, approval and monitoring |url=https://www.ema.europa.eu/en/human-regulatory-overview/public-health-threats/coronavirus-disease-covid-19/covid-19-public-health-emergency-international-concern-2020-23/covid-19-vaccines-development-evaluation-approval-monitoring |access-date=2026-01-20 |website=European Medicines Agency (EMA) |language=en}}</ref> For example, Chinese vaccine developers and the [[Chinese Center for Disease Control and Prevention]] began their efforts in January 2020,<ref>{{cite news | date=26 January 2020 |title=Chinese scientists race to develop vaccine as coronavirus death toll jumps |work=South China Morning Post |url=https://www.scmp.com/news/china/society/article/3047676/number-coronavirus-cases-china-doubles-spread-rate-accelerates |url-status=live |access-date=28 January 2020 |archive-url=https://web.archive.org/web/20200126073453/https://www.scmp.com/news/china/society/article/3047676/number-coronavirus-cases-china-doubles-spread-rate-accelerates |archive-date=26 January 2020 |vauthors=Jeong-ho L, Zheng W, Zhou L}}</ref> and by March they were pursuing numerous candidates on short timelines.<ref name="sanger" /><ref name="wee">{{cite news | date=4 May 2020 |title=China's coronavirus vaccine drive empowers a troubled industry |work=[[The New York Times]] |url=https://www.nytimes.com/2020/05/04/business/coronavirus-china-vaccine.html |url-status=live |access-date=4 May 2020 |archive-url=https://web.archive.org/web/20200504175312/https://www.nytimes.com/2020/05/04/business/coronavirus-china-vaccine.html |archive-date=4 May 2020 |issn=0362-4331 |vauthors=Wee SL}}</ref>

      The rapid development and urgency of producing a vaccine for the COVID{{nbhyph}}19 pandemic were expected to increase the risks and failure rate of delivering a safe, effective vaccine.<ref name="thanh">{{cite journal | vauthors=Thanh Le T, Andreadakis Z, Kumar A, Gómez Román R, Tollefsen S, Saville M, Mayhew S |date=May 2020 |title=The COVID-19 vaccine development landscape |journal=Nature Reviews. Drug Discovery |volume=19 |issue=5 |pages=305–06 |doi=10.1038/d41573-020-00073-5 |pmid=32273591 | title-link = doi | doi-access = free |bibcode=2020NRvDD..19..305T }}</ref><ref name="diamond">{{cite journal | vauthors=Diamond MS, Pierson TC |date=May 2020 |title=The Challenges of Vaccine Development against a New Virus during a Pandemic |journal=Cell Host & Microbe |volume=27 |issue=5 |pages=699–703 |doi=10.1016/j.chom.2020.04.021 |pmc=7219397 |pmid=32407708}}</ref><ref name="Thorp">{{cite journal | vauthors=Thorp HH |date=March 2020 |title=Underpromise, overdeliver |journal=Science |volume=367 |issue=6485 |page=1405 |bibcode=2020Sci...367.1405T |doi=10.1126/science.abb8492 |pmid=32205459 | title-link = doi | doi-access = free |s2cid=214628067 }}</ref> Additionally, research at universities is obstructed by [[Social distancing|physical distancing]] and the closing of laboratories.<ref>{{cite news |date=20 April 2020 |title=COVID-19 vaccine researchers say pandemic lockdown placing many serious obstacles to their work |work=National Post |url=https://nationalpost.com/news/covid-19-vaccine-researchers-say-pandemic-lockdown-placing-many-serious-obstacles-to-their-work |access-date=3 May 2020 |vauthors=Blackwell T |archive-date=23 April 2020 |archive-url=https://wayback.archive-it.org/all/20200423082751/https://nationalpost.com/news/covid-19-vaccine-researchers-say-pandemic-lockdown-placing-many-serious-obstacles-to-their-work |url-status=live }}</ref><ref>{{cite web | vauthors = Chen J |date=4 May 2020|title=Covid-19 has shuttered labs. It could put a generation of researchers at risk|url=https://www.statnews.com/2020/05/04/coronavirus-lab-shutdowns-impact-on-scientists-research-delays/|archive-url=https://web.archive.org/web/20200506072301/https://www.statnews.com/2020/05/04/coronavirus-lab-shutdowns-impact-on-scientists-research-delays/|archive-date=6 May 2020|url-status=live|access-date=4 May 2020|work=[[Stat (website)|Stat]]}}</ref>

      Vaccines must progress through several phases of [[clinical trial]]s to test for safety, [[immunogenicity]], effectiveness, dose levels, and [[Vaccine adverse event|adverse effect]]s of the candidate vaccine.<ref name="Vaccines.gov">{{cite web |title=Vaccine Safety – Vaccines|url=https://www.vaccines.gov/basics/safety|archive-url=https://web.archive.org/web/20200422073442/https://www.vaccines.gov/basics/safety|archive-date=22 April 2020|url-status=live|access-date=13 April 2020|publisher=US Department of Health and Human Services}}</ref><ref name="fda-ddp">{{cite web |date=4 January 2018|title=The drug development process|url=https://www.fda.gov/patients/learn-about-drug-and-device-approvals/drug-development-process|archive-url=https://web.archive.org/web/20200222182002/https://www.fda.gov/patients/learn-about-drug-and-device-approvals/drug-development-process|archive-date=22 February 2020|url-status=live|access-date=12 April 2020|publisher=U.S. [[Food and Drug Administration]] (FDA)}}</ref> Vaccine developers have to invest resources internationally to find enough participants for Phase{{spaces}}II–III clinical trials when the virus has proved to be a "[[Moving target indication|moving target]]" of changing transmission rates across and within countries, forcing companies to compete for trial participants.<ref name="cohen6-19">{{cite journal | vauthors=Cohen J |date=June 2020 |title=Pandemic vaccines are about to face the real test |journal=Science |volume=368 |issue=6497 |pages=1295–96 |bibcode=2020Sci...368.1295C |doi=10.1126/science.368.6497.1295 |pmid=32554572 | title-link = doi | doi-access = free |s2cid=219911109 }}</ref>

      As new vaccines are developed during the COVID{{nbhyph}}19 pandemic, licensure of COVID{{nbhyph}}19 vaccine candidates requires submission of a full dossier of information on development and manufacturing quality.<ref name="ema-eau">{{cite web |year=2020|title=Vaccines: The Emergency Authorisation Procedure|url=https://www.ema.europa.eu/en/authorisation-procedures|archive-url=https://web.archive.org/web/20200924065451/https://www.ema.europa.eu/en/authorisation-procedures|archive-date=24 September 2020|url-status=live|access-date=21 August 2020|publisher=[[European Medicines Agency]] (EMA)}}</ref><ref name="byrne10-19">{{cite web|vauthors=Byrne J|date=19 October 2020|title=Moderna COVID-19 vaccine under rolling review process in Canada, EU|url=https://www.biopharma-reporter.com/Article/2020/10/19/Moderna-COVID-19-vaccine-under-rolling-review-process-in-Canada-EU|access-date=25 November 2020|publisher=BioPharma-Reporter.com, William Reed Business Media Ltd|archive-date=25 February 2021|archive-url=https://web.archive.org/web/20210225075656/https://www.biopharma-reporter.com/Article/2020/10/19/Moderna-COVID-19-vaccine-under-rolling-review-process-in-Canada-EU|url-status=live}}</ref><ref name="dangerfield">{{cite news |date=20 November 2020 |title=Pfizer files for emergency use of coronavirus vaccine in U.S. – what about in Canada? |work=Global News |url=https://globalnews.ca/news/7474273/pfizer-emergency-use-coronavirus-vaccine-canada/ |access-date=25 November 2020 |vauthors=Dangerfield K |archive-date=25 January 2021 |archive-url=https://web.archive.org/web/20210125183616/https://globalnews.ca/news/7474273/pfizer-emergency-use-coronavirus-vaccine-canada/ |url-status=live }}</ref>

      === Organizations involved in COVID-19 vaccine development ===
      Internationally, the [[Access to COVID‑19 Tools Accelerator]] is a [[G20]] and [[World Health Organization]] (WHO) initiative announced in April 2020.<ref name="g20gm">{{cite news |date=25 April 2020 |title=G20 launches initiative for health tools needed to combat the coronavirus |work=[[The Globe and Mail]] |url=https://www.theglobeandmail.com/world/article-g20-launches-initiative-for-health-tools-needed-to-combat-the-2/ |access-date=1 February 2021 |archive-date=27 April 2020 |archive-url=https://web.archive.org/web/20200427134921/https://www.theglobeandmail.com/world/article-g20-launches-initiative-for-health-tools-needed-to-combat-the-2/ |url-status=live }}</ref><ref name="whopress">{{cite web|date=24 April 2020|title=Access to COVID-19 Tools (ACT) Accelerator|publisher=[[World Health Organization]] (WHO)|url=https://www.who.int/docs/default-source/coronaviruse/access-to-covid-19-tools-(act)-accelerator-call-to-action-24april2020.pdf|access-date=1 February 2021|archive-date=25 April 2020|archive-url=https://web.archive.org/web/20200425194644/https://www.who.int/docs/default-source/coronaviruse/access-to-covid-19-tools-(act)-accelerator-call-to-action-24april2020.pdf|url-status=live}}</ref> It is a cross-discipline support structure to enable partners to share resources and knowledge. It comprises four pillars, each managed by two to three collaborating partners: Vaccines (also called "[[COVAX]]"), Diagnostics, Therapeutics, and Health Systems Connector.<ref name="act-faq">{{cite web|year=2020|title=The ACT-Accelerator: frequently asked questions (FAQ)|url=https://www.who.int/initiatives/act-accelerator/faq|access-date=16 December 2020|publisher=[[World Health Organization]] (WHO)|archive-date=4 May 2021|archive-url=https://web.archive.org/web/20210504125946/https://www.who.int/initiatives/act-accelerator/faq|url-status=live}}</ref> The WHO's April 2020 "R&D Blueprint (for the) novel Coronavirus" documented a "large, international, multi-site, individually randomized controlled clinical trial" to allow "the concurrent evaluation of the benefits and risks of each promising candidate vaccine within 3–6 months of it being made available for the trial." The WHO vaccine coalition will prioritize which vaccines should go into Phase{{spaces}}II and{{spaces}}III clinical trials and determine harmonized Phase{{spaces}}III protocols for all vaccines achieving the [[pivotal trial]] stage.<ref name="who-accel">{{cite web |date=27 April 2020|title=Update on WHO Solidarity Trial – Accelerating a safe and effective COVID-19 vaccine|url=https://www.who.int/emergencies/diseases/novel-coronavirus-2019/global-research-on-novel-coronavirus-2019-ncov/solidarity-trial-accelerating-a-safe-and-effective-covid-19-vaccine|archive-url=https://web.archive.org/web/20200430185550/https://www.who.int/emergencies/diseases/novel-coronavirus-2019/global-research-on-novel-coronavirus-2019-ncov/solidarity-trial-accelerating-a-safe-and-effective-covid-19-vaccine|archive-date=30 April 2020|url-status=live|access-date=2 May 2020|publisher=[[World Health Organization]] (WHO)|quote=It is vital that we evaluate as many vaccines as possible as we cannot predict how many will turn out to be viable. To increase the chances of success (given the high level of attrition during vaccine development), we must test all candidate vaccines until they fail. [The] WHO is working to ensure that all of them have the chance of being tested at the initial stage of development. The results for the efficacy of each vaccine are expected within three to six months, and this evidence, combined with data on safety, will inform decisions about whether it can be used on a wider scale.}}</ref>

      National governments have also been involved in vaccine development. Canada announced funding for 96 projects for the development and production of vaccines at Canadian companies and universities, with plans to establish a "vaccine bank" that could be used if another coronavirus outbreak occurs,<ref name="abedi">{{cite news | date=23 March 2020 |title=Canada to spend $192M on developing COVID-19 vaccine |work=Global News |url=https://globalnews.ca/news/6717883/coronavirus-canada-vaccine-spending/ |url-status=live |access-date=24 March 2020 |archive-url=https://web.archive.org/web/20200409200638/https://globalnews.ca/news/6717883/coronavirus-canada-vaccine-spending/ |archive-date=9 April 2020 |vauthors=Abedi M}}</ref> support clinical trials, and develop manufacturing and supply chains for vaccines.<ref name="can-research">{{cite web |date=23 April 2020|title=Government of Canada's research response to COVID-19|url=https://www.canada.ca/en/public-health/services/publications/diseases-conditions/covid-19-government-canada-research-response.html|archive-url=https://web.archive.org/web/20200513135919/https://www.canada.ca/en/public-health/services/publications/diseases-conditions/covid-19-government-canada-research-response.html|archive-date=13 May 2020|url-status=live|access-date=4 May 2020|publisher=Government of Canada}}</ref>

      [[Government of China|China]] provided low-rate loans to one vaccine developer through its [[People's Bank of China|central bank]] and "quickly made land available for the company" to build production plants.<ref name="reuters" /> Three Chinese vaccine companies and research institutes are supported by the government for financing research, conducting clinical trials, and manufacturing.<ref name="takada">{{cite news | date=2 May 2020 |title=US and China unleash wallets in race for coronavirus vaccine |work=Nikkei Asian Review |url=https://asia.nikkei.com/Spotlight/Coronavirus/US-and-China-unleash-wallets-in-race-for-coronavirus-vaccine |url-status=live |access-date=3 May 2020 |archive-url=https://web.archive.org/web/20200510111134/https://asia.nikkei.com/Spotlight/Coronavirus/US-and-China-unleash-wallets-in-race-for-coronavirus-vaccine |archive-date=10 May 2020 |vauthors=Takada N, Satake M}}</ref>

      The United Kingdom government formed a COVID{{nbhyph}}19 vaccine [[task force]] in April 2020 to stimulate local efforts for accelerated development of a vaccine through collaborations between industries, universities, and government agencies. The UK's [[Vaccine Taskforce]] contributed to every phase of development, from research to manufacturing.<ref name="morriss">{{cite web | vauthors = Morriss E |date=22 April 2020|title=Government launches coronavirus vaccine taskforce as human clinical trials start|url=https://pharmafield.co.uk/pharma_news/government-launches-coronavirus-vaccine-taskforce-as-human-clinical-trials-start/|archive-url=https://web.archive.org/web/20200626021103/https://pharmafield.co.uk/pharma_news/government-launches-coronavirus-vaccine-taskforce-as-human-clinical-trials-start/|archive-date=26 June 2020|url-status=live|access-date=3 May 2020|publisher=Pharmafield}}</ref>

      In the United States, the [[Biomedical Advanced Research and Development Authority]] (BARDA), a federal agency funding disease-fighting technology, announced investments to support American COVID{{nbhyph}}19 vaccine development and the manufacturing of the most promising candidates.<ref name="reuters" /><ref name="kuznia">{{cite news | date=1 May 2020 |title=In quest for vaccine, US makes 'big bet' on company with unproven technology |work=CNN|url=https://www.cnn.com/2020/05/01/us/coronavirus-moderna-vaccine-invs/index.html |url-status=live |access-date=2 May 2020 |archive-url=https://web.archive.org/web/20200513005730/https://www.cnn.com/2020/05/01/us/coronavirus-moderna-vaccine-invs/index.html |archive-date=13 May 2020 |vauthors=Kuznia R, Polglase K, Mezzofiore G}}</ref> In May 2020, the government announced funding for a fast-track program called [[Operation Warp Speed]].<ref>{{cite journal | vauthors=Cohen J |date=May 2020 |title=U.S. 'Warp Speed' vaccine effort comes out of the shadows |journal=Science |volume=368 |issue=6492 |pages=692–93 |bibcode=2020Sci...368..692C |doi=10.1126/science.368.6492.692 |pmid=32409451 | title-link = doi | doi-access = free }}</ref><ref>{{cite news | vauthors = Sink J, Fabian J, Griffin R |date=15 May 2020 |title=Trump introduces 'Warp Speed' leaders to hasten COVID-19 vaccine |publisher=Bloomberg |url=https://www.bloomberg.com/news/articles/2020-05-15/trump-to-introduce-warp-speed-leaders-after-vaccine-criticism |url-status=live |access-date=15 May 2020 |archive-url=https://web.archive.org/web/20200521231515/https://www.bloomberg.com/news/articles/2020-05-15/trump-to-introduce-warp-speed-leaders-after-vaccine-criticism |archive-date=21 May 2020}}</ref> By March 2021, BARDA had funded an estimated $19.3 billion in COVID{{nbhyph}}19 vaccine development.<ref>{{cite news |vauthors=LaHucik K |date=17 June 2021 |title=U.S. injects $3B-plus into COVID-19 research to develop antiviral pill within a year |url=https://www.fiercebiotech.com/biotech/u-s-pledges-3b-plus-for-covid-19-antiviral-pill-within-a-year |access-date=11 July 2021 |website=Fierce Biotech |archive-date=9 October 2021 |archive-url=https://web.archive.org/web/20211009203610/https://www.fiercebiotech.com/biotech/u-s-pledges-3b-plus-for-covid-19-antiviral-pill-within-a-year |url-status=live }}</ref>

      Large pharmaceutical companies with experience in making vaccines at scale, including [[Johnson & Johnson]], [[AstraZeneca]], and [[GlaxoSmithKline]] (GSK), formed alliances with [[biotechnology]] companies, governments, and universities to accelerate progress toward effective vaccines.<ref name="reuters" /><ref name="sanger" />

      == Effectiveness ==
      [[File:2021- COVID-19 death rates by vaccination status - US.svg |thumb|upright=1.35|Death rates from COVID-19 for unvaccinated Americans substantially exceeded those who were vaccinated, with bivalent boosters further reducing the death rate.<ref name=COVIDmortality_2021_2023>{{cite web |title=Data on COVID-19 mortality by vaccination status |url=https://ourworldindata.org/covid-deaths-by-vaccination |publisher=Our World in Data (CDC data) |archive-url=https://web.archive.org/web/20231016112249/https://ourworldindata.org/covid-deaths-by-vaccination |archive-date=16 October 2023 |date=April 2023 |quote=Data source: Centers for Disease Control and Prevention, Vaccine Breakthrough/Surveillance and Analytics Team. |url-status=live }}</ref>]]
      [[File:COVID-19 vaccines lives saved.png|thumb|upright=1.35|Researchers have estimated that COVID-19 vaccines saved around 20 million lives globally in the first year of vaccine availability.<ref>{{cite web | title = Key charts to understand the COVID-19 pandemic | author = Saloni Dattani and Lucas Rodés-Guirao | website = Our World in Data | date = 18 November 2024 | url = https://ourworldindata.org/key-charts-understand-covid-pandemic | access-date = 27 November 2024 | archive-date = 27 November 2024 | archive-url = https://web.archive.org/web/20241127025456/https://ourworldindata.org/key-charts-understand-covid-pandemic | url-status = live }}</ref>]]
      {{Excerpt|COVID-19 vaccine efficacy|Effectiveness}}<!-- Any edits to this section should be made on the excerpted section -->

      === Against infection and transmission ===
      Transmission is mostly due to mild infections. Vaccines show lower effectiveness against mild infections than severe infections, and the effectivenss decreases within six months of vaccination.<ref>{{cite journal | vauthors = Yang ZR, Jiang YW, Li FX, Liu D, Lin TF, Zhao ZY, Wei C, Jin QY, Li XM, Jia YX, Zhu FC, Yang ZY, Sha F, Feng ZJ, Tang JL | title = Efficacy of SARS-CoV-2 vaccines and the dose-response relationship with three major antibodies: a systematic review and meta-analysis of randomised controlled trials | language = English | journal = The Lancet. Microbe | volume = 4 | issue = 4 | pages = e236-e246 | date = April 2023 | pmid = 36868258 | doi = 10.1016/S2666-5247(22)00390-1 }}</ref> [[Vaccine efficacy]] against infections was around 77% for pre-Omicron variants in the first months after vaccination, and 26% against Omicron variants. The efficacy against infections waned more rapidly than against severe illness. Boosters restored the protection against infections.<ref>{{cite journal | vauthors = Zhou G, Dael N, Verweij S, Balafas S, Mubarik S, Oude Rengerink K, Pasmooij AM, van Baarle D, Mol PG, de Bock GH, Hak E | title = Effectiveness of COVID-19 vaccines against SARS-CoV-2 infection and severe outcomes in adults: a systematic review and meta-analysis of European studies published up to 22 January 2024 | journal = European Respiratory Review | volume = 34 | issue = 175 | date = January 2025 | pmid = 39971395 | doi = 10.1183/16000617.0222-2024 | pmc = 11836669 }}</ref>

      ==== Duration of immunity ====
      As of 2021, available evidence shows that fully vaccinated individuals and those previously infected with SARS-CoV-2 have a low risk of subsequent infection for at least six months.<ref name="CDC Science Brief">{{cite web|date=29 October 2021|title=Science Brief: SARS-CoV-2 Infection-induced and Vaccine-induced Immunity|url=https://www.cdc.gov/coronavirus/2019-ncov/science/science-briefs/vaccine-induced-immunity.html|access-date=4 December 2021|website=[[Centers for Disease Control and Prevention]] (CDC)|archive-date=4 December 2021|archive-url=https://web.archive.org/web/20211204081226/https://www.cdc.gov/coronavirus/2019-ncov/science/science-briefs/vaccine-induced-immunity.html|url-status=live}} {{PD-notice}}</ref><ref>{{cite journal |vauthors=Levin EG, Lustig Y, Cohen C, Fluss R, Indenbaum V, Amit S, Doolman R, Asraf K, Mendelson E, Ziv A, Rubin C, Freedman L, Kreiss Y, Regev-Yochay G |date=December 2021 |title=Waning Immune Humoral Response to BNT162b2 Covid-19 Vaccine over 6 Months |journal=The New England Journal of Medicine |volume=385 |issue=24 |pages=e84 |doi=10.1056/NEJMoa2114583 |pmc=8522797 |pmid=34614326 | title-link = doi | doi-access = free }}</ref><ref>{{cite web |date=29 November 2021 |title=COVID-19 Booster Shot |url=https://www.cdc.gov/coronavirus/2019-ncov/vaccines/booster-shot.html |url-status=live |archive-url=https://web.archive.org/web/20210821000645/https://www.cdc.gov/coronavirus/2019-ncov/vaccines/booster-shot.html |archive-date=21 August 2021 |access-date=4 December 2021 |website=Centers for Disease Control and Prevention}}</ref> There is insufficient data to determine an antibody titer threshold that indicates when an individual is protected from infection.<ref name="CDC Science Brief" /> Multiple studies show that antibody titers are associated with protection at the population level, but individual protection titers remain unknown.<ref name="CDC Science Brief" /> For some populations, such as the elderly and the [[immunocompromised]], protection levels may be reduced after both vaccination and infection.<ref name="CDC Science Brief" /> Available evidence indicates that the level of protection may not be the same for all [[Variants of SARS-CoV-2|variants of the virus]].<ref name="CDC Science Brief" />

      As of December 2021, there are no FDA-authorized or approved tests that providers or the public can use to determine if a person is protected from infection reliably.<ref name="CDC Science Brief" />

      As of March 2022, elderly residents' protection against severe illness, hospitalization, and death in English care homes was high immediately after vaccination, but protection declined significantly in the months following vaccination.<ref name="Guardian 20220318" /> Protection among care home staff, who were younger, declined much more slowly.<ref name="Guardian 20220318" /> Regular boosters are recommended for older people, and boosters for care home residents every six months appear reasonable.<ref name="Guardian 20220318">{{cite news | vauthors=Devlin H | title=Covid immunity declines steeply in care home residents in England – study | website=[[The Guardian]] | date=18 March 2022 | url=https://www.theguardian.com/world/2022/mar/18/covid-immunity-declines-steeply-in-care-home-residents-study | access-date=12 May 2022 | archive-date=23 March 2022 | archive-url=https://web.archive.org/web/20220323091154/https://www.theguardian.com/world/2022/mar/18/covid-immunity-declines-steeply-in-care-home-residents-study | url-status=live }}</ref>

      The US [[Centers for Disease Control and Prevention]] (CDC) recommends a fourth dose of the Pfizer mRNA vaccine {{as of|2022|March|lc=y}} for "certain immunocompromised individuals and people over the age of 50".<ref>{{cite news | vauthors = Kimball S |title=CDC recommends fourth Pfizer and Moderna Covid vaccine doses for people age 50 and older |url= https://www.cnbc.com/2022/03/29/fda-authorizes-fourth-pfizer-covid-vaccine-dose-for-people-age-50-and-older-.html |access-date=22 August 2022 |work=CNBC |archive-date=3 September 2022 |archive-url= https://web.archive.org/web/20220903154426/https://www.cnbc.com/2022/03/29/fda-authorizes-fourth-pfizer-covid-vaccine-dose-for-people-age-50-and-older-.html |url-status=live }}</ref><ref>{{cite press release |title=Coronavirus Disease 2019 |url=https://www.cdc.gov/media/releases/2022/s0328-covid-19-boosters.html |website=Centers for Disease Control and Prevention |access-date=22 August 2022 |date=29 March 2022 |archive-date=1 September 2022 |archive-url= https://web.archive.org/web/20220901053403/https://www.cdc.gov/media/releases/2022/s0328-covid-19-boosters.html |url-status=live }}</ref>

      === Against severe illness and death ===
      {{Excerpt|COVID-19 vaccine efficacy|Against severe illness and death}}<!-- Any edits to this section should be made on the excerpted section -->

      === Immune evasion by variants ===
      In contrast to other investigated prior variants, the [[SARS-CoV-2 Omicron variant]]<ref>{{cite journal | vauthors = Liu L, Iketani S, Guo Y, Chan JF, Wang M, Liu L, Luo Y, Chu H, Huang Y, Nair MS, Yu J, Chik KK, Yuen TT, Yoon C, To KK, Chen H, Yin MT, Sobieszczyk ME, Huang Y, Wang HH, Sheng Z, Yuen KY, Ho DD | title = Striking antibody evasion manifested by the Omicron variant of SARS-CoV-2 | journal = Nature | volume = 602 | issue = 7898 | pages = 676–681 | date = February 2022 | pmid = 35016198 | doi = 10.1038/d41586-021-03826-3 | s2cid = 245462866 | title-link = doi | doi-access = free }}</ref><ref>{{cite journal | vauthors = Mohsin M, Mahmud S | title = Omicron SARS-CoV-2 variant of concern: A review on its transmissibility, immune evasion, reinfection, and severity | journal = Medicine | volume = 101 | issue = 19 | article-number = e29165 | date = May 2022 | pmid = 35583528 | doi = 10.1097/MD.0000000000029165 | pmc = 9276130 | s2cid = 248858919 }}</ref> and its BA.4/5 subvariants<ref>{{cite news |date=2 May 2022 |title=How soon after catching COVID-19 can you get it again? |work=ABC News |url=https://www.abc.net.au/news/health/2022-05-03/covid-19-reinfection-what-are-the-odds-of-catching-it-twice/101024180 |access-date=24 June 2022 |archive-date=9 July 2022 |archive-url=https://web.archive.org/web/20220709233023/https://www.abc.net.au/news/health/2022-05-03/covid-19-reinfection-what-are-the-odds-of-catching-it-twice/101024180 |url-status=live }}</ref> have [[Antigenic escape|evaded immunity]] induced by vaccines, which may lead to [[breakthrough infection]]s despite recent vaccination. Nevertheless, vaccines are thought to provide protection against severe illness, hospitalizations, and deaths due to Omicron.<ref>{{cite web |date=20 December 2021 |title=Omicron Variant: What You Need to Know |url=https://www.cdc.gov/coronavirus/2019-ncov/variants/omicron-variant.html |url-status=live |archive-url=https://web.archive.org/web/20220127152019/https://www.cdc.gov/coronavirus/2019-ncov/variants/omicron-variant.html |archive-date=27 January 2022 |access-date=27 January 2022 |website=Centers for Disease Control and Prevention }}</ref>

      ==== Vaccine adjustments ====
      {{Excerpt|SARS-CoV-2 Omicron variant#Vaccine adjustments}}

      === Against long COVID ===
      COVID-19 vaccination seems to reduce risk of [[long COVID]]. Three doses of a COVID-19 may reduce the risk by 70%, while two doses give 43% protection and one dose gives 19% protection. The evidence is based on observational studies, rather than on randomised clinical trials.<ref>{{cite journal | vauthors = Peine C, Stoliaroff-Pepin A, Reinacher U, Heldt K, Sarganas G, Piechotta V, Mikolajewska A, Pilic A, Barkowski N, Bleve D, Giebeler MH, Poser S, Searle L, Kißner E, Nitsche L, Bayram F, Siemens W, Ziegler A, Meerpohl JJ, Sandmann F, Wichmann O, Harder T | title = Effectiveness of COVID-19 vaccines against post-COVID-19 condition/long COVID: systematic review and meta-analysis | language = English | journal = Clinical Microbiology and Infection | volume = 31 | issue = 12 | pages = 1961–1971 | date = December 2025 | pmid = 40754067 | doi = 10.1016/j.cmi.2025.07.026 | doi-access = free }}</ref> The large randomised control trials on COVID-19 vaccines did not include long COVID as an [[outcome measure]].<ref>{{cite journal | vauthors = Byambasuren O, Stehlik P, Clark J, Alcorn K, Glasziou P | title = Effect of covid-19 vaccination on long covid: systematic review | journal = BMJ Medicine | volume = 2 | issue = 1 | article-number = e000385 | date = 2023-02-28 | pmid = 36936268 | doi = 10.1136/bmjmed-2022-000385 | hdl = 10072/425793 | hdl-access = free }}</ref>

      An analysis involving more than 20 million adults found that vaccinated people had a lower risk of long COVID compared with those who had not received a COVID{{nbhyph}}19 vaccine; they were also protected against blood clots and heart failure after the COVID infection.<ref>{{cite journal | vauthors = Català M, Mercadé-Besora N, Kolde R, Trinh NT, Roel E, Burn E, Rathod-Mistry T, Kostka K, Man WY, Delmestri A, Nordeng HM, Uusküla A, Duarte-Salles T, Prieto-Alhambra D, Jödicke AM | title = The effectiveness of COVID-19 vaccines to prevent long COVID symptoms: staggered cohort study of data from the UK, Spain, and Estonia | journal = The Lancet. Respiratory Medicine | volume = 12 | issue = 3 | pages = 225–236 | date = March 2024 | pmid = 38219763 | doi = 10.1016/s2213-2600(23)00414-9 | doi-access = free | title-link = doi }}</ref><ref>{{Cite journal |date=24 July 2024 |title=Vaccines reduce the risk of long COVID |url=https://evidence.nihr.ac.uk/alert/vaccines-reduce-the-risk-of-long-covid/ |journal=NIHR Evidence|doi=10.3310/nihrevidence_63203 | doi-access = free | title-link = doi }}</ref><ref>{{cite journal | vauthors = Mercadé-Besora N, Li X, Kolde R, Trinh NT, Sanchez-Santos MT, Man WY, Roel E, Reyes C, Delmestri A, Nordeng HM, Uusküla A, Duarte-Salles T, Prats C, Prieto-Alhambra D, Jödicke AM, Català M | title = The role of COVID-19 vaccines in preventing post-COVID-19 thromboembolic and cardiovascular complications | journal = Heart | volume = 110 | issue = 9 | pages = 635–643 | date = April 2024 | pmid = 38471729 | pmc = 11041555 | doi = 10.1136/heartjnl-2023-323483 }}</ref>

      === Mix and match ===
      According to studies, the combination of two different COVID{{nbhyph}}19 vaccines, also called [[heterologous vaccine|heterologous vaccination]], cross-vaccination, or the mix-and-match method, provides protection equivalent to that of mRNA vaccines, including protection against the [[Delta variant]]. Individuals who receive the combination of two different vaccines produce strong immune responses, with side effects no worse than those caused by standard regimens.<ref>{{cite journal | vauthors = Callaway E | title = Mix-and-match COVID vaccines ace the effectiveness test | journal = Nature | date = October 2021 | pmid = 34675430 | doi = 10.1038/d41586-021-02853-4 | s2cid = 239455075 }}</ref><ref>{{cite journal | vauthors = Rashedi R, Samieefar N, Masoumi N, Mohseni S, Rezaei N | title = COVID-19 vaccines mix-and-match: The concept, the efficacy and the doubts | journal = Journal of Medical Virology | volume = 94 | issue = 4 | pages = 1294–1299 | date = April 2022 | pmid = 34796525 | pmc = 8661746 | doi = 10.1002/jmv.27463 }}</ref>

      == Adverse effects ==

      For most people, the side effects, also called ''[[adverse effects]]'', from COVID{{nbhyph}}19 vaccines are mild and can be managed at home. The adverse effects of the COVID{{nbhyph}}19 vaccination are similar to those of other vaccines, and severe adverse effects are rare.<ref>{{cite journal | vauthors = Kouhpayeh H, Ansari H | title = Adverse events following COVID-19 vaccination: A systematic review and meta-analysis | journal = International Immunopharmacology | volume = 109 | article-number = 108906 | date = August 2022 | pmid = 35671640 | doi = 10.1016/j.intimp.2022.108906 | pmc = 9148928 }}</ref><ref>{{cite journal | vauthors = Graña C, Ghosn L, Evrenoglou T, Jarde A, Minozzi S, Bergman H, Buckley BS, Probyn K, Villanueva G, Henschke N, Bonnet H, Assi R, Menon S, Marti M, Devane D, Mallon P, Lelievre JD, Askie LM, Kredo T, Ferrand G, Davidson M, Riveros C, Tovey D, Meerpohl JJ, Grasselli G, Rada G, Hróbjartsson A, Ravaud P, Chaimani A, Boutron I | title = Efficacy and safety of COVID-19 vaccines | journal = The Cochrane Database of Systematic Reviews | volume = 12 | issue = 12 | article-number = CD015477 | date = December 2022 | pmid = 36473651 | doi = 10.1002/14651858.CD015477 | pmc = 9726273 }}</ref> Adverse effects from the vaccine are higher than placebo, but placebo arms of vaccine trials still reported adverse effects that can be attributed to the [[nocebo effect]].<ref>{{cite journal | vauthors = Haas JW, Bender FL, Ballou S, Kelley JM, Wilhelm M, Miller FG, Rief W, Kaptchuk TJ | title = Frequency of Adverse Events in the Placebo Arms of COVID-19 Vaccine Trials: A Systematic Review and Meta-analysis | journal = JAMA Network Open | volume = 5 | issue = 1 | pages = e2143955 | date = January 2022 | pmid = 35040967 | doi = 10.1001/jamanetworkopen.2021.43955 | pmc = 8767431 }}</ref>

      A February 2022 study, which examined a potential causal link between COVID-19 vaccines and excess deaths, found that out of more than 250 million [[COVID-19 vaccination in the United States|Americans vaccinated]], only 55 cases of death after COVID-19 vaccination were reported and in 17 of these, a causal relationship had been excluded.<ref>{{Cite journal | vauthors = Maiese A, Baronti A, Manetti AC, Di Paolo M, Turillazzi E, Frati P, Fineschi V | title = Death after the Administration of COVID-19 Vaccines Approved by EMA: Has a Causal Relationship Been Demonstrated? | journal = Vaccines | volume = 10 | issue = 2 | page = 308 | date = 16 February 2022 | pmid = 35214765 | pmc = 8875435 | doi = 10.3390/vaccines10020308 | doi-access = free | issn = 2076-393X }}</ref> The [[Paul Ehrlich Institute]] has recorded 31 [[Cerebral venous sinus thrombosis|cerebral venous sinus thromboses]] (CVST) and nine deaths out of 2.7 million vaccinated in Germany with the [[AZD1222]].<ref name="Gallagher_2021">{{cite web | vauthors = Gallagher J | title = AstraZeneca: Is there a blood clot risk? | date = 2 April 2021 | url = https://www.bbc.co.uk/news/health-56594189 | url-status = live | archive-url = https://web.archive.org/web/20210506123116/https://www.bbc.co.uk/news/health-56594189 | archive-date = 6 May 2021 | access-date = 3 April 2021 | website = BBC News Online }}</ref> The UK [[Medicines and Healthcare products Regulatory Agency]] (MHRA) recorded 73 deaths out of nearly 50 million doses of AstraZeneca given in UK.<ref>{{Cite news | title = Covid: Trigger of rare blood clots with AstraZeneca jab found by scientists | date = 2 December 2021 | url = https://www.bbc.com/news/health-59418123 | access-date = 14 June 2025 | language = en-GB | archive-date = 26 March 2025 | archive-url = https://web.archive.org/web/20250326213322/https://www.bbc.com/news/health-59418123 | url-status = live }}</ref><ref>{{Cite web | vauthors = Taylor C | title = Blood clots associated with AstraZeneca vaccine are 'rare but devastating,' study says | date = 12 August 2021 | url = https://www.cnbc.com/2021/08/12/blood-clots-linked-to-astrazeneca-shot-have-22percent-mortality-rate-study.html | access-date = 14 June 2025 | website = CNBC | language = en | archive-date = 19 June 2025 | archive-url = https://web.archive.org/web/20250619092330/https://www.cnbc.com/2021/08/12/blood-clots-linked-to-astrazeneca-shot-have-22percent-mortality-rate-study.html | url-status = live }}</ref> 

      All vaccines administered via [[intramuscular injection]], including COVID{{nbhyph}}19 vaccines, have side effects related to the mild trauma associated with the procedure and the introduction of a foreign substance into the body.<ref name="Polania">{{cite book | vauthors = Polania Gutierrez JJ, Munakomi S | date = January 2020 | chapter = Intramuscular Injection | chapter-url = https://www.ncbi.nlm.nih.gov/books/NBK556121/ | location = Treasure Island (FL) | publisher = StatPearls Publishing | title = StatPearls | pmid = 32310581 | access-date = 24 July 2021 | archive-date = 8 December 2020 | archive-url = https://web.archive.org/web/20201208182850/https://www.ncbi.nlm.nih.gov/books/NBK556121/ | url-status = live }}</ref> These include soreness, redness, rash, and inflammation at the injection site. Other common side effects include fatigue, headache, [[myalgia]] (muscle pain), and [[arthralgia]] (joint pain), all of which generally resolve without medical treatment within a few days.<ref name="who-back">{{cite report |url=https://apps.who.int/iris/rest/bitstreams/1330343/retrieve |title=Background document on the mRNA-1273 vaccine (Moderna) against COVID-19 |date=February 2021 |publisher=[[World Health Organization]] (WHO) |id=WHO/2019-nCoV/vaccines/SAGE_recommendation/mRNA-1273/background/2021.1 |hdl-access=free |hdl=10665/339218 |access-date=24 July 2021 |archive-date=13 June 2021 |archive-url=https://web.archive.org/web/20210613133906/https://apps.who.int/iris/rest/bitstreams/1330343/retrieve |url-status=live }}</ref><ref name="COVID-19 vaccine WHO">{{cite web |title=Background document on the mRNA-1273 vaccine (Moderna) against COVID-19 |url=https://www.who.int/publications/i/item/background-document-on-the-mrna-1273-vaccine-(moderna)-against-covid-19 |access-date=23 January 2022 |publisher=[[World Health Organization]] (WHO) |archive-date=26 January 2022 |archive-url=https://web.archive.org/web/20220126053538/https://www.who.int/publications/i/item/background-document-on-the-mrna-1273-vaccine-(moderna)-against-covid-19 |url-status=live }}</ref> Like any other vaccine, some people are [[allergic]] to one or more ingredients in COVID{{nbhyph}}19 vaccines. Typical side effects are stronger and more common in younger people and in subsequent doses, and up to 20% of people report a disruptive level of side effects after the second dose of an mRNA vaccine.<ref name="Huang_2022">{{cite journal | vauthors = Huang Z, Su Y, Zhang T, Xia N | title = A review of the safety and efficacy of current COVID-19 vaccines | journal = Frontiers of Medicine | volume = 16 | issue = 1 | pages = 39–55 | date = February 2022 | pmid = 35122210 | pmc = 8815389 | doi = 10.1007/s11684-021-0893-y }}</ref> These side effects are less common or weaker in [[inactivated vaccine]]s.<ref name="Huang_2022" /> COVID{{nbhyph}}19 vaccination-related [[lymphadenopathy|enlargement of lymph nodes]] happens in 11.6% of those who received one dose of the vaccine and in 16% of those who received two doses.<ref>{{cite journal | vauthors = Tu W, Gierada DS, Joe BN | title = COVID-19 Vaccination-Related Lymphadenopathy: What To Be Aware Of | journal = Radiology: Imaging Cancer | volume = 3 | issue = 3 | article-number = e210038 | date = May 2021 | pmid = 33874733 | pmc = 8049171 | doi = 10.1148/rycan.2021210038 }}</ref>

      Experiments in mice show that intramuscular injections of lipid [[excipient]] nanoparticles (an inactive substance that serves as the vehicle or medium) cause particles to enter the blood plasma and many organs, with higher concentrations found in the liver and lower concentrations in the spleen, adrenal glands, and ovaries. The highest concentration of nanoparticles was found at the injection site itself.<ref>{{cite web |title=Nonclinical Evaluation Report: BNT162b2 [mRNA] COVID-19 vaccine |url=https://www.tga.gov.au/sites/default/files/foi-2389-06.pdf |website=Australian Department of Health: Therapeutic Goods Administration |access-date=25 March 2023 |archive-date=28 March 2023 |archive-url=https://web.archive.org/web/20230328233750/https://www.tga.gov.au/sites/default/files/foi-2389-06.pdf |url-status=live }}</ref>

      COVID{{nbhyph}}19 vaccination is safe for breastfeeding people.<ref name=breastf>{{cite web |publisher=NHS |url=https://www.nhs.uk/conditions/coronavirus-covid-19/coronavirus-vaccination/pregnancy-breastfeeding-fertility-and-coronavirus-covid-19-vaccination/ |date=5 October 2022 |title=Pregnancy, breastfeeding, fertility and coronavirus (COVID-19) vaccination |access-date=15 October 2022 |archive-date=15 October 2022 |archive-url=https://web.archive.org/web/20221015155517/https://www.nhs.uk/conditions/coronavirus-covid-19/coronavirus-vaccination/pregnancy-breastfeeding-fertility-and-coronavirus-covid-19-vaccination/ |url-status=live }}</ref> Temporary changes to the [[menstrual cycle]] in young women have been reported. However, these changes are "small compared with natural variation and quickly reverse."<ref name="Menstruation">{{cite journal | vauthors = Male V | title = Menstruation and covid-19 vaccination | journal = BMJ | volume = 376 | pages = o142 | date = January 2022 | pmid = 35082132 | doi = 10.1136/bmj.o142 | s2cid = 246287912 | title-link = doi | doi-access = free | hdl = 10044/1/94577 | hdl-access = free }}</ref> In one study, women who received both doses of a two-dose vaccine during the same menstrual cycle (an atypical situation) may see their next period begin a couple of days late. They have about twice the usual risk of a clinically significant delay (about 10% of these women, compared to about 4% of unvaccinated women).<ref name="Menstruation" /> Cycle lengths return to normal after two menstrual cycles post-vaccination.<ref name="Menstruation" /> Women who received doses in separate cycles had approximately the same natural variation in cycle lengths as unvaccinated women.<ref name="Menstruation" /> Other temporary menstrual effects have been reported, such as heavier than normal menstrual bleeding after vaccination.<ref name="Menstruation" />
      ===Serious adverse events=== 
      Serious [[Vaccine adverse event|adverse events]] associated COVID{{nbhyph}}19 vaccines are generally rare but of high interest to the public.<ref name="Montgomery_2021">{{cite journal |vauthors=Montgomery J, Ryan M, Engler R, Hoffman D, McClenathan B, Collins L, Loran D, Hrncir D, Herring K, Platzer M, Adams N, Sanou A, Cooper LT |date=October 2021 |title=Myocarditis Following Immunization With mRNA COVID-19 Vaccines in Members of the US Military |journal=JAMA Cardiology |volume=6 |issue=10 |pages=1202–06 |doi=10.1001/jamacardio.2021.2833 |pmc=8243257 |pmid=34185045 | title-link = doi | doi-access = free }}</ref> The official databases of reported adverse events include
      * the [[World Health Organization]]'s [[VigiBase]];
      * the United States [[Vaccine Adverse Events Reporting System]] (VAERS);
      * the United Kingdom's [[Yellow Card Scheme]];
      * the [[European Medicines Agency]]'s [[EudraVigilance]] system, which operates a regular transfer of data on suspected adverse drug reactions occurring in the EU to [[Uppsala Monitoring Centre|WHO's Uppsala Monitoring Centre]].<ref>{{cite web | url=https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/world-health-organization-who#:~:text=EU%20Member%20States%2C%20EMA%20and,EC%20)%20No%20726%2F2004 | title=World Health Organization (WHO) | date=17 September 2018 | access-date=19 September 2023 | archive-date=4 October 2023 | archive-url=https://web.archive.org/web/20231004202200/https://www.ema.europa.eu/en/partners-networks/international-activities/multilateral-coalitions-initiatives/world-health-organization-who#:~:text=EU%20Member%20States%2C%20EMA%20and,EC%20)%20No%20726%2F2004 | url-status=live }}</ref>
      Increased public awareness of these reporting systems and the extra reporting requirements under US FDA [[Emergency Use Authorization]] rules have increased reported adverse events.<ref>{{cite web |vauthors=McDonald J |date=23 December 2021 |title=Increase in COVID-19 VAERS Reports Due To Reporting Requirements, Intense Scrutiny of Widely Given Vaccines |url=https://www.factcheck.org/2021/12/scicheck-increase-in-covid-19-vaers-reports-due-to-reporting-requirements-intense-scrutiny-of-widely-given-vaccines/ |access-date=20 May 2022 |website=FactCheck.org |archive-date=20 May 2022 |archive-url=https://web.archive.org/web/20220520020203/https://www.factcheck.org/2021/12/scicheck-increase-in-covid-19-vaers-reports-due-to-reporting-requirements-intense-scrutiny-of-widely-given-vaccines/ |url-status=live }}</ref> Serious side effects are an ongoing area of study, and resources have been allocated to try to better understand them.<ref>{{cite web | title = Treating Post-Vac-Syndrome | work = Deutsche Welle | date = 11 October 2022 | url = https://www.dw.com/en/treating-the-long-term-symptoms-of-post-vac-syndrome/video-63710911 | archive-url = https://web.archive.org/web/20230417113134/https://www.dw.com/en/treating-the-long-term-symptoms-of-post-vac-syndrome/video-63710911| archive-date = 17 April 2023}}</ref><ref>{{cite web | work = Universitätsklinikum Giessen und Marburg (UKGM) | title = Spezialsprechstunde Post-Vax | trans-title = Post-Vac Special Consultation | language = de | url = https://www.ukgm.de/ugm_2/deu/umr_kar/51186.html | archive-url = https://web.archive.org/web/20230504041112/https://www.ukgm.de/ugm_2/deu/umr_kar/51186.html| archive-date=4 May 2023}}</ref><ref>{{cite web | work = Frankfurter Allgemeine Zeitung GmbH | url = https://m.faz.net/aktuell/rhein-main/corona-impfschaeden-uniklinik-marburg-oeffnet-eigene-ambulanz-18796703.html | archive-url = https://web.archive.org/web/20240308030343/https://www.faz.net/aktuell/rhein-main/corona-impfschaeden-uniklinik-marburg-oeffnet-eigene-ambulanz-18796703.html | archive-date=8 March 2024 | language = de | title = Corona-Impfschäden: Uniklinik Marburg öffnet eigene Ambulanz | trans-title = Corona vaccine damage: Marburg University Hospital opens its own outpatient clinic| date = 3 April 2023 }}</ref> Research currently indicates that the rate and type of side effects are lower-risk than infection. For example, although vaccination may trigger some side effects, the effects experienced from an infection could be worse. Neurological side effects from getting COVID{{nbhyph}}19 are hundreds of times more likely than from vaccination.<ref>{{cite journal | vauthors = Frontera JA, Tamborska AA, Doheim MF, Garcia-Azorin D, Gezegen H, Guekht A, Yusof Khan AH, Santacatterina M, Sejvar J, Thakur KT, Westenberg E, Winkler AS, Beghi E | title = Neurological Events Reported after COVID-19 Vaccines: An Analysis of VAERS | journal = Annals of Neurology | volume = 91 | issue = 6 | pages = 756–771 | date = March 2022 | pmid = 35233819 | doi = 10.1002/ana.26339 | pmc = 9082459 | title-link = doi | doi-access = free }}</ref> Evidence suggests that vaccination confers no significantly increased risk of serious adverse effects, including various cardiovascular, metabolic, and endocrine events, based on a cohort study involving 1 million adults in Denmark who have received an mRNA COVID-19 booster shot targeting the Omicron JN.1 variant.<ref name="Denmark neuro study boostershot">{{cite web |title=Safety of JN.1-Updated mRNA COVID-19 Vaccines - Pharmacy and Clinical Pharmacology - JAMA Network Open - JAMA Network |url=https://jamanetwork.com/journals/jamanetworkopen/fullarticle/2836889?linkId=846105566#250466207 |website=JAMA Network |access-date=12 August 2025}}</ref>{{non-primary source needed|date=December 2025}}

      Documented rare serious effects include:

      * [[anaphylaxis]], a severe type of [[allergic reaction]].<ref name="Altmann_2022">{{cite journal | vauthors = Altmann DM, Boyton RJ | title = COVID-19 vaccination: The road ahead | journal = Science | volume = 375 | issue = 6585 | pages = 1127–1132 | date = March 2022 | pmid = 35271316 | doi = 10.1126/science.abn1755 | bibcode = 2022Sci...375.1127A | s2cid = 247384207 }}</ref> Anaphylaxis affects one person per 250,000 to 400,000 doses administered.<ref name="Huang_2022" /><ref name="COVID-19 vaccines safety update">{{cite report | title=COVID-19 vaccines safety update | url=https://www.ema.europa.eu/documents/covid-19-vaccine-safety-update/covid-19-vaccines-safety-update-14-july-2022_en.pdf | date= | access-date=6 September 2022 | archive-date=3 August 2022 | archive-url=https://web.archive.org/web/20220803225933/https://www.ema.europa.eu/en/documents/covid-19-vaccine-safety-update/covid-19-vaccines-safety-update-14-july-2022_en.pdf | url-status=live }}</ref> According to a 2022 systematic review, the mortality rate of people with anaphylaxis following COVID‐19 vaccination was 0.5%.<ref>{{cite journal | vauthors = Paul P, Janjua E, AlSubaie M, Ramadorai V, Mushannen B, Vattoth AL, Khan W, Bshesh K, Nauman A, Mohammed I, Bouhali I, Khalid M, Zakaria D | title = Anaphylaxis and Related Events Following COVID-19 Vaccination: A Systematic Review | journal = Journal of Clinical Pharmacology | volume = 62 | issue = 11 | pages = 1335–1349 | date = November 2022 | pmid = 35794852 | doi = 10.1002/jcph.2120 | pmc = 9349886 }}</ref>

      * [[Embolic and thrombotic events after COVID-19 vaccination|blood clots]] (''thrombosis'').<ref name="Altmann_2022" /> These [[Embolic and thrombotic events after COVID-19 vaccination|vaccine-induced immune thrombocytopenia and thrombosis]] are associated with vaccines using an adenovirus system (Janssen and Oxford-AstraZeneca).<ref name="Altmann_2022" /> These affect about one person per 100,000.<ref name="Huang_2022" />
      * [[myocarditis]] and [[pericarditis]], or inflammation of the heart.<ref name="Altmann_2022" /> There is a rare risk of myocarditis (inflammation of the heart muscle) or pericarditis (inflammation of the membrane covering the heart) after the mRNA COVID{{nbhyph}}19 vaccines (Moderna or Pfizer-BioNTech). The risk of myocarditis after COVID{{nbhyph}}19 vaccination is estimated to be 0.3 to 5 cases per 100,000 persons, with the highest risk in young males.<ref name="NEJM Basso">{{cite journal | vauthors = Basso C | title = Myocarditis | journal = The New England Journal of Medicine | volume = 387 | issue = 16 | pages = 1488–1500 | date = October 2022 | pmid = 36260793 | doi = 10.1056/NEJMra2114478 | s2cid = 240234869 | hdl = 11577/3479721 | hdl-access = free }}</ref> COVID{{nbhyph}}19 vaccines may protect against myocarditis due to subsequent COVID{{nbhyph}}19 infection.<ref name="AHA 8/2022">{{cite journal | vauthors = Patone M, Mei XW, Handunnetthi L, Dixon S, Zaccardi F, Shankar-Hari M, Watkinson P, Khunti K, Harnden A, Coupland CA, Channon KM, Mills NL, Sheikh A, Hippisley-Cox J | title = Risk of Myocarditis After Sequential Doses of COVID-19 Vaccine and SARS-CoV-2 Infection by Age and Sex | journal = Circulation | volume = 146 | issue = 10 | pages = 743–754 | date = September 2022 | pmid = 35993236 | pmc = 9439633 | doi = 10.1161/CIRCULATIONAHA.122.059970 }}</ref> The risk of myocarditis and pericarditis is significantly higher (up to 11 times higher with respect to myocarditis) after COVID{{nbhyph}}19 infection as compared to COVID{{nbhyph}}19 vaccination, with the possible exception of men under 40 who may have a higher risk of myocarditis after the second Moderna mRNA vaccine (an additional 97 cases of myocarditis per 1 million persons vaccinated).<ref name="AHA 8/2022" /> The mortality rate from myocarditis post-vaccination is extremely low. According to a 2022 study, of patients diagnosed with myocarditis (in both vaccination and COVID-19 cohorts), 1.07% were hospitalized and 0.015% died.<ref>{{cite journal | vauthors = Voleti N, Reddy SP, Ssentongo P | title = Myocarditis in SARS-CoV-2 infection vs. COVID-19 vaccination: A systematic review and meta-analysis | journal = Frontiers in Cardiovascular Medicine | volume = 9 | article-number = 951314 | year = 2022 | pmid = 36105535 | pmc = 9467278 | doi = 10.3389/fcvm.2022.951314 | doi-access = free }}</ref> As of June 2025, the US FDA requires a prescription label warning regarding myocarditis and pericarditis.<ref>{{cite web | title=FDA Approves Required Updated Warning in Labeling of mRNA COVID-19 Vac | website=U.S. [[Food and Drug Administration]] (FDA) | date=25 June 2025 | url=https://www.fda.gov/vaccines-blood-biologics/safety-availability-biologics/fda-approves-required-updated-warning-labeling-mrna-covid-19-vaccines-regarding-myocarditis-and | access-date=14 July 2025 | archive-date=14 July 2025 | archive-url=https://web.archive.org/web/20250714051625/https://www.fda.gov/vaccines-blood-biologics/safety-availability-biologics/fda-approves-required-updated-warning-labeling-mrna-covid-19-vaccines-regarding-myocarditis-and | url-status=live }}</ref>

      * thrombotic thrombocytopenia and other autoimmune diseases, which have been reported as adverse events after the COVID{{nbhyph}}19 vaccine.<ref>{{cite journal | vauthors = Chen Y, Xu Z, Wang P, Li XM, Shuai ZW, Ye DQ, Pan HF | title = New-onset autoimmune phenomena post-COVID-19 vaccination | journal = Immunology | volume = 165 | issue = 4 | pages = 386–401 | date = April 2022 | pmid = 34957554 | doi = 10.1111/imm.13443 | s2cid = 245522029 | title-link = doi | doi-access = free | hdl = 10072/422051 | hdl-access = free }}</ref>

      * new onset [[tinnitus]] after the first dose of certain vaccines, however, there is a higher risk of the same symptom developing after influenza and pneumococcal vaccinations than after the COVID-19 vaccine.<ref name="Slomski_2022">{{cite journal |vauthors=Slomski A |date=May 2022 |title=Studies Examine Risk of Hearing Loss After COVID-19 Vaccination |journal=JAMA |volume=327 |issue=17 |page=1641 |doi=10.1001/jama.2022.6719 |pmid=35503358 |s2cid=248502943| title-link = doi | doi-access = free }}</ref><ref>{{cite journal | vauthors = Dorney I, Bobak L, Otteson T, Kaelber DC | title = Prevalence of New-Onset Tinnitus after COVID-19 Vaccination with Comparison to Other Vaccinations | journal = The Laryngoscope | pages = 1722–1725 | date = September 2022 | volume = 133 | issue = 7 | pmid = 36098476 | doi = 10.1002/lary.30395 | pmc = 9539087 }}</ref>

