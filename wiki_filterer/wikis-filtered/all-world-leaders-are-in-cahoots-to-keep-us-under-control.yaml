      The Great Reset Initiative is an economic recovery plan proposed by the World Economic Forum (WEF) in response to the COVID-19 pandemic. The project was launched in June 2020, accompanied by a video message from the then-Prince of Wales, Charles. Its stated objective is to support recovery from the global pandemic in a manner that emphasises sustainable development.
      At the time of the initiative's announcement, WEF chairman Klaus Schwab outlined three core components of the initiative: advancing a "stakeholder economy"; building in a more "resilient, equitable, and sustainable" way using environmental, social, and governance (ESG) metrics; and "harnessing the innovations of the Fourth Industrial Revolution." In a keynote address, International Monetary Fund managing director Kristalina Georgieva identified three principles of a sustainable recovery: green growth, smarter growth, and fairer growth.
      "The Great Reset" was chosen as the theme of the 2021 World Economic Forum annual meeting in Davos, Switzerland. The summit was postponed several times due to the pandemic, first to May 2021 and later to 2022. The theme of Davos 2022 was "History at a Turning Point", with discussions largely...
    source: |-
      {{Short description|Post-COVID-19 pandemic initiative by the World Economic Forum}}
      {{Redirect|The Great Reset|the 2010 book|The Great Reset (book){{!}}''The Great Reset'' (book)|the 2020 book|#Books}}
      {{copy edit|date=May 2025}}
      {{Use dmy dates|date=May 2023}}
      The '''Great Reset Initiative''' is an economic recovery plan proposed by the [[World Economic Forum]] (WEF) in response to the [[COVID-19 pandemic]].<ref name="BBC20201122">{{cite news |last1=Goodman |first1=Jack |last2=Carmichael |first2=Flora |date=22 November 2020 |title=The coronavirus pandemic "great reset" theory and a false vaccine claim debunked |work=BBC News |url=https://www.bbc.co.uk/news/55017002 |url-status=live |access-date=22 November 2020 |archive-url=https://web.archive.org/web/20201122005829/https://www.bbc.co.uk/news/55017002 |archive-date=22 November 2020}}</ref> The project was launched in June 2020, accompanied by a video message from the then-Prince of Wales, [[Charles III|Charles]].<ref>{{cite web |date=14 April 2022 |title=The Great Reset: What is it? |url=https://fullfact.org/online/great-reset-conspiracy-theory/ |url-status=live |archive-url=https://web.archive.org/web/20220804011428/https://fullfact.org/online/great-reset-conspiracy-theory/ |archive-date=4 August 2022 |access-date=4 August 2022 |website=Full Fact}}</ref> Its stated objective is to support recovery from the global pandemic in a manner that emphasises [[sustainable development]].<ref name="guardian060320">{{cite news |last1=Inman |first1=Phillip |date=3 June 2020 |title=Pandemic is chance to reset global economy, says Prince Charles |work=The Guardian |url=https://www.theguardian.com/uk-news/2020/jun/03/pandemic-is-chance-to-reset-global-economy-says-prince-charles |url-status=live |access-date=18 November 2020 |archive-url=https://web.archive.org/web/20201117152600/https://www.theguardian.com/uk-news/2020/jun/03/pandemic-is-chance-to-reset-global-economy-says-prince-charles |archive-date=17 November 2020}}</ref>

      At the time of the initiative's announcement, WEF chairman [[Klaus Schwab]] outlined three core components of the initiative: advancing a "[[stakeholder theory|stakeholder economy]]"; building in a more "resilient, equitable, and sustainable" way using [[environmental, social, and governance]] (ESG) metrics; and "harnessing the innovations of the [[Fourth Industrial Revolution]]."<ref name="WEF_Schwab_20200603">{{Cite web |last=Schwab |first=Klaus |date=3 June 2020 |title=Now is the time for a 'great reset' |url=https://www.weforum.org/agenda/2020/06/now-is-the-time-for-a-great-reset/ |url-status=live |archive-url=https://web.archive.org/web/20210130024115/https://www.weforum.org/agenda/2020/06/now-is-the-time-for-a-great-reset/ |archive-date=30 January 2021 |access-date=1 February 2021 |work=World Economic Forum}}</ref><ref name="Schwab_Malleret_20200709">{{Cite book |last1=Schwab |first1=Klaus |title=COVID-19: The Great Reset |last2=Malleret |first2=Thierry |date=9 July 2020 |publisher=Agentur Schweiz |isbn=978-2-940631-12-4}}</ref> In a keynote address, [[International Monetary Fund]] managing director [[Kristalina Georgieva]] identified three principles of a sustainable recovery: [[green growth]], smarter growth, and fairer growth.<ref name="guardian060320" /><ref name="WEF_Kristalina_keynote">{{Cite web |last1=Georgieva |first1=Kristalina |date=3 June 2020 |title=Remarks to World Economic Forum |url=https://www.imf.org/en/News/Articles/2020/06/03/sp060320-remarks-to-world-economic-forum-the-great-reset |url-status=live |archive-url=https://web.archive.org/web/20210126194518/https://www.imf.org/en/News/Articles/2020/06/03/sp060320-remarks-to-world-economic-forum-the-great-reset |archive-date=26 January 2021 |access-date=26 January 2021 |series=The Great Reset}}</ref>

      "The Great Reset" was chosen as the theme of the 2021 World Economic Forum annual meeting in [[Davos|Davos, Switzerland]].<ref name="IISD_2021">{{Cite web |title=Event: World Economic Forum Annual Meeting 2021 |url=https://sdg.iisd.org:443/events/world-economic-forum-annual-meeting-2021/ |url-status=live |archive-url=https://web.archive.org/web/20210127214849/https://sdg.iisd.org/events/world-economic-forum-annual-meeting-2021/ |archive-date=27 January 2021 |access-date=26 January 2021 |work=[[International Institute for Sustainable Development]] (IISD) |series=SDG Knowledge Hub}}</ref> The summit was postponed several times due to the pandemic, first to May 2021 and later to 2022.<ref name="fr100720">{{cite news |date=7 October 2020 |title=2021 Davos summit shifted to Lucerne in May |work=France 24 |url=https://www.france24.com/en/20201007-2021-davos-summit-shifted-to-lucerne-in-may |url-status=live |access-date=18 November 2020 |archive-url=https://web.archive.org/web/20201101182802/https://www.france24.com/en/20201007-2021-davos-summit-shifted-to-lucerne-in-may |archive-date=1 November 2020}}</ref><ref name=":0">{{cite news |title=WEF cancels 2021 annual meeting, says next summit in 1st half of 2022 |newspaper=The Economic Times |url=https://economictimes.indiatimes.com/news/international/world-news/wef-cancels-2021-annual-meeting-says-next-summit-in-1st-half-of-2022/articleshow/82710909.cms?from=mdr |url-status=live |access-date=5 August 2021 |archive-url=https://web.archive.org/web/20210805054913/https://economictimes.indiatimes.com/news/international/world-news/wef-cancels-2021-annual-meeting-says-next-summit-in-1st-half-of-2022/articleshow/82710909.cms?from=mdr |archive-date=5 August 2021}}</ref> The theme of Davos 2022 was "History at a Turning Point", with discussions largely dominated by the [[Russian invasion of Ukraine]].<ref>{{cite web |last1=Gayle |first1=Markovitz |last2=Samantha |first2=Sault |date=3 June 2022 |title=6 themes at Davos 2022 that will define what happens next |url=https://www.weforum.org/agenda/2022/06/davos-2022-key-themes-global-cooperation-health-equity-digital-inclusion-economic-outlook/ |url-status=live |archive-url=https://web.archive.org/web/20220804044148/https://www.weforum.org/agenda/2022/06/davos-2022-key-themes-global-cooperation-health-equity-digital-inclusion-economic-outlook/ |archive-date=4 August 2022 |access-date=4 August 2022 |website=World Economic Forum}}</ref>

      The Great Reset Initiative, and the WEF more broadly,<ref>{{cite book |last1=Martens |first1=Jens |chapter=The Role of Public and Private Actors and Means in Implementing the SDGS: Reclaiming the Public Policy Space for Sustainable Development and Human Rights |title=Sustainable Development Goals and Human Rights |year=2020 |isbn=978-3-030-30468-3 |series=Interdisciplinary Studies in Human Rights |volume=5 |pages=207–220 |doi=10.1007/978-3-030-30469-0_12 |access-date=17 August 2021 |chapter-url=https://link.springer.com/chapter/10.1007/978-3-030-30469-0_12 |archive-url=https://web.archive.org/web/20210817101705/https://link.springer.com/chapter/10.1007/978-3-030-30469-0_12 |archive-date=17 August 2021 |url-status=live |s2cid=213580432}}</ref> have been criticised by commentators for encouraging economic deregulation and expanding the influence of private corporations, particularly [[multinational corporation|multinational corporations]], in policymaking at the expense of governmental authority.<ref name="wecke_od">{{cite news |last1=Ivan |first1=Wecke |date=16 August 2021 |title=Conspiracy theories aside, there is something fishy about the Great Reset |language=en |work=openDemocracy |url=https://www.opendemocracy.net/en/oureconomy/conspiracy-theories-aside-there-something-fishy-about-great-reset/ |url-status=live |access-date=4 August 2022 |archive-url=https://archive.today/20220404023305/https://www.opendemocracy.net/en/oureconomy/conspiracy-theories-aside-there-something-fishy-about-great-reset/ |archive-date=4 April 2022}}</ref><ref name="intercept120820">{{cite news |last1=Klein |first1=Naomi |date=8 December 2020 |title=The Great Reset Conspiracy Smoothie |work=The Intercept |url=https://theintercept.com/2020/12/08/great-reset-conspiracy/ |url-status=live |access-date=14 December 2020 |archive-url=https://web.archive.org/web/20201213162038/https://theintercept.com/2020/12/08/great-reset-conspiracy/ |archive-date=13 December 2020}}</ref> Others argued that it overemphasised health and exaggerated the ability of a small group of decision-makers to reshape the global economy,<ref>{{Cite journal |last=Roth |first=Steffen |date=22 January 2021 |title=The Great Reset. Restratification for lives, livelihoods, and the planet |url=https://derroth.com/2020/12/04/preview-the-great-reset-restratification-for-lives-livelihoods-and-the-planet/ |url-status=live |journal=Technological Forecasting & Social Change |language=en |volume=166 |article-number=120636 |doi=10.1016/j.techfore.2021.120636 |issn=0040-1625 |pmc=9757815 |pmid=36569031 |archive-url=https://web.archive.org/web/20221110082521/https://derroth.com/2020/12/04/preview-the-great-reset-restratification-for-lives-livelihoods-and-the-planet/ |archive-date=10 November 2022 |access-date=10 November 2022}}</ref> or that it amounted to [[crony capitalism]].<ref>{{Cite journal |last=Foss |first=Nicolai |date=27 April 2022 |title=The economy doesn't need a reset, and neither does management theory |journal=Scandinavian Journal of Management |language=en |volume=38 |issue=3 |article-number=101214 |doi=10.1016/j.scaman.2022.101214 |issn=0956-5221 |s2cid=248794634 |doi-access=free }}</ref>

      The initiative also became the focus of [[Conspiracy theory|conspiracy theories]] circulated mainly by conservative commentators on platforms such as [[YouTube]], [[Facebook]], and [[Twitter]]. Conspiratorial claims included that the pandemic had been engineered by a secret group to control the global economy,<ref name="BBC20201122" /> that lockdowns were intentionally designed to cause economic collapse,<ref name=":1">{{cite news |date=24 June 2021 |title=What is the Great Reset - and how did it get hijacked by conspiracy theories? |publisher=BBC News |url=https://www.bbc.co.uk/news/blogs-trending-57532368 |url-status=live |access-date=4 August 2022 |archive-url=https://web.archive.org/web/20220804020626/https://www.bbc.co.uk/news/blogs-trending-57532368 |archive-date=4 August 2022}}</ref> or that a global elite sought to abolish [[private property]] while using vaccines to subjugate populations.<ref name="Zimonjic">{{cite news |last1=Zimonjic |first1=Peter |date=3 September 2022 |title=World Economic Forum official says Canada has bigger issues to discuss than conspiracy theories |work=CBC News |url=https://www.cbc.ca/news/politics/adrian-monck-world-economic-forum-house-interview-1.6571569 |url-status=live |access-date=8 September 2022 |archive-url=https://web.archive.org/web/20220907232551/https://www.cbc.ca/news/politics/adrian-monck-world-economic-forum-house-interview-1.6571569 |archive-date=7 September 2022}}</ref><ref name="wecke_od" /> Such theories gained traction when political leaders including U.S. president [[Joe Biden]], New Zealand prime minister [[Jacinda Ardern]], and Canadian prime minister [[Justin Trudeau]] referred to the idea of a post-pandemic "reset" in public statements.<ref name="BBC20201122" /><ref name="RC_DeRosa_20201118">{{cite news |last1=De Rosa |first1=Nicholas |date=18 November 2020 |title=Le "Great Reset" n'est pas un complot pour contrôler le monde |language=fr |work=Radio-Canada |publisher=Canadian Broadcasting Corporation |url=https://ici.radio-canada.ca/nouvelle/1750586/great-reset-grande-reinitialisation-forum-economique-mondial-davos-complot-communisme#::text=%C2%AB%20La%20Grande%20R%C3%A9initialisation%20%C2%BB%20%E2%80%93%20ou,meilleur%20apr%C3%A8s%20la%20crise%20sanitaire.}}</ref>

      == Key components ==

      By mid-April 2020, against the backdrop of the [[COVID-19 pandemic]], the [[COVID-19 recession]], the [[2020 Russia–Saudi Arabia oil price war]], and the resulting "collapse in oil prices",<ref name="NaPo_Bloomberg_Orland_20200407">{{cite news |last=Orland |first=Kevin |date=7 April 2020 |title=Alberta Premier Kenney sees negative oil prices, $20-billion deficit in "the greatest challenge of our generation" |work=National Post via Bloomberg News |url=https://nationalpost.com/commodities/energy/alberta-premier-kenney-sees-negative-oil-prices-14-billion-deficit |url-status=live |access-date=7 April 2020 |archive-url=https://web.archive.org/web/20210204075551/https://nationalpost.com/commodities/energy/alberta-premier-kenney-sees-negative-oil-prices-14-billion-deficit |archive-date=4 February 2021}}</ref> the former [[Governor of the Bank of England]], [[Mark Carney]], described possible fundamental changes in an article in ''[[The Economist]]''. Carney said that in a post-COVID world, "stakeholder capitalism" will be tested as "companies will be judged by 'what they did during the war', how they treated their employees, suppliers and customers, by who shared and who hoarded."<ref name="theeconomist_Carney_20200416">{{Cite news |date=16 April 2020 |title=Mark Carney on how the economy must yield to human values |newspaper=The Economist |url=https://www.economist.com/by-invitation/2020/04/16/mark-carney-on-how-the-economy-must-yield-to-human-values |url-status=live |access-date=26 January 2021 |archive-url=https://web.archive.org/web/20210125165005/https://www.economist.com/by-invitation/2020/04/16/mark-carney-on-how-the-economy-must-yield-to-human-values |archive-date=25 January 2021 |issn=0013-0613}}</ref> The "gulf between what markets value and what people value" will close.<ref name="theeconomist_Carney_20200416" /> "In a post-COVID world, it is reasonable to expect that more people will want improvements in risk management, in social and medical safety nets, and will want more attention paid to scientific experts. This new hierarchy of values will call for a reset on the way we deal with [[climate change]], which, like the pandemic, is a global phenomenon. No one can 'self-isolate' from climate change, so we all need to 'act in advance and in solidarity."<ref name="theeconomist_Carney_20200416" /> In his 2020 BBC [[Reith Lectures]], Carney developed his theme of value hierarchies as related to three crises—credit, COVID, and climate.<ref name="BBC_Carney_20201202">{{Cite episode |title=How We Get What We Value - From Moral to Market Sentiments |first=Mark |last=Carney |series=[[Reith Lectures]] via BBC Sounds |access-date=6 December 2020 |date=2 December 2020 |url=https://www.bbc.co.uk/sounds/play/m000py8t |archive-date=7 December 2020 |archive-url=https://web.archive.org/web/20201207113726/https://www.bbc.co.uk/sounds/play/m000py8t |url-status=live}}</ref>

      According to a 15 May 2020 WEF article, COVID-19 offered an opportunity to "reset and reshape" the world in a way that is more aligned with the United Nations 2030 [[Sustainable Development Goals]] (SDG), as [[climate change]], inequality, and poverty gained even greater urgency during the pandemic.<ref name="WEF_Bhattacharya_20200515">{{Cite web |last=Bhattacharya |first=CB |date=15 May 2020 |title=How the great COVID-19 reset can help firms build a more sustainable future |url=https://www.weforum.org/agenda/2020/05/the-covid-19-reset-sustainability/ |url-status=live |archive-url=https://web.archive.org/web/20210125223717/https://www.weforum.org/agenda/2020/05/the-covid-19-reset-sustainability |archive-date=25 January 2021 |access-date=26 January 2021 |website=weforum.org |publisher=World Economic Forum}}</ref> This included resetting labour markets, as more people work remotely speeding up the process of the "future of work". The reset would advance work already begun to prepare for the transition to the [[Fourth Industrial Revolution]] by upskilling and reskilling workers.<ref>{{Cite web |date=1 May 2020 |title=5 ways to reset labour markets after coronavirus recovery |url=https://www.weforum.org/agenda/2020/05/the-future-of-work-is-here-5-ways-to-reset-labour-markets-after-coronavirus-recovery/ |url-status=live |archive-url=https://web.archive.org/web/20201124231530/https://www.weforum.org/agenda/2020/05/the-future-of-work-is-here-5-ways-to-reset-labour-markets-after-coronavirus-recovery/ |archive-date=24 November 2020 |access-date=26 January 2021 |work=World Economic Forum}}</ref> Another post-COVID concern raised by the WEF is food security including the "risk of disruptions to food supply chains", and the need for "global policy coordination" to prevent "food protectionism from becoming the post-pandemic new normal".<ref>{{Cite web |title=How can we prevent a COVID-19 food crisis? |url=https://www.weforum.org/agenda/2020/05/preventing-a-covid-19-food-crisis/ |url-status=live |archive-url=https://web.archive.org/web/20210116182645/https://www.weforum.org/agenda/2020/05/preventing-a-covid-19-food-crisis |archive-date=16 January 2021 |access-date=27 January 2021 |work=World Economic Forum|date=16 May 2020 }}</ref>

      In her 3 June 2020 keynote address opening the Great Reset forum, a joint initiative of the WEC and then Prince of Wales [[Charles III|Charles]], [[Kristalina Georgieva]], managing director of the [[International Monetary Fund]] (IMF) said that there has been a "massive injection of fiscal stimulus to help countries deal with this crisis" and that it was of "paramount importance that this growth should lead to a greener, smarter, fairer world in the future".<ref name="WEF_Kristalina_keynote" /><ref name="Wapo_20200603">{{Cite web |last1=Ignatius |first1=Washington Post Live IMF Managing Director Kristalina Georgieva with David |last2=Columnist |first2=Washington Post |title=The Path Forward: The Global Economy |url=https://www.imf.org/en/News/Articles/2020/06/03/tr060320-the-path-forward-the-global-economy |url-status=live |archive-url=https://web.archive.org/web/20210118050605/https://www.imf.org/en/News/Articles/2020/06/03/tr060320-the-path-forward-the-global-economy |archive-date=18 January 2021 |access-date=27 January 2021 |work=IMF}}</ref> Georgieva listed three aspects of the Great Reset: [[green growth]], smarter growth, and fairer growth. Government investments and government incentives for private investors could "support low-carbon and climate-resilient growth" such as "planting mangroves, land restoration, reforestation or insulating buildings".<ref name="WEF_Kristalina_keynote" /> With low oil prices, the timing was right to eliminate [[fossil fuel subsidies]] and introduce carbon pricing to incentivise future investments.<ref name="WEF_Kristalina_keynote" /> The COVID-19 pandemic presented an opportunity to shape an economic recovery and the future direction of global relations, economies and priorities.<ref name="wefreset">{{cite web |title=The Great Reset |url=https://www.weforum.org/great-reset/ |url-status=live |archive-url=https://web.archive.org/web/20200605141038/https://www.weforum.org/great-reset/ |archive-date=5 June 2020 |access-date=19 November 2020 |publisher=World Economic Forum}}</ref>

      In June 2020, Klaus Schwab, who founded the [[World Economic Forum]] (WEF) in 1971 was chairman at the time, described the three core components of the Great Reset.<ref name="WEF_Schwab_20200603" /> The first includes creating conditions for a "stakeholder economy"; improving policies and agreements on taxes, regulations, fiscal policies and trade to result in "fairer outcomes".<ref name="WEF_Schwab_20200603" /> The second component addresses how the large-scale pandemic spending programs with private investments and pension funds could improve on the old system by building one that is more "resilient, equitable and sustainable" over the long term by "building green urban infrastructure and creating incentives for industries to improve their track record on environmental, social and governance (ESG) metrics". The third component of a Great Reset agenda is to "harness the innovations of the Fourth Industrial Revolution" for the public good.<ref name="WEF_Schwab_20200603" /> A July 2020 non-fiction by Schwab and economist Thierry Malleret develops the plan in more detail.<ref name="Schwab_Malleret_20200709" /><ref>{{cite book |last1=Schwab |first1=Klaus |title=COVID-19: the great reset |last2=Malleret |first2=Thierry |date=2020 |publisher=Forum Publishing |isbn=978-2-940631-12-4 |edition=1 |location=Cologny/Geneva Schweiz |oclc=1193302829}}</ref>

      In one of the Great Reset Dialogues, [[John Kerry]] and other members of a WEF dialogue discussed how to rebuild the "social contract" in a post-COVID world.<ref name="WEF_20200626">{{Cite AV media |url=https://www.youtube.com/watch?v=ddGQTcuV-eg |title=Six leaders discuss why we must reform the social contract after COVID-19 |date=26 June 2020 |series=Great Reset Dialogues |time=8:06 |access-date=26 January 2021 |archive-url=https://web.archive.org/web/20210215182013/https://www.youtube.com/watch?v=ddGQTcuV-eg |archive-date=15 February 2021 |url-status=live |people=John Kerry, Jan Vapaavuori, Hilary Cottam, Mohammad Jaafar, Bob Moritz, Geraldine Matchett, Dr Phillip Atiba Goff |work=World Economic Forum}}</ref>

      In a comment according to [[Charles III]] (then Prince of Wales), the economic recovery must put the world on a path to sustainability, which would include [[carbon pricing]]. He emphasized that the [[private sector]] would be the main drivers of the plan.<ref name="guardian060320" /> The market should adapt to the current reality by aiming for fairer results, ensuring that investments are aimed at mutual progress including accelerating ecologically friendly investments, and to start a fourth industrial revolution, creating digital economic and public infrastructure.<ref name="guardian060320" />

      According to Schwab, they would not change the economic system, but rather improve it to what he considers to be "responsible capitalism".<ref name="RC_DeRosa_20201118" /> The [[Brookings Institution]] described this three-point plan in response to the COVID-19 crisis; response, recovery and reset. For the near term it involves response. In the medium term this involves "rebuilding economic and social activity in a manner that protects public health, promotes societal healing and preserves the environment". The reset is for systems over the long term of establishing through our "collective imagination" a great reset; a "new equilibrium among political, economic, social and environmental systems toward common goals".<ref>{{Cite news |last1=McArthur |first1=John |last2=Khan |first2=Zia |date=19 June 2020 |title=Rebuilding toward the great reset: Crisis, COVID-19, and the Sustainable Development Goals |work=Brookings |url=https://www.brookings.edu/blog/up-front/2020/06/19/rebuilding-toward-the-great-reset-crisis-covid-19-and-the-sustainable-development-goals/ |url-status=live |access-date=26 January 2021 |archive-url=https://web.archive.org/web/20210103065947/https://www.brookings.edu/blog/up-front/2020/06/19/rebuilding-toward-the-great-reset-crisis-covid-19-and-the-sustainable-development-goals/ |archive-date=3 January 2021}}</ref>

      === Fourth Industrial Revolution ===
      {{main|Fourth Industrial Revolution}}

      Klaus Schwab used the concept of a "Fourth Industrial Revolution" in a 2015 article published by ''[[Foreign Affairs]]'',<ref name="FA_Schwab_20151212">{{Cite news |last=Schwab |first=Klaus |date=12 December 2015 |title=The Fourth Industrial Revolution |newspaper=Foreign Affairs |url=https://www.foreignaffairs.com/articles/2015-12-12/fourth-industrial-revolution/ |url-status=live |access-date=1 February 2021 |archive-url=https://web.archive.org/web/20210126230646/https://www.foreignaffairs.com/articles/2015-12-12/fourth-industrial-revolution |archive-date=26 January 2021}}</ref> and in 2016, the theme of the World Economic Forum annual meeting in Davos-Klosters, Switzerland, was "Mastering the Fourth Industrial Revolution".<ref name="Forbes_Marr_20160405">{{Cite news |last=Marr |first=Bernard |title=Why Everyone Must Get Ready For The 4th Industrial Revolution |language=en |work=Forbes |url=https://www.forbes.com/sites/bernardmarr/2016/04/05/why-everyone-must-get-ready-for-4th-industrial-revolution/#5af877b33f90 |url-status=live |access-date=14 February 2018 |archive-url=https://web.archive.org/web/20200513112955/https://www.forbes.com/sites/bernardmarr/2016/04/05/why-everyone-must-get-ready-for-4th-industrial-revolution/#5af877b33f90 |archive-date=13 May 2020}}</ref> In his 2015 article, Schwab said that the first [[Industrial Revolution]] was powered by "water and steam" to "mechanize production". Through electrical power, the second industrial revolution introduced mass production. Electronics and information technologies automated the production process in the third industrial revolution. In the fourth industrial revolution the lines between "physical, digital and biological spheres" have become blurred and this current revolution, which began with the digital revolution in the mid-1990s, is "characterized by a fusion of technologies".<ref name="FA_Schwab_20151212" /> This fusion of technologies included "fields such as [[artificial intelligence]], [[robotics]], the [[Internet of things|Internet of Things]], [[autonomous vehicles]], [[3D printing]], [[nanotechnology]], [[biotechnology]], [[materials science]], energy storage and [[quantum computing]]."<ref name="FA_Schwab_20151212" />

      Just before the 2016 annual WEF meeting of the Global Future Councils, [[Ida Auken]], a Danish MP who was also a young global leader and a member of the Council on Cities and Urbanization, wrote an article that was uploaded to the official WEF website and later republished by ''[[Forbes]]'' in which she imagined how technology could improve people's lives by 2030 if the United Nations [[sustainable development goals]] (SDG) were realized through this fusion of technologies. In the scenario presented by Auken, the emergence and application of new digitized technologies to sectors such as communication, energy, transportation, and accommodation would result in greater access and decreased cost (ultimately leading to a complete elimination of cost), eventually leading to the end of "lifestyle diseases, [[climate change]], the refugee crisis, [[environmental degradation]], completely congested cities, water pollution, air pollution, social unrest and unemployment" as well as other early 21st century crises. By the scenario's 2030 endpoint, anything that had once been a product was now a freely available service, obviating any need for personal ownership of goods or real estate.<ref name="Reuters">{{cite news |date=25 February 2021 |title=Fact check: The World Economic Forum does not have a stated goal to have people own nothing by 2030 |newspaper=Reuters |url=https://www.reuters.com/article/uk-factcheck-wef-idUSKBN2AP2T0 |url-status=live |access-date=23 May 2022 |archive-url=https://web.archive.org/web/20220525140854/https://www.reuters.com/article/uk-factcheck-wef-idUSKBN2AP2T0 |archive-date=25 May 2022}}</ref> The article, originally titled "Welcome to 2030. I own nothing, have no privacy, and life has never been better", has been criticized as portraying an unrealistic utopia at the cost of privacy.<ref name="Reuters" /> In response, Auken added an author's note in which she said that the article merely represented a potential future scenario rather than any personal utopia of her own and that it was intended to "start a discussion about some of the pros and cons of the current technological development" in a way that she claimed conventional reports could not, while the article itself was renamed to "Here's how life could change in my city by the year 2030".<ref name="Reuters" /><ref name="WEF_Auken_2016_retitled">{{Cite web |last=Auken |first=Ida |date=11 November 2016 |title=Here's how life could change in my city by the year 2030 |url=https://www.weforum.org/agenda/2016/11/how-life-could-change-2030/ |url-status=live |archive-url=https://web.archive.org/web/20210201173846/https://www.weforum.org/agenda/2016/11/how-life-could-change-2030/ |archive-date=1 February 2021 |access-date=1 February 2021 |work=WEF}}</ref> Both versions of the article describe the loss of privacy as undesirable.<ref name="Reuters" />

      While the "interest in Fourth Industrial Revolution technologies" had "spiked" during the COVID-19 pandemic, fewer than 9% of companies were using machine learning, robotics, touch screens and other advanced technologies. A 21 October 2020 WEF virtual panel discussed how organizations could harness fourth revolution technologies.<ref name="WEF_DiCaro_20201015">{{Cite web |last=Di Caro |first=Beatrice |date=15 October 2020 |title=The Great Reset: Harnessing the Fourth Industrial Revolution |url=https://www.weforum.org/agenda/2020/10/the-great-reset-harnessing-the-fourth-industrial-revolution/ |url-status=live |archive-url=https://web.archive.org/web/20210112094811/https://www.weforum.org/agenda/2020/10/the-great-reset-harnessing-the-fourth-industrial-revolution/ |archive-date=12 January 2021 |access-date=1 February 2021 |work=World Economic Forum}}</ref> On 28 January 2021, Davos Agenda virtual panel discussed how artificial intelligence (AI) will "fundamentally change the world". 63% of CEOs believe that "AI will have a larger impact than the Internet."<ref name="Davos_2021">{{Cite AV media |url=https://www.youtube.com/watch?v=l4rFORDHo_o |title=Harnessing the Fourth Industrial Revolution |date=28 January 2021 |series=Davos Agenda 2021 |time=44:14 |access-date=1 February 2021 |archive-url=https://web.archive.org/web/20210129164330/https://www.youtube.com/watch?v=l4rFORDHo_o |archive-date=29 January 2021 |url-status=live |people=[[Yang Yanqing]], Mohit Joshi, [[Ken Hu]], [[Xiao Yaqing]], [[Andreas Kunze]]}}</ref>

      During 2020, the Great Reset Dialogues resulted in multi-year projects, such as the digital transformation programme where cross-industry stakeholders investigate how the 2020 "dislocative shock" had increased and "accelerated digital transformations".<ref name="WEF_digital_202007">{{cite report |url=http://www3.weforum.org/docs/WEF_Digital_Transformation_Powering_the_Great_Reset_2020.pdf |title=Digital Transformation: Powering the Great Reset |date=July 2020 |location=Cologny/[[Geneva]], [[Switzerland]] |page=17 |access-date=25 January 2021 |archive-url=https://web.archive.org/web/20210107120827/http://www3.weforum.org/docs/WEF_Digital_Transformation_Powering_the_Great_Reset_2020.pdf |archive-date=7 January 2021 |url-status=live}} The WEF "engages the foremost political, business and other leaders of society to shape global, regional and industry agendas".</ref> Their report said that, while "digital ecosystems will represent more than $60 trillion in revenue by 2025", "only 9% of executives [in July 2020] say their leaders have the right digital skills".<ref name="WEF_digital_202007" />

      "The Great Reset" was scheduled to be the theme of 2021 World Economic Forum summit in Davos, but this was postponed repeatedly to 2022.<ref name="fr100720" /><ref name=":0" /> The 2022 Davos summit theme was "History at a Turning Point", and it was dominated by the [[Russian invasion of Ukraine]].<ref>{{cite web |last1=Gayle |first1=Markovitz |last2=Samantha |first2=Sault |date=3 June 2022 |title=6 themes at Davos 2022 that will define what happens next |url=https://www.weforum.org/agenda/2022/06/davos-2022-key-themes-global-cooperation-health-equity-digital-inclusion-economic-outlook/ |url-status=live |archive-url=https://web.archive.org/web/20220804044148/https://www.weforum.org/agenda/2022/06/davos-2022-key-themes-global-cooperation-health-equity-digital-inclusion-economic-outlook/ |archive-date=4 August 2022 |access-date=4 August 2022 |website=World Economic Forum}}</ref>

      == Endorsements ==

      Political leaders such as Canadian Prime Minister [[Justin Trudeau]], U.S. President [[Joe Biden]] and former New Zealand Prime Minister [[Jacinda Ardern]] have endorsed the idea of "building back better", as has former UK Prime Minister [[Boris Johnson]].<ref name="CBC_Wherry_20201127">{{Cite news |last=Wherry |first=Aaron |date=27 November 2020 |title=The Conservatives fire up a phoney war over the "Great Reset" theory |work=CBC News |url=https://www.cbc.ca/news/politics/great-reset-trudeau-poilievre-otoole-pandemic-covid-1.5817973 |url-status=live |access-date=27 January 2021 |archive-url=https://web.archive.org/web/20201127090507/https://www.cbc.ca/news/politics/great-reset-trudeau-poilievre-otoole-pandemic-covid-1.5817973 |archive-date=27 November 2020}}</ref>

      === Canada ===

      In an 11 June 2020 meeting with the then Prince of Wales, now King Charles III, and [[Permanent Representatives to the United Nations]] from the [[Commonwealth of Nations]], Prime Minister Justin Trudeau spoke regarding the Great Reset initiative.<ref name="PM_CA_20200612">{{Cite web |date=12 June 2020 |title=Prime Minister Trudeau speaks with His Royal Highness The Prince of Wales and the Commonwealth group of Permanent Representatives to the United Nations |url=https://pm.gc.ca/en/news/readouts/2020/06/11/prime-minister-trudeau-speaks-his-royal-highness-prince-wales-and |url-status=live |archive-url=https://web.archive.org/web/20201206044915/https://pm.gc.ca/en/news/readouts/2020/06/11/prime-minister-trudeau-speaks-his-royal-highness-prince-wales-and |archive-date=6 December 2020 |access-date=27 January 2021 |work=Prime Minister of Canada}}</ref> Trudeau said that the Commonwealth, of which Canada is a member country, provides a space for "dialogue and collective action on [[global issues]] related to sustainable development" which includes how to "build back stronger, more resilient, and greener economies" in a post-COVID-19 world.<ref name="PM_CA_20200612" /> This is in line with similar statements made on 28 May 2020, when Trudeau and [[Andrew Holness]], Jamaica's Prime Minister, convened an online meeting of "world leaders and international organizations" to consult on a "global response to the significant economic and human impacts of COVID-19, and advance concrete solutions to the development emergency".<ref name="PM_CA_20200528">{{Cite web |date=28 May 2020 |title=Governments and international organizations come together to address economic challenges and sustainability |url=https://pm.gc.ca/en/news/news-releases/2020/05/28/governments-and-international-organizations-come-together-address |url-status=live |archive-url=https://web.archive.org/web/20201024063748/https://pm.gc.ca/en/news/news-releases/2020/05/28/governments-and-international-organizations-come-together-address |archive-date=24 October 2020 |access-date=27 January 2021 |work=Prime Minister of Canada}}</ref>

      In his August presentation entitled "The Great Reset", at the Victoria Forum 2020, the [[Governor of the Bank of Canada]] described how COVID-19 is resulting in a "structural shock with broad impact worldwide".<ref name="bankofcanada_202008">{{cite conference |last=Beaudry |first=Paul |date=August 2020 |title=The Great Reset: Supporting the transition to a greener, smarter economy |url=https://www.bankofcanada.ca/wp-content/uploads/2020/08/presentation-2020-08-20.pdf |conference=Victoria Forum 2020 |archive-url=https://web.archive.org/web/20201126152808/https://www.bankofcanada.ca/wp-content/uploads/2020/08/presentation-2020-08-20.pdf |archive-date=26 November 2020 |access-date=26 January 2021 |work=[[Bank of Canada]] |url-status=live}}</ref> He said that governments, investors in the corporate and financial sector—including central banks, and individuals households, need to evaluate risks and prepare for transitions. He recommended the use of scenario analysis, as a way of describing possible and plausible outcomes as we are faced with a "high degree of uncertainty" in terms of [[climate change]], policy, "technological development", and "evolving consumer and investor preferences".<ref name="bankofcanada_202008" />

      In a 29 September 2020 six-minute virtual address to the UN General Assembly, Prime Minister Trudeau described how "[b]uilding back better" included supporting the most vulnerable, for example by ensuring "equitable access" to COVID-19 vaccine in developing countries, while also working towards reaching the UN's Sustainable Development Goals for 2030.<ref name="Trudeau_UN_20200929">{{Cite AV media |url=https://www.youtube.com/watch?t=310&v=n2fp0Jeyjvw&feature=youtu.be |title=Coronavirus: Trudeau tells UN conference that pandemic provided "opportunity for a reset" |date=29 September 2020 |time=6:11 |access-date=27 January 2021 |archive-url=https://web.archive.org/web/20210115003646/https://www.youtube.com/watch?t=310&v=n2fp0Jeyjvw&feature=youtu.be |archive-date=15 January 2021 |url-status=live |quote="This pandemic has provided an opportunity for a reset. This is our chance to accelerate our pre-pandemic efforts to reimagine economic systems that actually address global challenges like extreme poverty inequality and climate change. |people=Prime Minister Justin Trudeau |work=Global News via [[YouTube]]}}</ref><ref name="RC_DeRosa_20201118" />

      The media responded to accusations made by Conservative finance critic MP [[Pierre Poilievre]] that Trudeau, who had used the term "reset" in his September UN speech, was "harbouring a very ambitious hidden agenda — not just for Canada but for the world", by saying that the WEF agenda is published on its website.<ref name="nationalpost241120">{{cite news |last1=Selley |first1=Chris |date=24 November 2020 |title=A "great reset" requires a determined leader. Thankfully, Trudeau isn't it |work=National Post |url=https://nationalpost.com/opinion/chris-selley-a-great-reset-requires-a-determined-leader-thankfully-trudeau-isnt-it |url-status=live |access-date=24 November 2020 |archive-url=https://web.archive.org/web/20210204075534/https://nationalpost.com/opinion/chris-selley-a-great-reset-requires-a-determined-leader-thankfully-trudeau-isnt-it |archive-date=4 February 2021}}</ref><ref name="macleans231120">{{cite news |last1=Wells |first1=Paul |date=23 November 2020 |title=The Great Reset is mostly just Liberals blowing off steam. Mostly. |work=Maclean's |url=https://www.macleans.ca/politics/ottawa/the-great-reset-is-mostly-just-liberals-blowing-off-steam-mostly/ |url-status=live |access-date=24 November 2020 |archive-url=https://web.archive.org/web/20201123200101/https://www.macleans.ca/politics/ottawa/the-great-reset-is-mostly-just-liberals-blowing-off-steam-mostly/ |archive-date=23 November 2020}}</ref> [[Erin O'Toole]], who has been the [[Leader of the Official Opposition (Canada)|Leader of the Opposition]] as leader of the [[Conservative Party of Canada]] since 24 August 2020, wrote in a 21 November tweet, "It's hard to believe anyone would look at the carnage caused by COVID-19 and see an opportunity". The message was that "Conservatives want to bring back economic certainty" while [[Liberal Party of Canada|Liberals]] want to "reimagine the economy", which O'Toole described as "a massive and risky experiment".<ref name="OToole_20201122">{{Cite web |last=O'Toole |first=Erin |date=22 November 2020 |title=It's hard to believe anyone would look at the carnage caused by COVID-19 and see an opportunity. This is NOT the time for a massive and risky experiment to reimagine the economy. |url=https://twitter.com/erinotoole/status/1330305727928422401 |url-status=live |archive-url=https://web.archive.org/web/20210111070106/https://twitter.com/erinotoole/status/1330305727928422401 |archive-date=11 January 2021 |access-date=27 January 2021 |work=Twitter}}</ref> The ''Post'' said that Poilievre had launched a petition that gathered 70,000 signatures within three days on 20 November<ref name="devoirproulx20201121">{{Cite news |last=Proulx |first=Boris |date=21 November 2020 |title=Une 'théorie du complot' s'invite dans les rangs conservateurs |work=Le Devoir |url=https://www.ledevoir.com/politique/canada/590193/une-theorie-du-complot-s-infiltre-dans-les-rangs-des-conservateurs |url-status=live |access-date=27 January 2021 |archive-url=https://web.archive.org/web/20201121141917/https://www.ledevoir.com/politique/canada/590193/une-theorie-du-complot-s-infiltre-dans-les-rangs-des-conservateurs |archive-date=21 November 2020}}</ref> in which he cautioned that the Liberals were secretly planning on "re-engineer[ing] economies and societies to empower the elites at the expense of the people" to remodel Canada to Trudeau's alleged "socialist ideology". Poilievre used phrases from Trudeau's September speech<ref name="nationalpost241120" /> to imply that Trudeau's statement that COVID-19 had "provided an opportunity for a reset" to "reimagine economic systems that actually address global challenges like extreme poverty inequality and [[climate change]]", was evidence that Trudeau was part of the great reset conspiracy theory, that had been circulating for some time.<ref name="Poilievre_petition">{{Cite web |last=Poilievre- MP, Carleton |first=Pierre |title=Stop the Great Reset |url=https://www.withpierre.ca/stopthegreatreset |url-status=live |archive-url=https://web.archive.org/web/20210128170758/https://www.withpierre.ca/stopthegreatreset |archive-date=28 January 2021 |access-date=27 January 2021}}</ref><ref name="star112020">{{cite web |last1=Alex |first1=Boutillier |date=20 November 2020 |title=A Conservative MP warns that Justin Trudeau wants a 'Great Reset.' Conspiracy theorists are worried, too |url=https://www.thestar.com/politics/federal/2020/11/19/a-conservative-mp-warns-that-justin-trudeau-wants-a-great-reset-conspiracy-theorists-are-worried-too.html |url-status=live |archive-url=https://web.archive.org/web/20201120235324/https://www.thestar.com/politics/federal/2020/11/19/a-conservative-mp-warns-that-justin-trudeau-wants-a-great-reset-conspiracy-theorists-are-worried-too.html |archive-date=20 November 2020 |access-date=21 November 2020 |work=Toronto Star |publisher=Torstar}}</ref><ref name="afp111920">{{cite news |date=19 November 2020 |title=Trudeau UN speech sparks "Great Reset" conspiracy |work=AFP Fact Check |url=https://factcheck.afp.com/trudeau-un-speech-sparks-great-reset-conspiracy |url-status=live |access-date=19 November 2020 |archive-url=https://web.archive.org/web/20201119232637/https://factcheck.afp.com/trudeau-un-speech-sparks-great-reset-conspiracy |archive-date=19 November 2020}}</ref>

      === United States ===

      A 23 January 2021 ''[[Financial Times]]'' article said that policymakers around the world are anticipating President Biden's "reset on trade, tax and climate".<ref name="FT_Wheatley_20210121">{{Cite news |last1=Wheatley |first1=Jonathan |last2=Hook |first2=Leslie |last3=Giles |first3=Chris |last4=Beattie |first4=Alan |date=21 January 2021 |title=Global policymakers look for Biden reset on trade, tax and climate |work=[[Financial Times]] |url=https://www.ft.com/content/96aac122-fe71-415a-ab08-ffb3986afe65 |url-status=live |access-date=27 January 2021 |archive-url=https://web.archive.org/web/20210123150717/https://www.ft.com/content/96aac122-fe71-415a-ab08-ffb3986afe65 |archive-date=23 January 2021}}</ref> Then President-elect [[Joe Biden]] had announced in November 2020, [[John Kerry]] would be appointed as [[U.S. Special Presidential Envoy for Climate]],<ref name="wsj-confirm-nom">{{cite news |date=23 November 2020 |title=Biden Reveals Some Cabinet Picks |publisher=The Wall Street Journal |url=https://www.wsj.com/articles/biden-reveals-some-cabinet-picks-11606152632 |url-status=live |access-date=23 November 2020 |archive-url=https://web.archive.org/web/20201123173716/https://www.wsj.com/articles/biden-reveals-some-cabinet-picks-11606152632 |archive-date=23 November 2020}}</ref> and Kerry was confirmed in this position on inauguration day, 20 January 2021. Kerry had participated in one of the Great Reset Dialogues on how to rebuild the "social contract" in a post-COVID world.<ref name="WEF_20200626" /><ref name="WEF_Kerry_202006">{{Cite web |date=June 2020 |title='Normal wasn't working' - John Kerry, Phillip Atiba Goff and others on the new social contract post-COVID |url=https://www.weforum.org/agenda/2020/06/great-reset-social-contract-john-kerry-phillip-goff/ |url-status=live |archive-url=https://web.archive.org/web/20210127084508/https://www.weforum.org/agenda/2020/06/great-reset-social-contract-john-kerry-phillip-goff/ |archive-date=27 January 2021 |access-date=27 January 2021 |work=World Economic Forum}}</ref> Kerry said that COVID-19 offered a "big moment" that opened the possibility for the Great Reset. He said the WEF would play a significant role in refining how to respond to [[climate change]] and inequalities that were "laid bare as a consequence of COVID-19."<ref name="thehill_Alliott_20201203">{{Cite web |last=Allott |first=Daniel |date=3 December 2020 |title=John Kerry reveals Biden's devotion to radical "Great Reset" movement |url=https://thehill.com/opinion/energy-environment/528482-john-kerry-reveals-bidens-devotion-to-radical-great-reset-movement |url-status=live |archive-url=https://web.archive.org/web/20210127133424/https://thehill.com/opinion/energy-environment/528482-john-kerry-reveals-bidens-devotion-to-radical-great-reset-movement |archive-date=27 January 2021 |access-date=27 January 2021 |work=[[The Hill (newspaper)|The Hill]] |format=Text}}</ref> The [[Heartland Institute]]'s editorial director expressed concerns that President [[Joe Biden]], [[2020 United States presidential election|elected in November 2020]], would "bring the Great Reset to the United States" and that "the country [would] never be the same."<ref name="thehill_Alliott_20201203" />

      === Netherlands ===

      In December 2021, the [[Dutch government]] published its past correspondence with representatives of the World Economic Forum.<ref>{{Cite web |title=Nader antwoord op vragen van het lid Van Houwelingen over het karakter van, en de relaties van kabinetsleden met, het World Economic Forum naar aanleiding van antwoorden op eerdere vragen |url=https://www.tweedekamer.nl/kamerstukken/kamervragen/detail/2021D50828/2021D50828}}{{Dead link|date=April 2023|bot=InternetArchiveBot|fix-attempted=yes}}</ref><ref name="Reuters Dutch">{{Cite news |date=21 December 2021 |title=Fact Check-World Economic Forum letters show 51st Annual Meeting invites |newspaper=Reuters |url=https://www.reuters.com/article/factcheck-coronavirus-netherlands-idUSL1N2T6137 |url-status=live |access-date=31 December 2021 |archive-url=https://web.archive.org/web/20211231082603/https://www.reuters.com/article/factcheck-coronavirus-netherlands-idUSL1N2T6137 |archive-date=31 December 2021}}</ref> The documents, which among others called for the Netherlands to take the lead in implementing the Great Reset, were officially made available by the Dutch government.<ref name="Reuters Dutch" />

      === New Zealand ===

      In January 2019, at a World Economic Forum "Safeguarding Our Planet"<ref name="Newshub_JacintaAdernWellbeing">{{cite news |title=Ardern's plea for climate change action: Be "on the right side of history" |work=[[RNZ]] |publisher=[[RNZ]] |agency=[[RNZ]] |url=https://www.rnz.co.nz/news/national/380722/ardern-s-plea-for-climate-change-action-be-on-the-right-side-of-history |url-status=live |access-date=23 January 2019 |archive-url=https://web.archive.org/web/20230424043954/https://www.rnz.co.nz/news/national/380722/ardern-s-plea-for-climate-change-action-be-on-the-right-side-of-history |archive-date=24 April 2023}}</ref> panel discussion alongside world leaders and broadcaster [[Sir David Attenborough]], New Zealand Prime Minister [[Jacinda Ardern]] discussed her government's "Wellbeing Budget" and planned environmental changes. These initiatives have been linked to the [[World Economic Forum]] Great Reset in related news articles.<ref name="DrMurielNewman_StateOfNation">{{cite news |title=The State of Our Nation |work=New Zealand Center for Political Research |publisher=New Zealand Center for Political Research |agency=New Zealand Center for Political Research |url=https://www.nzcpr.com/the-state-of-our-nation/ |url-status=live |access-date=25 January 2022 |archive-url=https://web.archive.org/web/20220125034750/https://www.nzcpr.com/the-state-of-our-nation/ |archive-date=25 January 2022}}</ref> In April 2020, the New Zealand Finance Minister [[Grant Robertson]] discussed a wellbeing focused post COVID "Recovery Budget" and an opportunity for an economical reset.<ref name="GrantRobertson_EconomicReset">{{cite news |last1=Jenée |first1=Tibshraeny |date=15 April 2020 |title=Grant Robertson says we "must not allow inequality to take hold in our recovery" as he outlines his vision for a "reset" economy; Meanwhile the PM announces pay cuts for government ministers and public sector CEOs |work=interest.co.nz |publisher=interest.co.nz |agency=interest.co.nz |url=https://www.interest.co.nz/news/104552/grant-robertson-says-we-must-also-not-allow-inequality-take-hold-our-recovery-he |url-status=live |access-date=15 April 2020 |archive-url=https://web.archive.org/web/20200419005647/https://www.interest.co.nz/news/104552/grant-robertson-says-we-must-also-not-allow-inequality-take-hold-our-recovery-he |archive-date=19 April 2020}}</ref> Other initiatives promoted by the pair include an Artificial Intelligence drive in New Zealand related to the WEF "Globalization 4.0" initiatives to shape a global architecture in the Age of the Fourth Industrial Revolution.<ref name="BenReid_NZ_AI">{{cite news |last1=Ben |first1=Reid |date=23 January 2019 |title=Into 2019: AI, The Fourth Industrial Revolution And Advancing Wellbeing |work=AI Forum NZ |publisher=AI Forum NZ |agency=AI Forum NZ |url=https://aiforum.org.nz/2019/01/23/into-2019-ai-the-fourth-industrial-revolution-and-advancing-wellbeing/ |url-status=live |access-date=23 January 2019 |archive-url=https://web.archive.org/web/20230424043954/https://aiforum.org.nz/2019/01/23/into-2019-ai-the-fourth-industrial-revolution-and-advancing-wellbeing/ |archive-date=24 April 2023}}</ref>

      ==Reception==
      ===Commentary===
      According to the [[Transnational Institute]] (TNI), the WEF is planning to replace a recognised democratic model with a model where a self-selected group of "stakeholders" make decisions on behalf of the people.<ref name="transnational">{{cite web |date=18 January 2016 |title=Davos and its danger to Democracy |url=https://www.tni.org/en/article/davos-and-its-danger-to-democracy |url-status=live |archive-url=https://web.archive.org/web/20210817095449/https://www.tni.org/en/article/davos-and-its-danger-to-democracy |archive-date=17 August 2021 |access-date=17 August 2021 |publisher=Transnational Institute}}</ref> The think tank summarises that we are increasingly entering a world where gatherings such as Davos are "a silent global [[coup d'état]]" to capture governance.<ref name="transnational" />

      [[Naomi Klein]], in a December 2020 article in ''[[The Intercept]]'', described the WEF idea as a "Great Reset Conspiracy Smoothie." She said that it was simply a "coronavirus-themed rebranding" of things that the WEF was already doing and that it was an attempt by the rich to make themselves look good. Klein wrote that Schwab had given each meeting at Davos a theme since 2003. "The Great Reset is merely the latest edition of this gilded tradition, barely distinguishable from earlier Davos Big Ideas."<ref name="intercept120820" />

      In his review of the 2020 book co-authored by Schwab and Malleret—and the Great Reset agenda in general—Ben Sixsmith, a contributor to ''[[The Spectator]]'', said that the Great Reset was a set of "bad ideas...adopted internationally by some of the richest and most powerful people in the world".<ref name="Schwab_Malleret_20200709" /><ref name="Spectator_Sixsmith_20201117">{{cite news |last=Sixsmith |first=Ben |date=17 November 2020 |title=What is the Great Reset? |work=The Spectator |url=https://spectator.us/great-reset-davos-klaus-schwab/ |url-status=live |access-date=18 November 2020 |archive-url=https://web.archive.org/web/20201117174547/https://spectator.us/great-reset-davos-klaus-schwab/ |archive-date=17 November 2020}}</ref> Sixsmith described sections of the book as "earnest", glum, dutiful and bland.<ref name="Spectator_Sixsmith_20201117" /> Ending with "The Great Reset might be all the more terrifying for not being a sinister plot."<ref name="Spectator_Sixsmith_20201117" />

      Similarly, in his review in the ''[[Journal of Value Inquiry]]'' of ''COVID-19: The Great Reset'', [[ethicist]] Steven Umbrello makes parallel critiques of the agenda. He says that the agenda amounts to nothing other than "a substantial (if not complete) socio-political-economic overhaul" and that such a proposal is a "[[false dilemma]]" and that "Schwab and Malleret whitewash a seemingly optimistic future post-Great Reset with [[Buzzword|buzz words]] like [[Equity (law)|equity]] and [[sustainability]] even as they functionally jeopardize those admirable goals".<ref>{{Cite journal |last=Umbrello |first=Steven |date=17 February 2021 |title=Should We Reset? A Review of Klaus Schwab and Thierry Malleret's 'COVID-19: The Great Reset' |url= |journal=The Journal of Value Inquiry |language=en |volume=56 |issue=4 |pages=693–700 |doi=10.1007/s10790-021-09794-1 |issn=1573-0492 |pmc=7886645}}</ref>

      === Conspiracy theories ===
      {{Anchor|Conspiracy theory by the same name}}
      {{Anchor|Conspiracy theory}}
      [[File:Great Reset placards.jpg|thumb|Placards protesting about COVID-19 responses and the "Great Reset", in Frankfurt, Germany, in 2022]]
      The term "Great Reset", also known as the "Liberal World Order" or "Global Liberal Order", can also refer to a [[conspiracy theory]] called by the same name. Such theories include claims that the COVID-19 pandemic was created by a secret group in order to seize control of the global economy,<ref name="BBC20201122" /> that [[COVID-19 lockdowns|lockdown restrictions]] were deliberately designed to induce economic meltdown,<ref name=":1" /> or that a global elite was attempting to abolish private property while using COVID-19 to enslave humanity with vaccines.<ref name="Zimonjic" /><ref name="wecke_od" />

      A November 2020 article in ''[[The Daily Beast]]'' said that even before Biden became president, his "incoming White House already ha[d] its first conspiracy theory to deal with"{{emdash}}the Great Reset conspiracy theory.<ref name="dailybeast_Sommer_20201126">{{Cite news |last=Sommer |first=Will |date=26 November 2020 |title=The Biden Presidency Already Has Its First Conspiracy Theory: The Great Reset |work=The Daily Beast |url=https://www.thedailybeast.com/joe-bidens-presidency-already-has-its-first-conspiracy-theory-the-great-reset |url-status=live |access-date=28 January 2021 |archive-url=https://web.archive.org/web/20210204075539/https://www.thedailybeast.com/joe-bidens-presidency-already-has-its-first-conspiracy-theory-the-great-reset |archive-date=4 February 2021}}</ref> Mainstream media outlets such as ''[[The New York Times]]'',<ref>{{Cite news |last=Wu |first=Katherine J. |date=17 November 2020 |title=F.D.A. Authorizes the First At-Home Coronavirus Test |work=The New York Times |url=https://www.nytimes.com/live/2020/11/17/world/covid-19-coronavirus |url-status=live |access-date=10 May 2022 |archive-url=https://web.archive.org/web/20201118001623/https://www.nytimes.com/live/2020/11/17/world/covid-19-coronavirus |archive-date=18 November 2020 |issn=0362-4331}}</ref> the BBC,<ref name="BBC20201122" /> and ''[[The Guardian]]'' traced the spread of the latest conspiracy theory on the Great Reset, which had integrated anti-lockdown conspiracies, to internet personalities and groups, including [[Candace Owens]], [[Glenn Beck]], [[Fox News]] hosts [[Laura Ingraham]], [[Sean Hannity]] and [[Tucker Carlson]],<ref name="afp111920" /><ref name="Slobodian">{{cite news |last=Slobodian |first=Quinn |date=4 December 2020 |title=How the "great reset" of capitalism became an anti-lockdown conspiracy |work=The Guardian |url=https://www.theguardian.com/commentisfree/2020/dec/04/great-reset-capitalism-became-anti-lockdown-conspiracy |url-status=live |access-date=20 December 2020 |archive-url=https://web.archive.org/web/20201220083931/https://www.theguardian.com/commentisfree/2020/dec/04/great-reset-capitalism-became-anti-lockdown-conspiracy |archive-date=20 December 2020}}</ref><ref name="BBC20201122" /><ref name="Capx202011202">{{cite news |last=Kamm |first=Oliver |date=20 November 2020 |title=The Great Reset is the latest conspiracy fantasy – it will not be the last |work=CapX |url=https://capx.co/the-great-reset-is-the-latest-conspiracy-fantasy-it-will-not-be-the-last/ |url-status=live |access-date=22 November 2020 |archive-url=https://web.archive.org/web/20201213185239/https://capx.co/the-great-reset-is-the-latest-conspiracy-fantasy-it-will-not-be-the-last/ |archive-date=13 December 2020}}</ref> and [[Paul Joseph Watson]],<ref name="voi111820">{{cite news |last1=Mahabarta |first1=Yudhistra |date=18 November 2020 |title=Looking For A Logical Exposure Of "The Great Reset", The Covid-19 Conspiracy Theory Now Campaigned By The World Economic Forum |work=Voice of Indonesia |url=https://voi.id/en/bernas/20133/looking-for-a-logical-exposure-of-the-great-reset-the-covid-19-conspiracy-theory-now-campaigned-by-the-world-economic-forum |url-status=live |access-date=18 November 2020 |archive-url=https://web.archive.org/web/20201120070202/https://voi.id/en/bernas/20133/looking-for-a-logical-exposure-of-the-great-reset-the-covid-19-conspiracy-theory-now-campaigned-by-the-world-economic-forum |archive-date=20 November 2020}}</ref> the UK-based editor of [[Alex Jones]]' website ''[[Infowars]]'', where he advanced the [[New World Order (conspiracy theory)|New World Order]] conspiracy theory.<ref name="TDB">{{cite news |last=Hines |first=Nico |date=22 April 2018 |title=Alex Jones' Protegé, Paul Joseph Watson, Is About to Steal His Crackpot Crown |work=The Daily Beast |url=https://www.thedailybeast.com/alex-jones-protege-paul-joseph-watson-is-about-to-steal-his-crackpot-crown |url-status=live |access-date=24 January 2019 |archive-url=https://web.archive.org/web/20190521045340/https://www.thedailybeast.com/alex-jones-protege-paul-joseph-watson-is-about-to-steal-his-crackpot-crown |archive-date=21 May 2019}}</ref> Ben Sixsmith wrote that the conspiracy theory had been spread by "fringes of Right-Wing Twitter", as well as by Australia's [[Pauline Hanson's One Nation|One Nation]] party leader [[Pauline Hanson]] (a "socialist left Marxist view of the world") and UK conservative writer [[James Delingpole]] (a "global communist takeover plan"). However, Sixsmith observed the WEF's partners include such capitalist enterprises as Apple, Microsoft, Facebook, IBM, IKEA, [[Lockheed Martin]], Ericsson and Deloitte.<ref name="Spectator_Sixsmith_20201117" />

      Many detractors commonly cite Ida Auken's article on a potential 2030, as well as a 2016 WEF video in which the article was presented alongside other predictions for 2030 and summarized as "[[You'll own nothing and be happy|You'll own nothing. And you'll be happy.]] Whatever you want you'll rent and it'll be delivered by drone", as evidence of the Great Reset having malicious intent.<ref>{{Cite news |last= |first= |date=25 February 2021 |title=Fact check: The World Economic Forum does not have a stated goal to have people own nothing by 2030 |language=en |work=Reuters |url=https://www.reuters.com/article/uk-factcheck-wef-idUSKBN2AP2T0 |url-status=live |access-date=20 September 2021 |archive-url=https://web.archive.org/web/20210920212711/https://www.reuters.com/article/uk-factcheck-wef-idUSKBN2AP2T0 |archive-date=20 September 2021}}</ref>

      An October 2020 article by ''[[Snopes]]''<ref name="NPR_2005">{{cite news |date=27 August 2005 |title=Snopes.com: Debunking Myths in Cyberspace |website=[[NPR]] |url=https://www.npr.org/templates/story/story.php?storyId=4819108 |url-status=live |access-date=27 August 2005 |archive-url=https://web.archive.org/web/20050911101109/http://www.npr.org/templates/story/story.php?storyId=4819108 |archive-date=11 September 2005}}</ref> traced the origins of a [[chain email]] posted on conspiracy forums from a member of a non-existent committee within the [[Liberal Party of Canada]] that leaked Canada's secret "COVID Global Reset Plan" to the [[QAnon]]-dedicated "Q Research" board on [[8chan]].<ref name="snopes102920">{{cite news |last1=Evon |first1=Dan |date=29 October 2020 |title=Was Canada's Draconian COVID "Global Reset Plan" Leaked to the Public? |work=Snopes |url=https://www.snopes.com/fact-check/canada-global-reset-plan-leak/ |url-status=live |access-date=21 November 2020 |archive-url=https://web.archive.org/web/20210204075538/https://www.snopes.com/fact-check/canada-global-reset-plan-leak/ |archive-date=4 February 2021}}</ref>

      By 17 November 2020, a short video of Trudeau's speech in which he described key points of the concept of an economic "reset" had gone viral,<ref name="RC_DeRosa_20201118" /> as it reignited fervor over the Great Reset conspiracy theory that had taken on a new life with the launching of the forum in May.<ref name="Goforth_20201116">{{cite news |last1=Goforth |first1=Claire |date=16 November 2020 |title=Trudeau speech reignites conspiracy theory fervor over "Great Reset" |work=The Daily Dot |url=https://www.dailydot.com/debug/great-reset-conspiracy-theory/ |url-status=live |access-date=18 November 2020 |archive-url=https://web.archive.org/web/20201116171312/https://www.dailydot.com/debug/great-reset-conspiracy-theory/ |archive-date=16 November 2020}}</ref> By November 2020,  [[Maxime Bernier]], leader of the [[People's Party of Canada]] lamented on his webpage on 17 November that he was the only Canadian politician along with [[Pierre Poilievre]] and [[Colin Carrie]], an MP,<ref name="ipolitics112020">{{cite news |date=20 November 2020 |title=The Rebel to Rabble Review: Calls to 'stop the great reset'; O'Toole's Scheer dilemma |work=iPolitics |publisher=iPolitics |url=https://ipolitics.ca/2020/11/20/the-rebel-to-rabble-review-calls-to-stop-the-great-reset-otooles-scheer-dilemma/ |url-status=live |access-date=24 November 2020 |archive-url=https://web.archive.org/web/20210204075540/https://ipolitics.ca/2020/11/20/the-rebel-to-rabble-review-calls-to-stop-the-great-reset-otooles-scheer-dilemma/ |archive-date=4 February 2021}}</ref> speaking up against the globalist threat with Trudeau as the "world's most prominent defender" of this Great Reset. Other critics included Canadian conservative political commentators such as [[Ezra Levant]] and Alberta's Premier at that time [[Jason Kenney]].<ref name="nyt111620">{{cite news |last1=Alba |first1=Davey |author-link1=Davey Alba |date=17 November 2020 |title=The baseless "Great Reset" conspiracy theory rises again. |work=The New York Times |url=https://www.nytimes.com/live/2020/11/17/world/covid-19-coronavirus#the-baseless-great-reset-conspiracy-theory-rises-again |url-status=live |access-date=18 November 2020 |archive-url=https://web.archive.org/web/20201118001623/https://www.nytimes.com/live/2020/11/17/world/covid-19-coronavirus#the-baseless-great-reset-conspiracy-theory-rises-again |archive-date=18 November 2020}}</ref><ref name="star112020" /><ref name="afp111920" /> They claimed that Trudeau's rhetoric resembled that of the Great Reset conspiracy. Conservative Spencer Fernando stated that, "We want our lives to get back to normal... Instead they offer only more fear, more control, more centralization, and a reshaping of our lives and our economy without even asking us."<ref name="devoirproulx20201121" /> When Poilievre circulated a petition to "Stop the Reset", ''[[Le Devoir]]'' headlined an article saying that the Conservative Party was embracing conspiracy theories.<ref name="devoirproulx20201121" /><ref name="Goforth_20201116" /> The ''[[Toronto Star]]'' editorial board criticized Poilievre for "giving oxygen" to the conspiracy theory,<ref name="tsed112320">{{cite news |date=23 November 2020 |title=Editorial {{!}} Pierre Poilievre is flirting with the far right by pushing "Great Reset" conspiracy |work=Toronto Star |publisher=Torstar |url=https://www.thestar.com/opinion/editorials/2020/11/23/pierre-poilievre-is-flirting-with-the-far-right-by-pushing-great-reset-conspiracy.html |url-status=live |access-date=24 November 2020 |archive-url=https://web.archive.org/web/20201123233004/https://www.thestar.com/opinion/editorials/2020/11/23/pierre-poilievre-is-flirting-with-the-far-right-by-pushing-great-reset-conspiracy.html |archive-date=23 November 2020}}</ref> with some suggesting his post was related to a possible federal election.<ref name="star112020" /><ref name="devoirproulx20201121" />

      A May 2022 article in ''[[The Globe and Mail]]'' said that "WEF conspiracy theory" was being spread to "Canada's main streets" and was brought up during the leadership race of the Conservative Party of Canada.<ref name="Clark_20220510">{{Cite news |last=Clark |first=Campbell |date=10 May 2022 |title=The WEF conspiracy theory is in the Conservative leadership race, and Canada's main streets |work=The Globe and Mail |url=https://www.theglobeandmail.com/politics/article-conservative-leadership-race-world-economic-forum/ |url-status=live |access-date=10 May 2022 |archive-url=https://web.archive.org/web/20220510120516/https://www.theglobeandmail.com/politics/article-conservative-leadership-race-world-economic-forum/ |archive-date=10 May 2022}}</ref> When Schwab "brags" about Canadian politicians' connections to the WEF, this feeds into "theories of cabals". In 2021, when Schwab said that "half of Canada's cabinet were Young Global Leaders" {{emdash}}including Calgary Conservative MP [[Michelle Rempel Garner]]{{emdash}}conspiracy theorists interpreted that to mean that Canadian cabinet ministers are "minions" controlled by Schwab. The article called on politicians in Canada who had been "flirting" with the Great Reset conspiracy theories through Twitter{{emdash}}Conservative leadership candidates Poilievre and [[Leslyn Lewis]] quell the distrust by admitting that "there is no such cabal".<ref name="Clark_20220510" /> In September 2022, ''CBC News'' tracked the spread of related disinformation and conspiracy theories in Canada.<ref name="Zimonjic" />

      On 13 December 2020, Australian advertising executive [[Rowan Dean]] promoted the conspiracy theory on [[Sky News Australia]], claiming that "This Great Reset is as serious and dangerous a threat to our prosperity – to your prosperity and your freedom – as we have faced in decades".<ref>{{Cite web |last=Davies |first=Anne |date=23 February 2021 |title=Sky News Australia is tapping into the global conspiracy set – and it's paying off |url=http://www.theguardian.com/australia-news/2021/feb/24/sky-news-australia-is-tapping-into-the-global-conspiracy-set-and-its-paying-off |url-status=live |archive-url=https://web.archive.org/web/20210801140536/https://www.theguardian.com/australia-news/2021/feb/24/sky-news-australia-is-tapping-into-the-global-conspiracy-set-and-its-paying-off |archive-date=1 August 2021 |access-date=1 August 2021 |website=The Guardian |language=en}}</ref>

      The conspiracy theory has also been disseminated by Russian propaganda outlets. According to [[Oliver Kamm]], in a 2020 article for the ''[[CapX]]'' website: "The propaganda apparatus of the Putin regime has for many months published wild allegations from obscure bloggers that the Great Reset is code for oligarchs to amass wealth and control populations."<ref name="Capx202011202"/> In 2021, the British anti-disinformation organization [[Logically (company)|Logically]] reported that the website ''[[The Exposé]]'' has promoted Great Reset conspiracy theories framed as breaking news since its establishment in November 2020.<ref name=":02">{{Cite web |last=Piper |first=Ernie |date=22 July 2021 |title=EXCLUSIVE: Actors Behind UK Misinformation Site The Daily Expose Revealed |url=https://www.logically.ai/articles/actors-behind-uk-misinformation-site-the-daily-expose |url-status=live |archive-url=https://web.archive.org/web/20220921220120/https://www.logically.ai/articles/actors-behind-uk-misinformation-site-the-daily-expose |archive-date=21 September 2022 |access-date=10 August 2022 |website=[[Logically (company)|Logically]] |language=en}}</ref>

      Great Reset conspiracy theories were a theme in the 2022 [[anti-vaccine]] film ''[[Died Suddenly]]'' which appeared on the [[Stew Peters|Stew Peters Network]] channel on the [[Rumble (website)|Rumble]] website.<ref>{{cite web |date=1 December 2022 |title=We fact checked claims made in new anti-vax film Died Suddenly. Here's what we found |url=https://www.abc.net.au/news/2022-12-02/fact-check-debunking-died-suddenly/101720550 |url-status=live |archive-url=https://web.archive.org/web/20221204024752/https://www.abc.net.au/news/2022-12-02/fact-check-debunking-died-suddenly/101720550 |archive-date=4 December 2022 |access-date=4 December 2022 |website=ABC News |language=en-AU}}</ref><ref>{{cite web |date=29 November 2022 |title='Died Suddenly' film amplifies false Covid-19 vaccine claims |url=https://factcheck.afp.com/doc.afp.com.32VB23Q |url-status=live |archive-url=https://web.archive.org/web/20221204090902/https://factcheck.afp.com/doc.afp.com.32VB23Q |archive-date=4 December 2022 |access-date=4 December 2022 |website=Fact Check |language=en}}</ref>

