      The Paris Agreement was an addition to the [[United Nations Framework Convention on Climate Change]] (UNFCCC), initially agreed to by all 195 countries present at the [[2015 United Nations Climate Change Conference]] in December of that year, including the United States then under the [[presidency of Barack Obama]]. Due to the status of the United States and China as the [[List of countries by carbon dioxide emissions|greatest emitters of carbon dioxide]], Obama's support and his [[China–United States relations|cooperation with China]] were seen as major factors leading to the convention's early success.<ref>{{cite news|url=https://www.bbc.com/news/world-asia-china-37265541|title=Paris climate deal: US and China formally join pact|date=September 3, 2016|publisher=BBC|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20180721013822/https://www.bbc.com/news/world-asia-china-37265541|archive-date=July 21, 2018|url-status=live}}</ref>

      The main aim of the Agreement is to hold the increase in the global average temperature to well below 2&nbsp;°C above pre-industrial levels", predominantly by reducing [[greenhouse gas emissions]]. The Agreement differs from the 1997 [[Kyoto Protocol]], the last widely adopted amendment to the UNFCCC, in that no annexes are established to lessen responsibility of developing nations. Rather, emissions targets for each nation were separately negotiated and are to be voluntarily enforced, leading United States officials to regard the Paris Agreement as an [[executive agreement]] rather than a legally binding [[treaty]]. This removed the requirement for the [[United States Congress]] to ratify the agreement.<ref>{{cite news|url=https://www.alec.org/article/president-obama-bypasses-congress-by-formally-committing-u-s-to-paris-climate-agreement/|title=President Obama Bypasses Congress By Formally Committing U.S. to Paris Climate Agreement|last1=Deverian|first1=Joe|date=September 22, 2016|publisher=[[American Legislative Exchange Council]]|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170613020205/https://www.alec.org/article/president-obama-bypasses-congress-by-formally-committing-u-s-to-paris-climate-agreement/|archive-date=June 13, 2017|url-status=live}}</ref>

      In April 2016, the United States became a signatory to the Paris Agreement, and accepted it by [[Executive order (United States)|executive order]] in September 2016. President Obama committed the United States to contributing US$3&nbsp;billion to the [[Green Climate Fund]].<ref name="Green Climate Fund"/> The Fund has set itself a goal of raising $100&nbsp;billion a year by 2020.

      ==First withdrawal==
      Article 28 of the agreement enables parties to withdraw from the agreement after sending a withdrawal notification to the depositary, but notice can be given no earlier than three years after the agreement goes into force for the country. Withdrawal is effective one year after the depositary is notified. Alternatively, the Agreement stipulates that withdrawal from the UNFCCC, under which the Paris Agreement was adopted, would also withdraw the state from the Paris Agreement. The conditions for withdrawal from the UNFCCC are the same as for the Paris Agreement.

      On November 8, 2016, four days after the Paris Agreement [[Coming into force|entered into force]] in the United States, Donald Trump of the [[Republican Party (United States)|Republican Party]] was [[2016 United States presidential election|elected]] President of the United States. Many conservative Republicans dispute the level of human involvement in climate change.<ref>{{cite news|url=https://arstechnica.com/science/2016/10/politics-still-rule-in-the-us-publics-acceptance-of-climate-science/|title=Fewer than 1 in 10 conservative Republicans trusts climate scientists|last1=Timmer|first1=John|date=October 12, 2016|work=Ars Technica|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170711153944/https://arstechnica.com/science/2016/10/politics-still-rule-in-the-us-publics-acceptance-of-climate-science/|archive-date=July 11, 2017|url-status=live}}</ref> [[Donald Trump and global warming|Trump rejects the scientific consensus on climate change]] and tweeted in 2012 that he believed the concept of global warming was created by China in order to impair American competitiveness.<ref>{{cite news|url=https://www.politico.com/blogs/2016-presidential-debate-fact-check/2016/09/fact-trump-claimed-climate-change-is-a-hoax-created-by-china-228711|title=Fact: Trump claimed climate change is a hoax created by China|last1=Samuelsohn|first1=Darren|date=September 26, 2016|work=Politico|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170604052441/http://www.politico.com/blogs/2016-presidential-debate-fact-check/2016/09/fact-trump-claimed-climate-change-is-a-hoax-created-by-china-228711|archive-date=June 4, 2017|url-status=live}}</ref><ref>{{Cite web|url=https://twitter.com/realdonaldtrump/status/265895292191248385?lang=en|title=The concept of global warming was created by and for the Chinese in order to make U.S. manufacturing non-competitive.|last=Trump|first=Donald J.|date=November 6, 2012|website=@realdonaldtrump|access-date=June 5, 2017|archive-url=https://web.archive.org/web/20170605013225/https://twitter.com/realdonaldtrump/status/265895292191248385?lang=en|archive-date=June 5, 2017|url-status=live}}</ref> During [[Donald Trump presidential campaign, 2016|Trump's 2016 election campaign]], Trump promised to revitalize the [[Coal industry in the United States|coal industry]], which he claimed has been hampered by environmental regulations. It has been argued that this contributed to the support he enjoyed from crucial [[swing state]]s.<ref>{{cite news|url=https://www.cnbc.com/2016/10/12/in-this-swing-state-coal-country-is-trump-country.html|title=In this swing state, coal country is Trump country|last1=Brewer|first1=Contessa|last2=Golden|first2=Jessica|date=October 12, 2016|publisher=CNBC|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170807021048/https://www.cnbc.com/2016/10/12/in-this-swing-state-coal-country-is-trump-country.html|archive-date=August 7, 2017|url-status=live}}</ref> His opposition to climate change mitigation was unchanged in the first months of [[First presidency of Donald Trump|his presidency]], in which he issued an [[List of executive actions by Donald Trump|executive order]] to reverse Obama's [[Clean Power Plan]] and other environmental regulations.<ref>{{cite news|url=https://www.washingtonpost.com/news/the-fix/wp/2017/03/29/trumps-rollback-of-obamas-environmental-legacy-is-all-kinds-of-unpopular/|title=By the numbers, Trump's big environmental regulation rollback is all kinds of unpopular|date=March 29, 2017|newspaper=The Washington Post|last1=Guskin|first1=Emily|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170616223618/https://www.washingtonpost.com/news/the-fix/wp/2017/03/29/trumps-rollback-of-obamas-environmental-legacy-is-all-kinds-of-unpopular/|archive-date=June 16, 2017|url-status=live}}</ref>

      [[File:Senate Paris Agreement withdrawal letter signatories.svg|thumb|States from which 22 Republican Senators wrote a letter to President Trump urging a withdrawal on May 25, 2017:{{legend|#ffb3b3|Single Senator}}{{legend|#ff0000|Both Senators}}]]
      In April 2017, a group of 20 [[member of the European Parliament|members of the European Parliament]] from the right-wing [[Alternative for Germany]], [[UK Independence Party]], and other parties sent a letter to Trump on urging him to withdraw from the Paris Agreement.<ref>{{cite web |first=Russ |last=Logan |url=http://www.express.co.uk/news/world/789177/MEPs-love-letter-Donald-Trump-scrap-Paris-agreement-climate-change |title='Dear Donald' – MEPs pen 'love letter' to President Trump to scrap climate change policy |date=April 7, 2017 |work=The Daily Express |access-date=June 3, 2017 |archive-url=https://web.archive.org/web/20170610113540/http://www.express.co.uk/news/world/789177/MEPs-love-letter-Donald-Trump-scrap-Paris-agreement-climate-change |archive-date=June 10, 2017 |url-status=live }}</ref><ref name="MEP letter">{{cite web|title=MEPs call for Trump to dump the Paris climate deal|url=https://rogerhelmermep.wordpress.com/2017/04/20/call-for-trump-to-dump-the-paris-climate-deal/|publisher=Roger Helmer|access-date=June 3, 2017|date=April 20, 2017|archive-url=https://web.archive.org/web/20170806225448/https://rogerhelmermep.wordpress.com/2017/04/20/call-for-trump-to-dump-the-paris-climate-deal/|archive-date=August 6, 2017|url-status=live}}</ref> On May 25, 2017, 22 Republican Senators, including Senate Majority Leader [[Mitch McConnell]], sent a two-page letter to Trump urging him to withdraw the U.S. from the Paris Agreement.<ref name="APSenatorsUrge">{{cite web |agency=Associated Press |url=https://www.nytimes.com/aponline/2017/05/25/us/politics/ap-us-united-states-climate-change.html |archive-url=https://web.archive.org/web/20170603183319/https://www.nytimes.com/aponline/2017/05/25/us/politics/ap-us-united-states-climate-change.html |url-status=dead |archive-date=June 3, 2017 |title=22 GOP Senators Want US to Pull Out of Paris Climate Accord |work=The New York Times |date=May 25, 2017}}</ref> The letter was drafted by Senator [[John Barrasso]], the chairman of the [[United States Senate Committee on Environment and Public Works|Senate Committee on Environment and Public Works]], and Senator [[Jim Inhofe]], known for his longtime [[climate change denial]].<ref name="McCarthyGambino">Tom McCarthy & Lauren Gambino, [https://www.theguardian.com/us-news/2017/jun/01/republican-senators-paris-climate-deal-energy-donations The Republicans who urged Trump to pull out of Paris deal are big oil darlings] {{Webarchive|url=https://web.archive.org/web/20170601120951/https://www.theguardian.com/us-news/2017/jun/01/republican-senators-paris-climate-deal-energy-donations |date=June 1, 2017 }}, ''The Guardian'' (June 1, 2017).</ref> Most of signatories to the letter were elected from states reliant on the burning of [[fossil fuel]]s (coal, oil and gas);<ref name="APSenatorsUrge"/> the group of 22 senators had collectively received more than $10&nbsp;million in campaign contributions from fossil-fuels companies in the previous three election cycles.<ref name="McCarthyGambino"/> Earlier the same week, a group of 40 Democratic Senators sent Trump a letter urging him to keep America in the Paris Agreement, writing that "a withdrawal would hurt America's credibility and influence on the world stage."<ref name="APSenatorsUrge"/>

      Both support for the move and opposition to it were reported among Trump's cabinet and advisers: Secretary of Energy [[Rick Perry]], Secretary of State [[Rex Tillerson]], economic advisor [[Gary Cohn (investment banker)|Gary Cohn]], and advisor and son-in-law [[Jared Kushner]] reportedly wanted the United States to remain committed to the agreement, while White House Advisor [[Steve Bannon]], White House Counsel [[Don McGahn]], and EPA Administrator [[Scott Pruitt]] wanted the United States to abandon it.<ref>{{Cite news|url=https://www.axios.com/generate-2425907832.html|title=Generate|date=May 30, 2017|work=Axios|access-date=June 2, 2017|language=en|archive-url=https://web.archive.org/web/20170601213546/https://www.axios.com/generate-2425907832.html|archive-date=June 1, 2017|url-status=live}}</ref>

      During the [[43rd G7 summit|G7 summit in late May 2017]], Trump was the only [[Group of Seven|G7]] member not to reconfirm commitment to the Paris Agreement. German Chancellor [[Angela Merkel]], one of the other leaders present, was publicly unimpressed with Trump's refusal to cooperate on climate change mitigation, which was seen to damage [[Germany–United States relations]].<ref>{{cite news|url=https://www.nytimes.com/2017/05/28/world/europe/angela-merkel-trump-alliances-g7-leaders.html|title=Merkel, After Discordant G-7 Meeting, Is Looking Past Trump|last1=Smale|first1=Alison|last2=Erlanger|first2=Steven|date=May 28, 2017|work=The New York Times|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170601213507/https://www.nytimes.com/2017/05/28/world/europe/angela-merkel-trump-alliances-g7-leaders.html|archive-date=June 1, 2017|url-status=live}}</ref> The communique issued at the conclusion of the summit stated that the United States "is not in a position to join the consensus" of the other G7 countries on policies regarding climate change and the Paris Agreement.<ref>{{cite web|url=http://www.g7italy.it/sites/default/files/documents/G7%20Taormina%20Leaders'%20Communique_27052017.pdf|title=G7 Taormina Leaders' Communiqué|website=Italian G7 Presidency 2017|publisher=Italian Government|page=6|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170528144519/http://www.g7italy.it/sites/default/files/documents/G7%20Taormina%20Leaders%27%20Communique_27052017.pdf|archive-date=May 28, 2017|url-status=live}}</ref>

      === Announcement ===
      [[File:President Trump Makes a Statement Regarding the Paris Accord.webm|thumb|right|President Trump announces the United States' withdrawal from the [[Paris Agreement]] on climate change in the [[White House Rose Garden|Rose Garden]] on June 1, 2017.]]
      [[File:The Paris Accord is a Bad Deal for America.webm|thumb|right|Video published by the White House about withdrawal from the agreement. The French Foreign ministry released an [[#ExtLinks|edited version]], with "fact checks".<ref>{{cite web |url=http://www.aljazeera.com/news/2017/06/france-corrects-white-house-video-paris-accord-170603092451327.html |publisher=Al Jazeera |title=France 'corrects' White House video on Paris accord |date=June 3, 2017 |access-date=June 5, 2017 |archive-url=https://web.archive.org/web/20170605195657/http://www.aljazeera.com/news/2017/06/france-corrects-white-house-video-paris-accord-170603092451327.html |archive-date=June 5, 2017 |url-status=live }}</ref>]]

      In a televised announcement from the White House Rose Garden on June 1, 2017, Trump said, "In order to fulfill my solemn duty to protect the United States and its citizens, the United States will withdraw from the Paris climate accord," adding "The bottom line is that the Paris accord is very unfair at the highest level to the United States."<ref name = "Hill1"/> He claimed that the agreement, if implemented, would cost the United States $3&nbsp;trillion in lost GDP and 6.5&nbsp;million jobs.<ref name = "BBC1" /> He added that it would "undermine our economy, hamstring our workers," and "effectively decapitate our coal industry".<ref name = "PPG">{{Cite news|url=http://www.post-gazette.com/news/politics-nation/2017/06/01/I-was-elected-to-represent-the-citizens-of-Pittsburgh-not-Paris-Trump-to-pull-U-S-out-of-Paris-climate-agreement/stories/201706010198|title='I was elected to represent the citizens of Pittsburgh, not Paris': Trump to pull out of Paris climate agreement|work=Pittsburgh Post-Gazette|access-date=June 1, 2017|language=en|archive-url=https://web.archive.org/web/20170602005032/http://www.post-gazette.com/news/politics-nation/2017/06/01/I-was-elected-to-represent-the-citizens-of-Pittsburgh-not-Paris-Trump-to-pull-U-S-out-of-Paris-climate-agreement/stories/201706010198|archive-date=June 2, 2017|url-status=live}}</ref> He said he was open to renegotiating the arrangement or negotiating a new one, but European and UN leaders said the pact "cannot be renegotiated at the request of a single party".<ref name = "CNN1">{{cite news|url=http://www.cnn.com/2017/06/01/politics/trump-paris-climate-decision/index.html|title=Trump on Paris accord: 'We're getting out'|last1=Liptak|first1=Kevin|last2=Acosta|first2=Jim|date=June 1, 2017|publisher=CNN|access-date=June 1, 2017|archive-url=https://web.archive.org/web/20170601144621/http://www.cnn.com/2017/06/01/politics/trump-paris-climate-decision/index.html|archive-date=June 1, 2017|url-status=live}}</ref> Trump also criticized the [[Green Climate Fund]], calling it a scheme to redistribute wealth from rich to poor countries.<ref name=":3">{{Cite news|url=https://www.nytimes.com/2017/06/01/world/europe/climate-paris-agreement-trump-china.html|title=As Trump Exits Paris Agreement, Other Nations Are Defiant|author1=Somini Sengupta |author2=Melissa Eddy |author3=Chris Buckley |author4=Alissa J. Rubin |date=June 1, 2017|work=The New York Times|access-date=June 1, 2017|language=en-US|issn=0362-4331|archive-url=https://web.archive.org/web/20170601122056/https://www.nytimes.com/2017/06/01/world/europe/climate-paris-agreement-trump-china.html|archive-date=June 1, 2017|url-status=live}}</ref>

      The White House said that Trump would end the implementation of carbon reduction targets set by former President Barack Obama<ref name = "CNN1" /> and that the withdrawal would be done in accordance with the years-long exit process spelled out in the accord.<ref name = "PPG"/> On September 16, 2017, a European official said the Trump administration had appeared to soften its stance on withdrawing the agreement. The White House told the press that it had not changed its position on the agreement.<ref>{{cite web |last=Wilkinson |first=Tracy |url=http://www.chicagotribune.com/news/nationworld/politics/ct-trump-paris-climate-agreement-20170916-story.html |title=At summit, hope that Trump may reconsider his opposition to Paris climate accord |date=September 16, 2017 |work=Chicago Tribune |access-date=September 17, 2017 |archive-url=https://web.archive.org/web/20170917011216/http://www.chicagotribune.com/news/nationworld/politics/ct-trump-paris-climate-agreement-20170916-story.html |archive-date=September 17, 2017 |url-status=live }}</ref><ref>{{Cite news|url=https://www.wsj.com/articles/trump-administration-wont-withdraw-from-paris-climate-deal-1505593922|title=Trump Administration Seeks to Avoid Withdrawal From Paris Climate Accord, International Climate Officials Say|last=Peker|first=Emre|date=September 16, 2017|work=Wall Street Journal|access-date=September 17, 2017|language=en-US|issn=0099-9660|archive-url=https://web.archive.org/web/20170917000905/https://www.wsj.com/articles/trump-administration-wont-withdraw-from-paris-climate-deal-1505593922|archive-date=September 17, 2017|url-status=live}}</ref>

      Examinations of Trump's speech by ''[[The Washington Post]]'' and ''[[The New York Times]]'' pointed to numerous fallacies, including, but not limited to, claims that the U.S., under the Paris Agreement, was forbidden to build coal power plants; that a difference of 0.2 degrees Celsius is insignificant in [[climatology]]; that U.S. contributions to the Green Climate Fund were paid out of the U.S. defense budget; projections that the U.S. is on course to become the "cleanest" nation on earth; and Trump's reiterated claim of personal support for environmental causes.<ref>{{Cite news|author1=Glenn Kessler |author2=Michelle Ye Hee Lee |url=https://www.washingtonpost.com/news/fact-checker/wp/2017/06/01/fact-checking-president-trumps-claims-on-the-paris-climate-change-deal/|title=Fact-checking President Trump's claims on the Paris climate change deal|date=June 1, 2017|newspaper=The Washington Post|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602043016/https://www.washingtonpost.com/news/fact-checker/wp/2017/06/01/fact-checking-president-trumps-claims-on-the-paris-climate-change-deal/|archive-date=June 2, 2017|url-status=live}}</ref><ref>{{Cite news|author1=Mark Landler |author2=Brad Plumer |author3=Linda Qiu |url=https://www.nytimes.com/2017/06/01/us/politics/fact-check-climate-change-trump.html|title=Trump, Prioritizing Economy Over Climate, Cites Disputed Premises|date=June 1, 2017|newspaper=The New York Times|access-date=June 3, 2017|archive-url=https://web.archive.org/web/20170602221855/https://www.nytimes.com/2017/06/01/us/politics/fact-check-climate-change-trump.html|archive-date=June 2, 2017|url-status=live}}</ref>

      === Process ===
      In accordance with [[Paris Agreement#Withdrawal from Agreement|Article 28 of the Paris Agreement]], the United States could only file its notice of intent to withdraw no earlier than November 4, 2019, three years after the Agreement had come into effect, which would be effective one year later.<ref name="bbc official withdraw">{{cite web | url = https://www.bbc.com/news/science-environment-54797743 | title = Climate change: US formally withdraws from Paris agreement | first = Matt | last = McGarth | date = November 4, 2020 | access-date = November 8, 2020 | work = [[BBC]] | archive-date = November 7, 2020 | archive-url = https://web.archive.org/web/20201107204008/https://www.bbc.com/news/science-environment-54797743 | url-status = live }}</ref> Until the withdrawal took effect, the United States was obligated to maintain its commitments under the Agreement, including the requirement to continue reporting its emissions to the United Nations.<ref name="NYT060117"/><ref>{{cite book|last1=Mulligan|first1=Stephen P.|title=Withdrawal from International Agreements: Legal Framework, the Paris Agreement, and the Iran Nuclear Agreement|date=May 4, 2018|publisher=Congressional Research Service|location=Washington, DC|url=https://fas.org/sgp/crs/row/R44761.pdf|access-date=19 May 2018|archive-url=https://web.archive.org/web/20180605192044/https://fas.org/sgp/crs/row/R44761.pdf|archive-date=June 5, 2018|url-status=live}}</ref> According to a memo obtained by [[HuffPost]] believed to be written by U.S. State Department legal office, any "attempts to withdraw from the Paris Agreement outside of the above-described withdrawal provisions would be inconsistent with international law and would not be accepted internationally."<ref>{{cite web|url=http://www.huffingtonpost.ca/entry/paris-agreement_us_5908f524e4b05c397683d404|title=White House Leaning Toward Exiting Paris Agreement By Next Week, Sources Say|first1=Alexander|last1=Kaufman|first2=Kate|last2=Sheppard|publisher=[[HuffPost]]|date=May 2, 2017|access-date=July 22, 2017|archive-url=https://web.archive.org/web/20170806022548/http://www.huffingtonpost.ca/entry/paris-agreement_us_5908f524e4b05c397683d404|archive-date=August 6, 2017|url-status=live}}</ref><ref>{{cite web|url=https://www.scribd.com/document/347089780/State-Dept-Memo-Outlining-Paris-Agreement-Withdrawal|title=Paris Agreement: Overview of Legal Issues|access-date=July 22, 2017|archive-url=https://web.archive.org/web/20170617144326/https://www.scribd.com/document/347089780/State-Dept-Memo-Outlining-Paris-Agreement-Withdrawal|archive-date=June 17, 2017|url-status=live}}</ref>

      On August 4, 2017, the Trump administration formally outlined its intention of the withdrawal in an official notice delivered to the United Nations as depositary.<ref name=UScom>{{cite web|url=https://treaties.un.org/doc/Publication/CN/2017/CN.464.2017-Eng.pdf|title=Reference: C.N.464.2017.TREATIES-XXVII.7.d|work=Depositary Notification|date=August 8, 2017|access-date=August 14, 2017|publisher=United Nations|archive-url=https://web.archive.org/web/20170815062938/https://treaties.un.org/doc/Publication/CN/2017/CN.464.2017-Eng.pdf|archive-date=August 15, 2017|url-status=live}}</ref> In a separate statement, the State Department said it will continue participating in international climate change negotiations, including talks aimed at implementing the climate deal.<ref>{{cite web|url=https://www.politico.com/story/2017/08/04/trump-notice-withdraw-from-paris-climate-deal-241331|title=Trump administration delivers notice U.S. intends to withdraw from Paris climate deal|publisher=Politico|date=August 4, 2017|access-date=August 5, 2017|archive-url=https://web.archive.org/web/20170804200935/http://www.politico.com/story/2017/08/04/trump-notice-withdraw-from-paris-climate-deal-241331|archive-date=August 4, 2017|url-status=live}}</ref><ref>{{cite web|url=https://www.reuters.com/article/us-un-climate-usa-paris-idUSKBN1AK2FM|title=U.S. submits formal notice of withdrawal from Paris climate pact|publisher=Reuters|date=August 5, 2017|access-date=August 5, 2017|archive-url=https://web.archive.org/web/20170805112540/http://www.reuters.com/article/us-un-climate-usa-paris-idUSKBN1AK2FM|archive-date=August 5, 2017|url-status=live}}</ref>

      The United States filed its intent to withdraw at the earliest possible date, on November 4, 2019. After the one-year period, on November 4, 2020, the U.S. formally withdrew from the Agreement, on the day following the [[2020 United States presidential election|2020 U.S. presidential election]] but rejoined the agreement when President Biden took office.<ref name="bbc official withdraw"/>

      === Effects ===
      The Obama administration was responsible for funding $3 billion U.S. dollars to the Green Climate Fund, that will no longer be available to be used towards climate change research.<ref name=":6" /> Therefore, a decrease in funds by the U.S. will lessen the chances of being able to reach the Paris Agreement goals.<ref name=":7" /> In addition, the U.S. was responsible for more than 50% of the papers references for climate change in 2015, so a cut in funding will impact U.S's contribution to any further IPCC reports.<ref name=":7" /> Trump's termination of its funding to the Green Climate Fund can also have an impact on underdeveloped countries that are in need of that aid for their climate change projects.<ref name=":5" /> The U.S. withdrawal decision leaves a large gap in the climate aid that the developed countries have promised to the developing countries (Kemp, 2017, as cited in Hai-Bing Zhan 2017).<ref name=":7" />

      However, President Trump's decision to withdraw did not necessarily mean that it affected U.S. emissions since there was no direct link, but instead meant that the U.S. was no longer regulated by the Paris Agreement once officially withdrawn.<ref name=":5" /> On the other hand, since the U.S. was not regulated this influenced a change to the carbon emission space. For example, "[u]nder the NDC target, the withdrawal of the U.S. led to it increasing its own emission space by 14%, 28%, and 54% in the 20, 13, and 00 scenarios, respectively."<ref name=":8" /> This meant that the U.S. would obtain more room to emit carbon while other countries would have to cut down on their emissions in order to be able to reach their goal of only 2&nbsp;°C.<ref name=":8" /> Trump's withdrawal increased the carbon price for other countries while reducing its own carbon price.<ref name=":8" />

      When the withdrawal took effect, the U.S. was the only UNFCCC member states who was not a signatory to the Paris Agreement. At the time of the original withdrawal announcement, [[Ba'athist Syria|Syria]] and [[Nicaragua]] were also not participants; however, both Syria and Nicaragua later ratified the agreement which left the U.S. the only UNFCCC member state that wasn't intending to be a party to the Paris Agreement.<ref>{{cite web|last1=Friedman|first1=Lisa|title=Syria Joins Paris Climate Accord, Leaving Only U.S. Opposed|url=https://www.nytimes.com/2017/11/07/climate/syria-joins-paris-agreement.html|website=The New York Times|access-date=August 11, 2017|archive-url=https://web.archive.org/web/20190413160706/https://www.nytimes.com/2017/11/07/climate/syria-joins-paris-agreement.html|archive-date=April 13, 2019|url-status=live}}</ref>

      Luke Kemp of the [[Australian National University]]'s Fenner School of Environment and Society wrote in a commentary for ''[[Nature (journal)|Nature]]'' that "withdrawal is unlikely to change US emissions" since "the greenhouse gas emissions of the US are divorced from international legal obligations." However, he added that it could hamper climate change mitigation efforts if the U.S. stopped contributing to the [[Green Climate Fund]]. Kemp said the effect of a U.S. withdrawal could be either good or bad for the Paris agreement, since "a rogue US can cause more damage inside rather than outside of the agreement." Finally, "A withdrawal could also make the US into a climate pariah and provide a unique opportunity for China and the EU to take control of the climate regime and significantly boost their international reputations and [[soft power]]."<ref name=":4">{{cite journal |first=Luke |last=Kemp |url=https://www.nature.com/articles/nclimate3309.epdf |title=Commentary: Better Out Than In |volume=7 |issue=7 |pages=458–460 |journal=Nature |date=May 22, 2017 |doi=10.1038/nclimate3309 |access-date=June 3, 2017 |url-access=subscription }}</ref> On the other hand there is belief that China is not capable of taking control of the climate regime and instead should, "help rebuild global shared leadership by replacing the Sino–U.S. G2 partnership with a Climate 5 (C5) partnership that comprises China, the EU, India, Brazil, and South Africa."<ref name=":7" />

      ==== Potential economic impact ====
      The German car industry expressed concerns about its ability to remain competitive in light of the United States decision to withdraw. The president of the German auto industry lobby group [[Verband der Automobilindustrie|VDA]], [[Matthias Wissmann]] said, "The regrettable announcement by the USA makes it inevitable that Europe must facilitate a cost efficient and economically feasible climate policy to remain internationally competitive."<ref>{{Cite news|url=https://www.reuters.com/article/us-usa-climatechange-german-carmakers-idUSKBN18T1Q0|title=German carmakers fear losing competitive edge after U.S. Paris exit|date=June 2, 2017|work=Reuters|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602135422/http://www.reuters.com/article/us-usa-climatechange-german-carmakers-idUSKBN18T1Q0|archive-date=June 2, 2017|url-status=live}}</ref>

      Many of the larger auto and aviation companies had already invested billions into reducing emissions and were unlikely to change course. [[General Motors]], the largest automobile manufacturer in the United States, immediately pointed out: "Our position on climate change has not changed ... we publicly advocate for climate action," and reiterated its support for various climate pledges. Analyst Rebecca Lindland also pointed out that manufacturers of automobiles were under no specific restrictions under the Accord and that nothing had changed. Even if Trump loosened other restrictions on the car industry that allowed for the production of less environmental cars, such cars still needed to conform to standards before they could be exported to other continents or even certain states. Jason Bordoff, energy-policy expert at Columbia University, agreed that withdrawing would make no difference to the economy, arguing that it would be determined by market conditions like the price of oil and gas. At the same time, airlines have been spending billions on seeking more fuel efficient ways to fly anyway –fuel is an airline's second-biggest expense after labor and so using less fuel (which means less emissions) is in their financial interest.<ref>[http://www.detroitnews.com/story/business/2017/06/02/us-paris-accord-companies/102435244/ Quitting Paris could have muted effect in U.S. industry] {{Webarchive|url=https://web.archive.org/web/20170702012237/http://www.detroitnews.com/story/business/2017/06/02/us-paris-accord-companies/102435244/ |date=July 2, 2017 }}, ''Detroit News''</ref> Kabir Nanda and Varad Pande, senior consultant and partner at Dahlberg, respectively, argued that despite the U.S. withdrawal the American private sector was still committed to renewable energy and technology. Also noted was that solar energy had become cheaper than coal in an increasing number of countries.<ref>[https://www.theguardian.com/global-development-professionals-network/2017/jun/19/reasons-to-be-cheerful-despite-trump-withdrawing-from-the-paris-agreement Reasons to be cheerful, despite Trump withdrawing from the Paris Agreement] {{Webarchive|url=https://web.archive.org/web/20170619125551/https://www.theguardian.com/global-development-professionals-network/2017/jun/19/reasons-to-be-cheerful-despite-trump-withdrawing-from-the-paris-agreement |date=June 19, 2017 }}, ''The Guardian''</ref>

      === Rationale for withdrawal ===
      The Trump administration has justified its withdrawal from the Paris Agreement by stating concerns arose from structure of the Paris Agreement, economic concerns and political ideology. The Paris Agreement relies on international cooperation to ensure effectiveness in striving towards limiting the global temperature increase to 1.5&nbsp;°C.<ref name=":9">{{Cite journal |last1=Bang |first1=Guri |last2=Hovi |first2=Jon |last3=Skodvin |first3=Tora |date=2016-09-01 |title=The Paris Agreement: Short-Term and Long-Term Effectiveness |url=https://www.cogitatiopress.com/politicsandgovernance/article/view/640 |journal=Politics and Governance |language=en |volume=4 |issue=3 |pages=209–218 |doi=10.17645/pag.v4i3.640 |doi-access=free |issn=2183-2463|hdl=10852/59082 |hdl-access=free }}</ref> Countries were obliged to report their progress on the stages of achieving their nationally determined contributions (NDCs); however, no consequences would result, particularly for those countries that fail to achieve their targets.<ref name=":9" /> Trump argued the framework of the Paris Agreement posed difficulties for the United States to prioritize clean energy development and related climate goals over their national development plans.<ref name=":10">{{Cite web |title=Statement by President Trump on the Paris Climate Accord – The White House |url=https://trumpwhitehouse.archives.gov/briefings-statements/statement-president-trump-paris-climate-accord/ |access-date=2025-09-24 |website=trumpwhitehouse.archives.gov}}</ref>

      From the United States’ point of view, compliance with the Paris Agreement and its regulatory policies, such as carbon price and a shift to other energy substitutes, could hinder the development of the fossil fuel sectors in the United States, with a future projection of global fossil fuel usage to reduce one-third by 2040.<ref>{{Cite journal |last=Wang |first=J. Y. |date=April 15, 2024 |title=The relationship between Paris Agreement and profit of petroleum company in United States |url=https://repository.digital.georgetown.edu/handle/10822/1088730 |journal=Georgetown Graduate Theses, Dissertations, and Doctoral Projects |pages=1–47}}</ref> In Trump’s speech, he commented on the Paris Agreement as “a financial and economic burden” imposed on the United States and cited meeting the Agreement commitments would reduce 38% iron and steel production and 86% production in the coal mining sectors respectively.<ref name=":10" /> He has once labelled the Agreement a “Chinese hoax” on social media, stating the Paris Agreement would benefit other countries’ economy at the expense of the United States.<ref>{{Cite news |date=2016-11-18 |title=Trump Has Called Climate Change a Chinese Hoax. Beijing Says It Is Anything But. (Published 2016) |url=https://www.nytimes.com/2016/11/19/world/asia/china-trump-climate-change.html |access-date=2025-09-24 |language=en}}</ref><ref>{{Cite journal |last=Unny |first=Anu |date=2020-12-30 |title=The U.s Inaction on Climate Change: Realism and ITS Interpretations |url=http://e-journal.uum.edu.my/index.php/jis/article/view/10157/2763 |journal=Journal International Studies |language=en |volume=16 |pages=89–103 |doi=10.32890/jis2020.16.6 |issn=2289-666X|doi-access=free }}</ref> Therefore, he expressed that the withdrawal was a necessary move to align with the focus of “America First” in his administration, which aimed at protecting the United States’ sovereignty and preventing profit losses in these sectors.<ref name=":10" />

      === Reactions ===
      <!-- Please include WHY the critics disagree with the withdrawal. "Joe Biden says that it imperils national security" (good). "Al Gore said it was a reckless and indefensible action" (bad). -->

      ====Petitions====
      Petitions were launched across states in order to persuade state governors to join the Paris Agreement or have Trump reverse the planned withdrawal, which included a "[[#ExtLinks|ParisMyState]]" and a [[MoveOn.org|MoveOn]] petition that has received over 535,000 signatures.<ref name=":1">{{Cite web|url=https://www.parismystate.com|title=Paris My State|publisher=parismystate.com|language=en|access-date=June 4, 2017|archive-url=https://web.archive.org/web/20180427035946/https://www.parismystate.com/|archive-date=April 27, 2018|url-status=dead}}</ref><ref>{{Cite news|url=http://www.thv11.com/news/local/over-338000-sign-petition-supporting-paris-agreement-that-will-be-delivered-to-president-trump/445263693|title=Over 338,000 sign petition supporting Paris Agreement that will be delivered to President Trump|first=Brittany|last=Breeding|publisher=KTHV|access-date=June 4, 2017|language=en-US|archive-url=https://web.archive.org/web/20170603004724/http://www.thv11.com/news/local/over-338000-sign-petition-supporting-paris-agreement-that-will-be-delivered-to-president-trump/445263693|archive-date=June 3, 2017|url-status=live}}</ref><ref>{{Cite news|url=https://www.thequint.com/world/2017/06/04/headlines-trump-didnt-expect-after-us-exit-out-of-paris-climate-agreement|title=Trump Did Not Expect Such Backlash for Exiting the Paris Deal|work=The Quint|access-date=June 4, 2017|language=en|archive-url=https://web.archive.org/web/20170718160424/https://www.thequint.com/world/2017/06/04/headlines-trump-didnt-expect-after-us-exit-out-of-paris-climate-agreement|archive-date=July 18, 2017|url-status=live}}</ref><ref>[https://www.dailykos.com/campaigns/petitions/sign-the-petition-i-want-my-state-and-city-to-join-the-paris-climate-agreement https://www.dailykos.com] {{Webarchive|url=https://web.archive.org/web/20170703090858/https://www.dailykos.com/campaigns/petitions/sign-the-petition-i-want-my-state-and-city-to-join-the-paris-climate-agreement |date=July 3, 2017 }} Sign the petition: I want my state and city to join the Paris climate agreement.</ref>

      ==== Scientists and environmentalists ====
      [[Piers Forster]], the director of the [[University of Leeds]]' Priestley International Centre for Climate, called the decision to withdraw "a sad day for [[evidence-based policy]]" and expressed hope that individual Americans, businesses and states would nevertheless choose to [[Low-carbon economy|decarbonize]]. Climate scientist [[Dave Reay]] of the [[University of Edinburgh]] said that "The United States will come to rue this day." The [[University Corporation for Atmospheric Research]] (UCAR), in a statement by its president [[Antonio Busalacchi Jr.]], said that the decision to withdraw "does not mean that climate change will go away" and warned that "the heightened potential for increased greenhouse gas emissions poses a substantial threat to our communities, businesses, and military." The [[Information Technology and Innovation Foundation]] called the decision to withdraw "very discouraging" and said that it would diminish confidence in international climate change efforts; the technology think tank called for federal efforts on "the smart grid, energy storage, carbon capture and sequestration, and advanced nuclear and solar power" and warned that "Without a smart, aggressive clean-energy innovation strategy, the world will not avert the worst effects of climate change."<ref>[https://www.science.org/content/article/trump-dumps-paris-climate-deal-reaction Trump dumps Paris climate deal: reaction] {{Webarchive|url=https://web.archive.org/web/20170604045836/http://www.sciencemag.org/news/2017/06/trump-dumps-paris-climate-deal-reaction |date=June 4, 2017 }}, ''[[Science (journal)|Science]]'' (June 1, 2017).</ref>

      Canadian academic and environmental activist [[David Suzuki]] stated, "Trump just passed on the best deal the planet has ever seen".<ref>{{Cite news|url=https://www.theguardian.com/commentisfree/2017/jun/01/trump-paris-climate-deal-planet|title=Trump just passed on the best deal the planet has ever seen|date=June 2, 2017|work=The Guardian|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602031947/https://www.theguardian.com/commentisfree/2017/jun/01/trump-paris-climate-deal-planet|archive-date=June 2, 2017|url-status=live}}</ref> Navroz Dubash of the [[Centre for Policy Research]] in New Delhi expressed bafflement at Trump's move, citing the declining costs of renewable energy sources and the increasing difficulty of obtaining investment for fossil-fuel projects.<ref>{{Cite news|url=https://www.nytimes.com/2017/06/01/world/europe/climate-paris-agreement-trump-china.html?ref=energy-environment|title=As Trump Exits Paris Agreement, Other Nations Are Defiant|date=June 1, 2017|work=The New York Times|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170706005154/https://www.nytimes.com/2017/06/01/world/europe/climate-paris-agreement-trump-china.html?ref=energy-environment|archive-date=July 6, 2017|url-status=live}}</ref> Environmental scientist and risk assessor Dana Nuccitelli stated that it "now seems inevitable that the history books will view [[Historical rankings of presidents of the United States|Trump as America's worst-ever president]]".<ref name="theguardian1">{{Cite news|url=https://www.theguardian.com/environment/live/2017/jun/01/donald-trump-paris-climate-agreement-live-news|title=Paris climate agreement: world reacts as Trump pulls out of global accord|date=June 2, 2017|work=The Guardian|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170601192029/https://www.theguardian.com/environment/live/2017/jun/01/donald-trump-paris-climate-agreement-live-news|archive-date=June 1, 2017|url-status=live}}</ref> [[Bob Ward (communications director)|Bob Ward]] of the [[Grantham Research Institute on Climate Change and the Environment|Grantham Research Institute]] also described Trump's speech as "confused nonsense".<ref>{{Cite news|url=https://www.bbc.co.uk/news/science-environment-40128046|title=The world's not laughing Donald, it's crying|date=June 1, 2017|work=BBC News|access-date=June 22, 2018|archive-url=https://web.archive.org/web/20181015081625/https://www.bbc.co.uk/news/science-environment-40128046|archive-date=October 15, 2018|url-status=live}}</ref> [[Stephen Hawking]] criticized Trump, saying that he "will cause avoidable environmental damage to our beautiful planet, endangering the natural world, for us and our children."<ref>{{cite web |url=https://www.bbc.com/news/science-environment-40461726? |title=Hawking says Trump's climate stance could damage Earth |last=Ghosh |first=Pallab |date=July 2, 2017 |website=BBC News |access-date=July 5, 2017 |archive-url=https://web.archive.org/web/20170704235415/http://www.bbc.com/news/science-environment-40461726 |archive-date=July 4, 2017 |url-status=live }}</ref>

      Multiple environmental groups, such as the [[Sierra Club]] and [[Natural Resources Defense Council]], condemned Trump's decision.<ref>{{cite web |first=Jacqueline |last=Thomsen |url=https://thehill.com/blogs/blog-briefing-room/news/335967-sierra-club-on-paris-deal-withdrawal-congratulations-president/ |title=Sierra Club on Paris deal withdrawal: 'Congratulations President Bannon' |work=The Hill |date=June 1, 2017 |access-date=June 2, 2017 |archive-url=https://web.archive.org/web/20170602075151/http://thehill.com/blogs/blog-briefing-room/news/335967-sierra-club-on-paris-deal-withdrawal-congratulations-president |archive-date=June 2, 2017 |url-status=live }}</ref><ref>{{cite press release |url=https://www.nrdc.org/media/2017/170601 |title=NRDC President: Trump's "Grave Mistake" on Paris Hurts America |publisher=National Resources Defense Council |date=June 1, 2017 |access-date=June 2, 2017 |archive-url=https://web.archive.org/web/20170617234943/https://www.nrdc.org/media/2017/170601 |archive-date=June 17, 2017 |url-status=live }}</ref> American environmentalist and writer [[Bill McKibben]], the founder of the climate change action group [[350.org]], called the move "a stupid and reckless decision—our nation's dumbest act since [[2003 invasion of Iraq|launching the war in Iraq]]." McKibben wrote that Trump's decision to withdraw amounted "to a thorough repudiation of two of the civilizing forces on our planet: diplomacy and science." He called upon U.S. states and cities to "double down" on commitments to [[renewable energy]].<ref>{{Cite news|url=https://www.nytimes.com/2017/06/01/opinion/trump-paris-climate-accord.html|title=Trump's Stupid and Reckless Climate Decision|last=Mckibben|first=Bill|date=June 1, 2017|work=The New York Times|access-date=June 1, 2017|language=en-US|issn=0362-4331|archive-url=https://web.archive.org/web/20170602002434/https://www.nytimes.com/2017/06/01/opinion/trump-paris-climate-accord.html|archive-date=June 2, 2017|url-status=live}}</ref>

      ==== Domestic political response ====
      ===== Republicans =====
      Republicans gave mixed reviews of Trump's decision to withdraw. Former vice president [[Mike Pence]] stated that Trump administration "demonstrated real leadership" by pulling the United States out of the international accords which he called "a transfer of wealth from the most powerful economy in the world to other countries around the planet". He also stated that he doesn't understand why Democrats and [[Liberalism in the United States|liberals in the United States]] and the [[Left-wing politics|left]] around the world care about climate change.<ref>{{cite news|last1=Shuham|first1=Matt|title=Pence: 'For Some Reason Or Another,' The Left Cares About Climate Change (VIDEO)|url=http://talkingpointsmemo.com/livewire/pence-for-some-reason-left-climate-change|access-date=June 12, 2017|work=TPM|date=June 2, 2017|archive-url=https://web.archive.org/web/20170610094245/http://talkingpointsmemo.com/livewire/pence-for-some-reason-left-climate-change|archive-date=June 10, 2017|url-status=live}}</ref><ref name="Sampathkumar">{{cite news|last1=Sampathkumar|first1=Mythili|title=Vice President Mike Pence says climate change is just an issue for the left|url=https://www.independent.co.uk/news/world/americas/us-politics/mike-pence-climate-change-us-vice-president-paris-agreement-issue-left-for-some-reason-donald-trump-a7769081.html|access-date=June 12, 2017|work=The Independent|date=June 2, 2017|location=New York|archive-url=https://web.archive.org/web/20170605111421/http://www.independent.co.uk/news/world/americas/us-politics/mike-pence-climate-change-us-vice-president-paris-agreement-issue-left-for-some-reason-donald-trump-a7769081.html|archive-date=June 5, 2017|url-status=live}}</ref> Senate Majority Leader [[Mitch McConnell]], [[United States Speaker of the House|Speaker of the House]] [[Paul Ryan]], [[Counselor to the President]] [[Kellyanne Conway]] and [[Administrator of the Environmental Protection Agency]] [[Scott Pruitt]] praised the decision as a victory for America's middle class, workers, businesses and coal miners.<ref name="Sampathkumar"/><ref name="politico1">{{Cite news|url=https://www.politico.com/story/2017/06/01/white-house-tells-supporters-it-will-exit-paris-deal-239029|title=Trump announces U.S. withdrawal from Paris climate deal|date=June 2, 2017|work=Politico|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602161716/http://www.politico.com/story/2017/06/01/white-house-tells-supporters-it-will-exit-paris-deal-239029|archive-date=June 2, 2017|url-status=live}}</ref><ref>{{Cite news|url=https://abcnews.go.com/Politics/public-figures-react-trumps-decision-withdraw-paris/story?id=47767113|title=Reactions swift after Trump's withdrawal from Paris Climate Accord|date=June 1, 2017|work=ABC News|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602020454/https://abcnews.go.com/Politics/public-figures-react-trumps-decision-withdraw-paris/story?id=47767113|archive-date=June 2, 2017|url-status=live}}</ref> [[Texas Attorney General]] [[Ken Paxton]] described Trump's decision as "courageous" and said that it lifted a burden from the American taxpayer.<ref name="theguardian1"/> However, Republican Senator [[Susan Collins]] of Maine was critical of the decision, stating that she was disappointed.<ref>{{Cite news|url=https://thehill.com/blogs/blog-briefing-room/news/335987-gop-senator-disappointed-trump-withdrawing-from-climate-deal/|title=GOP senator 'disappointed' Trump withdrawing from climate deal|last=Manchester|first=Julia|date=June 1, 2017|work=The Hill|access-date=June 1, 2017|archive-url=https://web.archive.org/web/20170605002436/http://thehill.com/blogs/blog-briefing-room/news/335987-gop-senator-disappointed-trump-withdrawing-from-climate-deal|archive-date=June 5, 2017|url-status=live}}</ref> Former [[Governor of California]] [[Arnold Schwarzenegger]] issued a video address describing Trump's decision as a retrograde step.<ref name="theguardian1"/>

      ===== Democrats =====
      Former President [[Bill Clinton]] wrote: "Walking away from Paris treaty is a mistake. Climate change is real. We owe our children more. Protecting our future also creates more jobs."<ref name="theguardian1"/> Former President [[Barack Obama]] said of Trump's decision: "Even as this Administration joins a small handful of nations that reject the future, I'm confident that our states, cities, and businesses will step up and do even more to lead the way, and help protect for future generations the one planet we've got."<ref>{{Cite tweet|number=870364278750142464|user=NBCNews|title=JUST IN: Statement from President Barack Obama on the Paris Climate Accord|publisher=[[NBC News]]|date=June 1, 2017}}</ref> Former vice-president [[Joe Biden]] said he believes the move imperils American security.<ref>{{Cite news|url=https://thehill.com/policy/energy-environment/335995-biden-says-paris-climate-deal-exit-imperils-national-security/|title=Biden: Paris climate deal exit 'imperils' national security|last=Chalfant|first=Morgan|date=June 1, 2017|work=The Hill|access-date=June 1, 2017|archive-url=https://web.archive.org/web/20170607091429/http://thehill.com/policy/energy-environment/335995-biden-says-paris-climate-deal-exit-imperils-national-security|archive-date=June 7, 2017|url-status=live}}</ref> Former Democratic Senator [[Joe Manchin]] supported  Trump's withdrawal, saying he supported "a cleaner energy future" but that the Paris deal failed to strike "a balance between our environment and the economy."<ref>{{cite news |last1=Beavers |first1=Olivia |title=Dem senator: Paris accord did not 'balance' environment, economy |date=June 1, 2017 |url=https://thehill.com/homenews/senate/335999-dem-senator-paris-accord-did-not-balance-environment-economy/ |newspaper=The Hill |access-date=March 27, 2018 |archive-date=March 28, 2018 |archive-url=https://web.archive.org/web/20180328102932/http://thehill.com/homenews/senate/335999-dem-senator-paris-accord-did-not-balance-environment-economy |url-status=live }}</ref>

      In his withdrawal speech, President Trump stated: "I was elected to represent the citizens of [[Pittsburgh]], not Paris." The incumbent Mayor of Pittsburgh, [[Bill Peduto]], immediately acknowledged on Twitter with a reminder that 80% of his city's voters favored [[Hillary Clinton]] during the 2016 presidential election, and wrote: "As the Mayor of Pittsburgh, I can assure you that we will follow the guidelines of the Paris Agreement for our people, our economy and future."<ref>{{Cite news|url=http://www.nbcphiladelphia.com/news/politics/Trump-Stands-With-Pittsburgh-But-Mayor-Says-Hes-With-Paris-425778104.html|title=Trump Stands With Pittsburgh, But Mayor Says He's With Paris|work=NBC News|access-date=June 2, 2017|language=en|archive-url=https://web.archive.org/web/20170606001050/http://www.nbcphiladelphia.com/news/politics/Trump-Stands-With-Pittsburgh-But-Mayor-Says-Hes-With-Paris-425778104.html|archive-date=June 6, 2017|url-status=live}}</ref> Senate Democratic Leader [[Chuck Schumer]] condemned the withdrawal.<ref>{{Cite news|url=https://thehill.com/blogs/blog-briefing-room/news-lawmaker-news-administration/335985-schumer-trump-is-telling-earth-to/|title=Schumer: Trump tells Earth to 'drop dead'|last=Thomsen|first=Jacqueline|date=June 1, 2017|work=The Hill|access-date=June 1, 2017|archive-url=https://web.archive.org/web/20170601223716/http://thehill.com/blogs/blog-briefing-room/news-lawmaker-news-administration/335985-schumer-trump-is-telling-earth-to|archive-date=June 1, 2017|url-status=live}}</ref>

      ===== U.S. states =====
      {{main|United States Climate Alliance}}
      Responding the following week to the withdrawal, the governors of California, [[New York (state)|New York]], and Washington founded the [[United States Climate Alliance]], pledging to uphold the Paris Agreement within their borders.<ref name="waPo06012017">{{cite web |url=http://governor.wa.gov/news-media/inslee-new-york-governor-cuomo-and-california-governor-brown-announce-formation-united |title=Inslee, New York Governor Cuomo, and California Governor Brown announce formation of United States Climate Alliance &#124; Governor Jay Inslee |publisher=Governor.wa.gov |access-date=June 2, 2017 |archive-url=https://web.archive.org/web/20170602000113/http://www.governor.wa.gov/news-media/inslee-new-york-governor-cuomo-and-california-governor-brown-announce-formation-united |archive-date=June 2, 2017 |url-status=live }}</ref><ref>{{cite web|url=https://www.theverge.com/2017/6/1/15726974/california-new-york-washington-climate-change-coalition-paris-deal-trump|title=Three US states rebel against Trump's Paris climate agreement withdrawal|last=Potenza|first=Alessandra|date=June 1, 2017|website=The Verge|access-date=June 1, 2017|archive-url=https://web.archive.org/web/20170601230159/https://www.theverge.com/2017/6/1/15726974/california-new-york-washington-climate-change-coalition-paris-deal-trump|archive-date=June 1, 2017|url-status=live}}</ref> By the evening of June 1, 2017, Colorado, Connecticut, Hawaii, Oregon, Massachusetts, Rhode Island, Vermont and Virginia declared their intention to join with United States Climate Alliance members in reaching Paris Agreement goals. Governors of other states also expressed interest in upholding the Agreement.<ref>{{cite news|title=US mayors, governors vow to stick with Paris accord|url=http://www.cnn.com/2017/06/01/us/trump-climate-deal-cities-states-defying/index.html|access-date=June 2, 2017|publisher=CNN|date=June 2, 2017|archive-url=https://web.archive.org/web/20170602002835/http://www.cnn.com/2017/06/01/us/trump-climate-deal-cities-states-defying/index.html|archive-date=June 2, 2017|url-status=live}}</ref><ref>{{cite web|last1=Aloe|first1=Jess|title=Vermont to join states in climate alliance|url=https://www.usatoday.com/story/news/nation-now/2017/06/03/vermont-join-states-climate-alliance/367601001/|website=USA Today|access-date=June 3, 2017|archive-url=https://web.archive.org/web/20170604075222/https://www.usatoday.com/story/news/nation-now/2017/06/03/vermont-join-states-climate-alliance/367601001/|archive-date=June 4, 2017|url-status=live}}</ref><ref>{{cite web|title=GOVERNOR'S OFFICE NEWS RELEASE: GOVERNOR JOINS U.S. CLIMATE ALLIANCE, WILL SIGN BILL ALIGNED WITH PARIS AGREEMENT|url=http://governor.hawaii.gov/newsroom/governors-office-news-release-governor-joins-u-s-climate-alliance-will-sign-bill-aligned-with-paris-agreement/|website=Governor.Hawaii.gov|access-date=June 3, 2017|archive-url=https://web.archive.org/web/20170603155514/http://governor.hawaii.gov/newsroom/governors-office-news-release-governor-joins-u-s-climate-alliance-will-sign-bill-aligned-with-paris-agreement/|archive-date=June 3, 2017|url-status=live}}</ref> As of November 2020 the alliance included 24 states plus [[Puerto Rico]] and [[American Samoa]].<ref name = alliance>{{cite web|url=http://governor.wa.gov/news-media/united-states-climate-alliance-adds-10-new-members-coalition-committed-upholding-paris|title=United States Climate Alliance adds 10 new members to coalition committed to upholding the Paris Accord|date=June 5, 2017|work=Washington Governor Jay Inslee webpage|access-date=July 25, 2017|archive-url=https://web.archive.org/web/20170726190316/http://governor.wa.gov/news-media/united-states-climate-alliance-adds-10-new-members-coalition-committed-upholding-paris|archive-date=July 26, 2017|url-status=live}}</ref><ref>{{cite news
      |title=Montana Governor Steve Bullock Joins U.S. Climate Alliance
      |url=https://www.usclimatealliance.org/publications/2019/7/1/montana-governor-steve-bullock-becomes-25th-governor-to-join-us-climate-alliance
      |date=1 July 2019
      |access-date=11 August 2019
      |work=U.S. Climate Alliance
      |archive-date=November 8, 2020
      |archive-url=https://web.archive.org/web/20201108003310/https://www.usclimatealliance.org/publications/2019/7/1/montana-governor-steve-bullock-becomes-25th-governor-to-join-us-climate-alliance
      |url-status=live
      }}</ref>

      ==== International response ====
      [[File:President Jean-Claude Juncker on Paris Agreement.webm|thumb|President Jean-Claude Juncker of the European Union's response on the withdrawal]]
      * [[African Union]] – A joint statement with the [[European Union]] reaffirmed the commitment of the 55 African nations to the Paris Agreement.<ref name="auto2">{{cite web|url=http://www.bostonherald.com/news/us_politics/2017/06/the_latest_epa_chief_mum_on_trumps_beliefs_on_climate|title=The Latest: EPA chief mum on Trump's beliefs on climate|date=June 2, 2017|work=Boston Herald|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602215756/http://www.bostonherald.com/news/us_politics/2017/06/the_latest_epa_chief_mum_on_trumps_beliefs_on_climate|archive-date=June 2, 2017|url-status=dead}}</ref>
      * {{flag|Argentina}} – President [[Mauricio Macri]] was "deeply disappointed" by the withdrawal, and ratified the Argentine support to the treaty.<ref>{{cite web|url= http://www.lanacion.com.ar/2029716-el-gobierno-argentino-con-una-profunda-decepcion-por-la-medida|title= El gobierno argentino, con una "profunda decepción" por la medida|trans-title= The government of Argentina, "deeply disappointed" with the ruling|language= es|first= Laura|last= Rocha|date= June 2, 2017|work= La Nación|access-date= June 1, 2017|archive-url= https://web.archive.org/web/20170604055341/http://www.lanacion.com.ar/2029716-el-gobierno-argentino-con-una-profunda-decepcion-por-la-medida|archive-date= June 4, 2017|url-status= live}}</ref>
      * {{flag|Australia}} – Prime Minister [[Malcolm Turnbull]] said that the decision was "disappointing" and that "we would prefer the United States to remain part of the agreement". The opposition [[Australian Labor Party]] expressed similar sentiments.<ref>{{cite news|last1=Yaxley|first1=Louise|title=Donald Trump's decision 'disappointing' but Australia still committed to Paris agreement, Malcolm Turnbull says|url=http://www.abc.net.au/news/2017-06-02/donald-trump-paris-deal-decision-disappointing-say-turnbull/8582696|access-date=June 2, 2017|work=ABC News|date=June 2, 2017|archive-url=https://web.archive.org/web/20170603021011/http://www.abc.net.au/news/2017-06-02/donald-trump-paris-deal-decision-disappointing-say-turnbull/8582696|archive-date=June 3, 2017|url-status=live}}</ref>
