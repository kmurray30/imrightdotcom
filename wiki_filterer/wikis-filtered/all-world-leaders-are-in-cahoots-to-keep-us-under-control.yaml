      ===National governments===
      [[Government of Canada|Canada]] announced {{CAD|275}}{{nbsp}}million in funding for 96 vaccine research projects at Canadian companies and universities, with plans to establish a "vaccine bank" that could be used if another coronavirus outbreak occurs.<ref name="abedi">{{cite news |first=Maham |last=Abedi |title=Canada to spend $192M on developing COVID-19 vaccine |url=https://globalnews.ca/news/6717883/coronavirus-canada-vaccine-spending/ |access-date=24 March 2020 |work=Global News |date=23 March 2020 |archive-url=https://web.archive.org/web/20200409200638/https://globalnews.ca/news/6717883/coronavirus-canada-vaccine-spending/ |archive-date=9 April 2020 |url-status=live }}</ref><ref name="can-funding">{{cite web |title=Government of Canada funds 49 additional COVID-19 research projects – Details of the funded projects |url=https://www.canada.ca/en/institutes-health-research/news/2020/03/government-of-canada-funds-49-additional-covid-19-research-projects-details-of-the-funded-projects.html |publisher=Government of Canada |access-date=23 March 2020 |date=23 March 2020 |archive-url=https://web.archive.org/web/20200322163807/https://www.canada.ca/en/institutes-health-research/news/2020/03/government-of-canada-funds-49-additional-covid-19-research-projects-details-of-the-funded-projects.html |archive-date=22 March 2020 |url-status=live }}</ref> A further investment of {{CAD|1.1}}{{nbsp}}billion was added to support clinical trials and develop manufacturing and supply chains for vaccines.<ref name="can-research">{{cite web|title=Government of Canada's research response to COVID-19|url=https://www.canada.ca/en/public-health/services/publications/diseases-conditions/covid-19-government-canada-research-response.html|publisher=Government of Canada|date=23 April 2020|access-date=4 May 2020|archive-url=https://web.archive.org/web/20200513135919/https://www.canada.ca/en/public-health/services/publications/diseases-conditions/covid-19-government-canada-research-response.html|archive-date=13 May 2020|url-status=live}}</ref> On 4{{nbsp}}May, the Canadian government committed {{CAD|850}}{{nbsp}}million to the WHO's live streaming effort to raise {{US$|8}}{{nbsp}}billion for COVID‑19 vaccines and preparedness.<ref name="aiello">{{cite news|title='A global challenge': PM Trudeau commits $850&nbsp;million to global fight against COVID-19|url=https://www.ctvnews.ca/health/coronavirus/a-global-challenge-pm-trudeau-commits-850-million-to-global-fight-against-covid-19-1.4923565|last=Aiello|first=Rachel|date=4 May 2020|work=CTV News|access-date=4 May 2020|archive-url=https://web.archive.org/web/20200510070903/https://www.ctvnews.ca/health/coronavirus/a-global-challenge-pm-trudeau-commits-850-million-to-global-fight-against-covid-19-1.4923565|archive-date=10 May 2020|url-status=dead }}</ref>

      [[Government of China|China]] provided low-rate loans to a vaccine developer through its [[People's Bank of China|central bank]] and "quickly made land available for the company" to build production plants.<ref name="reuters">{{cite news|date=27 April 2020|title=Special Report: Countries, companies risk billions in race for coronavirus vaccine|first1 = Julie | last1 = Steenhuysen |first2 = Peter | last2 = Eisler |first3 = Allison | last3 = Martell |first4 = Stephanie | last4 = Nebehay |publisher=Reuters|url=https://www.reuters.com/article/health-coronavirus-vaccine-idUSL2N2CF0JG|access-date=2 May 2020|archive-url=https://web.archive.org/web/20200515031817/https://www.reuters.com/article/health-coronavirus-vaccine-idUSL2N2CF0JG|archive-date=15 May 2020|url-status=live }}</ref> As of June 2020, six of the eleven COVID‑19 vaccine candidates in early-stage human testing were developed by Chinese organizations.<ref name="sanger">{{cite news|last1=Sanger|first1=David E.|last2=Kirkpatrick|first2=David D.|last3=Zimmer|first3=Carl|last4=Thomas|first4=Katie|last5=Wee|first5=Sui-Lee|date=2 May 2020|title=With Pressure Growing, Global Race for a Vaccine Intensifies|work=[[The New York Times]]|url=https://www.nytimes.com/2020/05/02/us/politics/vaccines-coronavirus-research.html|access-date=2 May 2020|issn=0362-4331|archive-url=https://web.archive.org/web/20200511003506/https://www.nytimes.com/2020/05/02/us/politics/vaccines-coronavirus-research.html|archive-date=11 May 2020|url-status=live }}</ref> Three Chinese vaccine companies and research institutes are supported by the government for financing research, conducting clinical trials, and manufacturing the most promising vaccine candidates, prioritizing rapid evidence of efficacy over safety.<ref name="takada">{{cite news|title=US and China unleash wallets in race for coronavirus vaccine|last1=Takada|first1=Noriyuki|last2=Satake|first2=Minoru|url=https://asia.nikkei.com/Spotlight/Coronavirus/US-and-China-unleash-wallets-in-race-for-coronavirus-vaccine|work=Nikkei Asian Review|date=2 May 2020|access-date=3 May 2020|archive-url=https://web.archive.org/web/20200510111134/https://asia.nikkei.com/Spotlight/Coronavirus/US-and-China-unleash-wallets-in-race-for-coronavirus-vaccine|archive-date=10 May 2020|url-status=live }}</ref> On 18 May, China had pledged {{USD|2}}{{nbsp}}billion to support overall efforts by the WHO for programs against COVID‑19.<ref>{{cite news |title=China's Xi announces $2B for coronavirus response as WHO faces calls for investigation |url=https://www.nbcnews.com/news/world/coronavirus-who-faces-global-call-investigation-general-assembly-n1209061 |work=NBC News |first1=Yuliya |last1=Talmazan |first2=Keir |last2=Simmons |first3=Laura |last3=Saravia |date=18 May 2020|access-date=18 May 2020|archive-url=https://web.archive.org/web/20200518171737/https://www.nbcnews.com/news/world/coronavirus-who-faces-global-call-investigation-general-assembly-n1209061|archive-date=18 May 2020|url-status=live}}</ref> On 22 July, China announced plans to provide a US$1&nbsp;billion loan to make its vaccine accessible for Latin America and the [[Caribbean]].<ref>{{cite news |last1=Ore |first1=Diego |title=Mexico says China plans $1&nbsp;billion loan to ease Latam access to virus vaccine |url=https://www.reuters.com/article/us-health-coronavirus-mexico-china/mexico-says-china-plans-1-billion-loan-to-ease-latam-access-to-virus-vaccine-idUSKCN24O08L |access-date=16 August 2020 |publisher=Reuters |date=23 July 2020 |archive-date=25 September 2020 |archive-url=https://web.archive.org/web/20200925122724/https://www.reuters.com/article/us-health-coronavirus-mexico-china/mexico-says-china-plans-1-billion-loan-to-ease-latam-access-to-virus-vaccine-idUSKCN24O08L/ |url-status=live }}</ref> On 24 August, [[Premier of the People's Republic of China|Chinese Premier]] [[Li Keqiang]] announced it would provide Cambodia, Laos, Myanmar, Thailand, and Vietnam priority access to the vaccine once it was distributed.<ref>{{cite web|date=24 August 2020|title=China promises Mekong neighbours access to Chinese Covid-19 vaccine|url=https://www.scmp.com/news/china/diplomacy/article/3098610/china-promises-its-mekong-neighbours-priority-access|access-date=24 August 2020|website=South China Morning Post|archive-date=25 September 2020|archive-url=https://web.archive.org/web/20200925122727/https://www.scmp.com/news/china/diplomacy/article/3098610/china-promises-its-mekong-neighbours-priority-access/|url-status=live}}</ref>

      [[File:The vaccine development process typically takes 10 to 15 years under a traditional timeline. Multiple regulatory pathways, such as Emergency Use Authorization, can be used to facilitate bringing a vaccine for COVID-19 to (49948301848).jpg|thumb|upright=1.4|US [[Government Accountability Office]] diagram comparing a traditional vaccine development timeline to a safe, possible expedited method timeline.]]

      Great Britain formed a COVID‑19 vaccine [[task force]] in April 2020, to stimulate local efforts for accelerated development of a vaccine through collaborations of industry, universities, and government agencies. It encompassed every phase of development from research to manufacturing.<ref name="morriss">{{cite web|title=Government launches coronavirus vaccine taskforce as human clinical trials start|url=https://pharmafield.co.uk/pharma_news/government-launches-coronavirus-vaccine-taskforce-as-human-clinical-trials-start/|last=Morriss|first=Emma|publisher=Pharmafield|date=22 April 2020|access-date=3 May 2020|archive-date=26 June 2020|archive-url=https://web.archive.org/web/20200626021103/https://pharmafield.co.uk/pharma_news/government-launches-coronavirus-vaccine-taskforce-as-human-clinical-trials-start/|url-status=live}}</ref> The vaccine development initiatives at the University of Oxford and [[Imperial College London|Imperial College of London]] were financed with {{GBP|44}}{{nbsp}}million.<ref name="gartner">{{cite news|last1=Gartner|first1=Annelies|last2=Roberts|first2=Lizzie|date=3 May 2020|title=How close are we to a coronavirus vaccine? Latest news on UK trials|work=The Telegraph|url=https://www.telegraph.co.uk/global-health/science-and-disease/coronavirus-vaccine-uk-trials-news-latest-update-covid-19/|access-date=3 May 2020|issn=0307-1235|archive-url=https://web.archive.org/web/20200504203335/https://www.telegraph.co.uk/global-health/science-and-disease/coronavirus-vaccine-uk-trials-news-latest-update-covid-19/|archive-date=4 May 2020|url-status=dead }}</ref><ref name="oxford">{{cite web|title=Landmark partnership announced for development of COVID-19 vaccine|publisher=University of Oxford|url=http://www.ox.ac.uk/news/2020-04-30-landmark-partnership-announced-development-covid-19-vaccine|date=30 April 2020|access-date=3 May 2020|archive-url=https://web.archive.org/web/20200513010438/http://www.ox.ac.uk/news/2020-04-30-landmark-partnership-announced-development-covid-19-vaccine|archive-date=13 May 2020|url-status=live}}</ref>

      In the United States, the [[Biomedical Advanced Research and Development Authority]] (BARDA), a federal agency funding disease-fighting technology, announced investments of nearly {{US$|1}}{{nbsp}}billion to support American COVID‑19 vaccine development and manufacture of the most promising candidates. On 16 April, BARDA made a {{US$|483}}{{nbsp}}million investment in vaccine developer [[Moderna]] and its partner, [[Johnson & Johnson]].<ref name="reuters" /><ref name="kuznia">{{cite news|title=In quest for vaccine, US makes 'big bet' on company with unproven technology|url=https://www.cnn.com/2020/05/01/us/coronavirus-moderna-vaccine-invs/index.html|last1=Kuznia|first1=Robert|last2=Polglase|first2=Katie|date=1 May 2020|publisher=CNN|access-date=2 May 2020|last3=Mezzofiore|first3=Gianluca|archive-url=https://web.archive.org/web/20200513005730/https://www.cnn.com/2020/05/01/us/coronavirus-moderna-vaccine-invs/index.html|archive-date=13 May 2020|url-status=live }}</ref> BARDA has earmarked an additional {{US$|4}}{{nbsp}}billion for development. It will have a role in other programs for development of six to eight vaccine candidates destined for clinical study into 2021 by companies such as [[Sanofi Pasteur]] and [[Regeneron]].<ref name="kuznia" /><ref name="lee">{{cite web|title=Health officials eyeing at least one of 14 potential coronavirus vaccines to fast-track|url=https://www.nbcnews.com/politics/white-house/health-officials-eyeing-least-one-14-potential-coronavirus-vaccines-fast-n1198326|work=NBC News|last1=Lee|first1=Carol E|last2=Welker|first2=Kristen|first3=Elyse|last3=Perlmutter-Gumbiner|date=1 May 2020|access-date=2 May 2020|archive-url=https://web.archive.org/web/20200511104127/https://www.nbcnews.com/politics/white-house/health-officials-eyeing-least-one-14-potential-coronavirus-vaccines-fast-n1198326|archive-date=11 May 2020|url-status=live }}</ref> On 15 May, the government announced funding for a fast-track program called [[Operation Warp Speed]] to place multiple vaccine candidates into clinical trials by the fall of 2020 and manufacture 300{{nbsp}}million doses of a licensed vaccine by January 2021. The project's chief advisor is [[Moncef Slaoui]] and its chief operating officer is General [[Gustave F. Perna|Gustave Perna]].<ref>{{cite journal|last=Cohen|first=Jon|date=15 May 2020|title=U.S. 'Warp Speed' vaccine effort comes out of the shadows|journal=Science|volume=368|issue=6492|pages=692–93|doi=10.1126/science.368.6492.692|issn=0036-8075|pmid=32409451|bibcode=2020Sci...368..692C|doi-access=free | title-link=doi }}</ref><ref>{{cite news| vauthors = Sink J, Fabian J, Griffin R |date=15 May 2020|title=Trump introduces 'Warp Speed' leaders to hasten COVID-19 vaccine|work=Bloomberg|url=https://www.bloomberg.com/news/articles/2020-05-15/trump-to-introduce-warp-speed-leaders-after-vaccine-criticism|access-date=15 May 2020|archive-url=https://web.archive.org/web/20200521231515/https://www.bloomberg.com/news/articles/2020-05-15/trump-to-introduce-warp-speed-leaders-after-vaccine-criticism|archive-date=21 May 2020|url-status=live}}</ref> In June, the Warp Speed team said it would work with seven companies developing vaccine candidates: [[Moderna]], [[Johnson & Johnson Pharmaceutical Research and Development|Johnson & Johnson]], [[Merck & Co.|Merck]], [[Pfizer]], the [[University of Oxford]] in collaboration with [[AstraZeneca]], and two others,<ref>{{cite news| vauthors = Griffith R, Jacobs J |title=White House Works With Seven Drugmakers in 'Warp Speed' Push|url=https://www.bloomberg.com/news/articles/2020-06-03/white-house-working-with-seven-drugmakers-in-warp-speed-push|access-date=4 June 2020|work=Bloomberg|date=3 June 2020|archive-url=https://web.archive.org/web/20200603220008/https://www.bloomberg.com/news/articles/2020-06-03/white-house-working-with-seven-drugmakers-in-warp-speed-push|archive-date=3 June 2020|url-status=live}}</ref> although Pfizer later stated that "all the investment for R&D was made by Pfizer at risk."<ref>{{cite web |title=Fact-checking the battle for credit over Pfizer's vaccine announcement |date=10 November 2020 |url=https://edition.cnn.com/2020/11/10/politics/fact-check-pfizer-warp-speed-pence/ |publisher=CNN |access-date=13 November 2020 |quote="Pfizer is one of various vaccine manufacturers participating in Operation Warp Speed as a supplier of a potential COVID-19 vaccine," Castillo said in an email. "While Pfizer did reach an advanced purchase agreement with the U.S. government, the company did not accept (Biomedical Advanced Research and Development Authority) funding for the research and development process. All the investment for R&D was made by Pfizer at risk. Dr. Jansen was emphasizing that last point." |archive-date=16 November 2020 |archive-url=https://web.archive.org/web/20201116124140/https://edition.cnn.com/2020/11/10/politics/fact-check-pfizer-warp-speed-pence/ |url-status=live }}</ref>

      === Pharmaceutical companies ===
      Large pharmaceutical companies with experience in making vaccines at scale, including Johnson & Johnson, AstraZeneca, and [[GlaxoSmithKline]] (GSK), formed alliances with [[biotechnology]] companies, governments, and universities to accelerate progression to an effective vaccine.<ref name="reuters" /><ref name="sanger" /> To combine financial and manufacturing capabilities for a pandemic with [[adjuvant]]ed vaccine technology, GSK joined with [[Sanofi]] in an uncommon partnership of [[Multinational corporation|multinational companies]] to support accelerated vaccine development.<ref>{{cite web|last=McGrail|first=Samantha|date=15 April 2020|title=Sanofi, GSK partner to develop adjuvanted COVID-19 vaccine|url=https://pharmanewsintel.com/news/sanofi-gsk-partner-to-develop-adjuvanted-covid-19-vaccine|url-status=live|archive-url=https://web.archive.org/web/20200509223306/https://pharmanewsintel.com/news/sanofi-gsk-partner-to-develop-adjuvanted-covid-19-vaccine|archive-date=9 May 2020|access-date=4 May 2020|publisher=PharmaNewsIntelligence}}</ref>

      By June 2020, tens of billions of dollars were invested by corporations, governments, international health organizations, and university research groups to develop dozens of vaccine candidates and prepare for global vaccination programs to immunize against COVID‑19 infection.<ref name="gates1">{{cite journal|vauthors=Gates B|date=February 2020|title=Responding to Covid-19: A once-in-a-century pandemic?|journal=The New England Journal of Medicine|volume=382|issue=18|pages=1677–79|doi=10.1056/nejmp2003762|pmid=32109012|doi-access=free | title-link=doi}}</ref><ref name="hbr">{{cite news|last1=Weintraub|first1=Rebecca|last2=Yadav|first2=Prashant|last3=Berkley|first3=Seth|date=2 April 2020|title=A COVID-19 vaccine will need equitable, global distribution|journal=Harvard Business Review|url=https://hbr.org/2020/04/a-covid-19-vaccine-will-need-equitable-global-distribution|url-status=live|access-date=9 June 2020|archive-url=https://web.archive.org/web/20200609173105/https://hbr.org/2020/04/a-covid-19-vaccine-will-need-equitable-global-distribution|archive-date=9 June 2020|issn=0017-8012}}</ref><ref name="cbcr">{{cite news|date=8 May 2020|title=COVID-19 pandemic reveals the risks of relying on private sector for life-saving vaccines, says expert|work=CBC Radio|url=https://www.cbc.ca/radio/thesundayedition/the-sunday-edition-for-may-10-2020-1.5554451/covid-19-pandemic-reveals-the-risks-of-relying-on-private-sector-for-life-saving-vaccines-says-expert-1.5554463|url-status=live|access-date=8 June 2020|archive-url=https://web.archive.org/web/20200513172525/https://www.cbc.ca/radio/thesundayedition/the-sunday-edition-for-may-10-2020-1.5554451/covid-19-pandemic-reveals-the-risks-of-relying-on-private-sector-for-life-saving-vaccines-says-expert-1.5554463|archive-date=13 May 2020}}</ref><ref name="ahmed">{{cite web|last=Ahmed|first=Darius D.|date=4 June 2020|title=Oxford, AstraZeneca COVID-19 deal reinforces 'vaccine sovereignty'|url=https://www.statnews.com/2020/06/04/oxford-astrazeneca-covid-19-deal-reinforces-vaccine-sovereignty/|url-status=live|archive-url=https://web.archive.org/web/20200612125335/https://www.statnews.com/2020/06/04/oxford-astrazeneca-covid-19-deal-reinforces-vaccine-sovereignty/|archive-date=12 June 2020|access-date=8 June 2020|work=[[Stat (website)|Stat]]}}</ref> The corporate investment and need to generate value for public shareholders raised concerns about a "market-based approach" in vaccine development, costly pricing of eventual licensed vaccines, preferred access for distribution first to affluent countries, and sparse or no distribution to where the pandemic is most aggressive, as predicted for densely populated, impoverished countries unable to afford vaccinations.<ref name="gates1" /><ref name="sanger" /><ref name="cbcr" /> The collaboration of the University of Oxford with AstraZeneca (a global pharmaceutical company based in the UK) raised concerns about price and sharing of eventual profits from international vaccine sales, arising from whether the British government and university as public partners had commercialization rights.<ref name="ahmed" /> AstraZeneca stated that initial pricing of its vaccine would not include a [[profit margin]] for the company while the pandemic was still expanding.<ref name="ahmed" />

      In June, AstraZeneca made a {{US$|750&nbsp;million}} deal allowing CEPI and [[GAVI|Gavi, the Vaccine Alliance]] to manufacture and distribute 300&nbsp;million doses if its Oxford vaccine candidate proved to be safe and effective, reportedly increasing the company's total production capacity to over 2&nbsp;billion doses per year.<ref name="kyle">{{cite web|last=Blankenship|first=Kyle|date=4 June 2020|title=AstraZeneca unveils massive $750M deal in effort to produce billions of COVID-19 shots|url=https://www.fiercepharma.com/manufacturing/astrazeneca-unveils-massive-750m-deal-effort-to-produce-billions-covid-19-shots|url-status=live|archive-url=https://web.archive.org/web/20200610191605/https://www.fiercepharma.com/manufacturing/astrazeneca-unveils-massive-750m-deal-effort-to-produce-billions-covid-19-shots|archive-date=10 June 2020|access-date=8 June 2020|publisher=FiercePharma}}</ref> Commercialization of pandemic vaccines is a high-risk business venture, potentially losing billions of dollars in development and pre-market manufacturing costs if the candidate vaccines fail to be safe and effective.<ref name="gates1" /><ref name="reuters" /><ref name="sanger" /><ref name="hbr" /> Pfizer indicated it was not interested in a government partnership, considering it to be a "third party" slowing progress.<ref name="cohen6-4">{{cite journal|last=Cohen|first=Jon|date=4 June 2020|title=Top U.S. scientists left out of White House selection of COVID-19 vaccine short list|journal=Science|doi=10.1126/science.abd1719|issn=0036-8075|doi-access=free | title-link=doi}}</ref> Further, there are concerns that rapid-development programs{{snd}}like Operation Warp Speed{{snd}}are choosing candidates mainly for their manufacturing advantages rather than optimal safety and efficacy.<ref name="cohen6-4" />

      ==Development==
      CEPI classifies development stages for vaccines as "exploratory" (planning and designing a candidate, having no evaluation [[in vivo]]), "preclinical" (in vivo evaluation with preparation for manufacturing a compound to test in humans), or [[Phases of clinical research#Phase I|initiation of Phase{{nbsp}}I safety studies in healthy people]].<ref name="thanh2" /> Some 321 total vaccine candidates were in development as either confirmed projects in clinical trials or in early-stage "exploratory" or "preclinical" development, as of September.<ref name="thanh2" />

      ===Early development===
      [[File:Scientist examines COVID-19 vaccine agar plate.jpg|thumb|NIAID (NIH) scientist researching COVID‑19 vaccine examines agar plate. (30 January 2020)]]

      After a coronavirus was isolated in December 2019,<ref name="who-time">{{cite web|date=27 April 2020|title=World Health Organization timeline – COVID-19|url=https://www.who.int/news-room/detail/27-04-2020-who-timeline---covid-19|url-status=live|archive-url=https://web.archive.org/web/20200429012212/https://www.who.int/news-room/detail/27-04-2020-who-timeline---covid-19|archive-date=29 April 2020|access-date=2 May 2020|publisher=[[World Health Organization]] (WHO)}}</ref> its [[Nucleic acid sequence|genetic sequence]] was published on 11 January 2020, triggering an urgent international response to prepare for an outbreak and hasten development of a preventive vaccine.<ref name="thanh" /><ref name="gates1" /><ref name="Fauci">{{cite journal|vauthors=Fauci AS, Lane HC, Redfield RR|date=March 2020|title=Covid-19: Navigating the uncharted|journal=The New England Journal of Medicine|volume=382|issue=13|pages=1268–69|doi=10.1056/nejme2002387|pmc=7121221|pmid=32109011|doi-access=free|title-link=doi}}</ref>

      In February 2020, the WHO said it did not expect a vaccine against [[severe acute respiratory syndrome coronavirus 2]] (SARS-CoV-2), the causative virus, to become available in less than 18 months.<ref name=":0">{{cite web|last1=Grenfell|first1=Rob|last2=Drew|first2=Trevor|date=14 February 2020|title=Here's why the WHO says a coronavirus vaccine is 18 months away|url=https://theconversation.com/heres-why-the-who-says-a-coronavirus-vaccine-is-18-months-away-131213|access-date=11 November 2020|website=Business Insider|archive-date=5 December 2020|archive-url=https://web.archive.org/web/20201205123327/https://theconversation.com/heres-why-the-who-says-a-coronavirus-vaccine-is-18-months-away-131213|url-status=live}}</ref> The rapidly growing infection rate of COVID‑19 worldwide during 2020 stimulated international alliances and government efforts to urgently organize resources to make multiple vaccines on shortened timelines,<ref name="who-accel">{{cite web|date=27 April 2020|title=Update on WHO Solidarity Trial – Accelerating a safe and effective COVID-19 vaccine|url=https://www.who.int/emergencies/diseases/novel-coronavirus-2019/global-research-on-novel-coronavirus-2019-ncov/solidarity-trial-accelerating-a-safe-and-effective-covid-19-vaccine|url-status=live|archive-url=https://web.archive.org/web/20200430185550/https://www.who.int/emergencies/diseases/novel-coronavirus-2019/global-research-on-novel-coronavirus-2019-ncov/solidarity-trial-accelerating-a-safe-and-effective-covid-19-vaccine|archive-date=30 April 2020|access-date=2 May 2020|publisher=[[World Health Organization]] (WHO)|quote=It is vital that we evaluate as many vaccines as possible as we cannot predict how many will turn out to be viable. To increase the chances of success (given the high level of attrition during vaccine development), we must test all candidate vaccines until they fail. [The] WHO is working to ensure that all of them have the chance of being tested at the initial stage of development. The results for the efficacy of each vaccine are expected within three to six months and this evidence, combined with data on safety, will inform decisions about whether it can be used on a wider scale.}}</ref> with four vaccine candidates entering human evaluation in March (see the table of [[#Clinical trials started in 2020|clinical trials started in 2020]], below).<ref name="thanh" /><ref name="yamey">{{cite journal|vauthors=Yamey G, Schäferhoff M, Hatchett R, Pate M, Zhao F, McDade KK|date=May 2020|title=Ensuring global access to COVID‑19 vaccines|journal=Lancet|volume=395|issue=10234|pages=1405–06|doi=10.1016/S0140-6736(20)30763-7|pmc=7271264|pmid=32243778|quote=CEPI estimates that developing up to three vaccines in the next 12–18 months will require an investment of at least {{US$|2}}{{nbsp}}billion. This estimate includes Phase{{nbsp}}1 clinical trials of eight vaccine candidates, progression of up to six candidates through Phase{{nbsp}}2 and{{nbsp}}3 trials, completion of regulatory and quality requirements for at least three vaccines, and enhancing global manufacturing capacity for three vaccines.|doi-access=free | title-link=doi}}</ref>

      By April 2020, "almost 80 companies and institutes in 19 countries" were working on this virtual gold rush.<ref name="cssa">{{cite news|last1=Schmidt|first1=Charles|date=1 June 2020|title=Genetic Engineering Could Make a COVID-19 Vaccine in Months Rather Than Years|work=Scientific American|url=https://www.scientificamerican.com/article/genetic-engineering-could-make-a-covid-19-vaccine-in-months-rather-than-years1/|url-status=live|access-date=26 August 2020|archive-url=https://web.archive.org/web/20201011084737/https://www.scientificamerican.com/article/genetic-engineering-could-make-a-covid-19-vaccine-in-months-rather-than-years1//|archive-date=11 October 2020}}</ref> Also in April, CEPI estimated that as many as six of the vaccine candidates against COVID‑19 should be chosen by international coalitions for development through Phase{{nbsp}}II–III trials, and three should be streamlined through regulatory and quality assurance for eventual licensing at a total cost of at least {{US$|2}}{{nbsp}}billion.<ref name="thanh2" /><ref name="yamey" /><ref name="gates22">{{cite web|last=Gates|first=Bill|date=30 April 2020|title=The vaccine race explained: What you need to know about the COVID-19 vaccine|url=https://www.gatesnotes.com/Health/What-you-need-to-know-about-the-COVID-19-vaccine|url-status=live|archive-url=https://web.archive.org/web/20200514010012/https://www.gatesnotes.com/Health/What-you-need-to-know-about-the-COVID-19-vaccine|archive-date=14 May 2020|access-date=2 May 2020|publisher=The Gates Notes}}</ref> Another analysis estimates ten candidates will need simultaneous initial development, before a select few are chosen for the final path to licensing.<ref name="gates22" />

      ===Cyber-espionage efforts===
      In July 2020, the UK's [[National Cyber Security Centre (United Kingdom)|National Cyber Security Centre]], the Canadian [[Communications Security Establishment]], and the U.S.'s [[United States Department of Homeland Security|Homeland Security Department]] [[Cybersecurity and Infrastructure Security Agency]], and the [[National Security Agency]] (NSA) issued a joint statement saying that Russian state-backed hackers, specifically [[Cozy Bear]] (APT29) were attempting to steal COVID‑19 treatment and vaccine research from academic and pharmaceutical institutions in other countries. Russia denied the claim, but has a history of [[cyber-espionage]] and cyberattacks on foreign targets.<ref>{{cite news|last1=Fox|first1=Chris|last2=Kelion|first2=Leo|date=16 July 2020|title=Russian spies 'target coronavirus vaccine'|work=BBC News|url=https://www.bbc.com/news/technology-53429506|url-status=live|access-date=1 August 2020|archive-url=https://web.archive.org/web/20201011084740/https://www.bbc.com/news/technology-53429506/|archive-date=11 October 2020}}</ref><ref name=BBCTargeting>[https://www.bbc.com/news/technology-54936886 Coronavirus: North Korea and Russia hackers 'targeting vaccine'] {{Webarchive|url=https://web.archive.org/web/20211217005351/https://www.bbc.com/news/technology-54936886 |date=17 December 2021 }}, (13 November 2020).</ref> In November 2020, [[Microsoft]] reported that the Russian state-sponsored hacking group [[Fancy Bear]] (APT28) and [[Illicit activities of North Korea|North Korean state-sponsored hacking groups]] nicknamed "[[Lazarus Group|Zinc]]" and "Cerium" had been implicated in recent cyberattacks against researchers developing a COVID-19 vaccine (including in Canada, France, India, South Korea, and the U.S.) as well as against the [[World Health Organization]], and that the cyberattackers had used both [[Brute-force attack|brute force]] and [[phishing]] techniques to compromise computer systems.<ref name=BBCTargeting/> Microsoft reported that at least nine healthcare institutions were targeted, and that some attempts were successful.<ref name=NorthKorFebruary2021>[https://www.bbc.com/news/technology-56084575 North Korea accused of hacking Pfizer for Covid-19 vaccine data] {{Webarchive|url=https://web.archive.org/web/20220424232937/https://www.bbc.com/news/technology-56084575 |date=24 April 2022 }}, BBC News (16 February 2021).</ref> In February 2021, South Korean's [[National Intelligence Service (South Korea)|National Intelligence Service]] gave a closed-door briefing to members of the South Korean parliament about North Korean efforts to steal COVID-19 vaccine technology from [[Pfizer]].<ref name=NorthKorFebruary2021/>

      ===Preclinical research===
      [[File:NIAID scientist researching COVID-19 vaccine.jpg|thumb|NIAID (NIH) scientist researching COVID‑19 vaccine. (30 January 2020)]]

      In April 2020, the WHO issued a statement representing dozens of vaccine scientists around the world, pledging collaboration to speed development of a vaccine against COVID‑19.<ref name="who-scientists">{{cite web|date=13 April 2020|title=Public statement for collaboration on COVID-19 vaccine development|url=https://www.who.int/news-room/detail/13-04-2020-public-statement-for-collaboration-on-covid-19-vaccine-development|url-status=live|archive-url=https://web.archive.org/web/20200420214124/https://www.who.int/news-room/detail/13-04-2020-public-statement-for-collaboration-on-covid-19-vaccine-development|archive-date=20 April 2020|access-date=20 April 2020|publisher=[[World Health Organization]] (WHO)}}</ref> The WHO coalition is encouraging international cooperation between organizations developing vaccine candidates, national regulatory and policy agencies, financial contributors, public health associations, and governments, for eventual manufacturing of a successful vaccine in quantities sufficient to supply all affected regions, particularly low-resource countries.<ref name="thanh" />

      Industry analysis of past vaccine development shows failure rates of 84–90%.<ref name="thanh" /><ref name="bio">{{cite web|date=June 2016|title=Clinical Development Success Rates 2006–2015|url=https://www.bio.org/sites/default/files/Clinical%20Development%20Success%20Rates%202006-2015%20-%20BIO,%20Biomedtracker,%20Amplion%202016.pdf|url-status=live|archive-url=https://web.archive.org/web/20190912220246/https://www.bio.org/sites/default/files/Clinical%20Development%20Success%20Rates%202006-2015%20-%20BIO,%20Biomedtracker,%20Amplion%202016.pdf|archive-date=12 September 2019|access-date=23 March 2020|publisher=BIO Industry Analysis}}</ref> Because COVID‑19 is a novel virus target with properties still being discovered and requiring innovative vaccine technologies and development strategies, the risks associated with developing a successful vaccine across all steps of preclinical and clinical research are high.<ref name="thanh" />

      To assess the potential for vaccine efficacy, unprecedented computer simulations and new COVID‑19-specific animal models are being developed multinationally.<ref name="Pandamooz">{{cite journal |last1=Pandamooz |first1=Sareh |last2=Jurek |first2=Benjamin |last3=Meinung |first3=Carl-Philipp |last4=Baharvand |first4=Zahra |last5=Sahebi Shahem-abadi |first5=Alireza |last6=Haerteis |first6=Silke |last7=Miyan |first7=Jaleel A. |last8=Downing |first8=James |last9=Dianatpour |first9=Mehdi |last10=Borhani-Haghighi |first10=Afshin |last11=Salehi |first11=Mohammad Saied |title=Experimental Models of SARS-CoV-2 Infection: Possible Platforms to Study COVID-19 Pathogenesis and Potential Treatments |journal=Annual Review of Pharmacology and Toxicology |date=6 January 2022 |volume=62 |issue=1 |pages=25–53 |doi=10.1146/annurev-pharmtox-121120-012309 |pmid=33606962 |s2cid=231970935 |issn=0362-1642 |doi-access=free }}</ref> Of the confirmed active vaccine candidates, about 70% are being developed by private companies, with the remaining projects under development by academic, government coalitions, and health organizations.<ref name="thanh2" />  Historically, the probability of success for an infectious disease vaccine candidate to pass preclinical barriers and reach Phase{{nbsp}}I of human testing is 41–57%.<ref name="gouglas" />

      === Challenges ===
      The rapid development and urgency of producing a vaccine for the COVID‑19 pandemic may increase the risks and failure rate of delivering a safe, effective vaccine.<ref name="diamond2">{{cite journal | vauthors = Diamond MS, Pierson TC | title = The Challenges of Vaccine Development against a New Virus during a Pandemic | journal = Cell Host & Microbe | volume = 27 | issue = 5 | pages = 699–703 | date = May 2020 | pmid = 32407708 | pmc = 7219397 | doi = 10.1016/j.chom.2020.04.021 | doi-access = free | title-link = doi }}</ref><ref name="thanh" /><ref name="Thorp">{{cite journal | vauthors = Thorp HH | title = Underpromise, overdeliver | journal = Science | volume = 367 | issue = 6485 | page = 1405 | date = March 2020 | pmid = 32205459 | doi = 10.1126/science.abb8492 | bibcode = 2020Sci...367.1405T | doi-access = free | title-link = doi }}</ref> One study found that between 2006 and 2015, the success rate of obtaining approval from Phase{{nbsp}}I to successful Phase{{nbsp}}III trials was 16.2% for vaccines,<ref name="bio" /> and CEPI indicates a potential success rate of only 10% for vaccine candidates in 2020 development.<ref name="thanh" />

      Research at universities is obstructed by [[Social distancing|physical distancing]] and closing of laboratories.<ref>{{cite news|last=Blackwell|first=Tom|date=20 April 2020|title=COVID-19 vaccine researchers say pandemic lockdown placing many serious obstacles to their work|work=National Post|url=https://nationalpost.com/news/covid-19-vaccine-researchers-say-pandemic-lockdown-placing-many-serious-obstacles-to-their-work|access-date=3 May 2020|archive-date=24 April 2020|archive-url=https://wayback.archive-it.org/all/20200424030140/https://nationalpost.com/news/covid-19-vaccine-researchers-say-pandemic-lockdown-placing-many-serious-obstacles-to-their-work|url-status=live}}</ref><ref>{{cite web|last=Chen|first=Justin|date=4 May 2020|title=Covid-19 has shuttered labs. It could put a generation of researchers at risk|url=https://www.statnews.com/2020/05/04/coronavirus-lab-shutdowns-impact-on-scientists-research-delays/|url-status=live|archive-url=https://web.archive.org/web/20200506072301/https://www.statnews.com/2020/05/04/coronavirus-lab-shutdowns-impact-on-scientists-research-delays/|archive-date=6 May 2020|access-date=4 May 2020|work=[[Stat (website)|Stat]]}}</ref>

      ====Biosafety====
      Early research to assess vaccine efficacy using COVID‑19-specific animal models, such as [[ACE2]]-[[transgenic]] mice, other laboratory animals, and non-human primates, indicates a need for [[biosafety]]-level{{nbsp}}3 containment measures for handling live viruses, and international coordination to ensure standardized safety procedures.<ref name="diamond2" /><ref name="thanh" />

      ====Antibody-dependent enhancement====
      {{main|Antibody-dependent enhancement}}

      Although the quality and quantity of [[antibody]] production by a potential vaccine is intended to neutralize the COVID‑19 infection, a vaccine may have an unintended opposite effect by causing [[antibody-dependent enhancement|antibody-dependent disease enhancement]] (ADE), which increases the virus attachment to its target cells and might trigger a [[cytokine storm]] if a vaccinated person is later attacked by the virus.<ref name="diamond2" /><ref name="iwasaki">{{cite journal | vauthors = Iwasaki A, Yang Y | title = The potential danger of suboptimal antibody responses in COVID-19 | journal = Nature Reviews. Immunology | volume = 20 | issue = 6 | pages = 339–341 | date = June 2020 | pmid = 32317716 | pmc = 7187142 | doi = 10.1038/s41577-020-0321-6 | doi-access=free | title-link=doi }}</ref> The vaccine technology platform (for example, [[viral vector vaccine]], [[Coronavirus spike protein|spike (S) protein]] vaccine or [[protein subunit]] vaccine), vaccine dose, timing of repeat vaccinations for the possible recurrence of COVID‑19 infection, and elderly age are factors determining the risk and extent of ADE.<ref name="diamond2" /><ref name="iwasaki" /> The antibody response to a vaccine is a variable of vaccine technologies in development, including whether the vaccine has precision in its mechanism,<ref name="diamond2" /> and choice of the route for how it is given ([[Intramuscular injection|intramuscular]], [[Intradermal injection|intradermal]], oral, or nasal).<ref name="iwasaki" />

      Prior to the pandemic, ADE was observed in animal studies of laboratory rodents with vaccines for [[SARS-CoV]], the virus that causes severe acute respiratory syndrome ([[SARS]]). Researchers therefore emphasized the need to carefully assess the potential for ADE to occur with COVID-19.<ref>{{cite journal |vauthors=Lambert PH, Ambrosino DM, Andersen SR, Baric RS, Black SB, Chen RT, Dekker CL, Didierlaurent AM, Graham BS, Martin SD, Molrine DC, Perlman S, Picard-Fraser PA, Pollard AJ, Qin C, Subbarao K, Cramer JP |title=Consensus summary report for CEPI/BC March 12-13, 2020 meeting: Assessment of risk of disease enhancement with COVID-19 vaccines |journal=Vaccine |volume=38 |issue=31 |pages=4783–4791 |date=June 2020 |pmid=32507409 |pmc=7247514 |doi=10.1016/j.vaccine.2020.05.064}}</ref><ref name="Haynes"/>
      However, {{as of|lc=yes|2022|01|27}} there have been no observed incidences with vaccines for COVID-19 in trials with nonhuman primates, in clinical trials with humans, or following the widespread use of approved vaccines.<ref name="Hotez"/><ref>{{cite news |vauthors=Hackethal V |title=Why ADE Hasn't Been a Problem With COVID Vaccines |url=https://www.medpagetoday.com/special-reports/exclusives/91648 |access-date=1 July 2021 |work=www.medpagetoday.com |date=16 March 2021 |archive-date=25 June 2021 |archive-url=https://web.archive.org/web/20210625153011/https://www.medpagetoday.com/special-reports/exclusives/91648 |url-status=live}}</ref><ref name="Haynes">{{cite journal |last1=Haynes |first1=Barton F. |last2=Corey |first2=Lawrence |last3=Fernandes |first3=Prabhavathi |last4=Gilbert |first4=Peter B. |last5=Hotez |first5=Peter J. |last6=Rao |first6=Srinivas |last7=Santos |first7=Michael R. |last8=Schuitemaker |first8=Hanneke |last9=Watson |first9=Michael |last10=Arvin |first10=Ann |title=Prospects for a safe COVID-19 vaccine |journal=Science Translational Medicine |date=4 November 2020 |volume=12 |issue=568 |article-number=eabe0948 |doi=10.1126/scitranslmed.abe0948 |pmid=33077678 |s2cid=224809822 |issn=1946-6242 |doi-access=free }}</ref>

      ==Trials==
      [[File:Covid vaccine clinical trial, Padjajaran University (cropped).jpg|thumb|Volunteer receives CoronaVac injection during Phase III trial by Sinovac in Indonesia.]]

      In April 2020, the WHO published an "R&D Blueprint (for the) novel Coronavirus" (Blueprint). The Blueprint documented a "large, international, multi-site, individually randomized controlled clinical trial" to allow "the concurrent evaluation of the benefits and risks of each promising candidate vaccine within 3–6 months of it being made available for the trial." The Blueprint listed a ''Global Target Product Profile'' (TPP) for COVID‑19, identifying favorable attributes of safe and effective vaccines under two broad categories: "vaccines for the long-term protection of people at higher risk of COVID‑19, such as healthcare workers", and other vaccines to provide rapid-response immunity for new outbreaks.<ref name="who-accel" /> The international TPP team was formed to 1) assess the development of the most promising candidate vaccines; 2) map candidate vaccines and their clinical trial worldwide, publishing a frequently updated "landscape" of vaccines in development;<ref name="who-tracker">{{cite web|date=10 December 2020|title=Draft landscape of COVID 19 candidate vaccines|url=https://www.who.int/who-documents-detail/draft-landscape-of-covid-19-candidate-vaccines|archive-url=https://web.archive.org/web/20200430153225/https://www.who.int/who-documents-detail/draft-landscape-of-covid-19-candidate-vaccines|url-status=dead|archive-date=30 April 2020|access-date=11 December 2020|publisher=[[World Health Organization]] (WHO)}}</ref> 3) rapidly evaluate and screen for the most promising candidate vaccines simultaneously before they are tested in humans; and 4) design and coordinate a multiple-site, international [[randomized controlled trial]]{{snd}}the "Solidarity trial" for vaccines<ref name="who-accel" /><ref name="solidarity-vacc">{{cite web|date=9 April 2020|title=An international randomised trial of candidate vaccines against COVID-19: Outline of Solidarity vaccine trial|url=https://www.who.int/blueprint/priority-diseases/key-action/Outline_CoreProtocol_vaccine_trial_09042020.pdf|url-status=live|archive-url=https://web.archive.org/web/20200512115627/https://www.who.int/blueprint/priority-diseases/key-action/Outline_CoreProtocol_vaccine_trial_09042020.pdf|archive-date=12 May 2020|access-date=9 May 2020|publisher=[[World Health Organization]] (WHO)}}</ref>{{snd}}to enable simultaneous evaluation of the benefits and risks of different vaccine candidates under clinical trials in countries where there are high rates of COVID‑19 disease, ensuring fast interpretation and sharing of results around the world.<ref name="who-accel" /> The WHO vaccine coalition will prioritize which vaccines should go into Phase II and III clinical trials, and determine harmonized Phase{{nbsp}}III protocols for all vaccines achieving the [[pivotal trial]] stage.<ref name="who-accel" />

      Phase{{nbsp}}I trials test primarily for safety and preliminary dosing in a few dozen healthy subjects, while Phase{{nbsp}}II trials{{snd}}following success in Phase{{nbsp}}I{{snd}}evaluate [[immunogenicity]], dose levels (efficacy based on [[biomarker]]s) and adverse effects of the candidate vaccine, typically in hundreds of people.<ref name="Vaccines.gov">{{cite web|title=Vaccine Safety – Vaccines|url=https://www.vaccines.gov/basics/safety|url-status=live|archive-url=https://web.archive.org/web/20200422073442/https://www.vaccines.gov/basics/safety|archive-date=22 April 2020|access-date=13 April 2020|website=vaccines.gov|publisher=US Department of Health and Human Services}}</ref><ref name="fda-ddp">{{cite web|date=4 January 2018|title=The drug development process|url=https://www.fda.gov/patients/learn-about-drug-and-device-approvals/drug-development-process|url-status=dead|archive-url=https://web.archive.org/web/20200222182002/https://www.fda.gov/patients/learn-about-drug-and-device-approvals/drug-development-process|archive-date=22 February 2020|access-date=12 April 2020|publisher=U.S. [[Food and Drug Administration]] (FDA)}}</ref> A Phase{{nbsp}}I–II trial consists of preliminary safety and immunogenicity testing, is typically randomized, placebo-controlled, while determining more precise, effective doses.<ref name="fda-ddp" /> Phase{{nbsp}}III trials typically involve more participants at multiple sites, include a [[control group]], and test effectiveness of the vaccine to prevent the disease (an "interventional" or [[pivotal trial]]), while monitoring for [[adverse effect]]s at the optimal dose.<ref name="Vaccines.gov" /><ref name="fda-ddp" /> Definition of vaccine safety, efficacy, and [[clinical endpoint]]s in a Phase{{nbsp}}III trial may vary between the trials of different companies, such as defining the degree of side effects, infection or amount of transmission, and whether the vaccine prevents moderate or severe COVID‑19 infection.<ref name="cohen6-19" /><ref name="cdc-eff">{{cite web|date=29 January 2016|title=How flu vaccine effectiveness and efficacy are measured|url=https://www.cdc.gov/flu/vaccines-work/effectivenessqa.htm?CDC_AA_refVal=https%3A%2F%2Fwww.cdc.gov%2Fflu%2Fprofessionals%2Fvaccination%2Feffectivenessqa.htm|url-status=live|archive-url=https://web.archive.org/web/20200507083203/https://www.cdc.gov/flu/vaccines-work/effectivenessqa.htm?CDC_AA_refVal=https%3A%2F%2Fwww.cdc.gov%2Fflu%2Fprofessionals%2Fvaccination%2Feffectivenessqa.htm|archive-date=7 May 2020|access-date=6 May 2020|publisher=Centers for Disease Control and Prevention, National Center for Immunization and Respiratory Diseases, US Department of Health and Human Services}}</ref><ref>{{cite web|date=18 May 2012|title=Principles of epidemiology, Section 8: Concepts of disease occurrence|url=https://www.cdc.gov/csels/dsepd/ss1978/lesson1/section8.html|url-status=live|archive-url=https://web.archive.org/web/20200406212227/https://www.cdc.gov/csels/dsepd/ss1978/lesson1/section8.html|archive-date=6 April 2020|access-date=6 May 2020|publisher=Centers for Disease Control and Prevention, Center for Surveillance, Epidemiology, and Laboratory Services, US Department of Health and Human Services}}</ref> Phase III trials of AstraZeneca's intervention started 28 August 2020 and ended 5 March 2021.<ref name=nct04516746 >{{cite web|last=AstraZeneca|date=12 April 2021|others=Iqvia Pty Ltd|title=A Phase III Randomized, Double-blind, Placebo-controlled Multicenter Study in Adults, to Determine the Safety, Efficacy, and Immunogenicity of AZD1222, a Non-replicating ChAdOx1 Vector Vaccine, for the Prevention of COVID-19|url=https://clinicaltrials.gov/ct2/show/NCT04516746|access-date=11 June 2021|archive-date=23 August 2020|archive-url=https://web.archive.org/web/20200823061231/https://clinicaltrials.gov/ct2/show/NCT04516746|url-status=live}}</ref>

      In January 2022 'Moderna' and 'Pfizer' both started trials of vaccine tailored to immunize against the [[Omicron variant]].<ref>[https://www.theguardian.com/world/live/2022/jan/27/covid-news-live-johnson-vows-to-fight-on-despite-lockdown-party-outrage-moderna-begins-trial-of-omicron-specific-booster-shot Covid news live: England drops all ‘plan B’ restrictions; Moderna begins trial of Omicron-specific booster shot] {{Webarchive|url=https://web.archive.org/web/20220129200903/https://www.theguardian.com/world/live/2022/jan/27/covid-news-live-johnson-vows-to-fight-on-despite-lockdown-party-outrage-moderna-begins-trial-of-omicron-specific-booster-shot |date=29 January 2022 }} ''[[The Guardian]]''</ref>

      ===Enrollment of participants===

      Vaccine developers have to invest resources internationally to find enough participants for Phase{{nbsp}}II–III clinical trials when the virus has proved to be a "[[Moving target indication|moving target]]" of changing transmission rate across and within countries, forcing companies to compete for trial participants.<ref name="cohen6-19">{{cite journal | vauthors = Cohen J | title = Pandemic vaccines are about to face the real test | journal = Science | volume = 368 | issue = 6497 | pages = 1295–1296 | date = June 2020 | pmid = 32554572 | doi = 10.1126/science.368.6497.1295 | doi-access = free | title-link = doi | bibcode = 2020Sci...368.1295C }}</ref> As an example in June, the Chinese vaccine developer Sinovac formed alliances in [[Malaysia]], Canada, the UK, and Brazil among its plans to recruit trial participants and manufacture enough vaccine doses for a possible Phase{{nbsp}}III study in Brazil where COVID‑19 transmission was accelerating during June.<ref name="cohen6-19" /> As the COVID‑19 pandemic within China became more isolated and controlled, Chinese vaccine developers sought international relationships to conduct advanced human studies in several countries, creating competition for trial participants with other manufacturers and the international Solidarity trial organized by the WHO.<ref name="cohen6-19" /> In addition to competition over recruiting participants, clinical trial organizers may encounter people unwilling to be vaccinated due to [[vaccine hesitancy]]<ref name="dube">{{cite journal | vauthors = Dubé E, Laberge C, Guay M, Bramadat P, Roy R, Bettinger J | title = Vaccine hesitancy: an overview | journal = Human Vaccines & Immunotherapeutics | volume = 9 | issue = 8 | pages = 1763–73 | date = August 2013 | pmid = 23584253 | pmc = 3906279 | doi = 10.4161/hv.24657 | doi-access=free | title-link=doi }}</ref> or disbelieving the science of the vaccine technology and its ability to prevent infection.<ref name="howard-cnn">{{cite news |first1=Jacqueline | last1=Howard |first2=Veronica | last2=Stracqualursi |title=Fauci warns of 'anti-science bias' being a problem in US |url=https://www.cnn.com/2020/06/18/politics/anthony-fauci-coronavirus-anti-science-bias/index.html |access-date=21 June 2020 |publisher=CNN |date=18 June 2020 |archive-url=https://web.archive.org/web/20200621003117/https://www.cnn.com/2020/06/18/politics/anthony-fauci-coronavirus-anti-science-bias/index.html |archive-date=21 June 2020 |url-status=live }}</ref>

      Having an insufficient number of skilled team members to administer vaccinations may hinder clinical trials that must overcome risks for trial failure, such as recruiting participants in rural or low-density geographic regions, and variations of age, race, ethnicity, or underlying medical conditions.<ref name="cohen6-19" /><ref name="winter">{{cite journal | vauthors = Winter SS, Page-Reeves JM, Page KA, Haozous E, Solares A, Nicole Cordova C, Larson RS | title = Inclusion of special populations in clinical research: important considerations and guidelines | journal = Journal of Clinical and Translational Research | volume = 4 | issue = 1 | pages = 56–69 | date = May 2018 | pmid = 30873495 | pmc = 6410628 | type = Review }}</ref>

      Eligibility criteria for AstraZeneca's Phase III trial included: Ages, 18 to 130 Years, All Sexes, and Healthy Volunteers.  Inclusion Criteria specified, Increased risk of SARS-CoV-2 infection and medically stable. Exclusion criteria included; 1) confirmed or suspected immunosuppressive or immunodeficient state, 2) significant disease, disorder, or finding, and 3) Prior or concomitant vaccine therapy for COVID‑19.<ref name=nct04516746 />

      ===Adaptive design for the Solidarity trial===
      A clinical trial design in progress may be modified as an [[adaptive design (medicine)|"adaptive design"]] if accumulating data in the trial provide early insights about positive or negative efficacy of the treatment.<ref name="pallmann">{{cite journal|vauthors=Pallmann P, Bedding AW, Choodari-Oskooei B, Dimairo M, Flight L, Hampson LV, Holmes J, Mander AP, Odondi L, Sydes MR, Villar SS, Wason JM, Weir CJ, Wheeler GM, Yap C, Jaki T|date=February 2018|title=Adaptive designs in clinical trials: why use them, and how to run and report them|journal=BMC Medicine|volume=16|issue=1|article-number=29|doi=10.1186/s12916-018-1017-7|pmc=5830330|pmid=29490655 | doi-access=free | title-link=doi}}</ref><ref name="fda-adaptive">{{cite web|date=1 November 2019|title=Adaptive designs for clinical trials of drugs and biologics: Guidance for industry|url=https://www.fda.gov/media/78495/download| format=PDF |url-status=live|archive-url=https://web.archive.org/web/20191213234438/https://www.fda.gov/media/78495/download|archive-date=13 December 2019|access-date=3 April 2020|publisher=U.S. [[Food and Drug Administration]] (FDA)}}</ref> The WHO Solidarity trial of multiple vaccines in clinical studies during 2020, will apply adaptive design to rapidly alter trial parameters across all study sites as results emerge.<ref name="solidarity-vacc" /> Candidate vaccines may be added to the Solidarity trial as they become available if priority criteria are met, while vaccine candidates showing poor evidence of safety or efficacy compared to placebo or other vaccines will be dropped from the international trial.<ref name="solidarity-vacc" />

      Adaptive designs within ongoing Phase{{nbsp}}II–III clinical trials on candidate vaccines may shorten trial durations and use fewer subjects, possibly expediting decisions for early termination or success, avoiding duplication of research efforts, and enhancing coordination of design changes for the Solidarity trial across its international locations.<ref name="solidarity-vacc" /><ref name="pallmann" />

      ===Proposed challenge studies===
      {{main|Human challenge study}}

      [[Human challenge study|Challenge studies]] are a type of clinical trial involving the intentional exposure of the test subject to the condition tested, an approach that can significantly accelerate vaccine development.<ref name="lamb">{{cite journal | vauthors = Lambkin-Williams R, Noulin N, Mann A, Catchpole A, Gilbert AS | title = The human viral challenge model: accelerating the evaluation of respiratory antivirals, vaccines and novel diagnostics | journal = Respiratory Research | volume = 19 | issue = 1 | article-number = 123 | date = June 2018 | pmid = 29929556 | pmc = 6013893 | doi = 10.1186/s12931-018-0784-1 | doi-access=free | title-link=doi }}</ref><ref name="eyal">{{cite journal | vauthors = Eyal N, Lipsitch M, Smith PG | title = Human Challenge Studies to Accelerate Coronavirus Vaccine Licensure | journal = The Journal of Infectious Diseases | volume = 221 | issue = 11 | pages = 1752–1756 | date = May 2020 | pmid = 32232474 | pmc = 7184325 | doi = 10.1093/infdis/jiaa152 | doi-access=free | title-link=doi }}</ref><ref name="callaway">{{cite journal | vauthors = Callaway E | title = Should scientists infect healthy people with the coronavirus to test vaccines? | journal = Nature | volume = 580 | issue = 7801 | page = 17 | date = April 2020 | pmid = 32218549 | doi = 10.1038/d41586-020-00927-3 | doi-access = free | title-link = doi | bibcode = 2020Natur.580...17C }}</ref><ref name="cohen" /> Human challenge studies may be ethically controversial because they involve exposing test subjects to dangers beyond those posed by potential [[side effect]]s of the substance being tested.<ref name="eyal" /><ref name="callaway" /> Challenge studies have been used for diseases less deadly than COVID‑19 infection, such as common influenza, [[typhoid fever]], [[cholera]], and [[malaria]].<ref name="callaway" /><ref name="cohen">{{cite journal|last=Cohen|first=Jon|date=31 March 2020|title=Speed coronavirus vaccine testing by deliberately infecting volunteers? Not so fast, some scientists warn|journal=Science|doi=10.1126/science.abc0006|doi-access=free | title-link=doi}}</ref> The World Health Organization developed a guidance document with criteria for conducting COVID‑19 challenge studies in healthy people, including scientific and ethical evaluation, public consultation and coordination, selection and [[informed consent]] of the participants, and monitoring by independent experts.<ref name="who-challenge">{{cite web|date=6 May 2020|title=Key criteria for the ethical acceptability of COVID-19 human challenge studies|url=https://apps.who.int/iris/bitstream/handle/10665/331976/WHO-2019-nCoV-Ethics_criteria-2020.1-eng.pdf|url-status=live|archive-url=https://web.archive.org/web/20200508153855/https://apps.who.int/iris/bitstream/handle/10665/331976/WHO-2019-nCoV-Ethics_criteria-2020.1-eng.pdf|archive-date=8 May 2020|access-date=12 May 2020|publisher=[[World Health Organization]] (WHO)}}</ref> Beginning in January 2021, dozens of young adult volunteers will be deliberately infected with COVID‑19 in a challenge trial conducted in a London hospital under management by the British government COVID‑19 Vaccine Taskforce.<ref name="call-challenge">{{cite journal | vauthors = Callaway E | title = Dozens to be deliberately infected with coronavirus in UK 'human challenge' trials | journal = Nature | volume = 586 | issue = 7831 | pages = 651–652 | date = October 2020 | pmid = 33082550 | doi = 10.1038/d41586-020-02821-4 | s2cid = 224823112 | doi-access = free | title-link = doi | bibcode = 2020Natur.586..651C }}</ref> Once an infection dose of COVID‑19 is identified, two or more of the candidate COVID‑19 vaccines will be tested for effectiveness in preventing infection.<ref name="call-challenge" />{{Update inline|date=December 2023}}

      == Authorizations and licensure ==
      At the beginning of the COVID‑19 pandemic in 2020, the WHO issued a guideline as an Emergency Use Listing of new vaccines, a process derived from the 2013–16 [[Western African Ebola virus epidemic|Ebola epidemic]].<ref name="who-eul">{{cite press release|title=WHO publishes Emergency Use Listing procedure and roadmap to make new medical products more readily available during health emergencies|url=https://www.who.int/news-room/detail/09-01-2020-emergency-use-listing-procedure-and-roadmap-health-emergencies|publisher=[[World Health Organization]] (WHO)|access-date=23 August 2020|date=9 January 2020|archive-date=29 September 2020|archive-url=https://web.archive.org/web/20200929163733/https://www.who.int/news-room/detail/09-01-2020-emergency-use-listing-procedure-and-roadmap-health-emergencies/|url-status=live}}</ref> It required that a vaccine candidate developed for a life-threatening emergency be manufactured using GMP and that it complete development according to WHO prequalification procedures.<ref name="who-eul" />

      Even as new vaccines are developed during the COVID‑19 pandemic, licensure of COVID‑19 vaccine candidates requires submission of a full dossier of information on development and manufacturing quality. In the UK and the EU, companies may use a "rolling review process", supplying data as they become available during Phase III trials, rather than developing the full documentation over months or years at the end of clinical research, as is typical. This rolling process allows the [[Medicines and Healthcare products Regulatory Agency|UK's regulator (MHRA)]] and the European Committee for Medicinal Products for Human Use to evaluate clinical data in real time, enabling a promising vaccine candidate to be approved on a rapid timeline by both the UK's MHRA and the [[European Medicines Agency]] (EMA).<ref name="ema-eau">{{cite web|year=2020|title=Vaccines: The Emergency Authorisation Procedure|url=https://www.ema.europa.eu/en/authorisation-procedures|url-status=live|archive-url=https://web.archive.org/web/20200924065451/https://www.ema.europa.eu/en/authorisation-procedures|archive-date=24 September 2020|access-date=21 August 2020|publisher=European Medicines Agency}}</ref> A rolling review process for the Moderna vaccine candidate was initiated in October by [[Health Canada]] and the EMA,<ref name="byrne10-19">{{cite web|last1=Byrne|first1=Jane|date=19 October 2020|title=Moderna COVID-19 vaccine under rolling review process in Canada, EU|url=https://www.biopharma-reporter.com/Article/2020/10/19/Moderna-COVID-19-vaccine-under-rolling-review-process-in-Canada-EU|access-date=25 November 2020|publisher=BioPharma-Reporter.com, William Reed Business Media Ltd|archive-date=25 February 2021|archive-url=https://web.archive.org/web/20210225075656/https://www.biopharma-reporter.com/Article/2020/10/19/Moderna-COVID-19-vaccine-under-rolling-review-process-in-Canada-EU|url-status=live}}</ref> and in November in Canada for the Pfizer-BioNTech candidate.<ref name="dangerfield">{{cite news|last1=Dangerfield|first1=Katie|date=20 November 2020|title=Pfizer files for emergency use of coronavirus vaccine in U.S. – what about in Canada?|work=Global News|url=https://globalnews.ca/news/7474273/pfizer-emergency-use-coronavirus-vaccine-canada/|access-date=25 November 2020|archive-date=25 January 2021|archive-url=https://web.archive.org/web/20210125183616/https://globalnews.ca/news/7474273/pfizer-emergency-use-coronavirus-vaccine-canada/|url-status=live}}</ref>

      === Early authorizations in China and Russia ===
      On 24 June 2020, China approved the CanSino vaccine for limited use in the military and two inactivated virus vaccines for emergency use in high-risk occupations.<ref name=":1">{{cite web|date=25 September 2020|title=WHO 'backed China's emergency use' of experimental Covid-19 vaccines|url=https://www.scmp.com/news/china/society/article/3103121/coronavirus-who-backed-chinas-emergency-use-experimental|url-status=live|archive-url=https://web.archive.org/web/20200926111312/https://www.scmp.com/news/china/society/article/3103121/coronavirus-who-backed-chinas-emergency-use-experimental|archive-date=26 September 2020|access-date=26 September 2020|website=South China Morning Post}}</ref> On 11 August 2020, Russia announced the approval of its Sputnik V vaccine for emergency use, though one month later only small amounts of the vaccine had been distributed for use outside of the phase 3 trial.<ref name=":2">{{cite news|last=Kramer|first=Andrew E.|date=19 September 2020|title=Russia Is Slow to Administer Virus Vaccine Despite Kremlin's Approval|work=[[The New York Times]]|url=https://www.nytimes.com/2020/09/19/world/europe/russia-coronavirus-vaccine.html|url-status=live|access-date=28 September 2020|archive-url=https://web.archive.org/web/20200927051731/https://www.nytimes.com/2020/09/19/world/europe/russia-coronavirus-vaccine.html|archive-date=27 September 2020|issn=0362-4331}}</ref> In September, the [[United Arab Emirates]] approved emergency use of the [[Sinopharm BIBP COVID-19 vaccine|Sinopharm BIBP vaccine]] for healthcare workers,<ref>{{cite web|title=Coronavirus: UAE authorises emergency use of vaccine for frontline workers|url=https://www.thenationalnews.com/uae/health/coronavirus-uae-authorises-emergency-use-of-vaccine-for-frontline-workers-1.1077680|access-date=18 November 2020|website=The National|date=14 September 2020|archive-date=2 January 2020|archive-url=https://web.archive.org/web/20200102225119/https://www.thenationalnews.com/uae/health/coronavirus-uae-authorises-emergency-use-of-vaccine-for-frontline-workers-1.1077680|url-status=live}}</ref> followed by similar emergency use approval from [[Bahrain]] in November.<ref>{{cite news|last=Barrington|first=Lisa|date=3 November 2020|title=Bahrain latest country to vaccinate frontline workers with COVID-19 shot|publisher=Reuters|url=https://www.reuters.com/article/health-coronavirus-bahrain-int-idUSKBN27J153|access-date=18 November 2020|archive-date=30 December 2021|archive-url=https://web.archive.org/web/20211230081005/https://www.reuters.com/article/health-coronavirus-bahrain-int-idUSKBN27J153|url-status=live}}</ref>

      === First authorizations of RNA vaccines ===
      In the United States, an [[Emergency Use Authorization]] (EUA) is "a mechanism to facilitate the availability and use of medical countermeasures, including vaccines, during public health emergencies, such as the current COVID‑19 pandemic."<ref name="fda-eua">{{cite web|date=20 November 2020|title=Emergency Use Authorization for Vaccines Explained|url=https://www.fda.gov/vaccines-blood-biologics/vaccines/emergency-use-authorization-vaccines-explained|access-date=20 November 2020|website=U.S. [[Food and Drug Administration]] (FDA)|archive-date=20 November 2020|archive-url=https://web.archive.org/web/20201120184730/https://www.fda.gov/vaccines-blood-biologics/vaccines/emergency-use-authorization-vaccines-explained|url-status=dead}} {{PD-notice}}</ref> Once an EUA is issued by the FDA, the vaccine developer is expected to continue the Phase III clinical trial to finalize safety and efficacy data, leading to application for licensure (approval) in the United States.<ref name="fda-eua" /> In mid-2020, concerns that the FDA might grant a vaccine EUA before full evidence from a Phase III clinical trial was available raised broad concerns about the potential for lowered standards in the face of political pressure.<ref name="malik">{{cite journal | vauthors = Malik AA, McFadden SM, Elharake J, Omer SB | title = Determinants of COVID-19 vaccine acceptance in the US | journal = eClinicalMedicine | volume = 26 | article-number = 100495 | date = September 2020 | pmid = 32838242 | pmc = 7423333 | doi = 10.1016/j.eclinm.2020.100495 | doi-access = free | title-link = doi }}</ref><ref>{{cite web|date=2 July 2020|title=FDA may be risk-averse to grant emergency use for a Covid-19 vaccine; political pressure and hazy EUA standards are factors|work=Clinical Trials Arena |url=https://www.clinicaltrialsarena.com/comment/fda-covid-19-vaccines/|url-status=live|archive-url=https://web.archive.org/web/20200722092820/https://www.clinicaltrialsarena.com/comment/fda-covid-19-vaccines/|archive-date=22 July 2020|access-date=22 August 2020|publisher=ClinicalTrials Arena, Verdict Media, Ltd.| vauthors = Healthcare G }}</ref><ref name="hoffman">{{cite news|last1=Hoffman|first1=Jan|date=18 July 2020|title=Mistrust of a coronavirus vaccine could imperil widespread immunity|work=[[The New York Times]]|url=https://www.nytimes.com/2020/07/18/health/coronavirus-anti-vaccine.html|url-status=live|access-date=23 August 2020|archive-url=https://web.archive.org/web/20200927141245/https://www.nytimes.com/2020/07/18/health/coronavirus-anti-vaccine.html|archive-date=27 September 2020}}</ref> On 8 September 2020, nine leading pharmaceutical companies involved in COVID‑19 vaccine research signed a letter, pledging that they would submit their vaccines for emergency use authorization only after Phase III trials had demonstrated safety and efficacy.<ref>{{cite press release|date=8 September 2020|title=Biopharma Leaders Unite to Stand with Science|url=https://www.businesswire.com/news/home/20200908005282/en/Biopharma-Leaders-Unite-to-Stand-with-Science|access-date=31 December 2020|via=Business Wire|archive-date=1 January 2021|archive-url=https://web.archive.org/web/20210101130111/https://www.businesswire.com/news/home/20200908005282/en/Biopharma-Leaders-Unite-to-Stand-with-Science|url-status=live}}</ref>

      [[File:Pfizer-BioNTech COVID-19 vaccine (2020) G.jpg|thumb|Pfizer-BioNTech COVID-19 vaccine.]]

      The Pfizer-BioNTech partnership submitted an EUA request to the FDA for the mRNA vaccine BNT162b2 (active ingredient [[tozinameran]]) on 20 November 2020.<ref name=":3">{{cite press release|title=Pfizer and BioNTech to Submit Emergency Use Authorization Request Today to the U.S. FDA for COVID-19 Vaccine|website=Pfizer|date=20 November 2020|url=https://www.pfizer.com/news/press-release/press-release-detail/pfizer-and-biontech-submit-emergency-use-authorization|access-date=20 November 2020|archive-date=29 January 2021|archive-url=https://web.archive.org/web/20210129090033/https://www.pfizer.com/news/press-release/press-release-detail/pfizer-and-biontech-submit-emergency-use-authorization|url-status=live}}</ref><ref name=":4">{{cite magazine|last=Park|first=Alice|date=20 November 2020|title=Exclusive: Pfizer CEO Discusses Submitting the First COVID-19 Vaccine Clearance Request to the FDA|magazine=Time|url=https://time.com/5914139/pfizer-covid-19-vaccine-fda-authorization/|access-date=20 November 2020|archive-date=29 January 2021|archive-url=https://web.archive.org/web/20210129054951/https://time.com/5914139/pfizer-covid-19-vaccine-fda-authorization/|url-status=live}}</ref> On 2 December 2020, the United Kingdom's [[Medicines and Healthcare products Regulatory Agency]] (MHRA) gave temporary regulatory approval for the [[Pfizer-BioNTech COVID‑19 vaccine|Pfizer–BioNTech vaccine]],<ref name="MHRA 2020-12-08" /><ref name=":5">{{cite web|date=3 December 2020|title=Conditions of Authorisation for Pfizer/BioNTech COVID-19 vaccine|url=https://www.gov.uk/government/publications/regulatory-approval-of-pfizer-biontech-vaccine-for-covid-19/conditions-of-authorisation-for-pfizerbiontech-covid-19-vaccine|access-date=19 December 2020|website=[[Medicines and Healthcare products Regulatory Agency]] (MHRA)|archive-date=26 February 2021|archive-url=https://web.archive.org/web/20210226081445/https://www.gov.uk/government/publications/regulatory-approval-of-pfizer-biontech-vaccine-for-covid-19/conditions-of-authorisation-for-pfizerbiontech-covid-19-vaccine|url-status=live}}</ref> becoming the first country to approve this vaccine and the first country in the Western world to approve the use of any COVID‑19 vaccine.<ref name="ukgov12-2" /><ref name="mueller" /><ref name=":6">{{cite news|last=Roberts|first=Michelle|date=2 December 2020|title=Covid Pfizer vaccine approved for use next week in UK|website=[[BBC News Online]]|url=https://www.bbc.com/news/health-55145696|access-date=2 December 2020|archive-date=2 December 2020|archive-url=https://web.archive.org/web/20201202070718/https://www.bbc.com/news/health-55145696|url-status=live}}</ref> On 8 December 2020, 90-year-old Margaret Keenan received the vaccine at [[University Hospital Coventry]], becoming the first person known to be vaccinated outside of a trial,<ref>{{cite news|date=8 December 2020|title=Covid-19 vaccine: Margaret Keenan 'so privileged' to get first jab|website=[[BBC News Online]]|url=https://www.bbc.com/news/uk-55227325|access-date=8 December 2020|archive-date=8 December 2020|archive-url=https://web.archive.org/web/20201208085313/https://www.bbc.com/news/uk-55227325|url-status=live}}</ref> as the [[COVID‑19 vaccination programme in the United Kingdom|UK's vaccination programme]] began.<ref>{{cite news|last1=Mueller|first1=Benjamin|date=8 December 2020|title=As U.K. Begins Vaccinations, a Glimpse of Life After Covid|work=[[The New York Times]]|url=https://www.nytimes.com/2020/12/08/world/europe/uk-vaccination-covid-virus.html|access-date=20 December 2020|archive-date=14 December 2020|archive-url=https://web.archive.org/web/20201214030536/https://www.nytimes.com/2020/12/08/world/europe/uk-vaccination-covid-virus.html|url-status=live}}</ref> However, other vaccines had been given earlier in Russia.<ref>{{cite news|date=5 December 2020|title=Covid: Russia begins vaccinations in Moscow|website=[[BBC News Online]]|url=https://www.bbc.com/news/world-europe-55198166|access-date=18 January 2021|archive-date=1 June 2022|archive-url=https://web.archive.org/web/20220601084944/https://www.bbc.com/news/world-europe-55198166|url-status=live}}</ref> On 11 December 2020, the US [[Food and Drug Administration]] (FDA) granted an Emergency Use Authorization (EUA) for the Pfizer-BioNTech vaccine.<ref name="thomas" /><ref name="pmid 33332292">{{cite journal|vauthors=Oliver SE, Gargano JW, Marin M, Wallace M, Curran KG, Chamberland M, McClung N, Campos-Outcalt D, Morgan RL, Mbaeyi S, Romero JR, Talbot HK, Lee GM, Bell BP, Dooling K|date=December 2020|title=The Advisory Committee on Immunization Practices' Interim Recommendation for Use of Pfizer-BioNTech COVID-19 Vaccine – United States, December 2020|url=<!-- official url --> https://www.cdc.gov/mmwr/volumes/69/wr/pdfs/mm6950e2-H.pdf|journal=MMWR. Morbidity and Mortality Weekly Report|volume=69|issue=50|pages=1922–24|doi=10.15585/mmwr.mm6950e2|pmc=7745957|pmid=33332292|doi-access=free|access-date=18 January 2021|archive-date=19 December 2020|archive-url=https://web.archive.org/web/20201219193006/https://www.cdc.gov/mmwr/volumes/69/wr/pdfs/mm6950e2-H.pdf|url-status=live}}</ref> On 19 December 2020, the [[Swissmedic|Swiss Agency for Therapeutic Products (Swissmedic)]] approved the Pfizer-BioNTech vaccine for regular use, two months after receiving the application. This was the first authorization by a [[stringent regulatory authority]] under a standard procedure for any COVID‑19 vaccine.<ref name="Swiss authorization">{{cite press release |title=Swissmedic grants authorisation for the first COVID-19 vaccine in Switzerland |url=https://www.bag.admin.ch/bag/en/home/das-bag/aktuell/medienmitteilungen.msg-id-81761.html |publisher=[[Swissmedic|Swiss Agency for Therapeutic Products (Swissmedic)]] |date=19 December 2020 |access-date=19 December 2020 |archive-date=10 January 2021 |archive-url=https://web.archive.org/web/20210110142826/https://www.bag.admin.ch/bag/en/home/das-bag/aktuell/medienmitteilungen.msg-id-81761.html |url-status=live }}</ref><ref>{{cite press release|title=COVID-19: Switzerland can start vaccinating vulnerable groups already in December|publisher=Swiss Federal Office of Public Health|date=19 December 2020|url=https://www.bag.admin.ch/bag/en/home/das-bag/aktuell/medienmitteilungen.msg-id-81762.html|access-date=19 December 2020|archive-date=9 January 2021|archive-url=https://web.archive.org/web/20210109145748/https://www.bag.admin.ch/bag/en/home/das-bag/aktuell/medienmitteilungen.msg-id-81762.html|url-status=live}}</ref> On 23 December, a 90-year-old [[Lucerne]] resident became the first person to receive the vaccine in continental Europe.<ref>{{cite news|last=Pralong|first=Julien|date=23 December 2020|title=La piqûre de l'espoir pratiquée à Lucerne|newspaper=Heidi.news|url=https://www.heidi.news/sante/la-piqure-de-l-espoir-pratiquee-a-lucerne|access-date=23 December 2020|archive-date=10 January 2021|archive-url=https://web.archive.org/web/20210110142843/https://www.heidi.news/sante/la-piqure-de-l-espoir-pratiquee-a-lucerne|url-status=live}}</ref>

      As of December 2020, many countries and the European Union<ref name="eu vac" /> have authorized or approved the Pfizer-BioNTech COVID‑19 vaccine. [[Bahrain]] and the [[United Arab Emirates]] granted emergency marketing authorization for the [[Sinopharm BIBP COVID-19 vaccine|Sinopharm BIBP vaccine]].<ref name="bna" /><ref name="uae" /> In the United Kingdom, 138,000 people had received the Pfizer-BioNTech COVID‑19 vaccine Comirnaty by 16 December, during the first week of the [[COVID‑19 vaccination programme in the United Kingdom|UK vaccination programme]].<ref name="graun-138">{{cite news|last=Campbell|first=Denis|date=16 December 2020|title=138,000 people in UK receive Covid vaccine in first week|newspaper=[[The Guardian]]|url=https://www.theguardian.com/world/2020/dec/16/138000-people-in-uk-have-received-covid-vaccine|access-date=18 January 2021|archive-date=25 March 2022|archive-url=https://web.archive.org/web/20220325031246/https://www.theguardian.com/world/2020/dec/16/138000-people-in-uk-have-received-covid-vaccine|url-status=live}}</ref> On 18 December 2020, the US FDA granted an EUA for [[mRNA-1273]], the Moderna vaccine.<ref name="FDA PR 20201218">{{cite press release |title=FDA Takes Additional Action in Fight Against COVID-19 By Issuing Emergency Use Authorization for Second COVID-19 Vaccine |url=https://www.fda.gov/news-events/press-announcements/fda-takes-additional-action-fight-against-covid-19-issuing-emergency-use-authorization-second-covid |access-date=18 December 2020 |url-status=dead |archive-url=https://web.archive.org/web/20210317151347/https://www.fda.gov/news-events/press-announcements/fda-takes-additional-action-fight-against-covid-19-issuing-emergency-use-authorization-second-covid |archive-date=17 March 2021 |website=U.S. [[Food and Drug Administration]] (FDA)}}</ref><ref name="CDC ACIP Moderna COVID-19 Vaccine" /><ref name="CNBC 20201219" /> Vaccine manufacturers are awaiting full approvals to name their vaccines.<ref>{{cite web|last=Herper|first=Matthew|date=15 December 2020|title=Inside the frantic and secretive sprint to name the Covid-19 vaccines|url=https://www.statnews.com/2020/12/15/inside-the-frantic-and-secretive-sprint-to-name-the-covid-19-vaccines/|access-date=19 December 2020|website=[[Stat (website)|Stat]]|archive-date=17 December 2020|archive-url=https://web.archive.org/web/20201217092458/https://www.statnews.com/2020/12/15/inside-the-frantic-and-secretive-sprint-to-name-the-covid-19-vaccines/|url-status=live}}</ref><ref>{{cite news|last=Bird|first=Steve|date=14 November 2020|title=Trademark filings offer tantalising glimpse of coronavirus vaccine's name|website=[[The Daily Telegraph]]|url=https://www.telegraph.co.uk/news/2020/11/14/trademark-filings-offer-tantalising-glimpse-coronavirus-vaccines/ |archive-url=https://ghostarchive.org/archive/20220112/https://www.telegraph.co.uk/news/2020/11/14/trademark-filings-offer-tantalising-glimpse-coronavirus-vaccines/ |archive-date=12 January 2022 |url-access=subscription |url-status=live|access-date=19 December 2020}}{{cbignore}}</ref>

      Moderna submitted a request for an EUA for [[mRNA-1273]] to the FDA on 30 November 2020.<ref>{{cite news|date=30 November 2020|title=Moderna Applies for Emergency F.D.A. Approval for Its Coronavirus Vaccine|website=[[The New York Times]]|url=https://www.nytimes.com/2020/11/30/health/covid-vaccine-moderna.html|access-date=30 November 2020|archive-date=30 November 2020|archive-url=https://web.archive.org/web/20201130120251/https://www.nytimes.com/2020/11/30/health/covid-vaccine-moderna.html|url-status=live}}</ref><ref>{{cite press release|title=Moderna Announces Primary Efficacy Analysis in Phase 3 COVE Study for Its COVID-19 Vaccine Candidate and Filing Today with U.S. FDA for Emergency Use Authorization|website=Moderna, Inc.|date=30 November 2020|url=https://investors.modernatx.com/news-releases/news-release-details/moderna-announces-primary-efficacy-analysis-phase-3-cove-study|access-date=30 November 2020|archive-date=30 November 2020|archive-url=https://web.archive.org/web/20201130120119/https://investors.modernatx.com/news-releases/news-release-details/moderna-announces-primary-efficacy-analysis-phase-3-cove-study/|url-status=live}}</ref> On 18 December 2020, the FDA granted an EUA for the Moderna vaccine.<ref name="FDA PR 20201218" /><ref name="CDC ACIP Moderna COVID-19 Vaccine" /><ref name="CNBC 20201219" />

      === United Kingdom ===
      The UK [[Medicines and Healthcare products Regulatory Agency]] (MHRA) gave the first approval to the [[AZD1222|Oxford/AstraZeneca vaccine]] on 30 December 2020, as its second vaccine to enter the [[COVID‑19 vaccination programme in the United Kingdom|national rollout]] under a conditional and temporary authorization to supply.<ref>{{cite web|date=30 December 2020|title=Oxford University/AstraZeneca vaccine authorised by UK medicines regulator|url=https://www.gov.uk/government/news/oxford-universityastrazeneca-vaccine-authorised-by-uk-medicines-regulator|access-date=30 December 2020|website=Gov.uk|publisher=Department of Health and Social Care|archive-date=16 March 2021|archive-url=https://web.archive.org/web/20210316110433/https://www.gov.uk/government/news/oxford-universityastrazeneca-vaccine-authorised-by-uk-medicines-regulator|url-status=live}}</ref><ref>{{cite web | title=Information for Healthcare Professionals on COVID-19 Vaccine AstraZeneca | website=[[Medicines and Healthcare products Regulatory Agency]] (MHRA) | date=30 December 2020 | url=https://www.gov.uk/government/publications/regulatory-approval-of-covid-19-vaccine-astrazeneca/information-for-healthcare-professionals-on-covid-19-vaccine-astrazeneca | access-date=4 January 2021 | archive-date=9 March 2021 | archive-url=https://web.archive.org/web/20210309021747/https://www.gov.uk/government/publications/regulatory-approval-of-covid-19-vaccine-astrazeneca/information-for-healthcare-professionals-on-covid-19-vaccine-astrazeneca | url-status=live }}</ref><ref>{{cite web | title=Conditions of Authorisation for COVID-19 Vaccine AstraZeneca | website=[[Medicines and Healthcare products Regulatory Agency]] (MHRA) | date=30 December 2020 | url=https://www.gov.uk/government/publications/regulatory-approval-of-covid-19-vaccine-astrazeneca/conditions-of-authorisation-for-covid-19-vaccine-astrazeneca | access-date=4 January 2021 | archive-date=18 February 2021 | archive-url=https://web.archive.org/web/20210218150944/https://www.gov.uk/government/publications/regulatory-approval-of-covid-19-vaccine-astrazeneca/conditions-of-authorisation-for-covid-19-vaccine-astrazeneca | url-status=live }}</ref>

      In November 2021, the full nucleotide sequences of the AstraZeneca and Pfizer/BioNTech vaccines were released by the UK [[Medicines and Healthcare products Regulatory Agency]] in response to a [[Freedom of Information Act 2000|freedom of information]] request.<ref>{{cite Q|Q109371097}}</ref><ref name="Taylor">{{cite web |date=2 November 2021 |title=Sequences of Covid-19 vaccines released via WhatDoTheyKnow |url=https://www.mysociety.org/2021/11/02/sequences-of-covid-19-vaccines-released-via-whatdotheyknow/ |url-status=live |archive-url=https://web.archive.org/web/20211105153752/https://www.mysociety.org/2021/11/02/sequences-of-covid-19-vaccines-released-via-whatdotheyknow/ |archive-date=5 November 2021 |access-date=2 November 2021 |publisher=[[mySociety]] |vauthors=Taylor R}}</ref>

      === Australia ===
      In October 2020, the Australian [[Therapeutic Goods Administration]] (TGA) granted provisional determinations to AstraZeneca Pty Ltd in relation to its COVID‑19 vaccine, ChAdOx1-S [recombinant] and to Pfizer Australia Pty Ltd in relation to its COVID‑19 vaccine, [[tozinameran|BNT162b2]] [mRNA].<ref>{{cite web|date=9 October 2020|title=TGA grants provisional determination for COVID-19 vaccine|url=https://www.tga.gov.au/tga-grants-provisional-determination-covid-19-vaccine|url-status=live|archive-url=https://web.archive.org/web/20201029084751/https://www.tga.gov.au/tga-grants-provisional-determination-covid-19-vaccine|archive-date=29 October 2020|access-date=25 October 2020|website=[[Therapeutic Goods Administration]] (TGA)}}</ref><ref>{{cite web|date=14 October 2020|title=TGA grants second provisional determination for a COVID-19 vaccine|url=https://www.tga.gov.au/tga-grants-second-provisional-determination-covid-19-vaccine|url-status=live|archive-url=https://web.archive.org/web/20201028231829/https://www.tga.gov.au/tga-grants-second-provisional-determination-covid-19-vaccine|archive-date=28 October 2020|access-date=25 October 2020|website=[[Therapeutic Goods Administration]] (TGA)}}</ref> Janssen Cilag Pty Ltd was granted a provisional determination in relation to its COVID‑19 vaccine, Ad26.COV2.S, in November 2020.<ref>{{cite web|date=16 November 2020|title=TGA grants third provisional determination for a COVID-19 vaccine|url=https://www.tga.gov.au/tga-grants-third-provisional-determination-covid-19-vaccine|access-date=19 December 2020|website=Therapeutic Goods Administration (TGA)|archive-date=16 January 2021|archive-url=https://web.archive.org/web/20210116055226/https://www.tga.gov.au/tga-grants-third-provisional-determination-covid-19-vaccine|url-status=live}}</ref>

      On 24 January 2021, the TGA granted provisional approval to Pfizer Australia Pty Ltd for [[Comirnaty]].<ref>{{cite web|title=Comirnaty|url=https://www.tga.gov.au/apm-summary/comirnaty|access-date=25 January 2021|website=Therapeutic Goods Administration|date=25 January 2021|archive-date=1 February 2021|archive-url=https://web.archive.org/web/20210201143845/https://www.tga.gov.au/apm-summary/comirnaty|url-status=live}}</ref><ref>{{cite press release | title=TGA provisionally approves Pfizer COVID-19 vaccine | website=[[Therapeutic Goods Administration]] (TGA) | date=25 January 2021 | url=https://www.tga.gov.au/media-release/tga-provisionally-approves-pfizer-covid-19-vaccine | access-date=25 January 2021 | archive-date=26 January 2021 | archive-url=https://web.archive.org/web/20210126071449/https://www.tga.gov.au/media-release/tga-provisionally-approves-pfizer-covid-19-vaccine | url-status=live }}</ref><ref>{{cite web | title=Comirnaty (BNT162b2 [mRNA]) COVID‑19 Vaccine Product Information | website=[[Therapeutic Goods Administration]] (TGA) | url=https://www.ebs.tga.gov.au/ebs/picmi/picmirepository.nsf/pdf?OpenAgent&id=CP-2021-PI-01092-1 | format=PDF | access-date=25 January 2021 | archive-date=2 February 2021 | archive-url=https://web.archive.org/web/20210202073852/https://www.ebs.tga.gov.au/ebs/picmi/picmirepository.nsf/pdf?OpenAgent&id=CP-2021-PI-01092-1 | url-status=live }}</ref><ref>{{cite report | url=https://www.tga.gov.au/sites/default/files/auspar-bnt162b2-mrna-210125.pdf | title=Australian Public Assessment Report for BNT162b2 (mRNA) | publisher=[[Therapeutic Goods Administration]] (TGA) | access-date=25 January 2021 | date= | archive-date=26 January 2021 | archive-url=https://web.archive.org/web/20210126144716/https://www.tga.gov.au/sites/default/files/auspar-bnt162b2-mrna-210125.pdf | url-status=live }}</ref>

      On 24 June 2021, the TGA granted provisional determination to Moderna Australia Pty Ltd for [[Elasomeran]].<ref>{{cite web|title=Elasomeran|url=https://www.tga.gov.au/media-release/tga-grants-provisional-determination-moderna-covid-19-vaccine-elasomeran|access-date=18 August 2021|website=Therapeutic Goods Administration|date=24 June 2021|archive-date=27 June 2021|archive-url=https://web.archive.org/web/20210627231258/https://www.tga.gov.au/media-release/tga-grants-provisional-determination-moderna-covid-19-vaccine-elasomeran|url-status=live}}</ref>

      === European Union ===
      In October 2020, the [[Committee for Medicinal Products for Human Use]] (CHMP) of the [[European Medicines Agency]] (EMA) started 'rolling reviews' of the vaccines known as ''COVID‑19 Vaccine AstraZeneca'' (ChAdOx1-SARS-CoV-2) and ''Pfizer-BioNTech COVID‑19 Vaccine'' ([[tozinameran|BNT162b2]]).<ref>{{cite press release|title=EMA starts first rolling review of a COVID-19 vaccine in the EU|publisher=[[European Medicines Agency]] (EMA)|date=1 October 2020|url=https://www.ema.europa.eu/en/news/ema-starts-first-rolling-review-covid-19-vaccine-eu|access-date=1 October 2020|archive-date=1 October 2020|archive-url=https://web.archive.org/web/20201001133534/https://www.ema.europa.eu/en/news/ema-starts-first-rolling-review-covid-19-vaccine-eu|url-status=live}}</ref><ref>{{cite web|date=14 September 2020|title=COVID-19 vaccines: key facts|url=https://www.ema.europa.eu/en/human-regulatory/overview/public-health-threats/coronavirus-disease-covid-19/covid-19-vaccines-key-facts|url-status=live|archive-url=https://web.archive.org/web/20201007191041/https://www.ema.europa.eu/en/human-regulatory/overview/public-health-threats/coronavirus-disease-covid-19/covid-19-vaccines-key-facts|archive-date=7 October 2020|access-date=1 October 2020|publisher=[[European Medicines Agency]] (EMA)}}</ref><ref>{{cite press release|title=EMA starts second rolling review of a COVID-19 vaccine|publisher=[[European Medicines Agency]] (EMA)|date=5 October 2020|url=https://www.ema.europa.eu/en/news/ema-starts-second-rolling-review-covid-19-vaccine|access-date=6 October 2020|archive-date=6 October 2020|archive-url=https://web.archive.org/web/20201006091919/https://www.ema.europa.eu/en/news/ema-starts-second-rolling-review-covid-19-vaccine|url-status=live}}</ref> The EMA released an update on the status of its rolling review of the COVID‑19 Vaccine AstraZeneca in December 2020, after the UK granted a temporary authorization of supply for the vaccine.<ref>{{cite press release|title=Update on rolling review of AstraZeneca's COVID-19 vaccine|publisher=[[European Medicines Agency]] (EMA)|date=30 December 2020|url=https://www.ema.europa.eu/en/news/update-rolling-review-astrazenecas-covid-19-vaccine|access-date=30 December 2020|archive-date=30 December 2020|archive-url=https://web.archive.org/web/20201230170518/https://www.ema.europa.eu/en/news/update-rolling-review-astrazenecas-covid-19-vaccine|url-status=live}}</ref>

      In November 2020, the EMA published a safety monitoring plan and guidance on risk management planning (RMP) for COVID‑19 vaccines.<ref name="EMA PR 20201113">{{cite press release|title=EMA publishes safety monitoring plan and guidance on risk management planning for COVID-19 vaccines|publisher=[[European Medicines Agency]] (EMA)|date=13 November 2020|url=https://www.ema.europa.eu/en/news/ema-publishes-safety-monitoring-plan-guidance-risk-management-planning-covid-19-vaccines|access-date=13 November 2020|archive-date=13 November 2020|archive-url=https://web.archive.org/web/20201113135029/https://www.ema.europa.eu/en/news/ema-publishes-safety-monitoring-plan-guidance-risk-management-planning-covid-19-vaccines|url-status=live}} Text was copied from this source which is copyright European Medicines Agency. Reproduction is authorized provided the source is acknowledged.</ref> The plan outlines how relevant new information emerging after the authorization and uptake of COVID‑19 vaccines in the pandemic situation will be collected and promptly reviewed.<ref name="EMA PR 20201113" /> All RMPs for COVID‑19 vaccines will be published on the EMA's website.<ref name="EMA PR 20201113" /> The EMA published guidance for developers of potential COVID‑19 vaccines on the clinical evidence to include in marketing authorization applications.<ref>{{cite web|date=19 November 2020|title=EMA considerations on COVID-19 vaccine approval|url=https://www.ema.europa.eu/en/ema-considerations-covid-19-vaccine-approval|access-date=19 November 2020|publisher=[[European Medicines Agency]] (EMA)|archive-date=19 November 2020|archive-url=https://web.archive.org/web/20201119153506/https://www.ema.europa.eu/en/ema-considerations-covid-19-vaccine-approval|url-status=live}}</ref>

      In November 2020, the CHMP started a rolling review of the Moderna vaccine for COVID‑19 known as mRNA-1273.<ref>{{cite press release|title=EMA starts rolling review of mRNA COVID-19 vaccine by Moderna Biotech Spain, S.L.|publisher=[[European Medicines Agency]] (EMA)|date=16 November 2020|url=https://www.ema.europa.eu/en/news/ema-starts-rolling-review-mrna-covid-19-vaccine-moderna-biotech-spain-sl|access-date=16 November 2020|archive-date=16 November 2020|archive-url=https://web.archive.org/web/20201116111440/https://www.ema.europa.eu/en/news/ema-starts-rolling-review-mrna-covid-19-vaccine-moderna-biotech-spain-sl|url-status=live}}</ref>

      In December 2020, the EMA received application for conditional marketing authorizations (CMA) for the mRNA vaccines ''BNT162b2'' and ''mRNA1273'' (''Moderna Covid‑19 vaccine'').<ref name="EMA mRNA1273 application">{{cite press release|title=EMA receives application for conditional marketing authorisation of Moderna COVID-19 vaccine|publisher=[[European Medicines Agency]] (EMA)|date=1 December 2020|url=https://www.ema.europa.eu/en/news/ema-receives-application-conditional-marketing-authorisation-moderna-covid-19-vaccine|access-date=1 December 2020|archive-date=1 December 2020|archive-url=https://web.archive.org/web/20201201113820/https://www.ema.europa.eu/en/news/ema-receives-application-conditional-marketing-authorisation-moderna-covid-19-vaccine|url-status=live}}</ref><ref name="EMA BNT162b2 application">{{cite press release|title=EMA receives application for conditional marketing authorisation of COVID-19 mRNA vaccine BNT162b2|publisher=[[European Medicines Agency]] (EMA)|date=1 December 2020|url=https://www.ema.europa.eu/en/news/ema-receives-application-conditional-marketing-authorisation-covid-19-mrna-vaccine-bnt162b2|access-date=1 December 2020|archive-date=1 December 2020|archive-url=https://web.archive.org/web/20201201110859/https://www.ema.europa.eu/en/news/ema-receives-application-conditional-marketing-authorisation-covid-19-mrna-vaccine-bnt162b2|url-status=live}}</ref> The assessments of the vaccines are scheduled to proceed under accelerated timelines with the possibility of opinions issued within weeks.<ref name="EMA mRNA1273 application" /><ref name="EMA BNT162b2 application" /><ref>{{cite press release|title=Update on assessment of the BioNTech and Pfizer BNT162b2 vaccine marketing authorisation application|publisher=[[European Medicines Agency]] (EMA)|date=15 December 2020|url=https://www.ema.europa.eu/en/news/update-assessment-biontech-pfizer-bnt162b2-vaccine-marketing-authorisation-application|access-date=15 December 2020|archive-date=15 December 2020|archive-url=https://web.archive.org/web/20201215132453/https://www.ema.europa.eu/en/news/update-assessment-biontech-pfizer-bnt162b2-vaccine-marketing-authorisation-application|url-status=live}}</ref><ref>{{cite press release|title=Update on assessment of marketing authorisation application for Moderna's mRNA-1273 COVID-19 vaccine|publisher=[[European Medicines Agency]] (EMA)|date=17 December 2020|url=https://www.ema.europa.eu/en/news/update-assessment-marketing-authorisation-application-modernas-mrna-1273-covid-19-vaccine|access-date=17 December 2020|archive-date=17 December 2020|archive-url=https://web.archive.org/web/20201217172216/https://www.ema.europa.eu/en/news/update-assessment-marketing-authorisation-application-modernas-mrna-1273-covid-19-vaccine|url-status=live}}</ref>

      In December 2020, the CHMP started a rolling review of the Ad26.COV2.S COVID‑19 vaccine from Janssen-Cilag International N.V.<ref name="EU Ad26.COV2.S rolling review">{{cite press release|title=EMA starts rolling review of Janssen's COVID-19 vaccine Ad26.COV2.S|publisher=[[European Medicines Agency]] (EMA)|date=1 December 2020|url=https://www.ema.europa.eu/en/news/ema-starts-rolling-review-janssens-covid-19-vaccine-ad26cov2s|access-date=1 December 2020|archive-date=8 January 2021|archive-url=https://web.archive.org/web/20210108120428/https://www.ema.europa.eu/en/news/ema-starts-rolling-review-janssens-covid-19-vaccine-ad26cov2s|url-status=live}}</ref>

      On 21 December 2020, the CHMP recommended granting a conditional marketing authorization for the Pfizer-BioNTech COVID‑19 vaccine, Comirnaty (active ingredient tozinameran), developed by BioNTech and Pfizer.<ref name="EU PR 20201221">{{cite press release|title=EMA recommends first COVID-19 vaccine for authorisation in the EU|publisher=[[European Medicines Agency]] (EMA)|date=21 December 2020|url=https://www.ema.europa.eu/en/news/ema-recommends-first-covid-19-vaccine-authorisation-eu|access-date=21 December 2020|archive-date=30 January 2021|archive-url=https://web.archive.org/web/20210130114031/https://www.ema.europa.eu/en/news/ema-recommends-first-covid-19-vaccine-authorisation-eu|url-status=live}}</ref><ref name="Comirnaty EPAR">{{cite web | title=Comirnaty EPAR | date=21 December 2020 | publisher=[[European Medicines Agency]] (EMA) | url=https://www.ema.europa.eu/en/medicines/human/EPAR/comirnaty | access-date=23 December 2020 | archive-date=24 January 2022 | archive-url=https://web.archive.org/web/20220124183403/https://www.ema.europa.eu/en/medicines/human/EPAR/comirnaty | url-status=live }}</ref><ref name="eu vac" /> The recommendation was accepted by the [[European Commission]] the same day.<ref name="EU PR 20201221" /><ref name="EU statement">{{cite web|title=Statement by President von der Leyen on the marketing authorisation of the BioNTech-Pfizer vaccine against COVID-19|url=https://ec.europa.eu/commission/presscorner/detail/en/statement_20_2510|access-date=21 December 2020|website=[[European Commission]]|archive-date=11 January 2021|archive-url=https://web.archive.org/web/20210111180445/https://ec.europa.eu/commission/presscorner/detail/en/STATEMENT_20_2510|url-status=live}}</ref><ref>{{cite web | title=Comirnaty | website=Union Register of medicinal products | url=https://ec.europa.eu/health/documents/community-register/html/h1528.htm | access-date=29 January 2021 | archive-date=24 January 2021 | archive-url=https://web.archive.org/web/20210124174708/https://ec.europa.eu/health/documents/community-register/html/h1528.htm | url-status=live }}</ref><ref name="doi 10.1016/s0140-6736(21)00085-4">{{cite journal | vauthors = Cavaleri M, Enzmann H, Straus S, Cooke E | title = The European Medicines Agency's EU conditional marketing authorisations for COVID-19 vaccines | journal = Lancet | volume = 397 | issue = 10272 | pages = 355–357 | date = January 2021 | pmid = 33453149 | pmc = 7833511 | doi = 10.1016/s0140-6736(21)00085-4 |issn=0140-6736 | doi-access = free | title-link = doi }}</ref>

      On 6 January 2021, the CHMP recommended granting a conditional marketing authorization for COVID-19 Vaccine Moderna<ref name="COVID-19 Vaccine Moderna EPAR">{{cite web | title=COVID-19 Vaccine Moderna EPAR | date=4 January 2021 | publisher=[[European Medicines Agency]] (EMA) | url=https://www.ema.europa.eu/en/medicines/human/EPAR/covid-19-vaccine-moderna | access-date=20 January 2021 | archive-date=12 March 2021 | archive-url=https://web.archive.org/web/20210312110546/https://www.ema.europa.eu/en/medicines/human/EPAR/covid-19-vaccine-moderna | url-status=live }}</ref><ref>{{cite press release|date=6 January 2021|title=EMA recommends COVID-19 Vaccine Moderna for authorisation in the EU|url=https://www.ema.europa.eu/en/news/ema-recommends-covid-19-vaccine-moderna-authorisation-eu|access-date=6 January 2021|publisher=European Medicines Agency|archive-date=17 March 2021|archive-url=https://web.archive.org/web/20210317053609/https://www.ema.europa.eu/en/news/ema-recommends-covid-19-vaccine-moderna-authorisation-eu|url-status=live}}</ref> and the recommendation was accepted by the European Commission the same day.<ref name="doi 10.1016/s0140-6736(21)00085-4" /><ref>{{cite press release|title=European Commission authorises second safe and effective vaccine against COVID-19|url=https://ec.europa.eu/commission/presscorner/detail/en/ip_21_3|access-date=6 January 2021|website=[[European Commission]]|archive-date=20 January 2021|archive-url=https://web.archive.org/web/20210120020809/https://ec.europa.eu/commission/presscorner/detail/en/ip_21_3|url-status=live}}</ref><ref>{{cite web | title=COVID-19 Vaccine Moderna | website=Union Register of medicinal products | url=https://ec.europa.eu/health/documents/community-register/html/h1507.htm | access-date=14 January 2021 | archive-date=24 January 2021 | archive-url=https://web.archive.org/web/20210124200938/https://ec.europa.eu/health/documents/community-register/html/h1507.htm | url-status=live }}</ref>

      In January 2021, the EMA received an application for conditional marketing authorization (CMA) for the COVID‑19 vaccine known as ''[[AZD1222|COVID‑19 Vaccine AstraZeneca]]'', developed by AstraZeneca and Oxford University.<ref>{{cite news|date=12 January 2021|title=EMA receives application for conditional marketing authorisation of COVID-19 Vaccine AstraZeneca|publisher=[[European Medicines Agency]] (EMA)|url=https://www.ema.europa.eu/en/news/ema-receives-application-conditional-marketing-authorisation-covid-19-vaccine-astrazeneca|access-date=12 January 2021|archive-date=30 March 2021|archive-url=https://web.archive.org/web/20210330170415/https://www.ema.europa.eu/en/news/ema-receives-application-conditional-marketing-authorisation-covid-19-vaccine-astrazeneca|url-status=live}}</ref> On 29 January 2021, the CHMP recommended granting the conditional marketing authorization<ref>{{cite web | title=COVID-19 Vaccine AstraZeneca | publisher=[[European Medicines Agency]] (EMA) | date=28 January 2021 | url=https://www.ema.europa.eu/en/medicines/human/summaries-opinion/covid-19-vaccine-astrazeneca | access-date=29 January 2021 | archive-date=16 February 2021 | archive-url=https://web.archive.org/web/20210216232934/https://www.ema.europa.eu/en/medicines/human/summaries-opinion/covid-19-vaccine-astrazeneca | url-status=live }}</ref><ref>{{cite press release | title=EMA recommends COVID-19 Vaccine AstraZeneca for authorisation in the EU | publisher=[[European Medicines Agency]] (EMA) | date=29 January 2021 | url=https://www.ema.europa.eu/en/news/ema-recommends-covid-19-vaccine-astrazeneca-authorisation-eu | access-date=29 January 2021 | archive-date=9 February 2021 | archive-url=https://web.archive.org/web/20210209112216/https://www.ema.europa.eu/en/news/ema-recommends-covid-19-vaccine-astrazeneca-authorisation-eu | url-status=live }}</ref> and the recommendation was accepted by the European Commission the same day.<ref>{{cite press release | title=European Commission authorises third safe and effective vaccine against COVID-19 | website=European Commission | url=https://ec.europa.eu/commission/presscorner/detail/en/ip_21_306 | access-date=29 January 2021 | archive-date=10 February 2021 | archive-url=https://web.archive.org/web/20210210101544/https://ec.europa.eu/commission/presscorner/detail/en/ip_21_306 | url-status=live }}</ref><ref>{{cite web | title=COVID-19 Vaccine AstraZeneca | website=Union Register of medicinal products | url=https://ec.europa.eu/health/documents/community-register/html/h1529.htm | access-date=29 January 2021 | archive-date=26 March 2021 | archive-url=https://web.archive.org/web/20210326062904/https://ec.europa.eu/health/documents/community-register/html/h1529.htm | url-status=live }}</ref>

      In February 2021, the CHMP started a rolling review of [[NVX-CoV2373]], a COVID‑19 vaccine being developed by Novavax CZ AS (a subsidiary of Novavax, Inc.)<ref>{{cite web | title=EMA starts rolling review of Novavax's COVID-19 vaccine (NVX-CoV2373) | publisher=[[European Medicines Agency]] (EMA) | date=3 February 2021 | url=https://www.ema.europa.eu/en/news/ema-starts-rolling-review-novavaxs-covid-19-vaccine-nvx-cov2373 | access-date=3 February 2021 | archive-date=2 July 2021 | archive-url=https://web.archive.org/web/20210702100918/https://www.ema.europa.eu/en/news/ema-starts-rolling-review-novavaxs-covid-19-vaccine-nvx-cov2373 | url-status=live }} Text was copied from this source which is copyright European Medicines Agency. Reproduction is authorized provided the source is acknowledged.</ref> and a rolling review of [[CVnCoV]], a COVID‑19 vaccine being developed by CureVac AG.<ref>{{cite press release | title=EMA starts rolling review of CureVac's COVID-19 vaccine (CVnCoV) | publisher=[[European Medicines Agency]] (EMA) | date=11 February 2021 | url=https://www.ema.europa.eu/en/news/ema-starts-rolling-review-curevacs-covid-19-vaccine-cvncov | access-date=12 February 2021 | archive-date=12 February 2021 | archive-url=https://web.archive.org/web/20210212100844/https://www.ema.europa.eu/en/news/ema-starts-rolling-review-curevacs-covid-19-vaccine-cvncov | url-status=live }}</ref>

      In February 2021, the EMA announced that they are developing vaccine guidance to address the [[Variants of SARS-CoV-2|virus variants]].<ref>{{cite press release | title=EMA preparing guidance to tackle COVID-19 variants | publisher=[[European Medicines Agency]] (EMA) | date=10 February 2021 | url=https://www.ema.europa.eu/en/news/ema-preparing-guidance-tackle-covid-19-variants | access-date=10 February 2021 | archive-date=15 February 2021 | archive-url=https://web.archive.org/web/20210215211006/https://www.ema.europa.eu/en/news/ema-preparing-guidance-tackle-covid-19-variants | url-status=live }}</ref>

      In February 2021, the EMA received an application for conditional marketing authorization (CMA) for the [[Janssen COVID-19 vaccine|COVID-19 Vaccine Janssen]] developed by Janssen-Cilag International N.V.<ref>{{cite web | title=EMA receives application for conditional marketing authorisation of COVID-19 Vaccine Janssen | publisher=[[European Medicines Agency]] (EMA) | date=16 February 2021 | url=https://www.ema.europa.eu/en/news/ema-receives-application-conditional-marketing-authorisation-covid-19-vaccine-janssen | access-date=16 February 2021 | archive-date=16 February 2021 | archive-url=https://web.archive.org/web/20210216152545/https://www.ema.europa.eu/en/news/ema-receives-application-conditional-marketing-authorisation-covid-19-vaccine-janssen | url-status=live }}</ref> The EMA recommended a conditional marketing authorization of the COVID-19 Vaccine Janssen on 11 March 2021,<ref>{{cite web | title=COVID-19 Vaccine Janssen EPAR | website=[[European Medicines Agency]] (EMA) | date=5 March 2021 | url=https://www.ema.europa.eu/en/medicines/human/EPAR/covid-19-vaccine-janssen | access-date=11 July 2021 | archive-date=15 March 2021 | archive-url=https://web.archive.org/web/20210315172052/https://www.ema.europa.eu/en/medicines/human/EPAR/covid-19-vaccine-janssen | url-status=live }}</ref><ref>{{cite press release | title=EMA recommends COVID-19 Vaccine Janssen for authorisation in the EU | website=[[European Medicines Agency]] (EMA) | date=11 March 2021 | url=https://www.ema.europa.eu/en/news/ema-recommends-covid-19-vaccine-janssen-authorisation-eu | access-date=11 July 2021 | archive-date=11 March 2021 | archive-url=https://web.archive.org/web/20210311132445/https://www.ema.europa.eu/en/news/ema-recommends-covid-19-vaccine-janssen-authorisation-eu | url-status=live }}</ref> and it was accepted by the European Commission the same day.<ref>{{cite press release | title=European Commission authorises fourth safe and effective vaccine against COVID-19 | website=European Commission | url=https://ec.europa.eu/commission/presscorner/home/en | access-date=11 July 2021 | archive-date=25 August 2020 | archive-url=https://web.archive.org/web/20200825095835/https://ec.europa.eu/commission/presscorner/home/en | url-status=live }}</ref>

      In March 2021, the CHMP started a rolling review of [[Sputnik V]] (Gam-COVID-Vac).<ref name="Sputnik V rolling review" /> The EU applicant is R-Pharm Germany GmbH.<ref name="Sputnik V rolling review">{{cite press release | title=EMA starts rolling review of the Sputnik V COVID-19 vaccine | publisher=[[European Medicines Agency]] (EMA) | date=4 March 2021 | url=https://www.ema.europa.eu/en/news/ema-starts-rolling-review-sputnik-v-covid-19-vaccine | access-date=4 March 2021 | archive-date=4 March 2021 | archive-url=https://web.archive.org/web/20210304100908/https://www.ema.europa.eu/en/news/ema-starts-rolling-review-sputnik-v-covid-19-vaccine | url-status=live }}</ref>

      In May 2021, the CMMP started evaluating the use of Comirnaty to include young people aged 12 to 15,<ref>{{cite press release | title=EMA starts evaluating use of COVID-19 vaccine Comirnaty in young people aged 12 to 15 | website=[[European Medicines Agency]] (EMA) | date=3 May 2021 | url=https://www.ema.europa.eu/en/news/ema-starts-evaluating-use-covid-19-vaccine-comirnaty-young-people-aged-12-15 | access-date=7 May 2021 | archive-date=7 May 2021 | archive-url=https://web.archive.org/web/20210507080012/https://www.ema.europa.eu/en/news/ema-starts-evaluating-use-covid-19-vaccine-comirnaty-young-people-aged-12-15 | url-status=live }}</ref> and it started a rolling review of [[Sinovac COVID-19 Vaccine]].<ref name="Sinovac rolling review" /> The EU applicant for Sinovac is Life'On S.r.l.<ref name="Sinovac rolling review">{{cite press release | title=EMA starts rolling review of COVID-19 Vaccine (Vero Cell) Inactivated | website=[[European Medicines Agency]] (EMA) | date=4 May 2021 | url=https://www.ema.europa.eu/en/news/ema-starts-rolling-review-covid-19-vaccine-vero-cell-inactivated | access-date=7 May 2021 | archive-date=4 May 2021 | archive-url=https://web.archive.org/web/20210504090527/https://www.ema.europa.eu/en/news/ema-starts-rolling-review-covid-19-vaccine-vero-cell-inactivated | url-status=live }}</ref>

