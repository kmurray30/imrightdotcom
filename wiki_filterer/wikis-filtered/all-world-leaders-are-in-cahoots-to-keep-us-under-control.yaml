      * Geoffrey Allen Pigman (2007). ''The World Economic Forum: A Multi-Stakeholder Approach to Global Governance''. London; New York: [[Routledge]]. {{ISBN|978-0-415-70204-1}}. 175 pages.
      * [[David Rothkopf|Rothkopf, David J.]] (2008). ''Superclass: The Global Power Elite and the World They Are Making''. New York: [[Farrar, Straus and Giroux]]. {{ISBN|978-0-374-27210-4}}. 376 pages.
      * [[Klaus Schwab|Schwab, Klaus M.]]; Hein Kroos (1971). ''Moderne Unternehmensführung im Maschinenbau''. Frankfurt: Verein Dt. Maschinenbau-Anst. e.V. Maschinenbau-Verl. {{OCLC|256314575}}.
