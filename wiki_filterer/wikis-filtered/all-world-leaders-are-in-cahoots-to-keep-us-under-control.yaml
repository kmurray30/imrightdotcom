      === Dependent territories of EU member states not part of the EU ===
      Three French [[International status and usage of the euro#Dependent territories outside the EU|dependent territories that are not part of the EU]] have adopted the euro, with France ensuring eurozone laws are implemented:
      * [[Territorial collectivity of Saint Barthélemy]] 
      * [[Overseas Collectivity of Saint-Pierre and Miquelon]]
      * [[French Southern and Antarctic Lands]]

      === Non-member usage ===
      {{Further|International status and usage of the euro}}
      {{Euro accession map}}

      ==== With formal agreement ====
      The euro is also used in countries outside the EU. Four [[Microstate|microstates]] (Andorra, Monaco, San Marino, and Vatican City) have signed formal agreements with the EU to use the euro and issue their own coins.<ref name="agreements">{{cite web| url=http://europa.eu/legislation_summaries/economic_and_monetary_affairs/institutional_and_economic_framework/l25040_en.htm| title=Agreements on monetary relations (Monaco, San Marino, the Vatican and Andorra)| date=30 September 2004| access-date=12 September 2006| publisher=European Communities| archive-date=25 May 2015| archive-url=https://web.archive.org/web/20150525032924/http://europa.eu/legislation_summaries/economic_and_monetary_affairs/institutional_and_economic_framework/l25040_en.htm| url-status=live}}</ref><ref name="agreements 2">{{cite web |title=The euro outside the euro area |publisher=[[Europa (web portal)]] |url=https://ec.europa.eu/info/business-economy-euro/euro-area/euro/use-euro/euro-outside-euro-area_en |access-date=15 February 2021 |archive-date=7 May 2021 |archive-url=https://web.archive.org/web/20210507122006/https://ec.europa.eu/info/business-economy-euro/euro-area/euro/use-euro/euro-outside-euro-area_en |url-status=live }}</ref> Nevertheless, they are not considered part of the eurozone by the ECB and do not have a seat in the ECB or Euro Group.

      [[Akrotiri and Dhekelia]] are located on the island of Cyprus but are [[British Overseas Territories]] which are part of the United Kingdom. There are agreements between the United Kingdom and Cyprus and between United Kingdom and EU about their partial adoption of Cypriot law, including the usage of euro in Akrotiri and Dhekelia.<ref>{{cite web |url=http://www.timesonline.co.uk/tol/news/world/europe/article3097521.ece |archive-url=https://web.archive.org/web/20110510204604/http://www.timesonline.co.uk/tol/news/world/europe/article3097521.ece |url-status=dead |archive-date=10 May 2011 |title=The Times |access-date=2012-01-31}}</ref>

      Several currencies are pegged to the euro, some of them with a fluctuation band and others with an exact rate. The [[Bosnia and Herzegovina convertible mark]] was once pegged to the [[Deutsche mark]] at par, and continues to be pegged to the euro today at the Deutsche mark's old rate (1.95583 per euro). The [[West African CFA franc|West African]] and [[Central African CFA franc]]s are pegged exactly at 655.957&nbsp;CFA to 1&nbsp;EUR. In 1998, in anticipation of [[Economic and Monetary Union of the European Union]], the [[Council of the European Union]] addressed the monetary agreements France had with the [[CFA franc|CFA Zone]] and Comoros, and ruled that the ECB had no obligation towards the convertibility of the CFA and [[Comorian franc]]s. The responsibility of the free convertibility remained in the [[French Treasury]].

      ==== Without formal agreement ====
      [[Kosovo]] and [[Montenegro]] unilaterally adopted the euro as their sole currency without an agreement and, therefore, have no issuing rights.<ref name="agreements 2"/> These states are not considered part of the eurozone by the ECB. However, sometimes the term ''eurozone'' is applied to all territories that have adopted the euro as their sole currency.<ref>{{cite web|url=http://www.europeanfoundation.org/docs/117id.htm |title=European Foundation Intelligence Digest |publisher=Europeanfoundation.org |access-date=30 May 2010 |url-status=dead |archive-url=https://web.archive.org/web/20070826141401/http://www.europeanfoundation.org/docs/117id.htm |archive-date=26 August 2007 }}</ref><ref>{{cite web|url=http://www.iht.com/articles/2007/01/01/business/euro.php |title=Euro used as legal tender in non-EU nations |work=International Herald Tribune |date=1 January 2007 |access-date=22 November 2010 |url-status=dead |archive-url=https://web.archive.org/web/20081210203907/http://www.iht.com/articles/2007/01/01/business/euro.php |archive-date=10 December 2008 }}</ref><ref>{{cite news |url=https://news.bbc.co.uk/2/hi/europe/1696122.stm |title=The eurozone's 13th member |work=BBC News |date=11 December 2001 |access-date=30 May 2010 |archive-date=15 September 2013 |archive-url=https://web.archive.org/web/20130915190409/http://news.bbc.co.uk/2/hi/europe/1696122.stm |url-status=live }}</ref> Further unilateral adoption of the euro ([[euroisation]]), by both non-euro EU and non-EU members, is opposed by the ECB and EU.<ref>{{cite web|url=http://www.lawofemu.info/blog/2008/02/ecb-unilateral.html |title=Unilateral Euroization By Iceland Comes With Real Costs And Serious Risks |publisher=Lawofemu.info |date=15 February 2008 |archive-url=https://web.archive.org/web/20120314000247/http://www.lawofemu.info/blog/2008/02/ecb-unilateral.html |archive-date=14 March 2012 |access-date=28 February 2015}}</ref>

      === Historical eurozone enlargements and exchange-rate regimes for EU members ===
      {{Further|History of the euro}}
      The chart below provides a full summary of all applying [[exchange-rate regime]]s for [[Member state of the European Union|EU members]], since the birth, on 13 March 1979, of the [[European Monetary System]] with its [[Exchange Rate Mechanism]] and the related new common currency [[European Currency Unit|ECU]]. On 1 January 1999, the euro replaced the ECU&nbsp;1:1 at the exchange rate markets. During 1979–1999, the [[Deutsche Mark]] functioned as a de facto anchor for the ECU, meaning there was only a minor difference between pegging a currency against the ECU and pegging it against the Deutsche Mark.

      {{Exchange-rate regime for EU members}}
      The eurozone was established with its first 11&nbsp;member states on 1 January 1999. The first [[enlargement of the eurozone]], to Greece, took place on 1 January 2001, one year before the euro physically entered into circulation. The next enlargements were to states which [[2004 enlargement of the European Union|joined the EU in 2004]], and then joined the eurozone on 1 January of the year noted: Slovenia in 2007, Cyprus and Malta in 2008, Slovakia in 2009, Estonia in 2011, Latvia in 2014, and Lithuania in 2015. Croatia, which [[2013 enlargement of the European Union|joined the EU in 2013]], adopted the euro in 2023; while Bulgaria, which [[2007 enlargement of the European Union|joined in 2007]], adopted the euro in 2026.

      All new EU members joining the bloc after the signing of the [[Maastricht Treaty]] in 1992 committed to adopt the euro under the terms of their accession treaties once they comply with the five economic [[euro convergence criteria|convergence criteria]]. The last of these is the exchange rate stability criterion, which requires having been an ERM-member for a minimum of two years without the presence of "severe tensions" for the currency exchange rate.

      In September 2011, a diplomatic source close to the euro adoption preparation talks with the seven remaining new member states who had yet to adopt the euro at that time (Bulgaria, the Czech Republic, Hungary, Latvia, Lithuania, Poland, and Romania), claimed that the monetary union (eurozone) they had thought they were going to join upon their signing of the accession treaty may very well end up being a very different union, entailing a much closer fiscal, economic, and political convergence than originally anticipated. This changed legal status of the eurozone could potentially cause them to conclude that the conditions for their promise to join were no longer valid, which "could force them to stage new referendums" on euro adoption.<ref>{{cite web|author1=Georgi|title=New EU members to break free from euro duty|work=EurActiv &#124; EU News & policy debates, across languages|url=https://www.euractiv.com/euro-finance/new-eu-members-break-free-eurozone-duty-news-507564|publisher=Euractiv.com|date=13 September 2011|access-date=7 September 2013|archive-date=25 October 2014|archive-url=https://web.archive.org/web/20141025092606/http://www.euractiv.com/euro-finance/new-eu-members-break-free-eurozone-duty-news-507564|url-status=live}}</ref>

      === Future enlargement ===
      {{main|Enlargement of the eurozone}}
      {{Supranational European Bodies|align=right|size=400px}}
      <!-- In order to avoid contradiction within Wikipedia, if you wish to update the future adoption dates of euro, please update other articles as well, at least:
      * Eurozone
      * Enlargement of the eurozone
      * Template:Euro topics
      * (The pre-euro national currency article)
      * (The national euro coin article) -->

      Six countries (the [[Czech Republic and the euro|Czech Republic]], [[Denmark and the euro|Denmark]], [[Hungary and the euro|Hungary]], [[Poland and the euro|Poland]], [[Romania and the euro|Romania]], and [[Sweden and the euro|Sweden]]) are [[European Union|EU]] members but do not use the euro.

      Before joining the eurozone, a state must spend at least two years in the [[European Exchange Rate Mechanism]] (ERM&nbsp;II). As of January 2026, only the central bank of Denmark participates in ERM II.

      Denmark obtained a special [[Opt-outs in the European Union|opt-out]] in the [[Maastricht Treaty]], and thus is legally exempt from joining the eurozone unless its government decides otherwise, either by parliamentary vote or [[referendum]]. The United Kingdom likewise had an opt-out prior to [[Brexit|withdrawing from the EU]] in 2020.

      The remaining five countries have committed to adopt the euro in future, once they meet the convergence criteria. They should join as soon as they do so, which include being part of ERM&nbsp;II for two years. [[Sweden and the euro|Sweden]], which joined the EU in 1995 after the Maastricht Treaty was signed, rejected euro adoption in a [[2003 Swedish euro referendum|2003 referendum]] and since then the country has intentionally avoided fulfilling the adoption requirements by not joining ERM&nbsp;II, which is voluntary.<ref>{{cite web |url=http://www.eu-upplysningen.se/Sverige-i-EU/Sverige-sa-nej-till-euron/ |title=Sverige sa nej till euron |publisher=Swedish Parliament |date=28 August 2013 |access-date=12 August 2014 |language=sv |archive-date=19 September 2017 |archive-url=https://web.archive.org/web/20170919201011/http://www.eu-upplysningen.se/Sverige-i-EU/Sverige-sa-nej-till-euron/ |url-status=dead }}</ref><ref>{{cite web |url=http://ec.europa.eu/economy_finance/euro/adoption/erm2/index_en.htm |title=Information on ERM II |publisher=European Commission |date=22 December 2009 |access-date=16 January 2010 |archive-date=7 July 2012 |archive-url=https://archive.today/20120707130605/http://ec.europa.eu/economy_finance/euro/adoption/erm2/index_en.htm |url-status=live }}</ref>

      Interest in joining the eurozone increased in Denmark, and initially in Poland, as a result of the [[2008 financial crisis]]. In Iceland, there was an increase in interest in joining the European Union, a pre-condition for adopting the euro.<ref>{{cite news |last=Dougherty |first=Carter |title=Buffeted by financial crisis, countries seek euro's shelter |work=International Herald Tribune |date=1 December 2008 |url=http://www.iht.com/articles/2008/12/01/business/euro.php?page=1 |access-date=2 December 2008 |archive-date=22 December 2022 |archive-url=https://web.archive.org/web/20221222184154/http://www.iht.com/articles/2008/12/01/business/euro.php?page=1 |url-status=dead }}</ref> However, by 2010 the debt crisis in the eurozone caused interest from Poland, as well as the Czech Republic, Denmark and Sweden to cool.<ref>{{cite news |url=https://www.reuters.com/article/idUSLDE65F15Z20100616 |title=Czechs, Poles cooler to euro as they watch debt crisis |work=Reuters |date=16 June 2010 |access-date=18 June 2010 |archive-date=20 October 2017 |archive-url=https://wayback.archive-it.org/all/20171020152451/https://www.reuters.com/article/czech-election-euro/update-2-czechs-poles-cooler-to-euro-as-they-watch-debt-crisis-idUSLDE65F15Z20100616 |url-status=live }}</ref>

      At the time of Bulgaria’s euro adoption in 2026, the Polish government under Donald Tusk has expressed a lack of economic readiness to join, and the Polish president Karol Nawrocki has said that he is explicitly against Poland's future adoption of the euro.<ref>{{cite web | url=https://www.politico.eu/article/bulgaria-eu-poland-poverty-central-bank-economy/ | title=Bulgaria prepares to join the euro — but Poland couldn't be less interested | date=4 June 2025 | access-date=4 June 2025 | archive-date=4 June 2025 | archive-url=https://web.archive.org/web/20250604074036/https://www.politico.eu/article/bulgaria-eu-poland-poverty-central-bank-economy/ | url-status=live }}</ref>

      === Expulsion and withdrawal ===
      {{main|Withdrawal from the eurozone}}

      {{see also|Greek withdrawal from the eurozone}}
      In the opinion of journalist Leigh Phillips and [[Locke Lord]]'s Charles Proctor,<ref name=noone>[https://euobserver.com/news/113563 "Brussels: No one can leave the euro"] {{Webarchive|url=https://web.archive.org/web/20201224165810/https://euobserver.com/news/113563 |date=24 December 2020 }} by Leigh Phillips, ''[[EUobserver]]'', 8 September 2011</ref><ref name=locke>"[http://www.lexology.com/library/detail.aspx?g=a92664b9-d267-4347-a59a-6488ab3895fb The Eurozone crisis – the final stage?] {{Webarchive|url=https://web.archive.org/web/20180701193837/https://www.lexology.com/library/detail.aspx?g=a92664b9-d267-4347-a59a-6488ab3895fb |date=1 July 2018 }}" by Charles Proctor, [[Locke Lord]], 15 May 2012</ref> there is no provision in any European Union treaty for an exit from the eurozone. In fact, they argued, the Treaties make it clear that the process of [[Economic and Monetary Union of the European Union|monetary union]] was intended to be "irreversible" and "irrevocable".<ref name=locke/> However, in 2009, a [[European Central Bank]] legal study argued that, while voluntary withdrawal is legally not possible, expulsion remains "conceivable".<ref name="ecblegal">"[https://www.ecb.europa.eu/pub/pdf/scplps/ecblwp10.pdf Withdrawal and Expulsion from the EU and EMU : Some reflections] {{Webarchive|url=https://web.archive.org/web/20130120184437/http://www.ecb.int/pub/pdf/scplps/ecblwp10.pdf |date=20 January 2013 }}" by Phoebus Athanassiou, Principal Legal Counsel with the [[Directorate-General for Legal Service]], [[European Central Bank|ECB]], 2009</ref> Although an explicit provision for an exit option does not exist, many experts and politicians in Europe have suggested an option to leave the eurozone should be included in the relevant treaties.<ref name=activ>[https://www.euractiv.com/section/eu-priorities-2020/news/german-advisory-council-calls-for-exit-option-in-the-eurozone/ "German advisory council calls for exit option in the eurozone"] {{Webarchive|url=https://web.archive.org/web/20201205105426/https://www.euractiv.com/section/eu-priorities-2020/news/german-advisory-council-calls-for-exit-option-in-the-eurozone/ |date=5 December 2020 }} by Daniel Tost, [[EurActiv]], 29 July 2015</ref>

      On the issue of leaving the eurozone, the [[European Commission]] has stated that "[t]he irrevocability of membership in the euro area is an integral part of the Treaty framework and the Commission, as a guardian of the EU Treaties, intends to fully respect [that irrevocability]."<ref name=rehn/> It added that it "does not intend to propose [any] amendment" to the relevant Treaties, the current status being "the best way going forward to increase the resilience of euro area Member States to potential economic and financial crises."<ref name=rehn>[http://www.europarl.europa.eu/sides/getAllAnswers.do?reference=E-2012-004398&language=EN Text] {{Webarchive|url=https://web.archive.org/web/20201114141840/https://www.europarl.europa.eu/sides/getAllAnswers.do?reference=E-2012-004398&language=EN |date=14 November 2020 }} of response by [[Olli Rehn]], [[European Commissioner for Economic and Monetary Affairs and the Euro]], on behalf of the [[European Commission]], to question submitted by Claudio Morganti, [[Member of the European Parliament]], 22 June 2012</ref> The [[European Central Bank]], responding to a question by a [[Member of the European Parliament]], has stated that an exit is not allowed under the Treaties.<ref>[https://www.ecb.europa.eu/pub/pdf/other/20121107_morganti.en.pdf Text] {{Webarchive|url=https://web.archive.org/web/20201117041132/https://www.ecb.europa.eu/pub/pdf/other/20121107_morganti.en.pdf |date=17 November 2020 }} of message by [[Mario Draghi]], [[European Central Bank|ECB]], to Claudio Morganti, [[Member of the European Parliament]], 6 November 2012</ref>

      Likewise there is no provision for a state to be expelled from the euro.<ref>Athanassiou, Phoebus (December 2009) [http://www.ecb.int/pub/pdf/scplps/ecblwp10.pdf Withdrawal and Expulsion from the EU and EMU, Some Reflections] {{Webarchive|url=https://web.archive.org/web/20130120184437/http://www.ecb.int/pub/pdf/scplps/ecblwp10.pdf |date=20 January 2013 }} (PDF), European Central Bank. Retrieved 8 September 2011</ref> Some, however, including the Dutch government, favour the creation of an expulsion provision for the case whereby a heavily indebted state in the eurozone refuses to comply with an EU economic reform policy.<ref name="phillips">{{cite web |last=Phillips |first=Leigh |url=https://euobserver.com/19/113552 |title=EUobserver / Netherlands: Indebted states must be made 'wards' of the commission or leave euro |date=7 September 2011 |publisher=Euobserver.com |access-date=20 May 2014 |archive-date=29 February 2012 |archive-url=https://web.archive.org/web/20120229050258/http://euobserver.com/19/113552 |url-status=live }}</ref>

      In a Texas law journal, [[University of Texas at Austin]] law professor Jens Dammann has argued that even now EU law contains an implicit right for member states to leave the eurozone if they no longer meet the criteria that they had to meet in order to join it.<ref name="Jens Dammann">{{cite journal| last=Dammann|first=Jens|title=The Right to Leave the Eurozone|journal=U of Texas Law, Public Law Research Paper|date=10 February 2012|volume=48| series=2013|issue=2| ssrn=2262873}}</ref> Furthermore, he has suggested that, under narrow circumstances, the European Union can expel member states from the eurozone.<ref name="Jens Dammann2">{{cite journal| last=Dammann| first=Jens|title=Paradise Lost: Can the European Union Expel Countries from the Eurozone| journal=Vanderbilt Journal of Transnational Law|date=26 August 2015|volume=49| series=2016| issue=2|ssrn=2827699}}</ref>

      == Administration and representation ==
      {{Further|European Central Bank|Eurogroup|Euro summit}}
      [[File:Frankfurt EZB-Neubau.20130909.jpg|thumb|The [[European Central Bank]] ([[Seat of the European Central Bank|seat]] in [[Frankfurt am Main|Frankfurt]] depicted) is the supranational [[Central bank|monetary authority]] of the eurozone.]]

      The monetary policy of all countries in the eurozone is managed by the [[European Central Bank]] (ECB) and the [[Eurosystem]] which comprises the ECB and the central banks of the EU states who have joined the eurozone. Countries outside the eurozone are not represented in these institutions. Whereas all EU member states are part of the [[European System of Central Banks]] (ESCB), non EU member states have no say in all three institutions, even those with monetary agreements such as Monaco. The ECB is entitled to authorise the design and printing of [[euro banknotes]] and the volume of [[euro coins]] minted, and [[President of the European Central Bank|its president]] is currently [[Christine Lagarde]].

      The eurozone is represented politically by its finance ministers, known collectively as the [[Eurogroup]], and is presided over by a president, currently [[Paschal Donohoe]]. The finance ministers of the EU member states that use the euro meet a day before a meeting of the [[Economic and Financial Affairs Council]] (Ecofin) of the [[Council of the European Union]]. The Group is not an official Council formation but when the full EcoFin council votes on matters only affecting the eurozone, only Euro Group members are permitted to vote on it.<ref>[http://eur-lex.europa.eu/en/treaties/dat/12007L/htm/C2007306EN.01004201.htm Treaty of Lisbon (Provisions specific to member states whose currency is the euro)], EurLex {{webarchive |url=https://web.archive.org/web/20090327080406/http://eur-lex.europa.eu/en/treaties/dat/12007L/htm/C2007306EN.01004201.htm |date=27 March 2009 }}</ref><ref name="FT EGE BG">{{cite web|title=An economic government for the eurozone? |publisher=Federal Union |url=http://www.fedtrust.co.uk/admin/uploads/FedT_Economic_Government.pdf |access-date=26 February 2011 |url-status=dead |archive-url=https://web.archive.org/web/20110717135636/http://www.fedtrust.co.uk/admin/uploads/FedT_Economic_Government.pdf |archive-date=17 July 2011 }}</ref><ref>[https://web.archive.org/web/20090307190231/http://eur-lex.europa.eu/LexUriServ/LexUriServ.do?uri=OJ:C:2008:115:0201:0328:EN:PDF Protocols], Official Journal of the European Union</ref>

      Since the [[2008 financial crisis]], the Euro Group has met irregularly not as finance ministers, but as heads of state and government (like the European Council). It is in this forum, the [[Euro summit]], that many eurozone reforms have been decided upon. In 2011, former [[French President]] [[Nicolas Sarkozy]] pushed for these summits to become regular and twice a year in order for it to be a 'true economic government'.<ref>{{Cite news |last1=Elliott |first1=Larry |last2=Wearden |first2=Graeme |date=2011-08-17 |title=Merkel and Sarkozy push for greater European co-operation |url=https://www.theguardian.com/business/2011/aug/17/angela-merkel-nicolas-sarkozy-summit |access-date=2024-08-30 |work=The Guardian |language=en-GB |issn=0261-3077}}</ref>

      === Reform ===
      In April 2008 in [[Brussels]], future [[European Commission]] [[President of the European Commission|President]] [[Jean-Claude Juncker]] suggested that the eurozone should be represented at the [[International Monetary Fund|IMF]] as a bloc, rather than each member state separately: "It is absurd for those 15 countries not to agree to have a single representation at the IMF. It makes us look absolutely ridiculous. We are regarded as buffoons on the international scene".<ref name="Common IMF">{{cite web |title=Eurozone countries should speak with one voice, Juncker says |author=Elitsa Vucheva |date=15 April 2008 |publisher=EU Observer |url=https://euobserver.com/9/25984 |access-date=26 February 2011 |archive-date=15 March 2011 |archive-url=https://web.archive.org/web/20110315003501/http://euobserver.com/9/25984 |url-status=live }}</ref> In 2017 Juncker stated that he aims to have this agreed by the end of his mandate in 2019.<ref>[https://www.euractiv.com/section/economy-jobs/news/commission-wants-single-eurozone-seat-at-imf-plan-adopted-by-end-of-mandate "Commission wants single eurozone seat at IMF plan adopted by end of mandate"] {{Webarchive|url=https://web.archive.org/web/20171227235524/https://www.euractiv.com/section/economy-jobs/news/commission-wants-single-eurozone-seat-at-imf-plan-adopted-by-end-of-mandate/ |date=27 December 2017 }}, ''Euractiv'', 7 December 2017</ref> However, [[European Commissioner for Economic & Financial Affairs|Finance Commissioner]] [[Joaquín Almunia]] stated that before there is common representation, a common political agenda should be agreed upon.<ref name="Common IMF"/>

      Leading EU figures including the commission and national governments have proposed a variety of reforms to the eurozone's architecture; notably the creation of a Finance Minister, a larger eurozone budget, and reform of the current bailout mechanisms into either a "European Monetary Fund" or a eurozone [[Treasury]]. While many have similar themes, details vary greatly.<ref>[https://www.ft.com/content/68e0ead0-a3a5-11e7-8d56-98a09be71849 "Macron is right — the eurozone needs a finance minister"] {{Webarchive|url=https://web.archive.org/web/20171107003553/https://www.ft.com/content/68e0ead0-a3a5-11e7-8d56-98a09be71849 |date=7 November 2017 }}, ''Financial Times'', 28 September 2017</ref><ref>[https://www.theguardian.com/business/2017/dec/06/europe-should-have-its-own-minister-of-economy-and-finance-says-ec Europe should have its own economy and finance minister, says EC] {{Webarchive|url=https://web.archive.org/web/20171227235652/https://www.theguardian.com/business/2017/dec/06/europe-should-have-its-own-minister-of-economy-and-finance-says-ec |date=27 December 2017 }}, theguardian 6 December 2017</ref><ref>[https://www.reuters.com/article/us-eurozone-eurogroup-budget/large-number-of-eu-finance-ministers-want-euro-zone-budget-dijsselbloem-idUSKBN1D62NS "Large number of EU finance ministers want euro zone budget: Dijsselbloem"] {{Webarchive|url=https://web.archive.org/web/20171227235530/https://www.reuters.com/article/us-eurozone-eurogroup-budget/large-number-of-eu-finance-ministers-want-euro-zone-budget-dijsselbloem-idUSKBN1D62NS |date=27 December 2017 }}, ''Reuters'', 6 November 2017</ref><ref>[https://www.ft.com/content/afedcb46-5021-11e7-a1f2-db19572361bb "Spain urges sweeping reforms on eurozone to correct flaws"] {{Webarchive|url=https://web.archive.org/web/20171227235553/https://www.ft.com/content/afedcb46-5021-11e7-a1f2-db19572361bb |date=27 December 2017 }}, ''Financial Times'', 14 June 2017</ref>

