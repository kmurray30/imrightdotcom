      * {{flag|Grenada}} – The minister pointed out the deep disappointment about the withdrawal in a joint statement.<ref name="caribbeannewsnow.com">{{Cite web |url=http://www.caribbeannewsnow.com/topstory-Caribbean-leaders-condemn-US-withdrawal-from-Paris-Climate-Change-Agreement-34629.html |title=Archived copy |access-date=November 10, 2017 |archive-url=https://web.archive.org/web/20171110224739/http://www.caribbeannewsnow.com/topstory-Caribbean-leaders-condemn-US-withdrawal-from-Paris-Climate-Change-Agreement-34629.html |archive-date=November 10, 2017 |url-status=dead }}</ref>
      * {{flag|Hungary}} – Prime Minister [[Viktor Orbán]] stated that he was "in a state of shock" after hearing Trump's decision, and that it opposes the view of Hungary's right wing.<ref>{{Cite news|url=http://hungarianfreepress.com/2017/06/02/viktor-orban-in-a-state-of-shock-after-trumps-withdrawal-from-paris-agreement/|title=Viktor Orbán "in a state of shock" after Trump's withdrawal from Paris agreement|date=June 2, 2017|work=Hungarian Free Press|access-date=June 3, 2017|archive-url=https://web.archive.org/web/20170602235430/http://hungarianfreepress.com/2017/06/02/viktor-orban-in-a-state-of-shock-after-trumps-withdrawal-from-paris-agreement/|archive-date=June 2, 2017|url-status=live}}</ref>
      * {{flag|Iceland}} – The government 'condemned' the move.<ref name="bbc2">{{Cite news|url=https://www.bbc.co.uk/news/world-us-canada-40127326|title=Paris climate deal: Trump pulls US out of 2015 accord|date=June 2, 2017|publisher=BBC|access-date=June 22, 2018|archive-url=https://web.archive.org/web/20180701015302/https://www.bbc.co.uk/news/world-us-canada-40127326|archive-date=July 1, 2018|url-status=live}}</ref>
      * {{flag|Ireland}} – Minister for Communications, Climate Action and the Environment, [[Denis Naughten]] described the decision as "irresponsible" and that Ireland would continue its efforts to reach emissions targets and lead by example. Former President [[Mary Robinson]] called it "truly shocking".<ref>{{Cite news|url=http://www.irishtimes.com/news/environment/wide-condemnation-in-ireland-of-trump-s-climate-pact-decision-1.3104869|title=Wide condemnation in Ireland of Trump's climate pact decision|date=June 2, 2017|newspaper=The Irish Times|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170607112026/http://www.irishtimes.com/news/environment/wide-condemnation-in-ireland-of-trump-s-climate-pact-decision-1.3104869|archive-date=June 7, 2017|url-status=live}}</ref>
      * {{flag|India}} – [[Prime Minister of India|Prime Minister]] [[Narendra Modi]] reiterated India's support for the climate accord, and pledged to go 'above and beyond' its aims.<ref>{{Cite news|url=http://www.smh.com.au/world/world-leaders-react-as-donald-trump-withdraws-us-from-paris-climate-deal-20170601-gwiphv.html|title=World leaders react as Donald Trump withdraws US from Paris climate deal|date=June 2, 2017|work=The Sydney Morning Herald|access-date=June 1, 2017|language=en-US|archive-url=https://web.archive.org/web/20170601235037/http://www.smh.com.au/world/world-leaders-react-as-donald-trump-withdraws-us-from-paris-climate-deal-20170601-gwiphv.html|archive-date=June 1, 2017|url-status=live}}</ref><ref>{{Cite news|url=https://www.bbc.co.uk/news/world-asia-india-40144613|title=Trump climate deal: Modi vows to go beyond Paris accord|date=June 3, 2017|publisher=BBC|access-date=June 22, 2018|archive-url=https://web.archive.org/web/20180808123322/https://www.bbc.co.uk/news/world-asia-india-40144613|archive-date=August 8, 2018|url-status=live}}</ref>
      * {{flag|Indonesia}} – Spokesman for the Ministry of Foreign Affairs, Armanatha Nasir, said that "America's decision is not in line with international commitments. Indonesia believes that climate change requires cooperation and contribution of all parties, both developed and developing countries."<ref>{{cite news|title=Indonesia Sesalkan Keputusan AS Keluar dari Perjanjian Paris|trans-title=Indonesia Regrets US Decision to Leave the Paris Agreement|url=http://www.viva.co.id/dunia/921878-indonesia-sesalkan-keputusan-as-keluar-dari-perjanjian-paris|access-date=July 21, 2017|work=VIVA.co.id|date=June 2, 2017|language=id}}{{Dead link|date=June 2022 |bot=InternetArchiveBot |fix-attempted=yes }}</ref>
      * {{flag|Iran}} – First Vice President [[Eshaq Jahangiri]] criticized Washington for pulling out of the Paris agreement, stressing that the U.S. is the main culprit behind producing greenhouse gases. "Trump has forgotten that the gases produced in the past few decades have endangered the life of not only the Americans but also all humankind," he added.<ref>{{cite news|url=http://en.farsnews.com/newstext.aspx?nn=13960316000766|title=Iran Blasts US for Withdrawing from Paris Climate Accord|date=June 6, 2017|access-date=June 7, 2017|archive-url=https://web.archive.org/web/20170701195333/http://en.farsnews.com/newstext.aspx?nn=13960316000766|archive-date=July 1, 2017|url-status=live}}</ref>
      * {{flag|Israel}} – Energy Minister [[Yuval Steinitz]] criticized Trump for rejecting "a rare occurrence in which the world united".<ref>{{Cite news|url=http://www.timesofisrael.com/climate-deal-exposes-areas-where-israel-republicans-radically-depart/|title=Climate deal exposes areas where Israel, Republicans radically depart|last=Sales|first=Ben|date=June 2, 2017|work=The Times of Israel|access-date=June 3, 2017|language=en-US|archive-url=https://web.archive.org/web/20170602211346/http://www.timesofisrael.com/climate-deal-exposes-areas-where-israel-republicans-radically-depart/|archive-date=June 2, 2017|url-status=live}}</ref>
      * {{flag|Italy}} – [[Paolo Gentiloni]] expressed "regret" and sorrow for America's action.<ref name=":0" /><ref>{{cite magazine|url=http://time.com/4802303/president-donald-trump-france-germany-italy-paris-climate-accord-agreement/|title=France, Germany and Italy to Trump: Paris Agreement Can't Be Renegotiated|agency=Associated Press|magazine=Time|access-date=June 1, 2017|archive-url=https://web.archive.org/web/20170601213519/http://time.com/4802303/president-donald-trump-france-germany-italy-paris-climate-accord-agreement/|archive-date=June 1, 2017|url-status=dead|df=mdy-all}}</ref>
      * {{flag|Jamaica}} – The Government and the Opposition expressed disappointment with the decision.<ref>{{Cite web|url=http://www.jamaicaobserver.com/news/jamaica-disappointed-with-trump-8217-s-paris-deal-decision_100708?profile=1373|title=Jamaica Observer Limited|website=Jamaica Observer|access-date=November 11, 2017|archive-url=https://web.archive.org/web/20171112021040/http://www.jamaicaobserver.com/news/jamaica-disappointed-with-trump-8217-s-paris-deal-decision_100708?profile=1373|archive-date=November 12, 2017|url-status=live}}</ref>
      * {{flag|Japan}} – In a statement, the Japanese Foreign Ministry said that Trump's choice was "regrettable" and that "Japan believes the leadership of the developed countries to be of great importance (on climate issues), and the steady implementation of the Paris Agreement is critical in this regard."<ref>{{cite web |url=https://www.reuters.com/article/us-usa-climatechange-japan-idUSKBN18T030?il=0 |title=Japan says U.S. withdrawal from global climate pact 'regrettable' |work=Reuters |date=June 1, 2017 |access-date=July 2, 2017 |archive-url=https://web.archive.org/web/20170806221308/http://www.reuters.com/article/us-usa-climatechange-japan-idUSKBN18T030?il=0 |archive-date=August 6, 2017 |url-status=live }}</ref> The Minister of the Environment stated that he was "greatly disappointed, both as Minister and as an individual", and that withdrawal from the Paris Agreement was an act that "turned its back on the wisdom of the human race".<ref>{{cite news|url=http://www.asahi.com/articles/ASK6236QYK62ULBJ006.html|title=山本環境相「人類の英知に背向けた」 米のパリ協定離脱|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602081759/http://www.asahi.com/articles/ASK6236QYK62ULBJ006.html|archive-date=June 2, 2017|url-status=live}}</ref> The Deputy Prime Minister said "The U.S. created the [[League of Nations]], but this country did not join the League. The U.S. is just that kind of country."<ref>{{cite news|url=https://mainichi.jp/english/articles/20170602/p2a/00m/0na/021000c|title=Rage and dismay in Japan as Trump pulls US out of Paris climate accord|access-date=June 2, 2017|archive-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602100108/https://mainichi.jp/english/articles/20170602/p2a/00m/0na/021000c|url-status=live}}</ref>
      * {{flag|Kazakhstan}} – The Minister of Foreign Affairs pledged to carry forward the Paris Agreement and Agenda 2030. The [[Expo 2017|Astana Expo 2017's]] theme was "Future Energy".<ref>{{Cite web|url=https://www.nuclearabolition.info/index.php/1109-kazakhstan-plans-a-summit-of-nuclear-weapon-states-with-an-eye-on-a-nuke-free-world|title=Kazakhstan Plans a Summit of Nuclear Weapon States with an Eye on a Nuke-free World - Nuclear Abolition News and Analysis|website=www.nuclearabolition.info|access-date=November 16, 2017|archive-url=https://web.archive.org/web/20171117003104/https://www.nuclearabolition.info/index.php/1109-kazakhstan-plans-a-summit-of-nuclear-weapon-states-with-an-eye-on-a-nuke-free-world|archive-date=November 17, 2017|url-status=live}}</ref>
      * {{flag|Kiribati}} – [[Anote Tong]], the former president and one of the prominent Pacific voices during the Paris agreement negotiations, said Trump's decision to pull out of the Paris climate agreement is a selfish move that ignores the plight of low-lying island nations.<ref name="abc">{{cite news|url=http://www.abc.net.au/news/2017-06-02/trump-likened-to-a-classroom-bully-after-climate-deal-backdown/8584960|publisher=abc.net.au|title=Pacific leader likens Donald Trump to a 'classroom bully' after climate deal backdown - ABC News (Australian Broadcasting Corporation)|newspaper=ABC News |date=June 2, 2017 |access-date=June 10, 2017|archive-url=https://web.archive.org/web/20170610071957/http://www.abc.net.au/news/2017-06-02/trump-likened-to-a-classroom-bully-after-climate-deal-backdown/8584960|archive-date=June 10, 2017|url-status=live}}</ref>
      * {{flag|Latvia}} – The Environmental Protection and Regional Development Ministry issued a statement confirming Latvia's commitment to the Paris Agreement and describing the negative impact Trump's decision may have on investment in clean energy among developing nations.<ref>{{cite news|url=http://news.xinhuanet.com/english/2017-06/02/c_136335737.htm|title=U.S. climate decision to negatively impact financing green tech: Latvian ministry|date=June 2, 2017|publisher=XinhuaNet|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602170232/http://news.xinhuanet.com/english/2017-06/02/c_136335737.htm|archive-date=June 2, 2017|url-status=dead}}</ref>
      * {{flag|Liechtenstein}} – The Minister of Foreign Affairs regrets Trump's decision and decided to ratify the Paris Agreement.<ref>{{Cite web|url=https://www.volksblatt.li/nachricht.aspx?p1=fl&id=154107&src=vb|title=Liechtenstein hält an Klimaabkommen fest - Liechtenstein|website=Liechtensteiner Volksblatt|access-date=October 16, 2019|archive-url=https://web.archive.org/web/20190417120411/https://www.volksblatt.li/nachricht.aspx?p1=fl&id=154107&src=vb|archive-date=April 17, 2019|url-status=live}}</ref>
      * {{flag|Luxembourg}} – Wants to increase contributions to climate change body.<ref>{{Cite web|url=https://luxtimes.lu/archives/1955-luxembourg-to-increase-contributions-to-climate-change-body|title=Luxembourg to increase contributions to climate change body|website=luxtimes.lu|date=December 11, 2017 |access-date=October 16, 2019|archive-url=https://web.archive.org/web/20191016150350/https://luxtimes.lu/archives/1955-luxembourg-to-increase-contributions-to-climate-change-body|archive-date=October 16, 2019|url-status=live}}</ref>
      * {{flag|Malaysia}} – The Ministry is confident that the Paris Agreement on Climate Change will not fail despite the United States having announced its withdrawal from the treaty.<ref>{{Cite web|url=https://www.thesundaily.my/archive/malaysia-confident-us-withdrawal-will-not-affect-paris-agreement-climate-change-wan-GTARCH450490|title=Malaysia confident us withdrawal will not affect paris agreement on climate change: Wan Junaidi|website=www.thesundaily.my|access-date=October 16, 2019|archive-url=https://web.archive.org/web/20191016150339/https://www.thesundaily.my/archive/malaysia-confident-us-withdrawal-will-not-affect-paris-agreement-climate-change-wan-GTARCH450490|archive-date=October 16, 2019|url-status=live}}</ref>
      * {{flag|Maldives}} – Environment Minister [[Thoriq Ibrahim]], speaking on behalf of the [[Alliance of Small Island States]] (AOSIS), defended the agreement as "designed for maximum flexibility and universal participation", adding that Trump's proposed renegotiation was "not practical" and that it could represent "a setback from which we would never recover".<ref>{{cite news|url=http://aosis.org/paris-agreement-is-not-renegotiable/|title=Paris Agreement is not 'renegotiable'|date=June 1, 2017|publisher=AOSIS|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170609112450/http://aosis.org/paris-agreement-is-not-renegotiable/|archive-date=June 9, 2017|url-status=dead}}</ref>
      * {{flag|Marshall Islands}} – President [[Hilda Heine]] described the move as "highly concerning for those of us that live on the frontline of climate change".<ref name="bbc2"/>
      * {{flag| Micronesia}} – President [[Peter M. Christian|Peter Christian]] emphasized that nations must work together to achieve the goals set out by the Paris agreement.<ref name="ecowatch.com"/>
      * {{flag|Mexico}} – President [[Enrique Peña Nieto]] responded with a reiteration of Mexico's unconditional support for the Paris agreement.<ref name="theguardian1"/>
      * {{flag|Monaco}} – Prince Albert calls President Trump's retreat from Paris Agreement a 'Historic Mistake'.<ref>{{Cite web|url=https://people.com/royals/prince-albert-calls-trumps-retreat-from-paris-agreement-historic-mistake/|title=Monaco's Prince Albert Calls President Trump's Retreat from Paris Agreement a 'Historic Mistake'|website=PEOPLE.com|access-date=October 16, 2019|archive-url=https://web.archive.org/web/20191016150348/https://people.com/royals/prince-albert-calls-trumps-retreat-from-paris-agreement-historic-mistake/|archive-date=October 16, 2019|url-status=live}}</ref>
      * {{flag|Morocco}} – COP22's president and former Moroccan Minister of Foreign Affairs [[Salaheddine Mezouar]] has expressed his "deep disappointment" but noted that collective efforts to fight climate change will continue.<ref>{{cite web |first=Youssef |last=Igrouane |url=https://www.moroccoworldnews.com/2017/06/218513/paris-accords-donald-trump-pull-cop-22-president-says-climate-change-fight-will-continue-paris-agreements-on-climate-change-salaheddine-mezouar/ |title=Paris Accords: Following Trump's Pull-Out, COP 22 President Says Climate Change Fight Will Continue |publisher=Morocco World News |date=June 2, 2017 |access-date=June 3, 2017 |archive-url=https://web.archive.org/web/20170806221222/https://www.moroccoworldnews.com/2017/06/218513/paris-accords-donald-trump-pull-cop-22-president-says-climate-change-fight-will-continue-paris-agreements-on-climate-change-salaheddine-mezouar/ |archive-date=August 6, 2017 |url-status=live }}</ref>
      * {{flag|Namibia}} – Environment and Tourism Minister Pohamba Shifeta says Namibia is saddened by the withdrawal of the United States from the Paris Climate Change Agreement, describing the move as a major blow to the efforts to tackle global warming.<ref>{{Cite web|url=http://apanews.net/en/news/namibia-saddened-by-us-withdrawal-from-paris-climate-pact-minister|title=Namibia saddened by US withdrawal from Paris climate pact – Minister|website=apanews.net|access-date=November 13, 2017|archive-url=https://web.archive.org/web/20171114040938/http://apanews.net/en/news/namibia-saddened-by-us-withdrawal-from-paris-climate-pact-minister|archive-date=November 14, 2017|url-status=live}}</ref>
      * {{flag|Nepal}} – Nepali Youth and Mountain Community Dwellers appealed to U.S. president Donald Trump to take back his decision.<ref>{{Cite web|url=https://thehimalayantimes.com/kathmandu/nepali-youth-urge-donald-trump-not-pull-paris-climate-accord/|title=Nepali youth urge Trump not to pull out of Paris climate accord|date=June 6, 2017|website=The Himalayan Times|access-date=November 11, 2017|archive-url=https://web.archive.org/web/20171111205446/https://thehimalayantimes.com/kathmandu/nepali-youth-urge-donald-trump-not-pull-paris-climate-accord/|archive-date=November 11, 2017|url-status=live}}</ref>
      * {{flag|New Zealand}} – Prime Minister [[Bill English]] released a statement confirming that he will register his 'disappointment' with [[Rex Tillerson]] during an upcoming visit by the U.S. Secretary of State.<ref name="theguardian1"/>
      * {{flag|Netherlands}} – Foreign minister [[Bert Koenders]] released the statement "It represents a cardinal mistake that is damaging to citizens around the world, including those of the United States."<ref>{{cite web |url=https://www.government.nl/latest/news/2017/06/01/foreign-minister-koenders-on-the-us-withdrawal-from-the-paris-climate-agreement |title=Foreign minister Koenders on the US Withdrawal from the Paris Climate Agreement |date=June 2, 2017 |publisher=Government of the Netherlands |access-date=June 5, 2017 |archive-url=https://web.archive.org/web/20170623200932/https://www.government.nl/latest/news/2017/06/01/foreign-minister-koenders-on-the-us-withdrawal-from-the-paris-climate-agreement |archive-date=June 23, 2017 |url-status=live }}</ref>
      * {{flag|Nigeria}} – The Government has expressed disappointment over the decision of the United States.<ref>{{Cite news |url=https://www.dailytrust.com.ng/news/general/paris-climate-accord-nigeria-worried-over-us-withdrawal/200521.html |title=Paris climate accord: Nigeria worried over US withdrawal |last=Salau |first=Abdullateef |date=June 5, 2017 |access-date=November 14, 2017 |archive-url=https://web.archive.org/web/20171114094903/https://www.dailytrust.com.ng/news/general/paris-climate-accord-nigeria-worried-over-us-withdrawal/200521.html |archive-date=November 14, 2017 |url-status=dead |newspaper=[[Daily Trust]]}}</ref>
      * {{flag|North Korea}} – The foreign ministry has condemned President Donald Trump for pulling out of the Paris climate agreement, describing the decision as "the height of egotism" and an example of the "moral vacuum" in the U.S. leadership.<ref name="telegraph">{{cite news|url=https://www.telegraph.co.uk/news/2017/06/07/height-egotism-north-korea-blasts-donald-trump-pulling-paris/|publisher=telegraph.co.uk|title='The height of egotism': North Korea blasts Donald Trump for pulling out of Paris climate agreement|newspaper=The Telegraph |date=June 7, 2017 |access-date=June 10, 2017|archive-url=https://web.archive.org/web/20170609203718/http://www.telegraph.co.uk/news/2017/06/07/height-egotism-north-korea-blasts-donald-trump-pulling-paris/|archive-date=June 9, 2017|url-status=live|last1=Ryall |first1=Julian }}</ref>
      * {{flag|Norway}} – The government condemned Trump's decision.<ref name="bbc2"/>
      * {{flag|Papua New Guinea}} – Climate Change & Development Authority managing director, Ruel Yamuna, said "Climate change is real and already affecting the livelihood of communities in Papua New Guinea" and "The Paris Agreement is stronger than Donald Trump".<ref name="looppng">{{cite web|url=http://www.looppng.com/png-news/%E2%80%8Bpng-stands-firm-paris-agreement-60375|publisher=looppng.com|title=PNG stands firm on Paris Agreement &#124; Loop PNG|access-date=June 10, 2017|archive-url=https://web.archive.org/web/20190417112233/http://www.looppng.com/png-news/%E2%80%8Bpng-stands-firm-paris-agreement-60375|archive-date=April 17, 2019|url-status=live}}</ref>
      * {{flag|Philippines}} – In a statement, the climate body said the Philippines is "deeply troubled" by the withdrawal of the U.S. from the agreement and urged Trump to reconsider his decision.<ref>{{Cite web|url=https://www.philstar.com/headlines/2017/06/02/1706034/us-pull-out-paris-climate-deal-troubles-philippines|title=US pull out from Paris climate deal troubles Philippines|website=philstar.com|access-date=October 16, 2019|archive-url=https://web.archive.org/web/20191016172321/https://www.philstar.com/headlines/2017/06/02/1706034/us-pull-out-paris-climate-deal-troubles-philippines|archive-date=October 16, 2019|url-status=live}}</ref>
      * {{flag|Poland}} – Deputy Energy Minister [[Grzegorz Tobiszowski]] praised Trump's decision, while signing an agreement for a new coal power station in [[Jaworzno]].<ref name="nytimes1"/>
      * {{flag|Portugal}} – President [[Marcelo Rebelo de Sousa]] said that "climate change is a problem and denying, for political reasons, that that problem exists won't make it go away"; he also reiterated that Europe should remain a champion of the fight against climate change, "a just and real" cause.<ref name="TSF">{{cite news|url=http://www.tsf.pt/internacional/interior/marcelo-critica-medida-de-trump-8527219.html|title=Marcelo: "Negar as alterações climáticas não faz desaparecer o problema"|date=June 1, 2017|access-date=June 2, 2017|location=Lisbon|language=pt|trans-title=Marcelo: "Denying climate change won't make it go away"|newspaper=[[TSF (radio station)|TSF]]|archive-url=https://web.archive.org/web/20170603162634/http://www.tsf.pt/internacional/interior/marcelo-critica-medida-de-trump-8527219.html|archive-date=June 3, 2017|url-status=live}}</ref> During a visit to an [[Primary school|elementary school]], Prime Minister [[António Costa]] commented "it is a shame that President Trump did not attend this school and does not know what these children already know... that we only have one planet and that our first duty is to preserve it for future generations".<ref name="Público">{{cite news|url=https://www.publico.pt/2017/06/02/politica/noticia/antonio-costa-e-o-acordo-de-paris-e-pena-o-presidente-trump-nao-ter-frequentado-esta-escola-1774369|title=António Costa e o Acordo de Paris: "É pena o Presidente Trump não ter frequentado esta escola"|date=June 2, 2017|access-date=June 3, 2017|location=Lisbon|language=pt|trans-title=António Costa and the Paris Agreement: "A shame President Trump did not attend this school"|newspaper=[[Público (Portugal)|Público]]|archive-url=https://web.archive.org/web/20170602170310/https://www.publico.pt/2017/06/02/politica/noticia/antonio-costa-e-o-acordo-de-paris-e-pena-o-presidente-trump-nao-ter-frequentado-esta-escola-1774369|archive-date=June 2, 2017|url-status=live}}</ref>
      * {{flag|Romania}} – The Foreign Affairs Minister ratified the Paris Agreement the same day.<ref>{{Cite web|url=https://www.romania-insider.com/romania-ratifies-paris-agreement-day-trump-withdraws|title=Romania ratifies Paris Agreement the same day Trump withdraws|website=Romania Insider|date=June 6, 2017 |access-date=November 11, 2017|archive-url=https://web.archive.org/web/20171111205553/https://www.romania-insider.com/romania-ratifies-paris-agreement-day-trump-withdraws/|archive-date=November 11, 2017|url-status=live}}</ref>
      * {{flag|Russia}} – In advance of Trump's expected withdrawal announcement, Kremlin spokesman [[Dmitry Peskov]] reiterated Russia's support for the Paris agreement.<ref>{{Cite news|url=https://www.independent.co.uk/environment/russia-paris-agreement-climate-change-donald-trump-us-decision-global-warming-moscow-putin-a7766481.html|title=Russia backs the Paris agreement on climate change as Donald Trump set to announce US decision|date=June 2, 2017|work=The Independent|access-date=September 17, 2017|archive-url=https://web.archive.org/web/20170923224140/http://www.independent.co.uk/environment/russia-paris-agreement-climate-change-donald-trump-us-decision-global-warming-moscow-putin-a7766481.html|archive-date=September 23, 2017|url-status=live}}</ref> After the withdrawal, when questioned by media sources about his views of the decision Putin stated "don't worry, be happy".<ref>{{cite news|title=Putin: 'Don't worry, be happy' as Trump ditches climate|url=http://www.aljazeera.com/news/2017/06/putin-don-worry-happy-trump-ditches-climate-170602234633815.html|access-date=June 3, 2017|publisher=Al Jazeera|agency=AP News Agency|date=June 3, 2017|archive-url=https://web.archive.org/web/20170603032928/http://www.aljazeera.com/news/2017/06/putin-don-worry-happy-trump-ditches-climate-170602234633815.html|archive-date=June 3, 2017|url-status=live}}</ref> He noted that since the non-binding agreement is not set to take effect until 2021, he believes there is plenty of time to create a working solution to global warming.<ref name="reevell">{{cite news|last1=Reevell|first1=Patrick|title=Putin on Trump's withdrawal from Paris Accord: 'Don't worry, be happy'|url=https://abcnews.go.com/International/putin-trumps-withdrawal-paris-accord-dont-worry-happy/story?id=47790010|access-date=June 3, 2017|work=ABC News|date=June 2, 2017|archive-url=https://web.archive.org/web/20170602221048/https://abcnews.go.com/International/putin-trumps-withdrawal-paris-accord-dont-worry-happy/story?id=47790010|archive-date=June 2, 2017|url-status=live}}</ref>
      * {{flag|Singapore}} – The government reaffirmed the commitment to Paris climate agreement.<ref>{{Cite web|url=https://www.straitstimes.com/singapore/environment/singapore-reaffirms-commitment-to-paris-climate-agreement-after-us-pulls-out|title=Singapore reaffirms commitment to Paris climate agreement after US pulls out of pact|date=June 2, 2017|website=The Straits Times|access-date=October 16, 2019|archive-url=https://web.archive.org/web/20191016150333/https://www.straitstimes.com/singapore/environment/singapore-reaffirms-commitment-to-paris-climate-agreement-after-us-pulls-out|archive-date=October 16, 2019|url-status=live}}</ref>
      * {{flag|Slovenia}} – The government regretted the withdrawal of the U.S. from the Paris Climate Agreement.<ref>{{Cite web |url=http://www.vlada.si/en/media_room/government_press_releases/press_release/article/slovenia_regrets_the_withdrawal_of_the_usa_from_the_paris_climate_agreement_59925/ |title=Slovenia regrets the withdrawal of the USA from the Paris Climate Agreement |work=vlada.si |date=June 2, 2017 |access-date=November 11, 2017 |archive-url=https://web.archive.org/web/20180919115334/http://www.vlada.si/en/media_room/government_press_releases/press_release/article/slovenia_regrets_the_withdrawal_of_the_usa_from_the_paris_climate_agreement_59925/ |archive-date=September 19, 2018 |url-status=dead }}</ref>
