      According to a report by Reuters, the US ran a [[Propaganda in the United States|propaganda]] campaign to spread disinformation about the [[Sinovac Biotech|Sinovac]] Chinese [[COVID-19]] vaccine, including using fake social media accounts to spread the disinformation that the Sinovac vaccine contained pork-derived ingredients and was therefore ''[[haram]]'' under [[Sharia|Islamic law]].<ref name="Bing-2024b">{{Cite news|last1=Bing|first1=Chris|last2=Schechtman|first2=Joel|date=14 June 2024|title=Pentagon Ran Secret Anti-Vax Campaign to Undermine China during Pandemic|url=https://www.reuters.com/investigates/special-report/usa-covid-propaganda/|work=[[Reuters]]}}</ref> The campaign was described as "payback" for [[COVID-19 misinformation by China|COVID-19 disinformation by China]] directed against the U.S.<ref>{{Cite web|last=Toropin|first=Konstantin|date=14 June 2024|title=Pentagon Stands by Secret Anti-Vaccination Disinformation Campaign in Philippines After Reuters Report|url=https://www.military.com/daily-news/2024/06/14/pentagon-stands-secret-anti-vaccination-disinformation-campaign-philippines-after-reuters-report.html|url-status=live|archive-url=https://web.archive.org/web/20240614223757/https://www.military.com/daily-news/2024/06/14/pentagon-stands-secret-anti-vaccination-disinformation-campaign-philippines-after-reuters-report.html|archive-date=14 June 2024|access-date=19 June 2024|website=[[Military.com]]}}</ref> The campaign primarily targeted people in the [[Philippines]] and used a social media [[hashtag]] for "China is the virus" in [[Tagalog language|Tagalog]].<ref name="Bing-2024b" /> The campaign ran from the spring of 2020 to mid-2021.<ref name="Bing-2024b" />
       
      === Clean energy and climate change ===
      The United States and China are the highest greenhouse gas emitters among developed countries and developing countries, respectively.<ref name="Lewis-2023" />{{Rp|page=82}} Clean energy and climate cooperation were generally viewed by both China and the US as a relative safe harbor for cooperation, even during many of the most contentious periods in the bilateral relationship.<ref name="Lewis-2023" />{{Rp|pages=81–82}} A record number of bilateral cooperation agreements, including related to climate issues, were signed during the tenure of U.S. President Barack Obama.<ref name="Lewis-2023" />{{Rp|page=2}}
       
      However, cooperation on clean energy and climate change issues were also limited by lack of consistent funding and lack of dialogue at high political levels,<ref name="Lewis-2023" />{{Rp|page=94}} and ended almost entirely after U.S. President Donald Trump de-prioritized environmental issues during his term.<ref name="Lewis-2023" />{{Rp|page=108}} The subsequent Joseph Biden administration ended the U.S.-China Clean Energy Research Center (CERC) established under Obama.<ref name="Lewis-2023" />{{Rp|page=98}} CERC had been the most ambitious clean energy cooperation platform between the two countries,<ref name="Lewis-2023" />{{Rp|page=117}} and one of the few cooperation mechanisms to have survived the Trump administration.<ref name="Lewis-2023" />{{Rp|page=98}}
       
      In the US and China's Sunnylands Summit on 8 June 2013, President Obama and President [[Xi Jinping]] worked in accordance for the first time, formulating a landmark agreement to reduce both production and consumption of [[hydrofluorocarbons]] (HFCs). This agreement had the unofficial goal of decreasing roughly 90 gigatons of {{CO2}} by 2050 and implementation was to be led by the institutions created under the [[Montreal Protocol]], while progress was tracked using the reported emissions that were mandated under the [[Kyoto Protocol]]. The Obama administration viewed HFCs as a "serious climate mitigation concern."<ref>{{Cite news|url=https://obamawhitehouse.archives.gov/the-press-office/2013/06/08/united-states-and-china-agree-work-together-phase-down-hfcs|title=United States and China Agree to Work Together on Phase Down of HFCs|date=8 June 2013|work=[[White House]]|access-date=16 November 2018}}</ref><ref>{{cite web|title=Sunnylands Statement on Enhancing Cooperation to Address the Climate Crisis|url=https://www.state.gov/sunnylands-statement-on-enhancing-cooperation-to-address-the-climate-crisis/|website=US Department of State|publisher=United States Government|access-date=15 November 2023}}</ref><ref>{{cite news|title=China, U.S. release statement on enhancing cooperation to address climate crisis|url=https://english.news.cn/20231115/f83e897bf1e94c33943533fc73d5e3f1/c.html|access-date=15 November 2023|agency=Xinhua|date=15 November 2023}}</ref>

      On 18 July 2023, U.S. climate envoy John Kerry emphasized the goal of redefining the China-U.S. relationship through climate cooperation. The subsequent day's discussions centered on climate financing, coal consumption, and methane reduction. Kerry's visit signifies the renewed focus on high-level climate diplomacy between the two nations.<ref>{{Cite news|last= Volcovici|first= Valerie|date=18 July 2023|title= US envoy Kerry says climate cooperation could redefine US-China ties |work=Reuters|url= https://www.reuters.com/world/us-climate-envoy-kerry-meets-chinas-top-diplomat-wang-yi-2023-07-18/ |access-date=25 July 2023}}</ref>

      == Cultural relations ==
      The United States used to have substantial soft power in China. However, with China's rise in the 21st century, American culture has declined in popularity in China.<ref>{{Cite news |title=The United States used to have cachet in China. Not anymore. |url=https://www.washingtonpost.com/world/2024/05/14/china-united-states-soft-power/ |newspaper=Washington Post}}</ref>
       
      === Cuisine ===
      {{See also|American Chinese cuisine}}
       
      === Sports ===
      {{See also|Ping-pong diplomacy|Baseball in China}}
       
      A major element of China's modern sports policy is to surpass other nations, particularly the United States, in Olympic gold medals. In the 2024 Olympics, the two countries tied at 40 gold medals.<ref>{{Cite web |title=Gold Medal Rivalry: For China and the US, the Olympics Are Than Just Sport |url=https://thediplomat.com/2024/08/gold-medal-rivalry-for-china-and-the-us-the-olympics-are-more-than-just-sport/ |access-date=16 November 2024 |website=The Diplomat}}</ref>
       
      === Education ===
      Chinese students constitute about one-quarter of international students in the US, second largest after Indians, contributing significantly to university funding. While many return to China after graduation, science and engineering doctorate holders often remain in the U.S.<ref>{{Cite web |date=20 March 2025 |title=China calls for protections for students in US after congressional panel demands data from colleges |url=https://apnews.com/article/china-us-students-technology-security-d6895c64e0f314fbc7138e96709f0d7d |access-date=25 March 2025 |website=AP News}}</ref> The number of Chinese students in the U.S. peaked in 2019–2020 at 372,532, and has been declining significantly since.<ref name=":5">{{Cite news |last=Han |first=Bochen |date=18 November 2024 |title=As number of Chinese students in U.S. keeps falling, Indians move to top of list |url=https://www.scmp.com/news/china/article/3286834/number-chinese-students-us-keeps-falling-indians-move-top-list |access-date=20 March 2025 |work=[[South China Morning Post]]}}</ref>
       
      In May 2025, United States Secretary of State [[Marco Rubio]] announced the U.S. government would "aggressively revoke visas for Chinese students, including those with connections to the [[Chinese Communist Party]] or studying in critical fields". He also announced the U.S. would increase scrutiny of all future visa applications from China and Hong Kong.<ref>{{Cite news |last1=Chazan |first1=Guy |last2=Sevastopulo |first2=Demetri |last3=Stacey |first3=Stephanie |last4=Fedor |first4=Lauren |last5=Pooler |first5=Michael |date=29 May 2025 |title=US to 'aggressively' revoke visas of Chinese students |url=https://www.ft.com/content/6628727d-69b6-4d45-938f-0c45578f4599 |access-date=30 May 2025 |work=[[Financial Times]]}}</ref>
       
      == Public perceptions ==
      [[File:Governor Newsom met with Xi Jinping in Beijing 20231025 (3).jpg|thumb|[[California]]'s Governor [[Gavin Newsom]] with Chinese leader [[Xi Jinping]] on 25 October 2023. Newsom called for better relations between the U.S. and China.<ref>{{Cite news|last1=Toh|first1=Michelle|last2=Lilieholm|first2=Lucas|date=26 October 2023|title='Divorce is not an option' for US and China, Newsom says after Xi meeting|work=[[CNN]]|url=https://edition.cnn.com/newsom-xi-meeting-us-china-intl-hnk/index.html}}</ref>]]
      Despite tensions during Barack Obama's presidency, the Chinese population's favorability of the U.S. stood at 51% in Obama's last year of 2016, only to fall during the [[First presidency of Donald Trump|Trump administration]].<ref>{{Cite web|title=Global Indicators Database|url=https://www.pewresearch.org/global/database/indicator/1/country/cn|website=Pew Research Center|date=17 November 2010}}</ref><ref name="bbcpoll">{{cite web|date=30 June 2017|title=BBC World Service poll (page 8)|url=http://www.globescan.com/images/images/pressreleases/bbc2017_country_ratings/BBC2017_Country_Ratings_Poll.pdf|url-status=dead|archive-url=https://web.archive.org/web/20210608143515/https://globescan.com/images/images/pressreleases/bbc2017_country_ratings/BBC2017_Country_Ratings_Poll.pdf|archive-date=8 June 2021|access-date=6 July 2018|website=[[GlobeScan]]|agency=BBC}}</ref> According to a 2025 poll by the [[Chicago Council on Global Affairs]] and the [[Carter Center]], 17% of Chinese people consider the US to be a friend of China, while 83% do not.<ref>{{Cite web |last=Dina Smeltz |first=Sam Dong |date=2 September 2025 |title=Friends with Benefits: Chinese See Russia and North Korea as Beijing's Closest Comrades |url=https://globalaffairs.org/research/public-opinion-survey/friends-benefits-chinese-see-russia-and-north-korea-beijings-closest |access-date=22 October 2025 |website=Chicago Council on Global Affairs}}</ref>
       
      American public opinion of China and of [[General secretary of the Chinese Communist Party]] [[Xi Jinping]] has deteriorated sharply since the start of the [[China–United States trade war]] and during the [[COVID-19 pandemic]], with many expressing economic, human-rights, and environmental concerns.<ref>{{cite news|date=April 2020|title=Americans take an ever more negative view of China|newspaper=[[The Economist]]|url=https://www.economist.com/graphic-detail/2020/04/21/americans-take-an-ever-more-negative-view-of-china|access-date=23 April 2020}}</ref><ref>{{cite news|date=21 April 2020|title=Amid Coronavirus Outbreak, Americans' Views of China Increasingly Negative|work=Pew Research Center's Global Attitudes Project|url=https://www.pewresearch.org/global/2020/04/21/u-s-views-of-china-increasingly-negative-amid-coronavirus-outbreak/|access-date=23 April 2020}}</ref>
       
      In 2024, 81% of U.S. adults viewed China unfavorably, according to the [[Pew Research Center]].<ref>{{Cite web |date=1 May 2024 |title=Americans Remain Critical of China |url=https://www.pewresearch.org/global/2024/05/01/americans-remain-critical-of-china/ |access-date=1 November 2024 |website=[[Pew Research Center]]}}</ref> In 2023, a [[Gallup, Inc.|Gallup]] survey showed above 50% Americans are most likely to mention China as the United States' greatest enemy in the world since 2021.<ref>{{Cite web|date=6 March 2023|title=Americans Continue to View China as the U.S.'s Greatest Enemy|url=https://news.gallup.com/poll/471494/americans-continue-view-china-greatest-enemy.aspx|access-date=21 March 2023 |website=Gallup.com}}</ref>
      In 2024, that percentage dropped to 41 percent, yet China remained the biggest enemy.<ref>{{cite news |title=Americans Still See China as Nation's Top Foe, Russia Second |url=https://news.gallup.com/poll/612170/americans-china-nation-top-foe-russia-second.aspx |date=18 March 2024}}</ref>
      A February 2023 Gallup survey found that a record-low 15% of Americans view China favorably, marking a five-percentage-point, one-year decline in this rating, which Gallup has measured since 1979.<ref>Gan, N. (9 March 2023). [https://us.cnn.com/2023/03/08/china/china-budget-diplomatic-expenditure-intl-hnk China ups diplomatic offensive with drastic increase in budget – and hardened stance on US.] CNN. Retrieved 2 May 2023; Brenan, M. (7 March 2023). [https://news.gallup.com/poll/471551/record-low-americans-view-china-favorably.aspx Record-low 15% of Americans view China favorably.] Gallup. Retrieved 2 May 2023.</ref> A 2025 poll by the [[Chicago Council on Global Affairs]] found that Americans' perceptions of China improved after several years of decline. The poll found that 53 percent of Americans believe the United States should undertake friendly cooperation and engagement with China, while 44 percent saying that the US should actively work to limit the growth of China's power; the share of Democrats and Independents who believe America should work with China increased significantly.<ref>{{Cite web |last=Kafura |first=Craig |date=28 October 2025 |title=Americans Reverse Course on US-China Competition |url=https://globalaffairs.org/research/public-opinion-survey/americans-reverse-course-us-china-competition |access-date=29 October 2025 |website=Chicago Council on Global Affairs}}</ref>
       
      Despite the mutually negative views, the public on both sides overwhelmingly want the relationship to improve.<ref>{{Cite web|date=April 2022|title=The State of U.S.-China Relations|url=https://go.morningconsult.com/rs/850-TAA-511/images/220411_US-China-Relations.pdf|access-date=29 August 2022|website=Morning Consult}}</ref><ref>{{Cite web|date=18 April 2022|title=Navigating U.S.-China Relations: What American and Chinese Multinationals Need to Know|url=https://morningconsult.com/2022/04/18/navigating-u-s-china-relations/|access-date=29 August 2022|website=Morning Consult}}</ref> Two-thirds of U.S. respondents in a [[The Harris Poll|Harris poll]] published in 2023 agreed that the U.S. should "engage in dialogue as much as possible to reduce tensions" with China.<ref name="Echols-2023">{{Cite web|last=Echols|first=Connor|date=6 February 2023|title=Americans far less hawkish on North Korea and China than policy elites: poll|url=https://responsiblestatecraft.org/2023/02/06/americans-far-less-hawkish-on-north-korea-and-china-than-policy-elites-poll/|access-date=24 February 2023|website=Responsible Statecraft}}</ref> U.S. public support for engaging in dialogue increased by five percentage points since 2021.<ref name="Echols-2023" /> According to 2023 polling by ''[[The Economist]]'' and [[YouGov]], Americans aged 18–44 are much more likely than older age groups to have a friendly view of China.<ref>{{Cite news |title=Younger Americans are friendlier to China |newspaper=The Economist |date=23 March 2023 |url=https://www.economist.com/united-states/2023/03/23/younger-americans-are-friendlier-to-china |url-status=live |access-date=27 December 2023 |archive-url=https://archive.today/20230323153105/https://www.economist.com/united-states/2023/03/23/younger-americans-are-friendlier-to-china |archive-date=23 March 2023 |issn=0013-0613}}</ref>
       
