      == Regional Groups ==
      [[File:UN regional groups.svg|thumb|300px| {{Legend|#0000ff|African Group}}
      {{Legend|#339900|Asia-Pacific Group}}
      {{Legend|#cc0000|Eastern European Group}}
      {{Legend|#cc3399|Latin American and Caribbean Group (GRULAC)}}
      {{Legend|#cc9900|Western European and Others Group}}
      {{Legend|#000000|UN member not in any voting group}}
      {{Legend|#00ff00|Observer states}}
      {{Legend|#c0c0c0|Non-UN state or territory}}]]

      The ten non-permanent seats have the following distribution:
      * [[African Group]]: 3 members
      * [[Group of Asia and the Pacific Small Island Developing States|Asia-Pacific Group]]: 2 members
      * [[Eastern European Group]]: 1 member
      * [[Latin American and Caribbean Group|Latin American and Caribbean Group (GRULAC)]]: 2 members
      * [[Western European and Others Group|Western European and Others Group (WEOG)]]: 2 members

      In addition, one of the five African/Asian seats is an [[Arab country]], alternating between the two groups. This rule was added in 1967 for it to be applied beginning with 1968.

      ;Electoral timetable
      {| class="wikitable"
      |-
      ! Term beginning in years that are: !! style="text-align:center;"|Odd!! style="text-align:center;"|Even
      |-
      |[[African Group]]||one member||two members *
      |-
      |[[Group of Asia and the Pacific Small Island Developing States|Asia-Pacific Group]]||one member||one member *
      |-
      |[[Eastern European Group]]||none ||one member
      |-
      |[[Latin American and Caribbean Group|Latin American and Caribbean Group (GRULAC)]] ||one member||one member
      |-
      |[[Western European and Others Group]] ||two members||none
      |}
      <nowiki>*</nowiki> The representative of Arab nations alternates between these two spaces.

      The odd/even distribution was effectively decided by the [[January 1946 United Nations Security Council election|January 1946]] and [[1965 United Nations Security Council election|1965]] elections (the first ever election, and the first election after the expansion of seats). For each of the six and four members in the newly created seats, the UN General Assembly voted to grant either a 1-year or 2-year term.

      == Previous Security Council composition ==
      From 1946 to 1965, the Security Council had six non-permanent members. Due to a lack of African and Asian member states, the seats had the following distribution:
      * Latin America: 2 members
      * [[Commonwealth of Nations]]: 1 member
      * Eastern Europe: 1 member
      * Middle East: 1 member
      * Western Europe: 1 member

      As [[decolonization]] increased the number of Asian and African member states without a group, they began to contest other seats: [[Ivory Coast]] substituted a member of the Commonwealth in 1964–1965, the Eastern European seat regularly included Asian countries from 1956, [[Liberia]] took the place of a Western European country in 1961, and [[Mali]] successfully contested the Middle Eastern seat in December 1964 (the Security Council would be expanded before Mali's term began).

      An [[Amendments to the United Nations Charter|amendment to the UN Charter]] ratified in 1965 increased the number of non-permanent seats to 10, and the Regional Groups were formally applied to the seats. The amendment effectively created three African seats and one Asian seat (if treating the Commonwealth seat as a WEOG seat and the Middle Eastern seat as an Asian seat{{efn|In practice, the Commonwealth seat was by then treated as a ''de facto'' African seat.<ref name="thegreenpapers"/>}}).

