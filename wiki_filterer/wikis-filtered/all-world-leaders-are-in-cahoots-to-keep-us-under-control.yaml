      The '''presidency of the United Nations Security Council''' is responsible for leading the [[United Nations Security Council]]. It rotates among the fifteen member-states of the council monthly. The head of the country's delegation is known as the '''president of the United Nations Security Council'''. The presidency has rotated every month since its establishment in 1946,<ref>{{Cite web|title=Security Council Presidency {{!}} United Nations Security Council|url=https://www.un.org/securitycouncil/content/presidency|access-date=2021-03-07|website=www.un.org}}</ref> and the president serves to coordinate actions of the council, decide policy disputes, and sometimes functions as a diplomat or intermediary between conflicting groups.

      ==Role==
      [[File:UN-Sicherheitsrat - UN Security Council - New York City - 2014 01 06.jpg|thumb|The [[United Nations Security Council]] chamber in [[New York City]]]]
      The presidency derives responsibility from the Provisional Rules of Procedure of the United Nations Security Council as well as the council's practice.{{Sfn|Pogany|1982|p=231}} The role of the president involves calling the meetings of the Security Council,<ref>Provisional Rules of Procedure of the United Nations Security Council, [https://www.un.org/en/sc/about/rules/chapter1.shtml Chapter I, Rules 1 and 2] {{Webarchive|url=https://web.archive.org/web/20170630042747/http://www.un.org/en/sc/about/rules/chapter1.shtml |date=30 June 2017 }}</ref> approving the provisional agenda (proposed by the [[Secretary-General of the United Nations|secretary-general]]),<ref>Provisional Rules of Procedure of the United Nations Security Council, [https://www.un.org/en/sc/about/rules/chapter2.shtml Chapter II, Rule 7] {{Webarchive|url=https://web.archive.org/web/20170630065258/http://www.un.org/en/sc/about/rules/chapter2.shtml |date=30 June 2017 }}</ref> presiding at its meetings,<ref>Provisional Rules of Procedure of the United Nations Security Council, [https://www.un.org/en/sc/about/rules/chapter4.shtml Chapter IV, Rule 19] {{Webarchive|url=https://web.archive.org/web/20170630071835/http://www.un.org/en/sc/about/rules/chapter4.shtml |date=30 June 2017 }}</ref> deciding questions relating to policy{{Sfn|Sievers|Daws|2015|p=120}} and overseeing any crisis. The president is authorized to issue both [[Presidential Statement]]s<ref>{{Cite web |url=https://www.un.org/Docs/sc/unsc_pres_statements08.htm |title=UN Security Council: Presidential Statements 2008 |access-date=29 June 2017 |archive-url=https://web.archive.org/web/20120811210203/http://www.un.org/Docs/sc/unsc_pres_statements08.htm |archive-date=11 August 2012 |url-status=live }}</ref> (subject to consensus among Council members) and notes,<ref>{{Cite web |url=https://www.un.org/Docs/sc/notes/PresidentialNotesEng.htm |title=Notes by the president of the Security Council |access-date=29 June 2017 |archive-url=https://web.archive.org/web/20120330212749/http://www.un.org/Docs/sc/notes/PresidentialNotesEng.htm |archive-date=30 March 2012 |url-status=live }}</ref> which are used to make declarations of intent that the full Security Council can then pursue.<ref name="un.org">{{cite web|url=https://www.un.org/Docs/sc/unsc_pres_statements08.htm|title=UN Security Council: Presidential Statements 2008|publisher=United Nations|access-date=9 June 2012}}</ref> The president is also responsible for reading statements of the Security Council to the press. The holder of the presidency is considered to be the 'face' and spokesperson of the [[United Nations Security Council|UNSC]].{{Sfn|Sievers|Daws|2015|pp=119, 124}} The holder of the presidency may appeal to parties in a conflict to "exercise restraint".{{Sfn|Pogany|1982|p=233}}

      The president represents the Security Council before other [[United Nations organs]] and member states. They also call upon members to speak, send applicants for United Nations membership to a committee of the UNSC and decide voting order.{{Sfn|Pogany|1982|p=232}} Particularly after the end of the [[Cold War]], the president has worked to coordinate the UNSC with other organs.{{Sfn|Sievers|Daws|2015|pp=111}} The president has authority to rule upon [[points of order]], which can be put to a vote if a member of the council challenges it.{{Sfn|Pogany|1982|p=233}} They also name members of various subsidiary organs, and are generally responsible for maintaining order.{{Sfn|Pogany|1982|p=234}} Since November 2000, the president has generally prepared background papers for the topic being discussed.{{Sfn|Sievers|Daws|2015|p=119}}

      The president also continues to represent their state. If their nation is involved in a conflict the UNSC is discussing, they are expected to temporarily step down.{{Sfn|Pogany|1982|p=234}} Conversely, because the presidency rotates monthly, all nations on the UNSC can evenly emphasize issues important to them.{{Sfn|Sievers|Daws|2015|p=112}} Most non-permanent states hold the presidency once or twice during their two-year terms; [[Burkina Faso]] changed its name from [[Republic of Upper Volta|Upper Volta]] in August 1984 during its term, and held it three times.{{Sfn|Sievers|Daws|2015|p=114}} The president often makes a distinction between when they are speaking as the president and as the representative of their state.{{Sfn|Nicol|1981|p=11}}

      [[Davidson Nicol]], an academic, writes that:
      {{Blockquote|text=Although the role of the President should not be exaggerated, the work of the Council, its reputation and that of the United Nations are very much affected by the calibre and style of the individual who presides over the organ having responsibility for international peace and security. . . The Security Council is the pivot of the United Nations in efforts to maintain and enhance international peace and security. The major function of its President should be to guide it effectively and expeditiously toward this noble goal.{{Sfn|Nicol|1981|pp=32,34}}|title=|source=}}

      ===Identity===
      The [[Permanent Representative|permanent representative]] (ambassador) of the state to the security council is usually the president of the council,{{Sfn|Pogany|1982|p=232}} but the presidency is technically given to a state and not a person.{{Sfn|Sievers|Daws|2015|p=112}} For example, in January 2000, a month in which the United States held the presidency of the Security Council,<ref name="naughts" /> [[Vice President of the United States|U.S. vice president]] [[Al Gore]] headed the United States delegation to the United Nations for a few days. As a result, Gore was the president of the Security Council during this time.<ref>{{Cite news|last=Crossette|first=Barbara|url=https://www.nytimes.com/2000/01/11/world/gore-presides-over-rare-security-council-debate-on-aids.html|title=Gore Presides Over Rare Security Council Debate on AIDS|date=11 January 2000|work=The New York Times|access-date=25 April 2020|issn=0362-4331}}</ref> Heads of state have met six times at the UNSC.<ref>{{Cite web|url=https://obamawhitehouse.archives.gov/blog/2014/09/24/president-obama-chairs-un-security-council-meeting-foreign-terrorist-fighters|title=President Obama Chairs the U.N. Security Council Meeting on Foreign Terrorist Fighters|date=24 September 2014|publisher=White House|access-date=26 April 2020}}</ref> All members of the council, including the president, must present credentials issued by; the head of state, the head of government, or the minister of foreign affairs of their respective states to the [[Secretary-General of the United Nations|secretary-general]], except if the representative is also the head of government or minister of foreign affairs.<ref>Provisional Rules of Procedure of the United Nations Security Council, [https://www.un.org/en/sc/about/rules/chapter4.shtml Chapter III, rule 13] {{Webarchive|url=https://web.archive.org/web/20170630071835/http://www.un.org/en/sc/about/rules/chapter4.shtml|date=30 June 2017}}</ref>

      ==Rotation==
      The [[United Nations Charter]] mentions the presidency once,{{Sfn|Nicol|1981|p=6}} stating that the Security Council is empowered to establish rules of procedure, "including the method of selecting its president" in Article 30.<ref>[[United Nations Charter]], [https://www.un.org/en/documents/charter/chapter5.shtml ch. V] {{Webarchive|url=https://web.archive.org/web/20131001102526/http://www.un.org/en/documents/charter/chapter5.shtml|date=1 October 2013}}, s. 30.</ref> At its first meeting on 17 January 1946, the UNSC adopted provisional rule 18 and established that the presidency would rotate monthly among all the members of the Security Council, with no distinction between permanent and non-permanent members. The rotation takes place in alphabetical order of the member states' official names in English. French was originally proposed as the source of the order, based on its predecessor, the [[Council of the League of Nations]], but English was picked by the Executive Committee of the UN Preparatory Commission, despite reservations that three permanent members could serve in order (the USSR, United States, and United Kingdom).{{Sfn|Sievers|Daws|2015|p=112}} As such, Australia was the first nation to hold the presidency.{{Sfn|Nicol|1981|pp=6–7}}<ref>Provisional Rules of Procedure of the United Nations Security Council, [https://www.un.org/en/sc/about/rules/chapter4.shtml Chapter IV, rule 18] {{Webarchive|url=https://web.archive.org/web/20170630071835/http://www.un.org/en/sc/about/rules/chapter4.shtml|date=30 June 2017}}</ref>{{Sfn|Pogany|1982|p=232}} Such rotation makes the presidency unique among all United Nations organs.{{Sfn|Sievers|Daws|2015|p=112}} The president of the UNSC is the only non-elected head of a [[Organs of the United Nations|United Nations organ]].{{Sfn|Nicol|1981|pp=6–7}}{{Sfn|Sievers|Daws|2015|p=113}}

      The president of the Security Council may optionally [[recusal|recuse]] themselves when the Security Council debates a question directly connected to the president's nation. For example, [[Cape Verde]] served as president in November 1993, but temporarily stepped down for part of the day on 10 November 1993 while the UN General Assembly and Security Council conducted an election to the [[International Court of Justice]] where Cape Verde was running for a seat. The Security Council member next in line, China, temporarily served as president during the election.<ref>{{cite web | url=http://www.un.org/Depts/dhl/resguide/scpres1990.htm | archive-url=https://web.archive.org/web/20121018015052/http://www.un.org/Depts/dhl/resguide/scpres1990.htm | archive-date=18 October 2012 | title=Presidents (1990-1999) : Security Council (SC) : United Nations (UN) }}</ref>

      ===Changes===
      Due to the UNSC's first meeting being on a 17 January, terms initially began on the 17th of every month. Since there were eleven members on the Security Council at the time, the last member in alphabetical order, the United States, was due to end its first term on 16 December 1946. It was suggested by Australia that month to extend the term to 31 December 1946 so that all future rotations of the presidency would occur on the first of every month ([[United Nations Security Council Resolution 14]]).

      As a result, the first year of operation of the Security Council had all eleven members serve as president exactly once, the United States became the only member to serve a term longer than one month, and all future years that had an eleven-member Security Council would have one member serve twice for the January and December months.

      On 1 January 1966, the Security Council was expanded to fifteen members, and no future members would serve as president more than once in a year barring exceptional circumstances.

      == Function ==
      In 1981, [[Sydney D. Bailey]], an observer of the United Nations, divided the history of the UNSC into three eras; from 1946 to 1955, 1956–1965, and 1966 to 1981. In the first, presidents often acted on their own initiative without consulting the security council. During the second era, the security council was less involved in affairs relating to the Cold War, adopting the slogan "Leave it to [[Dag Hammarskjöld|Dag [Hammarskjöld]]]". From 1966 to 1981, the president began informally discussing matters before holding formal sessions and generally becoming more efficient.{{Sfn|Bailey|1981|p=|pp=38–39, 41}}

      === Early function ===
      [[File:Dmitry Manuilsky.PNG|thumb|[[Dmitry Manuilsky]]]]
      In 1947 and 1948, the UNSC was involved in the [[Israeli Declaration of Independence|independence of Israel]] and the ensuing [[1947–1949 Palestine war]]. In July 1948, the [[Ukrainian Soviet Socialist Republic]] held the presidency. The council met on 7 July upon the request of a United Nations mediator, to consider whether it should promote peace. The UNSC had previously invited representatives of the [[Arab Higher Committee]] and the Jewish Agency of Palestine to discuss the issue.{{Sfn|Pogany|1982|p=|pp=237–243}}

      [[Dmitry Manuilsky]], the president in July, addressed the Jewish Agency as 'the representative of the State of Israel'. However, the UNSC had not formally recognized the state. Various member-states criticized his action, and only the United States supported it. In response, the Arab Higher Committee representatives left discussions, and did not return, hindering the UNSC's ability to negotiate the matter. Historian [[Istvan Pogany]] considers that "the President deliberately abused his office in order to further the objectives of his government."{{Sfn|Pogany|1982|p=|pp=237–243}}

      In 1948, the president informally engaged in diplomacy several times, the first in January 1948, when the Belgian president requested that India and Pakistan "refrain from any step incompatible with the Charter and liable to result in an aggravation of the situation". In April, the Colombian president met with representatives of the Jewish Agency and Arab Higher Committee to discuss possible terms for peace. Later that year, the Argentinian president established a 'Technical Committee on Berlin Currency and Trade'.{{Sfn|Sievers|Daws|2015|p=121-122}} In August 1950, [[Sydney D. Bailey]] writes that the holder of the presidency, the Soviet Union, manipulated "the procedure of the Council for partisan purposes during debates on Korea".{{Sfn|Bailey|1981|p=39|pp=}}

      The president has also formally negotiated on behalf of the UNSC several times. In February 1957, upon the request of the UNSC, then-president [[Gunnar Jarring]] of Sweden prepared a report on [[India–Pakistan relations]]. He consulted with both nations and discussed many potential solutions to their disagreements, none of which were agreed upon. Such actions have generally not been requested since the 1970s. The president will also manage less formal negotiations upon request of the council.{{Sfn|Sievers|Daws|2015|p=121-122}}

      === Later function ===
      [[File:Jiang Tingfu.jpg|thumb|150px|Tsiang held the presidency 16 times, starting in 1948 and ending in 1962.]]
      In a 31 March 1976 meeting discussing South African aggression against [[Angola]], the meeting continued past midnight and it was technically 1 April. [[Thomas S. Boya]], the representative of [[Benin]] and president for March, offered to pass the presidency on to China. Though the meeting was adjourned before a decision was reached, it became established procedure for the president to step down exactly when the month elapsed. A similar case on 31 May 2010 resulted in [[Nawaf Salam]] of Lebanon giving the presidency to [[Claude Heller]] of Mexico.{{Sfn|Sievers|Daws|2015|p=113}}

      In September 1994, during the [[Rwandan genocide]], [[Rwanda]] was supposed to hold the presidency, but had not been present at Security Council meetings from 14 July. On 25 August, the Council decided to allow Spain to hold the position for September. A Rwandan delegation was again present on 16 September, and it was decided that the nation would hold the presidency in December.{{Sfn|Sievers|Daws|2015|p=114}} The presidency has been ceded several times. The first was from 10 to 12 January 1950, when the representative of [[Taiwan]] ceded to Cuba. The United States ceded in 1948, China in 1950, India in 1951, Lebanon in 1956, and the United Kingdom in 1968. On 10 November 1993 the representative of [[Cape Verde]], [[José Luís Jesus]], ceded to China as he was a candidate for election to the [[International Court of Justice]]; and on 15 December 1994 the Rwandan representative ceded to Argentina. Both the United States and [[Soviet Union]] refused requests to cede the presidency, the US during the [[Cold War]] and USSR during the [[Congo Crisis]].{{Sfn|Sievers|Daws|2015|p=115-116}}{{Sfn|Nicol|1981|p=13}}

      [[Taieb Slim]], the [[Tunisia]]n holder of the presidency in September 1980, asked [[Iran]] and [[Iraq]] to "desist from all armed activity and all acts that might worsen the dangerous situation and to settle their dispute by peaceful means."{{Sfn|Pogany|1982|p=233}} The presidency was reformed in a 2010 note revised its function, largely focusing on increasing transparency. Efforts at such reform had begun in the 1990s.{{Sfn|Sievers|Daws|2015|p=124-125}} There have been various other efforts to reform the position, such as allowing terms to be extended during times of war.{{Sfn|Nicol|1981|p=7}}

      Numerous people have served multiple times as president. The most times anyone has held the position is sixteen, by [[Tsiang Tingfu|T.F. Tsiang]], a representative of the Republic of China; the second-most was held by [[Yakov Malik]], a representative of the USSR, ten.{{Sfn|Nicol|1981|p=28}}

