      ====Secure hotels and secure zone====
      The town of Davos is designated as a high-security zone during the annual meeting, with extensive protective measures led by the Swiss authorities. Security operations include airspace monitoring, military deployments, and the protection of key sites and official delegations. The Swiss Armed Forces support the Canton of Graubünden with troops, infrastructure, and specialised units to safeguard participants and residents. Access to parts of the town is restricted, with secure hotels and controlled zones requiring specific accreditation to enter.<ref>{{cite web |title=World Economic Forum Annual Meeting: Security Deployment |url=https://www.admin.ch/gov/en/start/documentation/dossiers/wef.html |website=Swiss Federal Administration |access-date=29 November 2025}}</ref>

      A number of hotels in Davos are designated as "secure hotels", providing controlled access and heightened protection for heads of state, ministers and senior officials. The specific hotels receiving this status vary from year to year, but have included the Belvedere Hotel, the Alpengold Hotel (formerly the InterContinental), the Seehof Hotel, and the Hilton Garden Inn. These properties fall within the Secure Zone (Promenade 95 – 101) and require special accreditation for entry (Secure Hotel Badge), functioning as protected accommodation and meeting zones for official delegations during the World Economic Forum.<ref>{{cite web |title=Information: Hotel Badge & Security Zones 2025 |url=https://studiozx.de/content/uploads/2025/01/information-hotelbadge-2025.pdf |website=Studio ZX |access-date=29 November 2025}}</ref>

      ==== 2025 meeting ====
      The World Economic Forum 2025 took place in [[Davos]], Switzerland, from 20 to 24 January, under the theme '''Collaboration for the Intelligent Age'''.<ref>{{Cite web |date=20 January 2025 |title=Davos 2025: What to expect at this year's World Economic Forum |url=https://www.euronews.com/business/2025/01/20/davos-2025-what-to-expect-at-this-years-world-economic-forum |access-date=14 February 2025 |website=euronews |language=en}}</ref><ref>{{Cite news |title=World Economic Forum Davos meet begins with award for David Beckham, concert on Antarctica |url=https://www.telegraphindia.com/business/world-economic-forum-davos-meet-begins-with-award-for-david-beckham-concert-on-antarctica/cid/2078695 |archive-url=https://web.archive.org/web/20250124065213/https://www.telegraphindia.com/business/world-economic-forum-davos-meet-begins-with-award-for-david-beckham-concert-on-antarctica/cid/2078695 |archive-date=24 January 2025 |access-date=14 February 2025 |language=en |url-status=live}}</ref> The event brought together approximately 3,000 global leaders from over 125 countries, including 350 heads of state and government, business executives, policymakers, and representatives from international organizations.<ref>{{Cite web |last=|date=9 January 2024 |title=Rebuilding Trust: World Economic Forum Annual Meeting 2024 |url=https://moderndiplomacy.eu/2024/01/09/rebuilding-trust-world-economic-forum-annual-meeting-2024/ |access-date=14 February 2025 |website=moderndiplomacy.eu |language=en-US}}</ref> Discussions focused on [[Geopolitics|geopolitical stability]], economic resilience, [[climate change]],<ref>{{Cite news |last=Gelles |first=David |date=21 January 2025 |title=Leaders at Davos Economic Forum Vow to 'Stay the Course' on Climate Action |url=https://www.nytimes.com/2025/01/21/business/trump-climate-davos.html |access-date=14 February 2025 |work=The New York Times |language=en-US |issn=0362-4331}}</ref> [[artificial intelligence]] governance, and inclusive economic growth. Sessions covered topics such as the future of [[global trade]], [[energy transition]], and the impact of artificial intelligence and [[automation]] on the labor market. Several initiatives were introduced, including policy frameworks for AI regulation, [[Climate finance|climate financing]] mechanisms, and economic strategies for sustainable development.<ref>{{Cite web |title=Davos 2024: Key insights on navigating global business challenges |url=https://hrme.economictimes.indiatimes.com/news/industry/davos-2024-key-insights-on-navigating-global-business-challenges/107066898 |access-date=14 February 2025 |website=ETHR World|language=en}}</ref><ref>{{Cite magazine |last=Jacobs |first=Sam |date=16 January 2025 |title=WEF President on Planning for a 'Geopolitical Recession' |url=https://time.com/7204642/wef-president-borge-brende-davos-2025/ |access-date=14 February 2025 |magazine=TIME |language=en}}</ref>

      Among the initiatives discussed was the Global India Dialogues, launched by the [[Motwani Jadeja Foundation]], which focused on [[India]]’s role in global geopolitics, technology, and innovation.<ref>{{Cite web |date=11 February 2025 |title=Motwani Jadeja Foundation Facilitates Participation Of 10 Indian Innovators And Changemakers At Davos |url=https://www.etnownews.com/markets/motwani-jadeja-foundation-facilitates-participation-of-10-indian-innovators-and-changemakers-at-davos-article-118127361 |access-date=14 February 2025 |website=ET Now |language=en}}</ref><ref>{{Cite web |title=World Economic Forum 2024: Global Insights & India's Impact |url=https://www.investindia.gov.in/blogs/world-economic-forum-2024-global-insights-indias-impact |access-date=14 February 2025 |website=www.investindia.gov.in |language=en}}</ref> Discussions on [[Gender equality|gender equity]]<ref>{{Cite news |last=Banerjee |first=Chandrajit |date=12 February 2024 |title=A global alliance to bridge the gender equity gap |url=https://www.thehindu.com/opinion/op-ed/a-global-alliance-to-bridge-the-gender-equity-gap/article67838843.ece |access-date=14 February 2025 |work=The Hindu |language=en-IN |issn=0971-751X}}</ref> and economic inclusion were also highlighted through initiatives such as the '''Global Good Alliance for Gender Equity and Equality''', which explored the economic impact of investments in [[women's health]].<ref>{{Cite web |agency=ANI |date=27 January 2025 |title=Smriti Irani Leads a Transformative Gender Equity Agenda at Davos 2025 |url=https://theprint.in/ani-press-releases/smriti-irani-leads-a-transformative-gender-equity-agenda-at-davos-2025/2465403/ |access-date=14 February 2025 |website=ThePrint |language=en-US}}</ref><ref>{{Cite web |date=14 February 2025 |title=Women Inspiring Network (WIN) leads global dialogues at Davos 2025 during the World Economic Forum Week |url=https://www.businesstoday.in/wef-2025/story/women-inspiring-network-win-leads-global-dialogues-at-davos-2025-during-the-world-economic-forum-week-464735-2025-02-14 |access-date=14 February 2025 |website=Business Today |language=en}}</ref> The event featured key figures such as [[Ursula von der Leyen]], [[Antony Blinken]],<ref>{{Cite web |date=17 January 2024 |title=Gaza scenes are 'gutwrenching': US Secretary of State Antony Blinken at Davos |url=https://www.indiatoday.in/world/story/us-secretary-of-state-antony-blinken-gaza-israel-hamas-palestine-davos-world-economic-forum-2489954-2024-01-17 |access-date=14 February 2025 |website=India Today |language=en}}</ref> [[Christian Lindner]],<ref>{{Cite news |last=Arnold |first=Martin |date=19 January 2024 |title=Germany is the 'tired man' of Europe, says finance minister |url=https://www.ft.com/content/f6eb32e6-dd1d-4532-af2a-583b26597b99 |access-date=14 February 2025 |work=Financial Times}}</ref> and [[Sam Altman]],<ref>{{Cite web |title=OpenAI CEO Sam Altman unveils vision for AI's impact on economy and society at WEF Davos |url=https://cio.economictimes.indiatimes.com/news/artificial-intelligence/openai-ceo-sam-altman-unveils-vision-for-ais-impact-on-economy-and-society-at-wef-davos/107000167 |access-date=14 February 2025 |website=ETCIO |language=en}}</ref> alongside representatives from the [[United Nations]],<ref>{{Cite web |date=22 January 2025 |title=Davos 2025: Trade, tariffs, AI and UN chief Guterres dominate World Economic Forum agenda |url=https://apnews.com/article/davos-wef-2025-trump-malaysia-spain-guterres-6559cde70a829d67c1335f1025758efd |access-date=14 February 2025 |website=AP News |language=en}}</ref> [[International Monetary Fund]], and [[World Bank]].<ref>{{Cite web |last=Loffhagen |first=Emma |date=15 January 2024 |title=Davos 2024: What is it, who is attending, and is it elitist? |url=https://www.standard.co.uk/news/world/what-is-davos-2024-world-economic-forum-politicians-billionaires-criticism-b1053239.html |access-date=14 February 2025 |website=The Standard |language=en}}</ref> The forum underscored the importance of international cooperation in addressing global economic and technological challenges.<ref>{{Cite web |title=Davos 2025: CEOs are excited to go on offense |url=https://www.mckinsey.com/capabilities/strategy-and-corporate-finance/our-insights/davos-2025-ceos-are-excited-to-go-on-offense |access-date=14 February 2025 |website=McKinsey}}</ref><ref>{{Cite web |date=24 January 2025 |title=Leaders leave Davos with 'cautious optimism' - 24 Jan 2025 |url=https://www.bbc.com/reel/video/p0klx2d9/leaders-leave-davos-with-cautious-optimism-24-jan-2025 |access-date=14 February 2025 |website=www.bbc.com |language=en-GB}}</ref>

      ====2026 meeting====
      {{main|56th World Economic Forum}}

      ====Individual participants====
      [[File:Juan Manuel Santos Calderón - World Economic Forum on Latin America 2010.jpg|thumb|right|[[Juan Manuel Santos]], [[president of Colombia]], at the 2010 World Economic Forum]]
      Some 3,000 individual participants joined the 2020 annual meeting in Davos. Countries with the most attendees include the [[United States]] (674 participants), the [[United Kingdom]] (270), [[Switzerland]] (159), [[Germany]] (137) and [[India]] (133).<ref>{{cite web |url=https://www.statista.com/chart/7609/most-attendees-at-davos/ |title=World Economic Forum – Who's Going to Davos? |date=20 January 2020 |access-date=28 June 2020 |archive-date=28 June 2020 |archive-url=https://web.archive.org/web/20200628141546/https://www.statista.com/chart/7609/most-attendees-at-davos/ |url-status=live}}</ref> Among the attendees were heads of state or government, cabinet ministers, ambassadors, and heads or senior officials of international organizations, including: [[Sanna Marin]] ([[prime minister of Finland]]), [[Ursula von der Leyen]] ([[president of the European Commission]]), [[Christine Lagarde]] ([[ECB president]]), [[Greta Thunberg]] ([[climate activist]]), [[Ren Zhengfei]] ([[Huawei Technologies|Huawei Technologies founder]]), [[Kristalina Georgieva]] ([[International Monetary Fund|managing director of the IMF]]), [[Deepika Padukone]] ([[Bollywood|Bollywood actress]]), [[George Soros]] ([[Soros Fund Management|investor]]), [[Hideki Makihara]] ([[House of Representatives Japan]]), and Donald Trump ([[president of the United States]]).<ref>{{cite web |url=https://www.cnbc.com/2020/01/14/wef-2020-heres-who-is-going-to-davos-this-year.html |title=Here's who's going to Davos this year |website=[[CNBC]] |date=14 January 2020 |access-date=28 June 2020 |archive-date=28 June 2020 |archive-url=https://web.archive.org/web/20200628141545/https://www.cnbc.com/2020/01/14/wef-2020-heres-who-is-going-to-davos-this-year.html |url-status=live}}</ref>

      [[File:Isaac Herzog in Davos, January 2024 (GPOABG231).jpeg|thumb|right|Israeli President [[Isaac Herzog]] at the 2024 World Economic Forum]]
      An analysis by ''[[The Economist]]'' from 2014 found that the vast majority of participants are male and more than 50 years old. Careers in business account for most of the participants' backgrounds (1,595 conference attendees), with the remaining seats shared between government (364), NGOs (246) and press (234). Academia, which had been the basis of the first annual conference in 1971, had been marginalised to the smallest participant group (183 attendees).<ref name="Econ-Magic">{{cite news |url=https://www.economist.com/international/2014/01/23/whos-on-the-magic-mountain |title=The data of Davos – Who's on the Magic Mountain? |newspaper=The Economist |access-date=28 June 2020 |date=23 January 2014 |archive-date=20 May 2020 |archive-url=https://web.archive.org/web/20200520093511/https://www.economist.com/international/2014/01/23/whos-on-the-magic-mountain |url-status=live}}</ref>

      ====Corporate participants====
      Next to individual participants, the World Economic Forum maintains a dense network of corporate partners that can apply for different partnership ranks within the forum.<ref>{{Cite web|url=https://www.weforum.org/partners/|title=Partners|website=World Economic Forum|access-date=21 July 2021|archive-date=21 July 2021|archive-url=https://web.archive.org/web/20210721075341/https://www.weforum.org/partners|url-status=live}}</ref> For 2019, [[Bloomberg L.P.|Bloomberg]] has identified a total of 436 listed corporates that participated in the annual meeting while measuring a stock underperformance by the Davos participants of around −10% versus the S&P 500 during the same year. Drivers are among others an overrepresentation of financial companies and an underrepresentation of fast-growing health care and information technology businesses at the conference.<ref>{{Cite news|url=https://www.bloomberg.com/news/articles/2020-01-23/davos-s-global-elite-are-laggards-in-stock-market-performance|title=Davos's Global Elite Are Laggards in Stock-Market Performance|first=Eddie|last=van der Walt|work=Bloomberg|date=23 January 2020|access-date=7 June 2020|archive-date=6 May 2020|archive-url=https://web.archive.org/web/20200506165535/https://www.bloomberg.com/news/articles/2020-01-23/davos-s-global-elite-are-laggards-in-stock-market-performance|url-status=live}}</ref> ''The Economist'' had found similar results in an earlier study, showing an underperformance of Davos participants against both the MSCI World Index and the S&P 500 between 2009 and 2014.<ref name="Econ-Magic" />

      ===Summer annual meeting===
      In 2007, the foundation established the Annual Meeting of the New Champions (also called Summer Davos), held annually in China, alternating between [[Dalian]] and [[Tianjin]], bringing together 1,500 participants from what the foundation calls Global Growth Companies, primarily from rapidly growing emerging countries such as China, Russia, [[Mexico]], and [[Brazil]], but also including quickly growing companies from [[developed countries]]. The meeting also engages with the next generation of global leaders from fast-growing regions and competitive cities, as well as technology pioneers from around the globe.<ref>{{cite news |url=http://english.peopledaily.com.cn/90001/90778/6228850.html |title=Summer Davos To Put Dalian on Business Map |publisher=[[China Daily]] (via [[People's Daily]]) |date=1 August 2007 |access-date=25 January 2011 |archive-date=3 October 2012 |archive-url=https://web.archive.org/web/20121003065156/http://english.peopledaily.com.cn/90001/90778/6228850.html |url-status=live}}</ref> The [[Premier of the People's Republic of China|premier of China]] has delivered a plenary address at each annual meeting.{{citation needed|date=December 2021}}

      ===Regional meetings===
      [[File:India in the New Global Reality Economic Summit 2011.jpg|thumb|left|[[Prithviraj Chavan]], chief minister of Maharashtra, India; Sudha Pilay, member-secretary, Planning Commission, India; and [[Ben Verwaayen]], chief executive officer, Alcatel-Lucent, France, were the co-chairs of the India Economic Summit 2011 in [[Mumbai]].]]
      Every year regional meetings take place, enabling close contact among corporate business leaders, local government leaders, and NGOs. Meetings are held in Africa, East Asia, Latin America, and the Middle East. The mix of hosting countries varies from year to year, but consistently China and India have hosted throughout the decade since 2000.<ref>{{cite web |url=http://www.weforum.org/en/events/ |title=World Economic Forum – Events |work=Weforum.org |publisher=World Economic Forum |access-date=7 March 2010 |url-status=dead |archive-url=https://web.archive.org/web/20090109050816/http://www.weforum.org/en/events/ |archive-date=9 January 2009}}</ref>

      ===Young Global Leaders===
      {{Main|Young Global Leaders}}

      The group of Young Global Leaders consists of 800 people chosen by the WEF organizers as being representative of contemporary leadership. After five years of participation they are considered alumni.<ref>{{cite web |url=http://www.weforum.org/community/forum-young-global-leaders |title=Forum of Young global Leaders |work=Weforum.org |publisher=World Economic Forum |access-date=5 April 2013 |archive-date=10 January 2016 |archive-url=https://web.archive.org/web/20160110055001/http://www.weforum.org/community/forum-young-global-leaders |url-status=live}}</ref> The program has received controversy when Schwab, the founder, admitted to "penetrat[ing]" governments with Young Global Leaders. He added that as of 2017 "more than half" of [[Justin Trudeau|Justin Trudeau's]] [[Cabinet of Canada|Cabinet]] had been members of the program.<ref>{{Cite web |title=Young Global Leaders |url=https://www.influencewatch.org/organization/young-global-leaders/ |access-date=6 February 2023 |website=InfluenceWatch |language=en-US |archive-date=6 February 2023 |archive-url=https://web.archive.org/web/20230206172953/https://www.influencewatch.org/organization/young-global-leaders/ |url-status=live}}</ref>

      ===Social entrepreneurs===
      Since 2000, the WEF has been promoting models developed by those in close collaboration with the [[Schwab Foundation for Social Entrepreneurship]],<ref>{{cite web |url=http://www.schwabfound.org/ |title=Schwab Foundation for Social Entrepreneurship – Home |publisher=Schwabfound.org |access-date=7 March 2010 |archive-date=4 May 2019 |archive-url=https://web.archive.org/web/20190504005120/http://www.schwabfound.org/ |url-status=live}}</ref> highlighting [[social entrepreneurship]] as a key element to advance societies and address social problems.<ref>[[Jim Fruchterman|Fruchterman, Jim]] (31 January 2005). [http://news.bbc.co.uk/2/hi/business/4221851.stm "Davos Diary: Meetings of Minds"] ''[[BBC News]]''. Retrieved 25 January 2011 {{webarchive |url=https://web.archive.org/web/20160923021938/http://news.bbc.co.uk/2/hi/business/4221851.stm |date=23 September 2016}}</ref><ref>Moore. p. 209.</ref> Selected social entrepreneurs are invited to participate in the foundation's regional meetings and the annual meetings where they may meet chief executives and senior government officials. At the annual meeting 2003, for example, [[Jeroo Billimoria]] met with Roberto Blois, deputy secretary-general of the [[International Telecommunication Union]], an encounter that produced a key partnership for her organization [[Child Helpline International]].<ref>Bornstein. p. 272.</ref>

      ===Research reports===
      [[File:Sharmeen Obaid Chinoy World Economic Forum 2013.jpg|thumb|upright|right|Two-time [[Academy Award]] winner and Pakistani journalist [[Sharmeen Obaid-Chinoy]] at WEF in 2013]]
      The foundation also acts as a [[think tank]], publishing a wide range of reports. In particular, "Strategic Insight Teams" focus on producing reports of relevance in the fields of competitiveness, global risks, and [[scenario planning|scenario thinking]].{{Citation needed|date=June 2024}}

      The "Competitiveness Team"<ref>{{cite web |url=http://www.weforum.org/en/initiatives/gcp/index.htm |title=Issues &#124; World Economic Forum-Issues |work=Weforum.org |publisher=World Economic Forum |access-date=29 November 2011 |url-status=dead |archive-url=https://web.archive.org/web/20101201200230/http://www.weforum.org/en/initiatives/gcp/index.htm |archive-date=1 December 2010}}</ref> produces a range of annual economic reports (first published in brackets): the ''[[Global Competitiveness Report]]'' (1979) measured competitiveness of countries and economies; the ''[[Global Information Technology Report]]'' (2001) assessed their competitiveness based on their IT readiness; the ''[[Global Gender Gap Report]]'' examined critical areas of inequality between men and women; the ''[[Global Risks Report]]'' (2006) assessed key global risks; the ''[[Travel and Tourism Competitiveness Report|Global Travel and Tourism Report]]'' (2007) measured travel and tourism competitiveness; the Financial Development Report (2008)<ref>{{cite web|title=WEF – Financial Development Report|url=http://www.weforum.org/issues/financial-development|publisher=World Economic Forum|url-status=dead|archive-url=https://web.archive.org/web/20130818181200/http://www.weforum.org/issues/financial-development|archive-date=18 August 2013}}</ref> aimed to provide a comprehensive means for countries to establish benchmarks for various aspects of their financial systems and establish priorities for improvement; and the [[Global Enabling Trade Report]] (2008) presented a cross-country analysis of the large number of measures facilitating trade among nations.<ref name=pigman3>{{cite book |title=The World Economic Forum – A Multi-Stakeholder Approach to Global Governance |last=Pigman |first=Geoffrey Allen |pages=43, 92–112 |year=2007 |isbn=978-0-415-70204-1 |publisher=Routledge |location=London}}</ref>

      The "Risk Response Network"<ref>{{cite web |url=http://www.weforum.org/en/initiatives/globalrisk/index.htm |title=Global Risks &#124; World Economic Forum-Global Risks |work=Weforum.org |publisher=World Economic Forum |access-date=29 November 2011 |url-status=dead |archive-url=https://web.archive.org/web/20101201195909/http://www.weforum.org/en/initiatives/globalrisk/index.htm |archive-date=1 December 2010}}</ref> produces a yearly report assessing risks which are deemed to be within the scope of these teams, have cross-industry relevance, are uncertain, have the potential to cause upwards of US$10&nbsp;billion in economic damage, have the potential to cause major human suffering, and which require a multi-stakeholder approach for mitigation.<ref name="riskreport">[http://www.weforum.org/pdf/globalrisk/2009.pdf Global Risk Report 2009] World Economic Forum {{webarchive |url=https://web.archive.org/web/20090225070901/http://www.weforum.org/pdf/globalrisk/2009.pdf |date=25 February 2009}}</ref>

      In 2020, the forum published a report entitled ''Nature Risk Rising: Why the Crisis Engulfing Nature Matters for Business and the Economy''.<ref name="weforum.org">{{cite web |last=Quinney |first=Marie |title=COVID-19 and nature are linked. So should be the recovery. |url=https://www.weforum.org/agenda/2020/04/covid-19-nature-deforestation-recovery/ |website=World Economic Forum |access-date=19 April 2020 |archive-date=3 September 2022 |archive-url=https://web.archive.org/web/20220903213537/https://www.weforum.org/agenda/2020/04/covid-19-nature-deforestation-recovery |url-status=live}}</ref><ref>{{cite book |title=WEF New Nature Economy Report 2020 |date=January 2020 |publisher=World Economic Forum |url=http://www3.weforum.org/docs/WEF_New_Nature_Economy_Report_2020.pdf |access-date=19 July 2020 |archive-date=23 June 2020 |archive-url=https://web.archive.org/web/20200623204717/http://www3.weforum.org/docs/WEF_New_Nature_Economy_Report_2020.pdf |url-status=live}}</ref> In this report the forum estimated that approximately half of global GDP is highly or moderately dependent on nature (the same as [[IPBES]]'s 2019 assessment report<ref>{{Cite web |work=IPBES |date=17 May 2019 |title=Global Assessment Report on Biodiversity and Ecosystem Services |url=https://www.ipbes.net/node/35274 |access-date=13 September 2023 |language=en |archive-date=30 November 2023 |archive-url=https://web.archive.org/web/20231130124254/https://www.ipbes.net/global-assessment |url-status=live}}</ref>). The report also found that 1 dollar spent on nature restoration yields 9 dollars in economic benefits.<ref>{{Cite journal |publisher=United Nations Environment Programme |date=2020 |title=The United Nations Decade on Ecosystem Restoration: Strategy |url=https://wedocs.unep.org/xmlui/handle/20.500.11822/31813 |journal=The United Nations Decade on Ecosystem Restoration: Strategy}}</ref>

      ===Initiatives===
      ==== Health ====
      On 19 January 2017 the [[Coalition for Epidemic Preparedness Innovations]] (CEPI), a global initiative to fight epidemics, was launched at WEF in Davos. The internationally funded initiative aims at securing vaccine supplies for global emergencies and pandemics, and to research new vaccines for tropical diseases, that are now more menacing. The project is funded by private and governmental donors, with an initial investment of US$460m from the governments of Germany, Japan and Norway, plus the Bill & Melinda Gates Foundation and the Wellcome Trust.<ref>D. G. McNeil Jr (2017). [https://www.nytimes.com/2017/01/18/health/partnership-epidemic-preparedness.html?hpw&rref=health&action=click&pgtype=Homepage&module=well-region&region=bottom-well&WT.nav=bottom-well Donors and Drug Makers Offer $500 Million to Control Global Epidemics] {{Webarchive|url=https://web.archive.org/web/20171201045140/https://www.nytimes.com/2017/01/18/health/partnership-epidemic-preparedness.html?hpw&rref=health&action=click&pgtype=Homepage&module=well-region&region=bottom-well&WT.nav=bottom-well |date=1 December 2017}}. ''The New York Times''. Retrieved 20 January 2017.</ref>{{Anchor|EBP}}

      Between 21 and 24 January 2020, at the early stages of the [[COVID-19 pandemic|COVID-19 outbreak]], [[Coalition for Epidemic Preparedness Innovations|CEPI]] met with leaders from [[Moderna]] to establish plans for a [[COVID-19 vaccine]] at the [[Davos, Switzerland|Davos]] gathering,<ref>{{cite web |title=What we know about the Wuhan coronavirus and urgent plans to develop a vaccine for it |url=https://www.weforum.org/agenda/2020/01/wuhan-coronavirus-china-cepi-vaccine-davos/ |website=World Economic Forum |access-date=9 September 2020 |language=en |archive-date=26 August 2020 |archive-url=https://web.archive.org/web/20200826142434/https://www.weforum.org/agenda/2020/01/wuhan-coronavirus-china-cepi-vaccine-davos/ |url-status=live}}</ref> with a total global case number of 274 and total loss of life the virus at 16.<ref>{{cite web |title=WHO Coronavirus Disease (COVID-19) Dashboard |url=https://covid19.who.int/ |website=covid19.who.int |access-date=9 September 2020 |language=en |archive-date=16 April 2020 |archive-url=https://web.archive.org/web/20200416183953/https://covid19.who.int/ |url-status=live}}</ref> The [[World Health Organization|WHO]] declared a global health emergency 6 days later.<ref>{{cite news |title=WHO declares coronavirus outbreak a global health emergency |url=https://www.statnews.com/2020/01/30/who-declares-coronavirus-outbreak-a-global-health-emergency |access-date=9 September 2020 |work=STAT |date=30 January 2020 |archive-date=9 September 2020 |archive-url=https://web.archive.org/web/20200909231337/https://www.statnews.com/2020/01/30/who-declares-coronavirus-outbreak-a-global-health-emergency/ |url-status=live}}</ref>

      ==== Society ====
      The Global Water Initiative brings together diverse stakeholders such as [[Alcan Inc.]], the [[Swiss Agency for Development and Cooperation]], [[USAID]] India, [[UNDP]] India, [[Confederation of Indian Industry]] (CII), Government of [[Rajasthan]], and the [[NEPAD]] Business Foundation to develop public-private partnerships on water management in South Africa and India.{{Citation needed|date=June 2024}}

      In an effort to combat corruption, the Partnering Against Corruption Initiative (PACI) was launched by CEOs from the engineering and construction, energy and [[metals]], and mining industries at the annual meeting in Davos during January 2004. PACI is a platform for peer exchange on practical experience and dilemma situations. Approximately 140 companies have joined the initiative.<ref name=pigman4>{{cite book |title=The World Economic Forum – A Multi-Stakeholder Approach to Global Governance |last=Pigman |first=Geoffrey Allen |page=115 |year=2007 |isbn=978-0-415-70204-1 |publisher=Routledge |location=London}}</ref>

      ==== Environment ====
      {{Further|Business action on climate change}}

      In the beginning of the 21st century, the forum began to increasingly deal with environmental issues.<ref name="World Economic Forum">{{cite web |title=Environment and Natural Resource Security |url=https://www.weforum.org/agenda/archive/environment-and-natural-resource-security |website=World Economic Forum |access-date=3 May 2020 |archive-date=1 May 2020 |archive-url=https://web.archive.org/web/20200501030906/https://www.weforum.org/agenda/archive/environment-and-natural-resource-security |url-status=live}}</ref> In the Davos Manifesto 2020 it is said that a company among other:
      * "acts as a steward of the environmental and material universe for future generations. It consciously protects our biosphere and champions a circular, shared and regenerative economy."
      * "responsibly manages near-term, medium-term and long-term value creation in pursuit of sustainable shareholder returns that do not sacrifice the future for the present."
      * "is more than an economic unit generating wealth. It fulfils human and societal aspirations as part of the broader social system. Performance must be measured not only on the return to shareholders, but also on how it achieves its environmental, social and good governance objectives."<ref>{{cite web |last=Schwab |first=Klaus |title=Davos Manifesto 2020: The Universal Purpose of a Company in the Fourth Industrial Revolution |url=https://www.weforum.org/agenda/2019/12/davos-manifesto-2020-the-universal-purpose-of-a-company-in-the-fourth-industrial-revolution/ |website=World Economic Forum |access-date=3 May 2020 |archive-date=10 May 2020 |archive-url=https://web.archive.org/web/20200510170243/https://www.weforum.org/agenda/2019/12/davos-manifesto-2020-the-universal-purpose-of-a-company-in-the-fourth-industrial-revolution/ |url-status=live}}</ref>

      The Environmental Initiative covers climate change and water issues. Under the [[2005 G8 Summit|Gleneagles Dialogue on Climate Change]], the [[government of the United Kingdom|U.K. government]] asked the World Economic Forum at the [[31st G8 summit|G8 Summit in Gleneagles in 2005]] to facilitate a dialogue with the business community to develop recommendations for reducing [[greenhouse gas emissions]]. This set of recommendations, endorsed by a global group of CEOs, was presented to leaders ahead of the G8 Summit in [[Toyako]], Hokkaido, Japan held in July 2008.<ref>Black, Richard (20 June 2008). [http://news.bbc.co.uk/2/hi/science/nature/7464517.stm "Business Chiefs Urge Carbon Curbs"] {{webarchive |url=https://web.archive.org/web/20160923021238/http://news.bbc.co.uk/2/hi/science/nature/7464517.stm |date=23 September 2016}} ''[[BBC News]]''. Retrieved 25 January 2011.</ref><ref>Szabo, Michael (19 June 2008). [https://www.reuters.com/article/environmentNews/idUSL1944804220080620?feedType=RSS&feedName=environmentNews "Business Chiefs Call for G8 Climate Leadership"] {{webarchive |url=https://web.archive.org/web/20090131122901/https://www.reuters.com/article/environmentNews/idUSL1944804220080620?feedType=RSS&feedName=environmentNews |date=31 January 2009}} ''[[Reuters]]''. Retrieved 25 January 2011.</ref>

      In 2016 WEF published an article in which it is said, that in some cases reducing consumption can increase well-being. In the article is mentioned that in [[Costa Rica]] the GDP is 4 times smaller than in many countries in Western Europe and North America, but people live longer and better. An American study shows that those whose income is higher than $75,000, do not necessarily have an increase in well-being. To better measure well-being, the New Economics Foundation's launched the [[Happy Planet Index]].<ref>{{cite web |last1=Belton |first1=Teresa |title=Why becoming a 'happily modest consumer' could help save the planet |url=https://www.weforum.org/agenda/2016/12/want-to-protect-the-planet-pursue-personal-happiness |website=World Economic Forum |access-date=24 May 2020 |archive-date=18 May 2020 |archive-url=https://web.archive.org/web/20200518094158/https://www.weforum.org/agenda/2016/12/want-to-protect-the-planet-pursue-personal-happiness |url-status=live}}</ref>

      In January 2017, WEF launched the Platform for Accelerating the Circular Economy (PACE), which is a global [[public private partnership]] seeking to scale [[circular economy]] innovations.<ref>{{Cite web|url=https://www.weforum.org/projects/circular-economy/|title=Circular Economy|website=World Economic Forum|access-date=7 December 2019|archive-date=17 August 2019|archive-url=https://web.archive.org/web/20190817095101/https://www.weforum.org/projects/circular-economy|url-status=live}}</ref><ref>{{Cite web|url=https://toplink.weforum.org/knowledge/insight/a1Gb0000000pTDMEA2/explore/summary|title=TopLink|website=toplink.weforum.org|access-date=3 April 2019|archive-date=2 April 2019|archive-url=https://web.archive.org/web/20190402055419/https://toplink.weforum.org/knowledge/insight/a1Gb0000000pTDMEA2/explore/summary|url-status=live}}</ref> PACE is co-chaired by [[Frans van Houten]] (CEO of [[Philips]]), Naoko Ishii (CEO of the [[Global Environment Facility]], and the head of [[United Nations Environment Programme]] (UNEP).<ref>{{Cite web|url=https://www.acceleratecirculareconomy.org/|title=Platform for Accelerating the Circular Economy|website=Platform for Accelerating the Circular Economy|access-date=3 April 2019|archive-date=2 April 2019|archive-url=https://web.archive.org/web/20190402084939/https://www.acceleratecirculareconomy.org/|url-status=live}}</ref> The [[Ellen MacArthur Foundation]], the [[International Resource Panel]], Circle Economy, [[Chatham House]], the Dutch [[National Institute for Public Health and the Environment]], the [[United Nations Environment Programme]] and [[Accenture]] serve as knowledge partners, and the program is supported by the UK [[Department for Environment, Food and Rural Affairs]], [[DSM (company)|DSM]], [[FrieslandCampina]], [[Global Affairs Canada]], the Dutch [[Ministry of Infrastructure and Water Management]], [[Rabobank]], [[Shell plc|Shell]], [[SITRA]], and [[Unilever]].<ref>{{Cite web |title=Members |url=https://pacecircular.org/partners |url-status=live |archive-url=https://web.archive.org/web/20220418213020/https://pacecircular.org/partners |archive-date=18 April 2022 |access-date=16 August 2022 |website=PACE |language=en}}</ref>

      The Forum emphasized its 'Environment and Natural Resource Security Initiative' for the 2017 meeting to achieve inclusive economic growth and sustainable practices for global industries. With increasing limitations on [[International trade|world trade]] through national interests and trade barriers, the WEF has moved towards a more sensitive and socially-minded approach for global businesses with a focus on the reduction of [[carbon emission]]s in China and other large industrial nations.<ref>[https://www.weforum.org/system-initiatives/environment-and-natural-resource-security ''Shaping the Future of Environment and Natural Resource Security''] The World Economic Forum Davos 2017. Retrieved 16 January 2017 {{Webarchive|url=https://web.archive.org/web/20170711144259/https://www.weforum.org/system-initiatives/environment-and-natural-resource-security |date=11 July 2017}}</ref>

      Also in 2017, WEF launched the [[Fourth Industrial Revolution]] (4IR) for the Earth Initiative, a collaboration among WEF, [[Stanford University]] and [[PwC]], and funded through the Mava Foundation<!-- also referred to as the MAVA Foundation -->.<ref>{{Cite news|url=https://www.waterbriefing.org/home/technology-focus/item/14404-new-global-initiative-to-help-harness-4ir-technologies-to-tackle-environmental-issues|title=New global initiative will help harness 4IR technologies tackle environmental issues|date=21 September 2017|work=Waterbriefing|access-date=26 January 2018|archive-date=9 March 2021|archive-url=https://web.archive.org/web/20210309013209/https://www.waterbriefing.org/home/technology-focus/item/14404-new-global-initiative-to-help-harness-4ir-technologies-to-tackle-environmental-issues|url-status=live}}</ref> In 2018, WEF announced that one project within this initiative was to be the [[Earth BioGenome Project]], the aim of which is to sequence the genomes of every organism on Earth.<ref>{{Cite news|url=http://www.drugdevelopment-technology.com/news/project-sequence-genomes-earth-begin-amazon-rainforest/|title=Project to sequence all genomes on Earth to begin in Amazon rainforest|last=Casey|first=JP|date=25 January 2018|work=Drug Development Technology|access-date=26 January 2018|archive-date=27 January 2018|archive-url=https://web.archive.org/web/20180127020517/http://www.drugdevelopment-technology.com/news/project-sequence-genomes-earth-begin-amazon-rainforest/|url-status=live}}</ref>

      The World Economic Forum is working to eliminate [[plastic pollution]], stating that by 2050 it will consume 15% of the global [[Emissions budget|carbon budget]] and will pass by its weight fishes in the world's oceans. One of the methods is to achieve [[circular economy]].<ref>{{cite web |last1=Hughes |first1=Kristin |title=3 ways we are making an impact on plastic pollution |url=https://www.weforum.org/agenda/2019/09/we-created-an-initiative-to-fight-plastic-waste-here-are-3-takeaways-from-our-first-year/ |website=World Economic Forum |access-date=3 May 2020 |archive-date=9 May 2020 |archive-url=https://web.archive.org/web/20200509020530/https://www.weforum.org/agenda/2019/09/we-created-an-initiative-to-fight-plastic-waste-here-are-3-takeaways-from-our-first-year/ |url-status=live}}</ref><ref>{{cite web |last1=Rooney |first1=Katharine |title=The story of two brothers who travelled through a river of trash and inspired a nation |url=https://www.weforum.org/agenda/2020/01/how-does-indonesia-deal-with-plastic-pollution/ |website=World Economic Forum |access-date=3 May 2020 |archive-date=27 April 2020 |archive-url=https://web.archive.org/web/20200427165708/https://www.weforum.org/agenda/2020/01/how-does-indonesia-deal-with-plastic-pollution/ |url-status=live}}</ref>

      The theme of the 2020 World Economic Forum annual meeting was 'Stakeholders for a Cohesive and Sustainable World'. Climate change and sustainability were central themes of discussion. Many argued that GDP is failed to represent correctly the wellbeing and that [[fossil fuel subsidies]] should be stopped. Many of the participants said that a better capitalism is needed. [[Al Gore]] summarized the ideas in the conference as: "The version of capitalism we have today in our world must be reformed".<ref>{{cite news |last1=Worland |first1=Justin |title=How Davos Became a Climate Change Conference |url=https://time.com/5771889/davos-climate-change/ |access-date=31 January 2020 |agency=Times |date=27 January 2020 |archive-date=29 January 2020 |archive-url=https://web.archive.org/web/20200129005952/https://time.com/5771889/davos-climate-change/ |url-status=live}}</ref>

      In this meeting the World Economic Forum:

      * Launched the [[Trillion Tree Campaign]] an initiative aiming to "grow, restore and conserve 1 trillion trees over the next 10 years around the world – in a bid to restore [[biodiversity]] and help fight [[climate change]]". [[Donald Trump]] joined the initiative. The forum stated that: "Nature-based solutions – locking-up carbon in the world's forests, grasslands and wetlands – can provide up to one-third of the emissions reductions required by 2030 to meet the Paris Agreement targets," adding that the rest should come from the heavy industry, finance and transportation sectors. One of the targets is to unify existing [[reforestation]] projects.<ref>{{cite web |last1=Pomeroy |first1=Robin |title=One trillion trees – World Economic Forum launches plan to help nature and the climate |url=https://www.weforum.org/agenda/2020/01/one-trillion-trees-world-economic-forum-launches-plan-to-help-nature-and-the-climate |website=World Economic Forum |access-date=12 March 2020 |archive-date=12 March 2020 |archive-url=https://web.archive.org/web/20200312004502/https://www.weforum.org/agenda/2020/01/one-trillion-trees-world-economic-forum-launches-plan-to-help-nature-and-the-climate/ |url-status=live}}</ref>
      * Discussed the issue of climate change and called to expanding [[renewable energy]], [[efficient energy use|energy efficiency]] change the patterns of [[Resource consumption|consumption]] and remove carbon from the atmosphere. The forum concluded that the climate crisis will become a [[climate apocalypse]] should the temperature rise by 2&nbsp;°C above pre-industrial levels. The forum called on governments to fulfil the commitments in [[Paris Agreement]]. [[Jennifer Morgan (activist)|Jennifer Morgan]], special representative for international climate policy of the Federal Foreign Office in Germany, said that as to the beginning of the forum, fossil fuels still get three times more money than climate solutions.<ref>{{cite web |last1=Pomeroy |first1=Robin |title=What you need to know about Davos 2020: How to save the planet |url=https://www.weforum.org/agenda/2020/01/how-to-save-the-planet-davos-climate-pollution-what-to-know/ |website=World Economic Forum |access-date=3 May 2020 |archive-date=9 May 2020 |archive-url=https://web.archive.org/web/20200509084225/https://www.weforum.org/agenda/2020/01/how-to-save-the-planet-davos-climate-pollution-what-to-know/ |url-status=live}}</ref>

      At the 2021 annual meeting [[UNFCCC]] launched the 'UN Race-to-Zero Emissions Breakthroughs'. The aim of the campaign is to transform 20 sectors of the economy in order to achieve zero greenhouse gas emissions. At least 20% of each sector should take specific measures, and 10 sectors should be transformed before COP&nbsp;26 in Glasgow. According to the organizers, 20% is a tipping point, after which the whole sector begins to irreversibly change.<ref>{{cite web |title=Launch of UN Race-to-Zero Emissions Breakthroughs |url=https://unfccc.int/news/launch-of-un-race-to-zero-emissions-breakthroughs |website=United Nations Climate Change |publisher=United Nations |access-date=21 February 2021 |archive-date=21 February 2021 |archive-url=https://web.archive.org/web/20210221202833/https://unfccc.int/news/launch-of-un-race-to-zero-emissions-breakthroughs |url-status=live}}</ref><ref>{{cite web |title=Transforming our systems together |url=https://racetozero.unfccc.int/wp-content/uploads/2021/02/Race-to-Zero-Breakthroughs-Transforming-Our-Systems-Together.pdf |website=Race-to-Zero-Breakthroughs |publisher=United Nations |access-date=21 February 2021 |archive-date=9 February 2021 |archive-url=https://web.archive.org/web/20210209094037/https://racetozero.unfccc.int/wp-content/uploads/2021/02/Race-to-Zero-Breakthroughs-Transforming-Our-Systems-Together.pdf |url-status=live}}</ref>

      ===== Coronavirus and green recovery =====
      In April 2020, the forum published an article that postulates that the COVID-19 pandemic is linked to the destruction of nature. The number of emerging diseases is rising and this rise is linked to [[deforestation]] and [[species loss]]. In the article, there are multiple examples of the degradation of ecological systems caused by humans. It is also says that half of the global [[GDP]] is moderately or largely dependent on nature. The article concludes that the recovery from the pandemic should be linked to nature recovery.<ref name="weforum.org"/>

      The forum proposed a plan for a [[green recovery]]. The plan includes advancing [[circular economy]]. Among the mentioned methods, there is [[green building]], [[sustainable transport]], [[organic farming]], [[urban open space]], [[renewable energy]] and [[electric vehicle]]s.<ref>{{cite web |last=Bleischwitz |first=Raimund |title=COVID-19: 5 ways to create a green recovery |url=https://www.weforum.org/agenda/2020/06/five-ways-to-kickstart-a-green-recovery/ |website=World Economic Forum |access-date=19 July 2020 |archive-date=4 August 2020 |archive-url=https://web.archive.org/web/20200804181309/https://www.weforum.org/agenda/2020/06/five-ways-to-kickstart-a-green-recovery |url-status=live}}</ref>

      === Global Shapers Community ===
      The Global Shapers Community (GSC), an initiative of World Economic Forum, selects young leaders below 30 years old to be change agents in the world.<ref>{{Cite web|title=Global Shapers|url=https://www.globalshapers.org/|access-date=26 December 2020|website=Global Shapers|language=en|archive-date=26 December 2020|archive-url=https://web.archive.org/web/20201226062552/https://www.globalshapers.org/|url-status=live}}</ref> Global Shapers develop and lead their city-based hubs to implement social justice projects that advance the mission of World Economic Forum. The GSC has over 10,000 members in 500+ hubs in 154 countries. Some critics see the WEF's increasing focus on activist areas such as [[environmental protection]]<ref name="World Economic Forum"/> and [[social entrepreneurship]]<ref>{{Cite web|url=https://www.schwabfound.org/|title=Schwab Foundation for Social Entrepreneurship|website=Schwab Foundation for Social Entrepreneurship|access-date=16 April 2022|archive-date=16 April 2022|archive-url=https://web.archive.org/web/20220416115034/https://www.schwabfound.org/|url-status=live}}</ref> as a strategy to disguise the true [[plutocracy|plutocratic]] goals of the organisation.<ref>{{Cite web | title = The high priests of plutocracy all meet in Davos. What good can come from that? | url = https://www.theguardian.com/commentisfree/2020/jan/25/davos-world-economic-forum-capitalism-plutocracy | work = The Guardian | date = 25 January 2020 | access-date = 24 September 2021 | archive-date = 24 September 2021 | archive-url = https://web.archive.org/web/20210924150239/https://www.theguardian.com/commentisfree/2020/jan/25/davos-world-economic-forum-capitalism-plutocracy | url-status = live}}</ref><ref>{{Cite journal|author-first1=Steven |author-last1=Umbrello |title=Should We Reset? A review of Klaus Schwab and Thierry Malleret's 'COVID-19: The Great Reset'|date=February 2021|journal=The Journal of Value Inquiry|volume=56|number=4|pages=693–700|doi=10.1007/s10790-021-09794-1|pmc=7886645}}</ref><ref>{{Cite web|url=https://www.cicero.de/wirtschaft/meinungsherrschaft-ziemlich-verstiegen|title=Dominion of Opinion – Quite Defective|website=Cicero Online|language=en|access-date=12 August 2021|archive-date=12 August 2021|archive-url=https://web.archive.org/web/20210812143340/https://www.cicero.de/wirtschaft/meinungsherrschaft-ziemlich-verstiegen|url-status=live}}</ref>
      The [[Epstein files]] include emails in which the Global Shapers are mentioned alongside messages in which Epstein discusses finding “interesting girls”.<ref>{{cite web
       |title=Epstein Files – Dataset 9 (EFTA00690258)
       |url=https://www.justice.gov/epstein/files/DataSet%209/EFTA00690258.pdf
       |website=U.S. Department of Justice
       |publisher=United States Department of Justice
       |access-date=12 March 2026
      }}</ref><ref>{{cite web
       |title=Epstein Files – Dataset 9 (EFTA00719079)
       |url=https://www.justice.gov/epstein/files/DataSet%209/EFTA00719079.pdf
       |website=U.S. Department of Justice
       |publisher=United States Department of Justice
       |access-date=12 March 2026
      }}</ref>

      === The Great Reset ===
      {{main|The Great Reset}}

      In May 2020, the WEF and the then-[[Charles, Prince of Wales|Prince of Wales]]'s Sustainable Markets Initiative launched "The Great Reset" project, a five-point plan to enhance sustainable economic growth following the global recession caused by the [[COVID-19 pandemic lockdowns]].<ref>{{cite web|url=https://www.theguardian.com/uk-news/2020/jun/03/pandemic-is-chance-to-reset-global-economy-says-prince-charles|title=Pandemic is chance to reset global economy, says Prince Charles|newspaper=The Guardian|first=Phillip|last=Inman|date=3 June 2020|access-date=3 June 2020|archive-date=17 November 2020|archive-url=https://web.archive.org/web/20201117152600/https://www.theguardian.com/uk-news/2020/jun/03/pandemic-is-chance-to-reset-global-economy-says-prince-charles|url-status=live}}</ref> "The Great Reset" was to be the theme of WEF's annual meeting in August 2021.<ref>{{Cite web |date=30 July 2020 |title=About |work=World Economic Forum |url=https://www.weforum.org/great-reset/about |access-date=22 July 2022 |archive-url=https://web.archive.org/web/20200730063939/https://www.weforum.org/great-reset/about |archive-date=30 July 2020}}</ref>

      According to forum founder Schwab, the intention of the project is to reconsider the meaning of [[capitalism]] and capital. While not abandoning capitalism, he proposes to change and possibly move on from some aspects of it, including [[neoliberalism]] and [[free-market fundamentalism]]. The role of corporations, taxation and more should be reconsidered. International cooperation and trade should be defended and the [[Fourth Industrial Revolution]] also.<ref>{{cite web |last=Schwab |first=Klaus |title=We must move on from neoliberalism in the post-COVID era |url=https://www.weforum.org/agenda/2020/10/coronavirus-covid19-recovery-capitalism-environment-economics-equality/ |website=World Economic Forum |access-date=29 June 2021 |archive-date=5 July 2021 |archive-url=https://web.archive.org/web/20210705195322/https://www.weforum.org/agenda/2020/10/coronavirus-covid19-recovery-capitalism-environment-economics-equality/ |url-status=live}}</ref><ref>{{cite web |title=The world must move on from neoliberalism after the pandemic |url=https://www.facebook.com/worldeconomicforum/videos/215228153695155/ |website=World Economic Forum |access-date=29 June 2021 |archive-date=2 May 2021 |archive-url=https://web.archive.org/web/20210502024255/https://www.facebook.com/worldeconomicforum/videos/215228153695155/ |url-status=live}}</ref>

      The forum defines the system that it wants to create as "Stakeholder Capitalism". The forum supports [[trade union]]s.<ref>{{cite web |title=How trade unions lift workers wage |url=https://www.weforum.org/agenda/2021/12/stakeholder-capitalism-episode-2-an-economy-that-works-for-workers/ |website=World Economic Forum |access-date=11 April 2022 |archive-date=11 April 2022 |archive-url=https://web.archive.org/web/20220411070817/https://www.weforum.org/agenda/2021/12/stakeholder-capitalism-episode-2-an-economy-that-works-for-workers/ |url-status=live}}</ref>

      The 'Great Reset' has also been the target of [[Great Reset#Conspiracy theories|several "debunked" conspiracy theories]], which heavily overlap with related conspiracy theories concerning the [[New World Order (conspiracy theory)|'New World Order']], [[Qanon]], and [[COVID-19 misinformation|COVID-19]].

      ==Criticism==
      ===Physical protests===
      [[File:Demo-gegen-wef.jpg|thumb|Protest march against the WEF in [[Basel]], 2006]]

      During the late 1990s, the WEF, as well as the [[G7]], [[World Bank]], [[World Trade Organization]], and [[International Monetary Fund]], came under heavy criticism by [[anti-globalization]] activists who asserted that capitalism and globalization were increasing poverty and destroying the environment. In 2000, about 10,000 demonstrators [[S11 (protest)|disrupted a regional WEF meeting]] in [[Melbourne]], by obstructing the path of 200 delegates.<ref>Barret, Bernard (15 November 2000). [http://www.australianpolitics.com/pg/groups/barrett-s11-report-2000.shtml "Beating Up – A Report on Police Batons and the News Media at the World Economic Forum, Melbourne, September 2000"] {{webarchive |url=https://web.archive.org/web/20110926220221/http://www.australianpolitics.com/pg/groups/barrett-s11-report-2000.shtml |date=26 September 2011}}. ''[Australian Politics]''. Retrieved 24 August 2011.</ref> Small demonstrations are held in Davos on most but not all years, organised by the local Green Party (see [[Anti-WEF protests in Switzerland, January 2003]]) to protest against what have been called the meetings of "fat cats in the snow", a [[tongue-in-cheek]] term used by rock singer [[Bono]].<ref>Noon, Chris (21 January 2006). [https://www.forbes.com/facesinthenews/2006/01/26/bono-davos-red-cx_cn_0126autofacescan02.html "Bono Teams Up With Amex, Gap For Product Red"] {{webarchive |url=https://web.archive.org/web/20080908033533/http://www.forbes.com/facesinthenews/2006/01/26/bono-davos-red-cx_cn_0126autofacescan02.html |date=8 September 2008}}. ''[[Forbes]]''. Retrieved 25 January 2011.</ref>

      After 2014, the physical protest movement against the World Economic Forum largely died down, and [[Swiss police]] noted a significant decline in attending protesters, 20 at most during the meeting in 2016. While protesters are still more numerous in large Swiss cities, the protest movement itself has undergone significant change.<ref>C. Thumshirn (2017). [http://www.nzz.ch/wirtschaft/wef-2017/protest-im-wandel-das-wef-ohne-gegner-ld.139155 Warum das WEF keine Demonstranten mehr anlockt] {{Webarchive|url=https://web.archive.org/web/20170117152100/http://www.nzz.ch/wirtschaft/wef-2017/protest-im-wandel-das-wef-ohne-gegner-ld.139155 |date=17 January 2017}}(in German). ''Neue Zürcher Zeitung''. Retrieved 17 January 2017.</ref> Around 150 [[Tibetan people|Tibetans]] and [[Uyghurs|Uighurs]] protested in [[Geneva]] and 400 Tibetans in [[Bern]] against the visit of China's [[paramount leader]] [[Xi Jinping]] for the 2017 meeting, with subsequent confrontations and arrests.<ref>[http://www.swissinfo.ch/eng/xi-s-visit_tibetans-and-uighurs-protest-in-geneva/42860126 Tibetans and Uighurs protest in Geneva] SWI swissinfo.ch (Politics-Conflict). Retrieved 22 January 2017 {{Webarchive|url=https://web.archive.org/web/20170120115050/http://www.swissinfo.ch/eng/xi-s-visit_tibetans-and-uighurs-protest-in-geneva/42860126 |date=20 January 2017}}</ref>

      ===Growing gaps in wealth===
      A number of NGOs have used the World Economic Forum to highlight growing inequalities and [[wealth gap]]s, which they consider to have been neglected, or even to be exacerbated, through institutions like the WEF. [[Winnie Byanyima]], the former executive director of the anti-poverty confederation [[Oxfam International]] co-chaired the 2015 meeting, where she presented a critical report of global wealth distribution based on statistical research by the [[Credit Suisse|Credit Suisse Research Institute]]. In this study, the richest 1% of people in the world own 48% of the world's wealth.<ref>Vara, Vauhini (January 2015). [https://www.newyorker.com/business/currency/critics-oxfams-poverty-statistics-missing-point Critics of Oxfam's Poverty Statistics Are Missing the Point] {{Webarchive|url=https://web.archive.org/web/20190202164133/https://www.newyorker.com/business/currency/critics-oxfams-poverty-statistics-missing-point |date=2 February 2019}}. ''The New Yorker''. Retrieved 27 January 2019.</ref> At the 2019 meeting, she presented another report in which she stated that the gap between rich and poor has widened. The report "Public Good or Private Wealth" stated that 2,200 billionaires worldwide saw their wealth grow by 12% while the poorest half saw its wealth fall by 11%. Oxfam calls for a global tax overhaul to increase and harmonise global tax rates for corporations and wealthy individuals.<ref>{{cite web |last=Taylor |first=Chloe |date=January 2019 |url=https://www.vox.com/future-perfect/2019/1/22/18192774/oxfam-inequality-report-2019-davos-wealth |title=Richest 26 people now own same wealth as poorest half of the world, Oxfam claims |work=cnbc.com |access-date=27 January 2019}}</ref>

      "[[You'll own nothing and be happy]]" is a phrase adapted from an essay written by [[Ida Auken]] in 2016 for the WEF, pondering a future in which urban residents would rely on shared services for many expensive items such as appliances and vehicles. Shortly after its publication, a commentator for [[European Digital Rights]] criticized Auken's vision of centralized property ownership as a "[[benevolent dictatorship]]".<ref name="edri-2017">{{cite web |last1=McNamee |first1=Joe |title=ENDitorial: Happiness – owning nothing and having no privacy? |url=https://edri.org/our-work/enditorial-happiness-owning-nothing-no-privacy/ |website=European Digital Rights (EDRi) |access-date=11 August 2023 |archive-date=29 May 2023 |archive-url=https://web.archive.org/web/20230529180548/https://edri.org/our-work/enditorial-happiness-owning-nothing-no-privacy/ |url-status=live}}</ref> During the [[COVID-19 pandemic]], the phrase went viral, eliciting strongly negative reactions from mostly conservative but also some left-wing and unaffiliated commentators.<ref name="bronitsky">{{cite news |last1=Bronitsky |first1=Jonathan |title=Global Elites: 'No Money, No Problems' |url=https://www.newsweek.com/global-elites-no-money-no-problems-opinion-1755651 |access-date=19 March 2023 |work=Newsweek |date=1 November 2022 |language=en |archive-date=11 August 2023 |archive-url=https://web.archive.org/web/20230811021553/https://www.newsweek.com/global-elites-no-money-no-problems-opinion-1755651 |url-status=live}}</ref><ref name="nationalreview-2023">{{cite news |last1=Geraghty |first1=Jim |title=Davos Elites Try to Save the World while Ignoring Actual Threats |url=https://www.nationalreview.com/the-morning-jolt/davos-elites-try-to-save-the-world-while-ignoring-actual-threats/ |access-date=19 March 2023 |work=National Review |date=17 January 2023 |archive-date=2 August 2023 |archive-url=https://web.archive.org/web/20230802103936/https://www.nationalreview.com/the-morning-jolt/davos-elites-try-to-save-the-world-while-ignoring-actual-threats/ |url-status=live}}</ref> Responding to viral social media posts based on the phrase, the WEF denied that it had a goal related to limiting ownership of private property.<ref name="reuters-factcheck">{{cite news |title=Fact check: The World Economic Forum does not have a stated goal to have people own nothing by 2030 |url=https://www.reuters.com/article/uk-factcheck-wef-idUSKBN2AP2T0 |access-date=19 March 2023 |work=Reuters |date=25 February 2021 |language=en |archive-date=25 May 2022 |archive-url=https://web.archive.org/web/20220525140854/https://www.reuters.com/article/uk-factcheck-wef-idUSKBN2AP2T0 |url-status=live}}</ref>

      [[Rutger Bregman]], a Dutch historian invited to a 2018 WEF panel on inequality, went viral when he suggested that the best way for the attendees to attack inequality was to stop avoiding taxes.<ref>{{Cite news |date=30 January 2019 |title='This is not rocket science': Rutger Bregman tells Davos to talk about tax – video |language=en-GB |work=the Guardian |url=http://www.theguardian.com/business/video/2019/jan/30/this-is-not-rocket-science-rutger-bregman-tells-davos-to-talk-about-tax-video |access-date=13 August 2023 |issn=0261-3077 |archive-date=23 June 2023 |archive-url=https://web.archive.org/web/20230623143504/https://www.theguardian.com/business/video/2019/jan/30/this-is-not-rocket-science-rutger-bregman-tells-davos-to-talk-about-tax-video |url-status=live}}</ref><ref>{{Cite news |last=Elliott |first=Larry |date=1 February 2019 |title='This is about saving capitalism': the Dutch historian who savaged Davos elite |language=en-GB |work=The Guardian |url=https://www.theguardian.com/business/2019/feb/01/rutger-bregman-world-economic-forum-davos-speech-tax-billionaires-capitalism |access-date=13 August 2023 |issn=0261-3077 |archive-date=13 August 2023 |archive-url=https://web.archive.org/web/20230813221814/https://www.theguardian.com/business/2019/feb/01/rutger-bregman-world-economic-forum-davos-speech-tax-billionaires-capitalism |url-status=live}}</ref> Bregman described his motivation, saying "it feels like I’m at a firefighters’ conference and no one’s allowed to speak about water".

      ===Formation of a detached elite===
      {{Main|Global elite}}

      {{Anchor|Davos Man|"Davos Man"}}
      The formation of a detached elite, sometimes labeled with the [[neologism]] "Davos Man", refers to a global group whose members view themselves as completely "international". The term refers to people who "have little need for national loyalty, view national boundaries as obstacles, and see national governments as residues from the past whose only useful function is to facilitate the elite's global operations" according to political scientist [[Samuel P. Huntington]], who is credited with inventing the neologism.<ref>Timothy Garton Ash. [https://www.theguardian.com/comment/story/0,,1404411,00.html Davos man's death wish] {{webarchive|url=https://web.archive.org/web/20080821094256/http://www.guardian.co.uk/comment/story/0%2C%2C1404411%2C00.html |date=21 August 2008}}, ''[[The Guardian]]'', 3 February 2005</ref> In his 2004 article "Dead Souls: The Denationalization of the American Elite", Huntington argues that this international perspective is a minority elitist position not shared by the nationalist majority of the people.<ref>Samuel Huntington. [http://nationalinterest.org/article/dead-souls-the-denationalization-of-the-american-elite-620 "Dead Souls: The Denationalization of the American Elite"] {{webarchive |url=https://web.archive.org/web/20160914184047/http://nationalinterest.org/article/dead-souls-the-denationalization-of-the-american-elite-620 |date=14 September 2016}}, ''[[The National Interest]]'', Spring 2004</ref>

      The [[Transnational Institute]] describes the World Economic Forum's main purpose as being "to function as a socializing institution for the emerging global elite, globalization's "Mafiocracy" of bankers, industrialists, oligarchs, technocrats and politicians. They promote common ideas, and serve common interests: their own".<ref>{{cite web |last1=Marshall |first1=Andrew |title=World Economic Forum: A History and Analysis |url=https://www.tni.org/en/article/world-economic-forum-a-history-and-analysis |website=The Transnational Institute |date=20 January 2015 |access-date=9 August 2021 |archive-date=9 August 2021 |archive-url=https://web.archive.org/web/20210809055744/https://www.tni.org/en/article/world-economic-forum-a-history-and-analysis |url-status=live}}</ref>

      In 2019, the ''[[Manager Magazin]]'' journalist Henrik Müller argued that the "Davos Man" had already decayed into different groups and camps. He saw three central drivers for this development:<ref>{{Cite web|url=https://translate.google.com/translate?hl=en&sl=de&u=https://www.manager-magazin.de/politik/weltwirtschaft/wef-in-davos-weltwirtschaftsforum-und-seine-probleme-a-1248970.html&prev=search|title="Davos Man" and his successors|first=Henrik|last=Müller|date=21 January 2019 |access-date=14 June 2020|archive-date=14 June 2020|archive-url=https://web.archive.org/web/20200614163618/https://translate.google.com/translate?hl=en&sl=de&u=https://www.manager-magazin.de/politik/weltwirtschaft/wef-in-davos-weltwirtschaftsforum-und-seine-probleme-a-1248970.html&prev=search|url-status=live}}</ref>
      * Ideologically: the liberal western model was no longer considered a universal role model that other countries strive for (with China's digital totalitarianism or the traditional absolutism in the Persian Gulf as counter-proposals, all of which are represented by government members in Davos).
      * Socially: societies increasingly disintegrated into different groups, each of which evoked its own identity (e.g. embodied through the Brexit vote or congressional blockades in the USA).
      * Economically: the measured economic reality largely contradicted the established ideas of how the economy should actually work (despite economic upswings, wages and prices e.g. barely rose).

      In 2022 the term was again used in a book by ''The New York Times'' journalist [[Peter S. Goodman]]. Titled ''Davos Man: How the Billionaires Devoured the World'', it was described as a passionate book against global financial inequality.<ref>{{Cite news|date=20 January 2022 |title='Davos Man' is an angry, powerful look at economic inequality |language=en-US |work=NPR |url=https://www.npr.org/2022/01/20/1074378185/davos-man-is-an-angry-powerful-look-at-economic-inequality|access-date=6 February 2026|archive-date=25 January 2022 |archive-url=https://web.archive.org/web/20220125215337/https://www.npr.org/2022/01/20/1074378185/davos-man-is-an-angry-powerful-look-at-economic-inequality}}</ref>

      ===Public cost of security===
      [[File:Civil Defense Police (8419542894).jpg|thumb|right|The Graubünden Civil Defense Police during the 2013 annual meeting in Davos]]
      Critics argue that the WEF, despite having reserves of several hundred million Swiss francs and paying its executives salaries of around 1 million Swiss francs per year, would not pay any federal tax and moreover allocate a part of its costs to the public.<ref>{{Cite web|url=https://www.srf.ch/news/schweiz/geld-fuer-sicherheit-am-wef-knurrende-zustimmung-vom-staenderat-zu-wef-geldern|title=Geld für Sicherheit am WEF – Knurrende Zustimmung vom Ständerat zu WEF-Geldern|date=11 June 2021|website=Schweizer Radio und Fernsehen (SRF)|access-date=13 July 2021|archive-date=13 July 2021|archive-url=https://web.archive.org/web/20210713084558/https://www.srf.ch/news/schweiz/geld-fuer-sicherheit-am-wef-knurrende-zustimmung-vom-staenderat-zu-wef-geldern|url-status=live}}</ref> Following massive criticism from politicians and Swiss civil society, the Swiss federal government decided in February 2021 to reduce its annual contributions to the WEF.<ref>{{cite news |title=Bundesrat streicht dem WEF Geld |trans-title=Federal Council cancels WEF funding |url=https://www.suedostschweiz.ch/politik/2021-02-24/bundesrat-streicht-dem-wef-geld |work=[[Die Südostschweiz]] |agency=[[Swiss Telegraphic Agency|sda]] |date=24 February 2021 |language=de |access-date=12 July 2021 |archive-date=12 July 2021 |archive-url=https://web.archive.org/web/20210712121842/https://www.suedostschweiz.ch/politik/2021-02-24/bundesrat-streicht-dem-wef-geld |url-status=live}}</ref>

      As of 2018, the police and military expenditures carried by the federal government stood at 39 million Swiss francs.<ref>[https://www.srf.ch/news/schweiz/abstimmungen/abstimmungen/abstimmungen-davos/davos-stimmt-ab-mehr-geld-fuer-das-wef Davos stimmt ab – Mehr Geld für das WEF](in German) SRF.ch. Retrieved 23 January 2019 {{Webarchive|url=https://web.archive.org/web/20190123223146/https://www.srf.ch/news/schweiz/abstimmungen/abstimmungen/abstimmungen-davos/davos-stimmt-ab-mehr-geld-fuer-das-wef |date=23 January 2019}}</ref> The ''[[Aargauer Zeitung]]'' argued in January 2020 that the additional cost borne by the Kanton Graubünden stands at CHF 9 million per year.<ref>{{Cite web|url=https://translate.google.com/translate?hl=en&sl=de&tl=en&u=https%3A%2F%2Fwww.aargauerzeitung.ch%2Fschweiz%2Fdas-reiche-wef-waelzt-kosten-fuer-die-sicherheit-auf-bund-und-kantone-ab-das-stoesst-auf-kritik-136222933&prev=search|title=Das reiche WEF wälzt Kosten für die Sicherheit auf Bund und Kantone ab – das stösst auf Kritik|first=Lucien|last=Fluri|access-date=14 June 2020|archive-date=14 June 2020|archive-url=https://web.archive.org/web/20200614164950/https://translate.google.com/translate?hl=en&sl=de&tl=en&u=https://www.aargauerzeitung.ch/schweiz/das-reiche-wef-waelzt-kosten-fuer-die-sicherheit-auf-bund-und-kantone-ab-das-stoesst-auf-kritik-136222933&prev=search|url-status=live}}</ref>

      The Swiss Green Party summarised their criticism within the Swiss National Council that the holding of the World Economic Forum has cost Swiss taxpayers hundreds of millions of Swiss francs over the past decades. In their view, it was however questionable to what extent the Swiss population or global community benefit from these expenditures.<ref name="Geschäft Ansehen">{{Cite web|url=https://www.parlament.ch/de/ratsbetrieb/suche-curia-vista/geschaeft?AffairId=20203289|title=Was nützt das WEF der Schweizer Bevölkerung?|website=Das Schweizer Parlament|language=de|access-date=25 July 2021|archive-date=25 July 2021|archive-url=https://web.archive.org/web/20210725104724/https://www.parlament.ch/de/ratsbetrieb/suche-curia-vista/geschaeft?AffairId=20203289|url-status=live}}</ref>

      ===Gender debate===
      {{further|Gender bias}}
      Women have been broadly underrepresented at the WEF, according to some critics. The female participation rate at the WEF increased from 9% to 15% between 2001 and 2005. In 2016, 18% of the WEF attendees were female; this number increased to 21% in 2017, and 24% in 2020.<ref>A. Gibbs (2017). [https://www.cnbc.com/2017/01/16/as-world-leaders-descend-upon-wef-2017-in-davos-the-gender-debate-rumbles-on.html As world leaders descend upon Davos, the gender debate rumbles on] {{Webarchive|url=https://web.archive.org/web/20171020170507/https://www.cnbc.com/2017/01/16/as-world-leaders-descend-upon-wef-2017-in-davos-the-gender-debate-rumbles-on.html |date=20 October 2017}} CNBC News. Retrieved 17 January 2017.</ref><ref>A. Gibbs (2017). [https://qz.com/1529366/the-percentage-of-women-at-davos-is-greater-than-ever-before/ The percentage of women at Davos is greater than ever before] {{Webarchive|url=https://web.archive.org/web/20190823223152/https://qz.com/1529366/the-percentage-of-women-at-davos-is-greater-than-ever-before/ |date=23 August 2019}} Quartz. Retrieved 19 November 2019.</ref>

      Several women have since shared their personal impressions of the Davos meetings in media articles, highlighting that issues were more profound than "a quota at Davos for female leaders or a session on diversity and inclusion".<ref>{{cite web |website=BuzzFeed News |access-date=19 May 2020 |title=What It's Like To Be A Woman At The Old Boys Economic Forum |url=https://www.buzzfeednews.com/article/mariahsummers/what-its-like-to-be-a-woman-at-the-old-boys-economic-forum |first1=Mariah |last1=Summers |first2=Miriam |last2=Elder |date=26 January 2014 |archive-date=9 August 2020 |archive-url=https://web.archive.org/web/20200809091340/https://www.buzzfeednews.com/article/mariahsummers/what-its-like-to-be-a-woman-at-the-old-boys-economic-forum |url-status=live}}</ref><ref>{{cite web |title='Horizontal trade' looks to upswing at Davos meet |last=Curtis |first=Malcom |website=The Local |access-date=19 May 2020 |url=https://www.thelocal.ch/20140121/horizontal-trade-looks-to-upswing-at-davos |date=21 January 2014 |archive-date=15 June 2020 |archive-url=https://web.archive.org/web/20200615144255/https://www.thelocal.ch/20140121/horizontal-trade-looks-to-upswing-at-davos |url-status=live}}</ref><ref>{{cite web | title = Davos: Impressions of a First-Time Attendee | website = The Journal Blog | access-date = 19 May 2020 | url = https://blog.usejournal.com/davos-283f7fe42c07 | first = Baillie | last = Aaron | date = 22 February 2019 | archive-date = 30 November 2023 | archive-url = https://web.archive.org/web/20231130124258/https://baillieaaron.medium.com/davos-283f7fe42c07 | url-status = live}}</ref> The World Economic Forum has in this context filed legal complaints against at least three investigative articles by reporters Katie Gibbons and Billy Kenber that were published by the British newspaper ''[[The Times]]'' in March 2020, with the articles still online as of January 2024.<ref>{{Cite news | url = https://www.thetimes.com/business-money/economics/article/dark-side-of-davos-den-of-prostitution-and-predators-c77qwzd0j | title = The dark side of Davos: A den of prostitution and predators | website = The Times | last1 = Kenber | first1 = Billy | last2 = Gibbons | first2 = Katie | date = 23 March 2020 | access-date = 6 May 2022 | archive-date = 26 May 2022 | archive-url = https://web.archive.org/web/20220526093309/https://www.thetimes.co.uk/article/dark-side-of-davos-den-of-prostitution-and-predators-c77qwzd0j | url-status = live}}</ref><ref>{{Cite news | url = https://www.thetimes.com/life-style/sex-relationships/article/davos-investigation-at-parties-and-events-men-tried-to-get-sex-m8w5fck89 | title = Davos investigation: At parties and events, men tried to get sex | last1 = Gibbons | first1 = Katie | last2 = Kenber | first2 = Billy | date = 23 March 2020 | access-date = 6 May 2022 | website = The Times | archive-date = 24 May 2022 | archive-url = https://web.archive.org/web/20220524095656/https://www.thetimes.co.uk/article/davos-investigation-at-parties-and-events-men-tried-to-get-sex-m8w5fck89 | url-status = live}}</ref><ref>{{Cite news | website = The Times | url = https://www.thetimes.com/business-money/economics/article/businessman-left-davos-party-deciding-no-good-could-come-of-this-083s9hsnv | title = Davos investigation: Champagne flowed and music played as women greeted guests | last1 = Kenber | first1 = Billy | last2 = Gibbons | first2 = Katie | date = 24 March 2020 | access-date = 6 May 2022 | archive-date = 30 December 2021 | archive-url = https://web.archive.org/web/20211230161613/https://www.thetimes.co.uk/article/businessman-left-davos-party-deciding-no-good-could-come-of-this-083s9hsnv | url-status = live}}</ref><ref>{{Cite news|url=https://www.thetimes.com/business-money/economics/article/client-offered-me-prostitutes-at-davos-party-says-consultant-8n8k269m5|title=Client offered me prostitutes at Davos party, says consultant|first1=Billy|last1=Kenber|first2=Katie|last2=Gibbons|work=[[The Times]]|date=23 March 2020|access-date=6 May 2022|archive-date=25 May 2022|archive-url=https://web.archive.org/web/20220525075651/https://www.thetimes.co.uk/article/client-offered-me-prostitutes-at-davos-party-says-consultant-8n8k269m5|url-status=live}}</ref>

      ===Workplace discrimination===
      According to ''The Wall Street Journal'', the WEF has had numerous accusations of workplace discrimination against women and [[Black people]].<ref>{{Cite web|date=29 June 2024|title=Behind Davos, Claims of a Toxic Workplace|first1=Shalini|last1=Ramachandran|first2=Khadeeja|last2=Safdar|access-date=29 June 2024|website=The Wall Street Journal|url=https://www.wsj.com/business/world-economic-forum-klaus-schwab-discrimination-harassment-de285594?mod=mhp}}</ref>

      ===Undemocratic decision making===
      According to the [[European Parliamentary Research Service|European Parliament's think tank]], critics see the WEF as an instrument for political and business leaders to "take decisions without having to account to their electorate or shareholders".<ref>{{cite web | url = https://www.europarl.europa.eu/thinktank/en/document.html?reference=EPRS_BRI(2016)573928 | title = The World Economic Forum: Influential and controversial | publisher = European Parliament Think Tank | date = 19 January 2016 | access-date = 19 May 2020 | archive-date = 21 October 2020 | archive-url = https://web.archive.org/web/20201021005028/https://europarl.europa.eu/thinktank/en/document.html?reference=EPRS_BRI(2016)573928 | url-status = live}}</ref>

      Since 2009, the WEF has been working on a project called the Global Redesign Initiative (GRI), which proposes a transition away from intergovernmental decision-making towards a system of [[multi-stakeholder governance]]. According to the [[Transnational Institute|Transnational Institute (TNI)]], the Forum is hence planning to replace a recognised democratic model with a model where a self-selected group of "stakeholders" make decisions on behalf of the people.<ref name="Davos and its danger to Democracy">{{cite web | url = https://www.tni.org/en/article/davos-and-its-danger-to-democracy | title = Davos and its danger to Democracy | publisher = Transnational Institute | date = 18 January 2016 | access-date = 17 August 2021 | archive-date = 17 August 2021 | archive-url = https://web.archive.org/web/20210817095449/https://www.tni.org/en/article/davos-and-its-danger-to-democracy | url-status = live}}</ref>

      Some critics have seen the WEF's attention to goals like [[environmental protection]] and [[social entrepreneurship]] as mere window dressing to disguise its true [[plutocracy|plutocratic]] nature and goals.<ref name="Meyer">{{Cite web |last=Meyer |first=Frank A. |date=26 May 2021 |url=https://www.cicero.de/wirtschaft/meinungsherrschaft-ziemlich-verstiegen |title=Meinungsherrschaft – Ziemlich verstiegen |website=Cicero Online |language=de |access-date=12 August 2021 |archive-date=12 August 2021 |archive-url=https://web.archive.org/web/20210812143340/https://www.cicero.de/wirtschaft/meinungsherrschaft-ziemlich-verstiegen |url-status=live}}</ref> In a ''[[The Guardian|Guardian]]'' opinion piece, Cas Mudde said that such plutocrats should not be the group to have control over the political agendas and decide which issues to focus on and how to support them.<ref name="-Mudde">{{cite web |last=Mudde |first=Cas |url=https://www.theguardian.com/commentisfree/2020/jan/25/davos-world-economic-forum-capitalism-plutocracy |title=The high priests of plutocracy all meet at Davos. What good can come from that? |website=[[The Guardian]] |date=25 January 2020 |access-date=24 September 2021 |archive-date=24 September 2021 |archive-url=https://web.archive.org/web/20210924150239/https://www.theguardian.com/commentisfree/2020/jan/25/davos-world-economic-forum-capitalism-plutocracy |url-status=live}}</ref> A writer in the German magazine ''[[Cicero (magazine)|Cicero]]'' saw the situation as academic, cultural, media and economic elites grasping for social power while disregarding political decision processes. A materially well-endowed milieu would in this context try to "cement its dominance of opinion and sedate ordinary people with maternalistic-paternalistic social benefits, so that they are not disturbed by the common people when they steer".<ref name="Meyer"/> The French ''[[Les Echos (France)|Les Echos]]'' furthermore concludes that Davos "represents the exact values people rejected at the ballot box".<ref>{{Cite web|url=https://www.lesechos.fr/2017/01/davos-un-forum-remis-en-question-159369|title=Davos : un forum remis en question ?|date=18 January 2017|website=Les Echos|language=fr|access-date=15 August 2021|archive-date=15 August 2021|archive-url=https://web.archive.org/web/20210815091055/https://www.lesechos.fr/2017/01/davos-un-forum-remis-en-question-159369|url-status=live}}</ref>

      === Lack of financial transparency ===
      {{further|Financial transparency}}
      In 2017, the former ''[[Frankfurter Allgemeine Zeitung]]'' journalist Jürgen Dunsch criticized that financial reports of the WEF were not very transparent since neither income nor expenditures were broken down. In addition, he outlined that the foundation capital was not quantified while the apparently not insignificant profits would be reinvested.<ref name="SZ-money machine">{{cite news |last=Busse |first=Caspar |title=Das Weltwirtschaftsforum ist zu einer Geldmaschine geworden |trans-title=The World Economic Forum has become a money machine |url=https://www.sueddeutsche.de/wirtschaft/davos-das-weltwirtschaftsforum-ist-zu-einer-geldmaschine-geworden-1.3334817 |work=[[Süddeutsche Zeitung]] |date=17 January 2017 |language=de |access-date=20 May 2020 |archive-date=5 August 2020 |archive-url=https://web.archive.org/web/20200805111333/https://www.sueddeutsche.de/wirtschaft/davos-das-weltwirtschaftsforum-ist-zu-einer-geldmaschine-geworden-1.3334817 |url-status=live}}</ref>

      Recent annual reports published by the WEF include a more detailed breakdown of its financials and indicate revenues of CHF 349 million for the year 2019 with reserves of CHF 310 million and a foundation capital of CHF 34 million. There are no further details provided to what asset classes or individual names the WEF allocates its financial assets of CHF 261 million.<ref>{{cite web |url=http://www3.weforum.org/docs/WEF_Annual_Report_18-19.pdf |title=Annual Report 2018–2019 |publisher=World Economic Forum |date=2019 |access-date=9 July 2021 |archive-date=14 May 2021 |archive-url=https://web.archive.org/web/20210514173922/https://www3.weforum.org/docs/WEF_Annual_Report_18-19.pdf |url-status=live}}</ref> From July 2019 to June 2020, the World Economic Forum has spent €250,000 on lobbying the [[European Union]].<ref>{{Cite web |title=World Economic Forum |url=https://www.lobbyfacts.eu/datacard/world-economic-forum?rid=567538843366-43&sid=142243 |access-date=22 June 2024 |website=lobbyfacts}}</ref>

      The German newspaper ''[[Süddeutsche Zeitung]]'' criticised in this context that the WEF had turned into a "money printing machine", which is run like a family business and forms a comfortable way to make a living for its key personnel. The foundation's founder Klaus Schwab draws a salary of around one million Swiss francs per year.<ref name="SZ-money machine" />

      === Unclear selection criteria ===

      In a request to the [[National Council (Switzerland)|Swiss National Council]], the [[Swiss Green Party]] criticised that invitations to the annual meeting and programmes of the World Economic Forum are issued according to unclear criteria. They highlight that "despots" such as the son of the former Libyan dictator [[Saif al-Islam al-Gaddafi]] had been invited to the WEF and even awarded membership in the club of "Young Global Leaders".<ref name="Geschäft Ansehen"/> Even after the beginning of the [[Arab spring]] in December 2010 and related violent uprisings against despot regimes, the WEF continued to invite Gaddafi to its annual meeting.<ref>{{Cite web|url=https://www.swissinfo.ch/eng/gaddafi-s-son-to-get-wef-invitation/29133964|title=Gaddafi's son to get WEF invitation|date=29 December 2010 |access-date=1 August 2021|archive-date=1 August 2021|archive-url=https://web.archive.org/web/20210801114449/https://www.swissinfo.ch/eng/gaddafi-s-son-to-get-wef-invitation/29133964|url-status=live|author-first1=Julia|author-last1=Slater}}</ref>

      === Environmental footprint of annual meetings ===
      Critics emphasise that the annual meeting of the World Economic Forum is counterproductive when combating pressing problems of humanity such as the climate crisis. Even in 2020, participants travelled to the WEF annual meeting in Davos on around 1,300 private jets while the total emissions burden from transport and accommodation were enormous in their view.<ref>{{Cite web|url=https://www.theguardian.com/commentisfree/2020/jan/24/billionaires-davos-climate-crisis-world-economic-forum|title=We can't trust the billionaires of Davos to solve a climate crisis they created &#124; Payal Parekh|website=[[TheGuardian.com]]|date=24 January 2020|access-date=25 July 2021|archive-date=25 July 2021|archive-url=https://web.archive.org/web/20210725105938/https://www.theguardian.com/commentisfree/2020/jan/24/billionaires-davos-climate-crisis-world-economic-forum|url-status=live}}</ref><ref name="Geschäft Ansehen"/>

      === Corporate capture of global and democratic institutions ===
      The World Economic Forum's "Global Redesign" report suggests to create "public-private" [[United Nations]] (UN) in which selected agencies operate and steer global agendas under shared governance systems.<ref name="Martens">{{cite book |last=Martens |first=Jens |chapter-url=https://link.springer.com/chapter/10.1007/978-3-030-30469-0_12 |title=Sustainable Development Goals and Human Rights. Interdisciplinary Studies in Human Rights |chapter=The Role of Public and Private Actors and Means in Implementing the SDGs: Reclaiming the Public Policy Space for Sustainable Development and Human Rights |editor-last1=Kaltenborn |editor-first1=M. |editor-last2=Krajewski |editor-first2=M. |editor-last3=Kuhn |editor-first3=H. |publisher=Springer |location=Cham |year=2020 |volume=5 |pages=207–220 |doi=10.1007/978-3-030-30469-0_12 |isbn=978-3-030-30468-3 |s2cid=213580432 |access-date=17 August 2021 |archive-date=17 August 2021 |archive-url=https://web.archive.org/web/20210817101705/https://link.springer.com/chapter/10.1007/978-3-030-30469-0_12 |url-status=live}}</ref>

      In September 2019, more than 400 civil society organizations and 40 international networks heavily criticised a partnership agreement between WEF and the United Nations and called on the [[UN Secretary-General|UN secretary-general]] to end it.<ref>{{Cite web|url=https://www.cognitoforms.com/MultistakeholderismActionGroup/CorporateCaptureOfGlobalGovernanceTheWorldEconomicForumWEFUNPartnershipAgreementIsADangerousThreatToUN|title=Corporate capture of global governance: The World Economic Forum (WEF)-UN partnership agreement is a dangerous threat to UN System|website=www.cognitoforms.com|access-date=14 August 2021|archive-date=22 August 2021|archive-url=https://web.archive.org/web/20210822032237/https://www.cognitoforms.com/MultistakeholderismActionGroup/CorporateCaptureOfGlobalGovernanceTheWorldEconomicForumWEFUNPartnershipAgreementIsADangerousThreatToUN|url-status=live}}</ref> They see such an agreement as a "disturbing corporate capture of the UN, which moved the world dangerously towards a privatised global governance".<ref>{{Cite web|url=http://fian.org/en/press-release/article/wef-takeover-of-un-strongly-condemned-2273|title=WEF takeover of UN strongly condemned|website=fian.org|date=16 January 2020 |access-date=15 August 2021|archive-date=15 August 2021|archive-url=https://web.archive.org/web/20210815154607/https://fian.org/en/press-release/article/wef-takeover-of-un-strongly-condemned-2273|url-status=live}}</ref> The Dutch Transnational Institute think tank summarises that we are increasingly entering a world where gatherings such as Davos are "a silent global [[coup d'état]]" to capture governance.<ref name="Davos and its danger to Democracy"/>

      === Non-accreditation of critical media outlets ===
      In 2019, the Swiss newspaper ''[[WOZ Die Wochenzeitung|WOZ]]'' received a refusal of its accreditation request for the annual meeting with the editors and subsequently accused the World Economic Forum of favoring specific media outlets. The newspaper highlighted that the WEF stated in its refusal message that it [the forum] prefers media outlets it works with throughout the year. ''WOZ'' deputy head Yves Wegelin called this a strange idea of journalism because in "journalism you don't necessarily have to work with large corporations, but rather critique them".<ref>{{Cite web|url=https://www.deutschlandfunk.de/weltwirtschaftsforum-in-davos-keine-akkreditierung-fuer.2907.de.html?dram:article_id=463879 |title=Weltwirtschaftsforum in Davos – Keine Akkreditierung für kritische Wochenzeitung |website=Deutschlandfunk |date=20 November 2019 |language=de}}</ref>

      === Institutional initiatives ===
      In addition to economic policy, the WEF's agenda is in recent years increasingly focusing on positively connoted activist topics such as [[environmental protection]]<ref name="World Economic Forum"/> and [[social entrepreneurship]],<ref>{{cite web|title=Home|website=Schwab Foundation for Social Entrepreneurship|url=http://www.schwabfound.org/|archive-date=4 May 2019|archive-url=https://web.archive.org/web/20190504005120/http://www.schwabfound.org/|url-status=live}}</ref> which critics see as a strategy to disguise the organisation's true [[plutocracy|plutocratic]] goals.<ref>{{cite web | url = https://www.theguardian.com/commentisfree/2020/jan/25/davos-world-economic-forum-capitalism-plutocracy | title = The high priests of plutocracy all meet in Davos. What good can come from that? |author-first1=Cas|author-last1=Mudde| work = The Guardian | date = 25 January 2020 | access-date = 24 September 2021 | archive-date = 24 September 2021 | archive-url = https://web.archive.org/web/20210924150239/https://www.theguardian.com/commentisfree/2020/jan/25/davos-world-economic-forum-capitalism-plutocracy | url-status = live}}</ref><ref>{{citation|surname1=Steven Umbrello|periodical=The Journal of Value Inquiry|title=Should We Reset? Eine Rezension von Klaus Schwab und Thierry Mallerets 'COVID-19: The Great Reset' |at=pp.&nbsp;1–8|issn=1573-0492|pmc=7886645|date=17 February 2021|volume=56 |issue=4 |language=German|doi=10.1007/s10790-021-09794-1}}</ref><ref>{{Cite web|url=https://www.cicero.de/wirtschaft/meinungsherrschaft-ziemlich-verstiegen|title=Dominion of Opinion - Quite Degenerate|website=Cicero Online|language=en|access-date=12 August 2021|archive-date=12 August 2021|archive-url=https://web.archive.org/web/20210812143340/https://www.cicero.de/wirtschaft/meinungsherrschaft-ziemlich-verstiegen|url-status=live}}</ref>

      In a December 2020 article by ''[[The Intercept]]'', author [[Naomi Klein]] described that the WEF's initiatives like the "Great Reset" were simply a "coronavirus-themed rebranding" of things that the WEF was already doing and that it was an attempt by the rich to make themselves look good. In her opinion, "the Great Reset is merely the latest edition of this gilded tradition, barely distinguishable from earlier Davos Big Ideas.<ref name="intercept120820">{{cite news |last1=Klein |first1=Naomi |title=The Great Reset Conspiracy Smoothie |url=https://theintercept.com/2020/12/08/great-reset-conspiracy/ |access-date=14 December 2020 |work=The Intercept |date=8 December 2020 |archive-date=13 December 2020 |archive-url=https://web.archive.org/web/20201213162038/https://theintercept.com/2020/12/08/great-reset-conspiracy/ |url-status=live|quote=Writing about 'The Great Reset' is not easy. It has turned into a viral conspiracy theory purporting to expose something no one ever attempted to hide, most of which is not really happening anyway, some of which actually should.}}</ref>

      Similarly, in his review of ''COVID-19: The Great Reset'', ethicist Steven Umbrello makes parallel critiques of the agenda. He says that the WEF "whitewash[es] a seemingly optimistic future post-Great Reset with buzz words like equity and sustainability" while it functionally jeopardizes those goals.<ref>{{Cite journal|last=Umbrello|first=Steven|date=17 February 2021|title=Should We Reset? A Review of Klaus Schwab and Thierry Malleret's 'COVID-19: The Great Reset'|url= |journal=The Journal of Value Inquiry|volume=56 |issue=4 |pages=693–700|language=en|doi=10.1007/s10790-021-09794-1|issn=1573-0492|pmc=7886645}}</ref>

      A study published in the [[Journal of Consumer Research]] investigated the sociological impact of the WEF. It concluded that the WEF does not solve issues such as, poverty, global warming, and chronic illnesses, or debt. The Forum has, according to the study, simply shifted the burden for the solution of these problems from governments and business to "responsible consumers subjects: the green consumer, the health-conscious consumer, and the financially literate consumer".<ref>{{Cite news |url=https://www.jstor.org/stable/10.1086/677842 |title=Creating the Responsible Consumer: Moralistic Governance Regimes and Consumer Subjectivity |date=28 August 2021 |work=Blick |doi=10.1086/677842 |jstor=10.1086/677842 |language=en |last1=Giesler |first1=Markus |last2=Veresiu |first2=Ela |volume=41 |issue=3 |pages=840–857 |access-date=28 August 2021 |archive-date=28 August 2021 |archive-url=https://web.archive.org/web/20210828083124/https://www.jstor.org/stable/10.1086/677842 |url-status=live}}</ref>

      === Appropriation of global crises ===
      In December 2021, the Catholic Cardinal and former [[prefect]] of the [[Congregation for the Doctrine of the Faith]] (CDF) [[Gerhard Ludwig Müller]] criticised in a controversial interview that people like WEF founder Schwab were sitting "on the throne of their wealth" and were not touched by the everyday difficulties and sufferings people face e.g. due to the COVID-19 pandemic. On the contrary, such elites would see crises as an opportunity to push through their agendas. He particularly criticised the control such people would exercise on people and their embracement of areas such as [[transhumanism]].<ref>{{cite web|title=Vatican Court judge criticizes Bill Gates, George Soros and Klaus Schwab for using Covid to impose 'total control' on population|periodical=The Rio Times|publisher=|url=https://www.riotimesonline.com/brazil-news/modern-day-censorship/vatican-court-judge-criticizes-bill-gates-george-soros-and-klaus-schwab-for-using-covid-to-impose-total-control-on-population/|date=14 December 2021|language=en-US|archive-date=21 December 2021|archive-url=https://web.archive.org/web/20211221040114/https://www.riotimesonline.com/brazil-news/modern-day-censorship/vatican-court-judge-criticizes-bill-gates-george-soros-and-klaus-schwab-for-using-covid-to-impose-total-control-on-population/|url-status=live}}</ref><ref>{{Cite web |url=https://www.oberhessische-zeitung.de/politik/ausland/kardinal-muller-und-die-verschworungsmythen_24989665 |title=Cardinal Müller and the conspiracy myths |date=13 December 2021 |language=en |access-date=19 December 2021 |archive-date=19 December 2021 |archive-url=https://web.archive.org/web/20211219150400/https://www.oberhessische-zeitung.de/politik/ausland/kardinal-muller-und-die-verschworungsmythen_24989665 |url-status=live}}</ref> The [[Central Council of Jews in Germany]] condemned this criticism, which is also linked to Jewish financial investors, as antisemitic.<ref>{{Cite news |last=Jansen |first=Thomas |title=Zentralrat der Juden wirft Kardinal Müller 'antisemitische Chiffren' vor |trans-title=Statement on Corona pandemic: Central Council of Jews accuses Cardinal Müller of "anti-Semitic ciphers" |newspaper=Faz.net |url=https://www.faz.net/aktuell/politik/inland/zentralrat-der-juden-kardinal-mueller-bedient-antisemitische-chiffren-17684690.html |access-date=19 December 2021 |language=de |archive-date=16 December 2021 |archive-url=https://web.archive.org/web/20211216012643/https://www.faz.net/aktuell/politik/inland/zentralrat-der-juden-kardinal-mueller-bedient-antisemitische-chiffren-17684690.html |url-status=live}}</ref>

      On the other hand, the WEF has been criticized as "hypocritical" towards Palestinian human rights, when it rejected a petition from its own constituents to condemn Israel's aggression against Palestinians.<ref>{{cite news |last1=Jamal |first1=Hebh |date=19 January 2023 |title=Ukraine a 'special case': Is the WEF 'hypocritical' on Palestine? |publisher=Al Jazeera English |agency=Al Jazeera English |url=https://www.aljazeera.com/news/2023/1/19/ukraine-a-special-case-emails-show-wef-palestine-hypocrisy |url-status=live |access-date=19 January 2023 |archive-url=https://web.archive.org/web/20230119063541/https://www.aljazeera.com/news/2023/1/19/ukraine-a-special-case-emails-show-wef-palestine-hypocrisy |archive-date=19 January 2023}}</ref> WEF cited the need to remain "impartial" on the issue. However, [[Khaled Al Sabawi]], writing in [[MondoWeiss]] called it hypocritical after it voluntarily condemned Russia's aggression against Ukraine months later.<ref>{{Cite web |date=1 March 2023 |title=The World Economic Forum has outed itself as anti-Palestinian |url=https://mondoweiss.net/2023/03/the-world-economic-forum-has-outed-itself-as-anti-palestinian/ |access-date=13 September 2023 |website=Mondoweiss |language=en-US |archive-date=31 October 2023 |archive-url=https://web.archive.org/web/20231031151008/https://mondoweiss.net/2023/03/the-world-economic-forum-has-outed-itself-as-anti-palestinian/ |url-status=live}}</ref>

      === Tampering data ===
      In July 2025, the founder of World Economic Forum, Klaus Schwab, was accused of abuse of power after an internal WEF investigation found that when data for the 2017/18 WEF's Annual Competitiveness Report showed the UK had moved up the ranking from seventh to fourth place he intervened by writing to staff that the UK "must not see any improvement" as this would otherwise be "exploited by the Brexit camp". The final report published showed the UK had instead dropped by one place to eighth.<ref>{{Cite news |last1=Crisp |first1=James |last2=Barnes |first2=Joe |date=21 July 2025 |title=World Economic Forum 'rigged data' to make Brexit look like failure |url=https://www.telegraph.co.uk/world-news/2025/07/21/wef-rigged-data-to-make-brexit-look-like-failure/ |access-date=22 July 2025 |work=The Telegraph |language=en-GB |issn=0307-1235}}</ref> In the same report India should have dropped 20 places in the ranking. However Schwab told his staff that "we must protect our relationship with India before Davos 2019", consequently the published report showed India had dropped by only one place to fortieth.<ref>{{Cite news |last=Rutishauser |first=Arthur |date=19 July 2025 |title=Exorbitante Spesen, manipulierte Berichte und peinliche Mails |trans-title=Exorbitant expenses, manipulated reports and embarrassing emails |url=https://www.tagesanzeiger.ch/klaus-schwab-spesen-manipulierte-berichte-peinliche-mails-746168819880 |access-date=24 July 2025 |work=Tages Anzeiger |language=de}}</ref>

      ==Controversies==
      === Whistleblower allegations and controversy with Klaus Schwab ===
      In May 2025, Klaus Schwab launched a defamation and coercion complaint against anonymous whistleblowers whose allegations prompted his resignation as chair of the WEF board of trustees in 2025. The accusations, including claims of financial impropriety, research manipulation, and mishandling of sexual harassment cases, were described by Schwab as "stupid and constructed". Despite stepping down from the WEF, Schwab maintains his innocence and has stated that his lawyers filed a criminal complaint with the Geneva public prosecutor, marking a turbulent period for the World Economic Forum as an organisation. The controversy also highlighted management issues at the WEF identified in earlier investigations and reignited scrutiny over its workplace culture.<ref>{{cite web |url=https://www.ft.com/content/64533727-a342-4e35-9eab-4f6010d13cef |title=Davos founder Klaus Schwab launches criminal complaint against accusers |work=Financial Times |url-access=subscription |last=Ruehl |first=Mercedes |date=29 May 2025 |access-date=10 June 2025}}</ref>

      === Davos municipality ===
      In June 2021, WEF founder Klaus Schwab sharply criticised what he characterized as the "profiteering", "complacency" and "lack of commitment" by the municipality of Davos in relation to the annual meeting. He mentioned that the preparation of the COVID-related meeting in Singapore in 2021/2022<ref>{{cite news |title=WEF Cancels Singapore Meeting as Pandemic Haunts Global Event |first=Catherine |last=Bosley |date=17 May 2021 |work=Bloomberg |url=https://www.bloomberg.com/news/articles/2021-05-17/world-economic-forum-to-cancel-annual-meeting-in-singapore |access-date=30 July 2021 |archive-date=30 July 2021 |archive-url=https://web.archive.org/web/20210730163733/https://www.bloomberg.com/news/articles/2021-05-17/world-economic-forum-to-cancel-annual-meeting-in-singapore |url-status=live}}</ref> had created an alternative to its Swiss host and sees the chance that the annual meeting will stay in Davos between 40 and 70 percent.<ref>{{Cite news |last=Pöschl |first=Fabian |url=https://www.20min.ch/story/wef-chef-droht-davos-wegen-ueberrissener-preise-917744096507 |title=WEF-Chef Klaus Schwab droht Davos wegen überrissener Preise |date=25 June 2021 |work=20 Minuten |language=de |access-date=30 July 2021 |archive-date=30 July 2021 |archive-url=https://web.archive.org/web/20210730163735/https://www.20min.ch/story/wef-chef-droht-davos-wegen-ueberrissener-preise-917744096507 |url-status=live}}</ref><ref>{{Cite news |url=https://www.blick.ch/wirtschaft/geschaeftemacherei-selbstzufriedenheit-wef-gruender-klaus-schwab-kritisiert-davos-scharf-id16627148.html |title=WEF-Gründer Klaus Schwab kritisiert Davos scharf |date=24 June 2021 |work=Blick |language=de |access-date=30 July 2021 |archive-date=30 July 2021 |archive-url=https://web.archive.org/web/20210730163734/https://www.blick.ch/wirtschaft/geschaeftemacherei-selbstzufriedenheit-wef-gruender-klaus-schwab-kritisiert-davos-scharf-id16627148.html |url-status=live}}</ref>

      === Usage of "Davos" ===
      As there are many other international conferences nicknamed with "Davos" such as the "Davos of the Desert" event organised by [[Saudi Arabia]]'s [[Future Investment Initiative Institute]],<ref name="Quartz-18-10-22" /> the World Economic Forum objected to the use of "Davos" in such contexts for any event not organised by them.<ref name="WEF-PR_18-10-22">{{cite press release |title=World Economic Forum Objects to Misuse of the 'Davos' Brand |url=https://www.weforum.org/press/2018/10/world-economic-forum-objects-to-misuse-of-the-davos-brand/ |publisher=World Economic Forum |accessdate=24 October 2018 |date=22 October 2018 |archive-date=24 October 2018 |archive-url=https://web.archive.org/web/20181024192220/https://www.weforum.org/press/2018/10/world-economic-forum-objects-to-misuse-of-the-davos-brand/ |url-status=live}}</ref><ref name="WSJ-18-10-22" /><ref name="Bloomberg-18-10-22" /><ref name="Quartz-18-10-22" /> This particular statement was issued on 22 October 2018, a day before the opening of 2018 [[Future Investment Initiative]] (nicknamed "Davos in the desert") organised by the [[Public Investment Fund of Saudi Arabia]].<ref name="WSJ-18-10-22">{{cite news |last1=Jakab |first1=Spencer |title=The Davos of Public Relations Disasters |url=https://www.wsj.com/articles/the-davos-of-public-relations-disasters-1540222657 |accessdate=24 October 2018 |work=[[The Wall Street Journal]] |publisher=[[Dow Jones & Company]] |date=22 October 2018 |archive-date=24 October 2018 |archive-url=https://web.archive.org/web/20181024002737/https://www.wsj.com/articles/the-davos-of-public-relations-disasters-1540222657 |url-status=live}}</ref><ref name="Bloomberg-18-10-22">{{cite news |last1=Bosley |first1=Catherine |title=WEF Condemns Use of 'Davos' Label One Day Before Saudi Summit |url=https://www.bloomberg.com/news/articles/2018-10-22/wef-condemns-use-of-davos-label-one-day-before-saudi-summit |accessdate=24 October 2018 |publisher=[[Bloomberg News]] |date=22 October 2018 |archive-date=24 October 2018 |archive-url=https://web.archive.org/web/20181024193608/https://www.bloomberg.com/news/articles/2018-10-22/wef-condemns-use-of-davos-label-one-day-before-saudi-summit |url-status=live}}</ref><ref name="Quartz-18-10-22">{{cite news |last1=Hassan |first1=Aisha |title=The organizers of Davos want nothing to do with Saudi Arabia's "Davos in the Desert" |url=https://qz.com/1432766/the-wef-wants-nothing-to-do-with-saudi-arabias-davos-in-the-desert/ |accessdate=24 October 2018 |work=[[Quartz (publication)|Quartz]] |publisher=Quartz Media |date=23 October 2018 |archive-date=24 October 2018 |archive-url=https://web.archive.org/web/20181024192733/https://qz.com/1432766/the-wef-wants-nothing-to-do-with-saudi-arabias-davos-in-the-desert/ |url-status=live}}</ref>

      ==Alternatives==
      === Open Forum Davos ===
      Since the annual meeting in January 2003 in Davos, an ''Open Forum Davos'',<ref>{{cite web |url=http://www.openforumdavos.ch/ |title=Open Forum Davos, Schweizerischer Evangelischer Kirchenbund |website=Openforumdavos.ch |access-date=7 March 2010 |archive-url=https://web.archive.org/web/20100202022348/http://www.openforumdavos.ch/ |archive-date=2 February 2010 |url-status=dead}}</ref> which was co-organized by the [[Swiss Reformed Church|Federation of Swiss Protestant Churches]], is held concurrently with the Davos forum, opening up the debate about globalization to the general public. The Open Forum has been held in the local high school every year, featuring top politicians and business leaders. It is open to all members of the public free of charge.<ref name=pigman5>{{cite book |title=The World Economic Forum – A Multi-Stakeholder Approach to Global Governance |last=Pigman |first=Geoffrey Allen |page=130 |year=2007 |isbn=978-0-415-70204-1 |publisher=Routledge |location=London}}</ref><ref>{{cite web |url=https://www.youtube.com/view_play_list?p=78AB043A344C2C6A |title=Open Forum |publisher=YouTube |access-date=7 March 2010 |archive-date=25 January 2011 |archive-url=https://web.archive.org/web/20110125214215/http://www.youtube.com/view_play_list?p=78AB043A344C2C6A |url-status=live}}</ref>

      === Public Eye Awards ===
      The [[Public Eye Awards]] were held every year from 2000 to 2015. It is a counter-event to the annual meeting of the World Economic Forum in Davos. Public Eye Awards is a "public competition of the worst corporations in the world." In 2011, more than 50,000 people voted for companies that acted irresponsibly. At a ceremony at a Davos hotel, the "winners" in 2011 were named as Indonesian [[palm oil]] diesel maker, [[Neste Oil]] in Finland, and mining company [[AngloGold Ashanti]] in South Africa.<ref>{{cite news |last=Lang |first=Olivia |url=http://news.bbc.co.uk/1/hi/business/davos/9379067.stm |title=BBC Davos Day three |publisher=BBC News |date=28 January 2011 |accessdate=29 November 2011 |archive-date=30 November 2023 |archive-url=https://web.archive.org/web/20231130124254/http://news.bbc.co.uk/1/hi/business/davos/9379067.stm |url-status=live}}</ref> According to [[Schweiz aktuell]] broadcast on 16 January 2015, a public presence during the WEF 2015, may not be guaranteed because the massively increased security in Davos. The Public Eye Award will be awarded for the last time in Davos: "Public Eyes says Goodbye to Davos", confirmed by Rolf Marugg (now [[Landrat]]s politician), by not directly engaged politicians, and by the police responsible.<ref name="schweizaktuell-20150116">[http://www.srf.ch/news/wirtschaft/wef-2015/wef-ohne-kritiker Gianluca Galgani: WEF ohne Kritiker] Schweizer Radio und Fernsehen, 16 January 2016. Retrieved 20 January 2015 {{webarchive |url=https://web.archive.org/web/20160804084820/http://www.srf.ch/news/wirtschaft/wef-2015/wef-ohne-kritiker |date=4 August 2016}}</ref>

