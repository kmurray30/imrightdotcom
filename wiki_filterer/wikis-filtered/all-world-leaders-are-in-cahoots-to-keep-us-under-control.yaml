      The [[Paris Agreement]] is an agreement within the [[United Nations Framework Convention on Climate Change]] (UNFCCC) dealing with [[Climate change mitigation|greenhouse gas emissions mitigation]], [[Climate change adaptation|adaptation]] and finance starting in the year 2020. The Agreement aims to respond to the global climate change threat by keeping a global temperature rise this century well below 2 degrees Celsius above pre-industrial levels and to pursue efforts to limit the temperature increase even further to 1.5 degrees Celsius.<ref>{{Cite web | title=The Paris Agreement - main page | url=http://unfccc.int/paris_agreement/items/9485.php | archive-url=https://web.archive.org/web/20160326214208/http://unfccc.int:80/paris_agreement/items/9485.php | access-date=2025-09-21 | archive-date=2016-03-26}}</ref>

      ==History==
      The language of the agreement was negotiated by representatives of 197 parties at the [[2015 United Nations Climate Change Conference|21st Conference of the Parties of the UNFCCC]] in [[Paris]] and adopted by consensus on 12 December 2015.<ref>{{cite book |last1=Jepsen |display-authors=etal |first1=Henrik |title=Negotiating the Paris Agreement: The Insider Stories |publisher=Cambridge University Press |url=https://www.cambridge.org/core/books/negotiating-the-paris-agreement/660C5CB692E6AE32FE9244374CD1EF39 |date=2021 |isbn= 9781108886246}}</ref><ref name="auto">{{cite news |url=http://www.cnn.com/2015/12/12/world/global-climate-change-conference-vote/ |title=Final draft of climate deal formally accepted in Paris |last1=Sutter |first1=John D. |last2=Berlinger |first2=Joshua |date=12 December 2015 |website=CNN |publisher=Cable News Network, Turner Broadcasting System, Inc. |access-date=12 December 2015}}</ref><ref>{{cite web|url=http://www.abc.net.au/news/2015-12-12/france-presents-ambitious,-balanced-draft-climate-agreement/7023712|work=ABC Australia|title=Paris climate talks: France releases 'ambitious, balanced' draft agreement at COP21|date=12 December 2015}}</ref>  The Agreement was open for signature by States and regional economic integration organizations that are Parties to the UNFCCC (the Convention) from 22 April 2016 to 21 April 2017 at the UN Headquarters in New York.<ref>[https://unfccc.int/resource/docs/2015/cop21/eng/l09.pdf Article 20(1)]</ref> The agreement stated that it would enter into force (and thus become fully effective) only if 55 countries that produce at least 55% of [[List of countries by greenhouse gas emissions|the world's greenhouse gas emissions]] (according to a list produced in 2015)<ref name=ratpct>{{cite web|url=http://unfccc.int/resource/docs/2015/cop21/eng/10.pdf#page=30|work=UNFCCC|accessdate=23 April 2016|title=Information provided in accordance with paragraph 104 of decision 1 CP21 related to entry into force of the Paris Agreement (Article 21)}}</ref> ratify, accept, approve or accede to the agreement.<ref>Article 21(1)</ref><ref name="auto2">{{cite web |url=http://newsroom.unfccc.int/unfccc-newsroom/finale-cop21/ |title=Historic Paris Agreement on Climate Change - 195 Nations Set Path to Keep Temperature Rise Well Below 2 Degrees Celsius |author=<!--Staff writer(s); no by-line.--> |date=12 December 2015 |website=UN Climate Change Newsroom |publisher=United Nations Framework Convention on Climate Change |access-date=14 December 2015 |archive-url=https://web.archive.org/web/20160117141004/http://newsroom.unfccc.int/unfccc-newsroom/finale-cop21/ |archive-date=17 January 2016 |url-status=dead }}</ref> On 1 April 2016, the United States and China, which together represent almost 40% of global emissions, issued a joint statement confirming that both countries would sign the Paris Climate Agreement.<ref>{{cite web|last=McGrath |first=Matt |url=https://www.bbc.com/news/science-environment-35935756?ocid=global_bbccom_email_31032016_top+news+stories |title=Paris Climate Treaty: 'Significant step' as US and China agree to sign |publisher=Bbc.com |date=31 March 2016 |accessdate=23 April 2016}}</ref><ref>[https://www.nytimes.com/2016/04/01/world/asia/obama-and-president-xi-of-china-vow-to-sign-paris-climate-accord-promptly.html ''Obama and President Xi of China Vow to Sign Paris Climate Agreement Promptly''] 1 April 2016</ref> 175 Parties (174 states and the European Union) signed the agreement on the first date it was open for signature.<ref name=historic>{{cite web|url=https://www.un.org/apps/news/story.asp?NewsID=53756#.VxqAYGNpr-Y|work=United Nations|title='Today is an historic day,' says Ban, as 175 countries sign Paris climate accord|date=22 April 2016}}</ref><ref>{{cite web|url=http://newsroom.unfccc.int/media/632121/list-of-representatives-to-high-level-signature-ceremony.pdf|title=PARIS AGREEMENT Signature Ceremony|work=[[UNFCCC]]|date=22 April 2016|access-date=14 November 2017|archive-url=https://web.archive.org/web/20170516205241/http://newsroom.unfccc.int/media/632121/list-of-representatives-to-high-level-signature-ceremony.pdf|archive-date=16 May 2017|url-status=dead}}</ref> On the same day, more than 20 countries issued a statement of their intent to join as soon as possible with a view to joining in 2016. With ratification by the European Union, the Agreement obtained enough parties to enter into effect as of 4 November 2016.

      ==Parties==
      As of January 2026, 193 states and the EU have ratified or acceded to the Agreement.<ref name=depo>{{cite web |url=https://treaties.un.org/pages/ViewDetails.aspx?src=TREATY&mtdsg_no=XXVII-7-d&chapter=27&clang=_en |title=Paris Agreement |publisher=United Nations Treaty Collection |date=8 July 2016}}</ref><ref name=BBC03.09.2016/><ref>{{cite web|url=http://www.ndtv.com/india-news/india-ratifies-landmark-paris-climate-deal-62nd-nation-to-join-club-1469274|title=India Ratifies Landmark Paris Climate Deal, Says, 'Kept Our Promise'|access-date=2 October 2016}}</ref>  A further three states have signed the Agreement but not ratified it.  The United States twice ratified the agreement but then withdrew. All 198 [[List of parties to the United Nations Framework Convention on Climate Change|UNFCCC members]] have either signed or acceded to the Paris Agreement.

