      === Fiscal policies ===
      {{see also|European Fiscal Compact}}
      [[File:Government surplus or deficit (EU-USA-UK).png|thumb|Comparison of government surplus/[[Government budget|deficit]] (2001–2012) of eurozone, United States and United Kingdom]]
      The primary means for fiscal coordination within the EU lies in the [[Broad Economic Policy Guidelines]] which are written for every member state, but with particular reference to the 21 current members of the eurozone. These guidelines are not binding, but are intended to represent policy coordination among the EU member states, so as to take into account the linked structures of their economies.

      For their mutual assurance and stability of the currency, members of the eurozone have to respect the [[Stability and Growth Pact]], which sets agreed limits on [[Government budget|deficits]] and [[national debt]], with associated sanctions for deviation. The Pact originally set a limit of 3% of GDP for the yearly deficit of all eurozone member states; with fines for any state which exceeded this amount. In 2005, Portugal, Germany, and France had all exceeded this amount, but the Council of Ministers had not voted to fine those states. Subsequently, reforms were adopted to provide more flexibility and ensure that the deficit criteria took into account the economic conditions of the member states, and additional factors.

      The [[Fiscal Compact]]<ref>{{cite news|author=Nicholas Watt|url=https://www.theguardian.com/politics/2012/jan/31/lib-dems-david-cameron-eu|title=Lib Dems praise David Cameron for EU U-turn|newspaper=The Guardian|date=31 January 2012|access-date=5 February 2012|location=London|archive-date=13 November 2020|archive-url=https://web.archive.org/web/20201113100638/https://www.theguardian.com/politics/2012/jan/31/lib-dems-david-cameron-eu|url-status=live}}</ref><ref name="EC_ready">{{cite web|url=http://european-council.europa.eu/home-page/highlights/the-fiscal-compact-ready-to-be-signed-(2)?lang=en|title=The fiscal compact ready to be signed|date=31 January 2012|access-date=5 February 2012|publisher=European Commission|url-status=dead|archive-url=https://web.archive.org/web/20121022095150/http://european-council.europa.eu/home-page/highlights/the-fiscal-compact-ready-to-be-signed-%282%29?lang=en|archive-date=22 October 2012|df=dmy-all}}</ref> (formally, the Treaty on Stability, Coordination and Governance in the Economic and Monetary Union),<ref>{{cite news | url=http://www.rte.ie/news/2012/0228/referendum.html#video | work=RTÉ News | title=Referendum to be held on Fiscal Treaty | date=28 February 2012 | archive-date=26 October 2012 | access-date=14 May 2016 | archive-url=https://web.archive.org/web/20121026123939/http://www.rte.ie/news/2012/0228/referendum.html#video | url-status=live }}</ref> is an [[Enhanced cooperation#Related intergovernmental treaties|intergovernmental treaty]] introduced as a new stricter version of the [[Stability and Growth Pact]], signed on 2 March 2012 by all [[member states of the European Union]] (EU), except the Czech Republic, the United Kingdom,<ref name="signed">{{cite news|url=https://www.bbc.co.uk/news/world-europe-17230760|title=EU summit: All but two leaders sign fiscal treaty|work=BBC News|access-date=2 March 2012|date=2 March 2012|archive-date=13 November 2020|archive-url=https://web.archive.org/web/20201113184120/https://www.bbc.co.uk/news/world-europe-17230760|url-status=live}}</ref> and Croatia (subsequently [[Accession of Croatia to the European Union|acceding the EU]] in July 2013). The treaty entered into force on 1 January 2013 for the 16 states which completed ratification prior of this date.<ref name="Fiscal Compact entry into force">{{cite web|url=http://www.consilium.europa.eu/uedocs/cms_data/docs/pressdata/en/ecofin/134543.pdf|title=Fiscal compact enters into force 21/12/2012 (Press: 551, Nr: 18019/12)|publisher=European Council|date=21 December 2012|access-date=21 December 2012|archive-url=https://web.archive.org/web/20121223192244/http://www.consilium.europa.eu/uedocs/cms_data/docs/pressdata/en/ecofin/134543.pdf|archive-date=23 December 2012|url-status=live}}</ref> As of 1 April 2014, it had been ratified and entered into force for all 25 signatories.

      [[Olivier Blanchard]] suggests that a fiscal union in the eurozone can mitigate devastating effects of the single currency on the eurozone peripheral countries. But he adds that the currency bloc will not work perfectly even if a fiscal transfer system is built, because, he argues, the fundamental issue about competitiveness adjustment is not tackled. The problem is, since the eurozone peripheral countries do not have their own currencies, they are forced to adjust their economies by decreasing their wages instead of devaluation.<ref>[https://www.telegraph.co.uk/finance/economics/11919355/fiscal-union-eurozone-emu-olivier-blanchard-imf.html Fiscal union will never fix a dysfunctional eurozone, warns ex-IMF chief Blanchard] {{Webarchive|url=https://web.archive.org/web/20180218122546/http://www.telegraph.co.uk/finance/economics/11919355/fiscal-union-eurozone-emu-olivier-blanchard-imf.html |date=18 February 2018 }} Mehreen Khan, ''The Daily Telegraph'' (London), 10 October 2015</ref>

      == Bailout provisions ==
      {{see also|History of the euro#Recession era}}
      The [[2008 financial crisis]] prompted several reforms in the eurozone. One was a U-turn on the eurozone's [[bailout]] policy that led to the creation of a specific fund to assist eurozone states in trouble. The [[European Financial Stability Facility]] (EFSF) and the [[European Financial Stability Mechanism]] (EFSM) were created in 2010 to provide, alongside the [[International Monetary Fund]] (IMF), a system and fund to bail out members. However, the EFSF and EFSM were temporary, small and lacked a basis in the EU treaties. Therefore, it was agreed in 2011 to establish a [[European Stability Mechanism]] (ESM) which would be much larger, funded only by eurozone states (not the EU as a whole as the EFSF/EFSM were) and would have a permanent [[Treaties of the European Union|treaty basis]]. As a result of that its creation involved agreeing an amendment to TEFU Article&nbsp;136 allowing for the ESM and a new ESM treaty to detail how the ESM would operate. The ESM became operational in September 2012.

      In February 2016, the UK secured further confirmation that countries that do not use the [[Euro]] would not be required to contribute to bailouts for eurozone countries.<ref>{{cite web|title=European Council meeting (18 and 19 February 2016) – Conclusions|url=http://www.consilium.europa.eu/en/press/press-releases/2016/02/19-euco-conclusions/|publisher=European Commission|access-date=14 May 2016|archive-date=20 October 2017|archive-url=https://web.archive.org/web/20171020075425/http://www.consilium.europa.eu/en/press/press-releases/2016/02/19-euco-conclusions/|url-status=live}}</ref>

      == Peer review ==
      {{see also|Euro Plus Pact}}
      In June 2010, a broad agreement was finally reached on a controversial proposal for member states to peer review each other's budgets prior to their presentation to [[National parliaments of the European Union|national parliaments]]. Although showing the entire budget to each other was opposed by Germany, Sweden and the UK, each government would present to their peers and the Commission their estimates for growth, inflation, revenue and expenditure levels six months before they go to national parliaments. If a country was to run a deficit, they would have to justify it to the rest of the EU while countries with a debt more than 60% of GDP would face greater scrutiny.<ref name="peer 1">[https://euobserver.com/9/30232 EU agrees controversial peer review of national budgets] {{Webarchive|url=https://web.archive.org/web/20250523022246/https://euobserver.com/9/30232 |date=23 May 2025 }}, EU Observer</ref>

      The plans would apply to all EU members, not just the eurozone, and have to be approved by EU leaders along with proposals for states to face sanctions before they reach the 3% limit in the [[Stability and Growth Pact]]. Poland has criticised the idea of withholding regional funding for those who break the deficit limits, as that would only impact the poorer states.<ref name="peer 1"/> In June 2010 France agreed to back Germany's plan for suspending the voting rights of members who breach the rules.<ref name="Merkel Spain">Willis, Andrew (15 June 2010) [https://euobserver.com/9/30284 Merkel: Spain can access aid if needed] {{Webarchive|url=https://web.archive.org/web/20250523013849/https://euobserver.com/9/30284 |date=23 May 2025 }}, EU Observer</ref> In March 2011 was initiated a new reform of the [[Stability and Growth Pact#Reform|Stability and Growth Pact]] aiming at straightening the rules by adopting an automatic procedure for imposing of penalties in case of breaches of either the deficit or the debt rules.<ref>{{cite web|url=http://www.consilium.europa.eu/uedocs/cms_data/docs/pressdata/en/ecofin/119888.pdf |title=Council reaches agreement on measures to strengthen economic governance |access-date=18 May 2011 |archive-url=https://web.archive.org/web/20110825060552/http://www.consilium.europa.eu/uedocs/cms_data/docs/pressdata/en/ecofin/119888.pdf |archive-date=25 August 2011 |url-status=live }}</ref><ref>{{cite web |author=Jan Strupczewski |url=http://uk.finance.yahoo.com/news/EU-finmins-adopt-tougher-reuters_molt-1023414724.html?x=0 |title=EU finmins adopt tougher rules against debt, imbalance |website=Uk.finance.yahoo.com |publisher=[[Yahoo! Finance]] |date=15 March 2011 |access-date=18 May 2011 |archive-date=24 April 2023 |archive-url=https://web.archive.org/web/20230424074017/https://uk.finance.yahoo.com/news/EU-finmins-adopt-tougher-reuters_molt-1023414724.html?x=0 |url-status=dead }}</ref>

      == Criticism ==
      {{see also|Phillips curve|Nominal rigidity}}
      In 1997, [[Arnulf Baring]] expressed concern that the European Monetary Union would make Germans the most hated people in Europe. Baring suspected the possibility that the people in Mediterranean countries would regard Germans and the currency bloc as economic policemen.<ref name=WST16Jul2015NAGAB>[http://wolfstreet.com/2015/07/16/this-prediction-about-the-euro-deserves-a-nostradamus-award/ This Prediction about the Euro Deserves a ‘Nostradamus Award’] {{Webarchive|url=https://web.archive.org/web/20151208092807/http://wolfstreet.com/2015/07/16/this-prediction-about-the-euro-deserves-a-nostradamus-award/ |date=8 December 2015 }} W. Richter, Wolf Street, 16 July 2015</ref>

      In 2001, [[James Tobin]] thought that the euro project would not succeed without making drastic changes to European institutions, pointing out the difference between the US and the eurozone.<ref name=JT2001EMUd>J. Tobin, Policy Opinions, 31 (2001)</ref> Concerning monetary policies, the system of [[Federal Reserve bank]]s in the US aims at both growth and reducing unemployment, while the [[European Central Bank|ECB]] tends to give its first priority to price stability under the [[Deutsche Bundesbank|Bundesbank]]'s supervision. As the price level of the currency bloc is kept low, the unemployment level of the region has become higher than that of the US since 1982.<ref name=JT2001EMUd /> Concerning fiscal policies, 12% of the US federal budget is used for transfers to states and local governments. The US government does not impose restrictions on state budget policies, whereas the Maastricht Treaty requires each eurozone member country to keep its budget deficit below 3% of its GDP.<ref name=JT2001EMUd />

      In 2008, a study by [[Alberto Alesina]] and [[Vincenzo Galasso]] found that the adoption of [[euro]] promoted [[deregulation|market deregulation]] and [[free trade|market liberalization]].<ref name ="Alesina">{{cite journal |last1=Alesina |first1=Alberto |last2=Galasso |first2=Vincenzo |first3=Silvia |last3=Ardagna |author-link1=Alberto Alesina |author-link2=Vincenzo Galasso |date=May 2008 |title=The Euro and Structural Reforms |url=https://www.nber.org/system/files/working_papers/w14479/w14479.pdf |journal=NBER Working Paper |number=14479 |volume=1 |doi=10.3386/w14479 |archive-date=26 February 2023 |access-date=26 February 2023 |archive-url=https://web.archive.org/web/20230226153720/https://www.nber.org/system/files/working_papers/w14479/w14479.pdf |url-status=live }}</ref><ref name="Belsie">{{cite web |url=https://www.nber.org/digest/apr09/euro-wages-and-prices |title=The Euro, Wages, and Prices |last=Belsie |first=Laurent |date=April 2009 |website=NBER |publisher=The Digest |access-date=2023-02-26 |archive-date=26 February 2023 |archive-url=https://web.archive.org/web/20230226153717/https://www.nber.org/digest/apr09/euro-wages-and-prices |url-status=live }}</ref> Furthermore, the euro was also linked to wage moderation, as [[wage growth]] slowed down in countries that adopted the new currency.<ref name ="Alesina"/> [[Oliver Hart (economist)|Oliver Hart]], who received the [[Nobel Memorial Prize in Economic Sciences]] in 2016, criticized the euro, calling it a "mistake" and emphasising his opposition to monetary union since its inception.<ref name="rodri">{{cite web |url=https://www.euractiv.com/section/euro-finance/news/economic-nobel-prize-winner-the-euro-was-a-mistake/ |title=Nobel economics prize winner: 'The euro was a mistake' |last=Rodríguez |first=Carmen |editor=Sam Morgan |date=December 2016 |website=Euractiv |access-date=2023-02-26 |archive-date=26 February 2023 |archive-url=https://web.archive.org/web/20230226153716/https://www.euractiv.com/section/euro-finance/news/economic-nobel-prize-winner-the-euro-was-a-mistake/ |url-status=live }}</ref> He also expressed opposition to [[European integration]], arguing that the European Union should instead focus on [[decentralisation]] as it has "gone too far in centralising power".<ref name="rodri"/> In 2018, a study based on [[Difference in differences|DiD methodology]] found that the adoption of euro produced no systematic growth effects, as no growth-enhancing effects were found when compared to European economies outside the eurozone.<ref name ="Ioannatos">{{cite journal |last1=Ioannatos |first1=Petros E. |date=June 2018 |title=Has the Euro Promoted Eurozone's Growth? |url=https://www.e-jei.org/upload/JEI_33_2_1388_1411_2013600162.pdf |journal=Journal of Economic Integration |volume=33 |issue=2 |pages=1388–1411 |doi=10.11130/jei.2018.33.2.1389 |s2cid=158295739 |archive-date=26 February 2023 |access-date=26 February 2023 |archive-url=https://web.archive.org/web/20230226153718/https://www.e-jei.org/upload/JEI_33_2_1388_1411_2013600162.pdf |url-status=live }}</ref>

      The eurozone has also been criticized for deepening inequality in Europe, particularly between the richest and poorest countries.<ref name="Kartnitschnig">{{cite web |url=https://www.politico.eu/article/eurozone-problem-country-germany-coronavirus/ |title=The eurozone's problem country: Germany |last=Karnitschnig |first=Matthew |date=22 April 2020 |website=Politico |access-date=2023-02-27 |archive-date=27 February 2023 |archive-url=https://web.archive.org/web/20230227055250/https://www.politico.eu/article/eurozone-problem-country-germany-coronavirus/ |url-status=live }}</ref> According to a study by [[Bertelsmann Stiftung]], countries such as Austria and the Netherlands benefited significantly from the common currency, while southern and eastern European members of the eurozone gained very little,<ref name="reuters1">{{cite web |url=https://www.reuters.com/article/us-europe-single-market-study-idUSKCN1SE07Z |title=Germany, wealthy regions are biggest winners of EU single market: report |date=8 May 2019 |last1=Escritt |first1=Thomas |editor=Gareth Jones |website=Reuters |access-date=2023-02-27 |archive-date=27 February 2023 |archive-url=https://web.archive.org/web/20230227055252/https://www.reuters.com/article/us-europe-single-market-study-idUSKCN1SE07Z |url-status=live }}</ref> and some countries are considered to have suffered adverse effects from adopting the euro.<ref name="Stiglitz1">{{cite web |url=https://www.politico.eu/article/opinion-italy-germany-how-to-exit-the-eurozone-euro-reform/ |title=How to exit the eurozone |last=Stiglitz |first=Joseph |author-link=Joseph Stiglitz |date=26 June 2018 |website=Politico |access-date=2023-02-27 |archive-date=27 February 2023 |archive-url=https://web.archive.org/web/20230227055247/https://www.politico.eu/article/opinion-italy-germany-how-to-exit-the-eurozone-euro-reform/ |url-status=live }}</ref> In an article for [[Politico]], [[Joseph Stiglitz]] argues that "[t]he result for the eurozone has been slower growth, and especially for the weaker countries within it. The euro was supposed to usher in greater prosperity, which in turn would lead to renewed commitment to European integration. It has done just the opposite — increasing divisions within the EU, especially between creditor and debtor countries."<ref name="Stiglitz1"/> Matthias Matthijs believes that the euro resulted in a "winner-take-all" economy, as national income differences between eurozone members have widened further.<ref name ="matthijs">{{cite journal |last1=Matthijs |first1=Matthias |date=2016 |title=The Euro's "Winner-Take-All" Political Economy: Institutional Choices, Policy Drift, and Diverging Patterns of Inequality |url=https://journals.sagepub.com/doi/10.1177/0032329216655317 |journal=Politics & Society |volume=44 |issue=3 |pages=393–422 |doi=10.1177/0032329216655317 |publisher=SAGE Publications |s2cid=220681429 |url-access=subscription |archive-date=27 February 2023 |access-date=27 February 2023 |archive-url=https://web.archive.org/web/20230227055247/https://journals.sagepub.com/doi/10.1177/0032329216655317 |url-status=live }}</ref> He argues that countries such as Austria and Germany have gained from the eurozone at the expense of southern countries like Italy and Spain.<ref name ="matthijs"/>

      By adopting the euro and abandoning their national currencies, eurozone countries gave up their ability to conduct independent [[monetary policy]]; as such, monetary policies used to combat recession, such as [[Stimulus (economics)|monetary stimulus]] or [[Devaluation|currency devaluation]], are no longer available.<ref name ="matthijs"/> During the [[European debt crisis]], several eurozone countries (Greece, Italy, Portugal, Ireland, Spain, and Cyprus) were unable to repay their debt without third-party intervention by the [[European Central Bank]] and the [[International Monetary Fund]].<ref name="Copelovitch">{{Cite journal|last1=Copelovitch|first1=Mark|last2=Frieden|first2=Jeffry|last3=Walter|first3=Stefanie|date=14 March 2016|title=The Political Economy of the Euro Crisis|journal=Comparative Political Studies|language=en-US|volume=49|issue=7|pages=811–840|doi=10.1177/0010414016633227|s2cid=18181290|issn=0010-4140|url=https://nrs.harvard.edu/urn-3:HUL.InstRepos:33694190}}</ref> In order to grant the bailout, the ECB and the IMF forced the affected countries to adopt strict [[austerity]] measures.<ref name ="matthijs"/> The European bailouts were largely about shifting exposure from banks onto European taxpayers,<ref name="LSEHO 23Mar2012">{{cite web |url= https://blogs.lse.ac.uk/greeceatlse/2012/03/23/are-the-european-banks-saving-greece-or-saving-themselves/#more-537 |title= Are the European banks saving Greece or saving themselves? |first= Kevin |last= Featherstone |date= 23 March 2012 |work= Greece@LSE |publisher= LSE |access-date= 27 March 2012 |archive-date= 29 July 2018 |archive-url= https://web.archive.org/web/20180729081420/http://blogs.lse.ac.uk/greeceatlse/2012/03/23/are-the-european-banks-saving-greece-or-saving-themselves/#more-537 |url-status= live }}</ref><ref>{{cite web |url=http://www.presseurop.eu/en/content/news-brief/1599061-greek-aid-will-go-banks |title=Greek aid will go to the banks |date=9 March 2012 |work=Die Gazette |publisher=[[Presseurop]] |access-date=12 March 2012 |archive-date=3 December 2012 |archive-url=https://web.archive.org/web/20121203235903/http://www.presseurop.eu/en/content/news-brief/1599061-greek-aid-will-go-banks |url-status=dead }}</ref><ref>{{cite news |last= Whittaker |first= John |year= 2011 |title= Eurosystem debts, Greece, and the role of banknotes |url= http://www.lums.lancs.ac.uk/files/23558.pdf |publisher= Lancaster University Management School |access-date= 2 April 2012 |url-status= dead |archive-url= https://web.archive.org/web/20111125004634/http://www.lums.lancs.ac.uk/files/23558.pdf |archive-date= 25 November 2011}}</ref> and exacerbated issues such as high unemployment and poverty.<ref name ="cavero">{{cite journal |last1=Cavero |first1=Gonzalo |last2=Cortés |first2=Irene Martín |date=September 2013 |title=The true cost of austerity and inequality: Greece Case Study |url=https://www-cdn.oxfam.org/s3fs-public/file_attachments/cs-true-cost-austerity-inequality-greece-120913-en_0.pdf |journal=Oxfam Case Study |isbn=9781780774046 |archive-date=3 January 2024 |access-date=27 February 2023 |archive-url=https://web.archive.org/web/20240103142137/https://www-cdn.oxfam.org/s3fs-public/file_attachments/cs-true-cost-austerity-inequality-greece-120913-en_0.pdf |url-status=live }}</ref><ref>{{cite news |last= Coppola |first= Frances |date= 31 August 2018 |title= The Terrible Human Cost Of Greece's Bailouts |url= https://www.forbes.com/sites/francescoppola/2018/08/31/the-terrible-human-cost-of-greeces-bailouts/?sh=3e368e634b31 |work= Forbes |access-date= 27 February 2023 |url-status= live |archive-url= https://web.archive.org/web/20220809020647/https://www.forbes.com/sites/francescoppola/2018/08/31/the-terrible-human-cost-of-greeces-bailouts/?sh=2b3ad6af4b31 |archive-date= 9 August 2022}}</ref>

      In 2019, a study from the [[Centre for European Policy]] concluded that while some countries had gained from adopting the euro, several countries were poorer than they would have been had they not adopted it, with France and Italy being particularly affected.<ref>Nicole Ng, [https://p.dw.com/p/3E2fQ "CEP study: Germans gain most from euro introduction"] {{Webarchive|url=https://web.archive.org/web/20210420064240/https://www.dw.com/en/cep-study-germany-gains-most-from-euro-introduction/a-47675856 |date=20 April 2021 }}, ''Deutsche Welle'', 25 February 2019, accessed 05/03/19.</ref><ref>{{Cite web|url=https://www.cep.eu/Studien/20_Jahre_Euro_-_Gewinner_und_Verlierer/cepStudy_20_years_Euro_-_Winners_and_Losers.pdf |first1=Alessandro |last1=Gasparotti |first2=Matthias |last2=Kullas |date=February 2019 |publisher=cepStudy |title=20 Years of the Euro: Winners and Losers|archive-url=https://web.archive.org/web/20191119003917/https://www.cep.eu/Studien/20_Jahre_Euro_-_Gewinner_und_Verlierer/cepStudy_20_years_Euro_-_Winners_and_Losers.pdf|archive-date=19 November 2019|url-status=live}}</ref> The publication prompted a large number of reactions, pushing its authors to put out a statement clarifying some points.<ref>{{Cite web|url=https://www.cep.eu/en/cep-news-archive/article/statement-on-reactions-to-the-study-20-years-of-euro.html|title=Statement on reactions to the study 20 years of euro|date=19 December 2022 |website=Centrum für europäische Politik |url-status=live |archive-url=https://web.archive.org/web/20230131095656/https://www.cep.eu/en/cep-news-archive/article/statement-on-reactions-to-the-study-20-years-of-euro.html |archive-date= 31 Jan 2023 }}</ref> In 2020, a study from the University of Bonn reached a different conclusion: the adoption of the euro made "some mild losers (France, Germany, Italy, and Portugal) and a clear winner (Ireland)".<ref>{{Cite journal|journal=SSRN|last1=Gabriel|first1=Ricardo Duque|last2=Pessoa|first2=Ana Sofia|date=2020-12-01|title=Adopting the Euro: A Synthetic Control Approach|doi=10.2139/ssrn.3563044 |doi-access=free |language=en|ssrn=3563044 |ssrn-access=free |s2cid=219969338 |s2cid-access=free }}</ref> Both studies used the [[synthetic control method]] to estimate what might have happened if the euro had not been adopted.

