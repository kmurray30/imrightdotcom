      ==== Business and industry ====
      The [[American Coalition for Clean Coal Electricity]] and [[Peabody Energy]], the largest listed coal producer in the United States, applauded the decision, claiming the result will be lower energy prices and greater reliability of supply.<ref name="auto1"/><ref>{{cite web|url=https://www.bbc.co.uk/news/live/world-us-canada-40123293|title=As it happened: US quits Paris climate pact|date=June 1, 2017|work=BBC News|access-date=June 22, 2018|archive-url=https://web.archive.org/web/20180727230940/https://www.bbc.co.uk/news/live/world-us-canada-40123293|archive-date=July 27, 2018|url-status=live}}</ref>

      On the day of Trump's predicted withdrawal, 25 companies placed a full-page open letter to President Trump in ''[[The New York Times]]'' and ''[[The Wall Street Journal]]'', encouraging the administration to keep the U.S. in the Paris Agreement.<ref>{{cite web|title=Dear President Trump|url=https://www.c2es.org/international/business-support-paris-agreement|website=[[Center for Climate and Energy Solutions]]|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170603041736/https://www.c2es.org/international/business-support-paris-agreement|archive-date=June 3, 2017|url-status=live}}</ref><ref>{{cite news|url=https://www.washingtonpost.com/news/energy-environment/wp/2017/06/01/these-titans-of-industry-just-broke-with-trumps-decision-to-exit-the-paris-accords/|title=These titans of industry just broke with Trump's decision to exit the Paris accords|date=June 2, 2017|newspaper=The Washington Post|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170603031430/https://www.washingtonpost.com/news/energy-environment/wp/2017/06/01/these-titans-of-industry-just-broke-with-trumps-decision-to-exit-the-paris-accords/|archive-date=June 3, 2017|url-status=live}}</ref> The companies were:

      {{Div col|colwidth=15em}}
      * [[Adobe Systems|Adobe]]
      * [[Apple Inc.|Apple]]
      * [[Blue Cross Blue Shield of Massachusetts|Blue Cross Blue Shield]]
      * [[Danfoss]]
      * [[Dignity Health]]
      * [[Facebook]]
      * [[Gap Inc.|Gap]]
      * [[Google]]
      * [[The Hartford]]
      * [[Hewlett Packard Enterprise]]
      * [[Ingersoll Rand]]
      * [[Intel]]
      * [[Johnson Controls]]
      * [[Levi Strauss & Co.]]
      * [[Mars Incorporated|Mars]]
      * [[Microsoft]]
      * [[Morgan Stanley]]
      * [[National Grid plc|National Grid]]
      * [[Pacific Gas and Electric Company|PG&E]]
      * [[DSM (company)|Royal DSM]]
      * [[Salesforce.com]]
      * [[Schneider Electric]]
      * [[Tiffany & Co.]]
      * [[Unilever]]
      * [[VF Corporation|VF]]
      {{Div col end}}

      Following Trump's announcement, [[ExxonMobil]], [[Chevron Corporation|Chevron]], [[Shell Oil Company|Shell]] and [[General Motors]] reaffirmed their support for the Paris Agreement and for measures to tackle climate change.<ref name="auto1">{{cite web|url=https://www.telegraph.co.uk/business/2017/06/02/trump-abandons-paris-climate-change-agreement-business-world/|title=Trump abandons Paris climate change agreement: How the business world reacted|date=June 2, 2017|work=The Daily Telegraph|access-date=April 5, 2018|archive-url=https://web.archive.org/web/20180210222758/http://www.telegraph.co.uk/business/2017/06/02/trump-abandons-paris-climate-change-agreement-business-world/|archive-date=February 10, 2018|url-status=live}}</ref>

      [[Michael Bloomberg]] pledged $15&nbsp;million to the UN Framework Convention on Climate Change Executive Secretariat, explaining: "Americans will honor and fulfill the Paris Agreement by leading from the bottom up—and there isn't anything Washington can do to stop us".<ref>{{cite web|url=https://www.telegraph.co.uk/news/2017/06/02/washington-cant-stop-americans-michael-bloomberg-pledges-pay/|title='Washington can't stop Americans': Michael Bloomberg pledges to pay US share of Paris climate funding|date=June 2, 2017|work=The Daily Telegraph|access-date=April 5, 2018|archive-url=https://web.archive.org/web/20171127005934/http://www.telegraph.co.uk/news/2017/06/02/washington-cant-stop-americans-michael-bloomberg-pledges-pay/|archive-date=November 27, 2017|url-status=live}}</ref> Shortly following Trump's announcement, thirty city mayors, three state governors, more than eighty university presidents and the leaders of more than a hundred businesses joined Bloomberg in opening negotiations with the United Nations to submit a plan for limiting American climate-change emissions in accord with the Paris Agreement guidelines.<ref>{{cite web|url=https://www.nytimes.com/2017/06/01/climate/american-cities-climate-standards.html|title=Bucking Trump, These Cities, States and Companies Commit to Paris Accord|date=June 2, 2017|work=The New York Times|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602221647/https://www.nytimes.com/2017/06/01/climate/american-cities-climate-standards.html|archive-date=June 2, 2017|url-status=live}}</ref>

      [[Goldman Sachs]] CEO [[Lloyd Blankfein]] described Trump's decision as "a setback for the environment and for the U.S.'s leadership position in the world".<ref name="auto1"/> [[General Electric]] CEO [[Jeff Immelt]] stated that "climate change is real".<ref name="greenwood1"/>

      Multiple tech company executives—including Google CEO [[Sundar Pichai]], Microsoft President and Chief Legal Officer Brad Smith, Apple CEO [[Tim Cook]], Facebook CEO [[Mark Zuckerberg]], and [[General Electric]] CEO Jeff Immelt—condemned the decision.<ref>{{Cite news|url=http://www.marketwatch.com/story/business-leaders-join-environmentalists-in-negative-reactions-to-trumps-quitting-paris-pact-2017-06-01|title=Business leaders join environmentalists in throwing up their hands as Trump quits Paris pact|last=MarketWatch|work=MarketWatch|access-date=June 2, 2017|language=en-US|archive-url=https://web.archive.org/web/20170601222819/http://www.marketwatch.com/story/business-leaders-join-environmentalists-in-negative-reactions-to-trumps-quitting-paris-pact-2017-06-01|archive-date=June 1, 2017|url-status=live}}</ref><ref>{{Cite news|url=https://thehill.com/policy/finance/336013-goldman-sachs-ceo-rips-trumps-paris-decision-with-first-tweet/|title=Goldman Sachs CEO rips Trump's Paris decision in his first tweet|last=Lane|first=Sylvan|date=June 1, 2017|work=The Hill|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170605000823/http://thehill.com/policy/finance/336013-goldman-sachs-ceo-rips-trumps-paris-decision-with-first-tweet|archive-date=June 5, 2017|url-status=live}}</ref> Microsoft's [[Satya Nadella]] said Microsoft believes that "climate change is an urgent issue that demands global action." Google's [[Sundar Pichai]] tweeted "Disappointed with today's decision. Google will keep working hard for a cleaner, more prosperous future for all". Facebook's [[Mark Zuckerberg]] said "Withdrawing from the Paris climate agreement is bad for the environment, bad for the economy, and it puts our children's future at risk."

      ===== Resignations from presidential advisory boards in protest =====
      Two business leaders resigned from Trump advisory boards in protest to his decision to withdraw. [[Elon Musk]], CEO of [[Tesla, Inc.]] and [[SpaceX]], resigned from the two presidential advisory councils on which he had sat. Musk stated: "Climate change is real. Leaving Paris is not good for America or the world."<ref>{{Cite news|url=http://www.businessinsider.com/elon-musk-leaving-trumps-councils-after-us-withdraws-from-paris-climate-deal-2017-6|title=Elon Musk is officially leaving Trump's advisory councils after US withdraws from Paris climate deal|work=Business Insider|access-date=June 1, 2017|language=en|archive-url=https://web.archive.org/web/20170601223343/http://www.businessinsider.com/elon-musk-leaving-trumps-councils-after-us-withdraws-from-paris-climate-deal-2017-6|archive-date=June 1, 2017|url-status=live}}</ref><ref>{{cite web|url=https://money.cnn.com/2017/06/01/news/elon-musk-resigns-trump-adviser/index.html|title=Elon Musk to Trump: You quit Paris, so I quit you|last=Horowitz|first=Julia|date=June 1, 2017|website=CNNMoney|access-date=June 1, 2017|archive-url=https://web.archive.org/web/20170601221118/http://money.cnn.com/2017/06/01/news/elon-musk-resigns-trump-adviser/index.html|archive-date=June 1, 2017|url-status=live}}</ref> [[Robert Iger]], CEO of [[The Walt Disney Company]], also resigned, saying "As a matter of principle, I've resigned from the President's Council over the Paris Agreement withdrawal."<ref>{{Cite news|url=https://thehill.com/business-a-lobbying/business-a-lobbying/336020-disney-ceo-im-quitting-advisory-council-over-paris/|title=Disney CEO: I'm quitting advisory council over Paris deal|last=Thomsen|first=Jacqueline|date=June 1, 2017|work=The Hill|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170604025743/http://thehill.com/business-a-lobbying/business-a-lobbying/336020-disney-ceo-im-quitting-advisory-council-over-paris|archive-date=June 4, 2017|url-status=live}}</ref>

      ==== U.S. public opinion ====
      The Paris Agreement is broadly popular among Americans.<ref name="Baker"/> A national poll by the [[Chicago Council on Global Affairs]] conducted in June 2016 <!--Report was released in November but actually conducted in June--> found that 71 percent of American adults favored U.S. participation in the Paris Agreement.<ref>{{cite news |first=Chris |last=Mooney |url=https://www.washingtonpost.com/news/energy-environment/wp/2016/11/21/trump-wants-to-dump-the-paris-climate-deal-but-71-percent-of-americans-support-it-survey-finds/ |title=Trump wants to dump the Paris climate deal, but 71 percent of Americans support it, survey finds |newspaper=The Washington Post |date=November 21, 2016 |access-date=June 5, 2017 |archive-url=https://web.archive.org/web/20170524020120/https://www.washingtonpost.com/news/energy-environment/wp/2016/11/21/trump-wants-to-dump-the-paris-climate-deal-but-71-percent-of-americans-support-it-survey-finds/ |archive-date=May 24, 2017 |url-status=live }}</ref><ref>{{cite web |first=Dina |last=Smeltz |display-authors=etal |url=https://www.thechicagocouncil.org/sites/default/files/pos_climatechange_nov2016.pdf |title=Growing Support in US for Some Climate Change Action |publisher=Chicago Global on Public Affairs |date=November 2016 |access-date=June 5, 2017 |archive-url=https://web.archive.org/web/20170806221926/https://www.thechicagocouncil.org/sites/default/files/pos_climatechange_nov2016.pdf |archive-date=August 6, 2017 |url-status=live }}</ref> Similar, a November 2016 poll conducted by the [[Yale Program on Climate Change Communication]] found that 69 percent of U.S. registered voters favored U.S. participation in the Paris Agreement, while just 13 percent were opposed.<ref>{{cite web |first1=Jennifer |last1=Marlon |first2=Eric |last2=Fine |first3=Anthony |last3=Leiserowitz |url=http://climatecommunication.yale.edu/publications/paris_agreement_by_state/ |title=Majorities of Americans in Every State Support Participation in the Paris Agreement |publisher=[[Yale Program on Climate Change Communication]] |date=May 8, 2017 |access-date=June 5, 2017 |archive-url=https://web.archive.org/web/20170606013213/http://climatecommunication.yale.edu/publications/paris_agreement_by_state/ |archive-date=June 6, 2017 |url-status=live }}</ref> Trump's decision to withdraw the U.S. from the accord was seen as an attempt to appeal to his [[Base (politics)|base]], even at the risk of alienating Democrats and independent voters.<ref name="Baker">{{cite web |first=Peter |last=Baker |url=https://www.nytimes.com/2017/06/01/climate/paris-accord-trump-conservative-base.html?mcubz=1&_r=0 |title=In Rejecting Popular Paris Accord, Trump Bets on His Base |work=The New York Times |date=June 1, 2017 |access-date=June 5, 2017 |archive-url=https://web.archive.org/web/20190417094455/https://www.nytimes.com/2017/06/01/climate/paris-accord-trump-conservative-base.html?mcubz=1&_r=0 |archive-date=April 17, 2019 |url-status=live }}</ref> This strategy diverged from the typical approach taken by most U.S. presidents, who historically have sought to appeal to the center.<ref name="Baker"/> A ''New York Times'' analysis described the move as "a daring and risky strategy" taken by "the first president in the history of polling to govern without the support of a majority of the public from the start of his tenure," adding: "In effect, Mr. Trump is doubling down on presiding as a minority president, betting that when the time comes, his fervent supporters will matter more, especially clustered in key Midwest states."<ref name="Baker"/>

      A ''[[The Washington Post|Washington Post]]''/ABC News [[public opinion]] survey of American adults, conducted from June 2–4, 2017, found that 59 percent opposed Trump's decision to withdraw the U.S. from the Paris Agreement, and just 28 percent supported it. Asked about the effect of withdrawal on the U.S. economy, 42 percent said it would hurt the economy; 32 percent believed it would help the economy; and 20 percent believed that it would make no difference.<ref name="ClementDavisPoll">{{cite news |first1=Scott |last1=Clement |first2=Brady |last2=Dennis |url=https://www.washingtonpost.com/news/energy-environment/wp/2017/06/05/post-abc-poll-nearly-6-in-10-oppose-trump-scrapping-paris-agreement/ |title=Post-ABC poll: Nearly 6 in 10 oppose Trump scrapping Paris agreement |newspaper=The Washington Post |date=June 5, 2017 |access-date=June 5, 2017 |archive-url=https://web.archive.org/web/20170605202135/https://www.washingtonpost.com/news/energy-environment/wp/2017/06/05/post-abc-poll-nearly-6-in-10-oppose-trump-scrapping-paris-agreement/ |archive-date=June 5, 2017 |url-status=live }}</ref><ref name="WashPoPollDetails">{{cite news |url=https://apps.washingtonpost.com/g/page/politics/june-2-4-2017-post-abc-poll/2213/ |title=June 2-4, 2017 Post-ABC Poll data sheet |newspaper=The Washington Post |access-date=September 17, 2017 |archive-url=https://web.archive.org/web/20170727174645/http://apps.washingtonpost.com/g/page/politics/june-2-4-2017-post-abc-poll/2213/ |archive-date=July 27, 2017 |url-status=live }}</ref> The poll showed a sharp division among partisan lines: 67 percent of Republicans supported Trump's decision, but just 22 percent of [[Independent (voter)|independents]] and 8 percent of Democrats supported it.<ref name="ClementDavisPoll"/>

      ==== Media ====
      ===== Domestic =====
      ''[[USA Today]]'', in an editorial, stated that "There was no&nbsp;greatness in the decision he rendered Thursday, just the heightened&nbsp;prospect of a&nbsp;climate-stricken globe left&nbsp;behind for future generations."<ref>{{Cite news|url=https://www.usatoday.com/story/opinion/2017/06/01/paris-pullout-endangers-planet-our-view/102341358/|title=Paris pullout endangers the planet: Our view|work=USA Today|access-date=June 1, 2017|language=en|archive-url=https://web.archive.org/web/20170602233424/https://www.usatoday.com/story/opinion/2017/06/01/paris-pullout-endangers-planet-our-view/102341358/|archive-date=June 2, 2017|url-status=live}}</ref> ''[[The New York Times]]'' called it "disgraceful" and stated that Trump "knows nothing or cares little about the science underlying the stark warnings of environmental disruption."<ref>{{Cite news|url=https://www.nytimes.com/2017/06/01/opinion/trump-paris-climate-change-agreement.html|title=Our Disgraceful Exit From the Paris Accord|last=The Editorial Board|date=June 1, 2017|work=The New York Times|access-date=June 1, 2017|language=en-US|issn=0362-4331|archive-url=https://web.archive.org/web/20170602002430/https://www.nytimes.com/2017/06/01/opinion/trump-paris-climate-change-agreement.html|archive-date=June 2, 2017|url-status=live}}</ref>

      For their edition of June 2, 2017, the ''[[New York Daily News]]'' revived their famous 1975 "[[Ford to City: Drop Dead]]" cover with a photo of Trump and the words "Trump to World: Drop Dead".<ref name="sfgate-1jun2017">{{cite news|last1=Preovolos|first1=Chris|title=NY Daily News revives famous 'drop dead' cover after Trump's climate announcement|url=http://www.sfgate.com/news/politics/article/NY-Daily-News-revives-famous-drop-dead-cover-11190202.php|access-date=June 1, 2017|newspaper=San Francisco Chronicle|date=June 1, 2017|archive-url=https://web.archive.org/web/20170602042911/http://www.sfgate.com/news/politics/article/NY-Daily-News-revives-famous-drop-dead-cover-11190202.php|archive-date=June 2, 2017|url-status=live}}</ref>

      The ''[[Tampa Bay Times]]'' criticized the move, writing that it would especially endanger coastal states such as Florida, which are already suffering from [[rising sea level]]s, which damage property and infrastructure and harm the drinking water supply.<ref>{{cite web|url=https://www.tampabay.com/opinion/editorials/editorial-another-trump-rant-and-foolish-decision-on-climate-change/2325924/|title=Editorial: Another Trump rant and foolish decision on climate change|website=Tampa Bay Times|language=en-us|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602005404/http://www.tampabay.com/opinion/editorials/editorial-another-trump-rant-and-foolish-decision-on-climate-change/2325924|archive-date=June 2, 2017|url-status=live}}</ref> The ''[[Detroit Free Press]]'' stated that "President Donald Trump has betrayed the future of our children, our grandchildren, and our planet".<ref name=":12"/>

      [[Bloomberg L.P.|Bloomberg]] stated that "Under Trump, the U.S. has already become an irresponsible role model."<ref>{{Cite news|url=https://www.bloomberg.com/view/articles/2017-06-01/trump-shamefully-undermines-the-paris-climate-change-accord|title=Trump's Big Paris Mistake|date=June 1, 2017|publisher=Bloomberg View|access-date=June 1, 2017|archive-url=https://web.archive.org/web/20170601233830/https://www.bloomberg.com/view/articles/2017-06-01/trump-shamefully-undermines-the-paris-climate-change-accord|archive-date=June 1, 2017|url-status=live}}</ref> ''[[The San Diego Union-Tribune]]'' stated that "President Trump is ushering in the [[Chinese Century]]" and called it the worst decision of Trump's life.<ref>{{Cite news|url=http://www.sandiegouniontribune.com/opinion/editorials/sd-trump-paris-climate-accord-20170601-story.html|title=Trump's Paris climate accord withdrawal worst decision of his life|author=Editorial Board|work=The San Diego Union-Tribune|access-date=June 1, 2017|language=en-US|archive-url=https://web.archive.org/web/20170601211855/http://www.sandiegouniontribune.com/opinion/editorials/sd-trump-paris-climate-accord-20170601-story.html|archive-date=June 1, 2017|url-status=live}}</ref><ref>{{Cite news|url=http://www.sandiegouniontribune.com/opinion/editorials/sd-trump-ushers-in-chinese-century-20170601-story.html|title=How Donald Trump is ushering in the Chinese century|author=Editorial Board|work=The San Diego Union-Tribune|access-date=June 1, 2017|language=en-US|archive-url=https://web.archive.org/web/20170602001457/http://www.sandiegouniontribune.com/opinion/editorials/sd-trump-ushers-in-chinese-century-20170601-story.html|archive-date=June 2, 2017|url-status=live}}</ref>

      A piece by commentator [[Erick Erickson]] published by [[Fox News]] described the withdrawal from the Paris Agreement as the correct move, for the reason that "climate change is [not] an issue worth caring much about".<ref>{{Cite news|url=https://www.foxnews.com/opinion/trump-pulls-out-of-paris-climate-deal-and-does-something-right-and-brave|title=Trump pulls out of Paris climate deal and does something right (and brave)|date=June 1, 2017|publisher=Fox News Channel|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170601225728/http://www.foxnews.com/opinion/2017/06/01/trump-pulls-out-paris-climate-deal-and-does-something-right-and-brave.html|archive-date=June 1, 2017|url-status=live}}</ref> [[Douglas E. Schoen]], also writing for Fox, contrarily said that a withdrawal from the Paris Agreement "only hastens America's retreat from global political and economic leadership".<ref>{{Cite news|url=https://www.foxnews.com/opinion/trumps-paris-agreement-withdrawal-is-the-wrong-move|title=Trump's Paris Agreement withdrawal is the wrong move|date=June 1, 2017|publisher=Fox News Channel|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170601225722/http://www.foxnews.com/opinion/2017/06/01/trumps-paris-agreement-withdrawal-is-wrong-move.html|archive-date=June 1, 2017|url-status=live}}</ref>

      ===== Foreign =====
      Foreign coverage of Trump's announcement was overwhelmingly unfavorable. A lead in the British newspaper ''[[The Guardian]]'' said that the decision would be unlikely to stunt the growth of renewable energy, and suggested that "a much more likely casualty of Trump's choice is the US economy he claims to be protecting".<ref>{{Cite news|url=https://www.theguardian.com/environment/2017/jun/01/donald-trump-paris-climate-deal-pullout-us-impact|title=The Paris deal pullout is more damaging to the US than the climate|date=June 1, 2017|work=The Guardian|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602032646/https://www.theguardian.com/environment/2017/jun/01/donald-trump-paris-climate-deal-pullout-us-impact|archive-date=June 2, 2017|url-status=live}}</ref> The British newspaper ''The Independent'' noted the "tension between myth and reality" in Trump's withdrawal speech.<ref>{{Cite news|url=https://www.independent.co.uk/voices/editorials/trump-climate-change-paris-accord-a7768146.html|title=Editorial: Trump's climate-change walk-out is symbol not substance|date=June 1, 2017|work=The Independent|access-date=June 2, 2017|language=en-GB|archive-url=https://web.archive.org/web/20170602014341/http://www.independent.co.uk/voices/editorials/trump-climate-change-paris-accord-a7768146.html|archive-date=June 2, 2017|url-status=live}}</ref> The German tabloid ''[[Berliner Kurier]]'' ran a headline "Erde an Trump: Fuck You!" ("Earth to Trump: Fuck You!").<ref>{{Cite news|url=https://www.theguardian.com/environment/2017/jun/01/trump-withdraw-paris-climate-deal-world-leaders-react|title=World leaders reject Trump's claim Paris climate deal can be renegotiated|date=June 2, 2017|work=The Guardian|access-date=June 1, 2017|language=en|archive-url=https://web.archive.org/web/20170601220347/https://www.theguardian.com/environment/2017/jun/01/trump-withdraw-paris-climate-deal-world-leaders-react|archive-date=June 1, 2017|url-status=live}}</ref><ref>{{Cite news|url=https://www.theguardian.com/environment/live/2017/jun/01/donald-trump-paris-climate-agreement-live-news?page=with:block-59307f57e4b00493c8278537#liveblog-navigation|title=Paris climate agreement: world reacts as Trump pulls out of global accord|date=June 2, 2017|work=The Guardian|access-date=June 1, 2017|language=en|archive-url=https://web.archive.org/web/20170601230532/https://www.theguardian.com/environment/live/2017/jun/01/donald-trump-paris-climate-agreement-live-news?page=with:block-59307f57e4b00493c8278537#liveblog-navigation|archive-date=June 1, 2017|url-status=live}}</ref>

      China's [[Xinhua News Agency|Xinhua]] state news agency called the withdrawal a "global setback."<ref>{{cite web|url=https://www.reuters.com/article/usa-climatechange-china-idAFL8N1IZ051|title=China's media calls Trump's withdrawal from Paris accord 'global setback'|date=June 1, 2017|work=Reuters|access-date=July 2, 2017|archive-url=https://web.archive.org/web/20180116135356/https://www.reuters.com/article/usa-climatechange-china-idAFL8N1IZ051|archive-date=January 16, 2018|url-status=live}}</ref>

      The ''[[Toronto Star]]'' said that

      <blockquote>In the long catalogue of destructive things that Donald Trump has inflicted on the United States and the world, pulling out of the most important global attempt to slow the impact of climate change must go down as the worst.<ref>{{cite web|url=https://www.thestar.com/opinion/editorials/2017/06/01/dumping-paris-accord-is-donald-trumps-worst-move-ever-editorial.html|title=Dumping Paris accord is Donald Trump's worst move ever|website=Toronto Star|date=June 2017 |access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602002306/https://www.thestar.com/opinion/editorials/2017/06/01/dumping-paris-accord-is-donald-trumps-worst-move-ever-editorial.html|archive-date=June 2, 2017|url-status=live}}</ref></blockquote>

      === Protests ===
      [[File:Paris Protest (35042111665).jpg|thumb|right|Protesters in Washington, D.C., the day of the announcement]]
      Protesters gathered at the White House gates on the day of the announcement.<ref name="thehill-1jun2017-1">{{cite news|last1=Beavers|first1=Olivia|title=Pro-Paris agreement protesters flock to White House|url=https://thehill.com/homenews/administration/336011-pro-paris-agreement-protesters-arrive-outside-white-house/|access-date=June 1, 2017|newspaper=The Hill|date=June 1, 2017|archive-url=https://web.archive.org/web/20170605001541/http://thehill.com/homenews/administration/336011-pro-paris-agreement-protesters-arrive-outside-white-house|archive-date=June 5, 2017|url-status=live}}</ref> [[Bill Nye]], a [[science communication|science communicator]] and television personality known for making scientific concepts more accessible to the general public, was one of the protesters in attendance.<ref name="thehill-1jun2017-2">{{cite news|last1=Hensch|first1=Mark|title=Bill Nye joins pro-Paris deal protests outside White House|url=https://thehill.com/blogs/blog-briefing-room/news/336028-bill-nye-joins-pro-paris-deal-protests/|access-date=June 1, 2017|newspaper=The Hill|date=June 1, 2017|archive-url=https://web.archive.org/web/20170605014931/http://thehill.com/blogs/blog-briefing-room/news/336028-bill-nye-joins-pro-paris-deal-protests|archive-date=June 5, 2017|url-status=live}}</ref> The [[John A. Wilson Building]] in D.C. was lit in green in protest of the decision,<ref name="nbcwash-1jun2017">{{cite news|last1=Stone|first1=Shomari|title=DC's Wilson Building Lights Up Green to Protest Trump's Decision on Paris Agreement|url=http://www.nbcwashington.com/news/local/DC-Mayor-Shows-Solidarity-Paris-Climate-Agreement_Washington-DC-425840734.html|access-date=June 1, 2017|newspaper=NBC Washington|date=June 1, 2017|archive-url=https://web.archive.org/web/20170604005216/http://www.nbcwashington.com/news/local/DC-Mayor-Shows-Solidarity-Paris-Climate-Agreement_Washington-DC-425840734.html|archive-date=June 4, 2017|url-status=live}}</ref> as were [[One World Trade Center]] and the [[Kosciuszko Bridge]] in New York City; the city halls of [[New York City Hall|New York]], [[Boston City Hall|Boston]] and [[Montreal City Hall|Montreal]]; the [[Hôtel de Ville, Paris|Hôtel de Ville]] in Paris; and the [[Monumento a la Revolución]] and the [[Angel of Independence]] in Mexico City.<ref name="cnn-1jun2017">{{cite news|last1=Jackson|first1=Amanda|title=US buildings light up green in solidarity with Paris climate accord|url=http://www.cnn.com/2017/06/01/us/us-buildings-light-up-green-paris-accord-trnd/index.html|access-date=June 1, 2017|publisher=CNN|date=June 1, 2017|archive-url=https://web.archive.org/web/20170602081411/http://www.cnn.com/2017/06/01/us/us-buildings-light-up-green-paris-accord-trnd/index.html|archive-date=June 2, 2017|url-status=live}}</ref><ref name="yahoo-2jun2017">{{cite news|last1=Rogers|first1=Taylor|title=Buildings Shine Green to Protest Trump's Paris Decision|url=https://www.yahoo.com/news/buildings-shine-green-protest-trumps-paris-decision-134822108.html|access-date=June 2, 2017|newspaper=Yahoo News|date=June 2, 2017|archive-url=https://web.archive.org/web/20170602142844/https://www.yahoo.com/news/buildings-shine-green-protest-trumps-paris-decision-134822108.html|archive-date=June 2, 2017|url-status=live}}</ref> Protests also occurred in [[New York City]],<ref name="nbcny-1jun2017">{{cite news|last1=Siegal|first1=Ida|last2=George|first2=Michael|title=Protests in Streets, Buildings Lit Green in NYC After Trump Says 'We're Getting out' of Global Climate Agreement|url=http://www.nbcnewyork.com/news/local/NYC-President-Trump-Protest-WTC-Green-Climate-Change-Global-Paris-Agreement-425826564.html|access-date=June 1, 2017|newspaper=NBC New York|date=June 1, 2017|archive-url=https://web.archive.org/web/20170602023746/http://www.nbcnewyork.com/news/local/NYC-President-Trump-Protest-WTC-Green-Climate-Change-Global-Paris-Agreement-425826564.html|archive-date=June 2, 2017|url-status=live}}</ref> [[Miami]],<ref name="miami-1jun2017">{{cite news|url=http://www.miamiherald.com/news/local/community/miami-dade/article153951614.html|title=President Trump's decision to pull out of global climate agreement sparks local protest|date=June 1, 2017|last2=Teproff|first2=Carli|last1=Koh|first1=Elizabeth|access-date=June 1, 2017|newspaper=The Miami Herald|archive-url=https://web.archive.org/web/20170602044201/http://www.miamiherald.com/news/local/community/miami-dade/article153951614.html|archive-date=June 2, 2017|url-status=live}}</ref> [[San Diego]],<ref name="sd-1jun2017">{{cite news|last1=Palmour IV|first1=Hayne|title=San Diego protesters against U.S. withdrawing from Paris climate agreement|url=http://www.sandiegouniontribune.com/visuals/photography/sd-protesters-against-leaving-paris-climate-agreement-in-san-diego-20170601-photogallery.html|access-date=June 1, 2017|newspaper=U-T San Diego|date=June 1, 2017|archive-url=https://web.archive.org/web/20170603094555/http://www.sandiegouniontribune.com/visuals/photography/sd-protesters-against-leaving-paris-climate-agreement-in-san-diego-20170601-photogallery.html|archive-date=June 3, 2017|url-status=live}}</ref> and [[Syracuse, New York|Syracuse]].<ref name="cny-1jun2017">{{cite news|title=Dozens rally in Syracuse to protest decision to leave Paris climate accord|url=http://cnycentral.com/news/local/some-cnyers-rally-in-protest-of-decision-to-leave-paris-climate-accord|access-date=June 1, 2017|newspaper=CNYCentral|date=June 1, 2017|archive-url=https://web.archive.org/web/20170601234944/http://cnycentral.com/news/local/some-cnyers-rally-in-protest-of-decision-to-leave-paris-climate-accord|archive-date=June 1, 2017|url-status=live}}</ref>

      ==Rejoining==
      [[Joe Biden]] became the president-elect following the [[2020 United States presidential election|November 2020 election]], defeating Trump. As part of his transition plan, Biden announced that one of his first actions on his first day in office would be to return the United States to the Paris Agreement via an executive order. He also stated plans to further the United States' commitment towards mitigating climate change in line with the Paris Agreement.<ref name="wapost biden rejoin">{{cite news|url=https://www.washingtonpost.com/politics/biden-first-executive-orders-measures/2020/11/07/9fb9c1d0-210b-11eb-b532-05c751cd5dc2_story.html|title=Biden plans immediate flurry of executive orders to reverse Trump policies|newspaper=[[The Washington Post]]|date=8 November 2020|access-date=9 November 2020|archive-date=November 15, 2020|archive-url=https://web.archive.org/web/20201115170957/https://www.washingtonpost.com/politics/biden-first-executive-orders-measures/2020/11/07/9fb9c1d0-210b-11eb-b532-05c751cd5dc2_story.html|url-status=live}}</ref><ref name="guardian biden rejoin">{{cite web |last=Harvey |first=Fiona |author-link=Fiona Harvey |date=8 November 2020 |title=Joe Biden could bring Paris climate goals 'within striking distance' |url=https://www.theguardian.com/us-news/2020/nov/08/joe-biden-paris-climate-goals-0-1c |url-status=live |archive-url=https://web.archive.org/web/20201108163302/https://www.theguardian.com/us-news/2020/nov/08/joe-biden-paris-climate-goals-0-1c |archive-date=November 8, 2020 |access-date=8 November 2020 |work=[[The Guardian]]}}</ref><ref>{{cite news|url=https://www.cnn.com/2021/01/16/politics/joe-biden-executive-orders-paris-climate-accord-muslim-ban/index.html|title=Biden to sign executive orders rejoining Paris climate accord and rescinding travel ban on first day|last=Merica|first=Dan|work=[[CNN]]|access-date=January 17, 2021|archive-date=January 17, 2021|archive-url=https://web.archive.org/web/20210117042259/https://www.cnn.com/2021/01/16/politics/joe-biden-executive-orders-paris-climate-accord-muslim-ban/index.html|url-status=live}}</ref>

      Under terms of the Agreement, the United States would only need to wait a month after submitting their intent to rejoin before formally rejoining, though they would lose some of the privileges from the short time the country was out of the Agreement; they would not have been able to participate in any key meetings while they were not a member, for example.<ref name="bbc official withdraw"/>

      President Biden signed an executive order to rejoin the Paris Agreement on January 20, 2021, his first day in office; the U.S. rejoined on February 19, 2021.<ref>{{cite news |title=Joe Biden signs 15 executive orders on first day in Oval Office, reversing Trump's wall and rejoining Paris climate deal |url=https://www.telegraph.co.uk/news/2021/01/21/joe-biden-signs-17-executive-orders-first-day-oval-office-reversing/ |newspaper=The Telegraph |date=January 21, 2021 |access-date=January 21, 2021 |archive-date=January 21, 2021 |archive-url=https://web.archive.org/web/20210121090043/https://www.telegraph.co.uk/news/2021/01/21/joe-biden-signs-17-executive-orders-first-day-oval-office-reversing/ |url-status=live |last1=Sabur |first1=Rozina |last2=Parekh |first2=Marcus }}</ref><ref name="Rejoin"/>

      ==Second withdrawal==
      On January 20, 2025, shortly after [[Second inauguration of Donald Trump|his second inauguration]], President Trump signed an executive order titled "[[Executive Order 14162|Putting America First In International Environmental Agreements]]", to withdraw the United States from the agreement for a second time.<ref>{{Cite news |last=Bearak |first=Max |date=2025-01-20 |title=Trump Orders U.S. Exit From the Paris Agreement on Climate |url=https://www.nytimes.com/2025/01/20/climate/trump-paris-agreement-climate.html |access-date=2025-01-21 |work=The New York Times |language=en-US |issn=0362-4331}}</ref> The United States will officially be out of the Paris Agreement in January 2026, one year after the formal notification was submitted to the United Nations Secretary-General. The withdrawal went into effect on 27 January, 2026.<ref>{{Cite web |date=2026-01-27 |title=So long, Paris: US officially leaves landmark climate pact |url=https://www.politico.com/news/2026/01/27/so-long-paris-u-s-officially-leaves-landmark-climate-pact-00746628 |access-date=2026-01-28 |website=POLITICO |language=en}}</ref>

      In February 2026, the United States notified the United Nations of its withdrawal from the [[United Nations Framework Convention on Climate Change]], effective a year later, the first country to do so.<ref name=":0">{{Cite news |last=Milman |first=Oliver |date=2026-01-08 |title=Outrage as Trump withdraws from key UN climate treaty along with dozens of international organisations |url=https://www.theguardian.com/us-news/2026/jan/07/trump-international-groups-un |access-date=2026-01-08 |work=The Guardian |language=en-GB |issn=0261-3077}}</ref><ref name=":1">{{Cite web |last=Waldenberg |first=Samantha |last2=Nilsen |first2=Ella |last3=Freedman |first3=Andrew |date=2026-01-08 |title=Trump moves to pull US out of bedrock global climate treaty, becoming first country to do so |url=https://www.cnn.com/2026/01/07/climate/trump-withdrawal-climate-treaty-international-agreements |access-date=2026-01-08 |website=CNN |language=en}}</ref><ref name=WH>{{citeweb|url=https://www.whitehouse.gov/presidential-actions/2026/01/withdrawing-the-united-states-from-international-organizations-conventions-and-treaties-that-are-contrary-to-the-interests-of-the-united-states/|title=Withdrawing the United States from International Organizations, Conventions, and Treaties that Are Contrary to the Interests of the United States|date=2026-01-07|accessdate=2026-01-10|publisher=[[President of the United States]]}}</ref><ref name=UNUSWD>{{citeweb|url=https://treaties.un.org/doc/Publication/CN/2026/CN.102.2026-Eng.pdf|title=UNITED NATIONS FRAMEWORK CONVENTION ON CLIMATE CHANGE - NEW YORK, 9 MAY 1992 - UNITED STATES OF AMERICA: WITHDRAWAL|date=2026-02-27|accessdate=2026-02-28|publisher=[[United Nations]]}}</ref>

