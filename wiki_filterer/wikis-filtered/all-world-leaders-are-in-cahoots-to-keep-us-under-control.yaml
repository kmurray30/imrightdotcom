p went through with the promised withdrawal.<ref>{{cite web|url=https://qz.com/837262/if-trump-pulls-out-of-the-paris-agreement-europe-could-institute-a-carbon-tax-on-us-imports/|title=If Trump pulls out of the Paris Agreement, Europe could institute a "carbon tax" on US imports|date=November 14, 2016|work=Quartz|access-date=June 2, 2017|archive-url=https://web.archive.org/web/20170602023041/https://qz.com/837262/if-trump-pulls-out-of-the-paris-agreement-europe-could-institute-a-carbon-tax-on-us-imports/|archive-date=June 2, 2017|url-status=live}}</ref> [[National Front (France)|National Front]] leader [[Marine Le Pen]] appreciated Trump's commitment to his campaign pledge, but described his decision as "extremely regrettable."<ref>{{cite web|url=http://www.express.co.uk/news/world/812312/paris-climate-agreement-donald-trump-france-prime-minister|title=French PM blasts Trump's decision to pull US out of Paris climate accord as 'calamitous'|date=June 2, 2017|work=Daily Express|last=McGuinness|first=Romina|access-date=June 3, 2017|archive-url=https://web.archive.org/web/20170602233450/https://www.express.co.uk/news/world/812312/paris-climate-agreement-donald-trump-france-prime-minister|archive-date=June 2, 2017|url-status=live}}</ref>
