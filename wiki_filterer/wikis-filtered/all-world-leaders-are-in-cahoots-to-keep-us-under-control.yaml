  - title: UK Digital ID
    pageid: 81183267
    extract: |-
      A digital ID scheme (also known "BritCard" or "Brit Card") for adult residents of the United Kingdom was announced by the prime minister, Keir Starmer, on 25 September 2025. The Starmer government claims introducing it is part of their "attempts" to tackle the rise in illegal migrant crossings in small boats across the English Channel and for it to be a mandatory requirement to prove the right to work.
      The proposals for digital ID has received opposition from Labour MPs and other political leaders due to concerns around the possible infringement of civil liberties, with Big Brother Watch describing the plans as "wholly unBritish" and creating a "domestic mass surveillance infrastructure". It has been compared to the abandoned voluntary ID card scheme of former prime minister Tony Blair. A petition against mandatory digital ID cards reached 2.9 million signatures as of 23 October 2025.
      The government backed down on the card being compulsory in January 2026, stating that other forms of identification would also be acceptable to prove the right to work.
    source: |-
      {{Short description|Proposed digital ID for UK residents}}
      {{Use dmy dates|date=October 2025}}

      A digital ID scheme (also known "'''BritCard'''" or "'''Brit Card'''") for adult residents of the United Kingdom was announced by the prime minister, [[Keir Starmer]], on 25 September 2025. The [[Starmer government]] claims introducing it is part of their "attempts" to tackle the rise in [[English Channel illegal migrant crossings (2018–present)|illegal migrant crossings in small boats]] across the [[English Channel]] and for it to be a mandatory requirement to prove the right to work.

      The proposals for digital ID has received opposition from [[Labour Party (UK)|Labour]] MPs and other political leaders due to concerns around the possible infringement of [[civil liberties]], with [[Big Brother Watch]] describing the plans as "wholly unBritish" and creating a "domestic mass surveillance infrastructure". It has been compared to the abandoned [[Identity Cards Act 2006|voluntary ID card scheme]] of former prime minister [[Tony Blair]]. A [[UK Parliament petitions website|petition]] against mandatory digital ID cards reached 2.9&nbsp;million signatures as of 23 October 2025.

      The government backed down on the card being compulsory in January 2026, stating that other forms of identification would also be acceptable to prove the right to work.

      == Background ==
      A [[Identity Cards Act 2006|previous national ID card scheme]] was passed in 2006 by Labour, however it was repealed by the [[Cameron–Clegg coalition|Conservative/Liberal Democrat Coalition]] in 2011.<ref>{{Cite web |date=26 September 2025 |title=‘Intrusive’ digital ID cards were a flop 15 years ago – so what’s changed? |url=https://www.independent.co.uk/news/uk/politics/digital-id-cards-starmer-tony-blair-b2834167.html |access-date=4 October 2025 |website=The Independent |language=en}}</ref> In 2024, the then home secretary [[Yvette Cooper]] said that ID cards were not in the manifesto and not their approach, in response to Tony Blair's calls for digital ID,<ref>{{Cite news |date=7 July 2024 |title=Labour rejects Tony Blair's call for ID cards |url=https://www.bbc.com/news/articles/c87rgj4e0rzo |access-date=4 October 2025 |work=BBC News |language=en-GB}}</ref><ref>{{Cite web |last=Pogrund |first=Caroline Wheeler and Gabriel |date=6 July 2024 |title=Tony Blair’s warning to Keir Starmer on migration |url=https://www.thetimes.com/uk/politics/article/blair-warns-starmer-on-migration-without-rules-we-get-prejudices-7rj7skdmn |access-date=4 October 2025 |website=www.thetimes.com |language=en}}</ref> which he promoted as a method to tackle immigration, although he admitted the idea was 'scary'.<ref>{{Cite web |date=12 December 2024 |title=Blair calls for roll out of digital ID to tackle immigration and spiralling NHS costs |url=https://www.independent.co.uk/news/uk/politics/tony-blair-digital-id-immigration-nhs-b2663129.html |access-date=4 October 2025 |website=The Independent |language=en}}</ref> Blair's [[Tony Blair Institute for Global Change]] continued to call for digital ID in 2025,<ref>{{Cite web |title=Tony Blair: Digital ID Is the Disruption the UK Desperately Needs |url=https://institute.global/insights/tech-and-digitalisation/tony-blair-digital-id-is-the-disruption-the-uk-desperately-needs |access-date=4 October 2025 |website=institute.global |language=en-GB}}</ref> with Blair arguing that British people would sacrifice privacy for efficiency.<ref>{{Cite web |last=Heren |first=Kit |date=31 January 2025 |title=Brits 'will sacrifice privacy for efficiency', Blair claims as he pushes for digital ID cards and facial recognition |url=https://www.lbc.co.uk/article/tony-blair-id-cards-5HjcyqN_2/ |access-date=4 October 2025 |website=LBC |language=en}}</ref> In April 2025, an open letter signed by over 40 Labour MPs called for ministers to introduce digital IDs.<ref>{{Cite news |date=8 April 2025 |title=Labour MPs call for digital IDs to tackle migration |url=https://www.bbc.com/news/articles/cx20r4vmvx3o |access-date=4 October 2025 |work=BBC News |language=en-GB}}</ref> In September, the Tony Blair Institute proposed a 'super ID card' to consolidate public interactions with the government into one place, such as for reporting potholes and applying for benefits.<ref>{{Cite web |last=Hymas |first=Charles |date=24 September 2025 |title=Blair think tank proposes ‘super ID card’ to report potholes |url=https://www.telegraph.co.uk/politics/2025/09/24/blair-think-tank-super-id-cards-app-report-potholes-bins/ |access-date=4 October 2025 |website=www.telegraph.co.uk}}</ref>

      == Implementation ==
      Prime Minister [[Keir Starmer]] announced the digital ID scheme, also temporarily dubbed the "BritCard" or "Brit Card", on 25 September 2025 for all residents of the United Kingdom.<ref name="ISep25">{{cite news |author=Chloe Chaplain and [[Kitty Donaldson]] |date=25 September 2025 |title='BritCard' digital ID will be made law for all adults in bid to tackle small boats |url=https://inews.co.uk/news/politics/britcard-digital-id-law-all-adults-small-boats-3937770 |archive-url= |archivedate= |accessdate=25 September 2025 |work=[[The i Paper]]}}</ref><ref>{{Cite web |title=New digital ID scheme to be rolled out across UK |url=https://www.gov.uk/government/news/new-digital-id-scheme-to-be-rolled-out-across-uk |access-date=26 September 2025 |website=GOV.UK |language=en}}</ref><ref name=":4">{{Cite news |date=25 September 2025 |title=NI parties unite in criticism over Starmer's digital ID scheme |url=https://www.bbc.co.uk/news/articles/c5yv2gj5pd4o |work=BBC News}}</ref> The [[Starmer ministry]] plans to introduce the ID scheme by the end of the parliamentary term in 2029<ref name=":0">{{Cite news |last=Van Reenen |first=Danyel |date=26 September 2025 |title=Digital ID cards could force Scots to 'declare themselves British', warns Swinney |url=https://news.stv.tv/politics/john-swinney-britcard-could-force-scots-to-declare-ourselves-british |access-date=27 September 2025 |work=STV News}}</ref> as part of its attempts to tackle the rise in [[English Channel illegal migrant crossings (2018–present)|illegal migrant crossings in small boats]] across the [[English Channel]].<ref name="ISep25" /><ref>{{Cite web |title=BritCard: a progressive digital identity for Britain |url=https://www.labourtogether.uk/all-reports/britcard |access-date=26 September 2025 |website=Labour Together |language=en-GB}}</ref><ref>{{Cite web |date=25 September 2025 |title=Digital ID plans spark fierce debate among Independent readers |url=https://www.independent.co.uk/news/uk/politics/digital-id-brit-card-starmer-debate-b2833715.html |access-date=26 September 2025 |website=The Independent |language=en}}</ref> After the announcement, the [[Secretary of State for Work and Pensions|work and pensions secretary]] [[Pat McFadden]] identified the [[Estonian identity card]] as a model for the scheme and said that British forms of identity had not kept apace with technological developments.<ref name="ISep25" /> The ID will be mandatory for right to work checks in the UK,<ref>{{Cite web |date=25 September 2025 |title=All UK adults will now be required to have digital ID ‘BritCard’ |url=https://www.ladbible.com/news/uk-news/uk-britcard-digital-id-cards-confirmed-2025-745701-20250925 |access-date=26 September 2025 |website=LADbible |language=en}}</ref><ref>{{Cite web |last=Sheppard |first=David |last2=Gross |first2=Anna |last3=Strauss |first3=Delphine |last4=Webber |first4=Jude |title=Digital ID: what is the UK planning, and why now? |url=https://www.ft.com/content/5bd0c86d-0948-46af-b52e-0f2b745c7716 |access-date=26 September 2025 |website=www.ft.com}}</ref> however the government has stated people will not be required to carry it, or asked to produce it.<ref>{{Cite web |date=27 September 2025 |title=Petition against digital ID cards receives 1.5 million signatures |url=https://www.independent.co.uk/news/uk/politics/petition-digital-id-cards-uk-starmer-b2834815.html |access-date=27 September 2025 |website=The Independent |language=en}}</ref><ref>{{Cite web |last=Shaw |first=Neil |date=27 September 2025 |title=More than 1.5million sign petition against digital IDs 24 hours after launch |url=https://www.walesonline.co.uk/news/uk-news/more-15million-sign-petition-against-32562725 |access-date=27 September 2025 |website=Wales Online |language=en}}</ref><ref>{{Cite web |last=Warner |first=Harry |date=26 September 2025 |title=Petition against digital ID cards reaches one million signatures |url=https://www.joe.co.uk/news/petition-against-digital-id-cards-reaches-one-million-signatures-507371 |access-date=27 September 2025 |website=JOE.co.uk |language=en-US}}</ref> [[Chief Secretary to the Prime Minister]] [[Darren Jones]] has suggested digital ID could have much wider uses in the future.<ref>{{Cite web |last=Bennett |first=Ella |date=27 September 2025 |title=Petition against digital ID cards tops 1.5 million signatures |url=https://www.lbc.co.uk/article/petition-against-digital-id-cards-5HjdDZh_2/ |access-date=27 September 2025 |website=LBC |language=en}}</ref><ref>{{Cite web |last=Mansfield |first=Mark |date=27 September 2025 |title=Petition against digital ID cards tops 1.5 million signatures |url=https://nation.cymru/news/petition-against-digital-id-cards-tops-1-5-million-signatures/ |access-date=27 September 2025 |website=Nation.Cymru |language=en-GB}}</ref>

      == Reception ==
      Many [[Labour Party (UK)|Labour]] MPs have opposed the policy because of concerns around the possible infringement of [[civil liberties]].<ref>{{Cite web |last=Vaughan |first=Chloe Chaplain, Arj Singh, Richard |date=26 September 2025 |title=‘BritCard’ digital ID facing major backlash from Labour |url=https://inews.co.uk/news/politics/britcard-digital-id-facing-major-backlash-from-labour-3942182 |access-date=26 September 2025 |website=The i Paper |language=en-US}}</ref><ref>{{Cite web |last=Papazoglou |first=Alexis |date=16 July 2025 |title=The Britcard – progressive or concerning? {{!}} British Politics and Policy at LSE |url=https://blogs.lse.ac.uk/politicsandpolicy/the-britcard-progressive-or-concerning/ |access-date=26 September 2025 |website=British Politics and Policy at LSE {{!}}}}</ref> [[Conservative Party (UK)|Conservative]] leader [[Kemi Badenoch]] has stated her party would oppose mandatory ID cards.<ref>{{Cite web |date=26 September 2025 |title=‘Brit cards’ explained as controversial new digital ID announcement sparks backlash |url=https://www.tyla.com/news/politics/britcard-what-is-it-explained-how-it-works-494573-20250926 |access-date=26 September 2025 |website=Tyla |language=en}}</ref> Former Labour leader [[Jeremy Corbyn]] called it an 'affront to our civil liberties'.<ref>{{Cite news |date=25 September 2025 |title=Keir Starmer to announce plans for digital ID scheme |url=https://www.bbc.com/news/articles/c4g54g6vgpdo |access-date=27 September 2025 |work=BBC News |language=en-GB}}</ref><ref>{{Cite web |date=27 September 2025 |title=Petition against digital ID cards smashes 2 million signatures milestone |url=https://www.thenational.scot/news/25500208.petition-digital-ids-hits-huge-2-million-signatures-milestone/ |access-date=27 September 2025 |website=The National |language=en}}</ref><ref>{{Cite web |last=Staff |first=EuroNewsWeek |date=27 September 2025 |title=UK Government to Introduce Mandatory Digital ID |url=https://euronewsweek.co.uk/world/uk-government-to-introduce-mandatory-digital-id/ |access-date=5 October 2025 |website=Euronewsweek |language=en-US}}</ref> [[Reform UK]] leader [[Nigel Farage]] has stated he is 'firmly opposed' to the proposal, and that it 'will make no difference to illegal migration'.<ref>{{Cite web |date=26 September 2025 |title=“A step towards mass surveillance” – Over one million Brits are asking the UK to scrap the mandatory digital ID scheme |url=https://www.techradar.com/vpn/vpn-privacy-security/the-uk-wants-mandatory-digital-id-but-over-one-million-brits-are-demanding-to-scrap-the-plan-over-privacy-concerns |access-date=27 September 2025 |website=TechRadar |language=en}}</ref> [[Liberal Democrats (UK)|Liberal Democrat]] leader [[Ed Davey]] said his party would fight the policy "tooth and nail",<ref>{{Cite web |last= |first= |date=27 September 2025 |title=Over 1.5 million sign petition against digital ID cards |url=https://parliamentnews.co.uk/over-1-5-million-sign-petition-against-digital-id-cards |access-date=27 September 2025 |language=en-US}}</ref> comparing it to the abandoned [[Identity Cards Act 2006|mandatory ID card scheme]]{{Contradictory inline|date=February 2026|reason=Earlier in the article, the ID card scheme is said to be voluntary, so which is it?}} of former Labour prime minister [[Tony Blair]].<ref>{{Cite web |title=Davey on Digital ID: We will fight this tooth and nail just like Blair's ID cards |url=https://www.libdems.org.uk/press/release/davey-on-digital-id-we-will-fight-this-tooth-and-nail-just-like-blairs-id-cards |access-date=26 September 2025 |website=www.libdems.org.uk |language=en-gb}}</ref> A [[UK Parliament petitions website]] petition against mandatory digital ID cards has reached over 2.9 million signatures as of 23 October 2025,<ref>{{Cite web |last=Hagan |first=Rachel |date=2025-09-26 |title=What are digital ID cards, how will they work and will they be mandatory? |url=https://www.bbc.co.uk/news/articles/clyl3lzzed2o |access-date=2025-11-13 |website=BBC News |language=en-GB}}</ref><ref>{{Cite web |last=Rodger |first=James |date=4 October 2025 |title=New law in England but 2.8 million people want it 'stopped' |url=https://www.birminghammail.co.uk/news/midlands-news/new-law-england-28-million-32610437 |access-date=5 October 2025 |website=Birmingham Live |language=en}}</ref> making it one of the largest in parliamentary history.<ref>{{Cite web |last=Ward |first=Susie Violet |title=Bitcoin And Digital ID Show The UK’s Fight Over Freedom |url=https://www.forbes.com/sites/digital-assets/2025/10/03/bitcoin-and-digital-id-show-the-uks-fight-over-freedom/ |access-date=4 October 2025 |website=Forbes |language=en}}</ref> The UK government responded on 2 October 2025, saying “We will introduce a digital ID within this Parliament to help tackle illegal migration, make accessing government services easier, and enable wider efficiencies. We will consult on details soon.”<ref name=":3">{{Cite web |date=3 October 2025 |title=Government responds after 2.7m people sign petition to scrap Digital ID cards |url=https://metro.co.uk/2025/10/03/government-responds-2-700-000-people-sign-petition-scrap-digital-id-cards-24332291/ |access-date=4 October 2025 |website=Metro |language=en}}</ref><ref>{{Cite web |last=Fisher |first=Charlotte |date=6 October 2025 |title=Government responds to calls for Digital ID cards to be scrapped |url=https://www.manchestereveningnews.co.uk/news/uk-news/government-responds-calls-digital-id-32620108 |access-date=9 October 2025 |website=Manchester Evening News |language=en}}</ref>

      [[Big Brother Watch]] has described the plans for mandatory digital ID as "wholly unBritish" and creating a "domestic mass surveillance infrastructure",<ref>{{Cite web |title=Big Brother Watch response to news that the Prime Minister will announce a mandatory digital ID scheme — Big Brother Watch |url=https://bigbrotherwatch.org.uk/press-coverage/did/big-brother-watch-response-to-news-that-the-prime-minister-will-announce-a-mandatory-digital-id-scheme/ |access-date=26 September 2025 |website=Big Brother Watch response to news that the Prime Minister will announce a mandatory digital ID scheme — Big Brother Watch |language=en-GB}}</ref> and that they would be "uniquely harmful to privacy, equality, and civil liberties".<ref>{{Cite web |date=26 September 2025 |title=Politics live: Starmer says next election will be ‘open fight’ with Reform |url=https://www.the-independent.com/news/uk/politics/digital-id-uk-brit-card-starmer-latest-news-b2833899.html |access-date=26 September 2025 |website=The Independent |language=en}}</ref> Critics have also claimed that it is unlikely to stop small boat crossings,<ref>{{Cite web |date=26 September 2025 |title=Petition launched to scrap digital ID card proposals passes 1 million signatures |url=https://www.theargus.co.uk/news/national/uk-today/25498394.uk-petition-launched-scrap-digital-ids-hits-1m-signatures/ |access-date=26 September 2025 |website=The Argus |language=en}}</ref> as well as the risk of cyber attacks and incentive to allow the data to be used to train AI models.<ref>{{Cite web |last=Page |first=Carly |date=12 September 2025 |title=Privacy activists warn digital ID won’t stop small boats – but will enable mass surveillance |url=https://www.theregister.com/2025/09/12/privacy_activists_warn_uk_digital_id_risks/ |access-date=4 October 2025 |website=theregister.com}}</ref><ref>{{Cite web |date=30 September 2025 |title=‘Why digital IDs will not stop the boats arriving on Kent’s shores’ |url=https://www.kentonline.co.uk/dover/news/why-digital-ids-will-not-stop-the-boats-arriving-on-kent-s-330471/ |access-date=30 September 2025 |website=Kent Online |language=en}}</ref>

      Nationalist leaders in Scotland and all five of Northern Ireland's main parties have criticised the scheme due to both concerns around civil liberties and also the potential for the ID scheme to force citizens to declare themselves as British. In September 2025, [[Scottish National Party]] (SNP) first minister [[John Swinney]] and Northern Irish [[Sinn Féin]] first minister [[Michelle O'Neill]] declared their opposition to the ID scheme.<ref name=":0" /><ref name=":1">{{Cite news |last=Tunney |first=Liam |date=26 September 2025 |title=Michelle O’Neill slams Keir Starmer's plans for 'Brit Cards': 'This proposal is an attack on the rights of Irish citizens' |url=https://www.belfasttelegraph.co.uk/news/politics/michelle-oneill-slams-keir-starmers-plans-for-brit-cards-this-proposal-is-an-attack-on-the-rights-of-irish-citizens/a514368588.html |access-date=27 September 2025 |work=Belfast Telegraph}}</ref><ref name=":4" /> Swinney said "people should go about their daily lives without such infringements" and said the ID scheme appeared like an attempt to "force every Scot to declare ourselves British. I am a Scot."<ref name=":0" /> O'Neill called the proposal an "an attack on the rights of Irish citizens" and the [[Good Friday Agreement]], which allows citizens of Northern Ireland to legally identify as either British, Irish or both.<ref name=":1" /><ref name=":2">{{Cite news |date=25 September 2025 |title=NI parties unite in criticism over Starmer's digital ID scheme |url=https://www.bbc.com/news/articles/c5yv2gj5pd4o |access-date=27 September 2025 |work=BBC News}}</ref> In response, the UK Government said the ID scheme would respect the agreement.<ref name=":2" /> Northern Irish unionist parties also joined in their opposition to the policy, with [[Democratic Unionist Party]] leader [[Gavin Robinson]] describing it as "yet another layer of bureaucracy for ordinary citizens" which will do "very little to stop illegal immigration" and a spokesman of the [[Ulster Unionist Party]] calling it "an excessive and ill-conceived initiative that compromises the fundamental right to privacy for law-abiding citizens".<ref name=":2" />

      Green MP [[Siân Berry]] led a motion calling on the government to scrap its digital ID plans, with the motion being backed by MPs from multiple parties.<ref>{{Cite news |last=Garton-Crosbie |first=Abbi |date=16 October 2025 |title=Greens Lead Bid to Force Keir Starmer to Scrap Digital ID Plans |url=https://www.thenational.scot/news/25547797.greens-lead-bid-force-keir-starmer-scrap-digital-id-plans/ |access-date=19 October 2025 |work=The National}}</ref> An open letter by independent MP [[Rupert Lowe]] expressing "profound and passionate opposition" to the plans was signed by more than 30 MPs, from multiple parties.<ref>{{Cite web |date=2025-10-01 |title=Letter: MPs Unite to Oppose Government’s Reported Digital ID Plans {{!}} Charity Today News |url=https://www.charitytoday.co.uk/letter-mps-unite-to-oppose-governments-reported-digital-id-plans/ |access-date=2025-12-16 |language=en-GB}}</ref>

      == Climbdown ==
      The government backed down on the card being compulsory in January 2026, stating that other forms of identification would also be acceptable to prove the right to work.<ref>{{Cite web |date=2026-01-13 |title=Government drops plans for mandatory digital ID to work in UK |url=https://www.bbc.co.uk/news/articles/c3385zrrx73o |access-date=2026-01-14 |website=BBC News |language=en-GB}}</ref> Representatives of other political parties expressed their satisfaction about the government U-turn.

