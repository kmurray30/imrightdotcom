      === Difference with US Federal Reserve ===
      In the [[Federal Reserve Bank|United States Federal Reserve Bank]], the Federal Reserve buys assets: typically, bonds issued by the Federal government.<ref name="Bernanke">{{cite web|first=Ben S.|last=Bernanke|date=1 December 2008|title=Federal Reserve Policies in the Financial Crisis|url=http://www.federalreserve.gov/newsevents/speech/bernanke20081201a.htm|access-date=23 October 2011|publisher=Board of Governors of the Federal Reserve System|location=Greater Austin Chamber of Commerce, Austin, Texas|format=Speech|quote=To ensure that adequate liquidity is available, consistent with the central bank's traditional role as the liquidity provider of last resort, the Federal Reserve has taken a number of extraordinary steps.}}</ref> There is no limit on the bonds that it can buy and one of the tools at its disposal in a financial crisis is to take such extraordinary measures as the purchase of large amounts of assets such as [[commercial paper]].<ref name="Bernanke" /> The purpose of such operations is to ensure that adequate liquidity is available for the functioning of the financial system.<ref name="Bernanke" />

      The [[Eurosystem]], on the other hand, uses collateralized lending as a default instrument. There are about 1,500 eligible banks which may bid for short-term [[repurchase agreement|repo contracts]].<ref>In practice, 400–500 banks participate regularly. <br />{{citation|first1=Samuel|last1=Cheun|title=The collateral frameworks of the Eurosystem, the Federal Reserve System and the Bank of England and the financial market turmoil|date=December 2009|url=http://www.ecb.int/pub/pdf/scpops/ecbocp107.pdf|publisher=ECB|access-date=24 August 2011|first2=Isabel|last2=von Köppen-Mertes|first3=Benedict|last3=Weller}}</ref> The difference is that banks in effect borrow cash from the ECB and must pay it back; the short durations allow interest rates to be adjusted continually. When the repo notes come due the participating banks bid again. An increase in the number of notes offered at auction allows an increase in liquidity in the economy. A decrease has the contrary effect. The contracts are carried on the asset side of the European Central Bank's balance sheet and the resulting deposits in member banks are carried as a liability. In layman's terms, the liability of the central bank is money, and an increase in deposits in member banks carried as a liability by the central bank, means that more money has been put into the economy.{{efn|The process is similar, though on a grand scale, to an individual who every month charges $10,000 on his or her credit card, pays it off every month, but also withdraws (and pays off) an additional $10,000 each succeeding month for transaction purposes. Such a person is operating "net borrowed" on a continual basis, and even though the borrowing from the credit card is short-term, the effect is a stable increase in the money supply. If the person borrows less, less money circulates in the economy. As people borrow more, the money supply increases. An individual's ability to borrow from his or her credit card company is determined by the credit card company: it reflects the company's overall judgment of its ability to lend to all borrowers, and also its appraisal of the financial condition of that one particular borrower. The ability of member banks to borrow from the central bank is fundamentally similar.{{citation needed|date=September 2015}} }}

      To qualify for participation in the auctions, banks must be able to offer proof of appropriate collateral in the form of loans to other entities. These can be the public debt of member states, but a fairly wide range of private banking securities are also accepted.<ref name="The ECB and the Eurosystem">{{cite journal|last=Bertaut|first=Carol C.|year=2002|title=The European Central Bank and the Eurosystem|url=http://www.bos.frb.org/economic/neer/neer2002/neer202e.pdf|journal=New England Economic Review|issue=2nd quarter|pages=25–28|access-date=8 December 2010|archive-date=19 October 2012|archive-url=https://web.archive.org/web/20121019052919/http://www.bos.frb.org/economic/neer/neer2002/neer202e.pdf}}</ref>  The fairly stringent membership requirements for the European Union, especially with regard to [[sovereign debt]] as a percentage of each member state's gross domestic product, are designed to ensure that assets offered to the bank as collateral are, at least in theory, all equally good, and all equally protected from the risk of inflation.<ref name="The ECB and the Eurosystem" />

      == Organisation ==
      The ECB has four decision-making bodies, that take all the decisions with the objective of fulfilling the ECB's mandate:
      * the Executive Board,
      * the Governing Council,
      * the General Council,
      * the Supervisory Board.

      === Decision-making bodies ===

      ==== Executive Board ====
      [[File:Jean-Claude Trichet - World Economic Forum Annual Meeting Davos 2010.jpg|thumb|upright|[[Jean-Claude Trichet]], the second President of the European Central Bank]]
      The [[Executive Board of the European Central Bank|Executive Board]] is responsible for the implementation of monetary policy (defined by the Governing Council) and the day-to-day running of the bank.<ref name="Governing Council2">{{cite web|url=http://www.ecb.int/ecb/orga/decisions/govc/html/index.en.html|title=ECB: Governing Council|date=1 January 2002|work=ECB|publisher=ecb.int|access-date=28 October 2011}}</ref> It can issue decisions to national central banks and may also exercise powers delegated to it by the Governing Council.<ref name="Governing Council2" /> Executive Board members are assigned a portfolio of responsibilities by the President of the ECB.<ref>{{Cite web|url=https://www.ecb.europa.eu/ecb/pdf/orga/distributionofresp_EB.pdf|title=Distribution of responsibilities among the Members of the Executive Board of the ECB}}</ref> The executive board normally meets every Tuesday.

      It is composed of the President of the Bank (currently [[Christine Lagarde]]), the vice-president (currently [[Luis de Guindos]]) and four other members.<ref name="Governing Council2" /> They are all appointed by the [[European Council]] for non-renewable terms of eight years.<ref name="Governing Council2" /> Members of the executive board of the ECB are appointed "from among persons of recognised standing and professional experience in monetary or banking matters by common accord of the governments of the Member States at the level of Heads of State or Government, on a recommendation from the Council, after it has consulted the European Parliament and the Governing Council of the ECB".<ref>Article 11.2 of the ESCB Statute</ref>

      [[José Manuel González-Páramo]], a Spanish member of the executive board since June 2004, was due to leave the board in early June 2012, but no replacement had been named as of late May.<ref name=MW01>Marsh, David, [http://www.marketwatch.com/story/cameron-irritates-as-euros-high-noon-approaches-2012-05-28 "Cameron irritates as euro's High Noon approaches"], ''MarketWatch'', 28 May 2012. Retrieved 29 May 2012.</ref> The Spanish had nominated Barcelona-born Antonio Sáinz de Vicuña – an ECB veteran who heads its legal department – as González-Páramo's replacement as early as January 2012, but alternatives from Luxembourg, Finland, and Slovenia were put forward and no decision made by May.<ref>{{cite web |url=http://blogs.ft.com/money-supply/tag/jose-manuel-gonzalez-paramo/#axzz1wP9yAdBr |title=Tag: José Manuel González-Páramo |newspaper=[[Financial Times]] Money Supply blog entries |date=23 January 2012 |access-date=14 September 2014}}</ref> After a long political battle and delays due to the European Parliament's protest over the lack of gender balance at the ECB,<ref>{{cite news |url=https://www.reuters.com/article/us-eu-parliament-mersch-idUSBRE89O0KA20121025|title=EU parliament vetoes Mersch, wants woman for ECB |last=Davenport |first=Claire |work=U.S. |access-date=3 October 2018 |language=en-US}}</ref> Luxembourg's [[Yves Mersch]] was appointed as González-Páramo's replacement.<ref>{{cite web |url=https://www.bloomberg.com/news/2012-11-22/mersch-named-to-ecb-post-after-longest-euro-appointment-battle.html |title=Mersch Named to ECB After Longest Euro Appointment Battle |date=23 November 2012 |work=Bloomberg |access-date=14 September 2014}}</ref>

      In December 2020, [[Frank Elderson]] succeeded to [[Yves Mersch]] at the ECB's board.<ref>{{Cite web|title=Frank Elderson officially appointed member of executive boar...|url=https://agenceurope.eu/en/bulletin/article/12620/7|access-date=7 March 2021|website=agenceurope.eu}}</ref><ref>{{Cite web|title=Benoeming Nederlander Frank Elderson in directie ECB stap dichterbij|url=https://nos.nl/l/2357869|access-date=25 November 2020|website=nos.nl|date=24 November 2020 |language=nl}}</ref>

      ==== Governing Council ====
      The [[Governing Council of the European Central Bank|Governing Council]] is the main decision-making body of the [[Eurosystem]].<ref>{{cite web |url=http://www.ecb.int/ecb/educational/facts/orga/html/or_016.en.html |title=ECB: Decision-making bodies |access-date=14 September 2014 |archive-url=https://web.archive.org/web/20130206095156/http://www.ecb.int/ecb/educational/facts/orga/html/or_016.en.html |archive-date=6 February 2013 }}</ref> It comprises the members of the executive board (six in total) and the governors of the National Central Banks of the euro area countries (21 as of 2026).

      According to Article 284 of the TFEU, the President of the [[Economic and Financial Affairs Council]] (ECOFIN) and a representative from the [[European Commission]] may attend the meetings as observers, but they lack voting rights.

      Since January 2015, the ECB has published on its website a summary of the Governing Council deliberations ("accounts").<ref>{{cite press release |url=https://www.ecb.europa.eu/press/accounts/2016/html/index.en.html |title=Monetary policy accounts published in 2016|date=17 December 2019}}</ref> These publications came as a partial response to recurring criticism against the ECB's opacity.<ref>{{cite news |url=https://www.ft.com/content/7e58a3ea-d1bc-11e2-9336-00144feab7de?ftcamp=published_links/rss/comment/feed//product |title=The ECB must open itself up |work=Financial Times |date=10 June 2013 |language=en-GB |access-date=23 September 2018 |url-access=subscription}}</ref> However, in contrast to other central banks, the ECB still does not disclose individual voting records of the governors seating in its council.

      In December 2025, the ECB proposed a simplification of EU banking rules to simplify the European regulatory, supervisory and reporting framework. The proposal was introduced and endorsed by the Governing Council.<ref>{{Cite journal |last=Bank |first=European Central |date=11 December 2025 |title=Governing Council proposes simplification of EU banking rules |url=https://www.ecb.europa.eu//press/pr/date/2025/html/ecb.pr251211~aa5c9271b8.en.html |language=en}}</ref>

