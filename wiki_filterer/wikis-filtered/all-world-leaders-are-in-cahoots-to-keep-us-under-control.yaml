      | caption5          = At a [[COVID-19 community quarantines in the Philippines|community quarantine]] checkpoint in [[COVID-19 pandemic in Central Visayas|Bohol]], [[COVID-19 pandemic in the Philippines|Philippines]], police officers check a passing [[jeepney]].
      | image6            = Ian Art Photography - Italy 100 people queuing at a supermarket during coronavirus outbreak mar-2020.jpg
