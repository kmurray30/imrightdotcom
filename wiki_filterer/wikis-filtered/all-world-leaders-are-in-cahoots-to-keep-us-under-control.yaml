      '''Klaus Martin Schwab''' ({{IPA|de|klaʊs ˈmaʁtiːn ʃvaːp|lang}}; born 30 March 1938) is a German mechanical engineer, economist, and founder of the [[World Economic Forum]] (WEF). He served as the WEF's chairman from 1971 until his resignation in 2025.<ref>{{Cite web |title=World Economic Forum chairman Klaus Schwab steps down – DW – 04/21/2025 |url=https://www.dw.com/en/world-economic-forum-chairman-klaus-schwab-steps-down/a-72303380 |access-date=24 April 2025 |website=dw.com |language=en}}</ref><ref>{{Cite web |date=21 May 2024 |title=World Economic Forum founder Klaus Schwab steps back from executive post |url=https://www.semafor.com/article/05/21/2024/klaus-schwab-says-hes-stepping-down-as-world-economic-forum-head |access-date=22 May 2024 |website=Semafor |language=en}}</ref><ref>{{Cite web |last=Gilchrist |first=Karen |date=21 May 2024 |title=World Economic Forum founder Klaus Schwab to step back from executive role |url=https://www.cnbc.com/2024/05/21/world-economic-forum-davos-founder-klaus-schwab-to-step-back-from-executive-role.html |access-date=22 May 2024 |website=CNBC |language=en}}</ref>

      == Early life and education ==
      Klaus Martin Schwab was born on 30 March 1938, to Eugen Wilhelm Schwab and Erika Epprecht<ref>{{Cite web |last=Norton |first=Tom |date=25 January 2022 |title=Klaus Schwab is not related to the Rothschild family |url=https://fullfact.org/online/klaus-schwab-rothschild-false/ |access-date=2 April 2022 |website=Full Fact |language=en |quote=Mr Schwab also dedicated his book "Stakeholder Capitalism", published in 2021, to his parents Eugen Wilhelm Schwab and Erika Epprecht. |archive-date=19 April 2022 |archive-url=https://web.archive.org/web/20220419060635/https://fullfact.org/online/klaus-schwab-rothschild-false/ |url-status=live }}</ref><ref>{{Cite book |last1=Schwab |first1=Klaus |title=Stakeholder Capitalism: A Global Economy that Works for Progress, People and Planet |last2=Vanham |first2=Peter |publisher=Wiley |year=2021 |isbn=978-1119756132}}</ref> in [[Ravensburg]]. His parents had moved from Switzerland to Germany during the [[Third Reich]] in order for his father to assume the role of director at [[Escher Wyss AG]], an industrial company and contractor for the Nazi regime.<ref>{{cite news |title=Norwegian Industrial Workers Museum World Heritage Site – ERIH |url=https://www.erih.net/i-want-to-go-there/site/norwegian-industrial-workers-museum-world-heritage-site |work=www.erih.net |language=de |access-date=26 January 2023 |archive-date=26 January 2023 |archive-url=https://web.archive.org/web/20230126005509/https://www.erih.net/i-want-to-go-there/site/norwegian-industrial-workers-museum-world-heritage-site |url-status=live }}</ref><ref name="Interview">{{cite news|url=https://www.nzz.ch/wirtschaft/klaus-schwab-zur-geschichte-des-wef-greta-thunberg-und-trump-ld.1534540|title=Gründer Klaus Schwab zur Geschichte des WEF und zum 50. Treffen in Davos: "Ich will mich von Greta nicht instrumentalisieren lassen"|newspaper=Neue Zürcher Zeitung|date=20 January 2020|access-date=1 February 2022|archive-date=27 February 2020|archive-url=https://web.archive.org/web/20200227162637/https://www.nzz.ch/wirtschaft/klaus-schwab-zur-geschichte-des-wef-greta-thunberg-und-trump-ld.1534540|url-status=live |last1=Fischer |first1=Peter A. }}</ref> Although his father was baptized [[Lutheranism|Lutheran]],{{cn|date=October 2025}} Schwab was raised [[Catholic Church|Catholic]].<ref>{{Cite web |title=Pfarrer in Davos über das Weltwirtschaftsforum |url=https://www.domradio.de/artikel/das-katholische-element-kommt-auch-zum-tragen-pfarrer-davos-ueber-das-weltwirtschaftsforum |access-date=10 October 2022 |website=domradio.de |date=22 January 2020 |language=de |archive-date=10 October 2022 |archive-url=https://web.archive.org/web/20221010214956/https://www.domradio.de/artikel/das-katholische-element-kommt-auch-zum-tragen-pfarrer-davos-ueber-das-weltwirtschaftsforum |url-status=live }}</ref> Although he has three Swiss grandparents and two Swiss brothers, he is a citizen of Germany and has declined multiple offers for naturalization, from both [[Kurt Furgler]]<ref name=muller/> and [[Ueli Maurer]].<ref>{{Cite web |last=swissinfo.ch/mga |date=18 August 2019 |title=Switzerland mulls honorary citizenship for WEF founder Schwab |url=https://www.swissinfo.ch/eng/politics/50th-anniversary_switzerland-mulls-honorary-citizenship-for-wef-founder-schwab/45168602 |access-date=18 December 2023 |website=SWI swissinfo.ch |language=en}}</ref>

      Schwab attended first and second grades at the [[primary school]] in the [[Wädenswil]] district of [[Au, Zürich]], in Switzerland. After [[World War II]], Schwab attended the Spohn-Gymnasium in [[Ravensburg]] until his [[Abitur]] in 1957.<ref name=muller>Patrik Müller, Andreas Maurer. [https://www.aargauerzeitung.ch/schweiz/ein-unmogliches-geschenk-weshalb-die-einburgerung-von-wef-grunder-klaus-schwab-scheitern-wird-ld.1144493 ''An impossible gift: Why the naturalisation of WEF founder Klaus Schwab will fail.''] {{Webarchive|url=https://web.archive.org/web/20210221165648/https://www.aargauerzeitung.ch/schweiz/ein-unmogliches-geschenk-weshalb-die-einburgerung-von-wef-grunder-klaus-schwab-scheitern-wird-ld.1144493 |date=21 February 2021 }} [[Aargauer Zeitung]], 20 August 2019.</ref><ref name=dunsch>Jürgen Dunsch: ''Host of the Mighty: Klaus Schwab and the World Economic Forum in Davos.'' FinanzBuch Verlag 2016. p. 26f.</ref> In 1961, he graduated as a mechanical engineer from the [[ETH Zurich|Swiss Federal Institute of Technology]] in Zurich,<ref name="three" /> with a doctorate in engineering, with a dissertation titled {{Lang|de|Der längerfristige Exportkredit als betriebswirtschaftliches Problem des Maschinenbaues}} (Longer-term export credit as a business problem in mechanical engineering).<ref>{{Cite thesis |title=Der längerfristige Exportkredit als betriebswirtschaftliches Problem des Maschinenbaues |url=https://www.research-collection.ethz.ch/handle/20.500.11850/135413 |access-date=26 November 2020 |website=Research Collection |year=1965 |publisher=ETH Zürich |doi=10.3929/ethz-a-000105052 |language=de |last1=Schwab |first1=Klaus Martin |hdl=20.500.11850/135413 |type=Doctoral Thesis |archive-date=17 December 2020 |archive-url=https://web.archive.org/web/20201217192620/https://www.research-collection.ethz.ch/handle/20.500.11850/135413 |url-status=live }}</ref> He also earned a doctorate in economics from the [[University of Fribourg]],<ref name="three">{{cite web |url=http://www3.weforum.org/docs/WEF_ProfessorKlausSchwab_Factsheet.pdf |title=Professor Klaus Schwab |website=World Economic Forum |language=en |access-date=17 June 2021 |archive-date=14 May 2021 |archive-url=https://web.archive.org/web/20210514170342/https://www3.weforum.org/docs/WEF_ProfessorKlausSchwab_Factsheet.pdf |url-status=live }}</ref><ref>{{Cite web |title=Some of our Graduates |url=https://www.unifr.ch/ses/en/fac/alumni/careers.html |access-date=26 November 2020 |website=Faculty of Management, Economics and Social Sciences, University of Fribourg |language=en |archive-date=29 October 2020 |archive-url=https://web.archive.org/web/20201029171230/https://www3.unifr.ch/ses/en/fac/alumni/careers.html |url-status=live }}</ref> and a [[Master in Public Administration]] degree from the [[John F. Kennedy School of Government]] at [[Harvard University]].<ref>{{Cite web |title=Improving the State of the World: a Conversation with Klaus Schwab |url=https://iop.harvard.edu/calendar/events/improving-state-world-conversation-klaus-schwab |access-date=26 November 2020 |website=The Institute of Politics at Harvard University |archive-date=17 December 2020 |archive-url=https://web.archive.org/web/20201217193538/https://iop.harvard.edu/calendar/events/improving-state-world-conversation-klaus-schwab |url-status=live }}</ref> While attending Harvard, Schwab found a mentor in future national security advisor and secretary of state [[Henry Kissinger]].<ref>{{Cite web |date=2010 |title=A Partner in Shaping History: The First 40 Years |url=https://www3.weforum.org/docs/WEF_First40Years_Book_2010.pdf |url-status=live |archive-url=https://web.archive.org/web/20230821064210/https://www3.weforum.org/docs/WEF_First40Years_Book_2010.pdf |archive-date=21 August 2023 |access-date=31 August 2023 |website=[[World Economic Forum]]}}</ref>

      == Career ==
      Schwab was professor of business policy at the [[University of Geneva]] from 1972 to 2003, and since then has been an honorary professor there.<ref name="three"/> Schwab and his wife Hilde created the [[Schwab Foundation for Social Entrepreneurship]] in 1998.<ref>{{Cite web |title=Home |url=http://www.schwabfound.org/sf/index.htm |url-status=dead |archive-url=https://web.archive.org/web/20130414033510/http://www.schwabfound.org/sf/index.htm |archive-date=14 April 2013 |access-date=29 August 2023 |website=[[Schwab Foundation for Social Entrepreneurship]] }}</ref>

      === World Economic Forum (1971–2025) ===
      [[File:1971 Opening.jpg|thumb|Schwab (rightmost) opens the inaugural European Management Forum in [[Davos]] in 1971.]]
      [[File:Vladimir Putin, Klaus Schwab - World Economic Forum Russia CEO Roundtable 2007.jpg|thumb|right|Russian President [[Vladimir Putin]] and Schwab shaking hands at the World Economic Forum Russia CEO Roundtable in June 2007]]
      In 1971, Schwab founded the European Management Forum, which was renamed as the World Economic Forum in 1987.<ref>{{cite book |last1=Pigman |first1=Geoffrey Allen |title=The World Economic Forum: a multi-stakeholder approach to global governance |date=2007 |publisher=Routledge |location=London |isbn=978-0-415-70204-1 |pages=6–22}}</ref> Also in 1971, he published {{Lang|de|Moderne Unternehmensführung im Maschinenbau}}.<ref>{{Cite book |last=Schwab |first=Klaus |url=http://www3.weforum.org/docs/WEF_KSC_CompanyStrategy_Presentation_2014_DE.pdf |title=Moderne Unternehmensführung im Maschinenbau |year=2014 |access-date=30 September 2019 |archive-date=30 September 2019 |archive-url=https://web.archive.org/web/20190930075800/http://www3.weforum.org/docs/WEF_KSC_CompanyStrategy_Presentation_2014_DE.pdf |url-status=live }}</ref> In 2003 Schwab appointed [[José María Figueres]] CEO of the WEF,<ref name="eater">{{cite news |title=José Mariá Figueres Olsen President, Carbon War Room |url=https://eatforum.org/person/jose-maria-figueres-olsen/ |publisher=eatforum.org |date=n.d. |access-date=14 April 2022 |archive-date=13 August 2022 |archive-url=https://web.archive.org/web/20220813173049/https://eatforum.org/person/jose-maria-figueres-olsen/ |url-status=live }}</ref> as his successor. In October 2004, Figueres resigned<ref>{{Cite web|url=https://www.weforum.org/agenda/2004/10/ceo_resigns/|title=CEO resigns|website=World Economic Forum|date=29 October 2004 |access-date=25 November 2021|archive-date=6 August 2020|archive-url=https://web.archive.org/web/20200806194259/https://www.weforum.org/agenda/2004/10/ceo_resigns/|url-status=live}}</ref> over his undeclared receipt of more than US$900,000 in consultancy fees from the French telecommunications firm [[Alcatel-Lucent|Alcatel]] while he was working at the Forum.<ref name="swi">{{Cite web |url=https://www.swissinfo.ch/eng/wef-director-resigns-over-undeclared-fees/4171240 |title=WEF director resigns over undeclared fees |website=SWI swissinfo.ch |date=29 October 2004 |access-date=25 November 2021 |archive-date=15 August 2020 |archive-url=https://web.archive.org/web/20200815180653/https://www.swissinfo.ch/eng/wef-director-resigns-over-undeclared-fees/4171240 |url-status=live }}</ref><ref name="wefs">{{cite web |url=http://web.worldbank.org/archive/website00818/WEB/OTHER/STATEMEN.HTM |title=Statement from the World Economic Forum |date=29 October 2004 |access-date=4 April 2022 |archive-date=4 April 2022 |archive-url=https://web.archive.org/web/20220404110043/http://web.worldbank.org/archive/website00818/WEB/OTHER/STATEMEN.HTM |url-status=live }}</ref> In 2006, [[Transparency International]] highlighted this incident in their [[Global Corruption Report]].<ref>{{Cite web|title=Global Corruption Report 2006 – Transparency International, Page 147|url=https://images.transparencycdn.org/images/2006_GCR_HealthSector_EN.pdf|url-status=live|website=Global Corruption Report 2006 – Transparency International|access-date=25 November 2021|archive-date=19 July 2021|archive-url=https://web.archive.org/web/20210719090720/https://images.transparencycdn.org/images/2006_GCR_HealthSector_EN.pdf}}</ref>

      Schwab founded the [[Global Shapers Community]] in 2011 within the WEF to work with young people in "shaping local, regional and global agendas."<ref>{{Cite web |title=Building a movement |url=https://www.globalshapers.org/story/ |url-status=live |archive-url=https://web.archive.org/web/20230829183855/https://www.globalshapers.org/story |archive-date=29 August 2023 |access-date=29 August 2023 |website=[[Global Shapers Community]] |language=en}}</ref> In 2015, the WEF was formally recognised by the Swiss Government as an "international body".<ref>{{Cite web |title=Agreement signed with the WEF |url=https://www.news.admin.ch/en/nsb?id=55987 |access-date=5 June 2020 |website=The portal of the Swiss government |archive-date=5 June 2020 |archive-url=https://web.archive.org/web/20200605104241/https://www.news.admin.ch/en/nsb?id=55987 |url-status=live }}</ref>

      The phrase ''[[Fourth Industrial Revolution]]'' was first introduced by a team of scientists developing a high-tech strategy for the German government.<ref>{{Cite web|date=4 March 2013|title=Industrie 4.0: Mit dem Internet der Dinge auf dem Weg zur 4. industrial Revolution - vdi-nachrichten.com|url=http://www.vdi-nachrichten.com/artikel/Industrie-4-0-Mit-dem-Internet-der-Dinge-auf-dem-Weg-zur-4-industriellen-Revolution/52570/1|access-date=25 January 2021|archive-url=https://web.archive.org/web/20130304101009/http://www.vdi-nachrichten.com/artikel/Industrie-4-0-Mit-dem-Internet-der-Dinge-auf-dem-Weg-zur-4-industriellen-Revolution/52570/1|archive-date=4 March 2013}}</ref> Schwab, as the former executive chairman of the WEF, introduced the phrase to a wider audience in a 2015 article published by ''[[Foreign Affairs]]''.<ref name=faff>{{Cite magazine |url=https://www.foreignaffairs.com/articles/2015-12-12/fourth-industrial-revolution/ |title=The Fourth Industrial Revolution |last=Schwab |first=Klaus |date=12 December 2015 |access-date=15 January 2019 |magazine=Foreign Affairs}}</ref> "Mastering the Fourth Industrial Revolution" was the 2016 theme of the [[World Economic Forum#Annual meeting in Davos|World Economic Forum Annual Meeting]], in Davos-Klosters, Switzerland.<ref name=marr16>{{Cite news|last=Marr|first=Bernard|title=Why Everyone Must Get Ready For The 4th Industrial Revolution|language=en|work=Forbes|url=https://www.forbes.com/sites/bernardmarr/2016/04/05/why-everyone-must-get-ready-for-4th-industrial-revolution/|access-date=14 February 2018}}</ref> On 10 October 2016, the Forum announced the opening of its Centre for the Fourth Industrial Revolution in San Francisco.<ref>{{Cite web |last=Monck |first=Adrian |date=10 October 2016 |title=New Forum Center to Advance Global Cooperation on Fourth Industrial Revolution |url=https://www.weforum.org/press/2016/10/new-forum-center-to-advance-global-cooperation-on-fourth-industrial-revolution/ |url-status=live |archive-url=https://web.archive.org/web/20161120152702/https://www.weforum.org/press/2016/10/new-forum-center-to-advance-global-cooperation-on-fourth-industrial-revolution/ |archive-date=20 November 2016 |access-date=15 October 2018 |website=[[World Economic Forum]]}}</ref> This was also subject and title of Schwab's 2016 book.<ref>{{cite book
      | last1 = Schwab
      | first1 = Klaus
      | author-link1 = Klaus Schwab
      | year = 2016
      | title = The Fourth Industrial Revolution
      | url = https://books.google.com/books?id=ST_FDAAAQBAJ
      | location = New York
      | publisher = Crown Publishing Group
      | publication-date = 2017
      | isbn = 9781524758875
      | access-date = 29 June 2017
      | quote = Digital technologies ... are not new, but in a break with the third industrial revolution, they are becoming more sophisticated and integrated and are, as a result, transforming societies and the global economy.}}</ref> Schwab includes in this fourth era technologies that combine hardware, software, and biology ([[cyber-physical system]]s),<ref>{{Cite web|url=https://www.weforum.org/agenda/2016/01/the-fourth-industrial-revolution-what-it-means-and-how-to-respond/|title=The Fourth Industrial Revolution: what it means and how to respond|website=World Economic Forum|date=14 January 2016 |access-date=20 March 2018}}</ref> and emphasises advances in communication and connectivity. Schwab expected this era to be marked by breakthroughs in emerging technologies in fields such as [[robotics]], [[artificial intelligence]], [[nanotechnology]], [[quantum computing]], [[biotechnology]], the [[internet of things]], the [[industrial internet of things]], decentralised consensus, [[5G|fifth-generation wireless technologies]], [[3D printing]], and [[autonomous vehicles|fully autonomous vehicles]].<ref>
      {{cite web
      |last1= Schwab|first1= Klaus
      |title= The Fourth Industrial Revolution: what it means, how to respond
      |url= https://www.weforum.org/agenda/2016/01/the-fourth-industrial-revolution-what-it-means-and-how-to-respond/
      |website= World Economic Forum|date= 14 January 2016
      |access-date = 29 June 2017
      |quote= The possibilities of billions of people connected by mobile devices, with unprecedented processing power, storage capacity, and access to knowledge, are unlimited. And these possibilities will be multiplied by emerging technology breakthroughs in fields such as artificial intelligence, robotics, the Internet of Things, autonomous vehicles, 3-D printing, nanotechnology, biotechnology, materials science, energy storage, and quantum computing.}}</ref> In November 2019 on his book tour Schwab met with [[Vladimir Putin]] at the annual [[SPIEF]] to present to him a copy.<ref name="kru1">{{cite news |title=Meeting with World Economic Forum Executive Chairman Klaus Martin Schwab |date=27 November 2019 |url=http://en.kremlin.ru/events/president/news/62145}}</ref><ref name="fspb1">{{cite news |url=https://forumspb.com/en/news/news/russian-president-vladimir-putin-meets-with-world-economic-forum-chairman-klaus-schwab/ | title=Russian President Vladimir Putin Meets with World Economic Forum Chairman Klaus Schwab | website=forumspb.com}}</ref>

      ==== Downfall and resignation (2024–2025) ====
      In June 2024, ''[[The Wall Street Journal]]'' reported allegations of sexual harassment and workplace misconduct against Schwab by former WEF employees.<ref>{{Cite news |last1=Ramachandran |first1=Shalini |last2=Safdar |first2=Khadeeja |date=29 June 2024 |title=Behind Davos, Claims of a Toxic Workplace |url=https://www.wsj.com/business/world-economic-forum-klaus-schwab-discrimination-harassment-de285594 |access-date=5 July 2024 |work=[[The Wall Street Journal]]}}</ref><ref>{{Cite news |last=Schuler |first=Edgar |date=2 July 2024 |title=Berichte über Belästigung und Diskriminierung unter Klaus Schwab |url=https://www.tagesanzeiger.ch/skandal-um-wef-berichte-ueber-belaestigung-und-diskriminierun |access-date=5 July 2024 |work=Tages-Anzeiger online}}</ref><ref>{{Cite news |last=Weder |first=Janique |date=3 July 2024 |title=Schwere Vorwürfe gegen Klaus Schwab: Das WEF weist Bericht zurück |url=https://www.nzz.ch/wirtschaft/das-wall-street-journal-wirft-dem-wef-sexismus-und-rassismus-vor-die-organisation-spricht-von-nachweislich-falschen-behauptungen-ld.1837801 |access-date=5 July 2024 |work=Neue Zürcher Zeitung |language=de-CH |issn=0376-6829}}</ref> The allegations included claims that Schwab engaged in inappropriate sexual conduct, discriminated against a pregnant employee, and ordered mass firing of employees over 50 years of age. 

      The WEF denied the allegations, stating Schwab "has never made sexual advances toward an employee" and calling the claims "vague and false."

      Following additional whistleblower allegations of financial impropriety and research manipulation in 2025, the WEF announced an internal investigation.<ref name="wef1">{{Cite web |date=22 April 2025 |title=World Economic Forum launches probe into founder Klaus Schwab over whistleblower allegations |url=https://www.reuters.com/world/world-economic-forum-launches-probe-into-founder-klaus-schwab-over-whistleblower-2025-04-22/ |access-date=22 April 2025 |website=Reuters}}</ref> Schwab resigned as chairman in April 2025 and subsequently filed defamation complaints against anonymous whistleblowers, maintaining his innocence while describing the allegations as "stupid and constructed."<ref>{{cite web |last1=Ruehl |first1=Mercedes |title='A family enterprise': WEF founder Klaus Schwab on alleged wrongdoing at Davos |url=https://www.ft.com/content/64533727-a342-4e35-9eab-4f6010d13cef |work=Financial Times}}</ref>

      === As author ===
      Schwab wrote about the [[Fourth Industrial Revolution]] in a 2016 book.<ref name="4IR">{{Cite journal |last1=Philbeck |first1=Thomas |last2=Davis |first2=Nicholas |date=2018 |title=The Fourth Industrial Revolution |url=https://www.jstor.org/stable/26588339 |url-status=live |journal=Journal of International Affairs |volume=72 |issue=1 |pages=17–22 |issn=0022-197X |jstor=26588339 |archive-url=https://web.archive.org/web/20221020003835/https://www.jstor.org/stable/26588339 |archive-date=20 October 2022 |access-date=7 September 2022}}</ref> In January 2017, [[Steven Poole]] in ''[[The Guardian]]'' criticised Schwab's ''Fourth Industrial Revolution'' book,<ref name="Poole 2017">{{cite web |last=Poole |first=Steven |date=6 January 2017 |title=The Fourth Industrial Revolution review – adapt to new technology or perish |url=http://www.theguardian.com/books/2017/jan/06/the-fourth-industrial-revolution-by-klaus-schwab-review |url-status=live |archive-url=https://web.archive.org/web/20220514020937/https://www.theguardian.com/books/2017/jan/06/the-fourth-industrial-revolution-by-klaus-schwab-review |archive-date=14 May 2022 |access-date=14 May 2022 |website=the Guardian}}</ref> pointing out that "[[Internet of things|the internet of things]]" would probably be hackable. He also criticised Schwab for showing that future technologies may be used for good or evil, but not taking a position on the issues, instead offering only vague policy recommendations. The ''[[Financial Times]]''{{'}} innovation editor found "the clunking lifelessness of the prose" led him to "suspect this book really was written by humans—ones who inhabit a strange twilight world of stakeholders, externalities, inflection points and 'developtory sandboxes'."<ref name="jtft">{{cite news |last1=Thornhill |first1=John |date=19 November 2018 |title=Shaping the Future of the Fourth Industrial Revolution, by Klaus Schwab with Nicholas Davis |publisher=[[Financial Times]] |url=https://www.ft.com/content/40797098-e991-11e8-885c-e64da4c0f981 |url-status=live |access-date=14 April 2022 |archive-url=https://web.archive.org/web/20220414161402/https://www.ft.com/content/40797098-e991-11e8-885c-e64da4c0f981 |archive-date=14 April 2022}}</ref> The political scientist [[Klaus-Gerd Giesen]] argued that the dominant ideology of the Fourth Industrial Revolution is [[transhumanism]].<ref name="giesen17">{{cite journal |last1=Giesen |first1=Klaus-Gerd |year=2018 |title=Le transhumanisme comme idéologie dominante de la quatrième révolution industrielle |journal=Journal International de Bioéthique et d'Éthique des Sciences |volume=29 |issue=3 |pages=189–203 |doi=10.3917/jibes.293.0189 |pmid=30767456}}</ref><ref name="giesen20">{{cite book |last1=Giesen |first1=Klaus-Gerd |title=Ideologies in World Politics |year=2020 |isbn=978-3-658-30511-6 |series=Staat – Souveränität – Nation |pages=143–156 |chapter=The Transhumanist Ideology and the International Political Economy of the Fourth Industrial Revolution |doi=10.1007/978-3-658-30512-3_9 |s2cid=226609515}}</ref>

      == Controversies ==

      === Salary level and lack of financial transparency ===
      While Schwab declared that excessively high management salaries were "no longer socially acceptable",<ref>{{cite news |last1=Meck |first1=Georg |title=Zu hohe Managergehälter sind nicht mehr sozial verträglich |url=https://www.faz.net/aktuell/wirtschaft/weltwirtschaftsforum/wef-gruender-schwab-zu-hohe-managergehaelter-sind-nicht-mehr-sozial-vertraeglich-12031146.html |access-date=7 December 2021 |agency=Frankfurter Allgemeine Zeitung |publisher=Carsten Knop Berthold Kohler Jürgen Kaube Gerald Braunberger |date=20 January 2013 |archive-date=13 November 2021 |archive-url=https://web.archive.org/web/20211113004859/https://www.faz.net/aktuell/wirtschaft/weltwirtschaftsforum/wef-gruender-schwab-zu-hohe-managergehaelter-sind-nicht-mehr-sozial-vertraeglich-12031146.html |url-status=live }}</ref> his own annual salary of about one million [[Swiss franc]]s (about US$1.2 million) has been repeatedly questioned by the media. The Swiss radio and television corporation [[Schweizer Radio und Fernsehen|SRF]] mentioned this salary level in the context of ongoing public contributions to the WEF and the fact that the Forum does not pay any federal taxes.<ref>{{cite news |title=Knurrende Zustimmung vom Ständerat zu WEF-Geldern |url=https://www.srf.ch/news/schweiz/geld-fuer-sicherheit-am-wef-knurrende-zustimmung-vom-staenderat-zu-wef-geldern |access-date=7 December 2021 |agency=Schweizer Radio und Fernsehen |publisher=SRG SSR |date=11 June 2021 |archive-date=13 July 2021 |archive-url=https://web.archive.org/web/20210713084558/https://www.srf.ch/news/schweiz/geld-fuer-sicherheit-am-wef-knurrende-zustimmung-vom-staenderat-zu-wef-geldern |url-status=live }}</ref> Moreover, the former {{Lang|de|[[Frankfurter Allgemeine Zeitung]]}} journalist Jürgen Dunsch made the criticism that the WEF's financial reports were not very transparent since neither income nor expenditures were broken down.<ref name="SZ-money machine">{{cite news |last=Busse |first=Caspar |title=Das Weltwirtschaftsforum ist zu einer Geldmaschine geworden |trans-title=The World Economic Forum has become a money machine |url=https://www.sueddeutsche.de/wirtschaft/davos-das-weltwirtschaftsforum-ist-zu-einer-geldmaschine-geworden-1.3334817 |work=[[Süddeutsche Zeitung]] |date=17 January 2017 |language=de |access-date=28 July 2021 |archive-date=5 August 2020 |archive-url=https://web.archive.org/web/20200805111333/https://www.sueddeutsche.de/wirtschaft/davos-das-weltwirtschaftsforum-ist-zu-einer-geldmaschine-geworden-1.3334817 |url-status=live }}</ref> Schwab has also drawn ire for mixing the finances of the not-for-profit WEF and other for-profit business ventures. For example, the WEF awarded a multimillion-dollar contract to [[USWeb]] in 1998. Yet shortly after the deal went through, Schwab took a board seat at the same company, reaping valuable stock options.<ref>{{Cite news |last1=Flynn |first1=Julia |last2=Stecklow |first2=Steve |date=27 January 2000 |title=Davos Chief Dabbles in For-Profit Firms, Raising Questions About Forum's Priorities |work=[[The Wall Street Journal]] |url=https://www.wsj.com/articles/SB948928430620817752 |access-date=5 March 2022 |archive-date=5 March 2022 |archive-url=https://web.archive.org/web/20220305045144/https://www.wsj.com/articles/SB948928430620817752 |url-status=live }}</ref><ref>{{Cite web |last=Goodman |first=Peter |date=18 January 2022 |title=How Klaus Schwab Built a Billionaire Circus at Davos |url=https://www.vanityfair.com/news/2022/01/how-klaus-schwab-built-a-billionaire-circus-at-davos |access-date=4 March 2022 |website=[[Vanity Fair (magazine)|Vanity Fair]] |archive-date=26 February 2022 |archive-url=https://web.archive.org/web/20220226031528/https://www.vanityfair.com/news/2022/01/how-klaus-schwab-built-a-billionaire-circus-at-davos |url-status=live }}</ref>

      === Controversy with Davos municipality ===
      In June 2021, Schwab sharply criticised the "profiteering", "complacency" and "lack of commitment" of the municipality of [[Davos]] in relation to the WEF annual meeting. He mentioned that the preparation of the [[COVID-19|COVID]]-related meeting in [[Singapore]] in 2021/2022<ref>{{cite news |title=WEF Cancels Singapore Meeting as Pandemic Haunts Global Event |first=Catherine |last=Bosley |date=17 May 2021 |work=Bloomberg |url=https://www.bloomberg.com/news/articles/2021-05-17/world-economic-forum-to-cancel-annual-meeting-in-singapore |access-date=16 August 2021 |archive-date=30 July 2021 |archive-url=https://web.archive.org/web/20210730163733/https://www.bloomberg.com/news/articles/2021-05-17/world-economic-forum-to-cancel-annual-meeting-in-singapore |url-status=live }}</ref> had created an alternative to its Swiss host and sees the chance that the annual meeting will stay in Davos at between 40 and 70 per cent.<ref>{{Cite news |last=Pöschl |first=Fabian |url=https://www.20min.ch/story/wef-chef-droht-davos-wegen-ueberrissener-preise-917744096507 |title=WEF-Chef Klaus Schwab droht Davos wegen überrissener Preise |date=25 June 2021 |work=20 Minuten |language=de |access-date=16 August 2021 |archive-date=30 July 2021 |archive-url=https://web.archive.org/web/20210730163735/https://www.20min.ch/story/wef-chef-droht-davos-wegen-ueberrissener-preise-917744096507 |url-status=live }}</ref><ref>{{Cite news |url=https://www.blick.ch/wirtschaft/geschaeftemacherei-selbstzufriedenheit-wef-gruender-klaus-schwab-kritisiert-davos-scharf-id16627148.html |title=WEF-Gründer Klaus Schwab kritisiert Davos scharf |date=24 June 2021 |work=Blick |language=de |access-date=16 August 2021 |archive-date=30 July 2021 |archive-url=https://web.archive.org/web/20210730163734/https://www.blick.ch/wirtschaft/geschaeftemacherei-selbstzufriedenheit-wef-gruender-klaus-schwab-kritisiert-davos-scharf-id16627148.html |url-status=live }}</ref>
      ===The ''Great Reset'' and theories===
      In [[June 2020]], accompanied by a video message from [[Charles III|Charles, Prince of Wales]],<ref>{{cite web |date=14 April 2022 |title=The Great Reset: What is it? |url=https://fullfact.org/online/great-reset-conspiracy-theory/ |url-status=live |archive-url=https://web.archive.org/web/20220804011428/https://fullfact.org/online/great-reset-conspiracy-theory/ |archive-date=4 August 2022 |access-date=4 August 2022 |website=Full Fact}}</ref> Schwab launched [[the Great Reset]],  a five-point plan to enhance sustainable economic growth following the global recession caused by the [[COVID-19 pandemic lockdowns]].  Its stated objective is to support recovery from the global pandemic in a manner that emphasises [[sustainable development]]. According to Schwab, the intention of the project is to reconsider the meaning of capitalism and capital. While not abandoning capitalism, he proposes to change and possibly move on from some aspects of it, including [[neoliberalism]] and [[free-market fundamentalism]].

      The Great Reset was criticised by commentators for encouraging economic deregulation and expanding the influence of private corporations, particularly [[multinational corporation]]s, in policymaking at the expense of governments.<ref name="wecke_od">{{cite news |last1=Ivan |first1=Wecke |date=16 August 2021 |title=Conspiracy theories aside, there is something fishy about the Great Reset |language=en |work=openDemocracy |url=https://www.opendemocracy.net/en/oureconomy/conspiracy-theories-aside-there-something-fishy-about-great-reset/ |url-status=live |access-date=4 August 2022 |archive-url=https://archive.today/20220404023305/https://www.opendemocracy.net/en/oureconomy/conspiracy-theories-aside-there-something-fishy-about-great-reset/ |archive-date=4 April 2022}}</ref><ref name="intercept120820">{{cite news |last1=Klein |first1=Naomi |date=8 December 2020 |title=The Great Reset Conspiracy Smoothie |work=The Intercept |url=https://theintercept.com/2020/12/08/great-reset-conspiracy/ |url-status=live |access-date=14 December 2020 |archive-url=https://web.archive.org/web/20201213162038/https://theintercept.com/2020/12/08/great-reset-conspiracy/ |archive-date=13 December 2020}}</ref> Others argued that it overemphasised health and exaggerated the ability of a small group of decision-makers to reshape the global economy,<ref>{{Cite journal |last=Roth |first=Steffen |date=22 January 2021 |title=The Great Reset. Restratification for lives, livelihoods, and the planet |url=https://derroth.com/2020/12/04/preview-the-great-reset-restratification-for-lives-livelihoods-and-the-planet/ |url-status=live |journal=Technological Forecasting & Social Change |language=en |volume=166 |article-number=120636 |doi=10.1016/j.techfore.2021.120636 |issn=0040-1625 |pmc=9757815 |pmid=36569031 |archive-url=https://web.archive.org/web/20221110082521/https://derroth.com/2020/12/04/preview-the-great-reset-restratification-for-lives-livelihoods-and-the-planet/ |archive-date=10 November 2022 |access-date=10 November 2022}}</ref> or that it amounted to [[crony capitalism]].<ref>{{Cite journal |last=Foss |first=Nicolai |date=27 April 2022 |title=The economy doesn't need a reset, and neither does management theory |journal=Scandinavian Journal of Management |language=en |volume=38 |issue=3 |article-number=101214 |doi=10.1016/j.scaman.2022.101214 |issn=0956-5221 |s2cid=248794634 |doi-access=free }}</ref> The initiative also became the focus of [[Conspiracy theory|conspiracy theories]] circulated mainly by conservative commentators on platforms such as [[YouTube]], [[Facebook]] and [[Twitter]]. Claims included that the pandemic had been engineered by a secret group to control the global economy, that lockdowns were intentionally designed to cause economic collapse,<ref name=":1">{{cite news |date=24 June 2021 |title=What is the Great Reset - and how did it get hijacked by conspiracy theories? |publisher=BBC News |url=https://www.bbc.co.uk/news/blogs-trending-57532368 |url-status=live |access-date=4 August 2022 |archive-url=https://web.archive.org/web/20220804020626/https://www.bbc.co.uk/news/blogs-trending-57532368 |archive-date=4 August 2022}}</ref> or that a global elite sought to abolish [[private property]] while using vaccines to subjugate populations.<ref name="Zimonjic">{{cite news |last1=Zimonjic |first1=Peter |date=3 September 2022 |title=World Economic Forum official says Canada has bigger issues to discuss than conspiracy theories |work=CBC News |url=https://www.cbc.ca/news/politics/adrian-monck-world-economic-forum-house-interview-1.6571569 |url-status=live |access-date=8 September 2022 |archive-url=https://web.archive.org/web/20220907232551/https://www.cbc.ca/news/politics/adrian-monck-world-economic-forum-house-interview-1.6571569 |archive-date=7 September 2022}}</ref><ref name="wecke_od" /> Such theories gained traction when political leaders including U.S. president [[Joe Biden]], New Zealand prime minister [[Jacinda Ardern]], and Canadian prime minister [[Justin Trudeau]] referred to the idea of a post-pandemic "reset" in public statements.<ref name="RC_DeRosa_20201118">{{cite news |last1=De Rosa |first1=Nicholas |date=18 November 2020 |title=Le "Great Reset" n'est pas un complot pour contrôler le monde |language=fr |work=Radio-Canada |publisher=Canadian Broadcasting Corporation |url=https://ici.radio-canada.ca/nouvelle/1750586/great-reset-grande-reinitialisation-forum-economique-mondial-davos-complot-communisme#::text=%C2%AB%20La%20Grande%20R%C3%A9initialisation%20%C2%BB%20%E2%80%93%20ou,meilleur%20apr%C3%A8s%20la%20crise%20sanitaire.}}</ref>

      == Awards and honours ==
      Schwab has been conferred with the French [[Legion of Honour]] (knight distinction), the [[Order of Merit of the Federal Republic of Germany|Grand Cross with Star of the National Order of Germany]], and the Japanese Grand Cordon of the [[Order of the Rising Sun]].<ref name="nus award">{{Cite web |title=NUS confers highest honour on World Economic Forum Founder and Executive Chairman Prof Klaus Schwab and social service champion Gerard Ee |url=https://news.nus.edu.sg/nus-confers-highest-honour-on-world-economic-forum-founder-and-executive-chairman-prof-klaus-schwab-and-social-service-champion-gerard-ee/ |access-date=26 November 2020 |publisher=nus.edu.sg |archive-date=17 December 2020 |archive-url=https://web.archive.org/web/20201217193632/https://news.nus.edu.sg/nus-confers-highest-honour-on-world-economic-forum-founder-and-executive-chairman-prof-klaus-schwab-and-social-service-champion-gerard-ee/ |url-status=live }}</ref> He also was awarded the [[Dan David Prize]],<ref>{{Cite web|date=25 November 2021|title=Klaus Schwab|url=https://dandavidprize.org/laureates/klaus-schwab/|access-date=25 November 2021|website=Dan David Prize|language=en-US|archive-date=25 November 2021|archive-url=https://web.archive.org/web/20211125125031/https://dandavidprize.org/laureates/klaus-schwab/|url-status=live}}</ref> and was recognized by [[Elizabeth II|Queen Elizabeth]] as an honorary Knight Commander of the [[Order of St Michael and St George]].<ref name="nus award"/> 

