      ==Policing==
      A private security company provided security at the hotel; in addition, the Bilderberg Group agreed to contribute toward the policing costs of the event.<ref name='Teleg13'/> The local police force, [[Hertfordshire Police]], were in talks with the [[Home Office]] about a grant for potential "unexpected or exceptional costs". The grant is provided if the costs threaten the "stability of their policing budget".<ref name='Teleg13'/> A combined force of Hertfordshire, Bedfordshire, and Cambridge constabularies prepared for the conference, with the assistance of specialist officers from the Metropolitan Police. Five rugby pitches belonging to the Fullerians RFC were hired by police for the duration of the event.<ref name='Ind13'/> The police operation for the Bilderberg conference was called Operation Discuss, and had been running for eighteen months prior to the start of the conference.<ref>{{cite news|title=Bilderberg 2013: welcome to 1984|url=https://www.theguardian.com/world/2013/jun/05/bilderberg-2013-goldman-sachs-watford|author=Charlie Skelton|work=The Guardian|access-date=5 June 2013|location=London|date=5 June 2013}}</ref> The cost of policing was revealed after the conference to have been in the region of £1.3 million, with £500,000 having been offered to the police by the Bilderberg Group.<ref name='BBCJun17'>{{cite news|title=Bilderberg conference: £1.3m spent on police costs|url=https://www.bbc.co.uk/news/uk-politics-22943035|publisher=BBC News Online|access-date=17 June 2013|date=17 June 2013}}</ref>

      The mayor of Watford, Dorothy Thornhill, said she had concerns that the conference attracted "people who can and do cause violence and disturbance" but she was confident that the police could "minimise that and give them their right to protest".<ref name='Teleg13'/> She was also "ambivalent about whether this is a good thing. It's potentially a positive thing as long as things don't kick off."<ref name='Teleg13'/>

