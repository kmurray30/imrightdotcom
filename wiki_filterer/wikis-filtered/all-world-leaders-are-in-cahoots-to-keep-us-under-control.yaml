      {{United Nations series}}
      The '''United Nations Security Council''' ('''UNSC''') is one of the [[Organs of the United Nations|six principal organs]] of the [[United Nations System|United Nations]]<ref>{{cite web|url=http://www.un.org/en/sections/un-charter/un-charter-full-text/|title=Article 7 (1) of Charter of the United Nations|publisher=United Nations|access-date=4 September 2017|archive-date=10 April 2019|archive-url=https://web.archive.org/web/20190410130442/https://www.un.org/en/sections/un-charter/un-charter-full-text/|url-status=live}}</ref> and has primary responsibility for the maintenance of international peace and security.<ref name="Article24">{{cite web|url=http://www.un.org/en/sections/un-charter/un-charter-full-text/|title=Article 24 (1) of Charter of the United Nations|publisher=United Nations|access-date=4 September 2017|archive-date=10 April 2019|archive-url=https://web.archive.org/web/20190410130442/https://www.un.org/en/sections/un-charter/un-charter-full-text/|url-status=live}}</ref> Its powers, outlined in the [[Charter of the United Nations|UN Charter]], include establishing [[United Nations peacekeeping|peacekeeping]] operations, authorizing military action, and imposing international sanctions. Under [[Chapter VII of the United Nations Charter|Chapter VII]] of the Charter, the Council may identify threats to international peace, determine breaches of that peace, and authorize responses up to and including the [[Use of force in international law|use of force]]. It is the only UN body with the authority to issue [[United Nations Security Council resolution|resolutions]] binding on all member states.<ref name="Article24" /> The Council also recommends the admission of new member states to the [[United Nations General Assembly]]<ref>{{cite web |title=Article 4 (2) of Charter of the United Nations |url=http://www.un.org/en/sections/un-charter/un-charter-full-text/ |publisher=United Nations |url-status=live |archive-url=https://web.archive.org/web/20190410130442/https://www.un.org/en/sections/un-charter/un-charter-full-text/ |archive-date=10 April 2019 |access-date=4 September 2017}}</ref> and approves changes to the Charter.<ref>{{cite web |title=Article 108 of Charter of the United Nations |url=http://www.un.org/en/sections/un-charter/un-charter-full-text/ |publisher=United Nations |url-status=live |archive-url=https://web.archive.org/web/20190410130442/https://www.un.org/en/sections/un-charter/un-charter-full-text/ |archive-date=10 April 2019 |access-date=4 September 2017}}</ref>

      The Security Council consists of 15 members: 5 permanent members—the United States, Russia, China, France, and the United Kingdom—and 10 non-permanent members elected by the General Assembly for two-year terms.<ref>{{cite web|url=http://www.un.org/en/sections/un-charter/un-charter-full-text/|title=Article 23 (1) of the Charter of the United Nations|date=26 June 1945|website=www.un.org|publisher=[[United Nations]]|language=en|access-date=10 December 2018|archive-date=10 April 2019|archive-url=https://web.archive.org/web/20190410130442/https://www.un.org/en/sections/un-charter/un-charter-full-text/|url-status=live}}</ref> The five permanent members, who were the [[great power]]s among the [[Allies of World War II]] or their recognised successor states, each hold [[United Nations Security Council veto power|veto power]] over substantive resolutions, enabling any one of them to block adoption of a draft resolution regardless of the level of support among other members. This veto right does not carry over into General Assembly matters or votes, which are non-binding. The [[Presidency of the United Nations Security Council|presidency]] rotates monthly among all fifteen members in English alphabetical order.

      Created in 1945 after [[World War II]] to succeed the [[League of Nations]] in maintaining international order,<ref>McNeill, J. R.; Pomeranz, Kenneth, eds. (2015). ''Production, Destruction and Connection, 1750–Present, Part 1, Structures, Spaces, and Boundary Making''. The Cambridge World History. Vol. 7. p. 324. Cambridge University Press. doi:10.1017/CBO9781139196079. {{ISBN|978-1-108-40775-5}}.</ref> the Council held its first session on 17 January 1946 at [[Church House, Westminster]], in London. During the [[Cold War]], it was largely paralysed by rivalry between the United States and the Soviet Union, though it authorised interventions in the [[Korean War]] and the [[Congo Crisis]] and deployed peacekeepers to [[Cyprus]] and the [[Sinai Peninsula]]. Following the [[dissolution of the Soviet Union]] in 1991, peacekeeping expanded dramatically: the Council authorised major operations in [[Gulf War|Kuwait]], [[United Nations Transition Assistance Group|Namibia]], [[United Nations Transitional Authority in Cambodia|Cambodia]], [[United Nations Protection Force|Bosnia]], and [[United Nations Operation in Somalia II|Somalia]], among others. In the 2020s, the Council has faced renewed paralysis, with repeated vetoes by Russia over the [[Russian invasion of Ukraine|war in Ukraine]] and by the United States over [[Gaza war|the war in Gaza]], prompting fresh calls for structural reform.

      [[United Nations resolution|Resolutions]] of the Security Council are enforced in part through [[United Nations peacekeeping|UN peacekeeping missions]], comprising military, police, and civilian personnel voluntarily provided by member states. {{As of|2024|December}}, there were 11 active peacekeeping missions with approximately 70,000 personnel from over 120 contributing countries, funded through an approved annual budget of approximately US $5.6 billion.<ref>{{cite web |title=Fifth Committee Approves $5.59 Billion Budget for 14 Peacekeeping Operations |url=https://press.un.org/en/2024/gaab4463.doc.htm |publisher=United Nations |access-date=15 February 2026}}</ref>

      == History ==

      === Background and creation ===
      {{Further|History of the United Nations}}
      In the century prior to the UN's creation, several international treaty organisations and conferences had been formed to regulate conflicts between nations, such as the [[International Committee of the Red Cross]] and the [[Hague Conventions of 1899 and 1907]].{{sfn|Kennedy|2006|p=5}} Following the catastrophic loss of life in [[World War I]], the [[Paris Peace Conference, 1919|Paris Peace Conference]] established the [[League of Nations]] to maintain harmony between nations.{{sfn|Kennedy|2006|p=8}} The League successfully resolved some territorial disputes and created international structures for postal mail, aviation, and opium control, some of which were later absorbed into the UN.{{sfn|Kennedy|2006|p=10}} However, it lacked representation for colonial peoples—then half the world's population—and significant participation from several major powers, including the United States, the [[Soviet Union|USSR]], Germany, and Japan. It failed to act against the 1931 [[Japanese invasion of Manchuria]], the [[Second Italo-Ethiopian War]] in 1935, the 1937 [[Japanese occupation of China]], and Nazi expansions under [[Adolf Hitler]] that escalated into World War II.{{sfn|Kennedy|2006|pp=13–24}}

      [[File:Cairo conference.jpg|thumb|[[Chiang Kai-shek]], [[Franklin D. Roosevelt]], and [[Winston Churchill]] at the [[Cairo Conference (1943)|Cairo Conference]] in 1943]]
      [[File:Yalta Conference (Churchill, Roosevelt, Stalin) (B&W).jpg|thumb|[[Winston Churchill]], [[Franklin D. Roosevelt]], and [[Joseph Stalin]] at the [[Yalta Conference]], February 1945]]

      On New Year's Day 1942, President [[Franklin Roosevelt]], Prime Minister [[Winston Churchill]], [[Maxim Litvinov]] of the USSR, and [[T. V. Soong]] of the [[Republic of China (1912–1949)|Republic of China]] signed a short document based on the [[Atlantic Charter]] and the [[Declaration of St James's Palace|London Declaration]].<ref>{{cite book|url=https://books.google.com/books?id=98U8YSrp1YUC&q=%22The+first+of+the+specific+steps+that+led+to+the+establishment+of+the+United+Nations+was+the+Inter-Allied+Declaration%22%22|title=Everyone's United Nations|date=1986|publisher=UN|isbn=978-92-1-100273-7|pages=5|language=en|access-date=5 December 2020|archive-date=15 January 2023|archive-url=https://web.archive.org/web/20230115074545/https://books.google.com/books?id=98U8YSrp1YUC&q=%22The+first+of+the+specific+steps+that+led+to+the+establishment+of+the+United+Nations+was+the+Inter-Allied+Declaration%22%22|url-status=live}}</ref><ref>{{cite book|last1=Tandon|first1=Mahesh Prasad|url=https://books.google.com/books?id=P5g6AQAAIAAJ&q=%22(1)+London+Declaration%22|title=Public International Law|last2=Tandon|first2=Rajesh|date=1989|publisher=Allahabad Law Agency|language=en}}</ref> The next day, representatives of 22 other nations added their signatures, and the document came to be known as the [[United Nations Declaration]].<ref>{{cite web |url=https://www.un.org/en/aboutun/history/declaration.shtml |title=Declaration by United Nations |publisher=United Nations |access-date=1 July 2015 |archive-date=3 July 2015 |archive-url=https://web.archive.org/web/20150703023233/http://www.un.org/en/aboutun/history/declaration.shtml |url-status=live}}</ref> By 1 March 1945, 21 additional states had signed.{{sfn|Osmańczyk|2004|p=2445}} The four major Allied countries—the United States, the United Kingdom, the Soviet Union, and the Republic of China—were styled the "[[Four Policemen|Four Powers]]" and became the foundation of the Security Council's executive structure.<ref name="sheriff">{{cite journal |last=Urquhart |first=Brian |author-link=Brian Urquhart |title=Looking for the Sheriff |journal=The New York Review of Books |date=16 July 1998 |volume=45 |issue=12 |url=https://www.nybooks.com/articles/1998/07/16/looking-for-the-sheriff/ |access-date=7 June 2019 |archive-date=9 March 2022 |archive-url=https://web.archive.org/web/20220309235120/https://www.nybooks.com/articles/1998/07/16/looking-for-the-sheriff/ |url-status=live}}</ref>{{sfn|Gaddis|2000}}

      Following the 1943 [[Moscow Conference (1943)|Moscow Conference]] and [[Tehran Conference]], delegations from the Big Four met in mid-1944 at the [[Dumbarton Oaks Conference]] in Washington, D.C., to negotiate the UN's structure.<ref>{{cite video |year=1944 |title=Video: Allies Study Post-War Security Etc. (1944) |url= https://archive.org/details/gov.archives.arc.39024 |publisher=[[Universal Newsreel]] |access-date=28 November 2014}}</ref> The composition of the Security Council quickly became the dominant issue. France, the Republic of China, the Soviet Union, the United Kingdom, and the United States were selected as permanent members; the United States attempted to add [[Brazil]] as a sixth member but was opposed by the Soviet and British delegations.{{sfn|Meisler|1995|p=9}} The most contentious question at Dumbarton Oaks and in successive talks was the veto rights of permanent members. The Soviet delegation argued that each permanent member should have an absolute veto that could block matters from even being discussed, whilst the British argued that nations should not be able to veto resolutions on disputes to which they were a party. At the [[Yalta Conference]] of February 1945, the American, British, and Russian delegations agreed that each of the Big Five could veto any action by the Council, but not procedural resolutions.{{sfn|Meisler|1995|pp=10–13}}

      On 25 April 1945, the [[United Nations Conference on International Organization]] began in San Francisco, attended by fifty governments and a number of non-governmental organisations involved in drafting the [[United Nations Charter]].<ref name="unmilestones">{{cite web |url=https://www.un.org/aboutun/milestones.htm |title=Milestones in United Nations History |publisher=Department of Public Information, United Nations |access-date=22 November 2013 |archive-date=11 January 2012 |archive-url=https://web.archive.org/web/20120111074909/https://www.un.org/aboutun/milestones.htm |url-status=dead}}</ref> At the conference, [[H. V. Evatt]] of the Australian delegation pushed to further restrict the veto power of permanent members, but his proposal was defeated twenty votes to ten, owing to fears that rejecting the strong veto would cause the conference to fail.{{sfn|Meisler|1995|pp=18–19}}{{sfn|Schlesinger|2003|p=196}}

      The UN officially came into existence on 24 October 1945 upon ratification of the Charter by the five permanent members and a majority of the other 46 signatories.<ref name="unmilestones"/> The Security Council met for the first time on 17 January 1946 at [[Church House, Westminster]], in London.<ref name="about">{{cite web |url=https://www.un.org/securitycouncil/content/what-security-council |title=What is the Security Council? |publisher=United Nations |access-date=15 January 2021 |archive-date=1 September 2022 |archive-url=https://web.archive.org/web/20220901050345/https://www.un.org/securitycouncil/content/what-security-council |url-status=live}}</ref> During the 1946–1951 period, it conducted sessions at the United Nations' interim headquarters in [[Lake Success, New York]], which were televised live on [[CBS]] by the journalist [[Edmund Chester]] in 1949.<ref name="nyt-1951-05-19">{{cite news |last=Rosenthal |first=A. M. |date=19 May 1951 |title=U.N. Vacates Site at Lake Success; Peace Building Back to War Output |language=en-US |work=The New York Times |url=https://www.nytimes.com/1951/05/19/archives/un-vacates-site-at-lake-success-peace-building-back-to-war-output.html |access-date=26 July 2022 |issn=0362-4331 |archive-date=26 July 2022 |archive-url=https://web.archive.org/web/20220726230531/https://www.nytimes.com/1951/05/19/archives/un-vacates-site-at-lake-success-peace-building-back-to-war-output.html |url-status=live}}</ref><ref>{{cite web |url=https://untappedcities.com/2021/05/19/united-nations-lake-success/ |title=The United Nations Headquarters in Long Island's Lake Success |date=19 May 2021 |access-date=16 January 2023 |archive-date=19 May 2021 |archive-url=https://web.archive.org/web/20210519170543/https://untappedcities.com/2021/05/19/united-nations-lake-success/ |url-status=live }}<!-- Untapped Cities is a non-specialist source; consider replacing with scholarly or archival source --></ref><ref>{{cite web |url=https://www.gettyimages.com/detail/news-photo/television-broadcast-of-a-new-series-reporting-the-sessions-news-photo/647173796?adppopup=true |title=United Nations in Action: Photograph of Edmund Chester, Larry LaSueur, Lyman Bryson at the interim headquarters of the UN General Assembly Lake Success, NY, March 8, 1949 |date=2 March 2017 |access-date=16 January 2023 |archive-date=13 January 2023 |archive-url=https://web.archive.org/web/20230113182015/https://www.gettyimages.com/detail/news-photo/television-broadcast-of-a-new-series-reporting-the-sessions-news-photo/647173796?adppopup=true |url-status=live }}<!-- Getty Images caption, not an independent source; consider replacing with primary archival documentation or secondary scholarly source --></ref>

      === Cold War ===
      [[File:Church House Westminster London 2016 (02).jpg|thumb|[[Church House, Westminster|Church House]] in London, where the first Security Council meeting took place on 17 January 1946]]

      The Security Council was largely paralysed in its early decades by the [[Cold War]] between the United States and the Soviet Union, and their respective allies; the Council was generally able to intervene only in conflicts unrelated to the superpower rivalry.{{sfn|Meisler|1995|p=35}} A notable exception was the 1950 Security Council resolution authorizing a US-led coalition to repel the [[Korean War|North Korean invasion of South Korea]], passed during a [[Soviet Union boycott of the United Nations|Soviet boycott]] of the Council.<ref name="unmilestones"/>{{sfn|Meisler|1995|pp=58–59}} In 1956, the [[United Nations Emergency Force|first UN peacekeeping force]] was established to end the [[Suez Crisis]],<ref name="unmilestones"/> but the UN was unable to intervene against the simultaneous Soviet [[Hungarian Revolution of 1956|invasion of Hungary]].{{sfn|Meisler|1995|p=114}} Cold War divisions also paralysed the Security Council's [[Military Staff Committee]], which had been created by Articles 45–47 of the Charter to oversee UN forces and create UN military bases. The committee continued to exist on paper but largely abandoned its work in the mid-1950s.{{sfn|Kennedy|2006|pp=38, 55–56}}<ref name="Chapter7">{{cite web |url=https://www.un.org/en/documents/charter/chapter7.shtml |title=Charter of the United Nations: Chapter VII: Action with Respect to Threats to the Peace, Breaches of the Peace, and Acts of Aggression |publisher=United Nations |access-date=26 November 2013 |archive-date=5 May 2009 |archive-url=https://web.archive.org/web/20090505055751/https://www.un.org/en/documents/charter/chapter7.shtml |url-status=live}}</ref>

      In 1960, the UN deployed the [[United Nations Operation in the Congo]] (UNOC)—the largest military force of its early decades—to restore order to the breakaway [[State of Katanga]], returning it to the control of the [[Democratic Republic of the Congo]] by 1964.{{sfn|Meisler|1995|pp=115–134}} The Security Council found itself bypassed in favour of direct superpower negotiations during some of the decade's larger conflicts, such as the [[Cuban Missile Crisis]] and the [[Vietnam War]].{{sfn|Kennedy|2006|pp=61–62}} It focused instead on smaller conflicts without an immediate Cold War dimension, deploying the [[United Nations Temporary Executive Authority]] in [[West New Guinea]] in 1962 and the [[United Nations Peacekeeping Force in Cyprus]] in 1964, the latter of which became one of the UN's longest-running peacekeeping missions.{{sfn|Meisler|1995|pp=156–157}}{{sfn|Kennedy|2006|p=59}}

      On 25 October 1971, over US opposition but with the support of many [[Third World]] nations, the mainland [[People's Republic of China]] replaced the [[Republic of China]] in the Security Council seat; the vote was widely seen as a sign of waning US influence in the organisation.{{sfn|Meisler|1995|pp=195–197}} With an increasing Third World presence and failures of UN mediation in the [[Six-Day War|Middle East]], [[Vietnam War|Vietnam]], and [[Indo-Pakistani War of 1965|Kashmir]], the UN increasingly shifted its attention toward economic development and cultural exchange. By the 1970s, the UN budget for social and economic development far exceeded its budget for peacekeeping.{{sfn|Meisler|1995|pp=167–168, 224–225}}

      === Post-Cold War ===
      [[File:Colin Powell anthrax vial. 5 Feb 2003 at the UN.jpg|thumb|US Secretary of State [[Colin Powell]] holds a model vial of [[anthrax]] while presenting to the Security Council in February 2003]]

      After the Cold War, the UN saw a radical expansion in its peacekeeping duties, taking on more missions in ten years than it had in the previous four decades.{{sfn|Meisler|1995|p=286}} Between 1988 and 2000, the number of adopted Security Council resolutions more than doubled, and the peacekeeping budget increased more than tenfold.<ref>{{harvnb|Fasulo|2004|p=43}}; {{harvnb|Meisler|1995|p=334}}.</ref> The UN negotiated an end to the [[Salvadoran Civil War]], launched a successful [[United Nations Transition Assistance Group|peacekeeping mission in Namibia]], and oversaw democratic elections in post-[[Apartheid in South Africa|apartheid]] South Africa and post-[[Khmer Rouge]] Cambodia.{{sfn|Meisler|1995|pp=252–256}} In 1991, the Security Council condemned the Iraqi [[invasion of Kuwait]] on the same day of the attack and later authorised a [[Gulf War|US-led coalition]] that successfully repulsed the Iraqi forces.{{sfn|Meisler|1995|pp=264–277}} Undersecretary-General [[Brian Urquhart]] later described the hopes raised by these successes as a "false renaissance" for the organisation, given the more troubled missions that followed.{{sfn|Meisler|1995|p=334}}

      Though the Charter had been written primarily to prevent aggression by one nation against another, in the early 1990s the UN faced a number of simultaneous serious crises within states, including Haiti, Mozambique, and the former Yugoslavia.{{sfn|Kennedy|2006|pp=66–67}} The [[United Nations Protection Force|UN mission to Bosnia]] faced "worldwide ridicule" for its indecisive and confused response to ethnic cleansing.<ref>For quotation "worldwide ridicule", see {{harvnb|Meisler|1995|p=293}}; for description of UN missions in Bosnia, see {{harvnb|Meisler|1995|pp=312–329}}.</ref> In 1994, the [[United Nations Assistance Mission for Rwanda]] failed to intervene in the [[Rwandan genocide]] amid Security Council indecision.{{sfn|Kennedy|2006|p=104}}

      In the late 1990s, UN-authorised international interventions took a wider variety of forms. The [[United Nations Mission in Sierra Leone|UN mission]] during the 1991–2002 [[Sierra Leone Civil War]] was supplemented by British [[Royal Marines]], and the UN-authorized [[War in Afghanistan (2001–2021)|2001 invasion of Afghanistan]] was overseen by [[NATO]].{{sfn|Kennedy|2006|pp=110–111}} In 2003, the United States [[Iraq War|invaded Iraq]] without a UN Security Council resolution authorising the use of force, prompting renewed questioning of the Council's effectiveness.{{sfn|Kennedy|2006|p=111}} In the same decade, the Security Council deployed peacekeepers to address the [[War in Darfur]] in Sudan and the [[Kivu conflict]] in the Democratic Republic of the Congo. In 2013, [[Secretary-General's Internal Review Panel on United Nations Action in Sri Lanka|an internal review]] of UN actions in [[Alleged war crimes during the final stages of the Sri Lankan Civil War|the final battles]] of the [[Sri Lankan civil war|Sri Lankan Civil War]] in 2009 concluded that the organisation had suffered "systemic failure".<ref>{{cite news |url=http://www.firstpost.com/world/un-failed-during-final-days-of-lankan-ethnic-war-ban-ki-moon-1133061.html |title=UN failed during final days of Lankan ethnic war: Ban Ki-moon |agency=Press Trust of India |date=25 September 2013 |work=FirstPost |access-date=5 November 2013 |archive-date=30 October 2013 |archive-url=https://web.archive.org/web/20131030080724/http://www.firstpost.com/world/un-failed-during-final-days-of-lankan-ethnic-war-ban-ki-moon-1133061.html |url-status=live}}</ref>

      === 21st century ===

      In 2011, the Security Council authorised a [[2011 military intervention in Libya|no-fly zone over Libya]] during the [[2011 Libyan Civil War|Libyan Civil War]], under [[United Nations Security Council Resolution 1973|Resolution 1973]], which was adopted with ten votes in favour and five abstentions (Brazil, China, Germany, India, and Russia).<ref>{{cite web |url=https://www.un.org/News/Press/docs/2011/sc10200.doc.htm |title=Security Council Approves 'No-Fly Zone' Over Libya, Authorizing 'All Necessary Measures' to Protect Civilians, by Vote of 10 in Favour with 5 Abstentions |date=17 March 2011 |publisher=United Nations |access-date=26 November 2013 |archive-date=19 March 2011 |archive-url=https://web.archive.org/web/20110319093321/http://www.un.org/News/Press/docs/2011/sc10200.doc.htm |url-status=live}}</ref> Russia and China subsequently argued that the NATO-led intervention exceeded the resolution's mandate, and this experience shaped their approach to later crises: both vetoed multiple draft resolutions on the [[Syrian civil war]] from 2011 onward, blocking efforts to impose sanctions or authorise force against the government of [[Bashar al-Assad]].<ref>{{cite web |title=Security Council reform a must, to end 'paralysis' |url=https://news.un.org/en/story/2023/11/1143677 |publisher=UN News |date=21 November 2023 |access-date=15 February 2026}}</ref>

      The [[Russian invasion of Ukraine]] in February 2022 precipitated a series of vetoes. Russia vetoed a draft resolution deploring the invasion on 25 February 2022, with eleven members voting in favour and China, India, and the United Arab Emirates abstaining.<ref>{{cite web |title=Security Council Fails to Adopt Draft Resolution on Ending Ukraine Crisis, as Russian Federation Wields Veto |url=https://press.un.org/en/2022/sc14808.doc.htm |publisher=United Nations |date=25 February 2022 |access-date=15 February 2026}}</ref> In September 2022, Russia again vetoed a resolution condemning its attempted annexation of four Ukrainian regions.<ref>{{cite web |title=Russia vetoes Security Council resolution condemning attempted annexation of Ukraine regions |url=https://news.un.org/en/story/2022/09/1129102 |publisher=UN News |date=30 September 2022 |access-date=15 February 2026}}</ref> These vetoes contributed to the adoption of [[United Nations General Assembly Resolution ES-11/1|General Assembly Resolution ES-11/1]], which deplored the invasion, and prompted the General Assembly to adopt Resolution 76/262 in April 2022, creating a standing mandate for a General Assembly debate whenever a veto is cast in the Security Council.<ref>{{cite web |title=General Assembly Holds First-Ever Debate on Historic Veto Resolution |url=https://press.un.org/en/2023/ga12500.doc.htm |publisher=United Nations |date=26 April 2023 |access-date=15 February 2026}}</ref>

      The [[Gaza war]], which began in October 2023, produced further deadlock. The United States vetoed draft resolutions calling for an immediate humanitarian ceasefire in Gaza in October 2023, December 2023, and February 2024, arguing that they would undercut ongoing diplomatic negotiations.<ref>{{cite web |title=Security Council Fails to Adopt Resolution Demanding Immediate Humanitarian Ceasefire in Gaza on Account of Veto by United States |url=https://press.un.org/en/2023/sc15519.doc.htm |publisher=United Nations |date=8 December 2023 |access-date=15 February 2026}}</ref><ref>{{cite web |title=Security Council Again Fails to Adopt Resolution Demanding Immediate Humanitarian Ceasefire in Gaza on Account of Veto by United States |url=https://press.un.org/en/2024/sc15595.doc.htm |publisher=United Nations |date=20 February 2024 |access-date=15 February 2026}}</ref> In 2024, seven draft resolutions were vetoed—the highest annual total since 1986—including four by Russia, three by the United States, and one by China.<ref>{{cite web |title=In Hindsight: The Security Council in 2024 and Looking Ahead to 2025 |url=https://www.securitycouncilreport.org/monthly-forecast/2025-01/in-hindsight-the-security-council-in-2024-and-looking-ahead-to-2025.php |publisher=Security Council Report |date=January 2025 |access-date=15 February 2026}}</ref>

      == Role ==
      {{UNSCR}}
      The UN's role in international [[collective security]] is defined by the [[Charter of the United Nations|UN Charter]], which authorizes the Security Council to investigate any situation threatening international peace; recommend procedures for peaceful resolution of a dispute; call upon other member nations to completely or partially interrupt economic relations as well as sea, air, postal and radio communications, or to sever diplomatic relations; and enforce its decisions militarily, or by any means necessary. The Council also recommends the new [[Secretary-General of the United Nations|Secretary-General]] to the General Assembly and recommends new states for admission as [[Member states of the United Nations|member states]].<ref>{{cite web |url=https://www.un.org/en/documents/charter/chapter2.shtml |title=Charter of the United Nations: Chapter II: Membership |publisher=United Nations |access-date=26 November 2013 |archive-date=8 December 2013 |archive-url=https://web.archive.org/web/20131208031716/https://www.un.org/en/documents/charter/chapter2.shtml |url-status=live}}</ref><ref name="chapter5">{{cite web |url=https://www.un.org/en/documents/charter/chapter5.shtml |title=Charter of the United Nations: Chapter V: The Security Council |publisher=United Nations |access-date=9 June 2012 |archive-date=1 October 2013 |archive-url=https://web.archive.org/web/20131001102526/http://www.un.org/en/documents/charter/chapter5.shtml |url-status=live}}</ref> The Security Council has traditionally interpreted its mandate as covering military security, though US Ambassador [[Richard Holbrooke]] persuaded the body to pass a resolution on [[HIV/AIDS in Africa]] in 2000, broadening the definition of threats to peace and security.{{sfn|Fasulo|2004|p=46}}

      === Chapter VI: Pacific settlement of disputes ===

      Under [[Chapter VI of the United Nations Charter|Chapter VI]] of the Charter, "Pacific Settlement of Disputes", the Security Council "may investigate any dispute, or any situation which might lead to international friction or give rise to a dispute". The Council may "recommend appropriate procedures or methods of adjustment" if it determines that the situation might endanger international peace and security.<ref>{{cite web |url=https://www.un.org/en/documents/charter/chapter6.shtml |title=Charter of the United Nations: Chapter VI: Pacific Settlement of Disputes |publisher=United Nations |access-date=26 November 2013 |archive-date=8 December 2013 |archive-url=https://web.archive.org/web/20131208032239/https://www.un.org/en/documents/charter/chapter6.shtml |url-status=live}}</ref> These recommendations are generally considered non-binding, as they lack an enforcement mechanism.<ref>See {{harvnb|Fomerand|2009|p=287}}; {{harvnb|Hillier|1998|p=568}}; {{harvnb|Köchler|2001|p=21}}; {{harvnb|Matthews|1993|p=130}}; {{harvnb|Neuhold|2001|p=66}}. For lack of enforcement mechanism, see {{harvnb|Magliveras|1999|p=113}}.</ref> A minority of scholars, including [[Stephen Zunes]], have argued that resolutions under Chapter VI are "still directives by the Security Council and differ only in that they do not have the same stringent enforcement options, such as the use of military force".{{sfn|Zunes|2004|p=291}}

      === Chapter VII: Threats to peace ===

      [[Chapter VII of the United Nations Charter|Chapter VII]] of the Charter gives the Security Council the power to identify threats to international peace and security, and to authorize responses, including the use of force. Security Council resolutions adopted under Chapter VII, such as [[economic sanctions]], are binding on all UN members. The Security Council is the only UN body with authority to issue binding resolutions.{{sfn|Fomerand|2009|p=287}}{{sfn|Fasulo|2004|p=39}}

      Under Chapter VII, the Security Council is specifically authorized to respond to "threats to the peace, breaches of the peace, or acts of aggression".<ref name="Chapter7" /> In such situations, the Security Councll has authority to take "such action by air, sea, or land forces as may be necessary to maintain or restore international peace and security.” Thus the Security Council is not limited to recommendations but may take action, including the use of armed force "to maintain or restore international peace and security".<ref name="Chapter7" /> This was the legal basis for UN armed action in [[Korean War|Korea]] in 1950 (led by the US under the auspices of the [[United Nations Command|UN Command]]), the use of coalition forces in [[Gulf War|Iraq]] and [[Gulf War|Kuwait]] in 1991, and the [[Intervention (international law)|intervention]] in [[Libyan civil war (2011)|Libya]] in 2011.{{sfn|Kennedy|2006|pp=56–57}}<ref>{{cite web |url=https://www.un.org/News/Press/docs/2011/sc10200.doc.htm |title=Security Council Approves 'No-Fly Zone' Over Libya |date=17 March 2011 |publisher=United Nations |access-date=26 November 2013 |archive-date=19 March 2011 |archive-url=https://web.archive.org/web/20110319093321/http://www.un.org/News/Press/docs/2011/sc10200.doc.htm |url-status=live}}</ref>

      === ICC referrals ===

      The [[Rome Statute of the International Criminal Court]] recognises that the Security Council has authority to refer cases to the [[International Criminal Court|Court]] in situations where the Court could not otherwise exercise jurisdiction.<ref>[http://legal.un.org/icc/statute/99_corr/cstatute.htm Article 13] {{Webarchive|url=https://web.archive.org/web/20131019222421/http://legal.un.org/icc/statute/99_corr/cstatute.htm |date=19 October 2013}} of the Rome Statute. United Nations. Retrieved 26 November 2013.</ref> The Council first exercised this power in March 2005, when it referred the situation in [[Darfur]] since 1 July 2002 to the Court; because Sudan is not a party to the Rome Statute, the Court could not otherwise have exercised jurisdiction.<ref>{{cite press release |publisher=United Nations Security Council |date=31 March 2006 |url=https://www.un.org/News/Press/docs/2005/sc8351.doc.htm |title=Security Council Refers Situation in Darfur, Sudan, To Prosecutor of International Criminal Court |access-date=14 March 2007 |archive-date=11 October 2020 |archive-url=https://web.archive.org/web/20201011221020/https://www.un.org/News/Press/docs/2005/sc8351.doc.htm/ |url-status=live}}</ref><ref>{{cite web |url=http://www.smh.com.au/news/World/Bush-relents-to-allow-UN-vote-on-Sudan-war-crimes/2005/04/01/1112302241979.html |title=Bush relents to allow UN vote on Sudan war crimes |author=Wadhams, Nick |date=2 April 2005 |work=The Sydney Morning Herald |access-date=27 November 2013 |archive-date=19 January 2014 |archive-url=https://web.archive.org/web/20140119052456/http://www.smh.com.au/news/World/Bush-relents-to-allow-UN-vote-on-Sudan-war-crimes/2005/04/01/1112302241979.html |url-status=live}}</ref> The second such referral came in February 2011, when the Council asked the ICC to investigate the Libyan government's response to the [[2011 Libyan Civil War|Libyan Civil War]].<ref>{{cite web |url=http://uk.reuters.com/article/us-libya-icc-idUSTRE71Q1DB20110227 |title=Q+A: How will the world's war crimes court act on Libya? |author=Gray-Block, Aaron and Greg Roumeliotis |date=27 February 2011 |work=Reuters |access-date=26 November 2013 |archive-date=26 December 2016 |archive-url=https://web.archive.org/web/20161226220819/http://uk.reuters.com/article/us-libya-icc-idUSTRE71Q1DB20110227 |url-status=dead}}</ref>

      === Responsibility to protect ===

      [[United Nations Security Council Resolution 1674|Security Council Resolution 1674]], adopted on 28 April 2006, reaffirmed the provisions of the 2005 [[World Summit Outcome Document]] regarding the [[responsibility to protect]] populations from genocide, war crimes, ethnic cleansing, and crimes against humanity.<ref>{{cite web |url=http://www.refworld.org/cgi-bin/texis/vtx/rwmain?docid=4459bed60 |title=Resolution 1674 (2006) |publisher=UN Security Council via Refworld |access-date=26 November 2013 |archive-date=2 December 2013 |archive-url=https://web.archive.org/web/20131202231721/http://www.refworld.org/cgi-bin/texis/vtx/rwmain?docid=4459bed60 |url-status=live}}</ref> The Security Council reaffirmed this commitment in [[United Nations Security Council Resolution 1706|Resolution 1706]] on 31 August 2006.{{sfn|Mikulaschek|2010|p=20}} These resolutions commit the Security Council to taking action to protect civilians in armed conflict, including against genocide, war crimes, ethnic cleansing, and crimes against humanity.{{sfn|Mikulaschek|2010|p=49}}

      == Members ==

      === Permanent members ===
      {{Main|Permanent members of the United Nations Security Council}}

      {{See also|China and the United Nations|France and the United Nations|Russia and the United Nations|Soviet Union and the United Nations|United Kingdom and the United Nations|United States and the United Nations}}

      The five permanent members of the Security Council have the power to [[United Nations Security Council veto power|veto]] any substantive resolution, enabling a permanent member to block adoption of a resolution but not to prevent or end debate.{{sfn|Fasulo|2004|pp=40–41}}

