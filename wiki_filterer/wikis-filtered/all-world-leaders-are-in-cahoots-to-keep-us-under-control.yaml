  - title: United Nations Security Council veto power
    pageid: 1900272
    extract: |-
      The United Nations Security Council veto power is the power of the five permanent members of the UN Security Council (China, France, Russia, the United Kingdom, and the United States) to veto any decision other than a "procedural" decision.
      A permanent member's abstention or absence does not count as a veto. A "procedural" decision (such as changing the meeting agenda or inviting a non-member to sit at a UNSC meeting) also cannot be vetoed.
      The veto power is controversial. Supporters state that the United Nations (UN) would break down if it attempted to enforce binding action against a permanent member and that the veto is a critical safeguard against United States domination. Russia and China regard the veto as a promoter of international stability and a check against military interventions. Critics say that the veto is the most undemocratic element of the UN, as well as the main cause of inaction on war crimes and crimes against humanity, as it effectively prevents UN action against the permanent members and their allies.
    source: |-
      {{Short description|Legal power of the five permanent UNSC member states to veto resolutions}}
      {{Use British English|date=October 2018}}
      {{Use dmy dates|date=October 2018}}
      [[File:United Nations Security Council.jpg|thumb|The United Nations Security Council Chamber]]
      {{UNSCR}}
      The '''United Nations Security Council veto power''' is the power of the five [[permanent members of the United Nations Security Council|permanent members]] of the [[United Nations Security Council|UN Security Council]] ([[China]], [[France]], [[Russia]], the [[United Kingdom]], and the [[United States]]) to [[veto]] any decision other than a "procedural" decision.

      A permanent member's [[abstention]] or absence does not count as a veto.<ref name=":0">{{Cite journal|last=Engelhardt |first=Hanns |date=1963|title=Das Vetorecht im Sicherheitsrat der Vereinten Nationen|journal=Archiv des Völkerrechts|volume=10|issue=4|pages=377–415 |jstor=40796759 |issn=0003-892X}}</ref> A "procedural" decision (such as changing the meeting agenda or inviting a non-member to sit at a UNSC meeting<ref>Kelsen, Hans. “Organization and Procedure of the Security Council of the United Nations.” Harvard Law Review, vol. 59, no. 7, 1946, pp. 1087–121. JSTOR, https://doi.org/10.2307/1335164. Accessed 20 Aug. 2024.</ref><ref>Padelford, Norman J. “The Use of the Veto.” International Organization, vol. 2, no. 2, 1948, pp. 227–46. JSTOR, http://www.jstor.org/stable/3030288. Accessed 20 Aug. 2024.</ref>) also cannot be vetoed.

      The veto power is controversial. Supporters state that the [[United Nations]] (UN) would break down if it attempted to enforce binding action against a permanent member<ref name="Schindlmayr2001"/> and that the veto is a critical safeguard against [[American imperialism|United States domination]].<ref>{{cite book|first=Vijay|last=Prashad|title=Washington Bullets|date=2020|location=New York|publisher=Monthly Review Press|pages=37–38|isbn=978-1-58367-906-7}}</ref> Russia and China regard the veto as a promoter of international stability<ref name="putin2013">{{cite news|last1=Putin|first1=Vladimir V.|title=What Putin Has to Say to Americans About Syria|url=https://www.nytimes.com/2013/09/12/opinion/putin-plea-for-caution-from-russia-on-syria.html|work=The New York Times|date=11 September 2013|quote=The United Nations' founders understood that decisions affecting war and peace should happen only by consensus, and with America's consent the veto by Security Council permanent members was enshrined in the United Nations Charter. The profound wisdom of this has underpinned the stability of international relations for decades.|access-date=28 January 2018|archive-date=9 December 2020|archive-url=https://web.archive.org/web/20201209091106/https://www.nytimes.com/2013/09/12/opinion/putin-plea-for-caution-from-russia-on-syria.html|url-status=live}}</ref> and a check against military interventions.<ref name="wangyi">{{cite web|title=Wang Yi: China Is Participant, Facilitator and Contributor of International Order|url=http://losangeles.china-consulate.org/eng/topnews/t1277592.htm|website=Consulate-General of the People's Republic of China in Los Angeles|date=27 June 2015|quote=China's veto at the Security Council has always played an important role in checking the instinct of war and resisting power politics.|access-date=11 December 2017|archive-date=9 August 2020|archive-url=https://web.archive.org/web/20200809221609/http://losangeles.china-consulate.org/eng/topnews/t1277592.htm|url-status=live}}</ref> Critics say that the veto is the most undemocratic element of the UN,<ref name="wilcox1945"/> as well as the main cause of inaction on [[war crime]]s and [[crimes against humanity]], as it effectively prevents UN action against the permanent members and their allies.<ref>{{cite news|last1=Oliphant|first1=Roland|title='End Security Council veto' to halt Syria violence, UN human rights chief says amid deadlock|url=https://www.telegraph.co.uk/news/2016/10/04/end-security-council-veto-to-halt-aleppo-violence-un-human-right/ |archive-url=https://ghostarchive.org/archive/20220112/https://www.telegraph.co.uk/news/2016/10/04/end-security-council-veto-to-halt-aleppo-violence-un-human-right/ |archive-date=12 January 2022 |url-access=subscription |url-status=live|work=The Telegraph|date=4 October 2016}}{{cbignore}}</ref>

      == UN Charter ==
      Although the word "veto" is not used in the [[United Nations Charter]], the power of veto originates in Article 27 of the Charter, which states:

      # Each member of the Security Council shall have one vote.
      # Decisions of the Security Council on procedural matters shall be made by an affirmative vote of nine members.{{efn|Prior to 1966, the Security Council had 11 members instead of 15, and Articles 27(2) and (3) specified seven members instead of nine.}}
      # Decisions of the Security Council on all other matters shall be made by an affirmative vote of nine members including the concurring votes of the permanent members; provided that, in decisions under Chapter VI, and under paragraph 3 of Article 52, a party to a dispute shall abstain from voting.

      [[Chapter VI of the United Nations Charter|Chapter VI]] and Article 52 only involve non-binding recommendations, thus giving the permanent members an absolute veto over all binding [[International sanctions|UN sanctions]], [[United Nations peacekeeping|UN peacekeeping]] operations, membership admissions, member expulsions, and [[United Nations Secretary-General selection|Secretary-General selections]].

      Any one of the permanent members may veto a resolution by casting a negative vote. However, a permanent member [[abstention|abstaining]] or a permanent member being absent does not count as a veto.<ref name=":0" />

      In a separate article, the Charter also requires that [[Amendments to the United Nations Charter|amendments]] be ratified by all of the permanent members. In addition, ratifications cannot be abstained on. This gives the permanent members an even stronger absolute veto over any change to the absolute veto power.

      Due to all of the permanent members being considered [[great power]]s, the power of veto has also been called the "great power veto" or "great power unanimity".<ref>{{cite web|title=Membership of the Security Council|url=http://www.un.org/sc/members.asp|publisher=United Nations|access-date=25 October 2017|archive-url=https://web.archive.org/web/20120502061925/http://www.un.org/sc/members.asp|archive-date=2 May 2012|date=2 May 2012}}</ref>

      == Origins ==

      The idea of a veto over the actions of international organisations was not new in 1945. In the [[League of Nations]], the predecessor to the United Nations, every member of the League Council had a veto on any non-procedural issue.<ref>League of Nations Covenant, Article 5(1).</ref> At the foundation of the League, there were 4 permanent and 4 non-permanent members. The League Council had expanded by 1936 to have 4 permanent and 11 non-permanent members, which meant that there were 15 countries with veto power. The existence of such a large number of vetoes made it very difficult for the League to agree on many issues.

      The veto was the result of extensive discussion during the negotiations for the formation of the United Nations at [[Dumbarton Oaks]] (August–October 1944) and [[Yalta Conference|Yalta]] (February 1945).<ref>{{cite book|first=Edward C.|last=Luck|editor1-first=Vaughan|editor1-last=Lowe|editor2-first=Adam|editor2-last=Roberts|editor3-first=Jennifer|editor3-last=Welsh|editor4-first=Dominik|editor4-last=Zaum|display-editors=3|title=The United Nations Security Council and War: The Evolution of Thought and Practice since 1945|publisher=Oxford University Press|year=2008|chapter=Creation of the Council|url=http://ukcatalogue.oup.com/product/9780199583300.do|pages=61–85|isbn=978-0-19-958330-0|access-date=15 January 2014|archive-date=5 November 2015|archive-url=https://web.archive.org/web/20151105174343/http://ukcatalogue.oup.com/product/9780199583300.do|url-status=live}}</ref> At Dumbarton Oaks, the Soviet delegation argued that each nation should have an absolute veto that could block matters from even being discussed, while the British delegation argued that nations should not be able to veto resolutions on disputes to which they were a party. At Yalta, the American, British and Russian delegations agreed that each of the permanent members could veto any action by the council, but not procedural resolutions, meaning that the permanent members could not prevent debate on a resolution.{{sfn|Meisler|1995|pp=10–13}} This veto provision became known as the Yalta formula.<ref name="Schindlmayr2001"/> The evidence is that the United States, [[Soviet Union]], United Kingdom, and China all favored the principle of unanimity, not only out of desire for the major powers to act together, but also to protect their own sovereign rights and national interests.<ref>See e.g. [[Winston Churchill|Winston S. Churchill]], ''The Second World War'', vol. 6: ''Triumph and Tragedy'', Cassell, London, 1954, pp. 181–82 and 308–313; [[Harry S. Truman]], ''Year of Decisions: 1945'' (London, 1955), pp. 194–95, 201, and 206-07; [[Charles de Gaulle]], ''War Memoirs: Salvation 1944–1946 – Documents'', tr. Murchie and Erskine (London, 1960), pp. 94–95.</ref> [[Harry S. Truman]], who became [[President of the United States]] in April 1945, wrote: "All our experts, civil and military, favored it, and without such a veto no arrangement would have passed the Senate."<ref>Truman, ''Year of Decisions: 1945'', p. 207. See also US Department of State: [https://2001-2009.state.gov/r/pa/ho/pubs/fs/55407.htm "The United States and the Founding of the United Nations"] {{Webarchive|url=https://web.archive.org/web/20051023164441/https://2001-2009.state.gov/r/pa/ho/pubs/fs/55407.htm |date=23 October 2005 }}. October 2005. Retrieved 1 March 2012.</ref>

      As the precise limits of the veto power were seen as ambiguous, the voting formula subcommittee presented a formal questionnaire to the sponsoring members (US, UK, USSR, and China) containing 22 questions on how they interpreted the veto power. On 8 June 1945, the Big Four responded with a 10-point statement (''Statement by the Delegations of the Four Sponsoring Governments on Voting Procedure in the Security Council''),<ref>{{cite web|url=https://www.hamamoto.law.kyoto-u.ac.jp/kogi/2005kiko/Statement%20of%20four%20sponsoring%20states.pdf|title=Statement by the delegations of the four sponsoring Governments on voting procedure in the Security Council|access-date=7 February 2026}}</ref><ref>{{cite web|title=Statement at San Francisco by the delegations of the four Sponsoring Governments (China, the UK, the USA and the USSR) on “The Yalta Formula” on Voting in the Security Council|url=https://www.securitycouncilreport.org/atf/cf/%7B65BFCF9B-6D27-4E9C-8CD3-CF6E4FF96FF9%7D/Yalta%20Statement.doc|access-date=7 February 2026|website=Security Council Report}}</ref> also called the San Francisco Declaration, which France later joined as well. The statement says that a veto cannot be used to stop the Council from considering a topic at all, but interpreted its applicability broadly, including that the veto power could be exercised in the question of whether an issue is procedural or non-procedural. This has been called a ''double veto'' as it involves initiating a vote on whether an issue is procedural, using a veto to force it to be termed non-procedural, and then using a second veto on the issue itself. As the other countries disagreed with this interpretation, it was not adopted into the Charter, and it is unclear whether the San Francisco Declaration is formally binding. The permissibility of a double veto has never been resolved, but the permanent members later reached an informal agreement to avoid using it, and it has not been used since 1959.<ref name="Schindlmayr2001"/><ref name="Wouters2005"/>

      A central goal of the United Nations at its founding was to make sure the five Great Powers would continue working with the UN, in order to avoid the lack of universality that had diminished the political strength of the League of Nations.<ref name="Schindlmayr2001"/> At [[San Francisco]], the Big Five made it clear that there would be no United Nations if they were not given the veto. [[Francis O. Wilcox]], an adviser to the US delegation, described the dramatic negotiations: "At San Francisco, the issue was made crystal clear by the leaders of the Big Five: it was either the Charter with the veto or no Charter at all. Senator Connally [from the US delegation] dramatically tore up a copy of the Charter during one of his speeches and reminded the small states that they would be guilty of that same if they opposed the unanimity principle. 'You may, if you wish,' he said, 'go home from this Conference and say that you have defeated the veto. But what will be your answer when you are asked: "Where is the Charter"?{{'"}}<ref name="wilcox1945">{{cite journal |jstor=<!--https://www.jstor.org/stable/-->1950035 |title=II. The Yalta Voting Formula |first=Francis O. |last=Wilcox |journal=The American Political Science Review |volume=39 |issue=5 |date=October 1945 |pages=943–956 <!--|access-date=5 May 2015-->|doi=10.2307/1950035 |s2cid=143510142 }}</ref><!--

      ===Comparison with the Covenant of the League of Nations===

      The [[Covenant of the League of Nations]] theoretically specified a weaker veto than the UN Charter, but this has also been credited with the weakening and eventual demise of the League itself. (While both permanent and non-permanent League Council members had a veto, non-permanent vetoes could be overridden with a [[recall election]].<ref>Sohn, Louis B. “THE DEVELOPMENT OF INTERNATIONAL LAW.” American Bar Association Journal, vol. 33, no. 11, 1947, pp. 1148–52. JSTOR, http://www.jstor.org/stable/25716207. Accessed 10 Dec. 2025.</ref>)

      Unlike United Nations sanctions, League sanctions
      -->
      ==Bypassing the veto==

      The veto only applies to votes that come before the [[United Nations Security Council]], so the [[United Nations General Assembly]] is unaffected.

      From Article 27(3), both elected and permanent members must abstain from certain votes about issues where they are among the interested parties. The specific language was a compromise between the idea that one should not be able to pass judgement on their own actions, and the principle that the Security Council should not act against its permanent members. However, there are no clear guidelines about how to establish when the requirements are met, and its application has been inconsistent.<ref name="Wouters2005"/><ref name="Schindlmayr2001"/>

      In 1950, the General Assembly adopted the "[[United Nations General Assembly Resolution 377|Uniting for Peace]]" resolution, which was backed by the United States as a safeguard against potential vetoes by the USSR. It has been argued that with the adoption of this resolution, and given the interpretations of the Assembly's powers that became [[customary international law]] as a result, that the Security Council "power of veto" problem could be surmounted.<ref name="Slate2003">{{Cite web| title = Can you bypass a U.N. Security Council veto?| last = Koerner| first = Brendan| work = Slate Magazine| date = 12 March 2003| access-date = 22 May 2022| url = https://slate.com/news-and-politics/2003/03/can-you-bypass-a-u-n-security-council-veto.html| archive-date = 22 May 2022| archive-url = https://web.archive.org/web/20220522102227/https://slate.com/news-and-politics/2003/03/can-you-bypass-a-u-n-security-council-veto.html| url-status = live}}</ref><ref>Hunt, C. [http://zcomm.org/znetarticle/the-veto-charade-by-cameron-hunt/ "The 'veto' charade"] {{Webarchive|url=https://web.archive.org/web/20220307165055/http://zcomm.org/znetarticle/the-veto-charade-by-cameron-hunt/ |date=7 March 2022 }}, ZNet, 7 November 2006. Retrieved 1 March 2008</ref> By adopting A/RES/377 A, on 3 November 1950, over two-thirds of UN Member States declared that, according to the UN Charter, the permanent members cannot and should not prevent the General Assembly from taking any and all action necessary to restore international peace and security in cases where the Security Council has failed to exercise its "primary responsibility" for maintaining peace. Such an interpretation sees the General Assembly as being awarded "final responsibility"—rather than "secondary responsibility"—for matters of international peace and security, by the UN Charter. Various official and semi-official UN reports make explicit reference to the Uniting for Peace resolution as providing a mechanism for the General Assembly to overrule any Security Council vetoes,<ref name="UN_A52856">{{UN document |docid=A-52-856 |type=Document |body=General Assembly |session=52 |document_number=856| access-date=1 March 2008}}</ref><ref>International Commission on Intervention and State Sovereignty. [http://www.iciss.ca/menu-en.asp "The Responsibility to Protect"] {{webarchive |url=https://web.archive.org/web/20050910032823/http://www.iciss.ca/menu-en.asp |date=10 September 2005 }}, ICISS.ca, December 2001. Retrieved 1 March 2008.</ref><ref>[https://www.un.org/ga/58/documentation/list0.html A/58/47 "Report of the Open-ended Working Group on the Question of Representation on and Increase in the Membership of the Security Council"] {{Webarchive|url=https://web.archive.org/web/20180904044547/https://www.un.org/ga/58/documentation/list0.html |date=4 September 2018 }}, United Nations, 21 July 2004. Retrieved 1 March 2008.</ref><ref>Non-Aligned Movement. [http://www.un.int/malaysia/NAM/MMCOB_FinalDocument.pdf Ministerial Meeting of the Coordinating Bureau of the Non-Aligned Movement"] {{Webarchive|url=https://web.archive.org/web/20080411150210/http://www.un.int/malaysia/NAM/MMCOB_FinalDocument.pdf |date=11 April 2008 }}, United Nations, 27–30 May 2006. Retrieved 1 March 2008.</ref> thus rendering them little more than delays in UN action, should two-thirds of the Assembly subsequently agree that action is necessary. In 1956, the resolution was used to help resolve the [[Suez Crisis]].<ref name="Slate2003"/> When invoked, it creates an [[Emergency special session of the United Nations General Assembly|emergency special session]] of the General Assembly. {{As of|2022}}, the procedure has been invoked 11 times.

      There are a number of possible [[Reform of the United Nations Security Council|reforms to the Security Council]] that could affect the veto. Proposals include: limiting the use of the veto to vital national security issues; requiring agreement from multiple states before exercising the veto; abolishing the veto entirely; and embarking on the transition stipulated in Article 106 of the Charter, which requires the consensus principle to stay in place.<ref>{{Cite journal|url = http://nonkilling.org/center/download/global-nonkilling-working-papers-11-1950-how-the-opportunity-for-transitioning-to-u-n-collective-security-was-missed-for-the-first-time|title = 1950–How the opportunity for transitioning to U.N. Collective was missed for the first time|last = Schlichtmann|first = Klaus|journal = Global Nonkilling Working Papers #11 (14 April 2016)|access-date = 22 May 2022|archive-date = 6 August 2016|archive-url = https://web.archive.org/web/20160806132040/http://nonkilling.org/center/download/global-nonkilling-working-papers-11-1950-how-the-opportunity-for-transitioning-to-u-n-collective-security-was-missed-for-the-first-time|url-status = live}}</ref> US delegate [[Harold Stassen]] and the ''[[American Journal of International Law]]'' have stated that the veto could conceivably be bypassed by superseding the Charter with a new one.<ref>{{cite web|url=https://history.state.gov/historicaldocuments/frus1945v01/d251|title=Minutes of the Fifty-Second Meeting of the United States Delegation, Held at San Francisco, Thursday, May 24, 1945, 9:05 a.m.|website=Foreign Relations of the United States, Diplomatic Papers, 1945, General: The United Nations, Volume I|date=24 May 1945|access-date=14 February 2026|quote=Commander Stassen ... thought that the best procedure would be to make changes at such times in the future as they might become necessary. If a state having veto power refused to accept an amendment demoting its status, the Organization could go ahead without its consent and in effect form a new Organization.}}</ref><ref>Potter, Pitman B. “The United Nations Charter and the Covenant of the League of Nations.” The American Journal of International Law, vol. 39, no. 3, 1945, pp. 546–51. JSTOR, https://doi.org/10.2307/2193533. Accessed 14 Dec. 2025.</ref>

      The [[Republic of China (Taiwan)]] was expelled from the United Nations despite having a veto and despite expulsions being veto-able, as the General Assembly decided that the issue was about who had the credentials to represent an existing member, rather than the actual addition or removal of a member.

      == Use ==

      === History ===
      {{Vetoed UN Resolutions}}
      The use of the veto has gone through several distinct phases, reflecting the shifting political balance on the Security Council. From 1946 to 1969, a majority of the Security Council was aligned with the United States, which cast no vetoes because it won every vote. To block resolutions from the Western majority, the Soviet Union cast {{percentage|80|86|0}} of all the vetoes. France and the United Kingdom occasionally used the veto to protect their colonial interests (while veto power used by France alone is only once on February 6, 1976), and the Republic of China only used the veto once.

      The Western majority eroded through the 1960s as [[decolonization]] expanded the membership of the United Nations. The newly independent countries of the [[Third World]] frequently voted against the Western powers, which led the United States to resort to the veto.<ref name="urquhart2014">{{cite book |last1=Urquhart |first1=Brian |title=Decolonization and World Peace |date=2014 |publisher=University of Texas Press |isbn=9781477303306}}</ref> After the first United States veto in 1970, the Soviet ambassador declared, "Using your automatic majority you imposed your will on others and forced it down their throats. But times have now changed."<ref name="bosco2009" />{{rp|118}} From 1970 to 1991, the United States cast {{percentage|65|116|0}} of the vetoes, sometimes joined by French and British vetoes. The Soviet Union cast fewer vetoes than any of the Western powers, and the People's Republic of China used the veto only once.

      After the [[collapse of the Soviet Union]] and the end of the [[Cold War]], there was a brief period of harmony on the Security Council. The period from 31 May 1990 to 11 May 1993 was the longest period in the history of the UN without the use of the veto. The number of resolutions passed each year also increased.<ref>{{cite book|editor1-first=Vaughan|editor1-last=Lowe|editor2-first=Adam|editor2-last=Roberts|editor3-first=Jennifer|editor3-last=Welsh|editor4-first=Dominik|editor4-last=Zaum|display-editors=3|title=The United Nations Security Council and War: The Evolution of Thought and Practice since 1945|publisher=Oxford University Press|year=2008|url=http://ukcatalogue.oup.com/product/9780199583300.do|pages=78–82, 135–7, 155–65, 688–705|isbn=978-0-19-958330-0|access-date=15 January 2014|archive-date=5 November 2015|archive-url=https://web.archive.org/web/20151105174343/http://ukcatalogue.oup.com/product/9780199583300.do|url-status=live}}</ref> The use of the vetoes decreased after the end of the Cold War, with the rate of vetoes decreasing to less than one-third of the previous level, despite a substantial increase in the number of resolutions considered.<ref name="Wouters2005"/> Usage of the veto picked up in the early 21st century, most notably due to the [[Syrian Civil War]]. Since 1992, Russia has been the most frequent user of the veto, followed by the United States and China. France and the United Kingdom have not used the veto since 1989.

      As of 18 September 2025, Russia/Soviet Union has used its veto 129 times, the United States 89 times (51 times to protect [[Israel]]), the United Kingdom 29 times, China 19 times and France 16 times.<ref name=SCR2024>{{Cite web|url=https://www.securitycouncilreport.org/un-security-council-working-methods/the-veto.php|title=The Veto: UN Security Council Working Methods: Security Council Report|website=Security Council Report|access-date=13 February 2024}}</ref> On 26 April 2022, the [[United Nations General Assembly|General Assembly]] adopted a resolution mandating a debate when a veto is cast in the Security Council.<ref>{{Cite web |title=General Assembly Adopts Landmark Resolution Aimed at Holding Five Permanent Security Council Members Accountable for Use of Veto |url=https://www.un.org/press/en/2022/ga12417.doc.htm |access-date=28 April 2022 |website=un.org |archive-date=29 April 2022 |archive-url=https://web.archive.org/web/20220429015400/https://www.un.org/press/en/2022/ga12417.doc.htm |url-status=live }}</ref>

      === Subjects ===

      {{See also|List of vetoed United Nations Security Council resolutions}}

      About one-quarter of all vetoes cast have been regarding the admission of a new member to the United Nations. Initially this led to a deadlock, from 1946 to 1955, as both the Western allies and the Soviet Union prevented each other's preferred candidates from joining, which was resolved with a [[United Nations Security Council Resolution 109|1955 agreement which allowed the admission of 16 new members at once]]. In total, the Soviet Union used its veto 51 times to block applications. The United States vetoed the application of Vietnam five times (twice as [[North Vietnam]], twice as the [[Provisional Revolutionary Government of the Republic of South Vietnam|Provisional Revolutionary Government of South Vietnam]], and once as the unified [[Vietnam]]). The ROC and PRC have vetoed an application once each ([[Mongolia]] in 1955 and [[Bangladesh]] in 1972).<ref name="Wouters2005"/> The U.S.'s last veto with respect to Vietnam occurred in November 1976;<ref>Kathleen Teltsch, [https://www.nytimes.com/1976/11/16/archives/us-vetoes-hanoi-bid-for-un-membership-scranton-demands-information.html US Vetoes Hanoi Bid for U.N. Membership], ''New York Times'' (November 16, 1976).</ref> after the U.S. dropped its objection, [[United Nations Security Council Resolution 413|Vietnam became a member state in 1977]].<ref>[https://www.nytimes.com/1977/09/21/archives/vietnam-is-admitted-to-the-un-as-32d-general-assembly-opens.html Vietnam Is Admitted to the U.N. As 32d General Assembly Opens], ''New York Times'' (November 16, 1976).</ref> No other veto to a membership application was cast until 2024, when the United States vetoed the application of the [[State of Palestine]] (which currently holds the status of [[United Nations General Assembly observers|non-member observer state]] in the General Assembly).<ref name=UN2024>[https://press.un.org/en/2024/sc15670.doc.htm Security Council Fails to Recommend Full United Nations Membership for State of Palestine, Owing to Veto Cast by United States], United Nations (April 18, 2024).</ref> The U.S. position is that Palestinian admission to the UN should take place once there is a [[Israeli–Palestinian peace process|comprehensive peace agreement]] via a [[two-state solution]].<ref name=UN2024/>

      Additionally, China has used two vetoes ([[Guatemala]] in 1997 and [[North Macedonia]] in 1999) in order to block or end UN missions in countries that engaged in diplomatic relations with [[Taiwan]], due to the [[Political status of Taiwan|territorial dispute about the status of that island]].<ref name="Wouters2005"/>

      === Secretary-General selection ===
      {{Main|United Nations Secretary-General selection}}

      The Secretary-General of the United Nations is appointed by the General Assembly on the recommendation of the Security Council. Therefore, the veto power can be used to block the selection of a Secretary-General.<ref>{{cite book |first= Simon |last= Chesterman |contribution= Introduction |editor-first= Simon |editor-last= Chesterman |title= Secretary or General? The UN Secretary-General in World Politics |location= Cambridge |publisher= Cambridge University Press |year= 2007 |page= 7}}</ref> The votes for Secretary-General are by [[secret ballot]], so any vetoes do not go on the record as a formal veto of a Security Council Resolution. However, the vetoing permanent member(s) usually states their intent to veto before or after the ballot. The formal recommendation of a Secretary-General is approved unanimously by [[acclamation]].

      Since 1981, the Security Council has selected the Secretary-General through a series of [[straw poll]]s. A vote by a permanent member to "discourage" a candidate is considered equivalent to a veto.

      The Soviet Union, United States, and China (PRC) have all cast deciding vetoes on candidates for Secretary-General. Russia has not publicly revealed any vetoes. The United Kingdom and France have cast non-deciding vetoes (either a veto cast together with the United States or a veto that is later withdrawn), while the Republic of China (Taiwan) did not cast any vetoes (its negative votes were on candidates without the needed supermajority).

      The United States circumvented a Soviet veto in 1950 by asking the General Assembly to extend [[Trygve Lie]]'s term without a recommendation from the Security Council.<ref name="una-usa-fact">{{cite web |url=http://www.unausa.org/atf/cf/%7B49C555AC-20C8-4B43-8483-A2D4C1808E4E%7D/SG%20Reform%20Fact%20Sheet-fina-logol.pdf |title=Selecting a United Nations Secretary-General: A Context for Reform? |date=February 2006 |publisher=UNA-USA |access-date=30 September 2007 |url-status=dead |archive-url=https://web.archive.org/web/20071026004813/http://www.unausa.org/atf/cf/%7B49C555AC-20C8-4B43-8483-A2D4C1808E4E%7D/SG%20Reform%20Fact%20Sheet-fina-logol.pdf |archive-date= 2007-10-26}}</ref><ref name="una-usa-overview">{{cite web |url=http://www.unausa.org/site/pp.asp?c=fvKRI8MPJpF&b=1406527 |title=An Historical Overview on the Selection of United Nations Secretaries-General |date=February 2006 |publisher=UNA-USA |access-date=7 February 2026 |url-status=dead |archive-url=https://web.archive.org/web/20071113031307/http://www.unausa.org/site/pp.asp?c=fvKRI8MPJpF&b=1406527 |archive-date=13 November 2007}}</ref> However, every Secretary-General since 1953 has been recommended by a unanimous vote of the permanent members of the Security Council.

      == Analysis by country ==

      === China (ROC/PRC) ===
      {{See also|China and the United Nations}}

      Between 1946 and 1971, the Chinese seat on the Security Council was held by the [[Republic of China (1912–1949)|Republic of China]], whose [[Nationalist government]] lost the [[Chinese Civil War]] in 1949 and [[Retreat of the government of the Republic of China to Taiwan|fled]] to [[Taiwan]]. The Republic of China's first and only veto was used on 13 December 1955 to block [[Mongolian People's Republic|Mongolia]]'s admission to the United Nations because the ROC government considered the entirety of Outer Mongolia (including the present Russian republic of Tuva) to be part of China. This postponed the admission of Mongolia [[United Nations Security Council Resolution 166|until 1961]], when the Soviet Union announced that it would block all further admissions of new members unless Mongolia were admitted. After the Soviet Union vetoed [[Mauritania]]'s membership in this way, representatives from twelve African nations{{which|date=December 2025}} stated to the Republic of China that they would vote for the PRC to replace the ROC unless the ROC dropped its veto. Faced with this pressure, the Republic of China relented under protest.<ref>Clark, Keith Allan. “‘Imagined Territory: The Republic of China’s 1955 Veto of Mongolian Membership in the United Nations.’” The Journal of American-East Asian Relations, vol. 25, no. 3, 2018, pp. 263–95. JSTOR, https://www.jstor.org/stable/26549248. Accessed 12 Dec. 2025.</ref>

      In 1971, the Republic of China was expelled from the United Nations, and the Chinese seat was transferred to the [[China|People's Republic of China]]. The PRC's first use of its veto took place on 25 August 1972 to block [[Bangladesh]]'s admission to the United Nations, which postponed Bangladesh's admission to the UN [[United Nations Security Council Resolution 351|until 1974]]. From 1971 to 2011, China used its veto sparingly, preferring to abstain rather than veto resolutions not directly related to Chinese interests.<ref>{{cite news |last1=Pei |first1=Minxin |title=Why Beijing Votes With Moscow |url=https://www.nytimes.com/2012/02/08/opinion/why-beijing-votes-with-moscow.html |work=The New York Times |date=7 February 2012 |access-date=13 May 2019 |archive-date=4 November 2021 |archive-url=https://web.archive.org/web/20211104185312/https://www.nytimes.com/2012/02/08/opinion/why-beijing-votes-with-moscow.html |url-status=live }}</ref> China turned abstention into an "art form", abstaining on 30% of Security Council Resolutions between 1971 and 1976.<ref name="bosco2009">{{cite book |last1=Bosco |first1=David L. |title=Five to Rule Them All: The UN Security Council and the Making of the Modern World |date=2009 |publisher=Oxford University Press |isbn=9780195328769 |url-access=registration |url=https://archive.org/details/fivetorulethemal00bosc }}</ref>{{rp|140}} Since the outbreak of the [[Syrian Civil War]] in 2011, China has joined Russia in many double vetoes. China has not cast a lone veto since [[UNPREDEP|1999]].<ref>''UNPREDEP operations were terminated on 28 February 1999, after the Security Council did not renew the mandate of UNPREDEP due to a veto by China, a permanent Member of the Security Council.'' [https://search.archives.un.org/united-nations-preventive-deployment-force-unpredep-1995-1999 Record of the United Nations Preventive Deployment Force (UNPREDEP) (1995–1999) at the United Nations Archives] {{Webarchive|url=https://web.archive.org/web/20220419210855/https://search.archives.un.org/united-nations-preventive-deployment-force-unpredep-1995-1999 |date=19 April 2022 }}</ref>

      === France ===
      {{See also|France and the United Nations}}
      France uses its veto power sparingly. The only time it unilaterally vetoed a draft was in 1976 to block a resolution on the question of the independence of the [[Comoros]], which was done to keep the island of [[Mayotte]] as a French overseas community.<ref name=gp>{{cite web |title=Subjects of UN Security Council Vetoes |url=http://www.globalpolicy.org/component/content/article/102/40069.html |publisher=[[Global Policy Forum]] |access-date=18 April 2013 |archive-url= https://web.archive.org/web/20130509021050/http://www.globalpolicy.org/component/content/article/102/40069.html |archive-date=9 May 2013}}</ref> It also vetoed, along with UK, a resolution calling on the immediate cessation of military action by the Israeli army against Egypt in 1956 during the [[Suez Crisis]].<ref name=gp/> France has not used the veto since 1989, when it joined the United States and United Kingdom to veto a resolution condemning the [[United States invasion of Panama]].<ref name=gp/> In 2003, the threat of a French veto of [[United Nations Security Council Resolution 1441|resolution]] on the impending [[2003 invasion of Iraq|invasion of Iraq]] caused friction between France and the United States.<ref name="iht2003"/>

      === Soviet Union/Russia ===
      {{See also|Soviet Union and the United Nations|Russia and the United Nations}}

      In the early days of the United Nations, the Soviet Union was responsible for almost all of the vetoes. Because of their frequent vetoes, Soviet ambassador [[Andrei Gromyko]] earned the nickname ''Mr. Nyet'' and [[Vyacheslav Molotov]] was known as ''Mr. Veto''.<ref>{{cite news |last1=Eaton |first1=William J. |title=No Foreign Policy Changes Foreseen: Gromyko Likely to Play Moscow's Elder Statesman on Selected Issues |url=https://www.latimes.com/archives/la-xpm-1985-07-03-mn-10235-story.html |work=Los Angeles Times |date=3 July 1985 |access-date=13 May 2019 |archive-date=3 March 2022 |archive-url=https://web.archive.org/web/20220303215705/https://www.latimes.com/archives/la-xpm-1985-07-03-mn-10235-story.html |url-status=live }}</ref><ref name="iht2003">{{cite news |last1=James |first1=Barry |title=Unlike U.S., France wields its veto power sparingly |url=https://www.nytimes.com/2003/03/03/news/unlike-us-france-wields-its-veto-power-sparingly.html |work=International Herald Tribune |date=3 March 2003 |access-date=13 May 2019 |archive-date=3 March 2022 |archive-url=https://web.archive.org/web/20220303215705/https://www.nytimes.com/2003/03/03/news/unlike-us-france-wields-its-veto-power-sparingly.html |url-status=live }}</ref> Molotov regularly vetoed the admission of new members to counter the US refusal to admit members of the [[Eastern Bloc]]. The impasse was finally resolved on 14 December 1955 when 16 countries from the Western and Eastern Blocs were simultaneously admitted to the UN.<ref>{{cite news |last1=Hamilton |first1=Thomas J. |title=4 Satellites Win; 16 New Members Admitted to U.N. |url=https://www.nytimes.com/1955/12/15/archives/4-satellites-win-moscow-bloc-now-9-as-west-gains-12-by-russian.html |work=The New York Times |date=15 December 1955 |access-date=13 May 2019 |archive-date=3 March 2022 |archive-url=https://web.archive.org/web/20220303215705/https://www.nytimes.com/1955/12/15/archives/4-satellites-win-moscow-bloc-now-9-as-west-gains-12-by-russian.html |url-status=live }}</ref>

      The Soviet government [[Soviet boycott of the United Nations|adopted an "empty chair" policy]] at the Security Council in January 1950 to protest the fact that the Republic of China still held the Chinese seat at the United Nations.<ref>Malanczuk, P. ''Akehurst's Modern Introduction to International Law'', Ed. 7, page 375, Routledge, 1997</ref> The Soviet Union was not present in the Security Council to veto [[United Nations Security Council Resolution 83|UN Security Council Resolutions 83]] (27 June 1950) and [[United Nations Security Council Resolution 84|84]] (7 July 1950), authorizing assistance to South Korea in the [[Korean War]].<ref>{{cite book|last=Stueck|first=Wiliam|editor1-first=Vaughan|editor1-last=Lowe|editor2-first=Adam|editor2-last=Roberts|editor3-first=Jennifer|editor3-last=Welsh|editor4-first=Dominik|editor4-last=Zaum|display-editors=3|title=The United Nations Security Council and War: The Evolution of Thought and Practice since 1945|publisher=Oxford University Press|year=2008|chapter=The United Nations, the Security Council, and the Korean War|url=http://ukcatalogue.oup.com/product/9780199583300.do|pages=266–7, 277–8|isbn=978-0-19-958330-0|access-date=15 January 2014|archive-date=5 November 2015|archive-url=https://web.archive.org/web/20151105174343/http://ukcatalogue.oup.com/product/9780199583300.do|url-status=live}}</ref> The Soviet Union returned to the Security Council in August 1950 and resumed its usage of the veto.

      Following the dissolution of the Soviet Union, Russia initially used its veto power sparingly. However, Russian vetoes became more common in the early 21st century to block resolutions regarding [[Russo-Georgian War|Russia's wars against Georgia]] and [[Russo-Ukrainian War|against Ukraine]], as well as its [[Russian intervention in the Syrian civil war|military interventions in Syria]], [[North Korea]] and [[Mali War|Mali]].<ref name="UNLibraryVetos" />

      === United Kingdom ===
      {{See also| United Kingdom and the United Nations}}
      The United Kingdom has used its Security Council veto power on 32 occasions.<ref>{{cite web|title=Changing Patterns in the Use of the Veto in The Security Council|url=https://www.globalpolicy.org/images/pdfs/Changing_Patterns_in_the_Use_of_the_Veto_as_of_August_2012.pdf|publisher=Global Policy Forum|access-date=29 October 2015|archive-date=16 June 2018|archive-url=https://web.archive.org/web/20180616120114/https://www.globalpolicy.org/images/pdfs/Changing_Patterns_in_the_Use_of_the_Veto_as_of_August_2012.pdf|url-status=live}}</ref> The first occurrence was in October 1956 when the United Kingdom and France vetoed a letter from the US to the President of the Security Council concerning Palestine. The last veto was in December 1989 when the United Kingdom, France and the United States vetoed a draft resolution condemning the [[United States invasion of Panama]].<ref name="UNLibraryVetos">{{cite web|title=Security Council – Veto List|url=http://research.un.org/en/docs/sc/quick/veto|publisher=[[Dag Hammarskjöld Library]]|access-date=May 9, 2024}}</ref>

      The United Kingdom used its veto power, along with France, to veto a draft resolution aimed at resolving the [[Suez Crisis|Suez Canal crisis]] (in which France and UK were militarily involved) in 1956. The UK and France eventually withdrew from Egypt after the US instigated an 'emergency special session' of the General Assembly, under the terms of the [[United Nations General Assembly Resolution 377|"Uniting for Peace" resolution]], which led to the establishment of the [[United Nations Emergency Force]] I (UNEF I), by the adoption of Assembly resolution 1001.<ref>{{cite web|url=https://www.un.org/ga/sessions/emergency.shtml|title=Emergency Special Sessions|publisher=United Nations|access-date=25 October 2015|archive-date=21 June 2019|archive-url=https://web.archive.org/web/20190621233518/https://www.un.org/ga/sessions/emergency.shtml|url-status=live}}</ref> The UK also used its veto seven times in relation to [[Rhodesia]] from 1963 to 1973, five of these occasions were unilateral; the only occasions on which the UK has used its veto power unilaterally.<ref name= UNLibraryVetos />

      === United States ===
      {{See also| United States and the United Nations}}

      Ambassador [[Charles W. Yost]] cast the first US veto in 1970 over [[Rhodesia]], and the US cast a lone veto in 1972 to block a resolution that condemned Israel for war against Syria and Lebanon. Since then, the United States has been the most frequent user of the veto power, mainly on [[List of United Nations resolutions concerning Israel|resolutions criticising and condemning Israel]]; since 2002, the United States has applied the [[Negroponte doctrine]] to veto most resolutions relating to the ongoing [[Israeli–Palestinian conflict]]. This has been a constant cause of friction between the [[United Nations General Assembly|General Assembly]] and the Security Council. On 23 December 2016, the [[Barack Obama|Obama]] administration (during its [[lame duck]] period) abstained on [[United Nations Security Council Resolution 2334|a resolution]] calling for an end to [[Israeli settlement]]s, the first time that the United States has.<ref>{{cite web|url=https://www.bbc.com/news/world-middle-east-38421026|title=Israeli settlements: UN Security Council calls for an end|agency=BBC News|date=23 December 2016|access-date=23 December 2016|archive-date=9 April 2019|archive-url=https://web.archive.org/web/20190409140220/https://www.bbc.com/news/world-middle-east-38421026|url-status=live}}</ref> However, the United States resumed the use of the veto in the [[Presidency of Donald Trump|Trump administration]].<ref>{{cite news |last1=Nichols |first1=Michelle |title=U.S. vetoes U.N. call for withdrawal of Trump Jerusalem decision |url=https://www.reuters.com/article/us-usa-trump-israel-un-idUSKBN1EC25N |work=Reuters |date=18 December 2017 |language=en |access-date=13 May 2019 |archive-date=15 May 2021 |archive-url=https://web.archive.org/web/20210515193919/https://www.reuters.com/article/us-usa-trump-israel-un-idUSKBN1EC25N |url-status=live }}</ref> Between 2023 and 2024, the U.S. cast five vetoes on the Gaza war. In April 2024, the [[Biden administration]] vetoed a resolution that would have recommended that the General Assembly hold a vote on the [[State of Palestine]]'s full membership of the organization.<ref>{{cite news |last1=Lederer |first1=Edith M. |title=US vetoes widely supported resolution backing full UN membership for Palestine |url=https://apnews.com/article/un-vote-palestinian-membership-us-veto-8d8ad60d8576b5ab9e70d2f8bf7e2881 |access-date=18 April 2024 |publisher=Associated Press |date=18 April 2024}}</ref><ref>{{cite news |title=US vetoes Palestine's request for full UN membership |url=https://news.un.org/en/story/2024/04/1148731 |access-date=18 April 2024 |publisher=United Nations: UN News |date=18 April 2024}}</ref>

      == Controversy ==
      Due to all of the permanent members also being recognized nuclear-weapon states under the terms of the [[Treaty on the Non-Proliferation of Nuclear Weapons]], the veto also has the effect of blocking Security Council action against the recognized nuclear-weapon states. For an indirect example, the [[Comprehensive Nuclear-Test-Ban Treaty]] is unenforceable despite {{percentage|175|193}} support in the General Assembly, as almost all of the [[List of states with nuclear weapons|nuclear-armed states]] have failed to ratify it.{{efn|175 out of 193 members (the treaty has 178 ratifiers, including non-members the [[Holy See]], [[Niue]], and the [[Cook Islands]])}}

      === Criticism ===

      The veto power has been criticized for its undemocratic nature. A single country can prevent a majority of the Security Council from taking any action. For example, the United States routinely casts lone vetoes of resolutions criticizing [[Israel]].<ref>{{cite web|title=The Israel Lobby and U.S. Foreign Policy |author=John J. Mearsheimer and Stephen Walt |url=http://ksgnotes1.harvard.edu/Research/wpaper.nsf/rwp/RWP06-011 |work=KSG Faculty Research Working Paper Series |publisher=Harvard University |access-date=26 January 2017 |archive-url=https://web.archive.org/web/20070202034826/http://ksgnotes1.harvard.edu/Research/wpaper.nsf/rwp/RWP06-011 |archive-date=2 February 2007 }}</ref> The permanent members also veto resolutions that criticize their own actions. In 2014, Russia vetoed a resolution condemning its [[2014 Crimean status referendum|annexation of Crimea]]. [[Amnesty International]] claimed that the five permanent members had used their veto to "promote their political self interest or geopolitical interest above the interest of protecting civilians."<ref>{{cite news |title=Surrender the UN veto, says Amnesty |url=https://www.bbc.com/news/world-31617141 |work=BBC |date=25 February 2015 |access-date=21 June 2018 |archive-date=6 March 2020 |archive-url=https://web.archive.org/web/20200306134557/https://www.bbc.com/news/world-31617141 |url-status=live }}</ref>

      Some critics see veto power exclusive to the permanent five as being anachronistic, unjust, or counterproductive. Peter Nadin writes that "The veto is an anachronism ... In the twenty-first century, the veto has come to be almost universally seen as a disproportionate power and an impediment to credible international action to crises."<ref>Peter Nadin, ''UN Security Council Reform'' (Routledge, 2016), pp. 133–34.</ref> The "enormous influence of the veto power" has been cited as a cause of the UN's ineffectiveness in preventing and responding to [[genocide]], violence, and human rights violations.<ref>Sevak Joseph Manjikian, "Genocide and the Failure to Respond" in ''Civil Courage: A Response to Contemporary Conflict and Prejudice'' (ed. Naomi Kramer: Peter Lang, 2007), pp. 49–50.</ref> Various countries outside the permanent members, such as the [[Non-Aligned Movement]] and [[African Union]], have proposed limitations on the veto power.<ref>Edwin Egede & Peter Sutch, ''The Politics of International Law and International Justice'' (Edinburgh University Press, 2013), p. 142.</ref> Reform of the veto power is often included in proposals for [[Reform of the United Nations Security Council|reforming the Security Council]].

      The veto has been used to protect allies of the permanent members, and to prevent or stall UN peacekeeping or peace enforcement operations. The threat of using a veto (also called a "hidden" or "pocket" veto) may still have an effect even if a veto is not actually cast. In 1994, the United States and France both threatened vetoes regarding the [[Rwandan genocide]] which prevented the UN from undertaking an effective intervention, while in 1998–99 Russia and China threatened vetoes to prevent UN intervention against the [[ethnic cleansing]] in [[Kosovo]], and again in 2004 to prevent intervention in the [[Darfur genocide (2003–2005)|Darfur genocide]].<ref name="Wouters2005"/>

      In light of the criticisms of veto power and its impact on the decision-making process of the United Nations Security Council (UNSC), several reform proposals have emerged. Among these, the Noble World Foundation (NWF) has proposed that membership and veto power be shifted from individual states to sovereignty-pooling organizations, like the European Union (EU). This approach aligns with the UNSC's established practice of selecting non-permanent members based on regional representation. The goal of this proposal is to improve the effectiveness and decision-making capabilities of the UNSC. The EU's model of pooled sovereignty, which was strengthened by a 1964 decision from the European Court of Justice affirming the superiority of EU law over the national laws of member states, supports the idea that regional organizations like the EU can qualify for UN membership. The NWF suggests that regional organizations like the EU could be eligible for UN membership, a reform achievable without requiring amendments to the UN Charter.<ref>{{cite web |title=The urgent need for UNSC reform: A path to global peace |url=https://indiapost.com/the-urgent-need-for-unsc-reform-a-path-to-global-peace/ |website=India Post |date=15 December 2023 |access-date=15 December 2023}}</ref><ref>{{cite web |last1=Union |first1=The European |title=The European Union: The World's Biggest Sovereignty Experiment", CFR World 101 |date=14 February 2023 |url=https://world101.cfr.org/understanding-international-system/building-blocks/european-union-worlds-biggest-sovereignty |publisher=The European Union}}</ref>

      === Support ===

      Justifications for the veto are usually based in the interests of the permanent members and the idea that peace and security is only possible if the [[great power]]s are all working together.<ref name="Schindlmayr2001"/> At the San Francisco conference, arguments presented by the permanent members included: that the veto power was a reflection of political realities,<ref name="Schindlmayr2001"/> that the United Nations would break down if it attempted to carry out enforcement actions against a permanent member,<ref name="Schindlmayr2001"/> that it prevented the Security Council from making a decision that could harm relations between the permanent members,<ref name="Wouters2005"/> and that their privileged status was linked to a responsibility for maintaining international peace and security.<ref name="Wouters2005">{{cite book | last1=Wouters | first1=Jan | last2=Ruys | first2=Tom | author3=Egmont Royal Institute for International Relations | title=Security Council reform: a new veto for a new century. | publication-place=Gent | date=2005 | isbn=978-90-382-1292-0 | oclc=537704883 | page=}}</ref> According to one author, there were four reasons evident at the conference: "1) unanimity was considered indispensable for peace; 2) permanent members needed to protect their national interests; 3) the need to protect minority blocs from over-dominating majority coalitions; and 4) the desire to prevent rash Security Council resolutions."<ref name="Schindlmayr2001">{{cite journal | title=Obstructing the Security Council: The Use of the Veto in the Twentieth Century | journal=Journal of the History of International Law / Revue d'histoire du droit international | publisher=Brill | volume=3 | issue=2 | year=2001 | issn=1388-199X | doi=10.1163/15718050120956965 | pages=218–234}}</ref> In 1993, Australian foreign minister [[Gareth Evans (politician)|Gareth Evans]] wrote that the veto was established to ensure that the United Nations did not commit to things it would be unable to follow through on due to great power opposition.<ref name="Schindlmayr2001"/><ref name="Evans1993">{{cite book | author = Gareth J. Evans | date = 1993 | title = Cooperating for Peace: The Global Agenda for the 1990's and Beyond | publisher = Allen & Unwin | pages = | isbn = 978-1-86373-623-7 | url = https://books.google.com/books?id=6c99QgAACAAJ}}</ref>

      Scholars have stated that [[collective security]] against a [[superpower]] would be war,<ref>Warren, David D. “INTERNATIONAL ORGANIZATIONS IN INTERNATIONAL RELATIONS: A Lecture to the Naval War College on 15 September 1964.” Naval War College Review, vol. 17, no. 3, 1964, pp. 17–39. JSTOR, http://www.jstor.org/stable/45231021. Accessed 11 Dec. 2025.</ref> that the United Nations could not be effective against a great power,<ref>Barros, James. “The Greek-Bulgarian Incident of 1925: The League of Nations and the Great Powers.” Proceedings of the American Philosophical Society, vol. 108, no. 4, 1964, pp. 354–85. JSTOR, http://www.jstor.org/stable/985913. Accessed 11 Dec. 2025.</ref> that abolishing the veto would have no significance due to resolutions becoming unenforceable,<ref>PASVOLSKY, LEO. “The Veto Problem.” World Affairs, vol. 115, no. 3, 1952, pp. 67–70. JSTOR, http://www.jstor.org/stable/20668644. Accessed 11 Dec. 2025.</ref> and that deploying [[UN peacekeepers]] against a great power conflict would be unrealistic and fail to contain the conflict.{{fact|date=December 2025}}

      In 1981, then-Secretary-General [[Kurt Waldheim]] stated that "even if you abolish the veto...you would still need the cooperation of governments which have the means to assure implementation."<ref>Gauhar, Altaf, and Kurt Waldheim. “Kurt Waldheim.” Third World Quarterly, vol. 4, no. 1, 1982, pp. 1–13. JSTOR, http://www.jstor.org/stable/3991505. Accessed 16 Dec. 2025.</ref>

      Supporters regard the veto as an important safeguard in international relations. [[Thomas G. Weiss]] and Giovanna Kuele called it "a variation on the [[Hippocratic Oath]]: UN decisions should do no harm."<ref name="weiss2014">{{cite news |last1=Weiss |first1=Thomas G. |last2=Kuele |first2=Giovanna |title=The Veto: Problems and Prospects |url=https://www.e-ir.info/2014/03/27/the-veto-problems-and-prospects/ |work=E-International Relations |date=27 March 2014 |access-date=13 May 2019 |archive-date=13 May 2019 |archive-url=https://web.archive.org/web/20190513023736/https://www.e-ir.info/2014/03/27/the-veto-problems-and-prospects/ |url-status=live }}</ref> Russian President [[Vladimir Putin]] praised the "profound wisdom" of the founders of the United Nations, referring to the veto power as the underpinning of international stability.<ref name="putin2013"/> Chinese Foreign Minister [[Wang Yi (politician)|Wang Yi]] lauded its "important role in checking the instinct of war."<ref name="wangyi"/>

