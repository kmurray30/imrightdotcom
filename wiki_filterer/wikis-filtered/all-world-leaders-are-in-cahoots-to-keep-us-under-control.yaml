      | caption2          = A usually congested highway in [[Penang]], [[COVID-19 pandemic in Malaysia|Malaysia]], deserted during the [[Malaysian movement control order|Movement Control Order]]
      | image3            = Jordan, Hong Kong healthcare workers testing residents for COVID-19.jpg
      | caption3          = Healthcare workers in [[COVID-19 pandemic in Hong Kong|Hong Kong]] prepare to conduct mass [[COVID-19 testing]] of [[Jordan, Hong Kong|Jordan]] residents during a localised lockdown.
      | image4            = COVID-19 press conference - 11 January 2021 (50824921872).jpg
