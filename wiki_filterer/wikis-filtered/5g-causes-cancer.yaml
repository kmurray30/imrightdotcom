      {{Short description|Broadband cellular network standard}}
      {{Other uses}}
      {{Lead rewrite|date=November 2025}}
      {{Use mdy dates|date=November 2022}}
      [[File:3GPP 5G logo.png|thumb|[[3GPP]] logo for 5G]]
      {{List of mobile phone generations}}

      '''5G''' is the fifth generation of [[cellular network]] technology and the successor to [[4G]].  First deployed in 2019,<ref>{{Cite news |last=Hoffman |first=Chris |date=January 7, 2019 |title=What Is 5G, and How Fast Will It Be? |url=https://www.howtogeek.com/340002/what-is-5g-and-how-fast-will-it-be/ |archive-url=https://web.archive.org/web/20190124041504/https://www.howtogeek.com/340002/what-is-5g-and-how-fast-will-it-be/ |archive-date=2019-01-24 |access-date=2025-12-18 |work=How-To Geek |language=en-US}}</ref> its technical standards are developed by the [[3rd Generation Partnership Project]] (3GPP) in cooperation with the [[International Telecommunication Union|ITU]]'s [[IMT-2020]] program.<ref>{{cite web |title=3GPP Meets IMT-2020 |url=https://www.3gpp.org/technologies/3gpp-meets-imt-2020 |access-date=February 26, 2025 |website=3GPP |language=en}}</ref> 5G networks divide coverage areas into smaller zones called ''cells'', enabling devices to connect to local [[cellular base station|base stations]] via radio. Each station connects to the broader [[telephone network]] and the [[Internet]] through high-speed [[optical fiber]] or wireless [[Backhaul (telecommunications)|backhaul]].<ref>{{cite web |last=Segan |first=Sascha |date=May 16, 2022 |title=What Is 5G? |url=https://www.pcmag.com/news/what-is-5g |access-date=April 12, 2025 |website=PCMag}}</ref>

      Compared to 4G, 5G offers significantly faster data transfer speed—up to 10 [[Gbps]] (Gigabits per second) in tests—and lower latency, with response times of just a few milliseconds. These advancements allow networks to support more users and applications such as [[extended reality]], [[autonomous vehicles]], [[remote surgery]] trials, and [[fixed wireless access]] for home Internet access.<ref>{{cite news |title=5G Explained: What It Is, Who Has It, and How Much Faster It Really Is |url=https://www.cnn.com/interactive/2020/03/business/what-is-5g/ |date=March 1, 2020 |access-date=November 27, 2021 |website=CNN |archive-url=https://web.archive.org/web/20211127064719/https://www.cnn.com/interactive/2020/03/business/what-is-5g/ |archive-date=November 27, 2021 |language=en}}</ref> 5G also supports massive connectivity for sensors and machines, commonly referred to as the [[Internet of things]] (IoT), and leverages [[edge computing]] to improve [[data processing]] efficiency.

      [[File:Verizon-n77-upgrade-after-before-v0-q1zq1mdxeadf1.png|thumb|alt=Close-up of antennas and radio units on a monopole tower.|A 5G [[cell site]] using [[Ericsson]] equipment in the [[United States]]]]

      Building 5G networks requires new [[infrastructure]] and access to suitable [[radio spectrum]]. Network operators report high costs and continue to improve energy efficiency and [[computer security|security]]. Analysts expect 5G to support [[telehealth]], [[intelligent transportation systems|smart transport]], and digital media, while operating alongside 4G networks into the 2030s.

      == History ==
      [[File:Cellular network standards and generation timeline.svg|thumb|upright=1.3|Cellular network standards and generation timeline]]

      === Early research (2008–2012) ===
      In 2008, [[NASA]] and the [[M2Mi Corporation|Machine-to-Machine Intelligence Corporation (M2Mi)]] conducted nanosatellite communication studies that influenced early next-generation network concepts.<ref>{{cite web |title=NASA Ames Partners With M2Mi for Small Satellite Development |url=https://www.nasa.gov/home/hqnews/2008/apr/HQ_08107_Ames_nanosat.html |website=NASA |date=April 24, 2008 |access-date=April 8, 2019 |archive-url=https://web.archive.org/web/20190408142034/https://www.nasa.gov/home/hqnews/2008/apr/HQ_08107_Ames_nanosat.html |archive-date=April 8, 2019}}</ref>  

      In 2012, [[New York University]] established NYU Wireless, a research center focused on [[Extremely high frequency|millimeter-wave]] communication. The same year, the [[University of Surrey]] founded the 5G Innovation Centre, funded by £35 million from public and industry partners including [[Huawei]] and [[Samsung]].<ref>{{Cite news |title=University gets funds for 5G work |url=https://www.bbc.co.uk/news/technology-19871065 |archive-url=https://web.archive.org/web/20190421235023/https://www.bbc.co.uk/news/technology-19871065 |archive-date=2019-04-21 |access-date=2025-12-18 |work=BBC News |language=en-GB}}</ref> Also in 2012, the European Union launched the ''Mobile and Wireless Communications Enablers for the Twenty-Twenty Information Society (METIS)'' project to align emerging network research with international standardization.<ref>{{cite web |title=METIS project presentation |url=https://www.metis2020.com/wp-content/uploads/deliverables/METIS_project_presentation_public_Old.pdf |website=METIS 2020 |publisher=European Union |date=November 2012 |access-date=February 14, 2014 |archive-url=https://web.archive.org/web/20140222211609/https://www.metis2020.com/wp-content/uploads/deliverables/METIS_project_presentation_public_Old.pdf |archive-date=February 22, 2014 |url-status=dead}}</ref>  

      === Standardization and early trials (2013–2018) ===
      In 2013, the [[International Telecommunication Union Radiocommunication Sector|ITU-R]] Working Party 5D began studies on ''IMT-2020'', later formalized as the 5G standard.<ref>{{cite web |title=ITU-R Working Party 5D |url=https://www.itu.int/en/ITU-R/study-groups/rsg5/rwp5d/Pages/default.aspx |website=International Telecommunication Union |access-date=May 18, 2017}}</ref>  

      During the same period, major firms such as [[Samsung Electronics]], [[NTT Docomo]], and [[Huawei]] conducted early trials. Samsung tested a prototype achieving more than 1 Gbit/s across 2 km using 8 × 8 [[MIMO]] [[Antenna (radio)|antennas]].<ref>{{cite news |title=Samsung Electronics develops key technology for mobile communications |url=https://news.naver.com/main/ranking/read.nhn?oid=001&aid=0006254810 |work=Yonhap News |publisher=Naver News |date=May 12, 2013 |access-date=May 12, 2013 |archive-url=https://web.archive.org/web/20180919114612/https://news.naver.com/main/ranking/read.nhn?oid=001&aid=0006254810 |archive-date=September 19, 2018}}</ref> [[NTT Docomo]] received a government award at [[CEATEC]] for high-speed network development,<ref>{{cite news |title=Docomo wins CEATEC award for new network research |url=http://wirelesswatch.jp/2013/10/03/docomo-wins-ceatec-award-for-5g/ |work=Wireless Watch Japan |date=October 3, 2013 |access-date=October 3, 2013 |archive-url=https://web.archive.org/web/20181013093345/http://wirelesswatch.jp/2013/10/03/docomo-wins-ceatec-award-for-5g/ |archive-date=October 13, 2018}}</ref> while [[Huawei]] announced a US$600 million program to advance mobile network technology.<ref>{{Cite news |title=Huawei plans $600m investment in 10Gbps 5G network |url=https://www.independent.co.uk/life-style/gadgets-and-tech/huawei-plans-600m-investment-in-10gbps-5g-network-8924124.html |archive-url=https://web.archive.org/web/20190331105531/https://www.independent.co.uk/life-style/gadgets-and-tech/huawei-plans-600m-investment-in-10gbps-5g-network-8924124.html |archive-date=2019-03-31 |access-date=2025-12-18 |work=The Independent |language=en-GB}}</ref>  

      === Commercial rollout (2019–2021) ===
      On April 3, 2019, [[South Korea]] launched its national network, the first full commercial deployment.<ref>{{cite news |title=South Korea launches nationwide 5G network |url=https://asia.nikkei.com/Spotlight/5G-networks/South-Korea-to-seize-on-world-s-first-full-5G-network |work=Nikkei Asian Review |date=April 3, 2019 |access-date=April 17, 2019 |archive-url=https://web.archive.org/web/20190417194348/https://asia.nikkei.com/Spotlight/5G-networks/South-Korea-to-seize-on-world-s-first-full-5G-network |archive-date=April 17, 2019}}</ref> Hours later, [[Verizon]] began limited service in select U.S. cities.<ref>{{cite news |title=US dismisses South Korea's 5G launch as premature |url=https://www.theguardian.com/technology/2019/apr/04/us-dismisses-south-koreas-launch-of-world-first-5g-network-as-stunt |work=The Guardian |date=April 4, 2019 |access-date=April 17, 2019 |archive-url=https://web.archive.org/web/20190417195028/https://www.theguardian.com/technology/2019/apr/04/us-dismisses-south-koreas-launch-of-world-first-5g-network-as-stunt |archive-date=April 17, 2019}}</ref> In June 2019, [[Globe Telecom]] introduced the Philippines' first next-generation network,<ref>{{cite web |title=Globe broadband service |url=https://bb.globe.com.ph/5g/ |website=Globe Telecom |access-date=June 21, 2019 |archive-url=https://web.archive.org/web/20190903145231/https://bb.globe.com.ph/5g/ |archive-date=September 3, 2019 |url-status=dead}}</ref> and in December 2019, [[AT&T]] launched a consumer service in the United States that expanded nationwide during 2020.<ref>{{cite web |title=AT&T expands service in the United States |url=https://about.att.com/story/2019/att_5g_leadership.html |website=AT&T Newsroom |date=December 2019 |access-date=November 23, 2019 |archive-url=https://web.archive.org/web/20201118115344/https://about.att.com/story/2019/att_5g_leadership.html |archive-date=November 18, 2020}}</ref>  

      Commercial 5G deployment expanded rapidly through 2020. Beyond public mobile networks, it was also adopted in private industrial and enterprise systems, including operation in unlicensed spectrum (NR-U) and licensed non-public networks (NPNs).<ref>{{Cite news |title=NR-U Transforming 5G - Qualcomm Presentation - GSA |url=https://gsacom.com/paper/nr-u-transforming-5g-qualcomm-presentation/ |archive-url=https://web.archive.org/web/20220209121716/https://gsacom.com/paper/nr-u-transforming-5g-qualcomm-presentation/ |archive-date=2022-02-09 |access-date=2025-12-18 |work=GSA |language=en-GB}}</ref> Private 5G networks became important for [[Industry 4.0]] automation and smart manufacturing.<ref>{{cite web|title=The Private LTE & 5G Network Ecosystem: 2023–2030|url=https://www.snstelecom.com/private-lte|access-date=2023-08-14|website=www.snstelecom.com|language=en}}</ref> Early rollouts used [[5G NR#Non-standalone mode|non-standalone (NSA) mode]]—with 4G cores—before networks transitioned to [[5G NR#Standalone mode|standalone (SA) mode]] with dedicated 5G cores.<ref>{{cite web|date=February 19, 2020|title=[ケータイ用語の基礎知識]第941回：NSA・SA方式とは|trans-title=Basic Knowledge of Mobile Terminology: NSA and SA Architectures|url=https://k-tai.watch.impress.co.jp/docs/column/keyword/1235918.html|url-status=live|archive-url=https://web.archive.org/web/20220209121716/https://k-tai.watch.impress.co.jp/docs/column/keyword/1235918.html|archive-date=February 9, 2022|access-date=February 9, 2022|website=ケータイ Watch|language=ja}}</ref>

      [[South Korea]]’s 2019 rollout used equipment from [[Samsung Electronics|Samsung]], [[Ericsson]], and [[Nokia]]; [[LG U Plus]] also deployed [[Huawei]] hardware.<ref>{{cite web|url=https://asia.nikkei.com/Business/Technology/Telecom-s-5G-revolution-triggers-shakeup-in-base-station-market|title=Telecom's 5G revolution triggers shakeup in base station market|website=Nikkei Asian Review|access-date=April 21, 2019|archive-url=https://web.archive.org/web/20190421060807/https://asia.nikkei.com/Business/Technology/Telecom-s-5G-revolution-triggers-shakeup-in-base-station-market|archive-date=April 21, 2019|language=en}}</ref>  
      Samsung supplied most of the roughly 86,000 sites, while [[SK Telecom]], [[KT Corporation]], and LG U Plus concentrated coverage in major cities using the 3.5&nbsp;GHz band under NSA operation. Reported [[download]] speeds averaged 200–400&nbsp;[[Mbit/s]], and subscriptions grew from about 260,000 to 4.7&nbsp;million during 2019.<ref>{{cite web|url=https://asia.nikkei.com/Spotlight/5G-networks/Fast-but-patchy-Trying-South-Korea-s-new-5G-service|title=Fast but patchy: Trying South Korea's new 5G service|website=Nikkei Asian Review|access-date=April 11, 2019|archive-url=https://web.archive.org/web/20190412032625/https://asia.nikkei.com/Spotlight/5G-networks/Fast-but-patchy-Trying-South-Korea-s-new-5G-service|archive-date=April 12, 2019|language=en}}</ref>  

      Following these early deployments, [[T-Mobile US]] launched the first nationwide [[5G NR#Standalone mode|standalone network]] in 2020.<ref>{{cite web|title=T-Mobile launches world's first nationwide standalone 5G network|url=https://www.t-mobile.com/news/network/standalone-5g-launch|website=T-Mobile Newsroom|access-date=January 30, 2022|archive-url=https://web.archive.org/web/20220130235142/https://www.t-mobile.com/news/network/standalone-5g-launch|archive-date=January 30, 2022|language=en}}</ref> [[Ericsson]] projected that by the mid-2020s, 5G networks would reach about 65 percent of the global population.<ref>{{Cite news |last=Taylor |first=Chloe |date=2019-11-25 |title=5G coverage will span two thirds of the global population in 6 years, Ericsson predicts |url=https://www.cnbc.com/2019/11/25/5g-will-span-two-thirds-of-global-population-in-6-years-ericsson-says.html |archive-url=https://web.archive.org/web/20191129032631/https://www.cnbc.com/2019/11/25/5g-will-span-two-thirds-of-global-population-in-6-years-ericsson-says.html |archive-date=2019-11-29 |access-date=2025-12-18 |work=CNBC |language=en}}</ref>

      Major suppliers of 5G radio and core systems included [[Altiostar]], [[Cisco Systems]], [[Datang Telecom Group|Datang Telecom/Fiberhome]], [[Ericsson]], [[Huawei]], [[Nokia]], [[Qualcomm]], [[Samsung Electronics|Samsung]], and [[ZTE]]. [[Huawei]] was estimated to hold about 70 percent of global 5G base stations by 2023.<ref>{{cite book|last=Parzyan|first=Anahit|title=China and Eurasian Powers in a Multipolar World Order 2.0: Security, Diplomacy, Economy and Cyberspace|date=2023|publisher=[[Routledge]]|others=Mher Sahakyan|isbn=978-1-003-35258-7|location=New York|chapter=China's Digital Silk Road: Empowering Capabilities for Digital Leadership in Eurasia|oclc=1353290533|page=182|language=en}}</ref>

      === Recent developments (2022–present) ===
      By 2022, network speeds in many regions had stabilized, and operators began testing 5.5G upgrades to improve capacity and latency.<ref>{{Cite web |last=Strumpf |first=Dan |date=2023-04-25 |title=5G Not Enough? Telecom Companies Look to 5.5G |url=https://www.wsj.com/business/telecom/5g-future-mobile-internet-309dac2b |access-date=2025-12-18 |website=The Wall Street Journal |language=en-US}}</ref> By the early 2020s, large-scale commercial 5G networks were active across most developed markets, and rollout in developing regions was still accelerating.<ref>{{Cite web |date=2024-09-03 |title=5G expansion: Where in Europe has the strongest mobile networks? |url=http://www.euronews.com/next/2024/09/03/5g-rollout-across-europe-which-countries-enjoy-the-strongest-mobile-networks-and-fastest-s |access-date=2025-09-21 |website=euronews |language=en}}</ref><ref>{{Cite web |title=5G in South East Asia and Oceania: A closer look |url=https://www.ericsson.com/en/reports-and-papers/mobility-report/closer-look/south-east-asia-and-oceania |access-date=2025-09-21 |website=ericsson.com |language=en}}</ref>

      == Technologies ==
      === Small cells ===
      {{Main|Small cell}}

      Small cells are low-power radio nodes that extend network capacity in dense or indoor areas. They operate over short distances, typically a few dozen to a few hundred metres, and are used to maintain coverage for mmWave signals.<ref>{{cite web|url=https://www.etsi.org/deliver/etsi_tr/136900_136999/136932/16.00.00_60/tr_136932v160000p.pdf|title=Scenarios and requirements for small cell enhancements for E-UTRA and E-UTRAN (3GPP TR 36.932 Release 16)|publisher=ETSI and 3GPP|access-date=26 February 2022|archive-url=https://web.archive.org/web/20220226132524/https://www.etsi.org/deliver/etsi_tr/136900_136999/136932/16.00.00_60/tr_136932v160000p.pdf|archive-date=26 February 2022|url-status=live}}</ref>

      {| class="wikitable"
      |+ Typical FR2 cell characteristics
      ! Cell type !! Environment !! Users (approx.) !! Power (W) !! Range (m)
      |-
      | [[Femtocell]] || Homes, offices || 4–32 || 0.01–1 || up to 50
      |-
      | [[Picocell]] || Public venues || 64–128 || 0.1–5 || up to 100
      |-
      | [[Microcell]] || Urban areas || 128–256 || 5–10 || 200–500
      |-
      | [[Macrocell]] || Wide-area coverage || over 250 || 10–20 || 300–1000
      |}

      === Massive MIMO ===
      {{See also|Multi-user MIMO}}

      Massive multiple-input multiple-output (MIMO) systems use large antenna arrays to increase capacity and spectral efficiency. They extend conventional MIMO by serving multiple users simultaneously and steering signals toward them to reduce interference.<ref>{{cite book|last1=Manivasagam|first1=K.|last2=Garima|first2=G.|last3=Shukla|first3=M.|chapter=Massive MIMO in 5G networks: Trends and challenges|date=19 December 2023|title=2023 International Conference on Power Energy, Environment & Intelligent Control (PEEIC)|publisher=IEEE|pages=1456–1460|doi=10.1109/PEEIC59336.2023.10450543|isbn=9798350357769}}</ref>

      === Beamforming ===
      {{Main|Beamforming}}

      Beamforming directs radio energy toward specific users. In analogue beamforming, antenna outputs are combined to focus signal power in one direction. Digital beamforming transmits data streams across multiple layers to improve signal strength and reliability.<ref>{{cite journal|last1=Rappaport|first1=Theodore S.|last2=Sun|first2=Shu|last3=Mayzus|first3=Rimma|date=2013|title=Millimeter wave mobile communications for 5G cellular: It will work|journal=IEEE Access|volume=1|pages=335–349|doi=10.1109/ACCESS.2013.2260813|bibcode=2013IEEEA...1..335R |issn=2169-3536|doi-access=free}}</ref>

      === Non-orthogonal multiple access (NOMA) ===
      Non-orthogonal multiple access assigns different power levels to users sharing the same frequency resources to improve spectral efficiency.<ref>{{cite journal|last1=Ghafoor|first1=Umar|last2=Ali|first2=Mudassar|last3=Khan|first3=Humayun Zubair|last4=Siddiqui|first4=Adil Masood|last5=Naeem|first5=Muhammad|date=1 August 2022|title=NOMA and future 5G and B5G wireless networks: A paradigm|journal=Journal of Network and Computer Applications|volume=204|article-number=103413|doi=10.1016/j.jnca.2022.103413|issn=1084-8045}}</ref>

      === Channel coding ===
      5G NR uses [[Polar code (coding theory)|polar codes]] for control channels and [[low-density parity-check code|low-density parity-check codes]] (LDPC) for data channels, replacing the [[turbo code]]s used in 4G.<ref>{{cite web|url=https://accelercomm.com/sites/accelercomm.com/files/5G-Channel-Coding_0.pdf|title=5G channel coding|access-date=6 January 2019|archive-url=https://web.archive.org/web/20181206003124/https://www.accelercomm.com/sites/accelercomm.com/files/5G-Channel-Coding_0.pdf|archive-date=6 December 2018|url-status=dead}}</ref>

      === Research in to wireless power ===
      Research has explored the use of 5G mmWave networks for [[wireless power transfer]]. Studies using wavelengths between 1 mm and 10 mm remain experimental.<ref>{{cite journal|last1=Eid|first1=Aline|last2=Hester|first2=Jimmy G. D.|last3=Tentzeris|first3=Manos M.|date=12 January 2021|title=5G as a wireless power grid|journal=Scientific Reports|volume=11|issue=1|page=636|doi=10.1038/s41598-020-79500-x|pmid=33436681|pmc=7804946|doi-access=free}}</ref>

      == Core network architecture ==
      The 5G core (5GC) is a service-oriented, software-defined system that separates control and user planes and supports flexible deployment. It replaces the 4G [[Evolved Packet Core]] with modular, software-based network functions.

      === Software-defined networking and virtualization ===
      {{Main|Software-defined networking|SD-WAN|Network function virtualization|5G network slicing}}

      Software-defined networking (SDN) and network function virtualization (NFV) enable software-based configuration, scaling, and management of networks. Together with network slicing, these technologies support applications such as the Internet of things, connected vehicles, and industrial automation.<ref>{{cite journal
       |last1=Ordonez-Lucena |first1=J.
       |last2=Ameigeiras |first2=P.
       |last3=Lopez |first3=D.
       |last4=Ramos-Munoz |first4=J. J.
       |last5=Lorca |first5=J.
       |last6=Folgueira |first6=J.
       |title=Network slicing for 5G with SDN/NFV: Concepts, architectures, and challenges
       |journal=IEEE Communications Magazine
       |publisher=IEEE
       |date=2017
       |volume=55 |issue=5 |pages=80–87
       |doi=10.1109/MCOM.2017.1600935
       |bibcode=2017IComM..55e..80O
       |hdl=10481/45368
       |arxiv=1703.04676
       }}</ref>

      === Service-based architecture (SBA) ===
      Service-based architecture (SBA) integrates SDN and NFV principles and replaces the 4G EPC framework with modular network functions that communicate through [[Representational State Transfer|RESTful]] APIs. Each function registers with a network repository function (NRF), which enables independent scaling and interoperability.<ref>{{Cite web |date=2021-09-09 |title=What is a Service Based Architecture? |url=https://www.rcrwireless.com/20210909/5g/what-is-a-service-based-architecture |access-date=2025-12-18 |language=en-US}}</ref>

      === Core network functions ===
      Each network function performs a defined role within the 5G core, replacing or extending elements from the 4G EPC.<ref>{{cite web
       |title=System architecture for the 5G System (5GS)
       |url=https://www.etsi.org/deliver/etsi_ts/123500_123599/123501/18.05.00_60/ts_123501v180500p.pdf
       |publisher=ETSI
       |date=2024-05-01
       }}</ref>

