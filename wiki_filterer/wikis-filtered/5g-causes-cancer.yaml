      === Others ===
      * [[Gasoline]] (contains aromatics)
      * [[Lead]] and its compounds
      * [[Alkylating antineoplastic agent]]s (e.g., [[mechlorethamine]])
      *[[Styrene]]
      *Other [[alkylating agent]]s (e.g., [[dimethyl sulfate]])
      * [[Ultraviolet radiation]] from the sun and UV lamps
      * Other [[ionizing radiation]] (X-rays, gamma rays, etc.)
      * Low refining or unrefined [[mineral oil]]s

      == Mechanisms of carcinogenicity ==
      Carcinogens can be classified as genotoxic or nongenotoxic. [[Genotoxin]]s cause irreversible genetic damage or mutations by binding to [[DNA]]. Genotoxins include chemical agents like [[N-nitroso-N-methylurea]] (NMU) or non-chemical agents such as [[ultraviolet light]] and [[ionizing radiation]]. Certain viruses can also act as carcinogens by interacting with DNA.

      Nongenotoxins do not directly affect DNA but act in other ways to promote growth. These include hormones and some organic compounds.<ref>{{cite book| title=The Gale Encyclopedia of Cancer: A guide to Cancer and its Treatments |edition=Second |page=137 }}</ref>

