      ==Treatment==
      A medical team generally assesses the treatment options and presents them to the person affected and their family. Various types of treatment are available depending on tumor type and location, and may be combined to produce the best chances of survival:<ref name="aans"/>
      * Surgery:<ref name="aans"/> complete or partial [[Resection (surgery)|resection]] of the tumor with the objective of removing as many tumor cells as possible.
      * Radiotherapy:<ref name="aans"/> the most commonly used treatment for brain tumors; the tumor is irradiated with beta, X-rays or gamma rays.
      * Chemotherapy:<ref name="aans"/> a treatment option for cancer, however, it is not always used to treat brain tumors as the blood–brain barrier can prevent some drugs from reaching the cancerous cells.
      * A variety of experimental therapies are available through clinical trials.<ref>{{cite journal |last1=Huang |first1=Rui |last2=Boltze |first2=Johannes |last3=Li |first3=Shen |title=Strategies for Improved Intra-arterial Treatments Targeting Brain Tumors: a Systematic Review |journal=Frontiers in Oncology |date=26 August 2020 |volume=10 |article-number=1443 |doi=10.3389/fonc.2020.01443 |doi-access=free |pmid=32983974 |pmc=7479245 }}</ref><ref>{{cite journal |last1=Uluc |first1=Kutluay |last2=Neuwelt |first2=Edward A. |last3=Ambady |first3=Prakash |title=Advances in Intraarterial Chemotherapy Delivery Strategies and Blood-Brain Barrier Disruption |journal=Neurosurgery Clinics of North America |date=April 2022 |volume=33 |issue=2 |pages=219–223 |doi=10.1016/j.nec.2022.01.001 |pmid=35346454 }}</ref>

      Survival rates in primary brain tumors depend on the type of tumor, age, functional status of the patient, the extent of surgical removal and other factors specific to each case.<ref>{{cite journal | vauthors = Nicolato A, Gerosa MA, Fina P, Iuzzolino P, Giorgiutti F, Bricolo A | title = Prognostic factors in low-grade supratentorial astrocytomas: a uni-multivariate statistical analysis in 76 surgically treated adult patients | journal = Surgical Neurology | volume = 44 | issue = 3 | pages = 208–21; discussion 221–3 | date = September 1995 | pmid = 8545771 | doi = 10.1016/0090-3019(95)00184-0 }}</ref>

      Standard care for anaplastic oligodendrogliomas and anaplastic oligoastrocytomas is surgery followed by radiotherapy. One study found a survival benefit for the addition of chemotherapy to radiotherapy after surgery, compared with radiotherapy alone.<ref>{{cite journal | vauthors = Lecavalier-Barsoum M, Quon H, Abdulkarim B | title = Adjuvant treatment of anaplastic oligodendrogliomas and oligoastrocytomas | journal = The Cochrane Database of Systematic Reviews | issue = 5 | article-number = CD007104 | date = May 2014 | volume = 2014 | pmid = 24833028 | doi = 10.1002/14651858.cd007104.pub2 | pmc = 7388823 }}</ref>

      ===Surgery===
      Surgical resection of the greatest extent of contrast enhancing tumor possible (gross total resection) is associated with increased overall and progression free survival in those with glioblastoma. Gross total resection is often required in other brain tumors.<ref name="Schaff 2023" /> Minimally invasive techniques are becoming the dominant trend in neurosurgical oncology.<ref>{{cite journal | vauthors = Spetzler RF, Sanai N | title = The quiet revolution: retractorless surgery for complex vascular and skull base lesions | journal = Journal of Neurosurgery | volume = 116 | issue = 2 | pages = 291–300 | date = February 2012 | pmid = 21981642 | doi = 10.3171/2011.8.JNS101896 | doi-access = free }}</ref> The main objective of surgery is to remove as many tumor cells as possible, with complete removal being the best outcome and [[cytoreduction]] ("debulking") of the tumor may otherwise be done. Due to the infiltrative nature of glioblastomas, total resection is usually unachievable and progression after surgery usually occurs, with progression occurring about 7 months after surgery.<ref name="Schaff 2023" />

      Many [[meningiomas]], with the exception of some tumors located at the skull base, can be successfully removed surgically.
      Most [[pituitary adenoma]]s can be removed surgically, often using a minimally invasive approach through the [[nasal cavity]] and skull base (trans-nasal, trans-sphenoidal approach). Large [[pituitary adenoma]]s require a [[craniotomy]] (opening of the skull) for their removal. Radiotherapy, including [[stereotactic]] approaches, is reserved for inoperable cases.<ref>{{cite journal | vauthors = Gheorghiu ML, Fleseriu M | title = Stereotactic Radiation Therapy in Pituitary Adenomas, is it Better than Conventional Radiation Therapy? | journal = Acta Endocrinologica | volume = 13 | issue = 4 | pages = 476–490 | date = 2017 | pmid = 31149219 | pmc = 6516550 | doi = 10.4183/aeb.2017.476 }}</ref>

      Postoperative radiotherapy and chemotherapy are integral parts of the therapeutic standard for malignant tumors.<ref>{{cite journal |last1=Penoncello |first1=Gregory P. |last2=Gagneur |first2=Justin D. |last3=Vora |first3=Sujay A. |last4=Yu |first4=Nathan Y. |last5=Fatyga |first5=Mirek |last6=Mrugala |first6=Maciej M. |last7=Bendok |first7=Bernard R. |last8=Rong |first8=Yi |title=Comprehensive Commissioning and Clinical Implementation of GammaTiles STaRT for Intracranial Brain Cancer |journal=Advances in Radiation Oncology |date=July 2022 |volume=7 |issue=4 |article-number=100910 |doi=10.1016/j.adro.2022.100910 |pmid=35434425 |pmc=9010698 |s2cid=246623373 }}</ref><ref name="pmid11150363">{{cite journal | vauthors = DeAngelis LM | title = Brain tumors | journal = The New England Journal of Medicine | volume = 344 | issue = 2 | pages = 114–23 | date = January 2001 | pmid = 11150363 | doi = 10.1056/NEJM200101113440207 | issn = 0028-4793}}</ref>

      Multiple metastatic tumors are generally treated with radiotherapy and chemotherapy rather than surgery and the prognosis in such cases is determined by the primary tumor, and is generally poor.{{Citation needed|date=October 2024}}

      ===Radiation therapy===
      The goal of radiation therapy is to kill tumor cells while leaving normal brain tissue unharmed. In standard [[external beam radiation therapy]], multiple treatments of standard-dose "fractions" of radiation are applied to the brain. This process is repeated for a total of 10 to 30 treatments, depending on the type of tumor. This additional treatment provides some patients with improved outcomes and better survival rates.{{citation needed|date=December 2020}}

      [[Radiosurgery]] is a treatment method that uses computerized calculations to focus radiation at the site of the tumor while minimizing the radiation dose to the surrounding brain. Radiosurgery may be an adjunct to other treatments, or it may represent the primary treatment technique for some tumors. Forms used include [[stereotactic]] radiosurgery, such as [[Gamma knife]], [[Cyberknife (device)|Cyberknife]] or [[Novalis radiosurgery|Novalis Tx]] [[radiosurgery]].<ref>{{cite web |url=http://www.sdcyberknife.com/comparison.htm |title=Radiosurgery treatment comparisons – Cyberknife, Gamma knife, Novalis Tx |access-date=22 July 2014 |archive-url=https://web.archive.org/web/20070520230154/http://www.sdcyberknife.com/comparison.htm |archive-date=20 May 2007  }}</ref>{{medrs|date=July 2014}}

      [[Radiation therapy|Radiotherapy]] is the most common treatment for secondary brain tumors. The amount of radiotherapy depends on the size of the area of the brain affected by cancer. Conventional external beam "whole-brain radiotherapy treatment" (WBRT) or "whole-brain irradiation" may be suggested if there is a risk that other secondary tumors will develop in the future.<ref>{{cite web |publisher=Cancer Research UK |url=http://www.cancerhelp.org.uk/help/default.asp?page=5301 |title=Treating secondary brain tumours with WBRT |access-date=5 June 2012 |url-status=live |archive-url=https://web.archive.org/web/20071025211917/http://www.cancerhelp.org.uk/help/default.asp?page=5301 |archive-date=25 October 2007  }}</ref> Stereotactic radiotherapy is usually recommended in cases involving fewer than three small secondary brain tumors. Radiotherapy may be used following, or in some cases in place of, resection of the tumor. Forms of radiotherapy used for brain cancer include [[external beam radiation therapy]], the most common, and [[brachytherapy]] and [[proton therapy]], the last especially used for children.

      People who receive stereotactic radiosurgery (SRS) and whole-brain radiation therapy (WBRT) for the treatment of metastatic brain tumors have more than twice the risk of developing learning and memory problems than those treated with SRS alone.<ref>{{cite web |publisher=MD Anderson Cancer Center |url=http://www.mdanderson.org/diseases/braincancer/display.cfm?id=8f11775f-75bb-4d7b-b3ac46878a1d56d0&method=displayfull&pn=00c8a30f-c468-11d4-80fb00508b603a14 |title=Whole Brain Radiation increases risk of learning and memory problems in cancer patients with brain metastases |access-date=5 June 2012 |archive-url=https://web.archive.org/web/20081005220401/http://www.mdanderson.org/diseases/braincancer/display.cfm?id=8f11775f-75bb-4d7b-b3ac46878a1d56d0&method=displayfull&pn=00c8a30f-c468-11d4-80fb00508b603a14 |archive-date=5 October 2008  }}</ref><ref>{{cite web |publisher=International RadioSurgery Association |url=http://www.irsa.org/metastatic_tumors.html |title=Metastatic brain tumors |access-date=5 June 2012 |archive-url=https://web.archive.org/web/20120616155755/http://www.irsa.org/metastatic_tumors.html |archive-date=16 June 2012 }}</ref> Results of a 2021 systematic review found that when using SRS as the initial treatment, survival or death related to brain metastasis was not greater than alone versus SRS with WBRT.<ref>{{cite book | vauthors = Garsa A, Jang JK, Baxi S, Chen C, Akinniranye O, Hall O, Larkin J, Motala A, Newberry S, Hempel S | title = Radiation Therapy for Brain Metasases | date = 2021-06-09 | pmid = 34152714 | doi = 10.23970/ahrqepccer242 | s2cid = 236256085 }}</ref>

      Postoperative conventional daily radiotherapy improves survival for adults with good functional well-being and high grade glioma compared to no postoperative radiotherapy. Hypofractionated radiation therapy has similar efficacy for survival as compared to conventional radiotherapy, particularly for individuals aged 60 and older with [[glioblastoma]].<ref>{{cite journal | vauthors = Khan L, Soliman H, Sahgal A, Perry J, Xu W, Tsao MN | title = External beam radiation dose escalation for high grade glioma | journal = The Cochrane Database of Systematic Reviews | volume = 5 | issue = 8 | article-number = CD011475 | date = May 2020 | pmid = 32437039 | pmc = 7389526 | doi = 10.1002/14651858.CD011475.pub3 }}</ref>

      ===Chemotherapy===
      Patients undergoing [[chemotherapy]] are administered drugs designed to kill [[tumor]] cells.<ref name="aans"/> Although chemotherapy may improve overall survival in patients with the most malignant primary brain tumors, it does so in only about 20 percent of patients. Chemotherapy is often used in young children instead of radiation, as radiation may have negative effects on the developing brain. The decision to prescribe this treatment is based on a patient's overall health, type of tumor, and extent of cancer. The toxicity and many side effects of the drugs, and the uncertain outcome of chemotherapy in brain tumors puts this treatment further down the line of treatment options with surgery and radiation therapy preferred.<ref>{{cite journal | vauthors = Perkins A, Liu G | title = Primary Brain Tumors in Adults: Diagnosis and Treatment | journal = American Family Physician | volume = 93 | issue = 3 | pages = 211–217 | date = February 2016 | pmid = 26926614 }}</ref>

      UCLA Neuro-Oncology publishes real-time survival data for patients with a diagnosis of glioblastoma. They are the only institution in the United States that displays how brain tumor patients are performing on current therapies. They also show a listing of chemotherapy agents used to treat high-grade glioma tumors.<ref>{{cite web |publisher=UCLA Neuro-Oncology Program |url=http://www.neurooncology.ucla.edu/Performance/GlioblastomaMultiforme.aspx |title=How Our Patients Perform: Glioblastoma Multiforme |access-date=5 June 2012 |archive-url=https://web.archive.org/web/20120609070823/http://www.neurooncology.ucla.edu/Performance/GlioblastomaMultiforme.aspx |archive-date=9 June 2012  }}</ref>

      Genetic mutations have significant effects on the effectiveness of chemotherapy. Gliomas with [[IDH1]] or [[IDH2]] mutations respond better to chemotherapy than those without the mutation. Loss of chromosome arms 1p and 19q also indicate better response to chemoradiation.<ref name=":4" />

      ===Other===
      A [[Shunt (medical)|shunt]] may be used to relieve symptoms caused by [[intracranial pressure]], by reducing the build-up of fluid ([[hydrocephalus]]) caused by the blockage of the free flow of [[cerebrospinal fluid]].<ref>{{cite web | vauthors = Dalvi A |url= http://www.emedicinehealth.com/normal_pressure_hydrocephalus/page9_em.htm |title=Normal Pressure Hydrocephalus Causes, Symptoms, Treatment |work=eMedicineHealth |publisher=Emedicinehealth.com |access-date=17 February 2012 |url-status=live |archive-url=https://web.archive.org/web/20120222023351/http://www.emedicinehealth.com/normal_pressure_hydrocephalus/page9_em.htm |archive-date=22 February 2012  }}</ref>

      For those with brain tumors, anti-seizure prophylactic (preventative) medications are not usually recommended. However, anti-epileptics are used in those with seizures.<ref name="Schaff 2023" />

      Cerebral edema secondary to brain tumors is managed by corticosteroids. Dexamethasone is the preferred corticosteroid due to its long half-life and reduced effect on water retention (mineralcorticoid activity). [[Bevacizumab]] (an anti-VEGFA antibody) may improve cerebral edema in those that are unresponsive to steroids.<ref name="Schaff 2023" />

      ==Prognosis==
      The prognosis of brain cancer depends on the type of cancer diagnosed. [[Medulloblastoma]] has a good prognosis with [[Medulloblastoma#Treatment and prognosis|chemotherapy, radiotherapy, and surgical resection]] while glioblastoma has a median survival of only 15 months even with aggressive [[chemoradiotherapy]] and surgery.<ref name=":12">{{Cite book |title=Central Nervous System Tumours |collaboration=WHO Classification of Tumours Editorial Board |publisher=International Agency for Research on Cancer |year=2021 |isbn=978-92-832-4508-7 |pages=39 ff |language=en}}</ref> Brainstem gliomas have the poorest prognosis of any form of brain cancer, with most patients dying within one year, even with therapy that typically consists of radiation to the tumor along with [[corticosteroid]]s. However, one type, focal brainstem gliomas in children, seems open to exceptional prognosis and long-term survival has frequently been reported.<ref>{{cite web |url=http://www.childhoodbraintumor.org/index.php?option=com_content&view=article&id=57:brain-stem-gliomas-in-childhood&catid=34:brain-tumor-types-and-imaging&Itemid=53 |title=Brain Stem Gliomas in Childhood |publisher=Childhoodbraintumor.org |access-date=17 February 2012 |url-status=live |archive-url=https://web.archive.org/web/20120309100048/http://www.childhoodbraintumor.org/index.php?option=com_content&view=article&id=57%3Abrain-stem-gliomas-in-childhood&catid=34%3Abrain-tumor-types-and-imaging&Itemid=53 |archive-date=9 March 2012  }}</ref>

      Prognosis is also affected by presentation of genetic mutations. Certain mutations provide better prognosis than others. [[IDH1]] and [[IDH2]] mutations in [[glioma]]s, as well as deletion of chromosome arms 1p and 19q, generally indicate better prognosis. [[P53|TP53]], [[ATRX]], [[Epidermal growth factor receptor|EGFR]], [[PTEN (gene)|PTEN]], and [[Telomerase reverse transcriptase|TERT]] mutations are also useful in determining prognosis.<ref name=":4" />

      ===Glioblastoma===
      {{Main|Glioblastoma}}

      [[Glioblastoma]] is the most aggressive ([[grading of the tumors of the central nervous system|grade 4]]) and most common form of a malignant primary brain tumor. Even when aggressive multimodality therapy consisting of radiotherapy, chemotherapy, and surgical excision is used, median survival is only 15–18 months.<ref name=":12" /> Standard therapy for glioblastoma consists of maximal surgical [[Segmental resection|resection]] of the tumor, followed by radiotherapy between two and four weeks after the [[craniotomy|surgical procedure]] to remove the cancer, then by [[temozolomide|chemotherapy]], such as [[temozolomide]].<ref name=":2">{{cite journal | vauthors = Sasmita AO, Wong YP, Ling AP | title = Biomarkers and therapeutic advances in glioblastoma multiforme | journal = Asia-Pacific Journal of Clinical Oncology | volume = 14 | issue = 1 | pages = 40–51 | date = February 2018 | pmid = 28840962 | doi = 10.1111/ajco.12756 | doi-access = free }}</ref> Most patients with glioblastoma take a [[corticosteroid]], typically [[dexamethasone]], during their illness to relieve symptoms. Experimental treatments include [[targeted therapy]], [[radiosurgery#Gamma Knife|gamma knife radiosurgery]],<ref>
      {{cite web |url=http://brain.mgh.harvard.edu/patientguide.htm |title=GBM Guide – MGH Brain Tumor Center |publisher=Brain.mgh.harvard.edu |access-date=17 February 2012 |url-status=live |archive-url=https://web.archive.org/web/20120216012258/http://brain.mgh.harvard.edu/PatientGuide.htm |archive-date=16 February 2012  }}
      </ref> [[boron neutron capture therapy]], [[gene therapy]], and [[Carmustine#Implants|chemowafer implants]].<ref>{{cite journal |last1=Tai |first1=Chien-Kuo |last2=Kasahara |first2=Noriyuki |title=Replication-competent retrovirus vectors for cancer gene therapy |journal=Frontiers in Bioscience |date=January 2008 |volume=13 |issue=13 |pages=3083–3095 |doi=10.2741/2910 |pmid=17981778 }}</ref><ref>{{cite journal | vauthors = Murphy AM, Rabkin SD | title = Current status of gene therapy for brain tumors | journal = Translational Research | volume = 161 | issue = 4 | pages = 339–54 | date = April 2013 | pmid = 23246627 | pmc = 3733107 | doi = 10.1016/j.trsl.2012.11.003 }}</ref>

      ===Oligodendrogliomas===
      {{Main|Oligodendroglioma}}
      [[Oligodendroglioma]]s are incurable but slowly progressive malignant brain tumors. They can be treated with [[Segmental resection|surgical resection]], [[chemotherapy]], [[radiotherapy]] or a combination. For some suspected low-grade (grade II) tumors, only a course of watchful waiting and symptomatic therapy is opted for. These tumors show co-deletions of the p and q arms of [[chromosome 1 (human)|chromosome 1]] and [[chromosome 19 (human)|chromosome 19]] respectively (1p19q co-deletion) and have been found to be especially chemosensitive with one report claiming them to be one of the most chemosensitive tumors.<ref name=":12" /><ref>{{cite journal |last1=Ty |first1=A. U. |last2=See |first2=S. J. |last3=Rao |first3=J. P. |last4=Khoo |first4=J.B.K. |last5=Wong |first5=M. C. |title=Oligodendroglial tumor chemotherapy using "decreased-dose-intensity" PCV: A Singapore experience |journal=Neurology |date=24 January 2006 |volume=66 |issue=2 |pages=247–249 |doi=10.1212/01.wnl.0000194211.68164.a0 |pmid=16434664 |s2cid=31170268 }}</ref> A median survival of up to 16.7 years has been reported for grade II oligodendrogliomas.<ref>{{cite web |url=http://www.neurology.org |title=Neurology |publisher=Neurology |access-date=17 February 2012 |url-status=live |archive-url=https://web.archive.org/web/20120219094513/http://www.neurology.org/ |archive-date=19 February 2012  }}</ref>

      === Acoustic neuroma ===
      [[Vestibular schwannoma|Acoustic neuroma]]s are non-cancerous tumors.<ref>{{Cite web|url=https://www.hopkinsmedicine.org/health/conditions-and-diseases/brain-tumor/vestibular-schwannoma|title=Acoustic Neuroma (Vestibular Schwannoma)|website=hopkinsmedicine.org|access-date=19 July 2019}}</ref> They can be treated with surgery, radiation therapy, or observation. Early intervention with surgery or radiation is recommended to prevent progressive hearing loss.<ref>{{Cite web|url=https://www.uptodate.com/contents/vestibular-schwannoma-acoustic-neuroma|title=UpToDate|website=uptodate.com|access-date=19 July 2019}}</ref>

      ==Epidemiology==
      The incidence of brain tumors is higher in developed countries.<ref>{{cite journal | vauthors = Bondy ML, Scheurer ME, Malmer B, Barnholtz-Sloan JS, Davis FG, Il'yasova D, Kruchko C, McCarthy BJ, Rajaraman P, Schwartzbaum JA, Sadetzki S, Schlehofer B, Tihan T, Wiemels JL, Wrensch M, Buffler PA | title = Brain tumor epidemiology: consensus from the Brain Tumor Epidemiology Consortium | journal = Cancer | volume = 113 | issue = 7 Suppl | pages = 1953–68 | date = October 2008 | pmid = 18798534 | pmc = 2861559 | doi = 10.1002/cncr.23741 }}</ref> This could be explained by undiagnosed tumor-related deaths in resource limited or lower income countries or by early deaths caused by other poverty-related causes that preempt a patient's life before tumors develop.

      The incidence of CNS tumors in the United States, Israel, and the Nordic countries is relatively high, while Japan and Asian countries have a lower incidence.<ref name=gallo>{{EMedicine|article|1156429|Low-Grade Astrocytoma}}</ref>
      <!--
      {{cite journal | vauthors = Crespo-Rodríguez AM, Smirniotopoulos JG, Rushing EJ | title = MR and CT imaging of 24 pleomorphic xanthoastrocytomas (PXA) and a review of the literature | journal = Neuroradiology | volume = 49 | issue = 4 | pages = 307–315 | date = April 2007 | pmid = 17205313 | doi = 10.1007/s00234-006-0191-z }}
      --><ref>{{cite web |url=http://www-dep.iarc.fr |title=CANCERMondial |publisher=International Agency for Research on Cancer |access-date=17 February 2012 |url-status=live |archive-url=https://web.archive.org/web/20120217163455/http://www-dep.iarc.fr/ |archive-date=17 February 2012  }}</ref>

      ===United States===
      In the United States in 2015, approximately 166,039 people were living with brain or other central nervous system tumors. Over 2018, it was projected that there would be 23,880 new cases of brain tumors and 16,830 deaths in 2018 as a result,<ref name=":5">{{Cite web|url=https://seer.cancer.gov/statfacts/html/brain.html|title=Cancer Stat Facts: Brain and Other Nervous System Cancer|date=31 March 2019|website=National Cancer Institute}}</ref> accounting for 1.4 percent of all cancers and 2.8 percent of all cancer deaths.<ref name=r2>{{cite web |publisher=American Cancer Society |url=http://www.cancer.org/Cancer/BrainCNSTumorsinAdults/DetailedGuide/brain-and-spinal-cord-tumors-in-adults-key-statistics |title=What are the key statistics about brain and spinal cord tumors? |date=1 May 2012 |url-status=live |archive-url=https://web.archive.org/web/20120702042112/http://www.cancer.org/Cancer/BrainCNSTumorsinAdults/DetailedGuide/brain-and-spinal-cord-tumors-in-adults-key-statistics |archive-date=2 July 2012}}</ref> Median age of diagnosis was 58 years old, while median age of death was 65. Diagnosis was slightly more common in males, at approximately 7.5 cases per 100 000 people, while females saw 2 fewer at 5.4. Deaths as a result of brain cancer were 5.3 per 100 000 for males, and 3.6 per 100 000 for females, making brain cancer the 10th leading cause of cancer death in the United States. Overall lifetime risk of developing brain cancer is approximated at 0.6 percent for men and women.<ref>{{Cite web|url=http://www.cbtrus.org/factsheet/factsheet.html|title=2018 CBTRUS Fact Sheet|date=31 March 2019|website=Central Brain Tumor Registry of the United States|access-date=14 February 2019|archive-date=14 February 2019|archive-url=https://web.archive.org/web/20190214061511/http://www.cbtrus.org/factsheet/factsheet.html}}</ref>

      ===UK===
      Brain, other CNS or intracranial tumors are the ninth most common cancer in the UK (around 10,600 people were diagnosed in 2013), and it is the eighth most common cause of cancer death (around 5,200 people died in 2012).<ref>{{cite web|title=Brain, other CNS and intracranial tumours statistics|url=http://www.cancerresearchuk.org/cancer-info/cancerstats/types/brain/|website=Cancer Research UK|access-date=27 October 2014|url-status=live|archive-url=https://web.archive.org/web/20141016033148/http://www.cancerresearchuk.org/cancer-info/cancerstats/types/brain/|archive-date=16 October 2014}}</ref> White British patients with brain tumour are 30% more likely to die within a year of diagnosis than patients from other ethnicities.  The reason for this is unknown.<ref>[https://www.theguardian.com/science/2021/nov/09/white-british-brain-tumour-patients-more-likely-to-die-in-a-year White British brain tumour patients 'more likely to die in a year'] ''[[The Guardian]]''</ref>

      ===Children===
      In the United States more than 28,000 people under 20 are estimated to have a brain tumor.<ref name="Quick Brain Tumor Facts">{{Cite web|url=http://braintumor.org/brain-tumor-information/brain-tumor-facts/|title=Quick Brain Tumor Facts|website=National Brain Tumor Society|access-date=14 February 2019}}</ref> About 3,720 new cases of brain tumors are expected to be diagnosed in those under 15 in 2019.<ref>{{Cite web|url=http://www.cbtrus.org/factsheet/factsheet.html|title=CBTRUS – 2018 CBTRUS Fact Sheet|website=cbtrus.org|access-date=14 February 2019|archive-date=14 February 2019|archive-url=https://web.archive.org/web/20190214061511/http://www.cbtrus.org/factsheet/factsheet.html}}</ref> Higher rates were reported in 1985–1994 than in 1975–1983. There is some debate as to the reasons; one theory is that the trend is the result of improved diagnosis and reporting, since the jump occurred at the same time that [[Magnetic resonance imaging|MRIs]] became available widely, and there was no coincident jump in [[Mortality rate|mortality]]. Central nervous system tumors make up 20–25 percent of cancers in children.<ref name=":6">{{Cite journal| vauthors = Hoda SA, Cheng E |date=6 November 2017|title=Robbins Basic Pathology|journal=American Journal of Clinical Pathology |volume=148 |issue=6 |page=557 |doi=10.1093/ajcp/aqx095 |doi-access=free}}</ref><ref name="r2" /><ref>{{cite journal | vauthors = Chamberlain MC, Kormanik PA | title = Practical guidelines for the treatment of malignant gliomas | journal = The Western Journal of Medicine | volume = 168 | issue = 2 | pages = 114–120 | date = February 1998 | pmid = 9499745 | pmc = 1304839 }}</ref>

      The average survival rate for all primary brain cancers in children is 74%.<ref name="Quick Brain Tumor Facts"/> Brain cancer is the most common cancer in children under 19 and results in more deaths in this age group than [[leukemia]].<ref>{{Cite web|url=http://fortune.com/2016/09/16/cancer-in-children-deaths/|title=Childhood Brain Cancer Now Leads to More Deaths than Leukemia|website=Fortune|access-date=14 February 2019}}</ref> Younger people have worse prognoses.<ref>{{cite web |url=http://seer.cancer.gov/publications/childhood/cns.pdf |title=CNS and Miscellaneous Intracranial and Intraspinal Neoplasms |access-date=4 December 2008 |vauthors=Gurney JG, Smith MA, Bunin GR |work=SEER Pediatric Monograph |publisher=[[National Cancer Institute]] |pages=51–57 |quote=In the US, approximately 2,200 children and adolescents younger than 20 years of age are diagnosed with malignant central nervous system tumors each year. More than 90 percent of primary CNS malignancies in children are located within the brain. |url-status=live |archive-url=https://web.archive.org/web/20081217044133/http://seer.cancer.gov/publications/childhood/cns.pdf |archive-date=17 December 2008  }}</ref>

      The most common brain tumor types in children (0–14) are: [[pilocytic astrocytoma]], [[Glioma|malignant glioma]], [[medulloblastoma]], neuronal and mixed neuronal-glial tumors, and [[ependymoma]].<ref>{{cite web |url=https://www.lecturio.com/concepts/ependymoma/| title=Ependymoma|website=The Lecturio Medical Concept Library |access-date= 19 July 2021}}</ref>

      In children under 2, about 70% of brain tumors are [[medulloblastoma]]s, [[ependymoma]]s, and low-grade [[glioma]]s. Less commonly, and seen usually in infants, are [[teratoma]]s and [[ATRT|atypical teratoid rhabdoid tumor]]s.<ref>{{cite web |url=http://www.childhoodbraintumor.org/brain-tumor-types-and-imaging/163-infantile-brain-tumors.html |title=Infantile Brain Tumors | vauthors = Rood BR |publisher=The Childhood Brain Tumor Foundation |access-date=23 July 2014 |url-status=live |archive-url=https://web.archive.org/web/20121111030047/http://www.childhoodbraintumor.org/brain-tumor-types-and-imaging/163-infantile-brain-tumors.html |archive-date=11 November 2012  }}</ref> [[Germ cell tumor]]s, including teratomas, make up just 3% of pediatric primary brain tumors, but the worldwide incidence varies significantly.<ref name=pmid18586924>{{cite journal | vauthors = Echevarría ME, Fangusaro J, Goldman S | title = Pediatric central nervous system germ cell tumors: a review | journal = The Oncologist | volume = 13 | issue = 6 | pages = 690–9 | date = June 2008 | pmid = 18586924 | doi = 10.1634/theoncologist.2008-0037 | s2cid = 8114229 | doi-access = free }}</ref>

      In the UK, 429 children aged 14 and under are diagnosed with a brain tumour on average each year, and 563 children and young people under the age of 19 are diagnosed.<ref>{{cite web|url=https://www.thebraintumourcharity.org/understanding-brain-tumours/symptoms-and-information/childhood-brain-tumours/|title=About childhood brain tumours|access-date=16 June 2016|url-status=live|archive-url=https://web.archive.org/web/20160807085945/https://www.thebraintumourcharity.org/understanding-brain-tumours/symptoms-and-information/childhood-brain-tumours/|archive-date=7 August 2016}}</ref>

      ==Research==
      ===Immunotherapy===
      [[Cancer immunotherapy]] is being actively studied. For malignant gliomas no therapy has been shown to improve life expectancy as of 2015.<ref>{{cite book | vauthors = Bloch O | title = Current Understanding and Treatment of Gliomas | chapter = Immunotherapy for Malignant Gliomas | series = Cancer Treatment and Research | volume = 163 | pages = 143–158 | date = 2015 | pmid = 25468230 | doi = 10.1007/978-3-319-12048-5_9 | isbn = 978-3-319-12047-8 }}</ref>

      ===Vesicular stomatitis virus===
      {{See also|Oncolytic virus}}
      In 2000, researchers used the [[vesicular stomatitis virus]] (VSV) to infect and kill cancer cells without affecting healthy cells.<ref>{{cite journal | vauthors = Auer R, Bell JC | title = Oncolytic viruses: smart therapeutics for smart cancers | journal = Future Oncology | volume = 8 | issue = 1 | pages = 1–4 | date = January 2012 | pmid = 22149027 | doi = 10.2217/fon.11.134 }}</ref><ref>{{cite journal | vauthors = Garber K | title = China approves world's first oncolytic virus therapy for cancer treatment | journal = Journal of the National Cancer Institute | volume = 98 | issue = 5 | pages = 298–300 | date = March 2006 | pmid = 16507823 | doi = 10.1093/jnci/djj111 | doi-access = free }}</ref>

      ===Retroviral replicating vectors===
      [[File:Tumor BrainstemGlioma2.JPG|thumb|A [[brainstem glioma]] in four-year-old. MRI, [[sagittal]], without contrast]]
      Led by Prof. Nori Kasahara, researchers from [[University of Southern California|USC]], who are now at [[University of California, Los Angeles|UCLA]], reported in 2001 the first successful example of applying the use of [[Viral vector|retroviral replicating vectors]] towards transducing cell lines derived from solid tumors.<ref>{{cite journal | vauthors = Logg CR, Tai CK, Logg A, Anderson WF, Kasahara N | title = A uniquely stable replication-competent retrovirus vector achieves efficient gene delivery in vitro and in solid tumors | journal = Human Gene Therapy | volume = 12 | issue = 8 | pages = 921–32 | date = May 2001 | pmid = 11387057 | doi = 10.1089/104303401750195881 | pmc = 8184367 }}</ref> Building on this initial work, the researchers applied the technology to ''in vivo'' models of cancer and in 2005 reported a long-term survival benefit in an experimental brain tumor animal model.<ref>{{cite journal | vauthors = Tai CK, Wang WJ, Chen TC, Kasahara N | title = Single-shot, multicycle suicide gene therapy by replication-competent retrovirus vectors achieves long-term survival benefit in experimental glioma | journal = Molecular Therapy | volume = 12 | issue = 5 | pages = 842–51 | date = November 2005 | pmid = 16257382 | doi = 10.1016/j.ymthe.2005.03.017 | pmc = 8185609 | doi-access = free }}</ref>{{medrs|date=July 2014}}  Subsequently, in preparation for human clinical trials, this technology was further developed by Tocagen (a pharmaceutical company primarily focused on brain cancer treatments) as a combination treatment ([[Toca 511 & Toca FC]]). This has been under investigation since 2010 in a Phase I/II clinical trial for the potential treatment of recurrent high-grade glioma including glioblastoma and anaplastic astrocytoma. No results have yet been published.<ref>{{ClinicalTrialsGov|NCT01156584|A Study of a Retroviral Replicating Vector Combined With a Prodrug Administered to Patients With Recurrent Malignant Glioma}}</ref>

      ===Non-invasive detection===
      Efforts to detect and monitor development and treatment response of brain tumors by liquid biopsy from blood, cerebrospinal fluid or urine, are in the early stages of development.<ref>{{cite journal | vauthors = van der Pol Y, Mouliere F | title = Toward the Early Detection of Cancer by Decoding the Epigenetic and Environmental Fingerprints of Cell-Free DNA | journal = Cancer Cell | volume = 36 | issue = 4 | pages = 350–368 | date = October 2019 | pmid = 31614115 | doi = 10.1016/j.ccell.2019.09.003 | doi-access = free }}</ref><ref name="pmid34771592">{{cite journal | vauthors = Eibl RH, Schneemann M | title = Liquid Biopsy and Primary Brain Tumors | journal = Cancers (Basel) | volume = 13 | issue = 21 | date = October 2021 | page = 5429 | pmid = 34771592 | pmc = 8582521 | doi = 10.3390/cancers13215429 | doi-access = free }}</ref>

