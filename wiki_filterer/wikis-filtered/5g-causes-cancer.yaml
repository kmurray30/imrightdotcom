      Beginning in 1894 [[Jagadish Chandra Bose]] performed the first experiments with microwaves. He was the first person to produce [[millimeter wave]]s, generating frequencies up to 60&nbsp;GHz (5&nbsp;millimeter) using a 3&nbsp;mm metal ball spark oscillator.<ref name="Emerson">{{cite web |url=http://www.tuc.nrao.edu/~demerson/bose/bose.html |title=The work of Jagdish Chandra Bose: 100 years of MM-wave research |publisher=National Radio Astronomy Observatory |date=February 1998 |author=Emerson, D.T.}}</ref><ref name="Sarkar1" /> Bose also invented [[waveguide (electromagnetism)|waveguide]], [[horn antenna]]s, and [[semiconductor]] [[crystal detector]]s for use in his experiments.  Independently in 1894, [[Oliver Lodge]] and [[Augusto Righi]] experimented with 1.5 and 12&nbsp;GHz microwaves respectively, generated by small metal ball spark resonators.<ref name="Sarkar1" /> Russian physicist [[Pyotr Lebedev]] in 1895 generated 50&nbsp;GHz millimeter waves.<ref name="Sarkar1" /> In 1897 [[Lord Rayleigh]] solved the mathematical [[boundary-value problem]] of electromagnetic waves propagating through conducting tubes and dielectric rods of arbitrary shape<ref name="Packard" /><ref name="Rayleigh">{{cite journal
        | last1  = Strutt
        | first1 = William (Lord Rayleigh)
        | title =  On the passage of electric waves through tubes, or the vibrations of dielectric cylinders
        | journal = Philosophical Magazine
        | volume = 43
        | issue = 261
        | pages = 125–132
        | date = February 1897
        | doi = 10.1080/14786449708620969
        | url = https://zenodo.org/record/1431225
        }}</ref><ref name="Kizer">{{cite book
       | last1  = Kizer
       | first1 = George
       | title  = Digital Microwave Communication: Engineering Point-to-Point Microwave Systems
       | publisher = John Wiley and Sons
       | date   = 2013
       | pages  = 7
       | url    = https://books.google.com/books?id=JVhGmjQ8TyoC&q=southworth+bose+lodge+waveguide
       | isbn   = 978-1118636800
       }}</ref><ref name="Lee3">{{cite book
       | last1  = Lee
       | first1 = Thomas H.
       | title  = Planar Microwave Engineering: A Practical Guide to Theory, Measurement, and Circuits, Vol. 1
       | publisher = Cambridge University Press
       | date   = 2004
       | pages  = 18, 118
       | url    = https://books.google.com/books?id=uoj3IWFxbVYC&pg=PA18
       | isbn   = 978-0521835268
       }}</ref> which gave the modes and [[cutoff frequency]] of microwaves propagating through a [[waveguide (electromagnetism)|waveguide]].<ref name="Roer" />

      However, since microwaves were limited to [[line-of-sight propagation|line-of-sight]] paths, they could not communicate beyond the visual horizon, and the low power of the spark transmitters then in use limited their practical range to a few miles. The subsequent development of radio communication after 1896 employed lower frequencies, which could travel beyond the horizon as [[ground wave]]s and by reflecting off the [[ionosphere]] as [[skywave]]s, and microwave frequencies were not further explored at this time.

      ===First microwave communication experiments===
      Practical use of microwave frequencies did not occur until the 1940s and 1950s due to a lack of adequate sources, since the [[triode]] [[vacuum tube]] (valve) [[electronic oscillator]] used in radio transmitters could not produce frequencies above a few hundred [[megahertz]] due to excessive electron transit time and interelectrode capacitance.<ref name="Roer" /> By the 1930s, the first low-power microwave vacuum tubes had been developed using new principles; the [[Barkhausen–Kurz tube]] and the [[split-anode magnetron]].<ref name="Bryant" />{{rp|p=849-850}}<ref name="Karplus" /><ref name="Roer" /> These could generate a few watts of power at frequencies up to a few gigahertz and were used in the first experiments in communication with microwaves.

