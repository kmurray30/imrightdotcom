      ===Near ultraviolet radiation===
      Ultraviolet light can cause [[burn (injury)|burns]] to skin<ref name="uvlight">{{cite web
      |url=http://www.ehs.washington.edu/rsononion/uvlight.shtm
      |title=UW EH&S Hazards of Ultraviolet Light
      |access-date=6 May 2007
      |archive-date=4 March 2016
      |archive-url=https://web.archive.org/web/20160304035328/http://www.ehs.washington.edu/rsononion/uvlight.shtm
      |url-status=live
      }}</ref> and [[cataract]]s to the eyes.<ref name="uvlight"/> Ultraviolet is classified into near, medium and far UV according to energy, where near and medium ultraviolet are technically non-ionizing, but where all UV wavelengths can cause photochemical reactions that to some extent mimic ionization (including DNA damage and carcinogenesis). UV radiation above 10 eV (wavelength shorter than 125&nbsp;nm) is considered ionizing. However, the rest of the UV spectrum from 3.1 eV (400&nbsp;nm) to 10 eV, although technically non-ionizing, can produce photochemical reactions that are damaging to molecules by means other than simple heat. Since these reactions are often very similar to those caused by ionizing radiation, often the entire UV spectrum is considered to be equivalent to ionization radiation in its interaction with many systems (including biological systems).

      For example, ultraviolet light, even in the non-ionizing range, can produce [[free radical]]s that induce cellular damage, and can be [[carcinogenic]]. Photochemistry such as [[pyrimidine dimer]] formation in DNA can happen through most of the UV band, including much of the band that is formally non-ionizing. Ultraviolet light induces [[melanin]] production from [[melanocyte]] cells to cause [[sun tanning]] of skin. [[Vitamin D]] is produced on the skin by a radical reaction initiated by UV radiation.

      Plastic ([[polycarbonate]]) sunglasses generally absorb UV radiation. UV overexposure to the eyes causes [[snow blindness]], common to areas with reflective surfaces, such as snow or water.<!-- TODO: Occupational Exposure Standards, Protection Against Overexposure, Recommended Maximum Permissible Exposure Levels -->

      ===Visible light===
      {{Main|Light}}
      Light, or visible light, is the very narrow range of electromagnetic radiation that is visible to the human eye (about 400–700&nbsp;nm), or up to 380–750&nbsp;nm.<ref name="ICNIR2003"/> More broadly, physicists refer to light as electromagnetic radiation of all wavelengths, whether visible or not.

      [[High-energy visible light]] is blue-violet light with a higher damaging potential.

      ===Infrared===
      {{Main|Infrared}}
      Infrared (IR) light is electromagnetic radiation with a wavelength between 0.7 and 300 micrometers, which equates to a frequency range between approximately 1 and 430 THz. IR wavelengths are longer than that of visible light, but shorter than that of terahertz radiation microwaves. Bright sunlight provides an irradiance of just over 1 kilowatt per square meter at sea level. Of this energy, 527 watts is infrared radiation, 445 watts is visible light, and 32 watts is ultraviolet radiation.<ref name="ICNIR2003" />

      ===Microwave===
      {{Main|Microwave}}
      Microwaves are electromagnetic waves with wavelengths ranging from as long as one meter to as short as one millimeter, or equivalently, with frequencies between 300&nbsp;MHz (0.3&nbsp;GHz) and 300&nbsp;GHz. This broad definition includes both UHF and EHF (millimeter waves), and various sources use different boundaries.<ref name="ICNIR2003" /> In all cases, microwave includes the entire SHF band (3 to 30&nbsp;GHz, or 10 to 1&nbsp;cm) at minimum, with RF engineering often putting the lower boundary at 1&nbsp;GHz (30&nbsp;cm), and the upper around 100&nbsp;GHz (3mm). Applications include cellphone (mobile) telephones, radars, airport scanners, microwave ovens, earth [[remote sensing]] satellites, and radio and satellite communications.

      ===Radio waves===
      {{Main|Radio waves}}
      Radio waves are a type of electromagnetic radiation with wavelengths in the electromagnetic spectrum longer than infrared light. Like all other electromagnetic waves, they travel at the speed of light. Naturally occurring radio waves are made by lightning, or by astronomical objects. Artificially generated radio waves are used for fixed and mobile radio communication, broadcasting, radar and other navigation systems, satellite communication, computer networks and innumerable other applications. Different frequencies of radio waves have different propagation characteristics in the Earth's atmosphere; long waves may cover a part of the Earth very consistently, shorter waves can reflect off the ionosphere and travel around the world, and much shorter wavelengths bend or reflect very little and travel on a line of sight.

      ===Very low frequency (VLF)===
      Very low frequency or VLF is the range of RF of 3 to 30&nbsp;kHz. Since there is not much bandwidth in this band of the radio spectrum, only the very simplest signals are used, such as for radio navigation. Also known as the [[Orders of magnitude (length)|myriametre]] band or myriametre wave as the wavelengths range from ten to one myriametre (an obsolete metric unit equal to 10 kilometres).

      ===Extremely low frequency (ELF)===
      Extremely low frequency (ELF) is the range of radiation frequencies from 300&nbsp;Hz to 3&nbsp;kHz. In atmosphere science, an alternative definition is usually given, from 3&nbsp;Hz to 3&nbsp;kHz.<ref name="ICNIR2003" /> In the related magnetosphere science, the lower frequency electromagnetic oscillations (pulsations occurring below ~3&nbsp;Hz) are considered to be in the ULF range, which is thus also defined differently from the ITU Radio Bands.

      ===Thermal radiation===
      {{Main|Thermal radiation}}
      Thermal radiation, a common synonym for infrared when it occurs at temperatures commonly encountered on Earth, is the process by which the surface of an object radiates its [[thermal energy]] in the form of electromagnetic waves. Infrared radiation that one can feel emanating from a household heater, [[heat lamp|infra-red heat lamp]], or kitchen oven are examples of thermal radiation, as is the IR and visible light emitted by a glowing [[incandescent light bulb]] (not hot enough to emit the blue high frequencies and therefore appearing yellowish; fluorescent lamps are not thermal and can appear bluer). Thermal radiation is generated when the energy from the movement of charged particles within molecules is converted to the [[radiant energy]] of electromagnetic waves. The emitted wave frequency of the thermal radiation is a probability distribution depending only on temperature, and for a [[black body]] is given by Planck's law of radiation. [[Wien's displacement law]] gives the most likely frequency of the emitted radiation, and the [[Stefan–Boltzmann law]] gives the heat intensity (power emitted per area).

      Parts of the electromagnetic spectrum of thermal radiation may be ionizing, if the object emitting the radiation is hot enough (has a high enough [[temperature]]). A common example of such radiation is sunlight, which is thermal radiation from the Sun's [[photosphere]] and which contains enough ultraviolet light to cause ionization in many molecules and atoms. An extreme example is the flash from the detonation of a [[nuclear weapon]], which emits a large number of ionizing X-rays purely as a product of heating the atmosphere around the bomb to extremely high temperatures.

      As noted above, even low-frequency thermal radiation may cause temperature-ionization whenever it deposits sufficient thermal energy to raises temperatures to a high enough level. Common examples of this are the ionization (plasma) seen in common flames, and the molecular changes caused by the "[[browning (chemical process)|browning]]" in food-cooking, which is a chemical process that begins with a large component of ionization.

      ===Black-body radiation===
      {{Main|Black-body radiation}}
      ''[[Black body|Black-body]] radiation'' is radiation from an idealized radiator that emits at any temperature the maximum possible amount of radiation at any given wavelength. A black body will also absorb the maximum possible incident radiation at any given wavelength. The radiation emitted covers the entire electromagnetic spectrum and the intensity (power/unit-area) at a given frequency is dictated by [[Planck's law]] of radiation. A black body at temperatures at or below room temperature would thus appear absolutely black as it would not reflect any light. Theoretically a black body emits electromagnetic radiation over the entire spectrum from very low frequency radio waves to X-rays. The frequency at which the black-body radiation is at maximum is given by [[Wien's displacement law]].

