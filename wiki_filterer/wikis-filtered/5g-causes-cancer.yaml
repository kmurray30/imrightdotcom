    extract: A glioma is a type of malignant tumor originating in the glial cells of the brain or spinal cord. Gliomas comprise about 30% of all brain and central nervous system tumors and 80% of all malignant brain tumors. Common subtypes include astrocytoma (cancer of astrocytes), glioblastoma (an aggressive form of astrocytoma), oligodendroglioma (cancer of oligodendrocytes), and ependymoma (cancer of ependymal cells).
