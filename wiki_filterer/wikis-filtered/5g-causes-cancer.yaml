      }}
      A '''carcinogen''' ({{IPAc-en|k|ɑːr|ˈ|s|ɪ|n|ə|dʒ|ən}}) is any agent that promotes the development of [[cancer]].<ref name=":1">{{Cite web |title=Carcinogen |url=https://www.genome.gov/genetics-glossary/Carcinogen |access-date=2024-04-16 |website=www.genome.gov |language=en}}</ref>   Carcinogens can include [[synthetic chemical]]s, naturally occurring substances, physical agents such as ionizing and non-ionizing [[radiation]], and [[Biological agent|biologic agents]] such as viruses and [[carcinogenic bacteria|bacteria]].<ref name=":2" />  Most carcinogens act by creating mutations in [[DNA]] that disrupt a cell's normal processes for regulating growth, leading to uncontrolled cellular proliferation.<ref name=":1" /> This occurs when the cell's [[DNA repair]] processes fail to identify DNA damage allowing the defect to be passed down to [[daughter cells]]. The damage accumulates over time. This is typically a multi-step process during which the regulatory mechanisms within the cell are gradually dismantled allowing for unchecked [[Cell division|cellular division]].<ref name=":2">{{Cite web |title=Carcinogenesis |url=https://hemonc.mhmedical.com/content.aspx?sectionid=253777560&bookid=3022 |access-date=2024-04-16 |website=McGraw Hill Medical |language=en}}</ref>

      The specific mechanisms for carcinogenic activity is unique to each agent and cell type. Carcinogens can be broadly categorized, however,  as activation-dependent and activation-independent which relate to the agent's ability to engage directly with DNA.<ref name=":0">{{cite journal |vauthors=Barnes JL, Zubair M, John K, Poirier MC, Martin FL |date=October 2018 |title=Carcinogens and DNA damage |journal=Biochemical Society Transactions |volume=46 |issue=5 |pages=1213–1224 |doi=10.1042/bst20180519 |pmc=6195640 |pmid=30287511}}</ref> Activation-dependent agents are relatively inert in their original form, but are bioactivated in the body into [[metabolite]]s or intermediaries capable of damaging human DNA.<ref name=":4">{{Cite journal |url=https://portlandpress.com/biochemsoctrans/article/46/5/1213/67954/Carcinogens-and-DNA-damage |access-date=2024-04-17 |journal=Biochemical Society Transactions |doi=10.1042/bst20180519 |pmc=6195640 |pmid=30287511 |title=Carcinogens and DNA damage |date=2018 |last1=Barnes |first1=Jessica L. |last2=Zubair |first2=Maria |last3=John |first3=Kaarthik |last4=Poirier |first4=Miriam C. |last5=Martin |first5=Francis L. |volume=46 |issue=5 |pages=1213–1224 }}</ref> These are also known as "indirect-acting" carcinogens. Examples of activation-dependent carcinogens include [[polycyclic aromatic hydrocarbon]]s (PAHs), [[heterocyclic aromatic amine]]s, and [[mycotoxin]]s. Activation-independent carcinogens, or "direct-acting" carcinogens, are those that are capable of directly damaging DNA without any modification to their molecular structure. These agents typically include [[Electrophile|electrophilic]] groups that react readily with the net negative charge of DNA molecules.<ref name=":0" /> Examples of  activation-independent carcinogens include [[Ultraviolet|ultraviolet light]], [[ionizing radiation]] and [[alkylating agent]]s.<ref name=":4" />

      The time from exposure to a carcinogen to the development of cancer is known as the [[latency period]]. For most solid tumors in humans the latency period is between 10 and 40 years depending on cancer type.<ref name=":3">{{Cite book |last1=Ladou |last2=Harrison |title=Current Diagnosis and Treatment Occupational and Environmental Medicine |publisher=McGraw Hill Lange |year=2014 |isbn=978-1-260-14343-0 |edition=6th |pages=389–418}}</ref> For blood cancers, the latency period may be as short as two.<ref name=":3" /> Due to prolonged latency periods identification of carcinogens can be challenging.

      A number of organizations review and evaluate the cumulative scientific evidence regarding the potential carcinogenicity of specific substances. Foremost among these is the [[International Agency for Research on Cancer]] (IARC). IARC routinely publishes monographs in which specific substances are evaluated for their potential carcinogenicity to humans and subsequently categorized into one of four groupings: Group 1: Carcinogenic to humans, Group 2A: Probably carcinogenic to humans, Group 2B:  Possibly carcinogenic to humans and Group 3: Not classifiable as to its carcinogenicity to humans.<ref>{{Cite web |title=IARC Monographs on the Identification of Carcinogenic Hazards to Humans|url=https://monographs.iarc.who.int/ |access-date=2024-04-17 |website=monographs.iarc.who.int |language=en-US}}</ref> Other organizations that evaluate the carcinogenicity of substances include the [[National Toxicology Program]] of the [[US Public Health Service]], [[NIOSH]], the [[American Conference of Governmental Industrial Hygienists]] and others.<ref>{{Cite web |title=Determining if Something Is a Carcinogen |url=https://www.cancer.org/cancer/risk-prevention/understanding-cancer-risk/determining-if-something-is-a-carcinogen.html |access-date=2024-04-17 |website=www.cancer.org |language=en}}</ref>

      There are numerous sources of exposures to carcinogens including [[ultraviolet radiation]] from the sun, [[radon gas]]<ref>{{Cite web |last=CDC |date=2023-12-21 |title=Radon in the Home |url=https://www.cdc.gov/radon/radon-facts.html |access-date=2024-04-17 |website=Centers for Disease Control and Prevention |language=en-us}}</ref> emitted in residential basements, environmental contaminants such as [[chlordecone]], cigarette smoke and ingestion of some types of foods such as alcohol and [[processed meat]]s.<ref>{{Cite web |last=Underferth |first=Danielle |title=Processed meat and cancer: What you need to know |url=https://www.mdanderson.org/publications/focused-on-health/eat-less-processed-meat.h11-1590624.html |access-date=2024-04-17 |website=MD Anderson Cancer Center |language=en}}</ref> Occupational exposures represent a major source of carcinogens with an estimated 666,000 annual fatalities worldwide attributable to work related cancers.<ref name=":5">{{Cite journal |last1=Loomis |first1=Dana |last2=Guha |first2=Neela |last3=Hall |first3=Amy L |last4=Straif |first4=Kurt |date=August 2018 |title=Identifying occupational carcinogens: an update from the IARC Monographs |journal=Occupational and Environmental Medicine |language=en |volume=75 |issue=8 |pages=593–603 |doi=10.1136/oemed-2017-104944 |issn=1351-0711 |pmc=6204931 |pmid=29769352}}</ref> According to [[National Institute for Occupational Safety and Health|NIOSH]], 3-6% of cancers worldwide are due to occupational exposures.<ref name=":3" /> Well established occupational carcinogens include [[vinyl chloride]] and [[hemangiosarcoma]] of the liver, [[benzene]] and [[leukemia]], [[aniline dyes]] and [[bladder cancer]], [[asbestos]] and [[mesothelioma]], [[polycyclic aromatic hydrocarbon]]s and [[Chimney sweeps' carcinoma|scrotal cancer]] among chimney sweeps to name a few.

      == Radiation ==
      {{Main|Radiation-induced cancer}}

      === Ionizing Radiation ===
      [[CERCLA]] identifies all [[radionuclide]]s as carcinogens, although the nature of the emitted [[Radioactive decay|radiation]] ([[alpha particle|alpha]], [[beta particle|beta]], [[gamma ray|gamma]], or [[Neutron radiation|neutron]] and the radioactive strength), its consequent capacity to cause [[ionization]] in tissues, and the magnitude of radiation exposure, determine the potential hazard. Carcinogenicity of radiation depends on the type of radiation, type of exposure, and penetration. For example, [[alpha particle|alpha radiation]] has low penetration and is not a hazard outside the body, but emitters are carcinogenic when inhaled or ingested.  For example, [[Thorotrast]], a (incidentally radioactive) [[suspension (chemistry)|suspension]] previously used as a [[Radiocontrast|contrast]] medium in [[x-ray]] diagnostics, is a potent human carcinogen known because of its retention within various [[organ (biology)|organs]] and persistent emission of alpha particles.  Low-level ionizing radiation may induce irreparable DNA damage (leading to replicational and transcriptional errors needed for neoplasia or may trigger viral interactions) leading to pre-mature aging and [[cancer]].<ref>{{cite conference | vauthors = Acharya PV | title = The effect of ionizing radiation on the formation of age-correlated oligo deoxyribo nucleo phospheryl peptides in mammalian cells. | conference = 10th International Congress of Gerontology | location = Jerusalem | date = January 1975 }}</ref><ref>{{cite conference | vauthors = Acharya PV | title = Implications of The Action of Low-Level Ionizing Radiation on the Inducement of Irreparable DNA Damage Leading to Mammalian Aging and Chemical Carcinogenesis. | conference = 10th International Congress of Biochemistry | location = Hamburg, Germany | date = July 1976 }}</ref><ref>{{cite conference | vauthors = Acharya PV | title = Irreparable DNA-Damage by Industrial Pollutants in Pre-mature Aging, Chemical Carcinogenesis, and Cardiac Hypertrophy: Experiments and Theory | conference = 1st International Meeting of Heads of Clinical Biochemistry Laboratories | location = Jerusalem, Israel | date = April 1977 }}</ref>

      === Non-ionizing radiation ===
      Not all types of electromagnetic radiation are carcinogenic. Low-energy waves on the [[electromagnetic spectrum]] including [[radio wave]]s, [[microwave]]s, [[infrared radiation]] and [[visible light]] are thought not to be, because they have insufficient energy to break chemical bonds. Evidence for carcinogenic effects of non-ionizing radiation is generally [[Electromagnetic radiation and health|inconclusive]], though there are some documented cases of radar technicians with prolonged high exposure experiencing significantly higher cancer incidence.<ref>{{cite journal | vauthors = Richter E, Berman T, Ben-Michael E, Laster R, Westin JB | title = Cancer in radar technicians exposed to radiofrequency/microwave radiation: sentinel episodes | journal = International Journal of Occupational and Environmental Health | volume = 6 | issue = 3 | pages = 187–193 | year = 2000 | pmid = 10926722 | doi = 10.1179/oeh.2000.6.3.187 | s2cid = 25147479 }}</ref>

      Higher-energy radiation, including [[ultraviolet radiation]] (present in [[sunlight]]) generally ''is'' carcinogenic, if received in sufficient doses.   For most people, ultraviolet radiations from sunlight is the most common cause of skin cancer.  In Australia, where people with pale skin are often exposed to strong sunlight, [[melanoma]] is the most common cancer diagnosed in people aged 15–44 years.<ref>{{cite web|url=http://www.cancer.org.au/cancersmartlifestyle/SunSmart/Skincancerfactsandfigures.htm|title=Skin Cancer Facts and Figures|access-date=2010-07-02|archive-date=2012-08-10|archive-url=https://web.archive.org/web/20120810071104/http://www.cancer.org.au/cancersmartlifestyle/SunSmart/Skincancerfactsandfigures.htm|url-status=dead}}</ref><ref>{{cite web| url = https://www.newscientist.com/article/dn13922-skintone-gene-could-predict-cancer-risk.html| title = Skin-tone gene could predict cancer risk}}</ref>

      Substances or [[Food irradiation|foods]] irradiated with electrons or electromagnetic radiation (such as microwave, X-ray or gamma) are not carcinogenic.<ref>{{cite web |author1=Center for Food Safety and Applied Nutrition |author1-link=Center for Food Safety and Applied Nutrition |title=Food Irradiation: What You Need to Know |url=https://www.fda.gov/food/buy-store-serve-safe-food/food-irradiation-what-you-need-know |website=FDA |access-date=20 January 2021 |language=en |date=20 April 2020}}</ref> In contrast, non-electromagnetic [[neutron radiation]] produced inside nuclear reactors can produce secondary radiation through [[nuclear transmutation]].

      == Common carcinogens associated with food ==
      === Alcohol ===
      {{main|Alcohol and cancer}}
      [[Alcohol (drug)|Alcohol]] is a carcinogen of the head and neck, esophagus, liver, colon and rectum, and breast. It has a synergistic effect with tobacco smoke in the development of head and neck cancers. In the United States approximately 6% of cancers and 4% of cancer deaths are attributable to alcohol use.<ref>{{Cite web |title=Alcohol Use and Cancer |url=https://www.cancer.org/cancer/risk-prevention/diet-physical-activity/alcohol-use-and-cancer.html |access-date=2024-04-17 |website=www.cancer.org |language=en}}</ref>

      === Processed meats ===
      Chemicals used in processed and cured meat such as some brands of bacon, sausages and ham may produce carcinogens.<ref>{{cite news |url=https://www.bbc.co.uk/news/health-34615621 |title=Processed meats do cause cancer - WHO|date= 26 October 2015 |work=BBC }}</ref> For example, nitrites used as food preservatives in cured meat such as bacon have also been noted as being carcinogenic with demographic links, but not causation, to colon cancer.<ref>{{cite journal | vauthors = Scanlan RA | title = Formation and occurrence of nitrosamines in food | journal = Cancer Research | volume = 43 | issue = 5 Suppl | pages = 2435s–2440s | date = May 1983 | pmid = 6831466 }}</ref>

      === Meats cooked at high temperatures ===
      {{See also|Cooking#Carcinogens|Raw foodism}}
      Cooking food at high temperatures, for example [[grilling]] or [[barbecuing]] meats, may also lead to the formation of minute quantities of many potent carcinogens that are comparable to those found in cigarette smoke (i.e., [[benzo(a)pyrene|benzo[''a'']pyrene]]).<ref name="pmid9827527">{{cite journal | vauthors = Zheng W, Gustafson DR, Sinha R, Cerhan JR, Moore D, Hong CP, Anderson KE, Kushi LH, Sellers TA, Folsom AR | title = Well-done meat intake and the risk of breast cancer | journal = Journal of the National Cancer Institute | volume = 90 | issue = 22 | pages = 1724–1729 | date = November 1998 | pmid = 9827527 | doi = 10.1093/jnci/90.22.1724 | doi-access = free }}</ref> [[Charring]] of food looks like [[coking]] and tobacco [[pyrolysis]], and produces carcinogens. There are several carcinogenic pyrolysis products, such as polynuclear aromatic hydrocarbons, which are converted by human [[enzyme]]s into [[epoxide]]s, which attach permanently to DNA. Pre-cooking meats in a [[microwave oven]] for 2–3 minutes before grilling shortens the time on the hot pan, and removes heterocyclic amine (HCA) precursors, which can help minimize the formation of these carcinogens.<ref>{{cite web|url=http://www.cancer.gov/cancertopics/factsheet/Risk/heterocyclic-amines |title=National Cancer Institute, 2004 analysis and recommendations |publisher=Cancer.gov |date=2004-09-15 |access-date=2010-09-22}}</ref>

      === Acrylamide in foods ===
      Frying, grilling or broiling food at high temperatures, especially starchy foods, until a toasted crust is formed generates [[acrylamide]]s. This discovery in 2002 led to international health concerns. Subsequent research has however found that it is not likely that the acrylamides in burnt or well-cooked food cause cancer in humans; [[Cancer Research UK]] categorizes the idea that burnt food causes cancer as a "myth".<ref name="cruk">{{cite web |url=https://www.cancerresearchuk.org/about-cancer/causes-of-cancer/cancer-myths/can-eating-burnt-foods-cause-cancer |publisher=Cancer Research UK |title=Can eating burnt foods cause cancer? |date=15 October 2021 }}</ref>

      == Biologic Agents ==
      Several biologic agents are known carcinogens.

      [[Aflatoxin]] B<sub>1</sub>, a toxin produced by the [[fungus]] ''[[Aspergillus flavus]]'' which is a common contaminant of stored [[cereal|grains]] and [[nut (fruit)|nuts]] is a known cause of [[Hepatocellular carcinoma|hepatocellular cancer]]. The bacteria [[Helicobacter pylori|H. Pylori]] is known to cause stomach cancer and [[MALT lymphoma]].<ref>{{Cite web |last=cancer |first=Canadian Cancer Society / Société canadienne du |title=Helicobacter pylori |url=https://cancer.ca/en/cancer-information/reduce-your-risk/get-vaccinated/helicobacter-pylori |access-date=2024-04-17 |website=Canadian Cancer Society |language=en}}</ref> [[Hepatitis B]] and C are associated with the development of hepatocellular cancer. [[Human papillomavirus infection|HPV]] is the primary cause of [[cervical cancer]].

      == Cigarette smoke ==
      {{Main|Health effects of tobacco}}

      Tobacco smoke contains at least 70 known carcinogens and is implicated in the development of numerous types of cancers including cancers of the lung, larynx, esophagus, stomach, kidney, pancreas, liver, bladder, cervix, colon, rectum and blood.<ref>{{Cite web |last=CDC |date=2019-08-27 |title=Cancer and Tobacco Use |url=https://www.cdc.gov/vitalsigns/cancerandtobacco/index.html |access-date=2024-04-17 |website=Centers for Disease Control and Prevention |language=en-us}}</ref> Potent carcinogens found in cigarette smoke include [[polycyclic aromatic hydrocarbon]]s (PAH, such as benzo(a)pyrene), [[benzene]], and [[nitrosamine]].<ref>{{cite web |title=Harms of Cigarette Smoking and Health Benefits of Quitting |url=http://www.cancer.gov/about-cancer/causes-prevention/risk/tobacco/cessation-fact-sheet |work=National Cancer Institute |date=2017-12-21}}</ref><ref>{{cite web |url = http://oehha.ca.gov/prop65/hazard_ident/pdf_zip/FinalMJsmokeHID.pdf |archive-url = https://web.archive.org/web/20090807084239/http://www.oehha.ca.gov/prop65/hazard_ident/pdf_zip/FinalMJsmokeHID.pdf |url-status = dead |archive-date = August 7, 2009 | vauthors = Tomar RC, Beaumont J, Hsieh JC 
      |date = August 2009 |title = Evidence on the carcinogenicity of marijuana smoke |publisher = Reproductive and Cancer Hazard Assessment Branch Office of Environmental Health Hazard Assessment, California Environmental Protection Agency 
      |access-date = 23 June 2012 }}</ref>

      == Occupational carcinogens ==
      Given that populations of workers are more likely to have consistent, often high level exposures to chemicals rarely encountered in normal life, much of the evidence for the carcinogenicity of specific agents is derived from studies of workers.<ref name=":5" />

