      [[File:Man speaking on mobile phone.jpg|thumb|upright|alt=A man speaking on a mobile telephone|A man speaking on a mobile telephone]]   
      {{Antennas|safety/regulation}}

      The antennas contained in [[mobile phones]], and various other electronic devices, emit radiation which consists of  [[Non-ionizing radiation|non-ionising radiation]] or radiofrequency electromagnetic fields (RF EMF) such as [[microwave]]s. The parts of the head or body nearest to the antenna can absorb this energy in the form of heat. Since at least the 1990s, scientists have researched whether the now-ubiquitous radiation associated with mobile phone antennas, [[Wireless router|WIFI routers]] or cell phone towers is affecting human health.<ref name="nci">[https://www.cancer.gov/about-cancer/causes-prevention/risk/radiation/cell-phones-fact-sheet What has research shown about the possible cancer-causing effects of radiofrequency energy?], United States National Cancer Institute</ref> Mobile phone networks use various bands of RF radiation, some of which overlap with the microwave range. 

      In response to public concern, the [[World Health Organization]] (WHO) established the ''International EMF (Electric and Magnetic Fields) Project'' in 1996 to assess the [[scientific evidence]] of possible health effects of RF EMF with a frequency range from 3 kilohertz (KHz) to 300 gigahertz (GHz). They have conducted a survey in 2019 among 300 radiofrequency scientists to prioritize the most important potential health effects from exposure to radiofrequency electromagnetic fields. The survey reported heat related effects, cancer, infertility, cognitive performance, symptoms and oxidative stress as the most important to study further.<ref>Verbeek J, Oftedal G, Feychting M, van Rongen E,  Scarfì MR, Mann S, Wong R, van Deventer E.
      Prioritizing health outcomes when assessing the effects of exposure to radiofrequency electromagnetic fields: A survey among experts.
      Environment International, Volume 146, 2021, 106300. https://doi.org/10.1016/j.envint.2020.106300.</ref> 

      WHO has stated that although extensive research has been conducted into possible health effects of exposure to many parts of the frequency spectrum, all reviews conducted so far have indicated that, as long as exposures are below the limits recommended in the [[International Commission on Non-Ionizing Radiation Protection|ICNIRP]] (1998) EMF guidelines, which cover the full frequency range from 0–300&nbsp;GHz, such exposures do not produce any known adverse health effect.<ref name="auto">{{Cite web|url=https://www.who.int/peh-emf/research/en/|archive-url=https://web.archive.org/web/20020819170051/http://www.who.int/peh-emf/research/en/|archive-date=19 August 2002|title=WHO EMF Research|publisher=World Health Organization|access-date=2012-03-27}}</ref>  The WHO states that "A large number of studies have been performed over the last two decades to assess whether mobile phones pose a potential health risk. To date, no adverse health effects have been established as being caused by mobile phone use."<ref name="who">{{cite web |url=https://www.who.int/mediacentre/factsheets/fs193/en/ |title= Electromagnetic fields and public health: mobile phones |publisher= [[WHO]] |date=8 October 2014 |access-date= 19 January 2018}}</ref>

      In 2024, the [[National Cancer Institute]] wrote: "The evidence to date suggests that cell phone use does not cause brain or other kinds of cancer in humans."<ref name="nci" />  

      In 2011, [[International Agency for Research on Cancer]] (IARC), an agency of the WHO, classified wireless radiation as [[List of IARC Group 2B carcinogens|Group 2B]]&nbsp;– possibly [[carcinogen]]ic. That means that there "could be some risk" of carcinogenicity, so additional research into the long-term, heavy use of wireless devices needs to be conducted.<ref name="WHO_IARC_110531">{{cite press release|url=http://www.iarc.fr/en/media-centre/pr/2011/pdfs/pr208_E.pdf|title=IARC classifies radiofrequency electromagnetic fields as possibly carcinogenic to humans |publisher=International Agency for Research on Cancer|date=2011-05-31|access-date=2011-06-02}}</ref> 

      International guidelines on exposure levels to microwave frequency EMFs such as ICNIRP limit the power levels of wireless devices and it is uncommon for wireless devices to exceed the guidelines. These guidelines only take into account thermal effects. 

      The official stance of the British [[Health Protection Agency]] (HPA) is that "there is no consistent evidence to date that [[Wi-Fi]] and WLANs adversely affect the health of the general population", but also that "it is a sensible precautionary approach&nbsp;... to keep the situation under ongoing review&nbsp;...".<ref name="HPAWiFi2">{{Cite web|url=http://www.hpa.org.uk/webw/HPAweb&Page&HPAwebAutoListName/Page/1199451940308|title=WiFi Summary|publisher=Health Protection Agency|access-date=2010-01-09}}</ref> 

      In a 2018 statement, the [[FDA]] said that "the current safety limits are set to include a 50-fold safety margin from observed effects of Radio-frequency energy exposure".<ref name="fda2018">{{cite news |last=Grady|first=Denise|title=Cancer Risk From Cellphone Radiation Is Small, Studies Show|url=https://www.nytimes.com/2018/02/02/health/cell-phones-cancer.html|work=[[The New York Times]]|date=2 February 2018|access-date=9 February 2018}}</ref>

      ==Exposure==

      ===Mobile phones <span id="Cell phones"></span>===
      A mobile phone connects to the [[telephone network]] by [[radio wave]]s exchanged with a local [[antenna (radio)|antenna]] and automated [[transceiver]] called a [[cellular base station]] (''cell site'' or ''cell tower''). The service area served by each provider is divided into small geographical areas called ''cells'', and all the phones in a cell communicate with that cell's antenna. Both the phone and the tower have [[radio transmitter]]s which communicate with each other. Since in a cellular network the same radio channels are reused every few cells, cellular networks use low power transmitters to avoid radio waves from one cell spilling over and interfering with a nearby cell using the same frequencies.

      Mobile phones are limited to an [[effective isotropic radiated power]] (EIRP) output of 3 watts, and the network continuously adjusts the phone transmitter to the lowest power consistent with good signal quality, reducing it to as low as one milliwatt when near the cell tower. Tower channel transmitters usually have an EIRP power output of around 50 watts. Even when it is not being used, unless it is turned off, a mobile phone
      periodically emits radio signals on its control channel, to keep contact with its cell tower and for functions like handing off the phone to another tower if the user crosses into another cell. When the user is making a call, the phone transmits a signal on a second channel which carries the user's voice. Existing [[2G]], [[3G]], and [[4G]] networks use frequencies in the [[ultrahigh frequency|UHF]] or low [[microwave]] bands, 600&nbsp;MHz to 3.5&nbsp;GHz. Many household wireless devices such as [[WiFi]] networks, [[garage door opener]]s, and [[baby monitor]]s use other frequencies in this same frequency range.

      Radio waves decrease rapidly in intensity by the [[inverse square law|inverse square]] of distance as they spread out from a transmitting antenna. So the phone transmitter, which is held close to the user's face when talking, is a much greater source of human exposure than the tower transmitter, which is typically at least hundreds of metres away from the user. A user can reduce their exposure by using a [[Headset (audio)|headset]] and keeping the phone itself farther away from their body.

      Next generation [[5G]] cellular networks, which began deploying in 2019, use higher frequencies in or near the [[millimetre wave]] band, 24 to 52&nbsp;GHz.<ref name="Nordrum">{{cite web
        | last1 = Nordrum
        | first1 = Amy
        | first2 = Kristen |last2 = Clark
        | title = Everything you need to know about 5G
        | work = IEEE Spectrum magazine
        | publisher = Institute of Electrical and Electronics Engineers
        | date = 27 January 2017
        | url = https://spectrum.ieee.org/everything-you-need-to-know-about-5g
        | access-date = 23 January 2019}}</ref><ref name="Hoffman">{{cite web
        | last = Hoffman
        | first = Chris
        | title = What is 5G, and how fast will it be?
        | work = How-To Geek website
        | date = 7 January 2019
        | url = https://www.howtogeek.com/340002/what-is-5g-and-how-fast-will-it-be/
        | access-date = 23 January 2019}}</ref> Millimetre waves are absorbed by atmospheric gases so 5G networks will use smaller cells than previous cellular networks, about the size of a city block. Instead of a cell tower, each cell will use an array of multiple small antennas mounted on existing buildings and utility poles. In general, millimetre waves penetrate less deeply into biological tissue than microwaves, and are mainly absorbed within the first centimetres of the body surface.

      ===Cordless phones <span id="Other wireless devices"></span>===
      The HPA also says that due to the mobile phone's adaptive power ability, a [[DECT]] cordless phone's radiation could actually exceed the radiation of a mobile phone. The HPA explains that while the DECT cordless phone's radiation has an average output power of 10&nbsp;mW, it is actually in the form of 100 bursts per second of 250&nbsp;mW, a strength comparable to some mobile phones.<ref>{{Cite web |url=http://www.hpa.org.uk/Topics/Radiation/UnderstandingRadiation/InformationSheets/info_CordlessTelephones/ |title=HPA - Cordless Telephones |access-date=27 August 2019 |archive-date=20 August 2010 |archive-url=https://web.archive.org/web/20100820080310/http://www.hpa.org.uk/Topics/Radiation/UnderstandingRadiation/InformationSheets/info_CordlessTelephones/ }}</ref>

      ===Wireless networking===
      Most [[wireless LAN]] equipment is designed to work within predefined standards. Wireless access points are also often close to people, but the drop off in power over distance is fast, following the [[inverse-square law]].<ref name="Foster2007">{{Cite journal|last=Foster|first=Kenneth R|date=March 2007|title=Radiofrequency exposure from wireless LANs utilizing Wi-Fi technology|journal=Health Physics|volume=92|issue=3|pages=280–289|doi=10.1097/01.HP.0000248117.74843.34|pmid=17293700|bibcode=2007HeaPh..92..280F |s2cid=22839684}}</ref> However, wireless laptops are typically used close to people. [[WiFi]] had been anecdotally linked to [[electromagnetic hypersensitivity]]<ref>{{cite news|url=https://www.cbc.ca/news/canada/toronto/ont-parents-suspect-wi-fi-making-kids-sick-1.894145|title=Ont. parents suspect Wi-Fi making kids sick|date=2010-08-16|publisher=CBC News}}</ref> but research into electromagnetic hypersensitivity has found no systematic evidence supporting claims made by affected people.<ref>{{Cite journal|last1=Rubin|first1=G James|last2=Munshi|first2=Jayati Das|last3=Wessely|first3=Simon|year=2005|title=Electromagnetic Hypersensitivity: A Systematic Review of Provocation Studies|journal=Psychosomatic Medicine|volume=67|issue=2|pages=224–232|citeseerx=10.1.1.543.1328|doi=10.1097/01.psy.0000155664.13300.64|pmid=15784787|s2cid=13826364}}</ref><ref>{{Cite journal|last=Röösli|first=Martin|date=2008-06-01|title=Radiofrequency electromagnetic field exposure and non-specific symptoms of ill health: A systematic review|journal=Environmental Research|volume=107|issue=2|pages=277–287|doi=10.1016/j.envres.2008.02.003|pmid=18359015|bibcode=2008ER....107..277R}}</ref>

      Users of wireless networking devices are typically exposed for much longer periods than for mobile phones and the strength of wireless devices is not significantly less. Whereas a [[UMTS|Universal Mobile Telecommunications System (UMTS)]] phone can range from 21 [[dBm]] (125&nbsp;mW) for Power Class 4 to 33 dBm (2W) for Power class 1, a [[wireless router]] can range from a typical 15 dBm (30&nbsp;mW) strength to 27 dBm (500&nbsp;mW) on the high end.

      However, wireless routers are typically located significantly farther away from users' heads than a phone the user is handling, resulting in far less exposure overall. The [[Health Protection Agency]] (HPA) says that if a person spends one year in a location with a WiFi hot spot, they will receive the same dose of radio waves as if they had made a 20-minute call on a mobile phone.<ref>{{Cite news|url=https://news.bbc.co.uk/2/hi/technology/6676129.stm|title=Wi-fi health fears are 'unproven'|date=2007-05-21|publisher=BBC News|access-date=2008-01-22}}</ref>

      The HPA's position is that "...&nbsp;radio frequency (RF) exposures from WiFi are likely to be lower than those from mobile phones." It also saw "...&nbsp;no reason why schools and others should not use WiFi equipment."<ref name="HPAWiFi2"/> In October 2007, the HPA launched a new "systematic" study into the effects of WiFi networks on behalf of the UK government, in order to calm fears that had appeared in the media in a recent period up to that time.<ref name="HPAWiFiStudy">{{Cite web|url=http://www.hpa.org.uk/webw/HPAweb&HPAwebStandard/HPAweb_C/1195733726123?p=1171991026241|title=Health Protection Agency announces further research into use of WiFi|publisher=Health Protection Agency|access-date=2008-08-28|archive-date=17 June 2008|archive-url=https://web.archive.org/web/20080617172507/http://www.hpa.org.uk/webw/HPAweb%26HPAwebStandard/HPAweb_C/1195733726123?p=1171991026241}}</ref> Michael Clark of the HPA says published research on mobile phones and [[Radio masts and towers|masts]] does not add up to an indictment of WiFi.<ref>{{cite news|url=https://www.thetimes.co.uk/tto/health/article1789149.ece|title=Wi-fi: should we be worried?|first=Nicki|last=Daniels|date=11 December 2006|newspaper=[[The Times]]|access-date=26 May 2015}}</ref><ref>{{cite web|url=http://www.bioinitiative.org/|title=Bioinitiative Report|access-date=5 October 2013}}</ref>

      ==Health effects of RF==
      {{See also|Electromagnetic radiation and health}}

      === Heat-related effects ===
      There is general consensus that heating caused by RF EMF exposure can lead to heat-related effects such as pain, burns and heat stroke.

      ===Cancer===
      {{See also|Non-ionizing radiation}}

      There have been rumors that mobile phone use can cause cancer, but this has not been conclusively proven.<ref name="cruk">{{cite web |publisher=[[Cancer Research UK]]|date=15 October 2021|title=Do mobile phones, 4G or 5G cause cancer?|url=https://www.cancerresearchuk.org/about-cancer/causes-of-cancer/cancer-myths/do-mobile-phones-cause-cancer}}</ref> In 2024, the [[National Cancer Institute]] wrote: "The evidence to date suggests that cell phone use does not cause brain or other kinds of cancer in humans."<ref name="nci" /><ref name="cancer2012">{{cite journal |last1=Repacholi|first1=M. H.|last2=Lerchl|first2=A.|last3=Röösli|first3=M.|last4=Sienkiewicz|first4=Z.|last5=Auvinen|first5=A.|last6=Breckenkamp|first6=J.|last7=d'Inzeo|first7=G|last8=Elliott|first8=P|last9=Frei|first9=P.|last10=Heinrich|first10=S.|last11=Lagroye|first11=I.|last12=Lahkola|first12=A.|last13=McCormick|first13=D. L.|last14=Thomas|first14=S.|last15=Vecchia|first15=P.|title=Systematic review of wireless phone use and brain cancer and other head tumors|journal=Bioelectromagnetics|volume=33|issue=3|pages=187–206|date=2012|pmid=22021071|doi=10.1002/bem.20716|s2cid=13519292|type=Systematic review}}</ref>

      In a 2018 statement, the US [[Food and Drug Administration]] said that "the current safety limits are set to include a 50-fold safety margin from observed effects of radiofrequency energy exposure".<ref name="fda2018" /><ref>{{cite web |title=Press Announcements - Statement from Jeffrey Shuren, M.D., J.D., Director of the FDA's Center for Devices and Radiological Health on the recent National Toxicology Program Draft Report on Radiofrequency Energy Exposure|url=https://www.fda.gov/NewsEvents/Newsroom/PressAnnouncements/ucm595144.htm|archive-url=https://web.archive.org/web/20180203132255/https://www.fda.gov/NewsEvents/Newsroom/PressAnnouncements/ucm595144.htm|archive-date=3 February 2018|publisher=[[Federal Drug Administration]]|access-date=9 February 2018}}</ref>

      In 2018 the US [[National Toxicology Program]] (NTP) published the results of its ten year, $30 million study of the effects of radio frequency radiation on laboratory rodents, which found 'clear evidence' of malignant heart tumors ([[schwannoma]]s) and 'some evidence' of malignant gliomas and adrenal tumors in male rats.<ref>{{cite web|url=https://ntp.niehs.nih.gov/research/topics/cellphones|website=National Toxicology Program, US Dept of Health and Human Services|date=2018|title=Cell Phone Radio Frequency Radiation}}</ref> In 2019, the NTP scientists published an article stating that RF scientists found evidence of 'significant' DNA damage in the [[frontal cortex]] and [[hippocampus]] of male rat brains and the blood cells of female mice.<ref>{{cite journal |last1=Smith-Roe|first1=Stephanie L.|last2=Wyde|first2=Michael E.|last3=Stout|first3=Matthew D.|last4=Winters|first4=John W.|last5=Hobbs|first5=Cheryl A.|last6=Shepard|first6=Kim G.|last7=Green|first7=Amanda S.|last8=Kissling|first8=Grace E.|last9=Shockley|first9=Keith R.|last10=Tice|first10=Raymond R.|last11=Bucher|first11=John R.|last12=Witt|first12=Kristine L.|title=Evaluation of the genotoxicity of cell phone radiofrequency radiation in male and female rats and mice following subchronic exposure|journal=Environmental and Molecular Mutagenesis|date=2020|volume=61|issue=2|pages=276–290|doi=10.1002/em.22343|pmid=31633839|bibcode=2020EnvMM..61..276S|pmc=7027901}}</ref> In 2018, the Ramazzini Cancer Research Institute study of cell phone radiation and cancer published its results and conclusion that 'The RI findings on far field exposure to RFR are consistent with and reinforce the results of the NTP study on near field exposure, as both reported an increase in the incidence of tumors of the brain and heart in RFR-exposed [[Sprague-Dawley rats]].<ref>{{cite journal |last1=Falcioni|first1=L.|last2=Bua|first2=L.|last3=Tibaldi|first3=E.|last4=Lauriola|first4=M.|last5=De Angelis|first5=L.|last6=Gnudi|first6=F.|last7=Mandrioli|first7=D.|last8=Manservigi|first8=M.|last9=Manservisi|first9=F.|last10=Manzoli|first10=I.|last11=Menghetti|first11=I.|last12=Montella|first12=R.|last13=Panzacchi|first13=S.|last14=Sgargi|first14=D.|last15=Strollo|first15=V.|last16=Vornoli|first16=A.|last17=Belpoggi|first17=F.|title=Report of final results regarding brain and heart tumors in Sprague-Dawley rats exposed from prenatal life until natural death to mobile phone radiofrequency field representative of a 1.8 GHZ GSM base station environmental emission|journal=Environmental Research|date=2018|volume=165|pages=496–503|doi=10.1016/j.envres.2018.01.037|pmid=29530389|bibcode=2018ER....165..496F}}</ref> These tumors are of the same histotype of those observed in some epidemiological studies on cell phone users. These experimental studies provide sufficient evidence to call for the re-evaluation of IARC conclusions regarding the carcinogenic potential of RFR in humans.'<ref>Belpoggi F et al 2018. Report of final results regarding brain and heart tumors in Sprague-Dawley rats exposed from prenatal life until natural death to mobile phone radiofrequency field representative of a 1.8 GHz GSM base station environmental emission. Environ Res Aug:165:496-503.</ref>

      A 2021 review found "limited" evidence for radio frequencies in the range of 450&nbsp;MHz to 6,000&nbsp;MHz to be related to [[gliomas]] and [[acoustic neuromas]] in humans, however concluding also that "... the evidence is not yet sufficiently strong to establish a direct relationship". The report also states that there is "sufficient evidence" of carcinogenicity in experimental animals from radiofrequency in that same range. Conclusions could not be drawn for higher frequencies (24 to 100 GHz) due to insufficient adequate studies.<ref name="Fiorella2021">{{cite web |last1=Belpoggi|first1=Fiorella|date=July 2021|title=Health impact of 5G: current state of knowledge of 5G-related carcinogenic and reproductive/developmental hazards as they emerge from epidemiological studies and in vivo experimental studies|url=https://www.europarl.europa.eu/RegData/etudes/STUD/2021/690012/EPRS_STU(2021)690012_EN.pdf|access-date=4 November 2021|publisher=European Parliamentary Research Service|page=vi}}</ref>

      ===Fertility and reproduction===
      A [[Male infertility crisis|decline in male sperm quality]] has been observed over several decades.<ref>{{cite news|url=https://www.theguardian.com/science/2017/jul/29/infertility-crisis-sperm-counts-halved|title=The infertility crisis is beyond doubt. Now scientists must find the cause|first=Robin|last=McKie|date=29 July 2017|via=www.theguardian.com|newspaper=The Guardian}}</ref><ref>{{cite web|url=https://www.cnn.com/2017/07/25/health/sperm-counts-declining-study/index.html|title=Sperm counts of Western men plummeting, analysis finds|first=Susan|last=Scutti|date=25 July 2017|publisher=CNN}}</ref><ref>{{cite journal |doi=10.1177/1557988316643383|pmid=27099345|pmc=5675356|volume=11|issue=4|title=The Disappearing Sperms: Analysis of Reports Published Between 1980 and 2015|year=2016|journal=American Journal of Men's Health|pages=1279–1304|author1=Sengupta, Pallav|author2=Dutta, Sulagna|author3=Krajewska-Kulak, Elzbieta}}</ref> Studies on the impact of mobile radiation on male fertility are conflicting, and the effects of the [[radiofrequency|radio frequency]] [[electromagnetic radiation]] (RF-EMR) emitted by these devices on the reproductive systems are currently under active debate.<ref>{{cite journal|url=http://nopr.niscair.res.in/handle/123456789/10343|title=Mobile phone usage and male infertility in Wistar rats|first1=Jitendra|last1=Behari|first2=Sanjay|last2=Kumar|first3=Kavindra Kumar|last3=Kesari|date=1 October 2010|journal=Indian Journal of Experimental Biology|volume=48|issue=10|pages=987–92|pmid=21299041}}</ref><ref>{{cite journal |doi=10.1371/journal.pone.0006446|pmid=19649291|pmc=2714176|volume=4|issue=7|title=Mobile Phone Radiation Induces Reactive Oxygen Species Production and DNA Damage in Human Spermatozoa In Vitro|year=2009|journal=PLOS ONE|article-number=e6446|author=De Iuliis Geoffry N|bibcode=2009PLoSO...4.6446D|doi-access=free}}</ref><ref>{{cite journal|title=Cell phones and male infertility: a review of recent innovations in technology and consequences|first1=Kavindra|last1=Kesari|first2=Alaa|last2=Hamada|first3=Aspinder|last3=Singh|first4=Ashok|last4=Agarwal|date=1 August 2011|journal=International Brazilian Journal of Urology|volume=37|issue=4|pages=432–454|doi=10.1590/S1677-55382011000400002|pmid=21888695|doi-access=free|s2cid=32945299}}</ref><ref>{{cite journal|title=The effects of radiofrequency electromagnetic radiation on sperm function|first1=R. J.|last1=Aitken|first2=G. N. De|last2=Iuliis|first3=B. V.|last3=King|first4=B.|last4=Nixon|first5=B. J.|last5=Houston|date=1 December 2016|journal=Reproduction|volume=152|issue=6|pages=R263–R276|doi=10.1530/REP-16-0126|pmid=27601711|doi-access=free}}</ref> A 2012 review concluded that "together, the results of these studies have shown that [[Radio wave|RF-EMR]] decreases sperm count and motility and increases [[oxidative stress]]".<ref>{{cite journal |author1=La Vignera S.|author2=Condorelli R. A.|author3=Vicari E.|author4=D'Agata R.|author5=Calogero A. E.|year=2012|title=Effects of the Exposure to Mobile Phones on Male Reproduction: A Review of the Literature|journal=Journal of Andrology|volume=33|issue=3|pages=350–356|doi=10.2164/jandrol.111.014373|pmid=21799142|doi-access=}}</ref><ref>{{cite journal|title=Effect of Oxidative Stress on Male Reproduction|first1=Stefan S.|last1=du Plessis|first2=Chloe|last2=Ong|first3=Gurpriya|last3=Virk|first4=Ashok|last4=Agarwal|date=1 April 2014|journal=The World Journal of Men's Health|volume=32|issue=1|pages=1–17|doi=10.5534/wjmh.2014.32.1.1|pmid=24872947|pmc=4026229}}</ref> A 2017 study of 153 men that attended an academic fertility clinic in Boston, Massachusetts found that self-reported mobile phone use was not related to [[semen quality]], and that carrying a mobile phone in the pants pocket was not related to semen quality.<ref>{{cite journal |doi=10.1016/j.reprotox.2016.11.008|pmid=27838386|volume=67|title=Self-reported mobile phone use and semen parameters among men from a fertility clinic|year=2017|journal=Reproductive Toxicology|pages=42–47|author1=Lewis Ryan C.|author2=Mínguez-Alarcón Lidia|author3=Meeker John D.|author4=Williams Paige L.|author5=Mezei Gabor|author6=Ford Jennifer B.|author7=Hauser Russ|pmc=5303122|bibcode=2017RepTx..67...42L}}</ref>

      In contrast, a 2021 review concluded [[5G]] radio frequencies in the range of 450&nbsp;MHz to 6,000&nbsp;MHz do affect male fertility, possibly affect female fertility, and may have adverse effects on the development of embryos, fetuses and newborns. Conclusions could not be drawn for higher frequencies due to insufficient adequate studies. The magnitude of the effect was not quantified.<ref name="Fiorella2021" />

      ===Cognitive performance===
      Modulation of neurological function is possible using radiation in the range hundreds of GHz up to a few THz at relatively low energies (without significant heating or ionisation) achieving either beneficial or harmful effects.<ref>{{cite journal 
      | last1= Liu | first1=Xi
      | last2= Qiao | first2=Zhi 
      | last3= Chai | first3=Yuming
      | last4= Zhu | first4=Zhi 
      | last5= Wu | first5= Kaijie
      | last6= Ji | first6=Wenliang
      | last7= Daguang | first7= Li
      | last8= Xiao | first8=Yujie
      | last9= Mao | first9= Lanqun
      | last10= Chang | first10=Chao
      | last11= Wen | first11=Quan
      | last12= Song | first12= Bo
      | last13= Shu | first13=Yousheng
      | title= Nonthermal and reversible control of neuronal signaling and behavior by midinfrared stimulation | journal= Proceedings of the National Academy of Sciences (U.S.A.)| volume=118 | date=2021 | issue=10| doi=10.1073/pnas.2015685118| pmid=33649213| pmc= 7958416 | doi-access=free}}</ref><ref name="ThzNeuro">{{cite journal 
      | last1= Zhang | first1=Jun
      | last2= Song | first2=Li
      | last3= Li | first3=Weidong
      | title= Advances of terahertz technology in neuroscience: Current status and a future perspective | journal= iScience|doi=10.1016/j.isci.2021.103548| pmid=34977497| pmc= 8683584 | doi-access=free}}</ref> The relevant frequencies for neurological interaction are at or beyond the upper end of what is typically employed for consumer wireless devices and are thus expected to have poor penetration into human tissue. Many of the studies referenced in the review<ref name="ThzNeuro" /> examined rodents rather than humans, thus overcoming the screening typically provided by the thicker skulls of larger mammals.

      A 2010 review stated that "The balance of experimental evidence does not support an effect of 'non-thermal' radio frequency fields" on the permeability of the [[blood–brain barrier]], but noted that research on low frequency effects and effects in humans was sparse.<ref>{{cite journal |vauthors=Stam R|title=Electromagnetic fields and the blood–brain barrier|journal=Brain Research Reviews|volume=65|issue=1|pages=80–97|year=2010|pmid=20550949|doi=10.1016/j.brainresrev.2010.06.001|s2cid=24573216|type=Review}}</ref> A 2012 study of low-frequency radiation on humans found "no evidence for acute effects of short-term mobile phone radiation on cerebral blood flow".<ref name="nci" /><ref>{{cite journal |vauthors=Kwon MS, Vorobyev V, Kännälä S, etal|year=2012|title=No effects of short-term GSM mobile phone radiation on cerebral blood flow measured using positron emission tomography|journal=Bioelectromagnetics|volume=33|issue=3|pages=247–56|doi=10.1002/bem.20702|pmid=21932437|s2cid=20903411}}</ref>

      ===Symptoms of electromagnetic hypersensitivity===
      {{Main|Electromagnetic hypersensitivity}}

      Some users of mobile phones and similar devices have reported feeling various [[non-specific symptoms]] during and after use. Studies have failed to link any of these symptoms to electromagnetic exposure. In addition, EHS is not a recognized medical diagnosis.<ref>{{cite journal|last1=Röösli|first1=Martin|date=June 2008|title=Radiofrequency electromagnetic field exposure and non-specific symptoms of ill health: A systematic review|journal=[[Environmental Research]]|volume=107|issue=2|pages=277–287|doi=10.1016/j.envres.2008.02.003|pmid=18359015|bibcode=2008ER....107..277R}}</ref>

      === Oxidative stress ===
      [[Oxidative stress]] is a general mechanism that is assumed to lead to various diseases such as cancer and cardiovascular diseases. 

      ===Effects on children===
      A report from the Australian Government's Radiation Protection and Nuclear Safety Agency ([[ARPANSA]]) in June 2017 noted that:

      {{blockquote|The 2010 WHO Research Agenda identified a lack of sufficient evidence relating to children and this is still the case.&nbsp;... Given that no long-term prospective study has looked at this issue to date this research need remains a high priority.

      For cancer in particular only one completed case-control study involving four European countries has investigated  mobile phone use among children or adolescents and risk of brain tumour; showing no association between the two (Aydin et al. 2011).&nbsp;... Given this paucity of information regarding children using mobile phones and cancer&nbsp;... more epidemiological studies are needed.<ref>{{cite web |title=Radiofrequency Electromagnetic Energy and Health: Research Needs (TR 178) |url=https://www.arpansa.gov.au/research-and-expertise/technical-reports/radiofrequency-electromagnetic-energy-and-health-research |publisher=ARPANSA |date=June 2017 |access-date=2 January 2020}}</ref>}}

      === Effects on organisms other than humans ===
      Low-level EMF does have some effects on other organisms.<ref name="In-The-Environment" /> Vian ''et al.'', 2006 finds an effect of [[microwave radiation|microwave]] on [[gene expression]] in [[plant]]s.<ref name="In-The-Environment">{{cite journal | year=2021 | issue=1 | volume=37 | publisher=[[Walter de Gruyter GmbH]] | first3=Albert | first2=Henry | first1=Blake | last3=Manville | last2=Lai | issn=0048-7554 | journal=[[Reviews on Environmental Health]] | last1=Levitt | pages=81–122 | doi=10.1515/reveh-2021-0026 | title=Effects of non-ionizing electromagnetic fields on flora and fauna, part 1. Rising ambient EMF levels in the environment| pmid=34047144 | doi-access=free }}</ref>

      ==Base stations==
      [[File:Cellular Mobile UHF Antenna Tower8.jpg|right|thumb|upright|Cellular mobile and UHF antenna tower with multiple antennas]]

      {{Main|Base transceiver station|Cell site}}

      Experts consulted by France considered it was mandatory that the main antenna axis should not to be directly in front of a living place at a distance shorter than 100 metres.<ref>{{Cite web |title=Accueil |url=https://www.anses.fr/fr/content/accueil |access-date=2023-01-18 |website=Anses - Agence nationale de sécurité sanitaire de l'alimentation, de l'environnement et du travail |language=fr}}</ref> This recommendation was modified in 2003<ref>{{Cite web |title=Accueil |url=https://www.anses.fr/fr/content/accueil |access-date=2023-01-18 |website=Anses - Agence nationale de sécurité sanitaire de l'alimentation, de l'environnement et du travail |language=fr}}</ref> to say that antennas located within a 100-metre radius of primary schools or childcare facilities should be better integrated into the city scape and was not included in a 2005 expert report.<ref>{{Cite web |title=Accueil |url=https://www.anses.fr/fr/content/accueil |access-date=2023-01-18 |website=Anses - Agence nationale de sécurité sanitaire de l'alimentation, de l'environnement et du travail |language=fr}}</ref> 
      The [[Agence nationale de sécurité sanitaire de l'alimentation, de l'environnement et du travail|''Agence française de sécurité sanitaire environnementale'']], {{As of|2009|lc=yes}}, says that there is no demonstrated short-term effect of electromagnetic fields on health, but that there are open questions for long-term effects, and that it is easy to reduce exposure via technological improvements.<ref>{{Cite web |title=Accueil |url=https://www.anses.fr/fr/content/accueil |access-date=2023-01-18 |website=Anses - Agence nationale de sécurité sanitaire de l'alimentation, de l'environnement et du travail |language=fr}}</ref> A 2020 study in ''[[Environmental Research]]'' found that "Although direct causation of negative human health effects from RFR from cellular phone base stations has not been finalized, there is already enough medical and scientific evidence to warrant long-term liability concerns for companies deploying [[cellular phone towers]]" and thus recommended voluntary setbacks from schools and hospitals.<ref>{{Cite journal|last=Pearce|first=J.M.|date=February 2020|title=Limiting liability with positioning to minimize negative health effects of cellular phone towers|journal=Environmental Research|language=en|volume=181|article-number=108845|doi=10.1016/j.envres.2019.108845|pmid=31791710|bibcode=2020ER....18108845P|s2cid=208611277|url=https://research.aalto.fi/files/40738889/Limiting_Liability_with_Positioning_to_M.pdf}}</ref>
      [[File:Cell site tower warning sign and work guidelines.jpg|thumb|US cell site tower warning sign and work guidelines]]

      ==Safety standards and licensing==
      To protect the population living around base stations and users of mobile handsets, governments and regulatory bodies adopt safety standards, which translate to limits on exposure levels below a certain value. There are many proposed national and international standards, but that of the [[International Commission on Non-Ionizing Radiation Protection]] (ICNIRP) is the most respected one, and has been adopted so far by more than 80 countries. For radio stations, ICNIRP proposes two safety levels: one for occupational exposure, another one for the general population. Currently there are efforts underway to harmonize the different standards in existence.<ref>{{cite web |url=http://www.icnirp.de |title=International Commission for Non-Ionizing Radiation Protection home page |access-date=7 January 2008}}</ref>

      Radio base licensing procedures have been established in the majority of urban spaces regulated either at municipal/county, provincial/state or national level. Mobile telephone service providers are, in many regions, required to obtain construction licenses, provide certification of antenna emission levels and assure compliance to ICNIRP standards and/or to other environmental legislation.

      Many governmental bodies also require that competing telecommunication companies try to achieve sharing of towers so as to decrease environmental and cosmetic impact. This issue is an influential factor of rejection of installation of new antennas and towers in communities.

      The safety standards in [[United States|the US]] are set by the [[Federal Communications Commission]] (FCC). The FCC has based its standards primarily on those standards established by the National Council on Radiation Protection and Measurements (NCRP) a Congressionally chartered scientific organization located in the WDC area and the [[Institute of Electrical and Electronics Engineers]] (IEEE), specifically Subcommittee 4 of the "International Committee on Electromagnetic Safety".

      Switzerland has set safety limits lower than the ICNIRP limits for certain "sensitive areas" (classrooms, for example).<ref>{{cite web|title= Anforderungen nach NISV: Mobilfunkanlagen|trans-title= Specifications of the Regulation on Non-Ionizing Radiation: Mobile Telephone Installations|url= http://www.bafu.admin.ch/elektrosmog/01100/01105/index.html?lang=de |publisher= Bundesamt für Umwelt <nowiki>[</nowiki>Swiss Federal Environment Ministry<nowiki>]</nowiki>|language= de|date= 13 March 2009|access-date= 20 January 2010}}</ref>

      In March 2020, for the first time since 1998, ICNIRP updated its guidelines for exposures to frequencies over 6&nbsp;GHz, including the frequencies used for 5G that are over 6&nbsp;GHz. The Commission added a restriction on acceptable levels of exposure to the whole body, added a restriction on acceptable levels for brief exposures to small regions of the body, and reduced the maximum amount of exposure permitted over a small region of the body.<ref>{{Cite web|url=https://www.icnirp.org/cms/upload/presentations/ICNIRP_Media_Release_110320.pdf|title=New Guidelines Released by the International Commission on Non-Ionizing Radiation Protection (ICNIRP)|date=March 11, 2020|website=icnirp.org}}</ref>

      ==Lawsuits==
      In [[United States|the US]], [[personal injury]] [[lawsuits]] have been filed by individuals against manufacturers (including [[Motorola]],<ref>{{cite web|url=http://infoventures.com/emf/legal/lt-il001.html|title=Wright v. Motorola, Inc. et al., No95-L-04929|access-date=14 October 2005|archive-date=8 March 2009|archive-url=https://web.archive.org/web/20090308004432/http://infoventures.com/emf/legal/lt-il001.html}}</ref> [[NEC Corporation|NEC]], [[Siemens AG|Siemens]], and [[Nokia]]) on the basis of allegations of causation of [[brain cancer]] and death. In US federal courts, expert testimony relating to science must be first evaluated by a judge, in a [[Daubert standard|Daubert hearing]], to be relevant and valid before it is admissible as evidence. In a 2002 case against [[Motorola]], the plaintiffs alleged that the use of wireless handheld telephones could [https://emftitan.com/blogs/emf-blogs/does-wi-fi-cause-cancer cause brain cancer] and that the use of Motorola phones caused one plaintiff's cancer. The judge ruled that no sufficiently reliable and relevant scientific evidence in support of either general or specific causation was proffered by the plaintiffs, accepted a motion to exclude the testimony of the plaintiffs' experts, and denied a motion to exclude the testimony of the defendants' experts.<ref>{{cite court |litigants= Christopher Newman, et al. v Motorola, Inc., et al. |court= United States District Court for the District of Maryland |url= http://news.lp.findlaw.com/hdocs/docs/cellphone/newmanmotorola93002mem.pdf |quote= Because no sufficiently reliable and relevant scientific evidence in support of either general or specific causation has been proffered by the plaintiffs, as explained below, the defendants' motion will be granted and the plaintiffs' motion will be denied. }}</ref>

      Two separate cases in [[Italy]], in 2009<ref name=cas>{{cite news|title=Tumore e telefonini, il testo della sentenza n.17438 della Cassazione|date=19 October 2012 |url=http://www.leggioggi.it/allegati/tumore-e-telefonini-il-testo-della-sentenza-n-17438-della-cassazione/|trans-title= Tumor and cell phones, the text of the judgment n.17438 of the Supreme Court|website=www.leggioggi.it |language=it |access-date=1 March 2017}}</ref><ref name = "Reuters">{{cite news| url=https://www.reuters.com/article/italy-phones-idUSL5E8LJFFW20121019 | publisher=Reuters | title=Italy court ruling links mobile phone use to tumour | date=19 October 2012|access-date= 4 May 2017}}</ref> and 2017,<ref>{{cite news|url= https://www.theguardian.com/technology/2017/apr/21/italian-court-rules-mobile-phone-use-caused-brain-tumour |title= Italian court rules mobile phone use caused brain tumour|newspaper= The Guardian|via= [[Agence France-Presse]]|date= 21 April 2017|access-date= 4 May 2017}}</ref><ref name = "Newsweek_2017">{{cite news| url=http://www.newsweek.com/cell-phone-italy-cancer-mobile-phone-brain-tumor-587704 | work=Newsweek | title=Cancer Linked to Cellphone Use, Italian Court Rules in Landmark Case | date=21 March 2017|access-date= 7 May 2017}}</ref> resulted in pensions being awarded to plaintiffs who had claimed their [[Benign tumor|benign]] [[brain tumor]]s were the result of prolonged mobile phone use in professional tasks, for 5–6 hours a day, which they ruled different from non-professional use.

      In the UK Legal Action Against 5G sought a Judicial Review of the government's plan to deploy 5G. If successful, the group was to be represented by [[Michael Mansfield QC]], a prominent British barrister. This application was denied on the basis that the government had demonstrated that 5G was as safe as 4G, and that the applicants had brought their action too late.<ref>{{Cite news|date=2021-07-30|title=Anti-5G campaigners vow to fight on after legal setback|language=en-GB|work=BBC News|url=https://www.bbc.com/news/technology-58027668|access-date=2021-10-13}}</ref>

      ==Precautions==

      ===Precautionary principle===
      In 2000, the [[World Health Organization]] (WHO) recommended that the [[precautionary principle]] could be voluntarily adopted in this case.<ref>{{cite web |url=https://www.who.int/docstore/peh-emf/publications/facts_press/EMF-Precaution.htm|archive-url=https://web.archive.org/web/20021201115808/http://www.who.int/docstore/peh-emf/publications/facts_press/EMF-Precaution.htm|archive-date=1 December 2002|title= Electromagnetic Fields and Public Health: Cautionary Policies |date=March 2000 |publisher=[[World Health Organization]] |access-date=1 February 2008}}</ref> It follows the recommendations of the [[European Community]] for environmental risks.

      According to the WHO, the "precautionary principle" is "a risk management policy applied in circumstances with a high degree of scientific uncertainty, reflecting the need to take action for a potentially serious risk without awaiting the results of scientific research." Other less stringent recommended approaches are [[prudent avoidance principle]] and [[as low as reasonably practicable]]. Although all of these are problematic in application, due to the widespread use and economic importance of wireless telecommunication systems in modern civilization, there is an increased popularity of such measures in the general public, though also evidence that such approaches may increase concern.<ref>{{cite journal | last1 = Wiedemann | year = 2006 | title = The Impacts of Precautionary Measures and the Disclosure of Scientific Uncertainty on EMF Risk Perception and Trust | doi = 10.1080/13669870600802111 | journal = Journal of Risk Research | volume = 9 | issue = 4| pages = 361–372 | last2 = Thalmann | first2 = Andrea | last3 = Grutsch | first3 = Markus | last4 = Schütz | first4 = Holger | s2cid = 55531218 | display-authors = 1 }}</ref> They involve recommendations such as the minimization of usage, the limitation of use by at-risk population (e.g., children), the adoption of phones and microcells with as low as reasonably practicable levels of radiation, the wider use of hands-free and [[earphone]] technologies such as [[Bluetooth]] headsets, the adoption of maximal standards of exposure, RF field intensity and distance of base stations antennas from human habitations, and so forth.{{Citation needed|date=June 2010}}

      ===Precautionary measures and health advisories===
      In May 2011, the [[World Health Organization]]'s [[International Agency for Research on Cancer]] classified electromagnetic fields from mobile phones and other sources as "possibly carcinogenic to humans" and advised the public to adopt safety measures to reduce exposure, like use of hands-free devices or texting.<ref name="WHO_IARC_110531"/>

      Some national radiation advisory authorities, including those of Austria,<ref name="AustriaPrecaution">{{cite web |url= http://www.pressbaum.net/wai_startseite-aktuelles-handy.htm|title= Information: Wie gefährlich sind Handystrahlen wirklich? | language= de|publisher= [[Pressbaum|Marktgemeinde Pressbaum]] |archive-url= https://web.archive.org/web/20111002195819/http://www.pressbaum.net/wai_startseite-aktuelles-handy.htm|archive-date= 2011-10-02| access-date=16 May 2015}}</ref> France,<ref>{{cite web |url= http://www.sante-jeunesse-sports.gouv.fr/actualite-presse/presse-sante/communiques/telephones-mobiles-sante-securite.html|title= Téléphones mobiles: santé et sécurité |date= 2 January 2008 |publisher=Le ministère de la santé, de la jeunesse et des sports |language= fr |access-date=19 January 2008}} Lay article in {{in lang|en}} making comment at {{cite web |url= https://arstechnica.com/news.ars/post/20080103-france-beware-excessive-cell-phone-usedespite-lack-of-data.html|title=France: Beware excessive cell phone use?: despite lack of data |last= Gitlin |first= Jonathan M. |date= 3 January 2008 |publisher=[[Ars Technica]] |access-date=19 January 2008}}</ref> [[Bundesamt für Strahlenschutz|Germany]],<ref>{{cite web |url= http://www.bfs.de/en/elektro/faq/emf_faq_vorsorge.html |title= Precaution regarding electromagnetic fields |date= 7 December 2007 |publisher= [[Federal Office for Radiation Protection]] |access-date= 19 January 2008 |archive-date= 1 February 2008 |archive-url= https://web.archive.org/web/20080201102852/http://www.bfs.de/en/elektro/faq/emf_faq_vorsorge.html }}</ref> and Sweden,<ref>{{cite web |url= http://www.ssi.se/ickejoniserande_stralning/Mobiltele/onodig_exponering.html?Menu2=Mobiltelefoni|title= Exponering |date=February 2006 |language= sv |publisher= [[Swedish Radiation Safety Authority|Swedish Radiation Protection Authority]] |access-date=19 January 2008}}</ref> have recommended measures to minimize exposure to their citizens. Examples of the recommendations are:

      * Use hands-free to decrease the radiation to the head.
      * Keep the mobile phone away from the body.
      * Do not use telephone in a car without an external antenna.

      The use of "hands-free" was not recommended by the British [[Which?|Consumers' Association]] in a statement in November 2000, as they believed that exposure was increased.<ref>{{cite news |url= http://archives.cnn.com/2000/TECH/computing/11/02/london.phone/index.html|title= UK consumer group: Hands-free phone kits boost radiation exposure|date= 2 November 2000 |publisher= [[CNN]] |archive-url=https://web.archive.org/web/20060314135643/http://archives.cnn.com/2000/TECH/computing/11/02/london.phone/index.html |archive-date=14 March 2006}}</ref> However, measurements for the (then) [[UK Department of Trade and Industry]]<ref>Manning, MI and Gabriel, CHB, SAR tests on mobile phones used with and without personal hands-free kits, SARtest Report 0083 for the DTI, July 2000 (PDF) at http://straff-x.com/SAR-Hands-Free-Kits-July-2000.pdf {{Webarchive|url=https://web.archive.org/web/20140224110553/http://straff-x.com/SAR-Hands-Free-Kits-July-2000.pdf |date=24 February 2014 }}</ref> and others for the French {{Interlanguage link|Agence française de sécurité sanitaire environnementale|fr|3=Agence française de sécurité sanitaire de l'environnement et du travail}}<ref>{{Cite web |title=Accueil |url=https://www.anses.fr/fr/content/accueil |access-date=2023-01-18 |website=Anses - Agence nationale de sécurité sanitaire de l'alimentation, de l'environnement et du travail |language=fr}}</ref> showed substantial reductions. In 2005, Professor Lawrie Challis and others said clipping a [[ferrite bead]] onto hands-free kits stops the radio waves travelling up the wire and into the head.<ref>{{cite news |title= Bead 'slashes mobile radiation'|url= https://news.bbc.co.uk/2/hi/health/4203077.stm|publisher= [[BBC News]]|date= 25 January 2005|access-date= 17 March 2009}}</ref>

      Several nations have advised moderate use of mobile phones for children.<ref>For example, Finland {{cite web|url= http://www.stuk.fi/stuk/tiedotteet/en_GB/news_527/|title= Radiation and Nuclear Safety Authority: Children's mobile phone use should be limited|publisher= Finnish [[Radiation and Nuclear Safety Authority]] (STUK)|date= 7 January 2009|access-date= 20 January 2010|archive-url= https://web.archive.org/web/20100111082827/http://www.stuk.fi/stuk/tiedotteet/en_GB/news_527/|archive-date= 11 January 2010}} and France {{cite web|url= http://www.sante-sports.gouv.fr/IMG//pdf/AFOM_-_Fiche_4_-_telephone_mobile_DAS_et_sante.pdf|title= Téléphone mobile, DAS et santé|trans-title= Mobile telephones, SAR and health|work= Votre enfant et le téléphone mobile <nowiki>[</nowiki>Your child and mobile telephony<nowiki>]</nowiki>|publisher= Association Française des Opérateurs Mobiles (AFOM)<nowiki>[</nowiki>French Mobile Phone Operators' Association<nowiki>]</nowiki> et l'Union Nationale des Associations Familiales (UNAF) <nowiki>[</nowiki>National Federation of Family Associations<nowiki>]</nowiki>|date= 31 January 2007|access-date= 20 January 2010|archive-date= 7 March 2010|archive-url= https://web.archive.org/web/20100307105331/http://www.sante-sports.gouv.fr/IMG/pdf/AFOM_-_Fiche_4_-_telephone_mobile_DAS_et_sante.pdf}}</ref> An article by Gandhi et al. in 2006 states that children receive higher levels of [[Specific absorption rate|Specific Absorption Rate]] (SAR). When 5- and 10-year-olds are compared to adults, they receive about 153% higher SAR levels. Also, with the [[permittivity]] of the brain decreasing as one gets older and the higher relative volume of the exposed growing brain in children, radiation penetrates far beyond the [[Midbrain|mid-brain]].<ref>{{Cite journal|title = Exposure Limits: The underestimation of absorbed cell phone radiation, especially in children|journal = [[Electromagnetic Biology and Medicine]]|date = 14 October 2011|issn = 1536-8378|pages = 34–51|volume = 31|issue = 1|doi = 10.3109/15368378.2011.622827|pmid = 21999884|first1 = Om P.|last1 = Gandhi|first2 = L. Lloyd|last2 = Morgan|first3 = Alvaro Augusto|last3 = de Salles|first4 = Yueh-Ying|last4 = Han|first5 = Ronald B.|last5 = Herberman|first6 = Devra Lee|last6 = Davis|s2cid = 3732285}}</ref>

      ====5G====
      {{Further|5G misinformation}}
      {{See also|Misinformation related to the COVID-19 pandemic#5G mobile phone networks}}
      The FDA is quoted as saying that it "...continues to believe that the current safety limits for cellphone radiofrequency energy exposure remain acceptable for protecting the public health."<ref>{{Cite web |url=https://smartmobtech.com/news/5g-what-is-it-and-how-will-it-help-us/ |title=What is 5G |access-date=July 29, 2019 |archive-date=25 December 2020 |archive-url=https://web.archive.org/web/20201225061613/https://smartmobtech.com/news/5g-what-is-it-and-how-will-it-help-us/ }}</ref>

      During the [[COVID-19 pandemic]], misinformation circulated claiming that 5G networks contribute to the spread of COVID-19.<ref>{{cite news |last1=Gallagher |first1=Ryan |title=5G Virus Conspiracy Theory Fueled by Coordinated Effort |url=https://www.bloomberg.com/news/articles/2020-04-09/covid-19-link-to-5g-technology-fueled-by-coordinated-effort |access-date=12 April 2020 |work=[[Bloomberg News]] |date=9 April 2020}}</ref>

      ===Bogus products===
      Products have been advertised that claim to shield people from EM radiation from mobile phones; in the US the [[Federal Trade Commission]] published a warning that "Scam artists follow the headlines to promote products that play off the news{{Spaced en dash}}and prey on concerned people."<ref name="ftc-0109-cell-phone-radiation-scams">{{cite web|title=Cell Phone Radiation Scams|url=https://www.consumer.ftc.gov/articles/0109-cell-phone-radiation-scams|publisher=Federal Trade Commission|date=September 2011}}</ref>

      According to the FTC, "there is no scientific proof that so-called shields significantly reduce exposure from electromagnetic emissions. Products that block only the earpiece{{Spaced en dash}}or another small portion of the phone{{Spaced en dash}}are totally ineffective because the entire phone emits electromagnetic waves." Such shields "may interfere with the phone's signal, cause it to draw even more power to communicate with the base station, and possibly emit more radiation."<ref name="ftc-0109-cell-phone-radiation-scams"/> The FTC has enforced false advertising claims against companies that sell such products.<ref name=FTCenforce>{{cite web|last1=Fair|first1=Lesley|title=Federal Trade Commission Advertising Enforcement|url=https://www.ftc.gov/sites/default/files/attachments/training-materials/enforcement.pdf|publisher=Federal Trade Commission|pages=18–19|date=March 1, 2008}}</ref>

