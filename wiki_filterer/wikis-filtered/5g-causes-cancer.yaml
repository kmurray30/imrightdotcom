      ===Hertzian optics===
      Microwaves were first generated in the 1890s in some of the earliest [[radio wave]] experiments by physicists who thought of them as a form of "invisible light".<ref name="Hong1">{{cite book
       | last1  = Hong
       | first1 = Sungook
       | title  = Wireless: From Marconi's Black-box to the Audion
       | publisher = MIT Press
       | date   = 2001
       | pages  = 5–9, 22
       | isbn   = 978-0262082983
       }}</ref> [[James Clerk Maxwell]] in his 1873 theory of [[electromagnetism]], now called [[Maxwell's equations]], had predicted that a coupled [[electric field]] and [[magnetic field]] could travel through space as an [[electromagnetic wave]], and proposed that light consisted of electromagnetic waves of short wavelength.<ref name="Bryant" />{{rp|p=832}}  In 1888, physicist [[Heinrich Hertz]] was the first to demonstrate the existence of electromagnetic waves, generating [[radio wave]]s using a primitive [[spark gap transmitter|spark gap radio transmitter]].<ref name="Bryant" />{{rp|p=830}}<ref name="Roer">{{cite book
       | last  = Roer
       | first = T.G.
       | title  = Microwave Electronic Devices
       | publisher = Springer Science and Business Media
       | date   = 2012
       | pages  = 1–12
       | url    = https://books.google.com/books?id=deDvBwAAQBAJ&pg=PA1
       | isbn   = 978-1461525004
       }}</ref> 

      Hertz and the other early radio researchers were interested in exploring the similarities between radio waves and light waves, to test Maxwell's theory. They concentrated on producing short wavelength radio waves in the [[ultrahigh frequency|UHF]] and microwave ranges, with which they could duplicate classic [[optics]] experiments in their laboratories, using [[quasioptics|quasioptical]] components such as [[Prism (optics)|prism]]s and [[lens (optics)|lens]]es made of [[paraffin wax|paraffin]], [[sulfur]] and [[pitch (resin)|pitch]] and wire [[diffraction grating]]s, to refract and diffract radio waves like light rays.<ref name="Sarkar1">{{cite book
       | last1  = Sarkar
       | first1 = T. K.
       | last2  = Mailloux
       | first2 = Robert
       | last3  = Oliner
       | first3 = Arthur A.
       | title  = History of Wireless
       | publisher = John Wiley and Sons
       | date   = 2006
       | pages  = 474–486
       | url    = https://archive.org/stream/HistoryOfWireless#page/n496/mode/2up
       | isbn   = 978-0471783015
       | author-link1=Tapan Sarkar
       | author-link3=Arthur A. Oliner
       }}</ref> Hertz used frequencies at the threshold of the microwave region: 50, 100, and 430&nbsp;MHz.<ref name="Bryant" />{{rp|p=831}} His directional 430&nbsp;MHz transmitter consisted of a 26&nbsp;cm brass rod [[dipole antenna]] with a spark gap between the ends, suspended at the focal line of a [[parabolic antenna]] made of a curved zinc sheet, powered by high voltage pulses from an [[induction coil]].<ref name="Bryant" />{{rp|p=845}}<ref name="Roer" /> His historic experiments demonstrated that radio waves like light exhibited [[refraction]], [[diffraction]], [[polarization (waves)|polarization]], [[interference (wave motion)|interference]] and [[standing wave]]s,<ref name="Bryant" />{{rp|p=845-846}}<ref name="Sarkar1" /> proving that radio waves and light waves were both forms of Maxwell's [[electromagnetic wave]]s.  He also experimented with open wire and coaxial transmission lines.<ref name="Bryant" />{{rp|p=841}}

