      A '''cell site''', '''cell phone tower''', '''cell base tower''', or '''cellular [[base station]]''' is a [[cellular frequencies|cellular]]-enabled [[mobile device]] site where [[antenna (electronics)|antennas]] and electronic communications equipment are placed (typically on a [[Radio masts and towers|radio mast, tower]], or other raised structure) to create a cell, or adjacent cells, in a [[cellular network]]. The raised structure typically supports antennae and one or more sets of transmitter/receivers [[transceiver]]s, [[digital signal processor]]s, control electronics, a [[GPS receiver]] for timing (for [[CDMA2000]]/[[IS-95]] or [[GSM]] systems), primary and [[backup electrical power]] sources, and sheltering.<ref>{{cite web | url=https://medium.com/technochronicle/cell-tower-and-its-radiation-128f4184a388| title=Learn about what is on a cell tower |author=Raj Krithin Katla| website=Medium |publisher=Techno Chronicle Magazine| date=2020-11-10|access-date=2024-08-21}}</ref>

      Some companies provide infrastructure services for cellular networks, including site acquisition, construction, and ongoing maintenance. These third-party providers can manage multiple sites and coordinate network upgrades, helping operators expand coverage efficiently. Such services are offered by companies that specialize in tower management and network support.<ref>{{Cite web |title=Cell Tower Networks - 5G and Wi-Fi Provider for Towers - Boingo Wireless Inc |url=https://www.boingo.com/towers/ |access-date=2025-11-19 |website=Boingo Wireless, Inc. |language=en-US}}</ref>

      Multiple [[Mobile network operator|cellular providers]] often save money by mounting their antennas on a common shared mast; since separate systems use different frequencies, antennas can be located close together without interfering with each other. Some provider companies operate multiple cellular networks and similarly use colocated base stations for two or more cellular networks, ([[CDMA2000]] or [[GSM]], for example).

      Cell sites are sometimes required to be inconspicuous;<ref name=Chung/> they may be blended with the surrounding area,<ref>{{Cite news|url=https://www.nytimes.com/2004/07/11/nyregion/the-girded-the-bland-and-the-prickly.html|title=The Girded, The Bland And the Prickly|first=Carin|last=Rubenstein|newspaper=The New York Times|date=11 July 2004|access-date=18 February 2017|archive-date=25 June 2020|archive-url=https://web.archive.org/web/20200625054042/https://www.nytimes.com/2004/07/11/nyregion/the-girded-the-bland-and-the-prickly.html|url-status=live}}</ref> mounted on buildings<ref>{{Cite news|url=https://www.nytimes.com/2010/08/21/nyregion/21celltower.html|title=Good Cellphone Service Comes at a Price|first1=Cara|last1=Buckley|first2=Matt|last2=Richtel|newspaper=The New York Times|date=20 August 2010|access-date=18 February 2017|archive-date=4 December 2019|archive-url=https://web.archive.org/web/20191204052859/https://www.nytimes.com/2010/08/21/nyregion/21celltower.html|url-status=live}}</ref> or advertising towers.<ref><nowiki>https://www.ni.com/en/solutions/semiconductor/wireless-infrastructure-development/how-cell-towers-work.html#:~:text=Stealth%20Tower,structures%20like%20buildings%20or%20signage</nowiki>.</ref> Preserved treescapes can often hide cell towers inside an artificial or preserved tree. These installations are generally referred to as concealed or stealth cell sites.<ref name=Chung>{{cite web | url=https://www.techeblog.com/24-cell-phone-towers-disguised-as-everyday-things/| title=24 Cell Phone Towers Disguised as Everyday Things |author=Jackson Chung| website=TechBlog| publisher=Honekai Media|date=2013-08-10|access-date=2024-08-21}}</ref>

      == Overview ==
      A [[cellular network]] is a network of handheld [[mobile phone]]s (cell phones) in which each phone communicates with the [[telephone network]] by [[radio wave]]s through a local antenna at a cellular base station (cell site). The coverage area in which service is provided is divided into a mosaic of small geographical areas called "cells", each served by a separate low power multichannel [[transceiver]] and antenna at a base station. All the cell phones within a cell communicate with the system through that cell's antenna, on separate frequency channels assigned by the base station from a common pool of frequencies used by the system.

      The purpose of cellular organization is to conserve [[bandwidth (signal processing)|radio bandwidth]] by [[frequency reuse]]; the low power radio signals used within each cell do not travel far beyond the cell, so the [[radio channel]]s can be reused in geographically separated cells. When a mobile user moves from one cell to another, their phone is automatically "handed off" to the new cell's antenna, and assigned a new set of frequencies, and subsequently communicates with this antenna. This background handoff process is imperceptible to the user and can occur in the middle of a phone call without any service interruption. Each cell phone has an automated [[full duplex]] digital [[transceiver]] and communicates with the cell antenna over two digital radio channels in the [[ultrahigh frequency|UHF]] or [[microwave]] band, one for each direction of the bidirectional conversation, plus a control channel which handles registering the phone with the network, dialing, and the handoff process.

      Typically, a cell tower is located at the edge of one or more cells and covers multiple cells using [[directional antenna]]s. A common geometry is to locate the cell site at the intersection of three adjacent cells, with three antennas at 120° angles each covering one cell. The type of antenna used for cellular base stations ''(vertical white rectangles in pictures)'', called a [[sector antenna]], usually consists of a vertical collinear array of [[Dipole antenna|dipole]]s. It has a flat, fan-shaped [[radiation pattern]], that is tilted slightly downward to cover the cell area, avoiding radiation at higher angles that could interfere with distant cells reusing the same frequencies. The elevation angle of the antenna must be carefully adjusted, so the beam covers the entire cell without radiating too far. In modern sector antennas beam tilt can usually be adjusted electronically, to avoid the necessity of a lineman climbing the tower to mechanically tilt the antenna when adjustment is needed.

      == Operation ==

      === Range ===

      The working range of a cell site (the range which mobile devices connects reliably to the cell site) is not a fixed figure. It will depend on a number of factors, including: 
      * Height of antenna over surrounding terrain ([[Line-of-sight propagation]]).
      * The frequency of signal in use.
      * The transmitter's rated power.
      * The required uplink/downlink data rate of the subscriber's device<ref>J. Andrews, A. Gohsh (2007). ''Fundamentals of WiMAX'', p. 43</ref>
      * The directional characteristics of the site antenna array.
      * Reflection and absorption of radio energy by buildings or vegetation.
      * Being limited by local geographical or regulatory factors and weather conditions.
      * Timing limitations in some technologies (e.g., even in free space, GSM would be limited to 150&nbsp;km, with 180&nbsp;km being possible with special equipment)

      Generally, in areas where there are enough cell sites to cover a wide area, the range of each one will be set to:
      * Ensure there is enough overlap for "[[handover]]" to/from other sites (moving the signal for a mobile device from one cell site to another, for those technologies that can handle it - e.g. making a GSM phone call while in a car or train).
      * Ensure that the overlap area is not too large, to minimize interference problems with other sites.

      In practice, cell sites are grouped in areas of high population density, with the most potential users. Cell phone traffic through a single site is limited by the base station's capacity; of -56 dBm signal there is a finite number of calls or data traffic that a base station can handle at once. This capacity limitation is commonly the factor that determines the spacing of cell mast sites. In suburban areas, masts are commonly spaced {{convert|2–3|km|mi|abbr=on}} apart and in dense urban areas, masts may be as close as 400–800 m apart.<ref>{{Cite web|url=https://www.electronicdesign.com/communications/understanding-small-cell-wireless-backhaul|title=Understanding Small-Cell Wireless Backhaul|date=3 April 2014|website=Electronic Design|access-date=4 December 2019|archive-date=9 August 2020|archive-url=https://web.archive.org/web/20200809003627/http://electronicdesign.com/communications/understanding-small-cell-wireless-backhaul|url-status=live}}</ref>

      The ''maximum'' range of a mast (where it is not limited by interference with other masts nearby) depends on the same considerations. In any case the limiting factor is the ability of a low-powered personal cell phone to transmit back to the mast. As a rough guide, based on a tall mast and flat [[terrain]], it may be possible to get between {{convert|50 and 70|km|mi|abbr=on}}. When the terrain is hilly, the maximum distance can vary from as little as {{convert|6 to 8|km|mi|abbr=on}} due to encroachment of intermediate objects into the wide center [[Fresnel zone]] of the signal.<ref>[http://www.arcx.com/sites/faq.htm Frequently Asked PCS Questions] undated, URL retrieved 14 August 2007. {{webarchive |url=https://web.archive.org/web/20060509174612/http://www.arcx.com/sites/faq.htm |date=9 May 2006 }}</ref> Depending on terrain and other circumstances, a GSM Tower can replace between {{convert|2 and 50|mi|km|0|abbr=on|order=flip}} of cabling for fixed wireless networks.<ref>[http://www.accel-networks.com/blog/2009/03/ntia-seeks-input-on-broadband-stimulus.html NTIA Seeks Input on Broadband Stimulus Money] undated, URL retrieved 3 March 2009. {{webarchive |url=https://web.archive.org/web/20091122053748/http://www.accel-networks.com/blog/2009/03/ntia-seeks-input-on-broadband-stimulus.html |date=22 November 2009 }}</ref> In addition, some technologies, such as GSM, have an additional absolute maximum range of {{convert|35|km|mi|abbr=on}}, which is imposed by [[Timing advance|technical limitations]]. CDMA and [[Integrated Digital Enhanced Network|IDEN]] have no such limit defined by timing.

      ==== Practical example of range ====
      * 3G/4G/5G ([[5G NR frequency bands#Frequency Range 1|FR1]]) Mobile base station tower: it is technically possible to cover up to 50–150&nbsp;km. (Macrocell)<ref>{{Cite web|url=https://mobilenetworkguide.com.au/mobile_base_stations.html|title=Mobile Phone Base Stations, How do mobile base stations work, Mobile Base Stations in Australia, Cell Tower, Mobile Phone Tower|website=mobilenetworkguide.com.au|access-date=4 December 2019|archive-date=12 November 2020|archive-url=https://web.archive.org/web/20201112020205/https://mobilenetworkguide.com.au/mobile_base_stations.html|url-status=live}}</ref>
      * 5G ([[5G NR frequency bands#Frequency Range 2|FR2]]) Mobile base station: the distances between the 5G base-station is about 250–300&nbsp;m, due to the use of [[Extremely high frequency|millimetre waves]].<ref>{{Cite web|url=https://spectrum.ieee.org/everything-you-need-to-know-about-5g|title=Full Page Reload|website=IEEE Spectrum: Technology, Engineering, and Science News|date=27 January 2017|access-date=4 June 2018|archive-date=15 January 2021|archive-url=https://web.archive.org/web/20210115035415/https://spectrum.ieee.org/video/telecom/wireless/everything-you-need-to-know-about-5g|url-status=live}}</ref>

      === Channel reuse ===
      The concept of "maximum" range is misleading in a cellular network. Cellular networks are designed to support many conversations with a limited number of [[radio channel]]s (slices of [[radio frequency spectrum]] necessary to make one conversation) that are licensed to an operator of a cellular service. To overcome this limitation, it is necessary to repeat and [[frequency reuse|reuse]] the same channels at different locations. Just as a car radio changes from one local station to a completely different local station with the same frequency when traveling to another city, the same radio channel gets reused on a cell mast only a few miles away. To do this, the signal of a cell mast is intentionally kept at low power and in many cases tilted downward to limit its reach. This allows covering an area small enough not to have to support more conversations than the available channels can carry. Due to the sectorized arrangement of antennas on a tower, it is possible to vary the strength and angle for each sector depending on the coverage from other towers in the area.

      === Signal limiting factor ===
      A cell phone may not work at times because it is too far from a mast, or because the phone is in a location where cell phone signals are [[attenuation|attenuated]] by thick building walls, hills, or other structures. The signals do not need a clear [[Line-of-sight propagation|line of sight]] but greater [[radio interference]] will degrade or eliminate reception. When many people try to use the cell mast at the same time, e.g. during a traffic jam or a sports event, then there will be a signal on the phone display but it is blocked from starting a new connection. The other limiting factor for cell phones is the ability to send a signal from its low powered battery to the cell site. Some cell phones perform better than others under low power or low battery, typically due to the ability to send a good signal from the phone to the mast.

      The [[base station controller]] (a central computer that specializes in making phone connections) and the intelligence of the cell phone keeps track of and allows the phone to switch from one mast to the next during conversation. As the user moves towards a mast it picks the strongest signal and releases the mast from which the signal has become weaker; that channel on that mast becomes available to another user.
      {{Further|Frequency reuse}}

      ===Geolocation===

      Cellular [[geolocation]] is less precise than by [[GNSS]] (e.g. GPS), but it is available to devices that do not have [[GPS receiver]]s and where the GNSS is not available. The precision of this system varies and is highest where advanced forward link methods are possible and is lowest where only a single cell site can be reached, in which case the location is only known to be within the coverage of that site.

      An advanced forward link is where a device is within range of at least three cell sites and where the carrier has implemented timing system use.

      Another method is using [[angle of arrival]] (AoA) and it occurs when the device is in range of at least two cell sites, produces intermediate precision. [[Assisted GPS]] uses both satellite and cell phone signals.

      In the United States, for emergency calling service using location data (locally called "[[Enhanced 911]]"), it was required that at least 95% of cellular phones in use on 31 December 2005 support such service. Many carriers missed this deadline and were fined by the [[Federal Communications Commission]].<ref>{{Cite web|url=https://www.fiercewireless.com/wireless/sprint-alltel-usc-fined-for-missed-e911-deadline|title=Sprint, Alltel, USC fined for missed e911 deadline|website=FierceWireless|date=31 August 2007|access-date=4 December 2019|archive-date=29 November 2020|archive-url=https://web.archive.org/web/20201129050859/https://www.fiercewireless.com/wireless/sprint-alltel-usc-fined-for-missed-e911-deadline|url-status=live}}</ref>

      === Radio power and health ===
      {{Further|Mobile phone radiation and health#Health hazards of base stations}}
      According to the U.S. [[Federal Communications Commission]]: "Measurement data obtained from various sources have consistently indicated that 'worst-case' ground-level power densities near typical cellular towers are on the order of 1&nbsp;μW/cm<sup>2</sup> (or 10 mW/m<sup>2</sup>) or less (usually significantly less)."<ref>{{cite book | url = http://transition.fcc.gov/Bureaus/Engineering_Technology/Documents/bulletins/oet56/oet56e4.pdf | title = Questions and Answers about Biological Effects and Potential Hazards of Radiofrequency Electromagnetic Fields | edition = 4th | date = August 1999 | page = 21 | series = OET Bulletin 56 | access-date = 14 September 2022 | archive-date = 20 October 2011 | archive-url = https://web.archive.org/web/20111020131849/http://transition.fcc.gov/Bureaus/Engineering_Technology/Documents/bulletins/oet56/oet56e4.pdf | url-status = live }}</ref>

      Cell phones, cell towers, wi-fi, smart meters, digital enhanced cordless telecommunications phones, cordless phones, baby monitors, and other wireless devices all emit non-ionizing radio frequencies, which the [[World Health Organization]] (WHO) has classified as a "potential" [[carcinogen]],<ref name="Hardell">{{cite journal | last1=Hardell |first1=Lennart |title=World Health Organization, Radiofrequency Radiation and Health—A Hard Nut to Crack (Review) |journal=International Journal of Oncology |date=21 June 2017 |volume=51 |issue=August 2017 |pages=405–13 |doi=10.3892/ijo.2017.4046 |pmid=28656257 |pmc=5504984 }}.</ref> According to the U.S. [[National Cancer Institute]], "No mechanism by which ELF-EMFs or radiofrequency radiation could cause  cancer has been identified."<ref>{{Cite web|url=https://www.cancer.gov/about-cancer/causes-prevention/risk/radiation/electromagnetic-fields-fact-sheet|title=Electromagnetic Fields and Cancer|date=7 January 2019|website=National Cancer Institute|access-date=26 February 2019|archive-date=5 March 2020|archive-url=https://web.archive.org/web/20200305192138/https://www.cancer.gov/about-cancer/causes-prevention/risk/radiation/electromagnetic-fields-fact-sheet|url-status=live}}</ref>

      According to the U.S. [[Food and Drug Administration]], "Scientific consensus shows that non-ionizing radiation is not a carcinogen and, at or below the radio frequency exposure limits set by the FCC, non-ionizing radiation has not been shown to cause any harm to people."<ref>{{cite web | url=https://www.fda.gov/radiation-emitting-products/cell-phones/radio-frequency-radiation-and-cell-phones | title=Radio Frequency Radiation and Cell Phones | website=U.S. Food and Drug Administration | date=30 May 2022 | access-date=14 September 2022 | archive-date=30 September 2022 | archive-url=https://web.archive.org/web/20220930124337/https://www.fda.gov/radiation-emitting-products/cell-phones/radio-frequency-radiation-and-cell-phones | url-status=dead }}</ref>

      == Temporary sites ==
      [[File:At La Palma 2021 1880.jpg|thumb|right|A mobile antenna used during the [[2021 Cumbre Vieja volcanic eruption]]]]
      Although cell antennas are normally attached to permanent structures, carriers also maintain fleets of vehicles, called [[Cell on wheels|cells-on-wheels]] (COWs), that serve as temporary cell sites. A generator may be included for use where network electrical power is not available, and the system may have a wireless [[Backhaul (telecommunications)|backhaul]] link allowing use where a wired link is not available.

      COWs are also used at permanent cell sites—as temporary replacements for damaged equipment, during planned outages, and to augment capacity such as during special events like conventions.

      [[File:Cell on wheels.jpg|upright|thumb|[[Cell on wheels]] (COW)]]

      ==Employment==
      Cell site workers are called [[tower climber]]s or transmission tower workers. Transmission tower workers often work at heights of up to {{cvt|1500|ft|m|order=flip}}, performing installation, maintenance and repair work for cellular phone and other wireless communications companies.

      ==Spy agency setup==
      According to documents leaked to {{lang|de|Der Spiegel}}, the NSA sells a $40,000 "active GSM base station" to be used as a tool to mimic a mobile phone tower and thus monitor cell phones.<ref>{{Cite news|url=https://www.spiegel.de/international/world/catalog-reveals-nsa-has-back-doors-for-numerous-devices-a-940994.html|title=Shopping for Spy Gear: Catalog Advertises NSA Toolbox|first1=Jacob|last1=Appelbaum|first2=Judith|last2=Horchert|first3=Christian|last3=Stöcker|newspaper=Der Spiegel|date=29 December 2013|via=Spiegel Online|access-date=4 December 2019|archive-date=16 December 2020|archive-url=https://web.archive.org/web/20201216161512/https://www.spiegel.de/international/world/catalog-reveals-nsa-has-back-doors-for-numerous-devices-a-940994.html|url-status=live}}</ref>

      In November 2014, ''[[The Wall Street Journal]]'' reported that the Technical Operations Group of the U.S. Marshals utilizes spy devices, known as "dirtboxes", to mimic powerful cell tower signals. Such devices are designed to cause mobile phones to switch over to the tower, as it is the strongest signal within reach. The devices are placed on airplanes to effectively create a "dragnet", gathering data about phones as the planes travel above populated areas.<ref>{{cite news |url=https://www.wsj.com/articles/americans-cellphones-targeted-in-secret-u-s-spy-program-1415917533?tesla=y&mg=reno64-wsj |title=Americans' Cellphones Targeted in Secret U.S. Spy Program: Devices on Planes that Mimic Cellphone Towers Used to Target Criminals, but Also Sift Through Thousands of Other Phones |author=Devlin Barrett |publisher=[[The Wall Street Journal]] |date=13 November 2014 |access-date=14 November 2014 |archive-date=6 June 2018 |archive-url=https://web.archive.org/web/20180606184721/https://www.wsj.com/articles/americans-cellphones-targeted-in-secret-u-s-spy-program-1415917533?tesla=y&mg=reno64-wsj |url-status=live }}</ref><ref>{{cite web |url=https://gizmodo.com/secret-u-s-spy-program-targeted-cell-phones-1658573067 |title=WSJ: A Secret U.S. Spy Program Is Using Planes to Target Cell Phones |author=Kate Knibbs |publisher=Gizmodo |date=13 November 2014 |access-date=14 November 2014 |archive-date=30 November 2020 |archive-url=https://web.archive.org/web/20201130200946/https://gizmodo.com/secret-u-s-spy-program-targeted-cell-phones-1658573067 |url-status=live }}</ref>

      == Off-grid systems ==
      {{more citations needed section|date=April 2012}}
      An off-grid cell site is not connected to the public [[electrical grid]]. Usually the system is [[off-the-grid]] because of difficult access or lack of infrastructure. [[Fuel cell]] or other [[backup power]] systems are added to critical cell sites to provide day-to-day and emergency power. Traditionally, sites have used internal-combustion-engine-driven generator sets,<ref>[http://fr.chfca.ca/itoolkit.asp?pg=BALLARD_07132009 Ballard fuel cells to power telecom backup power units for Motorola] {{webarchive |url=https://web.archive.org/web/20110706172302/http://fr.chfca.ca/itoolkit.asp?pg=BALLARD_07132009 |date=6 July 2011 }}</ref><ref>{{Cite web|url=http://cleantech.com/news/3674/india-telecom-get-fuel-cells|archive-url=https://web.archive.org/web/20101126130543/http://cleantech.com/news/3674/india-telecom-get-fuel-cells|title=India telecoms to get fuel cell power|archive-date=26 November 2010}}</ref> however, being less efficient than public power, they increase [[operating expense]] and are a source of pollution (atmospheric, acoustic, etc.) and some are in areas protected by environment and landscape conservation.

      [[Renewable sources]], such as [[solar power]] and [[wind power]] may be available where cell sites are placed. The first off-grid mast in the UK was installed in 2022 in [[Eglwyswrw]], [[Wales]].<ref>{{cite news|publisher=BBC News|date=15 June 2022|url=https://www.bbc.co.uk/news/uk-wales-61798401|title=Pembrokeshire: Wind and solar powered phone mast in UK first|access-date=15 June 2022|archive-date=15 June 2022|archive-url=https://web.archive.org/web/20220615010846/https://www.bbc.co.uk/news/uk-wales-61798401|url-status=live}}</ref> This can reduce the cost of fuel to the cell site or telecom tower by up to 75%. They can be backed up by a fuel generator system which allows the cell site to work when the renewable sources are not enough. One such energy production system consists of:
      * [[Solar power]] generator
      * [[Wind generator]]
      * Electrochemical generator fuel cells

      Electrical energy from intermittent sources is stored in [[secondary batteries]] which are usually designed to have an average of two days of self-sufficiency, also known as autonomy, to allow time for maintenance personnel to arrive at site when a repair is needed.

      The renewable energy systems supply electrical power when available. The fuel cells are activated only when the natural sources are not enough to supply the energy the system needs. The emergency power supply (the fuel cells) is designed to last an average of ten days. In this way the structure is completely self-sufficient: this enables the maintenance team to pay only few visits to the site, since it is usually hard to get to.

      ==Camouflage==
      {{Unreferenced section|date=February 2023}}

      There is often local opposition to new masts for reasons of [[Mobile phone radiation and health|safety]] and appearance. The latter is sometimes tackled by disguising the mast as something else, such as a flag pole, [[street lamp]], or a [[tree]] (e.g. palm trees, pine trees, cypress) or rooftop structures or urban features such as chimneys or panels.<ref name="flagpole">{{cite news |last1=Ferris |first1=Marc |title=IN BUSINESS; Is That a Flagpole? No, It's a Cell Tower. |url=https://www.nytimes.com/2002/04/21/nyregion/in-business-is-that-a-flagpole-no-it-s-a-cell-tower.html |access-date=23 October 2025 |work=The New York Times |date=21 April 2002}}</ref>

      These concealed cell sites can distinguish themselves by foliage shape and bark type. The foliage of all these antennas is composed of leaves made of plastic material accurately designed, taking into consideration quantity, shape and array suitable to completely conceal the antennas and all accessory parts in a natural manner. The materials used guarantee absolute radio-electric transparency and resistance to UVA rays. Nicknames include "[[Telecommunications_lease#Ground_leases|monopalm]]" for a monopole disguised as a palm tree or "Pseudopinus telephoneyensis" for a mast disguised as a pine tree.<ref>{{cite magazine |last=BOWEN |first=Humphry |date=1999-01-01 |title=NEW CONIFER IN THE BRITISH ISLES? |url=http://www.watsonia.org.uk/BSBINews80.pdf |magazine=BSBI NEWS |issue=January 1999 | page=51 |location=UK |publisher= |access-date=2023-11-01 |archive-url=https://web.archive.org/web/20110726103809/http://www.watsonia.org.uk/BSBINews80.pdf |archive-date=26 July 2011}}</ref> In [[Monopole antenna|monopoles]], the directional antennas are sometimes hidden in a plastic housing near the top of the pole so that the crossbars can be eliminated.

      Rooftop structures such as concealment chimneys or panels, 6 to 12 meters high, may conceal one or more mobile telephone operators on the same station. Roofmask panels can be fixed to existing rooftop structures, restyling them quickly and cheaply.

      <gallery mode="packed" heights="250px">

      File:BTS NodeB antenna Sopot (cropped).jpg|An antenna colored to blend in with its host building, in [[Sopot, Poland]]
      File:PalmCellTower.jpg|Camouflaged monopole, called "monopalm", in [[Arizona]], US
      File:VillepreuxAntenne relais de téléphonie mobile.JPG|A site concealed as a pine tree, in a stand of trees in [[Yvelines]], France
      </gallery>

      ==Miniature==
      <!-- Deleted image removed: [[File:LightRadio, a Rubik's cube sized cell site.jpg|right|thumb|lightRadio]] -->Researchers at [[Alcatel-Lucent]] have developed a cell site called lightRadio that fits in the palm of the hand.<ref>{{Cite web |last=admin-ectnews |date=2011-02-07 |title=Alcatel-Lucent Aims to Rid the Planet of Monster Cell Towers |url=https://www.technewsworld.com/story/alcatel-lucent-aims-to-rid-the-planet-of-monster-cell-towers-71805.html |access-date=2026-01-16 |website=TechNewsWorld |language=en-US}}</ref> It is the size of a [[Rubik's Cube]]. It is capable of relaying [[2G]], [[3G]] and [[4G]] signals. They are more energy efficient and deliver broadband more efficiently than current cell sites. They could be used in very populated urban areas to make room for more radio space.<ref>[https://money.cnn.com/2011/03/21/technology/light_radio/ The tiny cube that could cut your cell phone bill] {{Webarchive|url=https://web.archive.org/web/20201112025213/https://money.cnn.com/2011/03/21/technology/light_radio/ |date=12 November 2020 }}, CNN Money, 21 March 2011, David Goldman</ref>

      ==Water tower cellular==
