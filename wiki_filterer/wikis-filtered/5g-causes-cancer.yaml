    source: |-
      {{Short description|Less harmful range of electromagnetic energy}}
      {{Use dmy dates|date=September 2020}}
      [[File:EM-spectrum.svg|thumb|400px|Different types of [[electromagnetic radiation]]]]

      '''Non-ionizing''' (or '''non-ionising''') '''radiation''' refers to any type of [[electromagnetic radiation]] that does not carry enough [[energy]] per [[quantum]] ([[photon energy]]) to [[ionize]] atoms or molecules—that is, to completely remove an [[electron]] from an [[atom]] or [[molecule]].<ref name="EPA-2014">{{cite web |title=Ionizing & Non-Ionizing Radiation |url=http://www.epa.gov/radiation/understand/ionize_nonionize.html |publisher=[[United States Environmental Protection Agency|EPA]] |date=2014-07-16 |archive-url=https://web.archive.org/web/20140711115413/http://www.epa.gov/radiation/understand/ionize_nonionize.html |archive-date=2014-07-11 |access-date=2020-10-12}}</ref> Instead of producing charged ions when passing through matter, non-ionizing electromagnetic [[radiation]] has sufficient energy only for [[electron excitation|excitation]] (the movement of an electron to a higher energy state). Non-ionizing radiation is not a significant health risk except in circumstances of prolonged exposure to higher frequency non-ionizing radiation or high power densities as may occur in laboratories and industrial workplaces. Non-ionizing radiation is used in various [[Technology|technologies]], including [[radio]] broadcasting, telecommunications, medical imaging, and [[heat]] therapy.<ref name="EPA-2014" />

      In contrast, ''[[ionizing radiation]]'' has a higher frequency and shorter wavelength than non-ionizing radiation, and can be a serious health hazard: exposure to it can cause burns, [[radiation sickness]], many kinds of [[cancer]], and [[genetic damage]]. Using ionizing radiation requires elaborate [[radiation protection|radiological protection]] measures, which in general are not required with non-ionizing radiation.<ref name="CDC-2024">{{Cite web |last=CDC |date=2024-02-22 |title=About Non-Ionizing Radiation |url=https://www.cdc.gov/radiation-health/about/non-ionizing-radiation.html |access-date=2024-09-19 |website=Radiation and Your Health |language=en-us}}</ref><ref>{{Cite web |title=Nonionizing Radiation |url=https://www.radiationanswers.org/radiation-introduction/types-of-radiation/non-ionizing-radiation.html |access-date=2024-09-19 |website=Radiation Answers |language=en}}</ref> 

      The region at which radiation is considered "ionizing" is not well defined, since different molecules and atoms ionize at [[Ionization energies of the elements (data page)|different energies]]. The usual definitions have suggested that radiation with particle or photon energies less than 10 [[electronvolt]]s (eV) be considered non-ionizing. Another suggested threshold is 33 electronvolts, which is the energy needed to ionize water molecules. The light from the [[Sun]] that reaches the earth is largely composed of non-ionizing radiation, since the ionizing far-[[ultraviolet]] rays have been filtered out by the gases in the atmosphere, particularly oxygen.<ref name="CDC-2024" />

      ==Mechanisms of interaction with matter, including living tissue==
      [[Near ultraviolet]], [[visible light]], [[infrared]], [[microwave]], [[radio|radio waves]], and low-frequency radio frequency (very low frequency, extremely low frequency) are all examples of non-ionizing radiation. By contrast, far ultraviolet light, X-rays, gamma-rays, and all particle radiation from [[radioactive decay]] are ionizing. Visible and near ultraviolet electromagnetic radiation may induce [[photochemical reactions]], or accelerate [[radical reaction]]s, such as photochemical [[aging]] of varnishes<ref>{{Cite web |url=http://www.zenobi.ethz.ch/publications/HelvChimActa_1766.pdf |title=''Helv. Chim. Acta'' vol. 83 (2000), pp. 1766 |access-date=10 September 2007 |archive-url=https://web.archive.org/web/20060621183237/http://www.zenobi.ethz.ch/publications/HelvChimActa_1766.pdf |archive-date=21 June 2006 }}</ref> or the breakdown of flavoring compounds in beer to produce the "[[Beer bottle#Lightstruck beer|lightstruck flavor]]".<ref>[http://www.rsc.org/publishing/journals/PP/article.asp?doi=b316210a Photochemical & Photobiological Sciences, 2004, 3, 337-340],  {{doi|10.1039/b316210a}}</ref> Near ultraviolet radiation, although technically non-ionizing, may still excite and cause photochemical reactions in some molecules. This happens because at ultraviolet photon energies, molecules may become electronically excited or promoted to free-radical form, even without ionization taking place.

      The occurrence of ionization depends on the energy of the individual particles or waves, and not on their number. An intense flood of particles or waves will not cause ionization if these particles or waves do not carry enough energy to be ionizing, unless they raise the temperature of a body to a point high enough to ionize small fractions of atoms or molecules by the process of thermal-ionization. In such cases, even "non-ionizing radiation" is capable of causing thermal-ionization if it deposits enough heat to raise temperatures to ionization energies. These reactions occur at far higher energies than with ionizing radiation, which requires only a single particle to ionize. A familiar example of thermal ionization is the flame-ionization of a common fire, and the [[browning (food process)|browning]] reactions in common food items induced by infrared radiation, during broiling-type cooking.

      The energy of non-ionizing radiation is low, and instead of producing charged ions when passing through matter, it has only sufficient energy to change the rotational, vibrational or electronic valence configurations of molecules and atoms. This produces thermal effects. The possible non-thermal effects of non-ionizing forms of radiation on living tissue have only recently been studied. Much of the current debate is about relatively low levels of exposure to radio frequency (RF) radiation from mobile phones and base stations producing "non-thermal" effects. Some experiments have suggested that there may be biological effects at non-thermal exposure levels, but the evidence for production of health hazard is contradictory and unproven. The scientific community and international bodies acknowledge that further research is needed to improve our understanding in some areas. The consensus is that there is no consistent and convincing scientific evidence of adverse health effects caused by RF radiation at powers sufficiently low that no thermal health effects are produced.<ref name="Moulder">{{cite web|author=John E. Moulder|title=Static Electric and Magnetic Fields and Human Health|url=http://www.mcw.edu/radiationoncology/ourdepartment/radiationbiology/Static-Electric-and-Magnetic-F.htm|archive-url=https://web.archive.org/web/20140902054000/http://www.mcw.edu/radiationoncology/ourdepartment/radiationbiology/Static-Electric-and-Magnetic-F.htm|archive-date=2 September 2014}}</ref><ref name="ICNIR2003">{{cite journal|author=Kwan-Hoong Ng|date=20–22 October 2003|title=Non-Ionizing Radiations – Sources, Biological Effects, Emissions and Exposures|url=https://emfsurvey.com/wp-content/uploads/Non-Ionizing-EMF-Radiation-Biological-Effects-Safety.pdf|journal=Proceedings of the International Conference on Non-Ionizing Radiation at UNITEN ICNIR2003 Electromagnetic Fields and Our Health}}</ref>

      ==Health risks==
      Different biological effects are observed for different types of non-ionizing radiation.<ref name="Moulder" /><ref name="WHO IARC" /><ref name="ICNIR2003" /> The upper frequencies (lower energy ultraviolet) of non-ionizing radiation are capable of non-thermal biological damage, similar to ionizing radiation. It is still to be proven that non-thermal effects of radiation of much lower frequencies (microwave, millimetre and radiowave radiation) entail health risks.
      === Upper frequencies ===

      Prolonged exposure to non-ionizing [[Ultraviolet light and cancer|ultraviolet light is a risk factor for developing skin cancer]] (especially non-melanoma skin cancers), [[sunburn]], and [[Photoaging|premature aging of skin]]. Damage to the eye includes [[photokeratitis]]. There is some evidence that exposure also increase the risk of infection.<ref name="ICNIR2003"/>

      === Lower frequencies ===
      [[File:Radio waves hazard symbol.svg|thumb|Non-ionizing radiation [[hazard symbol|hazard sign]]]]
      Lower frequency non-ionizing radiation can produce [[mutagen|non-mutagenic]] effects through additional thermal energy in biological tissue that can lead to burns.<ref name="ICNIR2003"/> Power densities above 100mV/cm<sup>2</sup> can increase body temperature and may cause tissue damage, especially to eyes and testes. These intensities are a concern for industrial workplace safety.<ref>{{Cite web |title=Non-Ionizing Radiation Safety |url=https://www.ehs.washington.edu/radiation/non-ionizing-radiation-safety |access-date=2025-06-03 |website=UW Environmental Health & Safety}} [https://www.ehs.washington.edu/system/files/resources/EHS_NIR_Safety_Manual.pdf Safety Manual]</ref> 

      In 2011, the [[International Agency for Research on Cancer]] (IARC) from the [[World Health Organization]] (WHO) released a statement adding RF electromagnetic fields (including microwave and millimetre waves) to their list of things which are possibly carcinogenic to humans.<ref name="WHO IARC">{{cite press release|url=http://www.iarc.fr/en/media-centre/pr/2011/pdfs/pr208_E.pdf|title=IARC Classifies Radiofrequency Electromagnetic Fields As Possibly Carcinogenic To Humans|journal=Press Release|date=31 May 2011|author=IARC|access-date=30 May 2013|archive-date=15 November 2018|archive-url=https://web.archive.org/web/20181115203145/http://www.iarc.fr/en/media-centre/pr/2011/pdfs/pr208_E.pdf|url-status=live}}</ref> 

      In terms of potential biological effects, the non-ionizing portion of the spectrum can be subdivided into:
      # The optical radiation portion, where electron excitation can occur (visible light, infrared light)
      # The portion where the wavelength is smaller than the body. Heating via induced currents can occur. In addition, there are claims of other adverse biological effects. Such effects are not well understood and even largely denied. (Microwave and higher-frequency RF).
      # The portion where the wavelength is much larger than the body, and heating via induced currents seldom occurs (lower-frequency RF, power frequencies, static fields).<ref name="Moulder"/>

      The above effects have only been shown to be due to heating effects. At low power levels where there is no heating effect, the risk of cancer is not significant.<ref>{{Cite web|url=https://www.cancer.gov/about-cancer/causes-prevention/risk/radiation/electromagnetic-fields-fact-sheet|title=Electromagnetic Fields and Cancer|website=National Cancer Institute|access-date=2018-09-10|archive-date=5 March 2020|archive-url=https://web.archive.org/web/20200305192138/https://www.cancer.gov/about-cancer/causes-prevention/risk/radiation/electromagnetic-fields-fact-sheet|url-status=live}}</ref><ref>{{Cite web|url=https://www.cancer.gov/about-cancer/causes-prevention/risk/radiation|title=Radiation|website=National Cancer Institute|date=29 April 2015|access-date=2023-11-16|quote="Lower-energy, non-ionizing forms of radiation, ... , have not been found to cause cancer in people."|archive-date=4 February 2020|archive-url=https://web.archive.org/web/20200204133838/https://www.cancer.gov/about-cancer/causes-prevention/risk/radiation|url-status=live}}</ref>

      The [[International Agency for Research on Cancer]] recently stated that there could be some risk from non-ionizing radiation to humans.<ref>{{Cite web |url=http://www.iarc.fr/en/media-centre/pr/2011/pdfs/pr208_E.pdf |title=WHO/IARC Classifies Electromagnetic Fields as Possibly Carcinogenic to Humans |access-date=30 May 2013 |archive-date=15 November 2018 |archive-url=https://web.archive.org/web/20181115203145/http://www.iarc.fr/en/media-centre/pr/2011/pdfs/pr208_E.pdf |url-status=live }}</ref> But a subsequent study reported that the basis of the IARC evaluation was not consistent with observed incidence trends.<ref>{{cite journal|vauthors=Little MP, Rajaraman P, Curtis RE, Devesa SS, Inskip PD, Check DP, Linet MS |year=2012|title=Mobile phone use and glioma risk: comparison of epidemiological study results with incidence trends in the United States|journal=BMJ|volume=344|article-number=e1147|doi=10.1136/bmj.e1147|pmc=3297541|pmid=22403263}}</ref> This and other reports suggest that there is virtually no way that results on which the IARC based its conclusions are correct.<ref>{{cite web|author=Emily Oster|date=6 January 2015|title=Cellphones Do Not Give You Brain Cancer|url=https://fivethirtyeight.com/features/cellphones-do-not-give-you-brain-cancer/|work=FiveThirtyEight|access-date=11 March 2015|archive-date=23 September 2024|archive-url=https://web.archive.org/web/20240923133937/https://fivethirtyeight.com/features/cellphones-do-not-give-you-brain-cancer/|url-status=live}}</ref>
      {{clear}}

