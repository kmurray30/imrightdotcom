      5G is the fifth generation of cellular network technology and the successor to 4G.  First deployed in 2019, its technical standards are developed by the 3rd Generation Partnership Project (3GPP) in cooperation with the ITU's IMT-2020 program. 5G networks divide coverage areas into smaller zones called cells, enabling devices to connect to local base stations via radio. Each station connects to the broader telephone network and the Internet through high-speed optical fiber or wireless backhaul.
      Compared to 4G, 5G offers significantly faster data transfer speed—up to 10 Gbps (Gigabits per second) in tests—and lower latency, with response times of just a few milliseconds. These advancements allow networks to support more users and applications such as extended reality, autonomous vehicles, remote surgery trials, and fixed wireless access for home Internet access. 5G also supports massive connectivity for sensors and machines, commonly referred to as the Internet of things (IoT), and leverages edge computing to improve data processing efficiency.

      Building 5G networks requires new infrastructure and access to suitable radio spectrum. Network operators report high costs and continue to improve...
