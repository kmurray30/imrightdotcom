      '''Lennart Hardell''' (born 1944), is a Swedish oncologist and professor at [[Örebro University Hospital]] in [[Örebro, Sweden]].<ref>[http://www.icems.eu/docs/bios_Hardell.pdf Lennart Hardell Bio]</ref> He is known for his research into what he says are environmental cancer-causing agents, such as [[Agent Orange]],<ref>{{cite web | url=https://news.bbc.co.uk/2/hi/health/6220440.stm | title=Industry 'paid top cancer expert' | work=BBC News | date=8 December 2006 | access-date=7 November 2014}}</ref> and has said that [[cell phone]]s increase the risk of brain tumors.<ref>{{cite web | url=http://usatoday30.usatoday.com/news/health/2002-09-10-cell-phones-cancer_x.htm | title=Cancer study may help Motorola suit | work=USA Today | access-date=7 November 2014 | agency=Associated Press}}</ref>

      ==Mobile phone use and cancer==
      Hardell's research on cell phones and cancer concluded that long-term mobile phone use is associated with an increased risk of [[acoustic neuroma]] and [[glioma]].<ref>{{cite journal|last1=Hardell|first1=L.|last2=Carlberg|first2=M.|last3=Soderqvist|first3=F.|last4=Mild|first4=K. H.|last5=Morgan|first5=L. L.|title=Long-term use of cellular phones and brain tumours: increased risk associated with use for >=10 years|journal=Occupational and Environmental Medicine|date=16 January 2007|volume=64|issue=9|pages=626–632|doi=10.1136/oem.2006.029751|pmid=17409179|pmc=2092574}}</ref><ref>{{cite news | url=https://www.washingtonpost.com/wp-dyn/content/article/2010/06/28/AR2010062805231.html | title=Cellphone industry attacks San Francisco's ruling on radiation | newspaper=Washington Post | date=29 June 2010 | access-date=7 November 2014 | author=Kang, Cecilia}}</ref> He has said that children should be banned from using cell phones except in emergencies, as he feels the risk of cancer is greater in people who begin using mobile phones before the age of 20.<ref>{{cite web | url=https://www.telegraph.co.uk/health/3042340/Mobile-phones-may-raise-cancer-risk-in-children-study-finds.html | archive-url=https://web.archive.org/web/20081202033210/http://www.telegraph.co.uk/health/3042340/Mobile-phones-may-raise-cancer-risk-in-children-study-finds.html | archive-date=December 2, 2008 | title=Mobile phones may raise cancer risk in children, study finds | work=Daily Telegraph | date=21 September 2008 | access-date=7 November 2014 | author=Knapton, Sarah}}</ref> However, after decades of research, these findings have not been consistently replicated by other studies.

      His early research on wireless phones and cancer was criticized in a 2002 review for methodological flaws. The review authors, John D. Boice Jr. and Joseph K. McLaughlin, wrote that Hardell's study, published in the ''[[European Journal of Cancer Prevention]]'', was "non-informative, either because the follow-up was too short and numbers of cancers too small, or because of serious methodological limitations."<ref>{{cite web | url=http://usatoday30.usatoday.com/tech/news/2002-09-19-phones-cancer_x.htm | title=Cell phone studies find no 'consistent evidence' of cancer link | work=USA Today | access-date=7 November 2014 | agency=Associated Press}}</ref> Another of Hardell's studies, in which he claimed that mobile phone users in rural areas were at a greater risk of developing brain tumors,<ref>{{cite journal|last1=Hardell|first1=L|title=Use of cellular telephones and brain tumour risk in urban and rural areas|journal=Occupational and Environmental Medicine|date=1 June 2005|volume=62|issue=6|pages=390–394|doi=10.1136/oem.2004.017434|pmc=1741035|pmid=15901886}}</ref><ref>{{cite web | url=https://www.theguardian.com/science/2005/may/17/mobilephones.health | title=Rural mobile phone users 'risk tumours' | work=The Guardian | date=17 May 2005 | access-date=7 November 2014 | author=Radford, Tim}}</ref> was criticized by Adam Burgess in ''[[Spiked (magazine)|Spiked]]''. Burgess wrote that the study was "post hoc and therefore hypothesis-generating only," and said that the increased risk Hardell had claimed to have found in the study was "barely statistically significant."<ref>{{cite web | url=http://www.spiked-online.com/newsite/article/1027#.VF2Ch_TF_N4 | title=Dialling up an old panic | work=Spiked | date=27 May 2005 | access-date=7 November 2014 | author=Burgess, Adam}}</ref>

      Later studies by the Hardell group have consistently shown increasingly significant risks for brain tumor development associated with wireless phone use {{citation needed|date=August 2016}}. His findings, together with results from the international INTERPHONE study on mobile  phones and health, contributed to the verdict by WHO and IARC in 2011, where mobile phone radiation was deemed as "possibly" carcinogenic (group 2B).<ref>{{cite web | url=http://scienceblog.cancerresearchuk.org/2011/05/31/who-verdict-on-mobile-phones-and-cancer/ | title=World Health Organisation verdict on mobile phones and cancer | work=Cancer Research UK | date=31 May 2011 | access-date=17 February 2016 | author=Yong, Ed}}</ref> However, this classification has been criticized by ICNIRP, which argued that the evidence supporting the "possibly carcinogenic" classification was limited and did not adequately consider methodological issues and the overall weight of evidence.<ref>{{cite web|last=International Commission on Non-Ionizing Radiation Protection (ICNIRP)|title=ICNIRP Statement on the "IARC Classification of Radiofrequency Electromagnetic Fields" (RF-EMF)|url=https://www.icnirp.org/cms/upload/publications/ICNIRP_IARCclassificationRF.pdf|date=June 2011|access-date=5 January 2025}}</ref>

      Little et al. reported in 2012 that the increased risk of [[glioma]] associated with mobile phone use found by a 2011 study by Hardell et al. were not consistent with observed trends in glioma incidence in the United States.<ref>{{cite journal|last1=Little|first1=M. P.|last2=Rajaraman|first2=P.|last3=Curtis|first3=R. E.|last4=Devesa|first4=S. S.|last5=Inskip|first5=P. D.|last6=Check|first6=D. P.|last7=Linet|first7=M. S.|title=Mobile phone use and glioma risk: comparison of epidemiological study results with incidence trends in the United States|journal=BMJ|date=8 March 2012|volume=344|issue=mar08 1|article-number=e1147|doi=10.1136/bmj.e1147|pmid=22403263|pmc=3297541}}</ref> Although with regard to the paper of Little et al., data on mobile phone use and cancer incidence rates in the US is more difficult to compare with the aforementioned European studies on mobile phone use and cancer risks than it seems, especially due to differences in technology standards between the US and Europe in early years of mobile phone network technology development – including notable differences in power output between the CDMA standard (which had been widely implemented in the US) and the GSM standard.<ref>{{cite journal|last1=Kelsh|first1=M.A|last2=Shum|first2=M.|last3=Sheppard|first3=A.R.|last4=Mcneely|first4=M.|last5=Kuster|first5=N.|last6=Lau|first6=E.|last7=Weidling|first7=R.|last8=Fordyce|first8=T.|last9=Kuhn|first9=S.|last10=Sulcer|first10=C.|  title=Measured radiofrequency exposure during various mobile-phone use scenarios|journal=Journal of Exposure Science and Environmental Epidemiology|date=2011|volume=21|issue=4 |pages=343–354|doi=10.1038/jes.2010.12|pmid=20551994 |doi-access=free}}</ref>

      Recent systematic reviews, such as the one by Karipidis et al. (2024), critically examine the association between radiofrequency electromagnetic fields (RF-EMF) and cancer. This study highlights significant methodological shortcomings in earlier works, including those by Hardell et al., and finds no consistent evidence linking mobile phone use to increased risks of glioma or other critical neoplasms. These findings underscore the necessity of interpreting Hardell's results with caution, given the robust counter-evidence and more rigorous methodologies employed in subsequent research.<ref>{{cite journal|last1=Karipidis|first1=K.|last2=Baaken|first2=D.|last3=Loney|first3=T.|last4=Blettner|first4=M.|last5=Brzozek|first5=C.|last6=Elwood|first6=M.|last7=Narh|first7=C.|last8=Orsini|first8=N.|last9=Roösli|first9=M.|last10=Silva Paulo|first10=M.|last11=Lagorio|first11=S.|title=The effect of exposure to radiofrequency fields on cancer risk in the general and working population: A systematic review of human observational studies – Part I: Most researched outcomes|journal=Environment International|date=2024|volume=191|article-number=108983|doi=10.1016/j.envint.2024.108983|url=https://www.sciencedirect.com/science/article/pii/S0160412024005695|hdl=10362/172700|hdl-access=free}}</ref>

      ===Court cases===
      Hardell testified in a 2002 US court case involving a man who filed a lawsuit claiming that his cell phone caused him to develop a brain tumor. The judge in the case, [[Catherine C. Blake]], dismissed the suit and criticized Hardell's testimony, saying that of the two studies Hardell cited, one found no increased risk of tumors associated with cell phone use. Blake added that the other study was criticized as flawed by experts, and said that numerous studies and governmental bodies had come to conclusions that ran contrary to Hardell's opinion.<ref>{{cite journal|doi=10.1126/science.298.5592.338|title=Judge Rejects Cancer Data in Maryland Cell Phone Suit|journal=Science|author=Parascandola, Mark|date=11 October 2002|volume=298 |issue=5592 |page=338 |pmid=12376672 |s2cid=39075750 |doi-access=free}}</ref>

      In 2012, based on Hardell's research, Italy's supreme court ruled that a business executive's brain tumor was caused by his cell phone use.<ref>{{cite web | url=https://www.reuters.com/article/us-italy-phones-idUSBRE89I0V320121019 | title=Italy court ruling links mobile phone use to tumor | work=Reuters | date=19 October 2012 | access-date=7 November 2014}}</ref> This decision was made despite the lack of solid scientific evidence and the absence of a described biophysical causal mechanism to explain the alleged association between mobile phone use and tumor development.

