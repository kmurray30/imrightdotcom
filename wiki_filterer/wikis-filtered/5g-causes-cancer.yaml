      Extremely high frequency (EHF) is the International Telecommunication Union (ITU) designation for the band in the electromagnetic spectrum from 30 to 300 gigahertz (GHz). It is in the microwave part of the radio spectrum, between the super high frequency band and the terahertz band. Radio waves in this band have wavelengths from ten to one millimeter, so it is also called the millimeter band and radiation in this band is called millimeter waves, sometimes abbreviated MMW or mmWave. 
      Some define mmWaves as starting at 24 GHz, thus covering the entire FR2 band (24.25 to 71 GHz), among others.
      Compared to lower bands, radio waves in this band have high atmospheric attenuation: they are absorbed by the gases in the atmosphere. Absorption increases with frequency until at the top end of the band the waves are attenuated to zero within a few meters. Absorption by humidity in the atmosphere is significant except in desert environments, and attenuation by rain (rain fade) is a serious problem even over short distances. However the short propagation range allows smaller frequency reuse distances than lower frequencies. The short wavelength allows modest size antennas to have a small beam width...
