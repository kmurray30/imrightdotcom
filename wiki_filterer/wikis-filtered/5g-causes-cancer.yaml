  - title: Interphone study
    pageid: 44661845
    extract: |-
      The Interphone study (sometimes stylized as INTERPHONE) was a set of international case-control studies conducted with the aim of determining whether mobile phone use increased the risk of certain tumors, namely, glioma, meningioma, and schwannoma. The study was conducted by the International Agency for Research on Cancer (IARC) in thirteen countries, at a cost of $24 million. About fifty scientists worked on the study, which was the largest case-control study conducted on the association between mobile phones and cancer as of 2014. The study's results, published in 2010, indicated that mobile phone use did not increase the risk of tumors among most cell phone users, with the possible exception of an increased risk among the 10% of users who used their cell phones the most.
      In the Interphone study, the top 10% of users used their phones 30 minutes/day. Some users reported using their cell phones >5 hours per day, but this was considered implausible at the time of the study.  The median usage was less than 2.5 hours per month.
    source: |-
      The '''Interphone study''' (sometimes stylized as '''INTERPHONE''') was a set of international [[case-control study|case-control studies]] conducted with the aim of determining whether mobile phone use increased the risk of certain tumors, namely, [[glioma]], [[meningioma]], and [[schwannoma]].<ref>{{cite web | url=http://interphone.iarc.fr/ | title=Interphone Study Website | publisher=International Agency for Research on Cancer | accessdate=30 June 2017}}</ref> The study was conducted by the [[International Agency for Research on Cancer]] (IARC) in thirteen countries,<ref>{{cite web | url=http://www.cbc.ca/news/technology/cellphone-brain-cancer-link-still-open-question-1.940298 | title=Cellphone brain cancer link still open question | work=CBC News | date=17 May 2010 | accessdate=10 December 2014}}</ref> at a cost of $24 million.<ref name=latimes/> About fifty scientists worked on the study,<ref>{{cite news | url=https://www.economist.com/science-and-technology/2008/09/25/mobile-madness | title=Mobile madness | newspaper=The Economist | date=25 September 2008 | access-date=10 December 2014}}</ref> which was the largest case-control study conducted on the association between mobile phones and cancer as of 2014.<ref name=acs/> The study's results, published in 2010, indicated that mobile phone use did not increase the risk of tumors among most cell phone users, with the possible exception of an increased risk among the 10% of users who used their cell phones the most.<ref name=acs>{{cite web | url=http://www.cancer.org/cancer/cancercauses/othercarcinogens/athome/cellular-phones | title=Cellular Phones | work=American Cancer Society | accessdate=19 April 2015}}</ref>

      In the Interphone study, the top 10% of users used their phones 30 minutes/day. Some users reported using their cell phones >5 hours per day, but this was considered implausible at the time of the study.  The median usage was less than 2.5 hours ''per month''.

      ==History and design==
      In 1998 and 1999, the IARC conducted a feasibility study which concluded that a large case-control study examining the relationship between mobile phone use and risk of brain tumors would be "feasible and informative".<ref>{{cite web | url=http://www.iarc.fr/en/media-centre/pr/2010/pdfs/pr200_E.pdf | title=Interphone study reports on mobile phone use and brain cancer risk | work=IARC | date=17 May 2010 | accessdate=10 December 2014}}</ref> After this conclusion was reached, Interphone began in 2000, and interviewed over 5,000 people with either glioma or meningioma.<ref>{{cite journal|last1=Swerdlow|first1=AJ|last2=Feychting|first2=M|last3=Green|first3=AC|last4=Leeka Kheifets|first4=LK|last5=Savitz|first5=DA|last6=International Commission for Non-Ionizing Radiation Protection Standing Committee on|first6=Epidemiology|title=Mobile phones, brain tumors, and the interphone study: where are we now?|journal=Environmental Health Perspectives|date=November 2011|volume=119|issue=11|pages=1534–8|pmid=22171384|doi=10.1289/ehp.1103693|pmc=3226506}}</ref> The study ended in 2006 and was originally due to be released that year, but its release was delayed until 2010 because scientists involved in the study could not agree on how its results should be described.<ref>{{cite web | url=https://www.theguardian.com/science/2010/may/17/mobile-phones-brain-cancer-study | title=Mobile phone study finds no solid link to brain tumours | work=The Guardian | date=17 May 2010 | accessdate=10 December 2014 | author=Sample, Ian}}</ref>

      ==Funding==
      Interphone received some funding from the mobile phone industry,<ref name=latimes>{{cite web | url=https://www.latimes.com/archives/la-xpm-2009-sep-09-fi-lazarus9-story.html | title=Cellphones and brain tumors: Report revives nagging questions | work=Los Angeles Times | date=9 September 2009 | access-date=10 December 2014 | author=Lazarus, David}}</ref> including the [[Mobile Manufacturers Forum]] and [[Groupe Speciale Mobile Association]],<ref>{{Cite web |url=http://interphone.iarc.fr/interphone_funding.php |title=Funding |access-date=2014-12-10 |archive-date=2020-05-03 |archive-url=https://web.archive.org/web/20200503111631/https://interphone.iarc.fr/interphone_funding.php |url-status=dead }}</ref> but this was subject to guarantees that the study would remain scientifically independent.<ref>{{cite journal|last1=Cressey|first1=Daniel|title=No link found between mobile phones and cancer|journal=Nature|date=17 May 2010|doi=10.1038/news.2010.246}}</ref>

      ==Results==
      On May 17, 2010, the Interphone study's results were published in the ''[[International Journal of Epidemiology]]''.<ref name=ije>{{cite journal|last1=INTERPHONE Study Group|title=Brain tumour risk in relation to mobile telephone use: results of the INTERPHONE international case-control study|journal=International Journal of Epidemiology|volume=39|issue=3|pages=675–694|doi=10.1093/ije/dyq079|pmid=20483835|date=June 2010|doi-access=free}}</ref> The results indicated that overall, mobile phone use did not increase the risk of glioma or meningioma, and that, in fact, a decrease in risk was observed. The authors said this decrease may have been due to study limitations.<ref name=cnn/> However, the results also found that among people who were exposed to mobile phones the most (half an hour per day over ten years), there was evidence of an increase in risk of glioma. The study also concluded that "biases and error prevent a causal interpretation" with regard to the increased risk of glioma observed at the highest exposure levels.<ref name=ije/> The authors also said that the number of people using their mobile phones this much was relatively small.<ref name=cnn>{{cite web | url=http://www.cnn.com/2010/HEALTH/05/14/cell.phones.brain.tumor/ | title=Study fails to end debate on cancer, cell phone link | work=CNN | date=18 May 2010 | accessdate=10 December 2014 | author=Landau, Elizabeth}}</ref>

      ==Reaction==
      The results of the study were hailed by the mobile phone industry, but some researchers criticized the study, with an editorial accompanying it arguing that its results were likely due to bias.<ref>{{cite magazine | url=http://content.time.com/time/magazine/article/0,9171,1990808,00.html | title=Cell Phones and Cancer: A Study's Muddled Findings | magazine=Time | date=17 May 2010 | accessdate=10 December 2014 | author=Walsh, Bryan}}</ref> [[Michael Thun]] of the [[American Cancer Society]] noted that Interphone was the largest study of mobile phone use and tumor risk conducted to date, but also criticized it, saying in a statement that "The majority of participants in this study were not heavy cell phone users compared to today's practices."<ref>{{cite web | url=http://www.cancer.org/cancer/news/major-study-complicates-debate-over-cell-phone-use-and-cancer-risk | title=Major Study Complicates Debate over Cell Phone Use and Cancer Risk | work=American Cancer Society | date=18 May 2010 | accessdate=10 December 2014 | author=Snowden, Rebecca}}</ref> [[John Niederhuber]], the then-director of the [[National Cancer Institute]], said that Interphone "illustrates how difficult it is to identify and corroborate, or definitively rule out, any possible association between the two [i.e. cell phones and cancer]".<ref>{{cite web | url=http://www.cancer.gov/newscenter/newsfromnci/2010/Interphone2010Results | title=International Study Shows No Increased Risk of Brain Tumors from Cell Phone Use | work=NCI | date=17 May 2010 | accessdate=10 December 2014 | archive-date=8 October 2014 | archive-url=https://web.archive.org/web/20141008201304/http://www.cancer.gov/newscenter/newsfromnci/2010/Interphone2010Results | url-status=dead }}</ref>

