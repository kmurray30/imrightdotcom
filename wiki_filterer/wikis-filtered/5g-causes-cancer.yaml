      Cancer is a group of diseases involving uncontrolled cell growth typically resulting in tumors with the potential to invade or spread to other parts of the body. These malignant tumors contrast with benign tumors, which do not spread. Over 100 types of cancers affect humans.
      About 33% of deaths from cancer are caused by tobacco and alcohol consumption, obesity, lack of fruit and vegetables in diet and lack of exercise. Other factors include certain infections, exposure to ionizing radiation, and environmental pollutants. Infection with specific viruses, bacteria, and parasites causes approximately 16–18% of cancers worldwide. These infectious agents include Helicobacter pylori, hepatitis B, hepatitis C, HPV, Epstein–Barr virus, Human T-lymphotropic virus 1, Kaposi's sarcoma-associated herpesvirus and Merkel cell polyomavirus. Human immunodeficiency virus (HIV) does not directly cause cancer, but it causes immune deficiency that can increase the risk of cancer from other infections, sometimes up to several thousandfold (in the case of Kaposi's sarcoma). Importantly, vaccination against the hepatitis B virus and the human papillomavirus have been shown to nearly eliminate the risk of...
