  - title: Electromagnetic radiation and health
    pageid: 41098
    extract: |-
      Electromagnetic radiation can be classified into two types: ionizing radiation and non-ionizing radiation, based on the capability of a single photon with more than 10 eV energy to ionize atoms or break chemical bonds. Extreme ultraviolet and higher frequencies, such as X-rays or gamma rays are ionizing, and these pose their own special hazards: see radiation poisoning. The field strength of electromagnetic radiation is measured in volts per meter (V/m).
      The most common health hazard of radiation is sunburn, which causes between approximately 100,000 and 1 million new skin cancers annually in the United States.
      In 2011, the World Health Organization (WHO) and the International Agency for Research on Cancer (IARC) have classified radiofrequency electromagnetic fields as possibly carcinogenic to humans (Group 2B).
    source: |-
      {{Short description|Aspect of public health}}
      {{about|the health effects of non-ionizing radiation|the negative health effects of ionizing radiation|radiation poisoning}}
      {{Use dmy dates|date=July 2019}}
      {{CS1 config|mode=cs1}}
      [[File:EM-spectrum.svg|alt=Types of radiation in the electromagnetic spectrum|thumb|Types of radiation in the electromagnetic spectrum|350x350px]]
      {{Pollution sidebar|Radiation}}

      [[Electromagnetic radiation]] can be classified into two types: [[ionizing radiation]] and [[non-ionizing radiation]], based on the capability of a single [[photon]] with more than 10&nbsp;[[electronvolt|eV]] energy to ionize atoms or break [[chemical bond]]s.<ref>{{cite book | first1=Robert F. | last1=Cleveland Jr | first2=Jerry L. | last2=Ulcek | name-list-style=vanc | title=Questions and Answers about Biological Effects and Potential Hazards of Radiofrequency Electromagnetic Fields | publisher=OET (Office of Engineering and Technology) Federal Communications Commission | location=Washington, D.C. | edition=4th | date=August 1999 | url=https://transition.fcc.gov/Bureaus/Engineering_Technology/Documents/bulletins/oet56/oet56e4.pdf | access-date=2019-01-29 | archive-date=30 June 2019 | archive-url=https://web.archive.org/web/20190630222229/https://transition.fcc.gov/Bureaus/Engineering_Technology/Documents/bulletins/oet56/oet56e4.pdf | url-status=live }}</ref> [[Extreme ultraviolet]] and higher frequencies, such as [[X-ray]]s or [[gamma ray]]s are ionizing, and these pose their own special hazards: see ''[[radiation poisoning]]''. The [[field strength]] of electromagnetic radiation is measured in volts per meter (V/m).<ref name="SIBrochure9thEd">{{Citation |last=International Bureau of Weights and Measures |title=The International System of Units (SI) |date=Dec 2022 |url=https://www.bipm.org/documents/20126/41483022/SI-Brochure-9-EN.pdf |volume=2 |issue=1 |archive-url=https://web.archive.org/web/20211018184555/https://www.bipm.org/documents/20126/41483022/SI-Brochure-9.pdf/fcf090b2-04e6-88cc-1149-c3e029ad8232 |url-status=live |edition=9th |isbn=978-92-822-2272-0 |archive-date=18 October 2021 |author-link=New SI|page=139}}</ref>

      The most common health hazard of radiation is [[sunburn]], which causes between approximately 100,000 and 1 million new skin cancers annually in the United States.<ref>{{cite journal | vauthors = Siegel RL, Miller KD, Jemal A | title = Cancer statistics, 2020 | journal = CA: A Cancer Journal for Clinicians | volume = 70 | issue = 1 | pages = 7–30 | date = January 2020 | pmid = 31912902 | doi = 10.3322/caac.21590 | doi-access = free }}</ref><ref name="Cleaver" />

      In 2011, the [[World Health Organization]] (WHO) and the [[International Agency for Research on Cancer]] (IARC) have classified radiofrequency electromagnetic fields as possibly [[Carcinogen|carcinogenic]] to humans (Group 2B).<ref>{{Cite news|last=Gaudin, Ph.D.|first=Nicolas|date=31 May 2011|title=IARC Classifies Radiofrequency Electromagnetic Fields As Possibly Carcinogenic to Humans|work=[[International Agency for Research on Cancer]]|url=https://www.iarc.who.int/wp-content/uploads/2018/07/pr208_E.pdf|access-date=20 Nov 2021|archive-date=4 April 2012|archive-url=https://web.archive.org/web/20120404203349/http://www.iarc.fr/en/media-centre/pr/2011/pdfs/pr208_E.pdf|url-status=live}}</ref>

      ==Hazards==
      [[Dielectric heating]] from electromagnetic radiation can create a biological hazard. For example, touching or standing around an [[antenna (electronics)|antenna]] while a high-power [[transmitter]] is in operation can cause burns. The mechanism is the same as that used in a [[microwave oven]].<ref>{{cite book | title=Biological and Medical Aspects of Electromagnetic Fields | editor1-first=Frank S. | editor1-last=Barnes | editor2-first=Ben | editor2-last=Greenebaum | name-list-style=vanc | edition=3 | publisher=CRC Press | year=2018 | isbn=978-1-4200-0946-0 | page=378 | url=https://books.google.com/books?id=B-bKBQAAQBAJ&pg=PT378 | access-date=29 January 2019 | archive-date=4 January 2021 | archive-url=https://web.archive.org/web/20210104093511/https://books.google.com/books?id=B-bKBQAAQBAJ&pg=PT378 | url-status=live }}</ref>

      The heating effect varies with the power and the [[frequency]] of the electromagnetic energy, as well as the [[inverse square]] of distance to the source. The eyes and testes are particularly susceptible to radio frequency heating due to the paucity of blood flow in these areas that could otherwise dissipate the heat buildup.<ref name=OET56>{{cite web | title=Questions and Answers about Biological Effects and Potential Hazards of Radiofrequency Electromagnetic Fields | first1=Robert F. | last1=Cleveland Jr | first2=Jerry L. | last2=Ulcek | name-list-style=vanc | publisher=Office of Engineering and Technology, Federal Communications Commission | work=OET Bulletin 56 | edition=Fourth | date=August 1999 | page=7 | url=https://transition.fcc.gov/Bureaus/Engineering_Technology/Documents/bulletins/oet56/oet56e4.pdf | access-date=2019-02-02 | archive-date=30 June 2019 | archive-url=https://web.archive.org/web/20190630222229/https://transition.fcc.gov/Bureaus/Engineering_Technology/Documents/bulletins/oet56/oet56e4.pdf | url-status=live }}</ref>

      Routine measurements in residential settings often include both electric and magnetic field strengths to characterize everyday exposure levels.<ref>{{Cite web |title=Hoe ik elektromagnetische velden meet in woningen (2025) |url=https://lastvanstraling.nl/blog/hoe-ik-elektromagnetische-velden-meet-in-woningen-2025 |access-date=2025-12-01 |website=LastVanStraling.nl |language=nl}}</ref>

      === Workplace exposure ===
      Radio frequency (RF) energy at power density levels of 1–10&nbsp;mW/cm<sup>2</sup> or higher can cause measurable heating of tissues. Typical RF energy levels encountered by the general public are well below the level needed to cause significant heating, but certain workplace environments near high power RF sources may exceed safe exposure limits.<ref name=OET56/> A measure of the heating effect is the [[specific absorption rate]] or SAR, which has units of watts per kilogram (W/kg). The [[IEEE]]<ref>{{cite journal  | title = Standard for Safety Level with Respect to Human Exposure to Radio Frequency Electromagnetic Fields, 3KHz to 300GHz  | journal = IEEE STD  | volume = C95.1-2005<!--Should this be appended here?:" - IEEE"-->  | publisher = IEEE  | date = October 2005  | url = https://standards.ieee.org/findstds/standard/C95.1-2005.html  | access-date = 23 May 2015  | archive-date = 7 May 2015  | archive-url = https://web.archive.org/web/20150507092948/http://standards.ieee.org/findstds/standard/C95.1-2005.html  }}</ref> and many national governments have established safety limits for exposure to various frequencies of electromagnetic energy based on [[Specific absorption rate|SAR]], mainly based on ICNIRP Guidelines,<ref>{{cite journal | author = International Commission on Non-Ionizing Radiation Protection | title = Guidelines for limiting exposure to time-varying electric, magnetic, and electromagnetic fields (up to 300 GHz). International Commission on Non-Ionizing Radiation Protection | journal = Health Physics | volume = 74 | issue = 4 | pages = 494–522 | date = April 1998 | pmid = 9525427 | url = http://www.icnirp.de/documents/emfgdl.pdf | archive-url = https://web.archive.org/web/20081113052702/http://www.icnirp.de/documents/emfgdl.pdf | archive-date = 2008-11-13 }}</ref> which guard against thermal damage.

      Industrial installations for induction hardening and melting or on welding equipment may produce considerably higher field strengths and require further examination. If the exposure cannot be determined upon manufacturers' information, comparisons with similar systems or analytical calculations, measurements have to be accomplished. The results of the evaluation help to assess possible hazards to the safety and health of workers and to define protective measures. Since electromagnetic fields may influence passive or active [[Implant (medicine)|implants]] of workers, it is essential to consider the exposure at their workplaces separately in the [[risk assessment]].<ref>{{Cite web|last=Institute for Occupational Safety and Health of the German Social Accident Insurance|title=Electromagnetic fields: key topics and projects|url=https://www.dguv.de/ifa/fachinfos/strahlung/elektromagnetische-felder/index-2.jsp|access-date=8 January 2024|archive-date=10 December 2023|archive-url=https://web.archive.org/web/20231210225620/https://www.dguv.de/ifa/fachinfos/strahlung/elektromagnetische-felder/index-2.jsp}}</ref>

      === Low-level exposure ===
      The [[World Health Organization|World Health Organization (WHO)]] began a research effort in 1996 to study the health effects from the ever-increasing exposure of people to a diverse range of EMR sources. In 2011, the WHO/International Agency for Research on Cancer (IARC) classified radio frequency electromagnetic fields as possibly carcinogenic to humans (Group 2B), based on an increased risk for [[glioma]] and [[Vestibular schwannoma|acoustic neuroma]] associated with wireless phone use. The group responsible for the classification did not quantify the risk. Furthermore, group 2B only indicates a credible association between disease and exposure but does not rule out confounding effects with reasonable confidence. A causal relationship has yet to be established.<ref>{{Cite press release |title=IARC classifies radiofrequency electromagnetic fields as possibly carcinogenic to humans. |date=2011 |publisher=International Agency for Research on Cancer |url=https://www.iarc.who.int/wp-content/uploads/2018/07/pr208_E.pdf}}</ref>

      Epidemiological studies look for statistical correlations between EM exposure in the field and specific health effects. As of 2019, much of the current work is focused on the study of EM fields in relation to cancer.<ref>{{cite web | title=What are electromagnetic fields? – Summary of health effects | website=World Health Organization | url=https://www.who.int/peh-emf/about/WhatisEMF/en/index1.html | access-date=2019-02-07 | archive-date=16 October 2019 | archive-url=https://web.archive.org/web/20191016020000/https://www.who.int/peh-emf/about/WhatisEMF/en/index1.html | url-status=live }}</ref> There are publications which support the existence of complex biological and neurological effects of weaker ''non-thermal'' electromagnetic fields (see [[Bioelectromagnetics]]), including weak [[Extremely low frequency|ELF]] electromagnetic fields<ref>{{cite journal | vauthors = Delgado JM, Leal J, Monteagudo JL, Gracia MG | title = Embryological changes induced by weak, extremely low frequency electromagnetic fields | journal = Journal of Anatomy | volume = 134 | issue = Pt 3 | pages = 533–551 | date = May 1982 | pmid = 7107514 | pmc = 1167891 }}</ref><ref>{{cite journal | vauthors = Harland JD, Liburdy RP | title = Environmental magnetic fields inhibit the antiproliferative action of tamoxifen and melatonin in a human breast cancer cell line | journal = Bioelectromagnetics | volume = 18 | issue = 8 | pages = 555–562 | year = 1997 | pmid = 9383244 | doi = 10.1002/(SICI)1521-186X(1997)18:8<555::AID-BEM4>3.0.CO;2-1 | url = https://zenodo.org/record/1235522 | access-date = 29 June 2019 | archive-date = 16 December 2019 | archive-url = https://web.archive.org/web/20191216194119/https://zenodo.org/record/1235522 | url-status = live }}</ref> and modulated [[Radio frequency|RF]] and [[microwave]] fields.<ref name="Aalto S, Haarala C, Brück A, Sipilä H, Hämäläinen H, Rinne JO 2006 885–90">{{cite journal | vauthors = Aalto S, Haarala C, Brück A, Sipilä H, Hämäläinen H, Rinne JO | title = Mobile phone affects cerebral blood flow in humans | journal = Journal of Cerebral Blood Flow and Metabolism | volume = 26 | issue = 7 | pages = 885–890 | date = July 2006 | pmid = 16495939 | doi = 10.1038/sj.jcbfm.9600279 | doi-access = free }}</ref><ref>{{cite journal | vauthors = Pall ML | title = Microwave frequency electromagnetic fields (EMFs) produce widespread neuropsychiatric effects including depression | journal = Journal of Chemical Neuroanatomy | volume = 75 | issue = Pt B | pages = 43–51 | date = September 2016 | pmid = 26300312 | doi = 10.1016/j.jchemneu.2015.08.001 | doi-access = free }}</ref>

      ==Effects by frequency==
      [[File:For Your Own Health (13942406865) (2).jpg|thumb|right|upright|Warning sign next to a transmitter with high field strengths]]

      While the most acute exposures to harmful levels of electromagnetic radiation are immediately realized as burns, the health effects due to chronic or occupational exposure may not manifest for months or years.<ref name=Fry_et_al2004/><ref name=SLiney1994/><ref name=Cleaver/><ref name=UVAware/>

      ===Extremely low frequency===

      [[Extremely low frequency]] EM waves can span from 0 Hz to 3 kHz, though definitions vary across disciplines. The maximum recommended exposure for the general public is 5 kV/m.<ref name="WHOQA" />

      ELF waves around 50 Hz to 60 Hz are emitted by [[power generator]]s, [[Electric power transmission|transmission lines]] and [[distribution lines]], [[power cable]]s, and [[electric appliance]]s. Typical household exposure to ELF waves ranges in intensity from 5 V/m for a light bulb to 180 V/m for a stereo, measured at {{convert|30|cm}} and using 240V power.<ref name="WHOQA">{{cite web |url=https://www.who.int/news-room/questions-and-answers/item/radiation-electromagnetic-fields |title=Radiation: Electromagnetic fields - Q&A |author=[[World Health Organization]] |date=4 August 2016 |access-date=21 January 2022 |archive-date=18 January 2022 |archive-url=https://web.archive.org/web/20220118185654/https://www.who.int/news-room/questions-and-answers/item/radiation-electromagnetic-fields |url-status=live }}</ref> (120V power systems would be unable to reach this intensity unless an appliance has an internal voltage transformer.) 

      [[Overhead power line]]s range from 1kV for local distribution to 1,150 kV for ultra high voltage lines. These can produce electric fields up to 10kV/m on the ground directly underneath, but 50 m to 100 m away these levels return to approximately ambient.<ref name="WHOQA" />  Metal equipment must be maintained at a safe distance from energized high-voltage lines.<ref>{{cite web |title=How to identify powerline voltage level and safe clearance level |author=Ubong Edet |date=Dec 6, 2017 |url=https://www.hsewatch.com/powerline |access-date=21 January 2022 |archive-date=12 May 2021 |archive-url=https://web.archive.org/web/20210512153534/https://hsewatch.com/powerline |url-status=live }}</ref>

      Exposure to ELF waves can induce an electric current. Because the human body is conductive, electric currents and resulting voltages differences typically accumulate on the skin but do not reach interior tissues.<ref name="WHO ELF" /> People can start to perceive high-voltage charges as tingling when hair or clothing in contact with the skin stands up or vibrates.<ref name="WHO ELF" /> In scientific tests, only about 10% of people could detect a field intensity in the range of 2-5 kV/m.<ref name="WHO ELF" /> Such voltage differences can also create electric sparks, similar to a discharge of [[static electricity]] when nearly touching a grounded object. When receiving such a shock at 5 kV/m, it was reported as painful by only 7% of test participants and by 50% of participants at 10 kV/m.<ref name="WHO ELF">[https://web.archive.org/web/20070629003658/http://www.who.int/peh-emf/publications/elf_ehc/en/index.html Extremely Low Frequency Fields Environmental Health Criteria Monograph No.238], chapter 5, p. 121, WHO.</ref>

      Associations between exposure to extremely low frequency magnetic fields (ELF MF) and various health outcomes have been investigated through a variety of epidemiological studies. A pooled analysis found consistent evidence of an effect of ELF-MF on childhood leukaemia.<ref>{{cite journal |author=Kheifets, L. |author2=Ahlbom, A. |author3=Crespi, C. M. |author4=Draper, G. |author5=Hagihara, J. |author6=Lowenthal, R. M. |author7=Mezei, G. |author8=Oksuzyan, S. |author9=Schüz, J. |author10=Swanson, J. |author11=Tittarelli, A. |author12=Vinceti, M. |author13=Wunsch Filho, V. | journal=British Journal of Cancer | title=Pooled analysis of recent studies on magnetic fields and childhood leukaemia | volume=103 | issue=7 | pages=1128–1135 | publisher=Nature Publishing Group | date= September 2010 | issn=1532-1827 | doi=10.1038/sj.bjc.6605838| pmid=20877339 | pmc=2965855 }}</ref> An assessment of the burden of disease potentially resulting from ELF MF exposure in Europe found that 1.5–2% of childhood leukaemia cases might be attributable to ELF MF, but uncertainties around causal mechanisms and models of dose-response were found to be considerable.<ref>{{cite journal |author=Grellier, J. |author2=Ravazzani, P. |author3=Cardis, E. | journal=Environment International | title=Potential health impacts of residential exposures to extremely low frequency magnetic fields in Europe | volume=62 | pages=55–63 | publisher=Pergamon | date= 2014 | doi=10.1016/j.envint.2013.09.017| pmid=24161447 | bibcode=2014EnInt..62...55G | hdl=10044/1/41782 | hdl-access=free }}</ref> 

      The International Agency for Research on Cancer (IARC) finds "inadequate evidence" for human carcinogenicity.<ref name=cancerIARC>{{Cite web |url=https://www.cancer.org/cancer/cancer-causes/radiation-exposure/extremely-low-frequency-radiation.html |title=Power Lines, Electrical Devices, and Extremely Low Frequency Radiation |access-date=22 April 2020 |archive-date=11 April 2020 |archive-url=https://web.archive.org/web/20200411110119/https://www.cancer.org/cancer/cancer-causes/radiation-exposure/extremely-low-frequency-radiation.html |url-status=live }}</ref>

      ===Shortwave===
      [[Shortwave]] (1.6 to 30&nbsp;MHz) [[diathermy]] (where EM waves are used to produce heat) can be used as a therapeutic technique for its [[analgesic]] effect and deep muscle relaxation, but has largely been replaced by [[ultrasound]]. Temperatures in muscles can increase by 4–6&nbsp;°C, and subcutaneous fat by 15&nbsp;°C. The FCC has restricted the frequencies allowed for medical treatment, and most machines in the US use 27.12&nbsp;MHz.<ref>{{cite book | title=Bonica's Management of Pain | editor1-first=Scott | editor1-last=Fishman | editor2-first=Jane | editor2-last=Ballantyne | editor3-first=James P. | editor3-last=Rathmell | name-list-style=vanc | publisher=Lippincott Williams & Wilkins | year=2010 | isbn=978-0-7817-6827-6 | page=1589 | url=https://books.google.com/books?id=Pms0hxH8f-sC&pg=PA1589 | access-date=1 February 2019 | archive-date=18 August 2021 | archive-url=https://web.archive.org/web/20210818115515/https://books.google.com/books?id=Pms0hxH8f-sC&pg=PA1589 | url-status=live }}</ref> Shortwave diathermy can be applied in either continuous or pulsed mode. The latter came to prominence because the continuous mode produced too much heating too rapidly, making patients uncomfortable. The technique only heats tissues that are good electrical conductors, such as [[blood vessels]] and [[muscle]]. [[Adipose tissue]] (fat) receives little heating by induction fields because an electrical current is not actually going through the tissues.<ref>{{cite book | title=Therapeutic Modalities: The Art and the Science | vauthors=Knight KL, Draper DO | publisher=Lippincott Williams & Wilkins | year=2008 | isbn=978-0-7817-5744-7 | page=288 | url=https://books.google.com/books?id=aMwKx91zI18C&pg=PA288 | access-date=1 February 2019 | archive-date=15 December 2019 | archive-url=https://web.archive.org/web/20191215052423/https://books.google.com/books?id=aMwKx91zI18C&pg=PA288 | url-status=live }}</ref>

      Studies have been performed on the use of shortwave radiation for cancer therapy and promoting wound healing, with some success. However, at a sufficiently high energy level, shortwave energy can be harmful to human health, potentially causing damage to biological tissues, for example by overheating or inducing electrical currents.<ref name=Chao2017>{{cite journal | vauthors = Yu C, Peng RY | title = Biological effects and mechanisms of shortwave radiation: a review | journal = Military Medical Research | volume = 4 | article-number = 24 | year = 2017 | pmid = 28729909 | pmc = 5518414 | doi = 10.1186/s40779-017-0133-6 | doi-access = free }}</ref> The FCC limits for maximum permissible workplace exposure to shortwave radio frequency energy in the range of 3–30&nbsp;MHz has a plane-wave equivalent [[power density]] of {{nowrap|(900/{{hsp}}{{em|f}}{{px2}}<sup>2</sup>) mW/cm<sup>2</sup>}} where {{em|f}} is the frequency in MHz, and 100&nbsp;mW/cm<sup>2</sup> from 0.3 to 3.0&nbsp;MHz. For uncontrolled exposure to the general public, the limit is {{nowrap|180/{{hsp}}{{em|f}}{{px2}}<sup>2</sup>}} between 1.34 and 30&nbsp;MHz.<ref name=OET56/>

      ===Radio and microwave frequencies===
      {{See also|Wireless device radiation and health|Microwave burn}}

      The classification of mobile phone signals as "possibly [[carcinogen]]ic to humans" by the [[World Health Organization]] (WHO){{tsp}}{{mdash}}{{hsp}}"a positive association has been observed between exposure to the agent and cancer for which a causal interpretation is considered by the Working Group to be credible, but chance, bias or confounding could not be ruled out with reasonable confidence"<ref>{{Cite web |title=IARC classifies Radiofrequency Electromagnetic Fields as possibly carcinogenic to humans |url=https://www.iarc.who.int/pressrelease/iarc-classifies-radiofrequency-electromagnetic-fields-as-possibly-carcinogenic-to-humans |access-date=2024-06-16 |website=www.iarc.who.int |language=en-US}}</ref>{{mdash}}{{tsp}}has been interpreted to mean that there is very little scientific evidence as to phone signal carcinogenesis.<ref>{{cite journal | vauthors = Boice JD, Tarone RE | title = Cell phones, cancer, and children | journal = Journal of the National Cancer Institute | volume = 103 | issue = 16 | pages = 1211–1213 | date = August 2011 | pmid = 21795667 | doi = 10.1093/jnci/djr285 | doi-access = free }}</ref>

      In 2011, the [[International Agency for Research on Cancer|International Agency for Research on Cancer (IARC)]] classified mobile phone radiation as [[IARC group 2B|group 2B]], {{em|i.e.}} "possibly carcinogenic," rather than [[IARC group 2A|group 2A]] ("probably carcinogenic") or [[IARC group 1 Carcinogens|group 1]] ("is carcinogenic"). That means that there "could be some risk" of carcinogenicity, so additional research into the long-term, heavy use of mobile phones needs to be conducted.<ref names"WHO_IARC_110531">{{cite press release |url=http://www.iarc.fr/en/media-centre/pr/2011/pdfs/pr208_E.pdf |title=IARC classifies radiofrequency electromagnetic fields as possibly carcinogenic to humans |work=press release N° 208 |publisher=[[International Agency for Research on Cancer]] |date=31 May 2011 |access-date=2 June 2011 |archive-date=1 June 2011 |archive-url=https://web.archive.org/web/20110601063650/http://www.iarc.fr/en/media-centre/pr/2011/pdfs/pr208_E.pdf |url-status=live }}</ref> The [[World Health Organization|WHO]] concluded in 2014 that "A large number of studies have been performed over the last two decades to assess whether mobile phones pose a potential health risk. To date, no adverse health effects have been established as being caused by mobile phone use."<ref>{{cite web |url= https://www.who.int/mediacentre/factsheets/fs193/en/ |title= Electromagnetic fields and public health: mobile phones – Fact sheet N°193 |publisher= World Health Organization |date= October 2014 |access-date= 2 August 2016 |archive-date= 6 August 2016 |archive-url= https://web.archive.org/web/20160806074308/http://www.who.int/mediacentre/factsheets/fs193/en/ |url-status= live }}</ref><ref>[http://www.euitt.upm.es/estaticos/catedra-coitt/web_salud_medioamb/Informes/informes_PDF/rf/HealthCanada/99ehd237.pdf Limits of Human Exposure to Radiofrequency Electromagnetic Fields in the Frequency Range from 3&nbsp;kHz to 300&nbsp;GHz] {{Webarchive|url=https://web.archive.org/web/20131029194815/http://www.euitt.upm.es/estaticos/catedra-coitt/web_salud_medioamb/Informes/informes_PDF/rf/HealthCanada/99ehd237.pdf |date=29 October 2013 }}, Canada Safety Code 6, p. 63.</ref>

      Since 1962, the [[microwave auditory effect]] or tinnitus has been shown from radio frequency exposure at levels below significant heating.<ref name=Frey,13895081>{{cite journal | vauthors = Frey AH | title = Human auditory system response to modulated electromagnetic energy | journal = Journal of Applied Physiology | volume = 17 | issue = 4 | pages = 689–692 | date = July 1962 | pmid = 13895081 | doi = 10.1152/jappl.1962.17.4.689 | s2cid = 12359057 }}</ref> Studies during the 1960s in Europe and Russia claimed to show effects on humans, especially the nervous system, from low energy RF radiation; the studies were disputed at the time.<ref name=Bergman,1965>{{Citation|author= Bergman W|title= The Effect of Microwaves on the Central Nervous System (trans. from German)|pages= 1–77|year= 1965|publisher= Ford Motor Company|url= http://www.magdahavas.com/wordpress/wp-content/uploads/2010/12/German_Ford_Motor_company_The_Effect_of_Microwaves_on_The_Central_Nervous_System.pdf|access-date= 19 December 2018|archive-url= https://web.archive.org/web/20180329070303/http://www.magdahavas.com/wordpress/wp-content/uploads/2010/12/German_Ford_Motor_company_The_Effect_of_Microwaves_on_The_Central_Nervous_System.pdf|archive-date= 29 March 2018}}</ref><ref>{{cite book|last1=Michaelson|first1=Sol M.|name-list-style=vanc|editor1-last=Calvin|editor1-first=Melvin|editor2-last=Gazenko|editor2-first=Oleg G|date=1975|title=Ecological and Physiological Bases of Space Biology and Medicine|publisher=NASA Scientific and Technical Information Office|location=Washington, D.C.|pages=409–452 [427–430]|chapter-url=https://ntrs.nasa.gov/archive/nasa/casi.ntrs.nasa.gov/19760019731.pdf|chapter-format=Volume II Book 2 of Foundations of Space Biology and Medicine|chapter=Radio-Frequency and Microwave Energies, Magnetic and Electric Fields|access-date=19 December 2018|archive-date=7 March 2017|archive-url=https://web.archive.org/web/20170307030322/https://ntrs.nasa.gov/archive/nasa/casi.ntrs.nasa.gov/19760019731.pdf|url-status=live}}</ref>

      In 2019, reporters from the ''[[Chicago Tribune]]'' tested the level of radiation from smartphones and found that certain models emitted more than reported by the manufacturers and in some cases more than the U.S. [[Federal Communications Commission]] exposure limit. It is unclear if this resulted in any harm to consumers. Some problems apparently involved the phone's ability to detect proximity to a human body and lower the radio power. In response, the FCC began testing some phones itself rather than relying solely on manufacturer certifications.<ref>{{cite news |url=https://www.chicagotribune.com/investigations/ct-cell-phone-radiation-testing-20190821-72qgu4nzlfda5kyuhteiieh4da-story.html |title=We tested popular cellphones for radiofrequency radiation. Now the FCC is investigating. |author=Sam Roe |newspaper=[[Chicago Tribune]] |date=August 21, 2019 }}</ref>

      [[Microwave]] and other radio frequencies cause heating, and this can cause [[Microwave burn|burns]] or eye damage if delivered in high intensity,<ref>"Microwaves, Radio Waves, and Other Types of Radiofrequency Radiation." American Cancer Society, http://www.cancer.org/cancer/cancer-causes/radiation-exposure/radiofrequency-radiation.html {{Webarchive|url=https://web.archive.org/web/20200502054316/https://www.cancer.org/cancer/cancer-causes/radiation-exposure/radiofrequency-radiation.html |date=2 May 2020 }}.</ref> or [[hyperthermia]] as with any powerful heat source. [[Microwave oven]]s use this form of radiation, and have shielding to prevent it from leaking out and unintentionally heating nearby objects or people.

      ===Millimeter waves===
      In 2009, the US TSA introduced full-body scanners as a primary screening modality in [[airport security]], first as [[backscatter X-ray scanner]]s, which use ionizing radiation and which the European Union banned in 2011 due to health and safety concerns. These were followed by non-ionizing [[millimeter wave scanner]]s.<ref>{{Cite news |last=Khan |first=Farah Naz |name-list-style=vanc |url=https://blogs.scientificamerican.com/observations/is-that-airport-security-scanner-really-safe/ |title=Is That Airport Security Scanner Really Safe? |work=Scientific American |access-date=2020-03-28 |date=2017-12-18 |language=en |archive-date=17 December 2019 |archive-url=https://web.archive.org/web/20191217045222/https://blogs.scientificamerican.com/observations/is-that-airport-security-scanner-really-safe/ |url-status=live }}</ref> Likewise [[WiGig]] for [[personal area network]]s have opened the 60&nbsp;GHz and above microwave band to SAR exposure regulations. Previously, microwave applications in these bands were for point-to-point satellite communication with minimal human exposure.<ref>{{Cite web |url=http://www.ieice.org/proceedings/EMC09/pdf/22S1-1.pdf |title=Characterization of 60GHz Millimeter-Wave Focusing Beam for Living-Body Exposure Experiments, Tokyo Institute of Technology, Masaki KOUZAI et al., 2009 |access-date=18 January 2014 |archive-date=1 February 2014 |archive-url=https://web.archive.org/web/20140201213651/http://www.ieice.org/proceedings/EMC09/pdf/22S1-1.pdf |url-status=live }}</ref>{{Relevance inline|date=January 2019||reason=How is this paragraph relevant to the topic of health?}}

      ===Infrared===
      [[Infrared]] wavelengths longer than 750&nbsp;nm can produce changes in the lens of the eye. [[Glassblower's cataract]] is an example of a heat injury that damages the [[anterior lens]] capsule among unprotected glass and iron workers. Cataract-like changes can occur in workers who observe glowing masses of glass or iron without protective eyewear for prolonged periods over many years.<ref name=Fry_et_al2004>{{cite book | title=Clinical Practice in Small Incision Cataract Surgery | editor1-first=Luther L. | editor1-last=Fry | editor2-first=Ashok | editor2-last=Garg | editor3-first=Francisco | editor3-last=Guitérrez-Camona | editor4-first=Suresh K. | editor4-last=Pandey | editor5-first=Geoffrey | editor5-last=Tabin | name-list-style=vanc | publisher=CRC Press | year=2004 | isbn=0-203-31182-5 | page=79 | url=https://books.google.com/books?id=Gswq6FvdU7oC&pg=PA79 | access-date=31 January 2019 | archive-date=15 December 2019 | archive-url=https://web.archive.org/web/20191215060611/https://books.google.com/books?id=Gswq6FvdU7oC&pg=PA79 | url-status=live }}</ref>

      Exposing skin to infrared radiation near visible light (IR-A) leads to increased production of [[Radical (chemistry)|free radicals]].<ref>{{cite journal | vauthors = Schieke SM, Schroeder P, Krutmann J | title = Cutaneous effects of infrared radiation: from clinical observations to molecular response mechanisms | journal = Photodermatology, Photoimmunology & Photomedicine | volume = 19 | issue = 5 | pages = 228–234 | date = October 2003 | pmid = 14535893 | doi = 10.1034/j.1600-0781.2003.00054.x | doi-access=free }}</ref> Short-term exposure can be beneficial (activating protective responses), while prolonged exposure can lead to [[photoaging]].<ref>{{cite journal | vauthors = Tsai SR, Hamblin MR | title = Biological effects and medical applications of infrared radiation | journal = Journal of Photochemistry and Photobiology B: Biology | volume = 170 | pages = 197–207 | date = May 2017 | pmid = 28441605 | pmc = 5505738 | doi = 10.1016/j.jphotobiol.2017.04.014 |doi-access=free | bibcode = 2017JPPB..170..197T }}</ref>

      Another important factor is the distance between the worker and the source of radiation. In the case of [[arc welding]], infrared radiation decreases rapidly as a function of distance, so that farther than three feet away from where welding takes place, it does not pose an ocular hazard anymore but, ultraviolet radiation still does. This is why welders wear tinted glasses and surrounding workers only have to wear clear ones that filter UV.{{citation needed|date=July 2016}}

      ===Visible light===
      [[Photic retinopathy]] is damage to the [[Macula of retina|macular area of the eye's retina]] that results from prolonged exposure to sunlight, particularly with [[Mydriasis|dilated pupil]]s. This can happen, for example, while observing a [[solar eclipse]] without suitable eye protection. The Sun's radiation creates a photochemical reaction that can result in [[Dazzle reflex|visual dazzling]] and a [[scotoma]]. The initial lesions and [[edema]] will disappear after several weeks, but may leave behind a permanent reduction in visual acuity.<ref name=Sullivan2001>{{cite book | title=Clinical Environmental Health and Toxic Exposures | editor1-first=John Burke | editor1-last=Sullivan | editor2-first=Gary R. | editor2-last=Krieger | name-list-style = vanc | publisher=Lippincott Williams & Wilkins | year=2001 | isbn=978-0-683-08027-8 | page=275 | url=https://books.google.com/books?id=PyUSgdZUGr4C&pg=PA275 }}</ref>

      Moderate and high-power lasers are potentially hazardous because they can burn the [[retina]] of the eye, or even the [[skin]]. To control the risk of injury, various specifications – for example ANSI Z136 in the US, EN 60825-1/A2 in Europe, and IEC 60825 internationally – define "classes" of lasers depending on their power and wavelength.<ref>{{cite web | title=Laser Standards and Classifications | website=Rockwell Laser Industries | url=https://www.rli.com/resources/articles/classification.aspx | access-date=2019-02-10 | archive-date=8 April 2017 | archive-url=https://web.archive.org/web/20170408100339/http://rli.com/resources/articles/classification.aspx | url-status=live }}</ref><ref>{{cite web | website=Lasermet | title=An Overview of the LED and Laser Classification System in EN 60825-1 and IEC 60825-1 | url=https://www.lasermet.com/resources/classification_overview.php | access-date=2019-02-10 | archive-date=12 February 2019 | archive-url=https://web.archive.org/web/20190212012026/https://www.lasermet.com/resources/classification_overview.php | url-status=live }}</ref> Regulations prescribe required safety measures, such as labeling lasers with specific warnings, and wearing laser safety goggles during operation (see [[laser safety]]).

      As with its infrared and ultraviolet radiation dangers, welding creates an intense brightness in the visible light spectrum, which may cause temporary [[flash blindness]].  Some sources state that there is no minimum safe distance for exposure to these radiation emissions without adequate eye protection.<ref name=TWI>{{cite web |url=http://www.twi-global.com/technical-knowledge/faqs/health-and-safety-faqs/faq-what-is-the-minimum-safe-distance-from-the-welding-arc-above-which-there-is-no-risk-of-eye-damage/ |title=What is the minimum safe distance from the welding arc above which there is no risk of eye damage? |publisher=The Welding Institute (TWI Global) |access-date=10 March 2014 |archive-url=https://web.archive.org/web/20140310115217/http://www.twi-global.com/technical-knowledge/faqs/health-and-safety-faqs/faq-what-is-the-minimum-safe-distance-from-the-welding-arc-above-which-there-is-no-risk-of-eye-damage/ |archive-date=10 March 2014 }}</ref>

      ===Ultraviolet===
      Sunlight includes sufficient ultraviolet power to cause [[sunburn]] within hours of exposure, and the burn severity increases with the duration of exposure. This effect is a response of the skin called [[erythema]], which is caused by a sufficient strong dose of [[UV-B]]. The Sun's UV output is divided into [[UV-A]] and UV-B: solar UV-A flux is 100 times that of UV-B, but the erythema response is 1,000 times higher for UV-B.{{Citation needed|date=November 2019}} This exposure can increase at higher altitudes and when reflected by snow, ice, or sand. The UV-B flux is 2–4 times greater during the middle 4–6 hours of the day, and is not significantly absorbed by cloud cover or up to a meter of water.<ref>{{cite book | title=SPEC – Andrews' Diseases of the Skin | first1=William D. | last1=James | first2=Dirk | last2=Elston | first3=Timothy | last3=Berger | name-list-style = vanc | edition=11 | publisher=Elsevier Health Sciences | year=2011 | isbn=978-1-4377-3619-9 | pages=23–24 | url=https://books.google.com/books?id=Ef_HllqkdqEC&pg=PA24 }}</ref>

      Ultraviolet light, specifically UV-B, has been shown to cause [[cataracts]] and there is some evidence that sunglasses worn at an early age can slow its development in later life.<ref name=SLiney1994>{{cite journal | vauthors = Sliney DH | title = UV radiation ocular exposure dosimetry | journal = Documenta Ophthalmologica. Advances in Ophthalmology | volume = 88 | issue = 3–4 | pages = 243–254 | year = 1994 | pmid = 7634993 | doi = 10.1007/bf01203678 | s2cid = 8242055 }}</ref> Most UV light from the sun is filtered out by the atmosphere and consequently airline pilots often have high rates of cataracts because of the increased levels of UV radiation in the upper atmosphere.<ref>{{cite journal | vauthors = Rafnsson V, Olafsdottir E, Hrafnkelsson J, Sasaki H, Arnarsson A, Jonasson F | title = Cosmic radiation increases the risk of nuclear cataract in airline pilots: a population-based case-control study | journal = Archives of Ophthalmology | volume = 123 | issue = 8 | pages = 1102–1105 | date = August 2005 | pmid = 16087845 | doi = 10.1001/archopht.123.8.1102 | doi-access = free }}</ref>  It is hypothesized that [[Ozone depletion|depletion of the ozone layer]] and a consequent increase in levels of UV light on the ground may increase future rates of cataracts.<ref name="Dobson2005">{{Cite journal| vauthors = Dobson R | title = Ozone depletion will bring big rise in number of cataracts| journal = BMJ| volume = 331| issue = 7528| pages = 1292–1295| year = 2005| pmc = 1298891 | doi = 10.1136/bmj.331.7528.1292-d }}</ref>  Note that the lens filters UV light, so if it is removed via surgery, one may be able to see UV light.<ref name=Komarnitsky>{{cite web |url=http://www.komar.org/faq/colorado-cataract-surgery-crystalens/ultra-violet-color-glow/ |title=Case study of ultraviolet vision after IOL removal for Cataract Surgery |author=Komarnitsky |access-date=17 January 2014 |archive-date=9 February 2014 |archive-url=https://web.archive.org/web/20140209130900/http://www.komar.org/faq/colorado-cataract-surgery-crystalens/ultra-violet-color-glow/ |url-status=live }}</ref><ref>{{cite journal | vauthors = Griswold MS, Stark WS | title = Scotopic spectral sensitivity of phakic and aphakic observers extending into the near ultraviolet | journal = Vision Research | volume = 32 | issue = 9 | pages = 1739–1743 | date = September 1992 | pmid = 1455745 | doi = 10.1016/0042-6989(92)90166-G | s2cid = 45178405 }}</ref>{{undue weight inline|date=October 2022}}

      Prolonged exposure to [[ultraviolet radiation]] from the [[sun]] can lead to [[melanoma]] and other skin malignancies.<ref name=Cleaver>{{cite book | vauthors = Cleaver JE, Mitchell DL | veditors = Bast RC, Kufe DW, Pollock RE | title = Holland-Frei Cancer Medicine | edition = 5th | publisher = B.C. Decker | location = Hamilton, Ontario | year = 2000 | chapter = 15. Ultraviolet Radiation Carcinogenesis | isbn = 1-55009-113-1 | chapter-url = https://www.ncbi.nlm.nih.gov/books/NBK20854/ | access-date = 31 January 2011 | display-editors = etal | archive-date = 4 September 2015 | archive-url = https://web.archive.org/web/20150904102726/http://www.ncbi.nlm.nih.gov/books/NBK20854/ | url-status = live }}</ref> Clear evidence establishes ultraviolet radiation, especially the non-ionizing medium wave [[UVB]], as the cause of most non-melanoma [[skin cancer]]s, which are the most common forms of cancer in the world.<ref name=Cleaver />  UV rays can also cause [[wrinkles]], [[liver spot]]s, [[Melanocytic nevus|moles]], and [[freckles]]. In addition to sunlight, other sources include [[tanning beds]], and bright desk lights.  Damage is cumulative over one's lifetime, so that permanent effects may not be evident for some time after exposure.<ref name=UVAware>{{cite web |url=http://www.uvawareness.com/uv-info/uv-exposure.php |title=UV Exposure & Your Health |publisher=UV Awareness |access-date=10 March 2014 |archive-date=2 May 2019 |archive-url=https://web.archive.org/web/20190502112551/http://www.uvawareness.com/uv-info/uv-exposure.php |url-status=live }}</ref>

      Ultraviolet radiation of wavelengths shorter than 300&nbsp;nm ([[Ultraviolet|actinic rays]]) can damage the [[corneal epithelium]]. This is most commonly the result of exposure to the sun at high altitude, and in areas where shorter wavelengths are readily reflected from bright surfaces, such as snow, water, and sand.  UV generated by a [[welding]] arc can similarly cause damage to the cornea, known as "arc eye" or welding flash burn, a form of [[photokeratitis]].<ref>{{cite web|url=http://emedicine.medscape.com/article/799025-overview|publisher=Medscape|title=Ultraviolet keratitis|access-date=31 May 2017|archive-date=1 November 2015|archive-url=https://web.archive.org/web/20151101111139/http://emedicine.medscape.com/article/799025-overview|url-status=live}}</ref>
      [[File:ISO 7010 W005.svg|thumb|171x171px|[[ISO 7010|ISO 7010 W005]] warning sign: Non-ionizing radiation]]
      [[Fluorescent light]] bulbs and tubes internally produce [[ultraviolet]] light. Normally this is converted to visible light by the [[phosphor]] film inside a protective coating. When the film is cracked by mishandling or faulty manufacturing then UV may escape at levels that could cause sunburn or even skin cancer.<ref>{{cite journal | vauthors = Mironava T, Hadjiargyrou M, Simon M, Rafailovich MH | title = The effects of UV emission from compact fluorescent light exposure on human dermal fibroblasts and keratinocytes in vitro | journal = Photochemistry and Photobiology | volume = 88 | issue = 6 | pages = 1497–1506 | date = 20 July 2012 | pmid = 22724459 | doi = 10.1111/j.1751-1097.2012.01192.x | s2cid = 2626216 }}</ref><ref>{{cite journal | vauthors = Nicole W | title = Ultraviolet Leaks from CFLs | journal = Environmental Health Perspectives | volume = 120 | issue = 10 | pages = a387 | date = October 2012 | pmid = 23026199 | pmc = 3491932 | doi = 10.1289/ehp.120-a387 }}</ref>

      ==Regulation==
      In the United States, non-ionizing radiation is regulated in the [[Radiation Control for Health and Safety Act of 1968]] and the [[Occupational Safety and Health Act of 1970]].<ref>{{cite book | title=Fundamental and Applied Aspects of Nonionizing Radiation | editor1-first=Solomon | editor1-last=Michaelson | name-list-style=vanc | publisher=Springer Science & Business Media | year=2012 | isbn=978-1-4684-0760-0 | page=xv | url=https://books.google.com/books?id=bezTBwAAQBAJ | access-date=30 January 2019 | archive-date=14 December 2019 | archive-url=https://web.archive.org/web/20191214052605/https://books.google.com/books?id=bezTBwAAQBAJ | url-status=live }}</ref> In Canada, various federal acts govern non-ionizing radiation by originating source, such as the Radiation Emitting Devices Act, the Canada Consumer Product Safety Act, and the Radiocommunication Act.<ref>{{cite web |url=https://www.canada.ca/en/health-canada/services/health-risks-safety/radiation/radiation-emitting-devices/acts-regulations.html |title=Radiation Emitting Devices Act and Regulations |date= 18 April 2023|website=Health Canada |publisher= |access-date=14 September 2024 |url-status=live |archive-url=https://web.archive.org/web/20240915020320/https://www.canada.ca/en/health-canada/services/health-risks-safety/radiation/radiation-emitting-devices/acts-regulations.html |archive-date=15 September 2024 }}</ref> For situations not under federal jurisdiction, Canadian provinces individually set regulations around use of non-ionizing radiation.<ref>{{cite web |url=https://radiationsafety.ca/radiation-related-regulations-in-canada/ |title=Radiation-Related Regulations in Canada |date= |website= |publisher=Radiation Safety Institute of Canada |access-date=14 September 2024 |url-status=live |archive-url=https://web.archive.org/web/20240520023107/https://radiationsafety.ca/radiation-related-regulations-in-canada/ |archive-date=20 May 2024 }}</ref>

