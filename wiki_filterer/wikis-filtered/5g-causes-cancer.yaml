      IARC group 2B substances, mixtures and exposure circumstances are those that have been classified as "possibly carcinogenic to humans" by the International Agency for Research on Cancer (IARC). This category is used when there is limited evidence of carcinogenicity in humans and less than sufficient evidence of carcinogenicity in experimental animals. It may also be used when there is insufficient evidence of carcinogenicity in humans but sufficient evidence in experimental animals. In some cases, an agent, mixture, or exposure circumstance with inadequate evidence of carcinogenicity in humans but limited evidence in experimental animals, combined with supporting evidence from other relevant data, may be included in this group. 
      This list focuses on the hazard linked to the agents. This means that the carcinogenic agents are capable of causing cancer, but this does not take their risk into account, which is the probability of causing a cancer given the level of exposure to this carcinogenic agent. The list is up to date as of January 2024.
    source: |-
      {{Short description|Classification of agents that are possibly carcinogenic to humans}}
      {{IARC groups}}
      '''IARC group 2B''' substances, mixtures and exposure circumstances are those that have been classified as "possibly carcinogenic to humans" by the [[International Agency for Research on Cancer]] (IARC).<ref>{{cite web |url=https://monographs.iarc.fr/list-of-classifications |title=List of Classifications, Agents classified by the IARC Monographs, Volumes 1–124 |author=<!--Staff writer(s); no by-line.--> |date=July 7, 2019 |website=IARC Monographs on the Evaluation of Risk to Humans |publisher=IARC |access-date=July 14, 2019}}</ref> This category is used when there is [[level of evidence|limited evidence]] of carcinogenicity in humans and less than sufficient evidence of carcinogenicity in [[experimental animal]]s. It may also be used when there is insufficient evidence of carcinogenicity in humans but sufficient evidence in experimental animals. In some cases, an agent, mixture, or exposure circumstance with inadequate evidence of carcinogenicity in humans but limited evidence in experimental animals, combined with supporting evidence from other relevant data, may be included in this group. 

      This list focuses on the [[hazard]] linked to the agents. This means that the carcinogenic agents are capable of causing cancer, but this does not take their [[risk]] into account, which is the probability of causing a cancer given the level of exposure to this carcinogenic agent.<ref name="preamble">{{Cite web |title=IARC monographs preamble (as amended in 2019) |url=https://monographs.iarc.who.int/wp-content/uploads/2019/07/Preamble-2019.pdf |access-date=August 18, 2023 |publisher=International Agency for Research on Cancer (IARC) |quote=A cancer hazard is an agent that is capable of causing cancer, whereas a cancer risk is an estimate of the probability that cancer will occur given some level of exposure to a cancer hazard.}}</ref> The list is up to date {{as of|January 2024|lc=on}}.<ref>{{Cite web |title=List of Classifications – IARC Monographs on the Identification of Carcinogenic Hazards to Humans |url=https://monographs.iarc.who.int/list-of-classifications |access-date=2024-02-01 |website=monographs.iarc.who.int}}</ref>

