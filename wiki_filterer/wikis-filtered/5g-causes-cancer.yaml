      '''Devra Lee Davis''' (born June 7, 1946) is an American [[Epidemiology|epidemiologist]], [[Toxicology|toxicologist]], and author of three books about environmental hazards.<ref name="EHT-Bio">{{Cite web|title=Devra Davis|url=https://ehtrust.org/about/dr-devra-davis/|website=Environmental Health Trust}}</ref><ref>{{Cite web|title=Our Interview With Dr. Devra Davis|first=Tracy Fernandez|last= Rysavy|publisher= [[Green America]]|url=https://www.greenamerica.org/do-cell-phones-cause-cancer/our-interview-dr-devra-davis-0|access-date=2021-06-23|work=[[Green American]]|language=en|date=January–February 2011}}</ref> She was founding director of the Center for Environmental Oncology at the [[University of Pittsburgh Cancer Institute]], and is a former professor of epidemiology at [[University of Pittsburgh Graduate School of Public Health]]. She has served on several governmental and non-governmental organizations, conducting research and advocacy into effects of pesticides, asbestos, and wireless radiation on human health, especially cancers.

      Davis is the founder and president of the Environmental Health Trust,<ref>{{Cite web|last=Mann|first=Denise|date=2019-12-13|title=Cell Phone Radiation Damages DNA in Mice: Are Humans At Risk, Too?|url=https://www.rd.com/article/cell-phone-radiation-damage/|access-date=2021-07-15|website=Reader's Digest|language=en-US|archive-date=December 29, 2021|archive-url=https://web.archive.org/web/20211229152619/https://www.rd.com/article/cell-phone-radiation-damage/|url-status=dead}}</ref> a non-profit organization which argues that mobile devices, WiFi, 5G, and other radio-frequency systems [[Wireless device radiation and health|pose a health risk to humans and the environment]].<ref name="EHT-Bio"/> She has been called a "crusader in the fight over cell phone safety"<ref name="CNET-2011">{{cite news |last1=Reardon |first1=Marguerite |title=Cell phone radiation: Harmless or health risk? |url=https://www.cnet.com/tech/mobile/cell-phone-radiation-harmless-or-health-risk/ |work=[[CNET]] |date=May 31, 2011 |language=en}}</ref> and believes that radio frequencies could cause cancer.<ref name="WAMU-2019">{{cite news |last1=Bonessi |first1=Dominique Maria |title=The Promise of 5G Comes With a Regulatory Headache and Health Risk Concerns |url=https://wamu.org/story/19/12/06/the-promise-of-5g-comes-with-a-regulatory-headache-and-health-risk-concerns/ |work=[[WAMU]] |date=December 6, 2019 |language=en}}</ref><ref>{{cite news |last1=German |first1=Kent |title=Researcher's strong signal on cell phone risk (Q&A) |url=https://www.cnet.com/tech/mobile/researchers-strong-signal-on-cell-phone-risk-q-a/ |work=[[CNET]] |date=May 31, 2011 |language=en}}</ref> Such claims have been challenged by critics as being bereft of credible arguments.<ref name="alarmist" />

      == Early life and education ==
      Devra Lee Davis was born June 7, 1946, in Washington, D.C., to Harry and Jean Langer Davis,<ref name="CA-223">{{cite book |title=[[Contemporary Authors]] |volume=223|section=Davis, Devra Lee|date=2004 |publisher=[[Gale (publisher)|Gale]]|location=Detroit |isbn=978-0-7876-6703-0
      |section-url=https://www.encyclopedia.com/arts/educational-magazines/davis-devra-lee-1946-0}}</ref> and raised in the steel making town of [[Donora, Pennsylvania]], where in 1948 [[1948 Donora smog|a severe smog event]] killed 20 people and sickened thousands.<ref name="PittsMag-2010">{{cite magazine|last1=Curran|first1=Ann|date=October 19, 2010|title=Your Health vs. the Environment|url=https://www.pittsburghmagazine.com/your-health-vs-the-environment/|magazine=[[Pittsburgh Magazine]]}}</ref> Davis was the oldest of four children;<ref>{{cite news |last1=Rouvalis |first1=Cristina |title=Pitt scientist opens window on decades of suppressed or ignored cancer research |url=https://www.post-gazette.com/life/lifestyle/2007/10/10/Pitt-scientist-opens-window-on-decades-of-suppressed-or-ignored-cancer-research/stories/200710100153 |work=[[Pittsburgh Post-Gazette]] |date=October 10, 2007 |language=en}}</ref> her father was a chemist and [[machinist]] in the local [[steel mill]]s, as well as a brigadier general in the [[Pennsylvania National Guard]] and her mother was a homemaker.<ref name="PittsMag-2010"/> Raised in a [[Jewish]] family, as a child she briefly considered becoming a [[rabbi]].<ref name="Moment-2008">{{Cite magazine|last=Miller|first= Sue Katz|title=A Crusader Rising|magazine= [[Moment (magazine)|Moment]]|date= March–April 2008|pages= 26–30|via=[[Gale General OneFile]]}}</ref> At age 14, her family moved to [[Pittsburgh]], where she attended [[Taylor Allderdice High School]]. 

      Davis then attended the [[University of Pittsburgh]], where in 1967 she earned a [[Bachelor of Science|Bachelor of Science degree]] in [[physiological psychology]] and an MA in [[sociology]].<ref name="PittsMag-2010" /><ref name="EHT-Bio" /><ref name="CA-223" /> She learned of the Donora smog incident as a university student, which inspired her interest in [[epidemiology]].<ref name="Kott" /><ref name="Moment-2008" /><ref name="NYTimes-Mag-91" /> She completed a PhD in science studies at the [[University of Chicago]] as a Danforth Foundation [[fellow|graduate fellow]] in 1972, and in 1982 earned a [[master of public health|Master of Public Health degree]] in epidemiology at [[Johns Hopkins University]] as a [[National Cancer Institute]] senior [[Postdoctoral researcher|post-doctoral fellow]].<ref name="Kott">{{cite magazine|last1=Kott |first1=Ruth E. |title=Roaming crusader |url=http://magazine.uchicago.edu/1010/features/c-vitae.shtml |magazine=[[The University of Chicago Magazine]] |date=2010}}</ref>

      == Career ==
      In the late 1970s, as a policy advisor for the [[Environmental Law Institute]], Davis began publishing articles examining links between environmental chemicals and cancer.<ref name="NYTimes-Mag-91" /> Davis was appointed resident scholar at the [[National Research Council (United States)|National Research Council of the National Academy of Sciences]] in 1989.<ref name="NYTimes-Mag-91">{{Cite news|last=Wright|first=Karen|date=December 15, 1991|title=Going by the Numbers|language=en-US|work=[[The New York Times Magazine]]|url=https://www.nytimes.com/1991/12/15/magazine/going-by-the-numbers.htm}}</ref>

      In 1990, she led a study published in ''[[The Lancet]]'' along with [[National Institute for Environmental Health Sciences]] director David Hoel, British census director [[John Fox (statistician)|John Fox]], and [[World Health Organization]] statistician [[Alan Lopez]], examining cancer rates in the United States, Japan, and several European countries, concluding "all forms of cancer are increasing in persons over age 54 except lung and stomach" and "the changes in cancer other than lung are so great and rapid that their causes demand intensive investigation."<ref>{{Cite journal|last1=Davis|first1=D. L.|last2=Hoel|first2=D.|last3=Fox|first3=J.|last4=Lopez|first4=A.|date=1990|title=International trends in cancer mortality in France, West Germany, Italy, Japan, England and Wales, and the USA|url=https://linkinghub.elsevier.com/retrieve/pii/014067369092020I|journal=[[The Lancet]]|language=en|volume=336|issue=8713|pages=474–481|doi=10.1016/0140-6736(90)92020-I|pmid=1974997|s2cid=41056576|url-access=subscription}}</ref><ref name=":0">{{Cite journal|last=Marshall|first=Eliot|date=1990|title=Experts clash over cancer data|url=https://www.science.org/doi/10.1126/science.2237436|journal=Science|language=en|volume=250|issue=4983|pages=900–902|doi=10.1126/science.2237436|pmid=2237436|bibcode=1990Sci...250..900M|issn=|url-access=subscription}}</ref><ref name="NYTimes-Mag-91" /> The paper reignited debate between prominent epidemiologists over how to interpret cancer trends: [[Bruce Ames]], [[Richard Doll]], and [[Richard Peto]], among others argued the trends were unimportant: more attributed to better diagnoses and increasing human longevity, while Davis' views gained support from [[Philip J. Landrigan]] and biostatisticians such as [[John Christian Bailar|John C. Bailar]] and [[Thomas C. Chalmers]].<ref name=":0" /><ref name="NYTimes-Mag-91" /><ref>{{cite magazine|last1=Beardsley |first1=Tim |title=A War Not Won |url=https://archive.org/details/eu_SciAm_1994-01_OCR/page/n127/mode/2up |magazine=[[Scientific American]] |date=January 1994|volume=270|number= 1|pages=118–126}}</ref>

      Davis was appointed by President Clinton to the [[US Chemical Safety and Hazard Investigation Board]]. In 1997 she was working as a consultant to the [[World Health Organization]]<ref name="Kott" /> and served as a member of the Board of Scientific Counselors of the [[National Toxicology Program|US National Toxicology Program]].<ref>{{Cite web|title=Devra Lee Davis, PhD|url=https://www.webmd.com/devra-lee-davis|access-date=2021-07-15|website=WebMD|language=en}}</ref>

      Davis founded the International Breast Cancer Prevention Collaborative Research Group, an organization dedicated to exploring the causes of breast cancer.<ref>{{Cite journal|last=Robson|first=B.|date=1996-04-15|title=Conferences point to growing concern about possible links between breast cancer, environment|journal=Canadian Medical Association Journal|volume=154|issue=8|pages=1253–1255|issn=0820-3946|pmc=1487668|pmid=8612261}}</ref> As senior adviser to the US Assistant Secretary for Health, Davis claimed that extra doses of [[estrogen]]-like compounds in the environment may increase the quantities of hormone some women receive to dangerous levels and can cause serious illness.<ref>{{Cite web|last=Vines|first=Gail|date=September 24, 1993|title=Pesticides linked to breast cancer|url=https://www.newscientist.com/article/mg13918920-300-pesticides-linked-to-breast-cancer/|access-date=2021-06-23|website=New Scientist|language=en-US}}</ref>

      Davis served five years as the founding director of the Center for Environmental Oncology at the [[University of Pittsburgh Cancer Institute]] (UPCI). In 2009, she stepped down to become professor in the Department of Epidemiology at the [[University of Pittsburgh Graduate School of Public Health]].<ref>{{cite web|title=Devra Davis to Focus on Environmental Research|work=School of Public Health |url=https://www.publichealth.pitt.edu/news/details/articleid/1516/devra-davis-to-focus-on-environmental-research|access-date=2021-08-06|publisher=University of Pittsburgh Graduate School of Public Health}}</ref> She has authored over 200 scientific papers as well as three books.<ref name="File-on-4" /><ref name="Bailiwick2019" />

      === ''When Smoke Ran Like Water'' ===
      Davis' 2002 book, ''When Smoke Ran Like Water: Tales of Environmental Deception and the Battle Against Pollution'', describes how environmental toxins are linked to cancers and other health problems.<ref>{{cite news |title=National Book Award Finalist: When Smoke Ran Like Water |url=https://www.voanews.com/archive/national-book-award-finalist-when-smoke-ran-water |archive-url=https://web.archive.org/web/20210816190229/https://www.voanews.com/archive/national-book-award-finalist-when-smoke-ran-water |url-status=dead |archive-date=August 16, 2021 |access-date=August 16, 2021 |work=[[VOA News]] |date=October 27, 2009 |language=en}}</ref> She provides accounts of the [[1948 Donora smog]] in her hometown, the 1952 [[Great Smog of London]], and other events.<ref>{{Cite journal|last=Hood|first=Clifton|date=2004|title=When Smoke Ran like Water: Tales of Environmental Deception and the Battle against Pollution|url=https://academic.oup.com/envhis/article-lookup/doi/10.2307/3985785|journal=[[Environmental History (journal)|Environmental History]]|volume=9|issue=3|pages=549|doi=10.2307/3985785|jstor=3985785|url-access=subscription}}</ref> She also criticizes industry interests who dismiss evidence they dislike as "junk science."<ref name=":3">{{Cite journal|last=Gochfeld|first=Michael|date=2003|title=''When Smoke Ran like Water: Tales of Environmental Deception and the Battle Against Pollution'' (review)|url=https://dx.doi.org/10.1097/01.COT.0000290754.63910.1b|journal=Oncology Times|language=en|volume=25|issue=22|pages=28|doi=10.1097/01.COT.0000290754.63910.1b|issn=|url-access=subscription}}</ref> The book was a finalist for that year's [[National Book Award for Nonfiction]].<ref>{{cite web|title=When Smoke Ran Like Water: Tales of Environmental Deception and the Battle Against Pollution|url=https://www.nationalbook.org/books/when-smoke-ran-like-water-tales-of-environmental-deception-and-the-battle-against-pollution/|access-date=August 16, 2021|website=[[National Book Foundation]]}}</ref> 

      Public health philosopher [[Kristin Shrader-Frechette]] praised it as "the best book on public health and environmental pollution of the last 30 years."<ref>{{Cite magazine|last=Shrader-Frechette|first=Kristin|date=March 24, 2003|title=What London Fog?|url=https://www.americamagazine.org/issue/culture/what-london-fog|access-date=|magazine=[[America (magazine)|America]]|volume= 188|issue=10|page=24|language=en}}</ref> Science writer [[Fred Pearce]] in ''[[New Scientist]]'' called Davis a "a hero with a nose for trouble" and drew comparisons to [[Rachel Carson]], the author of ''[[Silent Spring]].''<ref>{{Cite magazine|last=Pearce|first=Fred|date=December 7, 2002|title=The new untouchables|url=https://www.newscientist.com/article/mg17623726-500-the-new-untouchables/|access-date=|magazine=[[New Scientist]]|volume= 176|issue=2372|page= 54|language=en-US}}</ref> Other writers have compared and Davis and Carson, both in their styles and themes of writing and their small town Pennsylvania upbringings.<ref name=":3" /><ref name="Moment-2008" /><ref>{{Cite journal|last=Corbett|first=Stephen J.|date=2009|title=Environmental (and Audience) Friendliness in Rachel Carson and Devra Davis: Where Ecocriticism and Rhetoric Meet|url=https://academic.oup.com/isle/article-lookup/doi/10.1093/isle/isp059|journal=[[Interdisciplinary Studies in Literature and Environment]]|language=en|volume=16|issue=3|pages=487–515|doi=10.1093/isle/isp059|issn=|url-access=subscription}}</ref><ref>{{Cite book|last=Musil|first=Robert K.|chapter=Rachel Carson, Devra Davis, Pollution, and Public Policy|title=Rachel Carson and Her Sisters: Extraordinary Women who Have Shaped America's Environment|publisher=[[Rutgers University Press]]|location=New Brunswick|year=2014|pages=194–224 |isbn=978-0-8135-6243-8|doi=10.36019/9780813562438-009|s2cid=242290842 |oclc=871258266}}</ref><ref>{{Cite web|last=Wilhelm|first=Gregg A.|date=June 2003|title=Cutting Through the Smoke|url=https://pages.jh.edu/jhumag/0603web/smoke.html|access-date=2021-10-03|website=Johns Hopkins Magazine|publisher=[[Johns Hopkins University]]}}</ref> Epidemiologist Bert Brunekreef wrote the book is "at its best when describing how commercial interests have harassed well known environmental health scientists in attempts to downplay the seriousness of, say, the effects of environmental lead on the IQ of children," but found "an alarming number of errors" regarding air pollution.<ref>{{cite journal |last1=Brunekreef |first1=Bert |title=When Smoke Ran Like Water: Tales of Environmental Deception and the Battle Against Pollution |journal=[[British Medical Journal]] |date=February 22, 2003 |volume=326 |issue=7386 |pages=452 |doi=10.1136/bmj.326.7386.452 |pmc=1125339}}</ref>

      === ''The Secret History of the War on Cancer'' ===
      Davis' second book, ''The Secret History of the War on Cancer'', was published in 2007.<ref>{{cite journal |last1=DuBois |first1=Raymond N. |title=The secret history of the war on cancer |journal=[[Journal of Clinical Investigation]] |date=2008 |volume=118 |issue=6 |pages=1978 |doi=10.1172/JCI36051 |pmc=2396903}}</ref><ref>{{cite journal |last1=Parascandola |first1=Mark |title=The Secret History of the War on Cancer: By Devra Davis |journal=[[American Journal of Epidemiology]] |date=2008 |volume=168 |issue=10 |pages=1211–1212 |doi=10.1093/aje/kwn210|doi-access=free }}</ref> In it, she argues that medical institutions involved in the "[[war on cancer]]" have focused more on cures than on [[Preventive healthcare|prevention]], and that some safety research into [[Environmental toxicology|environmental toxicity]] suffers from a [[conflict of interest]] due to funding from companies who make products suspected of causing harm.<ref name="PittsMag-2010" /> 

      James Huff, associate director for chemical [[carcinogenesis]] of the [[National Institute of Environmental Health Sciences]], called it "exhaustively researched and deftly written, illuminat[ing] more of the truth about chemicals and cancer and the relatively simple means of preventing or reducing cancer burdens."<ref>{{cite journal |last1=Huff |first1=James |title=The Secret History of the War on Cancer |journal=[[Environmental Health Perspectives]] |date=2008 |volume=116 |issue=2 |pages=A90 |doi=10.1289/ehp.116-a90a |pmc=2235200}}</ref> Epidemiologist [[Richard Clapp (epidemiologist)|Richard Clapp]] called the book "a welcome addition to the struggle to correct the imbalance" between curative and preventative research,<ref>{{cite web |last1=Clapp |first1=Dick |title="War on Cancer" Book Elicits Warring Reviews |url=http://www.thepumphandle.org/2007/12/12/warring-reviews/ |website=The Pump Handle |date=December 12, 2007}}</ref> while science writer Fred Pearce wrote it "is a rattling good read and raises vital issues that remain relevant today."<ref>{{cite journal |last1=Pearce |first1=Fred |author1-link=Fred Pearce |title=The secret history of the war on cancer |journal=[[The Lancet Oncology]] |date=November 2007 |volume=8 |issue=11 |pages=971 |doi=10.1016/S1470-2045(07)70338-8}}</ref> In a positive review, science journalist [[Dan Fagin]] called Davis "her generation's strongest advocate of the idea that synthetic chemicals are a seriously under-recognized cause of cancer."<ref>{{Cite journal|last=Fagin|first=Dan|date=2007|title=Poisoning on an industrial scale|url=https://linkinghub.elsevier.com/retrieve/pii/S026240790762733X|journal=[[New Scientist]]|language=en|volume=196|issue=2627|pages=56|doi=10.1016/S0262-4079(07)62733-X|url-access=subscription}}</ref> 

      Medical historian Peter Keating, however, found the book "largely unoriginal" and poorly organized.<ref>{{Cite journal|last=Keating|first=Peter|date=2008|title=''The Secret History of the War on Cancer'' (review)|url=http://muse.jhu.edu/content/crossref/journals/bulletin_of_the_history_of_medicine/v082/82.3.keating.html|journal=[[Bulletin of the History of Medicine]]|language=en|volume=82|issue=3|pages=757–758|doi=10.1353/bhm.0.0084|s2cid=71529157|issn=|url-access=subscription}}</ref> Epidemiologist [[Peter Boyle (epidemiologist)|Peter Boyle]] wrote that "devotees of conspiracy theories and aficionados of gossip and innuendo will be drawn towards this book like wasps to a juicy piece of meat" and discussed how the book suggested that [[Health effects of tobacco|the link between tobacco and cancer]] was used to distract from other possible sources.<ref>{{Cite journal|last=Boyle|first=Peter|date=November 24, 2007|title=Conspiracy theories of cancer|url=https://doi.org/10.1016/S0140-6736(07)61735-8|journal=The Lancet|volume=370|issue=9601|pages=1751|doi=10.1016/s0140-6736(07)61735-8|s2cid=53268483 |issn=0140-6736|url-access=subscription}}</ref>

      === Wireless radiation ===
      {{further|Wireless device radiation and health}}
      In 2007 Davis founded the Environmental Health Trust (EHT),<ref name="EHT-Bio"/> a nonprofit with the goal of promoting awareness of [[environmental issues]] it believes are linked to cancer.<ref name=ABC-2012>{{cite news |last1=Gann |first1=Carrie |title=Cell Phones and Cancer: Critics Say Kids Risk Brain Tumors |url=https://abcnews.go.com/Health/cellphone-child-brain-cancer-study-flawed-critics/story?id=16082731 |work=[[ABC News (United States)|ABC News]] |date=April 5, 2012 |language=en}}</ref> The EHT campaigns for safer [[Mobile phone|cell phone]] use,<ref name=Chi-Trib-2011>{{cite news |last1=Deardorff |first1=Julie |title=How do cell phones affect young brains? |url=https://www.chicagotribune.com/lifestyles/ct-xpm-2011-03-16-sc-health-0316-child-health-cell-phon20110316-story.html |work=[[Chicago Tribune]] |date=March 16, 2011}}</ref> and has challenged research that finds no links between cellular phones and cancer,<ref name=ABC-2012/><ref>{{cite news |last1=Fromson |first1=Daniel |title=No Cell Phone-Children's Cancer Risk? The Media Might Be Wrong |url=https://www.theatlantic.com/health/archive/2011/07/no-cell-phone-childrens-cancer-risk-the-media-might-be-wrong/242723/ |work=[[The Atlantic]] |date=July 28, 2011 |language=en}}</ref> advocated for more research into the effects of wireless radiation on children,<ref name="CNET-2011"/> and called on the US federal government to reassess its safety guidelines for [[wireless technology]].<ref name=":1">{{cite web |last1=Belluz |first1=Julia |title=A comprehensive guide to the messy, frustrating science of cellphones and health |url=https://www.vox.com/2018/7/16/17067214/cellphone-cancer-5g-evidence-studies |website=[[Vox (website)|Vox]] |access-date=November 2, 2018 |language=en |date=July 16, 2018}}</ref>

      Davis has been called a "crusader in the fight over cell phone safety".<ref name="CNET-2011"/> She claims that radiation from mobile phones and WiFi pose health risks including increases in cancer, but her claims are disputed by other cancer researchers and organizations including the US [[National Cancer Institute]] and [[Cancer Council Australia]].<ref name=Chi-Trib-2011/><ref name="Guardian-2016"/><ref name="alarmist">{{Cite web|last=Chapman|first=Simon|authorlink=Simon Chapman (academic)|date=September 1, 2016|title=Mobile phone health alarmists bereft of credible arguments|url=https://theconversation.com/mobile-phone-health-alarmists-bereft-of-credible-arguments-64739|work=[[The Conversation (website)|The Conversation]]}}</ref><ref name="File-on-4">{{Cite news|last=Wright|first=Tom|date=2020-06-16|title=The 5G Con That Could Make You Sick|work=[[File on 4]]|publisher=[[BBC Radio 4]]|url=https://downloads.bbc.co.uk/rmhttp/fileon4/PG07_5G_Con.pdf|quote=Now, how many of you had heard that in 2011, the World Health Organisation had reviewed all of the evidence and decided that mobile phone radiation was a possible human carcinogen? It’s interesting that that information isn’t more widely known.}} [https://www.bbc.co.uk/sounds/play/m000k2mj Audio broadcast]</ref> She claims much research that finds no effects is industry-funded and biased.<ref name=":2">{{Cite web|last=Cuthbertson|first=Ian|date=December 9, 2015|title=Why Devra Davis wants the world to hang up and take notice|url=https://www.smh.com.au/lifestyle/why-devra-davis-wants-the-world-to-hang-up-and-take-notice-20151125-gl7ojl.html|access-date=2021-10-03|website=[[The Sydney Morning Herald]]|language=en}}</ref><ref>{{Cite web|last=Norris|first=Jeffrey|date=October 25, 2010|title=Cell Phones Pose Health Risks, Says Devra Davis at UCSF Seminar|url=https://www.ucsf.edu/news/2010/10/103624/cell-phones-pose-health-risks-says-devra-davis-ucsf-seminar|access-date=|website=www.ucsf.edu|publisher=[[UC San Francisco]]|language=en}}</ref> She summarized her research into health effects of cell phones in her 2010 book, ''Disconnect: The Truth about Cell Phone Radiation, What the Industry Has Done to Hide It, and How to Protect Your Family''.<ref>{{cite journal |last1=Tachover |first1=Dafna |last2=Stein |first2=Richard A. |title=Review of Disconnect: The Truth about Cell Phone Radiation, What the Industry Has Done to Hide It, and How to Protect Your Family |journal=[[World Medical & Health Policy]] |date=2011 |volume=3 |issue=1 |pages=62–63 |doi=10.2202/1948-4682.1135}}</ref><ref>{{cite magazine |last1=Walsh |first1=Bryan |title=Health: A Cancer Muckraker Takes on Cell Phones |url=https://science.time.com/2010/09/27/health-a-cancer-muckraker-takes-on-cell-phones/ |magazine=[[Time (magazine)|Time]] |date=September 27, 2010}}</ref> She has cited the [[World Health Organization]]'s 2011 classification of wireless radiation as a [[List of IARC Group 2B Agents - Possibly carcinogenic to humans|Class 2B agent ("Possibly Carcinogenic to Humans")]].<ref name=":2" /><ref name=":1" /><ref name="File-on-4" /> Critics of Davis have accused her of "[[cherry-picking]]" evidence and misrepresenting the studies upon which her conclusions were drawn,<ref name=":2" /><ref>{{cite web|last=Trottier|first=Lorne|author-link=Lorne Trottier|title=A ''Disconnect'' between cell phone fears and science|url=http://www.sciencebasedmedicine.org/a-disconnect-between-cell-phone-fears-and-science/|website=Science Based Medicine|date=December 31, 2010|accessdate=December 10, 2014}}</ref> while the EHT has been accused of promoting low quality sources.<ref>{{Cite web|last=Timmer|first=John|date=2018-03-23|title=A critical analysis of the latest cellphone safety scare|url=https://arstechnica.com/science/2018/03/a-critical-analysis-of-the-latest-cellphone-safety-scare/|website=ARS Technica}}</ref>

      Davis was featured prominently in a controversial 2016 episode of the Australian TV program ''[[Catalyst (TV program)|Catalyst]]'', in which she claimed "every single well-designed study ever conducted finds an increased risk of brain cancer with the heaviest users [of mobile phones]".<ref>{{Cite web|last=Meade|first=Amanda|date=July 5, 2016|title=ABC Catalyst's future under review after episode linking Wi-Fi and cancer|url=http://www.theguardian.com/media/2016/jul/06/abc-catalyst-under-review-episode-linking-wifi-cancer|access-date=2021-08-19|website=[[The Guardian]]|language=en}}</ref><ref>{{Cite web|last=Dean|first=Signe|date=February 17, 2016|title=Experts, audience slam ABC Catalyst's report on "Wi-Fi danger"|url=https://www.sbs.com.au/topics/science/fundamentals/article/2016/02/16/experts-audience-slam-abc-catalysts-report-wi-fi-danger|access-date=2021-08-19|website=[[SBS (Australian TV channel)|SBS Online]]|language=en|archive-date=September 27, 2021|archive-url=https://web.archive.org/web/20210927083846/https://www.sbs.com.au/topics/science/fundamentals/article/2016/02/16/experts-audience-slam-abc-catalysts-report-wi-fi-danger|url-status=dead}}</ref><ref name="Guardian-2016">{{Cite web|last=Davey|first=Melissa|date=February 17, 2016|title=ABC Catalyst program linking mobile phones to brain cancer 'should never have aired'|url=http://www.theguardian.com/society/2016/feb/17/abc-catalyst-program-linking-mobile-phones-to-brain-cancer-should-never-have-aired|access-date=2021-08-19|website=[[The Guardian]]|language=en}}</ref> The episode drew heavy criticism from researchers, and Davis' claims were refuted by public health scholar [[Simon Chapman (academic)|Simon Chapman]], who claims there is no evidence of increase brain cancer rates in Australians, as well as Rodney Croft, a commissioner with the [[International Commission on Non-Ionizing Radiation Protection]], who called the views of Davis "a fringe position that is not supported by science."<ref name="Guardian-2016"/>

      Davis claims that radiation from [[5G wireless technology]] poses health risks,<ref name="WAMU-2019" /><ref name="Bailiwick2019">{{Cite news|last=King|first=Stephen|date=October 3, 2019|title=To 5G, or not to 5G?|edition=Guernsey|work=Bailiwick Express|url=https://gsy.bailiwickexpress.com/gsy/news/5g-or-not-5g/#.YD14StanyV4}}</ref> and [[BBC Radio 4]] has called Davis one of the most influential scientists in 5G-opposition movements.<ref name="File-on-4"/> An excerpt of a lecture by Davis was used by new-age conspiracy promoter [[Sacha Stone]] in his 2020 film ''5G Apocalypse: Extinction Event''.<ref>{{Cite news|last=Wright|first=Tom|date=2020-06-06|title=The 5G Con That Could Make You Sick|work=[[File on 4]]|publisher=[[BBC Radio 4]]|url=https://downloads.bbc.co.uk/rmhttp/fileon4/PG07_5G_Con.pdf|quote=Devra Davis is adamant that she neither believes in nor condones conspiracy theories. But that doesn’t stop people with some very strange ideas using her words to spread fear. And they’ve found that fear is a great way to make money. Devra Davis' lectures were recently used in a film called 5G Apocalypse.}} [https://www.bbc.co.uk/sounds/play/m000k2mj Audio broadcast]</ref>

      In 2021, the EHT and other groups filed a lawsuit asserting the [[Federal Communications Commission]] (FCC) failed to consider new scientific evidence when deciding in 2019 not to update its safety guidelines for cellular phone and cellular tower radiation, which had not been updated since 1996. The [[United States Court of Appeals for the District of Columbia Circuit|U.S. Court of Appeals for the District of Columbia]] ruled in favor of the EHT and plaintiffs, finding the FCC "failed to provide a reasoned explanation for its determination that its guidelines adequately protect against the harmful effects of exposure to radiofrequency radiation unrelated to cancer."<ref>{{cite news |last1=Hallberg |first1=Tom |title=Jackson Hole-based Environmental Health Trust wins lawsuit against FCC over radiation guidelines |url=https://www.jhnewsandguide.com/news/health/local/jackson-hole-based-environmental-health-trust-wins-lawsuit-against-fcc-over-radiation-guidelines/article_e45ea905-350c-59c7-a148-a341d4365650.html |work=[[Jackson Hole News&Guide]] |date=August 17, 2021 |language=en}}</ref><ref>{{cite news |last1=Bohnel |first1=Steve |title=D.C. Court of Appeals rules FCC must provide more information related to 5G |url=https://bethesdamagazine.com/bethesda-beat/courts/d-c-court-of-appeals-rules-fcc-must-provide-more-information-related-to-5g/ |work=[[Bethesda Magazine]] |date=August 17, 2021}}</ref><ref>{{cite news |last1=Din |first1=Benjamin |title=FTC faces deadline in Facebook antitrust suit |url=https://www.politico.com/newsletters/morning-tech/2021/08/16/ftc-faces-deadline-in-facebook-antitrust-suit-797177 |work=[[Politico]] |date=August 16, 2021 |language=en}}</ref>

      ==Personal life==
      In 1975 Davis married Richard D. Morgenstern, an economist with [[Resources for the Future]] and former [[United States Environmental Protection Agency|Environmental Protection Agency]] official. They have two children.<ref name="CA-223" /><ref name="PittsMag-2010" /> Her father died from [[multiple myeloma]] in 1984,<ref name="NYTimes-Mag-91" /><ref name="Moment-2008"/> and her mother from [[stomach cancer]] in 2003.<ref name="Moment-2008"/> Davis told ''[[The New York Times Magazine]]'' that, although she decided to devote herself to [[cancer research]] shortly after her father's death, his illness was not the reason for that decision.<ref name="NYTimes-Mag-91" />

