      A '''brain tumor''' (sometimes referred to as '''brain cancer''') occurs when a group of cells within the [[Human brain|brain]] grow out of control, creating a mass. There are two main types of [[tumor]]s: malignant ([[Cancer|cancerous]]) tumors and [[benign tumor|benign]] (non-cancerous) tumors.<ref name="PDQ2014Pt">{{cite web |date=14 April 2014 |title=General Information About Adult Brain Tumors |url=http://www.cancer.gov/cancertopics/pdq/treatment/adultbrain/Patient/page1/AllPages |url-status=live |archive-url=https://web.archive.org/web/20140705225928/http://www.cancer.gov/cancertopics/pdq/treatment/adultbrain/Patient/page1/AllPages |archive-date=5 July 2014 |access-date=8 June 2014 |website=NCI}}</ref> These can be further classified as [[primary tumor]]s, which start within the brain, and [[metastasis|secondary]] tumors, which most commonly have spread from tumors located outside the brain, known as [[brain metastasis]] tumors.<ref name="PDQ2014MD" /> All types of brain tumors may produce symptoms that vary depending on the size of the tumor and the part of the brain that is involved.<ref name="PDQ2014Pt" /> Where symptoms exist, they may include [[headaches]], [[seizure]]s, problems with [[visual perception|vision]], [[vomiting]] and [[cognition|mental]] changes.<ref name="PDQ2014MD">{{cite web|title=Adult Brain Tumors Treatment|url=http://www.cancer.gov/cancertopics/pdq/treatment/adultbrain/HealthProfessional/page1/AllPages|website=NCI|access-date=8 June 2014|date=28 February 2014|url-status=live|archive-url=https://web.archive.org/web/20140705230128/http://www.cancer.gov/cancertopics/pdq/treatment/adultbrain/HealthProfessional/page1/AllPages|archive-date=5 July 2014}}</ref><ref name="PDQ2014Pt" /><ref>{{cite book | vauthors = Longo DL |title=Harrison's principles of internal medicine |year=2012 |publisher=McGraw-Hill |isbn=978-0-07-174887-2 |page=3258 |edition= 18th|chapter=369 Seizures and Epilepsy}}</ref> Other symptoms may include difficulty walking, speaking, with sensations, or [[unconsciousness]].<ref name=PDQ2014MD/><ref name=WCR2014CNS/>

      The cause of most brain tumors is unknown, though up to 4% of brain cancers may be caused by CT scan radiation.<ref name=PDQ2014Pt/><ref name="nrsCT1">{{cite journal |last1=Smoll |first1=Nicolas R |last2=Brady |first2=Zoe |last3=Scurrah |first3=Katrina J |last4=Lee |first4=Choonsik |last5=Berrington de González |first5=Amy |last6=Mathews |first6=John D |title=Computed tomography scan radiation and brain cancer incidence |journal=Neuro-Oncology |date=6 July 2023 |volume=25 |issue=7 |pages=1368–1376 |doi=10.1093/neuonc/noad012 |pmid=36638155 |pmc=10326490 }}</ref> Uncommon [[Risk factor (epidemiology)|risk factor]]s include exposure to [[vinyl chloride]], [[Epstein–Barr virus]], [[ionizing radiation]], and inherited syndromes such as [[neurofibromatosis]], [[tuberous sclerosis]], and [[von Hippel-Lindau Disease]].<ref name=PDQ2014MD/><ref name=PDQ2014Pt/><ref name=WCR2014CNS/> Studies on [[Mobile phone radiation and health|mobile phone exposure]] have not shown a clear risk.<ref name=WCR2014CNS/> The most common types of primary tumors in adults are [[meningioma]]s (usually benign) and [[astrocytoma]]s such as [[glioblastoma]]s.<ref name=PDQ2014MD/> In children, the most common type is a malignant [[medulloblastoma]].<ref name=WCR2014CNS/> Diagnosis is usually by [[medical examination]] along with [[computed tomography]] (CT) or [[magnetic resonance imaging]] (MRI).<ref name=PDQ2014Pt/> The result is then often confirmed by a [[biopsy]]. Based on the findings, the tumors are divided into [[Grading of the tumors of the central nervous system|different grades of severity]].<ref name=PDQ2014MD/>

      Treatment may include some combination of [[surgery]], [[radiation therapy]] and [[chemotherapy]].<ref name=PDQ2014MD/> If seizures occur, [[anticonvulsant]] medication may be needed.<ref name=PDQ2014MD/> [[Dexamethasone]] and [[furosemide]] are medications that may be used to decrease swelling around the tumor.<ref name=PDQ2014MD/> Some tumors grow gradually, requiring only monitoring and possibly needing no further intervention.<ref name=PDQ2014MD/> [[Cancer immunotherapy|Treatments that use a person's immune system]] are being studied.<ref name=PDQ2014Pt/> Outcomes for malignant tumors vary considerably depending on the type of tumor and how far it has spread at diagnosis.<ref name=WCR2014CNS/> Although benign tumors only grow in one area, they may still be life-threatening depending on their size and location.<ref>{{cite web |title=Benign brain tumour (non-cancerous) |url=https://www.nhs.uk/conditions/benign-brain-tumour/ |website=nhs.uk |access-date=29 July 2019 |language=en |date=20 October 2017}}</ref> Malignant glioblastomas usually have very poor outcomes, while benign meningiomas usually have good outcomes.<ref name=WCR2014CNS/> The average [[five-year survival rate]] for all (malignant) brain cancers in the United States is 33%.<ref name=SEER2026>{{cite web |title=Cancer of the Brain and Other Nervous System – Cancer Stat Facts |url=https://seer.cancer.gov/statfacts/html/brain.html |website=SEER |access-date=7 January 2026 }}</ref>

      Secondary, or [[metastatic]], brain tumors are about four times as common as primary brain tumors,<ref name=PDQ2014Pt/><ref name=Mer2012>{{cite journal | vauthors = Merrell RT | title = Brain tumors | journal = Disease-a-Month | volume = 58 | issue = 12 | pages = 678–89 | date = December 2012 | pmid = 23149521 | doi = 10.1016/j.disamonth.2012.08.009 }}</ref> with about half of metastases coming from [[lung cancer]].<ref name=PDQ2014Pt/> Primary brain tumors occur in around 250,000 people a year globally, and make up less than 2% of cancers.<ref name=WCR2014CNS>{{cite book|title=World Cancer Report 2014.|chapter-url=http://publications.iarc.fr/Non-Series-Publications/World-Cancer-Reports/World-Cancer-Report-2014|date=2014|publisher=World Health Organization|isbn=978-92-832-0429-9|chapter=Chapter 5.16|url-status=live|archive-url=https://web.archive.org/web/20160919073553/http://publications.iarc.fr/Non-Series-Publications/World-Cancer-Reports/World-Cancer-Report-2014|archive-date=19 September 2016}}</ref> In children younger than 15, brain tumors are second only to [[acute lymphoblastic leukemia]] as the most common form of cancer.<ref name=WCR2014Peads>{{cite book|title=World Cancer Report 2014.|date=2014|publisher=World Health Organization|isbn=978-92-832-0429-9|pages=Chapter 1.3}}</ref> In New South Wales, Australia in 2005, the average lifetime economic cost of a case of brain cancer was AU$1.9 million, the greatest of any type of cancer.<ref>{{cite web|title=Brain Tumour Facts 2011|url=http://www.btaa.org.au/BrainTumourFactSheet2011.pdf|website=Brain Tumour Alliance Australia|access-date=9 June 2014|archive-url=https://web.archive.org/web/20140125234503/http://www.btaa.org.au/BrainTumourFactSheet2011.pdf|archive-date=25 January 2014}}</ref>
      {{TOC limit}}

      ==Signs and symptoms==
      The signs and symptoms of brain tumors are broad. People may experience symptoms regardless of whether the tumor is benign (not cancerous) or [[Malignancy|cancerous]].<ref>{{Cite web|url=http://www.merckmanuals.com/home/brain,-spinal-cord,-and-nerve-disorders/tumors-of-the-nervous-system/brain-tumors|title=Brain Tumors|work=Merck Manuals Consumer Version |access-date=2 August 2016|url-status=live|archive-url=https://web.archive.org/web/20160812032003/http://www.merckmanuals.com/home/brain,-spinal-cord,-and-nerve-disorders/tumors-of-the-nervous-system/brain-tumors|archive-date=12 August 2016}}</ref> Primary and secondary brain tumors present with similar symptoms, depending on the location, size, and rate of growth of the tumor.<ref name="abta.org">{{Cite web|url=http://www.abta.org/brain-tumor-information/symptoms/mood-swings.html|title=Mood Swings and Cognitive Changes {{!}} American Brain Tumor Association|website=abta.org|access-date=3 August 2016|archive-url=https://web.archive.org/web/20160802203516/http://www.abta.org/brain-tumor-information/symptoms/mood-swings.html|archive-date=2 August 2016}}</ref> For example, larger tumors in the frontal lobe can cause changes in the ability to think. However, a smaller tumor in an area such as [[Wernicke's area]] (small area responsible for language comprehension) can result in a greater loss of function.<ref>{{Cite web|url=http://www.brainsciencefoundation.org/bUnderstandbPrimaryBrainTumors/AdditionalResources/CopingWithPersonalityBehavioralChanges/tabid/283/Default.aspx|title=Coping With Personality & Behavioral Changes|website=brainsciencefoundation.org|access-date=3 August 2016|url-status=usurped|archive-url=https://web.archive.org/web/20160730063637/http://www.brainsciencefoundation.org/bUnderstandbPrimaryBrainTumors/AdditionalResources/CopingWithPersonalityBehavioralChanges/tabid/283/Default.aspx|archive-date=30 July 2016}}</ref>

      ===Headaches {{anchor|Headache}}===
      Headaches as a result of raised [[intracranial pressure]] can be an early symptom of brain cancer.<ref name=":0">{{cite journal | vauthors = Kahn K, Finkel A | title = It IS a tumor -- current review of headache and brain tumor | journal = Current Pain and Headache Reports | volume = 18 | issue = 6 | article-number = 421 | date = June 2014 | pmid = 24760490 | doi = 10.1007/s11916-014-0421-8 | s2cid = 5820118 }}</ref> However, isolated headache without other symptoms is rare, and other symptoms including visual abnormalities may occur before headaches become common.<ref name=":0" /> Certain warning signs for headache exist which make the headache more likely to be associated with brain cancer.<ref name=":0" /> These are defined as "abnormal neurological examination, headache worsened by [[Valsalva maneuver]], headache causing awakening from sleep, new headache in the older population, progressively worsening headache, atypical headache features, or patients who do not fulfill the strict definition of migraine".<ref name=":0" /> Other associated signs are headaches that are worse in the morning or that subside after vomiting.<ref>{{Cite web|date=2020-11-19|title=Nosebleeds & Headaches: Do You Have Brain Cancer?|url=https://ana-neurosurgery.com/symptoms-brain-tumor/|access-date=2020-11-26|website=Advanced Neurosurgery Associates|language=en-US}}</ref>

      ===Location-specific symptoms===
      [[File:Brain headBorder.jpg|thumb|upright=1.3|The main areas of the brain and [[limbic system]]]]
      The brain is divided into lobes and each lobe or area has its own function.<ref name=":02">{{cite journal |last1=Gregg |first1=N. |last2=Arber |first2=A. |last3=Ashkan |first3=K. |last4=Brazil |first4=L. |last5=Bhangoo |first5=R. |last6=Beaney |first6=R. |last7=Gullan |first7=R. |last8=Hurwitz |first8=V. |last9=Costello |first9=A. |last10=Yágüez |first10=L |title=Neurobehavioural changes in patients following brain tumour: patients and relatives perspective |journal=Supportive Care in Cancer |date=November 2014 |volume=22 |issue=11 |pages=2965–2972 |doi=10.1007/s00520-014-2291-3 |pmid=24865878 }}</ref><ref name=":1">{{Cite web|url=http://www.brainsciencefoundation.org/bUnderstandbPrimaryBrainTumors/AdditionalResources/CopingWithPersonalityBehavioralChanges/tabid/283/Default.aspx|title=Coping With Personality & Behavioral Changes|website=brainsciencefoundation.org|access-date=27 July 2016|url-status=usurped|archive-url=https://web.archive.org/web/20160730063637/http://www.brainsciencefoundation.org/bUnderstandbPrimaryBrainTumors/AdditionalResources/CopingWithPersonalityBehavioralChanges/tabid/283/Default.aspx|archive-date=30 July 2016}}</ref> A tumour in any of these lobes may affect the area's performance. The symptoms experienced are often linked to the location of the tumour, but each person may experience something different.<ref name=":22">{{Cite web|url=http://www.abta.org/brain-tumor-information/symptoms/mood-swings.html?referrer=https://www.google.com/ |title=Mood Swings and Cognitive Changes {{!}} American Brain Tumor Association |website=abta.org |access-date=27 July 2016 |archive-url=https://web.archive.org/web/20160815110242/http://www.abta.org/brain-tumor-information/symptoms/mood-swings.html?referrer=https%3A%2F%2Fwww.google.com%2F |archive-date=15 August 2016  }}</ref>
      * [[Frontal lobe]]: Tumours may contribute to poor reasoning, inappropriate social behavior, personality changes, poor planning, lower inhibition, and decreased production of speech ([[Broca's area]]).<ref name=":22" />
      * [[Temporal lobe]]: Tumours in this lobe may contribute to poor memory, loss of hearing, and difficulty in language comprehension ([[Wernicke's area]] is located in this lobe).<ref name=":1" />
      * [[Parietal lobe]]: Tumours here may result in poor interpretation of languages, difficulty with speaking, writing, drawing, naming, and recognizing, and poor spatial and visual perception.<ref>{{Cite web|url=https://mayfieldclinic.com/pe-braintumor.htm|title=Brain Tumors: an introduction| vauthors = Warnick R |date=August 2018|website=Mayfield Brain and Spine Clinic}}</ref>
      * [[Occipital lobe]]: Damage to this lobe may result in poor vision or loss of vision.<ref>{{Cite web|url=https://www.thebraintumourcharity.org/understanding-brain-tumours/symptoms-and-information/changes-vision/|title=Changes in Vision – Brain Tumour Symptoms|website=thebraintumourcharity.org|access-date=9 February 2018|archive-url=https://web.archive.org/web/20180210002520/https://www.thebraintumourcharity.org/understanding-brain-tumours/symptoms-and-information/changes-vision/|archive-date=10 February 2018}}</ref>
      * [[Cerebellum]]: Tumours in this area may cause poor balance, muscle movement, and posture.<ref name=":3">{{Cite web|url=https://www.chw.org/medical-care/macc-fund-center/conditions/oncology/brain-tumors|title=Brain Tumors|date=6 March 2019|website=Children's Hospital of Wisconsin}}</ref>
      * [[Brainstem|Brain stem]]: Tumours on the brainstem can cause seizures, endocrine problems, respiratory changes, visual changes, headaches and partial paralysis.<ref name=":3" />
      * [[Leptomeninges]]: Tumours that spread to the leptomeninges, the lining of the brain, may cause [[cranial nerve palsies]] such as [[facial paralysis]], abnormalities of eye movement, abnormalities of facial sensation or [[dysphagia|swallowing difficulty]], depending on which cranial nerves are involved.<ref name="Schaff 2023">{{cite journal |last1=Schaff |first1=Lauren R. |last2=Mellinghoff |first2=Ingo K. |title=Glioblastoma and Other Primary Brain Malignancies in Adults: A Review |journal=JAMA |date=21 February 2023 |volume=329 |issue=7 |pages=574–587 |doi=10.1001/jama.2023.0023|pmid=36809318 |pmc=11445779 }}</ref>

      ===Behaviour changes===
      A person's personality may be altered due to the tumor damaging lobes of the brain. Since the frontal, temporal, and parietal lobes<ref name="abta.org"/> control inhibition, emotions, mood, judgement, reasoning, and behavior, a tumor in those regions can cause inappropriate social behavior,<ref name=":52">{{Cite web|url=http://milesforhope.org/index.php/facts/brain-tumor-symptoms|title=Brain Tumor Symptoms {{!}} Miles for Hope {{!}} Brain Tumor Foundation| vauthors = Jones C |website=milesforhope.org|access-date=3 August 2016|archive-url=https://web.archive.org/web/20160814084958/http://milesforhope.org/index.php/facts/brain-tumor-symptoms|archive-date=14 August 2016}}</ref> temper tantrums,<ref name=":52"/> laughing at things which merit no laughter,<ref name=":52"/> and even psychological symptoms such as depression and anxiety.<ref name=":22"/> More research is needed into the effectiveness and safety of medication for depression in people with brain tumors.<ref>{{cite journal | vauthors = Beevers Z, Hussain S, Boele FW, Rooney AG | title = Pharmacological treatment of depression in people with a primary brain tumour | journal = The Cochrane Database of Systematic Reviews | volume = 2020 | article-number = CD006932 | date = July 2020 | issue = 7 | pmid = 32678464 | pmc = 7388852 | doi = 10.1002/14651858.CD006932.pub4 }}</ref>

      Personality changes can have damaging effects such as unemployment, unstable relationships, and a lack of control.<ref name=":02" />

      ==Cause==
      A known cause of brain cancers is [[ionizing radiation]].<ref name=nrsCT1/><ref name="nrsIR1">{{cite journal | last1=Smoll | first1=Nicolas R. | last2=Brady | first2=Zoe | last3=Scurrah | first3=Katrina | last4=Mathews | first4=John D. | title=Exposure to ionizing radiation and brain cancer incidence: The Life Span Study cohort | journal=Cancer Epidemiology | date=June 2016 | volume=42 | pages=60–65 | doi=10.1016/j.canep.2016.03.006 | pmid=27038588 }}</ref> Approximately 4% of brain cancers in the general population are caused by [[CT-scan]] radiation.<ref name="nrsCT1" /> For brain cancers that follow a CT scan at lags of 2 years or more, it has been estimated that 40% are attributable to CT-scan radiation.<ref name="nrsCT1" /> The risk of brain cancer is dose dependent, with the relative risk increasing by 0.8 for each 100 [[Gray (unit)|gray]] of ionizing radiation received. At this dose, approximately 6391 people would have to be exposed to cause 1 case of brain cancer.<ref name="nrsCT1" /> 

      Mutations and deletions of [[tumor suppressor gene]]s, such as [[P53]], are thought to be the cause of some forms of brain tumor.<ref>{{cite book | vauthors=Kleihues P, Ohgaki H, Eibl RH, Reichel MB, Mariani L, Gehring M, Petersen I, Höll T, von Deimling A, Wiestler OD, Schwab M | chapter = Type and frequency of p53 mutations in tumors of the nervous system and its coverings | title = Molecular Neuro-oncology and Its Impact on the Clinical Management of Brain Tumors | pages = 25–31 | year = 1994 | publisher = Springer | isbn=978-3-540-57351-7 | series=Recent results in cancer research | volume=135}}</ref> Inherited conditions, such as [[Von Hippel–Lindau disease]], [[tuberous sclerosis]], [[multiple endocrine neoplasia]], and [[Neurofibromatosis|neurofibromatosis type 2]] carry a high risk for the development of brain tumors.<ref name=PDQ2014MD/><ref name=HodgsonNielsen2016>{{cite journal | vauthors = Hodgson TS, Nielsen SM, Lesniak MS, Lukas RV | title = Neurological Management of Von Hippel-Lindau Disease | journal = The Neurologist | volume = 21 | issue = 5 | pages = 73–8 | date = September 2016 | pmid = 27564075 | doi = 10.1097/NRL.0000000000000085 | s2cid = 29232748 | type = Review }}</ref><ref name=RogersBarani2015>{{cite journal | vauthors = Rogers L, Barani I, Chamberlain M, Kaley TJ, McDermott M, Raizer J, Schiff D, Weber DC, Wen PY, Vogelbaum MA | title = Meningiomas: knowledge base, treatment outcomes, and uncertainties. A RANO review | journal = Journal of Neurosurgery | volume = 122 | issue = 1 | pages = 4–23 | date = January 2015 | pmid = 25343186 | pmc = 5062955 | doi = 10.3171/2014.7.JNS131644 | type = Review }}</ref> People with [[celiac disease]] have a slightly increased risk of developing brain tumors.<ref name=Hourigan2006>{{cite journal | vauthors = Hourigan CS | title = The molecular basis of coeliac disease | journal = Clinical and Experimental Medicine | volume = 6 | issue = 2 | pages = 53–9 | date = June 2006 | pmid = 16820991 | doi = 10.1007/s10238-006-0095-6 | s2cid = 12795861 | type = Review }}</ref> Smoking may increase the risk, but evidence of this remains unclear.<ref>{{cite web | title=Brain Cancer Causes, Symptoms, Stages & Life Expectancy | url=https://www.medicinenet.com/brain_cancer/article.htm#do_cell_phones_cause_brain_cancer | website=MedicineNet | access-date=24 February 2020 | language=en | quote = Other risk factors such as smoking, radiation exposure, and viral infection (HIV) have been suggested but not proven to cause brain cancer.}}</ref>

      Although studies have not shown any link between [[Mobile phone radiation and health|cell-phone or mobile-phone radiation]] and the occurrence of brain tumors,<ref>{{cite journal | vauthors = Frei P, Poulsen AH, Johansen C, Olsen JH, Steding-Jessen M, Schüz J | title = Use of mobile phones and risk of brain tumours: update of Danish cohort study | journal = BMJ | volume = 343 | article-number = d6387 | date = October 2011 | pmid = 22016439 | pmc = 3197791 | doi = 10.1136/bmj.d6387 }}</ref> the [[World Health Organization]] has classified mobile-phone radiation on the [[International Agency for Research on Cancer|IARC]] scale into [[List of IARC Group 2B carcinogens|Group 2B]] – possibly carcinogenic.<ref name="WHO_IARC_110531">{{cite press release |url= http://www.iarc.fr/en/media-centre/pr/2011/pdfs/pr208_E.pdf |title= IARC classifies radiofrequency electromagnetic fields as possibly carcinogenic to humans |work= [[World Health Organization]] press release N° 208 |publisher= [[International Agency for Research on Cancer]] |date= 31 May 2011 |access-date= 2 June 2011 |url-status= live |archive-url= https://web.archive.org/web/20110601063650/http://www.iarc.fr/en/media-centre/pr/2011/pdfs/pr208_E.pdf |archive-date= 1 June 2011 }}</ref>
      The claim that cell-phone usage may cause brain cancer is likely based on epidemiological studies which observed a slight increase in [[glioma]] risk among heavy users of wireless phones. When those studies were conducted, GSM (2G) phones were in use. Modern, third-generation (3G) phones emit, on average, about 1% of the energy emitted by those GSM (2G) phones, and therefore the finding of an association between cell-phone usage and increased risk of brain cancer is not based upon current phone usage.<ref name=WCR2014CNS/>

      ==Pathophysiology==
      ===Meninges===
      [[File:Meninges diagram.jpg|thumb|upright=1.3|The meninges lie between the skull and brain matter. Tumors originating from the meninges are meningiomas.]]
      Human brains are surrounded by a system of [[connective tissue]] membranes called [[meninges]] that separate the [[Human brain|brain]] from the [[Human skull|skull]]. This three-layered covering is composed of (from the outside in) the [[dura mater]], [[arachnoid mater]], and [[pia mater]]. The arachnoid and pia are physically connected and thus often considered as a single layer, the ''leptomeninges''. Between the arachnoid mater and the pia mater is the [[subarachnoid space]] which contains [[cerebrospinal fluid]] (CSF). This fluid circulates in the narrow spaces between cells and through the cavities in the brain called [[Ventricular system|ventricles]], to support and protect the brain tissue. [[Blood vessels]] enter the [[central nervous system]] through the perivascular space above the pia mater. The cells in the blood vessel walls are joined tightly, forming the [[blood–brain barrier]] which protects the brain from [[toxins]] that might enter through the blood.<ref name=":7">{{Cite book|title=Clinically oriented anatomy| vauthors = Moore KL, Agur AM, Dalley II AF |isbn=978-1-4963-4721-3|edition= Eighth |location=Philadelphia|publisher=Lippincott Williams and Wilkins|oclc=978362025|date = September 2017}}</ref>

      Tumors of the meninges are [[meningioma]]s and are often benign. Though not technically a tumor of brain tissue, they are often considered brain tumors since they protrude into the space where the brain is, causing symptoms. Since they are usually slow-growing tumors, meningiomas can be quite large by the time symptoms appear.<ref>{{Cite web|url=http://neurosurgery.ucla.edu/meningioma-brain-tumor|title=Meningioma Brain Tumor|website=neurosurgery.ucla.edu|access-date=29 July 2019}}</ref>

      ===Brain matter===
      The three largest divisions of the brain are the [[Cerebrum|cerebral cortex]], [[cerebellum]] and the [[brainstem]].<ref name=":7" /> These areas are composed of two broad classes of cells: [[neurons]] and [[glia]]. These two cell types are equally numerous in the brain as a whole, although [[glial cells]] outnumber [[neurons]] roughly 4 to 1 in the [[cerebral cortex]]. Glia come in several types, which perform a number of critical functions, including structural support, metabolic support, insulation, and guidance of development.<ref>{{Cite web|url=https://training.seer.cancer.gov/brain/tumors/anatomy/neurons.html|title=Neurons & Glial Cells SEER Training|website=training.seer.cancer.gov|access-date=29 July 2019}}</ref> Primary tumors of the glial cells are called [[glioma]]s and often are malignant by the time they are diagnosed.<ref>{{cite journal | vauthors = Ostrom QT, Gittleman H, Farah P, Ondracek A, Chen Y, Wolinsky Y, Stroup NE, Kruchko C, Barnholtz-Sloan JS | title = CBTRUS statistical report: Primary brain and central nervous system tumors diagnosed in the United States in 2006-2010 | journal = Neuro-Oncology | volume = 15 | issue = Suppl 2 | pages = ii1-56 | date = November 2013 | pmid = 24137015 | pmc = 3798196 | doi = 10.1093/neuonc/not151 }}</ref>

      The [[thalamus]] and [[hypothalamus]] are major divisions of the [[diencephalon]], with the [[pituitary gland]] and [[pineal gland]] attached at the bottom; tumors of the [[pituitary]]<ref>{{Cite web |title=Pituitary tumours |url=https://www.cancerresearchuk.org/about-cancer/brain-tumours/types/pituitary-tumours |archive-url=https://web.archive.org/web/20240301203755/https://www.cancerresearchuk.org/about-cancer/brain-tumours/types/pituitary-tumours |archive-date=1 March 2024 |access-date=18 April 2024 |website=www.cancerresearchuk.org |language=en}}</ref> and [[pineal gland]]<ref>{{Cite web |last=Kashani |first=Shayan |title=What to Know About Pineal Tumors |url=https://www.webmd.com/brain/what-to-know-about-pineal-tumors |access-date=2024-07-04 |website=WebMD |language=en}}</ref> are often benign.

      The [[brainstem]] lies between the large cerebral cortex and the spinal cord. It is divided into the midbrain, pons, and medulla oblongata.<ref name=":7" />

      ==Diagnosis==
      [[File:Postermass.png|thumb|A posterior fossa tumor leading to mass effect and midline shift]]

      There are no specific signs or symptoms for brain cancer, but the presence of a combination of symptoms and the lack of alternative causes may indicate a brain tumor.<ref name="Herholz" /> A [[medical history]] aids in the diagnosis. Clinical and laboratory investigations will serve to exclude infections as the cause of the symptoms.

      Brain tumors, when compared to tumors in other areas of the body, pose a challenge for diagnosis. Commonly, [[radioactive tracer]]s are uptaken in large volumes in tumors due to the high activity of tumor cells, allowing for radioactive imaging of the tumor. However, most of the brain is separated from the blood by the [[blood–brain barrier]] (BBB), a membrane that exerts a strict control over what substances are allowed to pass into the brain. Therefore, many tracers that may reach tumors in other areas of the body easily would be unable to reach brain tumors until there was a disruption of the BBB by the tumor. Disruption of the BBB is well imaged via MRI or CT scan, and is therefore regarded as the main diagnostic indicator for malignant gliomas, meningiomas, and brain metastases.<ref name="Herholz">{{cite journal | vauthors = Herholz K, Langen KJ, Schiepers C, Mountz JM | title = Brain tumors | journal = Seminars in Nuclear Medicine | volume = 42 | issue = 6 | pages = 356–70 | date = November 2012 | pmid = 23026359 | pmc = 3925448 | doi = 10.1053/j.semnuclmed.2012.06.001 }}</ref>

      ===Imaging===
      [[File:CT brain tumor.jpg|thumb|[[CT scan]] of a brain tumor, with its diameters marked as an X. There is hypoattenuating (dark) ''peritumoral edema'' in the surrounding white matter, with a "finger-like" spread.|216x216px]]
      [[Medical imaging]] plays a central role in the diagnosis of brain tumors. Early imaging methods&nbsp;– invasive and sometimes dangerous&nbsp;– such as [[pneumoencephalography]] and cerebral [[angiography]] have been replaced by non-invasive, high-resolution techniques, especially [[magnetic resonance imaging]] (MRI) and [[computed tomography]] (CT) scans.<ref name="cancer.gov">{{cite web |title=Adult Central Nervous System Tumors Treatment (PDQ®)–Patient Version – National Cancer Institute |url=https://www.cancer.gov/types/brain/patient/adult-brain-treatment-pdq |website=cancer.gov |access-date=29 January 2021 |language=en |date=11 May 2020}}</ref> MRI with contrast enhancement is the preferred imaging test in the diagnosis of brain tumors.<ref name="Schaff 2023" /><ref name=":4">{{cite journal | vauthors = Iv M, Yoon BC, Heit JJ, Fischbein N, Wintermark M | title = Current Clinical State of Advanced Magnetic Resonance Imaging for Brain Tumor Diagnosis and Follow Up | journal = Seminars in Roentgenology | volume = 53 | issue = 1 | pages = 45–61 | date = January 2018 | pmid = 29405955 | doi = 10.1053/j.ro.2017.11.005 }}</ref> Glioblastomas usually enhance with contrast on T1 MRI weighted MRI imaging, and on [[T2*-weighted imaging|T2]] with FLAIR imaging showing hyperintense cerebral edema.<ref name="Schaff 2023" /> Low grade gliomas are usually hypointense on T1 MRI, and hyperintense with T2 with FLAIR MRI. Meningiomas are usually homogenously enhanced with dural thickening on MRI.<ref name="Schaff 2023" />

      Treatment with radiation can lead to treatment induced changes in the brain, including radiation necrosis (death of brain tissue due to radiation treatments) visible on brain imaging and which can be difficult to differentiate from tumor recurrence.<ref>{{cite journal |last1=Lee |first1=Dennis |last2=Riestenberg |first2=Robert A. |last3=Haskell-Mendoza |first3=Aden |last4=Bloch |first4=Orin |title=Brain Metastasis Recurrence Versus Radiation Necrosis |journal=Neurosurgery Clinics of North America |date=October 2020 |volume=31 |issue=4 |pages=575–587 |doi=10.1016/j.nec.2020.06.007 |pmid=32921353 |s2cid=221674217 }}</ref>

      ==== Different Types of MRI Scans ====
      '''Magnetic Resonance Angiography (MRA)'''{{snd}} looks at the blood vessels in the brain. In the diagnosis of brain tumor, MRAs are typically carried out before surgery to help surgeons get a better understanding of the tumor vasculature. For example, a study was done where surgeons were able to separate benign brain tumors from malignant ones by analyzing the shapes of the blood vessels that were extracted from MRA.<ref>{{cite conference | vauthors = Bullitt E, Jung I, Muller K, Gerig G, Aylward S, Joshi S, Smith K, Lin W, Ewend M |title=Determining Malignancy of Brain Tumors by Analysis of Vessel Shape |date=2004 | doi = 10.1007/978-3-540-30136-3_79 | conference = Medical Image Computing and Computer-Assisted Intervention – MICCAI 2004 |pages=645–653 |place=Berlin, Heidelberg |publisher=Springer Berlin Heidelberg |isbn=978-3-540-22977-3 |doi-access=free }}</ref> Although not required, some MRA may inject contrast agent, gadolinium, into the patient to get an enhanced image

      '''Magnetic Resonance Spectroscopy (MRS)'''{{snd}} measures the metabolic changes or chemical changes inside the tumor. The most common MRS is proton spectroscopy with its frequency measured in parts per million (ppm). Gliomas or malignant brain tumors have different spectra from normal brain tissue in that they have greater choline levels and lower N-acetyl aspartate (NAA) signals.<ref>{{cite journal | vauthors = Horská A, Barker PB | title = Imaging of brain tumors: MR spectroscopy and metabolic imaging | journal = Neuroimaging Clinics of North America | volume = 20 | issue = 3 | pages = 293–310 | date = August 2010 | pmid = 20708548 | doi = 10.1016/j.nic.2010.04.003 | pmc = 2927327 }}</ref> Using MRS in brain tumor diagnosis can help doctors identify the type of tumor and its aggressiveness. For example, benign brain tumors or meningioma have increased alanine levels. It can also help to distinguish brain tumors from scar tissues or dead tissues caused by previous radiation treatment, which does not have increased choline levels<ref>{{Cite web |title=MRI (magnetic resonance imaging) |url=https://mayfieldclinic.com/pe-mrspectroscopy.htm |access-date=2022-11-28 |website=mayfieldclinic.com |language=EN}}</ref> that brain tumors have, and from tumor-mimicking lesions such as abscesses or infarcts.

      '''Perfusion Magnetic Resonance Imaging (pMRI)'''{{snd}} assess the blood volume and blood flow of different parts of the brain and brain tumors. pMRI requires the injection of contrast agent, usually gadopentetate dimeglumine (Gd-DTPA) into the veins in order to enhance the contrast. pMRI provides a cerebral blood volume map that shows the tumor vascularity and angiogenesis. Brain tumors would require a larger blood supply and thus, would show a high cerebral blood volume on the pMRI map. The vascular morphology and degree of angiogenesis from pMRI help to determine the grade and malignancy of brain tumors. For brain tumor diagnosis, pMRI is useful in determining the best site to perform biopsy and to help reduce sampling error. pMRI is also valuable for after treatment to determine if the abnormal area is a remaining tumor or a scar tissue. For patients that are undergoing anti-angiogenesis cancer therapy, pMRI can give the doctors a better sense of efficacy of the treatment by monitoring tumor cerebral blood volume.<ref>{{cite journal | vauthors = Cha S | title = Perfusion MR imaging of brain tumors | journal = Topics in Magnetic Resonance Imaging | volume = 15 | issue = 5 | pages = 279–289 | date = October 2004 | pmid = 15627003 | doi = 10.1097/00002142-200410000-00002 | s2cid = 25773559 | doi-access = free }}</ref>

      '''Functional MRI (fMRI)'''{{snd}} measures blood flow changes in active parts of the brain while the patient is performing tasks and provides specific locations of the brain that are responsible for certain functions. Before performing a brain tumor surgery on patients, neurosurgeons would use fMRI to avoid damage to structures of the brain that correspond with important brain functions while resecting the tumor at the same time. Preoperative fMRI is important because it is often difficult to distinguish the anatomy near the tumor as it distorts its surrounding regions. Neurosurgeons would use fMRI to plan whether to perform a resection where tumor is surgically removed as much as possible, a biopsy where they take a surgical sampling amount to provide a diagnosis, or to not undergo surgery at all. For example, a neurosurgeon may be opposed to resecting a tumor near the motor cortex as that would affect the patient's movements. Without preoperative fMRI, the neurosurgeon would have to perform an awake-craniotomy where the patient would have to interact during open surgery to see if tumor removal would affect important brain functions.<ref>{{cite journal | vauthors = Bogomolny DL, Petrovich NM, Hou BL, Peck KK, Kim MJ, Holodny AI | title = Functional MRI in the brain tumor patient | journal = Topics in Magnetic Resonance Imaging | volume = 15 | issue = 5 | pages = 325–335 | date = October 2004 | pmid = 15627006 | doi = 10.1097/00002142-200410000-00005 | s2cid = 45995537 }}</ref>

      '''Diffusion Weighted Imaging (DWI)'''{{snd}} a form of MRI that measures random Brownian motion of water molecules along a magnetic field gradient. For brain tumor diagnosis, measurement of apparent diffusion coefficient (ADC) in brain tumors allow doctors to categorize tumor type. Most brain tumors have higher ADC than normal brain tissues and doctors can match the observed ADC of the patient's brain tumor with a list of accepted ADC to identify tumor type. DWI is also useful for treatment and therapy purposes where changes in diffusion can be analyzed in response to drug, radiation, or gene therapy. Successful response results in apoptosis and increase in diffusion while failed treatment results in unchanged diffusion values.<ref>{{cite journal | vauthors = Maier SE, Sun Y, Mulkern RV | title = Diffusion imaging of brain tumors | journal = NMR in Biomedicine | volume = 23 | issue = 7 | pages = 849–864 | date = August 2010 | pmid = 20886568 | pmc = 3000221 | doi = 10.1002/nbm.1544 }}</ref>

      ==== Other Types of Imaging Techniques ====
      '''Computed Tomography (CT) Scan'''{{snd}} uses x-rays to take pictures from different angles and computer processing to combine the pictures into a 3D image. A CT scan usually serves as an alternative to MRI in cases where the patient cannot have an MRI due to claustrophobia or pacemaker. Compared to MRI, a CT scan shows a more detailed image of the bone structures near the tumor and can be used to measure the tumor's size.<ref name=":8">{{Cite web |title=Tests for Brain and Spinal Cord Tumors in Adults |url=https://www.cancer.org/cancer/brain-spinal-cord-tumors-adults/detection-diagnosis-staging/how-diagnosed.html |access-date=2022-11-28 |website=cancer.org |language=en}}</ref> Like an MRI, a contrast dye may also be injected into the veins or ingested by mouth before a CT scan to better outline any tumors that may be present. CT scans use contrast materials that are iodine-based and barium sulfate compounds. The downside of using CT scans as opposed to MRI is that some brain tumors do not show up well on CT scans because some intra-axial masses are faint and resemble normal brain tissue. In some scenarios, brain tumors in CT scans may be mistaken for infarction, infection, and demyelination. To suspect that an intra-axial mass is a brain tumor instead of other possibilities, there must be unexplained calcifications in the brain, preservation of the cortex, and disproportionate mass effect.<ref>{{Cite web |title=Recognizing intra-axial tumors on brain computed tomography (CT) {{!}} Medmastery |url=https://public-nuxt.frontend.prod.medmastery.io/guides/brain-ct-clinical-guide/recognizing-intra-axial-tumors-brain-computed-tomography-ct-and |access-date=2022-11-28 |website=public-nuxt.frontend.prod.medmastery.io |language=en}}</ref>

      '''CT Angiography (CTA)'''{{snd}} provides information about the blood vessels in the brain using X-rays. A contrast agent is always required to be injected into the patient in the CT scanner. CTA serves as an alternative to MRA.

      '''Positron Emission Tomography (PET) Scan'''{{snd}} uses radiolabelled substances, such as [[Fluorodeoxyglucose|FDG]] which taken up by cells that are actively dividing. Tumor cells are more actively dividing so they would absorb more of the radioactive substance. After injection, a scanner would be used to create an image of the radioactive areas in the brain. PET scans are used more often for high-grade tumors than for low-grade tumors. It is useful after treatment to help doctors determine if the abnormal area on an MRI image is a remaining tumor or a scar tissue. Scar tissues will not show up on PET scans while tumors would.<ref name=":8" />

      ===Pathology===
      [[File:Oligodendroglioma1 high mag.jpg|thumb|[[Micrograph]] of an [[oligodendroglioma]], a type of brain cancer. Brain [[biopsy]]. [[H&E stain]].]]
      Maximal safe surgical resection (to preserve as much neurological function as possible) and histologic examination of the tumor is also required to aid in the diagnosis.<ref name="Schaff 2023" /> Cancer cells may have specific characteristics.

      [[Atypia]]: an indication of abnormality of a cell (which may be indicative of malignancy). Significance of the abnormality is highly dependent on context.<ref>{{Cite journal | vauthors = Watson AN |date=2007-01-01 |title=Significance of "Atypia" Found on Needle Biopsy of the Breast: Correlation with Surgical Outcome |url=https://elischolar.library.yale.edu/ymtdl/384 |journal=Yale Medicine Thesis Digital Library}}</ref>

      [[Neoplasia]]: the (uncontrolled) division of cells that is characteristic of cancer.<ref>{{cite web |title=Neoplasia |url=https://www.cancer.gov/publications/dictionaries/cancer-terms/def/neoplasm |website=www.cancer.gov |publisher=National Cancer Institute |language=en |date=2 February 2011}}</ref>

      [[Necrosis]]: the (premature) death of cells, caused by external factors such as infection, toxin or trauma. Necrotic cells send the wrong chemical signals which prevent [[phagocyte]]s from disposing of the dead cells, leading to a buildup of dead tissue, cell debris and toxins at or near the site of the necrotic cells<ref name=necrs>{{MedlinePlus|002266|Necrosis}}</ref>

      Local [[hypoxia (medical)|hypoxia]], or the deprivation of adequate oxygen supply to certain areas of the brain, including within the tumor, as the tumor grows and recruits local blood vessels.<ref>{{cite journal | vauthors = Emami Nejad A, Najafgholian S, Rostami A, Sistani A, Shojaeifar S, Esparvarinha M, Nedaeinia R, Haghjooy Javanmard S, Taherian M, Ahmadlou M, Salehi R, Sadeghi B, Manian M | title = The role of hypoxia in the tumor microenvironment and development of cancer stem cell: a novel approach to developing treatment | journal = Cancer Cell International | volume = 21 | issue = 1 | article-number = 62 | date = January 2021 | pmid = 33472628 | pmc = 7816485 | doi = 10.1186/s12935-020-01719-5 | doi-access = free }}</ref>

      ===Classification===
      Tumors can be [[benign]] or [[malignant]], can occur in different parts of the brain, and may be classified as primary or secondary. A primary tumor is one that has started in the brain, as opposed to a [[metastasis|metastatic]] tumor, which is one that has spread to the brain from another area of the body.<ref>{{cite web|url=http://www.cancer.gov/cancertopics/wyntk/brain/page1|title=What you need to know about brain tumors|publisher=National Cancer Institute|archive-url=https://web.archive.org/web/20120127124137/http://www.cancer.gov/cancertopics/wyntk/brain/page1|archive-date=27 January 2012|url-status=live|access-date=25 February 2012}}</ref> The incidence of metastatic tumors is approximately four times greater than primary tumors.<ref name=Mer2012/> Tumors may or may not be [[symptomatic]]: some tumors are discovered because the patient has symptoms, others show up incidentally on an imaging scan, or at an autopsy.{{citation needed|date=December 2020}}

      [[Grading of the tumors of the central nervous system]] commonly occurs on a 4-point scale (I-IV) created by the World Health Organization in 1993. Grade I tumors are the least severe and commonly associated with long-term survival, with severity and prognosis worsening as the grade increases. Low-grade tumors are often benign, while higher grades are aggressively malignant and/or metastatic. Other grading scales do exist, many based upon the same criteria as the WHO scale and graded from I-IV.<ref>{{cite journal | vauthors = Gupta A, Dwivedi T | title = A Simplified Overview of World Health Organization Classification Update of Central Nervous System Tumors 2016 | journal = Journal of Neurosciences in Rural Practice | volume = 8 | issue = 4 | pages = 629–641 | date = October 2017 | pmid = 29204027 | pmc = 5709890 | doi = 10.4103/jnrp.jnrp_168_17 | doi-access = free }}</ref>

