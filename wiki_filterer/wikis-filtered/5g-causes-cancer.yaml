      [[Genetic testing]] for individuals at high risk of certain cancers is recommended by unofficial groups.<ref name=pmid24176569/><ref name=BRCA08>{{cite journal |vauthors=Gulati AP, [[Susan Domchek|Domchek SM]] |s2cid=29630942 |title=The clinical management of BRCA1 and BRCA2 mutation carriers |journal=Current Oncology Reports |volume=10 |issue=1 |pages=47–53 |date=January 2008 |pmid=18366960 |doi=10.1007/s11912-008-0008-9}}</ref> Carriers of these mutations may then undergo enhanced surveillance, chemoprevention, or preventative surgery to reduce their subsequent risk.<ref name=BRCA08/>

      == Management ==
      {{Main|Treatment of cancer|Oncology|}}

      Many treatment options for cancer exist. The primary ones include surgery, [[chemotherapy]], [[radiation therapy]], [[hormonal therapy (oncology)|hormonal therapy]], [[targeted therapy]] and [[palliative care]]. Which treatments are used depends on the type, location and grade of the cancer as well as the patient's health and preferences. The [[therapy#By treatment intent|treatment intent]] may or may not be curative.{{citation needed|date=March 2024}}

      === Chemotherapy ===
      [[Chemotherapy]] is the treatment of cancer with one or more [[Cytotoxicity|cytotoxic]] anti-[[neoplastic]] drugs ([[list of chemotherapeutic agents|chemotherapeutic agents]]) as part of a [[chemotherapy regimen|standardized regimen]]. The term encompasses a variety of drugs, which are divided into broad categories such as [[Alkylating antineoplastic agent|alkylating agents]] and [[antimetabolite]]s.<ref name="Lind2008">{{cite journal | vauthors = Lind MJ |title=Principles of cytotoxic chemotherapy |journal=Medicine |year=2008 |volume=36 |issue=1 |pages=19–23 |doi=10.1016/j.mpmed.2007.10.003 }}</ref> Traditional chemotherapeutic agents act by killing cells that divide rapidly, a critical property of most cancer cells.

      It was found that providing combined cytotoxic drugs is better than a single drug, a process called the [[combination therapy]], which has an advantage in the statistics of survival and response to the tumor and in the progress of the disease.<ref>{{cite book | vauthors = Frei III E, Eder JP |title=Combination Chemotherapy |date=2003 |url=https://www.ncbi.nlm.nih.gov/books/NBK13955/ |access-date=4 April 2020 |language=en}}</ref> A Cochrane review concluded that combined therapy was more effective in treating metastasized breast cancer. However, generally it is not certain whether combination chemotherapy leads to better health outcomes, when both survival and toxicity are considered.<ref>{{cite journal | vauthors = Dear RF, McGeechan K, Jenkins MC, Barratt A, Tattersall MH, Wilcken N | title = Combination versus sequential single agent chemotherapy for metastatic breast cancer | journal = The Cochrane Database of Systematic Reviews | issue = 12 | article-number = CD008792 | date = December 2013 | volume = 2021 | pmid = 24347031 | doi = 10.1002/14651858.CD008792.pub2 | pmc = 8094913 }}</ref>

      [[Targeted therapy]] is a form of chemotherapy that targets specific molecular differences between cancer and normal cells. The first targeted therapies blocked the [[estrogen receptor]] molecule, inhibiting the growth of breast cancer. Another common example is the class of [[Bcr-Abl tyrosine-kinase inhibitor|Bcr-Abl inhibitors]], which are used to treat [[chronic myelogenous leukemia]] (CML).<ref name=TCT2018/> Currently, targeted therapies exist for many of the most common cancer types, including [[bladder cancer]], breast cancer, [[colorectal cancer]], [[kidney cancer]], [[leukemia]], [[liver cancer]], lung cancer, [[lymphoma]], [[pancreatic cancer]], [[prostate cancer]], [[skin cancer]], and [[thyroid cancer]] as well as other cancer types.<ref name=TCT2018/>

      The efficacy of chemotherapy depends on the type of cancer and the stage. In combination with surgery, chemotherapy has proven useful in cancer types including breast cancer, colorectal cancer, [[pancreatic cancer]], [[osteosarcoma|osteogenic sarcoma]], [[testicular cancer]], ovarian cancer and certain lung cancers.<ref name=HollandTx40>Holland Chp. 40</ref> Chemotherapy is curative for some cancers, such as some [[leukemias]],<ref>{{cite journal |vauthors=Nastoupil LJ, Rose AC, Flowers CR |title=Diffuse large B-cell lymphoma: current treatment approaches |journal=Oncology |volume=26 |issue=5 |pages=488–95 |date=May 2012 |pmid=22730604}}</ref><ref>{{cite journal |vauthors=Freedman A |title=Follicular lymphoma: 2012 update on diagnosis and management |journal=American Journal of Hematology |volume=87 |issue=10 |pages=988–95 |date=October 2012 |pmid=23001911 |doi=10.1002/ajh.23313|s2cid=35447562 |doi-access=free }}</ref> ineffective in some [[brain tumors]],<ref>{{cite journal |vauthors=Rampling R, James A, Papanastassiou V |title=The present and future management of malignant brain tumours: surgery, radiotherapy, chemotherapy |journal=Journal of Neurology, Neurosurgery, and Psychiatry |volume=75 |issue=Suppl 2 |pages=ii24–30 |date=June 2004 |pmid=15146036 |pmc=1765659 |doi=10.1136/jnnp.2004.040535}}</ref> and needless in others, such as most [[non-melanoma skin cancer]]s.<ref>{{cite journal |vauthors=Madan V, Lear JT, Szeimies RM |title=Non-melanoma skin cancer |journal=Lancet |volume=375 |issue=9715 |pages=673–85 |date=February 2010 |pmid=20171403 |doi=10.1016/S0140-6736(09)61196-X|pmc=3339125 |bibcode=2010Lanc..375..673M }}</ref> The effectiveness of chemotherapy is often limited by its toxicity to other tissues in the body. Even when chemotherapy does not provide a permanent cure, it may be useful to reduce symptoms such as pain or to reduce the size of an inoperable tumor in the hope that surgery will become possible in the future.{{Citation needed|date=January 2025}}

      === Radiation ===
      [[Radiation therapy]] involves the use of [[ionizing radiation]] in an attempt to either cure or improve symptoms.<!--<ref name=H41/> --> It works by damaging the DNA of cancerous tissue, causing [[mitotic catastrophe]] resulting in the death of the cancer cells.<ref>{{cite journal | vauthors = Vitale I, Galluzzi L, Castedo M, Kroemer G | title = Mitotic catastrophe: a mechanism for avoiding genomic instability | journal = Nature Reviews. Molecular Cell Biology | volume = 12 | issue = 6 | pages = 385–392 | date = June 2011 | pmid = 21527953 | doi = 10.1038/nrm3115 | s2cid = 22483746 }}</ref> To spare normal tissues (such as skin or organs, which radiation must pass through to treat the tumor), shaped radiation beams are aimed from multiple exposure angles to intersect at the tumor, providing a much larger dose there than in the surrounding, healthy tissue. As with chemotherapy, cancers vary in their response to radiation therapy.<ref>{{cite book | vauthors = Bomford CK, Kunkler IH, Walter J | title = Walter and Miller's Textbook of Radiation therapy | edition = 6th | page = 311 }}</ref><ref>{{cite web |url=http://www.gpnotebook.co.uk/simplepage.cfm?ID=2060451853 |title=tumour radiosensitivity – General Practice Notebook | vauthors = McMorran J, Crowther D, McMorran S, Youngmin S, Wacogne I, Pleat J, Clive P |url-status=live |archive-url=https://web.archive.org/web/20150924023421/http://www.gpnotebook.co.uk/simplepage.cfm?ID=2060451853 |archive-date=24 September 2015}}</ref><ref>{{cite web |url=https://patient.info/doctor/radiotherapy-pro |title=Radiotherapy |publisher=[[Patient UK]] | vauthors = Tidy C |date=23 December 2015 | url-status = live |archive-url=https://web.archive.org/web/20170709084620/https://patient.info/doctor/radiotherapy-pro |archive-date=9 July 2017}} Last Checked: 23 December 2015</ref>

      Radiation therapy is used in about half of cases. The radiation can be either from internal sources ([[brachytherapy]]) or external sources. The radiation is most commonly low energy X-rays for treating skin cancers, while higher energy X-rays are used for cancers within the body.<ref>{{cite journal |vauthors=Hill R, Healy B, Holloway L, Kuncic Z, Thwaites D, Baldock C |s2cid=18082594 |title=Advances in kilovoltage x-ray beam dosimetry |journal=Physics in Medicine and Biology |volume=59 |issue=6 |pages=R183–231 |date=March 2014 |pmid=24584183 |doi=10.1088/0031-9155/59/6/r183|bibcode=2014PMB....59R.183H }}</ref> Radiation is typically used in addition to surgery and/or chemotherapy. For certain types of cancer, such as early [[head and neck cancer]], it may be used alone.<ref name="De_Felice_2023">{{cite journal | vauthors = De Felice F, Cattaneo CG, Franco P | title = Radiotherapy and Systemic Therapies: Focus on Head and Neck Cancer | journal = Cancers | volume = 15 | issue = 17 | date = August 2023 | page = 4232 | pmid = 37686508 | pmc = 10486947 | doi = 10.3390/cancers15174232 | doi-access = free | url = }}</ref> Radiation therapy after surgery for brain metastases has been shown to not improve overall survival in patients compared to surgery alone.<ref>{{Cite web |date=13 August 2019 |title=Radiation Therapy for Brain Metastases: A Systematic Review |url=https://www.pcori.org/research-results/2019/radiation-therapy-brain-metastases-systematic-review |access-date=10 October 2023 |website=PCORI |language=en}}</ref> For painful [[bone metastasis]], radiation therapy has been found to be effective in about 70% of patients.<ref>{{cite book | vauthors = Garbar V, Richter S | chapter = Palliative Radiation Therapy For Bone Metastases. | date = March 2024 | title = StatPearls [Internet]. | location = Treasure Island (FL) | publisher = StatPearls Publishing | pmid = 38753924 | chapter-url = https://www.ncbi.nlm.nih.gov/books/NBK603757/ }}</ref>

      === Surgery ===
      Surgery is the primary method of treatment for most isolated, solid cancers and may play a role in palliation and prolongation of survival. It is typically an important part of the definitive diagnosis and staging of tumors, as biopsies are usually required. In localized cancer, surgery typically attempts to remove the entire mass along with, in certain cases, the [[lymph node]]s in the area. For some types of cancer this is sufficient to eliminate the cancer.<ref name="Wang_2019">{{cite journal | vauthors = Wang S, Liu Y, Feng Y, Zhang J, Swinnen J, Li Y, Ni Y | title = A Review on Curability of Cancers: More Efforts for Novel Therapeutic Options Are Needed | journal = Cancers | volume = 11 | issue = 11 | pages = | date = November 2019 | pmid = 31766180 | pmc = 6896199 | doi = 10.3390/cancers11111782 | doi-access = free }}</ref>

      === Palliative care ===
      {{How-to section|date=June 2025}}
      [[Palliative care]] is treatment that attempts to help the patient feel better and may be combined with an attempt to treat the cancer. Palliative care includes action to reduce physical, emotional, spiritual and psycho-social distress. Unlike treatment that is aimed at directly killing cancer cells, the primary goal of palliative care is to improve [[quality of life (healthcare)|quality of life]].

      People at all stages of cancer treatment typically receive some kind of palliative care. In some cases, [[Specialty (medicine)|medical specialty]] [[professional organizations]] recommend that patients and physicians respond to cancer only with palliative care. This applies to patients who:<ref name="ASCOfive">{{Cite journal |author1=American Society of Clinical Oncology |author1-link=American Society of Clinical Oncology |title=Five Things Physicians and Patients Should Question |journal=Choosing Wisely: An Initiative of the ABIM Foundation |url=http://choosingwisely.org/wp-content/uploads/2012/04/5things_12_factsheet_Amer_Soc_Clin_Onc.pdf |access-date=14 August 2012 |archive-url=https://web.archive.org/web/20120731073425/http://choosingwisely.org/wp-content/uploads/2012/04/5things_12_factsheet_Amer_Soc_Clin_Onc.pdf |archive-date=31 July 2012}}<br/>* The American Society of Clinical Oncology made this recommendation based on various cancers.</ref>
      * Display low [[performance status]], implying limited ability to care for themselves
      * Received no benefit from prior [[Evidence-based medicine|evidence-based treatments]]
      * Are not eligible to participate in any appropriate [[clinical trial]]
      * No strong evidence implies that treatment would be effective

      Palliative care may be confused with [[hospice]] and therefore only indicated when people approach [[End-of-life care|end of life]]. Like hospice care, palliative care attempts to help the patient cope with their immediate needs and to increase comfort. Unlike hospice care, palliative care does not require people to stop treatment aimed at the cancer.{{Citation needed|date=January 2025}}

      Multiple national [[medical guideline]]s recommend early palliative care for patients whose cancer has produced distressing symptoms or who need help coping with their illness. In patients first diagnosed with metastatic disease, palliative care may be immediately indicated. Palliative care is indicated for patients with a prognosis of less than 12 months of life even given aggressive treatment.<ref>{{cite web |url=http://www.nccn.org/professionals/physician_gls/default.asp |title=NCCN Guidelines |url-status=live |archive-url=https://web.archive.org/web/20080514153600/http://www.nccn.org/professionals/physician_gls/default.asp |archive-date=14 May 2008}}</ref><ref>{{cite web |url=http://www.nationalconsensusproject.org/guideline.pdf |title=Clinical Practice Guidelines for Quality Palliative Care |publisher=The National Consensus Project for Quality Palliative Care (NCP) |archive-url=https://web.archive.org/web/20110516082645/http://www.nationalconsensusproject.org/Guideline.pdf |archive-date=16 May 2011}}</ref><ref>{{cite journal |vauthors=Levy MH, Back A, Bazargan S, Benedetti C, Billings JA, Block S, Bruera E, Carducci MA, Dy S, Eberle C, Foley KM, Harris JD, Knight SJ, Milch R, Rhiner M, Slatkin NE, Spiegel D, Sutton L, Urba S, Von Roenn JH, Weinstein SM |s2cid=44343423 |title=Palliative care. Clinical practice guidelines in oncology |journal=Journal of the National Comprehensive Cancer Network |volume=4 |issue=8 |pages=776–818 |date=September 2006 |pmid=16948956 |doi= 10.6004/jnccn.2006.0068}}</ref>

      === Immunotherapy ===
      {{Main|Cancer immunotherapy}}
      A variety of therapies using [[Cancer immunotherapy|immunotherapy]], stimulating or helping the [[immune system]] to fight cancer, have come into use since 1997. Approaches include:<ref>{{cite journal |vauthors=Waldmann TA |date=March 2003 |title=Immunotherapy: past, present and future |url=https://zenodo.org/record/1233435 |journal=Nature Medicine |volume=9 |issue=3 |pages=269–77 |doi=10.1038/nm0303-269 |pmid=12612576 |s2cid=9745527 |doi-access=free}}</ref>

      * [[Monoclonal antibody therapy]]
      * [[Checkpoint therapy]] (therapy that targets the [[immune checkpoint]]s or regulators of the [[immune system]])
      * [[Adoptive cell transfer]]
      * [[CAR T cell]]

      === Laser therapy ===
      {{Main|Lasers in cancer treatment}}
      [[Laser]] therapy uses high-intensity light to treat cancer by shrinking or destroying tumors or precancerous growths. Lasers are most commonly used to treat superficial cancers that are on the surface of the body or the lining of internal organs. It is used to treat basal cell skin cancer and the very early stages of others like cervical, penile, vaginal, vulvar, and non-small cell lung cancer. It is often combined with other treatments, such as surgery, chemotherapy, or radiation therapy. [[Laser ablation|Laser-induced interstitial thermotherapy]] (LITT), or interstitial laser [[Laser coagulation|photocoagulation]], uses lasers to treat some cancers using hyperthermia, which uses heat to shrink tumors by damaging or killing cancer cells. Laser are more precise than surgery and cause less damage, pain, bleeding, swelling, and scarring. A disadvantage is that surgeons must have specialized training. It may be more expensive than other treatments.<ref name="NIHlaser">{{cite web|url=https://www.cancer.gov/about-cancer/treatment/types/surgery/lasers-fact-sheet|title=Lasers in Cancer Treatment|date=13 September 2011|publisher=National Institutes of Health, National Cancer Institute|access-date=15 December 2017}}{{PD-notice}}</ref>

      === Alternative medicine ===
      {{Main|Alternative cancer treatments}}
      Complementary and alternative cancer treatments are a diverse group of therapies, practices and products that are not part of conventional medicine.<ref name="mnalt">{{cite journal |vauthors=Cassileth BR, Deng G |title=Complementary and alternative therapies for cancer |journal=The Oncologist |volume=9 |issue=1 |pages=80–89 |year=2004 |pmid=14755017 |doi=10.1634/theoncologist.9-1-80|s2cid=6453919 |url=http://theoncologist.alphamedpress.org/content/9/1/80.full.pdf }}</ref> "Complementary medicine" refers to methods and substances used along with conventional medicine, while "alternative medicine" refers to compounds used instead of conventional medicine.<ref>[https://www.nccih.nih.gov/health/complementary-alternative-or-integrative-health-whats-in-a-name What Is CAM?]. [[National Center for Complementary and Alternative Medicine]]. Retrieved 3 February 2008.</ref> Most complementary and alternative medicines for cancer have not been studied or tested using conventional techniques such as clinical trials. Some alternative treatments have been investigated and shown to be ineffective but still continue to be marketed and promoted. Cancer researcher Andrew J. Vickers stated, "The label 'unproven' is inappropriate for such therapies; it is time to assert that many alternative cancer therapies have been 'disproven'."<ref name="pmid15061600">{{cite journal |vauthors=Vickers A |title=Alternative cancer cures: "unproven" or "disproven"? |journal=CA: A Cancer Journal for Clinicians |volume=54 |issue=2 |pages=110–18 |year=2004 |pmid=15061600 |doi=10.3322/canjclin.54.2.110|citeseerx=10.1.1.521.2180 |s2cid=35124492 }}</ref>

      == Prognosis ==
      {{See also|Cancer survival rates|List of cancer mortality rates in the United States|Cancer survivor}}
      {{owidslider
      | start = 2021
      | list = Template:OWID/cancer death rates#gallery
      | location = commons
      | caption = 
      | title = 
      | language = 
      | file = [[File:Cancer-death-rates,World,2021 (cropped).svg|link=|thumb|upright=1.6|Cancer death rates per 100,000]]
      | startingView = World
      }}
      [[File:Three measures of cancer mortality, OWID.svg|thumb|upright=1.15|Three measures of global cancer mortality from 1990 to 2017<ref>{{cite web |title=Three measures of cancer mortality |url=https://ourworldindata.org/grapher/cancer-deaths-rate-and-age-standardized-rate-index |website=Our World in Data |access-date=7 March 2020}}</ref>]]

      Survival rates vary by cancer type and by the stage at which it is diagnosed, ranging from majority survival to complete mortality five years after diagnosis. Once a cancer has metastasized, prognosis normally becomes much worse. About half of patients receiving treatment for invasive cancer (excluding [[carcinoma in situ|carcinoma ''in situ'']] and non-melanoma skin cancers) die from that cancer or its treatment.<ref name=Epi11/> A majority of cancer deaths are due to metastases of the primary tumor.<ref>{{cite journal | vauthors = Tammela T, Sage J | title = Investigating Tumor Heterogeneity in Mouse Models | journal = Annual Review of Cancer Biology | volume = 4 | issue = 1 | pages = 99–119 | date = March 2020 | pmid = 34164589 | pmc = 8218894 | doi = 10.1146/annurev-cancerbio-030419-033413 | doi-access = free }}</ref>

      Survival is worse in the [[developing world]],<ref name=Epi11/> partly because the types of cancer that are most common there are harder to treat than those associated with [[developed countries]].<ref>{{cite book |title=World Cancer Report 2014 |date=2014 |publisher=World Health Organization |isbn=978-92-832-0429-9 |url=http://www.searo.who.int/publications/bookstore/documents/9283204298/en/ |page=22 |archive-url=https://web.archive.org/web/20170712114430/http://www.searo.who.int/publications/bookstore/documents/9283204298/en/ |archive-date=12 July 2017}}</ref>

      Those who survive cancer develop a second primary cancer at about twice the rate of those never diagnosed.<ref name=isbn1-55009-213-8/> The increased risk is believed to be due to the random chance of developing any cancer, the likelihood of surviving the first cancer, the same risk factors that produced the first cancer, unwanted side effects of treating the first cancer (particularly radiation therapy), and better compliance with screening.<ref name="isbn1-55009-213-8">{{cite book | veditors = Frei E, Kufe DW, Holland JF | vauthors = Rheingold S, Neugut A, Meadows A | title = Holland-Frei Cancer Medicine | edition = 6th | publisher = BC Decker | location = Hamilton, Ont | year = 2003 | page = [https://archive.org/details/cancermedicine60002unse/page/2399 2399] | isbn = 978-1-55009-213-4 | chapter-url = https://www.ncbi.nlm.nih.gov/books/NBK20948/#A41087 | chapter = 156: Secondary Cancers: Incidence, Risk Factors, and Management | url = https://archive.org/details/cancermedicine60002unse/page/2399 }}</ref>

      Predicting short- or long-term survival depends on many factors. The most important are the cancer type and the patient's age and overall health. Those who are [[wikt:frailty|frail]] with other health problems have lower survival rates than otherwise healthy people. [[Centenarian]]s are unlikely to survive for five years even if treatment is successful. People who report a higher quality of life tend to survive longer.<ref>{{cite journal |vauthors=Montazeri A |title=Quality of life data as prognostic indicators of survival in cancer patients: an overview of the literature from 1982 to 2008 |journal=Health and Quality of Life Outcomes |volume=7 |article-number=102 |date=December 2009 |pmid=20030832 |pmc=2805623 |doi=10.1186/1477-7525-7-102 |author-link=Ali Montazeri |doi-access=free }}</ref> People with lower quality of life may be affected by [[major depressive disorder|depression]] and other complications and/or disease progression that both impairs quality and quantity of life. Additionally, patients with worse prognoses may be depressed or report poorer quality of life because they perceive that their condition is likely to be fatal.{{Citation needed|date=January 2025}}

      People with cancer have an increased risk of [[venous thromboembolism|blood clots in their veins]] which can be life-threatening.<ref name=":1">{{cite journal | vauthors = Akl EA, Kahale LA, Hakoum MB, Matar CF, Sperati F, Barba M, Yosuico VE, Terrenato I, Synnot A, Schünemann H | title = Parenteral anticoagulation in ambulatory patients with cancer | journal = The Cochrane Database of Systematic Reviews | volume = 2021 | article-number = CD006652 | date = September 2017 | issue = 9 | pmid = 28892556 | pmc = 6419241 | doi = 10.1002/14651858.CD006652.pub5 }}</ref> The use of [[Anticoagulant|blood thinners]] such as [[heparin]] decrease the risk of blood clots but have not been shown to increase survival in people with cancer.<ref name=":1"/> People who take blood thinners also have an increased risk of bleeding.<ref name=":1"/>

      Although extremely rare, some forms of cancer, even from an advanced stage, can heal spontaneously. This phenomenon is known as [[spontaneous remission]].<ref>{{cite journal | vauthors = Radha G, Lopus M | title = The spontaneous remission of cancer: Current insights and therapeutic significance | journal = Translational Oncology | volume = 14 | issue = 9 | article-number = 101166 | date = September 2021 | pmid = 34242964 | pmc = 8271173 | doi = 10.1016/j.tranon.2021.101166 }}</ref>

      == Epidemiology ==
      {{Main|Epidemiology of cancer}}

      {{See also|List of countries by cancer rate}}
      Estimates are that in 2018, 18.1&nbsp;million new cases of cancer and 9.6&nbsp;million deaths occur globally.<ref name=IARC2018/> About 20% of males and 17% of females will get cancer at some point in time while 13% of males and 9% of females will die from it.<ref name=IARC2018>{{cite web |title=Latest global cancer data: Cancer burden rises to 18.1 million new cases and 9.6 million cancer deaths in 2018 |url=https://www.iarc.fr/wp-content/uploads/2018/09/pr263_E.pdf |website=iarc.fr |access-date=5 December 2018}}</ref>

      In 2008, approximately 12.7&nbsp;million cancers were [[diagnosis|diagnosed]] (excluding [[non-melanoma skin cancer]]s and other non-invasive cancers)<ref name=Epi11/> and in 2010 nearly 7.98&nbsp;million people died.<ref name=Loz2012>{{cite journal |vauthors=Lozano R, Naghavi M, Foreman K, Lim S, Shibuya K, Aboyans V, Abraham J, Adair T, Aggarwal R, Ahn SY, Alvarado M, Anderson HR, Anderson LM, Andrews KG, Atkinson C, Baddour LM, Barker-Collo S, Bartels DH, Bell ML, Benjamin EJ, Bennett D, Bhalla K, Bikbov B, Bin Abdulhak A, Birbeck G, Blyth F, Bolliger I, Boufous S, Bucello C, Burch M, Burney P, Carapetis J, Chen H, Chou D, Chugh SS, Coffeng LE, Colan SD, Colquhoun S, Colson KE, Condon J, Connor MD, Cooper LT, Corriere M, Cortinovis M, de Vaccaro KC, Couser W, Cowie BC, Criqui MH, Cross M, Dabhadkar KC, Dahodwala N, De Leo D, Degenhardt L, Delossantos A, Denenberg J, Des Jarlais DC, Dharmaratne SD, Dorsey ER, Driscoll T, Duber H, Ebel B, Erwin PJ, Espindola P, Ezzati M, Feigin V, Flaxman AD, Forouzanfar MH, Fowkes FG, Franklin R, Fransen M, Freeman MK, Gabriel SE, Gakidou E, Gaspari F, Gillum RF, Gonzalez-Medina D, Halasa YA, Haring D, Harrison JE, Havmoeller R, Hay RJ, Hoen B, Hotez PJ, Hoy D, Jacobsen KH, James SL, Jasrasaria R, Jayaraman S, Johns N, Karthikeyan G, Kassebaum N, Keren A, Khoo JP, Knowlton LM, Kobusingye O, Koranteng A, Krishnamurthi R, Lipnick M, Lipshultz SE, Ohno SL, Mabweijano J, MacIntyre MF, Mallinger L, March L, Marks GB, Marks R, Matsumori A, Matzopoulos R, Mayosi BM, McAnulty JH, McDermott MM, McGrath J, Mensah GA, Merriman TR, Michaud C, Miller M, Miller TR, Mock C, Mocumbi AO, Mokdad AA, Moran A, Mulholland K, Nair MN, Naldi L, Narayan KM, Nasseri K, Norman P, O'Donnell M, Omer SB, Ortblad K, Osborne R, Ozgediz D, Pahari B, Pandian JD, Rivero AP, Padilla RP, Perez-Ruiz F, Perico N, Phillips D, Pierce K, Pope CA, Porrini E, Pourmalek F, Raju M, Ranganathan D, Rehm JT, Rein DB, Remuzzi G, Rivara FP, Roberts T, De León FR, Rosenfeld LC, Rushton L, Sacco RL, Salomon JA, Sampson U, Sanman E, Schwebel DC, Segui-Gomez M, Shepard DS, Singh D, Singleton J, Sliwa K, Smith E, Steer A, Taylor JA, Thomas B, Tleyjeh IM, Towbin JA, Truelsen T, Undurraga EA, Venketasubramanian N, Vijayakumar L, Vos T, Wagner GR, Wang M, Wang W, Watt K, Weinstock MA, Weintraub R, Wilkinson JD, Woolf AD, Wulf S, Yeh PH, Yip P, Zabetian A, Zheng ZJ, Lopez AD, Murray CJ, AlMazroa MA, Memish ZA | s2cid = 1541253 |title=Global and regional mortality from 235 causes of death for 20 age groups in 1990 and 2010: a systematic analysis for the Global Burden of Disease Study 2010 |journal=Lancet |volume=380 |issue=9859 |pages=2095–128 |date=December 2012 |pmid=23245604 |doi=10.1016/S0140-6736(12)61728-0 | pmc = 10790329 |hdl=10536/DRO/DU:30050819| url = https://zenodo.org/record/2557786 |hdl-access=free }}</ref> Cancers account for almost one in six deaths. The cancers causing the most deaths, as of 2020 are lung cancer (1.8 million), [[colorectal cancer]] (916,000), liver cancer (830,000), [[stomach cancer]] (769,000) and breast cancer (685,000).<ref name=WHO2018/> This makes invasive cancer the leading cause of death in the [[developed country|developed world]] and the second leading in the [[developing country|developing world]].<ref name=Epi11/> Over half of these cases occur in the developing world.<ref name=Epi11/>

      Deaths from cancer were 5.8&nbsp;million in 1990.<ref name=Loz2012/> Deaths have been increasing primarily due to longer lifespans and lifestyle changes in the developing world.<ref name=Epi11/> The most significant [[Risk factor (epidemiology)|risk factor]] for developing cancer is age.<ref name=Coleman>{{cite book | vauthors = Coleman WB, Rubinas TC | veditors = Tsongalis GJ, Coleman WL | title = Molecular Pathology: The Molecular Basis of Human Disease | publisher = Elsevier Academic Press | location = Amsterdam | year = 2009 | page = 66 | chapter = 4 | chapter-url = {{google books |plainurl=y |id=7MaclAEA}} | isbn = 978-0-12-374419-7 }}{{dead link|date=July 2023 |bot=InternetArchiveBot |fix-attempted=yes }}</ref> Although it is possible for cancer to strike at any age, most patients with invasive cancer are over 65.<ref name=Coleman/> According to cancer researcher [[Robert Weinberg (biologist)|Robert A. Weinberg]], "If we lived long enough, sooner or later we all would get cancer."<ref name=Weinberg>{{cite news |url=https://www.nytimes.com/2010/12/28/health/28cancer.html |title=Unearthing Prehistoric Tumors, and Debate |newspaper=[[The New York Times]] |date=28 December 2010 | vauthors = Johnson G |url-status=live |archive-url=https://web.archive.org/web/20170624233156/http://www.nytimes.com/2010/12/28/health/28cancer.html |archive-date=24 June 2017}}</ref> Some of the association between aging and cancer is attributed to [[immunosenescence]],<ref>{{cite journal | vauthors = Pawelec G, Derhovanessian E, Larbi A | title = Immunosenescence and cancer | journal = Critical Reviews in Oncology/Hematology | volume = 75 | issue = 2 | pages = 165–72 | date = August 2010 | pmid = 20656212 | doi = 10.1016/j.critrevonc.2010.06.012 }}</ref> errors accumulated in [[DNA]] over a lifetime<ref>{{cite book |vauthors=Alberts B, Johnson A, Lewis J |title=Molecular biology of the cell |publisher=Garland Science |location=New York |year=2002 |edition=4th |chapter=The Preventable Causes of Cancer |isbn=978-0-8153-4072-0 |chapter-url=https://www.ncbi.nlm.nih.gov/books/NBK26897/ |quote=A certain irreducible background incidence of cancer is to be expected regardless of circumstances: mutations can never be absolutely avoided, because they are an inescapable consequence of fundamental limitations on the accuracy of DNA replication, as discussed in Chapter 5. If a human could live long enough, it is inevitable that at least one of his or her cells would eventually accumulate a set of mutations sufficient for cancer to develop. | display-authors = etal |url-status=live |archive-url=https://web.archive.org/web/20160102193148/http://www.ncbi.nlm.nih.gov/books/NBK26897/ |archive-date=2 January 2016}}</ref> and age-related changes in the [[endocrine system]].<ref>{{cite journal | vauthors = Anisimov VN, Sikora E, Pawelec G | s2cid = 17412298 | title = Relationships between cancer and aging: a multilevel approach | journal = Biogerontology | volume = 10 | issue = 4 | pages = 323–38 | date = August 2009 | pmid = 19156531 | doi = 10.1007/s10522-008-9209-8 }}</ref> Aging's effect on cancer is complicated by factors such as DNA damage and inflammation promoting it and factors such as vascular aging and endocrine changes inhibiting it.<ref>{{cite journal | vauthors = de Magalhães JP | s2cid = 5726826 | title = How ageing processes influence cancer | journal = Nature Reviews. Cancer | volume = 13 | issue = 5 | pages = 357–65 | date = May 2013 | pmid = 23612461 | doi = 10.1038/nrc3497 }}</ref>

      Some slow-growing cancers are particularly common, but often are not fatal. [[Autopsy]] studies in Europe and Asia showed that up to 36% of people have undiagnosed and apparently harmless [[thyroid cancer]] at the time of their deaths and that 80% of men develop [[prostate cancer]] by age 80.<ref>{{cite book | vauthors = David S, Fraumeni JF |title=Cancer Epidemiology and Prevention |url={{google books |plainurl=y |id=qfN8Y1_lbDYC |page=977}}|date=24 August 2006|publisher=Oxford University Press|isbn=978-0-19-974797-9|page=977}}</ref><ref>{{cite book | vauthors = Bostwick DG, Eble JN |title=Urological Surgical Pathology |publisher=Mosby |location=St. Louis |year=2007 |page=468 |isbn=978-0-323-01970-5 |url={{google books |plainurl=y |id=z7AA-DS0VegC |page=468 }}}}</ref> As these cancers do not cause the patient's death, identifying them would have represented [[overdiagnosis]] rather than useful medical care.{{Citation needed|date=January 2025}}

      The three most common [[childhood cancer]]s are [[leukemia]] (34%), [[brain tumor]]s (23%) and [[lymphoma]]s (12%).<ref name=Euro10>{{cite journal | vauthors = Kaatsch P | title = Epidemiology of childhood cancer | journal = Cancer Treatment Reviews | volume = 36 | issue = 4 | pages = 277–285 | date = June 2010 | pmid = 20231056 | doi = 10.1016/j.ctrv.2010.02.003 }}</ref> In the United States, cancer affects about 1 in 285 children.<ref name=Eli2014>{{cite journal | vauthors = Ward E, DeSantis C, Robbins A, Kohler B, Jemal A | title = Childhood and adolescent cancer statistics, 2014 | journal = CA | volume = 64 | issue = 2 | pages = 83–103 | date = January 2014 | pmid = 24488779 | doi = 10.3322/caac.21219 | s2cid = 34364885 | doi-access = free }}</ref> Rates of childhood cancer increased by 0.6% per year between 1975 and 2002 in the United States<ref>{{cite journal | vauthors = Ward EM, Thun MJ, Hannan LM, Jemal A | title = Interpreting cancer trends | journal = Annals of the New York Academy of Sciences | volume = 1076 | issue = 1 | pages = 29–53 | date = September 2006 | pmid = 17119192 | doi = 10.1196/annals.1371.048 | s2cid = 1579801 | bibcode = 2006NYASA1076...29W }}</ref> and by 1.1% per year between 1978 and 1997 in Europe.<ref name=Euro10/> Death from childhood cancer decreased by half between 1975 and 2010 in the United States.<ref name=Eli2014/>

      == History ==
      {{Main|History of cancer}}

      [[File:Clara Jacobi-Tumor.jpg|thumb|left|[[Engraving]] with two views of a Dutch woman who had a tumor removed from her neck in 1689]]

      Cancer has existed for all of human history.<ref name=Hist1/> The earliest written record regarding cancer is from {{circa|1600 BC}} in the Egyptian [[Edwin Smith Papyrus]] and describes breast cancer.<ref name=Hist1>{{cite journal |vauthors=Hajdu SI |s2cid=39667103 |title=A note from history: landmarks in history of cancer, part 1 |journal=Cancer |volume=117 |issue=5 |pages=1097–102 |date=March 2011 |pmid=20960499 |doi=10.1002/cncr.25553|doi-access=free }}</ref> [[Hippocrates]] ({{circa|460 BC|370 BC}}) described several kinds of cancer, referring to them with the [[Greek language|Greek]] word [[wikt:καρκίνος#Ancient Greek|καρκίνος]] ''karkinos'' (crab or [[crayfish]]).<ref name=Hist1/> This name comes from the appearance of the cut surface of a solid malignant tumor, with "the veins stretched on all sides as the animal the crab has its feet, whence it derives its name".<ref>Paul of Aegina, 7th century AD, quoted in {{cite web | vauthors = Moss RW |title=Galen on Cancer |url=http://www.cancerdecisions.com/speeches/galen1989.html |archive-url=https://web.archive.org/web/20110716111312/http://www.cancerdecisions.com/speeches/galen1989.html |archive-date=16 July 2011 |publisher=CancerDecisions |year=2004 }} Referenced from Michael Shimkin, Contrary to Nature, Washington, DC: Superintendent of Document, DHEW Publication No. (NIH) 79–720, p. 35.</ref> [[Galen]] stated that "cancer of the breast is so called because of the fancied resemblance to a crab given by the lateral prolongations of the tumor and the adjacent distended veins".<ref name="Majno2004">{{cite book | vauthors = Majno G, Joris I |title=Cells, Tissues, and Disease: Principles of General Pathology: Principles of General Pathology |url={{google books |plainurl=y |id=8yAf6U7njlcC |page=738}}|access-date=11 September 2013|date=12 August 2004|publisher=Oxford University Press|isbn=978-0-19-974892-1}}</ref>{{rp|738}} [[Aulus Cornelius Celsus|Celsus]] ({{circa|25 BC}} – 50 AD) translated ''karkinos'' into [[Latin]] as ''cancer'', also meaning crab and recommended surgery as treatment.<ref name=Hist1/> [[Galen]] (2nd century AD) disagreed with the use of surgery and recommended [[purgatives]] instead.<ref name=Hist1/> These recommendations largely stood for 1000 years.<ref name=Hist1/>

      In the 15th, 16th and 17th centuries, it became acceptable for doctors to [[dissection|dissect bodies]] to discover the cause of death.<ref name=Hist2>{{cite journal |vauthors=Hajdu SI |s2cid=28148111 |title=A note from history: landmarks in history of cancer, part 2 |journal=Cancer |volume=117 |issue=12 |pages=2811–20 |date=June 2011 |pmid=21656759 |doi=10.1002/cncr.25825|doi-access=free }}</ref> The German professor [[Wilhelm Fabry]] believed that breast cancer was caused by a milk clot in a mammary duct. The Dutch professor [[Francois de la Boe Sylvius]], a follower of [[René Descartes|Descartes]], believed that all disease was the outcome of chemical processes and that acidic [[lymph]] fluid was the cause of cancer. His contemporary [[Nicolaes Tulp]] believed that cancer was a poison that slowly spreads and concluded that it was [[infectious disease|contagious]].<ref>{{cite book | vauthors = Yalom M |title=A history of the breast |year=1998 |publisher=Ballantine Books |location=New York |isbn=978-0-679-43459-7 |url={{google books |plainurl=y |id=FFX1U3KUjPsC}}|edition=1}}</ref>

      The physician John Hill described [[tobacco sniffing]] as the cause of nose cancer in 1761.<ref name=Hist2/> This was followed by the report in 1775 by British surgeon [[Percivall Pott]] that [[chimney sweeps' carcinoma]], a cancer of the [[scrotum]], was a common disease among [[chimney sweep]]s.<ref>{{cite journal |vauthors=Hajdu SI |title=A note from history: landmarks in history of cancer, part 3 |journal=Cancer |volume=118 |issue=4 |pages=1155–68 |date=February 2012 |pmid=21751192 |doi=10.1002/cncr.26320|s2cid=38892895 |doi-access=free }}</ref> With the widespread use of the microscope in the 18th century, it was discovered that the 'cancer poison' spread from the primary tumor through the lymph nodes to other sites ("[[metastasis]]"). This view of the disease was first formulated by the English surgeon [[Campbell De Morgan]] between 1871 and 1874.<ref>{{cite journal | vauthors = Grange JM, Stanford JL, Stanford CA | title = Campbell De Morgan's 'Observations on cancer', and their relevance today | journal = Journal of the Royal Society of Medicine | volume = 95 | issue = 6 | pages = 296–299 | date = June 2002 | pmid = 12042378 | pmc = 1279913 | doi = 10.1177/014107680209500609 }}</ref>

      == Society and culture ==
      Although many diseases (such as heart failure) may have a worse prognosis than most cases of cancer, cancer is the subject of widespread fear and taboos. The [[euphemism]] of "a long illness" to describe cancers leading to death is still commonly used in obituaries, rather than naming the disease explicitly, reflecting an apparent [[social stigma|stigma]].<ref>{{Cite news | vauthors = Barbara E |author-link=Barbara Ehrenreich |title=Welcome to Cancerland |newspaper=[[Harper's Magazine]] |date=November 2001 |issn=0017-789X |url=http://www.barbaraehrenreich.com/cancerland.htm |archive-url=https://web.archive.org/web/20131108181820/http://www.barbaraehrenreich.com/cancerland.htm |archive-date=8 November 2013}}</ref> Cancer is also euphemised as "the C-word";<ref>{{cite journal | vauthors = Pozorski A |s2cid=160969212 |title=Confronting the "C" Word: Cancer and Death in Philip Roth's Fiction |journal=Philip Roth Studies |date=20 March 2015 |volume=11 |issue=1 |pages=105–123 |doi=10.5703/philrothstud.11.1.105 |url=https://muse.jhu.edu/article/577333/pdf |access-date=13 April 2020 |language=en |issn=1940-5278|url-access=subscription }}</ref><ref>{{cite news | vauthors = Wollaston S |title=The C-Word review – a wonderful testament to a woman who faced cancer with honesty, verve and wit |url=https://www.theguardian.com/tv-and-radio/2015/may/04/the-c-word-review-sheridan-smith-cancer-wonderful-testament |access-date=13 April 2020 |work=The Guardian |date=4 May 2015}}</ref><ref>{{cite news |title=Avoiding the 'C' Word for Low-Risk Thyroid Cancer |url=https://www.medscape.com/viewarticle/901265 |access-date=13 April 2020 |work=Medscape}}</ref> [[Macmillan Cancer Support]] uses the term to try to lessen the fear around the disease.<ref>{{cite news |title=The C word: how we react to cancer today |url=https://www.networks.nhs.uk/news/the-c-word-how-we-react-to-cancer-today |website=NHS Networks |access-date=13 April 2020 |language=en-gb |archive-date=22 October 2020 |archive-url=https://web.archive.org/web/20201022210915/https://www.networks.nhs.uk/news/the-c-word-how-we-react-to-cancer-today }}</ref> In Nigeria, one local name for cancer translates into English as "the disease that cannot be cured".<ref name=":0">{{Cite book|url=https://books.google.com/books?id=Tmrp7dkvJk4C&pg=PA196|title=Handbook of Psychiatry in Palliative Medicine| vauthors = Chochinov HM, Breitbart W |date=2009|publisher=Oxford University Press|isbn=978-0-19-530107-6|page=196|language=en}}</ref> This deep belief that cancer is necessarily a difficult and usually deadly disease is reflected in the systems chosen by society to compile cancer statistics: the most common form of cancer—non-melanoma [[skin cancer]]s, accounting for about one-third of cancer cases worldwide, but very few deaths<ref name="Bolognia">{{cite book | vauthors = Rapini RP, Bolognia JL, Jorizzo JL |title=Dermatology: 2-Volume Set |publisher=Mosby |location=St. Louis |year=2007 |isbn=978-1-4160-2999-1 }}</ref><ref>{{cite web |title=Skin cancers |url=https://www.who.int/uv/faq/skincancer/en/index1.html |publisher=World Health Organization |access-date=19 January 2011 |url-status=live |archive-url=https://web.archive.org/web/20100927065836/http://www.who.int/uv/faq/skincancer/en/index1.html |archive-date=27 September 2010}}</ref>—are excluded from cancer statistics specifically because they are easily treated and almost always cured, often in a single, short, outpatient procedure.<ref>{{cite book | vauthors = McCulley M, Greenwell P |title=Molecular therapeutics: 21st-century medicine |publisher=J. Wiley |location=London |year=2007 |page=207 |url={{google books |plainurl=y |id=aG3SNAEACAAJ0470019166}} |isbn=978-0-470-01916-0 }}{{dead link|date=July 2023 |bot=InternetArchiveBot |fix-attempted=yes }}</ref>

      Western conceptions of [[patients' rights]] for people with cancer include a duty to fully disclose the medical situation to the person, and the right to engage in [[Shared decision-making in medicine|shared decision-making]] in a way that respects the person's own values. In other cultures, other rights and values are preferred. For example, most African cultures value whole families rather than [[individualism]]. In parts of Africa, a diagnosis is commonly made so late that cure is not possible, and treatment, if available at all, would quickly bankrupt the family. As a result of these factors, African healthcare providers tend to let family members decide whether, when and how to disclose the diagnosis, and they tend to do so slowly and circuitously, as the person shows interest and an ability to cope with the grim news.<ref name=":0"/> People from Asian and South American countries also tend to prefer a slower, less candid approach to disclosure than is idealized in the United States and Western Europe, and they believe that sometimes it would be preferable not to be told about a cancer diagnosis.<ref name=":0"/> In general, disclosure of the diagnosis is more common than it was in the 20th century, but full disclosure of the prognosis is not offered to many patients around the world.<ref name=":0"/>

      In the United States and some other [[Cultural differences in breast cancer diagnosis and treatment|cultures]], cancer is regarded as a disease that must be "fought" to end the "civil insurrection"; a [[war on cancer]] was declared in the US. Military metaphors are particularly common in descriptions of cancer's human effects, and they emphasize both the state of the patient's health and the need to take immediate, decisive actions himself rather than to delay, to ignore or to rely entirely on others. The military metaphors also help rationalize radical, destructive treatments.<ref name="Gwyn">{{cite book | vauthors = Low G, Cameron L |title=Researching and Applying Metaphor |chapter-url={{google books |plainurl=y |id=8aOxMvo_ag8C}}|year=1999|publisher=Cambridge University Press|isbn=978-0-521-64964-3| chapter=10}}</ref><ref>{{cite book | vauthors = Sulik GA |title=Pink Ribbon Blues: How Breast Cancer Culture Undermines Women's Health |url={{google books |plainurl=y |id=_it2CwAAQBAJ |page=78}}|year=2010|publisher=Oxford University Press|isbn=978-0-19-974993-5|pages=78–89}}</ref>
      In the 1970s, a relatively popular [[alternative cancer treatment]] in the US was a specialized form of [[talk therapy]], based on the idea that cancer was caused by a bad attitude.<ref name=Olson/> People with a "cancer personality"—depressed, repressed, self-loathing and afraid to express their emotions—were believed to have manifested cancer through subconscious desire. Some psychotherapists claimed that treatment to change the patient's outlook on life would cure the cancer.<ref name=Olson/> Among other effects, this belief allowed society to [[Victim blaming|blame the victim]] for having caused the cancer (by "wanting" it) or having prevented its cure (by not becoming a sufficiently happy, fearless and loving person).<ref name=Ehrenreich/> It also increased patients' anxiety, as they incorrectly believed that natural emotions of sadness, anger or fear shorten their lives.<ref name=Ehrenreich/> The idea was ridiculed by [[Susan Sontag]], who published ''[[Illness as Metaphor]]'' while recovering from treatment for breast cancer in 1978.<ref name=Olson>{{cite book | vauthors = Olson JS |title=Bathsheba's Breast: Women, Cancer, and History |url={{google books |plainurl=y |id=gp9aMBieClMC |page=145}}|year=2005|publisher=JHU Press|isbn=978-0-8018-8064-3| pages = 145–70 | oclc = 186453370 }}</ref> Although the original idea is now generally regarded as nonsense, the idea partly persists in a reduced form with a widespread, but incorrect, belief that deliberately cultivating a habit of [[Optimism|positive thinking]] will increase survival.<ref name=Ehrenreich>{{cite book | vauthors = Ehrenreich B |author-link=Barbara Ehrenreich |title=Bright-sided: How the Relentless Promotion of Positive Thinking Has Undermined America |url={{google books |plainurl=y |id=wxJlvB7bCO4C |page=15}}|year=2009|publisher=Henry Holt and Company|isbn=978-0-8050-8749-9| pages = 15–44 }}</ref> This notion is particularly strong in [[breast cancer culture]].<ref name=Ehrenreich />

      One idea about why people with cancer are blamed or stigmatized, called the [[just-world fallacy]], is that blaming cancer on the patient's actions or attitudes allows the blamers to regain a sense of control. This is based upon the blamers' belief that the world is fundamentally just and so any dangerous illness, like cancer, must be a type of punishment for bad choices, because in a just world, bad things would not happen to good people.<ref>{{Cite news |title=A Sick Stigma: Why are cancer patients blamed for their illness? |date=24 September 2013 |url=http://www.slate.com/articles/health_and_science/medical_examiner/2013/09/cancer_stigma_don_t_blame_patients_for_their_disease_no_matter_what_the.html |newspaper=Slate | vauthors = Huff C |url-status=live |archive-url=https://web.archive.org/web/20131011120507/http://www.slate.com/articles/health_and_science/medical_examiner/2013/09/cancer_stigma_don_t_blame_patients_for_their_disease_no_matter_what_the.html |archive-date=11 October 2013}}</ref>

      === Economic effect ===
      The total health care expenditure on cancer in the US was estimated to be $80.2&nbsp;billion in 2015.<ref>{{cite web |title=Economic Impact of Cancer |url=https://www.cancer.org/cancer/cancer-basics/economic-impact-of-cancer.html |website=American Cancer Society |date=3 January 2018 |access-date=5 July 2018}}</ref> Even though cancer-related health care expenditure have increased in absolute terms during recent decades, the share of health expenditure devoted to cancer treatment has remained close to 5% between the 1960s and 2004.<ref>{{cite journal |vauthors=Bosanquet N, Sikora K |title=The economics of cancer care in the UK |journal=Lancet Oncology |volume=5 |issue=9 |pages=568–74 |year=2004 |pmid=15337487 |doi=10.1016/S1470-2045(04)01569-4}}</ref><ref>{{cite journal |vauthors=Mariotto AB, Yabroff KR, Shao Y, Feuer EJ, Brown ML |title=Projections of the cost of cancer care in the United States: 2010–2020 |journal=Journal of the National Cancer Institute |volume=103 |issue=2 |pages=117–28 |year=2011 |pmid=21228314 |pmc=3107566 |doi=10.1093/jnci/djq495}}</ref> A similar pattern has been observed in Europe where about 6% of all health care expenditure are spent on cancer treatment.<ref>{{cite journal |vauthors=Jönsson B, Hofmarcher T, Lindgren P, Wilking N |title=The cost and burden of cancer in the European Union 1995–2014 |journal=European Journal of Cancer |volume=66 |issue=Oct |pages=162–70 |year=2016 |pmid=27589247 |doi=10.1016/j.ejca.2016.06.022}}</ref><ref name=EJC2018>{{cite journal |vauthors=Hofmarcher T, Lindgren P, Wilking N, Jönsson B |title=The cost of cancer in Europe 2018 |journal=European Journal of Cancer |volume=129 |issue=Apr |pages=41–49 |year=2020 |pmid=32120274 |doi=10.1016/j.ejca.2020.01.011|doi-access=free }}</ref> In addition to health care expenditure and [[financial toxicity]], cancer causes indirect costs in the form of productivity losses due to sick days, permanent incapacity and disability as well as premature death during working age. Cancer causes also costs for informal care. Indirect costs and informal care costs are typically estimated to exceed or equal the health care costs of cancer.<ref>{{cite journal |vauthors=Luengo-Fernandez R, Leal J, Gray A, Sullivan R |title=Economic burden of cancer across the European Union: a population-based cost analysis |journal=Lancet Oncology |volume=14 |issue=12 |pages=1165–74 |year=2013 |pmid=24131614 |doi=10.1016/S1470-2045(13)70442-X}}</ref><ref name=EJC2018 />

      === Effect on divorce ===

      A study found women were around six times more likely to be [[divorced]] soon after a diagnosis of cancer compared to men.<ref>{{cite journal | vauthors = Glantz MJ, Chamberlain MC, Liu Q, Hsieh CC, Edwards KR, Van Horn A, Recht L | title = Gender disparity in the rate of partner abandonment in patients with serious medical illness | journal = Cancer | volume = 115 | issue = 22 | pages = 5237–5242 | date = November 2009 | pmid = 19645027 | doi = 10.1002/cncr.24577 }}</ref> Rate of separation for cancer-survivors showed correlations with race, age, income, and [[comorbidity|comorbidities]] in a study.<ref>{{cite journal | vauthors = Stephens C, Westmaas JL, Kim J, Cannady R, Stein K | title = Gender differences in associations between cancer-related problems and relationship dissolution among cancer survivors | journal = Journal of Cancer Survivorship | volume = 10 | issue = 5 | pages = 865–873 | date = October 2016 | pmid = 26995006 | doi = 10.1007/s11764-016-0532-9 }}</ref> A review found a somewhat decreased divorce rate for most cancer types, and noted [[study heterogeneity]] and [[Methodology|methodological]] weaknesses for many studies on the effects of cancer on divorce.<ref>{{cite journal | vauthors = Fugmann D, Boeker M, Holsteg S, Steiner N, Prins J, Karger A | title = A Systematic Review: The Effect of Cancer on the Divorce Rate | journal = Frontiers in Psychology | volume = 13 | article-number = 828656 | date = 9 March 2022 | pmid = 35356338 | pmc = 8959852 | doi = 10.3389/fpsyg.2022.828656 | doi-access = free }}</ref>

      == Research ==
      {{Main|Cancer research}}

      [[File:UF CancerHospital.JPG|thumb|upright=1.35|[[University of Florida Cancer Hospital]]]]
      Because cancer is a class of diseases,<ref name=WhatIsCancerNCI>{{cite web |url=https://www.cancer.gov/about-cancer/understanding/what-is-cancer |title=What Is Cancer? |publisher=[[National Cancer Institute]] |access-date=28 March 2018|date=17 September 2007}}</ref><ref>{{cite web |url=http://www.atsdr.cdc.gov/COM/cancer-fs.html |title=Cancer Fact Sheet |publisher=Agency for Toxic Substances & Disease Registry |date=30 August 2002 |access-date=17 August 2009 |archive-url=https://web.archive.org/web/20090813142933/http://www.atsdr.cdc.gov/COM/cancer-fs.html |archive-date=13 August 2009}}</ref> it is unlikely that there will ever be a single "[[cure for cancer]]" any more than there will be a single treatment for all [[infectious disease]]s.<ref>{{cite web |url=http://www.livescience.com/health/060919_bad_cancer.html |title=Exciting New Cancer Treatments Emerge Amid Persistent Myths | vauthors = Wanjek C |website=[[Live Science]] |date=16 September 2006 |access-date=17 August 2009 |url-status=live |archive-url=https://web.archive.org/web/20080516080512/http://www.livescience.com/health/060919_bad_cancer.html |archive-date=16 May 2008}}</ref> [[Angiogenesis inhibitor]]s were once incorrectly thought to have potential as a "[[silver bullet]]" treatment applicable to many types of cancer.<ref>{{cite journal |vauthors=Hayden EC |title=Cutting off cancer's supply lines |journal=Nature |volume=458 |issue=7239 |pages=686–87 |date=April 2009 |pmid=19360048 |doi=10.1038/458686b|doi-access=free }}</ref> Angiogenesis inhibitors and other cancer therapeutics are used in combination to reduce cancer morbidity and mortality.<ref>{{cite journal |vauthors=Bagri A, Kouros-Mehr H, Leong KG, Plowman GD |title=Use of anti-VEGF adjuvant therapy in cancer: challenges and rationale |journal=Trends in Molecular Medicine |volume=16 |issue=3 |pages=122–32 |date=March 2010 |pmid=20189876 |doi=10.1016/j.molmed.2010.01.004}}</ref>

      [[Experimental cancer treatment]]s are studied in [[clinical trial]]s to compare the proposed treatment to the best existing treatment. Treatments that succeeded in one cancer type can be tested against other types.<ref>{{cite journal |vauthors=Sleigh SH, Barton CL |s2cid=25267555 |title=Repurposing Strategies for Therapeutics |journal=Pharmaceutical Medicine|volume=24 |issue=3 |pages=151–59 |year=2010 |doi=10.1007/BF03256811 }}</ref> Diagnostic tests are under development to better target the right therapies to the right patients, based on their individual biology.<ref>{{cite journal |vauthors=Winther H, Jorgensen JT |s2cid=43505621 |title=Drug-Diagnostic Co-Development in Cancer |journal=Pharmaceutical Medicine |volume=24 |issue=6 |pages=363–75 |year=2010 |doi=10.1007/BF03256837 }}</ref>

      Cancer research focuses on the following issues:
      * Agents (e.g. viruses) and events (e.g. mutations) that cause or facilitate genetic changes in cells destined to become cancer.
      * The precise nature of the genetic damage and the genes that are affected by it.
      * The consequences of those genetic changes on the biology of the cell, both in generating the defining properties of a cancer cell and in facilitating additional genetic events that lead to further progression of the cancer.

      The improved understanding of [[molecular biology]] and [[cell biology|cellular biology]] due to cancer research has led to new treatments for cancer since US President [[Richard Nixon]] declared the "[[war on cancer]]" in 1971. Since then, the country has spent over $200&nbsp;billion on cancer research, including resources from public and private sectors.<ref>{{cite web | vauthors = Begley S |url=http://www.newsweek.com/id/157548/page/2 |title=Rethinking the War on Cancer |date=16 September 2008 |website=Newsweek |access-date=8 September 2008 |archive-url=https://web.archive.org/web/20080910012446/http://www.newsweek.com/id/157548/page/2 |archive-date=10 September 2008}}</ref> The cancer death rate (adjusting for size and age of the population) declined by five percent between 1950 and 2005.<ref name="24cancer">{{cite news |url=https://www.nytimes.com/2009/04/24/health/policy/24cancer.html |url-access=subscription |title=Advances Elusive in the Drive to Cure Cancer | vauthors = Kolata G |date=23 April 2009 |work=[[The New York Times]] |access-date=5 May 2009 |url-status=live |archive-url=https://web.archive.org/web/20120114120509/http://www.nytimes.com/2009/04/24/health/policy/24cancer.html |archive-date=14 January 2012}}</ref>
       
      Competition for financial resources appears to have suppressed the creativity, cooperation, risk-taking and original thinking required to make fundamental discoveries, unduly favoring low-risk research into small incremental advancements over riskier, more innovative research. Other consequences of competition appear to be many studies with dramatic claims whose results cannot be replicated and perverse incentives that encourage grantee institutions to grow without making sufficient investments in their own faculty and facilities.<ref>{{cite journal | vauthors = Alberts B, Kirschner MW, Tilghman S | author-link1 = Bruce Alberts | author-link4 = Harold Varmus |year=2014 |title=Rescuing US biomedical research from its systemic flaws |bibcode-access=free |journal=Proceedings of the National Academy of Sciences of the United States of America |volume=111 |issue=16 |pages=5773–77 |doi=10.1073/pnas.1404402111 |pmid=24733905 |pmc=4000813|bibcode=2014PNAS..111.5773A |doi-access=free }}</ref><ref name=24cancer/><ref>{{cite news |url=https://www.nytimes.com/2009/06/28/health/research/28cancer.html |url-access=subscription |title=Grant System Leads Cancer Researchers to Play It Safe | vauthors = Kolata G |date=27 June 2009 |work=The New York Times |access-date=29 December 2009 |url-status=live |archive-url=https://web.archive.org/web/20110608133344/http://www.nytimes.com/2009/06/28/health/research/28cancer.html |archive-date=8 June 2011}}</ref><ref>{{cite journal | vauthors = Powell K |s2cid=4465686 |year=2016 |title=Young, talented and fed-up: scientists tell their stories |journal=Nature |volume=538 |issue= 7626|pages=446–49 |doi=10.1038/538446a |pmid=27786221|bibcode=2016Natur.538..446P |doi-access=free }}</ref>

      [[Virotherapy]], which uses convert viruses, is being studied.{{Citation needed|date=January 2025}}

      In the wake of the [[COVID-19 pandemic]], there has been a worry that cancer research and treatment are slowing down.<ref>{{Cite web|url=https://www.nbcnews.com/think/opinion/covid-s-impact-cancer-care-turning-oncologists-worst-fears-reality-ncna1257743|title = Opinion &#124; I'm an oncologist. My worst fears about Covid and cancer are coming true|website = [[NBC News]]| date=12 February 2021 }}</ref><ref>{{Cite web|url=https://www.nydailynews.com/opinion/ny-oped-dont-sacrifice-cancer-care-to-covid-20210113-nesit6kuunfenpjcl2lpo2ftny-story.html|title=Don't sacrifice cancer care to COVID|website=[[New York Daily News]]|date=13 January 2021 }}</ref>

      == Pregnancy ==
      Cancer affects approximately 1 in 1,000 pregnant women. The most common cancers found during pregnancy are the same as the most common cancers found in non-pregnant women during childbearing ages: breast cancer, cervical cancer, leukemia, lymphoma, melanoma, ovarian cancer and colorectal cancer.<ref name=yarbro/>

      Diagnosing a new cancer in a pregnant woman is difficult, in part because any symptoms are commonly assumed to be a normal discomfort associated with pregnancy. As a result, cancer is typically discovered at a somewhat later stage than average. Some imaging procedures, such as [[Magnetic resonance imaging|MRIs]] (magnetic resonance imaging), [[CT scan]]s, ultrasounds and [[mammography|mammograms]] with fetal shielding are considered safe during pregnancy; some others, such as [[Positron emission tomography|PET scans]], are not.<ref name=yarbro/>

      Treatment is generally the same as for non-pregnant women. However, radiation and radioactive drugs are normally avoided during pregnancy, especially if the fetal dose might exceed 100 cGy. In some cases, some or all treatments are postponed until after birth if the cancer is diagnosed late in the pregnancy. Early deliveries are often used to advance the start of treatment. Surgery is generally safe, but pelvic surgeries during the first trimester may cause miscarriage. Some treatments, especially certain chemotherapy drugs given during the [[first trimester]], increase the risk of [[birth defect]]s and pregnancy loss (spontaneous abortions and stillbirths).<ref name=yarbro/>

      Elective abortions are not required and, for the most common forms and stages of cancer, do not improve the mother's survival. In a few instances, such as advanced uterine cancer, the pregnancy cannot be continued and in others, the patient may end the pregnancy so that she can begin aggressive chemotherapy.<ref name=yarbro/>

      Some treatments can interfere with the mother's ability to give birth vaginally or to breastfeed.<ref name=yarbro/> Cervical cancer may require birth by [[Caesarean section]]. Radiation to the breast reduces the ability of that breast to produce milk and increases the risk of [[mastitis]]. Also, when chemotherapy is given after birth, many of the drugs appear in breast milk, which could harm the baby.<ref name=yarbro>{{cite book | vauthors = Yarbro CH, Wujcik D, Gobel BH |title=Cancer Nursing: Principles and Practice |url={{google books |plainurl=y |id=LJVTQs4QjJ0C |page=901}}|year=2010|publisher=Jones & Bartlett Learning|isbn=978-0-7637-6357-2|pages = 901–905}}</ref>

      == Other animals ==
      [[Veterinary oncology]], concentrating mainly on cats and dogs, is a growing specialty in wealthy countries and the major forms of human treatment such as surgery and radiotherapy may be offered. The most common types of cancer differ, but the cancer burden seems at least as high in pets as in humans. Animals, typically rodents, are often used in cancer research and studies of natural cancers in larger animals may benefit research into human cancer.<ref>{{cite journal | vauthors = Thamm D |title=How companion animals contribute to the fight against cancer in humans |journal=Veterinaria Italiana |date=March 2009 |volume=54 |issue=1 |pages=111–20 |pmid=20391394 |url=http://www.izs.it/vet_italiana/2009/45_1/111.pdf |access-date=18 July 2014 |url-status=live |archive-url=https://web.archive.org/web/20140723044907/http://www.izs.it/vet_italiana/2009/45_1/111.pdf |archive-date=23 July 2014}}</ref>

      Across wild animals, there is still limited data on cancer. Nonetheless, a study published in 2022, explored cancer risk in (non-domesticated) zoo mammals, belonging to 191 species, 110,148 individual, demonstrated that cancer is a ubiquitous disease of mammals and it can emerge anywhere along the mammalian phylogeny.<ref>{{cite journal | vauthors = Vincze O, Colchero F, Lemaître JF, Conde DA, Pavard S, Bieuville M, Urrutia AO, Ujvari B, Boddy AM, Maley CC, Thomas F, Giraudeau M | title = Cancer risk across mammals | journal = Nature | volume = 601 | issue = 7892 | pages = 263–267 | date = January 2022 | pmid = 34937938 | pmc = 8755536 | doi = 10.1038/s41586-021-04224-5 | s2cid = 245425871 | bibcode = 2022Natur.601..263V }}</ref> This research also highlighted that cancer risk is not uniformly distributed along mammals. For instance, species in the order [[Carnivora]] are particularly prone to be affected by cancer (e.g. over 25% of [[clouded leopard]]s, [[bat-eared fox]]es and [[red wolves]] die of cancer), while [[ungulate]]s (especially [[even-toed ungulate]]s) appear to face consistently low cancer risks.{{Citation needed|date=January 2025}}

      In non-humans, a few types of [[transmissible cancer]] have also been described, wherein the cancer spreads between animals by transmission of the tumor cells themselves. This phenomenon is seen in dogs with [[Sticker's sarcoma]] (also known as canine transmissible venereal tumor), and in [[Tasmanian devils]] with [[devil facial tumour disease]] (DFTD).<ref name="pmid16901782">{{cite journal |vauthors=Murgia C, Pritchard JK, Kim SY, Fassati A, Weiss RA |title=Clonal origin and evolution of a transmissible cancer |journal=Cell |volume=126 |issue=3 |pages=477–87 |date=August 2006 |pmid=16901782 |pmc=2593932 |doi=10.1016/j.cell.2006.05.051 |bibcode=2006Cell..126..477M }}</ref>

