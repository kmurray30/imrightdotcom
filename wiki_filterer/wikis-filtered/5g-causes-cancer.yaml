      {{short description|American biochemist}}
      {{notability|Academics|date=August 2020}}

      '''Martin L. Pall''' is [[professor emeritus]] of [[biochemistry]] and basic medical sciences at [[Washington State University]]. He is a specialist in [[Chronic Fatigue Syndrome]], [[multiple chemical sensitivity]], and the effects of low-intensity [[microwave]] frequency electromagnetic fields (MWV-EMF) on the human body. He believes that the expansion of [[5G]] mobile phone networks and the use of [[Wireless device radiation and health|wireless technology has negative consequences for human health]].

      ==Early life==
      Pall has a BA in physics and earned his PhD in biochemistry and genetics from [[Caltech]].<ref name=hibr/>

      ==Career==
      Pall was professor of biochemistry and basic medical sciences at Washington State University (WSU). During his tenure, he researched and published numerous articles on [[Chronic Fatigue Syndrome]]. In 2008, he retired from his teaching position to concentrate his time researching the effect multiple chemical sensitivity and low intensity microwave frequency electromagnetic fields (MWV-EMF) have on the human body.<ref name=hibr>{{cite web |title=Martin Pall |website=HiBR |date=23 April 2018 |url=https://hibr.nih.gov/member/martin-pall |access-date=3 August 2020 |archive-url=https://web.archive.org/web/20200929062058/https://hibr.nih.gov/member/martin-pall |archive-date=29 September 2020 |url-status=dead}}</ref>

      He has been a critic of the expansion of 5G mobile phone networks and the use of wireless technology generally, believing the technology has negative consequences for human health.<ref>{{cite web | last=Cellan-Jones | first=Rory | title=Conspiracy theorists 'hijacked' 5G report | website=BBC News | date=16 May 2020 | url=https://www.bbc.com/news/technology-52674949 | access-date=3 August 2020}}</ref><ref>{{cite magazine | title=Is 5G Going to Kill Us All? | magazine=The New Republic | date=8 May 2020 | url=https://newrepublic.com/article/157603/5g-going-kill-us-all | access-date=3 August 2020}}</ref><ref>{{cite web |last=Attkisson |first=Sharyl |title=5G technology promises to be faster; Could it come with health risks |website=WCIV |date=15 September 2019 |url=https://abcnews4.com/news/nation-world/5g-technology-promises-to-be-faster-could-it-come-with-health-risks |access-date=3 August 2020 |archive-url=https://web.archive.org/web/20220102002339/https://abcnews4.com/news/nation-world/5g-technology-promises-to-be-faster-could-it-come-with-health-risks |archive-date=2 January 2022 |url-status=dead}}</ref> In 2019, Kenneth R. Foster of ''[[Scientific American]]'' described him as "the most visible scientist in the public arena on this issue",<ref>{{cite web | title=5G Is Coming: How Worried Should We Be about the Health Risks? So far, at least there's little evidence of danger | website=Scientific American | date=16 Sep 2019|first =Kenneth |last=Foster | url=https://blogs.scientificamerican.com/observations/5g-is-coming-how-worried-should-we-be-about-the-health-risks | access-date=14 December 2021}}</ref> while ''[[The Guardian]]'' described his research interests as "practically an encyclopaedia of the medical [[counterculture]]".<ref>{{cite web | title=How baseless fears over 5G rollout created a health scare | website=the Guardian | date=26 July 2019|first =Alex |last=Hern | url=http://www.theguardian.com/technology/2019/jul/26/how-baseless-fears-over-5g-rollout-created-a-health-scare | access-date=3 August 2020}}</ref>

      Professor [[Kenneth Foster (bioengineer)|Kenneth Foster]], a bioengineer at the [[University of Pennsylvania]] has criticised Pall's ideas as using selective evidence that ignores research that finds no link between mobile phone technology and human health.<ref>{{cite web | last=Reardon | first=Marguerite | title=Is 5G hazardous to your health? | website=CNET | date=30 July 2020 | url=https://www.cnet.com/news/is-5g-making-you-sick-probably-not/ | access-date=3 August 2020}}</ref>

