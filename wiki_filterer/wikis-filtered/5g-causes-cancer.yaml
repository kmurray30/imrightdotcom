  - title: 5G NR
    pageid: 59764200
    extract: |-
      5G NR (5G New Radio) is a radio access technology (RAT) developed by the 3rd Generation Partnership Project (3GPP) for the 5G (fifth generation) mobile network. It was designed to be the global standard for the air interface of 5G networks. It is based on orthogonal frequency-division multiplexing (OFDM), as is the 4G (fourth generation) long-term evolution (LTE) standard.
      The 3GPP specification 38 series provides the technical details behind 5G NR, the successor of LTE. 
      The study of 5G NR within 3GPP started in 2015, and the first specification was made available by the end of 2017. While the 3GPP standardization process was ongoing, the industry had already begun efforts to implement infrastructure compliant with the draft standard, with the first large-scale commercial launch of 5G NR having occurred in the end of 2018. Since 2019, many operators have deployed 5G NR networks and handset manufacturers have developed 5G NR enabled handsets.
    source: |-
      {{Short description|Radio access technology for 5G networks}}

      '''5G NR''' ('''5G''' '''New Radio''')<ref name=":1" /> is a [[radio access technology]] (RAT) developed by the 3rd Generation Partnership Project ([[3GPP]]) for the [[5G]] (fifth generation) mobile network.<ref name=":1">{{cite web|url=https://5g.co.uk/guides/what-is-5g-new-radio/|title=What is 5G New Radio (5G ,)|website=5g.co.uk}}</ref> It was designed to be the global standard for the [[air interface]] of 5G networks.<ref>{{cite web|url=https://comsoc.org/webinars/making-5g-new-radio-nr-reality-%E2%80%93-global-5g-standard|title=Making 5G New Radio (NR) a Reality – The Global 5G Standard - IEEE Communications Society|website=comsoc.org}}</ref> It is based on [[orthogonal frequency-division multiplexing]] (OFDM), as is the [[4G]] (fourth generation) long-term evolution ([[LTE (telecommunication)|LTE]]) standard.

      The 3GPP specification 38 series<ref>{{Cite web|url=http://www.3gpp.org/ftp/Specs/html-info/38-series.htm|title=3GPP specification series: 38series|website=www.3gpp.org|language=en-gb|access-date=2018-10-31}}</ref> provides the technical details behind 5G NR, the successor of LTE. 

      The study of 5G NR within 3GPP started in 2015, and the first specification was made available by the end of 2017. While the 3GPP standardization process was ongoing, the industry had already begun efforts to implement infrastructure compliant with the draft standard, with the first large-scale commercial launch of 5G NR having occurred in the end of 2018. Since 2019, many operators have deployed 5G NR networks and handset manufacturers have developed 5G NR enabled handsets.<ref name=":2">{{Cite web |title=The Mixed Picture for 5G in Europe |url=https://www.gsma.com/get-involved/gsma-membership/gsma_resources/the-mixed-picture-for-5g-in-europe/ |access-date=2023-12-07 |website=Membership |language=en-US}}</ref>
      [[File:VoNR and 5G on OneUI 6.0.jpg|100px|thumbnail|right|5G NR signal indicator on Samsung Galaxy&nbsp;smartphones]]

      == Frequency bands ==
      [[File:CableFree LTE Remote Radio Head (RRH).jpg|thumb|right|CableFree 5G Radio ([[remote radio unit|RRH]]) with 2x2 MIMO, 2x20W RF power and CPRI fibre interface, can be connected to a 5G gNodeB or gNB which can have the form of an x86 server<ref>{{cite book | url=https://books.google.com/books?id=9SjoDwAAQBAJ&dq=x86+5g+gnodeb&pg=PA309 | title=Human Centred Intelligent Systems: Proceedings of KES-HCIS 2020 Conference | isbn=978-981-15-5784-2 | last1=Zimmermann | first1=Alfred | last2=Howlett | first2=Robert J. | last3=Jain | first3=Lakhmi C. | date=29 May 2020 | publisher=Springer }}</ref>]]

      {{main|5G NR frequency bands}}

      5G NR uses frequency bands in two broad frequency ranges:

      # Frequency Range 1 (FR1), for bands within {{formatnum:410}}&nbsp;MHz – {{formatnum:7125}}&nbsp;MHz
      # Frequency Range 2 (FR2), for bands within {{formatnum:24250}}&nbsp;MHz – {{formatnum:71000}}&nbsp;MHz

      == gNodeB ==
      '''gNodeB''' or '''gNb''' (Next Generation [[Node B]]) means a 5G [[base station]]. It transmits radio data to and receives radio data from user equipment. Its coverage area is called a cell. The gNodeB may be a tower. 

      A "Non-Standalone" (NSA) gNodeB is built on an existing LTE (4G) base station (eNodeB or eNB).

      == Network deployments ==
      {{main|List of 5G NR networks}}

      [[Ooredoo]] was the first carrier to launch a commercial 5G NR network, in May 2018 in [[Qatar]].  Other carriers around the world have been following suit.

      == Development ==
      In 2018, [[3GPP]] published [[3GPP#Standards|Release 15]], which includes what is described as "Phase 1" standardization for 5G NR. The timeline for Release 16, which will be "5G phase 2", follows a freeze date of March 2020 and a completion date of June 2020,<ref>{{Cite web|title=Release 16|url=https://www.3gpp.org/release-16|access-date=2020-01-06|website=3GPP}}</ref> Release 17 was originally scheduled for delivery in September 2021.<ref>{{Cite web|title=Release 17|url=https://www.3gpp.org/release-17|access-date=2020-01-06|website=3GPP}}</ref> but, because of the [[COVID-19 pandemic]], it was rescheduled for June 2022.<ref>{{cite web |title=Release 17 timeline agreed |url=https://www.3gpp.org/news-events/2145-rel-17_newtimeline |website=3GPP}}</ref>

      Release 18 work has started in 3GPP. Rel.18 is referred to as "NR Advanced" signifying another milestone in wireless communication systems. NR Advanced will include features such as eXtended Reality (XR), AI/ML studies, and Mobility enhancements. Mobility is in the core of 3GPP technology and has so far been handled on Layer 3 (RRC), now, in Rel-18 the work on mobility is to introduce lower layer triggered mobility.

      === Release 18 (5G-Advanced) ===
      In 2024, 3GPP finalized Release 18, officially marking the transition to [[5G-Advanced]]. This release introduced the integration of [[artificial intelligence]] and [[machine learning]] (AI/ML) within the [[Radio Access Network]] (RAN) to optimize beam management and network energy savings. It also expanded the capabilities of "Reduced Capability" (RedCap) devices, improved positioning accuracy for industrial IoT, and enhanced support for non-terrestrial networks (NTN), allowing for better integration with satellite-to-phone services.<ref name="webDahlman">{{cite web |last1=Dahlman |first1=Erik |title=5G-Advanced: The bridge to 6G |url=https://www.ericsson.com/en/reports-and-papers/white-papers/5g-advanced-the-bridge-to-6g |publisher=Ericsson |access-date=December 28, 2025 |date=March 18, 2024}}</ref>

      ==Deployment modes==
      Initial 5G NR launches will depend on existing LTE infrastructure in non-standalone (NSA) mode, before maturation of the standalone (SA) mode with the 5G core network.  Additionally, the spectrum can be dynamically shared between LTE and 5G NR.
      <!-- Commented out because image was deleted: [[File:OAI 5G stack.png]] -->

      === Dynamic spectrum sharing ===
      To make better use of existing assets, carriers may opt to dynamically share it between LTE and 5G NR.  The spectrum is multiplexed over time between both generations of mobile networks depending on user demand, while still using the LTE network for control functions. Dynamic spectrum sharing (DSS) may be deployed on existing LTE equipment as long as it is compatible with 5G NR. Only the 5G NR terminal needs to be compatible with DSS.<ref>{{Cite web|url=https://www.ericsson.com/en/networks/offerings/5g/sharing-spectrum-with-ericsson-spectrum-sharing|title=Spectrum sharing for fast & smooth 5G deployment|website=Ericsson|date=18 March 2019 |access-date=2020-04-22}}</ref>

      ===Non-standalone mode===
      The non-standalone (NSA) mode of 5G NR refers to an option of 5G NR deployment that depends on the control plane of an existing LTE network for control functions, while 5G NR is exclusively focused on the user plane.<ref name=SANSA>{{cite web|url=http://rfwireless-world.com/Terminology/5G-NR-deployment-scenarios-or-modes.html|title=5G NR Deployment Scenarios or modes-NSA, SA, Homogeneous, Heterogeneous|website=rfwireless-world.com}}</ref><ref>{{cite web|author=Junko Yoshida |url=https://eetimes.com/author.asp?section_id=36&doc_id=1331434 |title=What's Behind 'Non-Standalone' 5G? | date=3 March 2017 |publisher=Eetimes.com |access-date=2018-11-13}}</ref><ref>{{Cite web |date=2024-05-28 |title=5G NSA Introduces the Future of IoT Connectivity |url=https://iot.telenor.com/technologies/connectivity/5g-nsa/ |access-date=2025-09-19 |website=Telenor IoT |language=en-US}}</ref> This is reported to speed up 5G adoption, however some operators and vendors have criticized prioritizing the introduction of 5G NR NSA on the grounds that it could hinder the implementation of the standalone mode of the network.<ref name=":0">{{Cite web|url=https://res-www.zte.com.cn/mediares/zte/Files/PDF/white_book/5g-best-choice-architecture.pdf|title=5G best choice architecture|last=Teral|first=Stephane|date=2019-01-30|website=ZTE|access-date=2019-02-01|archive-url=https://web.archive.org/web/20190202042405/https://res-www.zte.com.cn/mediares/zte/Files/PDF/white_book/5g-best-choice-architecture.pdf|archive-date=2 February 2019}}</ref><ref>{{cite web|url=https://lightreading.com/mobile/5g/3gpp-approves-plans-to-fast-track-5g-nr/d/d-id/731018|title=3GPP Approves Plans to Fast Track 5G NR - Light Reading}}</ref> It uses the same core network as a 4G network, but with upgraded radio equipment.<ref name=rcr>{{Cite web |last= |first= |date=2021-09-07 |title=Standalone 5G vs. Non-Standalone 5G |url=https://www.rcrwireless.com/20210907/5g/standalone-5g-vs-non-standalone-5g |access-date=2024-04-04 |website=RCR Wireless News}}</ref><ref>{{Cite web |last= |first= |date=2023-04-04 |title=5G Standalone vs. 5G Non-standalone: What's in it for operators? |url=https://www.rcrwireless.com/20230404/5g/5g-standalone-vs-5g-non-standalone-whats-in-it-for-operators |access-date=2024-04-04 |website=RCR Wireless News |language=en-US}}</ref>

      ===Standalone mode===
      The standalone (SA) mode of 5G NR refers to using 5G cells for both signalling and information transfer,<ref name=SANSA /> essentially a 5G network without any legacy 4G infrastructure.<ref name=rogerson>{{cite web|last=Rogerson|first=James|title=Voice over 5G Standalone (VoNR) - What is it and how to get it|website=5G.co.uk|date=9 July 2025|url=https://5g.co.uk/guides/voice-over-5g-standalone/}}</ref> It includes the new [[5G Packet Core]] architecture instead of relying on the 4G [[Evolved Packet Core]],<ref>{{cite web|url=https://lightreading.com/mobile/5g/standalone-or-non-standalone-5g-trials-will-help-orange-decide/d/d-id/744057|title=Standalone or Non-Standalone? 5G Trials Will Help Orange Decide - Light Reading}}</ref><ref>{{cite web|url=https://cisco.com/c/en/us/td/docs/wireless/asr_5000/21-5_N5-8/5G-NSA/21-5-5G-NSA-Solution-Guide/21-5-5G-NSA-Solutions-Guide_chapter_01.pdf|title=5G Non Standalone Solution Overview|access-date=2019-02-03|archive-date=2020-09-15|archive-url=https://web.archive.org/web/20200915130454/https://www.cisco.com/c/en/us/td/docs/wireless/asr_5000/21-5_N5-8/5G-NSA/21-5-5G-NSA-Solution-Guide/21-5-5G-NSA-Solutions-Guide_chapter_01.pdf|url-status=dead}}</ref> to allow the deployment of 5G without the LTE network.<ref>{{cite web|url=https://lightreading.com/mobile/5g/defining-ng-core-for-5g-networks/a/d-id/730633|title=Defining NG Core for 5G Networks - Light Reading}}</ref> It is expected to have lower cost, better efficiency, and to assist development of new use cases.<ref name=":0" /><ref>{{cite web|url=https://www.mediatek.com/blog/5g-what-is-standalone-sa-vs-non-standalone-nsa|title=5G: What is Standalone (SA) vs Non-Standalone (NSA) Networks?|date=12 November 2018|website=MediaTek|archive-url=https://web.archive.org/web/20241010135337/https://www.mediatek.com/blog/5g-what-is-standalone-sa-vs-non-standalone-nsa|archive-date=10 October 2024}}</ref> However, initial deployment might see slower speed than existing network due to the allocation of spectrum.<ref>[https://xtech.nikkei.com/atcl/nxt/column/18/01273/00025/ 真の5G「SA方式」の不都合な真実、当初遅くなるのはドコモだけ？]</ref> It uses a new core network dedicated to 5G.<ref name=rcr/>

      == Numerology (sub-carrier spacing) ==
      {{update section|date=June 2024}}
      5G NR supports seven subcarrier spacings:

      {| class="sortable wikitable"
      ! data-sort-type="number" | Sub-Carrier Spacing <small>(kHz)</small>
      ! data-sort-type="number" | <abbr title="The duration of a timeslice allocated to a certain endpoint">Slot duration <small>(ms)</small></abbr>
      ! class="unsortable" | Frequency Bands
      ! class="unsortable" | Notes
      |-
      | 15
      | 1
      | FR1
      | Same as LTE
      |-
      | 30
      | 0.5
      | FR1
      | 
      |-
      | 60
      | 0.25
      | FR1 and FR2
      | Both normal [[cyclic prefix]] (CP) and extended CP may be used with 60&nbsp;kHz subcarrier spacing
      |-
      | 120
      | 0.125
      | FR2
      | 
      |-
      | 240
      | 0.0625
      | FR2
      | This is only possible for search and measurement purposes, using the Synchronization Signal Block (SSB)
      |-
      | 480
      | 0.03125
      | FR2
      |
      |-
      | 960
      | 0.01565
      | FR2
      |
      |}

      The length of the [[cyclic prefix]] is inversely proportional to the [[subcarrier spacing]]. It is 4.7&nbsp;μs with 15&nbsp;kHz, and 4.7 / 16 = 0.29&nbsp;μs for 240&nbsp;kHz subcarrier spacing. Additionally, higher subcarrier spacings allow for reduced latency and increased support for high-frequency bands, essential for the ultra-reliable low-latency communications (URLLC) and enhanced mobile broadband (eMBB) applications in 5G.

      == NR-Light / RedCap {{anchor|NR-Light|RedCap}} ==

      In 5G NR Release 17, the 3GPP introduced '''NR-Light''', formally known as '''Reduced Capability (RedCap)''' devices. RedCap is designed to bridge the capability gap between high-performance 5G NR and low-power [[NB-IoT]] or [[LTE-M]] technologies.<ref>{{cite web |last1=Lin |first1=Xingqin |title=5G NR Release 17 RedCap |url=https://ieeexplore.ieee.org/document/9615286 |website=IEEE Communications Magazine |publisher=IEEE |access-date=December 28, 2025 |date=2021}}</ref> It provides a cost-effective, power-efficient solution for devices that do not require the full multi-gigabit throughput of standard 5G but need better performance than legacy IoT standards.

      NR-Light targets mid-tier performance categories, ideal for applications such as:
      * '''Wearables:''' Including smartwatches and medical monitoring devices that require consistent connectivity but have limited battery capacity.<ref>{{cite web |title=RedCap: Expanding the 5G ecosystem for new devices |url=https://www.qualcomm.com/news/onq/2022/06/5g-release-17-redcap-expanding-the-5g-ecosystem-to-new-devices |publisher=Qualcomm |access-date=December 28, 2025 |date=June 2022}}</ref>
      * '''Industrial Sensors:''' Enabling [[Industry 4.0]] through wireless pressure sensors, actuators, and surveillance cameras in smart factories.
      * '''Smart Home & Cities:''' Efficient connectivity for smart appliances and environmental sensors.

      Key technical features introduced in Release 17 and further enhanced in [[5G-Advanced]] (Release 18) include:
      * '''Reduced Bandwidth:''' Supports narrower maximum bandwidths of 20 MHz in sub-7 GHz (FR1) and 100 MHz in millimeter wave (FR2), lowering hardware complexity.<ref>{{cite web |title=5G RedCap: A New Type of 5G Device |url=https://www.nokia.com/blog/5g-redcap-a-new-type-of-5g-device/ |publisher=Nokia |access-date=December 28, 2025 |date=2023}}</ref>
      * '''Simplified Antenna Configurations:''' Reduces the mandatory number of receive branches to one or two (1Rx or 2Rx), significantly lowering the device footprint and cost.
      * '''Enhanced Power Saving:''' Utilizes extended Discontinuous Reception (eDRX) and relaxed radio resource management (RRM) to maximize battery life, enabling sensors to operate for years without maintenance.
      * '''Coexistence:''' RedCap devices operate on the same 5G carriers as standard NR devices, ensuring they benefit from existing network coverage and low latency.

      Release 18 (5G-Advanced) introduced "enhanced RedCap" (eRedCap), which further lowers the data rate and complexity requirements to specifically target the "high-end" LPWA market, providing a seamless migration path from [[LTE Cat-1]] to 5G.<ref name="webDahlman" />
