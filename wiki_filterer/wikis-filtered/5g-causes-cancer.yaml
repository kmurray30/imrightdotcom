       | isbn   = 978-8120349353
       }}</ref>{{rp|p=3}} or between 1 and 3000&nbsp;GHz (30&nbsp;cm and 0.1&nbsp;mm).<ref name="IEV-i391">{{cite web | title=Details for IEV number 713-06-03: "microwave" | website=International Electrotechnical Vocabulary | url=https://www.electropedia.org/iev/iev.nsf/display?openform&ievref=713-06-03 | language=ja | access-date=2024-03-27}}</ref><ref name="IEV-o981">{{cite web | title=Details for IEV number 701-02-12: "radio wave" | website=International Electrotechnical Vocabulary | url=https://www.electropedia.org/iev/iev.nsf/display?openform&ievref=701-02-12 | language=ja | access-date=2024-03-27}}</ref>  In all cases, microwaves include the entire [[super high frequency]] (SHF) band (3 to 30&nbsp;GHz, or 10 to 1&nbsp;cm) at minimum. The boundaries between [[far infrared]], [[terahertz radiation]], microwaves, and [[ultra-high-frequency]] (UHF) are fairly arbitrary and differ between different fields of study.<ref name="Kumar" />{{rp|p=3}}

      The [[prefix]] ''{{linktext|micro-}}'' in ''microwave'' indicates that microwaves are small (having shorter wavelengths), compared to the [[radio wave]]s used in prior [[radio technology]].  Frequencies in the microwave range are often referred to by their [[Radio band#IEEE|IEEE radar band]] designations: [[S band|S]], [[C band (IEEE)|C]], [[X band|X]], [[Ku band|K<sub>u</sub>]], [[K band (IEEE)|K]], or [[Ka band|K<sub>a</sub> band]], or by similar NATO or EU designations.

      Microwaves travel by [[line-of-sight propagation|line-of-sight]]; unlike lower frequency [[radio waves]], they do not diffract around hills, follow the Earth's surface as [[ground wave]]s, or reflect from the [[ionosphere]], so terrestrial microwave communication links are limited by the visual horizon to about {{convert|40|mi|km}}. At the high end of the band, they are absorbed by gases in the atmosphere, limiting practical communication distances to around a kilometer.

      Microwaves are widely used in modern technology, for example in [[point-to-point (telecommunications)|point-to-point]] communication links, [[wireless network]]s, [[microwave radio relay]] networks, [[radar]], [[satellite communication|satellite and spacecraft communication]], medical [[diathermy]] and cancer treatment, [[remote sensing]], [[radio astronomy]], [[particle accelerator]]s, [[spectroscopy]], industrial heating, [[collision avoidance system]]s, [[garage door opener]]s and [[keyless entry system]]s, and for cooking food in [[microwave oven]]s.

