  - title: Radiation-induced cancer
    pageid: 35993194
    extract: Exposure to ionizing radiation is known to increase the future incidence of cancer, particularly leukemia. The mechanism by which this occurs is well understood, but quantitative models predicting the level of risk remain controversial. The most widely accepted model posits that the incidence of cancers due to ionizing radiation increases linearly with effective radiation dose at a rate of 5.5% per sievert; if  correct, natural background radiation is the most hazardous source of radiation to general public health, followed by medical imaging as a close second. Additionally, the vast majority of non-invasive cancers are non-melanoma skin cancers caused by ultraviolet radiation (which lies on the boundary between ionizing and non-ionizing radiation). Non-ionizing radio frequency radiation from mobile phones, electric power transmission, and other similar sources have been investigated as a possible carcinogen by the WHO's International Agency for Research on Cancer, but to date, no evidence of this has been observed.
    source: |-
      {{Short description|Cancer caused by ionizing radiation exposure}}
      Exposure to [[ionizing radiation]] is known to increase the future incidence of [[cancer]], particularly [[leukemia]]. The mechanism by which this occurs is well understood, but quantitative models predicting the level of risk remain controversial. The most widely accepted model posits that the incidence of cancers due to ionizing radiation increases linearly with [[effective radiation dose]] at a rate of 5.5% per [[sievert]];<ref name="ICRP103" /> if  correct, natural background radiation is the most hazardous source of radiation to general public health, followed by medical imaging as a close second.{{Citation needed|date=August 2020}} Additionally, the vast majority of non-invasive cancers are non-melanoma [[skin cancer]]s caused by [[ultraviolet radiation]] (which lies on the boundary between ionizing and non-ionizing radiation). Non-ionizing [[radio frequency]] radiation from [[mobile phone]]s, [[electric power transmission]], and other similar sources have been investigated as a [[possible carcinogen]] by the [[World Health Organization|WHO]]'s [[International Agency for Research on Cancer]], but to date, no evidence of this has been observed.<ref>{{cite web|title=IARC classifies radiofrequency electromagnetic fields as possibly carcinogenic to humans|url=http://www.iarc.fr/en/media-centre/pr/2011/pdfs/pr208_E.pdf|work=World Health Organization}}</ref><ref>{{cite web | url=https://www.cancer.gov/about-cancer/causes-prevention/risk/radiation/cell-phones-fact-sheet#:~:text=Many%20different%20kinds%20of%20studies,kinds%20of%20cancer%20in%20humans | title=Cell Phones and Cancer Risk Fact Sheet – NCI | date=10 March 2022 }}</ref>

      ==Causes==
      According to the prevalent model, any radiation exposure can increase the risk of cancer. Typical contributors to such risk include natural background radiation, medical procedures, occupational exposures, nuclear accidents, and many others. Some major contributors are discussed below.

      ===Radon===
      [[Health effects of radon|Radon]] is responsible for the worldwide majority of the mean public exposure to [[ionizing radiation]]. It is often the single largest contributor to an individual's background radiation dose, and is the most variable from location to location. Radon gas from natural sources can accumulate in buildings, especially in confined areas such as attics, and basements. It can also be found in some spring waters and hot springs.<ref>{{cite web|title=Facts about Radon|publisher=Facts about|url=http://www.facts-about.org.uk/science-element-radon.htm|access-date=2008-09-07|archive-url=https://web.archive.org/web/20050222004131/http://www.facts-about.org.uk/science-element-radon.htm|archive-date=2005-02-22}}</ref>

      Epidemiological evidence shows a clear link between lung cancer and high concentrations of radon, with 21,000 radon-induced U.S. lung cancer deaths per year—second only to cigarette smoking—according to the United States [[United States Environmental Protection Agency|Environmental Protection Agency]].<ref>{{cite web|title=A Citizen's Guide to Radon|publisher=U.S. Environmental Protection Agency|date=2007-11-26|url=http://www.epa.gov/radon/pubs/citguide.html|archive-url=https://web.archive.org/web/20030419085501/http://www.epa.gov/radon/pubs/citguide.html|archive-date=April 19, 2003|access-date=2008-06-26}}</ref> Thus in geographic areas where radon is present in heightened concentrations, radon is considered a significant [[indoor air quality|indoor air]] contaminant.

      Residential exposure to radon gas has similar cancer risks as [[passive smoking]].<ref name=Little /> Radiation is a more potent source of cancer when it is combined with other cancer-causing agents, such as radon gas exposure plus smoking tobacco.<ref name=Little />

      ===Medical===
      In industrialized countries, [[medical imaging]] contributes almost as much radiation dose to the public as natural background radiation. Collective dose to Americans from medical imaging grew by a factor of six from 1990 to 2006, mostly due to growing use of 3D scans that impart much more dose per procedure than traditional [[radiograph]]s.<ref name="NCRP160">{{cite book|title=Ionizing radiation exposure of the population of the United States: recommendations of the National Council on Radiation Protection and Measurements.|year=2009|publisher=National Council on Radiation Protection and Measurements|location=Bethesda, Md.|id=NCRP report 160|isbn=978-0-929600-98-7|url=http://www.ncrppublications.org/Reports/160|archive-date=2014-02-02|access-date=2012-06-01|archive-url=https://web.archive.org/web/20140202092721/http://www.ncrppublications.org/Reports/160}}</ref> CT scans alone, which account for half the medical imaging dose to the public, are estimated to be responsible for 0.4% of current cancers in the United States, and this may increase to as high as 1.5–2% with 2007 rates of CT usage;<ref name="pmid18046031">{{cite journal |author=Brenner DJ, Hall EJ |title=Computed tomography—an increasing source of radiation exposure |journal=N. Engl. J. Med. |volume=357 |issue=22 |pages=2277–84 |date=November 2007 |pmid=18046031 |doi=10.1056/NEJMra072149 |last2=Hall |s2cid=2760372 |url=https://repositorio.unal.edu.co/handle/unal/79492 |url-access=subscription }}</ref> however, this estimate is disputed.<ref>{{cite journal |author=Tubiana M |title=Comment on Computed Tomography and Radiation Exposure |journal=N. Engl. J. Med. |volume=358 |issue=8 |pages=852–3 |date=February 2008 |pmid=18287609 |doi=10.1056/NEJMc073513}}</ref> Other [[nuclear medicine]] techniques involve the injection of [[radioactive pharmaceutical]]s directly into the bloodstream, and [[radiotherapy]] treatments deliberately deliver lethal doses (on a cellular level) to tumors and surrounding tissues.

      It has been estimated that CT scans performed in the US in 2007 alone will result in 29,000 new cancer cases in future years.<ref name="pmid20008689">{{cite journal |vauthors=Berrington de González A, Mahesh M, Kim KP, Bhargavan M, Lewis R, Mettler F, Land C | title = Projected cancer risks from computed tomographic scans performed in the United States in 2007 | journal = Arch. Intern. Med. | volume = 169 | issue = 22 | pages = 2071–7 |date=December 2009 | pmid = 20008689 | pmc = 6276814 | doi = 10.1001/archinternmed.2009.440}}</ref><ref name=medscape>{{cite web| url=http://www.medscape.com/viewarticle/714025| title=Thousands of New Cancers Predicted Due to Increased Use of CT|author=Roxanne Nelson |website=[[Medscape]]| date=December 17, 2009| access-date=January 2, 2010}}</ref> This estimate is criticized by the [[American College of Radiology]] (ACR), which maintains that the life expectancy of CT scanned patients is not that of the general population and that the model of calculating cancer is based on total-body radiation exposure and thus faulty.<ref name=medscape/>

      ===Occupational===
      In accordance with ICRP recommendations, most regulators permit nuclear energy workers to receive up to 20 times more radiation dose than is permitted for the general public.<ref name=ICRP103 /> Higher doses are usually permitted when responding to an emergency. The majority of workers are routinely kept well within regulatory limits, while a few essential technicians will routinely approach their maximum each year. Accidental overexposures beyond regulatory limits happen globally several times a year.<ref>{{cite journal |last=Turai |first=István |author2=Veress, Katalin |year=2001 |title=Radiation Accidents: Occurrence, Types, Consequences, Medical Management, and the Lessons to be Learned |url=http://www.omfi.hu/cejoem/Volume7/Vol7No1/CE01_1-01.html |journal=Central European Journal of Occupational and Environmental Medicine |volume=7 |issue=1 |pages=3–14 |archive-url=https://web.archive.org/web/20180202032106/http://www.omfi.hu/cejoem/Volume7/Vol7No1/CE01_1-01.html |archive-date=February 2, 2018 |access-date=1 June 2012}}</ref> Astronauts on long missions are at higher risk of cancer, see [[cancer and spaceflight]].

      Some occupations are exposed to radiation without being classed as nuclear energy workers. Airline crews receive occupational exposures from [[cosmic radiation]] because of reduced atmospheric shielding at altitude. Mine workers receive occupational exposures to radon, especially in uranium mines. Anyone working in a granite building, such as the [[US Capitol]], is likely to receive a dose from natural uranium in the granite.<ref name=FUSRAP />

      ===Accidental===
      [[File:Chernobyl radiation map 1996.svg|thumb|right|Chernobyl radiation map from 1996]]
      Nuclear accidents can have dramatic consequences to their surroundings, but their global impact on cancer is less than that of natural and medical exposures.

      The most severe nuclear accident is probably the [[Chernobyl disaster]]. In addition to conventional fatalities and acute radiation syndrome fatalities, nine children died of [[thyroid cancer]], and it is estimated that there may be up to 4,000 excess cancer deaths among the approximately 600,000 most highly exposed people.<ref name="iaea">{{cite web|title=IAEA Report|work=In Focus: Chernobyl|access-date = 2008-05-31 |url=http://www.iaea.org/NewsCenter/Focus/Chernobyl/ | archive-url= https://web.archive.org/web/20080611102751/http://www.iaea.org/NewsCenter/Focus/Chernobyl/| archive-date= 11 June 2008 | url-status= live}}</ref><ref>{{cite book|author=WHO Expert Group|url=https://www.who.int/ionizing_radiation/chernobyl/WHO%20Report%20on%20Chernobyl%20Health%20Effects%20July%2006.pdf|title=Health Effects of the Chernobyl Accident and Special Health Care Programmes: Report of the UN Chernobyl Forum Health Expert Group|date=July 2006|publisher=World Health Organization|isbn=978-92-4-159417-2|editor1=Bennett|editor-first=Burton|location=Geneva|page=106|quote=...This total, about 4000 deaths projected over the lifetimes of the some 600,000 persons most affected by the accident, is a small proportion of the total cancer deaths from all causes that can be expected to occur in this population. It must be stressed that this estimate is bounded by large uncertainties|editor2=Repacholi|editor-first2=Michael|editor-link2=Michael Repacholi|editor3=Carr|editor-first3=Zhanat}}</ref> Of the 100 million [[Curie (unit)|curie]]s (4 [[becquerel|exabecquerels]]) of radioactive material, the short lived radioactive isotopes such as [[iodine-131|<sup>131</sup>I]] Chernobyl released were initially the most dangerous. Due to their short half-lives of 5 and 8 days they have now<!-- ({{CURRENTYEAR}}) --> decayed, leaving the more long-lived [[caesium-137|<sup>137</sup>Cs]] (with a half-life of 30.07 years) and [[strontium-90|<sup>90</sup>Sr]] (with a half-life of 28.78 years) as main dangers.

      In March 2011, an earthquake and  tsunami caused damage that led to [[Fukushima I nuclear accidents|explosions and partial meltdowns]] at the [[Fukushima I Nuclear Power Plant]] in Japan. Significant release of radioactive material took place following hydrogen explosions at three reactors, as technicians  tried to pump in seawater to keep the uranium fuel rods cool, and bled radioactive gas from the reactors in order to make room for the seawater.<ref>{{cite news |url=https://www.nytimes.com/2011/04/13/world/asia/13japan.html |title=Japanese Officials on Defensive as Nuclear Alert Level Rises |author=Keith Bradsher|date=April 12, 2011  |work=New York Times |display-authors=etal}}</ref> Concerns about the large-scale release of radioactivity resulted in 20&nbsp;km exclusion zone being set up around the power plant and people within the 20–30&nbsp;km zone being advised to stay indoors. On March 24, 2011, Japanese officials announced that "radioactive iodine-131 exceeding safety limits for infants had been detected at 18 water-purification plants in Tokyo and five other prefectures".<ref>{{cite web |url=http://content.usatoday.com/communities/ondeadline/post/2011/03/report-radioactive-emissions-from-japan-plant-approach-chernobyl-levels/1 |title=Report: Emissions from Japan plant approach Chernobyl levels  |author=Michael Winter |date=March 24, 2011 |work=USA Today }}</ref>

      Also in Japan was the [[Tokaimura nuclear accidents]] of 1997 and 1999. The 1997 accident was far less fatal than the 1999 accident. The 1999 nuclear accident was caused by two faulty technicians who, in their desire to speed up the process of converting [[uranium hexafluoride]] to [[enriched uranium]] [[Uranium dioxide|dioxide]], resulted in a [[critical mass]] that resulted in technicians Hisashi Ouchi being dosed with approximately 17 sieverts of radiation and Masato Shinohara to be dosed with 10 sieverts of radiation, which resulted in their deaths. The two's supervisor, Yutaka Yokokawa, who was sitting in a desk far from the tank where the [[uranium hexafluoride]] was being poured into, was dosed with 3 sieverts and survived, but was charged with negligence in October 2000.{{cn|date=July 2022}}

      In 2003, in autopsies performed on six dead children in the polluted area near Chernobyl where they also reported a higher incidence of pancreatic tumors, Bandazhevsky found a concentration of <sup>137</sup>Cs of 40–45 times higher than in their liver, thus demonstrating that pancreatic tissue is a strong accumulator of radioactive cesium.<ref>{{Cite journal|author=Bandazhevsky Y.I.|title=Chronic Cs-137 incorporation in children's organs.|journal=Swiss Med. Wkly.|year=2003|volume=133|issue=35–36|pages=488–90|doi=10.4414/smw.2003.10226 |pmid=14652805|s2cid=28184979 |doi-access=free}}</ref> In 2020, Zrielykh reported a high and statistically significant incidence of pancreatic cancer in Ukraine for a period of 10 year, there have been cases of morbidity also in children in 2013 compared with 2003.<ref>{{Cite journal |doi=10.1200/JCO.2020.38.15_suppl.e16721|title=Analysis of statistics of pancreatic cancer in Ukraine for a period of 10 years|year=2020|last1=Zrielykh|first1=Liliia|journal=Journal of Clinical Oncology|volume=38|issue=15_suppl|article-number=e16721|s2cid=219776252}}</ref>

      Other serious radiation accidents include the [[Kyshtym disaster]] (estimated 49 to 55 cancer deaths),<ref name="Standring">{{cite journal |author=Standring, William J.F. |author2=Dowdall, Mark |author3=Strand, Per |title=Overview of Dose Assessment Developments and the Health of Riverside Residents Close to the "Mayak" PA Facilities, Russia|journal=International Journal of Environmental Research and Public Health|year=2009|volume=6|issue=1|pages=174–199|doi=10.3390/ijerph6010174|issn=1660-4601|pmid=19440276|pmc=2672329|doi-access=free}}</ref> and the [[Windscale fire]] (an estimated 33 cancer deaths).<ref name=ti>[https://web.archive.org/web/20080408133350/http://www.time.com/time/magazine/article/0,9171,961337,00.html Perhaps the Worst, Not the First] ''TIME magazine'', May 12, 1986.</ref><ref name=wind>{{cite journal | author = Sovacool Benjamin K | year = 2010 | title = A Critical Evaluation of Nuclear Power and Renewable Electricity in Asia | journal = Journal of Contemporary Asia | volume = 40 | issue = 3| page = 393 | doi = 10.1080/00472331003798350 | s2cid = 154882872 | url = http://scholarbank.nus.edu.sg/handle/10635/20646 }}</ref>

      The satellite [[Transit (satellite)#Other satellites|Transit 5BN-3]] accident. The satellite had a [[SNAP-3]] [[radioisotope thermoelectric generator]] (RTG) with approximately 1 kilogram of [[plutonium-238]] on board when on April 21, 1964 it burned up and re-entered the atmosphere.<ref>{{Cite journal|last1=Hardy, Jr.|first1=E. P.|last2=Krey|first2=P. W.|last3=Volchok|first3=H. L.|date=1972-01-01|title=Global Inventory and Distribution of 238-Pu from SNAP-9A|url=https://www.osti.gov/biblio/4689831|journal=U.S. Department of Energy – Office of Scientific and Technical Information|doi=10.2172/4689831 |osti=4689831 |language=English}}</ref> Dr. [[John Gofman]] claimed it increased the rate of lung cancer worldwide. He said "Although it is impossible to estimate{{dubious|date=October 2016}} the number of lung cancers induced by the accident, there is no question that the dispersal of so much plutonium-238 would add to the number of lung cancers diagnosed over many subsequent decades."<ref>{{Cite tech report |title=Global Inventory and Distribution of Pu-238 from SNAP-9A |first1=E. P. Jr|last1=Hardy|first2=P. W.|last2=Krey|first3=H. L.|last3=Volchok|date=January 1, 1972|osti = 4689831|doi = 10.2172/4689831 |doi-access=free |url = https://digital.library.unt.edu/ark:/67531/metadc1035262/}}</ref><ref>{{Cite book|url=https://books.google.com/books?id=FDabNTVF644C&pg=PT35 |title=Weapons in Space|first=Karl|last=Grossman|date=January 4, 2011|publisher=Seven Stories Press|via=Google Books|isbn=978-1-60980-320-9}}</ref> Other satellite failures include [[Kosmos 954]] and [[Kosmos 1402]].

      ==Mechanism==
      Cancer is a [[stochastic]] effect of radiation, meaning it is an unpredictable event.  The probability of occurrence increases with [[effective radiation dose]], but the severity of the cancer is independent of dose. The speed at which cancer advances, the [[prognosis]], the degree of pain, and every other feature of the disease are not functions of the radiation dose to which the person is exposed. This contrasts with the deterministic effects of [[acute radiation syndrome]] which increase in severity with dose above a threshold. Cancer starts with a single [[cell (biology)|cell]] whose operation is disrupted. Normal cell operation is controlled by the chemical structure of [[DNA]] molecules, also called [[chromosome]]s.

      When radiation deposits enough energy in organic tissue to cause [[ionization]], this tends to break molecular bonds, and thus alter the molecular structure of the irradiated molecules. Less energetic radiation, such as visible light, only causes [[Excited state|excitation]], not ionization, which is usually dissipated as heat with relatively little chemical damage. Ultraviolet light is usually categorized as non-ionizing, but it is actually in an intermediate range that produces some ionization and chemical damage. Hence the carcinogenic mechanism of ultraviolet radiation is similar to that of ionizing radiation.

      Unlike chemical or physical triggers for cancer, penetrating radiation hits molecules within cells randomly.<ref group="note">In the case of [[internal contamination]] with [[Alpha emitter|alpha emitters]], the distribution may not be so random. [[Transuranic]] elements are believed to have a chemical affinity for DNA, and any radioactive element could be part of a chemical compound that targets certain molecules.</ref> Molecules broken by radiation can become highly reactive [[free radicals]] that cause further chemical damage. Some of this direct and indirect damage will eventually impact [[chromosome]]s and [[epigenetic]] factors that control the expression of genes. Cellular mechanisms will repair some of this damage, but some repairs will be incorrect and some [[chromosome abnormalities]] will turn out to be irreversible.

      DNA [[double-strand break]]s (DSBs) are generally accepted to be the most biologically significant lesion by which ionizing radiation causes cancer.<ref name=Little /> In vitro experiments show that [[ionizing radiation]] cause DSBs at a rate of 35 DSBs per cell per [[Gray (unit)|Gray]],<ref name=5057.full>{{cite journal | doi = 10.1073/pnas.0830918100 | volume=100 | issue = 9 | title=Evidence for a lack of DNA double-strand break repair in human cells exposed to very low x-ray doses | journal=Proceedings of the National Academy of Sciences | pages=5057–5062 | pmid=12679524 | pmc=154297 | date=April 2003 |vauthors=Rothkamm K, Löbrich M | bibcode=2003PNAS..100.5057R | doi-access=free }} "The line is a linear fit to the data points with a slope of 35 DSBs per cell per Gy." e.g. 35[DSB/Gy]*65[mGy]=2.27[DSB]</ref> and removes a portion of the [[epigenetic]] markers of the DNA,<ref>[http://mcr.aacrjournals.org/content/3/10/553.full   Fractionated Low-Dose Radiation Exposure Leads to Accumulation of DNA Damage and Profound Alterations in DNA and Histone Methylation in the Murine Thymus] "fractionated low-dose radiation exposure resulted in even more substantial decrease in global DNA methylation than acute irradiation, causing 2.5- and 6.1-fold (P < 0.05) reduction in global DNA methylation</ref> which regulate the gene expression. Most of the induced DSBs are [[DNA repair|repaired]] within 24h after exposure, however, 25% of the repaired strands are repaired incorrectly and about 20% of fibroblast cells that were exposed to 200mGy died within 4 days after exposure.<ref>{{cite journal | doi = 10.1073/pnas.0830918100 | pmid=12679524 | pmc=154297 | volume=100 | issue=9 | title=Evidence for a lack of DNA double-strand break repair in human cells exposed to very low x-ray doses | date=April 2003 |vauthors=Rothkamm K, Löbrich M | journal=Proc. Natl. Acad. Sci. U.S.A. | pages=5057–62 | bibcode=2003PNAS..100.5057R| doi-access=free }}</ref><ref>{{cite journal|title=Repair of x-ray-induced DNA double-strand breaks in specific Not I restriction fragments in human fibroblasts: joining of correct and incorrect ends |journal=Proceedings of the National Academy of Sciences |volume=92 |issue=26 |pages=12050–12054 |date=1995-12-19 |doi=10.1073/pnas.92.26.12050 |pmid=8618842 |last1=Lobrich |first1=M. |last2=Rydberg |first2=B. |last3=Cooper |first3=P. K. |bibcode=1995PNAS...9212050L |pmc=40294 |doi-access=free }}</ref><ref>{{cite journal| doi=10.1016/j.neulet.2005.09.053 | pmid=16226837 | volume=393 | title=DNA double strand break repair in brain: Reduced NHEJ activity in aging rat neurons | year=2006 | journal=Neuroscience Letters | pages=18–22 | author=Vyjayanti V.N., Subba Rao Kalluri| issue=1 | s2cid=45487524 }}</ref> A portion of the population possess a flawed DNA repair mechanism, and thus suffer a greater insult due to exposure to radiation.<ref name=5057.full/>

      Major damage normally results in the [[apoptosis|cell dying]] or being unable to reproduce. This effect is responsible for acute radiation syndrome, but these heavily damaged cells cannot become cancerous. Lighter damage may leave a stable, partly functional cell that may be capable of proliferating and eventually developing into cancer, especially if [[tumor suppressor gene]]s are damaged.<ref name=Little>{{cite book |veditors=Kufe DW, Pollock RE, Weichselbaum RR, Bast RC, Gansler TS, Holland JF, Frei E | title = Cancer medicine | author = Little JB | chapter = Chapter 14: Ionizing Radiation | edition = 6th  | publisher = B.C. Decker | location = Hamilton, Ont | year = 2000 | isbn = 978-1-55009-113-7 | chapter-url = https://www.ncbi.nlm.nih.gov/books/NBK20793/ }}</ref><ref>Acharya, PVN; The Effect of Ionizing Radiation on the Formation of Age-Correlated Oligo Deoxyribo Nucleo Phospheryl Peptides in Mammalian Cells; 10th International Congress of Gerontology, Jerusalem. Abstract No. 1; January 1975. Work done while employed by Dept. of Pathology, University of Wisconsin, Madison.</ref><ref>Acharya, PVN; Implications of The Action of Low Level Ionizing Radiation on the Inducement of Irreparable DNA Damage Leading to Mammalian Aging and Chemical Carcinogenesis.; 10th International Congress of Biochemistry, Hamburg, Germany. Abstract No. 01-1-079; July 1976. Work done while employed by Dept. of Pathology, University of Wisconsin, Madison.</ref><ref>Acharya, PV Narasimh; Irreparable DNA-Damage by Industrial Pollutants in Pre-mature Aging, Chemical Carcinogenesis and Cardiac Hypertrophy:  Experiments and Theory; 1st International Meeting of Heads of Clinical Biochemistry Laboratories, Jerusalem, Israel. April 1977. Work conducted at Industrial Safety Institute and Behavioral Cybernetics Laboratory, University of Wisconsin, Madison.</ref> The latest research suggests that mutagenic events do not occur immediately after irradiation. Instead, surviving cells appear to have acquired a genomic instability which causes an increased rate of mutations in future generations. The cell will then progress through multiple stages of [[neoplastic transformation]] that may culminate into a tumor after years of incubation. The neoplastic transformation can be divided into three major independent stages: morphological changes to the cell, acquisition of [[cellular immortality]] (losing normal, life-limiting cell regulatory processes), and adaptations that favor formation of a tumor.<ref name=Little />

      In some cases, a small radiation dose reduces the impact of a subsequent, larger radiation dose. This has been termed an 'adaptive response' and is related to hypothetical mechanisms of [[Radiation hormesis|hormesis]].<ref>{{cite web|url= http://www.groenerekenkamer.com/grkfiles/images/parsons.pdf|title=Radiation Hormesis Challenging LNT Theory Via Ecologial and Evolutionary Considerations|work=Publication date 2002|publisher=Health Physics Society|access-date=2010-12-11}}</ref>

      A [[Incubation period|latent period]] of decades may elapse between radiation exposure and the detection of cancer. Those cancers that may develop as a result of radiation exposure are indistinguishable from those that occur naturally or as a result of exposure to other [[carcinogen]]s. Furthermore, [[National Cancer Institute]] literature indicates that chemical and physical hazards and lifestyle factors, such as smoking, [[alcohol (drug)|alcohol]] consumption, and diet, significantly contribute to many of these same diseases. Evidence from uranium miners suggests that smoking may have a multiplicative, rather than additive, interaction with radiation.<ref name=Little /> Evaluations of radiation's contribution to cancer incidence can only be done through large epidemiological studies with thorough data about all other confounding risk factors.
      An unprecedented mechanism of radiation-induced pancreatic carcinogenesis has been highlighted through the concentration and elimination of radiocesium in pancreatic duct and juice. Studies by Nelson,<ref>{{Cite journal |last1=Nelson |first1=Arne |last2=Ullberg |first2=Sven |last3=Kristoffersson |first3=Harry |last4=Ronnback |first4=Curt |date=May 1961 |title=Distribution of Radiocesium in Mice |journal=Acta Radiologica |language=en |volume=55 |issue=5 |pages=374–384 |doi=10.3109/00016926109175132 |issn=0001-6926 |pmid=13728254 |doi-access=free}}</ref> Sodee,<ref>{{Cite journal |last=Sodee |first=DB |date=January 1964 |title=HG-197, As a scanning Nucleotide |department=Letter to the Editor |journal=J Nucl Med |volume=5 |issue=5 |pages=74–75 |pmid=14113151}}</ref> Bandazhevsky,<ref>{{Cite journal |last=Bandazhevsky Y.I. |year=2003 |title=Chronic Cs-137 incorporation in children's organs. |journal=Swiss Med. Wkly. |volume=133 |issue=35–36 |pages=488–90 |doi=10.4414/smw.2003.10226 |pmid=14652805 |s2cid=28184979 |doi-access=free}}</ref> Venturi,<ref>{{cite journal |last1=Venturi |first1=Sebastiano |title=Cesium in Biology, Pancreatic Cancer, and Controversy in High and Low Radiation Exposure Damage—Scientific, Environmental, Geopolitical, and Economic Aspects |journal=International Journal of Environmental Research and Public Health |date=January 2021 |volume=18 |issue=17 |page=8934 |doi=10.3390/ijerph18178934 |pmid=34501532 |language=en|pmc=8431133 |doi-access=free }}  [[File:CC-BY icon.svg|50px]]  Text was copied from this source, which is available under a [https://creativecommons.org/licenses/by/4.0/  Creative Commons Attribution 4.0 International License].</ref>  and others, have reported that pancreatic cells have a very high capacity to concentrate the carcinogenic radioactive Cesium in experimental scintigraphies with Cs-137 and in environments polluted by radioactive fallout in mammals (mice, dogs and humans) and also in birds and fish (chickens and carp).
      Ionizing radiation of 137-Cs causes cytoplasmic vacuolization, dilatation of the endoplasmic reticulum and destruction of mitochondria of various sizes and morphology, and dense areas of chromatin at the periphery of the nucleus of pancreatic, thyroidal and salivary cells.<ref>{{cite journal|author=Venturi Sebastiano |title=Prevention of nuclear damage caused by iodine and cesium radionuclides to the thyroid, pancreas and other organs|journal=Juvenis Scientia|date= 2022 |volume=8 |issue=2 |pages=5–14 |doi=10.32415/jscientia_2022_8_2_5-14 |s2cid=250392484 |url=https://jscientia.org/index.php/js/article/view/137/125|doi-access=free }}</ref>

      ==Skin cancer==
      Prolonged exposure to [[ultraviolet radiation]] from the [[sun]] can lead to [[melanoma]] and other skin malignancies.<ref name=Cleaver>{{cite book |vauthors=Cleaver JE, Mitchell DL |veditors=Bast RC, Kufe DW, Pollock RE, etal | title = Holland-Frei Cancer Medicine | edition = 5th | publisher = B.C. Decker | location = Hamilton, Ontario | year = 2000 | chapter = 15. Ultraviolet Radiation Carcinogenesis | isbn = 978-1-55009-113-7 | chapter-url = https://www.ncbi.nlm.nih.gov/books/NBK20854/ | access-date= 2011-01-31 }}</ref> Clear evidence establishes ultraviolet radiation, especially the non-ionizing medium wave [[UVB]], as the cause of most non-melanoma [[skin cancer]]s, which are the most common forms of cancer in the world.<ref name=Cleaver />

      Skin cancer may occur following ionizing radiation exposure following a latent period averaging 20 to 40 years.<ref name="Andrews">{{cite book |author1=James, William D. |author2=Berger, Timothy G. |title=Andrews' Diseases of the Skin: clinical Dermatology |publisher=Saunders Elsevier |year=2006 |isbn=978-0-7216-2921-6 }}</ref><ref name="pmid15486177">{{cite journal |author=Gawkrodger DJ |title=Occupational skin cancers |journal=Occup Med (Lond) |volume=54 |issue=7 |pages=458–63 |date=October 2004 |pmid=15486177 |doi=10.1093/occmed/kqh098 |doi-access=free }}</ref>  A chronic radiation keratosis is a precancerous keratotic skin lesion that may arise on the skin many years after exposure to ionizing radiation.<ref name="Fitz2">Freedberg, et al. (2003). ''Fitzpatrick's Dermatology in General Medicine''. (6th ed.). McGraw-Hill. {{ISBN|0-07-138076-0}}.</ref>{{rp|729}} Various malignancies may develop, most frequency basal-cell carcinoma followed by squamous-cell carcinoma.<ref name="Andrews" /><ref name="pmid10201411">{{cite journal |author=Hurko O, Provost TT |title=Neurology and the skin |journal=J. Neurol. Neurosurg. Psychiatry |volume=66 |issue=4 |pages=417–30 |date=April 1999 |pmid=10201411 |pmc=1736315 |doi= 10.1136/jnnp.66.4.417|last2=Provost }}</ref><ref name="pmid17655745">{{cite journal |last1=Suárez |first1=B |last2=López-Abente |first2=G |last3=Martínez |first3=C |display-authors=3 |title=Occupation and skin cancer: the results of the HELIOS-I multicenter case-control study |journal=BMC Public Health |volume=7|article-number=180 |year=2007 |pmid=17655745 |pmc=1994683 |doi=10.1186/1471-2458-7-180 |last4=Navarro |last5=Tormo |last6=Rosso |last7=Schraub |last8=Gafà |last9=Sancho-Garnier |last10=Wechsler |last11=Zanetti |doi-access=free }}</ref>  Elevated risk is confined to the site of radiation exposure.<ref>{{cite journal |last1=Lichter |first1=Michael D. |last2=Karagas |first2=Margaret R. |last3=Mott |first3=Leila A. |last4=Spencer |first4=Steven K. |last5=Stukel |first5=Thérèse A. |last6=Greenberg |first6=E. Robert |display-authors=1 |date=Aug 2000 |title=Therapeutic ionizing radiation and the incidence of basal cell carcinoma and squamous cell carcinoma. The New Hampshire Skin Cancer Study Group |journal=Arch Dermatol |volume=136 |issue=8 |pages=1007–11 |doi=10.1001/archderm.136.8.1007 |pmid=10926736|doi-access=free }}</ref>  Several studies have also suggested the possibility of a causal relationship between [[melanoma]] and ionizing radiation exposure.<ref name="pmid16238450">{{cite journal |author=Fink CA, Bates MN |title=Melanoma and ionizing radiation: is there a causal relationship? |journal=Radiat. Res. |volume=164 |issue=5 |pages=701–10 |date=November 2005 |pmid=16238450 |doi= 10.1667/RR3447.1|url=https://www.medlineplus.gov/melanoma.html|last2=Bates |bibcode=2005RadR..164..701F |s2cid=23024610 }}</ref>  The degree of carcinogenic risk arising from low levels of exposure is more contentious, but the available evidence points to an increased risk that is approximately proportional to the dose received.<ref name="pmid15322514">{{cite journal |author=Wakeford R |title=The cancer epidemiology of radiation |journal=Oncogene |volume=23 |issue=38 |pages=6404–28 |date=August 2004 |pmid=15322514 |doi=10.1038/sj.onc.1207896 |doi-access=free }}</ref> [[Radiologists]] and [[radiographers]] are among the earliest occupational groups exposed to radiation. It was the observation of the earliest radiologists that led to the recognition of radiation-induced skin cancer—the first solid cancer linked to radiation—in 1902.<ref name="pmid15375227">{{cite journal |vauthors=Yoshinaga S, Mabuchi K, Sigurdson AJ, Doody MM, Ron E |title=Cancer risks among radiologists and radiologic technologists: review of epidemiologic studies |journal=Radiology |volume=233 |issue=2 |pages=313–21 |date=November 2004 |pmid=15375227 |doi=10.1148/radiol.2332031119}}</ref>  While the incidence of skin cancer secondary to medical ionizing radiation was higher in the past, there is also some evidence that risks of certain cancers, notably skin cancer, may be increased among more recent medical radiation workers, and this may be related to specific or changing radiologic practices.<ref name="pmid15375227" />  Available evidence indicates that the excess risk of skin cancer lasts for 45 years or more following irradiation.<ref name="pmid11340610">{{cite journal |author=Shore RE |title=Radiation-induced skin cancer in humans |journal=Med. Pediatr. Oncol. |volume=36 |issue=5 |pages=549–54 |date=May 2001 |pmid=11340610 |doi=10.1002/mpo.1128 }}</ref>

      == Epidemiology ==
      Cancer is a stochastic effect of radiation, meaning that it only has a probability of occurrence, as opposed to deterministic effects which always happen over a certain dose threshold. The consensus of the nuclear industry, nuclear regulators, and governments, is that the incidence of cancers due to ionizing radiation can be modeled as increasing linearly with [[effective radiation dose]] at a rate of 5.5% per [[sievert]].<ref name=ICRP103 /> Individual studies, alternate models, and earlier versions of the industry consensus have produced other risk estimates scattered around this consensus model. There is general agreement that the risk is much higher for infants and fetuses than adults, higher for the middle-aged than for seniors, and higher for women than for men, though there is no quantitative consensus about this.<ref name="peck">{{cite web|last=Peck|first=Donald J.|title=How to Understand and Communicate Radiation Risk|url=http://www.imagewisely.org/Imaging-Professionals/Medical-Physicists/Articles/How-to-Understand-and-Communicate-Radiation-Risk.aspx|publisher=Image Wisely|access-date=18 May 2012|author2=Samei, Ehsan|archive-date=8 December 2010|archive-url=https://web.archive.org/web/20101208060102/http://www.imagewisely.org/Imaging-Professionals/Medical-Physicists/Articles/How-to-Understand-and-Communicate-Radiation-Risk.aspx}}</ref><ref name="UNSCEAR">{{cite book |title=Effects of ionizing radiation: UNSCEAR 2006 report to the General Assembly, with scientific annexes|year=2008|publisher=United Nations|location=New York|isbn=978-92-1-142263-4|url=http://www.unscear.org/unscear/en/publications.html|access-date=18 May 2012}}</ref>  This model is widely accepted for external radiation, but its application to internal contamination is disputed. For example, the model fails to account for the low rates of cancer in early workers at [[Los Alamos National Laboratory]] who were exposed to plutonium dust, and the high rates of thyroid cancer in children following the [[Chernobyl accident]], both of which were internal exposure events. [[Christopher Busby|Chris Busby]] of the self styled "European Committee on Radiation Risk", calls the ICRP model "fatally flawed" when it comes to internal exposure.<ref name="ECRR2010">{{cite book|last=European Committee on Radiation Risk|title=2010 recommendations of the ECRR: the health effects of exposure to low doses of ionizing radiation|year=2010|publisher=Green Audit|location=Aberystwyth|isbn=978-1-897761-16-8|url=http://www.euradcom.org/2011/ecrr2010.pdf|edition=Regulators'|editor=Busby, Chris|access-date=18 May 2012|display-editors=etal|archive-date=21 July 2012|archive-url=https://web.archive.org/web/20120721220541/http://www.euradcom.org/2011/ecrr2010.pdf}}</ref>

      Radiation can cause cancer in most parts of the body, in all animals, and at any age, although radiation-induced solid tumors usually take 10–15 years, and can take up to 40 years, to become clinically manifest, and radiation-induced [[leukemia]]s typically require 2–9 years to appear.<ref name=Little /><ref name = "Coggle & Lindop">Coggle, J.E., Lindop, Patricia J. "Medical Consequences of Radiation Following a Global Nuclear War." The Aftermath (1983): 60–71.</ref> Some people, such as those with [[nevoid basal cell carcinoma syndrome]] or [[retinoblastoma]], are more susceptible than average to developing cancer from radiation exposure.<ref name=Little /> Children and adolescents are twice as likely to develop radiation-induced leukemia as adults; radiation exposure before birth has ten times the effect.<ref name=Little />

      Radiation exposure can cause cancer in any living tissue, but high-dose whole-body external exposure is most closely associated with [[leukemia]],<ref>"[https://www.cdc.gov/niosh/docs/2005-104/ A Nested Case-Control Study of Leukemia and Ionizing Radiation at the Portsmouth Naval Shipyard]", NIOSH Publication No. 2005-104. National Institute for Occupational Safety and Health.</ref> reflecting the high [[radiosensitivity]] of bone marrow. Internal exposures tend to cause cancer in the organs where the radioactive material concentrates, so that [[radon]] predominantly causes [[lung cancer]], [[iodine-131]] for thyroid cancer is most likely to cause  [[thyroid cancer|leukemia.]]

      ===Data sources===
      [[File:Increased risk with dose.svg|thumb|right|Increased Risk of Solid Cancer with Dose for atomic blast survivors]]
      The associations between ionizing radiation exposure and the development of cancer are based primarily on the "[[LSS cohort]]" of Japanese [[atomic bomb survivors]], the largest human population ever exposed to high levels of ionizing radiation. However this cohort was also exposed to high heat, both from the initial nuclear ''flash'' of infrared light and following the blast due their exposure to the [[firestorm]] and general fires that developed in both cities respectively, so the survivors also underwent [[Hyperthermia therapy]] to various degrees. Hyperthermia, or heat exposure following irradiation is well known in the field of radiation therapy to markedly increase the severity of free-radical insults to cells following irradiation. Presently however no attempts have been made to cater for this [[confounding]] factor, it is not included or corrected for in the dose-response curves for this group.

      Additional data has been collected from recipients of selected medical procedures and the 1986 [[Chernobyl disaster]]. There is a clear link<ref>(see the [http://www.unscear.org/unscear/en/publications/2000_2.html UNSCEAR 2000 Report, Volume 2: Effects]</ref> between the Chernobyl accident and the unusually large number, approximately 1,800, of thyroid cancers reported in contaminated areas, mostly in children.

      For low levels of radiation, the biological effects are so small they may not be detected in epidemiological studies. Although radiation may cause cancer at high doses and high dose rates, [[public health]] data regarding lower levels of exposure, below about 10 mSv (1,000 mrem), are harder to interpret. To assess the health impacts of lower [[radiation dose]]s, researchers rely on models of the process by which radiation causes cancer; several models that predict differing levels of risk have emerged.

      Studies of occupational workers exposed to chronic low levels of radiation, above normal background, have provided mixed evidence regarding cancer and transgenerational effects. Cancer results, although uncertain, are consistent with estimates of risk based on atomic bomb survivors and suggest that these workers do face a small increase in the probability of developing leukemia and other cancers. One of the most recent and extensive studies of workers was published by Cardis ''et al.'' in 2005.<ref>{{cite journal |last1=Cardis |first1=E |last2=Vrijheid |first2=M  |last3=Blettner |first3=M |display-authors=3 |title=Risk of cancer after low doses of ionising radiation: retrospective cohort study in 15 countries |journal=BMJ |volume=331 |issue=7508 |page=77 |date=July 2005 |pmid=15987704 |pmc=558612 |doi=10.1136/bmj.38499.599861.E0 |last4=Gilbert |last5=Hakama |last6=Hill |last7=Howe |last8=Kaldor |last9=Muirhead |last10=Schubauer-Berigan |last11=Yoshimura |last12=Bermann |last13=Cowper |last14=Fix |last15=Hacker |last16=Heinmiller |last17=Marshall |last18=Thierry-Chef |last19=Utterback |last20=Ahn |last21=Amoros |last22=Ashmore |last23=Auvinen |last24=Bae |last25=Solano |last26=Biau |last27=Combalot |last28=Deboodt |last29=Diez Sacristan |last30=Eklof}}</ref> There is evidence that low level, brief radiation exposures are not harmful.<ref name="Olipitz2012">{{cite journal|publisher=National Institute of Environmental Health Sciences|journal=Environmental Health Perspectives|volume=120|issue=8|pages=1130–6|author=Werner Olipitz|title=Integrated Molecular Analysis Indicates Undetectable DNA Damage in Mice after Continuous Irradiation at ~400-fold Natural Background Radiation|doi=10.1289/ehp.1104294|pmid=22538203|date=April 2012|last2=Wiktor-Brown|last3=Shuga|last4=Pang|last5=McFaline|last6=Lonkar|last7=Thomas|last8=Mutamba|last9=Greenberger|last10=Samson|last11=Dedon|last12=Yanch|last13=Engelward|display-authors=etal|pmc=3440074}}</ref>

      ===Modelling===
      [[File:Radiations at low doses.gif|thumb|Alternative assumptions for the extrapolation of the cancer risk vs. radiation dose to low-dose levels, given a known risk at a high dose: supra-linearity (A), linear (B), linear-quadratic (C) and [[hormesis]] (D).]]
      The linear dose-response model suggests that any increase in dose, no matter how small, results in an incremental increase in risk. The [[linear no-threshold model]] (LNT) hypothesis is accepted by the [[International Commission on Radiological Protection]] (ICRP) and regulators around the world.<ref name=autogenerated1>[https://web.archive.org/web/20070703191939/http://www.nap.edu/execsumm_pdf/11340.pdf  Health Risks from Exposure to Low Levels of Ionizing Radiation: BEIR VII – Phase 2]. Committee to Assess Health Risks from Exposure to Low Levels of Ionizing Radiation, National Research Council (2006) Free Executive Summary</ref> According to this model, about 1% of the global population develop cancer as a result of natural [[background radiation]] at some point in their lifetime. For comparison, 13% of deaths in 2008 are attributed to cancer, so background radiation could plausibly be a small contributor.<ref name="WHO">{{cite web | last =WHO | author-link =World Health Organization | title =Cancer | publisher =World Health Organization |date=Oct 2010 | url =https://www.who.int/mediacentre/factsheets/fs297/en/ | access-date =2011-01-05}}</ref>

      Many parties have criticized the ICRP's adoption of the linear no-threshold model for exaggerating the effects of low radiation doses. The most frequently cited alternatives are the "linear quadratic" model and the "hormesis" model. The linear quadratic model is widely viewed in [[radiotherapy]] as the best model of cellular survival,<ref>{{cite book|title=Radiation Oncology Physics: A Handbook for Teachers and Students|year=2005|publisher=International Atomic Energy Agency|location=Vienna|isbn=978-92-0-107304-4|url=http://www-pub.iaea.org/mtcd/publications/pdf/pub1196_web.pdf|editor=Podgorsak, E.B.|access-date=1 June 2012|page=493}}</ref> and it is the best fit to leukemia data from the LSS cohort.<ref name=Little />

      {| class="wikitable"
      |-
      | Linear no-threshold || F(D)=α⋅D
      |-
      | Linear quadratic || F(D)=α⋅D+β⋅D<sup>2</sup>
      |-
      | Hormesis || F(D)=α⋅[D−β]
      |}

      In all three cases, the values of alpha and beta must be determined by regression from human exposure data. Laboratory experiments on animals and tissue samples is of limited value. Most of the high quality human data available is from high dose individuals, above 0.1 Sv, so any use of the models at low doses is an extrapolation that might be under-conservative or over-conservative. There is not enough human data available to settle decisively which of these model might be most accurate at low doses. The consensus has been to assume linear no-threshold because it the simplest and most conservative of the three.

      [[Radiation hormesis]] is the conjecture that a low level of ionizing radiation (i.e., near the level of Earth's natural background radiation) helps "immunize" cells against DNA damage from other causes (such as free radicals or larger doses of ionizing radiation), and decreases the risk of cancer. The theory proposes that such low levels activate the body's DNA repair mechanisms, causing higher levels of cellular DNA-repair proteins to be present in the body, improving the body's ability to repair DNA damage. This assertion is very difficult to prove in humans (using, for example, statistical cancer studies) because the effects of very low ionizing radiation levels are too small to be statistically measured amid the "noise" of normal cancer rates.

      The idea of radiation hormesis is considered unproven by regulatory bodies. If the hormesis model turns out to be accurate, it is conceivable that current regulations based on the LNT model will prevent or limit the hormetic effect, and thus have a negative impact on health.<ref>{{cite book|last=Sanders|first=Charles L.|title=Radiation Hormesis and the Linear-No-Threshold Assumption|url=https://archive.org/details/radiationhormesi00sand|url-access=limited|publisher=Springer|location=Heidelberg, Germany|year=2010|page=[https://archive.org/details/radiationhormesi00sand/page/n12 3]|chapter=The LNT assumption|isbn=978-3-642-03719-1|quote=...a large number of experimental and epidemiological studies challenge the validity of the LNT assumption, strongly suggesting the presence of a threshold and/or benefits from low doses of ionizing radiation|bibcode=2010rhln.book.....S}}</ref>

      Other non-linear effects have been observed, particularly for [[Effective dose (radiation)|internal dose]]s. For example, [[iodine-131]] is notable in that high doses of the isotope are sometimes less dangerous than low doses, since they tend to kill [[thyroid]] tissues that would otherwise become cancerous as a result of the radiation. Most studies of very-high-dose I-131 for treatment of [[Graves disease]] have failed to find any increase in thyroid cancer, even though there is linear increase in thyroid cancer risk with I-131 absorption at moderate doses.<ref name="Rivkees">{{cite journal |title=The Management of Graves' Disease in Children, with Special Emphasis on Radioiodine Treatment |year=1998 |last1=Rivkees |first1=Scott A. |first2=Charles |last2=Sklar |first3=Michael |last3=Freemark |journal=Journal of Clinical Endocrinology & Metabolism |volume=83 |issue=11 |pmid=9814445 |pages=3767–76|doi=10.1210/jcem.83.11.5239 |doi-access=free }}</ref>

      ==Public safety==
      Low-dose exposures, such as living near a [[nuclear power plant]] or a [[coal-fired power plant]], which has higher emissions than nuclear plants, are generally believed to have no or very little effect on cancer development, barring accidents.<ref name=Little /> Greater concerns include radon in buildings and overuse of medical imaging.

      The [[International Commission on Radiological Protection]] (ICRP) recommends limiting artificial irradiation of the public to an average of 1 mSv (0.001 Sv) of effective dose per year, not including medical and occupational exposures.<ref name="ICRP103">{{cite journal|title=The 2007 Recommendations of the International Commission on Radiological Protection|journal=Annals of the ICRP|year=2007|volume=37|series=ICRP publication 103|issue=2–4|url=http://www.icrp.org/publication.asp?id=ICRP%20Publication%20103|access-date=17 May 2012|isbn=978-0-7020-3048-2|author1=Icrp}}</ref>  For comparison, radiation levels inside the US capitol building are 0.85 mSv/yr, close to the regulatory limit, because of the uranium content of the granite structure.<ref name="FUSRAP" >{{cite web|last=Formerly Utilized Sites Remedial Action Program|title=Radiation in the Environment|url=http://www.lrb.usace.army.mil/fusrap/docs/fusrap-fs-radenvironment-2008-09.pdf|archive-url=https://web.archive.org/web/20090115224155/http://www.lrb.usace.army.mil/fusrap/docs/fusrap-fs-radenvironment-2008-09.pdf|archive-date=January 15, 2009|publisher=US Army Corps of Engineers|access-date=18 May 2012}}</ref> According to the ICRP model, someone who spent 20 years inside the capitol building would have an extra one in a thousand chance of getting cancer, over and above any other existing risk. (20 yr × 0.85 mSv/yr × 0.001 Sv/mSv × 5.5%/Sv ≈ 0.1%) That "existing risk" is much higher; an average American would have a one in ten chance of getting cancer during this same 20-year period, even without any exposure to artificial radiation.

      Internal contamination due to ingestion, inhalation, injection, or absorption is a particular concern because the radioactive material may stay in the body for an extended period of time, "committing" the subject to accumulating dose long after the initial exposure has ceased, albeit at low dose rates. Over a hundred people, including [[Eben Byers]] and the [[radium girls]], have received [[committed dose]]s in excess of 10 Gy and went on to die of cancer or natural causes, whereas the same amount of acute external dose would invariably cause an earlier death by [[acute radiation syndrome]].<ref>{{cite book|last=Rowland|first=R.E.|title=Radium in Humans: A Review of U.S. Studies|year=1994|publisher=Argonne National Laboratory|url=http://www.osti.gov/accomplishments/documents/fullText/ACC0029.pdf|access-date=24 May 2012}}</ref>

      Internal exposure of the public is controlled by regulatory limits on the radioactive content of food and water. These limits are typically expressed in [[becquerel]]/kilogram, with different limits set for each contaminant.

      ==History==
      Although radiation was discovered in late 19th century, the dangers of radioactivity and of radiation were not immediately recognized. Acute effects of radiation were first observed in the use of X-rays when [[Wilhelm Röntgen]] intentionally subjected his fingers to X-rays in 1895. He published his observations concerning the burns that developed, though he attributed them to ozone rather than to X-rays. His injuries healed later.

      The genetic effects of radiation, including the effects on cancer risk, were recognized much later. In 1927 [[Hermann Joseph Muller]] published research showing genetic effects,<ref>{{cite journal|last=Muller|first=Hermann Joseph|title=Artificial Mutation of the Gene|journal=Science|date=22 July 1927|volume=LXVI|issue=1699|pages=84–87|url=http://www.esp.org/foundations/genetics/classical/holdings/m/hjm-1927a.pdf|access-date=13 November 2012|doi=10.1126/science.66.1699.84|pmid=17802387|bibcode=1927Sci....66...84M}}</ref> and in 1946 was awarded the [[Nobel Prize]] for his findings. Radiation was soon linked to bone cancer in the [[radium dial painters]], but this was not confirmed until large-scale animal studies after World War II. The risk was then quantified through long-term studies of [[atomic bomb survivors]].

      Before the biological effects of radiation were known, many physicians and corporations had begun marketing radioactive substances as [[patent medicine]] and [[radioactive quackery]]. Examples were radium [[enema]] treatments, and radium-containing waters to be drunk as tonics. [[Marie Curie]] spoke out against this sort of treatment, warning that the effects of radiation on the human body were not well understood. Curie later died of [[aplastic anemia]], not cancer. [[Eben Byers]], a famous American socialite, died of multiple cancers in 1932 after consuming large quantities of [[radium]] over several years; his death drew public attention to dangers of radiation. By the 1930s, after a number of cases of bone necrosis and death in enthusiasts, radium-containing medical products had nearly vanished from the market.

      In the United States, the experience of the so-called [[Radium Girls]], where thousands of radium-dial painters contracted oral cancers, popularized the warnings of occupational health associated with radiation hazards. [[Robley D. Evans (physicist)|Robley D. Evans]], at MIT, developed the first standard for permissible body burden of radium, a key step in the establishment of [[nuclear medicine]] as a field of study. With the development of [[nuclear reactor]]s and [[nuclear weapon]]s in the 1940s, heightened scientific attention was given to the study of all manner of radiation effects.

