  - title: 2023 heat waves
    pageid: 73879319
    extract: |-
      A number of heat waves began across parts of the northern hemisphere in April 2023. Various heat records have been broken, with July being the hottest month ever recorded.
      Scientists have attributed the heat waves to man-made climate change. Another cause is the El Niño phenomena which began to develop in 2023. 
      However, recent findings show that climate change is exacerbating the strength of El Niño.
      The heatwaves caused severe damage in areas such as the western United States, southern Europe, and parts of Asia. 
      The abnormal temperatures have led to a "very extreme" likelihood of wildfires, according to the Fire Weather Index.
      The heatwaves were also occurring alongside some unusually heavy flooding (i.e. the 2023 European floods).
      In response to the heatwave some leaders called for greater action to stop climate change. US President Joe Biden took some measures to protect the population from extreme heat.
    source: |-
      {{Short description|List of heat waves}}{{pp-extended|small=yes}}
      {{Use dmy dates|date=July 2023}}
      {{Multiple issues|{{Cleanup rewrite|date=July 2023}}
      {{Expert needed|severe weather|ex2=oceans|ex3=Norway|date=August 2023}}}}

      [[File:July 2023 was the warmest globally.png|thumb|400px|right|With a deviation of over 0.7&nbsp;°C from the average of the years 1991 to 2020, July 2023 marks the warmest July ever recorded. Numerous regions in the Northern Hemisphere, particularly in southern Europe, went through severe heatwaves, with anomalies of +4&nbsp;°C in Italy, Greece, and Spain. Additionally, North Africa and the Canadian Arctic saw notably high temperatures, reaching peak anomalies of +5&nbsp;°C and +7&nbsp;°C, respectively. More detailed information can be found in the C3S Climate Bulletin.]]

      A number of [[heat wave]]s began across parts of the northern hemisphere in April 2023. Various heat records have been broken,<ref name="World Weather Attribution">{{cite web |title=Extreme heat in North America, Europe and China in July 2023 made much more likely by climate change |url=https://www.worldweatherattribution.org/extreme-heat-in-north-america-europe-and-china-in-july-2023-made-much-more-likely-by-climate-change/ |website=World Weather Attribution |access-date=3 August 2023 |date=25 July 2023 |archive-date=4 August 2023 |archive-url=https://web.archive.org/web/20230804082454/https://www.worldweatherattribution.org/extreme-heat-in-north-america-europe-and-china-in-july-2023-made-much-more-likely-by-climate-change/ |url-status=live}}</ref> with July being the hottest month ever recorded.<ref name="Scientific American">{{cite web|first1=Andrea|last1=Thompson|date=27 July 2023|title=July 2023 Is Hottest Month Ever Recorded on Earth|url=https://www.scientificamerican.com/article/july-2023-is-hottest-month-ever-recorded-on-earth/|website=Scientific American|access-date=3 August 2023|archive-date=16 August 2023|archive-url=https://web.archive.org/web/20230816163756/https://www.scientificamerican.com/article/july-2023-is-hottest-month-ever-recorded-on-earth/|url-status=live}}</ref>

      Scientists have [[Extreme event attribution|attributed]] the heat waves to [[man-made climate change]].<ref name="World Weather Attribution" /><ref name="Scientific American" /> Another cause is the [[El Niño]] phenomena which began to develop in 2023.<ref name="NPR">{{cite news |last1=Sommer |first1=Lauren |title=Global heat waves show climate change and El Niño are a bad combo |url=https://www.npr.org/2023/06/28/1184677011/heat-wave-climate-change-el-nino-texas |access-date=14 August 2023 |agency=NPR |date=28 June 2023 |archive-date=14 August 2023 |archive-url=https://web.archive.org/web/20230814160819/https://www.npr.org/2023/06/28/1184677011/heat-wave-climate-change-el-nino-texas |url-status=live}}</ref> 
      However, recent findings show that climate change is exacerbating the strength of [[El Niño]].<ref name="Dean">{{cite web |last1=Lewin |first1=Dean |title=New study helps solve a 30-year-old puzzle: how is climate change affecting El Niño and La Niña? |url=https://theconversation.com/new-study-helps-solve-a-30-year-old-puzzle-how-is-climate-change-affecting-el-nino-and-la-nina-205128 |website=The Conversation |date=18 May 2023 |access-date=14 August 2023 |archive-date=14 August 2023 |archive-url=https://web.archive.org/web/20230814160821/https://theconversation.com/new-study-helps-solve-a-30-year-old-puzzle-how-is-climate-change-affecting-el-nino-and-la-nina-205128 |url-status=live}}</ref>

      The heatwaves caused severe damage in areas such as the [[2023 Western North America heat wave|western United States]], [[2023 European heat waves|southern Europe]], and [[2023 Asia heat wave|parts of Asia]].<ref name=Igini>{{cite web |last1=IGINI |first1=MARTINA |title=More than 80% of People on Earth Experienced a Hotter July Triggered by Climate Change: Report |url=https://earth.org/more-than-80-of-people-on-earth-experienced-a-hotter-july-triggered-by-climate-change-report/ |website=Earth.Org |date=4 August 2023 |publisher=Climate central |access-date=4 August 2023 |archive-date=4 August 2023 |archive-url=https://web.archive.org/web/20230804080142/https://earth.org/more-than-80-of-people-on-earth-experienced-a-hotter-july-triggered-by-climate-change-report/ |url-status=live}}</ref> 
      The abnormal temperatures have led to a "very extreme" likelihood of wildfires, according to the [[Fire Weather Index]].<ref name="Copernicus">{{cite web |title=The European heatwave of July 2023 in a longer-term context |url=https://climate.copernicus.eu/european-heatwave-july-2023-longer-term-context |website=Copernicus |access-date=3 August 2023 |date=20 July 2023 |archive-date=6 August 2023 |archive-url=https://web.archive.org/web/20230806175102/https://climate.copernicus.eu/european-heatwave-july-2023-longer-term-context |url-status=live}}</ref>

      The heatwaves were also occurring alongside some unusually heavy flooding<ref name="auto14">{{Cite web|url=https://www.lancs.live/news/lancashire-news/six-people-rescued-firefighters-floodwater-27379544|title=Six people rescued by firefighters as floodwater stops vehicles|first=Kirstie|last=McCrum|date=July 23, 2023|website=LancsLive|access-date=17 August 2023|archive-date=24 July 2023|archive-url=https://web.archive.org/web/20230724085440/https://www.lancs.live/news/lancashire-news/six-people-rescued-firefighters-floodwater-27379544|url-status=live}}</ref><ref name="auto13">{{Cite web|url=https://www.lancashiretelegraph.co.uk/news/national/23720730.33-dead-heavy-rain-triggers-floods-landslides-indias-himalayan-region/|title=33 dead as heavy rain triggers floods and landslides in India's Himalayan region|date=August 14, 2023|website=Lancashire Telegraph|access-date=17 August 2023|archive-date=17 August 2023|archive-url=https://web.archive.org/web/20230817202929/https://www.lancashiretelegraph.co.uk/news/national/23720730.33-dead-heavy-rain-triggers-floods-landslides-indias-himalayan-region/|url-status=live}}</ref> (i.e. the [[2023 European floods]]).

      In response to the heatwave some leaders called for greater action to stop climate change.<ref name="auto"/> US President [[Joe Biden]] took some measures to protect the population from extreme heat.<ref name="White House"/><ref name="Barbara"/>

      == Background ==
      [[File:1940-2023 Global surface temperature - stacked - Copernicus.jpg |thumb |2023 saw the highest global average surface temperature in recorded history.<ref name=CopernicusGMST_thru2023>{{cite web |title=The 2023 Annual Climate Summary / Global Climate Highlights 2023 |url=https://climate.copernicus.eu/global-climate-highlights-2023 |publisher=Copernicus Programme |archive-url=https://web.archive.org/web/20240109154027/https://climate.copernicus.eu/global-climate-highlights-2023 |archive-date=9 January 2024 |date=9 January 2024 |url-status=live }}</ref>]]
      {{ multiple image |total_width=450
      | image1= 1994- Global average temperature during June-July-August.svg |caption1= 2023's June–July–August season was the warmest on record globally by a large margin, as El Niño conditions continued to develop.<ref name=Copernicus_202309>{{cite web |title=August Climate Bulletins / Summer 2023: the hottest on record |url=https://climate.copernicus.eu/summer-2023-hottest-record |publisher=Copernicus Programme |archive-url=https://web.archive.org/web/20230908232623/https://climate.copernicus.eu/summer-2023-hottest-record |archive-date=8 September 2023 |date=6 September 2023 |url-status=live}}</ref>
      | image2=1940- September global average temperature changes.svg |caption2= September 2023 was the warmest September on record globally, with an average surface air temperature 0.5 °C above the temperature of the previous warmest September (2020).<ref name=CopernicusSept_20231005>{{cite web |title=Copernicus: September 2023 – unprecedented temperature anomalies; 2023 on track to be the warmest year on record |url=https://climate.copernicus.eu/copernicus-september-2023-unprecedented-temperature-anomalies |website=climate.copernicus.eu |publisher=Copernicus Programme |archive-url=https://web.archive.org/web/20231005165335/https://climate.copernicus.eu/copernicus-september-2023-unprecedented-temperature-anomalies |archive-date=5 October 2023 |date=5 October 2023 |url-status=live}}</ref>
      }}
      Heat waves are one of the deadliest hazards, and in line with the IPCC prediction their frequency and magnitude are rising due to [[man-made climate change]]. The July heat wave in Southern Europe and North America would be virtually impossible and the heat wave in China would be a 1 in 250-year event without climate change. But due to climate change those events are now common.<ref name="World Weather Attribution" />

      July 2023 was the hottest July on Earth in the last 120,000 years and the hottest July from the beginning of temperature measurement with a wide margin.<ref name="Scientific American" /> During each day in July 2023, two billion people experienced heat conditions made at least three times more likely due to climate change and 6.5&nbsp;billion people experienced this impact at least one day in the month.<ref name=Igini/>

      Another cause is the [[El Niño]] phenomena which began to develop in 2023. El Niño begin when parts of the Pacific Ocean became warmer than average and generally cause a rise in the global temperature as it "is moving some of the energy up from depth and dumping it into the atmosphere",<ref name="NPR"/> However, recent findings show that climate change is exacerbating the strength of El Niño. It is increasing "the "variability" of the [[El Niño–Southern Oscillation|El Niño-Southern Oscillation]]" creating both stronger [[El Niño]] and [[La Niña]] events.<ref name="Dean"/>

      Climate change may also cause changes in the [[jet stream]]s that probably contributed to the heat waves. Warming in certain Arctic regions makes the jet stream weaker and wavier, causing different weather patterns to stay longer over the same place.<ref>{{cite news |last1=Tetley |first1=Liza |title=How Unusual Jet Stream Patterns Make Heat Waves Worse |url=https://www.washingtonpost.com/business/2023/08/09/how-jet-stream-patterns-are-fueling-heat-waves-extreme-temperatures/c965f706-3698-11ee-ac4e-e707870e43db_story.html |access-date=15 August 2023 |agency=The Washington Post |date=9 August 2023 |archive-date=8 November 2023 |archive-url=https://web.archive.org/web/20231108120458/https://www.washingtonpost.com/business/2023/08/09/how-jet-stream-patterns-are-fueling-heat-waves-extreme-temperatures/c965f706-3698-11ee-ac4e-e707870e43db_story.html |url-status=live}}</ref>

      ==International==
      2023 was the hottest year on record, 1.48&nbsp;°C warmer than the pre-industrial level.<ref>
      {{cite web
       | url = https://climate.copernicus.eu/copernicus-2023-hottest-year-record
       | title = Copernicus: 2023 is the hottest year on record, with global temperatures close to the 1.5&nbsp;°C limit
       | last = 
       | first = 
       | date = 2024-01-09
       | website = 
       | publisher = Copernicus
       | access-date = 2024-01-09
       | quote = Unprecedented global temperatures from June onwards led 2023 to become the warmest year on record – overtaking by a large margin 2016, the previous warmest year. 2023 was 0.60&nbsp;°C warmer than the 1991-2020 average and 1.48&nbsp;°C warmer than the 1850-1900 pre-industrial level 
      }}</ref>
      [[File:The Global Air Surface Temperature has reached a new record high (Copernicus).png|thumb|2023 surface air temperatures breached the 1.5&nbsp;°C threshold for a record number of days.]]
      The world breached the [[Paris Agreement]] 1.5&nbsp;°C warming mark for a record number of days.<ref>{{cite news |last1=McGrath |first1=Matt |last2=Poynting |first2=Mark |last3=Dale |first3=Becky |last4=Tauschinsk |first4=Jana |date=2023-10-07 |title=World breaches key 1.5C warming mark for record number of days |trans-title= |url=https://www.bbc.com/news/science-environment-66857354 |url-status=live |work=BBC |location= |archive-url=https://web.archive.org/web/20231007152858/https://www.bbc.com/news/science-environment-66857354 |archive-date=7 October 2023 |access-date=2023-10-07 |via= |quote=}}</ref> From January to September, the global mean temperature was 1.40&nbsp;°C higher than the pre-industrial average (1850–1900).<ref>{{cite web |last= |first= |date=2023-10-05 |title=Copernicus: September 2023 – unprecedented temperature anomalies; 2023 on track to be the warmest year on record |url=https://climate.copernicus.eu/copernicus-september-2023-unprecedented-temperature-anomalies |access-date=2023-10-05 |website=climate.copernicus.eu |publisher=Copernicus |quote=For January to September 2023, the global mean temperature for 2023 to date is 1.40&nbsp;°C higher than the pre-industrial average (1850–1900). |archive-date=5 October 2023 |archive-url=https://web.archive.org/web/20231005165335/https://climate.copernicus.eu/copernicus-september-2023-unprecedented-temperature-anomalies |url-status=live}}</ref> January 2023 was the seventh warmest on record – 0.25&nbsp;°C warmer than the normal but 0.33&nbsp;°C cooler than January 2020.<ref>{{Cite news |first1=Ian |last1=Livingston |title=Thousands of records shattered in historic winter warm spell in Europe |newspaper=[[The Washington Post]] |url=https://www.washingtonpost.com/weather/2023/01/02/record-warm-new-year-europe/ |access-date=2023-08-10 |archive-date=6 April 2023 |archive-url=https://web.archive.org/web/20230406011544/https://www.washingtonpost.com/weather/2023/01/02/record-warm-new-year-europe/ |url-status=live}}</ref> In July, the global average temperature was 17.32&nbsp;°C (63.17&nbsp;°F).<ref name="auto20">{{Cite news|url=https://www.bbc.com/news/world-us-canada-66160243|title=Canada's Northwest Territories records its hottest temperature|work=BBC News|date=10 July 2023|access-date=8 October 2023|archive-date=8 October 2023|archive-url=https://web.archive.org/web/20231008155811/https://www.bbc.com/news/world-us-canada-66160243|url-status=live}}</ref>

      ==Oceans==
      [[File:Daily Sea Surface Temperatures 60S-60N 1979-2023.png|thumb |Sea surface temperatures from mid 2023 exceeded previous records in extrapolar regions (between 60° north and 60° south latitudes).]]
      Above-average temperatures in the northeastern South Pacific were recorded in March 2023.<ref>{{Cite web|url=https://climate.copernicus.eu/surface-air-temperature-march-2023|title=Surface air temperature for March 2023 {{pipe}} Copernicus|website=climate.copernicus.eu|access-date=18 August 2023|archive-date=1 June 2023|archive-url=https://web.archive.org/web/20230601160359/https://climate.copernicus.eu/surface-air-temperature-march-2023|url-status=live}}</ref> The average sea temperature of the [[North Atlantic Ocean]] was {{convert|19.9|°C}} on 5 March, exceeding the previous record set in 2020 by 0.1&nbsp;°C. On 5 June, the recorded temperature rose to {{convert|22.7|°C}}, surpassing a record set in 2010 by 0.1&nbsp;°C.<ref name=Dineen2023>{{Cite web|url=https://www.newscientist.com/article/2378026-north-atlantic-ocean-has-reached-record-high-surface-temperatures/|title=North Atlantic Ocean has reached record-high surface temperatures {{pipe}} New Scientist|date=June 29, 2023|archive-url=https://web.archive.org/web/20230629172246/https://www.newscientist.com/article/2378026-north-atlantic-ocean-has-reached-record-high-surface-temperatures/ |archive-date=29 June 2023|url-status=live|first1=James|last1=Dineen|url-access=limited}}</ref> On 1 August 2023, the average [[sea surface temperature]] reached {{convert|20.96|°C}}, the highest ever recorded.<ref>{{cite news
       |author1      = Georgina Rannard
       |author2      = Mark Poynting
       |author3      = Jana Tauschinski
       |author4      = Becky Dale
       |date         = 4 Aug 2023
       |title        = Ocean heat record broken, with grim implications for the planet
       |url          = https://www.bbc.com/news/science-environment-66387537
       |work         = BBC
       |access-date  = 5 Aug 2023
       |archive-date = 14 August 2023
       |archive-url  = https://web.archive.org/web/20230814202222/https://www.bbc.com/news/science-environment-66387537
       |url-status   = live
      }}</ref> In September, the sea ice in Antarctica was far below any previous recorded winter level.<ref>{{cite news
       |author1      = Georgina Rannard
       |author2      = Becky Dale
       |author3      = Erwan Rivault
       |date         = 17 Sep 2023
       |title        = Antarctic sea-ice at 'mind-blowing' low alarms experts
       |url          = https://www.bbc.com/news/science-environment-66724246
       |work         = BBC
       |access-date  = 17 Sep 2023
       |archive-date = 16 September 2023
       |archive-url  = https://web.archive.org/web/20230916231114/https://www.bbc.com/news/science-environment-66724246
       |url-status   = live
      }}</ref>

      ==Africa==
      ===North Africa===
      There was a three-day heatwave in the [[Western Mediterranean]] region, originating in North Africa, from 26 to 28 April. The temperature reached over {{Convert|40|C|F}} in parts of Morocco and Algeria.<ref name="CarbonBrief">{{Cite web |last=Tandon |first=Ayesha |date=5 May 2023 |title=Western-Mediterranean heatwave 'almost impossible' without climate change |url=https://www.carbonbrief.org/western-mediterranean-heatwave-almost-impossible-without-climate-change/ |access-date=25 May 2023 |website=[[Carbon Brief]] |archive-date=25 May 2023 |archive-url=https://web.archive.org/web/20230525005353/https://www.carbonbrief.org/western-mediterranean-heatwave-almost-impossible-without-climate-change/ |url-status=live}}</ref> Morocco, Algeria and Tunisia still reached temperatures of up to {{convert|47|C|F}} on 13 July.<ref name=":0">{{Cite web|url=https://crisis24.garda.com/alerts/2023/07/north-africa-heatwave-forecast-to-persist-across-much-of-algeria-morocco-and-tunisia-through-at-least-july-21-update-1|title=North Africa: Heatwave forecast to persist across much of Algeria, Morocco, and Tunisia through at least July 21 /update 1|website=Crisis24|date=13 July 2023|access-date=20 July 2023|archive-date=20 July 2023|archive-url=https://web.archive.org/web/20230720054032/https://crisis24.garda.com/alerts/2023/07/north-africa-heatwave-forecast-to-persist-across-much-of-algeria-morocco-and-tunisia-through-at-least-july-21-update-1|url-status=live}}</ref> Another heat wave hit [[Tabarka]], Tunisia, on 14 July.<ref name="Wilting Flowers">{{Cite web |date=14 July 2023 |title=Tunisia heatwave wilts farmer's edible flowers |url=https://news.yahoo.com/tunisia-heatwave-wilts-farmers-edible-171116702.html |publisher=[[Yahoo News]] |agency=[[Reuters]] |access-date=20 July 2023 |archive-date=20 July 2023 |archive-url=https://web.archive.org/web/20230720054030/https://news.yahoo.com/tunisia-heatwave-wilts-farmers-edible-171116702.html |url-status=live}}</ref>

      Data recorded on 18 July showed temperatures of {{convert|46.9|C|F}} in [[Tozeur]], Tunisia, {{convert|47.4|C|F}} in [[Chlef]], Algeria (with many other places exceeding {{Convert|44|C|F}}), and {{Convert|45.2|C|F}} in Kharga, Egypt.<ref name="auto2">{{Cite web |last1=Fagan |first1=Laureen |date=18 July 2023 |title=WMO: Heat wave affects North Africa but also Mediterranean Sea temps {{pipe}} Africa Times |url=https://africatimes.com/2023/07/18/wmo-heat-wave-affects-north-africa-but-also-mediterranean-sea-temps/ |website=Africa Times}}</ref> There had been a week of power cuts and {{convert|40|C|F}} temperatures in [[Cairo]] by 19 July.<ref>{{Cite web |date=19 July 2023 |title=Egypt cuts power to ease loads during heatwave |url=https://english.alarabiya.net/News/middle-east/2023/07/19/Egypt-North-African-country-cuts-power-to-ease-loads-during-heatwave |website=[[Al Arabiya English]] |access-date=20 July 2023 |archive-date=20 July 2023 |archive-url=https://web.archive.org/web/20230720042949/https://english.alarabiya.net/News/middle-east/2023/07/19/Egypt-North-African-country-cuts-power-to-ease-loads-during-heatwave |url-status=live}}</ref>

      The heat wave became even more intense in the following days. Data recorded on 23 July showed temperatures of {{convert|48.7|C|F}} in [[Algiers]], Algeria, the highest recorded temperature in the city,<ref name="wp1">{{cite news |last1=Livingston |first1=Ian |date=25 July 2023 |title=Albania hits all-time high as heat blasts southern Europe and fires rage |newspaper=[[Washington Post]] |url=https://www.washingtonpost.com/weather/2023/07/24/greece-southern-europe-heatwave-fires |access-date=7 August 2023 |archive-date=2 August 2023 |archive-url=https://web.archive.org/web/20230802115554/http://www.washingtonpost.com/weather/2023/07/24/greece-southern-europe-heatwave-fires/ |url-status=live}}</ref> as well as {{convert|49|C|F}} temperatures in Kairouan, Tunisia. On 24 July, [[Tunis]], Tunisia reached a temperature of {{convert|48.9|C|F}}. On 24 July, [[Ghar el-Melh]] in northern Tunisia reached a temperature of {{convert|50|C|F}}.<ref>{{Cite web |last=Cordall |first=Simon Speakman |date=26 July 2023 |title=Heatwave and drought leave Tunisia farmers struggling to survive |url=https://www.aljazeera.com/news/2023/7/26/heatwave-and-drought-leave-tunisia-farmers-struggling-to-survive |website=[[Al Jazeera English]] |access-date=18 August 2023 |archive-date=18 August 2023 |archive-url=https://web.archive.org/web/20230818070901/https://www.aljazeera.com/news/2023/7/26/heatwave-and-drought-leave-tunisia-farmers-struggling-to-survive |url-status=live}}</ref>

      Heavy rain flooded [[Al-Marj]] and [[Derna, Libya|Derna]] on 12 September, killing nearly 250 in Derna, Libya.<ref>{{Cite news |last= |first= |date=2023-09-11 |title=At least 2,000 feared dead as 'entire neighbourhoods swept into sea' in Libya floods |work=[[The Daily Telegraph]] |url=https://www.telegraph.co.uk/world-news/2023/09/11/libya-floods-derna-shahat-storm-daniel-deaths/ |access-date=2023-10-22 |issn=0307-1235 |archive-date=21 September 2023 |archive-url=https://web.archive.org/web/20230921045047/https://www.telegraph.co.uk/world-news/2023/09/11/libya-floods-derna-shahat-storm-daniel-deaths/ |url-status=live}}</ref> Up to 20,000 were killed on 14 September, as new floods hit [[Bengazi]], Libya.<ref>{{Cite news |last=Housden |first=Jacqui |date=14 September 2023 |title=i morning briefing: Why were the Libya floods so catastrophic? |work=[[i (newspaper)|i]] |url=https://inews.co.uk/news/i-morning-briefing-why-libya-floods-catastrophic-2615561 |access-date=22 October 2023 |archive-date=20 September 2023 |archive-url=https://web.archive.org/web/20230920113414/https://inews.co.uk/news/i-morning-briefing-why-libya-floods-catastrophic-2615561 |url-status=live}}</ref>

      ===Sub-Saharan Africa===
      Data recorded on 18 July showed temperatures of {{convert|45.8|C|F}} in the Faya station, Chad and {{Convert|44.4|C|F}} temperatures in [[Bilma]], Niger.<ref name="auto2" /> 20 July saw temperatures suddenly drop to a seasonal low.<ref>{{cite web |date=20 July 2023 |title=Top 10 African countries facing record-breaking heat waves in 2023 |url=https://www.africanews.com/2023/07/20/top-10-african-countries-facing-record-breaking-heat-waves-in-2023/ |access-date=22 October 2023 |website=[[Africanews]] |archive-date=30 August 2023 |archive-url=https://web.archive.org/web/20230830140004/https://www.africanews.com/2023/07/20/top-10-african-countries-facing-record-breaking-heat-waves-in-2023/ |url-status=live}}</ref>

      ==Asia==
      {{main|2023 Asia heat wave}}

      ===Middle East===
      A heat wave in early June hit Israel, with temperatures between {{Convert|35|C|F}} in [[Jerusalem]] and {{Convert|45|C|F}} in the [[Jordan Valley]]. Along with high winds, the heat wave caused hundreds of [[bushfire]]s. Roads and some buildings were evacuated amid rolling electricity outages on 2 July. Firefighters quickly controlled the fires, limiting property damage.<ref>{{cite web | last=Berman | first=Lazar | title=Firefighters battle hundreds of blazes as Israel sizzles under blistering heatwave | website=The Times of Israel | date=2 June 2023 | url=https://www.timesofisrael.com/firefighters-battle-hundreds-of-blazes-as-israel-sizzles-under-blistering-heatwave/ | access-date=2 June 2023 | archive-date=2 June 2023 | archive-url=https://web.archive.org/web/20230602183522/https://www.timesofisrael.com/firefighters-battle-hundreds-of-blazes-as-israel-sizzles-under-blistering-heatwave/ | url-status=live}}</ref> In Iran, a {{Convert|66.7|C|F}} [[heat index]] was recorded at Persian Gulf International Airport on 16 July.<ref name="Whitt 2023" /> Al Ahsa, Saudi Arabia recorded {{Convert|50.5|C|F}} on 18 July.<ref name="auto2" />

      A local record rainfall was recorded as around 125 kilograms per square meter of rainfall (equivalent to the usual amount for the whole of September) hit Istanbul in under 6 hours on 7 September according to the city's governor as heavy rain fell across north west Turkey's Black Sea coast.<ref name="Dickerson2023">{{cite web | url=https://www.msn.com/en-gb/news/world/europe-floods-in-pictures-as-storm-daniel-hits-greece-turkey-and-bulgaria-leaving-11-dead/ar-AA1gkuVk?ocid=msedgntp&cvid=e423952deac44e1c9043fa5b194cd092&ei=31 | title=Europe floods in pictures as Storm Daniel hits Greece, Turkey and Bulgaria leaving 11 dead | website=[[MSN]] | first=Claire | last=Gilbody-Dickerson | date=6 September 2023 | access-date=8 September 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108120545/https://www.msn.com/en-gb/news/world/europe-floods-in-pictures-as-storm-daniel-hits-greece-turkey-and-bulgaria-leaving-11-dead/ar-AA1gkuVk?ocid=msedgntp&cvid=e423952deac44e1c9043fa5b194cd092&ei=31 | url-status=live}}</ref> Floods also hit houses areas in Igneada district of Kirklareli, Turkey on that day.<ref name="Dickerson2023" /> Heavy rainstorms triggered flash floods across northwest Turkey, killing at least 6 according to the state broadcaster, [[TRT Haber]].<ref name="Dickerson2023" />

      ===Other parts of Asia===
      February 2023 was recorded as the warmest February in India for 122 years.<ref>{{Cite web|first1=Doyle|last1=Rice|date=19 April 2023|url=https://www.usatoday.com/story/news/weather/2023/04/19/asia-heat-wave-worst-ever-recorded-april-climate-change/11697652002/|title='Like none before:' Deadly, record-smashing heat wave scorches Asia|website=USA TODAY|access-date=18 August 2023|archive-date=19 June 2023|archive-url=https://web.archive.org/web/20230619202806/https://www.usatoday.com/story/news/weather/2023/04/19/asia-heat-wave-worst-ever-recorded-april-climate-change/11697652002/|url-status=live}}</ref> Starting in April 2023, a record-breaking [[2023 Asia heat wave|heat wave in Asia]] has affected multiple countries, including India, China, Laos and Thailand.<ref>{{Cite web |last=Mishra |first=Stuti |date=20 April 2023 |title=One in three people on the planet hit by 'monster Asian heatwave' |url=https://www.independent.co.uk/climate-change/news/asia-heatwave-india-china-thailand-b2323666.html |access-date=9 May 2023 |website=[[The Independent]] |archive-date=23 April 2023 |archive-url=https://web.archive.org/web/20230423095452/https://www.independent.co.uk/climate-change/news/asia-heatwave-india-china-thailand-b2323666.html |url-status=live}}</ref><ref>{{Cite news |last1=Ratcliffe |first1=Rebecca |last2=Ellis-Petersen |first2=Hannah |date=19 April 2023 |title=Severe heatwave engulfs Asia causing deaths and forcing schools to close |work=[[The Guardian]] |url=https://www.theguardian.com/weather/2023/apr/19/severe-heatwave-asia-deaths-schools-close-india-china |access-date=9 May 2023 |issn=0261-3077 |archive-date=19 April 2023 |archive-url=https://web.archive.org/web/20230419113154/https://www.theguardian.com/weather/2023/apr/19/severe-heatwave-asia-deaths-schools-close-india-china |url-status=live}}</ref> Turkmenistan recorded {{Convert|42|C|F}} temperatures in early April.<ref name="auto3">{{Cite web |last=Paddison |first=Laura |date=8 June 2023 |title=Siberia swelters in record-breaking temperatures amid its 'worst heat wave in history' |url=https://www.cnn.com/2023/06/08/asia/heat-wave-siberia-climate-intl/index.html |website=CNN |access-date=22 July 2023 |archive-date=10 June 2023 |archive-url=https://web.archive.org/web/20230610042515/https://www.cnn.com/2023/06/08/asia/heat-wave-siberia-climate-intl/index.html |url-status=live}}</ref> The [[European Union]]'s [[Copernicus Atmosphere Monitoring Service]] said on 26 April that fires started in May continued to burn from Russia's Chelyabinsk, Omsk and Novosibirsk Oblasts, Primorye Krai, Kazakhstan and Mongolia.<ref name="auto6" /> Temperatures over {{Convert|40|C|F}} were recorded in Uzbekistan, Kazakhstan and China on 31 May.<ref name="auto3" />

      Beijing hit {{convert|40|C|F}} on 6 June after ten days of temperatures above {{convert|35|C|F}}. The government ordered all employers to stop any outdoor work and for people to work from home if possible.<ref>{{cite web|last1=Soni|first1=Mallika|url=https://www.hindustantimes.com/world-news/beijing-heatwave-beijings-work-from-home-order-amid-scorching-summer-heat-101688621692866.html|title=Beijing's work from home order amid scorching summer heat|date=6 July 2023|access-date=4 August 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108121650/https://www.hindustantimes.com/world-news/beijing-heatwave-beijings-work-from-home-order-amid-scorching-summer-heat-101688621692866.html|url-status=live}}</ref> Parts of Mongolia recorded {{convert|30|C|F}}, especially in eastern steppe and southern Gobi provinces, with a prediction of {{convert|38|C|F}} for 21 June, in the [[Khanbogd Soum]].<ref>{{Cite web|url=https://english.news.cn/asiapacific/20230620/7115b88455d64ac4ae5096b7d720d298/c.html|title=Mongolia issues heatwave warning-Xinhua|website=english.news.cn|access-date=20 July 2023|archive-date=20 July 2023|archive-url=https://web.archive.org/web/20230720030425/https://english.news.cn/asiapacific/20230620/7115b88455d64ac4ae5096b7d720d298/c.html|url-status=live}}</ref> Heatstroke claimed 22 lives in [[Mardan]] and [[Islamabad]], Pakistan on 26 June.<ref>{{Cite web|url=https://www.nation.com.pk/26-Jun-2023/heatstroke-claims-22-lives-in-mardan-islamabad|title=Heatstroke claims 22 lives in Mardan, Islamabad|date=26 June 2023|website=The Nation|access-date=23 July 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108121604/https://www.nation.com.pk/26-Jun-2023/heatstroke-claims-22-lives-in-mardan-islamabad|url-status=live}}</ref>

      On 16 July, China recorded a record-breaking temperature of {{convert|52.2|C|F}} at Aydang, Turpan, [[Xinjiang|Xinjiang Province]]<ref>{{Cite web |date=17 July 2023 |title=China records its highest ever temperature of {{convert|52.2|C|F}} |url=https://www.euronews.com/green/2023/07/17/record-breaking-522c-temperature-hit-china-on-sunday-stoking-fears-of-drought |access-date=17 July 2023 |website=Euronews |archive-date=17 July 2023 |archive-url=https://web.archive.org/web/20230717120922/https://www.euronews.com/green/2023/07/17/record-breaking-522c-temperature-hit-china-on-sunday-stoking-fears-of-drought |url-status=live}}</ref> as well as Sanbao, China.<ref name="Whitt 2023" /> Temperatures above {{Convert|35|C|F}} persisted for four weeks in Beijing.<ref name="Whitt 2023" /> The Japanese government and [[NHK]] issued health advice to the general public as heatstroke alerts for 20 of the country's 47 prefectures, mostly east and southwest on 16 July.<ref name="Pragativadi 2023">{{Cite web|url=https://pragativadi.com/japan-issues-heat-wave-alert-as-mercury-continues-to-soar/|title=Japan Issues Heat Wave Alert As Mercury Continues To Soar|first=Pragativadi News|last=Service|date=16 July 2023|access-date=23 July 2023|archive-date=23 July 2023|archive-url=https://web.archive.org/web/20230723171558/https://pragativadi.com/japan-issues-heat-wave-alert-as-mercury-continues-to-soar/|url-status=live}}</ref> Temperatures nearing {{Convert|40|C|F}} were recorded in Kiryu city, [[Gunma Prefecture]], Hachioji in western Tokyo, Hirono town in [[Fukushima Prefecture]] and Nasushiobara.<ref name="Pragativadi 2023" />

      Torrential rain poured down in northern Japan, causing floods and a resultant landslide on 16 July.<ref name="Pragativadi 2023"/>

      The Korea Meteorological Administration (KMA) issued a heat wave warning on the 19th and warned people to expected temperatures of 33&nbsp;°C for the foreseeable future, with southern Gangwon Province, North Chungcheong Province and some southern regions to see some rain which was expected to be about 5 to 20 millimetres in total depth on the 19th.<ref>{{Cite web|url=https://www.koreatimes.co.kr/www/nation/2023/07/371_355242.html|title=Heat wave watch issued for most regions as monsoon rain comes to lull|date=19 July 2023|website=koreatimes|access-date=24 July 2023|archive-date=24 July 2023|archive-url=https://web.archive.org/web/20230724000958/https://www.koreatimes.co.kr/www/nation/2023/07/371_355242.html|url-status=live}}</ref>

      On the 20th a heatwave is declared in Mongolia after temperatures of {{convert|38|C|F}} continue in the Khanbogd soum.

      Japan's government and Fire and Disaster Management Agency responded to the ongoing excessive heat by issuing more health advisory notices to the public on 19 July. The Fire and Disaster Management Agency's official weekly statistics for 19 July showed 8,189 (4,484 were 65 or over) were hospitalized that week, up 200% compared to the previous week and the same week in 2022. Tokyo had the highest number with 1,066, up 460% compared to 2022. 3,215 got heatstroke at home 1,445 got it outside nationwide. 3 people had also died that week as the heat reached 39&nbsp;°C in many parts of Japan on 19 July.<ref>{{Cite web|url=https://www3.nhk.or.jp/nhkworld/en/news/20230719_36/|title=Number of people with heatstroke jumps in Japan amid heat wave {{pipe}} NHK WORLD-JAPAN News|website=NHK WORLD|archive-url=https://web.archive.org/web/20230723174624/https://www3.nhk.or.jp/nhkworld/en/news/20230719_36/|archive-date=23 July 2023|url-status=dead}}</ref>

      South Korea and China had reported deadly floods due to unusually heavy rains, leaving several dozen people dead on the 23rd.<ref name="auto8">{{Cite web|url=https://en.mercopress.com/2023/07/18/climate-change-blistering-record-heat-wave-in-europe-us-japan-and-flooding-in-china-and-south-korea|title=Climate change, blistering record heat wave in Europe, US, Japan and flooding in China and South Korea|website=MercoPress|access-date=23 July 2023|archive-date=23 July 2023|archive-url=https://web.archive.org/web/20230723162119/https://en.mercopress.com/2023/07/18/climate-change-blistering-record-heat-wave-in-europe-us-japan-and-flooding-in-china-and-south-korea|url-status=live}}</ref> The record heat continued in Japan and Korea on the 23rd.<ref name="auto8"/>

      The remnants of [[Typhoon Doksuri]] hits Hebei province and Beijing, killing 21 people as it did so. 744.8 millimeters (29.3 inches) of rain fell on Beijing between July 26 and August 2 according to the Beijing Meteorological Bureau as Beijing and the province of Hebei had floods that destroyed roads, knocked out power and cut water pipes. Zhuozhou, in Hebei was so badly hit that local police posted a plea on [[Sina Weibo|Weibo]] for lights to assist rescue workers in the devastated city.<ref>{{Cite news|url=https://www.irishtimes.com/world/asia-pacific/2023/08/02/beijing-21-dead-and-26-missing-as-heaviest-rainfall-in-140-years-hits-chinese-capital/|title=Beijing: 21 dead and 26 missing as heaviest rainfall in 140 years hits Chinese capital|newspaper=The Irish Times|access-date=2 August 2023|archive-date=2 August 2023|archive-url=https://web.archive.org/web/20230802180850/https://www.irishtimes.com/world/asia-pacific/2023/08/02/beijing-21-dead-and-26-missing-as-heaviest-rainfall-in-140-years-hits-chinese-capital/|url-status=live}}</ref><ref>{{Cite web|url=https://www.ctvnews.ca/climate-and-environment/article/beijing-records-29-inches-of-rain-from-saturday-to-wednesday-its-most-in-at-least-140-years/|title=Beijing records 29 inches of rain from Saturday to Wednesday, its most in at least 140 years|date=2 August 2023|website=CTVNews|last1=Wong|first1=Andy|last2=Wu|first2=Huizhong|access-date=2 August 2023|archive-date=2 August 2023|archive-url=https://web.archive.org/web/20230802180849/https://www.ctvnews.ca/climate-and-environment/beijing-records-29-inches-of-rain-from-saturday-to-wednesday-its-most-in-at-least-140-years-1.6503468|url-status=live}}</ref><ref>{{Cite web|author1=Wong, Andy|author2=Wu, Huizhong|agency=Associated Press|date=1 August 2023|url=https://abcnews.go.com/International/wireStory/29-inches-rain-saturday-wednesday-beijings-heaviest-rainfall-101938444|title=Beijing records heaviest rainfall in at least 140 years, causing severe flooding and 21 deaths|website=ABC News|access-date=2 August 2023|archive-date=5 August 2023|archive-url=https://web.archive.org/web/20230805111451/https://abcnews.go.com/International/wireStory/29-inches-rain-saturday-wednesday-beijings-heaviest-rainfall-101938444|url-status=live}}</ref><ref>{{Cite news|url=https://timesofindia.indiatimes.com/world/china/beijing-records-heaviest-rainfall-in-at-least-140-years-causing-severe-flooding-and-21-deaths/articleshow/102356784.cms|title=Beijing records heaviest rainfall in at least 140 years, causing severe flooding and 21 deaths|newspaper=The Times of India|date=2 August 2023|last1=Wong|first1=Andy|last2=Wu|first2=Huizhong|access-date=2 August 2023|archive-date=2 August 2023|archive-url=https://web.archive.org/web/20230802181216/https://timesofindia.indiatimes.com/world/china/beijing-records-heaviest-rainfall-in-at-least-140-years-causing-severe-flooding-and-21-deaths/articleshow/102356784.cms|url-status=live}}</ref><ref>{{Cite web|url=https://www.stuff.co.nz/world/300942184/beijing-records-heaviest-rainfall-in-at-least-140-years-causing-severe-flooding-and-21-deaths|title=Beijing records heaviest rainfall in at least 140 years, causing severe flooding and 21 deaths|first=Andy Wong Huizhong|last=Wu|date=2 August 2023|website=Stuff|access-date=2 August 2023|archive-date=2 August 2023|archive-url=https://web.archive.org/web/20230802181216/https://www.stuff.co.nz/world/300942184/beijing-records-heaviest-rainfall-in-at-least-140-years-causing-severe-flooding-and-21-deaths|url-status=live}}</ref><ref>{{Cite web|url=https://apnews.com/article/china-beijing-rainfall-floods-1a8f968799bd539d11f3421010b8f2a9|title=Beijing records heaviest rainfall in at least 140 years, causing severe flooding and 21 deaths|date=2 August 2023|website=AP News|last1=Wong|first1=Andy|last2=Wu|first2=Huizhong|access-date=2 August 2023|archive-date=2 August 2023|archive-url=https://web.archive.org/web/20230802181215/https://apnews.com/article/china-beijing-rainfall-floods-1a8f968799bd539d11f3421010b8f2a9|url-status=live}}</ref>

      ====August====
      It was {{convert|35|C|F|}} at Seoul, S. Korea on August 4.<ref>{{Cite web|url=https://metro.co.uk/2023/08/04/hundreds-fall-ill-after-35c-heat-hits-scout-event-and-brits-pull-out-19269315/|title=Hundreds fall ill after 35&nbsp;°C heat hits Scout Jamboree with Brits moved to hotels|first=Sara|last=Odeen-Isbister|date=4 August 2023|access-date=5 August 2023|archive-date=5 August 2023|archive-url=https://web.archive.org/web/20230805144544/https://metro.co.uk/2023/08/04/hundreds-fall-ill-after-35c-heat-hits-scout-event-and-brits-pull-out-19269315/|url-status=live}}</ref><ref>{{Cite web|url=https://www.fijitimes.com/fijians-in-safe-hands-after-heat-wave-attack/|title=Fijians in safe hands after heat-wave attack|first=Anish|last=Chand|newspaper=The Fiji Times|date=8 August 2023|access-date=27 August 2023|archive-date=27 August 2023|archive-url=https://web.archive.org/web/20230827160731/https://www.fijitimes.com/fijians-in-safe-hands-after-heat-wave-attack/|url-status=live}}</ref>

      33 died on 14 August as a flood induced landslide hit villages in India's Himalayan regions.<ref name="auto13"/>

      ====September====
      Flood induced landslides hit Shimla in the Indian Himalayas on 7 September.<ref>{{cite web | url=https://www.msn.com/en-gb/news/world/a-warning-shot-one-city-in-the-himalayas-shows-why-climate-change-is-a-top-priority-at-the-g20/ar-AA1gp6vj?ocid=msedgntp&cvid=3ca81254a76f4e92b81e5dc201c414d6&ei=45 | title=A warning shot: One city in the Himalayas shows why climate change is a top priority at the G20 | website=[[MSN]] | first=Cordelia | last=Lynch | date=7 September 2023 | access-date=8 September 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108120538/https://www.msn.com/en-gb/news/world/a-warning-shot-one-city-in-the-himalayas-shows-why-climate-change-is-a-top-priority-at-the-g20/ar-AA1gp6vj?ocid=msedgntp&cvid=3ca81254a76f4e92b81e5dc201c414d6&ei=45 | url-status=live}}</ref>

      ===October===
      High temperatures, a sand storm and air pollution form a toxic smog over Dushanbe on 8 October.<ref>{{cite web | url=https://www.msn.com/en-gb/news/world/toxic-storms-blamed-on-climate-change-cloud-tajikistan/ar-AA1hRGwU?ocid=msedgntp&cvid=a87ec8993e85417689de8fca8719f4b5&ei=104 | title=Toxic storms blamed on climate change cloud Tajikistan | website=[[MSN]] |date=8 October 2023| access-date=8 October 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108120505/https://www.msn.com/en-gb/news/world/toxic-storms-blamed-on-climate-change-cloud-tajikistan/ar-AA1hRGwU?ocid=msedgntp&cvid=a87ec8993e85417689de8fca8719f4b5&ei=104 | url-status=live}}</ref>

      ==Europe==
      ===The Balkans===
      {{main|2023 European heat waves}}

      {{see also|2023 Carinthia and Slovenia floods|2023 Emilia-Romagna floods}}

      ====July====
      Athens records a temperature of {{convert|41|C|F}}<ref name="auto16"/> and Santorini hits {{convert|41|C|F}}<ref name="auto16"/> on 19 July 2023.

      Bush fires hit Rhodes on 22 and 23 July.<ref name="auto5">{{Cite web |last1=Draper |first1=Joseph |last2=McLoughlin |first2=Bill |date=2023-07-23 |title=UK monitoring situation as wildfires rage in Rhodes |url=https://www.standard.co.uk/news/world/rhodes-wildfires-uk-evacuation-tourists-hotel-global-heatwave-latest-update-foreign-office-travel-advice-british-fire-greek-tui-b1096158.html |access-date=2023-07-25 |website=Evening Standard |archive-date=25 July 2023 |archive-url=https://web.archive.org/web/20230725101310/https://www.standard.co.uk/news/world/rhodes-wildfires-uk-evacuation-tourists-hotel-global-heatwave-latest-update-foreign-office-travel-advice-british-fire-greek-tui-b1096158.html |url-status=live}}</ref>

      Bush fires hit [[Lardos]] and [[Kiotari]], Greece on 23 July. [[Rhodes]] was {{convert|49|C|F}} on the 23rd, with the evacuation of tourists starting that day. Eight EU countries sent firemen to help Greece, while Israel, Jordan and Turkey sent mostly aerial equipment to the Greek fire brigade.<ref name="auto5"/>

      Corfu is hit by forest and bush fires. Tourists are evacuated from Corfu in response on the 25th.<ref>{{Cite web|url=https://metro.co.uk/2023/07/23/evacuations-ordered-on-corfu-as-fires-appear-on-latest-greek-island-19178031/|title=Corfu evacuated as raging wildfires rip through Greek island paradise|first=Craig|last=Munro|date=July 25, 2023|access-date=17 August 2023|archive-date=5 August 2023|archive-url=https://web.archive.org/web/20230805155406/https://metro.co.uk/2023/07/23/evacuations-ordered-on-corfu-as-fires-appear-on-latest-greek-island-19178031/|url-status=live}}</ref>

      [[Albania]] set its all-time high temperature record at {{cvt|44|C}} in [[Kuçovë]] on 24 July.<ref>{{Cite news |last=Livingston |first=Ian |date=2023-07-24 |title=Albania hits all-time high as heat blasts southern Europe and fires rage |newspaper=[[The Washington Post]] |url=https://www.washingtonpost.com/weather/2023/07/24/greece-southern-europe-heatwave-fires/ |access-date=27 August 2023 |archive-date=2 August 2023 |archive-url=https://web.archive.org/web/20230802115554/http://www.washingtonpost.com/weather/2023/07/24/greece-southern-europe-heatwave-fires/ |url-status=live}}</ref>

      Wildfires hit Turkey, Bulgaria, Croatia, Albania, North Macedonia, Greece and southern Italy on the 26th and 27th.

      The 27th saw wild fires in and around Sicily, Dubrovnik, Rhodes, Gran Canaria, Lisbon and Cascais in Portugal.<ref name="auto7">{{Cite web|last1=Hughes|first1=Rebecca Ann|url=https://www.euronews.com/travel/2023/07/27/dubrovnik-cascais-sicily-where-are-the-wildfires-burning-in-europe|title=All the countries where wildfires are raging in Europe|date=27 July 2023|website=euronews|access-date=4 August 2023|archive-date=4 August 2023|archive-url=https://web.archive.org/web/20230804020542/https://www.euronews.com/travel/2023/07/27/dubrovnik-cascais-sicily-where-are-the-wildfires-burning-in-europe|url-status=live}}</ref><ref name="auto12">{{Cite web|last1=Coffey|first1=Helen|url=https://www.independent.co.uk/travel/news-and-advice/portugal-safe-travel-wildfires-cascais-b2382826.html|title=Is it safe to travel to Portugal right now?|date=27 July 2023|website=The Independent|access-date=4 August 2023|archive-date=4 August 2023|archive-url=https://web.archive.org/web/20230804020553/https://www.independent.co.uk/travel/news-and-advice/portugal-safe-travel-wildfires-cascais-b2382826.html|url-status=live}}</ref>

      ====August====
      Heavy rain causes mass flooding in [[Slovenia]] on the 6th and 7th, killing seven people and causing over $500&nbsp;million worth of damage over 66% of the nation's area and is reported as the worst natural disaster to have hit the country in history.<ref name="Nature Fights Back">{{Cite web|last1=Grulovic|first1=Fedja|url=https://news.yahoo.com/nature-fights-back-slovenias-worst-115620785.html|title='Nature fights back': Slovenia's worst floods kill six|date=August 7, 2023|agency=Reuters|publisher=Yahoo News|access-date=7 August 2023|archive-date=7 August 2023|archive-url=https://web.archive.org/web/20230807182941/https://news.yahoo.com/nature-fights-back-slovenias-worst-115620785.html|url-status=live}}</ref><ref name="auto11">{{cite news|last=Mendonca|first=Duarte|date=Aug 7, 2023|title=Slovenia floods kill at least six in 'worst natural disaster to ever hit the country', says PM|url=https://www.msn.com/en-us/news/other/slovenia-floods-kill-at-least-six-in-worst-natural-disaster-to-ever-hit-the-country-says-pm/ar-AA1eUqjY|url-status=live|work=CNN|location=Atlanta, Georgia, USA|archive-url=https://web.archive.org/web/20230809002610/https://www.msn.com/en-us/news/other/slovenia-floods-kill-at-least-six-in-worst-natural-disaster-to-ever-hit-the-country-says-pm/ar-AA1eUqjY|archive-date=Aug 9, 2023}}</ref><ref>{{Cite news|url=https://www.bbc.com/news/av/world-europe-66423977|title=Floods Slovenia's 'worst-ever natural disaster'|work=BBC News|access-date=7 August 2023|archive-date=7 August 2023|archive-url=https://web.archive.org/web/20230807182411/https://www.bbc.com/news/av/world-europe-66423977|url-status=live}}</ref><ref>{{cite news|last=Muller-Heyndyk|first=Rachel|date=6 Aug 2023|title=Slovenia Floods: At least three dead in 'worst natural disaster' in country's history|url=https://www.msn.com/en-gb/news/world/slovenia-floods-at-least-three-dead-in-worst-natural-disaster-in-country-s-history/ar-AA1eRRb0|work=the I|access-date=7 August 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108120511/https://www.msn.com/en-gb/news/world/slovenia-floods-at-least-three-dead-in-worst-natural-disaster-in-country-s-history/ar-AA1eRRb0|url-status=live}}</ref><ref>{{cite news|last=Wybrew|first=Ally|date=7 Aug 2023|title=In pictures:Slovenia faces worst ever natural disaster after extreme flooding|url=https://www.msn.com/en-gb/news/world/in-pictures-slovenia-faces-worst-ever-natural-disaster-after-extreme-flooding/ar-AA1eUuYP|work=Euronews|access-date=7 August 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108120512/https://www.msn.com/en-gb/news/world/in-pictures-slovenia-faces-worst-ever-natural-disaster-after-extreme-flooding/ar-AA1eUuYP|url-status=live}}</ref>

      Over 600 firefighters from Greece and several other European countries, along with a fleet of water-dropping planes and helicopters, fought major wildfires in Greece, 20 people have died in the fires by 27 August.<ref>{{cite web|last1=Becatoros|first1=Elena|url=https://www.msn.com/en-gb/news/world/600-firefighters-and-water-dropping-aircraft-struggle-to-control-greek-wildfires/ar-AA1fPJCy?ocid=msedgntp&cvid=ad6884f74a604279bcf756459233be8e&ei=44|title=600 firefighters and water-dropping aircraft struggle to control Greek wildfires|newspaper=The Daily Progress|publisher=[[MSN]]|access-date=27 August 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108120515/https://www.msn.com/en-gb/news/world/600-firefighters-and-water-dropping-aircraft-struggle-to-control-greek-wildfires/ar-AA1fPJCy?ocid=msedgntp&cvid=ad6884f74a604279bcf756459233be8e&ei=44|url-status=live}}</ref>

      ====September====
      Heavy rainstorms hit Greece, Turkey and Bulgaria on 7 September, killing 11 leading to the declaration of a state of emergency in the affected region of Bulgaria.<ref name="Dickerson2023"/>

      Heavy rains hit the [[Pagasetic Gulf]] and central Greece. Kala Nera village and the nearby port city of Volos were flooded by heavy rains on 7 September in which 2 people died.<ref name="Dickerson2023"/> Larissa was evacuated due to heavy flooding, central Greece, on 7 September.<ref name="Dickerson2023"/> The Greek Minister of Climate Crisis and Civil Protection [[Vasilis Kikilias|Vassilis Kikilias]] urged people to stay indoors on 7 September.<ref name="Dickerson2023"/>

      Heavy floods along Bulgaria's [[Black Sea]] coast triggered a state of emergency in that region of Bulgaria on 7 September.<ref name="Dickerson2023"/>

      ===The Iberian Peninsula===
      {{main|2023 European heat waves}}
      [[File:AprilSurfaceAirTemperatureAnomalySpain (cropped).jpg|thumb|A temperature anomaly map for April 2023 showing the range of the heat wave.]]

      ====April====
      Europe broke its temperature record for April when the air at [[Córdoba Airport]] reached {{convert|38.8|C|F}}.<ref name=CarbonBrief/><ref>{{Cite web |last1=Morris |first1=Sarah |date=29 April 2023 |title=Spain, Portugal mark record temperatures for April as heatwave continues |url=https://www.france24.com/en/europe/20230429-spain-portugal-mark-record-temperatures-for-april-as-heatwave-continues |access-date=25 May 2023 |website=France 24 |archive-date=25 May 2023 |archive-url=https://web.archive.org/web/20230525005351/https://www.france24.com/en/europe/20230429-spain-portugal-mark-record-temperatures-for-april-as-heatwave-continues |url-status=live}}</ref> On 26 April, a [[Sentinel-2]] [[c:File:Fuente_de_Piedra_Lagoon_dry_(cropped1).jpg|image]] showed that the [[Fuente de Piedra Lagoon]] went completely dry for the first time.<ref>{{Cite web |title=A record heatwave hit Spain in April 2023 {{!}} Copernicus |url=https://www.copernicus.eu/en/media/image-day-gallery/record-heatwave-hit-spain-april-2023 |access-date=25 May 2023 |website=www.copernicus.eu |archive-date=25 May 2023 |archive-url=https://web.archive.org/web/20230525005352/https://www.copernicus.eu/en/media/image-day-gallery/record-heatwave-hit-spain-april-2023 |url-status=live}}</ref> A rapid attribution study by [[World Weather Attribution]] found that the heatwave would probably have been more than 2&nbsp;°C cooler without climate change and that climate change made the heat wave 100 times more likely to occur.<ref>{{Cite web|last1=O'Mahoney|first1=Jennifer|last2=Borenstein|first2=Seth|date=5 May 2023|title=Spain's April heat nearly impossible without climate change|url=https://apnews.com/article/spain-portugal-north-africa-heat-wave-climate-change-df1acded341ca106af0877e4b9a33a82|access-date=25 May 2023|website=AP NEWS|archive-date=25 May 2023|archive-url=https://web.archive.org/web/20230525005352/https://apnews.com/article/spain-portugal-north-africa-heat-wave-climate-change-df1acded341ca106af0877e4b9a33a82|url-status=live}}</ref>

      ====July====
      Temerities for 19 July 2023 stood at.
      #Seville {{convert|41|C|F}}.<ref name="auto16"/>
      #Madrid {{convert|37|C|F}}.<ref name="auto16"/>
      #Catalonia- 45.3 C (113 F) (an all-time record).<ref name="Whitt 2023"/>
      A forest fire hit [[La Palma]] on 22 July that led to 500 people being evacuated.<ref name="auto8"/>
      The 27th saw wild fires in and around Sicily, Dubrovnik, Rhodes, Gran Canaria, Lisbon and Cascais in Portugal.<ref name="auto7"/><ref name="auto12"/>

      ====August====
      Forest fires hit 19 villages in the [[Algarve]], including [[Odeceixe]] and [[Monchique]], on the 8th.<ref>{{cite news|last=Crisp|first=James|date=Aug 8, 2023|title=Tourists evacuated in Portugal as wildfires spread towards Algarve|url=https://www.msn.com/en-gb/travel/news/tourists-evacuated-in-portugal-as-wildfires-spread-towards-algarve/ar-AA1eXhh8?ocid=msedgntp&cvid=dcb921131bec439b8a19d95352272226&ei=13|work=The Telegraph|archive-url=https://web.archive.org/web/20230809002958/https://www.msn.com/en-gb/travel/news/tourists-evacuated-in-portugal-as-wildfires-spread-towards-algarve/ar-AA1eXhh8?ocid=msedgntp&cvid=dcb921131bec439b8a19d95352272226&ei=13|archive-date=Aug 9, 2023}}</ref>

      The highest recorded temperature of {{convert|46.8|C|F}} was reached in [[Valencia, Spain|Valencia]] on 11 August. Intense Heatwave conditions, the third such occurrence this summer, were expected to continue in the coming days and week over the Mediterranean region.<ref>{{cite news|date=Aug 12, 2023|title=Valencia sets new heat record during third Spanish heatwave of the summer|url=https://www.euronews.com/green/2023/08/11/valencia-sets-new-heat-record-during-third-spanish-heatwave-of-the-summer#:~:text=Valencia%20sets%20new%20heat%20record%20during%20third%20Spanish%20heatwave%20of%20the%20summer,-Pedro%2C%2048%2C%20and&text=Local%20residents%20say%20the%20city,Spanish%20meteorological%20agency%20Aemet%20said.|access-date=12 August 2023|archive-date=12 August 2023|archive-url=https://web.archive.org/web/20230812142137/https://www.euronews.com/green/2023/08/11/valencia-sets-new-heat-record-during-third-spanish-heatwave-of-the-summer#:~:text=Valencia%20sets%20new%20heat%20record%20during%20third%20Spanish%20heatwave%20of%20the%20summer,-Pedro%2C%2048%2C%20and&text=Local%20residents%20say%20the%20city,Spanish%20meteorological%20agency%20Aemet%20said.|url-status=live}}</ref> Wild fires occur across Tenerife on 16 August.<ref name="auto19">{{Cite web|url=https://www.msn.com/en-gb/news/world/france-wildfires-force-3-500-evacuations-with-firetrucks-burned-to-ash/ar-AA1flPw3?ocid=msedgdhp&pc=U531&cvid=acc2f1938740432d864d47fbd90827d8&ei=36|title=France wildfires force 3,500 evacuations with firetrucks burned to ash|first=Rachel|last=Hagan|website=msn.com|access-date=17 August 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108120515/https://www.msn.com/en-gb/news/world/france-wildfires-force-3-500-evacuations-with-firetrucks-burned-to-ash/ar-AA1flPw3?ocid=msedgdhp&pc=U531&cvid=acc2f1938740432d864d47fbd90827d8&ei=36|url-status=live}}</ref> Major wildfires hit Tenarife on that day.<ref name="auto17">{{cite web|url=https://www.msn.com/en-gb/cars/news/wildfires-rage-on-the-spanish-holiday-island-of-tenerife/vi-AA1fmk43?ocid=msedgntp&cvid=0150302ffdd14a9e891cf110280e0cff&ei=19|title=Wildfires rage on the Spanish holiday island of Tenerife|website=msn.com|access-date=17 August 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108120516/https://www.msn.com/en-gb/cars/news/wildfires-rage-on-the-spanish-holiday-island-of-tenerife/vi-AA1fmk43?ocid=msedgntp&cvid=0150302ffdd14a9e891cf110280e0cff&ei=19|url-status=live}}</ref> Parts of the island of Mallorca was put under yellow and orange weather alerts. Palma police reported felled trees and weather induced damage to buildings in the city. As storms lashed Palma Port the P&O Cruises ship ''Britannia'' broke free of its mooring and collided with another ship. The wind had gusts of up to 100&nbsp;km/h on 28 August.<ref>{{Cite web|url=https://uk.news.yahoo.com/mallorcas-palma-port-lashed-wild-043612820.html|title=Mallorca's Palma Port Lashed by Wild Weather|date=28 August 2023|website=Yahoo News|access-date=29 August 2023|archive-date=29 August 2023|archive-url=https://web.archive.org/web/20230829210214/https://uk.news.yahoo.com/mallorcas-palma-port-lashed-wild-043612820.html|url-status=live}}</ref>

      ====September====
      Heavy rain hits Spain on 3 September and 4 September. Madrid's Mayor, José Luis Martínez-Almeida, told people to stay indoors and said the 1972 rain fall record had been broken with a volume approaching 120 litres per square metre on 4 September.<ref>{{cite web |last=Gilbody-Dickerson |first=Claire |date=September 4, 2023 |title=Spain flooding: Where floods have hit with red warnings in place, weather forecast and latest travel advice |url=https://www.msn.com/en-gb/news/world/spain-flooding-where-floods-have-hit-with-red-warnings-in-place-weather-forecast-and-latest-travel-advice/ar-AA1gdOEO?ocid=msedgntp&cvid=e467f92ee8f643659b9e6c2e46055a5e&ei=29 |website=[[MSN]] |access-date=8 September 2023 |archive-date=8 November 2023 |archive-url=https://web.archive.org/web/20231108120519/https://www.msn.com/en-gb/news/world/spain-flooding-where-floods-have-hit-with-red-warnings-in-place-weather-forecast-and-latest-travel-advice/ar-AA1gdOEO?ocid=msedgntp&cvid=e467f92ee8f643659b9e6c2e46055a5e&ei=29 |url-status=live}}</ref>

      The [[Spanish National Weather Agency]] declared a nationwide red alert for flooding due to extreme rain fall. A man died during a flood in [[Villamanta]] as unusually high amounts of hail and rain hit regions of Castile, Catalonia and Valencia on 5 September.<ref>{{cite web |last=Bradley |first=Jane |date=September 4, 2023 |title=Spain rainfall: Heavy rain after red alert in Madrid as revellers start to leave flooded Burning Man festival in US |url=https://www.msn.com/en-gb/news/world/spain-rainfall-heavy-rain-after-red-alert-in-madrid-as-revellers-start-to-leave-flooded-burning-man-festival-in-us/ar-AA1gecpC?ocid=msedgntp&cvid=8fd5c397b6bc4999b8c9e74be9cf10b5&ei=36 |website=[[MSN]] |access-date=8 September 2023 |archive-date=8 November 2023 |archive-url=https://web.archive.org/web/20231108121606/https://www.msn.com/en-gb/feed?ocid=msedgntp |url-status=live}}</ref>

      ===UK and Ireland===
      '''June'''

      June 2023 was the warmest June on recorded for both Ireland<ref>{{Cite web |date=2023-06-30 |title=Hottest June on record for Ireland as average temperatures of 16+°C break 83-year-old record |url=https://www.gov.ie/en/press-release/b7076-hottest-june-on-record-for-ireland-as-average-temperatures-of-16c-break-83-year-old-record/ |access-date=2024-08-15 |website=www.gov.ie |language=en}}</ref> and the UK,<ref>{{Cite web |date=2023-07-11 |title=World's hottest week on record follows the UK's hottest June |url=https://www.rmets.org/metmatters/worlds-hottest-week-record-follows-uks-hottest-june#:~:text=June%202023%20has%20been%20confirmed,their%20warmest%20June%20on%20record. |access-date=2024-08-15 |website=RMetS |language=en}}</ref> by average temperature. 

      ====July====
      July 2023 in Lancashire, Merseyside, Greater Manchester and Northern Ireland record the wettest July ever with Lancashire's being the wettest on record with 247% of normal rainfall levels.<ref>{{Cite web|last1=Gleaves|first1=Sean|url=https://uk.news.yahoo.com/july-lancashire-wettest-record-247-144927299.html|title=July was Lancashire's wettest on record with 247% of expected rainfall|date=August 1, 2023|newspaper=Blackpool Evening Gazette|publisher=Yahoo News|access-date=17 August 2023|archive-date=17 August 2023|archive-url=https://web.archive.org/web/20230817202409/https://uk.news.yahoo.com/july-lancashire-wettest-record-247-144927299.html|url-status=live}}</ref>

      ====September====
      In Ireland, a rare [[tropical night]] was recorded in [[Valentia Island|Valentia]], [[County Kerry|Kerry]] on 5 September, with the overnight temperature not dropping below 22.3 °C (72.1 °F) at the weather station.<ref>{{Cite web |title=A rare tropical night was recorded in Ireland last night |url=https://www.donegalweatherchannel.ie/news/A-rare-tropical-night-was-recorded-in-Ireland-last-night?format=amp |access-date=2024-08-15 |website=www.donegalweatherchannel.ie}}</ref> 

      A high temperature warning was also issued for parts of Ireland on 7 September, as some parts of the country were forecast to reach as high as 31 °C (88 °F).<ref>{{Cite web |last=Kelly |first=Justin |date=2023-09-07 |title=One area of Ireland to get 31C on Friday and break record amid Met Éireann heat warning |url=https://www.limerickleader.ie/news/weather/1291514/one-area-of-ireland-to-get-31c-on-friday-and-break-record-amid-met-eireann-heat-warning.html |access-date=2024-08-15 |website=www.limerickleader.ie |language=en}}</ref> 

      The [[Port Clarence]] and [[Stockton Village]] districts of Teesside were flooded on 5 September.<ref>{{cite web |last=Lightfoot |first=Gareth |date=September 5, 2023 |title=Distraught householder calls for help with flooding problem: 'I daren't leave the house' |url=https://www.msn.com/en-gb/news/other/distraught-householder-calls-for-help-with-flooding-problem-i-daren-t-leave-the-house/ar-AA1gfBkf?ocid=msedgntp&cvid=8d96e3d242a14da6baaa547499e36b16&ei=13 |work=[[TeessideLive|Teesside Live]] |via=[[MSN]] |access-date=8 September 2023 |archive-date=8 November 2023 |archive-url=https://web.archive.org/web/20231108121607/https://www.msn.com/en-gb/feed?ocid=msedgntp |url-status=live}}</ref>

      Heavy fog and {{convert|25|C|F}} hit Langland Bay near Swansea and Barry Island Cardiff Bay on 10 September.<ref>{{cite news |last1=John |first1=Lucy |last2=Walker |first2=Amy |last3=Rowlands |first3=Eve |title='Post-apocalyptic' scenes at Welsh beaches where people were unable to see the sea |url=https://www.msn.com/en-gb/news/newsmanchester/post-apocalyptic-scenes-at-welsh-beaches-where-people-were-unable-to-see-the-sea/ar-AA1gtDAu?ocid=msedgntp&cvid=e450dc9a14664508960c414051132eef&ei=52 |access-date=12 September 2023 |work=Manchester Evening News |publisher=[[MSN]] |date=9 September 2023 |archive-date=8 November 2023 |archive-url=https://web.archive.org/web/20231108121605/https://www.msn.com/en-gb/news/newsmanchester/post-apocalyptic-scenes-at-welsh-beaches-where-people-were-unable-to-see-the-sea/ar-AA1gtDAu?ocid=msedgntp&cvid=e450dc9a14664508960c414051132eef&ei=52 |url-status=live}}</ref>

      Heavy rain induced floods hit Exeter in Devon on 24 September.<ref>{{Cite web |last=Greaves |first=Paul |date=2023-09-20 |title=Crazy flooding scenes in Exeter as £10,000 car 'written off' |url=https://www.devonlive.com/news/devon-news/crazy-flooding-scenes-exeter-10000-8764427 |access-date=2023-10-04 |website=DevonLive |archive-date=5 October 2023 |archive-url=https://web.archive.org/web/20231005074742/https://www.devonlive.com/news/devon-news/crazy-flooding-scenes-exeter-10000-8764427 |url-status=live}}</ref>

      The A83 was hit by seven landslides. The Met Office issued an amber flood warning that morning in Angus, Perth and Kinross, Aberdeenshire, Moray and Highland until 2:00pm the next day.<ref>{{cite web | url=https://www.msn.com/en-gb/news/uknews/scotland-flood-a-month-s-rain-fell-in-24-hours-danger-to-life-warnings-extended/ar-AA1hQMRD?ocid=msedgdhp&pc=U531&cvid=03e9c078321b474995941f5f5369703e&ei=81 | title=Scotland Flood: A month's rain fell in 24 hours, 'danger to life' warnings extended|first1=Sarah|last1=Ward | website=[[News Letter]]|via=[[MSN]] |date=7 October 2023| access-date=8 October 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108122107/https://www.msn.com/en-gb/news/uknews/scotland-flood-a-month-s-rain-fell-in-24-hours-danger-to-life-warnings-extended/ar-AA1hQMRD?ocid=msedgdhp&pc=U531&cvid=03e9c078321b474995941f5f5369703e&ei=81 | url-status=live}}</ref><ref>{{cite web | url=https://www.msn.com/en-gb/news/uknews/danger-to-life-warnings-remain-after-a-month-s-rain-fell-in-24-hours-forcing-a-search-helicopter-to-airlift-10-to-safety-when-landslides-buried-roads-in-scotland/ar-AA1hRbnv?ocid=msedgntp&cvid=f47133b92fa44a34aef77b2445a80a37&ei=66 | title='Danger to life' warnings remain after a month's rain fell in 24 hours - forcing a search helicopter to airlift 10 to safety when landslides buried roads in Scotland |first1=Chloe|last1=Louise|date=7 October 2023|work=[[Daily Mail]]|via=[[MSN]] | access-date=8 October 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108122108/https://www.msn.com/en-gb/news/uknews/danger-to-life-warnings-remain-after-a-month-s-rain-fell-in-24-hours-forcing-a-search-helicopter-to-airlift-10-to-safety-when-landslides-buried-roads-in-scotland/ar-AA1hRbnv?ocid=msedgntp&cvid=f47133b92fa44a34aef77b2445a80a37&ei=66 | url-status=live}}</ref> The A83 between Tarbet and Lochgilphead was blocked by a major landslide.<ref>{{cite web | url=https://www.msn.com/en-gb/news/uknews/torrential-rain-causes-huge-landslips-in-scotland-as-drivers-airlifted-from-cars/ar-AA1hQfx3?ocid=msedgdhp&pc=U531&cvid=03e9c078321b474995941f5f5369703e&ei=66 | title=Torrential rain causes huge landslips in Scotland as drivers airlifted from cars|first1=Athena|last1=Stavrou|date=7 October 2023| website=[[The Independent]]|via=[[MSN]] | access-date=8 October 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108122108/https://www.msn.com/en-gb/news/uknews/torrential-rain-causes-huge-landslips-in-scotland-as-drivers-airlifted-from-cars/ar-AA1hQfx3?ocid=msedgdhp&pc=U531&cvid=03e9c078321b474995941f5f5369703e&ei=66 | url-status=live}}</ref>

      Heavy rain induced flooding hits several places in Wales on 22 September.<ref>{{cite web | url=https://www.walesonline.co.uk/news/wales-news/people-film-river-water-gushing-27760597 | title=People film water gushing between their homes | date=22 September 2023 | access-date=10 October 2023 | archive-date=6 October 2023 | archive-url=https://web.archive.org/web/20231006175903/https://www.walesonline.co.uk/news/wales-news/people-film-river-water-gushing-27760597 | url-status=live}}</ref>

      Heavy rain induced flooding hits parts of Greater London on 26 September.<ref>{{cite web | url=https://www.msn.com/en-gb/news/uknews/london-floods-roads-turn-into-rivers-after-monsoon-rain-with-more-coming-from-hurricane-nigel/ar-AA1h2TGh?ocid=msedgdhp&pc=U531&cvid=5d39c70a92614169ab0ec5241ddc1878&ei=36 | title=London floods: Roads turn into rivers after 'monsoon' rain with more coming from Hurricane Nigel|first1=Holly|last1=Evans|date=21 September 2023 | website=[[The Independent]]|via=[[MSN]] | access-date=10 October 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108122109/https://www.msn.com/en-gb/news/uknews/london-floods-roads-turn-into-rivers-after-monsoon-rain-with-more-coming-from-hurricane-nigel/ar-AA1h2TGh?ocid=msedgdhp&pc=U531&cvid=5d39c70a92614169ab0ec5241ddc1878&ei=36 | url-status=live}}</ref>

      Major rain induced flooding and landslides hit Scotland between 28 September and 10 October.<ref>{{cite web | url=https://www.msn.com/en-gb/news/newsscotland/storm-agnes-sparks-scotland-weather-warnings-ahead-of-80mph-gales-and-downpours/ar-AA1hdGpv?ocid=msedgntp&cvid=62f4906c025742dd8e5b6de9307b7d60&ei=45 | title=Storm Agnes sparks Scotland weather warnings ahead of 80mph gales and downpours | website=[[Daily Record (Scotland)|Daily Record]]|via=[[MSN]] | access-date=10 October 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108122110/https://www.msn.com/en-gb/news/newsscotland/storm-agnes-sparks-scotland-weather-warnings-ahead-of-80mph-gales-and-downpours/ar-AA1hdGpv?ocid=msedgntp&cvid=62f4906c025742dd8e5b6de9307b7d60&ei=45 | url-status=live}}</ref><ref>{{cite web | url=https://www.msn.com/en-gb/news/newsscotland/scots-train-stations-flooded-as-track-turned-into-river-and-water-tumbles-down-stairs/ar-AA1hPXXH?ocid=msedgntp&cvid=3d35e1e6e5374c0685d79c404db09e36&ei=11 | title=MSN | website=[[MSN]] | access-date=10 October 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108122117/https://15.taboola.com/BidRHanSer?oid=15&width=29&height=29&revmod=&encoded=1&urlonly=1&noimpr=true&pubid=191147&tagid=2810925&cb=2800855955&cirf=https://www.msn.com/en-gb/news/newsscotland/scots-train-stations-flooded-as-track-turned-into-river-and-water-tumbles-down-stairs/ar-AA1hPXXH?ocid=msedgntp&cvid=3d35e1e6e5374c0685d79c404db09e36&ei=11&cisrf=&pageType=text&pstn=Below%20Article%20River%20Video%20-%20Desktop%20-%20Webcomp&tagVer=30.3.0&pubnm=msn-edge-unitedkingdom_river | url-status=live}}</ref><ref>{{Cite web |last=Love |first=Lynn |date=2023-10-09 |title=Clean-up underway to remove 9,500 tonnes of debris following heavy rainfall |url=https://www.dailyrecord.co.uk/news/scottish-news/clean-up-underway-remove-9500-31146549 |access-date=2023-10-10 |website=[[Daily Record (Scotland)|Daily Record]] |via=[[MSN]]|archive-date=10 October 2023 |archive-url=https://web.archive.org/web/20231010062359/https://www.dailyrecord.co.uk/news/scottish-news/clean-up-underway-remove-9500-31146549 |url-status=live}}</ref><ref>{{cite web | url=https://www.msn.com/en-gb/news/uknews/people-airlifted-to-safety-from-vehicles-as-extreme-rainfall-causes-multiple-landslides/ar-AA1hQ0Qw?ocid=msedgntp&cvid=0ab0d9a444d141f9bb807b1d9dd259b8&ei=20 | title=People airlifted to safety from vehicles as extreme rainfall causes multiple landslides | first1=Connor|last1=Sephton|date=7 October 2023|work=[[Sky News]]|via=[[MSN]] | access-date=10 October 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108122618/https://www.msn.com/en-gb/news/uknews/people-airlifted-to-safety-from-vehicles-as-extreme-rainfall-causes-multiple-landslides/ar-AA1hQ0Qw?ocid=msedgntp&cvid=0ab0d9a444d141f9bb807b1d9dd259b8&ei=20 | url-status=live}}</ref><ref name="auto21">{{cite web | url=https://www.msn.com/en-gb/weather/topstories/scot-holiday-hell-caravans-submerged-as-flooding-hits-aberfeldy/vi-AA1hSPvp?ocid=msedgdhp&pc=U531&cvid=1ee7eb730f0a42b8afd20792b564b433&ei=65 | title=Scot holiday hell: Caravans submerged as flooding hits Aberfeldy | date=8 October 2023|work=[[Daily Mail]]|via=[[MSN]] | access-date=10 October 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108122619/https://www.msn.com/en-gb/weather/topstories/scot-holiday-hell-caravans-submerged-as-flooding-hits-aberfeldy/vi-AA1hSPvp?ocid=msedgdhp&pc=U531&cvid=1ee7eb730f0a42b8afd20792b564b433&ei=65 | url-status=live}}</ref><ref>{{cite web | url=https://www.msn.com/en-gb/cars/news/busy-edinburgh-road-flooded-and-footpath-submerged-following-torrential-downpours/ar-AA1hPQRP?ocid=msedgntp&cvid=3d35e1e6e5374c0685d79c404db09e36&ei=32 | title=Busy Edinburgh road flooded and footpath submerged following torrential downpours|first1=Kris|last1=Gourlay|date=7 October 2023 | work=Edinburgh Live|via=[[MSN]]}}</ref>

      ====October====
      Over a month's worth of rain fell in 24 hours over Scotland on 7 October.

      Temperatures reached 23&nbsp;°C (74&nbsp;°F) during a warm spell across eastern Ireland on 8 October. 

      Trains are canceled as emergency repairs occur on the line between Morpth and Newcastle on 9 October.<ref>{{cite news | url=https://www.msn.com/en-gb/travel/news/trains-cancelled-and-lines-blocked-between-newcastle-and-morpeth-due-to-emergency-repairs/ar-AA1hRRhc?ocid=msedgntp&cvid=4949797d512c4d7fa31aa7840e54d868&ei=149 | title=Trains cancelled and lines blocked between Newcastle and Morpeth due to emergency repairs|date=8 October 2023|first1=Aaron|last1=Morris | work=[[Chronicle Live]]|via=[[MSN]]}}</ref>

      The [[Whitesands flood protection scheme]] in [[Dumfries]] is given the go-ahead by Dumfries and Galloway Council on 6 October.<ref>{{cite web | url=https://www.msn.com/en-gb/news/uknews/dumfries-whitesands-flood-protection-scheme-rescued-after-unexpected-victory-by-opposition-councillors/ar-AA1hM9Mh?ocid=msedgntp&cvid=94c45fc4b69c4b64aa5ce4d5903d8e87&ei=171 | title=Dumfries Whitesands flood protection scheme rescued after unexpected victory by opposition councillors|date=6 October 2023|first1=Marc|last1=McLean | work=Daily Record|via=[[MSN]]}}</ref>

      Midday temperatures in Oxford and Banbury UK, hit {{convert|14|C|F}} on 9 October.

      ===Rest of Europe===
      {{main|2023 European heat waves}}
      {{see also|2023 Carinthia and Slovenia floods|2023 Emilia-Romagna floods}}
       [[File:Emilia-Romagna floods satellite (cropped).png|thumb|220px|right|The extent of the Emilia-Romagna floods on 18–20 May 2023.]]

      ====July====
      Northern Norway's [[Slettnes Lighthouse]], reached {{convert|28.8|C|F}} on 13 July<ref name="auto 777">{{Cite news |date=14 July 2023 |title=A heat wave named Cerberus has southern Europe in its jaws, and it's only going to get worse |work=Mainichi Daily News |url=https://mainichi.jp/english/articles/20230714/p2g/00m/0in/023000c |access-date=14 July 2023 |archive-date=14 July 2023 |archive-url=https://web.archive.org/web/20230714094347/https://mainichi.jp/english/articles/20230714/p2g/00m/0in/023000c |url-status=live}}</ref>

      A major extended heatwave affecting most of Europe through mid-July was named [[Cerberus Heatwave|"Cerberus"]] by the [[Servizio Meteorologico|Italian Meteorological Society]]<ref>{{Cite web|url=https://www.upday.com/uk/cerberus-heatwave-leads-to-temperatures-of-over-40c-at-popular-holiday-destinations|title=Cerberus heatwave leads to temperatures of over 40C at popular holiday destinations|first=Danny|last=Harries|date=13 July 2023|website=www.upday.com|access-date=14 July 2023|archive-date=19 July 2023|archive-url=https://web.archive.org/web/20230719222346/https://www.upday.com/uk/cerberus-heatwave-leads-to-temperatures-of-over-40c-at-popular-holiday-destinations|url-status=live}}</ref> and brought record temperatures into the Arctic.<ref>{{Cite news|url=https://mainichi.jp/english/articles/20230714/p2g/00m/0in/023000c|title=A heat wave named Cerberus has southern Europe in its jaws, and it's only going to get worse|date=14 July 2023|newspaper=Mainichi Daily News|access-date=14 July 2023|archive-date=14 July 2023|archive-url=https://web.archive.org/web/20230714094347/https://mainichi.jp/english/articles/20230714/p2g/00m/0in/023000c|url-status=live}}</ref>

      On July 18, temperatures reached as high as:<ref name="auto1">{{Cite web|last1=Alott|first1=Amber|url=https://uk.news.yahoo.com/european-heatwave-highest-temperatures-ever-155834814.html|title=European heatwave: the highest temperatures ever recorded at holiday hotspots – as Rome reaches 42 degrees|date=19 July 2023|newspaper=National World|publisher=Yahoo News|access-date=4 August 2023|archive-date=4 August 2023|archive-url=https://web.archive.org/web/20230804020544/https://uk.news.yahoo.com/european-heatwave-highest-temperatures-ever-155834814.html|url-status=live}}</ref>
      #Sardinia {{convert|47|C|F}}<ref name="auto16">{{Cite web|url=https://uk.news.yahoo.com/european-heatwave-highest-temperatures-ever-155834814.html|title=European heatwave: the highest temperatures ever recorded at holiday hotspots – as Rome reaches 42 degrees|date=19 July 2023|website=Yahoo News|access-date=4 August 2023|archive-date=4 August 2023|archive-url=https://web.archive.org/web/20230804020544/https://uk.news.yahoo.com/european-heatwave-highest-temperatures-ever-155834814.html|url-status=live}}</ref> or {{convert|46|C|F}}.<ref>{{Cite news|last1=King|first1=Simon|url=https://www.bbc.com/weather/features/66234637|title=Heatwave: Is it coming to the UK?|newspaper=BBC Weather|date=18 July 2023|access-date=27 August 2023|archive-date=27 August 2023|archive-url=https://web.archive.org/web/20230827160601/https://www.bbc.com/weather/features/66234637|url-status=live}}</ref> 
      #Rome {{convert|41.8|C|F}}<ref name="auto16"/> 42.9 C, or 109F (an all-time record).<ref name="Whitt 2023">{{cite news |last1=Whitt |first1=Kelly Kizer |title=Record temps continue on land and in the water for 2023 |url=https://earthsky.org/earth/record-temps-extreme-heat-worldwide-summer-2023/ |access-date=7 September 2023 |work=Earthsky |date=26 July 2023 |archive-date=30 August 2023 |archive-url=https://web.archive.org/web/20230830150400/https://earthsky.org/earth/record-temps-extreme-heat-worldwide-summer-2023/ |url-status=live}}</ref> 
      #Sicily- 46.3 C (115 F) (an all-time record).<ref name="Whitt 2023"/>  19 July 2023

      16 Italian cities were under red alerts for heat, including Rome, Florence and Bologna on 23 July.<ref name="auto8"/>

      Officially, the air temperature reached {{convert|48.0|C|F}} on 24 July at Jerzu, [[Sardinia]] during the heatwave which if validated, would be the highest temperature recorded in Europe during the month of July

      1 died and 15 were hurt as a storm hits La Chaux-de-Fonds in northwestern Switzerland on the 23rd.<ref>{{Cite news|url=https://metro.co.uk/2023/07/25/one-dead-and-many-injured-after-tornado-knocks-crane-in-swiss-town-19189815/|title=One dead and many injured after 'tornado' knocks over crane in Swiss town|first=Brooke|last=Davies|newspaper=Metro|date=July 25, 2023|access-date=17 August 2023|archive-date=28 July 2023|archive-url=https://web.archive.org/web/20230728104625/https://metro.co.uk/2023/07/25/one-dead-and-many-injured-after-tornado-knocks-crane-in-swiss-town-19189815/|url-status=live}}</ref>

      The 27th saw wild fires in and around Sicily, Dubrovnik, Rhodes, Gran Canaria, Lisbon and Cascais in Portugal.<ref name="auto7"/><ref name="auto12"/>

      ====August====
      In Ukraine, the temperature reached {{convert|40|C|F}}, around Zaporizhzhia and lake in Sloviansk on August 5.<ref>{{cite news|last=Monks|first=Kieron|date=5 August 2023|url=https://www.msn.com/en-gb/news/other/ukraine-s-stuttering-counteroffensive-faces-a-new-challenge-with-40-degree-heatwave/ar-AA1eOZ00|title=Ukraine's stuttering counteroffensive faces a new challenge with 40-degree heatwave|work=[[i (newspaper)|the i]]|location=London, UK|access-date=5 August 2023|archive-date=6 August 2023|archive-url=https://web.archive.org/web/20230806040949/https://www.msn.com/en-gb/news/other/ukraine-s-stuttering-counteroffensive-faces-a-new-challenge-with-40-degree-heatwave/ar-AA1eOZ00|url-status=live}}</ref>

      30&nbsp;cm of hail fell on the German city of [[Reutlingen]] on August 5.<ref>{{cite news|author=<!--not stated-->|url=https://www.msn.com/en-gb/news/world/german-city-sends-in-snowplows-after-summer-hailstorm/ar-AA1ePptz?ocid=msedgntp&cvid=2dad2a560d534ff488c102f0c6919035&ei=20|date=5 August 2023|title=German city sends in snowplows after summer hailstorm|work=[[DW News]]|location=Berlin, Germany|access-date=5 August 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108122622/https://www.msn.com/en-gb/news/world/german-city-sends-in-snowplows-after-summer-hailstorm/ar-AA1ePptz?ocid=msedgntp&cvid=2dad2a560d534ff488c102f0c6919035&ei=20|url-status=live}}</ref>

      Floods and landslides hit southern Norway on August 9.<ref>{{cite news|last=Olsen|first=Jan M|date=Aug 9, 2023|title=Norway considers blowing up dam after heavy rain over Scandinavia causes floods|url=https://www.msn.com/en-gb/news/uknews/norway-considers-blowing-up-dam-after-heavy-rain-over-scandinavia-causes-floods/ar-AA1f0Wcm?ocid=msedgntp&cvid=15acbe1095cd49f0836581c1a9e7bd53&ei=15|work=[[PA Media]]|location=London, UK|archive-url=https://web.archive.org/web/20230810045246/https://www.msn.com/en-gb/news/uknews/norway-considers-blowing-up-dam-after-heavy-rain-over-scandinavia-causes-floods/ar-AA1f0Wcm?ocid=msedgntp&cvid=15acbe1095cd49f0836581c1a9e7bd53&ei=15|archive-date=Aug 10, 2023}}</ref> A poorly built dam on the [[Glåma River]], at the [[Braskereidfoss hydroelectric power plant]] collapses.<ref>{{cite news|last=Bryant|first=Miranda|date=Aug 9, 2023|title=Dame Partly Collapses in Norway as storm Hans continues to cause chaos|url=https://www.msn.com/en-gb/news/uknews/dam-partly-collapses-in-norway-as-storm-hans-continues-to-cause-chaos/ar-AA1f1mPR?ocid=msedgntp&cvid=bd364805c34b43a79af9767504e8ec69&ei=48|work=The Guardian|location=London, UK|archive-url=https://web.archive.org/web/20230810050438/https://www.msn.com/en-gb/news/uknews/dam-partly-collapses-in-norway-as-storm-hans-continues-to-cause-chaos/ar-AA1f1mPR|archive-date=Aug 10, 2023}}</ref>

      3,500 were evacuated from forest fires in [[Argeles-sur-Mer]], France on 16 August.<ref name="auto19"/> Major wildfires hit Tenarife on that day.<ref name="auto17"/>

      It reaches {{convert|30|C|F}} in the Alpes-Maritimes, Var, Hautes-Alpes and Alpes-de-Haute-Provence departments in the Provence-Alpes-Côte d'Azur (PACA) region of France on 17 August.<ref>{{Cite web|url=https://monacolife.net/intense-heatwave-to-bake-the-mediterranean-in-coming-days/|title=Intense heatwave to bake the Mediterranean in coming days|first=Stephanie|last=Horsman|date=17 August 2023|access-date=10 October 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108122627/https://monacolife.net/intense-heatwave-to-bake-the-mediterranean-in-coming-days/|url-status=live}}</ref>

      The district office of [[Garmisch-Partenkirchen]] in Bavaria, declared a state of disaster in the municipality of [[Bad Bayersoien]], after 80% of its building were seriously damaged by 8&nbsp;cm hailstones on 27 August.<ref>{{Cite web|url=https://www.express.co.uk/news/world/1806617/germany-hail-storm-state-disaster|title=German district on alert as hail storm like 'steel balls' devastates homes|first=Charles|last=Harrison|date=27 August 2023|website=Express.co.uk|access-date=29 August 2023|archive-date=29 August 2023|archive-url=https://web.archive.org/web/20230829205520/https://www.express.co.uk/news/world/1806617/germany-hail-storm-state-disaster|url-status=live}}</ref>

      The temperature hit {{convert|43.2|C|F}} in and Menton Carcassonne, {{convert|42.5|C|F}} Toulouse and {{convert|30.4|C|F}} in the rest of France on 23 August.<ref>{{Cite web|url=https://monacolife.net/heatwave-is-the-region-due-any-relief-from-this-heat-soon/|title=Heatwave: Is the region due any relief from this heat soon?|first=Stephanie|last=Horsman|date=24 August 2023|access-date=10 October 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108123637/https://monacolife.net/heatwave-is-the-region-due-any-relief-from-this-heat-soon/|url-status=live}}</ref>

      The Poppea cyclone struck the Ligurian Sea in Northern Italy causing landslides and floods have washed away roads overlooking Lake Como on 27 August.<ref name="auto18">{{cite web | url=https://www.msn.com/en-gb/weather/topstories/landslides-and-floods-wash-away-roads-overlooking-lake-como-in-northern-italy-where-its-feared-severe-storms-could-cause-disaster/ar-AA1fTszF | title=Landslides and floods wash away roads overlooking Lake Como in northern Italy where it's feared severe storms could cause 'disaster' | newspaper=Daily Mail | publisher=MSN | first1=Callery | last1=James | access-date=29 August 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108123645/https://www.msn.com/staticsb/statics/latest/auth/auth-redirect-blank.html | url-status=live}}</ref> Flash floods hit Genoa on 28 August and Sondrio as flood alerts remained in place in Piedmont and Lombardy remained in place on that day.<ref>{{Cite web|url=https://tw.tv.yahoo.com//editor-s-picks/extreme-weather-flash-floods-hit-102309422.html|title=Extreme weather, flash floods hit Lake Como|website=Yahoo TV|access-date=29 August 2023|archive-date=29 August 2023|archive-url=https://web.archive.org/web/20230829233207/https://tw.tv.yahoo.com//editor-s-picks/extreme-weather-flash-floods-hit-102309422.html|url-status=live}}</ref><ref name="auto18"/>

      Over 100mm of rain fell in regions of Vorarlberg, Tyrol, Salzburg and Carinthia causing evacuations, rail routes and bridges were closed due to flash flooding in [[Bad Gastein]], Salzburg on 29 August.<ref>{{cite web | url=https://www.msn.com/en-gb/news/world/river-levels-reach-100-year-high-as-flash-flooding-hits-austria/ar-AA1fZj9O?ocid=msedgntp&cvid=7beb5f51c247488985e47f128315bda0&ei=13 | title=River levels reach 100-year high as flash flooding hits Austria | newspaper=Sky News | publisher=[[MSN]] | date=30 August 2023 | access-date=30 August 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108123645/https://www.msn.com/staticsb/statics/latest/auth/auth-redirect-blank.html | url-status=live}}</ref>

      == North America ==
      {{see also|2023 Western North America heat wave}}

      === May ===
      [[Arviat]], [[Nunavut]] recorded {{convert|21.2|C|F}} on 13 May.<ref name=":2">{{Cite web |last=Freedman |first=Andrew |date=16 May 2023 |title=Pacific Northwest heat wave shatters records |url=https://www.axios.com/2023/05/16/pacific-northwest-heat-canada-wildfires-climate |access-date=21 May 2023 |website=[[Axios (website)|Axios]] |archive-date=20 May 2023 |archive-url=https://web.archive.org/web/20230520203625/https://www.axios.com/2023/05/16/pacific-northwest-heat-canada-wildfires-climate |url-status=live}}</ref> Monthly record highs were also set in several cities in the [[Pacific Northwest]] during that time.<ref>[https://www.axios.com/2023/05/15/pacific-northwest-heat-wave-seattle-oregon-canada-records Record early season heat wave envelops Pacific Northwest], Axios, May 15, 2023</ref>

      ===June===
      [[2023 Caribbean heat wave|An intense heat wave]] impacted Puerto Rico and the Caribbean in early June, bringing record highs to San Juan and causing the heat index to reach {{cvt|125|F|C}} in one town.<ref>{{Cite web |last1=Acevedo |first1=Nicole |date=7 June 2023 |title=125 degrees? Puerto Rico faces 'dangerous situation' with record |url=https://www.nbcnews.com/news/latino/puerto-rico-faces-dangerous-situation-record-breaking-heat-rcna88168 |access-date=16 July 2023 |website=NBC News |archive-date=16 July 2023 |archive-url=https://web.archive.org/web/20230716075316/https://www.nbcnews.com/news/latino/puerto-rico-faces-dangerous-situation-record-breaking-heat-rcna88168 |url-status=live}}</ref>

      In Mexico, [[Merida, Yucatan]] reached it highest recorded heat index of {{convert|55.6|C|F}} on June 11, surpassed the next day to reach {{convert|56.1|C|F}}; the air temperature was nearly {{convert|41|C|F}}.<ref>{{Cite web|last1=Narravo|first1=Sofia|date=7 August 2023|title=June would break historical records in Merida with extreme tempuratures not seen in 35 years|url=https://www.theyucatantimes.com/2023/06/june-would-break-a-historical-record-in-merida-with-extreme-temperatures-not-seen-in-35-years/#:~:text=On%20Sunday%2C%20|access-date=7 August 2023|website=Yucatan Times|archive-date=7 August 2023|archive-url=https://web.archive.org/web/20230807134912/https://www.theyucatantimes.com/2023/06/june-would-break-a-historical-record-in-merida-with-extreme-temperatures-not-seen-in-35-years/#:~:text=On%20Sunday%2C%20|url-status=live}}</ref>

      The heat wave swept northern states, such as [[Sonora]] where temperatures (before the heat index) were recorded as high as 49&nbsp;°C (120&nbsp;°F).<ref>{{Cite web |date=30 June 2023 |title=Mexico: Heat wave claims over 100 lives |url=https://www.dw.com/en/mexico-heat-wave-claims-over-100-lives/a-66077383 |access-date=30 June 2023 |website=Deutsche Welle |archive-date=30 June 2023 |archive-url=https://web.archive.org/web/20230630064522/https://www.dw.com/en/mexico-heat-wave-claims-over-100-lives/a-66077383 |url-status=live}}</ref> Over 100 people died from heat stroke or dehydration.<ref>{{Cite news|last1=Madry|first1=Kylie|editor1-last=Craft|editor1-first=Diane|date=30 June 2023|title=Heat wave in Mexico leaves at least 100 dead, authorities say|work=Reuters|url=https://www.reuters.com/world/americas/heat-wave-mexico-leaves-least-100-dead-authorities-say-2023-06-30/|access-date=16 July 2023|archive-date=2 July 2023|archive-url=https://web.archive.org/web/20230702053826/https://www.reuters.com/world/americas/heat-wave-mexico-leaves-least-100-dead-authorities-say-2023-06-30/|url-status=live}}</ref>

      ===July===
      In Canada on July 8 [[Norman Wells]], [[Northwest Territories]], at 65°N, reached {{convert|37.9|C|F}}, the first temperature over 37.8&nbsp;°C (100&nbsp;°F) this far north. Massive wildfires, consuming more land area in Canada this year than ever recorded continued to rage in the area.<ref>{{cite news|last1=Livingston|first1=Ian|date=10 July 2023|title=Canada sees its farthest-north 100-degree temperature as wildfires rage|newspaper=[[The Washington Post]]|url=https://www.washingtonpost.com/weather/2023/07/10/canada-record-heat-wildfires-climate/|access-date=7 August 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108123640/https://www.washingtonpost.com/weather/2023/07/10/canada-record-heat-wildfires-climate/|url-status=live}}</ref>

      Canada recorded 3 new temperature highs on 11 July:<ref name="auto20"/>
      # {{convert|37.4|C|F}} in Fort Good Hope, Northwest Territories (NWT)
      # 37.9C (100.2F), in Norman Wells, Northwest Territories (NWT) 
      # {{convert|37.8|C|F}} in Ottawa.

      [[Miami]] broke its record for the most consecutive days with the heat index exceeding over 100&nbsp;°F (38&nbsp;°C) ending on July 26 after 46 days.<ref name="Whitt 2023"/>

      [[Furnace Creek, California|Death Valley]] recorded a daily record high of 128&nbsp;°F (53.3&nbsp;°C) on July 16 surpassing the previous marks of 127&nbsp;°F in 1972 and 2005.<ref name="Whitt 2023"/>

      In the United States, "an extreme heat wave" affected many states including [[Texas]], [[New Mexico]], [[Arizona]], [[Nevada]], and California. Temperatures reached as high as 53&nbsp;°C (128&nbsp;°F) in [[Death Valley]], while [[Phoenix, Arizona|Phoenix]] reached 48&nbsp;°C (119&nbsp;°F) on a few days and broke the previous record of 18 consecutive days exceeding {{convert|110|°F|°C|abbr=on}}, for a total of 31 consecutive days (every day in July).<ref>{{Cite news |last=Salam |first=Erum |date=2023-08-01 |title=Phoenix's record streak of temperatures above 110F ends after 31 days |work=The Guardian |url=https://www.theguardian.com/us-news/2023/jul/31/us-extereme-heat-alert-wildfires |access-date=2023-08-01 |issn=0261-3077 |archive-date=1 August 2023 |archive-url=https://web.archive.org/web/20230801170929/https://www.theguardian.com/us-news/2023/jul/31/us-extereme-heat-alert-wildfires |url-status=live}}</ref><ref>{{Cite web |last1=Garcia |first1=Jorge |last2=Brooks |first2=Brad |date=17 July 2023 |title=US weather: flash floods in the Northeast, heatwave intensifies |url=https://www.reuters.com/world/us/extreme-heat-excessive-rainfall-forecast-across-large-swath-us-2023-07-16/ |access-date=18 July 2023 |website=reuters.com |archive-date=17 July 2023 |archive-url=https://web.archive.org/web/20230717172126/https://www.reuters.com/world/us/extreme-heat-excessive-rainfall-forecast-across-large-swath-us-2023-07-16/ |url-status=live}}</ref> Heat warnings were issued across many southern states as far east as Florida, where record high ocean temperatures were observed.<ref>{{cite web|date=26 July 2023|title=Florida ocean records 'unprecedented' temperatures similar to a hot tub|website=[[TheGuardian.com]]|url=https://www.theguardian.com/us-news/2023/jul/25/florida-ocean-temperatures-hot-tub-extreme-weather|access-date=8 August 2023|archive-date=8 August 2023|archive-url=https://web.archive.org/web/20230808162221/https://www.theguardian.com/us-news/2023/jul/25/florida-ocean-temperatures-hot-tub-extreme-weather|url-status=live}}</ref> The U.S. National Weather Service (NWS) issued its first ever excessive heat advisory for Miami, Florida on July 17, 2023.<ref name="Whitt 2023"/>

      Phoenix recorded its all-time high minimum temperature of 97&nbsp;°F (36.1&nbsp;°C) on July 19 surpassing the previous record of 96&nbsp;°F on July 15, 2003.<ref name="Whitt 2023"/> Phoenix also broke its record for most consecutive days with highs over 110&nbsp;°F (43.3&nbsp;°C) ending on July 30 after 31 days exceeding the previous streak of 18 days back in 1974 by a significant margin.<ref name="Whitt 2023"/>

      On July 31 the Eagle Bluff Fire triggered the evacuation of Osoyoos, [[British Columbia]].<ref name="auto4">{{Cite web|url=https://news.sky.com/story/canada-wildfires-border-town-evacuated-as-blazes-cross-into-us-12930995|title=Canada wildfires: Border town evacuated as blazes cross into US|website=Sky News|access-date=4 August 2023|archive-date=4 August 2023|archive-url=https://web.archive.org/web/20230804020551/https://news.sky.com/story/canada-wildfires-border-town-evacuated-as-blazes-cross-into-us-12930995|url-status=live}}</ref> Both US and Canadian officials estimated that around 890 ha (2,200 acres) on the Canadian side of the border were on fire due to extended dryness and heat in June into July, due to seasonally high temperatures of 31–32&nbsp;°C (88–90&nbsp;°F) at the time of the fire. 2,000 acres (3.13 square miles) on the US side of the border burned.<ref name="auto4"/> One firefighter died on the Canadian side.<ref name="auto4"/> 1,500 blazes were burning in Washington State and British Columbia that day and 101 were out of control.<ref name="auto4"/>

      ===August===
      California's week old York Fire was the state's biggest that year by August 1, at over 125 square miles (323.7 square kilometers) and was 23% contained according to Californian fire officials.<ref name="O'Neil 2023">{{Cite news|last1=O'Neil|first1=Ty|last2=Dazio|first2=Stephanie|last3=Yamat|first3=Rio|url=https://www.theglobeandmail.com/world/article-progress-made-against-massive-california-nevada-wildfire-but-flames/|title=Progress made against massive California-Nevada wildfire but flames threaten iconic Joshua trees|newspaper=The Globe and Mail|date=2 August 2023|via=www.theglobeandmail.com|access-date=4 August 2023|archive-date=4 August 2023|archive-url=https://web.archive.org/web/20230804020542/https://www.theglobeandmail.com/world/article-progress-made-against-massive-california-nevada-wildfire-but-flames/|url-status=live}}</ref> About 400 firefighters were fighting the blaze and had to balance their efforts with concerns about disrupting the fragile ecosystem in California's Mojave National Preserve.<ref name="O'Neil 2023"/>

      Wildfires burned down Kaanapali, north of the town of Lahaina, Hawaii on the 10th.<ref>{{cite web | url=https://www.msn.com/en-gb/news/world/hawaii-a-disaster-area-after-devastating-wildfires-as-mass-evacuations-under-way/ar-AA1f6oCA | title=Hawaii a 'disaster area' after devastating wildfires – as mass evacuations under way | newspaper=Sky News | publisher=[[MSN]] | date=11 August 2023 | access-date=11 August 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108124908/https://www.msn.com/staticsb/statics/latest/auth/auth-redirect-blank.html | url-status=live}}</ref>

      20,000 evacuated from Yellowknife 11 August and near Ndılǫ, Dettah and Ingraham Trail on 1 August.<ref name="auto15">{{cite web|url=https://www.msn.com/en-gb/news/world/thousands-told-to-evacuate-canada-s-yellowknife-city-as-wildfires-spread/ar-AA1fnYmq?ocid=msedgdhp&pc=U531&cvid=6552b2cf221f4788af57cf154d4b96af&ei=16|title=Thousands told to evacuate Canada's Yellowknife city as wildfires spread|first=Jane|last=Bradley|newspaper=The Scotsman|publisher=[[MSN]]|date=17 August 2023|access-date=17 August 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108124816/https://www.msn.com/staticsb/statics/latest/auth/auth-redirect-blank.html#image=1|url-status=live}}</ref> Enterprise was mostly destroyed and Hay River was endangered by the fires.<ref name="auto15"/>

      A major heat wave affected the [[Midwestern United States]] on August 23 and 24. Prior to the heat wave, 126 million Americans were under heat alerts.<ref>[https://www.axios.com/2023/08/22/record-heat-wave-central-us-midwest-south Record-setting U.S. heat dome places 126 million under alerts], Axios, August 22, 2023.</ref> At [[Chicago O'Hare International Airport]], temperatures hit {{convert|98|F|C}} on August 23, with a heat index reaching {{convert|116|F|C}}. On August 24, temperatures hit {{convert|100|F|C}} at O'Hare with a heat index of {{convert|120|F|C}}. The high on August 24 also became the latest in-season high of {{convert|100|F|C}} for Chicago, while the heat index was the hottest on record.<ref>{{cite news |title=Chicago roasting in record-setting heat that feels like 120 degrees |url=https://www.nbcnews.com/news/weather/chicago-roasting-record-setting-heat-feels-120-degrees-rcna101701 |access-date=December 21, 2023 |publisher=[[NBC News]] |date=August 24, 2023}}</ref> In [[Rockford, Illinois|Rockford]], the high reached {{convert|97|F|C}}, with a heat index of {{convert|118|F|C}} due to dew points of {{convert|81|F|C}}.<ref>[https://www.weather.gov/lot/2023_08_23-24_Heat August 23-24, 2023: Late Summer Heat Wave Results in Consecutive Days With 115+° Heat Indices], National Weather Service Chicago, IL</ref> In [[Des Moines, Iowa]], the high on August 23 broke a daily record at {{convert|100|F|C}}, and the heat index of {{convert|115|F|C}} became the highest heat index in August. By August 24, Des Moines had recorded 6 consecutive days with heat indexes above {{convert|100|F|C}}.<ref>[https://www.weareiowa.com/article/weather/des-moines-weather-forecast-august-breaks-heat-records-hottest-temperature-highest-low/524-ff523f83-682f-46c3-9aef-004660d5045c Late August heat wave smashes several records in central Iowa], WereIowa, August 24, 2023.</ref>  On August 27, [[New Orleans]] reached an all-time record high of {{convert|105|F|C}}.<ref>[https://weather.com/safety/heat/news/2023-09-01-record-hottest-summer-south-phoenix-houston-miami 2023 Was Record-Hottest Summer For Over 20 Southern Cities, From Arizona To Florida], [[The Weather Channel]], September 1, 2023.</ref>

      [[Maui County Emergency Management Agency]] announced the end of its bush fire evacuation order on 27 August.<ref>{{cite web | url=https://www.msn.com/en-gb/news/world/evacuation-order-lifted-after-firefighters-douse-maui-brush-fire-near-site-of-deadly-lahaina-blaze/ar-AA1fP8M9?ocid=msedgntp&cvid=ad6884f74a604279bcf756459233be8e&ei=82 | title=Evacuation order lifted after firefighters douse Maui brush fire near site of deadly Lahaina blaze | newspaper=Associated Press | publisher=[[MSN]] | access-date=27 August 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108124812/https://www.msn.com/en-gb/feed?ocid=msedgntp | url-status=live}}</ref>

      ===September===
      A major heat wave took place in the northern portion of the United States, especially around [[Minnesota]] around the first few days of September 2023. Maximum temperatures were above {{convert|90|F|C}} throughout almost the entire state of Minnesota, with some areas of the state recording temperatures above {{convert|100|F|C}}.  The [[Twin Cities]] had its hottest Labor Day on record with a maximum temperature of {{convert|98|F|C}}.<ref>{{Cite web |title=Extreme Labor Day Weekend Heat, 2023 |url=https://www.dnr.state.mn.us/climate/journal/extreme-labor-day-weekend-heat-2023.html |access-date=2023-10-11 |website=Minnesota Department of Natural Resources |archive-date=30 October 2023 |archive-url=https://web.archive.org/web/20231030234128/https://www.dnr.state.mn.us/climate/journal/extreme-labor-day-weekend-heat-2023.html |url-status=live}}</ref> A monthly record was also set that day in [[Marquette, Michigan]] at {{convert|95|F|C}}.<ref>[https://weather.com/forecast/national/news/2023-09-03-record-heat-midwest-northeast-september September's Start Brings Record-Smashing Heat To Midwest, Northeast], [[The Weather Channel]], September 6, 2023.</ref> The next day, a monthly record was tied at [[Abilene, Texas]], with a high of {{convert|107|F|C}}, with daily records also being broken in [[Raleigh, North Carolina]]; [[Washington, D.C.]]; [[Alpena, Michigan]]; [[Concord, New Hampshire]]; and [[Islip, New York]].<ref>[https://www.washingtonpost.com/weather/2023/09/05/heatwave-midwest-northeast-midatlantic-records/ Record-breaking heat wave peaking in Eastern U.S. with highs near 100], ''[[Washington Post]]'', September 6, 2023.</ref> The next day, [[Dulles International Airport]] recorded their hottest September temperature ever, at {{convert|100|F|C}}.<ref>[https://wtop.com/local/2023/09/heat-wave-continues-for-dc-region-before-cold-front-brings-storms/ Dulles hits 100 degrees — 1st time ever recorded in September], WTOP, September 6, 2023.</ref>  By September 7, [[New York City]] had their first official heat wave all year.<ref>[https://abcnews.go.com/US/dangerous-heat-wave-hits-eastern-us-latest-forecast/story?id=102926193 Official heat wave hits New York City as cities across US see dangerous temps], ABC News, September 7, 2023.</ref><ref>[https://www.nbcnewyork.com/weather/labor-day-scorcher-holiday-kicks-off-hot-spell-for-tri-state-see-how-long-it-may-last/4648429/ Ferocious Friday storms down trees and spark fires, kicking off severe weather weekend], NBC New York, September 9, 2023.</ref> That day, sports in [[Suffolk County, New York]], were postponed until at least 6 p.m. due to heat index values of {{convert|96|F|C}}.<ref>[https://www.wliw.org/radio/captivate-podcast/suffolk-country-school-sports-on-hold-due-to-heat-and-more/ Suffolk Country School Sports On Hold Due To Heat, and more], WLIW, September 8, 2023.</ref> The heat index in [[Newark, New Jersey]], reached {{convert|106|F|C}}, with the air temperature of {{convert|97|F|C}} being a record for September 7.<ref>[https://longisland.news12.com/new-jersey-tries-to-stay-cool-on-5th-consecutive-day-of-intense-heat New Jersey tries to stay cool on 5th consecutive day of intense heat], News 12 Long Island, September 7, 2023.</ref> By September 8, [[Philadelphia]]'s heat wave reached six days, with two records being set both on the high and low temperature during that six day timeframe.<ref>[https://www.delcotimes.com/2023/09/09/late-season-heat-wave-rings-up-4-date-records-at-philly-international/ Late season heat wave rings up 4 date records at Philly International], DelTimes, September 9, 2023.</ref> On that day, monthly record warm low temperatures were set at Islip and [[Caribou, Maine]].<ref>[https://www.ncei.noaa.gov/access/monitoring/monthly-report/national/202309 September 2023 National Climate Report], NOAA</ref> The first 13 days of September were the warmest on record in Philadelphia.<ref>[https://www.phillytrib.com/news/local_news/despite-record-global-heat-philly-had-coolest-summer-since-2014/article_a2260eba-a153-531a-8b35-ace46dc0b381.html Despite record global heat, Philly had coolest summer since 2014], ''Philadelphia Tribune'', September 18, 2023.</ref>

      The 0% contained Oregon Road Fire and the 10% contained 2-day-old Grays Fire had killed 2 people so far and covered 10,000 acres of woodland{{as of?|date=June 2024}}. Mass evacuations occurred in case wildfires engulfed the threatened towns of Medical Lake and Four Lakes. [[Spokane County Emergency Management]] said the Grays Fire had stopped growing towards Medical Lake and Four Lakes on 3 September.<ref name=":1">{{cite web |last=Boyle |first=Louise |date=August 21, 2023 |title=Tropical Storm Hilary's path brings much-needed rain over deadly Washington wildfires |url=https://www.msn.com/en-gb/news/world/tropical-storm-hilary-s-path-brings-much-needed-rain-over-deadly-washington-wildfires/ar-AA1fzu2d?ocid=msedgdhp&pc=U531&cvid=f65efc5a6e934c26a05cb198a1132505&ei=154 |website=[[MSN]] |access-date=8 September 2023 |archive-date=8 November 2023 |archive-url=https://web.archive.org/web/20231108125328/https://www.msn.com/staticsb/statics/latest/auth/auth-redirect-blank.html |url-status=live}}</ref>

      Yellowknife and West Kelowna were threatened by major forest fires on 18 September and Yellowknife was evacuated <ref>{{Cite web|url=https://www.bbc.co.uk/news/live/world-us-canada-66542676|title=Canada fires: Race to evacuate Yellowknife as wildfires rage|date=18 August 2023|website=BBC News|access-date=8 October 2023|archive-date=8 October 2023|archive-url=https://web.archive.org/web/20231008161313/https://www.bbc.co.uk/news/live/world-us-canada-66542676|url-status=live}}</ref>

      One person had died and at least 185 buildings were destroyed after a 0% contained 15-square-mile wind-driven wildfire spread out west side of Medical Lake, west of Spokane on 18 September and 19 September.<ref>{{cite web | url=https://www.msn.com/en-gb/news/world/one-person-dead-and-hundreds-of-buildings-destroyed-as-fire-burns-through-state/ar-AA1fwA6G?ocid=msedgdhp&pc=U531&cvid=d909fde8da59489baf8f598cf344e962&ei=57 | title=One person dead and hundreds of buildings destroyed as fire burns through state|first1=Fiona|last1=Leishman|date=20 August 2023 | work=[[Daily Mirror]]|via=[[MSN]] | access-date=8 October 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108125327/https://login.microsoftonline.com/common/oauth2/v2.0/authorize?client_id=d7b530a4-7680-4c23-a8bf-c52c121d2e87&scope=User.Read%20openid%20profile%20offline_access&redirect_uri=https%3A%2F%2Fwww.msn.com%2Fstaticsb%2Fstatics%2Flatest%2Fauth%2Fauth-redirect-blank.html&client-request-id=1675c2da-ae30-4c81-a79e-ca1c9147b8ce&response_mode=fragment&response_type=code&x-client-SKU=msal.js.browser&x-client-VER=2.18.0&x-client-OS=&x-client-CPU=&client_info=1&code_challenge=5JGeF8mlElX5_N3GO-553C4JiwoDlV7bh7miZUz2lsI&code_challenge_method=S256&prompt=none&nonce=828bbe4f-0fbb-48eb-b6fa-b51a3815f915&state=eyJpZCI6IjNlNjhkNDQ0LTBhMjktNDY5Ny1hMjc2LTZmMGFhNGYwZTYxYiIsIm1ldGEiOnsiaW50ZXJhY3Rpb25UeXBlIjoic2lsZW50In19&sso_reload=true | url-status=live}}</ref>

      Canada recorded its most severe wildfire season to date, with a total of just over 1,000 active fires on 18 September; 236 were in the usually colder Northwest Territories, which had so far consumed over 2,000,000 hectares of land and the evacuation of over half of the territory's population. Major forest fires begin to approach Yellowknife. West Kelowna's firefighters were losing the battle with the 10,500 hectares 0% contained McDougall Creek wildfire, resulting in the evacuation of thousands of residents in West Kelowna and north of nearby Kelowna. The premier of British Columbia declared a state of emergency and further evacuations from the cities to the east of Vancouver.<ref>{{cite web | url=https://www.msn.com/en-gb/news/world/canada-wildfires-state-of-emergency-declared-in-british-columbia-as-firefighters-combat-blazes/ar-AA1ftRef?ocid=msedgdhp&pc=U531&cvid=d909fde8da59489baf8f598cf344e962&ei=60 | title=Canada wildfires: State of emergency declared in British Columbia as firefighters combat blazes|first1= Maroosha|last1=Muzaffar |date=19 August 2023|work=[[The Independent]]| via=[[MSN]] | access-date=8 October 2023 | archive-date=8 November 2023 | archive-url=https://web.archive.org/web/20231108125328/https://www.msn.com/staticsb/statics/latest/auth/auth-redirect-blank.html | url-status=live}}</ref>

      === October ===
      A late season heat wave took place in a large part of the United States, starting on September 30 and continuing into October 3, especially in the northern states such as Minnesota. At least 15 US states had recorded temperatures of {{convert|90|F|C}} and above, with some areas experiencing temperatures above {{convert|100|F|C}} as far north as [[Iowa]].<ref>{{Cite news |last1=Cappucci |first1=Matthew |last2=Stillman |first2=Dan |date=2023-10-03 |title=Record warmth in central states spreading into Northeast, New England |newspaper=Washington Post |url=https://www.washingtonpost.com/weather/2023/10/02/october-record-heat-central-us/ |access-date=2023-10-11 |issn=0190-8286 |archive-date=8 November 2023 |archive-url=https://web.archive.org/web/20231108124754/https://www.washingtonpost.com/weather/2023/10/02/october-record-heat-central-us/ |url-status=live}}</ref>  This heat wave was notable for record high minimum temperature, with [[International Falls]] reaching its record high minimum temperature for October on October 2 with a temperature of {{convert|69|F|C}}. The heat wave resulted in a cancellation of the [[Twin Cities Marathon]] for the first time in its history since it began in 1982. The lakes were warm enough to go swimming in many parts of Minnesota.<ref>{{Cite web |title=Historic Autumn Heat, September 30 – October 3, 2023 |url=https://www.dnr.state.mn.us/climate/journal/historic-autumn-heat.html |access-date=2023-10-11 |website=Minnesota Department of Natural Resources |archive-date=13 October 2023 |archive-url=https://web.archive.org/web/20231013041447/https://www.dnr.state.mn.us/climate/journal/historic-autumn-heat.html |url-status=live}}</ref> Temperatures in [[Minneapolis]] reached {{convert|92|F|C}}, the warmest ever for October.<ref>[https://m.startribune.com/2023-most-80-degree-days-on-record/600309321/?clmob=y&c=n&clmob=y&c=n All-Time Record Highs For Sunday, October 1st], Star Tribune, October 2, 2023.</ref> The heat spread east on October 3, and in [[Canada]], [[Ottawa]] set monthly record on October 3, at {{convert|30.9|C|F}}.<ref>{{cite web |last1=Foote |first1=Andrew |title=Tuesday was Ottawa's hottest October day on record |url=https://www.cbc.ca/news/canada/ottawa/ottawa-gatineau-heat-record-october-autumn-1.6986090 |website=CBC |date=October 4, 2023}}</ref> On October 4, monthly record high temperatures were reached with temperatures of {{convert|89|F|C}} in [[Syracuse, New York]],<ref>[https://www.syracuse.com/weather/2023/10/central-ny-shatters-heat-record-for-the-date-closes-in-on-hottest-october-day-ever.html?outputType=amp Central NY shatters heat record for the date, closes in on hottest October day ever], Syracuse.com, October 4, 2023.</ref> and {{convert|86|F|C}} in [[Burlington, Vermont]],<ref>[https://www.cbsnews.com/boston/news/burlington-vermont-october-heat-record/ Burlington, Vermont breaks its record for hottest October day], CBS News, October 4, 2023</ref> In [[Montreal]], the temperature reached {{convert|28.9|C|F}} with a humidex of 33, considered "exceptional" for that time of year.<ref>[https://montreal.citynews.ca/2023/10/04/montreal-heat-record-warm-temperatures/ Montreal breaks heat record as warm temperatures continue], Montreal CityNews, October 4, 2023</ref> Montreal also recorded a record high on October 5, before the heat wave broke.<ref>[https://www.ctvnews.ca/montreal/article/heavy-rain-coming-after-montreal-breaks-another-heat-record/ Heavy rain coming after Montreal breaks another heat record], CTV News, October 5, 2023</ref>

      ==Central America==
      ===July===
      The [[Panamanian Institute of Meteorology and Hydrology]] issues public health advice as it reports temperatures of {{convert|42|C}} in Panama City, with abnormal high heat in Chiriqui, Veraguas, Los Santos, Herrera, Cocle, West Panama, Colon, Darien, Guna Yala and Embera Wounan regions on July 29.<ref>{{Cite web|url=https://www.plenglish.com/news/2023/07/20/warning-in-panama-heat-up-to-42-degrees-thermal-sensation/,%20https://www.plenglish.com/news/2023/07/20/warning-in-panama-heat-up-to-42-degrees-thermal-sensation/|title=Warning in Panama, heat up to 42 degrees thermal sensation – Prensa Latina|date=20 July 2023|access-date=8 September 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108124808/https://www.plenglish.com/news/2023/07/20/warning-in-panama-heat-up-to-42-degrees-thermal-sensation/|url-status=live}}</ref>

      ==South America==
      {{main|2023 South America heat wave}}

      ===August===
      On August 2, 2023, a heat wave hit South America, leading to temperatures in many areas above {{convert|95|F}} in midwinter with some locations setting all-time heat records.<ref>{{cite news |last1=Livingston |first1=Ian |title=It's midwinter, but it's over 100 degrees in South America |url=https://www.washingtonpost.com/weather/2023/08/02/southamerica-record-winter-heat-argentina-chile/ |access-date=3 August 2023 |newspaper=Washington Post |date=2 August 2023 |archive-date=2 August 2023 |archive-url=https://web.archive.org/web/20230802190428/https://www.washingtonpost.com/weather/2023/08/02/southamerica-record-winter-heat-argentina-chile/ |url-status=live}}</ref>

      12 August saw Rio de Janeiro break a 117-year heat record. Chile saw highs towards 40C and Bolivia saw temperatures rise badly Asunción saw {{convert|33|C}}.<ref>{{Cite news|url=https://www.theguardian.com/world/2023/aug/03/south-america-winter-heatwave|title='Winter is disappearing': South America hit by 'brutal' unseasonal heatwave|first1=Tom|last1=Phillips|first2=Uki|last2=Goñi|first3=Matthew|last3=Grace|date=August 3, 2023|newspaper=The Guardian|access-date=17 August 2023|archive-date=17 August 2023|archive-url=https://web.archive.org/web/20230817210348/https://www.theguardian.com/world/2023/aug/03/south-america-winter-heatwave|url-status=live}}</ref>

      === November ===
      {{Main|November 2023 Brazil heat wave}}
      On November 8, 2023, Brazil was hit by another heat wave. Rio de Janeiro had the warmest day of the year, with temperatures reaching 42.5&nbsp;°C (108.5&nbsp;°F) on November 12. The city also had a [[Apparent temperature|real-feel temperature]] of 58.5&nbsp;°C (137.3&nbsp;°F) on November 14, the highest since 2014.<ref>{{Cite web |date=2023-11-14 |title=Rio records 58.5&nbsp;°C real-feel temperature in the morning |url=https://agenciabrasil.ebc.com.br/en/geral/noticia/2023-11/rio-records-585degc-real-feel-temperature-morning |access-date=2023-11-14 |website=Agência Brasil}}</ref>

      ==Australia==
      ===February===
      The [[Bureau of Meteorology]] forecast heatwaves occurring around Australia over the next few days and had already put high-temperature warnings in place in all of Australia's states except for the [[Australian Capital Territory]], [[Jervis Bay Territory]] and the [[Northern Territory]] on 15 February.<ref>{{Cite news|url=https://www.theguardian.com/australia-news/2023/feb/15/australia-heatwave-hot-weather-warnings-east-coast-thursday|title=Australia to swelter through another heatwave as hot weather warnings issued around the country|first=Caitlin|last=Cassidy|date=15 February 2023|newspaper=The Guardian|access-date=27 August 2023|archive-date=27 August 2023|archive-url=https://web.archive.org/web/20230827142529/https://www.theguardian.com/australia-news/2023/feb/15/australia-heatwave-hot-weather-warnings-east-coast-thursday|url-status=live}}</ref>

      ==Russian Federation==
      {{main|2023 Asia heat wave}}

      ===April===
      The head of the Ministry of Emergency Situations, Alexander Kurenkov, traveled to the fire that hit [[Kurgan Oblast]] on 26 April.<ref name="auto6">{{cite web | last1=Gigova | first1=Radina | newspaper=CNN | url=https://edition.cnn.com/2023/05/11/world/russia-siberia-wildfires-climate-intl/index.html | title=Wildfires raging in parts of Russia have left at least 21 people dead | date=11 May 2023 | access-date=22 July 2023 | archive-date=31 August 2023 | archive-url=https://web.archive.org/web/20230831015517/https://edition.cnn.com/2023/05/11/world/russia-siberia-wildfires-climate-intl/index.html | url-status=live}}</ref>

      The [[European Union]]'s [[Copernicus Atmosphere Monitoring Service]] said on 26 April that fires started in May continued to burn from Russia's Chelyabinsk, Omsk and Novosibirsk Oblasts, Primorye Krai, Kazakhstan and Mongolia.<ref name="auto6"/>

      ===May===
      80 fires were active over an area of 113,500 hectares (280,000 acres) in the regions of the [[Ural Federal District]] on 8 May.<ref name="auto6"/>

      ===June===
      37.9 degrees Celsius (100.2 Fahrenheit) was recorded in Jalturovosk on 3 June.<ref name="auto3"/>

      8 June data was recorded at<ref name="auto3"/>
      #{{convert|38.0|C|F}} Zdvinsk
      #{{convert|35.6|C|F}} Tomsk tie
      #{{convert|38.0|C|F}} Verkhoyansk
      #{{convert|38.2|C|F}} Kupino
      #{{convert|36.7|C|F}} Kolyvan
      #{{convert|36.3|C|F}} Ermakovskoe
      #{{convert|35.3|C|F}} Tastyp

      It was revealed on 8 June that the wildfires in Russia's [[Ural Mountains]] during May had killed at least 21 people.<ref name="auto3"/>

      ===July===
      On 11 July 2023 in [[Yekaterinburg]] (56° north latitude) in [[Russia]] for the first time in the history of meteorological observations (more than 187 years), a temperature of +{{convert|40|C|F}} was recorded and [[Verkhoyansk]], in Russia's [[Sakha Republic]], recorded a temperature of {{convert|38|C|F}} on 11 July.<ref name="auto20"/><ref name="rian">{{cite web |date=11 July 2023 |title=В Екатеринбурге впервые зафиксировали жару в 40 градусов |url=https://ria.ru/20230711/pogoda-1883541020.html |access-date=22 July 2023 |website=[[RIA Novosti]] |language=ru |archive-date=16 July 2023 |archive-url=https://web.archive.org/web/20230716233124/https://ria.ru/20230711/pogoda-1883541020.html |url-status=live}}</ref>

      ===August===
      3 August saw predictions of heatwave on 5 August in the Krasnodar Krai.<ref>{{cite news |title=Идем на рекорд. Взрывная жара до +39 градусов ожидается на Кубани |url=https://www.kuban.kp.ru/daily/27537/4803378/ |newspaper=Kuban.kp.ru - |access-date=5 September 2023 |archive-url=https://web.archive.org/web/20230803231218/https://www.kuban.kp.ru/daily/27537/4803378/ |archive-date=3 Aug 2023 |language=ru |date=3 August 2023 |url-status=live}}</ref><ref>{{Cite web|url=https://m.vk.com/wall-53922299_194939|title=VK.com {{pipe}} VK|website=m.vk.com|access-date=27 August 2023|archive-date=27 August 2023|archive-url=https://web.archive.org/web/20230827160602/https://m.vk.com/wall-53922299_194939|url-status=live}}</ref>

      A large fire occurred on 29 August in the Gelendzhik in [[Krasnodar Krai]] area and had an area of fifty thousand square meters according to the [[Russia]]n [[Russian Ministry of Emergency Management|Ministry of Emergency Management]]. The strong winds fanned the flames that day. 195 people, 45 firefighting units, a Mi-8 helicopter helped fight the fire, but the helicopter is grounded at night. The local administration of [[Gelendzhik]] called on the local residents to help in fight the fire.<ref>{{cite web|url=https://www.msn.com/en-gb/news/world/russian-ministry-sounds-the-alarm-300-000-square-meter-fire-in-russia/ar-AA1fYti8?ocid=msedgdhp&pc=U531&cvid=3b083b1ba94c48208ed8494aa0e9085d&ei=4|title=Russian ministry sounds the alarm: 300,000-square-meter fire in Russia|work=Z-Live News|publisher=[[MSN]]|last1=Walls|first1=Jack|access-date=30 August 2023|archive-date=8 November 2023|archive-url=https://web.archive.org/web/20231108124758/https://www.msn.com/en-gb/news/world/russian-ministry-sounds-the-alarm-300-000-square-meter-fire-in-russia/ar-AA1fYti8?ocid=msedgdhp&pc=U531&cvid=3b083b1ba94c48208ed8494aa0e9085d&ei=4|url-status=live}}</ref>

      ==Political, charity, NGO, UN, scientific and corporate responses==
      [[File:John Kerry met with Wang Yi in Beijing 2023 (2).jpg|thumb|China's top diplomat [[Wang Yi (politician)|Wang Yi]] met with [[United States Special Presidential Envoy for Climate]] [[John Kerry]] in [[Beijing]] on 18 July 2023]]
      China's top diplomat [[Wang Yi (politician)|Wang Yi]] and American diplomat [[John Kerry]] called for "global leadership" on climate issues.<ref name="auto">{{Cite news|url=https://www.telegraph.co.uk/world-news/2023/07/19/ice-filled-body-bags-treat-heatstroke-patients-america/|title=Body bags filled with ice used to cool down Americans in record heatwave|first=Maighna|last=Nanu|newspaper=The Telegraph|date=19 July 2023|via=www.telegraph.co.uk|access-date=4 August 2023|archive-date=4 August 2023|archive-url=https://web.archive.org/web/20230804020542/https://www.telegraph.co.uk/world-news/2023/07/19/ice-filled-body-bags-treat-heatstroke-patients-america/|url-status=live}}</ref>

      Some meteorological scientists officially blamed climate change for the event.<ref name="auto8"/> A marine heat wave roughly 60 miles off California's coast was accused by meteorologists of helping fuel [[Hurricane Hilary]].<ref>{{Cite web|url=https://www.latimes.com/environment/story/2023-08-25/marine-heat-wave-off-california-helped-fuel-hurricane-hilary|title=A marine heat wave off California helped fuel Hurricane Hilary. What'll it do next?|date=25 August 2023|website=Los Angeles Times|first1=Susanne|last1=Rust|access-date=27 August 2023|archive-date=27 August 2023|archive-url=https://web.archive.org/web/20230827160439/https://www.latimes.com/environment/story/2023-08-25/marine-heat-wave-off-california-helped-fuel-hurricane-hilary|url-status=live}}</ref>

      On August 2, [[Xi Jinping]], [[General Secretary of the Central Committee of the Communist Party of China|General Secretary of the Central Committee]] and the [[president of the People's Republic of China]], urged local officials to make every effort to find the 29 individuals who are missing and the may people who were trapped rising flood waters.<ref>{{Cite web |title=人民日报-有品质的新闻 |url=https://wap.peopleapp.com/article/7160345/7007036 |access-date=2023-08-01 |website=wap.peopleapp.com |archive-date=5 August 2023 |archive-url=https://web.archive.org/web/20230805113022/https://wap.peopleapp.com/article/7160345/7007036 |url-status=live}}</ref>

      In the end of July, Joe Biden announced some measures to protect Americans from the heat waves. Those include a safety rules for workers who work outdoors with the mechanism of enforcement, ensuring access to water to communities in danger, improving weather forecasts. The money is partly coming from the [[Infrastructure Investment and Jobs Act]] and [[Inflation Reduction Act]]. Biden also met the mayors of [[Phoenix, Arizona]] and [[San Antonio]] to understand better the needs of the cities who were severely impacted by the heatwave. Even before the heatwave some measures already have been taken: [[cooling center]]s and more [[Green building|efficient buildings]].<ref name="White House">{{cite web |title=FACT SHEET: President Biden Announces New Actions to Protect Workers and Communities from Extreme Heat |url=https://bidenwhitehouse.archives.gov/briefing-room/statements-releases/2023/07/27/fact-sheet-president-biden-to-announce-new-actions-to-protect-workers-and-communities-from-extreme-heat/ |website=The White House |date=27 July 2023 |access-date=15 August 2023 |archive-date=15 August 2023 |archive-url=https://web.archive.org/web/20230815031754/https://www.whitehouse.gov/briefing-room/statements-releases/2023/07/27/fact-sheet-president-biden-to-announce-new-actions-to-protect-workers-and-communities-from-extreme-heat/ |url-status=live}}</ref><ref name="Barbara">{{cite news |last1=Sprunt |first1=Barbara |title=Biden rolled out some new measures to respond to extreme heat as temperatures soar |url=https://www.npr.org/2023/07/27/1190435892/biden-extreme-heat-climate |access-date=15 August 2023 |agency=NPR |date=27 July 2023 |archive-date=15 August 2023 |archive-url=https://web.archive.org/web/20230815133119/https://www.npr.org/2023/07/27/1190435892/biden-extreme-heat-climate |url-status=live}}</ref>

      ==Antarctica==
      The temperatures in an area of east Antarctica, known as "Dome C" was {{convert|2|C-change|F-change}} above normal temperatures on 27 September, unlike March 18, 2022, when it reached at {{convert|-10|C|F}}, {{convert|39|C-change|F-change}} above normal seasonal heat levels.<ref>{{Cite web |title=Antarctica heatwave linked to climate change – after temperatures soared 39C above normal |url=https://news.sky.com/story/cause-of-antarctica-heatwave-revealed-after-temperatures-soared-39c-above-normal-12969629 |access-date=2023-10-04 |website=Sky News |archive-date=5 October 2023 |archive-url=https://web.archive.org/web/20231005033952/https://news.sky.com/story/cause-of-antarctica-heatwave-revealed-after-temperatures-soared-39c-above-normal-12969629 |url-status=live}}</ref>

