      ===Measuring conditions===
      The standard measuring conditions for temperature are in the air, {{convert|1.25|m|ft|1}} to {{convert|2.00|m|ft|1}} above the ground,<ref name="978-92-63-10008-5">{{Cite web |url=https://library.wmo.int/doc_num.php?explnum_id=10616 |title=WMO (2018): Guide to Instruments and Methods of Observation |access-date=23 February 2022 |archive-date=30 July 2022 |archive-url=https://web.archive.org/web/20220730071140/https://library.wmo.int/doc_num.php?explnum_id=10616 |url-status=dead }}</ref> and shielded from direct sunlight intensity (hence the term ''x'' degrees "in the shade").<ref name="running2011" /> The following lists include all officially confirmed claims measured by those methods.

      Temperatures measured directly on the ground may exceed air temperatures by {{convert|30|to|50|C-change|0}}.<ref name="running2011">{{Cite journal |last1=Mildrexler |first1=David J. |last2=Zhao |first2=Maosheng |last3=Running |first3=Steven W. |year=2011 |title=Satellite Finds Highest Land Skin Temperatures on Earth |journal=Bulletin of the American Meteorological Society |volume=2011 |issue=7 |pages=855–860 |bibcode=2011BAMS...92..855M |doi=10.1175/2011BAMS3067.1 |doi-access=free}}</ref> {{Anchor|Highest temperature ever recorded}}The highest natural ground surface temperature ever recorded may have been an alleged reading of {{convert|93.9|C|F|1}} at [[Furnace Creek, California]], United States, on 15&nbsp;July 1972.<ref name="ReferenceA">{{Cite journal |last=Kubecka |first=Paul |year=2001 |title=A possible world record maximum natural ground surface temperature |journal=Weather |volume=56 |issue=7 |pages=218–221 |bibcode=2001Wthr...56..218K |doi=10.1002/j.1477-8696.2001.tb06577.x |s2cid=120698040}}</ref> In 2011, a ground temperature of {{convert|84|C|F|1}} was recorded in [[Port Sudan]], Sudan.<ref>Table 9.2, p. 158, ''Dryland Climatology'', Sharon E. Nicholson, Cambridge University Press, 2011, {{ISBN|1139500244}}.</ref> The theoretical maximum possible ground surface temperature has been estimated to be between {{convert|90|and|100|C|F|0}} for dry, darkish soils of low thermal conductivity.<ref>{{Cite journal |last=Garratt |first=J. R. |year=1992 |title=Extreme Maximum Land Surface Temperatures |journal=Journal of Applied Meteorology |volume=31 |issue=9 |pages=1096–1105 |bibcode=1992JApMe..31.1096G |doi=10.1175/1520-0450(1992)031<1096:EMLST>2.0.CO;2 |doi-access=free}}</ref>

      Satellite measurements of ground temperature taken between 2003 and 2009, taken with the [[Moderate Resolution Imaging Spectroradiometer|MODIS]] infrared spectroradiometer on the [[Aqua (satellite)|Aqua]] satellite, found a maximum temperature of {{convert|70.7|C|F|1}}, which was recorded in 2005 in the [[Lut Desert, Iran]]. The Lut Desert was also found to have the highest maximum temperature in five of the seven years measured (2004, 2005, 2006, 2007 and 2009). These measurements reflect averages over a large region and so are lower than the maximum point surface temperature.<ref name="running2011" />

      Satellite measurements of the surface temperature of Antarctica, taken between 1982 and 2013, found a coldest temperature of {{convert|-93.2|C|F|1}} on 10&nbsp;August 2010, at {{Coord|81.8|S|59.3|E}}. Although this is not comparable to an air temperature, it is believed that the air temperature at this location would have been lower than the official record lowest air temperature of {{convert|-89.2|C|F|1}}.<ref>[https://www.bbc.com/news/science-environment-25287806 Coldest spot on Earth identified by satellite] {{webarchive |url=https://web.archive.org/web/20160414013306/http://www.bbc.com/news/science-environment-25287806 |date=14 April 2016 }}, Jonathan Amos, BBC News, 9 December 2013.</ref><ref>[http://fallmeeting.agu.org/2013/files/2013/12/ColdestPlaceOnEarth.pdf The Coldest Place on Earth: -90&nbsp;°C and below from Landsat 8 and other satellite thermal sensors] {{webarchive |url=https://web.archive.org/web/20160303220245/http://fallmeeting.agu.org/2013/files/2013/12/ColdestPlaceOnEarth.pdf |date=3 March 2016 }}, Ted Scambos, Allen Pope, Garrett Campbell, and Terry Haran, [[American Geophysical Union]] fall meeting, 9 December 2013.</ref>

      ===Hottest===

      ====Highest temperatures ever recorded==== <!--We don't need a detailed description on the highest temperature ever recorded as we have a main article for it.-->
      {{main|Highest temperature recorded on Earth|Heat wave}}

      [[File:Koppen-Geiger Map B present.svg|280px|thumb|A world map showing areas with [[Köppen climate classification|Köppen]] ''B'' classification (dry climates). The temperatures of the hot variants ''(BWh, BSh)'' of these climates have the potential to exceed {{convert|50|C|F}} during the hottest seasons.]]

      According to the [[World Meteorological Organization]] (WMO), the highest temperature ever recorded was {{Convert|56.7|C|F}} on 10 July 1913 in [[Furnace Creek, California|Furnace Creek]] (Greenland Ranch), California, United States,<ref name="WMOhighesttemp">{{Cite web |title=World: Highest Temperature |url=https://wmo.asu.edu/content/world-highest-temperature |archive-url=https://web.archive.org/web/20180501140030/https://wmo.asu.edu/content/world-highest-temperature |archive-date=1 May 2018 |access-date=1 May 2018 |publisher=World Meteorological Organization}}</ref> but the validity of this record is challenged
      as possible problems with the reading have since been discovered. Christopher C. Burt, a weather historian writing for [[Weather Underground (weather service)|Weather Underground]], believes that the 1913 [[Death Valley]] reading is "a myth", and is at least {{convert|4|or|5|F-change|order=flip}} too high.<ref name="KPBS-report" /> Burt proposes that the highest reliably recorded temperature on Earth could still be at Death Valley, but is instead {{convert|54.0|C|F}} recorded on 30 June 2013.<ref name="Burt">{{Cite web |last=Burt |first=Christopher C. |date=22 July 2016 |title=Hottest Reliably Measured Air Temperatures on Earth |url=https://www.wunderground.com/blog/weatherhistorian/hottest-reliably-measured-air-temperatures-on-earth |url-status=dead |archive-url=https://web.archive.org/web/20160812030844/https://www.wunderground.com/blog/weatherhistorian/hottest-reliably-measured-air-temperatures-on-earth |archive-date=12 August 2016 |access-date=3 August 2016 |publisher=Weather Underground}}</ref> This is lower than a 1931 measurement of {{convert|55|C|F}} recorded in Kebili, Tunisia, the 55&nbsp;°C temperature is verified by the WMO, although it has been disputed by some meteorologists.<ref name="AMS2013">{{Cite journal |last1=Fadli |first1=Khalid |last2=Cerveny |first2=Randall |last3=Burt |first3=Christopher |last4=Eden |first4=Philip |last5=Parker |first5=David |last6=Brunet |first6=Manola |last7=Peterson |first7=Thomas |year=2013 |title=World Meteorological Organization Assessment of the Purported World Record 58&nbsp;°C Temperature Extreme at El Azizia, Libya (13 September 1922) |journal=Bulletin of the American Meteorological Society |volume=94 |issue=2 |pages=199–204 |bibcode=2013BAMS...94..199E |doi=10.1175/BAMS-D-12-00093.1 |doi-access=free}}</ref> The temperature of {{convert|54|C|F}} is also matched by a 1942 record from [[Tirat Zvi]], a Jewish settlement under the British Mandate in the Middle East).<ref name="ims">{{Cite web |date=21 June 1942 |title=Climate Extremes in Israel |url=http://ims.gov.il/IMSEng/CLIMATE/TopClimetIsrael/ |url-status=live |archive-url=https://web.archive.org/web/20101006140959/http://ims.gov.il/IMSEng/CLIMATE/TopClimetIsrael/ |archive-date=6 October 2010 |access-date=5 December 2019 |publisher=Israel Meteorological Service}}</ref> In 2016 and 2017, readings in [[Kuwait]] and [[Iran]] also matched the 2013 Death Valley record, while readings in 2020 and 2021 also at [[Furnace Creek, California|Furnace Creek]] went even higher, up to 54.4&nbsp;°C (130&nbsp;°F), however, they have not yet been validated by WMO.<ref>{{Cite web |date=10 July 2021 |title=Temperature reaches 130&nbsp;°F (54.4&nbsp;°C) at California's Death Valley |url=https://bnonews.com/index.php/2021/07/temperature-reaches-130f-at-death-valley-california/}}</ref> The WMO has stated they stand by the 1913 record pending any future investigations.

      The former highest official temperature on Earth, {{convert|58.0|C|F}}, measured in [[ʽAziziya|ʽAziziya, Libya]] on 13 September 1922, was reassessed in July 2012 by the WMO which published a report that invalidated the record.<ref name="AMS2013" /> There have been other unconfirmed reports of high temperatures, but these temperatures have never been officially validated by national weather services/WMO, and are currently considered to have been recorder's errors,<ref>[http://www.wunderground.com/blog/weatherhistorian/comment.html?entrynum=89 Weather Extremes] {{webarchive|url=https://web.archive.org/web/20161025122339/http://www.wunderground.com/blog/weatherhistorian/comment.html?entrynum=89|date=25 October 2016}}, Weather Underground – Retrieved 14 September 2012.</ref> thus not being recognised as world records.<ref>{{Cite book |last=Burt |first=Christopher C |url=https://archive.org/details/extremeweathergu00burt_0 |title=Extreme Weather |publisher=W. W. Norton & Company |year=2004 |isbn=978-0-393-32658-1 |page=[https://archive.org/details/extremeweathergu00burt_0/page/36 36] |quote=heat burst 158. |access-date=21 June 2007 |url-access=registration}}</ref>

      ====Highest global average temperature====
      The warmest day on record for the entire planet was 22 July 2024 when the highest ''global average temperature'' was recorded at {{Convert|17.16|C|F}}.<ref name=":2">{{Cite web |last=Copernicus |date=25 July 2024 |title=New record daily global average temperature reached in July 2024 |url=https://climate.copernicus.eu/new-record-daily-global-average-temperature-reached-july-2024 |access-date=2024-08-02 |website=climate.copernicus.eu}}</ref> The previous record was {{Convert|17.09|C|F}} set the day before on 21 July 2024.<ref name=":2" /> The month of July 2023 was the hottest month on record globally.<ref>{{Cite web |last1=McGuinness |first1=Jackie |last2=Rohloff |first2=Katherine |date=2023-08-14 |title=NASA Clocks July 2023 as Hottest Month on Record Ever Since 1880 |url=http://www.nasa.gov/press-release/nasa-clocks-july-2023-as-hottest-month-on-record-ever-since-1880 |access-date=2023-08-16 |website=NASA}}</ref> September 2023 was the most anomalously warm month, averaging 1.75&nbsp;°C (3.15&nbsp;°F) above the preindustrial average for September.<ref>{{Cite web |last=Copernicus |date=5 October 2023 |title=Copernicus: September 2023 – unprecedented temperature anomalies; 2023 on track to be the warmest year on record |url=https://climate.copernicus.eu/copernicus-september-2023-unprecedented-temperature-anomalies|access-date=2024-08-03 |website=climate.copernicus.eu}}</ref> The [[Copernicus Programme]] (begun 1940) had recorded 13 August 2016, as the hottest global temperature, but by July 2024, that date had been downgraded to the fourth hottest.<ref>{{Cite news | first1=Julia |last1=Jacobo | first2=Daniel | last2=Peck |title=Earth sets daily global temperature record for 2nd day in a row: Copernicus |url=https://abcnews.go.com/International/earth-sets-daily-global-temperature-record-2nd-day/story?id=112233810 | date=July 24, 2024 | access-date=2024-07-26 |website=[[ABC News (United States)|ABC News]] |language=en}}</ref>

