      [[File:1951+ Percent of global area at temperature records - Seasonal comparison - NOAA.svg |thumb|300px |In recent decades, new high temperature records have substantially outpaced new low temperature records on a growing portion of Earth's surface.<ref name="NOAA_October">{{Cite web |date=November 2023 |title=Mean Monthly Temperature Records Across the Globe / Timeseries of Global Land and Ocean Areas at Record Levels for October from 1951-2023 |url=https://www.ncei.noaa.gov/access/monitoring/monthly-report/global/202310/supplemental/page-3 |url-status=live |archive-url=https://web.archive.org/web/20231116185412/https://www.ncei.noaa.gov/access/monitoring/monthly-report/global/202310/supplemental/page-3 |archive-date=16 November 2023 |website=NCEI.NOAA.gov |publisher=National Centers for Environmental Information (NCEI) of the National Oceanic and Atmospheric Administration (NOAA)}} (change "202310" in URL to see years other than 2023, and months other than 10=October)</ref> Comparison shows seasonal variability for record increases.]]

      The '''list of weather records''' includes the most extreme occurrences of [[List of severe weather phenomena|weather phenomena]] for various categories. Many weather records are measured under specific conditions—such as surface temperature and wind speed—to keep consistency among measurements around the Earth. Each of these records is understood to be the record value officially observed, as these records may have been exceeded before modern [[list of weather instruments|weather instrumentation]] was invented, or in remote areas without an official [[weather station]]. This list does not include [[remote sensing|remotely sensed observations]] such as satellite measurements, since those values are not considered official records.<ref>{{Cite web |last=<!--Staff writer(s); no by-line.--> |title=World Meteorological Organization: Global Weather & Climate Extremes |url=http://wmo.asu.edu/#global |archive-url=https://web.archive.org/web/20131213113854/http://wmo.asu.edu/ |archive-date=13 December 2013 |access-date=15 December 2024 |publisher=[[World Meteorological Organization]]}}</ref>

      ==Temperature==
