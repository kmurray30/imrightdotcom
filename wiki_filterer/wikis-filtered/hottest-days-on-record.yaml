  - title: Severe weather events in Sydney
    pageid: 63072854
    extract: |-
      Severe weather events or extreme weather events in Sydney, include hailstorms, thunderstorms, gale, bushfires, heatwaves, drought, and flash flooding (caused by East coast lows or black nor'easters). Sydney is rarely affected by cyclones, although remnants of cyclones do affect the city.
      Global warming has increased the chances of extreme rain and flash floods in Sydney recently, such as the notable 2021 and 2022 flood events. Nevertheless, destructive heavy rainfall events have been recorded in the Sydney area since records began in the 18th century. 
      Annually, coastal Sydney sees five heat-related deaths per 100,000 people while the western suburbs see 14 per 100,000. Heat-related deaths in the city were common in the late 19th and early 20th century period (due to lack of air conditioners) where several individual cases were reported.
    source: |-
      {{Short description|Notable weather extremities in an Australian city}}
      {{for|Sydney's climate in general|Climate of Sydney}}
      {{Use Australian English|date=May 2024}}
      {{Use dmy dates|date=May 2024}}
      [[File:Bushfire smoke over the Sydney Opera House and Harbour Bridge in December 2019.jpg|thumb|250px|Bushfire smoke following the [[Black Summer bushfires]] in December 2019]]
      '''Severe weather events''' or '''extreme weather events''' in Sydney, include [[hailstorm]]s, [[thunderstorm]]s, [[gale]], [[Bushfires in Australia|bushfire]]s, [[heatwaves]], [[Drought in Australia|drought]], and [[flash flood]]ing (caused by [[East coast low]]s or [[black nor'easter]]s). Sydney is rarely affected by [[tropical cyclone|cyclones]], although remnants of cyclones do affect the city.<ref>{{Cite web|url=https://www.abc.net.au/news/2022-11-24/tropical-cyclones-could-return-to-sydney/101689762|title=Tropical cyclones could return to Sydney — and it's not because of climate change|work=ABC News |date=23 November 2022|via=www.abc.net.au}}</ref>

      [[Global warming]] has increased the chances of extreme rain and flash floods in Sydney recently, such as the notable [[2021 eastern Australia floods|2021]] and [[2022 eastern Australia floods|2022]] flood events.<ref name="auto">{{cite news|url=https://www.smh.com.au/environment/weather/one-extreme-to-the-other-flood-risks-for-nsw-and-sydney-20200207-p53yt1.html|title=Forecasters warn of potentially 'life-threatening flash-flooding' in Sydney|accessdate=29 May 2020}}</ref><ref>[https://www.smh.com.au/environment/weather/la-nina-a-nightmare-for-tourists-and-weather-forecasters-alike-20220119-p59pdo.html Turbulent La Nina season makes it even harder to predict the weather] ''[[Sydney Morning Herald]]'' 21 January 2022.</ref> Nevertheless, destructive heavy rainfall events have been recorded in the Sydney area since records began in the 18th century.<ref>{{cite web|last=Nicholls|first=Neville|url=https://www.theguardian.com/commentisfree/2020/feb/10/fires-and-floods-australia-already-seesaws-between-climate-extremes-and-theres-more-to-come|title=Fires and floods: Australia already seesaws between climate extremes – and there's more to come |work=The Guardian |date=2020-02-10 |accessdate=2020-05-29}}</ref><ref name="auto"/><ref name=daily/> 

      Annually, coastal Sydney sees five [[heat stroke|heat-related deaths]] per 100,000 people while the western suburbs see 14 per 100,000.<ref>[https://www.news.com.au/technology/environment/climate-change/heat-dome-surrounding-australian-cbds-leave-suburbs-to-scorch/news-story/3a1e3e464db9f34229ac3539bea19cd7 ‘Heat dome’ surrounding Australian CBDs leave suburbs to scorch] {{Webarchive|url=https://web.archive.org/web/20210303194318/https://www.news.com.au/technology/environment/climate-change/heat-dome-surrounding-australian-cbds-leave-suburbs-to-scorch/news-story/3a1e3e464db9f34229ac3539bea19cd7 |date=3 March 2021 }} by Benedict Brook from News.com.au. Retrieved 25 November 2020.</ref> Heat-related deaths in the city were common in the late 19th and early 20th century period (due to lack of [[air conditioners]]) where several individual cases were reported.<ref>{{cite web | url =https://trove.nla.gov.au/newspaper/article/5034790 | title = THE HEAT WAVE. HIGH SHADE TEMPERATURES. BURNING OUT THE OLD YEAR. A READING OF 114 DEG. RAIN STORM IN WESTERN AUSTRALIA.| newspaper = Advertiser| date = 2 January 1905| publisher = Trove|accessdate=28 January 2024}}</ref><ref>{{cite web | url =https://trove.nla.gov.au/newspaper/article/14082067 | title = DEATH FROM HEAT EXHAUSTION. WEST WYALONG, Monday.| newspaper = Sydney Morning Herald| date = 29 December 1896| publisher = Trove|accessdate=28 January 2024}}</ref><ref>{{cite web | url =https://trove.nla.gov.au/newspaper/article/1104047 | title = HIKER'S DEATH FROM HEAT STROKE SYDNEY| work = Argus| date = 6 January 1945| publisher = Trove|accessdate=28 January 2024}}</ref><ref>{{cite news|title=Sydney heatwave: Is it hot enough for you?|url=http://www.smh.com.au/comment/sydney-heatwave-is-it-hot-enough-for-you-20131010-2va5m.html|date=10 October 2013|work=The Sydney Morning Herald|access-date=23 January 2014|archive-date=17 January 2014|archive-url=https://web.archive.org/web/20140117045825/http://www.smh.com.au/comment/sydney-heatwave-is-it-hot-enough-for-you-20131010-2va5m.html|url-status=live}}</ref>

      ==Temperatures==
      ===1800s–2000s===
      *5 January 1863 is Sydney's first recorded {{convert|40|C}} day, when the mercury hit {{convert|41.6|C}} at Sydney's Observatory Hill.<ref>{{cite web | url=https://www.extremeweatherwatch.com/cities/sydney/year-1863#january | title=Sydney Weather in 1863 }}</ref>
      *During January 1896, a state wide heatwave blasted through NSW and caused the mercury in Sydney to hit {{convert|40.7|C}} on the 6th and {{convert|42.5|C}} on the 13th, this ended Sydney's longest streak of days under {{convert|40.0|C}} which lasted from 14 January 1870 – 5 January 1896. The heatwave also caused the death of 437 people across eastern Australia.<ref>https://coherence.com.au/curlew/2022/08/deadly-aust-heat-wave-of-1896/</ref><ref>{{cite web | url=https://www.extremeweatherwatch.com/streak-finder?city=sydney&type=high&gt=lte&value=40&units=c | title=Sydney Consecutive 40 Degree Days }}</ref>
      *On 10 January 1929, extreme heat kills thousands of [[fowl]]s on [[poultry farm]]s in the city as temperatures rose to {{convert|41.2|C|0}}.<ref>{{cite web | url =https://trove.nla.gov.au/newspaper/article/143108831 | title = HEAT WAVE IN SYDNEY TEMPERATURE REACHES 106.2 DEGREES HOTTEST SINCE 1896| newspaper = Daily Advertiser| date = 10 January 1929| publisher = Trove|accessdate=27 January 2024}}</ref>
      *On 11 June 1931, Sydney registered its warmest June day on record at {{convert|26.9|C}}, this was more than 10 degrees above the average June temperature at the time.<ref>http://www.bom.gov.au/jsp/ncc/cdio/weatherData/av?p_nccObsCode=122&p_display_type=dailyDataFile&p_startYear=1931&p_c=-872851191&p_stn_num=066062</ref>
      *On 6 March 1938, Richmond in Sydney's north western area recorded the highest autumn temperature in the city's metropolitan area, shattering the previous record by almost 3C when it hit {{convert|41.9|C}}.<ref>http://www.bom.gov.au/climate/averages/tables/cw_067033_All.shtml</ref>
      *On 1 February 1977, Sydney was hit by a massive heatwave that sent record breaking temperatures never seen in the month of February. Temperatures skyrocketed to {{convert|45.8|C}} at [[Liverpool, New South Wales|Liverpool]], more than 2 degrees hotter than anywhere else in Sydney. Other places that broke heat records at the time were Sydney CBD's second hottest day at {{convert|41.4|C}}, [[Bankstown]] {{convert|43.3|C}}, and [[Richmond, New South Wales|Richmond]] {{convert|43.7|C}} which stood as the hottest February days at both Bankstown and Richmond for 40 years.<ref>http://www.bom.gov.au/cgi-bin/climate/extremes/daily_extremes.cgi?period=%2Fcgi-bin%2Fclimate%2Fextremes%2Fdaily_extremes.cgi&climtab=tmax_high&area=nsw&year=1977&mon=2&day=1</ref>
      *The highest recorded minimum temperature in Sydney was registered at [[Orchard Hills, New South Wales]], a suburb right beneath Penrith, at {{convert|29.8|C}} on 9 January 1983.<ref>http://www.bom.gov.au/cgi-bin/climate/extremes/daily_extremes.cgi?period=%2Fcgi-bin%2Fclimate%2Fextremes%2Fdaily_extremes.cgi&climtab=tmin_high&area=nsw&year=1983&mon=1&day=9</ref>
      *On 21 October 1988, [[Camden, New South Wales|Camden]], Richmond and Parramatta recorded the first and only instance of a {{convert|40.0|C}} during the month of October in Greater Sydney. Camden hitting {{convert|40.5|C}}, Richmond hitting {{convert|40.4|C}} and Parramatta hitting {{convert|40.1|C}}.<ref>http://www.bom.gov.au/climate/averages/tables/cw_068192_All.shtml</ref><ref>http://www.bom.gov.au/climate/averages/tables/cw_067033_All.shtml</ref><ref>http://www.bom.gov.au/climate/averages/tables/cw_066124_All.shtml</ref>
      *On 26 August 1995, Sydney CBD recorded its hottest winter day on record at {{convert|31.3|C}}.<ref>{{cite web|title=Sydney records hottest August day since 1995 as Australia swelters through warm end to winter|work=The Guardian|date=30 August 2023|author= Petra Stock and Natasha May|url=https://www.theguardian.com/environment/article/2024/aug/30/weather-forecast-sydney-brisbane-melbourne-temperature-winds-heat-bom#:~:text=The%20city's%20overall%20record%20August%20temperature%20set%20in%201995%20was%2031.3C.|access-date=30 August 2024}}</ref>
      *On 15 January 2001, Penrith hit {{convert|46.0|C}} and [[Prospect Reservoir]] hit {{convert|44.7|C}} as a result of a statewide heatwave. This was hottest day at both stations until 2013 and Greater Sydney's hottest day in 62 years. Sydney CBD's temperature was only {{convert|31.9|C}} that day.<ref>{{cite web | url=https://westernweekender.com.au/2013/01/our-hottest-day/ | title=Our hottest day • the Western Weekender | date=18 January 2013 }}</ref><ref>http://www.bom.gov.au/jsp/ncc/cdio/weatherData/av?p_nccObsCode=122&p_display_type=dailyDataFile&p_startYear=2001&p_c=-898303023&p_stn_num=067019</ref><ref>http://www.bom.gov.au/jsp/ncc/cdio/weatherData/av?p_nccObsCode=122&p_display_type=dailyDataFile&p_startYear=2001&p_c=-872831319&p_stn_num=066062</ref>
      *From 25–26 November 2002, Sydney CBD recorded two days in a row with a maximum temperature of {{convert|37.9|C}}, its first instance in Spring. Greater Sydney had the top three hottest places on earth that day, Penrith {{convert|42.6|C}}, [[Parramatta]] {{convert|42.1|C}} and Richmond {{convert|42.0|C}}.<ref>http://www.bom.gov.au/jsp/ncc/cdio/weatherData/av?p_nccObsCode=122&p_display_type=dailyDataFile&p_startYear=2002&p_c=-872831319&p_stn_num=066062</ref><ref>http://www.bom.gov.au/cgi-bin/climate/extremes/daily_extremes.cgi?period=%2Fcgi-bin%2Fclimate%2Fextremes%2Fdaily_extremes.cgi&climtab=tmax_high&area=aus&year=2002&mon=11&day=25</ref>
      *From 18 January – 30 January 2003, Greater Sydney recorded four days above {{convert|42|C}}. Maximum temperatures during these 12 days were {{convert|45|C}} on the 18th at Liverpool, {{convert|42.5|C}} on the 21st at Penrith, {{convert|42.3|C}} on the 26th at Penrith, and {{convert|45.3|C}} on the 30th at [[Badgerys Creek]]. This weather pattern was never seen before at the time.<ref>http://www.bom.gov.au/cgi-bin/climate/extremes/daily_extremes.cgi?period=%2Fcgi-bin%2Fclimate%2Fextremes%2Fdaily_extremes.cgi&climtab=tmax_high&area=nsw&year=2003&mon=1&day=18</ref><ref>http://www.bom.gov.au/jsp/ncc/cdio/weatherData/av?p_nccObsCode=122&p_display_type=dailyDataFile&p_startYear=2003&p_c=-900824704&p_stn_num=067113</ref><ref>http://www.bom.gov.au/jsp/ncc/cdio/weatherData/av?p_nccObsCode=122&p_display_type=dailyDataFile&p_startYear=2003&p_c=-900690483&p_stn_num=067108</ref>
      *On 21 February 2004, Penrith recorded Greater Sydney's latest instance of a {{convert|45|C}} day, hitting that exact temperature.<ref>http://www.bom.gov.au/jsp/ncc/cdio/weatherData/av?p_nccObsCode=122&p_display_type=dailyDataFile&p_startYear=2004&p_c=-900824704&p_stn_num=067113</ref>
      *On 13 October 2004, Sydney CBD and Sydney Airport recorded their hottest day in the month in october, with {{convert|39.1|C}} at the airport and {{convert|38.2|C}} at the CBD, both defeating a record set in 1942 by almost a degree.<ref>{{cite web | url=https://www.abc.net.au/news/2004-10-13/sydney-swelters-in-hottest-october-day-on-record/567928 | title=Sydney swelters in hottest October day on record | work=ABC News | date=13 October 2004 }}</ref><ref>http://www.bom.gov.au/cgi-bin/climate/extremes/daily_extremes.cgi?climtab=tmax_high&area=nsw&year=2004&mon=10&day=13</ref>
      *The morning of 7 August 2005 was the coldest August morning ever seen in Greater Sydney, when the temperature in Richmond plummeted to {{convert|-4.0|C}}, the previous August low record was in 1941, 0.4C warmer.<ref>http://www.bom.gov.au/climate/averages/tables/cw_067105_All.shtml</ref><ref>http://www.bom.gov.au/climate/averages/tables/cw_067033_All.shtml</ref>
      *1 January 2006 was Sydney's hottest New Year's Day ever recorded. [[Sydney Airport]] and Parramatta had their hottest days on record at the time, {{convert|45.2|C}} at the Airport and {{convert|44.8|C}} at Parramatta, beating their records dating back to November 1982 and January 2003.<ref>http://www.bom.gov.au/climate/current/annual/nsw/archive/2006.sydney.shtml</ref>
      *On 17 July 2007, Sydney CBD recorded its coldest morning since 1986 and its coldest morning so far in the 21st century, when the temperature dipped to {{convert|3.7|C}}. Temperatures west of the CBD dipped to {{convert|-3.5|C}} at Badgerys Creek.<ref>http://www.bom.gov.au/climate/current/month/nsw/archive/200707.sydney.shtml</ref>
      *In the summer of 2007–2008, Sydney CBD didn't experience a singular day over {{convert|31|C}}, only the third instance of it happening.<ref>http://www.bom.gov.au/climate/current/season/nsw/archive/200802.sydney.shtml</ref>
      *November 2009 was the hottest November in the CBD in 115 years and the hottest November on record for most of [[Greater Sydney]]. The average maximum temperature at the CBD and Penrith were {{convert|26.1|C}} and {{convert|32.2|C}}. The highest temperatures recorded during the month were {{convert|42.5|C}} at Sydney Airport and {{convert|42.2|C}} at Penrith. Sydney CBD registered its then second hottest spring day at {{convert|40.4|C}}.<ref>http://www.bom.gov.au/climate/current/month/nsw/archive/200911.sydney.shtml</ref>

      ===2010s–2020s===
      [[File:Bushfires smoke in Sydney Olympic Park (49240927768).jpg|thumb|Persistently hot, dry conditions enforce [[Water restrictions in Australia|water restrictions]] in the city.<ref>[https://www.nationalgeographic.com/environment/article/partner-content-australia-water-problem Failing Rains and Thirsty Cities: Australia’s Growing Water Problem] {{Webarchive|url=https://web.archive.org/web/20220128052242/https://www.nationalgeographic.com/environment/article/partner-content-australia-water-problem |date=28 January 2022 }} by Jon Heggie from the [[National Geographic]]</ref>]] 
      *From 30 January to 6 February 2011, Western Sydney endured eight days in a row above {{convert|35|C}} along with 5 nights in a row above {{convert|24|C}}. 6 days reached {{convert|39|C}} with a peak temperature of {{convert|42.2|C}} on 5 February.<ref>http://www.bom.gov.au/climate/current/month/nsw/archive/201102.sydney.shtml</ref><ref>http://www.bom.gov.au/jsp/ncc/cdio/weatherData/av?p_nccObsCode=122&p_display_type=dailyDataFile&p_startYear=2011&p_c=-900826312&p_stn_num=067113</ref> Along with that was Sydney CBD's warmest night within its 160 years of record keeping, at {{convert|27.6|C}} on 6 February.<ref>{{cite web | url=https://www.abc.net.au/news/2011-02-07/sydneys-sigh-of-relief-as-record-heatwave-ends/1932438 | title=Sydney's sigh of relief as record heatwave ends | work=ABC News | date=6 February 2011 }}</ref>
      *On 23 August 2012, a [[foehn effect]] caused Sydney to record its 3rd warmest August day on record where it reached {{convert|29.0|C|0}} at the CBD and {{convert|30.0|C|0}} at [[Sydney Airport]].<ref>[https://www.smh.com.au/environment/weather/sydney-records-third-warmest-august-day-on-record-20120823-24ns5.html Sydney records third warmest August day on record] {{Webarchive|url=https://web.archive.org/web/20220303020144/https://www.smh.com.au/environment/weather/sydney-records-third-warmest-august-day-on-record-20120823-24ns5.html |date=3 March 2022}} By Stephanie Gardiner from [[Sydney Morning Herald]]. 23 August 2012. Retrieved 3 March 2022.</ref>
      *The highest recorded maximum temperature at [[Sydney Observatory|Observatory Hill]] was {{convert|45.8|C}} on 18 January 2013 during a prolonged heat wave across Australia from early [[Angry Summer|December 2012 to late January 2013]].<ref>{{cite web|title=Special Climate Statement 43 – extreme heat in January 2013|url=http://www.bom.gov.au/climate/current/statements/scs43e.pdf|publisher=Bureau of Meteorology|access-date=2 February 2013|date=1 February 2013|archive-date=23 September 2015|archive-url=https://web.archive.org/web/20150923232139/http://www.bom.gov.au/climate/current/statements/scs43e.pdf|url-status=live}}</ref>
      *July 2013 was the warmest on record, with an average maximum temperature of {{Convert|19.5|C}}, which is {{convert|3.2|C-change}} above the historical average. This was due to persistent, warm northerly winds and clear conditions.<ref>{{cite web | url =http://www.bom.gov.au/climate/current/month/nsw/archive/201307.sydney.shtml| title = Sydney in July 2013: Warmest July on record| publisher = WeatherZone|accessdate=27 January 2024}}</ref> 
      *In September 2013, temperatures were {{Convert|4|C-change|0}} above average<ref>{{Cite web|url=https://www.smh.com.au/technology/climate-council-reports-warmest-september-on-record-20131003-2uv76.html|title=Climate Council reports warmest September on record|first=Bridie|last=Smith|date=3 October 2013|website=The Sydney Morning Herald|access-date=27 March 2022|archive-date=27 March 2022|archive-url=https://web.archive.org/web/20220327081258/https://www.smh.com.au/technology/climate-council-reports-warmest-september-on-record-20131003-2uv76.html|url-status=live}}</ref> and the city had over seven days where temperatures reached {{Convert|28|C}}, making it more similar to November's weather pattern.<ref>{{Cite web |url=http://www.dailytelegraph.com.au/news/nsw/september8217s-average-temperature-for-sydney-beats-33yearold-record/story-fni0cx12-1226729064074 |title=September's average temperature for Sydney beats 33-year-old record |access-date=25 October 2013 |archive-date=29 September 2013 |archive-url=https://web.archive.org/web/20130929083407/http://www.dailytelegraph.com.au/news/nsw/september8217s-average-temperature-for-sydney-beats-33yearold-record/story-fni0cx12-1226729064074 |url-status=dead }}</ref>
      *On 23 November 2014, Sydney recorded its hottest spring day, with {{convert|45.3|C}}in Richmond and {{convert|44.9|C}} in Penrith, breaking the previous 1982 record by 1.7C (3.6F). Meanwhile, Sydney CBD remained much cooler at {{convert|30.1|C}} a 15.2C (27.4F) difference from Richmond.<ref>http://www.bom.gov.au/climate/current/month/nsw/archive/201411.sydney.shtml</ref>
      *October 2015 had the warmest nights on record, which were {{convert|3.3|C-change}} above average.<ref>{{Cite web|url=https://www.smh.com.au/environment/weather/october-blew-away-heat-records-for-any-month-of-any-year-bureau-of-meteorology-20151102-gkoo51.html|title=October blew away heat records for any month of any year: Bureau of Meteorology|first=Peter|last=Hannam|date=2 November 2015|website=The Sydney Morning Herald|access-date=27 March 2022|archive-date=27 March 2022|archive-url=https://web.archive.org/web/20220327081259/https://www.smh.com.au/environment/weather/october-blew-away-heat-records-for-any-month-of-any-year-bureau-of-meteorology-20151102-gkoo51.html|url-status=live}}</ref>
      *In the summer of 2016–17, [[Sydney CBD]] experienced a record-breaking of 26 days where temperatures were above {{convert|30|C}} and 11 days of temperatures higher than {{convert|35|C}}, with record numbers of days above {{convert|40|C}} recorded in western Sydney including 11 days at [[Richmond, New South Wales|Richmond]], in addition to the most warm nights on record.<ref>{{cite web | url =http://www.bom.gov.au/climate/current/season/nsw/archive/201702.sydney.shtml | title =Sydney in summer 2016–17: Warmest summer on record| publisher =Bureau of Meteorology |accessdate=27 January 2024}}</ref>
      *On 10–11 February 2017, a heatwave swept through NSW, breaking multiple records, including parts of Sydney's hottest February days. Parramatta and Bankstown hit 44.5&nbsp;°C (112.1&nbsp;°F) on the 10th, surpassing records from 1979 and 1977. Sydney Airport reached 42.9&nbsp;°C (109.2&nbsp;°F), breaking its 1980 record. On the 11th, Sydney's west was hit harder; Camden Airport recorded 45.6&nbsp;°C (114.1&nbsp;°F), Penrith 46.9&nbsp;°C (116.4&nbsp;°F), and Richmond 47.0&nbsp;°C (116.6&nbsp;°F), all surpassing previous records, some by significant margins.
      [[File:Sydney heat.jpg|thumb|Car thermometer displaying a reading of 46&nbsp;°C on 7 January 2018]]
      *On 7 January 2018, Sydney was the hottest place on Earth as Penrith reached {{convert|47.3|C}}.<ref>{{Cite news|url=http://www.smh.com.au/environment/weather/sydney-clocks-the-hottest-place-on-earth-as-hot-weather-continues-20180107-h0etl6.html|title=Sydney clocks the hottest place on Earth as hot weather continues|last=McInnes|first=William|date=8 January 2018|work=The Sydney Morning Herald|access-date=8 January 2018|language=en-US|archive-date=8 January 2018|archive-url=https://web.archive.org/web/20180108091938/http://www.smh.com.au/environment/weather/sydney-clocks-the-hottest-place-on-earth-as-hot-weather-continues-20180107-h0etl6.html|url-status=live}}</ref>
      *In April 2018, Sydney had the longest running hot spell for that month with nine consecutive days of temperatures reaching {{Convert|25|C}}. Furthermore, the airport and parts of the western suburbs also broke heat records in that month.<ref>{{Cite news|url=http://www.abc.net.au/news/2018-04-09/sydney-records-hottest-april-day-ever/9634696|title=Sydney has its hottest April day on record and the endless summer looks set to continue|last=Kennedy|first=Jean|date=8 January 2018|work=[[ABC News (United States)|ABC News]]|access-date=10 April 2018|language=en-US|archive-date=10 April 2018|archive-url=https://web.archive.org/web/20180410004023/http://www.abc.net.au/news/2018-04-09/sydney-records-hottest-april-day-ever/9634696|url-status=live}}</ref>
      *January of 2019 was the hottest month on record for most of Sydney. The average maximum temperature at the airport was {{convert|30.6|C}}, 4&nbsp;°C above average with 19 calendar days in a row above 20&nbsp;°C (12–31 January). The average maximum temperature at Richmond was {{convert|33.8|C}} and recorded a whopping 15 days above {{convert|35|C}} that month. Highs of {{convert|42.4|C}} were recorded on 5 and 17 January at Penrith.<ref>http://www.bom.gov.au/climate/current/month/nsw/archive/201901.sydney.shtml#:~:text=Greater%20Sydney%20in%20January%202019,most%20sites%20across%20Greater%20Sydney.</ref>
      *On New Years Eve 2019, Penrith recorded its hottest December day when the temperature peaked at 46.3&nbsp;°C (115&nbsp;°F).<ref>{{cite news |title=Penrith Sets New December Temperature Record|last=Dodds|first=Troy|date=31 December 2019|publisher=[[Western Weekender]]|url=https://westernweekender.com.au/2019/12/penrith-sets-new-december-temperature-record/|access-date=21 July 2024}}</ref>
      *The highest recorded maximum temperature in Sydney was recorded at [[Penrith, New South Wales|Penrith]] with a high of 48.9&nbsp;°C (120&nbsp;°F) on 4 January 2020.<ref>{{cite web|url=https://www.smh.com.au/environment/weather/hottest-place-on-the-planet-penrith-in-sydney-s-west-tops-48-degrees-20200104-p53osu.html|title='Hottest place on the planet': Penrith in Sydney's west approaches 50 degrees |author1=Janek Drevikovsky |author2=Sally Rawsthorne |date=2020-01-04|website=The Sydney Morning Herald|language=en|access-date=2023-09-13|archive-date=25 January 2020|archive-url=https://web.archive.org/web/20200125064216/https://www.smh.com.au/environment/weather/hottest-place-on-the-planet-penrith-in-sydney-s-west-tops-48-degrees-20200104-p53osu.html|url-status=live}}</ref> Moreover, a heat logger registered a temperature of {{Convert|52.0|C}} at [[Berkshire Park]], making it the hottest temperature ever recorded in the Sydney basin, albeit being an unofficial one.<ref>[https://www.news.com.au/technology/environment/climate-change/new-data-shows-sydney-suburbs-reached-temperatures-over-50c-last-summer/news-story/9cdf03b09e60ee6b8f2d902b93c75595 New data shows Sydney suburbs reached temperatures over 50C last summer] {{Webarchive|url=https://web.archive.org/web/20201127085031/https://www.news.com.au/technology/environment/climate-change/new-data-shows-sydney-suburbs-reached-temperatures-over-50c-last-summer/news-story/9cdf03b09e60ee6b8f2d902b93c75595 |date=27 November 2020 }} by Anton Nilsson from News.com.au. Retrieved 26 November 2020</ref><ref>[https://www.smh.com.au/national/nsw/the-sydney-suburbs-that-hit-50c-last-summer-20201002-p561by.html The Sydney suburbs that hit 50C last summer] {{Webarchive|url=https://web.archive.org/web/20201031123318/https://www.smh.com.au/national/nsw/the-sydney-suburbs-that-hit-50c-last-summer-20201002-p561by.html |date=31 October 2020 }} by Angus Thompson from [[The Sydney Morning Herald]]. Retrieved 26 November 2020</ref> Also on that day, Penrith again earned the title of the "hottest place on earth".<ref>{{cite web | url =https://www.nsw.gov.au/media-releases/new-beach-penrith#:~:text=In%202020%2C%20Penrith%20earned%20the,Western%20Sydney%20residents%20is%20limited.| title = Western Sydney to join the State's best swimming destinations| publisher = [[Department of Planning and Environment]]|date = 26 November 2023|accessdate=12 March 2024}}</ref><ref>{{cite web | url =https://www.sbs.com.au/news/article/sydneys-penrith-the-hottest-place-on-earth-amid-devastating-bushfires/zrxrj54sw| title = Sydney's Penrith the hottest place on Earth amid devastating bushfires| publisher = [[SBS News]]|date = 4 January 2020|accessdate=12 March 2024}}</ref>  
      *On 1 February 2020, Western Sydney was once again the hottest place on the earth on that day, when Richmond hit {{Convert|46.8|C}}, the 5th hottest temperature recorded in Greater Sydney. As of December 2024 this is the last instance of a day above {{Convert|45|C}} in sydney.<ref>http://www.bom.gov.au/climate/current/month/nsw/archive/202002.sydney.shtml</ref>
      *From 28–29 November 2020, Sydney Airport recorded its hottest two days in a row. The 28th registered {{Convert|43|C}} while the 29th had registered {{Convert|42.6|C}}. On the morning of the second day of the heatwave, many places in Sydney failed to dip below {{Convert|25|C}}-{{Convert|28|C}}, places like Parramatta failed to dip below {{Convert|26.5|C}}, beating its 52 year old record by 0.9°C and Bankstown failing to dip below {{Convert|28.1|C}}, a record for all months (previous record being {{Convert|26|C}} on 2 February 2011).<ref>http://www.bom.gov.au/climate/current/month/nsw/archive/202011.sydney.shtml#:~:text=The%20month%20had%20a%20very,especially%20away%20from%20the%20coast.</ref><ref>http://www.bom.gov.au/climate/current/annual/nsw/archive/2020.sydney.shtml#:~:text=Greater%20Sydney%20in%202020%3A%20wettest,high%20as%20those%20of%202019.</ref>
      [[File:Sydney frosty morning.jpg|thumb|[[Frost]]y morning in the [[City of Hawkesbury|Hawkesbury valley]]]]
      *During May 2021, Sydney CBD recorded its coldest stretch of May days in 54 years due to a polar blast that swept across Australia's southeast, which kept the temperatures below {{Convert|9|C}} in the early mornings for five consecutive nights, in addition to the inland suburbs dipping down to {{Convert|1|C}} in [[Camden, New South Wales|Camden]] and {{Convert|5|C}} in [[Sydney Olympic Park]].<ref>[https://www.9news.com.au/national/record-cold-weather-for-may-in-sydney-as-southeast-australia-continues-to-shiver/69ced3d8-2087-41c8-9f70-0d7babcac7a3 Sydney records coldest stretch of May days in 54 years] {{Webarchive|url=https://web.archive.org/web/20210523063946/https://www.9news.com.au/national/record-cold-weather-for-may-in-sydney-as-southeast-australia-continues-to-shiver/69ced3d8-2087-41c8-9f70-0d7babcac7a3 |date=23 May 2021 }} by [[Nine News]], 20 May 2021. Retrieved 23 May 2021.</ref>
      * On 10 June 2021, Sydney CBD had its coldest day since 1984 and the coldest June day since 1899, where it reached a maximum of just {{Convert|10.3|C}}. [[Bankstown]], a western suburb, only reached {{Convert|9.7|C}}, its coldest day in 50 years, with nearby suburbs registering a similar temperature.<ref>[https://www.9news.com.au/national/australia-national-weather-forecast-snow-heavy-rain-lashes-south-east/d7f66843-f996-44f0-a147-afcb62a1139f Sydney records coldest day in 37 years] {{Webarchive|url=https://web.archive.org/web/20210610085323/https://www.9news.com.au/national/australia-national-weather-forecast-snow-heavy-rain-lashes-south-east/d7f66843-f996-44f0-a147-afcb62a1139f |date=10 June 2021 }} by Nine News</ref> These unusually cold maximums were caused by a [[cut-off low]], which is a slow moving, sizeable Antarctic cold air mass that got "cut-off" from the westerly trough systems of cold air in the south where it reached the east coast.<ref>[https://www.smh.com.au/national/nsw/sydney-set-for-coldest-day-in-25-years-while-orange-blanketed-in-snow-20210610-p57zq8.html Sydney shivers through coldest day since 1984 as snow blankets NSW] {{Webarchive|url=https://web.archive.org/web/20210610085322/https://www.smh.com.au/national/nsw/sydney-set-for-coldest-day-in-25-years-while-orange-blanketed-in-snow-20210610-p57zq8.html |date=10 June 2021 }} By Sarah McPhee and Daniella White from The Daily Telegraph. 10 June 2021</ref> 
      *August 2021 registered 15 consecutive winter days above {{Convert|20|C}}, the first time in 163 years of records, which was achieved due to a lack of cold fronts or rain over NSW during the month and a [[blocking high]] in Southern Australia that prevented cold fronts from reaching the continent.<ref>[https://www.weatherzone.com.au/news/sydneys-record-15-day-spell-of-20-degree-winter-days/534824 Sydney's record 15-day spell of 20 degree winter days] {{Webarchive|url=https://web.archive.org/web/20210823071931/https://www.weatherzone.com.au/news/sydneys-record-15-day-spell-of-20-degree-winter-days/534824 |date=23 August 2021 }} by Ben Domensino from Weatherzone. 23 August 2021</ref>
      * In September 2023, [[Western Sydney]] had six days in a row where the temperature was higher than {{Convert|32|C}}, beating the previous September record of five consecutive days.<ref>[https://www.skynews.com.au/australia-news/sydney-on-track-to-smash-weather-records-for-september-as-remarkable-hot-spell-continues-across-parts-of-nsw/news-story/162d846066e032beaf1cd8f16a2dcc45 Sydney on track to smash weather records for September as 'remarkable' hot spell continues across parts of NSW] by Adriana Mageros, Sky Weather. 18 September 2023. Retrieved 19 September 2023.</ref>
      *On 19–20 September 2023, Sydney Airport beat its highest temperature that month two days in a row, at {{Convert|35.9|C}} on the 19th and {{Convert|35.7|C}} on the 20th. These two days only just tipped the previous peak of {{Convert|35.6|C}} on the 29th in 2000.<ref>{{cite web | url =https://www.news.com.au/national/weather/australia-heatwave-sydney-sees-hottest-september-day-on-record/news-story/ac9c668a22f41ee7c8b3eec2e50a04b5| title = Australia heatwave: Sydney sees hottest September day on record| work = news| publisher = News.com.au|accessdate=27 January 2024}}</ref>
      *On 1 October 2023, the city had the hottest start on record where temperatures were {{Convert|14|C}} above average in most suburbs.<ref>{{cite web | url =https://www.smh.com.au/national/nsw/all-of-sydney-is-in-the-same-boat-city-set-for-hottest-start-to-october-20231001-p5e8ur.html| title = Sydney temperature records smashed for the start of October| date = October 2023| publisher = Sydney Morning Herald|accessdate=27 January 2024}}</ref>
      *In December 2023, Sydney CBD (Observatory Hill) experienced the hottest first fortnight of summer on record where the average maximum temperature was {{Convert|29.5|C}}, which beats the previous record of {{Convert|28.9|C}} from the first fortnight of summer in 1976.<ref>{{cite web | url = https://www.weatherzone.com.au/news/sydneys-hottest-first-fortnight-of-summer-on-record/1678257| title = Sydney's hottest first fortnight of summer on record| date = 14 December 2023| publisher = WeatherZone|accessdate=27 January 2024}}</ref> 
      *9 December 2023 was Sydney Airport's hottest December day ever recorded, where the temperature soared to {{Convert|43.5|C}}. Temperatures in the west reached a maximum of {{convert|44.0|C}} at [[Badgerys Creek]]. This was also the hottest day in Greater Sydney since the [[Black Summer]] bushfires from 2019 to 2020.<ref>{{Cite web|url=https://www.smh.com.au/national/nsw/sydney-swelters-through-day-of-extreme-heat-before-southerly-brings-relief-20231209-p5eqag.html|title=Sydney swelters through day of extreme heat before southerly brings relief|website=amp.smh.com.au|date=9 December 2023 }}</ref>
      *On 11 January 2024, Sydney recorded its muggiest day on record, where  the [[dew point]] reached {{Convert|26.9|C}}, just beating the previous record of {{Convert|25.9|C}} on 14 November 2011.<ref>{{cite web | url = https://www.smh.com.au/national/nsw/sydney-sweats-through-muggiest-day-on-record-20240111-p5ewmd.html | title = Sydney sweats through muggiest day on record| date = 11 January 2024| publisher = Sydney Morning Herald|accessdate=26 January 2024}}</ref>
      *On 30 August 2024, Sydney Airport broke its winter record of {{Convert|31.1|C}} (which was registered in 1954), reaching {{Convert|31.6|C}} in the afternoon.<ref>{{cite web | url =https://www.weatherzone.com.au/news/sydney-hits-30c-in-winter/1889812 | title = Sydney hits 30°C in winter| date = 30 August 2024| publisher = WeatherZone|author= Anthony Sharwood|accessdate=30 August 2024}}</ref><ref>{{cite web | url =https://www.sbs.com.au/news/article/a-sydney-heat-record-has-been-broken-and-another-could-fall-in-queensland/tszhdqvlq | title = A Sydney heat record has been broken, and another could fall in Queensland| date = 30 August 2024| publisher = [[SBS News]]|author= Aleisha Orr|accessdate=30 August 2024}}</ref>
      *On 27 November 2024, after a nearly a week-long heatwave conditions in Sydney, where the City saw weather conditions more typical of January or February than in November. Sydney Airport warmed to {{Convert|38.1|C}} at 12:15&nbsp;pm, which made it the hottest place in the world at that time (a few reasons being due to the [[Southeast Australian foehn|foehn effect]] and UHI effect).<ref>{{cite web | url =https://www.weatherzone.com.au/news/how-sydney-airport-was-the-hottest-place-in-the-world-on-wednesday/1890138 | title =How Sydney Airport was the hottest place in the world on Wednesday| date = 27 November 2024| publisher = WeatherZone|accessdate=27 November 2024}}</ref><ref>{{cite web | url =https://www.abc.net.au/news/2024-11-27/western-sydney-temperatures-39-degrees-heatwave/104649258 | title =Sydney weather to see temperatures hit 39C in west as heatwave continues, NSW premier warns of power shortage| date = 27 November 2024| publisher = WeatherZone|accessdate=27 November 2024}}</ref>
      *On 28 January 2025, most of Greater Sydney recorded its hottest January day since [[2019–20 Australian bushfire season|Black Summer]], reaching {{convert|42.5|C}} at Sydney Airport and Penrith and {{convert|43.3|C}} at [[Badgerys Creek]].<ref>{{cite web | url=https://www.theguardian.com/australia-news/2025/jan/28/sydney-braces-for-40c-at-lunchtime-before-southerly-buster-brings-severe-storms | title=Sydney hits 42C before dramatic shift causes temperature in some parts of city to drop 15C in an hour | work=The Guardian | date=28 January 2025 | last1=Stock | first1=Petra }}</ref>
      *On 14-16 March 2025 Greater Sydney endured 3 days in a row above {{convert|37.0|C}}, with a maximum temperature of {{convert|39.3|C}} at Sydney Airport. 
      *The highest autumn minimum temperature was recorded on 16 March 2025, when the temperature failed to drop below {{convert|25.9|C}} at Sydney's Observatory Hill for the day, marking the citys highest autumn minimum temperature since record keeping began in 1859.<ref>https://www.9news.com.au/national/weather-news-sydney-heatwave-total-fire-ban-warning/d8e86866-b7bf-4e00-9a82-f454a01fbe20</ref>

      ==Bushfires and drought==
      [[File:Dust Storm - Sydney (15220403491).jpg|thumb|Sydney CBD during the [[2009 Australian dust storm]]]]
      [[File:View of Sydney skyline during bushfires (October 17, 2013) (10325799066).jpg|thumb|[[Sydney skyline]] in bushfire haze, October 2013]]
      *On 17 December 1901, after the temperature reached {{convert|44.5|C}}, a major bushfire started from what is now [[Fairfield Heights]] through to the railway line at [[Canley Vale]], where it destroyed many houses in its path and also annihilated acres of vines and orchards between [[St Johns Park, New South Wales|St Johns Park]] and Fairfield.<ref name=wakeley>{{cite web | url=https://heritagecollection.fairfieldcity.nsw.gov.au/nodes/view/386 | title=Cabrogal to Fairfield City: A History of a Multicultural Community| author = Stephen Gapps |publisher=Fairfield City Council | location = [[Wakeley, New South Wales]]| access-date=17 July 2025 | date= 2009}}</ref> 
      *In [[1994 eastern seaboard fires|January 1994]], severe bushfires affected the [[Sydney basin]]. Homes were threatened in [[Turramurra]] by a fire in the Lane Cove River reserve, and a scrub fire had briefly cut off the holiday village of [[Bundeena]] in the [[Royal National Park]] south of Sydney. Homes were lost at [[Menai, New South Wales|Menai]], [[Illawong]], [[Bangor, New South Wales|Bangor]] and [[Alfords Point]].<ref>''Bushfire threatens homes in Turramurra''; ''The Sydney Morning Herald''; 29 December 1993</ref><ref>[http://www.rfs.nsw.gov.au/about-us/history NSW Rural Fire Service: Our History]; www.rfs.nsw.gov.au</ref><ref>[https://www.rfs.nsw.gov.au/about-us/our-districts/mia/photovideo-gallery/2014-photovideo-gallery/twenty-years-on-since-the-1994-fires-seven-news-flashback Twenty years on since the 1994 fires – Seven News Flashback]; rfs.nsw.gov.au; 6 Jan 2014</ref><ref>Mr N. P. Cheney, CSIRO Division of Forestry;  [https://www.abs.gov.au/Ausstats/abs@.nsf/0/6C98BB75496A5AD1CA2569DE00267E48 BUSHFIRES – AN INTEGRAL PART OF AUSTRALIA'S ENVIRONMENT]; The Year Book of Australia 1995; www.abs.gov.au; online 25 Jan 2020</ref>  
      *On 23 October 2002, drought and record maximum temperatures in eastern Australia produced a large dust storm – The storm arrived in Sydney at about 11&nbsp;am, reducing [[visibility]] to a few kilometres. Previous dust storms in the city occurred in April 1994, September 1968, December 1957, and January 1942 – The most severe dust storm to hit Sydney, reducing visibility at Sydney Airport to 500 metres.<ref>[http://www.australianweathernews.com/news/2002/10/20021023.htm Worst dust storm in decades sweeps across four states] {{Webarchive|url=https://web.archive.org/web/20181211223851/http://www.australianweathernews.com/news/2002/10/20021023.htm |date=11 December 2018 }} Australian Weather News</ref>
      * On 23 September 2009, a [[2009 Australian dust storm|dust storm]] that started in [[South Australia]] and inland [[New South Wales]] blanketed the city with reddish orange skies early in the morning. Originating from the [[Far North (South Australia)|north-eastern region]] of [[South Australia]], the dust storm lifted thousands of tons of dirt and soil which were then dumped in [[Port Jackson|Sydney Harbour]] and the [[Tasman Sea]].<ref>{{cite news | url=http://www.smh.com.au/environment/weather/sydney-turns-red-dust-storm-blankets-city-20090923-g0so.html | work=The Sydney Morning Herald | title=Sydney turns red: dust storm blankets city | first=Arjun | last=Ramachandran | date=23 September 2009 | access-date=20 January 2014 | archive-date=26 January 2014 | archive-url=https://web.archive.org/web/20140126151355/http://www.smh.com.au/environment/weather/sydney-turns-red-dust-storm-blankets-city-20090923-g0so.html | url-status=live }}</ref> It stretched as far north as southern [[Queensland]] and it was the worst dust storm in 70 years.<ref>{{Cite news|url=https://www.abc.net.au/news/2009-09-23/brisbane-on-alert-as-dust-storms-sweep-east/1439484|title=Brisbane on alert as dust storms sweep east|newspaper=ABC News|date=23 September 2009|via=www.abc.net.au|access-date=27 March 2022|archive-date=8 August 2022|archive-url=https://web.archive.org/web/20220808153308/https://www.abc.net.au/news/2009-09-23/brisbane-on-alert-as-dust-storms-sweep-east/1439484|url-status=live}}</ref> During that year, Sydney experienced a number of warm winter days, dry gusty winds and another milder dust storm.<ref>{{cite web |url=http://www.bom.gov.au/climate/current/season/nsw/sydney.shtml |title=Sydney in Autumn 2010 |publisher=Bom.gov.au |date= |access-date=1 June 2010 |archive-date=5 January 2010 |archive-url=https://web.archive.org/web/20100105041539/http://www.bom.gov.au/climate/current/season/nsw/sydney.shtml |url-status=live }}</ref><ref>{{cite web |url=http://www.bom.gov.au/climate/current/season/nsw/archive/200908.sydney.shtml |title=Third warmest winter on record for Sydney |publisher=Bom.gov.au |date=27 August 1995 |access-date=1 June 2010 |archive-date=20 May 2010 |archive-url=https://web.archive.org/web/20100520043831/http://www.bom.gov.au/climate/current/season/nsw/archive/200908.sydney.shtml |url-status=live }}</ref>
      *February 2011 was the driest in 30 years with only {{convert|18|mm|abbr=on}} of rain falling, which is well below the average of {{convert|118|mm|abbr=on}}. Some of the western suburbs recorded the lowest total February rainfall on record.<ref>{{Cite web|url=http://www.bom.gov.au/climate/current/month/nsw/archive/201101.sydney.shtml|title=Sydney in January 2011: Warm start to 2011|access-date=2 March 2011|archive-date=29 June 2011|archive-url=https://web.archive.org/web/20110629171829/http://www.bom.gov.au/climate/current/month/nsw/archive/201101.sydney.shtml|url-status=live}}</ref>
      *In October 2013, [[2013 New South Wales bushfires|major bushfires impacted western Sydney]] and the [[Blue Mountains (New South Wales)|Blue Mountains]], resulting in some evacuations, closed roads, and destroyed homes.<ref>{{cite web|url=http://www.bom.gov.au/climate/current/month/nsw/summary.shtml|title=NSW in September 2013: Warmest September on record|work=Monthly Climate Summary for New South Wales|publisher=[[Bureau of Meteorology]]|date=14 October 2013|access-date=20 October 2013}}</ref>
      *The summer of 2013–14 was the driest since 1986–87, recording only {{convert|106.6|mm|abbr=on}} of rain during the season, close to a third of the average of {{convert|297.7|mm|abbr=on}}.<ref>{{cite web | url = http://www.bom.gov.au/climate/current/season/nsw/archive/201402.sydney.shtml| title = Sydney in summer 2013–14: Driest summer since 1986–87| publisher = ABC News|accessdate=27 January 2024}}</ref>  Observatory Hill only received {{convert|17|mm|abbr=on}} of rain in January.<ref>{{cite web|url=http://www.smh.com.au/environment/weather/sydney-in-midst-of-driest-summer-for-more-than-70-years-20140203-31w82.html|title=Sydney in midst of driest summer for more than 70 years|publisher=The Sydney Morning Herald|date=3 February 2014|access-date=28 January 2015|archive-date=9 June 2014|archive-url=https://web.archive.org/web/20140609035503/http://www.smh.com.au/environment/weather/sydney-in-midst-of-driest-summer-for-more-than-70-years-20140203-31w82.html|url-status=live}}</ref>
      *September 2017 was the driest on record, with the gauge receiving only {{convert|0.2|mm|abbr=on}} of rain. Furthermore, in that year, the city received less than half of its long-term average rainfall between July and December.<ref>{{cite web|publisher=Sydney Morning Herald|date=2017|url=http://www.smh.com.au/environment/weather/2017-brought-another-year-of-weather-extremes-as-drought-and-heat-took-its-toll-20171228-h0atea.html|title=2017 brought another year of weather extremes as drought and heat took its toll|access-date=2 January 2018|archive-date=3 January 2018|archive-url=https://web.archive.org/web/20180103064330/http://www.smh.com.au/environment/weather/2017-brought-another-year-of-weather-extremes-as-drought-and-heat-took-its-toll-20171228-h0atea.html|url-status=live}}</ref> 
      *In 22 November 2018, a [[dust storm]], stretching about 500 kilometres, swept through Sydney due to a low pressure trough and cold front that picked up dry soil in drought-ridden areas of [[Far West (New South Wales)|far western NSW]] that week. Milder compared to the 2009 storm, the effect of the dust was still apparent across iconic locations such as the [[Sydney Opera House]] and Sydney Harbour Bridge.<ref>[https://www.abc.net.au/news/2018-11-22/dust-storm-on-way-to-sydney-prompts-health-warning/10520448 Dust storm hits Sydney, NSW Government issues air quality warning] {{Webarchive|url=https://web.archive.org/web/20181122035639/https://www.abc.net.au/news/2018-11-22/dust-storm-on-way-to-sydney-prompts-health-warning/10520448 |date=22 November 2018 }} by  Jamie McKinnell and Angelique Lu (ABC News)</ref> 2018 in Sydney has been one of the driest in a century, with the Greater Western Sydney farming region being the worst affected.<ref>[https://www.news.com.au/national/nsw-act/worst-drought-in-more-than-100-years-now-on-sydneys-doorstep/news-story/7da02868172654cd5df0f059adf2b147 Worst drought in more than 100 years now on Sydney’s doorstep] {{Webarchive|url=https://web.archive.org/web/20181122131847/https://www.news.com.au/national/nsw-act/worst-drought-in-more-than-100-years-now-on-sydneys-doorstep/news-story/7da02868172654cd5df0f059adf2b147 |date=22 November 2018 }} by Jack Morphet ([[News.com.au]])</ref>
      *Due to the widespread [[2019–20 Australian bushfire season|bushfires in December 2019]], which even affected the western periphery of the city, the Sydney metropolitan area suffered from dangerous smoky [[haze]] for several days throughout the month, with the [[air quality]] being 11 times the [[hazard]]ous level in some days,<ref>{{Cite web|url=https://www.news.com.au/national/sydney-smoke-haze-reaches-11-times-the-hazardous-level/video/1d45b28f8c2459ee9ecfb9fee65fbbfe|title=Sydney smoke haze reaches 11 times the hazardous level|access-date=1 Jan 2020|archive-date=1 January 2020|archive-url=https://web.archive.org/web/20200101102625/https://www.news.com.au/national/sydney-smoke-haze-reaches-11-times-the-hazardous-level/video/1d45b28f8c2459ee9ecfb9fee65fbbfe|url-status=live}}</ref><ref>{{Cite news |url=https://www.theguardian.com/australia-news/gallery/2019/dec/10/sydneys-top-landmarks-smothered-in-smoke-in-pictures |title=Sydney smoke: bushfires haze smothers landmarks – in pictures |newspaper=The Guardian |date=10 December 2019 |access-date=1 Jan 2020 |last1=Hromas |first1=Jessica |archive-date=1 January 2020 |archive-url=https://web.archive.org/web/20200101050649/https://www.theguardian.com/australia-news/gallery/2019/dec/10/sydneys-top-landmarks-smothered-in-smoke-in-pictures |url-status=live }}</ref> even making it worse than New Delhi's,<ref>{{Cite web|url=https://www.theaustralian.com.au/nation/temperature-inversion-traps-smoke-in-sydney/news-story/b6d804cc21eaaaf9b88ec6a448285be8|title=Bushfire smoke makes Sydney air quality worse than Delhi|date=3 December 2019 |access-date=1 Jan 2020|archive-date=28 March 2022|archive-url=https://web.archive.org/web/20220328114042/https://www.theaustralian.com.au/nation/temperature-inversion-traps-smoke-in-sydney/news-story/b6d804cc21eaaaf9b88ec6a448285be8|url-status=live}}</ref> where it was also equalled to "smoking 32 cigarettes."<ref>{{Cite web|url=https://www.news.com.au/lifestyle/health/health-problems/sydney-fire-haze-equal-to-smoking-32-cigarettes/news-story/7ab680a39edd6d87ae76e35894f949f6|title=Sydney fire haze equal to 'smoking 32 cigarettes'|work=news |access-date=1 Jan 2020|archive-date=31 December 2019|archive-url=https://web.archive.org/web/20191231145659/https://www.news.com.au/lifestyle/health/health-problems/sydney-fire-haze-equal-to-smoking-32-cigarettes/news-story/7ab680a39edd6d87ae76e35894f949f6|url-status=live}}</ref>
      *December 2019 only recorded {{convert|1.6|mm|abbr=on}} of rain at Observatory Hill, overthrowing the previous {{convert|2.8|mm|abbr=on}} recorded for the month in 1979.<ref>{{cite web|url=https://www.smh.com.au/environment/weather/there-s-definitely-a-warming-trend-you-can-t-not-see-it-our-year-of-wild-weather-20191230-p53nld.html|title='There's clearly a warming trend. You can't not see it': Our year of wild weather|publisher=The Sydney Morning Herald|date=2 January 2020|access-date=2 January 2020|archive-date=2 January 2020|archive-url=https://web.archive.org/web/20200102012019/https://www.smh.com.au/environment/weather/there-s-definitely-a-warming-trend-you-can-t-not-see-it-our-year-of-wild-weather-20191230-p53nld.html|url-status=live}}</ref>
      *June 2022 was the driest in 36 years, registering only {{convert|17.2|mm|abbr=on}} of rain, despite the city having the wettest first half of a year on record.<ref>[https://www.weatherzone.com.au/news/sydneys-driest-june-since-1986-amid-record-wet-start-to-year/661854 Sydney's driest June since 1986 amid record wet start to year] {{Webarchive|url=https://web.archive.org/web/20220702031155/https://www.weatherzone.com.au/news/sydneys-driest-june-since-1986-amid-record-wet-start-to-year/661854 |date=2 July 2022 }} Ben Domensino from WeatherZone. 30 June 2022. Retrieved 2 July 2022.</ref>
      *July 2023 recorded the driest start to winter in 85 years, receiving only {{convert|22.2|mm|abbr=on}} of rain since the start of June. It was the driest start to winter since 1938 and the third-driest on record since records began in 1859.<ref>{{cite web | url = https://www.9news.com.au/national/sydney-weather-el-nino-sydneys-driest-start-to-winter-in-85-years/d7cbc807-095d-4ae2-9083-a88df82b906d | title = Sydney records driest start to winter in 85 years| date = 14 July 2023| publisher = [[Nine News]]|accessdate=27 January 2024}}</ref>
      *On 14 September 2023, Sydney was ranked third-worst in the world for air quality by [[IQAir]] due to severe haze from [[hazard reduction]] burns.<ref>{{cite news | url = https://www.theguardian.com/australia-news/2023/sep/14/sydney-air-quality-smoke-haze-today-back-burning-schedule-hazard-reduction-burns| title =Sydney smoke: air quality among worst in world due to hazard-reduction burns| work =The Guardian | date =14 September 2023|accessdate=27 January 2024| last1 =Touma| first1 =Rafqa| last2 =Rachwani| first2 =Mostafa}}</ref>
      *On 19 December 2023, the city was blanketed by haze and experienced poor air quality due to gusty winds bringing smoke from [[Pilliga, New South Wales|Pilliga]] forest bushfires.<ref>{{cite news | url = https://www.abc.net.au/news/2023-12-19/nsw-sydney-city-smoke-haze/103247526| title = Sydney blanketed by haze as strong winds carry smoke from Duck Creek, Pilliga Forest bushfire| newspaper = ABC News| date = 19 December 2023|accessdate=27 January 2024}}</ref>

      ==Rainstorms and windstorms==
      {{see also|Severe storms in Australia|Floods in New South Wales}}

      ===18th–19th century===
      *On 6 February 1788, Lieutenant [[Ralph Clark]], an officer of the [[First Fleet]], noted that he experienced "the most violent storm of lightning and rain", where he concludes, "The lightning was incessant during the whole night and I never heard it rain faster."<ref>[https://arthurphillipchapter.weebly.com/weather-secrets.html WEATHER SECRETS OF THE FIRST FLEET VOYAGE] Arthur Phillip Chapter of Fellowship of First Fleeters</ref>
      *The first recorded [[tornado]] in Australia struck Sydney in 1795, during the early settlement, where it destroyed crops and trees.<ref>{{cite web|last=Evershed |first=Nick |url=http://www.thecourier.com.au/story/1389432/multimedia-tornadoes-in-australia/interactive/ |title=MULTIMEDIA: Tornadoes in Australia |publisher=The Courier |date=2013-03-26 |accessdate=2014-01-22}}</ref> 
      *On 20 August 1857, the ''[[Dunbar (1853 ship)|Dunbar]]'', a sailing ship carrying 122 people from England, was wrecked off [[Sydney Heads|South Head]] due to a powerful east coast low while trying to seek shelter in [[Port Jackson|Sydney Harbour]], leaving only one survivor.<ref name="BOMhist" >{{cite web|title=When were most recent major East Coast Lows?|url=http://www.bom.gov.au/nsw/sevwx/facts/ecl.shtml#hist|publisher=Bureau of Meteorology|accessdate=6 April 2013}}</ref>
      *Both in June 1816 and June 1864, the [[Hawkesbury River]] had overflowed after heavy rainfall, rising over 14 meters, where it flooded and caused widespread damage in nearby towns.<ref>[https://climatehistory.com.au/2012/09/27/la-nina-brings-flooding-rains-to-nsw-in-the-early-1860s/ La Niña brings flooding rains to NSW in the early 1860s] by Climate History Australia, 27 September 2012. 16 April 2020</ref><ref name="Sydney wild weather"/>
      *On 22 June 1867, heavy rain and winds caused the water of the Hawkesbury River to rise to 19.2 metres, submerging and ruining 16,000 homes and buildings from [[Pitt Town]] to [[Wisemans Ferry]]. The flood caused 12 deaths, which were dramatically represented in the ''[[Illustrated Sydney News]]'' in July 1867. Survivors were on rooftops waiting to be rescued by boatmen.<ref name="Sydney wild weather">[http://home.dictionaryofsydney.org/sydneys-wild-weather/ Sydney’s wild weather] by Nicole Cama, 9 June 2016. Retrieved 14 April 2020</ref> Known as ''The Great Flood'', it caused damage in the order of $1.4&nbsp;billion in the Nepean region and it has about a one-in-280 chance of occurring again.<ref name=daily>[https://www.dailytelegraph.com.au/newslocal/penrith-press/deadly-flood-remembered/news-story/2caddaf39ec64f01e9c2044bd0c3b1ad Sydney’s most devastating flood, the Great Flood of 1867, remembered] [[Daily Telegraph (Sydney)|The Daily Telegraph]] 21 June 2017. Retrieved 15 April 2020</ref>
      *On 28 May 1889, the low-lying [[Inner West]] suburbs of [[Croydon Park, New South Wales|Croydon Park]], [[Canterbury, New South Wales|Canterbury]] and [[Marrickville]] were heavily affected by torrential rainfall. Residents were depicted in newspapers in their [[rowboat]]s rescuing the [[homeless]] and rowing through the flooded streets besides partially sunken shopfronts and homes.<ref name="Sydney wild weather" /><ref>[https://trove.nla.gov.au/newspaper/article/13724597 HEAVY FLOODS IN THE SUBURBS. INTERRUPTION TO RAILWAY AND TELE-GRAPHIC COMMUNICATION. FATALITY AT COOK'S RIVER. DESTRUCTION OF PROPERTY.]''Sydney Morning Herald'' Retrieved 14 April 2020</ref> Some suburbs, such as [[Prospect, New South Wales|Prospect]] in the [[Greater Western Sydney|greater west]], received {{convert|314.2|mm|in|1|abbr=on}} of rainfall in 24 hours.<ref>{{cite web | url = http://www.bom.gov.au/climate/averages/tables/cw_067019_All.shtml | publisher = Bureau of Meteorology |title = Climate statistics for Prospect Reservoir |accessdate = 14 April 2020}}</ref>

      ===20th century===
      ====1910s–1960s====
      [[File:SLNSW 42421 A flooded street in Alexandria South Sydney.jpg|thumb|A flooded street in [[Alexandria, New South Wales|Alexandria]] after a rainstorm (September 1934)]]
      *On 26 November 1912, a powerful hail and thunderstorm passed over Sydney, where {{convert|12.7|mm|2|abbr=on}} of rain fell in 10 minutes flooding streets, in addition to a lightning killing one labourer at a tramway [[construction site]].<ref>[https://trove.nla.gov.au/newspaper/article/62550287 Flood in Sydney] Townsville Daily Bulletin (Qld: 1907 – 1954). Retrieved 15 April 2020</ref>
      *On 24 March 1914, [[Parramatta]] was flooded after {{convert|88.9 |mm|2|abbr=on}} of rain fell in just two hours. [[Parramatta railway station]], businesses in Church Street and houses were partially submerged, and the [[Parramatta River]] was overflowed.<ref>[https://trove.nla.gov.au/newspaper/article/15499442 PARRAMATTA FLOODED. BUILDINGS DESTROYED. MANY EXCITING EXPERIENCES.] 24 March 1914 ''Sydney Morning Herald''</ref>
      *On 25 November 1914, a severe thunderstorm which was likely accompanying a tornado, hit Sydney's northern and harbour-side suburbs, and destructed through a line of shopfronts near [[Lindfield railway station]].<ref name="stormyweather">[https://www.aer.gov.au/system/files/Attachment%203%20-%20Bureau%20of%20Meteorology%20-%20A%20history%20of%20stormy%20weather.pdf Stormy weather – A century of storms, fire, flood and drought in New South Wales] by the Bureau of Meteorology, 2009. Retrieved 15 April 2020</ref>
      *On 6 October 1916, an east coast low brought {{convert|120.1|mm|2|abbr=on}} of rain in 24 hours, flooding roads, overflowing rivers and damaging vegetable gardens.<ref>[https://trove.nla.gov.au/newspaper/article/1593063 THE FLOODS. SYDNEY- DOWNPOUR. Remarkable Rain Records.] [[The Argus (Melbourne)|The Argus]] (Melbourne, Vic. : 1848 – 1957). Retrieved 15 April 2020</ref>
      *On 25 October 1919, a powerful hailstorm caused severe damage to buildings when it blocked gutters and drains, thus allowing rainwater to overspill into ceilings and basements.<ref name="stormyweather"/>
      *On 6 July 1931, Sydney was whipped by cyclonic winds and heavy rainfall, where it received {{convert|198.1|mm|2|abbr=on}} of rain in 24 hours. In addition to thousands of [[Australian pound|pounds]] worth of damage to property, which included roofs and electricity, five deaths were recorded.<ref>[https://trove.nla.gov.au/newspaper/article/83899166  SYDNEY LASHED BY STORM] by [[The Daily News (Perth)]] from The National Library of Australia. Retrieved 15 April 2020</ref> 
      *On 25 January 1937, a tornado tore through the suburbs of Marrickville, [[Mascot, New South Wales|Mascot]], [[Botany, New South Wales|Botany]] and [[Matraville]], where five people died and dozens were injured in falling buildings.<ref name="stormyweather"/>
      [[File:1947 Sydney hailstorm boat.jpg|thumb|The 8 cm (3.1in) hailstones hitting the water at [[Rose Bay, New South Wales|Rose Bay]] during the 1947 hailstorm]]
      *On 31 October 1940, a tornado created a {{convert|19|km|abbr=on}} path of damage, where it tore through thousands of homes, killing two people. A gust of 153&nbsp;km/h was recorded.<ref name="stormyweather"/>
      *In the [[1947 Sydney hailstorm]], which occurred on 1 January 1947, a [[storm cell]] developed on the morning of New Year's Day, over the [[Blue Mountains (Australia)|Blue Mountains]], hitting the city and dissipating east of [[Bondi, New South Wales|Bondi]] in the mid-afternoon. At the time, it was the most severe storm to strike the city since recorded observations began in 1792. The high humidity, temperatures and weather patterns of Sydney increased the strength of the storm. The cost of damages from the storm were, at the time, approximately [[Pound sterling|GB£]]750,000 ([[United States dollar|US$]]3&nbsp;million); this is the equivalent of around [[Australian dollar|A$]]45&nbsp;million in modern figures. The [[supercell]] dropped hailstones larger than {{convert|8|cm}} in diameter, with the most significant damage occurring in the [[Sydney central business district|central business district]] and [[Eastern Suburbs (Sydney)|eastern suburbs]] of Sydney.<ref name="SMH47">{{cite news |url=http://nla.gov.au/nla.news-article18019034 |title=ICE STORM LASHES CITY AND SUBURBS |newspaper=[[Sydney Morning Herald]] |issue=34,018 |location=New South Wales, Australia |date=2 January 1947 |accessdate=11 September 2016 |page=1 |via=National Library of Australia}}<br />{{cite news |url=http://nla.gov.au/nla.news-article18019050 |title=SCENES OF DEVASTATION AFTER FREAK HAIL HIT CITY |newspaper=[[Sydney Morning Herald]] |issue=34,018 |location=New South Wales, Australia |date=2 January 1947 |accessdate=11 September 2016 |page=1 |via=National Library of Australia}}</ref>
      *On 15 June 1949, {{convert|94.1|mm|2|abbr=on}} of rain fell in just one hour, the highest at that time since the records began. Flash flooding swamped businesses, shopfronts and homes.<ref>[https://trove.nla.gov.au/newspaper/article/63067446 SYDNEY HAS WORST FLOOD IN HISTORY] Townsville Daily Bulletin (Qld.:1907 – 1954). Retrieved 15 April 2020</ref>
      *In June 1950, a series of east coast cyclones develop off the New South Wales coast during which Sydney registered its highest monthly rainfall on record, {{convert|642.7|mm|in|1|abbr=on}}.<ref name="GuyCarp" >{{cite web|title=Australian East Coast Storm 2007: Impact of East Coast Lows|url=http://www.guycarp.com/portal/extranet/insights/reportsPDF/2007/Australian%20East%20Coast%20Storm%20Report%202007.pdf;JSESSIONIDGCPORTALWCPORTALAPP=SnxFRhyT61F516ykRxppJk2fpTnb44CVvrBLN6Phh36jhlJ38vpj!2079543398?vid=1|publisher=Guy Carpenter|accessdate=7 April 2013|date=October 2007}}</ref><ref name="Hopkins" >{{cite journal|last=Hopkins|first=Linda C.|author2=Holland, Greg J.|title=Australian Heavy-Rain Days and Associated East Coast Cyclones: 1958–92|journal=Journal of Climate|year=1997|volume=10|issue=4|pages=621–635|doi=10.1175/1520-0442(1997)010<0621:AHRDAA>2.0.CO;2|bibcode = 1997JCli...10..621H |doi-access=free}}</ref> 
      *On 26 July 1952, Sydney CBD received {{convert|203.2|mm|2|abbr=on}} of rain and cyclonic winds caused local floods, two [[landslide]]s in the north, traffic delays and as well as a death of a man.<ref>[https://trove.nla.gov.au/newspaper/article/229780443 DEATH. FLOOD DAMAGE AND DELAYS IN SYDNEY STORM|TWO LANDSLIDES BLOCK. MAIN NORTHERN RAILWAY] The Sun (Sydney, NSW : 1910 – 1954). Retrieved 15 April 2020</ref>
      *On 10 February 1956, heavy rain caused the [[Georges River]] to overflow, which led to five deaths, flooding 1,000 homes and leading to the evacuation of 8,000 people. Homes in [[Bankstown]], [[Panania]], [[East Hills, New South Wales|East Hills]], [[Milperra]], [[Moorebank]] and the surrounds were submerged. Stranded residents were rescued by the police, the army and by civilians in row boats.<ref name="stormyweather"/>
      *On 9 July 1957, a tornado [[squall]] occurred at [[Warriewood]] and [[Narrabeen]] on the [[Northern Beaches]] that blew off house roofs and caused more than £40,000 ($80,000) worth of damage.<ref name="stormyweather"/>
      *On 23 November 1961, [[Penrith, New South Wales|Penrith]] was flooded, with many properties and businesses being destroyed, after receiving half its annual average rainfall in just two days.<ref>[https://westernweekender.com.au/2021/03/flashback-penriths-disastrous-1961-flood/ Flashback: Penrith’s disastrous 1961 flood] by The Western Weekender. 21 March 2021</ref> The Nepean River reached a height of {{convert|9.7|m|2|abbr=on}} after the area received {{convert|546|mm|in|1|abbr=on}} of rain in two days.<ref>[https://trove.nla.gov.au/newspaper/article/100982945 Floods Engulf Nepean Valley] by Trove. 21 March 2021</ref>

      ====1970s–1990s====
      *On 24 April 1974, the western suburbs endured severe flash flooding that resulted in $20&nbsp;million worth of damage and one death, as a consequence of {{convert|200|mm|2|abbr=on}} of rain falling in three days.<ref name="stormyweather"/>
      *On 10 March 1975, [[Sydney airport]] received {{convert|174.7|mm|2|abbr=on}} of rainfall in six hours, in addition to flash flooding which caused more than $15 m worth of damage.<ref name="stormyweather"/>
      *On 10 November 1976, intense thunderstorms caused severe damage in around [[Lidcombe]] and Auburn, with tennis-ball size (6&nbsp;cm) hail and violent winds that injured 10 people. Damage costs were $40&nbsp;million.<ref name="stormyweather"/>
      *On 10–11 February 1978, a tornado tore through many homes in the [[Lower North Shore (Sydney)|Lower North Shore]], injuring eight people. The damage cost was $15&nbsp;million.<ref name="stormyweather"/>
      *Between 19 and 24 March 1978, after an intense low pressure cell developed on the [[Coral Sea]], travelling southwards, heavy rainfall occurred in the east coast which overflowed the Hawkesbury River, thereby flooding nearby homes and damaging roads. Several weather stations in the Sydney metropolitan area reported daily rainfall totals in excess of {{convert|250|mm|2|abbr=on}}.<ref>[https://web.archive.org/web/20220715231046/https://nsw-coastal-explorer.domorewithmaps.com/documents/THE%20MARCH%201978%20FLOOD%20ON%20THE%20HAWKESBURY%20AND%20NEPEAN%20RIVER%20BETWEEN%20PENRITH%20AND%20PITT%20TOWN%20-%20SJ%20RILEY%20-%20SCHOOL%20OF%20EARTH%20SCIENCES.pdf The March, 1978 flood on theHawkesbury and Nepean Riverbetween Penrith and Pitt Town] S. J. Riley, School of Earth Sciences, Macquarie University, [[North Ryde]]. Retrieved 15 April 2020</ref>
      *On 8 November 1984, Sydney CBD saw {{convert|235|mm|2|abbr=on}} of rain with {{convert|120.3|mm|2|abbr=on}} falling at Observatory Hill in just one hour. Causing damage to homes in the [[Port Jackson|Sydney Harbour]] and burying vehicles in mud, the storm was caused by a coastal trough with very high humidity values which in turn spawned very slow moving [[thunderstorm]]s.<ref name="severe storms">{{Cite web|url=http://www.bom.gov.au/nsw/sevwx/8089summ.shtml|archive-url=https://webarchive.nla.gov.au/awa/20120310130900/http://pandora.nla.gov.au/pan/55864/20120311-0009/www.bom.gov.au/nsw/sevwx/8089summ.shtml|url-status=dead|archive-date=10 March 2012|title=Bureau – Severe Storm events – 1980/1989|website=webarchive.nla.gov.au|access-date=24 May 2019}}{{cbignore|bot=medic}}</ref> The cost of damages from the storm were, at the time, $80&nbsp;million.<ref>[https://knowledge.aidr.org.au/resources/flood-sydney-1984/ Sydney, New South Wales, November 1984 Flood – Sydney] Australian Institute for Disaster Resilience. Retrieved 15 April 2020</ref>
      *On 6 August 1986, a record {{convert|327.6|mm|2|abbr=on}} of rainfall was dumped on the city in 24 hours, causing severe floods, major traffic problems and damage in many parts of the metropolitan area.<ref>[https://webarchive.nla.gov.au/awa/20090317054300/http://pandora.nla.gov.au/pan/96122/20090317-1643/www.bom.gov.au/lam/climate/levelthree/c20thc/cyclone8.html Rain in Sydney, 1986] {{cbignore|bot=medic}}in ''Australian Climate Extremes'', Bureau of Meteorology. Retrieved 9 September 2006.</ref> 
      *On 3 October 1986, ten people were injured and hundreds of homes were damaged after a hail up to 6&nbsp;cm size hit the western suburbs. The total damage bill was $161&nbsp;million.<ref name="severe storms"/> 
      [[File:Thunderstorm in sydney 2000x1500.png|thumb|A lightning storm over [[Potts Point, New South Wales|Potts Point]] in 1991]]
      *On 3 February 1990, Sydney CBD received its record 24-hour February rainfall at {{convert|243.6|mm|2|abbr=on}}, when [[1989–90 South Pacific cyclone season|ex-tropical cyclone Nancy]] was centred on Brisbane.<ref>[http://web.science.unsw.edu.au/~mss/index_files/speeretal_published.pdf Low pressure systems off the New South Wales coast and associated hazardous weather: establishment of a database] by Milton S. Speer, Perry Wiles and Acacia Pepler, Climate Change Research Centre, Faculty of Science, The University of New South Wales, Sydney, Australia. Bureau of Meteorology, 
      Department of Physical Geography, [[Macquarie University]], Sydney, Australia</ref> 
      *On 18 March 1990, in around [[Auburn, New South Wales|Auburn]] and Bankstown, large hail up to 8&nbsp;cm diameter with strong winds and flash flooding caused $550&nbsp;million worth of damage, where more than 2000 houses had window and roof damage.<ref name="SES">[https://www.ses.nsw.gov.au/media/2542/the_response_to_the_mother_of_all_storms.pdf The response to the ‘mother of all storms’: a combat agency view] By Chas Keys, Deputy Director General, [[New South Wales State Emergency Service|NSW State Emergency Service]]. Retrieved 15 April 2020</ref>
      *On 21 January 1991, the [[North Shore (Sydney)|Northern Sydney]] area ([[Turramurra]], [[Pymble]] and the surrounds) received hail 7&nbsp;cm in size with winds up to 230&nbsp;km/h, and as well as {{convert|60|mm|2|abbr=on}} of rain in 30 minutes. With a damage cost of $670&nbsp;million, the storm event damaged over 7000 houses from felled trees and floods.<ref name="SES"/>
      *On 12 February 1992, in the western and northern suburbs, a storm caused $335&nbsp;million worth of damage after rain, large hail and flash flooding battered over 500 houses.<ref name="SES"/>
      *On 20 November 1994, a severe storm caused $29&nbsp;million worth of damage in the Sydney region, namely in the north, where many trees were felled and houses wrecked.<ref name="stormyweather"/>
      *In the early hours of 30 August 1996, an east coast low ravaged Sydney, bringing destructive winds that damaged properties and heavy rainfall that caused flash flooding and road blockage. [[Turramurra]] received {{convert|160|mm|2|abbr=on}} of rainfall in 24 hours, [[Epping, New South Wales|Epping]] at {{convert|143|mm|2|abbr=on}} and the CBD at {{convert|127|mm|2|abbr=on}}. Wind gusts up to 160&nbsp;km/h were recorded. Insurance payouts due to the storm were estimated to be up to $50&nbsp;million.<ref>[http://australiasevereweather.com/storm_news/1996/docs/9608-01.htm East Coast Low: Saturday 31 August 1996]
      by Michael Bath</ref><ref>[https://www.sydneyswans.com.au/news/561900/wet-weather-flashback-round-22-1996 Wet-weather flashback: Round 22, 1996] by Zachary Gates, 10 February 2020. Retrieved 21 February 2020.</ref> 
      [[File:1999 Sydney hailstorm cardamage.jpg|thumb|The aftermath of the 1999 hailstorm on a suburban Sydney street]]
      *The [[1999 Sydney hailstorm|14 April 1999 hailstorm]] was a notable storm event in Sydney, which caused severe damage in many suburbs and killed one man when his boat was struck by lightning. The storm produced hailstones of up to {{convert|9|cm|1|abbr=on}} in diameter and resulted in insurance losses of around [[Australian dollar|A]]$1.7&nbsp;billion in less than five hours.<ref>{{cite web | url = http://www.bom.gov.au/weather/nsw/sevwx/14april1999.shtml | title = The Sydney Hailstorm – 14 April 1999 | publisher = Bureau of Meteorology|accessdate=5 October 2006}}</ref>

      ===21st century===
      ====2000s–2010s====
      *On 3 December 2001, the state of New South Wales recorded a wind gust of 174&nbsp;km/h during a freak thunderstorm in [[Richmond, New South Wales|Richmond]]. In addition, two schoolchildren were killed after a tree fell on their tent in the northern suburbs.<ref name="stormyweather"/>
      *A [[2007 New South Wales storms|major storm in early June 2007]] brought over {{convert|500|mm|2|abbr=on}} of rainfall in 5 days in the [[Sydney CBD]] and the eastern suburbs.<ref>{{cite web |url=http://www.bom.gov.au/nsw/sevwx/0708summ.shtml |title=Summary of Significant Severe Thunderstorm Events in NSW – 2007/08 |work=Bureau of Meteorology |year=2011 |accessdate=27 September 2011 |url-status=dead |archiveurl=https://web.archive.org/web/20110604130436/http://www.bom.gov.au/nsw/sevwx/0708summ.shtml |archivedate=4 June 2011  }}</ref><ref>{{Cite web|url=http://www.bom.gov.au/climate/current/month/nsw/archive/200706.sydney.shtml|title=Sydney has wettest June for 57 years}}</ref>
      *On 9 December 2007, a powerful thunderstorm affected western Sydney with hail 7&nbsp;cm in diameter. The State Emergency Service received over 6000 calls for assistance and the damage bill was $201&nbsp;million.<ref name="stormyweather"/>
      *On 18 November 2013, an [[Enhanced Fujita scale|EF1]] tornado hit [[Hornsby, New South Wales|Hornsby]], a suburb in the [[North Shore (Sydney)|Upper North Shore]], where winds reached {{convert|140|km/h}}.<ref name="news.com.au">{{Cite web|url=http://www.news.com.au/national/hornsby-hit-by-mini-tornado-which-sounded-like-a-freight-train-and-ripped-the-roof-off-the-myer-building/news-story/7d529d6b5b7e45385bb11459df16e077|title=Hornsby hit by mini tornado which sounded like a freight train and ripped the roof of the Myer building|work=news }}</ref> The tornado's path was {{convert|2|km|abbr=on}} long and {{convert|50|m|abbr=on}} wide.<ref>{{Cite web|url=https://www.abc.net.au/news/2013-11-19/clean-up-continues-after-tornado-strikes-in-sydney27s-north/5101560|title=Clean-up after tornado strikes in Sydney's north|work=ABC News |date=19 November 2013|via=www.abc.net.au}}</ref><ref>{{cite news| url=http://www.smh.com.au/environment/weather/hornsby-was-hit-by-a-tornado-bureau-of-meteorology-confirms-20131119-2xsai.html | work=Sydney Morning Herald | title=Hornsby was hit by a tornado, Bureau of Meteorology confirms}}</ref> Blowing off roofs and toppling large trees, the tornado injured a total of 12 people.<ref name="news.com.au"/>
      *On 15 October 2014, a rainstorm described as a "once-in-a-decade event" hit the Sydney region. Parts of Sydney received the heaviest amount of rain in a span of hours in decades. {{Convert|94|mm|abbr=on|2}} of rain fell in [[Strathfield]] in just over three hours. The winds were cyclonic in nature, with [[Sydney Airport]] having over {{convert|107|km/h|abbr=on}} gusts, reaching [[Category 1 hurricane|Category 1 strength]]. This event happened due to the formation of an [[east coast low]], which ignited several other [[Low-pressure area|low pressure]] systems.<ref>{{cite web|url=http://www.smh.com.au/environment/weather/once-every-100-years-what-made-the-sydney-storm-so-ferocious-20141015-1167eo.html |title='Once every 100 years': what made the Sydney storm so ferocious |publisher= [[Sydney Morning Herald]] |date= 15 October 2014}}</ref>
      [[File:Sydneyhail.jpg|thumb|More than 50cm of hail was dumped on 25 April 2015, turning streets into [[snow field]]s ([[Pagewood]]).<ref>[https://www.dailytelegraph.com.au/news/nsw/roads-turn-to-rivers-as-nsw-suffers-freak-hailstorm/news-story/534ffc2ab78b993bd30d0d888c38cc8c Roads turn to rivers as NSW suffers freak hailstorm] The Daily Telegraph</ref>]]
      *On 20 April 2015, Sydney recorded {{Convert|119.4|mm|abbr=on|2}} of rainfall, the most in any day since February 2002. Winds were "cyclonic" in nature, reaching {{convert|135|km/h|abbr=on}}. Killing three people, this east coast low was formed with "a really pronounced upper level trough of cold air that had moved in from [[Victoria (Australia)|Victoria]]", Mr Sharpe said.<ref>{{Cite web|url=https://www.smh.com.au/environment/weather/sydney-weather-its-not-a-cyclone-but-it-sure-felt-like-one-20150421-1mpi45.html|title=Sydney weather: It's not a cyclone but it sure felt like one|first=Peter|last=Hannam|date=21 April 2015|website=The Sydney Morning Herald}}</ref> The maximum temperature was only {{convert|15.4|C|0}}, making it the coldest April day since 1983, according to BOM.<ref>{{Cite web|url=https://www.abc.net.au/news/2015-04-21/three-killed-in-dungog-as-cyclonic-weather-batters-nsw/6407836|title=Three killed, homes washed away as 'cyclonic' low batters NSW|work=ABC News |date=20 April 2015|via=www.abc.net.au}}</ref> 
      *On 16 December 2015, a tornado with a windspeed of 213&nbsp;km/h tore along Sydney's southern coast, where it ripped off roofs, destroyed homes and overturned trucks. [[Kurnell]] and [[Bondi Junction]] were the most hard hit.<ref>[https://www.abc.net.au/news/2015-12-16/tornado-hail-destructive-winds-hit-sydney/7032370?nw=0 Sydney tornado: Clean-up underway in Kurnell after 'unprecedented' storm delivers 213kph winds] by ABC News, 16 December 2015</ref>
      *On 5 June 2016, an east coast low brought heavy rainfall that passed the average total June rainfall of {{Convert|132|mm|abbr=on|2}}. The deluge led to flash floods across the city and caused [[coastal erosion]], in addition to five deaths being reported. [[Bankstown]] received its highest daily rainfall in 15 years, with {{Convert|141|mm|abbr=on|2}}  of rain within the 24 hours. Meanwhile, [[Pennant Hills]], [[Sydney Airport]] and [[Prospect Reservoir]] experienced their wettest June day since 1991.<ref>[https://www.smh.com.au/environment/rainy-records-broken-across-sydney-20160605-gpc04n.html Rain records broken across Sydney] by Sarah Muller, from The Sydney Morning Herald, 5 June 2016</ref>
      *On 28 November 2018, a number of suburbs in the Sydney CBD recorded over {{Convert|100|mm|abbr=on|2}} of rainfall in just two hours from thunderstorms that formed due to an intense low pressure system, which came from the west, in what's been the city's wettest November day since 1984.<ref>[https://www.abc.net.au/news/2018-11-28/sydney-weather-and-queensland-bushfires-linked/10561792 Sydney weather and Queensland bushfire extremes have a common thread] by Kate Doyle ([[ABC News Australia]])</ref> The heavy deluge caused flash flooding, submerging cars in the suburb of [[Redfern, New South Wales|Redfern]], alongside wind gusts that peaked over 90&nbsp;km/h, which brought down trees and also contributed to the deaths of two people.<ref>[https://www.smh.com.au/national/nsw/heavy-rain-and-storms-hit-sydney-causing-commuter-chaos-20181127-p50irv.html Two dead as heavy rain and storms cause commuter chaos in Sydney] By Rachel Clun, Sarah Keoghan & Jenny Noyes ([[Sydney Morning Herald]])</ref> In [[Mosman]] on the North Shore {{Convert|111|mm|abbr=on|2}} of rain fell by 9&nbsp;am, making it the wettest spot in Sydney that day.<ref>[https://www.news.com.au/technology/environment/wild-wetnesday-torrential-rain-expected-to-lash-sydney-and-surrounds/news-story/1385a57d99fde7796d39324aa1d40b5b Wild Wednesday: SES volunteer dies as torrential rain lashes Sydney and surrounds] by Benedict Brook, Charlotte Willis and Rohan Smith ([[news.com.au]])</ref>
      *On 9 January 2019, Sydney was hit by a [[lightning]] storm that was "one of the biggest in recent years", where several houses were struck. [[Blacktown]] was the worst affected by the lightning storm, with over 20 homes reporting roof damage.<ref>[https://www.abc.net.au/news/2018-01-09/sydney-hit-by-fierce-lightning-storm-but-hot-weather-to-return/9313516 Sydney hit by fierce lightning storm but hot weather forecast to return to the city's west] by Clare Mathie and Lily Mayers, from ABC news, 9 January 2019</ref>

      ====2020s–present====
      *Between 7 and 9 February 2020, the Sydney metropolitan area received its heaviest rain in 30 years. The storm brought vast flooding and strong winds that caused commuter chaos and left over 100,000 homes without power.<ref>[https://www.theaustralian.com.au/nation/nsw-and-qld-warned-of-lifethreatening-flash-floods/news-story/12c48458453ce5ee00b0c4aa2260ad4f Rain: Warragamba Dam gets huge boost as chaos reigns in wake of weekend deluge in NSW, Queensland] by The Australian, 10 February 2020</ref> The city recorded around {{Convert|391.6|mm|abbr=on|2}} of rain within those three days, more than three times the average rainfall for February. Thousands of people living in depressed areas, such as those in [[Narrabeen]] and southwest of Sydney near [[Georges River]], were told to evacuate due to billowing floodwaters and rising river levels. At least 200 people were rescued by [[New South Wales State Emergency Service|emergency services]] during the stormy weekend. [[Warragamba Dam]], which was only at 42% in capacity, reached as close to 70% after the deluge.<ref>[https://www.bbc.com/news/world-australia-51439175 Sydney rains: Record rainfall brings flooding but puts out mega-blaze] by the [[BBC News]], 10 February 2020</ref><ref>[https://10daily.com.au/news/australia/a200208dnzwj/nsw-copping-heaviest-rain-since-1990s-and-its-not-stopping-anytime-soon-20200208 Thousands Without Power As NSW Cops Heaviest Rain In Two Decades] by [[10 daily]], 9 February 2020</ref> The last time more than {{Convert|300|mm|abbr=on|2}} of rain fell in two days in the city was in 1992, in addition to being the wettest four-day period since 1990.<ref>[https://7news.com.au/weather/nsw-weather-state-battered-by-rain-as-power-outages-and-flood-warnings-ensue-c-688433 Sydney weather: Monday, long term forecast, and current storm update] by [[7 News]], 9 February 2020</ref>
      *In the late evening of 18 February 2020, over 60,000 lightning strikes hit the Sydney area,<ref>[https://www.theaustralian.com.au/nation/sydney-weather-man-killed-trees-felled-power-cut-as-storm-wreaks-havoc-across-nsw/news-story/5f7d0fcd45953c49869a856c3e72786b Sydney weather: Man killed, trees felled, power cut as storm wreaks havoc across NSW] by The Australian, 19 February 2020</ref> with wind gusts over {{convert|100|km/h|abbr=on}} being recorded in some Sydney suburbs. In addition to a man being killed by a flying [[gas cylinder]] in [[The Rocks, New South Wales|The Rocks]], the storm toppled trees, damaged properties and left tens of thousands of homes without power.<ref>[https://www.abc.net.au/news/2020-02-19/severe-thunderstorm-hits-sydney-as-wind-gusts-hammer-nsw/11978818 Sydney thunderstorm lights up the night sky as lightning, wind gusts and hail hit NSW] by ABC News, 19 February 2020</ref>
      [[File:2021_floods.jpg|thumb|right|Floodwaters swamp a picnic area in [[Penrith, New South Wales|Penrith]] during the [[March 2021 New South Wales floods]].]]
      *Between [[March 2021 New South Wales floods|17 and 23 March 2021]], many parts of Sydney received heavy rainfall in a storm that was described as "dangerous and threatening" by the [[Bureau of Meteorology]], killing two people in the metropolitan area.<ref name="nine">[https://www.9news.com.au/national/sydney-fatal-car-crash-mona-vale-road-terrey-hills-major-traffic-delays-flooding-nsw/68c67437-3fea-4c3b-8963-406e0a3a98d8 Man dies in crash on Sydney's Northern Beaches] {{Webarchive|url=https://web.archive.org/web/20210323101431/https://www.9news.com.au/national/sydney-fatal-car-crash-mona-vale-road-terrey-hills-major-traffic-delays-flooding-nsw/68c67437-3fea-4c3b-8963-406e0a3a98d8 |date=23 March 2021 }} by Olivana Lathouris from [[Nine News]]. 22 March 2021.</ref><ref>{{Citation |title=A Pakistani man died in the Sydney floods today {{!}} 7NEWS | date=24 March 2021 |url=https://www.youtube.com/watch?v=G7oze3cATRs |language=en |access-date=24 March 2021 |archive-date=25 March 2021 |archive-url=https://web.archive.org/web/20210325200316/https://www.youtube.com/watch?v=G7oze3cATRs |url-status=live }}</ref> {{Convert|330.5|mm|abbr=on|2}} and {{Convert|359.2|mm|abbr=on|2}} of rain fell in Sydney CBD and Penrith, respectively, in a span of six days, which led to mass floods.<ref>[https://www.abc.net.au/news/2021-03-20/sydney-weather-live-bom-warns-flooding-likely-for-nsw/100018434 NSW weather live: NSW Premier Gladys Berejiklian warns of 'prolonged 'event] by ABC News. 20 March 2021</ref> In [[Chester Hill]], a [[tornado]] damaged homes and toppled trees, leaving thousands without electricity.<ref>[https://www.abc.net.au/news/2021-03-20/mini-tornado-rips-through-chester-hill-nsw-premier-says/100019350 NSW weather: mini-tornado damages homes in Chester Hill, says NSW Premier Gladys Berejiklian] by ABC News. 20 March 2021</ref> Parramatta received enough rain to flood the site of the new Parramatta Powerhouse and as well as the [[Parramatta ferry wharf]], which was overflowed after Parramatta River broke its [[Bank (geography)|banks]].<ref>[https://www.smh.com.au/national/parramatta-river-breaks-its-banks-flooding-powerhouse-museum-site-20210320-p57ci5.html Parramatta River breaks its banks, flooding Powerhouse Museum site] by Linda Morris and Andrew Taylor from Sydney Morning Herald. 21 March 2021</ref> Moreover, the [[Warragamba Dam]] began to spill, which was the first significant overflow of the reservoir since 1990.<ref>[https://au.news.yahoo.com/mass-evacuations-rains-cause-record-012633356.html Record rains, flooding prompt evacuations in Australia] {{Webarchive|url=https://web.archive.org/web/20210325103037/https://au.news.yahoo.com/mass-evacuations-rains-cause-record-012633356.html |date=25 March 2021 }} by [[Yahoo!]] News</ref> Because of rising floodwaters, [[Nepean River]] and [[Hawkesbury River]] were overflowed, with areas in the suburbs nearby such as [[Richmond, New South Wales|Richmond]], [[Windsor, New South Wales|Windsor]] and [[Penrith, New South Wales|Penrith]] being evacuated.<ref>[https://www.abc.net.au/news/2021-03-21/sydney-weather-live-bom-evacuation-warnings-flooding/100019438 Sydney weather live: Evacuation warnings across Western Sydney and Mid-North Coast as Warragamba Dam overflows] by ABC News. 21 March 2021</ref> The BOM had confirmed that flooding from Hawkesbury River was higher than a similar major flooding event in November 1961.<ref>[https://www.news.com.au/technology/environment/australia-weather-live-updates-nsw-qld-prepare-for-weekend-of-dangerous-storms/live-coverage/264d43588c549ab53802f7a93ca00d8a Australia weather live updates: 'Relentless' rain to continue into next week] by News.com.au.  21 March 2021.</ref>
      *On 19 December 2021, a [[Downburst|storm with extreme winds]] of {{convert|130|km/h|abbr=on}} quickly swept across multiple suburbs in the [[Northern Beaches]] area.<ref name=":0">{{Cite web|date=2021-12-20|title=Microbursts: what causes the deadly, high-speed weather events?|url=https://www.theguardian.com/australia-news/2021/dec/20/microbursts-what-causes-the-deadly-high-speed-weather-events|access-date=2021-12-21|website=The Guardian|language=en}}</ref><ref>{{Cite web|last=Brickwood|first=Pallavi Singhal, James|date=2021-12-19|title=One dead and multiple injured after tree collapse in northern beaches|url=https://www.smh.com.au/national/nsw/one-dead-and-multiple-injured-after-tree-collapse-in-northern-beaches-20211219-p59itx.html|access-date=2021-12-21|website=The Sydney Morning Herald|language=en}}</ref> The storm caused a large amount of damage to property and powerlines, mostly due to trees toppling over from the wind, around 36,000 homes were left without power.<ref>{{Cite web|title=Thousands without power on Sydney's Northern Beaches after deadly storm|url=https://www.dailytelegraph.com.au/news/nsw/northern-beaches-storm-kills-one-causes-damage-and-injures-two-others/news-story/1b6f0db8d8aa4ccc197c45311a26ac51|url-status=live|archive-url=https://archive.today/20211221142710/https://amp.dailytelegraph.com.au/news/nsw/northern-beaches-storm-kills-one-causes-damage-and-injures-two-others/news-story/1b6f0db8d8aa4ccc197c45311a26ac51|archive-date=2021-12-21|access-date=2021-12-21|website=The Daily Telegraph|language=en-AU}}</ref> In [[Narrabeen]], three people were struck by a tree in a parking lot, causing the death of one woman and leaving two others critically injured.<ref>{{Cite web|last=Chung|first=Josh Dye, Laura|date=2021-12-20|title='Freak accident': Yoga teacher killed after Christmas party|url=https://www.smh.com.au/environment/weather/thousands-of-northern-beaches-homes-still-without-power-after-storm-20211220-p59iwh.html|access-date=2021-12-21|website=The Sydney Morning Herald|language=en}}</ref> Volunteers from [[New South Wales State Emergency Service|NSW SES]] worked alongside [[Fire and Rescue New South Wales]] and [[New South Wales Rural Fire Service]] to cleanup the damage left behind by the storm.<ref>{{Cite news|date=2021-12-20|title=Son says mother who was killed in Sydney storm will be 'sorely missed'|language=en-AU|work=ABC News|url=https://www.abc.net.au/news/2021-12-20/susan-cobham-68-year-old-killed-in-northern-beaches-storm/100713134|access-date=2021-12-21}}</ref>
      *On [[2022 eastern Australia floods|3–8 March 2022]], thousands of people in parts of western Sydney were told to evacuate as the [[Hawkesbury River]], [[Nepean River]] and [[Georges river]]s began to rise after 174mm of rain fell over in [[Warragamba]] in less than 24 hours on the 3rd. There was major flooding in North [[Richmond, New South Wales|Richmond]] and [[Windsor, New South Wales|Windsor]] as the rising river waters submerged many parts of these rural suburbs.<ref>{{Cite web |date=3 March 2022 |title=Sydney weather warning cancelled as rain moves towards the Hunter|url=https://www.abc.net.au/news/2022-03-03/sydney-escapes-predicted-rain-weather-warning-cancelled/100877162|access-date= 3 March 2022 |website=ABC News}}</ref> On the 8th, a heavy deluge inundated streets in parts of southwestern Sydney and far western Sydney, killing two people in a car. Areas near the Georges River and [[Manly Dam]] were placed under an evacuation order by the [[State Emergency Service]] as floodwaters began to rise that day.<ref>{{Cite web |date=8 March 2022 |title=Woman found dead in Sydney's west as flood warnings force residents to evacuate|url=https://www.smh.com.au/national/nsw/more-sydney-residents-forced-to-evacuate-amid-floods-as-police-search-for-missing-mother-and-son-20220308-p5a2m0.html|access-date= 8 March 2022 |website=Sydney Morning Herald }}</ref> On this day, [[Mona Vale, New South Wales|Mona Vale]] recorded {{Convert|72|mm|abbr=on|2}} in just two hours and [[Mosman]] received {{Convert|128|mm|abbr=on|2}} in the six hours until the afternoon.<ref>[https://www.smh.com.au/national/nsw/dangerous-winds-to-lash-sydney-but-respite-from-rain-is-imminent-20220308-p5a2tr.html Dangerous winds to lash Sydney but respite from rain is imminent] The Sydney Morning Herald. 8 March 2022</ref> Sydney recorded its wettest March on record with the rain gauge picking up {{Convert|554|mm|2|abbr=on}} of rain, beating {{Convert|521.4|mm|2|abbr=on}} from 1942 – this also brought Sydney's annual total up to {{Convert|1076.2|mm|2|abbr=on}}, which is the highest January-to-March total in records that date back to 1859.<ref name="weatherzone.com.au">[https://www.weatherzone.com.au/news/wettest-march-on-record-rewrites-sydneys-climatology/536819 Wettest March on record rewrites Sydney's climatology] {{Webarchive|url=https://web.archive.org/web/20220331171156/https://www.weatherzone.com.au/news/wettest-march-on-record-rewrites-sydneys-climatology/536819 |date=31 March 2022 }} Ben Domensino from Weatherzone. 30 March 2022.</ref>  
      *On 6–7 April 2022, after two days of heavy rain, residents in [[Woronora]], [[Camden, New South Wales|Camden]], [[Wallacia, New South Wales|Wallacia]] and [[Chipping Norton]] were issued with a flood evacuation order as the [[Woronora River|Woronora]], Nepean and Georges Rivers began to rise. Streets in [[Manly Vale]] and [[Casula]] were heavily flooded, with roads to them being cut off. {{Convert|107|mm|abbr=on|2}} of rainfall was recorded in [[Little Bay, New South Wales|Little Bay]] in just six hours, as well as {{Convert|107|mm|abbr=on|2}} at [[Cronulla]] in just three hours overnight.<ref>[https://www.abc.net.au/news/2022-04-07/sydney-heavy-rain-sparks-evacuation-orders-/100972414 Evacuation orders issued, homes isolated in Sydney as torrential rain causes flash flooding] By Heath Parkes-Hupton, Carla Hildebrandt, and Jessica Kidd from ABC News. 7 April 2022.</ref> There were 25 flood rescues during the 24 hours of this event, with one death in [[Cobbitty]].<ref>[https://www.9news.com.au/national/nsw-weather-updates-man-dead-floodwaters-cobbity-southwest-sydney/3d65e33c-0596-482f-841e-4138871dc569 'We're still in disbelief': Popular dog breeder Tony Ikin killed in Sydney floodwaters] By Savannah Meacham and Adam Vidler from 9 News. 8 April 2022.</ref>
      *Between [[2022 New South Wales floods|3–5 July 2022]], an east coast low brought around eight months of rain in four days in Sydney's southwest, causing major flood and evacuation orders, in addition to one death.<ref>{{Cite news |title=Australia floods: 50,000 on evacuation alert after deluge hits Sydney|url=https://www.bbc.com/news/world-australia-61991112|access-date=5 July 2022 |website=[[BBC News]]|date=5 July 2022 }}</ref> Camden, in Sydney's southwest, had received {{convert|197.4|mm|2|abbr=on}} of rain between 2 and 3 July, with Sydney CBD accumulating {{convert|148.6|mm|2|abbr=on}} over the span of four days.<ref>{{Cite news|title=More rain expected as Sydney deals with major flooding|url=https://www.1news.co.nz/2022/07/05/more-rain-expected-as-sydney-deals-with-major-flooding/|access-date=5 July 2022|website=[[One News (New Zealand)|One News]]|date=5 July 2022|archive-date=7 July 2022|archive-url=https://web.archive.org/web/20220707050359/https://www.1news.co.nz/2022/07/05/more-rain-expected-as-sydney-deals-with-major-flooding/|url-status=dead}}</ref> Sydney recorded its wettest July on record that year where {{Convert|404|mm|2|abbr=on}} of rain fell during the month, surpassing the July 1950 record.<ref>{{cite web|title=((404 mm breaks July rainfall record in Sydney))|url=https://www.weatherzone.com.au/news/404-mm-breaks-july-rainfall-record-in-sydney/723435|publisher=Sydney Morning Herald|date=1 August 2022|access-date=1 August 2022|archive-date=1 August 2022|archive-url=https://web.archive.org/web/20220801021843/https://www.weatherzone.com.au/news/404-mm-breaks-july-rainfall-record-in-sydney/723435|url-status=live}}</ref>
      *Between 5 and 6 April 2024, a black nor'easter dumped heavy rain in the Sydney region, killing one man in western Sydney. The deluge caused major public transport delays and flooding in the [[Northern Beaches]]. [[Penrith, New South Wales|Penrith]] recorded its heaviest 24-hour rainfall on record for April at {{Convert|167|mm|abbr=on|2}}.<ref>[https://www.abc.net.au/news/2024-04-06/nsw-saturday-weather-sydney-rain-flood-warnings/103675980 Evacuation and extreme weather warnings issued after heavy rain falls across parts of Sydney and the Illawarra] by ABC meteorologist Tom Saunders, Brooke Chandler and Jesse Hyland. [[ABC News (Australia)|ABC News]]. 6 April 2024.</ref>
      *Between 17 and 18 January 2025, severe thunderstorms and gusty winds of up to {{convert|120|km/h|abbr=on}} uprooted trees—many of which fell on properties—destroyed [[power line]]s, tore iron from rooftops, and caused a [[landslide]] in northern Sydney.<ref>{{Cite news |title=Sydney's wet weekend to continue as disaster recovery begins |url=https://www.9news.com.au/national/sydney-weather-update-nsw-rain-storms-floods/585ef9e1-cf63-43c8-bff7-564a3de47746|author= Patrick Brischetto and Sarah Swain|date=18 January 2026 |access-date=18 January 2026 |publisher=Nine News Australia}}</ref> The impacts resulted from a combination of an offshore low-pressure system associated with ex-[[2025–26 Australian region cyclone season#Tropical Cyclone Koji|Tropical Cyclone Koji]] and a coastal trough off the [[New South Wales North Coast|north coast]].<ref>{{Cite news |title=NSW set for drenching after dry spell |url=https://www.9news.com.au/national/nsw-storms-rain-weather-forecast/8dba3cb0-be3c-4935-ab11-4afe4c0b6e10|author=Patrick Brischetto |date=15 January 2026 |access-date=18 January 2026 |publisher=The Sydney Morning Herald}}</ref> [[State Emergency Service|SES]] crews responded to approximately 2,000 calls for assistance, while two women and one man were injured. Those affected received [[Welfare spending|government support]] to repair homes, replace lost belongings, and secure [[Disaster response|emergency accommodation]].<ref>{{Cite news |title=Sydney's wet weekend to continue as disaster recovery begins |url=https://www.smh.com.au/national/nsw/sydney-s-wet-weekend-to-continue-as-disaster-recovery-begins-20250118-p5l5dq.html|author=Angus Thomson |date=18 January 2026 |access-date=18 January 2026 |publisher=The Sydney Morning Herald}}</ref>

