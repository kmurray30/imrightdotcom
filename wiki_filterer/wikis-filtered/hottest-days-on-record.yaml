      [[Phoenix, Arizona|Phoenix]] has a [[Desert climate#Hot desert climates|hot desert climate]] ([[Köppen climate classification|Köppen:]] ''BWh''),<ref name="ViennaKoppen">{{cite web|last1=Kottek|first1=M.|last2=Grieser|first2=J.|last3=Beck|first3=C.|last4=Rudolf|first4=B.|last5=Rubel|first5=F.|title=World Map of Köppen–Geiger Climate Classification|url=http://koeppen-geiger.vu-wien.ac.at/pdf/kottek_et_al_2006_A4.pdf |archive-url=https://web.archive.org/web/20090205035800/http://koeppen-geiger.vu-wien.ac.at/pdf/kottek_et_al_2006_A4.pdf |archive-date=2009-02-05 |url-status=live|website=Climate Change & Infectious Diseases Group, Institute for Veterinary Public Health|publisher=University of Veterinary Medicine Vienna|access-date=January 30, 2018|year=2006}}</ref><ref name="HESKoppen">{{cite journal|last1=Peel|first1=M. C.|last2=Finlayson|first2=B. L.|last3=McMahon|first3=T. A.|title=Updated world map of the Köppen-Geiger climate classification|journal=Hydrology and Earth System Sciences|date=October 11, 2007|volume=11|issue=5|pages=1633–1644|doi=10.5194/hess-11-1633-2007|bibcode=2007HESS...11.1633P|url=http://rcin.org.pl/Content/58779|doi-access=free}}</ref> typical of the [[Sonoran Desert]], and is the largest city in [[Americas|America]] in this climatic zone.<ref>{{Cite le=Phoenix: America's Desert Metropolis {{!}} Smart Cities Dive|website=www.smartcitiesdive.com|language=en-US|access-date=March 8, 2019}}</ref> Phoenix has long, extremely hot summers and short, mild winters. The city is within one of the world's sunniest regions, with its [[sunshine duration]] comparable to the [[Sahara]] region. With 3,872 hours of bright sunshine annually, Phoenix receives the most sunshine of any major city on Earth.<ref>{{Cite web|url=http://theculturetrip.com/north-america/usa/articles/the-10-sunniest-cities-in-the-world/|title=The 10 Sunniest Cities In The World|last=Stanley|first=Courtney|date=April 25, 2016|access-date=September 7, 2016}}</ref> Average high temperatures in summer are the hottest of any major city in the United States.<ref name=Farmers>{{cite web |url=http://farmersalmanac.com/weather/2012/07/09/americas-hottest-cities/ |publisher=The Farmer's Almanac |title=America's Hottest Cities |last=Weatherbee |first=Caleb |date=July 9, 2012 |access-date=August 29, 2015 |archive-date=September 17, 2015 |archive-url=https://web.archive.org/web/20150917062714/http://farmersalmanac.com/weather/2012/07/09/americas-hottest-cities/ |url-status=dead }}</ref> On average, there are 111 days annually with a high of at least {{convert|100|°F|0}}, including most days from the end of May through late September. Highs top {{convert|110|°F|0}} an average of 21 days during the year.<ref name = NOAA >{{cite web|url = https://w2.weather.gov/climate/xmacis.php?wfo=psr|title = NowData – NOAA Online Weather Data|publisher = [[National Oceanic and Atmospheric Administration]]|access-date = July 21, 2023}}</ref> On June 26, 1990, the temperature reached an all-time recorded high of {{convert|122|°F|0}}.<ref>{{cite web |url=http://phoenix-az.knoji.com/10-alltime-hottest-weather-temperature-days-in-phoenix/ |title=10 All-Time Hottest Weather Temperature Days in Phoenix |publisher=Knoji |access-date=February 5, 2014 |last=Dorish |first=Joe}}</ref>

      In 2024, Phoenix-Mesa, AZ, was ranked fifth for most [[Tropospheric ozone|ozone pollution]] in the United States according to the [[American Lung Association]].<ref>{{Cite web |title=Phoenix-Mesa, AZ |url=https://www.lung.org/research/sota/city-rankings/msas/phoenix-mesa-az |access-date=2024-06-22 |website=www.lung.org |language=en}}</ref> Vehicle emissions are cited as precursors to ozone formation. Phoenix also has high levels of [[Particulates|particulate]] pollution, although cities in California lead the nation in this hazard.<ref>{{Cite web|title=California Air Quality Report Card|url=https://www.lung.org/research/sota/city-rankings/states/california|access-date=2021-12-29|website=www.lung.org|language=en}}</ref> PM2.5 particulate matter, which is a component of diesel engine exhaust, and larger PM10 particles, which can come from dust, can both reach concerning levels in Phoenix.<ref>{{Cite web|url=https://www.lung.org/local-content/_content-items/about-us/media/press-releases/new-report-phoenix-air.html|title=New Report: Phoenix Air Quality Worsened for Pollution|website=American Lung Association|language=en|access-date=September 10, 2019}}</ref> In fact, people, pets, and other animals exposed to high concentrations of PM10 dust particles―primarily from dust storms or from disturbed agricultural or construction sites―are at risk of contracting [[Valley Fever]], a fungal lung infection.<ref>{{Cite web|url=https://www.mayoclinic.org/diseases-conditions/valley-fever/symptoms-causes/syc-20378761|title=Valley Fever|website=Mayo Clinic|language=en|access-date=September 13, 2020}}</ref>

      {{external media | width = 210px | float = right | headerimage= [[File:Trinity Cathedral (Phoenix).JPG |210px]] | video1 = [https://www.crowdcast.io/c/urban-heat "Rethinking cities in the face of extreme heat"], Mayor [[Kate Gallego]] of Phoenix and others, ''[[Knowable Magazine]]'', 2022}}

      Unlike most desert locations which have drastic fluctuations between day and nighttime temperatures, the [[urban heat island]] effect limits Phoenix's [[diurnal temperature variation]].<ref>{{Cite magazine|last=Matthew|first=Rozsa|date=February 1, 2021|title=Why Phoenix may be uninhabitable by the end of this century|url=https://www.salon.com/2021/01/31/why-phoenix-may-be-uninhabitable-by-the-end-of-this-century/|access-date=February 1, 2021|magazine=Salon|language=en}}</ref> As the city has expanded, average summer low temperatures have been steadily rising. Pavement, sidewalks, and buildings store the Sun's heat and radiate it at night.<ref>{{cite book |title=Insider's Guide: Phoenix & Scottsdale |publisher=Morris Book Publishing|editor-last=Sirois|editor-first=Kevin |isbn=978-0-7627-7321-3 |edition=7th |year=2012 |page=186}}</ref> The daily normal low remains at or above {{convert|80|°F|0}} for an average of 74 days per summer.<ref name = NOAA/> On July 19, 2023, Phoenix set its record for the warmest daily low temperature, at {{convert|97|°F|°C|abbr=on}}.<ref name = NOAA/>

      [[File:PhoenixDustStorm2.2011.jpg|thumb|upright=1.5|alt=photo of a dust storm, called a haboob, sweeping in over the city of Phoenix|A 2011 [[haboob]]]]

      The city averages approximately 300 days of sunshine, or over 85% of daylight hours, per year,<ref>{{cite web|url=http://www.public.asu.edu/~aunjs/ClimateofPhoenix/wxpart1.htm |publisher=Arizona State University |title=Abstract on the Climate of Phoenix |first=Harold |last=Bulk |access-date=March 20, 2016 |archive-url=https://web.archive.org/web/20160119101009/http://www.public.asu.edu/~aunjs/ClimateofPhoenix/wxpart1.htm |archive-date=January 19, 2016 |url-status=dead }}</ref><ref>{{cite news
       |url=http://archive.azcentral.com/relocation/valley101/weather.html
       |newspaper=Arizona Republic
       |title=Weather in the desert covers the spectrum
       |access-date=March 20, 2016
      |archive-url=http://arquivo.pt/wayback/20160516044129/http://archive.azcentral.com/relocation/valley101/weather.html
       |archive-date=May 16, 2016
      |url-status=dead
      }}</ref> and receives scant rainfall―the average annual total at [[Phoenix Sky Harbor International Airport]] is {{convert|7.22|in|mm|abbr=on}}. The region's trademark dry and sunny weather is interrupted by sporadic Pacific storms in the winter and the arrival of the [[North American monsoon]] in the summer.<ref name="BATTG19">{{Cite journal|last=Battaglia|first=Steven M.|date=November 1, 2019|title=No Fairy Tale Ending: The Future of Water and the American Southwest|journal=[[Weatherwise]]|volume=72|issue=6|pages=36–43|doi=10.1080/00431672.2019.1659034|s2cid=214466152|issn=0043-1672}}</ref> Historically, the monsoon officially started when the average [[dew point]] was {{convert|55|°F|0}} for three days in a row—typically occurring in early July. To increase monsoon awareness and promote safety, however, the [[National Weather Service]] decreed that starting in 2008, June 15 would be the official "first day" of the monsoon, and it would end on September 30.{{cn|date=August 2023}} When active, the monsoon raises humidity levels and can cause heavy localized precipitation, flash floods, hail, destructive winds, and [[Dust storm#Dust storm visibility of ¼ mile or less, or meters or less|dust storms]]<ref>{{cite web |url=http://www.researchhistory.org/2011/07/08/worst-dust-storm-in-arizona-history/ |title=Sweeping Dust Storm in Arizona History |date=July 8, 2011 |publisher=Research History |access-date=February 5, 2014}}</ref>—which can rise to the level of a [[haboob]] in some years.<ref>{{cite news|url=http://www.huffingtonpost.com/2015/06/29/haboob-arizona-phoenix-dust-storm_n_7684654.html |work=HuffPost |title=Haboob Alert! Giant Dust Storms Engulf Phoenix Area, Leaving Thousands Without Power |first=Dominique |last=Mosbergen |date=June 29, 2015 |access-date=March 20, 2016 |archive-url=https://web.archive.org/web/20160331161828/http://www.huffingtonpost.com/2015/06/29/haboob-arizona-phoenix-dust-storm_n_7684654.html |archive-date=March 31, 2016 |url-status=dead }}</ref>

      August is the wettest month ({{convert|0.93|in|mm|abbr=on}}), while June is the driest ({{convert|0.02|in|mm|abbr=on}}). On September 8, 2014, the city of Phoenix recorded its single highest rainfall total by the National Weather Service with {{convert|3.30|in|mm|abbr=on}}, breaking the 75-year-old record of {{convert|2.91|in|mm|abbr=on}}, set on September 4, 1939.<ref>{{cite web|url=https://www.nbcnews.com/news/weather/wettest-day-record-phoenix-flooding-leaves-2-dead-n198201 |title=Wettest Day on Record in Phoenix, Flooding Leaves 2 Dead |work=NBC News |access-date=September 13, 2014 |archive-url=https://web.archive.org/web/20160304023858/https://www.nbcnews.com/news/weather/wettest-day-record-phoenix-flooding-leaves-2-dead-n198201 |archive-date=March 4, 2016 |url-status=dead }}</ref> The September 2014 storm was created from the remnants of [[Hurricane Norbert (2014)|Hurricane Norbert]] which had moved up from the [[Gulf of California]] and flooded the city's major interstates and low-lying roadways, stranding hundreds of motorists.<ref name="BATTG19" /><ref>{{cite web |url=http://www.foxnews.com/weather/2014/09/09/record-amount-rainfall-floods-phoenix-as-hurricane-norbert-remnants-soak/ |archive-url=https://web.archive.org/web/20140909152624/http://www.foxnews.com/weather/2014/09/09/record-amount-rainfall-floods-phoenix-as-hurricane-norbert-remnants-soak/ |url-status=dead |archive-date=September 9, 2014 |title=Record amount of rainfall floods Phoenix as Hurricane Norbert remnants soak Southwest |publisher=Fox News Channel |access-date=September 13, 2014}}</ref> On average, dew points range from {{convert|31|°F|0}} in April to {{convert|58|°F|0}} in August.<ref>{{cite web |url=https://wrcc.dri.edu/htmlfiles/westcomp.dp.html |title=Average Monthly Dew Point Temperature |publisher=westcomp.dp.html |access-date=October 10, 2021 }}</ref> Occasionally, dew points can drop as low as {{convert|0|°F|0}}, or they can exceed {{convert|70|°F|0}} during periods of strong monsoon activity—creating muggy conditions in the area.<ref>{{cite web |url=https://azclimate.asu.edu/climate/climate-of-phoenix-summary/ |title=Arizona State Climate Office: General Geographical and Climatological Summary |publisher=asu.edu | access-date=March 9, 2018 }}</ref><ref name="BATTG19" /><ref>{{cite web |url=http://tiggrweather.net/wxdewpointsummary.php/ |title=Phoenix Weather Forecasts and Current Conditions: Average Dew Point Summary |publisher=TiggrWeather.net | access-date=June 9, 2020 }}</ref>

      [[File:Burned Saguaro Cactus.jpg|thumb|left|upright|Fire-damaged [[saguaro]] cactus near Phoenix]]
      Desert lands in and around the city have become increasingly susceptible to [[wildfire]] outbreaks. Fire risk is highest in the dry spring and summer months following wet winters, due to the resulting carpet of invasive [[Cenchrus ciliaris|buffelgrass]], weeds, and brush. Rugged terrain often makes firefighting efforts difficult. Because many desert plants are not adapted to fire, wildfires pose a considerable threat to the future of the local desert ecosystem.<ref>{{cite web |url=https://ktar.com/story/3228115/arizona-wildfire-season-is-already-ahead-of-previous-years-pace/ |title=Arizona wildfire season is already ahead of previous year's pace |date=June 3, 2020 |publisher=KTAR News |access-date=June 3, 2020}}</ref><ref>{{cite web |url=https://home.nps.gov/sagu/learn/nature/buffelgrass.htm/index.htm |title=Invasive Plant Species: Buffelgrass |publisher=NPS.Gov |access-date=December 6, 2020}}</ref><ref>{{cite web |url=http://desertmuseum.org/buffelgrass// |title=What is buffelgrass? Why should I care? |publisher=Arizona-Sonora Desert Museum |access-date=December 6, 2020}}</ref>

      Generally speaking, the annual minimum temperature in Phoenix is in the mid-to-low 30s. It rarely drops to {{cvt|32|°F}} or below, having done so in only nine of the years between 1991 and 2020 on a total of seventeen days.<ref name="NOAA"/> However, peripheral portions of the [[Phoenix metropolitan area]] frequently see frost in the winter. The earliest freeze on record occurred on November 4, 1956, and the latest occurred on March 31, 1987.{{efn|Since Sky Harbor International Airport (PHX) opened, the earliest and latest freezes recorded there are November 3, 1946, and April 4, 1945, respectively. However, as the [http://threadex.rcc-acis.org/ official Phoenix climatology station] was changed to PHX in October 1953, those records are not considered official.}} The all-time lowest recorded temperature in Phoenix was {{convert|16|°F|0}} on January 7, 1913, while the coldest daily high temperature ever recorded was {{convert|36|°F|0}} on December 10, 1898. The longest continuous stretch without a day of frost in Phoenix was nearly eight years, from December 27, 1990, to December 23, 1998.<ref name="NOAA"/>

      Snow is rare in Phoenix. Snowfall was first officially recorded in 1898, and since then, accumulations of {{convert|0.1|in|cm}} or greater have occurred only eight times within city limits. The heaviest snowstorm on record took place on January 21–22, 1937, when {{convert|1|to|4|in|cm}} fell in parts of the city and did not melt entirely for three days. On December 6, 1998, snow fell across the northwest portions of the city, and Sky Harbor reported a dusting of snow.<ref>{{cite web |url=http://www.wrh.noaa.gov/psr/general/history/index.php?page=snow |title=A history of snow fall in Phoenix |publisher=NOAA |access-date=December 5, 2011}}</ref> On February 21–22, 2019, the far northern and northeastern sections of the metro area received several inches of snow while Sky Harbor reported record rainfall.<ref>{{cite web |url=https://www.azfamily.com/video/snow-blankets-the-desert-in-north-scottsdale/video_bb44bd91-b0f2-54c0-9141-f3683234717b.html/ |title=Snow blankets the desert in north Scottsdale |publisher=Azfamily.com |access-date=April 4, 2021}}</ref> A similar storm impacted the region on March 1, 2023.<ref>{{cite web |url=https://www.fox10phoenix.com/news/and-another-one-new-round-of-storm-brings-rain-to-phoenix-heavy-snow-to-flagstaff/ |title=Major Arizona storm: 'Enormous' amounts of snow, major highways closed, damaging winds, power outages |date=February 21, 2023 |publisher=fox10phoenix.com/news/ |access-date=March 3, 2023}}</ref> Between 2010 and 2021, Phoenix experienced three significant winter storms with accumulating, snow-like [[graupel]].<ref>{{cite web|last=Haldiman |first=Philip |url=http://www.azcentral.com/community/scottsdale/articles/2010/12/30/20101230phoenix-area-residents-report-snow-falling-valley.html |title=Phoenix-area residents report snow falling across Valley |work=The Arizona Republic |date=December 30, 2010 |access-date=February 7, 2011 |archive-url=https://archive.today/20120720052218/http://www.azcentral.com/community/scottsdale/articles/2010/12/30/20101230phoenix-area-residents-report-snow-falling-valley.html |archive-date=July 20, 2012 |url-status=dead }}</ref><ref>{{cite web |url=https://www.azcentral.com/story/news/local/phoenix-weather/2021/01/25/what-graupel-soft-hail-fell-phoenix-area-monday-not-snow/4253612001// |title=Sorry to disappoint, Phoenix, but that was graupel, not snow – except in Scottsdale |publisher=Azcentral.com |access-date=April 4, 2021}}</ref>

