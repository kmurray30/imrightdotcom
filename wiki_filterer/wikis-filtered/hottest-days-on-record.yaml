      [[Shetland]] holds the unofficial British record for wind speed. A gust of {{cvt|197|mph|km/h}} was reported on 1 January 1992. An earlier gust in 1962 was recorded at {{cvt|177|mph|km/h}}, both at [[RAF Saxa Vord]].<ref>{{cite web|url=http://www.scottish-places.info/features/featurefirst1105.html |title=Unst|work=Gazetteer for Scotland|access-date=12 January 2010}}</ref> However, it is expected that higher gusts than those reported would have been achieved as during both storms the measuring equipment was destroyed by the extreme weather.<ref>{{cite web|url=http://ahistoryofrafsaxavord.blogspot.com/2010/07/storm-new-year-199192-part-1.html |title=A History of RAF Saxa Vord|date=10 July 2010 |access-date=1 March 2020}}</ref>

      A wind gust of {{convert|194|mph|abbr=on}} was recorded at [[Cairn Gorm]] on 19 December 2008 but was discovered too late to be verified by the [[Met Office]].<ref>{{cite web | url = https://www.telegraph.co.uk/news/earth/4141762/Highlands-mountain-claims-strongest-UK-wind.html  | title = Highlands mountain claims strongest UK wind|work=The Daily Telegraph|date=6 January 2009|first=Nick|last=Britten|access-date=16 January 2015}}</ref>

      The highest wind speed in England was a wind gust of {{cvt|125.4|mph|km/h}} recorded at [[The Needles]], [[Isle of Wight]], on 18 February 2022 during [[Storm Eunice]].<ref>{{cite web |last1=Toogood |first1=Darren |title=RECORD-BREAKING 125MPH WINDS AT THE NEEDLES – THE STRONGEST GUST EVER SEEN IN ENGLAND |date=18 February 2022 |url=https://www.islandecho.co.uk/record-breaking-125mph-winds-at-the-needles-the-strongest-gust-ever-seen-in-england/#google_vignette |publisher=Island Echo |access-date=7 December 2024}}</ref>

