      {{ multiple image | total_width=450
      | image1= 1994- Global average temperature during June-July-August.svg |caption1= 2023's June–July–August season was the warmest on record globally by a large margin, as El Niño conditions continued to develop.<ref name=Copernicus_202309>{{cite web |title=August Climate Bulletins / Summer 2023: the hottest on record |url=https://climate.copernicus.eu/summer-2023-hottest-record |publisher=Copernicus Programme |archive-url=https://web.archive.org/web/20230908232623/https://climate.copernicus.eu/summer-2023-hottest-record |archive-date=8 September 2023 |date=6 September 2023 |url-status=live}}</ref>
      | image2= 1940- September global average temperature changes.svg |caption2= September 2023 was the warmest September on record globally, with an average surface air temperature 0.5 °C above the temperature of the previous warmest September (2020).<ref name=CopernicusSept_20231005>{{cite web |title=Copernicus: September 2023 – unprecedented temperature anomalies; 2023 on track to be the warmest year on record |url=https://climate.copernicus.eu/copernicus-september-2023-unprecedented-temperature-anomalies |website=climate.copernicus.eu |publisher=Copernicus Programme |archive-url=https://web.archive.org/web/20231005165335/https://climate.copernicus.eu/copernicus-september-2023-unprecedented-temperature-anomalies |archive-date=5 October 2023 |date=5 October 2023 |url-status=live }}</ref>
      }}
      * During mid-April 2023, [[2023 Asia heat wave|heat waves]] occurred in several countries in [[South Asia]], [[Indochina]], and parts of China. In what has been described as the "worst April heatwave in Asian history", several cities in the region have reported record temperatures. In [[Luang Prabang]], [[Laos]], temperatures reached {{convert|42.7|C}}, the highest in Laos' recorded history, while neighboring [[Thailand]] reached a record-tying {{convert|44.6|C}}. At least 13 people died in [[Maharashtra]] state, India, as a result of heatstroke.<ref>{{Cite web |last1=Ratcliffe |first1=Rebecca |last2=Ellis-Petersen |first2=Hanna |date=2023-04-19 |title=Severe heatwave engulfs Asia and forcing schools to close |url=https://www.theguardian.com/weather/2023/apr/19/severe-heatwave-asia-deaths-schools-close-india-china |access-date=2023-04-19 |website=The Guardian |language=en}}</ref> In May, [[Vietnam]] recorded its highest ever temperature of {{convert|44.1|C}}.<ref>{{Cite news |last= |first= |date=2023-05-07 |title=Vietnam records highest ever temperature of 44.1C |language=en-GB |work=The Guardian |url=https://www.theguardian.com/world/2023/may/07/vietnam-records-highest-ever-temperature-of-441c |access-date=2023-05-08 |issn=0261-3077}}</ref>
      *A [[2023 Pacific Northwest heat wave|heat wave]] affected the Pacific Northwest region of North America in May 2023.<ref name=":0">{{Cite web |last=Prociv |first=Kathryn |date=2023-05-15 |title=Pacific Northwest heat wave continues after historic weekend |url=https://www.nbcnews.com/news/weather/pacific-northwest-heat-wave-continues-historic-weekend-rcna84423 |access-date=2023-05-21 |website=[[NBC News]] |language=en}}</ref><ref name="Canon 2023">{{Cite news |last=Canon |first=Gabrielle |date=2023-05-15 |title=Punishing heatwave grips Pacific north-west as wildfires rage in western Canada |language=en-GB |work=[[The Guardian]] |url=https://www.theguardian.com/us-news/2023/may/15/heatwave-pacific-north-west-canada-wildfires |access-date=2023-05-21 |issn=0261-3077}}</ref>
      *Starting on July 10, 2023, a record-breaking [[Cerberus Heatwave|heat wave]] affected many European countries, with effects felt most severely in [[Greece]], [[Italy]], [[Spain]], and parts of [[Southeast Europe]]. The extreme weather event [[List of named heat waves|became named]] "Cerberus" after the [[Cerberus|hounds of Hades]] from Greek mythology by the [[Servizio Meteorologico|Italian Meteorological Society]].<ref>{{cite web | url=https://www.upday.com/uk/cerberus-heatwave-leads-to-temperatures-of-over-40c-at-popular-holiday-destinations | title=Cerberus heatwave leads to temperatures of over 40C at popular holiday destinations | date=13 July 2023 }}</ref> A new heatwave in the third week of July 2023 has then been called [[Charon]].<ref>{{cite news | url=https://www.washingtonpost.com/world/2023/07/20/europe-heat-wave-name-cerebus-charon/ |title=Cerberus. Charon. Gary? Heat wave naming debate intensifies.|newspaper=[[The Washington Post]] | date=20 July 2023}}</ref> In [[Greek mythology]], '''Charon''' or '''Kharon''' ({{IPAc-en|ˈ|k|ɛər|ɒ|n|,_|-|ən}} {{respell|KAIR|on|,_-|ən}}; {{langx|grc|Χάρων}}) is a [[psychopomp]], the ferryman of [[Greek underworld|Hades, the Greek underworld]].<ref>{{cite web|url=https://www.bbc.com/future/article/20230718-the-fiery-row-behind-europes-mythological-heatwave-names
       |title=The fiery row behind Europe's mythological heatwave names |date=18 July 2023}}</ref>
      *September 2023 European heatwave: From the beginning of September, much of western Europe experienced unseasonably high temperatures. The UK recorded seven consecutive days above {{convert|30.2|C}}, beating the previous longest run in September of four days. Temperatures peaked at {{convert|33.5|C}} at [[Faversham]], [[Kent]]. Temperatures in France were unseasonably high too with Paris recording {{convert|36.5|C}}, a new all-time record for the month. Ireland experienced its second warmest September on record, behind only September 2021. Temperatures reached into the high 20s in parts of southern Ireland, with temperatures in the low 30s recorded in parts of the [[Midland Region, Ireland|Midland Region]].

      === 2024 ===
      [[File:20250624 Likelihood of heatwaves vs degree of global warming - dot matrix chart.svg |thumb|Human-caused climate change increased the probability of the 2024 Middle East (West Asia) heatwave by about a factor of 5 (center chart vs. left chart).<ref name=WWA_20240514>{{cite web |title=Climate change made the deadly heatwaves that hit millions of highly vulnerable people across Asia more frequent and extreme |url=https://www.worldweatherattribution.org/climate-change-made-the-deadly-heatwaves-that-hit-millions-of-highly-vulnerable-people-across-asia-more-frequent-and-extreme/ |publisher=World Weather Attribution |archive-url=https://web.archive.org/web/20250619082005/https://www.worldweatherattribution.org/climate-change-made-the-deadly-heatwaves-that-hit-millions-of-highly-vulnerable-people-across-asia-more-frequent-and-extreme/ |archive-date=19 June 2025 |date=14 May 2024 |url-status=live}}</ref>]]
      [[File:1940-2024 Global surface temperature - stacked - Copernicus.jpg|thumb|In 2024, Earth saw the highest average annual surface air temperature ever recorded, outpacing 2023 on an average basis.<ref name=CopernicusGMST_thru2024>{{Cite web |date=15 January 2025 |title=The 2024 Annual Climate Summary / Global Climate Highlights 2024 |url=https://sites.ecmwf.int/data/c3sci/global-climate-highlights/2024/chart-gallery/supplementary/GCH2024-gallery-figureS1/figureS1.pdf |url-status=live |archive-url=https://web.archive.org/web/20250115224213/https://sites.ecmwf.int/data/c3sci/global-climate-highlights/2024/chart-gallery/supplementary/GCH2024-gallery-figureS1/figureS1.pdf |archive-date=15 January 2025 |publisher=Copernicus Programme}}</ref>]]
      * Since March 2024, [[2024 North America heat waves|severe heat waves]] impacted [[Mexico]], the [[Southern United States]], and [[Central America]], leading to dozens of broken temperature records,<ref name="150 monkey deaths">{{Cite web |date=2024-05-28 |title=Over 150 monkey deaths now linked to heat wave in Mexico: 'There are going to be a lot of casualties' |url=https://www.cbsnews.com/news/monkey-deaths-mexico-heat-dehydration/ |access-date=2024-05-29 |website=CBS News |language=en-US}}</ref> mass deaths of animals from several [[threatened species]],{{Citation needed|reason=Sounds plausible, but this claim is currently unsourced in case people want to read more details.|date=July 2024}} water shortages requiring rationing,<ref name=":1">{{Cite web |title=Photos: Submerged homes and heatwaves fuel Mexico climate angst |url=https://www.aljazeera.com/gallery/2024/5/28/submerged-homes-and-heatwaves-fuel-mexico-climate-angst |access-date=2024-05-29 |website=Al Jazeera |language=en}}</ref> increased [[Wildfire|forest fires]], and over 48 deaths in Mexico with over 950 people suffering from heat-related ailments.<ref name=":2">{{Cite news |date=26 May 2024 |title=Experts warn of hail, whirlwinds in Mexico after new heat record in the capital |url=https://www.reuters.com/world/americas/experts-warn-hail-whirlwinds-mexico-after-new-heat-record-capital-2024-05-26/ |work=Reuters}}</ref>
      * Since April 2024 Southeast Asia has faced a [[2024 Southeast Asia heat wave|severe heatwave]], resulting in unprecedented high temperatures of up to {{convert|38.8|C|F}} that have caused school closures and prompted urgent health advisories throughout the region.<ref>{{Cite web |title=Photos: Southeast Asia swelters in record-setting heatwave |url=https://www.aljazeera.com/gallery/2024/5/1/southeast-asia-swelters-in-record-setting-heatwave |access-date=2024-05-07 |website=Al Jazeera |language=en}}</ref><ref>{{cite news |work=[[The Guardian]] |date=26 April 2024 |url=https://www.theguardian.com/world/2024/apr/26/asia-heatwaves-philippines-bangladesh-india |title=Wave of exceptionally hot weather scorches south and south-east Asia }}</ref><ref>{{cite web |first=Rebecca |last=Ratcliffe |work=The Guardian |date=4 May 2024 |url=https://www.theguardian.com/environment/article/2024/may/04/inside-an-oven-how-life-in-south-east-asia-is-a-struggle-amid-sweltering-heat |title='Inside an oven': sweltering heat ravages crops and takes lives in south-east Asia }}</ref>
      * Since April 2024 Bangladesh and neighbouring region starts facing severe heatwaves.Schools and other institutions were closed due to severe heat across Bangladesh(first time in history).On 30 April temperature in Joshore reached upto 43.8°C.Pitch of roads starts melting in western region due to scorching heat.Many heat related deaths were recorded across the country.
      *[[2024 Indian heat wave]] - Since May 2024, the longest heat wave has occurred in India and Pakistan with a new record temperature for India's capital New Delhi of {{convert|49|C|F}} (an even higher record of {{convert|53|C|F}} had initially been reported in New Delhi on May 29 but was later found to be attributable to a faulty sensor), and temperatures in Pakistan getting as high as {{convert|52.2|C|F}}.<ref>{{Cite web |last=Jacob |first=Charmaine |date=2024-06-14 |title=In pictures: India records 'longest' heatwave, Delhi faces water crisis |url=https://www.cnbc.com/2024/06/14/pictures-india-records-longest-heatwave-delhi-faces-water-crisis.html |access-date=2024-06-14 |website=CNBC |language=en}}</ref><ref>{{cite news |last1=Dash |first1=Jatindra |title=India heatwave kills at least 33, including election officials |url=https://www.reuters.com/world/india/least-15-dead-eastern-india-over-24-hours-temperatures-soar-2024-05-31/ |access-date=18 June 2024 |work=Reuters |date=31 May 2024}}</ref><ref>{{Cite web |title=India's heat wave longest ever, worse to come |url=https://phys.org/news/2024-06-india-longest-worse.html |access-date=2024-06-21 |website=phys.org |language=en}}</ref>
      * [[2024 European heatwaves]] - Since mid-June 2024, Greece has been experiencing a heatwave, Europe's first heatwave of the year. Temperatures in Greece are forecast to reach to {{convert|43|C|F}}.<ref>{{cite news |last1=Kitsantonis |first1=Niki |title=Deadly Toll in Greece as Heat Waves Sweep the Country |url=https://www.nytimes.com/2024/06/16/world/europe/greece-heat-wave-hikers.html |access-date=18 June 2024 |work=The New York Times |date=16 June 2024}}</ref> Turkey has also been affected with temperatures hitting {{convert|44|C|F}}.
      *In mid-June, high temperatures in [[Mecca]], characterized as a heat wave, [[2024 Hajj extreme heat disaster|resulted in the deaths of pilgrims in the city for Hajj]] from countries including Indonesia, Jordan, Tunisia, and India.<ref>{{cite news |last1=Kent |first1=Lauren |last2=Faraj |first2=Caroline |last3=Atay Alam |first3=Hande |title=Hundreds of Hajj pilgrims die as Mecca temperatures hit 120 Fahrenheit |url=https://www.cnn.com/2024/06/19/middleeast/hajj-deaths-mecca-extreme-heat-intl-latam/index.html |access-date=20 June 2024 |work=CNN |date=19 June 2024 |language=en}}</ref><ref>{{cite news |last1=Pelham |first1=Lipika |title=At least 14 Hajj pilgrims die in intense heat |url=https://www.bbc.com/news/articles/cyee6gn8x6xo |access-date=19 June 2024 |work=BBC |date=16 June 2024}}</ref><ref name=nyt_hajj_2024>{{cite news |last1=Vinograd |first1=Cassandra |title=A Deadly Toll as an Intense Heat Grips Saudi Arabia |url=https://www.nytimes.com/2024/06/19/world/europe/hajj-deaths-mecca-heat.html |access-date=19 June 2024 |work=The New York Times |date=19 June 2024}}</ref> It is reported that as many as 1300 people may have died.<ref>{{Cite web |title=At least 1,301 people died during Hajj - Saudi Arabia |url=https://www.bbc.com/news/articles/c8000dgk9gzo |first=Thomas |last=Spender |access-date=2024-06-25 |website=BBC News |date=23 June 2024 |language=en-GB}}</ref> Saudi authorities have said most who died were not officially authorized to perform Hajj.<ref>{{cite news |title=At least 1,300 hajj pilgrims died during extreme heat, Saudi Arabia says |url=https://www.theguardian.com/world/article/2024/jun/23/hajj-pilgrimage-death-toll-extreme-heat-mecca-saudi-arabia |access-date=25 June 2024 |work=The Guardian |agency=Agence France-Presse |date=23 June 2024}}</ref> Forecasts predicted temperatures as high as {{convert|113|F|C}} on 19 June 2024.<ref name=nyt_hajj_2024/> The heat also impacted [[Kuwait]], where heightened demand caused officials at the [[Ministry of Electricity, Water and Renewable Energy (Kuwait)|Ministry of Electricity, Water and Renewable Energy]] to temporarily stop distribution of electricity to portions of the nation.<ref>{{cite news |last1=MacDonald |first1=Fiona |title=Kuwait Forced to Cut Power to Some Areas as Heat Raises Demand |url=https://www.bloomberg.com/news/articles/2024-06-19/kuwait-forced-to-cut-power-to-some-areas-as-heat-raises-demand?sref=CIpmV6x8 |access-date=20 June 2024 |work=Bloomberg |date=19 June 2024}}</ref>
      *[[2024 Pakistan heat wave]] - In June 2024, Pakistan experienced a heat wave.<ref>{{cite news |last1=Davies |first1=Caroline |title=Pakistan: More than 500 die in six days as heatwave grips country |url=https://www.bbc.com/news/articles/cn05rz3w4x1o |access-date=27 June 2024 |work=BBC |date=26 June 2024}}</ref> The [[Edhi Foundation]] in [[Karachi]] said it transported a higher-than-normal number of bodies to the morgue during the period of 20 to 25 June.<ref>{{cite news |last1=Dilawar |first1=Ismail |title=Karachi Sees a Surge in Deaths as Heat Wave Sears Pakistan |url=https://www.bloomberg.com/news/articles/2024-06-27/karachi-sees-a-surge-in-deaths-as-heat-wave-sears-pakistan?sref=CIpmV6x8 |access-date=27 June 2024 |work=Bloomberg |date=27 June 2024}}</ref>
      *During the [[2024 Summer Olympics]], host city Paris, along with portions of [[Southern France]] and [[England]], experienced a heatwave.<ref>{{cite news |title=After rainy start, heatwave announced for Paris Olympics |url=https://www.lemonde.fr/en/climate/article/2024/07/29/after-rainy-start-heatwave-announced-for-paris-olympics_6703863_96.html |access-date=29 July 2024 |work=Le Monde.fr |date=29 July 2024 |language=en}}</ref><ref>{{cite news |last1=Farhat |first1=Eamon |last2=Tugwell |first2=Paul |title=Heat Sears Paris and London While Wildfires Hit Southern Europe |url=https://www.bloomberg.com/news/articles/2024-07-29/heat-sears-paris-and-london-while-wildfires-hit-southern-europe |access-date=29 July 2024 |work=Bloomberg.com |date=29 July 2024 |language=en}}</ref>
      *[[2024 Japan heatwaves]] - At least 59 heat-related deaths were recorded in Japan, with at least 62 temperature observation posts across Japan breaking temperature records in July 2024. According to the [[Japan Meteorological Agency]] (JMA), the average temperatures reached during the heatwaves represented the hottest for Japan in April and July since its record-keeping began in 1898.<ref name=":02">{{Cite web |title=Japan sees hottest July since records began |date=2 August 2024 |url=https://phys.org/news/2024-08-japan-hottest-july-began.html |access-date=2024-08-03 |website=phys.org |language=en}}</ref><ref name=":12">{{Cite web |last=Kaneko |first=Karin |date=2024-05-02 |title=Climate change, El Nino factor into Japan's warmest April in 130 years |url=https://www.japantimes.co.jp/news/2024/05/02/japan/april-highest-temperature/ |access-date=2024-08-03 |website=The Japan Times |language=en}}</ref>

      === 2025 ===

      *In January 2025, a heatwave struck much of Australia.<ref>{{Cite news |date=2025-01-20 |title=Severe heatwave to spread over half of Australia this week |url=https://www.abc.net.au/news/2025-01-21/heatwave-hits-australia-east-west/104839148 |access-date=2025-01-30 |work=ABC News |language=en-AU}}</ref> Temperatures in [[Melbourne]] reached {{Convert|41|C|F}} Celsius, and fire bans were issued for much of [[Victoria (state)|Victoria]].<ref>{{Cite news |date=26 January 2025 |title=Extreme fire danger grips Australia's southeast amid heatwave |url=https://www.reuters.com/world/asia-pacific/extreme-fire-danger-grips-australias-southeast-amid-heatwave-2025-01-27/}}</ref> Fish were observed dying on the coast of [[Western Australia]] between [[Ningaloo Reef]] and [[Broome, Western Australia|Broome]].<ref>{{Cite web |last1=Pinter |first1=Sina |last2=Rayson |first2=Matt |last3=Jones |first3=Nicole L. |last4=Conversation |first4=The |title=A marine heat wave in northwest Australia is killing huge numbers of fish—it's heading south |url=https://phys.org/news/2025-01-marine-northwest-australia-huge-fish.html |access-date=2025-01-30 |website=phys.org |language=en}}</ref>
      *In April 2025, [[2025 India–Pakistan heat wave]] in South Asia
      *In May 2025, a heat wave has occurred for much of the United States and parts of Canada. A record May high temperature of {{Convert|96|F|C}} was recorded in [[International Falls, Minnesota]], on 11 May 2025.<ref>{{Cite web |title=The 'Nation's Icebox' Just Melted Its May Heat Records {{!}} Weather.com |url=https://weather.com/news/weather/news/2025-05-13-record-may-heat-international-falls-minnesota-icebox |access-date=2025-05-15 |website=The Weather Channel |language=en-US}}</ref> Record-breaking temperatures had especially occurred in Texas, with [[Del Rio, Texas|Del Rio]] reaching a record high of {{Convert|109|F|C}} on 13 May 2025 and with [[San Antonio]] reaching {{Convert|102|F|C}} on 14 May 2025.<ref>{{Cite web |last=Oberholtz |first=Chris |date=2025-05-14 |title=Texas swelters under nation's hottest temperatures as potentially historic May heat wave peaks |url=https://www.foxweather.com/weather-news/record-heat-wave-south-forecast-wednesday-thursday |access-date=2025-05-18 |website=FOX Weather |language=en-US}}</ref>
      *In May to October 2025, 2025 South Korean heatwaves.<ref>[[Sourse:South Korea Meteological Administration]]</ref>
      *In May to October 2025, 2025 Japanese heatwaves.<ref>[[Sourse:Japan Meteological Agency]]</ref>
      *In July 2025, [[2025 European heatwaves]].

      === 2026 ===

      * In late January 2026, a heat wave struck Argentina, along with dry weather, threatening livestock as well as soy and corn crops. Temperatures in the country hit {{Convert|40|C}}.<ref>{{Cite web |title=Heat Wave Hits Argentina, Threatening Crops |url=https://www.agriculture.com/partners-heat-wave-hits-argentina-threatening-crops-11893209 |access-date=2026-01-29 |website=Successful Farming |language=en}}</ref>
      * Starting on January 24, 2026, a record-breaking heat dome struck much of Australia, including the states of [[Victoria (state)|Victoria]], [[South Australia]], and [[New South Wales]]. Temperatures were about {{Convert|49|C|F}}.<ref>{{Cite web |last=Corp |first=Pelmorex |date=2026-01-28 |title=50°C? Parts of Australia enduring an unprecedented, multi-day heat wave |url=https://www.theweathernetwork.com/en/news/weather/forecasts/50-c-parts-of-australia-enduring-an-unprecedented-multi-day-heat-wave |access-date=2026-01-29 |website=The Weather Network |language=en}}</ref><ref>{{Cite news |last=Saunders |first=Tom |date=2026-01-27 |title=Historic heatwave sets all-time records as temperatures exceed 49C |url=https://www.abc.net.au/news/2026-01-27/south-east-aus-heatwave-sets-record-temperatures-exceed-49c/106274644 |access-date=2026-01-29 |work=ABC News |language=en-AU}}</ref>{{Update after|2026|2|1|reason=heat wave projected to end on Sunday 1 February 2026}}

