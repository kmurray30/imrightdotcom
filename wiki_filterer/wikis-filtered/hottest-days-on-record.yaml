      From April to September 2025, parts of Europe were affected by multiple [[heatwave]]s. Record-breaking temperatures came as early as April; however, the most extreme temperatures began in mid-June, when experts estimated hundreds of heat-related deaths in the United Kingdom alone. National records for the maximum June temperature in both Portugal and Spain were broken when temperatures surpassed {{cvt|46|C}}, whilst regional records were also broken in at least ten other countries. The heatwaves have fueled numerous wildfires across Europe, causing further damage to ecosystems, property, human life and air quality.

      Scientists found that by 18 September, around 16,500 people may have died as a result of climate change during the summer. This is around three times higher than the number of deaths without human-induced climate change (800 deaths). It equates to about 65% deaths in the heatwave due to [[global warming]].<ref>{{Cite web|url=https://www.lshtm.ac.uk/newsevents/news/2025/first-analysis-estimate-number-heatwave-deaths-linked-climate-change|title=First analysis to estimate number of heatwave deaths linked to climate change &#124;|website=www.lshtm.ac.uk|accessdate=12 August 2025}}</ref> In September, the national weather agency for Spain announced that the summer had been the hottest on record, averaging {{cvt|24.2|C}} between 1 June and 31 August.<ref>{{Cite web |date=2025-09-16 |title=Spain had hottest summer on record in 2025, weather agency says |url=http://www.euronews.com/2025/09/16/spain-sweltered-through-hottest-summer-on-record-in-2025-weather-agency-says |access-date=2025-09-18 |website=euronews |language=en}}</ref>

      ==By country==
      ===Albania===
      In mid-April, Albania was one of many countries in central and eastern Europe to be hit by unseasonably warm temperatures, with [[Tirana]] forecasted to reach {{cvt|28|C}}.<ref name="guardian-14apr">{{Cite news |last=Mistry |first=Ishani |date=14 April 2025 |title=Weather tracker: north-west Italy braces for thunderstorms and snow |url=https://www.theguardian.com/environment/2025/apr/14/weather-tracker-north-west-italy-braces-for-thunderstorms-and-snow |access-date=24 June 2025 |work=[[The Guardian]]}}</ref>

      On 9 June, a temperature of {{cvt|37.6|C}} was recorded in Tirana as much of the [[Balkans]] reached {{cvt|37|C}}.<ref name="guardian-13jun">{{Cite news |last=Andrews |first=Matt |date=13 June 2025 |title=Weather tracker: Europe and China in midst of record-breaking heat |url=https://www.theguardian.com/environment/2025/jun/13/weather-tracker-europe-china-record-breaking-heatwaves |access-date=26 June 2025 |work=[[The Guardian]]}}</ref>

      ===Austria===
      On 26 June, the record for the maximum June temperature in the state of [[Carinthia]] was broken after {{cvt|38.3|C}} was recorded in [[Feistritz ob Bleiburg]]; the June records for a number of individual weather stations were also broken.<ref>{{Cite news |date=27 June 2025 |title=Dieser Juni war der drittwärmste der Messgeschichte in Österreich |url=https://www.derstandard.at/story/3000000275889/dieser-juni-war-der-drittwaermste-der-messgeschichte-in-oesterreich |access-date=1 July 2025 |work=[[Der Standard]] |language=de}}</ref>

      ===Belarus===
      In mid-April, Belarus was one of many countries in central and eastern Europe to be hit by unseasonably warm temperatures.<ref name="guardian-21apr">{{Cite news |last=Wood |first=Brendan |date=21 April 2025 |title=Weather tracker: Unseasonable warmth continues in eastern Europe |url=https://www.theguardian.com/environment/2025/apr/21/weather-tracker-unseasonable-warmth-continues-eastern-europe |access-date=24 June 2025 |work=[[The Guardian]]}}</ref>

      On 3 July, temperatures were forecasted to reach {{cvt|35|C}} in the southwest, including [[Brest, Belarus|Brest]], as an orange danger level was declared across the country.<ref>{{Cite news |last=Nowaborski |first=Ales |date=3 July 2025 |title=Святкуйце асцярожна: 3 ліпеня ў Беларусі – рэкордная спёка |url=https://belsat.eu/87615476/spioka |access-date=5 July 2025 |work=[[Belstat]] |language=be}}</ref>

      ===Bosnia and Herzegovina===
      On 26 June, the records for the maximum June temperature were broken in three cities: [[Doboj]], [[Sarajevo]] and [[Tuzla]] which recorded {{cvt|38.2|C}}, {{cvt|38.8|C}} and {{cvt|37.7|C}} respectively.<ref>{{Cite news |date=26 June 2025 |title=Три градови во БиХ урнаа рекорди – историски највисоки температури во јуни |url=https://www.slobodenpecat.mk/tri-gradovi-vo-bih-urnaa-rekordi-istoriski-najvisoki-temperaturi-vo-juni/ |access-date=28 June 2025 |work=[[Sloboden Pečat]] |language=mk}}</ref> Railway tracks between [[Vrbanja (Banja Luka)|Vrbanja]] and [[Čelinac]] were deformed by the heat, causing the suspension of [[Railways of Republika Srpska|ŽRS]] services.<ref>{{Cite news |date=26 June 2025 |title=Deformisala se pruga: U ovom dijelu BiH zbog visokih temperatura obustavljen željeznički saobraćaj |url=https://radiosarajevo.ba/vijesti/bosna-i-hercegovina/deformisala-se-pruga-u-ovom-dijelu-bih-zbog-visokih-temperatura-obustavljen-zeljeznicki-saobracaj/595124 |access-date=28 June 2025 |work=[[Radio Sarajevo]] |language=bs}}</ref>

      On 3 July, a temperature of {{cvt|41|C}} was recorded in [[Mostar]],<ref>{{Cite news |date=3 July 2025 |title=U Mostaru danas temperatura 41 stepen, i sutra u BiH pretežno sunčano |url=https://www.vijesti.ba/clanak/703924/u-mostaru-danas-temperatura-41-stepen-i-sutra-u-bih-pretezno-suncano |access-date=4 July 2025 |work=[[Vijesti.ba]] |language=bs}}</ref> whilst the [[Brčko District]] faced an increase in wildfires following high temperatures.<ref>{{Cite news |date=3 July 2025 |title=U Brčkom zbog visokih temperatura i nesavjesnih građana česti požari |url=https://www.vijesti.ba/clanak/703899/u-brckom-zbog-visokih-temperatura-i-nesavjesnih-gradjana-cesti-pozari |access-date=4 July 2025 |work=[[Vijesti.ba]] |language=bs}}</ref> From 4 July, some areas of Sarajevo began to restrict water consumption from 10 p.m. to 7 a.m.<ref>{{Cite news |date=2 July 2025 |title=Nekoliko sarajevskih naselja ostaju bez vode, uvodi se noćna redukcija |url=https://www.vijesti.ba/clanak/703669/nekoliko-sarajevskih-naselja-ostaju-bez-vode-uvodi-se-nocna-redukcija |access-date=4 July 2025 |work=[[Vijesti.ba]] |language=bs}}</ref> On the same day, Mostar recorded a temperature of {{Convert|41|C|F}} for the second time consecutively.<ref>{{Cite web |title=Mostar opet najtopliji, ruši temperaturne rekorde |url=https://www.vijesti.ba/clanak/704085/mostar-opet-najtopliji-rusi-temperaturne-rekorde |access-date=2025-07-04 |website=vijesti.ba |language=bs}}</ref>

      On 21 July, a temperature of {{Convert|38.6|C|F}} was recorded in [[Banja Luka]] while [[Sarajevo]] recorded a {{Convert|37|C|F}} temperature, about {{Convert|1.5|C-change|F-change}} below the record July temperature it set in 2021.<ref>{{Cite web |title=Treći toplotni val pogodio BiH: U Sarajevu je 37 stepeni, u Mostaru 39, "pakleno" i na sjeveru |url=https://www.klix.ba/vijesti/bih/treci-toplotni-val-pogodio-bih-u-sarajevu-je-37-stepeni-u-mostaru-39-pakleno-i-na-sjeveru/250721137 |access-date=2025-07-24 |website=Klix.ba |language=hr}}</ref> During the second heatwave, [[Trebinje]] recorded a temperature of {{Convert|40|C|F}} on 25 July, making it the first time to record such temperature since August 2012.<ref>{{Cite web |last=eTrebinje |date=2025-07-25 |title=40 stepeni Celzijusa u hladu meteorološke kućice |url=https://etrebinje.com/2025/07/40-stepeni-celzijusa-u-hladu-meteoroloske-kucice/ |access-date=2025-07-25 |website=eTrebinje |language=bs-BA}}</ref> On the same day, [[Mostar]] recorded a temperature of {{Convert|41|C|F}} for the third time in the month.<ref>{{Cite web |date=2025-07-25 |title=Crveno upozorenje na snazi u BiH, temperature 40+: Pogledajte koji je grad bio najtopliji u 14 sati |url=https://radiosarajevo.ba/vijesti/bosna-i-hercegovina/crveno-upozorenje-na-snazi-u-bih-temperature-40-pogledajte-koji-je-grad-bio-najtopliji-u-14-sati/598981 |access-date=2025-07-25 |website=radiosarajevo.ba |language=hr}}</ref>

      ===Bulgaria===
      In early July, Bulgaria was expected to experience an intense heatwave with five days of temperatures above {{cvt|40|C}}, peaking on 7 and 8 July with forecasts exceeding {{cvt|43|C}}.<ref>{{Cite news |date=2 July 2025 |title=Гореща вълна: Пет дни с температури над 40&nbsp;°C |url=https://www.novinite.bg/articles/270081/Goreshta-valna-Pet-dni-s-temperaturi-nad-40C |access-date=2 July 2025 |work=[[Novinite]] |language=bg}}</ref>

      ===Croatia===
      On 26 June, the records for the maximum June temperature were broken in a number of cities, including [[Slavonski Brod]] where a temperature of {{cvt|38.2|C}} was recorded, whilst temperatures in the [[Grič, Zagreb|Grič]] area of [[Zagreb]] came within {{cvt|0.1|C-change}} of its June record. The [[Zagreb Airport|Pleso]] area of Zagreb had the exact temperature matching with Slavonski Brod.<ref>{{Cite news |last=Popadić |first=Rade |date=27 June 2025 |title=Nevrijeme zahvatilo dio zemlje. Neće do Dalmacije, evo kada stiže fenska bura |url=https://www.dalmacijadanas.hr/nevrijeme-zahvatilo-dio-zemlje-nece-do-dalmacije-evo-kada-stize-fenska-bura/ |access-date=4 July 2025 |work=[[Dalmacija Danas]] |language=hr}}</ref>

      ===Estonia===
      In mid-April, Estonia was one of many countries in central and eastern Europe to be hit by unseasonably warm temperatures which were expected to climb above {{cvt|24|C}}.<ref name="guardian-14apr" /> The country's record for the maximum April temperature was broken when {{cvt|28.8|C}} was recorded.<ref name="guardian-21apr" />

      ===France===
      In late May, parts of France experienced record-breaking heat which also swept across the [[Iberian Peninsula]]. On 28 May, a temperature of {{cvt|32.3|C}} was recorded in [[Canet-en-Roussillon]].<ref name="guardian-30may">{{Cite news |last=Andrews |first=Matt |date=30 May 2025 |title=Weather tracker: Record heat engulfs parts of France, Portugal and Spain |url=https://www.theguardian.com/environment/2025/may/30/weather-tracker-record-heat-france-portugal-spain |access-date=24 June 2025 |work=[[The Guardian]]}}</ref> On 30 May, the records for the maximum May temperature were broken at 27 weather stations in western France, including [[Limoges]] and [[Toulouse]]; the highest of these was [[Sabres, Landes|Sabres]] where a temperature of {{cvt|36.4|C}} was recorded.<ref>{{Cite news |last=Mainguet |first=Maxime |date=30 May 2025 |title=CARTE. De nombreux records de chaleur battus ce vendredi dans la moitié ouest de la France |url=https://www.ouest-france.fr/meteo/canicule/cholet-niort-pau-ces-villes-qui-ont-battu-des-records-de-chaleur-ce-vendredi-517f0882-3d66-11f0-9838-46aa9b466e5f |access-date=23 June 2025 |work=[[Ouest-France]] |language=fr}}</ref>

      On 19 June, France entered its 50th heatwave since records began in 1947, with 27 departments under yellow heat alerts from 12 p.m.<ref>{{Cite news |last=Garric |first=Audrey |date=18 June 2025 |title=Une vague de chaleur « précoce », avec des températures allant jusqu'à 38 °C et un pic prévu pour samedi, arrive en France |url=https://www.lemonde.fr/planete/article/2025/06/18/une-vague-de-chaleur-precoce-et-remarquable-va-s-abattre-sur-la-france-avec-un-pic-prevu-samedi_6614246_3244.html |access-date=23 June 2025 |work=[[Le Monde]] |language=fr}}</ref> [[Météo-France]] issued orange heat alerts for 16 departments from 20 June, with over 30 more departments under yellow alerts.<ref>{{Cite news |date=19 June 2025 |title=Une vague de chaleur sévit en France : 16 départements placés en vigilance orange |url=https://www.lemonde.fr/planete/article/2025/06/19/vague-de-chaleur-16-departements-places-en-vigilance-orange-a-partir-de-vendredi-midi_6614647_3244.html |access-date=23 June 2025 |work=[[Le Monde]] |language=fr}}</ref> [[Électricité de France]] warned that electricity supplies could be disrupted due to high water temperatures impacting electricity production, particularly at the [[Bugey Nuclear Power Plant]].<ref>{{Cite news |last=Crellin |first=Forrest |date=20 June 2025 |title=Nuclear power plant warning as heatwave hits France |url=https://www.independent.co.uk/news/world/europe/heatwave-france-nuclear-power-plant-b2773702.html |access-date=23 June 2025 |work=[[The Independent]]}}</ref> On 21 June, a temperature of {{cvt|39.9|C}} was recorded in [[Châteaumeillant]] as orange heat alerts were lifted for all departments except [[Isère]] and [[Rhône]] on 22 and 23 June.<ref>{{Cite news |date=22 June 2025 |title=Canicule : vigilance orange maintenue en Isère et dans le Rhône, Météo-France alerte sur de très fortes chaleurs dans l'Est |url=https://www.lemonde.fr/planete/article/2025/06/22/canicule-vigilance-orange-maintenue-en-isere-et-dans-le-rhone-meteo-france-alerte-sur-de-tres-fortes-chaleurs-dans-l-est_6615287_3244.html |access-date=23 June 2025 |work=[[Le Monde]] |language=fr}}</ref>

      On 29 June, one reactor at the [[Golfech Nuclear Power Plant]] was shut down due to rising water temperatures in the [[Garonne]].<ref>{{Cite news |last=Le Roy |first=Melissa |date=30 June 2025 |title=La centrale nucléaire de Golfech stoppe son activité en raison de la canicule |url=https://france3-regions.franceinfo.fr/occitanie/tarn-et-garonne/montauban/la-centrale-nucleaire-de-golfech-stoppe-son-activite-en-raison-de-la-canicule-3180219.html |access-date=3 July 2025 |work=[[France 3 Occitanie]] |language=fr}}</ref> Both the [[Blayais Nuclear Power Plant|Blayais]] and Bugey nuclear power plants were also producing less electricity due to the rivers they use for cooling being warmer than normal.<ref>{{Cite news |last=Delanoë |first=Lauriane |date=1 July 2025 |title=Nucléaire : la canicule engendre une hausse de la consommation et une baisse de la production, un réacteur à l'arrêt depuis dimanche |url=https://www.franceinfo.fr/environnement/energie/nucleaire/nucleaire-la-canicule-engendre-une-hausse-de-la-consommation-et-une-baisse-de-la-production-un-reacteur-a-l-arret-depuis-dimanche_7348722.html |access-date=3 July 2025 |work=[[Radio France]] |language=fr}}</ref>

      On 30 June, a record-breaking 84 departments were under orange heatwave alerts, with a further seven under yellow alerts; only five departments had no alerts: [[Calvados (department)|Calvados]], [[Côtes-d'Armor]], [[Finistère]], [[Manche]] and [[Seine-Maritime]].<ref>{{Cite news |date=30 June 2025 |title=Canicule : 84 départements en vigilance orange, l'« épisode caniculaire intense » s'étend sur toute la France |url=https://www.lemonde.fr/planete/article/2025/06/30/canicule-la-vigilance-orange-maintenue-jusqu-a-mardi-pour-les-84-departements-concernes-un-episode-jamais-vu_6616805_3244.html |access-date=30 June 2025 |work=[[Le Monde]] |language=fr}}</ref> The following day, 16 departments were upgraded to red alerts, including all of the [[Paris Region]].<ref>{{Cite news |date=30 June 2025 |title=Canicule : 16 départements, dont ceux d'Île-de-France, basculent mardi en vigilance rouge |url=https://www.leparisien.fr/meteo/canicule-16-departements-dont-ceux-dile-de-france-basculent-mardi-en-vigilance-rouge-30-06-2025-6J25RZLSJBDNTILJCB7IMNLYO4.php |access-date=30 June 2025 |work=[[Le Parisien]] |language=fr}}</ref> Part of the [[Eiffel Tower]] was closed between 30 June and 2 July due to the extreme heat.<ref>{{Cite news |date=1 July 2025 |title=Le sommet de la tour Eiffel fermé jusqu'à mercredi en raison de la canicule |url=https://www.lefigaro.fr/culture/le-sommet-de-la-tour-eiffel-ferme-jusqu-a-mercredi-en-raison-de-la-canicule-20250701 |access-date=2 July 2025 |work=[[Le Figaro]] |language=fr}}</ref>

      On 1 July, a temperature of {{cvt|41.4|C}} was recorded in [[Cadenet]].<ref>{{Cite tweet |number=1940097313352917340 |user=meteofrance |title=🌡️ Ce mardi a été dans la continuité de la journée de lundi, avec des températures très élevées. |author-link=Météo-France |date=1 July 2025 |access-date=2 July 2025 |language=fr}}</ref> According to the [[Ministry of National Education (France)|Ministry of National Education]], a total of 2,213 schools were closed due to the heatwave.<ref>{{Cite web |date=1 July 2025 |title=Point d'étape des conséquences de la canicule sur l'accueil des élèves et des personnels |url=https://www.education.gouv.fr/point-d-etape-des-consequences-de-la-canicule-sur-l-accueil-des-eleves-et-des-personnels-450764 |access-date=2 July 2025 |website=[[Ministry of National Education (France)|Ministry of National Education]] |language=fr}}</ref>

      On 2 July, four departments were under red heatwave alerts, with a further 55 under orange alerts.<ref>{{Cite news |date=2 July 2025 |title=Canicule : quatre départements toujours en vigilance rouge ce mercredi, le Sud-Ouest respire à nouveau |url=https://www.sudouest.fr/environnement/climat/canicule/canicule-quatre-departements-toujours-en-vigilance-rouge-ce-mercredi-le-sud-ouest-respire-a-nouveau-25078447.php |access-date=2 July 2025 |work=[[Sud Ouest (newspaper)|Sud Ouest]] |language=fr}}</ref> [[Météo-France]] announced that France had experienced its second-hottest June on record, with an average temperature of {{cvt|22.2|C}}, beaten only by 2003. The agency also noted that a number of cities exceeded {{cvt|35|C}} for an unprecedented number of days, including [[Avignon]] with eleven days and [[Carcassonne]], [[Nîmes]] and [[Toulouse]] with nine days.<ref>{{Cite news |date=2 July 2025 |title=Canicule : avec 22,2 °C de moyenne, juin 2025 est devenu le deuxième mois le plus chaud de l'histoire |url=https://www.liberation.fr/environnement/climat/canicule-avec-222-c-de-moyenne-juin-2025-est-devenu-le-deuxieme-mois-le-plus-chaud-de-lhistoire-20250702_S7SQ4BEH5VBKLFWQFU33U3WLD4/ |access-date=2 July 2025 |work=[[Libération]] |language=fr}}</ref> A 10-year-old American tourist died after collapsing during a visit to the [[Palace of Versailles]]; earlier that day [[Agnès Pannier-Runacher]], the [[Ministry of Ecological Transition (France)|Minister of Ecological Transition]], reported two additional heat-related fatalities and said that over 300 people had received emergency care due to the heat.<ref name="bbc-2jul">{{Cite news |last=Cursino |first=Malu |date=2 July 2025 |title=Scorching European heatwave turns deadly in Spain, Italy and France |url=https://www.bbc.co.uk/news/articles/cwyg5pq584eo |access-date=3 July 2025 |work=[[BBC News]]}}</ref>

      The heat wave ended on 4 July 2025.<ref>{{Cite web|url=https://www.tagesschau.de/inland/wetter-hitzewelle-118.html|title=Nach dem nassen Juli wird es wieder heiß und trocken|website=tagesschau.de|accessdate=12 August 2025}}</ref><ref>see also [[Météo-France|meteofrance.fr]]: [https://meteofrance.fr/files/files/editorial/2025.08.01_MeteoFrance_BilanClimatiqueJuillet2025.pdf ''Bilan climatique de juillet 2025'']</ref>

      Around 10 August 2025, a new heat wave began.<ref>orf.at: [https://orf.at/stories/3402226/]</ref><ref>[[Météo-France]]: [https://rwg.meteofrance.com/internet2018client/2.0/report?domain=FRA&report_type=vigilancev6&report_subtype=version%20PDF&token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiIsImV4cCI6MTc1NDkxOTMxMn0.eyJqdGkiOiJKYzhxaGFJVFciLCJpYXQiOjE3NTQ5MTkzMTJ9.v0niXPV4qwvN1zlyjrvOALR3faNcuxrT4bA-6PnoBLM  meteofrance.com]</ref>

      ===Fennoscandian heatwave===
      The [[Fennoscandia|Fennoscandian]] heatwave lasted from mid-July to early August and resulted in an unusually high number of hot days (25°C or more) in [[Climate of Norway|Norway]], [[Climate of Sweden|Sweden]] and [[Climate of Finland|Finland]]. [[Ylitornio]], Finland had 26 hot days. Many observation stations in central and southern Finland had 20-25 hot days. There were also 22 days with temperatures exceeding 30°C. The highest temperature was 32.6°C, which was recorded at [[Oulu Airport]] on 31 July.<ref>{{cite web | title=July started cooler than usual, but ended with a sweltering heatwave | url=https://en.ilmatieteenlaitos.fi/press-release/3UkSBIbvStPq0VeuxpVG2D }}</ref>

      There were fewer hot days in Sweden than in Finland, but on 24 July a temperature of 33.6°C was recorded at [[Skellefteå Airport]]. Temperatures of 32-33°C were recorded at a number of observation stations in northern Sweden.<ref>{{cite web | title=Summering av värmeböljan i norr | date=28 July 2025 | url=https://www.smhi.se/blogg/blogg/2025-07-28-summering-av-varmeboljan-i-norr }}</ref> In Norway the highest temperature was 34.9°C, which was recorded at the [[Frosta Municipality|Frosta]] observation station. This was also the highest recorded temperature during the Fennoscandian heatwave. 

      The highest ever recorded temperatures in Norway, Sweden and Finland are 35.6°C (1970), 38.0°C (1933, 1947) and 37.2°C (2010), respectively. What sets the 2025 heatwave apart from its predecessors is the fact that it lasted for weeks, that some of the highest temperatures were recorded at high latitudes and that there was an unusually high number of days with temperatures exceeding 25°C-30°C.

      ===Germany ===
      In mid-April, eastern Germany was one of many areas of central and eastern Europe to be hit by unseasonably warm temperatures,<ref name="guardian-21apr" /> with [[Berlin]] forecasted to reach {{cvt|26|C}} on 16 and 17 April.<ref name="guardian-14apr" /> On 17 April, the Brandenburg towns of [[Coschen]] and [[Cottbus]] even reported {{cvt|28.4|C}}. 

      On 2 May, Germany saw the first hot day of the year in [[Waghäusel-Kirrlach]], with temperatures reaching {{cvt|30.4|C}}. There, on 31 May, it even reached {{cvt|32.5|C}}.

      On 21 June, a temperature of {{cvt|32.8|C}} was recorded in [[Wutöschingen]].<ref>{{Cite news |last1=Mader |first1=Luca |last2=Veil |first2=Susanne |last3=Kraft |first3=Nils |date=22 June 2025 |title=Bis zu 37 Grad möglich: Wetterdienst warnt vor Hitze in BW - Waldbrandgefahr steigt |url=https://www.swr.de/swraktuell/baden-wuerttemberg/warnung-wetterdienst-hitze-in-bw-37-grad-am-sonntag-100.html |access-date=23 June 2025 |work=[[Südwestrundfunk|SWR]] |language=de}}</ref>

      On 1 July, [[2025 European and Mediterranean wildfires#Germany|a large wildfire]] on the border of [[Saxony]] and [[Brandenburg]] led to the evacuation of over 100 people.<ref>{{Cite news |last=Jensch |first=Nele |date=3 July 2025 |title=Wildfires in eastern Germany injure firefighters and force evacuations |url=https://apnews.com/article/germany-wildfires-gohrischheide-village-evacuations-1384197a5922b13c88c9713f08eb8faf |access-date=3 July 2025 |work=[[AP News]]}}</ref> On 2 July, Germany experienced its hottest day of the year so far when {{cvt|39.3|C}} was recorded in [[Andernach]], closely followed by {{cvt|39.2|C}} in [[Tangerhütte]] and {{cvt|39.1|C}} in [[Kitzingen]].<ref>{{Cite news |last=Jensch |first=Nele |date=2 July 2025 |title=Hitze: Europa ächzt unter dem Wetter |url=https://www.dw.com/de/hitzewelle-hitze-deutschland-europa-wetter-juli-gewitter-40-grad-temperaturrekord-v3/g-73088060 |access-date=3 July 2025 |work=[[Deutsche Welle|DW]] |language=de}}</ref> 

      Following this, another heatwave<ref>{{Cite web |date=2025-08-14 |title=Wann endet die Hitze in NRW? Wetterexperte kündigt "Temperatursturz" an |url=https://www.ruhr24.de/nrw/wetter-in-nrw/hitze-nrw-wetter-experte-temperatursturz-ankuendigung-vorhersage-nordrhein-westfalen-august-93881378.html |access-date=2025-08-14 |website=www.ruhr24.de |language=de}}</ref> occurred between August 12-14 with temperatures reaching over 40 degrees in multiple cities of NRW.

      ===Greece===
      Between 9 and 12 June, night-time minimum temperatures remained mostly over {{cvt|30|C}} in Greece.<ref name="guardian-13jun" />

      Since late June, the country has experienced [[2025 European and Mediterranean wildfires#Greece|a number of wildfires]] which were exacerbated by high temperatures and have caused significant damage.<ref>{{Cite news |last1=Klimentov |first1=Mikhail |last2=Livingston |first2=Ian |date=5 July 2025 |title=Wildfires rage on Greek island of Crete amid deadly European heat wave |url=https://www.washingtonpost.com/world/2025/07/03/greece-wildfires-crete-europe-heatwave/ |access-date=5 July 2025 |newspaper=[[The Washington Post]]}}</ref> On 27 June, a temperature of {{cvt|43.2|C}} was recorded in [[Skala, Messenia]].<ref>{{Cite web |date=27 June 2025 |title=Ξεπέρασε τους 40 °C η μέγιστη θερμοκρασία την Παρασκευή 27 Ιουνίου 2025 |url=https://www.meteo.gr/article_view.cfm?entryID=3752 |access-date=2 July 2025 |website=[[National Observatory of Athens|meteo.gr]] |language=el}}</ref> According to the [[National Observatory of Athens]], Greece had experienced its second-hottest June on record, beaten only by 2024.<ref>{{Cite news |date=1 July 2025 |title=Meteo: Ο φετινός Ιούνιος ήταν ο δεύτερος θερμότερος από το 2010 – Ποιες περιοχές βρέθηκαν στο «κόκκινο» |url=https://www.kathimerini.gr/society/563691721/meteo-o-fetinos-ioynios-itan-o-deyteros-thermoteros-apo-to-2010-poies-perioches-vrethikan-sto-kokkino/ |access-date=2 July 2025 |work=[[Kathimerini]] |language=el}}</ref> As a result, the [[Ministry of Labour and Social Security (Greece)|Ministry of Labour and Social Security]] imposed a mandatory work stoppage from midday to 17:00 affecting outdoor manual labor and food delivery services in parts of the country beginning on 7 July.<ref>{{Cite news |date=7 July 2025 |title=Greece imposes work breaks as a heat wave grips the country |url=https://apnews.com/article/greece-heat-wave-summer-work-breaks-20fc6912059b8f0d122d6100430bbe15 |access-date=7 July 2025 |work=[[AP News]] |language=en}}</ref> The [[Acropolis]] was also ordered closed from 13:00 to 17:00 on 8 July due to extreme heat.<ref>{{Cite news |date=8 July 2025 |title=Greece shuts the Acropolis due to high temperatures |url=https://apnews.com/article/greece-acropolis-heat-wave-summer-ea91302a3e25bb9491ed2a9151ffe6b1 |access-date=8 July 2025 |work=[[AP News]] |language=en}}</ref>

      On 22 July, the Greek Ministry of Labor has implemented protective measures for construction workers and other particularly vulnerable people due to a heat wave. In Athens and many other parts of the country, it has been ordered that no outdoor work is permitted between 12 and 5 p.m.
      <br/>The [[Hellenic National Meteorological Service]] (HNMS) expects the heat to continue throughout the week. 
      In the center of Greece, the HNMS expects 43 degrees Celsius.<ref name="tagesschau25">{{Cite web|url=https://www.tagesschau.de/ausland/europa/griechenland-hitzewelle-102.html|title=Arbeitsverbote wegen Hitzewelle in Griechenland|website=tagesschau.de|accessdate=12 August 2025}}</ref>

      ===Iceland===
      [[File:Iceland heatwave geos5 20250518.jpg|thumb|A map showing air temperatures in Iceland on 18 May]]
      In mid-May, Iceland experienced a record-breaking heatwave, with temperatures reaching at least {{cvt|20|C}} for ten consecutive days between 13 and 22 May. The country's record for the highest May temperature was broken on 15 May at [[Egilsstaðir Airport]], where {{cvt|26.6|C}} was recorded; the previous record of {{cvt|25.6|C}}, recorded in 1992, was surpassed three more times during the heatwave. Furthermore, 94% of the automatic weather stations in the country which have been in operation for at least 20 years broke their records for the maximum May temperature; three staffed stations also broke their records for the maximum May temperature, including [[Stykkishólmur]] which has been in operation for 174 years.<ref>{{Cite web |date=26 May 2025 |title=The most significant May heatwave ever recorded in Iceland |url=https://en.vedur.is/about-imo/news/the-most-significant-may-heatwave-ever-recorded-in-iceland |access-date=27 June 2025 |website=[[Icelandic Meteorological Office]]}}</ref>

      ===Ireland===
      On 30 April, the country's record for the maximum April temperature was broken when {{cvt|25.9|C}} was recorded in [[Athenry]], breaking the previous record set in 1984.<ref>{{Cite news |date=1 May 2025 |title=New all-time April temperature record set, Met Éireann says |url=https://www.irishexaminer.com/news/arid-41623366.html |access-date=21 July 2025 |work=[[Irish Examiner]]}}</ref>

      On 19 June, temperatures reached {{cvt|27|C}} in [[County Roscommon]], making it the hottest day of the year so far.<ref>{{Cite news |date=20 June 2025 |title=Teaspach as cuimse geallta, athrú aeráide is cúis leis |url=https://www.rte.ie/news/nuacht/2025/0620/1519456-teaspach-as-cuimse-geallta-athru-aeraide-is-cuis-leis/ |access-date=23 June 2025 |work=[[RTÉ News]] |language=ga}}</ref> A temperature of {{cvt|29.6|C}} was recorded at the same location the following day, making 20 June the hottest day in Ireland in 3 years.<ref>{{Cite news |last1=O'Driscoll |first1=Marc |last2=Meskill |first2=Tommy |date=20 June 2025 |title=Hottest day for three years as high of 29.6C recorded in Roscommon |url=https://www.rte.ie/news/weather/2025/0620/1519425-weather-ireland-temperature/ |access-date=23 June 2025 |work=[[RTÉ News]]}}</ref>

      On 11 July, a total of 14 counties were a yellow warning for high temperatures; the whole country was under temperature warnings the following two days.<ref>{{Cite news |last1=McGreevy |first1=Ronan |last2=Ryan |first2=Órla |date=11 July 2025 |title=Temperatures of 29 degrees recorded on Friday as heat warning extended into Sunday |url=https://www.irishtimes.com/ireland/2025/07/11/ireland-weather-very-warm-conditions-to-continue-but-cloud-with-rain-will-build-from-sunday/ |access-date=21 July 2025 |newspaper=[[The Irish Times]]}}</ref>On 12 July, a temperature of {{cvt|31.1|C}} in County Roscommon, making it the hottest day of the year so far.<ref>{{Cite news |date=12 July 2025 |title=Hottest day of year as Met Éireann says mercury hit 31C |url=https://www.rte.ie/news/weather/2025/0712/1523167-weather-warnings/ |access-date=21 July 2025 |work=[[RTÉ News]]}}</ref>


      On 13 July, Connemara National Park recorded a peak of {{cvt|32.2|C}}, this is the hottest temperature of 2025. 

      ===Italy===
      On 12 June, [[Florence]] was forecasted to reach {{cvt|39|C}} as thunderstorms gave way to high temperatures.<ref>{{Cite news |last=Mistry |first=Ishani |date=9 June 2025 |title=Weather tracker: Storms make way for summer heat in Europe |url=https://www.theguardian.com/environment/2025/jun/09/weather-tracker-storms-summer-heat-europe-south-africa |access-date=26 June 2025 |work=[[The Guardian]]}}</ref>

      On 25 June, temperatures reached a record-breaking {{cvt|9.5|C}} at [[Capanna Margherita]], {{cvt|4554|m}} above sea level.<ref>{{Cite news |last=Cuscela |first=Maria |date=25 June 2025 |title=Caldo, nuovo record alla Capanna Margherita: 9,5 gradi a 4.554 metri di altitudine |url=https://www.lastampa.it/vercelli/2025/06/25/news/meteo_caldo_record_capanna_margherita_valsesia_alagna-15206642/ |access-date=27 June 2025 |work=[[La Stampa]] |language=it}}</ref> On 26 June, temperatures reached {{cvt|38.2|C}} in [[Bologna]]; the record for the highest minimum June temperature there was broken at {{cvt|27.3|C}}.<ref>{{Cite news |last=Alvisi |first=Matteo |date=26 June 2025 |title=Bologna è una città africana con temperature record: 38,2 gradi e minima più alta di sempre a 27,3 |url=https://www.ilrestodelcarlino.it/bologna/cronaca/caldo-temperature-record-tq5e5sp2 |access-date=27 June 2025 |work=[[il Resto del Carlino]] |language=it}}</ref> On 27 June, a total of 27 cities were under heat alerts: 13 were on red, 10 were on orange and four were on yellow.<ref>{{Cite news |date=27 June 2025 |title=Caldo africano, oggi 13 città con bollino rosso: da Roma a Milano, cosa significa. Temperature fino a 40 gradi |url=https://www.ilmessaggero.it/schede/caldo_africano_bollino_rosso_citta_quali_sono_elenco_arancione_giallo_allarme_cosa_fare-8921770.html |access-date=27 June 2025 |work=[[Il Messaggero]] |language=it}}</ref> On 30 June, two people died amid high temperatures: a 47-year-old man died in [[San Lazzaro di Savena]] whilst working at a construction site;<ref>{{Cite news |date=30 June 2025 |title=Imprenditore edile 47enne muore mentre lavora sotto al sole a San Lazzaro (Bologna) |url=https://www.ilfattoquotidiano.it/2025/06/30/operaio-morto-cantiere-bologna-notizie/8045271/ |access-date=1 July 2025 |work=[[il Fatto Quotidiano]] |language=it}}</ref> and a 53-year-old woman died in [[Bagheria]] after collapsing from the heat.<ref>{{Cite news |date=1 July 2025 |title=Donna di 53 anni muore in strada a Bagheria dopo un malore per il gran caldo |url=https://www.ilfattoquotidiano.it/2025/07/01/donna-di-53-anni-muore-in-strada-a-bagheria-dopo-un-malore-per-il-gran-caldo/8045978/ |access-date=1 July 2025 |work=[[il Fatto Quotidiano]] |language=it}}</ref> On 1 July, a [[power outage]] caused by excessive energy consumption and underground cables overheating hit part of Florence, leading to the evacuation of the [[Rinascente]] department store in the [[Piazza della Repubblica, Florence|Piazza della Repubblica]].<ref>{{Cite news |last=Marinari |first=Francesco |date=1 July 2025 |title=Black out a Firenze, colpite zone del centro storico, grande magazzino evacuato |url=https://www.lanazione.it/firenze/cronaca/black-out-firenze-m6vg5z26 |access-date=4 July 2025 |work=[[La Nazione]] |language=it}}</ref> On 2 July, two men died at beaches in [[Sardinia]] and another died from heart failure in [[Genoa]].<ref name="bbc-2jul" />

      ===Latvia===
      In mid-April, Latvia was one of many countries in central and eastern Europe to be hit by unseasonably warm temperatures which were expected to climb above {{cvt|24|C}}.<ref name="guardian-14apr" /> The country's record for the maximum April temperature was broken when {{cvt|28.4|C}} was recorded.<ref name="guardian-21apr" />

      ===Lithuania===
      In mid-April, Lithuania was one of many countries in central and eastern Europe to be hit by unseasonably warm temperatures which were expected to climb above {{cvt|24|C}}.<ref name="guardian-14apr" /> On 18 April, four weather stations surpassed {{cvt|29|C}}, breaking the country's previous record for the maximum April 18 temperature.

      ===North Macedonia===
      On 26 June, a temperature of {{cvt|41.7|C}} was recorded in [[Skopje]], the hottest June temperature recorded there since 1949.<ref name="alo">{{Cite news |last=Skorobać |first=Anđela |date=27 June 2025 |title=PAKLENI TALAS POKORIO BALKAN Rekordi stari više od jednog veka SRUŠENI u Beogradu i Novom Sadu ,najžešći dani do sada |url=https://www.alo.rs/vesti/drustvo/1081430/temperaturni-rekordi-stari-vise-od-jednog-veka-sruseni-u-beogradu-i-novom-sadu/vest |access-date=4 July 2025 |work=[[Alo!]] |language=sr}}</ref>

      ===Poland===
      In mid-April, Poland was one of many countries in central and eastern Europe to be hit by unseasonably warm temperatures, with [[Łódź]] forecasted to reach {{cvt|28|C}}.<ref name="guardian-14apr" /> On 18 April, a temperature of {{cvt|29.4|C}} was recorded in [[Łeba]], which is almost {{cvt|20|C-change}} above its April average.<ref name="guardian-21apr" />

      ===Portugal===
      In late May, Portugal experienced record-breaking heat which swept across the [[Iberian Peninsula]] and into France.<ref name="guardian-30may" /> On 28 May, the record for the maximum May temperature was broken in [[Beja, Portugal|Beja]] when {{cvt|37.4|C}} was recorded there.<ref>{{Cite news |last1=Góis |first1=Anabela |last2=Camilo |first2=Diogo |date=28 May 2025 |title=Beja regista a temperatura mais alta de sempre no mês de maio |url=https://rr.pt/noticia/pais/2025/05/28/beja-regista-a-temperatura-mais-alta-de-sempre-no-mes-de-maio/427263/ |access-date=23 June 2025 |work=[[Rádio Renascença]] |language=pt}}</ref> On 30 May, the May record was broken in both [[Alvalade (Santiago do Cacém)|Alvalade]] and [[Amareleja]], where temperatures reached {{cvt|39.6|C}} and {{cvt|39.8|C}} respectively.<ref>{{Cite web |date=31 May 2025 |title=Temperaturas registadas em 30 de maio de 2025 em Portugal 🌡️♨️ |url=https://www.facebook.com/photo?fbid=1169099688578404&set=a.649941783827533 |access-date=23 June 2025 |website=[[Facebook]] |language=pt}}</ref>

      On 8 June, a temperature of {{cvt|40.5|C}} was recorded in [[Mértola]].<ref name="guardian-13jun" /> During the week of 15 to 21 June, numerous weather stations in Portugal recorded temperatures surpassing {{cvt|40|C}}, peaking on 17 June when {{cvt|42.3|C}} was recorded in [[Alvega]].<ref>{{Cite news |date=23 June 2025 |title=Portugal hits 42.3 °C |url=https://www.theportugalnews.com/news/2025-06-23/portugal-hits-423-c/98789 |access-date=24 June 2025 |work=[[The Portugal News]]}}</ref>

      On 29 June, the national record for the maximum June temperature was broken after {{cvt|46.6|C}} was recorded in [[Mora, Portugal|Mora]], surpassing the previous record of {{cvt|44.9|C}}, which was set in [[Alcácer do Sal]] in 2017; temperatures came close to the country's absolute maximum of {{cvt|47.3|C}}, which was recorded in 2003.<ref>{{Cite news |last=Amado |first=Carolina |date=29 June 2025 |title=Onda de calor trouxe novo recorde de temperatura para Junho: 46,6&nbsp;°C |url=https://www.publico.pt/2025/06/29/azul/noticia/onda-calor-trouxe-novo-recorde-temperatura-junho-466c-2138312 |access-date=30 June 2025 |work=[[Público (Portugal)|Público]] |language=pt}}</ref> Out of the 90 weather stations in the country, 31 reached or exceeded their records for the maximum June temperature on 28 and 29 June.<ref>{{Cite news |date=3 July 2025 |title=Portugal registou 69 mortes em excesso durante alerta de calor |url=https://www.publico.pt/2025/07/03/sociedade/noticia/portugal-registou-69-mortes-excesso-durante-alerta-calor-2138823 |access-date=4 July 2025 |work=[[Público (Portugal)|Público]] |language=pt}}</ref> Between 28 June and the first days of July, the [[Directorate-General of Health]] recorded 284 excess deaths, primarily in people aged 85 and over.<ref>{{Cite news |date=7 July 2025 |title=Portugal registou 284 mortes em excesso durante alerta de tempo quente |url=https://www.dn.pt/sociedade/portugal-registou-284-mortes-em-excesso-durante-alerta-de-tempo-quente |access-date=9 July 2025 |work=[[Diário de Notícias]] |language=pt}}</ref>

      Heatwaves continued through August, resulting in the longest heatwave recorded for the interior region lasting from 29 July and 17 August.<ref>{{Cite news |date=18 September 2025 |title=Agosto passado foi um dos mais quentes e secos em Portugal das últimas décadas |url=https://www.rtp.pt/noticias/economia/agosto-passado-foi-um-dos-mais-quentes-e-secos-em-portugal-das-ultimas-decadas_n1684538 |access-date=20 September 2025 |work=[[Radio e Televisao de Portugal|RTP]] |language=pt}}</ref>

      ===Russia===
      In mid-April, western Russia was one of many areas of central and eastern Europe to be hit by unseasonably warm temperatures.<ref name="guardian-21apr" />

      ===Serbia===
      On 26 June, a temperature of {{cvt|40.7|C}} was recorded in [[Ćuprija]], whilst daily records for 25 and 26 June were broken in [[Belgrade]] and [[Novi Sad]], where temperatures reached {{cvt|38.1|C}} and {{cvt|38.7|C}} respectively.<ref name="alo" />

      ===Slovenia===
      On 25 June, a temperature of {{cvt|35.7|C}} was recorded in [[Ljubljana]], breaking the daily record there.<ref name="alo" /> On 26 June, the national record for the maximum June temperature was broken when {{cvt|38.4|C}} was recorded in [[Črnomelj]], beating the previous record of {{cvt|38.0|C}} set in [[Podnanos]] in 2022; the record for the highest daily mean temperature was also broken there at {{cvt|31.5|C}}.<ref>{{Cite news |last=Člankov Avtorja |first=Število |date=27 June 2025 |title=Temperature: Padla dva rekorda |url=https://www.zurnal24.si/slovenija/temperature-padla-dva-rekorda-443175 |access-date=4 July 2025 |work=[[Žurnal24]] |language=sl}}</ref>

      ===Spain===
      Spain experienced its hottest summer on record in 2025.<ref name=":0">{{Cite web |date=2025-09-16 |title=Spain had hottest summer on record in 2025, weather agency says |url=http://www.euronews.com/2025/09/16/spain-sweltered-through-hottest-summer-on-record-in-2025-weather-agency-says |access-date=2025-09-18 |website=euronews |language=en}}</ref> Average temperatures from June to August were 24.2 C.<ref name=":0" /> This was in large part because of the multiple heatwaves that hit the country.<ref>{{Cite web |date=2025-09-17 |title=Spain records hottest summer on record as heatwaves and wildfires grip the country |url=https://www.independent.co.uk/climate-change/news/spain-wildfires-heatwave-temperatures-record-b2828001.html |access-date=2025-09-18 |website=The Independent |language=en}}</ref><ref>{{Cite web |date=September 16, 2025 |title=Spain's 2025 summer was hottest on record, state weather agency says |url=https://www.reuters.com/sustainability/climate-energy/spains-2025-summer-was-hottest-record-state-weather-agency-says-2025-09-16/ |website=Reuters}}</ref> 

      The first heatwave to strike Spain in 2025 came in late May and brought record-breaking temperatures to much of the country. On 28 May, a temperature of {{cvt|39.1|C}} was recorded in [[El Granado]],<ref name="guardian-30may" /> whilst the first heat warnings of the year were activated in [[Andalusia]] and [[Catalonia]], followed by [[Aragon]], [[Extremadura]] and [[Galicia (Spain)|Galicia]] the following day.<ref>{{Cite news |last=Torres Benayas |first=Victoria |date=28 May 2025 |title=Las claves del episodio de calor extraordinario: estará en el podio de los tres peores registrados en mayo |url=https://elpais.com/espana/2025-05-28/las-claves-del-episodio-de-calor-extraordinario-estara-en-el-podio-de-los-tres-peores-registrados-en-mayo.html |access-date=23 June 2025 |work=[[El País]] |language=es}}</ref> On 29 May, the country saw its first day of the year over {{cvt|40|C}} when a temperature of {{cvt|40.6|C}} was recorded at [[Seville Airport]];<ref>{{Cite tweet |number=1928151170339500224 |user=AEMET_Esp |title=🌡️Han llegado los primeros 40 °C del verano... antes del verano. |author-link=State Meteorological Agency |date=29 May 2025 |access-date=23 June 2025 |language=es}}</ref> records for the maximum May temperature were broken at five stations, as well as one for the highest minimum May temperature.<ref>{{Cite tweet |number=1928379279135404486 |user=AEMET_Esp |title=🌡️El jueves 29 se batieron varios récords de temperatura máxima para el mes de mayo, y también uno de temperatura mínima más alta. |author-link=State Meteorological Agency |date=30 May 2025 |access-date=23 June 2025 |language=es}}</ref> On 30 May, temperatures surpassed 40&nbsp;°C in a number of places, with {{cvt|41.6|C}} recorded in El Granado;<ref>{{Cite tweet |number=1928554427989815746 |user=AEMET_Esp |title=🌡️De nuevo se han superado los 40 °C en puntos del sur peninsular este viernes. |author-link=State Meteorological Agency |date=30 May 2025 |access-date=23 June 2025 |language=es}}</ref> the following day temperatures dropped slightly with a maximum of {{cvt|40.7|C}} recorded at [[Córdoba Airport]].<ref>{{Cite tweet |number=1928923788411846935 |user=AEMET_Esp |title=🌡️El sábado se han superado, por tercer día consecutivo, los 40 °C en puntos del sur peninsular. |author-link=State Meteorological Agency |date=31 May 2025 |access-date=23 June 2025 |language=es}}</ref> On 30 and 31 May, records for the maximum May temperature were broken at five more stations, with records for the highest minimum May temperature broken at three others.<ref>{{Cite tweet |number=1929215885392134236 |user=AEMET_Esp |title=📈Durante los dos últimos días de mayo se batieron varios récords de temperatura máxima y mínima más alta para ese mes. |author-link=State Meteorological Agency |date=1 June 2025 |access-date=23 June 2025 |language=es}}</ref>

      On 8 June, a number of areas in southern Spain were placed on orange and yellow heat warnings;<ref>{{Cite tweet |number=1931285615250641337 |user=AEMET_Esp |title=07/06 11:42 Avisos activos mañana en España por temperaturas máximas y costeros. |author-link=State Meteorological Agency |date=7 June 2025 |access-date=23 June 2025 |language=es}}</ref> around 40 stations recorded temperatures over 40&nbsp;°C, with a maximum temperature of {{cvt|42.9|C}} recorded in [[Morón de la Frontera]].<ref>{{Cite tweet |number=1931790953490137507 |user=AEMET_Esp |title=🌡️ Alrededor de cuarenta estaciones de nuestra red han alcanzado o superado los 40 °C este domingo. |author-link=State Meteorological Agency |date=8 June 2025 |access-date=23 June 2025 |language=es}}</ref> Dozens of stations were at record levels for early summer.<ref name="guardian-13jun" />

      On 19 June, the record for the maximum June temperature in [[Huelva]] was broken when a temperature of {{cvt|41.1|C}} was recorded there; the record for the highest minimum June temperature in Morón de la Frontera was broken at {{cvt|25.0|C}}.<ref>{{Cite tweet |number=1936003558362464282 |user=AEMET_Esp |title=🌡️El día 19 se batieron dos récords de temperaturas altas para el mes de junio. |author-link=State Meteorological Agency |date=20 June 2025 |access-date=23 June 2025 |language=es}}</ref> On 21 June, temperatures reached {{cvt|40.4|C}} in [[Córdoba, Spain|Córdoba]], where a 58-year-old man became the first person of the year to die from [[heatstroke]] in the region.<ref>{{Cite news |last=Cobos |first=Pilar |date=22 June 2025 |title=Córdoba registra el primer fallecido por golpe de calor de 2025 en Andalucía |url=https://www.diariocordoba.com/cordoba-ciudad/2025/06/22/muere-hombre-58-anos-golpe-118929622.html |access-date=26 June 2025 |work=[[Diario Córdoba]] |language=es}}</ref> According to the [[Carlos III Health Institute]], there were 114 deaths attributable to high temperatures between 1 and 21 June.<ref>{{Cite news |last=Ferrer |first=Joan Lluís |date=25 June 2025 |title=Este junio ya quintuplica las muertes por calor en España del mismo mes de 2024 |url=https://www.informacion.es/medio-ambiente/2025/06/25/junio-quintuplica-muertes-calor-espana-119048211.html |access-date=26 June 2025 |work=[[Información]] |language=es}}</ref> On 22 June, the record for the highest minimum June temperature in [[Murcia]] was broken at {{cvt|24.4|C}}.<ref>{{Cite tweet |number=1937133791023387067 |user=AEMET_Esp |title=📈Murcia batió el pasado domingo su récord de temperatura mínima más alta para un mes de junio: 24,4 °C. |author-link=State Meteorological Agency |date=23 June 2025 |access-date=23 June 2025 |language=es}}</ref> On 23 June, the records for both the maximum and highest minimum June temperatures at [[Almería Airport]] were broken at {{cvt|40.9|C}} and {{cvt|27.1|C}} respectively.<ref>{{Cite tweet |number=1937904151750471947 |user=AEMET_Esp |title=📈 El pasado día 23 Almería aeropuerto batió tanto su récord de temperatura máxima como el de mínima más altas para un mes de junio: 40.9 y 27.1 °C, respectivamente. |author-link=State Meteorological Agency |date=25 June 2025 |access-date=29 June 2025 |language=es}}</ref>

      On 28 June, amid another period of extreme temperatures, the national record for the maximum June temperature was broken after {{cvt|46.0|C}} was recorded in El Granado, surpassing the previous record of {{cvt|45.2|C}}, which was set in [[Seville]] in 1965.<ref>{{Cite tweet |number=1939035888056443222 |user=AEMET_Esp |title=⚠️ Récord nacional de temperatura para junio. |author-link=State Meteorological Agency |date=28 June 2025 |access-date=29 June 2025 |language=es}}</ref> According to the Carlos III Health Institute, there were a total of 380 deaths attributable to high temperatures throughout June.<ref>{{Cite news |date=1 July 2025 |title=Junio acaba con 380 muertes achacables a las altas temperaturas, 102 de ellas desde el sábado por la ola de calor |url=https://www.elmundo.es/espana/2025/07/01/6863dfabfdddff72038b45a5.html |access-date=2 July 2025 |work=[[El Mundo (Spain)|El Mundo]] |language=es}}</ref>

      On 1 July, two people were killed in a large wildfire in a farming area of the municipality of [[Torrefeta i Florejacs]].<ref>{{Cite news |date=2 July 2025 |title=Two die in Catalonia wildfire as heatwave grips Europe |url=https://www.reuters.com/business/environment/two-die-catalonia-wildfire-heatwave-grips-europe-2025-07-02/ |access-date=2 July 2025 |work=[[Reuters]]}}</ref>

      Around 4 August, another heat wave in [[#Portugal|Portugal]], Spain, [[#Italy|Italy]], [[#Greece|Greece]]<ref>tagesschau.de 13 August 2025: [https://www.tagesschau.de/ausland/hitze-waldbraende-iberische-halbinsel-100.html ''Waldbrände in Südeuropa vielerorts außer Kontrolle''] (Forest fires out of control in many parts of southern Europe)</ref> and other [[List of Mediterranean countries|Mediterranean countries]] has begun.
      On 14 August, Spain has asked the EU for help in fighting forest fires.<ref name=es>tagesschau.de: [https://www.tagesschau.de/ausland/europa/waldbraende-spanien-hilfe-100.html ''Spanien bittet europäische Partner um Hilfe'']</ref> 
      On 16 August, Portugal asked for help.<ref name=pt>tagesschau.de: [https://www.tagesschau.de/ausland/europa/portugal-waldbraende-eu-hilfen-100.html ''Portugal bittet EU um Hilfe im Kampf gegen Waldbrände'']</ref> The situation continued to worsen in both countries, and there was no rain in sight. The  [[Directorate-General for European Civil Protection and Humanitarian Aid Operations|EU Civil Protection Mechanism]] was activated.<ref name=es /> 

      According to estimates by the [[European Forest Fire Information System]] (EFFIS), around 1570 km² of land have been destroyed in Spain since the beginning of 2025 – around half of that in August alone.
      In the [[NUTS statistical regions of Spain#NUTS_codes_2|north-west of Spain]] alone, 19 forest fires raged that were so large or dangerous to settlements that the affected regions had to request assistance from the [[Government of Spain]].<ref name=pt />

      Spain's national weather agency [[Aemet]] informed that temperatures had exceeded 44C in several places on 16 August. It has warned of a very high risk of fires across almost the entire country.<ref>https://www.bbc.com/news/videos/c80dx2z8jldo www.bbc.com]</ref>

      ===Switzerland===
      On 28 June, a temperature of {{cvt|36.0|C}} was recorded in [[Biasca]], whilst the national record for the maximum temperature at a pressure of {{cvt|500|hPa}} was broken after {{cvt|-4.28|C}} was recorded above [[Payerne]]. [[MeteoSwiss]] issued a level 3 heatwave warning for large parts of the country starting on 29 June.<ref>{{Cite news |date=28 June 2025 |title=La vague de chaleur s'étend sur toute la Suisse |url=https://www.letemps.ch/suisse/la-vague-de-chaleur-s-etend-sur-toute-la-suisse |access-date=3 July 2025 |work=[[Le Temps]] |language=fr}}</ref>

      On 2 July, the first reactor of the [[Beznau Nuclear Power Plant]] was shut down, followed by the second one later that day, leaving the facility entirely offline. The operator of the plant, [[Axpo]], said they had shut it down to prevent the waters of the [[Aare]] from overheating and to protect the river's ecosystem.<ref>{{Cite news |date=3 July 2025 |title=AKW Beznau stellt wegen der Hitze auch zweiten Reaktor ab |url=https://www.tagesanzeiger.ch/zu-hohe-wassertemperatur-der-aare-akw-beznau-stellt-wegen-der-hitze-auch-zweiten-reaktor-ab-407666249506 |access-date=3 July 2025 |work=[[Tages-Anzeiger]] |language=de}}</ref> A temperature of {{cvt|35.7|C}} was recorded in [[Basel]], making it the second-hottest day of the year so far.<ref>{{Cite tweet |number=1940459531781513238 |user=meteoschweiz |title=Auch am Mittwoch war es wieder hochsommerlich heiss. |author-link=MeteoSwiss |date=2 July 2025 |access-date=3 July 2025 |language=de}}</ref>

      ===Turkey===
      On 26 June, [[East Thrace]], the European part of Turkey, was hit by high temperatures which reached {{cvt|39.5|C}} in [[Edirne]] and {{cvt|38|C}} in [[Kırklareli]].<ref>{{Cite news |date=26 June 2025 |title=Trakya'da sıcak hava etkili oluyor |url=https://www.aa.com.tr/tr/gundem/trakyada-sicak-hava-etkili-oluyor/3614250 |access-date=4 July 2025 |work=[[Anadolu Agency]] |language=tr}}</ref> In late June, amid high temperatures and strong winds, [[2025 European and Mediterranean wildfires#Turkey|a series of wildfires]] broke out in [[İzmir Province]] which killed at least three people and forced over 50,000 people to evacuate.<ref>{{Cite news |date=5 July 2025 |title=Turkiye's Izmir, Hatay and Syria's Latakia regions affected by wildfires |url=https://www.aljazeera.com/news/2025/7/5/izmir-villages-in-turkiye-affected-by-wildfires-now-under-control |access-date=5 July 2025 |work=[[Al Jazeera English|Al Jazeera]]}}</ref>

      The [[Istanbul Metropolitan Municipality]] warned of a heatwave between 5 and 9 July and urged endangered groups such as children, the elderly and pregnant women not to stay in direct sunlight.<ref>{{Cite news |date=4 July 2025 |title=İstanbul kavrulacak: AKOM tarih verdi! |url=https://www.cumhuriyet.com.tr/turkiye/istanbul-kavrulacak-akom-tarih-verdi-2415132 |access-date=4 July 2025 |work=[[Cumhuriyet]] |language=tr}}</ref>

      On 22 July, the [[Turkish State Meteorological Service]] published<ref>[https://mgm.gov.tr/eng/forecast-cities.aspx  mgm.gov.tr]</ref> forecasts predicting up to 45 in [[Diyarbakır]].<ref name="tagesschau25"/> On 27 July, the national record for hottest temperature ever recorded was broken at [[Silopi]], in [[Şırnak Province]], where a temperature of {{convert|50.5|C|F|abbr=on}} was recorded, breaking the previous record of {{convert|49.5|C|F|abbr=on}} in [[Sarıcakaya]], [[Eskişehir Province]] in August 2023.<ref>{{cite news|last=Hairsine|first=Kate|title=Turkey sets new record of 50.5 degrees as Europe swelters|url=https://www.dw.com/en/turkey-sets-new-record-of-505-degrees-as-europe-swelters/a-73426915|website=[[Deutsche Welle]]|date=27 July 2025|accessdate=12 November 2025}}</ref>

      ===United Kingdom===
      The [[Met Office]] considers a heatwave to be when temperatures on three consecutive days surpass {{cvt|25-28|C}}, depending on the location.<ref>{{Cite news |last=King |first=Simon |date=17 June 2025 |title=When is a heatwave really a heatwave? |url=https://www.bbc.co.uk/weather/articles/c74n42pnzdvo |access-date=22 June 2025 |work=[[BBC Weather]]}}</ref> The extreme heat exacerbated conditions for wildfires following what had already been [[2025 United Kingdom wildfires|the worst year for them]] on record in the United Kingdom; this record was broken exceptionally early in the year after the total area burned by wildfires surpassed {{cvt|29000|ha|acre sqmi km2}} in late April.<ref>{{Cite news |last1=Poynting |first1=Mark |last2=Rivault |first2=Erwan |date=27 April 2025 |title=Area burned by UK wildfires in 2025 already at annual record |url=https://www.bbc.co.uk/news/articles/c0m9gm3jwljo |access-date=30 June 2025 |work=[[BBC News]]}}</ref>

      Statistics released by the [[Met Office]] on 1 September confirmed that the summer of 2025 had been the warmest summer on record in the UK, with a mean temperature of {{cvt|16.10|C}}, surpassing the previous record set in [[2018 British Isles heatwave|2018]].<ref>{{Cite web |title=Summer 2025 is the warmest on record for the UK |url=https://www.metoffice.gov.uk/about-us/news-and-media/media-centre/weather-and-climate-news/2025/summer-2025-is-the-warmest-on-record-for-the-uk |access-date=2025-09-07 |website=Met Office |language=en}}</ref>

      ====First heatwave (17–22 June)====
      On 18 June, a temperature of {{cvt|29.3|C}} was recorded in [[St James's Park]] in [[London]] as yellow heat-health alerts were issued by the [[UK Health Security Agency]] (UKHSA) for most of England which were in place from 12 p.m. that day to 6 p.m. on 22 June.<ref>{{Cite news |last1=O'Byrne Mulligan |first1=Euan |last2=Taylor |first2=Matt |date=18 June 2025 |title=Temperatures surpass 29C as UK heads for heatwave |url=https://www.bbc.co.uk/news/articles/c8d6jmmdq5go |access-date=22 June 2025 |work=[[BBC News]]}}</ref> Researchers at the [[London School of Hygiene & Tropical Medicine]] estimated that there would be around 570 heat-related deaths between 19 and 22 June, with 129 in London alone.<ref>{{Cite news |last=Carrington |first=Damian |date=21 June 2025 |title=Current heatwave 'likely to kill almost 600 people in England and Wales' |url=https://www.theguardian.com/environment/2025/jun/21/heatwave-expected-deaths-england-and-wales-analysis |access-date=23 June 2025 |work=[[The Guardian]]}}</ref>

      On 19 June, amber heat-health alerts were issued for all areas of England in place until 9 a.m. on 23 June as [[Suffolk]] became the first area of the UK to officially enter a heatwave as temperatures passed {{cvt|27|C}} for the third consecutive day. Temperatures of {{cvt|32.2|C}} were recorded at [[Heathrow]] and [[Kew]], making it the hottest day of the year so far; Wales also saw its hottest day as {{cvt|30.2|C}} was recorded in [[Cardiff]] and [[Trawsgoed]]. The highest temperature recorded in Scotland was {{cvt|24.4|C}} in [[Glasgow Bishopton]], 1.1&nbsp;°C lower than its hottest day so far for the year.<ref>{{Cite news |last1=King |first1=Simon |last2=Smith |first2=Cachella |date=19 June 2025 |title=Temperatures pass 32C as first UK area enters heatwave |url=https://www.bbc.co.uk/news/articles/cm2z4rmyl0yo |access-date=22 June 2025 |work=[[BBC News]]}}</ref> During the [[Royal Ascot]] temperatures reached {{cvt|29.7|C}}, with one person taken to hospital and 42 others receiving treatment on site for heat-related illnesses.<ref>{{Cite news |last=Stephens |first=Daisy |date=19 June 2025 |title=Dozens fall ill in heat at Royal Ascot |url=https://www.bbc.co.uk/news/articles/c04dpxqxn45o |access-date=22 June 2025 |work=[[BBC News]]}}</ref>

      On 20 June, Scotland experienced its hottest day of the year so far as {{cvt|28.9|C}} was recorded at [[Drumnadrochit]].<ref>{{Cite news |last=Bonar |first=Megan |date=20 June 2025 |title=Scotland bakes at 28C on hottest day of the year |url=https://www.bbc.co.uk/news/articles/czxernn0relo |access-date=23 June 2025 |work=[[BBC News]]}}</ref> Temperatures in both England and Wales reached {{cvt|30.8|C}}.<ref>{{Cite news |last=Sephton |first=Connor |date=21 June 2025 |title=UK weather: Yellow warning for thunderstorms as heatwave intensifies |url=https://news.sky.com/story/uk-weather-yellow-warning-for-thunderstorms-as-heatwave-intensifies-13386103 |access-date=23 June 2025 |work=[[Sky News]]}}</ref> [[Transport for London]] activated a hot weather plan for the [[London Underground]], where average temperatures on certain lines surpass {{cvt|30|C}}.<ref>{{Cite news |last=Low |first=Harry |date=20 June 2025 |title=Hot weather plan for Tube activated for heatwave |url=https://www.bbc.co.uk/news/articles/cjrl3g2y9qpo |access-date=23 June 2025 |work=[[BBC News]]}}</ref>

      On 21 June, a temperature of {{cvt|33.2|C}} was recorded in [[Charlwood]], beating the record set two days earlier.<ref>{{Cite news |last1=Chisholm |first1=Johanna |last2=Cole |first2=Hollie |last3=Bett |first3=Darren |date=21 June 2025 |title=Temperatures surpass 33C as storm warning kicks in |url=https://www.bbc.co.uk/news/articles/cg5z78nyglpo |access-date=23 June 2025 |work=[[BBC News]]}}</ref> A heatwave was declared in Northern Ireland for the first time in two years as temperatures surpassed {{cvt|25|C}} for the third consecutive day; its hottest day of the year so far was on 20 June when a temperature of {{cvt|29.5|C}} was recorded at [[Castlederg]].<ref>{{Cite news |last=Best |first=Barra |date=21 June 2025 |title=Northern Ireland records first heatwave in two years |url=https://www.bbc.co.uk/news/articles/c77v4711ezjo |access-date=23 June 2025 |work=[[BBC News]]}}</ref> A fault on a train near [[Loughborough Junction railway station|Loughborough Junction]] forced all services in the area to cease, three of which were outside station platforms; these trains had to be evacuated which took up to two and a half hours.<ref>{{Cite news |last=Kelly |first=James W |date=21 June 2025 |title=Train passengers evacuated as temperatures soar |url=https://www.bbc.co.uk/news/articles/cy9xj3vnyxgo |access-date=23 June 2025 |work=[[BBC News]]}}</ref>

      On 22 June, temperatures fell across the country as many areas experienced wind and rain,<ref>{{Cite news |last1=Smith |first1=Cachella |last2=Bett |first2=Darren |date=22 June 2025 |title=Heatwave eases as wind and rain drift across UK |url=https://www.bbc.co.uk/news/articles/crrqw7z0ykko |access-date=22 June 2025 |work=[[BBC News]]}}</ref> with overnight yellow weather warnings for thunderstorms in place until 3 a.m. for parts of northern England, northeast Wales and the [[Scottish Borders]].<ref>{{Cite news |date=21 June 2025 |title=UK weather: Up to 40mm of rain could fall in two hours amid thunderstorm warning |url=https://news.sky.com/story/uk-weather-up-to-40mm-of-rain-could-fall-in-two-hours-amid-thunderstorm-warning-13386891 |access-date=23 June 2025 |work=[[Sky News]]}}</ref>

      ====Second heatwave (27 June–2 July)====
      On 26 June, the UKHSA issued amber heat-health alerts for the [[East Midlands]], [[East of England]], [[Greater London|London]], [[South East England|South East]] and [[South West England|South West]] regions, with yellow alerts in place for the [[West Midlands (region)|West Midlands]] and [[Yorkshire and the Humber]]; all alerts were in place from midday on 27 June to 6 p.m. on 1 July. On 30 June, a yellow alert was issued for the [[North West England|North West]] region whilst the alerts for the West Midlands and Yorkshire and the Humber were upgraded to amber; all alerts were also extended to end at 9 a.m. on 2 July.<ref>{{Cite web |date=26 June 2025 |title=Heat-Health Alerts issued by UKHSA and the Met Office |url=https://www.gov.uk/government/news/first-yellow-heat-health-alert-of-2025-issued-for-4-regions |access-date=29 June 2025 |website=[[gov.uk]] |publisher=[[UK Health Security Agency]]}}</ref>

      By 27 June, Suffolk was already officially in a heatwave as temperatures had exceeded {{cvt|27|C}} at [[Santon Downham]] for three consecutive days.<ref>{{Cite news |last1=Somerville |first1=Ewan |last2=King |first2=Simon |date=27 June 2025 |title=Health alerts come into force ahead of second heatwave |url=https://www.bbc.co.uk/news/articles/cy4y8exrw0zo |access-date=29 June 2025 |work=[[BBC News]]}}</ref> On 29 June, London saw its second day of temperatures surpassing {{cvt|31|C}}, whilst temperatures reached {{cvt|26.4|C}} at [[Yeovilton]], close to the site of the [[Glastonbury Festival]].<ref>{{Cite news |last1=Fatima |first1=Zahra |last2=Bett |first2=Darren |date=29 June 2025 |title=London hits 31C for second day as heatwave builds |url=https://www.bbc.co.uk/news/articles/cx2l77w5pl7o |access-date=29 June 2025 |work=[[BBC News]]}}</ref>

      On 30 June, temperatures surpassed {{cvt|30|C}} across much of the country, with a maximum of {{cvt|33.1|C}} recorded at [[Heathrow Airport]].<ref>{{Cite news |last1=Mitchell |first1=Ottilie |last2=King |first2=Simon |date=30 June 2025 |title=Heatwave peak sees parts of UK climb to 33C |url=https://www.bbc.co.uk/news/articles/c89epj8pd9zo |access-date=30 June 2025 |work=[[BBC News]]}}</ref> In southwest London, [[Wimbledon Championships|Wimbledon]] saw its hottest opening day on record at {{cvt|32.3|C}}, surpassing the previous record of {{cvt|29.3|C}} set in 2001.<ref>{{Cite news |last1=Sinmaz |first1=Emine |last2=Abdul |first2=Geneva |date=30 June 2025 |title=Wimbledon opening day hottest on record as temperatures forecast to hit 34C |url=https://www.theguardian.com/sport/2025/jun/30/wimbledon-hottest-opening-day-on-record |access-date=30 June 2025 |work=[[The Guardian]]}}</ref> In [[Jersey]], the record for the maximum June temperature was broken when a temperature of {{cvt|33.4|C}} was recorded on the island.<ref>{{Cite news |date=30 June 2025 |title=Jersey sees hottest June day on record |url=https://www.bbc.co.uk/news/articles/cn0zz35d717o |access-date=1 July 2025 |work=[[BBC News]]}}</ref>

      On 1 July, a temperature of {{cvt|35.8|C}} was recorded in [[Faversham]], making it the hottest day of the year so far.<ref>{{Cite tweet |number=1941155685330198746 |user=metoffice |title=Following verification, temperatures peaked at 35.8 °C at Faversham on 1 July, making this the highest temperature reached so far this year. |author-link=Met Office |date=4 July 2025 |access-date=4 July 2025}}</ref> Northern Ireland, Scotland and Wales saw much milder temperatures, with the maximums there being {{cvt|20.5|C}}, {{cvt|19.7|C}} and {{cvt|25.8|C}} respectively. The Met Office also confirmed that England had experienced its hottest June since records began in 1884, with an average temperature of {{cvt|16.9|C}}; the United Kingdom as a whole had experienced its second-hottest June with an average of {{cvt|15.2|C}}.<ref>{{Cite news |last1=King |first1=Simon |last2=James |first2=Imogen |date=1 July 2025 |title=UK sees hottest day of 2025 as heatwave peaks |url=https://www.bbc.co.uk/news/articles/c79qqx1r5yyo |access-date=1 July 2025 |work=[[BBC News]]}}</ref> Elsewhere in Scotland, firefighters were battling [[Dava wildfire|a series of wildfires]] in [[Moray]] and the neighbouring [[Scottish Highlands|Highlands]] for a fourth day.<ref>{{Cite news |date=1 July 2025 |title=In pictures: Scotland's four-day battle with wildfires |url=https://www.bbc.co.uk/news/articles/c93kkj7pvzdo |access-date=1 July 2025 |work=[[BBC News]]}}</ref>

      2 July marked the end of the heatwave in the country, which had lasted as long as six days in some areas.<ref>{{Cite news |last1=Keith-Lucas |first1=Sarah |last2=Bubalo |first2=Mattea |date=2 July 2025 |title=Cooler weather conditions set in across UK as heatwave ends |url=https://www.bbc.co.uk/news/articles/ceq7yr2drygo |access-date=2 July 2025 |work=[[BBC News]]}}</ref> The [[Environment Agency]] warned of droughts across the country following what had been one of the driest springs on record; North West England and Yorkshire were already in an official state of drought.<ref>{{Cite news |last1=Poynting |first1=Mark |last2=Carr |first2=Jess |last3=Leake |first3=Phil |date=2 July 2025 |title=Will there be a drought where I live? |url=https://www.bbc.co.uk/news/articles/crk661074ejo |access-date=2 July 2025 |work=[[BBC News]]}}</ref>

      ====Third heatwave (9–15 July)====
      On 8 July, the UKHSA issued yellow heat-health alerts for the [[East Midlands]], [[East of England]], [[Greater London|London]], [[South East England|South East]], [[South West England|South West]] and [[West Midlands (region)|West Midlands]] regions; all alerts were in place from 9 July to 15 July.<ref>{{Cite news |last=Rich |first=Ben |date=8 July 2025 |title=Heat health alerts issued ahead of third UK heatwave |url=https://www.bbc.co.uk/weather/articles/cx2jdg56gedo |access-date=9 July 2025 |work=[[BBC Weather]]}}</ref> These regions received additional amber heat-health alerts whilst the remaining three regions of England were placed under yellow alerts; these alerts were in place from midday on 11 July to 9 a.m. on 14 July.<ref>{{Cite news |last=Clinton |first=Jane |date=11 July 2025 |title=Heat health alerts and hosepipe bans across England as third heatwave takes hold |url=https://www.theguardian.com/uk-news/2025/jul/11/heat-health-alerts-hosepipe-ban-england-third-heatwave |access-date=11 July 2025 |work=[[The Guardian]]}}</ref>

      On 11 July, a temperature of {{cvt|34.7|C}} was recorded in [[Astwood Bank]] whilst Wales saw its hottest day of the year so far when {{cvt|32.7|C}} was recorded in [[Usk]]. The hottest temperatures in Northern Ireland and Scotland were {{cvt|28.1|C}} in [[Magilligan]] and {{cvt|28.9|C}} in [[Aboyne]].<ref>{{Cite news |last1=Cole |first1=Hollie |last2=King |first2=Simon |date=11 July 2025 |title=Millions face hosepipe bans as UK heatwave reaches 34.7C |url=https://www.bbc.co.uk/news/articles/crmv8x74ky9o |access-date=11 July 2025 |work=[[BBC News]]}}</ref> On 12 July, temperatures in Wales reached {{cvt|33.1|C}} in [[Bute Park]], making it the hottest day of the year so far; rail services between [[Aberdare]], [[Merthyr Tydfil]] and [[Pontypridd]] were disrupted after tracks were damaged by the heat and a series of running events in [[Snowdonia]] were cancelled.<ref>{{Cite news |last=Bourne |first=Nicholas |date=12 July 2025 |title=Stereophonics gig disruption as heat damages rail track |url=https://www.bbc.co.uk/news/articles/c24v85m3343o |access-date=21 July 2025 |work=[[BBC News]]}}</ref> Scotland also saw its hottest day of the year so far when temperatures reached {{cvt|32.2|C}} in [[Aviemore]], the highest temperature ever recorded there.<ref>{{Cite news |date=12 July 2025 |title=Temperature hits 32C on Scotland's hottest day in two years |url=https://www.bbc.co.uk/news/articles/cdxlk9pgk0vo |access-date=21 July 2025 |work=[[BBC News]]}}</ref> Temperatures in Northern Ireland reached {{cvt|30|C}} in Magilligan, also making it the hottest day of the year so far in the country;<ref>{{Cite news |last=Tunney |first=Liam |date=12 July 2025 |title=NI records warmest day in almost three years as fire service warn of gorse fire risk |url=https://www.belfasttelegraph.co.uk/news/northern-ireland/ni-records-warmest-day-in-almost-three-years-as-fire-service-warn-of-gorse-fire-risk/a997970906.html |access-date=21 July 2025 |work=[[Belfast Telegraph]]}}</ref> England saw a high of {{cvt|33|C}} in [[Ross-on-Wye]].<ref>{{Cite news |last1=Berry |first1=Nikki |last2=Davies |first2=Maia |date=12 July 2025 |title=Heatwave peaks at 33C as whole of UK swelters |url=https://www.bbc.co.uk/news/articles/c5y2jd5yye9o |access-date=21 July 2025 |work=[[BBC News]]}}</ref> On 13 July, temperatures peaked at {{cvt|31.2|C}} in [[Achnagart]], with {{cvt|31.1|C}} recorded in Ross-on-Wye, England, {{cvt|30.2|C}} in [[Gogerddan]], Wales and {{cvt|27.1|C}} in [[Castlederg]], Northern Ireland. Four people died in water-related incidents around Scotland, whilst police were searching for a man who had went missing after entering the [[River Thames]] in [[Oxfordshire]].<ref>{{Cite news |last1=Smith |first1=Cachella |last2=Taylor |first2=Matt |date=13 July 2025 |title=UK sizzles for final day of heatwave ahead of heavy rain |url=https://www.bbc.co.uk/news/articles/cwyxk999p5wo |access-date=23 July 2025 |work=[[BBC News]]}}</ref>

      A [[hosepipe ban]] for customers of [[Yorkshire Water]] came into effect on 11 July, affecting over five million people;<ref>{{Cite news |last1=Hudson |first1=Paul |last2=Jones |first2=Steve |date=8 July 2025 |title=UK's first 2025 hosepipe ban declared in Yorkshire |url=https://www.bbc.co.uk/news/articles/cx2073zy4k9o |access-date=11 July 2025 |work=[[BBC News]]}}</ref> the same day, [[South East Water]] announced it would also impose a ban for 1.4 million people in [[Kent]] and [[Sussex]] from 18 July.<ref>{{Cite news |last=Lo |first=Hsin-Yi |date=11 July 2025 |title=Water company announces hosepipe ban |url=https://www.bbc.co.uk/news/articles/cz9kqj7n7zpo |access-date=11 July 2025 |work=[[BBC News]]}}</ref> On 14 July, [[Thames Water]] announced a hosepipe ban for [[Gloucestershire]], [[Oxfordshire]], [[Berkshire]] and [[Wiltshire]], affecting 1.1 million people from 22 July.<ref>{{Cite news |last=Stephens |first=Daisy |date=14 July 2025 |title=Thames Water issues hosepipe ban for 1.1m people |url=https://www.bbc.co.uk/news/articles/cg4revv15qdo |access-date=14 July 2025 |work=[[BBC News]]}}</ref> On 15 July, the [[Environment Agency]] declared a drought in the regions of the East and West Midlands.<ref>{{Cite news |date=15 July 2025 |title=Drought declared in the Midlands amid warning more hosepipe bans may be needed |url=https://news.sky.com/story/drought-declared-in-the-midlands-as-people-are-urged-to-use-water-wisely-13396807 |access-date=15 July 2025 |work=[[Sky News]]}}</ref>

      ====Fourth heatwave (11–17 August)====
      On 8 August, the UK Health Security Agency issued a yellow heat health alert for most of England, except the north east and north west, which would be in force from 12pm on Monday 11 August until 6pm on Wednesday 13 August, when temperatures were forecast to go above 30°C.<ref>{{Cite web |first=Ben |last=Rich |url=https://www.bbc.com/weather/articles/czjm4zl20wzo |title=UK weather: Heat health alerts issued with 30C heatwave expected next week |date=8 August 2025 |website=BBC Weather |publisher=BBC |accessdate=8 August 2025}}</ref> On 11 August, the alert was upgraded to an amber warning for the East Midlands, West Midlands, East of England, London, and the South East, lasting from 9am on 12 August until 6pm on 13 August.<ref>{{Cite web|url=https://news.sky.com/story/uk-weather-amber-heat-health-alert-issued-for-large-parts-of-england-13410053 |title=UK weather: Amber heat health alert issued for large parts of England |date=12 August 2025 |website=Sky News |accessdate=11 August 2025}}</ref> On 13 August, the yellow alert was extended to last from 6pm on 13 August until 6pm on 18 August, with the alert covering Yorkshire and The Humber, the East Midlands, the West Midlands, the East of England, London, the South East, and South West.<ref>{{Cite web|url=https://news.sky.com/story/fourth-uk-heatwave-of-summer-to-peak-today-with-34c-possible-in-some-areas-13411044 |title=UK weather: Yellow heat health alert extended across large parts of country amid heatwave |date=13 August 2025 |website=Sky News |accessdate=13 August 2025}}</ref>

      On 12 August, [[Northolt]] in London recorded the highest temperature of the day at 33.4°C.<ref>{{Cite web |first1=Tom |last1=McArthur |first2=Elizabeth |last2=Rizzini |url=https://www.bbc.com/news/articles/czerrzdewzxo |title=England enters fourth heatwave as temperatures reach 33C |date=12 August 2025 |website=BBC News |publisher=BBC |accessdate=12 August 2025}}</ref>

      On 12 August, the [[Scottish Fire and Rescue Service]] issued a wildfire warning for Scotland due to very dry conditions, advising against the use of naked flames outdoors. It was the tenth such warning to be issued in 2025, lasting from 13 to 20 August.<ref>{{Cite web|url=https://www.bbc.com/news/articles/c5yl4qzj822o |title=Scotland at 'very high' wildfire risk from Wednesday |date=12 August 2025 |website=BBC News |publisher=BBC |accessdate=12 August 2025}}</ref> On 14 August, [[Natural Resources Wales]] declared a drought in parts of Wales following the driest six month period since 1976.<ref>{{Cite web |first=Anna |last=Lewis |url=https://www.bbc.com/news/articles/cx23llkyym4o |title=Drought declared for parts of Wales after record six months |date=14 August 2025 |website=BBC News |publisher=BBC |accessdate=14 August 2025}}</ref> A drought was declared in North Wales on 29 August.<ref>{{Cite web |first=Samuel |last=Devine |url=https://www.bbc.com/news/articles/cx293qqgq84o |title=Drought declared in north Wales by environmental watchdog |date=29 August 2025 |website=BBC News |publisher=BBC |accessdate=29 August 2025}}</ref>

