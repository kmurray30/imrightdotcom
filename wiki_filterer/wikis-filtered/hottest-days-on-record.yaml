  - title: 2022 United Kingdom heatwaves
    pageid: 71308805
    extract: |-
      The 2022 United Kingdom heatwaves were part of several heatwaves across Europe and North Africa. The United Kingdom experienced three heatwaves; the first was for three days in June, the second for three days in July, and the third for six days in August. Climatologists say the extreme heat was due to climate change. 2022 was the UK's warmest year since records began in 1884, with an average annual temperature above 10 °C (50 °F) for the first time. The 2022 heatwaves contributed to the death of nearly 3000 people, most of whom were 65 years or older. 
      There were also more grass fires and wildfires than average, and in August a drought was declared in many regions. There were nearly 25,000 wildfires across the country.
      The Met Office issued its first red warning for extreme heat on 8 July, which affected all of central and southern England and was in place for 18 and 19 July. On 15 July, it declared a national emergency after the red warning was put in place. On 19 July, a record temperature of 40.3 °C (104.5 °F) was recorded and verified by the Met Office in Coningsby, England, breaking the previous record set in 2019 of 38.7 °C (101.7 °F) in Cambridge, England.
    source: |-
      {{short description|Periods of unusually hot weather in the summer of 2022}}
      {{Use British English|date=July 2022}}
      {{Use dmy dates|date=September 2022}}
      [[file:UK from ISS on 12 Aug 22.jpg|thumb|The UK's largest island, Great Britain, seen from the [[International Space Station]] on 12 August 2022 showing clear skies and dry ground]]

      The '''2022 United Kingdom heatwaves''' were part of [[2022 European heatwaves|several heatwaves across Europe and North Africa]]. The United Kingdom experienced three [[heatwave]]s; the first was for three days in June, the second for three days in July, and the third for six days in August. Climatologists say the extreme heat was due to [[Climate change in the United Kingdom|climate change]]. 2022 was the UK's warmest year since records began in 1884, with an average annual temperature above {{cvt|10|C}} for the first time.<ref name=":9">{{cite web |date=5 January 2023 |title=UK weather: 2022 was warmest year ever, Met Office confirms |url=https://www.bbc.com/news/uk-64173485 |access-date=5 January 2023 |publisher=BBC News}}</ref> The 2022 heatwaves contributed to the death of nearly 3000 people, most of whom were 65 years or older.<ref name=":14">{{Cite web |title=Heat mortality monitoring report: 2022 |url=https://www.gov.uk/government/publications/heat-mortality-monitoring-reports/heat-mortality-monitoring-report-2022 |access-date=2024-12-16 |website=GOV.UK |language=en}}</ref><ref name=":12">{{Cite book |title=Health Effects of Climate Change (HECC) in the UK: 2023 report |publisher=UK Health Security Agency |publication-date=11 December 2023 |chapter=State of the past and future UK climate |chapter-url=https://assets.publishing.service.gov.uk/media/657043059462260721c569a6/HECC-report-2023-chapter-1-climate-projections.pdf}}</ref> 

      There were also more grass fires and [[wildfire]]s than average, and in August [[2022 European drought|a drought]] was declared in many regions. There were nearly [[2022 United Kingdom wildfires|25,000 wildfires]] across the country.<ref>{{cite news |date=30 December 2022 |title=Almost 25,000 wildfires fought in England during summer |url=https://www.bbc.com/news/uk-england-64118239 |access-date=30 December 2022 |publisher=[[BBC News]] |language=en-GB}}</ref>

      The [[Met Office]] issued its first [[National Severe Weather Warning Service|red warning]] for extreme heat on 8 July, which affected all of central and southern England and was in place for 18 and 19 July.<ref>{{cite web |author=Press office, [[Met Office]] |title=UK prepares for historic hot spell |url=https://www.metoffice.gov.uk/about-us/press-office/news/weather-and-climate/2022/red-extreme-heat-warning |website=Met Office |date=15 July 2022 |access-date=7 August 2022}}</ref> On 15 July, it declared a [[national emergency]] after the red warning was put in place. On 19 July, a record temperature of {{cvt|40.3|C}} was recorded and verified by the Met Office in [[Coningsby]], England, breaking the previous record [[2019 European heat waves|set in 2019]] of {{cvt|38.7|C}} in [[Cambridge]], England.<ref name=":8">{{cite web |author=Press office, Met Office |title=Record high temperatures verified |url=https://www.metoffice.gov.uk/about-us/press-office/news/weather-and-climate/2022/record-high-temperatures-verified |website=Met Office |date=28 July 2022 |access-date=7 August 2022}}</ref>

      == June heatwave ==
      {{infobox heat event
      | title = June 2022 United Kingdom heatwave
      | areas = United Kingdom
      | image = 
      | caption = 
      | type = heatwave
      | start_date = {{start date|2022|06|15|df=y}}
      | start_date_ref = 
      | end_date = {{end date|2022|06|17|df=y}}
      | end_date_ref = 
      | highest_temp_c = 32.7
      | highest_temp_location = [[Santon Downham]], Suffolk
      | highest_temp_date = 17 June
      }}
      On the three days from 15 June to 17 June, temperatures in [[Kew]], London, reached at least {{cvt|28|C|abbr=on}}, the official heatwave threshold at that location for that time of year.<ref name=":6">{{cite news |last=Rhoden-Paul |first=Andre |title=UK heatwave: Hottest day of the year again for third day in a row |url=https://www.bbc.co.uk/news/uk-61844172 |publisher=BBC News |date=17 June 2022 |access-date=18 August 2022}}</ref> On 17 June, a high of {{cvt|32.7|C|abbr=on}} was recorded in [[Santon Downham]], Suffolk.<ref name=":6" />

      A level two heat-health alert was issued by the [[UK Health Security Agency]] to cover the East Midlands and south-west on 15 June.<ref name=":7">{{cite news |last=Somerville |first=Ewan |title=It's Fryday! Beaches packed on the hottest day of the year |url=https://www.telegraph.co.uk/news/2022/06/17/uk-weather-today-heatwave-2022-hottest-day-year/ |work=The Telegraph |date=17 June 2022 |access-date=18 August 2022}}</ref> A level three alert was issued for London and South East England the following day.<ref name=govuk>{{cite news|title=Heat-health alert issued by the UK Health Security Agency|url=https://www.gov.uk/government/news/heat-health-alert-issued-by-the-uk-health-security-agency|access-date=18 June 2022|work=www.gov.uk|date=15 June 2022|archive-date=17 June 2022|archive-url=https://web.archive.org/web/20220617192419/https://www.gov.uk/government/news/heat-health-alert-issued-by-the-uk-health-security-agency|url-status=live}}</ref>

      The heatwave ended on 18 June, as temperatures fell by an average of {{cvt|10-15|C-change}}. A "huge cluster" of thunderstorms moved across the UK, prompting the [[Met Office]] to issue a yellow warning for lightning for Southern England (lightning warnings had only been issued on three previous occasions). It was also reported that the UK could experience up to a further four heatwaves over the summer, and weather experts had called for heatwaves to be given names in the same way that [[Winter storm naming in the United Kingdom and Ireland|winter storms are named]].<ref>{{cite web |last1=Macpherson |first1=Jon |last2=Shaw |first2=Neil |title=Four more heatwaves to hit UK over summer and could be named like storms |url=https://www.lancs.live/whats-on/four-more-heatwaves-hit-uk-24266749 |website=LancsLive |date=19 June 2022 |access-date=19 August 2022}}</ref><ref>{{cite web |title=Lightning storm warning issued by Met Office as hottest day of the year gives way to cooler weather |url=https://news.sky.com/story/uk-weather-temperatures-predicted-to-fall-by-nearly-15c-following-hottest-day-of-the-year-forecasters-say-12636059 |publisher=[[Sky News]] |date=18 June 2022 |access-date=19 August 2022}}</ref>

      === Impact on resorts ===
      Crowds arrived at swimming pools, parks, seaside destinations in the south and east of England early in the morning of 17 June.<ref>{{cite news |last=Kingsley |first=Thomas |title=UK heatwave: Britons scramble to beaches from 6am as sweltering 35C high looms |url=https://www.independent.co.uk/news/uk/home-news/uk-heatwave-2022-weather-beaches-b2103359.html |work=The Independent |date=17 June 2022 |access-date=18 August 2022}}</ref><ref name=":7" /> Seafront car parks at [[Bournemouth]], Dorset, were said to be full by midday.<ref name=":7" />

      == July heatwave ==
      {{infobox heat event
      | title = July 2022 United Kingdom heatwave
      | areas = United Kingdom
      | image = File:UK heatwave weather warnings July 2022.jpg
      | caption = UK weather warnings in July 2022
      | type = heatwave
      | start_date = {{start date|2022|07|17|df=y}}
      | start_date_ref = 
      | end_date = {{end date|2022|07|19|df=y}}
      | end_date_ref = 
      | highest_temp_c = 40.3
      | highest_temp_location = [[Coningsby]], [[Lincolnshire]]<ref>{{cite news |title=UK heatwave: Parts of Yorkshire and Lincolnshire hit 40C | work=BBC News | date=19 July 2022 |url=https://www.bbc.co.uk/news/uk-england-62218587#:~:text=While%20the%20previous%20temperature%20record,figure%20recorded%20in%20the%20UK. |access-date=5 April 2024}}</ref>
      | highest_temp_date = 19 July
      | fatalities = 3,200<ref name="UK_DEATHS">{{Cite web|title=Ryan Merrifield|url=https://www.mirror.co.uk/news/uk-news/breaking-more-3200-brits-killed-28176268|work=[[Daily Mirror|The Mirror]]| date=7 October 2022}}</ref>
      }}

      On 8 July, the Met Office issued a heat-health alert warning that there was a 90% probability of level 3 alert criteria being met in parts of England on 9 July.<ref>{{cite web|title=NHS England » Heat-health watch alert: level 3 – heatwave action|url=https://www.england.nhs.uk/2022/07/heat-health-watch-alert-level-3-heatwave-action-10/|access-date=10 July 2022|website=www.england.nhs.uk|date=8 July 2022 }}</ref>{{Update inline|date=July 2022|reason=Was it?}} On 12 July, the Met Office issued an [[National Severe Weather Warning Service|amber extreme-heat warning]] for 17 July, which was extended from 17 to 19 July. It was stated that the high temperatures could extend into the following week.<ref>{{cite web|title=Extreme heat warning issued |url=https://www.metoffice.gov.uk/about-us/press-office/news/weather-and-climate/2022/extreme-heat-warning-issued|access-date=12 July 2022|website=Met Office}}</ref> By 13 July, the water levels at the [[Thruscross Reservoir]] fell low enough to reveal the ruins of West End, a village which was flooded when the reservoir was built in 1966.<ref>{{cite web|last=Sutcliffe|first=Robert|date=14 July 2022|title=Yorkshire reservoirs are drying up as water supplies run seriously low|url=https://www.examinerlive.co.uk/news/west-yorkshire-news/urgent-water-warning-yorkshire-reservoir-24490828|access-date=14 July 2022|website=YorkshireLive}}</ref>

      On 15 July, the [[UK Health Security Agency|UKHSA]] increased the Heatwave Alert Level to 4, "illness and death occurring among the fit and healthy – and not just in high-risk groups".<ref>{{cite web|title=What is a national heatwave emergency and what could it mean for the UK this week?|url=https://news.sky.com/story/what-is-a-national-heatwave-emergency-and-what-could-it-mean-for-the-uk-this-week-12650436|date=15 July 2022|access-date=16 July 2022|publisher=Sky News}}</ref> The Met Office issued its first ever red extreme-heat warning after there were forecasts of over {{cvt|40|C}} in some parts of England, and a [[national emergency]] was declared.<ref>{{cite news |url=https://www.bbc.com/news/uk-62177458|title=Heatwave: National emergency declared after UK's first red extreme heat warning|date=15 July 2022|access-date=15 July 2022|publisher=BBC News |first1=Doug|last1=Faulkner|first2=Charley|last2=Adams}}</ref> The warning was in place from 18 to 19 July, with most of England being affected.<ref>{{cite web|title=UK Red warning Extreme heat|url=https://www.metoffice.gov.uk/weather/warnings-and-advice/uk-warnings#?date=2022-07-19&id=b01e382c-77dc-4ac0-9ba4-d81c80dd1690&details|access-date=15 July 2022|website=Met Office}}</ref>

      The amber extreme-heat warning was extended to cover [[Cornwall]], west Wales and parts of southern Scotland.<ref>{{cite web|title=The first Red Extreme heat warning issued|url=https://www.metoffice.gov.uk/about-us/press-office/news/weather-and-climate/2022/red-extreme-heat-warning|access-date=15 July 2022|website=Met Office}}</ref> A number of schools announced they would either close or allow pupils to wear [[Physical education|PE]] kit in place of their [[school uniform]] on the hottest days.<ref>{{cite news |last=Shearing |first=Hazel |title=Heatwave: Schools to close or let children wear PE kit to keep cool |url=https://www.bbc.com/news/education-62182530 |publisher=BBC News |date=15 July 2022 |access-date=16 July 2022}}</ref>

      On 17 July, the first day of the amber warning, the highest temperature recorded was {{cvt|33|C}} in [[Hawarden]], Wales. The highest temperature in England was {{cvt|32|C}} in [[Nantwich]], and the highest in Scotland was {{cvt|26.4|C}} in [[Auchincruive]]. Northern Ireland reached {{cvt|27.7|C}} in [[Armagh]].<ref>{{cite news |date=17 July 2022|title=Amber heat warning in place as temperatures soar |url=https://www.bbc.com/news/uk-62195015|access-date=17 July 2022 |publisher=BBC News}}</ref>

      On 18 July, the first day of the red warning, temperatures reached {{cvt|38.1|C}} in [[Santon Downham]], [[Suffolk]]. Wales broke its record for the highest recorded temperature, with {{cvt|37.1|C}} recorded in [[Hawarden]].<ref name=":0">{{cite news |title=Heatwave latest: Wales sees hottest day on record, provisional figures show|url=https://www.bbc.co.uk/news/live/uk-62184978|access-date=18 July 2022 |publisher=BBC News}}</ref> The [[Channel Islands]] had a new record temperature as {{cvt|38|C}} was recorded in [[St Helier]].<ref>{{cite news |title=Channel Islands temperature hits record high |url=https://www.bbc.com/news/world-europe-jersey-62205847 |publisher=BBC News |date=18 July 2022 |access-date=19 July 2022}}</ref> The highest temperature in Scotland was {{cvt|31.3|C}} in [[Aboyne]], and the highest in Northern Ireland was {{cvt|31.1|C}} in [[Derrylin]].<ref>{{cite news |date=18 July 2022|title=UK heatwave: Temperature tops 38C and likely to rise on Tuesday |publisher=BBC News |url=https://www.bbc.com/news/uk-62201793|access-date=18 July 2022}}</ref> Cornwall reached {{cvt|34.2|C}} in [[Bude]], breaking the county's record of {{cvt|33.9|C}} set during the [[1976 British Isles heat wave|1976 British Isles heatwave]].<ref>{{cite web|last=Letcher|first=Lisa|date=18 July 2022|title=Cornwall just recorded its highest ever temperature|url=https://www.cornwalllive.com/news/cornwall-news/cornwall-records-highest-ever-temperature-7347856|access-date=18 July 2022|website=CornwallLive}}</ref>

      Between 18 and 19 July, the United Kingdom experienced its highest recorded minimum nighttime temperature, at {{cvt|26.8|C}} at Shirburn Model Farm, [[Oxfordshire]].<ref>{{cite web |title=New record from July heat |url=https://www.metoffice.gov.uk/about-us/press-office/news/weather-and-climate/2022/new-record-from-july-heat |access-date=23 August 2022 |website=Met Office}}</ref> This is an increase of 2.9 °C from the previous record, set in [[Brighton]] in August 1990.<ref name=":1">{{cite news |title=Temperature records fall as heatwave continues |url=https://www.bbc.com/news/uk-england-62218587 |publisher=BBC News |date=19 July 2022 |access-date=19 July 2022}}</ref> Temperatures in many other parts of the country did not fall below {{cvt|25|C}}, giving the UK its warmest [[tropical night]] on record.<ref>{{cite web|url=https://inews.co.uk/news/tropical-nights-what-meaning-why-harmful-uk-hottest-night-record-heatwave-1750057|title=Why 'tropical nights' when temperatures fail to drop below 20°C are so harmful|first=Madeleine|last=Cuff|date=19 July 2022|website=inews.co.uk|accessdate=19 July 2022}}</ref>

      On 19 July, a temperature of {{cvt|40.3|C}} was recorded at [[Coningsby]], [[Lincolnshire]], the hottest temperature ever recorded in the United Kingdom.<ref name=":2">{{cite news |title=Heatwave latest: UK temperature tops 40C for first time on record |url=https://www.bbc.co.uk/news/live/uk-62184978|access-date=19 July 2022 |publisher=BBC News}}</ref> Before that day, the previous record of {{cvt|38.7|C}} was recorded in Cambridge during the [[2019 European heat waves|2019 European heatwaves]]. The Met Office reported that this record was broken at 46 stations across England on 19 July, six of which recorded temperatures at or above 40 °C, stating that the "extreme heat was far more intense and widespread than previous comparable heatwaves".<ref>{{cite web |title=Here are the highest temperatures across the country today 👇 |url=https://twitter.com/metoffice/status/1549448971676012546 |access-date=19 July 2022 |website=Twitter}}</ref><ref>{{cite web|url=https://www.metoffice.gov.uk/about-us/press-office/news/weather-and-climate/2022/july-heat-review|title=A milestone in UK climate history|publisher=Met Office|date=22 July 2022|access-date=23 July 2022}}</ref> Many locations broke their previous record temperatures by large margins; for example, [[Durham, England|Durham]] reached {{cvt|36.9|C}}, breaking its previous record of {{cvt|32.9|C}} by 4.0 °C.<ref>{{Cite web |last=Kendon |first=Mike |date=September 20, 2022 |title=Unprecedented extreme heatwave, July 2022 |url=https://www.metoffice.gov.uk/binaries/content/assets/metofficegovuk/pdf/weather/learn-about/uk-past-events/interesting/2022/2022_03_july_heatwave_v1.pdf |website=Met Office}}</ref> Scotland had its highest temperature ever after {{cvt|34.8|C}} was recorded at [[Charterhall]],<ref name=":8" /> breaking the record of {{cvt|32.9|C}} recorded during the [[2003 European heat wave|2003 European heatwave]].<ref name=":2" /> [[Aysgarth Falls]], a popular waterfall in the [[Yorkshire Dales]], almost completely dried up after the high temperatures and no rainfall in the area for many weeks.<ref>{{Cite news|date=19 July 2022|title=Aysgarth Falls and riverbed run dry due to heatwave and low rainfall |publisher=BBC News |url=https://www.bbc.com/news/uk-england-york-north-yorkshire-62226763|access-date=19 July 2022}}</ref>

      British minister [[Kit Malthouse]] told Parliament that at least 13 people died in water-related incidents during the heatwave, and that at least 41 properties were destroyed in London and more than a dozen elsewhere in Britain.<ref>{{Cite web|date=20 July 2022|title=Britain counts cost of historic heatwave as 13 die|url=https://www.reuters.com/world/uk/britain-counts-cost-hottest-day-ever-2022-07-20/|access-date=22 July 2022|website=Reuters}}</ref>

      ===Impact===
      ====Transport====
      [[File:Hammersmith Bridge footing cooled in heatwave.jpg|thumb|Temperature control systems and foil insulation added to [[Hammersmith Bridge]], London, to prevent heat damage]]

      [[Network Rail]] announced that the [[East Coast Main Line]] would close on most of the day on 19 July, for all stations between {{rws|London King's Cross}} and {{rws|York}} and {{rws|Leeds}}.<ref>{{Cite web|last=Bollen|first=Jennifer|date=17 July 2022|title=Red weather warning – East Coast Main Line to close|url=https://www.networkrail.co.uk/stories/red-weather-warning-east-coast-main-line-to-close/|access-date=18 July 2022|website=Network Rail}}</ref> Many [[train operating companies]], including [[Greater Anglia (2012–2025)|Greater Anglia]], [[Great Western Railway (train operating company)|Great Western Railway]] and [[London North Eastern Railway]], introduced amended timetables, imposing speed restrictions on their trains to avoid [[Rail stressing|track buckling]].<ref>{{Cite web |title=Extreme weather warning. Avoid travelling with Greater Anglia on Monday 18 and Tuesday 19 July |url=https://www.greateranglia.co.uk/travel-information/service-disruptions/extreme-weather-warning-avoid-travelling-greater-anglia|access-date=18 July 2022 |website=Greateranglia.co.uk}}</ref><ref>{{Cite web |title=Heatwave travel update |url=https://www.gwr.com/travel-information/travel-updates/live-network-updates/disruption-information |access-date=18 July 2022 |website=Gwr.com}}</ref><ref>{{Cite web |title=Heatwave travel advice |url=https://www.lner.co.uk/travel-information/heatwave-travel-advice/ |access-date=18 July 2022 |website=Lner.co.uk}}</ref> [[Transport for London]] urged people to make only essential journeys on 18 and 19 July.

      On 18 July, all flights at [[Luton Airport]] were suspended after the high temperatures led to a surface defect on the runway.<ref name=":0"/> Flights out of the airport resumed at 17:40, more than two hours after they stopped just after 15:00.<ref>{{cite web |title=Luton Airport arrivals suspended in heatwave – as schools and trains also disrupted by surging temperatures |url=https://news.sky.com/story/heatwave-disruption-schools-close-hospitals-cancel-appointments-railways-close-lines-and-events-are-scrapped-as-uk-braces-for-record-temperatures-12653033 |access-date=18 July 2022 |publisher=Sky News}}</ref> The [[RAF]] halted all flights in and out of [[RAF Brize Norton|Brize Norton]], the UK's largest RAF station, because "the runway melted".<ref>{{cite news |last1=Somerville |first1=Ewan |last2=Parekh |first2=Marcus |title=UK heatwave: Travel chaos as Luton airport halts all flights after runway melts |url=https://www.telegraph.co.uk/news/2022/07/18/met-office-weather-heatwave-warning-uk-schools-work/ |work=The Telegraph |date=18 July 2022 |access-date=18 July 2022 |issn=0307-1235}}</ref> The rail temperature in [[Suffolk]] hit {{cvt|62|C}}, which was the highest-ever recorded in the UK.<ref>{{cite web |last=Topham |first=Gwyn |title=Two UK rail main lines close as fire blocks another London route |url=https://www.theguardian.com/business/2022/jul/19/two-uk-rail-mainlines-close-track-heat-east-coast |website=The Guardian |date=19 July 2022 |access-date=20 July 2022}}</ref>

      On 19 July, Network Rail issued a "do not travel" warning ahead of the extreme temperatures. No services ran into or out of London King's Cross all day, and no [[Thameslink]] or [[Great Northern route|Great Northern]] services were running north of London. [[East Midlands Railway]] was running very limited services between {{rws|Derby}}, {{rws|Nottingham}}, {{rws|Luton}}, {{rws|Bedford}} and {{rws|London St Pancras}}, which stopped entirely during the hottest part of the day.<ref>{{cite news |date=19 July 2022 |title=Train passengers warned not to travel in heatwave |url=https://www.bbc.com/news/business-62219556 |access-date=19 July 2022 |publisher=BBC News}}</ref> The East Coast Main Line south of York was closed, as well as the [[Sheffield Supertram]] network.<ref name=":1"/> All trains between {{rws|London Euston}} and {{rws|Milton Keynes Central}} were suspended after a fire began by the track.<ref name=":2"/>

      Roads across the country began to melt, as surface temperatures exceeded {{cvt|54|C}} in [[Lincolnshire]].<ref>{{cite web|last1=Dillon |first1=Jonny |last2=Elliott-Gibbs |first2=Sam |date=19 July 2022 |title=UK roads melt into 'black goo' as heatwave sees surface temperatures reach 54C |url=https://www.mirror.co.uk/news/uk-news/uk-roads-seen-melting-black-27516311 |access-date=20 July 2022 |website=Daily Mirror}}</ref> Among these roads was the [[A14 road (England)|A14]], which was closed westbound between J36 and J35 for hours after a part of the road "rose and then cracked".<ref>{{cite news |date=19 July 2022 |title=A14 closed for hours as surface buckles in heat |url=https://www.bbc.com/news/uk-england-cambridgeshire-62219162 |access-date=20 July 2022 |publisher=BBC News}}</ref> Part of the [[A11 road (England)|A11]] was closed both ways after there was damage to one of the lanes.<ref>{{cite web |last=Broomhead |first=Michael |date=19 July 2022 |title=A11 between Wymondham and Thickthorn closed due to damage in 'extreme heat' |url=https://www.norfolklive.co.uk/news/norfolk-news/a11-between-wymondham-thickthorn-closed-7353898 |access-date=20 July 2022 |website=Norfolklive}}</ref>

      ====Retail====
      A corner shop in [[Scunthorpe]] lost around £1,000 worth of goods when its entire stock of chocolate melted during the heatwave.<ref>{{cite news |date=4 August 2022 |title=Scunthorpe shop loses £1k of chocolate after heatwave causes it to melt |publisher=BBC News |url=https://www.bbc.com/news/uk-england-humber-62414609 |access-date=4 August 2022}}</ref>

      Major supermarkets in London reported having sold out of bottled water, ice cream, and [[ice lollies]] during the heatwave, and increased sales of paddling pools and burgers.<ref name=":3">{{cite news |last=Quadri |first=Sami |date=19 July 2022 |title=Ice cream and water aisles empty at major supermarkets in London amid heatwave |work=Evening Standard |url=https://www.standard.co.uk/news/london/ice-cream-water-london-sainsbury-s-heatwave-weather-b1013356.html |access-date=16 August 2022}}</ref> [[Waitrose]] reported a 36 per cent year on year increase in the sales of ice cream.<ref name=":3" /> [[John Lewis & Partners|John Lewis]] reported a 709 per cent year on year increase in sales of fans and air conditioning units.<ref name=":3" /> [[Iceland (supermarket)|Iceland]] reported 16 July 2022 as its best ever day for ice cream sales, at 12 per cent above its previous highest day, which was in 2019.<ref name=":4" /> Ice cream parlours struggled to meet the increase in demand.<ref name=":4">{{cite news |last=Holl-Allen |first=Genevieve |title=Demand for ice cream soars as Brits try to keep cool in heatwave |url=https://www.independent.co.uk/news/uk/brits-iceland-british-manchester-met-office-b2125835.html |work=The Independent |date=18 July 2022 |access-date=16 August 2022}}</ref>

      Luxury chocolate products retailer, [[Hotel Chocolat]], suspended their delivery service because of the hot weather.<ref name=":3" />

      ====Berry farming====
      There was an impact on berry farming as hot weather increases the demand for them, and good weather helps farmers to meet that demand as berries ripen quicker.<ref name=":3" /> Farmers dropped the prices of strawberries and cherries as bumper crops, about 10-15 per cent more than usual, were produced during the heatwave.<ref name=":5">{{Cite news |last=Mitib |first=Ali |date=23 July 2022 |title=Farmers bowled over by berry boom |work=[[The Times]] |url=https://www.thetimes.com/uk/environment/article/farmers-bowled-over-by-berry-boom-vr2q62d9f |access-date=16 July 2022}}</ref> Low rainfall and prolonged sunshine in Kent, Herefordshire, Lancashire, and Norfolk provided excellent growing conditions, promoting the strong growth of ripe sweet berries.<ref name=":5" />

      ====Seaside resorts====
      [[File:Heatwave on Margate Beach.jpg|thumb|[[Margate Beach|Margate beach]] on 19 July 2022]]
      Between 10 and 13 July there was an average increase of 15 per cent in the number of visitors to seaside resorts compared to the previous year.<ref>{{Cite news |last=Linsell |first=Katie |date=17 July 2022 |title=Brits Flock to Seaside Towns to Beat the Heat and Airport Chaos |work=Bloomberg UK |url=https://www.bloomberg.com/news/articles/2022-07-17/brits-flock-to-seaside-towns-to-beat-the-heat-and-airport-chaos |access-date=16 August 2022}}</ref>

      ====Utilities====
      On 25 July, ''[[Bloomberg News]]'' reported that South East London had narrowly avoided experiencing a [[power outage|blackout]] on 20 July, after the increase in demand for electricity caused by the hot weather.<ref>{{cite news |last=Blas |first=Javier |date=25 July 2022 |title=How London Paid a Record Price to Dodge a Blackout |work=Bloomberg News |url=https://www.bloomberg.com/opinion/articles/2022-07-25/london-s-record-9-724-54-per-megawatt-hour-to-avoid-a-blackout |accessdate=25 July 2022}}</ref> It was prevented by the [[National Grid (Great Britain)|National Grid]] purchasing electricity from Belgium at the highest price the UK had ever paid. They were reported to have paid £9,724 per megawatt hour, 5,000% more than the typical price.<ref>{{cite news |url=https://www.bbc.com/news/uk-england-london-62296443|title=London narrowly avoided post-heatwave blackout|date=25 July 2022|access-date=25 July 2022 |publisher=BBC News}}</ref>

      ===Aftermath===
      Weather forecasters from the BBC, Met Office and the [[Royal Meteorological Society]] were subjected to online abuse and questioned validity over their coverage of the heatwave, most prompted by reports that linked it to climate change.<ref>{{cite news |date=29 July 2022 |title=UK heatwave: Weather forecasters report unprecedented trolling |url=https://www.bbc.com/news/uk-62323048 |accessdate=29 July 2022 |work=BBC News}}</ref>[[File:Lightningcanterbury.jpg|thumb|[[Lightning strike]] on 19 July, the hottest day of the heatwave, as seen from the [[University of Kent]], [[Canterbury]].]]
      On 19 July, steep [[lapse rate]]s in the mid troposphere associated with the plume of hot air led to the development of a line of elevated [[dry thunderstorm]]s that initiated along a [[cold front]] ahead of an approaching upper [[Trough (meteorology)|trough]], affecting southern England. These storms produced very little precipitation, with accumulations of just 1-2mm in places.<ref>{{Cite web |title=Precipitation, 24h, observations England from 07/20/2022, 07:00am |url=https://meteologix.com/uk/observations/england/precipitation-total/20220720-0600z.html |access-date=30 July 2022 |website=Meteologix}}</ref> This, combined with frequent cloud-to-ground [[lightning]] and dry vegetation, created additional fire hazards. Several thousand lightning strikes were detected,<ref>{{Cite web |title=Lightning & Thunderstorms - Customized Archive Data |url=https://blitzortung.org/en/archive_data.php?stations_users=0&selected_numbers=*&end_date=1658275200&end_time=1500&start_date=1658188800&start_time=48600&north=90&west=-180&east=180&south=-90&rawdata_image=1&map=12&width_orig=640&width_result=640&png_gif=0&agespan=60&frames=12&delay=100&last_delay=1000&show_result=1 |access-date=30 July 2022 |website=[[blitzortung.org]]}}</ref> causing at least one residential fire.<ref>{{Cite web |date=20 July 2022 |title=Lightning fire in Yealmpton extinguished |url=https://www.totnes-today.co.uk/news/lightning-fire-in-yealmpton-extinguished-556057 |access-date=30 July 2022 |website=Totnes Times}}</ref>

      On 3 August, [[Marks and Spencer]] announced that it would stop selling [[disposable barbecue]]s "to help protect open spaces and reduce the risk of fires". Their decision followed calls by London Fire Brigade for retailers to stop selling them.<ref>{{Cite news |date=3 August 2022 |title=M&S stops selling disposable barbecues across UK |work=BBC News |url=https://www.bbc.co.uk/news/business-62414352 |accessdate=3 August 2022}}</ref> Along with [[Aldi]] and [[Waitrose]], who stopped in March over concern about the impact of their use on the environment, [[Sainsbury's]] and [[Tesco]] joined the list of supermarkets to stop selling disposable barbecues on 11 August,<ref>{{Cite news |date=11 August 2022 |title=Sainsbury's and Tesco stop selling disposable barbecues |work=BBC News |url=https://www.bbc.com/news/business-62510098 |access-date=11 August 2022}}</ref> and were followed by [[Morrisons]] and the [[The Co-operative Group|Co-op]] the next day.<ref>{{Cite web |date=12 August 2022 |title=Co-op joins rivals in dropping disposable barbecues |url=https://www.bbc.com/news/business-62510098 |accessdate=12 August 2022 |website=BBC News}}</ref>

      == August heatwave ==
      {{infobox heat event
      | title = August 2022 United Kingdom heatwave
      | areas = United Kingdom
      | image = 
      | caption = 
      | type = heatwave
      | start_date = {{start date|2022|08|9|df=y}}
      | start_date_ref = 
      | end_date = {{end date|2022|08|15|df=y}}
      | end_date_ref = 
      | highest_temp_c = 34.9
      | highest_temp_location = [[Crawley]], [[West Sussex]]
      | highest_temp_date = 13 August
      }}

      Another heatwave began on 9 August. An amber extreme-heat weather warning for most of England and Wales was put in place, as well as a level 3 heat health alert for central and southern England and a level 2 alert for northern England.<ref>{{Cite web |date=9 August 2022 |title=Four-day extreme heat warning in England and Wales |url=https://www.bbc.com/news/uk-62472926 |access-date=9 August 2022 |website=BBC News}}</ref>

      In August, Tom Morgan, a Met Office meteorologist, said that "temperatures will not go as high as they did during July" but will last over "a prolonged period" with "temperatures in the low-30s".<ref>{{cite news |title=UK heatwave this week will last longer than July's but with lower temperatures |url=https://www.theguardian.com/uk-news/2022/aug/08/uk-heatwave-this-week-will-last-longer-than-julys-but-with-lower-temperatures |access-date=8 August 2022 |work=[[The Guardian]] |agency=[[PA Media]] |date=8 August 2022}}</ref> On 8 August the [[UK Health Security Agency]] issued a level 3 heat health alert for central and southern England effective from 9 to 13 August, which was later extended to 14 August.<ref>{{cite web |title=UK weather: Second highest health alert level issued for England as another heatwave to last longer than one last month |url=https://news.sky.com/story/uk-weather-level-3-heat-health-alert-issued-by-uk-health-security-agency-as-new-heatwave-this-week-will-be-longer-than-julys-12668220 |access-date=8 August 2022 |publisher=Sky News}}</ref><ref>{{Cite web |title=UK weather latest updates: Amber warning for extreme heat issued for parts of UK - as another water company to announce hosepipe ban 'in coming weeks' |url=https://news.sky.com/story/weather-latest-updates-amber-heat-health-alert-comes-into-force-today-as-temperatures-could-hit-36c-this-weekend-12668865 |access-date=9 August 2022 |publisher=Sky News}}</ref>

      The highest temperature recorded in the UK on 11 August was {{cvt|34.2|C}} in [[Wiggonholt]], West Sussex. The London Fire Brigade assistant commissioner said that in the first week of August 2021 they attended 42 grassland and wildland fires, whilst in the same week in 2022 they attended 340, an increase of over 700%.<ref>{{cite news |title=UK heatwave: Soaring temperatures prompt wildfire warnings |url=https://www.bbc.com/news/uk-62499044 |publisher=BBC News |date=11 August 2022 |access-date=11 August 2022}}</ref>

      On 13 August, a set of [[safety barrier]]s on the [[A63 road]] at [[South Cave]] buckled in the heat, less than a year after being installed the previous winter.<ref>{{cite web |date=12 September 2024 |title=New Road Barriers Turned Into Spaghetti in Heatwave |url=https://www.itv.com/news/calendar/2022-08-13/new-road-barriers-turned-into-spaghetti-in-heatwave |access-date=15 August 2022 |website=ITV News}}</ref> A station near [[Crawley]] in West Sussex recorded {{cvt|34.9|C}}, the highest temperature of the heatwave.<ref>{{cite web |date=12 September 2024 |title=Daily Maximum Temperatures observed on 13th Aug 2022 |url=http://starlingsroost.ddns.net/weather/ukobs/maxtemp_map.php |access-date=12 September 2024 |website=Starling's Roost (powered by Met Office data}}</ref>

      The highest temperature on 14 August was {{cvt|34.1|C}}, recorded in [[Charlwood]], Surrey.<ref>{{cite news |title=UK heatwave: Final day of 'extreme' heat with thunder on way |url=https://www.bbc.com/news/uk-62539909 |publisher=BBC News |date=14 August 2022 |access-date=14 August 2022}}</ref>

      At least three people drowned.<ref>{{cite news |title=Thunderstorms begin in the UK after heatwave |url=https://www.bbc.com/news/uk-62546063 |publisher=BBC News |date=15 August 2022 |access-date=15 August 2022}}</ref>

      ===Rain===
      Although 14 August was the final day of the extremely hot weather, temperatures remained above the seasonal average into the following day. On 15 August, heavy rain and thunderstorms moved across the UK. The Met Office issued three days of weather alerts for 15, 16 and 17 August, warning of a risk of flash flooding in some areas.<ref>{{cite news |title=Thunderstorms begin in the UK after heatwave |url=https://www.bbc.com/news/uk-62546063 |publisher=BBC News |date=15 August 2022 |access-date=15 August 2022}}</ref> An amber weather warning for thunderstorms was issued for parts of south-west England, covering most of Devon and parts of Cornwall and Somerset.<ref>{{cite web |title=🚨A Met Office AMBER warning for #THUNDERSTORMS has been issued for parts of SW England this afternoon and evening.⛈️#UKWeather |url=https://twitter.com/bbcweather/status/1559185159789969409 |access-date=15 August 2022 |website=Twitter}}</ref>

      Torrential [[2022 United Kingdom floods|rain and thunderstorms brought flash flooding]] to parts of London and South East England on 17 August.<ref>{{Cite news|url=https://www.bbc.com/news/uk-62574134|title=UK weather: Storms and rain bring flash floods to southern England|work=BBC News |date=17 August 2022|accessdate=17 August 2022}}</ref> The heavy rain also resulted in [[raw sewage]] being discharged into the sea in some places after sewers overflowed. A number of pollution warnings were in place for beaches in England and Wales.<ref>{{Cite news|url=https://www.bbc.com/news/science-environment-62574105|title=Sewage hits dozens of beaches in England and Wales after heavy rain|work=BBC News |date=17 August 2022|accessdate=17 August 2022}}</ref>

      === Impact ===
      ==== Retail ====
      There was another increase in ice cream sales, during the August heatwave, with the smaller retailers having challenges meeting the demand.<ref>{{Cite news |last=O'Callaghan |first=Laura |date=11 August 2022 |title=UK's second heatwave sends ice cream sales soaring but comes with health warning |work=N UK |publisher=The National |url=https://www.thenationalnews.com/world/uk-news/2022/08/11/uks-second-heatwave-sends-ice-cream-sales-soaring-but-comes-with-health-warning/ |access-date=16 August 2022}}</ref>

      ==== Gardening ====
      Because of the prolonged hot weather, gardeners reported an increased ability to grow plants that would usually have difficulty flourishing in the UK, such as figs and avocados.<ref>{{cite news |title=Climate change: Avocados and exotic plants grow in hot UK summer |url=https://www.bbc.com/news/science-environment-62665053 |publisher=BBC News |date=28 August 2022}}</ref>

      == Impact on health ==
      {{See also|Effects of climate change on health in the United Kingdom}}
      Increasingly intense and prolonged heat periods can have dire health consequences, especially in cities.<ref name=":12" /><ref>{{Cite journal |last1=Simpson |first1=Charles H. |last2=Brousse |first2=Oscar |last3=Taylor |first3=Tim |last4=Grellier |first4=James |last5=Taylor |first5=Jonathon |last6=Fleming |first6=Lora E. |last7=Davies |first7=Mike |last8=Heaviside |first8=Clare |date=2024-10-01 |title=Modeled temperature, mortality impact and external benefits of cool roofs and rooftop photovoltaics in London |url=https://www.nature.com/articles/s44284-024-00138-1 |journal=Nature Cities |language=en |volume=1 |issue=11 |pages=751–759 |doi=10.1038/s44284-024-00138-1 |issn=2731-9997|doi-access=free }}</ref><ref>{{Cite journal |last1=Heaviside |first1=Clare |last2=Vardoulakis |first2=Sotiris |last3=Cai |first3=Xiao-Ming |date=8 March 2016 |title=Attribution of mortality to the urban heat island during heatwaves in the West Midlands, UK |journal=Environmental Health |language=en |volume=15 |issue=S1 |page=27 |bibcode=2016EnvHe..15S..27H |doi=10.1186/s12940-016-0100-9 |issn=1476-069X |pmc=4895726 |pmid=26961286 |doi-access=free}}</ref> The 2022 heatwaves contributed to nearly 3000 all-cause [[Excess mortality|excess deaths]] – meaning people who are not expected to die during this period.<ref name=":14" /><ref name=":12" /> This represents the highest number of deaths during heatwaves since 2004. Most of the extra deaths occurred in those aged over 65.<ref>{{cite web |date=7 October 2022 |title=Record excess deaths in UK's heatwave summer |url=https://www.bbc.com/news/health-63171417 |access-date=7 October 2022 |publisher=BBC News}}</ref><ref name=":14" /> Heatwave-related excess deaths in the over-65s age group have increased by 146% since 2017.<ref>{{cite web |title=The main causes of UK heatwave deaths |url=https://taking.care/blogs/resources-advice/the-main-causes-of-uk-heatwave-deaths#elderly-risk}}</ref>

      == Drought ==
      {{see also|2022 European drought}}
      [[File:Heatwave in London (9217).jpg|thumb|upright=1.3|[[Greenwich Park]], London, August 2022|alt=A large field of yellow, scorched grass in Greenwich Park, London, surrounded by trees]]
      The Met Office said rainfall between January and June 2022 was the lowest since 1976, giving England its driest start to the year for 46 years.<ref>{{cite web  |title=Heatwave: July 2022 is driest in England since 1911 |url=https://www.independent.co.uk/climate-change/news/heatwave-july-driest-record-england-b2132318.html |website=The Independent |date=27 July 2022 |access-date=27 July 2022}}</ref> It was confirmed that England had experienced its driest July since 1935, with parts of the country having the least rainfall on record. The south east and central southern England had the driest July since records began in 1836, with an average of 5.0mm rainfall.<ref>{{cite news |date=1 August 2022 |title=Driest July in England since 1935 – Met Office |work=BBC News |url=https://www.bbc.com/news/science-environment-62382703 |access-date=10 August 2022}}</ref>

      On 26 July, and with water supplies beginning to run low, the National Drought Group met to discuss a strategy for dealing with the conditions. Although the group stopped short of declaring a drought, it was reported the UK's water companies had started to put the early stages of their drought policies into motion by urging people to conserve water.<ref>{{cite news |date=26 July 2022 |title=UK weather: Driest start to year in England since 1976 |work=BBC News |url=https://www.bbc.com/news/uk-62303330 |access-date=26 July 2022}}</ref> On 29 July, [[Southern Water]] became the first water company to introduce a [[hosepipe ban]]. The measure, affecting Hampshire and the Isle of Wight, was scheduled to come into force from 5 August.<ref>{{cite news |date=29 July 2022 |title=Hampshire and Isle of Wight hosepipe ban from 5 August |work=BBC News |url=https://www.bbc.com/news/uk-england-hampshire-62345286 |access-date=29 July 2022}}</ref> Following a prolonged dry spell in [[South East England]], on 3 August [[South East Water]] announced a temporary hosepipe ban for [[Kent]] and [[Sussex]] from 12 August.<ref>{{cite web |date=3 August 2022 |title=Hosepipe ban confirmed as South East Water says it has 'no choice' |url=https://www.itv.com/news/meridian/2022-08-03/hosepipe-ban-confirmed-for-south-east-water-customers-in-kent-and-sussex |accessdate=3 August 2022 |website=ITV News}}</ref><ref>{{cite news |date=3 August 2022 |title=Kent and Sussex hosepipe ban announced from 12 August |publisher=BBC News |url=https://www.bbc.co.uk/news/uk-england-kent-62404637 |accessdate=3 August 2022}}</ref> On 4 August [[Welsh Water]] announced a hosepipe ban for [[Pembrokeshire]] and parts of [[Carmarthenshire]], which had experienced their driest summer since 1976, commencing on 19 August.<ref>{{cite news |date=4 August 2022 |title=Hosepipe ban in Pembrokeshire after driest year since 1976 |work=BBC News |url=https://www.bbc.com/news/uk-wales-62420025 |access-date=4 August 2022}}</ref> On 7 August, with another heatwave expected to occur in the coming days, [[George Eustace]], the [[Secretary of State for the Environment]], urged water companies to impose further hosepipe bans.<ref>{{cite web |title=Impose more hosepipe bans, environment sec urges ahead of mid-30C temperatures |url=https://www.lbc.co.uk/news/more-hosepipe-bans-uk/ |accessdate=7 August 2022 |website=LBC}}</ref> On 9 August [[Thames Water]] announced plans to introduce a hosepipe ban for its 15 million customers;<ref>{{cite news |date=9 August 2022 |title=Thames Water plans to introduce hosepipe ban 'in weeks' |work=BBC News |url=https://www.bbc.com/news/uk-england-62478141 |accessdate=9 August 2022}}</ref> the ban was subsequently confirmed to begin on 24 August.<ref>{{cite news|url=https://www.bbc.com/news/uk-england-62573640|title=Thames Water hosepipe ban to start on 24 August|publisher=BBC News |date=17 August 2022|access-date=17 August 2022}}</ref> On 12 August, [[Yorkshire Water]] became the fifth water company to announce a hosepipe ban, which came into force on 26 August. It was their first hosepipe ban in 27 years.<ref>{{cite news |date=12 August 2022 |title=Yorkshire Water hosepipe ban to start on 26 August |publisher=BBC News |url=https://www.bbc.com/news/uk-england-62506182 |access-date=12 August 2022}}</ref>

      On 12 August, a [[2022 European drought#United Kingdom|drought was officially declared]] in eight of the 14 [[Environment Agency]] areas: [[Devon]] and [[Cornwall]], [[Solent]] and [[South Downs]], [[Kent]] and [[South London]], [[Herts]] and [[North London]], [[East Anglia]], [[Thames]], [[Lincolnshire]] and [[Northamptonshire]], and the [[East Midlands]].<ref>{{cite news |last=Gatten |first=Emma |date=12 August 2022 |title=Drought declared across half of England |work=The Telegraph |url=https://www.telegraph.co.uk/news/2022/08/12/drought-declared-across-half-england/ |access-date=12 August 2022 |issn=0307-1235}}</ref> John Curtin, executive director of local operations for the Environment Agency, warned lack of water would be an issue for several months, and that the UK would need above average rainfall through the autumn and winter to avoid another drought in 2023.<ref>{{cite news |date=13 August 2022 |title=England drought: Everyone must rethink their water use, experts say |publisher=BBC News |url=https://www.bbc.com/news/uk-62532620 |access-date=13 August 2022}}</ref> A drought was declared in the [[West Midlands (region)|West Midlands]] region on 23 August, with the Environment Agency warning it had been using groundwater resources and reserves from reservoirs in Wales to help maintain the flows of the [[River Severn]], which supplies six million people in the area.<ref>{{cite news |url=https://www.bbc.com/news/uk-england-62650117|title=West Midlands: Drought status declared by Environment Agency |publisher=BBC News |date=23 August 2022 |access-date=23 August 2022}}</ref> On 30 August a drought was declared in south-west England, covering [[Bristol]], [[Somerset]], [[South Gloucestershire]], [[Dorset]] and parts of [[Wiltshire]].<ref>{{cite news|url=https://www.bbc.com/news/uk-england-bristol-62723419|title=Drought declared across South West England|work=BBC News |date=30 August 2022 |access-date=30 August 2022}}</ref>

      On 19 August, the [[Welsh Government]] and [[Natural Resources Wales]] declared a drought in south west Wales, and specifically in north [[Ceredigion]], [[Teifi]], [[Pembrokeshire]], [[Carmarthen]], [[Swansea]], [[Llanelli]], [[Neath Port Talbot]] and [[Bridgend]].<ref>{{cite web|url=https://www.theguardian.com/uk-news/2022/aug/19/drought-declared-parts-of-wales-water-levels-plummet|title=Drought declared in parts of Wales after water levels plummet|date=19 August 2022|website=The Guardian|access-date=22 August 2022}}</ref>

      == Wildfires ==
      {{main|2022 United Kingdom wildfires}}

      == Meteorology ==
      According to Met Office estimates, extreme heat has been made ten times more likely because of [[climate change in the United Kingdom]].<ref>{{cite news |last=Rowlatt |first=Justin |author-link=Justin Rowlatt |title=UK heatwave: Why is it so hot? |publisher=BBC News |url=https://www.bbc.com/news/science-environment-62207466 |date=19 July 2022 |access-date=19 July 2022}}</ref> [[Extreme event attribution]] showed that "without human-caused climate change temperatures of 40°C in the UK would have been extremely unlikely".<ref>{{cite web |date=28 July 2022 |title=Without human-caused climate change temperatures of 40°C in the UK would have been extremely unlikely |url=https://www.worldweatherattribution.org/without-human-caused-climate-change-temperatures-of-40c-in-the-uk-would-have-been-extremely-unlikely/ |access-date=21 August 2022 |website=World Weather Attribution |language=en-GB}}</ref>

      In July, the [[jet stream]]—a strong air current moving west to east—split into two branches, shielding Europe from storms. This makes it more likely that weather patterns persist over a longer period. It is unclear whether these jet stream events happen more under [[climate change]].<ref>{{Cite journal |last=Witze |first=Alexandra |date=2022-08-04 |title=Extreme heatwaves: surprising lessons from the record warmth |url=https://www.nature.com/articles/d41586-022-02114-y |journal=Nature |language=en |volume=608 |issue=7923 |pages=464–465 |doi=10.1038/d41586-022-02114-y|url-access=subscription }}</ref>

      Provisional figures published by the Met Office in September 2022 indicated England had experienced its joint hottest summer during 2022, with an average temperature of 17.1°C during June, July and August. This was comparable with the [[2018 United Kingdom heat wave|summer of 2018]].<ref>{{cite news|url=https://www.bbc.com/news/uk-62758367|title=Heatwave: England has had joint hottest summer on record, Met Office says|date=1 September 2022|access-date=1 September 2022|via=www.bbc.co.uk}}</ref> Overall, 2022 was the UK's warmest year since records began in 1884, with an average annual temperature above {{cvt|10|C}} for the first time.<ref name=":9" />

      Met Office data indicated that temperature records were broken at 56 of the UK's 109 oldest weather stations during the July heatwave.<ref>{{cite web |date=14 October 2022 |title=Climate change: Summer 2022 smashed dozens of UK records |url=https://www.bbc.com/news/science-environment-63244353 |access-date=14 October 2022 |publisher=BBC News}}</ref>

      == Media coverage ==
      Social media [[misinformation]] and [[conspiracy theories]] compared the July heatwave to the [[1976 British Isles heat wave|1976 heatwave]], and claimed that the effect of both were exaggerated. The maximum temperature in 2022 exceeded 1976's peak temperature of {{cvt|35.9|C}}. [[BBC News]] reported that "suggestions that there is nothing unusual about this heatwave appear to have found a willing audience among [[climate change sceptics]]".<ref>{{cite news |title=UK heatwave: How do temperatures compare with 1976? |url=https://www.bbc.com/news/62212604 |publisher=BBC News |date=18 July 2022 |access-date=19 July 2022}}</ref> An image circulated on social media claiming that the colour scale of new-style Met Office forecast maps had been "designed to look like fear and destruction",<ref>{{cite news|url=https://www.independent.co.uk/climate-change/news/met-office-heatwave-weather-viral-b2125893.html|title=Met Office forecaster debunks 'doctored' weather map comparison|work=The Independent|first=Harry|last=Cockburn|date=19 July 2022|access-date=21 July 2022}}</ref> with the meteorologist who had created the map's colour scales saying that although the scale had been altered in 2021 for the benefit of [[colour blind]] viewers, the image being shared had been doctored to exaggerate this.<ref>{{cite web|date=19 July 2022|title=No, Weather Maps Have Not Changed Colour To Make You More Afraid Of The Climate|url=https://www.huffingtonpost.co.uk/entry/have-weather-maps-changed-twitter-theory-heatwave-climate-crisis_uk_62d69888e4b0116f21c06717|access-date=19 July 2022|website=HuffPost UK|first=Kate|last=Nicholson}}</ref>

      On 19 July 2022, [[Extinction Rebellion]] activists smashed windows of [[The News Building (London)|The News Building]] in London in response to coverage of the heatwave by ''[[The Sun (United Kingdom)|The Sun]]'' and ''[[The Times]]''.<ref>{{cite news|last=Woods|first=Ben|date=19 July 2022|title=Extinction Rebellion smash windows at Rupert Murdoch's offices in protest over Sun and Times' climate coverage|work=The Telegraph|url=https://www.telegraph.co.uk/business/2022/07/19/extinction-rebellion-protesters-smash-windows-rupert-murdochs/|access-date=19 July 2022|issn=0307-1235}}</ref>

      Writing for the ''[[Columbia Journalism Review]]'', journalist Jon Allsop criticised right-leaning British publications in particular for downplaying and detracting from the effects on the hottest days before covering them more seriously following the series of wildfires. He analysed American media coverage and determined it to be heavily focused on the United Kingdom despite heatwaves elsewhere in Europe, the United States and the [[Global South]] due to inequity and the image of a "cold and wet Britain". Allsop also found that, while climate change has had more attention in stories on the heatwave, [[Media coverage of climate change|media exploration]] of its role and impact is still limited and lacking.<ref>{{cite web|access-date=21 July 2022|date=20 July 2022|title='Blowtorch Britain' captures global attention|url=https://www.cjr.org/the_media_today/britain_heatwave_media.php|website=Columbia Journalism Review|first=Jon|last=Allsop}}</ref>

