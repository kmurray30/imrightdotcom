      [[File:Cambridge Botanic Garden Weather Station from the West.jpg|thumb|[[Cambridge University Botanic Garden|Cambridge Botanic Garden]] Weather Station where a temperature of {{convert|38.7|C}} was recorded in the [[2019 European heat waves|2019 European heat wave]]]]
      The '''United Kingdom weather records''' show the most [[extreme weather]] ever recorded in the [[United Kingdom]], such as temperature, wind speed, and rainfall records. Reliable temperature records for the whole of the United Kingdom go back to about 1880.<ref>{{cite web
      | url = https://blog.metoffice.gov.uk/2018/06/07/met-office-temperature-records-what-do-we-monitor-and-how-far-do-they-go-back/
      | title = Met Office temperature records – what do we monitor and how far do they go back? 
      | date = 7 June 2018 
      | website = Met Office}}</ref>

