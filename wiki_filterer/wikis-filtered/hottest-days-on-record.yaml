      ==== Other low-temperature records ====
      * '''Coldest summer (month of July in the Northern Hemisphere)''': {{convert|-33|C|F|1}}; [[Summit Camp]], Greenland on 4 July 2017.<ref>{{Cite web |date=6 July 2017 |title=*Impressive cold in Greenland and near record accumulations of snow and ice |url=https://www.vencoreweather.com/blog/2017/7/6/115-pm-impressive-cold-in-greenland-and-near-record-accumulations-of-snow-and-ice |url-status=live |archive-url=https://web.archive.org/web/20170729174759/https://www.vencoreweather.com/blog/2017/7/6/115-pm-impressive-cold-in-greenland-and-near-record-accumulations-of-snow-and-ice |archive-date=29 July 2017 |access-date=29 July 2017 |website=vencore weather}}</ref>
      * '''Lowest temperature in the Northern Hemisphere''': {{convert|-69.6|C|F}}; [[Greenland Ice Sheet]], Greenland on 22 December 1991.<ref name=GreenlandCold/>
      * '''Coldest average monthly temperature in the Northern Hemisphere''': {{convert|-56.7|C|F}}; [[Verkhoyansk]], Russia for the month of January 1892.<ref>{{Cite web |title=Погода и Климат - Климатический монитор: погода в Оймяконе |url= http://www.pogodaiklimat.ru/history/24266.htm |access-date=April 24, 2021 |publisher=Pogodaiklimat.ru}}</ref>
      * '''Coldest temperature in the tropics''': {{convert|-25.2|C|F}}; [[Mazocruz]], Peru on 30 June 1966.<ref name="indeci_doc320_4b"/>

      ===Record extreme temperature differences===
      * '''Greatest 2-minute temperature increase:''' 27&nbsp;°C (49&nbsp;°F), from {{convert|-20|C|F}} to {{convert|7|C|F}}; [[Spearfish, South Dakota]], on 22 January 1943.<ref name="Handy Weather Answer Book">{{Cite book |last=Lyons |first=Walter A |url=https://archive.org/details/handyweatheransw00lyon |title=The Handy Weather Answer Book |publisher=Visible Ink press |year=1997 |isbn=978-0-7876-1034-0 |edition=2nd |location=Detroit, Michigan}}</ref>
      * '''Greatest 24-hour temperature increase:''' +57&nbsp;°C (+102.6&nbsp;°F), from {{convert|-48|C|F}} to {{convert|9|C|F}}; [[Loma, Montana]], on 15 January 1972.<ref>{{Cite web|url=http://ams.confex.com/ams/pdfpapers/54387.pdf|title=A NATIONAL TEMPERATURE RECORD AT LOMA, MONTANA}}</ref>
      * '''Fastest 2 minute temperature drop:''' 15.0&nbsp;°C (27.0&nbsp;°F) at [[Kingsford Smith Airport|Sydney Airport, Australia]], on 23 January 2010, from {{convert|41.0|C|F}} at 3:11PM to  {{convert|26.0|C|F}} at 3:13PM.<ref>https://weatherspark.com/h/d/144544/2010/1/23/Historical-Weather-on-Saturday-January-23-2010-in-Sydney-New-South-Wales-all-time temperature</ref>
      * ''' Largest temperature range in one area''': 105.8&nbsp;°C (190.4&nbsp;°F), from {{convert|-67.8|C|F}} on 15 January 1885, 5,7 February 1892 to {{convert|38.0|C|F}} on 20 June 2020; [[Verkhoyansk]], [[Sakha Republic|Sakha Republic, Russia]]<ref>{{Cite web |title=Установлена в честь 120-летия регистраций абсолютного минимума температуры в Северном полушарии Земли |url=https://turizm-puteshestvuem.ru/wp-content/uploads/2014/12/puteshestvie-na-polyus-xoloda-v-severnom-polusharii-pamyatnaya-tablichka.jpg |format=JPG}}</ref><ref>{{Cite web |title=Погода в Верхоянске. Температура воздуха и осадки. Февраль 1892 г. |url=http://www.pogodaiklimat.ru/monitor.php?id=24266&month=2&year=1892 |access-date=19 April 2020 |website=pogodaiklimat.ru |language=ru}}</ref><ref>{{Cite web |title=Погода в Верхоянске. Температура воздуха и осадки. Июль 1988 г. |url=http://www.pogodaiklimat.ru/monitor.php?id=24266&month=7&year=1988 |access-date=19 April 2020 |website=pogodaiklimat.ru |language=ru}}</ref><ref name="VerkhoyanskRecord">{{Cite news |title=Greatest temperature range on Earth |url=https://www.guinnessworldrecords.com/world-records/greatest-temperature-range-on-earth/ |access-date=19 April 2020 |website=Guinness World Records}}</ref>

      ==Precipitation==
      * '''Least per year (locale)''': {{convert|0.2|mm|in|3}} per year or less, [[Quillagua]], [[Antofagasta Region]], [[Chile]].<ref>{{Cite web |last=Christopher C. Burt |title=Time to Update World's Driest and Wettest Locations? |url=http://www.wunderground.com/blog/weatherhistorian/comment.html?entrynum=131 |url-status=dead |archive-url=https://web.archive.org/web/20130329022116/http://www.wunderground.com/blog/weatherhistorian/comment.html?entrynum=131 |archive-date=29 March 2013 |access-date=10 June 2013 |publisher=Weather Underground}}</ref>

      ===Rain===
      * '''Most in 60 seconds (1 minute)''': {{convert|38|mm|in|abbr=on}}. Barot, [[Sainte-Anne, Guadeloupe|Sainte-Anne]], [[Grande-Terre, Guadeloupe|Grande-Terre]], [[Guadeloupe]], [[France]] 11:03–11:04 am on 26 November 1970.<ref name="burt2013">{{Cite web |last=Christopher C. Burt |date=8 September 2013 |title=World's greatest 1-minute Precipitation Record |url=https://www.wunderground.com/blog/weatherhistorian/worlds-greatest-1minute-precipitation-record.html |url-status=live |archive-url=https://web.archive.org/web/20200616091616/https://www.wunderground.com/blog/weatherhistorian/worlds-greatest-1minute-precipitation-record.html |archive-date=16 June 2020 |access-date=4 May 2021 |publisher=Weather Underground}}</ref>
      * '''Most in 180 seconds (3 minutes)''': {{convert|62|mm|in|abbr=on}}. [[Portobelo, Colón]], Panama, 29 November 1911<ref name="Ch. Péguy 1970">Ch. Péguy (1970)</ref><ref name="Sepúlveda">{{Cite web |last=Sepúlveda |first=Sílvia Maria Ferreira |title=Avaliação da Precipitação Extrema na Ilha da Madeira |url=https://fenix.tecnico.ulisboa.pt/downloadFile/395143271110/tese.pdf |access-date=28 August 2021 |page=19}}</ref>
      * '''Most in 300 seconds (5 minutes)''': {{convert|106|mm|in|abbr=on}}. [[Portobelo, Colón]], Panama, 29 November 1911<ref name="Ch. Péguy 1970" /><ref name="Sepúlveda" />
      * '''Most in 60 minutes (1 hour)''': {{convert|305|mm|in|abbr=on}}. [[Holt, Missouri]], United States, 22 June 1947.<ref name="WMO" />
      * '''Most in 12 hours ({{frac|1|2}}-day)''': {{convert|1144|mm|in|abbr=on}}; [[Cilaos]], [[Réunion]], 8 January 1966, during [[Tropical Cyclone Denise]].<ref name="WMO" />
      * '''Most in 24 hours (1 day)''': {{convert|1825|mm|in|abbr=on}}; [[Cilaos]], [[Réunion]], 7–8 January 1966, during [[Tropical Cyclone Denise]].<ref name="WMO" />
      * '''Most in 48 hours (2 days)''': {{convert|2493|mm|in|abbr=on}}; [[Cherrapunji]], [[Meghalaya]], India, 15–16 June 1995.<ref name="WMO" />
      * '''Most in 72 hours (3 days)''': {{convert|3929|mm|in|abbr=on}}; Commerson, [[Réunion]], 24–26 February 2007, during [[Cyclone Gamede]].<ref name="WMO" />
      * '''Most in 96 hours (4 days)''': {{convert|4869|mm|in|abbr=on}}; Commerson, [[Réunion]], 24–27 February 2007, during [[Cyclone Gamede]].<ref name="WMO" />
      * '''Most in one year''': {{convert|26470|mm|in|abbr=on}}; [[Cherrapunji]], [[Meghalaya]], India, 1860–1861.<ref name="WMO" />
      * '''Most from a single tropical cyclone''': {{convert|6433|mm|in|abbr=on}}; Commerson, [[Réunion]], during [[Cyclone Hyacinthe]] in January 1980.<ref>{{Cite journal |last1=Quetelard |first1=Hubert |last2=Bessemoulin |first2=Pierre |last3=Cerveny |first3=Randall S. |last4=Peterson |first4=Thomas C. |last5=Burton |first5=Andrew |last6=Boodhoo |first6=Yadowsun |date=2009-05-01 |title=Extreme Weather: World-Record Rainfalls During Tropical Cyclone Gamede |journal=Bulletin of the American Meteorological Society |language=EN |volume=90 |issue=5 |pages=603–608 |bibcode=2009BAMS...90..603Q |doi=10.1175/2008BAMS2660.1 |issn=0003-0007 |s2cid=122555985 |doi-access=free}}</ref><ref>{{Cite web |title=Précipitations extrêmes (report) |url=http://www.meteo.fr/temps/domtom/La_Reunion/meteoreunion2/climatologie/records/rec_RR1.html |access-date=2022-12-17 |website=www.meteo.fr}}</ref>
      * '''Highest average annual total (observed over 10 years)''': {{convert|11872|mm|in|abbr=on}} (over 38 years) and {{convert|12701|mm|in|abbr=on}} (1998–2010); [[Mawsynram]], [[Meghalaya]], India or {{convert|13466|mm|in|abbr=on}} (1980–2011); [[López de Micay]], [[Cauca Department|Cauca]], [[Colombia]].<ref name="WMO" /><ref>Christopher Burt, [https://web.archive.org/web/20130329010048/http://www.wunderground.com/blog/weatherhistorian/comment.html?entrynum=135 New Wettest Place on Earth Discovered?], 18 March 2013</ref>
      * '''Most consecutive days with measurable rain''' a day with at least {{convert|0.01|in|mm}} of rainfall: 331 days in [[Oahu]], [[Hawaii]], 1939–1940<ref>{{Cite web |title=Where It Rained for 331 Days in a Row in the U.S. |url=https://weather.com/news/weather/news/rain-331-days-hawaii-record |website=The Weather Channel |date=13 April 2017 }}</ref>

      ===Snow===
      *'''Most in a 24-hour period''': {{convert|90.6|in|cm|order=flip}} of snow on [[Mount Ibuki]], Japan on 14 February 1927.<ref>{{Cite news |last=Fritz |first=Angela |date=11 March 2015 |title=World record? 100 inches of snow may have clobbered Italy in 18 hours, review pending. |url=https://www.washingtonpost.com/news/capital-weather-gang/wp/2015/03/11/100-inches-of-snow-may-have-clobbered-italy-in-18-hours-review-pending/ |archive-url=https://web.archive.org/web/20201231192807/https://www.washingtonpost.com/news/capital-weather-gang/wp/2015/03/11/100-inches-of-snow-may-have-clobbered-italy-in-18-hours-review-pending/ |archive-date=31 December 2020 |access-date=31 December 2020 |newspaper=The Washington Post}}</ref>
      *'''Most in one calendar month''': 9.91&nbsp;meters (390 inches) of snow fell in [[Tamarack, California]], in January 1911, leading to a snow depth in March of 11.46&nbsp;meters (451 inches) (greatest measured in North America).<ref name="season snow record3">{{Citation |last=Burt |first=Christopher |title=Extreme Weather: A Guide and Record Book |page=[https://archive.org/details/extremeweathergu00burt_0/page/77 77] |year=2004 |url=https://archive.org/details/extremeweathergu00burt_0/page/77 |publisher=W.W. Norton & Co. |isbn=978-0-393-32658-1}}</ref><ref>Frank H. Forrester, ''1001 Questions Answered about the Weather'' ({{ISBN|0486242188}}), page 235: "The greatest amount of snowfall for a calendar month occurred at Tamarack, California, in January, 1911–390 inches."</ref>
      *'''Most in one season (1 July – 30 June):''' 29.0&nbsp;meters, (95&nbsp;ft); [[Mount Baker]], [[Washington (U.S. state)|Washington]], United States, 1998 through 1999.<ref name="season snow record3" />
      * '''Most in one-year period''': 31.5 meters (102&nbsp;ft); [[Mount Rainier]], [[Washington (U.S. state)|Washington]], United States, 19 February 1971 to 18 February 1972.<ref name="Handy Weather Answer Book" />
      *'''Deepest snowfall recorded''': 11.82&nbsp;meters (38.8&nbsp;ft) on [[Mount Ibuki]], Japan on 14 February 1927.<ref>{{Cite web |date=10 February 2015 |title=News |url=http://www.weather.com/storms/winter/news/worlds-deepest-snow-photos |url-status=live |archive-url=https://web.archive.org/web/20160126042232/http://www.weather.com/storms/winter/news/worlds-deepest-snow-photos |archive-date=26 January 2016 |access-date=18 January 2016 |website=The Weather Channel}}</ref>
      * '''Lowest latitude that snow has been recorded at sea level in North America''': Snow fell as far south as the city of [[Tampico]], [[Mexico]], in February 1895 during the [[Great Freeze]].<ref>''Extreme Weather: A Guide and Record Book;'' Christopher Burt; 2007</ref><ref>{{Cite web |title=Answers archive: Winter, snow, ice |url=http://usatoday30.usatoday.com/weather/resources/askjack/wasnow.htm |url-status=dead |archive-url=https://web.archive.org/web/20121008003101/http://usatoday30.usatoday.com/weather/resources/askjack/wasnow.htm |archive-date=8 October 2012 |website=USA Today}}</ref>

      ==Wind speeds==
      * '''Fastest ever recorded''': 484[[±]]32&nbsp;km/h (301[[±]]20&nbsp;mph) (3-second gust); calculated by a [[Doppler On Wheels|DOW]] ([[Doppler weather radar|Doppler]] On Wheels) radar unit in the [[1999 Bridge Creek–Moore tornado]] between [[Oklahoma City]] and [[Moore, Oklahoma|Moore]], [[Oklahoma]], USA, 3 May 1999. Recently, the wind speeds were re-examined and adjusted to a maximum official wind speed of 321&nbsp;mph (516.6&nbsp;km/h).<ref name="fastest wind">{{Cite web |last=Center for Severe Weather Research |year=2006 |title=Doppler On Wheels |url=http://cswr.org/dow/DOW.htm |url-status=dead |archive-url=https://web.archive.org/web/20070205124033/http://www.cswr.org/dow/dow.htm |archive-date=5 February 2007 |access-date=18 February 2007}}</ref> A DOW calculation of a subvortex of the [[2013 El Reno tornado]] was estimated in a range of {{cvt|257–336|mph|km/h}} in 2024.<ref>{{cite journal |last1=Lyza |first1=Anthony W. |last2=Flournoy |first2=Matthew D. |last3=Alford |first3=A. Addison |title=Comparison of Tornado Damage Characteristics to Low-Altitude WSR-88D Radar Observations and Implications for Tornado Intensity Estimation |journal=[[Monthly Weather Review]] |date=19 March 2024 |volume=-1 |issue=aop |pages=1689–1710 |doi=10.1175/MWR-D-23-0242.1 |url=https://journals.ametsoc.org/view/journals/mwre/aop/MWR-D-23-0242.1/MWR-D-23-0242.1.xml |access-date=19 March 2024 |publisher=[[National Oceanic and Atmospheric Administration]] and [[University of Oklahoma]] via the [[American Meteorological Society]]|bibcode=2024MWRv..152.1689L }}</ref>
      * '''Fastest non-[[Tornado|tornadic]] winds:''' {{convert|408|km/h|abbr=on}} (3-second gust); recorded by [[anemometer]] in [[Cyclone Olivia|Severe Tropical Cyclone Olivia]] passing over [[Barrow Island (Western Australia)|Barrow Island]], [[Western Australia]], 10 April 1996.<ref name="gustrecordWMO1">{{Cite web |title=World: Maximum Surface Wind Gust (3-Second) |url=https://wmo.asu.edu/content/world-maximum-surface-wind-gust |archive-url=https://web.archive.org/web/20161230225653/https://wmo.asu.edu/content/world-maximum-surface-wind-gust |archive-date=30 December 2016 |access-date=30 December 2016 |publisher=World Meteorological Organization}}</ref><ref name="gustrecordWMO2">{{Cite web |date=5 November 2015 |title=Info note No. 58 – World Record Wind Gust: 408&nbsp;km/h |url=https://public-old.wmo.int/en/media/news/new-world-record-wind-gust |url-status=dead |archive-url=https://web.archive.org/web/20231218171508/https://public-old.wmo.int/en/media/news/new-world-record-wind-gust |archive-date=18 December 2023 |access-date=30 December 2016 |publisher=World Meteorological Organization}}</ref>
      * '''Fastest non-[[Cyclone|cyclonic]] winds:''' 372&nbsp;km/h (231&nbsp;mph) (1-minute average); recorded by anemometer on [[Mount Washington (New Hampshire)|Mount Washington]], [[New Hampshire]], USA, 12 April 1934.<ref name=gustrecordWMO1/><ref name=gustrecordWMO2/>
      * '''Fastest daily average:''' 174&nbsp;km/h (108&nbsp;mph); [[Port Martin]] ([[Adélie Land]]), Antarctica, 24-hour period from 21 March 1951 to 22 March 1951.<ref name="Handy Weather Answer Book" />

      ==Tornadoes==
      {{Main|Tornado records}}
      [[File:Tri-State Tornado.JPG|thumb|250px|The Tri-State Tornado holds many records, including the longest known tornado track, fastest speed for a significant tornado, and the deadliest tornado outside of [[Bangladesh]].]]

      === Deadliest in history ===
      * '''On Earth''': Approximately 1,300 deaths ([[Daulatpur–Saturia tornado]]); [[Manikganj District]], Bangladesh on 26 April 1989.<ref name="tornado project Bangladesh">{{Cite web |title=Tornadoes in Bangladesh |url=http://www.tornadoproject.com/alltorns/bangladesh.htm |url-status=dead |archive-url=https://web.archive.org/web/20120919111413/http://www.tornadoproject.com/alltorns/bangladesh.htm |archive-date=19 September 2012 |access-date=20 August 2010 |publisher=Tornadoproject.com}}</ref>
      * '''In North America:''' 695 deaths ([[Tri-State Tornado]]); [[Missouri]], [[Illinois]], [[Indiana]], United States, 18 March 1925.<ref name="Handy Weather Answer Book" />
      * '''In Europe:''' 600 or more deaths ([[Valletta, Malta Tornado|Grand Harbour Tornado]]); [[Valletta]], Malta, 23 September 1551 or 1556 (sources conflict).<ref name="TORRO records">{{Cite web |title=Research: Tornado Extremes |url=http://www.torro.org.uk/TORRO/research/whirlextreme.php |url-status=dead |archive-url=https://web.archive.org/web/20070814075710/http://www.torro.org.uk/TORRO/research/whirlextreme.php |archive-date=14 August 2007 |access-date=20 August 2010 |publisher=TORRO}}</ref>
      * '''In South America:''' 63 deaths, [[San Justo, Santa Fe|San Justo]], [[Santa Fe, Argentina|Santa Fe]], Argentina, 10 January 1973.<ref name="Uno Santafe">{{Cite web |title=A 39 años del tornado en San Justo, el único F5 en toda Sudamérica y Latinoamérica |url=https://www.unosantafe.com.ar/santafe/A-39-aos-del-tornado-en-San-Justo-el-unico-F5-en-toda-Sudamerica-y-Latinoamerica-20120110-0002.html |url-status=dead |archive-url=https://web.archive.org/web/20190530061022/https://www.unosantafe.com.ar/santafe/A-39-aos-del-tornado-en-San-Justo-el-unico-F5-en-toda-Sudamerica-y-Latinoamerica-20120110-0002.html |archive-date=30 May 2019 |access-date=18 March 2014 |publisher=Uno Santa Fe}}</ref>
      * '''In Australia:''' Three deaths, [[Kin Kin]], [[Queensland]] tornado, 14 August 1971.<ref>{{Cite web |last=National Climate Centre |title=Australian Climate Extremes-Storm |url=http://www.bom.gov.au/lam/climate/levelthree/c20thc/storm1.htm |archive-url=https://webarchive.nla.gov.au/awa/20090317054300/http://pandora.nla.gov.au/pan/96122/20090317-1643/www.bom.gov.au/lam/climate/levelthree/c20thc/storm1.html |archive-date=17 March 2009 |access-date=3 September 2012 |publisher=BOM}}{{cbignore|bot=medic}}</ref>

      ===Outbreaks===
      <!--*'''Deadliest:''' 747 were killed by the [[Tri-State Tornado]] and associated outbreak on 1925-03-18.<ref name="Handy Weather Answer Book" /> This may be surpassed by a Bangladeshi outbreak-->
      * '''Largest''': The [[2011 Super Outbreak]]: 207 confirmed tornadoes occurred in a span of 24 hours on April 27, 2011, with a total of 367 occurring throughout the duration of the outbreak. They affected six US states, and included 11 rated [[Enhanced Fujita scale|EF4]] and 4 rated EF5.<ref>[http://wmo.asu.edu/tornado-largest-tornado-outbreak World: Largest tornado Outbreak] {{webarchive|url=https://web.archive.org/web/20130926235427/http://wmo.asu.edu/tornado-largest-tornado-outbreak |date=26 September 2013 }} at the World Meteorological Organization website</ref>
      * '''Most severe''': The [[1974 Super Outbreak]] produced 7 F5, 23 F4, 34 F3, and 34 F2 tornadoes on April 3–4, 1974. It received a score on expert [[Thomas P. Grazulis]]'s outbreak intensity score of 578, surpassing the 2011 outbreak's score of 378.<ref>{{cite book |last1=Grazulis |first1=Thomas P. |author1-link=Thomas P. Grazulis |title=Significant Tornadoes 1974–2022 |date=2023 |publisher=The Tornado Project |location=[[St. Johnsbury, Vermont]] |isbn=978-1-879362-01-7 |page=637}}</ref>

      ==Tropical cyclones==
      {{Main|List of tropical cyclone records}}

      ===Most intense (by minimum surface air pressure)===
      * '''Most intense ever recorded''': 870&nbsp;hPa (25.69&nbsp;[[Inches of mercury|inHg]]); [[eye (cyclone)|eye]] of [[Typhoon Tip|Super Typhoon Tip]] over the northwest Pacific Ocean, 12 October 1979.<ref name="Handy Weather Answer Book" />
      * '''Most intense in the [[Western Hemisphere]]:''' 872&nbsp;hPa (25.75&nbsp;inHg); eye of [[Hurricane Patricia]] over the eastern Pacific Ocean, 23 October 2015.<ref name="strongest hurricane">{{Cite web |title=Catastrophic Landfall Expected in Mexico Friday; Patricia Becomes Strongest Hurricane Ever Recorded |url=http://www.weather.com/storms/hurricane/news/hurricane-patricia-mexico-coast |url-status=live |archive-url=https://web.archive.org/web/20151023015111/http://www.weather.com//storms/hurricane/news/hurricane-patricia-mexico-coast |archive-date=23 October 2015 |access-date=23 October 2015 |publisher=weather.com}}</ref>
      * '''Most intense ever recorded on land:''' 892&nbsp;hPa (26.35&nbsp;inHg); [[Craig Key]], [[Florida]], United States, eye of the [[Labor Day Hurricane of 1935|Labor Day Hurricane]], 2 September 1935. While other landfalling tropical cyclones potentially had lower pressures, data is vague from areas other than the [[Atlantic basin]], especially before the invention of [[weather satellite]]s.<ref>American Meteorological Society, Journal of Climate, 15 August 2014, [http://www.aoml.noaa.gov/hrd/Landsea/landsea-et-al-jclimate-2014.pdf A Reanalysis of the 1931–43 Atlantic Hurricane Database] {{Webarchive|url=https://web.archive.org/web/20170504085643/http://www.aoml.noaa.gov/hrd/Landsea/landsea-et-al-jclimate-2014.pdf |date=4 May 2017 }}, Landsea et al., pg. 6114</ref>
      * '''Most intense landfall (estimated):''' 884&nbsp;hPa (26.10&nbsp;inHg); [[Rakiraki District, Fiji|Rakiraki District]], [[Viti Levu]], [[Fiji]], during [[Cyclone Winston]], 20 February 2016. Although no official land pressure readings were recorded at the [[landfall]] site, it is estimated that Winston made landfall with the aforementioned pressure.<ref name="SPEArTC">{{Cite web |last=Diamond |first=Howard |date=5 July 2017 |title=Southwest Pacific Enhanced Archive for Tropical Cyclones (SPEArTC) |url=http://apdrc.soest.hawaii.edu/projects/speartc/ |url-status=live |archive-url=https://web.archive.org/web/20170618013001/http://apdrc.soest.hawaii.edu/projects/speartc/ |archive-date=18 June 2017 |access-date=6 July 2017}}</ref> A reading of 880hPa (26inHg) from [[Bathurst Bay]], [[Queensland]], [[Australia]], during [[Cyclone Mahina]], on 4 March 1899 is disputed to have been recorded by Captain William Porter, the same person who recorded the currently established mark of 914hPa (27inHg).<ref>{{Cite web |title=National Museum of Australia - Cyclone Mahina |url=https://www.nma.gov.au/defining-moments/resources/cyclone-mahina |access-date=2025-04-11 |website=www.nma.gov.au |language=en}}</ref> Further evidence to back up this claim comes in the form of an eyewitness estimate for the storm surge at Ninian Bay, 30&nbsp;km from Bathurst Bay, which was said to be approximately 13m. This figure would be consistent with the pressure of 880hPa allegedly recorded by Capt. Porter.<ref>{{Cite web |title=Cyclone - Cyclone Mahina, Cape York, Queensland 1899 {{!}} Australian Disaster Resilience Knowledge Hub |url=https://knowledge.aidr.org.au/resources/cyclone-cyclone-mahina-cape-york-queensland-1899/ |access-date=2025-04-11 |website=knowledge.aidr.org.au}}</ref>

      ===Most precipitation===
      {{Main|List of the wettest tropical cyclones}}
      * '''Most precipitation from a single tropical storm''': {{convert|6433|mm|in|abbr=on}}; Commerson, Réunion, during [[Cyclone Hyacinthe]] in January 1980.

      ==Other severe weather==
      [[File:Hailstone.jpg|thumb|right|A picture of the Aurora, Nebraska hailstone, measured at {{convert|18.75|in|cm|order=flip|abbr=on|sigfig=3}} in [[circumference]]]][[File:GOESLightning130622.webm|thumb|right|Satellite loop of the record-breaking supercell near Chicago producing intense lightning on June 13, 2022]]

      ===Hail===
      {{Main|List of costly or deadly hailstorms}}
      * '''Heaviest officially recorded:''' {{convert|2.25|lb|kg|order=flip|abbr=on}}; [[Gopalganj District (Bangladesh)|Gopalganj District]], Bangladesh, 14 April 1986.<ref name="weather extremes">{{Cite web |title=Appendix I – Weather Extremes |url=http://www.wrh.noaa.gov/sgx/research/Guide/weatherextremes.pdf |url-status=dead |archive-url=https://web.archive.org/web/20080528065516/http://www.wrh.noaa.gov/sgx/research/Guide/weatherextremes.pdf |archive-date=28 May 2008 |access-date=1 June 2010 |publisher=[[National Weather Service]] |location=San Diego, California}}</ref>
      * '''Largest diameter officially measured:''' {{convert|8.0|in|cm|order=flip|abbr=on}} [[diameter]], {{convert|18.625|in|cm|order=flip|abbr=on|sigfig=3}} [[circumference]]; [[Vivian, South Dakota]], USA, 23 July 2010.<ref>{{Cite web |last=NWS |date=30 July 2010 |title=Record Setting Hail Event in Vivian, South Dakota on July&nbsp;23, 2010 |url=http://www.crh.noaa.gov/abr/?n=stormdamagetemplate |url-status=dead |archive-url=https://web.archive.org/web/20100805045751/http://www.crh.noaa.gov/abr/?n=stormdamagetemplate |archive-date=5 August 2010 |access-date=3 August 2010 |publisher=National Weather Service |location=Aberdeen, South Dakota}}</ref>
      * '''Largest circumference officially measured:''' {{convert|18.75|in|cm|order=flip|abbr=on|sigfig=3}} circumference, {{convert|7.0|in|cm|1|order=flip|abbr=on}} diameter; [[Aurora, Nebraska]], USA, 22 June 2003.<ref name="weather extremes" /><ref name="NG Hail">{{Cite web |title=Largest Hailstone in U.S. History Found |url=http://news.nationalgeographic.com/news/2003/08/0804_030804_largesthailstone.html |url-status=dead |archive-url=https://web.archive.org/web/20100420073335/http://news.nationalgeographic.com/news/2003/08/0804_030804_largesthailstone.html |archive-date=20 April 2010 |access-date=20 August 2010 |website=National Geographic}}</ref>

      ===Lightning===
      * '''Longest lightning bolt''': {{convert|829|km|mi|abbr=on}} ± 8&nbsp;km. On 22 October 2017, extended from eastern Texas to near Kansas City, [[United States]].<ref name=":1">{{Cite web |date=2025-07-31 |title=WMO certifies megaflash lightning record in USA |url=https://wmo.int/media/news/wmo-certifies-megaflash-lightning-record-usa?book=21486 |access-date=2025-08-02 |website=World Meteorological Organization|language=en-GB}}</ref>
      * '''Longest duration for a single lightning flash''': 17.1 seconds on 18 June 2020 in [[Uruguay]] and northern [[Argentina]].<ref name=":1" />

      ===Ultraviolet index===
      * '''Highest ultraviolet index measured:''' On 29 December 2003, a [[UV index]] of 43.3 was detected at Chile/Bolivia's [[Licancabur]] volcano, at {{convert|19423|ft}} altitude. A light-skinned individual in such conditions may experience moderate [[sunburn]] in as little as 4 minutes.<ref>{{Cite web |date=8 July 2014 |title=Blazing World Record: Strongest UV Rays Measured in South America |url=http://www.livescience.com/46701-andes-highest-uv-index-measured.html |url-status=live |archive-url=https://web.archive.org/web/20150704214803/http://www.livescience.com/46701-andes-highest-uv-index-measured.html |archive-date=4 July 2015 |access-date=24 May 2015 |publisher=LiveScience.com}}</ref>

      ===Thunderstorm cloud height===

      * '''Tallest non-tropical thunderstorm''' The official confirmed tallest thunderstorm was a [[supercell]] that occurred on [[Tornado outbreak sequence of May 22–26, 2016|May 24, 2016]] near [[Nueva Rosita]], in rural areas of the [[Mexico|Mexican]] state of [[Coahuila]], in the [[Big Bend (Mexico)|Big Bend]] area of the [[Rio Grande]] basin. This storm had a cloud top height of {{cvt|68000|ft|km mi}}. Lightning from this storm was detected as far as {{cvt|50–60|mi|km}} away from the center of the storm.<ref>{{cite web |url=https://weather.com/news/weather/news/thunderstorm-cruising-altitude-commercial-aircraft |title=Supercell Thunderstorm Towers Nearly 70,000 Feet, About Twice the Cruising Altitude of Commercial Planes |first1=Jonathan |last1=Belles |date=24 May 2016 |access-date=7 September 2024 |publisher=[[The Weather Channel]] }}</ref> [[June 2022 Chicago supercell|A supercell thunderstorm]] that struck [[Chicago]], [[Illinois]] and [[Chicago metropolitan area|surrounding areas]] on June 13, 2022, may have surpassed its height, being at least over {{cvt|60000|ft|km mi}} and potentially reaching as high as {{cvt|65000–70000|ft|km mi}} above the ground.<ref>{{cite web |url=https://www.weather.gov/lot/2022jun13 |title=June 13, 2022: Supercell Storm Brings a Swath of Severe Wind Damage and Two Tornadoes to the Chicago Metro |publisher=[[National Weather Service Chicago, Illinois]] }}</ref>

      ==Other categories==
      {{see also|List of atmospheric pressure records in Europe}}
      * '''Highest air pressure ever recorded [above 750 meters (2,461 feet)]''': 1084.8&nbsp;hPa (32.03&nbsp;inHg); [[Tosontsengel, Zavkhan]], [[Mongolia]], 19 December 2001.<ref name="ASU1">{{Cite web |title=World: Highest Sea Level Air Pressure Above 750 meters |url=http://wmo.asu.edu/highest-sea-lvl-air-pressure-above-700m |url-status=dead |archive-url=https://web.archive.org/web/20121013225735/http://wmo.asu.edu/highest-sea-lvl-air-pressure-above-700m |archive-date=13 October 2012 |access-date=7 October 2012 |publisher=Arizona State University}}</ref> This is the equivalent [[sea-level pressure]]; Tosontsengel is located at {{convert|1300|m|ft}} above sea level. 
      :The highest adjusted-to-sea-level barometric pressure ever recorded (below 750 meters) was at Agata, [[Evenkiysky District|Evenkiyskiy]], [[Russia]] ({{coord|66|53|N|93|28|E}}, elevation: 261&nbsp;m (856.3&nbsp;ft)) on 31 December 1968 of 1083.3 hectopascals (hPa) (31.99 inHg).<ref name="ASU2">{{Cite web |title=World: Highest Sea Level Air Pressure Below 750 meters |url=http://wmo.asu.edu/world-highest-sea-level-air-pressure-below-700m |url-status=dead |archive-url=https://web.archive.org/web/20121013225154/http://wmo.asu.edu/world-highest-sea-level-air-pressure-below-700m |archive-date=13 October 2012 |access-date=7 October 2012 |publisher=Arizona State University}}</ref> 
      :The discrimination is due to the problematic assumptions (assuming a standard [[lapse rate]]) associated with reduction of sea level from high elevations.<ref name="ASU1" /><ref name="ASU2" />

