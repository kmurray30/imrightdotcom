      This is a partial list of temperature phenomena that have been labeled as [[heat wave]]s, listed in order of occurrence.

      == Before 20th century ==
      * [[1473 heat and drought in Europe]]
      * [[1540 European drought]] - Extreme [[drought]] and heatwave lasting 11 months in Europe.
      * July 1743 heatwave in China - Beijing reached {{convert|44.4|C}} on July 25, higher than any modern records. 11,400 people reportedly died.<ref>{{cite journal |last1=Zhang |first1=De'er |title=Northern China maximum temperature in the summer of 1743: A historical event of burning summer in a relatively warm climate background |journal=Chinese Science Bulletin |date=2004 |volume=49 |issue=23 |pages=2508–2514 |doi=10.1007/BF03183723 |bibcode=2004ChSBu..49.2508Z |s2cid=97285444 |doi-access=free }}</ref>
      * [[July 1757 heatwave]] – Europe, hottest summer in Europe since 1540 and until 2003.<ref>{{Cite journal |doi = 10.1088/1748-9326/11/11/114021|title = Did European temperatures in 1540 exceed present-day records?|year = 2016|last1 = Orth|first1 = Rene|last2 = Vogel|first2 = Martha M.|last3 = Luterbacher|first3 = Jürg|last4 = Pfister|first4 = Christian|last5 = Seneviratne|first5 = Sonia I.|journal = Environmental Research Letters|volume = 11|issue = 11|article-number = 114021|bibcode = 2016ERL....11k4021O|doi-access = free|hdl = 21.11116/0000-0000-DBEF-D|hdl-access = free}}</ref><ref name="2003one">{{cite news |last=Recer |first=Paul |date=4 March 2004 |url=https://www.washingtonpost.com/wp-dyn/articles/A30538-2004Mar4.html |title=2003 Likely Europe's Hottest in 500 Years |newspaper=[[The Washington Post]] |agency=Associated Press }}</ref><ref name="french1">{{cite news |last=Prigent |first=Serge |url=https://books.google.com/books?id=fM4ytqPGu94C&pg=PA179 |title=Paris en Dates Et en Chiffres |date=20 June 2005 |page=179 |publisher=Editions Jean-paul Gisserot |isbn=978-2-87747-821-2 |language=French }}</ref>
      * [[1808 United Kingdom heat wave]]
      * 1881 North American heat wave<ref>{{cite news |title=Local Weather History: The 1881 Heat & Drought with Massive Great Lakes Fires & Smoke in September |url=https://www.wlfi.com/news/local-weather-history-the-1881-heat-drought-with-massive-great-lakes-fires-smoke-in-september/article_20e724b6-3e09-11ed-b7e8-c3a2d1d9267d.html |url-status=live |archive-date=27 September 2022 |archive-url=https://web.archive.org/web/20220927023843/https://www.wlfi.com/news/local-weather-history-the-1881-heat-drought-with-massive-great-lakes-fires-smoke-in-september/article_20e724b6-3e09-11ed-b7e8-c3a2d1d9267d.html |access-date=25 May 2023 |agency=WFLI}}</ref>
      * [[1896 Eastern North America heat wave]] – killed 1,500 people in August 1896.
      * 1900 – historical heatwave of the center of [[Argentina]] between the first eight days of February 1900 known as "the week of fire" affected the cities of Buenos Aires and Rosario with temperatures of up to {{convert|37|C}} but with a very high index of humidity that elevated the sensation of heat to {{convert|49|C}} severely affecting the health of people and causing at least 478 fatalities.

      == 20th century ==
      * 1901 – [[1901 eastern United States heat wave]] killed 9,500 in the [[Eastern United States]].
      * 1906 – during the [[1906 United Kingdom heat wave]] which began in August and lasted into September broke numerous records. On September 2 temperatures reached {{convert|35.6|C}}, which still holds the September record, however some places beat their local record during September 1911 and September 2016.
      * 1911 – [[1911 Eastern North America heat wave]] killed between 380 and 2,000 people. 
      * 1911 – [[1911 United Kingdom heat wave]] was one of the most severe periods of heat to hit the country with temperatures around {{convert|36|C}}. The heat began in early July and didn't let up until mid-September where even in September temperatures were still up to {{convert|33|C}}. It took 79 years for temperature higher to be recorded in the United Kingdom during [[1990 United Kingdom heat wave]].
      * 1911 – 41,072 deaths were reported during a heat wave in [[France]].
      * 1913 – in July, the hottest heat wave ever struck California. During this heat wave, [[Death Valley]] recorded a record high temperature of {{convert|134|F|C|order=flip}} at [[Furnace Creek, California|Furnace Creek]], which still remains the highest ambient air temperature recorded on Earth.<ref name=WorldHighTemp>{{cite web|title=World Meteorological Organization World Weather / Climate Extremes Archive |url=https://wmo.asu.edu/content/world-meteorological-organization-global-weather-climate-extremes-archive |access-date=14 April 2017 |archive-url=https://web.archive.org/web/20130104143844/http://wmo.asu.edu/world-highest-temperature |archive-date=4 January 2013 }}</ref><ref name=El_Azizia>{{cite journal|last=El Fadli|first=KI|title=World Meteorological Organization Assessment of the Purported World Record 58&nbsp;°C Temperature Extreme at El Azizia, Libya (13 September 1922)|journal=Bulletin of the American Meteorological Society|date=September 2012|doi=10.1175/BAMS-D-12-00093.1|volume=94|issue=2|page=199|display-authors=etal|bibcode=2013BAMS...94..199E|doi-access=free}}</ref>
      * 1921 – Hottest July on record across Eastern Canada and parts of the Northeastern US, part of a very warm year in those places. Parts of the [[United Kingdom]] also saw recording breaking heat, also part of a very warm year. The [[Central England Temperature]] for July was {{Convert|18.5|C|F}}, which was the 8th warmest since records began in 1659, and the warmest since 1852. The year of 1921 was the warmest on record at the time but has since been eclipsed by 15 other years.<ref>{{cite web|title=mean CET ranked coldest to warmest from 1659 to 2022 |url=https://www.metoffice.gov.uk/hadobs/hadcet/mly_cet_mean_sort.txt |work=[[Met Office]] |archive-url=https://web.archive.org/web/20220321072850/https://www.metoffice.gov.uk/hadobs/hadcet/mly_cet_mean_sort.txt |access-date=26 July 2022 |archive-date=21 March 2022 }}</ref>
      * 1923–1924 – during a period of 160 such days from 31 October 1923 to 7 April 1924, the [[Western Australia]]n town of [[Marble Bar, Western Australia|Marble Bar]] reached {{convert|100|F|C|order=flip}}.<ref name="climateextremes">{{cite web|url=http://www.bom.gov.au/lam/climate/levelthree/c20thc/temp1.htm|title=Marble Bar heatwave, 1923–1924|work=Australian Climate Extremes|publisher=[[Bureau of Meteorology]]|access-date=21 September 2008|archive-url=https://webarchive.nla.gov.au/awa/20090317054300/http://pandora.nla.gov.au/pan/96122/20090317-1643/www.bom.gov.au/lam/climate/levelthree/c20thc/temp1.html|archive-date=17 March 2009}}{{cbignore|bot=medic}}</ref>
      * 1930s – Almost every year from 1930 to 1938 featured historic heat waves and droughts somewhere in North America, part of the [[Dust Bowl]] years.
      * 1935 - In the summer months this heatwave was characterized by unusually high temperatures across the [[United Kingdom]].<ref>{{cite web |title=Heat Wave Ushers In 1935 January May Be Sunny Month |url=https://www.britishnewspaperarchive.co.uk/viewer/bl/0000681/19350101/176/0009 |website=[[British Newspaper Archive]] |publisher=[[Daily Herald (United Kingdom)|Daily Herald]] |date=1 January 1935 |url-access=subscription |access-date=29 October 2025}}</ref>
      * 1936 – [[1936 North American heat wave]] during the [[Dust Bowl]], followed one of the coldest winters on record—the [[1936 North American cold wave]]. Massive heat waves across North America were persistent in the 1930s, many mid-Atlantic/Ohio valley states recorded their highest temperatures during July 1934. The longest continuous string of {{convert|100|F|C|order=flip}} or higher temperatures was reached for 101 days in Yuma, Arizona during 1937 and the highest temperatures ever reached in Canada were recorded in two locations in [[Saskatchewan]] in July 1937.
      * 1947 – record breaking temperature of {{convert|37.6|C}} in Paris recorded on June 26, 1947.<ref>{{Cite web |title=Paris may break all-time June record as heat wave bakes Western Europe |url=https://www.upi.com/Top_News/World-News/2022/06/17/france-Paris-heat-wave-france-spain-europe/2821655489911/ |access-date=2022-07-19 |website=UPI |language=en |first=Renee |last=Duff |date=June 17, 2022 }}</ref>
      * 1950s – Prolonged severe drought and heat wave occurred in the early 1950s throughout the central and southern United States. Every year from 1952 to 1955 featured major heat waves across North America. In some areas it was drier than during the Dust Bowl and the heat wave in most areas was within the top five on record. The heat was particularly severe in 1954 with 22 days of temperatures exceeding {{convert|100|F|C|order=flip}} covering significant parts of eleven states. On 14 July, the thermometer reached {{convert|117|F|C|order=flip}} at [[East St. Louis, Illinois]], which remains the record highest temperature for that state.<ref>{{cite journal |last = Westcott |first = Nancy E. |title = The Prolonged 1954 Midwestern U.S. Heat Wave: Impacts and Responses |journal = Wea. Climate Soc. |volume = 3 |issue = 3 |pages = 165–76 |date = July 2011 |doi = 10.1175/WCAS-D-10-05002.1 |doi-access = free }}</ref><ref>{{cite press release |title = Lessons Learned from 1950s' Heat Wave Show Planning Needed for Future Severe Events |publisher = Illinois State Water Survey |date = 18 May 2011 |url = http://www.isws.illinois.edu/hilites/press/110518heat.asp |access-date = 4 November 2011 |archive-url = https://web.archive.org/web/20120415121240/http://www.isws.illinois.edu/hilites/press/110518heat.asp |archive-date = 15 April 2012 }}</ref><ref>{{cite conference |first = Nancy |last = Westcott |title = Impacts of the 1954 Heat Wave |book-title = 18th Conference on Applied Climatology |publisher = American Meteorological Society |date = 19 January 2010 |location = Atlanta, GA |url = http://ams.confex.com/ams/90annual/techprogram/paper_164354.htm }}</ref>
      * October 1952 – Romania was hit by very hot weather. Temperatures reached {{convert|39.0|C|F}} on 2 October, with Bucharest reaching {{convert|35.2|C|F}}. Temperatures on the night of 2–3 October were also just under {{convert|26|C|F}}.
      * 1955 – [[1955 United Kingdom heat wave]] was a period of hot weather that was accompanied by drought. In some places it was the worst drought on record, more severe than 1976 and 1995.
      * 1960 – on 2 January, [[Oodnadatta]], South Australia hit {{convert|50.7|C|F}} degrees, the highest temperature ever recorded in the [[Southern Hemisphere]] and Oceania.
      * 1972 – heat waves of 1972 in New York and Northeastern United States were significant. Almost 900 people died; the heat conditions lasted almost 16 days, aggravated by very high humidity levels.
      * 1976 – [[1976 United Kingdom heat wave]] was one of the hottest in living memory, with temperatures exceeding {{convert|32|C|F}} somewhere in the country for over two consecutive weeks. The heatwave was also accompanied by one of the worst droughts in British history, and reservoirs reached historic low levels during the heat wave that would not be seen again until the heat waves of the 21st century. The maximum recorded temperature of the heat wave, {{convert|35.9|C|F}} at [[Cheltenham]], [[Gloucestershire]] was at the time the third highest reliably recorded temperature in British history, with only the 1911 heat wave achieving higher reliably recorded temperatures.
      * 1980 – estimated 1,000 people died in the [[1980 United States heat wave]] and drought, which impacted the central and eastern United States. Temperatures were highest in the southern plains. From June through September, temperatures remained above {{convert|90|F|C|order=flip}} all but two days in [[Kansas City, Missouri]]. The [[Dallas/Fort Worth]] area experienced 42 consecutive days with high temperatures above {{convert|100|F|C|order=flip}}, with temperatures reaching {{convert|117|F|C|order=flip}} at [[Wichita Falls, Texas]], on 28 June. Economic losses were $20&nbsp;billion (1980 dollars).<ref name="ncdc"/>
      * 1981 – August 1981 heat wave in the Pacific Northwest.
      * 1983 – during the Summer of 1983 temperatures over {{convert|100|F|C|order=flip}} were common across [[Iowa]], [[Missouri]], [[Illinois]], [[Michigan]], [[Wisconsin]], [[Indiana]], [[Ohio]], [[Minnesota]], [[Kansas]], [[Nebraska]], and certain parts of [[Kentucky]]; the summer of 1983 remains one of the hottest summers ever recorded in many of the states affected. The hundred-degree readings were accompanied by [[1983 United States drought|very dry conditions]] associated with drought affecting the [[Corn Belt]] States and [[Upper Midwest]]. The heat also affected the [[Southeastern U.S.]] and the [[Mid-Atlantic states]] as well that same summer. New York Times represented articles about the heat waves of 1983 affecting the [[Midwest|central United States]].<ref>{{cite news|title=St. Louis Bears Brunt of Heat Wave as U.S. Toll Rises|newspaper=[[The New York Times]]|url=https://www.nytimes.com/1983/07/24/us/st-louis-bears-brunt-of-heat-wave-as-us-toll-rises.html |access-date=15 April 2009 | date=24 July 1983}}</ref> This heat wave was associated with the [[I-94 derecho]].
      * 1983 – United Kingdom experienced a heatwave during July 1983. This was the hottest month ever recorded until it was beaten in August 1995.
      [[File:Canicule Europe 2003.jpg|right|thumb|Temperature difference in Europe from the average during the [[2003 European heat wave|European heat wave of 2003]]]]
      * 1987 – prolonged heat wave from 20 to 31 July in [[Greece]], with more than 1,000 deaths in the area of [[Athens]]. The maximum temperature measured was {{convert|41.9|C}} at 23 July at the center of Athens and in the suburb of [[Nea Philadelphia]], {{convert|8|km|mi}} northeast was {{convert|43.6|C}} on 27 July, and were combined with high minima, with the highest being {{convert|30.2|C}} in the center of Athens at 27 July and {{convert|29.9|C}} at 24 July at Nea Philadelfia. The lowest minimum was {{convert|25.6|C}} at the center of Athens. Moreover, humidity was high and wind speeds low, contributing to human discomfort, even during the night.<ref>{{cite journal |title=The extreme heat wave of Athens in July 1987 from the point of view of Human Biometeorology |url=http://www.urbanclimate.net/matzarakis/papers/HEAT1987.PDF |first1=Andreas |last1=Matzarakis |first2=Helmut |last2=Mayer |year=1991 |journal=Atmospheric Environment |volume=25B |number=2 |pages=203–211 |doi=10.1016/0957-1272(91)90055-j |bibcode=1991AtmEB..25..203M }}</ref>
      * 1988 – intense heat spells in combination with the [[drought of 1988]], reminiscent of the dust bowl years caused deadly results across the United States. Official estimates report that 5,000 to 10,000 people died because of constant heat across the United States. Some estimates put total deaths at close to 17,000.<ref name="ncdc">{{cite web |title=Billion Dollar U.S. Weather Disasters |publisher=[[National Climatic Data Center]] |url=http://lwf.ncdc.noaa.gov/oa/reports/billionz.html |archive-url=https://web.archive.org/web/20010915155936/http://lwf.ncdc.noaa.gov/oa/reports/billionz.html |archive-date=15 September 2001 |access-date=14 July 2008 }}</ref>
      * 1990 – cities across the United Kingdom broke their all-time temperature records in the dramatic [[1990 United Kingdom heat wave]]. Temperatures peaked at {{convert|37.1|C}} at Cheltenham, Gloucestershire. This led to one of the hottest Augusts on record going back to 1659. Also in France a several day heat wave is reported (France-Soir, 4 September 1990) with temperatures exceeding 40 degrees Celsius.
      * 1994 - Intense heat wave in [[Poland]] between July and August, with maximum temperature 39,5 degrees of Celsius. This heat caused 1076 additional deaths in 10 largest Polish cities.<ref>{{cite journal | doi=10.1007/s00704-018-2554-x | title=Heat-related mortality during hot summers in Polish cities | year=2019 | last1=Graczyk | first1=Dariusz | last2=Kundzewicz | first2=Zbigniew W. | last3=Choryński | first3=Adam | last4=Førland | first4=Eirik J. | last5=Pińskwar | first5=Iwona | last6=Szwed | first6=Małgorzata | journal=Theoretical and Applied Climatology | volume=136 | issue=3–4 | pages=1259–1273 | bibcode=2019ThApC.136.1259G | s2cid=125414145 | doi-access=free }}</ref>
      * 1995 – During the first week of February 1995, California, including Los Angeles, experienced a record-breaking heat wave, and on February 20, 1995, it was 95&nbsp;°F in Los Angeles during a [[Presidents' Day]] heat wave.
      * 1995 – [[1995 Chicago heat wave]] produced record high dew point levels and heat indices in the [[Chicago area]] and [[Wisconsin]]; temperatures reached as high as {{convert|106|F|C|order=flip}}. The lack of emergency cooling facilities and inadequate response from civic authorities to the senior population, particularly in lower income neighborhoods in Chicago and other Midwestern cities, lead to at least 778 deaths—mostly which were African American Chicagoans. A [[Heat wave of 1995 derecho series|series of damaging derechos]] occurred on the periphery of the hot air dome.
      * 1995 – United Kingdom experienced its 3rd hottest summer since at least 1659. August was the hottest on record since 1659 and also the hottest month ever recorded until July 2006. The summer was also the driest on record since at least 1766. Temperatures peaked at {{convert|35.2|C}} on 1 August at [[Boxworth]], [[Cambridgeshire]], which did not break the all-time record.
      * 1996- During the first week of February 1996, in California, including Los Angeles, experienced a record-breaking heat wave was 90&nbsp;°F on Feb 7, 1996.
      * 1997 – United Kingdom experienced its 3rd major heatwave in 7 years with August 1997 being one of the hottest on record.
      * 1999 – heat wave and drought in the eastern United States during the summer of 1999. Rainfall shortages resulted in worst drought on record for Maryland, Delaware, New Jersey, and Rhode Island. The state of West Virginia was declared a disaster area. {{convert|3.81|e6acre|km2|abbr=unit}} were consumed by fire as of mid-August. Record heat throughout the country resulted in 502 deaths nationwide.<ref>{{cite web |url=http://www.ncdc.noaa.gov/img/climate/research/1999/sum/fsodtsum99_pg.gif |title=June - August 1999 Mean Temperature Departure from Normal |access-date=20 August 2015 |archive-url=https://web.archive.org/web/20160415094805/http://www.ncdc.noaa.gov/img/climate/research/1999/sum/fsodtsum99_pg.gif |website=ncdc.noaa.gov |archive-date=15 April 2016 }}</ref> There were many deaths in urban centers of the Midwest.
      * 2000 – in late Summer 2000, a [[2000 Southern United States heat wave|heat wave]] occurred in the southern United States, breaking many cities' all-time maximum temperature records.

      == 21st century ==
      [[File:Shifting Distribution of Summer Temperature Anomalies2.png|400px|right]]

      === 2001–2009 ===
      * In early August 2001 [[2001 Eastern North America heat wave|an intense heatwave]] hit the eastern seaboard of the United States and neighboring southeastern Canada. For over a week, temperatures climbed above {{convert|35|C}} combined with stifling high humidity. [[Newark, New Jersey]], tied its all-time record high temperature of {{convert|41|C}} with a [[heat index]] of over {{convert|50|C|F}}.<ref>{{cite web |url=http://www.ncdc.noaa.gov/img/climate/research/2001/heatwave/daily_max_anom_aug8_pg.gif |title=Daily Maximum Temperature Departure from Normal |date=August 8, 2001 |access-date=20 August 2015 |archive-url=https://web.archive.org/web/20160415094805/http://www.ncdc.noaa.gov/img/climate/research/2001/heatwave/daily_max_anom_aug8_pg.gif |archive-date=15 April 2016 }}</ref>
      * In April 2002 a summer-like heat wave in spring affected much of the Eastern United States.
      * In July 2002 a heatwave in China killed at least 7 people and resulted in hospitalization of over 3500 people.<ref>{{cite web |title=China heatwave claims seven lives |date=July 17, 2002 |access-date=July 26, 2022 |url=http://edition.cnn.com/2002/WORLD/asiapcf/east/07/17/china.heatwave/index.html |website=[[CNN]]}}</ref>
      * During April 2003 there was a summer-like heatwave that affected the United Kingdom, mainly [[England]] and [[Wales]], where temperature records were broken.
      *The [[2003 European heat wave|European heat wave of 2003]] affected much of western Europe, breaking temperature records. Much of the heat was concentrated in Spain, England and in France, where nearly 15,000 people died.<ref>{{cite news |url=https://news.bbc.co.uk/2/hi/europe/3139694.stm |title=French heat toll almost 15,000 |work=BBC News |date=25 September 2003 }}</ref> In Portugal, the temperatures reached as high as {{convert|47|C|F}} in the south.
      * The [[European heat wave of 2006]] was the second massive heat wave to hit the continent in four years, with temperatures rising to {{convert|36.7|C|F}} in Paris; in Ireland, which has a moderate maritime climate, temperatures of over {{convert|32|C|F}} were reported. Temperatures of {{convert|35|C|F}} were reached in the [[Benelux]] and Germany (in some areas {{convert|38|C|F}}), while Great Britain recorded {{convert|36.5|C|F}}. Many heat records were broken (including the hottest ever July temperature in Great Britain) and many people who experienced the heat waves of 1976 and 2003 drew comparisons with them. The highest average July temperatures were recorded at many locations in Great Britain, Netherlands, Denmark, Sweden and Germany, and in the UK, July 2006 was the hottest month ever recorded and remains so today, even though the all-time temperature records of August 1990 and August 2003 were not reached.
      * The [[2006 North American heat wave]] affected a wide area of the United States and parts of neighboring Canada during July and August 2006. Over 220 deaths were reported. Temperatures in some parts of South Dakota exceeded {{convert|115|F|C|order=flip}}. Also, California experienced temperatures that were extraordinarily high, with records ranging from {{convert|100|to|130|F|C|order=flip}}. On 22 July, the [[Los Angeles County, California|County of Los Angeles]] recorded its highest temperature ever at {{convert|119|F|C|order=flip}}. Humidity levels in California were also unusually high, although low compared with normal gulf coast/eastern seaboard summer humidity they were significant enough to cause widespread discomfort.<ref>{{cite news|last=Pool |first=Bob |title=In Woodland Hills, It's Just Too Darn Hot |newspaper=[[Los Angeles Times]] |date=26 July 2006 |url=https://www.latimes.com/news/local/la-me-hottest26jul26,1,7920748.story |archive-url=https://archive.today/20130103222137/http://www.latimes.com/news/local/la-me-hottest26jul26,1,7920748.story |archive-date=3 January 2013 |access-date=28 July 2006 }}</ref> Additionally, the heat wave was associated a [[Heat wave of 2006 derecho series|series of derechos]] that produced widespread damage.
      * The [[2007 European heat wave|European heat wave of 2007]] affected primarily south-eastern Europe during late June through August. Bulgaria experienced its [[2007 Bulgarian heat wave|hottest year on record]], with previously unrecorded temperatures above {{convert|45|C|F}}. The [[2007 Greek forest fires]] were associated with the heat wave.
      * During the [[2007 Asian heat wave]], the Indian city of [[Datia]] experienced temperatures of {{convert|48|C|F}}.
      * In January 2008, [[Alice Springs]] in Australia's [[Northern Territory]] recorded ten consecutive days of temperatures above {{convert|40|C|F}} with the average temperature for that month being {{convert|39.8|C|F}}. In March 2008, [[Adelaide]], [[South Australia]] experienced maximum temperatures of above {{convert|35|C|F}} for fifteen consecutive days, seven days more than the previous longest stretch of {{convert|35|C|F}} days. The March 2008 heat wave also included eleven consecutive days above {{convert|38|C|F}}.<ref>{{cite web|title=Adelaide, South Australia March 2008 Daily Weather Observations |publisher=[[Bureau of Meteorology]] |date=21 April 2008 |url=http://www.bom.gov.au/climate/dwo/200803/html/IDCJDW5002.200803.shtml |access-date=24 April 2008 |archive-url=https://web.archive.org/web/20080312220314/http://www.bom.gov.au/climate/dwo/200803/html/IDCJDW5002.200803.shtml |archive-date=12 March 2008 }}</ref> The heat wave was especially notable because it occurred in March, an autumn month, in which Adelaide averages only 2.3 days above {{convert|35|C|F}}.<ref>{{cite web |title=Climate statistics for Australian locations |publisher=[[Bureau of Meteorology]] |date=23 April 2008 |url=http://www.bom.gov.au/climate/averages/tables/cw_023090_All.shtml |access-date=24 April 2008 }}</ref>
      * The eastern United States experienced an early summer heat wave from 6–10 June 2008 with record temperatures.<ref>{{cite news |first=Ken |last=Belson |url=https://www.nytimes.com/2008/06/11/nyregion/11heat.html |title=Records Tumble and Sweaty New Yorkers Grumble as Heat Persists |website=The New York Times |date=11 June 2008 |access-date=23 June 2017}}</ref><ref>{{cite web |url=http://nws.met.psu.edu/severe/2008/09Jun2008.pdf |title=The Eastern United States Heat Wave of 6-10 June 2008 -Draft |access-date=20 August 2015 |archive-url=https://web.archive.org/web/20120915133242/http://nws.met.psu.edu/severe/2008/09Jun2008.pdf |archive-date=15 September 2012 }}</ref> There was a heat wave in Southern California beginning late June,<ref>{{cite news |url=https://www.usatoday.com/weather/news/2008-06-19-socal-heat-wave_N.htm |title=Heat wave continues to blister SoCal |work=[[USA Today]] |date=19 June 2008 }}</ref> which contributed to widespread fires. On 6 July, a renewed heat wave was forecast, which was expected to affect the entire state.<ref>{{cite news |url=https://www.upi.com/Top_News/2008/07/06/Heat-wave-coming-to-scorched-California/13351215345710/ |date=July 6, 2008 |access-date=July 26, 2022 |title=Heat wave coming to scorched California |work=[[UPI.com]] }}</ref><ref>{{cite news |url=http://cbs5.com/local/bay.area.heat.2.765444.html |title=Bay Area Braces For 'Scorchers' As Temps Rise |work=cbs5.com |date=7 July 2008 }}</ref>
      * In early 2009, [[Adelaide]], [[South Australia]] was hit by a [[Early 2009 southeastern Australia heat wave|heat wave]] with temperatures exceeding {{convert|40|C}} for six days in a row, while many rural areas experienced temperatures hovering around {{convert|45|C}}. Kyancutta on the Eyre Peninsula endured at least one day at {{convert|48|C}}, with 46 and 47 being common in the hottest parts of the state. [[Melbourne]], in neighbouring [[Victoria (Australia)|Victoria]] recorded 3 consecutive days over {{convert|43|C|F}}, and also recorded its highest ever temperature 8 days later in a secondary heatwave, with temperatures peaking at {{convert|46.4|C|F}}. During this heat wave Victoria suffered from [[Black Saturday bushfires|large bushfires]] which killed 173 people and destroyed more than 2,500 homes. There were also over half a million people without power as the heatwave blew transformers and the power grid was overloaded.
      * In August 2009, [[Argentina]] experienced a period of unusual and exceptionally hot weather during 24–30 August, during the Southern Hemisphere winter, just a month before Spring,<ref>{{cite web|url=http://www.clarin.com/diario/2009/08/31/sociedad/s-01988981.htm |title=La temperatura llegó a 34,4° y batió el récord histórico de agosto |website=Clarin.com |date=31 August 2009 |access-date=23 June 2017}}</ref> when an unusual and unrecorded [[August 2009 Argentine winter heat wave|winter heat wave]] hit the country. A shot of [[heat|tropical heat]] drawn unusually far southward hiked temperatures {{convert|22|C}} above normal in the city of [[Buenos Aires]] and across the northern-centre regions of the country. Several records were broken. Even though normal high temperatures for late August are in the lower {{convert|15|C|F}}, readings topped {{convert|30|C|F}} degrees at midweek, then topped out above {{convert|32|C|F}} degrees during the weekend.<ref>{{cite news |url=http://www.startribune.com/weather/56365577.html |title=Freak winter heat wave in Argentina |work=Star Tribune |date=31 August 2009 |archive-url=https://web.archive.org/web/20140808194339/http://www.startribune.com/weather/56365577.html |access-date=26 July 2022 |archive-date=2014-08-08 }}</ref> Temperatures hit {{convert|33.8|C|F}} on 29 August and finally {{convert|34.6|C|F}} on 30 August in Buenos Aires, making it the hottest day ever recorded in winter breaking the 1996 winter record of {{convert|33.7|C|F}}. In the city of [[Santa Fe, Argentina|Santa Fe]], {{convert|38.3|C|F}} degrees on 30 August were registered, well above the normal highs of around {{convert|15|C}}. As per the [[Servicio Meteorológico Nacional (Argentina)|Meteorological Office of Argentina]], August 2009 has been the warmest month during winter since official measurements began.<ref>{{cite web|url=http://www.smn.gov.ar/?mod=clima&id=80 |title=Servicio Meteorológico Nacional |website=Smn.gov.ar |date=28 January 2013 |access-date=23 June 2017}}</ref>

      === 2010 ===
      * The [[Northern Hemisphere summer heat wave of 2010]] affected many areas across the [[Northern Hemisphere]], especially parts of Northeastern China and European Russia.<ref>{{Cite journal|last1=Zampieri|first1=Matteo|last2=Russo|first2=Simone|last3=di Sabatino|first3=Silvana|last4=Michetti|first4=Melania|last5=Scoccimarro|first5=Enrico|last6=Gualdi|first6=Silvio|date=15 November 2016|title=Global assessment of heat wave magnitudes from 1901 to 2010 and implications for the river discharge of the Alps|journal=Science of the Total Environment|volume=571|pages=1330–1339|doi=10.1016/j.scitotenv.2016.07.008|bibcode=2016ScTEn.571.1330Z|pmid=27418520}}</ref>
      * Starting in May 2010, records were being set. On 26 May, at [[Mohenjo-daro]], [[Sindh]] province in Pakistan a national record high temperature of {{convert|53.5|C|F}} occurred.
      * In June 2010, Eastern Europe experienced very warm conditions. [[Ruse, Bulgaria]] hit {{convert|36.6|C|F}} on the 13th making it the warmest spot in Europe. Other records broken on the 13th include [[Vidin]], [[Bulgaria]] at {{convert|35.8|C|F}}, [[Sandanski]], Bulgaria hitting {{convert|35.5|C|F}}, [[Lovech]] and [[Pazardzhik]], Bulgaria at {{convert|35.1|C|F}} as well as the capital, [[Sofia]], hitting {{convert|33.3|C|F}}. The heat came from the [[Sahara desert]] and was not associated with rain. This helped the situation with high water levels in that part of the continent.<ref>{{cite web |url=http://www.btv.bg/news/bulgaria/story/789347238-Jega_mori_tsyala_Evropa.html |title=Жега мори цяла Европа – bTV Новините |website=Btv.bg |date=24 November 2014 |access-date=23 June 2017 |archive-url=https://web.archive.org/web/20120225064823/http://www.btv.bg/news/bulgaria/story/789347238-Jega_mori_tsyala_Evropa.html |archive-date=25 February 2012 }}</ref> On the 14th, several cities were once again above the {{convert|35|C|F}} mark even though they did not break records. The only cities in Bulgaria breaking records were [[Musala]] peak hitting {{convert|15.2|C|F}} and [[Elhovo]] hitting {{convert|35.6|C|F}}.<ref>{{cite web |url=http://www.btv.bg/news/bulgaria/story/341137570-Toplo_nad_35_gradusa_na_mnogo_mesta_v_stranata.html |title=Топло: над 35 градуса на много места в страната – bTV Новините |website=Btv.bg |date=24 November 2014 |access-date=23 June 2017 |archive-url=https://web.archive.org/web/20110809190741/http://www.btv.bg/news/bulgaria/story/341137570-Toplo_nad_35_gradusa_na_mnogo_mesta_v_stranata.html |archive-date=9 August 2011 }}</ref> On the 15th, Ruse, Bulgaria peaked at {{convert|37.2|C|F}}. Although it was not a record, this was the highest temperature recorded in the country. Five Bulgarian cities broke records that day: [[Ahtopol]] hit {{convert|28.6|C|F}}, [[Dobrich]] was {{convert|33.8|C|F}}, [[Karnobat]] hit {{convert|34|C|F}}, [[Sliven]] hit {{convert|35|C|F}} and [[Elhovo]] recorded {{convert|36.1|C|F}}.<ref>{{cite web |url=http://www.btv.bg/videos/vremeto/video/1932244109-Vremeto__Tsentralna_emisiya__150610.html |title=bTV – Времето – Централна емисия – 15.06.10 |website=Btv.bg |date=15 June 2010 |access-date=17 July 2013 |archive-url=https://web.archive.org/web/20110927150827/http://www.btv.bg/videos/vremeto/video/1932244109-Vremeto__Tsentralna_emisiya__150610.html |archive-date=27 September 2011 }}</ref>
      * From 4 to 9 July 2010, the majority of the American East Coast, from the Carolinas to Maine, was gripped in a severe heat wave. Philadelphia, New York, Baltimore, Washington, Raleigh, and even Boston eclipsed {{convert|100|F|C|order=flip}}. Many records were broken, some of which dated back to the 19th century, including Wilmington, Delaware's temperature of {{convert|103|F|C|order=flip}} on Wednesday, 7 July, which broke the record of {{convert|97|F|C|order=flip}} from 1897. Philadelphia and New York eclipsed {{convert|100|F|C|order=flip}} for the first time since 2001. Frederick, Maryland, and Newark, New Jersey, among others exceeded {{convert|100|F|C|order=flip}} for four days in a row.<ref>{{cite web |url=http://www.accuweather.com/blogs/news/story/33784/highlights-of-the-great-easter.asp |title=Highlights of the Great Eastern Heat Wave |website=Accuweather.com |access-date=17 July 2013 |archive-url=https://web.archive.org/web/20100712063712/http://www.accuweather.com/blogs/news/story/33784/highlights-of-the-great-easter.asp |archive-date=12 July 2010 }}</ref>

      === 2011 ===
      * The [[2011 North American heat wave]] brought record heat to the [[Midwestern United States]], Eastern Canada, and much of the [[East Coast of the United States|Eastern Seaboard]].
      * A record-breaking heat wave hit Southwestern Asia in late July and early August 2011, with temperatures in [[Iraq]] exceeding {{convert|120|F|C|order=flip}},<ref name=Iraqis>{{cite news|last=Schmidt|first=Michael|title=Heat [Wave] And Fasting Add to Woes of Iraqis |url=https://www.nytimes.com/2011/08/03/world/middleeast/03iraq.html |date=3 August 2011|access-date=4 August 2011|newspaper=The New York Times}}</ref> and an "asphalt-melting, earth-parching, brain-scrambling heat of midsummer" in [[Tbilisi, Georgia]].<ref name=Tbilisi>{{cite news|last=Barry|first=Ellen|title=Out of a Swelter Come Apocalyptic Visions |url=https://www.nytimes.com/2011/08/03/world/europe/03plagues.html |date=3 August 2011|access-date=4 August 2011|newspaper=The New York Times}}</ref> The Iraqis were further challenged by pressure to fast during [[Ramadan]], despite heat of {{convert|124|F|C|order=flip}} in [[Baghdad]] and {{convert|126|F|C|order=flip}} in [[Diwaniya]] on 4 August.<ref name=Iraqis /> The extreme heat inspired [[Conspiracy theory|conspiracy theories]] of the government corruption in Iraq and retaliation from the United States government;<ref name=Iraqis /> and, in Georgia, the [[Apocalypse]], mutant [[locust]]s caused by [[Chernobyl]], snakes imported by unseen enemies, and [[sun spot]]s.<ref name=Tbilisi/>
      * Most parts of the United Kingdom experienced an exceptionally late heatwave between September and October 2011. The heat wave resulted in a new record high temperature for October at {{convert|29.9|C|F}} set in [[Gravesend]], [[Kent]].<ref>{{cite news|title=UK weather returns to normal after record-breaking heatwave|url=https://www.theguardian.com/uk/2011/oct/03/uk-weather-normal-record-heatwave?newsfeed=true|newspaper=The Guardian|date=3 October 2011|location=London|first=Sam|last=Jones}}</ref>
      [[File:North American Temperature Anomaly March 2012.png|thumb|Land surface temperatures of 8–15 March 2012. [[Satellite temperature measurements|Land surface temperatures]] are distinct from the air temperatures that meteorological stations typically measure.]]

      === 2012 ===
      *In March 2012, the [[Midwest]] experienced one of the most anomalous and [[March 2012 North American heat wave|largest heat waves of all time]].  
      * In late June 2012, [[Summer 2012 North American heat wave|much of North America began experiencing a heat wave]], as heat spread east from the [[Rocky Mountains]]. During the heat wave, the [[June 2012 North American derecho]] (one within a [[Summer of 2012 derecho series|series]]) caused violent storms that downed trees and power lines, leaving 3 million people in the eastern U. S. without power on 30 June.<ref>{{Cite web|url=http://www.newsday.com/news/nation/east-coast-storms-kill-13-cause-wide-power-outages-1.3815085|archive-url=https://web.archive.org/web/20120720060130/http://www.newsday.com/news/nation/east-coast-storms-kill-13-cause-wide-power-outages-1.3815085|work=[[Newsday]] |title=East Coast storms kill 13, cause wide power outages|archive-date=20 July 2012}}</ref> The heat lasted until mid-August in some parts of the country.

      === 2013 ===
      * The [[Australia (continent)|Australia]]n summer of 2012–2013, known as the [[Angry Summer]] or Extreme Summer, resulted in 123 weather records being broken over a 90-day period, including the hottest day ever recorded for Australia as a whole, the hottest January on record, the hottest summer average on record, and a record seven days in row when the whole continent averaged above {{convert|39|C|F}}.<ref name="alas">{{cite news |first=Jessica |last=Aldred |date=7 March 2013 |url=https://www.theguardian.com/environment/blog/2013/mar/07/australia-angry-summer-climate-change |title=Australia links 'angry summer' to climate change{{snd}}at last |work=[[The Guardian]] |access-date=24 April 2013 }}</ref><ref name="aasc">{{cite news |date=9 March 2013 |url=http://www.stuff.co.nz/world/australia/8402791/Australias-angry-summer-continues |title=Australia's 'angry' summer continues |work=[[Stuff.co.nz]] |publisher=Fairfax Media |access-date=24 April 2013 }}</ref> Single-day temperature record were broken in dozens of towns and cities, as well as single-day rainfall records, and several rivers flooded to new record highs.<ref name="alas"/> From 28 December 2012 through at least 9 January 2013 Australia has faced its most severe heatwave in over 80 years, with a large portion of the nation recording high temperature reading above {{convert|40|to|45|C|F}} or greater in some areas, a couple of spots have also neared {{convert|50|C|F}}. This extreme heat has also resulted in a 'flash' drought across southern and central areas of the country and has sparked several massive [[wildfires]] due to periodic high winds.<ref>{{cite news|title=Australia wildfires rage as temperatures reach 'catastrophic' level|url=https://www.theguardian.com/world/2013/jan/08/australia-wildfires-rage |access-date=July 26, 2022 |newspaper=The Guardian|date=8 January 2013|location=London}}</ref>
      * In late June 2013, an intense heat wave struck the Southwestern United States. Various places in Southern California reached up to {{convert|122|F|C|order=flip}}.<ref name="palmsprings">{{cite news |last=Tata |first=Samantha |url=https://www.nbclosangeles.com/news/local/Southern-California-Heat-Wave-Record-Hot-Temperatures-213729901.html |title=Palm Springs Hits 122 Degrees as SoCal Temperature Records Shatter |work=NBC Los Angeles |date=30 June 2013 |access-date=4 July 2013 }}</ref> On 30 June, [[Death Valley]], California hit {{convert|129.2|F|C|order=flip}} which is the hottest temperature ever recorded on Earth during the month of June. It was five degrees shy of the world record highest temperature measured in Death Valley, which was {{convert|134|F|C|order=flip}}, recorded in July 1913.<ref>{{cite web |url=http://www.wunderground.com/blog/JeffMasters/comment.html?entrynum=2451 |first=Jeff |last=Masters |date=July 2, 2013 |title=Dr. Jeff Masters' WunderBlog: Historic Heat Wave Responsible for Death Valley's {{convert|129|F|C|order=flip}} Gradually Weakening |work=[[Weather Underground (weather service)|Weather Underground]] |access-date=17 July 2013 |archive-url=https://web.archive.org/web/20131105060318/http://www.wunderground.com/blog/JeffMasters/comment.html?entrynum=2451 |archive-date=5 November 2013 }}</ref>
      * Around [[Canada Day]] 2013, the same heatwave that hit the Southwestern United States moved north and hit southern [[British Columbia]], [[Washington (state)|Washington]] and [[Oregon]]. Temperatures in BC hit {{convert|40|C|F}} in [[Lytton, British Columbia|Lytton]] on 1 July 2013, and on 2 July 2013, the city of [[Penticton]] hit {{convert|38|C|F}}, with both [[Summerland, British Columbia|Summerland]] and [[Osoyoos]] hitting the same. The Tri-Cities in Washington were among the hottest, with temperatures around {{convert|110|F|C|order=flip}}.<ref>{{cite web|url=https://www.nbcnews.com/news/us-news/record-toppling-heat-heads-north-its-just-going-get-hotter-flna6c10495760 |first1=Jeff |last1=Black |first2=M. Alex |last2=Johnson |title=Record-toppling heat heads north, and it's 'just going to get hotter'|work=NBC News |date=30 June 2013 |access-date=17 July 2013}}</ref><ref>{{cite news|agency=The Canadian Press |url=https://www.cbc.ca/news/canada/british-columbia/heat-wave-shatters-temperature-records-across-b-c-1.1318743 |title=Heat wave shatters temperature records across B.C. – British Columbia – CBC News |publisher=Canadian Broadcasting Corporation |date=2 July 2013 |access-date=17 July 2013}}</ref><ref>{{cite web |url=http://www.am1150.ca/News/Local/Penticton/Story.aspx?ID=1998163 |first=Adam |last=Graham |date=July 3, 2013 |title=Hot Weather on Tuesday Sets Records in South Okanagan |website=[[CKFR]] |access-date=17 July 2013 |archive-url=https://web.archive.org/web/20131214145419/http://www.am1150.ca/News/Local/Penticton/Story.aspx?ID=1998163 |archive-date=14 December 2013 }}</ref> [[Edmonton]] also reached {{convert|91|F|C|order=flip}}, but humidex values soared to {{convert|111|F|C|order=flip}}, sparking severe thunderstorms and golf ball sized hail that evening.<ref>{{Cite web|last=Canada|first=Environment and Climate Change|date=2011-10-31|title=Hourly Data Report for July 02, 2013 - Climate - Environment and Climate Change Canada|url=https://climate.weather.gc.ca/climate_data/hourly_data_e.html?timeframe=1&hlyRange=1999-06-23%7C2019-05-08&dlyRange=1996-03-01%7C2019-05-08&mlyRange=1996-03-01%7C2007-11-01&StationID=27214&Prov=AB&urlExtension=_e.html&searchType=stnName&optLimit=yearRange&StartYear=1840&EndYear=2019&selRowPerPage=25&Line=3&searchMethod=contains&txtStationName=edmon&Year=2013&Month=7&Day=2#|access-date=2021-08-11|website=climate.weather.gc.ca|language=en}}</ref>
      * In China from July to August 2013, the South continued to experience an unusually severe heat wave with exceptionally high temperatures. In multiple regions of [[Zhejiang]], Chongqing, Shanghai, Hunan, and other areas the temperatures soared to over 40 degrees Celsius and lasted for a long time. [[Xinchang]], Zhejiang endured extreme hot weather of {{convert|44.1|C}}, on 8 August [[Fenghua]], Zhejiang reached a new all-time record high temperature of {{convert|43.5|C}}, [[Changsha]], Hunan in July 2013 achieved a high temperature "Grand Slam", all 31 days in July set a new daily record high temperature of over {{convert|35|C}}. [[Hangzhou]] experienced 14 consecutive days over {{convert|40|C}} while Xujiahui Station of Shanghai shattered 140 years of meteorological records to set a new all-time record high temperature of {{convert|40.8|C}}. Sustained high temperatures caused many people, especially the elderly to get heatstroke or sunstroke, seriously affecting millions of lives. Many areas throughout China endured record high temperatures resulting in multiple continuous meteorological departments issued high-temperature orange or red alerts. 2013 saw a wide range of abnormally hot temperatures not seen for the past 60 years of national meteorological records dating back to 1951.
      * In July 2013, the United Kingdom experienced the [[2013 heatwave in Ireland and the United Kingdom|hottest July]] since 2006.<ref>{{cite web |url=https://blog.metoffice.gov.uk/2013/08/02/july-finishes-in-top-three-sunniest-and-warmest/ |title=July finishes in top three sunniest and warmest |date=2 August 2013 |publisher=[[Met Office]] |access-date=23 June 2017}}</ref> Overall July 2013 was the fourth hottest and fourth sunniest on record.
      * The Argentina heatwave of 2013 was a historical phenomenon that occurred from 11 December 2013 to 2 January 2014 in the north and center of the country, as well as in northern Patagonia. It was the longest heat wave experienced in [[Argentina]] since records began in 1906 affecting many cities throughout the country. For the first time since the creation of the heat alarm system, a red level alert was issued for several days consecutive for both the city of Buenos Aires and the city of Rosario, which are the cities for which the National Meteorological Service conducts heat waves. From 11 December began to register a marked increase in temperatures, especially the maximum in a vast area of the central and northern Patagonian region, affecting southern [[Córdoba Province, Argentina|Córdoba]], southern [[Santa Fe Province|Santa Fe]], southern [[Entre Ríos Province|Entre Ríos]], much of the province of [[Buenos Aires Province|Buenos Aires]], [[La Pampa Province|La Pampa]], east of [[Mendoza Province|Mendoza]], east of [[Neuquén Province|Neuquén]] and [[Río Negro Province|Río Negro]]. From day 19 this anomalous situation began to expand towards the north of Argentina and returned to intensify on the central part, arriving to affect to 18 provinces, yielding the same towards 30 December in the central part and between 1 and 2 January in the extreme north of the country with the passage of a cold front that produced a change of mass of air. The long persistence of this heat wave (22 days), made the event an exceptional one, breaking several brands in regard to more consecutive days with minimum and maximum temperatures above the average in several meteorological stations of the affected zone. The National Meteorological Service communicated, through its daily reports, reports on the development of the heat wave. The strongest point of heat was registered in the city of [[Chamical, province of La Rioja]] with {{convert|45.5|C}} in the city of [[Santiago del Estero]] (provincial capital) was {{convert|45|C}} and in [[Buenos Aires]] (national capital) was {{convert|39|C}}. The extensive heat wave severely affected the health of thousands of people who needed medical assistance during those days, the historic heat wave caused at least 1,877 deaths in different points of the center and north of the country.
      * From 28 December 2013 - 4 January 2014, [[Longreach, Queensland]] suffered through 8 days of temperatures soaring over {{cvt|43.3|C}}having broken numerous records <ref>{{cite news |url=https://theguardian.com/world/2013/dec/31/queensland-swelters-in-heatwave-with-no-relief-in-sight |title=Queensland swelters in heatwave with no relief in sight |newspaper=[[The Guardian]] |date=31 December 2013 |last1=Jabour |first1=Bridie }}</ref>

      === 2015 ===
      *Between [[2015 India heat wave|April and May 2015]], a heat wave occurred in India, killing more than 2,200 people in that country's different geographical regions. Daytime temperatures hovered between {{convert|45|and|47|C}} in parts of two states over the weekend, {{convert|3|–|7|C-change}} above normal. Andhra Pradesh was hardest hit, with 1,636 people dying from the heat since mid-April, a government statement said. A further 561 people have died in neighboring Telangana.<ref name=TheGuardian>{{cite news|url=https://www.theguardian.com/weather/2015/may/31/southern-india-heatwave-death-toll-nears-2200-rain-brings-little-relief |date=31 May 2015 |title=Rain brings little relief to southern India as heatwave death toll nears 2,200 |newspaper=[[The Guardian]] |access-date=23 June 2017 |agency=[[Associated Press]] }}</ref>
      *Starting 20–21 June 2015, a [[2015 Pakistani heat wave|severe heat wave]] has killed more than 2,500 people in [[Karachi]], Pakistan.<ref>{{Cite magazine|url = https://time.com/3929729/pakistan-heatwave-karachi-heat-stroke/|magazine = [[Time (magazine)|Time]] |date=22 June 2015 |first=Rishi |last=Iyengar|access-date = 28 July 2018 |title=A Heat Wave in Pakistan Has Killed Around 140 People }}</ref>
      *Between 28 June – 3 July 2015, in the [[Northwest United States|Northwest]] United States, and southern [[British Columbia]], a heat wave occurred. 
      *Between 30 June – 5 July 2015, a heat wave, brought upon by a [[Spanish plume]], occurred in Western Europe, which pushed hot temperatures from [[Morocco]] to England. Temperatures in England reached {{convert|36.7|C|F}}, beating the previous July record from 2006 but the [[United Kingdom weather records|all-time record]] of {{convert|38.5|C|F}} stayed unbeaten.
      [[File:NWS-NOAA Europe Extreme maximum temperature AUG 02- 08, 2015.png|thumb|right|Maximum temperatures from 2–8 August 2015. Dark red represents temperatures between {{convert|35|and|40|C|F}}.]]
      *From late June to mid-September 2015, {{ill|2015 European heat wave|lt=unusual and prolonged heat waves occurred across Europe|de|Hitzewellen in Europa 2015}}. With temperatures above {{convert|40|C|F}}, new record temperatures have been measured since the start of weather recording in many locations. The [[Maghreb]] Mediterranean coast, south-western, central and south-eastern Europe experienced one of the biggest heat waves of recent decades.<ref>{{cite web |url=https://www.climate.gov/news-features/event-tracker/summer-heat-wave-arrives-europe |archive-url=https://web.archive.org/web/20150715203950/https://www.climate.gov/news-features/event-tracker/summer-heat-wave-arrives-europe |archive-date=15 July 2015 |last=Di Liberto |first=Tom |date=14 July 2015 |title=Summer heat wave arrives in Europe |work=[[NOAA]] }}</ref> 
      *In August 2015, a heat wave affected much of the Middle East causing almost a hundred deaths in Egypt.<ref name="aljazeera17aug">{{cite news|url=http://www.aljazeera.com/news/2015/08/summer-heatwave-engulfs-middle-east-150817092432196.html|title=Summer heatwave engulfs Middle East|access-date=17 August 2015|date=17 August 2015|publisher=Al Jazeera}}</ref> Temperatures reached above {{convert|50|C}} in Iraq and Qatar.<ref name="aljazeera17aug" />

      === 2016 ===
      2016 was the 2nd warmest year on record.<ref>{{Cite web|url=https://www.climatecentral.org/gallery/graphics/the-10-hottest-global-years-on-record|title=Warming Winter Olympics|access-date=22 October 2019|archive-date=25 June 2019|archive-url=https://web.archive.org/web/20190625225719/https://www.climatecentral.org/gallery/graphics/the-10-hottest-global-years-on-record}}</ref>

      *During June 2016, record heat appeared in Arizona, southern Nevada, and southern California. [[Burbank, California]], reached {{convert|111|F|C|order=flip}}, [[Phoenix, Arizona]], reached {{convert|118|F|C|order=flip}}, [[Yuma, Arizona]], reached {{convert|120|F|C|order=flip}} and [[Tucson, Arizona]], reached {{convert|115|F|C|order=flip}}, its warmest temperature in more than 20 years, on 19 June. [[Riverside, California]], reached {{convert|114|F|C|order=flip}}, [[Palm Springs, California]], reached {{convert|122|F|C|order=flip}}, [[Las Vegas|Las Vegas, Nevada]], reached {{convert|115|F|C|order=flip}}, [[Death Valley]] reached {{convert|126|F|C|order=flip}}, [[Needles, California]], tied its all-time record high of {{convert|125|F|C|order=flip}} while [[Blythe, California]], set a new all-time record high of {{convert|124|F|C|order=flip}} on 20 June.<ref>{{cite web|author=Steve Gorman |url=https://www.huffingtonpost.com/entry/record-heat-wildfires-west-us_us_57678bb4e4b015db1bc9be59?section= |title=Record Heat Sparks Warnings, Stokes Wildfires in Western U.S. |website=HuffPost |date=20 June 2016 |access-date=23 June 2017}}</ref><ref>{{cite web |url=https://weather.com/forecast/regional/news/dangerous-record-heat-southwest-plains |title=Record-Breaking Heat Scorches the Southwest; Tucson Sees Hottest Day in 20+ Years (RECAP) |access-date=22 June 2016 |archive-url=https://web.archive.org/web/20160622004100/https://weather.com/forecast/regional/news/dangerous-record-heat-southwest-plains |archive-date=22 June 2016 }}</ref><ref>{{cite web|url=http://www.accuweather.com/en/weather-news/blistering-june-heat-fades-in-southwest-after-records-highs-top-125f-phoenix-vegas-/58322509 |title=Blistering heat to fade in Southwest after highs top 125 F |website=Accuweather.com |access-date=23 June 2017}}</ref>
      *In July 2016, Mitribah, [[Kuwait]] reached {{convert|54|C|F}} and [[Basra]], [[Iraq]] reached {{convert|53.9|C|F}}. These are the highest temperatures ever recorded in the Eastern Hemisphere and on planet Earth outside of Death Valley.<ref>{{cite news|last=Samenow |first=Jason |url=https://www.washingtonpost.com/news/capital-weather-gang/wp/2016/07/22/two-middle-east-locations-hit-129-degrees-hottest-ever-in-eastern-hemisphere-maybe-the-world/ |title=Two Middle East locations hit 129 degrees, hottest ever in Eastern Hemisphere, maybe the world |newspaper=[[The Washington Post]] |date=22 July 2016 |access-date=23 June 2017}}</ref><ref>{{cite web |url=https://weather.com/news/weather/news/extreme-heat-all-time-record-iraq-kuwait-historic |title=All-Time Temperature Records for the Eastern Hemisphere in Kuwait and Iraq |access-date=26 July 2016 |archive-url=https://web.archive.org/web/20160723172749/https://weather.com/news/weather/news/extreme-heat-all-time-record-iraq-kuwait-historic |website=weather.com |archive-date=23 July 2016 }}</ref><ref>{{cite web|author=Andrew Freedman |url=http://mashable.com/2016/07/22/middle-east-heat-record/ |title=Kuwait, Iraq sizzle in 129-degree heat, setting all-time eastern hemisphere record |website=Mashable.com |date=22 July 2016 |access-date=23 June 2017}}</ref><ref>{{cite web |url=https://www.wunderground.com/blog/JeffMasters/eastern-hemispheres-alltime-temperature-record-kuwait-fries-in-54 |title=Eastern Hemisphere's All-Time Temperature Record: Kuwait Fries in 54&nbsp;°C (129.2&nbsp;°F) Heat |work=[[Weather Underground (weather service)|Weather Underground]] |access-date=23 July 2016 |archive-url=https://web.archive.org/web/20160723155602/https://www.wunderground.com/blog/JeffMasters/eastern-hemispheres-alltime-temperature-record-kuwait-fries-in-54 |archive-date=23 July 2016 }}</ref><ref>{{cite web |url=https://www.wunderground.com/blog/weatherhistorian/hottest-reliably-measured-air-temperatures-on-earth |title=Hottest Reliably Measured Air Temperatures on Earth |access-date=3 August 2016 |archive-url=https://web.archive.org/web/20160812030844/https://www.wunderground.com/blog/weatherhistorian/hottest-reliably-measured-air-temperatures-on-earth |archive-date=12 August 2016 |work=[[Weather Underground (weather service)|Weather Underground]] }}</ref>
      *During September 2016, the United Kingdom experienced its hottest September day since 1911 with temperatures as high as {{convert|34.4|C|F}} on the 13th. However, the all-time September record still stands at {{convert|35.6|C|F}} from 1906.<ref>{{cite web |title=Highest September temperature since 1911 as 34.4C recorded |url=https://www.bbc.com/news/uk-37345436 |publisher=[[BBC]] |access-date=9 August 2019 |date=13 September 2016}}</ref><ref name="1906 UK">{{cite web|url=http://www.dandantheweatherman.com/Bereklauw/Septwarm.htm|archive-url=https://web.archive.org/web/20020606100514/http://www.dandantheweatherman.com/Bereklauw/Septwarm.htm|archive-date=6 June 2002|title=Warm spells in September|last=Suri|first=Dan|date=16 February 2001|access-date=15 November 2009}}</ref>
      *[[2016 Indian heat wave|2016 Indian heatwave]] was a record heatwave in April and May of that year. A national record high temperature of {{convert|51.0|C}} was set in the town of [[Phalodi]], in the state of [[Rajasthan]]. Over 160 people died with 330 million affected to some degree. There were also water shortages with drought worsening the impact of the heat wave. In India, the month of May is typically one of the hottest and driest. In 2016, the heat came early, with 111 heat-related casualties reported by 8 April 2016 the heat was coupled with drought which further devastation. Schools were shut down in [[Odisha]] and [[Telangana]] weeks ahead of summer holidays. Hospitals stopped performing surgeries. A ban on daytime (9&nbsp;am - 6&nbsp;pm) cooking was imposed to prevent accidental fires.
      [[File:Australian Heatwave 2017 Satellite Imagery.png|thumb|Peak land surface temperatures from 7–14 February 2017, as mapped by satellite during the 2017 Australian heatwave.]]
      * 2016 Asian heat wave set temperature records in many Asian countries.
      * 2016 Southeast Asian heat wave set temperature records in most S.E. Asian countries.

      === 2017 ===
      *From 25 to 27 January 2017, Chile experienced a period of intense heat, with temperatures peaking on 26 January. The event was concentrated between the Metropolitan Region of Santiago and La Araucanía Region, being more intense in the region of Maule and Biobío Region. The meteorological phenomenon broke the records of maximum temperatures ever recorded in the cities of Santiago, Chillán, Concepción and Quillón, the latter being the highest maximum temperature recorded nationwide since data exists: {{convert|44.9|C|F}}.<ref>{{Cite web|url=https://www.theclinic.cl/2017/01/26/quillon-tuvo-hoy-la-temperatura-mas-alta-la-historia-chile-44-9-grados-la-sombra/ |language=es-cl |archive-url=https://web.archive.org/web/20190921060913/https://www.theclinic.cl/2017/01/26/quillon-tuvo-hoy-la-temperatura-mas-alta-la-historia-chile-44-9-grados-la-sombra/|archive-date=21 September 2019|title=Quillón tuvo hoy la temperatura más alta de la historia de Chile: 44.9 grados a la sombra |work=[[The Clinic (newspaper)|The Clinic]] |trans-title=Quillón had the highest temperature today in the history of Chile: 44.9 degrees in the shade |date=21 September 2019|access-date=21 September 2019}}</ref>
      *In February 2017, Australia experienced an extreme heat wave with temperatures as high as {{convert|47.2|C|F}}<ref>{{cite web |url=https://earthobservatory.nasa.gov/images/89683/heat-wave-breaks-records-in-australia |title=Heat Wave Breaks Records in Australia |date=21 February 2017 |work=[[NASA Earth Observatory]] |access-date=27 June 2019 }}</ref> in [[Taree]], New South Wales and {{convert|47.6|C|F}} in [[Ivanhoe, New South Wales]].<ref>{{cite news |url=https://www.abc.net.au/news/2017-02-11/heatwave-moves-across-australias-eastern-states/8261520 |title=Heatwave: Eastern Australia swelters as hot conditions continue |date=11 February 2017 |work=[[ABC Online]] }}</ref>
      *In April 2017, a [[2017 Pakistan heat wave|severe heat wave]] affected Pakistan, with temperatures peaking at {{convert|51.0|C}}.<ref name="TN">{{cite news|title=Heatwave continues in Larkana|url=http://nation.com.pk/karachi/21-Apr-2017/heatwave-continues-in-larkana|access-date=16 May 2017|work=[[The Nation (Pakistan)]]|agency=[[Associated Press of Pakistan]]|date=21 April 2017}}</ref>
      *In June 2017 again, a heatwave in Iran broke record high temperature. On 28 June 2017, the city of [[Jask]] had a dew point of {{convert|33|C|F|1}} degrees, which is rare. Combined with the high air temperature, the [[heat index]] was {{convert|69|C}}.<ref>{{cite news |last1=Samenow |first1=Jason |title=Iran city hits suffocating heat index of 165 degrees, near world record |url=https://www.washingtonpost.com/news/capital-weather-gang/wp/2015/07/30/iran-city-hits-suffocating-heat-index-of-154-degrees-near-world-record/ |archive-url=https://web.archive.org/web/20190706183544/https://www.washingtonpost.com/news/capital-weather-gang/wp/2015/07/30/iran-city-hits-suffocating-heat-index-of-154-degrees-near-world-record/ |archive-date=6 July 2019 |newspaper=Washington Post |access-date=9 August 2019 |language=en |date=6 July 2019}}</ref> But the highest temperature in [[Ahvaz]] soared to {{convert|54|C|F|1}} degrees and the humidity created a heat index of {{convert|61|C|F}}.<ref>{{cite web |last1=Blumer |first1=Alex |title=Iranian City May Have Notched One of Hottest Temperatures in Earth's History |url=https://weather.com/news/weather/news/hottest-all-time-temperature-earth-iran-ahvaz |website=The Weather Channel |access-date=9 August 2019 |date=30 June 2017}}</ref>
      *Also, on 21 June 2017, the United Kingdom experienced a heat wave where temperatures reached the hottest since 28 June 1976, hitting 34.5˚C at [[London Heathrow Airport]].<ref>{{cite news |title=UK heatwave brings hottest June day for 40 years |url=https://www.theguardian.com/uk-news/2017/jun/21/uk-heatwave-to-set-40-year-temperature-record |access-date=8 August 2018|newspaper=The Guardian |date=21 June 2017 |last1=Siddique |first1=Haroon |last2=Taylor |first2=Matthew }}</ref>
      *June 29, 2017, Greece heat wave - hot air mass from Sahara Desert extended to the Balkans resulting in temperatures of 42˚C to 45˚C for three consecutive days.<ref>{{cite web |title=heat_summer_2017 |url=http://www.hnms.gr/emy/el/pdf/heat_summer_2017.pdf |access-date=16 June 2021 |ref=1}}</ref>
      *In September 2017 a heat wave affected a large portion of the Eastern United States; it is notable for producing unusually hot temperatures the latest in a calendar year in places.<ref>{{cite news|first=Kyle|last=Elliott|title=Late-September heat wave shatters century old records in midwestern, northeastern US|url=https://www.accuweather.com/en/weather-news/late-september-heat-wave-shatters-century-old-records-in-midwest-eastern-us/70002827|work=[[AccuWeather]]|date=27 September 2017|access-date=27 September 2017}}</ref> The heat wave also affected parts of Eastern Canada.<ref>{{cite news|first=Carmel|last=Kilkenny|title=Heat wave breaks records across eastern Canada|url=http://www.rcinet.ca/en/2017/09/25/heat-wave-breaks-records-across-eastern-canada/|work=[[Radio Canada International]]|date=25 September 2017|access-date=27 September 2017}}</ref><ref>{{cite news |url=https://www.ctvnews.ca/toronto/article/temperature-records-fall-as-heat-wave-continues/ |first=Chris |last=Fox |title=Temperature records fall as heat wave continues |work=[[CTV Toronto]] |date=26 September 2017 }}</ref>

      === 2018 ===
      {{further|2018 heat waves}}
      *In May and June 2018, a heat wave affected Pakistan and a significant portion of India. At least 65 people have died due to the heat as of 28 May. Temperatures have reached as high as {{convert|48|C|F}}.<ref>{{Cite news|url=https://edition.cnn.com/2018/05/22/asia/pakistan-heat-wave-wxc-intl/index.html|title=Heatwave kills at least 65 in Pakistan|author1=Sophia Saifi |author2=Jessie Yeung|publisher=CNN|access-date=28 May 2018}}</ref><ref>{{Cite news|url=https://www.geo.tv/latest/197051-karachiites-brace-for-yet-another-heatwave-from-tuesday|title=Karachiites brace for yet another heatwave|access-date=28 May 2018}}</ref> The health dangers to a large part of the population are exacerbated by the then-ongoing [[Ramadan]] fast.<ref>{{Cite news|url=https://dailytimes.com.pk/245532/another-3-day-heatwave-to-hit-karachi-from-tuesday-pmd/|title=Another 3-day heatwave to hit Karachi from Tuesday: PMD – Daily Times|date=28 May 2018|work=Daily Times|access-date=28 May 2018}}</ref>
      *[[2018 British Isles heat wave]]. In April 2018, a heat wave affected the United Kingdom<ref name="standard.co.uk">{{cite web|url=https://www.standard.co.uk/news/uk/uk-weather-forecast-britain-on-court-for-hottest-april-day-in-70-years-as-temperatures-soar-a3818396.html|title=UK's hottest April day in 70 years as temperatures soar to 29.1C|website=London Evening Standard|access-date=29 April 2018|date=19 April 2018}}</ref> and Ireland.<ref>{{cite news|url=https://www.straitstimes.com/world/heat-records-set-as-northern-hemisphere-sizzles|title=Heat records set as Northern Hemisphere sizzles|website=The Straits Times|date=6 July 2018|access-date=6 July 2018}}</ref> A brief cooling interlude in early May, and temperatures rose again to {{convert|25|-|30|C|F}} for the rest of May and into June. In July 2018, many areas of the UK saw temperatures exceed 30 degrees for nine days in a row and fifteen days overall, and other areas still affected by a [[2018 Great Britain and Ireland heat wave|heat wave]]. The hot weather continued into early August before temperatures returned closer to the average during the second half of the month.<ref>{{cite news|url=https://www.nytimes.com/2018/07/05/world/canada/canada-quebec-heat-wave.html |title=Record-Smashing Heat Wave Kills 33 in Quebec |newspaper=The New York Times|access-date=28 July 2018|date=5 July 2018|last1=Bilefsky|first1=Dan}}</ref><ref>{{cite web|url=https://www.cbsnews.com/news/heat-wave-fourth-of-july-weekend-2018-06-29/ |first=Dean |last=Reynolds |date=June 29, 2018 |title=Dangerous heat wave hitting U.S. over Fourth of July weekend |work=CBS News |access-date=28 July 2018}}</ref>
      * [[2018 North American heat wave]]. The heat wave started in Mexico in late May 2018. By June 2018, the Mexican government issued a state of emergency to more than 300 municipalities. In early July 2018, the heat wave in Quebec, Canada caused about 74 deaths. In July, the heat wave in Southern California caused many power outages, where over 34,000 Los Angeles customers serviced by [[LADWP]] had no power for over one week. In southwestern states such as Arizona and Colorado were above {{convert|100|F|C|order=flip}}.
      * [[2018 Japan heat wave]]. In mid-July 2018, the heat wave in Japan arrived after a major flood. It caused over 22,000 hospitalizations and 80 deaths.
      * [[2018 European drought and heat waves]]. Much of Europe experienced above-average temperatures and drought, which resulted in [[2018 Sweden wildfires|wildfires in Sweden]] and [[2018 Attica wildfires|wildfires in Greece]].

      ===2019===
      * Australian heat wave
      ** From 25 December 2018, Australia was faced with constant record-breaking heatwaves with few breaks. December 2018 was recorded as the hottest December on record, while New South Wales had their warmest January since 2011.<ref>{{cite news|url=https://www.theguardian.com/australia-news/2019/jan/17/extreme-heatwave-all-time-temperature-records-fall-across-parts-of-australia|title=Extreme heatwave: all-time temperature records fall across parts of Australia |newspaper=The Guardian|access-date=22 January 2019|date=17 January 2019 |last1=Cox |first1=Lisa }}</ref><ref>{{cite web|url=https://www.9news.com.au/2019/01/21/17/47/records-set-to-tumble-as-extreme-heat-continues-to-sweep-southern-australia|title=Records set to tumble as extreme heat continues to sweep southern Australia|website=9 News|date=21 January 2019 |access-date=22 January 2019}}</ref> [[Adelaide]] recorded its hottest day on record on 24 January, surpassing the previous record from 1939, reaching {{convert|46.6|C|F}} at 3:36&nbsp;pm local time, and many settlements across [[South Australia]] set new records the same day. At least one man, 90 feral horses and 2,000 bats died, while 25,000 homes lost power.<ref>{{cite news|url=https://www.news.com.au/technology/environment/adelaide-in-the-grip-of-potentially-its-hottest-day-on-record/news-story/fe3ee360aa41cd52588ba2e6f349b892|title=Adelaide sweats through hottest day on record|newspaper=News.com.au|access-date=24 January 2019|date=23 January 2019|last1=Smith|first1=Rohan}}</ref><ref>{{cite web|url=https://www.news.com.au/national/south-australia/sas-breaking-news-blog-the-pulse-severe-or-extreme-fire-danger-for-nearly-all-parts-of-south-australia-as-temps-soar/live-coverage/ae7328f6c7ec6422cc1780a583f7edac |first=Gabriel |last=Polychronis |title=Adelaide records hottest day on record, as 25,000 houses lose power|website=News.com.au|access-date=25 January 2019|date=23 January 2019}}</ref><ref>{{cite web|url=https://www.news.com.au/national/south-australia/dead-bats-have-been-dropping-from-adelaide-trees-after-dying-in-recordbreaking-heat/news-story/69e7bd75b9cc236dc058ff14b87b4bcb |first=Caleb |last=Bond |date=January 25, 2019 |title=Dead bats have been dropping from Adelaide trees after dying in record-breaking heat |website=News.com.au |archive-url=https://web.archive.org/web/20190125195627/https://www.news.com.au/national/south-australia/dead-bats-have-been-dropping-from-adelaide-trees-after-dying-in-recordbreaking-heat/news-story/69e7bd75b9cc236dc058ff14b87b4bcb |access-date=25 January 2019 |archive-date=25 January 2019 |url-status=live }}</ref>
      ** [[Melbourne]] was forecast to have its hottest day since the 2009 [[Black Saturday bushfires]] on 25 January with a forecast of {{convert|44|C|F}} (although the CBD's temperature didn't reach the forecasted maximum, Melbourne Airport's temperature reached {{convert|46|C|F}}), while over 200,000 homes across [[Victoria (Australia)|Victoria]] lost power due to [[Load Shedding|load shedding]].<ref>{{cite news |first=Charis |last=Chang |url=https://www.news.com.au/technology/environment/power-stations-fail-as-victorians-brace-for-hottest-day-since-black-saturday/news-story/b404770015b841f39e348b19e5eec3a7|title=Power outage in Melbourne as electricity generators fail and Victorians brace for hottest day since Black Saturday|website=News.com.au|access-date=25 January 2019|date=24 January 2019}}</ref> On 25 January Melbourne had its hottest day of either January or February: {{convert|43|C|F|1}}.<ref>{{cite web |work=[[Accuweather]] |title=Melbourne City Centre temperatures December 30, 2018 – February 2, 2019 |url=https://www.accuweather.com/en/au/melbourne-city-centre/3497808/month/3497808?monyr=1/01/2019 }}</ref>
      ** On 25 January the temperature of The Treasure Coast reached {{convert|113|F|C|1|order=flip}}.<ref>Accuweather Sunshine City West January – February 2015</ref>
      * In late-May 2019, an unusually strong early-season heat wave affected the [[southeastern United States]], breaking all-time May record high temperatures in several cities. Many locations also broke the record for the earliest-in-season {{convert|100|F|C|order=flip}} temperature.<ref>{{cite web|url=https://www.accuweather.com/en/weather-news/heat-wave-tightens-grip-on-southeast-us-as-dozens-of-high-temperature-records-fall/329683 |first=Kristina |last=Pydynowski |date=May 29, 2019 |title=Heat wave tightens grip on Southeast US as dozens of high temperature records fall|website=AccuWeather|access-date=29 May 2019}}</ref>
      *Also in late-May, an early-season heat wave affected parts of Japan. The town of Saroma in [[Hokkaido]] reached {{convert|39.5|C|F}}, the highest May temperature ever recorded anywhere in Japan.<ref>{{cite web|url=https://weather.com/news/news/2019-05-27-japan-heatwave-kills-hospitalizes |first=Ron |last=Brackett |date=May 27, 2019 |title=Japan Heat Wave Kills 5 People, Hospitalizes Nearly 600|website=The Weather Channel|access-date=29 May 2019}}</ref>
      [[File:2019 Indo-Pakistan heat wave by NASA Earth Observatory.png|thumb|right|Air temperatures in India and Pakistan during the 2019 heat wave.]]
      *The [[2019 Indo-Pakistani heat wave]] reached a near record high temperature of {{convert|50.8|C|F}} in [[Churu, Rajasthan|Churu]].<ref>{{Cite web|url=https://www.bbc.com/news/world-asia-india-48495492|title=India reels as summer temperatures touch 50C|date=3 June 2019|website=BBC News|access-date=3 June 2019}}</ref> The Indian and Pakistani media reported dozens of deaths due to the heat wave.<ref>{{Cite web|url=https://www.independent.co.uk/news/world/asia/india-heatwave-death-toll-weather-channel-sunstroke-delhi-a8942056.html|title=India heatwave kills 'dozens' of people as temperatures hit 50C|last=Dalton|first=Jane|date=3 June 2019|website=The Independent|access-date=3 June 2019}}</ref>
      * [[2019 European heat wave]]: Starting from 25 June, very hot air masses from the [[Sahara]] [[desert]] moved over Europe, leading to [[heat advisory|heat advisories]] in several European countries, including France, Germany and the UK. The extent and intensity of the heat wave was unusual for its earliness in the summer season.<ref>{{cite news |url=https://www.bbc.com/news/world-europe-48742241 |work=BBC News |title=France 40C heatwave could break June records|access-date=25 June 2019|date=24 June 2019}}</ref><ref>{{cite news|url=https://www.theguardian.com/world/2019/jun/24/hell-is-coming-week-long-heatwave-begins-across-europe|title=Hell is coming: week-long heatwave begins across Europe|newspaper=[[The Guardian]] |access-date=25 June 2019 |first=Jon |last=Henley |date=24 June 2019}}</ref> In France, numerous cities broke the old all-time national record of {{convert|44.1|C}} set in [[Conqueyrac]] in [[2003 European heat wave|2003]].<ref>{{cite web |title=Record absolu: 45,9&nbsp;°C, c'est la température la plus chaude jamais mesurée en France |url=http://www.meteofrance.fr/actualites/73726667-record-absolu-de-chaleur-battu-45-9-c-dans-le-gard-du-jamais-vu-en-france |website=Météo-France |access-date=26 July 2019 |language=fr |date=1 July 2019}}</ref> The final new record was higher by {{convert|2|C-change}}.<ref>{{cite web |title=C'est officiel: on a atteint les 46&nbsp;°C en France en juin |url=http://www.meteofrance.fr/actualites/74345599-c-est-officiel-on-a-atteint-les-46-c-en-france-en-juin |website=Météo-France |access-date=26 July 2019 |language=fr |date=19 July 2019}}</ref> One month later, a similar event occurred, which also broke high temperature records in cities across several northwestern European countries. All-time national heat records were broken by {{convert|2.1|C-change}} in the [[Netherlands]],<ref name="cnn deelen">{{cite web |last1=Krever |first1=Mick |last2=Dean |first2=Sarah |last3=Said-Moorhouse |first3=Lauren |title=What makes Europe's heat wave so insufferable? No AC |url=https://edition.cnn.com/uk/live-news/heat-wave-europe-thursday-dle-intl#h_c289bf0a04133034cfd04894af992005 |website=CNN |access-date=26 July 2019 |language=en |date=25 July 2019}}</ref><ref>{{cite web |last1=Newmark |first1=Zack |title=74-year-old Dutch heat record shattered: mercury rises to 39.3 |url=https://nltimes.nl/2019/07/24/74-year-old-dutch-heat-record-shattered-mercury-rises-past-391 |website=NL Times |access-date=26 July 2019 |language=en |date=24 July 2019 }}{{Dead link|date=May 2021 |bot=InternetArchiveBot |fix-attempted=yes }}</ref> {{convert|3<!--3.0-->|C-change|4=1}} in [[Belgium]],<ref>{{Cite news|url=https://www.lesoir.be/238462/article/2019-07-25/vague-de-chaleur-402-degres-enregistres-mercredi-angleur-un-nouveau-record-pour |trans-title=Heat wave: 40.2 degrees recorded Wednesday in Angleur, a new record for Belgium |title=Vague de chaleur: 40,2 degrés enregistrés mercredi à Angleur, un nouveau record pour la Belgique|date=25 July 2019|work=[[Le Soir]]|access-date=25 July 2019}}</ref><ref>{{cite web |last1=Steffens |first1=Eric |title=Avec 38,8 degrés, Hechtel-Eksel aura été l'endroit le plus chaud du pays |url=https://www.vrt.be/vrtnws/fr/2018/07/28/avec-38-8-degres-hechtel-eksel-aura-ete-vendredi-lendroit-le-pl/ |website=vrtnws.be |access-date=26 July 2019 |language=fr |date=28 July 2018}}</ref> {{convert|2.9|C-change}} in [[Luxembourg]],<ref>{{Cite news|url=https://luxtimes.lu/luxembourg/37999-luxembourg-scorches-on-hottest-day-ever|title=Luxembourg scorches on hottest day ever|last=Schnuer|first=Cordula|date=26 July 2019|work=[[Luxembourg Times]]|access-date=26 July 2019|archive-date=26 July 2019|archive-url=https://web.archive.org/web/20190726105412/https://luxtimes.lu/luxembourg/37999-luxembourg-scorches-on-hottest-day-ever}}</ref><ref>{{cite web |title=Forte chaleur au Luxembourg – Record de la température maximale pour le mois de juillet |url=https://www.meteolux.lu/fr/actualites/forte-chaleur-au-luxembourg-record-de-la-temperature-maximale-pour-le-mois-de/?lang=fr |website=MeteoLux |access-date=26 July 2019 |language=fr |date=5 July 2015}}</ref> {{convert|2.1|C-change}} in [[Germany]]<ref name="tagesschau">{{cite news|url=https://www.tagesschau.de/inland/hitze-161.html|title=Rekordtemperaturen: So heiß wie nie|language=de|website=[[Tagesschau (Germany)|tagesschau.de]]|date=25 July 2019|access-date=25 July 2019}}</ref><ref>{{Cite news|url=https://www.reuters.com/article/us-europe-weather-germany-record-idUSKCN1UK22I |title=Heatwave sets new German temperature record for second day running |first=Thomas |last=Escritt |date=25 July 2019|work=[[Reuters]]|access-date=25 July 2019}}</ref> and by {{convert|0.2|C-change}} in the [[United Kingdom]].<ref name="met office cambs">{{cite web |work=[[Met Office]] |title=New official highest temperature in UK confirmed |url=https://www.metoffice.gov.uk/about-us/news-and-media/media-centre/weather-and-climate-news/2019/new-official-highest-temperature-in-uk-confirmed |access-date=29 July 2019 |date=29 July 2019 }}</ref> On 27 August, the [[Royal Netherlands Meteorological Institute]] (KNMI) officially confirmed that the Netherlands were experiencing yet another heat wave when a temperature of {{cvt|30|C}} was measured in De {{not a typo|Bilt}} at 12.40. It was the fourth time ever since recordings began in 1901 that the country experienced two national heat waves in a single year.<ref>{{Cite news |url=https://nos.nl/artikel/2299170-tweede-landelijke-hittegolf-is-een-feit-ook-morgen-nog-heet.html |title=Tweede landelijke hittegolf is een feit, ook morgen nog heet |work=NOS |date=27 August 2019 |access-date=27 August 2019 |language=nl}}</ref> The same day, the [[Royal Meteorological Institute]] (KMI/IRM) declared the third heat wave of 2019 in Belgium. Since official temperature readings began, it has happened only once before (in 1947) that three heat waves were detected in a single year.<ref>{{Cite news |url=https://www.nieuwsblad.be/cnt/dmf20190827_04577061 |title=Derde hittegolf van het jaar is een feit: kwik stijgt boven 30 graden |work=[[Het Nieuwsblad]] |date=27 August 2019 |access-date=2 September 2019 |language=nl}}</ref>
      * A prolonged drought and heat wave affected the [[eastern United States]] from September to October 2019. September was one of the warmest and driest on record in many locations. All-time record high temperatures for October are also broken in numerous cities.
      * A heatwave in Australia occurred in December 2019 with a record average temperature across the country of {{convert|40.9|C}} on the 17th.<ref name=BBC2019Au/> This was surpassed on 18 December by an average temperature of {{convert|41.9|C}}.<ref name=BBC2019Au/> The prior record was from 2013 at {{convert|40.3|C}}.<ref name=BBC2019Au>{{cite news |title=Australia all-time temperature record broken again |work=BBC News |url=https://www.bbc.com/news/world-australia-50837025 |access-date=19 December 2019 |date=19 December 2019}}</ref> The heat exacerbated the [[2019–20 Australian bushfire season]].

      ===2020===
      * On January 4, Canberra and Penrith in Australia smashed their all time records, reaching {{convert|44.0|C|F}} and {{convert|48.9|C|F}} respectively. Penrith was the hottest place anywhere on Earth that day. 
      *A late spring heat wave hit Northern New England and Eastern Canada: On May 27, [[Montreal]] broke its all-time May record high, reaching {{convert|36.6|C|F}}, which was also the second-highest temperature ever recorded in the city.<ref>{{Cite web|title=Montreal breaks May temperature record as heatwave grips Canada |date=28 May 2020 |url=https://phys.org/news/2020-05-montreal-temperature-heatwave-canada.html |access-date=2020-06-25|website=Phys.org|language=en-US}}</ref> Nearby Ottawa and Burlington, Vermont reached {{convert|35|C|F}} on the same day.<ref>{{Cite news|title=Montreal sets May record of 98 degrees as parts of Northeast U.S. also simmer in historic heat|url=https://www.washingtonpost.com/weather/2020/05/28/montreal-record-may-heat/ |date=28 May 2020 |first=Matthew |last=Cappucci |access-date=2020-06-25 |newspaper=[[The Washington Post]] |language=en-US}}</ref> In mid-June, a second heat wave hit the same regions. Montreal and Burlington reached {{convert|90|F|C|order=flip}} for 6 consecutive days, one of the longest streaks on record in these locations. In New Brunswick, numerous cities broke all-time June record highs, with the hot spots Bathurst and Miramichi hitting {{convert|37.2|C|F}}.<ref>{{Cite web|title=Records continue to shatter on the East Coast amid extreme heat|url=https://www.theweathernetwork.com/ca/news/article/hottest-temperatures-of-2020-en-route-to-atlantic-canada|access-date=2020-06-25|website=The Weather Network|date=17 June 2020 |language=en-US}}</ref> Caribou, Maine tied its all-time record high of {{convert|96|F|C|order=flip}} on June 19. The heat wave, combined with abnormally dry conditions, led to numerous forest fires in the province of Quebec.<ref>{{Cite web|title=Crews continue to battle Chute-des-Passes wildfire as dozens of forest fires burn across Quebec|url=https://www.cbc.ca/news/canada/montreal/chute-des-passes-fire-update-1.5624343 |first=Spencer |last=Van Dyk |date=June 23, 2020|access-date=2020-06-25|website=CBC News|language=en-US}}</ref> The heat wave continued into July, where Toronto, Ottawa, and Montreal recorded their second hottest July on record.
      *Siberia heat wave: A Russian heat wave smashed an all-time record high in [[Verkhoyansk|one Siberian town]] on June 20, reaching a scorching {{convert|38|C|F}} possibly the hottest temperature on record so far north in the [[Arctic]], continuing an off-the-charts warm year in what is typically one of coldest places on Earth. If that reading is found to be correct, that would break the town's all-time record of {{convert|37.3|C|F}} set on July 25, 1988. Temperature records in Verkhoyansk date to 1885.<ref>{{Cite web|title=It Just Hit 100 Degrees Fahrenheit in Siberia, the Hottest Temperature on Record So Far North in the Arctic|url=https://weather.com/news/climate/news/2020-06-21-siberia-russia-100-degrees-heat-record-arctic|access-date=2020-06-23|website=The Weather Channel|language=en-US}}</ref>
      *United Kingdom heat wave: After a relatively cool July, temperatures skyrocketed to {{convert|37.8|C|F}} on the 31st at [[London Heathrow Airport]], now the fifth hottest temperature on record and the third hottest at the time of recording. After a brief return to average temperatures, Heathrow Airport and [[Kew Gardens]] rose to {{convert|36.4|C|F}} on August 7, at the time the ninth hottest temperature on record, and a temperature of at least {{convert|34.0|C|F}} was recorded somewhere in the UK for six consecutive days. {{convert|36.2|C|F}} was again reached near [[Crawley]], [[West Sussex]] on the 11th. Five "tropical nights", nights that record a minimum temperature of {{convert|20.0|C|F}} or higher, were recorded during the heatwave, these being the 8th, 10th, 11th, 12th and 13th. Torrential downpours and thunderstorms after the heatwave brought flash-flooding to vulnerable regions, and despite the typically dry nature of European heat waves, 2020 was overall the fifth wettest summer on record.<ref>{{Cite web |first1=Alexander |last1=Askew |first2=Ayesha |last2=Tandon |work=carbonbrief.org |title=Met Office: The UK's record-breaking August 2020 heatwave |date=10 September 2020 |url=https://www.carbonbrief.org/met-office-the-uks-august-2020-heatwave}}</ref>
      * Western United States: Period of intense heat throughout the Western and [[Midwest]]ern United States, starting in early mid-August. [[Death Valley]] reached {{convert|129.9|F|C|order=flip}} on August 16, the highest temperature since a reported {{convert|134|F|C|order=flip}} at the same location in July 1913. If this temperature is verified, it will be one of the [[Highest temperature recorded on Earth|highest temperatures recorded on earth]].
      *According to a [[Japan Meteorological Agency]] official confirmed report, a high temperature of {{convert|41.1|C|F}} was recorded in [[Hamamatsu]], [[Shizuoka Prefecture]], Japan, on August 17, which was the highest temperature record since the first operation of local observation on December 1, 1882. In Japan, many places experienced a heatwave from late June to early September, including {{convert|40.5|C|F}} in [[Isesaki]] and [[Kiryū, Gunma|Kiryu]], both in [[Gunma Prefecture]], on August 11; a total of 1,528 people died of heatstroke from heatwave, according to the Japan Health, Welfare and Labour Ministry.{{citation needed|date=September 2023}}

      ===2021===
      {{main|2021 heat waves}}
      * Around mid-February, a jet-stream of Sahara dust brought a [[2021 winter heatwave|winter heatwave in Europe]] with daily temperatures nearly similar to max high during spring. In Berlin, a high temperature of {{convert|20|C}} was reported on Wednesday and the next day it reached {{convert|19|C}}. Paris reported the same high temperature of {{convert|20|C}} while Warsaw and London had it around {{convert|18|C}}. In Asia, a record-high winter temperature was declared in Beijing on February 21 at {{convert|25.6|C|F}}.<ref>{{Cite web|url=https://news.yahoo.com/temperatures-jump-winter-heat-wave-192204618.html |first=Marua |last=Kelly |date=February 26, 2021 |work=Yahoo! News |title=Temperatures jump as winter 'heat wave' envelops parts of Europe}}</ref>
      * On May 20, the May record {{convert|31.9|C|F}} was reported north of the Arctic Circle at 67.6° North, 53° East.<ref>{{Cite web|last=Korosec|first=Marko|date=2021-05-23|title=A record-breaking heatwave with almost +50 °C across the Middle East, the Arabian peninsula, and Caucasus, forecast to head into Iran and Pakistan this week|url=https://www.severe-weather.eu/global-weather/record-breaking-heatwave-russia-middle-east-arabian-peninsula-mk/|access-date=2021-05-25|website=Severe Weather Europe|language=en}}</ref> On June 20, the land surface temperature had widely exceeded {{convert|35|C}} across Siberia.<ref>{{Cite web|title=Land Surface Temperature in the Sakha Republic|url=https://www.copernicus.eu/en/media/image-day-gallery/land-surface-temperature-sakha-republic|access-date=2021-06-25|website=copernicus.eu}}</ref> The [[2021 Russia heatwave]] and drought caused the [[2021 Siberia wildfires]].<ref>{{Cite web|last=Watts|first=Jonathan|date=2021-07-20|title='Airpocalypse' hits Siberian city as heatwave sparks forest fires|url=http://www.theguardian.com/environment/2021/jul/20/airpocalypse-hits-siberian-city-as-heatwave-sparks-forest-fires|access-date=2021-07-22|website=The Guardian|language=en}}</ref>
      * From June 3 to 6 the northern [[Great Plains]] and southern [[Canadian Prairies]] experienced a heat wave. On June 4, [[Gretna, Manitoba]], reached a temperature of {{convert|41.3|C|F}}, the highest recorded temperature in Manitoba since the 1980s and the earliest in the year occurrence of above {{convert|40|C|F}} temperatures in Canada.<ref>{{Cite web|url= https://www.gov.mb.ca/agriculture/weather/pubs/crop-weather-report-2021-06-06.pdf|title=Manitoba Crop Weather Report|work=Manitoba Agriculture, Government of Manitoba|language=en|access-date=8 June 2021}}</ref>
      * In mid-June, record temperatures were recorded in multiple parts of the [[Southwestern United States]], reaching a maximum of {{convert|128|F|C|order=flip}} at Death Valley, CA on June 17.
      * In late June, the [[2021 Western North America heat wave]] occurred, causing temperatures to soar above {{convert|38|C|F}} in the [[Pacific Northwest]]. All-time record high temperatures were recorded in cities such as [[Portland, Oregon|Portland]] {{convert|116|F|C|order=flip}} and [[Seattle]] {{convert|108|F|C|order=flip}}. [[Lytton, British Columbia]], reached {{convert|49.6|C|F}}, surpassing the day prior {{convert|47.9|C|F}}, which had exceeded the all-time high temperature ever recorded in [[Canada]].<ref>{{cite web|last=Duff|first=Renee|url=https://www.accuweather.com/en/weather-forecasts/blistering-heat-wave-demolishes-all-time-records-in-northwestern-us-canada/969616|title=Blistering heat wave demolishes all-time records in northwestern US, Canada|publisher=[[AccuWeather]]|date=2021-06-28|access-date=2021-06-28}}</ref>
      * In June 18 to July 18 in [[Kouvola]] Finland, the [[List of extreme temperatures in Finland|Finnish heat wave record]] broke: already 31 consecutive heat days came full.
      * in the last week of July, a [[heat wave]] in Turkey, Greece, Italy and other countries in the region has begun.<ref>{{Cite web|last=Tatoi|first=AP|date=2021-08-03|title=Wildfires reach outskirts of Athens during scorching heatwave|url=http://www.theguardian.com/world/2021/aug/03/wildfires-reach-outskirts-of-athens-during-scorching-heatwave|access-date=2021-08-06|website=The Guardian|language=en}}</ref><ref>{{Cite web|agency=Associated Press|date=2021-08-06|title=Wildfires burn out of control in Greece and Turkey as thousands flee|url=http://www.theguardian.com/world/2021/aug/06/wildfires-out-of-control-greece-turkey-thousands-flee|access-date=2021-08-06|website=The Guardian|language=en}}</ref> On August 11, {{convert|48.8|C}}, the highest temperature ever in Europe, was recorded in [[Floridia]], [[Sicily]].<ref>{{Cite web|date=2021-08-11|title=Record heat in Sicily, 48.8 degrees in Floridia: it is the highest temperature ever in Europe|url=https://www.italy24news.com/News/154077.html|archive-url=https://web.archive.org/web/20210811195413/https://www.italy24news.com/News/154077.html|url-status=usurped|archive-date=11 August 2021|access-date=2021-08-11|website=Italy24 News English|language=en-us}}</ref>
      * In July, a heat wave combined with drought, low natural gas production, and COVID-19 delays to cause widespread power outages across the Middle East, with protests in Iraq, Iran, and Lebanon.<ref>{{cite news |url=https://www.npr.org/2021/07/26/1020866501/record-breaking-heat-has-led-to-widespread-power-outages-in-the-middle-east |work=[[NPR]] |access-date=July 26, 2022 |first1=Ailsa |last1=Chang |author-link=Ailsa Chang |first2=Patrick |last2=Jarenwattananon |first3=Ayen |last3=Bior |title=Record-Breaking Heat Has Led To Widespread Power Outages In The Middle East |date=July 26, 2021 }}</ref>

      === 2022 ===
      {{Main|2022 heat waves}}

      * During mid-January 2022, several countries of South America, including Argentina, certain parts of Brazil, Paraguay, and Uruguay, experienced a record-breaking heat wave, with temperatures over {{Convert|44|C|F}} and with Argentina being the most affected country.<ref>{{Cite news |work=Reuters |date=2022-01-14 |first1=Juan |last1=Bustamante |first2=Miguel |last2=Lo Bianco |title=Argentine towns sizzle amid 'hottest days in history' |url=https://www.reuters.com/world/americas/argentine-towns-sizzle-amid-hottest-days-history-2022-01-14/ |access-date=2022-07-26 |language=en}}</ref>
      *During the second week of February 2022, multiple cities in California, including San Francisco, Sacramento, Los Angeles, and San Diego experienced a record-breaking heat wave with temperatures over {{convert|75|F|C|order=flip}} and with Palm Springs being the most affected city.
      *Starting in late March 2022, [[2022 Indian heat wave|India began experiencing one of the hottest March–April periods on record]].<ref>{{Cite web |last=Forister |first=Peter |date=2022-04-26 |title=Heatwave in India breaks records, still worsening |url=https://earthsky.org/earth/heatwave-in-india-breaks-records/ |access-date=2022-04-28 |website=earthsky.org |language=en-US}}</ref>
      *A major heat wave affected the United States throughout May. Three residents in a senior building died on May 14 in Chicago due to the intense heat, because the AC wouldn't turn on. On May 19 in Memphis, as temperatures soared to near record highs of {{convert|91|F|C|order=flip}}, a toddler died after being left in a car. On May 21, intense heat surged into the Mid-Atlantic, causing a near record hot [[Preakness Stakes]], with Baltimore and Philadelphia hitting {{convert|95|F|C|order=flip}}, and temperatures of {{convert|92|F|C|order=flip}} in Washington DC, and {{convert|90|F|C|order=flip}} in New York City.{{citation needed|date=May 2022}}
      *During mid-June 2022, a record-breaking heat wave affected half of the United States. Record-high temperatures were set from California to Texas on June 13. On June 14, dangerous heat spread to the Midwest, South, and the Plains. On June 15, St. Louis reached a record-tying temperature of {{convert|101|F|C|order=flip}}.
      *In late June 2022, [[2022 Japan heatwave|Japan saw the worst heatwave in 150 years]].<ref>{{Cite news |date=2022-06-29 |title=Japan swelters in worst heatwave ever recorded |language=en-GB |work=[[BBC News]] |url=https://www.bbc.com/news/world-asia-61976937 |access-date=2022-06-29}}</ref>
      *The [[2022 European heat waves]] affected much of Western Europe and the United Kingdom. Temperatures in Spain reached {{convert|45.7|C}}.<ref>{{Cite news |last=Martinez |first=Guillermo |date=2022-07-17 |title='Climate change affects everyone': Europe battles wildfires in intense heat |language=en |work=Reuters |url=https://www.reuters.com/business/environment/spain-portugal-battle-wildfires-heatwaves-scorch-southern-europe-2022-07-17/ |access-date=2022-07-18}}</ref> The highest temperature recorded was {{convert|47.0|C}} in [[Alijó|Pinhão]], Portugal, on 14 July.<ref>{{Cite web |last=TPN/Lusa |title=Portugal hits 47&nbsp;°C |url=https://www.theportugalnews.com/news/2022-07-15/portugal-hits-47c/68702 |date=15 July 2022 |access-date=2022-07-21 |website=theportugalnews.com |language=en}}</ref> The United Kingdom saw the first red extreme heat warning to ever be issued in the country, causing it to be declared a national emergency on 15 July.<ref>{{Cite news |last1=Faulkner |first1=Doug |last2=Adams |first2=Charley |date=2022-07-16 |title=Heatwave: National emergency declared after UK's first red extreme heat warning |language=en-GB |work=BBC News |url=https://www.bbc.com/news/uk-62177458 |access-date=2022-07-18}}</ref> A report from the Met Office suggests that temperatures may have reached {{convert|40.3|C}} at [[Coningsby]] on 19 July, which is the first time the United Kingdom has exceeded {{convert|40|C}}.<ref>{{Cite press release |title=Record breaking temperatures for the UK |url=https://www.metoffice.gov.uk/about-us/press-office/news/weather-and-climate/2022/red-extreme-heat-warning-ud |access-date=2022-07-19 |website=Met Office |language=en}}</ref>{{update after|2022|07}} [[Ireland]] also recorded its hottest day since 1887 with temperatures exceeding 33.1&nbsp;°C (92&nbsp;°F) in [[Dublin]].<ref>{{Cite web |last=McGlynn |first=Michelle |date=2022-07-18 |title=Mercury rises to 33.1C marking the highest temperature in more than a century |url=https://www.irishexaminer.com/news/munster/arid-40920596.html |access-date=2024-08-08 |website=Irish Examiner |language=en}}</ref> Unconfirmed temperatures of over 35&nbsp;°C (95&nbsp;°F) were also recorded in other parts of the country.
      *China has suffered [[2022 China heat wave|several heat waves]] in 2022.<ref>{{Cite web |last=Yu |first=Verna |date=2022-09-07 |title=China reports 'most severe' heatwave and third driest summer on record |url=https://www.theguardian.com/world/2022/sep/07/china-reports-most-severe-heatwave-and-lowest-rainfall-on-record |access-date=2022-09-08 |website=The Guardian |language=en}}</ref>

      === 2023 ===
