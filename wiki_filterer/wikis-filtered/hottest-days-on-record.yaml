      ====Humidity====
      * '''Highest dew point temperature''': A [[dew point]] of {{convert|35|°C|F}} — while the temperature was {{convert|42|°C|F}} — was observed at [[Dhahran]], Saudi Arabia, at 3:00&nbsp;p.m. on 8 July 2003.<ref name="dhahran 35 dewpoint">{{Cite news |title=Iranian city soars to record 129 degrees: Near hottest on Earth in modern measurements |url=https://www.washingtonpost.com/news/capital-weather-gang/wp/2017/06/29/iran-city-soars-to-record-of-129-degrees-near-hottest-ever-reliably-measured-on-earth/ |url-status=live |archive-url=https://web.archive.org/web/20170702063507/https://www.washingtonpost.com/news/capital-weather-gang/wp/2017/06/29/iran-city-soars-to-record-of-129-degrees-near-hottest-ever-reliably-measured-on-earth/ |archive-date=2 July 2017 |access-date=3 July 2017 |newspaper=Washington Post}}</ref> (The relative humidity was 69%).
      * '''Highest heat index''': In the observation above at Dhahran, Saudi Arabia, the heat index ("feels like" temperature) was {{convert|81.1|°C|F}}.<ref name="dhahran 35 dewpoint" />
      * '''Highest temperature with 100% relative humidity''': A temperature of {{convert|34|°C|F}} with 100% relative humidity in [[Jask]], [[Iran]], on 21 July 2012.<ref>{{Cite web |date=4 August 2015 |title=Iran city hits suffocating heat index of 165 degrees, near world record |url=https://www.kleanindustries.com/s/environmental_market_industry_news.asp?ReportID=718276 |access-date=25 August 2020 |website=Klean Industries}}</ref>

