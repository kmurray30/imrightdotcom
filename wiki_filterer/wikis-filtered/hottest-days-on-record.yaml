  - title: Climate of Phoenix
    pageid: 74501448
    extract: |-
      Phoenix has a hot desert climate (Köppen: BWh), typical of the Sonoran Desert, and is the largest city in America in this climatic zone. Phoenix has long, extremely hot summers and short, mild winters. The city is within one of the world's sunniest regions, with its sunshine duration comparable to the Sahara region. With 3,872 hours of bright sunshine annually, Phoenix receives the most sunshine of any major city on Earth. Average high temperatures in summer are the hottest of any major city in the United States. On average, there are 111 days annually with a high of at least 100 °F (38 °C), including most days from the end of May through late September. Highs top 110 °F (43 °C) an average of 21 days during the year. On June 26, 1990, the temperature reached an all-time recorded high of 122 °F (50 °C).
      In 2024, Phoenix-Mesa, AZ, was ranked fifth for most ozone pollution in the United States according to the American Lung Association. Vehicle emissions are cited as precursors to ozone formation. Phoenix also has high levels of particulate pollution, although cities in California lead the nation in this hazard. PM2.5 particulate matter, which is a component of diesel engine exhaust, and...
