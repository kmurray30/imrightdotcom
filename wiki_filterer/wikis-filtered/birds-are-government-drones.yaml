  - title: Birds Aren't Real
    pageid: 69473098
    extract: Birds Aren't Real is a satirical conspiracy theory which posits that birds are actually drones operated by the United States government to spy on American citizens. In 2018, journalist Rachel Roberts described Birds Aren't Real as "a joke that thousands of people are in on".
    source: |-
      {{Short description|Satirical conspiracy theory}}
      {{pp-pc|small=yes}}
      {{Use American English|date=August 2022}}
      {{Use mdy dates|date=December 2021}}
      [[File:"Birds Aren't Real" billboard in Memphis (cropped).jpg|thumb|alt=A billboard reading "Birds Aren't Real" in large black font on a white background. The billboard has several small alleged pigeons perched on top of it.|A "Birds Aren't Real" billboard in [[Memphis, Tennessee]], 2019<ref name="Koch-2019">{{cite news |last=Koch |first=Mitchell |date=July 18, 2019 |url=https://www.wreg.com/news/every-tweet-is-a-lie-birds-arent-real-campaign-spreads-message-with-new-memphis-billboard/ |title='Every tweet is a lie': Birds Aren't Real campaign spreads message with new Memphis billboard |publisher=[[WREG-TV]] |access-date=2021-12-15 |archive-date=May 18, 2022 |archive-url=https://web.archive.org/web/20220518054615/https://wreg.com/news/every-tweet-is-a-lie-birds-arent-real-campaign-spreads-message-with-new-memphis-billboard/ |url-status=live }}</ref>]]

      '''Birds Aren't Real''' is a [[Satire|satirical]] [[conspiracy theory]] which posits that birds are actually [[Unmanned aerial vehicle|drones]] operated by the [[United States government]] to spy on American citizens.<ref name="Lorenz-2021">{{cite news |last=Lorenz |first=Taylor |author-link=Taylor Lorenz |date=December 9, 2021 |url=https://www.nytimes.com/2021/12/09/technology/birds-arent-real-gen-z-misinformation.html |title=Birds Aren't Real, or Are They? Inside A Gen Z Conspiracy Theory |work=[[The New York Times]] |access-date=2021-12-16 |archive-date=May 11, 2022 |archive-url=https://web.archive.org/web/20220511040605/https://www.nytimes.com/2021/12/09/technology/birds-arent-real-gen-z-misinformation.html |url-status=live }}</ref><ref name="Palma-2021">{{cite web |last=Palma |first=Bethania |date=November 22, 2021 |url=https://www.snopes.com/articles/381287/birds-arent-real-movement/ |title=What Is the 'Birds Aren't Real' Movement? |access-date=2021-12-16 |website=[[Snopes]] |archive-date=February 6, 2022 |archive-url=https://web.archive.org/web/20220206132337/https://www.snopes.com/articles/381287/birds-arent-real-movement/ |url-status=live }}</ref><ref name="Macy-2021">{{cite web |first1=Ivie |last1=Macy |first2=Frances |last2=Lin |agency=[[Nexstar Media Wire]] |date=June 25, 2021 |url=https://wgntv.com/news/birds-arent-real-rolling-rally-makes-first-stop-in-missouri/ |title='Birds Aren't Real' rolling rally makes first stop in Missouri |publisher=[[WGN-TV]] |access-date=2021-12-16 |archive-date=January 8, 2022 |archive-url=https://web.archive.org/web/20220108202456/https://wgntv.com/news/birds-arent-real-rolling-rally-makes-first-stop-in-missouri/ |url-status=live }}</ref><ref>{{cite news |last=Peake |first=Eleanor |date=October 12, 2021 |url=https://www.newstatesman.com/culture/digital-distractions/2021/10/birds-arent-real-and-this-man-wants-the-world-to-know |title=Birds aren't real and this man wants the world to know |work=[[New Statesman]] |access-date=2021-12-16 |archive-date=February 1, 2022 |archive-url=https://web.archive.org/web/20220201225743/https://www.newstatesman.com/culture/digital-distractions/2021/10/birds-arent-real-and-this-man-wants-the-world-to-know |url-status=live }}</ref> In 2018, journalist Rachel Roberts described Birds Aren't Real as "a joke that thousands of people are in on".<ref name="Palma-2021"/> <!-- {{As of|January 2025}}, the official X Account had slightly over 100,000 followers.<ref name="X.com">{{cite web |title=Birds Aren't Real on X |url=https://x.com/birdsarentreal |website=X.com |access-date=29 January 2025}}</ref> -->

      ==Background==
      [[File:Birds aren't real 35C3 (cropped).jpg|thumb|upright=0.8|alt=A poster from the movement, reading "Birds aren't real" with the subtitle "Wake up, 35c3!". At the footer, there is a silhouette of a small bird labelled as a "government surveillance drone".|Poster inspired by the movement at the 35th [[Chaos Communication Congress]] conference in 2018]]

      '''{{va|Peter McIndoe}}''' created the satirical conspiracy theory "on a whim" in January 2017. After seeing pro-[[Donald Trump|Trump]] counter-protestors at the [[2017 Women's March]] in [[Memphis, Tennessee]], McIndoe wrote "Birds Aren't Real" on a poster and improvised a conspiracy theory amongst the counter-protestors as a "spontaneous joke". A video of McIndoe at the march went viral, which started the satirical movement.<ref name="Lorenz-2021"/><ref>{{cite web |last1=Williams |first1=Zoe |title='The lunacy is getting more intense': how Birds Aren't Real took on the conspiracy theorists |url=https://www.theguardian.com/us-news/2022/apr/14/the-lunacy-is-getting-more-intense-how-birds-arent-real-took-on-the-conspiracy-theorists |website=[[The Guardian]] |access-date=6 May 2022 |date=14 April 2022 |archive-url=https://web.archive.org/web/20240526034434/https://www.theguardian.com/us-news/2022/apr/14/the-lunacy-is-getting-more-intense-how-birds-arent-real-took-on-the-conspiracy-theorists |archive-date=26 May 2024 |url-status=live}}</ref> In 2017, he posted on Facebook: "I made a satirical movement a few months ago, and people on [[Instagram]] seem to like it a lot." He later disclaimed the post, saying it was written by a staffer who was fired,<ref name="Palma-2021" /> and did not admit until 2021 that he did not truly believe the conspiracy.<ref name="Lorenz-2021"/><ref>{{cite news |last=Omar |first=Elliott |date=January 10, 2019 |url=https://www.nwaonline.com/news/2019/jan/10/birds-aren-t-real-20190110/ |title='Birds Aren't Real': Satirical movement captures social media |work=[[Arkansas Democrat-Gazette]] |access-date=2021-12-16 |archive-date=December 12, 2021 |archive-url=https://web.archive.org/web/20211212114418/https://www.nwaonline.com/news/2019/jan/10/birds-aren-t-real-20190110/ |url-status=live }}</ref>

      The movement claims that all birds in the United States were exterminated by the [[Federal government of the United States|federal government]] between 1959 and 1971 and replaced by lookalike [[Unmanned aerial vehicle|drones]] used by the government to spy on citizens; the specifics of these theories are not always consistent, not unlike actual conspiracy theories. The movement is characterized by using catchy slogans like "If it flies, it spies" which can be found on various merchandise articles.<ref>{{cite web |title=Birds Aren't Real Webshop |url=https://birdsarentreal.com/products/if-it-flies-blue-hoodie |website=birdsarentreal.com |access-date=29 January 2025}}</ref> They claim that birds sit on [[power line]]s to recharge themselves, that birds defecate on cars as a liquid tracking method, and that U.S. president [[John F. Kennedy]] was [[John F. Kennedy assassination|assassinated]] [[John F. Kennedy assassination conspiracy theories|by the government]] due to his reluctance to kill all the birds.<ref name="Macy-2021"/><ref>{{cite web |last=Alfonso III |first=Fernando |author-link=Fernando Alfonso III |date=November 16, 2018 |title=Are Birds Actually Government-Issued Drones? So Says a New Conspiracy Theory Making Waves (and Money) |url=https://www.audubon.org/news/are-birds-actually-government-issued-drones-so-says-new-conspiracy-theory-making |url-status=live |archive-url=https://web.archive.org/web/20220503062052/https://www.audubon.org/news/are-birds-actually-government-issued-drones-so-says-new-conspiracy-theory-making |archive-date=May 3, 2022 |access-date=2021-12-16 |publisher=[[Audubon]]}}</ref><ref>{{cite news |last=Hauser |first=Alisa |date=November 2, 2018 |url=https://blockclubchicago.org/2018/11/02/whats-up-with-those-birds-arent-real-posters-they-highlight-the-post-truth-era-we-live-in-creator-says/ |title=What's Up With Those 'Birds Aren't Real' Posters? They Highlight The Post-Truth Era We Live In, Creator Says |work=[[Block Club Chicago]] |access-date=2021-12-16 |archive-date=December 9, 2021 |archive-url=https://web.archive.org/web/20211209220843/https://blockclubchicago.org/2018/11/02/whats-up-with-those-birds-arent-real-posters-they-highlight-the-post-truth-era-we-live-in-creator-says/ |url-status=live }}</ref> 

      In 2018, news about the development of actual high-tech surveillance bird drones in China came to surface, claiming that multiple military and government agencies used these drones for surveillance purposes in multiple provinces of China.<ref>{{cite web |last1=Bisset |first1=Jennifer |title=China launches high-tech bird drones to watch over its citizens. |url=https://www.cnet.com/news/privacy/china-launches-high-tech-bird-drones-to-watch-over-its-citizens/ |website=cnet.com |publisher=CNET |access-date=29 January 2025}}</ref>
      <!-- The game "Play Birds Aren't Real: The Game" was published on Steam in 2023. It allows players to complete surveillance tasks from a government surveillance bird's perspective.<ref>{{Cite web |title=Birds Aren't Real: The Game on Steam |url=https://store.steampowered.com/app/2553710/Birds_Arent_Real_The_Game/ |access-date=2025-04-10 |website=store.steampowered.com |language=en}}</ref> -->

      == Supporters ==
      Some supporters have demonstrated with signs stating "Birds Aren't Real" and related slogans.<ref name="Palma-2021" /> In 2019, a billboard was erected stating "Birds Aren't Real" in Memphis, Tennessee.<ref name="Koch-2019" /> In 2021, some supporters demonstrated in front of [[Twitter]]'s San Francisco headquarters demanding that the company change its bird logo.<ref name="Lorenz-2021" /> In 2021, [[MSNBC]] said that the movement had hundreds of thousands of members.<ref>{{cite AV media |url=https://www.msnbc.com/american-voices/watch/how-the-birds-aren-t-real-conspiracy-became-a-mass-coping-mechanism-for-gen-z-128501829725 |title=How the Birds Aren't Real conspiracy became a 'mass coping mechanism' for Gen Z |type=video |last=Lorenz |first=Taylor |publisher=[[MSNBC]] |date=12 December 2021 |access-date=2024-04-19 |archive-date=December 19, 2021 |archive-url=https://web.archive.org/web/20211219100721/https://www.msnbc.com/american-voices/watch/how-the-birds-aren-t-real-conspiracy-became-a-mass-coping-mechanism-for-gen-z-128501829725 |url-status=live }}</ref>

      Supporters mainly consist of a cross-generational community whose interest stemmed from a satirical view on internet conspiratorial theories.<ref name="Rentz-2024">{{Cite web |last=Rentz |first=Aleyna |date=2024-02-07 |title=Birds aren't real* |url=https://hub.jhu.edu/2024/02/07/birds-arent-real/ |access-date=2025-04-10 |website=The Hub |language=en}}</ref>

      == Media appearances ==
      [[File:Peter McIndoe.png|thumb|alt=Headshot of Peter McIndoe, a young white man with light brown hair.|Peter McIndoe, creator of Birds Aren't Real, at the 2023 [[Nobel Summit]] in Washington, D.C.]]

      McIndoe has made multiple media appearances along with his co-founder, Connor Gaydos, and Claire Chronis. They have done multiple interviews promoting the Birds Aren't Real movement. In 2021, McIndoe stated that he works full-time as a spokesperson for the movement, making money from sales of merchandise.<ref name="Palma-2021" /> 

      In a 2019 interview with [[WREG-TV]], McIndoe said that he was offended by a question about whether the movement was satirical, as such a question would not be asked of the opposite opinion (that birds are real).<ref name="Palma-2021" /> On January 6, 2022, McIndoe threw up during a live TV interview with the [[Chicago]]-based [[WGN9]].<ref>{{Cite web |last=Fish |first=Tom |date=2022-01-07 |title=Man vomits live on-air during TV interview: 'I'm so nervous' |url=https://www.newsweek.com/man-vomits-tv-interview-birds-arent-real-1666822 |access-date=2022-01-09 |website=[[Newsweek]] |language=en |archive-date=January 9, 2022 |archive-url=https://web.archive.org/web/20220109001752/https://www.newsweek.com/man-vomits-tv-interview-birds-arent-real-1666822 |url-status=live }}</ref><ref>{{Cite news |title=Watch: 'Birds Aren't Real' founder 'pukes' during live TV interview |url=https://www.independent.co.uk/tv/lifestyle/birds-arent-real-founder-pukes-live-tv-interview-v69191e9a |work=[[The Independent]] |date=2022-01-07 |language=en |access-date=2022-01-09 |last=Fasano |first=Stefano |archive-date=January 9, 2022 |archive-url=https://web.archive.org/web/20220109001921/https://www.independent.co.uk/tv/lifestyle/birds-arent-real-founder-pukes-live-tv-interview-v69191e9a |url-status=live }}</ref> ''[[Adweek]]'' called it an "apparent prank"<ref>{{Cite web |last=Eck |first=Kevin |title=Birds Aren't Real Conspiracy Guy Pulls Apparent Prank on WGN Morning Show |url=https://www.adweek.com/tvspy/birds-arent-real-conspiracy-guy-pulls-apparent-prank-on-wgn-morning-show/237692/ |date=2022-01-07 |access-date=2022-01-09 |website=[[Adweek]] |language=en-US |archive-date=May 26, 2024 |archive-url=https://web.archive.org/web/20240526031359/https://www.adweek.com/tvspy/birds-arent-real-conspiracy-guy-pulls-apparent-prank-on-wgn-morning-show/ |url-status=live }}</ref> and McIndoe labeled it a "hit job".<ref>{{Cite web |date=2022-01-07 |last=Berlin |first=Samantha |title='Birds Aren't Real' leader says chaotic morning news interview was 'hit job' |url=https://www.newsweek.com/birds-arent-real-leader-says-chaotic-morning-news-interview-was-hit-job-1666808 |access-date=2022-01-09 |website=[[Newsweek]] |language=en |archive-date=May 16, 2022 |archive-url=https://web.archive.org/web/20220516205742/https://www.newsweek.com/birds-arent-real-leader-says-chaotic-morning-news-interview-was-hit-job-1666808 |url-status=live }}</ref>

      In January 2022, McIndoe and Gaydos featured in a profile of the movement for ''[[Vice (magazine)|Vice]]'', giving his first media interview while not in character.<ref>{{cite web |title=The Truth Behind 'Birds Aren't Real' |url=https://video.vice.com/en_us/video/the-truth-behind-birds-arent-real/618d509f2b5e414b16210b73 |website=[[Vice (magazine)|Vice]] |access-date=2022-05-09 |date=2022-01-10 |archive-date=May 26, 2022 |archive-url=https://web.archive.org/web/20220526231435/https://video.vice.com/en_us/video/the-truth-behind-birds-arent-real/618d509f2b5e414b16210b73 |url-status=dead }}</ref> In May 2022, McIndoe, Gaydos, and Chronis were interviewed by ''[[60 Minutes]]''. He started off the interview in character, but later broke character and described the purpose behind creating the satirical movement: "So it's taking this concept of [[misinformation]] and almost building a little safe space to come together within it and laugh at it, rather than be scared by it. And accept the lunacy of it all and be a bird truther for a moment in time when everything's so crazy."<ref>{{cite web |title=The origins of "Birds Aren't Real" |url=https://www.cbsnews.com/news/birds-arent-real-origin-60-minutes-2022-05-01/ |website=[[CBS News]] |access-date=2022-05-09 |date=2022-05-01 |archive-date=May 9, 2022 |archive-url=https://web.archive.org/web/20220509044016/https://www.cbsnews.com/news/birds-arent-real-origin-60-minutes-2022-05-01/ |url-status=live }}</ref><ref>{{cite web |last1=Alfonsi |first1=Sharyn |title=Parodying conspiracy theories with the Birds Aren't Real movement |url=https://www.cbsnews.com/news/birds-arent-real-peter-mcindoe-60-minutes-2022-05-01/ |website=[[CBS News]] |access-date=2022-05-09 |date=2022-05-01 |archive-date=May 9, 2022 |archive-url=https://web.archive.org/web/20220509044015/https://www.cbsnews.com/news/birds-arent-real-peter-mcindoe-60-minutes-2022-05-01/ |url-status=live }}</ref> In April 2023, McIndoe held a [[TED Talk]] about the movement in which he posits that feeling excluded leads folks to adopt conspiracies and proposes that empathy{{snd}}rather than confrontation{{snd}}is the best way to respond.<ref>{{cite web |url=https://www.youtube.com/watch?v=3VEkzweBJPM |title=Birds Aren't Real? How a Conspiracy Takes Flight - Peter McIndoe - TED |work=[[TED (conference)|TED]] |date=September 13, 2023 |access-date=2023-09-14 |archive-date=September 14, 2023 |archive-url=https://web.archive.org/web/20230914084446/https://www.youtube.com/watch?v=3VEkzweBJPM&gl=US&hl=en |url-status=live }}</ref> He later claimed to be working on a Birds Aren't Real movie in an interview with the Hub at Johns Hopkins University.<ref name="Rentz-2024" />

