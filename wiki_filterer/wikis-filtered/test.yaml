      === Infection fatality rate ===
      A key metric in gauging the severity of COVID‑19 is the [[infection fatality rate]] (IFR), also referred to as the ''infection fatality ratio'' or ''infection fatality risk''.<ref>{{#invoke:Cite|journal | vauthors = Mallapaty S | title = How deadly is the coronavirus? Scientists are close to an answer | journal = Nature | volume = 582 | issue = 7813 | pages = 467–468 | date = June 2020 | pmid = 32546810 | doi = 10.1038/d41586-020-01738-2 | s2cid = 219726496 | doi-access = free | title-link = doi | bibcode = 2020Natur.582..467M }}</ref><ref>{{#invoke:Cite|journal | vauthors = Alwan NA, Burgess RA, Ashworth S, Beale R, Bhadelia N, Bogaert D, Dowd J, Eckerle I, Goldman LR, Greenhalgh T, Gurdasani D, Hamdy A, Hanage WP, Hodcroft EB, Hyde Z, Kellam P, Kelly-Irving M, Krammer F, Lipsitch M, McNally A, McKee M, Nouri A, Pimenta D, Priesemann V, Rutter H, Silver J, Sridhar D, Swanton C, Walensky RP, Yamey G, Ziauddeen H | title = Scientific consensus on the COVID-19 pandemic: we need to act now | journal = Lancet | volume = 396 | issue = 10260 | pages = e71–e72 | date = October 2020 | pmid = 33069277 | pmc = 7557300 | doi = 10.1016/S0140-6736(20)32153-X }}</ref><ref>{{#invoke:Cite|journal | vauthors = Meyerowitz-Katz G, Merone L | title = A systematic review and meta-analysis of published research data on COVID-19 infection fatality rates | journal = International Journal of Infectious Diseases | volume = 101 | pages = 138–148 | date = December 2020 | pmid = 33007452 | pmc = 7524446 | doi = 10.1016/j.ijid.2020.09.1464 }}</ref> This metric is calculated by dividing the total number of deaths from the disease by the total number of infected individuals; hence, in contrast to the [[case fatality rate|CFR]], the IFR incorporates asymptomatic and undiagnosed infections as well as reported cases.<ref name="urlGeneralized trapezoidal ogive curves for fatality rate modeling">{{#invoke:Cite|journal | vauthors = Zhang D, Hu M, Ji Q | title = Financial markets under the global pandemic of COVID-19 | journal = Finance Research Letters | volume = 36 | page = 101528 | date = October 2020 | pmc = 7402242 | doi = 10.1016/j.csfx.2020.100043 | pmid = 32837360 | bibcode = 2020CSFX....500043D }}</ref>

      ==== Estimates ====
      [[File:Graph of Covid-19 Infection Fatality Ratio by age.png|thumb|The red line shows the estimate of infection fatality rate (IFR), in percentage terms, as a function of age. The shaded region depicts the 95% confidence interval for that estimate. Markers denotes specific observations used in the meta-analysis.<ref name="EJE_levinetal" />]]
      [[File:Log Graph of Covid-19 Infection Fatality Ratio by age.png|thumb|The same relationship plotted on a log scale]]
      A December 2020 systematic review and meta-analysis estimated that population IFR during the first wave of the pandemic was about 0.5% to 1% in many locations (including France, Netherlands, New Zealand, and Portugal), 1% to 2% in other locations (Australia, England, Lithuania, and Spain), and exceeded 2% in Italy.<ref name="EJE_levinetal">{{#invoke:Cite|journal | vauthors = Levin AT, Hanage WP, Owusu-Boaitey N, Cochran KB, Walsh SP, Meyerowitz-Katz G | title = Assessing the age specificity of infection fatality rates for COVID-19: systematic review, meta-analysis, and public policy implications | journal = European Journal of Epidemiology | volume = 35 | issue = 12 | pages = 1123–1138 | date = December 2020 | pmid = 33289900 | pmc = 7721859 | doi = 10.1007/s10654-020-00698-1 | doi-access = free | title-link = doi }} [[File:CC BY icon.svg|50px]] Text was copied from this source, which is available under a [https://creativecommons.org/licenses/by/4.0/ Creative Commons Attribution 4.0 International License] {{Webarchive|url=https://web.archive.org/web/20171016050101/https://creativecommons.org/licenses/by/4.0/ |date=16 October 2017 }}.</ref> That study also found that most of these differences in IFR reflected corresponding differences in the age composition of the population and age-specific infection rates; in particular, the metaregression estimate of IFR is very low for children and younger adults (e.g., 0.002% at age 10 and 0.01% at age 25) but increases progressively to 0.4% at age 55, 1.4% at age 65, 4.6% at age 75, and 15% at age 85.<ref name="EJE_levinetal" /> These results were also highlighted in a December 2020 report issued by the WHO.<ref>{{#invoke:Cite|journal|title=Background paper on Covid-19 disease and vaccines: prepared by the Strategic Advisory Group of Experts (SAGE) on immunization working group on COVID-19 vaccines|date=22 December 2020|url=https://apps.who.int/iris/handle/10665/338095|website=[[World Health Organization]] (WHO) |hdl=10665/338095 | author=World Health Organization }}</ref>

