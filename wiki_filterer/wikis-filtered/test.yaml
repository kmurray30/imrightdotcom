      {{Short description|None}}
      {{Use Oxford spelling|date=August 2016}}
      {{Use dmy dates|date=July 2020}}
      {{Olympic Games infobox}}

      The [[Olympic Games]] is a major international [[multi-sport event]]. During its history, both the [[Summer Olympic Games|Summer]] and [[Winter Olympic Games|Winter Games]] have been the subject of scandals, controversies and incidents.

      [[Cheating]], such as the use of [[performance enhancing drugs]] by [[athlete]]s, has regularly affected the Olympic Games. Some countries have [[Olympic Games boycott|boycott]]ed the Games on various occasions, either as a protest against the [[International Olympic Committee]] or the contemporary politics of other participants. Some countries have also been banned from the Olympics, such as the defeated countries after both [[World Wars]] or South Africa under [[apartheid]]. Other controversies have included decisions by [[referee]]s and gestures by athletes.

      ==Summer Olympics==
      ==={{anchor|1896 Summer Olympics}}1896 Summer Olympics – Athens, Greece===
      *Marathon runner [[Spyridon Belokas]] won the bronze medal, but later admitted to covering part of the course by [[carriage]], and was disqualified.<ref name="q913">{{cite web | title=Olympic Marathon Athens 1896 I Olympiad | website=MarathonGuide.com | url=https://www.marathonguide.com/history/olympicmarathons/chapter1.cfm | access-date=2024-08-14}}</ref>

      ==={{anchor|1900 Summer Olympics}}1900 Summer Olympics – Paris, France===
      *The Games were considered a planning and organizational failure. In [[Athletics at the 1900 Summer Olympics|athletics]], organizers did not allow enough room for throwing events, leading Hungarian [[Athletics at the 1900 Summer Olympics – Men's discus throw|discus throw]] gold medalist [[Rudolf Bauer (athlete)|Rudolf Bauer]] to throw three of his attempts into the crowd.<ref name="n934">{{cite web | title=Paris almost put an end to the Olympic movement | website=CBC | date=2008-05-15 | url=https://www.cbc.ca/sports/2.720/paris-almost-put-an-end-to-the-olympic-movement-1.709776 | access-date=2024-08-14}}</ref> Swimming events were held in the [[River Seine]], which was a [[sewage]] outflow for Paris.<ref name="x353">{{cite web | last=Steelhammer | first=Rick | title=Olympics' past was less than golden | website=Charleston Gazette-Mail | date=2024-07-02 | url=https://www.wvgazettemail.com/life/olympics-past-was-less-than-golden/article_af13558e-ee99-5978-a0f4-1041b128df37.html | access-date=2024-08-14}}</ref>

      ==={{anchor|1904 Summer Olympics}}1904 Summer Olympics – St. Louis, Missouri, United States===
      *Marathon runner [[Frederick Lorz]] reached the finish line first and was about to be awarded the gold medal before it was revealed he had not run the entire race. Lorz, suffering cramps, had dropped out of the race after nine miles and hitched a ride back to the stadium in a car. When the car broke down at the 19th mile, he re-entered the race and jogged across the finish line.<ref name="m879">{{cite web | last1=Abbott | first1=Karen | first2=Ellen | last2=Wexler | title=How the 1904 Marathon Became One of the Weirdest Olympic Events of All Time | website=Smithsonian Magazine | date=2024-06-27 | url=https://www.smithsonianmag.com/history/how-the-1904-marathon-became-one-of-the-weirdest-olympic-events-of-all-time-14910747/ | access-date=2024-08-14}}</ref> Upon being confronted by race officials, Lorz admitted his deception and was disqualified.
      *[[Anthropology Days]], an unofficial part of the Games, involved [[indigenous peoples]] from around the world being displayed and performing in sporting events that they had not been prepared for.<ref name="d995">{{cite web | last=DiMeo | first=Nate | title=Remembering the Anthropology Days at the 1904 Olympics. | website=Slate Magazine | date=2008-08-21 | url=https://slate.com/culture/2008/08/remembering-the-anthropology-days-at-the-1904-olympics.html | access-date=2024-08-14}}</ref>

      ==={{anchor|1906 Intercalated Games}}1906 Intercalated Games – Athens, Greece===
      *[[Peter O'Connor (athlete)|Peter O'Connor]], an Irish athlete representing Great Britain, climbed up the Olympic flagpole with an Irish flag in order to protest being considered a British competitor.<ref name="i894"/>

      ==={{anchor|1908 Summer Olympics}}1908 Summer Olympics – London, England, United Kingdom===
      * [[Grand Duchy of Finland]] competed separately from the [[Russian Empire]], but was not allowed to display the [[Flag of Finland|Finnish flag]].<ref name=Politics-no-stranger>{{Cite news|date=9 May 1984|title= Politics no stranger to Olympic Games |newspaper=[[The Montreal Gazette]]  |url=https://news.google.com/newspapers?id=eVwxAAAAIBAJ&pg=6019,4341675 }}</ref>
      * In the [[Athletics at the 1908 Summer Olympics – Men's 400 metres|men's 400 metres]], American winner [[John Carpenter (athlete)|John Carpenter]] was disqualified for blocking British athlete [[Wyndham Halswelle]] in a manoeuvre that was legal under American rules but prohibited by the British rules under which the race was run. As a result of the disqualification, a second final race was ordered. Halswelle was to face the other two finalists [[William Robbins (athlete)|William Robbins]] and [[John Taylor (relay runner)|John Taylor]], but both were from the United States and decided not to contest the repeat of the final to protest the judges' decision. Halswelle was thus the only medallist in the 400 metres, a race which became the only [[walkover]] victory in Olympic history. Taylor later ran on the Gold medal-winning U.S. team for the now-defunct Medley Relay, becoming the first African American medallist.<ref>{{cite web|url=http://www.historytalk.org/Notting%20Hill%20Sport/sport2web%20olympics.pdf |title=Archived copy |access-date=2017-01-29 |url-status=dead |archive-url=https://web.archive.org/web/20120311011542/http://www.historytalk.org/Notting%20Hill%20Sport/sport2web%20olympics.pdf |archive-date=11 March 2012 }} History Talk</ref>

      ==={{anchor|1912 Summer Olympics}}1912 Summer Olympics – Stockholm, Sweden===
      * American athlete [[Jim Thorpe]] was stripped of his gold medals in the [[decathlon]] and [[pentathlon]] after it was learned that he had played professional minor league baseball three years earlier.<ref name="olympic.org">{{cite web|url=https://www.olympic.org/jim-thorpe/?section=&id=undefined|title=International Olympic Committee – Athletes|access-date=2008-08-16}}</ref> In solidarity, the decathlon silver medalist, [[Hugo Wieslander]], refused to accept the medals when they were offered to him.<ref>{{cite web|url=http://www.abebooks.com/docs/Community/Featured/olympics-crisis.shtml|title=AbeBooks: Crisis at the Olympics|access-date=2008-08-16|archive-url=https://web.archive.org/web/20210213214228/https://www.abebooks.com/docs/Community/Featured/olympics-crisis.shtml|archive-date=2021-02-13}}</ref> The gold medals were restored to Thorpe's children in 1983, 30 years after his death.<ref name="olympic.org"/>
      *Portuguese marathon runner [[Francisco Lázaro]] became the first Olympic athlete to die in competition after collapsing on the track. [[Heat exhaustion]], [[sunstroke]], heart problems, and a possible [[electrolyte imbalance]] are thought to have contributed.<ref name="t757">{{cite web | last=Mead | first=Wendy | title=The Truth About The First Modern Olympic Death | website=Grunge | date=2021-06-29 | url=https://www.grunge.com/449340/the-truth-about-the-first-modern-olympic-death/ | access-date=2024-08-21}}</ref>

      ==={{anchor|1916 Summer Olympics}}1916 Summer Olympics (not held due to World War I)===
      * The [[1916 Summer Olympics]] were to have been held in [[Berlin]], [[German Empire]], but were cancelled because of the outbreak of [[World War I]].

      ==={{anchor|1920 Summer Olympics}}1920 Summer Olympics – Antwerp, Belgium===
      * [[Budapest]] had initially been selected over [[Amsterdam]] and [[Lyon]] to host the Games, but as the [[Austro-Hungarian Empire]] had been a German ally in World War I, the French-dominated International Olympic Committee transferred the Games to [[Antwerp]] in April 1919.
      * Austria, Bulgaria, Germany, Hungary, and Turkey were not invited to the Games, being the successor states of the [[Central Powers]] which were defeated in World War I.<ref name=Politics-no-stranger />
      *The final of the [[Football at the 1920 Summer Olympics|football tournament]] was won by Belgium after the Czechoslovakia team walked off the pitch while the score was 0–2 to protest a referee's decision.<ref name="y099">{{cite web | title=Belgium win dramatic Olympic football final after Czechoslovak tantrum | website=RTE.ie | date=1920-09-02 | url=https://www.rte.ie/centuryireland/index.php/articles/belgium-win-dramatic-olympic-football-final-after-czechoslovak-tantrum | access-date=2024-08-14}}</ref>

      ==={{anchor|1924 Summer Olympics}}1924 Summer Olympics – Paris, France===
      * Germany was again not invited to the Games.<ref name=GuttmannGermany>{{cite book |last=Guttmann |first=Allen |title=The Olympics: A History of the Modern Games |year=1992 |publisher=University of Illinois Press |location=Urbana and Chicago |isbn=0-252-01701-3 |pages=[https://archive.org/details/olympicshistoryo00gutt/page/38 38] |url=https://archive.org/details/olympicshistoryo00gutt/page/38 }}</ref>
      * In the [[Boxing at the 1924 Summer Olympics – Middleweight|boxing middleweight]] quarter final, British boxer [[Harry Mallin]] showed the referee a [[bite mark]] on his chest inflicted by French opponent [[Roger Brousse]]. The referee nonetheless declared Brousse the victor. A Swedish official protested on Mallin's behalf, and Brousse's previous opponent, Argentine [[Manolo Gallardo]], complained that he had also been bitten. Brousse was disqualified, and Mallin went on to win the gold medal.<ref name="p392">{{cite web | last=Duncanson | first=Neil | title=Not just Chariots of Fire: the forgotten heroes of 1924 Paris Olympics | website=the Guardian | date=2024-07-17 | url=https://www.theguardian.com/sport/article/2024/jul/17/forgotten-heroes-1924-paris-olympics-lucy-morton-harry-mallin | access-date=2024-08-22}}</ref>

      ==={{anchor|1928 Summer Olympics}}1928 Summer Olympics – Amsterdam, Netherlands===
      *The [[Athletics at the 1928 Summer Olympics – Women's 800 metres|women's 800 meters]] race caused controversy after several women reportedly collapsed at the finish line. As a result, races longer than 200 meters were banned for women until the 1960 Olympics.<ref name="n175">{{cite web | title=Women's 800-meter run causes controversy on this day in Olympic history in 1928 | website=Raleigh News & Observer | date=2016-08-11 | url=https://www.newsobserver.com/sports/olympics/article95021822.html | access-date=2024-08-22}}</ref>

      ==={{anchor|1932 Summer Olympics}}1932 Summer Olympics – Los Angeles, California, United States===
      * Nine-time Finnish Olympic gold medallist [[Paavo Nurmi]] was found to be a professional athlete and banned from running in the Games. The main orchestrators of the ban were the Swedish officials that were the core of the IOC bureaucracy, including IOC president [[Sigfrid Edström]], who claimed that Nurmi had received too much money for his travel expenses. Nurmi did, however, travel to [[Los Angeles]] and kept training at the Olympic Village. Despite pleas from all the other entrants of the marathon, he was not allowed to compete at the Games. This incident, in part, led to Finland refusing to participate in the traditional [[Finland-Sweden athletics international]] annual event until 1939.
      * After winning the silver in [[equestrian dressage]], Swedish rider [[Bertil Sandström]] was demoted to last for clicking to his horse to win encouragement. He asserted that it was a creaking saddle making the sounds.<ref>[https://web.archive.org/web/20200417204818/https://www.sports-reference.com/olympics/athletes/sa/bertil-sandstrom-1.html Bertil Sandström]. sports-reference.com</ref>

      ==={{anchor|1936 Summer Olympics}}1936 Summer Olympics – Berlin, Germany===
      [[File:Bundesarchiv Bild 146-1976-033-17, Berlin, Olympische Spiele.jpg|thumb|[[Adolf Hitler]] arriving at the opening ceremony of the controversial [[1936 Summer Olympics|1936 Berlin Games]]]]
      [[Image:Bundesarchiv Bild 183-G00630, Sommerolympiade, Siegerehrung Weitsprung.jpg|thumb|[[Jesse Owens]] on the podium after winning the long jump at the 1936 Summer Olympics]]
      *In 1931, the [[International Olympic Committee]] (IOC) selected the German capital city Berlin as the host city of the [[1936 Summer Olympics]]. However, following [[Adolf Hitler's rise to power]] in 1933, the plans for the Olympic Games became entangled with the politics of the [[Nazi Germany|Nazi regime]]. Hitler regarded the event as 'his' Olympics and sought to exploit the Games for propaganda purposes, with the aim of showcasing post-First World War Germany. In 1936, a number of prominent politicians and organizations called for a boycott of the Summer Olympics, while other campaigners called for the games to be relocated.<ref name="Newman">{{cite news|url=https://www.haaretz.com/hasen/spages/1009630.html|title=Why Grandpa boycotted the Olympics|last=Newman|first=Saul|date=8 August 2018|work=Haaretz|access-date=2008-08-09|archive-url=https://web.archive.org/web/20100413070725/http://www.haaretz.com/hasen/spages/1009630.html|archive-date=13 April 2010|url-status=dead}}</ref><ref name=USHMM_boycott>{{cite encyclopedia|title=The Movement to Boycott the Berlin Olympics of 1936|url=http://www.ushmm.org/wlc/en/article.php?ModuleId=10007087|encyclopedia=Holocaust Encyclopedia|publisher=United States Holocaust Memorial Museum|access-date=8 February 2014|archive-url=https://web.archive.org/web/20140202095138/http://www.ushmm.org/wlc/en/article.php?ModuleId=10007087|archive-date=2 February 2014 |date=June 2013}}</ref>
      *[[Lithuania]] was not invited by Germany due to the [[Klaipėda Region|Memelland/Klaipėda]] region controversy.{{citation needed|date=August 2019}}
      *Under the proposal of the autonomous [[Generalitat de Catalunya|Government of Catalonia]], the newly elected [[Popular Front (Spain)|Popular Front]] government of the [[Second Spanish Republic]] decided to boycott the Berlin Games entirely and, together with labour and socialist groups around the world, organized an alternative event, the [[People's Olympiad]], held in [[Barcelona]], [[Catalonia]]. The event did not take place however; just as the Games were about to begin the [[Spanish Civil War]] broke out and the People's Olympiad was canceled.
      *In the United States, there was considerable debate about boycotting the Games.<ref>{{cite news |title=Gov. Earl Urges U.S. Olympic Ban. He Says Here Nazis Will 'Sell' Their Philosophy to All Who Attend the Games  |url=https://www.nytimes.com/1935/12/04/archives/gov-earl-urges-us-olympic-ban-he-says-here-nazis-will-sell-their.html |quote=Governor George H. Earle of Pennsylvania and Mayor La Guardia joined last night with Alfred J. Lill, member of the American Olympic Committee; Eric Seelig, former amateur light-heavyweight boxing champion of Germany, and others, in urging American withdrawal from the Olympic Games in Berlin next year. |newspaper=[[New York Times]] |date=4 December 1935 |access-date=8 February 2014 }}</ref> A leading advocate of a boycott was U.S. athlete and politician [[Ernest L. Jahncke|Ernest Lee Jahncke]], the son of a German immigrant, who was an IOC member before being expelled from the IOC for his views.
      *International concern surrounded the ruling German [[Nazi Party]]'s ideology of [[Master race|racial superiority]] and its application at an international event such as the Olympics.<ref name=USHMM_boycott/><ref name=USHMM_nazification>{{cite web|title=Nazification of Sport|url=http://www.ushmm.org/exhibition/olympics/?content=sports&lang=en|work=The Nazi Olympics Berlin 1936 (Online Exhibition)|publisher=United States Holocaust Memorial Museum|access-date=8 February 2014}}</ref> In 1934 Avery Brundage undertook a visit to Germany to investigate the treatment of Jews.  When he returned, he reported, "I was given positive assurance in writing&nbsp;... that there will be no discrimination against Jews. You can't ask more than that and I think the guarantee will be fulfilled."<ref name=guttman>{{cite book|last=Guttmann|first=Allen|title=The games must go on : Avery Brundage and the Olympic Movement|year=1984|publisher=Columbia University Press|location=New York|isbn=978-0-231-05444-7|pages=[https://archive.org/details/gamesmustgoonave0000gutt/page/69 69–70]|url=https://archive.org/details/gamesmustgoonave0000gutt/page/69}}</ref> However, a number of record-holding German athletes were excluded from competing at Berlin for being racially undesirable, including [[Lilli Henoch]],<ref name="google2">{{cite book|url=https://books.google.com/books?id=t0KzECrIQDQC&q=henoch&pg=PA107 |title=Jews and the Olympic Games: the clash between sport and politics: with a complete review of Jewish Olympic medalists |author=Paul Taylor |isbn=1-903900-88-3|publisher= Sussex Academic Press|year= 2004|access-date=8 February 2014}}</ref> [[Gretel Bergmann]]<ref>{{cite web|url=https://www.haaretz.com/print-edition/sports/german-film-helps-jewish-athlete-right-historical-wrong-1.3472 |title=German film helps Jewish athlete right historical wrong |work=Haaretz |date= 25 November 2009|access-date=8 February 2014|author=Hipsh, Rami}}</ref><ref>{{cite news |first= Richard|last= Sandomir|title='Hitler's Pawn' on HBO: An Olympic Betrayal  |url=https://query.nytimes.com/gst/fullpage.html?res=9402E4D9143BF934A35754C0A9629C8B63 |work=New York Times |date=7 July 2004 |access-date=8 February 2014 }}</ref> and [[Wolfgang Fürstner]].<ref name=lehrer2006>{{cite book|last=Lehrer|first=Steven|title=The Reich Chancellery and Führerbunker complex : an illustrated history of the seat of the Nazi regime|year=2006|publisher=McFarland & Co.|location=Jefferson, N.C. [u.a.]|isbn=9780786423934|pages=47–48}}</ref> The only Jewish athlete to compete on the German team was fencer [[Helene Mayer]].
      *Jewish American athletes [[Sam Stoller]] and [[Marty Glickman]] were originally selected to compete in the 4x100 meter relay, but were replaced on the day of the race by [[Jesse Owens]] and [[Ralph Metcalfe]], despite Owens' protests. Glickman has claimed the decision was made to keep Jewish athletes off the podium "so to not embarrass Adolf Hitler".<ref name="h564">{{cite web | last=Masters | first=James | title=Hitler's Olympics: Jewish runners 'betrayed' by U.S. Athletics | website=CNN | date=2015-07-31 | url=https://www.cnn.com/2015/07/31/sport/germany-berlin-jewish-olympics-maccabi/index.html | access-date=2024-08-14}}</ref>
      *Hitler's decision not to shake hands with American long-jump medal winner [[Jesse Owens]] has been widely interpreted as a snub of an [[African American]]; however some commentators have noted that Hitler missed all medal presentations after the first day as he only wished to shake hands with German victors.<ref>Hyde Flippo, [http://german.about.com/library/blgermyth10.htm The 1936 Berlin Olympics: Hitler and Jesse Owens] {{Webarchive|url=https://web.archive.org/web/20110513073947/http://german.about.com/library/blgermyth10.htm |date=13 May 2011 }}, German Myth 10, german.about.com</ref><ref>Rick Shenkman, [http://hnn.us/articles/571.html ''Adolf Hitler, Jesse Owens and the Olympics Myth of 1936''] 13 February 2002 from History News Network (article excerpted from Rick Shenkman's ''Legends, Lies and Cherished Myths of American History'', William Morrow & Co, 1988 {{ISBN|0-688-06580-5}})</ref> Owens himself was reported to have been magnanimous when he mentioned Hitler.<ref>{{cite news|title=Owens Arrives With Kind Words For All Officials|url=https://news.google.com/newspapers?id=zsoaAAAAIBAJ&pg=1814,6536771&dq=jesse-owens+hitler&hl=en|access-date=8 February 2014|newspaper=The Pittsburgh Press|date=24 August 1936}}</ref> After the Games however, Owens was not personally honoured by [[President of the United States|President]] [[Franklin D. Roosevelt]].<ref>{{Cite book |first=Jeremy |last=Schaap |title=Triumph: The Untold Story of Jesse Owens and Hitler's Olympics |location=New York |publisher=Houghton Mifflin Harcourt |year=2007 |isbn=978-0-618-68822-7 |url=https://archive.org/details/triumphuntoldsto00jere }}</ref>
      * The [[Irish Olympic Council]] boycotted the games as the [[IAAF]] had expelled the [[National Athletic and Cycling Association]] for refusing to restrict itself to the [[Irish Free State]] rather than the island of Ireland.<ref name="sullivan">{{cite journal |last=O'Sullivan |first=Patrick T. |date=Spring 1998 |title=Ireland & the Olympic Games |journal=History Ireland |location=Dublin |volume=6 |issue=1 |url=http://www.historyireland.com/volumes/volume6/issue1/features/?id=180 |archive-date=16 December 2012 |access-date=8 August 2012 |archive-url=https://web.archive.org/web/20121216072750/http://www.historyireland.com/volumes/volume6/issue1/features/?id=180 |url-status=dead }}</ref>
      * In the cycling match sprint final, German [[Toni Merkens]] fouled Dutch [[Arie van Vliet]]. Instead of disqualification, Merkens was fined 100 [[German reichsmark]]s and kept the gold medal.<ref name="s831"/>
      * In [[1936 Peru v Austria football match|one of the football quarter-finals]], Peru beat Austria 4–2 but Austria nonetheless advanced to the next round under very controversial circumstances. As a sign of protest the complete Olympic delegations of Peru and Colombia left Germany.<ref name="s831">{{cite web | last=Hollandbeck | first=Andy | title=The Top 6 Olympic Scandals | website=The Saturday Evening Post | date=2024-07-26 | url=https://www.saturdayeveningpost.com/2024/07/the-top-6-olympic-scandals/ | access-date=2024-08-14}}</ref>

      === 1940 and 1944 Summer Olympics (not held due to World War II)===
      * The 1940 Summer Olympics were scheduled to be held in [[Tokyo]], Japan, but were cancelled due to the outbreak of the [[Second Sino-Japanese War]]. The government of Japan abandoned its support for the 1940 Games in July 1938.<ref>{{cite news |title=Japan Abandons Olympics Because of War |author=Relman Morin |newspaper=The Evening Independent |date=14 July 1938 |url=https://news.google.com/newspapers?id=ho4LAAAAIBAJ&pg=3871,663538&dq=hazelton+phillies|page=6|access-date=2009-09-29 }}</ref> The [[International Olympic Committee|IOC]] then awarded the Games to [[Helsinki]], Finland, the runner-up in the original bidding process, but the Games were not held due to the [[Winter War]]. Ultimately, the Olympic Games were suspended indefinitely following the outbreak of [[World War II]] and did not resume until the London Games of [[1948 Summer Olympics|1948]].

      ==={{anchor|1948 Summer Olympics}}1948 Summer Olympics – London, England, United Kingdom===
      * The two major [[Axis powers]] of World War II, Germany and Japan, were suspended from the Olympics, although Italy, their former ally, participated.<ref name=Politics-no-stranger /> German and Japanese athletes were allowed to compete again at the 1952 Olympics.
      * The Soviet Union was invited but chose not to send any athletes, sending observers instead to prepare for the 1952 Olympics.

      ==={{anchor|1952 Summer Olympics}}1952 Summer Olympics – Helsinki, Finland===
      *The Republic of China (Taiwan) withdrew their athletes due to the participation of the People's Republic of China.<ref name="i235">{{cite magazine | last=Guzman | first=Chad de | title=Why the Olympics Are a Source of Pride—and Frustration—for Taiwan | magazine=TIME | date=2024-08-08 | url=https://time.com/7009052/chinese-taipei-taiwan-olympics-history-politics-pride-frustration/ | access-date=2024-08-14}}</ref>

      ==={{anchor|1956 Summer Olympics}}1956 Summer Olympics – Melbourne, Australia and Stockholm, Sweden===
      * Eight countries boycotted the Games for three different reasons. Cambodia, Egypt, Iraq, and Lebanon announced that they would not participate in response to the [[Suez Crisis]] during which Egypt had been invaded by Israel, the United Kingdom, and France after Egypt had nationalized the [[Suez Canal]].<ref name=Politics-no-stranger /> The Netherlands, Spain, and Switzerland withdrew to protest the Soviet Union's invasion of Hungary during the [[1956 Hungarian Revolution]] and the Soviet presence at the Games.<ref name=Politics-no-stranger /> Less than two weeks before the Opening Ceremony, the [[People's Republic of China]] also chose to boycott the event, protesting the [[Taiwan|Republic of China]] (Taiwan) being allowed to compete (under the name "Formosa").
      * The political frustrations between the Soviet Union and Hungary boiled over at the games themselves when the two men's [[water polo]] teams met for the semi-final. The players became increasingly violent towards one another as the game progressed, while many spectators were prevented from rioting only by the sudden appearance of the police.<ref>{{cite news |url =https://www.smh.com.au/news/175-years/cold-war-violence-erupts-at-melbourne-olympics/2006/04/17/1145126047088.html |title = Cold War violence erupts at Melbourne Olympics |date = 7 December 1956 |newspaper = Sydney Morning Herald |access-date = 2008-08-10 }}</ref> The match became known as the [[Blood in the Water match]].<ref>{{cite web |url = http://www.smithsonianmag.com/people-places/blood-in-the-water.html |title = Blood in the Water at the 1956 Olympics |date = 1 August 2008 |publisher = Smithsonian.com |author = Miles Corwin |access-date = 2008-08-10 |archive-date = 21 November 2011 |archive-url = https://web.archive.org/web/20111121100800/http://www.smithsonianmag.com/people-places/blood-in-the-water.html |url-status = dead }}</ref><ref name="A bloody war that spilled into the pool">{{cite news|url=http://sportsillustrated.cnn.com/events/1996/olympics/daily/july28/flashback.html|archive-url=https://web.archive.org/web/20000916001932/http://sportsillustrated.cnn.com/events/1996/olympics/daily/july28/flashback.html|url-status=dead|archive-date=16 September 2000|title=SI Flashback|access-date=2008-08-18 | work=CNN}}</ref>
      * The advent of the state-sponsored "full-time amateur athlete" of the [[Eastern Bloc]] countries further eroded the ideology of the pure amateur, as it put the self-financed amateurs of the Western countries at a disadvantage. The [[Soviet Union]] entered teams of athletes who were all nominally students, soldiers, or working in a profession, but many of whom were in reality paid by the state to train on a full-time basis.<ref name="Benjamin, Daniel">{{cite magazine|url=http://www.time.com/time/magazine/article/0,9171,976117-1,00.html|archive-url=https://web.archive.org/web/20090902183140/http://www.time.com/time/magazine/article/0,9171,976117-1,00.html|url-status=dead|archive-date=2 September 2009|title=Traditions Pro Vs. Amateur|author=Benjamin, Daniel|magazine=[[Time (magazine)|Time]]|access-date=2009-03-18|date=1992-07-27}}</ref> Nevertheless, the IOC held to the traditional rules regarding amateurism for athletes from non-Communist countries.<ref name="auto">{{cite web|last=Schantz |first=Otto |title=The Olympic Ideal and the Winter Games Attitudes Towards the Olympic Winter Games in Olympic Discourses—from Coubertin to Samaranch |publisher=Comité International Pierre De Coubertin |url=http://www.coubertin.ch/pdf/schantz.pdf |access-date=13 September 2008 |url-status=dead |archive-url=https://web.archive.org/web/20130505052232/http://www.coubertin.ch/pdf/schantz.pdf |archive-date=5 May 2013 }}</ref>
      * Due to quarantine issues, the equestrian events were held in [[Stockholm]], Sweden.

      ==={{anchor|1960 Summer Olympics}}1960 Summer Olympics – Rome, Italy===
      *In the [[Modern pentathlon at the 1960 Summer Olympics|modern pentathlon]], the team from Tunisia cheated by attempting to pass off their strongest fencer as each of their three athletes, using his mask to conceal his identity. The ruse was discovered and the Tunisians were disqualified from the fencing portion.<ref name="n381">{{cite book | last=Fuchs | first=J. | title=Total Olympics: Every Obscure, Hilarious, Dramatic, and Inspiring Tale Worth Knowing | publisher=Workman Publishing Company | year=2021 | isbn=978-1-5235-0838-9 | url=https://books.google.com/books?id=sfGoDwAAQBAJ&pg=PA120 | access-date=2024-08-01 | page=120}}</ref><ref name="h770">{{cite web | title=Blast from the past: Modern Pentathlon misery for Tunisian trio | website=Olympics.com | date=2020-05-12 | url=https://olympics.com/en/news/blast-from-the-past-modern-pentathlon-misery-for-tunisian-trio | access-date=2024-08-01}}</ref>
      *The [[Taiwan at the 1960 Summer Olympics|team from Taiwan]] was made to compete under the name "[[Formosa]]", and marched in the opening ceremony with a sign reading "Under Protest".<ref name="i894">{{cite web | last=Maizland | first=Lindsay | title=Timeline: Politics and Protest at the Olympics | website=Council on Foreign Relations | date=2021-12-17 | url=https://www.cfr.org/timeline/olympics-boycott-protest-politics-history | access-date=2024-08-14}}</ref>
      *In the [[Swimming at the 1960 Summer Olympics – Men's 100 metre freestyle|men's 100 meter freestyle]] event, American [[Lance Larson]] and Australian [[John Devitt]] both appeared to touch the wall first, with half of the six judges each thinking Larson and Devitt had won. Head judge Hans Runströmer controversially gave the gold medal to Devitt.<ref name="r801">{{cite web | first=David | last=Rieder |  title=Passages: Lance Larson, Former World-Record Holder Controversially Denied Olympic Gold, Dies at 83 | website=Swimming World News | date=2024-01-24 | url=https://www.swimmingworldmagazine.com/news/passages-lance-larson-former-world-record-holder-controversially-denied-olympic-gold-dies-at-83/ | access-date=2024-08-14}}</ref>
      *Danish cyclist [[Knud Enemark Jensen]] collapsed and died during the [[Cycling at the 1960 Summer Olympics – Men's team time trial|men's team time trial]] event after fracturing his skull. The death was blamed by some on [[performance enhancing drugs]], and acted as an impetus for future [[drug testing]] at the Olympics.<ref name="d716">{{cite web | last=Gordon | first=Aaron | title=The Morality Myth Behind the Modern Anti-Doping Movement | website=VICE | date=2017-07-13 | url=https://www.vice.com/en/article/the-morality-myth-behind-the-modern-anti-doping-movement/ | access-date=2024-08-21}}</ref>

      ==={{anchor|1964 Summer Olympics}}1964 Summer Olympics – Tokyo, Japan===
      * [[Indonesia]] and [[North Korea]] withdrew after the IOC decision to ban teams that took part in the 1963 [[GANEFO|Games of the New Emerging Forces]] and a three-year violent conflict, the [[Indonesia–Malaysia confrontation]].<ref name=Politics-no-stranger />
      * South Africa was suspended from the Olympics due to its [[Apartheid in South Africa|apartheid policies]].<ref name=Politics-no-stranger /> The suspension would be lifted in 1992.
      *Australian swimmer [[Dawn Fraser]] was arrested for allegedly stealing a flag from the [[Tokyo Imperial Palace]], and was banned by the [[Swimming Australia|Australian national federation]] for ten years.<ref name="s395">{{cite web | title=Dawn Fraser | website=CNN.com | date=2008-01-28 | url=https://www.cnn.com/2008/SPORT/04/30/dawnfraser/index.html | access-date=2024-08-14}}</ref>

      ==={{anchor|1968 Summer Olympics}}1968 Summer Olympics – Mexico City, Mexico===
      * [[1968 Olympics Black Power salute]]: [[Tommie Smith]] and [[John Carlos]], two black athletes who finished the [[Athletics at the 1968 Summer Olympics|men's 200-metre race]] first and third respectively, performed the "Power to the People" salute during the [[National Anthem of the USA|United States national anthem]]. [[Peter Norman]], a white Australian who finished in second place, wore a human rights badge in solidarity, and was heavily criticised upon returning to Australia.
      * [[Věra Čáslavská]], in protest to the [[Warsaw Pact invasion of Czechoslovakia|1968 Soviet-led invasion]] of [[Czechoslovakia]] and the controversial decision by the judges on the [[Balance Beam]] and [[Floor (gymnastics)|Floor]], turned her head down and away from the [[Flag of the Soviet Union|Soviet flag]] whilst the [[State Anthem of the Soviet Union|anthem]] played during the medal ceremony. She returned home as a heroine of the Czechoslovak people, but was made an outcast by the Soviet dominated government.
      * Students in [[Mexico City]] tried to make use of the media attention for their country to protest the authoritarian Mexican government. The government reacted with violence, culminating in the [[Tlatelolco Massacre]] ten days before the Games began and more than two thousand protesters were shot at by government forces.
      * The first Olympic disqualification for a banned substance occurred in the [[Modern pentathlon at the 1968 Summer Olympics|modern pentathlon]] competition, after Swedish athlete [[Hans-Gunnar Liljenwall]] drank two [[beer]]s before the shooting portion, disqualifying the Swedish team from their third place finish.<ref name="v876">{{cite web | last=Gerstner | first=Joanne C. | title=Friday Flashback: Sometimes Being First Doesn't Mean Victory | website=London 2012 | date=2012-05-18 | url=https://archive.nytimes.com/london2012.blogs.nytimes.com/2012/05/18/friday-flashback-sometimes-being-first-doesnt-mean-victory/ | access-date=2024-08-09}}</ref>

      ==={{anchor|1972 Summer Olympics}}1972 Summer Olympics – Munich, West Germany===
      * The [[Munich massacre]] occurred, when members of the Israeli Olympic team were taken hostage by the Palestinian terrorist group [[Black September (group)|Black September]]. Eleven athletes, coaches and judges were murdered by the terrorists.
      * [[Rhodesia]] was banned from participating in the Olympics as the result of a 36 to 31 vote by the IOC held four days before the opening ceremonies. African countries had threatened to boycott the Munich games had the white-minority-ruled regime been permitted to send a team. The ban occurred over the objections of IOC president [[Avery Brundage]] who, in his speech following the Munich massacre, controversially compared the anti-Rhodesia campaign to the terrorist attack on the Olympic village<ref>{{cite news| url=https://news.bbc.co.uk/onthisday/hi/dates/stories/august/22/newsid_3549000/3549444.stm | work=BBC News | title=1972: Rhodesia out of Olympics | date=22 August 1972}}</ref> {{crossreference|(see [[Rhodesia at the Olympics]])}}.
      * In the [[1972 Olympic Men's Basketball Final|controversial gold medal basketball game]], the US team appeared to win the gold medal game against the Soviet team, but the final three seconds were replayed three times until the Soviets won.<ref>{{cite magazine|author=Gary Smith |url=http://sportsillustrated.cnn.com/vault/article/magazine/MAG1003894/6/index.htm |archive-url=https://web.archive.org/web/20121106181303/http://sportsillustrated.cnn.com/vault/article/magazine/MAG1003894/6/index.htm |url-status=dead |archive-date=6 November 2012 |title=Pieces of Silver |magazine=Sports Illustrated|date=1992-06-15 |access-date=2010-08-27}}</ref>
      * The [[1972 Olympics Black Power salute]], also known as the Forgotten Salute.
      * At the end of the [[Athletics at the 1972 Summer Olympics – Men's marathon|men's Marathon]], a German impostor entered the stadium to the cheers of the stadium ahead of the actual winner, [[Frank Shorter]] of the United States. During the [[American Broadcasting Company]] coverage of the event, the guest commentator, writer [[Erich Segal]], famously called to Shorter "It's a fraud, Frank."<ref>{{cite web|url=https://www.washingtonpost.com/wp-srv/polls/sportscalls.htm|title=washingtonpost.com poll|website=Washingtonpost.com|access-date=26 August 2017}}</ref><ref>http://newsblogs.chicagotribune.com/sports_globetrotting/2008/10/marathon-men-th.htm {{dead link|date=August 2017}}</ref>
      * In the men's field hockey final, Michael Krause's goal in the 60th minute gave the host West German team a 1–0 victory over the defending champion Pakistan. Pakistan's players complained about some of the umpiring and disagreed that Krause's goal was good. After the game, Pakistani fans ran onto the field in rage; some players and fans dumped water on Belgium's Rene Frank, the head of the sport's international governing body. During the medals ceremony, the players staged protests, some of them turning their backs to the [[Flag of Germany|West German flag]] and handling their silver medals disrespectfully. According to the story in the ''Washington Post'', the team's manager, G.R. Chaudhry, said that his team thought the outcome had been "pre-planned" by the officials, Horacio Servetto of Argentina and Richard Jewell of Australia.

      ==={{anchor|1976 Summer Olympics}}1976 Summer Olympics – Montreal, Canada===
      [[File:Olympic boycotts from 1976 - 1984.png|thumb|500px|Countries boycotting the 1976 (yellow), 1980 (blue) and 1984 (red) Summer Olympics]]
      * In protest against the [[New Zealand national rugby union team]]'s [[1976 New Zealand rugby union tour of South Africa|1976 tour of South Africa]], controversial due to the regime's [[apartheid]] policies, [[Afghanistan]], [[Albania]], [[Myanmar|Burma]], [[El Salvador]], [[Guyana]], [[Iraq]], [[Sri Lanka]], [[Syria]] and [[Tanzania]], led a boycott of twenty-two African nations after the IOC refused to ban New Zealand from participating. Some of the teams withdrew after the first day.<ref name=Politics-no-stranger /><ref>{{cite web|url=https://nzhistory.govt.nz/media/photo/montreal-olympics-boycott |title=The Montreal Olympics boycott &#124; NZHistory.net.nz, New Zealand history online |publisher=Nzhistory.net.nz |access-date=2009-02-27}}</ref><ref name="bbc">{{cite news|url=https://news.bbc.co.uk/onthisday/hi/dates/stories/july/17/newsid_3555000/3555450.stm |title=BBC ON THIS DAY &#124; 17 &#124; 1976: African countries boycott Olympics |publisher=News.bbc.co.uk |date= 17 July 1976|access-date=2009-02-27}}</ref> The controversy prevented a much anticipated meeting between Tanzanian [[Filbert Bayi]]—the former world record holder in both the [[1500 metres]] and the [[mile run]]—and New Zealand's [[John Walker (runner)|John Walker]]—who had surpassed both records to become the world record holder in both events.  Walker went on to win the gold medal in the 1500 metres.<ref>{{cite magazine|url=http://www.time.com/time/magazine/article/0,9171,914362-2,00.html|archive-url=https://web.archive.org/web/20121106072755/http://www.time.com/time/magazine/article/0,9171,914362-2,00.html|url-status=dead|archive-date=6 November 2012|title=Sport: A Matter of Race|date=19 July 1976|magazine=[[Time (magazine)|Time]]|access-date=26 August 2017|via=www.time.com}}</ref>
      * Canada initially refused to allow the [[Chinese Taipei at the Olympics|Republic of China]]'s team (Taiwan) into the country as Canada did not recognize Taiwan as a nation. Canada's decision was in violation of its agreement with the IOC to allow all recognized teams. Canada agreed to allow the Taiwanese athletes into the country if they did not compete under the name or [[flag of the Republic of China]]. This led to protests and a threatened boycott by other countries including the US, but these came to naught after the IOC acquiesced to the Canadian demand which, in turn, led Taiwan to boycott the Games. The [[China|People's Republic of China]] also continued its boycott over the failure of the IOC to recognize its team as the sole representative of China.<ref>{{cite web|url=https://www.sports-reference.com/olympics/summer/1976/|archive-url=https://web.archive.org/web/20200417040734/https://www.sports-reference.com/olympics/summer/1976/|url-status=dead|archive-date=17 April 2020|title=1976 Montréal Summer Games|work=Olympics at Sports-Reference.com|access-date=19 May 2016}}</ref>
      * The various boycotts resulted in only 92 countries participating, down from 121 in 1972 and the lowest number since the [[1960 Summer Olympics|1960 Rome Games]] in which 80 states competed.
      * Soviet [[Modern pentathlon|modern pentathlete]] [[Boris Onishchenko]] was found to have used an [[épée]] which had a pushbutton on the [[Hilt#Pommel|pommel]] in the fencing portion of the pentathlon event. This button, when activated, would cause the electronic scoring system to register a hit whether or not the épée had actually connected with the target area of his opponent. As a result of this discovery, he and the Soviet pentathlon team were disqualified.<ref name="BBC Fencing">{{cite web|url=https://h2g2.com/edited_entry/A14354192|title=BBC – h2g2 – A Guide To Olympic Sports – Fencing|date=17 November 2006|access-date=2008-08-16}}</ref>
      * [[Quebec]], the host province, incurred $1.5 billion in debt, which was not paid off until December 2006. The [[Mayor of Montreal]] [[Jean Drapeau]] had famously said: "The Olympics can no more lose money than a man can have a baby."<ref>{{cite news|url=https://www.cbc.ca/news/canada/montreal/quebec-s-big-owe-stadium-debt-is-over-1.602530 |title=Quebec's Big Owe stadium debt is over |publisher=Cbc.ca |author=CBC News |date= 19 December 2006|access-date=2009-02-27}}</ref>

      ==={{anchor|1980 Summer Olympics}}1980 Summer Olympics – Moscow, Soviet Union===
      * [[1980 Summer Olympics boycott]]: U.S. President [[Jimmy Carter]] instigated a boycott of the games to protest the [[Soviet–Afghan War|Soviet invasion of Afghanistan]], as the Games were held in [[Moscow]], the capital of the Soviet Union. Many nations refused to participate in the Games. The exact number of boycotting nations is difficult to determine, as a total of 66 eligible countries did not participate, but some of those countries withdrew due to financial hardships, only claiming to join the boycott to avoid embarrassment.{{citation needed|date=February 2013}} Iran also boycotted the Moscow Games owing to [[Ruhollah Khomeini]]'s support for the Islamic Conference's condemnation of the invasion of Afghanistan.<ref>Golan, Galia; Soviet Policies in the Middle East: From World War Two to Gorbachev; p. 193 {{ISBN|9780521358590}}</ref> Only 80 countries participated in the Moscow games, fewer than the 92 that had joined the [[1976 Summer Olympics|1976 Montreal games]] and the lowest number since the [[1960 Summer Olympics|1960 Rome games]] which had also featured 80 countries. A substitute event, titled the [[Liberty Bell Classic]], often referred to as Olympic Boycott Games, was held at the [[University of Pennsylvania]] in [[Philadelphia]] by 29 of the boycotting countries.
      * A 1989 report by a committee of the [[Australian Senate]] claimed that "there is hardly a medal winner at the Moscow Games, certainly not a gold medal winner{{spaces}}... who is not on one sort of drug or another: usually several kinds. The Moscow Games might well have been called the Chemists' Games."<ref>{{cite news|url=https://www.economist.com/blogs/graphicdetail/2016/07/daily-chart-15|newspaper=The Economist|title=Doping violations at the Olympics|access-date=6 June 2017}}</ref> A member of the IOC Medical Commission, Manfred Donike, privately ran additional tests with a new technique for identifying abnormal levels of testosterone by measuring [[Epitestosterone#Detection of athletic doping|its ratio to epitestosterone]] in [[urine]]. Twenty percent of the specimens he tested, including those from sixteen gold medalists would have resulted in disciplinary proceedings had the tests been official. The results of Donike's unofficial tests later convinced the IOC to add his new technique to their testing protocols.<ref name="D. Derse2001">{{cite book|first1=Wayne (PhD)|last1=Wilson|first2=Ed|last2=Derse|title=Doping in Élite Sport: The Politics of Drugs in the Olympic Movement|url=https://archive.org/details/dopinginelitespo00wils|url-access=registration|access-date=19 July 2012|year=2001|publisher=Human Kinetics|isbn=978-0-7360-0329-2|pages=[https://archive.org/details/dopinginelitespo00wils/page/77 77]–}}</ref> The first documented case of "[[blood doping]]" occurred at the 1980 Summer Olympics as a runner was transfused with two units of blood (i.e.{{spaces}}two pints or about {{cvt|2|uspt|ml|disp=out}}) before winning medals in the 5,000&nbsp;m and 10,000&nbsp;m.<ref name="Sytkowski2006">{{cite book|first=Arthur J.|last= Sytkowski|title=Erythropoietin: Blood, Brain and Beyond|url=https://books.google.com/books?id=v135CsEL_LQC&pg=PA187|date=May 2006|publisher=John Wiley & Sons|isbn=978-3-527-60543-9|page=187}}</ref>
      * Polish gold medallist [[pole vault]]er [[Władysław Kozakiewicz]] showed an obscene [[bras d'honneur]] gesture in all four directions to the jeering Soviet public, causing an international scandal and almost losing his medal as a result. There were numerous incidents and accusations of Soviet officials using their authority to negate marks by opponents to the point that [[IAAF]] officials found the need to look over the officials' shoulders to try to keep the events fair. There were also accusations of opening stadium gates to advantage Soviet athletes, and causing other disturbances to opposing athletes.<ref>{{Cite news |date=31 July 1980 |title=Kozakiewicz Sets World Pole Vault Record |newspaper=[[Star-Banner]] |url=https://news.google.com/newspapers?id=aToVAAAAIBAJ&pg=4695,6604124 |location=[[Ocala, Florida]] }}{{Dead link|date=December 2025 |bot=InternetArchiveBot }}</ref><ref>{{cite book|url=https://books.google.com/books?id=LXKQ_gT1w3sC&q=Kozakiewicz+stadium+doors&pg=PA183 |page=183|title=Olympic Sports and Propaganda Games: Moscow 1980|author=Barukh Ḥazan|access-date=2017-08-26|isbn=9781412829953|date=January 1982|publisher=Transaction Publishers }}</ref><ref>{{cite web|url=http://bleacherreport.com/articles/1185110-top-10-scandals-in-summer-olympic-history/page/3|title=Top 10 Scandals in Summer Olympic History|author=Jesse Reed|work=Bleacher Report|access-date=19 May 2016}}</ref><ref>{{cite web|url=http://living.msn.com/life-inspired/lessons-we-can-learn-from-bad-behavior-at-the-olympic-games?pageart=4|archive-url=https://archive.today/20130129053406/http://living.msn.com/life-inspired/lessons-we-can-learn-from-bad-behavior-at-the-olympic-games?pageart=4|url-status=dead|archive-date=29 January 2013|title=Style, Love, Home, Horoscopes & more - MSN Lifestyle|website=Living.msn.com|access-date=19 May 2016}}</ref><ref>{{cite web |url=http://www.polanik.com/english/london-2012/465-moscow-1980 |title=Polanik English |access-date=2012-08-09 |url-status=dead |archive-url=https://archive.today/20130131124650/http://www.polanik.com/english/london-2012/465-moscow-1980 |archive-date=31 January 2013}}</ref>
      *Australian [[triple jump]]er [[Ian Campbell (triple jumper)|Ian Campbell]] was controversially fouled for scraping his foot against the ground, during a jump which would have won him the gold medal over Soviet [[Jaak Uudmäe]]. In 2015, the [[Australian Olympic Committee]] demanded an investigation into the results.<ref name="p662">{{cite web | title=Australia demands probe of triple jump final at 1980 Games | website=Reuters | date=2015-07-25 | url=https://www.reuters.com/article/sports/australia-demands-probe-of-triple-jump-final-at-1980-games-idUSKCN0PZ02B/ | access-date=2024-08-14}}</ref>

      ==={{anchor|1984 Summer Olympics}}1984 Summer Olympics – Los Angeles, California, United States===
      * [[1984 Summer Olympics boycott]]: The Soviet Union and fourteen of its allies boycotted the 1984 Games held in [[Los Angeles]], United States, citing a lack of security for their athletes as the official reason. The decision was regarded as a response to the United States-led boycott issued against the Moscow Olympics four years earlier.<ref name=Soviet-pullout-rocks-Games>{{Cite news |date=9 May 1984|title=Soviet pullout rocks Games|newspaper=[[The Montreal Gazette]] |url=https://news.google.com/newspapers?id=eVwxAAAAIBAJ&pg=1833,4342317}}</ref> The [[Eastern Bloc]] organized its own event, the [[Friendship Games]], instead. The fact that [[Socialist Republic of Romania|Romania]], a [[Warsaw Pact]] country, opted to compete despite Soviet demands led to a warm reception of the Romanian team by the United States. When the Romanian athletes entered during the opening ceremonies, they received a standing ovation from the spectators.<ref>{{cite news |last1=Litsky |first1=Frank |title=President and Pomp Begin Games |url=https://www.nytimes.com/1984/07/29/sports/president-and-pomp-begin-games.html |access-date=2020-08-28 |work=[[The New York Times]] |date=July 29, 1984 |pages=1, 8, § 5 |quote=Of the first 139 nations in the parade, the biggest cheers went to Rumania, the only Warsaw Pact nation competing here.}}</ref><ref>{{cite news |last1=Yake |first1=D. Byron |title='84 Olympics: Gala trumpets in Games |url=https://news.google.com/newspapers?id=QHAuAAAAIBAJ&sjid=tdoFAAAAIBAJ&pg=4162%2C4820549 |access-date=2020-08-28 |work=[[Beaver County Times]] |agency=[[Associated Press|AP]] |date=July 29, 1984 |page=A1, A10 |quote=The Romanians, the only Eastern bloc nation to defy the Soviet boycott, were greeted with a standing ovation.}}</ref> For different reasons, Iran<ref>{{Cite news |date=2 August 1983|title=Iran Announces Boycott of the 1984 Olympics|newspaper=[[The New York Times]] |url=https://www.nytimes.com/1983/08/02/world/around-the-world-iran-announces-boycott-of-the-1984-olympics.html}}</ref> and Libya<ref>Ronen, Yehudit; 'Libya (Al-Jamhāhīriyaa al-'Arabiyya al-Lībiyya ash-Sha‘biyya al-Ishtirākiyya)’; ''Middle East Contemporary Survey'', Vol. 8, (1983-84); p. 595</ref> also boycotted the Games.<ref>Philip D’Agati, ''The Cold War and the 1984 Olympic Games: A Soviet-American Surrogate War'' (2013), p. 132: "Libya also boycotted the Los Angeles Games, but its reason for doing so was caused by the state of Libyan-US relations in 1984 rather than by any political alignment with the Soviet Union".</ref>
      * The [[Boxing at the 1984 Summer Olympics – Light heavyweight|men's light heavyweight boxing]] match between [[Kevin Barry (boxer)|Kevin Barry]] and [[Evander Holyfield]] ended in controversy, when referee Grigorije Novičić of [[Yugoslavia]] disqualified a clearly dominant Holyfield. Barry eventually won the silver medal, with Holyfield settling for bronze.<ref>{{Cite news | url=https://www.nytimes.com/1984/08/11/sports/boxing-us-protest-of-holyfield-loss-is-denied.html |title = Boxing; U.S. Protest of Holyfield Loss is Denied|newspaper = The New York Times|date = 11 August 1984|last1 = Alfano|first1 = Peter}}</ref>
      *In the women's [[Athletics at the 1984 Summer Olympics – Women's 4 × 400 metres relay|4 × 400-meter relay]], injured Puerto Rican runner [[Madeline de Jesus]] enlisted her identical twin sister, Margaret, as an imposter for a qualifying heat. Margaret ran the second leg of the qualifier, and the team advanced but when the chief coach of the Puerto Rican team learned of the ruse, he pulled his team out of the final.<ref name="Twins">{{Cite web |url=https://remezcla.com/sports/in-1984-these-twins-tried-to-pull-off-a-parent-trap-at-the-olympics/ |title=In 1984, These Puerto Rican Twins Hatched an Insane Plan to Switch Places at the Olympics |date=August 18, 2016 |website=Remezcla}}</ref><ref>{{Cite web |url=https://theolympians.co/2017/11/06/the-tale-of-madeline-and-margaret-de-jesus-twins-who-almost-got-away-with-it-at-the-1984-los-angeles-olympics/ |title=The Tale of Madeline and Margaret de Jesus: Twins Who Almost Got Away with It at the 1984 Los Angeles Olympics |first=Roy |last=Tomizawa |date=November 5, 2017 |website=The Olympians}}</ref>
      *In the women's [[Athletics at the 1984 Summer Olympics – Women's 3000 metres|3000 meters]], American [[Mary Decker]] and South African [[Zola Budd]] (representing Great Britain) infamously collided, leaving Decker injured and unable to continue. Budd was initially disqualified from her 7th place finish but was later reinstated.<ref name="p418">{{cite web | last=Henderson | first=Jason | title=Drama and heartbreak in the 1984 Olympic 3000m | website=AW | date=2023-08-10 | url=https://athleticsweekly.com/history/drama-and-heartbreak-in-the-1984-olympic-3000m-1039970454/ | access-date=2024-08-14}}</ref>
      *One third of the United States cycling team was found to have received [[blood doping]].<ref name="e264">{{cite web | title=About one-third of the U.S. Olympic cycling team received... | website=UPI | date=1985-01-09 | url=https://www.upi.com/Archives/1985/01/09/About-one-third-of-the-US-Olympic-cycling-team-received/6161474094800/ | access-date=2024-08-14}}</ref>

      ==={{anchor|1988 Summer Olympics}}1988 Summer Olympics – Seoul, Republic of Korea===
      * The games were [[1988 Summer Olympics boycott|boycotted]] by North Korea and its allies, [[Cuba]], [[People's Democratic Republic of Ethiopia|Ethiopia]], [[Democratic Republic of Madagascar|Madagascar]], and [[Nicaragua]]. [[People's Socialist Republic of Albania|Albania]] and the [[Seychelles]] did not provide reasons for their absence.
      * Canadian sprinter [[Ben Johnson (Canadian sprinter)|Ben Johnson]] was stripped of his gold medal for the 100 metres when he tested positive for [[stanozolol]] after the event.<ref>{{Cite web | url=http://en.espn.co.uk/onthisday/sport/story/283.html | title=Ben Johnson: Drug cheat| work=ESPN.co.uk}}</ref>
      * In a highly controversial 3–2 judge's decision, [[South Korea]]n boxer [[Park Si-Hun]] defeated American [[Roy Jones Jr.]], despite Jones pummelling Park for three rounds, landing 86 punches to Park's 32. Allegedly, Park himself apologized to Jones afterward. One judge shortly thereafter admitted the decision was a mistake, and all three judges voting against Jones were eventually suspended. The official IOC investigation concluding in 1997 found that three of the judges had been wined and dined by South Korean officials. This led to calls for Jones to be awarded a gold medal, but the IOC still officially stands by the decision, despite the allegations.<ref>{{cite news|title=A Sad Day in Seoul|url=http://boxing.about.com/od/history/a/controversy.htm|archive-date=30 March 2009|access-date=9 February 2014|archive-url=https://web.archive.org/web/20090330012950/http://boxing.about.com/od/history/a/controversy.htm|url-status=dead}}</ref>
      * American diver [[Greg Louganis]] suffered a concussion after he struck his head on the springboard during the preliminary rounds. He completed the preliminaries despite his injury, earning the highest single score of the qualifying round for his next dive and repeated the dive during the finals, earning the gold medal by a margin of 25 points. Louganis had been diagnosed [[HIV]]-positive six months prior to the games—a diagnosis that was not publicly disclosed until 1995. This led some to question Louganis' decision not to disclose his HIV status during the Games, although blood in a pool posed no risk.<ref>{{cite web|url=http://www.thedailybeast.com/newsweek/1995/03/05/the-risk-pool-the-dangers-are-off-the-field.html|title=The Daily Beast|website=[[The Daily Beast]]|access-date=19 May 2016}}</ref>

      ==={{anchor|1992 Summer Olympics}}1992 Summer Olympics – Barcelona, Catalonia, Spain===
      * Three British athletes, sprinter [[Jason Livingston]], weightlifters [[Andrew Davies (weightlifter)|Andrew Davies]] and [[Andrew Saxton (weightlifter)|Andrew Saxton]], were sent home after being tested positive for [[anabolic steroid]]s and [[Clenbuterol]].<ref>{{Cite web |date=1992-07-31 |title=The week in review: Sport |url=https://www.independent.co.uk/sport/the-week-in-review-sport-1537516.html |access-date=2022-03-05 |website=The Independent |language=en}}</ref><ref>{{Cite news |last=Drozdiak |first=William |date=1992-07-31 |title=THREE OLYMPIANS FAIL DRUG TESTS BRITISH TEAM SUSPENDS SPRINTER, WEIGHTLIFTERS |language=en-US |newspaper=Washington Post |url=https://www.washingtonpost.com/archive/politics/1992/07/31/three-olympians-fail-drug-tests-british-team-suspends-sprinter-weightlifters/27f804be-6fbb-41db-828e-b9c45b09b306/ |access-date=2022-03-05 |issn=0190-8286}}</ref>
      * Russian weightlifter [[Ibragim Samadov]] was disqualified for a protest after he refused to accept the bronze medal at the medal ceremony. He was eventually banned for life.<ref>{{cite web|last1=Magotra|first1=Ashish|title=You can keep your medal: Sarita Devi is not alone, others have said 'no' too|date=3 October 2014|url=http://www.firstpost.com/sports/you-can-keep-your-medal-sarita-devi-is-not-alone-others-have-said-no-too-1739825.html|publisher=FirstPost|access-date=16 January 2015}}</ref>
      * In the final of the [[Athletics at the 1992 Summer Olympics – Men's 10,000 metres|men's 10,000&nbsp;m]] Moroccan [[Khalid Skah]] was racing Kenyan [[Richard Chelimo]] for the gold medal; with three laps remaining they both lapped Moroccan [[Hammou Boutayeb]]. Although he was lapped he stayed with the leaders, slowing down the Kenyan and inciting the crowd to jeer.<ref name=Buchalter>{{cite news|last1=Buchalter|first1=Bill|title=Moroccan Regains His Gold|url=http://articles.chicagotribune.com/1992-08-05/sports/9203100360_1_khalid-skah-richard-chelimo-hammou-boutayeb|access-date=27 February 2018|work=Orlando Sentinel|publisher=Chicago Tribune|date=5 August 1992|archive-date=27 February 2018|archive-url=https://web.archive.org/web/20180227213816/http://articles.chicagotribune.com/1992-08-05/sports/9203100360_1_khalid-skah-richard-chelimo-hammou-boutayeb|url-status=dead}}</ref> Initially Skah was disqualified for receiving assistance from a lapped runner, but, after an appeal by the Moroccan team to the IAAF, he was reinstated and his gold medal stood.<ref name=Buchalter /><ref>{{cite news|last1=Rowbottam|first1=Mike|title=OLYMPICS / Barcelona 1992: Athletics: Kenyan outcry over Skah's reinstatement|url=https://www.independent.co.uk/sport/olympics-barcelona-1992-athletics-kenyan-outcry-over-skahs-reinstatement-1538331.html|access-date=27 February 2018|work=The Independent|date=4 August 1992}}</ref>
      *Yugoslavia had to compete under the [[Independent Olympic Participants at the 1992 Summer Olympics|Independent Olympic Participants]] label and were banned from team events due to the country's conduct in the [[Yugoslav Wars]] and [[United Nations Security Council Resolution 757|United Nations sanctions]].<ref name="i894"/>

      ==={{anchor|1996 Summer Olympics}}1996 Summer Olympics – Atlanta, Georgia, United States ===
      * The 1996 Olympics were marred by the [[Centennial Olympic Park bombing]].
      * A gold medal boxing match in which [[Daniel Petrov]] from Bulgaria won against [[Mansueto Velasco]] from the [[Philippines]] was described as robbery in the Philippines. One media outlet claimed that it appeared that the judges were pressing the buttons on their electronic scoring equipment for the wrong boxer.<ref>{{cite web|url=http://sports.abs-cbn.com/boxing/news/2016/08/04/throwback-when-robbery-atlanta-denied-onyok-velasco-13978|archive-url=https://web.archive.org/web/20160808104034/http://sports.abs-cbn.com/boxing/news/2016/08/04/throwback-when-robbery-atlanta-denied-onyok-velasco-13978|url-status=dead|archive-date=8 August 2016|title=THROWBACK: When a "robbery in Atlanta" denied Onyok Velasco an Olympic Gold|website=Sports.abs-cbn.com|access-date=21 August 2016}}</ref> However, neutral commentators stated that "[i]n Atlanta [Petrov] proved his supremacy beyond doubt and was never really troubled in any of his 4 fights" and that "Velasco’s attempt to be the Philippines' first Olympic champion faltered from the beginning and [Petrov] was a clear winner by 19 points to 6".<ref name="SRBoxing1996">{{cite web|url=https://www.sports-reference.com/olympics/summer/1996/BOX/mens-light-flyweight.html|archive-url=https://web.archive.org/web/20200418124845/https://www.sports-reference.com/olympics/summer/1996/BOX/mens-light-flyweight.html|url-status=dead|archive-date=18 April 2020|title=Boxing at the 1996 Atlanta Summer Games: Men's Light-Flyweight|website=Sports-reference.com|access-date=21 August 2016}}</ref> ''[[The New York Times]]'' reported that "Daniel Petrov Bojilov ... dominated Mansueto Velasco of the Philippines, 19-6", but acknowledged that "the Filipino deserved more points".<ref name="NYTBoxing1996">{{cite web|url=https://www.nytimes.com/1996/08/04/sports/boxing-s-big-need-spray-or-roll-on.html|title=Boxing's Big Need: Spray or Roll-On|date=4 August 1996|work=The New York Times|access-date=21 August 2016}}</ref>

      ==={{anchor|2000 Summer Olympics}}2000 Summer Olympics – Sydney, Australia===
      * In December 2007, American track star [[Marion Jones]] was stripped of five medals after admitting to [[anabolic steroid]] use. Jones had won three gold medals (100-metre sprint, 200-metre sprint and 4x400 relay) and two bronze medals (long jump and 4x100 relay).<ref name="IOC Strips">{{cite news |url=http://nbcsports.msnbc.com/id/22170098/ |title=IOC strips Jones of all 5 Olympic medals |date=12 December 2007 |agency=Associated Press |work=MSNBC.com |access-date=7 July 2010 |archive-url=https://web.archive.org/web/20080218091719/http://nbcsports.msnbc.com/id/22170098/ |archive-date=18 February 2008 |url-status=dead }}</ref> The IOC action also officially disqualified Jones from her fifth-place finish in the Long Jump at the [[2004 Summer Olympics]].<ref name="IOC Strips" /> At the time of her admission and subsequent guilty plea, Jones was one of the most famous athletes to be linked to the [[BALCO scandal]].<ref name="NYT20071005">{{cite news |access-date=2007-10-05 |url=https://www.nytimes.com/2007/10/05/sports/othersports/05cnd-balco.html?hp=&pagewanted=print |title=Jones Pleads Guilty to Lying About Drugs |first1=Michael S. |last1=Schmidt |first2=Lynn |last2=Zinser |date=5 October 2007 |work=New York Times}}</ref> The case against BALCO covered more than 20 top level athletes, including Jones's ex-husband, [[shot put]]ter [[C.J. Hunter]], and 100&nbsp;m sprinter [[Tim Montgomery]], the father of Jones' first child.
      * [[Lance Armstrong]]: see [[History of Lance Armstrong doping allegations]] see [[Lance Armstrong doping case]] On January 17, 2013, the [[International Olympic Committee]] removed Armstrong's results in the [[2000 Summer Olympics]] from its record books, and requested the return of his [[Olympic medal|bronze medal]] from the time trial.
      * In the Women's artistic gymnastics, Australian competitor [[Allana Slater]] complained that the vault was set too low. The vault was measured and found to be 5 centimetres lower than it should have been. A number of the gymnasts made unusual errors, including American Elise Ray, who missed the vault completely in her warm-up, and Briton [[Annika Reeder]], who fell and had to be carried off the mat after being injured. 
      * Romanian [[Andreea Răducan]] became the first gymnast to be stripped of a medal after testing positive for [[pseudoephedrine]], at the time a prohibited substance.<ref>As of [http://www.wada-ama.org/rtecontent/document/2006_LIST.pdf 2006] {{webarchive|url=https://web.archive.org/web/20080819211130/http://www.wada-ama.org/rtecontent/document/2006_LIST.pdf |date=19 August 2008 }}, pseudoephedrine was not considered a prohibited substance by the [[World Anti-Doping Agency]]. The drug was removed from the prohibited list in [http://www.wada-ama.org/rtecontent/document/040903.pdf 2003] {{webarchive|url=https://web.archive.org/web/20081120030448/http://www.wada-ama.org/rtecontent/document/040903.pdf |date=20 November 2008 }}; the WADA moved the substance to the Monitoring List to assess in-competition use and abuse.</ref> Răducan, 16, took Nurofen, a common over-the-counter medicine, to help treat a fever. The Romanian team doctor who gave her the medication was expelled from the Games and suspended for four years. The gold medal was finally awarded to Răducan's teammate [[Simona Amânar]]. Răducan was allowed to keep her other medals, a gold from the team competition and a silver from the vault.
      * Chinese gymnast [[Dong Fangxiao]] was stripped of a bronze medal in April 2010. Investigations by the sport's governing body (FIG) found that she was only 14 at the 2000 Games. (To be eligible the gymnastic athletes must turn 16 during the Olympic year). FIG recommended the IOC take the medal back as her scores aided [[China]] in winning the team bronze. The US women's team, who had come fourth in the event, moved up to third.<ref>Wilson, Stephen "[http://news.smh.com.au/breaking-news-sport/ioc-strips-china-of-gymnastics-bronze-20100429-tsss.html IOC strips China of gymnastics bronze ]", ''[[Sydney Morning Herald]]'', 29 April 2010. Retrieved 29 April 2010</ref>

      ==={{anchor|2004 Summer Olympics}}2004 Summer Olympics – Athens, Greece===
      *In artistic gymnastics, judging errors and miscalculation of points in two of the three events led to a revision of the gymnastics [[Code of Points (artistic gymnastics)|Code of Points]].<ref>{{cite news |url= https://www.theguardian.com/sport/2012/aug/07/london-2012-gymnastic-gold-epke-zonderland |title= London 2012: Gymnastic gold for true flying Dutchman Epke Zonderland |author= Emma John |newspaper=Guardian |date=7 August 2012 |access-date=9 August 2012 }}</ref> The South Korean team contested Tae-Young's parallel bars score after judges misidentified one of the elements of his routine. Further problems occurred in the [[Gymnastics at the 2004 Summer Olympics – Men's horizontal bar|men's horizontal bar competition]]. After performing a routine with six release skills in the high bar event final (including four in a row—three variations of [[Alexander Vasilyevich Tkachyov|Tkatchev]] releases and a [[Gienger]]), the judges posted a score of 9.725, placing Nemov in third position with several athletes still to compete.{{citation needed|date=August 2021}} The crowd became unruly on seeing the results and interrupted the competition for almost fifteen minutes. Influenced by the crowd's fierce reaction, the judges reevaluated the routine and inflated Nemov's score to 9.762.<ref>{{Cite web |url=http://www.hamm-twins.com/sch/award_704.PDF |title=CAS Arbitral Award: Yang Tae-Young v. FIG |access-date=18 August 2019 |archive-url=https://web.archive.org/web/20070930012019/http://www.hamm-twins.com/sch/award_704.PDF |archive-date=30 September 2007 |url-status=dead }}</ref><ref>{{Cite web | url=http://www.american-gymnast.com/agtc/index.php/2010/01/22/was-there-another-mistake-made-in-the-2004-mens-olympic-all-around/ |title = Was there ANOTHER MISTAKE MADE in the 2004 men's Olympic all-around??? -|date = 22 January 2010}}</ref>
      *While leading in the men's marathon with less than 10 kilometres to go, Brazilian runner [[Vanderlei de Lima]] was attacked by [[de-frocked]] Irish priest [[Neil Horan]] and dragged into the crowd. De Lima recovered to take bronze, and was later awarded the Pierre de Coubertin medal for sportsmanship.<ref>{{cite web|title=Vanderlei Cordeiro de Lima é homenageado por medalha de Atenas|work=Rede do Esporte |url=http://www.brasil2016.gov.br/pt-br/noticias/vanderlei-cordeiro-de-lima-e-homenageado-por-medalha-de-atenas|publisher=Brasil 2016}}</ref>
      *Hungarian fencing official Joszef Hidasi was suspended for two years by the FIE after committing six errors in favour of Italy during the gold-medal match in men's team foil, denying the Chinese opponent the gold medal.<ref>{{cite news|title=IFC: Ref made six errors in favor of Italy|url=https://www.espn.com/olympics/summer04/fencing/news/story?id=1865361|access-date=5 July 2012|newspaper=ESPN|date=22 August 2004}}</ref>
      *Canadian men's rowing pair [[Chris Jarvis (rower)|Chris Jarvis]] and [[David Calder (rower)|David Calder]] were disqualified in the semi-final round after they crossed into the lane belonging to the South African team, interfering with their progress. The Canadians appealed unsuccessfully to the [[Court of Arbitration for Sport]].{{Citation needed|date=April 2011}}
      * In the women's 100&nbsp;m hurdles, Canadian sprinter [[Perdita Felicien]] stepped on the first hurdle, tumbling to the ground and taking Russian [[Irina Shevchenko]] with her. The Russian team filed an unsuccessful protest, pushing the medal ceremony back a day. Track officials debated for about two hours before rejecting the Russian arguments. The race was won by the United States' [[Joanna Hayes]] in Olympic-record time.{{Citation needed|date=April 2011}}
      * Iranian judoka [[Arash Miresmaili]] was disqualified after he was found to be overweight before a judo bout against Israeli [[Ehud Vaks]]. He had gone on an eating binge the night before in a protest against the IOC's recognition of the state of Israel. It was reported that Iranian Olympic team chairman Nassrollah Sajadi had suggested that the Iranian government should give him [[United States dollar|$]]115,000 (the amount he would have received if he had won the gold medal) as a reward for his actions. Then-[[President of Iran]], [[Mohammad Khatami]], who was reported to have said that Arash's refusal to fight the Israeli would be "recorded in the history of Iranian glories", stated that the nation considered him to be "the champion of the 2004 Olympic Games".{{Citation needed|date=April 2011}}
      *[[Pelle Svensson]], a former two-time world champion (Greco-Roman 100&nbsp;kg class) and member of board of FILA from 1990 to 2007, has described FILA as an inherently corrupt organization.<ref name=svensson>{{cite news |first=Daniel |last=Sjöberg |title=Pelle Svensson: Jag blev mordhotad |url=http://www.aftonbladet.se/sportbladet/os2008/article3102369.ab |newspaper=[[Aftonbladet]] |date=2008-08-14 |access-date=2008-08-17 |language=sv}}</ref> During the Games, Svensson served as chairman of the disciplinary committee of FILA.<ref name=svensson/> As he was watching the final in the [[Wrestling at the 2004 Summer Olympics – Men's Greco-Roman 84 kg|men's Greco-Roman wrestling 84 kg class]] between [[Aleksey Mishin (wrestler)|Alexei Michine]] from [[Russia]] and [[Ara Abrahamian]] from Sweden, Svensson witnessed how the Russian team leader [[Mikhail Mamiashvili]] was giving signs to the referee.<ref name=svensson/> When Svensson approached the official and informed him that this was not allowed according to the rules, Mamiashvili responded by saying, "you should know that this may lead to your death."<ref name=svensson/> Svensson later found proof that the Romanian referee was bribed (according to Svensson the referee had received over one million [[Swedish krona]]).<ref name=svensson/>

      ==={{anchor|2008 Summer Olympics}}2008 Summer Olympics – Beijing, China===
      {{Main|Concerns and controversies at the 2008 Summer Olympics}}
      * Players for the Spanish men's basketball teams posed for a pre-Olympic newspaper advertisement in popular Spanish daily ''[[Marca (newspaper)|Marca]]'', in which they were pictured pulling back the skin on either side of their eyes, narrowing them in order to mimic the stereotypes of thin Asian eyes.<ref name="CNN Spain">{{cite news|url=https://edition.cnn.com/2008/WORLD/asiapcf/08/14/olympics.photo.spain.basketball/?iref=mpstoryview|title=Spanish Olympic basketball team in 'racist' photo row – CNN.com|access-date=2008-08-16 | date=14 August 2008}}</ref>
      * Swedish wrestler [[Ara Abrahamian]] placed his bronze medal onto the floor immediately after it was placed around his neck in protest at his loss to Italian [[Andrea Minguzzi]] in the semifinals of the men's [[Wrestling at the 2008 Summer Olympics – Men's Greco-Roman 84 kg|84&nbsp;kg Greco-Roman]] wrestling event.<ref>{{cite web|url=http://www.dailytimes.com.pk/default.asp?page=2008%5C08%5C16%5Cstory_16-8-2008_pg2_14|title=Daily Times – Leading news resource of Pakistan – Abrahamian faces rap for binning bronze|access-date=2008-08-16}}</ref> He was subsequently disqualified by the IOC, although his bronze medal was not awarded to Chinese wrestler [[Ma Sanyi]], who finished fifth.
      * Questions have been raised about the ages of two Chinese female gymnasts, [[He Kexin]] and [[Jiang Yuyuan]]. This is due partly to their youthful appearance, as well as a speech in 2007 by Chinese director of general administration for sport [[Liu Peng (PRC)|Liu Peng]].<ref>{{cite news|url=https://www.latimes.com/sports/la-sp-gymnastics28-2008jul28,0,5659114.story|title=Issues raised about Chinese athletes' ages|access-date=2008-08-16 | work=Los Angeles Times | first=Diane | last=Pucin | date=28 July 2008}}</ref>
      * Norway's last-second goal against South Korea in the handball semifinals put it through to the gold medal game, despite the ball possibly failing to have fully crossed the goal line prior to time expiring. The South Koreans protested and requested that the game continue into overtime. The IHF has confirmed the results of the match.<ref>{{cite web|url=https://sports.yahoo.com/olympics/beijing/handball/news?slug=reu-handballprotest&prov=reuters&type=lgns|title=Handball-S.Korea's appeal against Norway win rejected – Olympics – Yahoo! Sports|access-date=2008-08-24}}</ref>
      * [[Cuba]]n taekwondo competitor [[Ángel Matos]] was banned for life from any international [[taekwondo]] events after kicking a referee in the face. Matos attacked the referee after he disqualified Matos for violating the time limit on an injury timeout.<ref>{{cite news|url=https://www.reuters.com/article/wtMostRead/idUSPEK30514420080823|title=Cuban banned for referee kick – Reuters|access-date=2008-08-24 | date=23 August 2008}}</ref> He then punched another official.<ref>{{cite news|url=http://www.news.com.au/heraldsun/beijing_olympics/beijinggallery/0,27379,5034030-5017127-9,00.html|title=Cuban kicks ref | work=Herald Sun|access-date=2008-08-24}}</ref>
      * China was criticized for their state run athlete training program.<ref name=sacrifice>{{cite news |url = http://www.iht.com/articles/2008/08/05/sports/gymnast.php |title=Chinese gymnast endured childhood sacrifice |work=International Herald Tribune|author=David Barboza |date=5 August 2008}}</ref><ref>{{cite news |url = https://www.nytimes.com/2008/06/20/world/asia/20olympics.html |title=In Quest for Gold and Glory at Olympics, China Pressures Injured Athletes |work=The New York Times |author=Howard W. French| date=20 June 2008}}</ref>
      * By April 2017, the 2008 Summer Olympics had the most (50) Olympic medals stripped for doping violations. The leading country is Russia with 14 medals stripped.

      ==={{anchor|2012 Summer Olympics}}2012 Summer Olympics – London, England, United Kingdom===
      {{Main|Concerns and controversies at the 2012 Summer Olympics}}
      * The North Korean women's football team delayed their game against Colombia for an hour after the players were introduced on the jumbo screen with the [[Flag of South Korea]].<ref>{{cite news|title=London 2012: North Koreans walk off after flag row|url=https://www.bbc.co.uk/news/uk-scotland-18991619|access-date=31 July 2012 | work=BBC News|date=25 July 2012}}</ref>
      * Greek [[triple jump|triple]] and [[long jump]]er [[Paraskevi Papachristou]] was expelled by the [[Hellenic Olympic Committee|Greek Olympic Committee]] after posting a racist remark on social media.<ref>{{cite news|title=Greek triple jumper Paraskevi Papachristou withdrawn from Olympics following racist tweet about African immigrants|url=https://www.independent.co.uk/sport/olympics/news/greek-triple-jumper-paraskevi-papachristou-withdrawn-from-olympics-following-racist-tweet-about-african-immigrants-7976442.html|access-date=25 July 2012|newspaper=Independent|date=25 July 2012|location=London}}</ref><ref>{{cite news|url=https://edition.cnn.com/2012/07/25/world/europe/greece-athlete-apology/index.html?hpt=hp_t2|title=Greek athlete suspended from Olympic team for offensive remarks|date=26 July 2012|access-date=26 July 2012|publisher=CNN}}</ref>
      * South Korean fencer [[Shin A-lam]] lost the semifinal match in the individual épée to Germany's [[Britta Heidemann]], after a timekeeping error allowed Heidemann to score the winning point before time expired. Shin A-lam remained on the [[Piste (fencing)|piste]] for over an hour while her appeal was considered,<ref>{{cite news|title=Fencing Controversy Causes South Korea's Shin A Lam To Protest on Piste|url=https://www.sbnation.com/london-olympics-2012/2012/7/30/3204652/shin-a-lam-2012-olympics-womens-fencing-individual-epee|access-date=31 July 2012}}</ref><ref>{{cite news|title=Olympics fencing: Tearful Shin A Lam denied chance at gold|url=https://www.bbc.co.uk/sport/olympics/19057016|access-date=31 July 2012|archive-url=https://web.archive.org/web/20120730203233/http://www.bbc.co.uk/sport/0/olympics/19057016|archive-date=30 July 2012|url-status=live}}</ref> but the appeal was ultimately rejected and Germany advanced to play for the gold medal. Shin A-Lam was offered a consolation medal but declined the offer.
      * In the [[Gymnastics at the 2012 Summer Olympics – Men's artistic team all-around|men's team artistic gymnastics]], Japan was promoted to the silver medal position after successfully lodging an appeal over [[Kōhei Uchimura]]'s final [[pommel horse]] performance. His fall on the last piece of apparatus had initially relegated the Japanese to fourth, and elevated host Great Britain to silver, and Ukraine to bronze. Although the decision to upgrade the Japanese score was greeted with boos in the arena, the teams involved accepted the correction.<ref>{{cite news|title=Olympic gymnastics: Why does bronze mean so much for Britain?|url=https://www.bbc.co.uk/sport/olympics/19058466|access-date=31 July 2012}}</ref>
      * Swiss footballer [[Michel Morganella]] was expelled from the Olympics after a racist comment on Twitter about Koreans after Switzerland lost 2–1 to South Korea.
      * The [[Boxing at the 2012 Summer Olympics – Men's light flyweight|men's light flyweight boxing]] gold medal match between [[Kaeo Pongprayoon]] of [[Thailand]] and [[Zou Shiming]] of [[China at the 2012 Summer Olympics|China]] was marred by controversy. Zou, the Chinese fighter, won on a controversial decision. Pongprayoon was hit with a two-point penalty for an unclear offence with 9 seconds left in the bout to give the Chinese boxer the victory.
      * During the semi-final women's football match between [[Canada women's national soccer team|Canada]] and the [[United States women's national soccer team|United States]], a time-wasting call was made against the Canadian goalkeeper, [[Erin McLeod]], when she held the ball longer than the allowed six seconds. This violation is called in international play, and is intended to be used during instances of time-wasting.<ref>{{cite web | url=http://thechronicleherald.ca/olympics2012/124836-controversial-women-s-soccer-call-continues-to-baffle-experts | title=SaltWire &#124; Halifax }}</ref>  As a result, the American team was awarded an indirect free-kick in the box. On the ensuing play, Canada was penalized for a handball in the penalty box, with the American team being awarded a penalty kick, which [[Abby Wambach]] converted to tie the game at 3–3. The Americans went on to win the match in extra time, advancing to the gold medal game.<ref>{{cite news |url=https://ca.sports.yahoo.com/blogs/eh-game/controversy-mars-americans-4-3-win-over-canada-220231424.html |title=Controversy mars Americans' 4–3 win over Canada, but shouldn't detract from a great game |work=Yahoo! Sports |date=7 August 2012 |access-date=7 August 2012}}</ref><ref>{{cite news |url=https://www.thestar.com/sports/london2012/football/article/1238210--london-2012-soccer-controversial-call-against-canada-in-u-s-semifinal-rarely-made |title=London 2012 soccer: Controversial call against Canada in U.S. semifinal rarely made |date=7 August 2012 |newspaper=Toronto Star}}</ref> [[FIFA]] responded by stating that the refereeing decisions were correct.<ref>{{cite news |agency=[[Associated Press]] |title=FIFA to probe Canadian remarks |work=Japan Times |date=9 August 2012 |page=17}}</ref><ref>{{cite news |url=http://www.cbc.ca/sports/soccer/story/2012/10/15/sp-soccer-fifa-christine-sinclair-comments-suspension.html |title=Christine Sinclair's suspension wasn't for comments to media |work=CBC News}}</ref><ref>{{cite news |url=https://www.theglobeandmail.com/sports/soccer/an-oral-history/article24914992/ |title=The greatest game of women's soccer ever played |first=Cathal |last=Kelly |newspaper=The Globe and Mail |date=2015-06-12}}</ref>
      *The [[Badminton at the 2012 Summer Olympics – Women's doubles|badminton women's doubles]] tournament became embroiled in controversy during the group stage when eight players (both pairs from [[South Korea at the 2012 Summer Olympics|South Korea]] and one pair each from [[China at the 2012 Summer Olympics|China]] and [[Indonesia]]) were ejected from the tournament by the [[Badminton World Federation]] after being found guilty of "not using best efforts" and "conducting oneself in a manner that is clearly abusive or detrimental to the sport" by playing to lose matches in order to manipulate the draw for the knockout stage.<ref>{{cite news |url=https://www.bbc.co.uk/sport/olympics/19072677 |title=Olympics badminton: Eight women disqualified from doubles |publisher=BBC Sport |date=1 August 2012}}</ref> In one match, both teams made a series of basic errors, and in another the longest rally was just four shots.
      * In a [[Boxing at the 2012 Summer Olympics – Men's bantamweight|men's bantamweight]] early round boxing match, Japanese boxer [[Satoshi Shimizu]] floored [[Magomed Abdulhamidov]] of [[Azerbaijan]] six times in the third round.  The referee, Ishanguly Meretnyyazov of [[Turkmenistan]], never scored a count in each of the six knockdowns and let the fight continue.  Meretnyyazov claimed they were slips, and even fixed Abdulhamidov's headgear during the affair.  Abdulhamidov had to be helped to his corner following the round.  The fight was scored 22–17 in favour of Abdulhamidov.  [[International Boxing Association (amateur)|AIBA]], the governing body for Olympic boxing, overturned the result following an appeal by Japan.<ref>{{cite news| url=https://www.theguardian.com/sport/2012/aug/02/olympics-boxing-satoshi-shimizu-appeal | work=The Guardian | title=Olympic boxing: referee sent home after Satoshi Shimizu wins appeal}}</ref>
      * By April 2017, the Olympics had 29 Olympic medals stripped for doping violations. The leading country is [[Russia at the 2012 Summer Olympics|Russia]] with 13 medals stripped.

      ==={{anchor|2016 Summer Olympics}}2016 Summer Olympics – Rio de Janeiro, Brazil===
      {{Main|Concerns and controversies at the 2016 Summer Olympics}}
      * Russian doping scandal and participation restrictions - {{See also|Doping in Russia|McLaren Report|Russia at the 2016 Summer Olympics|Independent Olympians at the Olympic Games}}
      * During a women's volleyball [[Volleyball at the 2016 Summer Olympics – Women's qualification#World qualification tournaments|qualification tournament]], a match between [[Japan]] and [[Thailand]] caused controversy after the Thai team were given two red cards during the final set.<ref>{{cite web|url=http://www.flovolleyball.tv/article/41944-controversial-win-for-japan-over-thailand-in-olympic-qualifier|title=Controversial Win For Japan Over Thailand in Olympic Qualifier|website=Flovolleyball.tv|date=19 May 2016 |access-date=21 August 2016}}</ref><ref>{{cite web|url=http://www.nationmultimedia.com/sports/Thailand-go-down-to-Japan-in-close-battle-amidst-c-30286282.html|archive-url=https://web.archive.org/web/20160522044317/http://www.nationmultimedia.com/sports/Thailand-go-down-to-Japan-in-close-battle-amidst-c-30286282.html|url-status=dead|archive-date=22 May 2016|title=Thailand go down to Japan in close battle amidst controversial referee's decision - The Nation|first=Nation Multimedia Group Public Company Limited, Nationmultimedia.com|last=Thailand|website=Nationmultimedia.com|access-date=21 August 2016}}</ref> Japan finished the tournament third and qualified for the Olympics, while Thailand finished fifth and did not qualify. The [[FIVB]] declined to review the match.<ref>{{cite web|url=http://bangkok.coconuts.co/2016/05/25/volleyball-drama-fivb-refuses-evaluate-judge-who-gave-thailand-red-cards|title=Volleyball drama: FIVB refuses to evaluate judge who gave Thailand red cards|date=25 May 2016|website=Bangkok.coconuts.co|access-date=21 August 2016}}</ref>
      * [[Islam El Shehaby]], an Egyptian judoka, refused to shake hands and bow to his opponent after being defeated by the Israeli [[Or Sasson]].<ref>{{cite web|url=http://www.egyptindependent.com/news/olympics-ethics-committee-warns-egyptian-judoka-shehabi|title=Olympics ethics committee warns Egyptian judoka Shehabi - Egypt Independent|date=15 August 2016|website=Egyptindependent.com|access-date=26 August 2017}}</ref>
      * [[Lochtegate]]: [[Ryan Lochte]], [[Jimmy Feigen]], [[Gunnar Bentz]], and [[Jack Conger]], allegedly vandalized a gas station bathroom, and were forced to pay for the damage by two security men who brandished a gun at the swimmers before a translator arrived. The swimmers later claimed to have been pulled over and robbed by gunmen wearing police uniforms. The [[Federal Police of Brazil]] detained Feigen, Bentz, and Conger (Lochte having already left the country) after it was determined that the swimmers had made false reports to the police of being robbed.<ref>{{cite web|url=http://m.oglobo.globo.com/rio/policia-federal-retira-nadadores-americanos-de-aviao-para-os-eua-19945146|title=Polícia Federal retira nadadores americanos de avião para os EUA|date=17 August 2016|website=M.oglobo.globo.com|access-date=21 August 2016}}</ref> All of the swimmers involved would receive [[Lochtegate#Discipline of the athletes|various punishments and suspensions relating to their conduct during the incident]] by USA Swimming and USOC.
      * During the weightlifting tournament, Iran's [[Behdad Salimi]] broke the world record in the snatch weightlifting of the [[Weightlifting at the 2016 Summer Olympics – Men's +105 kg|Men's over 105-kilogram class]], but was later disqualified in the [[clean and jerk]] stage.{{citation needed|date=July 2021}}<!--Does anyone have proof that he was disqualified?--> The [[Iranian National Olympic Committee]] filed an appeal to the Court of Arbitration for Sport against the [[International Weightlifting Federation]] (IWF), and the IWF's website was hacked by protestors.<ref>{{cite web|url=https://www.japantimes.co.jp/article-expired/|title=Article expired|date=10 May 2013|website=The Japan Times|access-date=26 August 2017}}</ref><ref>[https://smsprio2016-a.akamaihd.net/_odf-documents/W/L/WLM025000_Results_2016_08_16_f276a9f1_68df_4197_ba6d_977b1e9ea19f.pdf Temp Weightlifting Men's +105 kg Results] {{webarchive|url=https://web.archive.org/web/20160920162559/https://smsprio2016-a.akamaihd.net/_odf-documents/W/L/WLM025000_Results_2016_08_16_f276a9f1_68df_4197_ba6d_977b1e9ea19f.pdf |date=20 September 2016 }}</ref><ref>{{cite news|url=http://en.mehrnews.com/news/119018/Iran-files-application-to-CAS-on-Salimi-s-case|title=Iran files application to CAS on Salimi's case|date=17 August 2016|newspaper=Mehr News Agency|access-date=26 August 2017}}</ref> The CAS dismissed the appeal due to a lack of evidence that the disqualification was made in bad faith.<ref>{{cite web|url=http://www.lawinsport.com/sports-law-news/item/cas-rio-the-cas-ad-hoc-division-in-rio-closes-with-a-total-of-28-procedures-registered|title=CAS Rio: The CAS ad hoc division in Rio closes with a total of 28 procedures registered|first=Manali|last=Kulkarni|website=Lawinsport.com|access-date=26 August 2017}}</ref><ref>{{cite web|url=http://www.tas-cas.org/fileadmin/user_upload/FINAL_Award_16-28.pdf|title=CAS OG 16/28 Behdad Salimi & NOCIRI v. IWF|website=Tas-cas.org|access-date=26 August 2017|archive-url=https://web.archive.org/web/20170204160245/http://www.tas-cas.org/fileadmin/user_upload/FINAL_Award_16-28.pdf|archive-date=4 February 2017|url-status=dead}}</ref>
      * Nine Australian athletes had their passports seized by Brazilian police and were fined R$10,000 ([[United States dollar|US$]]3,000) after it was revealed they had falsified their credentials in order to watch a basketball game between Serbia and Australia.<ref>{{cite web|url=http://www1.folha.uol.com.br/esporte/olimpiada-no-rio/2016/08/1805196-dez-atletas-australianos-sao-detidos-apos-tentativa-de-adulterar-credenciais.shtml|title=Dez atletas australianos são detidos após tentativa de adulterar credenciais|date=20 August 2016|publisher=Folha de São Paulo|access-date=21 August 2016}}</ref>
      * During the second bronze medal match between [[Uzbekistan]]'s [[Ikhtiyor Navruzov]] and [[Mongolia]]'s [[Ganzorigiin Mandakhnaran]] in the [[Wrestling at the 2016 Summer Olympics – Men's freestyle 65 kg|65 kg freestyle wrestling]], Mandakhnaran held a lead of 7-6 near the end of the match and began celebrating before it had concluded. In response, Ikhtiyor was awarded a penalty point for Mandakhnaran "failing to engage" during the end of the match, which resulted in a 7–7 draw. Ikhtiyor won the game and the bronze due to being the last to score. The Mongolian coaches protested the point, which could not be challenged, by stripping in front of the judges on the mat, resulting in a shoe being sent into the judges' table. Ikhtiyor was awarded a second penalty point as the coaches were escorted away from the mat, leading to the final score being 7–8.<ref>{{cite web|url=https://smsprio2016-a.akamaihd.net/_odf-documents/W/R/WRM265252_MatchResult_2016_08_21_923e7520_7c98_45e9_8625_bd6840a3a7e2.pdf|title=Wrestling - Men's Freestyle 65 kg - Match Number 398 - Mat B|date=21 August 2016|publisher=[[Rio 2016]]|access-date=22 August 2016|url-status=dead|archive-url=https://web.archive.org/web/20160920210139/https://smsprio2016-a.akamaihd.net/_odf-documents/W/R/WRM265252_MatchResult_2016_08_21_923e7520_7c98_45e9_8625_bd6840a3a7e2.pdf|archive-date=20 September 2016}}</ref><ref>{{cite web|url=https://www.usatoday.com/story/sports/olympics/rio-2016/2016/08/21/mongolian-wrestling-coaches-go-nuts-strip-down-after-unfavorable-decision/89076210/|title=Mongolian wrestling coaches go nuts, strip down after unfavorable decision|website=Usatoday.com|access-date=26 August 2017}}</ref><ref>{{cite web|url=http://www.news.com.au/sport/olympics/mongolian-coaches-strip-in-front-of-judges-to-protest-bronzemedal-controversy/news-story/97723352c5e1312fc1114a18041167f9|title=Olympic coaches strip in front of everyone|website=News.com.au|access-date=26 August 2017|date=21 August 2016}}</ref>
      *Controversy surrounded the new judging system in [[boxing at the 2016 Summer Olympics|boxing]]; the new counting system had five judges who judged each bout, and a computer randomly selected three whose scores are counted. Traditionally, judges would use a computer scoring system to count each punch landed, but in 2016 the winner of each round was awarded 10 points and the loser a lower number, based on criteria which includes the quality of punches landed, effective aggression and tactical superiority.<ref name="bbc.com">{{cite news|url=https://www.bbc.com/sport/olympics/37100323|title=Rio Olympics 2016: Boxing judges are 'crazy' over new scoring system|publisher=BBC|work=BBC Sport|date=16 August 2016}}</ref> Two results in particular attracted controversy, both involving Russian athletes whose victories were put in question: the defeat of [[Vasily Levit]] by Russian [[Evgeny Tishchenko]] in the [[Boxing at the 2016 Summer Olympics – Men's heavyweight|men's heavyweight]] gold-medal fight<ref>{{cite web|url=http://www.boxingnewsonline.net/olympic-heavyweight-final-booed-at-rio-2016/|title=Olympic heavyweight final booed at Rio 2016|publisher=Boxing News|date=16 August 2016}}</ref> and the defeat of [[Michael Conlan (boxer)|Michael Conlan]] by [[Vladimir Nikitin (boxer)|Vladimir Nikitin]] in the [[Boxing at the 2016 Summer Olympics – Men's bantamweight|men's bantamweight]] quarter-final, after which Conlan accused [[International Boxing Association (amateur)|AIBA]] and the Russian team of cheating, even [[Twitter|tweeting]] to [[President of Russia]] [[Vladimir Putin]], "Hey Vlad, how much did they charge you bro??".<ref name="bbc.com"/><ref>{{cite web|url=http://www.sportsjoe.ie/boxing/michael-conlan-calls-out-vladimir-putin-in-first-tweet-since-controversial-loss/91543 |title=Michael Conlan calls out Vladimir Putin in first tweet since controversial loss |publisher=[[SportsJOE.ie]]}}</ref> The AIBA removed an unspecified number of judges and referees following the controversy, stating that they "determined that less than a handful of the decisions were not at the level expected" and "that the concerned referees and judges will no longer officiate at the Rio 2016 Olympic Games"; however, the original decisions stood.<ref>{{cite web|url=http://www.itv.com/news/utv/2016-08-17/number-of-olympic-boxing-judges-dropped-from-duty/|title=Number of Olympic boxing judges dropped from duty|date=17 August 2016|publisher=ITV}}</ref><ref>{{cite web|url=http://www.skysports.com/boxing/news/12183/10540724/rio-olympics-boxing-judges-sent-home-in-wake-of-michael-conlan-loss|title=Olympic Boxing: Judges sent home amid criticism|date=17 August 2016|publisher=SkySports}}</ref>
      * In December 2016, Russian boxer [[Misha Aloyan]] was stripped of the silver medal in [[Boxing at the 2016 Summer Olympics – Men's flyweight|52&nbsp;kg boxing]] at the Games for testing positive for [[tuaminoheptane]].<ref>{{cite web|url=http://www.tas-cas.org/fileadmin/user_upload/Media_Release_AD_16-10_and_16_11.pdf|title=CAS AD 16/10 and 16/11. The Anti-doping Division of the Court of Arbitration for Sport Issues Decisions in the Cases of Gabriel Sincrain (ROM/Weightlifting-85kg) and Misha Aloian (RUS/Boxing-52kg)|date=8 December 2016|publisher=Court of Arbitration for Sport|access-date=8 December 2016|archive-url=https://web.archive.org/web/20161222120252/http://www.tas-cas.org/fileadmin/user_upload/Media_Release_AD_16-10_and_16_11.pdf|archive-date=22 December 2016|url-status=live}}</ref>

      ==={{anchor|2020 Summer Olympics}}2020 Summer Olympics – Tokyo, Japan===
      {{Main|Concerns and controversies at the 2020 Summer Olympics}}
      *In the wake of the global [[COVID-19 pandemic]], the Games were postponed for the first time in the 124-year history of the modern Olympics.<ref>{{cite web |url=https://www.olympic.org/news/joint-statement-from-the-international-olympic-committee-and-the-tokyo-2020-organising-committee |title=Joint Statement from the International Olympic Committee and the Tokyo 2020 Organising Committee |date=24 March 2020 |website=olympic.org |publisher=[[International Olympic Committee|IOC]] |type=press release |access-date=26 January 2021 |url-status=live |archive-url=https://web.archive.org/web/20200419063520/https://www.olympic.org/news/joint-statement-from-the-international-olympic-committee-and-the-tokyo-2020-organising-committee |archive-date=19 April 2020}}</ref> The Games were held in July and August 2021, despite many concerns that the Delta variant of COVID-19 posed a serious threat.{{Citation needed|date=August 2021}}
      *[[Fethi Nourine]], an Algerian judoka competing in the [[Judo at the 2020 Summer Olympics – Men's 73 kg|men's 73&nbsp;kg class]], was sent home from the Tokyo Olympics after he withdrew from the competition after refusing to compete against an Israeli opponent, [[Tohar Butbul]].<ref>{{Cite web|url=https://www.theguardian.com/sport/2021/jul/24/algerian-judoka-sent-home-from-olympics-after-refusing-to-compete-against-israeli|title = Algerian judoka sent home from Olympics after refusing to face Israeli|website = [[TheGuardian.com]]|date = 24 July 2021}}</ref> The [[International Judo Federation]] (IJF) announced the immediate suspension of Nourine and his coach on 24 July 2021, pending a further investigation, while the Algerian Olympic Committee revoked their accreditation, and sent Nourine and his coach back home to Algeria.<ref>{{Cite web|url=https://www.japantimes.co.jp/sports/2021/07/24/olympics/summer-olympics/olympic-judo/algeria-athlete-judo-withdrawal-israel/|title = Algerian judoka Fethi Nourine suspended and sent home for withdrawing to avoid Israeli|date = 24 July 2021}}</ref> Nourine and coach [[Amar Benikhlef]] were banned from international competition for ten years.<ref>{{cite news | url=https://www.bbc.co.uk/sport/olympics/58556940 | title=Algerian judoka & coach get 10-year ban | work=BBC Sport }}</ref>
      *Oceania's rhythmic gymnastics qualification for the Tokyo Olympics was conducted with severe breaches that resulted in change of ranking for Olympic nomination and selection. A 1.5-year-long investigation by Gymnastics Ethics Foundation found serious misconduct by qualification event's organisers, administrators and officials. As a result Gymnastics Australia, Oceania Gymnastics Union, an administrator and two judges were sanctioned.<ref>{{Cite web |date= |title=Decision of the Disciplinary Commission of the Gymnastics Ethics Foundation |url=https://www.gymnasticsethicsfoundation.org/_files/ugd/992b6c_47662b7b93e747dcaa81939f7585f11d.pdf |url-status=live |archive-url=https://web.archive.org/web/20230313141717/https://www.gymnasticsethicsfoundation.org/_files/ugd/992b6c_47662b7b93e747dcaa81939f7585f11d.pdf |archive-date=2023-03-13 }}</ref>

      ==={{anchor|2024 Summer Olympics}}2024 Summer Olympics – Paris, France===
      {{main|Concerns and controversies at the 2024 Summer Olympics}}
      *[[Canada Soccer drone spying scandal]]: In July 2024, staff from the [[Canadian Soccer Association]] were discovered to be using [[drone surveillance]] to spy on a training session for the [[New Zealand women's national football team]] at the [[Football at the 2024 Summer Olympics – Women's tournament|2024 Summer Olympics]]. 
      *Palestinian sports organizations and sports organizations from Arab countries have called for sanctions to be imposed against [[Israel]] and to prevent its participation in the [[2024 Summer Olympics]] due to the [[Gaza war]] in the [[Gaza Strip]]. The calls from the organizations have been prompted by concerns about the war's impact on Palestinian athletes and sports facilities.<ref>{{cite news |last1=Zirin |first1=Dave |date=10 January 2024 |title=Will the IOC Do Anything About the Killing of Palestinian Athletes? |url=https://www.thenation.com/article/society/ioc-israel-palestine-olympics/ |work=[[The Nation]]}}</ref>
      *[[Imane Khelif]]:  after she faced intense public scrutiny over her eligibility to compete in the women's category, including from celebrities and world leaders. Khelif became the target of online abuse and misinformation, such as false claims that she was a man. In response, Khelif said that the backlash she received "harms human dignity" and called for an end to the [[bullying]] of athletes. Khelif filed a criminal complaint in France against unspecified individuals for [[cyberbullying]], naming in it [[J. K. Rowling]] and [[Elon Musk]] among others.
      *Representatives of the organizations Safe Space Club and Right to Equality have criticized the [[Dutch Volleyball Association]] and Dutch Olympic organizers' decision to allow convicted child rapist [[Steven van de Velde]] to represent the Netherlands in the 2024 Summer Olympics.<ref name="g182">{{citation | last=Moses | first=Claire | title=Dutch Olympic Organizers Defend Participation of Athlete Convicted of Rape | newspaper=[[The New York Times]] | date=2024-06-28 | issn=0362-4331 | url=https://www.nytimes.com/2024/06/28/world/europe/steven-van-de-velde-dutch-volleyball-olympics.html | language=en-US | access-date=2024-06-30 | page=}}</ref> General director of the Dutch Volleyball Association Michel Everaert announced the organization's support for van de Velde's participation and the [[Dutch Olympic Committee]] stated, "Van de Velde now meets all the qualification requirements for the Olympic Games and is therefore part of the team."<ref name="k164">{{cite web | title=Dutch Olympic organizers stand by qualification of athlete convicted of rape | website=TODAY.com | date=2024-06-29 | url=https://www.today.com/news/sports/steven-van-de-velde-netherlands-volleyball-controversy-rcna159587 | access-date=2024-06-30}}</ref>
      *The Olympic Council of Malaysia received wide-spread online backlash in response to the release of their [[2024 Malaysia Olympic attire controversy|2024 official attire]]. The critiques of the attire focused largely on the visual design, which some individuals felt was overly simple and unattractive.<ref>{{cite web |title=Malaysia to redesign 'ugly' Olympic kit after fan backlash |url=https://www.nbcrightnow.com/national/malaysia-to-redesign-ugly-olympic-kit-after-fan-backlash/article_2828810d-7b7c-5f48-a73a-599225d40f60.html |website=NBCrightnow.com |date=28 June 2024 |publisher=National Broadcasting Company}}</ref><ref>{{cite web |last1=Farid |first1=Aminah |title=Paris Olympics 2024: Malaysia agrees to redesign official kit after widespread ridicule |url=https://www.scmp.com/week-asia/lifestyle-culture/article/3268374/paris-olympics-2024-malaysian-designers-ex-athlete-join-backlash-over-sports-day-kit |website=scmp.com |date=28 June 2024 |access-date=July 30, 2024}}</ref><ref>{{cite web |title="Who approved the design?" - Malaysia's 2024 Olympic Paris attire draws flak online |url=https://thesun.my/style-life/going-viral/who-approved-the-design-malaysia-s-2024-olympic-paris-attire-draws-flak-online-IE12610932 |work=The Sun |access-date=July 30, 2024}}</ref> In response to the criticism, Malaysia released re-designed official attire for the 2024 Malaysian Olympic team.<ref>{{cite web |title=Malaysia unveils 'fiercer-looking' Olympic kit design after criticism, apology over 'cheap-looking' outfits |url=https://www.channelnewsasia.com/asia/malaysia-olympic-paris-2024-kit-outfit-design-ugly-mannequins-tiger-stripes-4451206 |website=channelnewsasia.com |access-date=July 30, 2024}}</ref><ref>{{cite web |title=New "More Striking Tiger Stripe Design" Attire for 2024 Olympic M'sian Contingent Unveiled After Backlash |url=https://worldofbuzz.com/new-more-striking-tiger-stripe-design-attire-for-2024-olympic-msian-contingent-unveiled-after-backlash/ |website=Worldofbuzz.com |date=2 July 2024 |access-date=July 30, 2024}}</ref>

      ==Winter Olympics==
      ==={{anchor|1924 Winter Olympics}}1924 Winter Olympics – Chamonix, France===
      *In the 500-metre speed skating race, the Norwegian team contended the event had been [[hand timing|hand timed]] incorrectly in favor of American gold medalist [[Charles Jewtraw]]. Jewtraw won over Norwegian [[Oskar Olsen]] by a fifth of a second.<ref name="n024">{{cite web | last=Kennedy | first=Lesley | title=6 Scandals That Rocked the Winter Olympics | website=HISTORY | date=2021-12-22 | url=https://www.history.com/news/winter-olympics-scandals-controversy-harding-kerrigan | access-date=2024-08-14}}</ref>

      ==={{anchor|1928 Winter Olympics}}1928 Winter Olympics – St Moritz, Switzerland===
      * In the 10,000-metre speed skating race, American [[Irving Jaffee]] was leading the competition, having outskated Norwegian defending world champion [[Bernt Evensen]] in their heat, when rising temperatures thawed the ice.<ref name="google5">{{cite book|url=https://books.google.com/books?id=Xcfef_d2es4C&pg=PA43 |title=The Big Book of Jewish Sports Heroes: An Illustrated Compendium of Sports History and The 150 Greatest Jewish Sports Stars |year= 2007|isbn=9781561719075 |access-date=27 February 2011|last1=Horvitz |first1=Peter S. |publisher=SP Books }}</ref> In a controversial ruling, the Norwegian referee canceled the entire competition. Although the IOC reversed the referee's decision and awarded Jaffee the gold medal, the [[International Skating Union]] later overruled the IOC and restored the ruling.<ref name="google6">{{cite book|url=https://books.google.com/books?id=Qpiphgls99IC&pg=PA141 |title=The International Jewish Sports Hall ... |date=15 September 1906 |isbn=9781561710287 |access-date=27 February 2011|last1=Siegman |first1=Joseph M. |publisher=SP Books }}</ref> Evensen, for his part, publicly said that Jaffee should be awarded the gold medal, but that never happened.

      ==={{anchor|1932 Winter Olympics}}1932 Winter Olympics – Lake Placid, New York, United States===
      *The [[bobsledding]] venue was set to be constructed on the land of the [[Lake Placid Club]], which caused controversy as the club had an exclusionary policy towards [[Jews]]. A solution was found where the land for the bobsledding run would become [[public land]].<ref name="x206">{{cite web | last=Metraux | first=Julia | title=Antisemitism at the 1932 Winter Olympics | website=JSTOR Daily | date=2022-01-24 | url=https://daily.jstor.org/antisemitism-at-the-1932-winter-olympics/ | access-date=2024-08-21}}</ref><ref name="x394">{{cite web | last=Kamins | first=Toni L. | title=Jews Win Fight Against Anti-semitic Lake Placid Club | website=Jewish Telegraphic Agency | date=1930-11-23 | url=https://www.jta.org/archive/jews-win-fight-against-anti-semitic-lake-placid-club | access-date=2024-08-21}}</ref>
      *A major controversy in speed skating came when organizers decided to hold competitions under "North American rules", where six speed skaters raced each other at a time instead of the usual two. Finland's [[Clas Thunberg]], who had won seven medals at the previous two Olympics, refused to participate in disgust.<ref name="t658">{{cite web | title=Speed Skating 101: Olympic history | website=NBC Olympics | date=2022-02-06 | url=https://www.nbcolympics.com/news/speed-skating-101-olympic-history | access-date=2024-08-21}}</ref>

      ==={{anchor|1936 Winter Olympics}}1936 Winter Olympics – Garmisch-Partenkirchen, Germany===
      *Austrian and Swiss [[alpine skier]]s boycotted the event after the IOC ruled that [[ski instructor]]s could not compete in the Olympics due to being considered professionals.<ref name="q336">{{cite web | title=Garmisch-Partenkirchen 1936 Winter Olympics | website=Olympics.com | date=2018-04-25 | url=https://olympics.com/en/olympic-games/garmisch-partenkirchen-1936 | access-date=2024-08-21}}</ref>

      === 1940 and 1944 Winter Olympics (not held due to World War II)===
      *The 1940 and 1944 Winter Olympics were cancelled due to World War II. The IOC controversially awarded [[Garmisch-Partenkirchen]], Germany hosting rights on June 9, 1939, fifteen months after the [[German invasion of Austria]]. [[Sapporo]] and [[St. Moritz]] had previously withdrawn.<ref name="y660">{{cite web | last=Owen | first=David  | title=The appalling decision to award the ill-fated 1940 Winter Olympics to Germany | website=insidethegames.biz | date=1939-06-09 | url=https://www.insidethegames.biz/articles/1079992/the-appalling-decision-to-award-the-ill-fated-1940-winter-olympics-to-germany | access-date=2024-08-21}}</ref>

      ==={{anchor|1948 Winter Olympics}}1948 Winter Olympics – St. Moritz, Switzerland===
      *In the [[Ice hockey at the 1948 Winter Olympics|ice hockey tournament]], two teams from the United States representing different federations sent their own teams. The IOC voted to bar both teams from the Games, but the Swiss organizing committee allowed the American Hockey Association team to take part. The team finished fourth, but a year later the IOC disqualified both United States teams.<ref name="x011">{{cite news | title=1948, St. Moritz, Switzerland | newspaper=Washington Post | url=https://www.washingtonpost.com/wp-srv/sports/longterm/olympics1998/history/years/1948.htm | access-date=2024-08-21}}</ref>
      *The bobsled events were marred by allegations of sabotage, after the steering on the United States sleds was reportedly tampered with. A [[truck driver]] later admitted to causing the damage by accidentally backing into the shed where the sleds were kept.<ref name="v780">{{cite web | last=James | first=Helen | title=Post-war Olympic camaraderie in St Moritz | website=SWI swissinfo.ch | date=2018-02-03 | url=https://www.swissinfo.ch/eng/life-aging/swisshistorypics_post-war-olympics-camaraderie-in-st-moritz-in-1948/43863610 | access-date=2024-08-21}}</ref>

      ==={{anchor|1952 Winter Olympics}}1952 Winter Olympics – Oslo, Norway===

      * In the bobsledders competition, Andreas Ostler and Lorenz Nieberl (From the Germany Team) each won 2 medals. However, other teams complained that the size and momentum of the bobsleigh is not fair to them due to theirs were over 1000 pounds (Around 454&nbsp;kg). Therefore, after the Oslo Winter Games, a weight limit of 880 pounds (400&nbsp;kg) was enforced.<ref>{{Cite web |last=Adam |first=Augustlyn |title=Oslo 1952 Olympic Winter Games |url=https://www.britannica.com/event/Oslo-1952-Olympic-Winter-Games}}</ref>

      ==={{anchor|1956 Winter Olympics}}1956 Winter Olympics – Cortina d'Ampezzo, Italy===
      {{Empty section|date=August 2024}}

      ==={{anchor|1960 Winter Olympics}}1960 Winter Olympics – Squaw Valley, California, United States===
      *The organizing committee controversially refused to construct a bobsled track for the Games, making 1960 the only Winter Olympics where bobsledding events were not held.<ref name="i600">{{cite journal| last=Wakefield | first=Wanda Ellen | title=The Bobsled Controversy and Squaw Valley's Olympic Winter Games | journal=Cultural Imperialism in Action Critiques in the Global Olympic Trust | date=2006-01-01 | pages=169–179 | url=https://digital.la84.org/digital/collection/p17103coll10/id/13585/ | access-date=2024-08-21}}</ref>

      ==={{anchor|1964 Winter Olympics}}1964 Winter Olympics – Innsbruck, Austria===
      *Two athletes died during training: British luger [[Kazimierz Kay-Skrzypecki]] and Australian alpine skier [[Ross Milne (alpine skier)|Ross Milne]].<ref name="j158">{{cite web | title=Milne, 19, Loses Control at 60 M.P.H. and Runs Into Tree in DriII | website=The New York Times | date=1964-01-26 | url=https://www.nytimes.com/1964/01/26/archives/milne-19-loses-control-at-60-mph-and-runs-into-tree-in-driii.html | access-date=2024-08-21}}</ref> There were complaints that the tracks were not safe.<ref name="i219">{{cite web | last=Weinman | first=Jaime | title=Other deaths on the track | website=Macleans | date=2010-02-12 | url=https://macleans.ca/uncategorized/other-deaths-on-the-track/ | access-date=2024-08-21}}</ref>

      ==={{anchor|1968 Winter Olympics}}1968 Winter Olympics – Grenoble, France===
      * French skier [[Jean-Claude Killy]] achieved a clean sweep of the then-three alpine skiing medals at [[Grenoble]], but only after what the IOC bills as the "greatest controversy in the history of the Winter Olympics".<ref>[http://www.olympic.org/uk/games/past/index_uk.asp?OLGT=2&OLGY=1968 www.Olympic.org] IOC, 1968 Grenoble Games.</ref> The slalom run was held in poor visibility and Austrian skier [[Karl Schranz]] claimed a course patrolman crossed his path during the slalom race, causing him to stop. Schranz was given a restart and posted the fastest time. A Jury of Appeal then reviewed the television footage, declared that Schranz had missed a gate on the upper part of the first run, annulled his repeat run time, and gave the medal to Killy.<ref>{{cite magazine|last1=Jenkins|first1=Dan|title=JEAN-CLAUDE WINS THE BATTLE AND THE WAR|url=https://www.si.com/vault/1968/02/26/547300/jeanclaude-wins-the-battle-and-the-war|access-date=13 February 2018|magazine=Sports Illustrated|issue=26 Feb. 1968|date=26 February 1968}}</ref>
      * Three [[East Germany|East German]] competitors in the women's [[luge]] event were disqualified for illegally heating their runners prior to each run.<ref name="n024"/>

      ==={{anchor|1972 Winter Olympics}}1972 Winter Olympics – Sapporo, Japan===
      * Austrian skier Karl Schranz, a vocal critic of then-IOC president [[Avery Brundage]] and reportedly earning [[United States dollar|$]]50,000 a year at the time,<ref name="They Said It">{{cite web |url=http://vault.sportsillustrated.cnn.com/vault/article/magazine/MAG1085785/index.htm |title=They Said It - 02.14.72 - SI Vault |access-date=2008-08-16 |url-status=dead |archive-url=https://web.archive.org/web/20090609181708/http://vault.sportsillustrated.cnn.com/vault/article/magazine/MAG1085785/index.htm |archive-date=9 June 2009}}</ref> was singled out for his status as a covertly professional athlete, notably for his relationship with the ski manufacturer [[Kneissl]], and ejected from the games. Schranz's case was particularly high-profile because of the disqualification controversy centring on him at the 1968 games and Schranz's subsequent dominance of alpine skiing in the [[Alpine skiing World Cup|Skiing World Cups]] of 1969 and 1970. Brundage's twenty-year reign as President of the IOC ended six months later and subsequent presidents have been limited to terms of eight years, renewable once for four years.
      *The Canadian ice hockey team boycotted the Games due to the IOC not allowing them to use professional players. Canada had expressed concerns that Soviet athletes were de facto professionals as they were paid by the state.<ref name="k981">{{cite web | title=1972 Sapporo, Japan | website=CBC | date=2009-12-02 | url=https://www.cbc.ca/sports/2.722/1972-sapporo-japan-1.800516 | access-date=2024-08-21}}</ref>

      ==={{anchor|1976 Winter Olympics}}1976 Winter Olympics – Innsbruck, Austria===
      * The chosen location for the [[1976 Winter Olympics]] was originally [[Denver, Colorado]]. However, after the city's voters rejected partially funding the Games, they were relocated to [[Innsbruck]], Austria. Innsbruck previously hosted the 1964 Games.<ref>{{cite web |title=When Denver rejected the Olympics in favour of the environment and economics |date=2015-04-07 |website=[[The Guardian]] |archive-url=https://web.archive.org/web/20230621074908/https://www.theguardian.com/sport/blog/2015/apr/07/when-denver-rejected-the-olympics-in-favour-of-the-environment-and-economics |archive-date=2023-06-21 |url-status=live |url=https://www.theguardian.com/sport/blog/2015/apr/07/when-denver-rejected-the-olympics-in-favour-of-the-environment-and-economics}}</ref>

      ==={{anchor|1980 Winter Olympics}}1980 Winter Olympics – Lake Placid, New York, United States===
      * [[Taiwan]] (The Republic of China) did not participate in the Games over the IOC's recognition of the [[People's Republic of China]] as "China", and its request for Taiwan to compete as "[[Chinese Taipei]]". Taiwan missed the 1976 [[Montreal]] Summer Games and 1980 [[Moscow]] Summer Games for the same reason. It returned to the Games in 1984.<ref>[http://www.kiat.net/olympics/history/winter/w13lakeplacid.html Kiat.net] {{webarchive|url=https://web.archive.org/web/20120617022813/http://www.kiat.net/olympics/history/winter/w13lakeplacid.html |date=17 June 2012 }}</ref>
      *The [[Olympic Village]] was built with the goal of subsequently converting it into a [[federal prison]]. Athletes and activists protested the decision.<ref name="v280">{{cite web | last=Lewis | first=Danny | title=Why the 1980 Olympic Village Is Now a Prison | website=Smithsonian Magazine | date=2016-08-18 | url=https://www.smithsonianmag.com/smart-news/why-1980-olympic-village-now-prison-180960161/ | access-date=2024-08-21}}</ref>

      ==={{anchor|1984 Winter Olympics}}1984 Winter Olympics – Sarajevo, Yugoslavia===
      {{Empty section|date=August 2024}}

      ==={{anchor|1988 Winter Olympics}}1988 Winter Olympics – Calgary, Canada===
      {{Main|Concerns and controversies at the 1988 Winter Olympics}}
      *A series of ticket-related scandals plagued the organizing committee as the Games approached, resulting in widespread public anger.<ref>{{citation |url=https://news.google.com/newspapers?id=mkQjAAAAIBAJ&pg=6474,7315868 |title=Scandals plague Calgary Games |work=Spokane Spokesman-Review |date=February 13, 1987 |access-date=February 18, 2013 |page=29 |agency=Knight Ridder}}</ref>

      ==={{anchor|1992 Winter Olympics}}1992 Winter Olympics – Tignes-Albertville, France===
      *Swiss [[speed skier]] [[Nicolas Bochatay]] died after crashing into a snow machine during practice.<ref>{{cite news|last=Eskenaz|first=Gerald|date=23 February 1992|url=https://www.nytimes.com/1992/02/23/sports/albertville-swiss-speed-skier-killed-during-a-practice-run.html|title=Albertville; Swiss speed skier killed during a practice run|newspaper=The New York Times|access-date=15 February 2010}}</ref>

      ==={{anchor|1994 Winter Olympics}}1994 Winter Olympics – Lillehammer, Norway===
      * [[Jeff Gillooly]], the ex-husband of U.S. [[figure skater]] [[Tonya Harding]], arranged for [[Assault of Nancy Kerrigan|an attack]] on her closest American rival, [[Nancy Kerrigan]], a month before the start of the Games. Both women competed, with Kerrigan winning the silver and Harding performing poorly. Harding was later banned for life both from competing in [[USFSA]]-sanctioned events and from becoming a sanctioned coach.

      ==={{anchor|1998 Winter Olympics}}1998 Winter Olympics – Nagano, Japan===
      * At the [[1998 Winter Olympics]] in [[Nagano (city)|Nagano]], Japan, a judge in the ice dancing event tape-recorded another judge trying to pre-ordain the results. [[Dick Pound]], a prominent IOC official, said soon afterward that ice dancing should be stripped of its status as an Olympic event unless it could clean up the perception that its judging is corrupt.<ref>{{cite web|url=https://www.nytimes.com/2002/02/15/sports/olympics-figure-skating-ice-dancers-struggle-to-prove-legitimacy.html|title=Ice Dancers Struggle To Prove Legitimacy|date=15 February 2002|work=The New York Times|access-date=19 May 2016}}</ref>
      * Canadian gold medalist snowboarder [[Ross Rebagliati]] was disqualified for [[Cannabis (drug)|marijuana]] being found in his system. The IOC reinstated the medal days later.

      ==={{anchor|2002 Winter Olympics}}2002 Winter Olympics – Salt Lake City, Utah, United States ===
      {{see also|Doping at the Olympic Games#2002 Salt Lake City|2002 Winter Olympic bid scandal}}
      *Two sets of gold medals were awarded in pairs figure skating, to Canadian pair [[Jamie Salé]] and [[David Pelletier]] and to Russian pair [[Elena Berezhnaya]] and [[Anton Sikharulidze]], after allegations of collusion among judges in favour of the Russian pair. 
      *Three cross-country skiers, Spaniard [[Johann Mühlegg]] and Russians [[Larissa Lazutina]] and [[Olga Danilova]], were disqualified after blood tests indicated the use of [[darbepoetin]]. Following a December 2003 ruling by the Court of Arbitration for Sport (CAS), the IOC withdrew all the doped athletes' medals from the Games, amending the result lists accordingly.
      *Salt Lake City's bid committee was caught in a [[bribery]] scandal, which led to the expulsion of six IOC members.<ref name="g894">{{cite web | title=Despite 2002 bribery scandal, Salt Lake City aims to host 2030 Winter Olympics | website=CBC | date=2018-12-18 | url=https://www.cbc.ca/sports/olympics/salt-lake-city-2030-winter-olympics-1.4951389 | access-date=2024-08-21}}</ref>

      ==={{anchor|2006 Winter Olympics}}2006 Winter Olympics – Turin, Italy===
      * Members of the Austrian biathlon team had their Olympic Village residences raided by Italian authorities, who were investigating doping charges.
      * Russian biathlete [[Olga Medvedtseva]] was stripped of her silver medal won in the individual race, due to positive drug test. A two-year ban from any competition was imposed.

      ==={{anchor|2010 Winter Olympics}}2010 Winter Olympics – Vancouver, Canada===
      {{Main|Concerns and controversies at the 2010 Winter Olympics}}
      *Georgian luger [[Nodar Kumaritashvili]] died during training after losing control of his sled and crashing into an unpadded steel pillar.<ref name="o243">{{cite web | last=Roenigk | first=Alyssa | title=Georgia luger, 21, dies in Whistler training run | website=ESPN.com | date=2010-02-12 | url=https://www.espn.com/olympics/winter/2010/luge/news/story?id=4909034 | access-date=2024-08-21}}</ref> The starting spot was subsequently lowered to decrease the track speed, and a wall was erected to cover the pillars.<ref name="h766">{{cite web | title=Luger Nodar Kumaritashvili's death 'unforeseeable' – official report | website=the Guardian | date=2010-04-20 | url=https://www.theguardian.com/sport/2010/apr/20/luge-death-winter-olympics-report | access-date=2024-08-21}}</ref>

      ==={{anchor|2014 Winter Olympics}}2014 Winter Olympics – Sochi, Russia===
      {{Main|Concerns and controversies at the 2014 Winter Olympics|Doping in Russia}}
      * In August 2008, the government of Georgia called for a boycott of the Games in response to Russia's participation in the [[2008 South Ossetia war]].<ref>{{cite news|url=https://www.csmonitor.com/2008/0711/p06s01-woeu.html|title=Putin Faces Green Olympic Challenge|newspaper=[[Christian Science Monitor]]|access-date=18 August 2008|date=11 July 2008|first=Fred|last=Weir|archive-url=https://web.archive.org/web/20090822014059/http://www.csmonitor.com/2008/0711/p06s01-woeu.html|archive-date=22 August 2009|url-status=dead}}</ref> The IOC responded to concerns about the status of the 2014 games by stating that it was "premature to make judgments about how events happening today might sit with an event taking place six years from now".<ref>{{cite news|url=https://www.usatoday.com/sports/olympics/2008-08-15-3534495582_x.htm?csp=34|title=Lawmakers want Olympics out of Russia|work=USA Today|date=15 August 2008|first=Kimberly|last=Hefling|agency=Associated Press}}</ref>
      * In mid-2013, a number of organizations, including [[Human Rights Watch]],<ref>{{cite web|url=https://www.hrw.org|title=Human Rights Watch|website=Human Rights Watch|access-date=26 August 2017}}</ref> began calling for a boycott of the Games due to oppressive and homophobic [[Russian gay propaganda law|legislation that bans 'gay propaganda']],<ref>Elder, Miriam. (11 June 2013). Russia passes law banning gay 'propaganda'. Law will make it illegal to equate straight and gay relationships and to distribute gay rights material. ''The Guardian, UK.''</ref> including the open acknowledgement of gay identities, the display of [[rainbow flag]]s and public displays of affection between same-sex couples.<ref>Johnson, Mark. (4 July 2013). Sochi 2014 Olympics Unsafe For LGBT Community Under Russia's Anti-Gay Law, Activists Warn. ''International Business Times. ''</ref>
      * Severe cost overruns made the 2014 Winter Olympics the most expensive Olympics in history, with allegations of corruption among government officials,<ref>{{cite news|last=Bennetts|first=Marc|url=https://www.telegraph.co.uk/news/worldnews/vladimir-putin/10581829/Sochi-Olympics-Nothing-but-a-monstrous-scam-says-Kremlin-critic.html|title=Winter Olympics 2014: Sochi Games "nothing but a monstrous scam," says Kremlin critic Boris Nemtsov|work=Telegraph|date=19 January 2014|access-date=4 February 2014|location=London}}</ref> and of close  relationships between the government and construction firms.<ref name=sochi>{{cite news|url=https://www.economist.com/news/europe/21581764-most-expensive-olympic-games-history-offer-rich-pickings-select-few-castles|title=The Sochi Olympics: Castles in the sand|newspaper=The Economist|date=13 July 2013|access-date=8 August 2013}}</ref> While originally budgeted at US$12 billion, various factors caused the budget to expand to US$51 billion, surpassing the estimated $44 billion cost of the [[2008 Summer Olympics]] in [[Beijing]].
      * [[Lebanon|Lebanese]] skier [[Jackie Chamoun]], who had a photo shoot taken of her wearing nothing but ski boots and a thong, had the Lebanese government claim that she damaged the reputation of her country.<ref>{{cite magazine|url=http://world.time.com/2014/02/12/topless-lebanese-skier-jackie-chamoun/|archive-url=https://web.archive.org/web/20140212204336/http://world.time.com/2014/02/12/topless-lebanese-skier-jackie-chamoun/|url-status=dead|archive-date=12 February 2014|title=Lebanese Olympic Skier Jackie Chamoun Topless Photos Cause Scandal|magazine=[[Time (magazine)|Time]]|access-date=19 May 2016}}</ref>
      * [[Doping in Russia]]. [[Richard McLaren (academic)|Richard McLaren]] published two reports in 2016 claiming that from "at least late 2011 to 2015" more than 1,000 Russian competitors in various sports, including summer, winter, and Paralympic sports, benefited from a doping cover-up.<ref name=NYT161209>{{cite news |url=https://www.nytimes.com/2016/12/09/sports/russia-doping-mclaren-report.html |title=Russia's Doping Program Laid Bare by Extensive Evidence in Report |newspaper=[[The New York Times]] |first= Rebecca R. |last= Ruiz |date= 9 December 2016 }}</ref> As of 25 December 2015, 43 Russian athletes who competed in Sochi have been disqualified, with 13 medals removed.

      ==={{anchor|2018 Winter Olympics}}2018 Winter Olympics – PyeongChang, Republic of Korea===
      {{Main|Concerns and controversies at the 2018 Winter Olympics}}
      * Russia was banned by the IOC from attending the Games due to state-sponsored doping.<ref name=NYT171205>{{cite news |url=https://www.nytimes.com/2017/12/05/sports/olympics/ioc-russia-winter-olympics.html |title=Russia Banned From Winter Olympics by I.O.C.
       |newspaper=[[The New York Times]] |first= Rebecca R. |last= Ruiz |date= 5 December 2017 }}</ref> Their athletes participated as the [[Olympic Athletes from Russia at the 2018 Winter Olympics|Olympic Athletes from Russia]].
      * Kei Saito, a Japanese Short Track Speed Skater was suspended after being caught doping.<ref>{{Cite news|url=https://edition.cnn.com/2018/02/12/sport/japan-doping-kei-saito-olympics-intl/index.html|title=Japanese speed skater Kei Saito suspended from Winter Olympics for doping|author1=Zayn Nabbi |author2=Jo Shelley|work=CNN|access-date=2018-02-22}}</ref>

      ==={{anchor|2022 Winter Olympics}}2022 Winter Olympics – Beijing, China===
      {{Main|Concerns and controversies at the 2022 Winter Olympics}}
      [[File:Demonstration in front of the Chinese Embassy, Prague (4.2.2022) II.jpg|thumb|Protest in front of the [[Chinese embassy]] in Prague, 4 February 2022. The banner reads "[[Artificial snow]], real genocide".]]
      * Despite having more cities interested in this Olympics, the bidding process experienced the most dramatic bids withdrawals ever seen. This means when the candidate stage was reached, only three candidates remained. However, [[Oslo]] then pulled out, with the process continued with the two remaining candidates ([[Almaty]] and [[Beijing]]).
      *[[Lithuania]], [[Canada]], [[Australia]], the [[United Kingdom]], and the [[United States]] applied diplomatic boycotts to the Games due to the [[Uighur Genocide]] and [[human rights in Tibet]].<ref>{{Cite web|title=Lithuania confirms diplomatic boycott of Beijing 2022 Winter Olympics|url=https://www.aninews.in/news/world/asia/lithuania-confirms-diplomatic-boycott-of-beijing-2022-winter-olympics20211203200952/|access-date=2021-12-30|website=ANI News|language=en}}</ref><ref>{{Cite web|author=Ben Westcott and Caitlin McGee|title=Australia, UK and Canada join diplomatic boycott of Beijing 2022 Winter Olympics|url=https://www.cnn.com/2021/12/07/australia/australia-beijing-olympic-boycott-china-intl-hnk/index.html|access-date=2021-12-30|website=CNN|date=8 December 2021}}</ref><ref>{{Cite web|title=Why are countries boycotting the Beijing Olympics? Here's what you need to know - National {{!}} Globalnews.ca|url=https://globalnews.ca/news/8434349/countries-boycotting-beijing-olympics-what-you-need-to-know/|access-date=2021-12-30|website=Global News|language=en-US}}</ref>
      *[[Japan]]ese government delegates did not attend the Olympics but still sent their team to compete.<ref>{{Cite web|date=2021-12-16|title=Japan PM will not attend Beijing Winter Olympics opening ceremony|url=https://www.theguardian.com/sport/2021/dec/16/japan-pm-will-not-attend-beijing-winter-olympics-opening-ceremony|access-date=2021-12-30|website=the Guardian|language=en}}</ref><ref>{{Cite web|title=Japan to quietly snub Beijing Olympics, but won't call it a boycott|url=https://asia.nikkei.com/Politics/International-relations/Japan-to-quietly-snub-Beijing-Olympics-but-won-t-call-it-a-boycott|access-date=2021-12-30|website=Nikkei Asia|language=en-GB}}</ref>

