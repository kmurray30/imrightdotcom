      === Indoor ventilation and avoiding crowded indoor spaces ===
      The CDC states that avoiding crowded indoor spaces reduces the risk of COVID-19 infection.<ref name="CDC-2020b">{{#invoke:Cite|web|last=CDC|date=11 February 2020|title=Scientific Brief: SARS-CoV-2 Transmission|url=https://www.cdc.gov/coronavirus/2019-ncov/science/science-briefs/sars-cov-2-transmission.html|access-date=10 May 2021| url-status=deviated |archive-url=https://web.archive.org/web/20210510165056/https://www.cdc.gov/coronavirus/2019-ncov/science/science-briefs/sars-cov-2-transmission.html |archive-date=10 May 2021 |website=U.S. [[Centers for Disease Control and Prevention]] (CDC) }}</ref> When indoors, increasing the rate of air change, decreasing recirculation of air and increasing the use of outdoor air can reduce transmission.<ref name="CDC-2020b" /><ref name="ecdc_transmission2">{{#invoke:Cite|web|date=7 September 2020|title=Transmission of COVID-19 |url=https://www.ecdc.europa.eu/en/covid-19/latest-evidence/transmission|access-date=14 October 2020|publisher=[[European Centre for Disease Prevention and Control]]}}</ref> The WHO recommends [[ventilation (architecture)|ventilation]] and [[air filtration]] in public spaces to help clear out infectious aerosols.<ref name="CDCasof07092020" /><ref name="KoFZO">{{#invoke:Cite|AV media |date=30 October 2020 |url=https://www.youtube.com/watch?v=XJC1f7F4qtc |title=WHO's Science in 5 on COVID-19 – Ventilation – 30 October 2020 |publisher=[[World Health Organization]] (WHO) |via=[[YouTube]] |access-date=8 December 2022 |archive-url=https://web.archive.org/web/20221025043909/http://www.youtube.com/watch?v=XJC1f7F4qtc |archive-date=25 October 2022 |url-status=live}}</ref><ref name="Lancetdroplet05272020">{{#invoke:Cite|journal|vauthors=Somsen GA, van Rijn C, Kooij S, Bem RA, Bonn D|date=July 2020|title=Small droplet aerosols in poorly ventilated spaces and SARS-CoV-2 transmission|journal=The Lancet. Respiratory Medicine|publisher=Elsesier|volume=8|issue=7|pages=658–659 |doi=10.1016/S2213-2600(20)30245-9|pmc=7255254|pmid=32473123}}</ref>

      Exhaled respiratory particles can build-up within enclosed spaces with inadequate [[ventilation (architecture)|ventilation]]. The risk of COVID‑19 infection increases especially in spaces where people engage in physical exertion or raise their voice (e.g., exercising, shouting, singing) as this increases exhalation of respiratory droplets. Prolonged exposure to these conditions, typically more than 15 minutes, leads to higher risk of infection.<ref name="CDC-2020b" />

      [[Displacement ventilation]] with large natural inlets can move stale air directly to the exhaust in [[laminar flow]] while significantly reducing the concentration of droplets and particles. [[Passive ventilation]] reduces energy consumption and maintenance costs but may lack [[demand controlled ventilation|controllability]] and [[heat recovery ventilation|heat recovery]]. Displacement ventilation can also be achieved mechanically with higher energy and maintenance costs. The use of large ducts and openings helps to prevent mixing in closed environments. Recirculation and mixing should be avoided because recirculation prevents dilution of harmful particles and redistributes possibly contaminated air, and mixing increases the concentration and range of infectious particles and keeps larger particles in the air.<ref>{{#invoke:Cite|journal |vauthors=Lipinski T, Ahmad D, Serey N, Jouhara H |date=1 November 2020 |title=Review of ventilation strategies to reduce the risk of disease transmission in high occupancy buildings |journal=International Journal of Thermofluids |volume=7–8 |article-number=100045 |doi=10.1016/j.ijft.2020.100045 |bibcode=2020IJTf....700045L }}</ref>

      === Hand-washing and hygiene ===
      {{Main|Hand washing}}

      [[File:In Rwanda build where everyone can wash hand in prevention of covid-19.jpg|thumb|Students in [[Rwanda]] hand washing and wearing face masks during the [[COVID-19 pandemic in Rwanda|COVID‑19 pandemic in the country]]]]
      Thorough hand hygiene after any cough or sneeze is required.<ref name="nhs.uk-2020">{{#invoke:Cite|web|date=2 June 2020|title=Social distancing: what you need to do – Coronavirus (COVID-19) |url=https://www.nhs.uk/conditions/coronavirus-covid-19/social-distancing/what-you-need-to-do/|access-date=18 August 2020|website=nhs.uk}}</ref> The WHO also recommends that individuals wash hands often with soap and water for at least 20 seconds, especially after going to the toilet or when hands are visibly dirty, before eating and after blowing one's nose.<ref name="WHO-2020b">{{#invoke:Cite|web|title=Advice for the public on COVID-19 – World Health Organization|url=https://www.who.int/emergencies/diseases/novel-coronavirus-2019/advice-for-public|access-date=18 August 2020|website=[[World Health Organization]] (WHO)}}</ref> When soap and water are not available, the CDC recommends using an alcohol-based [[hand sanitiser]] with at least 60% alcohol.<ref>{{#invoke:Cite|web|date=11 February 2020|title=COVID-19 and Your Health|url=https://www.cdc.gov/coronavirus/2019-ncov/prevent-getting-sick/hand-sanitizer.html|access-date=23 March 2021|website=U.S. [[Centers for Disease Control and Prevention]] (CDC)|quote=To prevent the spread of germs, including COVID-19, CDC recommends washing hands with soap and water whenever possible because it reduces the amount of many types of germs and chemicals on hands. But if soap and water are not readily available, using a hand sanitizer with at least 60% alcohol can help you avoid getting sick and spreading germs to others.}}</ref> For areas where commercial hand sanitisers are not readily available, the WHO provides two formulations for local production. In these formulations, the antimicrobial activity arises from [[ethanol]] or [[isopropanol]]. [[Hydrogen peroxide]] is used to help eliminate [[bacterial spore]]s in the alcohol; it is "not an active substance for hand [[antisepsis]]". [[Glycerol]] is added as a [[humectant]].<ref>{{#invoke:Cite|book|title=WHO Guidelines on Hand Hygiene in Health Care: First Global Patient Safety Challenge Clean Care Is Safer Care|date=19 March 2009|publisher=[[World Health Organization]] (WHO)|chapter=WHO-recommended handrub formulations|access-date=19 March 2020|chapter-url=https://www.ncbi.nlm.nih.gov/books/NBK144054/}}</ref>

      === Social distancing ===
      {{Main|Social distancing measures related to the COVID-19 pandemic}}

      Social distancing (also known as physical distancing) includes [[infection control]] actions intended to slow the spread of the disease by minimising close contact between individuals. Methods include quarantines; travel restrictions; and the closing of schools, workplaces, stadiums, theatres, or shopping centres. Individuals may apply social distancing methods by staying at home, limiting travel, avoiding crowded areas, using no-contact greetings, and physically distancing themselves from others.<ref>{{#invoke:Cite|journal | vauthors = Nussbaumer-Streit B, Mayr V, Dobrescu AI, Chapman A, Persad E, Klerings I, Wagner G, Siebert U, Ledinger D, Zachariah C, Gartlehner G |date=September 2020 |title=Quarantine alone or in combination with other public health measures to control COVID-19: a rapid review |journal=The Cochrane Database of Systematic Reviews |volume=2020 |issue=9 |article-number=CD013574 |doi=10.1002/14651858.CD013574.pub2 |issn=1469-493X |pmc=8133397 |pmid=33959956 }}</ref>

      In 2020, outbreaks occurred in prisons due to crowding and an inability to enforce adequate social distancing.<ref name="Hawks2020" /><ref>{{#invoke:Cite|web| vauthors = Waldstein D |title=To Fight Virus in Prisons, C.D.C. Suggests More Screenings |website=The New York Times |date=6 May 2020 |url=https://www.nytimes.com/2020/05/06/health/coronavirus-prisons-cdc.html |archive-url=https://web.archive.org/web/20200507161241/https://www.nytimes.com/2020/05/06/health/coronavirus-prisons-cdc.html |archive-date=7 May 2020 |url-access=subscription |url-status=live |access-date=14 May 2020}}</ref> In the United States, the prisoner population is ageing and many of them are at high risk for poor outcomes from COVID‑19 due to high rates of coexisting heart and lung disease, and poor access to high-quality healthcare.<ref name="Hawks2020">{{#invoke:Cite|journal | vauthors = Hawks L, Woolhandler S, McCormick D | title = COVID-19 in Prisons and Jails in the United States | journal = JAMA Internal Medicine | volume = 180 | issue = 8 | pages = 1041–1042 | date = August 2020 | pmid = 32343355 | doi = 10.1001/jamainternmed.2020.1856 | doi-access = free | title-link = doi }}</ref>

      === Surface cleaning ===
      After being expelled from the body, coronaviruses can survive on surfaces for hours to days. If a person touches the dirty surface, they may deposit the virus at the eyes, nose, or mouth where it can enter the body and cause infection.<ref name="CDCTrans">{{#invoke:Cite|web|url=https://www.cdc.gov/coronavirus/2019-ncov/prevent-getting-sick/how-covid-spreads.html |title=How COVID-19 Spreads |date=18 September 2020 |website=U.S. [[Centers for Disease Control and Prevention]] (CDC) |url-status=live |archive-url=https://web.archive.org/web/20200919224920/https://www.cdc.gov/coronavirus/2019-ncov/prevent-getting-sick/how-covid-spreads.html?CDC_AA_refVal=https%3A%2F%2Fwww.cdc.gov%2Fcoronavirus%2F2019-ncov%2Fprepare%2Ftransmission.html |archive-date=19 September 2020 |access-date=20 September 2020}}</ref> Evidence indicates that contact with infected surfaces is not the main driver of COVID‑19,<ref>{{#invoke:Cite|journal | vauthors = Goldman E | title = Exaggerated risk of transmission of COVID-19 by fomites | journal = The Lancet. Infectious Diseases | volume = 20 | issue = 8 | pages = 892–893 | date = August 2020 | pmid = 32628907 | pmc = 7333993 | doi = 10.1016/S1473-3099(20)30561-2 | bibcode = 2020LanID..20..892G }}</ref><ref>{{#invoke:Cite|web| vauthors = Weixel N |date=5 April 2021|title=CDC says risk of COVID-19 transmission on surfaces 1 in 10,000|url=https://thehill.com/policy/healthcare/546541-cdc-risk-of-covid-transmission-on-surfaces-is-low|access-date=19 December 2021|website=The Hill}}</ref><ref name="cdc.gov">{{#invoke:Cite|web|date=5 April 2021|title=Science Brief: SARS-CoV-2 and Surface (Fomite) Transmission for Indoor Community Environments|url=https://www.cdc.gov/coronavirus/2019-ncov/more/science-and-research/surface-transmission.html|url-status=live |website=U.S. [[Centers for Disease Control and Prevention]] (CDC)|archive-url=https://web.archive.org/web/20210405151126/https://www.cdc.gov/coronavirus/2019-ncov/more/science-and-research/surface-transmission.html |archive-date=5 April 2021 }}</ref> leading to recommendations for optimised disinfection procedures to avoid issues such as the increase of [[antimicrobial resistance]] through the use of inappropriate cleaning products and processes.<ref name="disinfection-foodindus">{{#invoke:Cite|journal | vauthors = Pedreira A, Taşkın Y, García MR | title = A Critical Review of Disinfection Processes to Control SARS-CoV-2 Transmission in the Food Industry | journal = Foods | volume = 10 | issue = 2 | page = 283 | date = January 2021 | pmid = 33572531 | pmc = 7911259 | doi = 10.3390/foods10020283 | s2cid = 231900820 | doi-access = free | title-link = doi }}</ref><ref>{{#invoke:Cite|journal | vauthors = Rezasoltani S, Yadegar A, Hatami B, Asadzadeh Aghdaei H, Zali MR | title = Antimicrobial Resistance as a Hidden Menace Lurking Behind the COVID-19 Outbreak: The Global Impacts of Too Much Hygiene on AMR | journal = Frontiers in Microbiology | volume = 11 | article-number = 590683 | year = 2020 | pmid = 33384670 | pmc = 7769770 | doi = 10.3389/fmicb.2020.590683 | doi-access = free | title-link = doi }}</ref> [[Deep clean (COVID-19)|Deep cleaning]] and other surface sanitation has been criticised as [[hygiene theater|hygiene theatre]], giving a false sense of security against something primarily spread through the air.<ref>{{#invoke:Cite|web| vauthors = Thompson D |date=8 February 2021|title=Hygiene Theater Is Still a Huge Waste of Time|url=https://www.theatlantic.com/ideas/archive/2021/02/hygiene-theater-still-waste/617939/|access-date=27 February 2021|website=The Atlantic }}</ref><ref>{{#invoke:Cite|web| vauthors = Thompson D |date=27 July 2020|title=Hygiene Theater Is a Huge Waste of Time |url=https://www.theatlantic.com/ideas/archive/2020/07/scourge-hygiene-theater/614599/|access-date=27 February 2021|website=The Atlantic }}</ref>

      The amount of time that the virus can survive depends significantly on the type of surface, the temperature, and the humidity.<ref name="Bueckert-2020">{{#invoke:Cite|journal | vauthors = Bueckert M, Gupta R, Gupta A, Garg M, Mazumder A | title = Infectivity of SARS-CoV-2 and Other Coronaviruses on Dry Surfaces: Potential for Indirect Transmission | journal = Materials | volume = 13 | issue = 22 | page = 5211 | date = November 2020 | pmid = 33218120 | pmc = 7698891 | doi = 10.3390/ma13225211 | bibcode = 2020Mate...13.5211B | doi-access = free | title-link = doi }}</ref> Coronaviruses die very quickly when exposed to the [[UV light]] in [[sunlight]].<ref name="Bueckert-2020" /> Like other enveloped viruses, SARS-CoV-2 survives longest when the temperature is at [[room temperature]] or lower, and when the [[relative humidity]] is low (<50%).<ref name="Bueckert-2020" />

      On many surfaces, including glass, some types of plastic, stainless steel, and skin, the virus can remain infective for several days indoors at room temperature, or even about a week under ideal conditions.<ref name="Bueckert-2020" /><ref>{{#invoke:Cite|journal | vauthors = Bhardwaj R, Agrawal A | title = How coronavirus survives for days on surfaces | journal = Physics of Fluids | volume = 32 | issue = 11 | article-number = 111706 | date = November 2020 | pmid = 33281435 | pmc = 7713872 | doi = 10.1063/5.0033306 | bibcode = 2020PhFl...32k1706B }}</ref> On some surfaces, including cotton fabric and copper, the virus usually dies after a few hours.<ref name="Bueckert-2020" /> The virus dies faster on porous surfaces than on non-porous surfaces due to capillary action within pores and faster aerosol droplet evaporation.<ref>{{#invoke:Cite|journal | vauthors = Chatterjee S, Murallidharan JS, Agrawal A, Bhardwaj R | title = Why coronavirus survives longer on impermeable than porous surfaces | journal = Physics of Fluids | volume = 33 | issue = 2 | article-number = 021701 | date = February 2021 | pmid = 33746485 | pmc = 7978145 | doi = 10.1063/5.0037924 | bibcode = 2021PhFl...33b1701C }}</ref><ref name="cdc.gov" /><ref name="Bueckert-2020" /> However, of the many surfaces tested, two with the longest survival times are N95 respirator masks and surgical masks, both of which are considered porous surfaces.<ref name="Bueckert-2020" />

      The CDC says that in most situations, cleaning surfaces with soap or detergent, not disinfecting, is enough to reduce risk of transmission.<ref name="cdc.gov" /><ref>{{#invoke:Cite|news| vauthors = Anthes E |date=8 April 2021|title=Has the Era of Overzealous Cleaning Finally Come to an End?|work=The New York Times|url=https://www.nytimes.com/2021/04/08/health/coronavirus-hygiene-cleaning-surfaces.html |archive-url=https://ghostarchive.org/archive/20211228/https://www.nytimes.com/2021/04/08/health/coronavirus-hygiene-cleaning-surfaces.html |archive-date=28 December 2021 |url-access=limited|access-date=12 April 2021| url-status=live }}</ref> The CDC recommends that if a COVID‑19 case is suspected or confirmed at a facility such as an office or day care, all areas such as offices, bathrooms, common areas, shared electronic equipment like tablets, touch screens, keyboards, remote controls, and ATMs used by the ill persons should be disinfected.<ref name="sxygw">{{#invoke:Cite|web|date=11 February 2020|title=Interim Recommendations for US Community Facilities with Suspected/Confirmed Coronavirus Disease 2019|url=https://www.cdc.gov/coronavirus/2019-ncov/community/organizations/cleaning-disinfection.html|access-date=4 April 2020|publisher=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref> Surfaces may be decontaminated with the following:
      * 62–71% [[ethanol]]
      * 50–100% [[isopropanol]]
      * 0.1% [[sodium hypochlorite]]
      * 0.5% [[hydrogen peroxide]]
      * 0.2–7.5% [[povidone-iodine]]
      * 50–200 ppm [[hypochlorous acid]]

      Other solutions, such as [[benzalkonium chloride]] and [[chlorhexidine gluconate]], are less effective. [[Ultraviolet germicidal irradiation]] may also be used,<ref name="CDCasof07092020">{{#invoke:Cite|web|date=9 July 2020|title=COVID-19 Employer Information for Office Buildings|url=https://www.cdc.gov/coronavirus/2019-ncov/community/office-buildings.html|access-date=9 July 2020|website=U.S. [[Centers for Disease Control and Prevention]]}}</ref> although popular devices require {{val|5|-|10|u=min}} exposure and may deteriorate some materials over time.<ref>{{#invoke:Cite|news |title=Yes, UV phone sanitizers work. That doesn't mean you need one. |url=https://www.washingtonpost.com/lifestyle/2021/02/16/uv-sanitizer-phone-covid-germs/ |access-date=29 April 2022 |newspaper=The Washington Post |date=16 February 2021}}</ref>

      === Self-isolation ===
      <!-- PLEASE DO NOT ADD INSTRUCTIONS HERE, SEE WIKIPEDIA:NOTHOWTO. -->
      [[Self-isolation]] at home has been recommended for those diagnosed with COVID‑19 and those who suspect they have been infected. Health agencies have issued detailed instructions for proper self-isolation.<ref name="pmid33012884">{{#invoke:Cite|journal|vauthors=Patiño-Lugo DF, Vélez M, Velásquez Salazar P, Vera-Giraldo CY, Vélez V, Marín IC, Ramírez PA, Quintero SP, Castrillón Martínez E, Pineda Higuita DA, Henandez G|date=June 2020|title=Non-pharmaceutical interventions for containment, mitigation and suppression of COVID-19 infection|journal=Colombia Medica|volume=51|issue=2|article-number=e4266|doi=10.25100/cm.v51i2.4266|pmc=7518730 |pmid=33012884}}</ref> Many governments have mandated or recommended self-quarantine for entire populations. The strongest self-quarantine instructions have been issued to those in high-risk groups.<ref name="lZR3i">{{#invoke:Cite|web|title=COVID-19 Informational Resources for High-Risk Groups {{!}} Keeping Education ACTIVE {{!}} Partnership to Fight Chronic Disease|url=https://www.fightchronicdisease.org/resources/covid-19-informational-resources-high-risk-groups|access-date=31 May 2020|website=fightchronicdisease.org}}</ref> Those who may have been exposed to someone with COVID‑19 and those who have recently travelled to a country or region with the widespread transmission have been advised to self-quarantine for 14 days from the time of last possible exposure.<ref>{{#invoke:Cite|web|url=https://www.cdc.gov/coronavirus/2019-ncov/if-you-are-sick/quarantine.html |title=Quarantine and Isolation |date=29 July 2021 |publisher=U.S. [[Centers for Disease Control and Prevention]] (CDC) |access-date=12 August 2021 }}</ref>

      === International travel-related control measures ===
      A 2021 Cochrane rapid review found that based upon low-certainty evidence, international travel-related control measures such as restricting cross-border travel may help to contain the spread of COVID‑19.<ref name="Burns-2021">{{#invoke:Cite|journal | vauthors = Burns J, Movsisyan A, Stratil JM, Biallas RL, Coenen M, Emmert-Fees KM, Geffert K, Hoffmann S, Horstick O, Laxy M, Klinger C, Kratzer S, Litwin T, Norris S, Pfadenhauer LM, von Philipsborn P, Sell K, Stadelmaier J, Verboom B, Voss S, Wabnitz K, Rehfuess E | title = International travel-related control measures to contain the COVID-19 pandemic: a rapid review | journal = The Cochrane Database of Systematic Reviews | volume = 2021 | article-number = CD013717 | date = March 2021 | issue = 3 | pmid = 33763851 | doi = 10.1002/14651858.CD013717.pub2 | pmc = 8406796 | s2cid = 232356197 | collaboration = Cochrane Public Health Group }}</ref> Additionally, symptom/exposure-based screening measures at borders may miss many positive cases.<ref name="Burns-2021" /> While test-based border screening measures may be more effective, it could also miss many positive cases if only conducted upon arrival without follow-up. The review concluded that a minimum 10-day quarantine may be beneficial in preventing the spread of COVID‑19 and may be more effective if combined with an additional control measure like border screening.<ref name="Burns-2021" />

      == Treatment ==
      {{Main|Treatment and management of COVID-19}}

      <!-- CONTENT TRANSCLUDED. CAN BE EDITED WITHIN [[management of COVID-19]] -->
      {{Excerpt|Treatment and management of COVID-19|paragraphs=1-4|hat=no}}

      == Prognosis and risk factors ==
      <noinclude>{{See also|COVID-19 pandemic death rates by country}}</noinclude>
      <!-- THE FOLLOWING TWO PARAGRAPHS ARE TRANSCLUDED INTO THE COVID-19 PANDEMIC ARTICLE -->[[File:Covid-19 SP - UTI V. Nova Cachoeirinha.jpg|thumb|Medical professionals treating a COVID-19 patient in critical condition in an [[intensive care unit]] in May&nbsp;2020.]]
      The severity of COVID‑19 varies. The disease may take a mild course with few or no symptoms, resembling other common upper respiratory diseases such as the [[common cold]]. In 3–4% of cases (7.4% for those over age 65) symptoms are severe enough to cause hospitalisation.<ref name="pmid33087398">{{#invoke:Cite|journal | vauthors = Doshi P | title = Will covid-19 vaccines save lives? Current trials aren't designed to tell us | journal = BMJ | volume = 371 | article-number = m4037 | date = October 2020 | pmid = 33087398 | doi = 10.1136/bmj.m4037 | s2cid = 224817161 }}</ref> Mild cases typically recover within two weeks, while those with severe or critical diseases may take three to six weeks to recover. Among those who have died, the time from symptom onset to death has ranged from two to eight weeks.<ref name="WHOReport24Feb2020" /> The Italian [[Istituto Superiore di Sanità]] reported that the median time between the onset of symptoms and death was twelve days, with seven being hospitalised. However, people transferred to an ICU had a median time of ten days between hospitalisation and death.<ref name="ISSCharacteristics" /> Abnormal sodium levels during hospitalisation with COVID-19 are associated with poor prognoses: high sodium with a greater risk of death, and low sodium with an increased chance of needing ventilator support.<ref>{{#invoke:Cite|journal | vauthors = Tzoulis P, Waung JA, Bagkeris E, Hussein Z, Biddanda A, Cousins J, Dewsnip A, Falayi K, McCaughran W, Mullins C, Naeem A, Nwokolo M, Quah H, Bitat S, Deyab E, Ponnampalam S, Bouloux PM, Montgomery H, Baldeweg SE | title = Dysnatremia is a Predictor for Morbidity and Mortality in Hospitalized Patients with COVID-19 | journal = The Journal of Clinical Endocrinology and Metabolism | volume = 106 | issue = 6 | pages = 1637–1648 | date = May 2021 | pmid = 33624101 | pmc = 7928894 | doi = 10.1210/clinem/dgab107 }}</ref><ref>{{#invoke:Cite|journal | vauthors = Tzoulis P, Grossman AB, Baldeweg SE, Bouloux P, Kaltsas G | title = MANAGEMENT OF ENDOCRINE DISEASE: Dysnatraemia in COVID-19: prevalence, prognostic impact, pathophysiology, and management | journal = European Journal of Endocrinology | volume = 185 | issue = 4 | pages = R103–R111 | date = September 2021 | pmid = 34370712 | pmc = 8428074 | doi = 10.1530/EJE-21-0281 }}</ref> Prolonged [[prothrombin]] time and elevated [[C-reactive protein]] levels on admission to the hospital are associated with severe course of COVID‑19 and with a transfer to ICU.<ref>{{#invoke:Cite|journal | vauthors = Baranovskii DS, Klabukov ID, Krasilnikova OA, Nikogosov DA, Polekhina NV, Baranovskaia DR, Laberko LA, Maneksha S, Harry TV, Durbin RP | title = Prolonged prothrombin time as an early prognostic indicator of severe acute respiratory distress syndrome in patients with COVID-19 related pneumonia | journal = Current Medical Research and Opinion | volume = 229 | issue = 6 | pages = 21–25 | date = December 1975 | pmid = 33210948<!-- Despite the error message it generates, the PMID is correct and valid as of 29 November 2020. --> | pmc = 7738209 | doi = 10.1080/03007995.2020.1853510 | s2cid = 227065216 }}</ref><ref>{{#invoke:Cite|journal | vauthors = Christensen B, Favaloro EJ, Lippi G, Van Cott EM | title = Hematology Laboratory Abnormalities in Patients with Coronavirus Disease 2019 (COVID-19) | journal = Seminars in Thrombosis and Hemostasis | volume = 46 | issue = 7 | pages = 845–849 | date = October 2020 | pmid = 32877961 | pmc = 7645834 | doi = 10.1055/s-0040-1715458 }}</ref>

      Some early studies suggest 10% to 20% of people with COVID‑19 will experience [[long COVID|symptoms lasting longer than a month]].<ref name="NIHRreportSep20">{{#invoke:Cite|journal|date=15 October 2020 |title=Living with Covid19 |url=https://evidence.nihr.ac.uk/themedreview/living-with-covid19/ |periodical=NIHR Themed Reviews |publisher=[[National Institute for Health Research]] |doi=10.3310/themedreview_41169 |doi-access=free |title-link=doi}}</ref><ref name="HvIJa">{{#invoke:Cite|web|date=6 June 2020|title=How long does COVID-19 last?|url=https://covid.joinzoe.com/post/covid-long-term|access-date=15 October 2020|publisher=UK COVID Symptom Study}}</ref> A majority of those who were admitted to hospital with severe disease report long-term problems including fatigue and shortness of breath.<ref name="UniWashingtonSep20">{{#invoke:Cite|web|url=https://www.doh.wa.gov/Portals/1/Documents/1600/coronavirus/SummaryCOVIDLong%20termHealthEffects9-1-2020.pdf |title=Summary of COVID-19 Long Term Health Effects: Emerging evidence and Ongoing Investigation |publisher=[[University of Washington]] |date=1 September 2020 |access-date=15 October 2020 |archive-date=18 December 2020 |archive-url=https://web.archive.org/web/20201218080009/https://www.doh.wa.gov/Portals/1/Documents/1600/coronavirus/SummaryCOVIDLong%20termHealthEffects9-1-2020.pdf }}</ref> On 30 October 2020, WHO chief [[Tedros Adhanom]] warned that "to a significant number of people, the COVID virus poses a range of serious long-term effects". He has described the vast spectrum of COVID‑19 symptoms that fluctuate over time as "really concerning". They range from fatigue, a cough and shortness of breath, to inflammation and injury of major organs{{snd}}including the lungs and heart, and also neurological and psychologic effects. Symptoms often overlap and can affect any system in the body. Infected people have reported cyclical bouts of fatigue, headaches, months of complete exhaustion, mood swings, and other symptoms. Tedros therefore concluded that a strategy of achieving [[herd immunity]] by infection, rather than vaccination, is "morally unconscionable and unfeasible".<ref name="OaTsI">{{#invoke:Cite|web| title=Long-term symptoms of COVID-19 'really concerning', says WHO chief | website=UN News | date=30 October 2020 | url=https://news.un.org/en/story/2020/10/1076562 | access-date=7 March 2021}}</ref>

      In terms of hospital readmissions about 9% of 106,000 individuals had to return for hospital treatment within two months of discharge. The average to readmit was eight days since first hospital visit. There are several risk factors that have been identified as being a cause of multiple admissions to a hospital facility. Among these are advanced age (above 65 years of age) and presence of a chronic condition such as diabetes, COPD, heart failure or chronic kidney disease.<ref name="rArHO">{{#invoke:Cite|web|title=Coronavirus disease 2019 (COVID-19) – Prognosis |url=https://bestpractice.bmj.com/topics/en-us/3000168/prognosis |website=BMJ |access-date=15 November 2020}}</ref><ref name="CtbMg">{{#invoke:Cite|journal | vauthors = Lavery AM, Preston LE, Ko JY, Chevinsky JR, DeSisto CL, Pennington AF, Kompaniyets L, Datta SD, Click ES, Golden T, Goodman AB, Mac Kenzie WR, Boehmer TK, Gundlapalli AV | title = Characteristics of Hospitalized COVID-19 Patients Discharged and Experiencing Same-Hospital Readmission – United States, March–August 2020 | journal = MMWR. Morbidity and Mortality Weekly Report | volume = 69 | issue = 45 | pages = 1695–1699 | date = November 2020 | pmid = 33180754 | pmc = 7660660 | doi = 10.15585/mmwr.mm6945e2 }}</ref>

      According to [[scientific review]]s smokers are more likely to require intensive care or die compared to non-smokers.<ref>{{#invoke:Cite|journal | vauthors = Vardavas CI, Nikitara K | title = COVID-19 and smoking: A systematic review of the evidence | journal = Tobacco Induced Diseases | volume = 18 | page = 20 | date = March 2020 | pmid = 32206052 | pmc = 7083240 | doi = 10.18332/tid/119324 }}</ref><ref name="engin-review">{{#invoke:Cite|journal | vauthors = Engin AB, Engin ED, Engin A | title = Two important controversial risk factors in SARS-CoV-2 infection: Obesity and smoking | journal = Environmental Toxicology and Pharmacology | volume = 78 | article-number = 103411 | date = August 2020 | pmid = 32422280 | pmc = 7227557 | doi = 10.1016/j.etap.2020.103411 | bibcode = 2020EnvTP..7803411E }}</ref> Acting on the same ACE2 pulmonary receptors affected by smoking, air pollution has been correlated with the disease.<ref name="engin-review" /> Short-term<ref>{{#invoke:Cite|journal | vauthors = Setti L, Passarini F, De Gennaro G, Barbieri P, Licen S, Perrone MG, Piazzalunga A, Borelli M, Palmisani J, Di Gilio A, Rizzo E, Colao A, Piscitelli P, Miani A | title = Potential role of particulate matter in the spreading of COVID-19 in Northern Italy: first observational study based on initial epidemic diffusion | journal = BMJ Open | volume = 10 | issue = 9 | article-number = e039338 | date = September 2020 | pmid = 32973066 | doi = 10.1136/bmjopen-2020-039338 | doi-access = free | pmc = 7517216 }}</ref> and chronic<ref>{{#invoke:Cite|journal | vauthors = Wu X, Nethery RC, Sabath MB, Braun D, Dominici F | title = Air pollution and COVID-19 mortality in the United States: Strengths and limitations of an ecological regression analysis | journal = Science Advances | volume = 6 | issue = 45 | article-number = eabd4049 | date = November 2020 | pmid = 33148655 | doi = 10.1126/sciadv.abd4049 | pmc = 7673673 | bibcode = 2020SciA....6.4049W }}</ref> exposure to air pollution seems to enhance morbidity and mortality from COVID‑19.<ref>{{#invoke:Cite|journal| vauthors = Pansini R, Fornacca D |date=June 2021|title=Early Spread of COVID-19 in the Air-Polluted Regions of Eight Severely Affected Countries|journal=Atmosphere|volume=12|issue=6|page=795|doi=10.3390/atmos12060795|bibcode=2021Atmos..12..795P|doi-access = free | title-link = doi }}</ref><ref>{{#invoke:Cite|journal | vauthors = Comunian S, Dongo D, Milani C, Palestini P | title = Air Pollution and Covid-19: The Role of Particulate Matter in the Spread and Increase of Covid-19's Morbidity and Mortality | journal = International Journal of Environmental Research and Public Health | volume = 17 | issue = 12 | page = 4487 | date = June 2020 | pmid = 32580440 | doi = 10.3390/ijerph17124487 | pmc = 7345938 | doi-access = free | title-link = doi }}</ref><ref>{{#invoke:Cite|journal | vauthors = Domingo JL, Marquès M, Rovira J | title = Influence of airborne transmission of SARS-CoV-2 on COVID-19 pandemic. A review | journal = Environmental Research | volume = 188 | article-number = 109861 | date = September 2020 | pmid = 32718835 | pmc = 7309850 | doi = 10.1016/j.envres.2020.109861 | bibcode = 2020ER....18809861D }}</ref> Pre-existing heart and lung diseases<ref>{{#invoke:Cite|web|url=https://www.mayoclinic.org/diseases-conditions/coronavirus/in-depth/coronavirus-who-is-at-risk/art-20483301|title=COVID-19: Who's at higher risk of serious symptoms?|website=Mayo Clinic}}</ref> and also [[obesity]], especially in conjunction with [[fatty liver disease]], contributes to an increased health risk of COVID‑19.<ref name="engin-review" /><ref>{{#invoke:Cite|journal | vauthors = Tamara A, Tahapary DL | title = Obesity as a predictor for a poor prognosis of COVID-19: A systematic review | journal = Diabetes & Metabolic Syndrome | volume = 14 | issue = 4 | pages = 655–659 | date = July 2020 | pmid = 32438328 | pmc = 7217103 | doi = 10.1016/j.dsx.2020.05.020 | doi-access = free | title-link = doi }}</ref><ref>{{#invoke:Cite|journal | vauthors = Petrakis D, Margină D, Tsarouhas K, Tekos F, Stan M, Nikitovic D, Kouretas D, Spandidos DA, Tsatsakis A | title = Obesity – A risk factor for increased COVID-19, severity and lethality (Review) | journal = Molecular Medicine Reports | volume = 22 | issue = 1 | pages = 9–19 | date = July 2020 | pmid = 32377709 | pmc = 7248467 | doi = 10.3892/mmr.2020.11127 | doi-access = free | title-link = doi }}</ref><ref>{{#invoke:Cite|journal |vauthors=Roca-Fernández A, Dennis A, Nicholls R, McGonigle J, Kelly M, Banerjee R, Banerjee A, Sanyal AJ |date=29 March 2021 |title=Hepatic Steatosis, Rather Than Underlying Obesity, Increases the Risk of Infection and Hospitalization for COVID-19 |journal=Frontiers in Medicine |volume=8 |article-number=636637 |doi=10.3389/fmed.2021.636637 |pmid=33855033 |pmc=8039134 |issn=2296-858X|doi-access = free | title-link = doi }}</ref>

      It is also assumed that those that are immunocompromised are at higher risk of getting severely sick from SARS-CoV-2.<ref>{{#invoke:Cite|web|url=https://www.cdc.gov/coronavirus/2019-ncov/need-extra-precautions/immunocompromised.html|title=Coronavirus Disease 2019 (COVID-19)|date=11 February 2020|website=U.S. [[Centers for Disease Control and Prevention]] (CDC) }}</ref> One research study that looked into the COVID‑19 infections in hospitalised kidney transplant recipients found a mortality rate of 11%.<ref>{{#invoke:Cite|journal | vauthors = Devresse A, Belkhir L, Vo B, Ghaye B, Scohy A, Kabamba B, Goffin E, De Greef J, Mourad M, De Meyer M, Yombi JC, Kanaan N | title = COVID-19 Infection in Kidney Transplant Recipients: A Single-Center Case Series of 22 Cases From Belgium | journal = Kidney Medicine | volume = 2 | issue = 4 | pages = 459–466 | date = November 2020 | pmid = 32775986 | pmc = 7295531 | doi = 10.1016/j.xkme.2020.06.001 }}</ref>

      Men with untreated [[hypogonadism]] were 2.4 times more likely than men with eugonadism to be hospitalised if they contracted COVID-19; Hypogonad men treated with [[testosterone]] were less likely to be hospitalised for COVID-19 than men who were not treated for hypogonadism.<ref name="jama">{{#invoke:Cite|journal | vauthors = Dhindsa S, Champion C, Deol E, Lui M, Campbell R, Newman J, Yeggalam A, Nadella S, Ahir V, Shrestha E, Kannampallil T, Diwan A | title = Association of Male Hypogonadism With Risk of Hospitalization for COVID-19 | journal = JAMA Network Open | volume = 5 | issue = 9 | article-number = e2229747 | date = September 2022 | pmid = 36053534 | doi = 10.1001/jamanetworkopen.2022.29747 | pmc = 9440397 }}</ref>

      === Genetic risk factors ===
      [[Genetics]] plays an important role in the ability to fight off Covid.<ref name="pmid33888907">{{#invoke:Cite|journal | vauthors = Shelton JF, Shastri AJ, Ye C, Weldon CH, Filshtein-Sonmez T, Coker D, Symons A, Esparza-Gordillo J, Aslibekyan S, Auton A | title = Trans-ancestry analysis reveals genetic and nongenetic associations with COVID-19 susceptibility and severity | journal = Nature Genetics | volume = 53 | issue = 6 | pages = 801–808 | date = June 2021 | pmid = 33888907 | doi = 10.1038/s41588-021-00854-7 | s2cid = 233372385 }}</ref> For instance, those that do not produce detectable [[type I interferon]]s or produce [[autoantibody|auto-antibodies]] against these may get much sicker from COVID‑19.<ref>{{#invoke:Cite|web|title=One in Seven Dire COVID Cases May Result from a Faulty Immune Response|url=https://www.scientificamerican.com/article/one-in-seven-dire-covid-cases-may-result-from-a-faulty-immune-response/|website=Scientific American|vauthors=Wallis C}}</ref><ref>{{#invoke:Cite|journal | vauthors = Bastard P, Rosen LB, Zhang Q, Michailidis E, Hoffmann HH, Zhang Y, Dorgham K, Philippot Q, Rosain J, Béziat V, Manry J, Shaw E, Haljasmägi L, Peterson P, Lorenzo L, Bizien L, Trouillet-Assant S, Dobbs K, de Jesus AA, Belot A, Kallaste A, Catherinot E, Tandjaoui-Lambiotte Y, Le Pen J, Kerner G, Bigio B, Seeleuthner Y, Yang R, Bolze A, Spaan AN, Delmonte OM, Abers MS, Aiuti A, Casari G, Lampasona V, Piemonti L, Ciceri F, Bilguvar K, Lifton RP, Vasse M, Smadja DM, Migaud M, Hadjadj J, Terrier B, Duffy D, Quintana-Murci L, van de Beek D, Roussel L, Vinh DC, Tangye SG, Haerynck F, Dalmau D, Martinez-Picado J, Brodin P, Nussenzweig MC, Boisson-Dupuis S, Rodríguez-Gallego C, Vogt G, Mogensen TH, Oler AJ, Gu J, Burbelo PD, Cohen JI, Biondi A, Bettini LR, D'Angio M, Bonfanti P, Rossignol P, Mayaux J, Rieux-Laucat F, Husebye ES, Fusco F, Ursini MV, Imberti L, Sottini A, Paghera S, Quiros-Roldan E, Rossi C, Castagnoli R, Montagna D, Licari A, Marseglia GL, Duval X, Ghosn J, Tsang JS, Goldbach-Mansky R, Kisand K, Lionakis MS, Puel A, Zhang SY, Holland SM, Gorochov G, Jouanguy E, Rice CM, Cobat A, Notarangelo LD, Abel L, Su HC, Casanova JL | title = Autoantibodies against type I IFNs in patients with life-threatening COVID-19 | journal = Science | volume = 370 | issue = 6515 | article-number = eabd4585 | date = October 2020 | pmid = 32972996 | pmc = 7857397 | doi = 10.1126/science.abd4585 | s2cid = 221914095 | title-link = doi | doi-access = free }}</ref> [[Genetic screening]] is able to detect [[interferon]] effector genes.<ref>{{#invoke:Cite|journal | vauthors = Fusco DN, Brisac C, John SP, Huang YW, Chin CR, Xie T, Zhao H, Jilg N, Zhang L, Chevaliez S, Wambua D, Lin W, Peng L, Chung RT, Brass AL | title = A genetic screen identifies interferon-α effector genes required to suppress hepatitis C virus replication | journal = Gastroenterology | volume = 144 | issue = 7 | pages = 1438–49, 1449.e1-9 | date = June 2013 | pmid = 23462180 | pmc = 3665646 | doi = 10.1053/j.gastro.2013.02.026 }}</ref> Some genetic variants are risk factors in specific populations. For instance, an [[allele]] of the [[DOCK2]] gene (dedicator of cytokinesis 2 gene) is a common risk factor in Asian populations but much less common in Europe. The mutation leads to lower expression of DOCK2 especially in younger people with severe COVID-19 infections.<ref>{{#invoke:Cite|journal | vauthors = Namkoong H, Edahiro R, Takano T, Nishihara H, Shirai Y, Sonehara K, Tanaka H, Azekawa S, Mikami Y, Lee H, Hasegawa T, Okudela K, Okuzaki D, Motooka D, Kanai M, Naito T, Yamamoto K, Wang QS, Saiki R, Ishihara R, Matsubara Y, Hamamoto J, Hayashi H, Yoshimura Y, Tachikawa N, Yanagita E, Hyugaji T, Shimizu E, Katayama K, Kato Y, Morita T, Takahashi K, Harada N, Naito T, Hiki M, Matsushita Y, Takagi H, Aoki R, Nakamura A, Harada S, Sasano H, Kabata H, Masaki K, Kamata H, Ikemura S, Chubachi S, Okamori S, Terai H, Morita A, Asakura T, Sasaki J, Morisaki H, Uwamino Y, Nanki K, Uchida S, Uno S, Nishimura T, Ishiguro T, Isono T, Shibata S, Matsui Y, Hosoda C, Takano K, Nishida T, Kobayashi Y, Takaku Y, Takayanagi N, Ueda S, Tada A, Miyawaki M, Yamamoto M, Yoshida E, Hayashi R, Nagasaka T, Arai S, Kaneko Y, Sasaki K, Tagaya E, Kawana M, Arimura K, Takahashi K, Anzai T, Ito S, Endo A, Uchimura Y, Miyazaki Y, Honda T, Tateishi T, Tohda S, Ichimura N, Sonobe K, Sassa CT, Nakajima J, Nakano Y, Nakajima Y, Anan R, Arai R, Kurihara Y, Harada Y, Nishio K, Ueda T, Azuma M, Saito R, Sado T, Miyazaki Y, Sato R, Haruta Y, Nagasaki T, Yasui Y, Hasegawa Y, Mutoh Y, Kimura T, Sato T, Takei R, Hagimoto S, Noguchi Y, Yamano Y, Sasano H, Ota S, Nakamori Y, Yoshiya K, Saito F, Yoshihara T, Wada D, Iwamura H, Kanayama S, Maruyama S, Yoshiyama T, Ohta K, Kokuto H, Ogata H, Tanaka Y, Arakawa K, Shimoda M, Osawa T, Tateno H, Hase I, Yoshida S, Suzuki S, Kawada M, Horinouchi H, Saito F, Mitamura K, Hagihara M, Ochi J, Uchida T, Baba R, Arai D, Ogura T, Takahashi H, Hagiwara S, Nagao G, Konishi S, Nakachi I, Murakami K, Yamada M, Sugiura H, Sano H, Matsumoto S, Kimura N, Ono Y, Baba H, Suzuki Y, Nakayama S, Masuzawa K, Namba S, Suzuki K, Naito Y, Liu YC, Takuwa A, Sugihara F, Wing JB, Sakakibara S, Hizawa N, Shiroyama T, Miyawaki S, Kawamura Y, Nakayama A, Matsuo H, Maeda Y, Nii T, Noda Y, Niitsu T, Adachi Y, Enomoto T, Amiya S, Hara R, Yamaguchi Y, Murakami T, Kuge T, Matsumoto K, Yamamoto Y, Yamamoto M, Yoneda M, Kishikawa T, Yamada S, Kawabata S, Kijima N, Takagaki M, Sasa N, Ueno Y, Suzuki M, Takemoto N, Eguchi H, Fukusumi T, Imai T, Fukushima M, Kishima H, Inohara H, Tomono K, Kato K, Takahashi M, Matsuda F, Hirata H, Takeda Y, Koh H, Manabe T, Funatsu Y, Ito F, Fukui T, Shinozuka K, Kohashi S, Miyazaki M, Shoko T, Kojima M, Adachi T, Ishikawa M, Takahashi K, Inoue T, Hirano T, Kobayashi K, Takaoka H, Watanabe K, Miyazawa N, Kimura Y, Sado R, Sugimoto H, Kamiya A, Kuwahara N, Fujiwara A, Matsunaga T, Sato Y, Okada T, Hirai Y, Kawashima H, Narita A, Niwa K, Se