      }}

      Historically, the SAT was more widely used by students living in coastal states and the ACT was more widely used by students in the Midwest and South; in recent years, however, an increasing number of students on the East and West coasts have been taking the ACT.<ref>{{cite news |periodical=Education Week |date=August 30, 2006 |first1=Vaishali |last1=Honawar |last2=Klein |first2=Alyson |title=ACT Scores Improve; More on East Coast Taking the SAT's Rival |url=http://www.edweek.org/ew/articles/2006/08/30/01act.h26.html |access-date=May 29, 2015 |archive-url=https://web.archive.org/web/20150530002000/http://www.edweek.org/ew/articles/2006/08/30/01act.h26.html |archive-date=May 30, 2015 |url-status=live }}</ref><ref>{{cite news |url=https://www.nytimes.com/2007/11/04/education/edlife/guidance.html |title=ACT vs. SAT |newspaper=The New York Times |date=November 4, 2007 |last=Slatalla |first=Michelle |access-date=February 18, 2017 |archive-url=https://web.archive.org/web/20170927160220/http://www.nytimes.com/2007/11/04/education/edlife/guidance.html |archive-date=September 27, 2017 |url-status=live }}</ref> Since 2007, all four-year [[college]]s and [[University|universities]] in the United States that require a test as part of an application for admission will accept either the SAT or ACT, and as of Fall 2022, more than 1400 four-year colleges and universities did not require any standardized test scores at all for admission, though some of them were planning to apply this policy only temporarily due to the [[COVID-19 pandemic|coronavirus pandemic]].<ref>{{cite web |title=Colleges and Universities That Do Not Use SAT/ACT Scores for Admitting Substantial Numbers of Students Into Bachelor Degree Programs |url=http://www.fairtest.org/university/optional |publisher=The National Center for Fair & Open Testing |author=<!--Staff writer(s); no by-line.--> |website=fairtest.org |access-date=September 26, 2017 |archive-url=https://web.archive.org/web/20170928123652/http://www.fairtest.org/university/optional |archive-date=September 28, 2017 |url-status=live }}</ref><ref>{{cite news |url=http://usatoday30.usatoday.com/news/education/2007-03-18-life-cover-acts_N.htm |title=All four-year U.S. colleges now accept ACT test |newspaper=USA Today |date=March 18, 2007 |last=Marklein |first=Mary Beth |access-date=May 29, 2015 |archive-url=https://web.archive.org/web/20150530004932/http://usatoday30.usatoday.com/news/education/2007-03-18-life-cover-acts_N.htm |archive-date=May 30, 2015 |url-status=live }}</ref>

      SAT test-takers are given 2 hours and 14 minutes to complete the test (plus a 10-minute break between the Reading and Writing section and the Math section),<ref>{{cite web | url=https://satsuite.collegeboard.org/sat/whats-on-the-test/structure | title=How the SAT is Structured – SAT Suite &#124; College Board | access-date=January 27, 2022 | archive-date=March 6, 2024 | archive-url=https://web.archive.org/web/20240306025408/https://satsuite.collegeboard.org/sat/whats-on-the-test/structure | url-status=live }}</ref> and {{as of|2024|lc=y||df=}} the test costs US$60, plus additional fees for late test registration, registration by phone, registration changes, rapid delivery of results, delivery of results to more than four institutions, result deliveries ordered more than nine days after the test, and testing administered outside the United States, as applicable, and fee waivers are offered to low-income students within the U.S. and its territories.<ref name=costs>{{cite web |url=https://blog.collegeboard.org/how-much-does-sat-cost |title=SAT Registration Fees |date=May 15, 2015 |access-date=January 7, 2017 |publisher=[[College Board]] |archive-url=https://web.archive.org/web/20150906184018/https://collegereadiness.collegeboard.org/sat/register/fees |archive-date=September 6, 2015 |url-status=live }}</ref><ref>{{cite web | url=https://satsuite.collegeboard.org/sat/scores/send-scores-to-colleges/sending-scores | title=Send SAT Scores to Colleges - SAT Suite &#124; College Board }}</ref><ref>{{cite web | url=https://satsuite.collegeboard.org/sat/scores/send-scores-to-colleges/rush-reporting | title=SAT Score Rush Reporting – SAT Suite &#124; College Board | access-date=June 25, 2024 | archive-date=June 25, 2024 | archive-url=https://web.archive.org/web/20240625210404/https://satsuite.collegeboard.org/sat/scores/send-scores-to-colleges/rush-reporting | url-status=live }}</ref> Scores on the SAT range from 400 to 1600, combining test results from two 200-to-800-point sections: the Mathematics section and the Evidence-Based Reading and Writing section. Although taking the SAT, or its competitor the [[ACT (test)|ACT]], is required for freshman entry to many colleges and universities in the United States,<ref>{{cite news|url=https://www.nytimes.com/2009/07/26/education/edlife/26guidance-t.html|title=The Other Side of 'Test Optional'|last=O'Shaughnessy|first=Lynn|date=July 26, 2009|work=The New York Times|page=6|access-date=June 22, 2011|archive-url=https://web.archive.org/web/20181119065733/https://www.nytimes.com/2009/07/26/education/edlife/26guidance-t.html|archive-date=November 19, 2018|url-status=live}}</ref> during the late 2010s, many institutions made these entrance exams [[#Optional SAT|optional]],<ref>{{cite news|last=Capuzzi Simon|first=Cecilia|date=November 1, 2015|title=The Test-Optional Surge|work=The New York Times|url=https://www.nytimes.com/2015/11/01/education/edlife/the-test-optional-surge.html|url-status=live|access-date=August 12, 2019|archive-url=https://web.archive.org/web/20190812183206/https://www.nytimes.com/2015/11/01/education/edlife/the-test-optional-surge.html|archive-date=August 12, 2019}}</ref><ref name="Farmer-2020">{{Cite news|last1=Farmer|first1=Angela|last2=Wai|first2=Jonathan|date=September 21, 2020|title=Many colleges have gone test-optional – here's how that could change the way students are admitted|work=The Conversation|url=https://theconversation.com/many-colleges-have-gone-test-optional-heres-how-that-could-change-the-way-students-are-admitted-144998|access-date=February 2, 2020|archive-date=September 23, 2020|archive-url=https://web.archive.org/web/20200923075612/https://theconversation.com/many-colleges-have-gone-test-optional-heres-how-that-could-change-the-way-students-are-admitted-144998|url-status=live}}</ref><ref name="Strauss-2019">{{Cite news|last=Strauss|first=Valerie|date=|title=A record number of colleges drop SAT/ACT admissions requirement amid growing disenchantment with standardized tests|newspaper=The Washington Post|url=https://www.washingtonpost.com/education/2019/10/18/record-number-colleges-drop-satact-admissions-requirement-amid-growing-disenchantment-with-standardized-tests/|access-date=February 2, 2021|archive-date=August 21, 2023|archive-url=https://web.archive.org/web/20230821181120/https://www.washingtonpost.com/education/2019/10/18/record-number-colleges-drop-satact-admissions-requirement-amid-growing-disenchantment-with-standardized-tests/|url-status=live}}</ref> but this did not stop the students from attempting to achieve high scores<ref name="Selingo-2020">{{Cite news|last=Selingo|first=Jeffrey|date=September 16, 2020|title=The SAT and the ACT Will Probably Survive the Pandemic — Thanks to Students|work=The Atlantic|url=https://www.theatlantic.com/ideas/archive/2020/09/even-coronavirus-cant-kill-sat-and-act/616360/|url-status=live|access-date=February 2, 2021|archive-url=https://web.archive.org/web/20210203012800/https://www.theatlantic.com/ideas/archive/2020/09/even-coronavirus-cant-kill-sat-and-act/616360/|archive-date=February 3, 2021}}</ref> as they and their parents were skeptical of what "optional" meant in this context.<ref name="Quilantan-2021">{{Cite news |last=Quilantan |first=Bianca |date=January 18, 2021 |title=Access to college admissions tests — and lucrative scholarships — imperiled by the pandemic |url=https://www.politico.com/news/2021/01/18/sat-act-requirements-coronavirus-459797 |url-status=live |archive-url=https://web.archive.org/web/20210831151018/https://www.politico.com/news/2021/01/18/sat-act-requirements-coronavirus-459797 |archive-date=August 31, 2021 |access-date=August 31, 2021 |work=Politico}}</ref> In fact, the [[#Test-taking population|test-taking population]] was increasing steadily,<ref name="Hobbs-2019">{{Cite news|last=Hobbs|first=Tawnell D.|date=September 24, 2019|title=SAT Scores Fall as More Students Take the Test|work=[[The Wall Street Journal]]|url=https://www.wsj.com/articles/sat-scores-fall-as-more-students-take-the-test-11569297660|url-status=live|access-date=February 2, 2021|archive-url=https://web.archive.org/web/20201128082452/https://www.wsj.com/articles/sat-scores-fall-as-more-students-take-the-test-11569297660|archive-date=November 28, 2020}}</ref> and while this may have resulted in a long-term decline in scores,<ref name="Hobbs-2019" /><ref name="Anderson-2015">{{Cite news|last=Anderson|first=Nick|date=September 3, 2015|title=SAT scores at lowest level in 10 years, fueling worries about high schools|newspaper=The Washington Post|url=https://www.washingtonpost.com/local/education/sat-scores-at-lowest-level-in-10-years-fueling-worries-about-high-schools/2015/09/02/6b73ec66-5190-11e5-9812-92d5948a40f8_story.html|access-date=September 17, 2020|archive-date=September 5, 2015|archive-url=https://web.archive.org/web/20150905052327/http://www.washingtonpost.com/local/education/sat-scores-at-lowest-level-in-10-years-fueling-worries-about-high-schools/2015/09/02/6b73ec66-5190-11e5-9812-92d5948a40f8_story.html|url-status=live}}</ref><ref name="Twenge-2019">{{Cite journal|last1=Twenge|first1=Jean|last2=Campbell|first2=W. Keith|last3=Sherman|first3=Ryne A.|date=2019|title=Declines in vocabulary among American adults within levels of educational attainment, 1974–2016|journal=Intelligence|volume=76|article-number=101377|doi=10.1016/j.intell.2019.101377|s2cid=200037032}}</ref> experts cautioned against using this to gauge the scholastic levels of the entire U.S. population.<ref name="Twenge-2019" />

      Scores are typically released two to four weeks after the exam. SAT weekend scores are typically released after two weeks whereas SAT school day scores being more variable.<ref>{{Cite web |title=Score Release Dates for Students and Educators – SAT Suite {{!}} College Board |url=https://satsuite.collegeboard.org/scores/score-release-dates |access-date=2025-04-29 |website=satsuite.collegeboard.org |language=en}}</ref> Students may be able to cancel their scores up to one week after their exam.<ref>{{Cite web |title=Canceling Your SAT Weekend Scores – SAT Suite {{!}} College Board |url=https://satsuite.collegeboard.org/scores/canceling-sat-scores/sat-weekend |access-date=2025-04-29 |website=satsuite.collegeboard.org |language=en}}</ref>

      ==Structure==

      The current digitally-administered SAT has two main sections: [[Reading (process)|reading]] and [[writing]], and [[Mathematics|math]]. Each of these sections is further broken down into two equal-length "modules". (Until the summer of 2021, the test taker was also optionally able to write an essay as part of an additional test section. The essay was dropped after June 2021, except in a few states and school districts.<ref name=SorensenUSNews>{{Cite web |last=Sorensen |first=Tiffany |title=The Optional SAT Essay: What to Know |url=https://www.usnews.com/education/blogs/college-admissions-playbook/articles/what-to-know-about-the-optional-sat-essay |archive-date=January 26, 2023 |access-date=October 2, 2023 |website=[[U.S. News]] |archive-url=https://web.archive.org/web/20230126053717/https://www.usnews.com/education/blogs/college-admissions-playbook/articles/what-to-know-about-the-optional-sat-essay |url-status=live }}</ref>) The total time for the scored portion of the SAT is 2 hours and 14 minutes.<ref name="HowStructured" />

      A score for each section is reported on a scale of 200 to 800, and each section score is a multiple of ten. A total score for the SAT is calculated by adding the two section scores, resulting in total scores that range from 400 to 1600. In addition to the two section scores, several subsection "performance" scores (example subsections: "Craft and Structure" in Reading and Writing, and "Algebra" in Math) are also reported for each section. There is no penalty or negative marking for guessing on the SAT: scores are based on the number of questions answered correctly.<ref>{{cite web |title=SAT Weekend Understanding Scores |url=https://satsuite.collegeboard.org/media/pdf/sat-understanding-scores.pdf |website=College Board |access-date=May 7, 2025 |archive-date=March 23, 2025 |archive-url=https://web.archive.org/web/20250323031659/https://satsuite.collegeboard.org/media/pdf/sat-understanding-scores.pdf |url-status=live }}</ref><ref>{{cite web |title=What Is Digital SAT Adaptive Testing? |url=https://blog.collegeboard.org/what-digital-sat-adaptive-testing |website=College Board |access-date=May 7, 2025 |archive-date=January 24, 2025 |archive-url=https://web.archive.org/web/20250124102837/https://blog.collegeboard.org/what-digital-sat-adaptive-testing |url-status=live }}</ref>

      The essay, if taken as part of an SAT School Day administration, is scored separately from the two section scores.<ref>{{cite web |title=SAT School Day Essay |url=https://satsuite.collegeboard.org/sat-school-day/taking-the-test/essay |website=College Board |access-date=May 7, 2025 |archive-date=January 24, 2025 |archive-url=https://web.archive.org/web/20250124192124/https://satsuite.collegeboard.org/sat-school-day/taking-the-test/essay |url-status=live }}</ref><ref name="sat-educ-guide">{{cite web |title=The SAT and SAT Subject Tests Educator Guide |url=https://collegereadiness.collegeboard.org/pdf/sat-educator-guide.pdf |publisher=College Board |access-date=July 20, 2017 |archive-url=https://web.archive.org/web/20171018203516/https://collegereadiness.collegeboard.org/pdf/sat-educator-guide.pdf |archive-date=October 18, 2017 |url-status=live }}</ref> Two people score each essay by each awarding 1 to 4 points in each of three categories: reading, analysis, and writing.<ref>{{cite web |title=SAT Essay |url=https://collegereadiness.collegeboard.org/sat/inside-the-test/essay |website=CollegeBoard |date=December 3, 2014 |access-date=March 25, 2021 |archive-date=April 18, 2021 |archive-url=https://web.archive.org/web/20210418044249/https://collegereadiness.collegeboard.org/sat/inside-the-test/essay |url-status=live }}</ref> These two scores from the different examiners are then combined to give a total score from 2 to 8 points per category. Though sometimes people quote their essay score out of 24, the College Board themselves do not combine the different categories to give one essay score, instead giving a score for each category.

      The optional essay was last featured nationally in the June 2021 administration.<ref name="College Board-2021" /><ref name="Hartocollis-2021" /> College Board said it discontinued the essay section because "there are other ways for students to demonstrate their mastery of essay writing," including the test's reading and writing portion.<ref name="College Board-2021" /><ref name="Hartocollis-2021" /> It also acknowledged that the [[COVID-19 pandemic]] had played a role in the change, accelerating 'a process already underway'.<ref name="Hartocollis-2021" />

      === Reading and Writing ===
      The reading and writing section consists of two equal modules, each 32 minutes long with 27 questions.<ref name=":0" /> The modules consist of short reading passages or passage pairs, each of which is followed by a single multiple-choice question. The passages are 25 to 150 words in length. Content domains of the reading and writing section include vocabulary, sentence structure and usage, and interpretation of tables and graphs.<ref>{{cite web|title=The Reading and Writing Section |publisher=College Board |url=https://satsuite.collegeboard.org/sat/whats-on-the-test/reading-writing |access-date=August 14, 2025 |archive-url=https://web.archive.org/web/20250630112820/https://satsuite.collegeboard.org/sat/whats-on-the-test/reading-writing |url-status=live |archive-date=June 30, 2025 }}</ref>

      === Mathematics ===
      [[File:SAT-Grid-In-Example.svg|thumb|right|An example from the pre-digital pencil-and-paper SAT exam of a student-produced response math question and the correctly filled in answer.]]

      The [[mathematics]] portion of the SAT is divided into two modules, each 35 minutes long with 22 questions.<ref name="HowStructured" /> The topics covered are [[algebra]] (13 to 15 questions), advanced high school math (13 to 15 questions), problem solving and data analysis (5 to 7 questions), and [[geometry]] and [[trigonometry]] (5 to 7 questions).<ref>{{cite web|title=The Math Section: Overview |publisher=College Board |url=https://satsuite.collegeboard.org/sat/whats-on-the-test/math/overview |access-date=August 14, 2025 |archive-url=https://web.archive.org/web/20250625021520/https://satsuite.collegeboard.org/sat/whats-on-the-test/math/overview |url-status=live |archive-date=June 25, 2025 }}</ref> Roughly 75% of the math questions are 4-option multiple-choice; the remaining 25% are student-produced response (SPR) questions and require the student to type in a numerical response. The SPR questions may have more than one correct answer.<ref>{{cite web|title=The Math Section: Student-Produced Responses |publisher=College Board |url=https://satsuite.collegeboard.org/sat/whats-on-the-test/math/student-produced |access-date=August 14, 2025 |archive-url=https://web.archive.org/web/20250709084613/https://satsuite.collegeboard.org/sat/whats-on-the-test/math/student-produced |url-status=live |archive-date=July 9, 2025 }}</ref> [[Calculator]]s are permitted on all questions in the math portion of the SAT. A [[Desmos]]-based calculator is available and built into the testing software; in addition, students may use an approved type of physical calculator.<ref>{{cite web|title=SAT Calculator Policy |publisher=College Board |url=https://satsuite.collegeboard.org/sat/what-to-bring-do/calculator-policy |access-date=August 14, 2025 |archive-url=https://web.archive.org/web/20250714202613/https://satsuite.collegeboard.org/sat/what-to-bring-do/calculator-policy |url-status=live |archive-date=July 14, 2025 }}</ref>

      A study of calculator use on SAT I: Reasoning Test math scores found that performance on the math section was [[Association (statistics)|associated]] with the extent of calculator use: those using calculators on about one third to one half of the items averaged higher scores than those using calculators more or less frequently. However, the effect was "more likely to have been the result of able students using calculators differently than less able students rather than calculator use per se."<ref>{{cite web|url=http://research.collegeboard.org/publications/content/2012/05/calculator-use-and-sat-i-math|title=Calculator Use and the SAT I Math|publisher=The College Board|first1=Janice|last1=Scheuneman|first2=Wayne|last2=Camara|access-date=April 3, 2016|archive-url=https://web.archive.org/web/20160403142301/http://research.collegeboard.org/publications/content/2012/05/calculator-use-and-sat-i-math|archive-date=April 3, 2016}}</ref> There is some evidence that the frequent use of a calculator in school outside of the testing situation has a positive effect on test performance compared to those who do not use calculators in school.<ref>{{cite web|url=http://ti-researchlibrary.com/Lists/TI%20Education%20Technology%20%20Research%20Library/Attachments/37/RN2%20-%20GC%20on%20important%20tests.pdf|title=Should graphing calculators be allowed on important tests?|publisher=Texas Instruments|access-date=April 2, 2016|archive-url=https://web.archive.org/web/20160422040211/http://ti-researchlibrary.com/Lists/TI%20Education%20Technology%20%20Research%20Library/Attachments/37/RN2%20-%20GC%20on%20important%20tests.pdf|archive-date=April 22, 2016|url-status=live}}</ref>

      === Style of questions ===
      Most of the questions on the SAT, except for the student-produced responses (SPR) in the math section, are [[multiple choice]]; all multiple-choice questions have four answer choices, one of which is correct. About 25% of the math section is SPR. They instead require the test taker to enter in a number.<ref>{{Cite web |title=Student-Produced Responses – SAT Suite {{!}} College Board |url=https://satsuite.collegeboard.org/sat/whats-on-the-test/math/student-produced |access-date=2025-04-29 |website=satsuite.collegeboard.org |language=en}}</ref>

      Not all questions on each section of the SAT are weighted equally; students earn more scores for answering more difficult questions correctly.<ref>{{Cite web |title=The Ins and Outs of the Digital SAT {{!}} Scoir |url=https://www.scoir.com/blog/the-ins-and-outs-of-the-digital-sat |access-date=2025-04-29 |website=www.scoir.com |language=en-us}}</ref> There are experimental problems which are used by College Board to test future test questions. Answering experimental questions, either correctly or incorrectly, does not impact the test score. Experimental questions are used for evaluating new types of questions for future SATs.<ref>{{Cite web |last=Laszlo |first=Sara |date=2025-03-19 |title=Your Guide to the Digital SAT |url=https://testinnovators.com/blog/digital-sat-guide/ |access-date=2025-04-29 |website=Test Innovators |language=en-US}}</ref>

