      On December 31, 2019, China announced the discovery of a cluster of [[pneumonia]] cases in [[Wuhan]]. The first American case of [[COVID-19]] was reported on January 20,<ref>{{cite journal |last1=Holshue |first1=Michelle L. |last2=DeBolt |first2=Chas |last3=Lindquist |first3=Scott |last4=Lofy |first4=Kathy H. |last5=Wiesman |first5=John |last6=Bruce |first6=Hollianne |last7=Spitters |first7=Christopher |last8=Ericson |first8=Keith |last9=Wilkerson |first9=Sara |last10=Tural |first10=Ahmet |last11=Diaz |first11=George |last12=Cohn |first12=Amanda |last13=Fox |first13=LeAnne |last14=Patel |first14=Anita |last15=Gerber |first15=Susan I. |date=2020-03-05 |title=First Case of 2019 Novel Coronavirus in the United States |journal=New England Journal of Medicine |language=en |volume=382 |issue=10 |pages=929–936 |doi=10.1056/NEJMoa2001191 |pmid=32004427 |issn=0028-4793 |pmc=7092802 }}</ref> and [[United States Department of Health and Human Services|Health and Human Services]] Secretary [[Alex Azar]] declared a [[Public health emergency (United States)|public health emergency]] on January 31.<ref>{{Cite web |date=March 13, 2020 |title=Proclamation on Declaring a National Emergency Concerning the Novel Coronavirus Disease (COVID-19) Outbreak |url=https://trumpwhitehouse.archives.gov/presidential-actions/proclamation-declaring-national-emergency-concerning-novel-coronavirus-disease-covid-19-outbreak/ |website=The White House}}</ref> Restrictions were placed on flights arriving from China,<ref>{{cite news|url=https://www.npr.org/sections/health-shots/2020/01/31/801686524/trump-declares-coronavirus-a-public-health-emergency-and-restricts-travel-from-c |publisher=[[NPR]] |date=January 31, 2020 |access-date=March 18, 2020 |title=Trump Declares Coronavirus A Public Health Emergency And Restricts Travel From China |last=Aubrey |first=Allison|quote='Foreign nationals other than immediate family of U.S. citizens and permanent residents who have traveled in China in the last 14 days will be denied entry into United States,' Azar said.}}</ref><ref name="RobertsonApril15">{{cite web|url=https://www.factcheck.org/2020/04/trumps-snowballing-china-travel-claim |title=Trump's Snowballing China Travel Claim |first=Lori |last=Robertson |date=April 15, 2020 |website=[[FactCheck.org]] |access-date=April 29, 2020|quote=... effective February 2.}}</ref> but the initial U.S. response to the [[COVID-19 pandemic]] was otherwise slow in terms of preparing the healthcare system, stopping other travel, and [[COVID-19 testing in the United States|testing]].<ref>{{cite news|last1=Lemire |first1=Jonathan |last2=Miller |first2=Zeke |last3=Colvin |first3=Jill |last4=Alonso-Zaldivar |first4=Ricardo |title=Signs missed and steps slowed in Trump's pandemic response |url=https://apnews.com/6a8f85aad99607f313cca6ab1398e04d |access-date=April 28, 2020 |publisher=[[Associated Press]] |date=April 12, 2020}}</ref><ref name=":10">{{cite news|last1=Pilkington|first1=Ed|url=https://www.theguardian.com/us-news/2020/mar/28/trump-coronavirus-politics-us-health-disaster|title=The missing six weeks: how Trump failed the biggest test of his life|date=March 28, 2020|work=[[The Guardian]]|access-date=March 28, 2020|last2=McCarthy|first2=Tom|issn=0261-3077}}</ref><ref>{{Cite Q|Q104180080|access-date=April 28, 2020|last=Ollstein|first=Alice Miranda}}</ref>{{Efn|A lack of mass testing obscured the extent of the outbreak.<ref name="WhoriskeyMarch16">{{cite news|last1=Whoriskey|first1=Peter|url=https://www.washingtonpost.com/business/2020/03/16/cdc-who-coronavirus-tests/|title=How U.S. coronavirus testing stalled: Flawed tests, red tape and resistance to using the millions of tests produced by the WHO|date=March 16, 2020|newspaper=[[The Washington Post]]|access-date=March 18, 2020|last2=Satija|first2=Neena}}</ref>}}<ref name="Banco">{{cite news|last1=Banco |first1=Erin |title=Inside America's Covid-reporting breakdown |url=https://www.politico.com/news/2021/08/15/inside-americas-covid-data-gap-502565 |access-date=May 9, 2022 |work=[[Politico]] |date=August 15, 2021 }}</ref> The first known American deaths occurred in February<ref>{{cite web |url=https://www.npr.org/sections/coronavirus-live-updates/2020/04/22/840836618/1st-known-u-s-covid-19-death-was-on-feb-6-a-post-mortem-test-reveals |title=1st Known U.S. COVID-19 Death Was Weeks Earlier Than Previously Thought |work=NPR |last=Chappell |first=Bill |date=April 22, 2020 |access-date=January 31, 2025}}</ref> and in late February President [[Donald Trump]] proposed allocating $2.5 billion to fight the outbreak. Instead, Congress approved $8.3 billion and Trump signed the [[Coronavirus Preparedness and Response Supplemental Appropriations Act, 2020]] on March 6.<ref name="auto1">{{Cite web|url=https://apnews.com/article/donald-trump-ap-top-news-virus-outbreak-politics-public-health-30fc0af2ffb9320e1d8fa6bb6d8b23a1|title=Trump signs $8.3B bill to combat coronavirus outbreak in US|date=March 6, 2020|website=AP News}}</ref> Trump declared a [[State of emergency|national emergency]] on March 13.<ref name="auto3">{{Cite web|url=https://www.fema.gov/press-release/20250602/covid-19-emergency-declaration|title=COVID-19 Emergency Declaration &#124; FEMA.gov|date=March 14, 2020|website=www.fema.gov}}</ref> The government also purchased large quantities of medical equipment, invoking the [[Defense Production Act of 1950]] to assist.<ref name=WatsonMarch27>{{cite news|last1=Watson |first1=Kathryn |title=Trump invokes Defense Production Act to require GM to produce ventilators |url=https://www.cbsnews.com/news/trump-invokes-defense-production-act-to-require-gm-to-produce-ventilators-2020-03-27/ |access-date=April 24, 2020 |publisher=[[CBS News]] |date=March 27, 2020}}</ref> By mid-April, disaster declarations were made by all states and territories as they all had increasing cases. A second wave of infections began in June, following relaxed restrictions in several states, leading to daily cases surpassing 60,000. By mid-October, a third surge of cases began; there were over 200,000 new daily cases during parts of December 2020 and January 2021.<ref>{{cite news|title=COVID-19 Cases Are Skyrocketing, But Deaths Are Flat – So Far. These 5 Charts Explain Why|url=https://time.com/5903590/coronavirus-covid-19-third-wave/|access-date=February 25, 2021|magazine=[[Time (magazine)|Time]]|date=October 26, 2020 }}</ref><ref>{{cite web|date=March 28, 2020|title=COVID Data Tracker|url=https://covid.cdc.gov/covid-data-tracker|access-date=September 21, 2021|website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref>

      [[COVID-19 vaccine]]s became available in December 2020, under emergency use, beginning the [[COVID-19 vaccination in the United States|national vaccination program]], with the first vaccine officially approved by the [[Food and Drug Administration]] (FDA) on August 23, 2021.<ref>{{cite press release | title=FDA Approves First COVID-19 Vaccine | website=U.S. [[Food and Drug Administration]] (FDA) | date=August 23, 2021 | url=https://www.fda.gov/news-events/press-announcements/fda-approves-first-covid-19-vaccine | access-date=October 16, 2021}}</ref> Studies have shown them to be highly protective against severe illness, hospitalization, and death. In comparison with fully vaccinated people, the CDC found that those who were unvaccinated were from 5 to nearly 30 times more likely to become either infected or hospitalized. There nonetheless was some [[COVID-19 vaccine hesitancy in the United States|vaccine hesitancy]] for various reasons, although side effects were rare.<ref>[https://abc7.com/covid-vaccine-19-coronavirus-polio/10899542/ "Fauci: Polio would still exist in US if 'false information' being spread now existed decades ago"], ''ABC News'', July 20, 2021</ref><ref>{{cite news|url=https://www.cnbc.com/2021/07/06/dr-fauci-where-to-expect-covid-surges-in-the-us-and-safety-tips.html|title=Dr. Fauci: Where to expect new Covid surges in the U.S.—and what it means for mask-wearing, other restrictions|publisher=[[CNBC]]|last=Stieg|first=Cory|date=July 6, 2021|access-date=July 11, 2021}}</ref> There were also numerous reports that unvaccinated COVID-19 patients [[2021 hospital crisis in the U.S. from COVID-19|strained the capacity of hospitals throughout the country]], forcing many to turn away patients with life-threatening diseases.

      A fourth rise in infections began in March 2021 amidst the rise of the [[Alpha variant]], a more easily transmissible variant first detected in the [[COVID-19 pandemic in the United Kingdom|United Kingdom]]. That was followed by a rise of the [[Delta variant]], an even more infectious mutation first detected in [[COVID-19 pandemic in India|India]], leading to increased efforts to ensure safety. The January 2022 emergence of the [[Omicron variant]], which was first discovered in [[South Africa]], led to record highs in hospitalizations and cases in early 2022, with as many as 1.5 million new infections reported in a single day.<ref>{{cite web|last=Rattner|first=Nate|date=January 11, 2022|title=U.S. sets fresh records for Covid hospitalizations and cases with 1.5 million new infections|url=https://www.cnbc.com/2022/01/11/omicron-variant-us-sets-fresh-records-for-covid-hospitalizations-and-cases-with-1point5-million-new-infections.html|access-date=January 12, 2022|publisher=[[CNBC]]}}</ref> By the end of 2022, an estimated 77.5% of Americans had had COVID-19 at least once, according to the CDC.<ref>{{cite web|last=Vlachou |first=Marita |date=2023-07-04 |title=CDC Estimates How Many Americans Hadn't Had COVID By End Of 2022 |url=https://www.huffpost.com/entry/covid-americans-study-seroprevalence_n_64a3f2bfe4b030efa12297ca |access-date=2023-07-04 |website=[[HuffPost]] |language=en}}</ref>

      [[U.S. state and local government responses to the COVID-19 pandemic|State and local responses]] to the pandemic during the public health emergency included the requirement to wear a [[Face masks during the COVID-19 pandemic|face mask]] in specified situations (mask mandates), prohibition and cancellation of large-scale gatherings (including festivals and sporting events), [[COVID-19 lockdowns|stay-at-home orders]], and [[Impact of the COVID-19 pandemic on education#United States|school closures]].<ref name="nyt sports">{{cite news|last1=Deb|first1=Sopan|url=https://www.nytimes.com/2020/03/11/sports/basketball/warriors-coronavirus-fans.html |archive-url=https://web.archive.org/web/20200311184643/https://www.nytimes.com/2020/03/11/sports/basketball/warriors-coronavirus-fans.html |archive-date=March 11, 2020 |url-access=subscription |url-status=live|title=Sports Leagues Bar Fans and Cancel Games Amid Coronavirus Outbreak|date=March 11, 2020|newspaper=[[The New York Times]]|access-date=March 12, 2020|last2=Cacciola|first2=Scott|issn=0362-4331|last3=Stein|first3=Marc}}</ref> Disproportionate numbers of cases were observed among [[African Americans|Black]] and [[Hispanic and Latino Americans|Latino]] populations,<ref name="Godoy">{{cite news|last=Godoy|first=Maria|date=May 30, 2020|title=What Do Coronavirus Racial Disparities Look Like State By State?|url=https://www.npr.org/sections/health-shots/2020/05/30/865413079/what-do-coronavirus-racial-disparities-look-like-state-by-state|publisher=[[NPR]]}}</ref><ref name="abcnews.go.com">{{cite news|last1=Karson|first1=Kendall|last2=Scanlan|first2=Quinn|date=May 22, 2020|title=Black Americans and Latinos nearly 3 times as likely to know someone who died of COVID-19: Poll|url=https://abcnews.go.com/Politics/black-americans-latinos-times-died-covid-19-poll/story?id=70794789|publisher=[[ABC News (United States)|ABC News]]}}</ref><ref name="ama-assn.org">{{cite news|date=July 28, 2020 |title=States tracking COVID-19 race and ethnicity data|website=American Medical Association|url=https://www.ama-assn.org/delivering-care/health-equity/states-tracking-covid-19-race-and-ethnicity-data|access-date=July 31, 2020}}</ref> as well as elevated levels of vaccine hesitancy,<ref>{{cite web|vauthors=Beleche T, etal|title=COVID-19 Vaccine Hesitancy: Demographic Factors, Geographic Patterns, and Changes Over Time|date=May 2021|publisher=Assistant Secretary for Planning and Evaluation, US HHS|access-date=August 9, 2021|url=https://aspe.hhs.gov/sites/default/files/private/pdf/265341/aspe-ib-vaccine-hesitancy.pdf}}</ref><ref>{{cite web|title=Black Americans' Vaccine Hesitancy is Grounded in More Than Mistrust|last=Livingston |first=Cydney|date=April 8, 2021|access-date=August 9, 2021|url=https://researchblog.duke.edu/2021/04/08/black-americans-vaccine-hesitancy-is-grounded-by-more-than-mistrust/|publisher=Duke University }}</ref> and there was a sharp increase in reported [[Xenophobia and racism related to the COVID-19 pandemic#United States|incidents of xenophobia and racism]] against [[Asian Americans]].<ref>{{cite web|title=New report finds 169 percent surge in anti-Asian hate crimes during the first quarter|url=https://www.nbcnews.com/news/asian-america/new-report-finds-169-percent-surge-anti-asian-hate-crimes-n1265756|access-date=December 27, 2021|website=[[NBC News]]|date=April 28, 2021 }}</ref><!-- THAT SENTENCE WAS AFFIRMED BY AN RFC. DO NOT REMOVE WITHOUT CONSENSUS. --><ref name="NYT Racism">{{cite news|last1=Tavernise|first1=Sabrina|url=https://www.nytimes.com/2020/03/23/us/chinese-coronavirus-racist-attacks.html |archive-url=https://web.archive.org/web/20200323175002/https://www.nytimes.com/2020/03/23/us/chinese-coronavirus-racist-attacks.html |archive-date=March 23, 2020 |url-access=subscription |url-status=live|title=Spit On, Yelled At, Attacked: Chinese-Americans Fear for Their Safety|date=March 23, 2020|work=[[The New York Times]]|access-date=March 23, 2020|last2=Oppel |first2=Richard A. Jr.}}</ref> Clusters of infections and deaths occurred in many areas.{{Efn| Examples of areas in which clusters occurred include urban areas, [[nursing home]]s, [[long-term care]] facilities, group homes for the intellectually disabled,<ref>{{cite news|url=https://www.npr.org/2020/06/09/872401607/covid-19-infections-and-deaths-are-higher-among-those-with-intellectual-disabili|title=COVID-19 Infections And Deaths Are Higher Among Those With Intellectual Disabilities|work=NPR |date=June 9, 2020 |publisher=[[NPR]] | vauthors = Shapiro J }}</ref> [[COVID-19 pandemic in U.S. immigration detention|detention centers]] (including prisons), [[Impact of the COVID-19 pandemic on the meat industry in the United States|meatpacking plants]], churches, and navy ships.<ref>{{cite news|url=https://www.npr.org/2020/06/09/872710991/u-s-navy-policies-battling-covid-19-rely-heavily-on-isolation|title=U.S. Navy Policies Battling COVID-19 Rely Heavily On Isolation|work=NPR |date=June 9, 2020 |publisher=[[NPR]] | vauthors = Walsh S }}</ref>}} The COVID-19 pandemic also saw the emergence of [[COVID-19 misinformation|misinformation and conspiracy theories]],<ref>{{cite journal|last=Douglas|first=Karen M.|date=February 2021|title=COVID-19 conspiracy theories|journal=Group Processes & Intergroup Relations|volume=24|issue=2|pages=270–275|doi=10.1177/1368430220982068|s2cid=232132806|issn=1368-4302|doi-access=free}}</ref> and highlighted weaknesses in the U.S. [[public health]] system.<ref name="Banco"/><ref name="Butcher">{{cite journal |last1=Butcher |first1=Lola |title=Pandemic puts all eyes on public health |journal=Knowable Magazine |date=November 17, 2020 |doi=10.1146/knowable-111720-1|doi-access=free |url=https://knowablemagazine.org/article/health-disease/2020/pandemic-puts-all-eyes-public-health |access-date=March 2, 2022}}</ref><ref>{{cite news|last=Nuwer |first=Rachel |author-link=Rachel Nuwer |date=June 13, 2022 |title=Universal Health Care Could Have Saved More Than 330,000 U.S. Lives during COVID|url=https://www.scientificamerican.com/article/universal-health-care-could-have-saved-more-than-330-000-u-s-lives-during-covid/|work=[[Scientific American]]|location= |access-date=June 22, 2022}}</ref>

      In the United States, there have been {{COVID-19 data/Text|US|cases}} confirmed cases of COVID-19 with {{COVID-19 data/Text|US|deaths}} confirmed deaths, the most of any country, and [[COVID-19 pandemic death rates by country|the 17th highest]] per capita worldwide.<ref name="JH Mortality">{{cite web|url= https://coronavirus.jhu.edu/data/mortality|title=Mortality Analyses|publisher=[[Johns Hopkins University]]|access-date=December 17, 2020}}</ref> The COVID-19 pandemic ranks as the [[list of disasters in the United States by death toll|deadliest disaster in the country's history]].<ref>{{cite web|title=COVID-19 surpasses 1918 flu as deadliest pandemic in U.S. history |url=https://www.nationalgeographic.com/history/article/covid-19-is-now-the-deadliest-pandemic-in-us-history |website=[[National Geographic]] |date=September 21, 2021}}</ref> It was the third-leading cause of death in the U.S. in 2020, behind heart disease and cancer.<ref>{{cite news|url=https://apnews.com/article/us-coronavirus-deaths-top-3-million-e2bc856b6ec45563b84ee2e87ae8d5e7|title=US deaths in 2020 top 3 million, by far most ever counted |last=Stobbe |first=Mike |publisher=[[Associated Press]] |date=December 21, 2020 }}</ref> From 2019 to 2020, U.S. life expectancy dropped by three years for [[Hispanic and Latino Americans]], 2.9{{nbsp}}years for [[African Americans]], and 1.2{{nbsp}}years for [[White Americans]].<ref name="Bosman">{{cite news|url=https://www.nytimes.com/2021/07/21/us/american-life-expectancy-report.html |archive-url=https://ghostarchive.org/archive/20211228/https://www.nytimes.com/2021/07/21/us/american-life-expectancy-report.html |archive-date=December 28, 2021 |url-access=limited|title=U.S. Life Expectancy Plunged in 2020, Especially for Black and Hispanic Americans|first1=Julie|last1=Bosman|first2=Sophie|last2=Kasakove|first3=Daniel|last3=Victor|date=July 21, 2021|access-date=July 21, 2021|work=[[The New York Times]]| url-status=live }}</ref> In 2021, U.S. deaths due to COVID-19 rose,<ref>{{cite web|last1=Shapiro|first1=Emily|last2=Pereira|first2=Ivan|last3=Deliso|first3=Meredith|date=October 6, 2021|title=COVID-19 live updates: More Americans died of COVID this year than all of 2020|url=https://abcnews.go.com/Health/live-updates/covid-delta-surge/?id=80391228|access-date=October 6, 2021|website=[[ABC News (United States)|ABC News]]}}</ref> and life expectancy fell.<ref name="auto2">{{cite news|last=Bernstein |first=Lenny |date=22 December 2022 |title=U.S. life expectancy continued to fall in 2021 as covid, drug deaths surged |newspaper=[[The Washington Post]] |url=https://www.washingtonpost.com/health/2022/12/22/us-life-expectancy-decline-2021-covid-fentanyl/ |access-date=22 December 2022}}</ref>

      ==Timeline==
      {{Main|Timeline of the COVID-19 pandemic in the United States (2020)|Timeline of the COVID-19 pandemic in the United States (2021)}}
      {{See also|List of early cases of COVID-19 in the United States|Timeline of the COVID-19 pandemic in 2019}}
