      | The offender is tied to a wooden frame in a bent-over position with his feet together. He has protective padding secured around his lower back to protect the kidney and lower spine area from strokes that land off-target.
      | The offender stands upright at an A-shaped wooden frame with his feet apart and hands tied above his head. He has a special protective "shield" tied around his lower body to cover the lower back and upper thighs while leaving the buttocks exposed.
      | The offender is tied to the trestle in a bent-over position with his feet together. He has protective padding secured around his lower back to protect the kidney and lower spine area from strokes that land off-target.
      |}

      ==Prison caning==
      Male convicts who are not sentenced to caning by the courts may be caned if they commit aggravated or serious offences in prison while serving their sentences. This type of caning is carried out in the same way as judicial caning ordered by the courts.

      A prison superintendent may order an inmate to receive up to 12 strokes of the cane for aggravated offences that have serious implications for institutional order and discipline.<ref name="Prisons Act section 71"/> Such offences include engaging in gang activities, mutiny, attempting to escape, destruction of prison property, and assaulting prison staff or fellow inmates.<ref name="Commit a serious offence in prison? You risk a caning">
      {{cite news |last1=Yeo |first1=Andre |title=Commit a serious offence in prison? You risk a caning |url= https://corpun.com/sgp00708.htm |work=The New Paper |location=Singapore |access-date=22 November 2016 |date=20 August 2007 |archive-url= https://web.archive.org/web/20170719184706/http://corpun.com/sgp00708.htm |archive-date=19 July 2017 |url-status=live  }}
      </ref> Upon receiving a report of an offence, the prison provost officers will conduct an investigation to collect and review evidence. After that, the accused inmate is given an opportunity to hear the charge and evidence against him and present his defence before a superintendent. The case will also be reviewed by an independent committee appointed by the [[Ministry of Home Affairs (Singapore)|Ministry of Home Affairs (MHA)]], comprising reputable members of the public and including at least one legally-trained member.<ref>Prisons Act section 75.</ref><ref>
      {{cite news |author=Teh Joo Lin |title=New check on punishing prisoners |url= https://www.corpun.com/sgp00809.htm#20597 |access-date=25 January 2015 |newspaper=The Straits Times |location=Singapore |date=15 September 2008 |archive-url= https://web.archive.org/web/20150320085408/http://corpun.com/sgp00809.htm#20597 |archive-date=20 March 2015 |url-status=live  }}
      </ref> After that, the Commissioner of Prisons will review the case and confirm the punishment imposed or vary it accordingly. Depending on the circumstances, the case may be referred to a [[Justice of the peace#Singapore|visiting justice]], who has the authority to order an inmate to be caned.<ref name="Commit a serious offence in prison? You risk a caning" /><ref name="Written Reply to Parliamentary Question 2021">{{cite web |title=Written Reply to Parliamentary Question on Cases of Canings Administered by the Singapore Prison Service without Judicial Sentencing over the Past 10 Years, by Mr K Shanmugam, Minister for Home Affairs and Minister for Law |url=https://www.mha.gov.sg/mediaroom/parliamentary/written-reply-to-pq-on-cases-of-canings-administered-by-the-singapore-prison-service-without-judicial-sentencing-over-the-past-10-years |website=Ministry of Home Affairs (Singapore) |access-date=13 August 2021 |date=3 August 2021}}</ref>

      In 2021, the MHA revealed that from 2011 to 2020, the [[Singapore Prison Service]] administered 2,875 instances of prison caning to 2,149 inmates for committing aggravated or major offences in prison. The median number of strokes was three and the most common offences involved aggravated violence against other inmates and violence against prison staff. No cases were referred to visiting justices during that period.<ref name="Written Reply to Parliamentary Question 2021" />

      ==Military caning==
      In the [[Singapore Armed Forces]] (SAF), a subordinate military court, or the officer in charge of the SAF Detention Barracks, may sentence a serviceman to a maximum of 24 strokes of the cane<ref>Singapore Armed Forces Act section 125(2).</ref> for committing certain military offences or for committing aggravated offences while being detained in the Detention Barracks.<ref>Singapore Armed Forces Act section 119(1).</ref> In all cases, the caning sentence must be approved by the Armed Forces Council before it can be administered.<ref>Singapore Armed Forces Act section 119(2).</ref> The minimum age for a serviceman to be sentenced to caning is 16 (now {{frac|16|1|2}} ''de facto'', since entry into the SAF is restricted to those above that age).<ref name="counsga">
      {{cite web |title=Singapore: Caning in the military forces |url= https://www.corpun.com/counsga.htm |website=World Corporal Punishment Research |access-date=25 January 2015 |archive-url= https://web.archive.org/web/20150204060543/http://www.corpun.com/counsga.htm |archive-date=4 February 2015 |url-status=live}}</ref> This form of caning was originally intended primarily for use on recalcitrant teenage conscripts serving [[Conscription in Singapore|full-time National Service]] in the SAF.<ref>{{cite news |title= Murder charge soldiers can be court-martialled |url= https://www.corpun.com/sgar7507.htm |access-date= 25 January 2015 |newspaper= The Straits Times |location= Singapore |date= 30 July 1975 |archive-url= https://web.archive.org/web/20150309031948/http://www.corpun.com/sgar7507.htm |archive-date=9 March 2015 |url-status=live }}
      </ref>

      Military caning is less severe than its civilian counterpart, and is designed not to cause undue bleeding or to leave permanent scars. The offender must be certified by a medical officer to be in a fit condition of health to undergo the punishment<ref>Singapore Armed Forces Act section 125(5).</ref> and shall wear "protective clothing" as prescribed.<ref>Singapore Armed Forces Act section 125(6).</ref> The punishment is administered on the buttocks, which are covered by a "protective guard" to prevent cuts.<ref name="counsga" /> The cane used is no more than {{Convert|6.35|mm|in|2|abbr=in}} in diameter (about half the thickness of the prison/judicial cane).<ref>Singapore Armed Forces Act section 125(4).</ref> During the punishment, the offender is secured in a bent-over position to a trestle similar to the one used for judicial/prison canings.<ref>Singapore Armed Forces (2006). "Pride, Discipline, Honour" (book commemorating 40th anniversary of the SAF Military Police Command).</ref>

      ==Reformatory caning==
      Caning is used as a form of legal corporal punishment in government homes, remand homes and other homes for youths.

      Youths aged 16 and below who have allegedly committed crimes may be placed in remand homes during the period of investigation. If convicted, they may be sent to the state-run [[Reformatory|reformatories]], namely the Singapore Boys' Home and the Singapore Girls' Home, for up to three years. The Singapore Boys' Home has youths aged 11 through 18 who have been sent there by the courts for committing offences such as theft, robbery or rioting, or because they have been deemed to be Beyond Parental Control.<ref>{{cite book |last1=Lim |first1=Hui Min |title=Juvenile Justice: Where Rehabilitation Takes Centre Stage |date=2014 |publisher=Academy Publishing |location= Singapore |isbn=978-9810790950}}</ref>

      Youths whose parents have applied for Beyond Parental Control orders against them are placed in remand homes during the period of investigation. They may thereafter be placed in homes which also house juvenile offenders.<ref>{{cite web |title= Areas for Advocacy |date=February 2010 |access-date=8 May 2012 |publisher= Beyond Social Services |url= http://www.beyondresearch.sg/report/Doc_C_-_Sam_Tang.PDF |page=9 }}</ref>

      The superintendents of reformatories are allowed to impose corporal punishment, in the form of caning, on only male residents as a last resort for serious misconduct. They are required to maintain a record of the details and evidence of the offender's misconduct and their reasons for using corporal punishment as a last resort. Persons with mental or physical disability are exempted from such punishment. Solitary confinement is also permitted for children of and above 12 years of age, except in remand homes.<ref>Children and Young Persons (Government Homes) Regulations 2011 (Cap 38, Reg 22-24, 2001 Rev Ed Sing), reg 22-24; Children and Young Persons (Licensing of Homes) Regulations 2011 (Cap 38, Reg 25-27, 2001 Rev Ed Sing), reg 25-27; Children and Young Persons (Remand Homes) Regulations 2001 (Cap 38, Reg 20-21, 1993 Rev Ed Sing), reg 20-21.</ref>

      Caning is administered in private by the superintendent in the presence of a staff member, or by a staff member authorised by the superintendent in the presence of another staff member. A maximum of ten strokes may be inflicted on either the palm of the hand or the buttocks over clothing.<ref>Children and Young Persons (Government Homes) Regulations 2011 (Cap 38, Reg 22-24, 2001 Rev Ed Sing), reg 24.</ref>

      In the Singapore Boys' Home, boys are routinely caned on the buttocks for serious offences such as fighting, bullying and absconding. A 2006 article in ''[[The Straits Times]]'' reported that there were two cases of bullying per month on average; one youth also said that he had been caned over 60 times in three years at the Singapore Boys' Home.<ref>{{cite news |last1=Fong |first1=Tanya |last2=Yap |first2=Su-Yin |title=Boy's Home: When some don't make good |url=https://www.corpun.com/sgr00611.htm |access-date=7 June 2019 |newspaper=The Straits Times |date=20 November 2006}}</ref> A former Singapore Boys' Home resident who received 10 strokes for absconding when he was 18 said that his buttocks took two weeks to heal sufficiently before he could sit down properly.<ref name="ReformCP">{{cite web |title=Singapore: Reformatory CP |url=https://www.corpun.com/rules2.htm#singapore |website=World Corporal Punishment Research |date=April 2019 |access-date=7 June 2019}}</ref>

      In the Singapore Girls' Home, punishments for serious offences may include solitary confinement in a windowless room. Previously, caning on the palm of the hand was allowed for female residents and had been carried out before.<ref>{{Cite book |last=Goh |first=Jolene |url= https://books.google.com/books?id=ZQOJAAAAQBAJ&q=caned+100+strokes+stepfather&pg=PT136 |title=Jolene's Story |date=10 October 2012 |publisher=Marshall Cavendish International Asia |isbn=978-981-4408-99-8}}</ref> However, the Children and Young Persons (Government Homes) Regulations 2011 now clearly prohibits corporal punishment for female residents.<ref>Children and Young Persons (Government Homes) Regulations 2011 (Cap 38, Reg 22-24, 2001 Rev Ed Sing), reg 24(6).</ref>

      Apart from the Singapore Boys' Home and Singapore Girls' Home, there are other juvenile institutions managed by voluntary welfare organisations, such as the Boys Town operated by the [[Montfort Brothers of St. Gabriel]] for boys of ages 11 to 21.<ref name="ReformCP" /> Although these juvenile institutions are legally allowed to administer corporal punishment on male offenders in the same way as the state-run reformatories, they must obtain the management committee's authorisation before carrying it out.<ref name="Children and Young Persons (Licensing of Homes) Regulations 2011 section 27">Children and Young Persons (Licensing of Homes) Regulations 2011 section 27.</ref>

      ==School caning==
      Caning is a legal disciplinary measure in primary and secondary schools, [[Junior college (Singapore)|junior college]]s and [[Centralised institutes (Singapore)|centralised institute]]s.<ref>{{cite web |title=Education (Schools) Regulations |url= https://sso.agc.gov.sg/SL/EA1957-RG1?DocDate=20130731#pr88- |website=Singapore Statutes Online |publisher=Attorney-General Chambers, Singapore |access-date=6 June 2019}}</ref> Under Section 88 of the Education (Schools) Regulations,<ref>{{Cite web |date=14 January 2017 |title=In Singapore, the Gender Gap Begins in School |url= https://www.ricemedia.co/current-affairs-opinion-singapore-gender-gap-begins-in-school/ |access-date=13 October 2020 |website=RICE}}</ref> it is permitted for male students only.

      The [[Ministry of Education (Singapore)|Ministry of Education]] (MOE) states that corporal punishment is allowed for serious or repeated misconduct under the Education (Schools) Regulations, and adds that counselling and follow-up guidance should be carried out.<ref>{{cite web |title=MOE and Schools are Committed to Maintaining High Standards of Discipline in Schools |url= https://www.moe.gov.sg/news/forum-letter-replies/moe-and-schools-are-committed-to-maintaining-high-standards-of-discipline-in-schools |website=Forum Reply |publisher=Ministry Of Education |date=19 May 2014}}</ref> At most schools, caning comes after detention but before suspension in the hierarchy of penalties. Some schools implement a demerit points system, in which students receive mandatory caning after accumulating a certain number of demerit points for a wide range of misconduct. The possibility of caning as a corrective action is often explicitly stated in schools' student handbooks or on their websites. As of 2018, 13% of primary schools and 53% of secondary schools (excluding all-girls schools) communicated on their websites that caning may be administered to male students for serious misconduct.<ref name="Corpun schools">{{cite web |date=January 2019 |title=Singapore: Corporal punishment in schools |url= https://www.corpun.com/counsgs.htm |url-status=live |archive-url= https://web.archive.org/web/20150126052823/http://www.corpun.com/counsgs.htm |archive-date=26 January 2015 |access-date=6 June 2019 |website= World Corporal Punishment Research}}
      </ref>

      Canings in school may be sorted into these categories:<ref name="Corpun schools" />
      * Private caning: The most common form of school caning. The offending student is caned in the school's General Office in the presence of the Principal and/or Vice-Principal, together with another witness (usually the student's Form Teacher or Co-Form Teacher). His parents or guardians may be invited to the school to witness the punishment being meted out.{{citation needed|date=December 2021}}
      * Class caning: The offending student is caned in front of his class to serve as a warning for his classmates.
      * Public caning: The offending student is caned in front of an assembly of the entire school population to serve as a warning for potential offenders. This form of punishment is normally reserved for very serious offences and repeated offences. Common offences that warrant a public caning include smoking, alcohol consumption, drug- or gang-related activities, fighting, causing hurt to others, vandalism, arson, extortion, theft and any case involving the Police.<ref>{{Cite web |last=Husna |first=Nabilah |date=20 June 2019 |title=Do Singaporeans think of children as people? |url= https://medium.com/@nabilah.husna/do-singaporeans-think-of-children-as-people-e14c6b36e2b7 |access-date=13 September 2019 |website=Medium}}</ref><ref name="auto">{{Cite web |title=CANING, PADDLING AND SPANKING: OFFICIAL RULES FROM CURRENT SCHOOL HANDBOOKS |url= https://www.corpun.com/usscr2c.htm#singapore |access-date=18 November 2019 |publisher=World Corporal Punishment Research}}</ref>
      * Others: There may be intermediate levels between a "class caning" and a "public caning", such as in front of all classes in the same year as the student.

      Under MOE regulations, the punishment may be administered only by the Principal or any staff member under the Principal's express authority, usually the Vice Principal, Discipline Master, Operations Manager, or any other specially delegated member of the school's Disciplinary Committee. The offending student's parents or guardians must then be informed of the details at the earliest possible time once the punishment has been imposed. Some schools may seek parental or guardian consent before administering the punishment.<ref name="Education (Schools) Regulations section 88">Education (Schools) Regulations section 88.</ref><ref name="School Principals' Handbook, Section 19">
      {{cite web |title=School Principals' Handbook, Section 19 |url= http://www.corpun.com/sgscr1.htm |url-status=live |archive-url= https://web.archive.org/web/20150308110142/http://www.corpun.com/sgscr1.htm |archive-date=8 March 2015 |access-date=25 January 2015 |website=World Corporal Punishment Research}}</ref><ref name="Corpun schools" /> A maximum of three strokes<ref name="Corpun schools" /> may be inflicted at a time, using a light [[rattan]] cane. The limit was previously six strokes before MOE reduced it to three strokes in 2017.<ref>{{Cite news |url= https://www.straitstimes.com/forum/letters-on-the-web/more-sporeans-turning-away-from-corporal-punishment |title=More S'poreans turning away from corporal punishment |date=24 August 2019 |website=The Straits Times |location= Singapore}}</ref> The student may be caned only on either the palm of the hand or the buttocks over clothing.<ref name="Education (Schools) Regulations section 88" /><ref name="School Principals' Handbook, Section 19" /> Although boys of any age from six to 19 may be caned, most recipients of such punishments are secondary school students aged 14 to 16 inclusive.<ref name="Corpun schools" />
      A solemn and formal ceremony, school caning is typically carried out in a manner similar to the caning punishments administered in England before school corporal punishment was banned there in 1998. Some schools tuck a protective item (e.g. book, file, rolled-up newspaper, piece of cardboard) into the student's waistband to protect his lower back in case a stroke lands off-target. The student then places his hands on a desk or chair, bends over or leans forward, and receives strokes from the rattan cane on the seat of his trousers or shorts.<ref name="Corpun schools" />

      Certain schools adopt special practices. For example, following English traditions, some schools (mainly all-boys schools) require the student to change into physical education (PE) attire for the punishment because PE shorts are apparently thinner than normal uniform trousers/shorts, even though the main purpose is probably to enhance the formality of the occasion. In some schools, if the caning is conducted in public, the student is required to make a public apology before or after receiving his punishment.<ref name="Corpun schools" /> Although caning on the palm of the hand is rarely implemented, one notable exception is [[Saint Andrew's Secondary School]], where students may be caned on the hand for committing less serious offences while a caning on the buttocks is reserved for more serious offences.<ref>{{cite web |title=Structure of Discipline Committee (2005) - 2013_Discipline_Rule_Book.pdf |url= http://swt3.vatitude.com/qql/slot/u181/For%20Saints/2013_Discipline_Rule_Book.pdf |publisher=Saint Andrew's Secondary School |access-date=25 January 2015 |archive-url= https://web.archive.org/web/20150128132010/http://swt3.vatitude.com/qql/slot/u181/For%20Saints/2013_Discipline_Rule_Book.pdf |archive-date=28 January 2015 |url-status=live}}</ref>

      Based on first-hand accounts, the student typically feels moderate to acute pain for the first few minutes, depending on the number of strokes. This soon leads to a stinging sensation and general soreness around the points of impact, usually lasting for some hours; sitting down is likely to be uncomfortable. Superficial bruises and weals may appear on the buttocks and last for a few days after the punishment.<ref name="Corpun schools" />

      === Female students ===
      As the Ministry of Education does not allow any form of corporal punishment to be administered to female students, they receive alternative forms of punishment such as [[School discipline#Detention|detention]], Corrective Work Orders, in-house suspension, counselling or [[School discipline#Suspension|suspension]].<ref>{{Cite web |date=7 February 2002 |title=Singapore: Muslim Schoolgirls Suspended For Wearing Headscarves |url= https://muslimvillage.com/2002/02/07/3024/300-singapore-muslim-schoolgirls-suspended-for-wearing-headscarves/ |access-date=8 September 2019 |website=MuslimVillage.com}}</ref><ref>{{Cite web |last=Unantenne |first=Nalika |date=22 October 2013 |title=Is punishment in schools in Singapore too extreme? |url= https://sg.theasianparent.com/punishment-in-schools|access-date=8 September 2019 |website=sg.theasianparent.com}}</ref><ref name="auto"/><ref>{{Cite news |date=3 December 2007 |title= Should schools spare the rod when it comes to caning girls? |work=The New Paper |location=Singapore |url= https://eresources.nlb.gov.sg/newspapers/digitised/issue/newpaper20071203-1 |access-date=27 May 2020}}</ref><ref>{{Cite news |date=28 September 2001 |title=Singaporeans support caning for students skipped tests |url= https://chinapost.nownews.com/20010928-151738 |archive-url= https://web.archive.org/web/20230405200045/https://chinapost.nownews.com/20010928-151738 |url-status= dead |archive-date= 5 April 2023 |access-date=20 March 2021 |work=The China Post |location= Taipei |agency= Agence France-Presse}}</ref>

      In 2004, Ng Lee Huat, the principal of [[Nan Chiau High School]], controversially stepped down after admitting to hitting a 14-year-old female student with a soft-cover book.<ref>{{Cite news |title=More students, parents want the principal back |url= https://www.corpun.com/sgs00404.htm#13231 |newspaper=The Straits Times |location= Singapore |date=29 April 2004 |first=Sandra |last=Davie}}</ref>

      ==Domestic caning==
      [[File:rattancane.jpg|thumb|right|150px|Canes sold in grocery stores, used by parents to discipline children at home]] Caning is also imposed on children by their parents as punishment for offences like poor/imperfect results,<ref name=":0">{{Cite web |url= https://goodyfeed.com/9-things-non-strawberries-remember-about-the-cane-that-strawberries-wont-understand/ |title=9 Things Non-Strawberries Remember About the Cane That Strawberries Won't Understand |last=Team |first=Goody Feed |date=3 July 2018 |website=Goody Feed |access-date=18 March 2020}}</ref><ref name=":1">{{Cite web |url= http://redwiretimes.com/cow-beh-cow-bu/study-hard-graudate-otherwise-kena-rotan/|archive-url= https://web.archive.org/web/20170502131316/http://redwiretimes.com/cow-beh-cow-bu/study-hard-graudate-otherwise-kena-rotan/|url-status= dead|archive-date= 2 May 2017|title=Study Hard and Graudate<!--sic-->, Otherwise Kena Rotan! But After That... How? |date=23 October 2014 |website=RedWire Times Singapore |access-date=19 March 2020}}</ref> disrespect,<ref>{{Cite web |url= https://pride.kindness.sg/whats-wrong-caning-kids/ |title=What's wrong with caning our kids? |date=31 May 2017 |website=The Pride |access-date=13 September 2019}}</ref> disobedience, incomplete work,<ref>{{Cite news |date=21 February 2011 |title=How can they take away my girl? |url= https://www.asiaone.com/print/News/The+New+Paper/Story/A1Story20110219-264398.html |location= Singapore |access-date= 31 July 2020 |website=www.asiaone.com}}</ref> lying,<ref>{{cite news |author1=Mathi, Braema |author2=Andrianie, Siti |title=Spare your child the rod? No |url= https://www.corpun.com/sgdm9904.htm |access-date=25 January 2015 |newspaper=The Sunday Times |location=Singapore |date=11 April 1999 |archive-url= https://web.archive.org/web/20150128114644/http://www.corpun.com/sgdm9904.htm |archive-date=28 January 2015 |url-status=live  }}</ref> and trying to escape caning.<ref name=":0" /> The misbehaving child is usually caned on the buttocks or palm of the hand.<ref>{{Cite web|title=To cane or not to cane...|url=https://www.asiaone.com/News/Education/Story/A1Story20090113-114279.html|access-date=3 November 2020|website=www.asiaone.com}}</ref> Sometimes, the cane will miss and hit the bare thighs/calves, causing more pain.<ref>{{Cite web |url= https://goodyfeed.com/9-things-non-strawberries-remember-about-the-cane-that-strawberries-wont-understand/ |title=9 Things Non-Strawberries Remember About the Cane That Strawberries Won't Understand |last=Team|first=Goody Feed|date=3 July 2018|website=Goody Feed| access-date=18 March 2020}}</ref> The caning usually leaves the child with painful red welts<ref name=":1" /> that will fade within days.

      The most commonly used implement is a thin and light rattan cane, commonly and cheaply found (for around 50 Singapore cents) in neighbourhood provision shops.<ref>{{Cite web|title=S'porean mum discovers canes sold out at 2 stores as side effect of work-from-home|url=https://mothership.sg/2020/04/canes-sold-out-work-from-home/|access-date=15 May 2021|website=mothership.sg|language=en}}</ref> There is usually higher demand when students prepare for examinations, as the cane is used more often during this time, resulting in breakages.<ref>{{cite news |title=Kids say: What works for them |url= https://www.corpun.com/sgdm9904.htm |access-date=25 January 2015 |newspaper=The Sunday Times |location=Singapore |date=11 April 1999 |archive-url= https://web.archive.org/web/20150128114644/http://www.corpun.com/sgdm9904.htm |archive-date=28 January 2015 |url-status=live  }}</ref> Sometimes, parents will use other implements such as the rattan handle of a feather-duster, bamboo poles, rulers, clothes hangers,<ref>{{Cite news |url= https://goodyfeed.com/spore-mother-filmed-caning-daughter-public-apologises-says-shell-go-counselling/ |title=S'pore Mother Filmed Caning Daughter in Public Apologises, Says She'll Go Counselling |last=Hun |first=Boon |date=26 May 2017 |website=Goody Feed |access-date=13 September 2019}}</ref> or even their bare hands.<ref>{{Cite news |url= https://www.nst.com.my/world/2018/11/430087/punishment-or-abuse-video-singaporean-man-slapping-kneeling-girl-public-goes |title= Punishment or abuse? Video of Singaporean man slapping kneeling girl in public goes viral |work=New Straits Times |location=Kuala Lumpur |date=11 November 2018 |access-date=13 September 2019}}</ref>

      In Singapore, not caning children is seen as being soft on them, and not instilling proper discipline. According to a survey conducted by ''[[The Straits Times|The Sunday Times]]'' in January 2009, 57 percent of surveyed parents expressed the view that caning was an acceptable form of punishment, and that they had used it on their children for reasons such as stubbornness, refusal to listen and dangerous/harmful acts.<ref>{{cite news|last=Sudderuddin|first=Shuli|date=13 January 2009|title=To cane or not to cane...|newspaper=The Straits Times|location=Singapore|url=http://news.asiaone.com/News/Education/Story/A1Story20090113-114279.html|url-status=live|access-date=25 January 2015|archive-url=https://web.archive.org/web/20150128113254/http://news.asiaone.com/News/Education/Story/A1Story20090113-114279.html|archive-date=28 January 2015}}</ref> A newer study conducted by [[YouGov]] in 2019 found that nearly 80 percent of parents in Singapore had carried/carries out corporal punishment at home.<ref>{{Cite news|last=Teng|first=Amelia|date=30 July 2019|title=Most parents here don't spare rod on kids at home: Study|work=The Straits Times|location=Singapore|url=https://www.straitstimes.com/singapore/education/most-parents-here-dont-spare-rod-on-kids-at-home-study|access-date=13 September 2019}}</ref>

      Parental caning is legal in Singapore, but not particularly encouraged by the authorities. Under the Children and Young Persons Act, ill-treatment of a child or young person is defined as inflicting any unnecessary physical pain, suffering or injury, any emotional harm, or any injury to a child's health or development. The person who has the custody, charge or care of the child or young person subjected to ill-treatment may be punished by a fine of up to S$8,000 or imprisonment of up to eight years, or both.<ref>Children and Young Persons Act section 5.</ref><ref>{{Cite news|last=Lam|first=Lydia|url=https://www.channelnewsasia.com/news/singapore/jail-father-who-beat-9-year-old-son-hanger-over-homework-11003830|title=Jail for father who beat 9-year-old son with hanger over homework|date=6 December 2018|access-date=13 September 2019|location=Singapore|website=Channel News Asia}}</ref> Several factors are usually considered when determining if parental corporal punishment becomes a criminal offence: the proportionality of the punishment to the offence, the child's age, as well as the frequency of the punishment. The [[Ministry of Social and Family Development]]'s Child Protective Service will also investigate and intervene where there are serious child protection concerns, such as when parental discipline results in serious physical injury or emotional trauma to a child.<ref>{{cite news |last1=Goh |first1=Chiew Tong |title=When caning of children becomes abuse: Lawyers explain the legal parameters |url=https://www.channelnewsasia.com/news/singapore/caning-children-abuse-parents-court-lawyers-legal-parameters-13023810 |access-date=15 February 2021 |agency=CNA |date=22 December 2020}}</ref>

      ==Politicians' opinions on caning in Singapore==

      === Judicial caning ===
      {{see also|Lee Kuan Yew#Corporal punishment}}

      Judicial caning is purportedly meant to serve as a humiliating experience for offenders and as a strong deterrent to crime. In 1966, when Singapore's first [[Prime Minister of Singapore|Prime Minister]], [[Lee Kuan Yew]], introduced caning as a mandatory punishment for vandalism, he said in [[Parliament of Singapore|Parliament]], "[...] if (the offender) knows he is going to get three of the best, I think he will lose a great deal of enthusiasm, because there is little glory attached to the rather humiliating experience of having to be caned."<ref>''Singapore Parliamentary Debates, Official Report'' (26 August 1966) vol 20 at cols 291–305.</ref>

      In a 2004 interview with [[China Central Television]], Lee explained why caning should continue in Singapore with reference to the [[Michael P. Fay|1994 Michael Fay incident]]: "Every country has its own problems to face, we know, certain things. You put a person in a prison, it makes no difference. He will not change. Because you observe certain rules, there's enough food, enough exercise, fresh air, sunshine ... But if you cane him, and he knows he will be given six of the best on his buttocks, and it will hurt for one week that he can't sit down comfortably, he will think again."<ref>"Conversation with LKY (CCTV) Part 1/2 (June 2004)". Youtube. 7 October 2011. Retrieved 7 February 2018.</ref>

      Although the extensive use of judicial caning is a policy commonly associated with the ruling [[People's Action Party]] (PAP), the opposition parties do not oppose it because they agree on its effectiveness as a deterrent to crime.<ref name="Humiliation and deterrence" /> Politicians from the opposition parties have voiced support for corporal punishment. [[Edmund Ng Say Eng|Edmund Ng]], a candidate for the [[Singapore Democratic Alliance]] in the [[Singaporean general election, 2006|2006 general election]], said, "For criminals, caning serves as a deterrent [...] I would not change a winning formula."<ref>{{cite news|title=We posed the same questions to two Singapore Democratic Alliance candidates|newspaper=The New Paper|location=Singapore|date=12 April 2006}}</ref> [[Sylvia Lim]], a Member of Parliament from the [[Workers' Party (Singapore)|Workers' Party]], also said in 2007, "What are the purposes of jail, fine and caning? Caning is controversial internationally, but if one must justify why we cane offenders, it is just deserts for pain which the offender has caused to the victim, for example, hurt, injury or the threat of violence. Caning is a severe punishment, and it is always combined with jail as the offences tend to be serious and to make it easier, administratively, to arrange for the caning to take place."<ref>''Singapore Parliamentary Debates, Official Report'' (22 October 2007) vol 83 at cols 2175–2242.</ref>

      The severity and humiliation of the punishment are widely publicised in various ways, mainly through the press but also through other means such as the education system. For example, juvenile delinquents get to watch a real-life demonstration of caning on a dummy during compulsory prison visits.<ref name="Humiliation and deterrence">
      {{cite web |title=Judicial Caning in Singapore, Malaysia and Brunei #Humiliation and deterrence |url= https://corpun.com/singfeat.htm#humiliation |website=World Corporal Punishment Research |access-date=28 August 2016 |date=September 2012 |archive-url= https://web.archive.org/web/20160716095447/http://www.corpun.com/singfeat.htm#humiliation |archive-date=16 July 2016 |url-status=live}}
      </ref>

      Singapore has come under strong international criticism for its practice of judicial caning, especially after the 1994 Michael Fay incident. [[Amnesty International]] condemned the practice of judicial caning in Singapore as a "cruel, inhuman or degrading punishment".<ref>
      {{cite web|title=Singapore – Amnesty International Report 2008|url=https://www.amnesty.org/en/region/singapore/report-2008|website=Amnesty International|access-date=25 January 2015|archive-url=https://web.archive.org/web/20150217184324/http://www.amnesty.org/en/region/singapore/report-2008|archive-date=17 February 2015|url-status=live}}
      </ref> It is also regarded by some international observers as a violation of Article 1 in the [[United Nations Convention against Torture]]. However, Singapore is not signatory to the Convention.<ref>
      {{cite web|title=Republic of Singapore Submission to the UN Universal Periodic Review|url=http://www.ihra.net/files/2010/11/25/IHRA_Singapore_UPR_submission_2010.pdf|website=International Harm Reduction Association|access-date=25 January 2015|date=2010|archive-url=https://web.archive.org/web/20150924033330/http://www.ihra.net/files/2010/11/25/IHRA_Singapore_UPR_submission_2010.pdf|archive-date=24 September 2015|url-status=live}}
      </ref> [[Human Rights Watch]] similarly referred to the practice of caning as "an inherently cruel punishment".<ref>
      {{cite web|title=World Report 2014: Singapore #Criminal Justice System|url=https://www.hrw.org/world-report/2014/country-chapters/singapore?page=2|website=Human Rights Watch|date = 21 January 2014|access-date=25 January 2015|archive-url=https://web.archive.org/web/20150128114427/http://www.hrw.org/world-report/2014/country-chapters/singapore?page=2|archive-date=28 January 2015|url-status=live}}
      </ref>

      The Singaporean government has defended its stance on judicial caning and said that the punishment does not amount to torture and is conducted under strict standards and medical supervision.<ref>
      {{cite web|last1=Parameswaran|first1=Prashanth|title=Singapore Defends Caning|url=https://thediplomat.com/2015/03/singapore-defends-caning/|website=The Diplomat|access-date=28 August 2016|date=10 March 2015|archive-url=https://web.archive.org/web/20160305022742/https://thediplomat.com/2015/03/singapore-defends-caning/|archive-date=5 March 2016|url-status=live}}
      </ref> While most Singaporeans either support or are indifferent towards the practice of judicial caning, there is a minority – including dissident [[Gopalan Nair]],<ref>
      {{cite web |last1=Nair |first1=Gopalan |title= Singapore orders brutal beating (caning) of anti-government graffiti artist |url= http://singaporedissident.blogspot.sg/2014/08/singapore-orders-brutal-beating-caning.html |website= Singapore Dissident |access-date=28 August 2016 |date=12 August 2014 |archive-url= https://web.archive.org/web/20160916083957/http://singaporedissident.blogspot.sg/2014/08/singapore-orders-brutal-beating-caning.html |archive-date=16 September 2016 |url-status=live}}
      </ref> lawyer [[M Ravi]]<ref name="Drug courier's lawyer challenges caning sentence">{{cite news |last1=Lum |first1=Selina |title=Drug courier's lawyer challenges caning sentence |url= https://corpun.com/14archive/sgj01408.htm#25561 |access-date=11 July 2015 |newspaper=The Straits Times |location=Singapore |date=23 August 2014 |archive-url= https://web.archive.org/web/20150711134241/http://corpun.com/14archive/sgj01408.htm |archive-date=11 July 2015 |url-status=live  }}</ref> and businessman [[Ho Kwon Ping]] – who are completely or partially opposed to it.<ref>
      {{cite news |last1=Ho |first1=Kwon Ping |author-link1=Ho Kwon Ping |title=The next 50 years of Singapore's security and how NS, ISA and caning need to change |url=http://www.straitstimes.com/opinion/the-next-50-years-of-singapores-security-and-how-ns-isa-and-caning-need-to-change |work=The Straits Times |location= Singapore |access-date=28 August 2016 |date=6 February 2015 |archive-url= https://web.archive.org/web/20160923095520/http://www.straitstimes.com/opinion/the-next-50-years-of-singapores-security-and-how-ns-isa-and-caning-need-to-change |archive-date=23 September 2016 |url-status=live}}
      </ref>

      A recipient of nine strokes thinks that even though it may be a nightmare the first time, an offender who has been caned before will have experienced the extent of fear of criminal punishment and so may not find it as much of a disincentive to commit repeat offences. He said, "After he knows what it's like, he will have nothing left to fear. He will know what to expect no matter how many strokes he gets – it's more of the same. No alcohol and women – apart from those two things, prison is really not that bad."<ref name="potter interview" />

      In 2022, President [[Halimah Yacob]] expressed the need to review the age limit for caning in the case of sex offenders, in light of several high-profile rape cases (especially those involving fathers raping their daughters), where most of the offenders aged 50 and above who escaped caning despite being harshly sentenced to lengthy periods of incarceration by the courts, including a 55-year-old cleaner who was jailed for 33 years after getting convicted of raping his three daughters over a 14-year period, a 54-year-old tutor and paedophile who was sentenced to 45 years' jail for the rape of eight children (including those with learning difficulties) and a fifty-year old man who got 23 years' jail for raping his eleven-year-old daughter over three months due to a Fengshui master's advice.<ref>{{cite news |url= https://www.straitstimes.com/singapore/president-halimah-calls-for-review-of-law-excluding-rapists-over-50-from-caning-5-worst-cases |first=Jean|last=Iau|title= President Halimah calls for review of law excluding rapists over 50 from caning: 5 worst cases |newspaper=The Straits Times |date=19 December 2022 |access-date=27 December 2022}}</ref><ref>{{cite news |url= https://www.channelnewsasia.com/singapore/caning-above-50-rapists-change-cna-explains-lawyers-3159491 |title=CNA Explains: Why are criminals above 50 spared caning and how could that change?|newspaper=Channel NewsAsia |location= Singapore |date=22 December 2022 |access-date=3 January 2023}}</ref> While some expressed concerns over the deterrence effect of caning towards rapists aged more than fifty, most lawyers also supported the need for a review of the age limit for caning in relation to serious crimes like rape, as they felt that the suitability to cane should be decided based on health rather than age, and it may pave way to greater consistency behind sentencing. Among them, Criminal lawyer Johannes Hadi called the age limit of 50 "an arbitrary line in the sand", and questioned the exemption of females from caning based on sexist ideas about the physical difference between men and women. Another lawyer, Law Society of Singapore president Adrian Tan, commented about the need to cane rapists regardless of their age, "If you're fit enough to rape, you should be fit enough to be caned."<ref>{{cite news |url= https://www.straitstimes.com/singapore/timely-to-review-age-limit-for-caning-rapists-say-some-lawyers |title=Timely to review age limit for caning of rapists, say some lawyers |newspaper=The Straits Times |location= Singapore |date=25 December 2022 |access-date=27 December 2022}}</ref> Criminal lawyer Sunil Sudheesan also stated that there should also be measures to ensure a 50-year-old prisoner's suitability to cane based on his health to avoid any sudden health issues from arising during the caning process.<ref>{{cite news |url= https://www.straitstimes.com/singapore/time-to-review-law-allowing-rapists-over-50-to-avoid-the-cane-president-halimah-yacob |first=Jean|last=Iau|title=Rapists above 50 should not be spared caning, timely to review law: President Halimah |newspaper=The Straits Times |location= Singapore |date=19 December 2022 |access-date=27 December 2022}}</ref>

      === School caning ===
      Critics <ref>{{cite web |title=Committee on the Rights of the Child reviews the report of Singapore |url=https://www.ohchr.org/en/press-releases/2019/05/committee-rights-child-reviews-report-singapore |website=OHCHR |access-date=1 February 2026}}</ref>, such as the [[United Nations]], argue that since Singapore is signatory to the [[Convention on the Rights of the Child]], it is obliged to "take all appropriate legislative, administrative, social and educational measures to protect the child from all forms of physical or mental violence, injury or abuse". However, the Singaporean government stated that it considers "the judicious application of corporal punishment in the best interest of the child."<ref>
      [https://treaties.un.org/Pages/ViewDetails.aspx?src=TREATY&mtdsg_no=IV-11&chapter=4&lang=en#EndDec Ratification status] {{Webarchive|url=https://web.archive.org/web/20140211151110/https://treaties.un.org/pages/viewdetails.aspx?src=treaty&mtdsg_no=iv-11&chapter=4&lang=en#EndDec |date=11 February 2014 }}  on the website of the United Nations.
      </ref>

      As Singapore evolves, some citizens may perceive that schools are refraining from using corporal punishment due to their fears of a strong backlash from parents.<ref>{{cite web|title=Time for corporal punishment in schools?|url=https://www.allsingaporestuff.com/article/time-corporal-punishment-schools|website=All Singapore Stuff}}</ref> Educators, when interviewed, say that they are cognisant of Singapore's changing landscape, both in terms of the family structure as well as the influence of social media, in the reduction of corporal punishment in schools. They note that understanding and accepting such punishment is essential to the effectiveness of caning as a deterrent to misconduct.<ref>{{cite web |date=14 January 2019 |title=Six Discipline Questions Answered |url= https://www.schoolbag.sg/story/six-discipline-questions-answered |access-date=6 June 2019 |website=School Bag: the Education News Site |publisher=Ministry of Education}}</ref> According to a Singaporean legal advice website, as long as schools administer corporal punishment according to MOE guidelines, parents may not take legal action against the school as they are not direct employers of the school.<ref>{{cite web |date=22 April 2019 |title= Caning in Singapore: Judicial, School & Parental Corporal Punishment |url= https://singaporelegaladvice.com/law-articles/caning-singapore-judicial-school-parental-corporal-punishment/ |website=Singapore Legal Advice}}</ref>

      ==In arts and media==

      ===Media===
      * ''Prison Me? No Way!'', a 15-minute video commissioned by Singapore's National Crime Prevention Council to deter teenagers from crime. The video, released in 1998 and filmed in [[Changi Prison]] and Changi Reformative Training Centre, shows life in prison from the perspectives of two young offenders and includes a reenactment of a judicial caning.<ref>{{cite news |last1=Chong |first1=Chee Kin |title=Watch this and stay off crime |newspaper=The Straits Times |location= Singapore |url= https://corpun.com/sgju9810.htm |access-date=19 December 2016 |date=7 October 1998 |archive-url= https://web.archive.org/web/20170506071439/http://www.corpun.com/sgju9810.htm |archive-date=6 May 2017 |url-status=live}}</ref>
      * ''[[The Homecoming (TV series)|The Homecoming]]'',<ref>
      {{cite news |last1=Teo |first1=Wendy |title=Rayson Tan bares his bum for the first time in new Channel 8 drama, only to become... The butt of jokes |url= https://www.corpun.com/sgj00704.htm#19067 |access-date=25 January 2015 |newspaper=The New Paper |location=Singapore |date=3 April 2007 |archive-url= https://web.archive.org/web/20150302111722/http://www.corpun.com/sgj00704.htm#19067 |archive-date=2 March 2015 |url-status=live  }}
      </ref> a 2007 Singaporean television series produced by [[MediaCorp]]. In the drama, four men were convicted of arson in their youth and sentenced to imprisonment and three strokes of caning each. One of them received one more stroke, supposedly for being the mastermind. The caning scene is featured briefly in flashbacks.
      * ''[[Ilo Ilo]]'', a 2013 Singaporean family film directed by [[Anthony Chen]]. In one scene, the main character Jiale (Koh Jia Ler) receives a public caning in school for fighting with his classmate in the washroom.<ref>{{Cite web |last= |date=2013-06-04 |title=Anthony Chen's Ilo Ilo is as real as it gets |url=https://www.herworld.com/life/entertainment/anthony-chens-ilo-ilo-real-it-gets/ |access-date=2023-11-30 |website=Her World Singapore |language=en}}</ref>
      * ''Rotan'', a 2017 Singaporean short film shown at the Singapore International Film Festival 2017 and directed by Hamzah Fansuri. The film is about a father, who is also the discipline master at his son's school, having to uphold his own principles and punish his rebellious son for breaking the school rules.<ref>{{cite web |title=Singapore Panorama: Short Film Programme 1 |url= http://sgiff.com/browse-all-films/singapore-panorama-short-film-programme-1/ |website=2017 Singapore International Film Festival |access-date=16 November 2017 |archive-url= https://web.archive.org/web/20171116190236/http://sgiff.com/browse-all-films/singapore-panorama-short-film-programme-1/ |archive-date=16 November 2017 |url-status=dead}}</ref>

      ===Literature===
      * ''The Caning of Michael Fay: The Inside Story by a Singaporean'' (1994),<ref>{{cite book |last1=Baratham |first1=Gopal |title=The Caning of Michael Fay |year=1994 |publisher=KRP Publications |location=Singapore |isbn=981-00-5747-4}}</ref> a documentary book by [[Gopal Baratham]] published in the wake of the controversial caning of [[Michael P. Fay]]. It concentrates on the personal aspects, the punishment and the sociology of caning in Singapore. The book includes some descriptions of caning and photographs of its results, as well as two personal interviews with men who had been caned before.
      * ''The Flogging of Singapore: The Michael Fay Affair'' (1994) by Asad Latif.<ref>{{cite book |last1=Latif |first1=Asad |title=The Flogging of Singapore: The Michael Fay Affair |year=1994 |publisher=Times Books International |location=Singapore|isbn=981-204-530-9}}</ref>

