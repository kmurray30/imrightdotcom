      '''COVID-19 rapid antigen tests''' or '''RAT'''s, also frequently called '''COVID-19 [[lateral flow test]]s''' or '''LFT'''s, are [[rapid antigen test]]s used to detect [[Severe acute respiratory syndrome coronavirus 2|SARS-CoV-2]] infection ([[COVID-19]]). They are quick to implement with minimal training, cost a fraction of other forms of [[COVID-19 testing]], and give users a result within 5–30 minutes. RATs have been used in several countries as part of mass testing or population-wide screening approaches.<ref name="Kahanec2021">{{cite journal| vauthors=Kahanec M, Lafférs L, Schmidpeter B| title=The impact of repeated mass antigen testing for COVID-19 on the prevalence of the disease | journal=J Popul Econ | year= 2021 | volume= 34 | issue= 4 | pages= 1105–1140 | pmid=34219976 | doi=10.1007/s00148-021-00856-z | pmc=8241209 |doi-access=free | title-link=doi }}</ref> Many RATs can be used for self-testing, in which an individual "collects their own specimen… and interpret[s] their test result themselves".<ref name="WHO2022">{{cite report|title=Use of SARS-CoV-2 antigen-detection rapid diagnostic tests for COVID-19 self-testing. Interim guidance|date=9 March 2022|publisher=[[World Health Organization]] (WHO)|hdl=10665/352350|hdl-access=free | id=WHO/2019-nCoV/Ag-RDTs/Self_testing/2022.1}}</ref>

      [[False positive]]s are very rare; the tests' [[sensitivity and specificity|specificity]] is 98%-99%.<ref name="Khalid2022">{{cite journal| vauthors=Khalid MF, Selvam K, Jeffry AJ, Salmi MF, Najib MA, Norhayati MN, et al| title=Performance of Rapid Antigen Tests for COVID-19 Diagnosis: A Systematic Review and Meta-Analysis | journal=Diagnostics | date=4 January 2022 | volume= 12 | issue= 1 | page=110 | pmid=35054277 | doi=10.3390/diagnostics12010110 | pmc=8774565 |doi-access=free | title-link=doi }}</ref><ref name="Brümmer2022">{{cite journal| vauthors=Brümmer LE, Katzenschlager S, McGrath S, Schmitz S, Gaeddert M, Erdmann C, et al| title=Accuracy of rapid point-of-care antigen-based diagnostics for SARS-CoV-2: An updated systematic review and meta-analysis with meta-regression analyzing influencing factors | journal=PLOS Med | date=26 May 2022 | volume= 19 | issue= 5 | article-number= e1004011 | pmid=35617375 | doi=10.1371/journal.pmed.1004011 | pmc=9187092 |doi-access=free | title-link=doi }}</ref><ref name="Tapari2022">{{cite journal| vauthors=Tapari A, Braliou GG, Papaefthimiou M, Mavriki H, Kontou PI, Nikolopoulos GK, Bagos PG| title=Performance of Antigen Detection Tests for SARS-CoV-2: A Systematic Review and Meta-Analysis | journal=Diagnostics | date=4 June 2022 | volume= 12 | issue= 6 | page= 1388 | pmid=35741198 | doi=10.3390/diagnostics12061388 | pmc=9221910 |doi-access=free | title-link=doi }}</ref> However, the tests have a [[sensitivity and specificity|sensitivity]] of 70%-72%,<ref name="Khalid2022"/><ref name="Brümmer2022"/><ref name="Tapari2022"/> which is lower than COVID-19 [[polymerase chain reaction]] (PCR) tests' sensitivity of 88%-96%.<ref name="Pecoraro2022">{{cite journal| vauthors=Pecoraro V, Negro A, Pirotti T, Trenti T| title=Estimate false-negative RT-PCR rates for SARS-CoV-2. A systematic review and meta-analysis | journal=Eur J Clin Invest | year= 2022 | volume= 52 | issue= 2 | article-number= e13706 | pmid=34741305 | doi=10.1111/eci.13706 | pmc=8646643 |doi-access=free | title-link=doi }}</ref><ref name="Pu2022">{{cite journal| vauthors=Pu R, Liu S, Ren X, Shi D, Ba Y, Huo Y, et al| title=The screening value of RT-LAMP and RT-PCR in the diagnosis of COVID-19: systematic review and meta-analysis | journal=J Virol Methods | year= 2022 | volume= 300 | issue= | article-number= 114392 | pmid=34856308 | doi=10.1016/j.jviromet.2021.114392 | pmc=8629515 |doi-access=free | title-link=doi }}</ref>{{efn|The study by Pecoraro ''et al'' found a pooled false-negative rate for PCR of 0.12, which implies a sensitivity of 0.88.}} Despite this, COVID-19 RATs remain valuable in finding people who would otherwise not know they were infected, helping to prevent further transmission. The tests are more sensitive in the symptomatic and transmissive stages of disease when the [[viral load]] is higher.<ref name="Khalid2022"/><ref name="Brümmer2022"/><ref name="Tapari2022"/><ref name="Oxford2020">{{cite web|url= https://www.ox.ac.uk/news/2020-11-11-oxford-university-and-phe-confirm-lateral-flow-tests-show-high-specificity-and-are|title= Oxford University and PHE confirm lateral flow tests show high specificity and are effective at identifying most individuals who are infectious|date= 11 November 2020|website= Oxford University|access-date= 19 May 2021|archive-date= 17 July 2021|archive-url= https://web.archive.org/web/20210717053744/https://www.ox.ac.uk/news/2020-11-11-oxford-university-and-phe-confirm-lateral-flow-tests-show-high-specificity-and-are|url-status= live}}</ref><ref name="Guglielmi2020">{{cite journal|vauthors=Guglielmi G|date= 2020|title=Fast coronavirus tests: what they can and can't do|journal=Nature|volume=585|issue=7826|pages=496–498|bibcode=2020Natur.585..496G|doi=10.1038/d41586-020-02661-2|pmid=32939084|doi-access=free | title-link=doi }}</ref>

      ==Uses==

      ===Use in diagnosis===
      COVID-19 rapid antigen tests (RATs) have been widely used for diagnosis of COVID-19. The [[World Health Organization]] (WHO) COVID-19 Case Definition states that a person with a positive RAT (also known as an antigen rapid diagnostic test or Antigen-RDT) can be considered a "confirmed case of SARS-CoV-2 infection" in two ways.<ref name="WHOCaseDefinition2020">{{cite web |url=https://www.who.int/publications/i/item/WHO-2019-nCoV-Surveillance_Case_Definition-2020.2 |title=WHO COVID-19: Case Definitions |date=16 December 2020 |publisher=[[World Health Organization]] (WHO) |access-date=8 July 2022 |archive-date=7 July 2022 |archive-url=https://web.archive.org/web/20220707053713/https://www.who.int/publications/i/item/WHO-2019-nCoV-Surveillance_Case_Definition-2020.2 |url-status=live }}</ref> First, the person with a positive Antigen-RDT could meet a "probable case definition" such as having recent loss of smell or taste without any known cause, or could meet certain "suspect criteria" such as having a severe acute respiratory illness.<ref name="WHOCaseDefinition2020"/> Second, the person with a positive Antigen-RDT could be asymptomatic but a "contact of a probable or confirmed case."<ref name="WHOCaseDefinition2020"/> Nevertheless, individual countries may have different case definitions of COVID-19; for example, in New Zealand a positive PCR test (not just a RAT) is necessary for a person to be considered a "confirmed case."<ref name="NZ2022">{{cite web |url=https://www.health.govt.nz/covid-19-novel-coronavirus/covid-19-information-health-professionals/case-definition-and-clinical-testing-guidelines-covid-19 |title=Case definition and clinical testing guidelines for COVID-19 |work=Ministry of Health NZ |date=30 June 2022 |publisher=[[Ministry of Health (New Zealand)|New Zealand Ministry of Health – Manatū Hauora]] |access-date=8 July 2022 |archive-date=9 July 2022 |archive-url=https://web.archive.org/web/20220709053911/https://www.health.govt.nz/covid-19-novel-coronavirus/covid-19-information-health-professionals/case-definition-and-clinical-testing-guidelines-covid-19 }}</ref>

      ===Use in screening===
      Between 2020 and 2021, studies using [[mathematical model]]s estimated the benefit of frequent RATs in [[Screening (medicine)|screening]] populations for COVID-19. Paltiel ''et al'' studied a hypothetical college campus with 5000 students.<ref name="Paltiel2020">{{cite journal| vauthors=Paltiel AD, Zheng A, Walensky RP| title=Assessment of SARS-CoV-2 Screening Strategies to Permit the Safe Reopening of College Campuses in the United States | journal=JAMA Netw Open | year= 2020 | volume= 3 | issue= 7 | pages= e2016818 | pmid=32735339 | doi=10.1001/jamanetworkopen.2020.16818 | pmc=7395236 |doi-access=free | title-link=doi }}</ref> Screening all students every two days with a "low-sensitivity, high-specificity test" (such as a RAT) would be able to control an outbreak of COVID-19.<ref name="Paltiel2020"/> [[Michael Mina (epidemiologist)|Mina]] ''et al'' theorized that higher-frequency screening using lower-sensitivity RATs may be more useful than lower-frequency screening using higher-sensitivity PCR tests because the former would "capture most infections while they are still infectious."<ref name="Mina2020">{{cite journal|vauthors=Mina MJ, Parker R, Larremore DB|year= 2020|title=Rethinking Covid-19 Test Sensitivity – A Strategy for Containment|journal=The New England Journal of Medicine|volume=383|issue=22|pages=e120|doi=10.1056/NEJMp2025631|pmid=32997903|doi-access=free | title-link=doi }}</ref> The quick results of RATs would serve to limit asymptomatic spread.<ref name="Mina2020"/> Larremore ''et al'' simulated various COVID-19 population screening strategies.<ref name="Larremore2021">{{cite journal|vauthors=Larremore DB, Wilder B, Lester E, Shehata S, Burke JM, Hay JA, et al|year=2021|title=Test sensitivity is secondary to frequency and turnaround time for COVID-19 screening|journal=Science Advances|volume=7|issue=1|article-number=eabd5393|bibcode=2021SciA....7.5393L|doi=10.1126/sciadv.abd5393|pmc=7775777|pmid=33219112|doi-access=free | title-link=doi }}</ref> The researchers found that "effective screening depends largely on frequency of testing and speed of reporting and is only marginally improved by high test sensitivity."<ref name="Larremore2021"/>

      === Humanitarian uses ===
      In addition to routine community use, rapid tests have also been utilised as part of humanitarian efforts during the pandemic. Following the flooding in Jakarta in Indonesia on 2 December 2020, rapid tests were made available in flood shelters.<ref>{{Cite web|title=North Jakarta to provide rapid tests for people in flood shelters|url=https://www.thejakartapost.com/news/2020/12/02/north-jakarta-to-provide-rapid-tests-for-people-in-flood-shelters.html|date=2 December 2020|access-date=11 July 2022|website=The Jakarta Post|archive-date=26 December 2022|archive-url=https://web.archive.org/web/20221226051204/https://www.thejakartapost.com/news/2020/12/02/north-jakarta-to-provide-rapid-tests-for-people-in-flood-shelters.html|url-status=live}}</ref> Furthermore, following the closure of national borders in Europe following the emergence of the [[Alpha variant]] just before Christmas 2020, nearly 6,000 lorry drivers were stranded without food,<ref>{{Cite news|date=23 December 2020|title=Covid-19: Charities send food to stranded truckers|work=BBC News|url=https://www.bbc.com/news/uk-england-kent-55421924|access-date=11 July 2022|archive-date=6 December 2022|archive-url=https://web.archive.org/web/20221206063345/https://www.bbc.com/news/uk-england-kent-55421924|url-status=live}}</ref> effectively stopping Christmas food deliveries. Rapid tests were deployed by French firefighters within 24 hours at the Channel. Rapid tests enabled lorries to get on the road and complete their deliveries and return to their families for Christmas, demonstrating the potential global utility of having an easily implementable COVID-19 test.<ref>{{Cite news|date=24 December 2020|title=Army to take over Covid testing for hauliers trapped near Dover|work=The Guardian|url=https://www.theguardian.com/world/2020/dec/24/french-firefighters-arrive-in-dover-with-10000-covid-tests-for-lorry-drivers|access-date=11 July 2022|issn=0261-3077|vauthors=Rawlinson K, Halliday J|archive-date=14 November 2021|archive-url=https://web.archive.org/web/20211114134745/https://www.theguardian.com/world/2020/dec/24/french-firefighters-arrive-in-dover-with-10000-covid-tests-for-lorry-drivers|url-status=live}}</ref><ref>{{Cite web|title=COVID-19: Raw anger among lorry drivers in Dover as coronavirus testing fails to ease tensions|url=https://news.sky.com/story/covid-19-raw-anger-among-lorry-drivers-in-dover-as-coronavirus-testing-fails-to-ease-tensions-12171676|access-date=11 July 2022|date=24 December 2020|website=Sky News|archive-date=14 November 2021|archive-url=https://web.archive.org/web/20211114134746/https://news.sky.com/story/covid-19-raw-anger-among-lorry-drivers-in-dover-as-coronavirus-testing-fails-to-ease-tensions-12171676|url-status=live}}</ref> [[Médecins Sans Frontières]] strongly endorsed the use of rapid tests in lower- and middle-income countries, noting "COVID-19 antigen tests can deliver rapid and actionable results, ensuring timely identification of people infected with the virus at the community level".<ref>{{Cite web|title=COVID-19 diagnostics: MSF welcomes more affordable rapid tests for lower- and middle-income countries – World|url=https://reliefweb.int/report/world/covid-19-diagnostics-msf-welcomes-more-affordable-rapid-tests-lower-and-middle-income|date=29 January 2021|access-date=11 July 2022|website=ReliefWeb|archive-date=14 November 2021|archive-url=https://web.archive.org/web/20211114134810/https://reliefweb.int/report/world/covid-19-diagnostics-msf-welcomes-more-affordable-rapid-tests-lower-and-middle-income|url-status=live}}</ref>

      === Use for "return to normal" ===
      Spain became the first country to use rapid tests to facilitate a return-to-normal with rapid tests being widely available in pharmacies in December 2020,<ref>{{Cite news|date=7 December 2020|title=Pharmacies in Spain to Roll out Rapid Tests for COVID-19|url=https://www.euroweeklynews.com/2020/12/07/pharmacies-in-spain-to-roll-out-rapid-tests-for-covid-19/|access-date=11 July 2022|newspaper=Euro Weekly News|vauthors=Glenn A|archive-date=18 May 2022|archive-url=https://web.archive.org/web/20220518032040/https://euroweeklynews.com/2020/12/07/pharmacies-in-spain-to-roll-out-rapid-tests-for-covid-19/|url-status=live}}</ref> and a free music concert held in [[Barcelona]] for individuals who took a rapid test.<ref>{{Cite web|date=12 December 2020|title=Barcelona hosts concert for 500 residents in COVID rapid-test experiment|url=https://nypost.com/2020/12/12/barcelona-hosts-concert-for-500-in-covid-rapid-test-experiment/|access-date=11 July 2022|website=New York Post|vauthors=Dorn S|archive-date=4 July 2022|archive-url=https://web.archive.org/web/20220704040907/https://nypost.com/2020/12/12/barcelona-hosts-concert-for-500-in-covid-rapid-test-experiment/|url-status=live}}</ref> A similar approach was taken in [[Albania]] to enable music festivals.<ref>{{Cite web|date=2 December 2020|title=The Albanian government has approved rapid Covid testing for Unum Festival 2021|url=https://crackmagazine.net/2020/12/albanian-government-has-approved-the-use-of-rapid-covid-testing-for-unum-festival-2021/|access-date=11 July 2022|website=Crack Magazine|archive-date=20 May 2022|archive-url=https://web.archive.org/web/20220520130440/https://crackmagazine.net/2020/12/albanian-government-has-approved-the-use-of-rapid-covid-testing-for-unum-festival-2021/|url-status=live}}</ref> However, many experts were unsure of this approach believing that "rapid tests are not the solution to restart normal life"<ref>{{Cite web|date=22 December 2020|title=Rapid tests are not the solution to restart normal life, expert says|url=https://www.brusselstimes.com/news/belgium-all-news/146693/rapid-tests-are-not-the-solution-to-restart-normal-life-expert-says-herman-goossens-antigen-pcr/|access-date=11 July 2022|website=The Brussels Times|archive-date=25 May 2022|archive-url=https://web.archive.org/web/20220525132049/https://www.brusselstimes.com/news/belgium-all-news/146693/rapid-tests-are-not-the-solution-to-restart-normal-life-expert-says-herman-goossens-antigen-pcr/|url-status=live}}</ref> but might be used in conjunction with other infection control techniques.<ref>{{Cite web|title=Lateral flow testing – new rapid tests to detect COVID-19 – Public health matters|url=https://publichealthmatters.blog.gov.uk/2020/12/08/lateral-flow-testing-new-rapid-tests-to-detect-covid-19/|date=8 December 2020|access-date=11 July 2022|website=publichealthmatters.blog.gov.uk|archive-date=5 August 2021|archive-url=https://web.archive.org/web/20210805074250/https://publichealthmatters.blog.gov.uk/2020/12/08/lateral-flow-testing-new-rapid-tests-to-detect-covid-19/|url-status=live}}</ref>

      == Concerns about use ==
      [[File:COVID-19 rapid antigen test Certification.jpg|right|thumb|A certification of quality for a COVID-19 rapid antigen home test.]]

      ===False negatives (low sensitivity) ===
      Although the [[Sensitivity and specificity|specificity]] of RATs are high (98%-99%),<ref name="Khalid2022"/><ref name="Brümmer2022"/><ref name="Tapari2022"/> in 2020 RATs were criticized for having a [[Sensitivity and specificity|sensitivity]] as low as 50%; that is, if people with COVID-19 as determined by a positive PCR test were also tested with a RAT, about half the time the RAT would be negative.<ref name="Service2020">{{cite news |vauthors=Service RF |date=22 May 2020 |title=Coronavirus antigen tests: quick and cheap, but too often wrong? |url=https://www.science.org/content/article/coronavirus-antigen-tests-quick-and-cheap-too-often-wrong |work=Science |access-date=10 July 2022 |archive-date=11 July 2022 |archive-url=https://web.archive.org/web/20220711043048/https://www.science.org/content/article/coronavirus-antigen-tests-quick-and-cheap-too-often-wrong |url-status=live }}</ref><ref name=Saxena2020>{{Cite web|date=17 August 2020|title=Why India's rapid antigen tests for coronavirus are like 'flipping a coin'|url=https://theprint.in/india/why-indias-rapid-antigen-tests-for-coronavirus-are-like-flipping-a-coin/483203/|access-date=10 July 2022|work=[[ThePrint]]|vauthors=Saxena R|archive-date=21 August 2022|archive-url=https://web.archive.org/web/20220821083716/https://theprint.in/india/why-indias-rapid-antigen-tests-for-coronavirus-are-like-flipping-a-coin/483203/|url-status=live}}</ref><ref name="Halliday2020">{{cite news |vauthors=Halliday J, Pidd H |date=22 December 2020 |title=Plans for 30-minute Covid testing in England halted amid accuracy fears |url=https://www.theguardian.com/world/2020/dec/22/plans-for-30-minute-covid-lateral-flow-tests-in-england-halted-over-accuracy-fears |work=The Guardian |access-date=10 July 2022 |archive-date=11 July 2022 |archive-url=https://web.archive.org/web/20220711043047/https://www.theguardian.com/world/2020/dec/22/plans-for-30-minute-covid-lateral-flow-tests-in-england-halted-over-accuracy-fears |url-status=live }}</ref> As of 2022, [[systematic review]]s determined that the pooled sensitivities of RATs were 70%-72%.<ref name="Khalid2022"/><ref name="Brümmer2022"/><ref name="Tapari2022"/> In one systematic review, the range of sensitivities across studies was 37%-90%.<ref name="Khalid2022"/> As the [[World Health Organization]] (WHO) recommends RATs with "≥ 80% sensitivity",<ref name="WHO2021">{{cite report |title=Antigen-detection in the diagnosis of SARS-CoV-2 infection. Interim guidance|date=6 October 2021|publisher=[[World Health Organization]] (WHO) |hdl=10665/345948|hdl-access=free|id=WHO/2019-nCoV/Antigen_Detection/2021.1}}</ref> many RATs do not meet the WHO recommendation.

      In the systematic reviews, the sensitivity was higher for symptomatic people (76%-82%) than for asymptomatic people (57%-68%).<ref name="Khalid2022"/><ref name="Brümmer2022"/><ref name="Tapari2022"/> RATs were more sensitive when samples had more viral load, as measured by a low PCR "cycle threshold," and less sensitive when the samples had less viral load.<ref name="Khalid2022"/><ref name="Brümmer2022"/><ref name="Tapari2022"/>

      A 2022 study followed 225 adults and children with COVID-19 over 15 days using PCR tests, viral cultures, and home RATs.<ref name="Chu2022">{{cite journal| vauthors=Chu VT, Schwartz NG, Donnelly MA, Chuey MR, Soto R, Yousaf AR, et al| title=Comparison of Home Antigen Testing With RT-PCR and Viral Culture During the Course of SARS-CoV-2 Infection | journal=JAMA Intern Med | year= 2022 | volume= 182 | issue= 7 | pages= 701–709 | pmid=35486394 | doi=10.1001/jamainternmed.2022.1827 | pmc=9055515 |doi-access=free | title-link=doi }}</ref> It found that the sensitivity of the RAT (Quidel QuickVue) increased from 0% two days prior to symptom onset or first positive PCR test to 77% four days after symptom onset or first positive PCR test, with an overall sensitivity of 50%.<ref name="Chu2022"/> Compared with PCR tests collected the same day, the RAT sensitivity was 64%; compared with viral cultures collected the same day, the RAT sensitivity was 84%.<ref name="Chu2022"/> The sensitivity of the RAT was lower in persons who were vaccinated against COVID-19 than in persons who were not vaccinated against COVID-19.<ref name="Chu2022"/>

      ===Potential for false negative results due to new variants===
      In November 2020, a new, marginally more infectious strain of SARS-CoV-2 was identified in the United Kingdom, the [[SARS-CoV-2 Alpha variant]]. The strain rapidly spread around the world. With widespread global use of this form of COVID-19 testing, there was a concern that this variant would render rapid testing obsolete. As part of the UK's accelerated technology evaluation of lateral flow, within 24 hours [[Public Health England]] laboratories were able to confirm that RATs in global development were not affected (i.e., that they could identify the new variant). This was because rapid test generally targets the [[capsid]] protein and not the [[Coronavirus spike protein|spike protein]].<ref>{{Cite web|title=Rapid evaluation confirms lateral flow devices effective in detecting new COVID-19 variant|url=https://www.gov.uk/government/news/rapid-evaluation-confirms-lateral-flow-devices-effective-in-detecting-new-covid-19-variant|access-date=4 July 2022|website=GOV.UK|archive-date=5 October 2021|archive-url=https://web.archive.org/web/20211005064409/https://www.gov.uk/government/news/rapid-evaluation-confirms-lateral-flow-devices-effective-in-detecting-new-covid-19-variant|url-status=live}}</ref> Some strains have been identified with a nucleocapsid mutation (D399N) that does decrease the sensitivity of at least one RAT (Quidel Sofia 2) up to 1,000-fold.<ref name="Bourassa2021">{{cite journal| vauthors=Bourassa L, Perchetti GA, Phung Q, Lin MJ, Mills MG, Roychoudhury P, et al| title=A SARS-CoV-2 Nucleocapsid Variant that Affects Antigen Test Performance|journal=J Clin Virol|year= 2021|volume= 141|article-number= 104900|pmid=34171548|doi=10.1016/j.jcv.2021.104900|pmc=8219478|doi-access=free | title-link=doi }}</ref> Fortunately, the frequency of mutation D399N was still relatively low globally at ~0.02% as of May 2021.<ref name="Bourassa2021"/> A study published in 2022 found that the sensitivities of six rapid antigen detection tests were 70.0%-92.9% for the [[SARS-CoV-2 Delta variant|Delta variant]] and 69.6%-78.3% for the [[SARS-CoV-2 Omicron variant|Omicron variant]] across a range of [[viral load]]s; however, for Omicron samples with a low viral load, the sensitivities were 0.0%-23.1%.<ref name="Bayart2022">{{cite journal| vauthors=Bayart JL, Degosserie J, Favresse J, Gillot C, Didembourg M, Djokoto HP, et al| title=Analytical Sensitivity of Six SARS-CoV-2 Rapid Antigen Tests for Omicron versus Delta Variant | journal=Viruses | year= 2022 | volume= 14 | issue= 4 | page=654 | pmid=35458384 | doi=10.3390/v14040654 | pmc=9031584 |doi-access=free | title-link=doi }}</ref>

      ===False positive results when instructions not followed===
      If a COVID-19 RAT is used outside manufacturer recommendations, the result can be [[False positives and false negatives#False positive error|false positive]]. Beginning in December 2020, [[TikTok]] videos demonstrated how to use soft drinks to create false positive COVID-19 RAT results.<ref name="Lorch2022">{{cite news |last=Lorch |first=Mark |date=5 July 2021 |title=How children are spoofing Covid-19 tests with soft drinks |url=https://www.bbc.com/future/article/20210705-how-children-are-spoofing-covid-19-tests-with-soft-drinks |work=BBC |access-date=3 July 2022 |archive-date=5 June 2022 |archive-url=https://web.archive.org/web/20220605231102/https://www.bbc.com/future/article/20210705-how-children-are-spoofing-covid-19-tests-with-soft-drinks |url-status=live }}</ref> Later, researchers found that introducing fruit juices, alcoholic beverages, bottled water, and other products directly into an Abbott Panbio COVID-19 RAT without the manufacturer's recommended [[buffer solution]] produced false positives.<ref name="Patriquin2021">{{cite journal| author=Patriquin G, Davidson RJ, Hatchette TF, Head BM, Mejia E, Becker MG | display-authors=et al| title=Generation of False-Positive SARS-CoV-2 Antigen Results with Testing Conditions outside Manufacturer Recommendations: A Scientific Approach to Pandemic Misinformation | journal=Microbiol Spectr | year= 2021 | volume= 9 | issue= 2 | pages= e0068321 | pmid=34668722 | doi=10.1128/Spectrum.00683-21  | doi-access=free| pmc=8528119 }}</ref> In contrast, a different RAT (BD Veritor) produced no false positive results under the same conditions.<ref name="Patriquin2021"/>

      ===Slow deployment and uptake===
      Some have raised concerns about the slow deployment and uptake of RATs, and the potential loss of life that might have occurred as a result. A modelling study in Canada estimated that half the deaths in care homes in British Columbia in 2020 could have been prevented if rapid testing had been available.<ref name="Holliday2021">{{Cite news|vauthors=Holliday I|title=Rapid tests could have prevented half of B.C. care home deaths in 2020, modelling suggests|url=https://www.ctvnews.ca/vancouver/article/rapid-tests-could-have-prevented-half-of-bc-care-home-deaths-in-2020-modelling-suggests/|access-date=7 July 2022|work=[[CTVNews]]|date=29 January 2021|archive-date=3 August 2022|archive-url=https://web.archive.org/web/20220803222211/http://bc.ctvnews.ca/rapid-tests-could-have-prevented-half-of-b-c-care-home-deaths-in-2020-modelling-suggests-1.5288453|url-status=live}}</ref>

      === Toxicity of components ===
      Various concerns have been raised related to the safety of chemical components contained within RAT kits, which can be toxic to humans if not properly used.<ref>{{Cite journal |last1=Johnson-Arbor |first1=Kelly |last2=Reid |first2=Nicole |last3=Smolinske |first3=Susan |date=25 January 2022 |title=Human toxicity from COVID-19 rapid home test kits |journal=[[The American Journal of Emergency Medicine]] |volume=57 |pages=215–216 |doi=10.1016/j.ajem.2022.01.048 |pmid=35105473 |pmc=8786400 }}</ref> On 24 February 2022, [[Health Canada]] issued a public advisory warning that there had been a recent increase in calls to poison control centers associated with RATs, which contained the preservatives<ref>{{cite journal |last1=Affatato |first1=S |title=Sodium-azide versus ProClin 300: influence on the morphology of UHMWPE particles generated in laboratory tests |journal=Biomaterials |date=February 2004 |volume=25 |issue=5 |pages=835–842 |doi=10.1016/s0142-9612(03)00603-3 |pmid=14609672 }}</ref> [[sodium azide]] and ProClin.<ref>{{Cite web |date=24 February 2022 |title=Rapid antigen test kits and potential exposure to hazardous substances |url=https://recalls-rappels.canada.ca/en/alert-recall/rapid-antigen-test-kits-and-potential-exposure-hazardous-substances |url-status=live |archive-url=https://web.archive.org/web/20240124212514/https://recalls-rappels.canada.ca/en/alert-recall/rapid-antigen-test-kits-and-potential-exposure-hazardous-substances |archive-date=24 January 2024 |access-date=24 January 2024 |website=[[Government of Canada]]}}</ref>

      == Methods==

      An [[antigen]] is a foreign [[molecule]] or molecular [[structure]] that can cause an [[immune response]]. COVID-19 rapid antigen tests (RATs) detect antigenic [[protein]]s on the surface of or in the interior of the SARS-CoV-2 [[coronavirus]]. Of the COVID-19 RATs that had received an [[emergency use authorization]] (EUA) from the US [[Food and Drug Administration]] (FDA) by January 2022, all detected [[nucleocapsid]] proteins, and one also detected the receptor-binding domain of the [[coronavirus spike protein]].<ref name="Drain2022">{{cite journal| vauthors=Drain PK| title=Rapid Diagnostic Testing for SARS-CoV-2 | journal=N Engl J Med | year= 2022 | volume= 386 | issue= 3 | pages= 264–272 | pmid=34995029 | doi=10.1056/NEJMcp2117115 | pmc=8820190}}</ref>{{rp|Table S1}} Similarly, almost all tests on the European Union common list of COVID-19 RATs target nucleocapsid proteins.<ref name="EUCommonList2020">{{cite web |url=https://health.ec.europa.eu/system/files/2022-06/covid-19_rat_common-list_en_0.pdf |title=EU Common list of COVID-19 rapid antigen tests |date=10 June 2022 |publisher=European Commission, [[Directorate-General for Health and Food Safety]] |access-date=6 July 2022 |archive-date=5 July 2022 |archive-url=https://web.archive.org/web/20220705140728/https://health.ec.europa.eu/system/files/2022-06/covid-19_rat_common-list_en_0.pdf }}</ref>

      [[File:Lateral Flow Assay.jpg|thumb|300x300px|Rapid antigen test functioning by [[lateral flow assay]].]]

      A typical COVID-19 RAT is a [[lateral flow test]] (LFT).<ref name="Drain2022"/>{{rp|Table S1}}<ref name="Shirazi2021">{{Cite journal|vauthors=Shirazi S, Stanford CM, Cooper LF|year=2021|title=Testing for COVID-19 in dental offices: mechanism of action, application and interpretation of laboratory and point-of-care screening tests|journal=The Journal of the American Dental Association|volume=152|issue=7|pages=514–525.e8|doi=10.1016/j.adaj.2021.04.019|pmid=34176567|issn=0002-8177|pmc=8096195}}</ref> For an LFT, a liquid sample (such as from a nasal swab) is placed on a pad at one end of a porous paper-like strip.<ref name="WelshGovt2022">{{cite web |url=https://gov.wales/how-covid-19-lateral-flow-tests-work |title=How COVID-19 lateral flow tests work |date=30 June 2022 |publisher=Welsh Government |access-date=6 July 2022 |archive-date=13 July 2022 |archive-url=https://web.archive.org/web/20220713210530/https://gov.wales/how-covid-19-lateral-flow-tests-work |url-status=live }}</ref><ref name="Frew2021">{{cite journal|vauthors=Frew E, Roberts D, Barry S, Holden M, Restell Mand A, Mitsock E, et al| title=A SARS-CoV-2 antigen rapid diagnostic test for resource limited settings | journal=Sci Rep | year= 2021 | volume= 11 | issue= 1 | article-number= 23009 | pmid=34837001 | doi=10.1038/s41598-021-02128-y | pmc=8626481| bibcode=2021NatSR..1123009F }}</ref> The liquid is pulled through the strip by wicking ([[capillary action]]), encountering different chemically-enhanced regions embedded within the strip.

      First, at a "conjugate pad," soluble antibodies with gold [[nanoparticle]]s are picked up by the liquid, attaching to any SARS-CoV-2 antigens present in the sample.<ref name="Shirazi2021"/> Then, at the test line (which may be labelled "T"), [[antibodies]] specific to SARS-CoV-2 are anchored to the strip; these bind to any SARS-CoV-2 antigens, capturing the associated nanoparticles.<ref name="Shirazi2021"/> Finally at the control line (which may be labelled "C"), antibodies that can attach to the antibodies with nanoparticles are anchored, capturing the remaining nanoparticles.<ref name="Shirazi2021"/>

      If there are no SARS-CoV-2 antigens present, then the gold nanoparticles are carried by the liquid, continue through the test line, and then captured at the control line, showing a single indicating a negative test. However, if there are antigens present, then some of the nanoparticles will be stopped at the test line and the rest will be stopped at the control line, showing two lines indicating a positive test.<ref name="Shirazi2021"/><ref name="WelshGovt2022"/><ref name="Frew2021"/>

      ==History of development and deployment==
      {{main|Development of COVID-19 tests}}

      ===2020===
      [[File:Covid-19 rapid test in Rwanda.jpg|thumb|right|300px|COVID-19 rapid test being administered in Rwanda]]

      In May 2020, the US [[Food and Drug Administration]] (FDA) issued the first [[emergency use authorization]] (EUA) for a COVID-19 RAT, the Sofia 2 test manufactured by [[Quidel]].<ref name="FDAQuidel2020">{{cite news|vauthors=Hahn SM, Shuren JE|title=Coronavirus (COVID-19) Update: FDA Authorizes First Antigen Test to Help in the Rapid Detection of the Virus that Causes COVID-19 in Patients|url=https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-authorizes-first-antigen-test-help-rapid-detection-virus-causes|access-date=4 July 2022|publisher=U.S. [[Food and Drug Administration]] (FDA)|date=9 May 2020|archive-date=27 May 2020|archive-url=https://web.archive.org/web/20200527012831/https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-authorizes-first-antigen-test-help-rapid-detection-virus-causes}}</ref>

      In August 2020, the [[United States Department of Health and Human Services]] announced that the US government would be purchasing 150 million BinaxNOW RATs produced by [[Abbott Laboratories]] "to expand strategic, evidence-based testing."<ref name="HHS2020">{{cite web|url=https://www.hhs.gov/about/news/2020/08/27/trump-administration-will-deploy-150-million-rapid-tests-in-2020.html|title=Trump Administration Will Deploy 150 Million Rapid Tests in 2020|date=27 August 2020|publisher=United States Department of Health and Human Services|access-date=4 July 2022|archive-url=https://web.archive.org/web/20200828082409/https://www.hhs.gov/about/news/2020/08/27/trump-administration-will-deploy-150-million-rapid-tests-in-2020.html|archive-date=28 August 2020|url-status=unfit}}</ref> Later the agency announced that 100 million of the tests were to be sent to governors to use "at their discretion," for example to reopen schools.<ref name="Blad2020">{{cite news |vauthors=Blad E |date=9 October 2020 |title=Why Rapid Coronavirus Tests in Schools May Not Be the 'Game Changer' Some Officials Hope For |url=https://www.edweek.org/policy-politics/why-rapid-coronavirus-tests-in-schools-may-not-be-the-game-changer-some-officials-hope-for/2020/10 |work=[[Education Week]] |access-date=12 July 2022 |archive-date=13 July 2022 |archive-url=https://web.archive.org/web/20220713032330/https://www.edweek.org/policy-politics/why-rapid-coronavirus-tests-in-schools-may-not-be-the-game-changer-some-officials-hope-for/2020/10 |url-status=live }}</ref>

      By September 2020, it was reported that the United Kingdom's [[Operation Moonshot|Moonshot program]] would be investing £100 billion to systematically assess, develop and implement new technologies for COVID-19 testing, including RATs for COVID-19.<ref name="Iacobucci2020">{{cite journal|vauthors=Iacobucci G, Coombes R|title=Covid-19: Government plans to spend £100bn on expanding testing to 10 million a day|journal=BMJ|year=2020|volume=370|article-number=m3520|pmid=32907851|doi=10.1136/bmj.m3520|doi-access=free | title-link=doi |quote=A spokesperson for the Department of Health and Social Care said, '… we are going further by investing £500m in next generation tests, like… rapid turnaround tests that can deliver results in just 20 minutes.'}}</ref> In that month, the [[World Health Organization]] (WHO) released interim guidance on COVID-19 "antigen-detecting rapid diagnostic tests" (Ag-RDTs) including recommendations for their use, selection, and implementation.<ref name="WHO2020">{{cite report |title=Antigen-detection in the diagnosis of SARS-CoV-2 infection using rapid immunoassays. Interim guidance|date=11 September 2020|publisher=[[World Health Organization]] (WHO)|hdl=10665/334253|hdl-access=free|id=WHO/2019-nCoV/Antigen_Detection/2020.1}}</ref> The interim guidance noted that Ag-RDTs were easier to implement and less expensive than [[nucleic acid]] amplification tests (NAATs).<ref name="WHO2020"/> The [[World Health Organization]] (WHO) recommended the use of Ag-RDTs in outbreaks, in monitoring disease trends, and in early identification of cases.<ref name="WHO2020"/>

      [[Health Canada]] approved its first COVID-19 RAT in October 2020, the Abbott Panbio test.<ref name="Tasker2020">{{cite news|vauthors=Tasker JP|date=6 October 2020|title=Health Canada approves 1st rapid antigen COVID-19 test, feds plan to buy 20 million|url=https://www.cbc.ca/news/politics/health-canada-antigen-test-abbott-1.5751939|work=CBC News|access-date=4 July 2022|archive-date=11 July 2022|archive-url=https://web.archive.org/web/20220711165111/https://www.cbc.ca/news/politics/health-canada-antigen-test-abbott-1.5751939|url-status=live}}</ref> As of October 2020, there were questions in the US as to whether manufacturing capacity could keep up with the potential demand for hundreds of millions of RATs.<ref name="Rubin2020">{{cite journal|vauthors=Rubin R|year=2020|title=The Challenges of Expanding Rapid Tests to Curb COVID-19|journal=JAMA|volume=324|issue=18|pages=1813–1815|doi=10.1001/jama.2020.21106|pmid=33084882|doi-access=free | title-link=doi }}</ref><ref name="Bonislawski2020">{{Cite journal|date=8 October 2020|title=Huge demand for COVID-19 rapid antigen testing may face manufacturing constraints|url=https://www.modernhealthcare.com/supply-chain/huge-demand-covid-19-rapid-antigen-testing-may-face-manufacturing-constraints|access-date=10 July 2022|journal=Modern Healthcare|archive-date=14 June 2022|archive-url=https://web.archive.org/web/20220614141955/https://www.modernhealthcare.com/supply-chain/huge-demand-covid-19-rapid-antigen-testing-may-face-manufacturing-constraints|url-status=live}}</ref> RATs began to be rolled out across Portuguese schools and care homes.<ref>{{Cite web|date=27 October 2020|title=Portugal rolls out 'rapid tests' to help stem outbreaks in schools and OAP homes|url=https://www.portugalresident.com/portugal-rolls-out-rapid-tests-to-help-stem-outbreaks-in-schools-and-oap-homes/|access-date=12 July 2022|website=Portugal Resident|vauthors=Donn N|archive-date=14 November 2021|archive-url=https://web.archive.org/web/20211114132357/https://www.portugalresident.com/portugal-rolls-out-rapid-tests-to-help-stem-outbreaks-in-schools-and-oap-homes/|url-status=live}}</ref>

      One of the early large studies of COVID-19 lateral flow devices (LFDs) was completed by [[Public Health England]] and [[University of Oxford]], with a preliminary report released in November 2020.<ref name="Oxford2020a">{{Cite web|title=Oxford University and PHE confirm lateral flow tests show high specificity and are effective at identifying most individuals who are infectious|url=https://www.ox.ac.uk/news/2020-11-11-oxford-university-and-phe-confirm-lateral-flow-tests-show-high-specificity-and-are|date=11 November 2020|access-date=4 July 2022|publisher=University of Oxford|archive-date=17 July 2021|archive-url=https://web.archive.org/web/20210717053744/https://www.ox.ac.uk/news/2020-11-11-oxford-university-and-phe-confirm-lateral-flow-tests-show-high-specificity-and-are|url-status=live}}</ref> The researchers undertook an evaluation of 64 LFDs that proceeded in several phases.<ref name="Peto2021">{{cite journal|vauthors=Peto T, ((UK COVID-19 Lateral Flow Oversight Team))|title=COVID-19: Rapid antigen detection for SARS-CoV-2 by lateral flow assay: A national systematic evaluation of sensitivity and specificity for mass-testing|journal=eClinicalMedicine|year=2021|volume=36|article-number=100924|pmid=34101770|doi=10.1016/j.eclinm.2021.100924|pmc=8164528}}</ref> Of the four LFDs with "desirable performance characteristics," one (Innova) had a sensitivity of 78.8% and a false positive rate of 0.32%.<ref name="Peto2021"/>

      [[File:NHS COVID-19 Rapid Antigen Test Kit 2.jpg|thumb|Contents of a box of free COVID-19 rapid antigen lateral flow tests provided by the NHS Test and Trace system.]]
      On 2 November 2020, [[Slovakia]] became the first country in the world to initiate country-wide mass testing using rapid tests. Five million rapid tests were performed by 60,000 staff who used the SD [[Biosensor]] antigen test and performed swabbing on the population.<ref>{{cite journal|vauthors=Mahase E|date=December 2020|title=Covid-19: Mass testing in Slovakia may have helped cut infections|journal=BMJ|volume=371|article-number=m4761|doi=10.1136/bmj.m4761|pmid=33293348|doi-access=free | title-link=doi }}</ref><ref>{{Cite news|author=Agence France-Presse|date=2 November 2020|title=Slovakia carries out Covid mass testing of two-thirds of population|work=The Guardian|url=https://www.theguardian.com/world/2020/nov/02/slovakia-carries-out-covid-mass-testing-of-two-thirds-of-population|access-date=11 July 2022|issn=0261-3077|archive-date=16 July 2021|archive-url=https://web.archive.org/web/20210716091056/https://www.theguardian.com/world/2020/nov/02/slovakia-carries-out-covid-mass-testing-of-two-thirds-of-population|url-status=live}}</ref> Two research studies on the Slovakia experience were published in early 2021, one by professor [[Martin Kahanec]] from [[Central European University]] and his coauthors and another one by Martin Pavelka from the [[London School of Hygiene & Tropical Medicine]] and his team. Both studies suggested that rapid antigen mass testing helped to suppress the pandemic in the country, although according to the former study the effect of mass testing on the pandemic was temporary and started to dissipate after about two weeks.<ref name="Kahanec2021"/><ref name="Pavelka2021">{{cite journal|vauthors=Pavelka M, Van-Zandvoort K, Abbott S, Sherratt K, Majdan M, Jarčuška P, et al|date=2021|title=The impact of population-wide rapid antigen testing on SARS-CoV-2 prevalence in Slovakia|journal=Science|volume=372|issue=6542|pages=635–641|doi=10.1126/science.abf9648|pmid=33758017|pmc=8139426|bibcode=2021Sci...372..635P |doi-access=free | title-link=doi }}</ref>

      The United Kingdom continued their ongoing rapid test development programme using the Innova rapid test, with increasing urgency as COVID-19 cases increased across Europe. On 6 November 2020, the [[Prime Minister of the United Kingdom|Prime Minister]], [[Boris Johnson]], started city-wide screening of [[Liverpool]] as part of the accelerated technology evaluation.<ref>{{Cite news|date=2 November 2020|title=Liverpool to pioneer UK's first attempt at mass Covid testing|work=The Guardian|url=https://www.theguardian.com/uk-news/2020/nov/02/liverpool-uk-first-attempt-coronavirus-mass-testing|access-date=11 July 2022|issn=0261-3077|vauthors=Boseley S, Elgot J|archive-date=1 August 2021|archive-url=https://web.archive.org/web/20210801210028/https://www.theguardian.com/uk-news/2020/nov/02/liverpool-uk-first-attempt-coronavirus-mass-testing|url-status=live}}</ref><ref name="Littlejohns2020">{{Cite web|vauthors=Littlejohns P|date=6 November 2020|title=The UK is trialling a lateral flow test for mass Covid-19 diagnosis – how does it work?|url=https://www.nsmedicaldevices.com/news/lateral-flow-test-covid-19/|website=NS Medical Devices|access-date=20 May 2021|archive-date=20 May 2021|archive-url=https://web.archive.org/web/20210520094304/https://www.nsmedicaldevices.com/news/lateral-flow-test-covid-19/|url-status=live}}</ref> Further expansion of rapid tests pilots were also launched for many sectors where testing had not been previously available. These included students at Universities who had been particularly hit by outbreaks. This initially started at [[Durham University]], who had the infrastructure and expertise to manage the rapid test programme,<ref>{{Cite web|title=Covid-19 updates: University's lateral flow tests available to book from tomorrow|url=https://www.palatinate.org.uk/covid-19-updates-michaelmas-2020/|date=19 November 2020|access-date=11 July 2022|website=Palatinate|vauthors=Sigsworth T|archive-date=19 May 2021|archive-url=https://web.archive.org/web/20210519144605/https://www.palatinate.org.uk/covid-19-updates-michaelmas-2020/|url-status=live}}</ref> but was expanded to the majority of UK universities and enabled the national evacuation-style plan to get students safely home for Christmas.<ref>{{Cite news|date=11 November 2020|title=Covid-19: Universities to oversee student exodus for Christmas|work=BBC News|url=https://www.bbc.com/news/education-54887526|access-date=11 July 2022|archive-date=21 April 2022|archive-url=https://web.archive.org/web/20220421170811/https://www.bbc.com/news/education-54887526|url-status=live}}</ref> Rapid tests were also implemented within the [[National Health Service]] (NHS) for staff to reduce possible transmission to patients,<ref>{{Cite web|date=9 November 2020|title=NHS staff to get twice-weekly home covid tests with immediate effect|url=https://www.hsj.co.uk/acute-care/nhs-staff-to-get-twice-weekly-home-covid-tests-with-immediate-effect/7028943.article|access-date=11 July 2022|website=Health Service Journal|vauthors=Serle J|archive-date=19 May 2021|archive-url=https://web.archive.org/web/20210519144605/https://www.hsj.co.uk/acute-care/nhs-staff-to-get-twice-weekly-home-covid-tests-with-immediate-effect/7028943.article|url-status=live}}</ref> local authorities <ref>{{Cite web|title=More rapid COVID-19 tests to be rolled out across England|url=https://www.gov.uk/government/news/more-rapid-covid-19-tests-to-be-rolled-out-across-england|date=10 November 2020|access-date=12 July 2022|website=GOV.UK|archive-date=6 June 2022|archive-url=https://web.archive.org/web/20220606162620/https://www.gov.uk/government/news/more-rapid-covid-19-tests-to-be-rolled-out-across-england|url-status=live}}</ref> and care homes to enable visits to visit residents.<ref>{{Cite web|title=COVID-19: Care home residents allowed to see family after rapid tests rolled out – 'it was very emotional'|url=https://news.sky.com/story/covid-19-care-home-residents-allowed-to-see-family-after-rapid-tests-rolled-out-it-was-very-emotional-12172563|date=25 December 2020|access-date=12 July 2022|website=Sky News|archive-date=19 May 2021|archive-url=https://web.archive.org/web/20210519145330/https://news.sky.com/story/covid-19-care-home-residents-allowed-to-see-family-after-rapid-tests-rolled-out-it-was-very-emotional-12172563|url-status=live}}</ref><ref>{{Cite web|title=£149 million to support increased care home testing|url=https://www.gov.uk/government/news/149-million-to-support-increased-care-home-testing|date=23 December 2020|access-date=12 July 2022|website=GOV.UK|archive-date=14 July 2022|archive-url=https://web.archive.org/web/20220714011918/https://www.gov.uk/government/news/149-million-to-support-increased-care-home-testing|url-status=live}}</ref> On 18 November 2020, [[Wales]] completed the first whole borough testing at [[Merthyr Tydfil]].<ref>{{Cite web|date=14 December 2020|title=Mass Testing in Merthyr Tydfil to continue until Friday|url=https://www.wales247.co.uk/mass-testing-in-merthyr-tydfil-to-continue-until-friday/|access-date=12 July 2022|archive-date=19 May 2021|archive-url=https://web.archive.org/web/20210519145345/https://www.wales247.co.uk/mass-testing-in-merthyr-tydfil-to-continue-until-friday|url-status=live}}</ref><ref>{{Cite web|date=10 December 2020|title=Results of mass coronavirus testing in Merthyr schools released|url=https://www.walesonline.co.uk/news/education/merthyr-schools-coronavirus-results-testing-19413382|access-date=12 July 2022|website=WalesOnline|vauthors=Wightwick A|archive-date=25 June 2022|archive-url=https://web.archive.org/web/20220625081256/https://www.walesonline.co.uk/news/education/merthyr-schools-coronavirus-results-testing-19413382|url-status=live}}</ref>

      Global efforts to step up evaluations of rapid tests were initiated by the [[World Health Organization]] (WHO) Emergencies Department who launched a major rapid diagnostic test implementation project on 10 November 2020, aided by agreement from the [[Bill and Melinda Gates Foundation]] that limited costs for low- and middle-income countries.<ref>{{Cite web|title=SARS-CoV-2 Antigen detecting rapid diagnostic test implementation projects|url=https://www.who.int/news-room/articles-detail/sars-cov-2-antigen-detecting-rapid-diagnostic-test-implementation-projects|date=10 November 2020|access-date=27 December 2020|website=[[World Health Organization]] (WHO)|archive-date=26 February 2021|archive-url=https://web.archive.org/web/20210226210818/https://www.who.int/news-room/articles-detail/sars-cov-2-antigen-detecting-rapid-diagnostic-test-implementation-projects|url-status=live}}</ref><ref>{{Cite web|title=Global partnership to make available 120 million affordable, quality COVID-19 rapid tests for low- and middle-income countries|url=https://www.who.int/news/item/28-09-2020-global-partnership-to-make-available-120-million-affordable-quality-covid-19-rapid-tests-for-low--and-middle-income-countries|date=28 September 2020|access-date=27 December 2020|website=[[World Health Organization]] (WHO)|archive-date=19 July 2021|archive-url=https://web.archive.org/web/20210719033826/https://www.who.int/news/item/28-09-2020-global-partnership-to-make-available-120-million-affordable-quality-covid-19-rapid-tests-for-low--and-middle-income-countries|url-status=live}}</ref>

      Austria started country-wide mass testing on 5 December 2020 and ordered seven million tests consisting of the SD Biosensor test and Siemens Clinitest (aka Orientgene).<ref>{{Cite web|title=COVID-19 Mass Testing in Austria: All Details|url=https://www.vindobona.org/article/covid-19-mass-testing-in-austria-all-details|access-date=27 December 2020|website=Vindobona.org {{!}} Vienna International News|archive-date=19 May 2021|archive-url=https://web.archive.org/web/20210519144610/https://www.vindobona.org/article/covid-19-mass-testing-in-austria-all-details|url-status=live}}</ref><ref>{{Cite web|title='20,000 a day': How mass testing is working in Austria|url=https://www.thelocal.at/20201207/20000-a-day-how-mass-testing-is-working-in-austria|url-status=live|date=7 December 2020|access-date=27 December 2020|website=www.thelocal.at|archive-url=https://web.archive.org/web/20201209140546/https://www.thelocal.at/20201207/20000-a-day-how-mass-testing-is-working-in-austria |archive-date=9 December 2020 }}</ref>

      By the middle of December 2020, there were many studies confirming the efficacy and success of using rapid tests to identify individuals with COVID-19 including studies in the Netherlands,<ref>{{cite journal|display-authors=6|vauthors=Gremmels H, Winkel BM, Schuurman R, Rosingh A, Rigter NA, Rodriguez O, Ubijaan J, Wensing AM, Bonten MJ, Hofstra LM|date=January 2021|title=Real-life validation of the Panbio™ COVID-19 antigen rapid test (Abbott) in community-dwelling subjects with symptoms of potential SARS-CoV-2 infection|journal=eClinicalMedicine|volume=31|article-number=100677|doi=10.1016/j.eclinm.2020.100677|pmc=7832943|pmid=33521610|doi-access=free | title-link=doi }}</ref> the United Kingdom,<ref>{{cite journal|display-authors=6|vauthors=Batra R, Olivieri LG, Rubin D, Vallari A, Pearce S, Olivo A, Prostko J, Nebbia G, Douthwaite S, Rodgers M, Cloherty G|date=November 2020|title=A comparative evaluation between the Abbott Panbio™ COVID-19 IgG/IgM rapid test device and Abbott Architect™ SARS CoV-2 IgG assay|journal=Journal of Clinical Virology|volume=132|article-number=104645|doi=10.1016/j.jcv.2020.104645|pmc=7493757|pmid=32961429}}</ref> and the US.<ref>{{cite journal|display-authors=6|vauthors=Basu A, Zinger T, Inglima K, Woo KM, Atie O, Yurasits L, See B, Aguero-Rosenfeld ME|date=July 2020|title=Performance of Abbott ID Now COVID-19 Rapid Nucleic Acid Amplification Test Using Nasopharyngeal Swabs Transported in Viral Transport Media and Dry Nasal Swabs in a New York City Academic Institution|journal=Journal of Clinical Microbiology|volume=58|issue=8|doi=10.1128/JCM.01136-20|pmc=7383552|pmid=32471894|doi-access=free | title-link=doi |article-number=e01136-20 }}</ref> These studies all enabled rapid tests to enter standard national COVID-19 testing strategies. Global piloting of rapid tests was now common place in schools in Canada,<ref>{{Cite web|date=23 December 2020|title=Rapid COVID-19 Testing Expands to Include Vulnerable Populations in Alberta|url=https://www.thestar.com/news/canada/2020/12/23/rapid-covid-19-testing-expands-to-include-vulnerable-populations-in-alberta.html|access-date=27 December 2020|website=thestar.com|archive-date=2 February 2022|archive-url=https://web.archive.org/web/20220202132855/https://www.thestar.com/news/canada/2020/12/23/rapid-covid-19-testing-expands-to-include-vulnerable-populations-in-alberta.html|url-status=live}}</ref> travel hubs in Indonesia,<ref>{{Cite web|last=CoconutsBali|date=22 December 2020|title=Passengers form long queues to take antigen rapid tests in Bali's Ngurah Rai Airport {{!}} Coconuts Bali|url=https://coconuts.co/bali/news/passengers-form-long-queues-to-take-antigen-rapid-tests-in-balis-ngurah-rai-airport/|access-date=27 December 2020|website=Coconuts|archive-date=14 November 2021|archive-url=https://web.archive.org/web/20211114133243/https://coconuts.co/bali/news/passengers-form-long-queues-to-take-antigen-rapid-tests-in-balis-ngurah-rai-airport/|url-status=live}}</ref> and across India.<ref>{{Cite web|date=28 June 2020|title=Mumbai: As 15-minutes rapid tests start this week, spike in cases expected|url=https://timesofindia.indiatimes.com/city/mumbai/mumbai-as-15-minutes-rapid-tests-start-this-week-spike-in-cases-expected/articleshow/76668423.cms|access-date=27 December 2020|vauthors=Pinto R, Iyer M|department=Mumbai News|newspaper=The Times of India|archive-date=25 September 2022|archive-url=https://web.archive.org/web/20220925211810/https://timesofindia.indiatimes.com/city/mumbai/mumbai-as-15-minutes-rapid-tests-start-this-week-spike-in-cases-expected/articleshow/76668423.cms|url-status=live}}</ref>

      Professor [[William A. Haseltine]] of Harvard said that "rapid, self-administered testing could stem the ever-surging tide of disease and death."<ref>{{Cite web|title=Even With A Vaccine, We Still Need Rapid Tests To End Covid-19|url=https://www.forbes.com/sites/williamhaseltine/2020/12/11/even-with-a-vaccine-we-still-need-rapid-tests-to-end-covid-19/|date=11 December 2020|access-date=4 July 2022|website=Forbes|vauthors=Haseltine WA|archive-date=14 November 2021|archive-url=https://web.archive.org/web/20211114135433/https://www.forbes.com/sites/williamhaseltine/2020/12/11/even-with-a-vaccine-we-still-need-rapid-tests-to-end-covid-19/|url-status=live}}</ref> However, further deployment of rapid tests as part of mass testing approaches in the US stalled as a result of the impasse around the $900 billion in COVID-19 relief contained within the [[Consolidated Appropriations Act, 2021]]. The bill was criticized for not specifically supporting COVID rapid self-tests.<ref>{{Cite web|title=9 Things You Need to Know About the $1.4 Trillion Fiscal Year 2021 Omnibus and $900 Billion COVID-19 Package|url=https://www.heritage.org/budget-and-spending/commentary/9-things-you-need-know-about-the-14-trillion-fiscal-year-2021|date=22 December 2020|access-date=4 July 2022|website=The Heritage Foundation|vauthors=Dickerson MD, Ditch D|archive-date=3 July 2022|archive-url=https://web.archive.org/web/20220703202108/https://www.heritage.org/budget-and-spending/commentary/9-things-you-need-know-about-the-14-trillion-fiscal-year-2021|url-status=unfit}}</ref> Meanwhile, the FDA authorized the Abbott BinaxNOW RAT "for prescription use at home."<ref name="FDAAbbott2020">{{Cite web|date=16 December 2020|title=Coronavirus (COVID-19) Update: FDA Issues New Authorization for the BinaxNOW COVID-19 Ag Card Home Test|url=https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-issues-new-authorization-binaxnow-covid-19-ag-card-home-test|access-date=4 July 2022|publisher=U.S. [[Food and Drug Administration]] (FDA)|archive-date=22 July 2022|archive-url=https://web.archive.org/web/20220722034750/https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-issues-new-authorization-binaxnow-covid-19-ag-card-home-test}}</ref><ref name="Wan2020">{{cite news|url=https://www.washingtonpost.com/health/2020/12/16/coronavirus-home-test-rapid/|title=How do home tests for coronavirus work? Where can I get one?|vauthors=Wan W|date=16 December 2020|access-date=4 July 2022|newspaper=[[The Washington Post]]|archive-date=3 December 2021|archive-url=https://web.archive.org/web/20211203082525/https://www.washingtonpost.com/health/2020/12/16/coronavirus-home-test-rapid/|url-status=live}}</ref> Subsequent approval was given for the first COVID-19 at-home RAT available without a prescription, by Ellume.<ref>{{Cite web|date=18 December 2020|title=Rapid at-home Covid-19 tests are finally here. Here's how they could help end the pandemic|url=https://www.vox.com/22178964/at-home-covid-tests-kit-rapid-ellume-abbott-lucira|access-date=4 July 2022|website=Vox|vauthors=Courage KH|archive-date=26 June 2022|archive-url=https://web.archive.org/web/20220626153320/https://www.vox.com/22178964/at-home-covid-tests-kit-rapid-ellume-abbott-lucira|url-status=live}}</ref>

      In the UK in December 2020, the [[Medicines and Healthcare products Regulatory Agency]] approved the Innova rapid test for self-testing of asymptomatic people.<ref name="Mahase2020">{{cite journal|vauthors=Mahase E|title=Covid-19: UK regulator approves lateral flow test for home use despite accuracy concerns|journal=BMJ|year=2020|volume=371|article-number=m4950|pmid=33361088|doi=10.1136/bmj.m4950|doi-access=free | title-link=doi }}</ref> The United Kingdom's chief clinical medic, Dr [[Susan Hopkins]], noted that rapid tests provided a means to find "people that...we couldn't otherwise find".<ref>{{Cite news|vauthors=Woodcock A|date=5 December 2020|title=Negative result in rapid Covid test is not green light to abandon social distancing, top medic warns|url=https://www.independent.co.uk/news/uk/politics/coronavirus-rapid-tests-susan-hopkins-b1766650.html|access-date=8 July 2022|work=The Independent|archive-date=8 July 2022|archive-url=https://web.archive.org/web/20220708034106/http://www.independent.co.uk/news/uk/politics/coronavirus-rapid-tests-susan-hopkins-b1766650.html|url-status=live}}</ref>

      Noting the ability to identify cases more rapidly, and considering the ensuing escalation in cases in Europe, the [[European Commission]] (EC) met in December 2020 and developed a common European framework for "use, validation and mutual recognition of rapid tests", committing 100 million euros for the purchase of tests from [[Hoffmann-La Roche|Roche]] and [[Abbott Laboratories|Abbott]].<ref name="EC2020">{{Cite web|title=Coronavirus: Commission puts forward rules on rapid antigen tests and secures 20 million tests for Member States|url=https://ec.europa.eu/commission/presscorner/detail/en/IP_20_2483|date=18 December 2020|access-date=8 July 2022|website=European Commission|archive-date=24 April 2021|archive-url=https://web.archive.org/web/20210424133356/https://ec.europa.eu/commission/presscorner/detail/en/IP_20_2483|url-status=live}}</ref> [[Stella Kyriakides]], commissioner for Health and Food Safety, said "Rapid antigen tests offer us speed, reliability and quick responses to isolate COVID cases. This is crucial to slow down the spread of the pandemic."<ref name="EC2020"/>

      ===2021===
      By January 2021, the [[Council of the European Union]] advocated greater use of rapid tests, noting that "should research prove that rapid antigen tests can be conducted by the testee themselves.... self-testing with or without professional guidance could also be considered."<ref name="EUCouncil2021">{{cite web|title=Council agrees on strengthening the use of rapid antigen tests and on the mutual recognition of COVID-19 test results|url=https://www.consilium.europa.eu/en/press/press-releases/2021/01/21/council-agrees-on-strengthening-the-use-of-rapid-antigen-tests-and-on-the-mutual-recognition-of-covid-19-test-results|date=21 January 2021|access-date=4 July 2022|publisher=Council of the European Union|archive-date=19 May 2021|archive-url=https://web.archive.org/web/20210519151644/https://www.consilium.europa.eu/en/press/press-releases/2021/01/21/council-agrees-on-strengthening-the-use-of-rapid-antigen-tests-and-on-the-mutual-recognition-of-covid-19-test-results/|url-status=live}}</ref> In the US, newly inaugurated US president [[Joe Biden]] released a national strategy for COVID-19 that pledged to "fund rapid test acquisition and distribution for priority populations, work to spur development and manufacturing of at-home tests and work to ensure that tests are widely available."<ref name="Biden2021">{{cite web |url=https://bidenwhitehouse.archives.gov/wp-content/uploads/2021/01/National-Strategy-for-the-COVID-19-Response-and-Pandemic-Preparedness.pdf |title=National Strategy for the COVID-19 Response and Pandemic Preparedness |vauthors=Biden JR Jr |date=21 January 2021 |publisher=White House |access-date=4 July 2022 |archive-date=9 July 2022 |archive-url=https://web.archive.org/web/20220709165947/https://www.whitehouse.gov/wp-content/uploads/2021/01/National-Strategy-for-the-COVID-19-Response-and-Pandemic-Preparedness.pdf |url-status=live }}</ref> In March 2021, the US FDA authorized the Abbott BinaxNOW RAT and the Quidel QuickVue RAT for use at home without a prescription.<ref name="FDAOTC2021">{{Cite web|date=31 March 2021|title=Coronavirus (COVID-19) Update: FDA Continues to Advance Over-the Counter and Other Screening Test Development|url=https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-continues-advance-over-counter-and-other-screening-test-development|access-date=4 July 2022|publisher=U.S. [[Food and Drug Administration]] (FDA)|archive-date=3 July 2022|archive-url=https://web.archive.org/web/20220703094248/https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-continues-advance-over-counter-and-other-screening-test-development/}}</ref>

      Innova voluntarily launched a [[FDA recall policies#Class I|Class I recall]] in the US of more than 77,000 of its RATs in April 2021.<ref name="FDAInnova2021">{{Cite web|date=10 June 2021|title=Stop Using Innova SARS-CoV-2 Antigen Rapid Qualitative Test: FDA Safety Communication|url=https://www.fda.gov/medical-devices/safety-communications/stop-using-innova-sars-cov-2-antigen-rapid-qualitative-test-fda-safety-communication|publisher=U.S. [[Food and Drug Administration]] (FDA)|access-date=4 July 2022|archive-date=25 June 2021|archive-url=https://web.archive.org/web/20210625191954/https://www.fda.gov/medical-devices/safety-communications/stop-using-innova-sars-cov-2-antigen-rapid-qualitative-test-fda-safety-communication}}</ref> Two months later, the FDA warned Americans to stop using the test because it had "significant concerns that the performance of the test has not been adequately established."<ref name="FDAInnova2021"/> A week after the FDA's warning about the Innova test, UK's [[Medicines and Healthcare products Regulatory Agency]] (MHRA) cleared the rapid diagnostic's use and extended its authorization.<ref name="Hale2021">{{Cite web|vauthors=Hale C|title=U.K. doubles down on Innova's rapid COVID-19 test, after FDA urged users to throw it away|url=https://www.fiercebiotech.com/medtech/u-k-doubles-down-use-rapid-covid-test-after-fda-urged-users-to-throw-it-away|date=18 June 2021|publisher=FierceBiotech|access-date=4 July 2022|archive-date=3 July 2022|archive-url=https://web.archive.org/web/20220703153109/https://www.fiercebiotech.com/medtech/u-k-doubles-down-use-rapid-covid-test-after-fda-urged-users-to-throw-it-away|url-status=live}}</ref>

      In October 2021, the [[World Health Organization]] (WHO) updated its interim guidance on Ag-RDTs.<ref name="WHO2021"/> Among other changes, the 2021 WHO interim guidance included updated information on test performance, uses selection, and storage.<ref name="WHO2021"/> Also in October 2021, Ellume recalled more than 2.2 million of its home tests because of "higher-than-acceptable false positive test results for SARS-CoV-2".<ref name="FDAEllume2021">{{Cite web|date=16 November 2021|title=Ellume Recalls COVID-19 Home Test for Potential False Positive SARS-CoV-2 Test Results|url=https://www.fda.gov/medical-devices/medical-device-recalls/ellume-recalls-covid-19-home-test-potential-false-positive-sars-cov-2-test-results|publisher=U.S. [[Food and Drug Administration]] (FDA)|access-date=4 July 2022|archive-date=7 July 2022|archive-url=https://web.archive.org/web/20220707165443/https://www.fda.gov/medical-devices/medical-device-recalls/ellume-recalls-covid-19-home-test-potential-false-positive-sars-cov-2-test-results}}</ref>

      In December 2021, US president Biden announced that the government planned to purchase and distribute for free 500 million at-home COVID-19 RATs.<ref name="NPR2021">{{cite news|vauthors=Diaz J, Naylor B|date=21 December 2021|title=Biden announces free tests and defends the White House response as COVID cases surge|url=https://www.npr.org/2021/12/21/1066167265/biden-to-announce-free-covid-tests-more-aid-for-hospitals-to-deal-with-omicron|work=National Public Radio|location=Washington, D.C.|access-date=4 July 2022|archive-date=12 July 2022|archive-url=https://web.archive.org/web/20220712151007/https://www.npr.org/2021/12/21/1066167265/biden-to-announce-free-covid-tests-more-aid-for-hospitals-to-deal-with-omicron|url-status=live}}</ref> In response, Dr [[Leana Wen]] was quoted as saying that the number of tests "does not come even close to what's needed."<ref name="NPR2021"/>

      ===2022===
      US president Biden announced in January 2022 the purchase of 500 million additional RATs for free distribution.<ref name="NPR2022">{{cite news|vauthors=Naylor B|date=14 January 2022|title=You'll be able to order free at-home COVID test kits starting on Wednesday|url=https://www.npr.org/2022/01/13/1072730868/biden-announces-plans-to-buy-500-million-more-covid-tests-and-to-offer-free-mask|work=National Public Radio|location=Washington, D.C.|access-date=4 July 2022|archive-date=6 July 2022|archive-url=https://web.archive.org/web/20220706054651/https://www.npr.org/2022/01/13/1072730868/biden-announces-plans-to-buy-500-million-more-covid-tests-and-to-offer-free-mask|url-status=live}}</ref> In March 2022, the [[World Health Organization]] (WHO) issued interim guidance on self-testing with Ag-RDTs.<ref name="WHO2022"/> The WHO made a strong recommendation that COVID-19 Ag-RDT self-testing "should be offered in addition to professionally administered testing services."<ref name="WHO2022"/> An April 2022 warning from the US FDA concerned two counterfeit at-home COVID-19 RATs.<ref name="FDA2022">{{cite web|url=https://www.fda.gov/medical-devices/coronavirus-covid-19-and-medical-devices/counterfeit-home-otc-covid-19-diagnostic-tests|title=Counterfeit At-Home OTC COVID-19 Diagnostic Tests|date=29 April 2022|publisher=U.S. [[Food and Drug Administration]] (FDA)|access-date=4 July 2022|archive-date=6 July 2022|archive-url=https://web.archive.org/web/20220706054651/https://www.fda.gov/medical-devices/coronavirus-covid-19-and-medical-devices/counterfeit-home-otc-covid-19-diagnostic-tests}}</ref>

      ===2024===
      In October 2024, the US [[Food and Drug Administration]] granted marketing authorization for the Healgen Rapid Check COVID-19/Flu A&B Antigen Test.<ref name="FDA PR 202401007" /> The test, authorized for use without a prescription, is for use by individuals experiencing respiratory symptoms and uses a nasal swab sample to deliver at-home results in approximately 15 minutes for COVID-19 and influenza (flu).<ref name="FDA PR 202401007" /> The test detects proteins from both SARS-CoV-2 (the virus that causes COVID-19) and influenza A and B (the viruses that causes flu).<ref name="FDA PR 202401007" /> This is the first over-the-counter (OTC) test that can detect influenza to be granted marketing authorization using a traditional premarket review pathway, which enables the test to be marketed in the absence of an applicable emergency use declaration.<ref name="FDA PR 202401007" /> Other OTC flu/COVID tests are available under emergency use authorization.<ref name="FDA PR 202401007">{{cite press release | title=FDA Authorizes Marketing of First Home Flu and COVID-19 Combination Test Outside of Emergency Use Authorities | publisher=U.S. [[Food and Drug Administration]] (FDA) | date=1 October 2024 | url=https://www.fda.gov/news-events/press-announcements/fda-authorizes-marketing-first-home-flu-and-covid-19-combination-test-outside-emergency-use | access-date=8 October 2024 | archive-date=8 October 2024 | archive-url=https://web.archive.org/web/20241008053538/https://www.fda.gov/news-events/press-announcements/fda-authorizes-marketing-first-home-flu-and-covid-19-combination-test-outside-emergency-use }} {{PD-notice}}</ref>

      == Economic aspects ==
      === Costs and cost-effectiveness ===
      In late 2020, it was noted that in the US RATs cost [[US$]]5-$23, in contrast with PCR tests which cost at least $75.<ref name="Rubin2020"/> In a Danish study published in 2021, RATs cost about $5.70 per test, as opposed to PCRs at $10.80 per test.<ref name="Jakobsen2021">{{cite journal | vauthors= Jakobsen KK, Jensen JS, Todsen T, Tolsgaard MG, Kirkby N, Lippert F, et al | title= Accuracy and cost description of rapid antigen test compared with reverse transcriptase-polymerase chain reaction for SARS-CoV-2 detection | journal= Dan Med J | year= 2021 | volume= 68 | issue= 7 | pages= A03210217 | pmid= 34169830 | url= https://ugeskriftet.dk/dmj/accuracy-and-cost-description-rapid-antigen-test-compared-reverse-transcriptase-polymerase-chain | access-date= 10 July 2022 | archive-date= 1 December 2022 | archive-url= https://web.archive.org/web/20221201000746/https://ugeskriftet.dk/dmj/accuracy-and-cost-description-rapid-antigen-test-compared-reverse-transcriptase-polymerase-chain | url-status= live }}</ref> A 2021 study from Germany found that monitoring health care workers exposed to COVID-19 with RATs saves money compared with sending them into quarantine.<ref name="Diel2021">{{cite journal|vauthors=Diel R, Hittel N, Nienhaus A| title=Point-of-Care COVID-19 Antigen Testing in Exposed German Healthcare Workers-A Cost Model | journal=Int J Environ Res Public Health | year= 2021 | volume= 18 | issue= 20 | article-number= 10767 | pmid=34682514 | doi=10.3390/ijerph182010767 | pmc=8536062 |doi-access=free | title-link=doi }}</ref> A 2021 study concluded that if the US is willing to pay $100,000 per [[Years of potential life lost|year of life lost]] averted, then weekly or monthly testing of the population using RATs is likely to be [[Cost-effectiveness analysis|cost-effective]].<ref name="pmid33549196">{{cite journal| vauthors=Du Z, Pandey A, Bai Y, Fitzpatrick MC, Chinazzi M, Pastore y Piontti A, et al|title=Comparative cost-effectiveness of SARS-CoV-2 testing strategies in the USA: a modelling study | journal=Lancet Public Health | year= 2021 | volume= 6 | issue= 3 | pages= e184–e191 | pmid=33549196 | doi=10.1016/S2468-2667(21)00002-5 | pmc=7862022 |doi-access=free | title-link=doi }}</ref> Another 2021 study estimated [[incremental cost-effectiveness ratio]]s of "$7890 per infection averted and $1 430 000 per death averted" if weekly screening with home-based RATs were performed in the entire US population over a 60-day period.<ref name="Paltiel2021">{{cite journal|vauthors=Paltiel AD, Zheng A, Sax PE| title=Clinical and Economic Effects of Widespread Rapid Testing to Decrease SARS-CoV-2 Transmission | journal=Ann Intern Med | year= 2021 | volume= 174 | issue= 6 | pages= 803–810 | pmid=33683930 | doi=10.7326/M21-0510 | pmc=9317280 |doi-access=free | title-link=doi }}</ref>

      === Global market value ===
      Estimates of value of the worldwide market for RATs vary. One estimate was that the market size was $28 billion in 2021 with a [[compound annual growth rate]] (CAGR) of -21.7%, leading to a size of $14 billion in 2028.<ref name="MarketReportsWorld2022">{{cite web |url= https://www.marketreportsworld.com/global-covid-19-rapid-antigen-test-kits-market-21059402 |title= Global COVID-19 Rapid Antigen Test Kits Market Research Report 2022 |date= 10 June 2022 |publisher= Market Reports World |access-date= 10 July 2022 |archive-date= 19 February 2023 |archive-url= https://web.archive.org/web/20230219234704/https://www.marketreportsworld.com/global-covid-19-rapid-antigen-test-kits-market-21059402 |url-status= live }}</ref> A second estimate suggested that the market value was $4.6 billion in 2021, with a CAGR of -26.3%, leading to a value of $743 million in 2027.<ref name="Arizton2022">{{cite web |url= https://www.arizton.com/market-reports/covid-19-rapid-antigen-test-kit-market |title= COVID-19 Rapid Antigen Test Kits Market - Global Outlook & Forecast 2022-2027 |date= June 2022 |publisher= Arizton Advisory & Intelligence |access-date= 10 July 2022 |archive-date= 10 July 2022 |archive-url= https://web.archive.org/web/20220710233516/https://www.arizton.com/market-reports/covid-19-rapid-antigen-test-kit-market |url-status= live }}</ref> A third estimate found a value of $5.3 billion in 2020, which was "anticipated to grow with a healthy growth rate of more than 6.7% over the forecast period 2021-2027."<ref name="MarketStudyReport2021">{{cite web |url=https://www.marketstudyreport.com/reports/global-covid-19-antigen-test-market-size-research |title=Global COVID-19 Antigen Test Market Size study, by Product & Service (Platforms, Reagents & Kits and Services), by End-Use (Clinics & Hospitals, Home Care, Diagnostic Labs and Others) and Regional Forecasts 2021–2027 |date=17 July 2021 |publisher=Market Study Report |access-date=10 July 2022 |archive-date=15 August 2022 |archive-url=https://web.archive.org/web/20220815044715/https://www.marketstudyreport.com/reports/global-covid-19-antigen-test-market-size-research }}</ref>

