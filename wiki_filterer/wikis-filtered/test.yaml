      === Virology ===
      {{Main|SARS-CoV-2}}
      [[File:Coronavirus virion structure.svg|thumb|Illustration of [[SARSr-CoV]] [[virus|virion]]]]
      Severe acute respiratory syndrome coronavirus{{spaces}}2 (SARS-CoV-2) is a [[novel virus|novel]] severe acute respiratory syndrome coronavirus. It was first isolated from three people with pneumonia connected to the [[disease cluster|cluster]] of acute respiratory illness cases in Wuhan.<ref name="ECDC risk assessment">{{#invoke:Cite|web|url=https://www.ecdc.europa.eu/sites/default/files/documents/SARS-CoV-2-risk-assessment-14-feb-2020.pdf |title=Outbreak of severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2): increased transmission beyond China – fourth update |publisher=European Centre for Disease Prevention and Control |date=14 February 2020 |access-date=8 March 2020}}</ref> All structural features of the novel SARS-CoV-2 virus particle occur in related [[coronavirus]]es in nature,<ref name="NM-20200317" /> particularly in ''[[Rhinolophus sinicus]]'' (Chinese horseshoe bats).<ref name="zhou20">{{#invoke:Cite|journal |doi=10.1038/s41586-020-2012-7|title=A pneumonia outbreak associated with a new coronavirus of probable bat origin |year=2020 |last1=Zhou |first1=Peng |last2=Yang |first2=Xing-Lou |last3=Wang |first3=Xian-Guang |last4=Hu |first4=Ben |last5=Zhang |first5=Lei |last6=Zhang |first6=Wei |last7=Si |first7=Hao-Rui |last8=Zhu |first8=Yan |last9=Li |first9=Bei |last10=Huang |first10=Chao-Lin |last11=Chen |first11=Hui-Dong |last12=Chen |first12=Jing |last13=Luo |first13=Yun |last14=Guo |first14=Hua |last15=Jiang |first15=Ren-Di |last16=Liu |first16=Mei-Qin |last17=Chen |first17=Ying |last18=Shen |first18=Xu-Rui |last19=Wang |first19=Xi |last20=Zheng |first20=Xiao-Shuang |last21=Zhao |first21=Kai |last22=Chen |first22=Quan-Jiao |last23=Deng |first23=Fei |last24=Liu |first24=Lin-Lin |last25=Yan |first25=Bing |last26=Zhan |first26=Fa-Xian |last27=Wang |first27=Yan-Yi |last28=Xiao |first28=Geng-Fu |last29=Shi |first29=Zheng-Li |journal=Nature |volume=579 |issue=7798 |pages=270–273 |pmid=32015507 |pmc=7095418 |bibcode=2020Natur.579..270Z }}</ref>

      Outside the human body, the virus is destroyed by household soap which bursts its [[viral envelope|protective bubble]].<ref name="NatGeoSoap">{{#invoke:Cite|web|url=https://www.nationalgeographic.com/science/2020/03/why-soap-preferable-bleach-fight-against-coronavirus/ |vauthors=Gibbens S |title=Why soap is preferable to bleach in the fight against coronavirus |date=18 March 2020 |website=[[National Geographic]] |url-status=live |archive-url=https://web.archive.org/web/20200402001042/https://www.nationalgeographic.com/science/2020/03/why-soap-preferable-bleach-fight-against-coronavirus/ |archive-date=2 April 2020 |access-date=2 April 2020}}</ref> Hospital disinfectants, alcohols, heat, [[povidone-iodine]], and [[ultraviolet]]-C (UV-C) irradiation are also effective disinfection methods for surfaces.<ref>{{#invoke:Cite|journal |last1=Viana Martins |first1=C. P. |last2=Xavier |first2=C. S. F. |last3=Cobrado |first3=L. |date=2022 |title=Disinfection methods against SARS-CoV-2: a systematic review |url= |journal=The Journal of Hospital Infection |volume=119 |pages=84–117 |doi=10.1016/j.jhin.2021.07.014 |issn=1532-2939 |pmc=8522489 |pmid=34673114}}</ref>

      SARS-CoV-2 is closely related to the original [[SARS-CoV]].<ref name="Zhu24Jan2020">{{#invoke:Cite|journal |vauthors=Zhu N, Zhang D, Wang W, Li X, Yang B, Song J, Zhao X, Huang B, Shi W, Lu R, Niu P, Zhan F, Ma X, Wang D, Xu W, Wu G, Gao GF, Tan W |title=A Novel Coronavirus from Patients with Pneumonia in China, 2019 |journal=The New England Journal of Medicine |volume=382 |issue=8 |pages=727–733 |date=February 2020 |pmid=31978945 |pmc=7092803 |doi=10.1056/NEJMoa2001017}}</ref> It is thought to have an animal ([[zoonosis|zoonotic]]) origin. Genetic analysis has revealed that the coronavirus genetically clusters with the genus ''[[Betacoronavirus]]'', in subgenus ''[[severe acute respiratory syndrome–related coronavirus|Sarbecovirus]]'' (lineage B) together with two bat-derived strains. It is 96% identical at the whole [[genome]] level to other bat coronavirus samples (BatCov [[RaTG13]]).<ref name="WHOReport24Feb2020">{{#invoke:Cite|report |url=https://www.who.int/docs/default-source/coronaviruse/who-china-joint-mission-on-covid-19-final-report.pdf |title=Report of the WHO-China Joint Mission on Coronavirus Disease 2019 (COVID-19) |date=February 2020 |publisher=[[World Health Organization]] (WHO) |access-date=21 March 2020 |archive-url=https://web.archive.org/web/20200229221222/https://www.who.int/docs/default-source/coronaviruse/who-china-joint-mission-on-covid-19-final-report.pdf |archive-date=29 February 2020 |url-status=live}}</ref><ref>{{#invoke:Cite|web| title=Report of the WHO-China Joint Mission on Coronavirus Disease 2019 (COVID-19) | publisher=[[World Health Organization]] (WHO) | url=https://www.who.int/publications/i/item/report-of-the-who-china-joint-mission-on-coronavirus-disease-2019-(covid-19) | access-date=25 January 2022}}</ref><ref name="RathoreSingh">{{#invoke:Cite|journal | vauthors = Rathore JS, Ghosh C | title = Severe acute respiratory syndrome coronavirus-2 (SARS-CoV-2), a newly emerged pathogen: an overview | journal = Pathogens and Disease | volume = 78 | issue = 6 | date = August 2020 | pmid = 32840560 | pmc = 7499575 | doi = 10.1093/femspd/ftaa042 | oclc = 823140442 | doi-access = free | title-link = doi | article-number = ftaa042 }}</ref> The structural proteins of SARS-CoV-2 include [[coronavirus membrane protein|membrane glycoprotein]] (M), [[coronavirus envelope protein|envelope protein]] (E), [[coronavirus nucleocapsid protein|nucleocapsid protein]] (N), and the [[coronavirus spike protein|spike protein]] (S). The M protein of SARS-CoV-2 is about 98% similar to the M protein of bat SARS-CoV, maintains around 98% homology with pangolin SARS-CoV, and has 90% homology with the M protein of SARS-CoV; whereas, the similarity is only around 38% with the M protein of [[MERS-CoV]].<ref>{{#invoke:Cite|journal | vauthors = Thomas S | title = The Structure of the Membrane Protein of SARS-CoV-2 Resembles the Sugar Transporter SemiSWEET | journal = Pathogens & Immunity | volume = 5 | issue = 1 | pages = 342–363 | date = October 2020 | pmid = 33154981 | pmc = 7608487 | doi = 10.20411/pai.v5i1.377 }}</ref>

      === SARS-CoV-2 variants ===
      {{Main|Variants of SARS-CoV-2}}
      The many thousands of SARS-CoV-2 variants are grouped into either [[clade]]s or [[lineage (evolution)|lineage]]s.<ref>{{#invoke:Cite|journal |vauthors = Koyama T, Platt D, Parida L |title=Variant analysis of SARS-CoV-2 genomes |journal=Bulletin of the World Health Organization |volume=98 |issue=7 |pages=495–504 |date=July 2020 |pmid=32742035 |pmc=7375210 |doi=10.2471/BLT.20.253591 |quote=We detected in total 65776 variants with 5775 distinct variants.}}</ref><ref name="Rambaut-2020"/> The WHO, in collaboration with partners, expert networks, national authorities, institutions and researchers, have established nomenclature systems for naming and tracking SARS-CoV-2 genetic lineages by [[GISAID]], [[Nextstrain]] and [[Phylogenetic Assignment of Named Global Outbreak Lineages|Pango]]. The expert group convened by the WHO recommended the labelling of variants using letters of the [[Greek alphabet]], for example, [[SARS-CoV-2 Alpha variant|Alpha]], [[SARS-CoV-2 Beta variant|Beta]], [[SARS-CoV-2 Delta variant|Delta]], and [[SARS-CoV-2 Gamma variant|Gamma]], giving the justification that they "will be easier and more practical to discussed by non-scientific audiences".<ref>{{#invoke:Cite|web|date=1 July 2021|title=Tracking SARS-CoV-2 variants|url=https://www.who.int/activities/tracking-SARS-CoV-2-variants|access-date=5 July 2021|website=[[World Health Organization]] (WHO) }}</ref> Nextstrain divides the variants into five clades (19A, 19B, 20A, 20B, and 20C), while GISAID divides them into seven (L, O, V, S, G, GH, and GR).<ref name="Alm2020Aug">{{#invoke:Cite|journal |vauthors=Alm E, Broberg EK, Connor T, Hodcroft EB, Komissarov AB, Maurer-Stroh S, Melidou A, Neher RA, O'Toole Á, Pereyaslov D |title=Geographical and temporal distribution of SARS-CoV-2 clades in the WHO European Region, January to June 2020 |journal=Euro Surveillance |volume=25 |issue=32 |date=August 2020 |pmid=32794443 |pmc=7427299 |doi=10.2807/1560-7917.ES.2020.25.32.2001410}}</ref> The Pango tool groups variants into lineages, with many circulating lineages being classed under the B.1 lineage.<ref name="Rambaut-2020">{{#invoke:Cite|journal |vauthors=Rambaut A, Holmes EC, O'Toole Á, Hill V, McCrone JT, Ruis C, du Plessis L, Pybus OG |title=A dynamic nomenclature proposal for SARS-CoV-2 lineages to assist genomic epidemiology |journal=Nature Microbiology |volume=5 |issue=11 |pages=1403–1407 |date=November 2020 |pmid=32669681 |pmc=7610519 |doi=10.1038/s41564-020-0770-5 |bibcode=2020NatMb...5.1403R }}</ref><ref>{{#invoke:Cite|web|title=PANGO lineages|url=https://cov-lineages.org/pango_lineages.html|access-date=9 May 2021|website=cov-lineages.org|archive-date=10 May 2021|archive-url=https://web.archive.org/web/20210510111318/https://cov-lineages.org/pango_lineages.html}}</ref>

      Several notable variants of SARS-CoV-2 emerged throughout 2020.<ref name="Lauring Hodcroft 2021 pp. 529–531">{{#invoke:Cite|journal |vauthors=Lauring AS, Hodcroft EB |title=Genetic Variants of SARS-CoV-2-What Do They Mean? |journal=JAMA |volume=325 |issue=6 |pages=529–531 |date=February 2021 |pmid=33404586 |s2cid=230783233 |doi=10.1001/jama.2020.27124 |doi-access=free |title-link=doi |bibcode=2021JAMA..325..529L }}</ref><ref name="Abdool Karim de Oliveira pp. 1866–1868">{{#invoke:Cite|journal |vauthors=Abdool Karim SS, de Oliveira T |title=New SARS-CoV-2 Variants – Clinical, Public Health, and Vaccine Implications |journal=The New England Journal of Medicine |volume=384 |issue=19 |pages=1866–1868 |date=May 2021 |pmid=33761203 |doi=10.1056/nejmc2100362| issn=0028-4793 |publisher=Massachusetts Medical Society |pmc=8008749}}</ref> [[Cluster 5]] emerged among [[mink]]s and mink farmers in [[Denmark]].<ref>{{#invoke:Cite|journal |vauthors=Mallapaty S |title=COVID mink analysis shows mutations are not dangerous – yet |journal=Nature |volume=587 |issue=7834 |pages=340–341 |date=November 2020 |pmid=33188367 |doi=10.1038/d41586-020-03218-z |doi-access=free |s2cid=226947606 |bibcode=2020Natur.587..340M}}</ref> After [[COVID-19 pandemic in Denmark|strict quarantines]] and the [[2020 Danish mink cull|slaughter of all the country's mink]], the cluster was assessed to no longer be circulating among humans in Denmark as of 1 February 2021.<ref>{{#invoke:Cite|journal |vauthors=Larsen HD, Fonager J, Lomholt FK, Dalby T, Benedetti G, Kristensen B, Urth TR, Rasmussen M, Lassaunière R, Rasmussen TB, Strandbygaard B, Lohse L, Chaine M, Møller KL, Berthelsen AN, Nørgaard SK, Sönksen UW, Boklund AE, Hammer AS, Belsham GJ, Krause TG, Mortensen S, Bøtner A, Fomsgaard A, Mølbak K |title=Preliminary report of an outbreak of SARS-CoV-2 in mink and mink farmers associated with community spread, Denmark, June to November 2020 |journal=Euro Surveillance |volume=26 |issue=5 |article-number=2100009 |date=February 2021 |pmid=33541485 |pmc=7863232 |doi=10.2807/1560-7917.ES.2021.26.5.210009 |quote=As at 1 February 2021, we assess that the cluster 5 variant is no longer circulating among humans in Denmark.}}</ref>

      {{as of|2021|12}}, there are five dominant variants of SARS-CoV-2 spreading among global populations: the [[SARS-CoV-2 Alpha variant|Alpha variant]] (B.1.1.7, formerly called the UK variant), first found in London and Kent, the [[SARS-CoV-2 Beta variant|Beta variant]] (B.1.351, formerly called the South Africa variant), the [[SARS-CoV-2 Gamma variant|Gamma variant]] (P.1, formerly called the Brazil variant), the [[SARS-CoV-2 Delta variant|Delta variant]] (B.1.617.2, formerly called the India variant),<ref>{{#invoke:Cite|web|title=New COVID-19 Variants|url=https://www.cdc.gov/coronavirus/2019-ncov/transmission/variant.html|access-date=15 July 2021|website=U.S. [[Centers for Disease Control and Prevention]] (CDC)|date=28 June 2021|orig-date=First published 11 February 2020}}</ref> and the [[SARS-CoV-2 Omicron variant|Omicron variant]] (B.1.1.529), which had spread to 57 countries as of 7 December.<ref>{{#invoke:Cite|web|url=https://www.who.int/publications/m/item/weekly-epidemiological-update-on-covid-19---7-december-2021 |title=COVID-19 Weekly Epidemiological Update Edition 69 |website=[[World Health Organization]] (WHO) |date=7 December 2021}}</ref><ref>{{#invoke:Cite|web|title=Classification of Omicron (B.1.1.529): SARS-CoV-2 Variant of Concern |url=https://www.who.int/news/item/26-11-2021-classification-of-omicron-(b.1.1.529)-sars-cov-2-variant-of-concern |access-date=9 December 2021 |website=[[World Health Organization]] (WHO)}}</ref>

      On 19 December 2023, the WHO declared that another distinctive variant, JN.1, had emerged as a "variant of interest". Though the WHO expected an increase in cases globally, particularly for countries entering winter, the overall global health risk was considered low.<ref>{{#invoke:Cite|web |author-link=World Health Organization |date=19 December 2023 |title=JN.1 |url=https://www.who.int/docs/default-source/coronaviruse/18122023_jn.1_ire_clean.pdf?sfvrsn=6103754a_3 |access-date=21 December 2023}}</ref><ref>{{#invoke:Cite|web |last=Benadjaoud |first=Youri |date=2023-12-19 |title=COVID variant JN.1 listed as 'variant of interest' by World Health Organization |url=https://abcnews.go.com/Health/covid-variant-jn1-listed-variant-interest-world-health/story?id=105782742 |access-date=2023-12-22 |website=ABC News }}</ref>

      == Pathophysiology ==
      [[File:Fpubh-08-00383-g003.jpg|thumb|COVID‑19 [[pathogenesis]]]]
      The SARS-CoV-2 virus can infect a wide range of cells and systems of the body. COVID‑19 is most known for affecting the upper respiratory tract (sinuses, nose, and throat) and the lower respiratory tract (windpipe and lungs).<ref name="pmid33132005">{{#invoke:Cite|journal | vauthors = Harrison AG, Lin T, Wang P | title = Mechanisms of SARS-CoV-2 Transmission and Pathogenesis | journal = Trends in Immunology | volume = 41 | issue = 12 | pages = 1100–1115 | date = December 2020 | pmid = 33132005 | pmc = 7556779 | doi = 10.1016/j.it.2020.10.004 }}</ref> The lungs are the organs most affected by COVID‑19 because the virus accesses host cells via the [[receptor (biochemistry)|receptor]] for the enzyme [[angiotensin-converting enzyme 2]] (ACE2), which is most abundant on the surface of [[type II cell|type II alveolar cell]]s of the lungs.<ref>{{#invoke:Cite|journal | vauthors = Verdecchia P, Cavallini C, Spanevello A, Angeli F | title = The pivotal link between ACE2 deficiency and SARS-CoV-2 infection | journal = European Journal of Internal Medicine | volume = 76 | pages = 14–20 | date = June 2020 | pmid = 32336612 | pmc = 7167588 | doi = 10.1016/j.ejim.2020.04.037 }}</ref> The virus uses a special surface glycoprotein called a "[[coronavirus spike protein|spike]]" to connect to the ACE2 receptor and enter the host cell.<ref name="Nature Microbiology">{{#invoke:Cite|journal | vauthors = Letko M, Marzi A, Munster V | title = Functional assessment of cell entry and receptor usage for SARS-CoV-2 and other lineage B betacoronaviruses | journal = Nature Microbiology | volume = 5 | issue = 4 | pages = 562–569 | date = April 2020 | pmid = 32094589 | pmc = 7095430 | doi = 10.1038/s41564-020-0688-y | doi-access = free | title-link = doi }}</ref>

      === Respiratory tract ===
      Following viral entry, COVID‑19 infects the ciliated epithelium of the nasopharynx and upper airways.<ref>{{#invoke:Cite|journal | vauthors = Marik PE, Iglesias J, Varon J, Kory P | title = A scoping review of the pathophysiology of COVID-19 | journal = International Journal of Immunopathology and Pharmacology | volume = 35 | article-number = 20587384211048026 | date = January 2021 | pmid = 34569339 | pmc = 8477699 | doi = 10.1177/20587384211048026 }}</ref> Autopsies of people who died of COVID‑19 have found [[diffuse alveolar damage]], and lymphocyte-containing inflammatory infiltrates within the lung.<ref name="Cureus">{{#invoke:Cite|journal | vauthors = Eketunde AO, Mellacheruvu SP, Oreoluwa P | title = A Review of Postmortem Findings in Patients With COVID-19 | journal = Cureus | volume = 12 | issue = 7 | article-number = e9438 | date = July 2020 | pmid = 32864262 | pmc = 7451084 | doi = 10.7759/cureus.9438 | publisher = Cureus, Inc. | s2cid = 221352704 | doi-access = free | title-link = doi }}</ref>

      From the [[CT scan]]s of COVID-19 infected lungs, white patches were observed containing fluid known as [[ground-glass opacity]] (GGO) or simply ground glass.<ref>Ground glass opacities of the lung before, during and post COVID-19 pandemic - PMC (nih.gov)</ref> This tended to correlate with the clear jelly liquid found in lung autopsies of people who died of COVID-19. One possibility addressed in medical research is that [[Hyaluronic acid|hyuralonic acid]] (HA) could be the leading factor for this observation of the clear jelly liquid found in the lungs, in what could be hyuralonic storm, in conjunction with [[cytokine storm]].<ref>{{#invoke:Cite|journal |last1=Ontong |first1=Pawared |last2=Prachayasittikul |first2=Virapong |date=2021-01-15 |title=Unraveled roles of hyaluronan in severe COVID-19 |journal=EXCLI Journal |volume=20 |pages=117–125 |doi=10.17179/excli2020-3215 |issn=1611-2156 |pmc=7868638 |pmid=33564281}}</ref>

      === Nervous system ===
      {{See also|Clouding of consciousness}}
      One common symptom, loss of smell, results from [[impact of COVID-19 on neurological, psychological and other mental health outcomes|infection of the support cells of the olfactory epithelium]], with subsequent damage to the [[olfactory receptor neuron|olfactory neuron]]s.<ref name="Meunier-2020">{{#invoke:Cite|journal |vauthors = Meunier N, Briand L, Jacquin-Piques A, Brondel L, Pénicaud L |title = COVID 19-Induced Smell and Taste Impairments: Putative Impact on Physiology |journal = Frontiers in Physiology |volume = 11 |article-number = 625110 |date = June 2020 |pmid = 33574768 |pmc = 7870487 |doi = 10.3389/fphys.2020.625110 |doi-access = free |title-link = doi }}</ref> The involvement of both the central and peripheral nervous system in COVID‑19 has been reported in many medical publications.<ref name="Guerrero2020">{{#invoke:Cite|journal |vauthors = Guerrero JI, Barragán LA, Martínez JD, Montoya JP, Peña A, Sobrino FE, Tovar-Spinoza Z, Ghotme KA |title = Central and peripheral nervous system involvement by COVID-19: a systematic review of the pathophysiology, clinical manifestations, neuropathology, neuroimaging, electrophysiology, and cerebrospinal fluid findings |journal = BMC Infectious Diseases |date = June 2021 |volume = 21 |issue = 1 |article-number = 515 |doi = 10.1186/s12879-021-06185-6| pmid = 34078305 |pmc = 8170436 |doi-access=free |title-link=doi }}</ref> It is clear that many people with [[impact of COVID-19 on neurological, psychological and other mental health outcomes|COVID-19 exhibit neurological or mental health issues]]. The virus is not detected in the [[central nervous system]] (CNS) of the majority of people with COVID-19 who also have [[impact of the COVID-19 pandemic on neurological, psychological and other mental health outcomes|neurological issues]]. However, SARS-CoV-2 has been detected at low levels in the brains of those who have died from COVID‑19, but these results need to be confirmed.<ref name="Pezzini2020">{{#invoke:Cite|journal |vauthors = Pezzini A, Padovani A |title = Lifting the mask on neurological manifestations of COVID-19 |journal = Nature Reviews. Neurology |volume = 16 |issue = 11 |pages = 636–644 |date = November 2020 |pmid = 32839585 |pmc = 7444680 |doi = 10.1038/s41582-020-0398-3 }}</ref> While virus has been detected in [[cerebrospinal fluid]] of autopsies, the exact mechanism by which it invades the CNS remains unclear and may first involve invasion of peripheral nerves given the low levels of ACE2 in the brain.<ref>{{#invoke:Cite|journal |vauthors = Li YC, Bai WZ, Hashikawa T |title = The neuroinvasive potential of SARS-CoV2 may play a role in the respiratory failure of COVID-19 patients |journal = Journal of Medical Virology |volume = 92 |issue = 6 |pages = 552–555 |date = June 2020 |pmid = 32104915 |pmc = 7228394 |doi = 10.1002/jmv.25728 |title-link = doi |doi-access = free }}</ref><ref>{{#invoke:Cite|journal |vauthors = Baig AM, Khaleeq A, Ali U, Syeda H |title = Evidence of the COVID-19 Virus Targeting the CNS: Tissue Distribution, Host-Virus Interaction, and Proposed Neurotropic Mechanisms |journal = ACS Chemical Neuroscience |volume = 11 |issue = 7 |pages = 995–998 |date = April 2020 |pmid = 32167747 |pmc = 7094171 |doi= 10.1021/acschemneuro.0c00122 }}</ref><ref>{{#invoke:Cite|journal |vauthors = Yavarpour-Bali H, Ghasemi-Kasman M |title = Update on neurological manifestations of COVID-19 |journal = Life Sciences |volume = 257 |article-number = 118063 |date = September 2020 |pmid = 32652139 |pmc = 7346808 |doi = 10.1016/j.lfs.2020.118063 }}</ref> The virus may also enter the bloodstream from the lungs and cross the blood–brain barrier to gain access to the CNS, possibly within an infected white blood cell.<ref name="Pezzini2020" />
      [[File:Ijms-21-05932-g003.webp|thumb|[[Host tropism|Tropism]] and [[multiple organ dysfunction syndrome|multiple organ injuries]] in SARS-CoV-2 infection]] Research conducted when Alpha was the dominant variant has suggested COVID-19 may cause brain damage.<ref>{{#invoke:Cite|journal |last1=Douaud |first1=Gwenaëlle |last2=Lee |first2=Soojin |last3=Alfaro-Almagro |first3=Fidel |last4=Arthofer |first4=Christoph |last5=Wang |first5=Chaoyue |last6=McCarthy |first6=Paul |last7=Lange |first7=Frederik |last8=Andersson |first8=Jesper L. R. |last9=Griffanti |first9=Ludovica |last10=Duff |first10=Eugene |last11=Jbabdi |first11=Saad |last12=Taschler |first12=Bernd |last13=Keating |first13=Peter |last14=Winkler |first14=Anderson M. |last15=Collins |first15=Rory |last16=Matthews |first16= Paul M. |last17=Naomi |first17=Allen |last18=Miller |first18=Karla L. |last19=Nichols |first19=Thomas E. |last20=Smith |first20=Stephen M. |date=March 2022 |title=SARS-CoV-2 is associated with changes in brain structure in UK Biobank |journal=[[Nature (journal)|Nature]] |volume=604 |issue=7907 |pages=697–707 |doi=10.1038/s41586-022-04569-5 |issn=1476-4687 |lccn=12037118 |oclc=01586310 |pmc=9046077 |pmid=35255491 |bibcode=2022Natur.604..697D |doi-access=free}}</ref> Later research showed that all variants studied (including Omicron) killed brain cells, but the exact cells killed varied by variant.<ref>{{#invoke:Cite|journal |last1=Proust |first1=Alizé
      |last2= Queval|first2= Christophe J. |last3= Harvey|first3= Ruth |last4= Adams|first4= Lorin |last5= Bennett|first5= Michael |last6= Wilkinson |first6= Robert J.|date= 2023 |title= Differential effects of SARS-CoV-2 variants on central nervous system cells and blood–brain barrier functions|journal= Journal of Neuroinflammation |volume=20 |issue=184 |page=184
      |doi=10.1186/s12974-023-02861-3
      |pmid=37537664
      |pmc=10398935
      |doi-access=free
      }}</ref> It is unknown if such damage is temporary or permanent.<ref>{{#invoke:Cite|news |last1=Geddes |first1=Linda |last2=Sample |first2=Ian |date=7 March 2022 |title=Covid can shrink brain and damage its tissue, finds research |work=[[The Guardian]] |url=https://www.theguardian.com/world/2022/mar/07/covid-can-shrink-brain-and-damage-its-tissue-finds-research |url-status=live |access-date=4 September 2023 |archive-url=https://web.archive.org/web/20220307161107/https://www.theguardian.com/world/2022/mar/07/covid-can-shrink-brain-and-damage-its-tissue-finds-research |archive-date=7 March 2022}}</ref><ref>{{#invoke:Cite|news |last=Morelle |first=Rebecca |date=7 March 2022 |title=Scans reveal how Covid may change the brain |work=[[BBC News]] |publisher=[[BBC]] |url=https://www.bbc.com/news/health-60591487 |access-date=4 September 2023}}</ref> Observed individuals infected with COVID-19 (most with mild cases) experienced an additional 0.2% to 2% of brain tissue lost in regions of the brain connected to the sense of smell compared with uninfected individuals, and the overall effect on the brain was equivalent on average to at least one extra year of normal ageing; infected individuals also scored lower on several cognitive tests. All effects were more pronounced among older ages.<ref>{{#invoke:Cite|web|url=https://www.nbcnews.com/health/health-news/long-covid-even-mild-covid-linked-damage-brain-months-infection-rcna18959|title=Even mild Covid is linked to brain damage months after illness, scans show |date=7 March 2022 |publisher=NBC News}}</ref>

      === Gastrointestinal tract ===
      The virus also affects gastrointestinal organs as ACE2 is abundantly expressed in the [[gland]]ular cells of [[stomach|gastric]], [[duodenum|duodenal]] and [[rectum|rectal]] [[epithelium]]<ref name="Gu-2020">{{#invoke:Cite|journal | vauthors = Gu J, Han B, Wang J | title = COVID-19: Gastrointestinal Manifestations and Potential Fecal-Oral Transmission | journal = Gastroenterology | volume = 158 | issue = 6 | pages = 1518–1519 | date = May 2020 | pmid = 32142785 | pmc = 7130192 | doi = 10.1053/j.gastro.2020.02.054 }}</ref> as well as [[endothelium|endothelial]] cells and [[enterocyte]]s of the [[small intestine]].<ref name="pmid32343593">{{#invoke:Cite|journal | vauthors = Mönkemüller K, Fry L, Rickes S | title = COVID-19, coronavirus, SARS-CoV-2 and the small bowel | journal = Revista Española de Enfermedades Digestivas | volume = 112 | issue = 5 | pages = 383–388 | date = May 2020 | pmid = 32343593 | doi = 10.17235/reed.2020.7137/2020 | s2cid = 216645754 }}</ref>

      === Cardiovascular system ===
      The virus can cause [[myocardial infarction|acute myocardial injury]] and chronic damage to the [[circulatory system|cardiovascular system]].<ref>{{#invoke:Cite|journal | vauthors = Almamlouk R, Kashour T, Obeidat S, Bois MC, Maleszewski JJ, Omrani OA, Tleyjeh R, Berbari E, Chakhachiro Z, Zein-Sabatto B, Gerberi D, Tleyjeh IM, Paniz Mondolfi AE, Finn AV, Duarte-Neto AN, Rapkiewicz AV, Frustaci A, Keresztesi AA, Hanley B, Märkl B, Lardi C, Bryce C, Lindner D, Aguiar D, Westermann D, Stroberg E, Duval EJ, Youd E, Bulfamante GP, Salmon I, Auer J, Maleszewski JJ, Hirschbühl K, Absil L, Barton LM, Ferraz da Silva LF, Moore L, Dolhnikoff M, Lammens M, Bois MC, Osborn M, Remmelink M, Nascimento Saldiva PH, Jorens PG, Craver R, Aparecida de Almeida Monteiro R, Scendoni R, Mukhopadhyay S, Suzuki T, Mauad T, Fracasso T, Grimes Z | title = COVID-19-Associated cardiac pathology at the postmortem evaluation: a collaborative systematic review | journal = Clinical Microbiology and Infection | volume = 28 | issue = 8 | pages = 1066–1075 | date = August 2022 | pmid = 35339672 | pmc = 8941843 | doi = 10.1016/j.cmi.2022.03.021 }}</ref><ref name="Zheng-2020">{{#invoke:Cite|journal | vauthors = Zheng YY, Ma YT, Zhang JY, Xie X | title = COVID-19 and the cardiovascular system | journal = Nature Reviews. Cardiology | volume = 17 | issue = 5 | pages = 259–260 | date = May 2020 | pmid = 32139904 | pmc = 7095524 | doi = 10.1038/s41569-020-0360-5 }}</ref> An acute cardiac injury was found in 12% of infected people admitted to the hospital in Wuhan, China,<ref name="Huang24Jan2020" /> and is more frequent in severe disease.<ref>{{#invoke:Cite|web| title=Coronavirus disease 2019 (COVID-19): Myocardial infarction and other coronary artery disease issues | website=UpToDate | url=https://www.uptodate.com/contents/coronavirus-disease-2019-covid-19-myocardial-infarction-and-other-coronary-artery-disease-issues | access-date=28 September 2020}}</ref> Rates of cardiovascular symptoms are high, owing to the systemic inflammatory response and immune system disorders during disease progression, but acute myocardial injuries may also be related to ACE2 receptors in the heart.<ref name="Zheng-2020" /> ACE2 receptors are highly expressed in the heart and are involved in heart function.<ref name="Zheng-2020" /><ref>{{#invoke:Cite|journal | vauthors = Turner AJ, Hiscox JA, Hooper NM | title = ACE2: from vasopeptidase to SARS virus receptor | journal = Trends in Pharmacological Sciences | volume = 25 | issue = 6 | pages = 291–4 | date = June 2004 | pmid = 15165741 | pmc = 7119032 | doi = 10.1016/j.tips.2004.04.001 | doi-access = free | title-link = doi }}</ref>

      A high incidence of [[thrombosis]] and [[venous thromboembolism]] occurs in people transferred to [[intensive care unit]]s with COVID‑19 infections, and may be related to poor prognosis.<ref>{{#invoke:Cite|journal | vauthors = Abou-Ismail MY, Diamond A, Kapoor S, Arafah Y, Nayak L | title = The hypercoagulable state in COVID-19: Incidence, pathophysiology, and management | journal = Thrombosis Research | volume = 194 | pages = 101–115 | date = October 2020 | pmid = 32788101 | pmc = 7305763 | doi = 10.1016/j.thromres.2020.06.029 | publisher = Elsevier BV }}</ref> Blood vessel dysfunction and clot formation (as suggested by high [[D-dimer]] levels caused by blood clots) may have a significant role in mortality, incidents of clots leading to [[pulmonary embolism]]s, and [[stroke|ischaemic event]]s (strokes) within the brain found as complications leading to death in people infected with COVID‑19.<ref name=Science/> Infection may initiate a chain of [[vasoconstriction|vasoconstrictive response]]s within the body, including pulmonary vasoconstriction {{ndash}} a possible mechanism in which oxygenation decreases during pneumonia.<ref name="Science">{{#invoke:Cite|journal | vauthors = Wadman M |doi=10.1126/science.abc3208 |title=How does coronavirus kill? Clinicians trace a ferocious rampage through the body, from brain to toes |journal=Science |date=April 2020 |doi-access = free | title-link = doi }}</ref> Furthermore, damage of [[arterioles]] and [[capillaries]] was found in brain tissue samples of people who died from COVID‑19.<ref>{{#invoke:Cite|news |title=NIH study uncovers blood vessel damage and inflammation in COVID-19 patients' brains but no infection |url=https://www.nih.gov/news-events/news-releases/nih-study-uncovers-blood-vessel-damage-inflammation-covid-19-patients-brains-no-infection |access-date=17 January 2021 |work=National Institutes of Health (NIH) |date=30 December 2020 }}</ref><ref>{{#invoke:Cite|journal | vauthors = Lee MH, Perl DP, Nair G, Li W, Maric D, Murray H, Dodd SJ, Koretsky AP, Watts JA, Cheung V, Masliah E, Horkayne-Szakaly I, Jones R, Stram MN, Moncur J, Hefti M, Folkerth RD, Nath A | title = Microvascular Injury in the Brains of Patients with Covid-19 | journal = The New England Journal of Medicine | volume = 384 | issue = 5 | pages = 481–483 | date = February 2021 | pmid = 33378608 | pmc = 7787217 | doi = 10.1056/nejmc2033369 }}</ref>

      COVID{{nbhyph}}19 may also cause substantial structural changes to [[blood cell]]s, sometimes persisting for months after hospital discharge.<ref>{{#invoke:Cite|journal | vauthors = Kubánková M, Hohberger B, Hoffmanns J, Fürst J, Herrmann M, Guck J, Kräter M | title = Physical phenotype of blood cells is altered in COVID-19 | journal = Biophysical Journal | volume = 120 | issue = 14 | pages = 2838–2847 | date = July 2021 | pmid = 34087216 | pmc = 8169220 | doi = 10.1016/j.bpj.2021.05.025 | bibcode = 2021BpJ...120.2838K }}</ref> [[lymphopenia|A low level of blood lymphocytess]] may result from the virus acting through ACE2-related entry into lymphocytes.<ref>{{#invoke:Cite|journal| vauthors = Gupta A, Madhavan MV, Sehgal K, Nair N, Mahajan S, Sehrawat TS, Bikdeli B, Ahluwalia N, Ausiello JC, Wan EY, Freedberg DE, Kirtane AJ, Parikh SA, Maurer MS, Nordvig AS, Accili D, Bathon JM, Mohan S, Bauer KA, Leon MB, Krumholz HM, Uriel N, Mehra MR, Elkind MS, Stone GW, Schwartz A, Ho DD, Bilezikian JP, Landry DW |title=Extrapulmonary manifestations of COVID-19 |journal=Nature Medicine |date=July 2020 |volume=26 |issue=7 |pages=1017–1032 |doi=10.1038/s41591-020-0968-3|pmid=32651579 |s2cid=220462000 | doi-access=free | title-link=doi | pmc = 11972613 }}</ref>

      === Kidneys ===
      Another common cause of death is complications related to the [[kidney]]s.<ref name="Science" /> Early reports show that up to 30% of people hospitalised with COVID-19 both in China and in New York have experienced some injury to their kidneys, including some persons with no previous kidney problems.<ref>{{#invoke:Cite|web| title=Coronavirus: Kidney Damage Caused by COVID-19 | website=Johns Hopkins Medicine | date=14 May 2020 | url=https://www.hopkinsmedicine.org/health/conditions-and-diseases/coronavirus/coronavirus-kidney-damage-caused-by-covid19 | access-date=25 January 2022}}</ref>

      === Immunopathology ===
      [[File:Fimmu-11-579250-g003.jpg|thumb|Key components of the [[adaptive immune system|adaptive immune response]] to SARS-CoV-2]]
      Although SARS-CoV-2 has a tropism for ACE2-expressing epithelial cells of the respiratory tract, people with severe COVID‑19 have symptoms of systemic hyperinflammation. Clinical laboratory findings<!-- Spellings in this paragraph have been meticulously compared link-by-link; if you spot an error, please correct the other article first. --> of elevated [[interleukin 2|IL{{nbh}}2]], [[interleukin 6|IL{{nbh}}6]], [[interleukin 7|IL{{nbh}}7]], as well as the following suggest an underlying immunopathology:<ref name="Huang24Jan2020" />
      * [[Granulocyte-macrophage colony-stimulating factor]] (GM{{nbh}}CSF)
      * [[CXCL10|Interferon gamma-induced protein{{spaces}}10]] (IP{{nbh}}10)
      * [[monocyte chemoattractant protein-1|Monocyte chemoattractant protein{{spaces}}1]] (MCP1)
      * [[CCL3|Macrophage inflammatory protein 1{{nbh}}alpha]] (MIP{{nbh}}1{{nbh}}alpha)
      * [[Tumour necrosis factor]] (TNF{{nbh}}α) indicative of [[cytokine release syndrome]] (CRS)

      [[Interferon-alpha|Interferon alpha]] plays a complex, Janus-faced role in the pathogenesis of COVID-19. Although it promotes the elimination of virus-infected cells, it also upregulates the expression of ACE-2, thereby facilitating the SARS-Cov2 virus to enter cells and to replicate.<ref>{{#invoke:Cite|journal |last1=Ziegler |first1=CGK |last2=Allon |first2=SJ |last3=Nyquist |first3=SK |last4=Mbano |first4=IM |last5=Miao |first5=VN |last6=Tzouanas |first6=CN |last7=Cao |first7=Y |last8=Yousif |first8=AS |last9=Bals |first9=J |last10=Hauser |first10=BM |last11=Feldman |first11=J |last12=Muus |first12=C |last13=Wadsworth |first13=MH |last14=Kazer |first14=SW |last15=Hughes |first15=TK |last16=Doran |first16=B |last17=Gatter |first17=GJ |last18=Vukovic |first18=M |last19=Taliaferro |first19=F |last20=Mead |first20=BE |last21=Guo |first21=Z |last22=Wang |first22=JP |last23=Gras |first23=D |last24=Plaisant |first24=M |last25=Ansari |first25=M |last26=Angelidis |first26=I |last27=Adler |first27=H |last28=Sucre |first28=JMS |last29=Taylor |first29=CJ |last30=Lin |first30=B |last31=Waghray |first31=A |last32=Mitsialis |first32=V |last33=Dwyer |first33=DF |last34=Buchheit |first34=KM |last35=Boyce |first35=JA |last36=Barrett |first36=NA |last37=Laidlaw |first37=TM |last38=Carroll |first38=SL |last39=Colonna |first39=L |last40=Tkachev |first40=V |last41=Peterson |first41=CW |last42=Yu |first42=A |last43=Zheng |first43=HB |last44=Gideon |first44=HP |last45=Winchell |first45=CG |last46=Lin |first46=PL |last47=Bingle |first47=CD |last48=Snapper |first48=SB |last49=Kropski |first49=JA |last50=Theis |first50=FJ |last51=Schiller |first51=HB |last52=Zaragosi |first52=LE |last53=Barbry |first53=P |last54=Leslie |first54=A |last55=Kiem |first55=HP |last56=Flynn |first56=JL |last57=Fortune |first57=SM |last58=Berger |first58=B |last59=Finberg |first59=RW |last60=Kean |first60=LS |last61=Garber |first61=M |last62=Schmidt |first62=AG |last63=Lingwood |first63=D |last64=Shalek |first64=AK |last65=Ordovas-Montanes |first65=J |title=SARS-CoV-2 Receptor ACE2 Is an Interferon-Stimulated Gene in Human Airway Epithelial Cells and Is Detected in Specific Cell Subsets across Tissues. |journal=Cell |series=HCA Lung Biological Network |date=28 May 2020 |volume=181 |issue=5 |pages=1016–1035.e19 |doi=10.1016/j.cell.2020.04.035 |pmid=32413319|pmc=7252096 |bibcode=2020Cell..181.1016Z }}</ref><ref>{{#invoke:Cite|journal |last1=Sajuthi |first1=SP |last2=DeFord |first2=P |last3=Li |first3=Y |last4=Jackson |first4=ND |last5=Montgomery |first5=MT |last6=Everman |first6=JL |last7=Rios |first7=CL |last8=Pruesse |first8=E |last9=Nolin |first9=JD |last10=Plender |first10=EG |last11=Wechsler |first11=ME |last12=Mak |first12=ACY |last13=Eng |first13=C |last14=Salazar |first14=S |last15=Medina |first15=V |last16=Wohlford |first16=EM |last17=Huntsman |first17=S |last18=Nickerson |first18=DA |last19=Germer |first19=S |last20=Zody |first20=MC |last21=Abecasis |first21=G |last22=Kang |first22=HM |last23=Rice |first23=KM |last24=Kumar |first24=R |last25=Oh |first25=S |last26=Rodriguez-Santana |first26=J |last27=Burchard |first27=EG |last28=Seibold |first28=MA |title=Type 2 and interferon inflammation regulate SARS-CoV-2 entry factor expression in the airway epithelium. |journal=Nature Communications |date=12 October 2020 |volume=11 |issue=1 |page=5139 |doi=10.1038/s41467-020-18781-2 |pmid=33046696|pmc=7550582 |bibcode=2020NatCo..11.5139S }}</ref> A competition of negative feedback loops (via protective effects of interferon alpha) and positive feedback loops (via upregulation of ACE-2) is assumed to determine the fate of people with COVID-19.<ref>{{#invoke:Cite|journal |last1=Tretter |first1=F |last2=Peters |first2=EMJ |last3=Sturmberg |first3=J |last4=Bennett |first4=J |last5=Voit |first5=E |last6=Dietrich |first6=JW |last7=Smith |first7=G |last8=Weckwerth |first8=W |last9=Grossman |first9=Z |last10=Wolkenhauer |first10=O |last11=Marcum |first11=JA |title=Perspectives of (/memorandum for) systems thinking on COVID-19 pandemic and pathology. |journal=Journal of Evaluation in Clinical Practice |date=28 September 2022 |volume=29 |issue=3 |pages=415–429 |doi=10.1111/jep.13772 |pmid=36168893|pmc=9538129 |s2cid=252566067 }}</ref>{{Update inline|date=December 2024}}

      Additionally, people with COVID‑19 and [[acute respiratory distress syndrome]] (ARDS) have classical [[serum (blood)|serum]] [[biomarker (medicine)|biomarker]]s of CRS, including elevated [[C-reactive protein]] (CRP), [[lactate dehydrogenase]] (LDH), [[D-dimer]], and [[ferritin]].<ref>{{#invoke:Cite|journal | vauthors = Zhang C, Wu Z, Li JW, Zhao H, Wang GQ | title = Cytokine release syndrome in severe COVID-19: interleukin-6 receptor antagonist tocilizumab may be the key to reduce mortality | journal = International Journal of Antimicrobial Agents | volume = 55 | issue = 5 | article-number = 105954 | date = May 2020 | pmid = 32234467 | pmc = 7118634 | doi = 10.1016/j.ijantimicag.2020.105954 }}</ref>

      Systemic inflammation results in [[vasodilation]], allowing inflammatory lymphocytic and monocytic infiltration of the lung and the heart. In particular, pathogenic GM-CSF-secreting [[T&nbsp;cell]]s were shown to correlate with the recruitment of inflammatory IL-6-secreting [[monocyte]]s and severe lung pathology in people with COVID‑19.<ref>{{#invoke:Cite|journal | vauthors = Gómez-Rial J, Rivero-Calle I, Salas A, Martinón-Torres F | title = Role of Monocytes/Macrophages in Covid-19 Pathogenesis: Implications for Therapy | journal = Infection and Drug Resistance | volume = 13 | pages = 2485–2493 | year = 2020 | pmid = 32801787 | pmc = 7383015 | doi = 10.2147/IDR.S258639 | doi-access = free | title-link = doi }}</ref> Lymphocytic infiltrates have also been reported at autopsy.<ref name="Cureus" />

      === Viral and host factors ===
      ==== Virus proteins ====
      [[File:Fpubh-08-00383-g004.jpg|thumb|The association between SARS-CoV-2 and the [[renin–angiotensin system|Renin-Angiotensin-Aldosterone System]] (RAAS)]]
      Multiple viral and host factors affect the pathogenesis of the virus. The [[S protein|S-protein]], otherwise known as the spike protein, is the viral component that attaches to the host receptor via the [[angiotensin-converting enzyme 2|ACE2]] receptors. It includes two subunits: S1 and S2.
      * S1 determines the virus-host range and cellular tropism via the receptor-binding domain.
      * S2 mediates the membrane fusion of the virus to its potential cell host via the H1 and HR2, which are [[heptad repeat]] regions.

      Studies have shown that S1 domain induced [[IgG]] and [[IgA]] antibody levels at a much higher capacity. It is the focus spike proteins expression that are involved in many effective COVID‑19 vaccines.<ref name="pmid33340022">{{#invoke:Cite|journal | vauthors = Dai L, Gao GF | title = Viral targets for vaccines against COVID-19 | journal = Nature Reviews. Immunology | volume = 21 | issue = 2 | pages = 73–82 | date = February 2021 | pmid = 33340022 | pmc = 7747004 | doi = 10.1038/s41577-020-00480-0 |issn=1474-1733 }}</ref>

      The M protein is the viral protein responsible for the transmembrane transport of nutrients. It is the cause of the bud release and the formation of the viral envelope.<ref name="Boopathi-2020">{{#invoke:Cite|journal | vauthors = Boopathi S, Poma AB, Kolandaivel P | title = Novel 2019 coronavirus structure, mechanism of action, antiviral drug promises and rule out against its treatment | journal = Journal of Biomolecular Structure & Dynamics | pages = 3409–3418 | date = April 2020 | volume = 39 | issue = 9 | pmid = 32306836 | pmc = 7196923 | doi = 10.1080/07391102.2020.1758788 }}</ref> The N and E protein are accessory proteins that interfere with the host's immune response.<ref name="Boopathi-2020" />

      ==== Host factors ====
      Human [[angiotensin converting enzyme 2]] (hACE2) is the host factor that SARS-CoV-2 virus targets causing COVID‑19. Theoretically, the usage of [[angiotensin II receptor blocker|angiotensin receptor blocker]]s (ARB) and [[ACE inhibitor]]s upregulating ACE2 expression might increase [[morbidity]] with COVID‑19, though animal data suggest some potential protective effect of ARB; however no clinical studies have proven susceptibility or outcomes. Until further data is available, guidelines and recommendations for people with hypertension remain.<ref>{{#invoke:Cite|journal | vauthors = Kai H, Kai M | title = Interactions of coronaviruses with ACE2, angiotensin II, and RAS inhibitors-lessons from available evidence and insights into COVID-19 | journal = Hypertension Research | volume = 43 | issue = 7 | pages = 648–654 | date = July 2020 | pmid = 32341442 | pmc = 7184165 | doi = 10.1038/s41440-020-0455-8 }}</ref>

      The effect of the virus on ACE2 cell surfaces leads to leukocytic infiltration, increased blood vessel permeability, alveolar wall permeability, as well as decreased secretion of lung surfactants. These effects cause the majority of the respiratory symptoms. However, the aggravation of local inflammation causes a cytokine storm eventually leading to a [[systemic inflammatory response syndrome]].<ref>{{#invoke:Cite|journal | vauthors = Chen HX, Chen ZH, Shen HH | title = [Structure of SARS-CoV-2 and treatment of COVID-19] | journal = Sheng Li Xue Bao | volume = 72 | issue = 5 | pages = 617–630 | date = October 2020 | pmid = 33106832 }}</ref>

      Among healthy adults not exposed to SARS-CoV-2, about 35% have [[CD4+ T cell|CD4<sup>+</sup> T cell]]s that recognise the SARS-CoV-2 [[peplomer|S protein]] (particularly the S2 subunit) and about 50% react to other proteins of the virus, suggesting [[cross-reactivity]] from previous [[common cold]]s caused by other coronaviruses.<ref>{{#invoke:Cite|journal |vauthors=Jeyanathan M, Afkhami S, Smaill F, Miller MS, Lichty BD, Xing Z |date=4 September 2020 |title=Immunological considerations for COVID-19 vaccine strategies |journal=Nature Reviews Immunology |volume=20 |issue=10 |pages=615–632 |doi=10.1038/s41577-020-00434-6 |pmid=32887954 |pmc=7472682 |bibcode=2020NatRI..20..615J |issn=1474-1741}}</ref>

      It is unknown whether different persons use similar antibody genes in response to COVID‑19.<ref>{{#invoke:Cite|journal | vauthors = Zhang Q, Ju B, Ge J, Chan JF, Cheng L, Wang R, Huang W, Fang M, Chen P, Zhou B, Song S, Shan S, Yan B, Zhang S, Ge X, Yu J, Zhao J, Wang H, Liu L, Lv Q, Fu L, Shi X, Yuen KY, Liu L, Wang Y, Chen Z, Zhang L, Wang X, Zhang Z | title = Potent and protective IGHV3-53/3-66 public antibodies and their shared escape mutant on the spike of SARS-CoV-2 | journal = Nature Communications | volume = 12 | issue = 1 | article-number = 4210 | date = July 2021 | pmid = 34244522 | pmc = 8270942 | doi = 10.1038/s41467-021-24514-w | bibcode = 2021NatCo..12.4210Z | s2cid = 235786394 }}</ref>

      === Host cytokine response ===
      [[File:Ijms-21-05932-g004.webp|thumb|Mild versus severe [[immune system|immune response]] during [[viral disease|virus infection]]]]
      The severity of the inflammation can be attributed to the severity of what is known as the [[cytokine storm]].<ref name="pmid32474885">{{#invoke:Cite|journal | vauthors = Soy M, Keser G, Atagündüz P, Tabak F, Atagündüz I, Kayhan S | title = Cytokine storm in COVID-19: pathogenesis and overview of anti-inflammatory agents used in treatment | journal = Clinical Rheumatology | volume = 39 | issue = 7 | pages = 2085–2094 | date = July 2020 | pmid = 32474885 | pmc = 7260446 | doi = 10.1007/s10067-020-05190-5 }}</ref> Levels of [[interleukin 1 beta|interleukin{{spaces}}1B]], [[interferon gamma|interferon-gamma]], interferon-inducible protein 10, and monocyte chemoattractant protein{{spaces}}1 were all associated with COVID‑19 disease severity. Treatment has been proposed to combat the cytokine storm as it remains to be one of the leading causes of [[morbidity]] and mortality in COVID‑19 disease.<ref>{{#invoke:Cite|journal | vauthors = Quirch M, Lee J, Rehman S | title = Hazards of the Cytokine Storm and Cytokine-Targeted Therapy in Patients With COVID-19: Review | journal = Journal of Medical Internet Research | volume = 22 | issue = 8 | article-number = e20193 | date = August 2020 | pmid = 32707537 | pmc = 7428145 | doi = 10.2196/20193 |doi-access=free}}</ref>

      A cytokine storm is due to an acute hyperinflammatory response that is responsible for clinical illness in an array of diseases but in COVID‑19, it is related to worse prognosis and increased fatality. The storm causes acute respiratory distress syndrome, blood clotting events such as strokes, [[myocardial infarction]], [[encephalitis]], [[acute kidney injury]], and [[vasculitis]]. The production of [[interleukin 1|IL-1]], [[interleukin 2|IL-2]], [[interleukin 6|IL-6]], [[tumor necrosis factor|TNF-alpha]], and [[interferon gamma|interferon-gamma]], all crucial components of normal immune responses, inadvertently become the causes of a cytokine storm. The cells of the [[central nervous system]], the [[microglia]], [[neuron]]s, and [[astrocyte]]s, are also involved in the release of [[pro-inflammatory cytokine]]s affecting the nervous system, and effects of cytokine storms toward the CNS are not uncommon.<ref>{{#invoke:Cite|journal | vauthors = Bhaskar S, Sinha A, Banach M, Mittoo S, Weissert R, Kass JS, Rajagopal S, Pai AR, Kutty S | title = Cytokine Storm in COVID-19-Immunopathological Mechanisms, Clinical Considerations, and Therapeutic Approaches: The REPROGRAM Consortium Position Paper | journal = Frontiers in Immunology | volume = 11 | article-number = 1648 | year = 2020 | pmid = 32754159 | pmc = 7365905 | doi = 10.3389/fimmu.2020.01648 | doi-access = free | title-link = doi }}</ref>

      === Pregnancy response ===
      There are many unknowns for pregnant women during the COVID-19 pandemic. Given that they are prone to have complications and severe disease infection with other types of coronaviruses, they have been identified as a vulnerable group and advised to take supplementary preventive measures.<ref name="Wastnedge_2021">{{#invoke:Cite|journal|vauthors=Wastnedge EA, Reynolds RM, van Boeckel SR, Stock SJ, Denison FC, Maybin JA, Critchley HO |date=January 2021|title=Pregnancy and COVID-19|journal=Physiological Reviews|volume=101|issue=1|pages=303–318|doi=10.1152/physrev.00024.2020|pmc=7686875|pmid=32969772}}</ref>

      Physiological responses to pregnancy can include:
      * Immunological: The immunological response to COVID-19, like other viruses, depends on a working immune system. It adapts during pregnancy to allow the development of the foetus whose genetic load is only partially shared with their mother, leading to a different immunological reaction to infections during the course of pregnancy.<ref name="Wastnedge_2021" />
      * Respiratory: Many factors can make pregnant women more vulnerable to hard respiratory infections. One of them is the total reduction of the lungs' capacity and inability to clear secretions.<ref name="Wastnedge_2021" />
      * Coagulation: During pregnancy, there are higher levels of circulating coagulation factors, and the pathogenesis of SARS-CoV-2 infection can be implicated. The thromboembolic events with associated mortality are a risk for pregnant women.<ref name="Wastnedge_2021" />

      However, from the evidence base, it is difficult to conclude whether pregnant women are at increased risk of grave consequences of this virus.<ref name="Wastnedge_2021" />

      In addition to the above, other clinical studies have proved that SARS-CoV-2 can affect the period of pregnancy in different ways. On the one hand, there is little evidence of its impact up to 12 weeks gestation. On the other hand, COVID-19 infection may cause increased rates of unfavourable outcomes in the course of the pregnancy. Some examples of these could be foetal growth restriction, preterm birth, and perinatal mortality, which refers to the foetal death past 22 or 28 completed weeks of pregnancy as well as the death among live-born children up to seven completed days of life.<ref name="Wastnedge_2021" /> For preterm birth, a 2023 review indicates that there appears to be a correlation with COVID-19.<ref>{{#invoke:Cite|journal |last1=Digby |first1=Alyson M. |last2=Dahan |first2=Michael H. |title=Obstetrical and gynecologic implications of COVID-19: what have we learned over the first two years of the pandemic |journal=Archives of Gynecology and Obstetrics |date=12 January 2023 |volume=308 |issue=3 |pages=813–819 |doi=10.1007/s00404-022-06847-z|pmid=36633677 |pmc=9838509 }}</ref>

      Unvaccinated women in later stages of pregnancy with COVID-19 are more likely than other people to need very intensive care. Babies born to mothers with COVID-19 are more likely to have breathing problems. Pregnant women are strongly encouraged to get [[COVID-19 vaccine|vaccinated]].<ref>{{#invoke:Cite|web| vauthors = Campbell D | title=One in six most critically ill NHS Covid patients are unvaccinated pregnant women | website=The Guardian | date=10 October 2021 | url=https://www.theguardian.com/lifeandstyle/2021/oct/11/one-in-six-most-critically-ill-patients-are-unvaccinated-pregnant-women-with-covid | access-date=25 January 2022 }}</ref>

      == Diagnosis ==
      COVID‑19 can provisionally be diagnosed on the basis of symptoms and confirmed using [[reverse transcription polymerase chain reaction]] (RT-PCR) or other [[nucleic acid test]]ing of infected secretions.<ref name="pmid32621814">{{#invoke:Cite|journal | vauthors = Li C, Zhao C, Bao J, Tang B, Wang Y, Gu B | title = Laboratory diagnosis of coronavirus disease-2019 (COVID-19) | journal = Clinica Chimica Acta; International Journal of Clinical Chemistry | volume = 510 | pages = 35–46 | date = November 2020 | pmid = 32621814 | pmc = 7329657 | doi = 10.1016/j.cca.2020.06.045 }}</ref><ref name="jTxKm">{{#invoke:Cite|journal | vauthors = Ai T, Yang Z, Hou H, Zhan C, Chen C, Lv W, Tao Q, Sun Z, Xia L | title = Correlation of Chest CT and RT-PCR Testing for Coronavirus Disease 2019 (COVID-19) in China: A Report of 1014 Cases | journal = Radiology | volume = 296 | issue = 2 | pages = E32–E40 | date = August 2020 | pmid = 32101510 | pmc = 7233399 | doi = 10.1148/radiol.2020200642 }}</ref> Along with laboratory testing, chest CT scans may be helpful to diagnose COVID‑19 in individuals with a high clinical suspicion of infection.<ref name="Salehi-2020">{{#invoke:Cite|journal | vauthors = Salehi S, Abedi A, Balakrishnan S, Gholamrezanezhad A | title = Coronavirus Disease 2019 (COVID-19): A Systematic Review of Imaging Findings in 919 Patients | journal = AJR. American Journal of Roentgenology | volume = 215 | issue = 1 | pages = 87–93 | date = July 2020 | pmid = 32174129 | doi = 10.2214/AJR.20.23034 | doi-access = free | title-link = doi }}</ref> Detection of a past infection is possible with [[serology|serological test]]s, which detect [[antibody|antibodies]] produced by the body in response to the infection.<ref name="pmid32621814" />

      === Viral testing ===
      {{Main|COVID-19 testing}}

      [[File:Infektionsschutzzentrum im Rautenstrauch-Joest-Museum, Köln-6313 (cropped).jpg|thumb|Demonstration of a [[nasopharyngeal swab]] for [[COVID‑19 testing]]]]
      The standard methods of testing for presence of SARS-CoV-2 are [[nucleic acid test]]s,<ref name="pmid32621814" /><ref name="20200130cdc">{{#invoke:Cite|web|date=30 January 2020|title=2019 Novel Coronavirus (2019-nCoV) Situation Summary|url=https://www.cdc.gov/coronavirus/2019-ncov/summary.html|url-status=live|archive-url=https://web.archive.org/web/20200126210549/https://www.cdc.gov/coronavirus/2019-nCoV/summary.html|archive-date=26 January 2020|access-date=30 January 2020|website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref> which detects the presence of viral RNA fragments.<ref name="WHO_InterimGuidance">{{#invoke:Cite|web|title=Coronavirus disease (COVID-19) technical guidance: Laboratory testing for 2019-nCoV in humans |work=[[World Health Organization]] (WHO) |url=https://www.who.int/emergencies/diseases/novel-coronavirus-2019/technical-guidance/laboratory-guidance |access-date=14 March 2020 |archive-url=https://web.archive.org/web/20200315044138/https://www.who.int/emergencies/diseases/novel-coronavirus-2019/technical-guidance/laboratory-guidance |archive-date=15 March 2020 |url-status=live}}</ref> As these tests detect RNA but not infectious virus, its "ability to determine duration of infectivity of patients is limited".<ref name="2k0iS">{{#invoke:Cite|journal |vauthors=Bullard J, Dust K, Funk D, Strong JE, Alexander D, Garnett L, Boodman C, Bello A, Hedley A, Schiffman Z, Doan K, Bastien N, Li Y, Van Caeseele PG, Poliquin G |title=Predicting Infectious Severe Acute Respiratory Syndrome Coronavirus 2 From Diagnostic Samples |journal=Clinical Infectious Diseases |volume=71 |issue=10 |pages=2663–2666 |date=December 2020 |pmid=32442256 |pmc=7314198 |doi=10.1093/cid/ciaa638 |doi-access=free |title-link=doi}}</ref> The test is typically done on respiratory samples obtained by a [[nasopharyngeal swab]]; however, a nasal swab or sputum sample may also be used.<ref name="CDC2020Testing">{{#invoke:Cite|web|date=11 February 2020|title=Interim Guidelines for Collecting, Handling, and Testing Clinical Specimens from Persons for Coronavirus Disease 2019 (COVID-19) |url=https://www.cdc.gov/coronavirus/2019-ncov/lab/guidelines-clinical-specimens.html|url-status=live|archive-url=https://web.archive.org/web/20200304165907/https://www.cdc.gov/coronavirus/2019-nCoV/lab/guidelines-clinical-specimens.html|archive-date=4 March 2020|access-date=26 March 2020|website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref><ref name="20200129cdc">{{#invoke:Cite|web|date=29 January 2020|title=Real-Time RT-PCR Panel for Detection 2019-nCoV |url=https://www.cdc.gov/coronavirus/2019-ncov/lab/rt-pcr-detection-instructions.html|url-status=live|archive-url=https://web.archive.org/web/20200130202031/https://www.cdc.gov/coronavirus/2019-ncov/lab/rt-pcr-detection-instructions.html|archive-date=30 January 2020|access-date=1 February 2020|website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref> Results are generally available within hours.<ref name="pmid32621814" /> The WHO has published several testing protocols for the disease.<ref>{{#invoke:Cite|web|title=Laboratory testing for 2019 novel coronavirus (2019-nCoV) in suspected human cases|url=https://www.who.int/publications-detail/laboratory-testing-for-2019-novel-coronavirus-in-suspected-human-cases-20200117|url-status=live|archive-url=https://web.archive.org/web/20200317023052/https://www.who.int/publications-detail/laboratory-testing-for-2019-novel-coronavirus-in-suspected-human-cases-20200117|archive-date=17 March 2020|access-date=13 March 2020|website=[[World Health Organization]] (WHO)}}</ref>

      Several laboratories and companies have developed serological tests, which detect antibodies produced by the body in response to infection. Some have been evaluated by [[Public Health England]] and approved for use in the UK.<ref name="independent9515466">{{#invoke:Cite|news|date=14 May 2020|title=NHS staff will be first to get new coronavirus antibody test, medical chief promises|website=The Independent|url=https://www.independent.co.uk/news/uk/home-news/coronavirus-test-antibody-covid-roche-immune-nhs-staff-a9515466.html|access-date=14 May 2020}}</ref>

      The [[University of Oxford]]'s CEBM has pointed to mounting evidence<ref name="yFMEP">{{#invoke:Cite|web| vauthors = Heneghan C, Jefferson T |date=1 September 2020|title=Virological characterization of COVID-19 patients that test re-positive for SARS-CoV-2 by RT-PCR|url=https://www.cebm.net/study/virological-characterization-of-covid-19-patients-that-test-re-positive-for-sars-cov-2-by-rt-pcr|access-date=19 September 2020|website=CEBM}}</ref><ref name="2exX5">{{#invoke:Cite|journal | vauthors = Lu J, Peng J, Xiong Q, Liu Z, Lin H, Tan X, Kang M, Yuan R, Zeng L, Zhou P, Liang C, Yi L, du Plessis L, Song T, Ma W, Sun J, Pybus OG, Ke C | title = Clinical, immunological and virological characterization of COVID-19 patients that test re-positive for SARS-CoV-2 by RT-PCR | journal = eBioMedicine | volume = 59 | article-number = 102960 | date = September 2020 | pmid = 32853988 | pmc = 7444471 | doi = 10.1016/j.ebiom.2020.102960 }}</ref> that "a good proportion of 'new' mild cases and people re-testing positives after quarantine or discharge from hospital are not infectious, but are simply clearing harmless virus particles which their immune system has efficiently dealt with" and have called for "an international effort to standardize and periodically calibrate testing"<ref name="PQGAv">{{#invoke:Cite|web| vauthors = Spencer E, Jefferson T, Brassey J, Heneghan C |date=11 September 2020|title=When is Covid, Covid?|url=https://www.cebm.net/covid-19/when-is-covid-covid/|access-date=19 September 2020|website=The Centre for Evidence-Based Medicine}}</ref> In September 2020, the UK government issued "guidance for procedures to be implemented in laboratories to provide assurance of positive SARS-CoV-2 RNA results during periods of low prevalence, when there is a reduction in the predictive value of positive test results".<ref name="9Kblp">{{#invoke:Cite|web|title=SARS-CoV-2 RNA testing: assurance of positive results during periods of low prevalence |url=https://www.gov.uk/government/publications/sars-cov-2-rna-testing-assurance-of-positive-results-during-periods-of-low-prevalence|access-date=19 September 2020|website=GOV.UK}}</ref>

      === Imaging ===
      <noinclude>[[File:COVID19CTPneumonia.jpg|thumb|A [[computed tomography|CT]] scan of a person with COVID-19 shows lesions (bright regions) in the lungs]]</noinclude>
      [[File:COVID19CT1.webp|thumb|CT scan of rapid progression stage of COVID-19]]
      [[File:COVID-19 Pneumonie - 82m Roe Thorax ap - 001.jpg|thumb|Chest X-ray showing COVID‑19 pneumonia]]
      Chest CT scans may be helpful to diagnose COVID‑19 in individuals with a high clinical suspicion of infection but are not recommended for routine screening.<ref name="Salehi-2020" /><ref name="acr.org">{{#invoke:Cite|web|date=22 March 2020|title=ACR Recommendations for the use of Chest Radiography and Computed Tomography (CT) for Suspected COVID-19 Infection|url=https://www.acr.org/Advocacy-and-Economics/ACR-Position-Statements/Recommendations-for-Chest-Radiography-and-CT-for-Suspected-COVID19-Infection|url-status=live|archive-url=https://web.archive.org/web/20200328055813/https://www.acr.org/Advocacy-and-Economics/ACR-Position-Statements/Recommendations-for-Chest-Radiography-and-CT-for-Suspected-COVID19-Infection|archive-date=28 March 2020|website=American College of Radiology}}</ref> Bilateral multilobar [[ground-glass opacity|ground-glass opacities]] with a peripheral, asymmetric, and posterior distribution are common in early infection.<ref name="Salehi-2020" /><ref>{{#invoke:Cite|journal | vauthors = Pormohammad A, Ghorbani S, Khatami A, Razizadeh MH, Alborzi E, Zarei M, Idrovo JP, Turner RJ | title = Comparison of influenza type A and B with COVID-19: A global systematic review and meta-analysis on clinical, laboratory and radiographic findings | journal = Reviews in Medical Virology | article-number = e2179 | date = October 2020 | pmid = 33035373 | pmc = 7646051 | doi = 10.1002/rmv.2179 | s2cid = 222255245 | title-link = doi | volume = 31 | issue = 3 | doi-access = free }}</ref> Subpleural dominance, [[crazy paving (medicine)|crazy paving]] (lobular septal thickening with variable alveolar filling), and [[pulmonary consolidation|consolidation]] may appear as the disease progresses.<ref name="Salehi-2020" /><ref>{{#invoke:Cite|journal | vauthors = Lee EY, Ng MY, Khong PL | title = COVID-19 pneumonia: what has CT taught us? | journal = The Lancet. Infectious Diseases | volume = 20 | issue = 4 | pages = 384–385 | date = April 2020 | pmid = 32105641 | pmc = 7128449 | doi = 10.1016/S1473-3099(20)30134-1 | title-link = doi | doi-access = free }}</ref> Characteristic imaging features on chest [[radiograph]]s and [[computed tomography]] (CT) of people who are symptomatic include asymmetric peripheral ground-glass opacities without [[pleural effusion]]s.<ref name="AJR">{{#invoke:Cite|journal | vauthors = Li Y, Xia L | title = Coronavirus Disease 2019 (COVID-19): Role of Chest CT in Diagnosis and Management | journal = AJR. American Journal of Roentgenology | volume = 214 | issue = 6 | pages = 1280–1286 | date = June 2020 | pmid = 32130038 | doi = 10.2214/AJR.20.22954 | s2cid = 212416282 }}</ref>

      Many groups have created [[COVID‑19 datasets]] that include imagery such as the [[Italian Society of Medical and Interventional Radiology|Italian Radiological Society]] which has compiled an international online database of imaging findings for confirmed cases.<ref name="Cx70C">{{#invoke:Cite|web|title=COVID-19 Database |url=https://www.sirm.org/category/senza-categoria/covid-19/ |website=Società Italiana di Radiologia Medica e Interventistica |access-date=11 March 2020 |language=it}}</ref> Due to overlap with other infections such as [[adenovirus]], imaging without confirmation by rRT-PCR is of limited [[specificity (statistics)|specificity]] in identifying COVID‑19.<ref name="AJR" /> A large study in China compared chest CT results to PCR and demonstrated that though imaging is less specific for the infection, it is faster and more [[sensitivity (statistics)|sensitive]].<ref name="jTxKm" />

      === Coding ===
      In late 2019, the WHO assigned emergency [[ICD-10]] disease codes U07.1 for deaths from lab-confirmed SARS-CoV-2 infection and U07.2 for deaths from clinically or epidemiologically diagnosed COVID‑19 without lab-confirmed SARS-CoV-2 infection.<ref name="ICD10_2019_U07p2">{{#invoke:Cite|web|year=2019|title=ICD-10 Version:2019|website=[[World Health Organization]] (WHO) |url=https://icd.who.int/browse10/2019/en#/U07.1|access-date=31 March 2020 |url-status=|archive-url=|archive-date=|quote=U07.2{{snd}}COVID-19, virus not identified{{snd}}COVID-19 NOS{{snd}}Use this code when COVID-19 is diagnosed clinically or epidemiologically but laboratory testing is inconclusive or not available. Use additional code, if desired, to identify pneumonia or other manifestations}}</ref>

      === Pathology ===
      The main pathological findings at autopsy are:
      * [[macroscopic scale|Macroscopy]]: [[pericarditis]], [[lung consolidation]] and [[pulmonary edema|pulmonary oedema]]<ref name="Cureus" />
      * Lung findings:
      ** Minor serous [[exudate|exudation]], minor [[fibrin]] exudation<ref name="Cureus" />
      ** Pulmonary oedema, [[pneumocyte]] [[hyperplasia]], large atypical [[pneumocyte]]s, interstitial [[inflammation]] with [[lymphocytic]] [[infiltration (medical)|infiltration]] and [[giant cell|multinucleated giant cell]] formation<ref name="Cureus" />
      ** [[Diffuse alveolar damage]] (DAD) with diffuse [[pulmonary alveolus|alveolar]] [[exudates]]. DAD is the cause of [[acute respiratory distress syndrome]] (ARDS) and severe [[hypoxemia|hypoxaemia]].<ref name="Cureus" />
      ** [[healing|Organisation]] of [[exudate]]s in [[pulmonary alveolus|alveolar cavities]] and [[pulmonary fibrosis|pulmonary interstitial fibrosis]]<ref name="Cureus" />
      ** [[plasma cell|Plasmocytosis]] in [[bronchoalveolar lavage]] (BAL)<ref>{{#invoke:Cite|journal | vauthors = Giani M, Seminati D, Lucchini A, Foti G, Pagni F | title = Exuberant Plasmocytosis in Bronchoalveolar Lavage Specimen of the First Patient Requiring Extracorporeal Membrane Oxygenation for SARS-CoV-2 in Europe | journal = Journal of Thoracic Oncology | volume = 15 | issue = 5 | pages = e65–e66 | date = May 2020 | pmid = 32194247 | pmc = 7118681 | doi = 10.1016/j.jtho.2020.03.008 }}</ref>
      * Blood and vessels: [[disseminated intravascular coagulation]] (DIC);<ref>{{#invoke:Cite|journal | vauthors = Lillicrap D | title = Disseminated intravascular coagulation in patients with 2019-nCoV pneumonia | journal = Journal of Thrombosis and Haemostasis | volume = 18 | issue = 4 | pages = 786–787 | date = April 2020 | pmid = 32212240 | pmc = 7166410 | doi = 10.1111/jth.14781 }}</ref> [[leukoerythroblastic]] reaction,<ref>{{#invoke:Cite|journal | vauthors = Mitra A, Dwyre DM, Schivo M, Thompson GR, Cohen SH, Ku N, Graff JP | title = Leukoerythroblastic reaction in a patient with COVID-19 infection | journal = American Journal of Hematology | volume = 95 | issue = 8 | pages = 999–1000 | date = August 2020 | pmid = 32212392 | pmc = 7228283 | doi = 10.1002/ajh.25793 | title-link = doi | doi-access = free }}</ref> [[endotheliitis]],<ref name="SatturwarFowkes2021">{{#invoke:Cite|journal | vauthors = Satturwar S, Fowkes M, Farver C, Wilson AM, Eccher A, Girolami I, Pujadas E, Bryce C, Salem F, El Jamal SM, Paniz-Mondolfi A, Petersen B, Gordon RE, Reidy J, Fraggetta F, Marshall DA, Pantanowitz L | title = Postmortem Findings Associated With SARS-CoV-2: Systematic Review and Meta-analysis | journal = The American Journal of Surgical Pathology | volume = 45 | issue = 5 | pages = 587–603 | date = May 2021 | pmid = 33481385 | doi = 10.1097/PAS.0000000000001650 | pmc = 8132567 | s2cid = 231679276 }}</ref> [[hemophagocytosis]]<ref name="SatturwarFowkes2021" />
      * Heart: [[cardiac muscle cell]] necrosis<ref name="SatturwarFowkes2021" />
      * Liver: microvesicular [[steatosis]]<ref name="Cureus" />
      * Nose: [[impact of COVID-19 on neurological, psychological and other mental health outcomes|shedding of olfactory epithelium]]<ref name="Meunier-2020" />
      * Brain: [[cerebral infarction|infarction]]<ref name="SatturwarFowkes2021" />
      * Kidneys: acute tubular damage.<ref name="SatturwarFowkes2021" />
      * Spleen: [[white pulp]] depletion.<ref name="SatturwarFowkes2021" />

      == Prevention ==
      <noinclude>
      {{Further|COVID-19 vaccine|Workplace hazard controls for COVID-19|Pandemic prevention|Non-pharmaceutical intervention (epidemiology){{!}}Non-pharmaceutical intervention|Pandemic predictions and preparations prior to the COVID-19 pandemic{{!}}Preparations prior to COVID-19|COVID-19 surveillance|COVID-19 apps}}
      <!-- THE FOLLOWING TWO PARAGRAPHS ARE TRANSCLUDED INTO THE COVID-19 PANDEMIC ARTICLE -->
      </noinclude>
      [[File:20200609 Effect of pandemic containment measures.gif|thumb|upright=1|Without pandemic containment measures{{snd}}such as social distancing, vaccination, and face masks{{snd}}pathogens can spread exponentially.<ref name=Science_20200515>{{#invoke:Cite|journal | vauthors = Maier BF, Brockmann D | title = Effective containment explains subexponential growth in recent confirmed COVID-19 cases in China | journal = Science | volume = 368 | issue = 6492 | pages = 742–746 | date = May 2020 | pmid = 32269067 | pmc = 7164388 | doi = 10.1126/science.abb4557| arxiv=2002.07572 | title-link = doi | doi-access = free | bibcode = 2020Sci...368..742M }} ("...{{spaces}}initial exponential growth expected for an unconstrained outbreak".)</ref> This graphic shows how early adoption of containment measures tends to protect wider swaths of the population.]]
      Preventive measures to reduce the chances of infection include getting vaccinated, staying at home, wearing a mask in public, avoiding crowded places, keeping distance from others, ventilating indoor spaces, managing potential exposure durations,<ref>{{#invoke:Cite|web|url=https://reallycorrect.com/ReallyCorrectWp1/covid-19-safety-information-ideas/#Viral-Load-Exposure-Factors|title=Viral Load Exposure Factors|website=ReallyCorrect.com}}</ref> washing hands with soap and water often and for at least 20 seconds, practising good respiratory hygiene, and avoiding touching the eyes, nose, or mouth with unwashed hands.<ref name="CDC042020">{{#invoke:Cite|web|date=28 June 2020|title=Recommendation Regarding the Use of Cloth Face Coverings, Especially in Areas of Significant Community-Based Transmission|work=U.S. [[Centers for Disease Control and Prevention]] (CDC) |url=https://www.cdc.gov/coronavirus/2019-ncov/prevent-getting-sick/cloth-face-cover.html}}</ref><ref>{{#invoke:Cite|web|title=Scientific Brief: SARS-CoV-2 and Potential Airborne Transmission |url=https://www.cdc.gov/coronavirus/2019-ncov/more/scientific-brief-sars-cov-2.html |website=COVID-19 Published Science and Research |date=11 February 2020 |archive-url=https://web.archive.org/web/20201030202040/https://www.cdc.gov/coronavirus/2019-ncov/more/scientific-brief-sars-cov-2.html |archive-date=30 October 2020 |publisher=U.S. [[Centers for Disease Control and Prevention]] (CDC) |access-date=30 October 2020}}</ref>

      Those diagnosed with COVID‑19 or who believe they may be infected are advised by the CDC to stay home except to get medical care, call ahead before visiting a healthcare provider, [[#Face masks and respiratory hygiene|wear a face mask]] before entering the healthcare provider's office and when in any room or vehicle with another person, cover coughs and sneezes with a tissue, regularly wash hands with soap and water and avoid sharing personal household items.<ref name="CDC2020IfSick">{{#invoke:Cite|web|date=5 April 2020|title=What to Do if You Are Sick|url=https://www.cdc.gov/coronavirus/2019-ncov/if-you-are-sick/steps-when-sick.html|url-status=live|archive-url=https://web.archive.org/web/20200214153016/https://www.cdc.gov/coronavirus/2019-ncov/about/steps-when-sick.html|archive-date=14 February 2020|access-date=24 April 2020|website=U.S. [[Centers for Disease Control and Prevention]]}}</ref><ref>{{#invoke:Cite|web|date=10 March 2020|title=Coronavirus Disease 2019 (COVID-19) – Prevention & Treatment |url=https://www.cdc.gov/coronavirus/2019-ncov/about/prevention.html|url-status=live|archive-url=https://web.archive.org/web/20200311163637/https://www.cdc.gov/coronavirus/2019-ncov/about/prevention.html|archive-date=11 March 2020|access-date=11 March 2020|work=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref>

      The first [[COVID‑19 vaccine]] was granted regulatory approval on 2{{spaces}}December 2020 by the UK medicines regulator [[Medicines and Healthcare products Regulatory Agency|MHRA]].<ref name="ukgov12-2">{{#invoke:Cite|web|title=UK medicines regulator gives approval for first UK COVID-19 vaccine |url=https://www.gov.uk/government/news/uk-medicines-regulator-gives-approval-for-first-uk-covid-19-vaccine |publisher=Medicines and Healthcare Products Regulatory Agency, Government of the UK |access-date=2 December 2020 |date=2 December 2020}}</ref> It was evaluated for [[emergency use authorisation]] (EUA) status by the US [[Food and Drugs Administration|FDA]], and in several other countries.<ref name="mueller">{{#invoke:Cite|news | vauthors = Mueller B |title=U.K. Approves Pfizer Coronavirus Vaccine, a First in the West |url=https://www.nytimes.com/2020/12/02/world/europe/pfizer-coronavirus-vaccine-approved-uk.html |archive-url=https://web.archive.org/web/20201202071559/https://www.nytimes.com/2020/12/02/world/europe/pfizer-coronavirus-vaccine-approved-uk.html |archive-date=2 December 2020 |url-access=subscription |url-status=live |access-date=2 December 2020 |work=The New York Times |date=2 December 2020}}</ref> Initially, the US [[National Institutes of Health]] guidelines do not recommend any medication for prevention of COVID‑19, before or after exposure to the SARS-CoV-2 virus, outside the setting of a clinical trial.<ref name="NIHGuidelines2020">{{#invoke:Cite|web|title=COVID-19 Treatment Guidelines |url=https://covid19treatmentguidelines.nih.gov/introduction/ |website=nih.gov |publisher=National Institutes of Health |access-date=21 April 2020}}</ref><ref name="Sanders202022" /> Without a vaccine, other prophylactic measures, or effective treatments, a key part of managing COVID‑19 is trying to decrease and delay the epidemic peak, known as "flattening the [[epidemic curve|curve]]".<ref name="Lancet2020Flatten">{{#invoke:Cite|journal | vauthors = Anderson RM, Heesterbeek H, Klinkenberg D, Hollingsworth TD | title = How will country-based mitigation measures influence the course of the COVID-19 epidemic? | journal = Lancet | volume = 395 | issue = 10228 | pages = 931–934 | date = March 2020 | pmid = 32164834 | pmc = 7158572 | doi = 10.1016/S0140-6736(20)30567-5 | quote = A key issue for epidemiologists is helping policy makers decide the main objectives of mitigation{{snd}}e.g. minimising morbidity and associated mortality, avoiding an epidemic peak that overwhelms health-care services, keeping the effects on the economy within manageable levels, and flattening the epidemic curve to wait for vaccine development and manufacture on scale and antiviral drug therapies. | doi-access = free | title-link = doi }}</ref> This is done by slowing the infection rate to decrease the risk of health services being overwhelmed, allowing for better treatment of active cases, and delaying additional cases until effective treatments or a vaccine become available.<ref name="Lancet2020Flatten" /><ref name="Wiles">{{#invoke:Cite|web| vauthors = Wiles S |title=After 'Flatten the Curve', we must now 'Stop the Spread'. Here's what that means |url=https://thespinoff.co.nz/society/14-03-2020/after-flatten-the-curve-we-must-now-stop-the-spread-heres-what-that-means/ |website=The Spinoff |access-date=13 March 2020 |date=14 March 2020 |archive-url=https://web.archive.org/web/20200326232315/https://thespinoff.co.nz/society/14-03-2020/after-flatten-the-curve-we-must-now-stop-the-spread-heres-what-that-means/ |archive-date=26 March 2020 |url-status=live}}</ref>

