         {{Legend|#FDAE61|Score is less than 345}}
         {{Legend|#C0C0C0|No data}}
      }}
      {{Use dmy dates|date=July 2020}}

      The '''Programme for International Student Assessment''' ('''PISA''') is a worldwide study by the [[Organisation for Economic Co-operation and Development]] (OECD) in member and non-member nations intended to evaluate educational systems by measuring 15-year-old school pupils' scholastic performance on mathematics, science, and reading.<ref>{{cite web|url=http://www.oecd.org/pisa/aboutpisa/|title=About PISA|website=OECD PISA|access-date=8 February 2018}}</ref> It was first performed in 2000 and then repeated every three years. Its aim is to provide comparable data to enable countries to improve their education policies and outcomes. It measures problem solving and cognition.<ref>{{cite book|last1=Berger|first1=Kathleen|title=Invitation to The Life Span|date=3 March 2014|publisher=worth|isbn=978-1-4641-7205-2|edition=second}}</ref>

      The results of the 2022 data collection were released in December 2023.<ref>{{Cite web |date=December 2023 |title=PISA 2022 Results |url=https://www.oecd.org/publication/pisa-2022-results |url-status=live |archive-url=https://web.archive.org/web/20231205105335/https://www.oecd.org/publication/pisa-2022-results/ |archive-date=December 5, 2023 |access-date=December 15, 2023 |website=OECD}}</ref>

      ==Influence and impact==
      PISA, and similar international standardised assessments of educational attainment are increasingly used in the process of education policymaking at both national and international levels.<ref name="Rey">{{Cite journal|url=http://www.cidree.org/publications/yearbook_2010?PHPSESSID=baip221utd9v77b89hov0s3al6|last=Rey|first=O|title=The use of external assessments and the impact on education systems|journal=CIDREE Yearbook|year=2010|access-date=22 November 2019|archive-url=https://web.archive.org/web/20170203230616/http://www.cidree.org/publications/yearbook_2010?PHPSESSID=baip221utd9v77b89hov0s3al6|archive-date=3 February 2017|url-status=dead}}</ref>

      PISA was conceived to set in a wider context the information provided by national monitoring of education system performance through regular assessments within a common, internationally agreed framework; by investigating relationships between student learning and other factors they can "offer insights into sources of variation in performances within and between countries".<ref name="McGaw">{{Cite journal|last=McGaw|first=B|year=2008|title=The role of the OECD in international comparative studies of achievement|journal=Assessment in Education: Principles, Policy & Practice|volume=15|issue=3|pages=223–243|doi=10.1080/09695940802417384}}</ref>

      Until the 1990s, few European countries used national tests. In the 1990s, ten countries / regions introduced standardised assessment, and since the early 2000s, ten more followed suit. By 2009, only five European education systems had no national student assessments.<ref name="Rey"/>

      The impact of these international standardised assessments in the field of educational policy has been significant, in terms of the creation of ''new knowledge'', changes in ''assessment policy'', and ''external influence over national educational policy'' more broadly.<ref name=":1">{{Cite journal |last1=Kijima |first1=Rie |last2=Lipscy |first2=Phillip Y. |date=2024-01-01 |title=The politics of international testing |journal=The Review of International Organizations |language=en |volume=19 |issue=1 |pages=1–31 |doi=10.1007/s11558-023-09494-4 |issn=1559-744X|doi-access=free }}</ref><ref name=":2">{{Cite journal |last1=Ramirez |first1=Francisco O. |last2=Schofer |first2=Evan |last3=Meyer |first3=John W. |date=2018 |title=International Tests, National Assessments, and Educational Development (1970–2012) |url=https://www.journals.uchicago.edu/doi/10.1086/698326 |journal=Comparative Education Review |language=en |volume=62 |issue=3 |pages=344–364 |doi=10.1086/698326 |issn=0010-4086|url-access=subscription }}</ref><ref>{{Cite journal |last1=Kamens |first1=David H.|last2=McNeely |first2=Connie L.|date=2010 |title=Globalization and the Growth of International Educational Testing and National Assessment |url=https://www.journals.uchicago.edu/doi/10.1086/648471 |journal=Comparative Education Review |language=en |volume=54 |issue=1 |pages=5–25 |doi=10.1086/648471 |issn=0010-4086|url-access=subscription }}</ref>

      === Creation of new knowledge ===
      Data from international standardised assessments can be useful in research on causal factors within or across education systems.<ref name="Rey"/> Mons notes that the databases generated by large-scale international assessments have made it possible to carry out inventories and comparisons of education systems on an unprecedented scale<ref group="note">40 countries participated back then, and 81 countries and economies participated in the 2022 data collection.</ref> on themes ranging from the conditions for learning mathematics and reading, to institutional autonomy and admissions policies.<ref name="Mons">{{cite journal|last=Mons|first=N|year=2008|title=Évaluation des politiques éducatives et comparaisons internationales|journal=Revue française de pédagogie|language=fr|volume=164|issue=July–August–September 2008|pages=5–13|doi=10.4000/rfp.1985}}</ref> They allow typologies to be developed that can be used for comparative statistical analyses of education performance indicators, thereby identifying the consequences of different policy choices. They have generated new knowledge about education: PISA findings have challenged deeply embedded educational practices, such as the early tracking of students into vocational or academic pathways.<ref name="Breaks">{{cite journal |last=Breakspear |first=S. |title=The Policy Impact of PISA: An Exploration of the Normative Effects of International Benchmarking in School System Performance |journal=OECD Education Working Paper |volume=71 |date=2012 |doi=10.1787/5k9fdfqffr28-en |series=OECD Education Working Papers |doi-access=free }}</ref>

      Barroso and de Carvalho find that PISA provides a common reference connecting academic research in education and the political realm of public policy, operating as a mediator between different strands of knowledge from the realm of education and public policy.<ref name="Barroso">{{cite journal|last1=Barroso|first1=J.|last2=de Carvalho|first2=L.M.|year=2008|title=Pisa: Un instrument de régulation pour relier des mondes|journal=Revue française de pédagogie|language=fr|volume=164|issue=164 |pages=77–80|doi=10.4000/rfp.2133 }}</ref> However, although the key findings from comparative assessments are widely shared in the research community<ref name="Rey"/> the knowledge they create does not necessarily fit with government reform agendas; this leads to some inappropriate uses of assessment data.

      ===Changes in national assessment policy===
      Emerging research suggests that international standardised assessments are having an impact on national assessment policy and practice. PISA is being integrated into national policies and practices on assessment, evaluation, curriculum standards and performance targets; its assessment frameworks and instruments are being used as best-practice models for improving national assessments; many countries have explicitly incorporated and emphasise PISA-like competencies in revised national standards and curricula; others use PISA data to complement national data and validate national results against an international benchmark.<ref name="Breaks"/>

      ===External influence over national educational policy===

      PISA may influence national education policy choices in a variety of ways. Participation in international assessments like PISA has been linked to significant education policy changes and outcomes, such as higher student enrollments and education reforms.<ref name=":1" /> However, critics have argued that participation could lead to undesirable outcomes, such as higher repetition rates and narrowing of curricula.<ref name=":2" /> The impact of PISA may also vary according to the specific country context.<ref>{{Cite journal |last1=Martens |first1=Kerstin |last2=Niemann |first2=Dennis |date=2013 |title=When Do Numbers Count? The Differential Impact of the PISA Rating and Ranking on Education Policy in Germany and the US |url=http://www.tandfonline.com/doi/abs/10.1080/09644008.2013.794455 |journal=German Politics |language=en |volume=22 |issue=3 |pages=314–332 |doi=10.1080/09644008.2013.794455 |issn=0964-4008}}</ref>

      Policy-makers in most participating countries see PISA as an important indicator of system performance; PISA reports can define policy problems and set the agenda for national policy debate; policymakers seem to accept PISA as a valid and reliable instrument for internationally benchmarking system performance and changes over time; most countries—irrespective of whether they performed above, at, or below the average PISA score—have begun policy reforms in response to PISA reports.<ref name="Breaks"/>

      Against this, impact on national education systems varies markedly. For example, in Germany, the results of the first PISA assessment caused the so-called 'PISA shock': a questioning of previously accepted educational policies; in a state marked by jealously guarded regional policy differences, it led ultimately to an agreement by all Länder to introduce common national standards and even an institutionalised structure to ensure that they were observed.<ref name="Ertl">{{cite journal |last=Ertl |first=H. |year=2006 |title=Educational standards and the changing discourse on education: the reception and consequences of the PISA study in Germany |journal=Oxford Review of Education |volume=32 |issue=5 |pages=619–634 |doi=10.1080/03054980600976320 |s2cid=144656964 }}</ref> In Hungary, by comparison, which shared similar conditions to Germany, PISA results have not led to significant changes in educational policy.<ref name="Bajomi">{{cite web|archive-url=https://web.archive.org/web/20170202010611/http://www.knowandpol.eu/IMG/pdf/pisa.wp12.hungary.pdf|last1=Bajomi|first1=I.|last2=Berényi|first2=E.|last3=Neumann|first3=E.|last4=Vida|first4=J.|year=2009|title=The Reception of PISA in Hungary' accessed January 2017|website=Knowledge and Policy|language=en|archive-date=2017-02-02|url=http://www.knowandpol.eu/IMG/pdf/pisa.wp12.hungary.pdf|url-status=dead}}</ref>

      Because many countries have set national performance targets based on their relative rank or absolute PISA score, PISA assessments have increased the influence of their (non-elected) commissioning body, the OECD, as an international education monitor and policy actor, which implies an important degree of 'policy transfer' from the international to the national level; PISA in particular is having "an influential normative effect on the direction of national education policies".<ref name="Breaks"/> Thus, it is argued that the use of international standardised assessments has led to a shift towards international, external accountability for national system performance; Rey contends that PISA surveys, portrayed as objective, third-party diagnoses of education systems, actually serve to promote specific orientations on educational issues.<ref name="Rey"/>

      National policy actors refer to high-performing PISA countries to "help legitimise and justify their intended reform agenda within contested national policy debates".<ref name="Break">Steiner-Khamsi (2003), cited by {{cite journal |last=Breakspear |first=S. |title=The Policy Impact of PISA: An Exploration of the Normative Effects of International Benchmarking in School System Performance |journal=OECD Education Working Paper |volume=71 |date=2012 |doi=10.1787/5k9fdfqffr28-en |series=OECD Education Working Papers |doi-access=free }}</ref> PISA data can be "used to fuel long-standing debates around pre-existing conflicts or rivalries between different policy options, such as in the French Community of Belgium".<ref name="Mang">{{cite journal |last1=Mangez |first1=Eric |last2=Cattonar |first2=Branka|url=https://dial.uclouvain.be/pr/boreal/object/boreal%3A71171/datastream/PDF_01/view |title=The status of PISA in the relationship between civil society and the educational sector in French-speaking Belgium|journal=Sísifo: Educational Sciences Journal|publisher=Educational Sciences R&D Unit of the University of Lisbon|issue=10|date=September–December 2009|issn=1646-6500|pages=15–26|access-date=26 December 2017}}</ref> In such instances, PISA assessment data are used selectively: in public discourse governments often only use superficial features of PISA surveys such as country rankings and not the more detailed analyses. Rey (2010:145, citing Greger, 2008) notes that often the real results of PISA assessments are ignored as policymakers selectively refer to data in order to legitimise policies introduced for other reasons.<ref name="Greger">{{Cite journal|first=Greger|last=D.|year=2008|title=Lorsque PISA importe peu. Le cas de la République Tchèque et de l'Allemagne|journal=Revue française de pédagogie|language=fr|volume=164|issue=164 |pages=91–98|doi=10.4000/rfp.2138 }} cited in {{harvnb|Rey|2010|p=145}}</ref>

      In addition, PISA's international comparisons can be used to justify reforms with which the data themselves have no connection; in Portugal, for example, PISA data were used to justify new arrangements for teacher assessment (based on inferences that were not justified by the assessments and data themselves); they also fed the government's discourse about the issue of pupils repeating a year, (which, according to research, fails to improve student results).<ref name="Alfons">{{cite journal|last1=Afonso|first1=Natércio|last2=Costa|first2=Estela|url=http://repositorio.ul.pt/bitstream/10451/5667/2/Afonso%20%26%20Costa%20(2009).%20ENG%20D4.pdf|title=The influence of the Programme for International Student Assessment (PISA) on policy decision in Portugal: the education policies of the 17th Portuguese Constitutional Government|journal=Sísifo: Educational Sciences Journal|publisher=Educational Sciences R&D Unit of the University of Lisbon|issue=10|date=September–December 2009|issn=1646-6500|pages=53–64|access-date=26 December 2017}}</ref> In Finland, the country's PISA results (that are in other countries deemed to be excellent) were used by Ministers to promote new policies for 'gifted' students.<ref name="Raut">{{cite journal |last1=Rautalin |first1=M. |last2=Alasuutari |year=2009 |title=The uses of the national PISA results by Finnish officials in central government |journal=Journal of Education Policy |volume=24 |issue=5 |pages=539–556 |doi=10.1080/02680930903131267 |s2cid=154584726 }}</ref> Such uses and interpretations often assume causal relationships that cannot legitimately be based upon PISA data which would normally require fuller investigation through qualitative in-depth studies and [[longitudinal surveys]] based on mixed quantitative and qualitative methods,<ref name="Egel">{{cite journal|last=Egelund|first=N.|year=2008|title=The value of international comparative studies of achievement – a Danish perspective|journal=Assessment in Education: Principles, Policy & Practice|language=en|volume=15|issue=3|pages=245–251|doi=10.1080/09695940802417400}}</ref> which politicians are often reluctant to fund.

      Recent decades have witnessed an expansion in the uses of PISA and similar assessments, from assessing students' learning, to connecting "the educational realm (their traditional remit) with the political realm".<ref>{{Cite book|last=Behrens|first=M.|year=2006|chapter=Préface|editor1-last=Mons|editor1-first=N.|editor2-last=Pons|editor2-first=X.|title=Les standards en éducation dans le monde francophone|language=fr|location=Neuchâtel|publisher=IRDP}} cited in {{harvnb|Rey|2010|p=142}}</ref> This raises the question of whether PISA data are sufficiently robust to bear the weight of the major policy decisions that are being based upon them, for, according to Breakspear, PISA data have "come to increasingly shape, define and evaluate the key goals of the national / federal education system".<ref name="Breaks"/> This implies that those who set the PISA tests – e.g. in choosing the content to be assessed and not assessed – are in a position of considerable power to set the terms of the education debate, and to orient educational reform in many countries around the globe.<ref name="Breaks"/>

      ==Framework==
      PISA stands in a tradition of international school studies, undertaken since the late 1950s by the [[International Association for the Evaluation of Educational Achievement]] (IEA). Much of PISA's methodology follows the example of the [[Trends in International Mathematics and Science Study]] (TIMSS, started in 1995), which in turn was much influenced by the U.S. [[National Assessment of Educational Progress]] (NAEP). The reading component of PISA is inspired by the IEA's [[Progress in International Reading Literacy Study]] (PIRLS).

      PISA aims to test [[literacy]] of students in three competence fields: reading, mathematics, science on an indefinite scale.<ref>{{cite web|last=Hefling|first=Kimberly|date=3 December 2013|title=Asian nations dominate international test|url=https://news.yahoo.com/asian-nations-dominate-international-test-100159386.html|publisher=Yahoo!|archive-url=https://web.archive.org/web/20131205192442/https://news.yahoo.com/asian-nations-dominate-international-test-100159386.html|archive-date=5 December 2013|url-status=dead}}</ref>

      The PISA mathematics literacy test asks students to apply their mathematical knowledge to solve problems set in real-world contexts. To solve the problems students must activate a number of mathematical competencies as well as a broad range of mathematical content knowledge. TIMSS, on the other hand, measures more traditional classroom content such as an understanding of fractions and decimals and the relationship between them (curriculum attainment). PISA claims to measure education's application to real-life problems and [[lifelong learning]] (workforce knowledge).

      In the reading test, "OECD/PISA does not measure the extent to which 15-year-old students are fluent readers or how competent they are at word recognition tasks or spelling." Instead, they should be able to "construct, extend and reflect on the meaning of what they have read across a wide range of continuous and non-continuous texts."<ref>{{cite web|url=http://www.pisa.oecd.org/dataoecd/38/52/33707212.pdf |title=Chapter 2 of the publication 'PISA 2003 Assessment Framework' |publisher=Pisa.oecd.org |archive-url=https://web.archive.org/web/20051217041324/http://www.pisa.oecd.org/dataoecd/38/52/33707212.pdf |archive-date=17 December 2005 |url-status=dead }}</ref>

      PISA also assesses students in innovative domains. In 2012 and 2015 in addition to reading, mathematics and science, they were tested in collaborative problem solving. In 2018 the additional innovative domain was global competence.

      ==Implementation==
      PISA is sponsored, governed, and coordinated by the OECD, but paid for by participating countries.{{citation needed|date=June 2021}}

      ==Method of testing==

      ===Sampling===
      The students tested by PISA are aged between 15 years and 3 months and 16 years and 2 months at the beginning of the assessment period. The school year pupils are in is not taken into consideration. Only students at school are tested, not home-schoolers. In PISA 2006, however, several countries also used a grade-based sample of students. This made it possible to study how age and school year interact.

      To fulfill OECD requirements, each country must draw a sample of at least 5,000 students. In small countries like [[Iceland]] and [[Luxembourg]], where there are fewer than 5,000 students per year, an entire age cohort is tested. Some countries used much larger samples than required to allow comparisons between regions.

      ===Test===
      [[File:Pisatest.jpg|thumb|PISA test documents on a school table (Neues Gymnasium, Oldenburg, Germany, 2006)]]

      Each student takes a two-hour computer based test. Part of the test is multiple-choice and part involves fuller answers. There are six and a half hours of assessment material, but each student is not tested on all the parts. Following the cognitive test, participating students spend nearly one more hour answering a questionnaire on their background including learning habits, motivation, and family. School directors fill in a questionnaire describing school demographics, funding, etc. In 2012 the participants were, for the first time in the history of large-scale testing and assessments, offered a new type of problem, i.e. interactive (complex) problems requiring exploration of a novel virtual device.<ref>{{cite journal|url=http://oecdinsights.org/2014/04/01/pisa-we-have-a-problem/|last=Keeley|first=B.|title=PISA, we have a problem…|archive-url=https://web.archive.org/web/20210617031839/https://oecdinsights.org/2014/04/01/pisa-we-have-a-problem/ |archive-date=17 June 2021 |url-status=dead |journal=OECD Insights|date=April 2014}}</ref><ref>{{cite web|last=Poddiakov|first=Alexander|authorlink=Alexander Poddiakov|url=https://ssrn.com/abstract=2432598|title=Complex Problem Solving at PISA 2012 and PISA 2015: Interaction with Complex Reality|website=SSRN|language=en}} // Translated from Russian. Reference to the original Russian text: {{cite journal|last=Poddiakov|first=A.|year=2012|title=Reshenie kompleksnykh problem v PISA-2012 i PISA-2015: vzaimodeistvie so slozhnoi real'nost'yu|journal=Obrazovatel'naya Politika|language=ru|volume=6|pages=34–53}}</ref>

      In selected countries, PISA started experimentation with [[computer adaptive testing]].

      ===National add-ons===
      Countries are allowed to combine PISA with complementary national tests.

      Germany does this in a very extensive way: On the day following the international test, students take a national test called {{ill|PISA-E|de}} (E=Ergänzung=complement). Test items of PISA-E are closer to TIMSS than to PISA. While only about 5,000 German students participate in the international and the national test, another 45,000 take the national test only. This large sample is needed to allow an analysis by federal states. Following a clash about the interpretation of 2006 results, the OECD warned Germany that it might withdraw the right to use the "PISA" label for national tests.<ref>{{cite web|last=C.|first=Füller|title=Pisa hat einen kleinen, fröhlichen Bruder|website=taz|language=de|date=5 December 2007|url=http://www.taz.de/nc/1/archiv/print-archiv/printressorts/digi-artikel/?ressort=bi&dig=2007%2F12%2F05%2Fa0140&src=GI&cHash=f350b212d5}}</ref>

      ===Data scaling===
      From the beginning, PISA has been designed with one particular method of data analysis in mind. Since students work on different test booklets, raw scores must be 'scaled' to allow meaningful comparisons. Scores are thus scaled so that the OECD average in each domain (mathematics, reading and science) is 500 and the [[standard deviation]] is 100.<ref name=stanat2002pisa>{{citation|title = PISA 2000: Overview of the study—Design, method and results|last1 = Stanat|first1 = P|last2 = Artelt|first2 = C|last3 = Baumert|first3 = J |last4 = Klieme|first4 = E|last5 = Neubrand|first5 = M|last6 = Prenzel|first6 = M|last7 = Schiefele|first7 = U|last8 = Schneider|first8 = W|place = Berlin|publisher = Max Planck Institute for Human Development|year = 2002}}</ref> This is true only for the initial PISA cycle when the scale was first introduced, though, subsequent cycles are linked to the previous cycles through IRT scale linking methods.<ref name = Mazzeo2013etal>{{citation|title = Linking Scales in International Large-Scale Assessments, chapter 10 in Rutkowski, L. von Davier, M. & Rutkowski, D. (eds.) Handbook of International Large-Scale Assessment: Background, Technical Issues, and Methods of Data Analysis.|last1 = Mazzeo|first1 = John|last2 = von Davier|first2 = Matthias|place = New York|publisher = Chapman and Hall/CRC.|year = 2013}}</ref>

      This generation of proficiency estimates is done using a latent regression extension of the [[Rasch model]], a model of [[item response theory]] (IRT), also known as conditioning model or population model. The proficiency estimates are provided in the form of so-called plausible values, which allow unbiased estimates of differences between groups. The latent regression, together with the use of a Gaussian [[prior probability]] distribution of student competencies allows estimation of the proficiency distributions of groups of participating students.<ref name="vonDavierM2013etal">{{citation|title = Analytics in International Large-Scale Assessments: Item Response Theory and Population Models, chapter 7 in Rutkowski, L. von Davier, M. & Rutkowski, D. (eds.) Handbook of International Large-Scale Assessment: Background, Technical Issues, and Methods of Data Analysis.|last1 = von Davier|first1 = Matthias|last2 = Sinharay|first2 = Sandip|place = New York|publisher = Chapman and Hall/CRC.|year = 2013}}</ref> The scaling and conditioning procedures are described in nearly identical terms in the Technical Reports of PISA 2000, 2003, 2006. NAEP and TIMSS use similar scaling methods.

      ==Ranking results==

      All PISA results are tabulated by country; recent PISA cycles have separate provincial or regional results for some countries. Most public attention concentrates on just one outcome: the mean scores of countries and their rankings of countries against one another. In the official reports, however, country-by-country rankings are given not as simple league tables but as cross tables indicating for each pair of countries whether or not mean score differences are [[statistical significance|statistically significant]] (unlikely to be due to random fluctuations in student sampling or in item functioning). In favorable cases, a difference of 9 points is sufficient to be considered significant.{{citation needed|date=April 2012}}

      PISA never combines mathematics, science and reading domain scores into an overall score. However, commentators have sometimes combined test results from all three domains into an overall country ranking. Such meta-analysis is not endorsed by the OECD, although official summaries sometimes use scores from a testing cycle's principal domain as a proxy for overall student ability.

      ===PISA 2022 ranking summary===
      The results of PISA 2022 were presented on 5 December 2023, which included data for around 700,000 participating students in 81 countries and economies, with [[Singapore]] emerging as the top performer in all categories.<ref name=":3">{{Cite web |title=Learning Data {{!}} QEdu Países. |url=https://paises.qedu.org.br/en/learning-data/ |access-date=2024-05-21 |website=paises.qedu.org.br}}</ref>

      Both [[Lebanon]] and the Chinese provinces/municipalities of [[Beijing]], [[Shanghai]], [[Jiangsu]] and [[Zhejiang]] participated this edition, but their results were not published as they were not able to fully collect data because of COVID restrictions.<ref>{{Cite web |title=PISA 2022 Participants |url=https://www.oecd.org/pisa/aboutpisa/pisa-2022-participants.htm |access-date=21 May 2024 |website=OECD – PISA}}</ref>

      Because of the [[Russian invasion of Ukraine|Russian full-scale invasion of Ukraine]], only 18 of 27 Ukrainian regions had their data collected, thus the results are not representative of the following regions: [[Dnipropetrovsk Oblast]], [[Donetsk Oblast]], [[Kharkiv Oblast]], [[Luhansk Oblast]], [[Zaporizhzhia Oblast]], [[Kherson Oblast]], [[Mykolaiv Oblast]], the [[Autonomous Republic of Crimea]] and the city of [[Sevastopol]].<ref>{{Cite book |last=OECD |url=https://www.oecd-ilibrary.org/education/pisa-2022-results-volume-i_53f23881-en |title=PISA 2022 Results (Volume I): The State of Learning and Equity in Education |date=2023 |publisher=Organisation for Economic Co-operation and Development |location=Paris |language=en |doi=10.1787/53f23881-en|isbn=978-92-64-99796-7 }}</ref>
