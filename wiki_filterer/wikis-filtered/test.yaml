      {{Short description|Types of disciplinary actions used by schools against students}}
      {{distinguish|Academic discipline}}
      {{Multiple issues|
      {{Refimprove|date=January 2024}}
      {{Globalize|1=article|2=United States|date=February 2026}}
      }}
      [[File:Harper's Weekly 8-27-98 cover.JPG|thumb|A ''[[Harper's Weekly]]'' cover from 1898 shows a [[caricature]] of school discipline.]]
      [[File:School Punishment Register, c.1880 (5454012443).jpg|thumb|This Punishment Book, from the school attended by [[Henry Lawson]], is one of the earliest surviving examples of this type of record.]]

      '''School discipline''' relates to actions taken by teachers or school organizations toward students when their behavior [[Disorderly conduct|disrupts]] the ongoing educational activity or breaks a rule created by the school. [[Discipline]] can guide the children's behavior or set limits to help them learn to take better care of themselves, other people and the world around them.<ref name="what is discipline">{{Cite web |url=http://users.metu.edu.tr/e133376/project/Whatisdiscipline.htm |title=What is Discipline? |website=users.metu.edu.tr |access-date=May 17, 2016 |archive-date=May 5, 2016 |archive-url=https://web.archive.org/web/20160505151412/http://users.metu.edu.tr/e133376/project/Whatisdiscipline.htm }}</ref>

      School systems set rules, and if students break these rules they are subject to discipline. These rules may, for example, define the expected standards of [[School uniform|school uniforms]], punctuality, social conduct, and work ethic.  The term "discipline" is applied to the action that is the consequence of breaking the rules. The aim of discipline is to set limits restricting certain behaviors or attitudes that are seen as harmful or against school policies, educational norms, school traditions, etc.<ref name="what is discipline" /> The focus of discipline is shifting, and alternative approaches are emerging due to notably high dropout rates, disproportionate punishment upon minority students, and other [[Educational inequality in the United States|educational inequalities]].{{Citation needed|date=June 2024}}

      == The purpose of discipline ==
      Discipline is a set of consequences determined by the [[school district]] to remedy actions taken by a student that are deemed inappropriate. It is sometimes confused with classroom management, but while discipline is one dimension of classroom management, classroom management is a more general term.<ref name=":0">{{Cite web |url=http://users.metu.edu.tr/e133376/project/Whatisdiscipline.htm |title=What is Discipline? |website=users.metu.edu.tr |access-date=May 7, 2016 |archive-date=May 5, 2016 |archive-url=https://web.archive.org/web/20160505151412/http://users.metu.edu.tr/e133376/project/Whatisdiscipline.htm }}</ref>

      Discipline is typically thought to have a positive influence on both the individual as well as the classroom environment. Utilizing disciplinary actions can be an opportunity for the class to reflect and learn about consequences, instill collective values, and encourage behavior that is acceptable for the classroom. Recognition of the diversity of values within communities can increase understanding and tolerance of different disciplinary techniques.<ref>Scarlett. W. George (February 24, 2015). The SAGE Encyclopedia of Classroom Management</ref> In particular, moderate interventions such as encouraging positive corrections of questionable behavior inside the classroom by clearly showing the boundaries and making it clear that the behavior is unacceptable, as opposed to more severe punishments outside the classroom such as detention, suspension, or expulsion, can promote learning and deter future misbehavior.<ref>{{cite journal |author=Burger, C. |author2=Strohmeier, D. |author3=Kollerová, L. | journal=Journal of Youth and Adolescence | title=Teachers can make a difference in bullying: Effects of teacher interventions on students' adoption of bully, victim, bully-victim or defender roles across time | date= 2022 | volume=51 | issue=12 | pages=2312–2327 | issn=0047-2891 | doi=10.1007/s10964-022-01674-6| pmid=36053439 | pmc=9596519 | s2cid=252009527 }}</ref><ref name=":3">What is Positive School Discipline? (2013). Education Development Center. http://positiveschooldiscipline.promoteprevent.org/what-positive-school-discipline</ref> Learning to "own" one's bad behavior is also thought to contribute to positive growth in social emotional learning.<ref>Chadsey, Terry and Jody McVittie (August 2006). The Positive Discipline Association.http://www.positivediscipline.org/resources/Documents/PDSbrchr-8-06.pdf</ref>

      == Theory ==
      School discipline practices are generally informed by theory from [[psychologists]] and educators. There are a number of theories to form a comprehensive discipline strategy for an entire school or a particular class.

      *'''Positive approach''' is grounded in teachers' respect for students. This approach instills in students a sense of responsibility by using [[youth/adult partnerships]] to develop and share clear rules, provide daily opportunities for success, and administer in-school suspension for noncompliant students. Based on Glasser's [[Reality Therapy|reality therapy]]. Research (e.g., Allen) is generally supportive of the PAD program.<ref name="Cotton">{{Cite journal |last=Cotton |title=Schoolwide and Classroom Discipline |journal=School Improvement Research Series |publisher=Northwest Regional Educational Laboratory |volume=5 |date=December 1990 |url= http://www.nwrel.org/scpd/sirs/5/cu9.html |url-status=unfit |archive-url= https://web.archive.org/web/20080212033545/http://www.nwrel.org/scpd/sirs/5/cu9.html |archive-date=February 12, 2008}})</ref>
      *'''Teacher effectiveness training''' differentiates between teacher-owned and student-owned problems, and proposes different strategies for dealing with each. Students are taught problem-solving and negotiation techniques. Researchers (e.g., Emmer and Aussiker) find that teachers like the programme and that their behaviour is influenced by it, but effects on student behaviour remain unclear.<ref name="Cotton" />
      *'''[[Adlerian]] approaches''' is an umbrella term for a variety of methods which emphasize understanding the individual's reasons for maladaptive behavior and helping misbehaving students to alter their behavior, whilst at the same time finding ways to get their needs met. Named after psychiatrist [[Alfred Adler]], these approaches have shown some positive effects on self-concept, attitudes, and locus of control, but effects on behavior are inconclusive (Emmer and Aussiker).<ref name="Cotton" /> Not only were the statistics on suspensions and vandalism significant, but also the recorded interview of teachers demonstrates the improvement in student attitude and behaviour, school atmosphere, academic performance, and beyond that, personal and professional growth.<ref>Efficacy of Class Meetings in Elementary Schools, Ann Roeder Platt, B.A., California State University, Sacramento. The University of San Francisco, The Effectiveness of Alderian Parent and Teacher Study Groups in Changing Child Maladaptive Behavior in a Positive Direction. [[Jane Nelsen]]</ref>
      *'''Appropriate school learning theory and educational philosophy''' is a strategy for preventing violence and promoting order and discipline in schools, put forward by educational philosopher [[Daniel Greenberg (educator)|Daniel Greenberg]]<ref>Greenberg, 1987</ref> and practiced by the [[Sudbury Valley School]].<ref>The Sudbury Valley School (1970). [https://books.google.com/books?id=MAqxzEss8k4C&dq=The+Crisis+in+American+Education+%E2%80%94+An+Analysis+and+a+Proposal,+The+Sudbury+Valley+School+(1970),+Law+and+Order:+Foundations+of+Discipline&pg=PA49 ''Law and Order: Foundations of Discipline''], [https://books.google.com/books?id=MAqxzEss8k4C&q=The+Sudbury+Valley+School+The+Crisis+in+American+Education+%E2%80%94+An+Analysis+and+a+Proposal The Crisis in American Education — An Analysis and a Proposal.] (p. 49-55). Retrieved February 10, 2010.</ref><ref>Greenberg, D. (1987). [http://www.sudval.com/05_onepersononevote.html#02 ''With Liberty and Justice for All''] {{Webarchive|url=https://web.archive.org/web/20110511180710/http://www.sudval.com/05_onepersononevote.html#02 |date=May 11, 2011 }}, Free at Last, The Sudbury Valley School. Retrieved February 10, 2010.</ref><ref>Greenberg, D. (1987). [http://www.sudval.com/05_underlyingideas.html#09 ''Back to Basics''] {{Webarchive|url=https://web.archive.org/web/20110511175026/http://www.sudval.com/05_underlyingideas.html#09 |date=May 11, 2011 }}, The Sudbury Valley School Experience. Retrieved February 10, 2010.</ref>
      Some scholars think students misbehave because of the lack of engagement and stimulation in typical school settings, a rigid definition of acceptable behaviors and a lack of attention and love in a student's personal life. In the United States, scholars have begun to explore alternative explanations for why students are being disciplined, in particular the disproportionate rate of discipline towards African-American and minority students.
      * '''Lack of engagement and stimulation''' – students are curious and constantly searching for meaning and stimulation in the school environment. Classes that are too one-dimensional, that fail to involve students sufficiently, are too challenging or are content intensive (leaving little room for discussion and consideration), will not satisfy students' curiosities or needs for authentic intellectual stimulation.<ref name=":1">{{Cite web|date=May 26, 2015|title=Why Kids Misbehave in Classrooms|url=http://www.huffingtonpost.com/naphtali-hoff/why-kids-misbehave-in-classrooms_b_7441730.html|access-date=May 7, 2016|website=The Huffington Post}}</ref>
      * '''A rigid definition of acceptable behavior''' – Most students, particularly older ones, are asked to sit at their desks for too long and listen, read, and take notes. Teachers who fail to offer opportunities for movement and interpersonal engagement are likelier to have to use strictness and rules to maintain law and order.<ref name=":1" />{{unreliable source?|date=October 2016}}<ref name=":3" />
      * '''Lack of attention and love''' – When students fail to receive the attention that they crave, they are likelier to find other ways to get it, even if it means drawing negative attention to themselves and even negative consequences. The more teachers let their students know how much they care about them and value their work, the likelier they are to respect a teacher's request and conform to their expectation.<ref name=":1" />

      Other models include:

      ===Obedience===
      Discipline rooted in obedience centers on valuing hard work, diligence, adherence to authority, and self-discipline.<ref>{{multiref2|1={{cite book |last1=Coopersmith |first1=Stanley |title=The antecedents of self-esteem |year=1967 |location=San Francisco|publisher=Freeman |isbn=978-0-89106-017-8 |url=https://books.google.com/books?id=xvhGAAAAMAAJ}}
      |2={{cite book|last=Coopersmith|first=Stanley|year=1975|title=Developing motivation in young children|location=San Francisco|publisher=Albion}} }}</ref> An obedience-based model uses consequences and punishments as deterrents,<ref>{{cite web |last1=Davis |first1=Ben |title=Why is discipline important in public services? |url=https://www.mvorganizing.org/why-is-discipline-important-in-the-public-services/ |website=mvorganizing |access-date=13 September 2021}}</ref> whereas the responsibility-based model shifts away from using rules, limits, and consequences, as well as punitive measures like [[School detention|detention]], suspension, expulsion, and counseling. Students have demonstrated improved academic success and better behavior management in schools with responsibility-centered discipline.<ref name="auto1">{{cite web |title=Responsibility-Centered Discipline |url=https://www.givemfive.com/wp-content/uploads/2021/03/RCD-Brochure_March-2-2021.pdf |website=givemfive |publisher=©c AccuTrain Corporation |access-date=13 September 2021}}</ref> 

      ===Responsibility===
      Responsibility-centered discipline, also known as responsibility-based discipline, is a classroom-oriented technique that empowers students to find solutions to organizational issues.<ref>{{cite book |last=Grote |first=Dick |year=2006 |title=The Birth of Discipline Without Punishment |publisher=American Management Association International |page=5 |isbn=978-0-8144-7330-6}}</ref> This approach involves fostering appreciation and warmth among students, embracing their interests, recognizing their efforts, encouraging feedback, achieving consensus on ground rules, and engaging them in rule-making and problem-solving, all while maintaining dignity and well-defined boundaries. Concepts like remorse and empathy are taught through actions like apologies, restitution, or creating action plans. Limits express a teacher's beliefs, demands, and expectations within clear values and goals that help create a learning environment. The essence of responsibility-centered discipline is making choices that embody core values such as integrity, perseverance, respect, and responsibility rather than simply enforcing rules.

      ===Assertive===
      Lee and Marlene Canter developed the assertive discipline model. It blends obedience-based principles with responsibility. In this approach, teachers require all students to consent to a set of rules establishing appropriate and inappropriate behaviors, clarifying the necessary corrections if a student exceeds these limits. Teachers acknowledge repetitive behaviors, maintaining an appreciation of good conduct. Disciplinary action must be applied throughout the classroom so all students believe that the rules matter. Simply offering rewards and consequences is not always sufficient; teachers must earn students' respect and trust.

      Assertive discipline attempts to model appropriate behavior for students. Teachers guide students in adhering to behavioral expectations. The Canters emphasize building trust by greeting students, using their names, having one-on-one conversations, acknowledging birthdays and special events, and maintaining communication with parents.<ref name="auto2">{{cite web |last1=Drew |first1=Chris |title=11 Key Features Of Assertive Discipline Theory |url=https://helpfulprofessor.com/assertive-discipline/ |website=helpfulprofessor |date=6 December 2019 |access-date=24 September 2021}}</ref> The model does not concentrate on individual students. It does not address the root causes of misbehavior, nor is it based on the needs of the students.<ref name="auto2"/>

      == Non-corporal forms of disciplinary action ==
      === Detention ===
      Detention, sometimes referred to as DT, is one of the most common punishments in schools in the [[United States]], [[Commonwealth of Nations|the Commonwealth of Nations]], and some other countries. It requires the student to report to a designated room (typically after the end of the school day, or during lunch or recess period) to complete extra work (such as [[writing lines]] or an essay, or the completion of chores). Detention can be supervised by the teacher setting the detention or through a centralised detention system.<ref>{{Cite news |title=Centralised detentions transformed behaviour at our school |url= https://www.tes.com/magazine/article/centralised-detentions-transformed-behaviour-our-school |access-date=August 22, 2021 |website=Tes Magazine |date=October 25, 2019 |first=Calvin |last=Robinson |location= London}}</ref> Detention may require a student to report at a certain time on a non-school day, e.g. "Saturday detention" at some US, UK, and Irish schools (especially for serious offences not quite serious enough for suspension).<ref>{{Cite web |title=Discipline within school |url=https://childlawadvice.org.uk/information-pages/discipline-within-school/ |access-date=December 20, 2024 |website=Coram Children's Legal Centre}}</ref>
      In UK schools, after-school detention can be held the same day as it is issued without parental consent,<ref>{{Cite web |date=January 2016 |title=Behaviour and discipline in schools |url= https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/488034/Behaviour_and_Discipline_in_Schools_-_A_guide_for_headteachers_and_School_Staff.pdf |access-date=August 22, 2021 |website=UK Government}}</ref> and some schools make a detention room available daily, but many will require a student to return to school 1–2 hours after school ends on a specific day, e.g. "Friday Night Detention".<ref>{{cite web |title=Behaviour and discipline in schools: Guidance for governing bodies |url=https://www.gov.uk/government/publications/behaviour-and-discipline-in-schools-guidance-for-governing-bodies |publisher=Department for Education (UK) |date=July 17, 2013 |access-date=October 23, 2015}}</ref> Failure to attend detention without a valid excuse can sometimes result in another being added, or a more severe punishment being administered, such as an in school or out of school suspension.

      In Germany, detention is less common. In some states like Baden-Württemberg there is detention to rework missed school hours, but in others like Rheinland-Pfalz it is prohibited by law. In schools where some classes are held on Saturdays, pupils may get detention on a Saturday even if it is a non-school day for them.

      In China, long-time detention is perhaps less common than in the US, the UK, Ireland, Singapore, Canada, Australia, New Zealand, South Africa, and some other countries. However, short-time detention by the teachers is still common. Teachers may ask the students to do some missed work after school.

      In Australia, the school should consider circumstances when giving detentions. For example, in Victoria, it is recommended that no more than half the time for recess is used for detention, that detentions be held at a reasonable time and place, and when students are kept after school, parents should be informed at least the day before detention, and detention should not exceed 45 minutes.<ref>{{Cite web |url= https://www2.education.vic.gov.au/pal/behaviour-students/guidance/10-managing-and-responding-behaviour-consequences-students |title=Detention |publisher=Victoria State Government |access-date=August 26, 2016}}</ref>

      === Counseling ===
      Counseling is also provided when students will have to see a school counselor (guidance counselor) for misbehavior. The purpose of counseling is to help the student recognize their mistakes and find positive ways to make changes in the student's life. Counseling can also help the student clarify the school's expectations, as well as understand the consequences of failing to meet those standards.

      === Suspension ===
      [[Suspension (punishment)|Suspension]] or temporary exclusion is a mandatory leave assigned to a student as a form of punishment that can last anywhere from one day to a few weeks, during which the student is not allowed to attend regular lessons. In some US, UK, Australian, and Canadian schools, there are two types of suspension: In-school (ISS, internal exclusion, or isolation) and out-of-school (OSS, off-campus suspension, or external exclusion). In-school suspension means that the student comes to school as usual but must report to and stay in a designated room for the entire school day.<ref>{{cite book |last1=Skiba |first1=Russel |editor1-last=Evertson |editor1-first=C.M. |title=Handbook of classroom management: Research, practice, and contemporary issues |date=2006 |publisher=Erlbaum |pages=1063–1092 |chapter=Zero tolerance, suspension, and expulsion: Questions of equity and effectiveness}}</ref> Out-of-school suspension means that the student is banned from entering the school grounds, or being near their campus while suspended from school. A student who breaches an out-of-school suspension (by attending the school during their suspension) may be arrested for trespassing, and repeated breaches may lead to expulsion and/or possible criminal penalties. Students are also not allowed to attend after-school activities (such as proms, sporting events, etc.) while suspended from school. Some schools even utilize a loss of privilege policy that prohibits students returning from an out-of-school suspension from participating in the above mentioned school sponsored activities for as long as 2 weeks.<ref>{{cite web |title=Discipline Policy and Procedures |publisher=[[Delran Township School District]], [[New Jersey]] |url= http://www.delranschools.org/939202221040250/lib/939202221040250/Discipline_Policy_and_Procedures.pdf |access-date=January 25, 2009|archive-date=March 24, 2012|archive-url=https://web.archive.org/web/20120324230832/https://www.delranschools.org/939202221040250/lib/939202221040250/Discipline_Policy_and_Procedures.pdf}}</ref>

      Schools are usually required to notify the student's parents/guardians and sometimes social worker if the suspended student is in special education, and explain the reason for and duration of a suspension. Students involved in physical altercations on campus can be suspended from school for a period of 5 days, while students who throw temper tantrums on campus, direct foul language at school staff members, or engage in verbal altercations with fellow students can be suspended for 3 days.<ref name="APA">{{cite journal |last1=American Psychological Association Zero Tolerance Task Force |title=Are zero tolerance policies effective in the schools? An evidentiary review and recommendations |journal=American Psychologist |date=2008 |volume=63 |issue=9 |pages=852–862 |doi=10.1037/0003-066x.63.9.852 |pmid=19086747|hdl=2027.42/142342 |hdl-access=free }}</ref> Students are often required to continue to learn and complete assignments during their suspension, sometimes receiving no credit for it. This could include a written essay stating that they will not engage again in the behavior that led to the suspension or journal detailing the reason for the student being suspended from school, which they would be required to hand in to a school administrator upon returning to school following their suspension. Sometimes schools will have meetings with the suspended student, the student's parents, a school administrator, and sometimes a social worker in the case of a special education student to discuss and evaluate the matter following an out-of-school suspension.<ref name="APA" /> Studies suggest that school suspension is associated with increased risk of subsequent criminal justice system involvement and lower educational attainment.<ref>{{Cite journal| doi=10.1177/0044118X17752208 | title= Educational and Criminal Justice Outcomes 12 Years After School Suspension | last = Rosenbaum | first = Janet | date=2018 | journal = Youth & Society| volume= 52| issue= 4| pages= 515–547| pmid= 32528191| pmc= 7288849 }}</ref>
      School suspension can also be associated with psychological distress, and to have a bi-directional link with mental illness.<ref>{{Cite news |url= https://www.theguardian.com/education/2017/aug/19/school-exclusion-linked-to-long-term-mental-health-problems |title=School exclusion 'linked to long-term mental health problems' – study |last=Doward |first=Jamie |date=August 19, 2017 |newspaper=The Guardian |location= London |access-date=October 1, 2018}}</ref> In the [[United Kingdom]], excluded children have been targeted by "[[county lines (drug trafficking)|county lines]]" drug traffickers.<ref>{{Cite news |url= https://www.theguardian.com/world/2018/sep/29/excluded-schoolchildren-groomed-by-county-lines-drug-gangs-home-office-report |title='County lines' drug gangs recruit excluded schoolchildren – report |last=Rawlinson |first=Kevin |date=September 28, 2018 |newspaper=The Guardian |location= London |access-date=October 1, 2018}}</ref>

      === Expulsion ===
      {{Main|Expulsion (education)}}
      Expulsion, dismissal, exclusion, withdrawing, or permanent exclusion terminates the student's education at that institution. This is the last resort, when all other methods of discipline have failed.  However, in extreme situations, it may also be used for an exceptionally serious 'one-off' offense, such as setting fires on campus, the activation of false alarms, or assault and battery against faculty and staff members, killing students or teachers,  or school administrators, bomb threats, breaking into classrooms and school offices outside of school hours, and vandalism of school property. Setting off fireworks and firecrackers on campus can result in expulsion as well.<ref>{{Citation |title=Improving Behaviour and Attendance: Guidance on Exclusion from Schools and Pupil Referral Units |publisher=[[Department for Children, Schools and Families]], England |work=Teachernet |url=http://publications.teachernet.gov.uk/eOrderingDownload/DfES%200087%20200MIG1262.pdf |access-date=January 25, 2009}}</ref> Some education authorities have a nominated school in which all excluded students are collected; this typically has a much higher staffing level than mainstream schools. In some US public schools, expulsions are so serious that they require an appearance before the Board of Education or the court system. In the UK, head teachers may make the decision to exclude, but the student's parents have the right of appeal to the local education authority. It was completely banned for compulsory schools in China. This has proved controversial in cases where the head teacher's decision has been overturned (and his or her authority thereby undermined), and there are proposals to abolish the right of appeal. In the United States, when it comes to student discipline, there is a marked difference in procedure between public and private institutions.

      With public schools, the school must provide the student with limited constitutional [[due process]] protections as public educational institutions operate as an extension of state governments. Conversely, with private schools, the student can be expelled for any reason – provided that the expulsion was not "arbitrary and capricious." In Virginia, as long as a private school follows the procedures in its student handbook, a court will likely not view its actions as arbitrary and capricious.<ref>{{cite web |url=http://www.idefendva.com/virginia-student-defense-lawyer |title=The Difference Between Public and Private School Disciplinary Hearings}}</ref>

      === Restorative justice ===
      {{Main|Restorative justice}}
      In schools, restorative justice is an offshoot of the model used by some courts and law enforcement; it seeks to repair the harm that has been done by acknowledging the impact on the victim, community, and offender, accepting responsibility for the wrongdoing, and repairing the harm that was caused. Restorative practices can "also include preventive measures designed to build skills and capacity in students as well as adults." Some examples of preventative measures in restorative practices might include teachers and students devising classroom expectations together or setting up community building in the classroom. Restorative justice also focuses on justice as needs and obligations, expands justice as conversations between the offender, victim and school, and recognizes accountability as understanding the impact of actions and repairing the harm. Traditional styles of discipline do not always work well for students across every cultural community. As an alternative to the normative approaches of corporal punishment, detention, counseling, suspension, and expulsion, restorative justice was established to give students a voice in their consequences, as well as an opportunity to make a positive contribution to their community.<ref>{{Cite web |title=Restorative Justice: Resources for Schools |url=https://www.edutopia.org/blog/restorative-justice-resources-matt-davis |access-date=2023-12-14 |website=Edutopia |language=en}}</ref>

      Restorative justice typically involves peer-mediation or adult-supervised conversations surrounding a perceived offence. Each student has the ability to contribute to the conversation, the person who has misbehaved has the opportunity not only to give their side of the story but also has a say in their consequence. Consequences defy the traditional methods of punitive punishment and instead give students an opportunity for restoration.<ref>Dalporto, Deva (2013). Restorative Justice: A Different Approach to Discipline. We Are Teachers. Retrieved December 1, 2016. http://www.weareteachers.com/restorative-justice-a-different-approach-to-discipline/</ref> Restorative justice focuses on relationship building and the community as a whole over the individual student and their offence, creating a sense that everyone has a part in the community and it is everyone's responsibility to uphold the values of the particular community.<ref>Editors of Rethinking Schools (2014). Restorative Justice: What it is and is not. Rethinking Schools. Retrieved December 1, 2016.http://www.rethinkingschools.org/archive/29_01/edit1291.shtml</ref> This is a method that not only increases an understanding of perceived community values, but is also a method thought to work well in cultures and communities where there is a high value on the community, rather than just on the individual.

      In 2012, the U.S. Commission on Civil Rights released a report entitled "School Discipline and Disparate Impact," which was somewhat critical of the Department of Education's approach to school discipline.<ref>U.S. Commission on Civil Rights, [https://www.usccr.gov/pubs/docs/School_Disciplineand_Disparate_Impact.pdf School Discipline and Disparate Impact] (2012).</ref>

      == Corporal punishment ==
      {{Main|School corporal punishment}}
      Throughout the [[history of education]], the most common means of maintaining discipline in schools was [[school corporal punishment|corporal punishment]]. While a child was in school, a teacher was expected to act as a [[in loco parentis|substitute parent]], with many forms of parental discipline or rewards open to them. This often meant that students were commonly chastised with the [[birching|birch]], [[caning|cane]], [[Paddle (spanking)|paddle]], [[Strapping (punishment)|strap]] or [[yardstick]] if they did something wrong. Around 69 countries still use school corporal punishment.

      Corporal punishment in schools has now disappeared from most Western countries, including all European countries. In the United States, corporal punishment is not used in public schools in 36 states, [[banned]] in 33, and permitted in 17, of which only 14 actually have school districts actively administering corporal punishment. Every U.S. state except [[New Jersey]] and [[Iowa]] permits corporal punishment in private schools, but an increasing number of private schools have abandoned the practice, especially Catholic schools.  Thirty-one U.S. states as well as the [[Washington, D.C.|District of Columbia]] have banned corporal punishment from public schools, most recently [[Colorado]] in 2023. The other 17 states (mostly in [[Southern United States|the South]]) continue to allow corporal punishment in public schools. Of the 17 which permit the practice, three – [[Arizona]], [[North Carolina]], [[Wyoming]] have no public schools that actually use corporal punishment as of 2023. In [[North Carolina]] however, all school districts have banned the practice. Paddling is still used to a significant (though declining) degree in some public schools in [[Alabama]], [[Arkansas]], [[Georgia (U.S. state)|Georgia]], [[Louisiana]], [[Mississippi]], [[Missouri]], [[Oklahoma]], [[Tennessee]] and [[Texas]]. Private schools in these and most other states may also use it, though many choose not to do so.
      [[File:StateLibQld 1 113036 Cartoon of students receiving the cane, 1888.jpg|thumb|A cartoon picture that shows students receiving "Corporal Punishment"]]
      Official corporal punishment, often by [[caning]], remains commonplace in schools in some Asian, African and Caribbean countries.

      Most mainstream schools in most other countries retain punishment for misbehavior, but it usually takes non-corporal forms such as detention and suspension.

      In China, school corporal punishment was completely banned under the Article 29 of the Compulsory Education Act of the People's Republic of China, but in practice, beating by schoolteachers is still common, especially in rural areas.

      In Australia, school corporal punishment has been banned in public schools in all states, but as of 2019, it is still permitted in private schools in Queensland and the Northern Territory.<ref name=":2">{{Cite web |url=http://www.abc.net.au/news/2014-07-16/kevin-donnelly-slammed-over-corporal-punishment-comments/5600408 |title=Federal Government rules out return of corporal punishment, after curriculum adviser says it can be 'very effective' |date=July 16, 2014 |website=ABC NEWS |access-date=May 7, 2016}}</ref>

      == In the United States==
      === Federal level ===

      ==== Background ====
      In the United States, many of the state and federal laws surrounding school discipline originate from [[Zero tolerance policies in schools|zero-tolerance policies]] for student misconduct practiced by policy-makers from the 1980s and 1990s.<ref name=":02">{{Citation |last=Girvan |first=Erik J. |title=The Law and Social Psychology of Racial Disparities in School Discipline |date=2019 |work=Advances in Psychology and Law: Volume 4 |pages=235–276 |editor-last=Bornstein |editor-first=Brian H. |series=Advances in Psychology and Law |volume=4 |place=Cham |publisher=Springer International Publishing |language=en |doi=10.1007/978-3-030-11042-0_8 |isbn=978-3-030-11042-0 |s2cid=150893178 |editor2-last=Miller |editor2-first=Monica K.}}</ref> With the increasing use of zero-tolerance policies, by 1997 the federal government was funding the use of police officers in schools, resulting in an increased use of discipline in schools across the country and an influx of students entering the [[juvenile justice system]].<ref name=":02" /> By 2000, 41 states had laws in place requiring cases involving students who committed criminal violations in school, like drug possession, to be handled by law enforcement and juvenile courts, instead of the schools themselves.<ref name=":7">{{Cite journal |last=Hirschfield |first=Paul J. |date= February 2008|title= Preparing for prison?|url=http://journals.sagepub.com/doi/10.1177/1362480607085795 |journal= Theoretical Criminology|language=en |volume=12 |issue=1 |pages=79–101 |doi=10.1177/1362480607085795 |s2cid=144923281 |issn=1362-4806|url-access=subscription }}</ref> During this time, Black students accounted for over one-third of all [[School corporal punishment|corporal punishment]] cases and in-school and out-of-school [[Suspension (punishment)|suspensions]], nearly one-third of all expulsions and school-related arrests, and over one-quarter of all referrals to law enforcement; rates around three times higher than that of white students.<ref name=":02" />

      Public schools are prohibited from using disciplinary practices as a form of discrimination.<ref name=":13">{{Cite web |date=2019-05-30 |title=3 Ways DeVos Has Put Students At Risk by Deregulating Education |url=https://www.americanprogress.org/article/3-ways-devos-put-students-risk-deregulating-education/ |access-date=2023-12-14 |website=Center for American Progress |language=en}}</ref> [[United States Education Office|The Education Department's]] Office for Civil Rights is tasked with deciding whether or not to investigate students' reports of disciplinary racial discrimination.<ref name=":13" /> Former [[United States Secretary of Education]] [[Betsy DeVos]] enacted delays and eliminations of student discipline guidance under the [[United States Office of Education|United States Education Department]].<ref name=":13" /> In 2016, the Obama administration required states to address racial disparities in special education under the [[Individuals with Disabilities Education Act]], but DeVos delayed the implementation of these requirements.<ref name=":13" /> In 2014, the [[United States Department of Justice]] and the Education Department's Office for Civil Rights issued guidance to reduce racial disparities in suspension and expulsion.<ref name=":13" /> In 2019, DeVos defended the Education Department's choice to repeal this guidance.<ref name=":13" />

      ==== Student protections ====
      Today, schools across the U.S. suspend, expel, and punish Black students at a higher rate than white students.<ref name=":02" /> Despite these rates, there are multiple federal laws against racial discrimination in schools.<ref name=":02" /> There are two groups for these laws: [[disparate treatment]] and [[disparate impact]].<ref name=":02" />

      Disparate treatment laws allow students the right to testify against schools and school districts for intentional racial discrimination.<ref name=":02" /> Under the [[Equal Protection Clause|equal protection]] and [[Due Process Clause|due process]] clauses of the [[Fourteenth Amendment to the United States Constitution|14th Amendment]] and [[Civil Rights Act of 1964|Title VI of the Civil Rights Act of 1964]], students who feel they have been intentionally racially discriminated against can testify against their schools or school districts.<ref name=":02" />

      Disparate impact laws, including the federal regulations of [[Title VI of the Civil Rights Act of 1964|Title VI]] and the [[Individuals with Disabilities Education Act]], allow federal agencies to testify against schools and school districts for policies they have put in place that ultimately result in racial discrimination, regardless of the intent behind the people practicing those policies.<ref name=":02" /> Violations of these regulations can cause schools and school districts to lose federal funding.<ref name=":02" />

      ==== Mitigation and reform ====
      [[Positive Behavior Interventions and Supports|Positive Behavior Intervention and Supports (PBIS) programs]] examine disciplinary issues, attempt to reduce the severity of punishment for students, and provide increased support for students who have emotional and behavioral disorders.<ref name=":52">{{Cite web |date=2013-05-22 |title=Keeping Kids In Class: Fixing Racial Disparities in School Discipline |url=https://www.aradvocates.org/publications/keeping-kids-in-class-fixing-racial-disparities-in-school-discipline/ |access-date=2023-12-14 |website=Arkansas Advocates for Children and Families (AACF) |language=en-US}}</ref> PBIS programs are supported by the United States Department of Education [[Office of Special Education Programs]] Technical Assistance Center and have been used by schools across the United States.<ref name=":52" />

      === Across U.S. states ===

      ==== General trends ====
      Racial disparities in suspension and expulsion vary across the United States, Atlanta, Georgia, Chicago, Illinois, Houston, Texas; and St. Paul.  Minnesota has schools and school districts that, on average, suspend Black students at least six times more than white students.<ref name=":02" /> A study by the University of Pennsylvania concluded that Alabama, Arkansas, Florida, Georgia, Kentucky, Louisiana, Mississippi, North Carolina, South Carolina, Tennessee, Texas, Virginia and West Virginia schools contribute over half of all [[Suspension (school punishment)|suspensions]] and expulsions of Black students in America.<ref name=":22">Sanchez, Claudio. "Study Tracks Vast Racial Gap In School Discipline In 13 Southern States." NPR, (August 25, 2015). https://www.npr.org/sections/ed/2015/08/25/434650842/study-tracks-vast-racial-gap-in-school-discipline-in-13-southern-states.</ref> In these thirteen states, Black students make up about 24% of the students in public schools, but 48% of suspension cases and 49% of expulsion cases.<ref name=":22" /> Today, 19 states allow the use of [[School corporal punishment|corporal punishment]] in schools,<ref name=":52" /> including Arkansas, a state that ranks 13th in the country for highest disciplinary disparity between Black and white students.<ref name=":52" />

      In the state of New York, black students are suspended at a rate over four times higher than white students; in New York City, this figure increases, with Black students being suspended at a rate over five times higher than white students.<ref name=":32">{{Cite web |title=Home - The Education Trust - New York |url=https://newyork.edtrust.org/ |access-date=2023-12-14 |website=The Education Trust -- New York |language=en-US}}</ref> Schools in New York suspend nearly one in five Black male high-schoolers.<ref name=":32" /> In California, Black males are suspended more frequently than any other racial or gender group, and Black females are the third most often suspended group.<ref name=":42">Losen, Daniel J, and Paul Martinez. "Is California Doing Enough to Close the School Discipline Gap?" eScholarship, University of California, (June 22, 2020): 4-16. https://escholarship.org/uc/item/1x66c4n2.</ref> Black students with disabilities in California lose about 44 more days of school instruction due to disciplinary consequences than their white peers with disabilities.<ref name=":42" />

      ==== Mitigation and reform ====
      Schools across the country are making efforts to reform their disciplinary systems and practices to reduce racial disparities. A study in North Carolina found that having Black teachers is associated with lowered amounts of exclusionary discipline for Black students, across all age, gender, and income ranges.<ref>{{Cite journal |last1=Lindsay |first1=Constance A. |last2=Hart |first2=Cassandra M. D. |date= 2017|title=Exposure to Same-Race Teachers and Student Disciplinary Outcomes for Black Students in North Carolina |url=http://journals.sagepub.com/doi/10.3102/0162373717693109 |journal=Educational Evaluation and Policy Analysis |language=en |volume=39 |issue=3 |pages=485–510 |doi=10.3102/0162373717693109 |s2cid=26428014 |issn=0162-3737|url-access=subscription }}</ref> To reduce its racial disciplinary disparity, Arkansas' state regulations are beginning to request that school districts make an effort to racially diversify their staff.<ref name=":52" /> School disciplinary policies in Arkansas are technically decided by state laws and the [[Arkansas Department of Education]], but schools within Arkansas have some decision-making authority, which allowed them the power to suggest the diversification of their staff, as well as other policies that are being put into place to reduce racialized disciplinary disparities,<ref name=":52" /> including but not limited to:

      * Disciplinary punishments permitted for students are required to be written into a school district's policy.<ref name=":52" />
      * In school districts where [[school corporal punishment|corporal punishment]] is used, the district must establish specific policies for when and how to employ it.<ref name=":52" />
      * School districts are required to inform students' parents of disciplinary policies and provide written proof of the existence of said policies.<ref name=":52" /> These policies are required to be filed with the [[Arkansas Department of Education]] and include due process.<ref name=":52" />
      * All school personnel, including teachers, administrators, volunteers, and all employees are required to undergo student discipline training.<ref name=":52" />

      Similarly to Arkansas, schools in Virginia are attempting to improve training for teachers and administrators.<ref name=":22" /> In California, multiple school districts have completely eliminated [[Suspension (punishment)|suspensions]] for Kindergarten through twelfth grade in public schools.<ref name=":42" /> [[New York State Education Department|The New York State Education Department]] and the Board of Regents has included out-of-school [[Suspension (punishment)|suspensions]] in the [[Every Student Succeeds Act]], attempting to hold schools accountable for the [[Suspension (punishment)|suspension]] rates of different groups of students, this includes Black students' higher [[Suspension (punishment)|suspension]] rates compared to that of other racial and ethnic groups.<ref name=":32" />

      === Across school districts ===

      ==== Demographics ====
      Within the United States of America, urban educational institutions service the largest portion of Black students in primary and secondary education.<ref>{{Cite web |title=Reference Tables |url=https://nces.ed.gov/surveys/annualreports/topical-studies/locale/reference-tables |access-date=2023-12-14 |website=nces.ed.gov}}</ref> On a larger scale, urban educational institutions with a predominantly Black student body yield higher rates of punitive disciplinary actions in comparison to institutions with a predominantly white student body.<ref name=":13" /> Black students attending urban educational institutions are more likely to receive suspension and to be arrested than white students.<ref name=":13" /><ref name=":14">{{Cite journal |last1=Riddle |first1=Travis |last2=Sinclair |first2=Stacey |date=2019-04-23 |title=Racial disparities in school-based disciplinary actions are associated with county-level rates of racial bias |journal=Proceedings of the National Academy of Sciences |language=en |volume=116 |issue=17 |pages=8255–8260 |doi=10.1073/pnas.1808307116 |doi-access=free |issn=0027-8424 |pmc=6486724 |pmid=30940747|bibcode=2019PNAS..116.8255R }}</ref> On a smaller scale, rural school districts with a larger portion of Black students also yield higher rates of punitive disciplinary actions than predominantly white school districts.<ref>{{Cite journal |last1=Farmer |first1=Thomas W. |last2=Goforth |first2=Jennifer B. |last3=Leung |first3=Man-Chi |last4=Clemmer |first4=Jason T. |last5=Thompson |first5=Jana H. |date=2004 |title=School Discipline Problems in Rural African American Early Adolescents: Characteristics of Students with Major, Minor, and No Offenses |journal= Behavioral Disorders|volume=29 |issue=4 |pages=317–336 |doi=10.1177/019874290402900401 |jstor=23889525 |s2cid=141244531 |issn=0198-7429}}</ref>

      ==== County-level ====
      Individual school districts within a state have jurisdiction to implement and enforce education-related policies within their educational institutions.<ref name=":14" /><ref>"Organization of U.S. Education." Ed.gov, (2020). https://www2.ed.gov/about/offices/list/ous/international/usnei/us/edlite-org-us.html.</ref> Dependent on a school district's approach to resolving behavioral conflicts, the disparities between rates and intensity of discipline between white and Black students can intensify or lessen.<ref name=":14" /><ref name=":15">Losen, Daniel, and Paul Martinez. n.d. "OCTOBER 2020 Lost Opportunities How Disparate School Discipline Continues to Drive Differences in the Opportunity to Learn I LOST OPPORTUNITIES Acknowledgments."https://www.civilrightsproject.ucla.edu/research/k-12-education/school-discipline/lost-opportunities-how-disparate-school-discipline-continues-to-drive-differences-in-the-opportunity-to-learn/Lost-Opportunities-REPORT-v17.pdf.</ref> The subjectivity of approach to behavioral policies allows for external factors such as socioeconomic and racial demographic factors to feature into an institution's utilization of disciplinary actions.<ref name=":14" /><ref name=":15" />

      ===== Truancy =====
      An example of the varying racial disparities in discipline across U.S. counties and school districts is the different disciplinary approaches to solving [[truancy]], eg.  "any intentional, unjustified, unauthorized, or illegal absence from compulsory education".<ref>Ahmad, Farah Z. and Tiffany Miller. "The High Cost of Truancy." Center for American Progress, (August 2015).</ref> The Los Angeles County District enacted punitive measures to decrease the rate of absenteeism occurring within the district's educational institutions.<ref name=":112">"Abolish Chronic Truancy." Los Angeles County District Attorney's Office.https://da.lacounty.gov/sites/default/files/pdf/Org-chart-112221.pdf.</ref> It piloted the Abolish Chronic Truancy (ACT) program that would discipline absenteeism through penal punishments for both students and their parental guardians.<ref name=":112" /> Punishments for parental guardians include legal prosecution with a maximum penalty of a fine up to $2,500 per child and up to a year sentencing.<ref name=":112" /> For students, punishments may be prosecution in juvenile court with potential penalties including fines, probation, community service, and mandated attendance of a truancy education program.<ref name=":112" /> Socioeconomic factors—lack of transportation, acting as a caregiver for siblings, etc.-- that affect a student's attendance and likelihood of penal punishments disproportionately affects low-income black students.<ref name=":8">{{Cite web |last1=Jones |first1=Carolyn |last2=Willis |first2=Daniel J. |title=New California absenteeism data shows big discrepancies between white, Black students |url=https://edsource.org/2020/new-california-absenteeism-data-shows-big-discrepancies-between-white-black-students/645485 |access-date=2023-12-14 |website=EdSource |language=en}}</ref><ref>{{Cite journal |last1=Rubino |first1=Laura L. |last2=Anderson |first2=Valerie R. |last3=Campbell |first3=Christina A. |date= 2020|title=An Examination of Racial/Ethnic Disparities in Truancy Court |url=http://journals.sagepub.com/doi/10.1177/0011128719847456 |journal= Crime & Delinquency|language=en |volume=66 |issue=1 |pages=33–58 |doi=10.1177/0011128719847456 |s2cid=164627526 |issn=0011-1287|url-access=subscription }}</ref>

      Another approach that some U.S. school districts have used to reduce truancy is rehabilitating students and accounting for external factors. For example, the office of Alameda County Assistant District Attorney Teresa Drenick within the Alameda County School District has piloted a diversion program to increase attendance.<ref name=":13" /> The program addresses students with high absenteeism rates with consistently absent students by providing access to therapy, health services, and resources such as bus passes.<ref name=":13" /> The county reports that the program has been "more than 90% successful at getting students back in class", thereby decreasing absenteeism rates.<ref name=":13" />

      ==== Students with disabilities ====
      The disparity in punitive disciplinary actions between Black and white students is further widened for Black students with disabilities.<ref name=":92">Lindsey, Constance. "Teacher Race and School Discipline: Are Students Suspended Less Often When They Have a Teacher of the Same Race?" Education Next, (November 1, 2016). https://www.educationnext.org/teacher-race-and-school-discipline-suspensions-research/.</ref><ref name=":102">Losen, Daniel J. "Disabling Punishment: The Need for Remedies to the Disparate Loss of Instruction Experienced by Black Students with Disabilities." The Center for Civil Rights Remedies at The Civil Rights Project, (April 2018).</ref> National surveys on disparities in school discipline have found higher rates of suspension among Black students with disabilities.<ref name=":92" /><ref name=":102" /> From 2014 to 2015, the national average of days lost per 100 enrolled for students with disabilities was 119.0 days for Black students and 43.0 days for white students.<ref name=":102" />

      An existent effort to decrease rates of disciplinary actions for Black students with disabilities have examined the effects of same-race teachers within the classroom.<ref name=":92" /> For example, from 2014 to 2015, North Carolina had a wider gap in disparities than the national average in which Black students lost 158.3 days per 100 enrolled and white students lost 64.1 days. North Carolina, like many states, has local school districts with a higher percentage of Black staff and teachers than other districts.<ref name=":102" /> A study by researchers Constance A. Lindsey and Cassandra M. D. Hart demonstrates that Black females reduced disciplinary rates for Black male students with disabilities by a "2 percentage points to approximately 14 percent" decline.<ref name=":92" /> Additionally, students with Black male teachers within the study had a reduced disciplinary rate by "15 to 13 percent".<ref name=":92" /> The study suggests that school districts with an increased percentage of Black students may exhibit lower rates of punitive disciplinary actions for Black students with disabilities and have a lessened gap between Black and white students.<ref name=":92" /><ref name=":102" />

      === Within the classroom ===
      In the United States, African-American students, particularly boys, are disciplined significantly more often and more severely than any other demographic. This disparity is very well documented and contributes substantially to negative life outcomes for affected students.<ref name=":6">{{Cite journal|last1=Riddle|first1=Travis|last2=Sinclair|first2=Stacey|author-link2=Stacey Sinclair|date=April 2, 2019|title=Racial disparities in school-based disciplinary actions are associated with county-level rates of racial bias|journal=Proceedings of the National Academy of Sciences|volume=116|issue=17|pages=8255–8260|doi=10.1073/pnas.1808307116|pmc=6486724|pmid=30940747|bibcode=2019PNAS..116.8255R |doi-access=free}}</ref><ref name=":4">{{Cite web|last=Gordon|first=Nora|date=January 18, 2018|title=Disproportionality in student discipline: Connecting policy to research|url=https://www.brookings.edu/research/disproportionality-in-student-discipline-connecting-policy-to-research/|website=The Brookings Institution}}</ref> The resulting tendency of minors and young adults from disadvantaged backgrounds to become incarcerated is widely referred to as the "[[school-to-prison pipeline]]".<ref name="Heitzeg2009">{{cite journal|last1=Heitzeg|first1=Nancy A.|date=2009|title=Education or Incarceration: Zero Tolerance Policies and the School to Prison Pipeline|url=https://forumonpublicpolicy.com/summer09/archivesummer09/heitzeg.pdf|journal=Forum on Public Policy Online|volume=2009|issue=2|id={{ERIC|EJ870076}}|archive-url=https://web.archive.org/web/20100827134754/https://forumonpublicpolicy.com/summer09/archivesummer09/heitzeg.pdf|archive-date=August 27, 2010}}</ref><ref>{{cite journal|last1=Rocque|first1=Michael|last2=Paternoster|first2=Raymond|date=2011|title=Understanding the antecedents of the 'school-to-jail' link: The relationship between race and school discipline|journal=The Journal of Criminal Law and Criminology|volume=101|issue=2|pages=633–665|jstor=23074048}}</ref><ref name="auto">{{Cite journal|last1=Cuellar|first1=Alison|last2=Markowitz|first2=Sara|date=August 1, 2015|title=School suspension and the school-to-prison pipeline|journal=International Review of Law and Economics|volume=43|issue=10|pages=98–106|doi=10.1016/j.irle.2015.06.001}}</ref>

      According to data published by the [[United States Department of Education|U.S. Department of Education]], African-American students are three times more likely to be suspended and expelled than their white peers.<ref name=":5">{{cite news |date=August 2015 |title=When Schools Are Forced to Practice Race-Based Discipline |newspaper=The Atlantic |location=New York |url= https://www.theatlantic.com/education/archive/2015/08/teachers-say-no-disparate-impact-discipline/402144/ |access-date=December 1, 2016}}</ref> Research overwhelmingly suggests that when given an opportunity to choose among several disciplinary options for a relatively minor offense, teachers and school administrators disproportionately choose more severe punishment for African-American students than for white students for the same offense.<ref name=":5" /> Even when controlling  factors such as family income, African-American boys are more likely to receive out-of-school suspensions than white boys for the same behavior within the same school.<ref name=":4" /><ref>{{Cite web|last1=Barrett|first1=Nathan|last2=McEachin|first2=Andrew|last3=Mills|first3=Jonathan N.|last4=Valant|first4=Jon|date=January 4, 2018|title="Disparities in Student Discipline by Race and Family Income"|url=https://educationresearchalliancenola.org/files/publications/010418-Barrett-McEachin-Mills-Valant-Disparities-in-Student-Discipline-by-Race-and-Family-Income.pdf|website=Education Research Alliance}}</ref>

      A recent study published by the [[National Academy of Sciences]], using U.S. federal data covering more than 32 million students and around 96,000 schools, showed that "the disciplinary gap between black and white students across five types of disciplinary actions is associated with county-level rates of racial bias."<ref name=":6" /> Other high-powered studies have shown "increased racial and gender disproportionality for subjectively defined behaviors in classrooms, and for incidents classified as more severe",<ref>{{Cite journal|last1=Smolkowski|first1=Keith|last2=Girvan|first2=Erik J.|last3=McIntosh|first3=Kent|last4=Nese|first4=Rhonda N. T.|last5=Horner|first5=Robert H.|date=August 1, 2016|title=Vulnerable Decision Points for Disproportionate Office Discipline Referrals: Comparisons of Discipline for African American and White Elementary School Students|url=https://journals.sagepub.com/doi/abs/10.17988/bedi-41-04-178-195.1|journal=Behavioral Disorders|volume=41|issue=4|pages=178–195|doi=10.17988/bedi-41-04-178-195.1|via=|s2cid=219971730|url-access=subscription}}</ref> and that "Black-White disciplinary gaps . . . emerge as early as in prekindergarten and widen with grade progression."<ref>{{Cite journal|last1=Gopalan|first1=Maithreyi|last2=Nelson|first2=Ashlyn Aiko|date=April 23, 2019|title=Understanding the Racial Discipline Gap in Schools|journal= AERA Open|volume=5|issue=2|article-number=2332858419844613 |doi=10.1177/2332858419844613|doi-access=free|s2cid=151167120}}</ref> Such disparities in exclusionary forms of discipline have been shown to be mitigated in classrooms run by African-American teachers, with especially strong mitigation of office referrals for subjectively defined behavior such as "willful defiance".<ref name=":4" /><ref>{{Cite journal|last1=Lindsay|first1=Constance A.|last2=Hart|first2=Cassandra M. D.|date=March 1, 2017|title="Exposure to Same-Race Teachers and Student Disciplinary Outcomes for Black Students in North Carolina"|url=https://journals.sagepub.com/doi/abs/10.3102/0162373717693109|journal=Educational Evaluation and Policy Analysis|volume=39|issue=3|pages=485–510|doi=10.3102/0162373717693109|via=|s2cid=26428014|url-access=subscription}}</ref>

      When disparities occur within the classroom they are often [[Covert racism|covert]] and passive.  This means that instead of outwardly discriminating against a student because of their color teachers discreetly give fewer advantages to students of color. Examples of this could include counselors or teachers influencing students of color to take easier classes or to not attend four-year universities, and teachers not learning the correct way to pronounce student names.<ref>{{Cite web |last=Kuznia |first=Rob |date=2017-06-14 |title=Racism in Schools: Unintentional But No Less Damaging |url=https://psmag.com/education/racism-in-schools-unintentional-3821 |access-date=2023-12-14 |website=Pacific Standard |language=en}}</ref> This can also include white students being given more chances before serious discipline is enacted, such as suspension or expulsion.<ref name=":62">{{Cite journal |last1=Okonofua |first1=Jason A. |last2=Eberhardt |first2=Jennifer L. |date=2015 |title=Two Strikes: Race and the Disciplining of Young Students |journal= Psychological Science|volume=26 |issue=5 |pages=617–624 |doi=10.1177/0956797615570365 |jstor=24544011 |pmid=25854276 |s2cid=206587768 |issn=0956-7976}}</ref> According to a study published by the [[Association for Psychological Science]], teachers often recognize second offenses in the classroom as the result of a pattern of wrongdoing when it comes to Black students while white students' offenses are often labeled as isolated incidents.<ref name=":62" />

      ==== Black girls ====
      While it has been proven that black boys in the U.S. tend to be disciplined more often and more severely, evidence also suggests that black girls experience more racial bias in their education.<ref name=":72">{{Cite web |last1=Patrick |first1=Kayla |last2=Onyeka-Crawford |first2=Adaku |last3=Duchesneau |first3=Nancy |title="And they cared": How to Create Better, Safer Learning Environments for Girls of Color |url=https://edtrust.org/resource/and-they-cared-how-to-create-better-safer-learning-environments-for-girls-of-color/ |access-date=2023-12-14 |website=The Education Trust |language=en-US}}</ref><ref name=":82">{{Citation |last1=Lavy |first1=Victor |title=On The Origins of Gender Human Capital Gaps: Short and Long Term Consequences of Teachers' Stereotypical Biases |date= 2015|url=https://www.nber.org/papers/w20909 |type=Working Paper |access-date=2023-12-14 |series=Working Paper Series |doi=10.3386/w20909 |last2=Sand |first2=Edith}}</ref> A research study conducted by the [[National Women's Law Center]] and the Education Trust observed that "Black girls are five times more likely than white girls to be suspended at least once and four times as likely as white girls to be arrested at school."<ref name=":72" /> The [[Racial bias on Wikipedia|racial bias]] is compounded as girls also experience gender bias within the classroom, a phenomenon coined as [[educational inequality]].<ref name=":72" /> Based on data published by The National Bureau of Economic Research on the short-term and long-term consequences of teachers' stereotypical biases, it was found that teacher biases have a positive effect on boys' achievements in class but have a negative effect on girls' achievements.<ref name=":82" /> This can have long-term consequences for the futures of Black girls as it can prevent them from enrolling in the advanced-level classes that are commonly required for STEM majors in college.<ref name=":82" />

      ==== Socioeconomic status ====
      Disciplinary methods also vary based on students' socioeconomic status. While high-income students are often reported to receive mild to moderate consequences (e.g. a teacher reprimand or seat reassignment), low-income students are reported to receive more severe consequences, sometimes delivered in a less-than-professional manner (e.g. being yelled at in front of class, being made to stand in the hallway all day, or having their personal belongings searched).<ref>Skiba, Russell (December 2002). "The Color of Discipline: Sources of Racial and Gender Disproportionality in School Punishment." ''The Urban Review'' 34, no. 4</ref>

      Some researchers argue that [[Zero tolerance (schools)|zero-tolerance]] discipline policies in effect criminalize infractions such as dress-code violations or talking back to a teacher, and that these policies disproportionately target disadvantaged students.<ref name="Heitzeg2009" /><ref>{{cite news |date=August 25, 2015 |title=Study Tracks Vast Racial Gap In School Discipline In 13 Southern States |work=National Public Radio |url= https://www.npr.org/sections/ed/2015/08/25/434650842/study-tracks-vast-racial-gap-in-school-discipline-in-13-southern-states |access-date=December 6, 2016}}</ref>

      === Implications ===
      Due to increased suspension and expulsion rates, black students are losing instructional time by spending more time away from the classroom.<ref>{{Cite web |last=Álvarez |first=Brenda |title=School Suspensions Lead to Stark Losses in Instructional Time {{!}} NEA |url=https://www.nea.org/nea-today/all-news-articles/school-suspensions-lead-stark-losses-instructional-time |access-date=2023-12-14 |website=www.nea.org |language=en}}</ref> Lost instructional time can result in lower retainment levels of educational material, lower graduation rates, and higher drop-out rates.<ref>{{Cite web |date=2019-09-16 |title=School Discipline Linked to Later Consequences {{!}} Harvard Graduate School of Education |url=https://www.gse.harvard.edu/ideas/usable-knowledge/19/09/school-discipline-linked-later-consequences |access-date=2023-12-14 |website=www.gse.harvard.edu |language=en}}</ref> Higher rates of punishment in schools can increase interactions between black students and law enforcement when black students are punished with referrals to law enforcement for disciplinary infractions.<ref name=":7" /><ref name="Heitzeg2009" /><ref name="auto" /> Referrals to law enforcement following the report of a student to a law enforcement agency or officer by a school employee can include citations, tickets, court referrals, and in some cases arrests, though not all referrals lead to arrests.<ref>{{Cite web |last=Mitchell |first=Corey |date=2021-09-08 |title=What you need to know about school policing |url=http://publicintegrity.org/education/criminalizing-kids/what-you-need-to-know-about-school-policing/ |access-date=2023-12-14 |website=Center for Public Integrity |language=en-US}}</ref> These interactions with the law are a precursor for the [[school-to-prison pipeline]], which disproportionately affects black students.

