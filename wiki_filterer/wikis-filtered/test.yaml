      {{Short description|none}}
      {{about|the college admission test in the United States of America|the exams in England colloquially known as SATs|National Curriculum assessment}}

      The '''SAT''' is a [[standardized test]] commonly used for the purpose of [[college admissions in the United States|admission]] to colleges and universities in the United States. [[SAT|The test]], owned by the [[College Board]] and originally developed by [[Carl Brigham]], was first administered on June 23, 1926, to about 8,000 students. The test was introduced as a supplement to the College Board essay exams already in use for college admissions, but ease of administration of the SAT and other factors led to the discontinuation of the essay exams <ref>{{cite news|title=Board Revises Entrance Tests; June Examinations Replaced by New Form in April, June, September|url=https://www.nytimes.com/1942/01/25/archives/board-revises-entrance-tests-june-examinations-replaced-by-new-form.html|access-date=July 30, 2022|newspaper=The New York Times|date=January 25, 1942}}</ref> during [[World War II]]. The SAT has since gone through numerous changes in content, duration, scoring, and name; the test was taken by more than 1.97 million students in the graduating high school class of 2024.<ref name="test takers">{{cite web|url=https://reports.collegeboard.org/media/pdf/2024-total-group-sat-suite-of-assessments-annual-report-ADA.pdf |title=2024 SAT Suite of Assessments Annual Report|publisher=[[College Board]] |access-date=November 30, 2024|archive-date=November 16, 2024 |archive-url=https://web.archive.org/web/20241116210113/https://reports.collegeboard.org/media/pdf/2024-total-group-sat-suite-of-assessments-annual-report-ADA.pdf |url-status=live}}</ref>

