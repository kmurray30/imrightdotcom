      The mathematical scores for 1969–70 were broken out by gender rather than reported as a whole; the mean math score for boys was 415, for girls 378.  The differences for the nationally sampled population for math (not shown in table) were similar to those for the verbal section.<ref name="your-atp"/>

      === Ceilings and trends ===
      The version of the SAT administered before April 1995 had a very high ceiling. For example, in the 1985–1986 school year, only 9 students out of 1.7 million test takers obtained a score of 1600.<ref>{{cite news|url=https://people.com/archive/no-mistake-these-five-kids-have-all-the-answers-they-scored-perfect-1600s-on-their-sat-exams-vol-27-no-23|title=No Mistake, These Five Kids Have All the Answers: They Scored Perfect 1600s on Their Sat Exams|newspaper=People|publisher=People (Meredith Corporation)|access-date=June 23, 2022|archive-date=June 23, 2022|archive-url=https://web.archive.org/web/20220623205031/https://people.com/archive/no-mistake-these-five-kids-have-all-the-answers-they-scored-perfect-1600s-on-their-sat-exams-vol-27-no-23/|url-status=live}}</ref>

      In 2015 the average score for the class of 2015 was 1490 out of a maximum 2400. That was down 7 points from the previous class's mark and was the lowest composite score of the past decade.<ref name="Anderson-2015" />

      == SAT–ACT score comparisons ==
      The College Board and ACT, Inc., conducted a joint study of students who took both the SAT and the ACT between September 2004 (for the ACT) or March 2005 (for the SAT) and June 2006. Tables were provided to concord scores for students taking the SAT after January 2005 and before March 2016.<ref>{{cite book |title=ACT and SAT® Concordance Tables |url=http://research.collegeboard.org/sites/default/files/publications/2012/7/researchnote-2009-40-act-sat-concordance-tables.pdf |date=September 30, 2009 |publisher=College Board |access-date=March 18, 2017 |archive-url=https://web.archive.org/web/20170426113455/https://research.collegeboard.org/sites/default/files/publications/2012/7/researchnote-2009-40-act-sat-concordance-tables.pdf |archive-date=April 26, 2017 |url-status=live }}</ref><ref>{{cite web |title=ACT-SAT Concordance Tables |url=http://www.act.org/content/dam/act/unsecured/documents/ACTCollegeBoardJointStatement.pdf |publisher=ACT, Inc. |access-date=March 18, 2017 |archive-url=https://web.archive.org/web/20161121032822/http://www.act.org/content/dam/act/unsecured/documents/ACTCollegeBoardJointStatement.pdf |archive-date=November 21, 2016 |url-status=live }}</ref> In May 2016, the College Board released concordance tables to concord scores on the SAT used from March 2005 through January 2016 to the SAT used since March 2016, as well as tables to concord scores on the SAT used since March 2016 to the ACT.<ref>{{cite web |title=Higher Education Concordance Information |date=May 15, 2015 |url=https://collegereadiness.collegeboard.org/educators/higher-ed/scoring-changes/concordance |publisher=College Board |access-date=March 18, 2017 |archive-url=https://web.archive.org/web/20170319195755/https://collegereadiness.collegeboard.org/educators/higher-ed/scoring-changes/concordance |archive-date=March 19, 2017 |url-status=live }}</ref>

      In 2018, the College Board, in partnership with the ACT, introduced a new concordance table to better compare how a student would fare one test to another.<ref>{{Cite web |date=2018 |title=Guide to the 2018 ACT/SAT Concordance |url=https://collegereadiness.collegeboard.org/pdf/guide-2018-act-sat-concordance.pdf |url-status=live |archive-url=https://web.archive.org/web/20190509153918/https://collegereadiness.collegeboard.org/pdf/guide-2018-act-sat-concordance.pdf |archive-date=May 9, 2019 |access-date=June 2, 2019 |publisher=CollegeBoard}}</ref> This is now considered the official concordance to be used by college professionals and is replacing the one from 2016. The new concordance no longer features the old SAT (out of 2,400), just the new SAT (out of 1,600) and the ACT (out of 36).

