      {{See also|COVID-19 vaccine}}
      [[File:Diagnostics-10-00453-g001.webp|thumb|Human [[antibody response]] to SARS-CoV-2 infection]]
      The [[immune response]] by humans to SARS-CoV-2 virus occurs as a combination of the [[cell-mediated immunity]] and antibody production,<ref>{{#invoke:Cite|web|url=https://www.ecdc.europa.eu/en/covid-19/latest-evidence/immune-responses |title=Immune responses and correlates of protective immunity against SARS-CoV-2 |date=18 May 2021 |publisher=European Centre for Disease Prevention and Control |access-date=3 June 2021}}</ref> just as with most other infections.<ref>{{#invoke:Cite|journal | vauthors = Vabret N, Britton GJ, Gruber C, Hegde S, Kim J, Kuksin M, Levantovsky R, Malle L, Moreira A, Park MD, Pia L, Risson E, Saffern M, Salomé B, Esai Selvan M, Spindler MP, Tan J, van der Heide V, Gregory JK, Alexandropoulos K, Bhardwaj N, Brown BD, Greenbaum B, Gümüş ZH, Homann D, Horowitz A, Kamphorst AO, Curotto de Lafaille MA, Mehandru S, Merad M, Samstein RM | title = Immunology of COVID-19: Current State of the Science | journal = Immunity | volume = 52 | issue = 6 | pages = 910–941 | date = June 2020 | pmid = 32505227 | pmc = 7200337 | doi = 10.1016/j.immuni.2020.05.002 | doi-access = free | title-link = doi }}</ref> B cells interact with T cells and begin dividing before selection into the plasma cell, partly on the basis of their affinity for antigen.<ref>{{#invoke:Cite|journal | vauthors = Wang Z, Muecksch F, Schaefer-Babajew D, Finkin S, Viant C, Gaebler C, Hoffmann HH, Barnes CO, Cipolla M, Ramos V, Oliveira TY, Cho A, Schmidt F, Da Silva J, Bednarski E, Aguado L, Yee J, Daga M, Turroja M, Millard KG, Jankovic M, Gazumyan A, Zhao Z, Rice CM, Bieniasz PD, Caskey M, Hatziioannou T, Nussenzweig MC | title = Naturally enhanced neutralizing breadth against SARS-CoV-2 one year after infection | journal = Nature | volume = 595 | issue = 7867 | pages = 426–431 | date = July 2021 | pmid = 34126625 | pmc = 8277577 | doi = 10.1038/s41586-021-03696-9 | bibcode = 2021Natur.595..426W }}</ref> Since SARS-CoV-2 has been in the human population only since December 2019, it remains unknown if the [[immunity (medical)|immunity]] is long-lasting in people who recover from the disease.<ref name="CohenJI2020Dec">{{#invoke:Cite|journal | vauthors = Cohen JI, Burbelo PD | title = Reinfection with SARS-CoV-2: Implications for Vaccines | journal = Clinical Infectious Diseases | date = December 2020 | pmid = 33338197 | pmc = 7799323 | doi = 10.1093/cid/ciaa1866 | s2cid = 229323810 | title-link = doi | volume = 73 | issue = 11 | pages = e4223–e4228 | doi-access = free }}</ref> The presence of neutralising antibodies in blood strongly correlates with protection from infection, but the level of neutralising antibody declines with time. Those with asymptomatic or mild disease had undetectable levels of neutralising antibody two months after infection. In another study, the level of neutralising antibodies fell four-fold one to four months after the onset of symptoms. However, the lack of antibodies in the blood does not mean antibodies will not be rapidly produced upon reexposure to SARS-CoV-2. Memory B cells specific for the spike and nucleocapsid proteins of SARS-CoV-2 last for at least six months after the appearance of symptoms.<ref name="CohenJI2020Dec" />

      As of August 2021, reinfection with COVID‑19 was possible but uncommon. The first case of reinfection was documented in August 2020.<ref name="Wang-2021">{{#invoke:Cite|journal | vauthors = Wang J, Kaperak C, Sato T, Sakuraba A | title = COVID-19 reinfection: a rapid systematic review of case reports and case series | journal = Journal of Investigative Medicine | volume = 69 | issue = 6 | pages = 1253–1255 | date = August 2021 | pmid = 34006572 | doi = 10.1136/jim-2021-001853 |issn=1081-5589 | s2cid = 234773697 }}</ref> A systematic review found 17 cases of confirmed reinfection in medical literature as of May 2021.<ref name="Wang-2021" /> With the Omicron variant, as of 2022, reinfections have become common, albeit it is unclear how common.<ref name="abc-reinfections"/> [[SARS-CoV-2#Reinfection|COVID-19 reinfection]]s are thought to likely be less severe than primary infections, especially if one was previously infected by the same variant.<ref name="abc-reinfections">{{#invoke:Cite|news |title=How soon after catching COVID-19 can you get it again? |url=https://www.abc.net.au/news/health/2022-05-03/covid-19-reinfection-what-are-the-odds-of-catching-it-twice/101024180 |access-date=24 June 2022 |work=ABC News |date=2 May 2022 }}</ref>{{additional citation needed|date=July 2022}}

      == Mortality ==
      {{Main|COVID-19 pandemic|COVID-19 pandemic death rates by country}}

      Several measures are commonly used to quantify mortality.<ref>{{#invoke:Cite|book|chapter-url=https://www.cdc.gov/csels/dsepd/ss1978/lesson3/section3.html |title=Principles of Epidemiology in Public Health Practice |edition=Third |chapter=Lesson 3: Measures of Risk Section 3: Mortality Frequency Measures |date=May 2012|publisher=U.S. [[Centers for Disease Control and Prevention]] |access-date=28 March 2020|archive-date=28 February 2020|archive-url= https://web.archive.org/web/20200228150607/https://www.cdc.gov/csels/dsepd/ss1978/lesson3/section3.html |url-status=live |id=No. SS1978}}</ref> These numbers vary by region and over time and are influenced by the volume of testing, healthcare system quality, treatment options, time since the initial outbreak, and population characteristics such as age, sex, and overall health.<ref name=":0">{{#invoke:Cite|journal |url=https://ourworldindata.org/covid-mortality-risk |title=What do we know about the risk of dying from COVID-19? |vauthors=Ritchie H, Roser M |date=25 March 2020 |veditors=Chivers T |journal=[[Our World in Data]] |url-status=live |access-date=28 March 2020 |archive-date=28 March 2020 |archive-url=https://web.archive.org/web/20200328192730/https://ourworldindata.org/covid-mortality-risk}}</ref>

      The [[mortality rate]] reflects the number of deaths within a specific demographic group divided by the population of that demographic group. Consequently, the mortality rate reflects the prevalence as well as the severity of the disease within a given population. Mortality rates are highly correlated to age, with relatively low rates for young people and relatively high rates among the elderly.<ref name="JAMAPedsCOVID19">{{#invoke:Cite|journal | vauthors = Castagnoli R, Votto M, Licari A, Brambilla I, Bruno R, Perlini S, Rovida F, Baldanti F, Marseglia GL | title = Severe Acute Respiratory Syndrome Coronavirus 2 (SARS-CoV-2) Infection in Children and Adolescents: A Systematic Review | journal = JAMA Pediatrics | volume = 174 | issue = 9 | pages = 882–889 | date = September 2020 | pmid = 32320004 | doi = 10.1001/jamapediatrics.2020.1467 | doi-access = free | title-link = doi }}</ref><ref name="Lu Zhang Du Zhang p.">{{#invoke:Cite|journal | vauthors = Lu X, Zhang L, Du H, Zhang J, Li YY, Qu J, Zhang W, Wang Y, Bao S, Li Y, Wu C, Liu H, Liu D, Shao J, Peng X, Yang Y, Liu Z, Xiang Y, Zhang F, Silva RM, Pinkerton KE, Shen K, Xiao H, Xu S, Wong GW | title = SARS-CoV-2 Infection in Children | journal = The New England Journal of Medicine | volume = 382 | issue = 17 | pages = 1663–1665 | date = April 2020 | pmid = 32187458 | pmc = 7121177 | doi = 10.1056/nejmc2005073 | publisher = Massachusetts Medical Society }}</ref><ref name="pediatrics_tong">{{#invoke:Cite|journal | vauthors = Dong Y, Mo X, Hu Y, Qi X, Jiang F, Jiang Z, Tong S | title = Epidemiology of COVID-19 Among Children in China | journal = Pediatrics | volume = 145 | issue = 6 | article-number = e20200702 | date = June 2020 | pmid = 32179660 | doi = 10.1542/peds.2020-0702 | s2cid = 219118986 | doi-access = free | title-link = doi | bibcode = 2020Pedia.145.0702D }}</ref> In fact, one relevant factor of mortality rates is the age structure of the countries' populations. For example, the case fatality rate for COVID‑19 is lower in India than in the US since India's younger population represents a larger percentage than in the US.<ref name="Dehingia-2021">{{#invoke:Cite|journal|title=Sex differences in COVID-19 case fatality: do we know enough?|journal=The Lancet. Global Health|vauthors=Dehingia N|year=2021|volume=9|issue=1|pages=e14–e15|doi=10.1016/S2214-109X(20)30464-2|pmid=33160453|pmc=7834645}}</ref>

      === Case fatality rate ===
      The [[case fatality rate]] (CFR) reflects the number of deaths divided by the number of diagnosed cases within a given time interval. Based on Johns Hopkins University statistics, the global death-to-case ratio is {{Cases in the COVID-19 pandemic|ratio|editlink=|ref=no}} ({{Cases in the COVID-19 pandemic|deaths|editlink=|ref=no}}/{{Cases in the COVID-19 pandemic|confirmed|editlink=|ref=no}}) as of {{Cases in the COVID-19 pandemic|date|editlink=|ref=no}}.{{Cases in the COVID-19 pandemic|ref=yes}} The number varies by region.<ref>{{#invoke:Cite|journal | vauthors = Lazzerini M, Putoto G | title = COVID-19 in Italy: momentous decisions and many uncertainties | journal = The Lancet. Global Health | volume = 8 | issue = 5 | pages = e641–e642 | date = May 2020 | pmid = 32199072 | pmc = 7104294 | doi = 10.1016/S2214-109X(20)30110-8 }}</ref><ref name=":0" />

