      COVID‑19 [[case fatality rate]]s are higher among men than women in most countries. However, in a few countries like India, Nepal, Vietnam, and Slovenia the fatality cases are higher in women than men.<ref name="Dehingia-2021" /> Globally, men are more likely to be admitted to the [[intensive care unit|ICU]] and more likely to die.<ref>{{#invoke:Cite|web| vauthors = McIntosh K |title=Covid 19 Clinical Features|url=https://www.uptodate.com/contents/covid-19-clinical-features|access-date=12 May 2021|website=[[UpToDate]]|publication-date=April 2021}}</ref><ref>{{#invoke:Cite|journal | vauthors = Peckham H, de Gruijter NM, Raine C, Radziszewska A, Ciurtin C, Wedderburn LR, Rosser EC, Webb K, Deakin CT | title = Male sex identified by global COVID-19 meta-analysis as a risk factor for death and ITU admission | journal = Nature Communications | volume = 11 | issue = 1 | article-number = 6317 | date = December 2020 | pmid = 33298944 | doi = 10.1038/s41467-020-19741-6 | pmc = 7726563 | bibcode = 2020NatCo..11.6317P }}</ref> One meta-analysis found that globally, men were more likely to get COVID‑19 than women; there were approximately 55 men and 45 women per 100 infections ([[confidence interval|CI]]: 51.43–56.58).<ref>{{#invoke:Cite|journal | vauthors = Abate BB, Kassie AM, Kassaw MW, Aragie TG, Masresha SA | title = Sex difference in coronavirus disease (COVID-19): a systematic review and meta-analysis | journal = BMJ Open | volume = 10 | issue = 10 | article-number = e040129 | date = October 2020 | pmid = 33028563 | doi = 10.1136/bmjopen-2020-040129 | doi-access = free | pmc = 7539579 }}</ref>

      The [[Chinese Center for Disease Control and Prevention]] reported the death rate was 2.8% for men and 1.7% for women.<ref name="Epidemiology17Feb2020"/> Later reviews in June 2020 indicated that there is no significant difference in susceptibility or in CFR between genders.<ref>{{#invoke:Cite|journal | vauthors = Hu Y, Sun J, Dai Z, Deng H, Li X, Huang Q, Wu Y, Sun L, Xu Y | title = Prevalence and severity of corona virus disease 2019 (COVID-19): A systematic review and meta-analysis | journal = Journal of Clinical Virology | volume = 127 | article-number = 104371 | date = June 2020 | pmid = 32315817 | pmc = 7195434 | doi = 10.1016/j.jcv.2020.104371 }}</ref><ref>{{#invoke:Cite|journal | vauthors = Fu L, Wang B, Yuan T, Chen X, Ao Y, Fitzpatrick T, Li P, Zhou Y, Lin YF, Duan Q, Luo G, Fan S, Lu Y, Feng A, Zhan Y, Liang B, Cai W, Zhang L, Du X, Li L, Shu Y, Zou H | title = Clinical characteristics of coronavirus disease 2019 (COVID-19) in China: A systematic review and meta-analysis | journal = The Journal of Infection | volume = 80 | issue = 6 | pages = 656–665 | date = June 2020 | pmid = 32283155 | pmc = 7151416 | doi = 10.1016/j.jinf.2020.03.041 }}</ref> One review acknowledges the different mortality rates in Chinese men, suggesting that it may be attributable to lifestyle choices such as smoking and drinking alcohol rather than genetic factors.<ref>{{#invoke:Cite|journal | vauthors = Yuki K, Fujiogi M, Koutsogiannaki S | title = COVID-19 pathophysiology: A review | journal = Clinical Immunology | volume = 215 | article-number = 108427 | date = June 2020 | pmid = 32325252 | pmc = 7169933 | doi = 10.1016/j.clim.2020.108427 | s2cid = 216028003 }}</ref> Smoking, which in some countries like China is mainly a male activity, is a habit that contributes to increasing significantly the case fatality rates among men.<ref name="Dehingia-2021" /> Sex-based immunological differences, lesser prevalence of smoking in women and men developing co-morbid conditions such as hypertension at a younger age than women could have contributed to the higher mortality in men.<ref name="nyt-italy">{{#invoke:Cite|news | vauthors = Rabin RC | title = In Italy, Coronavirus Takes a Higher Toll on Men |url=https://www.nytimes.com/2020/03/20/health/coronavirus-italy-men-risk.html |archive-url=https://web.archive.org/web/20200320214013/https://www.nytimes.com/2020/03/20/health/coronavirus-italy-men-risk.html |archive-date=20 March 2020 |url-access=subscription |url-status=live |access-date=7 April 2020 |work=The New York Times |date=20 March 2020}}</ref> In Europe as of February 2020, 57% of the infected people were men and 72% of those died with COVID‑19 were men.<ref>{{#invoke:Cite|web|title=COVID-19 weekly surveillance report |url=https://www.euro.who.int/en/health-topics/health-emergencies/coronavirus-covid-19/weekly-surveillance-report |archive-url=https://web.archive.org/web/20200315074508/https://www.euro.who.int/en/health-topics/health-emergencies/coronavirus-covid-19/weekly-surveillance-report |archive-date=15 March 2020 |website=[[World Health Organization]] (WHO) |access-date=7 April 2020}}</ref> As of April 2020, the US government is not tracking sex-related data of COVID‑19 infections.<ref name="nytimesus">{{#invoke:Cite|news | vauthors = Gupta AH | title = Does Covid-19 Hit Women and Men Differently? U.S. Isn't Keeping Track |url=https://www.nytimes.com/2020/04/03/us/coronavirus-male-female-data-bias.html |archive-url=https://web.archive.org/web/20200403135013/https://www.nytimes.com/2020/04/03/us/coronavirus-male-female-data-bias.html |archive-date=3 April 2020 |url-access=subscription |url-status=live |access-date=7 April 2020 |work=The New York Times |date=3 April 2020}}</ref> Research has shown that viral illnesses like Ebola, HIV, influenza and SARS affect men and women differently.<ref name="nytimesus" />

      === Ethnic differences ===
      In the US, a greater proportion of deaths due to COVID‑19 have occurred among African Americans and other minority groups.<ref name="AVD">{{#invoke:Cite|journal | vauthors = Dorn AV, Cooney RE, Sabin ML | title = COVID-19 exacerbating inequalities in the US | journal = Lancet | volume = 395 | issue = 10232 | pages = 1243–1244 | date = April 2020 | pmid = 32305087 | pmc = 7162639 | doi = 10.1016/S0140-6736(20)30893-X | bibcode = 2020Lanc..395.1243D }}</ref> Structural factors that prevent them from practising social distancing include their concentration in crowded substandard housing and in "essential" occupations such as retail grocery workers, public transit employees, health-care workers and custodial staff. Greater prevalence of lacking [[health insurance]] and care of underlying conditions such as [[diabetes]],<ref name="Shauly-Aharonov-2021">{{#invoke:Cite|journal |last1=Shauly-Aharonov |first1=Michal |last2=Shafrir |first2=Asher |last3=Paltiel |first3=Ora |last4=Calderon-Margalit |first4=Ronit |last5=Safadi |first5=Rifaat |last6=Bicher |first6=Roee |last7=Barenholz-Goultschin |first7=Orit |last8=Stokar |first8=Joshua |date=22 July 2021 |title=Both high and low pre-infection glucose levels associated with increased risk for severe COVID-19: New insights from a population-based study |journal=PLOS ONE |volume=16 |issue=7 |article-number=e0254847 |doi=10.1371/journal.pone.0254847 |issn=1932-6203 |pmc=8297851 |pmid=34293038|bibcode=2021PLoSO..1654847S |doi-access=free }}</ref> hypertension, and [[heart disease]] also increase their risk of death.<ref>{{#invoke:Cite|journal | vauthors = Adams ML, Katz DL, Grandpre J | title = Population-Based Estimates of Chronic Conditions Affecting Risk for Complications from Coronavirus Disease, United States | journal = Emerging Infectious Diseases | volume = 26 | issue = 8 | pages = 1831–1833 | date = August 2020 | pmid = 32324118 | pmc = 7392427 | doi = 10.3201/eid2608.200679 | title-link = doi | doi-access = free }}</ref> Similar issues affect [[indigenous peoples of the Americas|Native American]] and [[Latino (demonym)|Latino]] communities.<ref name="AVD" /> On the one hand, in the Dominican Republic there is a clear example of both gender and ethnic inequality. In this Latin American territory, there is great inequality and precariousness that especially affects Dominican women, with greater emphasis on those of Haitian descent.<ref name="Batthyany-2020">{{#invoke:Cite|web| vauthors = Batthyány K |title=Coronavirus y Desigualdades preexistentes: Género y Cuidados|url=https://www.clacso.org/coronavirus-y-desigualdades-preexistentes-genero-y-cuidados/|access-date=22 April 2021|website=CLACSO (Consejo Latinoamericano de Ciencias Sociales)|date=13 October 2020}}</ref> According to a US health policy non-profit, 34% of American Indian and Alaska Native People (AIAN) non-elderly adults are at risk of serious illness compared to 21% of white non-elderly adults.<ref name=":2">{{#invoke:Cite|web|url=https://www.kff.org/coronavirus-covid-19/issue-brief/covid-19-presents-significant-risks-for-american-indian-and-alaska-native-people/|title=COVID-19 Presents Significant Risks for American Indian and Alaska Native People|date=14 May 2020}}</ref> The source attributes it to disproportionately high rates of many health conditions that may put them at higher risk as well as living conditions like lack of access to clean water.<ref name=":2" />

      Leaders have called for efforts to research and address the disparities.<ref>{{#invoke:Cite|journal | vauthors = Laurencin CT, McClinton A | title = The COVID-19 Pandemic: a Call to Action to Identify and Address Racial and Ethnic Disparities | journal = Journal of Racial and Ethnic Health Disparities | volume = 7 | issue = 3 | pages = 398–402 | date = June 2020 | pmid = 32306369 | pmc = 7166096 | doi = 10.1007/s40615-020-00756-0 }}</ref> In the UK, a greater proportion of deaths due to COVID‑19 have occurred in those of a [[Black British people|Black]], [[British Asian|Asian]], and other ethnic minority background.<ref>{{#invoke:Cite|web|date=9 June 2020|title=How coronavirus deaths in the UK compare by race and ethnicity|url=https://www.independent.co.uk/news/uk/home-news/coronavirus-death-toll-uk-race-white-black-asian-bame-ethnicity-cases-a9557076.html|access-date=10 June 2020|website=The Independent}}</ref><ref>{{#invoke:Cite|web|title=Emerging findings on the impact of COVID-19 on black and minority ethnic people|date=20 May 2020 |url=https://www.health.org.uk/news-and-comment/charts-and-infographics/emerging-findings-on-the-impact-of-covid-19-on-black-and-min|access-date=10 June 2020|publisher=The Health Foundation}}</ref><ref>{{#invoke:Cite|news | vauthors = Butcher B, Massey J |date=9 June 2020|title=Why are more BAME people dying from coronavirus?|work=BBC News |url=https://www.bbc.com/news/uk-52219070 |access-date=10 June 2020}}</ref> More severe impacts upon patients including the relative incidence of the necessity of hospitalisation requirements, and vulnerability to the disease has been associated via DNA analysis to be expressed in genetic variants at chromosomal region 3, features that are associated with European [[Neanderthal]] heritage. That structure imposes greater risks that those affected will develop a more severe form of the disease.<ref name=Neanderthal>{{#invoke:Cite|web| title=The ancient Neanderthal hand in severe COVID-19 | website=ScienceDaily | date=30 September 2020 | url=https://www.sciencedaily.com/releases/2020/09/200930094758.htm | access-date=13 December 2020}}</ref> The findings are from Professor Svante Pääbo and researchers he leads at the [[Max Planck Institute for Evolutionary Anthropology]] and the [[Karolinska Institutet]].<ref name=Neanderthal /> This admixture of modern human and Neanderthal genes is estimated to have occurred roughly between 50,000 and 60,000 years ago in Southern Europe.<ref name=Neanderthal />

      === Comorbidities ===
      [[Biology|Biological]] factors (immune response) and the general behaviour (habits) can strongly determine the consequences of COVID‑19.<ref name="Dehingia-2021" /> Most of those who die of COVID‑19 have [[pre-existing condition|pre-existing (underlying) condition]]s, including hypertension, [[diabetes mellitus]],<ref name="Shauly-Aharonov-2021" /> and [[cardiovascular disease]].<ref name="WHO-2020a">{{#invoke:Cite|web|url=https://www.who.int/dg/speeches/detail/who-director-general-s-statement-on-the-advice-of-the-ihr-emergency-committee-on-novel-coronavirus |title=WHO Director-General's statement on the advice of the IHR Emergency Committee on Novel Coronavirus |website=[[World Health Organization]] (WHO)}}</ref> According to March data from the United States, 89% of those hospitalised had preexisting conditions.<ref>{{#invoke:Cite|journal | vauthors = Garg S, Kim L, Whitaker M, O'Halloran A, Cummings C, Holstein R, Prill M, Chai SJ, Kirley PD, Alden NB, Kawasaki B, Yousey-Hindes K, Niccolai L, Anderson EJ, Openo KP, Weigel A, Monroe ML, Ryan P, Henderson J, Kim S, Como-Sabetti K, Lynfield R, Sosin D, Torres S, Muse A, Bennett NM, Billing L, Sutton M, West N, Schaffner W, Talbot HK, Aquino C, George A, Budd A, Brammer L, Langley G, Hall AJ, Fry A | title = Hospitalization Rates and Characteristics of Patients Hospitalized with Laboratory-Confirmed Coronavirus Disease 2019 – COVID-NET, 14 States, March 1–30, 2020 | journal = MMWR. Morbidity and Mortality Weekly Report | volume = 69 | issue = 15 | pages = 458–464 | date = April 2020 | pmid = 32298251 | pmc = 7755063 | doi = 10.15585/mmwr.mm6915e3 | title-link = doi | doi-access = free }}</ref> The Italian Istituto Superiore di Sanità reported that out of 8.8% of deaths where [[medical record|medical chart]]s were available, 96.1% of people had at least one [[comorbidity]] with the average person having 3.4 diseases.<ref name="ISSCharacteristics">{{#invoke:Cite|report|url=https://www.epicentro.iss.it/en/coronavirus/bollettino/Report-COVID-2019_22_July_2020.pdf|title=Characteristics of SARS-CoV-2 patients dying in Italy Report based on available data on July 22nd, 2020|date=22 July 2020|publisher=[[Istituto Superiore di Sanità]]|access-date=4 October 2020|vauthors=Palmieri L, Andrianou X, Barbariol P, Bella A, Bellino S, Benelli E, Bertinato L, Boros S, Brambilla G, Calcagnini G, Canevelli M, Castrucci MR, Censi F, Ciervo A, Colaizzo E, D'Ancona F, Del Manso M, Donfrancesco C, Fabiani M, Filia A, Floridia M, Giuliano M, Grisetti T, Langer M, Lega I, Lo Noce C, Maiozzi P, Malchiodi Albedi F, Manno V, Martini M, Mateo Urdiales A, Mattei E, Meduri C, Meli P, Minelli G, Nebuloni M, Nisticò L, Nonis M, Onder G, Palmisano L, Petrosillo N, Pezzotti P, Pricci F, Punzo O, Puro V, Raparelli V, Rezza G, Riccardo F, Rota MC, Salerno P, Serra D, Siddu A, Stefanelli P, Tamburo De Bella M, Tiple D, Unim B, Vaianella L, Vanacore N, Vichi M, Villani ER, Brusaferro S}}</ref> According to this report the most common comorbidities are hypertension (66% of deaths), [[type&nbsp;2 diabetes]] (29.8% of deaths), [[ischemic heart disease|ischaemic heart disease]] (27.6% of deaths), [[atrial fibrillation]] (23.1% of deaths) and [[chronic renal failure]] (20.2% of deaths).

      Most critical respiratory comorbidities according to the US Centers for Disease Control and Prevention (CDC), are: moderate or severe [[asthma]], pre-existing [[chronic obstructive pulmonary disease|COPD]], [[pulmonary fibrosis]], and [[cystic fibrosis]].<ref name=":3">{{#invoke:Cite|web|date=11 February 2020|title=Coronavirus Disease 2019 (COVID-19)|url=https://www.cdc.gov/coronavirus/2019-ncov/need-extra-precautions/groups-at-higher-risk.html|access-date=19 June 2020|website=U.S. [[Centers for Disease Control and Prevention]] (CDC) }}</ref> Evidence stemming from [[meta-analysis]] of several smaller research papers also suggests that smoking can be associated with worse outcomes.<ref>{{#invoke:Cite|journal | vauthors = Zhao Q, Meng M, Kumar R, Wu Y, Huang J, Lian N, Deng Y, Lin S | title = The impact of COPD and smoking history on the severity of COVID-19: A systemic review and meta-analysis | journal = Journal of Medical Virology | volume = 92 | issue = 10 | pages = 1915–1921 | date = October 2020 | pmid = 32293753 | pmc = 7262275 | doi = 10.1002/jmv.25889 }}</ref><ref>{{#invoke:Cite|web|title=Smoking and COVID-19|url=https://www.who.int/news-room/commentaries/detail/smoking-and-covid-19|access-date=19 June 2020|website=[[World Health Organization]] (WHO)}}</ref> When someone with existing respiratory problems is infected with COVID‑19, they might be at greater risk for severe symptoms.<ref name=":3" /> COVID‑19 also poses a greater risk to people who [[opioid use disorder|misuse opioid]]s and [[stimulant use disorder|amphetamine]]s, insofar as their drug use may have caused lung damage.<ref>{{#invoke:Cite|web|title=People who use drugs are more vulnerable to coronavirus. Here's what clinics are doing to help.|url=https://www.theadvocate.com/baton_rouge/news/coronavirus/article_f80cf77e-84fa-11ea-88d5-2b37dc9dd966.html| vauthors = DeRobertis J |date=3 May 2020|website=The Advocate (Louisiana)|access-date=4 May 2020}}</ref>

      In August 2020, the CDC issued a caution that [[tuberculosis]] (TB) infections could increase the risk of severe illness or death. The WHO recommended that people with respiratory symptoms be screened for both diseases, as testing positive for COVID‑19 could not rule out co-infections. Some projections have estimated that reduced TB detection due to the pandemic could result in 6.3&nbsp;million additional TB cases and 1.4&nbsp;million TB-related deaths by 2025.<ref>{{#invoke:Cite|web|url=https://www.cdc.gov/coronavirus/2019-ncov/global-covid-19/TB-non-us-settings.html|title=Coronavirus Disease 2019 (COVID-19)|date=11 February 2020|website=U.S. [[Centers for Disease Control and Prevention]] (CDC) }}</ref>

      == History ==
      {{update section|reason=excessive detail about the very early pandemic while missing an overview of the later pandemic|date=July 2023}}
      {{Main|Timeline of the COVID-19 pandemic|Investigations into the origin of COVID-19}}

      {{COVID-19 pandemic sidebar}}
      The virus is thought to be of natural animal origin, most likely through [[spillover infection]].<ref name="NM-20200317">{{#invoke:Cite|journal | vauthors = Andersen KG, Rambaut A, Lipkin WI, Holmes EC, Garry RF | title = The proximal origin of SARS-CoV-2 | journal = Nature Medicine | volume = 26 | issue = 4 | pages = 450–452 | date = April 2020 | pmid = 32284615 | pmc = 7095063 | doi = 10.1038/s41591-020-0820-9 }}</ref><ref name="PMC7969828">{{#invoke:Cite|journal | vauthors = Frutos R, Gavotte L, Devaux CA | title = Understanding the origin of COVID-19 requires to change the paradigm on zoonotic emergence from the spillover to the circulation model | journal = Infection, Genetics and Evolution | volume = 95 | article-number = 104812 | date = November 2021 | pmid = 33744401 | pmc = 7969828 | doi = 10.1016/j.meegid.2021.104812 | bibcode = 2021InfGE..9504812F }}</ref><ref>{{#invoke:Cite|journal | vauthors = Holmes EC, Goldstein SA, Rasmussen AL, Robertson DL, Crits-Christoph A, Wertheim JO, Anthony SJ, Barclay WS, Boni MF, Doherty PC, Farrar J, Geoghegan JL, Jiang X, Leibowitz JL, Neil SJ, Skern T, Weiss SR, Worobey M, Andersen KG, Garry RF, Rambaut A | title = The origins of SARS-CoV-2: A critical review | journal = Cell | volume = 184 | issue = 19 | pages = 4848–4856 | date = September 2021 | pmid = 34480864 | pmc = 8373617 | doi = 10.1016/j.cell.2021.08.017 }}</ref> A joint-study conducted in early 2021 by the People's Republic of China and the World Health Organization indicated that the virus descended from a coronavirus that infects wild bats, and likely spread to humans through an intermediary wildlife host.<ref>{{#invoke:Cite|web|url=https://www.who.int/publications/i/item/who-convened-global-study-of-origins-of-sars-cov-2-china-part|work=[[World Health Organization]] (WHO) |title=WHO-convened Global Study of Origins of SARS-CoV-2: China Part|date=30 March 2021|access-date=29 July 2022}}</ref> There are several theories about where the [[index case]] originated and [[investigations into the origin of COVID-19|investigations into the origin of the pandemic]] are ongoing.<ref name="patientZero">{{#invoke:Cite|news| vauthors = Duarte F | date=24 February 2020|title=As the cases of coronavirus increase in China and around the world, the hunt is on to identify "patient zero".|work=BBC News|url=https://www.bbc.com/future/article/20200221-coronavirus-the-harmful-hunt-for-covid-19s-patient-zero|access-date=22 March 2020}}</ref> According to articles published in July 2022 in ''[[Science (journal)|Science]]'', virus transmission into humans occurred through two spillover events in November 2019 and was likely due to live wildlife trade on the [[Huanan Seafood Wholesale Market|Huanan wet market]] in the city of [[Wuhan]] (Hubei, China).<ref>{{#invoke:Cite|journal|title=The molecular epidemiology of multiple zoonotic origins of SARS-CoV-2 |date=26 July 2022 |journal=[[Science (journal)|Science]]|vauthors=Pekar JE, Magee P, Parker E, Moshiri N, Izhikevich K, Havens JL, Gangavarapu K, Serrano LM, Crits-Christoph A, Matteson NL, Zeller M, Levy JI, Wang JC, Hughes S, Lee JM, Park H, Park MS, Ching ZY, Lin TP, Isa NM, Noor YM, Vasylyeva TI, Garry RF, Holmes EC, Rambaut A, Suchard MA, Andersen KG, Worobey M, Wertheim JO|pages=960–966 |doi-access = free | title-link = doi |volume=377 |issue=6609 |doi=10.1126/science.abp8337|pmid=35881005 |pmc=9348752 |bibcode=2022Sci...377..960P }}</ref><ref>{{#invoke:Cite|news |last=Gill |first=Victoria |date=26 July 2022 |title=Covid origin studies say evidence points to Wuhan market |work=[[BBC News Online]] |publisher=[[BBC]] |url=https://www.bbc.com/news/science-environment-62307383 |url-status=live |access-date=31 August 2023 |archive-url=https://web.archive.org/web/20220726153445/https://www.bbc.com/news/science-environment-62307383 |archive-date=26 July 2022}}</ref><ref>{{#invoke:Cite|journal |title=The Huanan Seafood Wholesale Market in Wuhan was the early epicenter of the COVID-19 pandemic |date=July 2022 |journal=Science |doi=10.1126/science.abp8715 | vauthors = Worobey M, Levy JI, Serrano LM, Crits-Christoph A, Pekar JE, Goldstein SA, Rasmussen AL, Kraemer MU, Newman C, Koopmans MP, Suchard MA, Wertheim JO, Lemey P, Robertson DL, Garry RF, Holmes EC, Rambaut A, Andersen KG | title-link=doi |volume=377 |issue=6609 |pages=951–959 |pmid=35881010 |pmc=9348750 |bibcode=2022Sci...377..951W |s2cid=251067542 }}</ref> Doubts about the conclusions have mostly centered on the precise site of spillover.<ref>{{#invoke:Cite|news |url=https://www.nationalgeographic.com/magazine/article/debate-deepens-over-wuhan-wet-markets-role-in-kickstarting-the-pandemic |title=Debate deepens over Wuhan wet market's role in kickstarting the pandemic |date=27 July 2022 |work=[[National Geographic]]}}</ref> Earlier [[phylogenetics]] estimated that SARS-CoV-2 arose in October or November 2019.<ref name="NM-20200317"/><ref name="evolutionary">{{#invoke:Cite|journal | vauthors = Li X, Zai J, Zhao Q, Nie Q, Li Y, Foley BT, Chaillon A | title = Evolutionary history, potential intermediate animal host, and cross-species analyses of SARS-CoV-2 | journal = Journal of Medical Virology | volume = 92 | issue = 6 | pages = 602–611 | date = June 2020 | pmid = 32104911 | pmc = 7228310 | doi = 10.1002/jmv.25731 }}</ref><ref name="dorp_evo">{{#invoke:Cite|journal | vauthors = van Dorp L, Acman M, Richard D, Shaw LP, Ford CE, Ormond L, Owen CJ, Pang J, Tan CC, Boshier FA, Ortiz AT, Balloux F | title = Emergence of genomic diversity and recurrent mutations in SARS-CoV-2 | journal = Infection, Genetics and Evolution | volume = 83 | article-number = 104351 | date = September 2020 | pmid = 32387564 | pmc = 7199730 | doi = 10.1016/j.meegid.2020.104351 | bibcode = 2020InfGE..8304351V }}</ref> A phylogenetic algorithm analysis suggested that the virus may have been circulating in [[Guangdong]] before Wuhan.<ref>{{#invoke:Cite|news | vauthors = Grose TK
      |url= https://www.usnews.com/news/best-countries/articles/2020-05-13/scientist-suggests-coronavirus-originated-outside-of-wuhan |title=Did the Coronavirus Originate Outside of Wuhan? |work=U.S. News & World Report |date=13 May 2020}}</ref>

      Most scientists believe the virus spilled into human populations through natural [[zoonosis]], similar to the [[SARS-CoV-1]] and [[MERS-CoV]] outbreaks, and consistent with other pandemics in human history.<ref name="pekar"/><ref name="jiang_wang"/> According to the [[Intergovernmental Panel on Climate Change]] several social and environmental factors including [[climate change]], [[environmental degradation|natural ecosystem destruction]] and [[wildlife trade and zoonoses|wildlife trade]] increased the likelihood of such zoonotic spillover.<ref name="IPCC-2022a"/><ref name="IPCC-2022b"/> One study made with the support of the [[European Union]] found climate change increased the likelihood of the pandemic by influencing distribution of bat species.<ref name="University-of-Cambridge-2021"/><ref name="European-Commission"/>

      Available evidence suggests that the SARS-CoV-2 virus was originally harboured by bats, and spread to humans multiple times from infected wild animals at the [[Huanan Seafood Market]] in [[Wuhan]] in December 2019.<ref name="pekar" /><ref name="jiang_wang" /> A minority of scientists and some members of the [[United States Intelligence Community|U.S intelligence community]] believe the virus may have been [[COVID-19 lab leak theory|unintentionally leaked]] from a laboratory such as the [[Wuhan Institute of Virology]].<ref name="NYT_DoE_Feb2023">{{#invoke:Cite|web |last1=Barnes |first1=Julian E. |title=Lab Leak Most Likely Caused Pandemic, Energy Dept. Says |url=https://www.nytimes.com/2023/02/26/us/politics/china-lab-leak-coronavirus-pandemic.html |website=The New York Times |access-date=27 February 2023 |date=26 February 2023}}</ref><ref name="Hill_Feb_2023_DoE">{{#invoke:Cite|news |last1=Mueller |first1=Julia |title=Energy Department's COVID lab leak conclusion: What we know |url=https://thehill.com/policy/healthcare/3874965-what-we-know-about-energy-departments-lab-leak-conclusion/ |access-date=26 March 2023 |work=The Hill |date=26 February 2023}}</ref> The US intelligence community has mixed views on the issue,<ref name="CNN_Feb2023_LeBlanc">{{#invoke:Cite|news |last1=LeBlanc |first1=Paul |title=New assessment on the origins of Covid-19 adds to the confusion {{!}} CNN Politics |url=https://www.cnn.com/2023/02/27/politics/covid-origins-doe-assessment-what-matters/index.html |access-date=27 February 2023 |work=CNN |date=27 February 2023}}</ref><ref name="Guardian_Feb2023">{{#invoke:Cite|news |last1=Davis |first1=Nicola |last2=Hawkins |first2=Amy |title=How seriously should we take the US DoE's Covid lab leak theory? |url=https://www.theguardian.com/world/2023/feb/27/how-seriously-should-we-take-the-us-does-covid-lab-leak-theory |access-date=27 February 2023 |work=The Guardian |date=27 February 2023}}</ref> but overall agrees with the scientific consensus that the virus was not developed as a [[biological agent|biological weapon]] and is unlikely to have been [[genetic engineering|genetically engineered]].<ref>{{#invoke:Cite|web| vauthors = Wolf ZB |title=Analysis: Why scientists are suddenly more interested in the lab-leak theory of Covid's origin |url=https://www.cnn.com/2021/05/25/politics/wuhan-lab-covid-origin-theory/index.html|access-date=26 May 2021 |publisher=CNN|date=25 May 2021}}</ref><ref>{{#invoke:Cite|journal |vauthors=Maxmen A |title=US COVID origins report: researchers pleased with scientific approach |journal=Nature |volume=597 |issue=7875 |pages=159–160 |date=September 2021 |pmid=34465917 |doi=10.1038/d41586-021-02366-0 |s2cid=237373547 |bibcode=2021Natur.597..159M}}</ref><ref>{{#invoke:Cite|news|url=https://www.politico.com/newsletters/future-pulse/2022/11/04/cross-examining-the-lab-leak-theorists-00065103|title=Cross-examining the lab-leak theorists|date=4 November 2022|work=[[Politico]] |vauthors=Paun C, Zeller S, Reader R, Leonard B, Scullion G | access-date=21 November 2022 }}</ref><ref>{{#invoke:Cite|news|url=https://www.reuters.com/world/us-intelligence-releases-report-covid-19-origins-2021-10-29/|title=U.S. spy agencies say origins of COVID-19 may never be known |vauthors=Hosenball M, Zengerle P|date=30 October 2021 |work=[[Reuters]]|access-date=21 November 2022}}</ref> There is no evidence SARS-CoV-2 existed in any laboratory prior to the pandemic.<ref name=critical>{{#invoke:Cite|journal |vauthors=Holmes EC, Goldstein SA, Rasmussen AL, Robertson DL, Crits-Christoph A, Wertheim JO, Anthony SJ, Barclay WS, Boni MF, Doherty PC, Farrar J, Geoghegan JL, Jiang X, Leibowitz JL, Neil SJ, Skern T, Weiss SR, Worobey M, Andersen KG, Garry RF, Rambaut A |title=The origins of SARS-CoV-2: A critical review |journal=Cell |volume=184 |issue=19 |pages=4848–4856 |date=September 2021 |pmid=34480864 |pmc=8373617 |doi=10.1016/j.cell.2021.08.017 |type=Review |quote=Under any laboratory escape scenario, SARS-CoV-2 would have to have been present in a laboratory prior to the pandemic, yet no evidence exists to support such a notion and no sequence has been identified that could have served as a precursor.}}</ref><ref name="Gorski">{{#invoke:Cite|web |last=Gorski |first=David |date=31 May 2021 |title=The origin of SARS-CoV-2, revisited |url=https://sciencebasedmedicine.org/the-origin-of-sars-cov-2-revisited/ |url-status=live |archive-url=https://web.archive.org/web/20210601072923/https://sciencebasedmedicine.org/the-origin-of-sars-cov-2-revisited/ |archive-date=1 June 2021 |access-date=19 July 2021 |publisher=[[Science-Based Medicine]] |quote=The second [version of the lab leak] is the version that "reasonable" people consider plausible, but there is no good evidence for either version.}}</ref><ref name="HolmesConversationDead">{{#invoke:Cite|web |last=Holmes |first=Edward C. |date=14 August 2022 |title=The COVID lab leak theory is dead. Here's how we know the virus came from a Wuhan market |url=http://theconversation.com/the-covid-lab-leak-theory-is-dead-heres-how-we-know-the-virus-came-from-a-wuhan-market-188163 |access-date=4 September 2022 |website=The Conversation |quote=For the lab leak theory to be true, SARS-CoV-2 must have been present in the Wuhan Institute of Virology before the pandemic started. This would convince me. But the inconvenient truth is there's not a single piece of data suggesting this. There's no evidence for a genome sequence or isolate of a precursor virus at the Wuhan Institute of Virology. Not from gene sequence databases, scientific publications, annual reports, student theses, social media, or emails. Even the intelligence community has found nothing. Nothing. And there was no reason to keep any work on a SARS-CoV-2 ancestor secret before the pandemic.}}</ref>

      The first confirmed human infections were in Wuhan. A study of the first 41 cases of confirmed COVID‑19, published in January 2020 in ''The Lancet'', reported the earliest date of onset of symptoms as 1{{spaces}}December 2019.<ref name="WuMarch2020">{{#invoke:Cite|journal |vauthors=Wu YC, Chen CS, Chan YJ |title=The outbreak of COVID-19: An overview |journal=Journal of the Chinese Medical Association |volume=83 |issue=3 |pages=217–220 |date=March 2020 |pmid=32134861 |pmc=7153464 |doi=10.1097/JCMA.0000000000000270}}</ref><ref name="Wang24Jan2020">{{#invoke:Cite|journal |vauthors=Wang C, Horby PW, Hayden FG, Gao GF |title=A novel coronavirus outbreak of global health concern |journal=Lancet |volume=395 |issue=10223 |pages=470–473 |date=February 2020 |pmid=31986257 |pmc=7135038 |doi=10.1016/S0140-6736(20)30185-9 |title-link=doi |bibcode=2020Lanc..395..470W |doi-access=free}}</ref><ref name="AutoDW-67">{{#invoke:Cite|journal| vauthors=Cohen J | date=January 2020|title=Wuhan seafood market may not be source of novel virus spreading globally |url=https://www.science.org/content/article/wuhan-seafood-market-may-not-be-source-novel-virus-spreading-globally|journal=[[Science (journal)|Science]] |doi=10.1126/science.abb0611 |doi-access=free |title-link=doi}}</ref> Official publications from the WHO reported the earliest onset of symptoms as 8{{spaces}}December 2019.<ref>{{#invoke:Cite|web|date=12 January 2020|title=Novel Coronavirus – China|website=[[World Health Organization]] (WHO) |url=https://www.who.int/csr/don/12-january-2020-novel-coronavirus-china/en/|archive-date=14 January 2020|archive-url=https://web.archive.org/web/20200114185815/https://www.who.int/csr/don/12-january-2020-novel-coronavirus-china/en/}}</ref> Human-to-human transmission was confirmed by the WHO and Chinese authorities by 20 January 2020.<ref>{{#invoke:Cite|news| vauthors=Kessler G |date=17 April 2020|title=Trump's false claim that the WHO said the coronavirus was 'not communicable' |newspaper=[[The Washington Post]] |url=https://www.washingtonpost.com/politics/2020/04/17/trumps-false-claim-that-who-said-coronavirus-was-not-communicable/|url-status=live |access-date=17 April 2020|archive-date=2025-07-23|archive-url=http://web.archive.org/web/20250723012655/https://www.washingtonpost.com/politics/2020/04/17/trumps-false-claim-that-who-said-coronavirus-was-not-communicable/}}</ref><ref>{{#invoke:Cite|news |vauthors=Kuo L |date=21 January 2020 |title=China confirms human-to-human transmission of coronavirus |work=[[The Guardian]] |url=https://www.theguardian.com/world/2020/jan/20/coronavirus-spreads-to-beijing-as-china-confirms-new-cases|access-date=18 April 2020}}</ref> According to official Chinese sources, these were mostly linked to the [[Huanan Seafood Wholesale Market]], which also sold live animals.<ref name="characteristicsZH">{{#invoke:Cite|journal |title=[The epidemiological characteristics of an outbreak of 2019 novel coronavirus diseases (COVID-19) in China] |language=zh |journal=Zhonghua Liu Xing Bing Xue Za Zhi = Zhonghua Liuxingbingxue Zazhi |volume=41 |issue=2 |pages=145–151 |date=February 2020 |pmid=32064853 |doi=10.3760/cma.j.issn.0254-6450.2020.02.003 |s2cid=211133882 |author1=Epidemiology Working Group For Ncip Epidemic Response |author2=Chinese Center for Disease Control Prevention}}</ref> In May 2020, [[George F. Gao|George Gao]], the director of the CDC, said animal samples collected from the seafood market had tested negative for the virus, indicating that the market was the site of an early [[superspreader|superspreading event]], but that it was not the site of the initial outbreak.<ref>{{#invoke:Cite|news| vauthors = Areddy JT |date=26 May 2020|title=China Rules Out Animal Market and Lab as Coronavirus Origin|work=[[The Wall Street Journal]] |url=https://www.wsj.com/articles/china-rules-out-animal-market-and-lab-as-coronavirus-origin-11590517508|access-date=29 May 2020|url-access=subscription}}</ref> Traces of the virus have been found in wastewater samples that were collected in [[Milan]] and [[Turin]], Italy, on 18 December 2019.<ref>{{#invoke:Cite|news| vauthors=Kelland K |date=19 June 2020 |title=Italy sewage study suggests COVID-19 was there in December 2019|work=Reuters |url=https://www.reuters.com/article/us-health-coronavirus-italy-sewage/italy-sewage-study-suggests-covid-19-was-there-in-december-2019-idUSKBN23Q1J9|access-date=23 June 2020}}</ref>

      By December 2019, the spread of infection was almost entirely driven by human-to-human transmission.<ref name="Epidemiology17Feb2020"/><ref>{{#invoke:Cite|journal |vauthors=Heymann DL, Shindo N |title=COVID-19: what is next for public health? |journal=Lancet |volume=395 |issue=10224 |pages=542–545 |date=February 2020 |pmid=32061313 |pmc=7138015 |doi=10.1016/S0140-6736(20)30374-3 |title-link=doi |doi-access=free}}</ref> The number of COVID-19 cases in Hubei gradually increased, reaching 60 by 20 December,<ref>{{#invoke:Cite|web| date=14 March 2020 |vauthors=Bryner J |title=1st known case of coronavirus traced back to November in China |website=livescience.com |url=https://www.livescience.com/first-case-coronavirus-found.html|access-date=31 May 2020}}</ref> and at least 266 by 31 December.<ref>{{#invoke:Cite|news |author=Canadian Politics |date=8 April 2020 |title=The birth of a pandemic: How COVID-19 went from Wuhan to Toronto |newspaper=National Post|url=https://nationalpost.com/news/politics/the-birth-of-a-pandemic-how-covid-19-went-from-wuhan-to-toronto |access-date=31 May 2020}}</ref> On 24 December, [[Wuhan Central Hospital]] sent a [[bronchoalveolar lavage fluid]] (BAL) sample from an unresolved clinical case to sequencing company Vision Medicals. On 27 and 28 December, Vision Medicals informed the Wuhan Central Hospital and the Chinese CDC of the results of the test, showing a new coronavirus.<ref>{{#invoke:Cite|news|author=高昱|date=26 February 2020|title=独家 {{!}} 新冠病毒基因测序溯源: 警报是何时拉响的|language=zh|trans-title=Exclusive {{!}} Tracing the New Coronavirus gene sequencing: when did the alarm sound|work=[[Caixin]]|url=https://china.caixin.com/2020-02-26/101520972.html|access-date=1 March 2020|archive-url=https://web.archive.org/web/20200227094018/https://china.caixin.com/2020-02-26/101520972.html|archive-date=27 February 2020}}</ref> A pneumonia cluster of unknown cause was observed on 26 December and treated by the doctor [[Zhang Jixian]] in Hubei Provincial Hospital, who informed the Wuhan Jianghan CDC on 27 December.<ref>{{#invoke:Cite|web|author1=路子康 |title=最早上报疫情的她, 怎样发现这种不一样的肺炎|website=中国网新闻 |location=北京|language=zh-cn |url=https://news.china.com/zw/news/13000776/20200209/37780703.html |archive-url=https://web.archive.org/web/20200302165302/https://news.china.com/zw/news/13000776/20200209/37780703.html|archive-date=2 March 2020|access-date=11 February 2020}}</ref> On 30 December, a test report addressed to Wuhan Central Hospital, from company CapitalBio Medlab, stated an erroneous positive result for [[SARS]], causing a group of doctors at Wuhan Central Hospital to alert their colleagues and relevant hospital authorities of the result. The Wuhan Municipal Health Commission issued a notice to various medical institutions on "the treatment of pneumonia of unknown cause" that same evening.<ref>{{#invoke:Cite|web|title=Undiagnosed pneumonia – China (HU): RFI|url=https://promedmail.org/promed-post/?id=6864153|access-date=7 May 2020|website=ProMED Mail |publisher=ProMED}}</ref> Eight of these doctors, including [[Li Wenliang]] (punished on 3{{spaces}}January),<ref>{{#invoke:Cite|news|date=7 February 2020|title='Hero who told the truth': Chinese rage over coronavirus death of whistleblower doctor|work=[[The Guardian]]|url=https://www.theguardian.com/global-development/2020/feb/07/coronavirus-chinese-rage-death-whistleblower-doctor-li-wenliang}}</ref> were later admonished by the police for spreading false rumours and another, [[Ai Fen]], was reprimanded by her superiors for raising the alarm.<ref>{{#invoke:Cite|news |vauthors=Kuo L |date=11 March 2020 |title=Coronavirus: Wuhan doctor speaks out against authorities |work=The Guardian |location=London|url=https://www.theguardian.com/world/2020/mar/11/coronavirus-wuhan-doctor-ai-fen-speaks-out-against-authorities}}</ref>

      The Wuhan Municipal Health Commission made the first public announcement of a pneumonia outbreak of unknown cause on 31 December, confirming 27 cases<ref name="AutoDW-69">{{#invoke:Cite|web|title=Novel Coronavirus |url=https://www.who.int/westernpacific/emergencies/novel-coronavirus|access-date=6 February 2020|url-status=live|archive-url=https://web.archive.org/web/20200202151307/https://www.who.int/westernpacific/emergencies/novel-coronavirus|archive-date=2 February 2020|work=[[World Health Organization]] (WHO)}}</ref><ref>{{#invoke:Cite|news|date=31 December 2019|title=武汉现不明原因肺炎 官方确认属实: 已经做好隔离|publisher=Xinhua Net 新華網 |url=https://news.163.com/19/1231/10/F1NGTJNJ00019K82.html|access-date=31 March 2020}}</ref><ref name="AutoDW-68">{{#invoke:Cite|web|date=31 December 2019|script-title=zh:武汉市卫健委关于当前我市肺炎疫情的情况通报 |url=https://wjw.wuhan.gov.cn/front/web/showDetail/2019123108989|archive-url=https://web.archive.org/web/20200109215413/https://wjw.wuhan.gov.cn/front/web/showDetail/2019123108989|archive-date=9 January 2020 |access-date=8 February 2020|work=WJW.Wuhan.gov.cn|publisher=Wuhan Municipal Health Commission|language=zh}}</ref>{{snd}}enough to trigger an investigation.<ref name="bbc50984025">{{#invoke:Cite|news|date=3 January 2020|title=Mystery pneumonia virus probed in China|work=[[BBC News]]|url=https://www.bbc.com/news/world-asia-china-50984025|url-status=live|access-date=29 January 2020|archive-url=https://web.archive.org/web/20200105051949/https://www.bbc.com/news/world-asia-china-50984025|archive-date=5 January 2020}}</ref>

      During the early stages of the outbreak, the number of cases doubled approximately every seven and a half days.<ref name="Qun29Jan2020">{{#invoke:Cite|journal | vauthors = Li Q, Guan X, Wu P, Wang X, Zhou L, Tong Y, Ren R, Leung KS, Lau EH, Wong JY, Xing X, Xiang N, Wu Y, Li C, Chen Q, Li D, Liu T, Zhao J, Liu M, Tu W, Chen C, Jin L, Yang R, Wang Q, Zhou S, Wang R, Liu H, Luo Y, Liu Y, Shao G, Li H, Tao Z, Yang Y, Deng Z, Liu B, Ma Z, Zhang Y, Shi G, Lam TT, Wu JT, Gao GF, Cowling BJ, Yang B, Leung GM, Feng Z | title = Early Transmission Dynamics in Wuhan, China, of Novel Coronavirus-Infected Pneumonia | journal = The New England Journal of Medicine | volume = 382 | issue = 13 | pages = 1199–1207 | date = March 2020 | pmid = 31995857 | pmc = 7121484 | doi = 10.1056/NEJMoa2001316 | title-link = doi | doi-access = free }}</ref> In early and mid-January 2020, the virus spread to other [[provinces of China|Chinese provinces]], helped by the [[Chunyun|Chinese New Year migration]] and Wuhan being a transport hub and major rail interchange.<ref name="WHOReport24Feb2020" /> On 20 January, China reported nearly 140 new cases in one day, including two people in Beijing and one in [[Shenzhen]].<ref name="france2420200120">{{#invoke:Cite|news|date=20 January 2020|title=China confirms sharp rise in cases of SARS-like virus across the country|url=https://www.france24.com/en/20200120-china-confirms-sharp-rise-in-cases-of-sars-like-virus-across-the-country|url-status=live|access-date=20 January 2020|archive-url=https://web.archive.org/web/20200120055618/https://www.france24.com/en/20200120-china-confirms-sharp-rise-in-cases-of-sars-like-virus-across-the-country|archive-date=20 January 2020}}</ref> Later official data shows 6,174 people had already developed symptoms by then,<ref name="Epidemiology17Feb2020">{{#invoke:Cite|journal|author=The Novel Coronavirus Pneumonia Emergency Response Epidemiology Team |date=February 2020|title=The Epidemiological Characteristics of an Outbreak of 2019 Novel Coronavirus Diseases (COVID-19) – China, 2020 |journal=China CDC Weekly|volume=2|issue=8|pages=113–122|doi=10.46234/ccdcw2020.032 |pmid=34594836|pmc=839292|doi-access=free |title-link=doi}}</ref> and more may have been infected.<ref name="flattery">{{#invoke:Cite|news|date=25 April 2020|title=Flattery and foot dragging: China's influence over the WHO under scrutiny|work=[[The Globe and Mail]] |url=https://www.theglobeandmail.com/world/article-flattery-and-foot-dragging-chinas-influence-over-the-who-under/}}</ref> A report in ''The Lancet'' on 24 January indicated human transmission, strongly recommended personal protective equipment for health workers, and said testing for the virus was essential due to its "pandemic potential".<ref name="Huang24Jan2020">{{#invoke:Cite|journal |vauthors=Huang C, Wang Y, Li X, Ren L, Zhao J, Hu Y, Zhang L, Fan G, Xu J, Gu X, Cheng Z, Yu T, Xia J, Wei Y, Wu W, Xie X, Yin W, Li H, Liu M, Xiao Y, Gao H, Guo L, Xie J, Wang G, Jiang R, Gao Z, Jin Q, Wang J, Cao B |title=Clinical features of patients infected with 2019 novel coronavirus in Wuhan, China |journal=Lancet |volume=395 |issue=10223 |pages=497–506 |date=February 2020 |pmid=31986264 |pmc=7159299 |doi=10.1016/S0140-6736(20)30183-5 |doi-access=free |title-link=doi}}</ref><ref name="Horton 18 March">{{#invoke:Cite|web| vauthors=Horton R |author-link=Richard Horton (editor)|date=18 March 2020 |title=Scientists have been sounding the alarm on coronavirus for months. Why did Britain fail to act?|url=https://www.theguardian.com/commentisfree/2020/mar/18/coronavirus-uk-expert-advice-wrong |access-date=23 April 2020|website=The Guardian}}</ref> On 30 January, the WHO declared COVID-19 a [[Public Health Emergency of International Concern]].<ref name="flattery" /> By this time, the outbreak spread by a factor of 100 to 200 times.<ref>{{#invoke:Cite|web|date=2 June 2020|title=China delayed releasing coronavirus info, frustrating WHO |work=Associated Press |url=https://apnews.com/3c061794970661042b18d5aeaaed9fae|access-date=3 June 2020}}</ref>

      Italy had its first confirmed cases on 31 January 2020, two tourists from China.<ref name="Corriere_20Jan">{{#invoke:Cite|web|date=31 January 2020|title=Coronavirus: Primi due casi in Italia|trans-title=Coronavirus: First two cases in Italy|url=https://www.corriere.it/cronache/20_gennaio_30/coronavirus-italia-corona-9d6dc436-4343-11ea-bdc8-faf1f56f19b7.shtml|access-date=31 January 2020|work=Corriere della sera|language=it}}</ref> Italy overtook China as the country with the most deaths on 19 March 2020.<ref name="sky11960412">{{#invoke:Cite|news|title=Coronavirus: Number of COVID-19 deaths in Italy surpasses China as total reaches 3,405|url=https://news.sky.com/story/coronavirus-number-of-covid-19-deaths-in-italy-surpasses-china-as-total-reaches-3-405-11960412|access-date=7 May 2020|newspaper=Sky News}}</ref> By 26 March the United States had overtaken China and Italy with the highest number of confirmed cases in the world.<ref name="NYT-20200326">{{#invoke:Cite|news| vauthors = McNeil Jr DG |author-link=Donald McNeil Jr.|date=26 March 2020|title=The U.S. Now Leads the World in Confirmed Coronavirus Cases|work=The New York Times|url=https://www.nytimes.com/2020/03/26/health/usa-coronavirus-cases.html |archive-url=https://web.archive.org/web/20200326211527/https://www.nytimes.com/2020/03/26/health/usa-coronavirus-cases.html |archive-date=26 March 2020 |url-access=subscription |url-status=live|access-date=27 March 2020}}</ref> Research on coronavirus genomes indicates the majority of COVID-19 cases in [[COVID-19 pandemic in New York (state)|New York]] came from European travellers, rather than directly from China or any other Asian country.<ref name="20200408nytimes">{{#invoke:Cite|news|date=8 April 2020|title=Studies Show N.Y. Outbreak Originated in Europe|work=The New York Times|url=https://www.nytimes.com/2020/04/08/us/coronavirus-live-updates.html |archive-url=https://web.archive.org/web/20200408185016/https://www.nytimes.com/2020/04/08/us/coronavirus-live-updates.html |archive-date=8 April 2020 |url-access=subscription |url-status=live}}</ref> Retesting of prior samples found a person in France who had the virus on 27 December 2019,<ref name="France-retest">{{#invoke:Cite|news| vauthors = Irish J |date=4 May 2020|title=After retesting samples, French hospital discovers COVID-19 case from December|work=[[Reuters]]| veditors = Lough RM, Graff P |url=https://www.reuters.com/article/us-health-coronavirus-france-idUSKBN22G20L|access-date=4 May 2020}}</ref><ref name="Deslandes-2020">{{#invoke:Cite|journal | vauthors = Deslandes A, Berti V, Tandjaoui-Lambotte Y, Alloui C, Carbonnelle E, Zahar JR, Brichler S, Cohen Y | title = SARS-CoV-2 was already spreading in France in late December 2019 | journal = International Journal of Antimicrobial Agents | volume = 55 | issue = 6 | article-number = 106006 | date = June 2020 | pmid = 32371096 | pmc = 7196402 | doi = 10.1016/j.ijantimicag.2020.106006 }}</ref> and a person in the United States who died from the disease on 6{{spaces}}February 2020.<ref name="PBS-2wks">{{#invoke:Cite|web|date=22 April 2020|title=2 died with coronavirus weeks before 1st U.S. virus death|url=https://www.pbs.org/newshour/nation/2-died-with-coronavirus-weeks-before-1st-u-s-virus-death|access-date=23 April 2020|website=PBS NewsHour}}</ref>

      RT-PCR testing of untreated wastewater samples from Brazil and Italy have suggested detection of SARS-CoV-2 as early as November and December 2019, respectively, but the methods of such sewage studies have not been optimised, many have not been peer-reviewed, details are often missing, and there is a risk of false positives due to contamination or if only one gene target is detected.<ref>{{#invoke:Cite|journal | vauthors = Michael-Kordatou I, Karaolia P, Fatta-Kassinos D | title = Sewage analysis as a tool for the COVID-19 pandemic response and management: the urgent need for optimised protocols for SARS-CoV-2 detection and quantification | journal = Journal of Environmental Chemical Engineering | volume = 8 | issue = 5 | article-number = 104306 | date = October 2020 | pmid = 32834990 | pmc = 7384408 | doi = 10.1016/j.jece.2020.104306 | bibcode = 2020JEChE...804306M }}</ref> A September 2020 review journal article said, "The possibility that the COVID‑19 infection had already spread to Europe at the end of last year is now indicated by abundant, even if partially circumstantial, evidence", including pneumonia case numbers and radiology in France and Italy in November and December.<ref name=platto>{{#invoke:Cite|journal | vauthors = Platto S, Xue T, Carafoli E | title = COVID19: an announced pandemic | journal = Cell Death & Disease | volume = 11 | issue = 9 | article-number = 799 | date = September 2020 | pmid = 32973152 | pmc = 7513903 | doi = 10.1038/s41419-020-02995-9 }}</ref>

      {{As of|2021|10|1}}, ''[[Reuters]]'' reported that it had estimated the worldwide total number of deaths due to COVID‑19 to have exceeded five million.<ref>{{#invoke:Cite|news|url=https://www.reuters.com/world/global-covid-19-deaths-hit-5-million-delta-variant-sweeps-world-2021-10-02/|title=Global COVID-19 deaths hit 5 million as Delta variant sweeps the world| vauthors = Kavya B, Abraham R |agency=Reuters| veditors = Shumaker L, Wardell J |date=3 October 2021|work=Reuters.com}}</ref>

      The Public Health Emergency of International Concern for COVID-19 ended on 5 May 2023. By this time, everyday life in most countries had returned to how it was before the pandemic.<ref>{{#invoke:Cite|web|title=From emergency response to long-term COVID-19 disease management: sustaining gains made during the COVID-19 pandemic|url=https://www.who.int/publications/i/item/WHO-WHE-SPP-2023.1|publisher=[[World Health Organization]] (WHO)|access-date=9 May 2023}}</ref><ref>{{#invoke:Cite|web|date=5 May 2023|title=WHO ends global health emergency declaration for COVID-19|url=https://www.npr.org/sections/goatsandsoda/2023/05/05/1174269442/who-ends-global-health-emergency-declaration-for-covid-19|website=NPR|first1=Giulia|last1=Heyward|first2=Marc|last2=Silver|access-date=9 May 2023}}</ref>

      == Misinformation ==
      {{Main|COVID-19 misinformation}}

      After the initial outbreak of COVID{{nbhyph}}19, [[misinformation]] and [[disinformation]] regarding the origin, scale, prevention, treatment, and other aspects of the disease rapidly spread online.<ref name="bbc_misinfo">{{#invoke:Cite|news |url=https://www.bbc.com/news/blogs-trending-51271037 |title=China coronavirus: Misinformation spreads online about origin and scale |date=30 January 2020 |work=[[BBC News]] |access-date=10 February 2020 |archive-url=https://web.archive.org/web/20200204163412/https://www.bbc.com/news/blogs-trending-51271037 |archive-date=4 February 2020 |url-status=live}}</ref><ref name="GUAR">{{#invoke:Cite|news |url=https://www.theguardian.com/world/2020/jan/31/bat-soup-dodgy-cures-and-diseasology-the-spread-of-coronavirus-bunkum |title=Bat soup, dodgy cures and 'diseasology': the spread of coronavirus misinformation |date=31 January 2020 |access-date=3 February 2020 | vauthors = Taylor J |newspaper=[[The Guardian]] |archive-url=https://web.archive.org/web/20200202141231/https://www.theguardian.com/world/2020/jan/31/bat-soup-dodgy-cures-and-diseasology-the-spread-of-coronavirus-bunkum |archive-date=2 February 2020 |url-status=live}}</ref><ref name="RunningList">{{#invoke:Cite|web|url=https://www.buzzfeednews.com/article/janelytvynenko/coronavirus-disinformation-spread |title=Here's A Running List Of Disinformation Spreading About The Coronavirus |website=Buzzfeed News |access-date=8 February 2020 |archive-url=https://web.archive.org/web/20200206212717/https://www.buzzfeednews.com/article/janelytvynenko/coronavirus-disinformation-spread |archive-date=6 February 2020 }}</ref>

      In September 2020, the US Centers for Disease Control and Prevention (CDC) published preliminary estimates of the risk of death by age groups in the United States, but those estimates were widely misreported and misunderstood.<ref name=":1" /><ref>{{#invoke:Cite|web|date=8 October 2020|title=Misleading claim circulates online about infection fatality ratio of Covid-19 in the US|url=https://factcheck.afp.com/misleading-claim-circulates-online-about-infection-fatality-ratio-covid-19-us|access-date=10 October 2020|website=Fact Check}}</ref>

      == Other species ==
      {{See also|Impact of the COVID-19 pandemic on animals}}
      Humans appear to be capable of spreading the virus to some other animals,<ref name="Gryseels_2021_MammalReview">{{#invoke:Cite|journal|last1=Gryseels |first1=Sophie |last2=De Bruyn |first2=Luc |last3=Gyselings |first3=Ralf |last4=Calvignac-Spencer |first4=Sébastien |last5=Leendertz |first5=Fabian H. |last6=Leirs |first6=Herwig |title=Risk of human-to-wildlife transmission of SARS-CoV-2 |journal=Mammal Review |date=April 2021 |volume=51 |issue=2 |pages=272–292 |doi=10.1111/mam.12225 |pmid=33230363 |pmc=7675675 |bibcode=2021MamRv..51..272G |hdl=10067/1726730151162165141 |issn=0305-1838}}</ref><ref name="TanLam2022_NatComm">{{#invoke:Cite|journal|last1=Tan |first1=Cedric C. S. |last2=Lam |first2=Su Datt |last3=Richard |first3=Damien |last4=Owen |first4=Christopher J. |last5=Berchtold |first5=Dorothea |last6=Orengo |first6=Christine |last7=Nair |first7=Meera Surendran |last8=Kuchipudi |first8=Suresh V. |last9=Kapur |first9=Vivek |last10=van Dorp |first10=Lucy |last11=Balloux |first11=François |title=Transmission of SARS-CoV-2 from humans to animals and potential host adaptation |journal=Nature Communications |date=27 May 2022 |volume=13 |issue=1 |page=2988 |doi=10.1038/s41467-022-30698-6 |pmid=35624123 |pmc=9142586 |bibcode=2022NatCo..13.2988T |issn=2041-1723}}</ref> a type of disease transmission referred to as [[anthroponotic disease|zooanthroponosis]].<ref name="Pappas_MDPI_2022">{{#invoke:Cite|journal |last1=Pappas |first1=Georgios |last2=Vokou |first2=Despoina |last3=Sainis |first3=Ioannis |last4=Halley |first4=John M. |title=SARS-CoV-2 as a Zooanthroponotic Infection: Spillbacks, Secondary Spillovers, and Their Importance |journal=Microorganisms |date=November 2022 |volume=10 |issue=11 |page=2166 |doi=10.3390/microorganisms10112166 |pmid=36363758 |pmc=9696655 |issn=2076-2607|doi-access=free }}</ref><ref name="MunirAshraf_2020">{{#invoke:Cite|journal |last1=Munir |first1=Khalid |last2=Ashraf |first2=Shoaib |last3=Munir |first3=Isra |last4=Khalid |first4=Hamna |last5=Muneer |first5=Mohammad Akram |last6=Mukhtar |first6=Noreen |last7=Amin |first7=Shahid |last8=Ashraf |first8=Sohaib |last9=Imran |first9=Muhammad Ahmad |last10=Chaudhry |first10=Umer |last11=Zaheer |first11=Muhammad Usman |last12=Arshad |first12=Maria |last13=Munir |first13=Rukhsana |last14=Ahmad |first14=Ali |last15=Zhao |first15=Xin |title=Zoonotic and reverse zoonotic events of SARS-CoV-2 and their impact on global health |journal=Emerging Microbes & Infections |date=1 January 2020 |volume=9 |issue=1 |pages=2222–2235 |doi=10.1080/22221751.2020.1827984 |pmid=32967592 |pmc=7594747 }}</ref>

      Some pets, especially cats and [[ferret]]s, can catch this virus from infected humans.<ref name="Kampf-2020">{{#invoke:Cite|journal | vauthors = Kampf G, Brüggemann Y, Kaba HE, Steinmann J, Pfaender S, Scheithauer S, Steinmann E | title = Potential sources, modes of transmission and effectiveness of prevention measures against SARS-CoV-2 | journal = The Journal of Hospital Infection | volume = 106 | issue = 4 | pages = 678–697 | date = December 2020 | pmid = 32956786 | pmc = 7500278 | doi = 10.1016/j.jhin.2020.09.022 }}</ref><ref>{{#invoke:Cite|journal | vauthors = Shi J, Wen Z, Zhong G, Yang H, Wang C, Huang B, Liu R, He X, Shuai L, Sun Z, Zhao Y, Liu P, Liang L, Cui P, Wang J, Zhang X, Guan Y, Tan W, Wu G, Chen H, Bu Z | title = Susceptibility of ferrets, cats, dogs, and other domesticated animals to SARS-coronavirus 2 | journal = Science | volume = 368 | issue = 6494 | pages = 1016–1020 | date = May 2020 | pmid = 32269068 | pmc = 7164390 | doi = 10.1126/science.abb7015 }}</ref> Symptoms in cats include [[respiratory symptom|respiratory]] (such as a cough) and digestive symptoms.<ref name="Kampf-2020" /> Cats can spread the virus to other cats, and may be able to spread the virus to humans, but cat-to-human transmission of SARS-CoV-2 has not been proven.<ref name="Kampf-2020" /><ref name="Tazerji-2020">{{#invoke:Cite|journal | vauthors = Salajegheh Tazerji S, Magalhães Duarte P, Rahimi P, Shahabinejad F, Dhakal S, Singh Malik Y, Shehata AA, Lama J, Klein J, Safdar M, Rahman MT, Filipiak KJ, Rodríguez-Morales AJ, Sobur MA, Kabir F, Vazir B, Mboera L, Caporale M, Islam MS, Amuasi JH, Gharieb R, Roncada P, Musaad S, Tilocca B, Koohi MK, Taghipour A, Sait A, Subbaram K, Jahandideh A, Mortazavi P, Abedini MA, Hokey DA, Hogan U, Shaheen MN, Elaswad A, Elhaig MM, Fawzy M |title = Transmission of severe acute respiratory syndrome coronavirus 2 (SARS-CoV-2) to animals: an updated review | journal = Journal of Translational Medicine | volume = 18 | issue = 1 | article-number = 358 | date = September 2020 | pmid = 32957995 | pmc = 7503431 | doi = 10.1186/s12967-020-02534-2 |doi-access=free}}</ref> Compared to cats, dogs are less susceptible to this infection.<ref name="Tazerji-2020" /> Behaviours which increase the risk of transmission include kissing, licking, and petting the animal.<ref name="Tazerji-2020" />

      The virus does not appear to be able to infect [[pig]]s, [[domestic duck|duck]]s, or chickens at all.<ref name="Kampf-2020" /> [[mouse|Mice]], rats, and rabbits, if they can be infected at all, are unlikely to be involved in spreading the virus.<ref name="Tazerji-2020" />

      Tigers and lions in zoos have become infected as a result of contact with infected humans.<ref name="Tazerji-2020" /> As expected, monkeys and [[great ape]] species such as [[orangutan]]s can also be infected with the COVID‑19 virus.<ref name="Tazerji-2020" />

      [[Mink]]s, which are in the [[weasel family|same family]] as ferrets, have been infected.<ref name="Tazerji-2020" /> Minks may be asymptomatic, and can also spread the virus to humans.<ref name="Tazerji-2020" /> Multiple countries have identified infected animals in [[mink farm]]s.<ref name="Gorman-2021">{{#invoke:Cite|news| vauthors = Gorman J |date=22 January 2021|title=The Coronavirus Kills Mink, So They Too May Get a Vaccine|work=The New York Times |url=https://www.nytimes.com/2021/01/22/science/covid-mink-vaccine.html |archive-url=https://ghostarchive.org/archive/20211228/https://www.nytimes.com/2021/01/22/science/covid-mink-vaccine.html |archive-date=28 December 2021 |url-access=limited|access-date=24 February 2021|issn=0362-4331| url-status=live}}</ref> [[Denmark]], a major producer of mink pelts, ordered the slaughter of all minks over fears of viral mutations,<ref name="Gorman-2021" /> following an outbreak referred to as [[Cluster 5]]. A vaccine for mink and other animals is being researched.<ref name="Gorman-2021" />

      == Research ==
      {{Further|COVID-19 drug development}}
      International research on vaccines and medicines in COVID{{nbhyph}}19 is underway by government organisations, academic groups, and industry researchers.<ref name="dhama">{{#invoke:Cite|journal | vauthors = Dhama K, Sharun K, Tiwari R, Dadar M, Malik YS, Singh KP, Chaicumpa W | title = COVID-19, an emerging coronavirus infection: advances and prospects in designing and developing vaccines, immunotherapeutics, and therapeutics | journal = Human Vaccines & Immunotherapeutics | volume = 16 | issue = 6 | pages = 1232–1238 | date = June 2020 | pmid = 32186952 | pmc = 7103671 | doi = 10.1080/21645515.2020.1735227 | title-link = doi | doi-access = free }}</ref><ref name="zhang2020">{{#invoke:Cite|journal | vauthors = Zhang L, Liu Y | title = Potential interventions for novel coronavirus in China: A systematic review | journal = Journal of Medical Virology | volume = 92 | issue = 5 | pages = 479–490 | date = May 2020 | pmid = 32052466 | pmc = 7166986 | doi = 10.1002/jmv.25707 }}</ref> The CDC has classified it to require a [[BSL3]] grade laboratory.<ref name=inlbg>{{#invoke:Cite|web|title=Interim Laboratory Biosafety Guidelines for Handling and Processing Specimens Associated with Coronavirus Disease 2019 (COVID-19) |url=https://www.cdc.gov/coronavirus/2019-ncov/lab/lab-biosafety-guidelines.html |website=Coronavirus Disease 2019 (COVID-19) Lab Biosafety Guidelines |date=11 February 2020 |publisher=U.S. [[Centers for Disease Control and Prevention]] (CDC) |access-date=1 April 2020}}</ref> There has been a great deal of COVID‑19 research, involving accelerated research processes and publishing shortcuts to meet the global demand.<ref name="Aristovnik et al. 2020">{{#invoke:Cite|journal|vauthors=Aristovnik A, Ravšelj D, Umek L|date=November 2020|title=A Bibliometric Analysis of COVID-19 across Science and Social Science Research Landscape|journal=Sustainability|volume=12|issue=21|page=9132|doi=10.3390/su12219132|doi-access=free | title-link = doi |bibcode=2020Sust...12.9132A }}</ref>

      {{As of|2020|December}}, hundreds of [[clinical trial]]s have been undertaken, with research happening on every continent except [[COVID-19 pandemic in Antarctica|Antarctica]].<ref>{{#invoke:Cite|journal | vauthors = Kupferschmidt K |title=First-of-its-kind African trial tests common drugs to prevent severe COVID-19 |journal=[[Science (journal)|Science]] |date=3 December 2020 |doi=10.1126/science.abf9987 |doi-access=free | title-link=doi |url=https://www.science.org/content/article/first-its-kind-african-trial-tests-common-drugs-prevent-severe-covid-19 |access-date=8 March 2022 }}</ref> {{As of|2020|November}}, more than 200 possible treatments have been studied in humans.<ref>{{#invoke:Cite|magazine | vauthors = Reardon S |date= November 2020|title=For COVID Drugs, Months of Frantic Development Lead to Few Outright Successes|url=https://www.scientificamerican.com/article/for-covid-drugs-months-of-frantic-development-lead-to-few-outright-successes/|access-date=10 December 2020|magazine=[[Scientific American]] }}</ref>

      === Transmission and prevention research ===
      {{Further|COVID-19 vaccine}}
      [[Modeling and simulation|Modelling]] research has been conducted with several objectives, including predictions of the dynamics of transmission,<ref>{{#invoke:Cite|journal | vauthors = Kucharski AJ, Russell TW, Diamond C, Liu Y, Edmunds J, Funk S, Eggo RM | title = Early dynamics of transmission and control of COVID-19: a mathematical modelling study | journal = The Lancet. Infectious Diseases | volume = 20 | issue = 5 | pages = 553–558 | date = May 2020 | pmid = 32171059 | pmc = 7158569 | doi = 10.1016/S1473-3099(20)30144-4 | doi-access = free | title-link = doi }}</ref> diagnosis and prognosis of infection,<ref>{{#invoke:Cite|journal|date=3 February 2021|title=Update to living systematic review on prediction models for diagnosis and prognosis of covid-19|journal=BMJ (Clinical Research Ed.)|volume=372|article-number=n236|doi=10.1136/bmj.n236|issn=1756-1833|pmid=33536183|s2cid=231775762}}</ref> estimation of the impact of interventions,<ref>{{#invoke:Cite|journal | vauthors = Giordano G, Blanchini F, Bruno R, Colaneri P, Di Filippo A, Di Matteo A, Colaneri M | title = Modelling the COVID-19 epidemic and implementation of population-wide interventions in Italy | journal = Nature Medicine | volume = 26 | issue = 6 | pages = 855–860 | date = June 2020 | pmid = 32322102 | pmc = 7175834 | doi = 10.1038/s41591-020-0883-7|arxiv=2003.09861 | doi-access = free | title-link = doi | bibcode = 2020NatMe..26..855G }}</ref><ref>{{#invoke:Cite|journal | vauthors = Prem K, Liu Y, Russell TW, Kucharski AJ, Eggo RM, Davies N, Jit M, Klepac P | title = The effect of control strategies to reduce social mixing on outcomes of the COVID-19 epidemic in Wuhan, China: a modelling study | journal = The Lancet. Public Health | volume = 5 | issue = 5 | pages = e261–e270 | date = May 2020 | pmid = 32220655 | pmc = 7158905 | doi = 10.1016/S2468-2667(20)30073-6 | doi-access = free | title-link = doi }}</ref> or allocation of resources.<ref>{{#invoke:Cite|journal | vauthors = Emanuel EJ, Persad G, Upshur R, Thome B, Parker M, Glickman A, Zhang C, Boyle C, Smith M, Phillips JP | title = Fair Allocation of Scarce Medical Resources in the Time of Covid-19 | journal = The New England Journal of Medicine | volume = 382 | issue = 21 | pages = 2049–2055 | date = May 2020 | pmid = 32202722 | doi = 10.1056/NEJMsb2005114 | doi-access = free | title-link = doi }}</ref> Modelling studies are mostly based on [[compartmental models in epidemiology]],<ref>{{#invoke:Cite|journal |doi=10.1098/rspa.1927.0118 |volume=115 |issue=772 |pages=700–721 |title=A contribution to the mathematical theory of epidemics |journal=Proceedings of the Royal Society of London. Series A, Containing Papers of a Mathematical and Physical Character |year=1927 |bibcode=1927RSPSA.115..700K |doi-access=free | title-link = doi | vauthors = Kermack WO, McKendrick AG }}</ref> estimating the number of infected people over time under given conditions. Several other types of models have been developed and used during the COVID{{nbhyph}}19 pandemic including [[computational fluid dynamics]] models to study the flow physics of COVID{{nbhyph}}19,<ref>{{#invoke:Cite|journal |doi=10.1017/jfm.2020.330 |volume=894 |pages=–2 | vauthors = Mittal R, Ni R, Seo JH |title=The flow physics of COVID-19 |journal=Journal of Fluid Mechanics |year=2020 |arxiv=2004.09354 |bibcode=2020JFM...894F...2M |doi-access=free | title-link = doi |article-number=F2 }}</ref> retrofits of crowd movement models to study occupant exposure,<ref>{{#invoke:Cite|journal | vauthors = Ronchi E, Lovreglio R | title = EXPOSED: An occupant exposure model for confined spaces to retrofit crowd models during a pandemic | journal = Safety Science | volume = 130 | article-number = 104834 | date = October 2020 | pmid = 32834509 | pmc = 7373681 | doi = 10.1016/j.ssci.2020.104834 | arxiv = 2005.04007 | doi-access = free | title-link = doi }}</ref> mobility-data based models to investigate transmission,<ref>{{#invoke:Cite|journal | vauthors = Badr HS, Du H, Marshall M, Dong E, Squire MM, Gardner LM | title = Association between mobility patterns and COVID-19 transmission in the USA: a mathematical modelling study | journal = The Lancet Infectious Diseases | volume = 20 | issue = 11 | pages = 1247–1254 | date = November 2020 | pmid = 32621869 | pmc = 7329287 | doi = 10.1016/S1473-3099(20)30553-3 | doi-access = free | title-link = doi | bibcode = 2020LanID..20.1247B }}</ref> or the use of [[macroeconomic]] models to assess the economic impact of the pandemic.<ref>{{#invoke:Cite|journal | vauthors = McKibbin W, Roshen F | title = The global macroeconomic impacts of COVID-19: Seven scenarios |journal=CAMA Working Paper |year=2020 |doi=10.2139/ssrn.3547729 |s2cid=216307705 |url= https://cama.crawford.anu.edu.au/sites/default/files/publication/cama_crawford_anu_edu_au/2020-03/19_2020_mckibbin_fernando_0.pdf }}</ref>

      === Treatment-related research ===
      {{Main|COVID-19 drug repurposing research}}

      [[File:Fmolb-07-585899-g001.jpg|thumb|Seven possible drug targets in viral replication process and drugs]]
      Repurposed [[antiviral drug]]s make up most of the research into COVID‑19 treatments.<ref name="milken">{{#invoke:Cite|web|date=21 April 2020|title=COVID-19 treatment and vaccine tracker|url=https://milkeninstitute.org/sites/default/files/2020-04/Covid19%20Tracker%20NEW4-21-20-2.pdf|access-date=21 April 2020|publisher=Milken Institute }}</ref><ref name="koch">{{#invoke:Cite|web| vauthors = Koch S, Pong W |date=13 March 2020|title=First up for COVID-19: nearly 30 clinical readouts before end of April|url=https://www.biocentury.com/article/304658|access-date=1 April 2020|publisher=BioCentury Inc.}}</ref> Other candidates in trials include [[vasodilator]]s, [[corticosteroid]]s, immune therapies, [[lipoic acid]], [[bevacizumab]], and [[recombinant DNA|recombinant]] angiotensin-converting enzyme 2.<ref name="koch" />

      In March 2020, the World Health Organization (WHO) initiated the [[Solidarity trial]] to assess the treatment effects of some promising drugs:<ref name="kai">{{#invoke:Cite|journal|vauthors=Kupferschmidt K, Cohen J|date=March 2020|title=WHO launches global megatrial of the four most promising coronavirus treatments|journal=Science|doi=10.1126/science.abb8497|doi-access=free|title-link=doi}}</ref><ref>{{#invoke:Cite|web|url=https://news.un.org/en/story/2020/03/1059722|title=UN health chief announces global 'solidarity trial' to jumpstart search for COVID-19 treatment|date=18 March 2020|website=UN News|access-date=23 March 2020|archive-url=https://web.archive.org/web/20200323101633/https://news.un.org/en/story/2020/03/1059722|archive-date=23 March 2020|url-status=live}}</ref>
      * An [[experimental drug]] called [[remdesivir]]
      * [[antimalarial medication|Anti-malarial]] drugs [[chloroquine]] and [[hydroxychloroquine]]
      * Two [[anti-HIV medications|anti-HIV drugs]], [[lopinavir/ritonavir]] and [[interferon-beta]]

      More than 300 active clinical trials are underway as of April 2020.<ref name="Sanders202022" />

      Research on the antimalarial drugs hydroxychloroquine and chloroquine showed that they were ineffective at best,<ref name="20200526nytimes">{{#invoke:Cite|web|date=26 May 2020|title=Citing safety concerns, the W.H.O. paused tests of a drug Trump said he had taken|url=https://www.nytimes.com/2020/05/26/world/coronavirus-news.html |archive-url=https://web.archive.org/web/20200526041004/https://www.nytimes.com/2020/05/26/world/coronavirus-news.html |archive-date=26 May 2020 |url-access=subscription |url-status=live|work=The New York Times}}</ref><ref>{{citation-attribution|1={{#invoke:Cite|press release|title=Hydroxychloroquine does not benefit adults hospitalized with COVID-19|website=National Institutes of Health (NIH)|date=9 November 2020|url=https://www.nih.gov/news-events/news-releases/hydroxychloroquine-does-not-benefit-adults-hospitalized-covid-19|access-date=9 November 2020}} }}</ref> and that they may reduce the antiviral activity of remdesivir.<ref>{{citation-attribution|1={{#invoke:Cite|press release|title=Coronavirus (COVID-19) Update: FDA Warns of Newly Discovered Potential Drug Interaction That May Reduce Effectiveness of a COVID-19 Treatment Authorized for Emergency Use|website=U.S. [[Food and Drug Administration]] (FDA)|date=15 June 2020|url=https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-warns-newly-discovered-potential-drug-interaction-may-reduce|archive-url=https://web.archive.org/web/20200615222107/https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-warns-newly-discovered-potential-drug-interaction-may-reduce|archive-date=15 June 2020|access-date=15 June 2020}} }}</ref> {{As of|2020|May|alt=By May 2020}}, France, Italy, and Belgium had banned the use of hydroxychloroquine as a COVID‑19 treatment.<ref>{{#invoke:Cite|web|date=27 May 2020|title=France bans use of hydroxychloroquine, drug touted by Trump, in coronavirus patients|url=https://www.cbsnews.com/news/france-bans-use-of-hydroxychloroquine-drug-touted-by-trump-to-treat-coronavirus/|publisher=CBS News}}</ref>

      In June, initial results from the randomised [[RECOVERY Trial]] in the United Kingdom showed that dexamethasone reduced mortality by one third for people who are critically ill on ventilators and one fifth for those receiving supplemental oxygen.<ref>{{#invoke:Cite|news | vauthors = Boseley S |title=Recovery trial for Covid-19 treatments: what we know so far |url= https://www.theguardian.com/world/2020/jun/16/recovery-trial-for-covid-19-treatments-what-we-know-so-far |access-date=21 June 2020 |work=[[The Guardian]] |date=16 June 202}}</ref> Because this is a well-tested and widely available treatment, it was welcomed by the WHO, which is in the process of updating treatment guidelines to include dexamethasone and other steroids.<ref>{{#invoke:Cite|press release |title=WHO welcomes preliminary results about dexamethasone use in treating critically ill COVID-19 patients |url=https://www.who.int/news-room/detail/16-06-2020-who-welcomes-preliminary-results-about-dexamethasone-use-in-treating-critically-ill-covid-19-patients |website=[[World Health Organization]] (WHO) |access-date=21 June 2020 |date=16 June 2020}}</ref><ref>{{#invoke:Cite|press release|title=Q&A: Dexamethasone and COVID-19|url=https://www.who.int/news-room/q-a-detail/q-a-dexamethasone-and-covid-19|access-date=12 July 2020|website=[[World Health Organization]] (WHO)}}</ref> Based on those preliminary results, dexamethasone treatment has been recommended by the NIH for peoples with COVID‑19 who are mechanically ventilated or who require supplemental oxygen but not in people with COVID‑19 who do not require supplemental oxygen.<ref>{{#invoke:Cite|web|title=Corticosteroids|url=https://www.covid19treatmentguidelines.nih.gov/immune-based-therapy/immunomodulators/corticosteroids/|access-date=12 July 2020|website=COVID-19 Treatment Guidelines|publisher=National Institutes of Health}}</ref>

      In September 2020, the WHO released updated guidance on using corticosteroids for COVID‑19.<ref name="WHO guidance">{{#invoke:Cite|report | year=2020 | title=Corticosteroids for COVID-19: living guidance, 2 September 2020 |publisher=[[World Health Organization]] | id=WHO/2019-nCoV/Corticosteroids/2020.1 | hdl=10665/334125 | hdl-access=free }}</ref><ref>{{#invoke:Cite|web| title=WHO updates clinical care guidance with corticosteroid recommendations | publisher=[[World Health Organization]] (WHO) | url=https://www.who.int/news-room/feature-stories/detail/who-updates-clinical-care-guidance-with-corticosteroid-recommendations | access-date=25 January 2022}}</ref> The WHO recommends systemic corticosteroids rather than no systemic corticosteroids for the treatment of people with severe and critical COVID‑19 (strong recommendation, based on moderate certainty evidence).<ref name="WHO guidance" /> The WHO suggests not to use corticosteroids in the treatment of people with non-severe COVID‑19 (conditional recommendation, based on low certainty evidence).<ref name="WHO guidance" /> The updated guidance was based on a meta-analysis of clinical trials of people critically ill with COVID‑19.<ref>{{#invoke:Cite|journal | vauthors = Sterne JA, Murthy S, Diaz JV, Slutsky AS, Villar J, Angus DC, Annane D, Azevedo LC, Berwanger O, Cavalcanti AB, Dequin PF, Du B, Emberson J, Fisher D, Giraudeau B, Gordon AC, Granholm A, Green C, Haynes R, Heming N, Higgins JP, Horby P, Jüni P, Landray MJ, Le Gouge A, Leclerc M, Lim WS, Machado FR, McArthur C, Meziani F, Møller MH, Perner A, Petersen MW, Savovic J, Tomazini B, Veiga VC, Webb S, Marshall JC | title = Association Between Administration of Systemic Corticosteroids and Mortality Among Critically Ill Patients With COVID-19: A Meta-analysis | journal = JAMA | volume = 324 | issue = 13 | pages = 1330–1341 | date = October 2020 | pmid = 32876694 | pmc = 7489434 | doi = 10.1001/jama.2020.17023 | collaboration = The WHO Rapid Evidence Appraisal for COVID-19 Therapies (REACT) Working Group | s2cid = 221467783 | doi-access = free | title-link = doi }}</ref><ref>{{#invoke:Cite|journal | vauthors = Prescott HC, Rice TW | title = Corticosteroids in COVID-19 ARDS: Evidence and Hope During the Pandemic | journal = JAMA | volume = 324 | issue = 13 | pages = 1292–1295 | date = October 2020 | pmid = 32876693 | doi = 10.1001/jama.2020.16747 | s2cid = 221468015 | doi-access = free | title-link = doi }}</ref>

      In September 2020, the [[European Medicines Agency]] (EMA) endorsed the use of dexamethasone in adults and adolescents from 12 years of age and weighing at least {{convert|40|kg}} who require supplemental oxygen therapy.<ref name="EMA PR">{{#invoke:Cite|press release | title=EMA endorses use of dexamethasone in COVID-19 patients on oxygen or mechanical ventilation | website=[[European Medicines Agency]] (EMA) | date=18 September 2020 | url=https://www.ema.europa.eu/en/news/ema-endorses-use-dexamethasone-covid-19-patients-oxygen-mechanical-ventilation | access-date=21 September 2020}} Text was copied from this source which is copyright European Medicines Agency. Reproduction is authorized provided the source is acknowledged.</ref><ref>{{#invoke:Cite|report |url=https://www.ema.europa.eu/en/documents/other/dexamethasone-covid19-article-53-procedure-assessment-report_en.pdf |title=Dexamethasone in hospitalised patients with COVID-19 |publisher=European Medicines Agency |date=17 September 2020}}</ref> Dexamethasone can be taken [[oral administration|by mouth]] or given as an injection or [[intravenous|infusion (drip) into a vein]].<ref name="EMA PR" />

      In November 2020, the US [[Food and Drug Administration]] (FDA) issued an emergency use authorisation for the investigational monoclonal antibody therapy [[bamlanivimab]] for the treatment of mild-to-moderate COVID‑19.<ref name="FDA bamlanivimab EUA">{{citation-attribution|1={{#invoke:Cite|press release | title=Coronavirus (COVID-19) Update: FDA Authorizes Monoclonal Antibody for Treatment of COVID-19 | website=U.S. [[Food and Drug Administration]] (FDA) | date=9 November 2020 | url=https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-authorizes-monoclonal-antibody-treatment-covid-19 | archive-url=https://web.archive.org/web/20201109232127/https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-authorizes-monoclonal-antibody-treatment-covid-19 | archive-date=9 November 2020 | access-date=9 November 2020}} }}</ref> Bamlanivimab is authorised for people with positive results of direct SARS-CoV-2 viral testing who are twelve years of age and older weighing at least {{convert|40|kg}}, and who are at high risk for progressing to severe COVID‑19 or hospitalisation.<ref name="FDA bamlanivimab EUA" /> This includes those who are 65 years of age or older, or who have chronic medical conditions.<ref name="FDA bamlanivimab EUA" />

      In February 2021, the FDA issued an emergency use authorisation (EUA) for bamlanivimab and [[etesevimab]] administered together for the treatment of mild to moderate COVID‑19 in people twelve years of age or older weighing at least {{convert|40|kg|lb}} who test positive for SARS‑CoV‑2 and who are at high risk for progressing to severe COVID‑19. The authorised use includes treatment for those who are 65 years of age or older or who have certain chronic medical conditions.<ref name="FDA PR 20210209">{{citation-attribution|1={{#invoke:Cite|press release|title=FDA Authorizes Monoclonal Antibodies for Treatment of COVID-19|website=U.S. [[Food and Drug Administration]] (FDA)|date=10 February 2021|url=https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-authorizes-monoclonal-antibodies-treatment-covid-19-0|archive-url=https://web.archive.org/web/20210210004700/http://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-authorizes-monoclonal-antibodies-treatment-covid-19-0|archive-date=10 February 2021|access-date=9 February 2021}} }}</ref>

      In April 2021, the FDA revoked the emergency use authorisation (EUA) that allowed for the investigational monoclonal antibody therapy bamlanivimab, when administered alone, to be used for the treatment of mild-to-moderate COVID‑19 in adults and certain paediatric patients.<ref name="FDA PR 20210416">{{citation-attribution|1={{#invoke:Cite|press release | title=Coronavirus (COVID-19) Update: FDA Revokes Emergency Use Authorization for Monoclonal Antibody Bamlanivimab | website=U.S. [[Food and Drug Administration]] (FDA) | date=16 April 2021 | url=https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-revokes-emergency-use-authorization-monoclonal-antibody-bamlanivimab | access-date=16 April 2021}} }}</ref>

      ==== Cytokine storm ====
      [[File:Fimmu-11-01648-g003.jpg|thumb|Various therapeutic strategies for targeting cytokine storm|right]]
      A [[cytokine storm]] can be a complication in the later stages of severe COVID‑19. A cytokine storm is a potentially deadly immune reaction where a large amount of pro-inflammatory cytokines and [[chemokine]]s are released too quickly. A cytokine storm can lead to ARDS and multiple organ failure.<ref>{{#invoke:Cite|journal | vauthors = Li X, Geng M, Peng Y, Meng L, Lu S | title = Molecular immune pathogenesis and diagnosis of COVID-19 | journal = Journal of Pharmaceutical Analysis | volume = 10 | issue = 2 | pages = 102–108 | date = April 2020 | pmid = 32282863 | pmc = 7104082 | doi = 10.1016/j.jpha.2020.03.001 }}</ref> Data collected from Jin Yin-tan Hospital in Wuhan, China indicates that people who had more severe responses to COVID‑19 had greater amounts of pro-inflammatory cytokines and chemokines in their system than people who had milder responses. These high levels of pro-inflammatory cytokines and chemokines indicate presence of a cytokine storm.<ref>{{#invoke:Cite|journal | vauthors = Zhao Z, Wei Y, Tao C | title = An enlightening role for cytokine storm in coronavirus infection | journal = Clinical Immunology | volume = 222 | article-number = 108615 | date = January 2021 | pmid = 33203513 | pmc = 7583583 | doi = 10.1016/j.clim.2020.108615 }}</ref>

      [[Tocilizumab]] has been included in treatment guidelines by China's [[National Health Commission]] after a small study was completed.<ref name="tocil-1">{{#invoke:Cite|news |vauthors = Liu R, Miller J |url = https://www.reuters.com/article/us-health-coronavirus-china-roche-hldg/china-approves-use-of-roche-arthritis-drug-for-coronavirus-patients-idUSKBN20R0LF |title=China approves use of Roche drug in battle against coronavirus complications |date=3 March 2020 |work=[[Reuters]] |access-date=14 March 2020 |archive-url=https://web.archive.org/web/20200312204625/https://www.reuters.com/article/us-health-coronavirus-china-roche-hldg/china-approves-use-of-roche-arthritis-drug-for-coronavirus-patients-idUSKBN20R0LF |archive-date=12 March 2020 |url-status=live}}</ref><ref name="tocil-2">{{#invoke:Cite|journal |vauthors = Xu X, Han M, Li T, Sun W, Wang D, Fu B, Zhou Y, Zheng X, Yang Y, Li X, Zhang X, Pan A, Wei H |title = Effective treatment of severe COVID-19 patients with tocilizumab |journal = Proceedings of the National Academy of Sciences of the United States of America |volume = 117 |issue = 20 |pages = 10970–10975 |date = May 2020 |pmid = 32350134 |pmc = 7245089 |doi = 10.1073/pnas.2005615117 |doi-access = free |title-link = doi |bibcode = 2020PNAS..11710970X }}</ref> It is undergoing a [[phase IIb|Phase{{spaces}}II]] non-randomised trial at the national level in Italy after showing positive results in people with severe disease.<ref>{{#invoke:Cite|web|vauthors = Ovadia D, Agenzia Z |title=COVID-19 – Italy launches an independent trial on tocilizumab |url=https://www.univadis.co.uk/viewarticle/covid-19-italy-launches-an-independent-trial-on-tocilizumab-715741 |website=Univadis from Medscape |publisher=Aptus Health |access-date=22 April 2020}}</ref><ref>{{#invoke:Cite|web|title=Tocilizumab in COVID-19 Pneumonia (TOCIVID-19) (TOCIVID-19) |url=https://clinicaltrials.gov/ct2/show/NCT04317092 |website=clinicaltrials.gov |access-date=22 April 2020}}</ref> Combined with a serum [[Ferrite (magnet)|ferritin]] blood test to identify a cytokine storm (also called cytokine storm syndrome, not to be confused with [[cytokine release syndrome]]), it is meant to counter such developments, which are thought to be the cause of death in some affected people.<ref name="tocil-5,6,8">Various sources:
      * {{#invoke:Cite|web|url=https://www.vox.com/2020/3/12/21176783/coronavirus-covid-19-deaths-china-treatment-cytokine-storm-syndrome|title=How doctors can potentially significantly reduce the number of deaths from Covid-19|work=[[Vox (website)|Vox]]|access-date=14 March 2020|date=12 March 2020|archive-url=https://web.archive.org/web/20200319155218/https://www.vox.com/2020/3/12/21176783/coronavirus-covid-19-deaths-china-treatment-cytokine-storm-syndrome|archive-date=19 March 2020|url-status=live}}
      * {{#invoke:Cite|journal | vauthors = Ruan Q, Yang K, Wang W, Jiang L, Song J | title = Clinical predictors of mortality due to COVID-19 based on an analysis of data of 150 patients from Wuhan, China | journal = Intensive Care Medicine | volume = 46 | issue = 5 | pages = 846–848 | date = May 2020 | pmid = 32125452 | pmc = 7080116 | doi = 10.1007/s00134-020-05991-x | ref = none }}
      * {{#invoke:Cite|journal | vauthors = Mehta P, McAuley DF, Brown M, Sanchez E, Tattersall RS, Manson JJ | title = COVID-19: consider cytokine storm syndromes and immunosuppression | journal = Lancet | volume = 395 | issue = 10229 | pages = 1033–1034 | date = March 2020 | pmid = 32192578 | pmc = 7270045 | doi = 10.1016/S0140-6736(20)30628-0 | ref = none | title-link = doi | bibcode = 2020Lanc..395.1033M | doi-access = free }}</ref> The [[interleukin-6 receptor]] (IL-6R) [[receptor antagonist|antagonist]] was approved by the FDA to undergo a Phase{{spaces}}III clinical trial assessing its effectiveness on COVID‑19 based on retrospective case studies for the treatment of steroid-refractory cytokine release syndrome induced by a different cause, [[chimeric antigen receptor T cell|CAR T cell]] [[gene therapy|therapy]], in 2017.<ref name="CancerNetworkTocilizumabTrial">{{#invoke:Cite|web| vauthors = Slater H |title=FDA Approves Phase III Clinical Trial of Tocilizumab for COVID-19 Pneumonia |url=https://www.cancernetwork.com/news/fda-approves-phase-iii-clinical-trial-tocilizumab-covid-19-pneumonia |website=cancernetwork.com |date=26 March 2020 |publisher=Cancer Network |access-date=22 April 2020}}</ref> There is no randomised, controlled evidence that tocilizumab is an efficacious treatment for CRS. Prophylactic tocilizumab has been shown to increase serum IL-6 levels by saturating the IL-6R, driving IL-6 across the [[blood–brain barrier]], and exacerbating [[neurotoxicity]] while having no effect on the incidence of CRS.<ref>{{#invoke:Cite|journal |vauthors=Locke FL, Neelapu SS, Bartlett NL, Lekakis LJ, Jacobson CA, Braunschweig I, Oluwole OO, Siddiqi T, Lin Y, Timmerman JM, Reagan PM, Bot A, Rossi JM, Sherman M, Navale L, Jiang Y, Aycock JS, Elias M, Wiezorek JS, Go WY, Miklos DB |title=Preliminary Results of Prophylactic Tocilizumab after Axicabtageneciloleucel (axi-cel; KTE-C19) Treatment for Patients with Refractory, Aggressive Non-Hodgkin Lymphoma (NHL) |journal=Blood |year=2017 |volume=130 |issue=Supplement 1 |page=1547 |doi=10.1182/blood.V130.Suppl_1.1547.1547 |s2cid=155698207 |url=https://ashpublications.org/blood/article/130/Supplement%201/1547/79746}}</ref>

      [[Lenzilumab]], an anti-GM-CSF [[monoclonal antibody]], is protective in murine models for CAR T cell-induced CRS and neurotoxicity and is a viable therapeutic option due to the observed increase of pathogenic GM-CSF secreting T{{spaces}}cells in hospitalised patients with COVID‑19.<ref>{{#invoke:Cite|journal | vauthors = Sterner RM, Sakemura R, Cox MJ, Yang N, Khadka RH, Forsman CL, Hansen MJ, Jin F, Ayasoufi K, Hefazi M, Schick KJ, Walters DK, Ahmed O, Chappell D, Sahmoud T, Durrant C, Nevala WK, Patnaik MM, Pease LR, Hedin KE, Kay NE, Johnson AJ, Kenderian SS | title = GM-CSF inhibition reduces cytokine release syndrome and neuroinflammation but enhances CAR T cell function in xenografts | journal = Blood | volume = 133 | issue = 7 | pages = 697–709 | date = February 2019 | pmid = 30463995 | pmc = 6376281 | doi = 10.1182/blood-2018-10-881722 }}</ref>

      ==== Passive antibodies ====
      [[File:Ppat.1008735.g002.png|thumb|Overview of the application and use of [[convalescent plasma]] therapy]]
      Transferring purified and concentrated [[immunoglobulin therapy|antibodies]] produced by the immune systems of those who have recovered from COVID‑19 to people who need them is being investigated as a non-vaccine method of [[passive immunity|passive immunisation]].<ref name="pmid-32167489">{{#invoke:Cite|journal | vauthors = Casadevall A, Pirofski LA | title = The convalescent sera option for containing COVID-19 | journal = The Journal of Clinical Investigation | volume = 130 | issue = 4 | pages = 1545–1548 | date = April 2020 | pmid = 32167489 | pmc = 7108922 | doi = 10.1172/JCI138003 }}</ref><ref name="Iannizzi-2023">{{#invoke:Cite|journal |last1=Iannizzi |first1=Claire |last2=Chai |first2=Khai Li |last3=Piechotta |first3=Vanessa |last4=Valk |first4=Sarah J. |last5=Kimber |first5=Catherine |last6=Monsef |first6=Ina |last7=Wood |first7=Erica M. |last8=Lamikanra |first8=Abigail A. |last9=Roberts |first9=David J. |last10=McQuilten |first10=Zoe |last11=So-Osman |first11=Cynthia |last12=Jindal |first12=Aikaj |last13=Cryns |first13=Nora |last14=Estcourt |first14=Lise J. |last15=Kreuzberger |first15=Nina |date=2023-05-10 |title=Convalescent plasma for people with COVID-19: a living systematic review |journal=The Cochrane Database of Systematic Reviews |volume=2023 |issue=5 |article-number=CD013600 |doi=10.1002/14651858.CD013600.pub6 |issn=1469-493X |pmc=10171886 |pmid=37162745 }}</ref> [[neutralisation (immunology)|Viral neutralisation]] is the anticipated [[mechanism of action]] by which passive antibody therapy can mediate defence against SARS-CoV-2. The spike protein of SARS-CoV-2 is the primary target for neutralising antibodies.<ref name="Ho-2020">{{#invoke:Cite|journal | vauthors = Ho M | title = Perspectives on the development of neutralizing antibodies against SARS-CoV-2 | journal = Antibody Therapeutics | volume = 3 | issue = 2 | pages = 109–114 | date = April 2020 | pmid = 32566896 | pmc = 7291920 | doi = 10.1093/abt/tbaa009 | title-link = doi | doi-access = free }}</ref> As of 8{{spaces}}August 2020, eight neutralising antibodies targeting the spike protein of SARS-CoV-2 have entered clinical studies.<ref>{{#invoke:Cite|journal | vauthors = Yang L, Liu W, Yu X, Wu M, Reichert JM, Ho M | title = COVID-19 antibody therapeutics tracker: a global online database of antibody therapeutics for the prevention and treatment of COVID-19 | journal = Antibody Therapeutics | volume = 3 | issue = 3 | pages = 205–212 | date = July 2020 | pmid = 33215063 | pmc = 7454247 | doi = 10.1093/abt/tbaa020 }}</ref> It has been proposed that selection of broad-neutralising antibodies against SARS-CoV-2 and SARS-CoV might be useful for treating not only COVID‑19 but also future SARS-related CoV infections.<ref name="Ho-2020" /> Other mechanisms, however, such as [[antibody-dependent cellular cytotoxicity|antibody-dependant cellular cytotoxicity]] or [[phagocytosis]], may be possible.<ref name="pmid-32167489" /> Other forms of passive antibody therapy, for example, using manufactured monoclonal antibodies, are in development.<ref name="pmid-32167489" />

      The use of passive antibodies to treat people with active COVID{{nbhyph}}19 is also being studied. This involves the production of [[convalescent serum]], which consists of the liquid portion of the blood from people who recovered from the infection and contains antibodies specific to this virus, which is then administered to active patients.<ref name="pmid-32167489" /> This strategy was tried for SARS with inconclusive results.<ref name="pmid-32167489" /> An updated Cochrane review in May 2023 found high certainty evidence that, for the treatment of people with moderate to severe COVID‑19, convalescent plasma did not reduce mortality or bring about symptom improvement.<ref name="Iannizzi-2023" /> There continues to be uncertainty about the safety of convalescent plasma administration to people with COVID‑19 and differing outcomes measured in different studies limits their use in determining efficacy.<ref name="Iannizzi-2023" />

      === Bioethics ===
      Since the outbreak of the COVID‑19 pandemic, scholars have explored the [[bioethics]], [[normative economics]], and [[political philosophy|political theories]] of [[healthcare policy|healthcare policies]] related to the public health crisis.<ref>{{#invoke:Cite|journal | vauthors = Maccaro A, Piaggio D, Pagliara S, Pecchia L | title = The role of ethics in science: a systematic literature review from the first wave of COVID-19 | journal = Health and Technology | volume = 11 | issue = 5 | pages = 1063–1071 | date = June 2021 | pmid = 34104626 | pmc = 8175060 | doi = 10.1007/s12553-021-00570-6|issn=2190-7188 }}</ref> Academics have pointed to the moral distress of healthcare workers, ethics of distributing scarce healthcare resources such as ventilators,<ref>{{#invoke:Cite|journal | vauthors = McGuire AL, Aulisio MP, Davis FD, Erwin C, Harter TD, Jagsi R, Klitzman R, Macauley R, Racine E, Wolf SM, Wynia M, Wolpe PR | title = Ethical Challenges Arising in the COVID-19 Pandemic: An Overview from the Association of Bioethics Program Directors (ABPD) Task Force | journal = The American Journal of Bioethics | volume = 20 | issue = 7 | pages = 15–27 | date = July 2020 | pmid = 32511078 | doi = 10.1080/15265161.2020.1764138 | s2cid = 219552665 }}</ref> and the global justice of vaccine diplomacies.<ref>{{Cite journal |last1=Hotez |first1=Peter J. |last2=Batista |first2=Carolina |last3=Amor |first3=Yanis Ben |last4=Ergonul |first4=Onder |last5=Figueroa |first5=J Peter |last6=Gilbert |first6=Sarah |last7=Gursel |first7=Mayda |last8=Hassanain |first8=Mazen |last9=Kang |first9=Gagandeep |last10=Kaslow |first10=David C. |last11=Kim |first11=Jerome H. |last12=Lall |first12=Bhavna |last13=Larson |first13=Heidi |last14=Naniche |first14=Denise |last15=Sheahan |first15=Timothy |date=2021 |title=Global public health security and justice for vaccines and therapeutics in the COVID-19 pandemic |journal=eClinicalMedicine |language=en |volume=39 |article-number=101053 |doi=10.1016/j.eclinm.2021.101053 |pmc=8330385 |pmid=34368661}}</ref><ref>{{Cite journal |last1=Sparke |first1=Matthew |last2=Levy |first2=Orly |date=2022-08-15 |title=Competing Responses to Global Inequalities in Access to COVID Vaccines: Vaccine Diplomacy and Vaccine Charity Versus Vaccine Liberty |url=https://academic.oup.com/cid/article/75/Supplement_1/S86/6583150 |journal=Clinical Infectious Diseases |language=en |volume=75 |issue=Supplement_1 |pages=S86–S92 |doi=10.1093/cid/ciac361 |issn=1058-4838 |pmc=9376271 |pmid=35535787}}</ref> The socio-economic inequalities between genders,<ref>{{#invoke:Cite|journal | vauthors = Wenham C, Smith J, Morgan R | title = COVID-19: the gendered impacts of the outbreak | journal = Lancet | volume = 395 | issue = 10227 | pages = 846–848 | date = March 2020 | pmid = 32151325 | pmc = 7124625 | doi = 10.1016/S0140-6736(20)30526-2 | bibcode = 2020Lanc..395..846W }}</ref> races,<ref>{{#invoke:Cite|journal | vauthors = Tolchin B, Hull SC, Kraschel K | title = Triage and justice in an unjust pandemic: ethical allocation of scarce medical resources in the setting of racial and socioeconomic disparities | journal = Journal of Medical Ethics | volume = 47 | issue = 3 | pages = 200–202 | date = October 2020 | pmid = 33067315 | doi = 10.1136/medethics-2020-106457 | s2cid = 223558059 }}</ref> groups with disabilities,<ref>{{#invoke:Cite|journal | vauthors = Sabatello M, Burke TB, McDonald KE, Appelbaum PS | title = Disability, Ethics, and Health Care in the COVID-19 Pandemic | journal = American Journal of Public Health | volume = 110 | issue = 10 | pages = 1523–1527 | date = October 2020 | pmid = 32816541 | pmc = 7483109 | doi = 10.2105/AJPH.2020.305837 }}</ref> communities,<ref>{{#invoke:Cite|journal | vauthors = Chin T, Kahn R, Li R, Chen JT, Krieger N, Buckee CO, Balsari S, Kiang MV | title = US-county level variation in intersecting individual, household and community characteristics relevant to COVID-19 and planning an equitable response: a cross-sectional analysis | journal = BMJ Open | volume = 10 | issue = 9 | article-number = e039886 | date = September 2020 | pmid = 32873684 | pmc = 7467554 | doi = 10.1136/bmjopen-2020-039886 | doi-access = free }}</ref> regions, countries,<ref>{{#invoke:Cite|journal | vauthors = Elgar FJ, Stefaniak A, Wohl MJ | title = The trouble with trust: Time-series analysis of social capital, income inequality, and COVID-19 deaths in 84 countries | journal = Social Science & Medicine | volume = 263 | article-number = 113365 | date = October 2020 | pmid = 32981770 | pmc = 7492158 | doi = 10.1016/j.socscimed.2020.113365 }}</ref> and continents have also drawn attention in academia and the general public.<ref>{{Cite journal |last1=Abu El Kheir-Mataria |first1=Wafa |last2=Khadr |first2=Zeinab |last3=El Fawal |first3=Hassan |last4=Chun |first4=Sungsoo |date=2024-03-21 |title=COVID-19 vaccine intercountry distribution inequality and its underlying factors: a combined concentration index analysis and multiple linear regression analysis |journal=Frontiers in Public Health |volume=12 |article-number=1348088 |doi=10.3389/fpubh.2024.1348088 |doi-access=free |issn=2296-2565 |pmc=10993910 |pmid=38577285|bibcode=2024FrPH...1248088A }}</ref><ref>{{Cite journal |last1=Mortiboy |first1=Marissa |last2=Zitta |first2=John-Paul |last3=Carrico |first3=Savannah |last4=Stevens |first4=Elizabeth |last5=Smith |first5=Alecia |last6=Morris |first6=Corey |last7=Jenkins |first7=Rodney |last8=Jenks |first8=Jeffrey D. |date=2024 |title=Combating COVID-19 Vaccine Inequity During the Early Stages of the COVID-19 Pandemic |journal=Journal of Racial and Ethnic Health Disparities |language=en |volume=11 |issue=2 |pages=621–630 |doi=10.1007/s40615-023-01546-0 |issn=2197-3792 |pmc=10019425 |pmid=36929491}}</ref>

