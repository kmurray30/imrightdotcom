      == Nomenclature ==
      {{Main|COVID-19 naming}}
      During the initial outbreak in [[Wuhan]], the virus was commonly called "coronavirus" and "Wuhan coronavirus",<ref>{{#invoke:Cite|news |url=https://www.npr.org/sections/health-shots/2020/01/24/799208865/a-second-u-s-case-of-wuhan-coronavirus-is-confirmed|title=2nd U.S. Case Of Wuhan Coronavirus Confirmed|work=NPR |date=24 January 2020 |access-date=4 April 2020 | vauthors = Stein R }}</ref><ref>{{#invoke:Cite|news |vauthors=McNeil Jr DG |author-link=Donald McNeil Jr. |url=https://www.nytimes.com/2020/02/02/health/coronavirus-pandemic-china.html |archive-url=https://web.archive.org/web/20200202194034/https://www.nytimes.com/2020/02/02/health/coronavirus-pandemic-china.html |archive-date=2 February 2020 |url-access=subscription |url-status=live|title=Wuhan Coronavirus Looks Increasingly Like a Pandemic, Experts Say|date=2 February 2020|work=[[The New York Times]]|access-date=4 April 2020 |issn=0362-4331}}</ref><ref>{{#invoke:Cite|news|url=https://www.cnn.com/2020/02/05/asia/wuhan-coronavirus-update-death-toll-spike-intl-hnk/index.html|title=Wuhan coronavirus deaths spike again as outbreak shows no signs of slowing| vauthors = Griffiths J |date=6 February 2020 | publisher=CNN|access-date=4 April 2020 }}</ref> and the disease was referred to by the same terms and sometimes as "Wuhan pneumonia".<ref>{{#invoke:Cite|journal |vauthors=Jiang S, Xia S, Ying T, Lu L |date=May 2020 |title=A novel coronavirus (2019-nCoV) causing pneumonia-associated respiratory syndrome |journal=Cellular & Molecular Immunology |volume=17 |issue=5 |page=554 |doi=10.1038/s41423-020-0372-4 |pmc=7091741 |pmid=32024976 |doi-access=free |title-link=doi}}</ref><ref>{{#invoke:Cite|journal |vauthors=Chan JF, Yuan S, Kok KH, To KK, Chu H, Yang J, Xing F, Liu J, Yip CC, Poon RW, Tsoi HW, Lo SK, Chan KH, Poon VK, Chan WM, Ip JD, Cai JP, Cheng VC, Chen H, Hui CK, Yuen KY |date=February 2020 |title=A familial cluster of pneumonia associated with the 2019 novel coronavirus indicating person-to-person transmission: a study of a family cluster |journal=Lancet |volume=395 |issue=10223 |pages=514–523 |doi=10.1016/S0140-6736(20)30154-9 |pmc=7159286 |pmid=31986261 |doi-access=free |title-link=doi |bibcode=2020Lanc..395..514C }}</ref> In the past, many diseases have been named after geographical locations, such as the [[Spanish flu]],<ref>{{#invoke:Cite|journal |vauthors=Shablovsky S |date=September 2017 |title=The legacy of the Spanish flu |journal=Science |volume=357 |issue=6357 |page=1245 |bibcode=2017Sci...357.1245S |doi=10.1126/science.aao4093 |issn=0036-8075 |doi-access=free |s2cid=44116811 |title-link=doi}}</ref> [[Middle East respiratory syndrome]], and [[Zika virus]].<ref name="Nature Stop">{{#invoke:Cite|journal |title=Stop the coronavirus stigma now |url=https://www.nature.com/articles/d41586-020-01009-0 |access-date=16 April 2020 |journal=Nature |date=7 April 2020 |volume=580 |issue=7802 |page=165 |doi=10.1038/d41586-020-01009-0|pmid=32265571 |bibcode=2020Natur.580..165. |s2cid=214809950}}</ref> In January 2020, the [[World Health Organization]] (WHO) recommended 2019-nCoV<ref>{{#invoke:Cite|web|url=https://www.who.int/docs/default-source/coronaviruse/situation-reports/20200121-sitrep-1-2019-ncov.pdf|title=Novel Coronavirus (2019-nCoV) Situation Report – 1|date=21 January 2020|website=[[World Health Organization]] (WHO)}}</ref> and 2019-nCoV acute respiratory disease<ref>{{#invoke:Cite|web|url=https://www.who.int/docs/default-source/coronaviruse/situation-reports/20200130-sitrep-10-ncov.pdf|title=Novel Coronavirus(2019-nCoV) Situation Report – 10 |date=30 January 2020|website=[[World Health Organization]] (WHO)}}</ref> as interim names for the virus and disease per 2015 guidance and international guidelines against using geographical locations or groups of people in disease and virus names to prevent [[social stigma]].<ref>{{#invoke:Cite|news |title=Novel coronavirus named 'Covid-19': WHO |url=https://www.todayonline.com/world/wuhan-novel-coronavirus-named-covid-19-who |access-date=11 February 2020 |work=Today|location=Singapore |archive-url=http://web.archive.org/web/20251119081701/https://www.todayonline.com/world/wuhan-novel-coronavirus-named-covid-19-who |archive-date=19 November 2025 |url-status=live}}</ref><ref name="veconomist">{{#invoke:Cite|news |title=The coronavirus spreads racism against – and among – ethnic Chinese |url=https://www.economist.com/china/2020/02/17/the-coronavirus-spreads-racism-against-and-among-ethnic-chinese |newspaper=[[The Economist]] |date=17 February 2020 |access-date=17 February 2020 |archive-url=https://web.archive.org/web/20200217223902/https://www.economist.com/china/2020/02/17/the-coronavirus-spreads-racism-against-and-among-ethnic-chinese |archive-date=17 February 2020 |url-status=live}}</ref><ref>{{#invoke:Cite|report|url=https://apps.who.int/iris/bitstream/handle/10665/163636/WHO_HSE_FOS_15.1_eng.pdf|title=World Health Organization Best Practices for the Naming of New Human Infectious Diseases |date=May 2015|publisher=[[World Health Organization]] (WHO) |hdl=10665/163636 |hdl-access=free | vauthors = Organization WH }}</ref> The official names COVID‑19 and SARS-CoV-2 were issued by the WHO on 11 February 2020 with COVID-19 being shorthand for "coronavirus disease 2019".<ref name="WHO-naming">{{#invoke:Cite|web|url=https://www.who.int/emergencies/diseases/novel-coronavirus-2019/technical-guidance/naming-the-coronavirus-disease-(covid-2019)-and-the-virus-that-causes-it|title=Naming the coronavirus disease (COVID-19) and the virus that causes it|website=[[World Health Organization]] (WHO)|access-date=13 March 2020|archive-url=https://web.archive.org/web/20200228035651/https://www.who.int/emergencies/diseases/novel-coronavirus-2019/technical-guidance/naming-the-coronavirus-disease-(covid-2019)-and-the-virus-that-causes-it|archive-date=28 February 2020|url-status=live}}</ref><ref>{{#invoke:Cite|web |title=Novel Coronavirus(2019-nCoV) Situation Report – 22 |url=https://www.who.int/docs/default-source/coronaviruse/situation-reports/20200211-sitrep-22-ncov.pdf |publisher=WHO |date=11 February 2020}}</ref> The WHO additionally uses "the COVID‑19 virus" and "the virus responsible for COVID‑19" in public communications.<ref name="WHO-naming" /><ref>{{#invoke:Cite|journal |vauthors=Gover AR, Harper SB, Langton L |date=July 2020 |title=Anti-Asian Hate Crime During the COVID-19 Pandemic: Exploring the Reproduction of Inequality |journal=American Journal of Criminal Justice |volume=45 |issue=4 |pages=647–667 |doi=10.1007/s12103-020-09545-1 |pmc=7364747 |pmid=32837171}}</ref>

      == Signs and symptoms ==
      {{Main|Symptoms of COVID-19}}
      <!-- TO EDIT THIS SECTION, GO TO [[symptoms of COVID-19]]. -->
      {{Excerpt|Symptoms of COVID-19|hat=no}}

      === Complications ===
      [[File:Fimmu-11-01648-g001.jpg|thumb|Mechanisms of SARS-CoV-2 [[cytokine storm]] and complications]]
      Complications may include [[pneumonia]], [[acute respiratory distress syndrome]] (ARDS), [[multiple organ dysfunction syndrome|multi-organ failure]], [[septic shock]], and death.<ref name="Hui14Jan2020">{{#invoke:Cite|journal | vauthors = Hui DS, I Azhar E, Madani TA, Ntoumi F, Kock R, Dar O, Ippolito G, Mchugh TD, Memish ZA, Drosten C, Zumla A, Petersen E | title = The continuing 2019-nCoV epidemic threat of novel coronaviruses to global health – The latest 2019 novel coronavirus outbreak in Wuhan, China | journal = International Journal of Infectious Diseases | volume = 91 | pages = 264–266 | date = February 2020 | pmid = 31953166 | pmc = 7128332 | doi = 10.1016/j.ijid.2020.01.009 | title-link = doi | doi-access = free }}</ref><ref>{{#invoke:Cite|journal | vauthors = Murthy S, Gomersall CD, Fowler RA | title = Care for Critically Ill Patients With COVID-19 | journal = JAMA | volume = 323 | issue = 15 | pages = 1499–1500 | date = April 2020 | pmid = 32159735 | doi = 10.1001/jama.2020.3633 | doi-access = free | title-link = doi }}</ref><ref name="StatPearls">{{#invoke:Cite|book|title=StatPearls|vauthors=Cascella M, Rajnik M, Cuomo A, Dulebohn SC, Di Napoli R|date=2020|publisher=StatPearls Publishing|location=Treasure Island (FL)|chapter=Features, Evaluation and Treatment Coronavirus (COVID-19)|pmid=32150360|access-date=18 March 2020|chapter-url=https://www.ncbi.nlm.nih.gov/books/NBK554776/}}</ref><ref name="Heymann Shindo 2020 pp. 542–545222">{{#invoke:Cite|journal | vauthors = Heymann DL, Shindo N | title = COVID-19: what is next for public health? | journal = Lancet | volume = 395 | issue = 10224 | pages = 542–545 | date = February 2020 | pmid = 32061313 | pmc = 7138015 | doi = 10.1016/s0140-6736(20)30374-3 | collaboration = WHO Scientific and Technical Advisory Group for Infectious Hazards }}</ref> Cardiovascular complications may include heart failure, [[arrhythmia]]s (including [[atrial fibrillation]]), [[myocarditis|heart inflammation]], [[thrombosis]], particularly [[venous thromboembolism]],<ref>{{#invoke:Cite|journal | vauthors = Romiti GF, Corica B, Lip GY, Proietti M | title = Prevalence and Impact of Atrial Fibrillation in Hospitalized Patients with COVID-19: A Systematic Review and Meta-Analysis | journal = Journal of Clinical Medicine | volume = 10 | issue = 11 | page = 2490 | date = June 2021 | pmid = 34199857 | doi = 10.3390/jcm10112490 | pmc = 8200114 | doi-access = free | title-link = doi }}</ref><ref>{{#invoke:Cite|journal | vauthors = Wen W, Zhang H, Zhou M, Cheng Y, Ye L, Chen J, Wang M, Feng Z | title = Arrhythmia in patients with severe coronavirus disease (COVID-19): a meta-analysis | journal = European Review for Medical and Pharmacological Sciences | volume = 24 | issue = 21 | pages = 11395–11401 | date = November 2020 | pmid = 33215461 | doi = 10.26355/eurrev_202011_23632 | s2cid = 227077132 }}</ref><ref name="Long-2020">{{#invoke:Cite|journal | vauthors = Long B, Brady WJ, Koyfman A, Gottlieb M | title = Cardiovascular complications in COVID-19 | journal = The American Journal of Emergency Medicine | volume = 38 | issue = 7 | pages = 1504–1507 | date = July 2020 | pmid = 32317203 | pmc = 7165109 | doi = 10.1016/j.ajem.2020.04.048 }}</ref><ref>{{#invoke:Cite|journal | vauthors = Puntmann VO, Carerj ML, Wieters I, Fahim M, Arendt C, Hoffmann J, Shchendrygina A, Escher F, Vasa-Nicotera M, Zeiher AM, Vehreschild M, Nagel E | title = Outcomes of Cardiovascular Magnetic Resonance Imaging in Patients Recently Recovered From Coronavirus Disease 2019 (COVID-19) | journal = JAMA Cardiology | volume = 5 | issue = 11 | pages = 1265–1273 | date = November 2020 | pmid = 32730619 | pmc = 7385689 | doi = 10.1001/jamacardio.2020.3557 | title-link = doi | doi-access = free }}</ref><ref>{{#invoke:Cite|journal | vauthors = Lindner D, Fitzek A, Bräuninger H, Aleshcheva G, Edler C, Meissner K, Scherschel K, Kirchhof P, Escher F, Schultheiss HP, Blankenberg S, Püschel K, Westermann D | title = Association of Cardiac Infection With SARS-CoV-2 in Confirmed COVID-19 Autopsy Cases | journal = JAMA Cardiology | volume = 5 | issue = 11 | pages = 1281–1285 | date = November 2020 | pmid = 32730555 | pmc = 7385672 | doi = 10.1001/jamacardio.2020.3551 | title-link = doi | doi-access = free }}</ref><ref>{{#invoke:Cite|journal | vauthors = Siripanthong B, Nazarian S, Muser D, Deo R, Santangeli P, Khanji MY, Cooper LT, Chahal CA | title = Recognizing COVID-19-related myocarditis: The possible pathophysiology and proposed guideline for diagnosis and management | journal = Heart Rhythm | volume = 17 | issue = 9 | pages = 1463–1471 | date = September 2020 | pmid = 32387246 | pmc = 7199677 | doi = 10.1016/j.hrthm.2020.05.001 }}</ref> and endothelial cell injury and dysfunction.<ref>{{Cite journal |last1=Perico |first1=Luca |last2=Benigni |first2=Ariela |last3=Remuzzi |first3=Giuseppe |date=January 2024 |title=SARS-CoV-2 and the spike protein in endotheliopathy |journal=Trends in Microbiology |volume=32 |issue=1 |pages=53–67 |doi=10.1016/j.tim.2023.06.004|pmid=37393180 |pmc=10258582 }}</ref> Approximately 20–30% of people who present with COVID‑19 have [[elevated transaminases|elevated liver enzymes]], reflecting liver injury.<ref>{{#invoke:Cite|journal | vauthors = Xu L, Liu J, Lu M, Yang D, Zheng X | title = Liver injury during highly pathogenic human coronavirus infections | journal = Liver International | volume = 40 | issue = 5 | pages = 998–1004 | date = May 2020 | pmid = 32170806 | pmc = 7228361 | doi = 10.1111/liv.14435 | title-link = doi | doi-access = free }}</ref><ref name="Sanders202022">{{#invoke:Cite|journal | vauthors = Sanders JM, Monogue ML, Jodlowski TZ, Cutrell JB | title = Pharmacologic Treatments for Coronavirus Disease 2019 (COVID-19): A Review | journal = JAMA | volume = 323 | issue = 18 | pages = 1824–1836 | date = May 2020 | pmid = 32282022 | doi = 10.1001/jama.2020.6019 | doi-access = free | title-link = doi }}</ref>

      Neurologic manifestations include [[seizure]], stroke, [[encephalitis]], and [[Guillain–Barré syndrome]] (which includes [[hemiparesis|loss of motor function]]s).<ref name="Carod-Artal-2020">{{#invoke:Cite|journal | vauthors = Carod-Artal FJ | title = Neurological complications of coronavirus and COVID-19 | journal = Revista de Neurología | volume = 70 | issue = 9 | pages = 311–322 | date = May 2020 | pmid = 32329044 | doi = 10.33588/rn.7009.2020179 | s2cid = 226200547 }}</ref><ref>{{#invoke:Cite|journal | vauthors = Toscano G, Palmerini F, Ravaglia S, Ruiz L, Invernizzi P, Cuzzoni MG, Franciotta D, Baldanti F, Daturi R, Postorino P, Cavallini A, Micieli G | title = Guillain-Barré Syndrome Associated with SARS-CoV-2 | journal = The New England Journal of Medicine | volume = 382 | issue = 26 | pages = 2574–2576 | date = June 2020 | pmid = 32302082 | pmc = 7182017 | doi = 10.1056/NEJMc2009191 }}</ref> Following the infection, children may develop [[paediatric multisystem inflammatory syndrome]], which has symptoms similar to [[Kawasaki disease]], which can be fatal.<ref>{{#invoke:Cite|web|title=Multisystem inflammatory syndrome in children and adolescents temporally related to COVID-19 |url=https://www.who.int/news-room/commentaries/detail/multisystem-inflammatory-syndrome-in-children-and-adolescents-with-covid-19 |website=[[World Health Organization]] (WHO) |date=15 May 2020|access-date=20 May 2020}}</ref><ref>{{#invoke:Cite|report |title=HAN Archive – 00432 |url=https://emergency.cdc.gov/han/2020/han00432.asp |website=U.S. [[Centers for Disease Control and Prevention]] (CDC) |access-date=20 May 2020 |date=15 May 2020}}</ref> In very rare cases, acute [[encephalopathy]] can occur, and it can be considered in those who have been diagnosed with COVID‑19 and have an altered mental status.<ref>{{#invoke:Cite|journal | vauthors = Poyiadji N, Shahin G, Noujaim D, Stone M, Patel S, Griffith B | title = COVID-19-associated Acute Hemorrhagic Necrotizing Encephalopathy: Imaging Features | journal = Radiology | volume = 296 | issue = 2 | pages = E119–E120 | date = August 2020 | pmid = 32228363 | pmc = 7233386 | doi = 10.1148/radiol.2020201187 }}</ref>

      According to the US [[Centers for Disease Control and Prevention]], pregnant women are at increased risk of becoming seriously ill from COVID‑19.<ref name="Cordoba-Vives-2020">{{#invoke:Cite|journal|vauthors=Córdoba-Vives S, Peñaranda G|date=April 2020|title=COVID-19 y Embarazo|url=https://revistamedicacr.com/index.php/rmcr/article/viewFile/288/265|journal=Medical Journal of Costa Rica |page=629 |language=es|access-date=14 February 2022|archive-date=18 June 2021|archive-url=https://web.archive.org/web/20210618082133/http://revistamedicacr.com/index.php/rmcr/article/viewFile/288/265|url-status=usurped}}</ref> This is because pregnant women with COVID‑19 appear to be more likely to develop respiratory and obstetric complications that can lead to [[miscarriage]], [[premature delivery]] and [[intrauterine growth restriction]].<ref name="Cordoba-Vives-2020" />

      Fungal infections such as [[aspergillosis]], [[candidiasis]], [[cryptococcosis]] and [[mucormycosis]] have been recorded in people recovering from COVID‑19.<ref>{{#invoke:Cite|journal |vauthors=Das S, Dhar S |title=Mucormycosis Following COVID-19 Infections: an Insight |journal=The Indian Journal of Surgery |volume=84| pages=585–586 |date=July 2021 |issue=3 |pmid=34276145 |pmc=8270771 |doi=10.1007/s12262-021-03028-1 |s2cid=235782159}}</ref><ref>{{#invoke:Cite|journal |vauthors=Baruah C, Devi P, Deka B, Sharma DK |date=June 2021|title=Mucormycosis and Aspergillosis have been Linked to Covid-19-Related Fungal Infections in India |url=https://www.researchgate.net/publication/352554687 |journal=Advancements in Case Studies|volume=3|issue=1|doi=10.31031/AICS.2021.03.000555|s2cid=244678882|issn=2639-0531|via=[[ResearchGate]]}}</ref>

      == Cause ==
      COVID‑19 is caused by infection with a [[strain (biology)#Microbiology and virology|strain]] of [[coronavirus]] known as "severe acute respiratory syndrome coronavirus 2" ([[SARS-CoV-2]]).<ref>{{#invoke:Cite|journal |vauthors=Hu B, Guo H, Zhou P, Shi ZL |date=March 2021 |title=Characteristics of SARS-CoV-2 and COVID-19 |journal=Nature Reviews. Microbiology |volume=19 |issue=3 |pages=141–154 |doi=10.1038/s41579-020-00459-7 |pmc=7537588 |pmid=33024307}}</ref>

