      A lateral flow test (LFT), is an assay also known as a lateral flow immunochromatographic test (ICT), or rapid test. It is a simple device intended to detect the presence of a target substance in a liquid sample without the need for specialized and costly equipment.  LFTs are widely used in medical diagnostics in the home, at the point of care, and in the laboratory. For instance, the home pregnancy test is an LFT that detects a specific hormone. These tests are simple and economical and generally show results in around five to thirty minutes. Many lab-based applications increase the sensitivity of simple LFTs by employing additional dedicated equipment. Because the target substance is often a biological antigen, many lateral flow tests are rapid antigen tests (RAT or ART).
      LFTs operate on the same principles of affinity chromatography as the enzyme-linked immunosorbent assays (ELISA). In essence, these tests run the liquid sample along the surface of a pad with reactive molecules that show a visual positive or negative result.   The pads are based on a series of capillary beds, such as pieces of porous paper, microstructured polymer, or sintered polymer. Each of these pads has the...
    source: |-
      {{short description|Immunochromatographic testing devices}}
      [[File:Lateral Flow Assay.jpg|thumb|300x300px|A NASA illustration of a lateral flow assay]]

      A '''lateral flow test''' ('''LFT'''),<ref>{{cite web |url=http://www.ivdtechnology.com/article/concurrent-engineering-lateral-flow-diagnostics |title=Concurrent engineering for lateral-flow diagnostics |work=IVD Technology |date=1 November 1999 |access-date=1 October 2022 |first=Alan |last=Weiss |archive-url=https://web.archive.org/web/20140415073429/http://www.ivdtechnology.com/article/concurrent-engineering-lateral-flow-diagnostics |archive-date=2014-04-15 }}</ref> is an [[assay]] also known as a '''lateral flow immunochromatographic test (ICT)''', or '''rapid test'''. It is a simple device intended to detect the presence of a target substance in a liquid sample without the need for specialized and costly equipment.  LFTs are widely used in medical diagnostics in the home, at the point of care, and in the laboratory. For instance, the home [[pregnancy test]] is an LFT that detects a specific hormone. These tests are simple and economical and generally show results in around five to thirty minutes.<ref name="Koczula"/> Many lab-based applications increase the sensitivity of simple LFTs by employing additional dedicated equipment.<ref name="Yetisen2013">{{cite journal | vauthors = Yetisen AK, Akram MS, Lowe CR | title = Paper-based microfluidic point-of-care diagnostic devices | journal = Lab on a Chip | volume = 13 | issue = 12 | pages = 2210–51 | date = June 2013 | pmid = 23652632 | doi = 10.1039/C3LC50169H | s2cid = 17745196 }}</ref> Because the target substance is often a biological [[antigen]], many lateral flow tests are [[rapid antigen test]]s (RAT or ART).

      LFTs operate on the same principles of [[affinity chromatography]] as the enzyme-linked immunosorbent assays ([[ELISA]]). In essence, these tests run the liquid sample along the surface of a pad with reactive molecules that show a visual positive or negative result.   The pads are based on a series of capillary beds, such as pieces of porous paper,<ref>{{cite web |url=http://www.khufash.com/bd/applications/lateral_flow/lf_main_page.htm |title=Lateral Flow Introduction |work=khufash.com |access-date=27 July 2012|archive-url=https://web.archive.org/web/20120728025400/http://www.khufash.com/bd/applications/lateral_flow/lf_main_page.htm |archive-date=28 July 2012}}</ref> [[microstructure]]d [[polymer]],<ref name="Synthetic microfluidic paper">{{cite journal | vauthors = Hansson J, Yasuga H, Haraldsson T, van der Wijngaart W | title = Synthetic microfluidic paper: high surface area and high porosity polymer micropillar arrays | journal = Lab on a Chip | volume = 16 | issue = 2 | pages = 298–304 | date = January 2016 | pmid = 26646057 | doi = 10.1039/C5LC01318F | url = http://urn.kb.se/resolve?urn=urn:nbn:se:kth:diva-180009 }}</ref><ref name="Synthetic paper">{{cite journal |author1=Weijin Guo |author2=Jonas Hansson |author3=Wouter van der Wijngaart | year = 2016 | title = Viscosity Independent Paper Microfluidic Imbibition | url = https://www.diva-portal.org/smash/get/diva2:1048748/FULLTEXT01.pdf| journal = MicroTAS 2016, Dublin, Ireland}}</ref> or [[Sintering|sintered]] polymer.<ref name="Crozier bmj">{{cite journal |last1=Crozier |first1=Alex |last2=Rajan |first2=Selina |last3=Buchan |first3=Iain |last4=McKee |first4=Martin |title=Put to the test: Use of rapid testing technologies for Covid-19 |journal=BMJ |date=3 February 2021 |volume=372 |url=https://www.bmj.com/content/372/bmj.n208.long |pages=Appendix p. 6 |doi=10.1136/bmj.n208 |pmid=33536228|s2cid=231775752 |id=[https://www.bmj.com/content/bmj/suppl/2021/02/03/bmj.n208.DC1/croa060337.ww1.pdf Appendix Table 1, p. 6]|doi-access=free }}</ref> Each of these pads has the capacity to transport fluid (e.g., urine, blood, saliva) spontaneously.<ref>{{cite web |title=Antibodies, Proteins, ELISA kits |url=https://www.abbexa.com/lateral-flow-assay |website=Abbexa |access-date=12 January 2022 |language=en |quote=Lateral Flow Assays, also known as Lateral Flow Immunochromatographic Assays [...] The technology is based on a series of capillary beds; such as pieces of porous paper, micro-structured polymer, or sintered polymer. Each of these elements has the capacity to transport fluid (e.g., urine), spontaneously.}}</ref>

      The sample pad acts as a sponge and holds an excess of sample fluid. Once soaked, the fluid flows to the second conjugate pad in which the manufacturer has stored freeze dried bio-active particles called conjugates (see below) in a salt–sugar matrix. The conjugate pad contains all the reagents required for an optimized chemical reaction between the target molecule (e.g., an [[antigen]]) and its chemical partner (e.g., [[antibody]]) that has been immobilized on the particle's surface. This marks target particles as they pass through the pad and continue across to the test and control lines. The test line shows a signal, often a color as in pregnancy tests. The control line contains affinity ligands which show whether the sample has flowed through and the bio-molecules in the conjugate pad are active. After passing these reaction zones, the fluid enters the final porous material, the wick, that simply acts as a waste container.

      LFTs can operate as either [[Immunoassay#Competitive, homogeneous immunoassays|competitive]] or [[ELISA#Sandwich ELISA|sandwich assays]].

      ==History==
      LFTs derive from [[paper chromatography]], which was developed in 1943 by [[Archer Martin|Martin]] and [[Richard Laurence Millington Synge|Synge]],<ref name=haslam07/> and elaborated in 1944 by Consden, Gordon and Martin.<ref name="consden44">{{cite journal | vauthors = Consden R, Gordon AH, Martin AJ | title = Qualitative analysis of proteins: a partition chromatographic method using paper | journal = The Biochemical Journal | volume = 38 | issue = 3 | pages = 224–32 | year = 1944 | pmid = 16747784 | pmc = 1258072 | doi = 10.1042/bj0380224 }}</ref><ref name=britannica>{{Cite news|url=https://www.britannica.com/science/paper-chromatography|title=Paper chromatography {{!}} chemistry|work=Encyclopedia Britannica|access-date=2018-06-01|language=en}}</ref> There was an explosion of activity in this field after 1945.<ref name=haslam07>{{cite journal | vauthors = Haslam E | title = Vegetable tannins - lessons of a phytochemical lifetime | journal = Phytochemistry | volume = 68 | issue = 22–24 | pages = 2713–21 | year = 2007 | pmid = 18037145 | doi = 10.1016/j.phytochem.2007.09.009 | bibcode = 2007PChem..68.2713H | author-link1 = Edwin Haslam }}</ref> The ELISA technology was developed in 1971.<ref>{{Cite journal|last=Engvall|first=E|date=1972-11-22|title=Enzyme-linked immunosorbent assay, Elisa|url=http://www.jimmunol.org/content/109/1/129|journal=The Journal of Immunology|volume=109|issue=1|pages=129–135|doi=10.4049/jimmunol.109.1.129|issn=0022-1767|pmid=4113792|doi-access=free}}</ref> A set of LFT patents, including the litigated US&nbsp;6,485,982 described below, were filed by Armkel LLC starting in 1988.<ref name=US6485982/>

      The first commercially available lateral flow device was Unipath's Clearblue One Step in 1988. This product combined Paired Monoclonal Antibody technology (patented in 1980 by Unipath's Prof. Philip Porter and colleagues including Paul Davis and Keith May) and the original Clearblue product launched in June 1985.<ref> Geoffrey Jones & Alison Kraft (2004): Corporate venturing: the origins of Unilever's pregnancy test, Business History, 46:1, 100-122</ref>

      ==Synopsis==
      === Colored particles ===
      In principle, any colored particle can be used, but [[latex]] (blue color) or [[Nanofluid|nanometer-sized particles]]<ref name="Quesada-González, D. 2015">{{cite journal | vauthors = Quesada-González D, Merkoçi A | title = Nanoparticle-based lateral flow biosensors | journal = Biosensors & Bioelectronics | volume = 73 | issue = special | pages = 47–63 | date = November 2015 | pmid = 26043315 | doi = 10.1016/j.bios.2015.05.050 | hdl = 10261/131760 | url = https://ddd.uab.cat/record/200195 }}</ref> of [[colloidal gold|gold]] (red color) are most commonly used. The gold particles are red in color due to localized [[surface plasmon resonance]].<ref>{{Cite web|url=https://nanohybrids.net/pages/gold-nanoparticles-for-lateral-flow-assays|title=Gold Nanoparticle Labels Custom Designed for Lateral Flow Assays|last=NanoHybrids|website=NanoHybrids|language=en|access-date=29 September 2020|archive-date=11 September 2021|archive-url=https://web.archive.org/web/20210911093321/https://nanohybrids.net/pages/gold-nanoparticles-for-lateral-flow-assays}}</ref> [[Fluorescent]]<ref>{{cite journal | vauthors = Faulstich K, Gruler R, Eberhard M, Haberstroh K | title = Developing rapid mobile POC systems. Part 1: Devices and applications for lateral-flow immunodiagnostics. | journal = IVD Technology | date = July 2007 | volume = 13 | issue = 6 | pages = 47–53 | url = http://www.devicelink.com/ivdt/archive/07/07/010.html | access-date = 2007-11-22 | archive-date = 2009-03-02 | archive-url = https://web.archive.org/web/20090302094532/http://www.devicelink.com/ivdt/archive/07/07/010.html }}</ref> or [[magnetic]]<ref>{{cite journal | vauthors = LaBorde RT, O'Farrell B | title = Paramagnetic-particle detection in lateral-flow assays. | journal = IVD Technol | date = April 2002 | volume = 8 | issue = 3 | pages = 36–41 | url = http://www.devicelink.com/ivdt/archive/02/04/001.html | access-date = 2007-11-22 | archive-date = 2010-03-01 | archive-url = https://web.archive.org/web/20100301171711/http://www.devicelink.com/ivdt/archive/02/04/001.html }}</ref><ref>{{Cite web |url=http://www.devicelink.com/ivdt/archive/08/07/008.html |title=Magnetic immunoassays: A new paradigm in POCT (IVDT archive, Jul/Aug 2008)<!-- Bot generated title --> |access-date=2008-10-23 |archive-url=https://web.archive.org/web/20131028183523/http://www.devicelink.com/ivdt/archive/08/07/008.html |archive-date=28 October 2013}}</ref> labelled particles can also be used, but these require the use of an electronic reader to assess the test result.

      === Sandwich assays ===
      [[File:ELISA or Lateral flow formats.svg|thumb|upright=1.3|Difference between sandwich assay and competitive assay formats of lateral flow tests{{clarify|date=December 2021}}]]
      Sandwich assays are generally used for larger analytes because they tend to have multiple binding sites.<ref name="nano comp"/> As the sample migrates through the assay it first encounters a conjugate, which is an antibody specific to the target [[analyte]] labelled with a visual tag, usually colloidal gold. The antibodies bind to the target analyte within the sample and migrate together until they reach the test line. The test line also contains immobilized antibodies specific to the target analyte, which bind to the migrated analyte bound conjugate molecules. The test line then presents a visual change due to the concentrated visual tag, hence confirming the presence of the target molecules. The majority of sandwich assays also have a control line which will appear whether or not the target analyte is present to ensure proper function of the lateral flow pad.<ref name="Koczula"/>

      The rapid, low-cost sandwich-based assay is commonly used for home pregnancy tests which detect [[human chorionic gonadotropin]], hCG, in the [[urine]] of pregnant women.

      === Competitive assays ===
      Competitive assays are generally used for smaller analytes since smaller analytes have fewer binding sites.<ref name="nano comp">{{Cite web|url=https://nanocomposix.com/pages/introduction-to-lateral-flow-rapid-test-diagnostics|title=Introduction to Lateral Flow Rapid Test Diagnostics|last=nanoComposix|website=nanoComposix|language=en|access-date=4 November 2019}}</ref> The sample first encounters antibodies to the target analyte labelled with a visual tag (colored particles). The test line contains the target analyte fixed to the surface. When the target analyte is absent from the sample, unbound antibody will bind to these fixed analyte molecules, meaning that a visual marker will show. Conversely, when the target analyte is present in the sample, it binds to the antibodies to prevent them binding to the fixed analyte in the test line, and thus no visual marker shows. This differs from sandwich assays in that no band means the analyte is present.<ref name="Koczula">{{cite journal |last1=Koczula |first1=Katarzyna M. |last2=Gallotta |first2=Andrea |title=Lateral flow assays |journal=Essays in Biochemistry |date=30 June 2016 |pmid=27365041 |pmc =4986465 |volume=60 |issue=1 |pages=111–120 |doi=10.1042/EBC20150012}}</ref><ref name="nano comp"/>

      === Quantitative tests ===
      Most LFTs are intended to operate on a purely qualitative basis. However, it is possible to measure the intensity of the test line to determine the quantity of analyte in the sample. Handheld diagnostic devices known as '''lateral flow readers''' are used by several companies to provide a fully quantitative assay result. By utilizing unique wavelengths of light for illumination in conjunction with either [[Complementary metal–oxide–semiconductor|CMOS]] or [[Charge-coupled device|CCD]] detection technology, a signal rich  image can be produced of the actual test lines. Using image processing algorithms specifically designed for a particular test type and medium, line intensities can then be correlated with analyte concentrations. One such handheld lateral flow device platform is made by Detekt Biomedical L.L.C.<ref>{{Cite web|url=http://idetekt.com/|title=Detekt Biomedical L.L.C.- Lateral Flow Readers for Rapid Test Strip Detection and Immunoassays|website=idetekt.com|language=en-US|access-date=6 July 2017}}</ref> 

      [[File:Lateral flow test reader example.png|thumb|Lateral flow test reader used for digital interpretation of test strips.]]

      Alternative non-optical techniques are also able to report quantitative assays results. One such example is a [[magnetic immunoassay]] (MIA) in the LFT form also allows for getting a quantified result. Reducing variations in the capillary pumping of the sample fluid is another approach to move from qualitative to quantitative results. Recent work has, for example, demonstrated [[Capillary action|capillary pumping]] with a constant [[Volumetric flow rate|flow rate]] independent from the [[Liquid#Flow|liquid viscosity]] and [[surface energy]].<ref name="Synthetic paper" /><ref name="viscosity independent pump">{{cite journal | doi=10.1021/acs.langmuir.6b03488 | title=Capillary Pumping Independent of Liquid Sample Viscosity | year=2016 | last1=Guo | first1=Weijin | last2=Hansson | first2=Jonas | last3=Van Der Wijngaart | first3=Wouter | journal=Langmuir | volume=32 | issue=48 | pages=12650–12655 | pmid=27798835 | s2cid=24662688 | url=http://urn.kb.se/resolve?urn=urn:nbn:se:kth:diva-196135 }}</ref><ref>{{cite book | doi=10.1109/MEMSYS.2017.7863410 | chapter=Capillary pumping with a constant flow rate independent of the liquid sample viscosity and surface energy | title=2017 IEEE 30th International Conference on Micro Electro Mechanical Systems (MEMS) | year=2017 | last1=Guo | first1=Weijin | last2=Hansson | first2=Jonas | last3=Van Der Wijngaart | first3=Wouter | pages=339–341 | isbn=978-1-5090-5078-9 | s2cid=13219735 | url=http://urn.kb.se/resolve?urn=urn:nbn:se:kth:diva-196738 }}</ref><ref name="liquid properties independent pump 2">{{cite journal | vauthors = Guo W, Hansson J, van der Wijngaart W | title = Capillary pumping independent of the liquid surface energy and viscosity | journal = Microsystems & Nanoengineering | volume = 4 | issue = 1 | article-number = 2 | year = 2018 | pmid = 31057892 | pmc = 6220164 | doi = 10.1038/s41378-018-0002-9 | bibcode = 2018MicNa...4....2G }}</ref>

      === Control line ===
      [[File:Negative_Pregnancy_Test.JPG|thumb|200x200px|The control line of this pregnancy test is blank, making the test invalid.]]
      Most tests will incorporate a second line which contains a further antibody (one which is not specific to the analyte) that binds some of the remaining colored particles which did not bind to the test line. This confirms that fluid has passed successfully from the sample-application pad, past the test line.<ref name="Koczula"/> By giving confirmation that the sample has had a chance to interact with the test line, this increases confidence that a visibly-unchanged test line can be interpreted as a negative result (or that a ''changed'' test line can be interpreted as a ''negative'' result in a competitive assay).

      === Blood plasma extraction ===
      Because the intense red color of [[hemoglobin]] interferes with the readout of [[colorimetric]] or optical detection-based diagnostic tests, [[blood plasma]] separation is a common first step to increase diagnostic test accuracy. Plasma can be extracted from whole blood via integrated filters<ref>{{Cite journal|vauthors= Tripathi S, Kumar V, Prabhakar A, Joshi S, Agrawal A |date=2015|title=Passive blood plasma separation at the microscale: a review of design principles and microdevices|journal=J. Micromech. Microeng.|volume=25|issue=8|article-number=083001|doi=10.1088/0960-1317/25/8/083001|bibcode=2015JMiMi..25h3001T|s2cid=138153068 }}</ref> or via agglutination.<ref name="GuoHansson2020">{{cite journal | vauthors = Guo W, Hansson J, van der Wijngaart W | title = Synthetic Paper Separates Plasma from Whole Blood with Low Protein Loss | journal = Analytical Chemistry | volume = 92 | issue = 9 | pages = 6194–6199 | date = May 2020 | pmid = 32323979 | doi = 10.1021/acs.analchem.0c01474 | doi-access = free }}</ref>

      === Speed and simplicity ===
      Time to obtain the test result is a key driver for these products. Tests results can be available in as little as a few minutes. Generally there is a trade off between time and sensitivity: more sensitive tests may take longer to develop. The other key advantage of this format of test compared to other immunoassays is the simplicity of the test, by typically requiring little or no sample or [[reagent]] preparation.<ref>{{cite journal |last1=Liu |first1=Yilin |last2=Zhan |first2=Li |last3=Qin |first3=Zhenpeng |last4=Sackrison |first4=James |last5=Bischof |first5=John C. |title=Ultrasensitive and Highly Specific Lateral Flow Assays for Point-of-Care Diagnosis |journal=ACS Nano |date=23 March 2021 |volume=15 |issue=3 |pages=3593–3611 |doi=10.1021/acsnano.0c10035 |pmid=33607867 |s2cid=231969545 |issn=1936-0851|doi-access=free }}</ref>

      == Patents ==
      This is a highly competitive area and a number of people claim patents in the field, most notably [[Alere]] (formerly Inverness Medical Innovations, now owned by [[Abbott Laboratories|Abbott]]) who own patents<ref name=US6485982>{{cite patent |country=US |number=6485982 |status=patent |title=Test device and method for colored particle immunoassay |pubdate=November 26, 2002 |inventor=David E. Charlton |assign1=[[Church & Dwight]] |url=https://patents.google.com/patent/US6485982 }}</ref> originally filed by [[Unipath]]. The US&nbsp;6,485,982 patent, that has been litigated, expired in 2019. A number of other companies also hold patents in this arena. A group of competitors are challenging the validity of the patents.<ref>{{cite web|url=http://www.devicelink.com/ivdt/archive/00/11/002.html|title=Grassroots Web group challenging lateral-flow patents|work=Medical DeviceLink|date=November 2000|archive-url =https://web.archive.org/web/20010708181513/http://www.devicelink.com/ivdt/archive/00/11/002.html |archive-date=8 July 2001}}</ref> The original patent is apparently from 1988.<ref>{{Cite web |title=Lateral Flow Sensors |url=https://www.sensor100.com/Sens_Tech_Dir/lateral-flow/ |access-date=2024-04-18 |website=www.sensor100.com}}</ref><ref>{{Cite patent|number=US6485982B1|title=Test device and method for colored particle immunoassay|gdate=2002-11-26|invent1=Charlton|inventor1-first=David E.|url=https://patents.google.com/patent/US6485982B1/en}}</ref>

      == Applications ==
      Lateral flow assays have a wide array of applications and can test a variety of samples including urine, blood, saliva, sweat, serum, and other fluids. They are currently used by clinical laboratories, hospitals, physicians and veterinary clinics, food analysis labs and environmental testing facilities.

      Immediacy in obtaining results is normally the key factor in choosing this technique, although simplicity and lack of a need for formal equipment are also important factors. These features allow ICTs to be used a at-home test or in pharmacies. Because of their exceptional quality, rapid test are also used routinely in well-equipped laboratories when the demand for test is low.

      The broad applications of rapid test can be realized because of their simplicity accompanied by high quality analytical production. The sensitivity and specificity of these techniques tend to be comparable to those of other more complex methods, and on occasion significantly better.<ref>{{Cite web |last=Markelab |title=Schistosomiasis ICT |url=https://markelab.com/public-files/documents/DS_BILZAbICT20.pdf}}</ref>

      Other uses for lateral flow assays are food and environmental safety and veterinary medicine for chemicals such as diseases and toxins.<ref name="Koczula"/> LFTs are also commonly used for disease identification such as ebola, but the most common LFT are the home pregnancy<ref name="Koczula"/> and SARS-CoV-2 tests.

      === COVID-19 testing ===
      {{main|COVID-19 rapid antigen test}}
      [[File:Test de antígenos Covid 3.jpg|thumb|COVID-19 rapid antigen lateral flow test showing a negative result]]
      Lateral flow assays have played a critical role in [[COVID-19 testing|COVID-19]] testing as they have the benefit of delivering a result in 15–30 minutes.<ref>{{cite journal | vauthors = Guglielmi G | title = Fast coronavirus tests: what they can and can't do | journal = Nature | volume = 585 | issue = 7826 | pages = 496–498 | date = September 2020 | pmid = 32939084 | doi = 10.1038/d41586-020-02661-2 | doi-access =  | bibcode = 2020Natur.585..496G | s2cid = 221768935 }}</ref> The systematic evaluation of lateral flow assays during the COVID-19 pandemic<ref>{{Cite web|title=Guidance: First wave of non-machine based lateral flow technology (LFT) assessment|url=https://www.gov.uk/government/publications/assessment-and-procurement-of-coronavirus-covid-19-tests/lateral-flow-devices-results|date=11 January 2021|access-date=20 January 2021|website=GOV.UK|language=en}}</ref> was initiated at [[University of Oxford|Oxford University]] as part of a UK collaboration with [[Public Health England]]. A study that started in June 2020 in the United Kingdom, FALCON-C19, confirmed the sensitivity of some lateral flow devices (LFDs) in this setting.<ref>{{Cite web|title=Oxford University and PHE confirm high-sensitivity of lateral flow tests|url=https://www.gov.uk/government/news/oxford-university-and-phe-confirm-high-sensitivity-of-lateral-flow-tests|date=11 November 2020 |website=GOV.UK|language=en}}</ref><ref name=peto>{{Cite web|title=FALCON — CONDOR Platform|url=https://www.condor-platform.org/condor_workstreams/falcon|access-date=25 November 2020|website=www.condor-platform.org}}</ref><ref name=":0">{{cite journal | vauthors = Peto T | title = COVID-19: Rapid antigen detection for SARS-CoV-2 by lateral flow assay: A national systematic evaluation of sensitivity and specificity for mass-testing | journal = eClinicalMedicine | volume = 36 | article-number = 100924 | date = June 2021 | pmid = 34101770 | doi = 10.1016/j.eclinm.2021.100924 | pmc = 8164528 | s2cid = 231609922 }}</ref> Four out of 64 LFDs tested had desirable performance characteristics according to these early tests; the Innova SARS-CoV-2 Antigen Rapid Qualitative Test performed moderately<ref name=":0" /> in viral antigen detection/sensitivity with excellent specificity, although kit failure rates and the impact of training were potential issues.<ref name=peto/> The Innova test's specificity is more widely publicised, but sensitivity in phase 4 trials was 50.1%.<ref>{{Cite web| vauthors = Wolf A, Hulmes J, Hopkins H |date=10 March 2021|title=Lateral flow device specificity in phase 4 (post marketing) surveillance|url=https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/968095/lateral-flow-device-specificity-in-phase-4.pdf |url-status=live |website=gov.uk|archive-url=https://web.archive.org/web/20220814222305/https://assets.publishing.service.gov.uk/government/uploads/system/uploads/attachment_data/file/968095/lateral-flow-device-specificity-in-phase-4.pdf |archive-date=2022-08-14 }}</ref> This describes a device for which one out of every two patients infected with COVID-19 and tested in real-world conditions would receive a [[Sensitivity and specificity|false-negative]] result. After closure of schools in January 2021, biweekly LFTs were introduced in England for teachers, pupils, and households of pupils when schools re-opened on March 8, 2021 for asymptomatic testing.<ref>{{Cite web|title=Coronavirus (COVID-19) asymptomatic testing in schools and colleges|url=https://www.gov.uk/government/publications/coronavirus-covid-19-asymptomatic-testing-in-schools-and-colleges/coronavirus-covid-19-asymptomatic-testing-in-schools-and-colleges|access-date=2021-05-27|website=GOV.UK|language=en}}</ref> Biweekly LFT were made universally available to everyone in England on April 9, 2021.<ref>{{Cite web|title=Twice weekly rapid testing to be available to everyone in England|url=https://www.gov.uk/government/news/twice-weekly-rapid-testing-to-be-available-to-everyone-in-england|date=2021-04-05|access-date=2021-05-27|website=GOV.UK|language=en}}</ref> LFTs have been used for mass testing for COVID-19 globally<ref>{{Cite news|agency=Agence France-Presse|date=2 November 2020|title=Slovakia carries out Covid mass testing of two-thirds of population|language=en-GB|work=The Guardian| url=https://www.theguardian.com/world/2020/nov/02/slovakia-carries-out-covid-mass-testing-of-two-thirds-of-population|issn=0261-3077}}</ref><ref>{{Cite web|date=6 November 2020|title=The UK is trialling lateral flow testing for Covid-19 – how does it work?|author=Peter Littlejohns |url=https://www.nsmedicaldevices.com/news/lateral-flow-test-covid-19/|website=NS Medical Devices}}</ref><ref>{{Cite web|title=Merthyr Tydfil County Borough to be first whole area testing pilot in Wales|url=https://gov.wales/merthyr-tydfil-county-borough-be-first-whole-area-testing-pilot-wales|date=18 November 2020|website=GOV.WALES|language=en}}</ref> and complement other public health measures for COVID-19.<ref>{{Cite web|date=19 August 2020|title=Population-wide testing of SARS-CoV-2: country experiences and potential approaches in the EU/EEA and the United Kingdom|url=https://www.ecdc.europa.eu/en/publications-data/population-wide-testing-sars-cov-2-country-experiences-and-potential-approaches|website=European Centre for Disease Prevention and Control|language=en}}</ref>

      Some scientists outside government expressed serious misgivings in late 2020 about the use of Innova LFDs for screening for Covid. According to [[Jon Deeks]], a professor of biostatistics at the [[University of Birmingham]], England, the Innova test is "entirely unsuitable" for community testing: "as the test may miss up to half of cases, a negative test result indicates a reduced risk of Covid, but does not exclude Covid".<ref>{{Cite web |title=Scientists urge caution on use of lateral flow tests to screen for Covid-19 | vauthors = Burke M |website=Chemistry World |date=18 November 2020 |url= https://www.chemistryworld.com/news/scientists-urge-caution-on-use-of-lateral-flow-tests-to-screen-for-covid-19/4012763.article}} Criticism of LFDs for Covid testing by several experts, with detailed numerical discussion.</ref><ref>{{Cite web |title=Covid-19: government must urgently rethink lateral flow test roll out| vauthors = Deeks J, Raffle A, Gill M |website=The BMJ Opinion|date=12 January 2021 |url= https://blogs.bmj.com/bmj/2021/01/12/covid-19-government-must-urgently-rethink-lateral-flow-test-roll-out/ }}</ref>

      Sensitivity of tests used in 2022 was around 70%.<ref name="Tapari2022">{{cite journal| vauthors=Tapari A, Braliou GG, Papaefthimiou M, Mavriki H, Kontou PI, Nikolopoulos GK, Bagos PG| title=Performance of Antigen Detection Tests for SARS-CoV-2: A Systematic Review and Meta-Analysis | journal=Diagnostics  | date=4 June 2022 | volume= 12 | issue= 6 | page= 1388 | pmid=35741198 | doi=10.3390/diagnostics12061388 | pmc=9221910 |doi-access=free }}</ref>

