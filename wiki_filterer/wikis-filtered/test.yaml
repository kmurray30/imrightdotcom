      ==== SAT scores ====
      Racial and ethnic variations in SAT scores follow a similar pattern to other racial achievement gaps. In 1990, the average SAT was 528 for [[Asian-Americans]], 491 for whites, 429 for Mexican Americans and 385 for blacks.<ref name="Miller LS 1995">Miller LS. 1995. An American Imperative: Accelerating Minority Educational Advancement. New Haven: Yale Univ. Press</ref> 34% of Asians compared with 20% of whites, 3% of blacks, 7% of Mexican Americans, and 9% of Native Americans scored above a 600 on the SAT math section.<ref name="Miller LS 1995" /> On the SAT verbal section in 1990, whites scored an average of 442, compared with 410 for Asians, 352 for blacks, 380 for Mexican Americans, and 388 for Native Americans. 
      In 2015, the average SAT scores on the math section were 598 for Asian-Americans, 534 for whites, 457 for [[Hispanic]] [[Latinos]] and 428 for blacks.<ref name="brookings.edu">{{Cite web|date=February 2017|title=Race gaps in SAT scores highlight inequality and hinder upward mobility|url=https://www.brookings.edu/research/race-gaps-in-sat-scores-highlight-inequality-and-hinder-upward-mobility/}}</ref> 
      Additionally, 10% of Asian-Americans, 8% of whites, 3% of Mexican Americans, 3% of Native Americans and 2% of blacks scored above 600 on the SAT verbal section in 1990.<ref name="Miller LS 1995" />
      Race gaps on the SATs are especially pronounced at the tails of the distribution. In a perfectly equal distribution, the racial breakdown of scores at every point in the distribution should ideally mirror the demographic composition of test-takers as whole i.e. 51% whites, 21% Hispanic Latinos, 14% blacks, and 14% Asian-Americans. But ironically, among the highest top scorers, those scoring between a 750 and 800 (perfect scores) over 60% are [[East Asia]]ns of Taiwanese, Japanese, Korean and [[Han Chinese]] descent, while only 33% are white, compared to 5% Hispanic Latinos and 2% blacks.<ref name="brookings.edu" />

      There are some limitations to the data which may mean that, if anything, the race gap is being understated. The ceiling on the SAT score may, for example, understate the achievement and full potential of East Asians of Taiwanese, Japanese, Korean and Han Chinese descent. If the exam was redesigned to increase score variance (add harder and easier questions than it currently has), the achievement gap across racial groups could be even more wider and pronounced. In other words, if the math section was scored between 0 and 1000, we might see more complete tails on both the right and the left. More East Asians score between 750 and 800 than score between 700 and 750, suggesting that many East Asians of Taiwanese, Japanese, Korean and Han Chinese descent could be scoring high above 800 if the test allowed them to.<ref name="brookings.edu" />

      ==== State standards tests ====
      Most state tests showing African American failure rates anywhere from two to four times the rate of whites, such as Washington State's [[Washington Assessment of Student Learning|WASL]] test, and only half to one-quarter as likely to achieve a high score, even though these tests were designed to eliminate the negative effects of bias associated with standardized multiple choice tests. It is a top goal of education reform to eliminate the ''[[Education gap]]'' between all races, though skeptics question whether legislation such as [[No Child Left Behind]] truly closes the gap just by raising expectations. Others, such as [[Alfie Kohn]], observe it may merely penalize those who do not score as well as the most educated ethnic and income groups.<ref>See {{cite journal|last=Murray|first=Charles|date=July 25, 2006|title=Acid Tests|url=https://www.wsj.com/articles/SB115379210632316123|journal=[[The Wall Street Journal]]}} He claims NCLB punishes minority students and does not close basic skill differences.</ref>

