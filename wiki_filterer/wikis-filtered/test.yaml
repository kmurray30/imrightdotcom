      |}

      === Primary school levels ===
      Elementary school students (years 1 through 6) are expected to complete their compulsory primary school education (義務教育, ''gimu kyoiku'') as well as pass the admissions examinations for junior high schools.

      === Secondary school levels ===
      For students to enter the secondary school level, students are required to sit for and pass the admissions examinations set by the schools. Failure indicates that students cannot proceed to secondary school.

      Secondary education in Japan is difficult because it rigorously prepares students for university entrance. Many parents often send children to private cram schools known as ''juku'' (塾) to help prepare them for university entrance examinations such as the National University Entrance Qualification Examination (大学入試共通テスト). Classes for ''juku'' are typically held in the evenings after students have completed their regular day courses.

      Most secondary schools in Japan have a numerical grading system from 5 to 1, with 5 being the highest score.<ref>{{Cite web|date=24 October 2018|title=What is the Education System in Japan?|url=https://studyjapan.fairness-world.com/what-is-education-system-japan/|access-date=13 February 2022|website=FAIR Study in Japan|language=en-US}}{{Dead link|date=August 2025 |bot=InternetArchiveBot |fix-attempted=yes }}</ref>

      ===Government intervention===
      Under the Basic Act on Education (2007) Japan has signed to provide equal opportunity in education including individuals with disabilities. Along with the Basic Act on Education, the Convention on the Rights of Persons with Disabilities (CRPD) was passed in 2006 and was ratified in 2014 as part of welfare.<ref>{{cite web |access-date=13 December 2018 |archive-date=16 December 2018 |archive-url=https://web.archive.org/web/20181216031612/http://reposit.lib.kumamoto-u.ac.jp/bitstream/2298/35864/1/KKK0065_139-144.pdf |author=Furuta, Hiroko |publisher=Department of Special Needs Education, Faculty of Education, Kumamoto University |title=Developing an inclusive education system in Japan: The Case of Yamaga City, Kumamoto |url=http://reposit.lib.kumamoto-u.ac.jp/bitstream/2298/35864/1/KKK0065_139-144.pdf |url-status=dead}}</ref>   These two acts promised that the national and local governments would provide special needs education programs with adequate accommodation according to their level of disability.<ref>{{cite web | url=http://www.mext.go.jp/en/policy/education/lawandplan/title01/detail01/1373798.htm | title= Basic Act on Education | publisher=Ministry of Education, Culture, Sports, Science and Technology-Japan (MEXT)  | access-date=13 December 2018}}</ref>   The purpose of the Special Needs Education is to help individuals develop their potential under their capabilities to gain independence and to gain vocational training in special fields. Some schools accommodate students with a disability under traditional school settings, but in certain cases, students are placed in independent schools specialized in the special needs education program.<ref>{{cite web | url=http://www.mext.go.jp/en/policy/education/elsec/title02/detail02/1373858.htm | title= Special Needs Education | publisher=Ministry of Education, Culture, Sports, Science, and Technology-Japan (MEXT)  | access-date=13 December 2018}}</ref>  This program supports students with visual impairment, hearing impairment, physical disability, emotional behavioral disorder, learning disabilities, speech-language impairment (communication disorder), health impairment and development delay. 
      <ref>{{cite web | url=http://www.oecd.org/els/family/50325299.pdf| title= Special Educational Needs (SEN)| publisher=OECD | access-date=13 December 2018}}</ref>

      ===Reforms===
      {{see also|Special education}}
      Children with disabilities, along with their parents, did not have a voice until the 1990s when special needs education started to receive public attention. Before then, children with disabilities were deemed "slow learners" or "difficult to blend in".<ref>{{cite journal | title= Cultural sensitivity in the delivery of disability service to children: A case study of Japanese education and socialization| journal= Children and Youth Services Review| volume= 34| pages= 266–275| author=Kayama, Misa | doi= 10.1016/j.childyouth.2011.10.023| year= 2012}}</ref> The education department of the Japanese government slowly started to focus on giving equal rights to children with disabilities, and the first major reform began as an introduction of a "Resource Room System", which served as a supplemental special need program for students with disabilities attending traditional school settings. In 2006, a greater educational reform took place to promote the notion of "inclusive education". This inclusive education program came into being due to the influence of three political factors: the international movement for school inclusion, the reform of welfare for people with disabilities, and a general reform of the education system in Japan.<ref>{{cite journal | title= Children with disabilities in the Japanese school system: a path toward social integration?|journal = Contemporary Japan|volume = 28|issue = 2|pages = 165–184| author=Mithout, Anne-Lise | doi= 10.1515/cj-2016-0009|year = 2016|doi-access = free}}</ref><ref>{{cite journal | title= Who am I with others?: Selfhood and shuwa among mainstream educated deaf and hard-of-hearing Japanese youth|journal = Contemporary Japan|volume = 32|issue = 2| author=McGuire, Jennifer M. | doi= 10.1080/18692729.2020.1766646|year = 2020|pages = 197–217|s2cid = 222315812}}</ref> The purpose of this act was to avoid isolation of students with disabilities with the rest of the mainstream society and integrate special need education with traditional education system by providing a more universal and diverse classroom setting.<ref>{{cite journal | title=Educational reform in Japan towards inclusion: are we training teachers for success?|journal = International Journal of Inclusive Education|volume = 19|issue = 3|pages = 314–331| author=Chris, Forlin | doi=10.1080/13603116.2014.930519|year = 2015|s2cid = 145639014}}</ref> In recent years, the Japanese government continues to pass equal rights to children with disabilities under special need education and inclusive education as public welfare.

      == Extracurricular activities ==
      The Japanese educational system is supplemented by a heavy emphasis on extracurricular activities, also known as [[Tutor|shadow education]], which are any educational activities that do not take place during formal schooling.<ref>{{cite journal |last1=Yamamoto |first1=Yoko |last2=Brinton |first2=Mary C. |title=Cultural Capital in East Asian Educational Systems: The Case of Japan |journal=Sociology of Education |date=January 2010 |volume=83 |issue=1 |pages=67–83 |doi=10.1177/0038040709356567 |s2cid=33684414 }}</ref> This is largely motivated by the extreme weight that is placed upon [[Higher education in Japan#Entrance|formal examinations]] as a prerequisite to attend university, something that is seen as integral to their future career and social status to gain a competitive edge, Japanese families are willing to expend money and have their child put in time and effort into a supplementary education.<ref>{{cite journal |last1=Entrich |first1=Steve R. |title=The Decision for Shadow Education in Japan: Students' Choice or Parents' Pressure? |journal=Social Science Japan Journal |date=2015 |volume=18 |issue=2 |pages=193–216 |doi=10.1093/ssjj/jyv012 |doi-access=free }}</ref> Forms of shadow education include ''mogi shiken'', which are practice exams given by private companies that determine the child's chances of getting into a university. ''[[Juku]]'' are private after-school classes that aim to develop abilities for students to excel in formal school curricula or to prepare for university examinations. ''Ronin'' are students who undergo full-time preparation for university exams following high school due to their inability to get into their school of choice.<ref name=jstor2781551>{{cite journal |last1=Stevenson |first1=David Lee |last2=Baker |first2=David P. |title=Shadow Education and Allocation in Formal Schooling: Transition to University in Japan |journal=American Journal of Sociology |date=May 1992 |volume=97 |issue=6 |pages=1639–1657 |doi=10.1086/229942 |jstor=2781551 |s2cid=143012779 }}</ref>

      Over 86% of students with college plans participate in at least one form of shadow education, with 60% participating in two or more.<ref name=jstor2781551/>

      == Criticisms ==
      {{Update|part=section|date=September 2024}}
      [[File:Suicide of School Students in Japan. (Survey from nippon.com).png|thumb|Suicide rate of Japanese students since 1988.<ref>[https://www.nippon.com/en/japan-data/h00572/child-suicides-at-highest-rate-ever-in-japan.html Child Suicide at Highest Ever Rate in Japan]</ref>]]

      Japanese students are faced with immense pressure to succeed academically from their parents, teachers, peers, and society. This is largely a result of a society that has long placed a great amount of importance on education, and a system that places all of its weight upon a single examination that has significant life-long consequences. This pressure has led to behaviors such as school violence, cheating, suicide, and significant psychological harm.<ref>{{Cite book|title=Japanese Education: Selective Bibliography of Psychosocial Aspects|last=Pike|first=Roberta|publisher=Jain Publishing Company|year=2007|isbn=9780895818690}}</ref> In some cases, students have experienced nervous breakdowns that have required hospitalization as young as twelve. In 1991, it was reported that 1,333 people in the age group of 15–24 had killed themselves, much of which was due to academic pressure.<ref>{{Cite journal|last=Bossy|first=Steve|date=1996|title=Academic pressure and impact on Japanese students|url=http://digitool.Library.McGill.CA:80/R/-?func=dbin-jump-full&object_id=35314&silo_library=GEN01|journal=McGill Journal of Education|volume=35}}</ref> In an international perspective, teenage suicide rates are close to the OECD average and below those of the [[United States]].<ref>{{Cite web|url=https://www.oecd.org/els/family/CO_4_4_Teenage-Suicide.pdf|title=CO4.4: Teenage suicides (15-19 years old)|publisher=OECD|page=2|access-date=17 December 2019}}</ref> A survey by the Education Ministry showed that students at public schools were involved in a record number of [[school violence|violent incidents]] in 2007: 52,756 cases, an increase of some 8,000 on the previous year. In almost 7,000 of these incidents, teachers were the victims of assault.<ref>"[http://search.japantimes.co.jp/mail/ed20081202a1.html Getting children to get along]". ''The Japan Times'', Tokyo (2 December 2008).</ref>

      The Japanese educational system has also been criticized for failure to foster independent thinkers with cultural and artistic sensibility. Japanese students who attend schools overseas often face difficulty adapting and competing in that environment due to a lack of international viewpoints.<ref>{{cite journal |id={{ProQuest|218538321}} |last=Bracey |first=Gerald |date=December 1997 |title=The Japanese Education System Is a Failure, Say Some Japanese |journal=Phi Delta Kappan |volume=79 |issue=4 |pages=328–330 }}</ref>

      There is also criticism about the amount of free time students are given and/or are allowed within their middle school and high school careers. As Japanese students grow, their time to assert what they have learned in class to real life is cut dramatically, starting with the elevation from elementary to lower secondary school.{{Citation needed|date=June 2025}} A large part of this has to do with cram schooling, or [[Juku]], which can start as early as elementary and takes full effect toward the end of junior high school, with roughly 60% of all students participating.<ref name=":0">{{Cite journal|last=Lowe|first=Robert|date=1 January 2015|title=Cram Schools in Japan: The Need for Research|url=https://jalt-publications.org/tlt/articles/4284-cram-schools-japan-need-research|journal=The Language Teacher|language=en|volume=39|issue=1|pages=26|doi=10.37546/JALTTLT39.1-5|issn=0289-7938|doi-access=free}}</ref> This number has increased drastically over the past couple decades,<ref name=":0" /> as well as the view of juku within the Japanese academic system. While initially seen as a problem, cram schools have become synonymous with Japan's schooling and are even seen as a support to the structure of said schooling.<ref>{{Cite web|title=Data-based Discussion on Education and Children in Japan 2: Analyzing Juku--Another School After School - Projects|url=https://www.childresearch.net/projects/data_Japan/2018_02.html|access-date=14 December 2020|website=Child Research Net}}</ref> With juku costing between 600,000 and 1.5 million [[Japanese yen|yen]], depending on how old the student is and how much the guardian can pay, cram school is a very profitable part of the economy, with over 48,000 juku schools active today.{{Citation needed|date=June 2025}} With these extra school sessions ranging between 1 and 6 days a week on top of normal classes,<ref>{{Cite web|title=Japan's "Cram Schools" - Educational Leadership|url=http://www.ascd.org/publications/educational-leadership/feb93/vol50/num05/Japan%27s-%E2%80%9CCram-Schools%E2%80%9D.aspx |access-date=14 December 2020|website=www.ascd.org|archive-date=10 April 2021|archive-url=https://web.archive.org/web/20210410071850/http://www.ascd.org/publications/educational-leadership/feb93/vol50/num05/Japan%27s-%E2%80%9CCram-Schools%E2%80%9D.aspx |url-status=dead}}</ref> there is a fear that students will be unable to incorporate what they have learned into their lives, and thus could foreseeably lose the retained knowledge once the Entrance Exams are over. According to data from OECD's [[Programme for International Student Assessment|PISA]] 2015, after-school study time was the 4th lowest among 55 surveyed countries, behind Germany, Finland, and Switzerland.<ref>{{Cite book |title=PISA 2015 Results (Volume II): Policies and Practices for Successful Schools |publisher=OECD Publishing, Paris |year=2016 |isbn=978-92-64-26751-0 |pages=212–213}}</ref>

      === School textbooks ===
      School textbooks tend to minimize or obscure the [[Japanese war crimes|war crimes]] committed by the [[Imperial Japanese Army]] during [[World War II]] (the [[Nanjing Massacre]], human experimentation by [[Unit 731]], “[[comfort women]]” forced into prostitution for Japanese soldiers, the army's use of the population of Okinawa as human shields against American troops before pushing them to collective suicide, etc.).<ref>{{Cite news |date=2025-12-10 |title=Japan sees disinformation spread as right-wing influence grows |url=https://www.lemonde.fr/en/international/article/2025/12/10/in-japan-disinformation-is-spreading-as-right-wing-influence-grows_6748332_4.html |access-date=2025-12-11 |language=en}}</ref>

      ===Bullying===
      There is criticism about insufficient efforts to reduce [[bullying]] in schools. In fiscal 2019, there were a record 612,496 bullying cases in schools across Japan. This includes public and, private elementary, junior high, high school, ls, and special schools for children with disabilities. Serious incidents with severe physical or psychological damage were 723 (a 20% increase from 2018). Bullying happens mostly in elementary schools (484,545 cases in 2019) followed by junior high schools (106,524 cases in 2019) and high schools (18,352 cases in 2019). In fiscal 2019, 317 students died from suicide of which 10 suffered from bullying. 61.9 percent of cases were verbal bullying and online bullying accounted for 18.9 percent in high schools. In 2019 there were 78,787 cases of violent acts by students in elementary, junior high, and high schools.<ref name="bullying 2019">{{cite web |website=Japan Today |title=Japan had record 610,000 school bullying cases in FY2019 |url=https://japantoday.com/category/national/refiling-japan-had-record-610-000-school-bullying-cases-in-fy-2019 |date=23 October 2020 |archive-url=https://web.archive.org/web/20201025102454/https://japantoday.com/category/national/refiling-japan-had-record-610-000-school-bullying-cases-in-fy-2019 |archive-date=25 October 2020}}</ref> Separate data from TIMSS 2019 and PISA 2018 indicate a lower than average incidence of bullying in international comparisons.<ref>{{Cite web |last=College |first=TIMSS & PIRLS International Study Center at Boston |title=TIMSS 2019 International Reports – TIMSS & PIRLS International Study Center at Boston College |url=https://timss2019.org/reports/student-bullying/index.html |access-date=2024-10-29 |website=timss2019.org |language=en-US}}</ref><ref>{{Cite web |date=2019-12-03 |title=Bullying |url=https://www.oecd.org/en/publications/pisa-2018-results-volume-iii_acd78851-en/full-report/component-8.html#chap3 |access-date=2024-10-29 |website=OECD |language=en}}</ref>

      ==International education==
      {{See also|List of international schools in Japan}}International schools in Japan are schools where all classes are generally taught in English. Many international schools are classified as ''kakushu gakko'' ("miscellaneous schools") under Article 134 of the School Education Act, rather than an officially accredited ''ichijoko''. This means attendance to these schools does not fulfill Japan's compulsory education.<ref>{{Cite web |title=11. 学齢児童生徒をいわゆるインターナショナルスクールに通わせた場合の就学義務について：文部科学省 |url=https://www.mext.go.jp/a_menu/shotou/shugaku/detail/1422252.htm |access-date=2025-11-09 |website=文部科学省ホームページ |language=ja}}</ref> {{Expand section|date=September 2024}}

      As of 2016, Japan has 30 to 40 international schools.<ref>{{Cite web |title=Member Schools – Japan Council of International Schools |url=https://www.jcis.jp/member-schools/ |access-date=1 November 2025 |website=Japan Council of International Schools}}</ref>

