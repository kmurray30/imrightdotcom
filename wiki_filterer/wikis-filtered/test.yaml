      {{Short description|Corporal punishment}}
      {{Use British English|date=December 2018}}
      {{Use dmy dates|date=August 2023}}
      {{corporal punishment}}
      [[Caning]] is a widely used form of [[corporal punishment]] in [[Singapore]]. It can be divided into several contexts: judicial, prison, reformatory, military, school, and domestic. These practices of caning as punishment were introduced during the period of [[Singapore in the Straits Settlements|British colonial rule in Singapore]].<ref name="Corpun History" /> Similar forms of corporal punishment are also used in some other former British colonies, including two of Singapore's neighbouring countries: [[Caning in Malaysia|Malaysia]] and [[Caning in Brunei|Brunei]].

      Of these, [[Judicial corporal punishment|judicial caning]] is the most severe. It is applicable to only adult male convicts under the age of 50 for a wide range of offences under the [[Criminal law of Singapore|Criminal Procedure Code]], up to a maximum of 24 strokes per trial. Always ordered in addition to a prison sentence, it is inflicted by [[#Caning officers|specially trained prison staff]] using a long and thick [[rattan]] cane on the prisoner's buttocks in an enclosed area in the prison. Male criminals who were not sentenced to caning earlier in a court of law may also be punished by caning in the same way if they commit aggravated offences while serving time in prison. Similarly, male juvenile delinquents in [[Reformatory|reformatories]] may be punished by caning for serious offences.

      Servicemen in the [[Singapore Armed Forces]] (SAF) who commit serious military offences may be sentenced by a military court to a less severe form of caning in the SAF Detention Barracks, which houses military offenders.

      In a much milder form, caning is used as a disciplinary measure in schools. Boys aged between 6 and 19 may be given up to three strokes with a light rattan cane on the buttocks over clothing or the palm of the hand as a punishment for serious misconduct, often as a last resort. As the law does not allow schools to cane girls, they receive alternative forms of punishment such as detention or suspension.

      A smaller cane or other implement is often used by some parents to punish their children. This practice is allowed in Singapore but not encouraged by the government. The Singaporean government has stated that in its opinion, the [[Convention on the Rights of the Child]] does not prohibit "the judicious application of corporal punishment in the [[best interests|best interest of the child]]."<ref>[https://treaties.un.org/Pages/ViewDetails.aspx?src=TREATY&mtdsg_no=IV-11&chapter=4&lang=en#EndDec Ratification status] {{Webarchive|url=https://web.archive.org/web/20140211151110/https://treaties.un.org/pages/viewdetails.aspx?src=treaty&mtdsg_no=iv-11&chapter=4&lang=en#EndDec |date=11 February 2014 }} on the [[United Nations]] website.</ref>

      ==Judicial caning==
      {{see also|Judicial corporal punishment}}

      ===History===
      Caning, as a form of legally sanctioned corporal punishment for convicted criminals, was first introduced to [[British Malaya|Malaya]] and Singapore during the [[Straits Settlements|period of British colonial rule]] in the 19th century. It was formally codified under the ''Straits Settlements Penal Code Ordinance IV'' in 1871.<ref name="Corpun History">
      {{cite web |url= https://www.corpun.com/singfeat.htm#history |title=Judicial Caning in Singapore, Malaysia and Brunei #The History of Caning in Singapore, Malaysia and Brunei |date=January 2019 |website=World Corporal Punishment Research |access-date=6 July 2019 |archive-url= https://web.archive.org/web/20150115052445/http://www.corpun.com/singfeat.htm#history |archive-date=15 January 2015 |url-status=live}}
      </ref>

      In that era, offences punishable by caning were similar to those punishable by [[birching]] or [[flogging]] (with the [[cat o' nine tails]]) in [[England and Wales]]. They included [[robbery]], aggravated forms of [[theft]], [[burglary]], [[assault]] with the intention of [[sexual abuse]], a second or subsequent conviction of [[rape]], a second or subsequent offence relating to [[prostitution]], and living on or trading in prostitution.<ref name="Corpun History" />

      Caning remained on the statute book after Malaysia became independent from Britain in 1957, and after Singapore ceased to be part of Malaysia in 1965. Subsequent legislation has been passed by the [[Parliament of Singapore]] over the years to increase the minimum strokes an offender receives, and the number of crimes that may be punished with caning.<ref name="Corpun History" />

      ===Legal basis===
      Sections 325–332 of the [[Criminal law of Singapore|Criminal Procedure Code 2010]] lay down the procedures governing caning. They include the following:
      * A male offender, under 50 years of age, who has been certified to be in a fit state of health by a medical officer is liable to be caned.<ref name="CPC s 331">Criminal Procedure Code section 331.</ref>
      * The offender shall receive no more than 24 strokes of the cane on any one occasion, irrespective of the total number of offences committed.<ref name="CPC s 328">Criminal Procedure Code section 328.</ref> In other words, a man cannot be sentenced to more than 24 strokes of the cane in a single trial, but he may receive more than 24 strokes if the sentences are given out in separate trials.<ref>
      {{cite news |last1=Thomas |first1=Sujin |title=24-stroke caning cap to be formalised |url= https://www.corpun.com/sgj00812.htm| access-date=25 January 2015 |newspaper=The Straits Times |location=Singapore |date=12 December 2008 |archive-url= https://web.archive.org/web/20150128115413/http://www.corpun.com/sgj00812.htm |archive-date=28 January 2015 |url-status=live}}
      </ref> However, in the first case where a prisoner received more than 24 strokes in a single trial, armed robber Qwek Kee Chong (who served ten years in prison) was given 48 strokes of the cane on 8 April 1988 and later hospitalised for his injuries from the caning; he was later granted compensation for this error.<ref>{{cite news |last1=Nair |first1=Suresh |title=I got 48 instead of 24 strokes |newspaper=The New Paper |date=5 June 1991 |location=Singapore}}</ref>
      * If the offender is under 18, he may receive up to 10 strokes, but with a lighter cane.<ref name="CPC s 328" /><ref name="CPC s 330">Criminal Procedure Code section 330.</ref><ref name="CPC s 329">Criminal Procedure Code section 329.</ref> Boys under 16 may be sentenced to caning only by the [[High Court of Singapore|High Court]] and not by the [[Subordinate courts of Singapore|State Courts]].
      * Offenders [[Capital punishment in Singapore|sentenced to death]] whose sentences have not been commuted shall not be caned.<ref name="CPC s 325" />
      * The [[rattan]] cane used shall not exceed {{Convert|1.27|cm|in|abbr=in}} in diameter.<ref name="CPC s 329" />
      * Caning must not be carried out in instalments.<ref name="CPC s 330" /> This is to ensure that prisoners receive their punishment in a single session and do not have to go through the process repeatedly, even if the full sentence might not have been administered for medical reasons.<ref name="Yong Vui Kong v Public Prosecutor [2015] SGCA 11">{{cite web |title=Yong Vui Kong v Public Prosecutor [2015] SGCA 11 |url= http://www.singaporelaw.sg/sglaw/laws-of-singapore/case-law/free-law/court-of-appeal-judgments/15932-yong-vui-kong-v-public-prosecutor-2015-sgca-11 |website=SingaporeLaw.sg |access-date=28 May 2017 |date=4 March 2015 |archive-url= https://web.archive.org/web/20171201035241/http://www.singaporelaw.sg/sglaw/laws-of-singapore/case-law/free-law/court-of-appeal-judgments/15932-yong-vui-kong-v-public-prosecutor-2015-sgca-11 |archive-date=1 December 2017 |url-status=dead}}
      </ref>

      Any male convict, whether sentenced to caning or not, may also be caned in prison if he commits certain offences while serving time in prison.<ref name="Prisons Act section 71">Prisons Act section 71.</ref>

      Singapore has not signed or ratified a number of [[international human rights instruments|international human rights treaties]] which prohibit the use of corporal punishment. These include the [[International Covenant on Civil and Political Rights]], the [[Convention Against Torture]] and the [[International Convention for the Protection of All Persons from Enforced Disappearance]].<ref>{{Cite web |date=12 April 2021 |title=Singapore's Approach to Human Rights |author=Teo Kai Xiang |url= https://samizdat.ghost.io/singapore-human-rights/ |access-date=29 May 2021 |website=Singapore Samizdat |archive-url= https://web.archive.org/web/20230407170842/https://www.singapore-samizdat.com/singapore-human-rights/ |archive-date=7 April 2023 |url-status=dead}}</ref>

      ====Exemptions====
      Under the law, women, men above the age of 50, and men [[Capital punishment in Singapore|sentenced to death]], whose sentences have not been commuted, cannot be sentenced to caning.<ref name="CPC s 325">Criminal Procedure Code section 325(1).</ref>

      It was not uncommon for the courts to extend, by up to 12 months,<ref>Criminal Procedure Code sections 325–332.</ref> the prison terms of offenders originally sentenced to caning but later found to be medically unfit to undergo the punishment. However, on 9 May 2017, the [[High Court of Singapore|High Court]] ruled that the courts should not automatically impose an additional jail term in lieu of caning unless there are reasons to do so.<ref>
      {{cite news |last1=Chelvan |first1=Vanessa Paige |title=Jail terms for those excused from caning should not be 'automatically' raised: High Court |url= http://www.channelnewsasia.com/news/singapore/jail-terms-for-those-excused-from-caning-should-not-be-8831958 |access-date=10 May 2017 |work=Channel NewsAsia |date=9 May 2017 |archive-url= https://web.archive.org/web/20170512055007/http://www.channelnewsasia.com/news/singapore/jail-terms-for-those-excused-from-caning-should-not-be-8831958 |archive-date=12 May 2017 |url-status=live  }}
      </ref> According to judicial indicative guidelines, in situations where the court has to extend a convict's prison term in lieu of caning, the extension will range from nine to 12 months when the case involves more than 19 strokes of the cane.<ref>
      {{cite news |last1=Lam |first1=Lydia |title=Rapist who defecated in court gets additional jail time as he is unfit for caning |url= https://www.channelnewsasia.com/news/singapore/rapist-who-defecated-in-court-gets-additional-jail-time-no-canin-12947140 |access-date=7 August 2020 |work=Channel NewsAsia |date=20 July 2020 }}
      </ref>

      ===Offences punishable by caning===
      Singaporean law allows caning to be ordered for over 35 offences, including [[Hostage|hostage-taking]]/[[kidnapping]], [[robbery]], gang robbery with [[murder]], [[riot]]ing, scams, [[Grievous bodily harm|causing grievous hurt]], [[drug abuse]], [[vandalism]], [[extortion]], [[Voyeurism#Legal status|voyeurism]], [[Sexual abuse|sexual abuse, molestation (outrage of modesty)]],<ref>
      {{cite news |last1=Narayan |first1=Lakshmi| title=Wield the rod, stem the rot |url= https://www.corpun.com/12archive/sgj01212.htm#24280 |access-date=6 December 2017 |newspaper=The Asian Age |date=24 December 2012| location=New Delhi |archive-url= https://web.archive.org/web/20170616042501/http://www.corpun.com/12archive/sgj01212.htm |archive-date=16 June 2017 |url-status=live}}
      </ref> and [[Criminal possession of a weapon|unlawful possession of weapons]]. Caning is also a mandatory punishment for certain offences such as [[rape]], [[Illegal drug trade|drug trafficking]], [[Loan shark#Malaysia and Singapore|illegal moneylending]],<ref name="Table of offences">
      {{cite web |url= https://www.corpun.com/sgjur2.htm |title=Singapore: Judicial and prison caning: Table of offences for which caning is available |publisher=World Corporal Punishment Research |year=2011 |access-date=25 January 2015 |archive-url= https://web.archive.org/web/20150123043724/http://www.corpun.com/sgjur2.htm |archive-date=23 January 2015 |url-status=live  }}</ref> and for foreigners who overstay by more than 90 days – a measure designed to deter illegal immigrants.<ref>Immigration Act section 15(3b).</ref>

      While most of Singapore's laws on offences punishable by caning were inherited from the British legal system through the [[Indian Penal Code]], the [[Vandalism Act (Singapore)|Vandalism Act]] was only introduced in 1966 after independence, in what has been argued by Jothie Rajah to be an attempt by the ruling [[People's Action Party]] (PAP) to suppress the opposition's activities in the 1960s because opposition supporters vandalised public property with anti-PAP graffiti.<ref name="Authoritarian Rule of Law">{{cite book|last1=Rajah|first1=Jothie |title= Authoritarian Rule of Law: Legislation, Discourse and Legitimacy in Singapore|date=April 2012 |publisher=Cambridge University Press |isbn= 9781107634169}}</ref> Vandalism was originally prohibited by the Minor Offences Act, which made it punishable by a fine of up to S$50 or a week in jail, but did not permit caning.<ref name="Authoritarian Rule of Law"/> Today, the Vandalism Act imposes a mandatory caning sentence of between three and eight strokes for a conviction of vandalism. Caning is not imposed on first-time offenders who use delible substances (e.g. pencil, crayon, chalk) to commit vandalism.<ref>Vandalism Act, section 3.</ref>

      Beginning in the 1990s, the higher courts have been more inclined to impose caning sentences in cases where caning is a discretionary punishment. For example, in 1993, an 18-year-old molester was initially sentenced to six months' imprisonment but he appealed against his sentence. [[Chief Justice of Singapore|Chief Justice]] [[Yong Pung How]] not only dismissed his appeal, but also added three strokes of the cane to the sentence. This [[precedent]] set by the Chief Justice became a benchmark for sentences in molestation cases, where the court is expected to sentence a molester to at least nine months' imprisonment and three strokes of the cane if the offence involves touching the victim's private parts.<ref name="Offences for which caning is imposed">
      {{cite web |title=Judicial Caning in Singapore, Malaysia and Brunei #Offences for which caning is imposed |url= https://corpun.com/singfeat.htm#offences |website=World Corporal Punishment Research |access-date=23 August 2016 |date=September 2012 |archive-url= https://web.archive.org/web/20160716095447/http://www.corpun.com/singfeat.htm#offences |archive-date=16 July 2016 |url-status=live}}
      </ref>

      In some cases, male employees can be sentenced to caning for offences committed by the company they work for. For instance, the Dangerous Fireworks Act states that caning is mandatory for a manager or owner of a company which imports, delivers or sells dangerous fireworks. Another example is the transporting of illegal immigrants; a manager of a company who authorises or participates in such activity can be sentenced to caning.<ref name="Offences for which caning is imposed" /> In July 1998, police reported six cases of employers sentenced to imprisonment and caning for hiring illegal immigrants.<ref>{{cite news |title=These 6 were caned for hiring illegals |date=3 July 1998 |newspaper=The Straits Times |location=Singapore |url= https://corpun.com/sgju9807.htm |access-date=20 December 2016 |archive-url= https://web.archive.org/web/20121014083733/http://corpun.com/sgju9807.htm |archive-date=14 October 2012 |url-status=live}}
      </ref>

      The [[Chewing gum sales ban in Singapore|importation of chewing gum]] is subject only to fines; it is not and has never been an offence punishable by caning.<ref>Control of Manufacture Act sections 8–9.</ref>

      ===Statistics===
      In 1993, the number of caning sentences ordered by the courts was 3,244.<ref name="1993 statistics">
      {{cite web|title=Singapore Human Rights Practices, 1994|url=http://dosfan.lib.uic.edu/ERC/democracy/1995_hrp_report/95hrp_report_eap/Singapore.html|website=Electronic Research Collections|publisher=U.S. Department of State|access-date=25 January 2015|date=February 1995|archive-url=https://web.archive.org/web/20100711145530/http://dosfan.lib.uic.edu/ERC/democracy/1995_hrp_report/95hrp_report_eap/Singapore.html|archive-date=11 July 2010|url-status=dead}}
      </ref>

      By 2007, this figure had doubled to 6,404, of which about 95% were actually implemented.<ref name="2007 statistics">
      {{cite web |title= Singapore |url= https://2009-2017.state.gov/j/drl/rls/hrrpt/2007/100537.htm |publisher= U.S. Department of State |access-date= 25 January 2015 |date= 11 March 2008 |df= dmy-all }}
      </ref> Since 2007, the number of caning sentences has experienced an overall decline, falling to 1,257 in 2016.

      Caning takes place at several institutions around Singapore, most notably [[Changi Prison]], and including the now defunct Queenstown Remand Centre, where [[Michael P. Fay|Michael Fay]] was caned in 1994. Canings are also administered in Drug Rehabilitation Centres.

