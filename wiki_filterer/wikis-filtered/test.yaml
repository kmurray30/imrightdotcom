      An analysis of those IFR rates indicates that COVID{{nbhyph}}19 is hazardous not only for the elderly but also for middle-aged adults, for whom the infection fatality rate of COVID-19 is two orders of magnitude greater than the annualised risk of a fatal automobile accident and far more dangerous than seasonal [[influenza]].<ref name="EJE_levinetal" />

      ==== Earlier estimates of IFR ====
      At an early stage of the pandemic, the World Health Organization reported estimates of IFR between 0.3% and 1%.<ref>{{#invoke:Cite|web|title=Coronavirus disease 2019 (COVID-19) Situation Report – 30 |url=https://www.who.int/docs/default-source/coronaviruse/situation-reports/20200219-sitrep-30-covid-19.pdf |access-date=3 June 2020 |date=19 February 2020}}</ref><ref>{{#invoke:Cite|web|title=Coronavirus disease 2019 (COVID-19) Situation Report – 31 |url=https://www.who.int/docs/default-source/coronaviruse/situation-reports/20200220-sitrep-31-covid-19.pdf |access-date=23 April 2020 |date=20 February 2020}}</ref> On 2{{spaces}}July, The WHO's chief scientist reported that the average IFR estimate presented at a two-day WHO expert forum was about 0.6%.<ref name="NYT-20200704dm">{{#invoke:Cite|news | vauthors = McNeil Jr DG |title=The Pandemic's Big Mystery: How Deadly Is the Coronavirus? – Even with more than 500,000 dead worldwide, scientists are struggling to learn how often the virus kills. Here's why |url=https://www.nytimes.com/2020/07/04/health/coronavirus-death-rate.html |archive-url=https://web.archive.org/web/20200704152005/https://www.nytimes.com/2020/07/04/health/coronavirus-death-rate.html |archive-date=4 July 2020 |url-access=subscription |url-status=live |date=4 July 2020 |work=The New York Times |access-date=6 July 2020}}</ref><ref>{{#invoke:Cite|news |title=Global Research and Innovation Forum on COVID-19: Virtual Press Conference |url=https://www.who.int/docs/default-source/coronaviruse/virtual-press-conference---2-july---update-on-covid-19-r-d.pdf |publisher=[[World Health Organization]] (WHO) |date=2 July 2020}}</ref> In August, the WHO found that studies incorporating data from broad serology testing in Europe showed IFR estimates converging at approximately 0.5–1%.<ref>{{#invoke:Cite|web|title=Estimating mortality from COVID-19|url=https://www.who.int/news-room/commentaries/detail/estimating-mortality-from-covid-19|access-date=21 September 2020|website=[[World Health Organization]] (WHO)}}</ref> Firm lower limits of IFRs have been established in a number of locations such as New York City and Bergamo in Italy since the IFR cannot be less than the population fatality rate. (After sufficient time however, people can get reinfected).<ref>{{#invoke:Cite|journal| vauthors = Shaffer C |date=23 October 2021|title=Covid-19 still rife in Iran |journal=New Scientist|volume=252|issue=3357|pages=10–11|doi=10.1016/S0262-4079(21)01865-0|pmid=34720322|issn=0262-4079|pmc=8536311|bibcode=2021NewSc.252...10S}}</ref> As of 10 July, in New York City, with a population of 8.4&nbsp;million, 23,377 individuals (18,758 confirmed and 4,619 probable) have died with COVID‑19 (0.3% of the population).<ref>{{#invoke:Cite|web|title=COVID-19: Data |url=https://www1.nyc.gov/site/doh/covid/covid-19-data.page |publisher=City of New York}}</ref> Antibody testing in New York City suggested an IFR of ≈0.9%,<ref>{{#invoke:Cite|SSRN|title=SARS-CoV-2, COVID-19, Infection Fatality Rate (IFR) Implied by the Serology, Antibody, Testing in New York City| vauthors = Wilson L |date=May 2020|ssrn=3590771}}</ref> and ≈1.4%.<ref>{{#invoke:Cite|journal | vauthors = Yang W, Kandula S, Huynh M, Greene SK, Van Wye G, Li W, Chan HT, McGibbon E, Yeung A, Olson D, Fine A, Shaman J | title = Estimating the infection-fatality risk of SARS-CoV-2 in New York City during the spring 2020 pandemic wave: a model-based analysis | journal = The Lancet. Infectious Diseases | volume = 21 | issue = 2 | pages = 203–212 | date = February 2021 | pmid = 33091374 | pmc = 7572090 | doi = 10.1016/s1473-3099(20)30769-6 }}</ref> In [[province of Bergamo|Bergamo province]], 0.6% of the population has died.<ref>{{#invoke:Cite|web|url=https://medium.com/bccp-uc-berkeley/how-deadly-is-covid-19-data-science-offers-answers-from-italy-mortality-data-58abedf824cf|title=How deadly is COVID-19? Data Science offers answers from Italy mortality data.| vauthors = Modi C |date=21 April 2020 |website=Medium |access-date=23 April 2020}}</ref> In September 2020, the U.S. Centers for Disease Control and Prevention (CDC) reported preliminary estimates of age-specific IFRs for public health planning purposes.<ref name=":1">{{#invoke:Cite|web|title=Coronavirus Disease 2019 (COVID-19) |url=https://www.cdc.gov/coronavirus/2019-ncov/hcp/planning-scenarios.html |website=U.S. [[Centers for Disease Control and Prevention]] (CDC) |access-date=9 December 2020 |date=10 September 2020}}</ref>

