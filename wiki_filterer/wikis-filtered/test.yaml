      == Logistics ==

      === Frequency ===
      The SAT is currently offered eight times a year worldwide: in August, September, October, November, December, March, May, and June.<ref name="sattestdates" /> Originally, for international students, the SAT was offered four times a year: in October, December, March and May (2020 exception: to cover worldwide May cancelation, an additional September exam was introduced, and August was made available to international test-takers as well).<ref>{{cite web |url=https://collegereadiness.collegeboard.org/sat/register/international |title=SAT International Registration |date=May 15, 2015 |access-date=July 22, 2017 |publisher=[[College Board]] |archive-url=https://web.archive.org/web/20170721111737/https://collegereadiness.collegeboard.org/sat/register/international |archive-date=July 21, 2017 |url-status=usurped }}</ref> The test is typically offered on the first Saturday of the month for the October, November, December, May, and June administrations.<ref name="sattestdates" /> The test was taken by 2,004,965 high school graduates in the class of 2025.<ref name="test takers">{{cite web|url=https://reports.collegeboard.org/media/pdf/2025-total-group-sat-suite-of-assessments-annual-report%20ADA-v0.2.pdf |title=2025 Total Group SAT Suite of Assessments Annual Report|publisher=[[College Board]] |access-date=November 16, 2025|archive-date=November 16, 2025 |archive-url=https://archive.today/20251116194600/https://reports.collegeboard.org/media/pdf/2025-total-group-sat-suite-of-assessments-annual-report%20ADA-v0.2.pdf |url-status=live}}</ref>

      Candidates wishing to take the test may register online at the College Board's website or by mail at least three weeks before the test date.

      There are also SAT School Day tests for students taking the SAT during school.<ref>{{Cite web |title=SAT School Day – SAT Suite {{!}} College Board |url=https://satsuite.collegeboard.org/sat-school-day |access-date=2025-02-18 |website=satsuite.collegeboard.org |language=en}}</ref> They are offered from March to April and October.<ref>{{Cite web |title=SAT School Day Test Dates – SAT Suite {{!}} College Board |url=https://satsuite.collegeboard.org/sat-school-day/test-dates |access-date=2025-02-18 |website=satsuite.collegeboard.org |language=en}}</ref>

      === Fees ===
      As of 2024, the SAT costs US$68, plus additional fees if testing outside the United States.<ref name="costs" /> The College Board makes fee waivers available for low-income students. Additional fees apply for late registration, standby testing, registration changes, scores by telephone, and extra score reports (beyond the four provided for free).

      === Accommodation for candidates with disabilities ===
      Students with verifiable disabilities, including physical and learning disabilities, are eligible to take the SAT with accommodations. The standard time increase for students requiring additional time due to learning disabilities or physical handicaps is time + 50%; time + 100% is also offered.

      == Change from paper-based to digital ==
      In January 2022, College Board announced that the SAT would change from paper-based to digital (computer-based).<ref name="Thompson-2022">{{Cite news|last=Thompson|first=Carolyn|date=January 25, 2022|title=In major overhaul, SAT exam will soon be taken digitally|work=PBS Newshour|url=https://www.pbs.org/newshour/education/in-major-overhaul-sat-exam-will-soon-be-taken-digitally|access-date=January 25, 2022|archive-date=January 25, 2022|archive-url=https://web.archive.org/web/20220125160437/https://www.pbs.org/newshour/education/in-major-overhaul-sat-exam-will-soon-be-taken-digitally|url-status=live}}</ref> International (non-U.S.) testing centers began using the digital format on March 11, 2023. The December 2023 SAT was the last SAT test offered on paper. The switch to the digital format occurred on March 9, 2024, in the U.S.<ref>{{cite news | url=https://blog.prepscholar.com/when-will-the-sat-go-digital | title=When Will the SAT Go Digital? | last1=Robinson | first1=Ashley | access-date=April 18, 2023 | archive-date=April 18, 2023 | archive-url=https://web.archive.org/web/20230418114603/https://blog.prepscholar.com/when-will-the-sat-go-digital | url-status=live }}</ref> The digital SAT takes about an hour less to do than the paper-based test (two hours vs. three). It is administered in an official test center, as before, but the students use their own testing devices (a portable computer or tablet). However, a school may require the use of school-issued devices for students taking the digital SAT on its campus. If a student cannot bring his or her own device, one can be requested from College Board.<ref>{{cite web | url=https://satsuite.collegeboard.org/digital | title=Digital SAT – SAT Suite &#124; College Board | access-date=April 18, 2023 | archive-date=April 14, 2023 | archive-url=https://web.archive.org/web/20230414150456/https://satsuite.collegeboard.org/digital | url-status=live }}</ref> Before the test, College Board's "Bluebook" app must have been successfully installed on the testing device.<ref>{{Cite web|url=https://bluebook.app.collegeboard.org/|title=Bluebook|website=bluebook.app.collegeboard.org|access-date=April 18, 2023|archive-date=April 18, 2023|archive-url=https://web.archive.org/web/20230418114603/https://bluebook.app.collegeboard.org/|url-status=live}}</ref>

      Students have two modules per section (reading/writing and math). On the reading and writing modules, the questions will have shorter passages for each question. On the math modules, the word problems will be more concise. Students have a ten-minute break after the first two English modules and before the two math modules. A timer is built into the testing software and will automatically begin once the student finishes the second English module. New tools such as a question flagger, a timer, and an integrated [[Desmos]]-powered graphing calculator are included in the digital SAT.<ref>{{Cite web |title=FAQ – Digital SAT Suite |url=https://satsuite.collegeboard.org/digital/faq |access-date=December 5, 2023 |website=satsuite.collegeboard.org |language=en |archive-date=December 5, 2023 |archive-url=https://web.archive.org/web/20231205075859/https://satsuite.collegeboard.org/digital/faq |url-status=live }}</ref>

      The new test is [[Computerized adaptive testing|adaptive]], with the second module being adaptive to the demonstrated level based on the results from the first module. Specifically, the difficulty of Module 2 in each section is determined by a student's performance in Module 1. Strong performance in the first module leads to placement in a more challenging Module 2, which contains the most difficult questions on the test. Weaker performance results in assignment to an easier Module 2. The harder reading module often includes short passages that can be highly academic and rhetorically complex, while the harder math module focuses on more abstract and advanced concepts and problems.

      == Scaled scores and percentiles ==
      Students receive their online score reports approximately two to four weeks after test administration (longer for mailed, paper scores).<ref>{{cite web|url=https://satsuite.collegeboard.org/scores/sat |title=SAT Scores |publisher=The College Board |access-date=November 30, 2025 |archive-url=https://web.archive.org/web/20251007031055/https://satsuite.collegeboard.org/scores/sat |archive-date=October 7, 2025 |url-status=live}}</ref> Included in the report is the total score (the sum of the two section scores, with each section graded on a scale of 200–800) and three subscores (in reading, writing, and analysis, each on a scale of 2–8) for the optional essay.<ref name="understanding SAT scores">{{cite web |url=https://collegereadiness.collegeboard.org/pdf/understanding-sat-scores.pdf |publisher=The College Board |access-date=April 28, 2019 |title=Understanding SAT Scores |archive-url=https://web.archive.org/web/20190417020602/https://collegereadiness.collegeboard.org/pdf/understanding-sat-scores.pdf |archive-date=April 17, 2019 |url-status=unfit }}</ref> Students may also receive, for an additional fee, a score verification service; the question and answer service, which provided the test questions, the student's answers, the correct answers, and the type and difficulty of each question<ref>{{cite web|url=https://collegereadiness.collegeboard.org/sat/scores/verifying-scores |title=Verifying SAT Scores |publisher=The College Board |access-date=November 30, 2025 |archive-url=https://web.archive.org/web/20180829204432/https://collegereadiness.collegeboard.org/sat/scores/verifying-scores |archive-date=August 29, 2018 |url-status=usurped}}</ref>, is not available for the digital SAT.<ref>{{cite web|url=https://collegereadiness.collegeboard.org/sat/scores/verifying-scores|title=Verifying SAT Scores|date=January 11, 2016|publisher=The College Board|access-date=April 28, 2019|archive-url=https://web.archive.org/web/20190424002942/https://collegereadiness.collegeboard.org/sat/scores/verifying-scores|archive-date=April 24, 2019|url-status=live}}</ref>

      In addition, students receive two [[percentile]] scores, each of which is defined by the College Board as the percentage of students in a comparison group with equal or lower test scores. One of the percentiles, called the "Nationally Representative Sample Percentile", uses as a comparison group all 11th and 12th graders in the United States, regardless of whether or not they took the SAT. This percentile is theoretical and is derived using methods of [[statistical inference]]. The second percentile, called the "SAT User Percentile", uses actual scores from a comparison group of recent United States students that took the SAT. For example, for the school year 2019–2020, the SAT User Percentile was based on the test scores of students in the graduating classes of 2018 and 2019 who took the SAT (specifically, the 2016 revision) during high school. Students receive both types of percentiles for their total score as well as their section scores.<ref name="understanding SAT scores" />

