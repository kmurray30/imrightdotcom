      == Hashtag controversy ==
      {{Further|Internet Research Agency}}
      According to [[Reuters]], Russian [[Internet troll|trolls]] were involved in spreading the [[Twitter]] [[hashtag]] #NoRussiaNoGames following the announcement from IOC that Russia was suspended from the [[2018 Winter Olympics]]. One of the accounts identified by Reuters as driving activity around #NoRussiaNoGames was @ungestum, which lists its location as the Russian city of [[Orenburg]]. The account had sent 238 tweets consisting of just the hashtag to other users since the ban was announced, indicating that these were computer-generated. The campaign was also highly promoted by a group of at least five accounts which tweeted the hashtag numerous times along with the links that were not related to Russian-language news articles, and repeatedly reposted tweets from each other. One of those accounts, @03_ppm, has sent at least 275 such tweets.<ref>{{cite news|url=https://www.reuters.com/article/us-twitter-russia-olympics/norussianogames-twitter-bots-boost-russian-backlash-against-olympic-ban-idUSKBN1E223V|title=#NoRussiaNoGames: Twitter 'bots' boost Russian backlash against Olympic ban|date=9 December 2017|newspaper=Reuters|last1=Stubbs|first1=Jack}}</ref>

