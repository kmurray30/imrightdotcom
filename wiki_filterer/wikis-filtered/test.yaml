      The SAT ( , ess-ay-TEE) is a standardized test widely used for college admissions in the United States. Since its debut in 1926, its name and scoring have changed several times. For much of its history, it was called the Scholastic Aptitude Test and had two components, Verbal and Mathematical, each of which was scored on a range from 200 to 800. Later it was called the Scholastic Assessment Test, then the SAT I: Reasoning Test, then the SAT Reasoning Test, then simply the SAT.
      The SAT is wholly owned, developed, and published by the College Board and is administered by the Educational Testing Service. The test is intended to assess students' readiness for college. Historically, starting around 1937, the tests offered under the SAT banner also included optional subject-specific SAT Subject Tests, which were called SAT Achievement Tests until 1993 and then were called SAT II: Subject Tests until 2005; these were discontinued after June 2021. Originally designed not to be aligned with high school curricula, several adjustments were made for the version of the SAT introduced in 2016. College Board president David Coleman added that he wanted to make the test reflect more closely what students...
