      ==Research on possible causes of PISA disparities in different countries==
      Although PISA and TIMSS officials and researchers themselves generally refrain from hypothesizing about the large and stable differences in student achievement between countries, since 2000, literature on the differences in PISA and TIMSS results and their possible causes has emerged.<ref name="Hanushek, Eric A. 2011">{{cite book|last1=Hanushek|first1=Eric A.|first2=Ludger|last2=Woessmann|year=2011|chapter=The economics of international differences in educational achievement|title=Handbook of the Economics of Education|volume=3|editor-first1=Eric A.|editor-last1=Hanushek|editor-first2=Stephen|editor-last2=Machin|editor-first3=Ludger|editor-last3=Woessmann|location=Amsterdam|publisher=North Holland|pages=89–200}}</ref> Data from PISA have furnished several researchers, notably [[Eric Hanushek]], [[Ludger Wößmann]], Heiner Rindermann, and Stephen J. Ceci, with material for books and articles about the relationship between student achievement and economic development,<ref>{{citation|first1 = Eric|last1 = Hanushek|first2 = Ludger|last2 = Woessmann|year = 2008|title = The role of cognitive skills in economic development|journal = Journal of Economic Literature|volume = 46|issue = 3|pages = 607–668|url = http://www.citizing.org/data/projects/highered/The%20Role%20of%20Cognitive%20Skills%20in%20Economic%20Development%20Hanushek_Woessmann%202008.pdf|doi = 10.1257/jel.46.3.607|accessdate = 2025-01-07|archive-date = 2017-07-07|archive-url = https://web.archive.org/web/20170707214247/http://www.citizing.org/data/projects/highered/The%20Role%20of%20Cognitive%20Skills%20in%20Economic%20Development%20Hanushek_Woessmann%202008.pdf|url-status = dead}}</ref> [[democratization]], and health;<ref>{{citation|first1 = Heiner|last1 = Rindermann|first2 = Stephen J|last2 = Ceci|title = Educational policy and country outcomes in international cognitive competence studies|journal = Perspectives on Psychological Science|volume = 4|issue = 6|pages = 551–577|year = 2009|doi = 10.1111/j.1745-6924.2009.01165.x|pmid = 26161733|s2cid = 9251473}}</ref> as well as the roles of such single educational factors as high-stakes exams,<ref>{{cite journal |first = John H|last = Bishop|year = 1997|title = The effect of national standards and curriculum-based exams on achievement |journal=[[American Economic Review]] |series=Papers and Proceedings |volume = 87|issue = 2|pages = 260–264 |jstor=2950928 }}</ref> the presence or absence of private schools and the effects and timing of ability tracking.<ref>{{citation|url = http://www.econstor.eu/bitstream/10419/18779/1/cesifo1_wp1415.pdf|first1 = Eric|last1 = Hanushek|first2 = Ludger|last2 = Woessmann|year = 2006|title = Does educational tracking affect performance and inequality? Differences-in-differences evidence across countries|journal = Economic Journal|volume = 116|issue = 510|pages = C63–C76|doi=10.1111/j.1468-0297.2006.01076.x}}</ref>

      ==Critics and comments on accuracy==
      [[David Spiegelhalter]] of Cambridge wrote: "Pisa does present the uncertainty in the scores and ranks - for example the [[United Kingdom]] rank in the 65 countries is said to be between 23 and 31. It's unwise for countries to base education policy on their Pisa results, as [[Germany]], [[Norway]] and [[Denmark]] did after doing badly in 2001."<ref>{{Cite news|url=https://www.bbc.com/news/magazine-25299445|title=How accurate is the Pisa test?|first=Ruth|last=Alexander|work=BBC News|date=10 December 2013|access-date=22 November 2019}}</ref>

      According to [[Forbes]], an American media outlet, in an opinion article, some countries such as [[China]], [[Hong Kong]], [[Macau]], and [[Argentina]] select PISA samples from only the best-educated areas or from their top-performing students, slanting the results.<ref>{{Cite web|url=https://www.forbes.com/sites/realspin/2017/01/04/are-the-pisa-education-results-rigged/|title=Are The PISA Education Results Rigged?|first=Capital|last=Flows|website=Forbes|access-date=22 November 2019}}</ref>

      According to an open letter to [[Andreas Schleicher]], director of PISA, various academics and educators argued that "OECD and Pisa tests are damaging education worldwide".<ref>{{Cite news|url=https://www.theguardian.com/education/2014/may/06/oecd-pisa-tests-damaging-education-academics|title=OECD and Pisa tests are damaging education worldwide – academics|author=Guardian Staff|newspaper=The Guardian |date=6 May 2014|access-date=22 November 2019|via=www.theguardian.com}}</ref>

      According to ''[[O Estado de São Paulo]]'', Brazil shows a great disparity when classifying the results between public and private schools, where public schools would rank worse than Peru, while private schools would rank better than Finland.<ref>{{Cite web|url=https://educacao.estadao.com.br/noticias/geral,escolas-privadas-de-elite-do-brasil-superam-finlandia-no-pisa-rede-publica-vai-pior-do-que-peru,70003112767|title=Escolas privadas de elite do Brasil superam Finlândia no Pisa, rede pública vai pior do que o Peru.|first=Rafael|last=Cafardo|date=4 December 2019|access-date=4 December 2019|via=www.estadao.com.br}}</ref>

      According to a 2023 book, PISA is failing in its mission. It suggests that flatlined student outcomes and policy shortcomings have much to do with PISA's implicit ideological biases, structural impediments such as union advocacy, and conflicts of interest.<ref>{{cite book|title=Dire Straits: Education Reforms, Ideology, Vested Interests and Evidence|author1=Montserrat Gomendio |author2=José Ignacio Wert |doi=10.11647/OBP.0332|year=2023|isbn=978-1-80064-930-9 |s2cid=256890161 |doi-access=free }}</ref>

