      Most colleges and universities, particularly private ones, have an artificially high and unreliable<ref name=tws2MayY311/> [[Sticker price#United States|sticker price]] while charging most students, by awarding grant and scholarship money, a "discounted price" that varies considerably.<ref name=tws2MayY312>{{cite news
       |author= Mary Beth Marklein
       |title= 'Best value' colleges: Some have high price tags
       |newspaper= USA Today
       |date= February 7, 2012
       |url= https://www.usatoday.com/news/education/story/2012-02-07/princeton-review-best-value-colleges-2012/52991578/1
       |access-date= May 25, 2012
      }}</ref> For example, in 2011–2012, the average sticker price for tuition, fees and living expenses at private colleges, was $38,590 while the average actual cost was $23,060; at public colleges, the average sticker price was $17,130 and the average actual cost was $11,380.<ref name="tws2MayY311" /> The average full-time undergraduate gets $6,500 in grant aid along with $1,000 in tax-based aid to offset tuition and fees.<ref name="tws2MayY214" />

      {{Blockquote|Sticker price is the full price colleges list in their brochures and on their websites. Net price is the price students actually pay. Net price accounts for the fact that many students receive grants or scholarships. So it can be considerably lower than sticker price.|Jacob Goldstein, NPR, 2012<ref name=tws2MayY111>{{cite news
       |author= Jacob Goldstein
       |title= The Price Of College Tuition, In 1 Graphic
       |newspaper= NPR
       |date= May 25, 2012
       |url= https://www.npr.org/blogs/money/2012/05/22/153316565/the-price-of-college-tuition-in-1-graphic
       |access-date= May 25, 2012
      }}</ref>}}

      Discounting began in the 1970s and was dramatically expanded in the 1990s.<ref name=tws3JanN311>{{cite news
       |author= Paul Fain
       |title= Why Deep Tuition Discounts May Not Spell Financial Doom: They can be a useful tool as long as tuition revenue is solid
       |newspaper= The Chronicle of Higher Education
       |quote= Discounting in higher education began in the 1970s, as college admissions officers copied the pricing systems used by airlines and other businesses. The approach of charging as much as people would pay was novel in the academy.
       |date= May 2, 2010
       |url= http://chronicle.com/article/Why-Deep-Tuition-Discounts-May/65331/?viewMobile=0
       |access-date= January 14, 2013
      }}</ref> Sticker prices are set at much higher than the real costs for most students, sometimes more than double, sometimes only one and a half times as high.<ref name="tws2MayY211">{{cite news|url=https://www.usnews.com/education/blogs/the-college-solution/2011/05/31/dont-believe-a-college-sticker-price|title=Don't Believe a College Sticker Price|author=Lynn O'Shaughnessy|date=May 31, 2011|newspaper=U.S. News & World Report|access-date=May 25, 2012}}</ref><ref name=tws2MayY112>{{cite news
       |title= The Real Price Of College
       |newspaper= NPR
       |date= May 11, 2012
       |url= https://www.npr.org/blogs/money/2012/05/11/152511771/the-real-price-of-college
       |access-date= May 25, 2012
      }}</ref><ref name=tws2MayY213/><ref name=tws2MayY115>{{cite news
       |author= Jacob Goldstein
       |title= Average Sticker Price For Private College: $36,993 A Year
       |newspaper= NPR
       |date= October 28, 2010
       |url= https://www.npr.org/blogs/money/2010/10/27/130867761/average-cost-for-a-year-of-private-college-40-476
       |access-date= May 25, 2012
      }}</ref> Estimates are that 88%<ref name=tws2MayY211/><ref name="tws2MayY314">{{cite news|url=https://money.cnn.com/2011/10/26/pf/college/college_tuition_cost/index.htm|title=College costs climb, yet again|author=Kim Clark|date=October 29, 2011|newspaper=CNN Money |access-date=May 25, 2012|quote=While community college tuition posted a sharp 8.7% gain, it's still a bargain: only about $3,000 a year for full-time tuition.}}</ref> or 67%<ref name=tws2MayY214>{{cite news
       |author= Rebecca R. Ruiz
       |title= Only One in Three Full-Time Students Pays Full Tuition
       |newspaper= The New York Times
       |date= November 15, 2011
       |url= http://thechoice.blogs.nytimes.com/2011/11/15/economix/
       |access-date= May 25, 2012
      }}</ref> get some form of discount. The average first-year student may be paying 48% less than the sticker price.<ref name=twsNBCNews5/> Generally, the sticker-to-net price discrepancy is greater at private colleges than public universities.<ref name=tws2MayY213/>

