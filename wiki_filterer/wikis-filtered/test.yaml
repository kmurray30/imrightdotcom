      {{Use mdy dates|date=June 2017}}
      [[File:SeniorsBIA.JPG|thumb|Graduates from a high school in [[Connecticut]] in 2008]]
      '''College admissions in the United States''' is the process of applying for [[Undergraduate education|undergraduate]] study at [[College|colleges]] or [[University|universities]].<ref>{{Cite book |last1=Mamlet |first1=Robin |url=https://www.worldcat.org/title/699764835 |title=College Admission: From Application to Acceptance, Step by Step |last2=VanDeVelde |first2=Christine |date=2011 |publisher=Three Rivers Press |isbn=978-0-307-59032-9 |edition=1st |location=New York |pages=109 |oclc=699764835}}</ref> For students entering college directly after [[High school in the United States|high school]], the process typically begins in [[eleventh grade]], with most applications submitted during [[twelfth grade]].{{sfn|Mamlet|2011|p=20}} Deadlines vary, with [[Early decision|Early Decision]] or [[Early action|Early Action]] applications often due in October or November, and regular decision applications in December or January.<ref name=":2">{{Cite news |last=Marcus |first=Jeffrey |date=October 26, 2024 |title=How To Make Sense Of The College Application Process |url=https://www.forbes.com/sites/jeffreymarcus/2024/10/26/how-to-make-sense-of-the-college-application-process/ |url-status=live |archive-url=https://web.archive.org/web/20250116043710/https://www.forbes.com/sites/jeffreymarcus/2024/10/26/how-to-make-sense-of-the-college-application-process/ |archive-date=January 16, 2025 |work=[[Forbes]]}}</ref><ref>{{Cite web |last=Kulp |first=Emily |date=August 7, 2024 |title=Your College Application Timeline |url=https://admissions.unh.edu/blog/2024/08/your-college-application-timeline |url-status=live |archive-url=https://web.archive.org/web/20240908171936/https://admissions.unh.edu/blog/2024/08/your-college-application-timeline |archive-date=September 8, 2024 |website=[[University of New Hampshire]]}}</ref> Students at [[College-preparatory school|competitive high schools]] may start earlier, and adults or [[Transfer admissions in the United States|transfer]] students also apply to colleges in significant numbers.<ref name=":2" />

      Each year, millions of high school students apply to college. In 2018–19, there were approximately 3.68 million high school graduates, including 3.33 million from public schools and 0.35 million from private schools.<ref>[https://nces.ed.gov/programs/digest/d18/tables/dt18_219.10.asp "Table 219.10. High school graduates, by sex and control of school; public high school averaged freshman graduation rate (AFGR); and total graduates as a ratio of 17-year-old population: Selected years, 1869-70 through 2028-29,"] in ''Digest of Education Statistics''. Washington, D.C.: [[United States Department of Education|U.S. Department of Education.]] [https://web.archive.org/web/20241217051648/https://nces.ed.gov/programs/digest/d18/tables/dt18_219.10.asp Archived] from the original on December 17, 2024.</ref> The number of first-time freshmen entering college that fall was 2.90 million, including students at four-year public (1.29 million) and private (0.59 million) institutions, as well as two-year public (0.95 million) and private (0.05 million) colleges. First-time freshman enrollment is projected to rise to 2.96 million by 2028.<ref>"[https://nces.ed.gov/programs/digest/d18/tables/dt18_305.10.asp Table 305.10. Total fall enrollment of first-time degree/certificate-seeking students in degree-granting postsecondary institutions, by attendance status, sex of student, and level and control of institution: 1960 through 2028]" in ''Digest of Education Statistics''. Washington, D.C.: [[United States Department of Education|U.S. Department of Education]]. [https://web.archive.org/web/20241231190152/https://nces.ed.gov/programs/digest/d18/tables/dt18_305.10.asp Archived] from the original on December 31, 2024.</ref>

      Students can apply to multiple schools and file separate applications to each school. Recent developments such as electronic filing via the [[Common Application]], now used by about 800 schools and handling 25 million applications, have facilitated an increase in the number of applications per student.<ref name=":1">{{Cite web |date=Apr 9, 2019 |title=A majority of U.S. colleges admit most students who apply |url=https://www.pewresearch.org/fact-tank/2019/04/09/a-majority-of-u-s-colleges-admit-most-students-who-apply/ |access-date=Aug 30, 2019 |website=Pew Research Center}}</ref><ref>{{Cite web |title=Common App Impact |url=https://www.commonapp.org/about/common-app-impact |access-date=Aug 30, 2019 |website=Common App}}</ref> Around 80 percent of applications were submitted online in 2009.<ref name="tws2P315">{{cite news |date=October 20, 2010 |title=College Admission Trends Include Increased Reliance on Early Decision and Wait Lists, Acceptance Rates on Par Previous Year |work=States News Service |url=http://www.highbeam.com/doc/1G1-239946968.html |url-status=dead |access-date=August 31, 2012 |archive-url=https://web.archive.org/web/20150924152642/http://www.highbeam.com/doc/1G1-239946968.html |archive-date=September 24, 2015}}</ref> About a quarter of applicants apply to seven or more schools, paying an average of $40 per application.<ref name="twsMayO211">{{cite news |author=Lynn O'Shaughnessy |date=October 19, 2011 |title=Latest Trends in College Admissions: 15 Things You Should Know |newspaper=CBS News |url=https://www.cbsnews.com/news/latest-trends-in-college-admissions-15-things-you-should-know/ |access-date=May 15, 2012}}</ref> Most undergraduate institutions admit students to the entire college as "undeclared" undergraduates and not to a particular [[Academic department|department]] or [[Academic major|major]], unlike many European universities and American [[graduate schools]], although some undergraduate programs may require a separate application at some universities. Admissions to [[two-year college]]s or [[community college]]s are more simple, often requiring only a high school transcript and in some cases, minimum test score.

      Recent trends in college admissions include increased numbers of applications, increased interest by students in foreign countries in applying to American universities,<ref name="tws3JanN111">{{cite news |author=Graeme Paton |date=June 6, 2012 |title=British university 'malaise' forcing bright students to US: Growing numbers of bright teenagers are rejecting British universities in favour of those in the United States amid claims they no longer represent value for money, a leading headmaster has warned. |newspaper=The Telegraph |location=London |url=https://www.telegraph.co.uk/education/educationnews/9306485/British-university-malaise-forcing-bright-students-to-US.html |access-date=January 14, 2013 |quote=the proportion of students taking the US college entrance exam in Britain increased by a third last year compared}}</ref> more students applying by an early method,<ref name="tws2P315" /> applications submitted by Internet-based methods including the Common Application and [[Coalition for College]], increased use of consultants, guidebooks, and rankings, and increased use by colleges of [[wait list|waitlists]].<ref name="tws2P315" /> In the early 2000s, there was an increase in media attention focused on the fairness and equity in the college admission process.{{Citation needed|date=July 2025|reason=Previously cited source - https://www.mychesco.com/a/news/regional/advocating-for-a-personal-touch-in-college-admissions/ - is of questionable reliability}} The increase of highly sophisticated software platforms, artificial intelligence and enrollment modeling that maximizes tuition revenue has challenged previously held assumptions about exactly how the applicant selection process works.  These trends have made college admissions a very competitive process, and a stressful one for student, parents and college counselors alike, while colleges are competing for higher rankings, lower admission rates and higher [[Yield (college admissions)|yield rates]] to boost their prestige and desirability. Admission to U.S. colleges in the aggregate level has become more competitive, however, most colleges admit a majority of those who apply. The selectivity and extreme competition has been very focused in a handful of the most selective colleges.<ref name=":1" /> 
      ==Participants==
      [[File:ART CLASS STUDENTS AT CATHEDRAL SENIOR HIGH SCHOOL IN NEW ULM, MINNESOTA. THE TOWN IS A COUNTY SEAT TRADING CENTER OF... - NARA - 558216.jpg|thumb|High school art students in [[Minnesota]]]]

      ===Students===
      Applying to colleges can be stressful. The outcome of the admission process may affect a student's life and career trajectory considerably. Entrance into top colleges is increasingly competitive,<ref name=twsMayO111>{{cite news |author= Valerie Strauss
       |title= Some 2012 college admissions rates hit new lows
       |newspaper= Washington Post
       |date= April 4, 2012
       |url= https://www.washingtonpost.com/blogs/answer-sheet/post/some-2012-college-admissions-rates-hit-new-lows/2012/04/03/gIQA5ElIuS_blog.html
       |access-date= May 15, 2012
      }}</ref><ref name=twsL24>{{cite news
       |author= Steve Cohen
       |title= Top 10 myths of college admissions
       |newspaper= The Washington Post
       |date= September 23, 2011
       |url= https://www.washingtonpost.com/blogs/answer-sheet/post/top-10-myths-of-college-admissions/2011/09/22/gIQAEn8XoK_blog.html
       |access-date= December 12, 2011
      }}</ref><ref name=twsL25>{{cite magazine
       |author= Andrew J. Rotherham
       |title= Five Biggest Myths About College Admissions
       |magazine= [[Time (magazine)|Time]]
       |date= May 5, 2011
       |url= http://www.time.com/time/nation/article/0,8599,2069625,00.html
       |archive-url= https://web.archive.org/web/20110507022553/http://www.time.com/time/nation/article/0,8599,2069625,00.html
       |url-status= dead
       |archive-date= May 7, 2011
       |access-date= December 12, 2011
      }}</ref> and many students feel immense pressure during their high school years.<ref name=twsBBC>Anthony Zurcher, July 25, 2014, BBC News, [https://www.bbc.com/news/blogs-echochambers-28492894 Ivy League miseducation], Accessed July 26, 2014</ref>

      {{Blockquote|Private and affluent public primary education, test-prep courses, 'enrichment' programmes, volunteer service projects, international travel, music lessons, sports activities – all the high-cost building blocks of the perfect college application – put crushing pressure on the upper middle class and their offspring.|Yale professor [[William Deresiewicz]], quoted in [[BBC News]] about his article in ''[[The New Republic]]'', 2014<ref name=twsBBC />}}

      ===Parents===
      The college applications process can be stressful for parents of teenagers, according to journalist [[Andrew Ferguson (journalist)|Andrew Ferguson]], since it exposes "our vanities, our social ambitions and class insecurities, and most profoundly our love and hopes for our children".<ref name=twsMayO411>{{cite news
       |author= Dwight Garner
       |title= Application Adventure: A Dad's College Essay
       |newspaper= The New York Times
       |date= March 3, 2011
       |url= https://www.nytimes.com/2011/03/04/books/04book.html
       |access-date= May 15, 2012
      }}</ref>

      ===High school counselors===
      [[File:Summit High School Presentation.jpg|thumb|alt=Woman pointing to a Power Point presentation.|High school advisors can help parents understand aspects of the college admissions process.]]

      Some high schools have one or more teachers experienced in offering counseling to college-bound students in their junior and senior years.{{sfn|Mamlet|2011|p=27}} Parents often meet with the [[school counselor]] during the process together with the student.{{sfn|Mamlet|2011|p=32}} Advisors recommend that students get to know their school counselor.{{sfn|Mamlet|2011|p=28}} The counselor usually works in conjunction with the guidance department which assists students in planning their high school academic path.<ref>{{Cite web |last=JP |date=2022-10-05 |title=A National Look at the High School Counseling Office: What is it Doing and What Role Can it Play in Facilitating Students' Paths to College? |url=https://www.nacacnet.org/a-national-look-at-the-high-school-counseling-office/ |access-date=2025-07-02 |website=National Association for College Admission Counseling (NACAC) |language=en-US}}</ref>

      School counselors are in contact with colleges year after year and can be helpful in suggesting suitable colleges for a student. Mamlet and VanDeVelde suggest that it is improper for an admissions counselor to tamper with a student's "authentic self".{{sfn|Mamlet|2011|p=35}} According to their view, ideal counselors have experience with college admissions, meet regularly with college admissions officers, and belong to professional organizations.{{sfn|Mamlet|2011|pp=38–39}} Counselors do not complete interviews, write essays, or arrange college visits.{{sfn|Mamlet|2011|p=30}} Most counselors have responsibility for helping many students and, as a result, it is difficult for them to provide individualized help to a particular student; one estimate was that the average ratio for all high schools of students to counselors was 460 to 1.<ref name="twsMayO211" /> Only about a quarter of public high schools have a counselor devoted to college counseling issues full-time, while almost three-quarters of private schools have a dedicated college counselor.<ref name="twsMayO211" /> Private school counselors tend to have substantially more contact with university admissions staff than public school counselors.<ref name="tws2ZG315">{{cite news|author=Kathleen Kingsbury|date=January 9, 2009|title=Dirty Secrets of College Admissions|work=The Daily Beast|url=http://www.thedailybeast.com/articles/2009/01/09/dirty-secrets-of-college-admissions.html|access-date=July 7, 2012}}</ref>

      ===Consultants===
      Fee-based consultants, some available entirely online,{{sfn|Mamlet|2011|p=45}} can be hired to help a student gain admission, although there are some free programs to help underprivileged youth learn how to fill out applications, write essays, get ready for tests, and work on interviews.{{sfn|Hernandez|2009|pp=157–158}} Generally, when hiring a college admissions consultant, parents and students try to understand the consultant's philosophy, learn what services are provided, and whether any help will be offered regarding advice about financial aid or scholarships.{{sfn|Mamlet|2011|pp=38–39}} Consultants can help a student select schools to apply to, counsel them on test taking strategies, review scores, help with essay preparation (but not writing), review applications, conduct mock interviews, provide logistical planning, and collaborate with others such as athletic coaches.{{sfn|Mamlet|2011|pp=34–35}} Consultants try to keep a low profile; however, one admissions dean explained that she can "sniff out when there has been some adult involved in the process", and admissions personnel may detect varying quality regarding writing samples when one part of an application is polished, while other parts are less polished.{{sfn|Mamlet|2011|p=42}}<ref>quoting Jennifer Delahunty, dean of Admissions and Financial Aid at Kenyon College</ref> Assistance by consultants or other adults can go to extremes, particularly with hard-to-check variables such as the college essays; according to one view, [[plagiarism]] on [[admissions essay]]s has been a "serious problem", particularly on applications to private universities and colleges.<ref name="twsL22">{{cite news|author=Eyder Peralta|date=September 21, 2011|title=Survey: Universities Increasingly Admitting Students Based On Wealth|website=NPR|url=https://www.npr.org/blogs/thetwo-way/2011/09/21/140681011/survey-universities-increasingly-admitting-students-based-on-wealth|access-date=December 12, 2011}}</ref> Another risk in hiring a consultant is ''over-packaging'': the applicant appears so smooth and perfect that admissions officers suspect the person is not real but a marketing creation.{{sfn|Mamlet|2011|p=40}}

      ===College admissions staff===
      [[File:Table and banner at college admissions presentation.jpg|thumb|Elite and other universities send admissions officers to high schools and college fairs to encourage high school students to apply. While the chance of admission to highly selective colleges is typically under 10%, increased numbers of applications helps maintain and improve colleges' rankings.]]

      A typical admission staff at a college includes a dean or vice president for admission or enrollment management, middle-level managers or assistant directors, admission officers, and administrative support staff.<ref name=tws3JanN113/> The chief enrollment management officer is sometimes the highest-paid position in the department, earning $121,000 on average in 2010, while admissions officers average only $35,000, according to one estimate.<ref name=tws3JanN113/><ref name=tws3JanN214/> Admissions officers tend to be in the 30-to-40 age demographic.<ref name=tws3JanN212>{{cite news
       |author= Kelly Truong |title= Admission Officials' Tweets Fall on Deaf Ears |newspaper= The Chronicle of Higher Education
       |quote= but college admissions officers typically fall into the 30-to-40 age demographic
       |date= July 1, 2010 |url= http://chronicle.com/blogs/wiredcampus/admission-officials-tweets-fall-on-deaf-ears/25254
       |access-date= January 14, 2013}}</ref> They are chosen for their experience in admissions, aptitude for statistics and data analysis, experience in administration and marketing and public relations.<ref name=tws3JanN113>{{cite news
       |author1=Melissa E. Clinedinst |author2=Sarah F. Hurley |author3=David A. Hawkins |title= 2011 State of College Admissions
       |newspaper= National Association for College Admission Counseling (NACAC) |quote= Previous admission experience&nbsp;... statistics/data analysis&nbsp;... higher education administration&nbsp;... marketing/public relations
       |year= 2011  |url= http://www.nacacnet.org/research/PublicationsResources/Marketplace/research/Pages/StateofCollegeAdmission.aspx
       |access-date= January 14, 2013
      }}</ref> They serve dual roles as counselors and recruiters, and do not see themselves as [[Marketing|marketers]] or salespeople, according to one view.<ref name=tws3JanN214>{{cite news
       |author= Eric Hoover
       |title= On 'Finite' Recruitment
       |newspaper= The Chronicle of Higher Education
       |quote= They are counselors, but also recruiters. They use marketing techniques, but many don't like to use the 'm word.'
       |date= August 4, 2010
       |url= http://chronicle.com/blogs/headcount/on-finite-recruitment/26001
       |access-date= January 14, 2013
      }}</ref> They are evaluated on how well they "represent their college, manage their office, recruit staff members, and work with other administrators".<ref name=tws3JanN214/> Michele Hernandez suggested there were basically two types of officers: a first group of personable, sharp, people-oriented go-getter types who were often recent college grads; a second group was somewhat out-of-touch "lifers" who often did not graduate from a highly selective college.{{sfn|Hernandez|2009|pp=1–3}} Officers are generally paid an annual salary, although there have been reports of some recruiters paid on the basis of how many students they bring to a college, such as recruiters working abroad to recruit foreign students to U.S. universities.<ref name=tws3JanN214/>

      Many colleges and universities work hard to market themselves, trying to attract the best students and maintain a reputation for academic quality. Colleges spent an average of $585 to recruit each applicant during the 2010 year.<ref name=twsMayO211/><ref name=tws3JanN113/> There are efforts to make increased use of [[social media]] sites such as [[Facebook]] to promote their colleges.<ref name=tws3JanN213>{{cite news
       |author= Eric Hoover
       |title= A 'Sea Change' in Admissions
       |newspaper= The Chronicle of Higher Education
       |quote= rising costs&nbsp;... impact of the web&nbsp;... social media such as Facebook or YouTube that admissions offices need to master.
       |date= June 29, 2011
       |url= http://chronicle.com/blogs/headcount/a-sea-change-in-admissions/28421
       |access-date= January 14, 2013
      }}</ref> Marketing brochures and other promotional mailings often arrive daily in the hope of persuading high school students to apply to a college. According to Joanne Levy-Prewitt, colleges send "view books" not because they intend to admit them, but "because they want multitudes of students to apply" to improve the college's selectivity and to make sure that they have as many well-qualified applicants as possible from whom to choose the strongest class.<ref name=tws2T22>{{cite news |author= Joanne Levy-Prewitt |title= Juniors should be wary of slick college admission come-ons |work= The Record (Bergen County, NJ)  |quote=If you are a junior in high school, this winter or spring you are very likely to be inundated with glossy view books and slick brochures |date= December 30, 2006 |url= http://www.highbeam.com/doc/1P1-132960540.html |archive-url= https://web.archive.org/web/20150329064823/http://www.highbeam.com/doc/1P1-132960540.html |url-status= dead |archive-date= March 29, 2015 |access-date= August 20, 2012}}</ref> Colleges get access to names and addresses after students give permission to them after taking the [[PSAT/NMSQT|PSAT]] or [[SAT]] exams.<ref name=tws2T22/>

      ===Information sources===
      ''[[U.S. News & World Report]]'' compiles a directory of colleges and publishes rankings of them, although the rankings are controversial.<ref name=twsL18>{{cite news |author= Jacques Steinberg |title= 'Best Colleges'? Counselors Beg to Differ With U.S. News |newspaper= The New York Times |date= May 19, 2011 |url= http://thechoice.blogs.nytimes.com/2011/05/19/nacac-on-usnews/ |access-date= December 12, 2011}}</ref> Other sources rank colleges according to various measures, sell guidebooks, and use their rankings as an entry into consulting services. [[College Board]] launched a website called BigFuture in 2012 with tools to assist in the admissions process.<ref name=twsMay2Q934>{{cite news
       |author= Tanya Caldwell
       |title= The Start of BigFuture, a New College Planning Web Site
       |newspaper= The New York Times
       |date= March 26, 2012
       |url= http://thechoice.blogs.nytimes.com/2012/03/26/college-board-bigfuture-web-site/
       |access-date= May 17, 2012
      }}</ref>

      ==Planning==
      International students may need to take tests showing English-language proficiency such as the [[TOEFL]], [[IELTS]], or [[Pearson Test of English Academic|PTE Academic]].<ref name=twsMayO214/> The twelfth grade is when applications are submitted.

      ==Selection of colleges==

      ===Rankings===
      {{Main|College and university rankings in the United States}}
      {{U.S. News top 10|caption=The top 10 national universities (red{{nbsp}}[[File:Red pog.svg|8px|link=|alt=]]) and liberal arts colleges (blue{{nbsp}}[[File:Blue pog.svg|8px|link=|alt=]]) in the {{U.S. News top 10/year}} [[U.S. News & World Report Best Colleges Ranking|''U.S. News'' rankings]] shows many located in the [[Northeastern United States|Northeast]]. The rankings have generated much controversy.}}

      There are many [[Rankings of universities in the United States|college and university rankings]], including those by ''[[U.S. News & World Report]]'',<ref>{{cite web|url=http://colleges.usnews.rankingsandreviews.com/college|title=U.S. News & World Report rankings|work=U.S. News & World Report|access-date=September 29, 2014}}</ref> ''[[Business Insider]]'',<ref>{{cite web |url=http://www.businessinsider.com/best-colleges-in-the-us-2014-9?op=1 |title=The 50 Best Colleges in America|website=[[Business Insider]]}}</ref> ''[[Money (magazine)|Money]]'',<ref>{{cite magazine|url=https://money.com/best-colleges/ |title=Money's Best Colleges |magazine=[[Time (magazine)|Time]] |access-date=July 31, 2015}}</ref> ''[[Washington Monthly]]'',<ref>{{cite web|url=http://www.washingtonmonthly.com/features/2006/0609.libarts.html|title=Washington Monthly's College Rankings|access-date=September 29, 2014|url-status=dead|archive-url=https://web.archive.org/web/20141107154840/http://www.washingtonmonthly.com/features/2006/0609.libarts.html|archive-date=November 7, 2014|df=mdy-all}}</ref> and ''[[Forbes]]''.<ref>{{cite web|url=https://www.forbes.com/top-colleges/list/|title=Forbes America's Top Colleges Ranking|website=[[Forbes]]|access-date=July 20, 2015}}</ref>

      Rankings have been the subject of much [[Criticism of college and university rankings (North America)|criticism]]. Since much of the data is provided by colleges themselves, schools can manipulate the rankings to enhance prestige, such as [[Claremont McKenna College|Claremont McKenna]] misreporting average SAT statistics,<ref name=twsMayO213>{{cite news
       |author= Tanya Caldwell
       |title= Rankings Did Not Motivate College Official Who Falsified SAT Scores, Report Finds
       |newspaper= The New York Times
       |date= April 18, 2012
       |url= http://thechoice.blogs.nytimes.com/2012/04/18/claremont-mckenna-official-who-falisified-sat-scores-was-not-motivated-by-rankings-report-finds/
       |access-date= May 15, 2012
      }}</ref> and [[Emory University]] misreporting student data for "more than a decade",<ref name="tws2T44">{{cite news
       |author= Justin Pope
       |title= Emory University Sent False Data To Rankings Groups For More Than A Decade: Report
       |work= Huffington Post
       |quote=Prestigious Emory University intentionally misreported student data to rankings magazines for more than a decade
       |date= August 17, 2012
       |url= https://www.huffingtonpost.com/2012/08/20/emory-university-sent-fal_n_1810287.html
       |access-date= August 20, 2012
      }}</ref> as well as reports of false data from the [[United States Naval Academy]] and [[Baylor University]].<ref name=twsSepN2111>{{cite news
       |author= Lynn O'Shaughnessy
       |title= How U.S. News' College Rankings Can Hurt You
       |newspaper= The College Solution
       |quote= One of the perverse aspects about the rankings is that turning out thoughtful, articulate young men and women, who can write cogently and think critically won't budge a school's ranking up even one spot.
       |date= September 12, 2012
       |url= http://www.thecollegesolution.com/how-u-s-news-college-rankings-hurt-you
       |access-date= September 14, 2012
      }}</ref> There is hypocrisy surrounding rankings: some colleges pretend to loathe the guidebooks that rank them, yet if they get a good write-up, they "wave it around like a bride's garter belt".<ref name=twsMayO411 />

      The choices made by colleges to boost their rankings have been criticized as destructive.<ref name="tws2Z211">{{cite news|url=http://www.thecollegesolution.com/the-realities-of-merit-scholarships|title=The Realities of Merit Scholarships|author=Lynn O'Shaughnessy|date=May 3, 2012|work=The College Solution|access-date=June 26, 2012}}</ref> Rankings may not take a college's affordability into account,<ref name="tws2T35">{{cite news
       |author= Lynn O'Shaughnessy
       |title= The Real Cost of Attending an Expensive East Coast University
       |work= The College Solution
       |quote= Rankings Perversion –&nbsp;... US News & World Report's college rankings doesn't&nbsp;... bestow demerits for being unaffordable.
       |date= March 10, 2011
       |url= http://www.thecollegesolution.com/the-real-cost-of-attending-an-expensive-east-coast-university
       |access-date= August 20, 2012
      }}</ref> factor in the average student indebtedness after college, or measure how well colleges educate their students.<ref name="twsSepN2111" /> Rankings have been accused of tuning their algorithms to entrench the reputations of a handful of schools while failing to measure how much students learn.<ref name="tws3JanK11">{{cite news|url=http://www.washingtonmonthly.com/features/2000/0009.thompson.html|title=Playing With Numbers: How U.S. News mismeasures higher education and what we can do about it|author=Nicholas Thompson|date=September 2000|newspaper=Washington Monthly|access-date=January 11, 2013|url-status=dead|archive-url=https://web.archive.org/web/20130114232520/http://www.washingtonmonthly.com/features/2000/0009.thompson.html|archive-date=January 14, 2013|quote=U.S. News rankings don't measure how much students learn;|df=mdy-all}}</ref> Some admission counselors maintain that rankings are poor predictors of a college's overall quality.<ref name="tws2T27">{{cite news
       |title="Best For Whom?": College Admission Counselors Challenge Key Assumptions About College Rankings
       |work= States News Service 
       |quote=The annual rankings of undergraduate colleges and universities by U.S. News and World Report generate negative opinions among professionals who work most closely with students and families
       |date= May 19, 2011
       |url= http://www.highbeam.com/doc/1G1-256790465.html
       |archive-url= https://web.archive.org/web/20160413175648/https://www.highbeam.com/doc/1G1-256790465.html
       |url-status= dead
       |archive-date= April 13, 2016
       |access-date= August 20, 2012
      }}</ref>

      In 2007, members of the [[Annapolis Group]] discussed [[Criticism of college and university rankings (2007 United States)#Presidents Letter|a letter to college presidents]] asking them not to participate in the ''[[U.S. News & World Report]]'' "reputation survey".<ref>Note: this "reputation survey" makes up 25% of the ranking.</ref> A majority of the approximately 80 presidents at the meeting agreed not to participate,<ref>{{cite web | first = Scott | last = Jaschik | title = More Momentum Against 'U.S. News' | website = [[Inside Higher Ed]] | date = June 20, 2007 | url = http://www.insidehighered.com/news/2007/06/20/usnews | access-date = June 20, 2007 | archive-date = April 12, 2021 | archive-url = https://web.archive.org/web/20210412032838/https://www.insidehighered.com/news/2007/06/20/usnews | url-status = dead }}</ref> although the statements were not binding.<ref name="collegenews.org">{{cite web|title=ANNAPOLIS GROUP STATEMENT ON RANKINGS AND RATINGS |publisher=[[Annapolis Group]] |date=June 19, 2007 |url=http://www.collegenews.org/x7131.xml |url-status=dead |archive-url=https://web.archive.org/web/20070626055807/http://www.collegenews.org/x7131.xml |archive-date=June 26, 2007 }}</ref> Members pledged to develop alternative web-based information formats<ref name="collegenews.org" /> in conjunction with several collegiate associations.<ref>Note: associations include the '' [[National Association of Independent Colleges and Universities]]'' and the ''[[Council of Independent Colleges]].''</ref> ''[[U.S. News & World Report]]'' responded that their peer assessment survey helps to measure a college's "intangibles" such as the ability of a college's reputation to help a graduate win a first job or entrance into graduate school.<ref name="usnews.com">{{cite magazine| first =Robert| last =Morse| title =About the Annapolis Group's Statement| magazine =[[U.S. News & World Report]]| date =June 22, 2007| url =https://www.usnews.com/blogs/college-rankings-blog/2007/6/22/about-the-annapolis-groups-statement.html#read_more| url-status =dead| archive-url =https://web.archive.org/web/20070702061309/http://www.usnews.com/blogs/college-rankings-blog/2007/6/22/about-the-annapolis-groups-statement.html#read_more| archive-date =July 2, 2007| df =mdy-all}}</ref>

