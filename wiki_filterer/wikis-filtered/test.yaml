      === Children ===
      {{See also|Impact of the COVID-19 pandemic on children}}
      While very young children have experienced lower rates of infection, older children have a rate of infection that is similar to the population as a whole.<ref>{{#invoke:Cite|web|title=COVID-19 in children and the role of school settings in transmission – first update |url=https://www.ecdc.europa.eu/en/publications-data/children-and-school-settings-covid-19-transmission |website=European Centre for Disease Prevention and Control |access-date=6 April 2021 |date=23 December 2020}}</ref><ref>{{#invoke:Cite|web|title=Estimated Disease Burden of COVID-19 |url=https://www.cdc.gov/coronavirus/2019-ncov/cases-updates/burden.html |website=U.S. [[Centers for Disease Control and Prevention]] (CDC) |access-date=6 April 2021 |date=11 February 2020}}</ref> Children are likely to have milder symptoms and are at lower risk of severe disease than adults.<ref name="Reardon">{{#invoke:Cite|journal | vauthors = Reardon S |title=Why don't kids tend to get as sick from Covid-19? |journal=[[Knowable Magazine]] |date=2 September 2021 |doi=10.1146/knowable-090121-1 |s2cid=239653475 |url=https://knowablemagazine.org/article/health-disease/2021/why-dont-kids-tend-get-sick-covid19 |access-date=7 September 2021}}</ref> The CDC reports that in the US roughly a third of hospitalised children were admitted to the ICU,<ref>{{#invoke:Cite|web|title=Information for Pediatric Healthcare Providers |url=https://www.cdc.gov/coronavirus/2019-ncov/hcp/pediatric-hcp.html |website=U.S. [[Centers for Disease Control and Prevention]] (CDC) |access-date=6 April 2021 |date=11 February 2020}}</ref> while a European multinational study of hospitalised children from June 2020, found that about 8% of children admitted to a hospital needed intensive care.<ref>{{#invoke:Cite|journal | vauthors = Götzinger F, Santiago-García B, Noguera-Julián A, Lanaspa M, Lancella L, Calò Carducci FI, Gabrovska N, Velizarova S, Prunk P, Osterman V, Krivec U, Lo Vecchio A, Shingadia D, Soriano-Arandes A, Melendo S, Lanari M, Pierantoni L, Wagner N, L'Huillier AG, Heininger U, Ritz N, Bandi S, Krajcar N, Roglić S, Santos M, Christiaens C, Creuven M, Buonsenso D, Welch SB, Bogyi M, Brinkmann F, Tebruegge M | title = COVID-19 in children and adolescents in Europe: a multinational, multicentre cohort study | journal = The Lancet. Child & Adolescent Health | volume = 4 | issue = 9 | pages = 653–661 | date = September 2020 | pmid = 32593339 | pmc = 7316447 | doi = 10.1016/S2352-4642(20)30177-2 }}</ref> Four of the 582 children (0.7%) in the European study died, but the actual mortality rate may be "substantially lower" since milder cases that did not seek medical help were not included in the study.<ref>{{#invoke:Cite|journal | vauthors = Fang L, Karakiulakis G, Roth M | title = Are patients with hypertension and diabetes mellitus at increased risk for COVID-19 infection? | journal = The Lancet. Respiratory Medicine | volume = 8 | issue = 4 | page = e21 | date = April 2020 | pmid = 32171062 | pmc = 7118626 | doi = 10.1016/S0140-6736(20)30311-1 }}</ref><ref name="CDC 2020children">{{#invoke:Cite|web|url=https://www.cdc.gov/coronavirus/2019-ncov/specific-groups/children-faq.html|title=Coronavirus Disease 2019 (COVID-19)|date=11 February 2020|website=U.S. [[Centers for Disease Control and Prevention]] (CDC) |access-date=2 March 2020|archive-url=https://web.archive.org/web/20200302064104/https://www.cdc.gov/coronavirus/2019-ncov/specific-groups/children-faq.html|archive-date=2 March 2020|url-status=live}}</ref>

      === Long-term effects ===
      {{Further|Long COVID}}
      Around 10% to 30% of non-hospitalised people with COVID-19 go on to develop [[long COVID]]. For those that do need hospitalisation, the incidence of long-term effects is over 50%.<ref name="davis">{{#invoke:Cite|journal |vauthors=Davis HE, McCorkell L, Vogel JM, Topol EJ |date=March 2023 |title=Long COVID: major findings, mechanisms and recommendations |journal=Nature Reviews. Microbiology |volume=21 |issue=3 |pages=133–146 |doi=10.1038/s41579-022-00846-2 |pmc=9839201 |pmid=36639608}}</ref> Long COVID is an often severe multisystem disease with a large set of symptoms. Common symptoms are [[fatigue]], [[post-exertional malaise]], [[cognitive impairment|cognitive issues]], [[shortness of breath]] and pain. There are likely various, possibly coinciding, causes.<ref name="davis" /> Organ damage from the acute infection can explain a part of the symptoms, but long COVID is also observed in people where organ damage seems to be absent.<ref name="pmid35594336">{{#invoke:Cite|journal |vauthors=Castanares-Zapatero D, Chalon P, Kohn L, Dauvrin M, Detollenaere J, Maertens de Noordhout C, Primus-de Jong C, Cleemput I, Van den Heede K |date=December 2022 |title=Pathophysiology and mechanism of long COVID: a comprehensive review |url= |journal=Annals of Medicine |volume=54 |issue=1 |pages=1473–1487 |doi=10.1080/07853890.2022.2076901 |pmc=9132392 |pmid=35594336}}</ref>

      By a variety of mechanisms, the lungs are the organs most affected in COVID{{nbhyph}}19.<ref name="Torres">{{#invoke:Cite|journal | vauthors = Torres-Castro R, Vasconcello-Castillo L, Alsina-Restoy X, Solis-Navarro L, Burgos F, Puppo H, Vilaró J | title = Respiratory function in patients post-infection by COVID-19: a systematic review and meta-analysis | journal = Pulmonology | date = November 2020 | volume = 27 | issue = 4 | pages = 328–337 | pmid = 33262076 | pmc = 7687368 | doi = 10.1016/j.pulmoe.2020.10.013 | publisher = Elsevier BV | s2cid = 227162748 }}</ref> In people requiring hospital admission, up to 98% of CT scans performed show lung abnormalities after 28 days of illness even if they had clinically improved.<ref>{{#invoke:Cite|journal | vauthors = Shaw B, Daskareh M, Gholamrezanezhad A | title = The lingering manifestations of COVID-19 during and after convalescence: update on long-term pulmonary consequences of coronavirus disease 2019 (COVID-19) | journal = La Radiologia Medica | volume = 126 | issue = 1 | pages = 40–46 | date = January 2021 | pmid = 33006087 | pmc = 7529085 | doi = 10.1007/s11547-020-01295-8 }}</ref> People with advanced age, severe disease, prolonged ICU stays, or who smoke are more likely to have long-lasting effects, including pulmonary fibrosis.<ref name="Rai">{{#invoke:Cite|journal | vauthors = Zhao YM, Shang YM, Song WB, Li QQ, Xie H, Xu QF, Jia JL, Li LM, Mao HL, Zhou XM, Luo H, Gao YF, Xu AG | title = Follow-up study of the pulmonary function and related physiological characteristics of COVID-19 survivors three months after recovery | journal = eClinicalMedicine | volume = 25 | page = 100463 | date = August 2020 | pmc = 7654356 | doi = 10.1016/j.ijtb.2020.11.003 | pmid = 32838236 }}</ref> Overall, approximately one-third of those investigated after four weeks will have findings of [[pulmonary fibrosis]] or reduced lung function as measured by [[DLCO]], even in asymptomatic people, but with the suggestion of continuing improvement with the passing of more time.<ref name="Torres" /> After severe disease, lung function can take anywhere from three months to a year or more to return to previous levels.<ref>{{#invoke:Cite|news|title=COVID-19 Lung Damage |url=https://www.hopkinsmedicine.org/health/conditions-and-diseases/coronavirus/what-coronavirus-does-to-the-lungs |publisher=Johns Hopkins Medicine |access-date=21 May 2022 |date=28 February 2022}}</ref>

      The risks of [[cognitive deficit]], [[dementia]], psychotic disorders, and [[epilepsy]] or seizures persists at an increased level two years after infection.<ref>{{#invoke:Cite|journal |vauthors=Taquet M, Sillett R, Zhu L, Mendel J, Camplisson I, Dercon Q, Harrison PJ |date=August 2022 |title=Neurological and psychiatric risk trajectories after SARS-CoV-2 infection: an analysis of 2-year retrospective cohort studies including 1 284 437 patients |journal=The Lancet Psychiatry |doi=10.1016/S2215-0366(22)00260-7 |pmid=35987197 |pmc=9385200 |s2cid=251626731 |issn=2215-0366 |volume=9 |issue=10 |pages=815–827}}</ref>

