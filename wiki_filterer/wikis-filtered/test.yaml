      ==Reception==
      {{Further|Programme for International Student Assessment (2000 to 2012)}}

      ===China===
      China's participation in the 2012 test was limited to [[Shanghai]], [[Hong Kong]], and [[Macau]] as separate entities. In 2012, Shanghai participated for the second time, again topping the rankings in all three subjects, as well as improving scores in the subjects compared to the 2009 tests. Shanghai's score of 613 in mathematics was 113 points above the average score, putting the performance of Shanghai pupils about 3 school years ahead of pupils in average countries. Educational experts debated to what degree this result reflected the quality of the [[Education in China|general educational system in China]], pointing out that Shanghai has greater wealth and better-paid teachers than the rest of China.<ref>{{cite news|first=Tom|last=Phillips|date=3 December 2013|url=https://www.telegraph.co.uk/education/10490225/OECD-education-report-Shanghais-formula-is-world-beating.html|title=OECD education report: Shanghai's formula is world-beating|newspaper=[[Telegraph.co.uk|The Telegraph]]|access-date=8 December 2013}}</ref> Hong Kong placed second in reading and science and third in maths.

      [[Andreas Schleicher]], PISA division head and co-ordinator, stated that PISA tests administered in rural China have produced some results approaching the OECD average. Citing further as-yet-unpublished OECD research, he said, "We have actually done Pisa in 12 of the provinces in China. Even in some of the very poor areas you get performance close to the OECD average."<ref name="ft-1">{{citation|last=Cook|first=Chris|title=Shanghai tops global state school rankings|date=7 December 2010|url=https://www.ft.com/content/20770bf6-01e7-11e0-b66c-00144feabdc0|work=[[Financial Times]]|access-date=28 June 2012}}</ref> Schleicher believes that China has also expanded school access and has moved away from learning by rote,<ref>{{citation|last=Mance|first=Henry|title=Why are Chinese schoolkids so good?|date=7 December 2010|url=http://blogs.ft.com/beyond-brics/2010/12/07/why-are-chinese-schoolkids-so-good/|work=[[Financial Times]]|access-date=28 June 2012|archive-url=https://web.archive.org/web/20101208231832/http://blogs.ft.com/beyond-brics/2010/12/07/why-are-chinese-schoolkids-so-good/|archive-date=8 December 2010|url-status=dead}}</ref> performing well in both rote-based and broader assessments.<ref name="ft-1" />

      In 2018 the Chinese provinces that participated were [[Beijing]], [[Shanghai]], [[Jiangsu]] and [[Zhejiang]]. In 2015, the participating provinces were Jiangsu, [[Guangdong]], Beijing, and Shanghai.<ref>{{cite news|url=https://www.bbc.com/news/education-28937662|title=Pisa tests to include many more Chinese pupils|first=Sean|last=Coughlan|work=BBC News|date=26 August 2014}}</ref> The 2015 Beijing-Shanghai-Jiangsu-Guangdong cohort scored a median 518 in science in 2015, while the 2012 Shanghai cohort scored a median 580.

      Critics of PISA counter that in Shanghai and other Chinese cities, most children of migrant workers can only attend city schools up to the ninth grade, and must return to their parents' hometowns for high school due to [[hukou system|hukou]] restrictions, thus skewing the composition of the city's high school students in favor of wealthier local families. A population chart of Shanghai reproduced in ''[[The New York Times]]'' shows a steep drop off in the number of 15-year-olds residing there.<ref>{{cite news|url=http://sinosphere.blogs.nytimes.com/2014/01/23/shanghai-test-scores-and-the-mystery-of-the-missing-children/|first=Helen|last=Gao|title=Shanghai Test Scores and the Mystery of the Missing Children|newspaper=New York Times|date=23 January 2014}} For Schleicher's initial response to these criticisms see his post, {{cite web|url=http://oecdeducationtoday.blogspot.com/2013/12/are-chinese-cheating-in-pisa-or-are-we.html|title=Are the Chinese Cheating in PISA Or Are We Cheating Ourselves?|website=OECD's website blog|publisher=Education Today|date=10 December 2013|archive-url=https://web.archive.org/web/20140217073353/http://oecdeducationtoday.blogspot.com/2013/12/are-chinese-cheating-in-pisa-or-are-we.html|archive-date=17 February 2014|url-status=dead}}</ref> According to Schleicher, 27% of Shanghai's 15-year-olds are excluded from its school system (and hence from testing). As a result, the percentage of Shanghai's 15-year-olds tested by PISA was 73%, lower than the 89% tested in the US.<ref>{{Cite web |url=http://news.tes.co.uk/b/news/2014/03/05/more-than-a-quarter-of-shanghai-pupils-missed-by-pisa.aspx |first=William |last=Stewart |title=More than a quarter of Shanghai pupils missed by international Pisa rankings|website=Times Educational Supplement|date=6 March 2014 |access-date=7 March 2014 |archive-url=https://web.archive.org/web/20140315122619/http://news.tes.co.uk/b/news/2014/03/05/more-than-a-quarter-of-shanghai-pupils-missed-by-pisa.aspx |archive-date=15 March 2014 |url-status=dead}}</ref> Following the 2015 testing, OECD published in-depth studies on the education systems of a selected few countries including China.<ref>{{cite web|url=http://www.oecd.org/china/Education-in-China-a-snapshot.pdf|title=Education in China. A Snapshot|year=2016|website=OECD|archive-url=https://web.archive.org/web/20161206135204/http://www.oecd.org/china/Education-in-China-a-snapshot.pdf|archive-date=6 December 2016|url-status=dead}}</ref>

      In 2014, [[Liz Truss]], then the British Parliamentary Under-Secretary of State at the [[Department for Education]], led a fact-finding visit to schools and teacher-training centres in Shanghai.<ref>{{cite news|last=Howse|first=Patrick|date=18 February 2014|title=Shanghai visit for minister to learn maths lessons|work=[[BBC News]]|url=https://www.bbc.co.uk/news/education-26228234|access-date=19 July 2014}}</ref> Britain increased exchanges with Chinese teachers and schools to find out how to improve quality. In 2014, 60 teachers from Shanghai were invited to the UK to help share their teaching methods, support pupils who are struggling, and help to train other teachers.<ref>{{Cite news|last=Coughlan|first=Sean|date=2014-03-12|title=Shanghai teachers flown in for maths|language=en-GB|work=BBC News|url=https://www.bbc.com/news/education-26533428|access-date=2020-08-11}}</ref> In 2016, Britain invited 120 Chinese teachers, planning to adopt Chinese styles of teaching in 8,000 aided schools.<ref>{{Cite news|date=20 July 2016|title=Britain invites 120 Chinese Maths teachers for aided schools|work=India Today|url=https://www.indiatoday.in/education-today/news/story/uk-maths-china-330279-2016-07-20|access-date=12 August 2020}}</ref> By 2019, approximately 5,000 of Britain's 16,000 primary schools had adopted the Shanghai's teaching methods.<ref>{{Cite web|title=Scores bolster case for Shanghai math in British schools {{!}} The Star|url=https://www.thestar.com.my/news/regional/2019/12/10/scores-bolster-case-for-shanghai-math-in-british-schools|access-date=2020-08-11|website=www.thestar.com.my|date=10 December 2019 }}</ref> The performance of British schools in PISA improved after adopting China's teaching styles.<ref>{{Cite news|last=Turner|first=Camilla|date=2019-12-03|title=Britain jumps up international maths rankings following Chinese-style teaching|language=en-GB|work=The Telegraph|url=https://www.telegraph.co.uk/news/2019/12/03/britain-jumps-international-maths-rankings-following-chinese/|access-date=2020-08-11|issn=0307-1235}}</ref><ref>{{Cite web|last=Starkey|first=Hannah|date=2019-12-05|title=UK Boost International Maths Ranking After Adopting Chinese-Style Teaching|url=https://www.trueeducationpartnerships.com/schools/uk-improves-international-maths-ranking-adopting-chinese-style-teaching/|access-date=2020-08-11|website=True Education Partnerships|language=en-GB|archive-url=https://web.archive.org/web/20200803115542/https://www.trueeducationpartnerships.com/schools/uk-improves-international-maths-ranking-adopting-chinese-style-teaching/|archive-date=3 August 2020}}</ref>

      === Finland ===
      Finland, which received several top positions in the first tests, fell in all three subjects in 2012, but remained the best performing country overall in Europe, achieving their best result in science with 545 points (5th) and worst in mathematics with 519 (12th) in which the country was outperformed by four other European countries. The drop in mathematics was 25 points since 2003, the last time mathematics was the focus of the tests. For the first time Finnish girls outperformed boys in mathematics narrowly. It was also the first time pupils in Finnish-speaking schools did not perform better than pupils in [[Swedish-speaking population of Finland|Swedish-speaking]] schools. Former minister of Education and Science [[Krista Kiuru]] expressed concern for the overall drop, as well as the fact that the number of low-performers had increased from 7% to 12%.<ref>{{cite web|url=https://www.jyu.fi/en/news/archive/2013/12/tiedote-2013-12-03-13-00-33-394036|title=PISA 2012: Proficiency of Finnish youth declining|publisher=[[University of Jyväskylä]]|language=en|access-date=9 December 2013|archive-url=https://web.archive.org/web/20131213093458/https://www.jyu.fi/en/news/archive/2013/12/tiedote-2013-12-03-13-00-33-394036|archive-date=13 December 2013|url-status=dead}}</ref>

      === India ===
      India participated in the 2009 round of testing but pulled out of the 2012 PISA testing, with the Indian government attributing its action to the unfairness of PISA testing to Indian students.<ref>{{cite web|author=Hemali Chhapia, TNN |url=http://articles.timesofindia.indiatimes.com/2012-08-03/mumbai/33019239_1_india-backs-global-stage-math-and-science |archive-url=https://web.archive.org/web/20130429183202/http://articles.timesofindia.indiatimes.com/2012-08-03/mumbai/33019239_1_india-backs-global-stage-math-and-science |url-status=dead |archive-date=29 April 2013 |work=[[The Times of India]] |title=India backs out of global education test for 15-year-olds |date=3 August 2012}}</ref> India had ranked 72nd out of 73 countries tested in 2009.<ref name=dri1>{{cite web|url=https://www.drishtiias.com/daily-news-analysis/pisa-program-for-international-student-assessment-oecd|title=PISA (Program for International Student Assessment): OECD|website=Drishti|date=1 Sep 2021}}</ref> The Indian Express reported, "The ministry (of education) has concluded that there was a socio-cultural disconnect between the questions and Indian students. The ministry will write to the OECD and drive home the need to factor in India's "socio-cultural milieu". India's participation in the next PISA cycle will hinge on this".<ref>{{cite web|url=http://www.indianexpress.com/news/poor-pisa-score-govt-blames--disconnect--with-india/996890/ |title=Poor PISA score: Govt blames 'disconnect' with India |work=The Indian Express |date=3 September 2012}}</ref> The Indian Express also noted that "Considering that over 70 nations participate in PISA, it is uncertain whether an exception would be made for India".

      India did not participate in the 2012, 2015 and 2018 PISA rounds.<ref>{{cite web|url=http://timesofindia.indiatimes.com/home/education/news/India-chickens-out-of-international-students-assessment-programme-again/articleshow/20375670.cms |title=India chickens out of international students assessment programme again |work=The Times of India |date=1 June 2013}}</ref>

      A [[Kendriya Vidyalaya Sangathan]] (KVS) committee as well as a group of secretaries on education constituted by the [[Prime Minister of India]] [[Narendra Modi]] recommended that India should participate in PISA. Accordingly, in February 2017, the [[Ministry of Human Resource Development]] under [[Prakash Javadekar]] decided to end the boycott and participate in PISA from 2020. To address the socio-cultural disconnect between the test questions and students, it was reported that the OECD will update some questions. For example, the word avocado in a question may be replaced with a more popular Indian fruit such as mango.<ref>{{cite news|title=PISA Tests: India to take part in global teen learning test in 2021|url=http://indianexpress.com/article/education/pisa-tests-india-to-take-part-in-global-teen-learning-test-in-2021-4537231/|access-date=19 May 2018|work=The Indian Express|date=22 February 2017}}</ref>

      India did not participate in the 2022 PISA rounds citing due to [[COVID-19 pandemic]] disruption.<ref>{{Cite web |date=2024-01-10 |title=India opts out of PISA 2022: Prudence or Cowardice? |url=https://www.educationworld.in/india-opts-out-of-pisa-2022-prudence-or-cowardice/ |access-date=2024-07-27 |website=EducationWorld |language=en-US}}</ref>

      ===Malaysia===
      In 2015, the results from Malaysia were found by the OECD to have not met the maximum response rate.<ref>{{cite web|url=http://www.freemalaysiatoday.com/category/nation/2016/12/08/ong-did-ministry-try-to-rig-results-for-pisa-2015-report/|title=Ong: Did ministry try to rig results for Pisa 2015 report?|date=8 December 2016}}</ref> Opposition politician [[Ong Kian Ming]] said the education ministry tried to oversample high-performing students in rich schools.<ref>{{cite web|url=http://www.malaysiakini.com/news/365674|title=Who's telling the truth about M'sia's Pisa 2015 scores?|date=9 December 2016}}</ref><ref>{{cite web|url=http://schooladvisor.my/news/malaysian-pisa-results-scrutiny-lack-evidence/|title=Malaysian PISA results under scrutiny for lack of evidence|website=School Advisor|date=8 December 2016|archive-date=2024-12-06|access-date=2025-01-07|archive-url=https://web.archive.org/web/20241206123515/https://schooladvisor.my/news/malaysian-pisa-results-scrutiny-lack-evidence|url-status=dead}}</ref>

      === Sweden ===
      Sweden's result dropped in all three subjects in the 2012 test, which was a continuation of a trend from 2006 and 2009. It saw the sharpest fall in mathematics performance with a drop in score from 509 in 2003 to 478 in 2012. The score in reading showed a drop from 516 in 2000 to 483 in 2012. The country performed below the OECD average in all three subjects.<ref>{{cite web|first=Lars|last=Näslund|date=3 December 2013|url=http://www.expressen.se/nyheter/svenska-skolan-rasar-i-stor-jamforelse/|title=Svenska skolan rasar i stor jämförelse|website=[[Expressen]]|access-date=4 December 2013|lang=sv}}</ref> The leader of the opposition, [[Swedish Social Democratic Party|Social Democrat]] [[Stefan Löfven]], described the situation as a national crisis.<ref name=sl>{{cite web|first=Jens|last=Kärrman|date=3 December 2013|url=https://www.dn.se/nyheter/sverige/lofven-om-pisa-nationell-kris/|title=Löfven om Pisa: Nationell kris|website=[[Dagens Nyheter]]|access-date=8 December 2013|lang=sv}}</ref> Along with the party's spokesperson on education, [[Ibrahim Baylan]], he pointed to the downward trend in reading as most severe.<ref name=sl/>

      In 2020, Swedish newspaper ''[[Expressen]]'' revealed that Sweden had inflated their score in PISA 2018 by not conforming to OECD standards. According to professor [[Magnus Henrekson]] a large number of foreign-born students had not been tested.<ref>{{Cite web|url=https://www.expressen.se/nyheter/qs/sveriges-pisa-framgang-bygger-pa-falska-siffror/|title=Sveriges PISA-framgång bygger på falska siffror|date=2 June 2020|lang=sv }}</ref>

      === United Kingdom ===
      In the 2012 test, as in 2009, the result was slightly above average for the United Kingdom, with the science ranking being highest (20).<ref name=adams>{{citation|first = Richard|last = Adams|date = 2013-12-03|url = https://www.theguardian.com/education/2013/dec/03/uk-students-education-oecd-pisa-report|title = UK students stuck in educational doldrums, OECD study finds|work = [[The Guardian]]|access-date = 2013-12-04}}</ref> [[England]], [[Wales]], [[Scotland]] and [[Northern Ireland]] also participated as separated entities, showing the worst result for Wales which in mathematics was 43rd of the 65 countries and economies. Minister of Education in Wales [[Huw Lewis]] expressed disappointment in the results, said that there were no "quick fixes", but hoped that several educational reforms that have been implemented in the last few years would give better results in the next round of tests.<ref>{{cite web|url=https://www.bbc.co.uk/news/uk-wales-25196974|title=Pisa ranks Wales' education the worst in the UK|website=[[BBC]]|date=3 December 2013|access-date=4 December 2013}}</ref> The United Kingdom had a greater gap between high- and low-scoring students than the average.  There was little difference between public and private schools when adjusted for [[socio-economic]] background of students. The gender difference in favour of girls was less than in most other countries, as was the difference between natives and immigrants.<ref name=adams/>

      Writing in the ''[[The Daily Telegraph|Daily Telegraph]]'', [[Ambrose Evans-Pritchard]] warned against putting too much emphasis on the UK's international ranking, arguing that an overfocus on scholarly performances in East Asia might have contributed to the area's low [[birthrate]], which he argued could harm the economic performance in the future more than a good PISA score would outweigh.<ref>{{cite web|first=Ambrose|last=Evans-Pritchard|date=3 December 2013|url=http://blogs.telegraph.co.uk/finance/ambroseevans-pritchard/100026127/oecd-educational-report-pisa-fever-is-causing-east-asias-demographic-collapse/|title=OECD educational report: Pisa fever is causing east Asia's demographic collapse|website=[[Telegraph.co.uk]]|archive-url=https://web.archive.org/web/20131203212440/http://blogs.telegraph.co.uk/finance/ambroseevans-pritchard/100026127/oecd-educational-report-pisa-fever-is-causing-east-asias-demographic-collapse/ |access-date=4 December 2013|archive-date=3 December 2013 }}</ref>

      In 2013, the ''[[Times Educational Supplement]]'' (TES) published an article, "Is PISA Fundamentally Flawed?" by William Stewart, detailing serious critiques of PISA's conceptual foundations and methods advanced by statisticians at major universities.<ref name="Stewart 2013">{{Cite web |url=http://www.tes.co.uk/article.aspx?storycode=6344672 |first=William |last=Stewart |title=Is Pisa fundamentally flawed? |website=Times Educational Supplement |date=26 July 2013 |access-date=26 July 2013 |archive-url=https://web.archive.org/web/20130823053048/http://www.tes.co.uk/article.aspx?storycode=6344672 |archive-date=23 August 2013 |url-status=dead}}</ref>

      In the article, Professor [[Harvey Goldstein]] of the [[University of Bristol]] was quoted as saying that when the OECD tries to rule out questions suspected of bias, it can have the effect of "smoothing out" key differences between countries. "That is leaving out many of the important things," he warned. "They simply don't get commented on. What you are looking at is something that happens to be common. But (is it) worth looking at? PISA results are taken at face value as providing some sort of common standard across countries. But as soon as you begin to unpick it, I think that all falls apart."

      [[Queen's University Belfast]] mathematician Dr. Hugh Morrison stated that he found the statistical model underlying PISA to contain a fundamental, insoluble mathematical error that renders Pisa rankings "valueless".<ref>{{cite web|last=Morrison|first=Hugh|url=http://www.qub.ac.uk/schools/SchoolofEducation/AboutUs/Staff/Academic/DrHughMorrison/Filestore/Filetoupload,387514,en.pdf|title=A fundamental conundrum in psychology's standard model of measurement and its consequences for PISA global rankings|year=2013|access-date=13 July 2017|url-status=dead|archive-url=https://web.archive.org/web/20130605225916/http://www.qub.ac.uk/schools/SchoolofEducation/AboutUs/Staff/Academic/DrHughMorrison/Filestore/Filetoupload,387514,en.pdf|archive-date=5 June 2013}}</ref> Goldstein remarked that Dr. Morrison's objection highlights "an important technical issue" if not a "profound conceptual error". However, Goldstein cautioned that PISA has been "used inappropriately", contending that some of the blame for this "lies with PISA itself. I think it tends to say too much for what it can do and it tends not to publicise the negative or the weaker aspects." Professors Morrison and Goldstein expressed dismay at the OECD's response to criticism. Morrison said that when he first published his criticisms of PISA in 2004 and also personally queried several of the OECD's "senior people" about them, his points were met with "absolute silence" and have yet to be addressed. "I was amazed at how unforthcoming they were," he told TES. "That makes me suspicious." "Pisa steadfastly ignored many of these issues," he says. "I am still concerned."<ref name="Stewart 2013" />

      Professor Svend Kreiner, of the [[University of Copenhagen]], agreed: "One of the problems that everybody has with PISA is that they don't want to discuss things with people criticising or asking questions concerning the results. They didn't want to talk to me at all. I am sure it is because they can't defend themselves.<ref name="Stewart 2013"/>

