      ===Vaccine mandates===
      {{further|COVID-19 vaccination mandates in the United States|Biden Administration COVID-19 action plan}}
      By August 2021, more than 800 colleges and universities, over 200 health care companies and dozens of states, local governments and school districts, had some type of vaccination requirements.<ref>[https://www.usatoday.com/story/news/health/2021/08/31/covid-vaccine-pandemic-louisiana-hospitals/5660300001/ "COVID vaccination progress: Only 1 in 5 say they won't get a jab; White House says pace of shots accelerating"]. ''USA Today''. August 31, 2021.</ref> Biden appealed to public organizations and private companies to require employees to be vaccinated, which companies are allowed to do under the protection of the U.S. [[Equal Employment Opportunity Commission]].<ref name=nbc>[https://www.nbcnews.com/politics/white-house/biden-calls-private-companies-issue-vaccine-requirements-n1277470 "Biden calls on private companies to issue vaccine requirements"]. NBC News. August 23, 2021. Retrieved June 12, 2025.</ref>

      Until August to September 2021, many companies were giving bonuses for getting vaccinated.<ref name=NPR-mandates>[https://www.npr.org/2021/08/17/1027620914/to-mandate-or-not-employers-get-urgent-about-vaccinations "Employers Want You To Get Vaccinated. This One Is Offering A $1,000 Bonus."] NPR. August 17, 2021.</ref> Nonetheless, nearly 2,000 private hospitals and health systems had previously issued vaccine mandates. Many companies outside health care did the same, such as [[United Airlines]], [[Tyson Foods]], and [[Walmart]] among them. Washington state had already required vaccines for all state employees and contractors.<ref name=NPR-mandates/> With the new Delta variant spreading infections more quickly due to its higher transmissibility, companies including Facebook, Google, and Salesforce, have already issued employee vaccine mandates.<ref>{{cite news| last=Abril | first=Danielle | title=As delta variant spreads, some companies with vaccine mandates deploy tech to verify records | newspaper=[[The Washington Post]] | date=August 19, 2021 | url=https://www.washingtonpost.com/technology/2021/08/19/employers-vaccine-mandate-status-verification/ | access-date=October 16, 2021 }}</ref>

      According to a ''[[USA Today]]'' poll from August 2021, 68% supported a business's right to refuse service to unvaccinated customers, and 62% supported employer's right to mandate vaccinations to its employees. In the same poll, 72% also felt that mandating masks was "a matter of health and safety" and should not be considered an infringement of personal liberty.<ref name=Forbes>[https://www.forbes.com/sites/edwardsegal/2021/08/23/most-americans-support-mask-and-vaccination-mandates-which-companies-will-follow-their-lead/ "Most Americans Now Support Mask And Vaccination Mandates. Which Companies Will Follow Their Lead?"]. ''Fortune''. August 23, 2021.</ref>

