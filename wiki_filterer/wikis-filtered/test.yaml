kahashi H, Fujii K, Kishi H, Kanai M, Imamura T, Yamashita T, Yatomi M, Maeno T, Hayashi S, Takahashi M, Kuramochi M, Kamimaki I, Tominaga Y, Ishii T, Utsugi M, Ono A, Tanaka T, Kashiwada T, Fujita K, Saito Y, Seike M, Watanabe H, Matsuse H, Kodaka N, Nakano C, Oshio T, Hirouchi T, Makino S, Egi M, Omae Y, Nannya Y, Ueno T, Katayama K, Ai M, Fukui Y, Kumanogoh A, Sato T, Hasegawa N, Tokunaga K, Ishii M, Koike R, Kitagawa Y, Kimura A, Imoto S, Miyano S, Ogawa S, Kanai T, Fukunaga K, Okada Y | title = DOCK2 is involved in the host genetics and biology of severe COVID-19 | journal = Nature | volume = 609 | issue = 7928 | pages = 754–760 | date = September 2022 | pmid = 35940203 | pmc = 9492544 | doi = 10.1038/s41586-022-05163-5 | bibcode = 2022Natur.609..754N }}</ref> In fact, many other genes and genetic variants have been found that determine the outcome of SARS-CoV-2 infections.<ref>{{#invoke:Cite|journal | vauthors = Kousathanas A, Pairo-Castineira E, Rawlik K, Stuckey A, Odhams CA, Walker S, Russell CD, Malinauskas T, Wu Y, Millar J, Shen X, Elliott KS, Griffiths F, Oosthuyzen W, Morrice K, Keating S, Wang B, Rhodes D, Klaric L, Zechner M, Parkinson N, Siddiq A, Goddard P, Donovan S, Maslove D, Nichol A, Semple MG, Zainy T, Maleady-Crowe F, Todd L, Salehi S, Knight J, Elgar G, Chan G, Arumugam P, Patch C, Rendon A, Bentley D, Kingsley C, Kosmicki JA, Horowitz JE, Baras A, Abecasis GR, Ferreira MA, Justice A, Mirshahi T, Oetjens M, Rader DJ, Ritchie MD, Verma A, Fowler TA, Shankar-Hari M, Summers C, Hinds C, Horby P, Ling L, McAuley D, Montgomery H, Openshaw PJ, Elliott P, Walsh T, Tenesa A, Fawkes A, Murphy L, Rowan K, Ponting CP, Vitart V, Wilson JF, Yang J, Bretherick AD, Scott RH, Hendry SC, Moutsianas L, Law A, Caulfield MJ, Baillie JK | title = Whole-genome sequencing reveals host factors underlying critical COVID-19 | journal = Nature | volume = 607 | issue = 7917 | pages = 97–103 | date = July 2022 | pmid = 35255492 | pmc = 9259496 | doi = 10.1038/s41586-022-04576-6 | bibcode = 2022Natur.607...97K }}</ref>

