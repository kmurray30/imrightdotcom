      This is a list of major sports [[scandal]]s.

      == American football scandals ==
      * [[Minnesota Vikings boat party scandal]] (2005) – a sex party involving several members of the [[Minnesota Vikings]] of the [[National Football League]] (NFL)
      * [[National Football League player conduct controversy]] (2007–present) – various off the field incidents involving [[American football]] athletes from the NFL, including [[Adam Jones (American football)|Adam "Pacman" Jones]], [[Tank Johnson|Terry "Tank" Johnson]], [[Chris Henry (wide receiver)|Chris Henry]], [[Ben Roethlisberger]], [[Ray Rice]] and [[Adrian Peterson]], who earned suspensions as a result.
      * [[2007 New England Patriots videotaping controversy]] (2007) – the [[New England Patriots]] were disciplined for videotaping the opposing team's coach's signals. Coach [[Bill Belichick]] was fined $500,000 and the New England Patriots were fined $250,000 and lost their [[2008 NFL Draft|2008 1st round draft pick]].
      * [[New Orleans Saints bounty scandal]] (2012) – the NFL discovered that the [[New Orleans Saints]] had operated a secret slush fund from [[2009 New Orleans Saints season|2009]] to [[2011 New Orleans Saints season|2011]] that paid "bounties" to defensive players for big plays during games, most controversially for injuring opponents. The scheme was allegedly organized by a number of players plus defensive coordinator [[Gregg Williams]], with the acquiescence of head coach [[Sean Payton]]. Shortly after the investigation came to light, Williams was accused of running similar schemes while he was defensive coordinator of the [[Tennessee Titans|Houston Oilers/Tennessee Titans]] and [[Washington Redskins]], as well as the head coach of the [[Buffalo Bills]]. The league suspended Williams indefinitely and Payton for one year and suspended the Saints' general manager and another assistant for parts of the [[2012 NFL season|2012 season]]. [[Jonathan Vilma]], a Saints player who had a major role in the scheme and reportedly offered a $10,000 bounty on [[Brett Favre]], was suspended for the entire season and three other players were suspended for parts of the season. However, in September 2012, an arbitrator overturned the suspensions of the players involved in the affair. Williams' suspension ultimately lasted one year.
      * [[Deflategate]] (2015) – during the [[2014–15 NFL playoffs#AFC Championship Game: New England Patriots 45.2C Indianapolis Colts 7|AFC Championship Game]], 11 of the 12 footballs under the Patriots' control during the first half were found to be inflated below the level mandated by the rulebook.<ref>{{cite web|title=11 of the 12 footballs deflated|date=21 January 2015|url=https://www.espn.com/boston/nfl/story/_/id/12202450/nfl-says-new-england-patriots-had-inflated-footballs-afc-championship-game|publisher=ESPN|access-date=18 May 2015}}</ref> The case was then closed because of the referees' failure to check the balls prior to the game. [[Tom Brady]] was suspended by the NFL for the first 4 games of the [[2016 NFL season|2016 season]].<ref>{{cite web|url=https://www.espn.com/nfl/story/_/id/12867594/punishments-handed-tom-brady-new-england-patriots-deflategate|title=NFL suspends Brady 4 games; Pats lose picks|date=11 May 2015|publisher=|access-date=26 August 2016}}</ref>

      == Association football scandals ==
      * [[1915 British football match-fixing scandal]]
      * [[1964 British football match-fixing scandal]]
      * [[Bundesliga scandal (1965)]]
      * [[1971 Bundesliga scandal]]
      * [[Totonero 1980|1980 Italian football scandal]] – a [[match fixing]] scandal in [[Football in Italy|Italian football]] involving several major teams.
      * [[1986 Totonero]]
      * [[1988 Mexico national football team scandal]]
      * [[El Maracanazo|1989 Maracanazo of the Chilean team]]
      * [[French football bribery scandal|1993 French football bribery scandal]] – a match fixing scandal involving a [[1992–93 French Division 1]] match between [[Olympique de Marseille]] and [[Valenciennes FC|Valenciennes]], in which Valenciennes players were bribed by Olympique de Marseille president [[Bernard Tapie]], through Marseille [[midfielder]] [[Jean-Jacques Eydelie]]. It is believed that Eydelie offered three Valenciennes players ([[Jorge Burruchaga]], [[Christophe Robert]] and [[Jacques Glassmann|Jacques Glassman]]) [[French franc|₣]]250,000 to "take the foot off of the gas" in a May 20 match between the sides, so that the team would be fresh to play in the [[1993 UEFA Champions League Final|Champions League final]] soon after. Marseille were subsequently stripped off the 1992–93 French Division 1 title, relegated to [[Ligue 2|Division 2]] and handed bans from all 1993 [[UEFA competitions]]. The [[French Football Federation]] also suspended Eydelie, Robert and Burruchaga, whilst Tapie was replaced as club president by [[Bernard Moreau]]. Tapie received a prison sentence of over two years, of which he served six months and received a [[French franc|₣]]20,000 fine, whilst Eydelie, Robert, Burruchaga and Marseille general manager [[Jean-Pierre Bernès]] were all given prison sentences and fined. Eydelie's prison sentence was a suspended sentence.
      * [[1994 Malaysian football scandal]]
      * [[1999 Chinese football match-fixing scandal]]
      * [[2001 Chinese football match-fixing scandal]]
      * [[2003–2009 Chinese football match-fixing scandals]]
      * [[Apito Dourado]] (2004) – a match fixing scandal in [[Football in Portugal|Portuguese football]] involving [[FC Porto]], [[Boavista F.C.|Boavista]], and [[U.D. Leiria|União de Leiria]].
      * [[Bundesliga scandal (2005)]] – a match fixing scandal in [[Football in Germany|German football]] centering on disgraced referee [[Robert Hoyzer]].
      * [[Caso Genoa|Caso Genoa (2005)]]
      * [[Brazilian football match-fixing scandal]] (2005) – a match fixing scandal involving referees in [[Football in Brazil|Brazil]].
      * [[2006 Italian football scandal|2006 Calciopoli scandal]] – a match fixing scandal in Italian football involving several major teams, including three of the country's four qualifiers to the [[2006–07 UEFA Champions League]].
      * In the [[Commonwealth of Independent States Cup]] [[2006 Commonwealth of Independent States Cup|2006]], the [[Armenia]]n champion [[FC Pyunik|Pyunik]] refused to play with an [[Azerbaijan]]i team, [[PFC Neftchi]]. The team [[FC Pyunik|Pyunik]] defeated the [[Ukraine|Ukrainian]] team [[FC Shakhtar Donetsk|Shakhtar Donetsk]] 3–1 in the quarter-final, when it already knew that in case of victory they would have to play against [[Neftçi PFK|Neftchi]]. After the match, they told the referee they would not play against an Azerbaijani team and later that evening left Moscow on an airplane. The [[Russian Football Union]] gave Shakhtar Donetsk a technical victory 3–0 so they could play in the half-final instead of Pyunik, but Shakhtar Donetsk declined the offer stating that "[W]e would really want to play in the half-final, but we don't want to get there by any other way then sport". Eventually, because no one could play against Neftchi in the half-final, Neftchi were right away promoted to the final, where they defeated the [[Lithuania]]n club [[FBK Kaunas|Kaunas]] 4–2.<ref>{{cite web|url=http://www.newsru.com/sport/19jan2006/scandal.html|title=Новости NEWSru.com :: Скандал на Кубке Содружества: чемпионы Армении отказались играть с азербайджанцами|work=newsru.com|date=19 January 2006}}</ref>
      * [[2009 European football match-fixing scandal]]
      * [[2011 Turkish sports corruption scandal]] – in July 2011, as part of a major match-fixing investigation by authorities in Turkey, nearly 60 people suspected to be involved with fixing games were detained by Istanbul Police Department Organized Crime Control Bureau and then arrested by the court. In June 2014, retrial process has started for all the convicted people.<ref>{{cite web|url=https://www.theguardian.com/football/2011/jul/07/turkey-match-fixing|title=Turkish court charges 15 more in Fenerbahce match-fixing scandal|work=The Guardian|date=7 July 2011}}</ref><ref>{{cite web|url=http://www.sabah.com.tr/Spor/Futbol/2014/06/23/mahkeme-sike-davasi-kararini-verdi|title=Şike Davası'nda yeniden yargılama kararı|date=23 June 2014|work=Sabah}}</ref>
      * [[2011–12 Italian football match-fixing scandal]]
      * [[2013 Lebanese match fixing scandal]] – in 2013, [[Lebanon|Lebanese]] footballers, [[Ramez Dayoub]] (playing for [[Selangor FA]]) and [[Mahmoud El Ali]] (playing for [[Persiba Balikpapan]]), were banned for life by the [[Fédération Libanaise de Football Association|Lebanese Football Association]] for participating in match-fixing scandals.<ref>{{cite web |url=http://www.newsreporter.in/ex-churchill-player-implicated-in-lebanon-match-fixing-76338 |title=Ex-Churchill player implicated in Lebanon match-fixing |publisher=NewsReporter.in |date=28 February 2013 |accessdate=15 June 2013 |archive-url=https://web.archive.org/web/20131219002911/http://www.newsreporter.in/ex-churchill-player-implicated-in-lebanon-match-fixing-76338 |archive-date=19 December 2013 |url-status=dead }}</ref> 22 players were investigated for this.
      * [[2013 English football match-fixing scandal]]
      * [[2015 Greek football scandal]] – it emerged on 6 April 2015, when prosecutor Aristidis Korreas' 173-page work was revealed. [[Telephone tapping]] operated by the [[National Intelligence Service (Greece)|National Intelligence Service of Greece]] has played a significant role in the case.<ref>{{cite web | url = https://www.scribd.com/doc/264541493/1-%CE%A0%CF%8C%CF%81%CE%B9%CF%83%CE%BC%CE%B1-%CE%B5%CE%B9%CF%83%CE%B1%CE%B3%CE%B3%CE%B5%CE%BB%CE%AD%CE%B1-%CE%9A%CE%BF%CF%81%CF%81%CE%AD%CE%B1-%CE%B3%CE%B9%CE%B1-%CF%84%CE%B7%CE%BD-%CE%B5%CE%B3%CE%BA%CE%BB%CE%B7%CE%BC%CE%B1%CF%84%CE%B9%CE%BA%CE%AE-%CE%BF%CF%81%CE%B3%CE%AC%CE%BD%CF%89%CF%83%CE%B7-%CF%83%CF%84%CE%BF-%CF%80%CE%BF%CE%B4%CF%8C%CF%83%CF%86%CE%B1%CE%B9%CF%81%CE%BF | script-title=el:Πόρισμα εισαγγελέα Αριστείδη Κορρέα για την ύπαρξη εγκληματικής οργάνωσης στο ποδόσφαιρο | page=12 | language = Greek | publisher = Public Prosecutor's Office of District Court Judges | date = 3 December 2014 | accessdate = 6 April 2015}}</ref> According to the prosecutor's conclusion, [[Olympiacos F.C.|Olympiakos.]] owner [[Evangelos Marinakis]] along with [[Hellenic Football Federation|Greek Football Federation]] members Theodoros Kouridis, Aristidis Stathopoulos and Georgios Sarris were suspected of directing a criminal organization since 2011. The goal behind their scheme was to "absolutely control Greek football's fate by the methods of blackmailing and fraud".<ref>{{cite web | url = https://www.scribd.com/doc/264541497/3-%CE%A0%CF%8C%CF%81%CE%B9%CF%83%CE%BC%CE%B1-%CE%B5%CE%B9%CF%83%CE%B1%CE%B3%CE%B3%CE%B5%CE%BB%CE%AD%CE%B1-%CE%9A%CE%BF%CF%81%CF%81%CE%AD%CE%B1-%CE%B3%CE%B9%CE%B1-%CF%84%CE%B7%CE%BD-%CE%B5%CE%B3%CE%BA%CE%BB%CE%B7%CE%BC%CE%B1%CF%84%CE%B9%CE%BA%CE%AE-%CE%BF%CF%81%CE%B3%CE%AC%CE%BD%CF%89%CF%83%CE%B7-%CF%83%CF%84%CE%BF-%CF%80%CE%BF%CE%B4%CF%8C%CF%83%CF%86%CE%B1%CE%B9%CF%81%CE%BF | script-title=el:Πόρισμα εισαγγελέα Αριστείδη Κορρέα για την ύπαρξη εγκληματικής οργάνωσης στο ποδόσφαιρο | page=159 | language = Greek | publisher = Public Prosecutor's Office of District Court Judges | date = 3 December 2014 | accessdate = 6 April 2015}}</ref> Referees, judges, football directors and chairmen were also involved in the scandal, but all defendants deny charges. Olympiakos were the champions of the [[Super League Greece|Greek Super League]] at the time.
      * [[2015 FIFA corruption case]]
      * [[2015 Italian football match-fixing scandal]]
      * [[United Kingdom football sexual abuse scandal#2016 and 2017 charges|2016]] [[United Kingdom football sexual abuse scandal]]
      * 2017 Rangers Tax Fraud Case. The Supreme court ruled that money paid to players, managers and directors between 2001 and 2010 was in the form of tax free loans. This totalled £47m<ref>{{Cite news|date=2017-07-05|title=HMRC wins Rangers 'big tax case' ruling|language=en-GB|work=BBC News|url=https://www.bbc.com/news/uk-scotland-40501361|access-date=2021-01-12}}</ref>
      *2018 [[Football Leaks]] - ''[[Der Spiegel]]'' and the European Investigative Collaborations (EIC) network of journalists, begun publishing various articles relateding to various dirty deals relating to various dodgy deals behind Arab oil owned football clubs [[Manchester City F.C.|Manchester City]], PSG, and Russian owned Monaco. Super League plans by current European powerhouses. Questionable dealings of football agents, Doping involving Russian and Spanish players.<ref>{{cite web |url=http://www.spiegel.de/international/topic/football_leaks/archiv.html |title=Football Leaks - SPIEGEL ONLINE |website=www.spiegel.de |url-status=dead |archive-url=https://web.archive.org/web/20181108095935/http://www.spiegel.de/international/topic/football_leaks/archiv.html |archive-date=2018-11-08}}</ref><ref>{{Cite news|last=SPIEGEL|first=Christoph Winterbach, DER|title=Warum die Uefa Manchester City bestrafen muss - DER SPIEGEL - Sport|url=https://www.spiegel.de/sport/fussball/football-leaks-warum-die-uefa-manchester-city-bestrafen-muss-a-1255882.html|access-date=2021-01-12|newspaper=Der Spiegel|date=2 March 2019|language=de}}
      </ref>
      * [[2023 Brazilian football match-fixing scandal]]
      * [[Age fraud in association football]]

