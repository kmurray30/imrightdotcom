      Systematic doping of Russian athletes has resulted in 51 Olympic medals stripped from Russia (and Russian associated teams), four times the number of the next highest, and more than 30% of the global total. Russia has the most competitors who have been caught doping at the Olympic Games in the world, with more than 150.
      The World Anti-Doping Agency (WADA) has described doping among Russian competitors as state-sponsored and systematic, with the Russian state being found to have supplied steroids and other drugs to athletes. Due to widespread violations of anti-doping regulations, including an attempt to sabotage ongoing investigations by the manipulation of computer data, WADA in 2019 banned the Russian Federation from all major sporting events, including the Olympic Games, for four years, but in 2020 the Court of Arbitration for Sport (CAS) reduced the ban period to two years following an appeal by Russia. Competitors from Russia meanwhile may take part in international competitions under a neutral flag and designation.
    source: |-
      {{Short description|none}}
      {{Use dmy dates|date= May 2020}}
      {{doping in sport sidebar}}
      Systematic [[Doping in sport|doping]] of [[Sport in Russia|Russian athletes]] has resulted in 51 [[Olympic medal]]s [[List of stripped Olympic medals|stripped]] from Russia (and Russian associated teams), four times the number of the next highest, and more than 30% of the global total.<ref>{{Cite web |date=2022-02-17 |title=In Pics {{!}} Countries that lost medals due to Olympic doping |url=https://www.deccanherald.com/world/in-pics-countries-that-lost-medals-due-to-olympic-doping-1082418-1450903 |access-date=2024-08-05 |website=[[Deccan Herald]] |language=en}}</ref> Russia has the most competitors who have been [[Doping at the Olympic Games|caught doping at the Olympic Games]] in the world, with more than 150.<ref name="WADA-191209">{{cite web |url=https://www.wada-ama.org/en/media/news/2019-12/wada-executive-committee-unanimously-endorses-four-year-period-of-non-compliance |title= WADA Executive Committee unanimously endorses four-year period of non-compliance for the Russian Anti-Doping Agency |publisher=[[World Anti-Doping Agency]] |date=9 December 2019 |url-status=live |archive-url=https://web.archive.org/web/20211221172602/https://www.wada-ama.org/en/media/news/2019-12/wada-executive-committee-unanimously-endorses-four-year-period-of-non-compliance |archive-date=21 December 2021}}</ref>

      The [[World Anti-Doping Agency]] (WADA) has described doping among Russian competitors as state-sponsored and systematic,<ref>{{cite news |title=Russia state-sponsored doping across majority of Olympic sports, claims report |date=18 July 2016 |url=https://www.bbc.co.uk/sport/36823453 |publisher=BBC Sport |access-date=2 August 2024}}</ref> with the Russian state being found to have supplied [[steroid]]s and other drugs to athletes. Due to widespread violations of anti-doping regulations, including an attempt to sabotage ongoing investigations by the manipulation of computer data, WADA in 2019 banned the [[Russian Federation]] from all major sporting events, including the Olympic Games, for four years,<ref name=Time-191209>{{cite magazine |last=Perrigo |first=Billy |date=9 December 2019 |url=https://time.com/5746344/russia-banned-olympics-2019/ |title=Russia Banned From Global Sports Competitions, Including Olympics, for 4 Years For State-Sponsored Doping |magazine=[[Time (magazine)|Time]] |url-status=live |archive-url=https://web.archive.org/web/20211216231445/https://time.com/5746344/russia-banned-olympics-2019/ |archive-date=16 December 2021}}</ref> but in 2020 the [[Court of Arbitration for Sport]] (CAS) reduced the ban period to two years following an appeal by Russia. Competitors from Russia meanwhile may take part in international competitions under a neutral flag and designation.<ref name=WSJ-201217>{{cite news |url=https://www.wsj.com/articles/sports-court-ruling-on-russian-doping-scheme-11608217781 |title=Sports Court Cuts Russia Doping Ban in Half |first=Rachel |last=Bachman |newspaper=[[The Wall Street Journal]] |date=17 December 2020 |url-status=live |archive-url=https://web.archive.org/web/20210806160506/https://www.wsj.com/articles/sports-court-ruling-on-russian-doping-scheme-11608217781 |archive-date=6 August 2021}}</ref>

      == Soviet era ==
      {{See also|Doping at the Olympic Games#1980 Moscow}}

      According to British journalist [[Andrew Jennings]], a [[KGB]] colonel stated that the agency's officers had posed as anti-doping authorities from the [[International Olympic Committee]] (IOC) to undermine [[doping test]]s and that Soviet competitors were "rescued with [these] tremendous efforts".<ref name=DG2011 /><ref>{{cite web |url=https://www.rferl.org/a/the-1980-moscow-olympics-rank-as-the-cleanest-in-history-athletes-recall-how-the-u-s-s-r-cheated-the-system-/30741567.html |title=The 1980 Olympics Are The 'Cleanest' In History. Athletes Recall How Moscow Cheated The System. |last1=Aleksandrov |first1=Alexei |last2=Aleksandrov |first2=Grebeniuk |last3=Runets |first3=Volodymyr |publisher= |date=22 July 2020 |website=Radio Free Europe/Radio Liberty |access-date=26 December 2021}}</ref> Regarding the [[1980 Summer Olympics]] in the Soviet Union, a 1989 Australian study said, "There is hardly a medal winner at the Moscow Games, certainly not a gold medal winner, who is not on one sort of drug or another: usually several kinds. The Moscow Games might as well have been called the Chemists' Games."<ref name= DG2011 />

      Documents obtained in 2016 revealed the Soviet Union's plans for a statewide doping system in track and field in preparation for the [[1984 Summer Olympics]] in Los Angeles. Dated prior to the country's decision to participate in the [[1984 Summer Olympics boycott]], the document detailed the existing steroids operations of the program, along with suggestions for further enhancements.<ref name=NYT160813 /> The communication, directed to the Soviet Union's head of track and field, was prepared by Dr. [[Sergei Portugalov]] of the [[Institute for Physical Culture]]. Portugalov was also one of the main figures involved in the implementation of the Russian doping program prior to the 2016 Summer Olympics.<ref name=NYT160813 />

      ==Timeline of the doping==
      === Doping issues from 2008 to 2009 ===
      In 2008, seven Russian track and field athletes were suspended ahead of the [[2008 Summer Olympics|Summer Olympics]] in Beijing for manipulating their [[urine samples]].<ref>{{cite news|url=https://news.bbc.co.uk/sport2/hi/athletics/7753640.stm|title=Dobriskey slams 'Russian seven'|date=28 November 2008|via=news.bbc.co.uk}}</ref>

      Multiple Russian biathletes were involved in doping offences in run-up to the [[2010 Winter Olympics]].<ref>{{Cite news|url=https://www.nytimes.com/2010/02/23/sports/olympics/23biathlon.html|title=In Biathlon, Concerns About Russia's program|date=22 February 2010|work=[[The New York Times]]|access-date=15 November 2017|language=en}}</ref><ref>{{Cite news|url=http://www.eurosport.com/biathlon/winter-olympics/2009-2010/russia-warned-over-doping_sto2215915/story.shtml|title=Rogge's doping warning for Russia|date=9 February 2010|work=eurosport.com|access-date=15 November 2017|language=en}}</ref> The president of the [[International Biathlon Union]], Anders Besseberg, said, "We are facing systematic doping on a large scale in one of the strongest teams of the world."<ref name=NYT160615 />

      Reviewing 7,289 blood samples from 2,737 competitors from 2001 to 2009, a report found that the number of suspicious samples from "Country A" notably exceeded other countries.<ref name=May2011 /> One of the authors said that Country A was Russia.<ref name=NYT160615 />

      In October 2009, [[International Association of Athletics Federations]] (IAAF) general secretary Pierre Weiss wrote to [[Valentin Balakhnichev]] that blood samples from Russian athletes "recorded some of the highest values ever seen since the IAAF started testing" and that tests from the 2009 World Championships "strongly suggest a systematic abuse of blood doping or EPO-related products".<ref name=AP160112 />

      === 2010–2014: allegations of state-sponsored doping and 2014 ARD documentary ===
      [[File:Yuliya Rusanova Istanbul 2012.jpg|thumb|right|[[Yuliya Stepanova]]]]

      In 2010, an employee at the Russian Anti-Doping Agency ([[RUSADA]]), Vitaly Stepanov, began sending information to the [[World Anti-Doping Agency]] (WADA) alleging that RUSADA was enabling systemic doping in athletics.<ref name=CBC160113 /><ref name=Reuters160510 /> He said that he sent two hundred emails and fifty letters over the course of three years.<ref name=AP160508 /> In December 2012, [[Darya Pishchalnikova]] sent an email to WADA containing details of an alleged state-run doping program in Russia. According to ''[[The New York Times]]'', the email reached three top WADA officials but the agency decided not to open an inquiry but instead forwarded her email to Russian sports officials.<ref name=NYT160615 /> In April 2013, having failed a doping test for the second time (after a previous two-year doping ban in 2008–2010), Pishchalnikova was banned by the [[All-Russia Athletic Federation|Russian Athletics Federation]] (RusAF) for ten years, in a move that was likely in retaliation. Her results from May 2012 were annulled, thus setting her on track to lose her Olympic medal.<ref>{{cite news|url=https://www.reuters.com/article/us-athletics-doping-pishchalnikova-idUSBRE93T0EQ20130430|title=Pishchalnikova given 10-year doping ban|last=Fyodorov|first=Gennady|date=30 April 2013|work=[[Reuters]]|access-date=30 April 2013}}</ref> British journalist Nick Harris said that he contacted the IOC with allegations about [[Grigory Rodchenkov]]'s [[Moscow antidoping laboratory|laboratory]] in Moscow in early July 2013.<ref name=SpInt160725 />

      According to Stepanov, "Even at WADA there were people who didn't want this story out," but he said that a person at the organization put him in contact with the German broadcaster [[ARD (broadcaster)|ARD]].<ref name=CBC160113 /> WADA's chief investigator Jack Robertson believed that the organization was reluctant to take action and that media attention was necessary, so he obtained the permission of WADA's director-general, David Howman,<ref name=PP160804 /> to approach an investigative reporter called [[Hajo Seppelt]], who had previously reported on doping in East Germany and other countries. In December 2014, ARD aired Seppelt's documentary, ''"Geheimsache Doping: 'Wie Russland seine Sieger macht'" ("The Doping Secret: 'How Russia Creates its Champions'")'', which uncovered alleged Russian state involvement in systematic doping, describing it as "[[Doping in East Germany|East German-style]]".<ref name=GN141203 /> In the documentary, Stepanov and his wife [[Yuliya Stepanova]] ([[née]] Rusanova), claimed that Russian athletics officials had supplied banned substances in exchange for 5% of an athlete's earnings and had also falsified tests in cooperation with doping control officers.<ref name=ARDdoc /><ref name=BBC141204 /> It included conversations that had been secretly recorded by Stepanova, e.g. Russian athlete [[Mariya Savinova]] saying that contacts at a Moscow drug-testing laboratory had covered up her doping.<ref name=AP170210 /> Russian long-distance runner [[Liliya Shobukhova]] allegedly paid €450,000 to cover up her positive doping result.<ref name=ARDdoc /> According to the allegations, Dr. Sergei Portugalov of the Institute for Physical Culture, who stands accused of organising state-sponsored doping in the Soviet Union, dating back to the early 1980s, was also involved in the recent Russian doping programme.<ref name=NYT160813 />

      ===2015===
      {{See also|Russia at the 2012 Summer Olympics#Russian doping scandal}}
      In January 2015, then-[[All-Russia Athletic Federation]] (ARAF) President [[Valentin Balakhnichev]] resigned as treasurer of the [[International Association of Athletics Federations]] (IAAF).<ref name=GN150114 />
      [[File:Dick Pound.jpg|thumb|right|200px|[[Dick Pound]] led the 2015 WADA investigation and became a vocal critic of the IOC's indecision]]
      In response to the ARD documentary, WADA commissioned an investigation headed by former anti-doping agency President [[Dick Pound]], the report of which was published on 9 November 2015.<ref name=WADA151109 /><ref name=NBC151109 /> The 335-page document, described as "damning" by ''[[The Guardian]]'',<ref name=GN151109 /> reported widespread doping and large-scale cover-ups by the Russian authorities. It stated that the [[Federal Security Service]] (FSB) had regularly visited and questioned laboratory staff and instructed some of them not to cooperate with the WADA investigation.<ref name=WADA151109 />{{rp|196–197}} Two staff members said that they suspected that the offices and telephones were bugged.<ref name=WADA151109 />{{rp|196–197}} The report recommended that ARAF be declared non-compliant with respect to the [[World Anti-Doping Code]] and that the IOC should not accept any [[2016 Summer Olympics]] entries from ARAF until compliance was reached.<ref name=WADA151109 /><ref name=BBC151109 />

      A day later, WADA suspended the Moscow Anti-doping Center, prohibiting the laboratory "from carrying out any WADA-related anti-doping activities including all analyses of urine and blood samples".<ref name=DW151110 /> On 13 November, the IAAF council voted 22–1 in favour of prohibiting Russia from world track and field events with immediate effect.<ref name=IAAF151113 /> Under other penalties against the ARAF, Russia has been also prohibited from hosting the 2016 [[IAAF World Race Walking Cup|World Race Walking Team Championships]] ([[Cheboksary]]) and 2016 [[IAAF World Junior Championships in Athletics|World Junior Championships]] ([[Kazan]]), and ARAF must entrust doping cases to [[Court of Arbitration for Sport]].<ref name=IAAF151113 /> ARAF accepted the indefinite IAAF suspension and did not request a hearing.<ref name="GN151126-nohearing" /> ARAF's efforts towards regaining full IAAF membership will be monitored by a five-person IAAF team.<ref name=BBC_monitoringteam /> On 18 November 2015 WADA suspended [[RUSADA]], meaning that Russia does not have a functioning NADO for any sport.<ref name=Newsweek151119 /><ref name=GN151118 />

      [[File:Vladimir Putin and Lamine Diack, 2011.jpg|thumb|270px|Vladimir Putin and [[Lamine Diack]]]]
      In November, France began a criminal investigation into former IAAF president [[Lamine Diack]], alleging that he accepted a 1 million euro bribe from the ARAF in 2011 to cover up positive doping results of at least six Russian athletes.<ref name=AP151104 />

      === 2016 ===
      ==== January to May 2016 ====

      In January 2016, the IAAF gave lifetime bans to the former head of the Russian athletics federation, [[Valentin Balakhnichev]], and a top Russian coach, [[Aleksey Melnikov]].<ref name=Reuters160107 />

      In mid-January, WADA released the second report by its independent commission.<ref name=WADA160114 /> The following month, the [[UK Anti-Doping|United Kingdom Anti-Doping]] (UKAD) agency was tasked to oversee testing in Russia.<ref name=AP170206 />

      Two former directors of [[RUSADA]], [[Vyacheslav Sinev]] and [[Nikita Kamaev]], both died unexpectedly in February 2016.<ref name=AP160221 /> ''[[The Sunday Times]]'' reported that Kamaev had approached the newspaper shortly before his death planning to publish a book on "the true story of sport pharmacology and doping in Russia since 1987".<ref name=Reuters160221 /> [[Grigory Rodchenkov]], the director of a prominent laboratory who has been described by WADA as "the heart of Russian doping", was fired by Russian authorities and fled in fear of his safety to the United States, where he shared information<ref>{{cite news |last=Keteyian |first=Armen |date=8 May 2016 |url=https://www.cbsnews.com/news/60-minutes-russian-doping-at-sochi-winter-olympics-exposed/|title=Russian doping at Sochi Winter Olympics exposed |website=www.cbsnews.com |publisher=[[CBS News]] |url-status=live |archive-url=https://web.archive.org/web/20211106180517/https://www.cbsnews.com/news/60-minutes-russian-doping-at-sochi-winter-olympics-exposed/ |archive-date=6 November 2021}}</ref> with the help of filmmaker [[Bryan Fogel]], which was documented in the film ''[[Icarus (2017 film)|Icarus]]''.

      In March, German broadcaster [[ARD (broadcaster)|ARD]] aired a documentary called "Russia's Red Herrings", alleging that competitors were alerted about testing plans and offered banned substances by individuals at RUSADA and ARAF.<ref name=WADA160307 /> According to a May 2016 report in ''[[The New York Times]]'', whistleblower Grigory Rodchenkov said that doping experts collaborated with Russia's intelligence service on a state-sponsored doping programme in which urine samples were switched through a "mouse hole" in the laboratory's wall.<ref name=NYT160512 /> Tamper-resistant bottles were opened in a nearby building and the urine samples were replaced with athletes' urine taken months in advance.<ref>{{cite news |author1=Rebecca R. Ruiz |author2=K.K. Rebecca Lai |author3=Yuliya Parshina-Kottas |author4=Jeremy White |date=13 May 2016 |title=Russian Doctor Explains How He Helped Beat Doping Tests at the Sochi Olympics |url=https://www.nytimes.com/interactive/2016/05/13/sports/russia-doping-sochi-olympics-2014.html |url-status=live |work=[[The New York Times]] |location= |archive-url=https://web.archive.org/web/20211123104510/https://www.nytimes.com/interactive/2016/05/13/sports/russia-doping-sochi-olympics-2014.html |archive-date=23 November 2021 |access-date=31 December 2021}}</ref> Rodchenkov said that at least fifteen medalists at the [[2014 Winter Olympics]] were involved.<ref name=NYT160512 /> On 19 May, WADA appointed Richard McLaren to lead an investigation into the [[2014 Winter Olympics]] in Sochi.<ref name=WADA160519 />

      On 15 March, the [[International Olympic Committee]] (IOC) announced that they were re-analyzing stored urine samples from the 2008 and [[2012 Summer Olympics|2012 Olympics]] using more advanced analytical methods to detect banned substances that would have gone unnoticed at the time of competition. Specific sports and countries were targeted, including in particular competitors likely to compete in Rio de Janeiro who also competed in London 2012 and Beijing 2008. Participants from the 2006 and 2010 Winter Olympics were also being targeted as urine samples can only be stored for 10 years.<ref>{{cite news |url=https://www.olympic.org/news/targeted-reanalysis-of-london-and-beijing-samples-underway-ahead-of-olympic-games-rio-2016 |title=Targeted reanalysis of London and Beijing samples underway ahead of Olympic Games Rio 2016 – Olympic News |date=2016-03-15 |work=[[International Olympic Committee]], Medical And Scientific Commission Fight against doping |access-date=2018-07-17 |language=en |url-status=live |archive-url=https://web.archive.org/web/20210818192913/https://olympics.com/ioc/news/targeted-reanalysis-of-london-and-beijing-samples-underway-ahead-of-olympic-games-rio-2016 |archive-date=2021-08-18}}</ref> The re-analysis programme would eventually conclude in November 2017.{{fact|date=December 2024}}

      Away from the Olympics, Russian heavyweight boxer [[Alexander Povetkin]] and tennis player [[Maria Sharapova]] would both fail drug tests in March and May respectively, both testing positive for [[Meldonium]]. Russian-Finnish footballer [[Roman Eremenko]] would also fail a drugs test later on in the year.{{fact|date=December 2024}}

      ==== June 2016 ====
      An ARD documentary in June 2016 implicated Russian sports minister [[Vitaly Mutko]] in covering up doping by a football player at FK Krasnodar.<ref name=DW160608 /> In the same month, IAAF deputy general secretary Nick Davies was provisionally suspended over allegations that he took money to delay naming Russian athletes.<ref name=BBC160610 /> According to the BBC, emails from July 2013 showed that Davies had discussed how to delay or soften an announcement on Russians who had tested positive.<ref name=BBC151222 />
      [[File:Vitaly Mutko 01.png|thumb|left|[[Vitaly Mutko]], [[Ministry of Sport (Russia)|The Minister of Sport, Tourism and Youth]] of [[Russia]]]]
      In June, WADA released a report stating that the work of its Doping Control Officers (DCO) had been limited by a "significant amount of unavailable competitor reports and missed tests", insufficient or incorrect competitor location information, and little information about the location or date of competitions. Some competitors named military cities requiring special permission to enter as their location and some national championships, including Olympic qualifiers, were held in cities with restricted access due to civil conflicts, preventing testing of the competitors.<ref name=WADA160615 /> WADA also reported intimidation of DCOs by armed [[Federal Security Service]] (FSB) agents; "significant delays" before being allowed to enter venues; consistent monitoring by security staff; delays in receiving competitor lists; and opening of sample packages by Russian customs.<ref name=WADA160615 /> 90% of Russian competitors did not respond or "emphatically" refused when WADA requested to interview them as part of its investigation.<ref name=AP160616 /> Director-general David Howman stated, "It was the very right time for those who considered themselves clean [to approach WADA]. They had nine months, plenty of time, and none came forward."<ref name=AP160616 />

      On 17 June, the IAAF Council held an extraordinary meeting "principally to give the Russian Athletics Federation (RusAF) a further opportunity to satisfy the Reinstatement Conditions for IAAF Membership".<ref name=IAAF160617 /> A task force chaired by [[Rune Andersen]] recommended against reinstating Russia after reporting that criteria had not been met and that there were "detailed allegations, which are already partly substantiated, that the Russian authorities, far from supporting the anti-doping effort, have in fact orchestrated systematic doping and the covering up of adverse analytical findings".<ref name=IAAF160617 /> The IAAF voted unanimously to uphold its ban.<ref name=Reuters160617 />

      A week later, the [[International Weightlifting Federation]] (IWF) decided to give a one-year ban to Russia, along with two other countries; on 3 August 2016 the IOC ratified the decision, and Russia's weightlifting team missed the [[2016 Summer Olympics]].<ref name=BBC160623 /><ref>{{cite web|url=http://www.tas-cas.org/fileadmin/user_upload/Media_Release__English__030816_final.pdf|title=Court of Arbitration for Sports – Media Release: 18 cases registered – Status as of 3 August 2016|publisher=[[Court of Arbitration for Sports]]|access-date=3 August 2016}}</ref>

      ==== July 2016 ====

      [[File:ОКРоссии.JPG|thumb|right|190px|Headquarters of the [[Russian Olympic Committee]] in [[Moscow]]]]

      {{See also|McLaren Report}}

      [[File:Berlinger Bereg Kit doping sampling bottles by Augustas Didzgalvis.jpg|thumb|BEREG-KIT doping sampling security bottles]]

      On 18 July 2016, [[Richard McLaren (academic)|Richard McLaren]], a Canadian attorney retained by WADA to investigate Rodchenkov's allegations, published a 97-page report covering significant state-sponsored doping in Russia.<ref name=WADA160718 /><ref name=NYT160718 /> Although limited by a 57-day time frame, the investigation found corroborating evidence after conducting witness interviews, reviewing thousands of documents, analysis of hard drives, forensic analysis of urine sample collection bottles, and laboratory analysis of individual competitor samples, with "more evidence becoming available by the day".<ref name=WADA160718 />{{rp|5}} The report concluded that it was shown "beyond a reasonable doubt" that Russia's [[Ministry of Sport (Russia)|Ministry of Sport]], the Centre of Sports Preparation of the National Teams of Russia, the [[Federal Security Service]] (FSB), and the WADA-accredited laboratory in Moscow had "operated for the protection of doped Russian competitors" within a "state-directed failsafe system" using "the disappearing positive [test] methodology" (DPM) after the country's poor medal count during the [[2010 Winter Olympic Games]] in Vancouver.<ref>{{Cite web|url=https://www.espn.com/olympics/story/_/id/17100024/takeaways-mclaren-report-confusion-corruption-cynicism|title=Takeaways from McLaren report? Confusion, corruption, cynicism|date=18 July 2016|website=ESPN.com}}</ref><ref>{{cite web|url=http://ftw.usatoday.com/2016/07/the-damning-mclaren-report-on-russian-olympic-doping-explained|title=The damning McLaren Report on Russian Olympic doping, explained|date=18 July 2016}}</ref> McLaren stated that urine samples were opened in Sochi in order to swap them "without any evidence to the untrained eye".<ref name=WADA160718 /> The official producer of BEREG-KIT security bottles used for anti-doping tests, Berlinger Group, stated, "We have no knowledge of the specifications, the methods or the procedures involved in the tests and experiments conducted by the McLaren Commission."<ref name=Berlinger />

      According to the McLaren report, the DPM operated from "at least late 2011 to August 2015".<ref name=WADA160718 />{{rp|35}} It was used on 643 positive samples, a number that the authors consider "only a minimum" due to limited access to Russian records.<ref name=WADA160718 />{{rp|39}} The system covered up positive results in a wide range of sports:<ref name=WADA160718 />{{rp|41}}
      {{Div col|colwidth=14em}}
      * Athletics (139)
      * Weightlifting (117)
      * Non-Olympic sports (37)
