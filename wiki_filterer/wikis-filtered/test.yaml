  - title: School district drug policies
    pageid: 1292607
    extract: School district drug policies are measures that administrators of a school district put into place to discourage drug use by students.
    source: |-
      {{Short description|Measures to discourage student drug use}}
      {{Multiple issues|
      {{Globalize|date=December 2010}}
      {{More citations needed|date=December 2007}}
      }}
      '''School district drug policies''' are measures that administrators of a [[school district]] put into place to discourage [[Recreational drug use|drug use]] by students.

      ==Background==
      Over the decades of the [[war on drugs]] in the United States, [[primary school|primary]] and [[secondary school]] drug and alcohol policies have become increasingly strict, in punishment and in the kinds of behavior regulated. Some school districts include off-campus and out-of-school behavior in their policy's jurisdiction. These policies are frequently part of comprehensive "Drug and alcohol" policies, and are particularly common in [[urban area|urban]] school districts.

      Aspects of the policies may include [[random drug testing]], searches of lockers and personal effects, anti-drug education (e.g., "[[Just Say No]]" curricula), and punitive measures including expulsion and suspension.

      Advocates of random drug testing argue that it is not just a punitive measure, but may deter drug use. Opponents, however, have argued that drugs commonly used by students, such as [[alcohol (drug)|alcohol]], [[Methylenedioxymethamphetamine|MDMA]], and prescription drugs are either not detected by the tests or are metabolized within a short period of time.{{Citation needed|date=December 2007}}

      There are about 600 school districts in about 15,000 nationwide that use drug tests, according to officials from the White House Office of National Drug Control Policy.{{Citation needed|date=December 2007}} White House officials liken drug testing to programs that screen for tuberculosis or other diseases, and said students who test positive don't face criminal charges.

      ==Legal challenges==
      Civil libertarians have raised concerns with these policies, citing student [[civil rights]] and student [[privacy]] as principle objections. These cases have resulted in a number of legal challenges in the United States, as well as in related case law (e.g., ''[[Morse v. Frederick]]'', the so-called "Bong Hits 4 Jesus" case").

      In a 1995 case, ''[[Vernonia School District 47J v. Acton]]'', the Supreme Court upheld the legality of random drug tests of student athletes who were not suspected of drug use. The Court reasoned that because school athletes routinely face mandatory physicals and other similar invasions of privacy, they have lower expectations of privacy than the average student. The Court specified that its decision should not be seen as a justification for further expansion of drug testing programs.

      In the 2002 case [[Board of Education v. Earls]]  the Supreme Court extended the holding in ''Vernonia'', holding that all students who participate in voluntary activities, like cheerleading, band, or debate, could be subjected to random tests as part of a comprehensive program. The Court, in an opinion by Justice Thomas, stated that the diminished expectations of privacy of athletes was less important to their decision in ''Vernonia'' than a school's innate custodial responsibility and authority over its students.<ref>''Board of Education of Independent School District No. 92 of Pottawatomie County v. Earls''.</ref>

      In December 2009, a challenge was made to the Haddonfield, New Jersey, Board of Education's 24/7 policy regulating drug and alcohol use of students outside of school property and off school time. The lawsuit contends that the Board of Education does not have the authority to discipline students unless the conduct in question has some connection to school safety and discipline.<ref>{{Cite web|url=https://www.nj.com/news/2010/01/ruling_expected_on_haddonfield.html|title=Judge to rule on Haddonfield schools' '24-7' drug and alcohol rules|date=2010-01-11|website=Star-Ledger}}</ref> A federal judge denied a request to stop the policy because the student who filed the lawsuit had already graduated.<ref>{{Cite web|url=http://www.philly.com/inquirer/local/nj/20101002_Judge_backs_Haddonfield_schools_on_substance_rule.html|title=Judge backs Haddonfield schools on substance rule|last=Osborne|first=James|date=2010-10-02|website=The Philadelphia Inquirer|archive-url=https://web.archive.org/web/20101004200906/http://www.philly.com/inquirer/local/nj/20101002_Judge_backs_Haddonfield_schools_on_substance_rule.html|archive-date=2010-10-04|url-status=unfit}}</ref> In 2012, the plaintiff's lawyer convinced a different judge to find that the school's 24/7 policy was illegal and the judge found that Haddonfield’s policy fails to differentiate between off-campus offenses that simply break the law and those that affect the school district’s ability to provide a safe environment.<ref>{{Cite web|url=https://patch.com/new-jersey/haddon/judge-orders-changes-to-haddonfield-s-24-7-policy|title=Judge Orders Changes to Haddonfield's 24/7 Policy|last=Burgoon|first=Lauren|date=2012-08-10|website=Haddonfield-Haddon Township, NJ Patch|language=en}}</ref> The NJ Commissioner of Education then reviewed the policy.<ref>{{Cite web|url=http://articles.philly.com/2012-08-21/news/33287567_1_haddonfield-student-mayor-tish-colombi-high-schools|title=Haddonfield's campaign to curb teens' binge drinking could be near end|last=Osborne|first=James|date=2012-08-21|website=The Philadelphia Inquirer|language=en-US|archive-url=https://web.archive.org/web/20150115014452/http://articles.philly.com/2012-08-21/news/33287567_1_haddonfield-student-mayor-tish-colombi-high-schools|archive-date=2015-01-15|url-status=unfit}}</ref> In 2013, after the Commissioner of Education ruled against the Haddonfield School Board, the Board voted to scrap the policy for good.<ref>{{Cite web|url=http://legalclips.nsba.org/2013/02/19/new-jersey-district-scraps-247-student-conduct-policy/|title=New Jersey district scraps "24/7" student conduct policy|last=Dunn|first=Phil|date=2013-02-19|website=Legal Clips|publisher=National School Boards Association|language=en|archive-url=https://web.archive.org/web/20150115014555/http://legalclips.nsba.org/2013/02/19/new-jersey-district-scraps-247-student-conduct-policy/|archive-date=2015-01-15|url-status=unfit}}</ref>

      ==Case study==
      In late 2001, in [[Ashland, Oregon]], the [[Ashland School District (Oregon)|Ashland School Board]] enacted a Drug and Alcohol Policy for students in leadership positions, igniting a local controversy. The policy extended to off-campus and after-school conduct, but the controversy reached the general efficacy and constitutionality of drug testing policies.<ref>Ashland Oregon case study:
      *[http://www.dailytidings.com/2002/news0213/headline/dt_news-01.php Daily Tidings (February 2002 Coverage)] {{webarchive|url=https://web.archive.org/web/20070927210607/http://www.dailytidings.com/2002/news0213/headline/dt_news-01.php |date=2007-09-27 }}
      *[http://www.dailytidings.com/2002/news0122/opinion/dt_opinion.php Daily Tidings (January 2002 Coverage)] {{webarchive|url=https://web.archive.org/web/20070927210601/http://www.dailytidings.com/2002/news0122/opinion/dt_opinion.php |date=2007-09-27 }}
      *[http://www.dailytidings.com/2002/news0117/headline/dt_news-01.php Daily Tidings (January 2002 Coverage)] {{webarchive|url=https://web.archive.org/web/20070927210756/http://www.dailytidings.com/2002/news0117/headline/dt_news-01.php |date=2007-09-27 }}
      *[http://www.dailytidings.com/2002/news0108/headline/dt_news-02.php Daily Tidings (January 2002 Coverage)] {{webarchive|url=https://web.archive.org/web/20070927210640/http://www.dailytidings.com/2002/news0108/headline/dt_news-02.php |date=2007-09-27 }}
      *[http://www.dailytidings.com/2002/news0105/headline/dt_news-01.php Daily Tidings (January 2002 Coverage)] {{webarchive|url=https://web.archive.org/web/20070927210735/http://www.dailytidings.com/2002/news0105/headline/dt_news-01.php |date=2007-09-27 }}
      *[http://www.mailtribune.com/archive/2002/january/010702n4.htm Mail Tribune (January 2002 Coverage)] {{webarchive|url=https://web.archive.org/web/20070310232441/http://www.mailtribune.com/archive/2002/january/010702n4.htm |date=2007-03-10 }}
      *[http://www.mailtribune.com/archive/2001/october/102801n1.htm Mail Tribune (October 2001 Coverage) Article 1] {{webarchive|url=https://web.archive.org/web/20070310232550/http://www.mailtribune.com/archive/2001/october/102801n1.htm |date=2007-03-10 }}
      *[http://www.mailtribune.com/archive/2001/october/102801n2.htm Mail Tribune (October 2001 Coverage) Article 2] {{webarchive|url=https://web.archive.org/web/20070310232451/http://www.mailtribune.com/archive/2001/october/102801n2.htm |date=2007-03-10 }}
      *[http://www.dailytidings.com/2001/news0912/community/dt_community-04.php Daily Tidings (September 2001 Coverage)] {{webarchive|url=https://web.archive.org/web/20070927210653/http://www.dailytidings.com/2001/news0912/community/dt_community-04.php |date=2007-09-27 }}
      *[http://www.mailtribune.com/archive/2001/september/091101n1.htm Mail Tribune (September 2001 Coverage)] {{webarchive|url=https://web.archive.org/web/20070310232539/http://www.mailtribune.com/archive/2001/september/091101n1.htm |date=2007-03-10 }}
      *[http://www.mailtribune.com/archive/2001/july/073101n1.htm Mail Tribune (July 2001 Coverage) Article 1] {{webarchive|url=https://web.archive.org/web/20070310232420/http://www.mailtribune.com/archive/2001/july/073101n1.htm |date=2007-03-10 }}
      *[http://www.mailtribune.com/archive/2001/july/072301n2.htm Mail Tribune (July 2001 Coverage) Article 2] {{webarchive|url=https://web.archive.org/web/20070310232430/http://www.mailtribune.com/archive/2001/july/072301n2.htm |date=2007-03-10 }}
      </ref>

      Opposing the policy were local student groups and the local Oregon [[American Civil Liberties Union]], which had advocated on behalf of various students expelled by the Ashland School District for drug use in May 2001 at a national forensics tournament. Students at [[Ashland High School (Oregon)|Ashland High School]] argued that their off campus behavior after school hours should have no effect on their academic standing.

      To resolve the dispute, a community committee was formed, meeting for five months. The committee's recommendations led to a rewriting of the Code of Conduct and a re-evaluation of the School District's entire Drug and Alcohol Policy.

