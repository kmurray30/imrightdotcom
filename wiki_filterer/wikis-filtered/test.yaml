      }}

      The '''SAT''' ({{IPAc-en|ˌ|ɛ|s|.|ˌ|eɪ|.|ˈ|t|iː|audio=LL-Q1860 (eng)-Flame, not lame-SAT.wav}}, {{respell|ess|ay|TEE}}) is a [[standardized test]] widely used for [[college admissions in the United States]]. Since its debut in 1926, its name and [[Test score|scoring]] have changed several times. For much of its history, it was called the '''Scholastic Aptitude Test''' and had two components, [[#Reading and Writing|Verbal]] and [[#Mathematics|Mathematical]], each of which was scored on a range from 200 to 800. Later it was called the '''Scholastic Assessment Test''', then the '''SAT I: Reasoning Test''', then the '''SAT Reasoning Test''', then simply the '''SAT'''.

      The SAT is wholly owned, developed, and published by the [[College Board]] and is administered by the [[Educational Testing Service]].<ref name=":0">{{cite web |title=How the SAT Is Structured |url=https://satsuite.collegeboard.org/sat/whats-on-the-test/structure |publisher=College Board SAT}}</ref> The test is intended to assess students' readiness for college. Historically, starting around 1937, the tests offered under the SAT banner also included optional subject-specific [[SAT Subject Tests]], which were called SAT Achievement Tests until 1993 and then were called SAT II: Subject Tests until 2005; these were discontinued after June 2021.<ref name="College Board-2021">{{Cite web |last= |first= |date= |title=College Board Will No Longer Offer SAT Subject Tests or SAT with Essay |url=https://blog.collegeboard.org/January-2021-sat-subject-test-and-essay-faq |url-status=live |archive-url=https://web.archive.org/web/20230821181111/https://blog.collegeboard.org/January-2021-sat-subject-test-and-essay-faq |archive-date=August 21, 2023 |access-date=February 14, 2021 |work=College Board Blog |language=en}}</ref><ref name="Hartocollis-2021">{{Cite news |last1=Hartocollis |first1=Anemona |last2=Taylor |first2=Kate |last3=Saul |first3=Stephanie |date=January 20, 2021 |title=Retooling During Pandemic, the SAT Will Drop Essay and Subject Tests |url=https://www.nytimes.com/2021/01/19/us/sat-essay-subject-tests.html |url-access=limited |archive-url=https://ghostarchive.org/archive/20211228/https://www.nytimes.com/2021/01/19/us/sat-essay-subject-tests.html |archive-date=December 28, 2021 |access-date=February 14, 2021 |work=The New York Times |language=en-US |issn=0362-4331}}{{cbignore}}</ref> Originally designed not to be aligned with high school curricula,<ref>{{Cite book| title=Trapped in Mediocrity: Why Our Schools Aren't World-Class and What We Can Do About It| url=https://archive.org/details/trappedinmediocr0000bair| url-access=registration| last=Baird| first=Katherine |publisher=Rowman and Littlefield Publishers| location=Lanham |year=2012}} "And a separate process that began in 1926 was complete by 1942: the much easier SAT—a test not aligned to any particular curriculum and thus better suited to a nation where high school students did not take a common curriculum—replaced the old college boards as the nations's college entrance exam. This broke the once tight link between academic coursework and college admission, a break that remains to this day."</ref> several adjustments were made for the version of the SAT introduced in 2016. College Board president [[David Coleman (consultant)|David Coleman]] added that he wanted to make the test reflect more closely what students learn in high school with the new [[Common Core State Standards Initiative|Common Core standards]].<ref>{{cite news |last=Lewin |first=Tamar |date=March 5, 2014 |title=A New SAT Aims to Realign With Schoolwork |newspaper=The New York Times |url=https://www.nytimes.com/2014/03/06/education/major-changes-in-sat-announced-by-college-board.html |url-status=live |access-date=May 14, 2014 |archive-url=https://web.archive.org/web/20140513073917/http://www.nytimes.com/2014/03/06/education/major-changes-in-sat-announced-by-college-board.html |archive-date=May 13, 2014 |quote=He said he also wanted to make the test reflect more closely what students did in high school and, perhaps most important, rein in the intense coaching and tutoring on how to take the test that often gave affluent students an advantage.}}</ref>

      Many students [[#Preparation|prepare]] for the SAT using books, classes, online courses, and tutoring, which are offered by a variety of companies and organizations. However, (expensive) preparatory courses do not offer significant improvements on their performance,<ref name="Hambrick-2011" /> and neither do elite secondary schools.<ref name=":5" /><ref name=":6" /> In the past, the SAT was taken on paper. But starting March 2023 for international students and March 2024 for those within the U.S., the SAT has been administered using a computer program called Bluebook.<ref name="Thompson-2022" /><ref>{{cite news |last=Goldstein |first=Dana |title=No More No. 2 Pencils: The SAT Goes Fully Digital |work=The New York Times |url=https://www.nytimes.com/2024/03/08/us/sat-online-digital-test-college.html  |date=March 8, 2024 |access-date=March 10, 2024 |archive-url=https://archive.today/20240308112037/https://www.nytimes.com/2024/03/08/us/sat-online-digital-test-college.html |url-status=live |archive-date=March 8, 2024 }}</ref> The test was also made adaptive, customizing the questions that are presented to the student based on how they perform on questions asked earlier in the test, and shortened from 3 hours to 2 hours and 14 minutes.<ref name="HowStructured" /><ref name="CBAdaptive">{{cite web |archive-url=https://archive.today/20240321220248/https://blog.collegeboard.org/what-digital-sat-adaptive-testing |url=https://blog.collegeboard.org/what-digital-sat-adaptive-testing |title=What is Digital SAT Adaptive Testing? |date=August 14, 2023 |archive-date=March 21, 2024 |url-status=live |work=College Board Blog}}</ref>

      While a considerable amount of research has been done on the SAT, many questions and misconceptions remain.<ref name="Frey-2019" /><ref name="Hambrick-2014">{{Cite news |last1=Hambrick |first1=David C. |last2=Chabris |first2=Christopher |date=April 14, 2014 |title=Yes, IQ Really Matters |url=https://slate.com/technology/2014/04/what-do-sat-and-iq-tests-measure-general-intelligence-predicts-school-and-life-success.html |url-status=live |archive-url=https://web.archive.org/web/20210831154506/https://slate.com/technology/2014/04/what-do-sat-and-iq-tests-measure-general-intelligence-predicts-school-and-life-success.html |archive-date=August 31, 2021 |access-date=August 31, 2021 |work=Slate |department=Science}}</ref> Outside of college admissions, the SAT is also used [[#By researchers|by researchers]] studying human intelligence in general and intellectual precociousness in particular,<ref name="O'Boyle-2005" /><ref name="Haier-2018" /><ref name="Lubinsky-2018" /> and [[#By employers|by some employers]] in the recruitment process.<ref name="Weber-2004" /><ref name="Treu-2014" /><ref name="Dewan-2014" />

      == Function ==
      The SAT is typically taken by [[High school (North America)|high school]] [[Eleventh grade|juniors]] and [[Twelfth grade|seniors]].<ref>{{cite web |url=https://collegereadiness.collegeboard.org/sat/register |title=SAT Registration |date=December 2, 2015 |access-date=August 16, 2016 |publisher=[[College Board]] |archive-url=https://web.archive.org/web/20160828120843/https://collegereadiness.collegeboard.org/sat/register |archive-date=August 28, 2016 |url-status=live }} "Most students take the SAT spring of junior year or fall of senior year."</ref> The College Board states that the SAT is intended to measure literacy, numeracy and writing skills that are needed for academic success in [[college]]. They state that the SAT assesses how well the test-takers analyze and solve problems—skills they learned in school that they will need in college.

      The College Board also claims that the SAT, in combination with high school [[Grading in education|grade point average (GPA)]], provides a better indicator of success in college than high school grades alone, as measured by college freshman GPA. Various studies conducted over the lifetime of the SAT show a [[statistically significant]] increase in [[correlation]] of high school grades and college freshman grades when the SAT is factored in.<ref>{{cite web|url=http://www.collegeboard.com/research/pdf/rn10_10755.pdf|title=01-249.RD.ResNoteRN-10 collegeboard.com|publisher=The College Board|access-date=October 13, 2014|archive-url=https://web.archive.org/web/20090106122457/http://www.collegeboard.com/research/pdf/rn10_10755.pdf|archive-date=January 6, 2009}}</ref> The [[#Predictive validity and powers|predictive validity and powers]] of the SAT are topics of research in psychometrics.<ref name="Frey-2019" />

      The SAT is a [[norm-referenced test]] intended to yield scores that follow a [[Normal distribution|bell curve distribution]] among test-takers. To achieve this distribution, test designers include challenging multiple-choice questions with plausible but incorrect options, known as "distractors", exclude questions that a majority of students answer correctly, and impose tight time constraints during the examination.<ref>{{cite news| last1 =Atkinson| first1 =Richard| last2 =Geiser| first2 =Saul| title =The Big Problem With the New SAT| newspaper =The New York Times| date =May 4, 2015| url =https://www.nytimes.com/2015/05/05/opinion/the-big-problem-with-the-new-sat.html| access-date =January 29, 2016| archive-url =https://web.archive.org/web/20151101232116/http://www.nytimes.com/2015/05/05/opinion/the-big-problem-with-the-new-sat.html| archive-date =November 1, 2015| url-status =live}}</ref>

      There are substantial differences in funding, curricula, grading, and difficulty among U.S. secondary schools due to U.S. [[federalism]], local control, and the prevalence of private, distance, and [[Homeschooling|home schooled]] students. SAT (and [[ACT (test)|ACT]]) scores are intended to supplement the secondary school record and help admission officers put local data—such as course work, grades, and class rank—in a national perspective.<ref>Korbin, L. (2006). SAT Program Handbook. A Comprehensive Guide to the SAT Program for School Counselors and Admissions Officers, 1, 33+. Retrieved January 24, 2006, from College Board Preparation Database.</ref>

      {{multiple image
      | direction         = vertical
      | width             = 400
      | header            = 
