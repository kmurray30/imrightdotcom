      == Boxing scandals ==
      * [[List of deaths due to injuries sustained in boxing]]
      * In 1967, then-undefeated World Champion Muhammad Ali was stripped of his title, and denied a boxing license for the next 3 years over [[Muhammad Ali#Draft resistance|his refusal to be drafted into the U.S. army]].
      * In 1983, boxer [[Luis Resto (boxer)|Luis Resto]] was caught tampering with his gloves by removing padding and hardening his hand wraps with plaster.<ref>{{cite web |last1=Mackenzie |first1=George |title=Loaded gloves: the dark story of Luis Resto and his illegal fists |url=https://www.theversed.com/10494/loaded-gloves-the-dark-story-of-luis-resto-and-his-illegal-fists/#.31agRWjkDA |website=The Versed |date=11 April 2017 |accessdate=1 April 2019}}</ref>
      * In 2001, International Boxing Federation founder Robert W. "Bobby" Lee Sr. was convicted of money laundering and tax evasion, following a three-year long [[International Boxing Federation#20th-century bribery scandal|investigation of racketeering and bribery]] at the organization.
      * Tampered handwraps controversy of 2009 resulting in the suspension of [[Antonio Margarito]]
      * Suspension of [[boxing]] judges at the [[2016 Summer Olympics]] - see [[Boxing at the 2016 Summer Olympics#Judging]]<ref>{{Cite web|title=2016 Summer Olympics: The U.S. dominates Rio Games with 121 medals|url=https://www.latimes.com/sports/olympics/la-sp-oly-rio-2016-olympics-htmlstory.html|access-date=2021-01-12|website=Los Angeles Times|language=en-US}}</ref>

      == College sporting scandals ==
      * [[1951 college basketball point-shaving scandal]] – in 1951, more than 30 players at seven schools were implicated in a [[point shaving]] scheme that also had connections to organized crime. The scandal was most strongly linked to the [[City College of New York]] because several central figures had played on the school's [[1949–50 CCNY Beavers men's basketball team|1949–50 team]] that won that season's [[1950 NCAA basketball tournament|NCAA tournament]] and [[1950 National Invitation Tournament|NIT]], but it has also been strongly linked to six other universities, including [[Long Island University]], [[Bradley University]], and the [[University of Kentucky]] as well.
      * [[Boston College Eagles men's basketball|Boston College basketball]] point shaving scandal in [[1978–79 Boston College basketball point shaving scandal|1978–79]]
      * [[Southern Methodist University football scandal]] – in 1986, it was revealed that [[Southern Methodist University]] boosters gave football players thousands of dollars from a "slush fund" with the knowledge of university administrators. Along with a string of prior NCAA violations, this led the NCAA to level the [[Death penalty (NCAA)|"death penalty"]] on the school's football team.
      * [[University of Michigan basketball scandal]] – four players, most notably [[Chris Webber]], were paid by a booster to launder money from his gambling operations. In some cases, the payments extended to their high school days.
      * [[University of Minnesota basketball scandal]] – the ''[[St. Paul Pioneer Press]]'' reported the day before the [[1999 NCAA Division I men's basketball tournament]] that an academic counseling staffer at the university publicly acknowledged doing coursework for many basketball players.
      *[[Baylor University basketball scandal]] – player Patrick Dennehy [[Murder of Patrick Dennehy|was murdered]] by teammate Carlton Dotson. Later, coach [[Dave Bliss]] instructed his players to lie to NCAA investigators that Dennehy dealt drugs. In the wake of these events, numerous violations of NCAA rules were discovered.
      * [[Duke lacrosse case]] – a stripper hired by members of the [[Duke Blue Devils men's lacrosse|Duke University men's lacrosse team]] for an informal team party in 2006 falsely accused three players of [[rape]].
      * [[University of North Carolina at Chapel Hill football scandal]] – over ten football players received improper benefits and committed academic fraud by turning in coursework prepared by tutors.
      * [[2011 University of Miami athletics scandal]] – [[Yahoo! Sports]] broke a story in which former Miami booster [[Nevin Shapiro]], currently imprisoned for running a [[Ponzi scheme]], indicated he had provided massive amounts of improper benefits to Miami players and coaches, mostly in [[Miami Hurricanes football|football]], but also in [[Miami Hurricanes men's basketball|men's basketball]].
      * [[Penn State child sex abuse scandal]] – in November 2011, former Penn State defensive coordinator [[Jerry Sandusky]] was arrested on 40 counts of sexually abusing eight boys over a 15-year period including incidents in Penn State's football facilities. In June 2012, Sandusky was convicted on 45 charges related to the scandal.
      * [[University of North Carolina academic-athletic scandal]] – in a follow-up to the [[University of North Carolina at Chapel Hill football scandal|UNC football scandal]], new accusations of academic fraud arose in relation to the university's African and Afro-American Studies department and men's basketball program, men's football team, women's soccer and other sports as well. The Wainstein Report, an independent report commissioned by UNC, revealed academic fraud that occurred over at least 18 years involving thousands of students and student athletes. Allegedly, thousands of student athletes were directed by the UNC administration to take "sham" classes in order to maintain eligibility. UNC avoided major NCAA penalties, mainly because said sham classes had been offered to the entire student body.
      * [[Western Kentucky University swim team hazing scandal]] – In January 2015, a former member of [[Western Kentucky University]]'s swim team alleged several incidents of hazing while part of the team. Further investigations revealed hazing incidents dating back to at least 2012, prompting the university to suspend the entire swimming and diving program for five years. As of 2024, the program has not been revived.
      * [[2015 University of Louisville basketball sex scandal]] – In 2015, Yahoo! Sports reported that a self-described former [[Procuring (prostitution)|madam]] alleged that she had been paid several thousand dollars from 2010 to 2014 by men's basketball staffer [[Andre McGee]] for strip shows and sex parties for players and prospective recruits. The NCAA announced the results of its investigation in June 2017, announcing major sanctions that included a 10-year [[show-cause penalty]] for McGee and the potential loss of the team's [[2012–13 Louisville Cardinals men's basketball team|2013 national title]]. An appeal by Louisville failed, and in February 2018 the Cardinals became the first Division I basketball program to be stripped of a national championship.
      *[[Baylor University sexual assault scandal]] – in 2016, Baylor and its [[Baylor Bears football|football program]] were rocked by the revelation that university officials failed to act on numerous alleged sexual and non-sexual assaults by football team members between 2012 and 2016, with one player convicted of felony sexual assault. A later lawsuit filed by a group of victims alleged that 31 football players committed 52 rapes between 2011 and 2014. In the wake of the scandal, head football coach [[Art Briles]] was fired, athletic director [[Ian McCaw]] resigned, and university president [[Ken Starr]] was first demoted and then resigned.
      * [[2017–18 NCAA Division I men's basketball corruption scandal]] – An ongoing [[Federal Bureau of Investigation|FBI]] investigation into corruption in NCAA men's basketball that has so far resulted in the arrest of 10 individuals, including college assistant coaches from Arizona, Auburn, Oklahoma State, and USC plus high-ranking executives of sports apparel giant [[Adidas]]. Other programs initially implicated in the scandal included Louisville, Miami (FL), and South Carolina. Louisville placed head coach [[Rick Pitino]] and athletic director [[Tom Jurich]] (the latter not directly involved in the scandal) on administrative leave, and soon fired both. Further revelations in February 2018 saw more than a dozen additional programs possibly implicated.

      == Cricket scandals ==
      {{further|Betting controversies in cricket}}
      *'''[[Underarm bowling incident of 1981]]''' - Australia's [[Trevor Chappell]] became very infamous when Australia played New Zealand at the MCG on February 1, 1981, Australian captain [[Greg Chappell]] instructed the bowler (and younger brother Trevor) to bowl the last ball underarm to New Zealand batsmen [[Brian McKechnie]] to prevent him from hitting a six. After the bowl, McKechnie threw his bat onto the ground in disgust and Australia won the match. Negative post reactions then occurred after the match. Trevor Chappell was best remembered for the incident.
      *'''[[John the bookmaker controversy]]''' – a scandal in which [[Australia national cricket team|Australia]]'s [[Mark Waugh]] and [[Shane Warne]] were paid in 1994–95 to provide information on [[cricket pitch|pitch]] and weather conditions to an Indian bookmaker. The scandal came to light in 1998.
      *'''[[South Africa cricket match fixing]]''' in 2000 which resulted in the banning from cricket of [[Hansie Cronje]]
      * [[Ball tampering controversy in August 2006]] - On August 20, 2006, when Pakistan toured England in the fourth test, the umpires [[Darrell Hair]] and [[Billy Doctrove]] ruled that the Pakistani team had been ball tampering and gave five penalty runs to England then offered them a new ball. After the tea break, Pakistan refused to take the field in protest at the decision. Thus, England won the match by forfeit. After the incident, the whole Pakistan team were busted of the scandal and umpire Darrell Hair was banned from umpiring in cricket.
      * '''[[Pakistan cricket spot-fixing scandal]]''' – in 2010, three [[Pakistan national cricket team|Pakistan]] players—team captain [[Salman Butt]], [[Mohammad Asif (cricketer)|Mohammad Asif]] and [[Mohammad Amir]]—were accused of involvement in a [[spot-fixing]] scheme in which they allegedly accepted large sums of money to influence specific events within a match, as opposed to an actual match result. After an investigation, the [[International Cricket Council|ICC]] banned all three from the sport for periods from 5 to 10 years. Later, Butt and Asif were tried in a London court and found guilty of charges related to the scheme, whilst Amir pleaded guilty to similar charges in the same court. All received prison sentences ranging from 6 to 30 months.
      *'''[[2013 Indian Premier League spot-fixing and betting case]]'''
      * '''[[2018 Australian ball-tampering scandal]]''' - In 2018, When Australia toured South Africa, Australia's [[Cameron Bancroft]] was seen on camera rubbing the ball with a small yellow object then hid the object in his underwear. The umpires then ruled he was ball tampering. It was then found that Australian captain [[Steve Smith (cricketer)|Steve Smith]] and vice captain [[David Warner (cricketer)|David Warner]] were also found to have been involved in the incident. Smith and Warner were then banned for 12 months from international and domestic cricket while Bancroft was banned for 9 months. Smith was also temporarily banned from captaining Australia while Warner received a life ban from captaining.
      *'''[[2018 Sri Lankan cricket pitch fixing and betting scandal]]'''

      == Doping scandals ==
      * [[Doping in sport]]
      * [[Ben Johnson (Canadian sprinter)|Ben Johnson]]'s positive test for steroids after his 1988 Olympic victory in the [[100 metres]]
      * The [[Festina affair]] – a series of doping investigations and scandals surrounding the [[1998 Tour de France]], initially focusing on the [[Festina (cycling team)|Festina cycling team]], but quickly [[Doping at the 1998 Tour de France|spreading to several other teams]].
      * The ''[[Mitchell Report]]'' – 88 current and former [[Major League Baseball]] (MLB) players were alleged to have used steroids or other performance-enhancing drugs.
      * The [[Barry Bonds perjury case|conviction of Barry Bonds]] (2011) – later overturned on obstruction of justice charges relating to the BALCO investigation
      * [[Operación Puerto doping case|Operación Puerto]] (2006) – a Spanish investigation into a doping scheme allegedly involving many top cyclists, including several potential contenders in the [[2006 Tour de France]].
      * [[Floyd Landis doping case]] (2006) – [[Floyd Landis]], initially the winner of the [[2006 Tour de France]], tested positive for synthetic testosterone and was stripped of his title.
      * [[Doping at the 2007 Tour de France]] – the [[2007 Tour de France]] was rocked by a series of doping scandals. Two riders, including pre-race favorite [[Alexander Vinokourov]], were disqualified for doping offenses. Both teams involved pulled out of the Tour. A third rider, who had abandoned the Tour after a crash, was revealed to have tested positive for testosterone before the Tour. The [[General classification in the Tour de France|race leader]], [[Michael Rasmussen (cyclist)|Michael Rasmussen]], was removed from the Tour by [[Team LottoNL–Jumbo|his team]] with four stages left amid questions surrounding his possible involvement in doping.
      * [[Lance Armstrong doping case]] (2012) – after having been accused of doping for much of the latter part of his career, [[Lance Armstrong]] became the subject of an investigation by the [[United States Anti-Doping Agency]]. The USADA report revealed that he had engaged in a highly sophisticated doping campaign from 1998 onward. Following the report, the [[Union Cycliste Internationale|UCI]] stripped all of Armstrong's results and awards from that time forward, including his then-record seven [[Tour de France]] wins.
      * [[Biogenesis baseball scandal]] (2013) – more than a dozen MLB players were found to have received [[Performance-enhancing substance|PEDs]], mainly [[human growth hormone]], from a now-defunct anti-aging clinic in the Miami area. In all, 13 players received suspensions of 50 or more games, with the longest being given to [[Alex Rodriguez]] (162 games) and [[Ryan Braun]] (65 games). The number of players suspended is the most for any single incident in the history of organized baseball in North America.
      * [[Essendon Football Club supplements saga]] (2013) – in February 2013, the [[Essendon Football Club]], a professional [[Australian rules football]] club participating in the [[Australian Football League]] (AFL), were investigated by the [[Australian Sports Anti-Doping Authority]] (ASADA) and the [[World Anti-Doping Agency]] (WADA) over the legality of its supplements program during the [[2012 AFL season]] and the preceding preseason. In January 2016, the players were found guilty of having used the banned peptide [[thymosin beta-4]], resulting in the suspensions of thirty-four players who were part of the program.
      * [[Cronulla-Sutherland Sharks supplements saga]] (2013) – in February 2013, the [[Cronulla-Sutherland Sharks]], a professional rugby league team participating in the [[National Rugby League]] (NRL), were investigated by the ASADA and the WADA over the legality of its supplements program during the preseason and the regular [[2011 NRL season]]. In August 2014, the players were found guilty of having used the banned peptide [[CJC-1295]], resulting in the suspensions of fourteen players who were part of the program.<ref>{{cite web|url=https://www.smh.com.au/rugby-league/league-news/who-duped-cronulla-sharks-players-and-how-did-they-do-it-20140825-10823s.html|title=Who 'duped' Cronulla Sharks players and how did they do it?|last=Walter|first=Brad|date=25 August 2014|publisher=[[Sydney Morning Herald]]|accessdate=13 October 2016}}</ref>

      ==Skating scandals==

      === Figure skating scandals ===
      * [[Tonya Harding#Nancy Kerrigan|Attack on Nancy Kerrigan]] - [[Nancy Kerrigan]] was attacked after a practice session at the [[1994 U.S. Figure Skating Championships]]. Kerrigan's main team competitor, [[Tonya Harding]], was accused of being involved in the attack.
      * [[Kamila Valieva]]'s failed drug test - [[Kamila Valieva]] failed a drug test for a banned heart medication in December 2021. This drug test result only surfaced after the figure skating team event in the [[2022 Beijing Olympic Games]], in which she competed for the [[Russian Olympic Committee|ROC]]. Despite the result of the drug test, [[Kamila Valieva]] was cleared to skate in the [[Beijing 2022]] singles event by the [[Court of Arbitration for Sport]] the following week, as she was considered a protected person due to being only 15 years of age. This decision was highly controversial and has resulted in the minimum age for competing in the [[Olympic Games]] for figure skating to rise from 15 years of age to 17 years of age.{{citation needed|date=June 2023}}

      === Short track speed skating scandals ===
      * [[Cho Jae-beom]] was convicted for 10.5 years in jail in January 2021 of sexual abuse of multiple Olympic gold medalist [[Shim Suk-hee]].<ref>{{Cite news|url=https://www.nytimes.com/2021/01/21/world/asia/south-korea-speed-skating-coach-rape.html|title = Ex-Coach Sentenced to 10 Years for Raping Star Skater|newspaper = The New York Times|date = 21 January 2021|last1 = May|first1 = Tiffany|last2 = Kim|first2 = Youmi}}</ref>

      == Gliding scandals ==

      * During the 2020 [[World Gliding Championships#Women's World Gliding Championships|Women's World Gliding Championships]] at [[Keepit Dam|Lake Keepit]], [[Australia]], the home team captain Terry Cubley (Executive Officer of the [[Gliding Federation of Australia|GFA]]) was charged with unsporting behaviour for hacking the official tracking system to bypass the mandatory 15 minute delay and forward real time competitors' positions to his team, granting a tactical advantage. An investigation revealed that Matt Gage had been closely involved with the developers of the tracking system, and was aware of an undocumented back door that allowed the team captain (Terry Cubley) to bypass the 15 minute delay. This real-time information was relayed by the team captain over the radio to the Australian pilots. This was the first time in the sport's history that an entire team had been penalised for unsporting behaviour, with the Competition Director applying a penalty of 25 points per pilot per day. Controversially the pilots involved were spared disqualification only receiving a relatively trivial points reduction (compared to a competing pilot who was disqualified for infringing airspace earlier in the competition). Following a subsequent GFA investigation two of the Australian Team admitted to cheating and the GFA made a formal apology to the FAI and the wider gliding community. Terry Cubley was removed from his role as Vice President of the [[FAI Gliding Commission|IGC]], but chose to remain as Executive Officer of the GFA . The pilots involved chose to appeal against this decision, resulting in the longest and most comprehensive investigation in the FAIs history. The final judgement <ref>{{cite web|url=https://www.fai.org/sites/default/files/iat_wwgc2019_report_and_decision.pdf|title=FAI tribunal results|website=www.fai.org|access-date=6 December 2021}}</ref> described the actions of the pilots as ‘reprehensible’, increased the penalty to disqualification and removed their flights from the competition record. The Appeal Tribunal also recommended the FAI to take further disciplinary action against those involved. Following the Tribunals verdict Lisa Turner (the Australian pilots’ representative to the tribunal) issued a press release re-iterating their denial of cheating, accused the tribunal of bias against the Australian team and announced a further appeal to the Court of Arbitration for Sport [[Court of Arbitration for Sport|CAS]].

      == Golf scandals ==
      * [[Jane Blalock cheating controversy]] – one of the [[LPGA|LPGA Tour]]'s top players, [[Jane Blalock]], was accused of illegally marking her golf ball on the green. She was suspended and fined by the tour, but Blalock in turn filed suit and won an injunction that allowed her to continue playing. Blalock eventually won her lawsuit and she and the LPGA reached an out-of-court settlement.
      * [[Vijay Singh]], a former number one golfer in the world, was suspended from the [[PGA Tour]] for using deer antler spray, which violated the PGA Tour Anti-Doping Policy. Likewise in 1985, Vijay Singh was caught erasing his score on a hole and replacing it with a lower score after the scorecard had been signed. Once the rules officials confirmed the allegations, Singh was banned from the [[Asian Tour]]. To this day, Singh has not acknowledged that he cheated.<ref>"Golf Spelled Backwards*." : The Vijay Singh Cheating Incident. Golf Spelled Backwards, 30 Jan. 2013. Web. 8 May 2015.</ref>

      == Gymnastics scandals ==
      * [[Age controversies in gymnastics]]
      * [[USA Gymnastics sex abuse scandal]] – former [[USA Gymnastics]] national team doctor, [[Larry Nassar]], was accused of sexual abuse by more than 150 girls and women. Nassar was sentenced to 60 years in prison on federal [[child pornography]] charges in December 2017, and was sentenced to 80 to 300 years in prison after two separate trials on sexual assault charges in January 2018, to be served consecutively.

      == Horse racing scandals ==
      * [[Show jumping horse killings]] – from 1975 to 1995, wealthy owners and trainers of [[show jumping]] horses conspired to electrocute and otherwise kill over-valued as well as under-performing animals in a 20-year-long scheme to defraud insurance companies. Crimes also committed during this equestrian sports scandal include extortion, mail fraud, animal cruelty and the murder of at least one human being.
      * [[Fine Cotton]]/[[Bold Personality]] ring-in – a 1984 betting scam in which the conspirators, which included some elite figures in Australian Thoroughbred racing, substituted the far more talented Bold Personality for Fine Cotton in a low-class race. The scheme was discovered immediately after the race and the investigation led to lifetime bans for six individuals and bans of more than a decade for at least two more.
      *[[2020 Horse racing doping scam]] – the scam was revealed in March 2020,<ref>{{Cite web|url=http://ustrottingnews.com/category/regulatory/|title = Regulatory – U.S. Trotting News}}</ref> when the FBI cracked down several top names in American horse racing. Initially, 27 people (trainers and veterinarians) were charged with doping, which later increased to 29 people.<ref>{{Cite web|url=https://www.aftonbladet.se/a/QoA9OQ|title = Världsrekordtränare fast i dopningsrazzia}}</ref><ref>{{Cite web|url=https://www.expressen.se/sport/trav/skandalen-avslojad-stjarnor-har-atalats/|title = Skandalen avslöjad – efter hjälp från FBI}}</ref><ref>{{Cite web|url=https://www.harnessracing.com/news/main/oakes-surick-among-27-facing-doping-charges-3-9-2020|title=Oakes, Surick among 27 facing doping charges|access-date=2021-10-23|archive-date=2020-06-23|archive-url=https://web.archive.org/web/20200623135705/https://www.harnessracing.com/news/main/oakes-surick-among-27-facing-doping-charges-3-9-2020|url-status=dead}}</ref>

      == Ice hockey scandals ==
      *[[Operation Slapshot]] (2006) – investigation into a gambling ring allegedly operated by [[National Hockey League]] assistant coach [[Rick Tocchet]].
      *[[Chicago Blackhawks Sexual Assault Scandal]] (2010) - [[Kyle Beach]], former NHL player, was sexually assaulted by then assistant coach Brad Aldrich during the [[2009-10 Chicago Blackhawks season]]. Even though the incident was known by the front office, no actions were taken to provide Beach with a proper care and recovery. The scandal was under the radar for almost a decade when Beach decided to formally expose the incident.

      == Match-fixing scandals ==
      * Ten of the twelve members of the gold medal-winning Spanish basketball team at the [[2000 Summer Paralympics]] were [[cheating at the Paralympic Games#Basketball controversy|revealed to have no disability]].<ref>{{Cite news|date=2000-11-24|title=Spain in Paralympics scandal|language=en-GB|url=https://news.bbc.co.uk/sport2/hi/other_sports/1039129.stm|access-date=2021-01-12}}</ref>
      * [[Fresno Case]] scandal (2004) – an attempt to rig a vote to prevent the [[Catalonia|Catalan]] [[Roller hockey (quad)|rink hockey]] team from being accepted into international competition.
      * [[Melbourne Football Club tanking scandal]] (2009) – allegations arose that the club deliberately lost matches in [[2009 Melbourne Football Club season|2009]] so that it would put itself into a position whereby they would secure a [[priority draft pick]] at [[2009 AFL draft|that year's draft]].<ref>{{citation|newspaper=Herald Sun|first=Jon|last=Ralph|date=3 August 2011|accessdate=10 November 2011|publication-place=Melbourne, VIC|url=http://www.heraldsun.com.au/sport/afl/how-melbourne-tanked-in-2009/story-fn6cisdj-1226107012777|title=How Melbourne tanked in 2009}}</ref>
      * In 2011, snooker player [[John Higgins]] was accused of accepting bribery in order to lose frames purposefully. Higgins denied any accusations of match-fixing and bribery, however, he was found guilty of accepting bribery while there was no evidence for him match-fixing. "World number one John Higgins has been suspended from all future tournaments after reportedly agreeing to take a £261,000 bribe to lose frames."<ref>{{cite news |title=John Higgins suspended in snooker bribe probe |url=https://news.bbc.co.uk/1/hi/uk/8656905.stm |website=BBC|date=2 May 2010 }}</ref>
      * [[Match fixing in tennis]]
      * [[1964 British football match-fixing scandal]]
      * [[1971 Bundesliga scandal]]
      * [[Match-fixing investigations of Norwegian Second Division]]
      * [[Match fixing in English football]]
      * [[Match fixing in Romanian football]]

      == Motorsport and racing scandals ==
      * [[1994 Formula One cheating controversy]] – a number of allegations of cheating were thrown during the 1994 Formula One season, particularly to the [[Benetton Formula|Benetton]] team.
      * [[2007 Gatorade Duels|2007 NASCAR Gatorade Duel scandal]] – three various incidents related to the [[Gatorade Duel]].
      * [[2007 Formula One espionage controversy]], commonly known as '''Spygate''' – an incident in which [[Scuderia Ferrari]] mechanic [[Nigel Stepney]] passed on a secret document to [[Mike Coughlan]] of [[McLaren]].
      * [[Renault Formula One crash controversy|2008 race fixing controversy]], also known as '''Crashgate''' – it was surrounded by allegations in [[Formula One]] that driver [[Nelson Piquet Jr.]] deliberately crashed in the [[2008 Singapore Grand Prix]] to help his [[Renault in Formula One|Renault]] teammate [[Fernando Alonso]] win. [[Felipe Massa]] is pursuing legal action against [[Formula One Group|Formula One Management]], [[Fédération Internationale de l'Automobile|the FIA]] and [[Bernie Ecclestone]] for a sum of £64m over Crashgate as he believes the FIA should have voided all points awarded in the Singapore Grand Prix, which would of led to him being [[2008 Formula One World Championship|2008 World Champion]]. A High Court of justice in London has ruled that the case can now go to trial.<ref>{{Cite news |title=Felipe Massa: Former Ferrari F1 driver's £64m claim over Lewis Hamilton's 2008 World Championship can go to trial |url=https://www.skysports.com/f1/news/12040/13473307/felipe-massa-former-ferrari-f1-drivers-lb64m-claim-over-lewis-hamiltons-2008-world-championship-can-go-to-trial |archive-url=http://web.archive.org/web/20260129011926/https://www.skysports.com/f1/news/12040/13473307/felipe-massa-former-ferrari-f1-drivers-lb64m-claim-over-lewis-hamiltons-2008-world-championship-can-go-to-trial |archive-date=2026-01-29 |access-date=2026-02-10 |work=Sky Sports |language=en-GB}}</ref>
      * [[2013 Federated Auto Parts 400]] – in the final [[2013 NASCAR Sprint Cup Series|Sprint Cup]] race, before the field was set for the 2013 [[NASCAR playoffs|Chase for the Sprint Cup]], three teams—[[Michael Waltrip Racing]], [[Team Penske|Penske Racing]] and [[Front Row Motorsports]]—were found to have [[2013 Federated Auto Parts 400#Race manipulation controversy|extensively manipulated the race finish]] in an attempt to secure Chase places for MWR driver [[Martin Truex Jr.]] and Penske driver [[Joey Logano]].
      *[[2019 Ford EcoBoost 400]] – in the final race of the [[2019 Monster Energy NASCAR Cup Series]], three teams – [[Premium Motorsports]], [[Spire Motorsports]] and [[Rick Ware Racing]] – were found to have manipulated the race finish by parking their cars in order to allow the No. 27 team to score more points, passing the [[Gaunt Brothers Racing]] No. 96 in the standings to obtain an end of season cash bonus.

      == Olympic Games scandals ==
      {{further|Olympic Games scandals and controversies}}
      * [[2002 Winter Olympic bid scandal]] – a number of [[International Olympic Committee|IOC]] members were forced to resign after it was uncovered that they had accepted inappropriately valuable "gifts" in return for voting for [[Salt Lake City]] to hold the Games.
      * [[2002 Winter Olympics figure skating scandal]] – dual gold medals were awarded in pairs figure skating to Canadian pair [[Jamie Salé]] and [[David Pelletier]], as well as to Russian pair [[Elena Berezhnaya]] and [[Anton Sikharulidze]], after allegations of collusion among judges.
      * [[Lochtegate]] – four United States swimmers at the [[2016 Summer Olympics]] including [[Ryan Lochte]] were involved in a scandal around an accusation being victims of armed robbery, which ultimately concluded with fines, loss of sponsorships, and statements of apology from the swimmers and various oversight organizations.
      * [[Doping in Russia|Russian doping scandal]] – Russia has the most (51) [[List of stripped Olympic medals|Olympic medals stripped]] for doping violations – four times the number of the second country (Belarus). From 2011 to 2015, more than a thousand Russian competitors in various sports, including summer, winter, and Paralympic sports, benefited from a cover-up<ref name="NYT161209">{{cite news|url=https://www.nytimes.com/2016/12/09/sports/russia-doping-mclaren-report.html|title=Russia's Doping Program Laid Bare by Extensive Evidence in Report|last=Ruiz|first=Rebecca R.|date=9 December 2016|work=The New York Times}}</ref> with no indication that the program has ceased since then.

      == Paralympic Games ==
      * [[Cheating at the Paralympic Games]] – in the [[2000 Summer Paralympics]], athletes from Spain competed and won the gold medal in the Basketball ID event despite the majority of players not having an intellectual disability. The fallout from this scandal saw all events for athletes with intellectual disabilities removed from the next two Summer Paralympics.<ref>{{cite news|url=https://news.bbc.co.uk/sport2/hi/other_sports/disability_sport/8323369.stm|title=Intellectual disability ban ends|date=21 November 2009|publisher=BBC News|access-date=26 September 2015}}</ref>

      == Rugby league scandals ==
      * [[Melbourne Storm salary cap breach]] – in 2010, the [[Melbourne Storm salary cap breach|Melbourne Storm]] were punished for breaching the salary cap and were stripped of the ability to accumulate points, had their name stripped from the premierships and minor premierships they had gained over the previous four years and forced to pay back millions of dollars of prize money.<ref>{{Cite web|last=Barrett|first=Chris|date=2010-04-22|title=Melbourne Storm stripped of premierships for salary cap breaches|url=https://www.theage.com.au/sport/nrl/melbourne-storm-stripped-of-premierships-for-salary-cap-breaches-20100422-td91.html|access-date=2021-01-12|website=The Age|language=en}}</ref> It is the toughest punishment for a salary cap breach in NRL history.
      * [[Cronulla-Sutherland Sharks supplements saga|Cronulla Sharks supplements doping scandal]] – following an extensive investigation by ASADA, players from the [[Cronulla-Sutherland Sharks|Cronulla Sharks]] were found guilty of having used the banned peptide CJC-1295, resulting in the suspensions of fourteen players. A number of senior staff were dismissed or resigned and several senior club members received penalties and suspensions.<ref>{{Cite web|last=Walter|first=Brad|date=2014-08-25|title=Who 'duped' Cronulla Sharks players and how did they do it?|url=https://www.smh.com.au/sport/nrl/who-duped-cronulla-sharks-players-and-how-did-they-do-it-20140825-10823s.html|access-date=2021-01-12|website=The Sydney Morning Herald|language=en}}</ref>
      * [[Matthew Johns|Matthew Johns sexual assault allegations]] – in 2002, while on a trip to New Zealand, Cronulla-Sutherland Sharks player [[Matthew Johns]] took part in degrading group sex with a young woman while up to 11 of his teammates joined in. The scandal was reported by the [[Australian Broadcasting Corporation|ABC]]'s ''[[Four Corners (Australian TV program)|Four Corners]]'' TV series.<ref>{{cite web| url = http://www.abc.net.au/4corners/content/2009/s2567972.htm| url-status = dead| archive-url = https://web.archive.org/web/20090514233730/http://www.abc.net.au/4corners/content/2009/s2567972.htm| archive-date = 2009-05-14| title = Four Corners - 11/05/2009: Program Transcript| website = [[Australian Broadcasting Corporation]]}}</ref> Johns admitted having consensual sex with the girl and made a public apology on [[Nine Network|Channel Nine]]'s ''[[The Footy Show (rugby league)|The Footy Show]]''. Johns was suspended from ''The Footy Show'' and was released by the Melbourne Storm as their assistant coach.<ref>{{Cite web|date=2009-05-16|title=Matthew Johns stood down by Melbourne Storm and Channel 9 {{!}} Herald Sun|url=http://www.news.com.au/heraldsun/story/0,21985,25469726-661,00.html|access-date=2021-01-12|archive-url=https://web.archive.org/web/20090516182421/http://www.news.com.au/heraldsun/story/0,21985,25469726-661,00.html|archive-date=2009-05-16}}</ref>

      == Rugby union scandals ==
      {{further|Rugby union and apartheid}}
      * [[Grannygate]] – scandal in March 2000 over the eligibility of [[Shane Howarth]] and [[Brett Sinkinson]] representing the [[Wales national rugby union team|Wales national team]]
      * [[Kamp Staaldraad]] – controversial training camp for the [[South Africa national rugby union team|Springboks]] ([[South Africa]]'s national [[rugby union]] team) before the [[2003 Rugby World Cup]]
      * "[[Bloodgate]]" – a scheme by the [[Guinness Premiership|English]] [[rugby union]] club [[Harlequin F.C.|Harlequins]] to fake an injury to [[Wing (rugby union)|wing]] [[Tom Williams (rugby player, born 1983)|Tom Williams]] to allow a [[blood replacement]] to be brought on at a critical moment in their [[2008–09 Heineken Cup#Quarter-finals|2009 Heineken Cup quarterfinal]] against [[Leinster Rugby|Leinster]]. The scheme, which included deliberately cutting Williams' mouth open after the match in order to cover up the fake injury, ultimately led to Quins head coach [[Dean Richards (rugby union)|Dean Richards]] being banned from the sport for three years.<ref>{{cite news|url=https://www.telegraph.co.uk/sport/rugbyunion/club/6047832/Dean-Richards-ban-how-Bloodgate-saga-unfolded.html |title=Dean Richards ban: how 'Bloodgate' saga unfolded |first=Emily |last=Benammar |work=[[The Daily Telegraph]] |date=2009-08-18 |accessdate=2009-08-18 | location=London}}</ref>

      == Sumo wrestling scandals ==
      * [[Tokitsukaze stable hazing scandal]] (2007)
      * [[Match-fixing in professional sumo#2011 investigation|Match Fixing Scandal]] (2011)
