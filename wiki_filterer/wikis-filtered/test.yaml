      In the late nineteenth century, elite colleges and universities had their own entrance exams and they required candidates to travel to the school to take the tests.<ref name=":41">{{Cite news|last=Dance|first=Amber|date=July 15, 2021|title=Has the Pandemic Put an End to the SAT and ACT?|work=Smithsonian Magazine|url=https://www.smithsonianmag.com/innovation/has-pandemic-put-end-to-sat-act-180978167/|access-date=August 26, 2021}}</ref> To better organize matters, the [[College Board]], a consortium of colleges in the [[northeastern United States]], was formed in late 1899 to establish a nationally administered, uniform set of essay tests based on the curricula of the boarding schools that typically provided graduates to the colleges of the [[Ivy League]] and [[Seven Sisters (colleges)|Seven Sisters]], among others.<ref name=lemann-sat>{{cite encyclopedia |editor-first=Rebecca|editor-last=Zwick|last=Lemann|first=Nicholas|location=New York|pages=5–14|publisher=RoutledgeFalmer|year=2004|title=A History of Admissions Testing|encyclopedia=Rethinking the SAT: The Future of Standardized Testing in University Admissions}}</ref><ref name=crouse-sat>{{cite book|last1=Crouse|first1=James|last2=Trusheim|first2=Dale|title=The Case Against the SAT|date=1988|publisher=The University of Chicago Press|location=Chicago|pages=16–39}}</ref> The first College Board exam—covering mathematics, the physical sciences, history, languages, and other subjects—was administered in 1901 to fewer than 1,000 candidates.<ref name=":41" />

      In the same time period, [[Lewis Terman]] and others began to promote the use of tests such as [[Alfred Binet]]'s in American schools. Terman in particular thought that such tests could identify an innate "[[intelligence quotient]]" (IQ) in a person. The results of an IQ test could then be used to find an elite group of students who would be given the chance to finish high school and go on to college.<ref name=lemann-sat /> By the mid-1920s, the increasing use of IQ tests, such as the Army Alpha test administered to recruits in [[World War I]], led the College Board to commission the development of the SAT. The commission, headed by [[Carl Brigham]], argued that the test predicted success in higher education by identifying candidates primarily on the basis of intellectual promise rather than on specific accomplishment in high school subjects, with the specific aim to exclude Black students:<ref name=crouse-sat />

      {{blockquote |text=[Brigham] created the test to uphold a racial caste system. He advanced this theory of standardized testing as a means of upholding racial purity in his book ''A Study of American Intelligence''. The tests, he wrote, would prove the racial superiority of white Americans and prevent "the continued propagation of defective strains in the present population"—chiefly, the "infiltration of white blood into the Negro".<ref name=atlantic-sat>{{Cite web |url=https://www.theatlantic.com/technology/archive/2019/05/college-board-sat-adversity-score/589681/ |title=The Problem with the SAT's Idea of Objectivity |website=[[The Atlantic]] |date=18 May 2019 |access-date=2019-11-12 |archive-url=https://web.archive.org/web/20191112181753/https://www.theatlantic.com/technology/archive/2019/05/college-board-sat-adversity-score/589681/ |archive-date=2019-11-12 |url-status=live }}</ref>}}

      By 1930, however, Brigham would repudiate his own conclusions, writing that "comparative studies of various national and racial groups may not be made with existing tests"<ref name=hubin-thesis /> and that SAT scores could not reflect some innate, [[Heritability of IQ|genetically-based]] ability, but instead would be "a composite including schooling, family background, familiarity with English and everything else, relevant and irrelevant."<ref name=atlantic-sat /> In 1934, [[James Bryant Conant|James Conant]] and [[Henry Chauncey]] used the SAT as a means to identify recipients for scholarships to [[Harvard University]]. Specifically, Conant wanted to find students, other than those from the traditional northeastern private schools, that could do well at Harvard. The success of the scholarship program and the advent of [[World War II]] led to the end of the College Board essay exams and to the SAT being used as the only admissions test for College Board member colleges.<ref name=lemann-sat />

      The SAT rose in prominence after World War II due to several factors. Machine-based scoring of multiple-choice tests taken by pencil had made it possible to rapidly process the exams.<ref name=hubin-thesis>{{cite thesis |type=Ph.D. |last=Hubin |first=David R. |date=1988 |title=The SAT – Its Development and Introduction, 1900–1948 |publisher=University of Oregon}}</ref> At the time, elite colleges were admitting mainly students from elite private schools and wanted to take in students from other backgrounds.<ref name=":52">{{Cite news|last1=Brangham|first1=William|last2=Yang|first2=John|date=November 5, 2019|title=Why colleges are reconsidering their reliance on standardized tests for admission|work=PBS Newshour|url=https://www.pbs.org/newshour/show/why-colleges-are-reconsidering-their-reliance-on-standardized-tests-for-admission|access-date=January 25, 2022}}</ref> The [[G.I. Bill]] produced an influx of millions of veterans into higher education.<ref name=hubin-thesis /><ref>{{cite web|title=G.I Bill History and Timeline|url=http://www.benefits.va.gov/gibill/history.asp|access-date=28 July 2016|archive-url=https://web.archive.org/web/20160727010543/http://www.benefits.va.gov/gibill/history.asp|archive-date=27 July 2016|url-status=live}}</ref>  The formation of the [[Educational Testing Service]] (ETS) also played a significant role in the expansion of the SAT beyond the roughly fifty colleges that made up the College Board at the time.<ref name=FuessRef>{{cite book |last=Fuess |first=Claude |author-link=Claude Fuess |title=The College Board: Its First Fifty Years |date=1950 |publisher=Columbia University Press |location=New York |url=https://archive.org/details/collegeboarditsf009307mbp |access-date=2016-08-05 |archive-url=https://web.archive.org/web/20171018201125/https://archive.org/details/collegeboarditsf009307mbp |archive-date=2017-10-18 |url-status=live }}</ref> The ETS was formed in 1947 by the College Board, [[Carnegie Foundation for the Advancement of Teaching]], and the [[American Council on Education]], to consolidate respectively the operations of the SAT, the [[Graduate Record Examinations|GRE]], and the achievement tests developed by [[Benjamin D. Wood|Ben Wood]] for use with Conant's scholarship exams.<ref name=hubin-thesis /> The new organization was to be philosophically grounded in the concepts of open-minded, scientific research in testing with no doctrine to sell and with an eye toward public service.<ref>{{cite web|last=Bennet|first=Randy Elliot|title=What Does It Mean to Be a Nonprofit Educational Measurement Organization in the 21st Century?|url=https://www.ets.org/Media/Research/pdf/Nonprofit.pdf|publisher=Educational Testing Service|access-date=28 Mar 2015|archive-url=https://web.archive.org/web/20110717202700/http://www.ets.org/Media/Research/pdf/Nonprofit.pdf|archive-date=17 July 2011|url-status=live}}</ref> The ETS was chartered after the death of Brigham, who had opposed the creation of such an entity. Brigham felt that the interests of a consolidated testing agency would be more aligned with sales or marketing than with research into the science of testing.<ref name=hubin-thesis /> It has been argued that the interest of the ETS in expanding the SAT in order to support its operations aligned with the desire of public college and university faculties to have smaller, diversified, and more academic student bodies as a means to increase research activities.<ref name=lemann-sat /> In 1951, about 80,000 SATs were taken; in 1961, about 800,000; and by 1971, about 1.5 million SATs were being taken each year.<ref name=sat-decline-1977>{{cite web |publisher=College Entrance Examination Board |year=1977 |title=On Further Examination: Report of the Advisory Panel on the Scholastic Aptitude Test Score Decline |url=http://research.collegeboard.org/sites/default/files/publications/2012/7/misc1977-1-report-sat-score-decline.pdf |access-date=June 24, 2014 |archive-url=https://web.archive.org/web/20141018013322/http://research.collegeboard.org/sites/default/files/publications/2012/7/misc1977-1-report-sat-score-decline.pdf |archive-date=October 18, 2014 |df=mdy-all }}</ref> As more and more students from all over the U.S. tried to enter college, the SAT became more of a high-stakes exam; colleges needed something they could trust to fairly assess a prospective student's scholastic aptitude.<ref name=":52"/>

      During the 2010s, there was concern over the continued decline of SAT scores,<ref name=":68">{{Cite news|last=Anderson|first=Nick|date=September 3, 2015|title=SAT scores at lowest level in 10 years, fueling worries about high schools|newspaper=The Washington Post|url=https://www.washingtonpost.com/local/education/sat-scores-at-lowest-level-in-10-years-fueling-worries-about-high-schools/2015/09/02/6b73ec66-5190-11e5-9812-92d5948a40f8_story.html|access-date=September 17, 2020}}</ref><ref name=":8">{{Cite news|last=Hobbs|first=Tawnell D.|date=September 24, 2019|title=SAT Scores Fall as More Students Take the Test|work=The Wall Street Journal|url=https://www.wsj.com/articles/sat-scores-fall-as-more-students-take-the-test-11569297660|url-status=live|access-date=February 2, 2021|archive-url=https://web.archive.org/web/20201128082452/https://www.wsj.com/articles/sat-scores-fall-as-more-students-take-the-test-11569297660|archive-date=November 28, 2020}}</ref> which might be due to the expansion of the test-taking population.<ref name=":8" /><ref name=":9">{{Cite journal|last1=Twenge|first1=Jean|last2=Campbell|first2=W. Keith|last3=Sherman|first3=Ryne A.|date=2019|title=Declines in vocabulary among American adults within levels of educational attainment, 1974–2016|journal=Intelligence|volume=76|article-number=101377|doi=10.1016/j.intell.2019.101377|s2cid=200037032}}</ref> (See graph below.)

      In the wake of [[2019 college admissions bribery scandal|Operation Varsity Blues]], it came to light that some wealthy parents obtained extra time on the SATs from doctors willing to sign off on false reports for the students.<ref>{{Cite web|title=The Truth About Getting Extra Time on the SAT {{!}} Psychology Today|url=https://www.psychologytoday.com/us/articles/201906/the-truth-about-getting-extra-time-the-sat|access-date=2021-10-20|website=www.psychologytoday.com|language=en}}</ref><ref name=":49">{{Cite news|last1=Wai|first1=Jonathan|last2=Brown|first2=Matt|last3=Chabris|first3=Christopher|date=2019|title=No one likes the SAT. It's still the fairest thing about admissions.|newspaper=The Washington Post|url=https://www.washingtonpost.com/outlook/no-one-likes-the-sat-its-still-the-fairest-thing-about-admissions/2019/03/22/5fa67a16-4c00-11e9-b79a-961983b7e0cd_story.html|url-status=live|access-date=February 15, 2021|archive-url=https://web.archive.org/web/20201117190723/https://www.washingtonpost.com/outlook/no-one-likes-the-sat-its-still-the-fairest-thing-about-admissions/2019/03/22/5fa67a16-4c00-11e9-b79a-961983b7e0cd_story.html|archive-date=November 17, 2020}}</ref> Already in the 2000s, concerns over parents obtaining fraudulent mental diagnoses to give their children an unfair advantage had been raised.<ref>{{Cite journal|last1=Haier|first1=Richard J.|last2=Jung|first2=Rex E.|date=2008|title=Brain Imaging Studies of Intelligence and Creativity: What is the Picture for Education?|url=https://www.tandfonline.com/doi/abs/10.1080/02783190802199347|journal=Roeper Review|volume=30|issue=3|pages=171–180|doi=10.1080/02783190802199347|s2cid=144517270|url-access=subscription}}</ref>

      [[File:Historical Average SAT Scores (Vector).svg|Historical average SAT scores of college-bound seniors.|800x800px|center]]

      == Timeline ==

      A timeline of notable events in the history of the SAT follows.

      === 1901: College Board begins administering exams ===
      [[File:College-Board-Exam-Math-A-1915.jpg|thumb|right|The Mathematics A exam of the 1915 College Board examinations.|alt=A page from a test booklet; there are six free-response algebra questions, often involving factoring and simplifying algebraic expressions.]]
      On June 17, 1901, the first exams of the [[College Board]] were administered to 973 students across 67 locations in the United States, and two in Europe. Although those taking the test came from a variety of backgrounds, approximately one third were from [[New York (state)|New York]], [[New Jersey]], or [[Pennsylvania]]. The majority of those taking the test were from private schools, academies, or endowed schools. About 60% of those taking the test applied to [[Columbia University]]. The test contained sections on [[English language|English]], [[French (language)|French]], [[German (language)|German]], [[Latin]], [[Greek (language)|Greek]], [[history]], [[geography]], [[political science]], [[biology]], [[mathematics]], [[chemistry]], and [[physics]].<ref name=Frontline1>{{cite web |url=https://www.pbs.org/wgbh/pages/frontline/shows/sats/where/1901.html |title=frontline: secrets of the sat: where did the test come from?: the 1901 college board |access-date=October 20, 2007 |website=Secrets of the SAT |publisher=[[Frontline (US TV series)|Frontline]] |archive-url=https://web.archive.org/web/20120304132941/http://www.pbs.org/wgbh/pages/frontline/shows/sats/where/1901.html |archive-date=March 4, 2012 |url-status=live }}</ref> The College Board exams, which required essay responses from students and took several days to administer, were graded on a scale with a maximum score of 100. Until 1910, the grades were accompanied by verbal designations: "Excellent" (90-100), "Good" (75-89), "Doubtful" (60-74), "Poor" (40-49) {{sic}} or "Very Poor" (below 40).{{r|FuessRef|p=66}}

      === 1926: First SAT administration ===
      [[File:Princeton-1925-test-three.png|thumb|right|alt=A page of analogy questions from the Princeton 1925 test|The analogies sub-test of the Princeton 1925 test]]
      The first administration of the SAT occurred on June 23, 1926, when it was known as the Scholastic Aptitude Test.<ref name=CBHistorical /><ref name=Frontline2 /> This test, prepared by a committee headed by Princeton psychologist [[Carl Brigham|Carl Campbell Brigham]], had sections of [[definition]]s, [[arithmetic]], classification<!-- possibly [[Classification (literature)]] ? I do not know, and it's hard to find a source -->, artificial language<!-- I'm hesitant to link to [[artificial language]], since the meaning could be so broad -->, [[antonym]]s, number series, [[analogies]], [[logical inference]], and paragraph reading. Several sections of the SAT were minor revisions of those appearing in a test that Brigham had given to incoming freshman to [[Princeton University]] in 1925. For example, sub-test three (analogies) of the Princeton test was used verbatim (except for the ordering of the questions) as the SAT analogies sub-test.<ref name=CBError>{{cite book |last=Brigham |first=Carl |date=1932 |title=A Study of Error |publisher=College Entrance Examination Board }}</ref>{{rp|248}} The Princeton test was itself derived from material taken from intelligence tests administered to recruits to the United States Army during World War I. Like many intelligence tests of the time, the non-mathematical questions on the SAT put considerable weight on word definitions and usage.<ref name=Lemann-book>{{cite book |last=Lemann |first=Nicholas |title=The Big Test: The Secret History of the American Meritocracy |publisher=Farrar, Straus, and Giroux |year=2000 }}</ref> The SAT was administered to 8,040 students (60% of them men) at over 300 test centers. The majority of men were applying to [[Yale University]], [[University of Pennsylvania]], or Princeton University, and the majority of women were applying to [[Smith College]], [[Wellesley College]], or [[Vassar College]].<ref name=Frontline2>{{cite web |url=https://www.pbs.org/wgbh/pages/frontline/shows/sats/where/1926.html |title=frontline: secrets of the sat: where did the test come from?: the 1926 sat |access-date=October 20, 2007 |website=Secrets of the SAT |publisher=[[Frontline (US TV series)|Frontline]] |archive-url=https://web.archive.org/web/20071031224001/http://www.pbs.org/wgbh/pages/frontline/shows/sats/where/1926.html |archive-date=October 31, 2007 |url-status=live }}</ref>{{r|CBError|p=331}} The test was paced rather quickly: test-takers were given 97 minutes to answer 315 questions.<ref name="CBHistorical">{{cite web |url=http://www.ets.org/Media/Research/pdf/RR-03-10-Lawrence.pdf |title=Research Report No. 2003-3: A Historical Perspective on the Content of the SAT |year=2003 |access-date=June 1, 2014 |last1=Lawrence |first1=Ida |last2=Rigol |first2=Gretchen W. |last3=Van Essen |first3=Thomas |last4=Jackson |first4=Carol A. |publisher=College Entrance Examination Board |archive-url=https://web.archive.org/web/20140605052134/http://www.ets.org/Media/Research/pdf/RR-03-10-Lawrence.pdf |archive-date=June 5, 2014 }}</ref> The raw score of each participating student was converted to a score scale with a mean of 500 and a standard deviation of 100. This scale was effectively equivalent to a 200 to 800 scale, although students could score more than 800 and less than 200.<ref name=hubin-thesis />

      === 1928{{endash}}1929: Math removal and more changes ===
      In 1928, the number of sections on the SAT was reduced to seven, and the time limit was increased to slightly under two hours. In 1929, the number of sections was again reduced, this time to six. These changes were designed in part to give test-takers more time per question. For these two years, all of the sections tested verbal ability: math was eliminated from the SAT.<ref name=CBHistorical /> The test developers, using test score data from 1926 and 1927 to calculate correlations between the various SAT sub-tests, felt that the mathematics sections were measuring a different component of intelligence than the verbal sections, and should be removed to be re-developed later as sub-tests with a score separate from that of the verbal sections.{{r|CBError|p=351-355}}

      === 1930s: Continuous changes ===
      In 1930 the SAT was first split into the verbal and math sections, a structure that would continue until 2005 when a new writing section would be added.<ref name=CBHistorical /> The verbal section of the 1930 test covered a more narrow range of content than its predecessors, examining only antonyms (with six possible answer choices), double definitions (filling in two blanks with provided words to best complete a sentence), and paragraph reading. In 1936, analogies were re-added. Between 1936 and 1946, students had between 80 and 115 minutes to answer 250 verbal questions (over a third of which were on antonyms). The mathematics test introduced in 1930 contained 100 free response questions to be answered in 80 minutes and focused primarily on speed. From 1936 to 1941, like the 1928 and 1929 tests, the mathematics section was eliminated. When the mathematics portion of the test was re-added in 1942, it consisted of multiple-choice questions.<ref name=CBHistorical />

      === 1941 and 1942: Standardized score scales introduced ===
      Until 1941, the scores on all SATs had been scaled to a [[arithmetic mean|mean]] of 500 with a [[standard deviation]] of 100. Although one test-taker could be compared to another for a given test date, comparisons from one year to another could not be made. For example, a score of 500 achieved on an SAT taken in one year could reflect a different ability level than a score of 500 achieved in another year. By 1940, it had become clear that setting the mean SAT score to 500 every year was unfair to those students who happened to take the SAT with a group of higher average ability.<ref name="SAT-Scale-Ref">{{cite web|last=Dorans|first=Neil|title=The Recentering of SAT® Scales and Its Effects on Score Distributions and Score Interpretations|url=https://files.eric.ed.gov/fulltext/ED563023.pdf|website=Research Report No. 2002-11|publisher=College Board|access-date=May 30, 2014|archive-url=https://web.archive.org/web/20140531090624/http://www.ets.org/Media/Research/pdf/RR-02-04-Dorans.pdf|archive-date=May 31, 2014|url-status=live}}</ref>

      In order to make cross-year score comparisons possible, in April 1941 the SAT verbal section was scaled to a mean of 500, and a standard deviation of 100, and the June 1941 SAT verbal section was [[equating|equated]] (linked) to the April 1941 test. All SAT verbal sections after 1941 were equated to previous tests so that the same scores on different SATs would be comparable. Similarly, in June 1942 the SAT math section was equated to the April 1942 math section, which itself was linked to the 1942 SAT verbal section, and all SAT math sections after 1942 would be equated to previous tests. From this point forward, SAT mean scores could change over time, depending on the average ability of the group taking the test compared to the roughly 10,600 students taking the SAT in April 1941. The 1941 and 1942 score scales would remain in use until 1995.<ref name=SAT-Scale-Ref /><ref name="SAT-Tech-Rep-1971">{{cite encyclopedia |year=1971 |title=The College Board Admissions Testing Program: A Technical Report on Research and Development Activities Relating to the Scholastic Aptitude Test and Achievement Tests |publisher=College Entrance Examination Board |location=New York |url=http://eric.ed.gov/?id=ED050181 |access-date=May 30, 2014 |editor-last=Angoff |editor-first=William |pages=32–33 |url-status=live |archive-url=https://web.archive.org/web/20140531090629/http://eric.ed.gov/?id=ED050181 |archive-date=May 31, 2014 |last2=Angoff |first2=William |last1=Donlon |first1=Thomas}} Available at the [http://files.eric.ed.gov/fulltext/ED050181.pdf Education Resources Information Center] [https://docs.google.com/viewer?url=http%3A%2F%2Ffiles.eric.ed.gov%2Ffulltext%2FED050181.pdf&embedded=true&chrome=false&dov=1] {{Webarchive|url=https://web.archive.org/web/20140531105101/http://files.eric.ed.gov/fulltext/ED050181.pdf|date=2014-05-31}}.</ref>

      === 1946: Verbal section changes ===
      Paragraph reading was eliminated from the verbal portion of the SAT in 1946, and replaced with reading comprehension, and "double definition" questions were replaced with sentence completions. Between 1946 and 1957, students were given 90 to 100 minutes to complete 107 to 170 verbal questions. Starting in 1958, time limits became more stable, and for 17 years, until 1975, students had 75 minutes to answer 90 questions. In 1959, questions on data sufficiency were introduced to the mathematics section and then replaced with quantitative comparisons in 1974. In 1974, both verbal and math sections were reduced from 75 minutes to 60 minutes each, with changes in test composition compensating for the decreased time.<ref name=CBHistorical />

      === 1960s and 1970s: Mean scores decline ===
      From 1926 to 1941, scores on the SAT were scaled to make 500 the mean score on each section. In 1941 and 1942, SAT scores were standardized via test [[equating]], and as a consequence, average verbal and math scores could vary from that time forward.<ref name=SAT-Scale-Ref /> In 1952, mean verbal and math scores were 476 and 494, respectively, and scores were generally stable in the 1950s and early 1960s. However, starting in the mid-1960s and continuing until the early 1980s, SAT scores declined: the average verbal score dropped by about 50 points, and the average math score fell by about 30 points. By the late 1970s, only the upper third of test takers were doing as well as the upper half of those taking the SAT in 1963. From 1961 to 1977, the number of SATs taken per year doubled, suggesting that the decline could be explained by [[demographics|demographic]] changes in the group of students taking the SAT. Commissioned by the College Board, an independent study of the decline found that most (up to about 75%) of the test decline in the 1960s could be explained by compositional changes in the group of students taking the test; however, only about 25 percent of the 1970s decrease in test scores could similarly be explained.<ref name=sat-decline-1977 /> Later analyses suggested that up to 40 percent of the 1970s decline in scores could be explained by demographic changes, leaving unknown at least some of the reasons for the decline.<ref>{{cite encyclopedia |editor-first=Carl |editor-last=Kaestle |first1=Lawrence |last1=Stedman |first2=Carl |last2=Kaestle |page=132 |contribution=The Great Test Score Decline: A Closer Look|publisher=Yale University Press |year=1991 |title=Literacy in the United States}}</ref>

      === 1993: SAT renamed ===

      By the late 1980s, the College Board was considering changes to its testing program<ref>{{cite news |url=https://www.edweek.org/education/college-board-ponders-changes-in-college-admission-test/1988/10 |title=College Board Ponders Changes in College Admission Test |periodical=Education Week |date=October 16, 1988 |archive-url=https://web.archive.org/web/20220816143157/https://www.edweek.org/education/college-board-ponders-changes-in-college-admission-test/1988/10 |archive-date=August 16, 2022 |url-status=live }}</ref> and had asked a group of educators and administrators from high schools and colleges to form a commission to review and advise the College Board proposals. In a 1990 report, the commission suggested that the [[initialism]] SAT, which up until this time stood for ''Scholastic Aptitude Test'', should be changed to stand for ''Scholastic Assessment Test'' because the test could "no longer be accurately described as a test of aptitude".<ref>{{cite book |author=Commission on New Possibilities for the Admissions Testing Program |title=Beyond Prediction |publisher=College Entrance Examination Board |page=9 |date=1990 }}</ref><ref>{{cite news |title=S.A.T. Revisions Will Be Included In Spring '94 Test |periodical=Education Week |date=November 7, 1990 |last=Pitsch |first=Mark }}</ref> In 1993, the College Board changed the name of the test to ''SAT I: Reasoning Test'' and changed the name of the [[SAT Subject Tests|Achievement Tests]] to ''SAT II: Subject Tests''.<ref name=FAQ>{{cite web|url=http://www.collegeboard.com/student/testing/sat/about/sat/FAQ.html |title=SAT FAQ: Frequently Asked Questions |access-date=May 29, 2007 |publisher=[[College Board]] |archive-url=https://web.archive.org/web/20080325225035/http://www.collegeboard.com/student/testing/sat/about/sat/FAQ.html |archive-date=March 25, 2008}}</ref> Together, all of these tests were to be collectively known as the ''Scholastic Assessment Tests''. The president of the College Board at the time said that the name change was meant "to correct the impression among some people that the SAT measures something that is innate and impervious to change regardless of effort or instruction."<ref>{{cite news |title=SAT Changes Name, But It Won't Score 1,600 With Critics |newspaper=Washington Post |date=March 27, 1993 |last=Jordan |first=Mary }}</ref>

      === 1994: Major changes ===
      In early 1994, substantial changes were made to the SAT.<ref name=SATrev94>{{cite news |url=https://www.nytimes.com/1994/03/20/nyregion/revised-and-renamed-sat-brings-same-old-anxiety.html |title=Revised and Renamed, S.A.T. Brings Same Old Anxiety |newspaper=The New York Times |date=March 20, 1994 |last=Honan |first=William |access-date=February 18, 2017 |archive-url=https://web.archive.org/web/20170708000315/http://www.nytimes.com/1994/03/20/nyregion/revised-and-renamed-sat-brings-same-old-anxiety.html |archive-date=July 8, 2017 |url-status=live }}</ref> Antonyms were removed from the verbal section in order to make rote memorization of vocabulary less useful. Also, the fraction of verbal questions devoted to passage-based reading material was increased from about 30% to about 50%, and the passages were chosen to be more like typical college-level reading material, compared to previous SAT reading passages. The changes for increased emphasis on analytical reading were made in response to a 1990 report issued by a commission established by the College Board. The commission recommended that the SAT should, among other things, "approximate more closely the skills used in college and high school work".<ref name=CBHistorical /> A mandatory essay had been considered as well for the new version of the SAT; however, criticism from minority groups, as well as a concomitant increase in the cost of the test necessary to grade the essay, led the College Board to drop it from the planned changes.<ref>{{cite news |url=https://www.nytimes.com/1990/11/01/us/revisions-adopted-in-college-entrance-tests.html |title=Revisions Adopted in College Entrance Tests |newspaper=The New York Times |date=November 1, 1990 |last=DePalma |first=Anthony |access-date=February 18, 2017 |archive-url=https://web.archive.org/web/20170417203311/http://www.nytimes.com/1990/11/01/us/revisions-adopted-in-college-entrance-tests.html |archive-date=April 17, 2017 |url-status=live }}</ref>

      [[File:SAT-Grid-In-Example.svg|thumb|right|An example of an SAT student-produced response ("grid-in") math question (introduced in 1994) and the correctly gridded answer]]
      Major changes were also made to the SAT mathematics section at this time, due in part to the influence of suggestions made by the [[National Council of Teachers of Mathematics]]. Test-takers were now permitted to use calculators on the math sections of the SAT. Also, for the first time since 1935, the SAT would now include some math questions that were not multiple choice, and would require students to supply the answers for those questions. According to the College Board, this new question format would be less susceptible to guessing using answer choices and other "back-door" approaches to solving multiple-choice questions. Additionally, some of these "student-produced response" questions could have more than one correct answer. The tested mathematics content on the SAT was expanded to include concepts of [[slope]] of a [[line (geometry)|line]], [[probability]], elementary statistics including [[median]] and [[mode (statistics)|mode]], and problems involving counting.<ref name=CBHistorical />

      === 1995: Recentering (to raise the mean score back to 500) ===
      By the early 1990s, average combined SAT scores were around 900 (typically, 425 on the verbal and 475 on the math). The average scores on the 1994 modification of the SAT I were similar: 428 on the verbal and 482 on the math.<ref>{{cite web|url=http://nces.ed.gov/programs/digest/d98/d98t132.asp|title=Scholastic Assessment Test Score Averages for High-School College-Bound Seniors|access-date=May 23, 2014|publisher=National Center for Education Statistics|archive-url=https://web.archive.org/web/20140524030416/http://nces.ed.gov/programs/digest/d98/d98t132.asp|archive-date=May 24, 2014|url-status=live}}</ref> SAT scores for admitted applicants to highly selective colleges in the United States were typically much higher. For example, the score ranges of the middle 50% of admitted applicants to [[Princeton University]] in 1985 were 600 to 720 (verbal) and 660 to 750 (math).<ref>{{cite book|author=<!--Staff writer(s); no by-line.-->|title=The College Handbook, 1985–86|date=1985|page=953|publisher=College Entrance Examination Board|location=New York}}</ref> Similarly, median scores on the modified 1994 SAT for freshmen entering [[Yale University]] in the fall of 1995 were 670 (verbal) and 720 (math).<ref>{{cite web|title=Yale University Scholastic Assessment Test (SAT) Scores for Freshmen Matriculants Class of 1980 – Class of 2017|url=http://oir.yale.edu/node/56/attachment|format=PDF|access-date=June 4, 2014|archive-url=https://web.archive.org/web/20140714112012/http://oir.yale.edu/node/56/attachment|archive-date=July 14, 2014|df=mdy-all}}</ref> For the majority of SAT takers, however, verbal and math scores were below 500: In 1992, half of the college-bound seniors taking the SAT were scoring between 340 and 500 on the verbal section and between 380 and 560 on the math section, with corresponding median scores of 420 and 470, respectively.<ref>{{cite book |page=9 |publisher=College Entrance Examination Board |year=1992 |title=College-Bound Seniors: 1992 Profile of SAT and Achievement Test Takers |url=http://eric.ed.gov/?id=ED351352 |access-date=June 21, 2014 |archive-url=https://web.archive.org/web/20140714173015/http://eric.ed.gov/?id=ED351352 |archive-date=July 14, 2014 |url-status=live }} Available at the [http://files.eric.ed.gov/fulltext/ED351352.pdf Education Resources Information Center] {{Webarchive|url=https://web.archive.org/web/20140714143658/http://files.eric.ed.gov/fulltext/ED351352.pdf |date=2014-07-14 }}.</ref>

      The drop in SAT verbal scores, in particular, meant that the usefulness of the SAT score scale (200 to 800) had become degraded. At the top end of the verbal scale, significant gaps were occurring between raw scores and uncorrected scaled scores: a perfect raw score no longer corresponded to an 800, and a single omission out of 85 questions could lead to a drop of 30 or 40 points in the scaled score. Corrections to scores above 700 had been necessary to reduce the size of the gaps and to make a perfect raw score result in an 800. At the other end of the scale, about 1.5 percent of test-takers would have scored below 200 on the verbal section if that had not been the reported minimum score. Although the math score averages were closer to the center of the scale (500) than the verbal scores, the distribution of math scores was no longer well approximated by a [[normal distribution]]. These problems, among others, suggested that the original score scale and its reference group of about 10,000 students taking the SAT in 1941 needed to be replaced.<ref name=SAT-Scale-Ref />

      Beginning with the test administered in April 1995, the SAT score scale was recentered to return the average math and verbal scores close to 500. Although only 25 students had received perfect scores of 1600 in all of 1994, 137 students taking the April test scored 1600.<ref>{{cite news |url=https://www.nytimes.com/1995/07/26/us/when-close-is-perfect-even-4-errors-can-t-prevent-top-score-on-new-sat.html |title=When Close Is Perfect: Even 4 Errors Can't Prevent Top Score on New S.A.T. |newspaper=The New York Times |date=July 26, 1995 |last=Barron |first=James |access-date=February 18, 2017 |archive-url=https://web.archive.org/web/20170708001132/http://www.nytimes.com/1995/07/26/us/when-close-is-perfect-even-4-errors-can-t-prevent-top-score-on-new-sat.html |archive-date=July 8, 2017 |url-status=live }}</ref> The new scale used a reference group of about one million seniors in the class of 1990: the scale was designed so that the SAT scores of this [[Cohort (educational group)|cohort]] would have a mean of 500 and a standard deviation of 110. Because the new scale would not be directly comparable to the old scale, scores awarded in April 1995 and later were officially reported with an "R" (for example, "560R") to reflect the change in scale, a practice that was continued until 2001.<ref name=SAT-Scale-Ref /> Scores awarded before April 1995 may be compared to those on the recentered scale by using official College Board tables. For example, verbal and math scores of 500 received before 1995 correspond to scores of 580 and 520, respectively, on the 1995 scale.<ref>{{cite web |url=http://research.collegeboard.org/programs/sat/data/equivalence/sat-individual |title=SAT I Individual Score Equivalents |publisher=College Entrance Examination Board |access-date=June 29, 2014 |archive-url=https://web.archive.org/web/20140901044547/http://research.collegeboard.org/programs/sat/data/equivalence/sat-individual |archive-date=September 1, 2014 |df=mdy-all }}</ref>

      === 1995: Controversy over recentering ===
      Certain educational organizations viewed the SAT recentering initiative as an attempt to stave off international embarrassment in regards to continuously declining test scores, even among top students. As evidence, it was presented that the number of pupils who scored above 600 on the verbal portion of the test had fallen from a peak of 112,530 in 1972 to 73,080 in 1993, a 36% backslide, despite the fact that the total number of test-takers had risen by over 500,000.<ref>{{cite news|last=The Center for Education Reform|title=SAT Increase – The Real Story, Part II|url=http://www.edreform.com/Press_Box/Press_Releases/?SAT_Increase_The_Real_Story_Part_II&year=1996|date=August 22, 1996|archive-url=https://web.archive.org/web/20110721205641/http://www.edreform.com/Press_Box/Press_Releases/?SAT_Increase_The_Real_Story_Part_II&year=1996 |archive-date=July 21, 2011 }}</ref>

      === 1997: SAT renamed ===
      After the 1994 changes to the SAT, major news organizations, as well as the president of the College Board, referred to the SAT using the name ''Scholastic Assessment Test''.<ref>{{cite news |url=https://www.nytimes.com/1994/03/20/nyregion/revised-and-renamed-sat-brings-same-old-anxiety.html |title=Revised and Renamed, S.A.T. Brings Same Old Anxiety |newspaper=The New York Times |date=March 20, 1994 |last=Honan |first=William |access-date=February 18, 2017 |archive-url=https://web.archive.org/web/20170708000315/http://www.nytimes.com/1994/03/20/nyregion/revised-and-renamed-sat-brings-same-old-anxiety.html |archive-date=July 8, 2017 |url-status=live }}</ref><ref>{{cite news |title=Perfectly Happy With Her SAT; D.C. Junior Aces Scholastic Assessment Test With a 1,600 |newspaper=Washington Post |date=May 5, 1995 |last=Horwitz |first=Sari }}</ref><ref>{{cite news |url=https://www.latimes.com/archives/la-xpm-1995-01-14-me-19756-story.html |title=Scholastic Assessment Test |newspaper=Los Angeles Times |date=January 14, 1995 |last=Stewart |first=Donald |archive-date=August 25, 2022 |archive-url=https://web.archive.org/web/20220825172936/https://www.latimes.com/archives/la-xpm-1995-01-14-me-19756-story.html |url-status=live }}</ref> However, in the spring of 1997, the College Board announced that the SAT by itself could not properly be called the Scholastic Assessment Test, and that the letters ''SAT'' were the trademark and [[pseudo-acronym|did not stand for anything]].<ref>{{cite news |url=https://www.nytimes.com/1997/04/02/us/insisting-it-s-nothing-creator-says-sat-not-sat.html |title=Insisting It's Nothing, Creator Says SAT, Not S.A.T. |newspaper=The New York Times |date=April 2, 1997 |last=Applebome |first=Peter |access-date=February 18, 2017 |archive-url=https://web.archive.org/web/20170417203501/http://www.nytimes.com/1997/04/02/us/insisting-it-s-nothing-creator-says-sat-not-sat.html |archive-date=April 17, 2017 |url-status=live }}</ref> At the time, the historian of education [[Diane Ravitch]] remarked that "calling [the SAT] the Scholastic Assessment Test is like calling it the Scholastic Test Test".<ref>{{cite news |url=https://www.tampabay.com/archive/1997/04/02/it-s-sat-not-s-a-t-and-that-s-that |title=It's SAT, not S.A.T., and that's that |newspaper=Tampa Bay Times |date=April 2, 1997 |access-date=August 25, 2022 |archive-url=https://web.archive.org/web/20220825175213/https://www.tampabay.com/archive/1997/04/02/it-s-sat-not-s-a-t-and-that-s-that/ |archive-date=August 25, 2022 |url-status=live }}</ref> Minor name changes would be made later: In 2004, the Roman numeral in SAT I: Reasoning Test was dropped, making ''SAT Reasoning Test'' the name of the SAT,<ref>{{cite web|url=http://www.collegeboard.com/student/testing/sat/about/sat/FAQ.html |title=SAT FAQ: Frequently Asked Questions |access-date=May 29, 2007 |publisher=[[College Board]] |archive-url=https://web.archive.org/web/20080325225035/http://www.collegeboard.com/student/testing/sat/about/sat/FAQ.html |archive-date=March 25, 2008}}</ref> and in 2016 the "Reasoning Test" portion of the name was eliminated when the test was redesigned in 2016.<ref>{{cite web|url=https://blog.collegeboard.org/difference-between-sat-and-psat |title=What is the Difference Between the SAT and the PSAT? |access-date=March 16, 2021 |publisher=[[College Board]] |url-status=deviated |archive-url=https://web.archive.org/web/20201112043214/https://blog.collegeboard.org/difference-between-sat-and-psat |archive-date=November 12, 2020}}</ref>

      === 2002: "Score Choice" discontinued for SAT II tests ===
      Since 1993, using a policy referred to as "Score Choice", students taking the SAT-II subject exams were able to choose whether or not to report the resulting scores to a college to which the student was applying. In October 2002, the College Board dropped the Score Choice option for SAT-II exams, matching the score policy for the traditional SAT tests that required students to release all scores to colleges.<ref>{{cite web |url=https://www.bizjournals.com/stlouis/stories/2002/05/27/smallb4.html |last=Schoenfeld |first=Jane |title=College board drops 'score choice' for SAT-II exams |publisher=St. Louis Business Journal |date=May 24, 2002 |access-date=March 7, 2018 |archive-url=https://web.archive.org/web/20170212165430/http://www.bizjournals.com/stlouis/stories/2002/05/27/smallb4.html |archive-date=February 12, 2017 |url-status=live }}</ref> The College Board said that, under the old score policy, many students who waited to release scores would forget to do so and miss admissions deadlines. It was also suggested that the old policy of allowing students the option of which scores to report favored students who could afford to retake the tests.<ref>{{cite news |url=https://www.nytimes.com/2002/06/19/us/students-protest-plan-to-change-test-policy.html |last=Zhao |first=Yilu |title=Students Protest Plan To Change Test Policy |newspaper=The New York Times |date=June 19, 2002 |access-date=March 7, 2018 |archive-url=https://web.archive.org/web/20180312083945/http://www.nytimes.com/2002/06/19/us/students-protest-plan-to-change-test-policy.html |archive-date=March 12, 2018 |url-status=live }}</ref>

      === 2005: Introduction of an 800-point essay section (leading to a 2400-point score) ===
      In 2005, the test was changed again, largely in response to criticism by the [[University of California]] system.<ref name=":35">{{cite news |url=http://www.dailynexus.com/article.php?a=3385 |archive-url=https://web.archive.org/web/20071009035501/http://www.dailynexus.com/article.php?a=3385 |date=20 September 2002 |access-date=July 3, 2016 |archive-date=9 October 2007 |title=College Board To Alter SAT I for 2005–06 |newspaper=Daily Nexus }}</ref> In order to have the SAT more closely reflect high school curricula, certain types of questions were eliminated, including [[analogy|analogies]] from the verbal section and quantitative comparison items from the math section.<ref name=CBHistorical /> A new writing section, with an essay, based on the former SAT II Writing Subject Test, was added,<ref>{{cite news |last=Lewin |first=Tamar |date=June 23, 2002 |title=New SAT Writing Test Is Planned |url=https://www.nytimes.com/2002/06/23/us/new-sat-writing-test-is-planned.html |work=The New York Times |access-date=May 5, 2014 |archive-url=https://web.archive.org/web/20140505181901/http://www.nytimes.com/2002/06/23/us/new-sat-writing-test-is-planned.html |archive-date=May 5, 2014 |url-status=live }}</ref> in part to increase the chances of closing the opening gap between the highest and midrange scores. The writing section reported a multiple-choice subscore that ranged from 20 to 80 points.<ref>{{cite web |title=Data Layout for SAT and SAT Subject Tests Electronic Score Reports |url=https://collegereadiness.collegeboard.org/pdf/data-layout-sat-subject-tests-esr.pdf |website=College Board |access-date=March 25, 2021}}</ref> Other factors included the desire to test the writing ability of each student; hence the essay. The writing section added an additional maximum 800 points to the score, which increased the new maximum score to 2400.<ref>{{cite web |url=https://www.insidehighered.com/views/2005/05/25/understanding-new-sat |title=Understanding the New SAT |date=25 May 2005 |website=Inside Higher Ed |access-date=July 3, 2016 |archive-url=https://web.archive.org/web/20160915031610/https://www.insidehighered.com/views/2005/05/25/understanding-new-sat |archive-date=15 September 2016 |url-status=live }}</ref> The "New SAT" was first offered on March 12, 2005, after the last administration of the "old" SAT in January 2005. The mathematics section was expanded to cover three years of high school mathematics. To emphasize the importance of reading, the verbal section's name was changed to the Critical Reading section.<ref name=CBHistorical />

      === 2005: Scoring problems of October SATs and subsequent lawsuit ===
      In March 2006, it was announced that a small percentage of the SATs taken in October 2005 had been scored incorrectly due to the test papers being moist and not scanning properly and that some students had received erroneous scores.<ref>{{cite news |url=https://www.nytimes.com/2006/03/10/education/10sat.html |title=SAT Errors Raise New Qualms About Testing |newspaper=The New York Times |date=March 10, 2006 |last=Arenson |first=Karen |access-date=February 18, 2017 |archive-url=https://web.archive.org/web/20170901210255/http://www.nytimes.com/2006/03/10/education/10sat.html |archive-date=September 1, 2017 |url-status=live }}</ref> The College Board announced they would change the scores for the students who were given a lower score than they earned, but at this point many of those students had already applied to colleges using their original scores. The College Board decided not to change the scores for the students who were given a higher score than they earned. A lawsuit was filed in 2006 on behalf of the 4,411 students who received an incorrect score on the SAT.<ref>{{cite news |url=https://www.nytimes.com/2006/04/09/us/09sat.html |title=Class-Action Lawsuit to Be Filed Over SAT Scoring Errors |newspaper=The New York Times |date=April 9, 2006 |last=Arenson |first=Karen |access-date=February 18, 2017 |archive-url=https://web.archive.org/web/20141023024917/http://www.nytimes.com/2006/04/09/us/09sat.html |archive-date=October 23, 2014 |url-status=live }}</ref> The class-action suit was settled in August 2007, when the College Board and [[Pearson Education]]al Measurement, the company that scored the SATs, announced they would pay $2.85 million into a settlement fund. Under the agreement, students could either elect to receive $275 or submit a claim for more money if the damage was greater.<ref>{{cite news|url=http://chronicle.com/news/index.php?id=2911 |title=$2.85-Million Settlement Proposed in Lawsuit Over SAT-Scoring Errors |access-date=August 27, 2007 |date= August 24, 2007 |last=Hoover |first=Eric |newspaper=The Chronicle of Higher Education |archive-url = https://web.archive.org/web/20070930180901/http://chronicle.com/news/index.php?id=2911 <!-- Bot retrieved archive --> |archive-date = September 30, 2007}}</ref>

      === 2006: Maine becomes the first state to mandate taking the SAT ===

      In April of 2006, Maine required all high-school juniors in the state to take the SAT as part of a special school day on a Saturday. The SAT was to be used in place of the normal statewide exam used to assess whether students met state standards for graduation. The cost of the SAT was paid for by Maine and offered free to students taking the exam.<ref>{{cite web|title=Maine's 11th-graders take Saturday SAT |publisher=Foster's Daily Democrat |url=https://www.fosters.com/story/news/local/2006/04/02/maine-s-11th-graders-take/53113132007 |date=April 2, 2006 |access-date=March 26, 2025 |archive-url=https://archive.today/20250220190817/https://www.fosters.com/story/news/local/2006/04/02/maine-s-11th-graders-take/53113132007 |url-status=live |archive-date=February 20, 2025 }}</ref> Within 10 years, the College Board will be offering the SAT on a weekday during the school year (called an "SAT School Day" administration) in participating states, and by 2024 more than two-thirds of the senior class graduating in that year will take the SAT during a school day.<ref>{{cite web|title=SAT Participation Continues To Grow As The SAT Suite Successfully Completes Its Transition To Digital Testing |publisher=College Board |url=https://newsroom.collegeboard.org/sat-participation-continues-grow-sat-suite-successfully-completes-its-transition-digital-testing |date=September 24, 2024 |access-date=March 3, 2025 |archive-url=https://web.archive.org/web/20250116182133/https://newsroom.collegeboard.org/sat-participation-continues-grow-sat-suite-successfully-completes-its-transition-digital-testing |url-status=live |archive-date=January 16, 2025 }}</ref>

      === 2009: "Score Choice" made available for the SAT ===
      As part of an effort to "reduce student stress and improve the test-day experience", in late 2008 the College Board announced that the Score Choice option, recently dropped for SAT subject exams, would be available for both the SAT subject tests and the SAT starting in March 2009. At the time, some college admissions officials agreed that the new policy would help to alleviate student test anxiety, while others questioned whether the change was primarily an attempt to make the SAT more competitive with the ACT, which had long had a comparable score choice policy.<ref>{{cite news |url=https://www.nytimes.com/2008/12/31/education/31sat.html |last=Rimer |first=Sara |title=SAT Changes Policy, Opening Rift With Colleges |work=The New York Times |date=December 30, 2008 |access-date=March 8, 2018 |archive-url=https://web.archive.org/web/20180312084012/http://www.nytimes.com/2008/12/31/education/31sat.html |archive-date=March 12, 2018 |url-status=live }}</ref> Recognizing that some colleges would want to see the scores from all tests taken by a student, under this new policy, the College Board would encourage but not force students to follow the requirements of each college to which scores would be sent.<ref>{{cite web |url=https://collegereadiness.collegeboard.org/sat/scores/sending-scores/score-choice |title=SAT Score Choice |date=12 January 2016 |publisher=The College Board |access-date=March 7, 2018 |archive-url=https://web.archive.org/web/20180321133012/https://collegereadiness.collegeboard.org/sat/scores/sending-scores/score-choice |archive-date=March 21, 2018 |url-status=live }}</ref> A number of highly selective colleges and universities, including [[Yale]], the [[University of Pennsylvania]], [[Cornell]], and [[Stanford]], rejected the Score Choice option at the time,<ref name="Cornell Rejects SAT Score Choice Option">{{cite web|url=http://cornellsun.com/section/news/content/2009/01/20/cornell-rejects-sat-score-choice-option|title=Cornell Rejects SAT Score Choice Option|work=[[The Cornell Daily Sun]]|date=30 November 2001 |access-date=February 13, 2008|archive-url=https://web.archive.org/web/20120404100518/http://cornellsun.com/section/news/content/2009/01/20/cornell-rejects-sat-score-choice-option|archive-date=April 4, 2012|url-status=live}}</ref> but some of them would later participate in the score choice program.<ref>{{cite web |url=https://admissions.cornell.edu/standardized-testing-requirements |title=Standardized Testing Requirements |publisher=Cornell University |access-date=February 23, 2020 |archive-url=https://web.archive.org/web/20200206121046/https://admissions.cornell.edu/standardized-testing-requirements |archive-date=February 6, 2020 }}</ref><ref>{{cite web |url=https://admissions.upenn.edu/admissions-and-financial-aid/what-penn-looks-for/testing |title=Testing |publisher=University of Pennsylvania |access-date=February 23, 2020 |archive-url=https://web.archive.org/web/20200320040553/https://admissions.upenn.edu/admissions-and-financial-aid/what-penn-looks-for/testing |archive-date=March 20, 2020 |url-status=live}}</ref><ref>{{cite web |url=https://admission.stanford.edu/apply/freshman/testing.html |title=Freshman Application Requirements: Standardized Testing |publisher=Stanford University |access-date=February 23, 2020 |archive-url=https://web.archive.org/web/20200223190749/https://admission.stanford.edu/apply/freshman/testing.html |archive-date=February 23, 2020 |url-status=live}}</ref>

      === 2012: Increased security introduced at test centers ===
      Beginning in the fall of 2012, test takers were required to submit a current, recognizable photo during registration. In order to be admitted to their designated test center, students were required to present their photo admission ticket—or another acceptable form of photo ID—for comparison to the one submitted by the student at the time of registration. The changes were made in response to a series of cheating incidents, primarily at high schools in [[Long Island]], New York, in which high-scoring test takers were using fake photo IDs to take the SAT for other students.<ref>{{cite news |url=https://www.nytimes.com/2012/03/28/education/after-cheating-scandal-sat-and-act-will-tighten-security.html |title=SAT and ACT to Tighten Rules After Cheating Scandal |newspaper=The New York Times |date=March 27, 2012 |access-date=May 25, 2018 |last=Anderson |first=Jenny |archive-url=https://web.archive.org/web/20180529054301/https://www.nytimes.com/2012/03/28/education/after-cheating-scandal-sat-and-act-will-tighten-security.html |archive-date=May 29, 2018 |url-status=live }}</ref> In addition to the registration photo stipulation, test takers were required to identify their high school, to which their scores, as well as the submitted photos, would be sent. In the event of an investigation involving the validity of a student's test scores, their photo may be made available to institutions to which they have sent scores. Any college that is granted access to a student's photo is first required to certify that the student has been admitted to the college requesting the photo.<ref>{{cite web|url=http://sat.collegeboard.org/register/test-security-and-fairness|title=Test Security and Fairness|publisher=The College Board|access-date=May 22, 2019|archive-url=https://web.archive.org/web/20150906152247/https://sat.collegeboard.org/register/test-security-and-fairness|archive-date=September 6, 2015|url-status=live}}</ref>

      === 2016: Redesign of the SAT (notably including a return to a 1600 point scale) ===
      On March 5, 2014, the College Board announced its plan to redesign the SAT in order to link the exam more closely to the work high school students encounter in the classroom.<ref name="Lewin">{{cite news|url=https://www.nytimes.com/2014/03/06/education/major-changes-in-sat-announced-by-college-board.html?_r=1|title=A New SAT Aims to Realign With Schoolwork|last=Lewin|first=Tamar|date=March 5, 2014|newspaper=The New York Times|access-date=May 14, 2014|archive-url=https://web.archive.org/web/20140514233331/http://www.nytimes.com/2014/03/06/education/major-changes-in-sat-announced-by-college-board.html?_r=1|archive-date=May 14, 2014|url-status=live}}</ref> The new exam was administered for the first time in March 2016.<ref>{{cite news |title=New, Reading-Heavy SAT Has Students Worried |url=https://www.nytimes.com/2016/02/09/us/sat-test-changes.html |access-date=July 25, 2017 |newspaper=The New York Times |date=February 8, 2016 |archive-url=https://web.archive.org/web/20171201055527/https://www.nytimes.com/2016/02/09/us/sat-test-changes.html |archive-date=December 1, 2017 |url-status=live }}</ref> Some of the major changes were: an emphasis on the use of evidence to support answers, a shift away from obscure vocabulary to words that students are more likely to encounter in college and career, an optional essay, questions having four rather than five answer options, and the removal of penalty for wrong answers (rights-only scoring).<ref>{{cite news|title=Key shifts of the SAT redesign|url=https://apps.washingtonpost.com/g/page/local/key-shifts-of-the-sat-redesign/858/|access-date=May 14, 2014|newspaper=The Washington Post|date=March 5, 2014|archive-url=https://web.archive.org/web/20140515035248/http://apps.washingtonpost.com/g/page/local/key-shifts-of-the-sat-redesign/858/|archive-date=May 15, 2014|url-status=live}}</ref><ref name=":29">{{Cite news|last=Murphy|first=James S.|date=May 12, 2016|title=How Hard Is the New SAT?|work=The Atlantic|department=Education|url=https://www.theatlantic.com/education/archive/2016/05/how-hard-is-the-new-sat/482376/|url-status=live|access-date=February 22, 2021|archive-url=https://web.archive.org/web/20201021000131/https://www.theatlantic.com/education/archive/2016/05/how-hard-is-the-new-sat/482376/|archive-date=October 21, 2020}}</ref> The Critical Reading section was replaced with the new Evidence-Based Reading and Writing section (the Reading Test and the Writing and Language Test).<ref>{{cite web |title=Overview of the 2016 SAT sections |url=https://www.manhattanreview.com/sat-sections/ |website=Manhattan Review |access-date=March 25, 2021}}</ref> The scope of mathematics content was narrowed to include fewer topics, including linear equations, quadratics, and basic trigonometry. The essay score was separated from the final score, and institutions could choose whether or not to consider it. As a result of these changes, the highest score was returned to 1600. These modifications were the first major redesign to the structure of the test since 2005.<ref name=":25">{{Cite news|last=Zoroya|first=Gregg|date=March 6, 2014|title=Sharpen those pencils: The SAT test is getting harder|work=USA Today|url=https://www.usatoday.com/story/news/nation/2014/03/05/sat-college-board-redesign-college-entrance-exam/6078091/|access-date=February 18, 2021}}</ref> As the test no longer deducts points for wrong answers, the numerical scores and the percentiles appeared to have increased after the new SAT was unveiled in 2016. However, this does not necessarily mean students came better prepared.<ref name=":29" />

      To combat the perceived advantage of costly [[test preparation]] courses, the College Board announced a new partnership with [[Khan Academy]] to offer free online practice problems and instructional videos.<ref name="Lewin" />

      === 2019: Introduction and abandonment of the "Adversity Score" and launch of "Landscape" ===
      In May 2019, the College Board announced that it would calculate each SAT taker's "Adversity Score" using factors such as the proportion of students in a school district receiving free or subsidized lunch or the level of crime in that neighborhood. The higher the score, the more adversity the student faced.<ref name=":0" /> However, this triggered a backlash from the general public as people were skeptical of how complex information could be conveyed with a single number<ref name=":0" /> and were concerned that it might be politically weaponized.<ref>{{Cite web|last=Rowe|first=Ian|date=June 3, 2019|title=The College Board's Inclusion of Family Structure Indicators Could Help More Disadvantaged Students|url=https://ifstudies.org/blog/the-college-boards-inclusion-of-family-structure-indicators-could-help-more-disadvantaged-students|access-date=March 6, 2021|website=Institute for Family Studies|quote=Critics have panned the adversity score as a 'bogus [effort]&nbsp;... to rank students on a one-to-100 pseudoscientific index of oppression,' a 'backdoor to racial quotas,' and an approach that will 'only invite a new quest for victimhood.'}}</ref> The College Board abandoned the Adversity Score in August 2019<ref>{{cite news |last=Hartocollis |first=Anemona |title=SAT 'Adversity Score' Is Abandoned in Wake of Criticism |work=The New York Times |url=https://www.nytimes.com/2019/08/27/us/sat-adversity-score-college-board.html  |date=August 27, 2019 |access-date=June 13, 2024 |archive-url=https://archive.today/20230831163836/https://www.nytimes.com/2019/08/27/us/sat-adversity-score-college-board.html |url-status=live |archive-date=August 31, 2023 }}</ref> and created a new tool called "Landscape" to provide the same sort of details to admissions officers using government information but without calculating a score.<ref name=":0">{{Cite news|last=Allyn|first=Bobby|date=August 27, 2019|title=College Board Drops Its 'Adversity Score' For Each Student After Backlash|work=NPR|url=https://www.npr.org/2019/08/27/754799550/college-board-drops-its-adversity-score-for-each-student-after-backlash|access-date=February 2, 2021}}</ref>

      === 2020{{endash}}2021: Discontinuation of SAT essay and SAT II tests and the impact of COVID-19 ===

      In the wake of the [[COVID-19 pandemic]], which made administering and taking the tests difficult, on January 19, 2021, the College Board announced plans to discontinue the optional SAT essay following the June 2021 administration.<ref>{{cite web |url=https://allaccess.collegeboard.org/update-reducing-and-simplifying-demands-students |title=An Update on Reducing and Simplifying Demands on Students |publisher=The College Board |access-date=January 20, 2021 }}</ref><ref name=":4">{{cite web|last1=Aspegren|first1=Elinor|date=January 19, 2021|title=Adjusting to 'new realities' in admissions process, College Board eliminates SAT's optional essay and subject tests|url=https://www.usatoday.com/story/news/education/2021/01/19/sat-eliminates-optional-essay-subject-tests-covid-19-college-board/4220933001/|url-status=live|archive-url=https://web.archive.org/web/20210204221918/https://www.usatoday.com/story/news/education/2021/01/19/sat-eliminates-optional-essay-subject-tests-covid-19-college-board/4220933001/|archive-date=February 4, 2021|access-date=February 5, 2021|website=USA Today}}</ref> Although the SAT essay was discontinued by the start of the 2021–22 school year for national administrations, the essay continues to be administered in some states as a part of their state-wide SAT school-day testing programs.<ref>{{cite web |url=https://www.khanacademy.org/test-prep/sat/x0a8c2e5f:untitled-709/x0a8c2e5f:the-sat-essay-overview/a/the-sat-essay |title=The SAT Essay: Overview (article) |publisher=Khan Academy|access-date=December 22, 2022 |url-status=live |archive-url=https://web.archive.org/web/20220807182956/https://www.khanacademy.org/test-prep/sat/x0a8c2e5f:untitled-709/x0a8c2e5f:the-sat-essay-overview/a/the-sat-essay |archive-date=August 7, 2022}}</ref>

      While some administrations of the SAT were canceled during the pandemic,<ref name=":4" /> others continued with precautionary measures such as requirements of temperature checks, enhanced ventilation, higher ceilings, physical distancing, and face masks.<ref>{{Cite news|last=Romalino|first=Carly Q.|date=February 17, 2021|title=How SAT testing sites are adapting to COVID restrictions: Lower your mask for an ID check|work=USA Today|department=Education|url=https://www.usatoday.com/story/news/education/2021/02/17/where-do-take-sat-how-student-testing-different-amid-covid/6768970002/|url-status=live|access-date=March 6, 2021|archive-url=https://web.archive.org/web/20210219125801/https://www.usatoday.com/story/news/education/2021/02/17/where-do-take-sat-how-student-testing-different-amid-covid/6768970002/|archive-date=February 19, 2021}}</ref> The College Board also announced the immediate discontinuation of the [[SAT Subject Tests]] in the United States, and the same internationally after the June 2021 administration.<ref name=":4" />

      === 2024: Change to a digital format ===
      In January 2022, College Board revealed its plan to administer the SAT digitally to American students in 2024 and to students in other countries in 2023. The digital format of the test would simplify logistics and allow scores to be determined in a matter of days rather than weeks. Score reports would also carry information about two-year collegiate programs and vocational training. Students may bring their own laptop or tablet computers but must sit at a designated location; those without a device will be provided with one.

      The College Board also announced that the SAT would be shortened to roughly two hours from three, with an onscreen calculator provided for the math section.<ref name=":53">{{Cite news|last=Thompson|first=Carolyn|date=January 25, 2022|title=In major overhaul, SAT exam will soon be taken digitally|work=PBS Newshour|url=https://www.pbs.org/newshour/education/in-major-overhaul-sat-exam-will-soon-be-taken-digitally|access-date=January 25, 2022}}</ref>  

      On March 9, 2024, the digital version of the SAT was administered nationwide in the United States.<ref>{{cite news |last=Goldstein |first=Dana |title=No More No. 2 Pencils: The SAT Goes Fully Digital |work=The New York Times |url=https://www.nytimes.com/2024/03/08/us/sat-online-digital-test-college.html  |date=March 8, 2024 |access-date=March 10, 2024 |archive-url=https://archive.today/20240308112037/https://www.nytimes.com/2024/03/08/us/sat-online-digital-test-college.html |url-status=live |archive-date=March 8, 2024 }}</ref> The test consists of two sections: Reading and Writing, and Math, with two 32-minute modules for reading and writing (64 minutes total) and two 35-minute modules for math (70 minutes total), making the length of the SAT 2 hours and 14 minutes. In each section, the questions posed in the second module depend on the performance of the student on the questions in the first module.<ref>{{cite web|title=How the SAT is Structured |publisher=College Board |url=https://satsuite.collegeboard.org/sat/whats-on-the-test/structure |access-date=March 10, 2024 |archive-url=https://web.archive.org/web/20240306025408/https://satsuite.collegeboard.org/sat/whats-on-the-test/structure |url-status=live |archive-date=March 6, 2024 }}</ref> Both math modules allow the use of a calculator: either an onscreen Desmos-based graphing calculator, or a physical one that the student brings.<ref>{{cite web |title=Calculators on the SAT |url=https://www.khanacademy.org/test-prep/v2-sat-math/x0fcc98a58ba3bea7:about-the-digital-sat/x0fcc98a58ba3bea7:preparing-for-the-sat/a/calculators-on-the-sat|date=2024-03-10 |url-status=live |archive-url=https://archive.today/20240310200819/https://www.khanacademy.org/test-prep/v2-sat-math/x0fcc98a58ba3bea7:about-the-digital-sat/x0fcc98a58ba3bea7:preparing-for-the-sat/a/calculators-on-the-sat |archive-date=2024-03-10 }}</ref>

