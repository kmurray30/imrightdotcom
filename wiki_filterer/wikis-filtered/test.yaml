      ===Comparison of judicial caning in Brunei, Malaysia and Singapore===
      {{see also|Caning in Brunei|Caning in Malaysia}}
      Judicial caning is also used as a form of legal punishment for criminal offences in two of Singapore's neighbouring countries, Brunei and Malaysia. There are some differences across the three countries.<ref name="Corpun Differences">
      {{cite web |date=September 2012 |title=Judicial Caning in Singapore, Malaysia and Brunei #Some Differences Between Singapore and Malaysia |url= https://www.corpun.com/singfeat.htm#differences |url-status=live |archive-url= https://web.archive.org/web/20150115052445/http://www.corpun.com/singfeat.htm#differences |archive-date=15 January 2015 |access-date=25 January 2015 |website=World Corporal Punishment Research}}
      </ref>

