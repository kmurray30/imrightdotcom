      === Signs and symptoms ===
      {{Main|Symptoms of COVID-19}}

      [[File:Symptoms of coronavirus disease 2019 4.0.svg|400px|thumb|[[Signs and symptoms|Symptoms]] of COVID-19]]
      Symptoms of COVID-19 are variable, ranging from mild symptoms to severe illness.<ref name="CDC2020Sym"><!-- KEEP THIS NAMED REFERENCE -->{{#invoke:Cite|web|date=22 February 2021|title=Symptoms of Coronavirus|url=https://www.cdc.gov/coronavirus/2019-ncov/symptoms-testing/symptoms.html|url-status=live|archive-url=https://web.archive.org/web/20210304195413/https://www.cdc.gov/coronavirus/2019-ncov/symptoms-testing/symptoms.html|archive-date=4 March 2021|access-date=4 March 2021|website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref><ref name="Grant et al 2020">{{#invoke:Cite|journal | vauthors = Grant MC, Geoghegan L, Arbyn M, Mohammed Z, McGuinness L, Clarke EL, Wade RG | title = The prevalence of symptoms in 24,410 adults infected by the novel coronavirus (SARS-CoV-2; COVID-19): A systematic review and meta-analysis of 148 studies from 9 countries | journal = PLOS ONE | volume = 15 | issue = 6 | article-number = e0234765 | date = 23 June 2020 | pmid = 32574165 | pmc = 7310678 | doi = 10.1371/journal.pone.0234765 | bibcode = 2020PLoSO..1534765G | s2cid = 220046286 | doi-access = free }}</ref> Common symptoms include headache, [[anosmia|loss of smell]] and [[ageusia|taste]], [[nasal obstruction|nasal congestion]] and [[rhinorrhea|runny nose]], cough, [[muscle pain]], [[sore throat]], fever, [[diarrhea|diarrhoea]], and [[breathing difficulties]].<ref name="CDC2020Sym"/> People with the same infection may have different symptoms, and their symptoms may change over time. Three common clusters of symptoms have been identified: one respiratory symptom cluster with cough, [[sputum]], shortness of breath, and fever; a musculoskeletal symptom cluster with muscle and joint pain, headache, and fatigue; a cluster of digestive symptoms with abdominal pain, vomiting, and diarrhoea.<ref name="ECDC">{{#invoke:Cite|web|title=COVID-19/csse_covid_19_data/csse_covid_19_time_series at master · CSSEGISandData/COVID-19|url=https://github.com/CSSEGISandData/COVID-19/tree/master/csse_covid_19_data/csse_covid_19_time_series|website=GitHub|access-date=18 January 2022}}</ref> In people without prior ear, nose, and throat disorders, [[hypogeusia|loss of taste]] combined with [[hyposmia|loss of smell]] is associated with [[COVID-19]] and is reported in as many as 88% of cases.<ref name="Krishnan">{{#invoke:Cite|journal | vauthors = Krishnan A, Hamilton JP, Alqahtani SA, Woreta TA | title = COVID-19: An overview and a clinical update | journal = World Journal of Clinical Cases | volume = 9 | issue = 1 | pages = 8–23 | date = January 2021 | pmid = 33511168 | pmc = 7809683 | doi = 10.12998/wjcc.v9.i1.8 | doi-access = free }}</ref><ref>{{#invoke:Cite|journal | vauthors = Docherty AB, Harrison EM, Green CA, Hardwick HE, Pius R, Norman L, Holden KA, Read JM, Dondelinger F, Carson G, Merson L, Lee J, Plotkin D, Sigfrid L, Halpin S, Jackson C, Gamble C, Horby PW, Nguyen-Van-Tam JS, Ho A, Russell CD, Dunning J, Openshaw PJ, Baillie JK, Semple MG | title = Features of 20 133 UK patients in hospital with covid-19 using the ISARIC WHO Clinical Characterisation Protocol: prospective observational cohort study | journal = BMJ | volume = 369 | article-number = m1985 | date = May 2020 | pmid = 32444460 | pmc = 7243036 | doi = 10.1136/bmj.m1985 }}</ref><ref name="pmid32483687">{{#invoke:Cite|journal | vauthors = Niazkar HR, Zibaee B, Nasimi A, Bahri N | title = The neurological manifestations of COVID-19: a review article | journal = Neurological Sciences | volume = 41 | issue = 7 | pages = 1667–1671 | date = July 2020 | pmid = 32483687 | pmc = 7262683 | doi = 10.1007/s10072-020-04486-3 }}</ref>

      === Transmission ===
      {{Main|Transmission of COVID-19}}

      The disease is mainly transmitted via the respiratory route when people inhale droplets and small airborne particles (that form an [[aerosol]]) that infected people exhale as they breathe, talk, cough, sneeze, or sing.<ref name="Wang_2021">{{#invoke:Cite|journal | vauthors = Wang CC, Prather KA, Sznitman J, Jimenez JL, Lakdawala SS, Tufekci Z, Marr LC | title = Airborne transmission of respiratory viruses | journal = Science | volume = 373 | issue = 6558 | date = August 2021 | article-number = eabd9149 | pmid = 34446582 | pmc = 8721651 | doi = 10.1126/science.abd9149 | bibcode = | doi-access = free }}</ref><ref name="auto">{{#invoke:Cite|journal | vauthors = Greenhalgh T, Jimenez JL, Prather KA, Tufekci Z, Fisman D, Schooley R | title = Ten scientific reasons in support of airborne transmission of SARS-CoV-2 | journal = Lancet | volume = 397 | issue = 10285 | pages = 1603–1605 | date = May 2021 | pmid = 33865497 | pmc = 8049599 | doi = 10.1016/s0140-6736(21)00869-2 | bibcode = 2021Lanc..397.1603G }}</ref><ref name="AR2021">{{#invoke:Cite|journal | vauthors = Bourouiba L | title = Fluid Dynamics of Respiratory Infectious Diseases | journal = Annual Review of Biomedical Engineering | volume = 23 | issue = 1 | pages = 547–577 | date = July 2021 | pmid = 34255991 | doi = 10.1146/annurev-bioeng-111820-025044 | hdl-access = free | s2cid = 235823756 | hdl = 1721.1/131115 }}</ref><ref name="auto1">{{#invoke:Cite|journal | vauthors = Stadnytskyi V, Bax CE, Bax A, Anfinrud P | title = The airborne lifetime of small speech droplets and their potential importance in SARS-CoV-2 transmission | journal = Proceedings of the National Academy of Sciences of the United States of America | volume = 117 | issue = 22 | pages = 11875–11877 | date = June 2020 | pmid = 32404416 | pmc = 7275719 | doi = 10.1073/pnas.2006874117 | bibcode = 2020PNAS..11711875S | doi-access = free }}</ref> Infected people are more likely to transmit COVID-19 when they are physically close to other non-infected individuals. However, infection can occur over longer distances, particularly indoors.<ref name="Wang_2021"/><ref name="Miller_2021">{{#invoke:Cite|journal | vauthors = Miller SL, Nazaroff WW, Jimenez JL, Boerstra A, Buonanno G, Dancer SJ, Kurnitski J, Marr LC, Morawska L, Noakes C | title = Transmission of SARS-CoV-2 by inhalation of respiratory aerosol in the Skagit Valley Chorale superspreading event | journal = Indoor Air | volume = 31 | issue = 2 | pages = 314–323 | date = March 2021 | pmid = 32979298 | pmc = 7537089 | doi = 10.1111/ina.12751 | bibcode = 2021InAir..31..314M }}</ref>

      === Cause ===
      {{Main|Severe acute respiratory syndrome coronavirus 2}}

      [[File:Coronavirus virion structure.svg|thumb|right|Illustration of SARS-CoV-2 [[virion]]]]
      SARS‑CoV‑2 belongs to the broad family of viruses known as [[coronavirus]]es.<ref name="Fox2020">{{#invoke:Cite|journal |vauthors=Fox D |title=What you need to know about the novel coronavirus |journal=Nature |date=January 2020 |pmid=33483684 |doi=10.1038/d41586-020-00209-y|s2cid=213064026 }}</ref> It is a [[positive-sense single-stranded RNA virus|positive-sense single-stranded RNA]] (+ssRNA) virus, with a single linear RNA segment. Coronaviruses infect humans, other mammals, including livestock and companion animals, and avian species.<ref name="V'kovskik:21">{{#invoke:Cite|journal |vauthors=V'kovski P, Kratzel A, Steiner S, Stalder H, Thiel V |title=Coronavirus biology and replication: implications for SARS-CoV-2 |journal=Nature Reviews. Microbiology |volume=19 |issue=3 |pages=155–170 |date=March 2021 |pmid=33116300 |pmc=7592455 |doi=10.1038/s41579-020-00468-6}}</ref>

      Human coronaviruses are capable of causing illnesses ranging from the [[common cold]] to more severe diseases such as [[Middle East respiratory syndrome]] (MERS, fatality rate ≈34%). SARS-CoV-2 is the seventh known coronavirus to infect people, after [[human coronavirus 229E|229E]], [[human coronavirus NL63|NL63]], [[human coronavirus OC43|OC43]], [[human coronavirus HKU1|HKU1]], [[Middle East respiratory syndrome-related coronavirus|MERS-CoV]], and the original [[severe acute respiratory syndrome coronavirus|SARS-CoV]].<ref name="NEJM-Novel">{{#invoke:Cite|journal |vauthors=Zhu N, Zhang D, Wang W, Li X, Yang B, Song J, Zhao X, Huang B, Shi W, Lu R, Niu P, Zhan F, Ma X, Wang D, Xu W, Wu G, Gao GF, Tan W |title=A Novel Coronavirus from Patients with Pneumonia in China, 2019 |journal=The New England Journal of Medicine |volume=382 |issue=8 |pages=727–733 |date=February 2020 |pmid=31978945 |pmc=7092803 |doi=10.1056/NEJMoa2001017}}</ref>

      === Diagnosis ===
      {{Main|COVID-19#Diagnosis}}

      [[File:2020Sept26-BioFire-Waldron-HR.jpg|thumb|right|A nurse at [[McMurdo Station]] sets up polymerase chain reaction (PCR) testing equipment in September 2020.]]
      The standard method of testing for presence of SARS-CoV-2 is a [[nucleic acid test]],<ref name="20200130cdc">{{#invoke:Cite|web|date=30 January 2020|title=2019 Novel Coronavirus (2019-nCoV) Situation Summary|url=https://www.cdc.gov/coronavirus/2019-ncov/summary.html|url-status=live|archive-url=https://web.archive.org/web/20200126210549/https://www.cdc.gov/coronavirus/2019-nCoV/summary.html|archive-date=26 January 2020|access-date=30 January 2020|website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref> which detects the presence of viral RNA fragments.<ref name="WHO_InterimGuidance">{{#invoke:Cite|web |title=Coronavirus disease (COVID-19) technical guidance: Laboratory testing for 2019-nCoV in humans |work=[[World Health Organization]] (WHO) |url=https://www.who.int/emergencies/diseases/novel-coronavirus-2019/technical-guidance/laboratory-guidance |access-date=14 March 2020 |archive-url=https://web.archive.org/web/20200315044138/https://www.who.int/emergencies/diseases/novel-coronavirus-2019/technical-guidance/laboratory-guidance |archive-date=15 March 2020 |url-status=live}}</ref> As these tests detect RNA but not infectious virus, its "ability to determine duration of infectivity of patients is limited".<ref name="2k0iS">{{#invoke:Cite|journal | vauthors = Bullard J, Dust K, Funk D, Strong JE, Alexander D, Garnett L, Boodman C, Bello A, Hedley A, Schiffman Z, Doan K, Bastien N, Li Y, Van Caeseele PG, Poliquin G | title = Predicting Infectious Severe Acute Respiratory Syndrome Coronavirus 2 From Diagnostic Samples | journal = Clinical Infectious Diseases | volume = 71 | issue = 10 | pages = 2663–2666 | date = December 2020 | pmid = 32442256 | pmc = 7314198 | doi = 10.1093/cid/ciaa638 | doi-access = free }}</ref> The test is typically done on respiratory samples obtained by a [[nasopharyngeal swab]]; however, a nasal swab or sputum sample may also be used.<ref name="CDC2020Testing">{{#invoke:Cite|web|date=11 February 2020|title=Interim Guidelines for Collecting, Handling, and Testing Clinical Specimens from Persons for Coronavirus Disease 2019 (COVID-19)|url=https://www.cdc.gov/coronavirus/2019-ncov/lab/guidelines-clinical-specimens.html|url-status=live|archive-url=https://web.archive.org/web/20200304165907/https://www.cdc.gov/coronavirus/2019-nCoV/lab/guidelines-clinical-specimens.html|archive-date=4 March 2020|access-date=26 March 2020|website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref><ref name="20200129cdc">{{#invoke:Cite|web|date=29 January 2020|title=Real-Time RT-PCR Panel for Detection 2019-nCoV|url=https://www.cdc.gov/coronavirus/2019-ncov/lab/rt-pcr-detection-instructions.html|url-status=live|archive-url=https://web.archive.org/web/20200130202031/https://www.cdc.gov/coronavirus/2019-ncov/lab/rt-pcr-detection-instructions.html|archive-date=30 January 2020|access-date=1 February 2020|website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref> The WHO has published several testing protocols for the disease.<ref>{{#invoke:Cite|web|title=Laboratory testing for 2019 novel coronavirus (2019-nCoV) in suspected human cases|url=https://www.who.int/publications-detail/laboratory-testing-for-2019-novel-coronavirus-in-suspected-human-cases-20200117|url-status=live|archive-url=https://web.archive.org/web/20200317023052/https://www.who.int/publications-detail/laboratory-testing-for-2019-novel-coronavirus-in-suspected-human-cases-20200117|archive-date=17 March 2020|access-date=13 March 2020|website=[[World Health Organization]] (WHO)}}</ref>

      === Prevention ===
      {{Further|COVID-19#Prevention|Face masks during the COVID-19 pandemic|Social distancing measures related to the COVID-19 pandemic}}
      [[File:How to Contain COVID-19 icon (COVID19.GOV.PH).svg|thumb|left|170px|Common measures implemented to prevent the spread of the virus]]
      Preventive measures to reduce the chances of infection include getting vaccinated, staying at home or spending more time outdoors, avoiding crowded places, keeping distance from others, wearing a mask in public, ventilating indoor spaces, managing potential exposure durations, washing hands with soap and water often and for at least twenty seconds, practising good respiratory hygiene, and avoiding touching the eyes, nose, or mouth with unwashed hands.<ref name="cdc-prev">{{#invoke:Cite|web |title=COVID-19: How to protect yourself and others |url=https://www.cdc.gov/coronavirus/2019-ncov/prevent-getting-sick/prevention.html|date=26 January 2023 |publisher=U.S. [[Centers for Disease Control and Prevention]] (CDC) |access-date=3 February 2023}}</ref><ref name="who2023">{{#invoke:Cite|web |title=Advice for the public on COVID-19 |url=https://www.who.int/emergencies/diseases/novel-coronavirus-2019/advice-for-public |website=World Health Organization |access-date=27 May 2023 }}</ref>

      Those diagnosed with COVID-19 or who believe they may be infected are advised by healthcare authorities to stay home except to get medical care, call ahead before visiting a healthcare provider, wear a face mask before entering the healthcare provider's office and when in any room or vehicle with another person, cover coughs and sneezes with a tissue, regularly wash hands with soap and water and avoid sharing personal household items.<ref>{{#invoke:Cite|web |title=Isolation |url=https://www.cdc.gov/coronavirus/2019-ncov/your-health/isolation.html |website=Centers for Disease Control and Prevention |access-date=27 May 2023 |date=11 May 2023}}</ref><ref>{{#invoke:Cite|web |title=Infection prevention and control and preparedness for COVID-19 in healthcare settings – sixth update |url=https://www.ecdc.europa.eu/en/publications-data/infection-prevention-and-control-and-preparedness-covid-19-healthcare-settings |website=ecdc.europa.eu |access-date=27 May 2023 |date=9 February 2021}}</ref><ref>{{#invoke:Cite|web |title=People with symptoms of a respiratory infection including COVID-19 |url=https://www.gov.uk/guidance/people-with-symptoms-of-a-respiratory-infection-including-covid-19 |website=GOV.UK |access-date=27 May 2023 |date=10 June 2022}}</ref>

      ==== Vaccines ====
      {{Main|COVID-19 vaccine}}

      {{See also|History of COVID-19 vaccine development|Deployment of COVID-19 vaccines}}
      [[File:Elderly Slovak woman receiving her third Covid-19 vaccine 02.jpg|thumb|An elderly woman receiving a COVID-19 vaccination in [[Slovakia]]]]
      A COVID-19 [[vaccine]] is intended to provide [[acquired immunity]] against [[severe acute respiratory syndrome coronavirus 2]] (SARS‑CoV‑2), the virus that causes coronavirus disease 2019 ([[COVID-19]]). Prior to the COVID-19 pandemic, an established body of knowledge existed about the structure and function of [[coronavirus]]es causing diseases like [[severe acute respiratory syndrome]] (SARS) and [[Middle East respiratory syndrome]] (MERS). This knowledge accelerated the development of various [[vaccine platform]]s during early 2020.<ref name="pmid33341119">{{#invoke:Cite|journal |vauthors=Li YD, Chi WY, Su JH, Ferrall L, Hung CF, Wu TC |date=December 2020 |title=Coronavirus vaccine development: from SARS and MERS to COVID-19 |journal=Journal of Biomedical Science |volume=27 |issue=1 |article-number=104 |doi=10.1186/s12929-020-00695-2 |pmc=7749790 |pmid=33341119|doi-access=free}}</ref> 

      The initial focus of SARS-CoV-2 vaccines was on preventing symptomatic and severe illness.<ref>{{#invoke:Cite|journal | vauthors = Subbarao K |date=July 2021 |title=The success of SARS-CoV-2 vaccines and challenges ahead |journal=Cell Host & Microbe |volume=29 |issue=7 |pages=1111–1123 |doi=10.1016/j.chom.2021.06.016 |pmc=8279572 |pmid=34265245}}</ref> The COVID-19 vaccines are widely credited for their role in reducing the severity and death caused by COVID-19.<ref>{{#invoke:Cite|web |url=https://www.buzzfeednews.com/article/danvergano/mrna-covid-vaccine-success |title=COVID-19 Vaccines Work Way Better Than We Had Ever Expected. Scientists Are Still Figuring Out Why. |date=5 June 2021 | vauthors = Vergano D |website=[[BuzzFeed News]] |access-date=24 June 2021}}</ref><ref>{{#invoke:Cite|journal | vauthors = Mallapaty S, Callaway E, Kozlov M, Ledford H, Pickrell J, Van Noorden R | title = How COVID vaccines shaped 2021 in eight powerful charts | journal = Nature | volume = 600 | issue = 7890 | pages = 580–583 | date = December 2021 | pmid = 34916666 | doi = 10.1038/d41586-021-03686-x | s2cid = 245262732 | bibcode = 2021Natur.600..580M }}</ref> 

      As of August 2024, more than 5.6&nbsp;billion people had received one or more doses (13.7&nbsp;billion in total).<ref>{{Cite journal |last1=Mathieu |first1=Edouard |last2=Ritchie |first2=Hannah |last3=Rodés-Guirao |first3=Lucas |last4=Appel |first4=Cameron |last5=Gavrilov |first5=Daniel |last6=Giattino |first6=Charlie |last7=Hasell |first7=Joe |last8=Macdonald |first8=Bobbie |last9=Dattani |first9=Saloni |last10=Beltekian |first10=Diana |last11=Ortiz-Ospina |first11=Esteban |last12=Roser |first12=Max |date=2020-12-16 |title=Coronavirus (COVID-19) Vaccinations |url=https://ourworldindata.org/covid-vaccinations |journal=Our World in Data |language=en}}</ref> The Oxford-AstraZeneca vaccine was the most widely used.<ref>{{#invoke:Cite|news|author=The Visual and Data Journalism Team|title=Covid vaccines: How fast is progress around the world?|work=BBC News|date=9 March 2021 |url=https://www.bbc.com/news/world-56237778|access-date=18 August 2021}}</ref> According to a June 2022 study, COVID-19 vaccines prevented an additional 14.4&nbsp;million to 19.8&nbsp;million deaths in 185 countries and territories from 8 December 2020 to 8 December 2021.<ref>{{#invoke:Cite|journal |vauthors=Watson OJ, Barnsley G, Toor J, Hogan AB, Winskill P, Ghani AC |date=June 2022 |title=Global impact of the first year of COVID-19 vaccination: a mathematical modelling study |journal=[[The Lancet Infectious Diseases]] |volume=22 |issue=9 |pages=1293–1302 |doi=10.1016/s1473-3099(22)00320-6 |pmc=9225255 |pmid=35753318 |doi-access=free |title-link=doi |bibcode=2022LanID..22.1293W }}</ref><ref>{{#invoke:Cite|web |date=24 June 2022 |title=COVID-19 vaccines saved nearly 20 million lives in a year, study says |url=https://www.cbsnews.com/news/covid-19-vaccine-saved-nearly-20-million-lives-in-a-year-study-says/ |url-status=live |archive-url=https://web.archive.org/web/20220629025146/https://www.cbsnews.com/news/covid-19-vaccine-saved-nearly-20-million-lives-in-a-year-study-says/ |archive-date=29 June 2022 |access-date=27 June 2022 |website=[[CBS News]]}}</ref>

      In 2022, the first recombinant protein-based COVID-19 vaccine (the [[Novavax COVID-19 vaccine|Novavax vaccine]]) was authorised for use in adults in the United Kingdom. It has subsequently received endorsement/authorisation from the WHO, US, European Union, and Australia.<ref>{{#invoke:Cite|journal | vauthors = Hammershaimb EA, Tapia MD |title=Can protein vaccines for COVID-19 win over the vaccine-hesitant? |journal=Expert Review of Vaccines |date=31 December 2023 |volume=22 |issue=1 |pages=210–212 |doi=10.1080/14760584.2023.2182293 |pmid=36803364 |s2cid=257069394 |url=https://www.tandfonline.com/doi/full/10.1080/14760584.2023.2182293 |access-date=27 May 2023 |issn=1476-0584}}</ref><ref>{{#invoke:Cite|journal | vauthors = Parums DV |title=Editorial: First Approval of the Protein-Based Adjuvanted Nuvaxovid (NVX-CoV2373) Novavax Vaccine for SARS-CoV-2 Could Increase Vaccine Uptake and Provide Immune Protection from Viral Variants. |journal=Medical Science Monitor |date=1 March 2022 |volume=28 |article-number=e936523 |doi=10.12659/MSM.936523 |pmid=35228506 |pmc=8897963 }}</ref> That same year also saw the first inhalable vaccine, developed by Chinese biopharmaceutical company [[CanSino Biologics#COVID-19 vaccine development|CanSino Biologics]].<ref>{{#invoke:Cite|news | vauthors = Graham F |title=Daily briefing: China reports first roll-out of inhalable COVID-19 vaccine |url=https://www.nature.com/articles/d41586-022-03548-0 |access-date=27 May 2023 |journal=Nature |publisher=Springer Nature |date=1 November 2022 |doi=10.1038/d41586-022-03548-0| pmid = 36323898 }}</ref>

      High-income countries rapidly bought up vaccines at the start of the pandemic, leading to concerns about [[vaccine equity]]. By April 2021, one in 500 people in [[low and middle-income countries]] had been vaccinated, compared with one in four in high-income countries.<ref>{{Cite journal |last1=Borowicz |first1=Julia |last2=Zhang |first2=Zheting |last3=Day |first3=Giskin |last4=Costa |first4=Mariana Pinto da |date=2022 |title=Vaccine equity in COVID-19: a meta-narrative review |url=https://gh.bmj.com/content/7/12/e009876 |journal=BMJ Global Health |language=en |volume=7 |issue=12 |article-number=e009876 |doi=10.1136/bmjgh-2022-009876 |pmid=36524409 |pmc=9748514 |issn=2059-7908 }}</ref>

      === Treatment ===
      {{Main|Treatment and management of COVID-19}}

      [[File:Respiradores da USP utilizados do Incor (50119127303).jpg|thumb|A critically ill patient receiving invasive ventilation in the intensive care unit of the [[Heart Institute, University of São Paulo]] in July 2020. Due to a shortage of mechanical ventilators, a [[resuscitator|bridge ventilator]] is being used to automatically actuate a [[bag valve mask]].]]
      For the first two years of the pandemic, no specific and effective treatment or cure was available.<ref name="BMJLivingReview">{{#invoke:Cite|journal | vauthors = Siemieniuk RA, Bartoszko JJ, Ge L, Zeraatkar D, Izcovich A, Kum E, Pardo-Hernandez H, Qasim A, Martinez JP, Rochwerg B, Lamontagne F, Han MA, Liu Q, Agarwal A, Agoritsas T, Chu DK, Couban R, Cusano E, Darzi A, Devji T, Fang B, Fang C, Flottorp SA, Foroutan F, Ghadimi M, Heels-Ansdell D, Honarmand K, Hou L, Hou X, Ibrahim Q, Khamis A, Lam B, Loeb M, Marcucci M, McLeod SL, Motaghi S, Murthy S, Mustafa RA, Neary JD, Rada G, Riaz IB, Sadeghirad B, Sekercioglu N, Sheng L, Sreekanta A, Switzer C, Tendal B, Thabane L, Tomlinson G, Turner T, Vandvik PO, Vernooij RW, Viteri-García A, Wang Y, Yao L, Ye Z, Guyatt GH, Brignardello-Petersen R | title = Drug treatments for covid-19: living systematic review and network meta-analysis | journal = BMJ | volume = 370 | article-number = m2980 | date = 31 March 2021 | pmid = 32732190 | pmc = 7390912 | doi = 10.1136/bmj.m2980 }}</ref><ref name="cdcmuseum">{{#invoke:Cite|web |title=CDC Museum COVID-19 Timeline |url=https://www.cdc.gov/museum/timeline/covid19.html |website=Centers for Disease Control and Prevention |access-date=27 May 2023 |date=15 March 2023}}</ref> In 2021, the European Medicines Agency's (EMA) Committee for Medicinal Products for Human Use (CHMP) approved the oral antiviral [[protease inhibitor (pharmacology)|protease inhibitor]], [[Paxlovid]] (nirmatrelvir plus the HIV antiviral [[ritonavir]]), to treat adult patients.<ref>{{#invoke:Cite|news|date=17 December 2021|title=EMA CHMP advises use of Pfizer's Covid-19 oral antiviral Paxlovid|url=https://www.pharmaceutical-technology.com/news/ema-chmp-pfizer-paxlovid/|url-status=live|access-date=18 December 2021|newspaper=Pharmaceutical Technology|archive-url=https://web.archive.org/web/20211218175759/https://www.pharmaceutical-technology.com/news/ema-chmp-pfizer-paxlovid/ |archive-date=18 December 2021 | vauthors = Priyan V }}</ref> FDA later gave it an EUA.<ref>{{#invoke:Cite|web|title=Paxlovid LOA 12222021 {{!}} FDA|url=https://www.fda.gov/media/155049|access-date=23 December 2021|website=fda.gov}}</ref>

      Most cases of COVID-19 are mild. In these, supportive care includes medication such as [[paracetamol]] or [[NSAID]]s to relieve symptoms (fever,<ref>{{#invoke:Cite|journal | vauthors = Islam MA, Kundu S, Alam SS, Hossan T, Kamal MA, Hassan R | title = Prevalence and characteristics of fever in adult and paediatric patients with coronavirus disease 2019 (COVID-19): A systematic review and meta-analysis of 17515 patients | journal = PLOS ONE | volume = 16 | issue = 4 | article-number = e0249788 | date = 6 April 2021 | pmid = 33822812 | pmc = 8023501 | doi = 10.1371/journal.pone.0249788 | s2cid = 233173405 | doi-access = free | bibcode = 2021PLoSO..1649788I }}</ref> body aches, cough), adequate intake of oral fluids and rest.<ref name="cdcmuseum"/><ref>Multiple sources:
      * {{#invoke:Cite|journal | vauthors = Wang Y, Wang Y, Chen Y, Qin Q | title = Unique epidemiological and clinical features of the emerging 2019 novel coronavirus pneumonia (COVID-19) implicate special control measures | journal = Journal of Medical Virology | volume = 92 | issue = 6 | pages = 568–576 | date = June 2020 | pmid = 32134116 | pmc = 7228347 | doi = 10.1002/jmv.25748 | doi-access = free }}
      * {{#invoke:Cite|journal | vauthors = Martel J, Ko YF, Young JD, Ojcius DM | title = Could nasal nitric oxide help to mitigate the severity of COVID-19? | journal = Microbes and Infection | volume = 22 | issue = 4–5 | pages = 168–171 | date = May 2020 | pmid = 32387333 | pmc = 7200356 | doi = 10.1016/j.micinf.2020.05.002 }}
      * {{#invoke:Cite|news | title=Coronavirus recovery: breathing exercises|url=https://www.hopkinsmedicine.org/health/conditions-and-diseases/coronavirus/coronavirus-recovery-breathing-exercises|access-date=30 July 2020|website=hopkinsmedicine.org|publisher=Johns Hopkins Medicine}}</ref> Good personal hygiene and a [[healthy diet]] are also recommended.<ref>{{#invoke:Cite|journal | vauthors = Wang L, Wang Y, Ye D, Liu Q | title = Review of the 2019 novel coronavirus (SARS-CoV-2) based on current evidence | journal = International Journal of Antimicrobial Agents | volume = 55 | issue = 6 | article-number = 105948 | date = June 2020 | pmid = 32201353 | pmc = 7156162 | doi = 10.1016/j.ijantimicag.2020.105948 }}</ref>

      [[Supportive care]] in severe cases includes treatment to [[symptomatic treatment|relieve symptom]]s, [[fluid replacement|fluid therapy]], [[oxygen support]] and [[prone positioning]], and medications or devices to support other affected vital organs.<ref>Multiple sources:
      * {{#invoke:Cite|journal|vauthors=Fisher D, Heymann D|date=February 2020|title=Q&A: The novel coronavirus outbreak causing COVID-19|journal=BMC Medicine|volume=18|issue=1|article-number=57|doi=10.1186/s12916-020-01533-w|pmc=7047369|pmid=32106852|doi-access=free}}
      * {{#invoke:Cite|journal|vauthors=Liu K, Fang YY, Deng Y, Liu W, Wang MF, Ma JP, Xiao W, Wang YN, Zhong MH, Li CH, Li GC, Liu HG|date=May 2020|title=Clinical characteristics of novel coronavirus cases in tertiary hospitals in Hubei Province|journal=Chinese Medical Journal|volume=133|issue=9|pages=1025–1031|doi=10.1097/CM9.0000000000000744|pmc=7147277|pmid=32044814|doi-access=free}}
      * {{#invoke:Cite|journal|vauthors=Wang T, Du Z, Zhu F, Cao Z, An Y, Gao Y, Jiang B|date=March 2020|title=Comorbidities and multi-organ injuries in the treatment of COVID-19|journal=Lancet|publisher=Elsevier BV|volume=395|issue=10228|pages=e52|doi=10.1016/s0140-6736(20)30558-4|pmc=7270177|pmid=32171074|doi-access=free}}</ref> More severe cases may need treatment in hospital. In those with low oxygen levels, use of the glucocorticoid [[dexamethasone]] is recommended to reduce mortality.<ref>Multiple sources:
      * {{#invoke:Cite|journal | vauthors = | title = Update to living WHO guideline on drugs for covid-19 | journal = BMJ | volume = 371 | article-number = m4475 | date = November 2020 | pmid = 33214213 | doi = 10.1136/bmj.m4475 | s2cid = 227059995 | doi-access = free }}
      * {{#invoke:Cite|web | title=Q&A: Dexamethasone and COVID-19|url=https://www.who.int/news-room/q-a-detail/q-a-dexamethasone-and-covid-19|access-date=11 July 2020|publisher=World Health Organization}}
      * {{#invoke:Cite|web | title=Home|url=https://covid19evidence.net.au/|access-date=11 July 2020|website=[[National COVID-19 Clinical Evidence Taskforce]]}}</ref> [[Noninvasive ventilation]] and, ultimately, admission to an [[intensive care unit]] for [[mechanical ventilation]] may be required to support breathing.<ref name="NIHGuidelines2020">{{#invoke:Cite|web | title=COVID-19 Treatment Guidelines|url=https://www.covid19treatmentguidelines.nih.gov/|access-date=18 January 2021|website=nih.gov|publisher=National Institutes of Health}}</ref> [[Extracorporeal membrane oxygenation]] (ECMO) has been used to address the issue of respiratory failure.<ref name="Guan Ni Hu Liang p.">{{#invoke:Cite|journal | vauthors = Guan WJ, Ni ZY, Hu Y, Liang WH, Ou CQ, He JX, Liu L, Shan H, Lei CL, Hui DS, Du B, Li LJ, Zeng G, Yuen KY, Chen RC, Tang CL, Wang T, Chen PY, Xiang J, Li SY, Wang JL, Liang ZJ, Peng YX, Wei L, Liu Y, Hu YH, Peng P, Wang JM, Liu JY, Chen Z, Li G, Zheng ZJ, Qiu SQ, Luo J, Ye CJ, Zhu SY, Zhong NS | title = Clinical Characteristics of Coronavirus Disease 2019 in China | journal = The New England Journal of Medicine | volume = 382 | issue = 18 | pages = 1708–1720 | date = April 2020 | pmid = 32109013 | pmc = 7092819 | doi = 10.1056/nejmoa2002032 | publisher = Massachusetts Medical Society | doi-access = free }}</ref><ref name="Henry 2020 p.">{{#invoke:Cite|journal | vauthors = Henry BM | title = COVID-19, ECMO, and lymphopenia: a word of caution | journal = The Lancet. Respiratory Medicine | volume = 8 | issue = 4 | pages = e24 | date = April 2020 | pmid = 32178774 | pmc = 7118650 | doi = 10.1016/s2213-2600(20)30119-3 | publisher = Elsevier BV }}</ref>

      Existing drugs such as [[hydroxychloroquine]], [[lopinavir/ritonavir]], and [[ivermectin]] are not recommended by US or European health authorities, as there is no good evidence they have any useful effect.<ref name="BMJLivingReview"/><ref name="Kim Read Fauci p=2149">{{#invoke:Cite|journal | vauthors = Kim PS, Read SW, Fauci AS | title = Therapy for Early COVID-19: A Critical Need | journal = JAMA | volume = 324 | issue = 21 | pages = 2149–2150 | date = December 2020 | pmid = 33175121 | doi = 10.1001/jama.2020.22813 | publisher = American Medical Association (AMA) | s2cid = 226301949 | doi-access = free | author-link3 = Anthony Fauci }}</ref><ref name="NIHGuidelinesTherapeuticManagement">{{#invoke:Cite|web | title=COVID-19 Treatment Guidelines|url=https://www.covid19treatmentguidelines.nih.gov/therapeutic-management|access-date=18 January 2021|website=nih.gov|publisher=National Institutes of Health}}/</ref> The antiviral [[remdesivir]] is available in the US, Canada, Australia, and several other countries, with varying restrictions; however, it is not recommended for use with mechanical ventilation, and is discouraged altogether by the WHO,<ref name="Hsu p=m4457">{{#invoke:Cite|journal | vauthors = Hsu J | title = Covid-19: What now for remdesivir? | journal = BMJ | volume = 371 | article-number = m4457 | date = November 2020 | pmid = 33214186 | doi = 10.1136/bmj.m4457 | s2cid = 227060756 | doi-access = free }}</ref> due to limited evidence of its efficacy.<ref name="BMJLivingReview"/>

      === Prognosis ===
      {{Further|COVID-19#Prognosis| Long COVID}}
      The severity of COVID-19 varies. It may take a mild course with few or no symptoms, resembling other common upper respiratory diseases such as the [[common cold]]. In 3–4% of cases (7.4% for those over age 65) symptoms are severe enough to cause hospitalisation.<ref name="pmid33087398">{{#invoke:Cite|journal | vauthors = Doshi P | title = Will covid-19 vaccines save lives? Current trials aren't designed to tell us | journal = BMJ | volume = 371 | article-number = m4037 | date = October 2020 | pmid = 33087398 | doi = 10.1136/bmj.m4037 | s2cid = 224817161 }}</ref> Mild cases typically recover within two weeks, while those with severe or critical diseases may take three to six weeks to recover. Among those who have died, the time from symptom onset to death has ranged from two to eight weeks. Prolonged [[prothrombin]] time and elevated [[C-reactive protein]] levels on admission to the hospital are associated with severe course of COVID-19 and with a transfer to [[intensive care unit]]s (ICU).<ref>{{#invoke:Cite|journal | vauthors = Baranovskii DS, Klabukov ID, Krasilnikova OA, Nikogosov DA, Polekhina NV, Baranovskaia DR, Laberko LA |title=Prolonged prothrombin time as an early prognostic indicator of severe acute respiratory distress syndrome in patients with COVID-19 related pneumonia. |journal=Current Medical Research and Opinion |date=January 2021 |volume=37 |issue=1 |pages=21–25 |doi=10.1080/03007995.2020.1853510 |pmid=33210948 |pmc=7738209 }}</ref><ref>{{#invoke:Cite|journal | vauthors = Christensen B, Favaloro EJ, Lippi G, Van Cott EM | title = Hematology Laboratory Abnormalities in Patients with Coronavirus Disease 2019 (COVID-19) | journal = Seminars in Thrombosis and Hemostasis | volume = 46 | issue = 7 | pages = 845–849 | date = October 2020 | pmid = 32877961 | pmc = 7645834 | doi = 10.1055/s-0040-1715458 }}</ref>

      Between 5% and 50% of COVID-19 patients experience [[long COVID]],<ref>{{#invoke:Cite|journal |vauthors=Ledford H |date=June 2022 |title=How common is long COVID? Why studies give different answers |url=https://www.nature.com/articles/d41586-022-01702-2 |url-status=live |journal=Nature |volume=606 |issue=7916 |pages=852–853 |bibcode=2022Natur.606..852L |doi=10.1038/d41586-022-01702-2 |pmid=35725828 |archive-url=https://web.archive.org/web/20221008182108/https://www.nature.com/articles/d41586-022-01702-2 |archive-date=8 October 2022 |access-date=13 August 2022 |s2cid=249887289}}</ref> a condition characterised by long-term [[sequela|consequence]]s persisting after the typical convalescence period of the disease.<ref>{{#invoke:Cite|web |title=Post-COVID Conditions |url=https://www.cdc.gov/coronavirus/2019-ncov/long-term-effects/ |website=Centers for Disease Control and Prevention |access-date=28 May 2024 |language=en-us |date=14 March 2024 |archive-date=6 May 2022 |archive-url=https://web.archive.org/web/20220506182316/https://www.cdc.gov/coronavirus/2019-ncov/long-term-effects/ |url-status=live }}</ref><ref>{{#invoke:Cite|journal |date=12 May 2022 |title=Researching long COVID: addressing a new global health challenge |url=https://evidence.nihr.ac.uk/themedreview/researching-long-covid-addressing-a-new-global-health-challenge/ |journal=NIHR Evidence |doi=10.3310/nihrevidence_50331 |s2cid=249942230}}</ref> The most commonly reported clinical presentations are [[fatigue]] and memory problems, as well as [[malaise]], headaches, [[shortness of breath]], loss of smell, [[muscle weakness]], low fever and [[cognitive dysfunction]].<ref name="ref1">{{#invoke:Cite|journal |title=Clinical characteristics of COVID-19 |website=ecdc.europa.eu |date=10 June 2020 |url=https://www.ecdc.europa.eu/en/covid-19/latest-evidence/clinical |access-date=26 May 2023 }}</ref><ref>{{#invoke:Cite|journal | vauthors = Leviner S |date=7 May 2021 |title=Recognizing the Clinical Sequelae of COVID-19 in Adults: COVID-19 Long-Haulers |journal=The Journal for Nurse Practitioners |volume=17 |issue=8 |pages=946–949 |doi=10.1016/j.nurpra.2021.05.003 |issn=1555-4155 |pmc=8103144 |pmid=33976591}}</ref><ref>{{#invoke:Cite|news |title=Nearly half of people infected with COVID-19 experienced some 'long COVID' symptoms, study finds |work=[[University of Michigan]] |url=https://medicalxpress.com/news/2022-04-people-infected-covid-experienced-covid.html |access-date=15 May 2022}}</ref><ref>{{#invoke:Cite|journal | vauthors = Chen C, Haupert SR, Zimmermann L, Shi X, Fritsche LG, Mukherjee B |date=16 April 2022 |title=Global Prevalence of Post COVID-19 Condition or Long COVID: A Meta-Analysis and Systematic Review |journal=The Journal of Infectious Diseases |volume=226 |issue=9 |pages=1593–1607 |doi=10.1093/infdis/jiac136 |pmc=9047189 |pmid=35429399}}</ref>

      == Strategies ==
      {{Main|Public health mitigation of COVID-19}}

      [[File:20200410 Flatten the curve, raise the line - pandemic (English).gif|thumb|upright=1.5|Goals of mitigation include delaying and reducing peak burden on healthcare (''[[flattening the curve]]'') and lessening overall cases and health impact.<ref name="Lancet2020Flatten"/><ref name="RnW59"/> Moreover, progressively greater increases in healthcare capacity (''[[raising the line]]'') such as by increasing bed count, personnel, and equipment, help to meet increased demand.<ref name="Vox_20200407">{{#invoke:Cite|news | vauthors = Barclay E, Scott D, Animashaun A |title=The US doesn't just need to flatten the curve. It needs to "raise the line." |url=https://www.vox.com/2020/4/7/21201260/coronavirus-usa-chart-mask-shortage-ventilators-flatten-the-curve |work=Vox |date=7 April 2020 |archive-url=https://web.archive.org/web/20200407155950/https://www.vox.com/2020/4/7/21201260/coronavirus-usa-chart-mask-shortage-ventilators-flatten-the-curve |archive-date=7 April 2020 |url-status=live}}</ref>]]
      Many countries attempted to slow or stop the spread of COVID-19 by recommending, mandating or prohibiting behaviour changes, while others relied primarily on providing information. Measures ranged from public advisories to stringent lockdowns. Outbreak control strategies are divided into elimination and mitigation. Experts differentiate between elimination strategies (known as "[[zero-COVID]]") that aim to completely stop the spread of the virus within the community,<ref name=Barcelona >Anna Llupià, Rodríguez-Giralt, Anna Fité, Lola Álamo, Laura de la Torre, Ana Redondo, Mar Callau and Caterina Guinovart (2020) ''[https://www.isglobal.org/documents/10179/7943094/26_ISGlobal+COVID19+y+COVIDCero+o+Maxima+Supresion+EN/0a4e83bb-6257-4f5d-8960-16c323b464b2 What Is a Zero-COVID Strategy]'', {{Webarchive|url=https://web.archive.org/web/20220103205923/https://www.isglobal.org/documents/10179/7943094/26_ISGlobal+COVID19+y+COVIDCero+o+Maxima+Supresion+EN/0a4e83bb-6257-4f5d-8960-16c323b464b2 |date=3 January 2022 }}, Barcelona Institute for Global Health – COVID-19 & response strategy. "''The strategy of control and maximum suppression (zero-COVID) has been implemented successfully in a number of countries. The objective of this strategy is to keep transmission of the virus as close to zero as possible and ultimately to eliminate it entirely from particular geographical areas. The strategy aims to increase the capacity to identify and trace chains of transmission and to identify and manage outbreaks, while also integrating economic, psychological, social and healthcare support to guarantee the isolation of cases and contacts. This approach is also known as "Find, Test, Trace, Isolate and Support" (FTTIS)''"</ref> and mitigation strategies (commonly known as "[[flattening the curve]]") that attempt to lessen the effects of the virus on society, but which still tolerate some level of transmission within the community.<ref name=Livermore >{{#invoke:Cite|web| vauthors = Livermore D |author-link=David Livermore (microbiologist)|url=https://www.hartgroup.org/zero-covid-an-impossible-dream/|title='Zero Covid' – an impossible dream|date=28 March 2021|publisher=HART – Health Advisory & Recovery Team|access-date=2 January 2022|archive-date=2 January 2022|archive-url=https://web.archive.org/web/20220102070601/https://www.hartgroup.org/zero-covid-an-impossible-dream/|url-status=live}}</ref> These initial strategies can be pursued sequentially or simultaneously during the [[acquired immunity|acquired immunity phase]] through natural and [[COVID-19 vaccine|vaccine-induced immunity]].<ref name="Bhopal2020">{{#invoke:Cite|journal | vauthors = Bhopal RS | title = To achieve "zero covid" we need to include the controlled, careful acquisition of population (herd) immunity | journal = BMJ | volume = 370 | article-number = m3487 | date = September 2020 | pmid = 32907816 | doi = 10.1136/bmj.m3487 | s2cid = 221538577 | url = https://www.pure.ed.ac.uk/ws/files/164492854/To_achieve_zero_covid_.pdf | eissn = 1756-1833 }}</ref>

      ''Nature'' reported in 2021 that 90% of researchers who responded to a survey "think that the coronavirus will become [[endemic (epidemiology)|endemic]]".<ref>{{#invoke:Cite|journal | vauthors = Phillips N | title = The coronavirus is here to stay – here's what that means | journal = Nature | volume = 590 | issue = 7846 | pages = 382–384 | date = February 2021 | pmid = 33594289 | doi = 10.1038/d41586-021-00396-2 | s2cid = 231945680 | bibcode = 2021Natur.590..382P }}</ref>

      === Containment ===
      {{further|Zero-COVID}}
      Containment is undertaken to stop an outbreak from spreading into the general population. Infected individuals are isolated while they are infectious. The people they have interacted with are contacted and isolated for long enough to ensure that they are either not infected or no longer contagious. Screening is the starting point for containment. Screening is done by checking for symptoms to identify infected individuals, who can then be isolated or offered treatment.<ref name="f4SpW">{{#invoke:Cite|news|title=Fever Screening|url=https://intellisec.co.za/fever-screening/|website=IntelliSEC &#124; Durban, Johannesburg, Cape Town}}</ref> The zero-COVID strategy involves using public health measures such as [[contact tracing]], [[COVID-19 testing|mass testing]], [[travel during the COVID-19 pandemic|border quarantine]], [[COVID-19 lockdowns|lockdown]]s, and [[use and development of software for COVID-19 pandemic mitigation|mitigation software]] to stop [[transmission of COVID-19|community transmission]] of COVID-19 as soon as it is detected, with the goal of getting the area back to zero detected infections and resuming normal economic and social activities.<ref name=Barcelona/><ref name="Lancet-Li-2020">{{#invoke:Cite|journal | vauthors = Li Z, Chen Q, Feng L, Rodewald L, Xia Y, Yu H, Zhang R, An Z, Yin W, Chen W, Qin Y, Peng Z, Zhang T, Ni D, Cui J, Wang Q, Yang X, Zhang M, Ren X, Wu D, Sun X, Li Y, Zhou L, Qi X, Song T, Gao GF, Feng Z | title = Active case finding with case management: the key to tackling the COVID-19 pandemic | journal = Lancet | volume = 396 | issue = 10243 | pages = 63–70 | date = July 2020 | pmid = 32505220 | pmc = 7272157 | doi = 10.1016/S0140-6736(20)31278-2 }}</ref> Successful containment or suppression reduces [[basic reproduction number#Effective reproduction number|Rt]] to less than 1.<ref name="ImpCollege16mar2020"/>

      === Mitigation ===
      {{further|Flattening the curve}}
      Should containment fail, efforts focus on mitigation: measures taken to slow the spread and limit its effects on the healthcare system and society.
      Successful mitigation delays and decreases the epidemic peak, known as "flattening the [[epidemic curve]]".<ref name="Lancet2020Flatten"/> This decreases the risk of overwhelming health services and provides more time for developing vaccines and treatments.<ref name="Lancet2020Flatten"/> Individual behaviour changed in many jurisdictions. Many people worked from home instead of at their traditional workplaces.<ref>{{#invoke:Cite|web | author = US Census Bureau |title=Those Who Switched to Telework Have Higher Income, Education and Better Health |url=https://www.census.gov/library/stories/2021/03/working-from-home-during-the-pandemic.html |website=Census.gov |access-date=25 December 2021}}</ref>

      ==== Non-pharmaceutical interventions ====
      [[File:04.02 總統視察「中央流行疫情指揮中心」 49726568957 66543b616e o.jpg|thumb|The CDC and WHO advise that masks (such as worn here by Taiwanese president [[Tsai Ing-wen]]) reduce the spread of SARS-CoV-2.]]
      [[Non-pharmaceutical intervention]]s that may reduce spread include personal actions such as wearing [[face masks during the COVID-19 pandemic|face mask]]s, self-quarantine, and [[hand washing|hand hygiene]]; community measures aimed at reducing interpersonal contacts such as closing workplaces and schools and cancelling large gatherings; community engagement to encourage acceptance and participation in such interventions; as well as environmental measures such as surface cleaning.<ref name="community mitigation"/>

      ==== Other measures ====
      More drastic actions, such as quarantining entire populations and strict travel bans have been attempted in various jurisdictions.<ref name="RwmYm"/> The [[Chinese government response to COVID-19|Chinese]] and [[COVID-19 pandemic in Australia#Responses|Australian government approach]]es have included many lockdowns and are widely considered the most strict. The [[New Zealand government response to the COVID-19 pandemic|New Zealand government response]] included the most severe travel restrictions. As part of its [[K-Quarantine]] programme, South Korea introduced mass screening and localised quarantines, and issued alerts on the movements of infected individuals. The [[COVID-19 pandemic in Singapore#Government response|Singaporean government's response]] included so-called "[[2020 Singapore circuit breaker measures|circuit breaker lockdown]]s" and financial support for those affected while also imposing large fines for those who broke quarantine.<ref name="shZdf"/>

      ==== Contact tracing ====
      {{See also|Use and development of software for COVID-19 pandemic mitigation|Public health mitigation of COVID-19#Information technology}}
      [[Contact tracing]] attempts to identify recent contacts of newly infected individuals, and to screen them for infection; the traditional approach is to request a list of contacts from infectees, and then telephone or visit the contacts.<ref name="web"/> Contact tracing was widely used during the [[Western African Ebola virus epidemic]] in 2014.<ref>{{#invoke:Cite|journal | vauthors = Webb G, Browne C, Huo X, Seydi O, Seydi M, Magal P |title=A model of the 2014 ebola epidemic in west Africa with contact tracing |journal=PLOS Currents |date=30 January 2015 |volume=7 |pages=ecurrents.outbreaks.846b2a31ef37018b7d1126a9c8adf22a | doi = 10.1371/currents.outbreaks.846b2a31ef37018b7d1126a9c8adf22a | doi-broken-date = 1 July 2025 | doi-access = free |url=https://currents.plos.org/outbreaks/article/a-model-of-the-2014-ebola-epidemic-in-west-africa-with-contact-tracing-2/ |pmid=25685636 |pmc=4323422 |issn=2157-3999}}</ref>

      Another approach is to collect location data from mobile devices to identify those who have come in significant contact with infectees, which prompted privacy concerns.<ref name="IngramWard20200407">{{#invoke:Cite|web|date=7 April 2020|title=Behind the global efforts to make a privacy-first coronavirus tracking app|url=https://www.nbcnews.com/tech/tech-news/behind-global-efforts-make-privacy-first-coronavirus-tracking-app-n1177871|access-date=10 April 2020|publisher=NBC News|vauthors=Ingram D, Ward J}}</ref> On 10 April 2020, Google and [[Apple Inc.|Apple]] announced an initiative for privacy-preserving contact tracing.<ref name="0DF25">{{#invoke:Cite|web | url=https://techcrunch.com/2020/04/10/apple-and-google-are-launching-a-joint-covid-19-tracing-tool/ |last=Panzarino |first=Matthew |title=Apple and Google are launching a joint COVID-19 tracing tool for iOS and Android |website=TechCrunch |date=10 April 2020 |access-date=10 April 2020}}</ref><ref name="20200410apple">{{#invoke:Cite|web | url=https://www.apple.com/covid19/contacttracing/ |title=Privacy-Preserving Contact Tracing |date=10 April 2020 |website=Apple }}</ref> In Europe and in the US, [[Palantir Technologies]] initially provided COVID-19 tracking services.<ref name="0k3hR">{{#invoke:Cite|news |title=Palantir provides COVID-19 tracking software to CDC and NHS, pitches European health agencies |url=https://techcrunch.com/2020/04/01/palantir-coronavirus-cdc-nhs-gotham-foundry/ |access-date=22 April 2020 |work=TechCrunch|date=April 2020 }}</ref>

      === Health care ===
      {{Further|Flattening the curve|list of countries by hospital beds|Shortages related to the COVID-19 pandemic}}
      WHO described increasing capacity and adapting healthcare as a fundamental mitigation.<ref name="WHOEuropeResponse">{{#invoke:Cite|web | url=https://www.euro.who.int/en/health-topics/health-emergencies/coronavirus-covid-19/novel-coronavirus-2019-ncov-technical-guidance/coronavirus-disease-covid-19-outbreak-technical-guidance-europe/hospital-readiness-checklist-for-covid-19 |title=Hospital readiness checklist for COVID-19 |date=25 March 2020 |publisher=World Health Organization |access-date=27 March 2020}}</ref> The ECDC and WHO's European regional office issued guidelines for hospitals and [[primary health care|primary healthcare]] services for shifting resources at multiple levels, including focusing laboratory services towards testing, cancelling elective procedures, separating and isolating patients, and increasing [[intensive care unit|intensive care]] capabilities by training personnel and increasing [[ventilator]]s and beds.<ref name="WHOEuropeResponse"/><ref name="ECDCresponse">{{#invoke:Cite|report |url=https://www.ecdc.europa.eu/en/publications-data/checklist-hospitals-preparing-reception-and-care-coronavirus-2019-covid-19 |title=Checklist for hospitals preparing for the reception and care of coronavirus 2019 (COVID-19) patients |date=26 February 2020 |publisher=European Centre for Disease Prevention and Control |access-date=27 March 2020}}</ref> The pandemic drove widespread adoption of [[telehealth]].<ref>Multiple sources:
      * {{#invoke:Cite|journal | vauthors = Smith AC, Thomas E, Snoswell CL, Haydon H, Mehrotra A, Clemensen J, Caffery LJ | title = Telehealth for global emergencies: Implications for coronavirus disease 2019 (COVID-19) | journal = Journal of Telemedicine and Telecare | volume = 26 | issue = 5 | pages = 309–313 | date = June 2020 | pmid = 32196391 | pmc = 7140977 | doi = 10.1177/1357633x20916567 }}
      * {{#invoke:Cite|journal | vauthors = Ohannessian R, Duong TA, Odone A | title = Global Telemedicine Implementation and Integration Within Health Systems to Fight the COVID-19 Pandemic: A Call to Action | journal = JMIR Public Health and Surveillance | volume = 6 | issue = 2 | article-number = e18810 | date = April 2020 | pmid = 32238336 | pmc = 7124951 | doi = 10.2196/18810 |doi-access=free}}
      * {{#invoke:Cite|journal | vauthors = Keshvardoost S, Bahaadinbeigy K, Fatehi F | title = Role of Telehealth in the Management of COVID-19: Lessons Learned from Previous SARS, MERS, and Ebola Outbreaks | journal = Telemedicine Journal and e-Health | volume = 26 | issue = 7 | pages = 850–852 | date = July 2020 | pmid = 32329659 | doi = 10.1089/tmj.2020.0105 | s2cid = 216111135 | doi-access = free }}</ref>

      ==== Improvised manufacturing ====
      [[File:COVID-19 patient wearing scuba mask in absence of available artificial lung ventilation. Chernivtsi, Ukraine.jpg|thumb|A patient in Ukraine in 2020 wearing a [[diving mask|scuba mask]] in the absence of [[artificial ventilation]]]]
      Due to [[supply chain]] capacity limitations, some manufacturers began [[3D printing]] material such as nasal swabs and ventilator parts.<ref name="technologyreview615420">{{#invoke:Cite|news | vauthors = Temple J |title=How 3D printing could save lives in the coronavirus outbreak |url=https://www.technologyreview.com/s/615420/3d-printing-coronavirus-covid-19-medical-supplies-devices/ |access-date=5 April 2020 |work=MIT Technology Review}}</ref><ref name="aCPem">{{#invoke:Cite|news | vauthors = Tibken S |title=3D printing may help supply more essential coronavirus medical gear |url=https://www.cnet.com/news/3d-printing-may-help-supply-more-essential-coronavirus-medical-gear/ |access-date=5 April 2020 |publisher=CNET}}</ref> In one example, an Italian startup received legal threats due to alleged [[patent infringement]] after reverse-engineering and printing one hundred requested ventilator valves overnight.<ref>Multiple sources:
      * {{#invoke:Cite|news |title=[Updating] Italian hospital saves Covid-19 patients lives by 3D printing valves for reanimation devices |url=https://www.3dprintingmedia.network/covid-19-3d-printed-valve-for-reanimation-device/ |access-date=20 March 2020 |work=3D Printing Media Network |date=14 March 2020}}
      * {{#invoke:Cite|news | vauthors = Peters J |title=Volunteers produce 3D-printed valves for life-saving coronavirus treatments |url=https://www.theverge.com/2020/3/17/21184308/coronavirus-italy-medical-3d-print-valves-treatments |access-date=20 March 2020 |work=The Verge |date=17 March 2020}}
      * {{#invoke:Cite|web | url=https://globalnews.ca/news/6695286/coronavirus-italy-3d-print-valves/ |title=Engineers 3D-print patented valves for free to save coronavirus patients in Italy |website=Global News}}</ref> Individuals and groups of [[maker culture|maker]]s created and shared [[open source]] designs, and manufacturing devices using locally sourced materials, sewing, and 3D printing. Millions of [[face shield]]s, protective gowns, and masks were made. Other ad hoc medical supplies included shoe covers, surgical caps, [[powered air-purifying respirator]]s, and [[hand sanitiser]]. Novel devices were created such as [[ear saver]]s, [[non-invasive ventilation]] helmets, and ventilator splitters.<ref>{{#invoke:Cite|book | vauthors = Cavalcanti G, Cocciole C, Cole C, Forgues A, Jaqua V, Jones-Davis D, Merlo S |title=Design, Make, Protect: A report on the Open Source Maker and Manufacturer Response to the COVID-19 PPE Crisis |date=2021 |publisher=Open Source Medical Supplies & Nation of Makers |pages=18–22 |url=https://opensourcemedicalsupplies.org/wp-content/uploads/2021/01/Design-Make-Protect_21.01.27.pdf |access-date=17 June 2021}}</ref>

      === Herd immunity ===
      In July 2021, several experts expressed concern that achieving [[herd immunity]] may not be possible because Delta can transmit among vaccinated individuals.<ref name=":1">{{#invoke:Cite|journal|vauthors=Dyer O|date=August 2021|title=Covid-19: Delta infections threaten herd immunity vaccine strategy|journal=BMJ|volume=374|article-number=n1933|doi=10.1136/bmj.n1933|pmid=34340962|s2cid=236778544}}</ref> CDC published data showing that vaccinated people could transmit Delta, something officials believed was less likely with other variants. Consequently, WHO and CDC encouraged vaccinated people to continue with non-pharmaceutical interventions such as masking, social distancing, and quarantining if exposed.<ref name=":2">{{#invoke:Cite|news|date=13 August 2021|title=5 Things To Know About the Delta Variant|work=Yale Medicine News|url=https://www.yalemedicine.org/news/5-things-to-know-delta-variant-covid|access-date=18 August 2021|vauthors=Katella K}}</ref>

      == History ==
      {{update|years 2024 and 2025|date=March 2026}}
      {{For timeline}}
      {{Further|Pandemic prevention|Pandemic predictions and preparations prior to the COVID-19 pandemic}}

      === 2019 ===
      {{Main|Timeline of the COVID-19 pandemic in 2019}}

      The [[outbreak]] was discovered in Wuhan in November 2019. It is possible that human-to-human transmission was happening before the discovery.<ref name="Hu2020natureReviews"/><ref name="Graham2020immunity"/> Based on a retrospective analysis starting from December 2019, the number of cases in Hubei gradually increased, reaching 60 by 20 December and at least 266 by 31 December.<ref name="original_report"/> A [[pneumonia]] cluster was observed on 26 December and treated by Chinese pulmonologist [[Zhang Jixian]]. She informed the Wuhan Jianghan CDC on 27 December.<ref name="D54YB">{{#invoke:Cite|web|last1=Lu|first1=Zikang (路子康)|script-title=zh:最早上报疫情的她，怎样发现这种不一样的肺炎|url=https://news.china.com/zw/news/13000776/20200209/37780703.html|archive-url=https://web.archive.org/web/20200302165302/https://news.china.com/zw/news/13000776/20200209/37780703.html|archive-date=2 March 2020|access-date=11 February 2020|location=Beijing|language=zh-cn|script-website=zh:中国网新闻}}</ref> After analysing pneumonia patient samples, a genetic sequencing company named Vision Medicals reported the discovery of a [[novel coronavirus]] to the [[Chinese Center for Disease Control and Prevention|China CDC]] (CCDC) on 28 December.<ref name="AP OR">{{#invoke:Cite|news| url=https://apnews.com/article/3c061794970661042b18d5aeaaed9fae|title=China delayed releasing coronavirus info, frustrating WHO|date=2 June 2020|work=Associated Press|access-date=26 October 2021|archive-url=https://web.archive.org/web/20211025163939/https://apnews.com/article/united-nations-health-ap-top-news-virus-outbreak-public-health-3c061794970661042b18d5aeaaed9fae |archive-date=25 October 2021 |url-status=live}}</ref><ref name="caixintrace">{{#invoke:Cite|news |last1=Gao |first1=Yu (高昱) |script-title=zh:独家 {{!}} 新冠病毒基因测序溯源：警报是何时拉响的|trans-title=Exclusive {{!}} Tracing the New Coronavirus gene sequencing: when did the alarm sound|work=[[Caixin]]|date=26 February 2020|language=zh|url=https://china.caixin.com/2020-02-26/101520972.html|archive-url=https://web.archive.org/web/20200227094018/https://china.caixin.com/2020-02-26/101520972.html|archive-date=27 February 2020|access-date=1 March 2020}}</ref> Two days later, a test report from CapitalBio Medlab addressed to the [[Central Hospital of Wuhan|Wuhan Central Hospital]] reported an erroneous positive result for [[SARS]], causing doctors there to alert authorities. Eight of those doctors, including ophthalmologist [[Li Wenliang]] (1985–2020), were detained by police on 3 January for "spreading false rumours".<ref name="siStf"/> That evening, Wuhan Municipal Health Commission (WMHC) issued a notice about "the treatment of pneumonia of unknown cause".<ref name="promedmail6864153">{{#invoke:Cite|news | title=Undiagnosed pneumonia – China (HU): RFI |url=https://promedmail.org/promed-post/?id=6864153 |newspaper=Promed-Mail |publisher=ProMED |date=30 December 2019|access-date=7 May 2020}}</ref> The next day, WMHC made the announcement public, confirming 27 cases<ref name="AutoDW-69"/><ref name="AutoDW-68"/>—enough to trigger an investigation.<ref name="bbc50984025"/> On 31 December, the WHO office in China was notified about the cluster of unknown pneumonia cases<ref name="WHO report">{{#invoke:Cite|web | title=Novel Coronavirus (2019-nCoV) SITUATION REPORT – 1 |url=https://www.who.int/docs/default-source/coronaviruse/situation-reports/20200121-sitrep-1-2019-ncov.pdf |publisher=World Health Organization |access-date=7 June 2021 |date=20 January 2020}}</ref><ref name="AutoDW-69"/> and immediately launched an investigation.<ref name="bbc50984025"/>

      Official Chinese sources claimed that the early cases were mostly linked to the Huanan Seafood Wholesale Market, which also sold live animals.<ref name="characteristicsZH"/> In May 2020, CCDC director George Gao initially ruled out the market as a possible origin, as animal samples collected there had tested negative.<ref name="ALmAQ">{{#invoke:Cite|news |url=https://www.wsj.com/articles/china-rules-out-animal-market-and-lab-as-coronavirus-origin-11590517508 |title=China Rules Out Animal Market and Lab as Coronavirus Origin | vauthors = Areddy JT |date=26 May 2020 |access-date=29 May 2020 |work=The Wall Street Journal}}</ref>

      === 2020 ===
      {{Hatnote|Timelines of the COVID-19 pandemic in 2020 by month: [[Timeline of the COVID-19 pandemic in January 2020|January]], [[Timeline of the COVID-19 pandemic in February 2020|February]], [[Timeline of the COVID-19 pandemic in March 2020|March]], [[Timeline of the COVID-19 pandemic in April 2020|April]], [[Timeline of the COVID-19 pandemic in May 2020|May]], [[Timeline of the COVID-19 pandemic in June 2020|June]], [[Timeline of the COVID-19 pandemic in July 2020|July]], [[Timeline of the COVID-19 pandemic in August 2020|August]], [[Timeline of the COVID-19 pandemic in September 2020|September]], [[Timeline of the COVID-19 pandemic in October 2020|October]], [[Timeline of the COVID-19 pandemic in November 2020|November]], [[Timeline of the COVID-19 pandemic in December 2020|December]]}}
      [[File:COVID-19 highway sign in Toronto, March 2020.jpg|thumb|A highway sign discouraging travel in [[Toronto]], March 2020]]
      On 11 January, WHO was notified by the Chinese National Health Commission that the outbreak was associated with exposures in the market, and that China had identified a new type of coronavirus, which it isolated on 7 January.<ref name="WHO report"/>

      Initially, the number of cases doubled approximately every seven and a half days.<ref name="Qun29Jan2020"/> In early and mid-January, the virus spread to other [[provinces of China|Chinese provinces]], helped by the [[Chunyun|Chinese New Year migration]]. Wuhan was a transport hub and major rail interchange.<ref name="WHO report 28 February 2020"/> On 10 January, the virus' genome was shared publicly.<ref>{{#invoke:Cite|journal | vauthors = Enserink M |title=Dispute simmers over who first shared SARS-CoV-2's genome |url=https://www.science.org/content/article/dispute-simmers-over-who-first-shared-sars-cov-2-s-genome |access-date=20 May 2023 |journal=Science |date=29 March 2023 | volume = 380 | issue = 6640 | pages = 16–17 | doi = 10.1126/science.adi1218 | pmid = 37023187 | bibcode = 2023Sci...380...16E |archive-url=https://web.archive.org/web/20240618031045/https://www.science.org/content/article/dispute-simmers-over-who-first-shared-sars-cov-2-s-genome |archive-date=18 June 2024 }}</ref> A retrospective study published in March found that 6,174 people had reported symptoms by 20 January.<ref name="Epidemiology17Feb2020"/> A 24 January report indicated human transmission was likely occurring, and recommended [[personal protective equipment]] for health workers. It also advocated testing, given the outbreak's "pandemic potential".<ref name="Huang24Jan2020"/><ref name="Horton 18 March"/> On 30 January, 7,818 infections had been confirmed, leading WHO to declare the outbreak a [[Public Health Emergency of International Concern]] (PHEIC),<ref name="WHO_PHEICSR">{{#invoke:Cite|web | date=30 January 2020|title=Novel Coronavirus(2019-nCoV): Situation Report – 10|url=https://www.who.int/docs/default-source/coronaviruse/situation-reports/20200130-sitrep-10-ncov.pdf|access-date=14 October 2020|publisher=[[World Health Organization]] (WHO)}}</ref><ref name="WHO_PHEIC_decl2"/><ref>{{#invoke:Cite|journal | vauthors = Durrheim DN, Gostin LO, Moodley K |title=When does a major outbreak become a Public Health Emergency of International Concern? |journal=The Lancet Infectious Diseases |date=August 2020 |volume=20 |issue=8 |pages=887–889 |doi=10.1016/S1473-3099(20)30401-1 |pmid=32442526 |pmc=7237181 }}</ref> upgrading it to a pandemic on 11 March.<ref name="start"/> On 31 January, the first published modelling study warned of inevitable "independent self-sustaining outbreaks in major cities globally" and called for "large-scale public health interventions".<ref name="pmid32014114">{{#invoke:Cite|journal|vauthors=Wu JT, Leung K, Leung GM|title=Nowcasting and forecasting the potential domestic and international spread of the 2019-nCoV outbreak originating in Wuhan, China: a modelling study|journal=Lancet|volume=395|issue=10225|pages=689–697|date=February 2020|pmid=32014114|pmc=7159271|doi=10.1016/S0140-6736(20)30260-9 |bibcode=2020Lanc..395..689W }}</ref>

      By 31 January, Italy indicated its first confirmed infections had occurred, in two tourists from China.<ref name="Corriere_20Jan"/> On 19 March, Italy overtook China as the country with the most reported deaths.<ref name="sky11960412">{{#invoke:Cite|web | title=Coronavirus: Number of COVID-19 deaths in Italy surpasses China as total reaches 3,405 |url=https://news.sky.com/story/coronavirus-number-of-covid-19-deaths-in-italy-surpasses-china-as-total-reaches-3-405-11960412 |publisher=Sky News |access-date=7 May 2020}}</ref>

      By 26 March, the United States had overtaken China and Italy as the country with the highest number of confirmed infections.<ref name="NYT-20200326"/> Genomic analysis indicated that the majority of [[COVID-19 pandemic in New York (state)|New York]]'s confirmed infections came from Europe, rather than directly from Asia.<ref name="20200408nytimes">{{#invoke:Cite|news |title=Studies Show N.Y. Outbreak Originated in Europe |url=https://www.nytimes.com/2020/04/08/us/coronavirus-live-updates.html |work=[[The New York Times]] |date=8 April 2020}}</ref> Testing of prior samples revealed a person who was infected in France on 27 December 2019<ref name="France-retest">{{#invoke:Cite|news |title=After retesting samples, French hospital discovers COVID-19 case from December |url=https://www.reuters.com/article/us-health-coronavirus-france-idUSKBN22G20L | vauthors = Irish J |date=4 May 2020 | veditors = Lough R, Graff P |work=Reuters |access-date=4 May 2020 }}</ref><ref name="Deslandes 2020">{{#invoke:Cite|journal | vauthors = Deslandes A, Berti V, Tandjaoui-Lambotte Y, Alloui C, Carbonnelle E, Zahar JR, Brichler S, Cohen Y | title = SARS-CoV-2 was already spreading in France in late December 2019 | journal = International Journal of Antimicrobial Agents | volume = 55 | issue = 6 | article-number = 106006 | date = June 2020 | pmid = 32371096 | pmc = 7196402 | doi = 10.1016/j.ijantimicag.2020.106006 }}</ref> and a person in the United States who died from the disease on 6{{nbsp}}February.<ref name="PBS-2wks">{{#invoke:Cite|news | vauthors = Bean A |title=2 died with coronavirus weeks before 1st U.S. virus death |url=https://www.pbs.org/newshour/nation/2-died-with-coronavirus-weeks-before-1st-u-s-virus-death |access-date=29 May 2023 |work=PBS NewsHour |date=22 April 2020 }}</ref>

      [[File:Covid-19 San Salvatore 09.jpg|thumb|An exhausted [[anesthesiology|anaesthesiologist]] in [[Pesaro]], Italy, 19 March 2020]]
      In October, WHO reported that one in ten people around the world may have been infected, or 780&nbsp;million people, while only 35&nbsp;million infections had been confirmed.<ref name="bbc_oneinten">{{#invoke:Cite|news|date=5 October 2020|title=One in 10 worldwide may have had Covid – WHO|publisher=BBC|url=https://www.bbc.com/news/world-54422023|access-date=14 October 2020}}</ref>

      On 9 November, Pfizer released trial results for a candidate vaccine, showing a 90 per cent effectiveness in preventing infection. That day, Novavax submitted an FDA Fast Track application for their vaccine.<ref name="FEv4C">{{#invoke:Cite|news| vauthors = Boseley S, Olterman P |date=9 November 2020|title=Covid-19 vaccine candidate is 90% effective, says Pfizer|work=The Guardian|url=https://www.theguardian.com/world/2020/nov/09/covid-19-vaccine-candidate-effective-pfizer-biontech|access-date=9 November 2020|issn=0261-3077}}</ref><ref name="NPZ5P">{{#invoke:Cite|news| vauthors = Linnane C |title=Novavax wins FDA fast track designation for COVID-19 vaccine candidate|url=https://www.marketwatch.com/story/novavax-wins-fda-fast-track-designation-for-covid-19-vaccine-candidate-2020-11-09|access-date=9 November 2020|website=MarketWatch| date = 9 November 2020 }}</ref> On 14 December, [[Public Health England]] reported that a variant had been discovered in the UK's southeast, predominantly in [[Kent]]. The variant, later named [[Variant of Concern 202012/01|Alpha]], showed changes to the [[coronavirus spike protein|spike protein]] that could make the virus more infectious. As of 13 December, 1,108 infections had been confirmed in the UK.<ref>{{#invoke:Cite|web | title=PHE investigating a novel strain of COVID-19|url=https://www.gov.uk/government/news/phe-investigating-a-novel-strain-of-covid-19|website=GOV.UK|date=14 December 2020|access-date=15 December 2020 }}</ref><ref>{{#invoke:Cite|news | vauthors = Le Page M, McNamara A |title=Alpha covid-19 variant (B.1.1.7) |url=https://www.newscientist.com/definition/uk-covid-19-variant-b-1-1-7/ |access-date=29 May 2023 |work=New Scientist}}</ref> On 4 February 2020, US Secretary of Health and Human Services [[Alex Azar]] waived liability for vaccine manufacturers in all cases except those involving "willful misconduct".<ref name="mXTUz">{{#invoke:Cite|web|date=4 February 2020|title=Notice of Declaration under the Public Readiness and Emergency Preparedness Act for medical countermeasures against COVID-19|url=https://www.phe.gov/Preparedness/legal/prepact/Pages/COVID19.aspx|url-status=live|archive-url=https://web.archive.org/web/20200425015411/https://www.phe.gov/Preparedness/legal/prepact/Pages/COVID19.aspx|archive-date=25 April 2020|access-date=22 April 2020|vauthors=Azar A}}</ref><ref>{{#invoke:Cite|news | vauthors = Sigalos M |title=You can't sue Pfizer or Moderna if you have severe Covid vaccine side effects. The government likely won't compensate you for damages either |url=https://www.cnbc.com/2020/12/16/covid-vaccine-side-effects-compensation-lawsuit.html |access-date=29 May 2023 |work=CNBC |date=17 December 2020 }}</ref>

      === 2021 ===
      {{Hatnote|Timelines of the COVID-19 pandemic in 2021 by month: [[Timeline of the COVID-19 pandemic in January 2021|January]], [[Timeline of the COVID-19 pandemic in February 2021|February]], [[Timeline of the COVID-19 pandemic in March 2021|March]], [[Timeline of the COVID-19 pandemic in April 2021|April]], [[Timeline of the COVID-19 pandemic in May 2021|May]], [[Timeline of the COVID-19 pandemic in June 2021|June]], [[Timeline of the COVID-19 pandemic in July 2021|July]], [[Timeline of the COVID-19 pandemic in August 2021|August]], [[Timeline of the COVID-19 pandemic in September 2021|September]], [[Timeline of the COVID-19 pandemic in October 2021|October]], [[Timeline of the COVID-19 pandemic in November 2021|November]], [[Timeline of the COVID-19 pandemic in December 2021|December]]}}
      On 2 January, the [[SARS-CoV-2 Alpha variant|Alpha variant]], first discovered in the UK, had been identified in 33 countries.<ref>{{#invoke:Cite|web | vauthors = Hauck G |title=More contagious COVID-19 strain identified in 3 states and 33 countries: What to know |date= 15 January 2021 |url=https://www.usatoday.com/story/news/health/2021/01/02/new-covid-strain-b-117-explained/4112125001/ |website=USA Today |access-date=2 January 2021}}</ref> On 6 January, the [[SARS-CoV-2 Gamma variant|Gamma variant]] was first identified in Japanese travellers returning from Brazil.<ref>{{#invoke:Cite|web | title=Genomic characterisation of an emergent SARS-CoV-2 lineage in Manaus: preliminary findings |url=https://virological.org/t/genomic-characterisation-of-an-emergent-sars-cov-2-lineage-in-manaus-preliminary-findings/586 |website=Virological |access-date=6 May 2021 |date=12 January 2021}}</ref> On 29 January, it was reported that the Novavax vaccine was 49 per cent effective against the [[SARS-CoV-2 Beta variant|Beta variant]] in a clinical trial in South Africa.<ref>{{#invoke:Cite|news | vauthors = Nedelman M |title=South Carolina detects first US cases of coronavirus strain first seen in South Africa |date=28 January 2021 |url=https://www.cnn.com/2021/01/28/health/south-carolina-variant-south-africa/index.html |publisher=CNN |access-date=29 January 2021}}</ref><ref>{{#invoke:Cite|news | vauthors = Johnson CY |title=Novavax vaccine protects against coronavirus in variant hot spots but proved less effective against strain in South Africa |url=https://www.washingtonpost.com/health/2021/01/28/covid-vaccine-variant-south-africa/ |newspaper=The Washington Post |access-date=29 January 2021}}</ref> The [[CoronaVac vaccine]] was reported to be 50.4 per cent effective in a Brazil clinical trial.<ref>{{#invoke:Cite|journal |title=COVID variants test immunity, NIH chief and China's mixed vaccine data |journal=Nature |page=497 |doi=10.1038/d41586-021-00186-w |date=27 January 2021|volume=589 |issue=7843 |bibcode=2021Natur.589..497. |doi-access=free }}</ref>

      [[File:Covid-19 SP - Santo Andre's hospital at peak of pandemic.jpg|thumb|A temporary hospital for COVID-19 patients in [[Santo André, São Paulo|Santo André]], Brazil, in March 2021]]
      On 12 March, several countries stopped using the [[Oxford–AstraZeneca COVID-19 vaccine]] due to blood clotting problems, specifically [[cerebral venous sinus thrombosis]] (CVST).<ref>{{#invoke:Cite|web | title=AstraZeneca defends COVID vaccine as handful of nations pause use over fear of blood clots |url=https://www.cbsnews.com/news/astrazeneca-defends-covid-vaccine-as-handful-of-nations-pause-use-over-fear-of-blood-clots/ |publisher=CBS News |access-date=14 March 2021}}</ref> On 20 March, the WHO and European Medicines Agency found no link to [[thrombosis]], leading several countries to resume administering the vaccine.<ref>{{#invoke:Cite|news|date=20 March 2021|title=WHO renews backing for AstraZeneca's COVID-19 jab as European countries resume vaccinations|work=[[SBS News]]|url=https://www.sbs.com.au/news/who-renews-backing-for-astrazeneca-s-covid-19-jab-as-european-countries-resume-vaccinations|access-date=21 March 2021}}</ref> In March WHO reported that an animal host was the most likely origin, without ruling out other possibilities.<ref name="who-origins-20210330">{{#invoke:Cite|web|date=30 March 2021|title=WHO-convened global study of origins of SARS-CoV-2: China Part|url=https://www.who.int/publications/i/item/who-convened-global-study-of-origins-of-sars-cov-2-china-part|access-date=31 March 2021|publisher=World Health Organization}}</ref><ref name="Maxmen2021whoReport"/> The [[SARS-CoV-2 Delta variant|Delta variant]] was first identified in India. In mid-April, the variant was first detected in the UK and two months later it had become a full-fledged third wave in the country, forcing the government to delay reopening that was originally scheduled for June.<ref>{{#invoke:Cite|journal | vauthors = Callaway E | title = Delta coronavirus variant: scientists brace for impact | journal = Nature | volume = 595 | issue = 7865 | pages = 17–18 | date = July 2021 | pmid = 34158664 | doi = 10.1038/d41586-021-01696-3 | bibcode = 2021Natur.595...17C | s2cid = 235609029 }}</ref> On 10 November, Germany advised against the [[Moderna COVID-19 vaccine|Moderna vaccine]] for people under 30, due to a possible association with [[myocarditis]].<ref>{{#invoke:Cite|web|title=Germany Advises Against Moderna Covid Vaccine For People Under 30|url=https://www.ndtv.com/world-news/germany-advises-against-moderna-covid-vaccine-for-people-under-30-2605574|access-date=23 December 2021|website=NDTV.com}}</ref> On 24 November, the [[SARS-CoV-2 Omicron variant|Omicron variant]] was detected in South Africa; a few days later the WHO declared it a VoC (variant of concern).<ref>{{#invoke:Cite|web | vauthors = Fink J |title=Omicron variant that may resist vaccines found in all U.S. states |url=https://www.newsweek.com/omicron-variant-that-may-resist-vaccines-found-all-us-states-1656826 |website=Newsweek |access-date=25 December 2021 |date=22 December 2021}}</ref> The new variant is more infectious than the Delta variant.<ref>{{#invoke:Cite|journal | vauthors = Karim SS, Karim QA | title = Omicron SARS-CoV-2 variant: a new chapter in the COVID-19 pandemic | journal = Lancet | volume = 398 | issue = 10317 | pages = 2126–2128 | date = December 2021 | pmid = 34871545 | pmc = 8640673 | doi = 10.1016/S0140-6736(21)02758-6 }}</ref>{{clear}}

      === 2022 ===
      [[File:Novel Coronavirus SARS-CoV-2 (Omicron) (52665469105).jpg|thumb|250px|Scanning electron micrograph (colorised) of cell infected with the Omicron strain of SARS-CoV-2 virus particles ''green'']]
      {{Hatnote|Timelines of the COVID-19 pandemic in 2022 by month: [[Timeline of the COVID-19 pandemic in January 2022|January]], [[Timeline of the COVID-19 pandemic in February 2022|February]], [[Timeline of the COVID-19 pandemic in March 2022|March]], [[Timeline of the COVID-19 pandemic in April 2022|April]], [[Timeline of the COVID-19 pandemic in May 2022|May]], [[Timeline of the COVID-19 pandemic in June 2022|June]], [[Timeline of the COVID-19 pandemic in July 2022|July]], [[Timeline of the COVID-19 pandemic in August 2022|August]], [[Timeline of the COVID-19 pandemic in September 2022|September]], [[Timeline of the COVID-19 pandemic in October 2022|October]], [[Timeline of the COVID-19 pandemic in November 2022|November]], [[Timeline of the COVID-19 pandemic in December 2022|December]]}}

      On 1 January, Europe passed 100 million cases amidst a surge in the [[SARS-CoV-2 Omicron variant|Omicron variant]].<ref>{{#invoke:Cite|web |title=Europe Tops 100 Million Coronavirus Cases in Pandemic |url=https://www.voanews.com/a/omicron-coronavirus-variant-sweeps-across-the-globe/6377972.html |website=VOA |date=January 2022 |access-date=2 January 2022 }}</ref> Later that month, the WHO recommended the [[rheumatoid arthritis]] drug [[Baricitinib]] for severe or critical patients. It also recommended the monoclonal antibody [[Sotrovimab]] in patients with non-severe disease, but only those who are at highest risk of hospitalisation.<ref>{{#invoke:Cite|journal | vauthors = Kmietowicz Z |title=Covid-19: WHO recommends baricitinib and sotrovimab to treat patients |journal=BMJ |date=13 January 2022 |volume=376 |pages=o97 |doi=10.1136/bmj.o97 |pmid=35027362 |s2cid=245907930 |url=https://www.bmj.com/content/376/bmj.o97 |access-date=29 May 2023}}</ref>

      On 24 January, the [[Institute for Health Metrics and Evaluation]] estimated that about 57% of the world's population had been infected by COVID-19.<ref name="57percent1">{{#invoke:Cite|web |title=COVID-19 Results Briefing |url=https://www.healthdata.org/sites/default/files/files/1_briefing_Global_5.pdf |website=healthdata.org |access-date=7 February 2022}}</ref><ref name="57percent2">{{#invoke:Cite|web |title=COVID Evaluation Model Estimates 57 Percent of World Population Infected at Least Once |url=https://www.msn.com/en-us/health/medical/covid-evaluation-model-estimates-57-percent-of-world-population-infected-at-least-once/ar-AAT6yyz?ocid=BingNewsSearch |website=MSN |access-date=7 February 2022}}</ref> By 6 March, it was reported that the total worldwide death count had surpassed 6&nbsp;million people.<ref>{{#invoke:Cite|news | vauthors = McPhillips D |title=Global Covid-19 deaths surpass 6 million |url=https://www.cnn.com/2022/03/07/health/global-covid-deaths-surpass-six-million/index.html |website=CNN |date=7 March 2022 |access-date=9 March 2022}}</ref> By 6 July, Omicron subvariants [[BA.4]] and [[BA.5]] had spread worldwide.<ref>{{#invoke:Cite|web |title=BA.5, now dominant U.S. variant, may pose the biggest threat to immune protection yet |url=https://www.nbcnews.com/health/health-news/omicron-ba5-ba4-covid-symptoms-vaccines-rcna36894 |website=NBC News |date=7 July 2022 |access-date=13 August 2022 }}</ref> WHO Director-General Tedros Ghebreyesus stated on 14 September 2022, that "[The world has] never been in a better position to end the pandemic", citing the lowest number of weekly reported deaths since March 2020. He continued, "We are not there yet. But the end is in sight—we can see the finish line".<ref>{{#invoke:Cite|news | url=https://news.un.org/en/story/2022/09/1126621 | title=The end of the COVID-19 pandemic is in sight: WHO | date=14 September 2022 }}</ref><ref>{{#invoke:Cite|news | url=https://www.reuters.com/business/healthcare-pharmaceuticals/who-chief-says-end-sight-covid-19-pandemic-2022-09-14/ | title=End of COVID pandemic is 'in sight' – WHO chief | work=Reuters | date=14 September 2022 | vauthors = Mishra M }}</ref><ref>{{#invoke:Cite|news | url=https://www.nbcnews.com/health/health-news/covid-pandemic-who-says-end-in-sight-deaths-drop-rcna47680 | title=WHO says 'end is in sight' for the Covid pandemic as global deaths hit lowest since March 2020 | website=[[NBC News]] | date=14 September 2022 }}</ref><ref>{{#invoke:Cite|news | url=https://www.cnn.com/2022/09/14/health/pandemic-end-in-sight-who/index.html | title=The end of the pandemic is in sight, WHO director-general says, 'so let's seize this opportunity' | website=[[CNN]] | date=14 September 2022 }}</ref>

      On 21 October, the United States surpassed 99 million cases of COVID-19, the most cases of any country.<ref>{{#invoke:Cite|web |title=Coronavirus Morning News Brief – Oct. 21: More Americans Are Getting the Updated Vaccine, BA.5 Continues Dominance in U.S. |url=https://www.frequentbusinesstraveler.com/2022/10/coronavirus-morning-news-brief-oct-21-more-americans-are-getting-the-updated-vaccine-ba-5-continues-dominance-in-u-s/ |website=Frequent Business Traveller |access-date=21 October 2022}}</ref> By 30 October, the worldwide daily death toll was 424, the lowest since 385 deaths were reported on 12 March 2020.<ref>{{#invoke:Cite|web |title=COVID-19 world weekly cases down 19% but new subvariant spreading |url=https://www.upi.com/Top_News/US/2022/10/30/COVID-19-world-weekly-cases-down-19-but-new-subvariant-spreading/8241667141393/ |website=UPI |access-date=2 November 2022 }}</ref> 17 November marked the three-year anniversary since health officials in China first detected COVID-19.<ref>{{#invoke:Cite|web |title=What day is the real anniversary of the COVID-19 pandemic? |url=https://theweek.com/articles/971043/what-day-real-anniversary-covid19-pandemic |website=The Week |date=9 March 2021 |access-date=5 November 2022 }}</ref>

      On 11 November, the WHO reported that deaths since the month of February had dropped 90 per cent. Director-General Tedros said this was "cause for optimism".<ref>{{#invoke:Cite|web |title=WHO reports 90% drop in global COVID-19 deaths since February |url=https://www.msn.com/en-us/health/medical/who-reports-90-25-drop-in-global-covid-19-deaths-since-february/ar-AA13ZU6n |website=MSN |access-date=11 November 2022}}</ref> On 3 December, the WHO indicated that, "at least 90% of the world's population has some level of immunity to Sars-CoV-2".<ref>{{#invoke:Cite|web |title=WHO estimates 90% of world have some resistance to Covid |url=https://www.theguardian.com/world/2022/dec/03/who-estimates-90-of-world-have-some-resistance-to-covid |website=The Guardian |access-date=3 December 2022 |date=3 December 2022}}</ref> In early December, China began lifting some of its most stringent lockdown measures. Subsequent data from China's health authorities revealed that 248&nbsp;million people, nearly 18 per cent of its population, had been infected in the first 20 days of that month.<ref>{{#invoke:Cite|news |title=China Estimates Covid Surge Is Infecting 37 Million People a Day |url=https://www.bloomberg.com/news/articles/2022-12-23/china-estimates-covid-surge-is-infecting-37-million-people-a-day |website=Bloomberg |date=23 December 2022}}</ref> On 29 December, the US joined Italy, Japan, Taiwan and India in requiring negative COVID-19 test results from all people travelling from China due to the new surge in cases. The EU refused similar measures, stating that the BF7 omicron variant had already spread throughout Europe without becoming dominant.<ref>{{#invoke:Cite|web |title=US will require COVID-19 testing for travelers from China |url=https://www.msn.com/en-us/health/health-news/us-will-require-covid-19-testing-for-travelers-from-china/ar-AA15KHjS |website=MSN |access-date=29 December 2022}}</ref><ref>{{#invoke:Cite|news |title=EU calls screening of travellers from China 'unjustified' |url=https://www.bbc.com/news/world-europe-64119080 |access-date=29 December 2022 |publisher=BBC News |date=29 December 2022 |archive-url=https://web.archive.org/web/20221229164230/https://www.bbc.com/news/world-europe-64119080 |archive-date=29 December 2022}}</ref>

      === 2023 ===
      {{Hatnote|[[Timeline of the COVID-19 pandemic in 2023]]}}
      On 4 January 2023, the WHO said the information shared by China during the recent surge in infections lacked data, such as hospitalisation rates.<ref>{{#invoke:Cite|web |title=WHO worried about surge of COVID in China amid lack of info |url=https://apnews.com/article/health-china-covid-19-pandemic-world-organization-2576d9c8c1c1f75b76800edbb476894d |website=AP NEWS |access-date=6 January 2023 |date=4 January 2023}}</ref> On 10 January, the WHO's Europe office said the recent viral surge in China posed "no immediate threat."<ref>{{#invoke:Cite|news |title=WHO Europe: no immediate COVID-19 threat from China |url=https://apnews.com/article/health-covid-19-pandemic-china-europe-world-organization-2cead41e96c46b8027c26510bddb0873 |access-date=31 May 2023 |work=AP NEWS |date=10 January 2023 }}</ref> On 16 January, the WHO recommended that China monitor excess mortality to provide "a more comprehensive understanding of the impact of COVID-19".<ref>{{#invoke:Cite|news | vauthors = Tétrault-Farber G, Rigby J, Farge E |title=WHO recommends that China monitor excess COVID-19 mortality |url=https://www.reuters.com/world/china/who-recommends-that-china-monitor-excess-covid-19-mortality-2023-01-16/ |access-date=31 May 2023 |work=Reuters |date=16 January 2023 }}</ref>

      On 30 January, the three-year anniversary of the original declaration, the WHO determined that COVID-19 still met the criteria for a public health emergency of international concern (PHEIC).<ref>{{#invoke:Cite|news | vauthors = Lasarte D, Sofia LP |title=China's covid cases loom over upcoming WHO meeting on state of the pandemic |url=https://qz.com/covid-pandemic-public-health-emergency-end-who-1850035035 |access-date=31 May 2023 |work=Quartz |date=26 January 2023 }}</ref>

      On 19 March, WHO Director-General Tedros indicated he was "confident" the COVID-19 pandemic would cease to be a public health emergency by the end of the year.<ref>{{#invoke:Cite|web |title=COVID-19 pandemic expected to end this year 'as a public health emergency,' says World Health Organization |url=https://www.msn.com/en-us/health/other/covid-19-pandemic-expected-to-end-this-year-as-a-public-health-emergency-says-world-health-organization/ar-AA18OUdE |website=MSN |access-date=20 March 2023}}</ref> On 5 May, the WHO downgraded COVID-19 from being a global health emergency, though it continued to refer to it as a pandemic.<ref>{{#invoke:Cite|web|url=https://www.nytimes.com/2023/05/05/health/covid-who-emergency-end.html|title=W.H.O. Ends Global Health Emergency Designation for Covid|work=[[New York Times]]| vauthors = Nolen S |date=5 May 2023|access-date=5 May 2023}}</ref> The WHO does not make official declarations of when pandemics end.<ref name="reuters">{{#invoke:Cite|web| vauthors = Rigby J, Satija B |date=8 May 2023|title=WHO declares end to COVID global health emergency|url=https://www.reuters.com/business/healthcare-pharmaceuticals/covid-is-no-longer-global-health-emergency-who-2023-05-05/|website=Reuters|access-date=9 May 2023}}</ref><ref name="guardian">{{#invoke:Cite|news | vauthors = Gregory A |title=Covid-19 is no longer a global health emergency, says WHO |url=https://www.theguardian.com/world/2023/may/05/covid-19-no-longer-global-health-emergency-world-health-organization |access-date=9 May 2023 |work=The Guardian |date=5 May 2023}}</ref> The decision came after Tedros convened with the International Health Regulations Emergency Committee, wherein the Committee noted that due to the decrease in deaths and hospitalisations, and the prevalence of vaccinations and the level of general immunity, it was time to remove the emergency designation and "transition to long-term management".<ref name="WHO Statement 5 May 2023">{{#invoke:Cite|web|url=https://www.who.int/news/item/05-05-2023-statement-on-the-fifteenth-meeting-of-the-international-health-regulations-(2005)-emergency-committee-regarding-the-coronavirus-disease-(covid-19)-pandemic|title=Statement on the fifteenth meeting of the International Health Regulations (2005) Emergency Committee regarding the coronavirus disease (COVID-19) pandemic|publisher=[[World Health Organization]]|date=5 May 2023|access-date=5 May 2023}}</ref> Tedros agreed, and the WHO reduced the classification to an "established and ongoing health issue".<ref name="WHO Statement 5 May 2023"/> In a press conference, Tedros remarked that the diminishing threat from COVID-19 had "allowed most countries to return to life as we knew it before COVID-19".<ref name="npr">{{#invoke:Cite|web|date=5 May 2023|title=WHO ends global health emergency declaration for COVID-19|url=https://www.npr.org/sections/goatsandsoda/2023/05/05/1174269442/who-ends-global-health-emergency-declaration-for-covid-19|website=NPR| vauthors = Heyward G, Silver M |access-date=9 May 2023}}</ref>

      In September the WHO said it had observed "concerning" trends in COVID-19 case numbers and hospitalisations, although analysis was hampered because many countries were no longer recording COVID-19 case statistics.<ref>{{#invoke:Cite|news |publisher=Al Jazeera |title=WHO sees 'concerning' COVID trends before winter as hospitalisations rise |url=https://www.aljazeera.com/news/2023/9/6/who-sees-concerning-covid-trends-before-winter-as-hospitalisations |date=6 September 2023 |access-date=31 October 2023 |archive-date=31 October 2023 |archive-url=https://web.archive.org/web/20231031093332/https://www.aljazeera.com/news/2023/9/6/who-sees-concerning-covid-trends-before-winter-as-hospitalisations |url-status=live }}</ref>

      In November 2023, in response to viral mutations and changing characteristics of infection, the WHO adjusted its treatment guidelines. Among other changes, remdesivir and molnupiravir&nbsp;were now recommended only for the most severe cases, and [[deuremidevir]] and ivermectin were recommended against.<ref>{{#invoke:Cite|journal |journal=BMJ |type=Press release |date=9 November 2023 |title=WHO updates its guidance on treatments for COVID-19 |url=https://www.bmj.com/company/newsroom/who-updates-its-guidance-on-treatments-for-covid-19/}}</ref>

      == Responses ==
      <!-- ****************************************************************************************
          **** Please get a consensus at the talk before adding a section for any new country here. ****
          **************************************************************************************** -->
      {{Main|COVID-19 lockdowns|COVID-19 pandemic by country and territory|National responses to the COVID-19 pandemic}}

      <!-- This map has been commented out because of concerns raised about its inaccuracy (see "Map of world lockdowns is inaccurate" at talk). Please do not bring it back until they have been addressed.
      [[File:COVID-19 Outbreak lockdowns.svg|thumb|upright=1.5|Map of national and subnational lockdowns as of 27 May 2020 ([[Template:COVID-19 pandemic lockdowns|table]]; [[national responses to the COVID-19 pandemic#In other countries|more details]]){{Dubious|date=June 2020}}
      {{Block indent|{{legend|#003380|National lockdown}}{{legend|#80b3ff|Subnational lockdown}}{{legend|silver|No lockdown}}|left=2}}]] -->
      National reactions ranged from strict lockdowns to public education campaigns.<ref name="IVdfl"/> WHO recommended that curfews and lockdowns should be short-term measures to reorganise, regroup, rebalance resources, and protect the health care system.<ref name="58tIM">{{#invoke:Cite|news | url =https://www.abc.net.au/news/2020-10-12/world-health-organization-coronavirus-lockdown-advice/12753688 | title =WHO doctor says lockdowns should not be main coronavirus defence | vauthors = Doyle M | date =11 October 2020 | newspaper =ABC News | access-date =25 October 2020}}</ref> As of 26 March 2020, 1.7&nbsp;billion people worldwide were under some form of lockdown.<ref name="theguardian500000">{{#invoke:Cite|news | vauthors = Jones S, Kassam A |title=Spain defends response to coronavirus as global cases exceed 500,000 |url=https://www.theguardian.com/world/2020/mar/26/spanish-coronavirus-deaths-slow-as-world-nears-500000-cases |access-date=29 March 2020 |work=The Guardian |date=26 March 2020}}</ref> This increased to 3.9&nbsp;billion people by the first week of April—more than half the [[world population|world's population]].<ref name="20200403euronews">{{#invoke:Cite|news |title=Coronavirus: Half of humanity now on lockdown as 90 countries call for confinement |url=https://www.euronews.com/2020/04/02/coronavirus-in-europe-spain-s-death-toll-hits-10-000-after-record-950-new-deaths-in-24-hou |work=[[Euronews]] |date=3 April 2020}}</ref><ref name="20200328businessinsider">{{#invoke:Cite|news |title=A third of the global population is on coronavirus lockdown – here's our constantly updated list of countries and restrictions |url=https://www.businessinsider.com/countries-on-lockdown-coronavirus-italy-2020-3 |work=Business Insider |date=28 March 2020}}</ref>

      In several countries, [[protests against responses to the COVID-19 pandemic|protests rose against restrictions]] such as lockdowns. A February 2021 study found that protests against restrictions were likely to directly increase the spread of the virus.<ref>{{#invoke:Cite|web|date=9 February 2021|title=German anti-lockdown protests led to more coronavirus cases, study finds|url=https://www.politico.eu/article/anti-corona-restrictions-protests-responsible-for-coronavirus-outbreak-study-shows/|access-date=17 February 2021|website=Politico|first=Merlin|last=Sugue}}</ref>

      === Asia ===
      {{Main|COVID-19 pandemic in Asia}}

      As of the end of 2021, Asia's peak had come at the same time and at the same level as the world as a whole, in May 2021.<ref>{{#invoke:Cite|web|title=COVID-19 Data Explorer|url=https://ourworldindata.org/explorers/coronavirus-data-explorer?zoomToSelection=true&time=2020-04-11..latest&facet=none&pickerSort=asc&pickerMetric=location&Metric=Confirmed+cases&Interval=7-day+rolling+average&Relative+to+Population=true&Align+outbreaks=false&country=USA~South+America~Asia~Europe~Africa~OWID_WRL|url-status=live|access-date=9 December 2021|website=Our World in Data|archive-url=https://web.archive.org/web/20211209081315/https://ourworldindata.org/explorers/coronavirus-data-explorer?zoomToSelection=true&time=2020-04-11..latest&facet=none&pickerSort=asc&pickerMetric=location&Metric=Confirmed+cases&Interval=7-day+rolling+average&Relative+to+Population=true&Align+outbreaks=false&country=USA~South+America~Asia~Europe~Africa~OWID_WRL |archive-date=9 December 2021 }}</ref> However, cumulatively they had experienced only half of the global average in cases.<ref>{{#invoke:Cite|web|title=COVID-19 Data Explorer|url=https://ourworldindata.org/explorers/coronavirus-data-explorer?zoomToSelection=true&time=2020-04-11..latest&facet=none&pickerSort=asc&pickerMetric=location&Metric=Confirmed+cases&Interval=Cumulative&Relative+to+Population=true&Align+outbreaks=false&country=USA~South+America~Asia~Europe~Africa~OWID_WRL|url-status=live|access-date=9 December 2021|website=Our World in Data|archive-url=https://web.archive.org/web/20211209081315/https://ourworldindata.org/explorers/coronavirus-data-explorer?zoomToSelection=true&time=2020-04-11..latest&facet=none&pickerSort=asc&pickerMetric=location&Metric=Confirmed+cases&Interval=Cumulative&Relative+to+Population=true&Align+outbreaks=false&country=USA~South+America~Asia~Europe~Africa~OWID_WRL |archive-date=9 December 2021 }}</ref>

      [[File:塔子湖体育中心改造的方舱医院 07.jpg|thumb|A [[Fangcang Hospital|temporary hospital]] constructed in Wuhan in February 2020]]
      China opted for containment, instituting strict lockdowns to eliminate viral spread.<ref name=":02">{{#invoke:Cite|journal | vauthors = Burki T | title = China's successful control of COVID-19 | journal = The Lancet. Infectious Diseases | volume = 20 | issue = 11 | pages = 1240–1241 | date = November 2020 | pmid = 33038941 | pmc = 7544475 | doi = 10.1016/S1473-3099(20)30800-8 }}</ref><ref>Multiple sources:
      * {{#invoke:Cite|magazine| vauthors = Hessler P |title=How China Controlled the Coronavirus|url=https://www.newyorker.com/magazine/2020/08/17/how-china-controlled-the-coronavirus|access-date=4 January 2021|magazine=The New Yorker| date = 10 August 2020 }}
      * {{#invoke:Cite|web | title=China's response shows how bold decision-making can contain coronavirus|url=https://www.weforum.org/agenda/2020/03/chinas-response-shows-how-bold-decision-making-can-contain-coronavirus/|access-date=4 January 2021|website=World Economic Forum|date=11 March 2020 }}
      * {{#invoke:Cite|journal | vauthors = Kupferschmidt K, Cohen J |date=2 March 2020|title=China's aggressive measures have slowed the coronavirus. They may not work in other countries|url=https://www.science.org/content/article/china-s-aggressive-measures-have-slowed-coronavirus-they-may-not-work-other-countries|journal=Science|doi=10.1126/science.abb5426|s2cid=216508232}}</ref> The vaccines distributed in China included the [[Sinopharm BIBP COVID-19 vaccine|BIBP]], [[Sinopharm WIBP COVID-19 vaccine|WIBP]], and [[CoronaVac]].<ref>{{#invoke:Cite|web |vauthors=Pike LL |title=In China, nearly 1 million people have reportedly already gotten a coronavirus vaccine |url=https://www.vox.com/2020/11/25/21612338/does-china-have-a-covid-19-vaccine-1-million-sinopharm-sinovac |website=Vox |access-date=26 November 2020 |date=25 November 2020}}</ref> It was reported on 11 December 2021, that China had vaccinated 1.162&nbsp;billion of its citizens, or 82.5% of the total population of the country against COVID-19.<ref>{{#invoke:Cite|web |title=China vaccinates over 80% of its people against COVID-19 |url=https://www.reuters.com/business/healthcare-pharmaceuticals/china-vaccinates-over-80-its-people-against-covid-19-2021-12-11/ |website=Reuters |access-date=11 December 2021 |date=11 December 2021}}</ref> China's large-scale adoption of [[zero-COVID]] had largely contained the first waves of infections of the disease.<ref name=":02"/><ref>{{#invoke:Cite|web|title=China's response shows how bold decision-making can contain coronavirus|url=https://www.weforum.org/agenda/2020/03/chinas-response-shows-how-bold-decision-making-can-contain-coronavirus/|url-status=live|archive-url=https://web.archive.org/web/20210104204702/https://www.weforum.org/agenda/2020/03/chinas-response-shows-how-bold-decision-making-can-contain-coronavirus/|archive-date=4 January 2021|access-date=4 January 2021|website=World Economic Forum|date=11 March 2020 }}</ref><ref>{{#invoke:Cite|web| vauthors = Kupferschmidt K, Cohen J |date=2 March 2020|title=China's aggressive measures have slowed the coronavirus. They may not work in other countries|url=https://www.science.org/content/article/china-s-aggressive-measures-have-slowed-coronavirus-they-may-not-work-other-countries|url-status=live|archive-url=https://web.archive.org/web/20210215013608/https://www.sciencemag.org/news/2020/03/china-s-aggressive-measures-have-slowed-coronavirus-they-may-not-work-other-countries|archive-date=15 February 2021|access-date=4 January 2021|website=Science {{!}} AAAS}}</ref> When the waves of infections due to the [[SARS-CoV-2 Omicron variant|Omicron variant]] followed, China was almost alone in pursuing the strategy of zero-Covid to combat the spread of the virus in 2022.<ref>{{#invoke:Cite|news |url=https://www.bbc.co.uk/news/59882774 |title=China: How is its zero-Covid strategy changing? | vauthors = Wang K, Song W |date=4 April 2022 |work=BBC }}</ref> Lockdown continued to be employed in November to combat a new wave of cases;<ref>{{#invoke:Cite|web | vauthors = Mcdonald J |title=China Returns to Lockdowns as Cases of COVID-19 Surge |url=https://www.nbcnewyork.com/news/national-international/china-returns-to-lockdowns-as-cases-of-covid-19-surge/3953615/ |website=NBC New York |date=12 November 2022 |access-date=13 November 2022}}</ref><ref>{{#invoke:Cite|web |title=World stocks on back foot as China COVID cases rise |url=https://www.msn.com/en-us/money/markets/world-stocks-on-back-foot-as-china-covid-cases-rise/ar-AA14mFDG |website=MSN |access-date=21 November 2022}}</ref> however, [[2022 COVID-19 protests in China|protests erupted in cities across China]] over the country's stringent measures,<ref>{{#invoke:Cite|web | vauthors = Magramo K |title=China's Covid cases hit record as dissent grows over tough restrictions |url=https://www.cnn.com/2022/11/24/asia/china-covid-highest-daily-case-number-intl-hnk/index.html |website=CNN |access-date=25 November 2022 |date=24 November 2022}}</ref><ref>{{#invoke:Cite|web | vauthors = Gan N, Wang P |title=China's security apparatus swings into action to smother Covid protests |url=https://www.cnn.com/2022/11/29/china/china-protest-crackdown-intl-hnk/index.html |website=CNN |access-date=29 November 2022 |date=29 November 2022}}</ref> and in December that year, the country relaxed its zero-COVID policy.<ref>{{#invoke:Cite|news |url=https://www.bbc.co.uk/news/world-asia-china-63855508 |title=China abandons key parts of zero-Covid strategy after protests|date=7 December 2022|work=BBC}}</ref> On 20 December 2022, the Chinese State Council narrowed its definition of what would be counted as a COVID-19 death to include solely respiratory failure, which led to scepticism by health experts of the government's total death count<ref>{{#invoke:Cite|news | vauthors = Bradsher K, Chien AC, Dong J |date=23 December 2022 |title=As Cases Explode, China's Low Covid Death Toll Convinces No One |work=[[The New York Times]] |url=https://www.nytimes.com/2022/12/23/world/asia/china-covid-death-toll.html |access-date=23 December 2022 |issn=0362-4331}}</ref><ref>{{#invoke:Cite|news |date=20 December 2022 |title=China's low covid death count is being criticized as implausible |newspaper=[[The Washington Post]] |url=https://www.washingtonpost.com/world/2022/12/20/china-covid-coronavirus-low-numbers/ |access-date=23 December 2022}}</ref> at a time when hospitals reported being overwhelmed with cases following the abrupt discontinuation of zero-COVID.<ref>{{#invoke:Cite|web |title=Some hospitals in China overwhelmed in national COVID-19 wave |url=https://www.cbc.ca/news/world/china-covid-19-icus-emergency-wards-1.6697978 |website=CBC |access-date=26 December 2022}}</ref>

      The first case in India was reported on 30 January 2020. India ordered a nationwide lockdown starting 24 March 2020,<ref name="mrGsK">{{#invoke:Cite|news| vauthors = Gettleman J, Schultz K |date=24 March 2020|title=Modi Orders 3-Week Total Lockdown for All 1.3 Billion Indians|work=[[The New York Times]]|url=https://www.nytimes.com/2020/03/24/world/asia/india-coronavirus-lockdown.html|access-date=2 August 2020|issn=0362-4331}}</ref> with a phased unlock beginning 1 June 2020. Six cities accounted for around half of reported cases—[[COVID-19 pandemic in Maharashtra|Mumbai]], [[COVID-19 pandemic in Delhi|Delhi]], [[COVID-19 pandemic in Gujarat|Ahmedabad]], [[COVID-19 pandemic in Tamil Nadu|Chennai]], [[COVID-19 pandemic in Maharashtra|Pune]] and [[COVID-19 pandemic in West Bengal|Kolkata]].<ref name="sHMHJ">{{#invoke:Cite|web | title=Infections over 1 lakh, five cities with half the cases: India's coronavirus story so far|url=https://www.theweek.in/news/india/2020/05/19/infections-coronavirus-1-lakh-five-cities-with-half-the-cases.html|access-date=20 May 2020|website=The Week}}</ref> Post-lockdown, the Government of India introduced a contact tracking app called [[Aarogya Setu]] to help authorities manage contact tracing and vaccine distribution.<ref>{{#invoke:Cite|web |title=India's Aarogya Setu becomes world's most downloaded contact-tracing app |url=https://www.wionews.com/india-news/indias-aarogya-setu-becomes-worlds-most-downloaded-contact-tracing-app-313748 |access-date=25 March 2022 |website=WION |date=16 July 2020 }}</ref> India's vaccination programme was considered to be the world's largest and most successful with over 90% of citizens getting the first dose and another 65% getting the second dose.<ref>{{#invoke:Cite|news |title=India's Covid vaccination programme one of world's most successful: Govt |work=The Economic Times |date=2 January 2022 |url=https://economictimes.indiatimes.com/news/india/indias-covid-vaccination-programme-one-of-worlds-most-successful-govt/articleshow/88648882.cms |access-date=25 March 2022}}</ref><ref>{{#invoke:Cite|web |title=India rolls out the world's largest COVID-19 vaccination drive |url=https://www.who.int/india/news/feature-stories/detail/india-rolls-out-the-world-s-largest-covid-19-vaccination-drive |access-date=25 March 2022 |website=who.int }}</ref> A second wave hit India in April 2021, straining healthcare services.<ref>{{#invoke:Cite|news | vauthors = Yeung J, Sud V |title=India's second Covid wave hits like a 'tsunami' as hospitals buckle under weight| date = 21 April 2021 |url=https://www.cnn.com/2021/04/21/india/india-covid-hospital-shortage-intl-hnk/index.html|access-date=26 April 2021|publisher=CNN}}</ref> On 21 October 2021, it was reported that the country had surpassed 1&nbsp;billion vaccinations.<ref>{{#invoke:Cite|web |title=India Has Hit The 100-crore Vaccination Mark |url=https://www.moneycontrol.com/news/india/india-has-hit-the-100-crore-vaccination-mark-7607041.html |website=Moneycontrol |date=21 October 2021 |access-date=28 December 2021 }}</ref>

      [[File:Disinfection of Tehran subway wagons against coronavirus 2020-02-26 09.jpg|thumb|Disinfection of [[Tehran Metro]] trains to prevent COVID-19 transmission. Similar measures have also been taken in other countries.<ref name="2kQpo">{{#invoke:Cite|web | url=https://www.tvn-2.com/nacionales/Coronavirus-en-Panama-Metro-limpieza_0_5531446820.html |title=Realizan jornada de limpieza en vagones del Metro de Panamá |date=12 March 2020 |publisher=Tvn-2.com |language=es |access-date=23 April 2020}}</ref>]]
      Iran reported its first confirmed cases on 19 February 2020, in [[Qom]].<ref name="wHBRB"/><ref name="4yrqM"/> Early measures included the cancellation/closure of concerts and other cultural events,<ref name="Xm5nq"/> Friday prayers,<ref name="Urdn6"/> and school and university campuses.<ref name="2YX6a"/> Iran became a centre of the pandemic in February 2020.<ref name="HHOnl"/><ref name="New Yorker"/> More than ten countries had traced their outbreaks to Iran by 28 February, indicating a more severe outbreak than the 388 reported cases.<ref name="New Yorker"/><ref name="D2Xpc"/> The [[Islamic Consultative Assembly|Iranian Parliament]] closed, after 23 of its 290 members tested positive on 3{{nbsp}}March 2020.<ref name="fXv2K"/> At least twelve sitting or former Iranian politicians and government officials had died by 17 March 2020.<ref name="oxtUC"/> By August 2021, the pandemic's fifth wave peaked, with more than 400 deaths in 1 day.<ref>{{#invoke:Cite|news|date=5 August 2021|title=Iranian Hospitals Overflow As Number Of Reported COVID-19 Cases Passes 4 Million|newspaper=Radiofreeeurope/Radioliberty |url=https://www.rferl.org/a/iran-covid-4-million/31393785.html|access-date=6 August 2021|archive-url=https://web.archive.org/web/20210805130006/https://www.rferl.org/a/iran-covid-4-million/31393785.html|archive-date=5 August 2021}}</ref>

      COVID-19 was confirmed in South Korea on 20 January 2020. Military bases were quarantined after tests showed three infected soldiers.<ref name="b82186"/> South Korea introduced what was then considered the world's largest and best-organised screening programme, isolating infected people, and tracing and quarantining contacts.<ref name="science20200317"/> Screening methods included mandatory self-reporting by new international arrivals through mobile application,<ref name="nbcnews1167376">{{#invoke:Cite|web | url=https://www.nbcnews.com/news/world/how-south-korea-flattened-its-coronavirus-curve-n1167376 |title=This is how South Korea flattened its coronavirus curve | vauthors = Moon G |date=24 March 2020 |publisher=NBC News |access-date=31 March 2020}}</ref> combined with [[drive-through]] testing,<ref name="CvyZS"/> and increasing testing capability to 20,000 people/day.<ref name="fdhQW"/> Despite some early criticisms,<ref name="imx38"/> South Korea's programme was considered a success in controlling the outbreak without quarantining entire cities.<ref name="science20200317"/><ref name="Wypis"/><ref name="joins23778577">{{#invoke:Cite|web | script-title=ko:'K방역 극찬' 빌 게이츠, KT 손잡고 제2 코로나 막을 연구에 60억 투자 |url=https://news.joins.com/article/23778577 |date=17 May 2020 |script-website=ko:중앙일보 |language=ko |access-date=17 May 2020}}</ref>

      === Europe ===
      {{Main|COVID-19 pandemic in Europe}}

      [[File:Persons died due to coronavirus COVID-19 per capita in Europe.svg|upright=1.35|thumb|Deaths per 100,000 residents]]
      The COVID-19 pandemic arrived in Europe with its first confirmed case in [[Bordeaux]], [[COVID-19 pandemic in France|France]], on 24 January 2020, and subsequently spread widely across the continent. By 17 March 2020, every country in Europe had confirmed a case,<ref>{{#invoke:Cite tweet||main|author=Government of Montenegro |author-link=Government of Montenegro |user=MeGovernment |number=1239992049350447104 |date=17 March 2020 |title=PM @DuskoMarkovicCG: #Montenegro confirmes first two #COVID19 cases #CoronaInfoCG https://t.co/Jxkrm4AMwK |access-date=8 December 2022 |archive-url=https://web.archive.org/web/20220512133308/https://twitter.com/MeGovernment/status/1239992049350447104 |archive-date=12 May 2022 |url-status=live}}</ref> and all had reported at least one death, with the exception of [[COVID-19 pandemic in Vatican City|Vatican City]]. Italy was the first European nation to experience a major outbreak in early 2020, becoming the first country worldwide to introduce a national [[COVID-19 lockdowns in Italy|lockdown]].<ref>{{#invoke:Cite|journal | vauthors = Saglietto A, D'Ascenzo F, Zoccai GB, De Ferrari GM | title = COVID-19 in Europe: the Italian lesson | journal = Lancet | volume = 395 | issue = 10230 | pages = 1110–1111 | date = April 2020 | pmid = 32220279 | pmc = 7118630 | doi = 10.1016/S0140-6736(20)30690-5 }}</ref> By 13 March 2020, the WHO declared Europe the epicentre of the pandemic<ref>{{#invoke:Cite|web| vauthors = Nebehay S |date=13 March 2020|title=Europe is epicenter of coronavirus pandemic: WHO|url=https://www.reuters.com/article/us-health-coronavirus-who/europe-is-epicenter-of-coronavirus-pandemic-who-idUSKBN2102Q0|work=Reuters|access-date=8 May 2021}}</ref><ref>{{#invoke:Cite|web|date=13 March 2020|title=Coronavirus: Europe now epicentre of the pandemic, says WHO|url=https://www.bbc.com/news/world-europe-51876784|publisher=BBC|access-date=8 May 2021}}</ref> and it remained so until the WHO announced it had been overtaken by [[COVID-19 pandemic in South America|South America]] on 22 May.<ref>{{#invoke:Cite|news| vauthors = Feuer W |date=22 May 2020|title=South America is a 'new epicenter' of the coronavirus pandemic, WHO says|url=https://www.cnbc.com/2020/05/22/south-america-is-a-new-epicenter-of-the-coronavirus-pandemic-who-says.html}}</ref> By 18 March 2020, more than 250&nbsp;million people were in [[stay-at-home order|lockdown]] in Europe.<ref>{{#invoke:Cite|news| vauthors = Henley J |date=18 March 2020|title=More than 250m in lockdown in EU as Belgium and Germany adopt measures|work=The Guardian|url=https://www.theguardian.com/world/2020/mar/18/coronavirus-lockdown-eu-belgium-germany-adopt-measures|url-status=live|access-date=4 April 2020|archive-url=https://web.archive.org/web/20200401085742/https://www.theguardian.com/world/2020/mar/18/coronavirus-lockdown-eu-belgium-germany-adopt-measures|archive-date=1 April 2020|issn=0261-3077}}</ref> Despite [[deployment of COVID-19 vaccines]], Europe became the pandemic's epicentre once again in late 2021.<ref>{{#invoke:Cite|web|title=COVID-19's epicentre again: Europe faces fresh reckoning|url=https://www.aljazeera.com/news/2021/11/12/covid-19s-epicentre-again-europe-faces-fresh-reckoning|access-date=19 November 2021|website=aljazeera.com}}</ref><ref>{{#invoke:Cite|web |title=With Covid cases rising, Europe is back at the epicenter of the pandemic |url=https://www.nbcnews.com/health/health-news/who-says-europe-back-epicenter-covid-pandemic-despite-vaccines-n1283263 |website=NBC News |date=4 November 2021 |access-date=15 January 2022 }}</ref>

      The [[COVID-19 pandemic in Italy|Italian outbreak]] began on 31 January 2020, when two Chinese tourists tested positive for SARS-CoV-2 in Rome.<ref name="Corriere_20Jan">{{#invoke:Cite|news | vauthors = Severgnini C |title=Coronavirus, primi due casi in Italia: sono due turisti cinesi |url=https://www.corriere.it/cronache/20_gennaio_30/coronavirus-italia-corona-9d6dc436-4343-11ea-bdc8-faf1f56f19b7.shtml |access-date=29 May 2023 |work=Corriere della Sera |date=30 January 2020 |language=it}}</ref> Cases began to rise sharply, which prompted the government to suspend flights to and from China and declare a state of emergency.<ref name="thelocal-flight"/> On 22 February 2020, the Council of Ministers announced a new decree-law to contain the outbreak, which quarantined more than 50,000 people in northern Italy.<ref name="AutoDW-201"/> On 4 March, the Italian government ordered schools and universities closed as Italy reached a hundred deaths. Sport was suspended completely for at least one month.<ref name="Kv4Ld"/><!-- We should summarise restrictions generally for Europe as a continent, not for various individual countries. At a high level, restrictions can be categorised into broadly similar groups. --> On 11 March, Italian Prime Minister Giuseppe Conte closed down nearly all commercial activity except supermarkets and pharmacies.<ref name="To26Y"/><ref name="ClzT6"/> On 19 April, the first wave ebbed, as 7-day deaths declined to 433.<ref name="thehill493586">{{#invoke:Cite|web | vauthors = Coleman J |title=Italy sees fewest coronavirus deaths in a week |url=https://thehill.com/policy/international/europe/493586-italy-sees-fewest-coronavirus-deaths-in-a-week |website=The Hill |access-date=20 April 2020 |date=19 April 2020 }}</ref> On 13 October, the Italian government again issued restrictive rules to contain the second wave.<ref name="KhaW7">{{#invoke:Cite|news |title=Conte firma il dpcm: stop a movida e gite, niente didattica a distanza |url=https://www.ansa.it/sito/notizie/politica/2020/10/12/coronavirus-conte-dpcm-nuove-misure-anti-covid-stretta_f39a3a5d-1412-48eb-9e73-c2c0009fd90b.html |access-date=13 October 2020 |agency=ansa.it |date=13 October 2020}}</ref> On 10 November, Italy surpassed 1&nbsp;million confirmed infections.<ref name="8XEwk">{{#invoke:Cite|web | title=Italy passes 1 million Covid-19 cases, France overtakes Russia |url=https://www.scmp.com/news/world/europe/article/3109462/coronavirus-italy-passes-1-million-cases-joining-10-worst-hit |website=South China Morning Post |access-date=13 November 2020 |date=12 November 2020}}</ref> On 23 November, it was reported that the second wave of the virus had led some hospitals to stop accepting patients.<ref>{{#invoke:Cite|web | title=Coronavirus: Clinics in Naples, Italy, on the brink of collapse | date=23 November 2020 |url=https://www.dw.com/en/coronavirus-clinics-in-naples-italy-on-the-brink-of-collapse/a-55703503 |publisher=Deutsche Welle |access-date=25 November 2020}}</ref>

      [[File:2020 12 27 mas vacunados en la residencia mixta 1 (cropped).jpg|thumb|Vaccinations at a [[retirement home]] in [[Gijón]], Spain on 12 December 2020|alt=Elderly woman rolls up sleeve as two nurses administer a vaccine.]]
      The virus was first confirmed to have spread to Spain on 31 January 2020, when a German tourist tested positive for SARS-CoV-2 on [[La Gomera]] in the Canary Islands.<ref name="SanidadConfirmaEnLaGomera">{{#invoke:Cite|news|title=Sanidad confirma en La Gomera el primer caso de coronavirus en España|url=https://elpais.com/sociedad/2020/01/31/actualidad/1580509404_469734.html|website=[[El País]]|access-date=31 January 2020|date=31 January 2020|language=es|archive-url=https://web.archive.org/web/20200131225909/https://elpais.com/sociedad/2020/01/31/actualidad/1580509404_469734.html|archive-date=31 January 2020|url-status=live | vauthors = Linde P }}</ref> Post-hoc genetic analysis has shown that at least 15 strains of the virus had been imported, and [[community transmission]] began by mid-February.<ref name="genetic analysis">{{#invoke:Cite|news | vauthors = Ansede M |title=El análisis genético sugiere que el coronavirus ya circulaba por España a mediados de febrero |url=https://elpais.com/ciencia/2020-04-22/el-analisis-genetico-sugiere-que-el-coronavirus-ya-circulaba-por-espana-a-mediados-de-febrero.html |access-date=23 April 2020 |work=El País |date=22 April 2020 |language=es}}</ref> On 29 March, it was announced that, beginning the following day, all non-essential workers were ordered to remain at home for the next 14 days.<ref>{{#invoke:Cite|web|url=https://www.msn.com/en-nz/news/world/spain-poised-to-tighten-coronavirus-lockdown-after-record-daily-toll/ar-BB11S9Gj|title=Spain poised to tighten coronavirus lockdown after record daily toll|publisher=MSN|access-date=29 March 2020}}</ref> The number of cases increased again in July in a number of cities including [[Barcelona]], [[Zaragoza]] and [[Madrid]], which led to reimposition of some restrictions but no national lockdown.<ref name=bbc25july>{{#invoke:Cite|news |url=https://www.bbc.co.uk/news/world-europe-53539015 |title=Coronavirus: Spain drives fears of European 'second wave' |date=25 July 2020 |publisher=BBC }}</ref><ref name="elpais6aug">{{#invoke:Cite|news |url=https://english.elpais.com/spanish_news/2020-08-06/spains-basque-region-admits-to-second-wave-of-covid-19.html |title=Spain's Basque region admits to second wave of Covid-19 |work=El País |date=6 August 2020 }}</ref><ref name="telegraph aug16">{{#invoke:Cite|news |url=https://www.telegraph.co.uk/news/2020/08/14/spain-shuts-nightlife-amid-fears-major-second-wave-coronavirus/ |archive-url=https://ghostarchive.org/archive/20220110/https://www.telegraph.co.uk/news/2020/08/14/spain-shuts-nightlife-amid-fears-major-second-wave-coronavirus/ |archive-date=10 January 2022 |url-access=subscription |url-status=live |title=Spain shuts down nightlife amid fears of major second wave of coronavirus| vauthors = Badcock J |date=14 August 2020 |work=The Telegraph}}{{cbignore}}</ref><ref>{{#invoke:Cite|news |url=https://www.euractiv.com/section/coronavirus/news/spain-wont-declare-another-national-state-of-alarm-allows-regions-to-lockdown-if-necessary/ |title=Spain won't declare another national state of alarm, allows regions to lockdown if necessary |date=26 August 2020 |work=Euroactiv }}</ref> By September 2021, Spain was one of the countries with the highest percentage of its population vaccinated (76% fully vaccinated and 79% with the first dose).<ref name="auto2">{{#invoke:Cite|journal| vauthors = Ritchie H, Mathieu E, Rodés-Guirao L, Appel C, Giattino C, Ortiz-Ospina E, Hasell J, Macdonald B, Beltekian D, Roser M |date=5 March 2020|title=Coronavirus Pandemic (COVID-19)|url=https://ourworldindata.org/covid-vaccinations|journal=Our World in Data}}</ref> Italy is ranked second at 75%.<ref name="auto2"/><!-- We should summarise vaccination status for Europe as a continent, not for dozens of individual countries. -->

      Sweden differed from most other European countries in that it mostly remained open.<ref name="NYT20200515">{{#invoke:Cite|news | vauthors = Leatherby L |title=Sweden Stayed Open. A Deadly Month Shows the Risks |url=https://www.nytimes.com/interactive/2020/05/15/world/europe/sweden-coronavirus-deaths.html |access-date=18 May 2020 |newspaper=[[The New York Times]] |date=15 May 2020}}</ref> Per the [[Swedish constitution]], the [[Public Health Agency of Sweden]] has autonomy that prevents political interference and the agency favoured remaining open. The Swedish strategy focused on longer-term measures, based on the assumption that after lockdown the virus would resume spreading, with the same result.<ref name="7ys2k">{{#invoke:Cite|web | vauthors = Milne R |date=8 May 2020|title=Architect of Sweden's no-lockdown strategy insists it will pay off|url=https://www.ft.com/content/a2b4c18c-a5e8-4edc-8047-ade4a82a548d|access-date=16 August 2020|website=[[Financial Times]]}}</ref><ref name="I06mN">{{#invoke:Cite|web | title=Sverige diskuterar inte exitstrategier: "Vår strategi är hållbar, vi kan ligga kvar med den en väldigt lång tid"|url=https://svenska.yle.fi/artikel/2020/04/22/sverige-diskuterar-inte-exitstrategier-var-strategi-ar-hallbar-vi-kan-ligga-kvar|access-date=16 August 2020|website=svenska.yle.fi| date=22 April 2020|language=sv-FI}}</ref> By the end of June, Sweden no longer had [[excess mortality]].<ref name="HEUrz">{{#invoke:Cite|web | title=Inte längre någon överdödlighet i Sverige|url=https://www.dagensmedicin.se/artiklar/2020/06/25/inte-langre-nagon-overdodlighet-i-sverige/|access-date=16 August 2020|website=Dagens Medicin|language=sv}}</ref>

      [[Devolution in the United Kingdom]] meant that each of its four [[countries of the United Kingdom|countries]] developed its own response. England's restrictions were shorter-lived than the others.<ref name="8VnMf">{{#invoke:Cite|news |url=https://www.economist.com/britain/2020/06/06/devolution-has-become-less-dysfunctional-during-the-pandemic |title=Ignore the squabbling Devolution has become less dysfunctional during the pandemic |newspaper=The Economist |date=6 June 2020 |access-date=22 July 2020}}</ref> The [[government of the United Kingdom|UK government]] started enforcing social distancing and quarantine measures on 18 March 2020.<ref name="PkWGD"/><ref name="Pkx25"/> On 16 March, Prime Minister [[Boris Johnson]] advised against non-essential travel and social contact, praising [[remote work|work from home]] and avoiding venues such as pubs, restaurants, and theatres.<ref name="5Q93q"/><ref name="hYdUy"/> On 20 March, the government ordered all leisure establishments to close,<ref name="dmBNt"/> and promised to prevent unemployment.<ref name="mV2p3"/> On 23 March, Johnson banned gatherings and restricted non-essential travel and outdoor activity. Unlike previous measures, these restrictions were enforceable by police through fines and dispersal of gatherings. Most non-essential businesses were ordered to close.<ref name="bbc-pm-2403"/> On 24 April 2020, it was reported that a promising vaccine trial had begun in England; the government pledged more than £50&nbsp;million towards research.<ref name="vKeXC">{{#invoke:Cite|web | title=Large-scale human trial of potential COVID-19 vaccine kicks off at Oxford |date=24 April 2020 |url=https://www.cbsnews.com/news/coronavirus-vaccine-covid-19-human-clinical-trial-oxford-england/ |publisher=CBS News |access-date=24 April 2020}}</ref> On 16 April 2020, it was reported that the UK would have first access to the Oxford vaccine, due to a prior contract; should the trial be successful, some 30&nbsp;million doses would be available.<ref name="Lbt4o">{{#invoke:Cite|web | title=Coronavirus updates: Texas reports single highest daily rate increase of infections |url=https://www.msn.com/en-us/news/us/coronavirus-updates-texas-reports-single-highest-daily-rate-increase-of-infections/ar-BB14cpOY?ocid=spartan-dhp-feeds |publisher=MSN |access-date=17 May 2020}}</ref> On 2 December 2020, the UK became the first developed country to approve the Pfizer vaccine; 800,000 doses were immediately available for use.<ref>{{#invoke:Cite|news | vauthors = Mueller B |title=U.K. Approves Pfizer Coronavirus Vaccine, a First in the West |url=https://www.nytimes.com/2020/12/02/world/europe/pfizer-coronavirus-vaccine-approved-uk.html |website=[[The New York Times]] |access-date=2 December 2020 |date=2 December 2020}}</ref> In August 2022 it was reported that viral infection cases had declined in the UK.<ref>{{#invoke:Cite|web |title=Coronavirus (COVID-19) Infection Survey, UK: 19 August 2022|url=https://www.ons.gov.uk/peoplepopulationandcommunity/healthandsocialcare/conditionsanddiseases/bulletins/coronaviruscovid19infectionsurveypilot/19august2022 |publisher=UK Office for National Statistics |access-date=6 July 2023 |date=19 August 2022}}</ref>

      === North America ===
      {{Main|COVID-19 pandemic in North America}}

      The virus arrived in the [[COVID-19 pandemic in the United States|United States]] on 13 January 2020.<ref>{{#invoke:Cite|web |title=Second Travel-related Case of 2019 Novel Coronavirus Detected in United States |url=https://www.cdc.gov/media/releases/2020/p0124-second-travel-coronavirus.html |website=Centers for Disease Control and Prevention |date=18 February 2020}}</ref> Cases were reported in all North American countries after [[COVID-19 pandemic in Saint Kitts and Nevis|Saint Kitts and Nevis]] confirmed a case on 25 March, and in all North American territories after [[COVID-19 pandemic in Bonaire|Bonaire]] confirmed a case on 16 April.<ref name="FirstBonaire_local">{{#invoke:Cite|web| url=https://www.infobonaire.com/update-on-coronavirus-covid-19-by-bonaires-lt-governor/| title=Update on Coronavirus (COVID-19) by Bonaire's Lt. Governor InfoBonaire | website=The Bonaire Information Site| date=16 April 2020 |access-date=17 April 2020}}</ref>

      [[File:USNS Comfort New York City 2020.jpg|thumb|The hospital ship [[USNS Comfort|USNS ''Comfort'']] arrives in [[Manhattan]] on 30 March 2020.]]
      Per ''Our World in Data'', {{COVID-19 data/Text|US|cases}} confirmed cases have been reported in the United States with {{COVID-19 data/Text|US|deaths}} deaths, the most of any country, and [[COVID-19 pandemic death rates by country|the nineteenth-highest]] per capita worldwide.<ref name="JH Mortality">{{#invoke:Cite|web|url= https://coronavirus.jhu.edu/data/mortality|title=Mortality Analyses|publisher=[[Johns Hopkins University]]|access-date=17 December 2020}}</ref> COVID-19 is the [[list of disasters in the United States by death toll|deadliest pandemic in US history]];<ref>{{#invoke:Cite|web|date=21 September 2021|title=COVID-19 surpasses 1918 flu as deadliest pandemic in U.S. history|url=https://www.nationalgeographic.com/history/article/covid-19-is-now-the-deadliest-pandemic-in-us-history|access-date=2 October 2021|website=National Geographic}}</ref> it was the third-leading cause of death in the US in 2020, behind heart disease and cancer.<ref>{{#invoke:Cite|news|url=https://apnews.com/article/us-coronavirus-deaths-top-3-million-e2bc856b6ec45563b84ee2e87ae8d5e7|title=US deaths in 2020 top 3 million, by far most ever counted| vauthors = Stobbe M |date=21 December 2020|access-date=22 December 2020|work=Associated Press }}</ref> From 2019 to 2020, US life expectancy dropped by 3{{nbsp}}years for Hispanic Americans, 2.9{{nbsp}}years for African Americans, and 1.2{{nbsp}}years for white Americans.<ref name=Bosman>{{#invoke:Cite|news|url=https://www.nytimes.com/2021/07/21/us/american-life-expectancy-report.html |archive-url=https://ghostarchive.org/archive/20211228/https://www.nytimes.com/2021/07/21/us/american-life-expectancy-report.html |archive-date=28 December 2021 |url-access=limited|title=U.S. Life Expectancy Plunged in 2020, Especially for Black and Hispanic Americans| vauthors = Bosman J, Kasakove S, Victor D |date=21 July 2021|access-date=21 July 2021|work=[[The New York Times]]}}{{cbignore}}</ref> These effects have persisted as US deaths due to COVID-19 in 2021 exceeded those in 2020.<ref>{{#invoke:Cite|web| vauthors = Shapiro E, Pereira I, Deliso M |date=6 October 2021|title=COVID-19 live updates: More Americans died of COVID this year than all of 2020|url=https://abcnews.go.com/Health/live-updates/covid-delta-surge/?id=80391228|access-date=6 October 2021|website=ABC News }}</ref> In the United States, COVID-19 vaccines became available under emergency use in December 2020, beginning the [[COVID-19 vaccination in the United States|national vaccination programme]]. The first COVID-19 vaccine was officially approved by the [[Food and Drug Administration]] on 23 August 2021.<ref>{{#invoke:Cite|press release | title=FDA Approves First COVID-19 Vaccine | website=U.S. [[Food and Drug Administration]] (FDA) | date=23 August 2021 | url=https://www.fda.gov/news-events/press-announcements/fda-approves-first-covid-19-vaccine | access-date=16 October 2021}}</ref> By 18 November 2022, while cases in the U.S. had declined, COVID variants BQ.1/BQ.1.1 had become dominant in the country.<ref>{{#invoke:Cite|web |title=COVID variants BQ.1/BQ.1.1 make up nearly half of U.S. cases – CDC |url=https://www.reuters.com/business/healthcare-pharmaceuticals/covid-variants-bq1bq11-make-up-nearly-half-us-cases-cdc-2022-11-18/ |website=Reuters |access-date=19 November 2022 |date=18 November 2022}}</ref><ref>{{#invoke:Cite|web |date=14 October 2022 | vauthors = Schnirring L |title=US COVID levels decline as new subvariants rise steadily |url=https://www.cidrap.umn.edu/news-perspective/2022/10/us-covid-levels-decline-new-subvariants-rise-steadily |website=CIDRAP |access-date=19 November 2022 }}</ref>

      In March 2020, as cases of community transmission were confirmed across [[COVID-19 pandemic in Canada|Canada]], all of its provinces and territories declared states of emergency. Provinces and territories, to varying degrees, implemented school and daycare closures, prohibitions on gatherings, closures of non-essential businesses and restrictions on entry. Canada severely restricted its border access, barring travellers from all countries with some exceptions.<ref>{{#invoke:Cite|web| vauthors = McQuigge M |date=25 March 2020|title=The Quarantine Act explained, as isolation becomes mandatory for some|url=https://www.ctvnews.ca/health/coronavirus/the-quarantine-act-explained-as-isolation-becomes-mandatory-for-some-1.4868457|access-date=4 April 2021|publisher=CTV News}}</ref> Cases surged across Canada, notably in the provinces of [[COVID-19 pandemic in British Columbia|British Columbia]], [[COVID-19 pandemic in Alberta|Alberta]], [[COVID-19 pandemic in Quebec|Quebec]] and [[COVID-19 pandemic in Ontario|Ontario]], with the formation of the [[Atlantic Bubble]], a [[travel restrictions related to the COVID-19 pandemic|travel-restricted]] area of the country (formed of the four [[Atlantic Canada|Atlantic provinces]]).<ref>{{#invoke:Cite|web|url=https://vocm.com/2020/12/23/covid-cases-in-atlantic-bubble-remain-low-as-cases-grow-across-canada/|title=COVID Cases in Atlantic Bubble Remain Low as Cases Grow Across Canada| vauthors = Grimes J }}</ref> Vaccine passports were adopted in all provinces and two of the territories.<ref>{{#invoke:Cite|news |url=https://www.cbc.ca/news/canada/newfoundland-labrador/covid-nl-sept-7-2021-1.6166699 |title=Vaccine passports coming, Furey says, as N.L. reports 5 new cases |publisher=CBC News |date=7 September 2021}}</ref><ref>{{#invoke:Cite|news|url=https://www.nytimes.com/2021/09/03/world/canada/vaccine-passports-protests.html |archive-url=https://web.archive.org/web/20210903220325/https://www.nytimes.com/2021/09/03/world/canada/vaccine-passports-protests.html |archive-date=3 September 2021 |url-access=limited|title=Vaccine Passports Roll Out, and So Do Unruly Anti-Vaccine Protests| vauthors = Austen I |date=3 September 2021|work=The New York Times}}</ref> Per a report on 11 November 2022, Canadian health authorities saw a surge in influenza, while COVID-19 was expected to rise during winter.<ref>{{#invoke:Cite|web |title=Canada is seeing an early rise in flu cases. Is a 'tidal wave' of infection coming? |url=https://www.cbc.ca/news/health/early-flu-cases-canada-1.6647860 |website=cbc |access-date=19 November 2022}}</ref>

      === South America ===
      {{Main|COVID-19 pandemic in South America}}

      [[File:Fosas comunes en Cochabamba.jpg|thumb|Mass graves being prepared for COVID-19 victims in [[Cochabamba]], Bolivia]]

      The COVID-19 pandemic was confirmed to have reached South America on 26 February 2020, when Brazil confirmed a case in [[São Paulo]].<ref>{{#invoke:Cite|web|url=https://www.as-coa.org/articles/where-coronavirus-latin-america |title=Where Is the Coronavirus in Latin America? | vauthors = orwitz L, Nagovitch P, Sonneland HK, Zissis C |website=AS/COA|access-date=22 March 2020|archive-url=https://web.archive.org/web/20200322095058/https://www.as-coa.org/articles/where-coronavirus-latin-america|archive-date=22 March 2020|url-status=live}}</ref> By 3 April, all countries and territories in South America had recorded at least one case.<ref name="Stuff/Fairfax">{{#invoke:Cite|web |url= https://www.stuff.co.nz/national/health/coronavirus/120818001/uncollected-bodies-lie-for-days-in-the-streets-of-ecuador-the-emerging-epicenter-of-the-coronavirus-in-latin-america |title=Uncollected bodies lie for days in the streets of Ecuador the emerging epicentre of the coronavirus in Latin America |publisher= Stuff/Fairfax |date=4 April 2020}}</ref> On 13 May 2020, it was reported that Latin America and the [[Caribbean]] had reported over 400,000 cases of COVID-19 infection with 23,091 deaths. On 22 May 2020, citing the rapid increase of [[COVID-19 pandemic in Brazil|infections in Brazil]], the WHO declared South America the epicentre of the pandemic.<ref>{{#invoke:Cite|news |title=WHO declares that South America is the new coronavirus epicenter |url=https://www.washingtonpost.com/nation/2020/05/22/coronavirus-update-us/ |newspaper=The Washington Post |access-date=23 May 2020}}</ref><ref>{{#invoke:Cite|web | vauthors = Ward A |title=How South America became a coronavirus epicenter |url=https://www.vox.com/2020/5/26/21270376/south-america-covid-19-coronavirus-brazil-peru-chile |website=Vox |date=26 May 2020 |access-date=28 May 2020}}</ref> As of 16 July 2021, South America had recorded 34,359,631 confirmed cases and 1,047,229 deaths from COVID-19. Due to a shortage of testing and medical facilities, it is believed that the outbreak is far larger than the official numbers show.<ref>{{#invoke:Cite|news | vauthors = Ankel S |title=How Brazil went from carnival floats to mass graves. Photos show what it's like in the world's latest coronavirus hotspot. |url=https://www.businessinsider.com/photos-show-brazil-emerging-as-new-global-coronavirus-hotspot-2020-5#in-early-april-brazilian-health-officials-confirmed-that-covid- |access-date=31 May 2023 |work=Business Insider}}</ref>

      The virus was confirmed to have spread to Brazil on 25 February 2020,<ref>{{#invoke:Cite|web|url=https://www.saude.gov.br/noticias/agencia-saude/46435-brasil-confirma-primeiro-caso-de-novo-coronavirus|title=Brasil confirma primeiro caso da doença|date=26 February 2020|publisher=[[Ministry of Health (Brazil)]] |url-status=live|archive-url=https://web.archive.org/web/20200306155723/https://www.saude.gov.br/noticias/agencia-saude/46435-brasil-confirma-primeiro-caso-de-novo-coronavirus|archive-date=6 March 2020|access-date=4 March 2020}}</ref> when a man from [[São Paulo]] who had travelled to Italy tested positive for the virus.<ref>{{#invoke:Cite|news | vauthors = Oliveira E, Ortiz B |title=Ministério da Saúde confirma primeiro caso de coronavírus no Brasil |url=https://g1.globo.com/ciencia-e-saude/noticia/2020/02/26/ministerio-da-saude-fala-sobre-caso-possivel-paciente-com-coronavirus.ghtml |access-date=31 May 2023 |work=G1 |date=26 February 2020 |language=pt-br}}</ref> The disease had spread to every [[federative units of Brazil|federative unit of Brazil]] by 21 March. On 19 June 2020, the country reported its one millionth case and nearly 49,000 reported deaths.<ref>{{#invoke:Cite|news| vauthors = Charner F |date=19 June 2020|title=Brazil tops 1 million Covid-19 cases. It may pass the US next, becoming the worst-hit country on the planet|url=https://www.cnn.com/2020/06/19/americas/brazil-one-million-coronavirus-jair-bolsonaro-cases-intl/index.html|access-date=19 June 2020|publisher=CNN}}</ref><ref>{{#invoke:Cite|web|title=Painel Coronavírus|url=https://covid.saude.gov.br/|access-date=12 June 2020|website=}}</ref> One estimate of [[under-reporting#Disease|under-reporting]] was 22.62% of total reported COVID-19 mortality in 2020.<ref>{{#invoke:Cite|journal | vauthors = Kupek E | title = How many more? Under-reporting of the COVID-19 deaths in Brazil in 2020 | journal = Tropical Medicine & International Health | volume = 26 | issue = 9 | pages = 1019–1028 | date = September 2021 | pmid = 34008266 | pmc = 8242696 | doi = 10.1111/tmi.13628 }}</ref><ref>{{#invoke:Cite|journal | vauthors = Ibrahim NK | title = Epidemiologic surveillance for controlling Covid-19 pandemic: types, challenges and implications | journal = Journal of Infection and Public Health | volume = 13 | issue = 11 | pages = 1630–1638 | date = November 2020 | pmid = 32855090 | pmc = 7441991 | doi = 10.1016/j.jiph.2020.07.019 }}</ref><ref>{{#invoke:Cite|journal | vauthors = Santos AM, Souza BF, Carvalho CA, Campos MA, Oliveira BL, Diniz EM, Branco MD, Queiroz RC, Carvalho VA, Araújo WR, Silva AA | title = Excess deaths from all causes and by COVID-19 in Brazil in 2020 | journal = Revista de Saúde Pública | volume = 55 | page = 71 | date = 2021 | pmid = 34730751 | pmc = 8522736 | doi = 10.11606/s1518-8787.2021055004137 }}</ref> As of {{COVID-19 data/Date|format=d F Y}}, Brazil, with {{COVID-19 data/Text|BR|cases}} confirmed cases and {{COVID-19 data/Text|BR|deaths}} deaths, has the third-highest number of confirmed cases and second-highest death toll from COVID-19 in the world, behind only [[COVID-19 pandemic in the United States|those of the United States]] and [[COVID-19 pandemic in India|India]].<ref>{{#invoke:Cite|web |title=Brazil "falls" to third place among covid-19 affected countries behind the U.S. and now India |url=https://en.mercopress.com/2021/04/12/brazil-falls-to-third-place-among-covid-19-affected-countries-behind-the-u.s.-and-now-india |website=MercoPress |access-date=5 September 2022 }}</ref>

      === Africa ===
      {{Main|COVID-19 pandemic in Africa}}

      [[File:Air Forces Africa delivers medical supplies to Ghana (49829156488).jpg|thumb|[[United States Air Force|US Air Force]] personnel unload a [[Boeing C-17 Globemaster III|C-17]] aircraft carrying medical supplies in [[Niamey]], Niger, in April 2020.]]
      The COVID-19 pandemic was confirmed to have spread to Africa on 14 February 2020, with the first confirmed case announced in [[COVID-19 pandemic in Egypt|Egypt]].<ref name="bbc_51509248">{{#invoke:Cite|news |title=Beijing orders 14-day quarantine for all returnees |url=https://www.bbc.com/news/world-asia-china-51509248 |access-date=24 March 2020 |work=[[BBC News]] |date=15 February 2020 |archive-url=https://web.archive.org/web/20200214210032/https://www.bbc.com/news/world-asia-china-51509248 |archive-date=14 February 2020 |url-status=live}}</ref><ref>{{#invoke:Cite|news |title=Egypt announces first Coronavirus infection |url=https://www.egypttoday.com/Article/1/81641/Egypt-announces-first-Coronavirus-infection |access-date=24 March 2020 |work=EgyptToday |date=14 February 2020 |archive-url=https://web.archive.org/web/20200215092410/https://www.egypttoday.com/Article/1/81641/Egypt-announces-first-Coronavirus-infection |archive-date=15 February 2020}}</ref> The first confirmed case in [[sub-Saharan Africa]] was announced in [[COVID-19 pandemic in Nigeria|Nigeria]] at the end of February 2020.<ref name="bbc_51671834">{{#invoke:Cite|news |title=Nigeria confirms first coronavirus case |url=https://www.bbc.com/news/world-africa-51671834 |access-date=24 March 2020 |work=BBC News |date=28 February 2020 |archive-url=https://web.archive.org/web/20200302181240/https://www.bbc.com/news/world-africa-51671834 |archive-date=2 March 2020 |url-status=live}}</ref> Within three months, the virus had spread throughout the continent; [[COVID-19 pandemic in Lesotho|Lesotho]], the last African sovereign state to have remained free of the virus, reported its first case on 13 May 2020.<ref name=reuters_idUSKBN22P1R4>{{#invoke:Cite|news|date=13 May 2020|title=Remote Lesotho becomes last country in Africa to record COVID-19 case|work=Reuters|url=https://www.reuters.com/article/us-health-coronavirus-lesotho-idUSKBN22P1R4|url-status=live|access-date=13 May 2020|archive-url=https://web.archive.org/web/20200514053312/https://www.reuters.com/article/us-health-coronavirus-lesotho-idUSKBN22P1R4|archive-date=14 May 2020}}</ref><ref name="latimes.com">{{#invoke:Cite|web|title=Coronavirus live updates: Lesotho becomes last African nation to report a coronavirus case|url=https://www.latimes.com/california/liveblog/coronavirus-live-updates-wednesday-may-13|url-status=live|archive-url=https://web.archive.org/web/20200513141447/https://www.latimes.com/california/liveblog/coronavirus-live-updates-wednesday-may-13|archive-date=13 May 2020|access-date=13 May 2020|website=Los Angeles Times}}</ref> By 26 May, it appeared that most African countries were experiencing community transmission, although testing capacity was limited.<ref name=theguardian_20200526_africa>{{#invoke:Cite|web| vauthors = Akinwotu E |date=26 May 2020|title=Experts sound alarm over lack of Covid-19 test kits in Africa|url=https://www.theguardian.com/global-development/2020/may/26/africa-concerned-over-lack-of-coronavirus-testing-kits|url-status=live|archive-url=https://web.archive.org/web/20200529155322/https://www.theguardian.com/global-development/2020/may/26/africa-concerned-over-lack-of-coronavirus-testing-kits|archive-date=29 May 2020|access-date=29 May 2020|website=The Guardian}}</ref> Most of the identified imported cases arrived from Europe and the United States rather than from China where the virus originated.<ref name="Africa Braces">{{#invoke:Cite|news | vauthors = Maclean R |title=Africa Braces for Coronavirus, but Slowly |url=https://www.nytimes.com/2020/03/17/world/africa/coronavirus-africa-burkina-faso.html |access-date=25 March 2020 |work=The New York Times |date=17 March 2020 |archive-url=https://web.archive.org/web/20200325014602/https://www.nytimes.com/2020/03/17/world/africa/coronavirus-africa-burkina-faso.html |archive-date=25 March 2020 |url-status=live}}</ref> Many preventive measures [[national responses to the COVID-19 pandemic in Africa|were implemented]] by different countries in Africa including travel restrictions, flight cancellations, and event cancellations.<ref>{{#invoke:Cite|web | vauthors = Adebayo B, Busari S |title=Here are the African countries with confirmed coronavirus cases |url=https://www.cnn.com/2020/03/09/africa/nigeria-coronavirus-cases-intl/index.html |website=CNN |access-date=2 June 2023 |date=9 March 2020}}</ref> Despite fears, Africa reported lower death rates than other, more economically developed regions.<ref name="NYT Africa deaths">{{#invoke:Cite|news | vauthors = Nolen S |title=Trying to Solve a Covid Mystery: Africa's Low Death Rates |url=https://www.nytimes.com/2022/03/23/health/covid-africa-deaths.html |access-date=13 June 2023 |work=[[The New York Times]] |date=23 March 2022}}</ref>

      In early June 2021, Africa faced a third wave of COVID infections with cases rising in 14 countries.<ref name=theguardian_20210607_third>{{#invoke:Cite|news | vauthors = Burke J |title=Third wave sweeps across Africa as Covid vaccine imports dry up |url=https://www.theguardian.com/world/2021/jun/07/third-wave-sweeps-across-africa-as-covid-vaccine-imports-dry-up |access-date=2 June 2023 |work=The Guardian |date=7 June 2021}}</ref> By 4 July the continent recorded more than 251,000 new COVID cases, a 20% increase from the prior week and a 12% increase from the January peak. More than sixteen African countries, including [[COVID-19 pandemic in Malawi|Malawi]] and [[COVID-19 pandemic in Senegal|Senegal]], recorded an uptick in new cases.<ref name="Mendez">{{#invoke:Cite|web | vauthors = Mendez R |date=8 July 2021 |title=Africa suffers worst surge in Covid cases as delta variant spurs third wave of pandemic |url= https://www.cnbc.com/2021/07/08/delta-variant-africa-suffers-worst-surge-in-covid-cases-officials-brace-for-third-wave.html |access-date=9 July 2021|website=CNBC}}</ref> The WHO labelled it Africa's 'Worst Pandemic Week Ever'.<ref>{{#invoke:Cite|news| vauthors = Dahir AL |date=8 July 2021|title=Africa marks its 'worst pandemic week' yet, with cases surging and vaccine scarce, the W.H.O. says.|work=The New York Times|url=https://www.nytimes.com/2021/07/08/world/africa-coronavirus-cases-who.html |archive-url=https://ghostarchive.org/archive/20211228/https://www.nytimes.com/2021/07/08/world/africa-coronavirus-cases-who.html |archive-date=28 December 2021 |url-access=limited|access-date=9 July 2021|issn=0362-4331}}{{cbignore}}</ref> In October 2022, WHO reported that most countries on the African continent will miss the goal of 70 per cent vaccination by the end of 2022.<ref>{{#invoke:Cite|news | vauthors = Schlein L |title=Africa Lags Behind Rest of World in COVID-19 Vaccination Coverage |url=https://www.voanews.com/a/africa-lags-behind-rest-of-world-in-covid-19-vaccination-coverage/6798185.html |access-date=2 June 2023 |work=VOA |date=20 October 2022 }}</ref>

      === Oceania ===
      {{Main|COVID-19 pandemic in Oceania}}

      [[File:Empty shelves at Coles during the COVID-19 pandemic in Brisbane, Australia.jpg|thumb|right|Empty shelves at a [[Coles Supermarkets|Coles]] grocery store in [[Brisbane]], Australia, in April 2020]]
      The COVID-19 pandemic was confirmed to have reached Oceania on 25 January 2020, with the first confirmed case reported in [[Melbourne]], [[COVID-19 pandemic in Australia|Australia]].<ref name="AustraliaCase1">{{#invoke:Cite|web |url=https://www.health.gov.au/ministers/the-hon-greg-hunt-mp/media/first-confirmed-case-of-novel-coronavirus-in-australia|title=First confirmed case of novel coronavirus in Australia|date=25 January 2020|website=Australian Government Department of Health |access-date=3 March 2020|archive-url=https://web.archive.org/web/20200215171557/https://www.health.gov.au/ministers/the-hon-greg-hunt-mp/media/first-confirmed-case-of-novel-coronavirus-in-australia|archive-date=15 February 2020|url-status=live}}</ref><ref name="Brisbane2021">{{#invoke:Cite|news | vauthors = Lynch L |title=Going viral: Timeline shows how COVID-19 infected Queensland |url=https://www.brisbanetimes.com.au/politics/queensland/going-viral-timeline-shows-how-covid-19-infected-queensland-20210112-p56tj7.html |access-date=2 June 2023 |work=Brisbane Times |date=27 January 2021 }}</ref> It has since spread elsewhere in the region.<ref name="WHO Dashboard">{{#invoke:Cite|web|url=https://covid19.who.int/|title=WHO COVID-19 Dashboard|date=24 April 2020|access-date=24 April 2020|archive-date=16 April 2020|archive-url=https://web.archive.org/web/20200416183953/https://covid19.who.int/|url-status=live}}</ref><ref name="Brisbane2021"/> [[COVID-19 pandemic in Australia|Australia]] and [[COVID-19 pandemic in New Zealand|New Zealand]] were praised for their handling of the pandemic in comparison to other Western nations, with New Zealand and each state in Australia wiping out all community transmission of the virus several times even after re-introduction into the community.<ref name="reuters-oz-10days">{{#invoke:Cite|news | vauthors = Pandey S |title=Australia records 10th day of no local COVID-19 cases |url=https://www.reuters.com/article/health-coronavirus-australia/update-1-australia-set-for-10th-day-of-no-local-covid-19-cases-idUSL1N2K201P |access-date=28 June 2021 |work=Reuters |date=27 February 2021}}</ref><ref name="bloomberg-oz-tassie-price">{{#invoke:Cite|news | vauthors = Scott J |title= Australia's Island State Pays High Price for Virus Victory |url=https://www.bloomberg.com/news/articles/2020-09-24/the-high-price-of-beating-the-virus-on-one-pristine-island |access-date=28 June 2021 |work=bloomberg.com |date=24 September 2020}}</ref><ref>{{#invoke:Cite|news | vauthors = Cave D |title=One Case, Total Lockdown: Australia's Lessons for a Pandemic World |url=https://www.nytimes.com/2021/02/01/world/australia/perth-lockdown.html |access-date=15 April 2021 |work=[[The New York Times]] |date=1 February 2021 |archive-url=https://web.archive.org/web/20210331200902/https://www.nytimes.com/2021/02/01/world/australia/perth-lockdown.html |archive-date=31 March 2021|url-status=live}}</ref>

      As a result of the high transmissibility of the Delta variant, however, by August 2021, the Australian states of [[New South Wales]] and [[Victoria (Australia)|Victoria]] had conceded defeat in their eradication efforts.<ref>{{#invoke:Cite|news| vauthors = Briggs C |date=1 September 2021|title=Another state has given up on COVID zero. It shows Delta is a formidable foe|work=ABC News|url=https://www.abc.net.au/news/2021-09-02/victoria-and-nsw-abandon-covid-zero-analysis/100426124|access-date=29 October 2021}}</ref> In early October 2021, New Zealand also abandoned its elimination strategy.<ref name="The Guardian NZ abandons elimination">{{#invoke:Cite|news | vauthors = Corlett E |title=New Zealand Covid elimination strategy to be phased out, Ardern says |url=https://www.theguardian.com/world/2021/oct/04/new-zealand-covid-strategy-in-transition-ardern-says-as-auckland-awaits-lockdown-decision |access-date=4 October 2021 |work=[[The Guardian]] |date=4 October 2021 |archive-url=https://web.archive.org/web/20211004002428/https://www.theguardian.com/world/2021/oct/04/new-zealand-covid-strategy-in-transition-ardern-says-as-auckland-awaits-lockdown-decision |archive-date=4 October 2021|url-status=live}}</ref> In November and December, following vaccination efforts, the remaining states of Australia, excluding Western Australia, voluntarily gave up [[Zero-COVID|COVID-Zero]] to open up state and international borders.<ref>{{#invoke:Cite|news | vauthors = Dayman I |title=SA opened its borders to COVID-19 this week. Here's what we've learned |url=https://www.abc.net.au/news/2021-11-27/sa-borders-open-what-we-have-learnt-so-far/100655534 |access-date=2 June 2023 |work=ABC News |date=27 November 2021 }}</ref><ref>{{#invoke:Cite|news | vauthors = Lewin R |title=Everything you need to know as Queensland's border FINALLY reopens to Australia |url=https://7news.com.au/lifestyle/health-wellbeing/everything-you-need-to-know-as-queenslands-border-finally-reopens-to-australia-c-4914002 |access-date=2 June 2023 |work=7NEWS |date=12 December 2021 }}</ref><ref>{{#invoke:Cite|news | vauthors = Humphries A |title=5,000 arrivals in a day: Hobart Airport predicted to have busiest day on record |url=https://www.abc.net.au/news/2021-12-15/tasmania-open-again-after-almost-two-years-shut-due-to-covid-19/100699854 |access-date=2 June 2023 |work=ABC News |date=14 December 2021 }}</ref> The open borders allowed the Omicron variant of COVID-19 to enter quickly, and cases subsequently exceeded 120,000 a day.<ref>{{#invoke:Cite|news | vauthors = Truu M |title=Hitting the Omicron peak is just the beginning: This is what's in store next for Australia |url=https://www.abc.net.au/news/2022-01-30/covid-whats-next-after-omicrons-peak/100786176 |access-date=2 June 2023 |work=ABC News |date=29 January 2022 }}</ref> By early March 2022, with cases exceeding 1,000 a day, Western Australia conceded defeat in its eradication strategy and opened its borders.<ref>{{#invoke:Cite|news | vauthors = Mercer P |title=Western Australia Finally Opens Border After COVID-19 Closure |url=https://www.voanews.com/a/western-australia-finally-opens-border-after-covid-19-closure-/6468095.html |access-date=2 June 2023 |work=VOA |date=3 March 2022 }}</ref> Despite record cases, Australian jurisdictions slowly removed restrictions such as close contact isolation, mask wearing, and density limits by April 2022.<ref>{{#invoke:Cite|web | vauthors = McNeill H |date=26 April 2022 |title=WATCH LIVE: WA to ditch masks, proof of vaccination and capacity limits |url=https://www.watoday.com.au/national/western-australia/wa-health-minister-to-make-covid-19-announcement-20220426-p5ag8v.html |access-date=26 April 2022 |website=WAtoday }}</ref>

      On 9 September 2022, restrictions were significantly relaxed. The aircraft mask mandate was scrapped nationwide, and daily reporting transitioned to weekly reporting.<ref>{{#invoke:Cite|web | vauthors = Young E |date=2 September 2022 |title=WA public health rules to change as COVID-19 case numbers drop |url=https://www.theage.com.au/national/western-australia/wa-to-drop-public-transport-taxi-and-rideshare-mask-requirements-20220902-p5bevh.html |access-date=12 October 2022 |website=The Age }}</ref><ref>{{#invoke:Cite|web |title=COVID-19 update 9 September 2022 |url=https://ww2.health.wa.gov.au/Media-releases/2022/September/COVID19-update-9-September-2022 |access-date=12 October 2022 |website=ww2.health.wa.gov.au}}</ref><ref>{{#invoke:Cite|news |title=Australia to move away from reporting daily COVID-19 case numbers |url=https://www.abc.net.au/news/2022-09-07/covid-19-statistics-to-be-reported-weekly-health-ministers-say/101414964 |access-date=2 June 2023 |work=ABC News |date=7 September 2022 }}</ref> On 14 September, COVID-19 disaster payment for isolating persons was extended for mandatory isolation.<ref>{{#invoke:Cite|news | vauthors = Brown A |title=Paid pandemic leave extended while mandatory isolation continues |url=https://indaily.com.au/news/2022/09/14/paid-pandemic-leave-extended-while-mandatory-isolation-continues/ |access-date=2 June 2023 |work=InDaily |date=14 September 2022 }}</ref> By 22 September, all states had ended mask mandates on public transport, including in Victoria, where the mandate had lasted for approximately 800 days.<ref>{{#invoke:Cite|news | vauthors = Taylor H |title=Victoria becomes final state to scrap COVID mask rule |url=https://7news.com.au/news/coronavirus-vic/final-australian-state-scraps-public-transport-mask-mandate-c-8314730 |access-date=2 June 2023 |work=7NEWS |date=21 September 2022 }}</ref> On 30 September 2022, all Australian leaders declared the emergency response finished and announced the end of isolation requirements. These changes were due in part to high levels of 'hybrid immunity' and low case numbers.<ref>{{#invoke:Cite|web | vauthors = Jose R, Jackson L |title=As Australia calls end to COVID emergency response, doctors warn of risk to public |url=https://www.reuters.com/world/asia-pacific/australia-end-mandatory-home-isolation-covid-patients-2022-09-30/ |website=Reuters |date=30 September 2022}}</ref>

      === Antarctica ===
      {{Main|COVID-19 pandemic in Antarctica}}

      Due to its remoteness and sparse population, [[Antarctica]] was the last continent to have confirmed cases of COVID-19.<ref>{{#invoke:Cite|news| vauthors = Taylor A, Pitrelli S |url= https://www.washingtonpost.com/world/2020/03/24/one-continent-remains-untouched-by-coronavirus-antarctica/|title=One continent remains untouched by the coronavirus: Antarctica|date=24 March 2020|newspaper=[[The Washington Post]]|access-date=3 April 2020|archive-date=1 April 2020|archive-url=https://web.archive.org/web/20200401225655/https://www.washingtonpost.com/world/2020/03/24/one-continent-remains-untouched-by-coronavirus-antarctica/|url-status=live}}</ref><ref>{{#invoke:Cite|news | vauthors = Torres E |url=https://abcnews.go.com/International/life-antarctica-continent-case-coronavirus/story?id=69716325|title=What life is like on Antarctica, the only continent without a case of coronavirus|date=20 March 2020|work=ABC News|access-date=3 April 2020|archive-date=1 April 2020|archive-url=https://web.archive.org/web/20200401135314/https://abcnews.go.com/International/life-antarctica-continent-case-coronavirus/story?id=69716325|url-status=live}}</ref><ref>{{#invoke:Cite|news|agency=Agence France-Presse|url=https://www.scmp.com/news/asia/australasia/article/3077724/pacific-islands-antarctic-bases-coronavirus-free-living-some|title=Pacific islands, Antarctic bases: coronavirus-free living in some of Earth's most isolated places|date=31 March 2020|work=South China Morning Post|access-date=3 April 2020|archive-date=3 April 2020|archive-url=https://web.archive.org/web/20200403015046/https://www.scmp.com/news/asia/australasia/article/3077724/pacific-islands-antarctic-bases-coronavirus-free-living-some|url-status=live}}</ref> The first cases were reported in December 2020, almost a year after the first cases of COVID-19 were detected in China. At least 36 people were infected in the first outbreak in 2020,<ref>{{#invoke:Cite|news | vauthors = Ramos Miranda NA |title=Coronavirus reaches end of earth as first outbreak hits Antarctica |url=https://www.reuters.com/business/healthcare-pharmaceuticals/coronavirus-reaches-end-earth-first-outbreak-hits-antarctica-2020-12-22/ |access-date=2 June 2023 |work=Reuters |date=22 December 2020 }}</ref> with several other outbreaks taking place in 2021 and 2022.<ref>{{#invoke:Cite|news |url=https://www.theguardian.com/world/2022/nov/08/antarcticas-biggest-covid-outbreak-yet-puts-us-station-mcmurdo-on-pause |title=Antarctica's biggest Covid outbreak yet puts US station McMurdo on pause | vauthors = McClure T |date=8 November 2022 |work=The Guardian |access-date=12 June 2023}}</ref>

      === United Nations ===
      {{Main|United Nations response to the COVID-19 pandemic}}

      The [[United Nations Conference on Trade and Development]] (UNSC) was criticised for its slow response, especially regarding the UN's [[global ceasefire]], which aimed to open up humanitarian access to conflict zones.<ref name=":22">{{#invoke:Cite|web |date=9 April 2020 |title=Global Ceasefire Call Deserves UN Security Council's Full Support |url=https://www.crisisgroup.org/global/global-ceasefire-call-deserves-un-security-councils-full-support |access-date=1 August 2020 |website=Crisis Group}}</ref><ref name="Krm4a">{{#invoke:Cite|web |date=25 June 2020 |title=UN tallies action so far to fight COVID-19, and roadmap out of the pandemic |url=https://news.un.org/en/story/2020/06/1067132 |access-date=4 August 2020 |website=UN News}}</ref> The United Nations Security Council was criticised due to the inadequate manner in which it dealt with the COVID-19 pandemic, namely the poor ability to create international collaboration during this crisis.<ref>{{#invoke:Cite|journal | vauthors = Charbonneau B |title=The COVID-19 test of the United Nations Security Council |journal=International Journal: Canada's Journal of Global Policy Analysis |date=March 2021 |volume=76 |issue=1 |pages=6–16 |doi=10.1177/0020702020986897 |s2cid=233202171 |url=https://journals.sagepub.com/doi/10.1177/0020702020986897 |access-date=5 June 2023 |issn=0020-7020}}</ref><ref>{{#invoke:Cite|news | vauthors = Gladstone R |title=U.N. Security Council 'Missing In Action' in Coronavirus Fight |url=https://www.nytimes.com/2020/04/02/world/americas/coronavirus-united-nations-guterres.html |access-date=5 June 2023 |work=The New York Times |date=2 April 2020}}</ref>

      On 23 March 2020, United Nations Secretary-General [[António Guterres|António Manuel de Oliveira Guterres]] appealed for a global [[ceasefire]];<ref name="tFb4N">{{#invoke:Cite|web | date=23 March 2020|title=Transcript of the Secretary-General's virtual press encounter on the appeal for global ceasefire|url=https://www.un.org/sg/en/content/sg/press-encounter/2020-03-23/transcript-of-the-secretary-generals-virtual-press-encounter-the-appeal-for-global-ceasefire|access-date=1 August 2020|website=United Nations Secretary-General}}</ref><ref name="lzoeV">{{#invoke:Cite|web | date=23 March 2020|title=COVID-19: UN chief calls for global ceasefire to focus on 'the true fight of our lives'|url=https://news.un.org/en/story/2020/03/1059972|access-date=1 August 2020|website=UN News}}</ref> 172 UN member states and observers signed a non-binding supporting statement in June,<ref name="AGhvz">{{#invoke:Cite|web | date=24 June 2020|title=170 signatories endorse UN ceasefire appeal during COVID crisis|url=https://news.un.org/en/story/2020/06/1066982|access-date=1 August 2020|website=UN News}}</ref> and the [[UN Security Council]] passed a [[United Nations Security Council Resolution 2532|resolution]] supporting it in July.<ref name="9rN79">{{#invoke:Cite|web | title=S/RES/2532(2020) – E – S/RES/2532(2020)|url=https://undocs.org/en/S/RES/2532(2020)|access-date=1 August 2020|website=undocs.org}}</ref><ref name="nJTuX">{{#invoke:Cite|news | date=1 July 2020|title=Stalled Security Council resolution adopted, backing UN's global humanitarian ceasefire call|url=https://news.un.org/en/story/2020/07/1067552|access-date=1 August 2020|website=UN News}}</ref>

      On 29 September 2020, Guterres urged the [[International Monetary Fund]] to help certain countries via debt relief and also call for countries to increase contributions to develop vaccines.<ref>{{#invoke:Cite|news |title=U.N. chief urges increase in funding for IMF to help pandemic-hit countries |url=https://www.reuters.com/article/us-health-coronavirus-un-idUSKBN26K2VK |access-date=5 June 2023 |work=Reuters |date=29 September 2020 }}</ref>

      === WHO ===
      {{Main|World Health Organization's response to the COVID-19 pandemic|l1 = World Health Organization's response to the COVID-19 pandemic}}

      [[File:13981214000744637189356214810969 نشست مدیران شهری با نمایندگان سازمان بهداشت جهانی.jpg|thumb|[[World Health Organization]] representatives holding joint meeting with [[Tehran]] city administrators in March 2020]]
      The WHO spearheaded initiatives such as the [[COVID-19 Solidarity Response Fund]] to raise money for the pandemic response, the [[UN COVID-19 Supply Chain Task Force]], and the [[solidarity trial]] for investigating potential treatment options for the disease. The [[COVAX]] programme, co-led by the WHO, [[GAVI]], and the [[Coalition for Epidemic Preparedness Innovations]] (CEPI), aimed to accelerate the development, manufacture, and distribution of COVID-19 vaccines, and to guarantee fair and equitable access across the world.<ref>{{#invoke:Cite|web |title=COVAX |url=https://www.who.int/initiatives/act-accelerator/covax |access-date=9 December 2021 |website=who.int}}</ref><ref>{{#invoke:Cite|news |title=Factbox: Vaccines delivered under COVAX sharing scheme for poorer countries |url=https://www.reuters.com/business/healthcare-pharmaceuticals/vaccines-delivered-under-covax-sharing-scheme-poorer-countries-2022-01-03/ |access-date=5 June 2023 |work=Reuters |date=25 November 2022 }}</ref>

      == Restrictions ==
      {{Further|Timeline of the COVID-19 pandemic|International aid related to the COVID-19 pandemic}}
      [[File:China COVID19 test kit PH donation 8.jpg|thumb|Donated medical supplies received in the Philippines|alt=Workers unloading boxes of medical supplies at Villamor Air Base.]]
      The pandemic shook the world's economy, with especially severe economic damage in the United States, Europe and Latin America.<ref>{{#invoke:Cite|web | url=https://www.imf.org/en/About/FAQ/imf-response-to-covid-19|title=The IMF's Response to COVID-19|author=IMF}}</ref><ref name="Effect of COVID-19 on food security">{{#invoke:Cite|book | vauthors = Kakaei H, Nourmoradi H, Bakhtiyari S, Jalilian M, Mirzaei A |chapter=Effect of COVID-19 on food security, hunger, and food crisis |title=COVID-19 and the Sustainable Development Goals |date=2022 |pages=3–29 | publisher = Elsevier |doi=10.1016/B978-0-323-91307-2.00005-5 |pmc=9335023 |isbn=978-0-323-91307-2 }}</ref> A consensus report by American intelligence agencies in April 2021 concluded, "Efforts to contain and manage the virus have reinforced nationalist trends globally, as some states turned inward to protect their citizens and sometimes cast blame on marginalised groups". COVID-19 inflamed partisanship and polarisation around the world as bitter arguments exploded over how to respond. International trade was disrupted amid the formation of no-entry enclaves.<ref>{{#invoke:Cite|news | vauthors = Barnes JE | title=U.S. Intelligence Report Warns of Global Consequences of Social Fragmentation | website=[[The New York Times]] | date=8 April 2021 | url=https://www.nytimes.com/2021/04/08/us/politics/intelligence-global-trends-report-pandemic.html |archive-url=https://ghostarchive.org/archive/20211228/https://www.nytimes.com/2021/04/08/us/politics/intelligence-global-trends-report-pandemic.html |archive-date=28 December 2021 |url-access=limited | access-date=8 May 2021}}{{cbignore}}</ref>

      === Travel restrictions ===
      {{Main|Travel restrictions related to the COVID-19 pandemic}}

      The pandemic led many countries and regions to impose quarantines, entry bans, or other restrictions, either for citizens, recent travellers to affected areas,<ref name="20200326nytimes">{{#invoke:Cite|news |url=https://www.nytimes.com/article/coronavirus-travel-restrictions.html |title=Coronavirus Travel Restrictions, Across the Globe |date=26 March 2020 |work=[[The New York Times]]}}</ref> or for all travellers.<ref>{{#invoke:Cite|news | vauthors = Menon P |title=New Zealand sets date for reopening to tourists after nearly two years |url=https://www.reuters.com/world/asia-pacific/new-zealand-reopen-foreign-travellers-april-30-2021-11-24/ |access-date=5 June 2023 |work=Reuters |date=24 November 2021 }}</ref><ref>{{#invoke:Cite|news |title=Travel to Australia during Covid-19: What you need to know before you go |url=https://www.cnn.com/travel/article/australia-travel-covid-19/index.html |access-date=5 June 2023 |work=CNN |date=11 March 2021 }}</ref> Travel collapsed worldwide, damaging the travel sector. The effectiveness of travel restrictions was questioned as the virus spread across the world.<ref name="20200224nationalgeographic">{{#invoke:Cite|news | vauthors = Nsikan A |title=Coronavirus spikes outside China show travel bans aren't working |url=https://www.nationalgeographic.com/science/2020/02/why-travel-restrictions-are-not-stopping-coronavirus-covid-19/ |access-date=2 April 2020 |work=National Geographic |date=24 February 2020}}</ref> One study found that travel restrictions only modestly affected the initial spread, unless combined with other [[infection prevention and control]] measures.<ref name="DJYtB">{{#invoke:Cite|journal | vauthors = Chinazzi M, Davis JT, Ajelli M, Gioannini C, Litvinova M, Merler S, Pastore Y, Piontti A, Mu K, Rossi L, Sun K, Viboud C, Xiong X, Yu H, Halloran ME, Longini IM, Vespignani A | title = The effect of travel restrictions on the spread of the 2019 novel coronavirus (COVID-19) outbreak | journal = Science | volume = 368 | issue = 6489 | pages = 395–400 | date = April 2020 | pmid = 32144116 | pmc = 7164386 | doi = 10.1126/science.aba9757 | author-link15 = Ira M. Longini, Jr. | author-link16 = Alessandro Vespignani | bibcode = 2020Sci...368..395C }}</ref><ref>{{#invoke:Cite|journal | vauthors = Kim KE |title=Ten Takeaways from the COVID-19 Pandemic for Transportation Planners |journal=Transportation Research Record |date=April 2023 |volume=2677 |issue=4 |pages=517–530 |doi=10.1177/03611981221090515 |pmid=37153166 |pmc=10149348 |issn=0361-1981}}</ref> Researchers concluded that "travel restrictions are most useful in the early and late phase of an epidemic" and "restrictions of travel from Wuhan unfortunately came too late".<ref name="283GD">{{#invoke:Cite|news |title=COVID-19: Study shows that travel restrictions are most useful in the early and late phase of an epidemic |url=https://www.oxfordmartin.ox.ac.uk/news/covid-19-travel-restrictions-study/ |work=Oxford Martin School, University of Oxford |date=25 March 2020}}</ref> The European Union rejected the idea of suspending the [[Schengen Agreement|Schengen free travel zone]].<ref name="dw52497811">{{#invoke:Cite|news |url=https://www.dw.com/en/coronavirus-eu-rules-out-schengen-border-closures-amid-italy-outbreak/a-52497811 |title=Coronavirus: EU rules out Schengen border closures amid Italy outbreak |date=24 February 2020 |publisher=Deutsche Welle}}</ref><ref name="20200313euractiv">{{#invoke:Cite|news |title=Commission chief warns against unilateral virus travel bans |url=https://www.euractiv.com/section/justice-home-affairs/news/commission-chief-warns-against-unilateral-virus-travel-bans/ |work=[[EURACTIV]] |date=13 March 2020}}</ref>

      === Repatriation of foreign citizens ===
      {{Main|Evacuations related to the COVID-19 pandemic}}

      [[File:Ukraine evacuates Ukrainian and foreign citizens from Wuhan 16.jpg|thumb|Ukraine evacuates Ukrainian citizens from [[Wuhan]], China.]]
      Several countries repatriated their citizens and diplomatic staff from Wuhan and surrounding areas, primarily through [[air charter|charter flight]]s. Canada, the United States, Japan, India, Sri Lanka, Australia, France, Argentina, Germany and Thailand were among the first to do so.<ref name="AutoDW-169"/> Brazil and New Zealand evacuated their own nationals and others.<ref name="AutoDW-171"/><ref name="6l9jG"/> On 14 March, South Africa repatriated 112 South Africans who tested negative, while four who showed symptoms were left behind.<ref name="auto3">{{#invoke:Cite|web | url=https://www.sanews.gov.za/south-africa/repatriated-citizens-be-reunited-families |title=Repatriated citizens to be reunited with families |website=SANews.gov.zanews24.com |date=29 March 2020 |access-date=31 March 2020}}</ref> Pakistan declined to evacuate its citizens.<ref name="20200131dialoguepakistan"/>

      On 15 February, the US announced it would evacuate Americans aboard the ''[[Diamond Princess outbreak|Diamond Princess]]'' cruise ship,<ref name="AutoDW-174"/> and on 21 February, Canada evacuated 129 Canadians from the ship.<ref name="AutoDW-175"/> In early March, the Indian government began repatriating its citizens from Iran.<ref name="czjOG"/><ref name="indiatimes74647353">{{#invoke:Cite|news |url=https://economictimes.indiatimes.com/news/politics-and-nation/4th-batch-of-53-indians-evacuated-from-iran-s-jaishankar/articleshow/74647353.cms |title=4th batch of 53 Indians evacuated from Iran: S Jaishankar |date=16 March 2020 |work=[[The Economic Times]] |access-date=28 March 2020}}</ref> On 20 March, the United States began to withdraw some troops from Iraq.<ref name="USWithdraw">{{#invoke:Cite|web | url=https://thehill.com/policy/defense/488618-us-led-coalition-in-iraq-drawing-down-over-coronavirus-concerns |title=US-led coalition in Iraq drawing down over coronavirus concerns |website=[[The Hill (newspaper)|The Hill]] |date=20 March 2020 | vauthors = Kheel R |access-date=7 April 2020}}</ref>

      == Impact ==
      {{Main|Impact of the COVID-19 pandemic}}

      {{Further|Social impact of the COVID-19 pandemic}}

      === Economics ===
      {{Main|Economic impact of the COVID-19 pandemic}}

      {{See also|Impact of the COVID-19 pandemic on aviation|l1=Impact of the COVID-19 pandemic on aviation|Impact of the COVID-19 pandemic on science and technology|l2=on science and technology|Financial market impact of the COVID-19 pandemic|l3=on financial markets|2020 stock market crash|COVID-19 recession}}
      [[File:Stock-indices-2020crash+recovery.svg |thumb |A [[stock index]] chart shows the [[2020 stock market crash]].]]
      The pandemic and responses to it damaged the global economy. On 27 February 2020, worries about the outbreak crushed US stock indexes, which posted their sharpest falls since 2008.<ref name="U7teI"/>
      [[File:1990- Cruise ship passenger count - annually.svg |thumb |Industries such as [[cruise line|cruising]] experienced a significant decline—down to levels not seen in thirty years.<ref name=Cruise_202412>{{cite web |title=Growth of the Ocean Cruise Line Industry |url=https://cruisemarketwatch.com/growth/ |publisher=Cruise Market Watch |archive-url=https://web.archive.org/web/20250507151505/https://cruisemarketwatch.com/growth/ |archive-date=7 May 2025 |date=December 2024 |url-status=live}}</ref>]]

      Tourism collapsed due to travel restrictions, closing of public places including travel attractions, and advice of governments against travel. Airlines cancelled flights, while British regional airline [[Flybe (1979–2020)|Flybe]] collapsed.<ref name="z2VrM"/> The cruise line industry was hard hit,<ref name="smh20200227">{{#invoke:Cite|news | vauthors = Turner B |url=https://www.smh.com.au/business/the-economy/most-significant-crisis-in-the-history-of-travel-where-to-now-for-tourism-20200227-p5450j.html |title='Most significant crisis in the history of travel': where to now for tourism? |date=4 April 2020 |work=The Sydney Morning Herald |access-date=5 April 2020}}</ref> and train stations and ferry ports closed.<ref name="wnn7L"/> International mail stopped or was delayed.<ref name="wsj1158868721">{{#invoke:Cite|news |url=https://www.wsj.com/articles/another-coronavirus-business-problem-skyrocketing-cost-of-air-cargo-11588687216 |title=You've Got Mail ... Finally: The Pandemic Is Jamming Up the World's Post |access-date=15 May 2020 |date=5 May 2020 | vauthors = Cherney M, Craymer L |newspaper=The Wall Street Journal }}</ref>

      The retail sector faced reductions in store hours or closures.<ref>{{#invoke:Cite|news |vauthors = Tyko K |title=How COVID permanently changed shopping and restaurants |url=https://www.axios.com/2023/03/17/stores-restaurants-covid-changes |access-date=5 June 2023 |date=17 March 2023}}</ref> Retailers in Europe and Latin America faced traffic declines of 40 per cent. North America and Middle East retailers saw a 50–60 per cent drop.<ref name="20200402aislelabs">{{#invoke:Cite|citation|url=https://www.aislelabs.com/blog/2020/04/02/how-retailers-globally-are-responding-to-coronavirus-updated-frequently/ |title=How Retailers Globally are Responding to Coronavirus by Aislelabs |newspaper=Aislelabs |date=2 April 2020|access-date=3 April 2020}}</ref> Shopping centres faced a 33–43 per cent drop in foot traffic in March compared to February. Mall operators around the world coped by increasing sanitation, installing thermal scanners to check the temperature of shoppers, and cancelling events.<ref name="J6Y6Z"/>

      Hundreds of millions of jobs were lost,<ref name="aljazeera2004271718">{{#invoke:Cite|news |title=Half the world's workers face losing their jobs, says ILO |url=https://www.aljazeera.com/ajimpact/world-workers-face-losing-jobs-ilo-200427171840169.html |publisher=Al Jazeera |date=29 April 2020}}</ref><ref name="20200506csmonitor">{{#invoke:Cite|news | vauthors = Temko N |title=No jobs, so what future? Half the world's workforce on the edge. |url=https://www.csmonitor.com/World/2020/0506/No-jobs-so-what-future-Half-the-world-s-workforce-on-the-edge |access-date=5 June 2023 |work=Christian Science Monitor}}</ref> including more than 40&nbsp;million jobs in the US.<ref name="20200528WaPo">{{#invoke:Cite|news |title=Americans have filed more than 40 million jobless claims in past 10 weeks, as another 2.1 million filed for benefits last week | vauthors = Romm T |url=https://www.washingtonpost.com/business/2020/05/28/unemployment-claims-coronavirus/ |newspaper=The Washington Post |date=28 May 2020}}</ref> According to a report by [[Yelp]], about 60% of US businesses that closed will stay shut permanently.<ref name="vLHxV">{{#invoke:Cite|news | vauthors = Sundaram A |title=Yelp data shows 60% of business closures due to the coronavirus pandemic are now permanent |url=https://www.cnbc.com/2020/09/16/yelp-data-shows-60percent-of-business-closures-due-to-the-coronavirus-pandemic-are-now-permanent.html |access-date=5 June 2023 |work=CNBC |date=16 September 2020 }}</ref> The [[International Labour Organization]] (ILO) reported that the income generated in the first nine months of 2020 from work across the world dropped by 10.7%, or $3.5&nbsp;trillion.<ref name="rd8bm">{{#invoke:Cite|news|url=https://www.reuters.com/article/us-health-coronavirus-ilo/pandemic-slashes-worldwide-income-from-work-by-a-tenth-ilo-idUSKCN26E1SM|title=Pandemic slashes worldwide income from work by a tenth: ILO|access-date=23 September 2020|work=Reuters|date=23 September 2020| vauthors = Nebehay S }}</ref>

      ==== Supply shortages ====
      {{Main|Shortages related to the COVID-19 pandemic}}

      [[File:Ntuc super store, Singapore (49505410793).jpg|thumb|COVID-19 fears led to panic buying of essentials across the world, including toilet paper, instant noodles, bread, rice, vegetables, disinfectant, and rubbing alcohol (picture taken in February 2020).]]
      Pandemic fears led to [[panic buying]], emptying groceries of essentials such as food, toilet paper, and bottled water. Panic buying stemmed from perceived threat, perceived scarcity, fear of the unknown, coping behaviour and social psychological factors (e.g. [[social influence]] and trust).<ref name="cSvA4">{{#invoke:Cite|journal|vauthors=Yuen KF, Wang X, Ma F, Li KX|date=May 2020|title=The Psychological Causes of Panic Buying Following a Health Crisis|journal=International Journal of Environmental Research and Public Health|volume=17|issue=10|page=3513|doi=10.3390/ijerph17103513|pmc=7277661|pmid=32443427|doi-access=free|s2cid=218856048}}</ref>

      Supply [[shortage]]s were due to disruption to factory and logistic operations; shortages were worsened by [[supply chain]] disruptions from factory and port shutdowns, and labour shortages.<ref name="XvcU9"/>

      Shortages continued as managers underestimated the speed of economic recovery after the initial economic crash. The technology industry, in particular, warned of delays from underestimates of [[semiconductor]] demand for vehicles and other products.<ref name="AutoDW-263"/>

      According to WHO Secretary-General Tedros Ghebreyesus, demand for [[personal protective equipment]] (PPE) rose one hundredfold, pushing prices up twentyfold.<ref name="AutoDW-275"/><ref name="AutoDW-276"/> PPE stocks were exhausted everywhere.<ref name="Mycfo"/><ref>{{#invoke:Cite|news | vauthors = Lewis AC |title=The hustlers and scammers behind the pandemic supply chain nightmare |url=https://www.theverge.com/c/23010055/pandemic-ppe-supply-chain-gloves-coronavirus |access-date=5 June 2023 |work=The Verge |date=19 April 2022}}</ref><ref>{{#invoke:Cite|journal | vauthors = Bauchner H, Fontanarosa PB, Livingston EH |title=Conserving Supply of Personal Protective Equipment—A Call for Ideas |journal=JAMA |date=19 May 2020 |volume=323 |issue=19 |page=1911 |doi=10.1001/jama.2020.4770 |pmid=32196543 |s2cid=214600902 |url=https://jamanetwork.com/journals/jama/fullarticle/2763590 |access-date=5 June 2023}}</ref>

      In September 2021, the [[World Bank]] reported that food prices remained generally stable and the supply outlook remained positive. However, the poorest countries witnessed a sharp increase in food prices, reaching the highest level since the pandemic began.<ref>{{#invoke:Cite|news | vauthors = Ventura L |title=Global Finance Magazine – Poorest Countries in the World 2023 |url=https://www.gfmag.com/global-data/economic-data/the-poorest-countries-in-the-world |access-date=5 June 2023 |work=Global Finance Magazine |date=2 May 2023 }}</ref><ref name="auto4">{{#invoke:Cite|journal | vauthors = Anyanwu JC, Salami AO |title=The impact of COVID-19 on African economies: An introduction |journal=African Development Review |date=April 2021 |volume=33 |issue=S1 |pages=S1–S16 |doi=10.1111/1467-8268.12531 |pmid=34149237 |pmc=8207010 }}</ref> The Agricultural Commodity Price Index stabilised in the third quarter but remained 17% higher than in January 2021.<ref>{{#invoke:Cite|web|title=Food Security and COVID-19|url=https://www.worldbank.org/en/topic/agriculture/brief/food-security-and-covid-19|access-date=23 December 2021|website=World Bank}}</ref><ref name="auto4"/>

      By contrast, petroleum products were in surplus at the beginning of the pandemic, as demand for gasoline and other products collapsed due to reduced commuting and other trips.<ref name="BBC, US oil prices, 21 April 2020">{{Cite news |last=Walker |first=Andrew |date=20 April 2020 |title=US oil prices turn negative as demand dries up |url=https://www.bbc.com/news/business-52350082 |access-date=4 November 2025 |publisher=[[BBC]] |language=en-GB}}</ref> The [[2021 global energy crisis]] was driven by a global surge in demand as the world economy recovered. Energy demand was particularly strong in Asia.<ref>{{#invoke:Cite|news |title=Energy crunch: How high will oil prices climb? |url=https://www.aljazeera.com/economy/2021/9/27/energy-crunch-how-high-will-oil-prices-climb |work=Al-Jazeera |date=27 September 2021}}</ref><ref>{{#invoke:Cite|news | vauthors = Smith A |title=Cascade of problems fuels world energy crisis as another winter looms |url=https://www.nbcnews.com/news/world/covid-center-world-energy-crunch-cascade-problems-fuel-rcna2688 |access-date=5 June 2023 |work=NBC News |date=8 October 2021 }}</ref>

      === Arts and cultural heritage ===
      {{Main|Impact of the COVID-19 pandemic on the arts and cultural heritage}}

      The performing arts and [[cultural heritage sector]]s were profoundly affected by the pandemic. Both organisations' and individuals' operations have been impacted globally. By March 2020, across the world and to varying degrees, museums, libraries, performance venues, and other cultural institutions had been indefinitely closed with their exhibitions, events and performances cancelled or postponed.<ref name="v5Qlx">{{#invoke:Cite|web | vauthors = McGivern H, Kenny N |url=https://www.theartnewspaper.com/news/here-are-the-museums-that-have-closed-due-to-coronavirus |title=Here are the museums that have closed (so far) due to coronavirus |website=theartnewspaper.com |date=14 March 2020 |access-date=29 March 2020 |archive-date=29 March 2020 |archive-url=https://web.archive.org/web/20200329062120/https://www.theartnewspaper.com/news/here-are-the-museums-that-have-closed-due-to-coronavirus }}</ref> A 2021 [[UNESCO]] report estimated ten million job losses worldwide in the culture and creative industries.<ref name="Ottone">{{#invoke:Cite|book | vauthors = Ottone E |title=UNESCO The Universal Declaration on Cultural Diversity: Marking the 20th Anniversary |publisher=[[Khalili Foundation]] |year=2021 |isbn=978-1-3999-1149-8 |location=London |pages=13–15 |chapter=Foreword |author-link=Ernesto Ottone}}</ref><ref>{{#invoke:Cite|news |title=UNESCO: 10 million creative jobs lost in Covid crisis |url=https://www.thestage.co.uk/news/unesco-10-million-creative-jobs-lost-in-covid-crisis |access-date=5 June 2023 |work=The Stage }}</ref> Some services continued through digital platforms,<ref name="ZljIY">{{#invoke:Cite|web | url=https://mcn.edu/a-guide-to-virtual-museum-resources/ |title=The Ultimate Guide to Virtual Museum Resources |date=15 March 2020 |website=MCN |access-date=29 March 2020}}</ref><ref name="Burke2020"/><ref name="SxIEK"/> such as live streaming concerts<ref name="SZ5Mc"/> or web-based arts festivals.<ref name="mYlLn"/>

      === Politics ===
      {{Main|Impact of the COVID-19 pandemic on politics}}

      {{See also|Impact of the COVID-19 pandemic on international relations}}
      The pandemic affected political systems, causing suspensions of legislative activities,<ref name="20200313nationalpost">{{#invoke:Cite|news | url=https://nationalpost.com/news/canada/canadian-parliament-suspended-until-april-due-to-coronavirus-crisis |title=Federal government announces aggressive measures to battle COVID-19 as parliament suspended until April | vauthors = Tumilty R |date=13 March 2020 |newspaper=Nationalpost |access-date=30 April 2020}}</ref> isolations or deaths of politicians,<ref name="20200318foreignpolicy">{{#invoke:Cite|web | url=https://foreignpolicy.com/2020/03/18/coronavirus-corridors-power-which-world-leaders-have-covid-19/ |title=Coronavirus in the Corridors of Power | vauthors = Mackinnon A, Palder D | date=18 March 2020 |website=Foreign Policy |access-date=30 April 2020}}</ref> and rescheduled elections.<ref name="20200427nytimes">{{#invoke:Cite|news | vauthors = Corasaniti N, Saul S |url= https://www.nytimes.com/article/2020-campaign-primary-calendar-coronavirus.html |title=15 States Have Postponed Primaries During the Pandemic. One Has Canceled. |date=27 April 2020 |work=[[The New York Times]] |access-date=30 April 2020 |issn=0362-4331}}</ref> Although they developed broad support among epidemiologists, NPIs (non-pharmaceutical interventions) were controversial in many countries. Intellectual opposition came primarily from other fields, along with heterodox epidemiologists.<ref name="74OHE">''The Economist'', 4 April 2020, p. 14.</ref>

      ==== Brazil ====
      The pandemic (and the [[COVID-19 pandemic in Brazil#Responses|response of Brazilian politicians]] to it) led to widespread panic, confusion, and pessimism in Brazil.<ref name="BenderdaSilvaBaum2022">{{#invoke:Cite|journal | vauthors = Sott MK, Bender MS, da Silva Baum K | title=Covid-19 Outbreak in Brazil: Health, Social, Political, and Economic Implications | journal=International Journal of Health Services | publisher=SAGE Publications | volume=52 | issue=4 | date=4 September 2022 | issn=0020-7314 | doi=10.1177/00207314221122658 | pages=442–454| pmid=36062608 | pmc=9445630 }}</ref> When questioned regarding record deaths in the country in April 2020, Brazilian president [[Jair Bolsonaro]] said "So what? I'm sorry. What do you want me to do about it?"<ref name="Conde 2020">{{#invoke:Cite|journal | vauthors = Conde M | title=Brazil in the Time of Coronavirus | journal=Geopolítica(s). Revista de estudios sobre espacio y poder | publisher=Universidad Complutense de Madrid (UCM) | volume=11 | issue=Especial | date=11 May 2020 | issn=2172-7155 | doi=10.5209/geop.69349 | pages=239–249| s2cid=219439973 }}</ref> Bolsonaro disregarded WHO-recommended mitigation techniques and instead [[COVID-19 pandemic in Brazil#Comments by Bolsonaro|downplayed the risks of the virus]], promoted increased economic activity, spread [[COVID-19 pandemic in Brazil#Presidential responses|misinformation]] about the efficacy of masks, vaccines and public health measures, and distributed unproven treatments including [[chloroquine and hydroxychloroquine during the COVID-19 pandemic|hydroxychloroquine]] and [[ivermectin during the COVID-19 pandemic|ivermectin]].<ref name="BenderdaSilvaBaum2022"/> A series of [[list of Ministers of Health of Brazil|federal health ministers]] resigned or were dismissed after they refused to implement Bolsonaro's policies.<ref name="Londono2020">{{#invoke:Cite|news | vauthors = Londoño E |title=Another Health Minister in Brazil Exits Amid Chaotic Coronavirus Response |url= https://www.nytimes.com/2020/05/15/world/americas/brazil-health-minister-bolsonaro.html |access-date=14 June 2023 |work=The New York Times |date=15 May 2020}}</ref>

      Disagreements between federal and state governments led to a chaotic and delayed response to the rapid spread of the virus,<ref name="Dantas2020">{{#invoke:Cite|journal | vauthors = Dantas E | title=Brazilian report on the coronavirus crisis: A clash of pandemics | journal=Medicine and Law | date=2020 | pages=153–160 | url=https://pesquisa.bvsalud.org/global-literature-on-novel-coronavirus-2019-ncov/resource/pt/covidwho-824117 | language=pt | access-date=14 June 2023}}</ref> exacerbated by preexisting social and economic disparities in the country.<ref name="BenderdaSilvaBaum2022"/><ref name="CarnutMendesGuerra2020">{{#invoke:Cite|journal | vauthors = Carnut L, Mendes Á, Guerra L | title=Coronavirus, Capitalism in Crisis and the Perversity of Public Health in Bolsonaro's Brazil | journal=International Journal of Health Services | publisher=SAGE Publications | volume=51 | issue=1 | date=18 October 2020 | issn=0020-7314 | doi=10.1177/0020731420965137 | pages=18–30| pmid=33070682 | s2cid=224782017 }}</ref> Employment, investment and valuation of the [[Brazilian real]] plummeted to record lows.<ref name="BenderdaSilvaBaum2022"/><ref name="ReutersBrazil2020">{{#invoke:Cite|news |title=Brazil stocks post steepest fall since 1998, real hits historic low 5.00 per dollar |url=https://www.reuters.com/article/us-brazil-markets/brazil-stocks-post-steepest-fall-since-1998-real-hits-historic-low-5-00-per-dollar-idUSKBN20Z3J1 |work=Reuters |date=12 March 2020 }}</ref> Brazil was also heavily affected by the Delta and Omicron variants.<ref name="AlcantaraNogueiraShuabTosta2022">{{#invoke:Cite|journal | vauthors = Alcantara LC, Nogueira E, Shuab G, Tosta S, Fristch H, Pimentel V, Souza-Neto JA, Coutinho LL, Fukumasu H, Sampaio SC, Elias MC, Kashima S, Slavov SN, Ciccozzi M, Cella E, Lourenco J, Fonseca V, Giovanetti M | title=SARS-CoV-2 epidemic in Brazil: how the displacement of variants has driven distinct epidemic waves | journal=Virus Research | publisher=Elsevier BV | volume=315 | year=2022 | issn=0168-1702 | doi=10.1016/j.virusres.2022.198785 | article-number=198785| pmid=35461905 | pmc=9022374 }}</ref> At the height of the outbreak in the spring of 2021, 3,000+ Brazilians were dying per day.<ref name="BBCBrazilMarch2021">{{#invoke:Cite|news |title=Covid: Brazil's daily deaths surpass 3,000 for first time |url=https://www.bbc.com/news/world-latin-america-56260570 |access-date=14 June 2023 |work=BBC News |date=24 March 2021}}</ref><ref name="NPRBrazilApril2021">{{#invoke:Cite|news | vauthors = Reeves P |title=Brazil COVID-19: 'Humanitarian Crisis' With More Than 3,000 Deaths A Day |url=https://www.npr.org/2021/04/15/987741403/brazil-covid-19-humanitarian-crisis-with-more-than-3-000-deaths-a-day |access-date=14 June 2023 |work=NPR |date=15 April 2021}}</ref> Bolsonaro's loss to [[Lula da Silva]] in the [[2022 Brazilian general election|2022 presidential election]] is widely credited to the former's [[presidency of Jair Bolsonaro#Response to COVID-19 pandemic|mishandling of the pandemic]].<ref name="ChomskyPolychroniou2023">{{#invoke:Cite|book | vauthors = Chomsky N, Polychroniou CJ | title=Illegitimate Authority | publisher=Haymarket Books | date=9 May 2023 | isbn=978-1-64259-934-3 | page=}}</ref><ref name="EconomistBolsonaroLoss2022">{{#invoke:Cite|news | title=Jair Bolsonaro is poised to lose the Brazilian election | newspaper=The Economist | date=8 September 2022 | url=https://www.economist.com/briefing/2022/09/08/jair-bolsonaro-is-poised-to-lose-the-brazilian-election | access-date=14 June 2023}}</ref><ref name="Milhorance2022October">{{#invoke:Cite|news | vauthors = Milhorance F |title= Bolsonaro, in defeat, may now face charges. |url=https://www.nytimes.com/2022/10/30/world/americas/bolsonaro-charges-lost.html |access-date=14 June 2023 |work=The New York Times |date=30 October 2022}}</ref>

      ==== China ====
      {{Further|China–United States relations#COVID-19}}
      Multiple provincial-level administrators of the [[Chinese Communist Party]] (CCP) were dismissed over their handling of quarantine measures. Some commentators claimed this move was intended to protect CCP General Secretary [[Xi Jinping]].<ref name="vLpPa"/> The [[US intelligence community]] claimed that China intentionally under-reported its COVID-19 caseload.<ref name="20200402nytimes">{{#invoke:Cite|news| vauthors = Barnes J |title=C.I.A. Hunts for Authentic Virus Totals in China, Dismissing Government Tallies |url=https://www.nytimes.com/2020/04/02/us/politics/cia-coronavirus-china.html |work=[[The New York Times]] |date=2 April 2020}}</ref> The Chinese government maintained that it acted swiftly and transparently.<ref name="hMc3w">{{#invoke:Cite|news | url=https://www.bloomberg.com/news/articles/2020-06-07/china-denies-cover-up-rejects-politicization-of-coronavirus?sref=nAHOTXiV |title=China Denies Cover-Up, Rejects 'Politicization' of Coronavirus |access-date=7 June 2020 |newspaper=Bloomberg.com|date=7 June 2020 }}</ref><ref>{{#invoke:Cite|news |title=China says there has never been a cover-up on coronavirus outbreak |url=https://www.reuters.com/article/us-health-coronavirus-china-mofa-idCAKBN21Z0XC |access-date=6 June 2023 |work=Reuters |date=17 April 2020 }}</ref> Journalists and activists in China who reported on the pandemic were detained by authorities,<ref>{{#invoke:Cite|news|date=24 September 2020|title=Chen Qiushi: Chinese journalist missing since February 'under state supervision'|work=BBC News|url=https://www.bbc.com/news/world-asia-china-54277439|access-date=16 February 2021}}</ref><ref>{{#invoke:Cite|news|date=23 April 2020|title=Li Zehua: Journalist who 'disappeared' after Wuhan chase reappears|work=BBC News|url=https://www.bbc.com/news/world-asia-china-52392762|access-date=16 February 2021}}</ref> including [[Zhang Zhan]], who was arrested and tortured.<ref>{{#invoke:Cite|news|date=28 December 2020|title=Zhang Zhan: China jails citizen journalist for Wuhan reports|work=BBC News|url=https://www.bbc.com/news/world-asia-china-55463241|access-date=16 February 2021}}</ref><ref>{{#invoke:Cite|web | date=10 December 2020| vauthors = Davidson H | title = Citizen journalist detained over Wuhan reporting 'restrained and fed by tube' |url= https://www.theguardian.com/world/2020/dec/10/citizen-journalist-detained-over-wuhan-reporting-restrained-and-fed-by-tube|access-date=16 February 2021|website=The Guardian}}</ref>

      ==== Italy ====
      [[File:Palazzo Margherita lit in Italian flag to show solidarity under COVID-19 pandemic.jpg|thumb|right|200px|Palazzo Margherita lit in the Italian flag colours to show solidarity during the COVID-19 pandemic on 26 March 2020]]
      In early March 2020, the Italian government criticised the EU's lack of solidarity with Italy.<ref>{{#invoke:Cite|news | vauthors = Boffey D |title=Italy criticises EU for being slow to help over coronavirus epidemic |url=https://www.theguardian.com/world/2020/mar/11/italy-criticises-eu-being-slow-help-coronavirus-epidemic |access-date=6 June 2023 |work=The Guardian |date=11 March 2020}}</ref><ref>{{#invoke:Cite|news | vauthors = Braw E |title=The EU Is Abandoning Italy in Its Hour of Need |url= https://foreignpolicy.com/2020/03/14/coronavirus-eu-abandoning-italy-china-aid/ |access-date=6 June 2023 |work=Foreign Policy |date=14 March 2020}}</ref><ref name="politico-corona">{{#invoke:Cite|news | vauthors = Karnitschnig M |title=China is winning the coronavirus propaganda war |url=https://www.politico.eu/article/coronavirus-china-winning-propaganda-war/ |work=Politico |date=18 March 2020}}</ref> On 22 March 2020, after a phone call with Italian Prime Minister [[Giuseppe Conte]], Russian president [[Vladimir Putin]] ordered the [[Russian Armed Forces|Russian army]] to send military medics, disinfection vehicles, and other medical equipment to Italy.<ref name="reuters219081">{{#invoke:Cite|news |title=Russian army to send coronavirus help to Italy after Putin phone call |url=https://www.reuters.com/article/us-health-coronavirus-russia-italy/russian-army-to-send-coronavirus-help-to-italy-after-putin-phone-call-idUSKBN219081 |work=Reuters |date=22 March 2020}}</ref><ref name="20200328insideover">{{#invoke:Cite|news | vauthors = Vivaldelli R |title=Quelle polemiche infondate sugli aiuti russi all'Italia |url=https://it.insideover.com/politica/quelle-polemiche-infondate-sugli-aiuti-russi-allitalia.html |work={{Lang|it|[[Il Giornale]]}} |date=28 March 2020}}</ref> In early April, Norway and EU states like Romania and Austria started to offer help by sending medical personnel and disinfectant,<ref name="eumedicalteams">{{#invoke:Cite|news |title=Coronavirus: EU Medical Teams deployed to Italy |url=https://ec.europa.eu/commission/presscorner/detail/en/IP_20_613 |publisher=Europa (web portal) |date=1 July 2020}}</ref> and [[European Commission]] president [[Ursula von der Leyen]] offered an official apology to the country.<ref name="euapology">{{#invoke:Cite|news |title=EU offers 'heartfelt apology' to Italy over coronavirus response |url=https://www.theguardian.com/world/2020/apr/16/eu-offers-heartfelt-apology-italy-coronavirus-response-herd-immunity |work=[[The Guardian]] |date=1 July 2020}}</ref>

      ==== United States ====
      [[File:Open Ohio Rally IMG 0910 (49799974031).jpg|thumb|Anti-lockdown [[protests over responses to the COVID-19 pandemic|protesters]] rallied at the [[Ohio Statehouse]] 20 April 2020.<ref name="Columbus Dispatch">{{#invoke:Cite|news |vauthors=Rouan R |title=Protesters at Statehouse demand state reopen as DeWine announces schools to remain closed |url=https://www.dispatch.com/news/20200420/protesters-at-statehouse-demand-state-reopen-as-dewine-announces-schools-to-remain-closed |access-date=3 May 2020 |work=[[The Columbus Dispatch]] |date=20 April 2020 |archive-date=25 April 2020 |archive-url=https://web.archive.org/web/20200425004821/https://www.dispatch.com/news/20200420/protesters-at-statehouse-demand-state-reopen-as-dewine-announces-schools-to-remain-closed }}</ref>]]

      Beginning in mid-April 2020, protestors objected to government-imposed business closures and restrictions on personal movement and assembly.<ref name="5YqAF">{{Cite news |title=Anti-lockdown protests grow across US |url=https://www.bbc.com/news/world-us-canada-52330531 |archive-url=https://web.archive.org/web/20200417172715/https://www.bbc.com/news/world-us-canada-52330531 |archive-date=17 April 2020 |access-date=4 November 2025 |work=[[BBC News]] |language=en-GB}}</ref> Simultaneously, [[essential workers]] protested unsafe conditions and low wages by participating in a brief [[general strike]].<ref name="c114M">{{#invoke:Cite|web | vauthors = Russ H |title=Instacart, Amazon workers strike as labor unrest grows during coronavirus crisis |url=https://www.reuters.com/article/us-health-coronavirus-usa-instacart-idUSKBN21H3AV |work=Reuters |access-date=24 July 2020 |date=30 March 2020}}</ref> Some political analysts claimed that the pandemic contributed to US president [[Donald Trump]]'s [[2020 United States presidential election|2020]] defeat.<ref name="TrumpChances">{{#invoke:Cite|news | vauthors = Haberman M, Martin M, Jonathan |url=https://www.nytimes.com/2020/03/12/us/politics/trump-vs-biden.html |title=Trump's Re-election Chances Suddenly Look Shakier |date=12 March 2020 |work=[[The New York Times]] |access-date=15 March 2020 |issn=0362-4331}}</ref><ref name="AtlanticChances">{{#invoke:Cite|news | vauthors = Lowrey A |title=The Economy Is Collapsing. So Are Trump's Reelection Chances. |url=https://www.theatlantic.com/ideas/archive/2020/04/most-important-number-trumps-re-election-chances/609376/ |access-date=3 May 2020 |work=The Atlantic |date=3 April 2020}}</ref>

      The [[COVID-19 pandemic in the United States]] prompted calls for the United States to adopt social policies common in other wealthy countries, including [[universal health care]], [[universal child care]], [[paid sick leave]], and higher levels of funding for public health.<ref name="NYT Calls">{{#invoke:Cite|news | vauthors = Miller CC |title=Could the Pandemic Wind Up Fixing What's Broken About Work in America? |url=https://www.nytimes.com/2020/04/10/upshot/coronavirus-future-work-america.html |access-date=3 May 2020 |work=[[The New York Times]] |date=10 April 2020}}</ref><ref name="Hill5">{{#invoke:Cite|news | vauthors = Swanson I |title=Five ways the coronavirus could change American politics |url=https://thehill.com/homenews/campaign/495761-five-ways-the-coronavirus-could-change-american-politics |access-date=3 May 2020 |work=The Hill |date=2 May 2020}}</ref><ref name="Ddn2P">{{#invoke:Cite|web | vauthors = Cohen M | url=https://www.bostonglobe.com/2020/03/13/opinion/americas-botched-response-coronavirus-is-problem-bigger-than-donald-trump/ |title=America's botched response to the coronavirus is a problem bigger than Donald Trump |website=[[The Boston Globe]]}}</ref> The [[Kaiser Family Foundation]] estimated that preventable hospitalisations of unvaccinated Americans in the second half of 2021 cost US$13.8&nbsp;billion.<ref name="Amin">{{#invoke:Cite|news | vauthors = Amin K, Cox C |title=Unvaccinated COVID-19 hospitalizations cost billions of dollars |journal=Peterson-KFF Health System Tracker |date=22 December 2021 |url=https://www.healthsystemtracker.org/brief/unvaccinated-covid-patients-cost-the-u-s-health-system-billions-of-dollars/#Preventable%20COVID-related%20hospitalization%20costs%20for%20unvaccinated%20adults%20in%20the%20U.S.,%20June-November%202021 |access-date=3 May 2022}}</ref>

      There were also protest in regards to vaccine mandates in the United States.<ref>{{#invoke:Cite|news | vauthors = Hughes T |title=As Biden vaccine mandates loom, protests for personal freedoms swell. What happens next? |url=https://www.usatoday.com/story/news/nation/2021/10/29/biden-vaccine-mandates-loom-protests-personal-freedoms-swell/8539853002/ |access-date=6 June 2023 |work=USA TODAY}}</ref> In January 2022, the US Supreme Court struck down an OSHA rule that mandated vaccination or a testing regimen for all companies with greater than 100 employees.<ref>{{#invoke:Cite|news | vauthors = Kimball S |title=Biden administration withdraws Covid vaccine mandate for businesses after losing Supreme Court case |url=https://www.cnbc.com/2022/01/25/covid-vaccine-mandate-osha-withdraws-rule-for-businesses-after-losing-supreme-court-case.html |access-date=6 June 2023 |work=CNBC |date=25 January 2022 }}</ref><ref>{{#invoke:Cite|news |title=National Federation of Independent Business v. Department of Labor, Occupational Safety and Health Administration |url=https://www.scotusblog.com/case-files/cases/national-federation-of-independent-business-v-osha/ |access-date=6 June 2023 |work=SCOTUSblog}}</ref>

      ==== Other countries ====
      The number of journalists imprisoned or detained increased worldwide; some detentions were related to the pandemic.<ref>{{#invoke:Cite|news|author=<!-- Staff writer(s); no by-line. -->|date=15 December 2020|title=Record number of journalists imprisoned in 2020 – report|work=Reuters|url=https://www.reuters.com/article/uk-global-rights-journalists-idUKKBN28P0DO|access-date=16 February 2021}}</ref><ref>{{#invoke:Cite|web|date=14 December 2020| vauthors = Berry A |title=Press freedom: Journalists end up in jail for reporting on coronavirus crisis|url=https://www.dw.com/en/press-freedom-journalists-end-up-in-jail-for-reporting-on-coronavirus-crisis/a-55929247|access-date=16 February 2021|publisher=Deutsche Welle}}</ref> The planned [[NATO]] "[[list of NATO exercises#2020|Defender 2020]]" military exercise in Germany, [[Poland]] and the [[Baltic states]], the largest NATO war exercise since the end of the [[Cold War]], was held on a reduced scale.<ref name="20200320spectator">{{#invoke:Cite|news| vauthors = Simes D |title=How coronavirus derailed the largest Nato exercise in 25 years |url=https://www.spectator.co.uk/article/how-coronavirus-derailed-the-largest-nato-exercise-in-25-years |work=The Spectator |date=20 March 2020}}</ref><ref name="20200319reuters">{{#invoke:Cite|news | vauthors = Emmott R |title=NATO scales down exercises due to coronavirus |url=https://www.reuters.com/article/us-health-coronavirus-nato/nato-scales-down-exercises-due-to-coronavirus-idUSKBN21627V |access-date=21 October 2020 |work=Reuters |date=19 March 2020}}</ref>

      The Iranian government was heavily affected by the virus, which infected some two dozen parliament members and political figures.<ref name="D2Xpc"/><ref>{{#invoke:Cite|news | vauthors = Berman I |title=Will Iran's Regime Survive Coronavirus? |url=https://www.nationalreview.com/2020/03/will-irans-regime-survive-coronavirus/ |access-date=7 June 2023 |work=National Review |date=12 March 2020}}</ref> Iranian president [[Hassan Rouhani]] wrote a public letter to world leaders asking for help on 14 March 2020, due to a lack of access to international markets.<ref name="u2rRX"/> Saudi Arabia, which had launched a [[Saudi Arabian-led intervention in Yemen|military intervention in Yemen]] in March 2015, declared a ceasefire.<ref name="20200409foreignpolicy">{{#invoke:Cite|news | vauthors = Haverty D, Gramer R, Detsch J |title=Coronavirus Pandemic Forces a Cease-Fire in Yemen |url=https://foreignpolicy.com/2020/04/09/coronavirus-pandemic-forces-cease-fire-yemen-humanitarian-crisis-saudi-arabia-houthis/ |access-date=21 October 2020 |work=Foreign Policy |date=9 April 2020}}</ref>

      Diplomatic relations between [[Japan–South Korea relations|Japan and South Korea]] worsened.<ref>{{#invoke:Cite|news | vauthors = Sposato W |title=Japan and Korea Won't Let A Pandemic Stop Them Fighting |url=https://foreignpolicy.com/2020/03/12/japan-and-korea-wont-let-a-pandemic-stop-them-fighting/ |access-date=7 June 2023 |work=Foreign Policy |date=12 March 2020}}</ref> South Korea criticised Japan's "ambiguous and passive quarantine efforts" after Japan announced travellers from South Korea must quarantine for two weeks.<ref name="HnqN4"/> South Korean society was initially polarised on president [[Moon Jae-in]]'s response to the crisis; many Koreans signed petitions calling for Moon's [[impeachment]] or praising his response.<ref name="imx38"/>

      Some countries passed emergency legislation. Some commentators expressed concern that it could allow governments to strengthen their grip on power.<ref name="20200331theguardian">{{#invoke:Cite|web | vauthors = Walker S |url= https://www.theguardian.com/world/2020/mar/31/coronavirus-is-a-chance-for-authoritarian-leaders-to-tighten-their-grip |title=Authoritarian leaders may use Covid-19 crisis to tighten their grip |website=The Guardian |date=31 March 2020}}</ref><ref name="20200330nytimes">{{#invoke:Cite|news |url=https://www.nytimes.com/2020/03/30/world/europe/coronavirus-governments-power.html | vauthors = Gebrekidam S |title= For Autocrats, and Others, Coronavirus Is a Chance to Grab Even More Power |work=[[The New York Times]] |date=30 March 2020}}</ref> In Hungary, the parliament voted to allow Prime Minister [[Viktor Orbán]] to rule by decree indefinitely, suspend parliament and elections, and punish those deemed to have spread false information.<ref name="20200330cnn">{{#invoke:Cite|web | url=https://edition.cnn.com/2020/03/30/europe/hungary-viktor-orban-powers-vote-intl/index.html | vauthors = Picheta R |title=Hungarian parliament votes to let Viktor Orban rule by decree in wake of coronavirus pandemic |publisher=CNN |date=30 March 2020}}</ref> In countries such as [[Egypt]],<ref name="dw53009293">{{#invoke:Cite|news | vauthors = Michaelson R |title=Reporting on the coronavirus: Egypt muzzles critical journalists |url=https://www.dw.com/en/reporting-on-the-coronavirus-egypt-muzzles-critical-journalists/a-53009293 |publisher=Deutsche Welle |date=3 April 2020}}</ref> [[Turkey]],<ref name="20200401foreignpolicy">{{#invoke:Cite|news | vauthors =  Mchangama J |title=Coronavirus Has Started a Censorship Pandemic |url=https://foreignpolicy.com/2020/04/01/coronavirus-censorship-pandemic-disinformation-fake-news-speech-freedom/ |work=The Foreign Policy |date=1 April 2020}}</ref> and [[Thailand]],<ref>{{#invoke:Cite|news | vauthors = Peck G |title=Some leaders use pandemic to sharpen tools against critics |url=https://www.seattletimes.com/nation-world/coronavirus-crisis-provides-excuses-for-curbs-on-free-speech/ |access-date=7 June 2023 |work=The Seattle Times |date=16 April 2020}}</ref> opposition activists and government critics were [[misinformation related to the COVID-19 pandemic#Efforts to combat misinformation|arrested]] for allegedly spreading [[fake news]].<ref name="20200410straitstimes">{{#invoke:Cite|news |title=Asia cracks down on coronavirus 'fake news' |url=https://www.straitstimes.com/asia/coronavirus-asia-cracks-down-on-virus-fake-news |work=The Straits Times |date=10 April 2020}}</ref> In [[COVID-19 pandemic in India|India]], journalists criticising the government's response were arrested or issued warnings by police and authorities.<ref>{{#invoke:Cite|web | date=4 October 2020| vauthors = Bagri N |title=As COVID-19 spreads, India tries to control the narrative by targeting journalists|url=https://www.latimes.com/world-nation/story/2020-10-04/india-targets-journalists-who-report-on-covid-19|access-date=16 February 2021|website=Los Angeles Times}}</ref>

      === Food systems ===
      {{Further|Food security during the COVID-19 pandemic}}
      The pandemic disrupted food systems worldwide,<ref name=":9b">{{#invoke:Cite|web | title=Q&A: COVID-19 pandemic – impact on food and agriculture|url=https://www.fao.org/2019-ncov/q-and-a/impact-on-food-and-agriculture/en/|access-date=16 October 2020|website=Food and Agriculture Organization of the United Nations}}</ref><ref>{{#invoke:Cite|journal | vauthors = Pryor S, Dietz W |title=The COVID-19, Obesity, and Food Insecurity Syndemic |journal=Current Obesity Reports |date=1 September 2022 |volume=11 |issue=3 |pages=70–79 |doi=10.1007/s13679-021-00462-w |pmid=35138590 |pmc=9399358 |issn=2162-4968}}</ref> hitting at a time when hunger and undernourishment were rising- an estimated 690&nbsp;million people lacked food security in 2019.<ref name=":10">{{#invoke:Cite|book |title=The State of Food Security and Nutrition in the World 2020 |url=https://www.fao.org/publications/sofi/2020/en/|access-date=16 October 2020|year=2020|doi=10.4060/CA9692EN|isbn=978-92-5-132901-6 | author = FAO|author-link=Food and Agriculture Organization|author2=IFAD|author2-link=International Fund for Agricultural Development|author3=UNICEF|author3-link=UNICEF|author4=WFP|author4-link=World Food Programme|author5=WHO|author5-link=World Health Organization|s2cid=239729231}}</ref> Food access fell – driven by falling incomes, lost remittances, and disruptions to food production.<ref>{{#invoke:Cite|journal | vauthors = Swinnen J, Vos R |title=COVID-19 and impacts on global food systems and household welfare: Introduction to a special issue |journal=Agricultural Economics |date=May 2021 |volume=52 |issue=3 |pages=365–374 |doi=10.1111/agec.12623 |pmid=34149127 |pmc=8206861 |issn=0169-5150}}</ref> In some cases, food prices rose.<ref name=":9b"/><ref name=":10"/> The pandemic and its accompanying lockdowns and travel restrictions slowed movement of food aid. According to the WHO, 811 million people were undernourished in 2020, "likely related to the fallout of COVID-19".<ref>{{#invoke:Cite|web |title=UN report: Pandemic year marked by spike in world hunger |url=https://www.who.int/news/item/12-07-2021-un-report-pandemic-year-marked-by-spike-in-world-hunger |website=who.int |access-date=14 December 2021 }}</ref><ref name="Effect of COVID-19 on food security"/>

      === Education ===
      {{Main|Impact of the COVID-19 pandemic on education}}

      [[File:امتحانات نهایی در شرایط کرونا 3470479.jpg|thumb|Students take end-of-year exams in [[Tabriz]], Iran, during the pandemic.]]
      The pandemic impacted educational systems in many countries. Many governments temporarily closed educational institutions, often replaced by [[online education]]. Other countries, such as Sweden, kept their schools open. As of September 2020, approximately 1.077&nbsp;billion [[learning|learner]]s were affected due to school closures. School closures impacted students, teachers, and families with far-reaching economic and societal consequences.<ref>{{#invoke:Cite|journal | vauthors = Hoffman JA, Miller EA | title = Addressing the Consequences of School Closure Due to COVID-19 on Children's Physical and Mental Well-Being | journal = World Medical & Health Policy | volume = 12 | issue = 3 | pages = 300–310 | date = August 2020 | pmid = 32904951 | pmc = 7461306 | doi = 10.1002/wmh3.365 }}</ref> They shed light on social and economic issues, including [[student debt]], [[digital learning]], food insecurity, and [[homelessness]], as well as access to [[child care|childcare]], health care, housing, internet, and [[disability rights movement|disability service]]s. The impact was more severe for disadvantaged children.<ref>{{#invoke:Cite|web|url=https://comunicacion.senado.gob.mx/index.php/informacion/boletines/50929-covid-afecta-salud-educacion-y-entorno-familiar-de-ninas-y-ninos-senala-estudio-del-ibd.html|title=COVID afecta salud, educación y entorno familiar de niñas y niños, señala estudio del IBD|work=Senado de la República|date=1 May 2021|access-date=25 July 2021|language=es|archive-date=6 December 2021|archive-url=https://web.archive.org/web/20211206184055/http://comunicacion.senado.gob.mx/index.php/informacion/boletines/50929-covid-afecta-salud-educacion-y-entorno-familiar-de-ninas-y-ninos-senala-estudio-del-ibd.html}}</ref> Many countries, including Bangladesh, granted auto promotion to the public examination candidates.<ref>{{Cite news |date=12 February 2021 |title=Students share their concerns over HSC auto-pass results |url=https://www.thedailystar.net/star-youth/news/students-share-their-concerns-over-hsc-auto-pass-results-2043449 |archive-url=https://web.archive.org/web/20230525053655/https://www.thedailystar.net/star-youth/news/students-share-their-concerns-over-hsc-auto-pass-results-2043449 |archive-date=25 May 2023 |access-date=15 June 2025 |work=The Daily Star |language=en |url-status=live }}</ref> The Higher Education Policy Institute reported that around 63% of students claimed worsened mental health as a result of the pandemic.<ref>{{#invoke:Cite|news|date=31 March 2021|title=Covid: Many students say their mental health is worse due to pandemic|work=BBC News|url=https://www.bbc.com/news/education-56570061|access-date=6 April 2021}}</ref>

      === Health ===
      {{Main|Impact of the COVID-19 pandemic on other health issues|Mental health during the COVID-19 pandemic}}

      The pandemic impacted global health for many conditions. Hospital visits fell.<ref>{{#invoke:Cite|journal | vauthors= Yu S, Wan R, Bai L, Zhao B, Jiang Q, Jiang J, Li Y |title=Transformation of chronic disease management: Before and after the COVID-19 outbreak |journal=Frontiers in Public Health |date=29 March 2023 |volume=11 | article-number= 1074364 |doi=10.3389/fpubh.2023.1074364 |pmid=37064686 |pmc=10090362 |doi-access=free | bibcode= 2023FrPH...1174364Y }}</ref> Visits for heart attack symptoms declined by 38% in the US and 40% in Spain.<ref>{{#invoke:Cite|journal | vauthors = Garcia S, Albaghdadi MS, Meraj PM, Schmidt C, Garberich R, Jaffer FA, Dixon S, Rade JJ, Tannenbaum M, Chambers J, Huang PP, Henry TD | title = Reduction in ST-Segment Elevation Cardiac Catheterization Laboratory Activations in the United States During COVID-19 Pandemic | journal = Journal of the American College of Cardiology | volume = 75 | issue = 22 | pages = 2871–2872 | date = June 2020 | pmid = 32283124 | pmc = 7151384 | doi = 10.1016/j.jacc.2020.04.011 }}</ref> The head of cardiology at the [[University of Arizona]] said, "My worry is some of these people are dying at home because they're too scared to go to the hospital".<ref name="Stat News, with serious heart symptoms away, April 23">{{Cite web |last=McFarling |first=Usha Lee |date=23 April 2020 |title='Where are all our patients?': Covid phobia is keeping people with serious heart symptoms away from ERs |url=https://www.statnews.com/2020/04/23/coronavirus-phobia-keeping-heart-patients-away-from-er/ |access-date=4 November 2025 |website=[[Stat News]] |language=en-US}}</ref> People with strokes and [[appendicitis]] were less likely to seek treatment.<ref>{{#invoke:Cite|journal | vauthors = Dula AN, Gealogo Brown G, Aggarwal A, Clark KL |title=Decrease in Stroke Diagnoses During the COVID-19 Pandemic: Where Did All Our Stroke Patients Go? |journal=JMIR Aging |date=21 October 2020 |volume=3 |issue=2 |article-number=e21608 |doi=10.2196/21608 |pmid=33006936 |pmc=7581311 |doi-access=free}}</ref><ref>{{#invoke:Cite|journal | vauthors = Orthopoulos G, Santone E, Izzo F, Tirabassi M, Pérez-Caraballo AM, Corriveau N, Jabbour N |title=Increasing incidence of complicated appendicitis during COVID-19 pandemic |journal=The American Journal of Surgery |date=1 May 2021 |volume=221 |issue=5 |pages=1056–1060 |doi=10.1016/j.amjsurg.2020.09.026 |pmid=33012500 |pmc=7521886 |issn=0002-9610}}</ref><ref name="Stat News, with serious heart symptoms away, April 23"/> [[Shortages related to the COVID-19 pandemic|Medical supply shortage]]s impacted many people.<ref name="Atlantic Shortages">{{#invoke:Cite|news | vauthors = Faust JS |title=Medication Shortages Are the Next Crisis |url=https://www.theatlantic.com/ideas/archive/2020/04/medication-shortages-are-next-crisis/610798/ |access-date=17 May 2020 |work=The Atlantic |date=28 April 2020}}</ref> The pandemic impacted [[mental health]],<ref>{{#invoke:Cite|web|title=Coronavirus Disease 2019 (COVID-19)|url=https://www.cdc.gov/coronavirus/2019-ncov/daily-life-coping/managing-stress-anxiety.html|date=11 February 2020|website=Centers for Disease Control and Prevention|access-date=17 May 2020}}</ref><ref name="Stix_2021">{{#invoke:Cite|web| vauthors = Stix G |title=Pandemic Year 1 Saw a Dramatic Global Rise in Anxiety and Depression|url=https://www.scientificamerican.com/article/pandemic-year-1-saw-a-dramatic-global-rise-in-anxiety-and-depression/|access-date=10 October 2021|website=Scientific American}}</ref> increasing [[anxiety]], depression, and [[post-traumatic stress disorder]], affecting healthcare workers, patients and quarantined individuals.<ref>{{#invoke:Cite|journal | vauthors = Luo Y, Chua CR, Xiong Z, Ho RC, Ho CS | title = A Systematic Review of the Impact of Viral Respiratory Epidemics on Mental Health: An Implication on the Coronavirus Disease 2019 Pandemic | journal = Frontiers in Psychiatry | volume = 11 | article-number = 565098 | date = 23 November 2020 | pmid = 33329106 | pmc = 7719673 | doi = 10.3389/fpsyt.2020.565098 | doi-access = free }}</ref><ref name="Santomauro_2021">{{#invoke:Cite|journal | vauthors = Santomauro DF, Herrera AM, Shadid J, Zheng P, Ashbaugh C, Pigott DM, Abbafati C, Adolph C, Amlag JO, Aravkin AY, Bang-Jensen BL |date=8 October 2021|title=Global prevalence and burden of depressive and anxiety disorders in 204 countries and territories in 2020 due to the COVID-19 pandemic |journal=The Lancet | volume = 398 | issue = 10312 | pages = 1700–1712 |doi=10.1016/S0140-6736(21)02143-7 | pmid = 34634250 | pmc = 8500697 | s2cid = 238478261 }}</ref>

      In late 2022, during the first northern hemisphere autumn and winter seasons following the widespread relaxation of global public health measures, North America and Europe experienced a surge in respiratory viruses and coinfections in both adults and children.<ref>{{#invoke:Cite|journal | vauthors = Principi N, Autore G, Ramundo G, Esposito S |title=Epidemiology of Respiratory Infections during the COVID-19 Pandemic |journal=Viruses |date=13 May 2023 |volume=15 |issue=5 |page=1160 |doi=10.3390/v15051160 |pmid=37243246 |pmc=10224029 |issn=1999-4915 |doi-access=free }}</ref> This formed the beginning of the 2022–2023 paediatric care crisis and what some experts termed a "[[tripledemic]]" of seasonal influenza, [[respiratory syncytial virus]] (RSV), and SARS-CoV-2 throughout North America.<ref>{{#invoke:Cite|news | vauthors = Wu K |title=The Worst Pediatric-Care Crisis in Decades |url= https://www.theatlantic.com/health/archive/2022/10/rise-of-rsv-flu-covid-infections-kids/671947/ |access-date=1 November 2022 |publisher=The Atlantic |date=31 October 2022 |archive-url=https://web.archive.org/web/20221031233050/https://www.theatlantic.com/health/archive/2022/10/rise-of-rsv-flu-covid-infections-kids/671947/ |archive-date=31 October 2022}}</ref><ref>{{#invoke:Cite|news | vauthors = Mandavilli A |title=A 'Tripledemic'? Flu, R.S.V. and Covid May Collide This Winter, Experts Say |url=https://www.nytimes.com/2022/10/23/health/flu-covid-risk.html |access-date=5 November 2022 |work=[[The New York Times]] |date=23 October 2022 |archive-url=https://web.archive.org/web/20221028223843/https://www.nytimes.com/2022/10/23/health/flu-covid-risk.html |archive-date=28 October 2022}}</ref> In the United Kingdom, paediatric infections also began to spike beyond pre-pandemic levels, albeit with different illnesses, such as [[Group A streptococcal infection]] and resultant [[scarlet fever]].<ref>{{#invoke:Cite|journal | vauthors = Turner CE |title=Can group A streptococcus infections be influenced by viruses in the respiratory tract? |journal=The Lancet Infectious Diseases |date=February 2023 |volume=23 |issue=2 |pages=142–144 |doi=10.1016/S1473-3099(22)00865-9 |pmid=36566769 |s2cid=255018859 |url=https://www.thelancet.com/journals/laninf/article/PIIS1473-3099(22)00865-9/fulltext |access-date=9 June 2023}}</ref><ref name="United Kingdom">{{#invoke:Cite|news | vauthors = Mackintosh T, Durbin A |title=Father of girl, 4, fighting for life with Strep A infection is 'praying for a miracle' |url=https://www.bbc.com/news/health-63844880 |access-date=4 December 2022 |publisher=BBC News |date=3 December 2022 |archive-url=https://web.archive.org/web/20221203125723/https://www.bbc.com/news/health-63844880 |archive-date=3 December 2022}}</ref> As of mid-December 2022, 19 children in the UK had died due to [[Streptococcus pyogenes|Strep A]] and the wave of infections had begun to spread into North America and Mainland Europe.<ref name="Strep A death">{{#invoke:Cite|news | vauthors = Davis N |title=Strep A kills three more children as UK activates alternative medicines plan: At least 19 children have died and scarlet fever cases are more than treble what they were in previous high season |url=https://www.theguardian.com/society/2022/dec/15/strep-a-kills-three-more-children-as-uk-activates-new-medicines-plan|access-date=17 December 2022 |newspaper=The Guardian |date=15 December 2022 |archive-url=https://web.archive.org/web/20221217040228/https://www.theguardian.com/society/2022/dec/15/strep-a-kills-three-more-children-as-uk-activates-new-medicines-plan |archive-date=17 December 2022}}</ref><ref name="Strep Expansion">{{#invoke:Cite|news | vauthors = Wetsman N, McLean N |title=US children's hospitals are tracking increases in severe strep infections |url=https://abcnews.go.com/Health/us-childrens-hospitals-tracking-increases-severe-strep-infections/story?id=95388618 |access-date=17 December 2022 |publisher=ABC News |date=16 December 2022 |archive-url=https://web.archive.org/web/20221217100006/https://abcnews.go.com/Health/us-childrens-hospitals-tracking-increases-severe-strep-infections/story?id=95388618 |archive-date=17 December 2022}}</ref>

      The B/Yamagata lineage of [[influenza B]] might have become extinct in 2020/2021 due to COVID-19 pandemic measures.<ref name="Alhoufie2021">{{#invoke:Cite|journal | vauthors = Alhoufie ST, Alsharif NH, Alfarouk KO, Ibrahim NA, Kheyami AM, Aljifri AA |title=COVID-19 with underdiagnosed influenza B and parainfluenza-2 co-infections in Saudi Arabia: Two case reports |journal=Journal of Infection and Public Health |date=November 2021 |volume=14 |issue=11 |pages=1567–1570 |pmid=34627054 |doi=10.1016/j.jiph.2021.09.005|pmc=8442300 }}</ref><ref name="Koutsakos2021">{{#invoke:Cite|journal | vauthors = Koutsakos M, Wheatley AK, Laurie K, Kent SJ, Rockman S |title=Influenza lineage extinction during the COVID-19 pandemic? |journal=Nature Reviews Microbiology |date=December 2021 |volume=19 |issue=12 |pages=741–742 |pmid=34584246 |doi=10.1038/s41579-021-00642-4 | pmc=8477979 }}</ref> There have been no naturally occurring cases confirmed since March 2020.<ref name="WHOflu2023"/><ref name="UMN2023"/> In 2023, the WHO concluded that protection against the Yamagata lineage was no longer necessary in the seasonal [[flu vaccine]], reducing the number of lineages targeted by the vaccine from four to three.<ref name="WHOflu2023">{{#invoke:Cite|web | title= Questions and Answers: Recommended composition of influenza virus vaccines for use in the southern hemisphere 2024 influenza season and development of candidate vaccine viruses for pandemic preparedness | author = [[World Health Organization]] | url=https://cdn.who.int/media/docs/default-source/influenza/who-influenza-recommendations/vcm-southern-hemisphere-recommendation-2024/202309_qanda_recommendation.pdf?sfvrsn=7a6906d1_5 | date=29 September 2023 | access-date=26 October 2023}}</ref><ref name="UMN2023">{{#invoke:Cite|web | title=WHO advisers recommend switch back to trivalent flu vaccines | author = Schnirring L | website=CIDRAP | date=29 September 2023 | url=https://www.cidrap.umn.edu/influenza-vaccines/who-advisers-recommend-switch-back-trivalent-flu-vaccines | access-date=26 October 2023}}</ref>

      Preventative measures taken during the COVID-19 pandemic may have impacted the number of [[bronchiolitis]] cases, with observed decreases in cases during the pandemic followed by an increase when preventative measures were rolled back.<ref name="Sabeena">{{Cite journal |last1=Sabeena |first1=Sasidharanpillai |last2=Ravishankar |first2=Nagaraja |last3=Robin |first3=Sudandiradas |last4=Pillai |first4=SabithaSasidharan |date=2023 |title=The impact of coronavirus disease 2019 pandemic on bronchiolitis (lower respiratory tract infection) due to respiratory syncytial virus: A systematic review and meta-analysis |journal=Indian Journal of Public Health |language=en |volume=67 |issue=2 |pages=284–291 |doi=10.4103/ijph.ijph_1334_22 |doi-access=free |pmid=37459026 |issn=0019-557X}}</ref><ref name="Hogan2025">{{cite journal |last1=Hogan |first1=Alexander H. |last2=Adams |first2=Aaron |last3=Brugge |first3=Doug |last4=Beck |first4=Andrew F. |last5=Ghosh |first5=Debarchana |title=Mapping Bronchiolitis in Connecticut Before and After the COVID-19 Pandemic |journal=Pediatric Pulmonology |date=28 December 2025 |volume=61 |issue=1 |article-number=e71450 |doi=10.1002/ppul.71450 |pmid=41457645 |url=https://doi.org/10.1002/ppul.71450 |access-date=12 January 2026|url-access=subscription }}</ref>

      === Environment ===
      {{Main|Impact of the COVID-19 pandemic on the environment}}

      [[File:Pollutant Drops in wuhan china due to virus.png|thumb|upright=1.5|Images from the [[NASA Earth Observatory]] show a stark drop in pollution in [[Wuhan]], when comparing [[nitrogen dioxide|NO<sub>2</sub>]] levels in early 2019 (top) and early 2020 (bottom).<ref>{{#invoke:Cite|web |url=https://earthobservatory.nasa.gov/images/146362/airborne-nitrogen-dioxide-plummets-over-china |title=Earth Observatory |date=28 February 2020 |access-date=9 April 2020 |archive-url=https://web.archive.org/web/20200402162640/https://earthobservatory.nasa.gov/images/146362/airborne-nitrogen-dioxide-plummets-over-china |archive-date=2 April 2020 |url-status=live }}</ref>]]
      The pandemic and the reaction to it positively affected the [[natural environment|environment]] and [[climate]] as a result of reduced human activity. During the "[[anthropause]]", fossil fuel use decreased, resource consumption declined, and waste disposal improved, generating less pollution.<ref name=":9">{{#invoke:Cite|journal | vauthors = Rume T, Islam SM | title = Environmental effects of COVID-19 pandemic and potential strategies of sustainability | journal = Heliyon | volume = 6 | issue = 9 | article-number = e04965 | date = September 2020 | pmid = 32964165 | pmc = 7498239 | doi = 10.1016/j.heliyon.2020.e04965 | doi-access = free | bibcode = 2020Heliy...604965R }}</ref> [[Economic impact of the COVID-19 pandemic#Transportation|Planned air travel]] and vehicle transportation declined. In China, [[COVID-19 lockdown in Hubei|lockdown]]s and other measures resulted in a 26% decrease in coal consumption, and a 50% reduction in nitrogen oxides emissions.<ref name=":9"/><ref>{{#invoke:Cite|journal | vauthors = Hotle S, Mumbower S |title=The impact of COVID-19 on domestic U.S. air travel operations and commercial airport service |journal=Transportation Research Interdisciplinary Perspectives |date=1 March 2021 |volume=9 |article-number=100277 |doi=10.1016/j.trip.2020.100277 |bibcode=2021TrRIP...900277H }}</ref><ref>{{#invoke:Cite|web|url=https://www.cbsnews.com/news/air-cleaner-2020-coronavirus-pandemic-pollution/|title=The air got cleaner in 2020, thanks to the pandemic|website=[[CBS News]] |date=19 November 2020}}</ref>

      In 2020, a worldwide study on mammalian wildlife responses to human presence during COVID lockdowns found complex patterns of animal behaviour. Carnivores were generally less active when humans were around, while herbivores in developed areas were more active. Among other findings, this suggested that herbivores may view humans as a shield against predators, highlighting the importance of location and human presence history in understanding wildlife responses to changes in human activity in a given area.<ref>{{#invoke:Cite|news | vauthors = Main D |title=How Wild Animals Actually Responded to Our COVID Lockdowns |url=https://www.scientificamerican.com/article/how-wild-animals-actually-responded-to-our-covid-lockdowns/ |access-date=20 March 2024 |publisher=Scientific American |date=18 March 2024 |archive-url=https://web.archive.org/web/20240319030256/https://www.scientificamerican.com/article/how-wild-animals-actually-responded-to-our-covid-lockdowns/ |archive-date=19 March 2024 |language=en}}</ref>

      A [[list of animals that can get SARS-CoV-2|wide variety]] of largely mammalian species, both captive and wild, have been shown to be susceptible to SARS-CoV-2, with some encountering a particularly high degree of fatal outcomes.<ref>{{#invoke:Cite|journal | vauthors = Pappas G, Vokou D, Sainis I, Halley JM |title=SARS-CoV-2 as a Zooanthroponotic Infection: Spillbacks, Secondary Spillovers, and Their Importance |journal=Microorganisms |date=31 October 2022 |volume=10 |issue=11 |page=2166 |doi=10.3390/microorganisms10112166 |pmid=36363758 |pmc=9696655 |issn=2076-2607 |doi-access=free }}</ref> In particular, both [[SARS-CoV-2 in mink|farmed and wild mink]] have developed highly symptomatic and severe COVID-19 infections, with a mortality rate as high as 35–55% according to one study.<ref name="Frontiers Spread">{{#invoke:Cite|journal | vauthors = Devaux CA, Pinault L, Delerce J, Raoult D, Levasseur A, Frutos R|title=Spread of Mink SARS-CoV-2 Variants in Humans: A Model of Sarbecovirus Interspecies Evolution |journal=Frontiers in Microbiology |date=20 September 2021 |volume=12 |article-number=675528 |doi=10.3389/fmicb.2021.675528 |pmid=34616371 |pmc=8488371 |doi-access=free }}</ref><ref>{{#invoke:Cite|journal | vauthors = Eckstrand CD, Baldwin TJ, Rood KA, Clayton MJ, Lott JK, Wolking RM, Bradway DS, Baszler T |title=An outbreak of SARS-CoV-2 with high mortality in mink (Neovison vison) on multiple Utah farms |journal=PLOS Pathogens |date=12 November 2021 |volume=17 |issue=11 |article-number=e1009952 |doi=10.1371/journal.ppat.1009952 |pmid=34767598 |pmc=8589170 |doi-access=free}}</ref> [[SARS-CoV-2 in white-tailed deer|White-tailed deer]], on the other hand, have largely avoided severe outcomes but have effectively become [[natural reservoir]]s of the virus, with large numbers of free-ranging deer infected throughout the US and Canada, including approximately 80% of [[Iowa]]'s wild deer herd.<ref>{{#invoke:Cite|news | vauthors = Jacobs A |title=Widespread Coronavirus Infection Found in Iowa Deer, New Study Says |url=https://www.nytimes.com/2021/11/02/science/deer-covid-infection.html |access-date=5 November 2021 |work=[[The New York Times]] |date=2 November 2021 |archive-url=https://web.archive.org/web/20211102164643/https://www.nytimes.com/2021/11/02/science/deer-covid-infection.html |archive-date=2 November 2021}}</ref><ref name="Nature April">{{#invoke:Cite|journal | vauthors = Mallapaty S |title=COVID is spreading in deer. What does that mean for the pandemic? |url=https://www.nature.com/articles/d41586-022-01112-4 |access-date=26 April 2022 |journal=Nature |date=26 April 2022 | volume = 604 | issue = 7907 | pages = 612–615 | doi = 10.1038/d41586-022-01112-4 | pmid = 35474534 | bibcode = 2022Natur.604..612M |archive-url=https://web.archive.org/web/20220426133110/https://www.nature.com/articles/d41586-022-01112-4 |archive-date=26 April 2022}}</ref> An August 2023 study appeared to confirm the status of white-tailed deer as a disease reservoir, noting that the viral evolution of SARS-CoV-2 in deer occurs at triple the rate of its evolution in humans and that infection rates remained high, even in areas rarely frequented by humans.<ref name="Triple Evolution">{{#invoke:Cite|journal | vauthors = McBride DS, Garushyants SK, Franks J, Magee AF, Overend SH, Huey D, Williams AM, Faith SA, Kandeil A, Trifkovic S, Miller L, Jeevan T, Patel A, Nolting JM, Tonkovich MJ, Genders JT, Montoney AJ, Kasnyik K, Linder TJ, Bevins SN, Lenoch JB, Chandler JC, DeLiberto TJ, Koonin EV, Suchard MA, Lemey P, Webby RJ, Nelson MI, Bowman AS |title=Accelerated evolution of SARS-CoV-2 in free-ranging white-tailed deer |journal=Nature Communications |date=28 August 2023 |volume=14 |issue=1 |article-number=5105 |doi=10.1038/s41467-023-40706-y |pmid=37640694 |pmc=10462754 |bibcode=2023NatCo..14.5105M }}</ref>

      === Discrimination and prejudice ===
      {{Main|Xenophobia and racism related to the COVID-19 pandemic}}

      [[File:Memorial Day 2020 - San Francisco Under Quarantine (49935630543).jpg|thumb|A socially distanced homeless encampment in San Francisco, California, in May 2020<ref>{{#invoke:Cite|news | vauthors = McCormick E |title='Homelessness is lethal': US deaths among those without housing are surging |url=https://www.theguardian.com/us-news/2022/feb/07/homelessness-is-lethal-deaths-have-risen-dramatically |access-date=20 August 2022 |work=[[The Guardian]] |date=7 February 2022 }}</ref>]]
      Heightened prejudice, [[xenophobia]], and racism toward people of [[Sinophobe|Chinese and East Asian descent]] were documented around the world.<ref name="AutoDW-251"/><ref name="zogcf"/> Reports from February 2020, when most confirmed cases were confined to China, cited racist sentiments about Chinese people 'deserving' the virus.<ref name="bangkokpost1854094">{{#invoke:Cite|news | vauthors = Wangkiat P |title=Virus-induced racism does no one any good |url=https://www.bangkokpost.com/opinion/opinion/1854094/virus-induced-racism-does-no-one-any-good |date=10 February 2020 |work=Bangkok Post}}</ref><ref name="psychologytoday202002">{{#invoke:Cite|news | vauthors = Bartholomew R |url=https://www.psychologytoday.com/us/blog/its-catching/202002/the-coronavirus-and-the-search-scapegoats |title=The Coronavirus and the Search for Scapegoats |date=6 February 2020 |work=Psychology Today}}</ref><ref name="20200201telegraph">{{#invoke:Cite|news | vauthors = Smith N |title=Anti-Chinese racism spikes as virus spreads globally |url=https://www.telegraph.co.uk/news/2020/02/01/anti-chinese-racism-spikes-virus-spreads-globally/ |archive-url=https://ghostarchive.org/archive/20220110/https://www.telegraph.co.uk/news/2020/02/01/anti-chinese-racism-spikes-virus-spreads-globally/ |archive-date=10 January 2022 |url-status=live |date=1 February 2020 |work=The Daily Telegraph |url-access=subscription |quote='Some Muslims were claiming the disease was "divine retribution" for China's oppression of the Uighur minority. The problem lay in confusing the Chinese population with the actions of an authoritarian government known for its lack of transparency,' he said.}}{{cbignore}}</ref> Individuals of Asian descent in Europe and North America reported increasing instances of racially motivated abuse and assaults as a result of the pandemic.<ref name="NYT Racism">{{#invoke:Cite|news | vauthors = Tavernise S, Oppel Jr RA |title=Spit On, Yelled At, Attacked: Chinese-Americans Fear for Their Safety |url=https://www.nytimes.com/2020/03/23/us/chinese-coronavirus-racist-attacks.html |access-date=23 March 2020 |work=[[The New York Times]] |date=23 March 2020}}</ref><ref name="05O7n"/><ref name="NYT_April_Racism">{{#invoke:Cite|news | vauthors = La Gorce T |title=Chinese-Americans, Facing Abuse, Unite to Aid Hospitals in Coronavirus Battle |url=https://www.nytimes.com/2020/04/05/nyregion/coronavirus-chinese-americans-supplies.html |access-date=29 April 2020 |work=[[The New York Times]] |date=5 April 2020}}</ref> US president [[Donald Trump]] was criticised for referring to SARS-CoV-2 as the "Chinese Virus" and "Kung Flu", terms which were condemned as being racist and xenophobic.<ref name="trumpnyt">{{#invoke:Cite|news | vauthors = Rogers K, Jakes L, Swanson A |title=Trump Defends Using 'Chinese Virus' Label, Ignoring Growing Criticism |url=https://www.nytimes.com/2020/03/18/us/politics/china-virus.html |access-date=20 March 2020 |work=[[The New York Times]] |date=18 March 2020 |archive-url=https://web.archive.org/web/20200320001747/https://www.nytimes.com/2020/03/18/us/politics/china-virus.html |archive-date=20 March 2020 |url-status=live}}</ref><ref name="20200320BI">{{#invoke:Cite|web | url=https://www.businessinsider.com/trump-using-racism-against-china-to-distract-from-coronavirus-failures-2020-3 | vauthors = Haltiwanger J |title=Republicans are using racism against China to try to distract from Trump's disastrous coronavirus response |work=Business Insider |date=20 March 2020}}</ref><ref name="MNCw4">{{#invoke:Cite|web | vauthors = Lee BY |title=Trump Once Again Calls Covid-19 Coronavirus The 'Kung Flu' |url=https://www.forbes.com/sites/brucelee/2020/06/24/trump-once-again-calls-covid-19-coronavirus-the-kung-flu/ |access-date=9 July 2020 |website=Forbes}}</ref>

      [[Ageism|Age-based discrimination]] against older adults increased during the pandemic. This was attributed to their perceived vulnerability and subsequent physical and social isolation measures, which, coupled with their reduced social activity, increased dependency on others. Similarly, limited digital literacy left the elderly more vulnerable to isolation, depression, and loneliness.<ref>{{#invoke:Cite|journal | vauthors = Silva MF, Silva DS, Bacurau AG, Francisco PM, Assumpção D, Neri AL, Borim FS | title = Ageism against older adults in the context of the COVID-19 pandemic: an integrative review | journal = Revista de Saúde Pública | volume = 55 | page = 4 | year = 2021 | pmid = 33886953 | pmc = 8023321 | doi = 10.11606/s1518-8787.2021055003082 }}</ref>

      In a correspondence published in ''[[The Lancet]]'' in 2021, German epidemiologist Günter Kampf described the harmful effects of "inappropriate stigmatisation of unvaccinated people, who include our patients, colleagues, and other fellow citizens", noting the evidence that vaccinated individuals play a large role in transmission.<ref>{{#invoke:Cite|journal|title=COVID-19: stigmatising the unvaccinated is not justified| vauthors = Kampf G |date=20 November 2021|journal=The Lancet|volume=398|issue=10314|page=1871|doi=10.1016/S0140-6736(21)02243-1|pmid=34801101|pmc=8601682 }}</ref> American bioethicist Arthur Caplan responded to Kampf, writing "Criticising [the unvaccinated] who... wind up in hospitals and morgues in huge numbers, put stress on finite resources, and prolong the pandemic... is not stigmatising, it is deserved moral condemnation".<ref>{{#invoke:Cite|journal | vauthors = Caplan AL |title=Stigma, vaccination, and moral accountability |journal=The Lancet |date=February 2022 |volume=399 |issue=10325 |pages=626–627 |doi=10.1016/S0140-6736(22)00189-1 |pmid=35151392 |pmc=8830899 }}</ref>

      In January 2022, [[Amnesty International]] urged [[COVID-19 pandemic in Italy|Italy]] to change their anti-COVID-19 restrictions to avoid discrimination against unvaccinated people, saying that "the government must continue to ensure that the entire population can enjoy its fundamental rights". The restrictions included mandatory vaccination over the age of 50, and mandatory vaccination to use public transport.<ref>{{#invoke:Cite|news | url=https://www.reuters.com/world/europe/dont-discriminate-against-unvaccinated-amnesty-international-tells-italy-2022-01-16/ | title=Don't discriminate against the unvaccinated, Amnesty International tells Italy | work=Reuters | date=16 January 2022 }}</ref>

      === Lifestyle changes ===
      [[File:Wee Annie, Kempock Street, face mask.jpg|thumb|upright|The "Wee Annie" statue in [[Gourock, Scotland|Gourock]], Scotland, was given a face mask during the pandemic.]]
      The pandemic triggered massive changes in behaviour, from increased Internet commerce to cultural changes in the workplace. Online retailers in the US posted $791.70&nbsp;billion in sales in 2020, an increase of 32.4% from $598.02&nbsp;billion the year before.<ref name="DDCV1ECMR">{{#invoke:Cite|web | title=Data dive: How COVID-19 impacted ecommerce in 2020|url=https://www.digitalcommerce360.com/article/coronavirus-impact-online-retail/|access-date=27 March 2021 |website=Digital Commerce 360}}</ref> Home delivery orders increased, while indoor restaurant dining shut down due to lockdown orders or low sales.<ref name="Fo18zrty783">{{#invoke:Cite|web | vauthors = Kats R | title=More Consumers Are Turning to Food Delivery Apps amid Indoor Dining Restrictions| date = 19 August 2020 |url=https://www.emarketer.com/content/more-consumers-turning-food-delivery-apps-amid-indoor-dining-restrictions|access-date=28 March 2021 |publisher=eMarketer.com}}</ref><ref name="Fo18zrty784">{{#invoke:Cite|web | vauthors = Scotto M | title=NYC Indoor Dining To Shut Down Monday, Cuomo Announces|url=https://www.ny1.com/nyc/all-boroughs/news/2020/12/11/cuomo--indoor-dining-to-be-suspended-starting-monday/|access-date=28 March 2021 |publisher=Spectrum News NY1}}</ref> Hackers, [[cybercriminal]]s and scammers took advantage of the changes to launch new online attacks.<ref name="Fo18zrty787">{{#invoke:Cite|web | vauthors = DeLisi B | title=The future of hacking: COVID-19 shifting the way hackers work and who they target|url=https://www.securitymagazine.com/articles/93086-the-future-of-hacking-covid-19-shifting-the-way-hackers-work-and-who-they-target|access-date=28 March 2021 |website=SECURITY magazine}}</ref>

      Education in some countries temporarily shifted from physical attendance to video conferencing.<ref name="Fo18zrty790">{{#invoke:Cite|web | title=The COVID-19 pandemic has changed education forever. This is how|url=https://www.weforum.org/agenda/2020/04/coronavirus-education-global-covid19-online-digital-learning/|access-date=28 March 2021 |website=World Economic Forum|date=29 April 2020 }}</ref> Massive layoffs shrank the airline, travel, hospitality, and other industries.<ref name="Fo18zrty6966">{{#invoke:Cite|news | vauthors = Benshoff L |title=Pandemic Threatens Long-Term Job Security After Hospitality Industry Layoffs | work = NPR | date = 29 September 2020 |url=https://www.npr.org/2020/09/29/917756656/pandemic-threatens-long-term-job-security-after-hospitality-industry-layoffs|access-date=28 March 2021}}</ref><ref name="Fo18zrty9999">{{#invoke:Cite|web | vauthors = Woodyard C | title=Travel industry layoffs begin as Congress fails to come up with new relief package|url=https://www.usatoday.com/story/travel/2020/09/30/covid-19-travel-industry-layoffs-could-start-congress-fails-act/5868989002/|access-date=28 March 2021 |website=USA Today}}</ref> Despite most corporations implementing measures to address COVID-19 in the workplace, a poll from [[Catalyst (nonprofit organization)|Catalyst]] found that as many as 68% of employees around the world felt that these policies were only performative and "not genuine".<ref>{{#invoke:Cite|news |date=30 June 2022 | vauthors = Chong J |title=Workers feel corporate COVID-19, equity policies 'not genuine,' study says |work=The Toronto Star |url=https://www.thestar.com/business/2022/06/28/workers-feel-corporate-covid-19-equity-policies-not-genuine-study-says.html |access-date=30 June 2022 |issn=0319-0781}}</ref>

      The pandemic led to a surge in [[remote work]]. According to a [[Gallup poll]], only 4% of US employees were fully remote before the pandemic, compared to 43% in May 2020. Among white collar workers, that shift was more pronounced, with 6% increasing to 65% in the same period.<ref name="The New York Times 2022">{{#invoke:Cite|web | title=After Two Years of Remote Work, Workers Question Office Life | website=The New York Times | date=10 March 2022 | url=https://www.nytimes.com/2022/03/10/business/remote-work-office-life.html | access-date=13 June 2023}}</ref> That trend continued in later stages of the pandemic, with many workers choosing to remain remote even after workplaces reopened.<ref name="Mitchell 2022">{{#invoke:Cite|web | vauthors = Mitchell T | title=COVID-19 Pandemic Continues To Reshape Work in America | website=Pew Research Center's Social & Demographic Trends Project | date=16 February 2022 | url=https://www.pewresearch.org/social-trends/2022/02/16/covid-19-pandemic-continues-to-reshape-work-in-america/ | access-date=13 June 2023}}</ref><ref name="Kagubare 2023">{{#invoke:Cite|web |  vauthors = Kagubare I | title=Nearly 30 percent of work remains remote as workers dig in | website=The Hill | date=20 February 2023 | url=https://thehill.com/policy/technology/3862069-nearly-30-percent-of-work-remains-remote-as-workers-dig-in/ | access-date=13 June 2023}}</ref> Many Nordic, European, and Asian companies increased their recruitment of international remote workers even as the pandemic waned, partially to save on labour costs.<ref name="ComputerWeekly.com 2023">{{#invoke:Cite|web | title=As Covid fades away, what's the future of remote work in Europe? | website=ComputerWeekly.com | date=14 March 2023 | url=https://www.computerweekly.com/feature/As-Covid-fades-away-whats-the-future-of-remote-work-in-Europe | access-date=14 June 2023}}</ref><ref name="Braesemann Stephany Teutloff Kässi 2022 p=e0274630">{{#invoke:Cite|journal | vauthors = Braesemann F, Stephany F, Teutloff O, Kässi O, Graham M, Lehdonvirta V | title=The global polarisation of remote work | journal=PLOS ONE | publisher=Public Library of Science (PLoS) | volume=17 | issue=10 | date=20 October 2022 | issn=1932-6203 | doi=10.1371/journal.pone.0274630 | article-number=e0274630 | pmid=36264859 | pmc=9584402 | arxiv=2108.13356 | bibcode=2022PLoSO..1774630B | doi-access=free }}</ref> This also led to a talent drain in the global south and in remote areas in the global north.<ref name="Braesemann Stephany Teutloff Kässi 2022 p=e0274630"/><ref name="EuropeanStingWEF2023">{{#invoke:Cite|web | title=What does remote working look like around the world? | website=The European Sting | date=13 February 2023 | url=https://europeansting.com/2023/02/13/what-does-remote-working-look-like-around-the-world/ | access-date=14 June 2023}}</ref> High cost of living and dense urban areas also lost office real estate value due to remote worker exodus.<ref name="Economist2022Jan">{{#invoke:Cite|news | title=Will remote work stick after the pandemic? | newspaper=The Economist | date=15 January 2022 | url=https://www.economist.com/finance-and-economics/2022/01/15/will-remote-work-stick-after-the-pandemic | access-date=14 June 2023}}</ref> By May 2023, due to increasing layoffs and concerns over productivity, some white collar workplaces in the US had resorted to performance review penalties and indirect incentives (e.g. donations to charity) to encourage workers to return to the office.<ref name="Peck 2023">{{#invoke:Cite|web | vauthors = Peck E | title=Companies get aggressive on return-to-office | website=Axios | date=13 June 2023 | url=https://www.axios.com/2023/06/13/companies-aggressive-return-to-office | access-date=13 June 2023}}</ref>

      === Historiography ===
      A 2021 study noted that the COVID-19 pandemic had increased interest in epidemics and infectious diseases among both historians and the general public. Prior to the pandemic, these topics were usually overlooked by "general" history and only received attention in the [[history of medicine]].<ref>{{#invoke:Cite|journal | vauthors = Fonzo E |date=18 July 2021 |title=Historiography and Covid-19. Some considerations |url=https://www.mediterraneanknowledge.org/publications/index.php/journal/article/view/205 |journal=Journal of Mediterranean Knowledge |volume=6 |issue=1 |pages=129–158 |issn=2499-930X}}</ref> Many comparisons were made between the COVID-19 and [[1918 influenza pandemic]]s,<ref>{{#invoke:Cite|journal | vauthors = Tambolkar S, Pustake M, Giri P, Tambolkar I |title=Comparison of public health measures taken during Spanish flu and COVID-19 pandemics: A Narrative Review. |journal=Journal of Family Medicine and Primary Care |date=May 2022 |volume=11 |issue=5 |pages=1642–1647 |doi=10.4103/jfmpc.jfmpc_1612_21 |pmid=35800503 |pmc=9254789 |doi-access=free}}</ref><ref>{{#invoke:Cite|journal | vauthors = Beach B, Clay K, Saavedra M |title=The 1918 Influenza Pandemic and Its Lessons for COVID-19 |journal=Journal of Economic Literature |date=March 2022 |volume=60 |issue=1 |pages=41–84 |doi=10.1257/jel.20201641 |url=https://www.aeaweb.org/articles?id=10.1257/jel.20201641 |issn=0022-0515}}</ref> including the development of anti-mask movements,<ref>{{#invoke:Cite|journal |journal=Health Affairs Forefront| vauthors = Ewing T |title=Flu Masks Failed In 1918, But We Need Them Now |date=12 May 2020 |doi=10.1377/forefront.20200508.769108 |url=https://www.healthaffairs.org/content/forefront/flu-masks-failed-1918-but-we-need-them-now |access-date=9 June 2023}}</ref><ref>{{#invoke:Cite|web |title=Mask Resistance During a Pandemic Isn't New – in 1918 Many Americans Were 'Slackers' |url=https://www.michiganmedicine.org/health-lab/mask-resistance-during-pandemic-isnt-new-1918-many-americans-were-slackers |website=michiganmedicine.org |access-date=9 June 2023 |date=29 October 2020}}</ref> the widespread promotion of misinformation<ref>{{#invoke:Cite|news | vauthors = Devega C |title=Fake news, conspiracy theories and a deadly global pandemic — and that was in 1918 |url=https://www.salon.com/2021/05/08/fake-news-conspiracy-theories-and-a-deadly-global-pandemic--and-that-was-in-1918/ |access-date=9 June 2023 |work=Salon |date=8 May 2021 }}</ref><ref>{{#invoke:Cite|news | vauthors = Cohut M |title=What the COVID-19 pandemic and the 1918 flu pandemic have in common |url=https://www.medicalnewstoday.com/articles/the-flu-pandemic-of-1918-and-early-conspiracy-theories |access-date=9 June 2023 |work=medicalnewstoday.com |date=29 September 2020 }}</ref> and the impact of [[social determinants of health|socioeconomic disparities]].<ref>{{#invoke:Cite|journal | vauthors = Krishnan L, Ogunwole SM, Cooper LA |title=Historical Insights on Coronavirus Disease 2019 (COVID-19), the 1918 Influenza Pandemic, and Racial Disparities: Illuminating a Path Forward |journal=Annals of Internal Medicine |date=15 September 2020 |volume=173 |issue=6 |pages=474–481 |doi=10.7326/M20-2223 |pmid=32501754 |pmc=7298913 |issn=0003-4819}}</ref>

      === Religion ===
      {{Main|Impact of the COVID-19 pandemic on religion}}

      [[File:Solenidade de Pentecostes 2020, máscaras.png|alt=Two men in masks, wearing mitres and red vestments, stand in front of an altar. Altar servers, deacons, and priests in the background similarly wear masks.|thumb|[[Jorge Ortiga]], [[Roman Catholic Archdiocese of Braga|Archbishop of Braga]], Portugal, wearing a protective mask during [[Pentecost]] Mass in May 2020]]
      In some areas, religious groups exacerbated the spread of the virus, through large gatherings and the dissemination of misinformation.<ref>{{#invoke:Cite|journal | vauthors = Lee M, Lim H, Xavier MS, Lee EY |title="A Divine Infection": A Systematic Review on the Roles of Religious Communities During the Early Stage of COVID-19 |journal=Journal of Religion and Health |date=1 February 2022 |volume=61 |issue=1 |pages=866–919 |doi=10.1007/s10943-021-01364-w |pmid=34405313 |pmc=8370454 |issn=1573-6571}}</ref><ref>{{#invoke:Cite|journal | vauthors = Kalocsányiová E, Essex R, Fortune V |title=Inequalities in Covid-19 Messaging: A Systematic Scoping Review |journal=Health Communication |date=19 July 2022 |volume=38 |issue=12 |pages=2549–2558 |doi=10.1080/10410236.2022.2088022 |pmid=35850593 |s2cid=250642415 |url=https://www.tandfonline.com/doi/full/10.1080/10410236.2022.2088022 |access-date=9 June 2023 |issn=1041-0236}}</ref><ref>{{#invoke:Cite|journal | vauthors = Lee Rogers R, Powe N |title=COVID-19 Information Sources and Misinformation by Faith Community |journal=INQUIRY: The Journal of Health Care Organization, Provision, and Financing |date=January 2022 |volume=59 |page=004695802210813 | article-number = 00469580221081388 |doi=10.1177/00469580221081388 |pmid=35634989 |pmc=9152626 |issn=0046-9580}}</ref> Some religious leaders decried what they saw as violations of religious freedom.<ref>{{#invoke:Cite|web | vauthors = Majumdar S |title=Key findings about COVID-19 restrictions that affected religious groups around the world in 2020 |url=https://www.pewresearch.org/short-reads/2022/11/29/key-findings-about-covid-19-restrictions-that-affected-religious-groups-around-the-world-in-2020/ |website=Pew Research Center |date=29 November 2022 |access-date=9 June 2023}}</ref> In other cases, religious identity was a beneficial factor for health, increasing compliance with public health measures and protecting against the negative effects of isolation on mental wellbeing.<ref>{{#invoke:Cite|journal | vauthors = Li H, Cao Y |title=Rules We Live by: How Religious Beliefs Relate to Compliance with Precautionary Measures Against COVID-19 in Tibetan Buddhists |journal=Journal of Religion and Health |date=1 April 2022 |volume=61 |issue=2 |pages=1671–1683 |doi=10.1007/s10943-022-01512-w |pmid=35122555 |pmc=8817637 |issn=1573-6571}}</ref><ref>{{#invoke:Cite|journal | vauthors = Syed U, Kapera O, Chandrasekhar A, Baylor BT, Hassan A, Magalhães M, Meidany F, Schenker I, Messiah SE, Bhatti A |title=The Role of Faith-Based Organizations in Improving Vaccination Confidence & Addressing Vaccination Disparities to Help Improve Vaccine Uptake: A Systematic Review |journal=Vaccines |date=February 2023 |volume=11 |issue=2 |page=449 |doi=10.3390/vaccines11020449 |pmid=36851325 |pmc=9966262 |issn=2076-393X |doi-access=free }}</ref><ref>{{#invoke:Cite|journal | vauthors = Sisti LG, Buonsenso D, Moscato U, Costanzo G, Malorni W |title=The Role of Religions in the COVID-19 Pandemic: A Narrative Review |journal=International Journal of Environmental Research and Public Health |date=January 2023 |volume=20 |issue=3 |page=1691 |doi=10.3390/ijerph20031691 |pmid=36767057 |pmc=9914292 |issn=1660-4601 |doi-access=free }}</ref>

      == Information dissemination ==
      {{Further|Media coverage of the COVID-19 pandemic|Impact of the COVID-19 pandemic on social media|Impact of the COVID-19 pandemic on journalism}}
      Some news organisations removed their online paywalls for some or all of their pandemic-related articles and posts.<ref>{{#invoke:Cite|news | vauthors = Jerde S |title=Major Publishers Take Down Paywalls for Coronavirus Coverage |url=https://www.adweek.com/performance-marketing/major-publishers-take-down-paywalls-for-coronavirus-coverage/ |access-date=9 June 2023 |work=adweek.com| date = 12 March 2020 }}</ref> Many scientific publishers provided pandemic-related journal articles to the public free of charge as part of the National Institutes of Health's COVID-19 Public Health Emergency Initiative.<ref>{{#invoke:Cite|web |title=Call to Make COVID-19 Data/Research Publicly Available |url=https://www.imagwiki.nibib.nih.gov/sites/default/files/COVID19%20Open%20Access%20Letter%20from%20CSAs.Equivalents_0.pdf |website=NIH |publisher=imagwiki.nibib.nih.gov |access-date=9 June 2023}}</ref><ref>{{#invoke:Cite|web |title=PMC COVID-19 Collection |url=https://www.ncbi.nlm.nih.gov/pmc/about/covid-19/ |website=PubMed Central (PMC) |access-date=9 June 2023 }}</ref> According to one estimate from researchers at the University of Rome, 89.5% of COVID-19-related papers were open access, compared to an average of 48.8% for the ten most deadly human diseases.<ref>{{#invoke:Cite|journal | vauthors = Capocasa M, Anagnostou P, Bisol GD |title=A light in the dark: open access to medical literature and the COVID-19 pandemic |journal=Information Research |date=15 June 2022 |volume=27 |issue=2 |doi=10.47989/irpaper929 |s2cid=249615157 |url=https://informationr.net/ir/27-2/paper929.html |access-date=9 June 2023 }}</ref> The share of papers published on preprint servers prior to peer review increased dramatically.<ref>{{#invoke:Cite|magazine | vauthors = Rogers A |title=Coronavirus Research Is Moving at Top Speed—With a Catch |url=https://www.wired.com/story/coronavirus-research-preprint-servers/ |access-date=9 June 2023 |magazine=Wired}}</ref>

      During the pandemic, [[Web GIS]] technology was leveraged to provide up to date visualisations of data related to the pandemic with the public.<ref name="Juergens2020">{{cite journal |last1=Juergens |first1=Carsten |title=Trustworthy COVID‑19 Mapping: Geo‑spatial Data Literacy Aspects of Choropleth Maps |journal=Journal of Cartography and Geographic Information |date=2020 |volume=70 |issue=4 |pages=155–161 |doi=10.1007/s42489-020-00057-w |pmid=33134849 |pmc=7583689 }}</ref> Employing this technology, the [[Johns Hopkins University]] COVID-19 [[Dashboard (computing)|dashboard]] served as the first global visualisation of COVID-19 data, which established it as the default method for government agencies to dissemeniate relevant spatial information.<ref name="Everts2020">{{cite journal |last1=Everts |first1=Jonathan |title=The dashboard pandemic |journal=Dialogues in Human Geography |date=2020 |volume=10 |issue=2 |pages=260–264 |doi=10.1177/2043820620935355 |doi-access=free }}</ref><ref name="Adams2025">{{cite journal |last1=Adams |first1=Aaron M. |last2=Gallaher |first2=Adam |last3=Benitez Ou |first3=Ashley |last4=Chen |first4=Xiang |last5=Li |first5=Weidong |last6=Zhang |first6=Chuanrong |last7=Mrozinski |first7=Richard |last8=Ghosh |first8=Debarchana |title=Mapping COVID-19: Applying Ethical Strategies in Web Mapping Decisions |journal=Cartographic Perspectives |date=2025 |volume=105 |pages=67–75 |doi=10.14714/CP105.1971 |url=https://cartographicperspectives.org/index.php/journal/article/view/1971/2423 |access-date=12 April 2025|doi-access=free }}</ref> These dashboards were described by Jonathan Everts as "the most striking cultural artefact of the current coronavirus (SARS-CoV-2) pandemic",<ref name="Everts2020"/> and during the pandemic every state government in the United States maintained one.<ref name="Adams2023">{{cite journal |last1=Adams |first1=Aaron M. |last2=Chen |first2=Xiang |last3=Li |first3=Weidong |last4=Zhang |first4=Chuanrong |title=Normalizing the pandemic: exploring the cartographic issues in stategovernment COVID-19 dashboards |journal=Journal of Maps |date=2023 |volume=19 |issue=1 |pages=1–9 |doi=10.1080/17445647.2023.2235385 |bibcode=2023JMaps..19Q...1A |doi-access=free }}</ref>

      === Misinformation<span class="anchor" id="Disinformation"></span> ===
      {{Main|COVID-19 misinformation}}

      [[Misinformation]] and [[conspiracy theory|conspiracy theories]] about the pandemic have been widespread; they travel through [[media coverage of the COVID-19 pandemic|mass media]], [[impact of the COVID-19 pandemic on social media#Misinformation|social media]] and text messaging.<ref name="FTTextMsg">{{#invoke:Cite|web| vauthors = Murphy H, Di Stefano M, Manson K |url=https://www.ft.com/content/34b6df5a-ea4a-471f-8ac9-606580480049|title=Huge text message campaigns spread coronavirus fake news|date=20 March 2020|work=Financial Times}}</ref> In March 2020, WHO declared an "[[infodemic]]" of incorrect information.<ref name="Lowy">{{#invoke:Cite|news| vauthors = Kassam N |date=25 March 2020|title=Disinformation and coronavirus|work=The Interpreter|publisher=Lowy Institute|url=https://www.lowyinstitute.org/the-interpreter/disinformation-and-coronavirus }}</ref> [[Cognitive bias]]es, such as [[confirmation bias]], are linked to conspiracy beliefs, including [[COVID-19 vaccine hesitancy]].<ref>{{#invoke:Cite|journal | vauthors = Kuhn SA, Lieb R, Freeman D, Andreou C, Zander-Schellenberg T | title = Coronavirus conspiracy beliefs in the German-speaking general population: endorsement rates and links to reasoning biases and paranoia | journal = Psychological Medicine | pages = 4162–4176 | date = March 2021 | volume = 52 | issue = 16 | pmid = 33722315 | pmc = 8027560 | doi = 10.1017/S0033291721001124 | doi-access = free }}</ref>

      == Culture and society ==
      {{Further|COVID-19 pandemic in popular culture}}
      The COVID-19 pandemic had a major impact on popular culture. It was included in the narratives of ongoing pre-pandemic television series and become a central narrative in new ones, with mixed results.<ref>{{#invoke:Cite|web|url=https://www.augustman.com/my/culture/film-tv/how-the-covid-19-pandemic-is-affecting-popular-culture/|title=How The Covid-19 Pandemic Is Affecting Popular Culture|author=<!-- Not stated -->|date=24 November 2020|website=augustman.com|publisher=[[August Man]]|access-date=18 December 2020|quote=In addition to existing shows, streaming platforms and cable channels have tried putting together new series centred on coronavirus, like HBO's "Coastal Elites" or Netflix's "Social Distance" – but with no real success.}}</ref> Writing for ''[[The New York Times]]'' about the then-upcoming [[BBC]] sitcom ''[[Here We Go (TV series)#Pilot|Pandemonium]]'' on 16 December 2020, [[David Segal (journalist)|David Segal]] asked, "Are we ready to laugh about Covid-19? Or rather, is there anything amusing, or recognizable in a humorous way, about life during a plague, with all of its indignities and setbacks, not to mention its rituals and rules".<ref>{{#invoke:Cite|web| vauthors = Segal D |author-link=David Segal (journalist)|date=16 December 2020|title=Are We Ready to Laugh About Covid-19? A British Sitcom Hopes So|url=https://www.nytimes.com/2020/12/16/business/media/pandemonium-bbc-coronavirus.html|access-date=18 December 2020|website=[[The New York Times]]|quote=Are we ready to laugh about Covid-19? Or rather, is there anything amusing, or recognizable in a humorous way, about life during a plague, with all of its indignities and setbacks, not to mention its rituals (clapping for [[health care worker]]s) and rules ([[face masks during the COVID-19 pandemic|face mask]]s, please).}}</ref>

      The pandemic had driven some people to seek peaceful [[escapism]] in media, while others were drawn towards fictional pandemics (e.g. [[zombie apocalypse]]s) as an alternate form of escapism.<ref>{{#invoke:Cite|web| vauthors = Nobel E |date=13 April 2020|title=COVID-19 will shape pop culture for years to come, but for now we love pandemic stories|url=https://www.abc.net.au/news/2020-04-13/why-we-read-pandemic-stories-in-a-pandemic/12138290|access-date=18 December 2020|website=abc.net.au|publisher=[[Australian Broadcasting Corporation]]|quote=Fictitious stories about pandemics give us a way to experience the horror in a controlled way, with the pacing we've grown to expect, where resolution is always possible, and where we can always turn off the TV if it gets a bit too much.}}</ref> Common themes have included [[contagious disease|contagion]], [[isolation (health care)|isolation]] and loss of [[control (psychology)|control]].<ref>{{#invoke:Cite|magazine| vauthors = McCluskey M |date=7 October 2020|title=Horror Films Have Always Tapped Into Pop Culture's Most Urgent Fears. COVID-19 Will Be Their Next Inspiration|url=https://time.com/5891305/horror-movies-coronavirus-history-genre/|magazine=[[Time (magazine)|Time]]|access-date=19 December 2020|quote=}}</ref> Many drew comparisons to the fictional film ''[[Contagion (2011 film)|Contagion]]'' (2011),<ref>{{#invoke:Cite|news| vauthors = Rogers K |title='Contagion' vs. coronavirus: The film's connections to a real life pandemic|url=https://www.cnn.com/2020/04/02/movies/contagion-movie-versus-coronavirus-scn-wellness/index.html|access-date=9 June 2023|work=CNN|date=2 April 2020}}</ref><ref>{{#invoke:Cite|news| vauthors = Kritz F |title=Fact-Checking 'Contagion' — In Wake Of Coronavirus, The 2011 Movie Is Trending| work = NPR | date = 16 February 2020 |url=https://www.npr.org/sections/goatsandsoda/2020/02/16/802704825/fact-checking-contagion-in-wake-of-coronavirus-the-2011-movie-is-trending|access-date=9 June 2023}}</ref> praising its accuracies while noting some differences,<ref>{{#invoke:Cite|news|title=I've seen 'Contagion' four times. No, the coronavirus outbreak isn't the same|url=https://www.latimes.com/california/story/2020-03-11/coronavirus-contagion-outbreak-movie-comparison|access-date=9 June 2023|work=Los Angeles Times|date=11 March 2020}}</ref> such as the lack of an orderly vaccine rollout.<ref>{{#invoke:Cite|journal| vauthors = McGuire K |title=COVID-19, Contagion, and Vaccine Optimism|journal=Journal of Medical Humanities|date=March 2021|volume=42|issue=1|pages=51–62|doi=10.1007/s10912-021-09677-3|pmid=33587203|pmc=7882858}}</ref><ref>{{#invoke:Cite|news| vauthors = Freyne P |title=The things my movie Contagion got wrong: The slow vaccine, the damaging president|url=https://www.irishtimes.com/culture/film/the-things-my-movie-contagion-got-wrong-the-slow-vaccine-the-damaging-president-1.4276784|access-date=9 June 2023|newspaper=The Irish Times}}</ref>

      As people turned to music to relieve emotions evoked by the pandemic, [[Spotify]] listenership showed that classical, [[ambient music|ambient]] and [[children's music|children's]] genres grew, while pop, [[country music|country]] and dance remained relatively stable.<ref>{{#invoke:Cite|magazine| vauthors = Chow A |title=The Pandemic Could Have Hurt Country Music. Instead, the Genre Is Booming|url=https://time.com/5898001/country-music-streaming-numbers-coronavirus/|magazine=Time| date = 28 October 2020 |access-date=10 April 2021}}</ref>

      == Transition to later phases ==
      {{Main|Endemic COVID-19}}

      A March 2022 review declared a transition to endemic status to be "inevitable".<ref>{{#invoke:Cite|journal | vauthors = Koelle K, Martin MA, Antia R, Lopman B, Dean NE |date=11 March 2022 |title=The changing epidemiology of SARS-CoV-2 |journal=Science |volume=375 |issue=6585 |pages=1116–1121 |doi=10.1126/science.abm4915 |issn=1095-9203 |pmc=9009722 |pmid=35271324|bibcode=2022Sci...375.1116K }}</ref> In June 2022, an article in ''[[Human Genome Organisation|Human Genomics]]'' said that the pandemic was still "raging", but that "now is the time to explore the transition from the pandemic to the endemic phase".<ref>{{#invoke:Cite|journal|doi=10.1186/s40246-022-00392-1|title=COVID-19 2022 update: Transition of the pandemic to the endemic phase|year=2022| vauthors = Biancolella M, Colona VL, Mehrian-Shai R, Watt JL, Luzzatto L, Novelli G, Reichardt JK |journal=Human Genomics|volume=16|issue=1|article-number=19|pmid=35650595|pmc=9156835|s2cid=249274308 |doi-access=free}}</ref> Another review that month predicted that the virus that causes COVID-19 would become the fifth endemic seasonal coronavirus, alongside four other [[HCoV|human coronavirus]]es.<ref>{{#invoke:Cite|journal | vauthors = Cohen LE, Spiro DJ, Viboud C |date=30 June 2022 |title=Projecting the SARS-CoV-2 transition from pandemicity to endemicity: Epidemiological and immunological considerations |journal=PLOS Pathogens |volume=18 |issue=6 |article-number=e1010591 |doi=10.1371/journal.ppat.1010591 |issn=1553-7374 |pmid=35771775 |pmc=9246171 |doi-access=free }}</ref> A February 2023 review of the four [[common cold]] coronaviruses concluded that the virus would become seasonal and, like the common cold, cause less severe disease for most people.<ref>{{#invoke:Cite|journal | vauthors = Harrison CM, Doster JM, Landwehr EH, Kumar NP, White EJ, Beachboard DC, Stobart CC |title=Evaluating the Virology and Evolution of Seasonal Human Coronaviruses Associated with the Common Cold in the COVID-19 Era |journal=Microorganisms |date=10 February 2023 |volume=11 |issue=2 |page=445 |doi=10.3390/microorganisms11020445 |pmid=36838410 |pmc=9961755 |issn=2076-2607 |quote=After evaluating the biology, pathogenesis, and emergence of the human coronaviruses that cause the common cold, we can anticipate that with increased vaccine immunity to SARS-CoV-2, it will become a seasonal, endemic coronavirus that causes less severe disease in most individuals. Much like the common cold CoVs, the potential for severe disease will likely be present in those who lack a protective immune response or are immunocompromised. |doi-access=free }}</ref> Another 2023 review stated that the transition to endemic COVID-19 may take years or decades.<ref>{{#invoke:Cite|journal |vauthors=Markov PV, Ghafari M, Beer M, Lythgoe K, Simmonds P, Stilianakis NI, Katzourakis A |title=The evolution of SARS-CoV-2 |journal=Nat Rev Microbiol |volume=21 |issue=6 |pages=361–379 |date=June 2023 |pmid=37020110 |doi=10.1038/s41579-023-00878-2 |s2cid=257983412 |type=Review|doi-access=free }}</ref>

      On 5 May 2023, the WHO declared that the pandemic was no longer a [[public health emergency of international concern]].<ref>{{#invoke:Cite|web|title=WHO declares end to Covid global health emergency|url=https://www.nbcnews.com/health/health-news/who-ends-covid-global-health-emergency-rcna83046|access-date=6 May 2023|website=NBC News|date=5 May 2023}}</ref> This led several media outlets to incorrectly report that this meant the pandemic was "over". The WHO commented to [[Full Fact]] that it was unlikely to declare the pandemic over "in the near future" and mentioned [[cholera]], which it considers to have been a [[seventh cholera pandemic|pandemic since 1961]] (i.e., continuously for the last {{Time ago|1961-05|ago=}}).<ref name="ff">{{#invoke:Cite|web |publisher=FullFact.org |date=12 May 2023 |url=https://fullfact.org/health/who-covid-pandemic-over/ | vauthors = Brown F |title=The WHO has not declared the Covid-19 pandemic over}}</ref> The WHO does not have an official category for pandemics or make declarations of when pandemics start or end.<ref name="reuters" /><ref name="guardian" /><ref>{{#invoke:Cite|news | vauthors = Nebehay S |title=WHO says it no longer uses 'pandemic' category, but virus still emergency |url=https://www.reuters.com/article/uk-china-health-who-idUKKCN20I0PD |access-date=5 August 2023 |work=Reuters |date=24 February 2020 |quote="There is no official category (for a pandemic)," WHO spokesman Tarik Jasarevic said.}}</ref><ref name="timemarch2024" /> In June 2023, [[Hans Kluge]], director of the WHO in Europe, commented that "While the international public health emergency may have ended, the pandemic certainly has not".<ref name="kluge">{{#invoke:Cite|web |date=12 June 2023 |title=With the international public health emergency ending, WHO/Europe launches its transition plan for COVID-19 |url=https://www.who.int/europe/news/item/12-06-2023-with-the-international-public-health-emergency-ending--who-europe-launches-its-transition-plan-for-covid-19 |publisher=World Health Organization}}</ref>

      Epidemics and pandemics usually end when the disease becomes [[Endemic COVID-19|endemic]], and when the disease becomes "an accepted, manageable part of normal life in a given society".<ref name="charters2021">{{#invoke:Cite|journal | pmc=8014506 | date=2021 | title=How epidemics end | journal=Centaurus; International Magazine of the History of Science and Medicine | volume=63 | issue=1 | pages=210–224 | doi=10.1111/1600-0498.12370 | pmid=33821019 | vauthors = Charters E, Heitman K }}</ref> As of March 2024, there was no widely agreed definition of when a disease is or is not a pandemic, though efforts at a formal definition were underway. Experts asked by ''[[Time (magazine)|Time]]'' that month noted that COVID-19 continued to circulate and cause disease, but expressed uncertainty as to whether it should still be described as a pandemic.<ref name="timemarch2024">{{#invoke:Cite|magazine | vauthors = Ducharme J |title=Experts Can't Agree If We're Still in a Pandemic |url=https://time.com/6898943/is-covid-19-still-pandemic-2024/ |access-date=31 May 2024 |magazine=TIME |date=11 March 2024 |language=en}}</ref> In December 2024, [[Director-General of the World Health Organization]] [[Tedros Adhanom Ghebreyesus]] stated that COVID should not be referred to in past tense as it is "still with us, still causes acute disease and [[Long COVID]] and still kills... The world might want to forget about COVID-19, but we cannot afford to."<ref name="pasttense-who">{{cite web |last1=Ghebreyesus |first1=Tedros Adhanom |title=WHO Director-General's opening remarks at the media briefing – 10 December 2024 |url=https://www.who.int/news-room/speeches/item/who-director-general-s-opening-remarks-at-the-media-briefing---10-december-2024 |website=World Health Organization |access-date=29 December 2025}}</ref>

      By 2025, five years after the start of the pandemic, experts asked by ''[[The Independent]]'' and ''[[The Washington Post]]'' generally considered COVID-19 to have become endemic.<ref name=":0">{{Cite news |date=2025-03-13 |title=Five years since the pandemic began, covid may now be endemic, experts say |url=https://www.washingtonpost.com/wellness/2025/03/13/covid-endemic-pandemic-five-years/ |access-date=2026-03-04 |work=The Washington Post |language=en-US |issn=0190-8286}}</ref><ref name=":3">{{Cite web |date=2025-03-13 |title=Five years after the Covid pandemic, health experts are ready to say that it’s over |url=https://www.independent.co.uk/news/health/covid-pandemic-endemic-virus-b2714475.html |access-date=2026-03-04 |website=The Independent |language=en}}</ref> Cases and deaths from COVID-19 still remained high; in the United States, the only two infectious diseases causing more than 10,000 deaths a year were flu and COVID, according to an expert in ''The Washington Post''.<ref name=":0" />

      == Long-term effects ==
      === Economic ===
      Despite strong economic rebounds following the initial lockdowns in early 2020, towards the latter phases of the pandemic, many countries began to experience long-term economic effects. Several countries saw high [[inflation rate]]s which had global impacts, particularly in developing countries.<ref>{{#invoke:Cite|web |date=16 May 2023 |title=Post-pandemic world economy still feeling COVID-19's sting |url=https://news.un.org/en/story/2023/05/1136727 |access-date=30 July 2023 |website=UN News }}</ref> Some economic impacts such as [[supply chain]] and trade operations were seen as more permanent as the pandemic exposed major weaknesses in these systems.<ref>{{#invoke:Cite|news |date=23 June 2023 |title=Not Everything Is Getting Back to Normal In the Post-Pandemic Economy |work=Bloomberg.com |url=https://www.bloomberg.com/news/articles/2023-06-23/podcast-not-everything-is-getting-back-to-normal-in-the-post-pandemic-economy |access-date=30 July 2023}}</ref>

      In Australia, the pandemic caused an increase in [[occupational burnout]] in 2022.<ref>{{#invoke:Cite|web | vauthors = Churchill B, Bissell D, Ruppanner L |date=19 March 2023 |title=The 'great resignation' didn't happen in Australia, but the 'great burnout' did |url=http://theconversation.com/the-great-resignation-didnt-happen-in-australia-but-the-great-burnout-did-201173 |access-date=30 July 2023 |website=The Conversation }}</ref>

      During the pandemic, a large percentage of workers in Canada came to prefer working from home, which had an impact on the traditional work model. Some corporations made efforts to force workers to return to work on-site, while some embraced the idea.<ref>{{#invoke:Cite|web | vauthors = Granja AD, Champagne E, Choinière O |date=27 April 2023 |title=Post-pandemic work in the public sector: A new way forward or a return to the past? |url=http://theconversation.com/post-pandemic-work-in-the-public-sector-a-new-way-forward-or-a-return-to-the-past-204008 |access-date=30 July 2023 |website=The Conversation }}</ref>

      === Travel ===
      There was a "travel boom" causing air travel to recover at rates faster than anticipated, and the aviation industry became profitable in 2023 for the first time since 2019, before the pandemic.<ref>{{#invoke:Cite|web |date=5 June 2023 |title=IATA says airline industry is rapidly returning to profitability |url=https://www.euronews.com/2023/06/05/iata-says-air-passenger-numbers-have-almost-recovered-to-pre-covid-19-levels |access-date=30 July 2023 |website=euronews }}</ref> However, economic issues meant some predicted that the boom would begin to slow down.<ref>{{#invoke:Cite|web | vauthors = Sutherland B |date=28 July 2023 |title=Post-pandemic travel boom is running out of steam |url=https://www.japantimes.co.jp/commentary/2023/07/28/world/covid-travel-boom/ |access-date=30 July 2023 |website=The Japan Times }}</ref> Business travel on airlines was still below pre-pandemic levels and is predicted not to recover.<ref>{{#invoke:Cite|news | vauthors = Sugiura E, Wright R |date=7 July 2023 |title=Can the post-pandemic travel boom endure? |work=Financial Times |url=https://www.ft.com/content/f9cb24f5-8da8-4956-966b-a1348b79e151 |access-date=30 July 2023}}</ref>

      === Health ===
      An increase in excess deaths from underlying causes not related to COVID-19 has been largely blamed on systematic issues causing delays in health care and screening during the pandemic, which has resulted in an increase of non-COVID-19 related deaths.<ref>{{#invoke:Cite|web |title='Excess' Deaths Surging, but Why? |url=https://www.medscape.com/viewarticle/989530 |access-date=30 July 2023 |website=Medscape }}</ref> 

      === Immunisations ===
      During the pandemic, millions of children missed out on vaccinations as countries focused efforts on combating COVID-19. Efforts were made to increase vaccination rates among children in [[low-income countries]]. These efforts were successful in increasing vaccination rates for some diseases, though the UN noted that post-pandemic [[measles vaccination]]s were still falling behind.<ref>{{#invoke:Cite|web |date=17 July 2023 |title=Global immunisation rates show sign of post-pandemic rebound |url=https://news.un.org/en/story/2023/07/1138767 |access-date=30 July 2023 |website=UN News }}</ref>

      Some of the decrease in immunisation was driven by an increase in mistrust of public health officials. This was seen in both low-income and high-income countries. Several [[African countries]] saw a decline in vaccinations due to misinformation around the pandemic flowing into other areas.<ref>{{#invoke:Cite|web |title=COVID pandemic created immunisation gaps in Africa. Over half a million children are at risk |url=https://www.gavi.org/vaccineswork/covid-pandemic-created-immunisation-gaps-africa-over-half-million-children-are-risk |access-date=30 July 2023 |website=Gavi, the Vaccine Alliance }}</ref> Immunisation rates have yet to recover in the United States<ref>{{#invoke:Cite|web | vauthors = Joseph A |date=12 January 2023 |title=Routine vaccinations drop among U.S. kindergartners for the third year in a row |url=https://www.statnews.com/2023/01/12/routine-vaccinations-kindergartners/ |access-date=30 July 2023 |website=STAT }}</ref> and the United Kingdom.<ref>{{#invoke:Cite|news |date=24 April 2023 |title=Teenagers at risk after drop in vaccine take-up |work=BBC News |url=https://www.bbc.com/news/health-65372941 |access-date=30 July 2023}}</ref>

