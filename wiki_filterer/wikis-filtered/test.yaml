      In 2018, the overall college enrollment rate of recent high school graduates for all races was 68%; Asian Americans had the highest enrollment rate (78%), followed by Whites (70%), Hispanics (63%), and Blacks (62%).<ref>{{Cite web|date=2020-05-19|title=The Condition of Education 2020|url=https://nces.ed.gov/pubsearch/pubsinfo.asp?pubid=2020144|access-date=2020-11-14|website=U.S. Department of Education, National Center for Education Statistics}}</ref> Asian students also had the highest 6-year college graduation rate (74%), followed by Whites (64%), Hispanics (54%), and Blacks (40%).<ref>{{Cite web|date=2019-02-20|title=Status and Trends in the Education of Racial and Ethnic Groups 2018|url=https://nces.ed.gov/pubsearch/pubsinfo.asp?pubid=2019038|access-date=2020-11-14|website=U.S. Department of Education, National Center for Education Statistics}}</ref> Even at prestigious institutions, the graduation rate of white students is higher than that of black students.<ref>The Journal of Blacks in Higher Education. Black Student College Graduation Rates Remain Low, But Modest Progress Begins to Show. http://www.jbhe.com/features/50_blackstudent_gradrates.html</ref>

      The college enrollment rate increased for each racial and ethnic group between 1980 and 2007, but the enrollment rates for [[Black people|Blacks]] and [[Hispanics]] did not increase at the same rate as among White students. Between 1980 and 2007, the college enrollment rate for Blacks increased from 44% to 56% and the college enrollment rates for Hispanics increased from 50% to 62%. In comparison, the same rate increased from 49.8% to 77.7% for Whites. There are no data for Asians or American Indians/Alaska Natives regarding enrollment rates from the 1980s to 2007.<ref name="education2">{{cite web|date=July 2010|title=Status and Trends in the Education of Racial and Ethnic Groups|url=http://nces.ed.gov/pubs2010/2010015.pdf|publisher=U.S. Department of Education}}</ref>{{rp|118}}

      ===Illiteracy===
      African Americans were once denied education. Even as late as 1947, about one third of African Americans over 65 were considered to lack the literacy to read and write their own names. By 1969, however, [[illiteracy]] among African Americans was less than one percent, though African Americans still lag in more stringent definitions of document literacy. Inability to read, write or speak English in America today is largely an issue for immigrants, mostly from Asia and [[Latin America]].
