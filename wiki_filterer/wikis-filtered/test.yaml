      '''Coronavirus disease 2019''' ('''COVID-19''') is a [[contagious disease]] caused by the [[coronavirus]] [[SARS-CoV-2]]. Starting in January 2020, the disease spread worldwide, resulting in the [[COVID-19 pandemic]]. In March 2020, the [[World Health Organization]] declared COVID-19 a [[Public health emergency of international concern|global health emergency]]; they declared the end of the emergency in May 2023.<ref>{{Cite web |title=When Did the Pandemic Start and End? |url=https://www.nm.org/healthbeat/medical-advances/new-therapies-and-drug-trials/covid-19-pandemic-timeline |access-date=2026-02-16 |website=Northwestern Medicine |language=en-US |publication-date=April 2025}}</ref>

      The [[symptoms of COVID‑19]] can vary but often include fever,<ref>{{#invoke:Cite|journal |vauthors=Islam MA |date=April 2021 |title=Prevalence and characteristics of fever in adult and paediatric patients with coronavirus disease 2019 (COVID-19): A systematic review and meta-analysis of 17515 patients |journal=PLOS ONE |volume=16 |issue=4 |article-number=e0249788 |bibcode=2021PLoSO..1649788I |doi=10.1371/journal.pone.0249788 |pmc=8023501 |pmid=33822812 |doi-access=free |title-link=doi}}</ref> fatigue, cough, [[breathing difficulties]], [[anosmia|loss of smell]], and [[ageusia|loss of taste]].<ref>{{#invoke:Cite|journal |vauthors=Saniasiaya J, Islam MA |date=April 2021 |title=Prevalence of Olfactory Dysfunction in Coronavirus Disease 2019 (COVID-19): A Meta-analysis of 27,492 Patients |journal=The Laryngoscope |volume=131 |issue=4 |pages=865–878 |doi=10.1002/lary.29286 |issn=0023-852X |pmc=7753439 |pmid=33219539}}</ref><ref>{{#invoke:Cite|journal |vauthors=Saniasiaya J, Islam MA |date=November 2020 |title=Prevalence and Characteristics of Taste Disorders in Cases of COVID-19: A Meta-analysis of 29,349 Patients |journal=Otolaryngology–Head and Neck Surgery |volume=165 |issue=1 |pages=33–42 |doi=10.1177/0194599820981018 |pmid=33320033 |s2cid=229174644|url=http://pure-oai.bham.ac.uk/ws/files/185167818/COVID_19_and_taste_disorders_V1.pdf }}</ref><ref>{{#invoke:Cite|journal |vauthors=Agyeman AA, Chin KL, Landersdorfer CB, Liew D, Ofori-Asenso R |date=August 2020 |title=Smell and Taste Dysfunction in Patients With COVID-19: A Systematic Review and Meta-analysis |journal=Mayo Clin. Proc. |volume=95 |issue=8 |pages=1621–1631 |doi=10.1016/j.mayocp.2020.05.030 |pmc=7275152 |pmid=32753137}}</ref> Symptoms may begin one to 14 days [[incubation period|after exposure]] to the virus. At least a third of people who are infected [[asymptomatic|do not develop noticeable symptoms]].<ref>{{#invoke:Cite|journal |vauthors=Wang B, Andraweera P, Elliott S, Mohammed H, Lassi Z, Twigger A, Borgas C, Gunasekera S, Ladhani S, Marshall HS |title=Asymptomatic SARS-CoV-2 Infection by Age: A Global Systematic Review and Meta-analysis |journal=The Pediatric Infectious Disease Journal |date=March 2023 |volume=42 |issue=3 |pages=232–239 |doi=10.1097/INF.0000000000003791 |pmid=36730054 |pmc=9935239 }}</ref><ref>{{#invoke:Cite|journal |vauthors=Oran DP, Topol EJ |date=January 2021 |title=The Proportion of SARS-CoV-2 Infections That Are Asymptomatic: A Systematic Review |journal=Annals of Internal Medicine |volume=174 |issue=5 |pages=M20-6976 |doi=10.7326/M20-6976 |pmc=7839426 |pmid=33481642}}</ref> Of those who develop symptoms noticeable enough to be classified as patients, most (81%) develop mild to moderate symptoms (up to mild [[pneumonia]]), while 14% develop severe symptoms ([[dyspnea]], [[hypoxia (medical)|hypoxia]], or more than 50% lung involvement on imaging), and 5% develop critical symptoms ([[respiratory failure]], [[shock (circulatory)|shock]], or [[organ dysfunction|multiorgan dysfunction]]).<ref name="CDC Interim Guidance">{{#invoke:Cite|web|date=6 April 2020|title=Interim Clinical Guidance for Management of Patients with Confirmed Coronavirus Disease (COVID-19)|url=https://www.cdc.gov/coronavirus/2019-ncov/hcp/clinical-guidance-management-patients.html|archive-url=https://web.archive.org/web/20200302201644/https://www.cdc.gov/coronavirus/2019-ncov/hcp/clinical-guidance-management-patients.html|archive-date=2 March 2020|access-date=19 April 2020|website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref> Older people have a higher risk of developing severe symptoms and dying. Some people experience persistent symptoms ([[long COVID]]), for months or years after infection, including [[fatigue]], cognitive issues and [[shortness of breath]]. Damage to organs has been observed in a subset.<ref name="davis" /> 

      [[Transmission of COVID-19|COVID‑19 transmission]] occurs when infectious particles are breathed in or come into contact with the eyes, nose, or mouth. The risk is highest when people are in close proximity, but small [[airborne transmission|airborne]] particles containing the virus can remain suspended in the air and travel over longer distances, particularly indoors. Transmission can also occur when people touch their eyes, nose, or mouth after touching surfaces or objects that have been contaminated by the virus. People remain contagious for up to 20 days and can spread the virus even if they do not develop symptoms.<ref>{{#invoke:Cite|web |title=Coronavirus disease (COVID-19): How is it transmitted? |url=https://www.who.int/news-room/questions-and-answers/item/coronavirus-disease-covid-19-how-is-it-transmitted |access-date=13 April 2023 |website=[[World Health Organization]] (WHO) }}</ref>

      There are two common [[COVID-19 testing|tests to detect COVID]]. Antigen tests (also called [[COVID-19 rapid antigen test|rapid lateral flow test]]s) can be used at home. A positive test indicates an active infection. However, negative tests are not accurate, especially early or late in the infection. Health care providers can perform a more accurate [[PCR test]], which is typically analysed in a laboratory.<ref>{{cite web|url=https://www.cdc.gov/covid/testing/index.html|date=10 March 2025|access-date=26 January 2026|title=Testing for COVID-19|website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref><ref>{{cite web|url=https://www.nhs.uk/tests-and-treatments/covid-19-rapid-lateral-flow-test/|title=COVID-19 rapid lateral flow test|website=National Health Service (NHS)|access-date=26 January 2026|date=3 March 2025}}</ref>

      Several [[COVID-19 vaccine]]s have been approved and distributed in various countries, many of which have initiated [[deployment of COVID-19 vaccines|mass vaccination campaign]]s. Other [[pandemic prevention|preventive measure]]s include physical or [[social distancing]], [[quarantine|quarantining]], ventilation of indoor spaces, [[face masks during the COVID-19 pandemic|use of face masks or coverings]] in public, covering coughs and sneezes, [[hand washing]], and keeping unwashed hands away from the face. While [[COVID-19 drug development|drugs have been developed]] to inhibit the virus, the primary [[treatment and management of COVID-19|treatment]] is still [[symptomatic treatment|symptomatic]], managing the disease through [[symptomatic treatment|supportive care]], [[isolation (health care)|isolation]], and [[medical research|experimental measure]]s.

      The first known case was [[COVID-19 pandemic in Hubei|identified in Wuhan]],<!-- Wuhan is the capital of Hubei --> China, in December 2019.<ref name="WSJ-20210226">{{#invoke:Cite|news|vauthors=Page J, Hinshaw D, McKay B|title=In Hunt for Covid-19 Origin, Patient Zero Points to Second Wuhan Market – The man with the first confirmed infection of the new coronavirus told the WHO team that his parents had shopped there|url=https://www.wsj.com/articles/in-hunt-for-covid-19-origin-patient-zero-points-to-second-wuhan-market-11614335404|date=26 February 2021|work=[[The Wall Street Journal]]|access-date=27 February 2021}}</ref> Most scientists believe that the SARS-CoV-2 virus entered into human populations through natural [[zoonosis]], similar to the [[SARS-CoV-1]] and [[MERS-CoV]] outbreaks, and consistent with other pandemics in human history.<ref name="pekar">{{#invoke:Cite|journal|last1=Pekar|first1=Jonathan|title=The molecular epidemiology of multiple zoonotic origins of SARS-CoV-2|journal=Science|date=26 July 2022|volume=377|issue=6609|pages=960–966|doi=10.1126/science.abp8337|pmid=35881005|pmc=9348752|bibcode=2022Sci...377..960P}}</ref><ref name="jiang_wang">{{#invoke:Cite|journal|last1=Jiang|first1=Xiaowei|last2=Wang|first2=Ruoqi|title=Wildlife trade is likely the source of SARS-CoV-2|journal=Science|date=25 August 2022|volume=377|issue=6609|pages=925–926|doi=10.1126/science.add8384|pmid=36007033|bibcode=2022Sci...377..925J|s2cid=251843410|url=https://www.science.org/doi/10.1126/science.add8384|access-date=20 November 2022}}</ref> Social and environmental factors including [[climate change]], [[environmental degradation|natural ecosystem destruction]] and [[wildlife trade and zoonoses|wildlife trade]] increased the likelihood of such zoonotic spillover.<ref name="IPCC-2022a">{{#invoke:Cite|book|title=Terrestrial and Freshwater Ecosystems and Their Services. In: Climate Change 2022: Impacts, Adaptation and Vulnerability. Contribution of Working Group II to the Sixth Assessment Report of the Intergovernmental Panel on Climate Change|date=2022|publisher=IPCC|pages=233–235|url=https://www.ipcc.ch/report/ar6/wg2/downloads/report/IPCC_AR6_WGII_Chapter02.pdf|access-date=14 March 2023}}</ref><ref name="IPCC-2022b">{{#invoke:Cite|book|title=Health, Wellbeing, and the Changing Structure of Communities. In: Climate Change 2022: Impacts, Adaptation and Vulnerability. Contribution of Working Group II to the Sixth Assessment Report of the Intergovernmental Panel on Climate Change|date=2022|publisher=IPCC|pages=1067–1070|url=https://www.ipcc.ch/report/ar6/wg2/downloads/report/IPCC_AR6_WGII_Chapter07.pdf|access-date=14 March 2023}}</ref><ref name="University-of-Cambridge-2021">{{#invoke:Cite|web|title=Climate change may have driven the emergence of SARS-CoV-2|url=https://www.cam.ac.uk/research/news/climate-change-may-have-driven-the-emergence-of-sars-cov-2|website=University of Cambridge|date=5 February 2021|publisher=Science of the Total Environment|access-date=14 March 2023}}</ref><ref name="European-Commission">{{#invoke:Cite|web|title=Climate change the culprit in the COVID-19 pandemic|url=https://cordis.europa.eu/article/id/430229-climate-change-the-culprit-in-the-covid-19-pandemic|website=European Commission|access-date=24 March 2023}}</ref>

