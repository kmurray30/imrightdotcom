      {{COVID-19 pandemic sidebar}}
      <!-- Please discuss changes to the first sentence on the talk page, per current consensus item 19. -->

      The global '''COVID-19 pandemic''' (also known as the '''coronavirus pandemic'''), caused by severe acute respiratory syndrome coronavirus 2 ([[SARS-CoV-2]]), began with an outbreak in [[Wuhan]], China, in December 2019. It spread to other parts of Asia and [[COVID-19 pandemic by country and territory|then worldwide]] in early 2020. The [[World Health Organization]] (WHO) declared the outbreak a [[public health emergency of international concern]] (PHEIC) on 30 January 2020, and assessed it as having become a [[pandemic]] on 11 March.<ref name="start">{{#invoke:Cite|web|publisher=World Health Organization|url=https://www.who.int/news/item/27-04-2020-who-timeline---covid-19|title=Archived: WHO Timeline – COVID-19|date=27 April 2020|access-date=7 March 2024|archive-date=29 April 2020|archive-url=https://web.archive.org/web/20200429012212/https://www.who.int/news-room/detail/27-04-2020-who-timeline---covid-19|url-status=live}}</ref> The WHO declared the public health emergency caused by COVID-19 had ended in May 2023.<ref name=reuters/>

      [[COVID-19 symptoms]] range from [[asymptomatic]] to deadly, but most commonly include fever, [[sore throat]], [[nocturnal cough]], and fatigue. [[Transmission of COVID-19|Transmission of the virus]] is often [[airborne transmission|through airborne particle]]s. Mutations have [[variants of SARS-CoV-2|produced many strain]]s (variants) with varying degrees of infectivity and [[virulence]].<ref>{{#invoke:Cite|web |title=Clinical questions about COVID-19: Questions and answers |url=https://stacks.cdc.gov/view/cdc/89817 |website=CDC Stacks |date=25 June 2020 |access-date=26 May 2023}}</ref> [[COVID-19 vaccine]]s were developed rapidly and [[deployment of COVID-19 vaccines|deployed]] to the general public beginning in December 2020, made available through government and [[International organization|international]] programmes such as [[COVAX]], aiming to provide [[vaccine equity]]. [[Treatment and management of COVID-19|Treatment]]s include [[COVID-19 drug development|novel antiviral drug]]s and symptom control. Common mitigation measures during the public health emergency included [[travel restrictions related to the COVID-19 pandemic|travel restriction]]s, [[COVID-19 lockdowns|lockdown]]s, business restrictions and closures, [[workplace hazard controls for COVID-19|workplace hazard control]]s, [[face masks during the COVID-19 pandemic|mask mandate]]s, quarantines, [[COVID-19 testing|testing]] systems, and [[contact tracing]] of the infected.

      The pandemic caused severe [[social impact of the COVID-19 pandemic|social]] and [[economic impact of the COVID-19 pandemic|economic disruption]] around the world, including [[COVID-19 recession|the largest global recession]] since the [[Great Depression]].<ref name="RFXoH">{{#invoke:Cite|web | url=https://blogs.imf.org/2020/04/14/the-great-lockdown-worst-economic-downturn-since-the-great-depression/ | vauthors  = Gita G |title=The Great Lockdown: Worst Economic Downturn Since the Great Depression|website=IMF Blog|date=14 April 2020 |access-date=23 April 2020}}</ref> [[Shortages related to the COVID-19 pandemic|Widespread supply shortage]]s, including [[food security during the COVID-19 pandemic|food shortage]]s, were caused by [[2021–2022 global supply chain crisis|supply chain disruption]]s and [[panic buying]]. Reduced human activity led to an [[impact of the COVID-19 pandemic on the environment|unprecedented temporary decrease in pollution]]. Educational institutions and public areas were partially or fully [[Impact of the COVID-19 pandemic on education|closed in many jurisdictions]], and many events were cancelled or postponed during 2020 and 2021. [[Remote work|Telework]] became much more common for [[white-collar worker]]s as the pandemic evolved. [[COVID-19 misinformation|Misinformation circulated]] through social media and occasionally through mass media, and [[political impact of the COVID-19 pandemic|political tensions intensified]]. The pandemic raised issues of [[xenophobia and racism related to the COVID-19 pandemic|racial and geographic discrimination]], [[health equity]], and the balance between [[public health]] imperatives and [[individual and group rights|individual rights]].

      The disease has continued to circulate since 2023. By 2025, experts generally believed the pandemic to be over, having transitioned into the [[Endemic (epidemiology)|endemic phase]].<ref name=":0" /><ref name=":3" /> Different definitions of pandemics lead to different determinations of when they end.<ref name=timemarch2024/><ref name=charters2021/> As of {{COVID-19 data/Date|format=j F Y}}, COVID-19 has caused {{COVID-19 data/Text|XW|deaths}} confirmed deaths, and 18.2 to 33.5{{nbsp}}million estimated deaths.<ref name=Economist2023/> The pandemic was the fifth-[[deadliest pandemics in history|deadliest pandemic or epidemic in history]].

