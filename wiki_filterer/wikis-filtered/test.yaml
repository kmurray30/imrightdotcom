      ==Transfer admissions==
      {{Main|Transfer admissions in the United States}}

      While most college admissions involves high school students applying to colleges, [[Transfer admissions in the United States|transfer admissions]] are important as well. Estimates of the percentage of college students who transfer vary from 20%<ref name=twsMay2S113>{{cite news
       |author= David Moltz
       |title= More private colleges court community college transfers
       |newspaper= USA Today
       |date= February 18, 2010
       |url= https://www.usatoday.com/news/education/2010-02-18-IHE-transfer-students-18_ST_N.htm
       |access-date= May 19, 2012
      }}</ref> to 33%<ref name=twsMay2R311a>{{cite news
       |author= Lynn O'Shaughnessy
       |title= Transfer Students: 8 Things You Need to Know
       |newspaper= U.S. News & World Report
       |date= November 16, 2010
       |url= https://www.usnews.com/education/blogs/the-college-solution/2010/11/16/transfer-students-8-things-you-need-to-know
       |access-date= May 18, 2012
      }}</ref> to 60%,<ref name=twsMay2R311c>{{cite news
       |author= Bill Schackner
       |title= Transfers a hot commodity for colleges
       |newspaper= Pittsburgh Post-Gazette
       |date= March 28, 2012
       |url= http://www.post-gazette.com/stories/news/education/transfers-a-hot-commodity-for-colleges-240047/
       |access-date= May 18, 2012
      }}</ref> with the consensus position being around a third of college students transfer, and there are many indications that transfer activity is increasing.<ref name=twsMay2R311c/> One report suggested that nearly half of all undergraduates in the nation were attending community colleges.<ref name=tws2T26>{{cite news
       |author= Roman, Marcia A.
       |title= Community College Admission and Student Retention
       |work= Journal of College Admission 
       |quote= Community colleges enroll nearly half the undergraduates in the U.S.
       |date= January 1, 2007
       |url= http://www.highbeam.com/doc/1P3-1209566581.html
       |archive-url= https://archive.today/20130125103740/http://www.highbeam.com/doc/1P3-1209566581.html
       |url-status= dead
       |archive-date= January 25, 2013
       |access-date= August 20, 2012
      }}</ref> Media coverage of student transfers is generally less than coverage of the high school to college transition. A common transfer path is students moving from two-year community colleges to four-year institutions, although there is considerable movement between four-year institutions.<ref name=twsMay2R311d>{{cite news
       |author= Kim Clark
       |title= Obama's Lessons for Transfer Students: His former roommate talks about what he and Obama learned about switching between colleges
       |newspaper= U.S. News & World Report
       |date= January 16, 2009
       |url= https://www.usnews.com/education/articles/2009/01/16/obamas-lessons-for-transfer-students
       |access-date= May 18, 2012
      }}</ref> Reasons for transferring include unhappiness with campus life, cost, and course and degree selection.<ref name=twsMay2R311d/> There are no consistent national rules for transfers, and requirements vary by college.<ref name="twsMay2S312">{{cite news|author1=Allen Millett|author2=Leslie Goldberg|year=1999|title=E-Campus Discussion Lounge|newspaper=Washington Post|url=https://www.washingtonpost.com/wp-adv/liveonline/viewpoint/collink/collink120199.htm|access-date=May 19, 2012}}</ref> Many community colleges have [[Articulation (education)|articulation agreements]] with four-year schools, particularly [[Flagship university#Education|flagship]] state universities, so that matters such as the transfers of credits are handled appropriately. There are indications that many private colleges are more actively seeking transfer applicants.<ref name=twsMay2R311c/> Still, transferring can be difficult; transfer students have been described in the past as "academic nomads".<ref name=twsMay2S411>{{cite news
       |author= Tim Barker
       |title= Meet the transfers – they are academic nomads: Schools, government seek to streamline system to help more students make switch to four-year colleges, keep credit hours they have earned.
       |newspaper= St. Louis Today
       |date= February 5, 2012
       |url= https://www.stltoday.com/news/local/education/meet-the-transfers---they-are-academic-nomads/article_075d610e-dc58-5686-abfe-61c803e18594.html
       |access-date= May 19, 2012
      }}</ref>

      ==Criticism ==
      [[File:2021 College attendance, analyzed by race and schools' overall admission rates.svg|thumb|upright=1.25 |College attendance, analyzed by race and schools' overall admission rates.<ref name=NYTimes_20230703>{{cite news |last1=Arum |first1=Richard |last2=Stevens |first2=Mitchell L. |title=For Most College Students, Affirmative Action Was Never Enough |url=https://www.nytimes.com/interactive/2023/07/03/opinion/for-most-college-students-affirmative-action-was-not-enough.html |work=The New York Times |date=July 3, 2023 |archive-url=https://web.archive.org/web/20230703120500/https://www.nytimes.com/interactive/2023/07/03/opinion/for-most-college-students-affirmative-action-was-not-enough.html |archive-date=July 3, 2023 |url-status=live }} Data as of 2021. Data source: U.S. Department of Education.</ref> Shown by comparative areas of upper four pie charts, elite schools make up a small fraction of all enrollment.]]

      === Selectivity and later success ===

      Selective schools (especially highly selective schools like those in the Ivy League) have garnered a great deal of criticism regarding racial equity, the importance placed on the prestige or ranking of colleges, "holistic" admissions, and factors determining admissions. These issues affect a small percentage of college applicants, as roughly 3% of college applicants will matriculate at a college admitting less than half its applicants.<ref name=":0">{{Cite web |last=Thompson |first=Derek |date=2015-04-02 |title=The Inspirational 'It Doesn't Matter Where You Go to College' Meme Is Wrong |url=https://www.theatlantic.com/business/archive/2015/04/the-3-percent-crisis/389396/ |access-date=2022-06-21 |website=The Atlantic |language=en}}</ref>

      The selection criteria of highly-ranked colleges may be of little importance, as admittance to these schools may not affect later success.<ref name=":0" /><ref>{{Cite journal |last1=Dale |first1=Stacy Berg |last2=Krueger |first2=Alan B. |date=2002 |title=Estimating the Payoff to Attending a More Selective College: An Application of Selection on Observables and Unobservables |url=https://www.jstor.org/stable/4132484 |journal=The Quarterly Journal of Economics |volume=117 |issue=4 |pages=1491–1527 |doi=10.1162/003355302320935089 |jstor=4132484 |s2cid=17144446 |issn=0033-5533}}</ref> 

      On the one hand, most graduates of highly selective schools go on to lead moderately successful and fulfilling lives, but they do not become famous, influential, or extraordinarily wealthy.<ref name="Brooks">{{cite news |last1=Brooks |first1=David |author1-link=David Brooks (commentator) |title=How the Ivy League Broke America |url=https://www.theatlantic.com/magazine/archive/2024/12/meritocracy-college-admissions-social-economic-segregation/680392/ |work=[[The Atlantic]] |date=November 14, 2024}}</ref>  On the other hand, the extreme level of anxiety displayed by some applicants to highly selective schools and their parents has a rational basis, because there is a powerful correlation between graduation from a highly selective school and going on to a life full of exceptional achievement.  A 2024 descriptive study systematically analyzed the educational backgrounds of members of "30 different achievement groups totaling 26,198 people" and found that most groups were overwhelmingly dominated by graduates of 34 elite higher education institutions, especially Harvard University.<ref name="Wai">{{cite journal |last1=Wai |first1=Jonathan |last2=Anderson |first2=Stephen M. |last3=Perina |first3=Kaja |last4=Worrell |first4=Frank C. |last5=Chabris |first5=Christopher F. |author5-link=Christopher Chabris |title=The most successful and influential Americans come from a surprisingly narrow range of 'elite' educational backgrounds |journal=[[Humanities and Social Sciences Communications]] |date=September 3, 2024 |volume=11 |article-number=1129 |doi=10.1057/s41599-024-03547-8 |url=https://www.nature.com/articles/s41599-024-03547-8 |access-date=August 14, 2025|doi-access=free }}</ref>  The only two groups where graduates of elite institutions were not overwhelmingly dominant (but still formed a significant percentage) were four-star [[General (United States)|generals]] and four-star [[Admiral (United States)|admirals]].<ref name="Wai" />  As part of the same study, a survey was carried out of 1,810 people, and the participants consistently underestimated the percentages of nearly every achievement group who had attended an elite institution.<ref name="Wai" /> 

      === Litigation ===
      In 2018, there was a probe by the [[United States Department of Justice|Department of Justice]] into whether colleges practicing Early Admissions violated antitrust laws by sharing information about applicants.<ref name="twsNYT88592">Erica L. Green, April 10, 2018, [https://www.nytimes.com/2018/04/10/us/politics/justice-department-probe-college-early-decision.html Justice Department Launches Probe of College Early Admissions], 'The New York Times'', Retrieved April 11, 2018''</ref> The case ''[[Students for Fair Admissions v. President and Fellows of Harvard College]]'' proceeded to trial, alleging that Harvard's race-conscious admissions practices discriminate against Asians and putting affirmative action in the context of college admissions again into the judicial arena. In 2019, there was a [[2019 college admissions bribery scandal|notable admissions scandal]] in which affluent parents used unfair methods to get their children into competitive schools, involving cheating on standardized tests as well as bribes paid to college coaches and admissions personnel.<ref name="twsWashPost9442">Moriah Balingit, Nick Anderson, Susan Svrluga and Devlin Barrett, March 14, 2019, ''Washington Post'', [https://www.washingtonpost.com/local/education/in-the-wake-of-operation-varsity-blues-admissions-rescinded-at-usc/2019/03/14/26ba5164-4688-11e9-8aab-95b8d80a1e4f_story.html?wpisrc=nl_headlines&wpmm=1 Rescinded admissions, a class-action suit: Fallout from college scandal spreads], Retrieved March 15, 2018.</ref>

      === Wealth ===
      [[File:20230810 Ivy-Plus admission rates vs parent income percentile.svg |thumb|[[Ivy League|Ivy-Plus]] admissions rates vary with the income of the students' parents, with the acceptance rate of the top 0.1% income percentile being almost twice as much as other students.<ref name=OpportunityInsights_202307>{{cite web |last1=Chetty |first1=Raj |last2=Deming |first2=David J. |last3=Friedman |first3=John N. |title=Diversifying Society's Leaders? The Determinants and Consequences of Admission to Highly Selective Colleges |page=2 |url=https://opportunityinsights.org/wp-content/uploads/2023/07/CollegeAdmissions_Nontech.pdf |publisher=Opportunity Insights |archive-url=https://web.archive.org/web/20230731024342/https://opportunityinsights.org/wp-content/uploads/2023/07/CollegeAdmissions_Nontech.pdf |archive-date=July 31, 2023 |date=July 2023 |url-status=live}} Figure 3. "Ivy-Plus" refers to [[Ivy League]] schools plus others with similar prestige, rankings or selectivity.</ref>]]
      While many "elite" colleges intend to improve socioeconomic diversity by admitting poorer students, they may have economic incentives not to do so. Colleges are incentivized to admit students who are able to pay full tuition without aid. Additionally, college rankings, which have an effect on the students applying each year, penalize poor average standardized testing scores; colleges therefore admit students with higher scores,<ref>{{Cite news |last=Tough |first=Paul |date=2019-09-10 |title=What College Admissions Offices Really Want |language=en-US |work=The New York Times |url=https://www.nytimes.com/interactive/2019/09/10/magazine/college-admissions-paul-tough.html,%20https://www.nytimes.com/interactive/2019/09/10/magazine/college-admissions-paul-tough.html |access-date=2022-06-21 |issn=0362-4331}}</ref> who are typically also richer.<ref>{{Cite web |last=Kantrowitz |first=Mark |title=How Admissions Tests Discriminate Against Low-Income And Minority Student Admissions At Selective Colleges |url=https://www.forbes.com/sites/markkantrowitz/2021/05/21/how-admissions-tests-discriminate-against-low-income-and-minority-student-admissions-at-selective-colleges/ |access-date=2022-06-21 |website=Forbes |language=en}}</ref><ref>{{Cite news |title=These four charts show how the SAT favors rich, educated families |language=en-US |newspaper=Washington Post |url=https://www.washingtonpost.com/news/wonk/wp/2014/03/05/these-four-charts-show-how-the-sat-favors-the-rich-educated-families/ |access-date=2022-06-21 |issn=0190-8286}}</ref>

      Wealthier applicants also benefit from other advantages, like test-prep courses, private schools, international travel, and extracurricular activities, such as in athletics and music.<ref>{{Cite news |date=2014-07-25 |title=Ivy League miseducation |language=en-GB |work=BBC News |url=https://www.bbc.com/news/blogs-echochambers-28492894 |access-date=2022-06-21}}</ref>

      === Evaluation of candidate's personality ===
      Many universities choose to evaluate applicants based on subjective factors such as an admissions essay or letters of recommendation. This has been the source of disagreement, with detractors arguing that colleges lack the authority and knowledge to judge students according to personal characteristics, and that high schoolers should not be put under the impression that failure to gain admission is a critique of their personality. Critics also argue that holistic admissions is intended to justify selection that seems otherwise random,<ref>{{Cite web |last=Staff |first=Jason Willick {{!}} Senior |date=2012-10-01 |title=The 'holistic' admissions lie |url=https://www.dailycal.org/2012/10/01/the-holistic-admissions-lie/ |access-date=2022-06-21 |website=The Daily Californian |language=en-US}}</ref> or otherwise biased towards wealth and race.<ref>{{Cite web |last=Bovy |first=Phoebe Maltz |date=2013-12-17 |title=The False Promise of 'Holistic' College Admissions |url=https://www.theatlantic.com/education/archive/2013/12/the-false-promise-of-holistic-college-admissions/282432/ |access-date=2022-06-21 |website=The Atlantic |language=en}}</ref><ref>{{Cite news |last=Starkman |first=Ruth |date=2013-08-01 |title=Confessions of an Application Reader |language=en-US |work=The New York Times |url=https://www.nytimes.com/2013/08/04/education/edlife/lifting-the-veil-on-the-holistic-process-at-the-university-of-california-berkeley.html |access-date=2022-06-21 |issn=0362-4331}}</ref>

      The weighing of certain personality traits in analyzing a student has also become the subject of debate. For example, many highly-ranked schools state that they hold leadership qualities in high regard. To portray "leadership", students may feel the need to collect political positions without considering whether they're truly interested in the roles.<ref>{{Cite news |last=Cain |first=Susan |date=2017 |title=Not Leadership Material? Good. The World Needs Followers |work=New York Times |url=https://www.nytimes.com/2017/03/24/opinion/sunday/not-leadership-material-good-the-world-needs-followers.html}}</ref><ref>{{Cite magazine |last=Deresiewicz |first=William |date=2014-07-22 |title=Don't Send Your Kid to the Ivy League |magazine=The New Republic |url=https://newrepublic.com/article/118747/ivy-league-schools-are-overrated-send-your-kids-elsewhere |access-date=2022-06-21 |issn=0028-6583}}</ref> Furthermore, according to [[Helen Vendler]], a former [[Harvard University|Harvard]] professor, Harvard's focus on qualities such as leadership, service, and scientific interest is unlikely to attract future artists and writers.<ref>{{Cite web |last=Vendler |first=Helen |date=2012-10-15 |title=Writers and Artists at Harvard |url=https://www.harvardmagazine.com/2012/11/writers-and-artists-at-harvard |access-date=2022-06-21 |website=Harvard Magazine |language=en}}</ref>

