  - title: Reverse transcription polymerase chain reaction
    pageid: 235077
    extract: |-
      Reverse transcription polymerase chain reaction (RT-PCR) is a laboratory technique combining reverse transcription of RNA into DNA (in this context called complementary DNA or cDNA) and amplification of specific DNA targets using polymerase chain reaction (PCR). It is primarily used to measure the amount of a specific RNA. This is achieved by monitoring the amplification reaction using fluorescence, a technique called real-time PCR or quantitative PCR (qPCR). Combined RT-PCR and qPCR are routinely used for analysis of gene expression and quantification of viral RNA in research and clinical settings.
      The close association between RT-PCR and qPCR has led to metonymic use of the term qPCR to mean RT-PCR. Such use may be confusing, as RT-PCR can be used without qPCR, for example to enable molecular cloning, sequencing or simple detection of RNA. Conversely, qPCR may be used without RT-PCR, for example, to quantify the copy number of a specific piece of DNA.
    source: |-
      {{short description|Laboratory technique to multiply an RNA sample for study}}
      {{Redirect|RT-PCR|real-time polymerase chain reaction, also called quantitative real time polymerase chain reaction (qPCR) or kinetic polymerase chain reaction|Real-time polymerase chain reaction}}
      [[File:RT PCR Model.jpg|thumb|upright=1.6|RT-PCR]]
      '''Reverse transcription polymerase chain reaction''' ('''RT-PCR''') is a laboratory technique combining [[reverse transcription]] of [[RNA]] into [[DNA]] (in this context called [[complementary DNA]] or cDNA) and amplification of specific DNA targets using [[polymerase chain reaction]] (PCR).<ref name="pmid9894600">{{cite journal |vauthors=Freeman WM, Walker SJ, Vrana KE|author-link3=Kent Vrana |title=Quantitative RT-PCR: pitfalls and potential |journal=[[BioTechniques]] |volume=26 |issue=1 |pages=112–22, 124–5 |date=January 1999 |pmid=9894600 |doi= 10.2144/99261rv01|doi-access=free }}</ref> It is primarily used to measure the amount of a specific RNA. This is achieved by monitoring the amplification reaction using fluorescence, a technique called [[real-time polymerase chain reaction|real-time PCR]] or quantitative PCR (qPCR). Combined RT-PCR and qPCR are routinely used for analysis of [[gene expression]] and quantification of viral RNA in research and clinical settings.

      The close association between RT-PCR and qPCR has led to [[Metonymy|metonymic]] use of the term qPCR to mean RT-PCR. Such use may be confusing,<ref name="Mackay, Ian 2007 440">{{cite book |author=Mackay, Ian |title=Real-time PCR in Microbiology: From Diagnosis to Characterization |url=https://archive.org/details/realtimepcrmicro00mack |url-access=limited |publisher=Caister Academic Press |location=Norfolk, England |year=2007 |pages=[https://archive.org/details/realtimepcrmicro00mack/page/n449 440] |isbn=978-1-904455-18-9 }}</ref> as RT-PCR can be used without qPCR, for example to enable [[molecular cloning]], [[RNA-Seq|sequencing]] or simple detection of RNA. Conversely, qPCR may be used without RT-PCR, for example, to quantify the [[Copy number analysis|copy number]] of a specific piece of DNA.

      ==Nomenclature==

      The combined RT-PCR and qPCR technique has been described as quantitative RT-PCR<ref name="pmid12325527">{{cite book | author = Joyce C | chapter = Quantitative RT-PCR: A Review of Current Methodologies | title = RT-PCR Protocols | series = Methods Mol. Biol. | volume = 193 | pages = 83–92 | year = 2002 | pmid = 12325527 | doi = 10.1385/1-59259-283-X:083 | isbn = 978-1-59259-283-8 }}</ref> or real-time RT-PCR<ref name="pmid20515509">{{cite journal  |vauthors=Kang XP, Jiang T, Li YQ, etal |title=A duplex real-time RT-PCR assay for detecting H5N1 avian influenza virus and pandemic H1N1 influenza virus |journal=Virol. J. |volume=7 |article-number=113 |year=2010 |pmid=20515509 |pmc=2892456 |doi=10.1186/1743-422X-7-113 |doi-access=free }}</ref> (sometimes even called quantitative real-time RT-PCR<ref name="pmid15956331">{{cite journal |vauthors=Bustin SA, Benes V, Nolan T, Pfaffl MW |title=Quantitative real-time RT-PCR--a perspective |journal=J. Mol. Endocrinol. |volume=34 |issue=3 |pages=597–601 |date=June 2005 |pmid=15956331 |doi=10.1677/jme.1.01755 |citeseerx=10.1.1.528.6638 |s2cid=1754364 }}</ref>),  has been variously abbreviated as qRT-PCR,<ref name="pmid20204872">{{cite book |vauthors=Varkonyi-Gasic E, Hellens RP |title=Plant Epigenetics |chapter=qRT-PCR of Small RNAs |volume=631 |pages=109–22 |year=2010 |pmid=20204872 |doi=10.1007/978-1-60761-646-7_10 |series=Methods in Molecular Biology |isbn=978-1-60761-645-0 }}</ref> RT-qPCR,<ref name="pmid20215014">{{cite journal |vauthors=Taylor S, Wakem M, Dijkman G, Alsarraj M, Nguyen M |title=A practical approach to RT-qPCR-Publishing data that conform to the MIQE guidelines |journal=Methods |volume=50 |issue=4 |pages=S1–5 |date=April 2010 |pmid=20215014 |doi=10.1016/j.ymeth.2010.01.005 }}</ref> RRT-PCR,<ref name="pmid12202562">
      {{cite journal
       | vauthors=Spackman E, Senne DA, Myers TJ, et al
       | title=Development of a real-time reverse transcriptase PCR assay for type A influenza virus and the avian H5 and H7 hemagglutinin subtypes
       | journal=J. Clin. Microbiol.
       | volume=40 | issue=9 | pages=3256–60
       | date=September 2002
       | pmid=12202562 | pmc=130722 | doi= 10.1128/jcm.40.9.3256-3260.2002
      }}</ref> and rRT-PCR.<ref>
      {{Cite web
       |url=https://www.fda.gov/media/136151/download|archive-url=https://web.archive.org/web/20200321220417/https://www.fda.gov/media/136151/download|url-status=dead|archive-date=March 21, 2020|title=ACCELERATED EMERGENCY USE AUTHORIZATION (EUA) SUMMARY COVID-19 RT-PCR TEST (LABORATORY CORPORATION OF AMERICA)
       |website=FDA
       |access-date=3 April 2020
      }}</ref> In order to avoid confusion, the following abbreviations will be used consistently throughout this article:

      {| class="wikitable"
      |-
      ! Technique !! Abbreviation
      |-
      | Polymerase chain reaction || PCR
      |-
      | Reverse transcription polymerase chain reaction || RT-PCR
      |-
      | Real-time polymerase chain reaction || qPCR
      |-
      | RT-PCR / qPCR combined technique || qRT-PCR

      |}
      Not all authors, especially earlier ones, use this convention and the reader should be cautious when following links.  RT-PCR has been used to indicate both real-time PCR (qPCR) and reverse transcription PCR (RT-PCR).

      ==History==

      Since its introduction in 1977, [[Northern blot]] has been used extensively for RNA quantification despite its shortcomings: (a) time-consuming technique, (b) requires a large quantity of RNA for detection, and (c) quantitatively inaccurate in the low abundance of RNA content.<ref name="pmid414220">{{cite journal |vauthors=Alwine JC, Kemp DJ, Stark GR |title=Method for detection of specific RNAs in agarose gels by transfer to diazobenzyloxymethyl-paper and hybridization with DNA probes |journal=Proc. Natl. Acad. Sci. U.S.A. |volume=74 |issue=12 |pages=5350–4 |date=December 1977 |pmid=414220 |pmc=431715 |doi= 10.1073/pnas.74.12.5350|bibcode=1977PNAS...74.5350A |doi-access=free }}</ref><ref name="pmid19131955">{{cite journal |vauthors=Streit S, Michalski CW, Erkan M, Kleeff J, Friess H |title=Northern blot analysis for detection and quantification of RNA in pancreatic cancer cells and tissues |journal=Nat Protoc |volume=4 |issue=1 |pages=37–43 |year=2009 |pmid=19131955 |doi=10.1038/nprot.2008.216 |s2cid=24980302 }}</ref> However, since [[Polymerase chain reaction|PCR]] was invented by [[Kary Mullis]] in 1983, RT PCR has since displaced Northern blot as the method of choice for RNA detection and quantification.<ref>{{cite journal |author=Bustin SA |title=Absolute quantification of mRNA using real-time reverse transcription polymerase chain reaction assays |journal=J. Mol. Endocrinol. |volume=25 |issue=2 |pages=169–93 |date=October 2000 |pmid=11013345 |doi= 10.1677/jme.0.0250169|doi-access=free }}</ref>

      RT-PCR has risen to become the benchmark technology for the detection and/or comparison of RNA levels for several reasons: (a) it does not require post PCR processing, (b) a wide range (>10<sup>7</sup>-fold) of RNA abundance can be measured, and (c) it provides insight into both qualitative and quantitative data.<ref name="pmid15956331"/> Due to its simplicity, specificity and sensitivity, RT-PCR is used in a wide range of [[Applications of PCR|applications]] from experiments as simple as quantification of [[yeast|yeast cells]] in wine to more complex uses as diagnostic tools for detecting infectious agents such as the [[avian flu]] [[virus]] and [[SARS-CoV-2]].<ref name="pmid17088381">{{cite journal |vauthors=Hierro N, Esteve-Zarzoso B, González A, Mas A, Guillamón JM |title=Real-time quantitative PCR (QPCR) and reverse transcription-QPCR for detection and enumeration of total yeasts in wine |journal=Appl. Environ. Microbiol. |volume=72 |issue=11 |pages=7148–55 |date=November 2006 |pmid=17088381 |pmc=1636171 |doi=10.1128/AEM.00388-06 |bibcode=2006ApEnM..72.7148H }}</ref><ref name="pmid19627372">{{cite journal  |vauthors=Slomka MJ, Pavlidis T, Coward VJ, etal |title=Validated RealTime reverse transcriptase PCR methods for the diagnosis and pathotyping of Eurasian H7 avian influenza viruses |journal=Influenza and Other Respiratory Viruses |volume=3 |issue=4 |pages=151–64 |date=July 2009 |pmid=19627372 |pmc=4634683 |doi=10.1111/j.1750-2659.2009.00083.x }}</ref><ref>Mission summary: WHO Field Visit to Wuhan, China 20–21 January 2020: https://www.who.int/china/news/detail/22-01-2020-field-visit-wuhan-china-jan-2020</ref>

      == Principles ==

      In RT-PCR, the [[RNA]] template is first converted into a [[complementary DNA]] (cDNA) using a [[reverse transcriptase]] (RT). The cDNA is then used as a template for exponential amplification using PCR. The use of RT-PCR for the detection of RNA transcript has revolutionized the study of gene expression in the following important ways:
      * Made it theoretically possible to detect the transcripts of practically any gene<ref name="pmid18645596">{{cite journal  |vauthors=Deepak S, Kottapalli K, Rakwal R, etal |title=Real-Time PCR: Revolutionizing Detection and Expression Analysis of Genes |journal=Curr. Genomics |volume=8 |issue=4 |pages=234–51 |date=June 2007 |pmid=18645596 |pmc=2430684 |doi= 10.2174/138920207781386960}}</ref>
      * Enabled sample amplification and eliminated the need for abundant starting material required when using northern blot analysis<ref name="doi10.1677/jme.0.0290023">{{cite journal | author = Bustin SA | title = Quantification of mRNA using real-time reverse transcription PCR (RT-PCR): trends and problems | journal = J. Mol. Endocrinol. | volume = 29 | issue = 1 | pages = 23–39 |date=August 2002 | pmid = 12200227 | doi = 10.1677/jme.0.0290023 | doi-access = free }}</ref><ref name="pmid8862813">{{cite journal |vauthors=Souazé F, Ntodou-Thomé A, Tran CY, Rostène W, Forgez P |title=Quantitative RT-PCR: limits and accuracy |journal=BioTechniques |volume=21 |issue=2 |pages=280–5 |date=August 1996 |pmid=8862813 |doi= 10.2144/96212rr01|doi-access=free }}</ref>
      * Provided tolerance for RNA degradation as long as the RNA spanning the primer is intact<ref name="doi10.1677/jme.0.0290023"/>

      === One-step RT-PCR vs two-step RT-PCR ===
      [[File:One-step vs two-step RT-PCR.jpg|thumb|450px|One-step vs two-step RT-PCR]]
      The quantification of [[mRNA]] using RT-PCR can be achieved as either a one-step or a two-step reaction. The difference between the two approaches lies in the number of tubes used when performing the procedure. The two-step reaction requires that the reverse transcriptase reaction and PCR amplification be performed in separate tubes. The disadvantage of the two-step approach is susceptibility to contamination due to more frequent sample handling.<ref name="pmid16060372">{{cite journal|vauthors=Wong ML, Medrano JF|date=July 2005|title=Real-time PCR for mRNA quantitation|journal=BioTechniques|volume=39|issue=1|pages=75–85|doi=10.2144/05391rv01|pmid=16060372|doi-access=free}}</ref>  On the other hand, the entire reaction from cDNA synthesis to PCR amplification occurs in a single tube in the one-step approach. The one-step approach is thought to minimize experimental variation by containing all of the enzymatic reactions in a single environment. It eliminates the steps of pipetting cDNA product, which is labor-intensive and prone to contamination, to PCR reaction. The further use of inhibitor-tolerant [[thermostable DNA polymerase]]s, polymerase enhancers with an optimized one-step RT-PCR condition, supports the reverse transcription of the RNA from unpurified or crude samples, such as [[whole blood]] and [[serum (blood)|serum]].<ref>{{Cite journal|last1=Li|first1=Lang|last2=He|first2=Jian-an|last3=Wang|first3=Wei|last4=Xia|first4=Yun|last5=Song|first5=Li|last6=Chen|first6=Ze-han|last7=Zuo|first7=Hang-zhi|last8=Tan|first8=Xuan-Ping|last9=Ho|first9=Aaron Ho-Pui|last10=Kong|first10=Siu-Kai|last11=Loo|first11=Jacky Fong-Chuen|date=2019-08-01|title=Development of a direct reverse-transcription quantitative PCR (dirRT-qPCR) assay for clinical Zika diagnosis|journal=International Journal of Infectious Diseases|language=en|volume=85|pages=167–174|doi=10.1016/j.ijid.2019.06.007|issn=1201-9712|pmid=31202908|doi-access=free}}</ref><ref>{{Cite journal|last1=Bachofen|first1=Claudia|last2=Willoughby|first2=Kim|last3=Zadoks|first3=Ruth|last4=Burr|first4=Paul|last5=Mellor|first5=Dominic|last6=Russell|first6=George C.|date=2013-06-01|title=Direct RT-PCR from serum enables fast and cost-effective phylogenetic analysis of bovine viral diarrhoea virus|journal=Journal of Virological Methods|volume=190|issue=1|pages=1–3|doi=10.1016/j.jviromet.2013.03.015|pmid=23541784|issn=0166-0934}}</ref> However, the starting RNA templates are prone to degradation in the one-step approach, and the use of this approach is not recommended when repeated assays from the same sample is required. Additionally, the one-step approach is reported to be less accurate compared to the two-step approach. It is also the preferred method of analysis when using DNA binding dyes such as [[SYBR Green]] since the elimination of [[primer-dimer]]s can be achieved through a simple change in the [[melting point|melting temperature]]. Nevertheless, the one-step approach is a relatively convenient solution for the rapid detection of target RNA directly in biosensing.{{citation needed|date=April 2020}}

      === End-point RT-PCR vs real-time RT-PCR ===
      Quantification of RT-PCR products can largely be divided into two categories: end-point and real-time.<ref name="pmid11017702">{{cite journal |vauthors=Schmittgen TD, Zakrajsek BA, Mills AG, Gorn V, Singer MJ, Reed MW |s2cid=258810 |title=Quantitative reverse transcription-polymerase chain reaction to study mRNA decay: comparison of endpoint and real-time methods |journal=Anal. Biochem. |volume=285 |issue=2 |pages=194–204 |date=October 2000 |pmid=11017702 |doi=10.1006/abio.2000.4753 }}</ref> The use of end-point RT-PCR is preferred for measuring gene expression changes in small number of samples, but the real-time RT-PCR has become the gold standard method for validating quantitative results obtained from array analyses or gene expression changes on a global scale.<ref name="pmid11227069">{{cite journal |vauthors=Rajeevan MS, Vernon SD, Taysavang N, Unger ER |title=Validation of array-based gene expression profiles by real-time (kinetic) RT-PCR |journal=J Mol Diagn |volume=3 |issue=1 |pages=26–31 |date=February 2001 |pmid=11227069 |pmc=1907344 |doi=10.1016/S1525-1578(10)60646-0 }}</ref>

      ==== End-point RT-PCR ====

      The measurement approaches of end-point RT-PCR requires the detection of gene expression levels by the use of fluorescent dyes like [[ethidium bromide]],<ref name="pmid8195381">{{cite journal |vauthors=Stone-Marschat M, Carville A, Skowronek A, Laegreid WW |title=Detection of African horse sickness virus by reverse transcription-PCR |journal=J. Clin. Microbiol. |volume=32 |issue=3 |pages=697–700 |date=March 1994 |pmid=8195381 |pmc=263109 |doi= 10.1128/JCM.32.3.697-700.1994}}</ref><ref name="pmid7787020">{{cite journal |author=Minton AP |title=Confinement as a determinant of macromolecular structure and reactivity. II. Effects of weakly attractive interactions between confined macrosolutes and confining structures |journal=Biophys. J. |volume=68 |issue=4 |pages=1311–22 |date=April 1995 |pmid=7787020 |pmc=1282026 |doi=10.1016/S0006-3495(95)80304-8 |bibcode=1995BpJ....68.1311M }}</ref> [[Phosphorus-32|P32]] labeling of PCR products using [[phosphorimager]],<ref name="pmid22544908">{{cite journal |vauthors=Hsu M, Yu EY, Sprušanský O, McEachern MJ, Lue NF |title=Functional analysis of the single Est1/Ebs1 homologue in Kluyveromyces lactis reveals roles in both telomere maintenance and rapamycin resistance |journal=Eukaryotic Cell |volume=11 |issue=7 |pages=932–42 |date=July 2012 |pmid=22544908 |doi=10.1128/EC.05319-11 |pmc=3416500}}</ref> or by [[scintillation counting]].<ref name="pmid8862813"/> End-point RT-PCR is commonly achieved using three different methods: relative, competitive and comparative.<ref name="pmid18546601">{{cite journal |vauthors=Schmittgen TD, Livak KJ |title=Analyzing real-time PCR data by the comparative C(T) method |journal=Nat Protoc |volume=3 |issue=6 |pages=1101–8 |year=2008 |pmid=18546601 |doi= 10.1038/nprot.2008.73|s2cid=205464270 }}</ref><ref name=Tang>{{Citation | title = Advanced Techniques in Diagnostic Microbiology | author = Tang, Yi-Wei | isbn = 978-1461439691| date = 2012-09-13 | publisher = Springer }}</ref>

      ; Relative RT-PCR: Relative quantifications of RT-PCR involves the co-amplification of an internal control simultaneously with the gene of interest. The internal control is used to normalize the samples. Once normalized, a direct comparison of relative transcript abundances across multiple samples of mRNA can be made. One precaution to note is that the internal control must be chosen so that it is not affected by the experimental treatment. The expression level should be constant across all samples and with the mRNA of interest for the results to be accurate and meaningful. Because the quantification of the results are analyzed by comparing the linear range of the target and control amplification, it is crucial to take into consideration the starting target molecules concentration and their amplification rate prior to starting the analysis. The results of the analysis are expressed as the ratios of gene signal to internal control signal, which the values can then be used for the comparison between the samples in the estimation of relative target RNA expression.<ref name="pmid7787020"/><ref name="Tang"/><ref name="pmid7522722">{{cite journal |vauthors=Gause WC, Adamovicz J |title=The use of the PCR to quantitate gene expression |journal=Genome Research |volume=3 |issue=6 |pages=S123–35 |date=June 1994 |pmid=7522722 |doi= 10.1101/gr.3.6.s123|doi-access=free }}</ref>
      ; Competitive RT-PCR: Competitive RT-PCR technique is used for absolute quantification. It involves the use of a synthetic “competitor” RNA that can be distinguished from the target RNA by a small difference in size or sequence. It is important for the design of the synthetic RNA be identical in sequence but slightly shorter than the target RNA for accurate results. Once designed and synthesized, a known amount of the competitor RNA is added to experimental samples and is co-amplified with the target using RT-PCR. Then, a concentration curve of the competitor RNA is produced and it is used to compare the RT-PCR signals produced from the endogenous transcripts to determine the amount of target present in the sample.<ref name="Tang"/><ref name="pmid8922627">{{cite journal |vauthors=Tsai SJ, Wiltbank MC |title=Quantification of mRNA using competitive RT-PCR with standard-curve methodology |journal=BioTechniques |volume=21 |issue=5 |pages=862–6 |date=November 1996 |pmid=8922627 |doi= 10.2144/96215st04|doi-access=free }}</ref>
      ; Comparative RT-PCR: Comparative RT-PCR is similar to the competitive RT-PCR in that the target RNA competes for amplification reagents within a single reaction with an internal standard of unrelated sequence. Once the reaction is complete, the results are compared to an external standard curve to determine the target RNA concentration. In comparison to the relative and competitive quantification methods, comparative RT-PCR is considered to be the more convenient method to use since it does not require the investigator to perform a pilot experiment; in relative RT-PCR, the exponential amplification range of the mRNA must be predetermined and in competitive RT-PCR, a synthetic competitor RNA must be synthesized.<ref name="Tang"/><ref name="pmid12618301"/><ref name="pmid9888974">{{cite journal |vauthors=Halford WP, Falco VC, Gebhardt BM, Carr DJ |title=The inherent quantitative capacity of the reverse transcription-polymerase chain reaction |journal=Anal. Biochem. |volume=266 |issue=2 |pages=181–91 |date=January 1999 |pmid=9888974 |doi=10.1006/abio.1998.2913 |doi-access=free }}</ref><ref name="pmid20301000">{{cite book |author=King N |title=RT-PCR Protocols |chapter=The use of comparative quantitative RT-PCR to investigate the effect of cysteine incubation on GPx1 expression in freshly isolated cardiomyocytes |volume=630 |pages=215–32 |year=2010 |pmid=20301000 |doi=10.1007/978-1-60761-629-0_14 |series=Methods in Molecular Biology |isbn=978-1-60761-628-3 }}</ref><ref name="pmid12498992">{{cite journal  |vauthors=Chang JT, Chen IH, Liao CT, etal |title=A reverse transcription comparative real-time PCR method for quantitative detection of angiogenic growth factors in head and neck cancer patients |journal=Clin. Biochem. |volume=35 |issue=8 |pages=591–6 |date=November 2002 |pmid=12498992 |doi= 10.1016/S0009-9120(02)00403-4}}</ref>

      ==== Real-time RT-PCR ====

      The emergence of novel fluorescent DNA labeling techniques in the past few years has enabled the analysis and detection of PCR products in real-time and has consequently led to the widespread adoption of real-time RT-PCR for the analysis of gene expression.<ref name="lww/cmj/2021/09050/rt-rt-pc.5">{{cite journal |last1=Lu |first1=Rou-Jian |last2=Zhao |first2=Li |last3=Huang |first3=Bao-Ying |last4=Ye |first4=Fei |last5=Wang |first5=Wen-Ling |last6=Tan |first6=Wen-Jie |title=Real-time reverse transcription-polymerase chain reaction assay panel for the detection of severe acute respiratory syndrome coronavirus 2 and its variants |journal=Chinese Medical Journal |date=5 September 2021 |volume=134 |issue=17 |pages=2048–2053 |doi=10.1097/CM9.0000000000001687 |pmid=34402479 |pmc=8439998 }}</ref> Not only is real-time RT-PCR now the method of choice for quantification of gene expression, it is also the preferred method of obtaining results from [[Microarray analysis techniques|array analyses]] and gene expressions on a global scale.<ref name="iaea/covid_rt-rt-pcr">{{cite web |last1=Jawerth |first1=Nicole |title=How is the COVID-19 Virus Detected using real time reverse transcription–polymerase chain reaction? |url=https://www.iaea.org/newscenter/news/how-is-the-covid-19-virus-detected-using-real-time-rt-pcr |website=[[International Atomic Energy Agency]] |access-date=16 February 2023 |language=en |date=27 March 2020}}</ref> Currently, there are four different fluorescent DNA [[Hybridization probe|probes]] available for the real-time RT-PCR detection of PCR products: [[SYBR Green]], [[TaqMan]], [[molecular beacon]]s, and [[scorpion probe]]s. All of these probes allow the detection of PCR products by generating a fluorescent signal. While the SYBR Green dye emits its fluorescent signal simply by binding to the double-stranded DNA in solution, the TaqMan probes', molecular beacons' and scorpions' generation of fluorescence depend on [[Förster resonance energy transfer|Förster Resonance Energy Transfer (FRET)]] coupling of the dye molecule and a quencher moiety to the oligonucleotide substrates.<ref>{{Cite book | last1 = Holden | first1 = M. J. | last2 = Wang | first2 = L. | chapter = Quantitative Real-Time PCR: Fluorescent Probe Options and Issues | doi = 10.1007/4243_2008_046 | title = Standardization and Quality Assurance in Fluorescence Measurements II | series = Springer Series on Fluorescence | volume = 6 | pages = 489 | year = 2008 | isbn = 978-3-540-70570-3 | chapter-url = https://zenodo.org/record/1232956 }}</ref>

      ; [[SYBR Green]]: When the SYBR Green binds to the double-stranded DNA of the PCR products, it will emit light upon excitation. The intensity of the fluorescence increases as the PCR products accumulate. This technique is easy to use since designing of probes is not necessary given lack of specificity of its binding. However, since the dye does not discriminate the double-stranded DNA from the PCR products and those from the primer-dimers, overestimation of the target concentration is a common problem. Where accurate quantification is an absolute necessity, further assay for the validation of results must be performed. Nevertheless, among the real-time RT-PCR product detection methods, SYBR Green is the most economical and easiest to use.<ref name="pmid11017702"/><ref name="pmid11227069"/>
      [[File:Taqman.png|thumb|Taqman probes]]
      ; [[TaqMan]] probes: TaqMan probes are oligonucleotides that have a fluorescent probe attached to the 5' end and a quencher to the 3' end. During PCR amplification, these probes will hybridize to the target sequences located in the [[amplicon]] and as polymerase replicates the template with TaqMan bound, it also cleaves the fluorescent probe due to polymerase 5'- nuclease activity. Because the close proximity between the quench molecule and the fluorescent probe normally prevents fluorescence from being detected through FRET, the decoupling results in the increase of intensity of fluorescence proportional to the number of the probe cleavage cycles. Although well-designed TaqMan probes produce accurate real-time RT-PCR results, it is expensive and time-consuming to synthesize when separate probes must be made for each mRNA target analyzed.<ref name="pmid11017702"/><ref name="pmid18645596"/><ref name="pmid15613819">{{cite journal  |vauthors=Yang DK, Kweon CH, Kim BH, etal |title=TaqMan reverse transcription polymerase chain reaction for the detection of Japanese encephalitis virus |journal=J. Vet. Sci. |volume=5 |issue=4 |pages=345–51 |date=December 2004 |pmid=15613819 |doi= 10.4142/jvs.2004.5.4.345|doi-access=free }}</ref> Additionally, these probes are light sensitive and must be carefully frozen as aliquots to prevent degradation.
      ; [[Molecular beacon|Molecular beacon probes]]: Similar to the TaqMan probes, molecular beacons also make use of FRET detection with fluorescent probes attached to the 5' end and a quencher attached to the 3' end of an oligonucleotide substrate. However, whereas the TaqMan fluorescent probes are cleaved during amplification, molecular beacon probes remain intact and rebind to a new target during each reaction cycle. When free in solution, the close proximity of the fluorescent probe and the quencher molecule prevents fluorescence through FRET. However, when molecular beacon probes hybridize to a target, the fluorescent dye and the quencher are separated resulting in the emittance of light upon excitation. As is with the TaqMan probes, molecular beacons are expensive to synthesize and require separate probes for each RNA target.<ref name="pmid16060372"/>
      ; Scorpion probes: The scorpion probes, like molecular beacons, will not be fluorescent active in an unhybridized state, again, due to the fluorescent probe on the 5' end being quenched by the moiety on the 3' end of an oligonucleotide. With Scorpions, however, the 3' end also contains sequence that is complementary to the extension product of the primer on the 5' end. When the Scorpion extension binds to its complement on the amplicon, the Scorpion structure opens, prevents FRET, and enables the fluorescent signal to be measured.<ref name="pmid15240248">{{cite journal |vauthors=Sharkey FH, Banat IM, Marchant R |title=Detection and quantification of gene expression in environmental bacteriology |journal=Appl. Environ. Microbiol. |volume=70 |issue=7 |pages=3795–806 |date=July 2004 |pmid=15240248 |pmc=444812 |doi=10.1128/AEM.70.7.3795-3806.2004 |bibcode=2004ApEnM..70.3795S }}</ref>
      ; Multiplex probes: TaqMan probes, molecular beacons, and scorpions allow the concurrent measurement of PCR products in a single tube. This is possible because each of the different fluorescent dyes can be associated with a specific emission spectra. Not only does the use of multiplex probes save time and effort without compromising test utility, its application in wide areas of research such as gene deletion analysis, mutation and polymorphism analysis, quantitative analysis, and RNA detection, make it an invaluable technique for laboratories of many discipline.<ref name="pmid15240248"/><ref name="pmid17489437">{{cite journal |vauthors=Ratcliff RM, Chang G, Kok T, Sloots TP |title=Molecular diagnosis of medical viruses |journal=Curr Issues Mol Biol |volume=9 |issue=2 |pages=87–102 |date=July 2007 |pmid=17489437 }}</ref><ref name="pmid11023957">{{cite journal |vauthors=Elnifro EM, Ashshi AM, Cooper RJ, Klapper PE |title=Multiplex PCR: optimization and application in diagnostic virology |journal=Clin. Microbiol. Rev. |volume=13 |issue=4 |pages=559–70 |date=October 2000 |pmid=11023957 |pmc=88949 |doi= 10.1128/cmr.13.4.559-570.2000}}</ref>

      Two strategies are commonly employed to quantify the results obtained by real-time RT-PCR; the standard curve method and the comparative threshold method.<ref name="pmid16013967">{{cite journal |author=Bustin SA |s2cid=1833811 |title=Real-time, fluorescence-based quantitative PCR: a snapshot of current procedures and preferences |journal=Expert Rev. Mol. Diagn. |volume=5 |issue=4 |pages=493–8 |date=July 2005 |pmid=16013967 |doi=10.1586/14737159.5.4.493 }}</ref>

      == Application ==

      The exponential amplification via reverse transcription polymerase chain reaction provides for a highly sensitive technique in which a very low copy number of RNA molecules can be detected. RT-PCR is widely used in the diagnosis of genetic diseases and, semiquantitatively, in the determination of the abundance of specific different RNA molecules within a cell or tissue as a measure of [[Gene expression#Techniques and tools|gene expression]].

      === Research methods ===

      RT-PCR is commonly used in research methods to measure gene expression. For example, Lin et al. used qRT-PCR to measure expression of Gal genes in yeast cells. First, Lin et al. engineered a mutation of a protein suspected to participate in the regulation of Gal genes. This mutation was hypothesized to selectively abolish Gal expression. To confirm this, gene expression levels of yeast cells containing this mutation were analyzed using qRT-PCR. The researchers were able to conclusively determine that the mutation of this regulatory protein reduced Gal expression.<ref name="pmid22308403">{{cite journal |vauthors=Lin L, Chamberlain L, Zhu LJ, Green MR | title = Analysis of Gal4-directed transcription activation using Tra1 mutants selectively defective for interaction with Gal4 | journal = Proc. Natl. Acad. Sci. U.S.A. | volume = 109 | issue = 6 | pages = 1997–2002 |date=February 2012 | pmid = 22308403 | pmc = 3277556 | doi = 10.1073/pnas.1116340109 | bibcode = 2012PNAS..109.1997L | doi-access = free }}</ref> [[Northern blot]] analysis is used to study the RNA's gene expression further.

      === Gene insertion ===

      RT-PCR can also be very useful in the insertion of [[eukaryotic]] genes into [[prokaryotes]]. Because most eukaryotic genes contain [[introns]], which are present in the genome but not in the mature mRNA, the cDNA generated from a RT-PCR reaction is the exact (without regard to the error-prone nature of reverse transcriptases) DNA sequence that would be directly translated into [[protein]] after [[transcription (biology)|transcription]]. When these genes are expressed in prokaryotic cells for the sake of protein production or purification, the RNA produced directly from transcription need not undergo splicing as the transcript contains only [[exons]]. (Prokaryotes, such as E. coli, lack the mRNA splicing mechanism of eukaryotes).

      === Genetic disease diagnosis ===
      RT-PCR can be used to diagnose [[genetic disease]] such as [[Lesch–Nyhan syndrome]]. This genetic disease is caused by a malfunction in the [[HPRT1]] gene, which clinically leads to the fatal [[urinary stone|uric acid urinary stone]] and symptoms similar to [[gout]].{{clarify|text=[6]|date=April 2020}} Analyzing a pregnant mother and a [[fetus]] for mRNA expression levels of HPRT1 will reveal if the mother is a carrier and if the fetus will likely to develop Lesch–Nyhan syndrome.<ref name="pmid23046577">{{cite journal |vauthors=Torres RJ, Garcia MG, Puig JG | title = Carrier and prenatal diagnosis of Lesch-Nyhan disease due to a defect in HPRT gene expression regulation | journal = Gene | volume = 511 | issue = 2 | pages = 306–7 |date=December 2012 | pmid = 23046577 | doi = 10.1016/j.gene.2012.09.121 }}</ref>

      === Cancer detection ===
      Scientists are working on ways to use RT-PCR in [[cancer]] detection to help improve [[prognosis]], and monitor response to therapy. Circulating [[tumor cell]]s produce unique mRNA transcripts depending on the type of cancer. The goal is to determine which mRNA transcripts serve as the best [[biomarkers]] for a particular cancer cell type and then analyze its expression levels with RT-PCR.<ref name="pmid17525108">{{cite journal |vauthors=Xi L, Nicastri DG, El-Hefnawy T, Hughes SJ, Luketich JD, Godfrey TE | title = Optimal markers for real-time quantitative reverse transcription PCR detection of circulating tumor cells from melanoma, breast, colon, esophageal, head and neck, and lung cancers | journal = Clin. Chem. | volume = 53 | issue = 7 | pages = 1206–15 |date=July 2007 | pmid = 17525108 | doi = 10.1373/clinchem.2006.081828 | doi-access = free }}</ref>

      RT-PCR is commonly used in studying the genomes of [[virus]]es whose genomes are composed of RNA, such as [[Influenzavirus A]], [[retrovirus]]es like [[HIV]] and [[SARS-CoV-2]].<ref>{{cite web |title=Coronavirus: il viaggio dei test |url=https://www.iss.it/web/guest/primo-piano/-/asset_publisher/o4oGR9qmvUz9/content/id/5269706 |website=Istituto Superiore di Sanità}}</ref>

      === Pathogen detection ===

      [[Polymerase chain reaction#Infectious disease applications|PCR tests]] can be used for early detection of DNA-based pathogens through the amplification of a pathogen's DNA, even before the host begins producing [[antibodies]].<ref name="MedlinePlus 24">{{cite web |last1=Medline Plus |title=PCR Tests |url=https://medlineplus.gov/lab-tests/pcr-tests/ |website=National Library of Medicine |publisher=National Institutes of Health |access-date=21 March 2025 |archive-url=https://web.archive.org/web/20250316060703/https://medlineplus.gov/lab-tests/pcr-tests/ |archive-date=16 March 2025 |date=19 September 2024 |url-status=live}}</ref> RT-PCR allows this process to be applied to [[RNA virus]]es.<ref name="iaea/covid_rt-rt-pcr"/> RT-PCR tests are best known for their use in [[COVID-19 testing]]<ref name="Cleveland Clinic 25">{{cite web |last1=Cleveland Clinic |title=PCR Test |url=https://my.clevelandclinic.org/health/diagnostics/21462-covid-19-and-pcr-testing |access-date=21 March 2025 |archive-url=https://web.archive.org/web/20250304035130/https://my.clevelandclinic.org/health/diagnostics/21462-covid-19-and-pcr-testing |archive-date=4 March 2025 |date=21 January 2025 |url-status=live}}</ref> but have also been used to diagnose diseases such as [[Ebola]], [[Zika]], [[MERS]], [[SARS]], and [[influenza]].<ref name="iaea/covid_rt-rt-pcr"/><ref name="Cleveland Clinic 25"/>

      == Challenges ==

      Despite its major advantages, RT-PCR is not without drawbacks. The exponential growth of the reverse transcribed [[complementary DNA]] (cDNA) during the multiple cycles of PCR produces inaccurate end point quantification due to the difficulty in maintaining linearity.<ref name="pmid14664723">{{cite journal |author=Shiao YH |title=A new reverse transcription-polymerase chain reaction method for accurate quantification |journal=BMC Biotechnol. |volume=3 |article-number=22 |date=December 2003 |pmid=14664723 |pmc=317330 |doi=10.1186/1472-6750-3-22 |doi-access=free }}</ref> In order to provide accurate detection and quantification of RNA content in a sample, qRT-PCR was developed using fluorescence-based modification to monitor the amplification products during each cycle of PCR. The extreme sensitivity of the technique can be a double-edged sword since even the slightest DNA contamination can lead to undesirable results.<ref name="pmid9464395">{{cite journal |vauthors=Gettemy JM, Ma B, Alic M, Gold MH |title=Reverse transcription-PCR analysis of the regulation of the manganese peroxidase gene family |journal=Appl. Environ. Microbiol. |volume=64 |issue=2 |pages=569–74 |date=February 1998 |pmid=9464395 |pmc=106084 |doi= 10.1128/AEM.64.2.569-574.1998|bibcode=1998ApEnM..64..569G }}</ref> A simple method for elimination of false positive results is to include anchors, or [[Webtag (Software)|tags]], to the 5' region of a gene specific primer.<ref>{{cite journal|title=A simple method for elimination of false positive results in RT-PCR|journal=J Biochem Mol Biol|date=2002-03-31|first=Fatima|last=Martel|author2=Dirk Grundemann |author3=Edgar Schöig |volume=35|issue=2|pages=248–250|pmid=12297038|doi=10.5483/BMBRep.2002.35.2.248 |doi-access=free}}</ref> Additionally, planning and design of quantification studies can be technically challenging due to the existence of numerous sources of variation including template concentration and amplification efficiency.<ref name="pmid12618301">{{cite journal |vauthors=Ramakers C, Ruijter JM, Deprez RH, Moorman AF |title=Assumption-free analysis of quantitative real-time polymerase chain reaction (PCR) data |journal=Neurosci. Lett. |volume=339 |issue=1 |pages=62–6 |date=March 2003 |pmid=12618301 |doi= 10.1016/S0304-3940(02)01423-4|s2cid=9459695 }}</ref> Spiking in a known quantity of RNA into a sample, adding a series of RNA dilutions generating a standard curve, and adding in a no template copy sample (no cDNA) may used as controls.

      ==Protocol==
      {{how-to|section|date=August 2016}}
      RT-PCR can be carried out by the one-step RT-PCR protocol or the two-step RT-PCR protocol.

      ===One-step RT-PCR===
      One-step RT-PCR subjects mRNA targets (up to 6 kb) to reverse transcription followed by PCR amplification in a single test tube. Using intact, high-quality RNA and a sequence-specific primer will produce the best results.

      Once a one-step RT-PCR kit with a mix of reverse transcriptase, Taq DNA polymerase, and a proofreading polymerase is selected and all necessary materials and equipment are obtained a reaction mix is to be prepared. The reaction mix includes dNTPs, primers, template RNA, necessary enzymes, and a buffer solution. The reaction mix is added to a PCR tube for each reaction, followed by template RNA. The PCR tubes are then placed in a thermal cycler to begin cycling. In the first cycle, the synthesis of cDNA occurs. The second cycle is the initial denaturation wherein reverse transcriptase is inactivated. The remaining 40-50 cycles are the amplification, which includes denaturation, annealing, and elongation. When amplification is complete, the RT-PCR products can be analyzed with [[gel electrophoresis]].<ref>{{cite web|title=High Transcript Tools OneStep Kit|url=http://www.biotools.eu/reverse_transcription.html|url-status=dead|archive-url=https://web.archive.org/web/20130520151713/http://www.biotools.eu/reverse_transcription.html|archive-date=20 May 2013|access-date=12 December 2012|publisher=Biotools}}</ref><ref>{{cite book|last=Degen|first=Hans-Joachim|url=http://www.roche-applied-science.com/publications/print_mat/pcr_application_manual_3rd_edition.pdf|title=PCR Applications Manual|author2=Deufel, Annette|author3=Eisel, Doris|author4=Grünewald-Janho, Stefanie|author5=Keesey, Joe|publisher=Roche Diagnostics|year=2006|edition=3|pages=135–137}}</ref>

      ===Two-step RT-PCR===

      Two-step RT-PCR, as the name implies, occurs in two steps. First the reverse transcription and then the PCR. This method is more sensitive than the one-step method. Kits are also useful for two-step RT-PCR. Just as for one-step PCR, use only intact, high-quality RNA for the best results. The primer for two-step PCR does not have to be sequence-specific.

      ==== Step one ====
      First combine template RNA, primer, dNTP mix, and nuclease-free water in a PCR tube. Then, add an RNase inhibitor and reverse transcriptase to the PCR tube. Next, place the PCR tube into a thermal cycler for one cycle wherein annealing, extending, and inactivating of reverse transcriptase occurs. Finally, proceed directly to step two which is PCR, or store product on ice until PCR can be performed.

      ==== Step two ====
      Add master mix which contains buffer, dNTP mix, MgCl<sub>2</sub>, Taq polymerase, and nuclease-free water to each PCR tube. Then add the necessary primer to the tubes. Next, place the PCR tubes in a thermal cycler for 30 cycles of the amplification program. This includes denaturation, annealing, and elongation. The products of RT-PCR can be analyzed with gel electrophoresis.<ref>{{cite web|title=RT-PCR Two-Step Protocol|url=http://ocw.mit.edu/courses/biology/7-16-experimental-molecular-biology-biotechnology-ii-spring-2005/labs/rt_pcr_2step.pdf|publisher=MIT|access-date=12 December 2012}}</ref>

      == Publication guidelines ==

      Quantitative  RT-PCR assay is considered to be the gold standard for measuring the number of copies of specific cDNA targets in a sample but it is poorly standardized.<ref name="urlwww.microarrays.ca">{{cite web |url=http://www.microarrays.ca/about/reviews/Bustin_Review_July2009.pdf |title=www.microarrays.ca }}</ref> As a result, while there are numerous publications utilizing the technique, many provide inadequate experimental detail and use unsuitable data analysis to draw inappropriate conclusions. Due to the inherent variability in the quality of any quantitative PCR data, not only do reviewers have a difficult time evaluating these manuscripts, but the studies also become impossible to replicate.<ref>{{cite journal |author=Bustin SA |title=Why the need for qPCR publication guidelines?--The case for MIQE |journal=Methods |volume=50 |issue=4 |pages=217–26 |date=April 2010 |pmid=20025972 |doi=10.1016/j.ymeth.2009.12.006 }}</ref> Recognizing the need for the standardization of the reporting of experimental conditions, the [[Minimum Information for Publication of Quantitative Real-Time PCR Experiments]] ([[MIQE]], pronounced mykee) guidelines have been published by an international consortium of academic scientists including professors [[Stephen Bustin]], [[Michael W. Pfaffl|Michael Pfaffl]] and [[Mikael Kubista]]. The MIQE guidelines describe the minimum information necessary for evaluating [[quantitative PCR]] experiments that should be required for publication to encourage better experimental practice and ensuring the relevance, accuracy, correct interpretation, and repeatability of quantitative PCR data.<ref name="Bustin et al">{{cite journal  |vauthors=Bustin SA, Benes V, Garson JA, etal |title=The MIQE guidelines: minimum information for publication of quantitative real-time PCR experiments |journal=Clin. Chem. |volume=55 |issue=4 |pages=611–22 |date=April 2009 |pmid=19246619 |doi=10.1373/clinchem.2008.112797 |doi-access=free }}</ref>

      Besides reporting guidelines, the MIQE stresses the need to standardize the nomenclature associated with quantitative PCR to avoid confusion; for example, the abbreviation ''qPCR'' should be used for [[Real-time polymerase chain reaction|quantitative real-time PCR]], while ''RT-qPCR'' should be used for reverse transcription-qPCR, and genes used for normalization should be referred to as ''reference genes'' instead of ''[[housekeeping gene]]s''. It also proposes that commercially derived terms like ''TaqMan probes'' should not be used, but instead referred to as ''[[hydrolysis probes]]''. Additionally, it is proposed that the quantification cycle (Cq) be used to describe the PCR cycle used for quantification instead of the threshold cycle (Ct), crossing point (Cp), and takeoff point (TOP), which refer to the same value but were coined by different manufacturers of [[Quantitative PCR instrument|real-time instruments]].<ref name="urlwww.microarrays.ca"/>

      The guideline consists of the following elements: 1) experimental design, 2) sample, 3) nucleic acid extraction, 4) reverse transcription, 5) qPCR target information, 6) oligonucleotides, 7) protocol, 8) validation, and 9) data analysis. Specific items within each element carry a label of either E (essential) or D (desirable). Those labeled E are considered critical and indispensable while those labeled D are considered peripheral yet important for best practices.<ref name="Bustin et al"/>

      Conferences and courses on RT-qPCR and the use of the [[MIQE guidelines]] are regularly arranged by Professor [[Michael W. Pfaffl|Michael Pfaffl]] at the Technical University of Munich, Professor [[Mikael Kubista]] at the Institute of Biotechnology, [[Czech Academy of Sciences]], Professor Vladimir Benes at the [[European Molecular Biology Laboratory]] (EMBL) in Heidelberg, and Professor [[Stephen Bustin]] at the [[Anglia Ruskin University]] in London. Together they support training at Precision BioAnalytics at GoCo Health Innovation City in Gothenburg, Sweden, after discontinuing the courses at [[TATAA Biocenter]] after the overtake by Care Equity.

      == Research ==

      In 2023, researchers developed a working prototype of an RT-LAMP [[lab-on-a-chip]] system, which provided results for SARS-CoV-2 tests within three minutes. The technology integrates microfluidic channels into printed circuit boards with, which may enable low-cost mass production.<ref name="pmid37740394">{{cite journal |vauthors=Papamatthaiou S, Boxall-Clasby J, Douglas EJ, Jajesniak P, Peyret H, Mercer-Chalmers J, Kumar VK, Lomonossoff GP, Reboud J, Laabei M, Cooper JM, Kasprzyk-Hordern B, Moschou D |title=LoCKAmp: lab-on-PCB technology for <3 minute virus genetic detection |journal=[[Lab on a Chip]] |volume=23 |issue=20 |pages=4400–4412 |date=October 2023 |pmid=37740394 |pmc=10563828 |doi=10.1039/d3lc00441d}}</ref><ref name="Engineer 2023">{{cite web |title=LoCKAmp diagnosis device hailed as 'world's fastest Covid test' |website=[[The Engineer (UK magazine)|The Engineer]] |date=2 November 2023 |url=https://www.theengineer.co.uk/content/news/lockamp-diagnosis-device-hailed-as-world-s-fastest-covid-test/ |access-date=29 October 2024}}</ref>

