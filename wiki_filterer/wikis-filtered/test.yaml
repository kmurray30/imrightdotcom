      === Long-term trends ===
      The National Assessment of Educational Progress (NAEP) has been testing seventeen-year-olds since 1971. From 1971 to 1996, the black-white reading gap shrank by almost one half and the math gap by almost one third.<ref name="Jencks C 1998">Jencks C, Phillips M. 1998. The black-white test score gap: an introduction. In The Black- White Test Score Gap: an Introduction, ed. C Jencks, M Phillips. Washington, DC: Brookings Institution</ref> Specifically, blacks scored an average of 239 points, and whites scored an average of 291 points on the NAEP reading tests in 1971. In 1990, blacks scored an average of 267, and whites scored an average of 297 points. On NAEP math tests in 1973, blacks scored an average of 270, and whites scored 310. In 1990, black average score was 289 and whites scored an average of 310 points. For Hispanics, the average NAEP math score for seventeen-year-olds in 1973 was 277 and 310 for whites. In 1990, the average score among Hispanics was 284 compared with 310 for whites.<ref name="Miller LS 1995"/>

      Because of small population size in the 1970s, similar trend data are not available for Asian Americans. Data from the 1990 NAEP Mathematics Assessment Tests show that among twelfth graders, Asians scored an average of 315 points compared with 301 points for whites, 270 for blacks, 278 for Hispanics, and 290 for Native Americans.<ref name="Jencks C 1998"/> Racial and ethnic differentiation is most apparent at the highest achievement levels. Specifically, 13% of Asians performed at level of 350 points or higher, 6% of whites, less than 1% of blacks, and 1% of Hispanics did so.<ref name="Jencks C 1998"/>

      The NAEP has since collected and analyzed data through 2008. Overall, the White-Hispanic and the White-Black gap for NAEP scores have significantly decreased since the 1970s.<ref name="nation4">The Nation's Report Card. 2008 Long Term Trend Report Card. http://nationsreportcard.gov/ltt_2008/ltt0001.asp</ref>
      The Black-White Gap demonstrates:<ref name="nation4"/>
      * In mathematics, the gap for 17-year-olds was narrowed by 14 points from 1973 to 2008.
      * In reading, the gap for 17-year-olds was narrowed by 24 points from 1971 to 2008.
      The Hispanic-White Gap demonstrates:<ref name="nation4"/>
      * In mathematics, the gap for 17-year-olds was narrowed by 12 points from 1973 to 2008.
      * In reading, the gap for 17-year-olds was narrowed by 15 points from 1975 to 2008.

      Furthermore, subgroups showed predominant gains in 4th grade at all achievement levels. In terms of achieving proficiency, gaps between subgroups in most states have narrowed across grade levels, yet had widened in 23% of instances. The progress made in elementary and middle schools was greater than that in high schools, which demonstrates the importance of early childhood education. Greater gains were seen in lower-performing subgroups rather than in higher-performing subgroups. Similarly, greater gains were seen in Latino and African American subgroups than for low-income and Native American subgroups.<ref>Chudowsky & Kober. (2007). Are Achievement Gaps Closing and Is Achievement Rising for All? Center on Education Policy.</ref>

