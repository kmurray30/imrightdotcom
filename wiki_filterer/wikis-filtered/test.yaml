      Accuracy is measured in terms of specificity and selectivity. Test errors can be false positives (the test is positive, but the virus is not present) or false negatives, (the test is negative, but the virus is present).<ref name="popsci-2020-5-10">{{cite web | vauthors = Ferran M |date=7 May 2020 |title=COVID-19 tests are far from perfect, but accuracy isn't the biggest problem |url=https://www.popsci.com/story/science/covid-test-inaccuracies/ |url-status=live |archive-url= https://web.archive.org/web/20200511133224/https://www.popsci.com/story/science/covid-test-inaccuracies/ |archive-date=11 May 2020 |access-date=10 May 2020 |website=Popular Science}}</ref> In a study of over 900,000 rapid antigen tests, false positives were found to occur at a rate of 0.05% or 1 in 2000.<ref>{{Cite journal |last1=Gans |first1=Joshua S. |last2=Goldfarb |first2=Avi |last3=Agrawal |first3=Ajay K. |last4=Sennik |first4=Sonia |last5=Stein |first5=Janice |last6=Rosella |first6=Laura |date=1 February 2022 |title=False-Positive Results in Rapid Antigen Tests for SARS-CoV-2 |url=https://doi.org/10.1001/jama.2021.24355 |journal=JAMA |volume=327 |issue=5 |pages=485–486 |doi=10.1001/jama.2021.24355 |pmid=34994775 |pmc=8742218 |issn=0098-7484}}</ref>

      === Sensitivity and specificity ===
      {{Main|Sensitivity and specificity}}
      Sensitivity indicates whether the test accurately identifies whether the virus is present. Each test requires a minimum level of [[viral load]] in order to produce a positive result. A 90% sensitive test will correctly identify 90% of infections, missing the other 10% (a false negative). Even relatively high sensitivity rates can produce high rates of false negatives in populations with low incidence rates.<ref name="popsci-2020-5-10" />

      In a diagnostic test, sensitivity is a measure of how well a test can identify true positives and specificity is a measure of how well a test can identify true negatives. For all testing, both diagnostic and screening, there is usually a trade-off between sensitivity and specificity, such that higher sensitivities will mean lower specificities and vice versa. [[File:PPV, NPV, Sensitivity and Specificity.svg|thumb|350x350px|Sensitivity and Specificity]] A 90% specific test will correctly identify 90% of those who are uninfected, leaving 10% with a false positive result.{{citation needed|date=November 2021}}

      Low-specificity tests have a low [[positive predictive value]] (PPV) when prevalence is low. For example, suppose incidence is 5%. Testing 100 people at random using a test that has a [[Sensitivity and specificity|specificity]] of 95% would yield on average 5 people who are actually negative who would incorrectly test positive. Since 5% of the subjects actually are positive, another five would also test positive correctly, totaling 10 positive results. Thus, the PPV is 50%,<ref>{{cite web |date=14 May 2020 |title=Serological testing for SARS-CoV-2 antibodies |url=https://www.ama-assn.org/delivering-care/public-health/serological-testing-sars-cov-2-antibodies |url-status=live |archive-url=https://web.archive.org/web/20200528223018/https://www.ama-assn.org/delivering-care/public-health/serological-testing-sars-cov-2-antibodies |archive-date=28 May 2020 |access-date=29 May 2020 |website=American Medical Association}}</ref> an outcome no different from a coin toss. In this situation, assuming that the result of a second test is [[Independence (probability theory)|independent]] of the first test, retesting those with a first positive result increases the PPV to 94.5%, meaning that only 4.5% of the second tests would return the incorrect result, on average less than 1 incorrect result.<ref name="cdc_antibody">{{cite web |date=23 May 2020 |title=Interim Guidelines for COVID-19 Antibody Testing |url=https://www.cdc.gov/coronavirus/2019-ncov/lab/resources/antibody-tests-guidelines.html |url-status=live |archive-url=https://web.archive.org/web/20200529010818/https://www.cdc.gov/coronavirus/2019-ncov/lab/resources/antibody-tests-guidelines.html |archive-date=29 May 2020 |access-date=29 May 2020 |website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref>

      === Causes of test error ===

      The time course of infection affects the accuracy of some tests. Samples may be collected before the virus has a chance to establish itself or after the body has begun to eliminate it. A May 2020 review of PCR-RT testing found that the median probability of a false-negative result decreased from 100% on day 1 to 67% on day 4. On the day of symptom onset, the probability was 38%, which decreased to 20% 3 days later.<ref name="Kucirka">{{cite journal | vauthors = Kucirka LM, Lauer SA, Laeyendecker O, Boon D, Lessler J | title = Variation in False-Negative Rate of Reverse Transcriptase Polymerase Chain Reaction-Based SARS-CoV-2 Tests by Time Since Exposure | journal = Annals of Internal Medicine | volume = 173 | issue = 4 | pages = 262–267 | date = August 2020 | pmid = 32422057 | pmc = 7240870 | doi = 10.7326/M20-1495 }}</ref>{{Update inline|date=March 2021}}

      ===PCR-based test===
      [[File:Fig4-positivity-rate(1).png|thumb|Detection of SARS-CoV-2 by nasal swab over six weeks in patients who experienced mild to moderate illness]]
      RT-PCR is the most commonly used diagnostic test.<ref>{{cite news |title=RT-PCR Testing |url=https://www.idsociety.org/covid-19-real-time-learning-network/diagnostics/RT-pcr-testing/ |url-status=live |archive-url=https://web.archive.org/web/20210624063704/https://www.idsociety.org/covid-19-real-time-learning-network/diagnostics/RT-pcr-testing/ |archive-date=24 June 2021 |access-date=16 February 2021 |website=www.idsociety.org }}</ref> PCR tests by nasopharyngeal swab have a sensitivity of 73%, but systematic analysis of specificity has not been determined due to the lack of PCR studies with a control group.<ref>{{cite journal | vauthors = Böger B, Fachi MM, Vilhena RO, Cobre AF, Tonin FS, Pontarolo R | title = Systematic review with meta-analysis of the accuracy of diagnostic tests for COVID-19 | journal = American Journal of Infection Control | volume = 49 | issue = 1 | pages = 21–29 | date = January 2021 | pmid = 32659413 | pmc = 7350782 | doi = 10.1016/j.ajic.2020.07.011 }}</ref>

      In one study, the positivity rate was highest at week one (100%), followed by 89.3%, 66.1%, 32.1%, 5.4% and zero by week six since symptom onset.<ref>{{cite journal | vauthors = Xiao AT, Tong YX, Zhang S | title = Profile of RT-PCR for SARS-CoV-2: A Preliminary Study From 56 COVID-19 Patients | journal = Clinical Infectious Diseases | volume = 71 | issue = 16 | pages = 2249–2251 | date = November 2020 | pmid = 32306036 | pmc = 7188124 | doi = 10.1093/cid/ciaa460 | doi-access = free }}</ref>

      Sensitivity is also a function of the number of PCR cycles, as well as time and temperature between sample collection and analysis.<ref name="pmid33748564">{{cite journal | vauthors = Engelmann I, Alidjinou EK, Ogiez J, Pagneux Q, Miloudi S, Benhalima I, Ouafi M, Sane F, Hober D, Roussel A, Cambillau C, Devos D, Boukherroub R, Szunerits S | title = Preanalytical Issues and Cycle Threshold Values in SARS-CoV-2 Real-Time RT-PCR Testing: Should Test Results Include These? | journal = ACS Omega | volume = 6 | issue = 10 | pages = 6528–6536 | date = March 2021 | pmid = 33748564 | pmc = 7970463 | doi = 10.1021/acsomega.1c00166  | doi-access = free}}</ref> A cycle threshold of 20&nbsp;cycles would be adequate to detect SARS-Cov-2 in a highly infective person.<ref name="pmid33748564" /> Cycle thresholds above 34 are increasingly likely to give false positives outside of high biosafety level facilities.<ref name="pmid33748564" />

      In July 2020, [[Anthony Fauci]] of the US NIH indicated that positive results obtained from RT-PCR tests run at more than 35 cycles were almost always "just dead nucleotides".<ref>{{cite web|vauthors=Fauci A|date=16 July 2020|title=This Week in Virology|website=[[YouTube]]|url=https://www.youtube.com/watch?v=a_Vy6fgaBPE|at=4:20|access-date=30 August 2021|archive-date=21 February 2022|archive-url=https://web.archive.org/web/20220221195248/https://www.youtube.com/watch?v=a_Vy6fgaBPE|url-status=live}}</ref> In August 2020, it was reported that, "In three sets of testing data that include cycle thresholds, compiled by officials in Massachusetts, New York and Nevada ... most tests set the limit at 40 [cycles], a few at 37" and that the CDC was examining the use of cycle threshold measures "for policy decisions,"<ref>{{cite news|vauthors=Mandavilli A|date=29 August 2020|title=Your Coronavirus Test Is Positive. Maybe It Shouldn't Be.|work=The New York Times|url=https://www.nytimes.com/2020/08/29/health/coronavirus-testing.html|access-date=30 August 2021|issn=0362-4331|archive-date=18 February 2022|archive-url=https://web.archive.org/web/20220218141755/https://www.nytimes.com/2020/08/29/health/coronavirus-testing.html|url-status=live}}</ref> On 21 July 2021, the CDC, in their "Real-Time RT-PCR Diagnostic Pan: Instructions for Use", indicated tests results should be determined at 40 cycles.<ref>{{cite web|last=US CDC|date=20 July 2021|title=Real-Time RT-PCR Diagnostic Panel: Instructions for Use|website=[[Food and Drug Administration]]|url=https://www.fda.gov/media/134922/download|access-date=30 August 2021|page=35|archive-date=15 February 2022|archive-url=https://web.archive.org/web/20220215121633/https://www.fda.gov/media/134922/download|url-status=live}}</ref>

      A Dutch CDC-led laboratory investigation compared 7 PCR kits.<ref name=":6">{{cite journal | vauthors = van Kasteren PB, van der Veer B, van den Brink S, Wijsman L, de Jonge J, van den Brandt A, Molenkamp R, Reusken CB, Meijer A | title = Comparison of seven commercial RT-PCR diagnostic kits for COVID-19 | journal = Journal of Clinical Virology | volume = 128 | article-number = 104412 | date = July 2020 | pmid = 32416600 | pmc = 7206434 | doi = 10.1016/j.jcv.2020.104412 }}</ref> Test kits made by BGI, R-Biopharm AG, BGI, KH Medical and Seegene showed high sensitivity.<ref>{{cite web |date=20 May 2020 |title=Chinese Covid-19 test kit outstrips alternatives in Dutch study |url=https://www.scmp.com/news/china/science/article/3085263/chinese-covid-19-test-kit-outstrips-foreign-alternatives-dutch |url-status=live |archive-url=https://web.archive.org/web/20200523112624/https://www.scmp.com/news/china/science/article/3085263/chinese-covid-19-test-kit-outstrips-foreign-alternatives-dutch |archive-date=23 May 2020 |access-date=23 May 2020 |website=South China Morning Post}}</ref>

      High sensitivity kits are recommended to assess people without symptoms, while lower sensitivity tests are adequate when diagnosing symptomatic patients.<ref name=":6" />

      The [[University of Oxford]]'s [[Centre for Evidence-Based Medicine]] (CEBM) has pointed to mounting evidence<ref>{{cite web | vauthors = Heneghan C, Jefferson T |date=1 September 2020 |title=Virological characterization of COVID-19 patients that test re-positive for SARS-CoV-2 by RT-PCR |url=https://www.cebm.net/study/virological-characterization-of-covid-19-patients-that-test-re-positive-for-sars-cov-2-by-rt-pcr |url-status=live |archive-url=https://web.archive.org/web/20210618082124/https://www.cebm.net/study/virological-characterization-of-covid-19-patients-that-test-re-positive-for-sars-cov-2-by-rt-pcr |archive-date=18 June 2021 |access-date=19 September 2020 |website=CEBM}}</ref><ref>{{cite journal | vauthors = Lu J, Peng J, Xiong Q, Liu Z, Lin H, Tan X, Kang M, Yuan R, Zeng L, Zhou P, Liang C, Yi L, du Plessis L, Song T, Ma W, Sun J, Pybus OG, Ke C | title = Clinical, immunological and virological characterization of COVID-19 patients that test re-positive for SARS-CoV-2 by RT-PCR | journal = eBioMedicine | volume = 59 | article-number = 102960 | date = September 2020 | pmid = 32853988 | pmc = 7444471 | doi = 10.1016/j.ebiom.2020.102960 }}</ref> that "a good proportion of 'new' mild cases and people re-testing positives via RT-PCR after quarantine or discharge from hospital are not infectious, but are simply clearing harmless virus particles which their immune system has efficiently dealt with", and have called for "an international effort to standardize and periodically calibrate testing".<ref name = "Spencer_2020" /> On 7 September, the UK government issued "guidance for procedures to be implemented in laboratories to provide assurance of positive SARS-CoV-2 RNA results during periods of low prevalence, when there is a reduction in the predictive value of positive test results".<ref>{{cite web |title=SARS-CoV-2 RNA testing: assurance of positive results during periods of low prevalence |url=https://www.gov.uk/government/publications/sars-cov-2-rna-testing-assurance-of-positive-results-during-periods-of-low-prevalence |url-status=live |archive-url=https://web.archive.org/web/20210506094450/https://www.gov.uk/government/publications/sars-cov-2-rna-testing-assurance-of-positive-results-during-periods-of-low-prevalence |archive-date=6 May 2021 |access-date=19 September 2020 |website=GOV.UK}}</ref>

      On 4 January 2021, the US FDA issued an alert about the risk of false results, particularly false negative results, with the Curative SARS-Cov-2 Assay real-time RT-PCR test.<ref name="FDA Curative" />

      ===Isothermal nucleic amplification test===

      One study reported that the ID Now COVID-19 test showed sensitivity of 85.2%. Abbott responded that the issue could have been caused by analysis delays.<ref name="Cclinic">{{cite web |date=21 April 2020 |title=Study Raises Questions About False Negatives From Quick COVID-19 Test |url=https://www.npr.org/sections/health-shots/2020/04/21/838794281/study-raises-questions-about-false-negatives-from-quick-covid-19-test |url-status=live |archive-url=https://web.archive.org/web/20200501045109/https://www.npr.org/sections/health-shots/2020/04/21/838794281/study-raises-questions-about-false-negatives-from-quick-covid-19-test |archive-date=1 May 2020 |access-date=1 May 2020 |publisher=NPR}}</ref> Another study rejected the test in their clinical setting because of this low sensitivity.<ref>{{cite news | vauthors = Thomas K |date=13 May 2020 |title=Coronavirus Testing Used by the White House Could Miss Infections |work=[[The New York Times]] |url=https://www.nytimes.com/2020/05/13/health/coronavirus-testing-white-house.html |url-status=live |access-date=14 May 2020 |archive-url=https://web.archive.org/web/20200513234801/https://www.nytimes.com/2020/05/13/health/coronavirus-testing-white-house.html |archive-date=13 May 2020 |issn=0362-4331}}</ref>

      ==Confirmatory testing==

      The WHO recommends countries that do not have testing capacity and national laboratories with limited experience on COVID-19 send their first five positives and the first ten negative COVID-19 samples to one of the 16 WHO reference laboratories for confirmatory testing.<ref>{{cite web |title=National laboratories |url=https://www.who.int/emergencies/diseases/novel-coronavirus-2019/technical-guidance/laboratory-guidance |url-status=live |archive-url=https://web.archive.org/web/20200131052750/https://www.who.int/emergencies/diseases/novel-coronavirus-2019/technical-guidance/laboratory-guidance |archive-date=31 January 2020 |access-date=2 March 2020 |website=[[World Health Organization]] (WHO) }}</ref><ref>{{cite web |title=PHE novel coronavirus diagnostic test rolled out across UK |url=https://www.gov.uk/government/news/phe-novel-coronavirus-diagnostic-test-rolled-out-across-uk |url-status=live |archive-url=https://web.archive.org/web/20200207161953/https://www.gov.uk/government/news/phe-novel-coronavirus-diagnostic-test-rolled-out-across-uk |archive-date=7 February 2020 |access-date=12 April 2020 |website=GOV.UK |quote=In addition to processing samples from suspected cases in this country, PHE is now working as a reference laboratory for WHO, testing samples from countries that do not have assured testing capabilities.}}</ref> Out of the sixteen reference laboratories, seven are in Asia, five in Europe, two in Africa, one in North America and one in Australia.<ref>{{cite web |title=Specimen referral for COVID-19 – operational details of WHO reference laboratories providing confirmatory testing for COVID-19 |url=https://www.who.int/docs/default-source/coronaviruse/who-reference-laboratories-providing-confirmatory-testing-for-covid-19.pdf?sfvrsn=a03a01e6_2 |url-status=live |archive-url=https://web.archive.org/web/20200305082708/https://www.who.int/docs/default-source/coronaviruse/who-reference-laboratories-providing-confirmatory-testing-for-covid-19.pdf?sfvrsn=a03a01e6_2 |archive-date=5 March 2020 |access-date=29 March 2020 |website=[[World Health Organization]] (WHO) }}</ref>

      ==National or regional responses==

      === Iceland ===
      Iceland managed the pandemic with aggressive contact tracing, inbound travel restrictions, testing, and quarantining, but with less aggressive lock-downs.<ref name="Iceland screening" />

      ===India===
      {{Main|COVID-19 pandemic in India#Testing and countermeasures}}

      ===Italy===
      Researchers tested the entire population of [[Vo']], the site of Italy's first COVID-19 death. They tested about 3,400 people twice, at an interval of ten days. About half the people testing positive had no symptoms. All discovered cases were quarantined. Along with restricting travel to the commune, new infections were eliminated.<ref>{{cite news |date=19 March 2020 |title=How an experiment helped one Italian town find 'submerged infections,' cut new COVID-19 cases to zero |url=https://nationalpost.com/news/world/how-an-experiment-helped-one-italian-town-find-submerged-infections-cut-new-covid-19-cases-to-zero |access-date=29 March 2020 |newspaper=Nationalpost |archive-date=17 May 2020 |archive-url=https://web.archive.org/web/20200517020836/https://nationalpost.com/news/world/how-an-experiment-helped-one-italian-town-find-submerged-infections-cut-new-covid-19-cases-to-zero |url-status=live }}</ref>

      === Japan ===

      Unlike other Asian countries, Japan did not experience a pandemic of [[SARS]] or [[MERS]], so the country's PCR testing system was not well developed.<ref name="Expert conferencep5">{{cite web |date=5 May 2020 |title=PCR拡充が必要 専門家会議が会見 (全文1) |trans-title=PCR expansion required Expert meeting (Full text 1) |url=https://news.yahoo.co.jp/articles/0446b588bf3ee655f6b45177217e022a055b02d4 |url-status=live |archive-url=https://web.archive.org/web/20200608180835/https://news.yahoo.co.jp/articles/0446b588bf3ee655f6b45177217e022a055b02d4 |archive-date=8 June 2020 |access-date=27 May 2020 |website=THE PAGE |publisher=Yahoo!ニュース |page=5 |language=ja}}</ref><ref name="nhk20200414">{{cite web |date=15 April 2020 |title=「新型コロナウイルス感染拡大阻止 最前線からの報告 |trans-title=Report from the front line to prevent the spread of new coronavirus infection |url=https://www.nhk.or.jp/special/plus/articles/20200414/index.html |url-status=live |archive-url=https://web.archive.org/web/20200419021130/https://www.nhk.or.jp/special/plus/articles/20200414/index.html |archive-date=19 April 2020 |access-date=27 May 2020 |website=NHK |language=ja}}</ref> Japan preferentially tested patients with severe illness and their close contacts at the beginning. Japan's [[Novel Coronavirus Expert Meeting]] chose cluster measures to identify infections clusters.<ref name="Expert conferencep5" /><ref name="nhk20200414" /> The Expert Meeting analyzed the outbreak from [[Wuhan]] and identified conditions leading to clusters (closed spaces, crowded spaces and close-contact), and asked people to avoid them.<ref name="nhk20200414" /><ref name="bloomberg20200512">{{cite news |date=23 May 2020 |title=Did Japan Just Beat the Virus Without Lockdowns or Mass Testing? |url=https://www.bloomberg.com/news/articles/2020-05-22/did-japan-just-beat-the-virus-without-lockdowns-or-mass-testing |url-status=live |archive-url=https://web.archive.org/web/20200608180826/https://www.bloomberg.com/news/articles/2020-05-22/did-japan-just-beat-the-virus-without-lockdowns-or-mass-testing |archive-date=8 June 2020 |access-date=27 May 2020 |publisher=Bloomberg }}</ref>

      In January, contact tracers took action shortly after the first infection was found. Only administrative tests were carried out at first, until insurance began covering PCR tests on 6 March. Private companies began to test, and the test system gradually expanded.<ref name="Expert conferencep5" />

      In April, those with positive tests were legally permitted to recuperate at home or in a hotel if they had asymptomatic or mild illness, ending the hospital bed shortage.<ref name="nhk20200408">{{cite web |date=8 April 2020 |title=新型コロナウイルス 感染爆発をどう防ぐか |trans-title=How to prevent the outbreak of new coronavirus infection |url=https://www.nhk.or.jp/special/plus/articles/20200408/index.html |url-status=live |archive-url=https://web.archive.org/web/20200408095523/https://www.nhk.or.jp/special/plus/articles/20200408/index.html |archive-date=8 April 2020 |access-date=27 May 2020 |website=NHK |language=ja}}</ref> The first wave (from China) was contained,<ref>{{cite web |date=12 May 2020 |title=第1波は終息するも欧米からの帰国者経由の第2波が拡大 |trans-title=The first wave is over, but the second wave is expanding via returnees from Europe and the United States |url=https://medical.nikkeibp.co.jp/leaf/mem/pub/report/t344/202005/565524.html |url-status=live |archive-url=https://web.archive.org/web/20200608180829/https://medical.nikkeibp.co.jp/leaf/mem/pub/report/t344/202005/565524.html |archive-date=8 June 2020 |access-date=27 May 2020 |website=日経メディカル (Nikkei Medical) |language=ja}}</ref> but a second wave (caused by returnees from Europe and the US) in mid-March led to spreading infection in April.<ref name="nhk20200414" /> On 7 April, Japan declared a state of emergency (less strict than a lockdown, because it did not block cities or restrict outings).<ref name="nhk20200414" /><ref name="nhk20200408" /><ref name="nhk20200326">{{cite web |date=27 March 2020 |title=専門家に聞く"新型コロナウイルス"との闘い方と対策 |trans-title=Ask experts how to fight the "new coronavirus" and countermeasures |url=https://www.nhk.or.jp/special/plus/articles/20200326/index.html |url-status=live |archive-url=https://web.archive.org/web/20200408095523/https://www.nhk.or.jp/special/plus/articles/20200326/index.html |archive-date=8 April 2020 |access-date=27 May 2020 |website=NHK |language=ja}}</ref> On 13 May, antigen test kits became covered by insurance, and were combined with a PCR test for diagnosis.<ref name="mainichi20200512">{{cite web |date=12 May 2020 |title=新型コロナ抗原検査キット、13日から実用化 加藤厚労相が発表 PCRとの併用を想定 |trans-title=New corona antigen test kit put into practical use from 13th. Minister of Health, Labor and Welfare Kato announced that it will be used in combination with PCR |url=https://mainichi.jp/articles/20200512/k00/00m/040/102000c |url-status=live |archive-url=https://web.archive.org/web/20200527195151/https://mainichi.jp/articles/20200512/k00/00m/040/102000c |archive-date=27 May 2020 |access-date=27 May 2020 |website=毎日新聞 (Mainichi newspaper ) |language=ja}}</ref><ref name="medicalnikkeibp202005">{{cite web |date=12 May 2020 |title=コロナ抗原検査が使用可能に、陽性のみ確定診断 |trans-title=Corona antigen test available, positive only definitive diagnosis |url=https://medical.nikkeibp.co.jp/leaf/mem/pub/report/t344/202005/565553.html |url-status=live |archive-url=https://web.archive.org/web/20200521070126/https://medical.nikkeibp.co.jp/leaf/mem/pub/report/t344/202005/565553.html |archive-date=21 May 2020 |access-date=15 May 2020 |website=日経メディカル (Nikkei Medical) |language=ja |author1=日経メディカル }}</ref>

      Japan's PCR test count per capita remained far smaller than in some other countries even though its positive test rate was lower.<ref name="bloomberg20200512" /><ref name="nhk20200326" /><ref name="Expert conferencep5" /> The Expert Meeting stated, "The Japanese health care system originally carries out pneumonia surveillance, allowing it to detect most of the severely ill patients who develop pneumonia. There are a large number of CT scanners in Japan and they have spread to small hospitals all over the country, so pneumonia patients are rarely missed. In that sense, it meets the same standards as other countries that mainly carry out PCR tests."<ref name="bloomberg20200512" /><ref name="Expert conferencep5" /> The group recommended using [[CT scans]] data and doctor's findings for diagnosis.<ref name="NoNosoco">{{cite web |date=30 April 2020 |title=クルーズ船112人治療で「院内感染」ゼロ!「自衛隊中央病院」はなぜ奇跡を起こせたのか |trans-title=No "nosocomial infection" with treatment of 112 cruise ships! Why did "Self-Defense Forces Central Hospital" cause a miracle? |url=https://www.dailyshincho.jp/article/2020/04300801/?all=1 |url-status=live |archive-url=https://web.archive.org/web/20200608180831/https://www.dailyshincho.jp/article/2020/04300801/?all=1 |archive-date=8 June 2020 |access-date=27 May 2020 |website=週刊新潮 (Shukan Shincho) |language=ja}}</ref><ref>{{cite web |date=5 May 2020 |title=「PCR検査数少ないが、死亡者数・率低い」専門家会議 |trans-title="The number of PCR tests is small, but the number of deaths and rate is low" Expert meeting |url=https://www.m3.com/open/iryoIshin/article/766878/ |url-status=live |archive-url=https://web.archive.org/web/20200608180829/https://www.m3.com/open/iryoIshin/article/766878/ |archive-date=8 June 2020 |access-date=27 May 2020 |website=m3.com |language=ja}}</ref> On the Diamond Princess cruise ship, many people who initially tested negative later tested positive. Half of coronavirus-positives there who remained mild or asymptomatic had pneumonia findings on CT scans and their CT image showed a frosted glass shadow that is characteristic of infection.<ref name=NoNosoco/><ref>{{cite web |date=7 May 2020 |title=調査報告クルーズ船 ウイルス対策のカギは? |trans-title=Survey Report What is the key to anti-virus measures for cruise ships? |url=https://www.nhk.or.jp/special/plus/articles/20200507/index.html |url-status=live |archive-url=https://web.archive.org/web/20200512211816/https://www.nhk.or.jp/special/plus/articles/20200507/index.html |archive-date=12 May 2020 |access-date=24 May 2020 |website=NHK |language=ja}}</ref>

      As of 18 July, Japan's daily PCR testing capacity was about 32,000, more than three times the 10,000 cases as of April. When the antigen test is added to it, the number is about 58,000. The number of tests per 1,000 people in the United States is about 27 times that of Japan, the UK is 20 times, Italy is 8 times, and South Korea is twice (as of 26 July).<ref>{{cite web |date=20 July 2000 |title=新型コロナウイルス感染症の現在の状況と厚生労働省の対応について(令和2年7月20日版) |trans-title=Current status of new coronavirus infection and response by the Ministry of Health, Labor and Welfare (Reiwa 20 July, 2nd edition) |url=https://www.mhlw.go.jp/stf/newpage_12545.html |url-status=live |archive-url=https://web.archive.org/web/20200804033847/https://www.mhlw.go.jp/stf/newpage_12545.html |archive-date=4 August 2020 |access-date=1 August 2020 |publisher=厚生労働省 |language=ja}}</ref><ref>{{cite web |date=28 July 2020 |title=PCR検査能力、4月の3倍 それでも受けにくいわけは |trans-title=PCR test capacity, 3 times that of April |url=https://www.asahi.com/articles/ASN7X4GK9N7WUBQU001.html |url-status=live |archive-url=https://web.archive.org/web/20200731055327/https://www.asahi.com/articles/ASN7X4GK9N7WUBQU001.html |archive-date=31 July 2020 |access-date=1 August 2020 |website=Asahi Shimbun |language=ja}}</ref><ref>{{cite web |date=21 July 2020 |title=日本のコロナ検査能力、米英の1割どまり |trans-title=Japan's corona inspection ability, only 10% of the US and UK |url=https://www.nikkei.com/article/DGXMZO61795010R20C20A7EA2000/ |url-status=live |archive-url=https://web.archive.org/web/20200731131404/https://www.nikkei.com/article/DGXMZO61795010R20C20A7EA2000/ |archive-date=31 July 2020 |access-date=1 August 2020 |publisher=The Nikkei |language=ja}}</ref>
      The number of those infected with coronavirus and inpatients has increased in July, but the number of serious cases has not increased. This is thought to be due to the proper testing of those infected in July compared to those in April. In April, the number of tests could not catch up with the increase in the number of infected people, and the test standards were strict, so the test positive rate exceeded 30% at the peak. It means that there were quite a few cases where those infected were not PCR tested. It is thought that the severe case was preferentially tested though there were a lot of mild cases and asymptomatic carriers mainly in the young during the first wave. In other words, it became possible to grasp the actual situation of infection much better than before by strengthening the testing system.<ref>{{cite web |date=26 July 2020 |title=新型コロナが弱毒化しているという根拠はない |trans-title=There is no evidence that the new corona is attenuated |url=https://news.yahoo.co.jp/byline/kutsunasatoshi/20200726-00189953/ |url-status=live |archive-url=https://web.archive.org/web/20200727205751/https://news.yahoo.co.jp/byline/kutsunasatoshi/20200726-00189953/ |archive-date=27 July 2020 |access-date=1 August 2020 |publisher=Yahoo!ニュース |language=ja}}</ref> At the end of July, accommodation facilities for mild and asymptomatic carriers became full, and the authorities requested hospitals to prepare beds for the mild. However, it became difficult to treat patients with other illnesses and to maintain the ICU system including the staff due to the occupation of hospital beds by patients with mild symptoms.<ref>{{cite web |date=21 July 2020 |title=軽症者施設、23都府県で不足 コロナ第2波推計 |trans-title=Facility for mildly ill people, Insufficient in 23 prefectures Corona second wave estimation |url=https://www.nikkei.com/article/DGXMZO61794950R20C20A7EA2000/ |url-status=live |archive-url=https://web.archive.org/web/20200731131345/https://www.nikkei.com/article/DGXMZO61794950R20C20A7EA2000/ |archive-date=31 July 2020 |access-date=1 August 2020 |publisher=The Nikkei |language=ja}}</ref><ref>{{cite web |date=22 July 2020 |title=患者急増、埋まりつつあるベッド 増床要請に頭抱える病院...スタッフは?一般患者は?経営は? |trans-title=The number of patients is increasing rapidly, and the beds are being filled up. Hospitals are having a request to increase the floor space ... Staff? General patients? Management? |url=https://mainichi.jp/articles/20200722/k00/00m/040/285000c |url-status=live |archive-url=https://web.archive.org/web/20200729002259/https://mainichi.jp/articles/20200722/k00/00m/040/285000c |archive-date=29 July 2020 |access-date=1 August 2020 |website=Mainichi Shimbun |language=ja}}</ref><ref>{{cite web |date=25 March 2020 |title=軽症患者ICUを圧迫 クラスターはほぼ終息 新型コロナで兵庫県対策協 |trans-title=Squeezing ICU for mildly ill patients The cluster is almost over With the new corona |url=https://www.kobe-np.co.jp/news/sougou/202003/0013219791.shtml |url-status=live |archive-url=https://web.archive.org/web/20201022072940/https://www.kobe-np.co.jp/news/sougou/202003/0013219791.shtml |archive-date=22 October 2020 |access-date=1 August 2020 |publisher=神戸新聞 |language=ja}}</ref>

      ===Russia===

      In April 2020, Russia tested 3&nbsp;million people and had 183,000 positive results.<ref name="3mTests">{{cite news |date=27 April 2020 |title=Over 3 mln COVID-19 tests conducted in Russia |work=[[TASS]] |url=https://tass.com/society/1149993 |url-status=live |access-date=29 April 2020 |archive-url=https://web.archive.org/web/20200511065121/https://tass.com/society/1149993 |archive-date=11 May 2020}}</ref> On 28 April [[Anna Popova]], head of [[Rospotrebnadzor|Federal Service for Surveillance in Healthcare]] (Roszdravnadzor) stated that 506 laboratories were testing; that 45% of those who tested positive had no symptoms; that 5% of patients had a severe form; and 40% of infections were from family members. Illness improved from six days to one day after symptoms appeared. Antibody testing was carried out on 3,200 Moscow doctors, finding 20% immunity.<ref name="AnnaPopova28April">{{cite news |date=28 April 2020 |title=Popova said explosive growth in incidence was not allowed due to measures taken |work=[[TASS]] |url=https://tass.ru/obschestvo/8356293 |url-status=live |access-date=29 April 2020 |archive-url=https://web.archive.org/web/20200829150246/https://tass.ru/obschestvo/8356293 |archive-date=29 August 2020}}</ref>

      ===Singapore===

      With contact tracing, inbound travel restrictions, testing, and quarantining, [[COVID-19 pandemic in Singapore|Singapore]] arrested the initial spread without complete lockdown.<ref>{{cite web |title=COVID-19 outbreak: Petition to close schools in Singapore garners 7,700 signatures to date |url=https://www.msn.com/en-sg/news/singapore/covid-19-outbreak-petition-to-close-schools-in-singapore-garners-7700-signatures-to-date/ar-BB11C87Z?li=BBr8YXK |url-status=live |archive-url=https://web.archive.org/web/20200329212422/https://www.msn.com/en-sg/news/singapore/covid-19-outbreak-petition-to-close-schools-in-singapore-garners-7700-signatures-to-date/ar-BB11C87Z?li=BBr8YXK |archive-date=29 March 2020 |access-date=29 March 2020 |website=msn.com}}</ref>

      ===Slovakia===
      In October 2020 Slovakia tested 3.62 million people in a weekend, from a population of 5.4m, representing 67% of the total (or 82% of the adult population), 38,359 tested positive, representing 1.06% of those tested. The government considered the mass test would significantly assist in controlling the virus and avoid a lockdown and may repeat the exercise at a later date.<ref>{{cite news |date=1 November 2020 |title=More than 3.6 million people tested during the weekend |publisher=The Slovak Spectator |url=https://spectator.sme.sk/c/22525342/coronavirus-in-slovakia-nationwide-testing-final-results.html |url-status=live |access-date=2 July 2021 |archive-url=https://web.archive.org/web/20200102225119/https://spectator.sme.sk/c/22525342/coronavirus-in-slovakia-nationwide-testing-final-results.html |archive-date=2 January 2020}}</ref>

      === South Korea ===

      South Korea's broad testing approach helped reduce spread. Testing capacity, largely in private sector labs, was built up over several years by the South Korean government in the early 2000s.<ref>{{cite web | vauthors = Kuhn A |date=12 March 2020 |title=Experts Credit South Korea's Extensive Testing For Curbing Coronavirus Spread |url=https://www.npr.org/2020/03/12/815097813/experts-credit-south-koreas-extensive-testing-for-curbing-coronavirus-spread |url-status=live |archive-url=https://web.archive.org/web/20200316033748/https://www.npr.org/2020/03/12/815097813/experts-credit-south-koreas-extensive-testing-for-curbing-coronavirus-spread |archive-date=16 March 2020 |access-date=28 June 2020 |website=NPR.org}}</ref>

      Centers were sited mainly at national facilities and corporate training centers. The failure of Korea's MERS quarantine in May 2015 left Korea more prepared for COVID-19 than countries that did not face that pandemic. Then President [[Park Geun-hye]] allowed Korean CDC-approved private sector testing for infectious diseases in 2016. Korea already had a system for isolating, testing and treating infectious disease patients separately from others. Patients with respiratory illness but no epidemiological relevance were treated at the National Hospital, and those with epidemiological relevance were treated at selected clinics.<ref name="newsweekjapan2020041">{{cite web |date=2 April 2020 |title=日本が韓国の新型コロナウイルス対策から学べること──(1)検査体制 |trans-title=What Japan can learn from Korea's measures against the new coronavirus ── (1) Inspection system |url=https://www.newsweekjapan.jp/kim_m/2020/04/1.php |url-status=live |archive-url=https://web.archive.org/web/20200605141128/https://www.newsweekjapan.jp/kim_m/2020/04/1.php |archive-date=5 June 2020 |access-date=5 June 2020 |website=Newsweek Japan |language=ja}}</ref><ref name="newsweekjapan2020043">{{cite news |date=21 April 2020 |title=日本が韓国の新型コロナウイルス対策から学べること──(3)情報公開 |trans-title=What Japan can learn from Korea's measures against the new coronavirus ── (3) Information disclosure |url=https://www.newsweekjapan.jp/kim_m/2020/04/-3.php |url-status=live |archive-url=https://web.archive.org/web/20200605141130/https://www.newsweekjapan.jp/kim_m/2020/04/-3.php |archive-date=5 June 2020 |access-date=5 June 2020 |newspaper=Newsweek日本版 |language=ja}}</ref><ref name="newsweekjapan2020044">{{cite web |date=11 May 2020 |title=日本が韓国の新型コロナウイルス対策から学べること──(4)軽症者の隔離・管理対策: 「生活治療センター」 |trans-title=What Japan can learn from Korea's measures against the new coronavirus ── (4) Isolation and management measures for mildly ill people: "Life Treatment Center" |url=https://www.newsweekjapan.jp/kim_m/2020/05/4.php |url-status=live |archive-url=https://web.archive.org/web/20200605142211/https://www.newsweekjapan.jp/kim_m/2020/05/4.php |archive-date=5 June 2020 |access-date=5 June 2020 |website=Newsweek Japan |language=ja}}</ref><ref name="newsweekjapan20200502">{{cite web |date=2 May 2020 |title=韓国のコロナ対策を称える日本に欠ける視点 |trans-title=Japan's lack of perspective to praise South Korea's measures against corona |url=https://www.newsweekjapan.jp/che/2020/05/post-4.php |url-status=live |archive-url=https://web.archive.org/web/20200605141131/https://www.newsweekjapan.jp/che/2020/05/post-4.php |archive-date=5 June 2020 |access-date=5 June 2020 |website=Newsweek Japan |language=ja}}</ref><ref name="fnn31819">{{cite web |date=14 April 2020 |title=韓国式大量検査は徴兵制の賜物...新型コロナが揺さぶる「自由」の価値 |trans-title=Korean-style mass inspection is a gift of conscription ... The value of "freedom" that the new corona shakes |url=https://www.fnn.jp/articles/-/31819 |url-status=live |archive-url=https://web.archive.org/web/20200427110126/https://www.fnn.jp/articles/-/31819 |archive-date=27 April 2020 |access-date=5 June 2020 |publisher=FNNプライム |language=ja}}</ref><ref name="jcci20200510">{{cite web |date=10 May 2020 |title=韓国における新型コロナウィルス防疫事情(韓国) |trans-title=New Coronavirus Epidemic Prevention Circumstances in South Korea (Korea) |url=https://www.jcci.or.jp/international/latest-reports/2020/0510132512.html |url-status=dead |archive-url=https://web.archive.org/web/20200605141215/https://www.jcci.or.jp/international/latest-reports/2020/0510132512.html |archive-date=5 June 2020 |access-date=5 June 2020 |publisher=日本商工会議所 |language=ja}}</ref><ref name="newsweekjapan20200414">{{cite web |date=14 April 2020 |title=韓国製PCR検査キットが新型コロナから世界を救う日 |trans-title=The day when the Korean PCR test kit saves the world from the new corona |url=https://www.newsweekjapan.jp/stories/world/2020/04/pcr-1.php |url-status=live |archive-url=https://web.archive.org/web/20200605142231/https://www.newsweekjapan.jp/stories/world/2020/04/pcr-1.php |archive-date=5 June 2020 |access-date=5 June 2020 |website=Newsweek Japan |language=ja}}</ref><ref name="nhk4403">{{cite web |date=9 April 2020 |title=新型ウイルス"パンデミック" 医療崩壊を防ぐには |trans-title=New virus "pandemic" How to prevent medical collapse |url=https://www.nhk.or.jp/gendai/articles/4403/ |url-status=live |archive-url=https://web.archive.org/web/20200419031939/https://www.nhk.or.jp/gendai/articles/4403/ |archive-date=19 April 2020 |access-date=2 June 2020 |website=NHK |language=ja}}</ref><ref name="mainichi20200416">{{cite web |date=16 April 2020 |title=IT活用でコロナ追跡 韓国、感染者の経路公開 |trans-title=Corona tracking by utilizing IT South Korea, route disclosure of infected people |url=https://mainichi.jp/articles/20200416/ddm/003/040/040000c |url-status=live |archive-url=https://web.archive.org/web/20200605141125/https://mainichi.jp/articles/20200416/ddm/003/040/040000c |archive-date=5 June 2020 |access-date=5 June 2020 |website=Mainichi Shimbun |language=ja}}</ref>

      Korea established a large scale drive-through/walk-through" test testing program. However, the most common method was "mobile examination". In Daegu City, 54% of samples were collected by 23 March in home or hospital. Collecting samples door-to-door of avoided the risk of travel by possibly infected patients, but required additional staff. Korea solved the problem by drafting more than 2,700 public insurance doctors.<ref name="newsweekjapan2020041" /><ref name="fnn31819" /><ref name="newsweekjapan20200502" />

      The government disclosed personal information to the public via KCDC without patient consent. The authorities used digital surveillance to trace possible spread.<ref name="newsweekjapan2020043" /><ref name="fnn31819" /><ref name="jcci20200510" /><ref name="nhk4403" /><ref name="mainichi20200416" /><ref name="tokyonp20200401">{{cite web |date=1 April 2020 |title=コロナ対策で浮かび上がる「監視社会」韓国 個人情報をここまでさらしてよいのか |trans-title="Surveillance society" that emerges from corona measures Can South Korea expose personal information to this extent? |url=https://www.tokyo-np.co.jp/article/26091 |url-status=live |archive-url=https://web.archive.org/web/20200605141235/https://www.tokyo-np.co.jp/article/26091 |archive-date=5 June 2020 |access-date=5 June 2020 |website=Tokyo Shimbun |language=ja}}</ref><ref name="kazuhirotaira">{{cite web |date=26 March 2020 |title=新型コロナ: 「感染追跡」デジタル監視とプライバシーの新しい日常 |trans-title=New Corona: "Infection Tracking" New Everyday Life in Digital Surveillance and Privacy |url=https://news.yahoo.co.jp/byline/kazuhirotaira/20200326-00169744/ |url-status=live |archive-url=https://web.archive.org/web/20200605141128/https://news.yahoo.co.jp/byline/kazuhirotaira/20200326-00169744/ |archive-date=5 June 2020 |access-date=5 June 2020 |publisher=Yahoo!ニュース |language=ja}}</ref><ref>{{cite web |date=17 April 2020 |title=韓国、コロナ隔離者に監視腕輪 「人権侵害」の声 |trans-title=South Korea, Corona quarantine voice of surveillance bracelet "human rights violations" |url=https://www.nikkei.com/article/DGXMZO58116650W0A410C2000000/ |url-status=live |archive-url=https://web.archive.org/web/20200529071320/https://www.nikkei.com/article/DGXMZO58116650W0A410C2000000/ |archive-date=29 May 2020 |access-date=29 May 2020 |publisher=The Nikkei |language=ja}}</ref><ref>{{cite web |date=6 March 2020 |title=South Korea is watching quarantined citizens with a smartphone app |url=https://www.technologyreview.com/2020/03/06/905459/coronavirus-south-korea-smartphone-app-quarantine/ |url-status=live |archive-url=https://web.archive.org/web/20200605003931/https://www.technologyreview.com/2020/03/06/905459/coronavirus-south-korea-smartphone-app-quarantine/ |archive-date=5 June 2020 |access-date=5 June 2020 |website=MIT Technology Review}}</ref><ref>{{cite web |date=5 March 2020 |title=Coronavirus privacy: Are South Korea's alerts too revealing? |url=https://www.bbc.com/news/world-asia-51733145 |url-status=live |archive-url=https://web.archive.org/web/20200606090757/https://www.bbc.com/news/world-asia-51733145 |archive-date=6 June 2020 |access-date=5 June 2020 |website=BBC}}</ref>{{excessive citations inline|date=December 2021}}

      === Taiwan ===
      Health insurance IDs and [[National identification card (Taiwan)|national identification card]] numbers were used to trace contacts.<ref name="businessinsider212152">{{cite web |date=1 May 2020 |title=台湾がコロナ｢優等生｣になった理由.閣僚に医師出身、デジタル化の一方で強まる監視 |trans-title=The reason why Taiwan became a corona "honor student". A doctor from a minister, increasing surveillance while digitizing |url=https://www.businessinsider.jp/post-212152 |url-status=live |archive-url=https://web.archive.org/web/20200608154447/https://www.businessinsider.jp/post-212152 |archive-date=8 June 2020 |access-date=6 June 2020 |website=Business Insider |language=ja}}</ref><ref name="wedge18823">{{cite web |date=28 February 2020 |title=台湾の新型コロナ対策が「善戦」しているワケ |trans-title=The reason why Taiwan's new corona measures are "good fight" |url=https://wedge.ismedia.jp/articles/-/18823 |url-status=live |archive-url=https://web.archive.org/web/20200608154449/https://wedge.ismedia.jp/articles/-/18823 |archive-date=8 June 2020 |access-date=6 June 2020 |website=Wedge Infinity |language=ja}}</ref><ref name="wedge18824">{{cite web |date=28 February 2020 |title=台湾が新型コロナの感染拡大を抑制できている理由 |trans-title=Why Taiwan is able to curb the spread of the new corona |url=https://wedge.ismedia.jp/articles/-/18824 |url-status=live |archive-url=https://web.archive.org/web/20200608154452/https://wedge.ismedia.jp/articles/-/18824 |archive-date=8 June 2020 |access-date=6 June 2020 |website=Wedge Infinity |language=ja}}</ref><ref name="businessnikkei20200421">{{cite web |date=21 April 2020 |title=新型コロナ対応の「優等生」は「台湾・韓国・ドイツ」 |trans-title=Why Taiwan is able to curb the spread of the new corona ... |url=https://business.nikkei.com/atcl/seminar/19/00122/00066/ |url-status=live |archive-url=https://web.archive.org/web/20200608154452/https://business.nikkei.com/atcl/seminar/19/00122/00066/ |archive-date=8 June 2020 |access-date=6 June 2020 |publisher=日経ビジネス (Nikkei Business) |language=ja}}</ref>

      === United Arab Emirates ===
      In January 2021, the COVID-19 testing results of the [[UAE]] came under scrutiny, as [[Denmark]] suspended the Emirati flights for five days. The European nation said that it barred the flights from the UAE due to growing suspicion of irregularities in the testing process being followed in the Gulf nation. Denmark's Minister of Transport, [[Benny Engelbrecht]] said that they were taking time to ensure that the negative tests of travelers from the Emirates were a real screening carried out appropriately.<ref>{{cite web |title=Covid-19: Denmark suspends flights from the Emirates |url=https://www.lefigaro.fr/flash-eco/covid-19-le-danemark-suspend-les-vols-en-provenance-des-emirats-20210122 |url-status=live |archive-url=https://web.archive.org/web/20200102225119/https://www.lefigaro.fr/flash-eco/covid-19-le-danemark-suspend-les-vols-en-provenance-des-emirats-20210122 |archive-date=2 January 2020 |access-date=22 January 2021 |website=Le Figaro}}</ref>

      === United States ===
      {{Main|COVID-19 testing in the United States}}

      ==== New York State ====
      New York State's control measures consisted of PCR tests, stay-at-home measures and strengthening the healthcare system. On 29 February before its first case, the state allowed testing at the Wordsworth Center. They managed to convince the CDC to approve tests at state laboratories and the FDA to approve a test kit. As of 13 March the state was conducting more than 1,000 daily tests, growing to 10,000/day on 19 March. In April, the number exceeded 20,000. Many people queued at hospitals to get tested. On 21 March New York City health officials directed medical providers to test only those entering the hospital, for lack of PPE.<ref name="nhk4403" /><ref>{{cite web |date=14 May 2020 |title=COVID-19 Public Policies #2 ニューヨークはいかにして検査数を増やしたのか |trans-title=COVID-19 Public Policies #2 How New York increased the number of inspections |url=https://businessyokohama.com/jp/2020/05/14/covid-19-public-policies-2/ |url-status=live |archive-url=https://web.archive.org/web/20200608154459/https://businessyokohama.com/jp/2020/05/14/covid-19-public-policies-2/ |archive-date=8 June 2020 |access-date=2 June 2020 |website=Office of the City of Yokohama Representative to the Americas |language=ja}}</ref><ref>{{cite web |date=21 March 2020 |title=Coronavirus New York: health officials provide limits on testing patients for COVID-19 |url=https://abc7ny.com/health/nyc-health-officials-provide-limits-on-testing-patients-for-covid-19/6033992/ |url-status=live |archive-url=https://web.archive.org/web/20200608154456/https://abc7ny.com/health/nyc-health-officials-provide-limits-on-testing-patients-for-covid-19/6033992/ |archive-date=8 June 2020 |access-date=2 June 2020 |website=Eyewitness News}}</ref><ref>{{cite web |date=27 March 2020 |title=マスクも防護服も足りない! ニューヨークの病院で看護師が新型コロナウイルスに感染、死亡 |trans-title=Not enough masks and protective clothing! A nurse is infected with a new coronavirus and dies at a hospital in New York |url=https://www.businessinsider.jp/post-210156 |url-status=live |archive-url=https://web.archive.org/web/20200608155955/https://www.businessinsider.jp/post-210156 |archive-date=8 June 2020 |access-date=2 June 2020 |website=Business Insider Japan |language=ja}}</ref><ref>{{cite web |date=11 March 2020 |title=NY州感染者数、全米2位に 感染爆発で2週間封じ込め作戦へ |trans-title=The number of infected people in New York ranks second in the United States. |url=https://news.yahoo.co.jp/byline/abekasumi/20200311-00167134/ |url-status=live |archive-url=https://web.archive.org/web/20200608154448/https://news.yahoo.co.jp/byline/abekasumi/20200311-00167134/ |archive-date=8 June 2020 |access-date=2 June 2020 |website=Yahoo!ニュース |language=ja}}</ref>{{excessive citations inline|date=December 2021}}

      ====USS ''Theodore Roosevelt''====

      {{main|COVID-19 pandemic on USS Theodore Roosevelt}}

      Following an outbreak, 94% of the 4,800 aircraft carrier crew were tested. Roughly 60 percent of the 600-plus sailors who tested positive were asymptomatic.<ref>{{cite web |date=16 April 2020 |title=Coronavirus clue? Most cases aboard U.S. aircraft carrier are symptom-free |url=https://www.reuters.com/article/us-health-coronavirus-usa-military-sympt-idUSKCN21Y2GB |url-status=live |archive-url=https://web.archive.org/web/20201211222646/https://www.reuters.com/article/us-health-coronavirus-usa-military-sympt-idUSKCN21Y2GB |archive-date=11 December 2020 |access-date=2 July 2021 |website=Reuters}}</ref> Five infected sailors who completed quarantine subsequently developed flu-like symptoms and again tested positive.<ref name="NBC_sailors">{{cite web |title=Sailors on sidelined USS Theodore Roosevelt get virus for second time |url=https://www.nbcnews.com/politics/politics-news/sailors-sidelined-uss-theodore-roosevelt-get-virus-second-time-n1208076 |url-status=live |archive-url=https://web.archive.org/web/20200521041205/https://www.nbcnews.com/politics/politics-news/sailors-sidelined-uss-theodore-roosevelt-get-virus-second-time-n1208076 |archive-date=21 May 2020 |access-date=21 May 2020 |website=NBC News|date=15 May 2020 }}</ref>

      ====Nevada====
      In 2020, Nevada received a donation of 250,000 Covid testing kits, which were a product of China's leading genetics company, [[BGI Group]]. A UAE-based firm owned by [[Tahnoun bin Zayed Al Nahyan (national security advisor)|Tahnoun bin Zayed Al Nahyan]], [[Group 42 (Emirati company)|Group 42]] partnered with the BGI Group to supply the testing kits to [[Nevada]]. However, the US [[United States Department of Homeland Security|Department of Homeland Security]] and the [[United States Department of State|State Department]] raised a warning for Nevada hospitals to not use the Chinese-made testing kits, as there were concerns around the involvement of the Chinese government, test accuracy and privacy of the patients.<ref>{{cite web |title=US warned Nevada not to use Chinese COVID tests from UAE |url=https://apnews.com/article/virus-outbreak-technology-dubai-nevada-united-arab-emirates-0755b0ed4a9a750bcac432300ca69275 |website=[[Associated Press]] |date=15 October 2020 |access-date=15 October 2020 |archive-date=16 October 2020 |archive-url=https://web.archive.org/web/20201016155520/https://apnews.com/article/virus-outbreak-technology-dubai-nevada-united-arab-emirates-0755b0ed4a9a750bcac432300ca69275 |url-status=live }}</ref>

      ==Testing statistics by country==

      Testing strategies vary by country and over time,<ref>{{cite news |date=13 March 2020 |title=Special Report: Italy and South Korea virus outbreaks reveal disparity in deaths and tactics |work=Reuters |url=https://www.reuters.com/article/us-health-coronavirus-response-specialre-idUSKBN20Z27P |url-status=live |access-date=22 June 2020 |archive-url=https://web.archive.org/web/20200422102703/https://www.reuters.com/article/us-health-coronavirus-response-specialre-idUSKBN20Z27P |archive-date=22 April 2020}}</ref> with some countries testing very widely,<ref name="Iceland screening" /> while others have at times focused narrowly on only testing the seriously ill.<ref name=Bund/> The country that tests only people showing symptoms will have a higher figure for "Confirmed"/"tested" than the country that also tests others.<ref>{{cite web |date=13 April 2020 |title=Want to know how many people have the coronavirus? Test randomly |url=https://theconversation.com/want-to-know-how-many-people-have-the-coronavirus-test-randomly-135784 |url-status=live |archive-url=https://web.archive.org/web/20200509141120/https://theconversation.com/want-to-know-how-many-people-have-the-coronavirus-test-randomly-135784 |archive-date=9 May 2020 |access-date=7 May 2020 |publisher=The Conversation}}</ref> If two countries are alike in every respect, including which people they test, the one that tests more people will have a higher "Confirmed / population". Studies have also found that countries that test more, relative to the number of deaths, have lower estimated case fatality rates<ref name="Ward_2020" /> and younger age distributions of cases.<ref name=":7" />

      {{COVID-19 testing by country|state=expanded}}

