      ====Financial aid====
      [[File:FAFSA.gov_screenshot_2016-01-04.png|left|thumb|The [[FAFSA]] website at www.fafsa.ed.gov.]]
      There are many reports that many applicants fail to apply for financial aid when they are qualified for it, with an estimated 1.8 million students in 2006 qualifying for aid but failing to apply.<ref name=twsMay2R214>{{cite news
       |author= Valerie Strauss
       |title= A new college admissions bible
       |newspaper= Washington Post
       |date= October 3, 2011
       |url= https://www.washingtonpost.com/blogs/answer-sheet/post/a-new-college-admissions-bible/2011/10/02/gIQAZVhqHL_blog.html
       |access-date= May 18, 2012
      }}</ref> Applying for financial aid is recommended by almost all college admissions advisers, even for middle- and upper-class families applying to private colleges.<ref name=twsL24/> Each college has its own criteria for determining financial need and loans.<ref name=twsMay2Pfjk/> One advisor counseled against letting the sticker price of a college dissuade a student from applying, since many of the top colleges have strong endowments allowing them to subsidize expenses, such that the colleges are less expensive than so-called "second tier" or state colleges.<ref name=twsL24/>

      College advisers suggest that parents keep financial records, including tax forms, business records, to use when applying for financial aid,{{sfn|Mamlet|2011|p=22}} and complete the [[FAFSA]] online, using income and tax estimates (usually based on previous years), early in January of their college-bound student's twelfth grade.<ref name=twsMay2Q848/> Admissions officers can see the names of up to nine other colleges a student has applied to. According to several reports, some colleges may deny admission or reduce aid based on their interpretation of the order of colleges on the FAFSA;<ref name=Rivard>Ry Rivard, October 28, 2013, ''Inside Higher Ed'', [http://www.insidehighered.com/news/2013/10/28/colleges-use-fafsa-information-reject-students-and-potentially-lower-financial-aid Using FAFSA Against Students], Accessed December 12, 2013, "Now, some colleges use this FAFSA position when considering students' applications for admission, which may affect decisions about admission or placement on the wait list, said David Hawkins"</ref><ref name=CBSNews1>CBS News, Lynn O'Shaughnessy, October 30, 2013, [https://www.cbsnews.com/news/be-careful-what-you-share-on-the-fafsa/ Be careful what you share on the FAFSA], Accessed December 12, 2013, "The order, however, could also be hurting students who list their favorite school as No. 1. If a teenager shows too much interest in a school, the admission office may decide to offer the applicant a lower award because it is assumed that the child will enroll anyway"</ref><ref name=DailyFinance>Liz Weston, Reuters, November 11, 2013, Daily Finance, [http://www.dailyfinance.com/2013/11/11/colleges-may-penalize-students-over-preference-on-financial-aid/#!slide=976781 Colleges May Penalize Students Over Preference on Financial Aid Applications], Accessed December 12, 2013, "Students can list up to 10 schools to receive their financial aid information, and the ones they list first strongly predict which enrollment offers they're likely to accept, college consultants say"</ref> accordingly, several sources recommend that colleges be listed alphabetically on the FAFSA to obscure any preferences.<ref>Lynn O'Shaughnessy, October 30, 2013, The College Solution, [http://www.thecollegesolution.com/a-dirty-little-fafsa-secret/ A Dirty Little FAFSA Secret], Accessed December 10, 2013</ref><ref>Rachel Fishman, October 28, 2013, Access to Higher Education, Higher Ed Watch, [http://higheredwatch.newamerica.net/blogposts/2013/the_dark_side_of_enrollment_management-95569 The Dark Side of Enrollment Management] {{webarchive|url=https://web.archive.org/web/20131217224151/http://higheredwatch.newamerica.net/blogposts/2013/the_dark_side_of_enrollment_management-95569 |date=December 17, 2013 }}, Accessed December 13, 2013, "The FAFSA should either not allow institutions to see where students have applied or it should list the institutions in alphabetical order"</ref> There are reports that many parents make mistakes when filling out the FAFSA information, and mistakes include failing to hit the "submit" button, visiting an incorrect FAFSA website,<ref>Note: there are impostor websites similar to the official government website, sometimes asking for fees; the official FAFSA website is free; see [[FAFSA]] for further information</ref> leaving some fields blank instead of properly entering a zero, spelling names or entering social security numbers or estimating tax data incorrectly.<ref name=twsMay2Q848/> Since FAFSA formulas assume 20% of a student's assets can be used for college expenses as opposed to 6% of a parent's assets, advisors recommend moving funds from student to parent accounts before filing the FAFSA, including moving funds to a parent-controlled [[529 plan]] tax-advantaged account.<ref name=tws3L111/> Filing taxes early is recommended, but using estimates for FAFSA from previous years is possible provided the numbers are updated later after taxes are filed.<ref name=tws3L111/> There are no fees for applying on the FAFSA site. According to one source, the best time to begin searching for scholarships is before the twelfth grade, to guarantee meeting deadlines.<ref name=twsMay2Q848/> Several reports confirm that it is important to file aid forms such as the [[CSS Profile]] early in the school year.<ref name="tws2ZG115">{{cite news |author=Lynn O'Shaughnessy |date=November 29, 2011 |title=Take First Step to Apply for College Financial Aid |work=U.S. News & World Report |url=https://www.usnews.com/education/blogs/the-college-solution/2011/11/29/take-first-step-to-apply-for-college-financial-aid |access-date=July 7, 2012}}</ref><ref name=tws3L111>{{cite magazine
       |author= Victor Luckerson
       |title= 10 Tips for Getting the Most Out of College Financial Aid
       |magazine= Time
       |date= January 25, 2013
       |url= https://business.time.com/2013/01/25/10-tips-for-getting-the-most-out-of-college-financial-aid/
       |access-date= February 12, 2013
      }}</ref>

      In addition to cost factors, increasingly colleges are being compared on the basis of the average [[student debt]] of their graduates, and ''[[U.S. News & World Report#Best Colleges|U.S. News & World Report]]'' has developed rankings based on average student indebtedness.<ref name=twsMay2Pfjk>{{cite news
       |author= Carolyn Butler, Arlene Weintraub, Justin Snider, Margaret Loftus, Rett Fisher, Kimberly S. Wetzel (others)
       |title= Best Colleges: Choose the Right School For You
       |newspaper= U.S. News & World Report
       |quote= 2012 edition; various authors and rankings; pages 19, 20, 30, 62, 63, 68–70, 78, 84, 86, 88, others
       |year= 2012
      }}</ref> A report in the ''[[Utne Reader]]'' chronicled substantial student indebtedness, and suggested that 37 million Americans in 2009 held student debt, and that nine in ten students used an average of 4.6 credit cards to pay for some educational expenses.<ref name="Utne">Student Debt, by the numbers, Utne Reader, July–August 2012, page 39</ref> The report chronicled an increase in average indebtedness from an average of $2,000 in 1980–81 to over $25,000 in 2009, as well as substantial decreases in Federal aid and Pell grants during that time period.<ref name="Utne"/>

      ''[[U.S. News & World Report]]'' and others suggest another factor overlooked in terms of financing college, which is the length of time it takes to earn a degree. Finishing a year early (in three years) lops off a substantial portion of the overall bill,<ref name=twsMay2Pfjk/> while taking five years compounds the expense and delays entry into the workforce. Jacques Steinberg suggested that many college-bound students calculate how much [[student debt|debt]] they were likely to incur each year, and he suggested that debt for all four years of college should total less than the graduate's expected first year's salary after college, and preferably under $40,000.<ref name=twsMay2Q845>{{cite news
       |author= Jacques Steinberg
       |title= Transferring to a State University, and Saving Tens of Thousands of Dollars in the Bargain
       |newspaper= The New York Times: Education
       |date= April 11, 2012
       |url= http://thechoice.blogs.nytimes.com/2012/04/11/transferring-to-save/
       |access-date= May 17, 2012
      }}</ref> A handful of schools have "free tuition" policies for low income students, so that they graduate loan-free.<ref name=twsMay2Q847>{{cite news
       |title= No Loans for Low Income Students
       |newspaper= Smart Student Guide
       |date= May 17, 2012
       |url= http://www.finaid.org/questions/noloansforlowincome.phtml
       |access-date= May 17, 2012
      }}</ref><ref>{{Cite web|url=https://www.highschoolgpacalculator.us/|title=High School GPA Calculator}}</ref>

      ===Colleges by type===
      [[File:Alice_Tully_Hall_(48047494177).jpg|thumb|Some colleges focus on particular disciplines or subjects, such as the [[Juilliard School]] in New York City, which specializes in the [[performing arts]]]]
      Most educational institutions in the U.S. are [[nonprofit]].<ref>{{cite web |url=http://nces.ed.gov/das/library/tables_listings/showTable2005.asp?popup=true&tableID=7062&rt=p |title= Table 1. Number and percentage distribution of Title IV institutions, by control of institution, level of institution, and region: United States and other jurisdictions, academic year 2009–10 |publisher=National Center for Educational Statistics, U.S. Department of Education |year=2011 |access-date=January 24, 2012}}</ref> Colleges and universities in the U.S. vary in terms of goals: some may emphasize a [[vocational]], [[business]], [[engineering]] or technical curriculum while others may emphasize a [[liberal arts]] curriculum. Many combine some or all of the above. Another consideration is the male-female ratio; overall, 56% of enrolled college students are women, but the male-female ratio varies by college, year, and program.<ref name=twsMayO211/> Admissions guidance counselors can offer views about whether a public or private school is best, and give a sense of the tradeoffs.

      '''Two-year colleges''' are often county- or community-oriented schools funded by state or local governments, and typically offer the [[associate degree]] (AA). They are generally inexpensive,<ref name=twsMay2Pfjk/> particularly for in-state residents, and are focused on teaching, and accept most applicants meeting minimum grade and SAT score levels. Students commute to school and rarely live in dorms on campus. These schools often have [[Articulation (education)|articulation]] arrangements with four-year state public schools to permit students to transfer. Consultants suggest that community colleges are reasonably priced, and after two years with solid grades and academic performance, many colleges are willing to accept [[Transfer admissions in the United States|transfers]].

      '''Four-year colleges''' offer [[Bachelor of Arts]] (BA or AB) or [[Bachelor of Science]] (BS or SB) degrees. These are primarily [[undergraduate]] institutions, although some might have limited programs at the [[Graduate school|graduate]] level. Graduates of the tuition-free [[United States service academies]] receive both a Bachelor of Science degree and a [[Officer (armed forces)|commission]].

      '''Universities''' have both [[undergraduate]] and [[Graduate school|graduate]] students. [[Graduate school|Graduate programs]] grant a variety of [[master's degree]]s as well as the [[Doctor of Philosophy]] (PhD). [[Medical school in the United States|Medical schools]] award either the [[Doctor of Medicine|MD]] or [[Doctor of Osteopathic Medicine|DO]] degrees while [[Law school in the United States|law schools]] award the [[Juris Doctor|JD]] degree. Both [[Public university|public]] and [[private university|private universities]] are usually [[research]]-oriented institutions.
      [[File:Pomona_College_wHY_1268.jpg|thumb|[[Liberal arts colleges in the United States|Liberal arts colleges]] like [[Pomona College]] emphasize [[liberal arts education]] at the undergraduate level]]
      '''[[Liberal arts colleges in the United States|Liberal arts colleges]]''' are four-year institutions that emphasize interactive instruction, although research is still a component of these institutions. They are usually [[Residential college|residential]] colleges with most students living on campus in dorms. They tend to have smaller enrollments, class sizes, and lower [[student-teacher ratio]]s than universities, and encourage teacher-student interaction with classes taught by full-time faculty members rather than graduate students known as [[teaching assistant]]s. There are further distinctions within the category of liberal arts colleges: some are [[coeducational]], [[Women's colleges in the United States|women's colleges]], or [[Men's colleges in the United States|men's colleges]]. There are [[historically black colleges and universities|historically black colleges]]; in addition, while most schools are [[separation of church and state in the United States|secular]], some stress a particular religious orientation. Most are [[private school|private]] colleges but there are some [[Council of Public Liberal Arts Colleges|public]] ones.

      '''[[Public university|State colleges and universities]]''' are usually subsidized with state funds and tend to charge lower tuitions to residents of that state. They tend to be large, sometimes with student bodies numbering in the tens of thousands, and offer a variety of programs. They are generally less selective in terms of admissions than elite private schools and are usually less expensive, sometimes half or a third as much as a private institution for in-state residents.<ref name="twsL33" /> There are reports that due to recent budget shortfalls, many state schools are trying to attract higher-paying out-of-state residents.<ref name="twsMay2R212">{{cite news
       |author= Andrew J. Rotherham
       |title= The Latest Wrinkle in College Admissions: State schools are increasingly recruiting out-of-state students who pay higher fees. But is this fair?
       |newspaper= Time 
       |date= December 1, 2011
       |url= https://ideas.time.com/2011/12/01/the-latest-wrinkle-in-college-admissions/
       |access-date= May 18, 2012
      }}</ref> In the past few years, competition for spots in public institutions has become more intense, with some state schools such as the [[State University of New York]] reporting record numbers of students accepting their offers of admission.<ref name="twsL33">{{cite news
       |author= Lisa W. Foderaro
       |title= Well-Regarded Public Colleges Get a Surge of Bargain Hunters
       |newspaper= The New York Times
       |date= March 1, 2009
       |url= https://www.nytimes.com/2009/03/02/nyregion/02suny.html?ref=admissions
       |access-date= December 12, 2011
      }}</ref> There are reports that tuition at state universities is rising faster than at private universities.<ref name="twsMay2S213">{{cite news|url=https://www.washingtonpost.com/wp-dyn/articles/A21178-2003Oct13.html|title=PBS: 'Ten Steps to College' (transcript)|author=Howard and Matthew Greene|date=October 22, 2003|newspaper=Washington Post|access-date=May 19, 2012}}</ref> [[Flagship#University|Flagship state universities]] are usually the most prominent public schools in a state, often being the oldest and most well-funded.<ref name="tws2V2449">{{cite web
       |title= Frequently Asked Questions about Finding a College
       |work= diycollegerankings.com
       |year= 2012
       |url= http://diycollegerankings.com/frequently-asked-questions-about-finding-a-college/
       |access-date= June 22, 2012
      }}</ref>

      [[File:Flickr - The U.S. Army - United States Military Academy at West Point.jpg|thumb|alt=Outdoors men in gray uniforms throwing hats in the air.|Specialty colleges such as the [[United States service academies]] have particular admissions requirements; applicants must be nominated by their [[United States House of Representatives|congressperson]].]]

      === Methods of college entry ===
      === Test preparation courses ===
      There are conflicting reports about the usefulness of [[test preparation]] courses. Mamlet and VanDeVelde suggest that "most students don't need a coach or a class" and that the single largest factor was "familiarity with the test".<ref name=twsMay2R214/> Another report agreed that SAT/ACT prep courses were a waste of money and that taking a few practice exams, and understanding how each test works, was all that was needed.<ref name="twsMay2R211">{{cite news|author=Jay Mathews|date=January 20, 2012|title=5 wrong ideas about college admission|newspaper=Washington Post|url=https://www.washingtonpost.com/blogs/class-struggle/post/5-wrong-ideas-about-college-admission/2012/01/19/gIQAayDXBQ_blog.html|access-date=May 18, 2012}}</ref>

      ====Standardized admissions tests====
      In 2003, according to one estimate, 1.4 million students took the SAT and 1.4 million also took the ACT test,<ref name=twsMay2S213 /> paying about $50 per test.<ref name=tws2V2449 /> Generally counselors suggest that students should plan on taking the SAT or ACT test twice, so that a low score can possibly be improved.{{sfn|Mamlet|2011|p=98}} One advisor suggested that students with weak [[SAT]] or [[ACT (test)|ACT]] scores could consider applying to colleges where these measures were optional.<ref name="twsL19">{{cite news|url=http://thechoice.blogs.nytimes.com/2009/09/25/nacac-b-c/|title=College Options (And Strategies) for the 'B' and Even 'C' Student|author=Theo Emery|date=September 25, 2009|newspaper=The New York Times|access-date=December 12, 2011}}</ref> One suggested retaking the tests if there are "subpar test scores" in September and October (if applying early admission) or November and December (if applying regular admission.)<ref name="twsL27">{{cite magazine|author1=Stacey Kostell|author2=Michele Hernandez|author3=Steve Loflin|author4=Katherine Cohen|date=October 12, 2011|title=How Can High School Seniors Improve Odds of College Admissions?|url=https://www.usnews.com/education/blogs/college-admissions-experts/2011/10/12/how-can-high-school-seniors-improve-odds-of-college-admissions|magazine=U.S. News & World Report |access-date=December 12, 2011}}</ref> Generally over half of eleventh graders retaking the SAT or ACT tests during the twelfth grade saw improvements in their scores.<ref name=tws2V2449 /> Colleges vary in terms of how much emphasis they place on these scores.<ref name=tws2T21>{{cite news |author1=Hunter, Jeffrey G. |author2=Samter, Wendy |title=A college admission test protocol to mitigate the effects of false negative SAT scores |work=Journal of College Admission  |quote=According to Gandara and Lopez (1998), SAT scores will be weighted anywhere from "almost not at all" to "heavily" in the admission decision, depending upon the college or university. |date=July 1, 2000 |url=http://www.highbeam.com/doc/1P3-56122130.html |archive-url=https://archive.today/20130125041452/http://www.highbeam.com/doc/1P3-56122130.html |url-status=dead |archive-date=January 25, 2013 |access-date=August 20, 2012}}</ref>

      A consensus view is that most colleges accept either the [[SAT]] or [[ACT (test)|ACT]], and have formulas for converting scores into admissions criteria, and can convert SAT scores into ACT scores and vice versa relatively easily.{{sfn|Hernandez|2009|p=57}} The ACT is reportedly more popular in the [[Midwestern United States|midwest]] and [[Southern United States|south]] while the SAT is more popular on the [[Eastern United States|east]] and [[Western United States|west]] coasts.<ref name=tws2V211 />

      {| style="float:right; width:30em; font-weight:bold; border:solid 1px #999999; font-size:.9em; line-height:1.3em; margin:0 0 1em 1em;" cellpadding="4" cellspacing="0"

      |-style="color:#000080; font-size:1.1em;" align="center" valign="top"
      |ACT test
      |SAT test

      |-style="color:#800000;" valign="top"
      |Content-based test<ref name=tws2V211 />
      |Tests reasoning ability<ref name=tws2V211 />

      |-style="color:#10365B;" valign="top"
      |Emphasizes higher math<ref name=twsMay2Pfjk /><ref name=tws2V211 />
      |Emphasizes vocabulary<ref name=twsMay2Pfjk /><ref name=tws2V211 />

      |-style="color:#2A6B35;" valign="top"
      |Longer questions<ref name=tws2V211 />
      |Trickier questions<ref name=tws2V211 />

      |-style="color:#0581F1;" valign="top"
      |More popular in south & midwest<ref name=tws2V211 />
      |More popular in east & west<ref name=tws2V211 />

      |-style="color:#266F5E;" valign="top"
      |Science reasoning section<ref name=tws2V211 />
      |Vocabulary section<ref name=tws2V211 />

      |-style="color:#630C75;" valign="top"
      |No penalty for wrong answers{{sfn|Mamlet|2011|p=92}}
      |No penalty for wrong answers<ref name=twsReuters143>Renee Dudley, September 21, 2016, Reuters, [https://www.reuters.com/investigates/special-report/college-sat-redesign/ Despite warnings, College Board redesigned SAT in way that may hurt neediest students], Retrieved October 12, 2016, "no penalty for guessing wrong,&nbsp;... encourages students to answer every question&nbsp;... simply earn points for the questions you answer correctly"</ref><ref>Note: SAT updated in 2016</ref>

      |-style="color:#10365B;" valign="top"
      |Greater choice in selecting which scores to send to colleges{{sfn|Hernandez|2009|p=57}}
      |Fewer options

      |-style="color:#0581F1;" valign="top"
      |Difficult questions randomly interspersed<ref name=tws2V211 />
      |Difficulty progresses within each section<ref name=tws2V211 />
      |}
      Regarding whether to choose the SAT or ACT, the consensus view is that both tests are roughly equivalent and tend to bring similar results, and that each test is equally accepted by colleges. Reporter Jacques Steinberg in ''[[The New York Times]]'' suggested that admissions deans repeatedly inform him that colleges view the ACT and SAT tests equally and do not have a preference.<ref name=twsMayO312>{{cite news |author=Jacques Steinberg |title=Q. & A. College Admissions; ACT vs. SAT: Deciding Which Exam to Take |newspaper=The New York Times |date=September 12, 2010 |url=https://query.nytimes.com/gst/fullpage.html?res=950DEEDF1339F931A2575AC0A9669D8B63 |access-date=May 15, 2012}}</ref> At the same time, small differences between the tests may translate into a slight benefit for the test-taker. One report suggested that the SAT favors "white male students" from upper income backgrounds.<ref name=twsMayO313>{{cite news |author=Sarah Gonzalez |title=SAT Tests Favor White, Male Students, Book Argues |publisher=NPR Florida |date=November 10, 2011 |url=http://stateimpact.npr.org/florida/2011/11/10/sat-tests-favor-white-male-students-book-argues/ |access-date=May 15, 2012}}</ref> Another report suggests that the ACT has more questions geared to higher levels of high school mathematics, suggesting that students who do well in math may perform better, but that the SAT is a better choice for students with an excellent vocabulary.<ref name=twsMay2Pfjk /><ref name=tws2V211 /> According to one view, the SAT is more focused on testing reasoning ability while the ACT is more of a content-based test of achievement.<ref name=tws2V211>{{cite web |title=ACT vs SAT: Key differences between the ACT and SAT |work=Studypoint.com |year=2012 |url=http://www.studypoint.com/ed/act-vs-sat/ |access-date=June 22, 2012}}</ref> In addition, according to this view, some SAT questions can be trickier and harder to decipher while some ACT questions may be longer;<ref name=tws2V211 /> question difficulty progresses within each SAT section while difficult questions are randomly interspersed in the ACT;<ref name=tws2V211 /> the SAT has a separate vocabulary section while the ACT has a separate science reasoning section.<ref name=tws2V211 /> In 2016 the SAT was updated to remove the penalty for random guessing; the College Board advises that test-takers will benefit by guessing.<ref name=twsReuters143 />
      [[File:SAT_Scores_(75th_Percentile)_vs._College_Acceptance_Rates.png|thumb|Each institution is represented as a data point, showing how selectivity tends to increase as SAT benchmarks rise.]]

      ====SAT Subject Tests====
      Many colleges require, recommend, or consider [[SAT Subject Tests]] in the admissions process. One described them as "true equalizers" in admissions, suggesting how strong a high school is, and elaborated that some admissions officers consider them to be a better indicator of academic ability than high school grades.{{sfn|Hernandez|2009|pp=59–65}} Another suggested that selective colleges emphasize [[SAT Subject Tests]], while public colleges place less emphasis on them.{{sfn|Mamlet|2011|p=94}} The SAT Subject Tests were discontinued by the College Board at the beginning of 2021.

      ====Advanced Placement tests====
      There was a report that scores on [[Advanced Placement exams]] could be helpful in the evaluations process.{{sfn|Hernandez|2009|p=97}} One report suggested there was a limit on the number of AP tests that should be taken, such that taking 12 AP tests was not as helpful as taking five and doing well on those five.<ref name=twsMay2R211/>

      ===Interviews===
      There are differing recommendations about the importance of interviews, with the consensus view that interviews were overall less important than college admissions essays, but should be done if they were offered.<ref name=twsMay2S213/> One advisor suggested that visits by college admissions personnel to the high schools were a waste of time for colleges, since there was not enough time to get to know specific applicants.{{sfn|Hernandez|2009|p=107}} In addition, she felt that personal interviews were generally overrated, though she noted that many Ivies have alumni interviews, which can help in borderline situations.{{sfn|Hernandez|2009|pp=153–156}} One counselor suggested that if an interview was offered by a college admissions program, then it was not really optional but it should be seen as a requirement, that is, not going to such an interview could be detrimental to a student's chances for admission.<ref name=twsL24/> Another suggested that a student should try to get an interview, even if it was not required, since it might help "exhibit character strengths" that might not show up via grades on high school transcripts.<ref name=twsL19/> Several reports noted that most [[Ivy League]] schools have abandoned the interview requirement, but that if there is an opportunity for an interview, even with an alumnus of the college, then it is a good idea to do it since not doing it signals a lack of interest in the school.<ref name=twsL24/>{{sfn|Hernandez|2009|pp=153–156}} Knowing a college can be helpful during an interview, so that an applicant can say something specific about the school, or a professor who teaches there, or a subject or internship opportunities, since it shows sincere interest.<ref name="twsL44">{{cite magazine|author=Marc Silver|date=August 16, 2010|title=Rocketing Past the College Admissions Blunders: Deans and college counselors have seen it all, from the sublime to the ridiculous.|url=https://www.usnews.com/education/best-colleges/applying/applying-101/articles/2010/08/16/rocketing-past-the-college-admission-blunders|magazine=U.S. News & World Report |access-date=December 12, 2011}}</ref>{{sfn|Hernandez|2009|pp=153–156}} Interviews (if offered) may be more of a factor at small liberal arts colleges:

      {{Blockquote|Our advice is that if offered an interview, a student should take it&nbsp;... And they should dress as if they are going to dinner with their grandparents. The biggest faux pax comes in inappropriate dress for both sexes. Spaghetti straps, buttons that pop open. For boys a rumpled T-shirt&nbsp;... If you look in the mirror and you think you look good, change your clothes. This is not a date.|Mamlet and VanDeVelde<ref name=twsMay2R214/>}}
      [[File:Trinity_College_Hartford_Admissions_building.jpg|thumb|The admissions office of [[Trinity College (Connecticut)|Trinity College]] in [[Hartford, Connecticut]]]]
      One suggested that a goal of interview preparation should be to present oneself as "comfortable with spontaneous conversation" and be able to talk about interests without sounding like the answers were prepared in advance, and suggested it was important to show intellectual passion and a love of learning with a deep excitement, and show "social maturity" with sensitivity, empathy for others unlike oneself, and concern for issues larger than personal career ambitions.{{sfn|Dunbar|2007|pp=29, 36, 38, 83–96}} Applicants should have an attitude that was not be what can the college offer but what can the student offer the college, avoid asking questions about facts better answered elsewhere, and show an openness to new ideas, an ability to work cooperatively with others, ambition, and caring about others.{{sfn|Dunbar|2007|pp=62, 66, 67}} Interviewees should be ready for sometimes provocative questions to test social sensitivity; if an interviewer asks a "baiting or leading question", an applicant should respond by laughing while politely disagreeing with the perspective, and to keep trying to enjoy the conversation with the interviewer.{{sfn|Dunbar|2007|p=93}} Another advisor suggested that students must be prepared to answer the question ''What is your biggest failure'' in an interview.<ref name=twsBostonGlobe4>Sanjay Solomon, January 30, 2015, The Boston Globe, [https://www.boston.com/jobs/news/2015/01/30/can-failure-resume-help-you-succeed/uTBdq9A7LfXXF7vVOlG9oM/story.html Can a Failure Resume Help You Succeed?], Retrieved January 30, 2016, "Asking 'what is your biggest failure?' is an opportunity [for an interviewer] to get a reality check and to put a little pressure on this person"</ref> Applicants should avoid sounding snide, annoyed, contemptuous, and avoid describing oneself as humiliated, bored, depressed, angry, shy, inhibited, anxious, frightened, and frustrated,{{sfn|Dunbar|2007|pp=110–122}} and should be upbeat but avoid going for the hard sell.{{sfn|Dunbar|2007|pp=110–122}} Another report suggested that shy or timid applicants were at a disadvantage.<ref name=tws2T28>{{cite news
       |author= Hanley, Thomas A. Jr.
       |title= Shyness and the College Admission Process: Who is Being Left Out?
       |work= Journal of College Admission
       |quote= If two applicants appeared academically equivalent on paper and both were interviewing at a top tier school, the gregarious, self-confident candidate would most likely be perceived more favorably than the timid and self-conscious one
       |date= January 1, 2005
       |url= http://www.highbeam.com/doc/1P3-809396571.html
       |archive-url= https://archive.today/20130125180139/http://www.highbeam.com/doc/1P3-809396571.html
       |url-status= dead
       |archive-date= January 25, 2013
       |access-date= August 20, 2012
      }}</ref> Another advisor suggested that a student try to find a common bond with the interviewer, and send a brief follow-up letter afterwards.{{sfn|Hernandez|2009|pp=157–158}}

      Due to the Coronavirus pandemic, colleges began offering interviews over video conferencing platforms such as Zoom.<ref>{{Cite web|date=2020-10-21|title=Virtual College Interviews: Everything You Need to Know|url=https://blog.collegevine.com/virtual-college-interview-tips/|access-date=2021-10-30|website=blog.collegevine.com}}</ref>

      ===Essays===
      [[File:Sign saying Common Application Membership.jpg|thumb|The [[Common Application]].]]
      There are differing opinions about the importance of the [[admissions essay|college essay]]. The consensus view is that the essay is less important than grades and test scores, but that an essay can make a difference in some instances,<ref name="twsL24" /> often at highly selective colleges where they can "make or break your application".<ref name="twsMayO112" /> There was one report that essays were becoming more important as a way to judge a student's potential<ref name="twsMayO112" /> and that essays have supplanted personal interviews as a primary way to evaluate a student's character.

      The Common Application requires that personal statements be 250 to 650 words in length.<ref>{{Cite web|url=https://admission.stanford.edu/apply/freshman/apply.html|title=How to Apply: Stanford University|website=admission.stanford.edu|language=en|access-date=2018-10-28}}</ref> Although applicants may strive to reach the word limit, college admissions officers emphasize that the most important part is honing and rewriting:

      {{Blockquote|Writing is easy; rewriting is hard. And essays deserve to be rewritten several times. Lots of kids think the objective is to write about something that will ''impress'' the admission office. In part that is true, but what impresses an admission officer is an essay that conveys something positive about the applicant; that allows the committee to get to know the kid just a bit from those few pieces of paper. The essay is an opportunity to provide a different perspective about the applicant, a reason to accept a kid. It is an opportunity not to be wasted.<ref name=twsL24/>}}

      Advisors suggest that the essay should be concise, honest (with no embellishments), coherent, not boring,<ref name=tws2ZG315/> accurate, and visually evocative. The essay should reveal a likeable<ref name=tws2ZG315/> and intelligent individual. It should approach humor and controversial topics with caution and balance.<ref name="twsL26">{{cite magazine|url=https://www.usnews.com/education/blogs/professors-guide/2010/09/15/10-tips-for-writing-the-college-application-essay|title=10 Tips for Writing the College Application Essay|author1=Jeremy S. Hyman|date=September 15, 2010|access-date=December 12, 2011|magazine=U.S. News & World Report |author2=Lynn F. Jacobs|author3=Jonathan Reider}}</ref> Other tips include avoiding [[jargon]] or abbreviations, overly emotional appeals, profanity or texttalk (example: Schools H8 2 C texttalk), or artiness (e.g. poetry in an application)<ref name=tws2ZG315/> or cockiness.<ref name=twsL44/>

      Former guidance counselor for students at [[Phillips Academy|Andover]] and college admissions authority Donald Dunbar suggested that essays must emphasize personal character and demonstrate intellectual curiosity, maturity, social conscience, concern for the community, tolerance, and inclusiveness.{{sfn|Dunbar|2007|p=ix}} He advises to not merely "be yourself", but show your "best self".{{sfn|Dunbar|2007|pp=11–21}} Dunbar furthermore claims that demonstrating class participation suggests a "willingness to go beyond selfishness" and shows enthusiasm for learning.{{sfn|Dunbar|2007|p=25}} Alan Gelb suggests that the only "no-no" is "shameless self-promotion".<ref name=twsMayO212>{{cite news
       |last= Gelb
       |first= Alan
       |title= The College Admissions Essay: Finding a Topic
       |newspaper= The New York Times
       |quote= For your college admissions essay, you will be asked to write 500 flawless words&nbsp;... As far as I'm concerned, the only taboo is shameless self-promotion.
       |date= May 14, 2012
       |url= http://thechoice.blogs.nytimes.com/2012/05/14/the-college-admissions-essay-finding-a-topic/
       |access-date= May 15, 2012
      }}</ref> Topics to avoid{{according to whom|date=October 2016}} include babysitting experiences, pets, encounters with illegal drugs or alcohol or criminal activity,{{sfn|Mamlet|2011|p=207}} excuses to explain a low grade,{{sfn|Mamlet|2011|p=207}} stories about a former home or big brother or sister,{{sfn|Dunbar|2007|p=34}} a simple listing of achievements,{{sfn|Mamlet|2011|p=207}} expressing thanks for being chosen as a leader, talking about a "wilderness leadership course",{{sfn|Dunbar|2007|pp=67–68}} general complaining or whining,{{sfn|Mamlet|2011|p=207}} [[racism]] or [[sexism]] or disrespect for groups of people,{{sfn|Mamlet|2011|p=207}} bad taste or profanity or vulgarity or bathroom humor,{{sfn|Mamlet|2011|p=207}} early love or sex experiences,{{sfn|Mamlet|2011|p=207}} criticism or disrespect for parents,{{sfn|Mamlet|2011|p=207}} telling only jokes,{{sfn|Mamlet|2011|p=207}} excessive bragging or too many instances of the "I" pronoun,{{sfn|Mamlet|2011|p=207}}<ref>For example: "I did this, I did that, then I did this" and on and on.</ref> personal health information about yourself or a friend or a family member,{{sfn|Mamlet|2011|p=207}} and copy-and-pasting a term paper in the essay form{{sfn|Mamlet|2011|p=207}} such as about global warming or the European debt crisis. Applicants should refrain from express opinions too strongly as if no counterviews were possible.{{sfn|Mamlet|2011|p=207}} The topic should be something the applicant cares about,{{sfn|Dunbar|2007|p=50}} and should show ''leadership'' in the sense of "asserting yourself to help others have more success". According to Dunbar, leadership is not necessarily about being in charge such as being the team captain or school president.{{sfn|Dunbar|2007|p=54}} Applicants should present a broad perspective and avoid simplistic words such as ''never'', ''always'', ''only'', or ''nobody'', which suggest narrow thinking.{{sfn|Dunbar|2007|p=136+}} Dunbar advised against the standard "tell 'em what you've told 'em" essay formula but doing something different, interesting, and exciting.{{sfn|Dunbar|2007|p=147}}

      Former admissions director Michele Hernandez agreed, and suggested that the best essay topics were a slice-of-life story with poignant details, in which the writer ''shows'' and does not ''tell''.{{sfn|Hernandez|2009|pp=130–136}} She suggested that a student show their essay to a literate friend and ask if would they admit this person to the college.{{sfn|Hernandez|2009|pp=130–136}} She recommended that applicants not try to come across as a "preppy well-off kid" but downplay parental status.{{sfn|Hernandez|2009|pp=6–9}} Advisors Mamlet and VanDeVelde suggest that students proactively try to explain an unusual grade, such as a low grade in a core course.{{sfn|Mamlet|2011|p=58}} There are online databases available to help students write cogent essays.<ref name=Anders2014>{{cite news|last1=Anders|first1=George|title=What Essays Thrill Elite Schools? These Teens Will Show You|url=https://www.forbes.com/sites/georgeanders/2014/12/01/what-essays-thrill-elite-schools-these-teens-will-show-you/|access-date=March 17, 2015|work=Forbes|date=December 1, 2014}}</ref>

      ===Teacher recommendations===
      Many colleges ask for teacher recommendations, typically from eleventh or twelfth grade teachers of core courses who know the student well. A counselor recommendation is often requested as well. One report suggested that having more than four recommendations was a mistake, as a "thick file" indicated a "thick student" to admissions personnel.<ref name=tws2ZG315/> Teacher recommendations are becoming less important as a rating measure, according to one report.<ref name=twsMayO112>{{cite news
       |author= Kim Clark
       |title= 8 Big Changes to College Admissions in 2010 and 2011
       |newspaper= U.S. News & World Report
       |date= November 15, 2010
       |url= https://www.usnews.com/education/best-colleges/applying/articles/2010/11/15/8-big-changes-to-college-admissions-in-2010-and-2011
       |access-date= May 15, 2012
      }}</ref> In addition, a few colleges are asking for recommendation letters from parents to describe their child:

      {{Blockquote|You might think they do nothing but brag&nbsp;... But parents really nail their kids. They really get to the essence of what their daughter is about in a way we can't get anywhere else.|Deb Shaver, director of admissions at [[Smith College]]<ref name=twsMay2R213>{{cite news
       |author= Bonnie Rochman
       |title= The Latest Trend in College Admissions: Parents Write Letters of Recommendation: Some colleges are starting to ask Mom and Dad to put in a written plug for their progeny in the college admissions process.
       |newspaper= Time 
       |date= March 26, 2012
       |url= https://healthland.time.com/2012/03/26/the-latest-trend-in-college-admissions-parents-write-letters-of-recommendation/
       |access-date= May 18, 2012
      }}</ref>}}

      ===Other considerations===
      [[File:Elmira_College_Office_of_Admissions.jpg|thumb|The Office of Admissions at [[Elmira College]] ]]
      Advisors counsel that applicants should meet deadlines,<ref name="twsL12">{{cite magazine|author1=Diana Hanson|author2=Esther Walling|author3=Craig Meister|author4=Kristen Tabun|date=November 16, 2011|title=Which College Admissions Deadline Should You Choose?|url=https://www.usnews.com/education/blogs/college-admissions-experts/2011/11/16/which-college-admissions-deadline-should-you-choose|magazine=U.S. News & World Report|access-date=December 12, 2011}}</ref>{{sfn|Hernandez|2009|p=153}}<ref name=twsMay2Pfjk/> spend time researching colleges,<ref name=twsL12/> be open-minded,<ref name="twsL13">{{cite news |author=Strauss |first=Valerie |date=March 7, 2010 |title=College admissions strategies: Don't listen to friends, and more |url=http://voices.washingtonpost.com/answer-sheet/college-admissions/college-admissions-strategies.html |url-status=dead |archive-url=https://web.archive.org/web/20121101150704/http://voices.washingtonpost.com/answer-sheet/college-admissions/college-admissions-strategies.html |archive-date=November 1, 2012 |access-date=December 12, 2011 |newspaper=The Washington Post}}</ref> have fun,<ref name=twsL13/> communicate what "resonates" to the applicant about a particular school,<ref name=twsL23/> not fall in love with one or two colleges,<ref name="twsL14">{{cite magazine|author=Carolyn Butler|date=September 13, 2011|title=Follow 7 Strategies to Get Into College: To stand out in the admissions game, prepare early and use common sense|url=https://www.usnews.com/education/best-colleges/articles/2011/09/13/follow-7-strategies-to-get-into-college?PageNr=2|magazine=U.S. News & World Report |access-date=December 12, 2011}}</ref> follow directions precisely<ref name=twsMay2Pfjk/> and make sure to click the "submit" button.<ref name=twsL44/> Rudeness towards staff members, feigning enthusiasm, and being pretentious are other turnoffs reported by admissions officers.<ref name=twsMay2Pfjk/> There is strong consensus among counselors and advisors that starting the college search early is vital. One recommends starting early in the twelfth grade;<ref name=twsL13/> another suggests that even this is too late, and that the process should begin during the eleventh grade and summer before twelfth grade.<ref name=twsL23>{{cite magazine
       |author1=Nancy Meislahn |author2=Don Fraser Jr. |author3=Jolyn Brand |author4=George Mills |title= What Are Some Mistakes to Avoid in the College Admissions Process?
       |magazine= U.S. News & World Report
       |date= July 20, 2011
       |url= https://www.usnews.com/education/blogs/college-admissions-experts/2011/07/20/what-are-some-mistakes-to-avoid-in-the-college-admissions-process
       |access-date= December 12, 2011
      }}</ref> Sources suggest that students who begin the process earlier tend to earn more acceptance letters.<ref name=twsL12/> Another advantage of beginning early is so that applications can be proofread for mistakes.<ref name=twsL23/> Advisors suggest that emails should be sent to specific persons in the admissions office, not to a generalized inbox.<ref name=twsL44/> Advisors suggest that applicants sending in paper applications should take care that handwriting is legible, particularly email addresses.<ref name=twsL44/> Advisors counsel that mistakes or changes should be explained somewhere in the application; for example, an adviser at [[Grinnell College]] suggested that a record need not be perfect but there must be an "explanation for any significant blip".<ref name=twsL44/><ref name=twsL14/> Advisors suggest that applicants should "own up to any bad behavior" such as suspensions since schools are "dutybound to report them", and suggest that a person should "accept responsibility and show contrition for "lessons learned", according to one view.<ref name=twsL44/>{{sfn|Hernandez|2009|p=137}} Disciplinary actions are usually reported to the colleges by the high school as a matter of course. Advisors suggest that the application should help a student position themselves to create a unique picture.<ref name=twsL14/> It helps, according to one advisor, if a person knows himself or herself, because that enables an applicant to communicate effectively with a prospective school.<ref name=twsL23/> A report in ''[[The New York Times]]'' in 2016 suggested that some universities were considering changing their admissions guidelines to be more inclusive of less affluent applicants, to put less emphasis on [[standardized test]] and AP scores, and to put more emphasis on determining "which students' community-service projects are heartfelt and which are merely window dressing"; the report suggested that college admissions policies were often "cited as a culprit in [[sleep deprivation]], anxiety and depression among students".<ref name=twsNYT7>Frank Bruni, January 19, 2016, The New York Times, [https://www.nytimes.com/2016/01/20/opinion/rethinking-college-admissions.html?_r=0 Rethinking College Admissions], Accessed January 19, 2016</ref><ref name=twsWashPost5>Lisa Heffernan and Jennifer Wallace, January 20, 2016, The Washington Post, [https://www.washingtonpost.com/news/parenting/wp/2016/01/20/to-get-into-college-harvard-report-advocates-for-kindness-instead-of-overachieving/?tid=sm_fb To get into college, Harvard report advocates for kindness instead of overachieving], Retrieved January 20, 2016, "Parents, educators and college administrators have long wrestled with the unintended negative side effects&nbsp;... intense focus on personal achievement and the unfair advantages of more affluent students."</ref>

      ===International applications===
      {{Multiple image
      | image1 = TOEFL Logo.svg
      | image2 = IELTS logo.svg
      | direction = vertical
      | footer = Many schools ask that non-native English speakers provide [[TOEFL]] or [[IELTS]] scores
      }}
      International students form a large and growing percentage of applicants to American universities.<ref>{{cite web|url=http://www.iie.org/Who-We-Are/News-and-Events/Press-Center/Press-Releases/2011/2011-11-14-Open-Doors-International-Students|title=International Student Enrollments Increase in 2010/11|access-date=September 29, 2014}}</ref> According to [[Phillips Academy|Andover]] counseling director Sean Logan, applications to American universities from foreign students have increased dramatically in the past decade.<ref name=tws3afa/> International applications are typically similar to domestic ones but with additional complications. Most international applicants do not receive a GPA score or transcript from their school.<ref>{{cite web|url=http://www.thestudentroom.co.uk/wiki/Applying_to_the_United_States|title=Apply to uni in the USA – The Student Room – The Student Room|work=The Student Room|access-date=September 29, 2014}}</ref> Most will not normally take SAT or ACT exams, so these must be arranged. Most American universities are happy to accept international qualifications such as the [[International Baccalaureate]] and [[A Levels]],<ref>{{cite news| url=https://www.telegraph.co.uk/education/universityeducation/8796366/The-American-dream-How-to-apply-to-a-US-university.html | location=London | work=The Daily Telegraph | first1=Andrew | last1=Halls | title=The American dream: How to apply to a US university | date=September 29, 2011}}</ref> although it is often up to the applicant to elaborate on the meaning of these qualifications.<ref>{{cite web|url=http://www.fulbright.org.uk/study-in-the-usa/undergraduate-study/applying/admissions-criteria#academics|title=US Admissions Criteria – Undergraduate Study in the USA – US-UK Fulbright Commission|access-date=September 29, 2014}}</ref> Non-native English speakers may be asked to provide English language qualifications such as [[TOEFL]] or [[IELTS]] scores. If a university requires or offers an interview, these can normally be conducted over the phone or with alumni residing in the applicant's country.<ref>{{cite web|url=http://www.uniintheusa.com/how-why/us-applications/1449/interviews|title=Study Abroad Grants – Study Abroad Funding – University In The USA|access-date=September 29, 2014|url-status=dead|archive-url=https://web.archive.org/web/20141225040629/http://www.uniintheusa.com/how-why/us-applications/1449/interviews|archive-date=December 25, 2014|df=mdy-all}}</ref><ref>{{cite news| url=https://www.telegraph.co.uk/education/universityeducation/8810587/Why-study-in-the-US-could-be-a-bright-idea.html | location=London | work=The Daily Telegraph | first=Janette | last=Wallis | title=Why study in the US could be a bright idea | date=October 7, 2011}}</ref> International applicants often must cope with higher tuition fees and less available financial aid, although this varies significantly by college. Further, international applicants must also apply for a student visa, which can be a complex and time-consuming process.<ref>{{cite web |url=http://www.intstudy.com/study-in-america/study-advice/apply-to-study-in-america |title=Apply to Study in America &#124; International Study |access-date=2013-01-14 |url-status=dead |archive-url=https://web.archive.org/web/20130124222427/http://www.intstudy.com/study-in-america/study-advice/apply-to-study-in-america |archive-date=January 24, 2013 |df=mdy-all }}</ref>

      College admissions officers are generally looking to build a well-rounded class and look for students who will complement each other. Consequently, many schools are looking for students who are passionate and excel at particular things, and candidates who fulfill certain institutional needs rather than a "well-rounded kid".<ref name="twsL42">{{cite news|url=https://www.nytimes.com/2011/08/06/nyregion/planning-summer-breaks-with-eye-on-college-essays.html?ref=admissions|title=For a Standout College Essay, Applicants Fill Their Summers|author=Jenny Anderson|date=August 5, 2011|newspaper=The New York Times|access-date=December 12, 2011}}</ref>{{Blockquote|Colleges are looking for&nbsp;... the well-rounded class. Colleges put together their entering class as a mosaic: a few great scholars for each academic department; a handful of athletes; some musicians, dancers, and theater stars; a few for racial and economic diversity; some potential club leaders, etc. Colleges want a kid who is devoted to – and excels at – something. The word they most often use is passion.|Steve Cohen in ''The Washington Post'', 2011<ref name=twsL24/>}}

      {{Blockquote|Colleges want students who have demonstrated through their actions an ability to see and connect with a world that is larger than they are.|Robin Mamlet and Christine Vandevelde, 2011{{sfn|Mamlet|2011|p=69}}}}Institutional needs include athletics and music as well as geographical, cultural, racial, and socioeconomic diversity ([[Pell Grant]] recipients, first-generation students).

      Some schools, particularly public universities, will use admissions criteria which are almost entirely formulaic in certain aspects of admission. For example, they may be required by statute to admit a minimum number of in-state students, or to guarantee admission to students graduating the top 6% of their high school class, or to guarantee admission to valedictorians. Many admits, however, are made on the basis of subjective judgments regarding the student's "fit" for the institution.<ref name="twsMay2Q84567">{{cite news|author=Kayla Webley|date=April 12, 2012|title=How Colleges Really Make Admissions Decisions|newspaper=Time |url=https://newsfeed.time.com/2012/04/12/how-colleges-really-make-admissions-decisions/|access-date=May 17, 2012}}</ref>

      Admissions offices must read through thousands of applications, each of which include transcripts, letters of recommendation, and the application itself.{{sfn|Hernandez|2009|p=104}} In 2009, the average admissions officer was responsible for analyzing 514 applications, and officers have experienced an upward trend in the number of applications they must read over time.<ref name="twsMayO112" /> A typical college application receives only about 25 minutes of reading time, including three to five minutes for the personal essay if it is read.{{sfn|Dunbar|2007|p=6}}

      Larger admissions offices will have specialists assigned to cover different regions, and individual officers may act liaison for a regional set of high schools developing a deep understanding of their curriculum and rigor. The reading and preliminary admit / deny decision may be divided up into committees of readers, and borderline candidates are then discussed more collectively. Some admissions offices use a scoring system in an effort to normalize the many applicants. Criteria include standardized test scores (generally [[ACT (test)|ACT]] and/or [[SAT]]), college prep courses, grades (as shown in the high school [[Transcript (education)|transcript]]), strength of curriculum, class rank, degree of extracurricular involvement, and leadership potential.<ref name="twsMayO112" /> A combination of these can be used to derive an ''academic index''.{{sfn|Hernandez|2009|pp=66–71}} For example, at [[Dartmouth College]], data goes into a ''master card'' for each application, which leads to a ''ready sheet'', where readers summarize applications; then, an initial screening is done: top applications go directly to the director of admissions for approval while lackluster ones go to another director.{{sfn|Hernandez|2009|pp=110–111}} Dartmouth uses "A" for accept, "R" for reject, "P" for possible, with "P+" and "P-" being variants.{{sfn|Hernandez|2009|pp=110–111}} A committee might spend a week with the "P" ones, of which they only accept about a sixth.{{sfn|Hernandez|2009|pp=110–111}}

      Many colleges also rely on personal essay(s) written by the applicant and letters of recommendation written by the applicant's teachers and [[guidance counselor]]. One principal benefit of the essay lies in its ability to further differentiate students who have perfect or near-perfect grades and test scores. Institutions place different weight on these criteria: for example, [[Liberal arts colleges in the United States#SAT optional movement|"test optional" schools]] do not require or even accept the [[SAT]]s for admission.<ref>{{Cite news|url=https://www.unigo.com/get-to-college/college-search/test-optional-colleges-10-colleges-that-dont-require-sat-or-act-scores|title=10 colleges that don't require SAT or ACT scores|date=2018-07-13|work=Unigo.com|access-date=2018-10-28}}</ref> Some factors are beyond a student's control, such as a college's need in a given year for [[Affirmative action|diversity]], [[Legacy preferences|legacy applicants]], or [[Recruiting (college athletics)|athletic recruiting]].<ref name="twsL14" />

      Some colleges hire statistical experts known as "enrollment consultants" to help them predict enrollment by developing [[computer model]]s to select applicants in such a way as to maximize [[Yield (college admissions)|yield]] and acceptance rates.<ref name="twsZe25">{{cite news|author=Daniel Golden|date=May 29, 2001|title=Glass Floor: Colleges Reject Top Applicants, Accepting Only the Students Likely to Enroll|newspaper=The Wall Street Journal|url=http://www.tdy-perdiem.com/club1/college12.htm|url-status=dead|access-date=December 31, 2011|archive-url=https://web.archive.org/web/20120426082540/http://www.tdy-perdiem.com/club1/college12.htm|archive-date=April 26, 2012|df=mdy-all}}</ref> Some of these models take into account factors such as an applicant's "[[ZIP Code|zip code]], religion, first-choice major and extracurricular interests, as well as academic performance". Some colleges extract information from the federal [[FAFSA]] financial aid form, including names of other schools the applicant is applying to.<ref name="twsZe25" />

      === Academic evaluation ===
      [[File:Baker-Library-Dartmouth-College-Hanover-New-Hampshire-05-2018a.jpg|thumb|[[Dartmouth College]] admissions, according to Michele Hernandez, spends a week examining the ''possibles'' or "P"s, and after much deliberation, accepts perhaps a sixth of them.]]

      ==== High school grades, rigor of curriculum, and college prep courses ====
      High school academic performance is generally the single most important factor in winning admission.<ref name="twsL14" /> Maintaining high grades is particularly important for the fall semester of twelfth grade.<ref name="twsL27" /><ref name="twsMayO112" /> Academic performance in core courses is especially important.{{sfn|Mamlet|2011|p=57}} An ideal academic record is one of increasingly better grades in courses of progressive difficulty.{{sfn|Mamlet|2011|p=53}} [[Ninth grade]] grades generally do not count much,<ref name="twsMay2R211" /> but trends are important—an upward trend in grades was a positive factor, a decline a negative one.{{sfn|Hernandez|2009|p=146}} Public universities are more likely to evaluate applicants based on grades and test scores alone, while private universities tend to be more "holistic" and consider other measures.{{sfn|Mamlet|2011|p=13}}

      Colleges also evaluate applicants by examining how a student has successfully exploited what a high school has had to offer.{{sfn|Mamlet|2011|p=41}}<ref>Note: quoting William Fitzsimmons, Dean of Admissions and Financial Aid at Harvard University.</ref> The strongest candidates will have been challenged by the most demanding courses their school has to offer. Where AP courses are offered, having a high grade point average based on good grades in AP-level or honors courses will be looked upon favorably,<ref name="twsMay2R211" /> but dropping a hard course will be seen negatively.{{sfn|Hernandez|2009|p=139}}

      The college admissions office usually will know schools well enough to understand that not all schools offer AP-level courses so candidates from those schools are not put at a disadvantage. On the other hand, the admissions office will have a high school profile and takes into account such data as curriculum offerings, demographics, and grade distributions at the high school.<ref name="twsL14" />

      ==== ACT and SAT scores ====
      These are read in conjunction with the high school academic record, but their importance varies from school to school.<ref name="twsMamletVanDeVelde">Robin Mamlet and Christine VanDeVelde, College Admission: From Application to Acceptance, Step by Step, Three Rivers Press, 2011, Retrieved January 6, 2016</ref><ref name="twsMay2R214" /> Some schools are test-optional where applicants do not need to submit scores. Schools typically release information on the range of scores from their candidate pool as well as accepted student pool to make applicants aware of their student profile. Some schools will consider ''superscore'' results or ''superscoring'' when an applicant has taken the SAT multiple times by combining the highest score from different test subsections,<ref name="twsOctO2012uiuy">{{cite news
       |author= Peter Van Buskirk
       |title= 9 Testing Tips for College Applicants
       |newspaper= U.S. News & World Report
       |quote=  Keep the 'superscore' in mind: At most colleges, admissions officers look at the best combination of scores.
       |date= June 9, 2010
       |url= https://www.usnews.com/education/blogs/the-college-admissions-insider/2011/08/29/9-testing-tips-for-college-applicants
       |access-date= October 15, 2012
      }}</ref><ref name="twsOctO2012">{{cite news
       |author= Devon Keefe
       |title= Develop a Testing Strategy.(Kaplan)(presenting SAT Reasoning Test scores for college application)
       |newspaper= Newsweek
       |quote= Even many schools that have "opted out" of Score Choice have suggested that they will continue to "super score" students' test scores (i.e., take the highest sectional score from each test and combine them).
       |date= August 17, 2009
       |url= https://www.questia.com/read/1G1-207214496
       |access-date=
      }}{{dead link|date=July 2021}}</ref> although superscoring is rarely done for the ACT<ref name="twsOctO2012sks">{{cite news
       |author= Valerie Strauss
       |title= Do colleges superscore ACT and SAT equally?
       |newspaper= The Washington Post
       |quote=most schools superscore both the ACT and the SAT. While many schools do, many more do so for the SAT than the ACT.
       |date= June 9, 2010
       |url= http://voices.washingtonpost.com/answer-sheet/sat-and-act/superscoring-act-vs-sat.html
       |archive-url= https://web.archive.org/web/20121019033332/http://voices.washingtonpost.com/answer-sheet/sat-and-act/superscoring-act-vs-sat.html
       |url-status= dead
       |archive-date= October 19, 2012
       |access-date= October 15, 2012
      }}</ref> because of difficulty processing five separate rounded numbers.<ref name="twsOctO2012fjs">{{cite news
       |author= Daniel de Vise
       |title= College, Inc.
       |newspaper= The Washington Post
       |quote=  Not many superscore the ACT, because they'd have to work with five separate numbers, including a composite that often has been rounded up or rounded down
       |date= February 8, 2012
       |url= https://www.washingtonpost.com/blogs/college-inc/post/guest-post-calculator-shopping-the-night-before-the-sat/2012/02/08/gIQAoVc0yQ_blog.html
       |access-date= October 15, 2012
      }}</ref>

      ====Demonstrated interest====
      {{See also|Yield protection}}
      [[File:Braker_Hall_-_Tufts_University_-_IMG_0949.JPG|thumb|[[Yield protection]] is sometimes referred to as [[Tufts University|Tufts]] syndrome]]
      This can be an important factor in some situations, sometimes a "driving factor",<ref name="tws3afa">{{cite news |author= |date=Winter 2013 |title=Inside College Counseling with Director Sean Logan |url=https://www.andover.edu/About/Newsroom/TheMagazine/Documents/AndoverMagSeanLogan.pdf |url-status=dead |archive-url=https://web.archive.org/web/20150510172036/https://www.andover.edu/About/Newsroom/TheMagazine/Documents/AndoverMagSeanLogan.pdf |archive-date=May 10, 2015 |access-date=February 24, 2013 |work=Andover Magazine |df=mdy-all}}</ref> since a college may be more likely to say yes to a student likely to matriculate. Accordingly, it has been advised to become knowledgeable about schools being applied to, and "tailor each application accordingly".<ref name="twsL27" /> College visits (including overnight ones),{{sfn|Mamlet|2011|p=121}} interviews, attending College Fair days,{{sfn|Mamlet|2011|p=121}} comments in the essay, contacting college faculty members, answering and opening emails,{{sfn|Mamlet|2011|p=121}}<ref>Note: colleges can tell whether emails are opened or not by a prospective student.</ref> place position of the college on the FAFSA form or its [[FAFSA position]],<ref name="Rivard" /><ref name="CBSNews1" /><ref name="DailyFinance" /><ref>Note: admissions officers can see all colleges applied to that are listed on the FAFSA form, and there are reports that some colleges interpret being first or second on the FAFSA list as a sign of demonstrated interest</ref> and other indications of interest can be a factor for many colleges concerned about their [[Yield (college admissions)|yield]]—the percent of students who accept an offer of enrollment.<ref name="tws2ZG315" /><ref name="twsZe25" /> According to Andover's college counseling director Sean Logan, it is important to have numerous contact points with colleges to show demonstrated interest: visiting, phone contact, emailing, visits to websites (including number of clicks as well as length of time on the website), whether a college visit included a tour and interview, and whether a college-recommended off-campus personal interview was done.<ref name="tws3afa" /> Schools such as [[Connecticut College]] and [[Emory University]] have been credited as "popularizing the yield game" by refusing well-qualified students who failed to show much real interest in attending, as a way to boost their yield scores.<ref name="twsZe25" /> One top high school student was waitlisted at a "likely" college<ref>Note: "likely" meant there was an estimated 80% chance of acceptance by the college</ref> for showing lack of interest:

      {{Blockquote|We assumed they weren't coming, because we didn't have much contact from them. We know they're probably using us as a back-up and they haven't done much to show any sincere interest, so we decided to waitlist them.|Andover college counseling director Sean Logan, remembering a comment from a college admissions director.<ref name=tws3afa/>}}

      ====Active participation====
      One report suggested that colleges seek students who will be actively involved on campus and not spend every day studying alone.{{sfn|Dunbar|2007|p=55}} As a result, they look recommendations from teachers that suggest active participation.{{sfn|Dunbar|2007|pp=56, 57}}

      ====Weeding out difficult people====
      Admissions officers often try to screen out difficult people.{{sfn|Dunbar|2007|pp=69–82}} According to Dunbar, many colleges are "afraid of aggression". He recommends avoiding "harsh humor" and signs of severe emotion, anger, or aggression.{{sfn|Dunbar|2007|pp=69–82}} Admissions evaluators look for signals that might indicate a difficult person, such as disrespectful criticisms of others and evidence of [[substance abuse]].{{sfn|Dunbar|2007|pp=69–82}}

      ====Analysis of essays====
      Michele Hernandez suggested that almost all admissions essays were weak, cliche-ridden, and "not worth reading".{{sfn|Hernandez|2009|pp=130–136}} The staff gets thousands of essays and has to wade through most of them.{{sfn|Hernandez|2009|pp=130–131}} When she worked as an admissions director at Dartmouth, she noticed that most essays were only read for three minutes.{{sfn|Hernandez|2009|pp=130–136}} Some too-common essay types were the "outward bound" essay about how a person discovered their inner grit while hiking tough mountains or the "community service" essay about how a student discovered, while working among disadvantaged peoples, that "all persons were the same".{{sfn|Hernandez|2009|pp=130–136}} Admissions officers seek to learn how a person thinks, what kind of person they are, and their level of intellectual promise.{{sfn|Hernandez|2009|pp=130–136}}

      ==Acceptances, rejections, and waitlists==

      === Different application types ===
      The most common application type is regular decision, in which students usually apply by January 1st, and are not making binding agreements to commit to the school if accepted. A second type is early action, which is very similar to regular decision, the only difference being that early action applicants often apply in November. <ref name=":2" /> There is also restrictive early action, where students must choose only one school to apply to early in any capacity. The most controversial admission type is early decision, when students enter into a binding agreement that, if accepted, they will attend the institution. This is controversial as detractors argue that, because they make this decision prior to learning of financial aid, it could benefit students who know that they will be able to pay the entire tuition. <ref>{{Cite web |last=Murphy |first=James |date=2019-10-07 |title=A boon for the rich, early decision is unfair and here to stay |url=https://hechingerreport.org/opinion-a-boon-for-colleges-and-wealthy-families-early-decision-is-unfair-and-here-to-stay/ |access-date=2025-05-11 |website=The Hechinger Report |language=en-US}}</ref>
