      Colleges use high sticker prices to give themselves wide latitude in how to use funds to attract the best students, as well as entice students with special skills or increase its overall racial or ethnic diversity.<ref name=tws3JanN311/> The most sought-after students can be enticed by high discounts while marginal students can be charged full price.<ref name=tws2MayY113>{{cite news
       |author1=Chana Joffe-Walt |author2=Jacob Goldstein |title= How Colleges Fight For Top Students
       |newspaper= NPR
       |date= May 2, 2012
       |url= https://www.npr.org/blogs/money/2012/05/02/151759177/how-colleges-fight-for-top-students
       |access-date= May 25, 2012
      }}</ref><ref name=tws2MayY114>{{cite news
       |author= Jay Conley
       |title= New Online Tools Expected to Lift Veil on College Sticker Prices: With federal mandate, all schools must offer net price calculators online by October 29.
       |newspaper= U.S. News & World Report
       |date= September 14, 2011
       |url= https://www.usnews.com/education/best-colleges/paying-for-college/articles/2011/09/14/new-online-tools-expected-to-lift-veil-on-college-sticker-prices
       |access-date= May 25, 2012
      }}</ref> Further, the high sticker price is a marketing tool to suggest the overall worth of a college education by encouraging people to think that "schools that cost more must provide a better education".<ref name=tws2MayY211/> While there was growing concern about escalating college prices, most Americans believed that their personal investment in [[Higher education in the United States|higher education]] was sound.<ref name=tws2MayY212>{{cite news
       |author= Brian Burnsed
       |title= Americans Split on Value of a College Degree: A Pew study indicates many are skeptical, but college graduates remain confident in their choices.
       |newspaper= U.S. News & World Report
       |date= May 16, 2011
       |url= https://www.usnews.com/education/best-colleges/articles/2011/05/16/americans-split-on-value-of-a-college-degree
       |access-date= May 25, 2012
      }}</ref> But discounting adds complexity to decision-making, deterring some students from applying in some instances based on a false sense of unaffordability.<ref name=tws2MayY213>{{cite news
       |author= Judith Scott-Clayton
       |title= College Is Cheaper Than You Think
       |newspaper= The New York Times
       |date= November 4, 2011
       |url= https://economix.blogs.nytimes.com/2011/11/04/college-is-cheaper-than-you-think/
       |access-date= May 25, 2012
      }}</ref> Students from low-income backgrounds may be discouraged from applying or driven to attend less challenging colleges as a result of [[undermatching]]. Many schools now recruit students who pay full cost to subsidize those who can afford to pay much less, resulting in the financial makeup of the student body at some colleges skewed towards mostly affluent students and low-income students but few students from middle-class backgrounds.<ref name="twsNBCNews1">Nona Willis Aronowitz, October 3, 2014, NBC News, [https://www.nbcnews.com/news/education/middle-class-squeeze-elite-education-worth-170-000-debt-n212811 Middle-Class Squeeze: Is an Elite Education Worth $170,000 in Debt?], Retrieved October 3, 2014, "recruiting high-achieving, low-income kids to apply&nbsp;... 18 percent of Williams students now pay no tuition&nbsp;... To offset the cost, these schools often aggressively recruit students whose families can pay the full cost"</ref> In 2015, however, there were several instances of private colleges reducing their tuition by more than 40%.<ref name=twsNBCNews5>NBC News, [https://www.nbcnews.com/feature/freshman-year/these-two-colleges-plan-tuition-reset-40-percent-cut-n442876 These Two Colleges Plan 'Tuition Reset' With 40 Percent Cut], Retrieved October 12, 2015, "two small private liberal arts colleges are actually cutting tuition next year — by more than 40 percent. Utica College in New York and Rosemont College in Pennsylvania"</ref>

      {{Further|College tuition in the United States}}

      ====Net price calculators====
      In the fall of 2011, colleges were required by federal law to post a [[College cost calculator|net price calculator]] on their websites to give prospective students and families a rough estimate of likely college costs for their particular institution,<ref name=tws2MayY311>{{cite news
       |author= Daniel de Vise
       |title= College Web sites to post cost calculators for prospective students
       |newspaper= Washington Post
       |date= October 28, 2011
       |url= https://www.washingtonpost.com/local/education/college-web-sites-to-post-cost-calculators-for-prospective-students/2011/10/27/gIQABj0SQM_story.html
       |access-date= May 25, 2012
      }}</ref><ref name=twsMay2Q848>{{cite news
       |author= Jacques Steinberg
       |title= The Choice on 'Today': Tips on Fafsa, and Net-Price Calculators
       |newspaper= The New York Times and The Today Show
       |date= January 20, 2012
       |url= http://thechoice.blogs.nytimes.com/2012/01/20/choice-on-today-fin-aid/
       |access-date= May 17, 2012
      }}</ref> and to "demystify pricing".<ref name=twsL24/><ref name=tws2MayY311/> A student or family could go online, find the calculator at a college's website, and enter the required financial and academic information, and the calculator will provide a personalized estimate of the likely cost of attending that college. The first online calculators were started by [[Williams College]].<ref name=tws2MayY114/> The online calculators look at financial need and academic merit to try to estimate the likely discounted price offered to a particular student from a particular college,<ref name=tws2MayY311/> using information including details from tax returns, household income, grade point averages and test scores.<ref name=tws2MayY114/> Schools vary in terms of their pricing formulas; some consider [[home equity]] as a factor while others disregard it.<ref name="tws2Q213">{{cite news|url=http://www.thecollegesolution.com/will-your-home-equity-hurt-financial-aid-chances-a-case-study|title=Will Your Home Equity Hurt Financial Aid Chances? A Case Study|author=Lynn O'Shaughnessy|date=June 25, 2012|work=The College Solution|access-date=June 26, 2012}}</ref>

      There are numerous potential problems with the calculators. Some are difficult to find on a college's website;<ref name=tws2MayY311/><ref name=tws2MayY114/> others require specific financial numbers, possibly leading to errors by parents or students; some are difficult to understand and use;<ref name=tws2MayY114/> some may be manipulated by schools to increase applications or to make it seem as if a college is "more affordable" than it is.<ref name=tws2MayY114/> Accuracy of calculator estimates may vary considerably from college to college.<ref name=tws2MayY311/><ref name=tws2MayY114/> Ultimately aid decisions will not be made by calculators, but by humans in the admissions offices.<ref name=tws2MayY311/>

      Another tool is the College Board's expected family contribution calculator that can give families an idea of how much college will cost, but not for any particular college.<ref name="tws2Q214">{{cite news|url=http://www.thecollegesolution.com/do-you-really-expect-me-to-pay-that-much-for-college|title=Do You Really Expect Me to Pay That Much for College?|author=Lynn O'Shaughnessy|date=May 22, 2012|work=The College Solution|access-date=June 26, 2012}}</ref>
