      Most caning sentences are far below the legal limit of 24 strokes. Although sentences of between three and six strokes are much more common, they usually receive less or no coverage by the media. Normally, only the more serious cases involving heavier sentences will have a greater tendency to be reported in the press.<ref>
      {{cite web |title=Judicial Caning in Singapore, Malaysia and Brunei #How many strokes are given |url= https://www.corpun.com/singfeat.htm#howmanystrokes |website=World Corporal Punishment Research |access-date=27 August 2016 |date=September 2012 |archive-url= https://web.archive.org/web/20160716095447/http://www.corpun.com/singfeat.htm#howmanystrokes |archive-date=16 July 2016| url-status=live}}
      </ref>

      ===Caning officers===
      The prison officers who administer caning are carefully selected and specially trained for the job. They are generally physically fit and strongly built. Some hold high grades in martial arts even though proficiency in martial arts is not a requirement for the job.<ref>{{cite news|title=How a Prisoner is Caned |newspaper=The Straits Times |location=Singapore |date=1 May 1994}}</ref> They are trained to use their entire body weight as the power behind every stroke instead of using only the strength from their arms,<ref name="Branding the Bad Hats for Life" /> as well as to induce as much pain as possible. They can swing the cane at a speed of up to {{Convert|160|km/h|mph|abbr=in}}<ref name="The invisible scars left by strikes of the cane">
      {{cite news |last1=Von Mirbach |first1=Johan |title=The invisible scars left by strikes of the cane |url=http://www.dw.com/en/the-invisible-scars-left-by-strikes-of-the-cane/a-18298970 |website=Deutsche Welle |access-date=4 December 2015 |date=5 March 2015 |archive-url=https://web.archive.org/web/20151208154053/http://www.dw.com/en/the-invisible-scars-left-by-strikes-of-the-cane/a-18298970 |archive-date=8 December 2015 |url-status=live  }}
      </ref> and produce a force upon impact of at least 880 [[Newtons|N]].<ref>
      {{Cite news |url= https://www.corpun.com/myj00405.htm#13421 |title= Striking fear into hearts of most hardened criminals |newspaper= New Straits Times |location= Kuala Lumpur |date= 27 May 2004 |access-date= 23 January 2018 |archive-url= https://web.archive.org/web/20180129165100/http://www.corpun.com/myj00405.htm#13421 |archive-date= 29 January 2018 |url-status=live |df= dmy-all }}
      </ref>

      ===The cane===
      A [[rattan]]<ref>Prisons Regulations section 139(5).</ref> cane, no more than {{convert|12.7|mm|sigfig=1||abbr=in}} in diameter<ref name="CPC s 329" /> and about {{convert|1.2|m|ft|sigfig=2|abbr=in}} in length, is used for judicial and prison canings. It is about twice as thick as the canes used in the school and military contexts. The cane is soaked in water overnight to make it supple and prevent it from splitting and embedding splinters in the wounds.<ref name="Branding the Bad Hats for Life">
      {{cite news |url= https://www.corpun.com/sgju7409.htm |access-date=10 January 2015 |last=Raman |first=P.M. |title= Branding the Bad Hats for Life |date=13 September 1974 |newspaper=The Straits Times |location=Singapore |archive-url= https://web.archive.org/web/20140809182242/http://www.corpun.com/sgju7409.htm |archive-date=9 August 2014 |url-status=live }}</ref> The Prisons Department denies that the cane is soaked in [[brine]], but has said that it is treated with [[antiseptic]] before use to prevent infection.<ref name="Corpun Procedure">{{cite web |title= Judicial Caning in Singapore, Malaysia and Brunei #Procedure in Detail |url= https://www.corpun.com/singfeat.htm#procedure |date=September 2012 |website=World Corporal Punishment Research |access-date=25 January 2015 |archive-url= https://web.archive.org/web/20150115052445/http://www.corpun.com/singfeat.htm#procedure |archive-date=15 January 2015 |url-status=live }}</ref> A lighter cane is used for juvenile offenders.<ref name="CPC s 329" />

      ===Administration procedure===
      Caning is, in practice, always ordered in addition to a jail sentence, and not as a punishment by itself. Those who are sentenced to caning and are in the process of appealing against their sentences do not have their sentences carried out while pending the outcome of their appeals. Similarly, during the period before the convicts' deadlines of their appeal notices, caning is not carried out until the deadline expires and with the convict not making a notice of appeal.

      It is administered in an enclosed area in the prison out of the view of the public and other inmates.<ref name="Yong Vui Kong v Public Prosecutor [2015] SGCA 11" /> However, anecdotal evidence suggests that the offender, while waiting in a queue for his turn to be caned, has the chance to observe<ref name="potter interview" /> or hear the screams and cries of those before him getting caned.<ref name="Former Brit schoolboy left horrifically injured after being flogged 24 times in Singapore">{{cite news |last1=Hawkins |first1=Jamie |title=Former Brit schoolboy left horrifically injured after being flogged 24 times in Singapore |url= https://www.mirror.co.uk/news/world-news/former-brit-schoolboy-left-horrifically-22596605 |newspaper=The Mirror |location= London |access-date=30 August 2020 |date=29 August 2020}}</ref> The order is determined by the number of strokes the offender is receiving, with the largest number going first.<ref name="Abunehneh">{{cite web |title=My Story 第五部 |author1=kAi |url= http://abunehneh.sg/?p=244 |website=Abunehneh |access-date=17 August 2019 |archive-url= https://web.archive.org/web/20080928175128/http://abunehneh.sg/?p=244 |archive-date=28 September 2008 |date=23 September 2008 |url-status=dead }}</ref> A medical officer and the Superintendent of Prisons are required to be present at every caning session.<ref>Prisons Regulations section 139(4).</ref>

      The offender is not told in advance when he will be caned; he is notified only on the day his sentence is to be carried out.<ref>{{cite news |title='No advance notice' for caning |url= https://www.corpun.com/sgju9405.htm#11926 |access-date=24 January 2015 |newspaper=The Straits Times |location=Singapore |date=4 May 1994 |archive-url= https://web.archive.org/web/20150308093137/http://www.corpun.com/sgju9405.htm#11926 |archive-date=8 March 2015 |url-status=live }}</ref> Offenders often undergo a lot of psychological distress as a result of being put into such uncertainty.<ref name="The invisible scars left by strikes of the cane" /> On the day itself, the medical officer examines him by measuring his blood pressure and other physical conditions to check whether he is medically fit for the caning. If he is certified fit, he proceeds to receive his punishment; if he is certified unfit, he is sent back to the court for the sentence to be remitted or converted to additional time in prison. A prison officer confirms with him the number of strokes he has been sentenced to.<ref>{{cite news |last1=John |first1=Arul |last2=Chan |first2=Crystal |title=Prisoners given chance to confirm sentence beforehand |url= https://www.corpun.com/sgj00707.htm#19312 |access-date=25 January 2015 |newspaper=The New Paper |location=Singapore |date=1 July 2007 |archive-url= https://web.archive.org/web/20150128115559/http://www.corpun.com/sgj00707.htm |archive-date=28 January 2015 |url-status=live}}</ref>

      In practice, the offender is required to strip completely naked for the caning. Once he has removed his clothes, he is restrained in a large wooden trestle based on the British dual-purpose prison flogging frame. He stands barefooted on the trestle base and bends over a padded horizontal crossbar on one side of the trestle, with the crossbar adjusted to around his waist level. His feet are tied to a lower crossbar on the same side by restraining ankle cuffs made of leather, while his hands are secured to another horizontal crossbar on the other side by wrist cuffs of similar design; his hands can hold on to the crossbar. After he is secured to the trestle in a bent-over position at an angle of close to 90° at the hip, protective padding is tied around his lower back to protect the vulnerable kidney and lower spine area from any strokes that might land off-target.<ref name="Corpun Procedure" /><ref>
      {{cite web |title=Judicial Caning in Singapore, Malaysia and Brunei #Apparatus used |url= https://www.corpun.com/singfeat.htm#apparatus |website=World Corporal Punishment Research| access-date=23 November 2016 |date=September 2012 |archive-url= https://web.archive.org/web/20161219080225/http://www.corpun.com/singfeat.htm#apparatus |archive-date=19 December 2016 |url-status=live}}</ref> The punishment is administered on his bare buttocks<ref>Prisons Regulations section 139(6).</ref> to minimise the risk of any injury to bones and organs.<ref name="Yong Vui Kong v Public Prosecutor [2015] SGCA 11" /> He is not gagged.<ref name="Corpun Procedure" />

      The caning officer positions himself beside the trestle. The Director of Prisons explained in a 1974 press conference, "Correct positioning is critically important. If he is too near the prisoner, the tip of the cane will fall beyond the buttocks and the force of the stroke will cause the unsupported tip to dip and bend the cane and thus reduce the effect of the stroke. If he is too far, the stroke will only cover part of the buttocks." Strokes are delivered at intervals of about 30 seconds.<ref name="Branding the Bad Hats for Life" /> The caning officer is required to exert as much strength as he can muster for each stroke.<ref name="Corpun Procedure" /> The offender receives all the strokes in a single caning session, not in instalments.<ref name="CPC s 330" /><ref>Prisons Regulations section 139(3).</ref> According to anecdotal evidence, if the sentence involves a large number of strokes, two or more officers will take turns to cane the offender every six strokes to ensure that the later strokes are as forceful as the earlier ones.<ref>{{cite news |last1=Viyajan |first1=K.C. |title=Vandal caned three strokes more than ordered |url= https://www.corpun.com/sgj00706.htm#19310| access-date=26 November 2016 |work=The Straits Times |date=30 June 2007 |location=Singapore |archive-url= https://web.archive.org/web/20160413113002/http://www.corpun.com/sgj00706.htm#19310 |archive-date=13 April 2016 |url-status=live}}</ref><ref name="Former Brit schoolboy left horrifically injured after being flogged 24 times in Singapore" />

      During the caning, if the medical officer certifies that the offender is not in a fit state of health to undergo the rest of the punishment, the caning must be stopped.<ref name="CPC s 331" /> The offender will then be sent back to the court for the remaining number of strokes to be remitted or converted to a prison term of no more than 12 months, in addition to the original prison term he was sentenced to.<ref>Criminal Procedure Code section 332.</ref>

      === Effects ===
      Caning can cause significant physical damage, depending largely on the number of strokes inflicted. [[Michael P. Fay|Michael Fay]], who received four strokes, said in an interview, "The skin did rip open, there was some blood. I mean, let's not exaggerate, and let's not say a few drops or that the blood was gushing out. It was in between the two. It's like a bloody nose."<ref>{{cite news |title=Fay describes caning, seeing resulting scars |url= https://www.corpun.com/sgju9406.htm |access-date=24 January 2015 |agency= Reuters |newspaper=Los Angeles Times |date=26 June 1994 |archive-url= https://web.archive.org/web/20150308093142/http://www.corpun.com/sgju9406.htm |archive-date=8 March 2015 |url-status=live }}</ref>

      A report by the [[Law Society of Singapore|Singapore Bar Association]] stated, "The blows are applied with the full force of the jailer's arm. When the rattan hits the bare buttocks, the skin disintegrates, leaving a white line and then a flow of blood."<ref name="Corpun Effects">
      {{cite web |title=Judicial Caning in Singapore, Malaysia and Brunei #The Immediate Physical Effects |url= https://www.corpun.com/singfeat.htm#effects |date=September 2012 |website=World Corporal Punishment Research |access-date=25 January 2015 |archive-url= https://web.archive.org/web/20150115052445/http://www.corpun.com/singfeat.htm#effects |archive-date=15 January 2015 |url-status=live }}</ref>

      Usually, the buttocks will be covered with blood after three strokes.<ref name="Branding the Bad Hats for Life" /> More profuse bleeding may occur in the case of a larger number of strokes. An eyewitness described that after 24 strokes, the buttocks will be a "bloody mess".<ref name="Abunehneh" />

      Men who were caned have variously described the pain they experienced as "unbearable", "excruciating", "equivalent to getting hit by a lorry",<ref name="potter interview">
      {{cite web |last1=Tan |first1=Jeanette |title=S'porean gang leader served 10 years' jail, got 9 strokes of cane, & now has own pottery exhibition |url= https://mothership.sg/2018/07/kim-whye-kee-potter-interview/ |website=Mothership |access-date=13 July 2018 |date=6 July 2018 |archive-url= https://web.archive.org/web/20180713231817/https://mothership.sg/2018/07/kim-whye-kee-potter-interview/ |archive-date=13 July 2018 |url-status=live  }}
      </ref> "having a hot iron placed on your buttocks",<ref name="Abunehneh" /> etc. A recipient of 10 strokes said, "The pain was beyond description. If there is a word stronger than excruciating, that should be the word to describe it".<ref>{{cite news |last1=Yaw |first1=Yan Chong |last2=Ang |first2=Dave |title=Don't imitate us |newspaper=The New Paper |date=10 September 1991 |location=Singapore}}</ref><ref name="Corpun Descriptions">
      {{cite web |title= Judicial Caning in Singapore, Malaysia and Brunei #Descriptions of the Experience by Men Who Have Been Caned |url= https://www.corpun.com/singfeat.htm#experience |date=September 2012 |website= World Corporal Punishment Research |access-date= 25 January 2015 |archive-url= https://web.archive.org/web/20150115052445/http://www.corpun.com/singfeat.htm#experience |archive-date= 15 January 2015 |url-status=live |df= dmy-all }}
      </ref>

      Most offenders struggle violently after each of the first three strokes and then their struggles lessen as they become weaker. By the time the caning is over, those who receive more than three strokes will be in a [[acute stress reaction|state of shock]]. During the caning, some offenders will pretend to faint but they have not been able to fool the medical officer, who decides whether the punishment continues or stops.<ref>{{cite news |last1=Ng |first1=Irene |last2=Poh |first2=Ambrose |title=My Ordeal in the Cane Room |newspaper=The New Paper |date=12 October 1988 |location=Singapore}}</ref> Offenders often undergo a lot of psychological distress before and during the caning: They are not only afraid of the physical pain, but are also worried whether they can prevent themselves from crying out because crying means that they would "[[Face (sociological concept)|lose face]]"<ref name="Branding the Bad Hats for Life" /> and be labelled "weak" by their fellow inmates.<ref name="Abunehneh" />

      [[Gopal Baratham]], a Singaporean neurosurgeon and opponent of the practice, in his book ''The Caning of Michael Fay: The Inside Story by a Singaporean'', criticised the American [[tabloid press]] for false claims, such as that canings are public events (in fact they always take place privately inside the prison):
      {{blockquote|Two lashers took turns to wield the bamboo cane. Blood spurted, bits of flesh flew and the prisoner screamed in pain. ... The canings drew hundreds of people, including a lot of women and everybody seemed to love it. Each time the guy got {{sic|wacked}}, the crowd would roar – like at a hockey game. They really enjoyed what they saw. (''[[New York Newsday]]'', 20 April 1994)<ref name="Baratham 81">{{cite book |last1=Baratham |first1=Gopal |title=The Caning of Michael Fay: The Inside Story by a Singaporean |date=1994 |publisher=KRP Publications |location=Singapore |page=81}}</ref>}}

      ===Recovery===
      After the caning, the offender is released from the trestle and receives medical treatment. Antiseptic lotion ([[Crystal violet|gentian violet]]) is applied on the wounds.<ref name="Corpun Treatment">{{cite web |title=Judicial Caning in Singapore, Malaysia and Brunei #Medical Treatment |url= https://www.corpun.com/singfeat.htm#treatment |date=September 2012 |website=World Corporal Punishment Research |access-date=25 January 2015 |archive-url= https://web.archive.org/web/20150115052445/http://www.corpun.com/singfeat.htm#treatment |archive-date=15 January 2015|url-status=live}}</ref> The offender is also given painkillers and antibiotics.<ref name="Former Brit schoolboy left horrifically injured after being flogged 24 times in Singapore" />

      The wounds usually take between a week and a month to heal, depending on the number of strokes received. During this time, offenders cannot sit down or lie down on their backs, and experience difficulties controlling their bowels. Bleeding from the buttocks may still occur in the days after the caning.<ref name="Former Brit schoolboy left horrifically injured after being flogged 24 times in Singapore" /><ref name="Corpun Healing" /> [[M Ravi|Madasamy Ravi]], a human rights lawyer, described the injuries of his client, Ye Ming Yuen, who received 24 strokes, as follows: {{blockquote|All over his buttocks were multiple marks and deep lacerations. It was so shocking [that] my female paralegal who was with me almost fainted. [...] The wounds were so deep with blood, flesh and layers of the skin exposed. He didn't have any bandages, just a towel to put over the buttocks. He couldn't sit for too long so he was standing up.<ref name="Former Brit schoolboy left horrifically injured after being flogged 24 times in Singapore" />}}

      Permanent scars remain after the wounds have healed.<ref name="Corpun Healing">
      {{cite web |title=Judicial Caning in Singapore, Malaysia and Brunei #After Effects: The Healing of the Wounds |url= https://www.corpun.com/singfeat.htm#healing |date=September 2012 |website=World Corporal Punishment Research |access-date=25 January 2015 |archive-url= https://web.archive.org/web/20150115052445/http://www.corpun.com/singfeat.htm#healing |archive-date=15 January 2015 |url-status=live}}
      </ref>

