      ==Chile==
      In Chile university admission as a [[freshman]] is based on the [[Prueba de Selección Universitaria]], PSU, scores and ranking of the applicant. Chilean Traditional Universities tend to put a strong emphasis on [[Prueba de Selección Universitaria]] while the majority of the private universities use their own test or handle PSU scores in a different way than the Chilean Traditional Universities. Architecture, theatre, psychology and some medical schools do also often give high value to special tests.

      ==China==
      {{Main|National College Entrance Examination}}
      In the [[People's Republic of China]], the National College Entrance Examination (高考, ''gaokao'') is given each summer and required for each student. The exam covers common school topics such as math, language, history, science, etc. Better institutions require higher scores for admittance. The required score also varies by province: students in more competitive provinces, like [[Jiangsu]], need higher scores than students from less competitive areas such as [[Tibet]]. Conversely, wealthier cities have more universities per capita and hence lower university entrance standards than some poorer provinces such as [[Anhui]]. In 2006 for example, the minimum score to enter a key university for applicants from [[Beijing]] is 516 but the minimum score for applicants from [[Henan]] is 591.<ref>{{cite web |url=http://gaokao.chsi.com.cn/gkxx/fsx/2006.shtml |title=2006年全国各省市高考录取分数线 |publisher=Gaokao.chsi.com.cn |access-date=2018-04-04 |archive-date=2018-04-05 |archive-url=https://web.archive.org/web/20180405025749/http://gaokao.chsi.com.cn/gkxx/fsx/2006.shtml |url-status=live }}</ref>

      A popular trend in recent years is for students to forfeit the National College Entrance Examination for Western education programs in order to better prepare them for admission into US universities.<ref>{{cite web |url=https://www.theatlantic.com/international/archive/2012/03/how-chinas-new-love-affair-with-us-private-schools-is-changing-them-both/255154/ |title=How China's New Love Affair with U.S. Private Schools Is Changing Them Both |publisher=The Atlantic |date=2012-03-28 |access-date=2018-04-04 |archive-date=2018-04-05 |archive-url=https://web.archive.org/web/20180405024442/https://www.theatlantic.com/international/archive/2012/03/how-chinas-new-love-affair-with-us-private-schools-is-changing-them-both/255154/ |url-status=live }}</ref>

      ==Finland==
      For Finland, ''see [[Numerus clausus#Numerus clausus in Finland|Numerus clausus in Finland]]''

      Some fields of study explicitly encourage applicants to judge their chances realistically. For example, a student may apply to only one medical school per year.<ref>{{cite web|url=http://www.med.helsinki.fi/peruskoulutus/docs/opiskelijaksi/hakuopas_2011.pdf |title=Hakuopas 2011 - Lääketieteen ja hammaslääketieteen opiskelijavalinnat | language=fi | trans-title=Application guide 2011 - Medicine and dentistry student choices |access-date=June 4, 2011 |url-status=dead |archive-url=https://web.archive.org/web/20111002143806/http://www.med.helsinki.fi/peruskoulutus/docs/opiskelijaksi/hakuopas_2011.pdf |archive-date=October 2, 2011 }}</ref> Therefore, choosing to apply to the more competitive medical schools is risky, if the student is not sure about their strength.

      For [[University of Technology#Finland|universities of technology]], there is a similar, but less strict mechanism. The students gain extra priority points, which may increase their points for the first choice by up to 12.5%.<ref>{{cite web |url=http://studies.aalto.fi/fi/admissions/technology/bachelor/dia/ |title=Aalto Game Changers. Muuta maailma. - Aalto-yliopisto |publisher=Studies.aalto.fi |access-date=2018-04-04 |archive-date=2012-03-17 |archive-url=https://web.archive.org/web/20120317091420/http://studies.aalto.fi/fi/admissions/technology/bachelor/dia/ |url-status=live }}</ref> A student who is admitted to several programs cannot accept any other than the one with the highest priority.

      ==Germany==
      In Germany, prospective students who have passed the [[Abitur]] may decide freely what subjects to enroll in. Recently, however, in some of the most popular and most desired subject fields students have to pass a certain [[numerus clausus]] &mdash; that is, they cannot enroll unless they have scored a minimum grade point average on their Abitur.

      There are two types of higher education institutions in Germany, the universities (including'' [[Technische Hochschule]]n'') and the {{lang|de|[[Fachhochschule]]n}} ([[Institute of technology#German language areas - Technische Universitäten and Fachhochschulen|polytechnics]]). A prospective student who has passed the Abitur is qualified for admission to every German university, with the exception of very few new degree programs, for which additional entrance examinations were recently introduced. A Fachhochschule, in contrast, often requires the student to complete an [[internship]] to qualify for admission.

      There is also a second German school leaving exam, which qualifies prospective students for admission to higher education in Germany, the ''Fachhochschulreife'', often called ''Fachabitur'' in colloquial usage. An internship is already part of the Fachhochschulreife itself, therefore a Fachhochschule requires no additional internship from the student. However, most universities do not accept this qualification for admission. An exception is universities in the German state of [[Hesse]], which accepted this qualification in 2004 for admission to [[bachelor's degree]] courses, but not to the traditional German [[Diplom]] degree courses. But with a Fachhochschulreife (university of Applied Sciences entrance qualification) you can visit any Fachhochschule (university of Applied Sciences) in Germany. You can see the difference between a university / Technische Hochschule and a Fachoberschule very quickly: A Fachhochschule has often the words "University of Applied Science" next to its name.

      ==Greece==
      Admission to Higher Education in Greece is based on the system of entrance examinations, namely the [[:el:Πανελλήνιες εξετάσεις|Panhellenic Examinations]], which are set one-time every year by the Ministry of Education. In order to be eligible for the entrance examinations, applicants must be upper secondary school (high school) graduates and hold an Upper Secondary School-leaving Certificate either from a lyceum, a technical high school or another equivalent recognised private upper secondary school. In Greece, the government's upper secondary school-leaving certificate is an [[Apolytirion|Apolytirio]] [[Lyceum]]. Admission to Higher Education institutions depends on the entrance examinations achievement score (grades) attained on chosen subjects on a written basis, based on the grades of upper secondary school-leaving or technical high school certificate; number of available places ([[numerus clausus]]) and on the candidates' ranked preferences among the higher education schools/ departments.

      ==Hong Kong==
      All public universities in Hong Kong admit local students under the [[Joint University Programmes Admissions System]] (JUPAS).

      ===In the old system HKALE===
      The major criterion of selection is [[HKALE]] result, and to a smaller extent [[HKCEE]] result and interview performance.

      ===In the new system HKDSE===
      The major criterion of selection is [[HKDSE]] result. To a smaller extent interview performances and to an even smaller extent secondary school performances.

      ==Iceland==
      Both public and private [[List of universities in Iceland|universities in Iceland]] handle their own admissions. Students apply for a specific [[course of study]] and each programme has its own requirements. These are usually a [[matriculation exam]] but sometimes a minimum number of credits in certain subjects in [[Gymnasium (school)|gymnasium]] or even passing an entry test is needed. Foreign students must apply half a year prior to the first semester but the time limit for Nordic citizens is not as strict.

      ==India==
      {{Confusing|section|talk=|reason=The line on the University Course Examination must be clarified|date=February 2024}}

      Most Indian universities participate in one or another centralized admission procedure. No weight is given to applicants' past or recent academic record and their admission is based on their ranking in the entrance exam. Applicants are ranked by their entrance exam marks, and submit their preference of universities/programs based on their rank and choice. These exams mostly required expensive coaching<ref>{{Cite web |date=2022-05-15 |title=Expensive crash courses, students dropping out of school – how CUET is driving change in higher education |url=https://theprint.in/india/education/expensive-crash-courses-students-dropping-out-of-school-how-cuet-is-driving-change-in-higher-education/956666/ |access-date=2022-06-13 |website=ThePrint |language=en-US |archive-date=2022-06-27 |archive-url=https://web.archive.org/web/20220627123754/https://theprint.in/india/education/expensive-crash-courses-students-dropping-out-of-school-how-cuet-is-driving-change-in-higher-education/956666/ |url-status=live }}</ref><ref>{{Cite news |last=Rayan |first=Albert |date=2018-06-16 |title=An unfair academic race |language=en-IN |work=The Hindu |url=https://www.thehindu.com/education/an-unfair-academic-race/article24179676.ece |access-date=2022-06-13 |issn=0971-751X |archive-date=2022-06-13 |archive-url=https://web.archive.org/web/20220613030408/https://www.thehindu.com/education/an-unfair-academic-race/article24179676.ece |url-status=live }}</ref> which poor and rural students cannot afford, and leads to some disadvantages for students without coaching, for example, only 1.6% cleared NEET in Tamil Nadu without expensive coaching.<ref>{{Cite web |date=2019-11-05 |title='Poor at a Disadvantage', Just 1.6% Med Students Clear NEET without Expensive Pvt Coaching: TN Govt Data |url=https://www.news18.com/news/india/poor-at-a-disadvantage-only-1-6-med-students-clear-neet-without-expensive-pvt-coaching-tn-govt-data-2374803.html |access-date=2022-06-13 |website=News18 |language=en |archive-date=2022-06-13 |archive-url=https://web.archive.org/web/20220613030407/https://www.news18.com/news/india/poor-at-a-disadvantage-only-1-6-med-students-clear-neet-without-expensive-pvt-coaching-tn-govt-data-2374803.html |url-status=live }}</ref>  Some such common entrance tests are:
      * [[Joint Entrance Examination – Main]] (JEE-Main) – Standard means of entry to the [[National Institutes of Technology]],<ref>{{Cite web|title=JEE (Main) Official Website|url=https://jeemain.nta.nic.in/webinfo/public/home.aspx|website=jeemain.nta.nic.in|access-date=2020-03-26|archive-date=2020-03-25|archive-url=https://web.archive.org/web/20200325173010/https://jeemain.nta.nic.in/webinfo/public/home.aspx|url-status=live}}</ref> [[Indian Institutes of Information Technology]], Other Centrally Funded Technical Institutions (CFTIs), Institutions/Universities funded/recognized by participating State Governments.<ref>{{Cite web |date=2022-03-10 |title=About JEE(Main) 2022 {{!}} Joint Entrance Examination (Main) {{!}} India |url=https://jeemain.nta.nic.in/about-jeemain-2022/ |access-date=2022-06-13 |archive-url=https://web.archive.org/web/20220310182901/https://jeemain.nta.nic.in/about-jeemain-2022/ |archive-date=2022-03-10 }}</ref>
      * [[Joint Entrance Examination – Advanced]] (JEE-Advanced) – Standard exams for entry to the [[Indian Institutes of Technology]].<ref>{{Cite web|title=JEE(Advanced) 2020, Official Website|url=https://jeeadv.ac.in/|website=jeeadv.ac.in|access-date=2020-03-26|archive-date=2020-04-02|archive-url=https://web.archive.org/web/20200402011207/https://jeeadv.ac.in/|url-status=live}}</ref>
      * [[Common Law Admission Test]] (CLAT) – Standard means of entry to the National Law Universities across India.<ref>{{Cite web|title=Consortium of NLUs|url=https://consortiumofnlus.ac.in/|website=consortiumofnlus.ac.in|access-date=2020-03-26|archive-date=2020-04-08|archive-url=https://web.archive.org/web/20200408014533/https://consortiumofnlus.ac.in/|url-status=live}}</ref>
      * [[National Eligibility cum Entrance Test (Undergraduate)]] (NEET (UG)) – For entry into undergraduate medical education [[MBBS]], The test is conducted at all Indian level.<ref>{{Cite web|title=National Eligibility Cum Entrance Test - NEET, 2020|url=https://ntaneet.nic.in/ntaneet/welcome.aspx|website=ntaneet.nic.in|access-date=2020-03-26|archive-date=2020-03-25|archive-url=https://web.archive.org/web/20200325173016/https://ntaneet.nic.in/Ntaneet/Welcome.aspx|url-status=live}}</ref>
      * [[Common University Entrance Test]] (CUET) – For admission to [[Central university (India)|Central Government Universities]] and selected state universities.<ref>{{Cite web |date=2022-05-23 |title=10 lakh apply for CUET; BHU, DU, Allahabad univ big draws |url=https://indianexpress.com/article/india/10-lakh-apply-for-cuet-bhu-du-allahabad-univ-big-draws-7930981/ |access-date=2022-06-13 |website=The Indian Express |language=en |archive-date=2022-06-13 |archive-url=https://web.archive.org/web/20220613024420/https://indianexpress.com/article/india/10-lakh-apply-for-cuet-bhu-du-allahabad-univ-big-draws-7930981/ |url-status=live }}</ref>
      * [[University Course Examination]] – For of the academic year, University Examination Authority, conduct examinations twice like Semester Examination & Annual Examination.<ref>{{cite web |last1=kumar |first1=chugadiya |title=BA Time Table 2024 |url=https://educatnetic.in/ba-time-table-1st-2nd-3rd-year/ |website=educatnetic |publisher=edugyan |access-date=28 December 2023 |ref=edugyan}}</ref>

      ==Indonesia==
      In Indonesia, university and college admission is dependent on the university or college status. Generally, public universities conduct their admission in the unified system of two as of 2019. Public nationwide admissions to public universities are subsidies by the government and students who succeed in entering university from one of the two schemes will enjoy lower to free university program fees. The first alternative is SNMPTN (Seleksi Nasional Masuk Perguruan Tinggi Negeri-Unified National Public Universities Admission). SNMPTN is a university admission scheme based on academic performance during the years of senior high school. This selection system is designed only for students graduating during that respective year only. SNMPTN selection considers a few criteria such as student's academic grades and performances, achievements, stream or type of class (science or social, AP or Regular) and originating high school. However, not all senior students can apply, usually only 50% of the graduating class may apply for an 'A' accredited school and lower quotas for other accreditations. According to the law of the Ministry of Higher Education, the total holding admission into a public university should at least be 30% of SNMPTN; each university may allocate more. The second alternative is SBMPTN (Seleksi Bersama Masuk Perguruan Tinggi Negeri-Unified Public Universities Admission Examination).

      SBMPTN is a university admission where applicants take two or three tests (aptitude test, natural science test, and/or social science test); applicants will also be required to submit to a practical session if the chosen major is art, music, or physical education. You also choose 3 different majors and/or universities. This examination is held nationwide once a year and unlike SNMPTN, is open to high school graduates of the last 3 years. But in 2019, there are changes whether you take one or two tests first held by LTMPT (State University Admission Test Agency) and then submit their scores to register on SBMPTN. Also since 2019, there have been no practical sessions if the chosen major is art, music, or physical education, which is replaced by submitting a portfolio. Many students repeat or take gap years to retake the SBMPTN to get into their desired university. According to the Ministry of Higher Education, a minimum of 40% of the entire public university quota should be admitted from SBMPTN. However, most public universities allocate 60% and above for SBMPTN due to the constantly high success rate of students who were accepted from this scheme. The SBMPTN exam includes complex questions and requires effective time management, making it a challenging process for many applicants. The exam is also held CBT (Computer-Based) starting last year.

      Most universities are conducting independent selection mechanism on their own beside SNMPTN and SBMPTN to fulfill remaining quotas such as SIMAK or PPKB from Universitas Indonesia or UTUL from Universitas Gadjah Mada (UGM). These are called special programs as they tend to be more expensive due to the incentive that these programs are not under government subsidies. Meanwhile, Private Universities usually do their admission before and after Public Universities Admission. They sometimes do several admissions. Governmental Agency Institutions does their admission independently (not included in Unified National Public Universities Admission) and will usually have their own scheme for selection.

      ==Iran==
      In Iran, admission is highly competitive and only top students may achieve this honor. Undergraduate and graduate prospective students are admitted at the Iranian public universities on the basis of their GPA and the National University Entrance Exam result.
      International students can apply directly to admission office of each university but should take Standard Persian Language Proficiency Test, 'SAMFA Test' to show their [[Persian language]] proficiency. The SAMFA Persian language test serving by National Organization for Educational Testing (SANJESH Organization) and Centre for International Scientific Cooperation (CISC) of the [[Ministry of Science, Research and Technology (Iran)|Iranian Ministry of Science, Research and Technology (MSRT)]]<ref>{{Cite web | url=http://sanjesh.org/group.aspx?gid=15 | title=آزمون سامفا  | language=ar | trans-title=SAMFA test | archive-url=https://web.archive.org/web/20210616032741/http://sanjesh.org/group.aspx?gid=15 | archive-date=2021-06-16}}</ref><ref>{{Cite web | url=https://www.msrt.ir/en/news/52823/the-6th-samfa-test-in-iran-and-abroad-23rd-january-2020 | title=The 6th SAMFA Test, in Iran and abroad, 23rd January 2020 | archive-url=https://web.archive.org/web/20220401041054/https://www.msrt.ir/en/news/52823/the-6th-samfa-test-in-iran-and-abroad-23rd-january-2020 | archive-date=2022-04-01}}</ref>
       
      The [[Iranian University Entrance Exam]], simply known as Konkour (Persian: کنکور; from the French Concours), is a standardized test used as one of the means to gain admission to higher education in Iran for Iranians. Generally, to get a Ph.D. in non-medical majors, there are three exams, all of them called Konkour.

      ==Ireland==
      In Ireland, students in their final year of secondary education apply to the [[Central Applications Office]], listing several courses at any of the third-level institutions in order of preference. Students then receive points based on their [[Irish Leaving Certificate|Leaving Certificate]], and places on courses are offered to those who applied who received the highest points.

      == Israel ==
      In Israel there is a test called The [[Psychometric Entrance Test]] (PET). The PET covers three areas: mathematics, verbal reasoning and the English language. It is administered by the Israeli National Institute for Testing and Evaluation (NITE). University admissions are typically based on a weighted average (the "mit'am") of the PET score and the GPA of the [[Bagrut]] (High School Completion Examination). In addition, some programs in science and engineering require that the applicant's bagrut includes the maximum number of units ("5 units") for mathematics.

      Some programs have two cutoffs for the mit'am, a higher one for "guaranteed admission" and a lower one for "automatic rejection". Mit'am scores between the two cutoffs may be admitted on a space-available basis.

      ==Japan==
      In Japan, there are at least three methods for controlling university admissions: the AO method (involving recommendation letters for students who have performed reasonably well and have shown commitment and skill in relation to sports or other extracurricular activities), a centralised multiple choice examination known as the [[Common Test for University Admissions]], and entrance examinations set by each of the universities. A combination of methods may also be used. For public universities, the Center Test is often used as an initial filtering stage to determine eligibility to take the more difficult examinations set by each individual university. Public national universities usually require candidates to sit examinations across a wide range of subjects, whilst private ones allow a focus on arts and humanities or sciences, reducing the burden of preparation. However, public national universities are popular due to prestige and lower fees, although some private universities are more prestigious than certain public national universities. There is usually no limit on the number of colleges to which a student may apply but public national universities tend to hold their examinations on one of two days, which means that students must in practice choose two preferred public national universities and also correctly estimate their own ability to avoid picking a university examination that is too difficult or that is too easy. To assist with this, private companies run a number of mock examinations throughout the year, enabling candidates to gauge where they rank in comparison to other candidates nationwide. Based on this they will decide which examinations they should realistically be able to attempt. Reforms are to be implemented to the Center examination in future, with extended answer questions being introduced in addition to multiple choice questions, and with official internationally recognised standardised tests in English being used to replace individual university exams in English.

      ==Malta==
      In Malta entrance is done after performing well in examinations which are a local version equivalent to the [[General Certificate of Education]].

      == Netherlands ==
      In the Netherlands, university admission in fact begins at the admission to a secondary school type at the end of primary school. The teacher of the student gives a so-called advice, or ''advies'', advising the child to apply for a school type. A standardized test is taken to aid in this process. The three school types are ''VMBO'' (''voorbereidend middelbaar beroepsonderwijs'', i.e. peraratory middle vocational education), ''HAVO'' (''hoger algemeen voortgezet onderwijs'', i.e. higher general secondary education), and ''VWO'' (''voorbereidend wetenschappelijk onderwijs'', i.e. preparatory scientific education). VMBO grants access to vocational education and does not give access to university, though after finishing, it is possible to continue into HAVO and then VWO in order to gain access to a given course. HAVO gives access to universities of applied sciences, or polytechnics (''hogeschool''), while VWO gives access to research universities (the only universities properly called ''universiteit'' in Dutch).

      Two years before graduating from VWO (the student will be around 16), prospective students have to choose a graduation type (specialising in humanities, economics, health sciences, or natural sciences). Courses at Dutch universities accept all students who have chosen the correct graduation type (e.g. to enroll in physics, the graduation type 'natural sciences' is required). All other students have to pass an exam to be enrolled (this is the exception). Popular subjects, such as [[medicine]] or [[dental medicine]] have a [[numerus fixus]], meaning that a limited number of students may enroll for this subject at a particular university. To decide who is allowed, a lottery is held in which ones grades influence chances of being chosen (an indirect and incomplete [[numerus clausus]]). Most humanities courses allow students of all graduation types to enroll freely and do not employ these selection methods.

      ==Nigeria==
      In Nigeria, undergraduate admissions into universities, polytechnics, monotechnics, and colleges of education and agriculture is administered by a centralized federal government agency known as the [[Joint Admissions and Matriculation Board]], [[JAMB]]. The body conducts '''Unified Tertiary Matriculation Examination (UTME)''' for prospective university, polytechnics, monotechnics, and colleges of education and agriculture students seeking entrance into tertiary institutions in Nigeria. Students who obtain the minimum cut-off mark of 180 in the JAMB_UME are invited by their institution of choice for a second entrance examination called the Post-UTME aptitude test which is conducted by individual tertiary institutions.

      ==Norway==
      In Norway candidates are admitted to entry-level programs through the [[Norwegian Universities and Colleges Admission Service]], that ranks qualified students based on a point scheme, that is based on grades and the degree of specialization and choice of study at upper secondary school, as well as age. At Master level admission is based on the grade average at the Bachelor level.

      ==Pakistan==
      In Pakistan, [[public university|public]] and [[private university|private]] universities hold entrance tests for admission in [[undergraduate]] and [[postgraduate]] degrees either conducted by the university itself or by [[National Testing Service|NTS]]. The [[Quota System in Pakistan]] is also used to give preference to students from backward areas.

      For admission in engineering and medical degrees, [[ECAT Pakistan|ECAT]] and [[MCAT Pakistan|MDCAT]] are taken respectively. The appearance in these exams is mandatory for every student to pursue his degree in these disciplines in public sector universities.

      == Palestine ==
      In [[Palestine]] there is a National Center for Examinations and Evaluation. Students are required to undergo the Tawjihi examinations, which then allow the universities in the West Bank to consider each candidate.

      ==Portugal==
      In Portugal admission to higher education level studies requires the secondary school credential, ''Diploma de Ensino Secundário'', which is achieved after completing the first twelve study years. Students must have studied the subjects for which they are entering to be prepared for the entrance exams. Also they are required to be previously specialised in a specific area at the secondary school, one of the following four: Science and Technologies, Economics, Humanities or Arts. Students sit for one or more entrance exams, ''Concurso nacional'' for public institutions or ''Concurso local'' for private institutions. In addition to passing entrance exams, students must fulfil particular prerequisites for the chosen course. Enrollment is limited; each year the institution establishes the number of places available. For the public institutions the exam scores count for the final evaluation, which includes the secondary school average marks. Then the students have to choose six institutions/courses they prefer to attend, in preferential order. The ones, who reach the marks needed to attend the desired institution/course, given the attributed vacant, will be admitted. Some public [[university]] courses demands generally higher admission marks than most similar courses at some [[polytechnic (Portugal)|polytechnical]] institutes or private institutions. (''see also [[Education in Portugal]]'')

      ==Russia==
      Traditionally, the universities and institutes conducted their own admissions tests regardless of the applicants' school record. There were no uniform measure of graduates' abilities; marks issued by high schools were perceived as incompatible due to grading variances between schools and regions. In 2003 the Ministry of Education launched the [[Unified state examination]] (USE) program. The set of standardized tests for high school graduates, issued uniformly throughout the country and rated independent of the student's schoolmasters, akin to North American [[SAT]], was supposed to replace entrance exams to state universities. Thus, the reformers reasoned, the USE will empower talented graduates from remote locations to compete for admissions at the universities of their choice,{{citation needed|date=March 2023}} at the same time eliminating admission-related bribery, then estimated at 1 billion US dollars annually. In 2003, 858 university and college workers were indicted for bribery, admission "fee" in [[MGIMO]] allegedly reached 30,000 US dollars.<ref>{{cite web | url=http://www.rg.ru/2004/08/18/korruptsia.html | title=Priyomnaya komissiya - $ 30.00(''Приемная комиссия - $ 30.000'') | author=Kartashova, Larisa | date=18 August 2004 | publisher=Rossiyskaya gazeta, August 18, 2004 | language=ru | access-date=2008-10-08 | display-authors=etal | archive-date=2008-08-30 | archive-url=https://web.archive.org/web/20080830081258/http://www.rg.ru/2004/08/18/korruptsia.html | url-status=live }}</ref>

      University heads, notably [[Moscow State University]] rector [[Viktor Sadovnichiy]], resisted the novelty, arguing that their schools cannot survive without charging the applicants with their own entrance hurdles. Nevertheless, the legislators enacted USE in February 2007. In 2008 it was mandatory for the students and optional for the universities; it is fully mandatory since 2009.{{citation needed|date=March 2023}} A few higher education establishments are still allowed to introduce their own entrance tests in addition to USE scoring; such tests must be publicized in advance.(''see also [[Education in Russia]]'')

      ==Saudi Arabia==
      Admission to colleges in Saudi Arabia depends on the high school grade as well as the scores of some standardized tests called '''[[Qiyas Tests]]''' prepared by ''the National Center for Assessment in Higher Education''.

      ==South Korea==
      {{Main|College admissions in South Korea}}
      {{Cleanup rewrite|2=section|date=January 2021}}

      In Korea there is national center for test which happens every year around November called su-neung, the [[College Scholastic Ability Test]]. Many students in Korea begin preparing for the College Scholastic Ability Test (CSAT) during middle school and continue throughout high school, reflecting its importance in the admissions process.

      ==Sweden==
      Admission in Sweden requires completion of secondary education, along with the proper specific qualifications (e.g. science in high school to study science in college).  Prospective students are admitted based on their grade point average or SAT, although majors such as theatre and architecture may require some extra work.

      ==Thailand==
      {{See also|Education in Thailand}}
      At present, Thai university admissions are done through the "Thai University Central Admission System" or TCAS, a central admissions system developed by the Council of University Presidents of Thailand (CUPT). This system is divided into four rounds of admissions: portfolio admissions, quota admissions, joint admissions, and direct admissions.<ref>{{Cite web |title=TCAS User manual |url=https://assets.mytcas.com/d/TCAS65-manual-v7-21dec64.pdf |access-date=2022-03-14 |archive-date=2022-01-25 |archive-url=https://web.archive.org/web/20220125105539/https://assets.mytcas.com/d/TCAS65-manual-v7-21dec64.pdf |url-status=live }}</ref>

      === Round 1: Portfolio admissions ===
      Universities accepting students in this round have a lot of freedom in setting admission requirements but generally look at the extracurricular activities and achievements of a student, so a portfolio containing the student's basic information along with their extracurricular activities and achievements is expected by most universities. However, some programmes (especially international programmes) will also accept and use international standardised examinations in consideration such as the SAT, IELTS, BMAT, etc. After the recently announced changes that will be implemented in 2023, universities will now accept aptitude tests developed by CUPT which include the TGAT and TPAT exams.

      === Round 2: Quota admissions ===
      This round of admissions is intended to provide more opportunities in education for students in areas outside of Bangkok, the capital. This round is similar to round 1 in that programmes accepting students in this round have freedom in setting their requirements. However, scores such as the TGAT, TPAT, and General Subject Tests are usually required.

      === Round 3: Joint admissions ===
      In this round, universities accept students with exam scores of TGAT, TPAT, and General subject tests. Round 3 admissions are handled by the CUPT rather than the universities. After taking the exams and receiving their results, students will list up to 10 universities they want to apply for, with the top being the first choice and the bottom, the last resort. Though admissions of all higher education programmes in round 3 is done through the same system by using scores from the same set of exams, each programme has different criteria and weights given to each exam and in the case of programmes such as medicine, engineering, and many others, TPAT scores corresponding to the field in which that programme is will be used in the admissions process. For example, medical schools under COTMES will require TPAT 1 (Medical Aptitude) and 7 General Subject Tests (Physics, Chemistry, Biology, Mathematics, English, Thai, Social Studies) while engineering schools generally require TGAT, TPAT 3 (Engineering Aptitude), Physics General Subject Test, and sometimes, Chemistry and Biology General Subject Tests.

      === Round 4: Direct admissions ===
      In round 4, universities have total freedom in setting their requirements and criteria. Universities can require scores in TGAT, TPAT, General subject tests, or other exams such as the SAT, and IELTS. They can also require the student's portfolio and set requirements of the student's region of origin.

      === Admissions exams ===
      The [[Thai Aptitude Tests]] and General Subject Tests are exams used in the [[Education in Thailand|Thai University Central Admissions System]]. These exams include the TGAT, five TPAT exams, and nine General Subject Tests. These exams are expected to be conducted via computer-based tests at various TCAS test centres. Scores of the aptitude tests will be required by some universities accepting students through the first, second, and fourth round of TCAS and required by all universities accepting through the third round. While the scores of the General Subject Tests will be used in the second, third, and fourth round of TCAS.<ref>{{Cite web |title=TCAS65 - ระบบการคัดเลือกบุคคลเข้าศึกษาต่อในระดับมหาวิทยาลัย ปีการศึกษา 2565 |url=https://www.mytcas.com/news/announcement-118 |access-date=2022-03-14 |website=www.mytcas.com |language=th |archive-date=2022-04-01 |archive-url=https://web.archive.org/web/20220401041055/https://www.mytcas.com/news/announcement-118 |url-status=live }}</ref>

      ==== Thai General Aptitude Test ====
      The Thai General Aptitude Test or TGAT (replacing GAT in 2023) is an aptitude test aimed to test the basic or general abilities of a student such as English communication, and logical thinking. It also tests how fit the student is in becoming a future worker in Thai society.

      The TGAT is divided into three sections:
      * English communication
      * Critical and Logical Thinking
      * Future workforce competencies
      ** Value Creation & Innovation
      ** Complex Problem Solving
      ** Emotional Governance
      ** Civic Engagement

      ==== Thai Professional Aptitude Tests ====
      The Thai Professional Aptitude Tests or TPAT (replacing PAT in 2023) are aptitude tests required by universities for students applying for programmes in any of the five fields: medicine; liberal arts; science, technology, and engineering; architecture; and education. Students may choose to take the tests that are required by the programme they are applying to.

      * TPAT 1: Medical Aptitude Test (developed by the consortium of Thai medical schools, COTMES). TPAT 1 is divided into three sections: 
      ** Section 1: Thinking skills and Aptitude
      ** Section 2: Ethics
      ** Section 3: Reading analysis and synthesis
      * TPAT 2: Liberal arts Aptitude Test. TPAT 2 tests candidates' knowledge in the visual art, music theory, performance arts.
      * TPAT 3: Scientific, technological, and engineering Aptitude Test. TPAT 3 tests candidates' ability in Physics and Chemistry as well as their ability to apply their knowledge. The test is completely objective, consisting of multiple choices and student-produced response.
      * TPAT 4: Architecture Aptitude Test. TPAT 4 tests candidate's ability in non-numerical Physics and aptitude in basic arts and design. There are questions that ask students to design a room with furnitures given. These questions are completely objective and are scored by computer. The test contains a subjective section, testing candidates' ability to sketch and draw.
      * TPAT 5: Teaching and educational Aptitude Test.

      ==== General Subject Tests ====
      While the TGAT and TPAT test the aptitude or innate ability to comprehend and understand something, the General Subject Tests are intended to test a student's knowledge of each subject and his/her ability to apply that knowledge. The General Subject Tests include:

      * Thai
      * Social studies
      * English
      * Other foreign languages (replacing PAT 7 in 2023)
      ** French
      ** German
      ** Japanese
      ** Chinese
      ** Arabic
      ** Pal
      ** Korean
      * Applied science
      * Applied mathematics which includes two optional sections: basic and advanced
      * Biology
      * Chemistry
      * Physics

      The students are responsible to report all scores to the central admission system. They are required to choose a program or faculty that they want to study in. After that, different mathematical formula is used to weighed students' scores for that program. For instance, Pharmacology requires high scores on Sciences, while Economics requires high score in Mathematics. After the score is weighed, students are offered decision only according to their scores.

      ==Turkey==
      {{Main|Education in Turkey}}
      In Turkey, the ''Student Selection and Placement Center'' [[ÖSYM]] is the responsible body for organizing [[ÖSS]], the national level university admission examination. For international student candidates, universities require [[YÖS exam]] score for admission to graduate courses.

      ==United Kingdom==
      {{See also|UCAS}}
      In the United Kingdom there are separate admission processes for undergraduate and postgraduate degrees.  There is also [[The Open University]] which has an ''open door policy''.

      ===Undergraduate entry===

      ====The application process====
      The United Kingdom has a centralised system of admissions to higher education at undergraduate level, [[UCAS]]. In general, students are not admitted to universities and colleges as a whole, but to particular [[Course of study|courses of study]].

      During the first few months (September to December) of the final year of school or sixth form college (age 17/18) or after having left school, applicants register on the UCAS website and select five courses at higher education institutes (fewer choices are permitted for the more competitive subjects such as medicine and veterinary medicine). Applicants still at school receive predicted grades for their A-level by their teachers, Highers or IB subjects, which are then used for the application. Applicant who already left school applies with results already obtained. Applicants must provide a personal statement describing in their own words why they want to study that particular subject and why they would be a committed student,<ref>{{cite web |url=http://www.ucas.com/students/startapplication/apply09/personalstatement/ |title=How to Apply - 2009 - Your personal statement |publisher=[[UCAS]] |access-date=2009-03-22 |archive-date=2009-03-22 |archive-url=https://web.archive.org/web/20090322040400/http://www.ucas.com/students/startapplication/apply09/personalstatement/ |url-status=live }}</ref> and their school must provide an academic reference.<ref>{{cite web |url=http://www.ucas.com/students/applying/howtoapply/reference |title=UCAS - Your reference |publisher=[[UCAS]] |access-date=2011-02-20 |archive-date=2011-02-13 |archive-url=https://web.archive.org/web/20110213235148/http://www.ucas.com/students/applying/howtoapply/reference |url-status=live }}</ref>  Some universities (e.g. [[Oxford]], [[Cambridge]], [[Manchester]], [[Imperial College]], [[King's College London]] or [[University College London]]) and some disciplines (e.g. medicine) routinely require shortlisted candidates to attend an interview and/or complete special admissions tests<ref>{{cite web |url=http://www.ucas.com/students/beforeyouapply/admissions/ |title=Admissions Tests |publisher=[[UCAS]] |access-date=2009-03-22 |url-status=dead |archive-url=https://web.archive.org/web/20090314071128/http://www.ucas.com/students/beforeyouapply/admissions/ |archive-date=2009-03-14 }}</ref> before deciding whether to make an offer. In the absence of tests and interviews, the personal statement and reference can be decisive, as many students are likely to apply to competitive courses with similar predicted and actual grades.

      In general, applications must be received mid-January for courses that start the following Autumn. However the deadline is three months earlier, in mid-October, where the application includes a medical, dentistry or veterinary course, or any course at [[Oxbridge]].<ref>{{cite web |title=UCAS Students: Important dates for your diary |quote=15 October 2008 Last date for receipt of applications to Oxford University, University of Cambridge and courses in medicine, dentistry and veterinary science or veterinary medicine. |url=https://www.ucas.com/students/importantdates |access-date=2009-02-02 |archive-date=2009-02-01 |archive-url=https://web.archive.org/web/20090201114118/http://ucas.com/students/importantdates |url-status=live }}</ref>

      For each course applied for, the applicant receives a response from the institution: rejection, conditional offer or unconditional offer. If a conditional offer is received, the student can only take up the place on the course if they later fulfil the stated conditions: normally the achievement of specific grades in their forthcoming exams. If no offers are received following the initial application, or the applicant does not wish to take up any of their offers,{{Citation needed|date=March 2009}} UCAS+ can be used. Applicants can then apply to one course at a time in order to try to find a suitable offer.

      Following the receipt of offers, whether after the initial application, or through UCAS+, the applicant chooses two courses for which offers have been made: a first choice and a second choice. If the conditions of the first choice offer are later met, the applicant may attend this course. If the applicant does not fulfil the conditions of their first choice, but does fulfil the conditions of their second "insurance" choice, they can attend their second choice course. If they fail to meet the conditions of both offers, they may choose to go through "clearing". This involves ringing up or sending their application to different universities in the hope of finding a place on another course. Many students do successfully find places through this route.

      ====Factors affecting admission====
      Whether to admit an applicant to a course is entirely the decision of each individual university. They will base their decision on a variety of factors, but primarily the grades predicted or already received in school leaver examinations. As more and more applicants are attaining higher and higher grades in the A level examinations, most universities also use secondary admissions criteria. These may include results at GCSE or Standard grade examinations (or equivalent), the references provided on the application and the information provided on the personal statement. The personal statement can often be the deciding factor between two similar candidates so a small industry has sprung up offering false personal statements for a fee. UCAS employs similarity detection software to identify personal statements that closely resemble pre-existing sources or third-party-written content, which may lead to application rejection.<ref>{{cite web|url=http://www.ucas.ac.uk/students/startapplication/apply09/faqs/personalstatement/similaritydetection |title=Questions about the UCAS Similarity Detection Service |publisher=[[UCAS]] |access-date=2009-03-22 |url-status=dead |archive-url=https://web.archive.org/web/20081001144447/http://www.ucas.ac.uk/students/startapplication/apply09/faqs/personalstatement/similaritydetection |archive-date=October 1, 2008 }}</ref>

      The personal statements generally describe why the applicant wants to study the subject they have applied for, what makes them suitable to study that subject, what makes them suitable to study at degree level generally, any work experience they have gained, their extracurricular activities and any other factors. This is the only way admissions tutors can normally get an impression of what a candidate is really like and assess the applicant's commitment to the subject.

      In addition to the information provided on the UCAS form, some universities ask candidates to attend an interview. Oxford and Cambridge almost always interview applicants, unless, based on the UCAS form and/or admissions tests, they do not believe the applicant has any chance of admission. Other universities may choose to interview, though only in some subjects and on a much smaller scale, having already filtered out the majority of candidates. The interview gives the admissions tutors another chance to assess the candidate's suitability for the course.

      There has been an effort by the central government to encourage universities to broaden access to students from diverse social backgrounds.{{Citation needed|date=November 2024}} Social background can only be assessed by the type of school attended, as no information about income or background is otherwise required on the UCAS form.

      Another important determinant of whether an offer is to be made is the amount of competition for admission to that course. The more competitive the course, the less likely an offer will be made and, therefore, the stronger the application must be. Applicants for medicine are often expected to have undertaken extensive work experience in a relevant field in order to show their commitment to the course. For the most competitive courses, less than 10% of applications may result in admission, whereas at the less competitive universities, practically all applicants may receive an offer of admission.

      Ultimately, however, no matter how many extra-curricular activities and work experience have been undertaken, if the admissions tutor does not believe, based on the submitted exam results, the candidate is academically capable of completing the course, he or she will not be admitted.

      A well qualified candidate applying under UCAS for five competitive courses to each of which only 10% of well qualified candidates could be accepted would have only a 40% chance of receiving at least one offer of acceptance.{{Citation needed|date=November 2019}}
      Alternatively, if five less competitive courses each having a 33% acceptance rate are chosen, the chance of receiving at least one offer is more than 85%.
      This implies that a strategy for improving the chance of receiving at least one offer, to perhaps 70%, is indicated even to well qualified candidates.
      It is notable that in order to get admitted in a university in the United Kingdom, admission tests are not universally identified as the most important as the main factors that determine a college admission. Surveys indicate that strong performance in school examinations, such as GCSEs, is a significant factor in university admissions.{{Citation needed|date=November 2019}}

      ===Postgraduate entry===
      All applications are made directly to the university or college, with no limit on the number of courses that can be applied for.

      ==United States==
      {{Main|College admissions in the United States}}
      {{Further|Transfer admissions in the United States}}

      In the United States, [[high school]] students apply to four-year [[college]]s and [[universities]], where [[undergraduate]] students may earn a [[bachelor's degree]]. Others attend [[community college]]s or a two-year institution. These students may acquire a technical degree, a two-year [[associate degree]], and/or prepare for transfer to four-year institutions. [[Nontraditional student]]s are usually students over the age of 22 who pursue [[higher education]]. Students may apply to many institutions using the [[Common Application]].<ref>{{cite web|url=http://www.commonapp.org/|title=Welcome|last=ISDeveloper|date=2015-06-17|website=The Common Application|language=en|access-date=2018-03-16|archive-date=2018-03-15|archive-url=https://web.archive.org/web/20180315202655/https://www.commonapp.org/|url-status=live}}</ref> Fees are generally charged for each application but can be waived based on financial need.

      Students apply to one or more colleges by submitting an application which each college evaluates using its own criteria. The college then decides whether or not to extend an offer of admission (and possibly [[Student financial aid (United States)|financial aid]]) to the student. The majority of colleges admit students to the college as a whole, and not to a particular [[academic major]], although this may not be the case in some specialized programs such as [[engineering]] and [[architecture]].

      Common criteria include [[ACT (test)|ACT]] or [[SAT]] scores, extracurricular activities, [[Grade point average|GPA]], demonstrated integrity, and an [[application essay]]. Further criteria, used to varying degrees, include athletic ability, interest the student demonstrates in the college, [[legacy preferences]] (family members having attended the school), race, ability to pay full tuition, potential to donate money to the school ([[development case]]), desired class composition, perceived fit, subjective evaluation of student character (based on essays or interviews), and general discretion by the admissions office. The importance of these factors varies between universities, and selectiveness varies significantly, as measured by admissions rate. The admissions rate can range from 100% (schools that accept everyone with a high school diploma) to under 10%.

      == Vietnam ==
      In Vietnam, most students apply to study in four-year colleges, universities, or academies after completing high school. Others apply to two- or three-year colleges, where they have options to transfer to a university once earned their degree, or to vocational schools. While the number of students applying to two- or three-year colleges and vocational colleges are increasing, especially the latter in recent years thanks to government's efforts, the number is still insignificant.

      Preparation for college and university admissions usually do not begin until the last year of high school. Students will usually attend university fairs and career counselling sessions, organised jointly by [[Ho Chi Minh Communist Youth League]] and local governments. Representatives from both national and local colleges and universities will travel in troupe to organise booth and answer questions from students. These activities are in session throughout the school year, though different locales have different day when these activities are organised. This usually means that students in provinces most distant from major educational centres, such as [[Ho Chi Minh City]] and [[Hanoi]], will attend these fairs and sessions last.

      College and university admissions are mostly a centralised affair, coordinated by the [[Ministry of Education and Training (Vietnam)|Ministry of Education and Training]] (MoET). In particular, MoET works closely with colleges and institutions to determine admission quotas, taking into account of predicted market demands and instructional capability and shares information about the [[:vi:Kỳ thi trung học phổ thông quốc gia (Việt Nam)|National High School Examination]] result (see below). In addition, the MoET regulates the list of admitted students, as reported from colleges and universities, to reduce inflated "candidates bubble" since students can register and be potentially accepted to many institutions at the same time.

      In Vietnam, students are admitted to a particular programme, not an institution as a whole. And within any programme, colleges and universities usually offer many pathways that students can choose to apply for admissions. One common and predominant pathway is by using results of different subject combination from the National Higher School Examination. Not until recently, that schools move to diversify their admission pathways, for instance, opting for high school records or accepting international qualifications in lieu or in addition to Vietnamese ones to evaluate students admissibility. Some colleges and universities set additional requirements, especially in specialised fields such as medicine.

      While there exists many subject combinations and admission pathways, this is not synonymous to a comprehensive evaluation. Colleges and universities treat applicants from each subject combinations and admission pathways as different and discreet pools. This means that students interested in one particular programme from one particular school can be admitted in, for example, four ways: two subject combinations, for example A (mathematics, physics, chemistry) and A1 (mathematics, physics, English); and two admission pathways such as using high school records and using international qualifications.

      In addition, grades and academic performances are still the sole criteria for evaluation, regardless of means of admissions. Results from the national exam still play an important role, even students opt for alternative admission pathways that do not use them, as the exam is foremost a benchmark assessment to whether students can graduate from high school or not.

      === National High School Exam ===
      The National High School Exam (Kỳ thi Trung học Phổ thông Quốc gia) serves both as a graduation exam and an admission exam. Colleges and universities in Vietnam use the results from this exam as the most common and the most predominant pathway to evaluate their applicants' admissibility. Results of the exam are organised into different subject combinations, fitting with the nature of the programme.

      Commonly used subject combinations include:

      * Subject combination A, including mathematics, physics, chemistry.
      * Subject combination A1, including mathematics, physics, English.
      * Subject combination B, including mathematics, chemistry, biology.
      * Subject combination C, including Vietnamese literature, history, geography.
      * Subject combination D, including Vietnamese literature, mathematics, foreign language.

      There are other subject combinations as well, especially for fields such as fine arts, music, kindergarten and primary school education, and physical education. Newer combinations are instated by colleges and universities as they are now given more freedom to determine their admission pathways and subject combinations.

      ==== Registration ====
      Students register to write the exam in March or April. Because of high dependency on the national exam, they also rank their programme choices in their application form, as well as the pathways they wish to be considered for evaluation for admission. This is different from the North American but similar to the British or European admission methods. There is no limit on the number of programme students can choose and rank, but most limit themselves to five or less.<ref>{{Cite web|date=2021-05-12|title=Xét tuyển vào đại học 2021: Trung bình mỗi thí sinh đăng ký 5 nguyện vọng|url=https://thanhnien.vn/post-1066436.html|access-date=2021-10-25|website=Báo Thanh Niên|language=vi|archive-date=2023-06-30|archive-url=https://web.archive.org/web/20230630111011/https://thanhnien.vn/xet-tuyen-vao-dai-hoc-2021-trung-binh-moi-thi-sinh-dang-ky-5-nguyen-vong-1851066436.htm|url-status=live}}</ref> Students can change their programme choices and subject combinations during this period by rewriting and resubmitting their application form. Students must pay application fees, which are proportional to the number of choices they made.

      ==== Examination ====
      Students sit for the exam in June or July. There are three compulsory papers to write: Vietnamese Literature, Mathematics, and Foreign Language (primarily English but there are also options in Chinese, Japanese, French, German, Russian and more recently, Korean).<ref name=":0">{{Cite web|last=|first=|date=2021-03-24|title=Giữ ổn định kỳ thi tốt nghiệp THPT|url=https://tuoitre.vn/news-20210324091531314.htm|access-date=2021-10-25|website=Tuoi Tre Online|language=vi|archive-date=2021-10-25|archive-url=https://web.archive.org/web/20211025160645/https://tuoitre.vn/news-20210324091531314.htm|url-status=live}}</ref><ref>{{Cite web|date=2021-03-17|title=Bổ sung tiếng Hàn vào danh mục ngoại ngữ thi tốt nghiệp THPT năm 2021|url=https://thanhnien.vn/post-1047153.html|access-date=2021-10-25|website=Báo Thanh Niên|language=vi|archive-date=2023-06-30|archive-url=https://web.archive.org/web/20230630111010/https://thanhnien.vn/bo-sung-tieng-han-vao-danh-muc-ngoai-ngu-thi-tot-nghiep-thpt-nam-2021-1851047153.htm|url-status=live}}</ref> Students then have to choose either to write a social science paper (which includes history, geography, and civics) or natural science paper (which includes physics, chemistry, and biology).<ref name=":0" /> Except Vietnamese Literature, all remaining papers are multiple-choice.<ref name=":0" />

      Exams are set in multiple days with time and date uniformed across Vietnam. In 2020 and 2021, due to [[COVID-19 pandemic in Vietnam|COVID-19 pandemic]], the exams have been organised into two sessions to accommodate local public health situations.<ref>{{Cite web|last=|first=|date=2021-07-04|title=Thi tốt nghiệp THPT chia làm 2 đợt có ảnh hưởng đến việc tuyển sinh đại học?|url=https://vtv.vn/news-20210704191528338.htm|access-date=2021-10-25|website=Bao Dien tu VTV|language=vi|archive-date=2021-10-25|archive-url=https://web.archive.org/web/20211025160705/https://vtv.vn/news-20210704191528338.htm|url-status=live}}</ref>

      ==== Results ====
      Results are graded and released in August or September. They are also shared and open for access to all colleges and universities that use the results. Students, after their results, can also opt for remarks by submitting a petition, or change their programme choices and results combination so they can yield a better chance to get admitted.

