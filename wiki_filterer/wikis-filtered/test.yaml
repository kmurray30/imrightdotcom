      A '''drug test''' (also often '''toxicology screen''' or '''tox screen''') is a technical analysis of a [[biological specimen]], for example [[urine]], [[hair]], [[blood]], [[breath]], [[sweat]], or [[saliva|oral fluid/saliva]]—to determine the presence or absence of specified parent drugs or their [[metabolite]]s. Major applications of drug testing include detection of the presence of [[Use of performance-enhancing drugs in sport|performance enhancing]] [[steroid]]s in sport, employers and [[parole]]/[[probation]] officers screening for [[Prohibition (drugs)|drugs prohibited]] by law (such as [[cocaine]], [[methamphetamine]], and [[heroin]]) and [[police officers]] testing for the presence and concentration of [[alcoholic drink|alcohol]] ([[ethanol]]) in the blood commonly referred to as [[Blood alcohol content|BAC]] (blood alcohol content).  BAC tests are typically administered via a [[breathalyzer]] while [[urinalysis]] is used for the vast majority of drug testing in [[sports]] and the [[workplace]]. Numerous other methods with varying degrees of accuracy, sensitivity (detection threshold/cutoff), and detection periods exist.

      A drug test may also refer to [[illegal drug trade|a test]] that provides quantitative [[chemical analysis]] of an [[illegal drug]], typically intended to help with [[responsible drug use]].<ref name=inde1>{{cite news|title=I spent my weekend testing drugs at a festival|url=https://www.independent.co.uk/voices/secret-garden-party-drugs-service-i-tested-drugs-at-festival-service-for-everyone-a7155376.html|newspaper=The Independent|access-date=18 May 2017|date=25 July 2016|archive-date=May 3, 2020|archive-url=https://web.archive.org/web/20200503064019/https://www.independent.co.uk/voices/secret-garden-party-drugs-service-i-tested-drugs-at-festival-service-for-everyone-a7155376.html|url-status=live}}</ref>

      ==Detection periods==
      The detection windows depend upon multiple factors: drug class, amount and frequency of use, metabolic rate, body mass, age, overall health, and urine pH. For ease of use, the detection times of [[metabolite]]s have been incorporated into each parent drug. For example, heroin and cocaine can only be detected for a few hours after use, but their metabolites can be detected for several days in urine. The chart depicts the longer detection times of the metabolites. In the case of hair testing, the metabolites are permanently embedded into hair, and the detection time is determined by the length of the hair sample used in the analysis. The standard length of head hair used in the test is 1.5", which corresponds to about 3 months. Body/pubic hair grows slower, and the same  1.5" would result in a longer detection time.<ref>{{Cite journal |last1=Usman |first1=Muhammad |last2=Naseer |first2=Abid |last3=Baig |first3=Yawar |last4=Jamshaid |first4=Tahir |last5=Shahwar |first5=Muhammad |last6=Khurshuid |first6=Shazia |date=2019-04-27 |title=Forensic toxicological analysis of hair: a review |journal=Egyptian Journal of Forensic Sciences |language=en |volume=9 |issue=1 |page=17 |doi=10.1186/s41935-019-0119-5 |issn=2090-5939|doi-access=free }}</ref>

      Oral fluid or [[saliva testing]] results for the most part mimic that of blood. The only exceptions are THC (tetrahydrocannabinol) and benzodiazepines. Oral fluid will likely detect THC from ingestion up to a maximum period of 6–12 hours. This continues to cause difficulty in oral fluid detection of THC and benzodiazepines.<ref name="j368">{{cite report| last1=Lacey | first1=John  | last2=Kelley-Baker| first2=Tara | last3=Furr-Holden| first3=Debra|author3-link=Debra Furr-Holden | last4=Brainard| first4=Katharine | last5=Moore| first5= Christine | title=Pilot Test of New Roadside Survey Methodology for Impaired Driving | date=January 2007 | publisher=
      United States National Highway Traffic Safety Administration | doi=10.21949/1525562 |url=https://rosap.ntl.bts.gov/view/dot/1775 | access-date=2024-08-10 | page=}}</ref>

      Breath air for the most part mimics blood tests as well. Due to the very low levels of substances in the breath air, liquid chromatography—mass spectrometry has to be used to analyze the sample according to a recent publication wherein 12 analytes were investigated.

      Rapid oral fluid products are not approved for use in workplace drug testing programs and are not FDA cleared. Using rapid oral fluid drug tests in the workplace is prohibited in only:<ref>{{cite web|url=https://www.singlesourceservices.com/drug-test-kits/Statebystatelaw_800059vA_0611.pdf|title=Drug Testing - State by State Legal Status|publisher=Alere Toxicology|archive-url=https://web.archive.org/web/20140125024950/http://www.singlesourceservices.com/drug-test-kits/Statebystatelaw_800059vA_0611.pdf|archive-date=January 25, 2014|access-date=2013-02-21}}</ref>
      * [[California]]
      * [[Kansas]]
      * [[Maine]]
      * [[Minnesota]]
      * [[New York (state)|New York]]
      * [[Vermont]]

      The following chart gives approximate detection periods for each substance by test type.

