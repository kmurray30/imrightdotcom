      |+ Approximate values for detection periods
      ! Substance !! Urine !! Hair !! Blood / Oral Fluid
      |-
      ! [[alcohol (drug)|Alcohol]]
      |  6–24 hours<ref>{{Cite web|url=https://www.erowid.org/chemicals/alcohol/alcohol_testing.shtml|archive-url=https://web.archive.org/web/20081020223534/http://www.erowid.org/chemicals/alcohol/alcohol_testing.shtml|title=Erowid Alcohol Vault: Drug Testing|archive-date=October 20, 2008|website=www.erowid.org}}</ref> Note:  Alcohol tests may measure [[ethyl glucuronide]], which can stay in urine for up to 80 hours|| up to 90 days<ref>{{Cite web|url=https://www.psychemedics.com/hair-alcohol-testing/|archive-url=https://web.archive.org/web/20160623043846/http://www.psychemedics.com/hair-alcohol-testing/|title=Hair Alcohol Testing (EtG)|archive-date=June 23, 2016}}</ref> || 12 to 24 hours
      |-
      ! [[Amphetamines]] (except methamphetamine)
      | 1 to 4 days<ref>{{Cite web|url=https://www.erowid.org/chemicals/amphetamines/amphetamines_testing.shtml|archive-url=https://web.archive.org/web/20081020223250/https://www.erowid.org/chemicals/amphetamines/amphetamines_testing.shtml|title=Erowid Amphetamine Vault: Drug Testing|archive-date=October 20, 2008|website=www.erowid.org}}</ref> || up to 90 days || 12 hours
      |-
      ! [[Methamphetamine]]
      | 5 days- up to a week<ref name="erowid.org">{{Cite web|url=https://www.erowid.org/chemicals/meth/meth_testing.shtml|archive-url=https://web.archive.org/web/20081020223535/http://www.erowid.org/chemicals/meth/meth_testing.shtml|title=Erowid Methamphetamine Vault: Drug Testing|archive-date=October 20, 2008|website=www.erowid.org}}</ref> || up to 90 days || 1 to 3 days<ref name="erowid.org"/>
      |-
      ! [[MDMA]] (Ecstasy)
      | 3 to 5 days || up to 90 days || 3 to 4 days
      |-
      ! [[Barbiturates]] (except phenobarbital)
      | 1–4 days or 2–3 weeks || up to 90 days || 1 to 2 days
      |-
      ! [[Phenobarbital]]
      | 2 to 3 weeks<ref>{{Cite web|url=https://www.erowid.org/chemicals/barbiturates/barbiturates_testing.shtml|title=Erowid Barbiturates Vault: Drug Testing|website=www.erowid.org}}</ref> || up to 90 days || 4 to 7 days
      |-
      ! [[Benzodiazepines]]
      | Therapeutic use: up to 7 days. Chronic use (over one year): 4 to 6 weeks || up to 90 days || 6 to 48 hours
      |-
      ! [[Cannabis (drug)|Cannabis]]
      |Passive inhalation: up to 22 minutes** {{br}} Infrequent users: 7–10 Days {{br}} Heavy users: 30 to 100 days<ref name="ReferenceA">{{Cite web|url=https://www.erowid.org/plants/cannabis/cannabis_testing.shtml|archive-url=https://web.archive.org/web/20160902015634/https://www.erowid.org/plants/cannabis/cannabis_testing.shtml|title=Erowid Cannabis (Marijuana) Vault: Drug Testing|archive-date=September 2, 2016|website=www.erowid.org}}</ref><ref name="ReferenceA2">{{Cite web|url=https://norml.org/news/2006/02/23/marijuana-detection-time-shorter-than-previously-assumed/|archive-url=https://web.archive.org/web/20160902123050/http://norml.org/news/2006/02/23/marijuana-detection-time-shorter-than-previously-assumed|title=Marijuana Detection Time Shorter Than Previously Assumed|date=February 23, 2006|archive-date=September 2, 2016|website=NORML}}</ref><ref name="thec_Howl">{{Cite web| title = How long does weed stay in your system?| author = Susan Squibb| work = The Cannabist| date = 2016-03-09| access-date = 2016-05-25|url=http://www.thecannabist.co/2016/03/09/how-long-does-weed-stay-in-your-system/48677/| archive-url=https://web.archive.org/web/20160311104929/http://www.thecannabist.co/2016/03/09/how-long-does-weed-stay-in-your-system/48677/| archive-date = 2016-03-11}}
      </ref> || up to 90 days<ref name="ReferenceA"/> || 2 to 3 days in blood of infrequent users, up to 2 weeks in blood of heavy users<ref name="ReferenceA"/>  However, it depends on whether actual THC or THC metabolites are being tested for, the latter having a much longer detection time than the former. THC (found in marijuana) may only be detectable in saliva/oral fluid for 2 to 24 hours in most cases, though in rare cases has been detected up to 28 days after consumption.<ref>{{cite journal |last1=Lee |first1=Dayong |title=Current Knowledge on Cannabinoids in Oral Fluid |journal=Drug Testing and Analysis |volume=6 |issue=1–2 |pages=88–111 |pmc=4532432 |year=2013 |pmid=23983217 |doi=10.1002/dta.1514 }}</ref>
