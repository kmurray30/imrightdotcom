      ===Social===
      {{Main|Social impact of the COVID-19 pandemic in the United States|Impact of the COVID-19 pandemic on education in the United States|Racial disparities in the COVID-19 pandemic in the United States}}

      {{See also|Housing shortage}}
      {{quote box|We became the sickest country in the world.|[[Robert F. Kennedy Jr.]], September 4, 2025<ref>{{cite web |title=We became the sickest country in the world. I need to make sure this doesn't happen again. |url=https://x.com/SecKennedy/status/1963619420174975317 |website=x.com |publisher=Robert F. Kennedy Jr. |access-date=6 September 2025}}</ref>}}
      [[File:White House Coronavirus Update Briefing (49784743606).jpg|thumb|Fauci speaking to the press on the pandemic in April 2020. As in the rest of the world, previously unknown health officials became household names<ref>{{Cite journal |last=Yeager |first=Valerie A. |date=May 2022 |title=The Politicization of Public Health and the Impact on Health Officials and the Workforce: Charting a Path Forward |journal=American Journal of Public Health |volume=112 |issue=5 |pages=734–735 |doi=10.2105/AJPH.2022.306744 |issn=1541-0048 |pmc=9010922 |pmid=35417216}}</ref>]]
      The pandemic had far-reaching consequences beyond the disease itself and efforts to contain it, including political, cultural, and social implications.

      From the earliest days of the pandemic, there were reported [[COVID-19 Hate Crimes Act|incidents of xenophobia and racism]] against [[Asian Americans]].<!-- THAT SENTENCE WAS AFFIRMED BY AN RFC. DO NOT REMOVE WITHOUT CONSENSUS. --><ref name="NYT Racism"/> During the first year, an ad-hoc organization called [[Stop AAPI Hate]] received 3,795 reports of racism against Asian Americans and Pacific Islanders.<ref>{{cite web|last=Fang|first=Marina|date=March 16, 2021|title=There Have Been Nearly 4,000 Incidents Of Anti-Asian Racism In The Last Year|url=https://www.huffpost.com/entry/anti-asian-racism-covid-19_n_6050afe4c5b6ce1016422d47|access-date=March 16, 2021|website=[[HuffPost]]}}</ref>

      [[Racial disparities in the COVID-19 pandemic in the United States|Disproportionate numbers of cases have been observed among Black and Latino populations]].<ref name="Godoy"/><ref name="abcnews.go.com"/><ref name="ama-assn.org"/> Of four studies published in September 2020, three found clear disparities due to race and the fourth found slightly better survival rates for Hispanics and Blacks.<ref>{{cite news|url=https://www.cidrap.umn.edu/news-perspective/2020/09/studies-spotlight-covid-racial-health-disparities-similarities|title=Studies spotlight COVID racial health disparities, similarities|last=Van Beusekom|first=Mary|date=September 25, 2020|access-date=September 27, 2020|publisher=CIDRAP – Center for Infectious Disease Research and Policy, University of Minnesota}}</ref> As of September 15, 2020, Blacks had COVID-19 mortality rates more than twice as high as the rate for Whites and Asians, who have the lowest rates.<ref>{{cite web|title=The color of coronavirus: COVID-19 deaths by race and ethnicity in the U.S.|url=https://www.apmresearchlab.org/covid/deaths-by-race|access-date=September 28, 2020|publisher=APM Research Lab: American Public Media}}</ref> [[CNN]] reported in May 2020 that the [[Navajo Nation]] had the [[COVID-19 pandemic in the Navajo Nation|highest rate of infection]] in the United States.<ref>{{cite news|title=Navajo Nation surpasses New York state for the highest COVID-19 infection rate in the US|url=https://www.cnn.com/2020/05/18/us/navajo-nation-infection-rate-trnd/index.html|author1=Hollie Silverman |author2=Konstantin Toropin |author3=Sara Sidner |author4=Leslie Perrot|date=May 18, 2020 |publisher=[[CNN]]|access-date=May 28, 2020}}</ref> In June 2021, the CDC confirmed these numbers, reporting that American Indian or Alaska Native, Non-Hispanic persons had the highest rates of both hospitalizations and deaths, while Hispanic and Latino persons suffered the highest rates of COVID compared to White persons. However, the CDC noted that only 61% of case reports included race and ethnicity data, which could result in inaccurate estimates of the relative risk among groups.<ref>{{cite web|title=Cases, Data, and Surveillance |url=https://www.cdc.gov/coronavirus/2019-ncov/covid-data/investigations-discovery/hospitalization-death-by-race-ethnicity.html |website=U.S. [[Centers for Disease Control and Prevention]] (CDC) |access-date=July 15, 2021 |date=February 11, 2020}}</ref> Additionally, a study published by the New England Journal of Medicine in July 2020 revealed that the effect of stress and weathering on minority groups decreases their stamina against COVID.<ref>{{cite journal|vauthors=Chowkwanyun M, Reed AL|date=July 2020|title=Racial Health Disparities and COVID-19 – Caution and Context|journal=New England Journal of Medicine|volume=383|issue=3|pages=201–203|doi=10.1056/NEJMp2012910|s2cid=218534431|issn=0028-4793|doi-access=free|title-link=doi|pmid=32374952 }}</ref>

      From 2019 to 2020, in the United States, the life expectancy of a Hispanic American decreased three years, for an African American 2.9{{nbsp}}years, and for a White American 1.2{{nbsp}}years.<ref name=Bosman/> The [[COVID Tracking Project]]<ref>{{cite web|url=https://covidtracking.com/race|title=The COVID Racial Data Tracker|access-date=September 28, 2020|publisher=The COVID Tracking Project (The Atlantic Monthly Group)}}</ref> published data revealing that people of color were contracting and dying from COVID-19 at higher rates than Whites. An NPR analysis of April–September 2020 data from the COVID Tracking Project found that Black people's share of COVID-19 deaths across the United States was 1.5 times greater (in some states 2.5 times greater) than their share of the U.S. population. Similarly, Hispanics and Latinos were disproportionately infected in 45 states and had a disproportionate share of the deaths in 19 states. Native American and Alaskan Native cases and deaths were disproportionally high in at least 21 states and, in some, as much as five times more than average. White non-Hispanics died at a lower rate than their share of the population in 36 states and D.C.<ref>{{cite news|title=As Pandemic Deaths Add Up, Racial Disparities Persist – And In Some Cases Worsen|url=https://www.npr.org/sections/health-shots/2020/09/23/914427907/as-pandemic-deaths-add-up-racial-disparities-persist-and-in-some-cases-worsen|last=Wood |first=Daniel|date=September 23, 2020|access-date=September 27, 2020|publisher=[[NPR]] }}</ref>

      Life expectancy continued to fall from 2020 to 2021.<ref name="auto2"/><ref>{{cite web|date=2022-12-20 |title=New Report Confirms U.S. Life Expectancy has Declined to Lowest Level Since 1996 |url=https://www.cdc.gov/nchs/pressroom/nchs_press_releases/2022/20221222.htm |access-date=2022-12-22 |website=cdc.gov |language=en-us}}</ref>

      By April 2020, closed schools affected more than 55{{nbsp}}million students.<ref>{{cite news|url=https://www.edweek.org/ew/section/multimedia/map-coronavirus-and-school-closures.html|title=Map: Coronavirus and School Closures|website=Education Week|date=March 7, 2020|publisher=Editorial Projects in Education|access-date=April 23, 2020}}</ref> Higher education was also impacted in a variety of different ways.<ref>{{Cite web |title=Higher Education Responses to Coronavirus (COVID-19) |url=https://www.ncsl.org/education/higher-education-responses-to-coronavirus-covid-19 |access-date=2024-03-30 |website=www.ncsl.org}}</ref><ref>{{Cite journal |last1=Dutta |first1=Tapati |last2=Agley |first2=Jon |date=2024-03-18 |title=College leadership decisions and experiences during the COVID-19 pandemic: an elite interview study |journal=Journal of American College Health |volume=73 |issue=4 |language=en |pages=1576–1586 |doi=10.1080/07448481.2024.2328139 |issn=0744-8481|doi-access=free |pmid=38498604 }}</ref>

      ===Elections===
      {{Update|part=section|date=March 2025|reason=All sources are from before the election}}{{Further|2020 United States presidential election|Postal voting in the 2020 United States elections|Impact of the COVID-19 pandemic on politics#United States 3}}
      The pandemic prompted calls from voting rights groups and some [[Democratic Party (United States)|Democratic Party]] leaders to expand [[mail-in voting]], while Republican leaders generally opposed the change. Some states were unable to agree on changes, resulting in lawsuits. Responding to Democratic proposals for nationwide mail-in voting as part of a COVID-19 relief law, Trump said "you'd never have a Republican elected in this country again" despite evidence the change would not favor any particular group.<ref>{{cite news|last=Panetta|first=Grace|date=March 30, 2020|title=Trump baselessly claimed that expanding voting access would lead to a Republican never being elected in America again|website=[[Business Insider]]|url=https://www.businessinsider.com/trump-falsely-claims-expanding-voting-access-would-hurt-republicans-2020-3}}</ref> Trump called mail-in voting "corrupt" and said voters should be required to show up in person, even though, as reporters pointed out, he had himself voted by mail in the last Florida primary.<ref>{{cite news|url=https://thehill.com/homenews/administration/491674-trump-defends-his-mail-in-ballot-after-calling-vote-by-mail-corrupt|title=Trump defends his mail-in ballot after calling vote-by-mail 'corrupt'|work=[[The Hill (newspaper)|The Hill]]|date=April 7, 2020|last=Samuels|first=Brett|archive-url=https://web.archive.org/web/20210226202302/https://thehill.com/homenews/administration/491674-trump-defends-his-mail-in-ballot-after-calling-vote-by-mail-corrupt|archive-date=February 26, 2021|url-status=live}}</ref> Though mail-in vote fraud was slightly higher than in-person voter fraud, both instances were rare, and mail-in voting can be made more secure by disallowing third parties to collect ballots and providing free drop-off locations or prepaid postage.<ref>{{cite news|last=Parks|first=Miles|date=April 7, 2020|title=Fact Check: Is Mail Ballot Fraud As Rampant As President Trump Says It Is?|publisher=[[NPR]]|url=https://www.npr.org/sections/coronavirus-live-updates/2020/04/07/829323152/fact-check-is-mail-ballot-fraud-as-rampant-as-president-trump-says-it-is}}</ref>

      High COVID-19 fatalities at the state and county level correlated with a drop in expressed support for the election of Republicans, including the reelection of Trump, according to a study published in ''[[Science Advances]]'' that compared opinions in January–February 2020 with opinions in June 2020.<ref>{{cite journal|vauthors=Warshaw C, Vavreck L, Baxter-King R|date=October 2020|title=Fatalities from COVID-19 are reducing Americans' support for Republicans at every level of federal office|journal=Science Advances|volume=6|issue=44|article-number=eabd8564|doi=10.1126/sciadv.abd8564|pmid=33127688 |pmc=7608793|bibcode=2020SciA....6.8564W|issn=2375-2548}}</ref>

