  - title: NCAA drug testing
    pageid: 44287957
    extract: The NCAA's drug testing program exists to "protect players who play by the rules by playing clean." The NCAA adopted its drug testing program in 1986, the year after the executive committee formed the Special NCAA Committee on Drug Testing. The drug test ranges from testing player-enhancement drugs to marijuana. A student failing a drug test loses one year of eligibility and is not allowed to compete in events for the first offense.[2] However, not all students are tested because they are selected at random, but students are subject to be tested at any point in the year after the year-round testing program was adopted in 1990.[3] Of the 400,000 athletes competing in the NCAA, around 11,000 drug tests were administered in 2008–09 when the last statistics were available.[4] That number is expected to increase as drugs become more prevalent and easily accessible year by year.
    source: |-
      The '''NCAA's drug testing program''' exists to "protect players who play by the rules by playing clean." The NCAA adopted its drug testing program in 1986, the year after the executive committee formed the Special NCAA Committee on Drug Testing.<ref>{{Cite web |title=NCAA Drug Testing Program |url=https://www.ncaa.org/sports/2016/7/20/ncaa-drug-testing-program.aspx |access-date=2022-06-14 |website=NCAA.org |language=en}}</ref> The drug test ranges from testing player-enhancement drugs to marijuana. A student failing a drug test loses one year of eligibility and is not allowed to compete in events for the first offense.<sup>[2]</sup> However, not all students are tested because they are selected at random, but students are subject to be tested at any point in the year after the year-round testing program was adopted in 1990.<sup>[3]</sup> Of the 400,000 athletes competing in the NCAA, around 11,000 drug tests were administered in 2008–09 when the last statistics were available.<sup>[4]</sup> That number is expected to increase as drugs become more prevalent and easily accessible year by year.{{cn|date=November 2014}}

      ==History==
      The [[National Collegiate Athletic Association]] did not start drug testing athletes until 1986, and even then it was only athletes or teams that made it to championship or bowl games. Although athletes were not tested until 1986 in the year 1970 the NCAA council founded a drug education committee. “The Drug Education Committee conducts a survey of 1,000 male student-athletes in the Big Ten Conference; 40 percent of respondents said that drug use was a slight or growing problem among varsity athletes”.<ref>"National Collegiate Athletic Association." NCAA News Archive. N.p., n.d. Web. 23 Oct. 2014.</ref> In 1986 NCAA drug-testing program was adopted at the NCAA convention. The drug testing started that following fall with only championships and bowl games. The following year a Stanford diver filed a lawsuit claiming that this drug testing policy violated his privacy rights. The [[California Supreme Court]] ruled in favor of the NCAA in the privacy-rights lawsuit, saying the Association was "well within its legal rights" in adopting a drug-testing program. In 2006 the year-round testing program was expanded into the summer months. That same year the Division III Presidents Council approved a two-year drug-education and testing pilot program. “Today, 90 percent of Division I, 65 percent of Division II and 21 percent of Division III schools conduct their own drug-testing programs in addition to the NCAA’s”.<ref>"Drug Testing." NCAA Public Home Page. N.p., n.d. Web. 22 Oct. 2014.</ref>

      ==Regulations==
      The 2014–15 list of NCAA banned drugs includes the following classes: [[stimulant]]s (except for [[phenylephrine]] and [[pseudoephedrine]], which are permitted); [[Anabolic steroid|anabolic agent]]s; [[diuretic]]s and other [[masking agent]]s; "[[street drugs]]" (the NCAA gives as examples [[heroin]], [[marijuana]], [[tetrahydrocannabinol]] (THC), and [[synthetic cannabinoids]]); [[peptide hormone]]s and analogues; [[anti-estrogen]]s, and [[beta2-adrenergic agonist]]z.<ref name="Banned">[https://www.ncaa.org/health-and-safety/policy/2014-15-ncaa-banned-drugs 2014–15 NCAA Banned Drugs], NCAA (last updated November 7, 2014).</ref>  [[Alcohol (drug)|Alcohol]] and [[beta blocker]]s are also banned for [[List of NCAA rifle programs|rifle]] only.<ref name="Banned"/> The NCAA also bans "any [[chemical analog|substance chemically related]] to these classes."<ref name="Banned"/>

      The penalties differ form and NCAA issued drug test and an individual school issued [[drug test]]. “The penalty for positive tests of both performance-enhancing and street drugs is strict and automatic. Student-athletes lose one full year of eligibility for the first offense (25 percent of their total eligibility) and are withheld from competition for a full season. A second positive test for street drugs results in another lost year of eligibility and year withheld from competition. A second positive result for PED usage will render the student-athlete permanently ineligible”.<ref>"2013–14 NCAA Banned Drugs." NCAA Public Home Page. N.p., n.d. Web. 02 Nov. 2014.</ref>

