      {{Short description|Diagnostic testing for SARS-CoV-2 virus infection}}
      {{protection padlock|small=yes}}
      {{Use British English|date=March 2020}}
      {{Use dmy dates|date=June 2024}}
      {{cs1 config |name-list-style=vanc |display-authors=6}}
      {{COVID-19 pandemic sidebar|expanded=medical}}

      [[File:CDC 2019-nCoV Laboratory Test Kit.jpg|alt=CDC 2019-nCoV Laboratory Test Kit.jpg|thumb|upright=1.3|The US CDC's COVID-19 laboratory test kit]]

      '''COVID-19 testing''' involves analyzing samples to assess the current or past presence of [[SARS-CoV-2]], the virus that causes [[COVID-19]] and is responsible for the [[COVID-19 pandemic]]. The two main types of tests detect either the presence of the virus or [[antibodies]] produced in response to infection.<ref name="CDC testing">{{cite web |date=11 February 2020 |title=Testing for COVID-19 |url=https://www.cdc.gov/covid/testing/ |website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref><ref name="Serology testing">{{cite web | vauthors = Kobokovich A, West R, Gronvall G |title=Serology and Other Adaptive Immune Response Testing for COVID-19 |url= https://centerforhealthsecurity.org/sites/default/files/2022-11/200228-serology-testing-covid.pdf |website=Johns Hopkins Center for Health Security}}</ref> Molecular tests for viral presence through its molecular components are used to diagnose individual cases and to allow public health authorities to trace and contain outbreaks. Antibody tests (serology immunoassays) instead show whether someone once had the disease.<ref name=":11">{{cite journal | vauthors = Kubina R, Dziedzic A | title = Molecular and Serological Tests for COVID-19 a Comparative Review of SARS-CoV-2 Coronavirus Laboratory and Point-of-Care Diagnostics | journal = Diagnostics | volume = 10 | issue = 6 | page = 434 | date = June 2020 | pmid = 32604919 | pmc = 7345211 | doi = 10.3390/diagnostics10060434 | doi-access = free }}</ref> They are less useful for diagnosing current infections because antibodies may not develop for weeks after infection.<ref name="CDC-antibody-test">{{cite web |date=2020 |title=Test for Past Infection |url=https://www.cdc.gov/coronavirus/2019-ncov/testing/serology-overview.html |url-status=live |archive-url=https://web.archive.org/web/20200516235606/https://www.cdc.gov/coronavirus/2019-ncov/testing/serology-overview.html |archive-date=16 May 2020 |access-date=19 May 2020 |website=U.S. [[Centers for Disease Control and Prevention]] (CDC) |quote=Antibody blood tests, also called antibody tests, check your blood by looking for antibodies, which show if you had a previous infection with the virus. Depending on when someone was infected and the timing of the test, the test may not find antibodies in someone with a current COVID-19 infection.}}</ref> It is used to assess disease prevalence, which aids the estimation of the [[Case fatality rate|infection fatality rate]].<ref name="JAMA_antibody" />

      Individual jurisdictions have adopted varied testing protocols, including whom to test, how often to test, analysis protocols, sample collection and the uses of test results.<ref name="Bund">{{cite news | vauthors = Brotschi M |date=7 March 2020 |title=Bund sucht nicht mehr alle Corona-Infizierten |language=de |trans-title=The federal government is no longer looking for all those infected with corona |work=Der Bund |url=https://www.derbund.ch/schweiz/standard/bund-sucht-nicht-mehr-alle-coronainfizierten/story/20389898 |url-status=live |access-date=9 June 2020 |archive-url= https://web.archive.org/web/20200329022230/https://www.derbund.ch/schweiz/standard/bund-sucht-nicht-mehr-alle-coronainfizierten/story/20389898 |archive-date=29 March 2020 |issn=0774-6156}}</ref><ref>{{cite web | vauthors = Van Beusekom M |date=24 March 2020 |title=Italian doctors note high COVID-19 death rate, urge action |url=https://www.cidrap.umn.edu/news-perspective/2020/03/italian-doctors-note-high-covid-19-death-rate-urge-action |url-status=live |archive-url= https://web.archive.org/web/20200609100817/https://www.cidrap.umn.edu/news-perspective/2020/03/italian-doctors-note-high-covid-19-death-rate-urge-action |archive-date=9 June 2020 |access-date=9 June 2020 |website=CIDRAP News}}</ref><ref name="Iceland screening">{{cite web | vauthors = Otmani M |date=22 March 2020 |title=COVID-19: First results of the voluntary screening in Iceland |url=https://nordiclifescience.org/covid-19-first-results-of-the-voluntary-screening-in-iceland/ |url-status=live |archive-url=https://web.archive.org/web/20200329063136/https://nordiclifescience.org/covid-19-first-results-of-the-voluntary-screening-in-iceland/ |archive-date=29 March 2020 |access-date=9 June 2020 |website=Nordic Life Science}}</ref> This variation has likely significantly impacted reported statistics, including case and test numbers, case fatality rates and case demographics.<ref name="Ward_2020">{{cite journal | vauthors = Ward D | title = Sampling bias: explaining wide variations in COVID-19 case fatality rates. | date = April 2020 | journal = Preprint | publisher = WardEnvironment | location = Bern, Switzerland | doi = 10.13140/RG.2.2.24953.62564/1 }}</ref><ref>{{cite web | vauthors = Henriques M |date=2 April 2020 |title=Coronavirus: Why death and mortality rates differ |url=https://www.bbc.com/future/article/20200401-coronavirus-why-death-and-mortality-rates-differ |url-status=live |archive-url=https://web.archive.org/web/20200402012037/https://www.bbc.com/future/article/20200401-coronavirus-why-death-and-mortality-rates-differ |archive-date=2 April 2020 |access-date=9 June 2020 |website=BBC News}}</ref><ref name=":7">{{cite report |title=Sampling Bias: Explaining Variations in Age Distributions of COVID-19 Cases | vauthors = Ward D |date=May 2020 |publisher=WardEnvironment |doi=10.13140/RG.2.2.27321.19047/2 |work=Technical Report}}</ref><ref>{{cite magazine |title=Why More Younger People Are Testing Positive for COVID-19 |url=https://time.com/5858593/younger-people-covid-19/ |url-status=live |archive-url=https://web.archive.org/web/20210226120827/https://time.com/5858593/younger-people-covid-19/ |archive-date=26 February 2021 |access-date=18 August 2020 |magazine=Time}}</ref> Because SARS-CoV-2 transmission occurs days after exposure (and before onset of symptoms), there is an urgent need for frequent surveillance and rapid availability of results.<ref name="pmid32997903">{{cite journal | vauthors = Mina MJ, Parker R, Larremore DB | title = Rethinking Covid-19 Test Sensitivity - A Strategy for Containment | journal = The New England Journal of Medicine | volume = 383 | issue = 22 | page = e120 | date = November 2020 | pmid = 32997903 | doi = 10.1056/NEJMp2025631 | s2cid = 222158786 | doi-access = free }}</ref>

      Test analysis is often performed in [[automated analyzer|automated]], [[laboratory automation|high-throughput]], [[medical laboratory|medical laboratories]] by [[medical laboratory scientist]]s. [[Rapid antigen test|Rapid self-tests]] and [[point-of-care testing]] are also available and can offer a faster and less expensive method to test for the virus although with a lower accuracy.<ref name=":9">{{cite web |title=Antigen-detection in the diagnosis of SARS-CoV-2 infection |url=https://www.who.int/publications-detail-redirect/antigen-detection-in-the-diagnosis-of-sars-cov-2infection-using-rapid-immunoassays |access-date=12 July 2022 |website=[[World Health Organization]] (WHO) |archive-date=5 May 2021 |archive-url=https://web.archive.org/web/20210505135031/https://www.who.int/publications/i/item/antigen-detection-in-the-diagnosis-of-sars-cov-2infection-using-rapid-immunoassays |url-status=live }}</ref><ref name=":19">{{cite web |last=CDC |date=11 February 2020 |title=Guidance for Antigen Testing for SARS-CoV-2 for Healthcare Providers Testing Individuals in the Community |url=https://www.cdc.gov/coronavirus/2019-ncov/lab/resources/antigen-tests-guidelines.html |access-date=12 July 2022 |website=U.S. [[Centers for Disease Control and Prevention]] (CDC) }}</ref>

      {{Toclimit|3}}

      ==Methods==

      [[File:Covid-19-Time-Course-05.gif|thumb|upright=1.6|Explanation of the underlying pathophysiology pertaining to diagnosis of COVID-19<ref>{{cite web |date=6 May 2020 |title=Siouxsie Wiles & Toby Morris: What we don't know about Covid-19 |url=https://thespinoff.co.nz/society/06-05-2020/siouxsie-wiles-toby-morris-what-we-dont-know-about-covid-19/ |url-status=live |archive-url=https://web.archive.org/web/20200822030102/https://thespinoff.co.nz/society/06-05-2020/siouxsie-wiles-toby-morris-what-we-dont-know-about-covid-19/ |archive-date=22 August 2020 |access-date=6 May 2020 |website=The Spinoff}}</ref>]]

      Positive viral tests indicate a current infection, while positive antibody tests indicate a prior infection.<ref name="CDC testing" /> Other techniques include a [[CT scan]], checking for elevated body temperature, checking for low blood oxygen level, and [[Detection dogs|detection by trained dogs]].<ref name="ap-helsinki-vantaa-detection-dogs">{{cite news | vauthors = Tanner T |date=23 September 2020 |title=Finland deploys coronavirus-sniffing dogs at main airport |work=[[Associated Press]] |location=[[Helsinki]] |url=https://apnews.com/article/virus-outbreak-animals-helsinki-finland-dogs-c93538b825d86908a480b2af6d36843b |url-status=live |access-date=28 October 2020 |archive-url=https://web.archive.org/web/20201027025720/https://apnews.com/article/virus-outbreak-animals-helsinki-finland-dogs-c93538b825d86908a480b2af6d36843b |archive-date=27 October 2020}}</ref><ref name="jtm-detection-dogs">{{cite journal | vauthors = Jones RT, Guest C, Lindsay SW, Kleinschmidt I, Bradley J, Dewhirst S, Last A, Logan JG | title = Could bio-detection dogs be used to limit the spread of COVID-19 by travellers? | journal = Journal of Travel Medicine | volume = 27 | issue = 8 | date = December 2020 | article-number = taaa131 | pmid = 32789466 | pmc = 7454791 | doi = 10.1093/jtm/taaa131 }}</ref><ref name="bmc-detection-dogs">{{cite journal | vauthors = Jendrny P, Schulz C, Twele F, Meller S, von Köckritz-Blickwede M, Osterhaus AD, Ebbers J, Pilchová V, Pink I, Welte T, Manns MP, Fathi A, Ernst C, Addo MM, Schalke E, Volk HA | title = Scent dog identification of samples from COVID-19 patients - a pilot study | journal = BMC Infectious Diseases | volume = 20 | issue = 1 | article-number = 536 | date = July 2020 | pmid = 32703188 | pmc = 7376324 | doi = 10.1186/s12879-020-05281-3 | doi-access = free }}</ref>

      ===Detection of the virus===
      Detection of the virus is usually done either by looking for the virus's inner [[RNA]], or pieces of protein on the outside of the virus. Tests that look for the viral [[antigen]]s (parts of the virus) are called ''antigen tests''.

      There are multiple types of tests that look for the virus by detecting the presence of the virus's RNA. These are called ''nucleic acid'' or ''molecular'' tests, after [[molecular biology]]. {{As of|2021}}, the most common form of molecular test is the reverse transcription polymerase chain reaction (RT-PCR) test.<ref name=":13">{{cite journal | vauthors = Habibzadeh P, Mofatteh M, Silawi M, Ghavami S, Faghihi MA | title = Molecular diagnostic assays for COVID-19: an overview | journal = Critical Reviews in Clinical Laboratory Sciences | volume = 58 | issue = 6 | pages = 385–398 | date = September 2021 | pmid = 33595397 | pmc = 7898297 | doi = 10.1080/10408363.2021.1884640 }}</ref> Other methods used in molecular tests include [[CRISPR gene editing|CRISPR]], [[Nucleic acid amplification test|isothermal nucleic acid amplification]], [[digital polymerase chain reaction]], [[Microarray analysis techniques|microarray analysis]], and [[Massive parallel sequencing|next-generation sequencing]].<ref name=":13" />

      ====Reverse transcription polymerase chain reaction (RT-PCR) test====
      [[Polymerase chain reaction]] (PCR) is a process that [[DNA replication|amplifies]] (replicates) a small, well-defined segment of [[DNA]] many hundreds of thousands of times, creating enough of it for analysis. Test samples are treated with certain chemicals<ref>{{cite web |title=RNA Extraction |url=https://www.assaygenie.com/rna-extraction-for-covid-19-testing |url-status=live |archive-url=https://web.archive.org/web/20200506160731/https://www.assaygenie.com/rna-extraction-for-covid-19-testing |archive-date=6 May 2020 |access-date=7 May 2020 |publisher=AssayGenie}}</ref><ref name=iaea_rt-pcr/> that allow DNA to be extracted. [[Reverse transcriptase|Reverse transcription]] converts RNA into DNA.

      [[Reverse transcription polymerase chain reaction]] (RT-PCR) first uses reverse transcription to obtain DNA, followed by PCR to amplify that DNA, creating enough to be analyzed.<ref name="iaea_rt-pcr">{{cite web |date=27 March 2020 |title=How is the COVID-19 Virus Detected using Real Time RT-PCR? |url=https://www.iaea.org/newscenter/news/how-is-the-covid-19-virus-detected-using-real-time-rt-pcr |url-status=live |archive-url=https://web.archive.org/web/20200501180025/https://www.iaea.org/newscenter/news/how-is-the-covid-19-virus-detected-using-real-time-rt-pcr |archive-date=1 May 2020 |access-date=5 May 2020 |publisher=IAEA}}</ref> RT-PCR can thereby detect [[SARS-CoV-2]], which contains only RNA. The RT-PCR process generally requires a few hours.<ref name="globenewswire1977226">{{cite press release |date=30 January 2020 |title=Curetis Group Company Ares Genetics and BGI Group Collaborate to Offer Next-Generation Sequencing and PCR-based Coronavirus (2019-nCoV) Testing in Europe |url=https://www.globenewswire.com/news-release/2020/01/30/1977226/0/en/Curetis-Group-Company-Ares-Genetics-and-BGI-Group-Collaborate-to-Offer-Next-Generation-Sequencing-and-PCR-based-Coronavirus-2019-nCoV-Testing-in-Europe.html |url-status=live |archive-url=https://web.archive.org/web/20200131201626/https://www.globenewswire.com/news-release/2020/01/30/1977226/0/en/Curetis-Group-Company-Ares-Genetics-and-BGI-Group-Collaborate-to-Offer-Next-Generation-Sequencing-and-PCR-based-Coronavirus-2019-nCoV-Testing-in-Europe.html |archive-date=31 January 2020 |access-date=1 February 2020 |website=GlobeNewswire News Room}}</ref> These tests are also referred to as molecular or genetic assays.<ref name=":11" />

      [[Real-time polymerase chain reaction|Real-time PCR]] (qPCR)<ref name="Bustin2009" /> provides advantages including automation, higher-throughput and more reliable instrumentation. It has become the preferred method.<ref>{{cite web |date=23 September 2005 |title=Real-time reverse transcription PCR (qRT-PCR) and its potential use in clinical diagnosis |url=https://gene-quantification.de/bustin-mueller-qpcr-2005.pdf |url-status=live |archive-url=https://web.archive.org/web/20201124165553/https://gene-quantification.de/bustin-mueller-qpcr-2005.pdf |archive-date=24 November 2020 |access-date=5 May 2020 |publisher=Clinical Science}}</ref><ref>{{cite web |title=The Basics: RT-PCR |url=https://www.thermofisher.com/us/en/home/references/ambion-tech-support/rtpcr-analysis/general-articles/rt--pcr-the-basics.html |url-status=live |archive-url=https://web.archive.org/web/20200414120103/https://www.thermofisher.com/us/en/home/references/ambion-tech-support/rtpcr-analysis/general-articles/rt--pcr-the-basics.html |archive-date=14 April 2020 |access-date=5 May 2020 |publisher=ThermoFisher Scientific}}</ref>

      The combined technique has been described as real-time RT-PCR<ref name="pmid20515509">{{cite journal | vauthors = Kang XP, Jiang T, Li YQ, Lin F, Liu H, Chang GH, Zhu QY, Qin ED, Qin CF, Yang YH | title = A duplex real-time RT-PCR assay for detecting H5N1 avian influenza virus and pandemic H1N1 influenza virus | journal = Virology Journal | volume = 7 | article-number = 113 | date = June 2010 | pmid = 20515509 | pmc = 2892456 | doi = 10.1186/1743-422X-7-113 | doi-access = free }}</ref> or quantitative RT-PCR<ref name="pmid12325527">{{cite book |vauthors=Joyce C |title=RT-PCR Protocols |chapter=Quantitative RT-PCR: A Review of Current Methodologies |year=2002 |isbn=978-1-59259-283-8 |series=Methods Mol. Biol. |volume=193 |pages=83–92 |doi=10.1385/1-59259-283-X:083 |pmid=12325527}}</ref> and is sometimes abbreviated [[Reverse transcription polymerase chain reaction|qRT-PCR]],<ref name="pmid20204872">{{cite book |title=Plant Epigenetics |vauthors=Varkonyi-Gasic E, Hellens RP |chapter=QRT-PCR of Small RNAs |year=2010 |isbn=978-1-60761-645-0 |series=Methods in Molecular Biology |volume=631 |pages=109–22 |doi=10.1007/978-1-60761-646-7_10 |pmid=20204872}}</ref> rRT-PCR<ref>{{cite web |title=Accelerated Emergency Use Authorization (Eua) Summary Covid-19 Rt-Pcr Test (Laboratory Corporation of America) |url=https://www.fda.gov/media/136151/download |url-status=live |archive-url=https://web.archive.org/web/20210116143850/https://www.fda.gov/media/136151/download |archive-date=16 January 2021 |access-date=3 April 2020 |website=U.S. [[Food and Drug Administration]] (FDA) }}</ref> or RT-qPCR,<ref name="pmid20215014">{{cite journal | vauthors = Taylor S, Wakem M, Dijkman G, Alsarraj M, Nguyen M | title = A practical approach to RT-qPCR-Publishing data that conform to the MIQE guidelines | journal = Methods | volume = 50 | issue = 4 | pages = S1–S5 | date = April 2010 | pmid = 20215014 | doi = 10.1016/j.ymeth.2010.01.005 }}</ref> although sometimes RT-PCR or PCR are used. The [[Minimum Information for Publication of Quantitative Real-Time PCR Experiments]] (MIQE) guidelines propose the term ''RT-qPCR'',<ref name="Bustin2009">{{cite journal | vauthors = Bustin SA, Benes V, Garson JA, Hellemans J, Huggett J, Kubista M, Mueller R, Nolan T, Pfaffl MW, Shipley GL, Vandesompele J, Wittwer CT | title = The MIQE guidelines: minimum information for publication of quantitative real-time PCR experiments | journal = Clinical Chemistry | volume = 55 | issue = 4 | pages = 611–622 | date = April 2009 | pmid = 19246619 | doi = 10.1373/clinchem.2008.112797 | doi-access = free }}</ref> but not all authors adhere to this.

      Average [[Sensitivity and specificity|sensitivity]] for rapid molecular tests depend on the brand. For ID NOW, the average sensitivity was 73.0% with an average specificity of 99.7%; for Xpert Xpress the average sensitivity was 100% with an average specificity of 97.2%.<ref name=":2">{{Cite journal |last1=Dinnes |first1=Jacqueline |last2=Sharma |first2=Pawana |last3=Berhane |first3=Sarah |last4=van Wyk |first4=Susanna S. |last5=Nyaaba |first5=Nicholas |last6=Domen |first6=Julie |last7=Taylor |first7=Melissa |last8=Cunningham |first8=Jane |last9=Davenport |first9=Clare |last10=Dittrich |first10=Sabine |last11=Emperador |first11=Devy |last12=Hooft |first12=Lotty |last13=Leeflang |first13=Mariska Mg |last14=McInnes |first14=Matthew Df |last15=Spijker |first15=René |date=2022-07-22 |title=Rapid, point-of-care antigen tests for diagnosis of SARS-CoV-2 infection |journal=The Cochrane Database of Systematic Reviews |volume=2022 |issue=7 |article-number=CD013705 |doi=10.1002/14651858.CD013705.pub3 |issn=1469-493X |pmc=9305720 |pmid=35866452}}</ref>{{Update inline|reason=Updated version https://www.ncbi.nlm.nih.gov/pubmed/41312797|date = January 2026}}<ref name="pmid35866452">{{cite journal | vauthors = Dinnes J, Sharma P, Berhane S, van Wyk SS, Nyaaba N, Domen J, Taylor M, Cunningham J, Davenport C, Dittrich S, Emperador D, Hooft L, Leeflang MM, McInnes MD, Spijker R, Verbakel JY, Takwoingi Y, Taylor-Phillips S, Van den Bruel A, Deeks JJ | title = Rapid, point-of-care antigen tests for diagnosis of SARS-CoV-2 infection | journal = The Cochrane Database of Systematic Reviews | volume = 2022 | issue = 7 | article-number = CD013705 | date = July 2022 | pmid = 35866452 | pmc = 9305720 | doi = 10.1002/14651858.CD013705.pub3 }}</ref>{{Update inline|reason=Updated version https://www.ncbi.nlm.nih.gov/pubmed/41312797|date = January 2026}}

      In a diagnostic test, sensitivity is a measure of how well a test can identify true positives and specificity is a measure of how well a test can identify true negatives. For all testing, both diagnostic and screening, there is usually a trade-off between sensitivity and specificity, such that higher sensitivities will mean lower specificities and vice versa. [[File:PPV, NPV, Sensitivity and Specificity.svg|thumb|350x350px|Sensitivity and Specificity]] A 90% specific test will correctly identify 90% of those who are uninfected, leaving 10% with a false positive result.

      Samples can be obtained by various methods, including a [[nasopharyngeal swab]], [[sputum]] (coughed up material),<ref name="20200129cdc">{{cite web |date=29 January 2020 |title=Real-Time RT-PCR Panel for Detection 2019-nCoV |url=https://www.cdc.gov/coronavirus/2019-ncov/lab/rt-pcr-detection-instructions.html |url-status=live |archive-url=https://web.archive.org/web/20200130202031/https://www.cdc.gov/coronavirus/2019-ncov/lab/rt-pcr-detection-instructions.html |archive-date=30 January 2020 |access-date=1 February 2020 |website=U.S. [[Centers for Disease Control and Prevention]] (CDC)}}</ref> throat swabs,<ref name="chrdrosten20200326" /> deep airway material collected via [[Yankauer suction tip|suction catheter]]<ref name="chrdrosten20200326" /> or [[saliva]].<ref name=sciencenews_saliva/><ref name="nature_saliva">{{cite journal | vauthors = Xu R, Cui B, Duan X, Zhang P, Zhou X, Yuan Q | title = Saliva: potential diagnostic value and transmission of 2019-nCoV | journal = International Journal of Oral Science | volume = 12 | issue = 1 | article-number = 11 | date = April 2020 | pmid = 32300101 | pmc = 7162686 | doi = 10.1038/s41368-020-0080-z }}</ref> [[Christian Drosten|Drosten]] et al. remarked that for 2003 SARS, "from a diagnostic point of view, it is important to note that nasal and throat swabs seem less suitable for diagnosis, since these materials contain considerably less viral RNA than sputum, and the virus may escape detection if only these materials are tested."<ref name="drosten03">{{cite journal | vauthors = Drosten C, Günther S, Preiser W, van der Werf S, Brodt HR, Becker S, Rabenau H, Panning M, Kolesnikova L, Fouchier RA, Berger A, Burguière AM, Cinatl J, Eickmann M, Escriou N, Grywna K, Kramme S, Manuguerra JC, Müller S, Rickerts V, Stürmer M, Vieth S, Klenk HD, Osterhaus AD, Schmitz H, Doerr HW | title = Identification of a novel coronavirus in patients with severe acute respiratory syndrome | journal = The New England Journal of Medicine | volume = 348 | issue = 20 | pages = 1967–1976 | date = May 2003 | pmid = 12690091 | doi = 10.1056/NEJMoa030747 | doi-access = free | author-link = Christian Drosten | hdl = 1765/8447 | hdl-access = free }}</ref>

      Sensitivity of clinical samples by RT-PCR is 63% for nasal swab, 32% for pharyngeal swab, 48% for feces, 72–75% for sputum, and 93–95% for bronchoalveolar [[Therapeutic irrigation|lavage]].<ref name="pmid332875524">{{cite journal | vauthors = Ghoshal U, Vasanth S, Tejan N | title = A guide to laboratory diagnosis of Corona Virus Disease-19 for the gastroenterologists | journal = Indian Journal of Gastroenterology | volume = 39 | issue = 3 | pages = 236–242 | date = June 2020 | pmid = 32875524 | pmc = 7462729 | doi = 10.1007/s12664-020-01082-3 }}</ref>

      The likelihood of detecting the virus depends on collection method and how much time has passed since infection. According to Drosten tests performed with throat swabs are reliable only in the first week. Thereafter the virus may abandon the throat and multiply in the lungs. In the second week, sputum or deep airways collection is preferred.<ref name="chrdrosten20200326">{{cite web | vauthors = Drosten C |date=26 March 2020 |title=Coronavirus-Update Folge 22 |trans-title=Coronavirus update episode 22 |url=https://www.ndr.de/nachrichten/info/coronaskript146.pdf |url-status=live |archive-url=https://web.archive.org/web/20200331101408/https://www.ndr.de/nachrichten/info/coronaskript146.pdf |archive-date=31 March 2020 |access-date=2 April 2020 |website=NDR}}</ref>

      Collecting saliva may be as effective as nasal and throat swabs,<ref name="sciencenews_saliva">{{cite news |date=17 April 2020 |title=Here's where things stand on COVID-19 tests in the U.S. |newspaper=Science News |url=https://www.sciencenews.org/article/coronavirus-covid-19-where-things-stand-tests-testing-united-states |url-status=live |archive-url=https://web.archive.org/web/20200428162456/https://www.sciencenews.org/article/coronavirus-covid-19-where-things-stand-tests-testing-united-states |archive-date=28 April 2020 |access-date=6 May 2020 |publisher=ScienceNews}}</ref> although this is not certain.<ref>{{cite web |date=16 April 2020 |title=COVID-19 saliva tests: What is the benefit? |url=https://newsnetwork.mayoclinic.org/discussion/covid-19-saliva-tests-what-is-the-benefit/ |url-status=live |archive-url=https://web.archive.org/web/20200501233343/https://newsnetwork.mayoclinic.org/discussion/covid-19-saliva-tests-what-is-the-benefit/ |archive-date=1 May 2020 |access-date=6 May 2020 |publisher=Mayo Clinic}}</ref><ref name="nature_saliva" /> Sampling saliva may reduce the risk for health care professionals by eliminating close physical interaction.<ref name="Rutgers_saliva">{{cite web |date=13 April 2020 |title=New Rutgers Saliva Test for Coronavirus Gets FDA Approval |url=https://www.rutgers.edu/news/new-rutgers-saliva-test-coronavirus-gets-fda-approval |url-status=live |archive-url=https://web.archive.org/web/20200430140603/https://www.rutgers.edu/news/new-rutgers-saliva-test-coronavirus-gets-fda-approval |archive-date=30 April 2020 |access-date=1 May 2020 |publisher=Rutgers.edu}}</ref> It is also more comfortable for the patient.<ref name="cnn_saliva">{{cite web |date=14 April 2020 |title=FDA authorizes Covid-19 saliva test for emergency use |url=https://www.cnn.com/2020/04/14/health/coronavirus-test-saliva-fda-emergency-use-bn/index.html |url-status=live |archive-url=https://web.archive.org/web/20200427054017/https://www.cnn.com/2020/04/14/health/coronavirus-test-saliva-fda-emergency-use-bn/index.html |archive-date=27 April 2020 |access-date=1 May 2020 |publisher=CNN}}</ref> Quarantined people can collect their own samples.<ref name="Rutgers_saliva" /> A saliva test's diagnostic value depends on sample site (deep throat, oral cavity, or salivary glands).<ref name="nature_saliva" /> Some studies have found that saliva yielded greater sensitivity and consistency when compared with swab samples.<ref name="pmid32857487">{{cite journal | vauthors = Wyllie AL, Fournier J, Casanovas-Massana A, Campbell M, Tokuyama M, Vijayakumar P, Warren JL, Geng B, Muenker MC, Moore AJ, Vogels CB, Petrone ME, Ott IM, Lu P, Venkataraman A, Lu-Culligan A, Klein J, Earnest R, Simonov M, Datta R, Handoko R, Naushad N, Sewanan LR, Valdez J, White EB, Lapidus S, Kalinich CC, Jiang X, Kim DJ, Kudo E, Linehan M, Mao T, Moriyama M, Oh JE, Park A, Silva J, Song E, Takahashi T, Taura M, Weizman OE, Wong P, Yang Y, Bermejo S, Odio CD, Omer SB, Dela Cruz CS, Farhadian S, Martinello RA, Iwasaki A, Grubaugh ND, Ko AI | title = Saliva or Nasopharyngeal Swab Specimens for Detection of SARS-CoV-2 | journal = The New England Journal of Medicine | volume = 383 | issue = 13 | pages = 1283–1286 | date = September 2020 | pmid = 32857487 | pmc = 7484747 | doi = 10.1056/NEJMc2016359 | s2cid = 221358482 | author-link = Anne Wyllie }}</ref><ref name="pmid32855317">{{cite journal | vauthors = Service RF | title = Spit shines for easier coronavirus testing | journal = Science | volume = 369 | issue = 6507 | pages = 1041–1042 | date = August 2020 | pmid = 32855317 | doi = 10.1126/science.369.6507.1041 | bibcode = 2020Sci...369.1041S | s2cid = 221358939 | doi-access = free }}</ref><ref>{{cite web |date=29 April 2020 |title=Yale University School of Public Health finds saliva samples promising alternative to nasopharyngeal swab |url=https://www.merckmanuals.com/home/resourcespages/select-covid-19-news |url-status=live |archive-url=https://web.archive.org/web/20200528073817/https://www.merckmanuals.com/home/resourcespages/select-covid-19-news |archive-date=28 May 2020 |access-date=6 April 2020 |publisher=Merck Manual}}</ref>

      On 15 August 2020, the US FDA granted an emergency use authorization for a saliva test developed at Yale University that gives results in hours.<ref>{{cite web |title=FDA gives emergency approval to 'game changer' COVID-19 saliva test |website=[[The Washington Times]] |url=https://www.washingtontimes.com/news/2020/aug/15/fda-gives-emergency-approval-game-changer-covid-19/ |url-status=live |archive-url=https://web.archive.org/web/20200816001007/https://www.washingtontimes.com/news/2020/aug/15/fda-gives-emergency-approval-game-changer-covid-19/ |archive-date=16 August 2020 |access-date=15 August 2020}}</ref><ref>{{cite press release |title=Coronavirus (COVID-19) Update: FDA Issues Emergency Use Authorization to Yale School of Public Health for SalivaDirect, Which Uses a New Method of Saliva Sample Processing |date=15 August 2020 |url=https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-issues-emergency-use-authorization-yale-school-public-health |access-date=6 November 2020 |url-status=dead |archive-url=https://web.archive.org/web/20200816053946/https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-issues-emergency-use-authorization-yale-school-public-health |archive-date=16 August 2020 |website=U.S. [[Food and Drug Administration]] (FDA)}}</ref>

      On 4 January 2021, the US FDA issued an alert about the risk of false results, particularly false negative results, with the [[Curative (company)|Curative]] SARS-Cov-2 Assay real-time RT-PCR test.<ref name="FDA Curative">{{Source-attribution|sentence=yes|{{cite web |date=4 January 2021 |title=Risk of False Results with the Curative SARS-Cov-2 Test for COVID-19 |url=https://www.fda.gov/medical-devices/safety-communications/risk-false-results-curative-sars-cov-2-test-covid-19-fda-safety-communication |url-status=dead |archive-url=https://web.archive.org/web/20210104191302/https://www.fda.gov/medical-devices/safety-communications/risk-false-results-curative-sars-cov-2-test-covid-19-fda-safety-communication |archive-date=4 January 2021 |access-date=4 January 2021 |website=U.S. [[Food and Drug Administration]] (FDA)}} }}</ref>

      Viral burden measured in [[upper respiratory]] specimens declines after symptom onset.<ref>{{cite web |date=30 April 2020 |title=Symptom-Based Strategy to Discontinue Isolation for Persons with COVID-19 |url=https://www.cdc.gov/coronavirus/2019-ncov/hcp/duration-isolation.html |url-status=live |archive-url=https://web.archive.org/web/20210606190101/https://www.cdc.gov/coronavirus/2019-ncov/community/strategy-discontinue-isolation.html |archive-date=6 June 2021 |access-date=28 August 2021 |website=U.S. [[Centers for Disease Control and Prevention]] (CDC) |ref={{harvid|Symptom-Based Strategy to Discontinue Isolation for Persons with COVID-19|2020}}}} referenced
      * CDC unpublished data
      * {{cite journal | title = Clinical and virologic characteristics of the first 12 patients with coronavirus disease 2019 (COVID-19) in the United States | journal = Nature Medicine | volume = 26 | issue = 6 | pages = 861–868 | date = June 2020 | pmid = 32327757 | doi = 10.1038/s41591-020-0877-5 | doi-access = free | author = ((COVID-19 Investigation Team)) | pmc = 12755114 }}
      * {{cite journal | vauthors = Young BE, Ong SW, Kalimuddin S, Low JG, Tan SY, Loh J, Ng OT, Marimuthu K, Ang LW, Mak TM, Lau SK, Anderson DE, Chan KS, Tan TY, Ng TY, Cui L, Said Z, Kurupatham L, Chen MI, Chan M, Vasoo S, Wang LF, Tan BH, Lin RT, Lee VJ, Leo YS, Lye DC | title = Epidemiologic Features and Clinical Course of Patients Infected With SARS-CoV-2 in Singapore | journal = JAMA | volume = 323 | issue = 15 | pages = 1488–1494 | date = April 2020 | pmid = 32125362 | pmc = 7054855 | doi = 10.1001/jama.2020.3204 | bibcode = 2020JAMA..323.1488Y }}
      * {{cite journal | vauthors = Zou L, Ruan F, Huang M, Liang L, Huang H, Hong Z, Yu J, Kang M, Song Y, Xia J, Guo Q, Song T, He J, Yen HL, Peiris M, Wu J | title = SARS-CoV-2 Viral Load in Upper Respiratory Specimens of Infected Patients | journal = The New England Journal of Medicine | volume = 382 | issue = 12 | pages = 1177–1179 | date = March 2020 | pmid = 32074444 | pmc = 7121626 | doi = 10.1056/NEJMc2001737 | ref = none }}
      * {{cite journal | vauthors = Wölfel R, Corman VM, Guggemos W, Seilmaier M, Zange S, Müller MA, Niemeyer D, Jones TC, Vollmar P, Rothe C, Hoelscher M, Bleicker T, Brünink S, Schneider J, Ehmann R, Zwirglmaier K, Drosten C, Wendtner C | title = Virological assessment of hospitalized patients with COVID-2019 | journal = Nature | volume = 581 | issue = 7809 | pages = 465–469 | date = May 2020 | pmid = 32235945 | doi = 10.1038/s41586-020-2196-x | doi-access = free | bibcode = 2020Natur.581..465W }}</ref> Following recovery, many patients no longer have detectable viral RNA in upper respiratory specimens. Among those who do, RNA concentrations three days following recovery are generally below the range in which replication-competent virus has been reliably isolated.<ref>{{harvp|Symptom-Based Strategy to Discontinue Isolation for Persons with COVID-19|2020}} referenced
      * CDC unpublished data
      * {{harvp|Young|Ong|Kalimuddin|Low|2020}}</ref> No clear correlation has been described between length of illness and duration of post-recovery shedding of viral RNA in upper respiratory specimens.<ref>{{harvp|Symptom-Based Strategy to Discontinue Isolation for Persons with COVID-19|2020}} referenced
      * CDC unpublished data
      * {{cite journal | title = Clinical and virologic characteristics of the first 12 patients with coronavirus disease 2019 (COVID-19) in the United States | journal = Nature Medicine | volume = 26 | issue = 6 | pages = 861–868 | date = June 2020 | pmid = 32327757 | doi = 10.1038/s41591-020-0877-5 | doi-access = free | author = ((COVID-19 Investigation Team)) | pmc = 12755114 }}</ref>

