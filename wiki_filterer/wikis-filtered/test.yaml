    source: |-
      '''Validity of intelligence''' refers to the extent of the practical validity of ''g'', or general intelligence, as a predictor of educational, economic, and social outcomes is the subject of ongoing debate.<ref>{{Cite journal |last1=Kell |first1=Harrison J. |last2=Lang |first2=Jonas W. B. |date=September 2018 |title=The Great Debate: General Ability and Specific Abilities in the Prediction of Important Outcomes |journal=Journal of Intelligence |volume=6 |issue=3 |page=39 |doi=10.3390/jintelligence6030039 |pmc=6480721 |pmid=31162466 |doi-access=free}}</ref> Some researchers have argued that it is more far-ranging and universal than any other known psychological variable,<ref>{{cite journal |last1=Neubauer |first1=Aljoscha C. |last2=Opriessnig |first2=Sylvia |date=January 2014 |title=The Development of Talent and Excellence - Do Not Dismiss Psychometric Intelligence, the (Potentially) Most Powerful Predictor |url=https://www.researchgate.net/publication/290319779 |journal=Talent Development & Excellence |volume=6 |issue=2 |pages=1–15}}</ref> and that the validity of ''g'' increases as the complexity of the measured task increases.<ref name="Jensen 1998, 270">Jensen 1998, 270</ref><ref>Gottfredson 2002</ref> Others have argued that tests of specific abilities outperform [[g factor (psychometrics)|''g'' factor]] in analyses fitted to certain real-world situations.<ref>{{Cite journal |last=Coyle |first=Thomas R. |date=September 2018 |title=Non-g Factors Predict Educational and Occupational Criteria: More than g |journal=Journal of Intelligence |volume=6 |issue=3 |page=43 |doi=10.3390/jintelligence6030043 |pmc=6480787 |pmid=31162470 |doi-access=free}}</ref><ref>{{Cite journal |last1=Ziegler |first1=Matthias |last2=Peikert |first2=Aaron |date=September 2018 |title=How Specific Abilities Might Throw 'g' a Curve: An Idea on How to Capitalize on the Predictive Validity of Specific Cognitive Abilities |journal=Journal of Intelligence |volume=6 |issue=3 |page=41 |doi=10.3390/jintelligence6030041 |pmc=6480727 |pmid=31162468 |doi-access=free}}</ref><ref>{{Cite journal |last1=Kell |first1=Harrison J. |last2=Lang |first2=Jonas W. B. |date=April 2017 |title=Specific Abilities in the Workplace: More Important Than g? |journal=Journal of Intelligence |volume=5 |issue=2 |page=13 |doi=10.3390/jintelligence5020013 |pmc=6526462 |pmid=31162404 |doi-access=free}}</ref>

      A test's practical validity is measured by its correlation with performance on some criterion external to the test, such as college grade-point average, or a rating of job performance. The correlation between test scores and a measure of some criterion is called the ''validity coefficient''. One way to interpret a validity coefficient is to square it to obtain the [[Coefficient of determination|variance accounted]] by the test. For example, a validity coefficient of .30 corresponds to 9 percent of variance explained. This approach has, however, been criticized as misleading and uninformative, and several alternatives have been proposed. One arguably more interpretable approach is to look at the percentage of test takers in each test score [[wiktionary:quintile|quintile]] who meet some agreed-upon standard of success. For example, if the correlation between test scores and performance is .30, the expectation is that 67 percent of those in the top quintile will be above-average performers, compared to 33 percent of those in the bottom quintile.<ref name="sackett2008">Sackett et al. 2008</ref><ref>Jensen 1998, 272, 301</ref>

      == Academic achievement ==
      The predictive validity of ''g'' is most conspicuous in the domain of scholastic performance. This is apparently because ''g'' is closely linked to the ability to learn novel material and understand concepts and meanings.<ref name="Jensen 1998, 270" />

      In elementary school, the correlation between [[Intelligence quotient|IQ]] and grades and achievement scores is between .60 and .70. At more advanced educational levels, more students from the lower end of the IQ distribution drop out, which restricts the range of IQs and results in lower validity coefficients. In high school, college, and graduate school the validity coefficients are .50–.60, .40–.50, and .30–.40, respectively. The ''g'' loadings of IQ scores are high, but it is possible that some of the validity of IQ in predicting scholastic achievement is attributable to factors measured by IQ independent of ''g''. According to research by [[Robert L. Thorndike]], 80 to 90 percent of the ''predictable'' variance in scholastic performance is due to ''g'', with the rest attributed to non-''g'' factors measured by IQ and other tests.<ref>Jensen 1998, 279–280</ref>

      Achievement test scores are more highly correlated with IQ than school grades. This may be because grades are more influenced by the teacher's idiosyncratic perceptions of the student.<ref>Jensen 1998, 279</ref> In a longitudinal English study, ''g'' scores measured at age 11 correlated with all the 25 subject tests of the national [[GCSE]] examination taken at age 16. The correlations ranged from .77 for the mathematics test to .42 for the art test. The correlation between ''g'' and a general educational factor computed from the GCSE tests was .81.<ref name="brody2006">Brody 2006</ref>

      Research suggests that the [[SAT]], widely used in college admissions, is primarily a measure of ''g''. A correlation of .82 has been found between ''g'' scores computed from an IQ test battery and SAT scores. In a study of 165,000 students at 41 U.S. colleges, SAT scores were found to be correlated at .47 with first-year college grade-point average after correcting for range restriction in SAT scores (the correlation rises to .55 when course difficulty is held constant, i.e., if all students attended the same set of classes).<ref name="sackett2008" /><ref>Frey & Detterman 2004</ref>

      == Job attainment ==
      There is a high correlation of .90 to .95 between the prestige rankings of occupations, as rated by the general population, and the ''average'' general intelligence scores of people employed in each occupation. At the level of individual employees, the association between job prestige and ''g'' is lower – one large U.S. study reported a correlation of .65 (.72 [[Correction for attenuation|corrected for attenuation]]). Mean level of ''g'' thus increases with perceived job prestige. It has also been found that the [[Statistical dispersion|dispersion]] of general intelligence scores is smaller in more prestigious occupations than in lower level occupations, suggesting that higher level occupations have minimum ''g'' requirements.<ref name="s&h">Schmidt & Hunter 2004</ref><ref>Jensen 1998, 292–293</ref>

      == Job performance ==
      Research indicates that tests of ''g'' are the best single predictors of job performance, with an average validity coefficient of .55 across several meta-analyses of studies based on supervisor ratings and job samples. The average meta-analytic validity coefficient for performance in job ''training'' is .63.<ref>Schmidt & Hunter 2004. These validity coefficients have been corrected for measurement error in the dependent variable (i.e., job or training performance) and for range restriction but not for measurement error in the independent variable (i.e., measures of ''g'').</ref> The validity of ''g'' in the highest complexity jobs (professional, scientific, and upper management jobs) has been found to be greater than in the lowest complexity jobs, but ''g'' has predictive validity even for the simplest jobs. Research also shows that specific aptitude tests tailored for each job provide little or no increase in predictive validity over tests of general intelligence. It is believed that ''g'' affects job performance mainly by facilitating the acquisition of job-related knowledge. The predictive validity of ''g'' is greater than that of work experience, and increased experience on the job does not decrease the validity of ''g''.<ref name="Jensen 1998, 270" /><ref name="s&h" />

      In a 2011 meta-analysis, researchers found that general cognitive ability (GCA) predicted job performance better than personality ([[Five factor model]]) and three streams of [[emotional intelligence]]. They examined the relative importance of these constructs on predicting job performance and found that cognitive ability explained most of the variance in job performance.<ref>{{Cite journal |last1=O'Boyle Jr. |first1=E. H. |last2=Humphrey |first2=R. H. |last3=Pollack |first3=J. M. |last4=Hawver |first4=T. H. |last5=Story |first5=P. A. |date=2011 |title=The relation between emotional intelligence and job performance: A meta-analysis |journal=Journal of Organizational Behavior |volume=32 |issue=5 |pages=788–818 |doi=10.1002/job.714 |s2cid=6010387 |doi-access=free}}</ref> Other studies suggested that GCA and [[emotional intelligence]] have a linear independent and complementary contribution to job performance. Côté and Miners (2015)<ref>{{Cite journal |last1=Côté |first1=Stéphane |last2=Miners |first2=Christopher |date=2006 |title=Emotional Intelligence, Cognitive Intelligence and Job Performance |journal=Administrative Science Quarterly |volume=51 |pages=1–28 |doi=10.2189/asqu.51.1.1 |s2cid=142971341}}</ref> found that these constructs are interrelated when assessing their relationship with two aspects of job performance: [[Organizational citizenship behavior|organisational citizenship behaviour]] (OCB) and task performance. [[Emotional intelligence]] is a better predictor of task performance and OCB when GCA is low and vice versa. For instance, an employee with low GCA will compensate his/her task performance and OCB, if [[emotional intelligence]] is high.

      Although these compensatory effects favour [[emotional intelligence]], GCA still remains as the best predictor of job performance. Several researchers have studied the correlation between GCA and job performance among different job positions. For instance, Ghiselli (1973)<ref name=":0">{{Cite journal |last=Ghiselli |first=E. E. |date=1973 |title=The validity of aptitude tests in personnel selection |journal=Personnel Psychology |volume=26 |issue=4 |pages=461–477 |doi=10.1111/j.1744-6570.1973.tb01150.x}}</ref> found that salespersons had a higher correlation than sales clerk. The former obtained a correlation of 0.61 for GCA, 0.40 for perceptual ability and 0.29 for psychomotor abilities; whereas sales clerk obtained a correlation of 0.27 for GCA, 0.22 for perceptual ability and 0.17 for psychomotor abilities.<ref name=":1">{{Cite journal |last1=Vinchur |first1=Andrew J. |last2=Schippmann |first2=Jeffery S. |last3=S. |first3=Fred |last4=Switzer |first4=III |last5=Roth |first5=Philip L. |year=1998 |title=A meta-analytic review of predictors of job performance for salespeople. |journal=Journal of Applied Psychology |volume=83 |issue=4 |pages=586–597 |doi=10.1037/0021-9010.83.4.586 |s2cid=19093290}}</ref> Other studies compared GCA – job performance correlation between jobs of different complexity. Hunter and Hunter (1984)<ref>{{Cite journal |last1=Hunter |first1=John E. |last2=Hunter |first2=Ronda F. |year=1984 |title=Validity and utility of alternative predictors of job performance. |journal=Psychological Bulletin |language=en-US |volume=96 |issue=1 |pages=72–98 |doi=10.1037/0033-2909.96.1.72 |s2cid=26858912}}</ref> developed a meta-analysis with over 400 studies and found that this correlation was higher for jobs of high complexity (0.57). Followed by jobs of medium complexity (0.51) and low complexity (0.38).

      Job performance is measured by objective rating performance and subjective ratings. Although the former is better than subjective ratings, most of studies in job performance and GCA have been based on supervisor performance ratings. This rating criterion is considered problematic and unreliable, mainly because of its difficulty to define what is a good and bad performance. Rating of supervisors tends to be subjective and inconsistent among employees.<ref>{{Cite journal |last=Gottfredson |first=L. S. |date=1991 |title=The evaluation of alternative measures of job performance |journal=Performance Assessment for the Workplace |pages=75–126}}</ref> Additionally, supervisor rating of job performance is influenced by different factors, such as [[halo effect]],<ref>{{Cite journal |last1=Murphy |first1=Kevin R. |last2=Balzer |first2=William K. |year=1986 |title=Systematic distortions in memory-based behavior ratings and performance evaluations: Consequences for rating accuracy. |journal=Journal of Applied Psychology |volume=71 |issue=1 |pages=39–44 |doi=10.1037/0021-9010.71.1.39}}</ref> [[facial attractiveness]],<ref>{{Cite journal |last1=Hosoda |first1=Megumi |last2=Stone-Romero |first2=Eugene F. |last3=Coats |first3=Gwen |date=1 June 2003 |title=The Effects of Physical Attractiveness on Job-Related Outcomes: A Meta-Analysis of Experimental Studies |journal=Personnel Psychology |language=en |volume=56 |issue=2 |pages=431–462 |doi=10.1111/j.1744-6570.2003.tb00157.x |issn=1744-6570}}</ref> racial or ethnic bias, and height of employees.<ref>{{Cite journal |last1=Stauffer |first1=Joseph M. |last2=Buckley |first2=M. Ronald |year=2005 |title=The Existence and Nature of Racial Bias in Supervisory Ratings. |journal=Journal of Applied Psychology |volume=90 |issue=3 |pages=586–591 |doi=10.1037/0021-9010.90.3.586 |pmid=15910152}}</ref> However, Vinchur, Schippmann, Switzer and Roth (1998)<ref name=":1" /> found in their study with sales employees that objective sales performance had a correlation of 0.04 with GCA, while supervisor performance rating got a correlation of 0.40. These findings were surprising, considering that the main criterion for assessing these employees would be the objective sales.

      In understanding how GCA is associated job performance, several researchers concluded that GCA affects acquisition of job knowledge, which in turn improves [[job performance]]. In other words, people high in GCA are capable to learn faster and acquire more job knowledge easily, which allow them to perform better. Conversely, lack of ability to acquire job knowledge will directly affect job performance. This is due to low levels of GCA. Also, GCA has a direct effect on job performance. In a daily basis, employees are exposed constantly to challenges and problem solving tasks, which success depends solely on their GCA. These findings are discouraging for governmental entities in charge of protecting rights of workers.<ref>{{Cite journal |last=Schmidt |first=Frank L. |date=1 April 2002 |title=The Role of General Cognitive Ability and Job Performance: Why There Cannot Be a Debate |journal=Human Performance |volume=15 |issue=1–2 |pages=187–210 |doi=10.1080/08959285.2002.9668091 |issn=0895-9285 |s2cid=214650608}}</ref> Because of the high correlation of GCA on job performance, companies are hiring employees based on GCA tests scores. Inevitably, this practice is denying the opportunity to work to many people with low GCA.<ref>{{Cite journal |last1=Schmidt |first1=Frank L. |last2=Hunter |first2=John E. |year=1998 |title=The validity and utility of selection methods in personnel psychology: Practical and theoretical implications of 85 years of research findings. |journal=Psychological Bulletin |volume=124 |issue=2 |pages=262–274 |citeseerx=10.1.1.172.1733 |doi=10.1037/0033-2909.124.2.262 |s2cid=16429503}}</ref> Previous researchers have found significant differences in GCA between race / ethnicity groups. For instance, there is a debate whether studies were biased against Afro-Americans, who scored significantly lower than white Americans in GCA tests.<ref>{{Cite journal |last1=Roth |first1=Philip L. |last2=Bevier |first2=Craig A. |last3=Bobko |first3=Philip |last4=Switzer |first4=Fred S. |last5=Tyler |first5=Peggy |date=1 June 2001 |title=Ethnic Group Differences in Cognitive Ability in Employment and Educational Settings: A Meta-Analysis |journal=Personnel Psychology |language=en |volume=54 |issue=2 |pages=297–330 |citeseerx=10.1.1.372.6092 |doi=10.1111/j.1744-6570.2001.tb00094.x |issn=1744-6570}}</ref> However, findings on GCA-job performance correlation must be taken carefully. Some researchers have warned the existence of [[Artifact (error)|statistical artifacts]] related to measures of job performance and GCA test scores. For example, Viswesvaran, Ones and Schmidt (1996)<ref>{{Cite journal |last1=Viswesvaran |first1=Chockalingam |last2=Ones |first2=Deniz S. |last3=Schmidt |first3=Frank L. |year=1996 |title=Comparative analysis of the reliability of job performance ratings. |journal=Journal of Applied Psychology |volume=81 |issue=5 |pages=557–574 |doi=10.1037/0021-9010.81.5.557}}</ref> argued that is quite impossible to obtain perfect measures of job performance without incurring in any methodological error. Moreover, studies on GCA and job performance are always susceptible to range restriction, because data is gathered mostly from current employees, neglecting those that were not hired. Hence, sample comes from employees who successfully passed hiring process, including measures of GCA.<ref>{{Cite journal |last1=Hunter |first1=J. E. |last2=Schmidt |first2=F. L. |last3=Le |first3=H |date=2006 |title=Implications of direct and indirect range restriction for meta-analysis methods and findings |journal=Journal of Applied Psychology |volume=91 |issue=3 |pages=594–612 |doi=10.1037/0021-9010.91.3.594 |pmid=16737357 |s2cid=14897081}}</ref>

      == Income ==
      The correlation between income and ''g'', as measured by IQ scores, averages about .40 across studies. The correlation is higher at higher levels of education and it increases with age, stabilizing when people reach their highest career potential in middle age. Even when education, occupation and socioeconomic background are held constant, the correlation does not vanish.<ref>Jensen 1998, 568</ref>

      == Other correlates ==
      The [[g factor (psychometrics)|''g'' factor]] is reflected in many social outcomes. Many social behavior problems, such as dropping out of school, chronic welfare dependency, accident proneness, and crime, are negatively correlated with ''g'' independent of social class of origin.<ref>Jensen 1998, 271</ref> Health and mortality outcomes are also linked to ''g'', with higher childhood test scores predicting better health and mortality outcomes in adulthood (see [[Cognitive epidemiology]]).<ref>Gottfredson 2007</ref>

