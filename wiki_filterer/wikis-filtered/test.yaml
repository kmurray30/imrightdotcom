      '''Education in Japan''' is managed by the [[Ministry of Education, Culture, Sports, Science and Technology]] (MEXT) of [[Japan]]. [[Education]] is [[Compulsory education|compulsory]] at the [[Primary education|elementary]] and [[Middle school|lower secondary]] levels, for a total of nine years.<ref>{{cite web |url=http://fpcj.jp/modules/news22/index.php?page=article&storyid=18&topicid=1 |title=Foreign Press Club of Japan Fact Book |publisher=Fpcj.jp |access-date=19 January 2013 |url-status=dead |archive-url=https://web.archive.org/web/20130616132127/http://fpcj.jp/modules/news22/index.php?page=article&storyid=18&topicid=1 |archive-date=16 June 2013 }}</ref>

      The contemporary Japanese education system is a product of historical reforms dating back to the [[Meiji era|Meiji period]], which established modern educational institutions and systems.<ref>"[https://sites.rutgers.edu/rutgers-meets-japan/our-exhibition/meiji-development-modernization-of-education/ Meiji Development: Modernization of Education – Rutgers Meets Japan: Early Encounters]". Retrieved 27 May 2024.</ref> This early start of modernisation enabled Japan to provide education at all levels in the native language ([[Japanese language|Japanese]]),<ref>{{Cite web |title=JAPAN'S GROWTH AND EDUCATION 1963[CHAPTER3 2 (3) a] |url=https://www.mext.go.jp/b_menu/hakusho/html/hpae196301/hpae196301_2_038.html |access-date=2024-07-07 |website=www.mext.go.jp}}</ref> rather than using the languages of powerful countries that could have had a strong influence in the region.<ref>"[https://afe.easia.columbia.edu/special/japan_1750_meiji.htm The Meiji Restoration and Modernization | Asia for Educators | Columbia University]". ''afe.easia.columbia.edu''. Retrieved 27 May 2024.</ref> Current educational policies focus on promoting lifelong learning, advanced professional education, and internationalising higher education through initiatives such as accepting more international students, as the nation has a rapidly [[Aging of Japan|ageing and shrinking population]].<ref>"[https://www.centreforpublicimpact.org/case-study/lifelong-learning-japan Japan's Lifelong Learning Promotion Law]". ''Centre For Public Impact (CPI)''. Retrieved 27 May 2024.</ref><ref>"[https://www.gov-online.go.jp/eng/publicity/book/hlj/html/202102/202102_09_en.html Measures to Address Japan's Aging Society | February 2021 | Highlighting Japan]". ''www.gov-online.go.jp''. Retrieved 27 May 2024.</ref>

      Japanese students consistently achieve high rankings in reading, mathematics, and sciences according to [[OECD]] evaluations. In the 2018 [[Programme for International Student Assessment]] (PISA), Japan ranked eighth globally, with an average score of 520 compared to the OECD average of 488.<ref>{{cite web |title=Key Features of OECD Programme for International Student Assessment 2018 (PISA 2018) |url=https://www.nier.go.jp/kokusai/pisa/pdf/2018/01_point-eng.pdf |accessdate=September 1, 2022 |publisher=[[National Institute for Educational Policy Research]] |page=2}}</ref><ref name="OECD Student performance">{{cite web |title=Japan&nbsp;– Student performance (PISA 2015) |url=http://gpseducation.oecd.org/CountryProfile?plotter=h5&primaryCountry=JPN&treshold=10&topic=PI |accessdate=December 6, 2020 |publisher=OECD}}</ref><ref name=":2">{{cite web |year=2018 |title=PISA&nbsp;– Results in Focus - Japan |url=https://www.oecd.org/pisa/publications/PISA2018_CN_JPN.pdf |accessdate=December 6, 2020 |publisher=OECD |page=1}}</ref> Despite this relatively high performance, Japan’s spending on education as a percentage of GDP is 4.1%, below the OECD average of 5%.<ref name="OECD Student performance2">{{cite web |title=Japan&nbsp;– Student performance (PISA 2015) |url=http://gpseducation.oecd.org/CountryProfile?plotter=h5&primaryCountry=JPN&treshold=10&topic=PI |accessdate=December 6, 2020 |publisher=OECD}}</ref> However, the expenditure per student is relatively high. As of 2023, around 65% of Japanese aged 25 to 34 have attained some form of tertiary education, with a significant number holding degrees in science and engineering, fields crucial to Japan’s technology-driven economy.<ref name=":22">{{cite web |year=2018 |title=PISA&nbsp;– Results in Focus - Japan |url=https://www.oecd.org/pisa/publications/PISA2018_CN_JPN.pdf |accessdate=December 6, 2020 |publisher=OECD |page=1}}</ref> Japanese women surpass men in higher education attainment, with 59% holding university degrees compared to 52% of men. MEXT reports that 80.6% of 18-year-olds pursue higher education, with a majority attending universities.<ref name=":32">{{cite web |title=Overview of the Ministry of Education, Culture, Sports, Science and Technology |url=http://www.mext.go.jp/en/about/pablication/__icsFiles/afieldfile/2019/03/13/1374478_001.pdf |access-date=7 September 2019 |publisher=[[Ministry of Education, Culture, Sports, Science and Technology (Japan)|MEXT]] |pages=29}}</ref>

      ==History==
      {{main|History of education in Japan}}
      [[File:Bungaku-Bandai_no-Takara-Terakoya-School-by-Issunshi-Hanasato.png|thumb|[[Terakoya]], a type of private school during the [[Edo period]]|left]]

      Formal education in Japan began in the 6th century AD with the adoption of Chinese culture. [[Buddhism|Buddhist]] and [[Confucianism|Confucian]] teachings, along with sciences, [[calligraphy]], [[divination]], and Japanese and Chinese literature, were taught at the courts of [[Asuka period|Asuka]] (538–710), [[Nara period|Nara]] (710–794), and [[Heian period|Heian]] (794–1185). Unlike in China, Japan did not fully implement a meritocratic examination system for [[List of Japanese court ranks, positions and hereditary titles|court positions]], and these positions remained largely hereditary. The Kamakura period saw the rise of the bushi (or [[samurai]], the military class) and decline in the influence of the traditional cultured court nobility ([[kuge]]), which also reduced the influence of scholar officials based in [[Kyoto]], as samurai spread across the country. However, Buddhist monasteries continued to be significant centres of learning.

      [[File:Yushima Seidô.jpg|thumb|[[Yushima Seidō|Yushima Seido]] in [[Edo]]]]
      In the [[Edo period]], the [[Yushima Seidō]] in Edo (modern-day [[Tokyo]]) became the chief educational institution. Under the [[Tokugawa shogunate]], the [[daimyō]] vied for power in the largely pacified country. Since their influence could not be raised through war, they competed in the economic field. Their warrior-turned-bureaucrat samurai elite had to be educated not only in military strategy and the martial arts but also in literature, agriculture and accounting.<ref>Kelly, Boyd (1999). [https://books.google.com/books?id=JBqWbDmFsfEC&pg=PA522&dq= ''Encyclopedia of Historians and Historical Writing''], Vol. 1, p. 522.</ref><ref>De Bary, William et al. (2005). [https://books.google.com/books?id=6wS_ijD6DSgC&pg=PA69&dq= ''Sources of Japanese Tradition''], Vol. 2, p. 69.</ref> Samurai schools, known as hankō, educated samurai and their children, instilling Confucian values and military skills. Merchants also sought education for business purposes, leading to the establishment of [[terakoya]], which taught basic reading, writing, and arithmetic. Despite limited contact with foreign countries ([[sakoku]]), books from China and Europe were imported, and ''[[Rangaku]]'' ("Dutch studies") became popular, especially in the field of natural sciences.<ref name=":1">{{Cite journal |last=Toyosawa |first=Noboru |date=1961 |title=Adult Education in Japan in the Edo Period |journal=Adult Education |volume=12 |pages=8–18 |doi=10.1177/074171366101200102 |s2cid=144238512}}</ref> By the end of the Edo period, literacy rates had significantly increased, with about 50% of men and 20% of women being literate. 'Commoners' would also form communal gatherings to try to educate themselves with the help of a scholar. One such, [[Baigan Ishida]], was a great orator and writer who reached the merchant class. There were [[Wakashu-gumi|wakashu]]-gumi, or youth groups, that consisted of young men ages fourteen to seventeen, who at these groups learned about ceremonies, cooperative living, language, manners, marriage, straw weaving, and world information, not to mention talking and singing.

      ===Meiji Restoration===
      [[File:東京帝国大学正門.jpg|left|thumb|[[University of Tokyo]], Japan's first modern university.]]
      After the [[Meiji Restoration]] of 1868, the methods and structures of [[Western learning]] were adopted as a means to make Japan a strong, modern nation. Students and even high-ranking government officials were sent abroad to study, such as the [[Iwakura mission]]. Compulsory education was introduced, primarily modelled after the [[Prussian education system|Prussian model]]. In 1877, the nation's first university, the [[University of Tokyo]] was established by merging Edo-era institutions and schools, including the aforementioned [[Yushima Seidō]].<ref>{{Cite web |title=The University of Tokyo |url=https://www.u-tokyo.ac.jp/en/about/chronology.html |access-date=2024-04-11 |website=The University of Tokyo |language=en}}</ref> Hired foreign scholars, known as ''[[Foreign government advisors in Meiji Japan|o-yatoi gaikokujin]]'', were invited to teach at this newly founded university and military academies. These scholars were gradually replaced by Japanese scholars who had been educated at this university or abroad. In 1897, [[Kyoto Imperial University]] was established as the country's second university, which was followed by other [[Imperial Universities|imperial universities]] and private universities such as [[Keio University|Keio]] and [[Waseda University|Waseda]] after the 1920s.
      [[File:2019 International Library of Children's Literature.jpg|thumb|Former building of the [[Imperial Library (Japan)|Imperial Library]], now used as the [[International Library of Children's Literature]]]]
      In the 1890s, Japan saw a rise in reformers, child experts, magazine editors, and educated mothers who embraced new ideas about childhood and education. They introduced the [[upper middle class]] to a concept of childhood that involved children having their own space, reading children's books, playing with educational toys, and spending significant time on school homework. These concepts quickly spread across all social classes.<ref>Kathleen S. Uno, ''Passages to Modernity: Motherhood, Childhood, and Social Reform in Early Twentieth Century Japan'' (1999)</ref><ref>Mark Jones, ''Children as Treasures: Childhood and the Middle Class in Early Twentieth Century Japan'' (2010)</ref> The Meiji government established Japan's first modern public library in 1872, which is regarded as the origin of today's [[National Diet Library]].<ref>[https://www.kodomo.go.jp/about/building/history/pdf/history_imperial.pdf 帝国図書館の歴史] ''History of the Imperial Library''</ref>

      ===Post-WWII===
      {{Main|Educational reform in occupied Japan}}

      [[File:Akiyoshidai-Minamiyama.jpg|left|thumb|Secondary school students on a school excursion]]
      After [[Surrender of Japan|Japan’s defeat in the Second World War]], the [[Occupation of Japan|Allied occupation]] introduced educational reforms, officially to promote [[democracy]] and [[pacifism]]. The reforms aimed to decentralise education, reduce state control, weaken the [[Social class|class structure]] and encourage teacher initiative. The Fundamental Law of Education and the School Education Law, both enacted in 1947, laid the foundation for a new education system modelled after the [[Education in the United States|American system]], with six years of elementary school, three years of lower secondary school, three years of upper secondary school, and four years of university education. Compulsory education was extended to nine years, and coeducation became more common.<ref>{{cite journal |last1=Shorb |first1=Patrick Naoya |title=Democratizing Education, Adjusting Students: Occupation Reform, Pupil Guidance, and the Discourse of Tekio in Postwar Japan |journal=History of Education Quarterly |date=November 2024 |volume=64 |issue=4 |pages=457–489 |doi=10.1017/heq.2024.19}}</ref><ref>{{Cite book|title=Lessons from PISA for the United States|chapter=Japan: A Story of Sustained Excellence|chapter-url=https://www.oecd-ilibrary.org/education/lessons-from-pisa-for-the-united-states/japan-a-story-of-sustained-excellence_9789264096660-7-en|date=17 May 2011|publisher=Organisation for Economic Cooperation and Development (OECD)|pages=[https://archive.org/details/lessonsfrompisaf0000unse/page/137 137–157]|language=en|doi=10.1787/9789264096660-7-en|series=Strong Performers and Successful Reformers in Education|isbn=9789264096653|url-access=registration|url=https://archive.org/details/lessonsfrompisaf0000unse/page/137}}</ref><ref>{{cite journal |last1=Shimizutani |first1=Satoshi |title=Education Reform in Japan: A Course for Lifelong Learning |journal=Asia-Pacific Review |date=November 2011 |volume=18 |issue=2 |pages=105–114 |doi=10.1080/13439006.2011.630853 |s2cid=154665902 }}</ref>

      [[File:Schoolkids wearing hats and randoseru in Kugayama, Japan; January 2010.jpg|thumb|Primary school pupils on their way to school]]
      After the occupation period ended in 1951, Japan's education system continued to evolve. The 1950s saw efforts to re-centralise some aspects of education, including curriculum and textbook standards, under the [[Ministry of Education, Culture, Sports, Science and Technology|Ministry of Education]]. Moral education was reintroduced, and measures were taken to standardise teacher performance and administration.<ref>{{Cite encyclopedia |title=Education – Postwar Reforms, Globalization, Technology |encyclopedia=Encyclopelædia Britannica |url=https://www.britannica.com/topic/education/Education-after-World-War-II |access-date=2024-05-27 |language=en}}</ref> During the 1960s and 1970s, Japan experienced rapid economic growth and became the second largest economy in the world, which impacted its education system. The government invested heavily in education to support industrial development and technological advancement. This period saw a significant increase in the number of universities and vocational schools to meet the demands of a growing economy. University admissions became intensely selective and competitive during this period.

      By the 1980s, Japan's education system faced new challenges. The pressure of entrance examinations and the intense competition for university places led to significant stress among students. In response, the government implemented several reforms aimed at reducing the academic burden and promoting a more holistic education ([[Yutori education]]). These included curriculum revisions, the introduction of more creative and critical thinking subjects, and a greater emphasis on moral and character education. This policy caused major concerns that academic skills for Japanese students may have declined from the mid-1990s,<ref>Matsutani, Minoru, "[http://www.japantimes.co.jp/text/nn20120110i1.html Student count, knowledge sliding]", ''[[Japan Times]]'', 10 January 2012, p. 3.</ref> and after gradual changes, it was abolished completely by 2011. Japanese students showed a significant improvement in math and science scores in the 2011, compared to in 2007, according to the [[Trends in International Mathematics and Science Study|TIMSS]] survey.<ref>{{cite news|title=Japanese students improve test scores in math, science|url=http://www.japantimes.co.jp/news/2012/12/12/national/japanese-students-improve-test-scores-in-math-science/|newspaper=The Japan Times Online|access-date=19 March 2015|date=12 December 2012}}</ref>

      == Organization of the school system ==

      [[File:Organization of the School System in Japan 201904.jpg|700px]]

      ==School levels==
      The [[academic year]] in Japan begins in April. Classes are normally held from Monday to Friday. At the primary and secondary level, the school year consists of two or three terms, which are separated by short holidays in spring and winter, and a six-week-long summer break.<ref>{{cite web |url=http://www.japan-guide.com/e/e2150.html |title=Japanese education system |publisher=Japan-guide.com |date=9 June 2002 |access-date=19 January 2013 |archive-url=https://web.archive.org/web/20110408192539/http://www.japan-guide.com/e/e2150.html |archive-date=8 April 2011 |url-status=dead }}</ref> Universities typically have two semesters, with the second starting from September or October, incorporating a new year break towards the end of the semester.

