      As a whole, students in the United States lagged the leading Asian and European nations in the [[Trends in International Mathematics and Science Study|TIMSS international math and science test]]. However, broken down by race, US Asians scored comparably to Asian nations, and white Americans scored comparably to leading European nations. Although some races generally score lower than whites in the US, they scored as well as whites in European nations: Hispanic Americans averaged 505, comparable to students in Austria and Sweden, while African Americans, at 482, were comparable to students in Norway and Ukraine.<ref>{{cite web|title=Odds and Ends|url=http://www.asianweek.com/2008/12/24/odds-and-ends-alternative-energy-czar-2/|archive-url=https://web.archive.org/web/20150404215401/http://www.asianweek.com/2008/12/24/odds-and-ends-alternative-energy-czar-2/|archive-date=April 4, 2015|access-date=May 2, 2015}}</ref>

      ==Possible causes==
      The achievement gap between low-income minority students and middle-income white students has been a popular research topic among sociologists since the publication of the report, "Equality of Educational Opportunity" (more widely known as the [[Coleman Report#Coleman Report|Coleman Report]]). This report was commissioned by the U.S. Department of Education in 1966 to investigate whether the performance of African-American students was caused by their attending schools of a lesser quality than white students. The report suggested that both in-school factors and home/community factors affect the academic achievement of students and contribute to the achievement gap that exists between races.<ref name="rothstein5">Rothstein, Richard. 2004. Class and Schools: Using Social, Economic, and Educational Reform to Close the Black-White Achievement Gap. Washington, D.C: Economic Policy Institute.</ref>

      The study of the achievement gap can be addressed from two standpoints—from a supply-side and a demand-side viewpoint of education. In [[Poor Economics]], Banerjee and Duflo explain the two families of arguments surrounding education of underserved populations.<ref>Banerjee, A., Banerjee, A. V., & Duflo, E. (2011). Poor economics: A radical rethinking of the way to fight global poverty. PublicAffairs Store.</ref> Demand-side arguments focus on aspects of minority populations that influence education achievement. These include family background and culture, which shape perceptions and expectations surrounding education. A large body of research has been dedicated to studying these factors contributing to the achievement gap. Supply-side arguments focus on the provision of education and resources and the systemic structures in place that perpetuate the achievement gap. These include neighborhoods, funding, and policy. In 2006, Ladson-Billings called on education researchers to move the spotlight of education research away from family background to take into account the rest of the factors that affect educational achievement, as explained by the Coleman Report.<ref>{{cite journal |last=Ladson-Billings |first=G. |year=2006 |title=From the achievement gap to the education debt: Understanding achievement in US schools |journal=Educational Researcher |volume=35 |issue=7 |pages=3–12 |doi=10.3102/0013189X035007003 |s2cid=145286865 }}</ref> The concept of opportunity gaps—rather than achievement gaps—has changed the paradigm of education research to assess education from a top-down approach.<ref>{{cite journal |last=Milner |first=H. R. |year=2012 |title=Beyond a Test Score Explaining Opportunity Gaps in Educational Practice |journal=Journal of Black Studies |volume=43 |issue=6 |pages=693–718 |doi=10.1177/0021934712442539 |s2cid=145648751 }}</ref>

      ===Social belonging===
      A person's sense of social belonging is one non-cognitive factor that plays a part in the racial achievement gap. Some of the processes that threaten a person's sense of belonging in schools include [[social stigma]], negative intellectual stereotypes, and numeric under-representation.<ref name=":2">Walton, G. M., & Cohen, G. L. (2011). Sharing motivation. In D. Dunning (Ed.), ''Frontiers of social psychology. Social motivation'' (pp. 79–101). New York, NY, US: Psychology Press.</ref>

      Walton and Cohen describe three ways in which a sense of social belonging boosts motivation, the first being positive self-image. By adopting similar interests as those who a person considers to be socially significant, it may help to increase or affirm a person's sense of his or her personal worth.<ref name=":2" /> People have a basic need to belong, which is why people may feel a sense of distress when social rejection occurs. Students in minority groups have to battle other factors as well, such as peer and friend groups being separated by race. Homogeneous friend groups can segregate people out of important networking connections, thus limiting important future opportunities that non-minority groups have because they have access to these networking connections.<ref name=":0">{{Cite book|title=Whistling Vivaldi: And Other Clues to How Stereotypes Affect Us|last=Steele|first=Claude|publisher=W.W. Norton & Company.|year=2011|isbn=978-0-393-33972-7|location=New York|pages=1–41}}</ref> Oakland students that come from low socioeconomic families are less likely to attend schools that provide equal education as wealthier schools that come from major American cities. This means that only two of ten students will go to schools that have a closing achievement gap.<ref name=":9">{{Cite press release |url=http://www.educationequalityindex.org/wp-content/uploads/2016/03/EEI-Oakland-Press-Release-FINAL.pdf |archive-date=Dec 18, 2018 |archive-url=https://web.archive.org/web/20181218102035/http://www.educationequalityindex.org/wp-content/uploads/2016/03/EEI-Oakland-Press-Release-FINAL.pdf |date=March 22, 2016 |website=www.educationequalityindex.org |language=en |access-date=11 August 2023 |title=Oakland's Achievement Gap Is Large and Growing |url-status=usurped}}</ref>

      Students who do not fall into the majority or dominant group in their schools often worry about whether or not they will belong and find a valued place in their school. Their thoughts are often centered around whether they will be accepted and valued for who they are around their peers.<ref name=":0" /> Social rejection can cause reductions in IQ test performance, self-regulation, and also can prompt aggression.<ref name=":2" /> People can do more together than they can alone. Social life is a form of collaborative activity, and an important feature of human life. When goals and objectives become shared, they offer a person and the social units he or she is a part of major advantages over if he or she was working alone.<ref name=":2" />

      Under performing groups in schools often report that they feel like they do not belong and that they are unhappy a majority of the time. Steele offers an example, explaining an observation done by his colleague, Treisman. It was observed that African American students at Berkeley did their work independently in their rooms with nobody to converse with. They spent most of their time checking answers to their arithmetic in the back of their textbook, weakening their grasp of the concepts themselves. This ultimately caused these students to do worse on tests and assessments than their white peers, creating a frustrating experience and also contributing to the racial achievement gap.<ref name=":0" />

      Another explanation that has been suggested for racial and ethnic differences in standardized test performance is that some minority children may not be motivated to do their best on these assessments. Many argue that standardized IQ tests and other testing procedures are culturally biased toward the knowledge and experiences of the European-American middle class.<ref>{{cite news|last=Reese|first=Ronnie|date=February 21, 2013|title=Minority Testing Bias Persists|work=The Huffington Post|url=https://huffingtonpost.com/ronnie-reese/test-bias-minorities_b_2734149.html|access-date=November 15, 2015}}</ref><ref>{{cite magazine|last=Rooks|first=Noliwe M.|date=October 11, 2012|title=Why It's Time to Get Rid of Standardized Tests|url=https://ideas.time.com/2012/10/11/why-its-time-to-get-rid-of-standardized-tests/|magazine=TIME|access-date=November 15, 2015}}</ref>

      ===Purpose===

      When students feel that what they are doing has purpose, they are more likely to succeed academically. Students who identify and actively work towards their individual, purposeful, life goals have a better chance at eliminating disengagement that commonly occurs in middle school and continues into later adolescence.<ref name=":4">{{Cite journal|last=David Yeager|first=Matthew Bundick|date=May 2009|title=The Role of Purposeful Work Goals in Promoting Meaning in Life and in Schoolwork in Adolescence|journal=Journal of Adolescent Research|volume=24|issue=4|pages=423–449|doi=10.1177/0743558409336749|s2cid=145115414}}</ref> These life goals give students a chance to believe that their school work is done in hopes of achieving larger, more long-term goals that matter to the world. This also gives students the opportunity to feel that their lives have meaning by working towards these goals.<ref name=":4" />

      Purposeful life goals, such as work goals, may also increase students motivation to learn. Adolescents may make connections between what they are learning in school and how they will use those skills and knowledge will help them make an impact in the future. This idea ultimately will lead students to create their own goals related to mastering the material they are learning in school.<ref name=":4" />

      Adolescents who have goals and believe that their opinions and voices can impact the world positively may become more motivated. They become more committed to mastering concepts and being accountable for their own learning, rather than focusing on getting the highest grade in the class.<ref name=":4" /> Students will study more intently and deeply, as well as persist longer, seeking out more challenges. They will like learning more because the tasks they are doing have purpose, creating a personal meaning to them and in turn leading to satisfaction.<ref name=":4" />

      ===Mindset===

      [[Carol Dweck]], professor of psychology at Stanford University, suggests that students' mindsets (how they perceive their own abilities) play a large role in educational achievement and motivation. An adolescent's level of [[self-efficacy]] is a great predictor of their level of academic performance, going above and beyond a student's measured level of ability and also their prior performance in school.<ref>{{Cite book|title=Academic Tenacity: Mindsets and Skills that Promote Long-Term Learning|last=Dweck|first=Carol|publisher=Bill and Melinda Gates Foundation|year=2014|pages=1–40}}</ref> Students having a growth mindset believe that their intelligence can be developed over time. Those with a fixed mindset believe that their intelligence is fixed and cannot grow and develop. Students with growth mindsets tend to outperform their peers who have fixed mindsets.<ref>{{Cite news|url=https://www.edweek.org/ew/articles/2015/09/23/carol-dweck-revisits-the-growth-mindset.html|title=Carol Dweck Revisits "The Growth Mindset"|last=Dweck|first=Carol|date=September 22, 2015|work=Education Week}}</ref>

      Dweck points out that teachers have a high degree of influence on which kind of mindset a student develops in school. When people are taught with a growth mindset, the ideas of challenging themselves and putting in more effort follow.<ref name=":3">{{Cite book|title=Mindset: A New Psychology of Success|last=Dweck|first=Carol|year=2006|pages=1–42}}</ref> People believe that each mindset is better than the other, which causes students to feel that they are not as good as other students in school. A big question that is asked in schooling is when does someone feel smart: when they are flawless or when they are learning?<ref name=":3" /> With a fixed mindset, you must be flawless, and not just smart in the classroom. With this mindset, there is even more pressure on students to not only succeed, but to be flawless in front of their peers.<ref name=":3" />

      Students who have a fixed mindset, have come to change the idea of failure as an action to an identity.<ref name=":3" /> They come to think of the idea of failing something as being that they are a failure and that they cannot achieve something. This links back into how they think of themselves as a person and decreases their motivation in school. This sense of "failure" is especially prominent during adolescence. If one thing goes wrong, one with a fixed mindset will feel that they cannot overcome this small failure, and thus their mindset motivation will decrease.<ref name=":3" />

      === Structural and institutional factors ===
      Different schools have different effects on similar students. Children of color tend to be concentrated in low-achieving, highly segregated schools. In general, minority students are more likely to come from low-income households, meaning minority students are more likely to attend poorly funded schools based on the districting patterns within the school system. Schools in lower-income districts tend to employ less qualified teachers and have fewer educational resources.<ref>''Education and the Inequalities of Place'' Vincent J.Roscigno, Donald Tomaskovic-Devey, and Martha Crowley 2006</ref> Research shows that teacher effectiveness is the most important in-school factor affecting student learning. Good teachers can actually close or eliminate the gaps in achievement on the standardized tests that separate white and minority students.<ref name="teachers">Gordon, Kane & Staiger (2006). 'Identifying Effective Teachers Using Performance on the Job.' Brookings Institution.</ref>

      Schools also tend to place students in [[Tracking (education)|tracking]] groups as a means of tailoring lesson plans for different types of learners. However, as a result of schools placing emphasis on socioeconomic status and cultural capital, minority students are vastly over-represented in lower educational tracks.<ref>''Why Do Some Schools Group By Ability?'' Peter G. VanderHart 2006</ref> Similarly, Hispanic and African American students are often wrongly placed into lower tracks based on teachers' and administrators' expectations for minority students. Such expectations of a race within school systems are a form of [[institutional racism]]. Some researchers compare the tracking system to a modern form of [[racial segregation]] within the schools.<ref>''Detracking: The Social Construction of Ability, Cultural Politics, and Resistance to Reform'' Jeannie Oakes, Amy Stuart Wells, Makeba Jones, and Amanda Datnow 1997</ref>

      Studies on tracking groups within schools have also proven to be detrimental for minority students.<ref>''Urban Teachers' Beliefs on Teaching, Learning, and Students: A Pilot Study in the United States of America'' Kim Hyunsook Song 2006</ref> Once students are in these lower tracks, they tend to have less-qualified teachers, a less challenging curriculum, and few opportunities to advance into higher tracks.<ref>''Social Class in Public Schools'' Jennifer L. Hochschild 2003</ref> There is also some research that suggests students in lower tracks suffer from social psychological consequences of being labeled as a slower learner, which often leads children to stop trying in school.<ref name="ReferenceA">''Tracking: From Theory to Practice'' Maureen Hallinan 1994</ref> In fact, many sociologists argue that tracking in schools does not provide any lasting benefits to any group of students.<ref>''Is Ability Grouping Equitable?'' Adam Gamoran 1992</ref>

      The practice of awarding low grades and test scores to children who struggle causes low-performing children to experience anxiety, demoralization, and a loss of control.<ref name="Crooks, Terence J. 1988">{{cite journal|last1=Crooks|first1=Terence J|year=1988|title=The Impact of Classroom Evaluation Practices on Students|journal=Review of Educational Research|volume=58|issue=4|pages=438–481|doi=10.3102/00346543058004438|s2cid=73676211}}</ref><ref name="Hill, Kennedy T 1984">{{cite journal|last1=Hill|first1=Kennedy T.|last2=Wigfield|first2=Allan|year=1984|title=Test Anxiety: A Major Educational Problem and What Can Be Done about It.|journal=The Elementary School Journal|volume=85|issue=1|pages=105–126|doi=10.1086/461395|s2cid=3251003}}</ref> This undermines performance,<ref name="Crooks, Terence J. 1988" /><ref name="Hill, Kennedy T 1984" /> and may explain why the achievement gap increases over the school years, and why the interventions implemented thus far seem to have failed to close it.<ref name="Yeh, Stuart S. 20172">Yeh, Stuart S. (2017). ''Solving the achievement gap: Overcoming the structure of school inequality.'' New York: Palgrave.</ref>

      === School funding and geography ===
      The quality of school that a student attends and the socioeconomic status of the student's residential neighborhood are two factors that can affect a student's academic performance.

      In the United States, only 8% of public education funding comes from the federal government. The other 92% comes from local, state, and private sources.<ref name=":6">{{Cite web|date=2017-05-25|title=Federal Role in Education|url=https://www2.ed.gov/about/overview/fed/role.html|access-date=2019-11-05|website=www2.ed.gov|language=en}}</ref> Local funding is considered unequal as it is based on property taxes. So those who are in areas in which there is lower property value have less funded schools, making schools unequal within a district.<ref name=":6" /><ref name="massey7">{{cite book|last=Massey|first=Douglas S.|title=Race, Poverty, and Domestic Policy|publisher=Yale University Press|year=2004|isbn=978-0-300-09541-8|editor-last=Henry|editor-first=C. Michael|location=New Haven|chapter=The New Geography of Inequality in Urban America|chapter-url=https://archive.org/details/racepovertydomes00henr}}</ref> This system means that schools located in areas with lower real estate values have proportionately less money to spend per pupil than schools located in areas with higher real estate values. This system has also maintained a "funding segregation": because minority students are much more likely to live in a neighborhood with lower property values, they are much more likely to attend a school that receives significantly lower funding.<ref name="massey7" />

      Data from research shows that when the quality of the school is better and students are given more resources, it reduces the racial achievement gap. When white and black schools were given the equal amount of resources, it shows that black students started improving while white students stayed the same because they didn't need the resources. This showed that lack of resources is a factor in the racial achievement gap.<ref>{{Cite journal|last=Lee|first=Jaekyung|date=January 2002|title=Racial and Ethnic Achievement Gap Trends: Reversing the Progress Toward Equity?|journal=Educational Researcher|language=en|volume=31|issue=1|pages=3–12|doi=10.3102/0013189x031001003|issn=0013-189X|s2cid=16186200}}</ref> The research that was conducted shows that predominantly white schools have more resources than black schools. However, lack of resources is only a small effect on academic achievement in comparison to students' family backgrounds.<ref name=":02" />

      Using property taxes to fund public schools contributes to school inequality. Lower-funded schools are more likely to have lower-paid teachers; higher student-teacher ratios, meaning less individual attention for each student; older books; fewer extracurricular activities, which have been shown to increase academic achievement; poorly maintained school facilities; and less access to services like school nursing and social workers. All of these factors can affect student performance and perpetuate inequalities between students of different races.<ref>{{cite book|last=Kozol|first=J.|url=https://archive.org/details/shameofnationres00kozo|title=Shame of the Nation: The Restoration of Apartheid Schooling in America|publisher=Crown|year=2005|isbn=978-1-4000-5244-8|location=New York}}</ref>

      Living in a high-poverty or disadvantaged neighborhood have been shown to negatively influence educational aspirations and consequently attainment. The [[Moving to Opportunity]] experiment showed that moving to a low-poverty neighborhood had a positive effect on the educational attainment of minority adolescents. The school characteristics associated with the low-poverty neighborhoods proved to be effective mediators, since low-poverty neighborhoods tended to have more favorable school composition, safety, and quality.<ref>{{cite journal|last1=Leventhal|first1=T.|last2=Brooks-Gunn|first2=J.|year=2004|title=A randomized study of neighborhood effects on low-income children's educational outcomes|journal=[[Developmental Psychology (journal)|Developmental Psychology]]|volume=40|issue=4|pages=488–507|doi=10.1037/0012-1649.40.4.488|pmid=15238038}}</ref>  Additionally, living in a neighborhood with economic and social inequalities leads to negative attitudes and more problematic behavior due to and social tensions.<ref>{{cite journal|last1=Sampson|first1=R. J.|last2=Morenoff|first2=J. D.|last3=Gannon-Rowley|first3=T.|year=2002|title=Assessing 'neighborhood effects': Social processes and new directions in research|journal=Annual Review of Sociology|volume=28|pages=443–478|doi=10.1146/annurev.soc.28.110601.141114|s2cid=40418902}}</ref> Greater college aspirations have been correlated with more [[group cohesiveness|social cohesiveness]] among neighborhood youth, since community support from both youth and adults in the neighborhood tends to have a positive influence on educational aspirations.<ref>{{cite journal|last1=Stewart|first1=E. B.|last2=Stewart|first2=E. A.|last3=Simons|first3=R. L.|year=2007|title=The effect of neighborhood context on the college aspirations of African American adolescents|journal=American Educational Research Journal|volume=44|issue=4|pages=896–919|citeseerx=10.1.1.590.6788|doi=10.3102/0002831207308637|s2cid=14198683}}</ref> Some researchers believe that vouchers should be given to low income students so they can go to school in other places. However, other researchers believe that the idea of vouchers promotes equality and doesn't eliminate it.<ref name=":02" />

      Racial and ethnic [[residential segregation]] in the United States still persists, with African Americans experiencing the highest degree of residential segregation, followed by Latino Americans and Asian Americans and Pacific Islanders.<ref>{{cite web|year=2002|title=Racial and Ethnic Residential Segregation United States: 1980–2000|url=https://www.census.gov/hhes/www/housing/housing_patterns/papertoc.html|access-date=October 20, 2013|publisher=U. S. Census Bureau}}</ref> This isolation from white American communities is highly correlated with low property values and high-poverty neighborhoods. This issue is propagated by issues of home ownership facing minorities, especially African Americans and Latino Americans, since residential areas predominantly populated by these minority groups are perceived as less attractive in the housing market. Home ownership by minority groups is further undermined by institutionalized discriminatory practices, such as differential treatment of African Americans and Latino Americans in the housing market compared with white Americans. Higher mortgages charged to African American or Latino American buyers make it more difficult for members of these minority groups to attain full home ownership and accumulate wealth. As a result, African American and Latino American groups continue to live in racially segregated neighborhoods and face the socioeconomic consequences of residential segregation.<ref>{{cite journal|last=Charles|first=C. Z.|year=2003|title=The dynamics of racial residential segregation|journal=Annual Review of Sociology|volume=29|pages=167–207|doi=10.1146/annurev.soc.29.010202.100002|s2cid=145272311}}</ref><ref>{{cite journal|last1=Krivo|first1=L. J.|last2=Kaufman|first2=R. L.|year=2004|title=Housing and wealth inequality: Racial-ethnic differences in home equity in the United States|journal=[[Demography (journal)|Demography]]|volume=41|issue=3|pages=585–605|citeseerx=10.1.1.453.8980|doi=10.1353/dem.2004.0023|pmid=15461016|s2cid=20464127}}</ref>

      Differences in the academic performance of African-American and white students exist even in schools that are desegregated and diverse, and studies have shown that a school's racial mix does not seem to have much effect on changes in reading scores after sixth grade, or on math scores at any age.<ref name="singham11">{{cite book|last=Singham|first=Mano|title=The Achievement Gap in U.S. Education: Canaries in the Mine|publisher=Rowman and Littlefield Education|year=2005|isbn=978-1-57886-217-7|location=Lanham, MD}}</ref> In fact, minority students in segregated-minority schools have more optimism and greater educational aspirations as well as achievements than minority students in segregated-white schools. This can be attributed to various factors, including the attitudes of faculty and staff at segregated-white schools and the effect of stereotype threat.<ref>{{cite journal|last=Goldsmith|first=P. A.|year=2004|title=Schools' racial mix, students' optimism, and the Black-White and Latino-White achievement gaps|journal=Sociology of Education|volume=77|issue=2|pages=121–147|doi=10.1177/003804070407700202|s2cid=145433651}}</ref>

      === Education debt ===
      {{Main|Gloria Ladson-Billings#Education debt}}
      Education debt is a theory developed by [[Gloria Ladson-Billings]], a pedagogical theorist, to&nbsp;attempt to explain the racial achievement gap. As defined by a colleague of Ladson-Billings, professor emeritus Robert Haveman, education debt is the "foregone schooling resources that we could have (should have) been investing in (primarily) low income kids, which deficit leads to a variety of social problems (e.g. crime, low productivity, low wages, low labor force participation) that require on-going public investment".<ref name=":5">{{Cite journal|last=Ladson-Billings|first=Gloria|title=From the Achievement Gap to Education Debt: Understanding Achievement in U.S. Schools|jstor=3876731|journal=Educational Researcher|volume=35|issue=7|pages=3–12|year=2006|doi=10.3102/0013189X035007003|s2cid=145286865}}</ref> The education debt theory has historical, economic, sociopolitical and moral components.<ref name=":5" />

      === Parenting influence ===
      Parenting methods are different across cultures, thus can have dramatic influence on educational outcomes.<ref>[https://www.frontiersin.org/journals/psychology/articles/10.3389/fpsyg.2022.905093/full for Torture] Retrieved 15 February 2025</ref><ref>[https://www.apa.org/act/resources/fact-sheets/parenting-styles Parenting Styles] Retrieved 15 February 2025</ref> For instance, Asian parents often apply strict rules and parental authoritarianism to their children while many white American parents deem creativity and self-sufficiency to be more valuable.{{Citation needed|date=July 2011}} ''[[Battle Hymn of the Tiger Mother]]'' by Yale Professor Amy Chua highlights some of the very important aspects in East Asian parenting method in comparison to the "American way". Chua's book has generated interests and controversies in the "Tiger Mom" parenting method and its role in determining children's education outcomes.<ref>{{cite magazine|date=January 20, 2011|title=Tiger Moms: Is Tough Parenting Really the Answer?|url=http://www.time.com/time/magazine/article/0,9171,2043477,00.html|archive-url=https://web.archive.org/web/20110625115448/http://www.time.com/time/magazine/article/0,9171,2043477,00.html|archive-date=June 25, 2011|magazine=Time Magazine}}</ref> Many Hispanic parents and their children believe that a college degree is necessary for obtaining stable and meaningful work.<ref>{{Cite book|last1=Schneider|first1=Barbara|url=https://archive.org/details/ambitiousgenerat00barb|title=The Ambitious Generation: America's Teenagers, Motivated but Directionless.|last2=Stevenson|first2=David|publisher=Yale University Press|year=1999|isbn=0-300-07982-6|url-access=registration}}</ref> This attitude is reflected in the educational expectations parents hold for their children and in the expectations that young people have for themselves (U.S. Department of Education, 1995b, p.&nbsp;88).<ref name="Schhneider2">{{Cite journal|last1=Schhneider|first1=Barbara|last2=Martinez|first2=Sylvia|last3=Ownes|first3=Ann|date=2006-01-01|title=Barriers to Educational Opportunities for Hispanics in the United States|publisher=National Academies Press (US)|url=https://www.ncbi.nlm.nih.gov/books/NBK19909/}}</ref> High educational expectations can be found among all racial and ethnic groups regardless of their economic and social resources (p.&nbsp;73). Although parents and children share high educational aims, their aspirations do not necessarily translate into postsecondary matriculation. This is especially the case for Hispanic high school students, particularly those whose parents have not attended college.<ref>Nuñez, Cuccaro-Alamin, and Carroll, 1998</ref><ref>{{Cite web|title=National Center for Education Statistics|url=https://nces.ed.gov/pubs98/98082.pdf}}</ref>

      Parental involvement in children's education is influential to children's success at school.<ref name="brown.edu">{{cite book|last1=Epstein|first1=J. L.|url=https://www.brown.edu/academics/education-alliance/sites/brown.edu.academics.education-alliance/files/uploads/KLOOM_sfcp_entire.pdf|title=School, family, and community partnerships: Your handbook for action|last2=Coates|first2=L.|last3=Salinas|first3=K. C.|last4=Sanders|first4=M. G.|last5=Simon|first5=B. S.|publisher=Corwin|year=1997|location=Thousand Oaks, CA}}</ref> Teachers often view low parental involvement as a barrier to student success. Collaboration between teachers and parents is necessary when working to help a child; parents have the necessary knowledge of what is best for their child's situation.<ref name="LaRocque, M. 2011">{{cite journal|last1=LaRocque|first1=M.|last2=Kleiman|first2=I.|last3=Darling|first3=S. M.|year=2011|title=Parental involvement: the missing link in school achievement|journal=Preventing School Failure|volume=55|issue=3|pages=115–122|doi=10.1080/10459880903472876|s2cid=145673976}}</ref> However, the student body in schools is diverse, and although teachers make an effort to try and understand each child's unique cultural beliefs, it is important that they are meeting with parents to get a clear understanding of what needs should be met in order for the student to succeed. School administrators must accommodate and account for family differences and also be supportive by promoting ways families can get involved. For example, schools can provide support by accommodating the needs of the family who have do not have transportation, schools may do so by providing external resources that may benefit the family.<ref>{{cite thesis|last1=Flakes|first1=Bettina M|year=2007|title=Teacher and parent perceptions of parental involvement at W. S. Hornsby Elementary School|id={{ProQuest|304722541}}}}</ref> As referenced by Feliciano et al. (2016), educators can also account for culture by providing education about the diversity at the school. This can be achieved by creating an environment where both teachers and students learn about cultures represented among the student population.

      Larocquem et al. (2011) stated that family involvement may include visiting their children's class, being involved with a parent teacher organization, attending school activities, speaking to the child's class, and volunteering at school events. It is also important for families to be involved with the child's school assignments, especially by holding them accountable for completion and discussion of the work assigned.<ref name="LaRocque, M. 2011" /> Also, educators may want to consider how parental language barriers and educational experiences affect families and the influence of contributing to their child's education.<ref name="brown.edu" /> In addition, even when families want to get involved, they may not know how to collaborate with school personnel, especially for families who are Hispanic, African American, and or of low economic status.<ref>{{cite journal|last1=Barton|first1=A. C.|last2=Drake|first2=C.|last3=Perez|first3=J. G.|last4=St. Louis|first4=K.|last5=George|first5=M.|year=2004|title=Ecologies of parental engagement in urban education|journal=Educational Researcher|volume=33|issue=4|pages=3–12|doi=10.3102/0013189X033004003|s2cid=144012401}}</ref> A study done by Nistler and Maiers (2000), found that although different barriers for families may inhibit participation, families reported that they would want to participate nonetheless.<ref>{{cite journal|last1=Nistler|first1=R. J.|last2=Maiers|first2=A.|year=2000|title=Stopping the silence: hearing parents' voices in an urban first-grade family literacy program|url=http://drs.dadeschools.net/AdditionalReports/Family%20Involvement.pdf|journal=The Reading Teacher|volume=53|issue=8|pages=670–680}}</ref> Larocque et al. (2011) suggest that teachers need to find out what values and expectations are held for the child, which should be done by involving parents in the decision-making process.<ref name="LaRocque, M. 2011" />

      Children can differ in their readiness to learn before they enter school.<ref name="rothstein5" /> Research has shown that parental involvement in a child's development has a significant effect on the educational achievement of minority children.<ref>{{cite journal |last=Jeynes |first=W. H. |year=2003 |title=A meta-analysis the effects of parental involvement on minority children's academic achievement |journal=Education and Urban Society |volume=35 |issue=2 |pages=202–218 |doi=10.1177/0013124502239392 |s2cid=145407192 }}</ref> According to sociologist [[Annette Lareau]], differences in [[parenting styles]] can affect a child's future achievement. In her book ''[[Unequal Childhoods]]'', she argues that there are two main types of parenting: concerted cultivation and the achievement of natural growth.

      * [[Concerted cultivation]] is usually practiced by middle-class parents, regardless of their race. These parents are more likely to be involved in their children's education, encourage their children's participation in extracurricular activities or sports teams, and to teach their children how to successfully communicate with authority figures. These communication skills give children a form of social capital that help them communicate their needs and negotiate with adults throughout their life.
      * The achievement of natural growth is generally practiced by poor and working-class families. These parents generally do not play as large a role in their children's education, their children are less likely to participate in extracurriculars or sports teams, and they usually do not teach their children the communication skills that middle- and upper-class children have. Instead, these parents are more concerned that their children obey authority figures and have respect for authority, which are two characteristics that are important to have in order to succeed in working-class jobs.<ref name="lareau6">{{cite book |last=Lareau |first=Annette |year=2003 |title=Unequal Childhoods: Class, Race, and Family Life |location=Berkeley |publisher=University of California Press |isbn=978-0-520-23763-6 |url=https://archive.org/details/unequalchildhood00lare }}</ref>

      The parenting practices that a child is raised with influences their future educational achievement. However, parenting styles are heavily influenced by the parents' and family's social, economic, and physical circumstances. In particular, immigration status (if applicable), education level, incomes, and occupations influence the degree of parental involvement their children's academic achievement.<ref>{{cite journal |last1=Kao |first1=G. |last2=Thompson |first2=J. |year=2003 |title=Racial and ethnic stratification in educational achievement and attainment |journal=Annual Review of Sociology |volume=29 |issue=1 |pages=417–442 |doi=10.1146/annurev.soc.29.010202.100019 |bibcode=2003ARSoc..29..417K }}</ref>  These factors directly determine the access of the parents to time and resources to dedicate to their children's development. These factors also indirectly determine the home environment and parents' educational expectations of their children.<ref>{{cite journal |last=Davis-Kean |first=P. E. |year=2005 |title=The influence of parent education and family income on child achievement: the indirect role of parental expectations and the home environment |journal=Journal of Family Psychology |volume=19 |issue=2 |pages=294–304 |doi=10.1037/0893-3200.19.2.294 |pmid=15982107 |s2cid=7547110 }}</ref> For example, children from poor families have lower academic performance in kindergarten than children from middle to upper-class backgrounds, but children from poor families who had cognitively stimulating materials in the home demonstrated higher rates of academic achievement in kindergarten. Additionally, parents of children living in poverty are less likely to have cognitively stimulating materials in the home for their children and are less likely to be involved in their child's school.<ref>{{cite journal |last1=Cooper |first1=C. E. |last2=Crosnoe |last3=Suizzom |last4=Pituch |title=Poverty Race and Parental Involvement During the Transition to Elementary School |journal=Journal of Family Issues |year=2010 |volume=31 |issue=7 |pages=859–883 |doi=10.1177/0192513X09351515 |s2cid=145197192 }}</ref> The quality of language that the student uses is affected by family's socioeconomic backgrounds, which is another factor in the academic achievement gap.<ref name=":02">{{Cite journal|last=Wiggan|first=Greg|date=September 2007|title=Race, School Achievement, and Educational Inequality: Toward a Student-Based Inquiry Perspective|journal=Review of Educational Research|language=en|volume=77|issue=3|pages=310–333|doi=10.3102/003465430303947|s2cid=145720455|issn=0034-6543}}</ref>

      === Preschool education ===
      Additionally, poor and minority students have disproportionately less access to high-quality early childhood education, which has been shown to have a strong impact on early learning and development. One study found that although black children are more likely to attend preschool than white children, they may experience lower-quality care.<ref name="ReferenceC">{{cite journal|last1=Magnuson|first1=Katherine A.|last2=Waldfogel|first2=Jane|year=2005|title=Early Childhood Care and Education: Effects on Ethnic and Racial Gaps in School Readiness|journal=The Future of Children|volume=15|issue=1|pages=169–196|doi=10.1353/foc.2005.0005|jstor=1602667|pmid=16130546|s2cid=8994284}}</ref> The same study also found that Hispanic children in the U.S. are much less likely to attend preschool than white children. Another study conducted in Illinois in 2010<ref>Bruce Fuller, 2010 (referenced in: {{cite web|title=Latino Children Face Sharp Disparity in Preschool Access |url=http://www.mccormickfoundation.org/pdf/press%20release%20-%20NJLC%20Illinois%20as%20Trailblazer.pdf|archive-url=https://web.archive.org/web/20101207045158/http://mccormickfoundation.org/PDF/PRESS%20RELEASE%20-%20NJLC%20Illinois%20as%20Trailblazer.pdf|archive-date=December 7, 2010|access-date=2011-04-13}})</ref> found that only one in three Latino parents could find a preschool slot for his or her child, compared to almost two thirds of other families.

      Finally, according to the National Institute for Early Education Research (NIEER), families with modest incomes (less than $60,000) have the least access to preschool education.<ref>"Who Goes to Preschool and Why Does it Matter?" W. Steven Barnett & Donald J. Yarosz, 2007</ref> Research suggests that dramatic increases in both enrollment and quality of prekindergarten programs would help to alleviate the school readiness gap and ensure that low-income and minority children begin school on even footing with their peers.<ref name="ReferenceC" />

      === Income ===
      In the United States, socioeconomic status of families affects children schooling.<ref>{{Cite news|url=https://www.apa.org/pi/ses/resources/publications/minorities|title=Ethnic and Racial Minorities & Socioeconomic Status|work=www.apa.org|access-date=2019-12-04|publisher=American Psychological Association|language=en}}</ref> Sociologist Laura Perry found what she calls 'Student Socioeconomic Status' has the third strongest influence on educational outcomes in the United States out of nations within this study and it ranked sixth in influence of equity differences among schools.<ref>{{Cite journal|last=Perry|first=Laura|date=April 2009|title=Characteristics of Equitable Systems of Education: A Cross-National Analysis|journal=European Education|language=en|volume=41|issue=1|pages=79–100|doi=10.2753/EUE1056-4934410104|s2cid=144485252|issn=1056-4934}}</ref> These families are more susceptible to [[Multidimensional Poverty Index|multidimensional poverty]], meaning the three dimensions of poverty, health, education, and standard of living are interconnected to give an overall assessment of a nations poverty.

      Some researchers, such as Katherine Paschall, argue that family income plays more of a factor in the academic achievement gap than race/ethnicity.<ref>{{Cite journal|last1=Paschall|first1=Katherine W.|last2=Gershoff|first2=Elizabeth T.|last3=Kuhfeld|first3=Megan|date=June 2018|title=A Two Decade Examination of Historical Race/Ethnicity Disparities in Academic Achievement by Poverty Status|journal=Journal of Youth and Adolescence|language=en|volume=47|issue=6|pages=1164–1177|doi=10.1007/s10964-017-0800-7|pmid=29313249|s2cid=23549948|issn=0047-2891|pmc=8209685}}</ref> However,  other studies find that the racial gaps persists between families of different race and ethnicity that have similar incomes. When comparing white students from families with incomes below $10,000 they had a mean SAT test score that was 61 points higher than African American students whose families had incomes between $80,000 and $100,000.<ref>{{Cite web|url=http://www.jbhe.com/features/49_college_admissions-test.html|title=The Widening Racial Scoring Gap on the SAT College Admissions Test|website=www.jbhe.com|access-date=2019-12-04}}</ref> This means that there are more contributing factors than just economic status.

      Conservative African American scholars such as [[Thomas Sowell]] observe that while SAT scores are lower for students with less parental education and income,<ref>[https://www.tsowell.com/speducat.html THE EDUCATION OF MINORITY CHILDREN] Retrieved 15 February 2025</ref> Asian Americans who took the SAT with incomes below $10,000 score 482 in math in 1995, comparable to whites earning $30–40,000 and higher and blacks over $70,000.<ref>[https://resources.corwin.com/sites/default/files/figure_3.1_21.pdf Figure 3.1 1995 Average SAT Scores by Parental Income and Race/Ethnicity] Retrieved 15 February 2025</ref><ref>[https://www.cs.jhu.edu/~misha/DIReadingSeminar/Papers/DixonRoman13.pdf Race, Poverty and SAT Scores] Retrieved 15 February 2025</ref> Similarly, a later study reveals that for the 2003 college bound cohort, Black test-takers with more than $100,000 in family income have mean SAT math and verbal scores of 490 and 495 respectively, and this is comparable with the scores of the White test-takers with $20,000–$25,000 in family income (493 and 495).<ref name="Dixon-Román Everson Mcardle 2013 p. ">{{cite journal | last1=Dixon-Román | first1=Ezekiel J | last2=Everson | first2=Howard T | last3=Mcardle | first3=John J | title=Race, Poverty and SAT Scores: Modeling the Influences of Family Income on Black and White High School Students' SAT Performance | journal=Teachers College Record | volume=115 | issue=40306 | date=2013-05-01 | pages=1–33 | issn=0161-4681 | url=https://www.researchgate.net/publication/280232788 | access-date=2021-04-10 | doi=10.1177/016146811311500406 | s2cid=43527910 | doi-access=free }}</ref> Test scores in middle-income black communities, such as [[Charles County]] and [[Prince George's County]], are still not comparable to those in non-black suburbs<ref>[https://www.dcurbanmom.com/jforum/posts/list/549011.page test scores] Retrieved 15 February 2025</ref>.

      Economic factors were identified as lack of online course access (McCoy, 2012)<ref>McCoy, K. L. (2012). A study of African American males and their response to online learning (Doctoral dissertation). Available from ProQuest Dissertations and Theses database. (UMI No. 3546682)</ref> and online course attrition which indicated before (Liu et al., 2007).<ref>{{cite journal|last1=Liu|first1=S.|last2=Gomez|first2=J.|last3=Khan|first3=B.|last4=Yen|first4=C.J.|year=2007|title=Toward a learneroriented community college online course dropout framework|journal=International Journal on ELearning|volume=6|issue=4|pages=519–542}}</ref> Based on the National Center for Educational Statistic (2015),<ref>National Center for Education Statistics. (2011). The condition of education, 2011. (NCES 2011033), Indicator 43. Retrieved from https://nces.ed.gov/pubsearch/pubsinfo.asp?pubid=2011033</ref> about half of African American male students grew up in single-parent households. They are associated with higher incidences of poverty, which leads to poorer educational outcomes (Child Trends Databank, 2015). Low-income households tend to have fewer home computers and less access to the Internet (Zickuhr & Smith, 2012).

      ===Cultural differences===
      Some experts believe that cultural factors contribute to the racial achievement gap. Students from minority cultures face language barriers, differences in cultural norms in interactions, learning styles, varying levels of receptiveness of their culture to white American culture, and varying levels of acceptance of the white American culture by the students. In particular, it has been found that minority students from cultures with views that generally do not align with the mainstream cultural views have a harder time in school.<ref name="ogbu92">{{cite journal |last=Ogbu |first=J. U. |year=1992 |title=Understanding cultural diversity and learning |journal=Educational Researcher |volume=21 |issue=8 |pages=5–14 |doi=10.3102/0013189x021008005 |s2cid=20086710 }}</ref> Furthermore, views of the value of education differ by minority groups as well as members within each group. Both Hispanic and African-American youths often receive mixed messages about the importance of education, and often end up performing below their academic potential.<ref name="noguera08">{{cite book |last=Noguera |first=Pedro A. |year=2008 |title=The Trouble with Black Boys |location=San Francisco |publisher=Jossey Bass |isbn=978-0-7879-8874-6 }}</ref>

      === Online education ===
      Achievement gaps between African American students and White students in online classes tend to be greater than regular class. Expanding from 14% in 1995 to 22% in 2015 (National Center for Education Statistics, 2016).<ref name="auto32">National Center for Education Statistics. (2016). Educational attainment of young adults, 2016. Retrieved from https://nces.ed.gov/fastfacts/display.asp?id=27</ref> Possible causes include differences in socio-economic status (Palmer et al., 2013),<ref>Palmer, G. A., Bowman, L., & Harroff, P. (2013). Literature review: Barriers to participation in the online learning environment: The role of race and gender. Adult Education Research Conference. Retrieved from http://newprairiepress.org/cgi/viewcontent.cgi?article=3024&context=aerc</ref> academic performance differences (Osborne, 2001),<ref name="Osborne, J. 2001">{{cite journal|last1=Osborne|first1=J|year=2001|title=Testing stereotype threat: Does anxiety explain race and sex differences in achievement?|journal=Contemporary Educational Psychology|volume=26|issue=3|pages=291–310|doi=10.1006/ceps.2000.1052|pmid=11414722}}</ref> technology inaccessibility (Fairlie, 2012),<ref>{{cite journal|last1=Fairlie|first1=R. W.|year=2012a|title=Academic achievement, technology and race: Experimental evidence|journal=Economics of Education Review|volume=31|issue=5|pages=663–679|doi=10.1016/j.econedurev.2012.04.003}}</ref> lack of online technical support (Rovai & Gallien, 2005),<ref>{{cite journal|last1=Rovai|first1=A. P.|last2=Gallien|first2=L. B.|year=2005|title=Learning and sense of community: A comparative analysis of African American and Caucasian online graduate students|journal=Journal of Negro Education|volume=74|issue=1|pages=53–62}}</ref> and anxiety towards racial stereotyping (Osborne, 2001).<ref name="Osborne, J. 2001" />

      Nowadays, there is a growing population of students who use online education, and the number of institutions which offering fully online degrees is also increasing. According to several studies, online education probably could create an environment where there is less cultural division and negative stereotypes of African Americans, thus protecting those students who have had bad experiences. In addition, the influence technology and user skills and so as economics and academic influences are tightly bonded, that may have positively contributed to African American online learners experience. However, it appears African American male students are less likely to enroll in online classes.{{cn|date=February 2026}}

      === Latino American cultural factors ===
      Many Hispanic parents who immigrate to The United States see a high school diploma as being a sufficient amount of schooling and may not stress the importance of continuing on to college. Parental discouragement from pursuing higher education tends to be based on the notion of "we made it without formal schooling, so you can too". Additionally, depending on the immigration generation and economic status of the student, some students prioritize their obligations to assisting their family over their educational aspirations. Poor economic circumstances place greater pressure on the students to sacrifice time spent working towards educational attainment in order to dedicate more time to help support the family. Surveys have shown that while Latino American families would like their children to have a formal education, they also place high value on getting jobs, marrying, and having children as early as possible, all of which conflict with the goal of educational achievement.<ref name = "bcqnguyen2">{{cite book |last1=Orozco |first1=C. S. |last2=Orozco |first2=M. M. S. |year=1995 |title=Trans-formations: Immigration, family life, and achievement motivation among Latino adolescents |publisher=Stanford University Press |isbn=978-0-8047-2550-7 }}</ref><ref>{{cite journal |last1=Fuligni |first1=A. J. |last2=Tseng |first2=V. |last3=Lam |first3=M. |year=1999 |title=Attitudes toward family obligations among American adolescents with Asian, Latin American, and European backgrounds |journal=Child Development |volume=70 |issue=4 |pages=1030–1044 |doi=10.1111/1467-8624.00075 }}</ref> However, counselors and teachers usually promote continuing on to college. This message conflicts with the one being sent to Hispanic students by their families and can negatively affect the motivation of Hispanic students, as evidenced by the fact that Latinos have the lowest college attendance rates of any racial/ethnic group.<ref name="noguera08"/> Overall, Latino American students face barriers such as financial stability and insufficient support for higher education within their families. Reading to children when they are younger increases literacy comprehension, which is a fundamental concept in the education system; however, it is less likely to occur within Latino American families because many parents do not have any formal education. Currently, Latino Americans over the age of 25 have the lowest percentage in obtaining a bachelor's degree or higher amongst all other racial groups; while only having 11 percent.<ref>{{cite web|last=Tienda|first=Marta|title=The National Academies|url=https://www.ncbi.nlm.nih.gov/books/NBK19909/|publisher=National Institutes of Health|access-date=20 April 2014}}</ref>

      Disadvantages in a child's early life can cultivate into achievement gaps in their education. Poverty, coupled with the environment they are raised in, can lead to shortcomings in educational achievement. Despite strong standards and beliefs in education, Hispanic children consistently perform poorly, reflected by a low average of math and reading scores, as compared to other groups except African American.<ref name="auto1">{{Cite book|year=2014|title=Digest of Education Statistics|hdl=10919/100542|hdl-access=free|last1=Snyder |first1=Thomas D. |last2=De Brey |first2=Cristobal |last3=Dillow |first3=Sally A. }}</ref> Hispanic and African American children have been shown to be more likely to be raised in poverty, with 33% of Hispanic families living below the [[Poverty in the United States|economic poverty level]], compared to African American (39%), Asian (14%) and White (13%) counterparts.<ref name="auto1" /> Children who are raised in poverty are less likely to be enrolled in nursery or preschool. Though researchers are seeing improvements in achievement levels, such as a decrease in high school dropout rates (from 24% to 17%) and a steady increase in math and reading scores over the past 10 years,<ref name="auto1" /> there are still issues that must be addressed.

      There is a common misconception that Hispanic parents are not involved in their child's education and fail to transmit strong educational values to their children. However, there is evidence that Hispanic parents actually hold their children's education in high value. The majority of Hispanic children are affected by [[Immigration to the United States|immigration]]. It affects recent immigrants as well as the children of immigrants.<ref>{{cite journal|last1=Valencia|first1=Richard R.|date=April 2002|title='Mexican Americans Don't Value Education!' On the Basis of the Myth, Mythmaking, and Debunking|journal=Journal of Latinos and Education|volume=1|issue=2|pages=81–103|doi=10.1207/s1532771xjle0102_2|s2cid=144594549}}</ref> Both recent immigrants and the children of immigrants are faced with language barriers and other migration obstacles. A study explored the unique situation and stressors recent Latin American immigrants face. Hispanic students showed lower academic achievement, more absences, and more life stressors than their counterparts.<ref>{{cite journal|last1=Patel|first1=Sita G.|last2=Barrera|first2=Alinne Z.|last3=Strambler|first3=Michael J.|last4=Muñoz|first4=Ricardo F.|last5=Macciomei|first5=Erynn|date=2 April 2016|title=The Achievement Gap Among Newcomer Immigrant Adolescents: Life Stressors Hinder Latina/o Academic Success|journal=Journal of Latinos and Education|volume=15|issue=2|pages=121–133|doi=10.1080/15348431.2015.1099529|s2cid=146902837}}</ref> In 2014–2015, 77.8% of Hispanic children were [[English-language learner|English Language learners]]. This can be problematic because children may not have parents who speak English at home to help with language acquisition. Immigration struggles can be used as a motivator for students. Immigrant parents appeal to their children and hold high expectations because of the "gift" they are bestowing on them. They immigrated and sacrificed their lives so their children can succeed, and this framework is salient in encouraging children to pursue their education. Parents use their struggles and occupation to encourage a better life.<ref name="auto2">{{cite journal|last1=Ceballo|first1=Rosario|last2=Maurizi|first2=Laura K.|last3=Suarez|first3=Gloria A.|last4=Aretakis|first4=Maria T.|date=2014|title=Gift and sacrifice: Parental involvement in Latino adolescents' education.|journal=Cultural Diversity and Ethnic Minority Psychology|volume=20|issue=1|pages=116–127|doi=10.1037/a0033472|pmid=23834259}}</ref>

      [[Parent Involvement|Parental involvement]] has been shown to increase educational success and attainment for students. For example, parental involvement in elementary school has been shown to lower high school dropout rates and improved on time completion of high school.<ref>{{cite journal|last1=Barnard|first1=Wendy Miedel|date=January 2004|title=Parent involvement in elementary school and educational attainment|journal=Children and Youth Services Review|volume=26|issue=1|pages=39–62|doi=10.1016/j.childyouth.2003.11.002}}</ref> A common misconception is that Latino parents don't hold their children's education in high regards (Valencia, 2002), but this has been debunked. Parents show their values in education by holding high academic expectations and giving "consejos" or advice. In 2012, 97% of families reported teaching their children letters, words or numbers.<ref name="auto1" /> A study reported that parent involvement during adolescence continues to be as influential as in early childhood.<ref name="auto2" />

      === African American cultural factors ===
      {{Further|African American culture|African-American family structure}}The culture and environment in which children are raised may play a role in the achievement gap. Jencks and Phillips argue that African American parents may not encourage early education in toddlers because they do not see the personal benefits of having exceptional academic skills. As a result of cultural differences, African American students tend to begin school with smaller vocabularies than their white classmates.<ref name="jencks&phillips3">''America's Next Achievement Test: Closing the Black-White Test Score Gap'' Christopher Jencks and Meredith Phillips 1998</ref> Hart and Risley calculated a "30 million word gap" between children of high school dropouts and those of professionals who are college educated. The differences are qualitative as well as quantitative, with differences in "unique" words, complexity, and "conversational turns."<ref>{{cite news|last1=Sparks|first1=Sarah D.|date=April 22, 2015|title=Research on Quality of Conversation Holds Deeper Clues Into Word Gap|page=1|work=Education Week|publisher=Educational Projects in Education, Inc.}}</ref>

      However, poverty often acts as a confounding factor and differences that are assumed to arise from racial/cultural factors may be socioeconomically driven, as can be seen by a study where immigrant-origin Black undergraduates outperformed U.S.-origin Black undergraduates until socioeconomic status was taken into account.<ref name="pmid24198895">{{cite journal| author=Tauriac JJ, Liem JH| title=Exploring the divergent academic outcomes of U.S.-origin and immigrant-origin Black undergraduates. | journal=J Divers High Educ | year= 2012 | volume= 5 | issue= 4 | pages=  244–258| pmid=24198895 | doi=10.1037/a0030181 | pmc=3816006 }}</ref> Many children who are poor, regardless of race, come from homes that lack stability, continuity of care, adequate nutrition, and medical care creating a level of environmental stress that can affect the young child's development. As a result, these children enter school with decreased word knowledge that can affect their language skills, influence their experience with books, and create different perceptions and expectations in the classroom context.<ref name="test">Hart and Risley (1995). Meaningful differences in the every day experiences of young children. Baltimore, MD: Paul H Brookes.</ref>

      Studies show that when students have parental assistance with homework, they perform better in school.<ref name="ReferenceB">''Immigration, Family Life, and Achievement Motivation Among Latino Adolescents'' Carola Suarez-Orozco and Marcelo Suarez-Orozco 1995</ref> This is a problem for many minority students due to the large number of single-parent households (67% of African-American children are in a single-parent household)<ref>{{cite web|title=Children in single-parent families by race|url=http://datacenter.kidscount.org/data/acrossstates/Rankings.aspx?ind=107|access-date=May 2, 2015}}</ref> and the increase in non-English speaking parents. Students from single-parent homes often find it difficult to find time to receive help from their parent. Similarly, some Hispanic students have difficulty getting help with their homework because there is not an English speaker at home to offer assistance.<ref name="ReferenceB" />

      African American students are also likely to receive different messages about the importance of education from their peer group and from their parents. Many young African-Americans are told by their parents to concentrate on school and do well academically, which is similar to the message that many middle-class white students receive. However, the peers of African-American students are more likely to place less emphasis on education, sometimes accusing studious African-American students of "[[acting white]]".<ref>''Black Students' School Success: Coping with the "Burden of 'Acting White'"'' [[Signithia Fordham]] and John U. Ogbu 1986</ref><ref name="researchers">Steele, C., and J. Aronson, "Stereotype Threat and the Test Performance of Academically Successful African Americans" (pp. 401–430), in C. Jencks and M. Phillips (Eds.), The Black-White Test Score Gap (Washington, DC: The Brookings Institution, 1998).</ref> This causes problems for black students who want to pursue higher levels of education, forcing some to hide their study or homework habits from their peers and perform below their academic potential.<ref name="noguera08" /> As some researchers point out, minority students may feel little motivation to do well in school because they do not believe it will pay off in the form of a better job or upward [[social mobility]].<ref name="jencks&phillips3"/><ref>''Black Students' School Success: Coping with the "Burden of 'Acting White'"'' Signithia Fordham and John U. Ogbu 1986</ref> By not trying to do well in school, such students engage in a rejection of the [[achievement ideology]] – that is, the idea that working hard and studying long hours will pay off for students in the form of higher wages or upward social mobility.

      === Asian American cultural factors ===
      Asian American students are more likely to view education as a means to [[social mobility]] and [[career advancement]]. It may also provide a means to overcome discrimination as well as language barriers. This notion comes from cultural expectations and parental expectations of their children, which are rooted in the cultural belief that education and hard work is the key to educational and eventually occupational attainment. Many Asian Americans immigrated to the United States voluntarily, in search for better opportunities. This immigration status comes into play when assessing the cultural views of Asian Americans since attitudes of more recent immigration are associated with optimistic views about the correlation between hard work and success. Obstacles such as language barriers and acceptance of white American culture are more easily overcome by voluntary immigrants since their expectations of attaining better opportunities in the United States influence their interactions and experiences.<ref>{{cite journal |last1=Goyette |first1=K. |last2=Xie |first2=Y. |year=1999 |title=Educational expectations of Asian American youths: Determinants and ethnic differences |journal=[[Sociology of Education (journal)|Sociology of Education]] |volume=72 |issue=1 |pages=22–36 |doi=10.2307/2673184 |jstor=2673184 |s2cid=143889254 }}</ref>  Students that identify as Asian American believe that having a good education would also help them speak out against racism based on the model-minority stereotype.<ref>{{Cite journal|last=Lee|first=Stacey J.|date=1994|title=Behind the Model-Minority Stereotype: Voices of High- and Low-Achieving Asian American Students|journal=Anthropology & Education Quarterly|language=en|volume=25|issue=4|pages=413–429|doi=10.1525/aeq.1994.25.4.04x0530j|s2cid=146627243|issn=1548-1492}}</ref>

      ===Factors specific to refugees===

      Part of the racial achievement gap can be attributed to the experience of the refugee population in the United States. Refugee groups in particular face obstacles such as cultural and language barriers and discrimination, in addition to migration-related stresses. These factors affect how successfully refugee children can assimilate to and succeed in the United States.<ref>{{cite journal |last=McBrien |first=J. L. |year=2005 |title=Educational Needs and Barriers for Refugee Students in the United States: A Review of the Literature |journal=Review of Educational Research |volume=75 |issue=3 |pages=329–364 |doi=10.3102/00346543075003329 |citeseerx=10.1.1.459.5997 |s2cid=145725106 }}</ref> Furthermore, it has been shown that immigrant children from politically unstable countries do not perform as well as immigrant children from politically stable countries.<ref>{{cite journal |last1=Levels |first1=M. |last2=Dronkers |first2=J. |last3=Kraaykamp |first3=G. |year=2008 |title=Immigrant children's educational achievement in western countries: origin, destination, and community effects on mathematical performance |journal=American Sociological Review |volume=73 |issue=5 |pages=835–853 |doi=10.1177/000312240807300507 |hdl=2066/73266 |s2cid=145798959 |url=https://repository.ubn.ru.nl/bitstream/2066/73266/2/73266.pdf |hdl-access=free }}</ref>

      ===Genetic factors ===
      Scientific consensus tells us that there is no genetic component behind differences in academic achievement between racial groups.<ref>{{Cite book|last=Mackintosh, N. J. (Nicholas John), 1935–|title=IQ and human intelligence|date=2011|publisher=Oxford University Press|isbn=978-0-19-958559-5|edition=2nd|location=Oxford|oclc=669754008}}</ref><ref>{{cite journal|last1=Nisbett|first1=Richard E.|last2=Aronson|first2=Joshua|last3=Blair|first3=Clancy|last4=Dickens|first4=William|last5=Flynn|first5=James|last6=Halpern|first6=Diane F.|last7=Turkheimer|first7=Eric|date=2012|title=Intelligence: New findings and theoretical developments.|journal=American Psychologist|volume=67|issue=2|pages=130–159|doi=10.1037/a0026699|pmid=22233090}}</ref><ref>{{cite journal|last1=Kaplan|first1=Jonathan Michael|date=January 2015|title=Race, IQ, and the search for statistical signals associated with so-called 'X'-factors: environments, racism, and the 'hereditarian hypothesis'|journal=Biology & Philosophy|volume=30|issue=1|pages=1–17|doi=10.1007/s10539-014-9428-0|s2cid=85351431}}</ref><ref name="horn">{{cite book|last1=Horn|first1=John L.|url=https://books.google.com/books?id=p0rauwDclu8C|title=Race and intelligence: separating science from myth|date=2013|publisher=Lawrence Erlbaum Associates|isbn=978-1-135-65178-7|editor1-last=Fish|editor1-first=Jefferson M.|editor1-link=Jefferson Fish|pages=297–325|chapter=Selections of Evidence, Misleading Assumptions, and Oversimplifications: The Political Message of the Bell Curve|access-date=4 July 2019}}</ref><ref name="cravens">{{cite book|last1=Cravens|first1=Hamilton|title=Race and science: scientific challenges to racism in modern America|publisher=Oregon State University Press|year=2009|isbn=978-0-87071-576-1|editor1-last=Farber|editor1-first=Paul Lawrence|editor1-link=Paul Lawrence Farber|page=177|chapter=Race, IQ, and Politics in Twentieth-Century America|editor2-last=Cravens|editor2-first=Hamilton}}</ref><ref name=":42">{{cite book|last1=Richards|first1=Graham|title=Defining difference: race and racism in the history of psychology|date=January 2004|publisher=American Psychological Association|isbn=978-1-59147-027-4|editor1-last=Winston|editor1-first=Andrew S.|editor1-link=Andrew Winston|edition=1st|page=143}}</ref><ref name=":52">"Genetic Differences and School Readiness" William T. Dickens, 2005</ref><ref name=":62">"Race, IQ, and Jensen" James R. Flynn (London: Routledge, 1980)</ref><ref name=":7">Nisbett, Richard. "Race, Genetics, and IQ," in The Black-White Test Score Gap, edited by Christopher Jencks and Meredith Phillips (Brookings, 1998), pp. 86–102.</ref> However, [[Pseudoscience|pseudoscientific]] claims that certain racial groups are intellectually superior and others inferior continue to circulate. A recent example is Herrnstein and Murray's 1994 book ''[[The Bell Curve]]'', which controversially claimed that [[Race and intelligence|variation in average levels of intelligence]] (IQ) between racial groups are genetic in origin, and that this may explain some portion of the racial disparities in achievement.<ref name="X">Herrnstein, R. J., and C. Murray, ''The Bell Curve: Intelligence and Class Structure in American Life'' (The Free Press, 1994).</ref> The book has been described by many academics as a restatement of previously debunked "[[scientific racism]]", and was condemned by both literary reviewers and academics within related fields.<ref name="horn" /><ref name="cravens" /><ref name=":42" /> The consensus view among scientists is that there is no difference in inherent cognitive ability between different races, and that environment is at the root of the achievement gap.<ref name=":52" /><ref name=":62" /><ref name=":7" />

      == Implications ==
      Sociologists [[Christopher Jencks]] and Meredith Phillips have argued that narrowing the black-white test score gap "would do more to move [the United States] toward racial equality than any politically plausible alternative".<ref name="jencks&phillips3"/> There is also strong evidence that narrowing the gap would have a significant positive economic and social impact.<ref name="auto4">{{cite web|year=2009|title=The Economic Impact of the Achievement Gap on America's Schools|url=http://www.mckinsey.com/clientservice/socialsector/achievementgap.asp|archive-url=https://web.archive.org/web/20090424192005/http://www.mckinsey.com/clientservice/socialsector/achievementgap.asp|archive-date=April 24, 2009|publisher=McKinsey & Company}}</ref><ref>{{cite journal|last1=Yeh|first1=Stuart S|year=2009|title=Shifting the Bell Curve: The Benefits and Costs of Raising Student Achievement|journal=Evaluation and Program Planning|volume=32|issue=1|pages=74–82|doi=10.1016/j.evalprogplan.2008.08.006|pmid=18977534|s2cid=22489648 }}</ref>

      === Economic outcomes ===
      The racial achievement gap has consequences on the life outcomes of minority students. However, this gap also has the potential for negative implications for American society as a whole, especially in terms of workforce quality and the competitiveness of the American economy.<ref name="espenshade9">{{cite book|title=No longer separate, not yet equal: race and class in elite college admission and campus life|last1=Espenshade|first1=Thomas J.|last2=Walton Radford|first2=Alexandria|publisher=Princeton University Press|year=2009|isbn=978-0-691-14160-2|location=Princeton, New Jersey}}</ref> As the economy has become more globalized and the United States' economy has shifted away from manufacturing and towards a knowledge-based economy, education has become an increasingly important determinant of economic success and prosperity. A strong education is now essential for preparing and training the future workforce that is able to compete in the global economy. Education is also important for attaining jobs and a stable career, which is critical for breaking the [[cycle of poverty]] and securing a sound economic future, both individually and as a nation. Students with lower achievement are more likely to drop out of high school, entering the workforce with minimal training and skills, and subsequently earning substantially less than those with more education.  Therefore, eliminating the racial achievement gap and improving the achievement of minority students will help eliminate economic disparities and ensure that America's future workforce is well prepared to be productive and competitive citizens.<ref name="kober12">Kober, Nancy. 2001. "It Takes More Than Testing: Closing the Achievement Gap." Washington, D.C: Center on Education Policy.</ref>

      Reducing the racial achievement gap is especially important because the United States is becoming an increasingly diverse country. The percentage of African-American and Hispanic students in school is increasing: in 1970, African-Americans and Hispanics made up 15% of the school-age population, and that number had increased to 30% by 2000. It is expected that minority students will represent the majority of school enrollments by 2015.<ref>{{cite journal |last=Ornstein |first=Allan C. |year=2010 |title=Achievement Gaps in Education |journal=Social Science and Public Policy |volume=47 |issue=5 |pages=424–429 |doi=10.1007/s12115-010-9354-y |doi-access=free }}</ref> Minorities make up a growing share of America's future workforce; therefore, the United States' economic competitiveness depends heavily on closing the racial achievement gap.<ref name="kober12"/>

      The racial achievement gap affects the volume and quality of human capital, which is also reflected through calculations of GDP. The cost of racial achievement gap accounts for 2–4 percent of the 2008 GDP. This percentage is likely to increase as blacks and Hispanics continue to account for a higher proportion of the population and workforce. Furthermore, it was estimated that $310 billion would be added to the US economy by 2020 if minority students graduated at the same rate as white students.<ref name="all4ed.org">{{cite web |publisher=Alliance for Excellent Education |year=2009 |title=Potential Economic Impacts of Improved Education on the United States |url=http://www.all4ed.org/files/National_econ.pdf |access-date=April 16, 2012 |archive-date=May 9, 2012 |archive-url=https://web.archive.org/web/20120509194012/http://www.all4ed.org/files/National_econ.pdf  }}</ref> Even more substantial is the narrowing of educational achievement levels in the US compared to those of higher-achieving nations, such as Finland and Korea. McKinsey & Company estimate a $1.3 trillion to $2.3 trillion, or a 9 to 16 percent difference in GDP.<ref name="mckinseyonsociety.com">{{cite web |publisher=McKinsey & Company |title=The Economic Impact of the Achievement Gap in America's Schools |url=http://mckinseyonsociety.com/downloads/reports/Education/achievement_gap_report.pdf }}</ref> 
      Furthermore, if high school dropouts were to cut in half, over $45 billion would be added in savings and additional revenue. In a single high school class, halving the dropout rate would be able to support over 54,000 new jobs, and increase GDP by as much as $9.6 billion.<ref>Alliance for Excellent Education, "Education and the Economy: Boosting the Nation's Economy by Improving High School Graduation Rates" (Washington, DC: Author, 2011).</ref> Overall, the cost of high school drop outs on the US economy is roughly $355 billion.

      $3.7 billion would be saved on community college remediation costs and lost earnings if all high school students were ready for college. Furthermore, if high school graduation rates for males raised by 5 percent, cutting back on crime spending and increasing earnings each year would lead to an $8 billion increase the US economy.<ref name="all4ed.org"/>

      A 2009 report by the management consulting firm [[McKinsey & Company]] asserts that the persistence of the achievement gap in the U.S. has the economic effect of a "permanent national recession."<ref name="auto4"/> The report claims that if the achievement gap between black and Latino performance and white student performance had been narrowed, GDP in 2008 would have been $310 billion to $525 billion higher (2–4 percent).<ref name="auto4"/>

      If the gap between low-income students and their peers had been narrowed, GDP in the same year would have been $400 billion to $670 billion higher (3–5 percent). In addition to the potential increase in GDP, the report projects that closing the achievement gap would lead to cost savings in areas outside of education, such as incarceration and healthcare. The link between low school performance and crime, low earnings and poor health has been echoed in academic research.<ref>{{cite journal|last1=Lochner|first1=L.|last2=Moretti|first2=E.|year=2004|title=The Effect of Education on Crime: Evidence From Prison Inmates, Arrests, and Self-reports|url=http://www.escholarship.org/uc/item/4mf8k11n|journal=[[American Economic Review]]|volume=94|issue=1|pages=155–189|doi=10.1257/000282804322970751|s2cid=10473754}}</ref><ref>{{cite book|last1=Krueger|first1=Alan B.|title=Bridging the Achievement Gap|last2=Whitmore|first2=Diane M.|publisher=The Brookings Institution|year=2002|chapter=Would Smaller Classes Help Close the Black-White Achievement Gap?}}</ref>

      ===Job opportunities===
      As the United States' economy has moved towards a globalized knowledge-based economy, education has become even more important for attaining jobs and a stable career, which is critical for breaking the cycle of poverty and securing a sound economic future. The racial achievement gap can hinder job attainment and social mobility for minority students. The [[United States Census Bureau]] reported $62,545 as the median income of white families, $38,409 of Black families, and $39,730 for Hispanic families.<ref>US Census. Table 697. Money Income of Families—Median Income by Race and Hispanic Origin in Current and Constant (2009) Dollars: 1990 to 2009. https://www.census.gov/compendia/statab/2012/tables/12s0697.pdf</ref> And while the median income of Asian families is $75,027, the number of people working in these households is usually greater than that in white American families.<ref name="bcqnguyen3">{{cite web|url=https://www.apa.org/pi/ses/resources/publications/factsheet-erm.aspx|title=Ethnic and Minorities & Socioeconomic Status|author=American Psychological Association|others=Fact sheet}}</ref> The difference in income levels relate highly to educational opportunities between various groups.<ref>{{cite news |last1=Katz |last2=Rodin |date=January 19, 2012 |title=Targeting an Achievement Gap in One of the Country's Most Educated Metros |work=Citylab |url=https://www.citylab.com/life/2012/01/achievement-gap-one-countrys-most-educated-cities/983/ }}</ref> Students who drop out of high school as a result of the racial achievement gap demonstrate difficulty in the job market. The median income of young adults who do not finish high school is about $21,000, compared to the $30,000 of those who have at least earned a high school credential. This translates into a difference of $630,000 in the course of a lifetime.<ref>{{cite book |last=Rouse |first=C. E. |author-link=Cecilia Rouse |year=2007 |chapter=Quantifying the Costs of Inadequate Education: Consequences of the Labor Market |editor-first=C. R. |editor-last=Belfield |editor2-first=H. M. |editor2-last=Levin |title=The Price We Pay: Economic and Social Consequences of Inadequate Education |pages=[https://archive.org/details/pricewepayeconom0000unse/page/99 99–124] |location=Washington, D.C. |publisher=Brookings Institution Press |isbn=978-0-8157-0863-6 |chapter-url=https://archive.org/details/pricewepayeconom0000unse/page/99 }}</ref> Students who are not accepted or decide not to attend college as a result of the racial achievement gap may forgo over $450,000 in lifetime earnings had they earned a Bachelor of Arts degree.<ref>{{cite news |author-link=Mary Pilon |last=Pilon |first=Mary |date=February 2, 2010 |title=What's a Degree Really Worth? |work=[[Wall Street Journal]] |url=https://www.wsj.com/articles/SB10001424052748703822404575019082819966538 }}</ref> In 2009, $36,000 was the median income for those with an associate degree was, $45,000 for those with a bachelor's degree, $60,000 for those with a master's degree or higher.<ref name = "NCES">U.S. Department of Education, National Center for Education Statistics. (2011). The Condition of Education 2011 (NCES 2011–033), Indicator 17.</ref>

      ===Stereotype threat===

      Beyond differences in earnings, minority students also experience stereotype threats that negatively affects performance through activation of salient racial stereotypes. The [[stereotype threat]] both perpetuates and is caused by the achievement gap.<ref>Aronson, J. (2004). The Threat of Stereotype. Closing Achievement Gaps, 62 (3), 14–19.</ref> Furthermore, students of low academic performance demonstrate low expectations for themselves and self-handicapping tendencies.<ref>Zuckerman, M., Kieffer, S., Knee, C.R. (1998). Consequences of Self-Handicapping: Effects on Coping, Academic Performance and Adjustment. 74 (6), 1619–1628.</ref> Psychologists [[Claude Steele]], Joshua Aronson, and Steven Spencer, have found that [[microaggressions]] such as passing reminders that someone belongs to one group or another (i.e., a group stereotyped as inferior in academics) can affect test performance.<ref name="Stereotype Threat">"Stereotype Threat Widens Achievement Gap" American Psychological Association. 2006.</ref>

      Steele, Aronson and Spencer, have examined and performed experiments to see how stereotypes can threaten how students evaluate themselves, which then alters academic identity and intellectual performance. Steele tested the stereotype threat theory by giving Black and white college students a half-hour test using difficult questions from the verbal [[Graduate Record Examination]] (GRE). In the stereotype-threat condition, they told students the test diagnosed intellectual ability. In saying that the test diagnoses intellectual ability it can potentially elicit the stereotype that Blacks are less intelligent than whites. In the no-stereotype-threat condition, they told students that the test was a problem-solving lab task that said nothing about ability. This made stereotypes irrelevant. In the stereotype threat condition, Blacks who were evenly matched with whites in their group by SAT scores, performed worse compared to their white counterparts. In the experiments with no stereotype threat, Blacks performed slightly better than in those with a stereotype threat, though still significantly worse than whites. Aronson believes the study of stereotype threat offers some "exciting and encouraging answers to these old questions [of achievement gaps] by looking at the psychology of stigma – the way human beings respond to negative stereotypes about their racial or gender group".<ref name="Stereotype Threat"/>

      Claude M. Steele suggested that minority children and adolescents may also experience [[stereotype threat]]—the fear that they will be judged to have traits associated with negative appraisals and/or stereotypes of their race or ethnic group. According to this theory, this produces [[test anxiety]] and keeps them from doing as well as they could on tests. According to Steele, minority test takers experience anxiety, believing that if they do poorly on their test they will confirm the stereotypes about inferior intellectual performance of their minority group. As a result, a [[self-fulfilling prophecy]] begins, and the child performs at a level beneath his or her inherent abilities.

      ===Political representation===
      Another consequence of the racial achievement gap can be seen in the lack of representation of minority groups in public office. Studies have shown that higher socioeconomic status—in terms of income, occupation, and/or educational attainment—is correlated with higher participation in politics.<ref name = "nie87">{{cite book |first1=Sidney |last1=Verba |author-link=Sidney Verba |last2=Nie |first2=N. H. |year=1987 |title=Participation in America: Political Democracy and Social Equality |publisher=University of Chicago Press |isbn=978-0-226-85296-6 }}</ref> This participation is defined as "individual or collective action at the national or local level that supports or opposes state structures, authorities, and/or decisions regarding allocation of public goods";<ref name = "cross88">{{cite journal |last=Conge |first=P. J. |title=The Concept of Political Participation: Toward a Definition |journal=Comparative Politics |volume=20 |issue=2 |year=1988 |pages=241–249 |doi=10.2307/421669 |jstor=421669 }}</ref> this action ranges from engaging in activities such as voting in elections to running for public office.

      Since median income per capita for minority groups (except Asians) is lower than that of white Americans, and since minority groups (except Asians) are more likely to occupy less gainful employment and achieve lower education levels, there is a lowered likelihood of political participation among minority groups. Education attainment is highly [[Correlation and dependence|correlated]] with [[Wage|earnings]] and occupation.<ref name="NCES" /><ref name = "bcqnguyen5">US Department of Education, National Center for Education Statistics. (2010). ''Occupation of employed persons 25 years old and over, by educational attainment and sex: 2010'' [Table]. Retrieved from http://nces.ed.gov/programs/digest/d11/tables/dt11_394.asp</ref> And there is a proven disparity between educational attainment of white Americans and minority groups, with only 30% of bachelor's degrees awarded in 2009 to minority groups.<ref name = "bcqnguyen6">National Science Foundation, Division of Science Resources Statistics. (2010). ''Science and Engineering Degrees, by Race/Ethnicity of Recipients: 1997–2006'' [Table]. Retrieved from https://www.nsf.gov/statistics/nsf10300/ {{Webarchive|url=https://web.archive.org/web/20160305132930/http://www.nsf.gov/statistics/nsf10300/ |date=2016-03-05 }}.</ref> Thus socioeconomic status—and therefore political participation—is correlated with race.<ref name = "bcqnguyen3" /> Research has shown that African Americans, Latino Americans, and Asian Americans are less politically active, by varying degrees, than white Americans.<ref name = "bcqnguyen7">{{cite journal |last1=Verba |first1=S. |last2=Schlozman |first2=K. L. |last3=Brady |first3=H. |last4=Nie |first4=N. H. |year=1993 |title=Race, ethnicity and political resources: Participation in the United States |journal=British Journal of Political Science |volume=23 |issue=4 |pages=453–497 |doi=10.1017/S0007123400006694 |s2cid=153648539 }}</ref><ref name = "bcqnguyen8">{{cite book |last=Lien |first=P. T. |year=2001 |title=The Making of Asian American through Political Participation |page=[https://archive.org/details/makingofasianame00lien/page/73 73] |location=Philadelphia, PA |publisher=Temple University Press |isbn=978-1-56639-894-7 |url=https://archive.org/details/makingofasianame00lien/page/73 }}</ref>

      A consequence of underrepresentation of minority groups in leadership is incongruence between policy and community needs. A study conducted by Kenneth J. Meier and Robert E. England of 82 of the largest urban school districts in the United States showed that African American membership on the school board of these districts led to more policies encouraging more African American inclusion in policy considerations.<ref name="bcqnguyen9">{{cite journal |last1=Meier |first1=K. J. |last2=England |first2=R. E. |year=1984 |title=Black Representation and Educational Policy: Are They Related? |journal=American Political Science Review |volume=78 |issue=2 |pages=392–403 |doi=10.2307/1963371 |jstor=1963371 |s2cid=146975122 }}</ref> It has been shown that both passive and active representation of minority groups serves to align constituent policy preference and representation of these opinions, and thereby facilitate political empowerment of these groups.<ref name="bobo90">{{cite journal |last1=Bobo |first1=L. |last2=Gilliam |first2=F. D. Jr |year=1990 |title=Race, Sociopolitical Participation, and Black Empowerment |journal=American Political Science Review |volume=84 |issue=2 |pages=377–393 |doi=10.2307/1963525 |jstor=1963525 |s2cid=27490610 }}</ref>

      === Special programs ===

      Achievement gaps among students may also manifest themselves in the racial and ethnic composition of [[special education]] and [[gifted education]] programs. Typically, African American and Hispanic students are enrolled in greater numbers in special education programs than their numbers would indicate in most populations, while these groups are underrepresented in gifted programs.<ref>{{cite book |last=Elliott |first=R. |year=1987 |url=https://archive.org/details/litigatingintell0000elli |url-access=registration |title=Litigating intelligence: IQ tests, special education, and social science in the courtroom |location=Dover, MA |publisher=Auburn House |via=[[Internet Archive]] |isbn=978-0-86569-156-8 }}</ref><ref>{{cite journal |last1=Yoon |first1=S. Y. |last2=Gentry |first2=M. |year=2009 |title=Racial and ethnic representation in gifted programs: Current status of and implications for gifted Asian American students |journal=Gifted Child Quarterly |volume=53 |issue= 2|pages=121–136 |doi=10.1177/0016986208330564 |s2cid=143657431 }}</ref> Research shows that these disproportionate enrollment trends may be a consequence of the differences in educational achievement among groups.<ref>{{cite journal |last1=Warne |first1=R. T. |last2=Anderson |first2=B. |last3=Johnson |first3=A. O. |year=2013 |title=The effect of race and ethnicity on the identification process for giftedness in Utah |journal=Journal for the Education of the Gifted |volume=36 |issue= 4|pages=487–508 |doi=10.1177/0162353213506065 |s2cid=143090470 |doi-access=free }}</ref>

      ==Efforts to narrow the achievement gap==
      The United States has seen a variety of different attempts to narrow the racial achievement gap.  These attempts include focusing on the importance of early childhood education, using federal standards based reforms, and implementing institutional changes. The consequences of the achievement gap will still be felt for years. For instance, The Oakland achievement gap grew by 11 percent between 2011 and 2013. This rate is a quicker pace than 80 percent of other major nationwide cities. This means that Oakland's achievement gap is larger than half of California's cities.<ref name=":9" /> Attempts to narrow the achievement gap have been met with resistance. For example, in August 2020, the US [[United States Department of Justice|Justice Department]] argued that [[Yale University]] discriminated against Asian candidates on the basis of their race, a charge the university denied.<ref>{{Cite web|author=David Shortell and Taylor Romine|title=Justice Department accuses Yale of discriminating against Asian American and White applicants|url=https://www.cnn.com/2020/08/13/politics/justice-department-yale-discrimination/index.html|access-date=2020-08-14|website=CNN|date=13 August 2020}}</ref>

      Explanations for the achievement gap and concerns over its effects and even the existence of such a gap are contested.  These explanations are also the source of much controversy, especially since efforts to "close the gap" have become some of the more politically prominent education reform issues. The issues that the achievement gap perpetuate also hold politically charged issues. For example, the cause of the Latino education crisis is not attributable to any single factor. It is likely the result of multiple variables—all of which can have an effect on one another—ranging from social, economic, and educational conditions to inadequate social services and families with exceptionally low human and social capital. The effects of the achievement gap in school can be seen later in life for students. For example, since schools often lack the resources to meet many students' most basic educational needs and since there are few entry-level jobs that provide a living wage and benefits available to those without higher education or special skills in the economy, many are left at a disadvantage.<ref>{{Cite web|date=2010-02-15|title=NEA – The Crisis in the Education of Latino Students|url=http://www.nea.org/home/17404.htm|archive-url=https://web.archive.org/web/20100215170642/http://www.nea.org/home/17404.htm|archive-date=2010-02-15|access-date=2018-11-07}}</ref> The following attempts have all been made in order to counteract the effects of the achievement gap at schools. They range from nationwide, government-led initiatives to smaller school-based initiatives.

      ===Early childhood education===
      There are large cognitive and emotional gaps that form at early ages. They persist throughout childhood and strongly influence adult outcomes.<ref>{{cite journal |last=Heckman |first=James |author-link=James Heckman |journal=American Educator |title=The Economics of Inequality: The Value of Early Childhood Education |year=2011 |volume=35 |issue=1 |pages=31–35 |url=http://www.actionforchildren.com/up_doc/heckman.pdf |access-date=April 19, 2018 |archive-date=April 19, 2018 |archive-url=https://web.archive.org/web/20180419121151/http://www.actionforchildren.com/up_doc/heckman.pdf  }}</ref> The gaps originate before formal schooling begins and persists through childhood and into adulthood. Children who score poorly on tests of cognitive skills before starting kindergarten are highly likely to be low performers throughout their school careers.<ref>"School Readiness and Later Achievement" G. J. Duncan et al, 2007</ref> The evidence of the early appearance of the gap has led to efforts focused on early childhood interventions. Remediating the problems created by the gaps is not as cost effective as preventing them at the outset.<ref>{{cite journal |first1=Marie-Claude |last1=Geoffroy |first2=Sylvana M. |last2=Côté |first3=Charles-Édouard |last3=Giguère |first4=Ginette |last4=Dionne |first5=Philip David |last5=Zelazo |first6=Richard E. |last6=Tremblay |first7=Michel |last7=Boivin |first8=Jean R. |last8=Seguin |display-authors=1 |title=Closing The Gap In Academic Readiness And Achievement: The Role Of Early Childcare |journal=Journal of Child Psychology and Psychiatry |volume=51 |issue=12 |year=2010 |pages=1359–1367 |doi=10.1111/j.1469-7610.2010.02316.x |pmid=20883519 |pmc=3283580 }}</ref> Eight psychologists performed an experiment of infant children born in Quebec in 1997/1998 and followed annually until 7 years of age. Children receiving formal childcare were distinguished from those receiving informal childcare. Children of mothers with low levels of education showed a consistent pattern of lower scores on academic readiness and achievement tests at 6 and 7 years than those of highly educated mothers, unless they received formal childcare. The findings provide further evidence suggesting that formal childcare could represent a preventative means of attenuating effects of disadvantage on children's early academic trajectory. Economic research shows that investment at this stage is both more effective and cost effective than interventions later in a child's life.<ref>{{cite news |last=Heckman |first=James |author-link=James Heckman |title=Catch 'em Young: Investing in Disadvantaged Young Children is Both Fair and Efficient |work=[[Wall Street Journal]] |date=January 10, 2006 |page=A14 |url=https://www.wsj.com/articles/SB113686119611542381 }}</ref><ref>{{cite web|date=12 July 2013|title=Invest in Early Childhood Development: Reduce Deficits, Strengthen the Economy|url=https://heckmanequation.org/resource/invest-in-early-childhood-development-reduce-deficits-strengthen-the-economy/|website=The Heckman Equation}}</ref>  An evaluation of Chicago Public Schools' federally funded Child Parent Centers find that for every $1 invested in the preschool program, nearly $11 is projected to return to society over the participants' lifetimes. This amount is equivalent to an 18% annual return.<ref>{{cite report |last=O'Brein |first=Anne |title=The Economic Impact of Early Childhood Education |work=Learning First Alliance |date=2012 }}</ref>

      [[Head Start Program]], Title I of the [[Elementary and Secondary Education Act]] (ESEA), and various state-funded pre-kindergarten programs target students from low-income families in an attempt to equal the playing field for these children before school begins. In addition to increased access, there has also an increased national focus on raising quality standards for Head Start and state-funded pre-K programs, and in improving training and professional development for early care providers.<ref>{{cite web|title=The Changing Landscape of Pre-K: Examining the changes and impacts of quality standards in prekindergarten at the national, state, district and program levels|url=http://nieer.org/video-webinar/the-changing-landscape-of-pre-k-examining-the-changes-and-impacts-of-quality-standards-in-prekindergarten-at-the-national-state-district-and-program-levels|website=National Institute for Early Education Research|date=June 2009 }}</ref> There is substantial evidence pointing to early childhood development playing a huge role in closing the achievement gap: various studies, including the Carolina Abecedarian study, Child-Parent Center study, and HighScope Perry Preschool study, have shown that pre-K programs can have a positive and long-lasting impact on academic achievement of low-income and minority students.<ref>{{cite journal|last1=Campbell|first1=F. A.|last2=Ramey|first2=C. T.|year=1995|title=Cognitive and school outcomes for high-risk African-American students at middle adolescence: Positive effects of early intervention|journal=American Educational Research Journal|volume=32|issue=4|pages=743–772|doi=10.3102/00028312032004743|s2cid=145076147}}</ref><ref>{{cite web |last1=Reynolds |first1=Arthur J. |title=The Chicago Child-Parent Centers: A Longitudinal Study of Extended Early Childhood Intervention |url=https://www.irp.wisc.edu/publications/dps/pdfs/dp112697.pdf |publisher=Institute for Research on Poverty |date=March 1997}}</ref><ref>{{cite web |last1=Weikart |first1=David P. |last2=Schweinhart |first2=Larry |title=Long-term Study of Adults who Received High-Quality Early Childhood Care and Education Shows Economic and Social Gains, Less Crime |url=http://www.highscope.org/Content.asp?ContentId=282 |publisher=HighScope Perry Preschool Study |archive-url=http://arquivo.pt/wayback/20091009052805/http://www.highscope.org/Content.asp?ContentId=282 |archive-date=October 9, 2009 |location=Washington, DC |date=November 2004  |access-date=November 14, 2020 }}</ref> Furthermore, the role of early childhood education and development has been tied to success even out of the classroom. Pre-K programs help students develop social, emotional, and critical thinking skills at a young age, and while none of this prevents the effects of poverty, it does help in dampening the effects while also better preparing student for their future.<ref>{{Cite news|author= Sanchez, Claudio |date=May 3, 2017|title=Pre-K: Decades Worth Of Studies, One Strong Message|language=en|work=NPR.org|url=https://www.npr.org/sections/ed/2017/05/03/524907739/pre-k-decades-worth-of-studies-one-strong-message|access-date=2018-11-07}}</ref> Evaluations of Head Start have reported positive results. However, fade-out effects were found in Head Start.

      Critics question whether an emphasis on early childhood education will benefit long-term kindergarten through 12th grade learning. Critics point to fade-out effects found in Head Start.<ref>{{cite web |last1=Barton |first1=Paul |last2=Coley |first2=Richard |title=The Black-White Achievement Gap When Progress Stopped|url=https://www.ets.org/Media/Research/pdf/PICBWGAP.pdf |work=Policy Information Report |year=2010 }}</ref> Adam Schaeffer, a policy analyst with the [[Cato Institute]] highlights research shows that students make some gains in the first two years after preschool but it fades out after.<ref>{{cite web |title=Spotlight on Education |work=Early Childhood Focus |publisher=NACCRRA |date=2008 |url=http://www.earlychildhoodfocus.org/artman2/publish/DC/Spotlight_On_Education.shtml |access-date=November 15, 2012 |archive-date=December 25, 2010 |archive-url=https://web.archive.org/web/20101225070201/http://www.earlychildhoodfocus.org/artman2/publish/DC/Spotlight_On_Education.shtml  }}</ref> Recent literature also reveals positive, short-term effects of early childhood education on children's development that weaken over time.<ref name="Effrem">{{cite web |last=Effrem |first=Karen |title=Studies on Effectiveness of Early Childhood Programs |work=Edlibertywatch |date=May 2011 |url=http://edlibertywatch.org/2011/03/studies-on-effectiveness-of-early-childhood-programs/ }}</ref> However, Mary Ellen McGuire, an education policy director at think tank New America Foundations, pointed out that early childhood education isn't intended to be a silver-bullet fix to the educational system. It is merely one aspect.<ref name="Effrem"/> In order for those effects to last high-quality early childhood education needs to be connected to high-quality elementary schools.

      ===Standards-based reform===

      Standards-based reform has been a popular strategy used to try to eliminate the achievement gap in recent years. The goal of this reform strategy is to raise the educational achievement of all students, not just minorities. Many states have adopted higher standards for student achievement. This type of reform focuses on scores on standardized tests, and these scores show that a disproportionate share of the students who are not meeting state achievement standards are Hispanic and African-American. Therefore, it is not enough for minorities to improve just as much as whites do—they must make greater educational gains in order to close the gap.<ref name="kober12"/>

      ====Goals 2000====
      One example of standards-based reform was [[Goals 2000]], also known as the Educate America Act. Goals 2000 was enacted in 1994 by President Clinton and allowed the federal government a new role in its support for education. It aimed to "provide a framework for meeting the National Education Goals".<ref name="Goals2000">"Goals 2000: Educate America Act." Federal Education Policy History. N.p., June 2011. Web. <http://federaleducationpolicy.wordpress.com/2011/06/15/goals-2000-educate-america-act/>.</ref> It was designed to provide resources to states and communities to make sure that all students achieved their full potential by the year 2000. This program set forth eight goals for American students, including all children in America will start school ready to learn, increasing the high school graduation rate to at least 90%, and increasing the standing of American students to first in the world in achievement in math and science. Goals 2000 also placed an emphasis on the importance of technology, promising that all teachers would have modern computers in their classroom and that effective software would be an integral part of the curriculum in every school. President George Bush's No Child Left Behind Act essentially replaced the Goals 2000 program.<ref name="Goals2000"/>

      ====No Child Left Behind====
      The [[No Child Left Behind Act]] (NCLB) legislation was signed by President Bush in January 2002 and dramatically expanded federal influence over the nation's more than 90,000 public schools. NCLB focuses on standardized test scores and school accountability to ensure that all students have the same educational opportunities. The main implications of this legislation were that states had to conduct annual student assessments linked to state standards to identify schools failing to make "adequate yearly progress" (AYP) toward the stated goal of having all students achieve proficiency in reading and math by 2013–2014 and to institute sanctions and rewards based on each school's AYP status.<ref name="Thomas">{{cite journal |first1=Thomas S. |last1=Dee |first2=Brian |last2=Jacob |year=2011 |title=The impact of no Child Left Behind on student achievement |journal=Journal of Policy Analysis and Management |volume=30 |issue=3 |pages=418–446 |doi=10.1002/pam.20586  |citeseerx=10.1.1.180.3683 }}</ref> One of the motivations for this reform is that publicizing detailed information on school-specific performance and linking that "high-stakes" test performance to the possibility of sanctions will improve the focus and productivity of public schools. However, critics charge that test-based school accountability has several negative consequences for the broad cognitive development of children.<ref>{{cite book |last1=Nichols |first1=S. L. |last2=Berliner |first2=D. C. |title=Collateral damage: How high-stakes testing corrupts America's schools |location=Cambridge, MA |publisher=Harvard Education Press |year=2007 |isbn=978-1-891792-36-6 |url-access=registration |url=https://archive.org/details/collateraldamage0000nich }}</ref>

      Critics argue that NCLB and other test-based accountability policies cause educators to shift resources away from important but non-tested subjects and to focus instruction in math and reading on the relatively narrow set of topics that are most heavily represented on the high-stakes tests. Some even suggest that high-stakes testing may lead school personnel to intentionally manipulate student test scores.<ref name="Thomas"/> This system has been criticized by some for being unfair toward schools that have the highest population of minority and poor students, as it is harder for these schools to meet the standards set by the No Child Left Behind Act, due to insufficient funding from either local, district, or state actors. This in turn leads to a cycle of underperformance and sanctions within these areas which furthers the problems that the Act meant to fix.<ref>{{Cite news|last=Klein|first=Alyson|title=No Child Left Behind Overview: Definitions, Requirements, Criticisms, and More|language=en-US|work=Education Week|url=https://www.edweek.org/ew/section/multimedia/no-child-left-behind-overview-definition-summary.html|access-date=2018-11-07}}</ref>

      NCLB has shown mixed success in eliminating the racial achievement gap. Although test scores are improving, they are improving equally for all races, which means that minority students are still behind whites. There has also been some criticism as to whether an increase in test scores actually corresponds to improvements in education, since test standards vary from state to state and from year to year.<ref>{{cite news |url=https://www.nytimes.com/2009/04/29/education/29scores.html |title='No Child' Law Is Not Closing a Racial Gap |first=Sam |last=Dillon |date=28 April 2009 |newspaper=[[New York Times]] }}</ref>

      ==== Race to the Top ====
      In 2010, the [[Obama Administration]] instituted the [[Race to the Top]] (RTTT) program which provides financial incentives to states to produce measurable student gains. RTTT's primary goals are to improve student achievement, close achievement gaps, and improve high school graduation rates.<ref>"Fact Sheet: The Race to the Top". The White House. Archived from the original on April 9, 2011. Retrieved April 9,2011.</ref> The goals of both programs has been to close the achievement gap, but the RTTT has been more focused on closing the gap between higher and lower performing schools rather than focusing on a national approach.<ref name=":22">{{Cite web|last=Director|first=Judith Lohman, Assistant|title=COMPARING NO CHILD LEFT BEHIND AND RACE TO THE TOP|url=https://www.cga.ct.gov/2010/rpt/2010-R-0235.htm|access-date=2018-11-07|website=www.cga.ct.gov}}</ref> The major difference between the two educational reform programs is that RTTT is a competitive grant program that provides incentives for schools to change, while the NCLB Act mandated various changes in state and local education systems.<ref name=":22" /> The RTTT's approach is more adaptable and focused as it allows for individual actions between schools, and is meant to encourage reform within schools without resorting to punishments, whereas the No Child Left Behind Act relies on punishments as its main form of promoting reform in schools.

      ==== Common Core ====
      Another attempt to standardize the education of students is the [[Common Core State Standards Initiative]], also known as Common Core. The Common Core, created in 2009 and 2010, sets benchmarks for the skills that students should have by certain grade levels in subjects such as Math and Language Arts and the system itself is to meant to be a national baseline for how students are achieving. This baseline is meant to help establish what students need in order to achieve in higher education.<ref name=":32">{{Cite news|date=2014-03-26|title=What problems is the Common Core trying to solve?|language=en|work=Vox|url=https://www.vox.com/cards/commoncore/3-what-problems-is-the-common-core-trying-to-solve|access-date=2018-11-07}}</ref> While the standards are meant to be nationwide, they have only been adopted by 35 states as it is not mandatory for states to subscribe to the Common Core unless they desire federal grants.<ref name=":32" /><ref>{{Cite news|title=Map: Tracking the Common Core State Standards|language=en-US|work=Education Week|url=https://www.edweek.org/ew/section/multimedia/map-states-academic-standards-common-core-or.html|access-date=2018-11-07}}</ref> The Common Core Initiative has been criticized as it has not yielded any noticeable improvement in what has almost 10 years since it has been implemented, due to a multiple reasons, from incorrect implementation to content as the idea of a centralized system for education has been criticized for not taking the dynamic differences in learning-style into consideration.<ref>{{Cite news|last=McCluskey|first=Neal|title=Common Core Doesn't Seem To Be Working; That May Be Just Fine|language=en|work=Forbes|url=https://www.forbes.com/sites/nealmccluskey/2018/10/18/common-core-doesnt-seem-to-be-working-that-may-be-just-fine/#1b9d5bbb6993|access-date=2018-11-07}}</ref>

      ==== Every Student Succeeds Act ====
      The newest addition to the growing list of government-led initiatives has been the [[Every Student Succeeds Act]] (ESSA). The ESSA, enacted in December 2015, is Congress's replacement for the NCLB. The ESSA takes notes from both the RTTT and the NCLB, by keeping the standardized testing of the NCLB while allowing for the flexibility of the RTTT. The ESSA gives states more say in how schools are held accountable, and how states can act to fix issues at their schools, and as such, states can set long-term goals instead of having to worry about year-to-year performance issues as with the NCLB.<ref>{{Cite news|last=Klein|first=Alyson|title=The Every Student Succeeds Act: An ESSA Overview|language=en-US|work=Education Week|url=https://www.edweek.org/ew/issues/every-student-succeeds-act/index.html|access-date=2018-11-07}}</ref> States must still identify low performing schools and provide additional support, but now states can focus on long-term solutions. The new bill also focuses more on academic growth, which is subjective and does not always line up with a student's grade level, whereas the NCLB only cared whether students were performing to grade level.<ref>{{Cite news|title=The ABC's of ESEA, ESSA and No Child Left Behind – Education Post|language=en-US|work=Education Post|url=http://educationpost.org/the-abcs-of-esea-essa-and-no-child-left-behind/|access-date=2018-11-07}}</ref> By combining the standardized test requirements of the NCLB while allowing for more state control like in the RTTT, the ESSA hopes to achieve long-lasting success and reform.

      ===Institutional changes===
      Research has shown that making certain changes within schools can improve the performance of minority students. These include lowering class size in schools with a large population of minority students; expanding access to high-quality preschool programs to minority families;<ref name="kober12"/> and focus on teaching the critical thinking and problem-solving skills that are necessary to retain high-level information.<ref name="singham11"/>

      ==== School-based reform ====
      Initiatives to close the achievement gap have been implemented at the school, district and state level in order to better address the issue. These include investments in pre-kindergarten programs, class size reduction, small schools, curricular reform, alignment of pre-kindergarten through college standards and expectations, and improved teacher education programs.<ref>"Bridging the Achievement Gap" John E. Chubb & Tom Loveless, 2002</ref> Many schools have started implementing [[After-school activity|after-school activities]] such as tutoring sessions, remedial programs, and rapid assessment programs. These programs are meant to help minority students learn at a more accelerated rate in order to help them catch up to their peers. Other schools have started de-tracking their students in order to provide the same quality education for all students, regardless of race. De-tracking not only allows for all students to be taught in the same way, but it also opens up new opportunities for students who would be put on a certain career path by their education.

      ====Charter schools====
      In the United States there are now 5,042 charter schools serving 1.5 million students in 39 states and Washington, D.C.<ref name="EdWeek2011">"Charter Schools". Education Week, 2011.</ref> Although they serve only a fraction of the nation's public school students, charter schools have seized a prominent role in education today. The question of whether charters or traditional public schools do a better job of educating students is still open to debate. The research is highly mixed due to the complexities of comparison and wide performance differences among charters.<ref name="EdWeek2011"/>

      [[Charter schools]] are by definition independent public schools. Although funded with taxpayer dollars, they operate free from many of the laws and regulations that govern traditional public schools. In exchange for that freedom, they are bound to the terms of a contract, or "charter," that lays out a school's mission, academic goals, and accountability procedures.<ref name="EdWeek2011"/> The average charter school enrollment is 372, compared with about 478 in all public schools. Researchers have linked small schools with higher achievement, more individualized instruction, greater safety, and increased student involvement.<ref name="EdWeek2011"/> With their relative autonomy, charter schools are also seen as a way to provide greater educational choice and innovation within the public school system. Another attraction of charter schools is that they often have specialized educational programs. Charters frequently take alternative curricular approaches, emphasize particular fields of study or serve special populations of students. That growth of charter schools has been particularly strong in cities. More than 55 percent of public charter schools were in urban settings. 
      <ref name="USDeptED">U.S. Department of Education 2011, p. 23.</ref> Some charters have high concentrations of minority students because demand for schooling alternatives is highest among such students, whom they say are often poorly served by the traditional public school systems. Lastly, another positive argument for charter schools is that they improve the existing school systems through choice and competition.<ref name=" USDeptED "/>

      However, there are some criticisms of charter schools. There is a high variability in the quality and success of charter schools across the nation. A high-profile report from the [[American Federation of Teachers]] (2002), for example, argued that many charter school authorizers have failed to hold the administrators and teachers accountable, leaving some students to languish in low-performing schools.<ref>American Federation of Teachers, "Do Charter Schools Measure Up?: The Charter School Experiment After 10 Years," 2002</ref> Another concern of critics is that charters are more racially segregated than traditional public schools, thus denying students the educational "benefits associated with attending diverse schools".<ref>The Civil Rights Project at Harvard University, "Choice Without Equity:  Charter School Segregation and the Need for Civil Rights Standards," 2010.</ref> Skeptics also worry that charter schools unfairly divert resources and policy attention from regular public schools.

      Taken together, studies about charter schools are inconclusive and have mixed results. Studies by the [[Goldwater Institute]] and California State University-Los Angeles found that students in charter schools show higher growth in achievement than their counterparts in traditional public schools.<ref name=" USDeptED "/> However, another study by the Institute of Race and Poverty at the University of Minnesota Law show that after two decades of experience, most charter schools in the Twin Cities still underperform comparable traditional public schools and are highly segregated by race and income.<ref>.Huff, Cynthia. "Study Shows Charter Schools Still Lag behind Traditional Public Schools in Test Scores and Are Increasingly Segregated by Race and Income." University of Minnesota. N.p., Feb. 2012. Web. <http://www1.umn.edu/news/news-releases/2012/UR_CONTENT_375590.html>.</ref>

      =====Non-English schools=====
      To evade a shift to English, some Native American tribes have initiated language immersion schools for children, where a native Indian language is the medium of instruction. For example, the [[Cherokee Nation]] instigated a 10-year language preservation plan that involved growing new fluent speakers of the [[Cherokee language]] from childhood on up through school immersion programs as well as a collaborative community effort to continue to use the language at home.<ref>{{Cite web| title = Native Now: Language: Cherokee| work = We Shall Remain – American Experience – PBS| access-date = April 9, 2014| year = 2008| url = https://www.pbs.org/wgbh/amex/weshallremain/native_now/language_cherokee| archive-date = April 7, 2014| archive-url = https://web.archive.org/web/20140407132754/http://www.pbs.org/wgbh/amex/weshallremain/native_now/language_cherokee}}</ref> This plan was part of an ambitious goal that in 50 years, 80% or more of the Cherokee people will be fluent in the language.<ref name=preservation/> The [[Cherokee Preservation Foundation]] has invested $3 million into opening schools, training teachers, and developing curricula for language education, as well as initiating community gatherings where the language can be actively used.<ref name=preservation>{{Cite web| title = Cherokee Language Revitalization| work = Cherokee Preservation Foundation| access-date = April 9, 2014| year = 2014| url = http://www.cherokeepreservationfdn.org/cultural-preservation-connect/major-programs-and-initiatives/cherokee-language-revitalization| archive-url = https://web.archive.org/web/20140407070520/http://www.cherokeepreservationfdn.org/cultural-preservation-connect/major-programs-and-initiatives/cherokee-language-revitalization| archive-date = April 7, 2014}}</ref> Formed in 2006, the Kituwah Preservation & Education Program (KPEP) on the [[Qualla Boundary]] focuses on language immersion programs for children from birth to [[fifth grade]], developing cultural resources for the general public and community language programs to foster the Cherokee language among adults.<ref name="kpep">Kituwah Preservation & Education Program Powerpoint, by Renissa Walker (2012)'. 2012. Print.</ref>

      There is also a Cherokee language immersion school in Tahlequah, Oklahoma that educates students from pre-school through eighth grade.<ref>{{Cite news| last = Chavez, Will| title = Immersion students win trophies at language fair| work = Cherokeephoenix.org| access-date = April 8, 2013| date = April 5, 2012| url = http://www.cherokeephoenix.org/Article/Index/6142}}</ref> Because Oklahoma's official language is English, Cherokee immersion students are hindered when taking state-mandated tests because they have little competence in English.<ref name=immersion>{{cite web |url=http://www.youthonrace.org/cherokee-immersion-school-strives-to-save-tribal-language |title=Cherokee Immersion School Strives to Save Tribal Language |publisher=Youth on Race |access-date=June 5, 2014  |archive-url=https://web.archive.org/web/20140703212619/http://www.youthonrace.org/cherokee-immersion-school-strives-to-save-tribal-language |archive-date=July 3, 2014 }}</ref>  The Department of Education of Oklahoma said that in 2012 state tests: 11% of the school's sixth-graders showed proficiency in math, and 25% showed proficiency in reading; 31% of the seventh-graders showed proficiency in math, and 87% showed proficiency in reading; 50% of the eighth-graders showed proficiency in math, and 78% showed proficiency in reading.<ref name=immersion/> The Oklahoma Department of Education listed the charter school as a Targeted Intervention school, meaning the school was identified as a low-performing school but has not so that it was a Priority School.<ref name=immersion/> Ultimately, the school made a C, or a 2.33 grade point average on the state's A-F report card system.<ref name=immersion/> The report card shows the school getting an F in mathematics achievement and mathematics growth, a C in social studies achievement, a D in reading achievement, and an A in reading growth and student attendance.<ref name=immersion/> "The C we made is tremendous," said school principal Holly Davis, "[t]here is no English instruction in our school's younger grades, and we gave them this test in English."<ref name=immersion/> She said she had anticipated the low grade because it was the school's first year as a state-funded [[charter school]], and many students had difficulty with English.<ref name=immersion/> Eighth graders who graduate from the Tahlequah immersion school are fluent speakers of the language, and they usually go on to attend [[Sequoyah High School (Tahlequah, Oklahoma)|Sequoyah High School]] where classes are taught in both English and Cherokee.

      ====Private schools====
      {{Main|School voucher}}

      [[Private schools]] are another institution used in attempt to narrow the racial achievement gap. 
      A disparity between achievement gaps in private and public schools can be seen using a U.S. Department of Education database to compute the average National Assessment of Educational Progress test score differences between black students and white students in both public and private schools.

      {| class="wikitable" 
      |+NAEP Achievement Differences for Public and Private Schools
      |-
      ! NAEP Test Subject!! Year !! 4th Grade Gap (Public) !! 12th Grade Gap (Public) !! Percent Difference* Between 4th and 12th Grade Gaps (Public) !! 4th Grade Gap (Private) !! 12th Grade Gap (Private) !! Percent Difference* Between 4th and 12th Grade Gaps (Private)
      |-
      | Reading || 2002 || 29 || 25 || −13.8 || 27 || 14 || −48.1
      |-
      | Writing || 2002 || 20 || 23 || 15 || 22 || 18 || −18.2
      |-
      | Math || 2000 || 30 || 33 || 10 || 28 || 23 || −17.9
      |-
      | Science || 2001 || 35 || 31 || −11.4 || 27 || 20 || −25.9
      |}

      The table on white/Black NAEP Achievement Differences for Public and Private Schools above, shows a sizeable achievement gap between black and white fourth-graders in both public and private schools. However, the private-sector achievement gap is narrower in the 12th grade than the fourth grade for all of the core NAEP subjects. Public schools, on the other hand, see a larger gap in both writing and mathematics at the 12th-grade level than at the fourth. Averaged across subjects, the public school racial achievement gap is virtually unchanged between fourth and 12th grades, while the gap in private schools is an average of 27.5 percentage points smaller in the 12th grade than the fourth.

      The achievement gap closes faster in private schools not because white private school students lose ground with respect to white public school students as they move to higher grades, but because black private school students learn at a substantially higher rate than black public school students. Economist Derek Neal has found that black students attending urban private schools are far more likely to complete high school, gain admission to college, and complete college than similar students in urban public schools.<ref name="Coulson">{{cite web |last=Coulson |first=Andrew |year=2005 |title=Private Schools Are Closing the Achievement Gap |work=Heartlander |url=https://www.heartland.org/news-opinion/news/private-schools-are-closing-the-achievement-gap }}</ref> Similarly, in a study comparing graduation rates of all Milwaukee public school students (of all income levels) with those of the low-income participants in the city's private school voucher program, Manhattan Institute Senior Fellow Jay Greene found the voucher students were more than one-and-a-half-times as likely to graduate as public school students.<ref name=" Coulson "/>

      However, others argue that private schools actually perpetuate and exacerbate the achievement gap. Without controlling for student background differences, private schools scored higher than public schools. However, a study showed that demographic differences between students in public and private schools more than account for the relatively high scores of private schools. In fact, after controlling for these differences, the advantageous "private school effect" disappears and even reverses in most cases.<ref>{{cite web |last1=Lubienski |first1=Christopher |last2=Lubienski |first2=Sarah |year=2006 |title=Charter, Private, Public Schools and Academic Achievement: New Evidence from NAEP Mathematics Data |publisher=National Center for the Study of Privatization in Education Teachers College, Columbia University |url=https://ncspe.tc.columbia.edu/working-papers/OP111.pdf |access-date=April 19, 2018 |archive-date=October 27, 2021 |archive-url=https://web.archive.org/web/20211027025625/https://ncspe.tc.columbia.edu/working-papers/OP111.pdf  }}</ref> Private schools have selective acceptance and a different demographic. Another criticism is that private schools only serve a small percent of the population and therefore cannot make a huge effect on closing the achievement gap.

      Greg Wiggan believes that although there is a lot of research on the topic of the racial achievement gap, there is a gap in the research. Wiggan believes that the gap that is missing is the research of the perspective of the students, specifically high-achieving Black students in private schools.<ref name=":02"/>

      ==== Resources for poor school districts ====
      Another explanation to address this educational gap is the lack of resources attainable by certain groups of students. A study found that there is a need for financial literacy for students enrolled in colleges and universities. Specifically, there is a need for student knowledge about loans, budgeting, and time requirements for degree completion.<ref>{{cite journal|last1=Eichelberger|first1=Brenda|last2=Mattioli|first2=Heather|last3=Foxhoven|first3=Rachel|date=1 January 2017|title=Uncovering Barriers to Financial Capability: Underrepresented Students' Access to Financial Resources|url=https://pdxscholar.library.pdx.edu/busadmin_fac/92/|journal=Journal of Student Financial Aid|volume=47|issue=3|doi=10.55504/0884-9153.1634|s2cid=216921981|doi-access=free}}</ref> Focus group results in the same study concluded that students in search of financial aid information believe that there will be a lack of understanding among advisors and staff regarding minority student's cultural/identity based circumstances. As a result of this belief, many students rather just not seek any services.

      On the high school level, a report finds that the more people of color enrolled at any particular school, the less likely that the school offers any computer science courses whatsoever.<ref name=":03">{{cite news|last1=Zelinski|first1=Nikolas|date=20 May 2015|title='Path Not Found': Report Says Low-income Students Lack Computer Access|pages=3, 8|id={{ProQuest|1686085124}}}}</ref> Nationwide economics indicate 1.3 million new jobs in the tech industry by 2022. Meanwhile, African Americans and Latinos only make up about 5 percent of the technical work force.<ref name=":03" />

      Supplemental funding for targeted disadvantaged school districts in Ohio showed a reduction in performance gaps between disadvantaged districts and other districts. Supplementing state funds for the districts with higher numbers of disadvantaged students produced benefits in the form of student achievement.<ref>{{cite journal|last1=Henry|first1=Gary T.|last2=Fortner|first2=C. Kevin|last3=Thompson|first3=Charles L.|date=June 2010|title=Targeted Funding for Educationally Disadvantaged Students: A Regression Discontinuity Estimate of the Impact on High School Student Achievement|journal=Educational Evaluation and Policy Analysis|volume=32|issue=2|pages=183–204|doi=10.3102/0162373710370620|s2cid=84840375}}</ref> IDAs, or individual development account initiatives, introduced in the 1990s to address poverty, were based on the belief that poor families should have access to asset development in order to break the cycle of poverty.<ref name=":12">{{cite journal|last1=Kezar|first1=Adrianna|last2=Lester|first2=Jaime|last3=Yang|first3=Hannah|date=May 2010|title=Nonprofits Partnering With Postsecondary Institutions to Increase Low-Income Student Access|journal=Educational Policy|volume=24|issue=3|pages=500–533|doi=10.1177/0895904809335108|s2cid=145317365}}</ref> As of now the main focus of most IDAs is on home ownership or starting small businesses. There has been a push for partnerships between community agencies and higher education institutions that would offer IDAs to encourage lower income individuals to turn towards higher education.<ref name=":12" />

      ==== Teacher-focused reform ====
      Another focus of reform directed toward the achievement gap has been on teacher development, as research shows that since teachers are responsible for almost every aspect of a child's education within the bounds of a classroom. Therefore, in order to best address the achievement gap, reform efforts based on improved teaching are one of the main strategies used to address the gap. This reform effort has been both top-down, in the form of higher state standards for teacher education and preparation,<ref>{{cite journal|last1=Darling-Hammond|first1=Linda|date=November 1997|title=Doing What Matters Most: Investing in Quality Teaching|id={{ERIC|ED415183}}}}</ref> as well as bottom-up, through programs like Teach for America and AmeriCorps that aim to address educational inequity by recruiting and training teachers specifically to work in high-needs schools.<ref>{{cite web|title=Teach for America: Our Approach|url=http://www.teachforamerica.org/what-we-do/our-approach/|archive-url=https://web.archive.org/web/20110726212432/http://www.teachforamerica.org/what-we-do/our-approach/|archive-date=July 26, 2011|access-date=April 13, 2011}}</ref><ref>{{cite web|title=Federal Way Public Schools AmeriCorps team|url=http://www.fwps.org/dept/volunteer/acfw.html|archive-url=https://web.archive.org/web/20120419162328/http://www.fwps.org/dept/volunteer/acfw.html|archive-date=April 19, 2012|access-date=October 17, 2011}}</ref>

      ====Teach For America====

      [[Teach for America]] (TFA) recruits and selects graduates from some of the top colleges and universities across the country to teach in the nation's most challenging K-12 schools throughout the nation. It began in 1990 with 500 teachers and has since expanded to over 4,000 teacher placements in 2010.<ref name="Xu">{{cite journal |last1=Xu |first1=Zeyu |last2=Hannaway |first2=Jane |last3=Taylor |first3=Colin |title=Making a Difference? The Effect of Teach For America in High School |journal=Journal of Policy Analysis and Management |year=2011 |volume=30 |issue=3 |pages=447–469 |doi=10.1002/pam.20585 |url=https://issuelab.org/resources/7450/7450.pdf }}</ref> In the Journal of Policy Analysis and Management they use individual-level student data linked to teacher data in North Carolina to estimate the effects of having a TFA teacher compared to a traditional teacher. According to studies about the effect of different teacher-preparation programs in Louisiana, North Carolina, and Tennessee, TFA is among the most effective sources of new teachers in low-income communities. Each of these statewide studies, conducted between 2009 and 2012, found that corps members often help their students achieve academic gains at rates equal to or larger than those for students of more veteran teachers.<ref>{{cite web |title=Research |work=Teach For America |url=http://www.teachforamerica.org/our-organization/research |access-date=November 29, 2012 |archive-date=January 6, 2013 |archive-url=https://web.archive.org/web/20130106034549/http://www.teachforamerica.org/our-organization/research  }}</ref> The findings show that TFA teachers are in general more effective, according to student exam scores, than traditional teachers that would be in the classroom in their stead.<ref name="Xu"/> These estimates demonstrate that, compared with traditional teachers with similar levels of experience, TFA teachers have strong positive effects on student test scores. And despite the limitations of TFA teachers, they are no worse than average traditional teachers in teaching math subjects and much more effective in teaching science subjects.

      Although TFA teachers tend to have stronger academic credentials, they have not been taught in traditional training programs, are more likely to teach for a few years, and are assigned to some of the most challenging schools in the country.<ref>{{cite journal |last1=Boyd |first1=D. J. |last2=Grossman |first2=P. |last3=Lankford |first3=H. |last4=Loeb |first4=S. |last5=Wyckoff |first5=J. |year=2006 |title=How changes in entry requirements alter the teacher workforce and affect student achievement |journal=Education Finance and Policy |volume=1 |issue=2 |pages=176–216 |doi=10.1162/edfp.2006.1.2.176 |s2cid=7386738 |url=http://www.nber.org/papers/w11844.pdf }}</ref> Given these differences, the TFA program has been controversial. Critics of Teach For America point out two of the major problems. The first is that most TFA teachers have not received traditional teacher training. TFA corps members participate in an intensive five-week summer national institute and a two-week local orientation and induction program prior to their first teaching assignment, and therefore some argued they are not as prepared for the demands of the classroom as traditionally trained teachers. The second criticism is that TFA requires only a two-year teaching commitment, and the majority of corps members leave at the end of that commitment. The short tenure of TFA teachers is troubling because research shows that new teachers are generally less effective than more experienced teachers.<ref name="Xu"/>

      ==== Narrowing the achievement gap through technology ====
      Computer and technology use have been linked to increased student achievement. "When teachers and administrators make a sustained commitment to the use of [[computers in the classroom]], student achievement increases (Mann & Shafer, 1997).<ref>{{cite journal|last1=Mann|first1=D.|last2=Shafer|first2=E.|year=1997|title=Technology and Achievement|url=http://www.asbj.com/achievement/cilcilo.html|journal=The American School Board Journal|access-date=November 14, 2020|archive-date=August 14, 2017|archive-url=https://web.archive.org/web/20170814215553/http://www.asbj.com/achievement/cilcilo.html}}</ref> Randomized experiments demonstrate that the performance of low-achieving students can be improved by using technology that adjusts the level of difficulty of the books and math problems that are presented to each student, raises the probability that each student will achieve high scores on end-of-book reading comprehension quizzes and high accuracy scores on daily math assignments, raises the probability that each student can earn high letter grades, and creates a structured environment where each student is likely to receive regular, objective, positive feedback signaling that he or she is advancing on a daily basis, promoting high [[self-efficacy]] and a strong sense of control over academic outcomes.<ref>{{cite journal|last1=Ysseldyke|first1=Jim|last2=Bolt|first2=Daniel M.|date=1 September 2007|title=Effect of Technology-Enhanced Continuous Progress Monitoring on Math Achievement|journal=School Psychology Review|volume=36|issue=3|pages=453–467|doi=10.1080/02796015.2007.12087933|s2cid=131762966}}</ref><ref>Ross, Steven M., Nunnery, John, & Goldfeder, Elizabeth (2004). A Randomized Experiment on the Effects of Accelerated Reader/Reading Renaissance in an Urban School District: Final Evaluation Report. (Memphis, TN: University of Memphis Center for Research in Educational Policy).</ref><ref>{{cite journal|last1=Nunnery|first1=John A.|last2=Ross|first2=Steven M.|last3=McDonald|first3=Aaron|year=2006|title=A Randomized Experimental Evaluation of the Impact of Accelerated Reader/Reading Renaissance Implementation on Reading Achievement in Grades 3 to 6|journal=Journal of Education for Students Placed at Risk|volume=11|issue=1|pages=1–18|doi=10.1207/s15327671espr1101_1|s2cid=73699446}}</ref> This demonstrates that it is possible to increase engagement, effort and performance, even when the tasks presented to each student become progressively more difficult, if technology is used to individualize task difficulty and create a structure where it is possible for all students to achieve high reading comprehension and math accuracy scores on a regular basis.<ref name="Yeh, Stuart S. 20172"/> A comparison of the cost-effectiveness of this approach indicates that it is more efficient than 22 other strategies for raising student achievement.<ref>{{cite journal|last=Yeh|first=Stuart S.|year=2010|title=The Cost-Effectiveness of 22 Approaches for Raising Student Achievement|journal=Journal of Education Finance|volume=36|issue=1|pages=38–75|doi=10.1353/jef.0.0029|s2cid=59404703}}</ref>

      Generally, those students who enrolled and finished online courses were older college students.<ref>{{cite journal|last1=Fetzner|first1=Marie|date=31 January 2013|title=What Do Unsuccessful Online Students Want Us To Know?|journal=Online Learning|volume=17|issue=1|doi=10.24059/olj.v17i1.319|id={{ERIC|EJ1011376}}|doi-access=free}}</ref><ref>{{cite journal|last1=James|first1=Scott|last2=Swan|first2=Karen|last3=Daston|first3=Cassandra|date=22 December 2015|title=Retention, Progression and the Taking of Online Courses|journal=Online Learning|volume=20|issue=2|doi=10.24059/olj.v20i2.780|doi-access=free}}</ref><ref>{{cite thesis|last1=Newell|first1=Chandler Clay|title=Learner characteristics as predictors of online course completion among nontraditional technical college students|date=May 2007|hdl=10724/23943|hdl-access=free}}</ref><ref name="comparisons">{{cite journal|last1=Romero|first1=Margarida|last2=Usart|first2=Mireia|date=1 July 2014|title=The Temporal Perspective in Higher Education Learners: Comparisons between Online and Onsite Learning|journal=European Journal of Open, Distance and E-Learning|volume=17|issue=1|pages=190–209|doi=10.2478/eurodl-2014-0013|doi-access=free}}</ref> Also, these students have better chance to perform higher [[self-efficacy]] scores (Xie & Huang, 2014)<ref>{{cite journal|last1=Xie|first1=K.|last2=Huang|first2=K.|year=2014|title=The role of beliefs and motivation in asynchronous online learning in collegelevel classes|journal=Journal of Educational Computing Research|volume=50|issue=3|pages=315–341|doi=10.2190/EC.50.3.b|s2cid=146542860}}</ref> and future career ambitions or higher incomes (Carr, 2000; Park & Choi, 2009).<ref>{{cite journal|last1=Carr|first1=S|year=2000|title=As distance education comes of age, the challenge is keeping the students|journal=Chronicle of Higher Education|volume=46|issue=23|pages=39–41}}</ref><ref>{{cite journal|last1=Park|first1=Ji-Hye|last2=Choi|first2=Hee Jun|date=2009|title=Factors Influencing Adult Learners' Decision to Drop Out or Persist in Online Learning|journal=Journal of Educational Technology & Society|volume=12|issue=4|pages=207–217|jstor=jeductechsoci.12.4.207}}</ref> Studies shows that online learners are tend to less likely to make friends and become socialized (Varela et al., 2012),<ref>{{cite journal|last1=Varela|first1=O. E.|last2=Cater|first2=J. J.|last3=Michel|first3=N.|year=2012|title=Online learning in management education: An empirical study of the role of personality traits|journal=Journal of Computing in Higher Education|volume=24|issue=3|page=209|doi=10.1007/s12528-012-9059-x|s2cid=27412934}}</ref> while there's possible cause for example the experience of disappointing relationships in the context of education (Romero & Usart, 2014).<ref name="comparisons" /> As Friedman (2007)<ref>Friedman, T. L. (2007). The world is flat: A brief history of the TwentyFirst Century (3rd ed.). New York, NY: Picador.{{page needed|date=August 2020}}</ref> claimed that the world is flat, online education has made the education becomes more accessible for a wider range of students. But there's also some counterpoints of online education for example: lack of technical support (Palmer & Holt, 2010; Yang & Cornelius, 2014);<ref name="learntechlib.org">{{cite journal|last1=Palmer|first1=S.|last2=Holt|first2=D.|year=2010|title=Students' perceptions of the value of the elements of an online learning environment: Looking back in moving forward|journal=Interactive Learning Environments|volume=18|issue=2|pages=135–151|doi=10.1080/09539960802364592|s2cid=19562104}}</ref> inadequate teacher support (Palmer & Holt, 2010);<ref name="learntechlib.org" /> feeling of isolation (Reilly, Gallagher-Lepak, & Killion, 2012; Tucker, 2014; Yang & Cornelius, 2004).<ref>{{cite journal|last1=Reilly|first1=J.|last2=GallagherLepak|first2=S.|last3=Killion|first3=C.|year=2012|title="Me and my computer": Emotional factors in online learning|journal=Nursing Education Perspectives|volume=33|issue=2|pages=100–105|doi=10.5480/1536-5026-33.2.100|pmid=22616408|s2cid=27228863|doi-access=free}}</ref><ref name="Tucker, W. G. 20142">{{cite thesis|last1=Tucker|first1=Wanda Gail|date=2014|title=Spaces for success in higher education: Males of color at an online predominantly white community college|id={{ProQuest|1545673941}}}}</ref><ref>{{cite conference|last1=Yang|first1=Yi|last2=Cornelius|first2=Linda F.|date=October 2004|title=Students' Perceptions towards the Quality of Online Education: A Qualitative Approach|conference=27th Association for Educational Communications and Technology Convention|location=Chicago|id={{ERIC|ED485012}}}}</ref>

      Using technology as a tool for narrowing the achievement gap begins with a purpose, communication, listening, and collaboration. These skills can be achieved through the use of weblogs, social networking sites, feeds, and myriad other multimedia. In classrooms, students can communicate internally, or they can work side by side with others who are located thousands of miles away. Through the use of technology, presentations can be archived so that the material can be reviewed at any time. "All teachers could record important parts of what they do in the classroom that can then be archived to the class Weblog and used by students who may have missed the class or just want a refresher on what happened." (Richardson, p.&nbsp;117)<ref name="Richardson, W. 2010">Richardson, W. (2010), Blogs, Wikis, Podcasts, and Other Powerful Web Tools for Classrooms</ref>

      Having access to information on the web gives students an advantage to learning. "Students at all levels show more interest in their work and their ability to locate and reflect upon their work is greatly enhanced as are the opportunities for collaborative learning" (Richardson, p.&nbsp;28).<ref name="Richardson, W. 2010" /> Weblogs are different from posts or comments; they require students to analyze and synthesize the content and communicate their understanding with the audience responses in mind.

      Technology has been incorporated into the Standards. Even though the NCLB Act holds school districts accountable for student achievement, there are still many students who do not have the resources at home to fully take part in these excellent educational tools. Some teachers feel that technology is not the solution and see it as a risk. Therefore, technology is not always being used to its fullest potential by teachers and students do not gain the advantages technology offers. "Given the fact that the amount of information going online shows no sign of slowing, if they are unable to consistently collect potentially relevant information for their lives and careers and quickly discern what of that information is most useful, they will be at a disadvantage." (Richardson, p.&nbsp;73).<ref name="Richardson, W. 2010" />

      According to the U.S. Census, by 2012, it is estimated that 70% of homes will have broadband access. While this is a large percentage, it still leaves 30% of households without internet access. The government has lent its hand in closing the Global Achievement Gap by granting funding for low-income school districts for programs such as one-on-one computing, however, the fact that many of these students do not have online capability at home is still a main issue. This [[digital divide]] may cause the achievement gap to increase as technology continues to become heavily integrated in the daily coursework for school children. Students need to have Internet access outside of school on a regular basis to successfully complete challenging coursework.

      According to National Center for Education Statistics, it noted that African American 12th grade male students had the lowest reading scores among other racial and ethnic group. Reading gaps between African Americans and Whites have increased from 1992 to present (National Center for Education Statistics, 2016).<ref name="auto32"/> Tonsing-Meyer (2012)<ref>{{cite thesis|id={{ProQuest|1029872195}}|last1=Tonsing-Meyer|first1=Julie A|year=2012|title=An Examination of Online Instructional Practices Based on the Learning Styles of Graduate Education Students}}</ref> claimed that the reading and writing practice was specified and emphasized in 85% of online course assignment, with activities attached, which might improve this situation.

      Students who have problems with technology interfered are more likely to withdraw from their online courses (Bambara et al., 2009).<ref>{{cite journal|last1=Bambara|first1=Cynthia S.|last2=Harbour|first2=Clifford P.|last3=Davies|first3=Timothy Gray|last4=Athey|first4=Susan|author-link4=Susan Athey|date=January 2009|title=Delicate Engagement: The Lived Experience of Community College Students Enrolled in High-Risk Online Courses|journal=Community College Review|volume=36|issue=3|pages=219–238|doi=10.1177/0091552108327187|s2cid=145226916}}</ref> Also, there's no sufficient technology support which will also leads students to drop the class since their problems could not be solved quickly (Palmer & Holt, 2010; Yang & Cornelius, 2004).<ref name="learntechlib.org" />

      Students who were more focused and engaged themselves to the class tends to receive higher grades; their self-confidence can be gained through daily life use of Internet (Sahin & Shelley, 2008).<ref>{{cite journal|last1=Sahin|first1=Ismail|last2=Shelley|first2=Mack|date=2008|title=Considering Students' Perceptions: The Distance Education Student Satisfaction Model|journal=Journal of Educational Technology & Society|volume=11|issue=3|pages=216–223|jstor=jeductechsoci.11.3.216}}</ref> Male online learners had higher Internet [[self-efficacy]] than female, while they participated less in discussions (Chang et al., 2014; Ong & Lai, 2006).<ref>{{cite journal|last1=Chang|first1=Chiung-Sui|last2=Liu|first2=Eric Zhi-Feng|last3=Sung|first3=Hung-Yen|last4=Lin|first4=Chun-Hung|last5=Chen|first5=Nian-Shing|last6=Cheng|first6=Shan-Shan|date=4 July 2014|title=Effects of online college student's Internet self-efficacy on learning motivation and performance|journal=Innovations in Education and Teaching International|volume=51|issue=4|pages=366–377|doi=10.1080/14703297.2013.771429|s2cid=143854369}}</ref><ref>{{cite journal|last1=Ong|first1=Chorng-Shyong|last2=Lai|first2=Jung-Yu|date=September 2006|title=Gender differences in perceptions and relationships among dominants of e-learning acceptance|journal=Computers in Human Behavior|volume=22|issue=5|pages=816–829|doi=10.1016/j.chb.2004.03.006}}</ref>

      As Fletcher (2015)<ref name="Fletcher, R. P. 2015">{{cite thesis|last1=Fletcher|first1=Randall Paul|title=Voices of persistence: a case study analysis of African American male community college students participating in a first-year learning community|date=17 April 2015|hdl=2142/78376|hdl-access=free}}</ref> indicated, possible factors that helped African American college students to gain academic success via online education might be: positive pre-college educational experiences, supportive environments in college campus, involving in campus activities, positive faculty interactions and support, same race/gender relationships with peers, family support, self-confidence, future career ambitions and the ability to face racism.

      ==== College environment ====
      Students of color like African American students need a color-blind environment to support them reaching towards academic success better.{{according to whom|date=August 2019}} In this way, they are more likely to gain self-confidence and educational resilience (Tucker, 2014).<ref name="Tucker, W. G. 20142"/>

      ==== Interventions for non-cognitive factors ====
      Many different types of interventions can be done to help students who are a part of a negative stereotype. One example is a self-affirmation intervention.<ref name=":1">{{Cite journal|last1=Cohen|last2=Garcia|last3=Apfel|last4=Master|first1=Geoffrey|first2=Julio|first3=Nancy|first4=Allison|date=September 2006|title=Reducing the Racial Achievement Gap: A Social-Psychological Intervention|url=http://www-inst.eecs.berkeley.edu/~cs375/fa13/cs375/Science-2006-Cohen-1307-10.pdf|journal=Science|volume=313|issue=5791|pages=1307–1310|doi=10.1126/science.1128317|pmid=16946074|bibcode=2006Sci...313.1307C|s2cid=34989510}}</ref> This intervention was expected to help improve the academic performance of a group of at-risk students. It was tested in two different double-blind field experiences, and then compared.<ref name=":1" /> For African American students who were a part of the control condition and who saw their performance declining early in the term, their performance did not improve as the term went on, and in fact it got worse.<ref name=":1" /> One thing that could lead to a slight improvement is having a small reduction in the psychological threats. Having just one intervention one time does not have a positive effect on a student. Small interventions were seen to have a greater effect when they were carried out in multiple trials, different times.<ref name=":1" />

      ==Other items==
      ===Recent Developments===
      Impact of the COVID-19 Pandemic: Recent studies indicate that the pandemic has exacerbated existing educational inequalities. For instance, a study by Harvard, Stanford, and Dartmouth found that affluent districts have recovered more effectively than impoverished areas, widening the achievement gap. Conversely, some districts, like Compton, California, have made notable progress through targeted interventions such as hiring additional tutors and implementing extensive tutoring programs.<ref>[https://apnews.com/article/math-reading-school-district-test-scores-f110ef05fb62f673530f44b120863bec Most US kids aren’t gaining fast enough in reading and math. These schools are different] Retrieved 15 February 2025</ref>

      ===Progress and Persistent Disparities===
      While there have been significant milestones in Black political representation and economic progress, disparities persist, particularly in economic well-being. The median household wealth for Black families remains significantly lower than that of white families, highlighting the need for continued efforts to address socio-economic challenges.<ref>[https://www.myjournalcourier.com/opinion/article/celebrating-progress-confronting-inequality-20149769.php Progress and Persistent Disparities] Retrieved 15 February 2025</ref>

