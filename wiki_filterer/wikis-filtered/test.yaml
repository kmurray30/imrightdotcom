      {{Short description|Testing for COVID-19 in the United States of America}}
      {{See also|COVID-19 pandemic in the United States}}

      '''COVID-19 testing in the United States''' can identify whether a person is infected with [[SARS-CoV-2]], the virus which causes [[COVID-19]]. This helps health professionals ascertain how bad the epidemic is and where it is worst.<ref>{{cite news |url=https://www.statnews.com/2020/03/13/coronavirus-testing-long-way-to-go |title=Coronavirus testing is starting to get better—but it has a long way to go |work=[[Statnews.com]] |date=March 13, 2020 }}</ref> The accuracy of national statistics on the number of cases and deaths from the outbreak depend on knowing how many people are being tested every day, and how the available tests are being allocated.<ref>{{cite journal |url=https://ourworldindata.org/coronavirus-testing-source-data |title=Coronavirus Testing—Source Data |journal=Our World in Data |date=March 20, 2020 |author-link=Hannah Ritchie |last1=Ritchie |first1=Hannah }}</ref>

      == Timeline ==

      {{See also|COVID-19 testing|Trump administration communication during the COVID-19 pandemic#Testing}}
      [[File:Colorado National Guard (49673441472).jpg|thumb|March 18: Colorado National Guard, [[Colorado Department of Public Health and Environment|CDPHE]], and [[San Miguel County, Colorado|San Miguel County]] personnel assist at a drive-up testing center in [[Telluride, Colorado]].]]
      [[File:Utah National Guard (49897808562).jpg|thumb|May 14: COVID-19 test conducted in [[Salt Lake City]], [[Utah]]]]
      [[File:West Virginia National Guard - 49744586872.jpg|thumb|April 5: Testing team in [[Charleston, West Virginia]] responds to a confirmed case in a [[nursing home]].]]

      === January 2020 ===

      While the WHO opted to use an approach developed by Germany to test for SARS-CoV-2, the United States developed its own testing approach. The German testing method was made public on January 13, and the American testing method was made public on January 28. The WHO did not offer any test kits to the U.S. because the U.S. normally had the supplies to produce their own tests.<ref>{{cite news |last1=Greenberg |first1=Jon |last2=Knight |first2=Victoria |title=Mostly False: Joe Biden stated on March 15, 2020, in a Democratic primary debate: 'The World Health Organization offered the testing kits that they have available and to give it to us now. We refused them. We did not want to buy them.' |url=https://www.politifact.com/factchecks/2020/mar/16/joe-biden/biden-falsely-says-trump-administration-rejected-w/ |accessdate=March 24, 2020 |work=[[Politifact]] |date=March 16, 2020}}</ref>

      The United States had a slow start in widespread SARS-CoV-2 testing.<ref>{{cite news |last1=Shear |first1=Michael |last2=Goodnough |first2=Abby |last3=Kaplan |first3=Sheila |last4=Fink |first4=Sheri |last5=Thomas |first5=Katie |last6=Weiland |first6=Noah |title=The Lost Month: How a Failure to Test Blinded the U.S. to Covid-19 |url=https://www.nytimes.com/2020/03/28/us/testing-coronavirus-pandemic.html |accessdate=April 24, 2020 |work=[[The New York Times]] |date=March 29, 2020 |archiveurl=https://web.archive.org/web/20200330032224/https://www.nytimes.com/2020/03/28/us/testing-coronavirus-pandemic.html |archivedate=March 30, 2020}}</ref><ref>{{cite web |last1=Cohen |first1=Jon |title=The United States badly bungled coronavirus testing—but things may soon improve |url=https://www.science.org/content/article/united-states-badly-bungled-coronavirus-testing-things-may-soon-improve |website=[[Science (journal)|Science]] |date=February 28, 2020 |accessdate=March 9, 2020}}</ref> From the start of the outbreak until early March 2020, the CDC gave restrictive guidelines on who should be eligible for COVID-19 testing. The initial criteria were (a) people who had recently traveled to certain countries, or (b) people with respiratory illness serious enough to require hospitalization, or (c) people who have been in contact with a person confirmed to have coronavirus.<ref name=WangMarch22/>

      === February 2020 ===

      In February, the U.S. CDC produced 160,000 SARS-CoV-2 tests, but soon it was discovered that many were defective and gave inaccurate readings.<ref>{{cite news|last1= Willman |first1= David |url= https://www.washingtonpost.com/investigations/cdc-coronavirus-test-kits-were-likely-contaminated-federal-review-confirms/2020/06/20/1ceb4e16-b2ef-11ea-8f56-63f38c990077_story.html |title= CDC coronavirus test kits were likely contaminated, federal review confirms |date= June 20, 2020 |newspaper= [[The Washington Post]] |accessdate= 2020-08-26 |archiveurl= https://web.archive.org/web/20200822080238/https://www.washingtonpost.com/investigations/cdc-coronavirus-test-kits-were-likely-contaminated-federal-review-confirms/2020/06/20/1ceb4e16-b2ef-11ea-8f56-63f38c990077_story.html |archivedate= 2020-08-22 |url-status= live }}</ref><ref>{{cite news |last1=Kenen |first1=Joanne |title=How testing failures allowed coronavirus to sweep the U.S. |url=https://www.politico.com/news/2020/03/06/coronavirus-testing-failure-123166 |access-date=March 23, 2020 |work=Politico |date=March 8, 2020}}</ref> On February 19, the first U.S. patient with COVID-19 of unknown origin (a possible indication of [[community transmission]]) was hospitalized. The patient's test was delayed for four days because he had not qualified for a test under the initial federal testing criteria.<ref>{{cite news |last1=Abdalla |first1=Jihan |title=First US coronavirus case of unknown origin marks 'turning point' |url=https://www.aljazeera.com/news/2020/02/coronavirus-case-unknown-origin-marks-turning-point-200227154643100.html |accessdate=March 23, 2020 |publisher=[[Al Jazeera English|Al Jazeera]] |date=February 28, 2020}}</ref> By February 27, fewer than 4,000 tests had been conducted in the U.S.<ref name=WhoriskeyMarch16>{{cite news|last1=Whoriskey|first1=Peter|url=https://www.washingtonpost.com/business/2020/03/16/cdc-who-coronavirus-tests/|title=How U.S. coronavirus testing stalled: Flawed tests, red tape and resistance to using the millions of tests produced by the WHO|date=March 16, 2020|newspaper=[[The Washington Post]]|accessdate=March 18, 2020|last2=Satija|first2=Neena}}</ref> Although academic laboratories and hospitals had developed their own tests, they were not allowed to use them until February 29, when the FDA issued approvals for them and private companies.<ref name="WhoriskeyMarch16" /><ref name=LeeMarch21>{{cite news |last1=Lee |first1=Timothy |title=America is finally testing for coronavirus in significant volumes |url=https://arstechnica.com/tech-policy/2020/03/america-is-finally-testing-for-coronavirus-in-significant-volumes/ |accessdate=March 23, 2020 |work=[[Ars Technica]] |date=March 21, 2020}}</ref>

      From February 25, a group of researchers from the [[Seattle Flu Study]] defied federal and state officials to conduct their own tests, using samples already collected from flu study subjects who had not given permission for SARS-CoV-2 testing. They quickly found a teenager infected with SARS-CoV-2 of unknown origin, newly indicating that an outbreak had already been occurring in Washington for the past six weeks. State regulators stopped these researchers' testing on March 2, although the testing later resumed through the creation of the [[Seattle Coronavirus Assessment Network]].<ref>{{cite news |last1=Fink |first1=Sheri |last2=Baker |first2=Mike |title='It's Just Everywhere Already': How Delays in Testing Set Back the U.S. Coronavirus Response |url=https://www.nytimes.com/2020/03/10/us/coronavirus-testing-delays.html |accessdate=March 24, 2020 |work=[[The New York Times]] |date=March 10, 2020 |archiveurl=https://web.archive.org/web/20200319032719/https://www.nytimes.com/2020/03/10/us/coronavirus-testing-delays.html |archivedate=March 19, 2020}}</ref><ref>{{cite news |last1=Achenbach |first1=Joel |last2=Mettler |first2=Katie |last3=Sun |first3=Lena H. |last4=Guarino |first4=Ben |title=Coronavirus may have spread undetected for weeks in Washington state, which reported first two deaths in U.S. |url=https://www.washingtonpost.com/health/coronavirus-may-have-spread-undetected-for-weeks-in-washington-state/2020/03/01/0f292336-5bcc-11ea-9055-5fa12981bbbf_story.html |accessdate=April 5, 2020 |newspaper=The Washington Post |date=March 1, 2020| archiveurl=https://web.archive.org/web/20200420041821/https://www.washingtonpost.com/health/coronavirus-may-have-spread-undetected-for-weeks-in-washington-state/2020/03/01/0f292336-5bcc-11ea-9055-5fa12981bbbf_story.html |archivedate= April 20, 2020}}</ref>

      === March 2020 ===

      On March{{nbsp}}5, the CDC relaxed the criteria to allow doctors discretion to decide who would be eligible for tests.<ref name=WangMarch22>{{cite news |last1=Wang |first1=Jessica |last2=Huth |first2=Lindsay |last3=Umlauf |first3=Taylor |last4=Wang |first4=Elbert |last5=McKay |first5=Betsy |title=How the CDC's Restrictive Testing Guidelines Hid the Coronavirus Epidemic |url=https://www.wsj.com/articles/how-the-cdcs-restrictive-testing-guidelines-hid-the-coronavirus-epidemic-11584882001 |accessdate=March 23, 2020 |archivedate=March 22, 2020 |work=[[The Wall Street Journal]] |date=March 22, 2020 |archiveurl=https://web.archive.org/web/20200322145039/https://www.wsj.com/articles/how-the-cdcs-restrictive-testing-guidelines-hid-the-coronavirus-epidemic-11584882001}}</ref> Also on March 5, Vice President [[Mike Pence]], the leader of the coronavirus response team, acknowledged that "we don't have enough tests" to meet the predicted future demand; this announcement came only three days after [[FDA]] commissioner [[Stephen Hahn (oncologist)|Stephen Hahn]] committed to producing nearly a million tests by that week.<ref>{{cite news |title=Coronavirus: White House concedes US lacks enough test kits |url=https://www.bbc.com/news/world-us-canada-51761435 |accessdate=March 23, 2020 |work=[[BBC News]] |date=March 6, 2020}}</ref> Senator [[Chris Murphy]] of Connecticut and Representative [[Stephen F. Lynch|Stephen Lynch]] of Massachusetts both noted that as of March{{nbsp}}8 their states had not yet received the new test kits.<ref>{{cite web |last1=transcript |title=Transcript: Chris Murphy on "Face the Nation", March 8, 2020 |url=https://www.cbsnews.com/news/transcript-chris-murphy-on-face-the-nation-march-8-2020/ |website=Face the Nation |date=8 March 2020 |accessdate=March 9, 2020}}</ref><ref>{{cite web |last1=Cathey |first1=Libby |title=Government coronavirus response: Trump prepared to use the 'full power' of government |url=https://abcnews.go.com/Politics/government-coronavirus-response-updates-fauci-warns-congress-worse/story?id=69532695 |website=ABC News |accessdate=March 12, 2020}}</ref> By March 11, the U.S had tested fewer than 10,000 people.<ref name=worried>{{cite news |title=Coronavirus: Should Americans be worried? |url=https://www.bbc.com/news/world-us-canada-51649897 |accessdate=April 18, 2020 |work=[[BBC News]] |date=March 12, 2020}}</ref> Doctor [[Anthony Fauci]], head of the [[National Institute of Allergy and Infectious Diseases]], acknowledged on March 12 it was "a failing" of the U.S. system that the demand for SARS-CoV-2 tests was not being met;<ref name="Burton_WSJ">{{cite news |last1=Burton |first1=Thomas M. |last2=Armour |first2=Stephanie |last3=Wise |first3=Lindsay |date=March 12, 2020 |url=https://www.wsj.com/articles/u-s-virus-testing-system-is-failing-fauci-tells-congress-11584042312 |title=U.S. Virus Testing System Is Failing, Fauci Tells Congress |newspaper=The Wall Street Journal |accessdate=April 19, 2020 }}</ref> Fauci later clarified that he believed the private sector should have been brought in sooner to address the shortfall.<ref>{{cite news |last1=Kessler |first1=Glenn |title=What did Dr. Anthony Fauci say about coronavirus testing 'failing'? |url=https://www.washingtonpost.com/politics/2020/03/18/what-did-dr-fauci-say-about-coronavirus-testing-failing/ |accessdate=March 18, 2020 |newspaper=The Washington Post |date=March 18, 2020}}</ref>

      By mid-March, the U.S. had tested 125 people per million of their population, which was lower than several other countries.<ref>{{cite news |last1=McCarthy |first1=Niall |title=U.S. Lags Behind Other Countries in Coronavirus Testing |url=https://www.statista.com/chart/21108/covid-19-tests-performed-per-million-of-the-population/ |accessdate=March 25, 2020 |work=[[Statista]] |date=March 20, 2020}}</ref> The first COVID-19 cases in the U.S. and South Korea were identified at around the same time.<ref>{{cite news |last1=McCann |first1=Larry |last2=Lai |first2=Rebecca |last3=McCann |first3=Allison |title=U.S. Lags in Coronavirus Testing |url=https://www.nytimes.com/interactive/2020/03/17/us/coronavirus-testing-data.html |accessdate=March 25, 2020 |work=The New York Times |date=March 17, 2020}}</ref> Critics say the U.S. government has botched the approval and distribution of test kits, losing crucial time during the early weeks of the outbreak, with the result that the true number of cases in the United States was impossible to estimate with any reasonable accuracy.<ref name="theatlantic.com">{{cite news |url=https://www.theatlantic.com/health/archive/2020/03/why-coronavirus-testing-us-so-delayed/607954/ |title=The 4{{nbsp}}Key Reasons the U.S. Is So Behind on Coronavirus Testing |work=The Atlantic |date=March 15, 2020 }}</ref><ref>{{Cite news|last=Pilkington|first=Ed|url=https://www.theguardian.com/world/2020/mar/13/coronavirus-testing-us|title=Why has coronavirus testing in the US been such a disaster?|date=March 13, 2020|work=The Guardian|access-date=March 15, 2020|issn=0261-3077}}</ref>

      By March 12, all fifty states were able to perform tests, with a doctor's approval, either from the CDC or local commercial lab.<ref>{{cite web |url=https://www.cdc.gov/coronavirus/2019-ncov/testing-in-us.html |title=Testing in the U.S. |work=CDC.gov |date=March 13, 2020 }}</ref> This was followed by the government announcing a series of measures intended to speed up testing. These measures included the appointment of Admiral [[Brett Giroir]] of the [[United States Public Health Service|U.S. Public Health Service]] to oversee testing, funding for two companies developing rapid tests, and a hotline to help labs find needed supplies.<ref>{{cite news |url=https://www.npr.org/sections/health-shots/2020/03/13/815363944/trump-administration-announces-measures-to-speed-coronavirus-testing |title=Trump Administration Announces Measures To Speed Coronavirus Testing |work=NPR |date=March 13, 2020 }}</ref> The FDA also gave emergency authorization for New York to obtain an automated coronavirus testing machine.<ref>{{cite news |url=https://nypost.com/2020/03/13/fda-issues-emergency-authorization-for-coronavirus-test/ |title=FDA authorizes coronavirus test that could drastically speed up screening |work=New York Post |date=March 13, 2020 }}</ref>

      In a March 13 press conference, the Trump administration announced a campaign to conduct tests in retail store parking lots across the country,<ref name="reuters1">{{cite news |accessdate=March 15, 2020 |url=https://www.reuters.com/article/us-health-coronavirus-google/google-walmart-join-us-effort-to-speed-up-coronavirus-testing-idUSKBN21036R |title=Google, Walmart join U.S. effort to speed up coronavirus testing |work=Reuters |location=New York, NY |date=March 13, 2020 |author=Sanders, Chris}}</ref> but this was not widely implemented.<ref name="MakApril13">{{cite news |last1=Mak |first1=Tim |last2=Pfeiffer |first2=Sacha |last3=Huo |first3=Jingnan |last4=Benincasa |first4=Robert |last5=Smith |first5=Graham |last6=Shapiro |first6=Joseph |last7=Anderson |first7=Meg |title=A Month After Emergency Declaration, Trump's Promises Largely Unfulfilled |url=https://www.npr.org/2020/04/13/832797592/a-month-after-emergency-declaration-trumps-promises-largely-unfulfilled |accessdate=April 19, 2020 |work=[[NPR]] |date=April 13, 2020}}</ref>

      On March 13, drive-through testing in the U.S. began in [[Westchester County, New York|New Rochelle]], [[Westchester County, New York|Westchester County]], as New Rochelle was the U.S. town with the most diagnosed cases at that time.<ref name="pbs1">{{cite news |accessdate=March 15, 2020 |url=https://www.pbs.org/newshour/show/new-york-launches-drive-thru-testing-site-for-covid-19 |title=New York launches drive-thru testing site for COVID-19 |publisher=PBS |location=New York, NY |date=March 14, 2020 |author=Booker, Christopher}}</ref> By March 22, drive-through testing had started in more than thirty states, although the [[Associated Press]] reported that "the system has been marked by inconsistencies, delays, and [[Shortages related to the COVID-19 pandemic|shortages]]", leading to many people waiting hours or days even though they showed symptoms and were recommended by a doctor to get a test. A lack of supplies had already forced the closure of drive-through testing in seven states.<ref>{{cite news |last1=Smith |first1=Michelle |title=Chaos, Inconsistency Mark Launch of Drive-Thru Virus Testing |url=https://www.usnews.com/news/business/articles/2020-03-22/chaos-inconsistency-mark-launch-of-drive-thru-virus-testing |accessdate=March 30, 2020 |agency=[[Associated Press]] |date=March 22, 2020}}</ref>

      By March 30, more than a million people had been tested,<ref name=CummingsMarch30>{{cite news |last1=Cummings |first1=William |last2=Hayes |first2=Christal |last3=Jackson |first3=David |title=Trump says more than 1 million Americans have been tested for coronavirus |url=https://www.usatoday.com/story/news/politics/2020/03/30/coronavirus-response-mnuchin-trump/5086774002/ |accessdate=April 18, 2020 |work=[[USA Today]] |date=March 30, 2020}}</ref> but not all the people showing symptoms were being tested.<ref name="Stockman">{{cite news |first=Farah |last=Stockman |url=https://www.nytimes.com/2020/03/12/us/coronavirus-testing-challenges.html |title=Sick People Across the U.S. Say They Are Being Denied the Coronavirus Test |newspaper=The New York Times |date=March 12, 2020}}</ref><ref>{{cite news |first1=Sheila |last1=Kaplan |first2=Katie |last2=Thomas |url=https://www.nytimes.com/2020/04/06/health/coronavirus-testing-us.html |title=Despite Promises, Testing Delays Leave Americans 'Flying Blind' |newspaper=The New York Times |date=April 6, 2020 |accessdate=April 10, 2020 }}</ref><ref name="Burton_WSJ" /><ref name="Myer_Atlantic">{{cite news |last1=Myer |first1=Robinson |last2=Madrigal |first2=Alexis |date=April 16, 2020 |url=https://www.theatlantic.com/technology/archive/2020/04/us-coronavirus-outbreak-out-control-test-positivity-rate/610132/ |title=A New Statistic Reveals Why America's COVID-19 Numbers Are Flat |work=The Atlantic |accessdate=April 19, 2020 }}</ref>

      === April 2020 ===

      During the weeks of April{{nbsp}}6 and 13, the U.S. conducted about 150,000 tests per day, while experts recommended at least 500,000 per day prior to ending social distancing, with some recommending several times that level. Building up both testing and surveillance capacity are important to re-opening the economy; the purpose of social distancing is to buy time for such capacity-building.<ref name="Vox_Tests1">{{cite news |accessdate=April 19, 2020 |url=https://www.vox.com/2020/4/17/21224872/coronavirus-testing-trump-reopen-economy |title=Trump's plan to reopen America can't work without a massive surge in testing |work=vox.com |date=April 17, 2020 |author=Lopez, German}}</ref>

      On April 6, [[Office of Inspector General, U.S. Department of Health and Human Services|Federal health inspectors]] released a report stating that hospitals were experiencing shortages of test supplies, [[personal protective equipment]] (PPE), and other resources due to extended patient stays while awaiting test results.<ref name="RobertsonApril7">{{cite web |last1=Robertson |first1=Lori |title=The HHS Inspector General Report |date=April 7, 2020 |url=https://www.factcheck.org/2020/04/the-hhs-inspector-general-report/ |publisher=[[Factcheck.org]] |accessdate=April 18, 2020}}</ref>

      ''The New York Times'' reported on April 26 that the U.S. still had yet to reach an adequate level of testing capacity needed to monitor and contain outbreaks. The capacity has been hampered by shortages of reagents, shortages of test kits components like nasal swabs, shortages of protective gear for health workers, limited laboratory workers and equipment, and the federal government's limited interventions to solve shortages, instead of leaving the issue to the free market, causing states and hospitals to compete with each other for supplies.<ref>{{cite news |last1=Stolberg |first1=Sheryl |last2=Stockman |first2=Farah |last3=LaFraniere |first3=Sharon |title=Testing Remains Scarce as Governors Weigh Reopening States |url=https://www.nytimes.com/2020/04/25/us/politics/virus-testing-shortages-states-trump.html |accessdate=April 28, 2020 |work=[[The New York Times]] |date=April 26, 2020 |archiveurl=https://web.archive.org/web/20200427021351/https://www.nytimes.com/2020/04/25/us/politics/virus-testing-shortages-states-trump.html |archivedate=April 27, 2020}}</ref>

      === May to July 2020 ===

      By early May, the U.S. was testing around 240,000 to 260,000 people per day, but this was still an inadequate level to contain the outbreak.<ref name="GearanMay9">{{cite news |last1=Gearan |first1=Anne |last2=DeBonis |first2=Mike |last3=Dennis |first3=Brady |title=Trump plays down coronavirus testing as U.S. falls far short of level scientists say is needed |url=https://www.washingtonpost.com/politics/trump-plays-down-coronavirus-testing-as-us-falls-far-short-of-level-scientists-say-is-needed/2020/05/08/d9241454-913f-11ea-a9c0-73b93422d691_story.html |accessdate=May 10, 2020 |newspaper=[[The Washington Post]] |date=May 9, 2020}}</ref><ref name=MeyerMay8>{{cite news |last1=Meyer |first1=Robinson |title=There's One Big Reason the U.S. Economy Can't Reopen |url=https://www.theatlantic.com/science/archive/2020/05/theres-only-one-way-out-of-this-mess/611431/ |accessdate=May 10, 2020 |work=[[The Atlantic]] |date=May 8, 2020}}</ref><ref name=SteinMay7>{{cite news |last1=Stein |first1=Rob |last2=Worth |first2=Carmel |last3=Hurt |first3=Alyson |title=U.S. Coronavirus Testing Still Falls Short. How's Your State Doing? |url=https://www.npr.org/sections/health-shots/2020/05/07/851610771/u-s-coronavirus-testing-still-falls-short-hows-your-state-doing |accessdate=May 10, 2020 |work=[[NPR]] |date=May 7, 2020}}</ref><ref name=McDonaldMay8>{{cite news |last1=McDonald |first1=Jessica |title=How Many COVID-19 Tests Are 'Needed' to Reopen? |url=https://www.factcheck.org/2020/05/how-many-covid-19-tests-are-needed-to-reopen/ |accessdate=May 10, 2020 |work=[[FactCheck.org]] |date=May 8, 2020}}</ref>

      By June 24, thirteen of the forty-one federally funded community-based testing sites originally established in March were set to lose federal funding. They will remain under state and local control. Trump administration testing czar Admiral Giroir described the original community-based testing program as "antiquated".<ref>{{Cite web|last=Mangan|first=Dan|date=June 24, 2020|title=Coronavirus: Federal government will end funding for 13 community-based Covid-19 test sites, most in Texas|url=https://www.cnbc.com/2020/06/24/coronavirus-federal-government-to-end-funding-some-covid-19-test-sites.html|access-date=June 25, 2020|website=CNBC|language=en}}</ref> By June 26, 2020, Dr. Fauci said the administration was considering [[COVID-19 testing#Pooled testing|pooled testing]] as a way to speed up testing.<ref name= pooledTesting>{{cite web |url=https://www.cnn.com/2020/06/26/politics/anthony-fauci-testing-coronavirus-task-force/index.html |author1=Jim Acosta |author2=Sam Fossum |date=June 26, 2020 |accessdate=August 12, 2020 |title=Fauci says task force 'seriously considering' new testing strategy|website=[[CNN]] }}</ref>

      === August 2020 to December 2020 ===
      [[File:At Home COVID-19 Test.jpg|thumb|Free at-home COVID-19 test from U.S. Federal government.]]
      By August, the overall ratio of positive to total tests was close to seven percent—well above the five percent the WHO considers to be the threshold for containment.<ref name=NYTAugustTesting/>

      Trump has offered conflicting opinions about testing. In June 2020 Trump said several times that the U.S. would have fewer cases of coronavirus if it did less testing—"If we didn't do testing, we would have no cases"—and he told a June rally that he had ordered a slowdown in testing. The White House said he had been joking; he himself said "I don't kid" before later claiming he had said it sarcastically. Dr. Fauci clarified that the administration was ramping up testing, not slowing it down.<ref>{{cite news|url=https://www.politico.com/news/2020/06/25/trump-sarcastically-suggests-slowing-down-coronavirus-testing-340850|title=Trump says push for less coronavirus testing was sarcasm|last=Muller|first=Jordan|date=June 25, 2020|work=Politico|accessdate=26 August 2020}}</ref> In July he continued to suggest that "if we did half the testing we would have half the cases" and that a large number of reported cases was "fodder for the fake news".<ref>{{cite news|url=https://www.cnbc.com/2020/07/14/trump-says-us-would-have-half-the-number-of-coronavirus-cases-if-it-did-half-the-testing.html|title=Trump says U.S. would have half the number of coronavirus cases if it did half the testing|last=Higgins-Dunn|first=Noah|date=July 14, 2020|work=CNBC|accessdate=26 August 2020}}</ref> He has also said that he was "okay" with testing even though it "makes us look bad".<ref>{{cite news|url=https://www.washingtonpost.com/politics/2020/07/23/trumps-right-that-with-less-testing-we-record-fewer-cases-fact-thats-already-happening/|title=Trump is right that with lower testing, we record fewer cases. That's already happening.|last=Bump|first=Philip|date=July 23, 2020|newspaper=The Washington Post|accessdate=26 August 2020}}</ref>

      As of mid-August, according to [[Johns Hopkins University]], the U.S. has been doing the most per-capita testing of any country,<ref>{{cite web |title=How Does Testing in the U.S. Compare to Other Countries? |url=https://coronavirus.jhu.edu/testing/international-comparison |work=Johns Hopkins Univ. of Medicine |accessdate=August 12, 2020 }}</ref> although [[Our World in Data]] shows other countries having higher rates<ref name="owid-covid">{{cite journal |last1=Roser |first1=Max |last2=Ritchie |first2=Hannah |last3=Ortiz-Ospina |first3=Esteban |last4=Hasell |first4=Joe |title=Coronavirus Pandemic (COVID-19) |url=https://ourworldindata.org/coronavirus |journal=Our World in Data |accessdate=August 19, 2020 |date=August 19, 2020}}</ref>—New Zealand, Israel, and the UK are examples. The U.S. test positivity rate was still beyond the WHO's recommended threshold for controlling the outbreak.<ref>{{cite web |url=https://www.jhsph.edu/covid-19/articles/covid-19-testing-understanding-the-percent-positive.html |title=COVID-19 Testing: Understanding the "Percent Positive" |publisher=Johns Hopkins Bloomberg School of Public Health |author1=[[David Dowdy]]|author2=Gypsyamber D'Souza |date=10 August 2020 |accessdate=17 August 2020}}</ref><ref name=NYTAugustTesting>{{cite web |url=https://www.nytimes.com/2020/08/15/us/coronavirus-testing-decrease.html |title='We're Clearly Not Doing Enough': Drop in Testing Hampers Coronavirus Response |work=The New York Times |date=16 August 2020 |accessdate=17 August 2020 |author=Sarah Mervosh |author2=Nicholas Bogel-Burroughs |author3=Sheryl Gay Stolberg |quote=And the percent of people testing positive over all is hovering at about 7{{nbsp}}percent, down from 8.5 percent in July{{nbsp}}... A community may be considered to have controlled virus spread if it is testing widely and the percent of people testing positive over a two-week period is less than 5{{nbsp}}percent, according to the World Health Organization.}}</ref>

      ''The New York Times'' reported that the Department of Health and Human Services and the administration wrote guidance released in August that was never subject to CDC scientific review, and thus took over the CDC imprimatur. Subtle but obvious errors were not CDC material such as "testing for Covid-19" (rather than for the virus that causes that illness).<ref>{{cite news|url=https://www.nytimes.com/2020/09/17/health/coronavirus-testing-cdc.html|title=C.D.C. Testing Guidance Was Published Against Scientists' Objections|author=Mandavilli, Apoorva|date=September 17, 2020|accessdate=September 17, 2020|work=The New York Times}}</ref>

      In August 2020, the CDC lowered its recommendation for who should be tested, saying that people who have been exposed to the virus but are not showing symptoms "do not necessarily need a test". The previous recommendation had been that people exposed to the virus should be "quickly identified and tested" even if they are not showing symptoms, because asymptomatic people can still spread the virus.<ref>{{cite news|url=https://www.cnbc.com/2020/08/26/cdc-quietly-revises-coronavirus-guidance-to-downplay-importance-of-testing-for-asymptomatic-people.html|title=Health and Science: CDC quietly revises coronavirus guidance to downplay importance of testing for asymptomatic people|last=Feuer|first=Will|date=August 26, 2020|work=CNBC|accessdate=26 August 2020}}</ref> Experts expressed concern about the change, pointing out that about half of all community spread of the virus comes from people who are asymptomatic.<ref>{{cite news|url=https://www.nytimes.com/2020/08/25/world/covid-19-coronavirus.html|title=The C.D.C. changes testing guidelines to exclude those exposed to virus who don't exhibit symptoms.|date=August 26, 2020|work=The New York Times|accessdate=26 August 2020}}</ref> It was later reported that the change had been due to pressure from high up in the Trump administration—"from the top down".<ref>{{cite news|url=https://www.cnn.com/2020/08/26/politics/cdc-coronavirus-testing-guidance/index.html|title=CDC was pressured 'from the top down' to change coronavirus testing guidance, official says|date=August 26, 2020|work=CNN|accessdate=26 August 2020}}</ref><ref>{{cite news|url=https://www.nytimes.com/2020/08/26/world/covid-19-coronavirus.html#link-75471d37|title=The C.D.C. was pressured to change guidance on testing asymptomatic people who had been exposed to the virus.|last=Stolberg|first=Cheryl Gay|date=August 26, 2020|work=The New York Times|accessdate=26 August 2020}}</ref>

      In September 2020, the [[Food and Drug Administration]] (FDA) approved [[emergency use authorization]] for the saliva test developed at the [[State University of New York Upstate Medical University]].<ref>{{Cite web|title=FDA approves emergency use authorization for diagnostic saliva COVID-19 test developed by SUNY Upstate Medical University and Quadrant Biosciences|url=https://www.upstate.edu/news/articles/2020/2020-09-23-fdaok.php|url-status=live|archive-url=https://web.archive.org/web/20201015052713/https://www.upstate.edu/news/articles/2020/2020-09-23-fdaok.php |archive-date=2020-10-15 }}</ref><ref>{{Cite web|title=Upstate Saliva Test|date=8 December 2020|url=https://cbs6albany.com/news/coronavirus/suny-upstate-saliva-test-could-become-gold-standard-in-covid-testing-chancellor-says|url-status=live|archive-url=https://web.archive.org/web/20201209033638/https://cbs6albany.com/news/coronavirus/suny-upstate-saliva-test-could-become-gold-standard-in-covid-testing-chancellor-says |archive-date=2020-12-09 }}</ref> The Clarifi COVID-19 test is non-invasive and determines the presence or absence of SARS-CoV-2 viral RNA. In December 2020, [[Andrew Cuomo|Governor Cuomo]] congratulated SUNY Upstate Medical on #1 FDA Ranking Among COVID-19 saliva tests for detecting the virus in earliest stages.<ref>{{Cite web|title=Governor congratulates SUNY Upstate Medical on No. 1 FDA ranking among COVID-19 saliva test for detecting virus in earliest stages|url=https://www.upstate.edu/news/articles/2020/2020-12-08-fdaswab.php|url-status=live|archive-url=https://web.archive.org/web/20201210025557/https://www.upstate.edu/news/articles/2020/2020-12-08-fdaswab.php |archive-date=2020-12-10 }}</ref><ref>{{Cite web|title=Governor Cuomo Congratulates SUNY Upstate Medical on #1 FDA Ranking Among COVID-19 Saliva Tests for Detecting Virus In Earliest Stages|url=https://www.governor.ny.gov/news/governor-cuomo-congratulates-suny-upstate-medical-1-fda-ranking-among-covid-19-saliva-tests|url-status=live|archive-url=https://web.archive.org/web/20201208192634/https://www.governor.ny.gov/news/governor-cuomo-congratulates-suny-upstate-medical-1-fda-ranking-among-covid-19-saliva-tests |archive-date=2020-12-08 }}</ref>

      In October 2020, the US diplomats and security officials raised a warning for [[Las Vegas]] against the use of Chinese test kits donated by the [[United Arab Emirates]]. In partnership with [[Group 42 (Emirati company)|Group 42]], [[Nevada]] was receiving donations of hundreds of thousands of test kits costing from between $15&nbsp;million to $20&nbsp;million, which raised concerns around patient privacy and test accuracy. Earlier, there were doubts that UAE's Group 42 could get access to US citizens through test data.<ref name="qoqzJ">{{cite web|url=https://apnews.com/article/virus-outbreak-technology-dubai-nevada-united-arab-emirates-0755b0ed4a9a750bcac432300ca69275|title=US warned Nevada not to use Chinese COVID tests from UAE|access-date=15 October 2020|website=Associated Press|date=15 October 2020 }}</ref><ref name="KQyOI">{{cite tweet|user=billmarczak|number=1262549587899805698|title=Uh oh. It looks like the US state of Nevada has partnered with a UAE intelligence-linked company (Group 42) on COVID19 testing. It seems that Group 42 will get access to test data from US Citizens, which they will use for an 'innovative genomic study.' https://nvc19.org/united-arab-emirates-provide-support-in-fight-against-covid-19/…|date=18 May 2020|accessdate=18 May 2020}}</ref>

      In December, the FDA authorized the use of a rapid testing kit developed by [[Brisbane, Australia|Brisbane, Australia-based]] Ellume Health. The test is available for purchase without a prescription for about $30 and can give results in about 20 minutes.<ref>{{cite news|title=Over-the-counter home test for COVID-19 gets US green light|author=Perrone, Matthew|date=December 15, 2020|accessdate=December 15, 2020|url=https://apnews.com/article/over-the-counter-home-coronavirus-test-ac070f4d42d9d7eacc486c9bed4ccaa0|publisher=Associated Press}}</ref><ref name="Ellume">{{cite news |title=Coronavirus Ellume at-home test developed in Brisbane approved for emergency use in US |url=https://www.abc.net.au/news/2020-12-16/queensland-ellume-coronavirus-at-home-test-covid-19/12986498 |access-date=25 December 2020 |agency=ABC News |date=15 December 2020}}</ref> The FDA approved the test for people with and without COVID symptoms.<ref name="Ellume" />

      == Types of testing ==
      {{See also|COVID-19 testing#Methods}}Tests are generally divided into two types. Viral testing can identify if a person is currently infected with SARS-CoV-2. Antibody testing can identify if a person has previously been exposed to the virus.<ref name="CDCtesting">{{cite web |url=https://www.cdc.gov/coronavirus/2019-ncov/symptoms-testing/testing.html |title=Testing for COVID-19 |publisher=CDC |date=24 August 2020 |accessdate=11 September 2020}}</ref> As of August 2020, the FDA had granted Emergency Use Authorizations to over 200 tests for detecting current or past infection.<ref name="TimeTesting">{{cite magazine |url=https://time.com/5880255/covid-19-tests-types/ |title=What to Know About COVID-19 Tests, From PCR to Antigen to Antibody |magazine=[[Time (magazine)|Time]] |author=Jamie Ducharme |date=20 August 2020 |accessdate=11 September 2020}}</ref>

