      * Water polo (1)
      {{div col end}}

      In response to these findings, WADA announced that RUSADA should be regarded as non-compliant with respect to the World Anti-Doping Code and recommended that Russian participants be banned from competing at the [[2016 Summer Olympics]].<ref name=WADA160718b /> The IOC decided to decline [[2016 Summer Olympics]] accreditation requests by Russian sports ministry officials and any individuals implicated in the report, to begin re-analysis and a full inquiry into Russian competitors at the [[Sochi Olympics]], and to ask sports federations to seek alternative hosts for major events that had been assigned to Russia.<ref name=IOC160719 /><ref>[http://www.helsinkitimes.fi/finland/finland-news/domestic/14109-russia-to-face-tough-sanctions-over-allegedly-state-sponsored-doping-programme.html]. helsinkitimes.fi (19 July 2016). Retrieved 21 July 2016.</ref>

      On 21 July 2016, the [[Court of Arbitration for Sport]] (CAS) turned down an appeal by the [[Russian Olympic Committee]] and 68 Russian competitors.<ref name=CAS160721 /> The following day, the [[International Paralympic Committee]] began suspension proceedings against the National Paralympic Committee of Russia.<ref name=IPC160722 /> On 24 July, the IOC rejected WADA's recommendation to ban Russia from the Summer Olympics and announced that a decision would be made by each sport federation. With each positive decision having to be approved by a CAS arbitrator.<ref name=IOC160724 /> WADA's president [[Craig Reedie]] said, "WADA is disappointed that the IOC did not heed WADA's Executive Committee recommendations that were based on the outcomes of the McLaren Investigation and would have ensured a straight-forward, strong and harmonized approach."<ref name=WADA160724 /> On the IOC's decision to exclude Stepanova, WADA director general Olivier Niggli stated that his agency was "very concerned by the message that this sends whistleblowers for the future".<ref name=WADA160724 />

      On 30 July, the IOC announced that a final decision on each competitor would be made by a newly established IOC panel consisting of [[Uğur Erdener]], [[Claudia Bokel]], and [[Juan Antonio Samaranch Jr]].<ref name="bbc-iocpanel2">{{cite news|url=https://www.bbc.com/sport/olympics/36934760|title=Rio 2016: IOC panel to have final say on Russian athletes' participation|work=BBC Sport|access-date=31 July 2016}}</ref>

      ==== August to September 2016 ====
      {{See also|Russia at the 2016 Summer Olympics|Russia at the 2016 Summer Paralympics}}
      Originally Russia submitted a list of 389 participants for the Rio Olympics competition. On 7 August 2016, the IOC cleared 278 competitors, while 111 were removed because of the scandal (including 67 athletes removed by IAAF before the IOC's decision).<ref name=":142">{{Cite web|url=http://en.europeonline-magazine.eu/backgroundrussian-athletes-participating-in-rio-olympic-game-by-federation_475489.html|title=Russian athletes participating in Rio Olympic Game by federation|website=Europe Online Magazine|archive-url=https://web.archive.org/web/20160809043949/http://en.europeonline-magazine.eu/backgroundrussian-athletes-participating-in-rio-olympic-game-by-federation_475489.html|archive-date=9 August 2016|access-date=9 August 2016}}</ref>
      [[File:Yulia Efimova MoscowTass 08-2016cr.jpg|thumb|left|200px|[[Yulia Efimova]], who had been banned for doping, competed in Rio]]
      Critics noted that Kuwaitis were banned from competing under their own flag (for a non-doping related matter) while Russians were permitted to do so. Due to governmental interference, Kuwaiti competitors were permitted to enter only as [[Independent Olympic Athletes at the 2016 Summer Olympics|independent athletes]]. [[Dick Pound]] stated, "It is not a consistent standard which is being applied now. Not all Kuwait competitors banned from competing in Rio under their own flag were supporters of the regime, and not all South African participants were supporters of [[apartheid]], but the greater good called for South Africa to be expelled."<ref name=ITG170605 /> Germany's ''[[Deutsche Welle]]'' wrote of "troublesome questions, like why Kuwait's Olympic federation faced a ban from Rio, while Russia's did not. Kuwait's tiny team [...] was suspended because of improper political conduct by the government; Russia's was not, after systematically organizing a doping program for many of its competitors."<ref name=DW170427 />

      Having sent samples for forensic analysis, the [[International Paralympic Committee]] (IPC) found evidence that the Disappearing Positive Methodology (DPM) was in operation at the [[2014 Winter Paralympics]] in Sochi.<ref name=IPC160807 /> On 7 August 2016, the IPC's Governing Board voted unanimously to ban the entire Russian team from the [[2016 Summer Paralympics]], citing the Russian Paralympic Committee's (RPC) inability to enforce the IPC's Anti-Doping Code and the World Anti-Doping Code, which is "a fundamental constitutional requirement".<ref name=IPC160807 /> IPC President Sir Philip Craven described the Russian anti-doping system as "entirely compromised" and 18 July 2016 as "one of the darkest days in the history of all sport", and stated that the Russian government had "catastrophically failed its Para athletes".<ref name=Craven160807 /> IPC Athletes' Council Chairperson Todd Nicholson said that Russia had used competitors as "pawns" in order to "show global prowess".<ref name=Nicholson160807 /> On 23 August 2016, the [[Court of Arbitration for Sport]] dismissed Russia's appeal, stating that the IPC's decision was "made in accordance with the IPC Rules and was proportionate in the circumstances" and that Russia "did not file any evidence contradicting the facts on which the IPC decision was based".<ref name=CAS160823 /> The [[Federal Supreme Court of Switzerland]] rejected another appeal by Russia, saying that the RPC "needed to demonstrate it had fulfilled its obligations in upholding... anti-doping protocols, and that its interests in an immediate lifting of its suspension outweigh the International Paralympics Committee's interests in fighting doping and in the integrity of athletics. It did not succeed in this in any way."<ref name=Reuters160831 /> Rejecting an appeal by ten competitors, a German court stated that the IPC had no obligation to allow them to compete and that the committee had "comprehensibly justified" its decision.<ref name=AP160905 />

      In an interview with [[NRK]], WADA's director general Olivier Niggli said that "Russia is threatening us and our informers", mentioning daily hacking attempts and bugging of houses. He said that the agency had "a pretty good suspicion" that the hackers were Russian and that Western governments were already familiar with them.<ref name=NRK160901 /> He stated, "I think this will cease if they stop looking at us as an enemy, and instead accept that there is a problem that we must work together to solve. But for the moment they are sending out completely the wrong signals."<ref name=NRK160901 />

      ==== October to December 2016 ====
      {{See also|McLaren Report}}
      In October 2016, Russia's sports minister [[Vitaly Mutko]] was promoted to deputy prime minister amid allegations that Mutko had covered up a doping violation.<ref name=NYT161019 />

      On 3 November, Russia approved an anti-doping law targeting coaches.<ref name=USAtoday20161103>{{cite news|title=Russia approves anti-doping law targeting coaches |url=https://www.usatoday.com/story/sports/olympics/2016/11/03/russian-parliament-passes-tough-anti-doping-bill/93227110/ |date=3 November 2016 }}</ref>

      On 15 November, Berlinger introduced a new design for doping sample bottles. A spokesman later said, "We work with forensic specialists from different nations. We want to always stay a little bit ahead of those cheating but you cannot avoid a system like the Russians built up."<ref name=Berlinger161213 />

      On 7 December, [[Yelena Isinbayeva]] became the chair of the supervisory board of the [[Russian Anti-Doping Agency]].<ref name=AP161207>{{cite news |url= https://www.ctvnews.ca/sports/article/isinbayeva-to-oversee-russian-anti-doping-agency/ |title= Isinbayeva to oversee Russian anti-doping agency |work= [[The Associated Press]] |publisher= [[CTV News]] |date= 7 December 2016 }}</ref>

      On 9 December, McLaren published the second part of [[McLaren Report|his report]]. The report claimed that from 2011 to 2015, more than 1,000 Russian competitors in various sports (including summer, winter, and Paralympic sports) benefited from the cover-up.<ref name=EDP /><ref name=McLarenII /><ref name=NYT161209 /><ref name=Guardian161209 /> However, McLaren later walked back from that assertion when the cases went to court, rephrasing it as not a fact but only a possibility, as recorded on page 68 of the CAS verdict for Alexander Legkov: "Prof. McLaren went on to explain that, in this respect, if his investigation obtained evidence that a particular competitor may have benefited from the scheme, then 'It didn't mean that they did benefit. It didn't mean that they committed [an] anti-doping rule violation.'"<ref>{{Cite web|url=https://www.tas-cas.org/fileadmin/user_upload/Award__5379__internet.pdf|archive-url=https://web.archive.org/web/20180801221511/https://www.tas-cas.org/fileadmin/user_upload/Award__5379__internet.pdf|url-status=dead|archive-date=2018-08-01|date=2018-08-01|access-date=2019-06-22}}</ref> Emails indicate that those who might have benefited from a cover-up included five blind powerlifters, who may have been given drugs without their knowledge, and a fifteen-year-old.<ref name=AP161213 /> An IAAF taskforce announced that Russia could not be reinstated because the country still had no functional drug-testing agency and had not accepted the findings of investigations.<ref name=AP170206 />

      === 2017 ===
      ==== January to October 2017 ====
      In February 2017, [[All-Russia Athletic Federation]] vice-president [[Andrey Silnov]] held a press conference in Moscow alongside a former Soviet competitor who said that East German successes due to [[doping in East Germany|state-sponsored doping]] are legitimate results of "good pharmacology" and should not be condemned.<ref name=AP170207 /> Later that month, WADA stated that evidence against many individuals named in the McLaren report might be insufficient because the Moscow laboratory had disposed of doping samples and Russian authorities were not answering requests for additional evidence.<ref name=ITG170225 /><ref name=Kepper170224 />

      An IAAF taskforce chaired by Rune Andersen published an interim report in April.<ref name=IAAF170408 /> President Sebastian Coe stated, "There is testing but it is still far too limited. The Russian investigative committee is still refusing to hand over competitor biological passport samples for independent testing from labs, we still have got competitors in closed cities that are difficult or impossible to get to, the ongoing employment of coaches from a tainted system, and we have got the head coach of RUSAF effectively refusing to sign their own pledge to clean athletics."<ref name=AP170413 /> The report also noted the case of whistleblower Andrei Dmitriev<!--1500m runner, may or may not be the redlinked athlete who ran 8k in 2009. Russian Wiki no help.-->, who had fled Russia after being threatened with imprisonment.<ref name=IAAF170408 /> Coe said, "Anyone with information about a system which has failed to protect the goals and aspirations of clean competitors must feel it is safe to speak out."<ref name=IAAF170413 /> Andersen questioned the selection of [[Yelena Isinbayeva]], who had called for whistleblower [[Yuliya Stepanova]] to be "banned for life",<ref name=AP160724 /> as the chair of RUSADA's supervisory board. Andersen stated, "It is difficult to see how this helps to achieve the desired change in culture in track and field, or how it helps to promote an open environment for Russian whistleblowers", noting that Isinbayeva had called a WADA report "groundless" without reading it, publicly criticised whistleblowers (Dmitriev and the Stepanovs), and had not signed a pledge for clean sport or endorsed a Russian anti-doping group.<ref name=IAAF170408 />

      In September, WADA rejected Russia's claims that WADA should be held responsible for Rodchenkov, noting that Russia had chosen to appoint him as head of the Moscow laboratory. The organisation also stated, "WADA would expect the Russian authorities to take responsibility for this deliberate system of cheating that was uncovered by the McLaren Investigation – as is stipulated within RUSADA's Roadmap to Compliance – rather than continually shifting the blame onto others."<ref name=Reuters170913 /> Seventeen national anti-doping organisations criticised the IOC for a "continuing refusal to hold Russia accountable for one of the biggest doping scandals in sports history" and "dereliction of duty [sending] a cynical message that those of favored, insider nations within the Olympic Movement will never be punished or held accountable".<ref name=NADO170914 /> They stated that cases had been "shut prematurely before the IOC or IFs have obtained complete evidence from the Moscow laboratory or interviewed the relevant witnesses".<ref name=NADO170914 /> An additional 20 NADOs have signed on.<ref name="auto">{{Cite news|url=https://www.usatoday.com/story/sports/olympics/2017/11/14/doping-scandal-wada-decide-whether-russia-compliance-code/861306001/|title=Doping scandal: WADA to decide whether Russia is in compliance with code|date=14 November 2017|work=usatoday.com|access-date=14 November 2017|language=en}}</ref>

      ==== November to December 2017 ====
      {{See also|Oswald Commission}}
      In November 2017, the IOC disciplinary commission headed by [[Denis Oswald (sports official)|Denis Oswald]] imposed its first sanctions after a year-long Sochi investigation. As of 22 December, 43 Russian competitors had been sanctioned and 13 medals had been stripped.

      On 10 November, the day after Vladimir Putin accused the U.S. of stirring up problems for Russian competitors,<ref>{{cite news|url=https://www.bbc.com/news/world-europe-41934604|title=Putin: Doping allegations 'US plot against Russian election'|date=9 November 2017|work=BBC News|access-date=14 November 2017|language=en}}</ref> WADA said in a news release that it had obtained an electronic file that contained "all testing data" from January 2012 to August 2015 – thousands of drug screenings run on Russian competitors. The database, which the Russian authorities were unwilling to share with antidoping investigators, arrived through a whistleblower.<ref>{{Cite news|url=https://www.nytimes.com/2017/11/10/sports/olympics/russia-doping-winter-olympics.html|title=Antidoping Officials Obtain Trove of Russian Lab Data|date=10 November 2017|work=[[The New York Times]]|access-date=14 November 2017|language=en}}</ref> The head of the [[Russian Ski Association]], [[Yelena Välbe]], told the press that "whistleblowers are traitors to their country" shortly thereafter.<ref>{{Cite news |url=https://www.sports.ru/others/skiing/1057329263.html |title=Елена Вяльбе: "Для меня любой информатор – предатель родины"|date=10 November 2017|work=sports.ru |access-date=14 November 2017|language=en}}</ref> Russia's ski team coach went even further and accused [[Ilia Chernousov]] (a skier who won a bronze medal in the [[Cross-country skiing at the 2014 Winter Olympics – Men's 50 kilometre freestyle|50 km freestyle event]]) of "leaking information" to WADA.<ref>{{Cite news |url=https://www.sports.ru/others/skiing/1057305763.html|title=Юрий Бородавко: "Черноусов сдает своих товарищей, желая получить медаль Сочи-2014"|date=9 November 2017 |work=sports.ru|access-date=14 November 2017|language=en}}</ref>

      On 11 November, it was revealed that Grigory Rodchenkov had provided new evidence of Russian state-sponsored doping to the IOC, noting that he would consider going public if the Schmid Commission did not give due weight to his evidence in any public findings.{{citation needed|date=March 2020}}

      On 16 November, WADA announced that Russia remained non-compliant with its Code.<ref>{{Cite news|url=https://www.reuters.com/article/us-sport-doping-wada/wada-rules-russia-non-compliant-in-winter-games-blow-idUSKBN1DG0GA|title=WADA rules Russia non-compliant in Winter Games blow|date=16 November 2017|work=reuters.com|access-date=23 November 2017|language=en}}</ref> On 26 November, [[IAAF]] decided to maintain Russia's ban from international [[track and field]] competitions, saying the country had not done enough to tackle doping.<ref>{{Cite news|url=https://www.rferl.org/a/iaaf-bans-russian-track-field-athletes/28877812.html|title=IAAF Maintains Ban on Russia in International Track And Field|date=26 November 2017 |agency=Reuters|access-date=28 November 2017|language=en}}</ref>

      In an interview with the ''[[New York Times]]'', [[Grigory Rodchenkov|Rodchenkov]] reported that Yuri Nagornykh, the deputy minister of sport, had asked him to incriminate a Ukrainian competitor, [[Vita Semerenko]], during a competition in [[Moscow]] leading up to the [[2014 Winter Olympics|Olympics]]. Rodchenkov did not comply, convincing the minister that a retest of the drug sample would show the drugs had been spiked into the sample rather than passed through a human body. "I could not have done this to an innocent athlete," he said. "During my career, I reported many Dirty Samples as clean, but never the other way around."<ref>{{Cite news|url=https://nytimes.com/2017/12/02/sports/olympics/russian-doping.html?referer=https://www.google.ru/|title=Whistle-Blower on Doping Says Neutral Flag for Russia Is Fair Option|date=2 December 2017|work=[[The New York Times]]|access-date=2 December 2017|language=en}}</ref>

      ====Official sanctions====
      [[File:Olympic Athlete from Russia logo 2018.svg|thumb|right|190px|Approved OAR logo]]
      On 5 December 2017, the IOC announced that the Russian Olympic Committee had been suspended with immediate effect from the 2018 Winter Olympics, but their concession was to allow those Russians with no previous drug violations and a consistent history of drug testing to compete under the [[Olympic Flag]] as an "Olympic Athlete from Russia" (OAR).<ref name=":2" /> Under the terms of the IOC's edict, no Russian government officials were permitted to attend the Games, and neither the Russian flag nor the Russian national anthem would be featured; the Olympic Flag and [[Olympic Anthem]] were to be used instead. On 20 December 2017, the IOC proposed an alternative logo for the OAR competitors' uniforms (shown on right).<ref>{{cite web|url=https://www.olympic.org/news/ioc-s-olympic-athlete-from-russia-implementation-group-releases-guidelines-for-uniforms-accessories-and-equipment|title=IOC's OAR implementation group releases guidelines for uniforms accessories and equipment's|date=20 December 2017|work=olympic.org}}</ref> IOC President [[Thomas Bach]] said that "after following due process [the IOC] has issued proportional sanctions for this systematic manipulation while protecting the clean competitors."<ref>{{cite web | url=https://themoscowtimes.com/news/ioc-bars-russian-athletes-and-officials-from-winter-olympic-games-59818 | title=IOC Bars Russian Athletes and Officials From Winter Olympic Games | work=The Moscow Times | date=5 December 2017 | access-date=5 December 2017}}</ref>

      As of January 2018, the IOC had identified 43 Russian competitors from the [[2014 Winter Olympics]] in Sochi that it intended to ban from competing in the 2018 Winter Olympics and all other future Olympic Games as part of the [[Oswald Commission]]. All but one of those competitors appealed against their bans to the [[Court of Arbitration for Sport]] (CAS). The court overturned the sanctions on 28 of the appellants, resulting in their Sochi medals and results being reinstated, but the court ruled that there was sufficient evidence against eleven of the competitors to uphold their Sochi sanctions. The IOC issued a statement saying "the result of the CAS decision does not mean that athletes from the group of 28 will be invited to the Games. Not being sanctioned does not automatically confer the privilege of an invitation" and that "this [case] may have a serious impact on the future fight against doping". The IOC found it imperative to point out that the CAS Secretary General "insisted that the CAS decision does not mean that these 28 competitors are innocent" and that they would consider an appeal against the court's decision. The court also downgraded the punishment by deciding that the 39 competitors should only be banned from the 2018 Games, not all future Olympic Games. The remaining three Russian competitors did not appeal their decisions until March 2020 and in September 2020, two of them were cleared of doping whilst the remaining one was found guilty, however all three had their life bans overturned.<ref>{{cite web|url=http://www.olympic.org/news/ioc-statement-on-cas-decision|title=IOC Statement on CAS Decision|date=1 February 2018|publisher=[[International Olympic Committee]]|access-date=4 February 2018}}</ref><ref>{{Cite news|date=2020-09-24|title=CAS overturn life bans handed to three Russian biathletes|language=en|work=Reuters|url=https://uk.reuters.com/article/uk-olympics-doping-russia-idUKKCN26F2FC|archive-url=https://web.archive.org/web/20200924233501/https://uk.reuters.com/article/uk-olympics-doping-russia-idUKKCN26F2FC|url-status=dead|archive-date=24 September 2020|access-date=2020-09-24}}</ref> After the partially successful appeal, 47 Russian competitors and coaches launched a further appeal to the CAS, in a final attempt to secure an invitation to the Games. This appeal was dismissed on 9 February 2018, the day of the opening ceremony, a decision that was welcomed by the IOC.<ref>{{cite web |url=http://www.tas-cas.org/fileadmin/user_upload/Media_Release_AHD9_DecisionOG18_02_03.pdf |title=Tas / Cas |access-date=9 February 2018 |url-status=live |archive-url=https://web.archive.org/web/20180209153248/http://www.tas-cas.org/fileadmin/user_upload/Media_Release_AHD9_DecisionOG18_02_03.pdf |archive-date=9 February 2018}}</ref>

      An original pool of 500 Russians was put forward for consideration for the 2018 Games and 111 of them were immediately eliminated from the pool; this included the 43 competitors who had been sanctioned by the Oswald Commission.<ref>{{cite web|url=https://www.olympic.org/news/reduced-pool-of-russian-athletes-and-officials-who-can-be-considered-for-invitation-to-pyeongchang-2018-determined|title=Reduced Pool of Russian Athletes and Officials Who Can Be Considered for Invitation to PyeongChang 2018 Determined|date=25 January 2018|publisher=[[International Olympic Committee]]|access-date=30 January 2018}}</ref> The remaining 389 were required to meet a number of pre-games conditions, such as a further round of tests and re-analysis of stored samples, and they would only be considered for invitation to the Games providing these requirements were met. The final number of neutral Russian competitors that were invited to compete was 169.<ref>{{cite news|url=https://www.nytimes.com/2018/01/25/sports/olympics/russia-doping.html|title=Russia Is Barred From Winter Olympics. Russia Is Sending 169 Athletes to Winter Olympics|date=25 January 2018|newspaper=[[The New York Times]]|access-date=4 February 2018}}</ref> However, speed skater [[Olga Graf]] chose not to compete, stating that "the sport has become a bargaining chip in dirty political games",<ref>{{cite web|url=https://www.bbc.co.uk/sport/winter-olympics/42870181|title=Winter Olympics 2018: Olga Graf turns down IOC invite for Pyeongchang|date=9 February 2018|website=bbc.co.uk|url-status=live|archive-url=https://web.archive.org/web/20180209205735/http://www.bbc.co.uk/sport/winter-olympics/42870181|archive-date=9 February 2018}}</ref> bringing the eventual total to 168.

      ====Reaction in Russia====
      In the past, the [[President of Russia]], [[Vladimir Putin]], and other government officials had stated that it would be a humiliation for Russia if its competitors were not allowed to compete at the Olympics under the Russian flag.<ref>{{cite news |date=19 October 2017 |title=Putin says US pressured IOC to ban Russia from Winter Games |url=https://sports.yahoo.com/putin-says-us-pressured-ioc-ban-russia-winter-175151912--oly.html |work=[[Yahoo Sports]] |agency=[[Agence France-Presse]] |access-date=5 December 2017 |archive-date=6 December 2017 |archive-url=https://web.archive.org/web/20171206160927/https://sports.yahoo.com/putin-says-us-pressured-ioc-ban-russia-winter-175151912--oly.html |url-status=dead }}</ref> However, despite rumours to the contrary, his spokesman [[Dmitry Peskov]] later revealed that no boycott had been discussed leading up to the IOC's announcement.<ref name=":2">{{cite news |last1=Ruiz |first1=Rebecca C. |last2=Panja |first2=Tariq |date=5 December 2017 |title=Russia Banned From Winter Olympics by I.O.C. |url=https://www.nytimes.com/2017/12/05/sports/olympics/ioc-russia-winter-olympics.html |work=[[The New York Times]] |access-date=5 December 2017}}</ref> After the IOC decision was made public, [[Ramzan Kadyrov]], the [[Head of the Chechen Republic|Head of Chechnya]], announced that no [[Chechens|Chechen]] competitors would be allowed to compete under a neutral flag.<ref>{{cite web|url=https://www.championat.com/other/news-2972433-kadyrov-ni-odin-chechenskij-sportsmen-ne-budet-vystupat-pod-nejtralnym-flagom.html|title=Кадыров: ни один чеченский спортсмен не будет выступать под нейтральным флагом|website=Championat.com|access-date=6 December 2017 |language=ru}}</ref>

      On 6 December 2017, Putin confirmed that the Russian government would not prevent any of its competitors from participating at the 2018 Games as individuals, despite there being calls from other leading Russian politicians for a boycott.<ref>{{cite web|url=http://www.interfax.ru/sport/590596 |title=Жириновский предложил отказаться от участия в Олимпиаде-2018 |date=6 December 2017 |publisher=Interfax.ru |access-date=6 December 2017 |language=ru}}</ref><ref>{{cite news|url=https://edition.cnn.com/2017/12/06/sport/russia-doping-2018-winter-olympics-vladimir-putin-pyeongchang/index.html|title=Vladimir Putin won't tell Russian athletes to boycott Winter Olympics|date=6 December 2017|publisher=CNN|access-date=6 December 2017}}</ref> [[Gennady Zyuganov]], leader of the [[Communist Party of the Russian Federation]], put forward a proposal to send fans to the Games with a Soviet [[Victory Banner]].<ref>{{Cite news|url=http://www.mk.ru/politics/2018/01/30/zyuganov-predlozhil-otpravit-na-olimpiadu-bolelshhikov-so-znamenem-pobedy.html|title=Зюганов предложил отправить на Олимпиаду болельщиков со знаменем Победы|date=30 January 2018|work=mk.ru|access-date=5 February 2018|language=ru}}</ref> [[Minister of Foreign Affairs (Russia)|Russian Minister of Foreign Affairs]], [[Sergey Lavrov]], commented that the United States "fears honest competition",<ref>{{cite news|url=http://tass.com/politics/985069|title=US fears honest competition in energy, arms industry and sports, Lavrov warns|date=15 January 2018|publisher=[[TASS]]|access-date=18 January 2018}}</ref> affirming Vladimir Putin's position that the United States used its influence within the IOC to "orchestrate the doping scandal".<ref>{{cite news|url=https://www.bbc.com/news/world-europe-41934604|title=Putin: Doping allegations 'US plot against Russian election'|date=9 November 2017|work=BBC News|access-date=18 January 2018|language=en}}</ref>

      According to ''[[Komsomolskaya Pravda]]'', 86% of the Russian population opposed participation in the Winter Olympics under a neutral flag.<ref name="kp.ru">{{Cite news|url=https://www.spb.kp.ru/daily/26772/3805611/|title=Опрос "КП": Стоит ли спортсменам из России ехать на Олимпиаду под нейтральным флагом|date=20 December 2017|work=kp.ru|access-date=4 February 2018|language=ru}}</ref>

      Many Russians believed that the IOC was retaliating against Russia for their discriminatory [[Russian gay propaganda law|anti-gay law]] which provoked considerable controversy with the IOC during the [[2014 Winter Olympics]] when it was hosted in [[Sochi]], Russia.<ref name="kp.ru" />

      === 2018 ===
      ==== January to February 2018 ====
      In January 2018, it was reported that all leading Russian competitors avoided meeting doping officers and passing anti-doping tests in a track and field competition in [[Irkutsk]].<ref>{{cite web|url=https://themoscowtimes.com/news/russian-athletes-disappear-from-competition-after-doping-agency-arrives-60204|title=Russian Athletes Disappear From Competition After Doping Agency Arrives|work=[[The Moscow Times]]|date=17 January 2018|access-date=6 February 2018}}</ref>

      During the [[2018 Winter Olympics|Pyeongchang Winter Olympics]] in February, two Russian competitors from the [[Olympic Athletes from Russia at the 2018 Winter Olympics|Olympic Athletes from Russia]] (OAR) delegation failed doping tests and were disqualified: curler [[Aleksandr Krushelnitckii]]<ref>{{cite web|url=http://www.tas-cas.org/fileadmin/user_upload/Media_Release_ADD_2018__English__6.pdf|title=CAS Anti-Doping Division – Olympic Winter Games Pyeongchang 2018 – Media Release 6 – Aleksandr Krushelnitckii is found guilty of an anti-doping rule violation with meldonium|work=[[Court of Arbitration for Sport]]|date=22 February 2018|access-date=9 March 2018}}</ref> who won a bronze medal in the mixed doubles event; and bobsleigh pilot [[Nadezhda Sergeeva]]<ref>{{cite web|url=http://www.tas-cas.org/fileadmin/user_upload/Media_Release_ADD_2018__English__7.pdf|title=CAS Anti-Doping Division – Olympic Winter Games Pyeongchang 2018 – Media Release 7 – Nadezhda Sergeeva is found guilty of an anti-doping rule violation with trimetazidine|work=[[Court of Arbitration for Sport]]|date=24 February 2018|access-date=9 March 2018}}</ref> who finished twelfth in the two-woman event. The IOC expressed their disappointment at the positive doping tests and stated that the OAR team would consequently not be allowed to parade under the Russian flag at the closing ceremony.<ref>{{cite web|url=https://www.bbc.co.uk/sport/winter-olympics/43186278 |title=Winter Olympics: IOC votes to lift Russia ban if no further doping violations – BBC Sport |website=bbc.co.uk |date=25 February 2018 |access-date=26 February 2018}}</ref>

      Despite the two disqualifications, the IOC announced on 28 February that it had chosen to reinstate Russia's Olympic membership, just days after the end of the Winter Games, as no more cases of doping had been found in the delegation. The surprise decision to lift the suspension provoked anger among the international sporting community.<ref>{{cite news|title=Russia's Olympic membership restored by IOC after doping ban|url=https://www.theguardian.com/sport/2018/feb/28/russia-says-ioc-reinstated-membership-after-doping-allegations|newspaper=[[The Guardian]]|date=28 February 2018|access-date=1 March 2018}}</ref> The IOC had planned all along to reinstate Russia after the Games provided there were no more failed tests. Their statement read "The suspension of the Russian Olympic Committee is automatically lifted with immediate effect."<ref>{{cite web |url=https://www.olympic.org/news/ioc-statement-2018-02-28 |title=IOC Statement |access-date=1 March 2018 |date=28 February 2018 |website=www.olympic.org |publisher=[[International Olympic Committee]] |location=Lausanne }}</ref><ref>{{cite news|title=Russia's Olympic membership restored by International Olympic Committee – BBC Sport |website=bbc.co.uk|url=https://www.bbc.co.uk/sport/winter-olympics/43227420|access-date=1 March 2018|date=28 February 2018}}</ref>

      ==== May to August 2018 ====
      In the buildup to the [[2018 FIFA World Cup]] hosted by Russia, lab director and whistleblower [[Grigory Rodchenkov]] said that he recognised one of Russia's players as a doper in one of his own doping programmes.<ref>{{cite news|url=https://www.theguardian.com/football/2018/may/31/russian-world-cup-player-recognised-doping-whistleblower|title=Russian World Cup player recognised by doping whistleblower|date=31 May 2018|newspaper=[[The Guardian]]|language=en|access-date=7 June 2018}}</ref> FIFA had opened an inquiry into Russian doping in football after the McLaren report was published with 33 Russian footballers named in it,<ref>{{Cite news|url=https://www.bbc.co.uk/sport/football/42062974|title=Fifa contacts McLaren over doping claims in football|date=2017-11-21|access-date=2019-01-17|language=en-GB}}</ref> but said in May that they had found 'insufficient evidence' of doping but said that some cases with players unrelated to the World Cup were ongoing. The tournament eventually concluded with no players failing a drugs test. A few months after the tournament had concluded in September, the father of Russian player [[Denis Cheryshev]] said that his son had been taking [[growth hormone]] during the tournament. He was later cleared of doping by anti-doping authorities.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/football/45513410|title=Denis Cheryshev: Russia midfielder cleared of doping violation by authorities|date=2018-09-13|work=BBC Sport|access-date=2018-09-15|language=en-GB}}</ref>

      On 20 July, the [[Athletics Integrity Unit]] (AIU) released details of 120 doping cases with some 85 of the cases involving Olympic and World Championships medallists and almost half (47.5%) involving Russians.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/athletics/44898747|title=Ruth Jebet: Olympic champion among 120 doping cases revealed by Athletics Integrity Unit|date=2018-07-20|work=BBC Sport|access-date=2018-07-20|language=en-GB}}</ref> On 27 July, 10 days before the start of the [[2018 European Athletics Championships]], the IAAF announced that despite making improvements in key areas, Russia would still remain suspended from international athletics competitions.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/athletics/44986177|title=Russia doping: Country still suspended by IAAF despite 'improvement'|date=2018-07-27|work=BBC Sport|access-date=2018-07-27|language=en-GB}}</ref> 29 Russian athletes still competed in the championships as [[Authorised Neutral Athletes at the 2018 European Athletics Championships|Authorised Neutral Athletes]],<ref>{{Cite web|url=http://rusathletics.info/96582|title=ЧЕ в Берлине: 29 наших, статистика – Всероссийская федерация лёгкой атлетики|website=rusathletics.info|language=ru|access-date=2018-08-14}}</ref> and Russia eventually topped the medal table of the inaugural [[2018 European Championships|European Championships]].

      ==== September 2018 ====
      The World-Anti Doping Agency voted on 20 September whether or not to re-instate the Russian Anti-Doping Agency after they were suspended in 2015. A WADA compliance review committee had recommended that RUSADA be re-instated, which sparked anger from international competitors and officials. One of the members of the six-person review committee, [[Beckie Scott]], the chair of WADA'S athletes commission, left her role on the committee in protest over the recommendation to reinstate RUSADA and the vice president of the agency, [[Linda Cathrine Hofstad Helleland|Linda Helleland]], said that she would vote against their re-admission.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/45560353|title=Wada vice-president Linda Helleland to oppose lifting Russia doping suspension|date=2018-09-18|work=BBC Sport|access-date=2018-09-18|language=en-GB}}</ref> A group of competitors from UK-Anti-Doping had earlier called for Russia to remain banned until it had overhauled its Anti-Doping System, saying that Russia's re-admission would be "a catastrophe for clean sport"<ref>{{Cite news|url=https://www.bbc.co.uk/sport/45509417|title=Russia doping ban: Panel advises Wada to uphold Rusada ban|date=2018-09-13|work=BBC Sport|access-date=2018-09-15|language=en-GB}}</ref> and a member of US Anti-Doping Agency was quoted as saying 'frankly, it stinks to high heaven'.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/45525959|title=Russia doping ban: Panel advises Wada to bring end to Rusada ban|date=2018-09-14|work=BBC Sport|access-date=2018-09-15|language=en-GB}}</ref> The former head of the Moscow laboratory turned whistle-blower [[Grigory Rodchenkov]] said that lifting Russia's ban would be a 'catastrophe'.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/45571137|title=Lifting Russia doping ban would be catastrophic – whistleblower Grigory Rodchenkov|date=2018-09-19|work=BBC Sport|access-date=2018-09-19|language=en-GB}}</ref>

      WADA had insisted that Russia meet two criteria before RUSADA could be re-admitted; accept the findings of the McLaren Report and grant access to Moscow's anti-doping laboratory. The compliance review committee had reviewed a letter from the Russian Sports Ministry that said it had 'sufficiently acknowledged the issues identified in Russia' and that they agree to accept the two remaining conditions'.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/45532629|title=Russia doping ban: Wada suggested compromise to bring end to Rusada ban|date=2018-09-15|work=BBC Sport|access-date=2018-09-15|language=en-GB}}</ref>

      WADA voted unanimously to re-instate the Russian Anti-Doping Agency at their congress in the [[Seychelles]], going against the wishes of numerous national Anti-Doping agencies around the world.<ref>{{Cite web|url=https://inews.co.uk/sport/other/russia-doping-ban-ends-wada-lifts-suspension-state-sponsored-drug-scandal/|title=Russia doping ban ends as Wada lifts three-year suspension over state-sponsored drug scandal|last=Lowell|first=Hugo|date=2018-09-20|website=inews.co.uk|language=en-GB|access-date=2019-02-10}}</ref> The lawyer for whistle-blower [[Grigory Rodchenkov]] called it "the greatest treachery against clean athletes in Olympic history" whilst US Anti-Doping Agency head Travis Tygart said the decision is "bewildering and inexplicable" and a "devastating blow to the world's clean competitors". The decision received so much criticism that the head of WADA, [[Craig Reedie]], had to publicly defend the decision<ref>{{Cite news|url=https://www.bbc.co.uk/sport/45565273|title=Russia reinstated by Wada after doping scandal suspension|date=2018-09-20|work=BBC Sport|access-date=2018-09-20|language=en-GB}}</ref><ref>{{Cite news|url=https://www.bbc.co.uk/sport/45633668|title=Russia doping: Wada head Sir Craig Reedie defends Russian reinstatement decision|date=2018-09-24|work=BBC Sport|access-date=2018-09-26|language=en-GB}}</ref> as he came under mounting criticism.<ref>{{Cite web|url=https://inews.co.uk/sport/wada-president-craig-reedie-lashes-out-amid-criticism-over-russia-return/|title=Wada president Reedie lashes out amid criticism over Russia return|last=Lowell|first=Hugo|date=2018-11-01|website=inews.co.uk|language=en-GB|access-date=2019-02-10}}</ref>

      With RUSADA now re-instated, the Russian Athletics Federation launched a legal challenge to the IAAF to overturn their ban from athletics competitions from which they were still suspended.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/athletics/45649445|title=Russia calls on IAAF to lift doping ban|date=2018-09-26|work=BBC Sport|access-date=2018-09-26|language=en-GB}}</ref> The IAAF, however, refused the request,<ref>{{Cite web|url=https://inews.co.uk/sport/russian-athletics-to-remain-in-wilderness-despite-wada-ruling/|title=Russian athletics to remain in wilderness despite Wada ruling|last=Lowell|first=Hugo|date=2018-09-20|website=inews.co.uk|language=en-GB|access-date=2019-02-10}}</ref> which was later withdrawn by the Russian athletics federation. By 26 September, 77 Russians were serving doping bans in the sport of athletics including 72 athletes and five coaches and athlete support personnel.<ref>{{Cite web|url=https://www.athleticsintegrity.org/notifications-sanctions/p4?athleteName=&role=&country=RUS&sex=&sanction=&discipline=&secondaryDiscipline=&infraction-year-from=&infraction-year-to=&eligibility-year-from=&eligibility-year-to=|title=Notifications and Sanctions {{!}} Athletics Integrity Unit|website=www.athleticsintegrity.org|language=en|access-date=2018-09-26}}{{dead link|date=November 2019 |bot=InternetArchiveBot |fix-attempted=yes }}</ref>

      ==== November to December 2018 ====
      It was announced in November that the International Olympic Committee would further re-analyse stored samples from the [[2012 Summer Olympics|2012 Olympics]], testing for all banned substances. This came after 48 adverse analytical findings were found in previous re-analysis of samples with 22 of them being Russian<ref>{{Cite web|url=https://www.olympic.org/news/the-international-olympic-committee-reanalyses-further-london-2012-samples-for-banned-substances|title=The International Olympic Committee reanalyses further London 2012 samples for banned substances – Olympic News|date=2018-11-15|website=International Olympic Committee|language=en|access-date=2018-12-28}}</ref>

      On 14 December, ''[[i (British newspaper)|The i]]'' newspaper reported from Moscow that officials at the [[Ministry of Sport (Russia)|Russian Ministry of Sport]] were still reluctant to cooperate fully with WADA over turning over the testing data from its anti-doping laboratory.<ref>{{Cite web|url=https://inews.co.uk/sport/russia-sport-ban-doping-wada-rusada-deadline/|title=Russia faces a new ban from world sport as Wada deadline looms and internal disagreements grow|last=Lowell|first=Hugo|date=2018-12-14|website=inews.co.uk|language=en-GB|access-date=2019-02-10}}</ref> WADA subsequently released a statement that said their Expert Team had flown to extract the data. Later, it emerged that WADA was unsuccessful in retrieving the data because their equipment had allegedly not been properly certified.

      The reinstatement of RUSADA prompted allegations of bullying and a call for reform within the World Anti-Doping Agency,<ref>{{Cite news|url=https://www.bbc.co.uk/sport/45840481|title=Wada: Anti-doping campaigner Beckie Scott says officials tried 'to bully' her|date=2018-10-12|work=BBC Sport|access-date=2018-12-28|language=en-GB}}</ref> however the IAAF decided to uphold Russia's suspension from athletics into 2019 with 63 Russians cleared to compete as neutral athletes for the year.<ref>{{Cite web|url=https://www.iaaf.org/news/press-release/authorised-neutral-athletes-russia-2019-febru|title=IAAF approves the application of 21 Russians to compete internationally as neutral athletes {{!}} News {{!}} iaaf.org|website=www.iaaf.org|access-date=2019-02-21}}</ref><ref>{{Cite news|url=https://www.bbc.co.uk/sport/athletics/46954911|title=IAAF clears 42 Russian athletes to compete as neutrals in 2019|date=2019-01-21|access-date=2019-01-22|language=en-GB}}</ref><ref>{{Cite news|url=https://www.bbc.co.uk/sport/athletics/46441625|title=IAAF upholds Russia's ban from athletics into 2019|date=2018-12-04|work=BBC Sport|access-date=2018-12-28|language=en-GB}}</ref> A team of five WADA experts traveled to Moscow on 17 December expected to be given full access to the laboratory, but on arrival, they were refused full access which put RUSADA on the brink of being suspended once more with their president Yuri Ganus appealing personally to Putin for a resolution.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/46655754|title=Russian doping: Rusada on verge of suspension again|date=2018-12-21|work=BBC Sport|access-date=2018-12-28|language=en-GB}}</ref><ref>{{Cite news|url=https://www.bbc.co.uk/sport/46697110|title=Russian doping: Rusada chief appeals to President Vladimir Putin for 'urgent resolution'|date=2018-12-27|work=BBC Sport|access-date=2018-12-28|language=en-GB}}</ref>

      === 2019 ===
      ==== January 2019 ====
      WADA had set Russia a strict deadline to hand over data from their Moscow laboratory by 31 December, a deadline which they evidently missed.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/46718153|title=Russian doping: Russia set to miss end-of-year Wada deadline|date=2018-12-30|work=BBC Sport|access-date=2019-01-07|language=en-GB}}</ref> There were calls for the WADA compliance review committee to meet immediately to consider their next steps, however they decided to meet much later on 14 January which caused anger among the international community with 16 national anti-doping bodies calling for Russia's suspension once more. WADA president Dick Pound described the reaction to their decision as like a "lynch mob".<ref>{{Cite news|url=https://www.bbc.co.uk/sport/46751750|title=Russian doping: Head of key Wada panel defends waiting to decide on next action|date=2019-01-03|work=BBC Sport|access-date=2019-01-07|language=en-GB}}</ref><ref>{{Cite news|url=https://www.bbc.co.uk/sport/athletics/46779606|title=Rusada missed deadline response like a 'lynch mob' says Dick Pound|date=2019-01-07|work=BBC Sport|access-date=2019-01-07|language=en-GB}}</ref>

      WADA eventually gained full access to the Moscow laboratory on 10 January, 10 days after the initial deadline. The WADA president described it as a "major breakthrough for clean sport" and said that they were now starting their second phase of authentication and review of the data that had been collected to make sure that it had not been compromised and to build strong cases against Russian competitors that might have doped. WADA eventually managed to retrieve 2262 samples from the Moscow lab.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/48114151|title=World Anti-Doping Agency retrieves 2,262 samples from Russian lab|date=2019-04-30|access-date=2019-05-01|language=en-GB}}</ref><ref>{{Cite news|url=https://www.bbc.co.uk/sport/46910522|title=World Anti-Doping Agency retrieves data from Russian lab|date=2019-01-17|access-date=2019-01-17|language=en-GB}}</ref> Despite missing the deadline, RUSADA was still deemed compliant and was not punished.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/46960662|title=Russian Anti-Doping Agency remains compliant despite missing World Anti-Doping Agency deadline|date=2019-01-22|access-date=2019-01-22|language=en-GB}}</ref> The Institute of National Anti-Doping Organisations (iNADO) said that "Russia has been granted more chances and, ultimately, leniency than any individual competitor or small country could expect to receive. This is very troubling".<ref>{{Cite web|url=http://www.inado.org/about/press-releases.html|title=iNADO – Institute of National Anti-Doping Organisations: Press Releases|website=www.inado.org|access-date=2019-01-24|archive-date=25 January 2019|archive-url=https://web.archive.org/web/20190125020422/http://www.inado.org/about/press-releases.html|url-status=dead}}</ref>

      ==== February to March 2019 ====
      It was announced on 8 February that the [[International Paralympic Committee]] would now re-instate Russia by 15 March after they were suspended in July 2016. They stated that 69 of the 70 reinstatement criteria had been met with the last criterion being to accept the findings of the McLaren report.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/disability-sport/47169494|title=International Paralympic Committee to reinstate Russia|date=2019-02-08|access-date=2019-02-08|language=en-GB}}</ref> Meanwhile, Russia's ban in athletics was upheld by the IAAF 'until further notice' stating that there were two outstanding issues that needed to be resolved.<ref>{{Cite news|url=https://www.bbc.co.uk/sport/athletics/47524315|title=Russia doping scandal: IAAF upholds the ban on Russian athletes until further notice|date=2019-03-11|access-date=2019-03-19|language=en-GB}}</ref>

      On 19 March, France issued arrest warrants for two former Russian athletics officials as part of an investigation into a doping cover-up. The former head of Russian athletics [[Valentin Balakhnichev]] and the ex-coach of the Russian athletics team Alexei Melnikov, who were both banned from the sport for life in 2016, were targeted.<ref>{{Cite news|url=https://www.bbc.com/news/world-europe-47631020|title=Arrest warrants issued in doping probe|date=2019-03-19|access-date=2019-03-19|language=en-GB}}</ref>

      ==== June to July 2019 ====
      Russia's 2008 Olympic high jump champion [[Andrey Silnov]] stepped down from his position as the vice-president of the Russian Athletics Federation in June after it was reported that he was under investigation for a possible doping violation following a re-analysis of his sample from 2013.<ref>{{cite web|url=http://www.insidethegames.biz/articles/1080620/olympic-gold-medallist-steps-down-as-first-vice-president-of-russian-athletics-federation-while-facing-doping-case|title=Olympic gold medallist steps down as first vice-president of Russian Athletics Federation while facing doping case|date=14 June 2019|website=www.insidethegames.biz|access-date=2019-06-14}}</ref> It was also reported that seven Russian track and field athletes, including athletes from the national team, were caught training in [[Kyrgyzstan]] with Vladimir Kazarin, a coach who was banned from the sport for life in 2017 for doping offences.<ref>{{Cite web|url=https://apnews.com/02387a004b964ca1b3f9a37e8b3358af|title=Russian track and field faces a wave of disciplinary cases|last=Ellingworth|first=James|date=2019-06-14|website=AP NEWS|access-date=2019-06-15}}</ref> With all of that in mind, Russia was in danger of remaining suspended for the [[2019 World Championships in Athletics|2019 World Athletics Championships]] in September after the IAAF voted to uphold their ban, the 11th time they had done so.<ref>{{cite news|url=https://www.bbc.co.uk/sport/athletics/48570272|title=Russia's ban for doping upheld months before World Championships in Doha|date=2019-06-09|access-date=2019-06-14}}</ref> In July [[Reuters]] reported that two Olympic Russian boxers competed in 2018 while serving doping bans applied by RUSADA. Reuters said this indicated an inconsistency in Russia's reform of its anti-doping practices. After Reuters notified it of the two cases RUSADA said it would investigate.<ref>{{Cite news|url=https://uk.reuters.com/article/sport-doping-russia-boxing-idUKL8N24H50Q|archive-url=https://web.archive.org/web/20190718204752/https://uk.reuters.com/article/sport-doping-russia-boxing-idUKL8N24H50Q|url-status=dead|archive-date=18 July 2019|title=EXCLUSIVE-Two Russian boxers competed despite doping bans|date=2019-07-17|work=Reuters|access-date=2019-07-18|language=en}}</ref>

      The first cases of possible Anti-Doping violations against Russian competitors' samples taken from the Moscow Laboratory were handed over to the individual sporting federations in July.<ref>{{Cite web|url=https://www.cwn.news/sports/doping-first-cases-on-russia-cheats-sent-to-federations/|title=Doping: First cases on Russia cheats sent to federations {{!}} CreaWorldNews|agency=Reuters|language=en-US|access-date=2019-07-11|archive-url=https://web.archive.org/web/20190711212455/https://www.cwn.news/sports/doping-first-cases-on-russia-cheats-sent-to-federations/|archive-date=11 July 2019|url-status=dead}}</ref> WADA said that the data of 43 competitors had been handed over out of a target pool of 298. The first sporting federation to suspend competitors from the data received was the International Weightlifting Federation who suspended 12 Russian weightlifters including Olympic, World and European medalists.<ref>{{cite web|url=http://www.insidethegames.biz/articles/1083561/iwf-suspends-seven-more-athletes-doping|title=IWF provisionally suspends seven more athletes based on McLaren and Moscow Lab|date=16 August 2019|website=www.insidethegames.biz|access-date=2019-09-24}}</ref>

      ==== September to November 2019 ====
      On 21 September, it was widely reported that some of the data retrieved from the Moscow laboratory may have been manipulated and tampered with before it was retrieved by the World Anti-Doping Agency. This meant that Russia would remain suspended from the then-upcoming [[2019 World Athletics Championships]], and faced a possible ban from hosting and competing in all major sporting events including the upcoming [[2020 Summer Olympics|2020 Olympics]] and possibly the [[2022 Winter Olympics|2022 Olympics]], [[2022 FIFA World Cup]], [[2023 FIFA Women's World Cup]] and the [[2024 Summer Olympics|2024 Olympics]].<ref>{{Cite news|url=https://www.bbc.co.uk/sport/49780788|title=Russian doping scandal: Wada suspects Russia manipulated laboratory data|date=2019-09-21|access-date=2019-09-24|language=en-GB}}</ref><ref>{{Cite news|url=https://www.bbc.co.uk/sport/49795333|title=Russian doping scandal: Russian athletes remain suspended after Wada launches action|date=2019-09-23|access-date=2019-09-24|language=en-GB}}</ref><ref>{{Cite news|url=https://www.bbc.co.uk/sport/athletics/49805296|title=Russian doping scandal: Russia faces ban from all major sports events – Wada|date=2019-09-23|access-date=2019-09-24|language=en-GB}}</ref><ref>{{cite web |title=WADA ban on Russia may not cover 2020 Olympics, but will then cover 2024 Olympics – CRC |url=http://www.uniindia.com/~/wada-ban-on-russia-may-not-cover-2020-olympics-but-will-then-cover-2024-olympics--crc/Sports/news/1816082.html |website=www.uniindia.com}}</ref>

      Two months later, on 21 November, a number of Russian athletics officials were suspended for obstructing and failing to co-operate with an investigation into the whereabouts of high-jumper [[Danil Lysenko]]. President of the Russian Athletics Federation Dmitry Shlyakhtin was suspended along with 6 others associated with RusAF, including the athlete and his coach.<ref>{{cite web|url=http://www.insidethegames.biz/articles/1087278/rusaf-charged-by-aiu-for-obstruction|title=Russian Athletics Federation President among officials charged by AIU|date=21 November 2019|website=www.insidethegames.biz|access-date=2019-11-26}}</ref>

      ====Doping ban====
      WADA then recommended that Russia be declared non-compliant once more and banned from hosting sporting events for four years.<ref>{{cite web|url=https://www.bbc.com/sport/50551384|title=Euro 2020: Russia's staging of games under threat after Wada recommends ban|work=BBCSports.com|date=26 November 2019}}</ref><ref>{{cite web|url=https://www.euronews.com/2019/11/26/russias-sports-officials-cry-foul-as-wada-eyes-four-year-olympic-ban|title=Russia's sports officials cry foul as WADA eyes four-year Olympic ban|agency=Reuters|work=EuroNews|date=26 November 2019}}</ref> On 9 December, WADA banned Russia from major international sporting events for four years, on charges of tampering with doping-related reports. Russia will be barred from hosting, participating in, or establishing bids for international sporting events during this period. As before, WADA will allow cleared Russian competitors to compete neutrally, but not under the Russian flag. This will not affect Russia's co-hosting of [[UEFA Euro 2020]], as WADA does not recognize [[UEFA]] as a "major event organization" covered by the ban.<ref>{{Cite news|url=https://www.bbc.com/sport/olympics/50710598|title=Russia banned for four years to include 2020 Olympics and 2022 World Cup|work=BBC News|date=2019-12-09|access-date=2019-12-09|language=en-GB}}</ref> In regard to this sanction, WADA president Craig Reedie said that "For too long, Russian doping has detracted from clean sport". He also added that  "Russia was afforded every opportunity to get its house in order and rejoin the global anti-doping community for the good of its competitors and of the integrity of sport, but it chose instead to continue in its stance of deception and denial".<ref name=cna>{{cite web |url=https://www.channelnewsasia.com/news/world/doping-ban-olympics-world-russia-anger-12169994 |title=Russia reacts with anger after doping ban from Olympics, World Cup |access-date=13 December 2019 |date=10 December 2019 |publisher=[[CNA (news channel)|CNA]] |location=Singapore |archive-date=13 December 2019 |archive-url=https://web.archive.org/web/20191213184335/https://www.channelnewsasia.com/news/world/doping-ban-olympics-world-russia-anger-12169994 |url-status=dead }}</ref> Russia appealed the decision to the [[Court of Arbitration for Sport]].<ref>{{Cite news|url=https://www.bbc.co.uk/sport/51666252|title=Russia's doping appeal set for May|work=BBC Sport }}</ref>

      === 2020 ===

      ==== January to April 2020 ====
      In January 2020, WADA suspended the Moscow laboratory from carrying out its only remaining accreditation, analysis of blood samples. The Moscow laboratory had been allowed to carry out analysis of blood samples since May 2016 as "practically impossible for laboratories to interfere with the blood variables of samples due to the nature of the analytical equipment and the athlete biological passport principles in place".<ref>{{Cite web|url=https://www.insidethegames.biz/articles/1089523/wada-suspend-moscow-laboratory-status|title=WADA suspend status of Moscow Laboratory in response to Russian data tampering|date=2020-01-22|website=www.insidethegames.biz|access-date=2020-01-23}}</ref>

      In March, World Athletics announced that no more than 10 Russian track and field athletes would be allowed to compete as neutrals at the summer's Olympics. It also fined the Russian Athletics Federation $10 million due to the obstruction and forgery of documents relating to the doping case of Danil Lysenko and stated that all Russian neutrals would be banned if half of the fine was not paid by 1 July. The [[2020 Summer Olympics]] were later delayed until 2021 due to the ongoing [[COVID-19 pandemic]].<ref>{{Cite news|last=Ingle|first=Justin McCurry Sean|date=2020-03-24|title=Tokyo Olympics postponed to 2021 due to coronavirus pandemic|language=en-GB|work=The Guardian|url=https://www.theguardian.com/sport/2020/mar/24/tokyo-olympics-to-be-postponed-to-2021-due-to-coronavirus-pandemic|access-date=2020-07-04|issn=0261-3077}}</ref>

      On 30 April, WADA announced that they had completed their 'painstaking' investigation of the 298 Russian competitors whose data they had received from the Moscow laboratory in January 2019. The first data was handed over in July and a total of 27 international sporting federations and one major event organisation received the data in order to decide on possible anti-doping violations being brought forward.<ref>{{Cite web|title=WADA hands over priority athlete cases to Anti-Doping Organizations in Russia investigation (30 April 2020)|url=https://www.wada-ama.org/en/media/news/2020-04/wada-hands-over-priority-athlete-cases-to-anti-doping-organizations-in-russia|date=2020-04-30|website=World Anti-Doping Agency|language=en|access-date=2020-04-30}}</ref>

      ==== July to December 2020 ====
      The Russian athletics federation failed to pay half of its $10 million World Athletics fine by 1 July. RusAF's chief, Yevgeny Yurchenko, stated that the federation did not have the sufficient funds to pay the fine.<ref>{{Cite news|title=World Athletics criticises Russia over fine|language=en-GB|work=BBC Sport|url=https://www.bbc.co.uk/sport/athletics/53269232|access-date=2020-07-04}}</ref> RusAF avoided expulsion from World Athletics after the Russian Sports Minister [[Oleg Matytsin]] made an 'unconditional' guarantee to pay the fine by a new deadline of 15 August. Russia paid the fine of $5 million and $1.31 million in costs three days before the set deadline and avoided expulsion by doing so.<ref>{{Cite web|date=12 August 2020|title=RusAF pay outstanding fine to World Athletics|url=https://www.insidethegames.biz/articles/1097280/rusaf-pay-world-athletics-fine|access-date=2020-08-12|website=www.insidethegames.biz}}</ref>

      In a case that was described as 'almost identical' to that of Danil Lysenko, Russian figure skater [[Maria Sotskova]] was handed a 10-year ban from the sport by RUSADA for submitting a forged medical document in relation to her three missed doping tests and the presence of a prohibited substance in her body.<ref>{{Cite web|date=19 September 2020|title=Russian figure skater Sotskova faces 10-year ban for forged document|url=https://www.insidethegames.biz/articles/1098595/sotskova-10-year-ban-forged-document|access-date=2020-09-19|website=www.insidethegames.biz}}</ref>

      The [[Court of Arbitration for Sport]], on review of Russia's appeal of its case from WADA, ruled on 17 December to reduce the penalty that WADA had placed. Instead of banning Russia from sporting events, the ruling allowed Russia to participate at the Olympics and other international events, but for a period of two years, athletes and teams who were to represent Russia are not allowed to use the Russian name, flag, or anthem, and are instead required to present themselves as "Neutral Athlete" or "Neutral Team". The ruling does allow for their uniforms to display "Russia" on the uniform but only up to equal predominance as the "Neutral Athlete/Team" designation, as well as the use of the Russian flag colors within the uniform's design.<ref>{{cite web | url = https://apnews.com/article/russia-banned-name-flag-olympic-games-a8bd342806883f66152859701d5ae5d4 | title=  Russia can't use its name and flag at the next 2 Olympics | first = Graham | last = Dunbar |date = 17 December 2020 | access-date= 17 December 2020 | publisher = [[Associated Press]] }}</ref>

      However, the ruling also clarified that the sanctions do extend to any official World Championship and, subsequently, racing drivers from Russia are unable to officially represent Russia in FIA-sanctioned World Championships as long as the sanctions are in place.<ref name=Motorsports>{{cite web|url=https://www.motorsport.com/f1/news/russia-mazepin-neutral-flag-f1/5345260/|title=Mazepin set to race under neutral flag after CAS ruling extends to F1|author=Luke Smith|website=Motorsport.com|date=5 February 2021|access-date=5 February 2021}}</ref>

      === 2021 ===
      The IOC announced on 19 February 2021 that Russia would compete in both the [[2020 Summer Olympics]] (which was postponed to 2021 due to the [[COVID-19 pandemic in Russia]]) and [[2022 Winter Olympics]] under the acronym "ROC", after the name of the Russian Olympic Committee. However, the name of the committee itself in full could not be used to refer to the delegation. The ROC team would be represented by the flag of the Russian Olympic Committee.<ref>{{cite news |title=Olympics: Russia to compete under ROC acronym in Tokyo as part of doping sanctions |url=https://www.reuters.com/article/us-olympics-2020-russia/olympics-russia-to-compete-under-roc-acronym-in-tokyo-as-part-of-doping-sanctions-idUSKBN2AJ1UZ |access-date=20 February 2021 |work=Reuters |date=19 February 2021 |archive-url=https://web.archive.org/web/20210220020504/https://www.reuters.com/article/us-olympics-2020-russia/olympics-russia-to-compete-under-roc-acronym-in-tokyo-as-part-of-doping-sanctions-idUSKBN2AJ1UZ |archive-date=20 February 2021 |url-status=dead}}</ref> On 22 April, the IOC approved a fragment of [[Pyotr Tchaikovsky]]'s [[Piano Concerto No. 1 (Tchaikovsky)|Piano Concerto No. 1]] to be used in place of the Russian national anthem.<ref>{{Cite web|title=Tchaikovsky Selection To Replace Banned Russian Anthem At Tokyo 2020 and Beijing 2022 Olympics|url=https://www.rferl.org/a/russia-olympics-anthem-tchaikovsky-doping-ban-tokyo-beijing/31217728.html|date=22 April 2021|website=RadioFreeEurope/RadioLiberty}}</ref>

      At the 2020 Summer Olympics, no more than ten Russians were allowed to compete in the [[Athletics at the 2020 Summer Olympics|Athletics]] competition and no more than two Russians (one male and one female) were allowed to compete in the [[Weightlifting at the 2020 Summer Olympics|Weightlifting]] competition due to doping. Two qualified Russian rowers, [[Nikita Morgachyov]] and [[Pavel Sorin]], were replaced in the rowing team after testing positive for the banned substance [[Meldonium]] and two qualified Russian swimmers, [[Veronika Andrusenko]] and [[Aleksandr Kudashev]], were removed from the swimming team based on evidence from the Moscow Anti-Doping laboratory.<ref>{{Cite web|date=2021-07-15|title=Russian Swimmers Suspended From Tokyo Games Over Doping Violations|url=https://www.themoscowtimes.com/2021/07/15/russian-swimmers-suspended-from-tokyo-games-over-doping-violations-a74529|access-date=2021-07-15|website=The Moscow Times|language=en}}</ref><ref>{{Cite web|date=2021-07-07|title=Russian rowers removed after failed drug tests|url=https://www.espn.co.uk/olympics/story/_/id/31776159/two-russian-rowers-removed-olympics-squad-failing-drug-tests|access-date=2021-07-15|website=ESPN.com|language=en}}</ref> On appeal to CAS, Andrusenko and Kudashev were reinstated to the swimming squad and cleared to compete.<ref>{{Cite web|date=2021-07-18|title=CAS clears 2 Russian swimmers to compete in Tokyo Olympics|url=https://www.seattletimes.com/sports/olympics/cas-clears-2-russian-swimmers-to-compete-in-tokyo-olympics/|access-date=2021-07-20|website=The Seattle Times|language=en-US}}</ref> Only one doping violation related to Russians competing at the Olympics was recorded. Triathlete [[Igor Andreyevich Polyanski]] tested positive for [[Erythropoietin]] (EPO) in an out of competition test five days before he competed at the Olympics.<ref>{{Cite web|date=2021-08-12|title=World Triathlon asserts a potential anti-doping rule violation against Igor Polyanskiy|url=https://www.triathlon.org/news/article/world_triathlon_asserts_a_potential_anti_doping_rule_violation_against_igor|access-date=2021-08-17|website=World Triathlon|language=en}}</ref>

      === 2022 ===
      The medal ceremony for the Olympic [[Figure skating at the 2022 Winter Olympics – Team event|figure skating team event]], where the ROC won gold, originally scheduled for 8 February, was delayed over what [[International Olympic Committee]] (IOC) spokesperson Mark Adams described as a situation that required "legal consultation" with the [[International Skating Union]].<ref>{{Cite web|date=9 February 2022|title=Olympic medals in team figure skating delayed by legal issue|url=https://apnews.com/article/winter-olympics-figure-skating-sports-international-olympic-committee-court-of-arbitration-for-sport-c49077705737be8a7d41a2847c2f355b|access-date=9 February 2022|website=[[The Associated Press|AP News]]|language=en}}</ref> Several media outlets reported on 9 February that the issue was over a positive test for [[trimetazidine]] by the ROC's [[Kamila Valieva]],<ref>{{Cite news|last1=Tétrault-Farber|first1=Gabrielle|last2=Axon|first2=Iain|last3=Grohmann|first3=Karolos|date=9 February 2022|title=Figure skating-Russian media say teen star tested positive for banned drug|language=en|work=[[Reuters]]|url=https://www.reuters.com/lifestyle/sports/figure-skating-medals-ceremony-delayed-over-legal-consultation-2022-02-09/|access-date=9 February 2022}}</ref><ref>{{cite web|url=https://www.usatoday.com/story/sports/olympics/beijing/2022/02/09/olympic-figure-skating-team-medals-delayed-russian-drug-test/6717526001/|title=Positive drug test by Russian Kamila Valieva has forced a delay of Olympic team medals ceremony|first=Christine|last=Brennan|author-link=Christine Brennan|website=[[USA Today]]|date=9 February 2022}}</ref> which was officially confirmed on 11 February.<ref>{{cite news|last=Thompson|first=Anna|date=11 February 2022|title=Winter Olympics: Kamila Valieva failed drug test confirmed|url=https://www.bbc.com/sport/winter-olympics/60329120.amp|work=[[BBC Sport]]|access-date=12 February 2022}}</ref> Valieva's sample in question was taken by the [[Russian Anti-Doping Agency]] (RUSADA) at the [[2022 Russian Figure Skating Championships]] on 25 December, but the sample was not analyzed at the [[World Anti-Doping Agency]] (WADA) laboratory where it was sent for testing until 8 February, one day after the team event concluded.<ref>{{cite web|url=https://www.nytimes.com/2022/02/10/sports/olympics/kamila-valieva-trimetazidine.html|title=Star Russian Figure Skater Tested Positive for Banned Drug|first1=Juliet|last1=Macur|author-link1=Juliet Macur|first2=Andrew|last2=Keh|website=[[The New York Times]]|date=12 February 2022}}</ref>

      Valieva was assessed a provisional suspension after her positive result. But upon appeal, she was cleared by RUSADA's independent Disciplinary Anti-Doping Committee (DAC) on 9 February, just a day after receiving the provisional suspension.<ref>{{cite web|url=https://www.insidethegames.biz/articles/1119148/rusada-beijing-2022-valieva-sample|title=RUSADA blames COVID-19 wave for delayed analysis of Valieva sample|first=Michael|last=Pavitt|website=[[Inside the Games]]|date=12 February 2022}}</ref> Following formal appeals lodged by the IOC, the [[International Skating Union]] (ISU), and WADA to review RUSADA DAC's decision, the CAS was expected to hear the case on 13 February with a decision scheduled for announcement on 14 February ahead of her scheduled appearance in the women's singles event beginning 15 February.<ref>{{cite web|url=https://thehill.com/policy/international/russia/593979-russian-figure-skaters-drug-case-to-be-heard-sunday-in-beijing|title=Russian figure skater's drug test case to be heard Sunday|first=Lexi|last=Lonas|website=[[The Hill (newspaper)|The Hill]]|date=12 February 2022}}</ref><ref>{{cite web|url=https://www.cnn.com/2022/02/10/sport/kamila-valieva-roc-drugs-test-olympics-spt-intl-hnk/index.html|title=Kamila Valieva: Russian anti-doping agency allowed teenage figure skater to compete in Olympics despite failed drug test|last1=Ritchie|first1=Hannah|last2=Watson|first2=Angus|last3=Regan|first3=Helen|date=11 February 2022|website=[[CNN]]|access-date=12 February 2022}}</ref> Due to Valieva being a minor at the time, as well as being classified as a "protected person" under WADA guidelines, RUSADA and the IOC announced on 12 February that they would broaden the scope of their respective investigations to include members of her entourage (e.g., coaches, team doctors, etc.).<ref>{{cite web|url=https://www.skysports.com/more-sports/winter-olympics/news/30787/12539761/kamila-valieva-ioc-welcomes-investigation-of-russian-figure-skaters-entourage-as-15-year-old-awaits-cas-decision-at-winter-olympics|title=Kamila Valieva: IOC welcomes investigation of Russian figure skater's entourage as 15-year-old awaits CAS decision at Winter Olympics|author=PA Media|author-link=PA Media|website=[[Sky Sports]]|date=12 February 2022}}</ref>

      On 14 February, the CAS ruled that Valieva would be allowed to compete in the women’s single event, deciding that preventing her from competing "would cause her irreparable harm in the circumstances", though her gold medal in the team event was still under consideration. The favorable decision from the court was made in part due to her age, as minor athletes are subject to different rules than adult athletes.<ref>{{Cite web|date=2022-02-14|title=Russian skater Kamila Valieva cleared to compete at Olympics|url=https://apnews.com/article/winter-olympics-kamila-valieva-doping-decision-0dd063b5092681697525b69cd0c7212d|access-date=2022-02-14|website=AP NEWS|language=en}}</ref><ref>https://www.tas-cas.org/fileadmin/user_upload/CAS_Ad_Hoc_Media_Release_Beijing_8.pdf {{Bare URL PDF|date=March 2022}}</ref>

      === 2023 ===
      On 23 March 2023, World Athletics announced that Russia's doping suspension had been lifted<ref>{{Cite web |title=THE CAS AD HOC DIVISION DECLINES TO IMPOSE A PROVISIONAL SUSPENSION ON THE RUSSIAN FIGURE SKATER KAMILA VALIEVA |url=https://www.tas-cas.org/fileadmin/user_upload/CAS_Ad_Hoc_Media_Release_Beijing_8.pdf |access-date=23 Oct 2025 |website=tas-cas.org}}</ref> nearly seven and a half years after they were suspended in November 2015. However, Russian athletes would still be banned due to the ongoing [[Russian invasion of Ukraine]].<ref>{{Cite news |title=Russian athlete ban stays but doping suspension lifted |language=en-GB |work=BBC Sport |url=https://www.bbc.com/sport/athletics/65055933 |access-date=2023-03-23}}</ref>

      == International competitions ==
      === Russian hosting ===
      [[File:2018 FIFA World Cup opening ceremony (2018-06-14) 04.jpg|thumb|left|[[Vladimir Putin]] at the [[2018 FIFA World Cup opening ceremony]]]]

      Although the IOC stated in July 2016 that it would ask sports federations to seek alternative hosts,<ref name=IOC160719 /> Russia has retained hosting rights for some major international sports events, including the [[2017 FIFA Confederations Cup]], [[2018 FIFA World Cup]], and [[2019 Winter Universiade]]. In September 2016, Russia was awarded hosting rights for the [[Biathlon World Championships 2021|2021 World Biathlon Championships]] because the IOC's recommendation did not apply to events that had already been awarded or planned bids from the country.<ref name=ITG160906 />

      Olympic medalists [[Steven Holcomb]], [[Matthew Antoine]], [[Martins Dukurs]], and [[Lizzy Yarnold]] questioned the decision to hold the [[FIBT World Championships 2017]] in [[Sochi]], with boycotts considered by Austria, Latvia, and South Korea.<ref name=IBSF161213 /> [[Latvia]]'s skeleton team confirmed that it would boycott if Sochi remained the host, saying that the "Olympic spirit was stolen in 2014."<ref name=AP161211 /> On 13 December 2016, the [[International Bobsleigh and Skeleton Federation]] announced that it would relocate the event. Some competitors were concerned that they might unwittingly ingest a banned substance if the host tampered with food or drinks,<ref name=IBSF161213 /> while others "were worried about the evidence that Russian laboratories had been opening tamper-proof bottles. If they have opened these bottles to help their competitors, what is to stop them also opening them to tamper with samples from any athlete in the competition?"<ref name=BBC161213 />

      [[Biathlon]] teams from the Czech Republic and Great Britain decided to boycott a [[2016–17 Biathlon World Cup]] stage in [[Tyumen]].<ref name=ITG161221 /> On 22 December 2016, Russia announced it would not host the World Cup event or the 2017 [[Biathlon Junior World Championships]] in [[Ostrov, Ostrovsky District, Pskov Oblast|Ostrov]].<ref name=AFP161222 /> The same day, the [[International Skating Union]] decided to relocate a [[speed skating]] event, the [[2016–17 ISU Speed Skating World Cup]] stage in [[Chelyabinsk]], due to "a substantial amount of critical evidence and the uncertainty relating to the attendance of the competitors".<ref name=ISU161222 /> Russia was later removed as host of the [[2016–17 FIS Cross-Country World Cup]] final stage<ref name="gmanetwork.com">{{cite web|url=http://www.gmanetwork.com/news/story/593570/sports/othersports/ioc-investigates-28-russian-athletes-over-sochi-samples|title=IOC investigates 28 Russian athletes over Sochi samples|date=24 December 2016 }}</ref><ref>{{Cite web|url=https://www.biathlonworld.com/news/detail/ibu-press-release-extraordinary-ibu-executive-board-meeting|title=IBU Press Release: Extraordinary IBU Executive Board Meeting|website=International Biathlon Union – IBU}}</ref> and [[Biathlon World Championships 2021|2021 World Biathlon Championships]] in [[Tyumen]].<ref>{{cite web|url=http://www.biathlonworld.com/news/detail/ibu-press-release|title=IBU Press Release – International Biathlon Union – IBU – International Biathlon Union – IBU|website=www.biathlonworld.com}}</ref>

      On 22 December 2017, it was reported that [[FIFA]] fired Jiri Dvorak, a doctor, who had been investigating doping in Russian football. However, FIFA stated that removal of Dvorak was unrelated to his investigation of doping in Russian sports.<ref>{{cite news|title=Doctor sacked by Fifa was investigating alleged Russian football doping|url=https://www.theguardian.com/football/2017/dec/20/doctor-sacked-fifa-alleged-russian-football-doping-jiri-dvorak-gianni-infantino|access-date=22 December 2017|work=The Guardian|date=20 December 2017}}</ref>

      === Russian participation ===
      {{See also|Olympic Athletes from Russia at the 2018 Winter Olympics}}

      The IAAF permitted Russians who have undergone testing by non-Russian agencies to compete as [[Authorised Neutral Athletes|neutral athletes]].<ref name="AP170413" /> The Russian flag, national colours, and anthem were not allowed to display.<ref name="AP170802" />

      There were calls to ban Russia from participating in the [[2018 Winter Olympics]] and [[2018 Winter Paralympics]] or to allow Russians to compete only as neutrals.<ref>{{cite news|title=With one year until 2018 Winter Games, Russia's status murky|url=http://www.espn.com/olympics/story/_/id/18647088/with-one-year-2018-winter-games-pyeongchang-russia-status-murky-wake-doping-scandal |date=9 February 2017 }}</ref><ref>{{cite news|title=Russia might be barred from the 2018 Paralympic Games |url=http://rbth.com/sport/2017/02/01/russia-might-be-barred-from-the-2018-paralympic-games_693276 |date=1 February 2017 }}</ref><ref name=CBC170814 /> Russia would later be allowed to compete as [[Olympic Athletes from Russia at the 2018 Winter Olympics|Olympic Athletes from Russia]] at the former and [[Neutral Paralympic Athletes at the 2018 Winter Paralympics|Neutral Paralympic Athletes]] at the latter.

      Following the CAS ruling in late 2020, the [[Fédération Internationale de l'Automobile|FIA]], the international governing body for automobile racing, announced that racing drivers from Russia would not be allowed to represent their country in any world championship series as long as the sanctions are in place, though they are still allowed to participate as neutral competitors.<ref name="Motorsports" />

      == Media coverage ==
      {{expand section|date=December 2017}}

      Russian doping has been featured in several documentaries broadcast in Germany, France, and the United States:
      * ''Geheimsache Doping: Wie Russland seine Sieger macht (The Doping Secret: How Russia Creates Champions)'', [[ARD (broadcaster)|ARD]] / [[Das Erste]], aired 3 December 2014<ref name=ARDdoc />
      * ''Geheimsache Doping. Im Schattenreich der Leichtathletik (The Doping Secret: The Shadowy World of Athletics)'', ARD / Das Erste, aired 1 August 2015<ref name=Welt150801 />
      * ''Geheimsache Doping: Russlands Täuschungsmanöver (The Doping Secret: Russia's Red Herrings)'', ARD / [[Westdeutscher Rundfunk]], aired 6 March 2016<ref name=WADA160307 /><ref name=RRH />
      * ''Russia's Dark Secret'', [[60 Minutes]] / [[CBS News]], aired 8 May 2016<ref name=CBS60Min />
      * ''Plus vite, plus haut, plus dopés (Faster, higher, more doped)'', [[Arte]] in partnership with ''[[Le Monde]]'', aired 7 June 2016<ref name=Monde160602 />
      * ''[[Icarus (2017 film)|Icarus]]'', [[Netflix]], directed by [[Bryan Fogel]], 2017<ref name="usatoday20170805">{{cite web|last1=Ryan|first1=Patrick|title=Netflix's wild documentary 'Icarus' exposes Russian doping scandal|url=https://www.usatoday.com/story/life/movies/2017/07/31/icarus-netflix-documentary-russian-doping-scandal/523785001/|website=USA Today|access-date=5 August 2017}}</ref>

      == Reactions ==
      === International ===
      Some sportspeople from other countries have criticised WADA, alleging that the agency has been reluctant to investigate Russia despite multiple tips over several years.<ref name=NYT160615 /> WADA officials stated that the agency lacked the authority to carry out its own investigations until 2015.<ref name=AP160508 /><ref name=GN150601 /> [[Arne Ljungqvist]], WADA's former vice chairman, commented that "WADA always had an excuse as to why they wouldn't move forward. They expected Russia to clean up themselves."<ref name=NYT160615 /> In June 2016, ''[[The Guardian]]'' reported that a letter approved by over twenty competitors' groups from multiple sports and countries as well as the chairs of the IOC's and WADA's athletes committees, [[Claudia Bokel]] and [[Beckie Scott]], had been sent to IOC president [[Thomas Bach]] and WADA head [[Craig Reedie]]; the letter criticised the organisations for inaction and silence until the media became involved and said that competitors' confidence in the anti-doping system had been "shattered".<ref name=GN160614 />

      On 18 July 2016, WADA's Athlete Committee stated, "Although we have known of the allegations, to read the report today, to see the weight of the evidence, and to see the scale of doping and deception is astounding."<ref name=ACWADA160718 /> The athlete committee,<ref name=ACWADA160718 /> the Institute of National Anti-Doping Organizations,<ref name=INADO160720 /> and the leaders of anti-doping agencies in Austria, Canada, Denmark, Egypt, Finland, Germany, Japan, the Netherlands, New Zealand, Norway, Spain, Sweden, Switzerland, and the United States called for Russia to be banned from the 2016 Olympics in Rio.<ref name=NADA160720 /> After Bach delayed a decision on whether to ban the entire Russian team, IOC member [[Dick Pound]] said, "the IOC is for some reason very reluctant to think about a total exclusion of the Russian team. But we've got institutionalized, government-organised cheating on a wide scale across a whole range of sports in a country. You've got to keep from turning [zero tolerance] into: 'We have zero tolerance except for Russia.'"<ref name=GN160720 /> Bruce Arthur of the ''[[Toronto Star]]'' said, "If the threshold Russia established is not high enough to merit a total ban from an Olympic Games, it's a remarkable precedent to set."<ref name=TS160723 /> Former IOC vice president, [[Kevan Gosper]] of Australia, said, "we have to be very careful [about making] the wrong move with an important country like Russia", to which Richard Hind of ''[[The Daily Telegraph (Sydney)]]'' responded, "And there is the IOC in a nutshell. There are nations, and there are 'important nations'. Not everyone pees in the same specimen jar."<ref name=TDT160723 />

      The IOC's decision on 24 July 2016 was criticised by competitors<ref name=AFP160724 /><ref name=BBC160724 /><ref name=TCP160724 /><ref name=GRutherford /><ref name=AFP160725 /> and writers.<ref name=DT160725 /><ref name=Gibson160724 /><ref name=NYT160726 /><ref name=Armour160724 /><ref name=NP160724 /><ref name=DB160724 /> It received support from the European Olympic Committees, which said that Russia is "a valued member".<ref name=AFP160724 /> Cam Cole of Canada's ''[[National Post]]'' said that the IOC had "caved, as it always does, defaulting to whatever compromise it could safely adopt without offending a superpower".<ref name=NP160724 /> Expressing disappointment, a member of the IOC Athletes' Commission, [[Hayley Wickenheiser]], wrote, "I ask myself if we were not dealing with Russia would this decision to ban a nation [have] been an easier one? I fear the answer is yes."<ref name=TCP160724 /> Writing for ''[[Deutsche Welle]]'' in Germany, Olivia Gerstenberger said that Bach had "flunked" his first serious test, adding, "With this decision, the credibility of the organization is shattered once more, while that of state-sponsored doping actually receives a minor boost."<ref name=DW160724 /> ''[[Bild]]'' (Germany) described Bach as "Putin's poodle".<ref name=NYT160726 /> Paul Hayward, chief sports writer of ''[[The Daily Telegraph]]'' (UK), remarked, "The white flag of capitulation flies over the International Olympic Committee. Russia's deep political reach should have told us this would happen."<ref name=DT160725 />

      Leaders of thirteen national anti-doping organisations wrote that the IOC had "violated the competitors' fundamental rights to participate in Games that meet the stringent requirements of the World Anti-Doping Code" and "[demonstrated that] it lacks the independence required to keep commercial and political interests from influencing the tough decisions necessary to protect clean sport".<ref name=ADO160731 /> WADA's former chief investigator, Jack Robertson, said "The anti-doping code is now just suggestions to follow or not" and that "WADA handed the IOC that excuse [not enough time before the Olympics] by sitting on the allegations for close to a year."<ref name=PP160804 /> McLaren was dissatisfied with the IOC's handling of his report, saying "It was about state-sponsored doping and the misrecording of doping results and they turned the focus into individual competitors and whether they should compete. [...] it was a complete turning upside down of what was in the report and passing over responsibility to all the different international federations."<ref name=Sky160916 /><ref name=ESPN170315 />

      === In Russia ===
      [[File:Vladimir Putin and Aleksandr Zubkov 24 February 2014.jpeg|thumb|[[Vladimir Putin]] awards [[Alexandr Zubkov]] at the ceremonies for Russian athletes, 24 February 2014.  Zubkov would be stripped of his gold medals 3 and a half years later.]]

      Some Russians described the allegations as an anti-Russian plot while others stated that Russia was "just doing what the rest of the world does".<ref name=NYT160721 /><ref name=Bloomberg151112 /><ref name=Reuters160814 /> Russian President Vladimir Putin said that Russia had "never supported any violations in sport, we have never supported it at the state level, and we will never support this"<ref name=Scotsman160618 /> and that the allegations were part of an "anti-Russia policy" by the West.<ref name=NYT160618 /> [[Aleksey Pushkov]], chairman of Russia's parliamentary foreign affairs committee, said that the IAAF's decision to uphold its ban was "an act of political revenge against Russia for its independent foreign policy".<ref name=NYT160618 /> A member of Russia's parliament, Vadim Dengin, stated, "The entire doping scandal is a pure falsification, invented to discredit and humiliate Russia."<ref name=DB160617 /> After the [[Court of Arbitration for Sport]] turned down an appeal by Russian athletes, pole vaulter [[Yelena Isinbayeva]] wrote, "Let all those pseudo-clean foreign athletes breathe a sigh of relief and win their pseudo gold medals in our absence. They always did fear strength."<ref name=CNN160721 /> The [[Ministry of Foreign Affairs (Russia)|Ministry of Foreign Affairs]] called the ruling a "crime against sport".<ref name=BBC160721 /> A poll by the [[Levada Center]] found that 14% of Russians believed that the country's competitors had doped in Sochi, 71% did not believe WADA's reports, and 15% decided not to answer.<ref name=MT160729 />

      A spokesman for Putin called Stepanova a "[[Judas]]".<ref name=TFRep160617 /> The Russian media have also criticised the Stepanovs. Yuliya Stepanova said, "All the news stories call me a traitor and not just traitor but a traitor to the Motherland."<ref name=CBC160113 /> Vitaly Stepanov said, "I wasn't trying to expose Russia, I was trying to expose corrupt sports officials that are completely messing up competitions not just inside the country but globally."<ref name=Reuters160510 /> ''[[Frankfurter Allgemeine Zeitung]]'' reported that the Russian media portrayed the German documentaries as "part of a Western conspiracy with the aim of weakening the great nation that Vladimir Putin lifted from its knees".<ref name=FAZ160611 /> [[Hajo Seppelt]] had the "impression that he and the Stepanovs were being styled as enemies of the state".<ref name=FAZ160611 />

      [[Dick Pound]] described Russia's response as "a bit like when you get stopped for speeding on the freeway by the police and you say 'Why me? Everyone else was doing it'."<ref name=Standard160616 /> He stated that if Russia's authorities had "responded to their issues they could easily have enough time to sort everything out in time for Rio. But instead, they played the role of victims, claiming there was a plot against them for too long."<ref name=Standard160616 /> Leonid Bershidsky, a Russian writer for [[Bloomberg View]], wrote that Russia's "officials need to understand that "[[whataboutism]]" doesn't avert investigations".<ref name=Bloomberg151112 /> The Moscow correspondent of ''[[Deutsche Welle]]'', Juri Rescheto, wrote that the response he saw in Russia "shows that the country is living in a parallel universe" and seeks to blame others.<ref name=DW160609 /> Writing for ''[[The New York Times]]'', Andrew E. Kramer said that Russia responded to the IAAF's decision against reinstatement with "victimhood" reflecting a "culture of grievances that revolves around perceived slights and anti-Russian conspiracies taking place in the outside world, particularly in Western countries".<ref name=NYT160618 /> The newspaper's editorial board also saw a "narrative of victimization" in Russia, and wrote that it resembled how the Soviet Union would respond to a punishment – by saying that it was "politically motivated, always a provocation, never justified. [Even] though the Cold War is long over, President Vladimir Putin remains stuck in the same, snarling defensive crouch in his responses to any accusations of Russian foul play".<ref name=NYT160829 /> Andrew Osborn of [[Reuters]] wrote that the Russian government had "deftly deflected the blame by passing it off as a Western Cold War-style plot to sabotage Russia's international comeback".<ref name=Reuters160722 /> In response to Russia's opinion that the allegations were "politically motivated", WADA's former chief investigator, Jack Robertson, said that he saw politics "when [[Craig Reedie]] tried to intervene by writing emails to the Russian ministry to console them".<ref name=PP160804 />

      [[Match TV]] said that Americans had orchestrated the doping scandal, and modern pentathlon champion [[Aleksander Lesun]] called it an unfair "attack", because "Doping is in all countries and there are violators everywhere."<ref name=Luhn160724 /> Following the IOC's announcement on 24 July 2016, Russian sports minister [[Vitaly Mutko]] said it was "a just and fair decision and we hope every federation will take the same kind of decision. Doping is a worldwide evil, not only of Russia."<ref name=RTE160724 /> The Russian media's reaction was "nearly euphoric at points".<ref name=Luhn160724 />

      A reporter from Russian state-owned television told IOC President [[Thomas Bach]] that "It looked like you personally were helping us," and asked whether the doping investigation was a "political attack" on Russian competitors.<ref name=NYT160804 /> After Russian competitors said that McLaren was about "politics" rather than sport, the British biathlon association stated that their comments were "brain-washed, deluded and dishonest" and decided to boycott an event in Russia.<ref name=BB161221 /> Russia's Deputy Prime Minister [[Vitaly Mutko]] said that competitors should be "punished" for calls to boycott.<ref name=AFP161222 />

      On 7 December 2017, it was reported that [[Russian oligarch]] [[Mikhail Prokhorov]] paid a Russian Olympic athlete millions of rubles in hush money not to reveal Russia's elaborate doping scheme. Prokhorov had run the Russian Biathlon Union from 2008 to 2014 and offered legal services to disqualified Russian biathletes.<ref>{{cite news |url=http://www.nydailynews.com/sports/basketball/nets/mikhail-prokhorov-paid-russian-athlete-quiet-doping-article-1.3684562|title=Mikhail Prokhorov, Nets owner, paid Russian Olympic athlete millions of rubles to keep quiet amid doping scandal: report|date=7 December 2017|work=Daily News (New York)|access-date=13 December 2017}}</ref>

      In Russia, the December 2019 sanction was received with outrage. President Vladimir Putin slammed the decision as a "politically motivated" ruling that "contradicted" the [[Olympic Charter]]. "There is nothing to reproach the [[Russian Olympic Committee]] for and if there is no reproach towards this committee, the country should take part in competitions under its own flag," Putin said. Russian Prime Minister [[Dmitry Medvedev]] also said the ban was politically motivated. "This is the continuation of this anti-Russian hysteria that has already become chronic," Medvedev told domestic press.<ref name=cna />

      ====2017 Sochi bans====
      {{See also|Oswald Commission}}

      The fallout from the IOC bans of Russian competitors caught doping at the Sochi Olympics, which left previous Russian whistleblowers in fear of their own personal safety, has been likened to a "witch-hunt" within the Russian winter sports community.<ref>{{Cite news|url=http://www.cbc.ca/sports/olympics/russian-sports-distrust-anger-doping-vote-1.4401432|title=Russian sports gripped by distrust, anger ahead of key doping vote|date=14 November 2017|publisher=[[Canadian Broadcasting Corporation|CBC]]|access-date=14 November 2017}}</ref> On 9 November 2017, Vladimir Putin called the decisions to ban Russian competitors for doping violations an attempt by the U.S. to undermine his nation and affect the [[2018 Russian presidential election|Russian presidential election]] in March.<ref>{{cite news|url=https://www.bbc.co.uk/news/world-europe-41934604|title=Putin: Doping allegations 'US plot against Russian election'|date=9 November 2017|work=[[BBC News]]|access-date=14 November 2017}}</ref>

      According to Russian news agency [[TASS]], the Russian sports minister [[Pavel Kolobkov]] said that the investigative committee had found no evidence that the state was operating a doping system; that same committee was seeking whistleblower Grigory Rodchenkov's extradition from the United States, where he is in witness protection. Despite reassurances from Russian officials that no doping system existed, IOC official Dick Pound said: "empirical evidence is totally to the contrary, so I think what we're seeing in the Russian press is for domestic consumption."<ref name="auto" />

      On 17 November 2017, top Russian Olympic official [[Leonid Tyagachev]] said that Grigory Rodchenkov, who had alleged that Russia was running a systematic doping programme, "should be shot for lying, like Stalin would have done".<ref>{{Cite news|url=https://www.theguardian.com/sport/2017/nov/17/russian-olympic-official-says-doping-whistleblower-should-be-executed|title=Russian Olympic official says doping whistleblower should be executed|date=17 November 2017|work=[[The Guardian]]|access-date=23 November 2017|language=en}}</ref>

      ===2018 Olympic ban===
      The IOC's decision was criticized by Jack Robertson, primary investigator of the Russian doping programme on behalf of [[World Anti-Doping Agency|WADA]], who said that the IOC had issued "a non-punitive punishment meant to save face while protecting the [IOC’s] and Russia’s commercial and political interests". He also emphasized that Russian whistleblowers provided empirical evidence that "99 per cent of [their] national-level teammates were doping." According to Robertson, "[WADA] has discovered that when a Russian competitor [reaches] the national level, he or she [has] no choice in the matter: [it is] either dope, or you’re done"; he added "There is currently no intelligence I have seen or heard about that indicates the state-sponsored doping program has ceased."<ref>{{cite news|url= https://nytimes.com/2017/12/27/opinion/2018-winter-olympics-russia.html |title= The 2018 Winter Olympics Are Already Tainted|newspaper=[[The New York Times]]|date= 27 December 2017 |access-date= 27 December 2017}}</ref> It was also reported that Russian officials intensively lobbied U.S. politicians in an apparent attempt to achieve the extradition to Russia of the main whistleblower, [[Grigory Rodchenkov]].<ref name="Inside the Games">{{cite web|url= https://www.insidethegames.biz/articles/1059507/ioc-accused-of-cowardice-for-failing-to-address-russian-retaliation-against-rodchenkov|title=IOC accused of cowardice for failing to address Russian retaliation against Rodchenkov|work=Inside the Games|date= 26 December 2017|access-date=27 December 2017}}</ref>

      On 6 December 2017, Putin announced his decision "not to prevent individual Russian competitors" from participating at the [[2018 Winter Olympics|2018 Winter Games]]. He also stated that he is pleased that the IOC Inquiry Commission chaired by [[Samuel Schmid]] "didn't find any proof that the Russian government was involved in a doping conspiracy".<ref>{{cite web |url= http://tass.ru/sport/4790004 |title= Путин считает важным, что в заключении МОК нет выводов о господдержке допинга в России |publisher= Тасс}}</ref> However, the Inquiry Commission only said that there's not enough evidence to claim that highest Russian state authorities were involved. The fact that [[Ministry of Sport (Russia)|Russian Ministry of Sport]] and [[Federal Security Service]] were part of the scheme was never in doubt.<ref>{{cite web|url= https://www.olympic.org/news/ioc-suspends-russian-noc-and-creates-a-path-for-clean-individual-athletes-to-compete-in-pyeongchang-2018-under-the-olympic-flag |title= IOC suspends Russian NOC and creates a path for clean individual athletes to compete in PyeongChang 2018 under the Olympic Flag|date=5 December 2017|publisher= Olympic}}</ref>

      Deputy (member) of the [[State Duma|Russian State Duma]] and former professional boxer [[Nikolai Valuev]] has said that Russia should go to the Olympics and "tear everyone apart to spite these bastards who want to kill our sport".<ref>{{cite web|url= https://sportfm.ru/news/valuev-nuzhno-ekhat-na-olimpiadu-i-rvat-vsekh-nazlo-etim-gadam.html |title=Валуев: нужно ехать на Олимпиаду и рвать всех назло этим гадам |website= Спорт FM |date= 23 December 2017 |access-date= 24 December 2017 |archive-url= https://web.archive.org/web/20171224214510/https://sportfm.ru/news/valuev-nuzhno-ekhat-na-olimpiadu-i-rvat-vsekh-nazlo-etim-gadam.html|archive-date=24 December 2017 |url-status= dead}}</ref>

      Despite the "[[Olympic Athletes from Russia at the 2018 Winter Olympics|Olympic Athletes from Russia]]" (OAR) designation, many Russian fans still attended the 2018 Games, wearing the Russian colours and chanting "Russia!" in unison, in an act of defiance against the ban.<ref>{{cite news | url= https://www.nbcnews.com/storyline/winter-olympics-2018/russian-fans-spurn-stupid-ban-athletes-olympic-games-n847886 | title=Russian fans spurn 'stupid' ban on athletes at Olympic Games | work= NBC News | first = Eirk | last=Ortiz | date= 14 February 2018}}</ref>

      Justin Peters of [[Slate (magazine)|''Slate'' magazine]] wrote during the Games that the IOC "ended up with a situation that seemed to negate the entire point of the sanctions against Russia. The IOC did not want there to be a Russian Olympic team at the Pyeongchang Games… [yet] arenas are full of teams of Russian Olympians… [this is] a half-hearted wrist slap issued by an entity that appears more interested in saving face than in protecting competitors".<ref>{{cite web|url= https://slate.com/culture/2018/02/olympic-athletes-from-russia-is-a-craven-euphemism-for-a-craven-olympic-games.html |title="Olympic Athletes From Russia" Is a Craven Euphemism for a Craven Olympic Games |first= Justin |last= Peters |work= Slate |date= 12 February 2018 |access-date= 17 February 2018|url-status=live |archive-url= https://web.archive.org/web/20180216032118/https://slate.com/culture/2018/02/olympic-athletes-from-russia-is-a-craven-euphemism-for-a-craven-olympic-games.html |archive-date= 16 February 2018}}</ref>

      The CAS decision to overturn the life bans of 28 Russian competitors and restore their medals met fierce criticism among Olympic officials, including [[President of the International Olympic Committee|IOC president]] [[Thomas Bach]] who described the decision as "extremely disappointing and surprising". Grigory Rodchenkov's lawyer has stated that "the CAS decision would allow doped competitors to escape without punishment"<ref>{{cite web |url= https://www.rferl.org/a/russia-olympics-ioc-chief-bach-disappointed-doping-bans-lifted/29017362.html |title= IOC Chief Disappointed by Court Lifting Doping Ban on Russians |work= RFERL |date=4 February 2018 |access-date= 4 February 2018}}</ref> and also that "[the CAS decision] provides yet another ill-gotten gain for the corrupt Russian doping system generally, and Putin specifically".<ref>{{cite web |url= http://olympics.nbcsports.com/2018/02/01/russia-olympic-doping-bans-lifted/ |title=28 Russians have Olympic doping bans lifted|publisher=NBC Sorts|date=1 February 2018 |access-date=4 February 2018}}</ref>

