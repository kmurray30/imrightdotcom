      ==== Other molecular tests ====
      [[Variants of PCR#Isothermal amplification methods|Isothermal nucleic acid amplification]] tests also amplify the virus's genome. They are faster than PCR because they do not involve repeated heating and cooling cycles. These tests typically detect DNA using [[fluorescent tag]]s, which are read out with specialized machines.{{citation needed|date=November 2021}}

      [[CRISPR gene editing]] technology was modified to perform the detection: if the CRISPR enzyme attaches to the sequence, it colors a paper strip. The researchers expect the resulting test to be cheap and easy to use in point-of-care settings.<ref>{{cite news | vauthors = Zimmer C |date=5 May 2020 |title=With Crispr, a Possible Quick Test for the Coronavirus |work=[[The New York Times]] |url= https://www.nytimes.com/2020/05/05/health/crispr-coronavirus-covid-test.html |url-status=live |access-date=14 May 2020 |archive-url=https://web.archive.org/web/20200514050821/https://www.nytimes.com/2020/05/05/health/crispr-coronavirus-covid-test.html |archive-date=14 May 2020 |issn=0362-4331}}</ref><ref>{{cite web |title=STOPCovid |url=https://stopcovid.science/ |url-status=live |archive-url=https://web.archive.org/web/20200610173344/https://www.stopcovid.science/ |archive-date=10 June 2020 |access-date=14 June 2020 |website=stopcovid.science}}</ref> The test amplifies RNA directly, without the RNA-to-DNA conversion step of RT-PCR.<ref>{{Cite medRxiv |vauthors=Joung J, Ladha A, Saito M, Segel M, Bruneau R, Huang MW, Kim NG, Yu X, Li J, Walker BD, Greninger AL, Jerome KR, Gootenberg JS, Abudayyeh OO, Zhang F |date=May 2020 |title=Point-of-care testing for COVID-19 using SHERLOCK diagnostics |medrxiv=10.1101/2020.05.04.20091231v1}}</ref>

      ==== Antigen tests ====
      [[File:Corona positive Rapid Antigen test (50688059186).jpg|thumb|COVID-19 Antigen Rapid Test Kit; the [[timer]] is provided by the user.]]
      [[File:Safe Corona Rapid Test Diagnostic (50687306273).jpg|thumb|Mucus from nose or throat in a test liquid is placed onto a COVID-19 rapid antigen diagnostic test device.]]
      [[File:Covid-19 rapid test in Rwanda.jpg|thumb|right|300px|COVID-19 rapid testing in Rwanda]]
      An [[antigen]] is the part of a [[pathogen]] that elicits an [[immune response]]. Antigen tests look for antigen [[protein]]s from the viral surface. In the case of a [[coronavirus]], these are usually proteins from the [[coronavirus spike protein|surface spikes]].<ref name="tech_antigens">{{cite web |date=6 April 2020 |title=Developing Antibodies and Antigens for COVID-19 Diagnostics |url=https://www.technologynetworks.com/diagnostics/blog/developing-antibodies-and-antigens-for-covid-19-diagnostics-333088 |url-status=live |archive-url=https://web.archive.org/web/20200430153119/https://www.technologynetworks.com/diagnostics/blog/developing-antibodies-and-antigens-for-covid-19-diagnostics-333088 |archive-date=30 April 2020 |access-date=30 April 2020 |publisher=Technology Networks}}</ref> SARS-CoV-2 antigens can be detected before onset of COVID-19 symptoms (as soon as sufficient SARS-CoV-2 virus particles are present) with more rapid test results, but with less sensitivity than PCR tests for the virus.<ref name="pmid32939084">{{cite journal | vauthors = Guglielmi G | title = Fast coronavirus tests: what they can and can't do | journal = Nature | volume = 585 | issue = 7826 | pages = 496–498 | date = September 2020 | pmid = 32939084 | doi = 10.1038/d41586-020-02661-2 | bibcode = 2020Natur.585..496G | s2cid = 221768935 }}</ref>

      [[COVID-19 rapid antigen test]]s are [[lateral flow test|lateral flow]] [[immunoassay]]s that detect the presence of a specific viral [[antigen]], which indicates current viral infection. Antigen tests produce results quickly (within approximately 15–30 minutes), and most can be used at the point-of-care or as self-tests. Self-tests are rapid tests that can be taken at home or anywhere, are easy to use, and produce rapid results.<ref name="CDC testing" /> Antigen tests can be performed on nasopharyngeal, nasal swab, or saliva specimens.<ref name=":19" />

      Antigen tests that can identify SARS-CoV-2 offer a faster and less expensive method to test for the virus.<ref name=":9" /> Antigen tests are generally less sensitive than real-time reverse transcription polymerase chain reaction (RT-PCR) and other nucleic acid amplification tests (NAATs).<ref name=":19" />

      Antigen tests may be one way to scale up testing to much greater levels.<ref name="tech_antigens" /> Isothermal nucleic acid amplification tests can process only one sample at a time per machine. [[RT-PCR]] tests are accurate but require too much time, energy and trained personnel to run the tests.<ref name="tech_antigens" /> "There will never be the ability on a [PCR] test to do 300 million tests a day or to test everybody before they go to work or to school," [[Deborah Birx]], head of the [[White House Coronavirus Task Force]], said on 17 April 2020. "But there might be with the antigen test."<ref>{{cite web |date=17 April 2020 |title=Remarks by President Trump, Vice President Pence, and Members of the Coronavirus Task Force in Press Briefing |url=https://trumpwhitehouse.archives.gov/briefings-statements/remarks-president-trump-vice-president-pence-members-coronavirus-task-force-press-briefing-april-17-2020/ |url-status=live |archive-url=https://web.archive.org/web/20210120200344/https://trumpwhitehouse.archives.gov/briefings-statements/remarks-president-trump-vice-president-pence-members-coronavirus-task-force-press-briefing-april-17-2020/ |archive-date=20 January 2021 |access-date=30 April 2020 |website=[[whitehouse.gov]] |via=[[NARA|National Archives]]}}</ref>

      {{anchor|Lollipop}}Samples may be collected via nasopharyngeal swab, a swab of the [[anterior nares]], or from saliva (obtained by various methods including ''lollipop tests'' for children).<ref name="Müllender_2021">{{cite web | vauthors = Müllender F |date=11 March 2021 |title=Grundschulen – Corona-Pool-Tests gelten als kindgerecht, unkompliziert und sicher |url=https://www.deutschlandfunk.de/grundschulen-corona-pool-tests-gelten-als-kindgerecht.680.de.html?dram:article_id=493933 |url-status=live |archive-url=https://web.archive.org/web/20210724105117/https://www.deutschlandfunk.de/grundschulen-corona-pool-tests-gelten-als-kindgerecht.680.de.html?dram%3Aarticle_id=493933 |archive-date=24 July 2021 |access-date=5 June 2021 |publisher=[[Deutschlandfunk]] |language=de}}</ref> The sample is then exposed to paper strips containing artificial antibodies designed to bind to coronavirus antigens. Antigens bind to the strips and give a visual readout. The process takes less than 30 minutes, can deliver results at point of care, and does not require expensive equipment or extensive training.<ref name="tech_antigens" />

      Swabs of respiratory viruses often lack enough antigen material to be detectable.<ref name="AAAS">{{cite web |date=29 April 2020 |title=NIH launches competition to speed COVID-19 diagnostics |url=https://www.science.org/content/article/nih-launches-competition-speed-covid-19-diagnostics |url-status=live |archive-url=https://web.archive.org/web/20200501012713/https://www.sciencemag.org/news/2020/04/nih-launches-competition-speed-covid-19-diagnostics |archive-date=1 May 2020 |access-date=1 May 2020 |publisher=AAAS}}</ref> This is especially true for [[asymptomatic]] patients who have little if any [[Rhinorrhea|nasal discharge]]. Viral proteins are not amplified in an antigen test.<ref name="tech_antigens" /><ref name="cnn_test_types">{{cite web |date=29 April 2020 |title=What to know about the three main types of coronavirus tests |url=https://www.cnn.com/2020/04/28/us/coronavirus-testing-pcr-antigen-antibody/index.html |url-status=live |archive-url=https://web.archive.org/web/20200510081330/https://www.cnn.com/2020/04/28/us/coronavirus-testing-pcr-antigen-antibody/index.html |archive-date=10 May 2020 |access-date=30 April 2020 |publisher=CNN}}</ref> A Cochrane review based on 64 studies investigating the efficacy of 16 different antigen tests determined that they correctly identified COVID-19 infection in an average of 72% of people with symptoms, compared to 58% of people without symptoms.<ref name=":2" /><ref name="pmid35866452" /> Tests were most accurate (78%) when used in the first week after symptoms first developed, likely because people have the most virus in their system in the first days after they are infected.<ref name=":2" /> While some scientists doubt whether an antigen test can be useful against COVID-19,<ref name="cnn_test_types" /> others have argued that antigen tests are highly sensitive when viral load is high and people are contagious, making them suitable for public health screening.<ref>{{cite web |title=Rapid Tests |url=https://www.rapidtests.org |url-status=live |archive-url=https://web.archive.org/web/20210531150537/https://www.rapidtests.org/ |archive-date=31 May 2021 |access-date=2 July 2021 |website=Rapid Tests}}</ref><ref>{{cite web | vauthors = Shaw J |date=3 August 2020 |title=Failing the Coronavirus-Testing Test |url=https://harvardmagazine.com/2020/08/covid-19-test-for-public-health |url-status=live |archive-url=https://web.archive.org/web/20210630072348/https://www.harvardmagazine.com/2020/08/covid-19-test-for-public-health |archive-date=30 June 2021 |access-date=2 July 2021 |website=Harvard Magazine}}</ref> Routine antigen tests can quickly identify when asymptomatic people are contagious, while follow-up PCR can be used if confirmatory diagnosis is needed.<ref name="FDA_antigen">{{cite press release |date=9 May 2020 |title=Coronavirus (COVID-19) Update: FDA Authorizes First Antigen Test to Help in the Rapid Detection of the Virus that Causes COVID-19 in Patients |url=https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-authorizes-first-antigen-test-help-rapid-detection-virus-causes |url-status=dead |archive-url=https://web.archive.org/web/20210529053533/https://www.fda.gov/news-events/press-announcements/coronavirus-covid-19-update-fda-authorizes-first-antigen-test-help-rapid-detection-virus-causes |archive-date=29 May 2021 |access-date=2 July 2021 |website=U.S. [[Food and Drug Administration]] (FDA) }}</ref>

      ===Antibody tests===
      {{multiple image
       | total_width = 300
       | image1 = Antibody tester.jpg
       | alt1 = Machine used to analyze blood samples
       | image2 = Corona antibody test.jpg
       | alt2 = Table showing amounts of IgG and IgM antibodies detected in sample
       | footer = Left: [[Automated analyzer]] for [[immunoassays]], used, for example, to find SARS-CoV-2 antibodies. Right: Example of [[wikt:quantitative|quantitative]] results for SARS-CoV-2 antibody test.}}

      The body responds to a viral infection by producing [[antibodies]] that help neutralize the virus.<ref name="Klasse pp. 1–24">{{cite journal | vauthors = Klasse PJ | title = Neutralization of Virus Infectivity by Antibodies: Old Problems in New Perspectives | journal = Advances in Biology | volume = 2014 | pages = 1–24 | date = 9 September 2014 | pmid = 27099867 | pmc = 4835181 | doi = 10.1155/2014/157895 | publisher = Hindawi Limited | doi-access = free }}</ref> Blood tests (also called [[serology test]]s or serology immunoassays<ref name=":11" />) can detect the presence of such antibodies.<ref>{{cite web |date=27 March 2020 |title=The next frontier in coronavirus testing: Identifying the full scope of the pandemic, not just individual infections |url=https://www.statnews.com/2020/03/27/serological-tests-reveal-immune-coronavirus/ |url-status=live |archive-url=https://web.archive.org/web/20200629192549/https://www.statnews.com/2020/03/27/serological-tests-reveal-immune-coronavirus/ |archive-date=29 June 2020 |access-date=30 April 2020 |publisher=STAT}}</ref> Antibody tests can be used to assess what fraction of a population has once been infected, which can then be used to calculate the disease's [[mortality rate]].<ref name="JAMA_antibody">{{cite journal | vauthors = Abbasi J | title = The Promise and Peril of Antibody Testing for COVID-19 | journal = JAMA | volume = 323 | issue = 19 | pages = 1881–1883 | date = May 2020 | pmid = 32301958 | doi = 10.1001/jama.2020.6170 | doi-access = free }}</ref> They can also be used to determine how much antibody is contained in a unit of convalescent plasma, for COVID-19 treatment, or to verify if a given vaccine generates an adequate immune response.<ref name=":12">{{cite journal | vauthors = Tang EW, Bobenchik AM, Lu S | title = Testing for SARS-CoV-2 (COVID-19): A General Review | journal = Rhode Island Medical Journal | volume = 103 | issue = 8 | pages = 20–23 | date = September 2020 | pmid = 32900007 }}</ref>

      SARS-CoV-2 antibodies' potency and protective period have not been established.<ref name="JAMA_antibody" /><ref name="SA_immun">{{cite news |date=10 April 2020 |title=What Immunity to COVID-19 Really Means |work=Scientific American |url=https://www.scientificamerican.com/article/what-immunity-to-covid-19-really-means/ |url-status=live |archive-url=https://web.archive.org/web/20200428171803/https://www.scientificamerican.com/article/what-immunity-to-covid-19-really-means/ |archive-date=28 April 2020}}</ref> Therefore, a positive antibody test may not imply immunity to a future infection. Further, whether mild or asymptomatic infections produce sufficient antibodies for a test to detect has not been established.<ref name=":1">{{Cite journal |last1=Fox |first1=Tilly |last2=Geppert |first2=Julia |last3=Dinnes |first3=Jacqueline |last4=Scandrett |first4=Katie |last5=Bigio |first5=Jacob |last6=Sulis |first6=Giorgia |last7=Hettiarachchi |first7=Dineshani |last8=Mathangasinghe |first8=Yasith |last9=Weeratunga |first9=Praveen |last10=Wickramasinghe |first10=Dakshitha |last11=Bergman |first11=Hanna |last12=Buckley |first12=Brian S. |last13=Probyn |first13=Katrin |last14=Sguassero |first14=Yanina |last15=Davenport |first15=Clare |date=17 November 2022 |title=Antibody tests for identification of current and past infection with SARS-CoV-2 |journal=The Cochrane Database of Systematic Reviews |volume=2022 |issue=11 |article-number=CD013652 |doi=10.1002/14651858.CD013652.pub2 |issn=1469-493X |pmc=9671206 |pmid=36394900}}</ref> Antibodies for some diseases persist in the bloodstream for many years, while others fade away.<ref name=tech_antigens/>

      The most notable antibodies are [[Immunoglobulin M|IgM]] and [[Immunoglobulin G|IgG]]. IgM antibodies are generally detectable several days after initial infection, although levels over the course of infection and beyond are not well characterized.<ref name="cellex_eua">{{cite web |date=1 April 2020 |title=Cellex Emergency Use Authorization |url=https://www.fda.gov/media/136622/download |url-status=dead |archive-url=https://web.archive.org/web/20200409222830/https://www.fda.gov/media/136622/download |archive-date=9 April 2020 |access-date=10 April 2020 |publisher=U.S. [[Food and Drug Administration]] (FDA) }}</ref> IgG antibodies generally become detectable 10–14 days after infection and normally peak around 28 days after infection.<ref name="NYT_antibody">{{cite news |date=10 April 2020 |title=Will an Antibody Test Allow Us to Go Back to School or Work? |url=https://www.nytimes.com/2020/04/10/health/coronavirus-antibody-test.html |url-status=live |archive-url=https://web.archive.org/web/20200415010317/https://www.nytimes.com/2020/04/10/health/coronavirus-antibody-test.html |archive-date=15 April 2020 |access-date=15 April 2020 |website=[[The New York Times]]}}</ref><ref name="MtSinai_EUA">{{cite web |date=15 April 2020 |title=Mount Sinai Emergency Use Authorization |url=https://www.fda.gov/media/137032/download |access-date=18 April 2020 |publisher=U.S. [[Food and Drug Administration]] (FDA) |archive-date=25 April 2020 |archive-url=https://web.archive.org/web/20200425090606/https://www.fda.gov/media/137032/download |url-status=live }}</ref> This pattern of antibody development seen with other infections, often does not apply to SARS-CoV-2, however, with IgM sometimes occurring after IgG, together with IgG or not occurring at all.<ref name="pmid32633840">{{cite journal | vauthors = Bauer G | title = The variability of the serological response to SARS-corona virus-2: Potential resolution of ambiguity through determination of avidity (functional affinity) | journal = Journal of Medical Virology | volume = 93 | issue = 1 | pages = 311–322 | date = January 2021 | pmid = 32633840 | pmc = 7361859 | doi = 10.1002/jmv.26262 }}</ref> Generally, however, median IgM detection occurs 5&nbsp;days after symptom onset, whereas IgG is detected a median 14&nbsp;days after symptom onset.<ref name="pmid32729549">{{cite journal | vauthors = Ravi N, Cortade DL, Ng E, Wang SX | title = Diagnostics for SARS-CoV-2 detection: A comprehensive review of the FDA-EUA COVID-19 testing landscape | journal = Biosensors & Bioelectronics | volume = 165 | article-number = 112454 | date = October 2020 | pmid = 32729549 | pmc = 7368663 | doi = 10.1016/j.bios.2020.112454 }}</ref> IgG levels significantly decline after two or three months.<ref name="pmid32882235">{{cite journal | vauthors = Goudouris ES | title = Laboratory diagnosis of COVID-19 | journal = Jornal de Pediatria | volume = 97 | issue = 1 | pages = 7–12 | year = 2020 | pmid = 32882235 | pmc = 7456621 | doi = 10.1016/j.jped.2020.08.001 }}</ref>

      Genetic tests verify infection earlier than antibody tests. Only 30% of those with a positive genetic test produced a positive antibody test on day 7 of their infection.<ref name=":1" />

      ==== Antibody Test Types ====
      ===== Rapid diagnostic test (RDT) =====
      [[Rapid diagnostic test|RDT]]s typically use a small, portable, positive/negative [[lateral flow assay]] that can be executed at point of care. RDTs may process blood samples, saliva samples, or nasal swab fluids. RDTs produce colored lines to indicate positive or negative results.<ref name="Serology testing" />

      ===== Enzyme-linked immunosorbent assay (ELISA) =====
      [[Enzyme-linked immunosorbent assay|ELISA]]s can be qualitative or quantitative and generally require a lab. These tests usually use [[whole blood]], [[Blood plasma|plasma]], or [[Serum (blood)|serum]] samples. A plate is coated with a viral protein, such as a SARS-CoV-2 spike protein. Samples are incubated with the protein, allowing any antibodies to bind to it. The antibody-protein complex can then be detected with another wash of antibodies that produce a color/fluorescent readout.<ref name="Serology testing" />

      ===== Neutralization assay =====
      Neutralization assays assess whether sample antibodies prevent viral infection in test cells.<ref name="Klasse pp. 1–24"/> These tests sample blood, plasma or serum. The test cultures cells that allow viral reproduction (e.g., [[Vero cell|Vero E6]] cells). By varying antibody concentrations, researchers can visualize and quantify how many test antibodies block virus replication.<ref name="Serology testing" />

      ===== Chemiluminescent immunoassay =====
      Chemiluminescent [[immunoassay]]s are quantitative lab tests. They sample blood, plasma, or serum. Samples are mixed with a known viral protein, buffer reagents and specific, enzyme-labeled antibodies. The result is luminescent. A chemiluminescent microparticle immunoassay uses magnetic, protein-coated microparticles. Antibodies react to the viral protein, forming a complex. Secondary enzyme-labeled antibodies are added and bind to these complexes. The resulting chemical reaction produces light. The radiance is used to calculate the number of antibodies. This test can identify multiple types of antibodies, including IgG, IgM, and [[Immunoglobulin A|IgA]].<ref name="Serology testing" />

      ====Neutralizing vis-à-vis binding antibodies====
      Most if not all large scale COVID-19 antibody testing looks for binding antibodies only and does not measure the more important [[neutralizing antibody|neutralizing antibodies]] (NAb).<ref name="research_svnt">{{cite journal | vauthors = Tan CW, Chia WN, Qin X, Liu P, Chen MI, Tiu C, Hu Z, Chen VC, Young BE, Sia WR, Tan YJ, Foo R, Yi Y, Lye DC, Anderson DE, Wang LF | title = A SARS-CoV-2 surrogate virus neutralization test based on antibody-mediated blockage of ACE2-spike protein-protein interaction | journal = Nature Biotechnology | volume = 38 | issue = 9 | pages = 1073–1078 | date = September 2020 | pmid = 32704169 | doi = 10.1038/s41587-020-0631-z | s2cid = 220720953 | doi-access = free }}</ref><ref name="nature_antibody">{{cite journal | vauthors = Mallapaty S | title = Will antibody tests for the coronavirus really change everything? | journal = Nature | volume = 580 | issue = 7805 | pages = 571–572 | date = April 2020 | pmid = 32313159 | doi = 10.1038/d41586-020-01115-z | url = https://www.nature.com/articles/d41586-020-01115-z | url-status = live | access-date = 20 April 2020 | bibcode = 2020Natur.580..571M | s2cid = 216048544 | archive-url = https://web.archive.org/web/20200624233010/https://www.nature.com/articles/d41586-020-01115-z | archive-date = 24 June 2020 | url-access = subscription }}</ref><ref name="fcheck_antibody">{{cite web |date=27 April 2020 |title=Q&A on COVID-19 Antibody Tests |url=https://www.factcheck.org/2020/04/qa-on-covid-19-antibody-tests/ |url-status=live |archive-url=https://web.archive.org/web/20200427212402/https://www.factcheck.org/2020/04/qa-on-covid-19-antibody-tests/ |archive-date=27 April 2020 |access-date=28 April 2020 |publisher=factcheck.org}}</ref> A NAb is an antibody that neutralizes the infectivity of a virus particle by blocking its attachment to or entry into a susceptible cell; enveloped viruses, like e.g. SARS-CoV-2, are neutralized by the blocking of steps in the replicative cycle up to and including membrane fusion.<ref name="Def">{{cite web |year=2008 |title=Neutralising antibody |url=http://www.biology-online.org/dictionary/Neutralizing_antibody |url-status=live |archive-url=https://web.archive.org/web/20180708221621/https://www.biology-online.org/dictionary/Neutralizing_antibody |archive-date=8 July 2018 |access-date=4 July 2009 |publisher=Biology-Online}}</ref><ref name="Klasse pp. 1–24"/> A non-neutralizing antibody either does not bind to the crucial structures on the virus surface or binds but leaves the virus particle infectious; the antibody may still contribute to the destruction of virus particles or infected cells by the immune system.<ref name="schmaljohn2013">{{cite journal | vauthors = Schmaljohn AL | title = Protective antiviral antibodies that lack neutralizing activity: precedents and evolution of concepts | journal = Current HIV Research | volume = 11 | issue = 5 | pages = 345–353 | date = July 2013 | pmid = 24191933 | doi = 10.2174/1570162x113116660057 }}</ref><ref name="Klasse pp. 1–24"/> It may even enhance infectivity by interacting with receptors on [[macrophage]]s.<ref>{{cite journal | vauthors = Rhorer J, Ambrose CS, Dickinson S, Hamilton H, Oleka NA, Malinoski FJ, Wittes J | title = Efficacy of live attenuated influenza vaccine in children: A meta-analysis of nine randomized clinical trials | journal = Vaccine | volume = 27 | issue = 7 | pages = 1101–1110 | date = February 2009 | pmid = 19095024 | doi = 10.1016/j.vaccine.2008.11.093 | url = https://www.virology.ws/2009/07/24/virus-neutralization-by-antibodies/ | url-status = live | publisher = Virology Blog | access-date = 29 April 2020 | archive-url = https://web.archive.org/web/20200423003342/https://www.virology.ws/2009/07/24/virus-neutralization-by-antibodies/ | archive-date = 23 April 2020 | url-access = subscription }}</ref> Since most COVID-19 antibody tests return a positive result if they find only binding antibodies, these tests cannot indicate that the subject has generated protective NAbs that protect against re-infection.<ref name=nature_antibody/><ref name=fcheck_antibody/>

      It is expected that binding antibodies imply the presence of NAbs<ref name=fcheck_antibody/> and for many viral diseases total antibody responses correlate somewhat with NAb responses<ref name="sciencemediacentre">{{cite web |date=17 April 2020 |title=expert reaction to announcement by Roche of its new serology test for COVID-19 antibodies |url=https://www.sciencemediacentre.org/expert-reaction-to-announcement-by-roche-of-its-new-serology-test-for-covid-19-antibodies/ |url-status=live |archive-url=https://web.archive.org/web/20200430033415/https://www.sciencemediacentre.org/expert-reaction-to-announcement-by-roche-of-its-new-serology-test-for-covid-19-antibodies/ |archive-date=30 April 2020 |access-date=28 April 2020 |publisher=Science Media Centre}}</ref> but this is not established for COVID-19. A study of 175 recovered patients in China who experienced mild symptoms reported that 10 individuals had no detectable NAbs at discharge, or thereafter. How these patients recovered without the help of NAbs and whether they were at risk of re-infection was not addressed.<ref name=nature_antibody/> An additional source of uncertainty is that even if NAbs are present, viruses such as HIV can evade NAb responses.<ref name=research_svnt/>

      Studies have indicated that NAbs to the original [[SARS]] virus (the predecessor to the current SARS-CoV-2) can remain active for two years<ref>{{cite journal | vauthors = Cao WC, Liu W, Zhang PH, Zhang F, Richardus JH | title = Disappearance of antibodies to SARS-associated coronavirus after recovery | journal = The New England Journal of Medicine | volume = 357 | issue = 11 | pages = 1162–1163 | date = September 2007 | pmid = 17855683 | doi = 10.1056/NEJMc070348 | publisher = NEJM | doi-access = free }}</ref> and are gone after six years.<ref name="JImm6">{{cite web |date=19 April 2011 |title=Lack of Peripheral Memory B Cell Responses in Recovered Patients with Severe Acute Respiratory Syndrome: A Six-Year Follow-Up Study |url=https://www.jimmunol.org/content/jimmunol/186/12/7264.full.pdf |url-status=live |archive-url=https://web.archive.org/web/20200501014708/https://www.jimmunol.org/content/jimmunol/186/12/7264.full.pdf |archive-date=1 May 2020 |access-date=1 May 2020 |publisher=Journal of Immunology}}</ref> Nevertheless, memory cells including [[memory B cell]]s and [[memory T cell]]s<ref>{{cite journal | vauthors = Leslie M | title = T cells found in coronavirus patients 'bode well' for long-term immunity | journal = Science | volume = 368 | issue = 6493 | pages = 809–810 | date = May 2020 | pmid = 32439770 | doi = 10.1126/science.368.6493.809 | bibcode = 2020Sci...368..809L | s2cid = 218834495 | doi-access = free }}</ref> can last much longer and may have the ability to reduce reinfection severity.<ref name=JImm6/>

