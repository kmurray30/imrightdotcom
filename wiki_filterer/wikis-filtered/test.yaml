      ===Other tests===

      ==== Sniff tests ====
      Sudden loss of smell can be used to screen people on a daily basis for COVID-19. A study by the National Institutes of Health showed that those infected with SARS-CoV-2 could not smell a 25% mixture of ethanol and water.<ref>{{cite journal | vauthors = Calvo-Henriquez C, Maldonado-Alvarado B, Chiesa-Estomba C, Rivero-Fernández I, Sanz-Rodriguez M, Villarreal IM, Rodriguez-Iglesias M, Mariño-Sánchez F, Rivero-de-Aguilar A, Lechien JR, Martínez-Capoccioni G, Saussez S, Capasso R, Karkos PD, Schriever V, Martin-Martin C, Alobid I, Santamaría-Gadea A, Fragola C, Mayo-Yáñez M, Pérez-Freixo H, Ninchritz-Becerra E, Soriano-Reixach M, Mondragon-Rezola E, Ruiz-Coello MD, Navarro RA, García-Fernández A, Marchan-López Á | title = Ethyl alcohol threshold test: a fast, reliable and affordable olfactory Assessment tool for COVID-19 patients | journal = European Archives of Oto-Rhino-Laryngology | volume = 277 | issue = 10 | pages = 2783–2792 | date = October 2020 | pmid = 32583183 | pmc = 7312102 | doi = 10.1007/s00405-020-06131-3 }}</ref> Because various conditions can lead to the loss of the sense of smell, a sniff test would not be definitive but indicate the need for a PCR test. Because the loss of the sense of smell shows up before other symptoms, there has been a call for widespread sniff testing.<ref>{{cite web |vauthors=Hayes J, Exten C, State P |title=At-home DIY smell tests could catch Covid-19 cases |url=https://www.cnn.com/2020/12/24/health/loss-of-smell-covid-test-wellness-partner/index.html |website=CNN Health |date=24 December 2020 |publisher=The Conversation |access-date=7 September 2021 |archive-date=31 July 2021 |archive-url=https://web.archive.org/web/20210731140612/https://www.cnn.com/2020/12/24/health/loss-of-smell-covid-test-wellness-partner/index.html |url-status=live }}</ref> Health care bureaucracies have generally ignored sniff tests even though they are quick, easy and capable of being self-administered daily. This has led some medical journals to write editorials supporting the adoption of sniff testing.<ref>{{cite journal | vauthors = Menni C, Sudre CH, Steves CJ, Ourselin S, Spector TD | title = Widespread smell testing for COVID-19 has limited application - Authors' reply | journal = Lancet | volume = 396 | issue = 10263 | pages = 1630–1631 | date = November 2020 | pmid = 33157000 | pmc = 7832202 | doi = 10.1016/S0140-6736(20)32316-3 }}</ref>

      ==== Imaging ====
      Typical visible features on CT initially include bilateral multilobar [[Ground glass opacity|ground-glass opacities]] with a peripheral or posterior distribution.<ref name=":0">{{cite journal | vauthors = Salehi S, Abedi A, Balakrishnan S, Gholamrezanezhad A | title = Coronavirus Disease 2019 (COVID-19): A Systematic Review of Imaging Findings in 919 Patients | journal = AJR. American Journal of Roentgenology | volume = 215 | issue = 1 | pages = 87–93 | date = July 2020 | pmid = 32174129 | doi = 10.2214/AJR.20.23034 | quote = Known features of COVID-19 on initial CT include bilateral multilobar ground-glass opacification (GGO) with a peripheral or posterior distribution, mainly in the lower lobes and less frequently within the right middle lobe. | doi-access = free }}</ref> COVID-19 can be identified with higher precision using CT than with RT-PCR.<ref name="pmid32843849">{{cite journal | vauthors = Manigandan S, Wu MT, Ponnusamy VK, Raghavendra VB, Pugazhendhi A, Brindhadevi K | title = A systematic review on recent trends in transmission, diagnosis, prevention and imaging features of COVID-19 | journal = Process Biochemistry | volume = 98 | pages = 233–240 | date = November 2020 | pmid = 32843849 | pmc = 7439988 | doi = 10.1016/j.procbio.2020.08.016 | bibcode = 2020PBioc..98..233M }}</ref>

      [[Pleural cavity|Subpleural dominance]], [[Crazy paving (medicine)|crazy paving]], and [[Pulmonary consolidation|consolidation]] may develop as the disease evolves.<ref name=":0" /><ref>{{cite journal | vauthors = Lee EY, Ng MY, Khong PL | title = COVID-19 pneumonia: what has CT taught us? | journal = The Lancet. Infectious Diseases | volume = 20 | issue = 4 | pages = 384–385 | date = April 2020 | pmid = 32105641 | pmc = 7128449 | doi = 10.1016/S1473-3099(20)30134-1 }}</ref> Chest [[CT scan]]s and [[Chest radiograph|chest x-rays]] are not recommended for diagnosing COVID-19. Radiologic findings in COVID-19 lack specificity.<ref name=":0" /><ref>{{cite web |last=<!--Not stated--> |date=22 March 2020 |title=ACR Recommendations for the use of Chest Radiography and Computed Tomography (CT) for Suspected COVID-19 Infection |url=https://www.acr.org/Advocacy-and-Economics/ACR-Position-Statements/Recommendations-for-Chest-Radiography-and-CT-for-Suspected-COVID19-Infection |url-status=live |archive-url=https://web.archive.org/web/20200513103821/https://www.acr.org/Advocacy-and-Economics/ACR-Position-Statements/Recommendations-for-Chest-Radiography-and-CT-for-Suspected-COVID19-Infection |archive-date=13 May 2020 |access-date=20 May 2020 |website=American College of Radiology}}</ref>

      Chest X-rays, computed tomography scans and ultrasounds are all ways the coronavirus disease can be detected.

      A chest x-ray is a portable lightweight machine. This machine is typically more available than polymerase chain reaction and computerized tomography scans. it only takes approximately 15 seconds per patient.<ref name=":02"/> This makes chest-x ray readily accessible and inexpensive. It also has quick turnaround time and can be crucial to the clinical equipment in the detection of coronavirus disease.<ref>{{cite journal | vauthors = Tay YX, Kothan S, Kada S, Cai S, Lai CW | title = Challenges and optimization strategies in medical imaging service delivery during COVID-19 | journal = World Journal of Radiology | volume = 13 | issue = 5 | pages = 102–121 | date = May 2021 | pmid = 34141091 | pmc = 8188837 | doi = 10.4329/wjr.v13.i5.102 | doi-access = free }}</ref>
      Computerized tomography scans involve looking at 3D images from various angles. This is not as available as chest x-ray, but still only takes about 15 minutes per patient.<ref name=":02"/> Computerized tomography has been a known routine scanning for pneumonia diagnosis, therefore can also be used to diagnose coronavirus disease. Computerized tomography scans may help with ongoing illness monitoring throughout treatment. Patients who had low-grade symptoms and high body temperatures revealed significant lung indications on their chest computed tomography scans. They emphasized how important chest computerized tomography scans are for determining how serious the coronavirus disease infection is.<ref name=":110"/>

      Ultrasound can be another tool to detect coronavirus disease. An ultrasound is a type of imaging exam that produces images using sound waves. Unlike computerized tomography scans and x-rays, ultrasound does not use radiation. Moreover, it is inexpensive, simple to use, repeatable, and has several additional advantages. Using a hand-held mobile machine, ultrasound examinations can be performed in a variety of healthcare settings.<ref name=":22">{{cite journal | vauthors = Inui S, Gonoi W, Kurokawa R, Nakai Y, Watanabe Y, Sakurai K, Ishida M, Fujikawa A, Abe O | title = The role of chest imaging in the diagnosis, management, and monitoring of coronavirus disease 2019 (COVID-19) | journal = Insights into Imaging | volume = 12 | issue = 1 | article-number = 155 | date = November 2021 | pmid = 34727257 | pmc = 8561360 | doi = 10.1186/s13244-021-01096-1 | doi-access = free }}</ref>

      There are some downsides to using imaging, however. The equipment needed for computed tomography scans is not available in most hospitals, making it not as effective as some other tools used for detection of the coronavirus disease.<ref name=":02">{{cite journal | vauthors = Tabik S, Gomez-Rios A, Martin-Rodriguez JL, Sevillano-Garcia I, Rey-Area M, Charte D, Guirado E, Suarez JL, Luengo J, Valero-Gonzalez MA, Garcia-Villanova P, Olmedo-Sanchez E, Herrera F | title = COVIDGR Dataset and COVID-SDNet Methodology for Predicting COVID-19 Based on Chest X-Ray Images | journal = IEEE Journal of Biomedical and Health Informatics | volume = 24 | issue = 12 | pages = 3595–3605 | date = December 2020 | pmid = 33170789 | doi = 10.1109/JBHI.2020.3037127 | s2cid = 219179286 | doi-access = free | pmc = 8545181 | bibcode = 2020IJBHI..24.3595T | hdl = 10045/110797 | hdl-access = free }}</ref> One of the difficult tasks in a pandemic is manually inspecting each report, which takes numerous radiology professionals and time.<ref>{{cite journal | vauthors = Panwar H, Gupta PK, Siddiqui MK, Morales-Menendez R, Singh V | title = Application of deep learning for fast detection of COVID-19 in X-Rays using nCOVnet | journal = Chaos, Solitons and Fractals | volume = 138 | article-number = 109944 | date = September 2020 | pmid = 32536759 | pmc = 7254021 | doi = 10.1016/j.chaos.2020.109944 | bibcode = 2020CSF...13809944P }}</ref> There were several problems with early studies of using chest computerized tomography scans for diagnosing coronavirus. Some of these problems included the disease severity characters being different in severe and hospitalized cases. The criteria for doing a chest computerized tomography scan were not defined. There was also no characterization of positive chest computerized tomography scans results. The computerized tomography scans findings were not the same as positive computerized tomography scans findings of coronavirus.<ref name=":22"/> In a typical clinical setting, chest imaging is not advised for routine screening of COVID-19. Patients with asymptomatic to mild symptoms are not recommended to be tested via chest computerized tomography scans. However, it is still crucial to use, particularly when determining complications or disease progression. Chest imaging also is not always the first route to take with patients who have high risk factors for COVID. High risk patients that had mild symptoms, chest imaging findings were limited. Although a computerized tomography scan is a strong tool in the diagnosis of COVID-19, it is insufficient to identify COVID-19 alone due to the poor specificity and the difficulties that radiologists may experience in distinguishing COVID-19 from other viral pneumonia on chest computerized tomography scans.<ref name=":110">{{cite journal | vauthors = Alsharif W, Qurashi A | title = Effectiveness of COVID-19 diagnosis and management tools: A review | journal = Radiography | volume = 27 | issue = 2 | pages = 682–687 | date = May 2021 | pmid = 33008761 | pmc = 7505601 | doi = 10.1016/j.radi.2020.09.010 }}</ref>

      ====Serology (CoLab score) tests====
      The standard blood test (quick scan) taken at the emergency room measures different values. By use of the blood quick scan the CoLab score is calculated with a developed algorithm based on how the coronavirus causes changes in the blood. The software is intended for use in emergency rooms to quickly rule out the presence of the disease in incoming patients. A not negative result is followed by a PCR ([[polymerase chain reaction]]) or LAMP ([[loop-mediated isothermal amplification]]) test.<ref>{{cite web |date=19 April 2021 |title=Dutch corona blood test from Eindhoven goes international |url=https://innovationorigins.com/dutch-corona-blood-test-from-eindhoven-goes-international |url-status=live |archive-url=https://web.archive.org/web/20210427161325/https://innovationorigins.com/dutch-corona-blood-test-from-eindhoven-goes-international/ |archive-date=27 April 2021 |access-date=2 July 2021}}</ref>

      ====Breath tests====
      The breath test by a [[Coronavirus breathalyzer]] is a pre-screening test for people who have no or mild symptoms of COVID-19. A not negative result is followed by a PCR or LAMP test.{{citation needed|date=December 2021}}

      ====Animals====
      In May 2021, Reuters reported that Dutch researchers at [[Wageningen University]] had shown that trained bees could detect the virus in infected samples in seconds and this could benefit countries where test facilities are in short supply.<ref>{{cite news | vauthors = Biesemans B |title=Bees in the Netherlands trained to detect COVID-19 infections |work=Reuters |url=https://www.reuters.com/lifestyle/oddly-enough/bees-netherlands-trained-detect-covid-19-infections-2021-05-06/ |url-status=live |access-date=2 July 2021 |archive-url=https://web.archive.org/web/20210630101408/https://www.reuters.com/lifestyle/oddly-enough/bees-netherlands-trained-detect-covid-19-infections-2021-05-06/ |archive-date=30 June 2021}}</ref> A two-month study by the Necker-Cochin hospital Paris in conjunction with the French national veterinary school reported in May 2021 that dogs were more reliable than current lateral flow tests.<ref>{{cite news | vauthors = Henley J |title=Dogs can better detect Covid in humans than lateral flow tests, finds study |work=The Guardian |url=https://www.theguardian.com/lifeandstyle/2021/may/20/dogs-can-better-detect-covid-in-humans-than-lateral-flow-tests-finds-study |url-status=live |date=20 May 2021 |archive-url=https://web.archive.org/web/20210629135745/https://www.theguardian.com/lifeandstyle/2021/may/20/dogs-can-better-detect-covid-in-humans-than-lateral-flow-tests-finds-study |archive-date=29 June 2021}}</ref>

      Researchers in Paris in March 2022 reported in a preprint not yet peer-reviewed that trained dogs were very effective for rapidly detecting the presence of SARS-Cov2 in people, whether displaying symptoms or not. The dogs were presented with sweat samples to smell from 335 people, of whom 78 with symptoms and 31 without tested positive by PCR. The dogs detected 97% of the symptomatic and 100% of the asymptomatic infections. They were 91% accurate at identifying volunteers who were not infected, and 94% accurate at ruling out the infection in people without symptoms. The authors said "Canine testing is non-invasive and provides immediate and reliable results. Further studies will be focused on direct sniffing by dogs to evaluate sniffer dogs for mass pre-test in airports, harbors, railways stations, cultural activities or sporting events."<ref>{{cite journal | vauthors = Grandjean D, Elie C, Gallet C, Julien C, Roger V, Desquilbet L, Alvergnat G, Delarue S, Gabassi A, Minier M, Choupeaux L, Kerneis S, Delaugerre C, LE Goff J, Treluyer JM | title = Diagnostic accuracy of non-invasive detection of SARS-CoV-2 infection by canine olfaction | journal = PLOS ONE | volume = 17 | issue = 6 | article-number = e0268382 | date = 8 March 2022 | pmid = 35648737 | pmc = 9159600 | doi = 10.1371/journal.pone.0268382|medrxiv=10.1101/2022.03.07.22271219 | publisher = Cold Spring Harbor Laboratory | doi-access = free | bibcode = 2022PLoSO..1768382G | s2cid = 247291441 }}</ref><ref>{{cite news |vauthors=Lapid N |title=Variant that combines Delta and Omicron identified; dogs sniff out virus with high accuracy |work=Reuters |date=9 March 2022 |url=https://www.reuters.com/business/healthcare-pharmaceuticals/variant-that-combines-delta-omicron-identified-dogs-sniff-out-virus-with-high-2022-03-09/ |access-date=8 April 2025 |archive-date=25 April 2022 |archive-url=https://web.archive.org/web/20220425135556/https://www.reuters.com/business/healthcare-pharmaceuticals/variant-that-combines-delta-omicron-identified-dogs-sniff-out-virus-with-high-2022-03-09/ |url-status=live }}</ref>

      ====Functional assays====
      Tollotest is a molecular test that detects the activity of a SARS-CoV2 protease, which is a biomarker for active infection.<ref>{{cite news|url=https://www.yahoo.com/now/todos-medical-announces-positive-data-150000879.html|title=Todos Medical Announces Positive Data in Hospitalized and Outpatient Setting for TolloTest, a Novel SARS-CoV-2 3CL Protease Biomarker Assay|website=Yahoo|access-date=1 December 2021|archive-date=1 December 2021|archive-url=https://web.archive.org/web/20211201234023/https://www.yahoo.com/now/todos-medical-announces-positive-data-150000879.html|url-status=dead}}</ref>

      ==History==
      {{main|Development of COVID-19 tests}}

      [[File:Full-list-cumulative-total-tests-per-million.svg|thumb|upright=1.25|Timeline of total number of tests in different countries<ref>{{cite journal | vauthors = [[Max Roser|Roser M]], [[Hannah Ritchie|Ritchie H]], Ortiz-Ospina E, Hasell J |date=4 March 2020 |title=Coronavirus Disease (COVID-19) – Statistics and Research |url=https://ourworldindata.org/coronavirus |url-status=live |journal=Our World in Data |archive-url=https://web.archive.org/web/20200319171947/https://ourworldindata.org/coronavirus |archive-date=19 March 2020 |access-date=2 July 2021 |via=ourworldindata.org}}</ref>]]

      In January 2020, scientists from China published the first [[genetic sequence]]s of SARS-CoV-2 via [[virological.org]],<ref>{{cite web |title=Novel 2019 coronavirus genome |url=https://virological.org/t/novel-2019-coronavirus-genome/319 |website=Virological.org |date=11 January 2020 |access-date=12 April 2023 |archive-date=12 January 2020 |archive-url=https://web.archive.org/web/20200112100227/http://virological.org/t/initial-genome-release-of-novel-coronavirus/319 |url-status=live }}</ref> a "hub for prepublication data designed to assist with public health activities and research".<ref name="Schnirring11Jan2020">{{cite web | vauthors = Schnirring L |date=11 January 2020 |title=China releases genetic data on new coronavirus, now deadly |url=http://www.cidrap.umn.edu/news-perspective/2020/01/china-releases-genetic-data-new-coronavirus-now-deadly |url-status=live |archive-url=https://web.archive.org/web/20200111215102/http://www.cidrap.umn.edu/news-perspective/2020/01/china-releases-genetic-data-new-coronavirus-now-deadly |archive-date=11 January 2020 |access-date=12 January 2020 |website=CIDRAP}}</ref>

      Even once the first tests were created, the supply was limited. As a result, no countries had reliable data on the prevalence of the virus early in the pandemic.<ref name=":14">{{cite news | vauthors = Ioannidis JP |date=17 March 2020 |title=A fiasco in the making? As the coronavirus pandemic takes hold, we are making decisions without reliable data |publisher=STAT |url=https://www.statnews.com/2020/03/17/a-fiasco-in-the-making-as-the-coronavirus-pandemic-takes-hold-we-are-making-decisions-without-reliable-data/ |url-status=live |access-date=22 March 2020 |archive-url=https://web.archive.org/web/20200405061513/https://www.statnews.com/2020/03/17/a-fiasco-in-the-making-as-the-coronavirus-pandemic-takes-hold-we-are-making-decisions-without-reliable-data/ |archive-date=5 April 2020}}</ref> The WHO and other experts called for ramping up testing as the best way to slow the spread of the virus.<ref name=":15">{{cite news |date=16 March 2020 |title='Test, Test, Test': WHO Chief's Coronavirus Message to World |work=[[The New York Times]] |agency=Reuters |url=https://www.nytimes.com/reuters/2020/03/16/world/europe/16reuters-healthcare-coronavirus-who.html |access-date=16 March 2020 |archive-url=https://web.archive.org/web/20200320115129/https://www.nytimes.com/reuters/2020/03/16/world/europe/16reuters-healthcare-coronavirus-who.html |archive-date=20 March 2020}}</ref><ref name=":16">{{cite news | vauthors = Farge E, Revill J |date=17 March 2020 |title='Test, test, test': WHO chief's coronavirus message to world |work=Reuters |url=https://www.reuters.com/article/us-healthcare-coronavirus-who-idUSKBN2132S4 |url-status=live |access-date=6 November 2020 |archive-url=https://web.archive.org/web/20201103061958/https://www.reuters.com/article/us-healthcare-coronavirus-who-idUSKBN2132S4 |archive-date=3 November 2020}}</ref> [[Shortages related to the COVID-19 pandemic|Shortages]] of [[reagent]] and other testing supplies became a [[Bottleneck (production)|bottleneck]] for mass testing in the EU, the UK and the US.<ref name=":17">{{cite web |date=25 March 2020 |title=Coronavirus disease 2019 (COVID-19) pandemic: increased transmission in the EU/EEA and the UK |url=https://www.ecdc.europa.eu/sites/default/files/documents/RRA-seventh-update-Outbreak-of-coronavirus-disease-COVID-19.pdf |url-status=live |archive-url=https://web.archive.org/web/20200326100939/https://www.ecdc.europa.eu/sites/default/files/documents/RRA-seventh-update-Outbreak-of-coronavirus-disease-COVID-19.pdf |archive-date=26 March 2020 |access-date=29 March 2020 |publisher=[[European Centre for Disease Prevention and Control]] |pages=15–16 |quote=the current shortages of laboratory consumables and reagents affect diagnostic capacity and hamper the epidemic response at the national and local levels. The laboratories have experienced delayed or missing deliveries of swabbing material, plastic consumables, RNA extraction and RT-PCR reagents, and PPE. This is affecting laboratories in all EU/EEA countries.}}</ref><ref name=":18">{{cite news | vauthors = Baird RP |date=24 March 2020 |title=Why Widespread Coronavirus Testing Isn't Coming Anytime Soon |magazine=[[The New Yorker]] |url=https://www.newyorker.com/news/news-desk/why-widespread-coronavirus-testing-isnt-coming-anytime-soon |url-status=live |access-date=29 March 2020 |archive-url=https://web.archive.org/web/20200328133105/https://www.newyorker.com/news/news-desk/why-widespread-coronavirus-testing-isnt-coming-anytime-soon |archive-date=28 March 2020 |quote=South Dakota, said that her state's public-health laboratory—the only lab doing COVID-19 testing in the state—had so much trouble securing reagents that it was forced to temporarily stop testing altogether. also noted critical shortages of extraction kits, reagents, and test kits}}</ref><ref name=":20">{{cite web | vauthors = Ossola A |date=25 March 2020 |title=Here are the coronavirus testing materials that are in short supply in the US |url=https://qz.com/1822596/all-the-coronavirus-test-materials-in-short-supply-in-the-us/ |url-status=live |archive-url=https://web.archive.org/web/20200326174135/https://qz.com/1822596/all-the-coronavirus-test-materials-in-short-supply-in-the-us/ |archive-date=26 March 2020 |access-date=29 March 2020 |website=Quartz |quote=extract the virus's genetic material—in this case, RNA—using a set of chemicals that usually come in pre-assembled kits. 'The big shortage is extraction kits' There are no easy replacements here: 'These reagents that are used in extraction are fairly complex chemicals. They have to be very pure, and they have to be in pure solution'}}</ref> Early tests also encountered problems with reliability.<ref name=":21">{{cite web | vauthors = Temple-Raston D |date=6 November 2020 |title=CDC Report: Officials Knew Coronavirus Test Was Flawed But Released It Anyway |url=https://www.npr.org/2020/11/06/929078678/cdc-report-officials-knew-coronavirus-test-was-flawed-but-released-it-anyway |url-status=live |archive-url=https://web.archive.org/web/20210611221811/https://www.npr.org/2020/11/06/929078678/cdc-report-officials-knew-coronavirus-test-was-flawed-but-released-it-anyway |archive-date=11 June 2021 |access-date=20 March 2021 |website=[[NPR]] }}</ref><ref>{{cite web | vauthors = Armario C |date=7 October 2020 |title=Peru bet heavily on cheap COVID tests; it didn't go well |url=https://www.mercurynews.com/2020/10/07/peru-bet-heavily-on-cheap-covid-tests-it-didnt-go-well |url-status=live |archive-url=https://web.archive.org/web/20210114060151/https://www.mercurynews.com/2020/10/07/peru-bet-heavily-on-cheap-covid-tests-it-didnt-go-well/ |archive-date=14 January 2021 |access-date=20 March 2021 |agency=[[Associated Press]] }}</ref>

      == Testing protocols ==

      === Drive-through testing ===
      In [[drive-through]] testing, the person undergoing testing remains in a vehicle while a healthcare professional approaches the vehicle and obtains a sample, all while taking appropriate precautions such as wearing [[personal protective equipment]] (PPE).<ref>{{cite web | vauthors = Kiger J |title=Mayo Clinic starts drive-thru testing for COVID-19 |url=https://www.postbulletin.com/life/health/mayo-clinic-starts-drive-thru-testing-for-covid/article_0087a856-63e3-11ea-be76-c7558f932526.html |url-status=live |archive-url=https://web.archive.org/web/20200312110120/https://www.postbulletin.com/life/health/mayo-clinic-starts-drive-thru-testing-for-covid/article_0087a856-63e3-11ea-be76-c7558f932526.html |archive-date=12 March 2020 |access-date=13 March 2020 |website=PostBulletin.com|date=12 March 2020 }}</ref><ref>{{cite web | vauthors = Hawkins AJ |date=11 March 2020 |title=Some states are offering drive-thru coronavirus testing |url=https://www.theverge.com/2020/3/11/21174880/coronavirus-testing-drive-thru-colorado-connecticut-washington |url-status=live |archive-url=https://web.archive.org/web/20200311201421/https://www.theverge.com/2020/3/11/21174880/coronavirus-testing-drive-thru-colorado-connecticut-washington |archive-date=11 March 2020 |access-date=13 March 2020 |website=The Verge}}</ref> Drive-through centers helped South Korea accelerate its testing program.<ref>{{cite web |date=11 March 2020 |title=South Korea's Drive-Through Testing For Coronavirus Is Fast – And Free |url=https://www.npr.org/sections/goatsandsoda/2020/03/13/815441078/south-koreas-drive-through-testing-for-coronavirus-is-fast-and-free?t=1584350615980 |url-status=live |archive-url=https://web.archive.org/web/20200320222728/https://www.npr.org/sections/goatsandsoda/2020/03/13/815441078/south-koreas-drive-through-testing-for-coronavirus-is-fast-and-free?t=1584350615980 |archive-date=20 March 2020 |access-date=16 March 2020 |website=npr}}</ref>

      === Home collection ===
      [[File:Randox COVID-19 PCR home test kit.jpg|thumb|right|A [[Randox Health|Randox]] PCR home test kit in the UK, showing the swab, and multi-layer packaging to deliver it to the lab]]
      [[File:COVID-19 USPS Mailings.jpg|thumb|right|A USPS package containing COVID-19 tests from the fifth round of free US distributions in the fall of 2023, with instructions regarding FDA extensions&nbsp;of test expiration dates.]]
      In Hong Kong test subjects can stay home and receive a specimen tube. They spit into it, return it and later get the result.<ref>{{cite news |title=In Age of COVID-19, Hong Kong Innovates To Test And Quarantine Thousands |url=https://www.npr.org/sections/goatsandsoda/2020/02/23/808290390/in-age-of-covid-19-hong-kong-innovates-to-test-and-quarantine-thousands |url-status=live |archive-url=https://web.archive.org/web/20200224032422/https://www.npr.org/sections/goatsandsoda/2020/02/23/808290390/in-age-of-covid-19-hong-kong-innovates-to-test-and-quarantine-thousands |archive-date=24 February 2020 |access-date=26 February 2020 |newspaper=NPR|date=23 February 2020 | vauthors = Beaubien J }}</ref> Additionally, by the fall of 2023, the United States had conducted six rounds of mailing free at-home COVID-19 tests to households nationwide. The rapid antigen tests, while less accurate than PCR tests, did not require mailing the tests back to labs for analysis.<ref>{{cite news |last1=Nazzaro |first1=Miranda |title=How to order free COVID test kits |url=https://thehill.com/policy/healthcare/4221337-how-to-order-free-covid-test-kits/ |access-date=25 September 2023 |work=The Hill |date=25 September 2023 |archive-url=https://web.archive.org/web/20230925160839/https://thehill.com/policy/healthcare/4221337-how-to-order-free-covid-test-kits/ |archive-date=25 September 2023}}</ref><ref>{{cite news |last1=Hafer |first1=Nate |title=What's the difference between a PCR and antigen COVID-19 test? |url=https://www.umassmed.edu/news/news-archives/2021/11/whats-the-difference-between-a-pcr-and-antigen-covid-19-test/ |access-date=7 October 2023 |publisher=UMass Chan Medical School |date=10 November 2021 |archive-url=https://web.archive.org/web/20230817133916/https://www.umassmed.edu/news/news-archives/2021/11/whats-the-difference-between-a-pcr-and-antigen-covid-19-test/ |archive-date=17 August 2023 }}</ref>

      === Pooled testing ===
      {{See also|List of countries implementing pool testing strategy against COVID-19}}
      [[group testing|Pooled testing]] can improve turnaround time, by combining a number of samples to be tested together. If the pool result is negative, all samples are negative. If the test result is positive, samples will need to be individually tested.<ref name=":12" />

      In Israel, researchers at [[Technion – Israel Institute of Technology|Technion]] and [[Rambam Health Care Campus|Rambam Hospital]] developed a method for testing samples from 64 patients simultaneously, by pooling the samples and only testing further if the combined sample was positive.<ref>{{cite news |title=Pooling method allows dozens of COVID-19 tests to run simultaneously |work=medicalxpress.com |url=https://medicalxpress.com/news/2020-03-pooling-method-dozens-covid-simultaneously.html |url-status=live |access-date=24 March 2020 |archive-url=https://web.archive.org/web/20200322183249/https://medicalxpress.com/news/2020-03-pooling-method-dozens-covid-simultaneously.html |archive-date=22 March 2020}}</ref><ref>{{cite news |title=Israeli team has coronavirus test kit to test dozens of people at once |work=[[The Jerusalem Post]] |url=https://www.jpost.com/HEALTH-SCIENCE/Acceleration-in-multiple-coronavirus-tests-at-once-by-Israel-research-team-621533 |url-status=live |access-date=24 March 2020 |archive-url=https://web.archive.org/web/20200323210120/https://www.jpost.com/HEALTH-SCIENCE/Acceleration-in-multiple-coronavirus-tests-at-once-by-Israel-research-team-621533 |archive-date=23 March 2020 |issn=0792-822X}}</ref><ref>{{cite news |author=((Israel21c Staff)) |date=19 March 2020 |title=Israelis introduce method for accelerated COVID-19 testing |work=Israel21c |url=https://www.israel21c.org/israelis-introduce-method-for-accelerated-covid-19-testing/ |url-status=live |access-date=24 March 2020 |archive-url=https://web.archive.org/web/20200322183246/https://www.israel21c.org/israelis-introduce-method-for-accelerated-covid-19-testing/ |archive-date=22 March 2020}}</ref> Pool testing was then adopted in Israel, Germany, Ghana<ref>{{cite web |date=22 April 2020 |title=We 'pool' coronavirus samples to test 1,000s at a go; we've done 30,000 since Sunday – Noguchi |url=https://www.ghanaweb.com/GhanaHomePage/NewsArchive/We-pool-coronavirus-samples-to-test-1-000s-at-a-go-we-ve-done-30-000-since-Sunday-Noguchi-931525 |url-status=live |archive-url=https://web.archive.org/web/20200515175443/https://www.ghanaweb.com/GhanaHomePage/NewsArchive/We-pool-coronavirus-samples-to-test-1-000s-at-a-go-we-ve-done-30-000-since-Sunday-Noguchi-931525 |archive-date=15 May 2020 |access-date=22 April 2020 |publisher=GhanaWeb}}</ref><ref>{{cite web |date=31 July 2020 |title=Pooling samples boosts Ghana's COVID-19 testing |url=https://www.afro.who.int/news/pooling-samples-boosts-ghanas-covid-19-testing |url-status=live |archive-url=https://web.archive.org/web/20200805055455/https://www.afro.who.int/news/pooling-samples-boosts-ghanas-covid-19-testing |archive-date=5 August 2020 |access-date=31 July 2020 |publisher=WHO Africa}}</ref><ref>{{cite web |date=30 July 2020 |title=Pooling samples boosts Ghana's COVID-19 testing |url=https://www.who.int/news-room/feature-stories/detail/pooling-samples-boosts-ghana-s-covid-19-testing |url-status=live |archive-url=https://web.archive.org/web/20200821060856/https://www.who.int/news-room/feature-stories/detail/pooling-samples-boosts-ghana-s-covid-19-testing |archive-date=21 August 2020 |access-date=30 July 2020 |publisher=World Health Organization}}</ref> South Korea,<ref>{{cite news |date=9 April 2020 |title=[Coronavirus] Verified 'sample pooling' introduced to prevent herd infection in S. Korea |work=ajudaily.com |url=http://www.ajudaily.com/view/20200409140926759 |url-status=live |access-date=19 April 2020 |archive-url=https://web.archive.org/web/20200410113408/http://www.ajudaily.com/view/20200409140926759 |archive-date=10 April 2020}}</ref> [[Nebraska]],<ref>{{cite news |date=24 March 2020 |title=Gov. Ricketts provides update on coronavirus testing |work=KMTV |url=https://www.3newsnow.com/news/coronavirus/live-gov-ricketts-provides-coronavirus-briefing-3-24-20 |url-status=live |access-date=19 April 2020 |archive-url=https://web.archive.org/web/20200420195648/https://www.3newsnow.com/news/coronavirus/live-gov-ricketts-provides-coronavirus-briefing-3-24-20 |archive-date=20 April 2020}}</ref> China<ref>{{cite web | vauthors = Lanese N |date=28 May 2020 |title=Wuhan tested millions of people for COVID-19 in just days. Could US cities do the same? |url=https://www.livescience.com/pooled-sampling-covid19-in-wuhan-and-us-cities.html |url-status=live |archive-url=https://web.archive.org/web/20200628185637/https://www.livescience.com/pooled-sampling-covid19-in-wuhan-and-us-cities.html |archive-date=28 June 2020 |access-date=28 June 2020 |website=livescience.com}}</ref> and the Indian states of [[Uttar Pradesh]],<ref>{{cite news |title=Latest coronavirus update: UP to begin 'pool testing' of Covid suspects |work=Free Press Journal |url=https://www.freepressjournal.in/india/latest-coronavirus-update-up-to-begin-pool-testing-of-covid-suspects |url-status=live |access-date=19 April 2020 |archive-url=https://web.archive.org/web/20200417160251/https://www.freepressjournal.in/india/latest-coronavirus-update-up-to-begin-pool-testing-of-covid-suspects |archive-date=17 April 2020}}</ref> [[West Bengal]],<ref>{{cite news | vauthors = Yengkhom S |title=West Bengal to start pool testing of samples in low-risk zones |work=The Times of India |url=https://timesofindia.indiatimes.com/city/kolkata/bengal-to-start-pool-testing-of-samples-in-low-risk-zones/articleshow/75227413.cms |url-status=live |access-date=19 April 2020 |archive-url=https://web.archive.org/web/20200420132338/https://timesofindia.indiatimes.com/city/kolkata/bengal-to-start-pool-testing-of-samples-in-low-risk-zones/articleshow/75227413.cms |archive-date=20 April 2020}}</ref> [[Punjab, India|Punjab]],<ref>{{cite news |title=Punjab launches pool testing |url=https://www.tribuneindia.com/news/punjab/punjab-launches-pool-testing-71594 |url-status=live |access-date=19 April 2020 |archive-url=https://web.archive.org/web/20200504132631/https://www.tribuneindia.com/news/punjab/punjab-launches-pool-testing-71594 |archive-date=4 May 2020}}</ref> [[Chhattisgarh]]<ref>{{cite news |date=15 April 2020 |title='Chhattisgarh to adopt pool sample testing': Health minister TS Singh Deo on Covid-19 |work=Hindustan Times |url=https://www.hindustantimes.com/india-news/chhattisgarh-to-adopt-pool-sample-testing-health-minister-ts-singh-deo-on-covid-19/story-qUnbTE2WgfhAv72aqclkXN.html |url-status=live |access-date=19 April 2020 |archive-url=https://web.archive.org/web/20200419120020/https://www.hindustantimes.com/india-news/chhattisgarh-to-adopt-pool-sample-testing-health-minister-ts-singh-deo-on-covid-19/story-qUnbTE2WgfhAv72aqclkXN.html |archive-date=19 April 2020}}</ref> and [[Maharashtra]].<ref>{{cite news |date=12 April 2020 |title=Maharashtra to go for pool testing to defeat coronavirus |work=Deccan Herald |url=https://www.deccanherald.com/national/west/maharashtra-to-go-for-pool-testing-to-defeat-coronavirus-824331.html |url-status=live |access-date=19 April 2020 |archive-url=https://web.archive.org/web/20200415140210/https://www.deccanherald.com/national/west/maharashtra-to-go-for-pool-testing-to-defeat-coronavirus-824331.html |archive-date=15 April 2020}}</ref>

      Open source, multiplexed designs released by Origami Assays can test as many as 1122 patient samples using only 93 assays.<ref>{{cite web |date=2 April 2020 |title=Origami Assays |url=https://www.smarterbetter.design/origamiassays/default/index |url-status=live |archive-url=https://web.archive.org/web/20200405210003/https://www.smarterbetter.design/origamiassays/default/index |archive-date=5 April 2020 |access-date=7 April 2020 |publisher=Origami Assays}}</ref> These balanced designs can be run in small laboratories without robotic liquid handlers.

      === Multi-tiered testing ===
      One study proposed a rapid immune response assay as a screening test, with a confirmatory nucleic acid test for diagnosis, followed by a rapid antibody test to determine course of action and assess population exposure/herd immunity.<ref>{{cite journal | vauthors = Pulia MS, O'Brien TP, Hou PC, Schuman A, Sambursky R | title = Multi-tiered screening and diagnosis strategy for COVID-19: a model for sustainable testing capacity in response to pandemic | journal = Annals of Medicine | volume = 52 | issue = 5 | pages = 207–214 | date = August 2020 | pmid = 32370561 | pmc = 7877955 | doi = 10.1080/07853890.2020.1763449 | s2cid = 218519851 | doi-access = free }}</ref>

      === Required volume ===
      Required testing levels are a function of disease spread. The more the cases, the more tests are needed to manage the outbreak. COVID-19 tends to grow exponentially at the beginning of an outbreak, meaning that the number of required tests initially also grows exponentially. If properly targeted testing grows more rapidly than cases, it can be contained.{{citation needed|date=December 2021}}

      WHO recommends increasing testing until fewer than 10% are positive in any given jurisdiction.<ref>{{cite web |date=22 April 2020 |title=Which States Are Doing Enough Testing? This Benchmark Helps Settle The Debate |url=https://www.npr.org/sections/health-shots/2020/04/22/840526338/is-the-u-s-testing-enough-for-covid-19-as-debate-rages-on-heres-how-to-know |url-status=live |archive-url=https://web.archive.org/web/20200511210853/https://www.npr.org/sections/health-shots/2020/04/22/840526338/is-the-u-s-testing-enough-for-covid-19-as-debate-rages-on-heres-how-to-know |archive-date=11 May 2020 |access-date=11 May 2020 |website=NPR.org}}</ref>

      ==== United States ====
      [[File:United States tests for SARS CoV-2 - May 11, 2020.jpg|thumb|upright=1.35|Number of tests done per day in the US, {{As of|2020|04|lc=y}}.<br />
      Blue: CDC lab<br />
      Orange: Public health lab<br />
      Gray: Data incomplete due to reporting lag<br />
      Not shown: Testing at private labs; total exceeded 100,000 per day by 27 March.<ref>{{cite web | vauthors = Lee TB |date=2 April 2020 |title=America's COVID-19 testing has stalled, and that's a big problem |url=https://arstechnica.com/tech-policy/2020/04/americas-covid-19-testing-has-stalled-and-thats-a-big-problem/ |url-status=live |archive-url=https://web.archive.org/web/20200614084621/https://arstechnica.com/tech-policy/2020/04/americas-covid-19-testing-has-stalled-and-thats-a-big-problem/ |archive-date=14 June 2020 |access-date=5 April 2020 |website=Ars Technica}}</ref>]]

      Economist [[Paul Romer]] reported that the US has the technical capacity to scale up to 20&nbsp;million tests per day, which is his estimate of the scale needed to fully remobilize the economy.<ref name="Romer_roadmap">{{cite web | vauthors = Romer P |title=Roadmap to responsibly reopen America |url=https://roadmap.paulromer.net/paulromer-roadmap-report.pdf |url-status=live |archive-url=https://web.archive.org/web/20200511112747/https://roadmap.paulromer.net/paulromer-roadmap-report.pdf |archive-date=11 May 2020 |access-date=11 May 2020}}</ref> The [[Edmond J. Safra Center for Ethics]] estimated on 4 April 2020 that this capacity could be available by late July 2020.<ref>{{cite web |date=20 April 2020 |title=ROADMAP TO PANDEMIC RESILIENCE |url=https://ethics.harvard.edu/files/center-for-ethics/files/roadmaptopandemicresilience_updated_4.20.20.pdf |url-status=live |archive-url=https://web.archive.org/web/20200520063917/https://ethics.harvard.edu/files/center-for-ethics/files/roadmaptopandemicresilience_updated_4.20.20.pdf |archive-date=20 May 2020 |access-date=19 May 2020 |publisher=Edmond J. Safra Center for Ethics}}</ref> Romer pointed to [[single-molecule real-time sequencing]] equipment from [[Pacific Biosciences]]<ref name="Romer_roadmap" /><ref>{{cite web |title=Certified Service Providers |url=https://www.pacb.com/products-and-services/service-providers/?fwp_csp_region=americas&fwp_csp_instruments=sequel-system&fwp_sort=preserve |url-status=dead |archive-url=https://web.archive.org/web/20200610190759/https://www.pacb.com/products-and-services/service-providers/?fwp_csp_region=americas&fwp_csp_instruments=sequel-system&fwp_sort=preserve |archive-date=10 June 2020 |access-date=18 May 2020 |publisher=Pacific Biosciences}}</ref> and to the [[Ion semiconductor sequencing|Ion Torrent Next-Generation Sequencing]] equipment from [[ThermoFisher Scientific]].<ref name="Romer_roadmap" /><ref>{{cite web |title=Service Provider Program – US |url=https://www.thermofisher.com/us/en/home/life-science/sequencing/next-generation-sequencing/certified-service-providers-program.html |url-status=live |archive-url=https://web.archive.org/web/20200610173346/https://www.thermofisher.com/us/en/home/life-science/sequencing/next-generation-sequencing/certified-service-providers-program.html |archive-date=10 June 2020 |access-date=18 May 2020 |website=www.thermofisher.com |publisher=ThermoFisher Scientific}}</ref> According to Romer, "Recent research papers suggest that any one of these has the potential to scale up to millions of tests per day." This plan requires removing regulatory hurdles. Romer estimated that $100&nbsp;billion would cover the costs.<ref name="Romer_roadmap" />

      Romer also claimed that high test accuracy is not required if tests are administered frequently enough. He ran model simulations in which 7% of the population is tested every day using a test with a 20% [[false negative]] rate and a 1% [[false positive]] rate. The average person would be tested roughly every two weeks. Those who tested positive would go into quarantine. Romer's simulation indicated that the fraction of the population that is infected at any given time (known as the [[attack rate]]) peaks reaches roughly 8% in about thirty days before gradually declining, in most runs reaching zero at 500 days, with cumulative prevalence remaining below 20%.<ref>{{cite web |title=Paul Romer |url=https://paulromer.net/covid-sim-part2/ |url-status=live |archive-url=https://web.archive.org/web/20200518194123/https://paulromer.net/covid-sim-part2/ |archive-date=18 May 2020 |access-date=19 May 2020 |website=paulromer.net |publisher=Simulating Covid-19: Part 2}}</ref>

      === Snapshot mass-testing ===
      A study found that, despite possibly suboptimal implementation, the snapshot mass-testing approach conducted by [[COVID-19 pandemic in Slovakia|Slovakia]] by which ~80% of its population was tested for COVID-19 within a weekend at the end of October 2020 was thought highly efficacious, decreasing observed prevalence by 58% within one week and by 70% compared to a hypothetical scenario of no snapshot mass-testing.<ref>{{cite news | vauthors = Lewis T |title=Slovakia Offers a Lesson in How Rapid Testing Can Fight COVID |work=Scientific American |url=https://www.scientificamerican.com/article/slovakia-offers-a-lesson-in-how-rapid-testing-can-fight-covid/ |url-status=live |access-date=19 April 2021 |archive-url=https://web.archive.org/web/20210419145705/https://www.scientificamerican.com/article/slovakia-offers-a-lesson-in-how-rapid-testing-can-fight-covid/ |archive-date=19 April 2021}}</ref><ref>{{cite journal | vauthors = Pavelka M, Van-Zandvoort K, Abbott S, Sherratt K, Majdan M, Jarčuška P, Krajčí M, Flasche S, Funk S | title = The impact of population-wide rapid antigen testing on SARS-CoV-2 prevalence in Slovakia | journal = Science | volume = 372 | issue = 6542 | pages = 635–641 | date = May 2021 | pmid = 33758017 | pmc = 8139426 | doi = 10.1126/science.abf9648 | bibcode = 2021Sci...372..635P | doi-access = free }}</ref> The significant reduction resulted from a set of complementary lockdown and quarantine measures whereby citizens who tested positive were quarantined synchronously the weeks afterwards.<ref>{{cite news |date=7 December 2020 |title=Slovakia's mass Covid testing cut infection rate by 60%, researchers say |work=The Guardian |url=https://www.theguardian.com/world/2020/dec/07/slovakia-mass-covid-tests-cut-infection-rate-by-60-researchers-find |url-status=live |access-date=30 April 2021 |archive-url=https://web.archive.org/web/20210505105508/https://www.theguardian.com/world/2020/dec/07/slovakia-mass-covid-tests-cut-infection-rate-by-60-researchers-find |archive-date=5 May 2021}}</ref> The country increased other countermeasures at the same time so the inference was questionable. In the following months Slovakia's COVID-19 death rate per population increased to among the highest in the world. Research on mass testing suggests that people who test negative think it is safe to travel and come in contact with infected people. In the U.S. the tracing system was overwhelmed. On 70 percent of days there were more cases than tracers had time to contact and people contacted were often uncooperative.<ref>{{cite news | vauthors = Robertson LS |title=Roads to COVID-19 Containment and Spread|location= New York|publisher= Austin Macauley |date= 2023}}</ref>

      === Surveillance and screening of populations ===
      {{See also|Pandemic prevention#Surveillance and mapping}}
      As of August 2020, the WHO recognizes wastewater surveillance of SARS-CoV-2 as a potentially useful source of information on the prevalence and temporal trends of COVID-19 in communities, while highlighting that gaps in research such as viral shedding characteristics should be addressed.<ref name="SharifIkram2020">{{Cite journal |vauthors=Sharif S, Ikram A, et al. |title=Detection of SARs-CoV-2 in wastewater using the existing environmental surveillance network: A potential supplementary system for monitoring COVID-19 transmission |journal=PLOS ONE |date=2021 |volume=16 |issue=6 |article-number=e0249568 |doi=10.1371/journal.pone.0249568 |doi-access=free |pmid=34185787 |pmc=8241060 |bibcode=2021PLoSO..1649568S |medrxiv=10.1101/2020.06.03.20121426v3}}</ref> Such aggregative testing may have detected early cases.<ref>{{cite news |date=26 June 2020 |title=Coronavirus traces found in March 2019 sewage sample, Spanish study shows |work=Reuters |url=https://www.reuters.com/article/us-health-coronavirus-spain-science-idUSKBN23X2HQ |access-date=28 July 2021 |archive-date=21 August 2021 |archive-url=https://web.archive.org/web/20210821045040/https://www.reuters.com/article/us-health-coronavirus-spain-science-idUSKBN23X2HQ |url-status=live }}</ref> Studies show that [[Wastewater-based epidemiology#Virus surveillance|wastewater-based epidemiology]] has the potential for an early warning system and monitoring for COVID-19 infections.<ref>{{cite journal | vauthors = Kreier F | title = The myriad ways sewage surveillance is helping fight COVID around the world | journal = Nature | date = May 2021 | pmid = 33972790 | doi = 10.1038/d41586-021-01234-1 | s2cid = 234360319 }}</ref><ref>{{cite journal | vauthors = Agrawal S, Orschler L, Lackner S | title = Long-term monitoring of SARS-CoV-2 RNA in wastewater of the Frankfurt metropolitan area in Southern Germany | journal = Scientific Reports | volume = 11 | issue = 1 | article-number = 5372 | date = March 2021 | pmid = 33686189 | pmc = 7940401 | doi = 10.1038/s41598-021-84914-2 | bibcode = 2021NatSR..11.5372A }}</ref><ref>{{cite journal | vauthors = Rooney CM, Moura IB, Wilcox MH | title = Tracking COVID-19 via sewage | journal = Current Opinion in Gastroenterology | volume = 37 | issue = 1 | pages = 4–8 | date = January 2021 | pmid = 33074996 | doi = 10.1097/MOG.0000000000000692 | s2cid = 224811450 }}</ref><ref>{{cite journal | vauthors = Larsen DA, Wigginton KR | title = Tracking COVID-19 with wastewater | journal = Nature Biotechnology | volume = 38 | issue = 10 | pages = 1151–1153 | date = October 2020 | pmid = 32958959 | pmc = 7505213 | doi = 10.1038/s41587-020-0690-1 | bibcode = 2020NatBi..38.1151L }}</ref><ref>{{cite journal | vauthors = Michael-Kordatou I, Karaolia P, Fatta-Kassinos D | title = Sewage analysis as a tool for the COVID-19 pandemic response and management: the urgent need for optimised protocols for SARS-CoV-2 detection and quantification | journal = Journal of Environmental Chemical Engineering | volume = 8 | issue = 5 | article-number = 104306 | date = October 2020 | pmid = 32834990 | pmc = 7384408 | doi = 10.1016/j.jece.2020.104306 | bibcode = 2020JEChE...804306M }}</ref> This may prove particularly useful once large shares of regional populations are vaccinated or recovered and do not need to conduct rapid tests while in some cases being infectious nevertheless.<ref>{{cite web |vauthors=Seeger C |title=Abwasserbasierte EpidemiologieAbwassermonitoring als Frühwarnsystem für Pandemien |url=https://www.bundestag.de/resource/blob/848440/484417db3669d04d1980cadb380de056/Abwasser-Covid-19-data.pdf |access-date=28 July 2021 |archive-date=21 August 2021 |archive-url=https://web.archive.org/web/20210821045041/https://www.bundestag.de/resource/blob/848440/484417db3669d04d1980cadb380de056/Abwasser-Covid-19-data.pdf |url-status=live }}</ref>

      ==Available tests==
      [[File:BGSU COVID-19 Drive-Thru Testing Site Close Up.jpg|thumb|A temporary drive-in testing site for COVID-19 set up with tents in a parking lot]]

      Countries around the world developed tests independently and in partnership with others.

      === Nucleic acid tests ===

      Tests are available that look for viral RNA using either [[polymerase chain reaction]] (PCR) or [[loop-mediated isothermal amplification]] (LAMP) technology.

      Tests developed in China, France, Germany, Hong Kong, Japan, the United Kingdom, and the US targeted different parts of the viral genome. WHO adopted the German system for manufacturing kits sent to low-income countries without the resources to develop their own.{{citation needed|date=June 2021}}

      PowerChek Coronavirus looks for the "E" gene shared by all [[beta coronavirus]]es, and the RdRp gene specific to SARS-CoV-2.<ref>{{cite web |date=27 February 2020 |title=[New Product] COVID-19 Kit |url=http://www.kogene.co.kr/eng/about_us/news/listbody.php?h_gcode=board&h_code=7&po_no=288 |url-status=live |archive-url=https://web.archive.org/web/20200423201008/http://www.kogene.co.kr/eng/about_us/news/listbody.php?h_gcode=board&h_code=7&po_no=288 |archive-date=23 April 2020 |website=kogene.co.kr}}</ref>

      [[File:President Trump Delivers Remarks During a Coronavirus Update Briefing (49720569077).jpg|thumb|US President [[Donald Trump]] displays a COVID-19 testing kit from [[Abbott Laboratories]] in March 2020.]]
      [[File:ID Now testing (51038387158).jpg|thumb|Nucleic acid testing conducted using an Abbott Laboratories ID Now device]]

      [[Abbott Laboratories]]' ID Now nucleic acid test uses [[Variants of PCR#Isothermal amplification methods|isothermal amplification]] technology.<ref name="Letter from FDA">{{cite web |date=27 March 2020 |title=Letter from FDA |url=https://www.fda.gov/media/136522/download |url-status=dead |archive-url=https://web.archive.org/web/20200328213015/https://www.fda.gov/media/136522/download |archive-date=28 March 2020 |access-date=2 April 2020 |publisher=U.S. [[Food and Drug Administration]] (FDA) }}</ref> The assay amplifies a unique region of the virus's [[RNA-dependent RNA polymerase|RdRp]] gene; the resulting copies are then detected with "[[Fluorescent tag|fluorescently-labeled]] [[molecular beacon]]s".<ref name=":3">[https://www.fda.gov/media/136525/download ID NOW COVID-19] {{Webarchive|url=https://web.archive.org/web/20210116131229/https://www.fda.gov/media/136525/download |date=16 January 2021 }}, Instruction for Use, FDA</ref> The test kit uses the company's "toaster-size" ID Now device, which is widely deployed in the US.<ref>{{cite news |date=1 April 2020 |title=The scramble for the rapid coronavirus tests everybody wants |newspaper=[[The Washington Post]] |url=https://www.washingtonpost.com/health/2020/04/01/scramble-rapid-coronavirus-tests-everybody-wants/ |url-status=live |access-date=2 July 2021 |archive-url=https://web.archive.org/web/20210210022633/https://www.washingtonpost.com/health/2020/04/01/scramble-rapid-coronavirus-tests-everybody-wants/ |archive-date=10 February 2021}}</ref> The device can be used in laboratories or in point of care settings, and provides results in 13 minutes or less.<ref name=":3" />

      [[Primerdesign]] offers its Genesig Real-Time PCR test system. [[Roche Diagnostics|Roche Molecular Systems]] offers the Cobas 6800/8800 systems; they are offered among others by the United Nations.{{Citation needed|date=August 2022}}

      ===Antigen tests===
      {{Main|COVID-19 rapid antigen test}}[[File:NegativeCOVID19TestResult.jpg|thumb|Innova SARS-CoV-2 Antigen Rapid Qualitative Lateral Flow Test kit showing a negative result. This device has been subject to accuracy concerns and a recall in the United States.]]Antigen tests are readily available worldwide and have been approved by several health regulators.

      Quidel's "Sofia{{nbsp}}2 SARS Antigen FIA"<ref name="FDA_antigen" /><ref name=":4">{{cite news |date=9 May 2020 |title=FDA issues emergency approval of new antigen test that is cheaper, faster and simpler |newspaper=[[The Washington Post]] |url=https://www.washingtonpost.com/health/2020/05/09/fda-issues-emergency-approval-new-antigen-test-that-is-cheaper-faster-simpler/ |url-status=live |access-date=2 July 2021 |archive-url=https://web.archive.org/web/20210126122107/https://www.washingtonpost.com/health/2020/05/09/fda-issues-emergency-approval-new-antigen-test-that-is-cheaper-faster-simpler/ |archive-date=26 January 2021}}</ref> is a [[lateral flow test]] that uses [[Monoclonal antibody|monoclonal antibodies]] to detect the virus's [[nucleocapsid]] (N) protein.<ref name=":5">[https://www.fda.gov/media/137885/download Sofia 2 SARS Antigen FIA] {{Webarchive|url=https://web.archive.org/web/20210402022945/https://www.fda.gov/media/137885/download |date=2 April 2021 }} Instructions for Use, FDA.gov</ref> The result is read out by the company's Sofia{{nbsp}}2 device using [[immunofluorescence]].<ref name=":5" /> The test is simpler and cheaper but less accurate than nucleic acid tests. It can be deployed in laboratories or at point of care and gives results in 15 minutes.<ref name=":4" /> A false negative result occurs if the sample's antigen level is positive but below the test's detection limit, requiring confirmation with a nucleic acid test.<ref name=":5" />

      The Innova SARS-CoV-2 Antigen Rapid Qualitative Test was never approved for use in the United States, but was being sold by the company anyway. The FDA inspected Innova facilities in California in March and April 2021, and found inadequate quality assurance of tests manufactured in China.<ref name="c_and_e" /> On 23 April 2021, the company issued a recall. The FDA warned consumers to return or destroy the devices because the rate of [[false positive]]s and [[false negative]]s found in clinical trials were higher than the rate claimed by the packaging.<ref>{{cite web |date=10 June 2021 |title=Stop Using Innova Medical Group SARS-CoV-2 Antigen Rapid Qualitative Test: FDA Safety Communication |url=https://www.fda.gov/medical-devices/safety-communications/stop-using-innova-medical-group-sars-cov-2-antigen-rapid-qualitative-test-fda-safety-communication |url-status=dead |publisher= U.S. [[Food and Drug Administration]] (FDA) |archive-url=https://web.archive.org/web/20210702053604/https://www.fda.gov/medical-devices/safety-communications/stop-using-innova-medical-group-sars-cov-2-antigen-rapid-qualitative-test-fda-safety-communication |archive-date=2 July 2021 |access-date=2 July 2021}}</ref> Over 1 billion tests from the company have been distributed in the UK, with £3 billion in funding as part of [[Operation Moonshot]], and the [[Medicines and Healthcare products Regulatory Agency|MHRK]] has authorized exceptional use until at least 28 August 2021.<ref name="c_and_e" /> Concerned experts pointed out that accuracy dropped significantly when screening was conducted by the public instead of by a medical professional, and that the test was not designed to screen asymptomatic people.<ref name="c_and_e">{{cite news | vauthors = Peplow M |date=14 June 2021 |title=COVID-19 test used in UK mass screening program receives stinging rebuke from FDA |url=https://cen.acs.org/analytical-chemistry/diagnostics/COVID-19-test-used-UK-mass-screening-program-receives-stinging-rebuke-from-FDA/99/web/2021/06 |url-status=live |access-date=2 July 2021 |archive-url=https://web.archive.org/web/20210615094139/https://cen.acs.org/analytical-chemistry/diagnostics/COVID-19-test-used-UK-mass-screening-program-receives-stinging-rebuke-from-FDA/99/web/2021/06 |archive-date=15 June 2021}}</ref> A 2020 study found 79% of positive cases were found when used by laboratory scientists, but only 58% when used by the general public and 40% when used for city-wide screening in [[Liverpool]].<ref>{{cite journal | vauthors = Mina MJ, Peto TE, García-Fiñana M, Semple MG, Buchan IE | title = Clarifying the evidence on SARS-CoV-2 antigen rapid tests in public health responses to COVID-19 | journal = Lancet | volume = 397 | issue = 10283 | pages = 1425–1427 | date = April 2021 | pmid = 33609444 | pmc = 8049601 | doi = 10.1016/S0140-6736(21)00425-6 }}</ref>

      ===Serology (antibody) tests===
      Antibodies are usually detectable 14 days after the onset of the infection. Multiple jurisdictions survey their populations using these tests.<ref>{{cite web |title=NIH Begins Study to Quantify Undetected Cases of Coronavirus Infection | publisher=NIH: National Institute of Allergy and Infectious Diseases |url=https://www.niaid.nih.gov/news-events/nih-begins-study-quantify-undetected-cases-coronavirus-infection |url-status=dead |archive-url=https://web.archive.org/web/20200410204437/https://www.niaid.nih.gov/news-events/nih-begins-study-quantify-undetected-cases-coronavirus-infection |archive-date=10 April 2020 |access-date=11 April 2020 |website=niaid.nih.gov|date=10 April 2020 }}</ref><ref name="NYT_antibody" />

      Private US labs including [[Quest Diagnostics]] and LabCorp offer antibody testing upon request.<ref>{{cite press release |date=28 April 2020 |title=Quest Diagnostics Launches Consumer-Initiated COVID-19 Antibody Test Through QuestDirect |url=https://newsroom.questdiagnostics.com/2020-04-28-Quest-Diagnostics-Launches-Consumer-Initiated-COVID-19-Antibody-Test-Through-QuestDirect-TM |url-status=live |archive-url=https://web.archive.org/web/20210517001033/https://newsroom.questdiagnostics.com/2020-04-28-Quest-Diagnostics-Launches-Consumer-Initiated-COVID-19-Antibody-Test-Through-QuestDirect-TM |archive-date=17 May 2021 |access-date=2 July 2021 |publisher=Quest Diagnosics}}</ref>

      Certain antibody tests are available in several European countries and also in the US.<ref>Fellmann F. (March 2020). (in German) [https://www.tagesanzeiger.ch/jetzt-beginnt-die-suche-nach-den-genesenen-805626443803 "Jetzt beginnt die Suche nach den Genesenen"] {{Webarchive|url=https://web.archive.org/web/20200328192222/https://www.tagesanzeiger.ch/jetzt-beginnt-die-suche-nach-den-genesenen-805626443803 |date=28 March 2020 }}. ''Tages Anzeiger''. Retrieved 28 March 2020.</ref><ref>{{cite news |vauthors=Herrera T |date=27 October 2020 |title=What You Need to Know About the Covid-19 Antibody Test |work=[[The New York Times]] |url=https://www.nytimes.com/article/antibody-test-coronavirus.html |access-date=18 July 2021 |archive-date=1 July 2021 |archive-url=https://web.archive.org/web/20210701155707/https://www.nytimes.com/article/antibody-test-coronavirus.html |url-status=live }}</ref>

      Roche offers a selective [[ELISA]] serology test.<ref>{{cite web |date=7 May 2020 |title=EUA Authorized Serology Test Performance |url=https://www.fda.gov/medical-devices/emergency-situations-medical-devices/eua-authorized-serology-test-performance |url-status=dead |archive-url=https://web.archive.org/web/20200508182656/https://www.fda.gov/medical-devices/emergency-situations-medical-devices/eua-authorized-serology-test-performance |archive-date=8 May 2020 |access-date=8 May 2020 |website=U.S. [[Food and Drug Administration]] (FDA)}}</ref>

      A summary review has noted that while some "serological tests ... might be cheaper and easier to implement at the point of care [than RT-PCR]", and such testing can identify previously infected individuals, "caution is warranted ... using serological tests for ... epidemiological surveillance". The review called for higher quality studies assessing accuracy with reference to a standard of "RT-PCR performed on at least two consecutive specimens, and, when feasible, includ[ing] viral cultures."<ref name="BMJ1">{{cite journal | vauthors = Lisboa Bastos M, Tavaziva G, Abidi SK, Campbell JR, Haraoui LP, Johnston JC, Lan Z, Law S, MacLean E, Trajman A, Menzies D, Benedetti A, Ahmad Khan F | title = Diagnostic accuracy of serological tests for covid-19: systematic review and meta-analysis | journal = BMJ | volume = 370 | article-number = m2516 | date = July 2020 | pmid = 32611558 | pmc = 7327913 | doi = 10.1136/bmj.m2516 }}</ref><ref name="CEMBreBMJ1">{{cite web | vauthors = Spencer E, Henighan C |date=1 September 2020 |title=Overview of BMJ: Diagnostic accuracy of serological tests for covid-19: systematic review and meta-analysis |url=https://www.cebm.net/study/diagnostic-accuracy-of-serological-tests-for-covid-19-systematic-review-and-meta-analysis/ |url-status=live |archive-url= https://web.archive.org/web/20201003225714/https://www.cebm.net/study/diagnostic-accuracy-of-serological-tests-for-covid-19-systematic-review-and-meta-analysis/ |archive-date=3 October 2020 |access-date=24 September 2020 |website=CEBM}}</ref> CEBM researchers have called for in-hospital 'case definition' to record "CT lung findings and associated blood tests"<ref name = "Spencer_2020">{{cite web | vauthors = Spencer E, Jefferson T, Brassey J, Heneghan C |date=11 September 2020 |title=When is Covid, Covid? |url=https://www.cebm.net/covid-19/when-is-covid-covid |url-status=live |archive-url=https://web.archive.org/web/20200919123850/https://www.cebm.net/covid-19/when-is-covid-covid/ |archive-date=19 September 2020 |access-date=19 September 2020 |website=CEBM}}</ref> and for the WHO to produce a "protocol to standardise the use and interpretation of PCR" with continuous re-calibration.<ref>{{Cite journal |vauthors=Jefferson T, Spencer E, Brassey J, Heneghan C |title=Viral Cultures for Coronavirus Disease 2019 Infectivity Assessment: A Systematic Review |journal=Clinical Infectious Diseases |date=2021 |volume=73 |issue=11 |pages=e3884–e3899 |doi=10.1093/cid/ciaa1764 |pmid=33270107 |pmc=7799320 |medrxiv=10.1101/2020.08.04.20167932}}</ref>

