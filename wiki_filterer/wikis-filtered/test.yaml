    extract: Standardized testing in educational settings is used to measure student achievement and instructional effectiveness, as well as to make decisions.  Although everyday classroom tests, if everyone is asked the same questions and their answers are graded the same way, are standardized tests, this is generally discussed in terms of externally created tests that are given at the end of a school year or at the end of high school. In some countries, passing a national exam is necessary to get a high school diploma or to be admitted to a university.
