      === Stripped Olympic medals ===
      {{See also|List of stripped Olympic medals}}

      Due to doping violations, Russia had been stripped of 43 Olympic medals in 2019 – the most of any country, nearly four times the number of the runner-up, and almost a third of the global total.<ref>{{cite web |last1=Keh |first1=Andrew |last2=Panja |first2=Tariq |url=https://www.nytimes.com/2019/12/08/sports/olympics/Wada-Russing-doping.html |title=Will Russia Be Thrown Out of the Olympics on Monday? A Primer |work=[[The New York Times]] |date=8 December 2019 |access-date=9 January 2022 |quote=To give some perspective, Russia has had 43 Olympic medals retroactively stripped for doping violations, which represents more than a third of the global total.}}</ref> It was the leading country in terms of the number of medals removed due to doping at the [[2002 Winter Olympics]] (5 medals), the [[2006 Winter Olympics]] (1 medal), the [[2008 Summer Olympics]] (14 medals), the [[2010 Winter Olympics]] (1 medal), the [[2012 Summer Olympics]] (15 medals), [[2014 Winter Olympics]] (4 medals) and the joint most at the [[2004 Summer Olympics]] (3 medals) and the [[2016 Summer Olympics]] (1 medal). The 43 revoked medals include 12 Golds, 20 Silvers, and 11 Bronzes. This does not include other medals stripped from Russian associated Olympic teams. By 2021, the total number of stripped medals increased to 51.<ref>{{cite web |last1=Jones |first1=Chloe |url=https://www.pbs.org/newshour/nation/why-cant-olympians-smoke-weed |title=Why can't Olympians smoke weed? |website=[[PBS NewsHour]] |date=9 July 2021 |access-date=5 August 2024 |quote=Russian athletes have been top Olympic medal winners for decades, but in 2016, whistleblower Grigory Rodchenkov exposed a state-run doping program. The country was stripped of 51 medals — the most from any country — and is banned from using its name, anthem and flag in the Olympics until 2022 because of the scandal.}}</ref>

