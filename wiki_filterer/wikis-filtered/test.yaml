      === Elementary school ===
      {{Main|Elementary schools in Japan}}

      ===Secondary school===
      {{main|Secondary education in Japan}}

      ====Lower secondary school====
      [[File:Classroom2.jpg|thumb|A typical classroom in a Japanese junior high school]]

      The lower secondary school covers grades seven through nine, with children typically aged twelve through fifteen. There are 3.2 million primary school students in [[Japan]] as of 2023, down from over 5.3 million in 1991.<ref name="Statistics">{{cite web |title=Education Statistics |url=https://www.mext.go.jp/b_menu/toukei/chousa01/kihon/1267995.htm |website=Ministry of Education, Culture, Sports, Science, and Technology |access-date=22 June 2024 |archive-date=11 May 2024 |archive-url=https://web.archive.org/web/20240511020615/https://www.mext.go.jp/b_menu/toukei/chousa01/kihon/1267995.htm |url-status=dead }}</ref> However, the number of junior high schools has remained relatively static, falling from 11,275 in 1993 to 9,944 in 2023.<ref name="Statistics" /> The number of junior high school teachers has also changed little, with 257,605 junior high school teachers in 1996, and 247,485 in 2023. Approximately 8% of junior high students attend private junior high schools (accounting for 7% of all junior high schools by number). Private schools are considerably more expensive: as of 2013, the average annual cost of private primary school attendance was ¥1,295,156 per student, roughly thrice the ¥450,340 cost for a public school.<ref name="統計表一覧 政府統計の総合窓口 GL08020103">{{cite web|url=http://www.e-stat.go.jp/SG1/estat/List.do?bid=000001051862&cycode=0|title=統計表一覧 政府統計の総合窓口 GL08020103|publisher=Ministry of Education, Culture, Sports, Science, and Technology }}</ref> Japan's compulsory education ends at grade nine, but less than 2% drop out; 60% of students advanced to senior education as of 1960, increasing rapidly to over 90% by 1980, rising further each year until reaching 98.3% as of 2012.<ref name="Education Statistics">{{cite web|url=http://www.mext.go.jp/english/statistics/index.htm|title=MEXT : Statistics|publisher=Ministry of Education, Culture, Sports, Science and Technology|ref=Statistics|url-status=dead|archive-url=https://web.archive.org/web/20150402132525/http://www.mext.go.jp/english/statistics/index.htm|archive-date=2 April 2015}}</ref>

      Instruction in primary schools is often in the form of lectures. Teachers also use other media, such as television and radio, and there is some laboratory work. By 1989 about 45% of all public primary schools had computers, including schools that used them only for administrative purposes. All course contents are specified in the Course of Study for Lower-Secondary Schools. Some subjects, such as Japanese language and mathematics, are coordinated with the elementary curriculum. Others, such as foreign-language study, begin at this level, though from April 2011, English became a compulsory part of the elementary school curriculum.<ref>{{cite web|last=Tang |first=Warren M |url=https://wmtang.org/2008/04/05/primary-schools-to-teach-285-english-words-in-2011/ |title=Japanese primary schools to teach 285 English words in 2011 – Warren M Tang |publisher=Wmtang.org |date=5 April 2008 |access-date=27 July 2019}}</ref> The junior school curriculum covers Japanese language, social studies, mathematics, science, music, fine arts, health, and physical education. All students are also exposed to industrial arts and homemaking. Moral education and special activities continue to receive attention.<ref>{{cite web | url=https://worldpopulationreview.com/country-rankings/oldest-countries | title=Oldest Countries 2022 }}</ref>

      The ministry recognizes a need to improve the teaching of all foreign languages, especially English. To improve instruction in spoken English, the government invites many young native speakers of English to Japan to serve as assistants to school boards and prefectures under its [[JET Programme|Japan Exchange and Teaching Programme]] (JET). Beginning with 848 participants in 1987, the program grew to a high of 6,273 participants in 2002.<ref>[http://www.mofa.go.jp/j_info/visit/jet/participants.pdf] {{webarchive|url=https://web.archive.org/web/20070226053847/http://www.mofa.go.jp/j_info/visit/jet/participants.pdf|date=26 February 2007}}</ref>  Today, the program is again growing due to English becoming a compulsory part of the elementary school curriculum in 2011.<ref name="Times get tough for teachers">{{cite web|url=http://search.japantimes.co.jp/cgi-bin/fl20060328zg.html |title=Times get tough for teachers |work=[[The Japan Times|The Japan Times Online]] |date=28 March 2006 |access-date=19 January 2013}}</ref> As of July 2023, 5,831 language teachers are hired through the JET programme, most of them coming from the United States, the United Kingdom, Canada and Australia.<ref>{{Cite web |title=JETパンフレット |url=https://jetprogramme.org/ja/nin-pamphlet/ |access-date=2024-06-22 |website=JETプログラム |language=ja}}</ref> The total number of foreign nationals hired as language teachers is 20,249 as of 2021.<ref>{{Cite web |date=2023-03-05 |title=英語で理科・スピーチも指導 鳥取県、ALT配置全国2位 データで読む地域再生 まとめ読み |url=https://www.nikkei.com/article/DGXZQOCC032OH0T00C23A3000000/ |access-date=2024-06-22 |website=日本経済新聞 |language=ja}}</ref>

      ====Upper secondary school====
      [[File:Japanese high school classroom.jpg|thumb|A typical Japanese high school classroom]]
      Though [[upper secondary school|upper-secondary school]] is not compulsory in Japan, 98.8% of all junior high school graduates enrolled as of 2020.<ref name=":4">[[Ministry of Education, Culture, Sports, Science and Technology|MEXT.]] "[https://www.mext.go.jp/a_menu/shotou/kaikaku/20210315-mxt_kouhou02-1.pdf Overview of Upper Secondary Education]". ''MEXT'' (in Japanese). Retrieved 22 June 2024.</ref> Upper secondary consists of three years.<ref>{{cite web |url=http://www.mext.go.jp/english/statist/index.htm |title=Statistical Abstract 2006 edition |access-date=4 June 2008 |url-status=dead |archive-url=https://web.archive.org/web/20080617061845/http://www.mext.go.jp/english/statist/index.htm |archive-date=17 June 2008 }}</ref> Private upper-secondary schools account for about 55% of all upper-secondary schools. Beginning in 2010, public high schools do not collect tuition fees any more,<ref>{{Cite web |date=2010-03-31 |title=Act of High School Tuition Fees Abolition Enacts on 1 April |url=https://www.nikkei.com/article/DGXNASDG3103G_R30C10A3CC1000/ |access-date=2024-06-22 |website=[[The Nikkei]] |language=ja}}</ref> while private and national high schools are free in certain prefectures including [[Tokyo]].<ref>{{Cite web |last=[[NHK]] |title=All high schools will be free from 2024 |url=https://www.nhk.or.jp/shutoken/article/019/69/ |access-date=2024-06-22 |website=NHK首都圏ナビ |language=ja}}</ref>

      The most common type of upper-secondary school has a full-time, general program that offers academic courses for students preparing for higher education as well as technical and vocational courses for students expecting to find employment after graduation. A small number of schools offer part-time programs, evening courses, or correspondence education.<ref name=":4" />

      The first-year programs for students in both academic and commercial courses are similar. They include basic academic courses, such as [[Japanese language|Japanese]], English, [[mathematics]], and [[science]]. In upper-secondary school, differences in ability are first publicly acknowledged, and course content and course selection are far more individualized in the second year. However, there is a core of academic material throughout all programs.<ref>[[Ministry of Education, Culture, Sports, Science and Technology|MEXT.]] "[https://www.mext.go.jp/b_menu/shingi/chukyo/chukyo3/053/siryo/__icsFiles/afieldfile/2015/08/06/1360750_2-3.pdf Current Upper Secondary Curriculum]". ''MEXT'' (in Japanese). Retrieved 22 June 2024.</ref>

      Training of disabled students, particularly at the upper-secondary level, emphasizes vocational education to enable students to be as independent as possible within society. Vocational training varies considerably depending on the student's disability, but the options are limited for some. The government is aware of the necessity of broadening the range of possibilities for these students. Advancement to higher education is also a goal of the government, and it struggles to have institutions of higher learning accept more students with disabilities.

      ===Higher and tertiary education===
      {{main|Higher education in Japan|Tertiary education#In Japan}}

      Higher and tertiary education in Japan is provided in universities (daigaku), junior colleges (tanki daigaku), colleges of technology (koto senmon gakko), and special training colleges (senmon gakko). Of these four types of institutions, only universities and junior colleges are strictly considered as higher education.

      As of 2017, more than 2.89 million students were enrolled in 780 universities.<ref name=":3">{{cite web|url=http://www.mext.go.jp/en/about/pablication/__icsFiles/afieldfile/2019/03/13/1374478_001.pdf|title=Overview of the Ministry of Education, Culture, Sports, Science and Technology |publisher=[[Ministry of Education, Culture, Sports, Science and Technology (Japan)|MEXT]] |access-date=7 September 2019 | pages=29}}</ref> At the top of the higher education structure, these institutions provide a four-year training leading to a [[bachelor's degree]], and some offer six-year programs leading to a professional degree. There are two types of public four-year universities: the 86 [[List of national universities in Japan|national universities]] (including the [[Open University of Japan]]) and the 95 local [[public university|public universities]], founded by [[Prefectures of Japan|prefectures]] and [[Municipalities of Japan|municipalities]]. The 597 remaining four-year colleges in 2010 were private. With a wealth of opportunities for students wishing to pursue tertiary education, the nation's prestigious schools are the most appealing for students seeking top employment prospects.<ref name="Clark, Nick">{{cite web | url=http://wenr.wes.org/2005/05/wenr-mayjune-2005-education-in-japan | title=Education in Japan | date=1 May 2005 | access-date=28 October 2016 | author=Clark, Nick}}</ref> The [[University of Tokyo]] and [[Kyoto University]], the nation's oldest universities, are the most prestigious and selective. In terms of international recognition, there are 49 Japanese universities listed on the [[THES - QS World University Rankings|'' QS World University Rankings 2025'']], with the [[University of Tokyo]] ranked 32nd and [[Kyoto University]] 50th.<ref>{{cite web |title=QS World University Rankings - 2025 |url=https://www.topuniversities.com/world-university-rankings?countries=jp |access-date=6 July 2024 |publisher=[[QS World University Rankings|QS Quacquarelli Symonds Limited]]}}</ref>

      Most university and college students attend full-time day programs. In 1990 the most popular courses, enrolling almost 40 percent of all undergraduate students, were in the [[social sciences]], including [[business]], [[law]], and [[accounting]]. Other popular fields were [[engineering]] (19 percent), the [[humanities]] (15 percent), and [[education]] (7 percent).

      The average costs (tuition, fees, and living expenses) for a year of higher education in 1986 were ¥1.4 million. Some students work part-time or take out loans through the government-supported Japan Scholarship Association, local governments, non-profit corporations, and other institutions.

      == School subjects at the secondary level ==
      The following is the set of compulsory subjects currently taught in the Japanese education system from the primary to secondary levels:

      * [[Japanese language|Japanese]] (the national language) 
      * [[Arithmetic]], [[mathematics]], etc.
      * [[Science]], [[technology]], etc.
      * Foreign languages: [[English language|English]] (rarely: [[Korean language|Korean]], [[Spanish language|Spanish]], [[Arabic language|Arabic]], [[French language|French]], [[German language|German]], or [[Chinese language|Chinese]])
      * [[Social studies]] ([[history]], [[geography]], and [[civics]]).
      * [[Physical education]] ([[health]], [[sports]], etc.)
      * [[Moral education]] (usually taught at the primary school level).
      * [[Informatics]], [[information technology]], etc.
      * [[Home economics]], etc.

      In Japanese elementary, junior, and senior secondary schools, textbooks that have passed the certification process from the Ministry of Education (MEXT) must be used.<ref>Act No. 26 of 1947: School Education Act, Articles 34, 49, 62, 70.</ref>

