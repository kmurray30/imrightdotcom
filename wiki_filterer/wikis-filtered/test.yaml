      ==Transition to later phases==
      {{See also|Endemic phase of COVID-19}}
      On February 17, 2022, Governor Gavin Newsom announced a formal shift toward [[endemic (epidemiology)|endemic]] management of COVID-19 in California, saying "we are moving past the crisis phase into a phase where we will work to live with this virus".<ref>{{cite web|author=The Associated Press |url=https://www.npr.org/2022/02/18/1081655623/california-adopts-nations-first-endemic-virus-policy |title=California adopts nation's first endemic virus policy |publisher=[[NPR]]|date=February 18, 2022 |accessdate=June 8, 2022}}</ref>

      During his [[2022 State of the Union Address|State of the Union Address]] on March 1, Biden stated that "because of the progress we've made, because of your resilience and the tools we have, tonight I can say we are moving forward safely, back to more normal routines". However, he also stated that the federal government would "never just accept living with COVID-19", explaining that it would "continue to combat the virus as we do other diseases". The White House released a new action plan the next day, which included plans to make COVID-19 antiviral medication available for free to high-risk patients at testing locations such as pharmacies and clinics, funding in support of vigilance and preparedness in the event of new surges and variants, preventing the closure of schools and businesses, and ensuring global vaccine distribution.<ref>{{cite web|title=Biden says Americans can 'remove their masks,' resume pre-Covid work, life routines |url=https://www.nbcnews.com/politics/white-house/biden-calls-americans-begin-resuming-pre-covid-work-life-routines-n1290526 |access-date=March 2, 2022 |website=[[NBC News]] |date=March 2, 2022 }}</ref><ref>{{cite news|last=Keith |first=Tamara |date=March 2, 2022 |title=The White House has a new plan for COVID-19 aimed at getting things back to normal |publisher=[[NPR]]|url=https://www.npr.org/2022/03/02/1083905865/the-white-house-has-a-new-plan-for-covid-19-aimed-at-getting-things-back-to-norm |access-date=March 2, 2022}}</ref>

      On April 26, Fauci said that the United States was "out of the pandemic phase"<ref>{{cite web| url=https://www.pbs.org/newshour/show/dr-fauci-on-why-the-u-s-is-out-of-the-pandemic-phase-2 | title=Dr. Fauci on why the U.S. Is 'out of the pandemic phase' | website=[[PBS NewsHour]] | date=April 26, 2022 }}</ref> and the following day, stated that "we're really in a transitional phase...into hopefully a more controlled phase and endemicity", but further clarified that "the world is still in a pandemic...we are still experiencing a pandemic" and the United States could still see new waves of infection. Fauci's comments followed a report from the CDC indicating that the United States had a much higher level of collective immunity at this time, due to the Omicron variant.<ref>{{cite news|last=Achenbach |first=Joel |url=https://www.washingtonpost.com/health/2022/04/27/pandemic-phase-over-fauci-covid/ |title=Fauci says U.S. is out of coronavirus 'pandemic phase' |newspaper=[[The Washington Post]] |date=April 27, 2022 |access-date=May 21, 2022}}</ref>

      On May 16, Joseph Wendelken, a spokesman for the [[Rhode Island Department of Health]] stated that COVID-19 was now "an endemic disease" and said "we should expect moderate increases and decreases in our COVID-19 levels over the coming months".<ref>{{cite web| url=https://www.bostonglobe.com/2022/05/16/metro/covid-19-is-back-rhode-island-central-falls-health-strategist-warns/ | title='COVID-19 is back in Rhode Island,' Central Falls health strategist warns | website=[[The Boston Globe]] }}</ref> In an interview with ''[[60 Minutes]]'' aired on September 18, Biden declared that the pandemic stage of COVID-19 was over in the United States.<ref name="over">{{cite web|url=https://www.cbsnews.com/news/president-joe-biden-60-minutes-interview-transcript-2022-09-18/ |title=President Joe Biden: The 2022 60 Minutes Interview |last=Pelley |first=Scott |date=September 18, 2022 |accessdate=September 19, 2022 |publisher=[[CBS News]]}}</ref>

      ==Preparations made after previous outbreaks==
      {{Further|Pandemic predictions and preparations prior to the COVID-19 pandemic#United States}}
      The United States has experienced pandemics and epidemics throughout its history, including the 1918 [[Spanish flu]], the 1957 [[Asian flu]], and the 1968 [[Hong Kong flu]] pandemics.<ref name="abc7">{{cite news|last1=Miguel |first1=Ken |title=Here's a look at some of history's worst pandemics that have killed millions |url=https://abc7news.com/5974174/ |access-date=March 22, 2020 |publisher=[[KGO-TV]] |date=February 28, 2020}}</ref><ref>{{cite news|last1=Lileks |first1=James |title=How the news media played down the pandemics of yore, from Spanish flu to Swine flu |url=http://www.startribune.com/how-the-news-media-played-down-the-pandemics-of-yore-from-spanish-flu-to-swine-flu/568899732/?refresh=true |access-date=March 22, 2020 |work=[[Star Tribune]] |date=March 18, 2020}}</ref><ref>{{cite news|last=Brown |first=Jeremy |title=The Coronavirus Is No 1918 Pandemic |url=https://www.theatlantic.com/ideas/archive/2020/03/were-not-facing-second-spanish-flu/607354/ |access-date=March 22, 2020 |work=[[The Atlantic]] |date=March 3, 2020}}</ref> In the most recent pandemic prior to COVID-19, the [[2009 swine flu pandemic]] took the lives of more than 12,000 Americans and hospitalized another 270,000 over the course of approximately a year.<ref name="abc7"/>

      According to the [[Global Health Security Index]], an American-British assessment which ranks the health security capabilities in 195 countries, the U.S. was the "most prepared" nation in 2020.<ref>{{cite web|url=https://www.weforum.org/agenda/2020/02/these-are-the-countries-best-prepared-for-health-emergencies/ |title=These are the countries best prepared for health emergencies |publisher=[[World Economic Forum]] |date=February 12, 2020 }}</ref><ref name=cfr>{{cite web|url=https://www.cfr.org/in-brief/what-global-health-survey-found-months-coronavirus-pandemic |title=What a Global Health Survey Found Months Before the Coronavirus Pandemic |publisher=[[Council on Foreign Relations]] |date=March 24, 2020 |first1=Lindsay |last1=Maizland |first2=Thamine |last2=Nayeem |first3=Anu |last3=Kumar}}</ref>
      In September 2019, the Trump administration terminated [[United States Agency for International Development]]'s [[PREDICT (USAID)|PREDICT]] program, a $200&nbsp;million [[epidemiological]] research program initiated in 2009 to provide early warning of pandemics abroad.<ref>{{cite web|first=Zachary|last=Cohen|date=April 10, 2020|access-date=July 10, 2020|title=Trump administration shuttered pandemic monitoring program, then scrambled to extend it|url=https://cnn.com/2020/04/10/politics/trump-usaid-prevent-program-coronavirus/|work=[[CNN]]}}</ref><ref>{{cite web|last=McNeil|first=Donald G. Jr.|author-link=Donald McNeil Jr.|url=https://www.nytimes.com/2019/10/25/health/predict-usaid-viruses.html|title=Scientists Were Hunting for the Next Ebola. Now the U.S. Has Cut Off Their Funding.|date=October 25, 2019|access-date=July 11, 2020|work=[[The New York Times]]}}</ref> The program trained scientists in sixty foreign laboratories to detect and respond to viruses that have the potential to cause pandemics. One such laboratory was the Wuhan lab that first identified the virus that causes COVID-19. After revival in April 2020, the program was given two 6-month extensions to help fight COVID-19 in the U.S. and other countries.<ref name="LATimes_PREDICT">{{cite web|last1=Baumgaertner|first1=Emily|last2=Rainey|first2=James|date=April 2, 2020|title=Trump administration ended pandemic early-warning program to detect coronaviruses|work=[[Los Angeles Times]]|url=https://www.latimes.com/science/story/2020-04-02/coronavirus-trump-pandemic-program-viruses-detection|access-date=May 30, 2020}}</ref><ref>{{cite web|title=U.S. Will Revive Global Virus-Hunting Effort Ended Last Year|url=https://www.nytimes.com/2020/08/30/health/predict-pandemic-usaid.html|last1=McNeil|first1=Donald G. Jr.|author-link1=Donald McNeil Jr.|last2=Kaplan|first2=Thomas|work=[[The New York Times]]|date=August 30, 2020|access-date=October 21, 2020}}</ref>

