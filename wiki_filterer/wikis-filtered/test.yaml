      === Notifications ===
      Regular decision applicants are notified usually in the last two weeks of March, and early decision or early action applicants are notified near the end of December (but early decision II notifications tend to be in February). The notification of the school's decision is either an admit, deny (reject), waitlist, or defer. Notifications as an online status update on an individual college’s application portal are becoming more common, although a few schools still send notifications by email or regular mail (in which case a "fat" envelope is usually an acceptance whereas a "thin" envelope is usually a rejection or waitlist).

      Letters of admission typically require the admitted student to maintain good grades and good conduct before matriculation. Teachers and college counselors of seniors advise students against "[[senioritis]]". Schools do rescind admission if students have been dishonest in their application,<ref>{{Cite news|url=https://www.washingtonpost.com/education/2019/05/15/georgetown-moves-expel-two-students-aftermath-admission-scandal/|title=Georgetown moves to expel two students in aftermath of admissions scandal |newspaper=[[The Washington Post]] |access-date=Sep 21, 2019}}</ref><ref>{{Cite web|url=https://edition.cnn.com/2019/03/25/us/yale-rescinds-student-admissions-scandal/index.html|title=Yale rescinds admission of a student whose family paid $1.2 million to get her in|date=March 25, 2019 |access-date=Sep 21, 2019}}</ref><ref>{{Cite web|url=https://www.stanforddaily.com/2019/04/07/stanford-expels-student-admitted-with-falsified-sailing-credentials/|title=Stanford expels student admitted with falsified sailing credentials|website=www.stanforddaily.com|date=April 7, 2019|access-date=Sep 21, 2019}}</ref> have conducted themselves in a way deemed to be inconsistent with the values of the school,<ref>{{Cite web|url=https://edition.cnn.com/2019/06/18/us/harvard-rescind-admission/index.html|title=Harvard rescinded admission for racist comments. It wasn't the first time|website=www.cnn.com|date=June 18, 2019 |access-date=Sep 21, 2019}}</ref><ref>{{Cite web|url=https://www.thecrimson.com/article/2017/6/5/2021-offers-rescinded-memes/|title=Harvard Rescinds Acceptances for At Least Ten Students for Obscene Memes|access-date=Sep 21, 2019}}</ref> or do not heed warnings of poor academic performance; for example, one hundred high school applicants accepted to [[Texas Christian University]], whose grades plummeted in the spring of their twelfth grade as a symptom of senioritis, received so-called "fear of God" letters from an admissions dean asking them to explain themselves and threatening to rescind offers of admission.<ref name="tws2V115">{{cite news|url=http://thechoice.blogs.nytimes.com/2012/06/18/university-sends-fear-of-god-letter-to-students-with-senioritis/|title=University Sends 'Fear of God' Letter to Students With Senioritis|author=Tanya Caldwell|date=June 18, 2012|work=The New York Times|access-date=June 22, 2012|quote=College-bound seniors beware:&nbsp;... failing grades&nbsp;... your university may soon threaten to rescind your admission}}</ref>

      Admitted students may also be awarded financial aid and notification of this is made around the same time. Students who are dissatisfied with an aid offer can appeal for the offer to be improved.<ref name="twsMay2Q848" /><ref name="tws3L111" />

      International students who have been accepted will need to complete the necessary paperwork for visas (such as an [[I-20 (form)|I-20]] form).<ref name="twsMayO214">{{cite news
       |author= Tanya Caldwell
       |title= For International Students, a College Admissions Checklist for April
       |newspaper= The New York Times
       |date= April 6, 2012
       |url= http://thechoice.blogs.nytimes.com/2012/04/06/for-international-students-a-college-admissions-checklist-for-april/
       |access-date= May 15, 2012
      }}</ref>

      Rejection letters from most schools will mention that there is no appeal process but many schools, especially public universities such as the [[University of California]], have a formal appeal process requiring "new and compelling" information from the appellant.<ref>{{Cite web|url=https://www.mercurynews.com/2014/03/24/on-college-think-hard-and-rationally-before-appealing-a-uc-schools-denial-of-admission/|title=On College: Think hard and rationally before appealing a UC school's denial of admission|date=March 24, 2014|access-date=Sep 21, 2019}}</ref><ref>{{Cite web|url=https://admissions.wvu.edu/forms-and-procedures/admissions-decision-appeal|title=Admissions Decision Appeal|website=admissions.wvu.edu|access-date=Sep 21, 2019}}</ref>

      ===Wait list considerations===
      About half of schools use a wait list, particularly those that accept fewer than half of all applications.<ref name="tws2P315" /><ref name=twsMayO211/><ref name=tws3JanN113/><ref>Note: figure for Fall 2010 admission cycle was 48% of colleges using wait lists.</ref> Schools use the wait list as an enrollment management tool because they are uncertain how many of their original admits will enroll,<ref name="twsL25" /><ref name="twsL31">{{cite news|url=https://www.nytimes.com/2010/04/14/education/14waitlist.html?ref=admissions|title=For Students, a Waiting List Is Scant Hope|author=Jacques Steinberg|date=April 13, 2010|newspaper=The New York Times|access-date=December 12, 2011}}</ref> but the exact implementation varies widely among colleges. Some schools put a large number onto the wait list (relative to the class enrollment size) even though this puts many wait-listed students in "limbo" and gives most of them only false hope,<ref name=twsZe21>{{cite news
       |author= Lynn O'Shaughnessy
       |title= Getting Off a College Wait List: 5 Things to Do Now
       |work= CBS News
       |date= April 9, 2010
       |url= https://www.cbsnews.com/news/getting-off-a-college-wait-list-5-things-to-do-now/
       |access-date= December 31, 2011
      }}</ref> the "basic equivalent of purgatory".<ref name=twsZe19>{{cite magazine
       |author= Zach Miners
       |title= You've Been Put on the Wait List for College. Now What?
       |magazine= U.S. News & World Report
       |date= April 9, 2010
       |url= https://www.usnews.com/education/best-colleges/right-school/timeline/articles/2010/04/09/youve-been-put-on-the-wait-list-for-college-now-what
       |access-date= December 31, 2011
      }}</ref> With a class size of only around 2,500, [[University of Pennsylvania|Penn]] put 3,535 applicants on its wait list for the Class of 2022 (of whom 2,327 remained on the wait list) but accepted only 9.<ref>{{Cite web|url=http://www.upenn.edu/ir/Common%20Data%20Set/UPenn%20Common%20Data%20Set%202018-19.pdf?pdf=CDS%202018-19|title=University of Pennsylvania Common Data Set 2018-19|access-date=Sep 21, 2019}}</ref> In the same year, [[Tulane University|Tulane]] put over 10,000 applicants on its wait list but admitted only 2.<ref>{{Cite web|url=https://tulane.app.box.com/s/zwm37ymscy77bx5oh0elusqfcsnl66sz|title=Tulane Common Data Set 2018-19|access-date=Sep 21, 2019}}</ref> By contrast, the [[University of Oregon]] with a class size of 4,000 offered wait list status to only 264 and admitted 69 of them.<ref>{{Cite web|url=https://ir.uoregon.edu/sites/ir1.uoregon.edu/files/CDS_2018-2019.pdf|title=University of Oregon Common Data Set 2018-19|access-date=Sep 21, 2019}}</ref> However, many schools do lose a small number of admitted students due to a phenomenon sometimes called ''[[summer melt]]'':<ref name=twsL17>{{cite web
       |author= Scott Jaschik
       |title= The Other 'Summer Melt' in Admissions
       |website= Inside Higher Ed
       |date= April 4, 2011
       |url= http://www.insidehighered.com/news/2011/04/04/new_research_points_to_a_summer_melt_issue_for_low_income_students
       |access-date= December 12, 2011
      }}</ref><ref name="twsL15">{{cite news|url=https://www.usatoday.com/news/education/2011-05-05-college-admissions-summer_n.htm|title=Private colleges try to round out fall's enrollment into summer|author1=Scott Jaschik|date=May 5, 2011|newspaper=USA Today|access-date=December 12, 2011|author2=Kevin Kiley}}</ref> students, even those have sent in a deposit, will not show up in the fall, and this "melt percentage" can be as high as 5% to 10% of persons who have paid a deposit.

      {{Blockquote|The admission process is a complicated dance of supply and demand for colleges. And this spring, many institutions have accepted fewer applicants, and placed more on waiting lists, until it becomes clear over the next few weeks how many spots remain.|Jacques Steinberg in ''The New York Times'', April 2010<ref name=twsL31/>}}

