Brain tumor:
  Cause:
    - link: https://www.medicinenet.com/brain_cancer/article.htm#do_cell_phones_cause_brain_cancer
      blurb: Other risk factors such as smoking, radiation exposure, and viral infection (HIV) have been suggested but not proven to cause brain cancer.
      sentence: |-
        At this dose, approximately 6391 people would have to be exposed to cause 1 case of brain cancer.[REF] Inherited conditions, such as Von Hippel–Lindau disease, tuberous sclerosis, multiple endocrine neoplasia, and neurofibromatosis type 2 carry a high risk for the development of brain tumors.[REF][REF] People with celiac disease have a slightly increased risk of developing brain tumors.[REF] Smoking may increase the risk, but evidence of this remains unclear.

        Although studies have not shown any link between cell-phone or mobile-phone radiation and the occurrence of brain tumors,[REF] the World Health Organization has classified mobile-phone radiation on the IARC scale into Group 2B – possibly carcinogenic.[REF]
        The claim that cell-phone usage may cause brain cancer is likely based on epidemiological studies which observed a slight increase in glioma risk among heavy users of wireless phones.
Wireless device radiation and health:
  Cancer:
    - link: https://www.nytimes.com/2018/02/02/health/cell-phones-cancer.html
      blurb: Cancer Risk From Cellphone Radiation Is Small, Studies Show
      sentence: |-
        There have been rumors that mobile phone use can cause cancer, but this has not been conclusively proven.[REF] In 2024, the National Cancer Institute wrote: "The evidence to date suggests that cell phone use does not cause brain or other kinds of cancer in humans."[REF]

        In a 2018 statement, the US Food and Drug Administration said that "the current safety limits are set to include a 50-fold safety margin from observed effects of radiofrequency energy exposure".

        In 2018 the US National Toxicology Program (NTP) published the results of its ten year, $30 million study of the effects of radio frequency radiation on laboratory rodents, which found 'clear evidence' of malignant heart tumors (schwannomas) and 'some evidence' of malignant gliomas and adrenal tumors in male rats.[REF] In 2019, the NTP scientists published an article stating that RF scientists found evidence of 'significant' DNA damage in the frontal cortex and hippocampus of male rat brains and the blood cells of female mice.[REF] In 2018, the Ramazzini Cancer Research Institute study of cell phone radiation and cancer published its results and conclusion that 'The RI findings on far field exposure to RFR are consistent with and reinforce the results of the NTP study on near field exposure, as both reported an increase in the incidence of tumors of the brain and heart in RFR-exposed Sprague-Dawley rats.[REF] These tumors are of the same histotype of those observed in some epidemiological studies on cell phone users.
    - link: https://www.fda.gov/NewsEvents/Newsroom/PressAnnouncements/ucm595144.htm
      blurb: Press Announcements - Statement from Jeffrey Shuren, M.D., J.D., Director of the FDA's Center for Devices and Radiological Health on the recent National Toxicology Program Draft Report on Radiofrequency Energy Exposure
      sentence: |-
        There have been rumors that mobile phone use can cause cancer, but this has not been conclusively proven.[REF] In 2024, the National Cancer Institute wrote: "The evidence to date suggests that cell phone use does not cause brain or other kinds of cancer in humans."[REF]

        In a 2018 statement, the US Food and Drug Administration said that "the current safety limits are set to include a 50-fold safety margin from observed effects of radiofrequency energy exposure".

        In 2018 the US National Toxicology Program (NTP) published the results of its ten year, $30 million study of the effects of radio frequency radiation on laboratory rodents, which found 'clear evidence' of malignant heart tumors (schwannomas) and 'some evidence' of malignant gliomas and adrenal tumors in male rats.[REF] In 2019, the NTP scientists published an article stating that RF scientists found evidence of 'significant' DNA damage in the frontal cortex and hippocampus of male rat brains and the blood cells of female mice.[REF] In 2018, the Ramazzini Cancer Research Institute study of cell phone radiation and cancer published its results and conclusion that 'The RI findings on far field exposure to RFR are consistent with and reinforce the results of the NTP study on near field exposure, as both reported an increase in the incidence of tumors of the brain and heart in RFR-exposed Sprague-Dawley rats.[REF] These tumors are of the same histotype of those observed in some epidemiological studies on cell phone users.
