      blurb: Non-Ionizing Radiation Safety
      sentence: |-
        These intensities are a concern for industrial workplace safety. 

        In 2011, the International Agency for Research on Cancer (IARC) from the World Health Organization (WHO) released a statement adding RF electromagnetic fields (including microwave and millimetre waves) to their list of things which are possibly carcinogenic to humans.[REF] 

        In terms of potential biological effects, the non-ionizing portion of the spectrum can be subdivided into:
        # The optical radiation portion, where electron excitation can occur (visible light, infrared light)
        # The portion where the wavelength is smaller than the body.
