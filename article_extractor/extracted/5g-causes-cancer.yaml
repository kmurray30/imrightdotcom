Devra Davis:
  Wireless radiation:
    - link: https://downloads.bbc.co.uk/rmhttp/fileon4/PG07_5G_Con.pdf
      blurb: Now, how many of you had heard that in 2011, the World Health Organisation had reviewed all of the evidence and decided that mobile phone radiation was a possible human carcinogen? It’s interesting that that information isn’t more widely known.
      sentence: |-
        In 2007 Davis founded the Environmental Health Trust (EHT),[REF] The EHT campaigns for safer cell phone use,[REF] and has challenged research that finds no links between cellular phones and cancer,[REF] advocated for more research into the effects of wireless radiation on children,[REF]

        Davis has been called a "crusader in the fight over cell phone safety".[REF][REF] She claims much research that finds no effects is industry-funded and biased.[REF][REF] She summarized her research into health effects of cell phones in her 2010 book, Disconnect: The Truth about Cell Phone Radiation, What the Industry Has Done to Hide It, and How to Protect Your Family.[REF][REF] She has cited the World Health Organization's 2011 classification of wireless radiation as a Class 2B agent ("Possibly Carcinogenic to Humans"). while the EHT has been accused of promoting low quality sources.[REF]

        Davis was featured prominently in a controversial 2016 episode of the Australian TV program Catalyst, in which she claimed "every single well-designed study ever conducted finds an increased risk of brain cancer with the heaviest users [of mobile phones]".[REF][REF][REF] The episode drew heavy criticism from researchers, and Davis' claims were refuted by public health scholar Simon Chapman, who claims there is no evidence of increase brain cancer rates in Australians, as well as Rodney Croft, a commissioner with the International Commission on Non-Ionizing Radiation Protection, who called the views of Davis "a fringe position that is not supported by science."[REF] and BBC Radio 4 has called Davis one of the most influential scientists in 5G-opposition movements.[REF] An excerpt of a lecture by Davis was used by new-age conspiracy promoter Sacha Stone in his 2020 film 5G Apocalypse: Extinction Event.
