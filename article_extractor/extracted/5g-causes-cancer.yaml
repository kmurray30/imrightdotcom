Brain tumor:
  Cause:
    - link: https://www.medicinenet.com/brain_cancer/article.htm#do_cell_phones_cause_brain_cancer
      blurb: Other risk factors such as smoking, radiation exposure, and viral infection (HIV) have been suggested but not proven to cause brain cancer.
      sentence: |-
        At this dose, approximately 6391 people would have to be exposed to cause 1 case of brain cancer.[REF] Inherited conditions, such as Von Hippel–Lindau disease, tuberous sclerosis, multiple endocrine neoplasia, and neurofibromatosis type 2 carry a high risk for the development of brain tumors.[REF][REF] People with celiac disease have a slightly increased risk of developing brain tumors.[REF] Smoking may increase the risk, but evidence of this remains unclear.

        Although studies have not shown any link between cell-phone or mobile-phone radiation and the occurrence of brain tumors,[REF] the World Health Organization has classified mobile-phone radiation on the IARC scale into Group 2B – possibly carcinogenic.[REF]
        The claim that cell-phone usage may cause brain cancer is likely based on epidemiological studies which observed a slight increase in glioma risk among heavy users of wireless phones.
