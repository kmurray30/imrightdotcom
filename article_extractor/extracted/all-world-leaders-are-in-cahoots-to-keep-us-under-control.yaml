        The Paris Agreement has been described as having a bottom-up structure, as its core pledge and review mechanism allows nations to set their own nationally determined contributions (NDCs), rather than having targets imposed top down.[REF] Unlike its predecessor, the Kyoto Protocol, which sets commitment targets that have legal force, the Paris Agreement, with its emphasis on consensus building, allows for voluntary and nationally determined targets.
