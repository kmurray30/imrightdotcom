    - link: http://www.amisdeleuro.org/news.php?news_id=603&lg=fr
      blurb: Nouvelles d'Andorre
      sentence: A number of non-EU member states, namely Andorra, Monaco, San Marino, and Vatican City have formal agreements with the EU to use the euro as their official currency and issue their own coins.[REF][REF] In addition, Kosovo and Montenegro have adopted the euro unilaterally, relying on euros already in circulation rather than minting currencies of their own.
