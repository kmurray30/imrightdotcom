      blurb: Remarks to World Economic Forum
      sentence: |-
        Government investments and government incentives for private investors could "support low-carbon and climate-resilient growth" such as "planting mangroves, land restoration, reforestation or insulating buildings".

        In June 2020, Klaus Schwab, who founded the World Economic Forum (WEF) in 1971 was chairman at the time, described the three core components of the Great Reset.[REF] The first includes creating conditions for a "stakeholder economy"; improving policies and agreements on taxes, regulations, fiscal policies and trade to result in "fairer outcomes".[REF] The second component addresses how the large-scale pandemic spending programs with private investments and pension funds could improve on the old system by building one that is more "resilient, equitable and sustainable" over the long term by "building green urban infrastructure and creating incentives for industries to improve their track record on environmental, social and governance (ESG) metrics".
