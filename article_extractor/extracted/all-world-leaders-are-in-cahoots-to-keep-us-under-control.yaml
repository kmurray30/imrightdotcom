World Economic Forum:
  Organization:
    - link: http://www.weforum.org/content/leadership-team
      blurb: The Leadership Team &#124; World Economic Forum-The Leadership Team
      sentence: |-
        According to the WEF, the center will "serve as a platform for interaction, insight and impact on the scientific and technological changes that are changing the way we live, work and relate to one another".[REF] WEF has 19 such centers spread across Africa, Asia, Europe, North America and South America.[REF]

        The World Economic Forum declares that it is impartial and that it is not tied to any political, partisan, or national interests. Until 2012, it had observer status with the United Nations Economic and Social Council; it is under the supervision of the Swiss Federal Council. The foundation's highest governance body is the foundation board.

        The managing board is chaired by the WEF's president and CEO and acts as the executive body of the World Economic Forum.
  Introduction:
    - link: https://www.greenpeace.org/international/press-release/57867/hundreds-of-ultra-short-private-jet-flights-to-davos-world-economic-forum/
      blurb: Hundreds of ultra-short private jet flights to Davos revealed, as global leaders head into World Economic Forum
      sentence: |-
        The meeting brings together some 3,000 paying members and selected participants – among whom are investors, business leaders, political leaders, economists, celebrities and journalists – for up to five days to discuss global issues across 500 sessions.[REF][REF] The foundation is mostly funded by its 1,000-member multi-national companies.[REF]

        Aside from Davos, the organization convenes regional conferences, it produces a series of reports, engages its members in sector-specific initiatives[REF] and provides a platform for leaders from selected stakeholder groups to collaborate on projects and initiatives.[REF]

        The World Economic Forum and its annual meeting in Davos have received criticism over the years, including allegations of the organization's corporate capture of global and democratic institutions, institutional whitewashing initiatives, the public cost of security, the organization's tax-exempt status, unclear decision processes and membership criteria, a lack of financial transparency, and the environmental footprint of its annual meetings.{{Cite news |last1=Horton |first1=Helena |last2=reporter |first2=Helena Horton Environment |date=13 January 2023 |title=Private jet emissions quadrupled during Davos 2022 |url=https://www.
