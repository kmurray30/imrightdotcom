      blurb: Governments and international organizations come together to address economic challenges and sustainability
      sentence: |-
        In an 11 June 2020 meeting with the then Prince of Wales, now King Charles III, and Permanent Representatives to the United Nations from the Commonwealth of Nations, Prime Minister Justin Trudeau spoke regarding the Great Reset initiative.[REF] Trudeau said that the Commonwealth, of which Canada is a member country, provides a space for "dialogue and collective action on global issues related to sustainable development" which includes how to "build back stronger, more resilient, and greener economies" in a post-COVID-19 world.

        In his August presentation entitled "The Great Reset", at the Victoria Forum 2020, the Governor of the Bank of Canada described how COVID-19 is resulting in a "structural shock with broad impact worldwide".[REF] He said that governments, investors in the corporate and financial sector—including central banks, and individuals households, need to evaluate risks and prepare for transitions.
