        The 'European Central Bank' ('ECB') is the central component of the Eurosystem and the European System of Central Banks (ESCB) as well as one of seven institutions of the European Union.[REF] It is one of the world's most important central banks, heading a system with a combined balance sheet of close to €7 trillion.

        The ECB Governing Council makes monetary policy for the Eurozone and the European Union, administers the foreign exchange reserves of EU member states, engages in foreign exchange operations, and defines the intermediate monetary objectives and key interest rate of the EU.
