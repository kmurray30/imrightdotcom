    - link: https://www.imf.org/en/News/Articles/2020/06/03/sp060320-remarks-to-world-economic-forum-the-great-reset
      blurb: Remarks to World Economic Forum
      sentence: |-
        The 'Great Reset Initiative' is an economic recovery plan proposed by the World Economic Forum (WEF) in response to the COVID-19 pandemic.[REF] The project was launched in June 2020, accompanied by a video message from the then-Prince of Wales, Charles.[REF] Its stated objective is to support recovery from the global pandemic in a manner that emphasises sustainable development.[REF]

        At the time of the initiative's announcement, WEF chairman Klaus Schwab outlined three core components of the initiative: advancing a "stakeholder economy"; building in a more "resilient, equitable, and sustainable" way using environmental, social, and governance (ESG) metrics; and "harnessing the innovations of the Fourth Industrial Revolution."[REF][REF] In a keynote address, International Monetary Fund managing director Kristalina Georgieva identified three principles of a sustainable recovery: green growth, smarter growth, and fairer growth.

        "The Great Reset" was chosen as the theme of the 2021 World Economic Forum annual meeting in Davos, Switzerland.[REF] The summit was postponed several times due to the pandemic, first to May 2021 and later to 2022.[REF][REF] The theme of Davos 2022 was "History at a Turning Point", with discussions largely dominated by the Russian invasion of Ukraine.[REF]

        The Great Reset Initiative, and the WEF more broadly,[REF] have been criticised by commentators for encouraging economic deregulation and expanding the influence of private corporations, particularly multinational corporations, in policymaking at the expense of governmental authority.[REF][REF] Others argued that it overemphasised health and exaggerated the ability of a small group of decision-makers to reshape the global economy,
