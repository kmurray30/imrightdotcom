  Definitional ambiguity:
    - link: https://techpolicy.press/what-is-digital-public-infrastructure-towards-more-specificity
      blurb: What is Digital Public Infrastructure? Towards More Specificity
      sentence: 'Critics have noted that the term "digital public infrastructure" conflates two distinct meanings of "public": population-scale deployment versus public accountability and governance. A system may serve an entire population while remaining structurally unaccountable to those it affects.'
    - link: https://www.ucl.ac.uk/bartlett/sites/bartlett/files/dpi_conceptualisation_and_measurement.pdf
      blurb: "Digital Public Infrastructure: a framework for conceptualisation and measurement"
      sentence: The G20 definition uses aspirational language ("should be," "can be") rather than verifiable structural conditions, leading scholars to argue that current definitions exclude nothing and therefore define nothing.
  Exclusion and the digital divide:
    - link: https://thewire.in/rights/jharkhand-starvation-deaths-aadhaar
      blurb: Starvation Deaths and Aadhaar
      sentence: In India, biometric authentication failures in the Aadhaar system have led to denial of food rations and welfare benefits, with reports linking such failures to deaths from starvation. The digital divide means that populations without reliable internet access, digital literacy, or stable biometrics (manual laborers, elderly people) face systematic exclusion from systems designed to serve them.
  Structural accountability:
    - link: https://doi.org/10.5281/zenodo.18213695
      blurb: "Corrigibility as a Structural Precondition for Digital Public Infrastructure: A Cybernetic Framework"
      sentence: "This perspective argues that genuine public infrastructure requires: the ability to refuse participation without penalty; transparent and inspectable execution; independent verification of system behavior; binding governance input from those affected; and the feasibility of alternative implementations. By these criteria, systems such as the Linux kernel, Let's Encrypt, and Wikipedia meet structural requirements for public infrastructure, while some systems promoted as DPI do not."
