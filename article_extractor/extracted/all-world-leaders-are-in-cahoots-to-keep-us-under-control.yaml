      blurb: Security Council – Veto List
      sentence: |-
        The last veto was in December 1989 when the United Kingdom, France and the United States vetoed a draft resolution condemning the United States invasion of Panama.

        The United Kingdom used its veto power, along with France, to veto a draft resolution aimed at resolving the Suez Canal crisis (in which France and UK were militarily involved) in 1956.
    - link: https://www.un.org/ga/sessions/emergency.shtml
      blurb: Emergency Special Sessions
      sentence: The UK and France eventually withdrew from Egypt after the US instigated an 'emergency special session' of the General Assembly, under the terms of the "Uniting for Peace" resolution, which led to the establishment of the United Nations Emergency Force I (UNEF I), by the adoption of Assembly resolution 1001. The UK also used its veto seven times in relation to Rhodesia from 1963 to 1973, five of these occasions were unilateral; the only occasions on which the UK has used its veto power unilaterally.
