        Some economists supported increased government funding for mitigation efforts, even at the cost of tolerating a very large economic contraction.[REF] They agreed that lockdowns should continue until the threat of resurgence has declined, even when considering only the economic impact. There was a general agreement, at least in some economic circles, that "severe lockdowns — including closing non-essential businesses and strict limitations on people's movement — are likely to be better for the economy in the medium term than less aggressive measures".
