      blurb: ECB needs a new type of bazooka to battle Baltic risk
      sentence: |-
        Contrary to the PEPP and the APP, the TPI does not have an ex ante upper limit on the purchase of securities.[REF] Although the ECB has stated it would primarily buy only government bonds on the secondary market However, there are four conditions that need to be met before securities are eligible for purchasing under TPI:[REF]

        # Compliance with the fiscal framework of the EU and not be involved in the excessive deficit procedure;
        # Absence of macroeconomic imbalances and not being involved in an excessive macroeconomic imbalance procedure, demonstrating that it is in compliance with the commission's recommendations;
        # Sovereign debt trajectory must be sustainable, assessed by the ECB and other relevant bodies;
        # Stick to commitments made under the Recovery and Resilience Facility, proving that the government follows sound and sustainable macroeconomic policies.
