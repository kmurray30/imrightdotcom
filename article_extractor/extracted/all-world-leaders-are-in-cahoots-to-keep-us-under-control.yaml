        During the early stages of the COVID-19 pandemic, a number of non-pharmaceutical interventions, particularly lockdowns (encompassing stay-at-home orders, curfews, quarantines,  and similar societal restrictions), were implemented in numerous countries and territories around the world.[REF] By April 2020, about half of the world's population was under some form of lockdown, with more than 3.9&nbsp;billion people in more than 90 countries or territories having been asked or ordered to stay at home by their governments.[REF]

        In addition to the health effects of lockdown restrictions,[REF] researchers had found the lockdowns may have reduced crime and violence by armed non-state actors, such as the Islamic State, and other terrorist groups.  In addition, lockdowns had increased the uptake of telecommuting, reduced airborne pollution, and increased adoption of digital payment systems.
