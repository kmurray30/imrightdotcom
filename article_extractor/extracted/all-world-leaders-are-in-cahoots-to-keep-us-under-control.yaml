        Both the World Food Programme (WFP) and the World Health Organization (WHO) have published statements noting the impact of the lockdowns on livelihoods and food security, and David Nabarro, WHO Special Envoy on COVID-19 stated in October 2020 that "lockdowns just have one consequence that you must never ever belittle, and that is making poor people an awful lot poorer".[REF]{{#invoke:cite|news|author=Cockburn|date=12 October 2020|title=The incredible vanishing World Health Organization|work=The Spectator|url=https://spectator.
