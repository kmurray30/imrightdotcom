      blurb: Financial assistance to EU Member States | Fact Sheets on the European Union | European Parliament
      sentence: Since the 2008 financial crisis, the eurozone has established and used provisions for granting emergency loans to member states in return for enacting economic reforms. The eurozone has also enacted some limited fiscal integration; for example, in peer review of each other's national budgets.
    - link: https://www.aph.com/community/know-before-you-go/european-countries-dont-actually-use-euro/
      blurb: European countries don't actually use the Euro!
      sentence: "The eurozone comprises about half the countries in geographical Europe. Within the European Union (EU), six member states have not yet adopted the euro and continue to use their own national currencies: the Czech Republic, Denmark, Hungary, Poland, Romania, and Sweden."
