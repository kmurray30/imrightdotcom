  History:
    - link: https://developmentgateway.org/blog/mythbusters-digital-public-infrastructure-digital-public-goods/
      blurb: "Mythbusters: Digital Public Infrastructure & Digital Public Goods"
      sentence: Early examples of DPI date back to foundational technologies like the Internet and GPS, which were publicly funded and made universally available. However, until recently, such systems were often siloed and not thought of as one cohesive public infrastructure.
    - link: https://www.csis.org/analysis/unpacking-concept-digital-public-infrastructure-and-its-importance-global-development
      blurb: Unpacking the Concept of Digital Public Infrastructure and Its Importance for Global Development
      sentence: |-
        Early examples of DPI date back to foundational technologies like the Internet and GPS, which were publicly funded and made universally available.[REF] However, until recently, such systems were often siloed and not thought of as one cohesive public infrastructure.

        The term "digital public infrastructure" itself gained prominence in the early 2020s, especially as countries started building integrated digital service platforms.
    - link: https://nortal.com/insights/why-digital-sovereignty-matters-and-how-x-road-makes-it-happen
      blurb: Why digital sovereignty matters and how X-Road makes it happen
      sentence: |-
        Other nations had parallel developments: Estonia built its X-Road data exchange system in the 2000s, enabling government and private databases to talk to each other securely[REF] and laying the groundwork for the later development of Estonia's e-government services.

        By the 2020s, thinkers and policymakers began explicitly using the infrastructure analogy, framing online services as critical infrastructure that should be broadly accessible, akin to public roads.
    - link: https://www.weforum.org/stories/2024/02/dpi-digital-public-infrastructure/
      blurb: What we can expect for digital public infrastructure in 2024
      sentence: G20 leaders in 2023 welcomed a framework for systems of digital public infrastructure, describing DPI as shared, interoperable digital systems for service delivery at societal scale.[https://g20.org/wp-content/uploads/2024/09/G20-2023_India_Declaracao-de-Lideres.pdf] During India's G20 presidency, world leaders agreed to describe digital public infrastructure as "a set of shared digital systems that are secure and interoperable, built on open standards, to deliver equitable access to public and/or private services at societal scale." That same year, the United Nations also identified DPI as a high-impact initiative for achieving the Sustainable Development Goals, with over 100 countries committing support.
