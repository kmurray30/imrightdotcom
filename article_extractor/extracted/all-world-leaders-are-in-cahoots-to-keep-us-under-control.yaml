      sentence: |-
        The agreement was lauded by French president François Hollande, UN secretary-general Ban Ki-moon and Christiana Figueres, Executive Secretary of the UNFCCC.[REF] The president of Brazil, Dilma Rousseff, called the agreement "balanced and long-lasting",[REF] and India's prime minister Narendra Modi commended the agreement's climate justice.[REF][REF] When the agreement achieved the required signatures in October 2016, US president Barack Obama said that "Even if we meet every target, we will only get to part of where we need to go."[REF]

        Some environmentalists and analysts reacted cautiously, acknowledging the "spirit of Paris" in bringing together countries, but expressing less optimism about the pace of climate mitigation and how much the agreement could do for poorer countries.[REF] James Hansen, a former NASA scientist and leading climate change expert, voiced anger that most of the agreement consists of "promises" or aims and not firm commitments and called the Paris talks a fraud with "no action, just promises". Criticism of the agreement from those arguing against climate action has been diffuse, which may be due to the weakness of the agreement.
