      blurb: Oxford, AstraZeneca COVID-19 deal reinforces 'vaccine sovereignty'
      sentence: |-
        Large pharmaceutical companies with experience in making vaccines at scale, including Johnson & Johnson, AstraZeneca, and GlaxoSmithKline (GSK), formed alliances with biotechnology companies, governments, and universities to accelerate progression to an effective vaccine.[REF]

        By June 2020, tens of billions of dollars were invested by corporations, governments, international health organizations, and university research groups to develop dozens of vaccine candidates and prepare for global vaccination programs to immunize against COVID‑19 infection.[REF][REF][REF][REF] The corporate investment and need to generate value for public shareholders raised concerns about a "market-based approach" in vaccine development, costly pricing of eventual licensed vaccines, preferred access for distribution first to affluent countries, and sparse or no distribution to where the pandemic is most aggressive, as predicted for densely populated, impoverished countries unable to afford vaccinations.[REF][REF][REF] The collaboration of the University of Oxford with AstraZeneca (a global pharmaceutical company based in the UK) raised concerns about price and sharing of eventual profits from international vaccine sales, arising from whether the British government and university as public partners had commercialization rights. AstraZeneca stated that initial pricing of its vaccine would not include a profit margin for the company while the pandemic was still expanding.
