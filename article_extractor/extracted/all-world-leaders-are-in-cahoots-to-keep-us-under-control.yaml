      blurb: Bilderberg Announces 2008 Conference
      sentence: According to former chairman Étienne Davignon in 2011, a major attraction of Bilderberg group meetings is that they provide an opportunity for participants to speak and debate candidly and to find out what major figures really think, without the risk of off-the-cuff comments becoming fodder for controversy in the media.[REF] A 2008 press release from the "American Friends of Bilderberg" stated that "Bilderberg's only activity is its annual Conference and that at the meetings, no resolutions were proposed, no votes taken, and no policy statements issued." However, in November 2009, the group hosted a dinner meeting at the Château of Val-Duchesse in Brussels outside its annual conference to promote the candidacy of Herman Van Rompuy for President of the European Council.
