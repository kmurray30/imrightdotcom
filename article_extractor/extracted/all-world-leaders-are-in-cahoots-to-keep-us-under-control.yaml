Presidency of the United Nations Security Council:
  Introduction:
    - link: https://www.un.org/securitycouncil/content/presidency
      blurb: Security Council Presidency | United Nations Security Council
      sentence: The presidency has rotated every month since its establishment in 1946, and the president serves to coordinate actions of the council, decide policy disputes, and sometimes functions as a diplomat or intermediary between conflicting groups.
  Role:
    - link: https://www.un.org/Docs/sc/unsc_pres_statements08.htm
      blurb: "UN Security Council: Presidential Statements 2008"
      sentence: The president is authorized to issue both Presidential Statements (subject to consensus among Council members) and notes,{{Cite web |url=https://www.
    - link: https://www.un.org/Docs/sc/notes/PresidentialNotesEng.htm
      blurb: Notes by the president of the Security Council
      sentence: The president is authorized to issue both Presidential Statements[REF] (subject to consensus among Council members) and notes, which are used to make declarations of intent that the full Security Council can then pursue.
    - link: https://www.un.org/Docs/sc/unsc_pres_statements08.htm
      blurb: "UN Security Council: Presidential Statements 2008"
      sentence: The president is authorized to issue both Presidential Statements[REF] (subject to consensus among Council members) and notes,[REF] which are used to make declarations of intent that the full Security Council can then pursue. The president is also responsible for reading statements of the Security Council to the press.
