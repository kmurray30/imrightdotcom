      blurb: "Corporate capture of global governance: The World Economic Forum (WEF)-UN partnership agreement is a dangerous threat to UN System"
      sentence: |-
        |publisher=Springer |location=Cham |year=2020 |volume=5 |pages=207–220 |doi=10.1007/978-3-030-30469-0_12 |isbn=978-3-030-30468-3 |s2cid=213580432 |access-date=17 August 2021 |archive-date=17 August 2021 |archive-url=https://web.archive.org/web/20210817101705/https://link.springer.com/chapter/10.1007/978-3-030-30469-0_12 |url-status=live}}

        In September 2019, more than 400 civil society organizations and 40 international networks heavily criticised a partnership agreement between WEF and the United Nations and called on the UN secretary-general to end it. They see such an agreement as a "disturbing corporate capture of the UN, which moved the world dangerously towards a privatised global governance".
History of COVID-19 vaccine development:
  Trials:
    - link: https://www.who.int/blueprint/priority-diseases/key-action/Outline_CoreProtocol_vaccine_trial_09042020.pdf
      blurb: "An international randomised trial of candidate vaccines against COVID-19: Outline of Solidarity vaccine trial"
      sentence: 'The Blueprint documented a "large, international, multi-site, individually randomized controlled clinical trial" to allow "the concurrent evaluation of the benefits and risks of each promising candidate vaccine within 3–6 months of it being made available for the trial." The Blueprint listed a Global Target Product Profile (TPP) for COVID‑19, identifying favorable attributes of safe and effective vaccines under two broad categories: "vaccines for the long-term protection of people at higher risk of COVID‑19, such as healthcare workers", and other vaccines to provide rapid-response immunity for new outbreaks.[REF] 3) rapidly evaluate and screen for the most promising candidate vaccines simultaneously before they are tested in humans; and 4) design and coordinate a multiple-site, international randomized controlled trialthe "Solidarity trial" for vaccinesto enable simultaneous evaluation of the benefits and risks of different vaccine candidates under clinical trials in countries where there are high rates of COVID‑19 disease, ensuring fast interpretation and sharing of results around the world.'
