        Canada announced million in funding for 96 vaccine research projects at Canadian companies and universities, with plans to establish a "vaccine bank" that could be used if another coronavirus outbreak occurs.[REF][REF] A further investment of billion was added to support clinical trials and develop manufacturing and supply chains for vaccines.[REF] On 4May, the Canadian government committed million to the WHO's live streaming effort to raise billion for COVID‑19 vaccines and preparedness.[REF]

        China provided low-rate loans to a vaccine developer through its central bank and "quickly made land available for the company" to build production plants.[REF] As of June 2020, six of the eleven COVID‑19 vaccine candidates in early-stage human testing were developed by Chinese organizations.[REF] Three Chinese vaccine companies and research institutes are supported by the government for financing research, conducting clinical trials, and manufacturing the most promising vaccine candidates, prioritizing rapid evidence of efficacy over safety.[REF] On 18 May, China had pledged billion to support overall efforts by the WHO for programs against COVID‑19.[REF] On 22 July, China announced plans to provide a US$1&nbsp;billion loan to make its vaccine accessible for Latin America and the Caribbean.[REF] On 24 August, Chinese Premier Li Keqiang announced it would provide Cambodia, Laos, Myanmar, Thailand, and Vietnam priority access to the vaccine once it was distributed.

