      blurb: Countries, languages, currencies
      sentence: The 'euro area', commonly called the 'eurozone' ('EZ'), is a currency union of 21&nbsp;member states of the European Union (EU) that have adopted the euro (€) as their primary currency and sole legal tender, and have thus fully implemented Economic and Monetary Union policies.
