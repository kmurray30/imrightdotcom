      blurb: Remarks to World Economic Forum
      sentence: |-
        The reset would advance work already begun to prepare for the transition to the Fourth Industrial Revolution by upskilling and reskilling workers.[REF] Another post-COVID concern raised by the WEF is food security including the "risk of disruptions to food supply chains", and the need for "global policy coordination" to prevent "food protectionism from becoming the post-pandemic new normal".[REF]

        In her 3 June 2020 keynote address opening the Great Reset forum, a joint initiative of the WEC and then Prince of Wales Charles, Kristalina Georgieva, managing director of the International Monetary Fund (IMF) said that there has been a "massive injection of fiscal stimulus to help countries deal with this crisis" and that it was of "paramount importance that this growth should lead to a greener, smarter, fairer world in the future". Georgieva listed three aspects of the Great Reset: green growth, smarter growth, and fairer growth.
