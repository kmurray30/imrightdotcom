      sentence: Since 2017-2018, a growing number of central banks have started to consider the effects of climate change on their operational frameworks for monetary policy and supervisory policies.[REF][REF][REF] In the continuation to a famous speech by former Bank of England governor Mark Carney in September 2015,[REF] central bank have justified this work by the fact that climate change will likely generate more volatility in certain markets, some inflationary pressure either due to climate shocks and extreme weather events[REF] and linked with an overly slow and disordered transition, and generate climate-related financial risks on the financial sector.[REF][REF] As a result, even though central banks are not climate policy makers, from the perspective of their financial stability mandate, they may have to adjust their policies in order to anticipate and mitigate these risks.
COVID-19 lockdowns:
  Related to epidemiology:
    - link: https://www.science.org/content/article/it-s-been-so-so-surreal-critics-sweden-s-lax-pandemic-policies-face-fierce-backlash
      blurb: "'It's been so, so surreal.' Critics of Sweden's lax pandemic policies face fierce backlash"
      sentence: |-
        Epidemiological evidence supports generalized non-pharmaceutical interventions to curb the spread of COVID-19.[REF][REF][REF]

        During the early stages of the pandemic in Europe and the United States, statistical modeling which advised that restrictions were helpful to prevent a large number of deaths were used as the basis for lockdowns.[REF] This includes an Imperial College projection, led by epidemiologist Neil Ferguson.[REF] Despite some criticisms, academics defended the Imperial projection as fundamentally sound, while admitting the code was "a buggy mess".[REF] Retrospective evaluation of lockdowns and computer modeling has verified that they have significantly contributed to reducing mortality and morbidity from COVID-19.[REF]

        A notable opponent of lockdowns has included Sweden's state epidemiologist Anders Tegnell, who has frequently criticised the strategy.[REF][REF] The Swedish government's approach has included minimal restrictions and has been controversial in part due to the relatively high death toll due to widespread transmission.[REF] However, the Swedish government began considering enacting a lockdown in early 2021.[REF][REF]

        While arguing in August 2020 for the need for further lockdowns in the United States, physicians Ranu Dhillon and Abraar Karan argued for "smarter lockdowns" that impose restrictions on areas with high levels of transmission, and to increase support to vulnerable populations in these locations to offset the economic costs.[REF]

        A number of medical experts signed the Great Barrington Declaration in October 2020 which called for "Focused Protection" on high risk groups and minimal restrictions on the general population to achieve herd immunity through COVID-19 infection.
  Efficacy:
    - link: https://www.nature.com/articles/s41586-020-2404-8
      blurb: The effect of large-scale anti-contagion policies on the COVID-19 pandemic
      sentence: |-
        Several researchers, from modeling and demonstrated examples, have concluded that lockdowns were somewhat effective at reducing the spread of, and deaths caused by, COVID-19.[REF][REF][REF][REF][REF][REF][REF] Lockdowns are thought to be most effective at containing or preventing COVID-19 community transmission, healthcare costs and deaths when implemented earlier, with greater stringency, and when not lifted too early.[REF][REF][REF][REF][REF]

        A study investigating the spread based on studies of the most common symptoms such as loss of taste and smell in France, Italy and the UK showed a marked decrease in new symptoms just a few days after the start of confinement on the countries (Italy and France) with the strongest lockdowns.[REF] Modelling on the United States pandemic suggested "the pandemic would have been almost completely suppressed from significantly taking off if the lockdown measures were implemented two weeks earlier" and that the second wave would have been less severe had the lockdown lasted another two weeks.[REF] The relatively high number of cases and deaths in Sweden, which kept much of its society open during the pandemic, when compared to its neighbours with comparable demographics Norway, Denmark and Finland that did enforce lockdowns, is thought to be at least partly attributable to this difference in policy.[REF][REF][REF][REF][REF][REF][REF] Similarly, modelling on Australian data concluded that achieving zero community transmission through a strict lockdown lowers healthcare and economic costs compared to less stringent measures that allow transmission to continue, and warned that early relaxation of restrictions have greater costs.[REF] New Zealand and Vietnam also adopted a "Zero-COVID" strategy throughout 2020 that included targeted lockdowns.[REF][REF] A natural experiment study finds that the partial lockdown in Kyrgyzstan (with curfews) was just as effective as the full lockdown in Kazakhstan (with many business closures) at reducing the spread of the virus.[REF]

        The emergence of the highly transmissible SARS-CoV-2 Delta variant in 2021 led some commentators to suggest that although lockdowns continue to reduce the spread of COVID-19, they have become less effective at containing it.
