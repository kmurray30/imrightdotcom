  Reception:
    - link: https://www.newenglishreview.org/beware-the-young-global-leaders-of-the-world-economic-forum/
      blurb: Beware The Young Global Leaders of the World Economic Forum
      sentence: |-
        It has elsewhere also been described as a grouping that is "leading the charge in nurturing a special community of leaders committed to addressing the world's most urgent challenges."[REF]

        Skeptics suggest that the grouping is "instrumental in shaping policy around the world, undermining democratic principles, and creating obedient and compliant servants" In dispelling such conspiracy theories of the influence of the organisation, Michelle Rempel, a Canadian Conservative politician who found out she had been selected as a Young Global Leader in 2016 with an email that she initially had assumed was spam, noted that the 2017 meeting was "no different in feel from an academic conference, if a bit more global in nature and with more high-profile politicians and CEOs in attendance."[REF] One academic, having studied the grouping, pointed out that while such social networks provides "privileged access to a network of elites" and represents "a concentration of cultural and social as well as symbolic capital", it would be simplistic to conclude that membership would "deterministically imply that the actors will obey its values."[REF] Another has suggested that the platform effectively selects already prominent and influential individuals, noting that "Young Global Leaders are not "put in power" like many believe.
