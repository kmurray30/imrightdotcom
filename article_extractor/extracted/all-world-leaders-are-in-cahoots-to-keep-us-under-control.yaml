COVID-19 vaccine:
  Introduction:
    - link: https://vaccineknowledge.ox.ac.uk/covid-19-vaccines
      blurb: COVID-19 vaccines
      sentence: |-
        |url=https://www.britannica.com/science/COVID-19-vaccine
         |access-date=13 January 2026
        }} COVID-19 vaccines help reduce the risk of severe illness, hospitalisation and death from the virus.[REF] 

        COVID‑19 vaccines were developed at an unprecedented pace to tackle the COVID-19 pandemic, with the first clinical trials beginning in March 2020.[REF]

        Prior research on coronaviruses causing severe acute respiratory syndrome (SARS) and Middle East respiratory syndrome (MERS) accelerated the development of various vaccine platforms in early 2020.[REF] The 2023 Nobel Prize in Physiology or Medicine was awarded to Katalin Karikó and Drew Weissman for the development of effective mRNA vaccines against COVID19.[REF][REF][REF]

        Major vaccines include the Pfizer–BioNTech mRNA vaccine, Moderna mRNA vaccine, and the Novavax protein subunit vaccine. With the emergence of new SARS-CoV-2 variants, the original vaccines—particularly Pfizer–BioNTech and Moderna vaccines—have been updated.
