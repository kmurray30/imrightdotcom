      blurb: Long-term Study of Adults who Received High-Quality Early Childhood Care and Education Shows Economic and Social Gains, Less Crime
      sentence: "In addition to increased access, there has also an increased national focus on raising quality standards for Head Start and state-funded pre-K programs, and in improving training and professional development for early care providers.[REF] There is substantial evidence pointing to early childhood development playing a huge role in closing the achievement gap: various studies, including the Carolina Abecedarian study, Child-Parent Center study, and HighScope Perry Preschool study, have shown that pre-K programs can have a positive and long-lasting impact on academic achievement of low-income and minority students.[REF][REF] Furthermore, the role of early childhood education and development has been tied to success even out of the classroom."
COVID-19 pandemic in the United States:
  July to September 2023:
    - link: https://www.axios.com/2023/09/25/free-covid-test-government-usps
      blurb: Free COVID tests from government available again
      sentence: |-
        The film studio Lionsgate, however, briefly reinstated a mask mandate following an outbreak, as did Morris Brown College, which also reinstated temperature checks and a restriction on large events for two weeks, at the beginning of the fall 2023 semester.[REF] As more schools launched their fall semesters in late August and early September, high positivity rates among students and staff led to temporary in-person learning suspensions across three school districts in Texas and Tennessee, driven by district-level decisions rather than state authorities.[REF]

        With hospitalizations in excess of 20,000 for the first time since the end of the public health emergency, the federal government restarted the national free COVID test delivery program on September 25, enabling the delivery of four free COVID-19 tests per mailing address at a time when many insurance providers had begun to drop coverage of COVID tests. The program, entering its fifth round of distributions with the fall 2023 initiative, was suspended in May to preserve supplies yet Health Secretary Xavier Becerra stated that the stockpile had been replenished and that the program would continue through the holiday season, and beyond, if cases continued to rise.
