COVID-19:
  Bioethics:
    - link: https://academic.oup.com/cid/article/75/Supplement_1/S86/6583150
      blurb: "Competing Responses to Global Inequalities in Access to COVID Vaccines: Vaccine Diplomacy and Vaccine Charity Versus Vaccine Liberty"
      sentence: Since the outbreak of the COVID‑19 pandemic, scholars have explored the bioethics, normative economics, and political theories of healthcare policies related to the public health crisis.[REF] Academics have pointed to the moral distress of healthcare workers, ethics of distributing scarce healthcare resources such as ventilators,[REF] and the global justice of vaccine diplomacies.[REF] The socio-economic inequalities between genders,[REF] races,[REF] groups with disabilities,[REF] communities,[REF] regions, countries,[REF] and continents have also drawn attention in academia and the general public.[REF]
