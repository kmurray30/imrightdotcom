  External influence over national educational policy:
    - link: http://www.cidree.org/publications/yearbook_2010?PHPSESSID=baip221utd9v77b89hov0s3al6
      blurb: The use of external assessments and the impact on education systems
      sentence: |-
        For example, in Germany, the results of the first PISA assessment caused the so-called 'PISA shock': a questioning of previously accepted educational policies; in a state marked by jealously guarded regional policy differences, it led ultimately to an agreement by all Länder to introduce common national standards and even an institutionalised structure to ensure that they were observed.[REF] In Hungary, by comparison, which shared similar conditions to Germany, PISA results have not led to significant changes in educational policy.[REF]

        Because many countries have set national performance targets based on their relative rank or absolute PISA score, PISA assessments have increased the influence of their (non-elected) commissioning body, the OECD, as an international education monitor and policy actor, which implies an important degree of 'policy transfer' from the international to the national level; PISA in particular is having "an influential normative effect on the direction of national education policies".[REF] Thus, it is argued that the use of international standardised assessments has led to a shift towards international, external accountability for national system performance; Rey contends that PISA surveys, portrayed as objective, third-party diagnoses of education systems, actually serve to promote specific orientations on educational issues.

        National policy actors refer to high-performing PISA countries to "help legitimise and justify their intended reform agenda within contested national policy debates".
