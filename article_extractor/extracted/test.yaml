  Mitigation and reform:
    - link: https://newyork.edtrust.org/
      blurb: Home - The Education Trust - New York
      sentence: |-
        A study in North Carolina found that having Black teachers is associated with lowered amounts of exclusionary discipline for Black students, across all age, gender, and income ranges.[REF] To reduce its racial disciplinary disparity, Arkansas' state regulations are beginning to request that school districts make an effort to racially diversify their staff.[REF] School disciplinary policies in Arkansas are technically decided by state laws and the Arkansas Department of Education, but schools within Arkansas have some decision-making authority, which allowed them the power to suggest the diversification of their staff, as well as other policies that are being put into place to reduce racialized disciplinary disparities,[REF] including but not limited to:

        * Disciplinary punishments permitted for students are required to be written into a school district's policy.[REF]
        * In school districts where corporal punishment is used, the district must establish specific policies for when and how to employ it.[REF]
        * School districts are required to inform students' parents of disciplinary policies and provide written proof of the existence of said policies.[REF] These policies are required to be filed with the Arkansas Department of Education and include due process.[REF]
        * All school personnel, including teachers, administrators, volunteers, and all employees are required to undergo student discipline training.[REF]

        Similarly to Arkansas, schools in Virginia are attempting to improve training for teachers and administrators.[REF] In California, multiple school districts have completely eliminated suspensions for Kindergarten through twelfth grade in public schools.[REF] The New York State Education Department and the Board of Regents has included out-of-school suspensions in the Every Student Succeeds Act, attempting to hold schools accountable for the suspension rates of different groups of students, this includes Black students' higher suspension rates compared to that of other racial and ethnic groups.
