      sentence: Due to increased suspension and expulsion rates, black students are losing instructional time by spending more time away from the classroom.[REF] Lost instructional time can result in lower retainment levels of educational material, lower graduation rates, and higher drop-out rates.[REF] Higher rates of punishment in schools can increase interactions between black students and law enforcement when black students are punished with referrals to law enforcement for disciplinary infractions. These interactions with the law are a precursor for the school-to-prison pipeline, which disproportionately affects black students.
