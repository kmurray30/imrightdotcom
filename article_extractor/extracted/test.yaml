      sentence: In the United States, many of the state and federal laws surrounding school discipline originate from zero-tolerance policies for student misconduct practiced by policy-makers from the 1980s and 1990s.[REF] With the increasing use of zero-tolerance policies, by 1997 the federal government was funding the use of police officers in schools, resulting in an increased use of discipline in schools across the country and an influx of students entering the juvenile justice system.[REF] During this time, Black students accounted for over one-third of all corporal punishment cases and in-school and out-of-school suspensions, nearly one-third of all expulsions and school-related arrests, and over one-quarter of all referrals to law enforcement; rates around three times higher than that of white students.[REF] The Education Department's Office for Civil Rights is tasked with deciding whether or not to investigate students' reports of disciplinary racial discrimination.[REF] Former United States Secretary of Education Betsy DeVos enacted delays and eliminations of student discipline guidance under the United States Education Department.[REF] In 2016, the Obama administration required states to address racial disparities in special education under the Individuals with Disabilities Education Act, but DeVos delayed the implementation of these requirements. In 2014, the [[United States Department of Justic
