prior_sentences: 1
citation_types:
  - web
  - news
  - journal
  - magazine
  - report
  - dictionary
  - encyclopedia

# URL patterns to exclude (paywalls, archives, low-quality sources)
# Citation link is dropped if any pattern matches (case-insensitive substring)
exclude_url_patterns:
  - pqarchiver.com
  - pqasb.pqarchiver.com
  - archive.org
  - web.archive.org
  - nytimes.com/archives/
  - scribd.com
  - jstor.org
  - link.springer.com
  - proquest.com
  - ebscohost.com

# Minisearch: require at least this many distinct terms to match (reduces noise)
min_terms_matched: 2
# Skip search terms shorter than this (avoids "world", "leaders", etc. matching everything)
min_term_length: 5
# Fuzzy: 0 = exact only. Higher = more typos allowed but more false positives.
minisearch_fuzzy: 0

# Max refs to keep, ranked by relevance score (top-k cutoff before saving)
topk: 50
