prior_sentences: 1
citation_types:
  - web
  - news
  - journal
  - magazine
  - report
  - dictionary
  - encyclopedia

# URL patterns to exclude (paywalls, archives, low-quality sources)
# Citation link is dropped if any pattern matches (case-insensitive substring)
exclude_url_patterns:
  - pqarchiver.com
  - pqasb.pqarchiver.com
  - archive.org
  - web.archive.org
  # - nytimes.com/archives/
  - scribd.com
  - jstor.org
  - link.springer.com
  - proquest.com
  - ebscohost.com
  - facebook.com

# Top matches to keep per search term (query and argument each get this many)
top_matches_per_term: 6
# If a term gets fewer than this many valid refs after round 1, retry with next batch
min_refs_per_term: 0
# Skip search terms shorter than this (avoids "world", "leaders", etc. matching everything)
min_term_length: 5

# HEAD-check each link; drop citations with invalid links (404, redirect-to-home, etc.)
check_links: true
# Timeout per link in ms; give up after this (returns TIMEOUT status)
link_check_timeout_ms: 10000
# Number of retry rounds (each checks next k links for failed terms)
link_check_retries: 1
