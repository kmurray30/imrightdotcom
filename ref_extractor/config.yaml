prior_sentences: 1
citation_types:
  - web
  - news
  - journal
  - magazine
  - report
  - dictionary
  - encyclopedia

# URL patterns to exclude (paywalls, archives, low-quality sources)
# Citation link is dropped if any pattern matches (case-insensitive substring)
exclude_url_patterns:
  - pqarchiver.com
  - pqasb.pqarchiver.com
  - archive.org
  - web.archive.org
  - nytimes.com/archives/
  - scribd.com
  - jstor.org
  - link.springer.com
  - proquest.com
  - ebscohost.com

# Top matches to keep per search term (query and argument each get this many)
top_matches_per_term: 5
# Skip search terms shorter than this (avoids "world", "leaders", etc. matching everything)
min_term_length: 5
# Fuzzy: 0 = exact only. Higher = more typos allowed but more false positives.
minisearch_fuzzy: 0

# Max refs to keep, ranked by relevance score (top-k cutoff before saving)
topk: 50

# HEAD-check each link; drop citations with invalid links (404, redirect-to-home, etc.)
check_links: true

# RRF constant for Reciprocal Rank Fusion (higher = less weight on top ranks)
rrf_k: 60
